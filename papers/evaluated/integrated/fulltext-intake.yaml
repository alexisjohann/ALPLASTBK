# Full-Text Intake Manifest
# =========================
# SSOT for paper full-text uploads in this directory.
# Only files listed here with status: pending will be processed.
#
# HOW TO USE:
#   1. Upload PDF or create text file on GitHub in this directory
#   2. Add entry below with status: pending
#   3. Claude processes pending entries via /integrate-paper
#   4. Status changes: pending → processing → done (or skipped)
#
# FORMAT TYPES:
#   pdf   = uploaded PDF file
#   text  = text content created directly on GitHub
#   docx  = uploaded Word document
#
# CONVERSION:
#   PDFs are auto-converted to .txt via scripts/convert_pdf_to_text.py
#   Text files need no conversion.
#   Final SSOT destination: data/paper-texts/PAP-{key}.md
#
# WORKFLOW:
#   papers/evaluated/integrated/  (UPLOAD HERE)
#        ↓ convert_pdf_to_text.py (PDF → .txt)
#        ↓ /integrate-paper (identify, classify, integrate)
#   data/paper-texts/PAP-{key}.md  (SSOT full-text)
#   data/paper-references/PAP-{key}.yaml  (SSOT metadata)
#   bibliography/bcm_master.bib  (SSOT bibliography)

