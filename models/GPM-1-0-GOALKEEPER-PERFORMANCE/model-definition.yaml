predictions_v2:
  - id: "PRED-GPM-005"
    statement: |
      Positions with higher paradox_intensity show LARGER gaps between
      metric-based and contribution-based player valuations.
    testable: true
    falsification: "If goalkeeper transfer fees correlate >0.7 with actual team xGA improvement"
    confidence: "HIGH"
    theoretical_basis: "holmstrom1991multitask — measurement distortion increases with task measurability gap"
    mechanism: "Metrics capture visible contribution; market values follow metrics; invisible contribution is unpriced"

  - id: "PRED-GPM-006"
    statement: |
      Goalkeepers who prioritize positioning (invisible) over spectacular saves
      (visible) will have LOWER market value but HIGHER team contribution.
    testable: true
    falsification: "If spectacular-save-focused GKs consistently improve team xGA more than positioning-focused GKs"
    confidence: "MEDIUM"
    theoretical_basis: "kerr1975folly — rewarding A (saves) while hoping for B (prevention)"
    mechanism: "Market rewards visibility; team performance rewards actual contribution"

  - id: "PRED-GPM-007"
    statement: |
      Introducing V* (counterfactual) metrics will REDUCE action bias in
      goalkeeper training by >20% within 2 seasons, measured by
      catch-to-block ratio in training sessions.
    testable: true
    falsification: "If V* metrics are available but catch/block training ratio unchanged"
    confidence: "MEDIUM"
    theoretical_basis: "bareli2007action + holmstrom1991multitask"
    mechanism: "Better measurement → better incentives → better effort allocation"

  - id: "PRED-GPM-008"
    statement: |
      The Prevention Paradox: Teams with the BEST goalkeepers will show
      the FEWEST spectacular saves per 90 minutes, because superior
      positioning prevents shots from occurring.
    testable: true
    falsification: "If top-xGA teams show more saves/90 than league average"
    confidence: "HIGH"
    theoretical_basis: "rose1985sick — prevention success is invisible at event level"
    mechanism: "Better positioning → fewer shots faced → fewer save opportunities → lower save count"
    empirical_check: "Compare saves/90 with team xGA ranking across top-5 leagues"

# ============================================================================
# GPM-3.0 EXTENSION: PREDICTIONS v3
# Added: 2026-02-16
# ============================================================================

predictions_v3:
  - id: "PRED-GPM-009"
    statement: |
      Goalkeepers with block-heavy training profiles (>30% blocking drills)
      show HIGHER non-contact injury rates (D6a) than catch-focused
      goalkeepers, specifically in hip adductor and knee ligament categories.
    testable: true
    falsification: "If block-heavy GKs show equal or lower non-contact injury rates"
    confidence: "HIGH"
    theoretical_basis: "Biomechanical stress analysis — Spread requires hip abduction >120°"
    mechanism: "Extreme joint angles in blocking techniques → cumulative musculoskeletal stress → injury"
    data_required: ["D34 (injury history)", "D35 (training load)", "D36 (technique-injury correlation)"]

  - id: "PRED-GPM-010"
    statement: |
      Blocking techniques carry BOTH higher non-contact (D6a) AND higher
      contact (D6b) injury risk. The combined D6 score for blocking (0.225)
      is 3.1× worse than catching (0.70). This makes blocking the ONLY
      technique that loses on ALL SIX evaluation dimensions.
    testable: true
    falsification: "If blocking shows lower injury rates than catching in either D6a or D6b"
    confidence: "HIGH"
    theoretical_basis: "D6a: biomechanical stress; D6b: collision geometry in 1v1 situations"

  - id: "PRED-GPM-011"
    statement: |
      V*_eff = V* × A × D predicts that a goalkeeper with V*=0.8 but A=0.5
      (injured half the season) has LOWER effective value (V*_eff=0.40) than
      a goalkeeper with V*=0.6 but A=0.95 (rarely injured, V*_eff=0.57).
      Availability is more valuable than peak performance.
    testable: true
    falsification: "If teams with frequently-injured elite GKs outperform teams with available good GKs"
    confidence: "HIGH"
    theoretical_basis: "V1 (EXC-5): A=0 → V*_eff=0 (veto factor). Mathematical certainty."
    empirical_check: "Compare team xGA for GKs with >80% vs <60% availability across top-5 leagues"

  - id: "PRED-GPM-012"
    statement: |
      Red Bull's 18-competency scouting framework covers 44% unmeasurable
      dimensions (psycho-social). Teams relying SOLELY on data analytics
      will systematically under-value these dimensions and make worse
      goalkeeper recruitment decisions.
    testable: true
    falsification: "If pure-data scouting produces better GK signings than hybrid (data+scout) approaches"
    confidence: "MEDIUM"
    theoretical_basis: "holmstrom1991multitask — unmeasured tasks receive under-investment"
    mechanism: "Data measures 56% of competencies → 44% invisible → systematic selection bias"

