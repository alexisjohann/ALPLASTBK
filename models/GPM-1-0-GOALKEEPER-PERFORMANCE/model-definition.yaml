---
# GPM 1.0: GOALKEEPER PERFORMANCE MODEL v1.0
# Multi-Dimensional Framework for Goalkeeper Technique Evaluation
# and Training Allocation
# Single Source of Truth for Model Definition

metadata:
  name: "Goalkeeper Performance Model 2.0 (GPM 2.0)"
  version: "3.0.0"
  status: "DRAFT"
  created: "2026-02-16"
  last_updated: "2026-02-16"
  maintainer: "Gerhard Bruno Fehr / EBF Research Team"

  description: |
    Multi-dimensional framework for systematic evaluation of goalkeeper
    techniques and training time allocation. Decomposes goalkeeper performance
    into three interdependent levels (strategic, tactical, operative) embedded
    in a team performance system (Leistungsverbund). Evaluates techniques
    across six dimensions (including injury risk with/without contact) and
    derives optimal training allocation using game-frequency-weighted scoring.
    Integrates the Red Bull Leipzig/Salzburg scouting framework (Wagner 2023)
    and an availability framework: V*_eff = V* × A × D.

  working_paper: "outputs/medium/working-papers/WP-001_goalkeeper_performance_framework.tex"

  citation: |
    Fehr, G.B. (2026). Torwart-Leistung im Leistungsverbund: Ein mehrdimensionales
    Framework zur Bewertung von Torwarttechniken und Trainingsallokation.
    Working Paper WP-001, FehrAdvice & Partners AG.

# ============================================================================
# CORE MODEL ARCHITECTURE
# ============================================================================

model_type: "Multi-Level Complementary Performance Model"

# ----------------------------------------------------------------------------
# THREE-LEVEL PERFORMANCE DECOMPOSITION
# ----------------------------------------------------------------------------
#
# L(GK) = f(L_S, L_T, L_O) | Team Context Φ
#
# The three levels are COMPLEMENTARY (not substitutable):
#   ∂²L/∂L_i∂L_j > 0  for all i ≠ j
#
# This means: the marginal value of one level INCREASES with the
# level of the others. Operative excellence without tactical decision
# quality is worthless. Tactical intelligence without strategic
# embedding dissipates.

performance_levels:

  - level_id: "L_S"
    name: "Strategische Leistung"
    name_en: "Strategic Performance"
    description: |
      Contribution of the goalkeeper to the team's tactical concept:
      build-up play, tempo control, space compression, numerical
      superiority in possession phases.
    central_question: "Does the goalkeeper make the TEAM better as a whole?"
    team_linkage: |
      The head coach's tactical system defines strategic requirements.
      High pressing demands cover depth and distribution quality;
      deep defending changes the profile fundamentally. Bidirectional.
    components:
      - id: "S1"
        name: "Spieleroeffnung"
        name_en: "Distribution / Build-up"
        description: "Quality and range of distribution from the back"
        scale: [0.0, 1.0]
      - id: "S2"
        name: "Tempokontrolle"
        name_en: "Tempo Control"
        description: "Ability to accelerate or decelerate game rhythm"
        scale: [0.0, 1.0]
      - id: "S3"
        name: "Raumverknappung"
        name_en: "Space Compression"
        description: "Sweeper-keeper positioning to compress space behind defense"
        scale: [0.0, 1.0]
      - id: "S4"
        name: "Ueberzahl_Aufbau"
        name_en: "Numerical Superiority"
        description: "Creating +1 advantage in build-up through positioning"
        scale: [0.0, 1.0]

  - level_id: "L_T"
    name: "Taktische Leistung"
    name_en: "Tactical Performance"
    description: |
      Situational decision quality in real-time. When to come off the
      line, when to stay? When to catch, when to parry, when to block?
    central_question: "Does the goalkeeper make the RIGHT decision in each situation?"
    team_linkage: |
      Goalkeeper decisions directly depend on and influence the
      defensive line. Communication, timing, and mutual reading are
      tactical co-production. A blocking goalkeeper forces his team
      back into defensive work; a catching goalkeeper relieves the system.
    components:
      - id: "T1"
        name: "Herauslaufen_Timing"
        name_en: "Coming Out / Timing"
        description: "Decision quality on when to leave the line"
        scale: [0.0, 1.0]
      - id: "T2"
        name: "Technikwahl"
        name_en: "Technique Selection"
        description: "Choosing the right technique for each situation"
        scale: [0.0, 1.0]
      - id: "T3"
        name: "Kommunikation"
        name_en: "Communication"
        description: "Organizing the defense, calling players, directing"
        scale: [0.0, 1.0]
      - id: "T4"
        name: "Antizipation"
        name_en: "Anticipation"
        description: "Reading the game, anticipating danger before it materializes"
        scale: [0.0, 1.0]

  - level_id: "L_O"
    name: "Operative Leistung"
    name_en: "Operative Performance"
    description: |
      Pure technical execution quality: catching, parrying, blocking,
      punching, foot saves.
    central_question: "Does the goalkeeper EXECUTE each technique cleanly?"
    team_linkage: |
      Technical quality directly determines follow-up actions of
      teammates. A caught ball enables immediate transition. A blocked
      ball creates an unclear situation for the entire team.
    components:
      - id: "O1"
        name: "Fangen"
        name_en: "Catching"
        description: "Secure ball retention through catching"
        scale: [0.0, 1.0]
      - id: "O2"
        name: "Parieren"
        name_en: "Parrying"
        description: "Deflecting shots to safe areas"
        scale: [0.0, 1.0]
      - id: "O3"
        name: "Blocken"
        name_en: "Blocking"
        description: "Spread, K-Block, Langblock in 1v1 situations"
        scale: [0.0, 1.0]
      - id: "O4"
        name: "Fausten"
        name_en: "Punching"
        description: "Clearing crosses and high balls under pressure"
        scale: [0.0, 1.0]
      - id: "O5"
        name: "Fussabwehr"
        name_en: "Foot Saves"
        description: "Saves using feet (reflex, spread)"
        scale: [0.0, 1.0]

# ----------------------------------------------------------------------------
# COMPLEMENTARITY STRUCTURE
# ----------------------------------------------------------------------------

complementarity:
  description: |
    The three performance levels are strictly complementary.
    Formally: ∂²L/∂L_i∂L_j > 0 for all i,j ∈ {S,T,O}, i≠j.
    The marginal return of improving one level increases when
    other levels are already high.

  gamma_matrix:
    # γ > 0: complementary; γ < 0: substitutive; γ = 0: additive
    - pair: ["L_S", "L_T"]
      gamma: 0.45
      rationale: |
        Strategic concepts require tactical execution.
        A high pressing system only works if the goalkeeper
        makes correct timing decisions. Strong complementarity.

    - pair: ["L_S", "L_O"]
      gamma: 0.30
      rationale: |
        Strategic value (e.g., build-up play) requires operative
        precision (distribution accuracy). Moderate complementarity.

    - pair: ["L_T", "L_O"]
      gamma: 0.50
      rationale: |
        Tactical decisions are only valuable if executed technically.
        Choosing to catch (T2) only helps if catching technique (O1)
        is reliable. Strongest complementarity pair.

# ----------------------------------------------------------------------------
# SIX-DIMENSION TECHNIQUE EVALUATION FRAMEWORK (v3.0)
# ----------------------------------------------------------------------------
#
# For each goalkeeper technique t, compute:
#   S(t) = Σ_i w_i × D_i(t)
#
# where D_i ∈ [0,1] and Σ w_i = 1.0
#
# v3.0 Extension: D6 (Verletzungsrisiko) with two sub-components:
#   D6(t) = 0.5 × D6a(t) + 0.5 × D6b(t)
#   D6a = Non-contact injury risk (technique/training-related)
#   D6b = Contact injury risk (collision/game-situation-related)
#
# Inverted scale: 1.0 = low injury risk, 0.0 = high injury risk

technique_dimensions:

  - dim_id: "D1"
    name: "Spielrelevanz"
    name_en: "Game Relevance"
    symbol: "R"
    weight: 0.25
    weight_v2: 0.30
    description: |
      How frequently does this situation actually occur in match play?
      Based on empirical frequency distribution of save types.
    measurement: "Share of total goalkeeper actions per match"
    scale: [0.0, 1.0]

  - dim_id: "D2"
    name: "Risikoreduktion"
    name_en: "Risk Reduction"
    symbol: "ρ"
    weight: 0.22
    weight_v2: 0.25
    description: |
      How much does the technique reduce the probability of conceding?
      Key distinction: ball secured (maximal) vs. ball in play (residual risk).
    measurement: "P(ball_secured) - residual danger after action"
    scale: [0.0, 1.0]

  - dim_id: "D3"
    name: "Lernaufwand"
    name_en: "Learning Efficiency"
    symbol: "η"
    weight: 0.13
    weight_v2: 0.15
    description: |
      Training time required for reliable execution under pressure.
      Inverted: higher score = easier to automate.
    measurement: "Inverse of hours to reliable automatization"
    scale: [0.0, 1.0]
    note: "Inverted scale: 1.0 = easy to learn, 0.0 = extremely difficult"

  - dim_id: "D4"
    name: "Trainerkompetenz"
    name_en: "Coach Transmissibility"
    symbol: "τ"
    weight: 0.08
    weight_v2: 0.10
    description: |
      Can the coach teach this technique in its full decision context?
      Not just the motor skill, but WHEN to apply it.
    measurement: "Diagnostic and design capability required"
    scale: [0.0, 1.0]

  - dim_id: "D5"
    name: "Strategisches Leistungspotential"
    name_en: "Strategic Potential"
    symbol: "Π"
    weight: 0.17
    weight_v2: 0.20
    description: |
      Value-add of the action BEYOND pure danger prevention.
      Does the technique enable transition, build-up, or counter-attack?
    measurement: "Transition / distribution enablement after save"
    scale: [0.0, 1.0]

  - dim_id: "D6"
    name: "Verletzungsrisiko"
    name_en: "Injury Risk"
    symbol: "ι"
    weight: 0.15
    weight_v2: null
    description: |
      How much injury risk does the technique impose on the goalkeeper?
      Critical dimension because: V*_eff = V* × A × D -- even the best
      technique is worthless if the goalkeeper is injured.
      Split into two sub-components with equal weight.
    measurement: "Composite: 0.5 × D6a + 0.5 × D6b"
    scale: [0.0, 1.0]
    note: "Inverted scale: 1.0 = low injury risk, 0.0 = very high injury risk"
    added_in: "v3.0"
    rationale: |
      Missing in v1.0 and v2.0. Identified via Red Bull Leipzig/Salzburg
      scouting framework (Wagner 2023) which includes "Robust" as key
      competency. The Spread/K-Block technique in particular carries
      significant non-contact injury risk (hip adductor strain, ACL stress)
      that was not captured by D1-D5.

    sub_components:

      - sub_id: "D6a"
        name: "Verletzungsrisiko ohne Fremdeinwirkung"
        name_en: "Non-Contact Injury Risk"
        weight_in_D6: 0.50
        description: |
          Injury risk inherent to the TECHNIQUE ITSELF -- independent of
          opponent contact. Driven by:
          - Biomechanical stress of movement patterns
          - Extreme joint angles (hip abduction in Spread, knee flexion in K-Block)
          - Repetitive strain from training volume
          - Muscle/tendon overload from explosive movements
        examples:
          high_risk: |
            Spread technique: Extreme hip abduction → adductor strain, hip flexor tears
            K-Block: Deep knee flexion under load → ACL/MCL stress
            Langblock: Shoulder impact on ground → rotator cuff
          low_risk: |
            Catching: Natural movement patterns, controlled deceleration
            Basic positioning: No extreme joint angles
        key_insight: |
          Non-contact injuries are DIRECTLY linked to technique choice and
          training volume. A coach who trains 40% blocking is systematically
          increasing D6a injury risk. This is an ADDITIONAL substitution cost
          beyond temporal, cognitive, and systemic substitution (v1.0).

      - sub_id: "D6b"
        name: "Verletzungsrisiko mit Fremdeinwirkung"
        name_en: "Contact Injury Risk"
        weight_in_D6: 0.50
        description: |
          Injury risk from COLLISIONS with opponents, posts, or ground
          in contested situations. Driven by:
          - Frequency of physical duels in technique application
          - Exposure to attacker follow-through
          - Body position vulnerability during execution
          - Proximity to goal posts/crossbar
        examples:
          high_risk: |
            1v1 blocking: Direct collision path with onrushing attacker
            Punching in crowded area: Aerial challenge with multiple opponents
            Diving at feet: Attacker boot contact with head/hands
          low_risk: |
            Catching high crosses (unchallenged): Controlled aerial position
            Parrying from distance: No physical contact expected
        key_insight: |
          Contact injuries are situation-dependent but TECHNIQUE CHOICE
          modulates exposure. A goalkeeper who blocks (goes to ground in
          1v1) is MORE exposed to contact than one who stays upright and
          catches or parries. The decision to block creates the collision
          geometry that enables contact injury.

# ----------------------------------------------------------------------------
# TECHNIQUE PROFILES (REFERENCE VALUES)
# ----------------------------------------------------------------------------

technique_profiles:

  - technique_id: "CATCH"
    name: "Fangen"
    name_en: "Catching"
    level: "L_O"
    component: "O1"
    description: "Secure ball retention through catching"
    scores:
      D1_game_relevance: 0.85
      D2_risk_reduction: 0.95
      D3_learning_efficiency: 0.55
      D4_coach_transmissibility: 0.80
      D5_strategic_potential: 0.90
      D6_injury_risk: 0.70
      D6a_non_contact: 0.85
      D6b_contact: 0.55
    weighted_score: null  # computed by model
    assessment: |
      Dominant technique. High frequency, maximal risk reduction,
      maximal strategic value (enables instant transition).
      Superior in 5 of 6 dimensions. Low non-contact injury risk
      (natural movement patterns). Moderate contact risk when
      catching in traffic (aerial challenges, crowded penalty area).

  - technique_id: "PARRY_SAFE"
    name: "Parieren (sicher)"
    name_en: "Parrying (safe)"
    level: "L_O"
    component: "O2"
    description: "Deflecting shots away from danger"
    scores:
      D1_game_relevance: 0.70
      D2_risk_reduction: 0.70
      D3_learning_efficiency: 0.50
      D4_coach_transmissibility: 0.65
      D5_strategic_potential: 0.40
      D6_injury_risk: 0.65
      D6a_non_contact: 0.60
      D6b_contact: 0.70
    weighted_score: null
    assessment: |
      Important secondary technique. Ball leaves play (corner)
      or moves to safe area. No direct transition but danger eliminated.
      Medium non-contact risk (diving strain on shoulder/wrist).
      Low contact risk (usually executed away from attackers).

  - technique_id: "BLOCK"
    name: "Blocken (Spread/K-Block/Langblock)"
    name_en: "Blocking (Spread/K-Block/Long Block)"
    level: "L_O"
    component: "O3"
    description: "Body-barrier technique in 1v1 situations"
    scores:
      D1_game_relevance: 0.20
      D2_risk_reduction: 0.50
      D3_learning_efficiency: 0.35
      D4_coach_transmissibility: 0.30
      D5_strategic_potential: 0.10
      D6_injury_risk: 0.225
      D6a_non_contact: 0.25
      D6b_contact: 0.20
    weighted_score: null
    assessment: |
      Niche technique for specific 1v1 scenarios. Low frequency,
      ball remains in play (residual danger), minimal strategic
      value (team stays defensive). Overrepresented in training
      due to social media availability bias.
      HIGHEST INJURY RISK OF ALL TECHNIQUES in both sub-dimensions:
      D6a: Spread requires extreme hip abduction → adductor/hip flexor strain.
           K-Block stresses ACL/MCL through deep knee flexion under load.
           Langblock causes repeated shoulder impact on ground.
      D6b: 1v1 situations create direct collision geometry with
           onrushing attacker. Goalkeeper on ground = vulnerable to
           follow-through contact (boots, knees, body weight).

  - technique_id: "PUNCH"
    name: "Fausten"
    name_en: "Punching"
    level: "L_O"
    component: "O4"
    description: "Clearing crosses and high balls under pressure"
    scores:
      D1_game_relevance: 0.45
      D2_risk_reduction: 0.55
      D3_learning_efficiency: 0.50
      D4_coach_transmissibility: 0.60
      D5_strategic_potential: 0.25
      D6_injury_risk: 0.475
      D6a_non_contact: 0.55
      D6b_contact: 0.40
    weighted_score: null
    assessment: |
      Situational technique for crosses and set pieces. Clears
      immediate danger but doesn't secure possession.
      Medium non-contact risk (shoulder/elbow strain from punching).
      Higher contact risk in crowded penalty area (aerial challenges
      with multiple opponents, elbow/head contact).

  - technique_id: "FOOT_SAVE"
    name: "Fussabwehr"
    name_en: "Foot Save"
    level: "L_O"
    component: "O5"
    description: "Saves using feet in close-range situations"
    scores:
      D1_game_relevance: 0.30
      D2_risk_reduction: 0.45
      D3_learning_efficiency: 0.40
      D4_coach_transmissibility: 0.45
      D5_strategic_potential: 0.15
      D6_injury_risk: 0.40
      D6a_non_contact: 0.45
      D6b_contact: 0.35
    weighted_score: null
    assessment: |
      Reflex-dependent technique. Often combined with blocking.
      Limited control over ball destination. Medium-high non-contact
      risk (quick leg extensions strain hamstrings/adductors).
      Elevated contact risk in close-range situations (attacker
      follow-through, boot-to-hand/head contact).

# ----------------------------------------------------------------------------
# SUBSTITUTION EFFECTS
# ----------------------------------------------------------------------------

substitution_effects:

  - type: "temporal"
    name: "Zeitliche Substitution"
    name_en: "Temporal Substitution"
    description: |
      Every training minute for blocking technique is a minute NOT spent
      on catching, positioning, or distribution. Classic opportunity cost.
    constraint: "Σ T_technique = T_total (zero-sum)"

  - type: "cognitive"
    name: "Kognitive Substitution"
    name_en: "Cognitive Substitution"
    description: |
      The goalkeeper who automates blocking as default unconsciously
      substitutes catching in situations where catching would be better.
      An availability bias in motor patterns.
    mechanism: "Default automation → availability heuristic in motor selection"
    reference: "tversky1973availability"

  - type: "systemic"
    name: "Systemische Substitution"
    name_en: "Systemic Substitution"
    description: |
      At team level, a blocking goalkeeper substitutes fast transition
      with a defensive loop. The substitution propagates through the
      entire performance system.
    mechanism: "Block → ball in play → team defensive reset → lost transition opportunity"

  - type: "injury"
    name: "Verletzungs-Substitution"
    name_en: "Injury Substitution"
    added_in: "v3.0"
    description: |
      Training and applying high-risk techniques (Spread, K-Block) substitutes
      AVAILABILITY for technique specialization. The goalkeeper who blocks
      more often faces higher probability of both non-contact injuries
      (D6a: biomechanical stress from extreme movement patterns) and
      contact injuries (D6b: collision geometry in 1v1 situations).
      This is the FOURTH substitution cost, and potentially the most
      devastating: a goalkeeper who is injured contributes V*_eff = 0.
    mechanism: |
      Block-heavy training → extreme joint angles (hip, knee) →
      cumulative musculoskeletal stress → non-contact injury risk ↑
      +
      Block-heavy match style → ground-level collision geometry →
      contact injury risk ↑
      =
      Lower A (availability) → V*_eff = V* × A × D decreases
    reference: "ekstrand2011injuries, drawer2002goalkeeper"

# ----------------------------------------------------------------------------
# TRAINING ALLOCATION MODEL (SIMULATOR PRINCIPLE)
# ----------------------------------------------------------------------------

training_allocation:
  principle: "F1 Simulator Analogy"
  description: |
    Training should mirror the frequency distribution of actual match
    situations. Like F1 simulator training: 80% normal corners, 15%
    overtaking maneuvers, 5% crisis situations. The goalkeeper trains
    DECISIONS under realistic conditions, not isolated techniques.

  protocol:
    step_1:
      name: "Spielanalyse"
      description: "Record action distribution across 5 matches (tally suffices)"
      output: "Frequency vector F = [f_catch, f_parry, f_block, f_punch, f_foot, f_distribution, ...]"

    step_2:
      name: "Uebungsdesign"
      description: |
        Design sequences where situation types follow in realistic frequency,
        with decision pressure and without pre-announcement.
      principle: "Frequency-weighted random sequences with decision points"

    step_3:
      name: "Kalibrierung"
      description: |
        Evaluate each technique via the five-dimension framework.
        Adjust training allocation based on scores and frequency.
      formula: |
        T_alloc(t) = w_freq × F(t) + w_score × S(t) + w_weakness × (1 - Proficiency(t))
        where w_freq + w_score + w_weakness = 1.0

  default_weights:
    w_freq: 0.50
    w_score: 0.30
    w_weakness: 0.20

# ----------------------------------------------------------------------------
# EMPIRICAL REFERENCE VALUES
# ----------------------------------------------------------------------------

empirical_references:

  average_save_rate:
    value: 0.69
    source: "soccerment2024"
    context: "Top-5 European leagues"

  shots_on_target_per_match:
    value: 4.5
    range: [4, 5]
    source: "soccerment2024"
    context: "Per goalkeeper per match"

  body_coverage_standing:
    value: 0.24
    description: "Body area coverage of goal standing (190cm goalkeeper)"
    source: "soccerment2024"

  spread_technique_recognition:
    value: 0.99
    description: "Share of coaches recognizing spread technique"
    source: "gramage2025"

  spread_technique_usage:
    value: 0.78
