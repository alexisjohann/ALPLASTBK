  # =========================================================================
  # PSF-2.0: Papal Succession Framework
  # =========================================================================
  - model_id: "PSF-2.0"
    short_name: "Papal Succession Framework"
    category: "SUCCESSION"
    status: "STABLE"
    version: "1.1"
    created: "2026-01-14"
    last_updated: "2026-01-14"
    maintainer: "EBF Research Team"

    description: |
      Network-centric model of papal conclave dynamics.
      Predicts which cardinal will be elected pope based on five dimensions:
      - Network Centrality (Λ): Position in Vatican Curia
      - Integration Capacity (Ι): Ability to bridge factional divides
      - Predecessor Support (Π): Endorsed by predecessor Pope
      - Ideological Neutrality (Ν): Non-radical positioning
      - Authentic Legitimacy (Α): Consistent 30+ year career

    documentation_url: "models/PSF-2-0-PAPAL-SUCCESSION/README.md"

    use_cases:
      - "succession"
      - "papal"
      - "conclave"
      - "pope"
      - "papst"
      - "kardinal"
      - "vatican"
      - "election"
      - "wahl"
      - "mechanism_design"
      - "choice_architecture"
      - "elite_selection"
      - "voting"
      - "deliberation"
      - "supermajority"
      - "network_centrality"
      - "institutional_design"
      - "experimental_design"
      - "field_experiment"
      - "church"
      - "kirche"
      - "religion"

    dimensions:
      - symbol: "Λ"
        name: "Network Centrality"
        description: "Position in Vatican institutional network"
        weight: 0.40
        beta_coefficient: 2.5
        range: [0.0, 1.0]

      - symbol: "Ι"
        name: "Integration Capacity"
        description: "Ability to bridge factional divides"
        weight: 0.25
        beta_coefficient: 1.8
        range: [0.0, 1.0]

      - symbol: "Π"
        name: "Predecessor Support"
        description: "Endorsement and support from predecessor Pope"
        weight: 0.20
        beta_coefficient: 1.5
        range: [0.0, 1.0]

      - symbol: "Ν"
        name: "Ideological Neutrality"
        description: "Extent of non-radical positioning"
        weight: 0.10
        beta_coefficient: 0.8
        range: [0.0, 1.0]

      - symbol: "Α"
        name: "Authentic Legitimacy"
        description: "Genuine consistent career over 30+ years"
