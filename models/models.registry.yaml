  # =========================================================================
  # SBDMS-1.0: Strategic Bank Decision-Making System
  # =========================================================================
  - model_id: "SBDMS-1.0"
    short_name: "Strategic Bank Decision-Making System"
    category: "INSTITUTIONAL"
    status: "EXPERIMENTAL"
    version: "1.0"
    created: "2026-01-15"
    last_updated: "2026-01-15"
    maintainer: "EBF Finance Team"

    description: |
      Hierarchical framework for modeling strategic decisions across three organizational
      tiers (Board, Division, Operations) in global financial institutions.

      Integrates six decision dimensions with explicit complementarity parameters to capture
      synergies and trade-offs. Context-dependent weighting adjusts decision logic based on
      economic environment (Normal, Growth, Crisis).

    use_cases:
      - "bank"
      - "banking"
      - "financial_institution"
      - "finanzinstitut"
      - "credit"
      - "kredit"
      - "market_entry"
      - "capital_allocation"
      - "risk_management"
      - "risikomanagement"
      - "board_decision"
      - "vorstandsentscheidung"
      - "hierarchical_decision"
      - "organizational_decision"
      - "m_and_a"
      - "investment"
      - "investition"
      - "regulatory"
      - "regulierung"
      - "financial_strategy"
      - "ubs"
      - "lukb"
      - "zkb"

    dimensions:
      - symbol: "F"
        name: "Financial"
        description: "ROI, NPV, profit impact"
        weight: 0.30  # Board: 0.30, Division: 0.35, Operational: 0.30
        range: [0.0, 1.0]

      - symbol: "S"
        name: "Strategic"
        description: "Strategic alignment, competitive fit"
        weight: 0.25  # Board: 0.40, Division: 0.25, Operational: 0.03
        range: [0.0, 1.0]

      - symbol: "R"
        name: "Risk"
        description: "Net risk exposure (inverted: high=bad)"
        weight: 0.25  # Board: 0.20, Division: 0.25, Operational: 0.35
        range: [0.0, 1.0]

      - symbol: "P"
        name: "Practical"
        description: "Operational feasibility, execution capability"
        weight: 0.08  # Board: 0.05, Division: 0.10, Operational: 0.10
        range: [0.0, 1.0]

      - symbol: "E"
        name: "Emotional"
        description: "Management conviction, team alignment"
        weight: 0.03  # Board: 0.03, Division: 0.03, Operational: 0.02
        range: [0.0, 1.0]

      - symbol: "Reg"
        name: "Regulatory"
        description: "Regulatory approval probability"
        weight: 0.02  # Board: 0.02, Division: 0.02, Operational: 0.20
        range: [0.0, 1.0]

    complementarity_parameters:
      - pair: "F-S"
        value: 0.15
        interpretation: "Positive synergy: profitable AND strategically aligned"

      - pair: "F-R"
        value: -0.20
        interpretation: "Negative trade-off: high returns correlate with high risk"

      - pair: "R-P"
        value: -0.15
        interpretation: "Negative interaction: high risk + complexity compounds difficulty"

      - pair: "S-E"
        value: 0.12
        interpretation: "Positive synergy: conviction drives execution"

      - pair: "Reg-P"
        value: 0.10
        interpretation: "Positive synergy: compliance + feasibility = durability"

      - pair: "F-E"
        value: 0.08
        interpretation: "Weak positive synergy: strong financials attract conviction"

      - pair: "S-R"
        value: -0.10
        interpretation: "Weak negative interaction: strategic ambition requires risk acceptance"

    hierarchical_structure:
      - level: "Board"
        intercept: 0.8
        description: "Strategic decisions, M&A approval, risk appetite setting"
        decision_horizon: "3-5 years"

      - level: "Division"
        intercept: 0.6
        description: "Tactical decisions, product launches, customer segments"
        decision_horizon: "1-2 years"

      - level: "Operational"
        intercept: 0.4
        description: "Routine decisions, transaction approval, customer on-boarding"
        decision_horizon: "Days-weeks"

    decision_types:
      - name: "Market Entry"
        description: "New market/geography expansion"
        threshold_go: 0.70
        threshold_conditional: 0.50

      - name: "Credit Classification"
        description: "Credit decision or risk classification"
        threshold_approve: 0.80
        threshold_conditional: 0.60
        threshold_committee_review: 0.40

      - name: "Capital Allocation"
        description: "M&A, major capex, strategic investments"
        threshold_go: 0.75
        threshold_conditional: 0.50

    context_factors:
      - name: "market_volatility"
        scale: "0-80 (VIX-like)"

      - name: "regulatory_tightness"
        scale: "0-1"

      - name: "capital_position"
        scale: "0-1 (deficit to surplus)"

      - name: "management_risk_appetite"
        scale: "0-1 (conservative to aggressive)"

      - name: "economic_cycle"
        scale: "expansion / normal / contraction"

    validation:
      status: "FRAMEWORK-LEVEL"
      accuracy: 0.00
      data_points: 0
      notes: "Conceptually validated; empirical validation pending 2026 pilot"

    repository_path: "models/SBDMS-1-0-BANK-STRATEGY/"

    test_coverage: "35 unit tests (100% pass) | Coverage: initialization, context classification, utility calculation, all decision types, complementarities, hierarchy constraints"

    known_limitations:
      - name: "No crisis scenarios modeled"
        severity: "MEDIUM"
        fix: "Phase 1.1: Add binary shock scenarios"

      - name: "Behavioral biases not modeled"
        severity: "MEDIUM"
        fix: "Phase 2.0: Add cognitive constraints"

      - name: "Single-bank calibration required"
        severity: "HIGH"
        fix: "Each bank must calibrate with own historical data"

      - name: "Assumes rational decision-making"
        severity: "MEDIUM"
        fix: "Phase 2.0: Add organizational friction"

    next_steps:
      - "Phase 1: Pilot with 3-5 division-level decisions (Q1-Q2 2026)"
      - "Phase 2: Extend to operational level (50+ credit decisions)"
      - "Phase 3: Full production rollout with learning loop"
      - "Calibrate β and γ with bank-specific data"

