      scope_type: "META (integrates SDM-1.0 + SOCM-1.0)"
      mode: "GEFÜHRT (bidirectional top-down + bottom-up)"

    sub_models:
      - model_id: "SDM-1.0"
        role: "Process Layer (4-phase BCJ for behavior change)"
      - model_id: "SOCM-1.0"
