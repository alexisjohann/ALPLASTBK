      - symbol: "ρ"
        name: "Risk Reduction"
        description: "Ball secured vs. ball in play (residual danger)"
        weight: 0.22
        range: [0.0, 1.0]

      - symbol: "η"
        name: "Learning Efficiency"
        description: "Inverse of training hours to reliable automatization"
        weight: 0.13
        range: [0.0, 1.0]

      - symbol: "τ"
        name: "Coach Transmissibility"
        description: "Can the coach teach this in full decision context?"
        weight: 0.08
        range: [0.0, 1.0]

      - symbol: "Π"
        name: "Strategic Potential"
        description: "Value-add beyond pure danger prevention (transition, build-up)"
        weight: 0.17
        range: [0.0, 1.0]

      - symbol: "ι"
        name: "Injury Risk"
        description: "Composite injury risk (D6 = 0.5*D6a + 0.5*D6b). Inverted: 1.0 = safest"
        weight: 0.15
        range: [0.0, 1.0]

    complementarity_parameters:
      - pair: "L_S-L_T"
        value: 0.45
        interpretation: "Strategic × Tactical: concepts require tactical execution"

      - pair: "L_S-L_O"
        value: 0.30
