  # =========================================================================
  # GPM-1.0: Goalkeeper Performance Model
  # =========================================================================
  - model_id: "GPM-1.0"
    short_name: "Goalkeeper Performance Model"
    category: "PERFORMANCE"
    status: "DRAFT"
    version: "3.0"
    created: "2026-02-16"
    last_updated: "2026-02-17"
    maintainer: "Gerhard Bruno Fehr / EBF Research Team"

    description: |
      Multi-dimensional framework for systematic evaluation of goalkeeper
      techniques and training time allocation. Decomposes goalkeeper performance
      into three interdependent levels (strategic, tactical, operative) embedded
      in a team performance system (Leistungsverbund). Evaluates techniques
      across six dimensions including injury risk (D6) and derives optimal
      training allocation using game-frequency-weighted scoring. Includes
      Visibility-Contribution framework and V*_eff availability model.

      Key insight: Catching dominates in 6/6 evaluation dimensions. Current
      block-heavy training trends are driven by social media availability bias,
      not evidence. Block is also 3.1x more dangerous than catching (D6).

    documentation_url: "models/GPM-1-0-GOALKEEPER-PERFORMANCE/README.md"

    methodology:
      design_approach: "EEE Workflow (Appendix EEE)"
      entry_point: "PRACTICE-DRIVEN"
      scope_type: "CONTINUOUS (training allocation optimization)"
      mode: "SCHNELL"
      formalized: "2026-02-16"

    ten_c_mapping:
      WHO: "3-level: GK (individual), Coach (organization), Team (system)"
      WHAT: "6 technique dimensions: R, rho, eta, tau, Pi, iota (injury risk)"
      HOW: "Three-level complementarity: gamma_ST=0.45, gamma_SO=0.30, gamma_TO=0.50"
      WHEN: "Psi_I (institutional), Psi_S (social media), Psi_C (cognitive bias), Psi_T (temporal), Psi_M (tools)"
      WHERE: "Hybrid: Tier 1 literature + Tier 3 empirical + Tier 4 expert"
      AWARE: "3 biases: availability, small sample, technique isolation"
      READY: "Coach transmissibility (tau) as readiness proxy"
      STAGE: "F1 Simulator 3-step adoption: Record -> Redesign -> Calibrate"
      HIERARCHY: "L_S (strategic) > L_T (tactical) > L_O (operative)"
      EIT: "Training allocation vector [T_catch, T_parry, T_block, T_punch, T_foot] in [0,1]^5"

