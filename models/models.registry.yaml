      - "corporate_design"
      - "digital_transformation"
      - "culture_change"
      - "kulturwandel"
      - "porr"
      - "alpla"
      - "lindt"
      - "phase_model"

    methodology:
      design_approach: "EEE Workflow (Appendix EEE)"
      entry_point: "HYBRID (Theory + Practice)"
      scope_type: "PROCESS (4-phase change journey)"
      mode: "GEFÜHRT (guided with 3+1 choices)"

    dimensions:
      - symbol: "F"
        name: "Financial"
        description: "ROI, profitability, cash generation of strategy"
        weight: 0.25
        range: [0.0, 1.0]

      - symbol: "E"
        name: "Environmental"
        description: "Sustainability, ESG impact, societal contribution"
        weight: 0.15
        range: [0.0, 1.0]

      - symbol: "P"
        name: "Practical"
        description: "Operational feasibility, resource availability, execution capability"
        weight: 0.20
        range: [0.0, 1.0]

      - symbol: "S"
        name: "Strategic"
        description: "Mission alignment, competitive advantage, market positioning"
        weight: 0.25
        range: [0.0, 1.0]

      - symbol: "D"
        name: "Deliberative"
        description: "Analytical rigor, scenario testing, strategic validation"
        weight: 0.10
        range: [0.0, 1.0]

    complementarity_parameters:
      - pair: "F-S"
        value: 0.18
        interpretation: "Profit + Strategic alignment → market leadership (synergy)"

      - pair: "S-P"
        value: 0.12
        interpretation: "Ambition + Execution capability → sustainable model (synergy)"

      - pair: "S-E"
        value: 0.10
        interpretation: "Strategy + Environmental impact → organizational commitment (synergy)"

      - pair: "P-D"
        value: 0.10
        interpretation: "Feasibility + Analytical rigor → validated implementation (synergy)"

      - pair: "E-D"
        value: 0.08
        interpretation: "Sustainability + Analysis → durable competitive advantage (synergy)"

      - pair: "F-P"
        value: -0.15
        interpretation: "High returns often require higher implementation complexity (trade-off)"

      - pair: "F-E"
        value: -0.12
        interpretation: "Profit maximization vs. environmental/social costs (trade-off)"

    context_factors:
      - symbol: "Ψ₁"
        name: "Market Disruption"
        scale: "0-1"
        interpretation: "Higher → more radical strategy needed"

      - symbol: "Ψ₂"
        name: "Capital Availability"
        scale: "0-1"
        interpretation: "Lower → conservative roadmap required"

      - symbol: "Ψ₃"
        name: "Leadership Alignment"
        scale: "0-1"
        interpretation: "Lower → higher execution risk"

      - symbol: "Ψ₄"
        name: "Organizational Maturity"
        scale: "0-1"
        interpretation: "Lower → longer change journey needed"

      - symbol: "Ψ₅"
        name: "Regulatory Tightness"
        scale: "0-1"
        interpretation: "Higher → more compliance overhead"

    change_journey_phases:
      - phase: "Awareness"
        timeline: "0-6 months"
        phase_index: 0
        key_behavior: "Strategy articulated, initial communication"
        bottleneck: "Understanding and sense-making"
        success_probability: "35-45%"

      - phase: "Readiness"
        timeline: "6-18 months"
        phase_index: 0.33
        key_behavior: "Organizational structures reset, capability building"
        bottleneck: "Resource and skill availability"
        success_probability: "45-60%"

      - phase: "Action"
        timeline: "18-36 months"
        phase_index: 0.67
        key_behavior: "Implementation across business divisions, quick wins"
        bottleneck: "Sustained commitment and momentum"
        success_probability: "60-75%"

      - phase: "Embedding"
        timeline: "36-60 months"
        phase_index: 1.0
        key_behavior: "New operating model locked in, cultural integration"
