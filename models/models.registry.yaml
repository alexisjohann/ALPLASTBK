  # =========================================================================
  # FA-SM-1.0: FehrAdvice Strategy Model
  # =========================================================================
  - model_id: "FA-SM-1.0"
    short_name: "FehrAdvice Strategy Model"
    category: "META-STRATEGY"
    status: "EXPERIMENTAL"
    version: "1.0"
    created: "2026-02-24"
    last_updated: "2026-02-24"
    maintainer: "EBF Strategy Team"

    description: |
      Meta-model for value-creation-driven strategy design. Integrates behavioral
      economics with strategic management through a corrected causal chain:

        WERTSTEIGERUNG (Ziel) ← VERHALTEN (Hebel) ← KONTEXT-DESIGN (Instrument)
        V(t)                  ← B(t)              ← Ψ(t)

      Strategy without behavior is not implementable. Strategy oriented only at
      behavioral goals is purposeless. The ultimate goal is VALUE CREATION.

      Three-layer architecture:
        Layer 0: Value Creation Target — V(t) = Σ w_k · V_k(t)
        Layer 1: Behavior Translation — B(t) = g(Ψ(t), I(t))
        Layer 2: Context Design — Ψ(t) = designable context dimensions

      Integrates SDM-1.0 (process layer, 4-phase BCJ) and SOCM-1.0 (option
      comparison layer, portfolio optimization) as sub-models.

    documentation_url: "models/FA-SM-1-0-STRATEGY/README.md"

    use_cases:
      - "strategy"
      - "strategie"
      - "wertschoepfung"
      - "wertsteigerung"
      - "value_creation"
      - "organizational_design"
      - "organisationsentwicklung"
      - "fuehrungsentwicklung"
      - "leadership_development"
