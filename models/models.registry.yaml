  # =========================================================================
  # TRUMP: Constitutional Compliance Risk Model
  # =========================================================================
  - model_id: "TRUMP-COMPLIANCE-2025-2030"
    short_name: "Trump Constitutional Compliance Risk"
    category: "COMPLIANCE"
    status: "STABLE"
    version: "1.0"
    created: "2026-01-14"
    last_updated: "2026-01-14"
    maintainer: "EBF Research Team"

    description: |
      Two-stage behavioral model assessing probability that Donald Trump will
      violate the 22nd Amendment (constitutional term limit) in 2025-2030.

      Stage 1: Decision to violate (P = 0.38)
      Stage 2: Implementation pathway (BCJ phase progression)

      Critical constraint: Military loyalty (Ψ_ML) - without military support, P ≈ 0%

    documentation_url: "appendices/AX_TRUMP-CONSTITUTIONAL-COMPLIANCE.tex"

    use_cases:
      - "trump"
      - "compliance"
      - "constitutional"
      - "verfassung"
      - "term_limit"
      - "amtszeitbegrenzung"
      - "democracy"
      - "demokratie"
      - "autocracy"
      - "autokratie"
      - "democratic_backsliding"
      - "authoritarian"
      - "coup"
      - "putsch"
      - "military"
      - "22nd_amendment"
      - "norm_violation"
      - "institutional_erosion"
      - "erdogan"
      - "putin"
      - "power_consolidation"

    validation:
      accuracy: 0.38
      confidence: "MEDIUM"
      data_points: 5
      notes: "Point estimate from expert assessment + historical precedent (Erdoğan, Putin, Xi)"

    prediction:
      point_estimate: "38%"
      confidence_interval: "[30%, 48%]"
      critical_constraint: "Military support (necessary but not sufficient)"
      critical_decision_point: "Q2-Q3 2026"

    stage_analysis:
      stage_1_decision:
        probability: 0.38
        components:
          military_support: "Decision-critical; no military support → no violation"
          economic_conditions: "Downturn increases pressure"
          judicial_response: "Likely to block; needs military override"
          congress_control: "Republican control enables procedural path"

      stage_2_implementation:
        phase_1: "Testing (Q2-Q3 2026): Probe military/judicial response"
        phase_2: "Escalation (Q4 2026): Gradual norm violations"
        phase_3: "Full violation (2027-2030): Active term-limit evasion"

    monitoring_plan:
      frequency: "Quarterly (Q1, Q2, Q3, Q4)"
      update_triggers:
        - "Military statement on constitutional limits"
        - "Economic data (GDP growth, unemployment, debt)"
        - "Court rulings on Trump authority"
        - "Trump statements or testing behaviors"

    policy_implications:
      baseline_risk: "38%"
      risk_reduction_possible: "From 38% to 7% through three levers"
      intervention_levers:
        - "Strengthen military independence (→ -15pp)"
        - "Support judicial independence (→ -12pp)"
        - "Congressional guardrails (→ -4pp)"

    known_limitations:
      - name: "Expert assessment (not statistical)"
        severity: "HIGH"
        fix: "Update quarterly based on real-time monitoring"

      - name: "Model assumes rational decision-making"
        severity: "MEDIUM"
        fix: "Add behavioral override module"

      - name: "Military loyalty assumption critical"
        severity: "HIGH"
        fix: "Continuous monitoring of military statements"

  # =========================================================================
  # CSF-2.0: China Succession Framework
  # =========================================================================
  - model_id: "CSF-2.0"
    short_name: "China Succession Framework"
    category: "SUCCESSION"
    status: "BETA"
    version: "1.0"
    created: "2026-01-15"
    last_updated: "2026-01-15"
    maintainer: "EBF Research Team"

    description: |
      Factionalist-consensus model of Chinese Communist Party leadership succession.
      Predicts probability that candidate becomes next General Secretary at Party Congress
      (5-year cycles: 2027, 2032, 2037, etc.)

      System Structure (4 Tiers):
      - Tier 1: Senioren-Patriarchen (3-5 ultra-elders, age 85-95)
      - Tier 2: PBSC - Standing Committee (7 persons, formal authority)
      - Tier 3: Politburo (24-25 persons, broader representation)
      - Tier 4: Provincial Governors (31 provinces, implementation)

      Five Core Dimensions:
      - Factional Alignment (C_Fraktion): 35% weight
      - Track Record (C_Legitimität): 25% weight
      - Seniority/Generational (C_Seniority): 20% weight
      - Technical Competence (C_Kompetenz): 12% weight
      - International Relations (C_Intl): 8% weight

      Key Insight: Chinese succession = FACTIONALIST CONSENSUS (not democratic election)

    documentation_url: "models/CSF-2-0-CHINESE-SUCCESSION/README.md"

