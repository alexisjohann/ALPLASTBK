# ============================================================================
# KNOWN LIMITATIONS
# ============================================================================

known_limitations:
  - name: "No crisis scenarios modeled"
    severity: "MEDIUM"
    fix: "Phase 1.1: Add binary shock scenarios (war, credit crisis)"

  - name: "Political/geopolitical risk underspecified"
    severity: "MEDIUM"
    fix: "Phase 1.1: Add geopolitical variables to context"

  - name: "Behavioral biases not modeled"
    severity: "MEDIUM"
    fix: "Phase 2.0: Add cognitive constraints (anchoring, herding)"

  - name: "No real-time calibration"
    severity: "HIGH"
    fix: "Phase 2.0: Implement streaming parameter updates"

  - name: "Assumes rational decision-making"
    severity: "MEDIUM"
    fix: "Phase 2.0: Add organizational friction and politics"

  - name: "Single-bank calibration required"
    severity: "HIGH"
    fix: "Each bank must calibrate β and γ with own historical data"

