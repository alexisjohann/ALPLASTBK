# ============================================================================
# MODEL VALIDATION
# ============================================================================

validation:
  accuracy: 0.50
  confidence: "MEDIUM"
  data_points: 3
  notes: |
    China's political system is highly opaque. Model based on:
    - Public biographical data (age, positions, prior roles)
    - Known factional alignments from media/research
    - Historical patterns from prior successions (Deng→Jiang→Hu→Xi)

    Model CANNOT predict:
    - Sudden health crises of current/predecessor leaders
    - Economic collapse triggering crisis succession
    - Military/security event requiring emergency succession
    - Internal purges disqualifying candidates

known_limitations:
  - name: "System opacity"
    severity: "CRITICAL"
    impact: "Factional alignments estimated, not confirmed"

  - name: "No pre-1978 training data"
    severity: "HIGH"
    impact: "Cannot validate against Mao/early Deng eras"

  - name: "Xi disrupted historical patterns"
    severity: "HIGH"
    impact: "2-term limit broken; future norms uncertain"

  - name: "Crisis scenarios not modeled"
    severity: "MEDIUM"
    impact: "Economic collapse, war, health crisis could change everything"

