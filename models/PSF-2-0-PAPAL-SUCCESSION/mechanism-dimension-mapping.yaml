---
# PSF 2.0: Mechanism-Dimension Mapping
# Maps the 8 Sutter Conclave Mechanisms to PSF 2.0 Dimensions
#
# Source: EBF-S-2026-02-13-POL-001 (Konklave als Choice Architecture)
# Created: 2026-02-14
# Version: 1.0

metadata:
  title: "8 Konklave-Mechanismen → 5 PSF-Dimensionen Mapping"
  session_ref: "EBF-S-2026-02-13-POL-001"
  author: "EBF Research Team"
  version: "1.0"
  created: "2026-02-14"
  description: |
    Systematic mapping of the 8 institutional design mechanisms identified
    in the Sutter interview analysis to PSF 2.0's 5 candidate dimensions.
    Each mechanism affects one or more dimensions, creating the behavioral
    infrastructure that makes certain candidate profiles more viable.

# ============================================================================
# CORE MAPPING: Which mechanisms amplify which dimensions?
# ============================================================================

mechanism_dimension_matrix:
  # -----------------------------------------------------------------------
  # MECHANISM 1: Physical Lock-in (Commitment Device)
  # -----------------------------------------------------------------------
  - mechanism:
      id: M1
      name: "Physical Lock-in"
      type: "Commitment Device"
      description: "Cardinals physically locked in (cum clave). No exit option."
      since: 1274
      trigger: "Gregory X after 3-year vacancy"

    primary_dimension:
      symbol: "Ι"
      name: "Integration Capacity"
      effect: "amplifies"
      strength: 0.85
      reasoning: |
        Without exit, factions MUST negotiate. This amplifies the value of
        candidates who can bridge divides (high Ι). A polarizer (low Ι)
        becomes a liability because there is no escape from deadlock.
      formula_effect: "Λ(Lock-in) → β_Ι effective weight increases ~15%"

    secondary_dimensions:
      - symbol: "Ν"
        name: "Ideological Neutrality"
        effect: "amplifies"
        strength: 0.50
        reasoning: "Ideological radicals prolong lock-in; neutrals enable exit"

    gamma_implications:
      - interaction: "γ_ΛΙ"
        effect: "Lock-in makes Λ×Ι synergy stronger (central + integrative = fastest exit)"
      - interaction: "γ_ΙΝ"
        effect: "Implied: Integration × Neutrality gains value under lock-in"

  # -----------------------------------------------------------------------
  # MECHANISM 2: Supermajority (2/3 Rule)
  # -----------------------------------------------------------------------
  - mechanism:
      id: M2
      name: "Supermajority"
      type: "Voting Rule"
      description: "2/3 majority required. Forces cross-factional coalition building."
      since: 1179
      trigger: "Third Lateran Council"

    primary_dimension:
      symbol: "Ι"
      name: "Integration Capacity"
      effect: "amplifies"
      strength: 0.95
      reasoning: |
        At 50%+1, one faction can win alone. At 2/3, no faction is large
        enough. The ONLY path to victory is integration across groups.
        This is the single most powerful amplifier of Ι in the system.
      formula_effect: "Supermajority is the STRUCTURAL reason β_Ι = 1.8 (not lower)"

    secondary_dimensions:
      - symbol: "Λ"
        name: "Network Centrality"
        effect: "amplifies"
        strength: 0.70
        reasoning: "Central candidates can reach into multiple factions for 2/3"
      - symbol: "Ν"
        name: "Ideological Neutrality"
        effect: "amplifies"
        strength: 0.65
        reasoning: "Radicals cannot build 2/3 coalition; neutrals can"

    gamma_implications:
      - interaction: "γ_ΛΙ"
        effect: "Central + Integrative = can build 2/3 from multiple blocs"
      - interaction: "γ_ΙΠ"
        effect: "Integration + Predecessor coalition = 2/3 more likely"

  # -----------------------------------------------------------------------
  # MECHANISM 3: Anti-Campaign Norm
  # -----------------------------------------------------------------------
  - mechanism:
      id: M3
      name: "Anti-Campaign Norm"
      type: "Selection Filter"
      description: |
        "Who enters the conclave as Pope, leaves as Cardinal."
        Open ambition disqualifies. Selects for consensus candidates.
      since: "Informal tradition, centuries old"

    primary_dimension:
      symbol: "Ν"
      name: "Ideological Neutrality"
      effect: "amplifies"
      strength: 0.90
      reasoning: |
        The anti-campaign norm inverts signaling. In democracy, ambition
        signals competence. In conclave, ambition signals unworthiness.
        This selects AGAINST polarizers (who campaign) and FOR neutrals
        (who wait to be called). Direct amplifier of Ν.
      formula_effect: "Anti-campaign is the STRUCTURAL reason Ν matters at all"

    secondary_dimensions:
      - symbol: "Α"
        name: "Authentic Legitimacy"
        effect: "amplifies"
        strength: 0.85
        reasoning: |
          Without campaigning, the only signal is 30+ years of authentic
          ministry. Α becomes the primary differentiation criterion when
          all other signaling channels are blocked.
      - symbol: "Ι"
        name: "Integration Capacity"
        effect: "amplifies"
        strength: 0.40
        reasoning: "Consensus candidates tend to be integrators"

    gamma_implications:
      - interaction: "γ_ΝΑ"
        effect: "Anti-campaign makes Ν×Α synergy critical: 'trusted moderate'"
      - interaction: "γ_ΙΑ"
        effect: "Integration + Authenticity = 'genuine bridge-builder' (not tactician)"

  # -----------------------------------------------------------------------
  # MECHANISM 4: Secret + Public Two-Phase
  # -----------------------------------------------------------------------
  - mechanism:
      id: M4
      name: "Secret + Public Two-Phase"
      type: "Information Architecture"
      description: |
        Phase 1: Secret ballot (honest preference revelation, Ψ_S = 0).
        Phase 2: Public genuflection (unity signal, Ψ_S = max).

    primary_dimension:
      symbol: "Ι"
      name: "Integration Capacity"
      effect: "amplifies"
      strength: 0.60
      reasoning: |
        Secret voting reveals TRUE preferences (no social pressure).
        This means the winner genuinely has 2/3 support, not coerced
        support. Authentic integrators (high Ι) benefit because their
        support is real, not performative.

    secondary_dimensions:
      - symbol: "Α"
        name: "Authentic Legitimacy"
        effect: "amplifies"
        strength: 0.55
        reasoning: "Secret voting rewards genuine credibility over coerced loyalty"
      - symbol: "Λ"
        name: "Network Centrality"
        effect: "moderates"
        strength: 0.30
        reasoning: "Central candidates can't leverage social pressure in secret ballot"

    gamma_implications:
      - interaction: "γ_ΙΑ"
        effect: "Secret ballot makes genuine integration + authenticity the winning combo"

  # -----------------------------------------------------------------------
  # MECHANISM 5: Sacred Space (Sistine Chapel)
  # -----------------------------------------------------------------------
  - mechanism:
      id: M5
      name: "Sacred Space"
      type: "Environmental Choice Architecture"
      description: |
        Sistine Chapel with Michelangelo's Last Judgment.
        Physical framing activates moral awareness (A_moral).
      psi_dimension: "Ψ_F"

    primary_dimension:
      symbol: "Α"
      name: "Authentic Legitimacy"
      effect: "amplifies"
      strength: 0.80
      reasoning: |
        Under the Last Judgment, strategic voting becomes psychologically
        costly. The sacred space activates A_moral (Benabou/Tirole),
        making cardinals vote for who they genuinely believe is worthy.
        This is a direct amplifier of Α — authenticity becomes the
        criterion when moral awareness is high.

    secondary_dimensions:
      - symbol: "Ν"
        name: "Ideological Neutrality"
        effect: "amplifies"
        strength: 0.45
        reasoning: "Moral framing discourages ideological tribalism"

    gamma_implications:
      - interaction: "γ_ΝΑ"
        effect: "Sacred space amplifies Neutrality × Authenticity: 'morally guided moderate'"

  # -----------------------------------------------------------------------
  # MECHANISM 6: Iterative Voting with Feedback
  # -----------------------------------------------------------------------
  - mechanism:
      id: M6
      name: "Iterative Voting with Feedback"
      type: "Information Aggregation"
      description: |
        Up to 4 ballots per day. Black/white smoke as feedback.
        Cardinals learn from each round (Bayesian updating).
      max_ballots_per_day: 4

    primary_dimension:
      symbol: "Λ"
      name: "Network Centrality"
      effect: "amplifies"
      strength: 0.75
      reasoning: |
        Iterative voting is information aggregation. Central candidates
        (high Λ) benefit because: (a) they are well-known across factions,
        (b) their vote count grows as others converge toward them,
        (c) network position = information advantage about convergence.
      formula_effect: "Iterative voting is WHY Λ has β=2.5 (highest coefficient)"

    secondary_dimensions:
      - symbol: "Π"
        name: "Predecessor Support"
        effect: "amplifies"
        strength: 0.70
        reasoning: |
          Predecessor-backed candidates start with ~40-50 votes.
          In iterative voting, this initial advantage snowballs.
          Other cardinals see the vote count growing and converge.
      - symbol: "Ι"
        name: "Integration Capacity"
        effect: "amplifies"
        strength: 0.55
        reasoning: "Integrators attract votes from eliminated candidates each round"

    gamma_implications:
      - interaction: "γ_ΛΠ"
        effect: "Central + Predecessor = snowball effect across rounds (strongest γ)"
      - interaction: "γ_ΛΙ"
        effect: "Central + Integrative = attracts undecided in later rounds"

  # -----------------------------------------------------------------------
  # MECHANISM 7: Progressive Pressure (no deadline)
  # -----------------------------------------------------------------------
  - mechanism:
      id: M7
      name: "Progressive Pressure"
      type: "Temporal Choice Architecture"
      description: |
        No formal deadline, but increasing discomfort.
        Historical: food reduction, roof opened. Modern: social pressure.
        Avoids last-minute panic; forces gradual convergence.
      psi_dimension: "Ψ_T"
      theory_ref: "MS-TP-001 (Quasi-Hyperbolic Discounting)"

    primary_dimension:
      symbol: "Π"
      name: "Predecessor Support"
      effect: "amplifies"
      strength: 0.65
      reasoning: |
        Under time pressure, cardinals converge toward the SAFE choice.
        The predecessor-backed candidate (high Π) represents continuity
        and predictability — exactly what risk-averse voters want
        when pressure mounts.

    secondary_dimensions:
      - symbol: "Ν"
        name: "Ideological Neutrality"
        effect: "amplifies"
        strength: 0.60
        reasoning: "Under pressure, neutral candidates are 'least objectionable'"
      - symbol: "Λ"
        name: "Network Centrality"
        effect: "amplifies"
        strength: 0.50
        reasoning: "Known quantities reduce uncertainty under time pressure"

    gamma_implications:
      - interaction: "γ_ΛΠ"
        effect: "Known + Backed = ultimate safe harbor under pressure"
      - interaction: "γ_ΠΝ"
        effect: "Predecessor + Neutral = 'continuity without controversy'"

  # -----------------------------------------------------------------------
  # MECHANISM 8: Identity Transformation
  # -----------------------------------------------------------------------
  - mechanism:
      id: M8
      name: "Identity Transformation"
      type: "Social Identity Architecture"
      description: |
        Factions (Italian, Latin American, Conservative, Progressive)
        dissolve into unified Church identity. New Pope chooses NEW NAME —
        the ultimate identity transformation.
      theory_ref: "MS-IB-001 (Akerlof & Kranton, Identity Economics)"
      psi_dimension: "Ψ_K"

    primary_dimension:
      symbol: "Ι"
      name: "Integration Capacity"
      effect: "amplifies"
      strength: 0.90
      reasoning: |
        Identity transformation is the GOAL of integration. The conclave
        aims to transform U_IDN_faction into U_IDN_church. Candidates
        with high Ι facilitate this transformation because they embody
        the unified identity that others can rally around.
      formula_effect: "Identity transformation is the BEHAVIORAL reason Ι has β=1.8"

    secondary_dimensions:
      - symbol: "Α"
        name: "Authentic Legitimacy"
        effect: "amplifies"
        strength: 0.70
        reasoning: |
          The new Pope's name choice (Leo, Francis, Benedict) signals
          identity. Only an authentic leader can credibly claim a new
          identity. Low-Α candidates choosing a grand name would seem
          presumptuous.
      - symbol: "Π"
        name: "Predecessor Support"
        effect: "amplifies"
        strength: 0.40
        reasoning: "Predecessor's endorsement signals 'approved for succession identity'"

    gamma_implications:
      - interaction: "γ_ΙΑ"
        effect: "Integration + Authenticity = credible identity for the Church"
      - interaction: "γ_ΙΠ"
        effect: "Integration + Predecessor = smooth identity transition"

# ============================================================================
# SUMMARY: DIMENSION AMPLIFICATION SCORES
# ============================================================================

dimension_amplification_summary:
  description: |
    Aggregate amplification of each PSF dimension across all 8 mechanisms.
    Higher score = more mechanisms structurally support this dimension.

  scores:
    - symbol: "Ι"
      name: "Integration Capacity"
      primary_mechanisms: [M1, M2, M4, M8]
      secondary_mechanisms: [M3, M6]
      total_amplification: 3.30
      primary_count: 4
      interpretation: |
        Integration Capacity is the MOST amplified dimension.
        4 of 8 mechanisms have Ι as their PRIMARY effect.
        This validates β_Ι = 1.8 as the second-highest coefficient.
        The conclave is fundamentally an INTEGRATION MACHINE.

    - symbol: "Ν"
      name: "Ideological Neutrality"
      primary_mechanisms: [M3]
      secondary_mechanisms: [M1, M2, M5, M7]
      total_amplification: 3.10
      primary_count: 1
      interpretation: |
        Neutrality is amplified by 5 of 8 mechanisms (1 primary, 4 secondary).
        The anti-campaign norm (M3) is its structural foundation.
        Despite low β_Ν = 0.8, Ν acts as a FILTER: low Ν eliminates candidates,
        but high Ν alone doesn't win. This explains the low β but high importance.

    - symbol: "Λ"
      name: "Network Centrality"
      primary_mechanisms: [M6]
      secondary_mechanisms: [M2, M4, M7]
      total_amplification: 2.25
      primary_count: 1
      interpretation: |
        Network Centrality is amplified primarily through iterative voting (M6).
        The high β_Λ = 2.5 reflects Λ's DIRECT predictive power, while
        mechanisms provide the behavioral INFRASTRUCTURE for that power.
        Λ is more a candidate PROPERTY than a mechanism-created advantage.

    - symbol: "Α"
      name: "Authentic Legitimacy"
      primary_mechanisms: [M5]
      secondary_mechanisms: [M3, M4, M8]
      total_amplification: 2.90
      primary_count: 1
      interpretation: |
        Authenticity is amplified by sacred space (M5) and supported by
        anti-campaign (M3), secret voting (M4), and identity transformation (M8).
        Despite β_Α = 0.5 (lowest), Α matters more than the coefficient suggests
        because it enables post-election LEGITIMACY (not just election probability).

    - symbol: "Π"
      name: "Predecessor Support"
      primary_mechanisms: [M7]
      secondary_mechanisms: [M6, M8]
      total_amplification: 1.75
      primary_count: 1
      interpretation: |
        Predecessor Support is least amplified by mechanisms.
        This makes sense: Π is an EXTERNAL input (Pope's choice), not an
        institutional mechanism output. The conclave mechanisms are designed
        to test whether the predecessor's choice DESERVES the office,
        not to rubber-stamp it.

# ============================================================================
# KEY INSIGHT: THE INTEGRATION MACHINE
# ============================================================================

key_insight: |
  The papal conclave is fundamentally an INTEGRATION MACHINE.

  4 of 8 mechanisms primarily amplify Integration Capacity (Ι):
  - Lock-in forces negotiation (M1)
  - Supermajority forces cross-factional alliance (M2)
  - Secret + Public ensures genuine support (M4)
  - Identity transformation unifies factions (M8)

  This means: The institutional design CREATES the conditions where
  integrative candidates win. It's not that integrators happen to win
  conclaves — the conclave is DESIGNED to select integrators.

  Implication for PSF 2.0: The γ parameters (interaction effects) should
  be strongest where Ι is involved:
  - γ_ΛΙ (Network × Integration): Lock-in + Iterative voting
  - γ_ΙΠ (Integration × Predecessor): Supermajority + Progressive pressure
  - γ_ΙΑ (Integration × Authenticity): Identity transformation + Sacred space

  This provides THEORETICAL JUSTIFICATION for the γ hierarchy:
  γ_ΛΠ > γ_ΙΠ > γ_ΛΙ > γ_ΝΑ > γ_ΙΑ > γ_ΛΑ > γ_ΠΝ > γ_ΛΝ

# ============================================================================
# GAMMA THEORETICAL JUSTIFICATION (from mechanisms)
# ============================================================================

gamma_mechanism_justification:
  - gamma: "γ_ΛΠ"
    value: 0.80
    mechanisms: [M6, M7]
    justification: |
      Iterative voting (M6) + Progressive pressure (M7):
      Central + Predecessor-backed = snowball effect under time pressure.
      STRONGEST because both mechanisms directly create vote accumulation.

  - gamma: "γ_ΙΠ"
    value: 0.50
    mechanisms: [M2, M1, M8]
    justification: |
      Supermajority (M2) + Lock-in (M1) + Identity (M8):
      Integration + Predecessor = rapid 2/3 coalition under lock-in
      with identity unification. Three mechanisms compound.

  - gamma: "γ_ΛΙ"
    value: 0.40
    mechanisms: [M2, M6, M1]
    justification: |
      Supermajority (M2) + Iterative voting (M6) + Lock-in (M1):
      Central + Integrative = can build 2/3 across rounds while locked in.
      Strong but less than γ_ΛΠ because Ι builds slowly, Π starts instantly.

  - gamma: "γ_ΝΑ"
    value: 0.30
    mechanisms: [M3, M5]
    justification: |
      Anti-campaign (M3) + Sacred space (M5):
      Neutral + Authentic = "trusted moderate under moral awareness."
      Moderate strength because these mechanisms filter (prevent bad choices)
      rather than actively select (drive convergence).

  - gamma: "γ_ΙΑ"
    value: 0.25
    mechanisms: [M8, M4, M5]
    justification: |
      Identity transformation (M8) + Secret voting (M4) + Sacred space (M5):
      Integration + Authenticity = "genuine bridge-builder with moral credibility."
      Moderate because these compound over time, not immediately.

  - gamma: "γ_ΛΑ"
    value: 0.15
    mechanisms: [M6, M5]
    justification: |
      Iterative voting (M6) + Sacred space (M5):
      Central + Authentic = "clean insider." Weak because Λ and Α can be
      in tension (insiders may be seen as tactical, not authentic).

  - gamma: "γ_ΠΝ"
    value: 0.10
    mechanisms: [M7, M3]
    justification: |
      Progressive pressure (M7) + Anti-campaign (M3):
      Predecessor + Neutral = "safe continuity." Weak because explicit
      predecessor support actually REDUCES neutrality perception.

  - gamma: "γ_ΛΝ"
    value: 0.05
    mechanisms: [M6, M3]
    justification: |
      Iterative voting (M6) + Anti-campaign (M3):
      Central + Neutral = very weak synergy because Curial insiders
      are often perceived as ideological (department affiliation).
