# ============================================================================
# USAGE INSTRUCTIONS
# ============================================================================

usage:
  quick_start: |
    1. Load model parameters (β₀, β_Λ, β_Ι, β_Π, β_Ν, β_Α)
    2. Estimate candidate dimensions (Λ, Ι, Π, Ν, Α)
    3. Calculate: Argument = β₀ + Σ β_i · X_i
    4. Compute: P(Candidate) = 1 / (1 + exp(−Argument))
    5. Normalize across all candidates for competitive conclave

  python_example: |
    ```python
    import numpy as np

    # Model parameters
    beta = {
        'intercept': -4.0,
        'lambda': 2.5,
        'iota': 1.8,
        'pi': 1.5,
        'nu': 0.8,
        'alpha': 0.5
    }

    # Candidate parameters
    candidate = {
        'lambda': 0.85,
        'iota': 0.92,
        'pi': 0.95,
        'nu': 0.80,
        'alpha': 0.93
    }

    # Calculate probability
    argument = (beta['intercept'] +
                beta['lambda'] * candidate['lambda'] +
                beta['iota'] * candidate['iota'] +
                beta['pi'] * candidate['pi'] +
                beta['nu'] * candidate['nu'] +
                beta['alpha'] * candidate['alpha'])

    probability = 1 / (1 + np.exp(-argument))
    print(f"P(Candidate wins) = {probability:.3f}")
    ```
