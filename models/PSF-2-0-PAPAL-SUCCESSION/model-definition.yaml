# ============================================================================
# KNOWN LIMITATIONS & IMPROVEMENT AREAS
# ============================================================================

limitations:
  - name: "Limited pre-1958 historical sample"
    description: "Only 5 conclaves before 1958; extended from original 7-conclave sample"
    impact: "Parameter estimates have uncertainty"
    improvement_strategy: "Extend analysis to pre-1958 conclaves (1939, 1922, etc.)"

  - name: "Network centrality is partially subjective"
    description: "Λ is estimated from known positions; not fully quantitative"
    impact: "May miss informal network influence"
    improvement_strategy: "Build quantitative network analysis from appointment records"

  - name: "Parameter estimation is post-hoc"
    description: "Values are backward-calculated from known outcomes"
    impact: "May overfit to historical data"
    improvement_strategy: "Out-of-sample prediction on 2032+ conclaves"

  - name: "Health/age shocks not modeled"
    description: "Sudden disqualifying events (scandals, health crises) during conclave"
    impact: "Cannot predict random disruptions"
    improvement_strategy: "Add crisis-response module"

  - name: "Complementarity effects not modeled"
    description: "Interactions between dimensions (γ parameters) not included"
    impact: "May miss synergistic effects"
    improvement_strategy: "ADDRESSED IN v1.2: Gamma parameters now defined in Appendix BB; ready for Phase 2.1 estimation"

improvement_roadmap:
  phase_1:
    timeline: "2026 Q1-Q2"
    tasks:
      - "Extend historical analysis pre-1958 (3-5 additional conclaves)"
      - "Build quantitative network model from Vatican appointment records"
      - "Estimate parameter confidence intervals"
    owner: "EBF Research Team"

  phase_2:
    timeline: "2026 Q3-Q4"
    tasks:
      - "Add complementarity (γ) parameters"
      - "Model conclave coalition dynamics more granularly"
      - "Develop sensitivity analysis"
    owner: "EBF Research Team"

  phase_3:
    timeline: "2027-2032"
    tasks:
      - "Out-of-sample prediction on 2032 papacy succession"
      - "Post-hoc validation and parameter updating"
      - "Extend framework to other elite-selection systems"
    owner: "EBF Research Team"

# ============================================================================
# EXTERNAL VALIDITY & GENERALIZATION
# ============================================================================

generalization:
  applicability_systems:
    - name: "Chinese Party Congress"
      similarity: "Factional politics; patronage from above; closed-door voting"
      parameter_mappings:
        Λ: "Factional position (central or peripheral)"
        Ι: "Integration capacity (can bridge factions?)"
        Π: "Patronage from Senioren-Patriarch"
        Ν: "Non-radical positioning"
        Α: "Track record authenticity"
      weight_adjustments: "Π increases to 25% (patronage more important); Α decreases to 3%"

    - name: "Corporate Board Elections"
      similarity: "Insider voting; founder succession; integration concerns"
      parameter_mappings:
        Λ: "Board/company network position"
        Ι: "Can work with existing stakeholders?"
        Π: "Founder/predecessor endorsement"
        Ν: "Not too ideological about strategy"
        Α: "Track record of authentic leadership"
      weight_adjustments: "All remain similar; Α slightly higher (35%)"

    - name: "Military Leadership Succession"
      similarity: "Seniority systems; factional alignment; precedent support"
      parameter_mappings:
        Λ: "Rank/position in chain of command"
        Ι: "Can unite different military branches?"
        Π: "Endorsement from outgoing leader"
        Ν: "Not too ideologically committed"
        Α: "Combat/leadership track record"
      weight_adjustments: "Λ increases to 45%; Α decreases to 2%"

universal_principles:
  - "In small electorates (100-500), network centrality dominates over media prominence"
  - "Predecessor support in succession contexts is nearly deterministic (>0.85 → ~90% victory)"
  - "Integration capacity predicts conclave/committee speed, not just outcome"
  - "Authenticity affects post-selection legitimacy more than selection probability"
  - "Ideology is dangerous in elite selection (radicalism reduces viability)"

# ============================================================================
# PROCEDURAL CONTEXT (from Universi Dominici Gregis 1996/2023)
# ============================================================================

procedural_context:
  legal_basis:
    primary_document: "Universi Dominici Gregis (Johannes Paul II., 1996)"
    last_update: "2023"
    secondary_documents:
      - "Codex Iuris Canonici (1983)"
      - "Annuario Pontificio"
    references:
      - "johnpaulii1996udg"
      - "vatican1983cic"
      - "annuario2025"

  electorate:
    composition: "Kardinäle unter 80 Jahren am Tag der Sedisvakanz"
    max_size: 120
    typical_size: "100-120"
    note: "Begrenzung auf 120 seit Paul VI. (1975)"

  voting_rules:
    required_majority: "Zweidrittelmehrheit der anwesenden Stimmberechtigten"
    threshold_reduction: "Nach 33-34 Wahlgängen: Reduktion auf absolute Mehrheit möglich"
    threshold_reduction_used: "Historisch nie angewandt"
    votes_per_day:
      first_day: 1
      subsequent_days: 4
      note: "Vormittag: 2 Wahlgänge, Nachmittag: 2 Wahlgänge"

  secrecy:
    oath: "Eidliche Verpflichtung aller Teilnehmer"
    violation_penalty: "Exkommunikation latae sententiae"
    isolation:
      location: "Domus Sanctae Marthae (Unterkunft) + Sixtinische Kapelle (Wahl)"
      communication_blocked: ["Telefon", "Internet", "Radio", "Presse"]
      marker: "'Extra omnes!' signalisiert Beginn der Isolation"

  key_roles:
    camerlengo:
      title: "Kardinalkämmerer der Heiligen Römischen Kirche"
      functions:
        - "Bestätigt Tod des Papstes"
        - "Zerstört päpstliche Insignien (Ring, Siegel)"
        - "Verwaltet Finanzen des Heiligen Stuhls"
        - "Dokumentiert Wahlvorgang"
      note: "Führt Konklave NICHT, hält Kurie in Gang"

    dean:
      title: "Dekan des Kardinalskollegiums"
      functions:
        - "Eröffnet Generalkongregationen"
        - "Beruft Konklave ein"
        - "Zeremonieller Vorsitz bei Wahlen"
        - "Fragt Gewählten: 'Acceptasne electionem?'"
      note: "Wenn über 80, übernimmt Subdekan"

    scrutatores:
      count: 3
      selection: "Per Los"
      function: "Zählen der Stimmen"

    revisores:
      count: 3
      function: "Überprüfung der Zählung"

    infirmarii:
      count: 3
      function: "Stimmzettel zu kranken Kardinälen tragen"

  ritual_sequence:
    phase_1_sedisvakanz:
      trigger: "Tod oder Rücktritt des Papstes"
      duration: "9 Tage (Novemdiales)"
      activities:
        - "Camerlengo bestätigt Tod"
