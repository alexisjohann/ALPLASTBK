        # ── CLIENT MAPPING (known FehrAdvice clients) ──────────────────
        client_mapping:
          - client: "Zindel United"
            suk: "S2/U2/K2"
            profile: "STRUCTURED"
            rationale: "~250 MA, moderate uncertainty (Bau/Familienbetrieb), moderate complexity"
          - client: "ALPLA"
            suk: "S4/U2/K3"
            profile: "DYNAMIC"
            rationale: "22'000 MA globally, but stable plastics market, divisional structure"
          - client: "LUKB"
            suk: "S3/U2/K2"
