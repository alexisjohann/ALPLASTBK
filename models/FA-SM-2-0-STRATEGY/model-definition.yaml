          - "Zeitpunkt der Auflösung ex-ante festgelegt"
        failure_action: "Predictions schärfen bis falsifizierbar. Kein «das Modell passt immer»."

  # ==========================================================================
  # PHILOSOPHICAL FOUNDATION
  # ==========================================================================
  foundation:
    paradigm: |
      Strategy without behavior integration is not implementable.
      Strategy oriented only at behavioral goals is purposeless.
      The ultimate goal is VALUE CREATION (Wertsteigerung).
      Behavior is the LEVER (Hebel), Context Design is the INSTRUMENT.

    strategy_definition:
      source: "steen2017formal"
      definition: |
        Strategy is "the smallest set of (core) choices to optimally guide
        the other choices" (Van den Steen, Management Science 2017).
      implication: |
        A decision is strategic iff it has sufficient interactions (γ_kl)
        with other decisions. Without interactions, there is no strategy
        (Proposition 7). More interactions → more strategic (Proposition 8).
        This formally justifies FA-SM's focus on complementarity γ.
      key_propositions:
        - "P7: A decision with no interactions is never strategic"
        - "P8: More interactions → more strategic"
        - "P1a: Persistence makes decisions more strategic"
        - "P4: Uncertainty makes strategy more valuable"
        - "P12: Choice-specific capabilities make decisions more strategic"

    causal_chain:
      direction: "bidirectional"
      top_down:
        description: "What value? → What behaviors? → What context?"
        formula: "V*(t) → B*(t) → Ψ*(t)"
        purpose: "Strategic goal-setting and requirement derivation"
      bottom_up:
        description: "Given context → what behavior emerges? → what value results?"
        formula: "Ψ(t) → B(t) → V(t)"
        purpose: "Realistic prediction and feasibility assessment"
      feedback:
        description: "Success changes context (momentum, legitimacy, resources)"
        formula: "V(t) → ΔΨ(t+1)"
        new_in_v2: true

    three_layers:
      - layer: 0
        name: "Wertschöpfungsziel (Value Creation Target)"
        symbol: "V(t)"
        question: "What value must be created over what time horizon?"
        role: "NORTH STAR — all other layers serve this"
      - layer: 1
        name: "Verhaltensübersetzung (Behavior Translation)"
        symbol: "B(t)"
        question: "Which behaviors of which actors must change to produce V(t)?"
        role: "LEVER — the mechanism through which strategy becomes real"
      - layer: 2
        name: "Kontext-Design (Context Architecture)"
        symbol: "Ψ(t)"
        question: "What context conditions must be created to produce B(t)?"
        role: "INSTRUMENT — the actionable design space"

  # ==========================================================================
  # STEP 2: SCOPE — COUPLED SYSTEM (NEW in 2.0)
  # ==========================================================================
  scope:
    type: "COUPLED_SYSTEM"
    description: |
      FA-SM-2.0 models the organization as a coupled dynamical system
      where Value, Behavior, and Context co-evolve on different timescales.
      The coupling creates emergent properties not predictable from
      individual components.

    boundaries:
      in_scope:
        - id: "S1"
          name: "Organizational value creation"
          description: "6 value dimensions (WTP, WTS, OC, IC, RC, AC)"
        - id: "S2"
          name: "Actor behavior dynamics"
          description: "4 actor groups with heterogeneous behavioral types"
        - id: "S3"
          name: "Context architecture"
          description: "14 dimensions in 4 tiers (canonical, org, market, emergent)"
        - id: "S4"
          name: "Complementarity structure"
          description: "5-type γ matrix (ΨΨ, BΨ, VV, cross-level, structural γ₅)"
        - id: "S5"
          name: "Multi-scale dynamics"
          description: "Coupled ODEs on micro/meso/macro timescales"
        - id: "S6"
          name: "Tipping points and regime transitions"
          description: "Threshold-driven state changes"
        - id: "S7"
          name: "Network topology"
          description: "Actor interaction structure (adjacency matrix)"
        - id: "S8"
          name: "Feedback loops"
          description: "V→Ψ success-context feedback"
        - id: "S9"
          name: "Sub-model integration"
          description: "SDM-1.0 (process) and SOCM-1.0 (comparison)"
        - id: "S10"
          name: "Falsifiable predictions"
          description: "12 predictions with cascading falsification"

        - id: "S11"
          name: "Functional decomposition"
          description: "12 functions in 3 clusters with w_df, B_f, γ₅, η"
          new_in_v2_1: true

      out_of_scope:
        - "Individual psychological profiling (→ use EBF INDIVIDUAL layer)"
        - "Financial modeling / DCF valuation (→ use standard finance tools)"
        - "Market entry / competitive response simulation"
        - "Supply chain optimization"
        - "Technology architecture decisions (beyond Ψ_M abstraction)"

  # ==========================================================================
  # VALUE DIMENSIONS — Layer 0 (Extended to 6 in v2.0)
  # ==========================================================================
  value_dimensions:
    formula: |
      V(t) = Σ_k w_k(Ψ) · V_k(t)    where Σ w_k = 1

    dimensions:
      - symbol: "V_WTP"
        name: "Customer Value Created (WTP)"
        description: |
          Increase in willingness-to-pay through product, service, experience.
          Oberholzer-Gee (2021): "The most fundamental driver of competitive
          advantage is creating value for customers."
        measurement: "ΔWTP (CHF), NPS, CLV, conversion rates"
        default_weight: 0.25
        weight_drivers: "Ψ_E (market competition), Ψ_T (growth phase)"
        typical_horizon: "1-5 years"
        fepsde_mapping: "F (financial returns), S (social trust)"
        depreciation_rate: "δ_WTP ∈ [0.10, 0.20] per year"
        literature: ["oberholzergee2021better", "bloom2012management"]

      - symbol: "V_WTS"
        name: "Talent & Supply Value (WTS reduction)"
        description: |
          Reduction in willingness-to-sell through better working conditions,
          purpose, culture. Lower WTS = wider value wedge.
        measurement: "Employee NPS, turnover %, supplier reliability"
        default_weight: 0.20
        weight_drivers: "Ψ_S (labor market), Ψ_K (cultural expectations)"
        typical_horizon: "2-7 years"
        fepsde_mapping: "E (employee wellbeing), S (belonging)"
        depreciation_rate: "δ_WTS ∈ [0.05, 0.15] per year"
        literature: ["oberholzergee2021better", "lazear2018personnel"]

      - symbol: "V_OC"
        name: "Organizational Capital"
        description: |
          Accumulated capability, culture, routines, tacit knowledge.
          Bloom/Sadun/Van Reenen (2012): management practices explain ~30%
          of cross-country productivity differences.
        measurement: "Management practice scores (WMS), capability index"
        default_weight: 0.20
        weight_drivers: "Ψ_T (maturity), Ψ_I (regulatory stability)"
        typical_horizon: "3-10 years"
        fepsde_mapping: "P (practical capabilities), D (deliberative routines)"
        depreciation_rate: "δ_OC ∈ [0.05, 0.15] per year"
        literature: ["bloom2012management", "sadun2017are", "gibbons2015corporate"]

      - symbol: "V_IC"
        name: "Innovation Capital"
        description: |
          Future optionality from R&D, experimentation, new business models.
          Depreciates fastest because competitive environment erodes advantage.
        measurement: "Revenue from new products %, patent citations, option value"
        default_weight: 0.15
        weight_drivers: "Ψ_E (disruption intensity), Ψ_M (tech maturity)"
        typical_horizon: "3-10 years"
        fepsde_mapping: "F (financial optionality), D (deliberative exploration)"
        depreciation_rate: "δ_IC ∈ [0.15, 0.30] per year"
        literature: ["acemoglu2018innovation", "cassiman2006search"]

      - symbol: "V_RC"
        name: "Relational Capital"
        new_in_v2: true
        description: |
          Trust, reputation, network value, stakeholder goodwill.
          Critical in org-design: how much relational capital survives
          a transformation? Granovetter (1985): economic action is
          embedded in social relations.
        measurement: "Stakeholder trust index, partner retention, reputation score"
        default_weight: 0.10
        weight_drivers: "Ψ_S (network density), Ψ_K (trust culture)"
        typical_horizon: "5-15 years"
        fepsde_mapping: "S (social capital), E (emotional bonds)"
        depreciation_rate: "δ_RC ∈ [0.03, 0.10] per year (slow but fragile — shock events)"
        literature: ["granovetter1985economic", "fehr2007economics"]
        rationale: |
          Org-design projects routinely underestimate relational capital destruction.
          Example: Zindel reorganization risks destroying cross-unit trust built
          over decades. V_RC makes this visible and measurable.

      - symbol: "V_AC"
        name: "Adaptive Capacity"
        new_in_v2: true
        description: |
          Organizational ability to respond to unexpected change.
          The «immune system» of the organization. Teece (2007):
          dynamic capabilities = sensing + seizing + transforming.
        measurement: "Response time to disruption, pivot success rate, resilience index"
        default_weight: 0.10
        weight_drivers: "Ψ_E (volatility), Ψ_M (flexibility of infrastructure)"
        typical_horizon: "ongoing"
        fepsde_mapping: "D (deliberative flexibility), P (practical adaptability)"
        depreciation_rate: "δ_AC ∈ [0.10, 0.25] per year (requires constant exercise)"
        literature: ["teece2007explicating"]
        rationale: |
          In VUCA environments, the capacity to adapt is itself a value dimension.
          Without V_AC, models assume static steady-states that never arrive.

  # ==========================================================================
  # ACTOR GROUPS — Layer 1
  # ==========================================================================
  actor_groups:
    formula: |
      B_k(t) = Σ_j λ_j(Ψ) · B_jk(t)
      B_jk(t) = adoption of behavior k by actor group j
      λ_j(Ψ)  = context-dependent value-leverage of actor group j

    groups:
      - symbol: "B_L"
        name: "Leadership"
        description: "C-suite, board, senior management"
        default_leverage: 0.35
        leverage_drivers: "Ψ_I (governance), Ψ_S (legitimacy)"
        heterogeneity:
          source: "bandiera2020ceo"
          types:
            - "Strategic-Allocator (high meetings, broad span, +3.5% revenue)"
            - "Operational-Manager (task-focused, narrow span, neutral)"
            - "Political-Navigator (relationship-focused, context-dependent)"
        typical_behaviors:
          - "Strategic decision quality"
          - "Resource allocation discipline"
          - "Culture role-modeling"

      - symbol: "B_M"
        name: "Middle Management"
        description: "Department heads, team leads, project managers"
        default_leverage: 0.30
        leverage_drivers: "Ψ_I (delegation), Ψ_C (information quality)"
        heterogeneity:
          source: "bloom2012management"
          types:
            - "Translator (strategy → operations, high cross-functional)"
            - "Optimizer (process improvement, efficiency-focused)"
            - "Bottleneck (information filter, can block or enable)"
        typical_behaviors:
          - "Strategy translation to operations"
          - "Team motivation and coaching"
          - "Cross-functional collaboration"

      - symbol: "B_O"
        name: "Operations"
        description: "Frontline employees, specialists, craftspeople"
        default_leverage: 0.20
        leverage_drivers: "Ψ_M (tools), Ψ_E (resources)"
        heterogeneity:
          source: "lazear2018personnel"
          types:
            - "Engaged-Adopter (intrinsically motivated, early mover)"
            - "Conditional-Cooperator (follows social norms, majority)"
            - "Resistant-Skeptic (requires evidence, slow but thorough)"
        typical_behaviors:
          - "Process adoption"
          - "Quality commitment"
          - "Continuous improvement"

      - symbol: "B_E"
        name: "External Stakeholders"
        description: "Customers, suppliers, partners, regulators"
        default_leverage: 0.15
        leverage_drivers: "Ψ_S (market norms), Ψ_I (contractual frameworks)"
        heterogeneity:
          source: "fehr2007economics"
          types:
            - "Value-Aligned (shared purpose, long-term)"
            - "Transactional (price-sensitive, switching-ready)"
            - "Regulatory (compliance-driven)"
        typical_behaviors:
          - "Adoption of new offerings"
          - "Partnership commitment"
          - "Beyond-compliance behavior"
        subgroups:
          note: |
            B_E is a COMPOSITE group. For detailed modeling, decompose into:
          components:
            - symbol: "B_EC"
              name: "Customers"
              description: "End users, B2B buyers, channel partners"
              leverage_share: 0.40
              key_dynamic: "Adoption, loyalty, WTP sensitivity"
              typical_heterogeneity: ["price-sensitive", "quality-driven", "brand-loyal"]
            - symbol: "B_ES"
              name: "Suppliers"
              description: "Input providers, service partners, subcontractors"
              leverage_share: 0.25
              key_dynamic: "Reliability, WTS negotiation, co-investment"
              typical_heterogeneity: ["strategic-partner", "commodity-supplier", "sole-source"]
            - symbol: "B_EP"
              name: "Partners"
              description: "JV partners, alliance members, ecosystem co-creators"
              leverage_share: 0.20
              key_dynamic: "Co-creation, knowledge sharing, joint commitment"
              typical_heterogeneity: ["value-aligned", "opportunistic", "complementary"]
            - symbol: "B_ER"
              name: "Regulators"
              description: "Government agencies, industry bodies, standard setters"
              leverage_share: 0.15
              key_dynamic: "Compliance, license-to-operate, regulatory risk"
              typical_heterogeneity: ["strict-enforcement", "principles-based", "captured"]
          aggregation: |
            For most applications, B_E = Σ_s w_s · B_Es (s ∈ {C, S, P, R}).
            Decompose only when:
              (a) External stakeholders are primary value drivers (DYNAMIC, VUCA profiles)
              (b) Specific stakeholder group dominates (e.g., regulated industries → B_ER)
              (c) Ecosystem strategy is central (platforms → B_EP)

    # ---- LEVERAGE OPERATIONALIZATION: λ_j(Ψ) ----
    # This closes the gap between "λ_j is context-dependent" (formula) and
    # "default_leverage: 0.35" (static number). Without this, the central
    # aggregation B_k(t) = Σ_j λ_j(Ψ) · B_jk(t) is not computable.
    leverage_operationalization:
      formula: |
        λ_j(Ψ) = λ_j^base(profile) × ∏_i m_ji(Ψ^org_i)

        where:
          λ_j^base(profile) = profile-dependent base leverage (from table below)
          m_ji ∈ [0.5, 2.0]  = bounded context multiplier (prevents extreme shifts)

        Normalization (when relative weights needed):
          λ̃_j = λ_j / Σ_j λ_j

      interpretation: |
        λ_j captures HOW MUCH actor group j's behavior matters for value creation.
        This is NOT about effort or motivation — it's about STRUCTURAL IMPACT.
        A CEO's decision to enter a new market (B_L) has different value-leverage
        than a frontline worker's decision to follow a new process (B_O).
        Context modulates this: in a crisis, leadership leverage spikes;
        with better tools, operations leverage increases.

      # ── Profile-dependent base leverage ──────────────────────────────────
      profile_base_leverage:
        rationale: |
          S×U×K profile shifts λ_j^base BEFORE Ψ-modulation.
          Organizational SIZE and STRUCTURE fundamentally change WHO has leverage.
          This is structural, not contextual — a 5-person startup and a 10'000-person
          bank have different leverage distributions even in identical contexts.
        profiles:
          LEAN:       {B_L: 0.45, B_M: 0.15, B_O: 0.30, B_E: 0.10}
          AGILE:      {B_L: 0.35, B_M: 0.20, B_O: 0.30, B_E: 0.15}
          STRUCTURED: {B_L: 0.30, B_M: 0.30, B_O: 0.25, B_E: 0.15}
          DYNAMIC:    {B_L: 0.30, B_M: 0.30, B_O: 0.20, B_E: 0.20}
          ENTERPRISE: {B_L: 0.25, B_M: 0.35, B_O: 0.20, B_E: 0.20}
          VUCA:       {B_L: 0.35, B_M: 0.25, B_O: 0.15, B_E: 0.25}
        design_rationale:
          LEAN: |
            Founder/CEO dominance — decisions are direct, not filtered.
            MM barely exists (often same person as B_L).
            Every individual employee has visible impact.
            External dependency low (few contracts, simple supply chain).
          AGILE: |
            Leadership sets vision + guardrails, teams self-organize.
            MM coordinates but doesn't command.
            Operations has high autonomy (cross-functional teams).
            External partners for capabilities the org doesn't own.
          STRUCTURED: |
            Balanced — each layer has meaningful leverage.
            MM is the critical TRANSLATION LAYER (Bloom 2012).
            Operations executes within defined processes.
            External stakeholders are managed, not co-creating.
          DYNAMIC: |
            Like STRUCTURED but with more external exposure.
            MM must be operationally flexible (not just efficient).
            External ecosystem is strategic (partnerships, alliances).
          ENTERPRISE: |
            MM is THE leverage point (Bloom 2012: management practices explain 30%).
            Leadership is filtered through 3-5 hierarchical layers.
            Operations is large but individually diluted.
            External regulatory and partner relationships are mission-critical.
          VUCA: |
            Leadership must navigate extreme uncertainty — leverage spikes.
            MM is compressed (fast decision cycles bypass middle layers).
            Operations diminished by environmental volatility.
            External environment (B_E) is THE dominant force — drives regime.

      # ── Context multipliers per actor group ──────────────────────────────
      context_multipliers:
        note: |
          Each multiplier is a BOUNDED MONOTONIC FUNCTION of a normalized Ψ dimension.
          Form: m = m_min + (m_max - m_min) × Ψ_norm, where Ψ_norm ∈ [0, 1].
          This ensures m ∈ [m_min, m_max] always.

        B_L:
          - context: "Ψ^org_GOV"
            symbol: "m_L_GOV"
            range: [0.7, 1.5]
            mechanism: |
              Better governance AMPLIFIES leadership impact:
              clear mandates, accountability, feedback → decisions carry further.
              Weak governance → decisions arbitrary, contradictory, not followed.
            formula: "m = 0.7 + 0.8 × Ψ^org_GOV_norm"
            source: "bandiera2020ceo, steen2018strategy"

          - context: "Ψ_T (urgency/crisis)"
            symbol: "m_L_T"
            range: [0.8, 2.0]
            mechanism: |
              In crisis, organizations CENTRALIZE — leadership leverage spikes.
              In stable times, routines carry more weight than individual decisions.
              This is the strongest context effect on any actor group.
            formula: "m = 0.8 + 1.2 × urgency_norm"
            source: "crisis leadership literature, centralization under threat"

        B_M:
          - context: "Ψ^org_INF"
            symbol: "m_M_INF"
            range: [0.6, 1.6]
            mechanism: |
              Better information quality → MM translates strategy more accurately.
              Without information, MM becomes bottleneck or guesses.
              This is the DOMINANT multiplier for middle management.
            formula: "m = 0.6 + 1.0 × Ψ^org_INF_norm"
            source: "bloom2012management — information is key management practice"

          - context: "Ψ^org_GOV (delegation)"
            symbol: "m_M_GOV"
            range: [0.5, 1.5]
            mechanism: |
              More delegation authority → MM has actual levers to pull.
              Centralized organizations reduce MM to messenger role.
            formula: "m = 0.5 + 1.0 × delegation_norm"
            source: "bloom2012management"

        B_O:
          - context: "Ψ_M (tools/technology)"
            symbol: "m_O_M"
            range: [0.6, 1.8]
            mechanism: |
              Better tools → each behavioral change produces more output.
              Digitalization is a LEVERAGE MULTIPLIER for frontline work.
              This has the widest range because technology is transformative.
            formula: "m = 0.6 + 1.2 × Ψ_M_norm"
            source: "brynjolfsson2013complementarity — IT × org complementarity"

          - context: "Ψ^org_CAP (capabilities)"
            symbol: "m_O_CAP"
            range: [0.7, 1.5]
            mechanism: |
              Trained people do more with the same behavior change.
              Capabilities are the PRODUCTIVITY of operational behavior.
              Without capabilities, behavior change produces errors, not value.
            formula: "m = 0.7 + 0.8 × Ψ^org_CAP_norm"
            source: "lazear2018personnel, heckman2007economics"

        B_E:
          - context: "Ψ_S (market norms)"
            symbol: "m_E_S"
            range: [0.5, 1.5]
            mechanism: |
              Stronger market norms → external behavior more consequential.
              In normless/fragmented markets, external actors are noise.
            formula: "m = 0.5 + 1.0 × Ψ_S_market_norm"
            source: "fehr2007economics — social preferences in contracts"

          - context: "Ψ^org_GOV (contractual governance)"
            symbol: "m_E_GOV"
            range: [0.6, 1.4]
            mechanism: |
              Stronger contractual governance → external behavior channeled.
              Weak contracts → external impact unpredictable.
            formula: "m = 0.6 + 0.8 × contract_strength_norm"

      # ── Worked Example ───────────────────────────────────────────────────
      worked_example:
        scenario: "ENTERPRISE profile, strong governance (0.8), moderate info quality (0.6)"
        calculation: |
          λ_L = 0.25 × m_L_GOV × m_L_T
              = 0.25 × (0.7 + 0.8×0.8) × (0.8 + 1.2×0.3)
              = 0.25 × 1.34 × 1.16 = 0.389

          λ_M = 0.35 × m_M_INF × m_M_GOV
              = 0.35 × (0.6 + 1.0×0.6) × (0.5 + 1.0×0.7)
              = 0.35 × 1.20 × 1.20 = 0.504

          λ_O = 0.20 × m_O_M × m_O_CAP
              = 0.20 × (0.6 + 1.2×0.5) × (0.7 + 0.8×0.6)
              = 0.20 × 1.20 × 1.18 = 0.283

          λ_E = 0.20 × m_E_S × m_E_GOV
              = 0.20 × (0.5 + 1.0×0.4) × (0.6 + 0.8×0.7)
              = 0.20 × 0.90 × 1.16 = 0.209

          Normalized: λ̃_L = 0.28, λ̃_M = 0.36, λ̃_O = 0.20, λ̃_E = 0.15

        interpretation: |
          Middle Management is THE leverage point (0.36 > Leadership 0.28).
          This matches Bloom (2012): management practices explain 30% of variation.
          Note how ENTERPRISE profile + strong governance AMPLIFIES MM leverage:
          the base (0.35) is already highest for MM, and good information quality
          further multiplies it. This is the supermodularity insight applied to actors.

    # ---- RESISTANCE OPERATIONALIZATION: R_jk ----
    # The ODE contains (1 - R_jk) but R was never defined.
    # Resistance is NOT simply "unwillingness" — it has structural sources.
    resistance_operationalization:
      formula: |
        R_jk = max(R_structural_j, R_psychological_jk, R_capability_jk)

        where:
          R_structural_j    = structural barriers for actor group j (org-level)
          R_psychological_jk = psychological resistance to specific behavior k (individual)
          R_capability_jk    = capability gap for behavior k (can't, not won't)

        Using max() because resistance is a BOTTLENECK:
        if ANY source blocks, the behavior is blocked.
        This is an EXC-5 V1 case: R=1 → adoption impossible.

      interpretation: |
        R_jk ∈ [0, 1] is the FRACTION OF ADOPTION THAT IS BLOCKED.
        R=0: no barriers, full adoption possible (speed governed by β and U).
        R=0.3: 30% of potential adoption is structurally prevented.
        R=1: impossible — the behavior CANNOT be adopted regardless of utility.

        CRITICAL: R is reducible by intervention. Reducing R is often MORE
        effective than increasing utility U, because R is multiplicative:
        (1-R) × everything_else. High R zeroes out all other efforts.

      components:
        R_structural:
          description: "Organizational barriers that prevent behavior regardless of willingness"
          drivers:
            - name: "Regulatory constraint"
              symbol: "r_reg"
              range: [0, 1]
              example: "Legal prohibition, compliance requirement, union agreement"
              actor_variation: "Highest for B_E (external regulation), moderate for B_O"
            - name: "Resource constraint"
              symbol: "r_res"
              range: [0, 0.8]
              example: "No budget, no tools, no time allocation"
              actor_variation: "Highest for B_O (frontline resources), moderate for B_M"
            - name: "Authority constraint"
              symbol: "r_auth"
              range: [0, 0.7]
              example: "No mandate, decision rights elsewhere, approval bottleneck"
              actor_variation: "Highest for B_M (sandwich position), lowest for B_L"
          formula: "R_structural = max(r_reg, r_res, r_auth)"

        R_psychological:
          description: "Individual-level resistance rooted in behavioral economics"
          drivers:
            - name: "Loss aversion"
              symbol: "r_loss"
              range: [0, 0.6]
              mechanism: "New behavior threatens existing status, identity, comfort"
              source: "kahneman1979prospect — λ ≈ 2.25 for status quo"
              actor_variation: |
                B_L: low (leaders self-select for change tolerance)
                B_M: moderate (career risk from visible failures)
                B_O: high (most to lose from process changes, least control)
                B_E: variable (depends on switching costs)
            - name: "Status quo bias"
              symbol: "r_sqb"
              range: [0, 0.5]
              mechanism: "Default persistence — existing behavior is the reference point"
              source: "samuelson1988status — default bias in choices"
              actor_variation: "Increases with tenure; highest in B_O (long-tenured)"
            - name: "Identity threat"
              symbol: "r_idt"
              range: [0, 0.7]
              mechanism: "New behavior conflicts with professional/group identity"
              source: "akerlof2000economics — identity and utility"
              actor_variation: |
                B_L: high when behavior contradicts leadership self-image
                B_M: high for 'Bottleneck' type (control = identity)
                B_O: high for craftspeople (Berufsstolz)
                B_E: low (transactional relationship, less identity binding)
          formula: "R_psychological = max(r_loss, r_sqb, r_idt)"

        R_capability:
          description: "Can't-do gap: the person lacks skills/knowledge for the new behavior"
          drivers:
            - name: "Skill gap"
              symbol: "r_skill"
              range: [0, 0.8]
              mechanism: "Missing technical or interpersonal skills for new behavior"
              actor_variation: |
                B_L: moderate (strategic skills sometimes missing in promoted ops leaders)
                B_M: high (translation requires BOTH strategic AND operational skills)
                B_O: variable (depends on behavior complexity vs. existing skill base)
            - name: "Knowledge gap"
              symbol: "r_know"
              range: [0, 0.6]
              mechanism: "Missing information about WHY or HOW to adopt behavior"
              actor_variation: "Highest in B_O (furthest from strategic information)"
          formula: "R_capability = max(r_skill, r_know)"

      profile_defaults:
        note: "Typical R ranges by actor group and S×U×K profile"
        LEAN:       {B_L: [0.05, 0.15], B_M: [0.10, 0.25], B_O: [0.10, 0.20], B_E: [0.15, 0.30]}
        STRUCTURED: {B_L: [0.10, 0.20], B_M: [0.15, 0.35], B_O: [0.20, 0.40], B_E: [0.10, 0.25]}
        ENTERPRISE: {B_L: [0.15, 0.30], B_M: [0.20, 0.45], B_O: [0.30, 0.55], B_E: [0.10, 0.20]}
        VUCA:       {B_L: [0.10, 0.25], B_M: [0.25, 0.50], B_O: [0.35, 0.60], B_E: [0.20, 0.40]}
        rationale: |
          R generally INCREASES with organizational size (more structural barriers)
          and with uncertainty (more psychological resistance to unfamiliar changes).
          Exception: B_E resistance is LOWER in ENTERPRISE (strong contracts reduce it)
          but HIGHER in VUCA (unpredictable environment increases external resistance).

      intervention_mapping: |
        Each R component maps to a different intervention type:
          R_structural  → WHEN interventions (remove barriers, change rules, reallocate resources)
          R_psychological → AWARE interventions (framing, identity bridging, loss reframing)
          R_capability  → READY interventions (training, coaching, information provision)

        Diagnostic priority: measure R FIRST, then design intervention.
        If R > 0.5: fix R before investing in utility (U) or momentum (M).
        This is the "clear the blockage before pushing harder" principle.

    # ---- ADOPTION SPEED CALIBRATION: β_jk ----
    # β_jk scales the ODE: higher β → faster logistic adoption curve.
    # Without calibration, the ODE produces arbitrary timescales.
    adoption_speed:
      formula: |
        β_jk = β_j^base × b_complexity(k) × b_reversibility(k)

        where:
          β_j^base      = actor-group-specific base adoption speed
          b_complexity   = behavior complexity modifier ∈ [0.3, 1.5]
          b_reversibility = reversibility modifier ∈ [0.5, 2.0]

      interpretation: |
        β_jk determines HOW FAST adoption moves through the logistic curve.
        High β: fast initial uptake (days-weeks to visible change).
        Low β: slow grind (months-quarters before measurable movement).

        CRITICAL: β interacts multiplicatively with (1-R). If R is high,
        even high β produces slow adoption. Fix R first.

      base_speeds:
        B_L:
          range: [0.08, 0.20]
          unit: "per month"
          rationale: |
            Leadership adopts FAST when convinced (few people, high autonomy).
            But: convincing is hard (identity threat, political cost).
            Range reflects: 0.08 = resistant board, 0.20 = founder-led startup.
          source: "bandiera2020ceo — CEO behavior change measurable in months"

        B_M:
          range: [0.05, 0.15]
          unit: "per month"
          rationale: |
            Middle management is the BOTTLENECK: must translate AND adopt.
            Speed depends on information quality (Ψ^org_INF) and delegation.
            Range reflects: 0.05 = bureaucratic enterprise, 0.15 = agile team leads.
          source: "bloom2012management — management practice changes measurable quarterly"

        B_O:
          range: [0.03, 0.12]
          unit: "per month"
          rationale: |
            Operations is the LARGEST group — diffusion takes time.
            Speed governed by training capacity, tool rollout, peer effects.
            Range reflects: 0.03 = large industrial workforce, 0.12 = small team.
          source: "lazear2018personnel, ichniowski1997effects"

        B_E:
          range: [0.02, 0.10]
          unit: "per month"
          rationale: |
            External stakeholders are OUTSIDE the control boundary.
            Speed depends on contract cycles, market dynamics, switching costs.
            Range reflects: 0.02 = regulated utility, 0.10 = competitive B2C market.

      behavior_modifiers:
        complexity:
          description: "More complex behaviors adopt slower"
          scale:
            simple: {modifier: 1.5, example: "Using a new form, attending a meeting"}
            moderate: {modifier: 1.0, example: "New reporting routine, cross-functional process"}
            complex: {modifier: 0.5, example: "New leadership style, culture shift"}
            transformative: {modifier: 0.3, example: "New business model, identity change"}

        reversibility:
          description: "Irreversible changes adopt slower (higher stakes)"
          scale:
            easily_reversible: {modifier: 2.0, example: "Pilot project, A/B test"}
            moderately_reversible: {modifier: 1.0, example: "Process change, tool switch"}
            hard_to_reverse: {modifier: 0.5, example: "Restructuring, market exit"}

      worked_example:
        scenario: "Middle management adopting new cross-functional reporting (moderate complexity, moderately reversible)"
        calculation: |
          β_Mk = β_M^base × b_complexity × b_reversibility
                = 0.10 × 1.0 × 1.0 = 0.10 per month

          With R_Mk = 0.25 (moderate authority constraint):
          Effective speed = β × (1-R) = 0.10 × 0.75 = 0.075 per month

          Time to 50% adoption (logistic midpoint):
          t_50 ≈ ln(1/B_0 - 1) / (β × (1-R) × U)
               ≈ ln(19) / (0.075 × 0.6) ≈ 2.944 / 0.045 ≈ 65 months?

          This seems too slow. But: social momentum M is not yet included.
          With M = 0.5 (moderate peer pressure + leadership push):
          Effective speed = 0.075 × (1 + 0.5) = 0.1125
          t_50 ≈ 2.944 / (0.1125 × 0.6) ≈ 44 months ≈ 3.7 years

          For ENTERPRISE orgs, this is realistic for behavioral transformation.
          Bloom (2012): management practice improvement takes 2-5 years.

    # ---- ACTOR GROUP STRUCTURE BY S×U×K PROFILE ----
    # How actor group boundaries, overlaps, and internal structure change
    # across the 6 organizational profiles.
    actor_profile_structure:
      rationale: |
        The same 4 symbols (B_L, B_M, B_O, B_E) mean structurally different
        things in a 5-person startup vs. a 10'000-person bank.
        This section specifies WHAT CHANGES — not just leverage, but
        the very nature of the groups.

      profiles:
        LEAN:
          headcount_typical: "5-50"
          structural_features:
            - "B_L and B_M often OVERLAP (founder does both)"
            - "B_O is close to B_L (flat hierarchy, direct communication)"
            - "B_E is small (few contracts, simple supply chain)"
          modeling_implication: |
            Simplify to 2 effective groups: B_LM (leadership-management) and B_O.
            B_E modeled as exogenous input, not endogenous actor.
          adjacency_structure: "fully connected (everyone knows everyone)"

        AGILE:
          headcount_typical: "20-200"
          structural_features:
            - "B_L sets vision, does NOT manage daily operations"
            - "B_M coordinates across self-organizing teams"
            - "B_O has HIGH AUTONOMY (cross-functional team members)"
            - "B_E is strategic (partnerships for missing capabilities)"
          modeling_implication: |
            All 4 groups active but BOUNDARIES ARE FLUID.
            Operations can escalate directly to leadership (skip MM).
          adjacency_structure: "cluster network (team clusters with bridges)"

        STRUCTURED:
          headcount_typical: "100-1000"
          structural_features:
            - "B_L is separated by 2-3 hierarchical layers from B_O"
            - "B_M is the critical INFORMATION CHANNEL"
            - "B_O is organized by function/department"
            - "B_E follows formal procurement/sales processes"
          modeling_implication: |
            Classic 4-group model works as designed.
            MM information fidelity is THE key variable.
          adjacency_structure: "hierarchical tree with some lateral links"

        ENTERPRISE:
          headcount_typical: "1'000-100'000+"
          structural_features:
            - "B_L is 3-5 layers from frontline (CEO → Division → BU → Dept → Team)"
            - "B_M is MULTI-LAYERED (upper-middle, lower-middle, team leads)"
            - "B_O is segmented by BU, geography, function — LOW CROSS-UNIT CONTACT"
            - "B_E is mission-critical (regulators, large customers, unions)"
          modeling_implication: |
            B_M should be decomposed into B_M_upper and B_M_lower.
            Network topology matters MORE than in smaller orgs.
            Information loss per layer ≈ 20-30% (Stinchcombe).
          adjacency_structure: "multi-layered hierarchy with silos"
          mm_decomposition:
            B_M_upper:
              description: "Division/BU heads — strategic translators"
              beta_range: [0.06, 0.12]
              R_typical: [0.15, 0.30]
            B_M_lower:
              description: "Department heads, team leads — operational translators"
              beta_range: [0.04, 0.10]
              R_typical: [0.20, 0.40]

        VUCA:
          headcount_typical: "varies (50-5'000)"
          structural_features:
            - "B_L must be ADAPTIVE (regime-switching decision-making)"
            - "B_M is compressed (fast cycles bypass middle layers)"
            - "B_O must tolerate ambiguity (instructions change frequently)"
            - "B_E is THE dominant force (environment drives, org responds)"
          modeling_implication: |
            Traditional hierarchy breaks down during regime transitions.
            Model needs REGIME-DEPENDENT actor parameters:
            Regime 0 (stable): standard hierarchy
            Regime 1 (crisis): B_L dominance, B_M compressed, B_O reactive
          adjacency_structure: "adaptive (reconfigures with regime)"

  # ==========================================================================
  # STEP 3: CONTEXT DIMENSIONS — 4-Tier Architecture (NEW in 2.0)
  # ==========================================================================
  context_dimensions:
    architecture: |
      4-Tier hierarchy: Canonical → Organizational → Market → Emergent.
      Tier 1 is immutable (EBF foundation).
      Tiers 2-3 are derived via composition functions.
      Tier 4 captures emergent properties from Tier 1-3 interactions.

    # ---- Tier 1: EBF Canonical Ψ (immutable) ----
    tier_1_canonical:
      description: "The 8 EBF canonical Ψ-dimensions. Foundation for all derived dimensions."
      dimensions:
        - {symbol: "Ψ_I", name: "Institutional", question: "Which rules, defaults, regulations?"}
        - {symbol: "Ψ_S", name: "Social", question: "Who is present? What social norms?"}
        - {symbol: "Ψ_C", name: "Cognitive", question: "Cognitive load, attention, motivation?"}
        - {symbol: "Ψ_K", name: "Cultural", question: "What values, traditions, identity?"}
        - {symbol: "Ψ_E", name: "Economic", question: "Budget, resources, market conditions?"}
        - {symbol: "Ψ_T", name: "Temporal", question: "Time pressure, lifecycle phase, horizon?"}
        - {symbol: "Ψ_M", name: "Material/Technology", question: "Tools, infrastructure, digital?"}
        - {symbol: "Ψ_F", name: "Physical/Spatial", question: "Location, physical environment?"}

    # ---- Tier 2: Organizational Context (derived, designable) ----
    tier_2_organizational:
      composition_function: "Ψ^org_i = Σ_j w_ij · Ψ_j (weighted linear combination)"
      dimensions:
        - symbol: "Ψ^org_GOV"
          name: "Governance & Decision Architecture"
          designable: true
          ebf_weights: {Ψ_I: 0.65, Ψ_S: 0.35}

        - symbol: "Ψ^org_INC"
          name: "Incentive Architecture"
          designable: true
          ebf_weights: {Ψ_I: 0.45, Ψ_E: 0.35, Ψ_S: 0.20}
          crowding_out_risk:
            parameter_ref: "PAR-COMP-002"
            gamma: -0.68
            source: "frey1997cost, gneezy2000pay"

        - symbol: "Ψ^org_INF"
          name: "Information Architecture"
          designable: true
          ebf_weights: {Ψ_M: 0.45, Ψ_C: 0.30, Ψ_I: 0.25}

        - symbol: "Ψ^org_CUL"
          name: "Cultural Architecture"
          designable: "partially (slow, 2-5 years)"
          ebf_weights: {Ψ_K: 0.60, Ψ_S: 0.40}
          source: "steen2024dynamics, gibbons2015corporate"

        - symbol: "Ψ^org_CAP"
          name: "Capability Architecture"
          designable: true
          ebf_weights: {Ψ_M: 0.40, Ψ_C: 0.35, Ψ_E: 0.25}

    # ---- Tier 3: Market Context (derived, exogenous) ----
    tier_3_market:
      dimensions:
        - symbol: "Ψ^ext_MKT"
          name: "Market Dynamics"
          designable: false
          ebf_mapping: "Ψ_E(market) + Ψ_T(cycle)"

        - symbol: "Ψ^ext_REG"
          name: "Regulatory Environment"
          designable: false
          ebf_mapping: "Ψ_I(external regulations)"

        - symbol: "Ψ^ext_MAC"
          name: "Macro Environment"
          designable: false
          ebf_mapping: "Ψ_E(macro) + Ψ_K(societal) + Ψ_T(secular trends)"

    # ---- Tier 4: Emergent Properties (NEW in 2.0) ----
    tier_4_emergent:
      new_in_v2: true
      description: |
        Emergent properties arise from interactions between Tier 1-3
        dimensions. They are NOT designable directly — they emerge
        from the system configuration. Measured, not set.

      dimensions:
        - symbol: "Ψ^em_TRUST"
          name: "Organizational Trust Level"
          emerges_from: "Ψ^org_CUL × Ψ^org_GOV × Ψ^org_INF"
          description: "Trust is not designable directly — it emerges from culture, governance transparency, and information quality."
          measurement: "Trust survey scores, psychological safety index"

        - symbol: "Ψ^em_AGILITY"
          name: "Organizational Agility"
          emerges_from: "Ψ^org_CAP × Ψ^org_INF × Ψ^org_GOV"
          description: "Speed of adaptation — emerges from capabilities, information flow, and decision speed."
          measurement: "Time-to-decision, pivot success rate"

        - symbol: "Ψ^em_ALIGNMENT"
          name: "Strategic Alignment"
          emerges_from: "Ψ^org_CUL × Ψ^org_INC × Ψ^org_INF"
          description: "Degree to which individual behavior serves collective goals."
          measurement: "Goal cascade completion, cross-unit collaboration index"

      emergence_alpha:
        description: |
          α_em measures the strength of emergence: how much the
          emergent property exceeds the sum of its components.
          α_em = 0: purely additive (no emergence)
          α_em > 0: superadditive (genuine emergence)
          α_em < 0: subadditive (interference)
        formula: "Ψ^em_i = Σ_j w_j · Ψ_j + α_em · ∏_j Ψ_j^(1/n)"
        calibration: "Measured empirically; α_em ∈ [-0.3, +0.5] typical range"

    # ---- Context Dynamics (NEW in 2.0) ----
    context_dynamics:
      new_in_v2: true
      description: |
        Context itself evolves over time. dΨ/dt captures how
        organizational and market context change endogenously
        (from behavior) and exogenously (from external shocks).
      equations:
        organizational: |
          dΨ^org_i/dt = f_design(I(t))          — intentional design interventions
                      + f_behavior(B(t))         — behavioral side-effects
                      - f_erosion(Ψ^org_i)      — natural erosion without maintenance
                      + f_feedback(V(t))         — success/failure feedback
        market: |
          dΨ^ext_j/dt = exogenous(t)            — external shocks, trends
      timescales:
        fast: "Ψ^org_INF (weeks-months: information systems change quickly)"
        medium: "Ψ^org_GOV, Ψ^org_INC, Ψ^org_CAP (months-years)"
        slow: "Ψ^org_CUL (2-5 years: culture changes slowly)"

  # ==========================================================================
  # STEP 4: COMPLEMENTARITY PARAMETERS — 5-Type γ (NEW structure in 2.0, γ₅ added 2.1)
  # ==========================================================================
  complementarity_parameters:
    theoretical_basis:
      supermodularity: |
        Topkis (1978), Milgrom/Roberts (1990): f is supermodular if
        f(x∨y) + f(x∧y) ≥ f(x) + f(y).
        Complementary practices should change TOGETHER.
      empirical_anchor: |
        Ichniowski et al. (1997, AER): HRM practice CLUSTERS → +6.7%.
        Individual practice changes → near-zero effect.
        This is the strongest empirical evidence for organizational complementarity.

    # ---- Type 1: Context × Context (γ^ΨΨ) ----
    type_1_context_context:
      symbol: "γ^ΨΨ"
      description: "How context dimensions interact with each other"
      parameters:
        - pair: "Ψ^org_INC × Ψ^org_CUL"
          symbol: "γ^ΨΨ_INC_CUL"
          value: -0.35
          evidence_tier: 1
          source: "frey1997cost, gneezy2000pay"
          interpretation: "CROWDING-OUT: monetary incentives undermine cultural motivation"
          design_rule: "Never increase INC without checking CUL impact"

        - pair: "Ψ^org_GOV × Ψ^org_INF"
          symbol: "γ^ΨΨ_GOV_INF"
          value: 0.25
          evidence_tier: 2
          source: "bloom2012management"
          interpretation: "COMPLEMENTARY: governance + information reinforce"

        - pair: "Ψ^org_INF × Ψ^org_CAP"
          symbol: "γ^ΨΨ_INF_CAP"
          value: 0.30
          evidence_tier: 1
          source: "ichniowski1997effects"
          interpretation: "STRONGEST complementarity: information + capabilities"

        - pair: "Ψ^org_CAP × Ψ^org_CUL"
          symbol: "γ^ΨΨ_CAP_CUL"
          value: 0.20
          evidence_tier: 2
          source: "gibbons2015corporate, steen2024dynamics"
          interpretation: "Capabilities embedded in culture persist longer"

    # ---- Type 2: Behavior × Context (γ^BΨ) ----
    # Extended from 4 to 16 pairs (4 actors × 6 Ψ^org dimensions = 24 possible;
    # 16 are theoretically substantive, 8 are marginal and set to 0).
    type_2_behavior_context:
      symbol: "γ^BΨ"
      description: "How actor behavior interacts with organizational context"
      coverage: "16/24 pairs specified (8 marginal pairs set to γ ≈ 0)"
      parameters:
        # ── B_L (Leadership) × Ψ^org ──────────────────────────────────────
        - pair: "B_L × Ψ^org_GOV"
          symbol: "γ^BΨ_L_GOV"
          value: 0.25
          evidence_tier: 2
          source: "bandiera2020ceo, steen2018strategy"
          interpretation: "Leadership effectiveness depends on governance — clear mandates amplify impact"

        - pair: "B_L × Ψ^org_CUL"
          symbol: "γ^BΨ_L_CUL"
          value: 0.15
          evidence_tier: 2
          source: "steen2024dynamics"
          interpretation: "Leadership shapes culture — positive but SLOW (2-5 years)"

        - pair: "B_L × Ψ^org_INC"
          symbol: "γ^BΨ_L_INC"
          value: 0.10
          evidence_tier: 3
          source: "lazear2018personnel"
          interpretation: |
            Leadership behavior is LESS incentive-driven than operations.
            Leaders respond to intrinsic motivation, reputation, legacy.
            BUT: badly designed executive incentives → perverse strategic decisions.
          warning: "Executive compensation design is critical — wrong INC can be destructive"

        - pair: "B_L × Ψ^org_INF"
          symbol: "γ^BΨ_L_INF"
          value: 0.15
          evidence_tier: 2
          source: "bloom2012management"
          interpretation: |
            Information quality improves strategic decisions.
            Leadership with poor information makes confidently wrong decisions.
            BUT: information overload can slow decision-making (diminishing returns).

        - pair: "B_L × Ψ^org_CAP"
          symbol: "γ^BΨ_L_CAP"
          value: 0.05
          evidence_tier: 3
          interpretation: |
            Marginal: leadership behavior is less capability-dependent.
            Leaders lead through others' capabilities, not their own execution.
            Exception: founder-operators in LEAN profiles (higher γ).

        # ── B_M (Middle Management) × Ψ^org ──────────────────────────────
        - pair: "B_M × Ψ^org_INF"
          symbol: "γ^BΨ_M_INF"
          value: 0.20
          evidence_tier: 2
          source: "bloom2012management"
          interpretation: "Middle management scales with information quality — THE dominant pair for MM"

        - pair: "B_M × Ψ^org_GOV"
          symbol: "γ^BΨ_M_GOV"
          value: 0.15
          evidence_tier: 2
          source: "bloom2012management"
          interpretation: |
            Delegation authority determines MM's effective action space.
            Without governance support, MM is messenger not manager.

        - pair: "B_M × Ψ^org_CAP"
          symbol: "γ^BΨ_M_CAP"
          value: 0.15
          evidence_tier: 2
          source: "bloom2012management — management practices = capabilities"
          interpretation: |
            Management capabilities amplify management behavior.
            Trained managers do the right things AND do them right.
            This is what Bloom/Van Reenen measure with WMS.

        - pair: "B_M × Ψ^org_INC"
          symbol: "γ^BΨ_M_INC"
          value: 0.10
          evidence_tier: 3
          interpretation: |
            Moderate: MM responds to incentives but less than operations.
            Key risk: short-term bonus targets → strategy translation is sacrificed
            for metric-hitting. This is the "teaching to the test" problem.

        - pair: "B_M × Ψ^org_CUL"
          symbol: "γ^BΨ_M_CUL"
          value: 0.10
          evidence_tier: 3
          source: "gibbons2015corporate"
          interpretation: |
            Culture enables or constrains middle management behavior.
            In high-trust cultures, MM can take risks and innovate.
            In low-trust cultures, MM defaults to CYA behavior.

        # ── B_O (Operations) × Ψ^org ─────────────────────────────────────
        - pair: "B_O × Ψ^org_INC"
          symbol: "γ^BΨ_O_INC"
          value: 0.15
          evidence_tier: 1
          source: "lazear2018personnel, ichniowski1997effects"
          interpretation: "Operations responds most to incentives — strongest BΨ for B_O"
          warning: "Check γ^ΨΨ_INC_CUL before increasing INC — crowding-out risk!"

        - pair: "B_O × Ψ^org_CUL"
          symbol: "γ^BΨ_O_CUL"
          value: 0.15
          evidence_tier: 2
          source: "ichniowski1997effects — HRM bundles include culture"
          interpretation: |
            Culture IS the social norm environment for operations.
            In strong cultures, peer pressure replaces supervision.
            In weak cultures, every behavior change needs external enforcement.
            This is complementary with INC — but check crowding-out!

        - pair: "B_O × Ψ^org_CAP"
          symbol: "γ^BΨ_O_CAP"
          value: 0.20
          evidence_tier: 1
          source: "ichniowski1997effects, lazear2018personnel"
          interpretation: |
            Operations-capabilities complementarity is the STRONGEST BΨ pair
            after B_M × Ψ^org_INF. Trained workers + good processes = supermodularity.
            This is what Ichniowski et al. (1997) found: HRM bundles > individual practices.

        - pair: "B_O × Ψ^org_INF"
          symbol: "γ^BΨ_O_INF"
          value: 0.10
          evidence_tier: 2
          source: "brynjolfsson2013complementarity"
          interpretation: |
            Information helps operations but less than it helps management.
            Exception: real-time data feedback (dashboards, alerts) — high γ in
            data-driven manufacturing or digital operations.

        # ── B_E (External) × Ψ^org ───────────────────────────────────────
        - pair: "B_E × Ψ^org_GOV"
          symbol: "γ^BΨ_E_GOV"
          value: 0.15
          evidence_tier: 2
          source: "fehr2007economics — contracts and social preferences"
          interpretation: |
            Contractual governance channels external behavior.
            Strong contracts → external actors behave predictably.
            Weak contracts → external behavior is noise.

        - pair: "B_E × Ψ^org_CUL"
          symbol: "γ^BΨ_E_CUL"
          value: 0.10
          evidence_tier: 3
          source: "granovetter1985economic — embeddedness"
          interpretation: |
            Organizational culture extends to trusted external partners.
            Long-term suppliers adopt client's quality norms.
            BUT: only for B_EP (partners) and B_ES (suppliers), not B_ER (regulators).

      marginal_pairs:
        note: "These 8 pairs have γ ≈ 0 and are not modeled explicitly"
        pairs:
          - {pair: "B_L × Ψ^org_PHY", reason: "Leadership is location-independent in most orgs"}
          - {pair: "B_M × Ψ^org_PHY", reason: "MM behavior barely affected by physical context"}
          - {pair: "B_O × Ψ^org_GOV", reason: "Operations follows processes, not governance directly"}
          - {pair: "B_O × Ψ^org_PHY", reason: "Captured by Ψ_M (tools) which IS physical context for ops"}
          - {pair: "B_E × Ψ^org_INF", reason: "External actors use own information, not org's"}
          - {pair: "B_E × Ψ^org_CAP", reason: "Org capabilities don't directly affect external behavior"}
          - {pair: "B_E × Ψ^org_INC", reason: "Org incentives don't reach external actors (use contracts)"}
          - {pair: "B_E × Ψ^org_PHY", reason: "External actors are outside physical boundary"}

      design_implications: |
        TOP 5 HIGHEST γ^BΨ (intervention priority):
        1. B_L × Ψ^org_GOV  = 0.25  → Fix governance first, then expect leadership impact
        2. B_M × Ψ^org_INF  = 0.20  → Information quality IS management effectiveness
        3. B_O × Ψ^org_CAP  = 0.20  → Train people + improve processes AS A BUNDLE
        4. B_L × Ψ^org_CUL  = 0.15  → Leadership culture-shaping is slow but persistent
           B_L × Ψ^org_INF  = 0.15  → Better information → better strategic decisions
           B_M × Ψ^org_GOV  = 0.15  → Delegate to enable management
           B_M × Ψ^org_CAP  = 0.15  → Management capabilities = management effectiveness
           B_O × Ψ^org_INC  = 0.15  → Incentives work for operations (but watch crowding-out)
           B_O × Ψ^org_CUL  = 0.15  → Culture as peer-pressure proxy for operations
           B_E × Ψ^org_GOV  = 0.15  → Contracts channel external behavior

        KEY INSIGHT: Context design (Ψ) is often MORE effective than
        direct behavior change (B). Fix the SYSTEM, not the PEOPLE.

    # ---- Type 3: Value × Value (γ^VV) ----
    type_3_value_value:
      symbol: "γ^VV"
      description: "How value dimensions interact"
      parameters:
        - pair: "V_OC × V_IC"
          symbol: "γ^VV_OC_IC"
          value: 0.20
          evidence_tier: 2
          source: "cassiman2006search"
          interpretation: "Organizational capital enables systematic innovation"

        - pair: "V_WTP × V_WTS"
          symbol: "γ^VV_WTP_WTS"
          value: -0.10
          evidence_tier: 3
          source: "oberholzergee2021better"
          interpretation: "Short-term resource tension between customer and talent investment"

        - pair: "V_RC × V_OC"
          symbol: "γ^VV_RC_OC"
          value: 0.15
          evidence_tier: 3
          source: "granovetter1985economic"
          interpretation: "Relational capital facilitates organizational learning"
          new_in_v2: true

        - pair: "V_AC × V_IC"
          symbol: "γ^VV_AC_IC"
          value: 0.25
          evidence_tier: 3
          source: "teece2007explicating"
          interpretation: "Adaptive capacity and innovation are mutually reinforcing"
          new_in_v2: true

    # ---- Type 4: Cross-Level (γ^cross) — NEW in 2.0 ----
    type_4_cross_level:
      symbol: "γ^cross"
      new_in_v2: true
      description: |
        Cross-level complementarities: how one layer moderates
        interactions within another layer. This captures the insight
        that the SAME behavior-context pair works differently
        depending on the value environment, and vice versa.
      parameters:
        - triplet: "V_OC moderates B_M × Ψ^org_INF"
          symbol: "γ^cross_OC_M_INF"
          value: 0.10
          evidence_tier: 3
          interpretation: |
            High organizational capital amplifies how well middle management
            utilizes information. In low-OC orgs, better information helps less
            because the routines to act on it are missing.
          calibration_needed: true

        - triplet: "V_RC moderates B_L × Ψ^org_CUL"
          symbol: "γ^cross_RC_L_CUL"
          value: 0.12
          evidence_tier: 3
          interpretation: |
            High relational capital amplifies leadership's culture-shaping effect.
            Leaders with trust (V_RC) can change culture faster.
          calibration_needed: true

  # ==========================================================================
  # FUNCTIONAL DECOMPOSITION — Innovation I11 (NEW in 2.1)
  # ==========================================================================
  # Organizational functions as Index f on existing layers (V, B, Ψ, γ).
  # NOT a new layer — functions are structured partitions of B, Ψ and γ
  # within the organization.
  #
  # CRITICAL DISTINCTION:
  #   Function ≠ Department (Abteilung).
  #   A function is a "Wertlogik" (value logic), not an org box.
  #   F_OPS manifests as "Produktion" in manufacturing, "Kreditabwicklung"
  #   in banking, "Patientenversorgung" in healthcare — same Wertlogik,
  #   different Abteilung.
  #
  # ARCHITECTURE:
  #   V(t) = Σ_d w_d · (Σ_f w_df · v_df(B_f, Ψ_f, S_f))
  #        + Σ_{f≠f'} γ₅(f,f') · v_f · v_f'
  #
  #   where:
  #     d ∈ {WTP, WTS, OC, IC, RC, AC}     — value dimensions
  #     f ∈ F_active                         — active functions
  #     w_df                                 — value contribution weight
  #     B_f                                  — behavioral clusters per function
  #     γ₅(f,f')                             — cross-function complementarity
  #
  # THEORETICAL FOUNDATIONS:
  #   - Milgrom & Roberts (1990, 1995): Supermodularity across practices
  #   - Ichniowski et al. (1997): HRM clusters not individual practices
  #   - Brynjolfsson & Milgrom (2013): IT complementarity with org design
  #   - Bloom/Sadun/Van Reenen (2012): Management practices as system
  #   - Porter (1996): Activity system mapping (fit across functions)
  # =========================================================================
  functional_decomposition:
    innovation_id: "I11"
    new_in_v2_1: true

    # ── FUNCTION TAXONOMY ─────────────────────────────────────────────────
    # 12 functions in 3 clusters. Every organization has all 12 Wertlogiken,
    # but not all may be active (depends on S×U×K profile).
    function_clusters:
      wertschoepfung:
        name: "Value Creation (Wertschöpfung)"
        description: "Functions that directly create value for customers and markets"
        functions:
          - symbol: "F_OPS"
            name: "Operations"
            wertlogik: "Wert durch Ausführung — Herstellung, Lieferung, Dienstleistung"
            manifestations:
              manufacturing: "Produktion, Fertigung"
              banking: "Kreditabwicklung, Zahlungsverkehr"
              construction: "Bauausführung, Projektabwicklung"
              healthcare: "Patientenversorgung"

          - symbol: "F_MKT"
            name: "Marketing"
            wertlogik: "Wert durch Wahrnehmung — Positionierung, Marke, Nachfrage"
            manifestations:
              b2c: "Brand Marketing, Kampagnen"
              b2b: "Thought Leadership, Case Studies"
              platform: "Growth Marketing, Community"

          - symbol: "F_SAL"
            name: "Sales"
            wertlogik: "Wert durch Konversion — Lead zu Kunde, Angebot zu Auftrag"
            manifestations:
              enterprise: "Key Account Management"
              retail: "Filialvertrieb, Beratung"
              digital: "Self-Service, E-Commerce"

          - symbol: "F_SVC"
            name: "Service/Support"
            wertlogik: "Wert durch Erhaltung — After-Sales, Kundenbindung, Loyalität"
            manifestations:
              technical: "Wartung, Support"
              relationship: "Customer Success"
              operations: "Claims, Reklamationen"

      befaehigung:
        name: "Enablement (Befähigung)"
        description: "Functions that create the conditions for value creation"
        functions:
          - symbol: "F_HR"
            name: "Human Resources"
            wertlogik: "Wert durch Menschen — Talent, Entwicklung, Kultur"
            manifestations:
              traditional: "Personalwesen, Administration"
              strategic: "People & Culture, Talent Management"
              lean: "Payroll + ein Generalist"

          - symbol: "F_FIN"
            name: "Finance & Controlling"
            wertlogik: "Wert durch Steuerung — Transparenz, Allokation, Risiko"
            manifestations:
              corporate: "CFO-Office, Treasury"
              operational: "Controlling, Budgetierung"
              lean: "Buchhaltung + Treuhänder"

          - symbol: "F_IT"
            name: "IT & Digital"
            wertlogik: "Wert durch Infrastruktur — Systeme, Daten, Automatisierung"
            manifestations:
              enterprise: "CIO-Office, ERP, Data Platform"
              digital_native: "Engineering, DevOps, Product"
              lean: "Cloud + 1 Admin"

          - symbol: "F_RND"
            name: "R&D / Innovation"
            wertlogik: "Wert durch Neues — Forschung, Entwicklung, Optionalität"
            manifestations:
              corporate: "Forschungsabteilung, Labs"
              product: "Produktentwicklung, Design"
              process: "Prozessinnovation, Lean"

          - symbol: "F_LEG"
            name: "Legal & Compliance"
            wertlogik: "Wert durch Schutz — Risikominimierung, Regelkonformität"
            manifestations:
              corporate: "Rechtsabteilung, Compliance"
              regulated: "Regulatory Affairs, Audit"
              lean: "Externe Kanzlei + 1 Intern"

      integration:
        name: "Integration (Steuerung)"
        description: |
          Meta-functions that steer cross-function complementarity γ₅.
          They do NOT create direct value — they produce η (integration
          effectiveness), which multiplies γ₅.
        functions:
          - symbol: "F_STR"
            name: "Strategy"
            wertlogik: "Wert durch Richtung — Kohärenz, Priorisierung, Allokation"
            eta_contribution: "Highest — defines which γ₅ to activate"
            manifestations:
              corporate: "Strategieabteilung, Corp. Development"
              embedded: "CEO + Leitungsteam (kein eigenes Team)"

          - symbol: "F_PMO"
            name: "PMO / Transformation"
            wertlogik: "Wert durch Umsetzung — Koordination, Tracking, Skalierung"
            eta_contribution: "Medium — ensures γ₅ activation is executed"
            manifestations:
              permanent: "Project Management Office"
              temporary: "Transformation Office (befristet)"
              lean: "Projektleiter als Rolle, kein Team"

          - symbol: "F_COM"
            name: "Communications"
            wertlogik: "Wert durch Narrative — Alignment, Kultur, Reputation"
            eta_contribution: "Supportive — amplifies γ₅ through shared understanding"
            manifestations:
              corporate: "Unternehmenskommunikation"
              internal: "Internal Comms, Change Comms"
              lean: "CEO + HR machen Komm. mit"

    # ── FUNCTION ACTIVATION LOGIC ─────────────────────────────────────────
    # Not all 12 functions are active in every organization.
    # Activation depends on w_df contribution AND S×U×K profile.
    activation_logic:
      formula: |
        f ∈ F_active ⟺ (Σ_d w_df > θ_sum) OR (max_d w_df > θ_max)
      rationale: |
        Hybrid logic: Recognizes both broad functions (high Σ, moderate per-d)
        and specialist functions (low Σ but one dominant d).
        Example: F_LEG has low Σ but max(w_df) is high for V_RC and V_AC
        in regulated industries → correctly activated.
      thresholds:
        theta_sum:
          base: 0.15
          calibration: "From S×U×K — higher profiles activate more functions"
        theta_max:
          base: 0.20
          calibration: "Specialist threshold — one dominant dimension suffices"
      suk_profile_mapping:
        LEAN: {expected_active: "4-6", always_active: ["F_OPS", "F_SAL", "F_FIN"]}
        AGILE: {expected_active: "6-8", always_active: ["F_OPS", "F_MKT", "F_IT", "F_RND"]}
        STRUCTURED: {expected_active: "8-10", always_active: ["F_OPS", "F_HR", "F_FIN", "F_STR"]}
        DYNAMIC: {expected_active: "10-12", always_active: ["F_OPS", "F_HR", "F_FIN", "F_IT", "F_STR"]}
        ENTERPRISE: {expected_active: 12, always_active: "all"}
        VUCA: {expected_active: 12, always_active: "all"}

    # ── FUNCTION-SPECIFIC CONTEXT Ψ_f (NEW in 2.1) ────────────────────────
    # Each function operates in a SPECIFIC context that is a subset/filter
    # of the organizational context Ψ^org. The value equation v_df(B_f, Ψ_f, S_f)
    # requires defining what Ψ_f and S_f mean.
    function_context:
      psi_f:
        definition: |
          Ψ_f is the FUNCTION-RELEVANT SUBSET of organizational context Ψ^org.
          Not all 14 context dimensions affect all functions equally.
          Ψ_f = {Ψ^org_i · r_fi} where r_fi ∈ [0,1] is the relevance weight.
        formula: "Ψ_f = Σ_i r_fi · Ψ^org_i"
        examples:
          F_HR:
            high_relevance: "Ψ^org_CUL (r=0.95), Ψ^org_INC (r=0.90), Ψ^org_CAP (r=0.85)"
            low_relevance: "Ψ^org_MKT (r=0.10), Ψ^org_REG_ext (r=0.15)"
            interpretation: "HR is strongly shaped by internal culture and incentives, weakly by external market"
          F_OPS:
            high_relevance: "Ψ^org_CAP (r=0.90), Ψ^org_INF (r=0.85), Ψ^org_GOV (r=0.80)"
            low_relevance: "Ψ^org_CUL (r=0.30)"
            interpretation: "Operations depends on capabilities and information systems, less on culture (short-term)"
          F_STR:
            high_relevance: "All dimensions r ≥ 0.50"
            interpretation: "Strategy must scan the ENTIRE context — no blind spots allowed"
        calibration: |
          Level 1: r_fi priors from function definition (above — Wertlogik implies relevant Ψ)
          Level 2: Sector-adjusted (banking F_FIN has higher r for Ψ^org_REG)
          Level 3: Firm-specific (measured via function-level surveys)
        design_implication: |
          When redesigning Ψ^org (e.g., improving information systems):
          The IMPACT on each function differs because r_fi differs.
          Ψ^org_INF improvement → big impact on F_OPS (r=0.85) but small on F_HR (r=0.30).
          This creates PRIORITIZATION: invest in Ψ dimensions where Σ_f r_fi · w_df is highest.

      s_f:
        definition: |
          S_f captures the STRUCTURAL POSITION of a function within the organization.
          It is NOT context (Ψ) but rather the organizational architecture that
          determines HOW the function operates.
        components:
          - name: "Centralization"
            symbol: "S_f^cen"
            description: "How centralized is the function? (0=fully decentral, 1=fully central)"
            examples:
              F_FIN: "Typically high (0.8-1.0) — central treasury, central controlling"
              F_OPS: "Varies widely (0.3 in decentralized, 0.9 in centralized manufacturing)"
              F_HR: "Depends on model (0.3 shared-service vs 0.9 centralized)"

          - name: "Formalization"
            symbol: "S_f^form"
            description: "How formalized are processes? (0=informal, 1=fully specified)"
            examples:
              F_FIN: "High (0.8-0.9) — regulatory requirements"
              F_MKT: "Low-medium (0.3-0.6) — creative work"
              F_OPS: "High in manufacturing (0.9), lower in services (0.5)"

          - name: "Integration Density"
            symbol: "S_f^int"
            description: "How many cross-function interfaces does f have? (0=isolated, 1=hub)"
            examples:
              F_STR: "Very high (0.9) — connects to everything"
              F_LEG: "Low (0.2-0.4) — specialized, fewer interfaces"
              F_IT: "High (0.7-0.8) — infrastructure for all functions"

        formula: "S_f = [S_f^cen, S_f^form, S_f^int]  — 3D structural vector per function"
        impact_on_value: |
          S_f modulates HOW effectively B_f translates into v_df:
          v_df = g(B_f, Ψ_f) · h(S_f)
          where h(S_f) captures structural efficiency:
          - High centralization (S^cen) → faster implementation but less local adaptation
          - High formalization (S^form) → more consistent but less flexible
          - High integration density (S^int) → more synergy potential (higher effective γ₅)
        calibration: "Primarily from project data (interviews, org charts, process maps)"

    # ── VALUE CONTRIBUTION MATRIX w_df ────────────────────────────────────
    # How much does function f contribute to value dimension d?
    # w_df(Firma) = w_df^base + δ_sector + δ_firm
    #
    # Three-level calibration:
    #   Level 1: w_df^base (below) — universal, literature-informed
    #   Level 2: δ_sector — sector-specific adjustments (from CVA)
    #   Level 3: δ_firm — firm-specific adjustments (from project data)
    #
    # Interpretation: w_df is a "structural power topology" — it shows
    # which functions have the most leverage on which value dimensions.
    # This is NOT about budget or headcount. A function with w_df = 0.05
    # can be critical if max_d w_df > θ_max (specialist activation).
    value_contribution_matrix:
      calibration:
        approach: "PCT-based three-level"
        formula: "w_df(Firma) = w_df^base + δ_sector(Ψ^org) + δ_firm"
        level_1_source: "Literature meta-analysis + LLMMC prior"
        level_2_source: "Sector CVA data (customers/*.yaml)"
        level_3_source: "Firm-specific project calibration"
        normalization: "Σ_f w_df = 1.0 for each d (columns sum to 1)"

      # Base matrix (Level 1) — rows = functions, columns = value dimensions
      # Validated and corrected 2026-02-25 (v2 with 4 corrections applied)
      w_df_base:
        #                    V_WTP  V_WTS  V_OC   V_IC   V_RC   V_AC
        F_OPS:              [0.30,  0.10,  0.20,  0.05,  0.10,  0.05]
        F_MKT:              [0.25,  0.00,  0.05,  0.10,  0.15,  0.05]
        F_SAL:              [0.15,  0.00,  0.05,  0.05,  0.20,  0.00]
        F_SVC:              [0.15,  0.05,  0.05,  0.00,  0.25,  0.05]
        F_HR:               [0.00,  0.35,  0.25,  0.10,  0.05,  0.10]
        F_FIN:              [0.05,  0.15,  0.15,  0.05,  0.05,  0.15]
        F_IT:               [0.05,  0.10,  0.10,  0.30,  0.00,  0.20]
        F_RND:              [0.05,  0.00,  0.05,  0.30,  0.00,  0.15]
        F_LEG:              [0.00,  0.05,  0.05,  0.00,  0.10,  0.10]
        F_STR:              [0.00,  0.10,  0.00,  0.05,  0.05,  0.10]
        F_PMO:              [0.00,  0.05,  0.05,  0.00,  0.00,  0.05]
        F_COM:              [0.00,  0.05,  0.00,  0.00,  0.05,  0.00]
        # Column sums:      [1.00,  1.00,  1.00,  1.00,  1.00,  1.00]

      corrections_applied:
        - id: "C1-WTS-breadth"
          description: |
            V_WTS was originally HR-monopoly (0.40). Broadened to include
            F_FIN (0.15), F_IT (0.10), F_STR (0.10), F_COM (0.05).
            WTS is about ALL working conditions, not just HR programs.
          source: "User feedback 2026-02-25"

        - id: "C2-HR-to-IC"
          description: |
            Added F_HR contribution to V_IC (0.10). Innovation without
            talent is impossible — HR enables innovation through hiring,
            development, and creating the right cultural conditions.
          source: "User feedback 2026-02-25"

        - id: "C3-hybrid-activation"
          description: |
            Changed activation from pure Σ_d to hybrid (Σ > θ_sum OR max > θ_max).
            Pure summation discriminated against specialist functions like F_LEG
            that contribute heavily to one dimension but have low total.
          source: "User feedback 2026-02-25"

        - id: "C4-sector-delta"
          description: |
            Added δ_sector component to calibration formula.
            Base matrix alone fails for sector-specific reality — e.g.,
            in construction F_LEG is much more important than in software.
          source: "User feedback 2026-02-25"

      sector_delta_examples:
        construction:
          description: "Bau/Infrastruktur (Zindel, PORR)"
          deltas:
            F_OPS: {V_WTP: +0.05, V_AC: +0.05}
            F_LEG: {V_RC: +0.10, V_AC: +0.05}
            F_RND: {V_IC: -0.10}
          rationale: "Operations-heavy, high regulation, low R&D intensity"

        banking:
          description: "Finanzdienstleistungen (LUKB, UBS)"
          deltas:
            F_FIN: {V_OC: +0.10, V_AC: +0.05}
            F_IT: {V_WTP: +0.10, V_IC: +0.10}
            F_LEG: {V_RC: +0.15, V_AC: +0.10}
          rationale: "IT-driven WTP, heavy regulation, finance IS the product"

        tech:
          description: "Technologie/Digital (Neon, Startups)"
          deltas:
            F_RND: {V_IC: +0.15, V_WTP: +0.10}
            F_IT: {V_WTP: +0.15, V_IC: +0.05}
            F_MKT: {V_WTP: +0.05}
            F_OPS: {V_WTP: -0.15}
          rationale: "Product IS technology, R&D and IT are the core"

    # ── ACTOR × FUNCTION RELEVANCE MATRIX α_jf ──────────────────────────
    # Which actor groups are relevant for which functions — and in what role?
    # This operationalizes Step 2: "B*(t) by actor group AND function (B_jk × B_f)"
    #
    # Without this matrix, the cross-product B_jk × B_f is undefined.
    # Not every actor is equally relevant for every function.
    #
    # α_jf ∈ [0, 1]: relevance weight of actor group j for function f.
    # Role: PRIMARY (executes), ENABLING (supports), GOVERNING (decides), EXTERNAL (receives/provides)
    actor_function_matrix:
      formula: |
        B_fk(t) = Σ_j α_jf · B_jk(t)

        where α_jf is the relevance weight of actor group j for function f.
        This replaces the implicit assumption that all actors matter equally
        for all functions.

      interpretation: |
        α_jf captures the STRUCTURAL ROLE of each actor group in each function.
        A high α means this actor's behavior substantially determines the
        function's output. A low α means the actor is marginal to that function.

        Example: For F_OPS (Operations), B_O has the highest α (0.60) because
        frontline workers EXECUTE operations. B_M has moderate α (0.25) because
        managers SET the processes. B_L has low α (0.10) because leadership
        decides WHICH operations to have, not HOW to operate daily.

      # Rows = actor groups, Columns = functions
      # Values: PRIMARY ≥ 0.40, ENABLING 0.15-0.39, GOVERNING 0.05-0.14, MARGINAL < 0.05
      alpha_jf:
        #                 F_OPS  F_MKT  F_SAL  F_SVC  F_HR   F_FIN  F_IT   F_RND  F_LEG  F_STR  F_PMO  F_COM
        B_L:             [0.10,  0.15,  0.10,  0.05,  0.20,  0.15,  0.10,  0.15,  0.10,  0.60,  0.20,  0.30]
        B_M:             [0.25,  0.30,  0.30,  0.25,  0.40,  0.35,  0.30,  0.25,  0.30,  0.30,  0.50,  0.30]
        B_O:             [0.60,  0.40,  0.50,  0.60,  0.30,  0.40,  0.50,  0.55,  0.45,  0.05,  0.20,  0.25]
        B_E:             [0.05,  0.15,  0.10,  0.10,  0.10,  0.10,  0.10,  0.05,  0.15,  0.05,  0.10,  0.15]
        # Col sums:      [1.00,  1.00,  1.00,  1.00,  1.00,  1.00,  1.00,  1.00,  1.00,  1.00,  1.00,  1.00]

      role_assignments:
        note: |
          Each cell in α_jf implies a ROLE. The role determines which ODE
          parameters (β, R, M) apply from which actor group.

        F_OPS:
          B_L: {alpha: 0.10, role: "GOVERNING", detail: "Sets operational strategy, capital allocation"}
          B_M: {alpha: 0.25, role: "ENABLING", detail: "Process design, scheduling, quality management"}
          B_O: {alpha: 0.60, role: "PRIMARY", detail: "Executes production, service delivery, maintenance"}
          B_E: {alpha: 0.05, role: "EXTERNAL", detail: "Supplier input quality, regulatory compliance"}

        F_MKT:
          B_L: {alpha: 0.15, role: "GOVERNING", detail: "Brand positioning, market strategy decisions"}
          B_M: {alpha: 0.30, role: "ENABLING", detail: "Campaign management, budget allocation, team coordination"}
          B_O: {alpha: 0.40, role: "PRIMARY", detail: "Content creation, market research, analytics execution"}
          B_E: {alpha: 0.15, role: "EXTERNAL", detail: "Customer feedback, agency partnerships, media"}

        F_SAL:
          B_L: {alpha: 0.10, role: "GOVERNING", detail: "Pricing strategy, key account ownership"}
          B_M: {alpha: 0.30, role: "ENABLING", detail: "Pipeline management, coaching, target setting"}
          B_O: {alpha: 0.50, role: "PRIMARY", detail: "Customer contact, closing, relationship building"}
          B_E: {alpha: 0.10, role: "EXTERNAL", detail: "Customer buying behavior, competitor actions"}

        F_SVC:
          B_L: {alpha: 0.05, role: "GOVERNING", detail: "Service level commitments, escalation policy"}
          B_M: {alpha: 0.25, role: "ENABLING", detail: "Resource planning, quality monitoring, training"}
          B_O: {alpha: 0.60, role: "PRIMARY", detail: "Direct service delivery, problem resolution"}
          B_E: {alpha: 0.10, role: "EXTERNAL", detail: "Customer satisfaction signals, complaint behavior"}

        F_HR:
          B_L: {alpha: 0.20, role: "GOVERNING", detail: "Talent strategy, culture modeling, compensation philosophy"}
          B_M: {alpha: 0.40, role: "PRIMARY", detail: "Hiring, development, performance management, coaching"}
          B_O: {alpha: 0.30, role: "ENABLING", detail: "Peer mentoring, onboarding buddies, culture carriers"}
          B_E: {alpha: 0.10, role: "EXTERNAL", detail: "Labor market dynamics, employer brand perception"}

        F_FIN:
          B_L: {alpha: 0.15, role: "GOVERNING", detail: "Investment decisions, risk appetite, capital structure"}
          B_M: {alpha: 0.35, role: "PRIMARY", detail: "Budgeting, controlling, reporting, compliance"}
          B_O: {alpha: 0.40, role: "ENABLING", detail: "Data input quality, cost discipline, invoice processing"}
          B_E: {alpha: 0.10, role: "EXTERNAL", detail: "Auditors, tax authorities, investors"}

        F_IT:
          B_L: {alpha: 0.10, role: "GOVERNING", detail: "Digital strategy, technology investment decisions"}
          B_M: {alpha: 0.30, role: "ENABLING", detail: "Project management, vendor management, architecture decisions"}
          B_O: {alpha: 0.50, role: "PRIMARY", detail: "Development, operations, support, implementation"}
          B_E: {alpha: 0.10, role: "EXTERNAL", detail: "Technology vendors, cloud providers, cybersecurity"}

        F_RND:
          B_L: {alpha: 0.15, role: "GOVERNING", detail: "Innovation strategy, portfolio priorities, IP strategy"}
          B_M: {alpha: 0.25, role: "ENABLING", detail: "Project selection, resource allocation, stage-gates"}
          B_O: {alpha: 0.55, role: "PRIMARY", detail: "Research, prototyping, testing, publication"}
          B_E: {alpha: 0.05, role: "EXTERNAL", detail: "Academic partners, patent landscape, regulatory path"}

        F_LEG:
          B_L: {alpha: 0.10, role: "GOVERNING", detail: "Compliance philosophy, risk tolerance, board oversight"}
          B_M: {alpha: 0.30, role: "ENABLING", detail: "Policy implementation, contract negotiation, training"}
          B_O: {alpha: 0.45, role: "PRIMARY", detail: "Compliance execution, documentation, reporting"}
          B_E: {alpha: 0.15, role: "EXTERNAL", detail: "Regulators, courts, industry associations, auditors"}

        F_STR:
          B_L: {alpha: 0.60, role: "PRIMARY", detail: "Strategic direction, M&A, market positioning, vision"}
          B_M: {alpha: 0.30, role: "ENABLING", detail: "Strategy translation, business planning, initiative management"}
          B_O: {alpha: 0.05, role: "MARGINAL", detail: "Frontline intelligence (bottom-up signals)"}
          B_E: {alpha: 0.05, role: "EXTERNAL", detail: "Board advisors, strategy consultants, investors"}

        F_PMO:
          B_L: {alpha: 0.20, role: "GOVERNING", detail: "Portfolio priorities, resource arbitration"}
          B_M: {alpha: 0.50, role: "PRIMARY", detail: "Project planning, tracking, cross-functional coordination"}
          B_O: {alpha: 0.20, role: "ENABLING", detail: "Task execution, status reporting, risk flagging"}
          B_E: {alpha: 0.10, role: "EXTERNAL", detail: "External project partners, consultants"}

        F_COM:
          B_L: {alpha: 0.30, role: "PRIMARY", detail: "Narrative setting, executive communication, stakeholder management"}
          B_M: {alpha: 0.30, role: "ENABLING", detail: "Internal cascading, change communication, team updates"}
          B_O: {alpha: 0.25, role: "ENABLING", detail: "Informal communication, grapevine, peer-to-peer"}
          B_E: {alpha: 0.15, role: "EXTERNAL", detail: "Media, analysts, public perception, social media"}

      profile_adjustments:
        note: |
          α_jf shifts with S×U×K profile, analogous to λ profile_base_leverage.
          Key patterns:
        LEAN: |
          B_L α increases for ALL functions (founder does everything).
          B_M α decreases (barely exists).
          Example: F_HR in LEAN: B_L=0.40, B_M=0.10, B_O=0.40, B_E=0.10
          (founder hires directly, no HR department).
        ENTERPRISE: |
          B_M α increases for execution functions (F_OPS, F_HR, F_FIN).
          B_L α decreases for execution, increases for F_STR.
          Example: F_OPS in ENTERPRISE: B_L=0.05, B_M=0.35, B_O=0.55, B_E=0.05
          (leadership is 5 layers away from shop floor).
        VUCA: |
          B_E α increases for market-facing functions (F_MKT, F_SAL, F_SVC).
          B_L α increases for F_STR (crisis navigation).
          Example: F_MKT in VUCA: B_L=0.20, B_M=0.20, B_O=0.30, B_E=0.30
          (market volatility = external actors dominate).

    # ── BEHAVIORAL CLUSTERS B_f ───────────────────────────────────────────
    # 3-5 behavioral clusters per function. Each cluster groups behaviors
    # that are complementary WITHIN the function (intra-function γ).
    # Total: 42 clusters across 12 functions.
    #
    # Structure per cluster:
    #   - id: unique identifier
    #   - name: descriptive name
    #   - behaviors: list of concrete behaviors
    #   - wirkungskette: causal chain B → V (how this creates value)
    #   - gamma_intra: within-function complementarity (if literature exists)
    behavioral_clusters:
      F_OPS:
        clusters:
          - id: "B_OPS_1"
            name: "Process Discipline"
            behaviors: ["SOP adherence", "quality control", "waste reduction"]
            wirkungskette: "Consistent execution → lower defects → V_WTP↑ + V_OC↑"

          - id: "B_OPS_2"
            name: "Continuous Improvement"
            behaviors: ["Kaizen", "employee suggestions", "A3 problem-solving"]
            wirkungskette: "Bottom-up innovation → efficiency gains → V_OC↑ + V_AC↑"
            gamma_intra:
              with: "B_OPS_1"
              value: 0.12
              source: "ichniowski1997effects (HRM bundles)"

          - id: "B_OPS_3"
            name: "Safety & Reliability"
            behaviors: ["safety protocols", "maintenance discipline", "incident reporting"]
            wirkungskette: "Zero harm → trust → V_WTS↑ + V_RC↑"

      F_MKT:
        clusters:
          - id: "B_MKT_1"
            name: "Customer Intelligence"
            behaviors: ["market research", "customer segmentation", "need identification"]
            wirkungskette: "Deep understanding → relevant offerings → V_WTP↑"

          - id: "B_MKT_2"
            name: "Brand Building"
            behaviors: ["positioning", "consistent messaging", "reputation management"]
            wirkungskette: "Brand equity → premium pricing + trust → V_WTP↑ + V_RC↑"

          - id: "B_MKT_3"
            name: "Demand Generation"
            behaviors: ["campaign execution", "lead generation", "funnel management"]
            wirkungskette: "Qualified pipeline → sales conversion → V_WTP↑"

          - id: "B_MKT_4"
            name: "Digital Engagement"
            behaviors: ["content marketing", "community building", "platform presence"]
            wirkungskette: "Digital reach → scalable acquisition → V_WTP↑ + V_IC↑"
            gamma_intra:
              with: "B_MKT_1"
              value: 0.18
              source: "herhausen2019firestorms (tie_strength effect)"

      F_SAL:
        clusters:
          - id: "B_SAL_1"
            name: "Relationship Selling"
            behaviors: ["trust building", "consultative approach", "long-term partnership"]
            wirkungskette: "Deep relationships → retention + cross-sell → V_RC↑ + V_WTP↑"

          - id: "B_SAL_2"
            name: "Pipeline Discipline"
            behaviors: ["CRM usage", "forecast accuracy", "stage management"]
            wirkungskette: "Predictable revenue → planning quality → V_OC↑"

          - id: "B_SAL_3"
            name: "Solution Design"
            behaviors: ["need analysis", "proposal quality", "customization"]
            wirkungskette: "Tailored solutions → higher WTP → V_WTP↑"

      F_SVC:
        clusters:
          - id: "B_SVC_1"
            name: "Service Excellence"
            behaviors: ["response time", "first-contact resolution", "empathy"]
            wirkungskette: "Fast, competent service → satisfaction → V_RC↑"

          - id: "B_SVC_2"
            name: "Proactive Care"
            behaviors: ["early warning", "check-ins", "upsell identification"]
            wirkungskette: "Anticipation → loyalty → V_RC↑ + V_WTP↑"

          - id: "B_SVC_3"
            name: "Feedback Integration"
            behaviors: ["complaint analysis", "VOC programs", "improvement loops"]
            wirkungskette: "Customer voice → product improvement → V_IC↑ + V_AC↑"

      F_HR:
        clusters:
          - id: "B_HR_1"
            name: "Talent Acquisition"
            behaviors: ["employer branding", "structured hiring", "onboarding"]
            wirkungskette: "Right talent → capability base → V_WTS↓ + V_OC↑"

          - id: "B_HR_2"
            name: "Development & Learning"
            behaviors: ["training programs", "coaching", "career paths"]
            wirkungskette: "Skill building → capability growth → V_OC↑ + V_IC↑"
            gamma_intra:
              with: "B_HR_1"
              value: 0.18
              source: "ichniowski1997effects (selection × training)"

          - id: "B_HR_3"
            name: "Culture Stewardship"
            behaviors: ["values articulation", "ritual design", "norm reinforcement"]
            wirkungskette: "Strong culture → alignment → V_OC↑ + V_RC↑"

          - id: "B_HR_4"
