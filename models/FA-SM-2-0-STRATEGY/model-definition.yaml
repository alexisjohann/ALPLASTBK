    # ── CROSS-FUNCTION COMPLEMENTARITY γ₅ (NEW TYPE) ─────────────────────
    # 5th complementarity type alongside γ^ΨΨ, γ^BΨ, γ^VV, γ^cross.
    # γ₅ captures how functions amplify or undermine each other.
    #
    # KEY INSIGHT: γ₅ is not directly designable. It is modulated by
    # integration functions (F_STR, F_PMO, F_COM) through η.
    #
    # Formula: γ₅_effective(f,f') = γ₅_base(f,f') × η(F_STR, F_PMO, F_COM)
    gamma_5_structural:
      symbol: "γ₅"
      name: "Structural Complementarity (cross-function)"
      new_in_v2_1: true
      type_position: "5th type alongside γ^ΨΨ, γ^BΨ, γ^VV, γ^cross"

      formula: |
        γ₅_effective(f,f') = γ₅_base(f,f') × η(F_STR, F_PMO, F_COM)

        where η = Σ_g w_g · B_g_aggregate ∈ [0.3, 1.5]
        g ∈ {F_STR, F_PMO, F_COM}
        w_STR = 0.50 (highest — direction)
        w_PMO = 0.30 (medium — execution)
        w_COM = 0.20 (support — alignment)

      interpretation: |
        η < 0.7: Integration functions underperform → γ₅ is attenuated
        η ≈ 1.0: Normal integration → γ₅ at base level
        η > 1.2: Exceptional integration → γ₅ amplified (super-coordination)

      # Known γ₅ base values (literature-informed)
      known_pairs:
        - pair: "F_HR × F_OPS"
          gamma_5_base: 0.25
          evidence_tier: 1
          source: "ichniowski1997effects"
          interpretation: "HRM bundles + operations = +6.7% productivity"

        - pair: "F_IT × F_HR"
          gamma_5_base: 0.20
          evidence_tier: 1
          source: "brynjolfsson2013complementarity"
          interpretation: "IT investment without training = wasted; together = productivity"

        - pair: "F_MKT × F_SAL"
          gamma_5_base: 0.15
          evidence_tier: 2
          source: "LLMMC informed by marketing-sales alignment literature"
          interpretation: "Aligned messaging + pipeline = conversion uplift"

        - pair: "F_RND × F_MKT"
          gamma_5_base: 0.15
          evidence_tier: 2
          source: "cassiman2006search"
          interpretation: "Innovation + market insight = product-market fit"

        - pair: "F_OPS × F_IT"
          gamma_5_base: 0.20
          evidence_tier: 1
          source: "brynjolfsson2013complementarity"
          interpretation: "Digitized operations = automation + quality"

        - pair: "F_FIN × F_STR"
          gamma_5_base: 0.15
          evidence_tier: 2
          source: "bloom2012management (management practices as system)"
          interpretation: "Financial transparency enables strategic steering"

        - pair: "F_HR × F_IT"
          gamma_5_base: 0.18
          evidence_tier: 1
          source: "ichniowski1997effects, brynjolfsson2013complementarity"
          interpretation: "Digital HR tools + talent = skill platform"

      # ── DESTRUCTIVE COMPLEMENTARITIES (γ₅ < 0) ───────────────────────
      # Not all cross-function interactions are positive. Some function
      # pairs have STRUCTURAL TENSION that reduces value when both are
      # strong without coordination.
      known_negative_pairs:
        - pair: "F_SAL × F_SVC"
          gamma_5_base: -0.10
          evidence_tier: 2
          source: "LLMMC informed by sales-service conflict literature"
          interpretation: |
            TENSION: Sales optimizes for new customer acquisition (V_WTP, V_RC_new),
            Service optimizes for retention (V_RC_existing). Without coordination,
            Sales overpromises → Service underdelivers → V_RC erodes.
          mitigation: "Shared KPIs (Net Revenue Retention), joint planning (η amplifies)"

        - pair: "F_RND × F_OPS"
          gamma_5_base: -0.12
          evidence_tier: 2
          source: "christensen1997innovator (exploration-exploitation tradeoff)"
          interpretation: |
            TENSION: R&D pushes for change, experimentation, new processes.
            Operations pushes for stability, standardization, efficiency.
            Classic exploration-exploitation conflict (March 1991).
          mitigation: "Ambidextrous org design, separated units, temporal separation"

        - pair: "F_MKT × F_FIN"
          gamma_5_base: -0.08
          evidence_tier: 3
          source: "LLMMC prior (budget allocation tension)"
          interpretation: |
            TENSION: Marketing wants spend (brand investment = long-term V_WTP),
            Finance wants savings (short-term V_WTS). Classic horizon mismatch.
          mitigation: "Marketing ROI models, brand equity tracking as V_IC proxy"

        - pair: "F_LEG × F_RND"
          gamma_5_base: -0.05
          evidence_tier: 3
          source: "LLMMC prior (compliance vs. innovation speed)"
          interpretation: |
            TENSION: Legal wants compliance and risk mitigation,
            R&D wants speed and experimentation. Mild in most firms,
            strong in pharma/fintech where regulatory constraints bind.
          mitigation: "Regulatory sandboxes, embedded legal in R&D teams"

      # Design rule for negative γ₅:
      # γ₅ < 0 does NOT mean the pair should be avoided.
      # It means: without integration (η), these pairs DESTROY value.
      # With high η (good coordination), the effective γ₅ can become positive:
      #   γ₅_effective(f,f') = η · γ₅_base(f,f')
      #   If η > 1.2 and γ₅_base = -0.10 → γ₅_eff = -0.12 (worse!)
      #   But: η also changes the BASE through coordination mechanisms.
      #   Better model: γ₅_eff = γ₅_base + α_coord · η  where α_coord > 0
      #   for negative pairs (coordination shifts the interaction from destructive
      #   to constructive).

      calibration_approach:
        level_1: "Literature values (above) — γ₅_base"
        level_2: "Sector adjustment via PCT: γ₅_sector = γ₅_base × M(ΔΨ_sector)"
        level_3: "Firm-specific from project measurement: actual cross-function outcomes"
        method: "Same PCT pipeline as all EBF parameters (Tier 1-4 hierarchy)"
        negative_pair_note: |
          Negative γ₅ values are ESPECIALLY sensitive to η.
          Firms with low η (silos) may see γ₅ < -0.20 for SAL×SVC.
          Firms with high η (integrated) may have γ₅ ≈ 0 or slightly positive.
          This is the CORE VALUE PROPOSITION of integration functions.

    # ── INTEGRATION EFFECTIVENESS η ───────────────────────────────────────
    # η is the multiplier that integration functions (STR, PMO, COM)
    # apply to γ₅. It captures HOW WELL the organization coordinates
    # across functions.
    integration_effectiveness:
      symbol: "η"
      formula: "η = Σ_g w_g · B_g_aggregate"
      domain: "[0.3, 1.5]"
      weights:
        F_STR: 0.50
        F_PMO: 0.30
        F_COM: 0.20

      interpretation:
        low: "η < 0.7 — Silos, poor coordination, γ₅ attenuated"
        normal: "η ≈ 1.0 — Normal coordination, γ₅ at base"
        high: "η > 1.2 — Exceptional integration, γ₅ amplified"

      measurement:
        proxy_1: "Cross-functional project success rate"
        proxy_2: "Strategic alignment survey scores"
        proxy_3: "Time from strategic decision to operational implementation"

      dynamics: |
        η is NOT static — it evolves via the meso ODE:
        dη/dt = f(B_STR, B_PMO, B_COM) - ξ_η · η
        where ξ_η captures erosion when integration functions underperform.
        η has MEDIUM timescale (months to 1-2 years to change significantly).

  # ==========================================================================
  # STEP 5: FUNCTIONAL FORM — Multi-Scale ODE (NEW in 2.0)
  # ==========================================================================
  functional_form:

    # ---- MICRO: Individual behavior adoption (days-weeks) ----
    micro_ode:
      timescale: "days to weeks"
      equation: |
        dB_jk/dt = β_jk · U_jk(Ψ, I) · B_jk · (1 - B_jk) · (1 - R_jk) · (1 + M_jk)
      variables:
        B_jk: "Adoption of behavior k by actor group j ∈ [0,1]"
        U_jk: "Utility of behavior k for group j given context Ψ and intervention I"
        R_jk: "Resistance of group j to behavior k ∈ [0,1]"
        M_jk: "Momentum (social contagion + leadership) ∈ [-0.5, 2.0]"
        beta_jk: "Adoption speed parameter"
      network_extension: |
        M_jk = σ · Σ_i A_ji · B_ik + ρ · B_Lk
        where A_ji = adjacency matrix (who influences whom)
              σ = peer influence strength
              ρ = leadership influence strength
      new_in_v2: true

    # ---- MESO: Context evolution (months) ----
    meso_ode:
      timescale: "months"
      new_in_v2: true
      equation: |
        dΨ^org_i/dt = μ_i · I_i(t)                              — design interventions
                    + ν_i · B_aggregate(t)                       — behavioral side-effects
                    - ξ_i · Ψ^org_i(t)                          — erosion without maintenance
                    + φ_i · ΔV(t)                                — success feedback
      variables:
        mu_i: "Intervention effectiveness for context dimension i"
        nu_i: "Behavioral spillover coefficient"
        xi_i: "Natural erosion rate (Ψ^org_CUL: slow; Ψ^org_INF: fast)"
        phi_i: "Feedback coefficient (success → context improvement)"
      erosion_rates:
        Psi_org_INF: "ξ ≈ 0.15-0.30/year (information systems need constant updating)"
        Psi_org_GOV: "ξ ≈ 0.05-0.15/year (governance structures are moderately stable)"
        Psi_org_CUL: "ξ ≈ 0.02-0.08/year (culture is persistent but can erode)"
        Psi_org_INC: "ξ ≈ 0.10-0.20/year (incentive systems need recalibration)"
        Psi_org_CAP: "ξ ≈ 0.10-0.25/year (capabilities depreciate with technology change)"

    # ---- MACRO: Value accumulation (years) ----
    macro_ode:
      timescale: "years"
      equation: |
        dV_d/dt = Σ_f w_df · η_df · B_f(t) · [1 + Σ_j γ^VV_dj · B_j(t)]    — function-weighted learning
                + Σ_{f≠f'} η · γ₅(f,f') · v_f(t) · v_f'(t)                   — cross-function synergy (NEW 2.1)
                - δ_d · V_d(t)                                                 — depreciation
                + ε_d(t)                                                        — market shocks
      equation_simplified: |
        Without functional decomposition (LEAN/AGILE profiles):
        dV_k/dt = η_k · B_k(t) · [1 + Σ_j γ^VV_kj · B_j(t)] - δ_k · V_k(t) + ε_k(t)
      variables:
        w_df: "Value contribution weight of function f to dimension d (from w_df matrix)"
        eta_df: "Function-specific learning rate for value dimension d"
        gamma_5: "Structural complementarity between functions f and f' (NEW 2.1)"
        eta: "Integration effectiveness multiplier (from F_STR, F_PMO, F_COM) (NEW 2.1)"
        v_f: "Aggregate value contribution of function f"
        delta_d: "Depreciation rate for value dimension d"
        epsilon_d: "Exogenous shock to value dimension d"
      steady_state: |
        V_d* = (1/δ_d) · [Σ_f w_df · η_df · B_f* · (1 + Σ_j γ^VV_dj · B_j*) + Σ_{f≠f'} η · γ₅(f,f') · v_f* · v_f'*]
        Higher complementarity (both γ^VV AND γ₅) → higher steady-state value.
        Key insight: Cross-function synergy (γ₅ · η) is an ADDITIONAL value source.
      learning_rates:
        V_WTP: "η ∈ [0.10, 0.25]"
        V_WTS: "η ∈ [0.05, 0.15]"
        V_OC: "η ∈ [0.05, 0.20] (Thompson 2012: organizational learning)"
        V_IC: "η ∈ [0.15, 0.30] (fast learning but fast depreciation)"
        V_RC: "η ∈ [0.02, 0.08] (trust builds slowly)"
        V_AC: "η ∈ [0.10, 0.20] (learning-by-adapting)"

    # ---- Tipping Points (NEW in 2.0) ----
    tipping_points:
      new_in_v2: true
      description: |
        When aggregate behavior B(t) crosses threshold θ_tip,
        the system transitions to a new regime with different dynamics.
      mechanism: |
        Pre-tipping:  dB/dt governed by individual utility U_jk
        At tipping:   B(t) ≥ θ_tip triggers social norm shift
        Post-tipping: dB/dt accelerated by new social norm (M_jk jumps)
      typical_thresholds:
        social_norm_shift: "θ_tip ∈ [0.50, 0.70] (majority adoption creates new norm)"
        organizational_momentum: "θ_tip ∈ [0.30, 0.50] (critical mass for visibility)"
        irreversibility: "θ_tip ∈ [0.80, 0.95] (point of no return)"
      regime_switching: |
        Regime 0 (pre-tipping): β_slow, M_low, R_high
        Regime 1 (post-tipping): β_fast, M_high, R_low
        Transition: smooth sigmoid centered at θ_tip with width σ_tip

    # ---- Network Effects (NEW in 2.0) ----
    network_effects:
      new_in_v2: true
      description: |
        Actor interactions are not homogeneous — they follow a
        network topology described by adjacency matrix A.
      adjacency_matrix: |
        A_ji ∈ [0,1]: influence of actor i on actor j
        A is NOT symmetric: B_L → B_M is stronger than B_M → B_L
      key_properties:
        - "Hub actors (high out-degree) are leverage points"
        - "Bridges between clusters enable cross-unit diffusion"
        - "Isolated actors require direct intervention"
      measurement: "Organizational Network Analysis (ONA) surveys"

    # ---- Measurement Map (F1-F4) ----
    measurement_map:
      description: "Maps theoretical constructs to observable indicators"
      principles:
        F1: "Every variable has at least one observable proxy"
        F2: "Proxies are validated against theoretical definition"
        F3: "Measurement frequency matches timescale (micro=weekly, meso=monthly, macro=quarterly)"
        F4: "Leading indicators preferred over lagging indicators"

  # ==========================================================================
  # STEP 6: PARAMETER ESTIMATION — Bayesian Hierarchical (NEW in 2.0)
  # ==========================================================================
  parameter_estimation:
    approach: "Bayesian Hierarchical + PCT"
    new_in_v2: true

    bayesian_hierarchical:
      description: |
        Multi-level priors: Individual → Team → Organization → Industry.
        Each level provides informative priors for the level below.
      levels:
        - level: "Industry"
          source: "Literature meta-analyses (Ichniowski, Bloom)"
          example: "γ^ΨΨ_INF_CAP ∈ [0.15, 0.45] from cross-industry studies"
        - level: "Organization"
          source: "Client CVA data (400+ factors)"
          example: "Zindel-specific adjustment based on sector and size"
        - level: "Team/Division"
          source: "Internal surveys, ONA data"
          example: "Division-level β and R parameters"
        - level: "Individual"
          source: "Behavioral typing (Bandiera clusters)"
          example: "Leadership type → β_L prior"

    pct_integration:
      description: |
        All parameters anchored in literature via PCT
        (Parameter Context Transformation):
        θ_target = θ_anchor × ∏_i M(ΔΨ_i)
      example: |
        γ^ΨΨ_INF_CAP = 0.30 (Ichniowski, steel manufacturing)
        ΔΨ_E(sector): steel → consulting → M = 0.85
        ΔΨ_F(size): large → mid-size → M = 1.10
        γ^ΨΨ_INF_CAP(Zindel) = 0.30 × 0.85 × 1.10 = 0.28

    sensitivity_protocol:
      description: "Identify which parameters drive which outcomes"
      method: "One-at-a-time + Morris screening + Sobol indices for key parameters"
      output: "Parameter importance ranking per prediction"

    cross_validation:
      description: "Leave-one-out at team/division level"
      method: |
        For each division d:
          1. Estimate parameters on all divisions except d
          2. Predict B(t) and V(t) for division d
          3. Compare predicted vs. actual
      minimum_divisions: 3

    regime_priors:
      P1: "Pre-tipping and post-tipping regimes have different parameter priors"
      P2: "Regime classification based on B(t) relative to θ_tip"
      P3: "Transition width σ_tip estimated from historical regime changes"
      P4: "Industry-specific θ_tip priors from literature"

  # ==========================================================================
  # STEP 7: PREDICTIONS — 12 Falsifiable (NEW in 2.0)
  # ==========================================================================
  predictions:
    total: 12
    new_in_v2: true

    micro:
      - id: "P1"
        level: "Micro"
        statement: "Leadership adopts new strategic behaviors with β_L ∈ [0.05, 0.15] per month"
        observable: "Monthly leadership behavior survey scores"
        horizon: "3-6 months"
        falsification: "β_L < 0.03 for 3 consecutive months"

      - id: "P2"
        level: "Micro"
        statement: "Monetary incentive increase without cultural support reduces B_O adoption"
        observable: "B_O adoption rate before/after incentive change, controlling for CUL"
        horizon: "6-12 months"
        falsification: "B_O increases despite high INC × low CUL"
        gamma_ref: "γ^ΨΨ_INC_CUL = -0.35"

      - id: "P3"
        level: "Micro"
        statement: "Conditional cooperators (60% of B_O) follow early adopters via network"
        observable: "Adoption timing correlated with network proximity to early adopters"
        horizon: "3-9 months"
        falsification: "No correlation between network position and adoption timing"

      - id: "P4"
        level: "Micro"
        statement: "Resistance R decreases with information transparency Ψ^org_INF"
        observable: "R scores (survey) vs. Ψ^org_INF scores (system metrics)"
        horizon: "1-6 months"
        falsification: "R stays constant or increases despite Ψ^org_INF improvement"

    meso:
      - id: "P5"
        level: "Meso"
        statement: "Tipping point at ~60% B adoption triggers acceleration"
        observable: "dB/dt before vs. after 60% threshold"
        horizon: "6-18 months"
        falsification: "No acceleration after 60% threshold; linear adoption throughout"

      - id: "P6"
        level: "Meso"
        statement: "Ψ^org_CUL changes 3-5x slower than Ψ^org_INF"
        observable: "Rate of change in culture vs. information surveys"
        horizon: "12-36 months"
        falsification: "CUL changes at same speed or faster than INF"

      - id: "P7"
        level: "Meso"
        statement: "Complementary practices adopted in clusters, not individually"
        observable: "Correlation matrix of practice adoption across divisions"
        horizon: "6-12 months"
        falsification: "Practices adopted independently with zero correlation"
        gamma_ref: "γ^ΨΨ_INF_CAP = 0.30 (Ichniowski cluster effect)"

      - id: "P8"
        level: "Meso"
        statement: "Cross-level effect visible: V_OC amplifies B_M × Ψ^org_INF"
        observable: "Interaction term V_OC × B_M × INF in regression on outcomes"
        horizon: "12-24 months"
        falsification: "Three-way interaction term not significant"
        gamma_ref: "γ^cross_OC_M_INF = 0.10"

    macro:
      - id: "P9"
        level: "Macro"
        statement: "V_OC accumulates with η ∈ [0.05, 0.20] and depreciates with δ ∈ [0.05, 0.15]/year"
        observable: "Management practice scores (WMS) over 2-5 year period"
        horizon: "2-5 years"
        falsification: "V_OC dynamics outside predicted η-δ range"

      - id: "P10"
        level: "Macro"
        statement: "V_IC depreciates 2-3x faster than V_OC"
        observable: "Innovation metric decay rate vs. organizational capability decay"
        horizon: "1-3 years"
        falsification: "δ_IC ≤ δ_OC over sustained period"

      - id: "P11"
        level: "Macro"
        statement: "Higher γ organizations reach higher steady-state V*"
        observable: "Cross-org comparison: complementarity index vs. long-run value"
        horizon: "3-7 years"
        falsification: "No correlation between γ and V* across comparable organizations"

      - id: "P12"
        level: "Macro"
        statement: "V→Ψ feedback measurable: organizational success improves context"
        observable: "Lagged correlation: ΔV(t) → ΔΨ(t+1)"
        horizon: "2-5 years"
        falsification: "No lagged correlation; context changes independently of value"

    cascading_falsification:
      description: |
        Predictions are ordered: Micro → Meso → Macro.
        If Micro predictions (P1-P4) fail, Meso predictions (P5-P8)
        become suspect, and Macro predictions (P9-P12) are unreliable.
      protocol:
        - "If ≥2 of P1-P4 fail → review model assumptions before trusting P5-P8"
        - "If ≥2 of P5-P8 fail → Macro predictions P9-P12 are invalidated"
        - "If P1-P4 pass but P5-P8 fail → aggregation mechanism is wrong"
        - "If all pass at each level → model is provisionally supported"

    prediction_cards:
      format: |
        Each prediction gets a card with:
        - Statement (what we predict)
        - Observable (how we measure)
        - Confidence interval (ex-ante)
        - Resolution date (when we check)
        - Falsification criterion (what would prove us wrong)
      storage: "models/FA-SM-2-0-STRATEGY/predictions/"

