  sub_models:
    - model_id: "SDM-1.0"
      role: "Process Layer (Layer 2 → Layer 1 translation)"
      interface:
        input: "ΔΨ (context gap)"
        output: "B(t) trajectories via 4-phase BCJ"
        shared_state: "Ψ(t)"

    - model_id: "SOCM-1.0"
      role: "Option Comparison (within Layer 0)"
      interface:
        input: "V_k targets, γ_kj matrix"
        output: "Optimal portfolio weights, sequencing"
        shared_state: "γ_kj"

  # ==========================================================================
  # BIDIRECTIONAL WORKFLOW
  # ==========================================================================
  workflow:
    top_down:
      name: "Auslegeordnung → Zielableitung"
      steps:
        - {step: 1, name: "Wertschöpfungsziel", output: "V*(t) with 6 dimensions + weights", layer: 0}
        - {step: "1b", name: "Funktionale Dekomposition", output: "F_active, w_df calibrated, B_f clusters identified", layer: 0, new_in_v2_1: true, note: "Determines WHICH functions drive WHICH value dimensions. Skipped for LEAN/AGILE profiles."}
        - {step: 2, name: "Verhaltensübersetzung", output: "B*(t) by actor group AND function (B_jk × B_f)", layer: 1}
        - {step: 3, name: "Kontext-Diagnostik", output: "ΔΨ = Ψ* - Ψ(t₀) in 4-tier form, incl. Ψ_f per function", layer: 2}
        - {step: 4, name: "Strategische Architektur", output: "Portfolio via SOCM-1.0 + γ₅ cross-function synergies", sub_model: "SOCM-1.0"}
        - {step: 5, name: "Implementierungsdesign", output: "4-phase roadmap via SDM-1.0", sub_model: "SDM-1.0"}
        - {step: 6, name: "Dynamisches Modell", output: "V(t), B(t), Ψ(t) trajectories from coupled ODE (with w_df, γ₅, η)"}

    bottom_up:
      name: "Realitätscheck → Machbarkeitsanalyse"
      steps:
        - {step: 1, name: "Kontext-Ist-Analyse", output: "Ψ(t₀) in 4-tier form, incl. Ψ_f per active function"}
        - {step: "1b", name: "Funktions-Ist-Analyse", output: "Current B_f, η, cross-function coordination quality", new_in_v2_1: true}
        - {step: 2, name: "Verhaltensvorhersage", output: "B_predicted(t) from micro ODE per function"}
        - {step: 3, name: "Wertschöpfungs-Prognose", output: "V_predicted(t) from macro ODE with w_df, γ₅, η"}
        - {step: 4, name: "Gap-Analyse", output: "V* - V_predicted → identify function-level gaps and cross-function bottlenecks"}

