# ============================================================================
# FA-SM-2.0: FehrAdvice Strategy Model
# ============================================================================
# Meta-model for behavioral organizational design
# Evolution: FA-SM-1.1 → FA-SM-2.0 (major version: new capabilities)
#
# CAUSAL CHAIN:
#   WERTSTEIGERUNG (Ziel) ↔ VERHALTEN (Hebel) ↔ KONTEXT-DESIGN (Instrument)
#   V(t)                  ↔ B(t)              ↔ Ψ(t)
#
# KEY INNOVATIONS (1.1 → 2.0):
#   I1: 6 value dimensions (+ Relational Capital, Adaptive Capacity)
#   I2: 4-tier context (14 dimensions + emergence + dΨ/dt)
#   I3: Layered γ (5 types: ΨΨ, BΨ, VV, cross-level, structural γ₅)
#   I4: Multi-scale ODE (micro/meso/macro timescales)
#   I5: Tipping points + regime-switching
#   I6: Network effects (actor interaction topology)
#   I7: Bayesian hierarchical parameter estimation
#   I8: 12 falsifiable predictions with cascading falsification
#   I9: Design gates (CEO-Test, Berater-Test, Falsifiability)
#   I10: S×U×K Configuration Gate (model structure adapts to org context)
#   I11: Functional Decomposition (Index f on existing layers V, B, Ψ, γ)
#
# SUB-MODELS:
#   - SDM-1.0: Strategy Design Model (process layer)
#   - SOCM-1.0: Strategy Option Comparison Model (option comparison)
#
# THEORETICAL FOUNDATIONS:
#   - Van den Steen (2017): Formal Theory of Strategy
#   - Brynjolfsson & Milgrom (2010): Complementarities in Organizations
#   - Ichniowski et al. (1997): HRM Practice Clusters (+6.7%)
#   - Bloom, Sadun & Van Reenen (2012): Management Practices
#   - Oberholzer-Gee (2021): Better, Simpler Strategy (WTP-WTS)
#   - Bandiera et al. (2020): CEO Behavior and Firm Performance
#   - Heckman (2007): Dynamic Complementarity ("skills beget skills")
#
# Created: 2026-02-24
# Version: 2.1
# ============================================================================

model:
  id: "FA-SM-2.0"
  name: "FehrAdvice Strategy Model"
  category: "META-STRATEGY"
  status: "EXPERIMENTAL"
  version: "2.1"
  created: "2026-02-24"
  last_updated: "2026-02-25"
  maintainer: "EBF Strategy Team"
  supersedes: "FA-SM-1.1"

  # ==========================================================================
  # STEP 1: DESIGN GATES (NEW in 2.0, G0 added 2026-02-24)
  # ==========================================================================
  # Four validation gates. G0 configures model complexity BEFORE analysis.
  # G1-G3 validate output quality AFTER analysis.
  # Entry point: HYBRID (theory-driven AND practice-driven simultaneously).
  design_gates:
    entry_point: "HYBRID"
    entry_point_rationale: |
      Pure theory → not actionable for clients.
      Pure practice → not falsifiable, not transferable.
      HYBRID: Build from theory (Van den Steen, Ichniowski), validate via practice.

    gates:
      # ════════════════════════════════════════════════════════════════════
      # G0: CONFIGURATION GATE — S×U×K (NEW Innovation I10)
      # ════════════════════════════════════════════════════════════════════
      # The model structure itself is context-dependent — not just parameters.
      # Traditional: Model = fixed, θ = fixed
      # EBF v1:     Model = fixed, θ = f(Ψ, 10C)
      # FA-SM-2.0:  Model = f(S,U,K), θ = f(Ψ, 10C)
      #
      # Theoretical basis:
      #   - Mintzberg (1979): 5 structural configurations depend on size + environment
      #   - Snowden (Cynefin): Simple/Complicated/Complex/Chaotic determines method
      #   - Galbraith (Star Model): Strategy determines structure
      #   - Van den Steen P4: "Uncertainty makes strategy more valuable"
      # ════════════════════════════════════════════════════════════════════
      - gate_id: "G0-CONFIG"
        name: "Configuration Gate"
        new_in_v2: true
        innovation_id: "I10"
        question: "Welche FA-SM-2.0 Komponenten braucht diese Organisation?"
        principle: |
          Not every organization needs every component. A 50-person startup
          does not need cross-level γ, Bayesian hierarchical estimation, or
          regime-switching. Applying the full model would violate parsimony
          (Occam's Razor) and fail G2-BERATER (not explainable in 15 min).
          Conversely, a 50,000-person corporation NEEDS the full model because
          omitting network effects or emergence would miss critical dynamics.

        # ── THE THREE META-DIMENSIONS ──────────────────────────────────
        meta_dimensions:
          - dimension: "S"
            name: "Size (Grösse)"
            question: "How many people are in the organization?"
            levels:
              - level: "S1"
                name: "Micro"
                range: "1-50 employees"
                archetype: "Startup, Handwerksbetrieb, Praxis"
                mintzberg: "Simple Structure"
              - level: "S2"
                name: "Small"
                range: "50-250 employees"
                archetype: "KMU, Agentur, Familienbetrieb"
                mintzberg: "Simple Structure / Machine Bureaucracy"
              - level: "S3"
                name: "Medium"
                range: "250-1'000 employees"
                archetype: "Mittelstand, Division"
                mintzberg: "Divisional Form"
              - level: "S4"
                name: "Large"
                range: "1'000+ employees"
                archetype: "Konzern, multinational"
                mintzberg: "Machine Bureaucracy / Adhocracy"

          - dimension: "U"
            name: "Uncertainty (Unsicherheit)"
            question: "How predictable is the organization's environment?"
            literature: "steen2017formal (P4: uncertainty makes strategy more valuable)"
            operationalization: |
              U is measured via 7 indicators of ENVIRONMENTAL VOLATILITY.
              Each indicator scored 1-4. U_score = round(mean(indicators)).
              This makes U auditable and reproducible across assessors.
            indicators:
              - id: "U_IND_1"
                name: "Forecast Deviation"
                question: "How accurate are 12-month revenue/volume forecasts?"
                scale:
                  1: "< 5% deviation (stable, predictable)"
                  2: "5-15% deviation (moderate drift)"
                  3: "15-30% deviation (frequent surprises)"
                  4: "> 30% deviation (forecasts essentially useless)"
                source: "Internal controlling data"
              - id: "U_IND_2"
                name: "Regulatory Change Frequency"
                question: "How often do relevant regulations change materially?"
                scale:
                  1: "< 1x per 5 years"
                  2: "1-2x per 3 years"
                  3: "Annually or more"
                  4: "Continuous, unpredictable shifts"
                source: "Legal/Compliance team assessment"
              - id: "U_IND_3"
                name: "Market Share Volatility"
                question: "How much do market shares shift year-over-year?"
                scale:
                  1: "< 2% shift (oligopoly, locked-in customers)"
                  2: "2-5% shift"
                  3: "5-15% shift (dynamic competition)"
                  4: "> 15% shift (disruptive, winner-take-all)"
                source: "Market data, industry reports"
              - id: "U_IND_4"
                name: "Technology Substitution Rate"
                question: "How fast does core technology change?"
                scale:
                  1: "Decades (e.g., construction, utilities)"
                  2: "5-10 years (e.g., banking platforms)"
                  3: "2-5 years (e.g., SaaS, digital)"
                  4: "< 2 years (e.g., AI, crypto)"
                source: "CTO/R&D assessment"
              - id: "U_IND_5"
                name: "Price Volatility"
                question: "How much do input/output prices fluctuate?"
                scale:
                  1: "< 5% annual variation"
                  2: "5-15%"
                  3: "15-30%"
                  4: "> 30% (commodity spikes, currency crises)"
                source: "Procurement/Finance data"
              - id: "U_IND_6"
                name: "Customer Churn Rate"
                question: "What percentage of customers are lost/replaced annually?"
                scale:
                  1: "< 5% (sticky, long contracts)"
                  2: "5-15%"
                  3: "15-30%"
                  4: "> 30% (transactional, no switching costs)"
                source: "CRM data"
              - id: "U_IND_7"
                name: "Planning Horizon Stability"
                question: "How far ahead can strategic plans be relied upon?"
                scale:
                  1: "3-5 years (reliable long-term planning)"
                  2: "1-3 years"
                  3: "6-12 months"
                  4: "< 6 months (plans obsolete quickly)"
                source: "CEO/Strategy team assessment"
            scoring_formula: "U_score = round(mean(U_IND_1 ... U_IND_7))"
            levels:
              - level: "U1"
                name: "Stable"
                description: "Predictable market, regulation, technology"
                score_range: "mean ≤ 1.5"
                archetype: "Versorgungsunternehmen, Verwaltung"
                cynefin: "Clear/Obvious"
                planning_horizon: "3-5 years reliable"
              - level: "U2"
                name: "Moderate"
                description: "Some competitive dynamics, moderate change"
                score_range: "1.5 < mean ≤ 2.5"
                archetype: "Traditionsbranche mit Digitalisierung"
                cynefin: "Complicated"
                planning_horizon: "1-3 years reliable"
              - level: "U3"
                name: "High"
                description: "Fast-moving market, disruptive threats"
                score_range: "2.5 < mean ≤ 3.5"
                archetype: "Tech, Fintech, Startup-Ökosystem"
                cynefin: "Complex"
                planning_horizon: "6-12 months reliable"
              - level: "U4"
                name: "Chaotic"
                description: "Crisis, M&A, fundamental disruption"
                score_range: "mean > 3.5"
                archetype: "Turnaround, Post-Merger, Pandemie"
                cynefin: "Chaotic"
                planning_horizon: "Weeks to months"

          - dimension: "K"
            name: "Complexity (Komplexität)"
            question: "How many relevant interdependencies exist in the decision space?"
            literature: "thompson1967organizations (pooled/sequential/reciprocal), simon1962architecture (near-decomposability)"
            operationalization: |
              K measures STRUCTURAL INTERDEPENDENCE — the number and density
              of interactions that the model must capture to be valid.
              Crucially, K connects directly to the γ-structure of FA-SM:
              Higher K → more γ parameters are non-zero → more complementarities matter.
              K = f(Interdependenzdichte, Governance-Tiefe, Portfolio-Breite)
              Measured via 7 indicators, each scored 1-4.
              K_score = round(mean(indicators)).
            gamma_connection: |
              K directly determines which γ types are activated:
              K1 → only γ^ΨΨ (context interactions within single tier)
              K2 → + γ^BΨ (behavior-context cross-effects)
              K3 → + γ^VV + γ₅ (value interactions + cross-function)
              K4 → + γ^cross (cross-level emergence)
              This is NOT arbitrary — higher K means more organizational interfaces
              where complementarity/substitution effects become behaviorally relevant.
            indicators:
              - id: "K_IND_1"
                name: "Cross-Function Interface Density"
                question: "How many organizational interfaces exist per core process?"
                scale:
                  1: "≤ 2 handoffs per process (linear, sequential)"
                  2: "3-5 handoffs (some cross-functional coordination)"
                  3: "6-10 handoffs (matrix-like, multiple stakeholders)"
                  4: "> 10 handoffs (network process, many dependencies)"
                source: "Process maps, RACI matrices"
                gamma_link: "Directly determines number of relevant γ₅(f,f') pairs"
              - id: "K_IND_2"
                name: "Active γ₅ Pairs"
                question: "How many function pairs have non-zero structural complementarity?"
                scale:
                  1: "≤ 3 function pairs with γ₅ ≠ 0"
                  2: "4-8 pairs"
                  3: "9-15 pairs"
                  4: "> 15 pairs (dense cross-function network)"
                source: "Estimated from function activation + process maps"
                gamma_link: "DIRECT measurement of γ₅ density"
              - id: "K_IND_3"
                name: "Governance Depth"
                question: "How many hierarchical/governance levels exist?"
                scale:
                  1: "2 levels (founder + team)"
                  2: "3-4 levels (functional hierarchy)"
                  3: "5-6 levels (divisional + functional)"
                  4: "> 6 levels (matrix, holding, multi-level governance)"
                source: "Org chart analysis"
                gamma_link: "More levels → more cross-level γ^cross relevant"
              - id: "K_IND_4"
                name: "Dual/Matrix Reporting Share"
                question: "What percentage of employees report to 2+ managers?"
                scale:
                  1: "< 5% (clear single hierarchy)"
                  2: "5-15%"
                  3: "15-30% (partial matrix)"
                  4: "> 30% (full matrix organization)"
                source: "HR data, org chart"
                gamma_link: "Matrix = structural γ^BΨ between behavior and multiple contexts"
              - id: "K_IND_5"
                name: "Product/Service Portfolio Breadth"
                question: "How many distinct product/service lines exist?"
                scale:
                  1: "1-2 (focused, Einprodukt)"
                  2: "3-5"
                  3: "6-15 (diversified)"
                  4: "> 15 (conglomerate, platform)"
                source: "Product catalog, revenue split"
                gamma_link: "More products → more value dimension interactions (γ^VV)"
              - id: "K_IND_6"
                name: "External Regulatory Interactions"
                question: "How many distinct regulatory bodies/regimes apply?"
                scale:
                  1: "1 (single jurisdiction, one regulator)"
                  2: "2-3"
                  3: "4-6 (multi-country or multi-sector)"
                  4: "> 6 (global, multi-regulator)"
                source: "Legal/Compliance mapping"
                gamma_link: "External constraints create forced Ψ^org interactions"
              - id: "K_IND_7"
                name: "IT System Fragmentation"
                question: "How many core IT systems need to interoperate?"
                scale:
                  1: "1-2 systems (integrated, monolith)"
                  2: "3-5 systems"
                  3: "6-10 systems (ERP + CRM + HR + ...)"
                  4: "> 10 systems (fragmented landscape, integration pain)"
                source: "IT architecture diagram"
                gamma_link: "System fragmentation = barrier to γ^ΨΨ_INF realization"
            scoring_formula: "K_score = round(mean(K_IND_1 ... K_IND_7))"
            levels:
              - level: "K1"
                name: "Simple"
                description: "Few divisions, clear hierarchy, homogeneous workforce"
                score_range: "mean ≤ 1.5"
                archetype: "Einprodukt-Firma, lokaler Betrieb"
                interaction_density: "Low — few γ relevant"
                gamma_activated: ["gamma_psi_psi"]
              - level: "K2"
                name: "Moderate"
                description: "Multiple functions, some cross-functional dependencies"
                score_range: "1.5 < mean ≤ 2.5"
                archetype: "Multi-Standort, funktionale Gliederung"
                interaction_density: "Medium — intra-tier γ relevant"
                gamma_activated: ["gamma_psi_psi", "gamma_B_psi"]
              - level: "K3"
                name: "High"
                description: "Matrix structure, multiple BUs, diverse stakeholders"
                score_range: "2.5 < mean ≤ 3.5"
                archetype: "Divisional, international"
                interaction_density: "High — inter-tier γ + cross-function γ₅ relevant"
                gamma_activated: ["gamma_psi_psi", "gamma_B_psi", "gamma_V_V", "gamma_5_structural"]
              - level: "K4"
                name: "Very High"
                description: "Network organization, ecosystem, platform"
                score_range: "mean > 3.5"
                archetype: "Holding, Plattform, Ökosystem"
                interaction_density: "Very high — all γ types including cross-level and emergence"
                gamma_activated: ["gamma_psi_psi", "gamma_B_psi", "gamma_V_V", "gamma_cross", "gamma_5_structural"]

        # ── SCORING ALGORITHM ──────────────────────────────────────────
        # Maps S×U×K → Configuration Profile via dominance-based threshold logic
        scoring_algorithm:
          description: |
            DOMINANCE-BASED THRESHOLD LOGIC (replaces simple max() rule).
            Three-step process:
              Step 1: Score each dimension (S_score, U_score, K_score) via indicator means.
              Step 2: Apply dominance rules — how many dimensions exceed threshold?
              Step 3: Apply override rules — extreme single-dimension cases.
            Rationale: max() loses information. S3/U1/K1 ≠ S3/U3/K3, but max() = 3 for both.
            Dominance logic distinguishes "one dimension high" from "multiple dimensions high".
          literature: "milgrom1990economics (complementarity thresholds), porter1996what (configuration fit)"

          # STEP 1: Dimension scoring (unchanged — mean of 7 indicators per dimension)
          dimension_scoring:
            S_score: "round(mean(S_IND_1 ... S_IND_5))"
            U_score: "round(mean(U_IND_1 ... U_IND_7))"
            K_score: "round(mean(K_IND_1 ... K_IND_7))"

          # STEP 2: Dominance-based profile assignment
          dominance_rules:
            description: |
              Count how many dimensions reach each threshold.
              The profile is determined by DOMINANCE (how many dimensions are high),
              not just the maximum.
            logic: |
              Let n(x) = count of dimensions with score ≥ x.

              Rule D1: n(4) ≥ 2                         → VUCA
              Rule D2: n(4) = 1 AND n(3) ≥ 1            → ENTERPRISE
              Rule D3: n(3) ≥ 2                          → DYNAMIC
              Rule D4: n(3) = 1 AND n(2) ≥ 1            → STRUCTURED
              Rule D5: n(2) ≥ 2                          → STRUCTURED
              Rule D6: n(2) = 1                          → AGILE
              Rule D7: n(2) = 0 (all dimensions ≤ 1)    → LEAN

              Rules are evaluated TOP-DOWN (first match wins).
            examples:
              - suk: "S4/U4/K3"
                n4: 2
                n3: 3
                result: "VUCA (Rule D1: n(4)=2 ≥ 2)"
              - suk: "S4/U2/K4"
                n4: 1
                n3: 1
                result: "ENTERPRISE (Rule D2: n(4)=1, n(3)=1)"
              - suk: "S3/U3/K3"
                n4: 0
                n3: 3
                result: "DYNAMIC (Rule D3: n(3)=3 ≥ 2)"
              - suk: "S3/U1/K1"
                n4: 0
                n3: 1
                n2: 1
                result: "STRUCTURED (Rule D4: n(3)=1, n(2)=1 — NOT DYNAMIC)"
              - suk: "S2/U2/K1"
                n4: 0
                n3: 0
                n2: 2
                result: "STRUCTURED (Rule D5: n(2)=2)"
              - suk: "S1/U2/K1"
                n4: 0
                n3: 0
                n2: 1
                result: "AGILE (Rule D6: n(2)=1)"
              - suk: "S1/U1/K1"
                n4: 0
                n3: 0
                n2: 0
                result: "LEAN (Rule D7: all ≤ 1)"

          # STEP 3: Override rules for extreme single-dimension cases
          override_rules:
            description: |
              Overrides handle cases where one dimension is extreme (4) but others
              are very low (≤ 2). These are SPECIALIZATIONS, not full-spectrum complexity.
            rules:
              - id: "OVR-1"
                condition: "U ≥ 3 AND S = 1 AND K ≤ 2"
                override: "AGILE (not STRUCTURED)"
                rationale: "Small firm in high uncertainty → needs speed, not structure"
              - id: "OVR-2"
                condition: "S = 4 AND U ≤ 2 AND K ≤ 2"
                override: "STRUCTURED (not ENTERPRISE)"
                rationale: "Large stable simple firm → hierarchy suffices, not full enterprise model"
              - id: "OVR-3"
                condition: "K = 4 AND S ≤ 2 AND U ≤ 2"
                override: "DYNAMIC (not ENTERPRISE)"
                rationale: "Small stable but highly complex → needs γ-richness, not scale features"
              - id: "OVR-4"
                condition: "U = 4 AND S ≤ 2 AND K ≤ 2"
                override: "AGILE (not ENTERPRISE)"
                rationale: "Small simple firm in chaos → needs fast adaptation, not governance layers"

          # COMPOSITE RULE (summary for implementation)
          composite_rule: |
            profile = apply_dominance_rules(S_score, U_score, K_score)
            profile = apply_overrides(profile, S_score, U_score, K_score)

          # KEY DIFFERENCE from max() rule:
          comparison_with_max:
            - case: "S3/U1/K1"
              max_rule: "C=3 → DYNAMIC"
              dominance_rule: "n(3)=1, n(2)=1 → STRUCTURED (Rule D4)"
              improvement: "Correctly identifies single-dimension elevation as STRUCTURED, not DYNAMIC"
            - case: "S3/U3/K1"
              max_rule: "C=3 → DYNAMIC"
              dominance_rule: "n(3)=2 → DYNAMIC (Rule D3)"
              improvement: "Same result, but now JUSTIFIED by two-dimension dominance"
            - case: "S2/U2/K2"
              max_rule: "C=2 → STRUCTURED"
              dominance_rule: "n(2)=3 → STRUCTURED (Rule D5)"
              improvement: "Same result, with stronger evidence (all three dimensions moderate)"

        # ── CONFIGURATION PROFILES ─────────────────────────────────────
        profiles:
          - profile_id: "LEAN"
            composite_score: 1
            typical_suk: "S1/U1/K1"
            description: "Minimum viable model. Few interactions, fast cycles."
            archetype_example: "Handwerksbetrieb, Solo-Praxis"
            active_components: 8
            value_dimensions: ["V_WTP", "V_WTS"]
            context_tiers: [1]
            gamma_types: ["gamma_psi_psi"]
            ode_scales: ["micro"]
            tipping_points: false
            network_effects: false
            regime_switching: false
            bayesian_hierarchical: false
            sub_models: []
            predictions_required: 4
            typical_project_duration: "2-4 weeks"

          - profile_id: "AGILE"
            composite_score: "1 (with U >= 3 override)"
            typical_suk: "S1/U3/K2"
            description: "Small but uncertain. Needs fast dynamics + tipping awareness."
            archetype_example: "Tech-Startup, Fintech"
            active_components: 14
            value_dimensions: ["V_WTP", "V_WTS", "V_IC"]
            context_tiers: [1, 2]
            gamma_types: ["gamma_psi_psi", "gamma_B_psi"]
            ode_scales: ["micro", "meso"]
            tipping_points: true
            network_effects: false
            regime_switching: false
            bayesian_hierarchical: false
            sub_models: []
            predictions_required: 6
            typical_project_duration: "3-6 weeks"

          - profile_id: "STRUCTURED"
            composite_score: 2
            typical_suk: "S2/U2/K2"
            description: "Balanced complexity. Most KMU and mid-size firms."
            archetype_example: "Zindel United, LUKB, Familienbetrieb 250 MA"
            active_components: 20
            value_dimensions: ["V_WTP", "V_WTS", "V_OC", "V_IC"]
            context_tiers: [1, 2]
            gamma_types: ["gamma_psi_psi", "gamma_B_psi", "gamma_5_structural"]
            ode_scales: ["micro", "meso"]
            tipping_points: true
            network_effects: false
            regime_switching: false
            bayesian_hierarchical: false
            functional_decomposition: true
            integration_effectiveness_eta: false
            sub_models: ["SDM-1.0"]
            predictions_required: 8
            typical_project_duration: "6-12 weeks"

          - profile_id: "DYNAMIC"
            composite_score: 3
            typical_suk: "S3/U3/K3"
            description: "Full mid-tier. Network effects emerge, multiple timescales matter."
            archetype_example: "ALPLA, PORR, Helsana"
            active_components: 29
            value_dimensions: ["V_WTP", "V_WTS", "V_OC", "V_IC", "V_RC", "V_AC"]
            context_tiers: [1, 2, 3]
            gamma_types: ["gamma_psi_psi", "gamma_B_psi", "gamma_V_V", "gamma_5_structural"]
            ode_scales: ["micro", "meso", "macro"]
            tipping_points: true
            network_effects: true
            regime_switching: true
            bayesian_hierarchical: false
            functional_decomposition: true
            integration_effectiveness_eta: true
            sub_models: ["SDM-1.0", "SOCM-1.0"]
            predictions_required: 10
            typical_project_duration: "3-6 months"

          - profile_id: "ENTERPRISE"
            composite_score: 4
            typical_suk: "S4/U2/K4"
            description: "Full model minus chaotic dynamics. Large stable enterprises."
            archetype_example: "UBS, Migros Bank, ZKB"
            # ── ENDOGENE DOMINANZ ──
            # ENTERPRISE = complexity driven by INTERNAL structural interdependence.
            # The organization IS the source of complexity (many layers, functions, γ-paths).
            # Environment is stable-to-moderate — the challenge is COORDINATION, not ADAPTATION.
            dominance_type: "endogenous"
            dominance_description: |
              ENTERPRISE is characterized by ENDOGENE KOMPLEXITÄT:
              - K is the primary driver (K ≥ 3, typically K4)
              - S amplifies K (large organizations have more interfaces)
              - U is moderate or low (U ≤ 2) — the environment is manageable
              - The core challenge: managing internal interdependencies, not reacting to external shocks
              - Emphasis: Governance depth, cross-function coordination, hierarchical alignment
            diagnostic_signature:
              K_dominant: true
              U_contained: "U ≤ 2 (stable environment)"
              primary_challenge: "Internal coordination and alignment"
              key_gamma: "γ^cross (cross-level), γ₅ (cross-function)"
              risk: "Bureaucratic inertia, over-governance, coordination cost exceeds benefit"
            active_components: 33
            value_dimensions: ["V_WTP", "V_WTS", "V_OC", "V_IC", "V_RC", "V_AC"]
            context_tiers: [1, 2, 3, 4]
            gamma_types: ["gamma_psi_psi", "gamma_B_psi", "gamma_V_V", "gamma_cross", "gamma_5_structural"]
            ode_scales: ["micro", "meso", "macro"]
            tipping_points: true
            network_effects: true
            regime_switching: false
            bayesian_hierarchical: true
            functional_decomposition: true
            integration_effectiveness_eta: true
            sub_models: ["SDM-1.0", "SOCM-1.0"]
            predictions_required: 12
            typical_project_duration: "6-12 months"

          - profile_id: "VUCA"
            composite_score: 4
            typical_suk: "S4/U4/K4"
            description: "Maximum complexity. Crisis, M&A, fundamental disruption."
            archetype_example: "Post-Merger Integration, Branchendisruption"
            # ── EXOGENE DOMINANZ ──
            # VUCA = complexity driven by EXTERNAL environmental volatility.
            # The environment imposes regime-switches that overwhelm internal structure.
            # All internal complexity of ENTERPRISE PLUS chaotic external dynamics.
            dominance_type: "exogenous"
            dominance_description: |
              VUCA is characterized by EXOGENE VOLATILITÄT:
              - U is the primary driver (U ≥ 3, typically U4)
              - K is high too (structural complexity exists), but U DOMINATES
              - The environment forces regime-switching: parameters change non-linearly
              - The core challenge: adapting internal structure to external shocks
              - Emphasis: Regime detection, scenario planning, organizational resilience
              - VUCA = ENTERPRISE + regime_switching + accelerated adaptation cycles
            diagnostic_signature:
              U_dominant: true
              K_also_high: "K ≥ 3 (internal complexity exists but is secondary)"
              primary_challenge: "External adaptation under uncertainty"
              key_gamma: "All γ types active, but regime-switching makes γ values TIME-VARIANT"
              risk: "Paralysis, over-analysis, inability to act under ambiguity"
            # KEY DIFFERENTIATOR: regime_switching
            # ENTERPRISE: γ values are stable (can be estimated once)
            # VUCA: γ values shift with regime (must be re-estimated per regime)
            differentiator_from_enterprise: |
              ENTERPRISE: γ(f,f') = constant → estimate once, apply consistently
              VUCA: γ(f,f') = f(regime) → regime detection triggers re-estimation
              Example: γ₅(SAL,MKT) = +0.25 in growth regime, but = -0.10 in crisis regime
              (Sales and Marketing complement each other in growth, but compete for budget in crisis)
            active_components: 37
            value_dimensions: ["V_WTP", "V_WTS", "V_OC", "V_IC", "V_RC", "V_AC"]
            context_tiers: [1, 2, 3, 4]
            gamma_types: ["gamma_psi_psi", "gamma_B_psi", "gamma_V_V", "gamma_cross", "gamma_5_structural"]
            ode_scales: ["micro", "meso", "macro"]
            tipping_points: true
            network_effects: true
            regime_switching: true
            bayesian_hierarchical: true
            functional_decomposition: true
            integration_effectiveness_eta: true
            sub_models: ["SDM-1.0", "SOCM-1.0"]
            predictions_required: 12
            typical_project_duration: "6-18 months"

          # ── ENTERPRISE vs VUCA: Decision Guide ──
          enterprise_vs_vuca_guide:
            description: |
              When the dominance rules yield both ENTERPRISE and VUCA as candidates
              (e.g., S4/K4 with U at borderline 2-3), use this guide:
            decision_rule: |
              IF U ≤ 2:    ENTERPRISE (endogene Dominanz, stable environment)
              IF U ≥ 3:    VUCA (exogene Dominanz, volatile environment)
              IF U = 2-3 borderline:
                → Check U_IND_1 (Forecast Deviation) and U_IND_4 (Technology Substitution)
                → IF either ≥ 3: lean VUCA (leading indicators of disruption)
                → IF both ≤ 2: lean ENTERPRISE (contained volatility)
            practical_consequence: |
              ENTERPRISE → regime_switching = false → γ estimated once → stable model
              VUCA → regime_switching = true → γ re-estimated per regime → adaptive model
              This is the SINGLE most impactful configuration choice:
              it determines whether the model is STATIC or DYNAMIC in its γ-structure.

        # ── TEMPORAL DYNAMICS: RE-EVALUATION TRIGGERS ─────────────────
        # S×U×K is NOT a one-time assessment. Organizations change.
        # These triggers define WHEN to re-assess the configuration profile.
        temporal_dynamics:
          description: |
            The S×U×K Configuration Gate must be RE-EVALUATED when the organization
            undergoes significant structural or environmental change.
            A profile assignment (e.g., STRUCTURED) is valid until a trigger fires.
            Re-evaluation does NOT mean the profile MUST change — it means the
            indicators must be re-scored and the dominance rules re-applied.
          default_review_cycle: "Annual (part of strategy review cycle)"

          # EVENT-BASED TRIGGERS (fire immediately when detected)
          event_triggers:
            - id: "TRG-S-1"
              dimension: "S"
              name: "Headcount Change"
              condition: "Headcount changes by ≥ 25% (growth or reduction)"
              rationale: "Major size change may shift S-level (e.g., S2→S3 after acquisition)"
              data_source: "HR headcount data"
              urgency: "Within 30 days of event"
              example: "Startup grows from 80 to 120 FTE → re-score S indicators"
            - id: "TRG-S-2"
              dimension: "S"
              name: "Geographic Expansion"
              condition: "New country or major market entry"
              rationale: "New jurisdiction changes S_IND_3 (geographic footprint) and K_IND_6 (regulators)"
              data_source: "Strategy/M&A records"
              urgency: "Before market entry decision finalized"
            - id: "TRG-U-1"
              dimension: "U"
              name: "Forecast Variance Spike"
              condition: "Rolling forecast deviation exceeds 30% (vs. prior 12 months)"
              rationale: "Signals regime change — U may have shifted from U2 to U3/U4"
              data_source: "Controlling/FP&A data"
              urgency: "Within 14 days of detection"
              example: "Revenue forecast accuracy drops from ±8% to ±35% → re-score U"
            - id: "TRG-U-2"
              dimension: "U"
              name: "Regulatory Regime Change"
              condition: "Major new regulation announced or existing regulation fundamentally changed"
              rationale: "Directly impacts U_IND_2 (Regulatory Change Frequency)"
              data_source: "Legal/Compliance monitoring"
              urgency: "Within 30 days of announcement"
            - id: "TRG-K-1"
              dimension: "K"
              name: "Reorganization / Restructuring"
              condition: "Organizational restructuring affecting ≥ 3 functions"
              rationale: "Restructuring changes interface density (K_IND_1), reporting lines (K_IND_4)"
              data_source: "CEO/CHRO communication"
              urgency: "Before restructuring implementation"
            - id: "TRG-K-2"
              dimension: "K"
              name: "M&A Integration"
              condition: "Merger, acquisition, or major divestiture"
              rationale: "M&A fundamentally changes K (new γ₅ pairs) and potentially S and U"
              data_source: "M&A project documentation"
              urgency: "Day 1 post-close (integration planning)"
              note: "M&A typically triggers ALL three dimensions — full S×U×K re-assessment required"
            - id: "TRG-MULTI-1"
              dimension: "S×U×K"
              name: "Technology Platform Shift"
              condition: "Core IT system replacement (ERP, CRM) or digital transformation program"
              rationale: "Changes K_IND_7 (IT fragmentation), may enable/disable γ^ΨΨ_INF"
              data_source: "CTO/CIO project portfolio"
              urgency: "Before go-live"

          # THRESHOLD-BASED TRIGGERS (continuous monitoring)
          threshold_triggers:
            - id: "THR-1"
              name: "Indicator Drift"
              condition: "Any single indicator changes by ≥ 2 scale points"
              rationale: "A jump from 1 to 3 is significant even if the mean changes less"
              action: "Re-score affected dimension, check if profile changes"
            - id: "THR-2"
              name: "Profile Boundary"
              condition: "Any dimension score is within 0.3 of a level boundary"
              rationale: "Borderline scores (e.g., U_score = 2.6) may tip with small changes"
              action: "Flag for closer monitoring, consider sensitivity analysis"

          # RE-EVALUATION PROTOCOL
          protocol:
            step_1: "Identify which trigger(s) fired"
            step_2: "Re-score affected dimension indicators (interview + data)"
            step_3: "Re-apply dominance rules (D1-D7)"
            step_4: "Check override rules (OVR-1 to OVR-4)"
            step_5: "Compare new profile with current profile"
            step_6_if_changed: |
              Profile change detected:
              - Document change reason and new scores
              - Identify activation matrix differences (which components activate/deactivate)
              - Plan transition: which new γ-parameters must be estimated?
              - Timeline: 4-8 weeks for re-calibration
            step_6_if_unchanged: |
              Profile confirmed:
              - Document as validation of current configuration
              - Update indicator scores in project documentation
              - Next review: default cycle or next trigger

        # ── ACTIVATION MATRIX (summary) ────────────────────────────────
        activation_matrix:
          description: |
            Binary matrix: which components are active per profile.
            Row = component, Column = profile. 1 = active, 0 = inactive.
