# ── G0 CONFIGURATION ──────────────────────────────────────────────────────
g0_configuration:
  size:
    level: "S2"
    name: "Small"
    score: 2
    rationale: |
      ~250 Mitarbeitende. Grenze S2/S3 (250 ist Schwellenwert).
      Entscheidung S2: Noch keine Divisionalstruktur, funktionale Gliederung,
      CEO kennt die meisten Führungskräfte persönlich.

  uncertainty:
    level: "U2"
    name: "Moderate"
    score: 2
    rationale: |
      Baubranche Schweiz: zyklisch aber vorhersehbar. Konjunkturabhängig,
      aber keine disruptiven Technologie-Schocks. Fachkräftemangel als
      strukturelles (nicht chaotisches) Problem. Regulierung stabil.

  complexity:
    level: "K2"
    name: "Moderate"
    score: 2
    rationale: |
      Mehrere Geschäftsbereiche (Gebäudetechnik, Elektro, ICT, Sanitär),
      aber überschaubare Cross-Dependencies. Kein Matrix, keine
      internationale Verflechtung. Familien-Governance als zusätzliche
      Komplexitätsebene (aber nicht K3, da keine formale Matrix).

  composite_score: 2
  composite_rule: "max(S2=2, U2=2, K2=2) = 2"
  override_check: "Keine Override-Regel greift"
  profile: "STRUCTURED"

# ── ACTIVE COMPONENTS (from Activation Matrix) ────────────────────────────
active_components:
  total: 18

  value_dimensions:
    active: ["V_WTP", "V_WTS", "V_OC", "V_IC"]
    inactive: ["V_RC", "V_AC"]
    rationale: |
      V_RC (Relational Capital): Noch nicht aktiv — Zindel hat starke lokale
      Beziehungen, aber diese sind in V_WTP (Kundenwert) und V_WTS
      (Mitarbeiterbindung) implizit abgebildet. Erst bei Netzwerk-Expansion
      (z.B. Partnerschaften, Ökosystem) separat modellieren.
      V_AC (Adaptive Capacity): Nicht aktiv — bei U2 (moderate Unsicherheit)
      ist Anpassungsfähigkeit kein kritischer Engpass.

  context_tiers:
    active: [1, 2]
    inactive: [3, 4]
    tier_1_canonical:
      - "Ψ_I: Bauregulierung CH, GAV, Arbeitszeitgesetz"
      - "Ψ_S: Teamkultur Handwerk, Generationenmix"
      - "Ψ_K: Schweizer Arbeitsethik, Ostschweizer Pragmatismus"
      - "Ψ_C: Saisonale Belastungsmuster (Winter vs. Sommer)"
      - "Ψ_E: Lohnniveau CH, Fachkräftemangel"
      - "Ψ_T: Konjunkturzyklus Bau, Auftragsvorlauf"
      - "Ψ_M: Digitalisierungsgrad (BIM, ERP, mobile Tools)"
      - "Ψ_F: Baustelle vs. Büro vs. Lager (physische Kontexte)"
    tier_2_organizational:
      - "Ψ_leader: CEO Thomas Zindel, Familien-Governance"
      - "Ψ_culture: Handwerkskultur, Qualitätsanspruch"
      - "Ψ_incentive: Leistungslohn, Projektboni, Beteiligung?"
      - "Ψ_comm: Interne Kommunikation (formell/informell)"
      - "Ψ_struct: Funktionale Gliederung, Bereichsleiter"
    rationale_inactive: |
      Tier 3 (Market): Zindel ist regional verankert, kein Multi-Markt-Wettbewerb.
      Tier 4 (Emergent): Keine emergenten Kontextdimensionen bei U2/K2.

  gamma_types:
    active: ["gamma_psi_psi", "gamma_B_psi"]
    inactive: ["gamma_V_V", "gamma_cross"]
    key_gammas:
      - id: "γ^ΨΨ_culture_incentive"
        value: "Kulturwandel × Anreizsystem — wie verstärken/untergraben sie sich?"
        hypothesis: "Positive Komplementarität wenn Anreize kulturkongruent"
      - id: "γ^ΨΨ_digital_comm"
        value: "Digitalisierung × Kommunikation — BIM verändert Informationsflüsse"
        hypothesis: "Positive wenn begleitet, negativ wenn top-down aufgezwungen"
      - id: "γ^BΨ_safety_culture"
        value: "Sicherheitsverhalten × Teamkultur — peer-effects auf Baustelle"
        hypothesis: "Starke positive Komplementarität (Ichniowski-Effekt)"
      - id: "γ^BΨ_quality_incentive"
        value: "Qualitätsverhalten × Anreizsystem — Extrinsic vs. Intrinsic"
        hypothesis: "Crowding-Out Risiko bei rein finanziellen Qualitätsboni"
    rationale_inactive: |
      γ^VV (Value×Value): Bei 4 Value-Dimensionen noch beherrschbar ohne
      explizite Value-Interaktionen. Wird relevant wenn V_RC/V_AC aktiviert.
      γ^cross (Cross-Level): Keine Mehrebenen-Struktur (kein Divisional/Matrix).

  ode_scales:
    active: ["micro", "meso"]
    inactive: ["macro"]
    micro_examples:
      - "Tägliches Sicherheitsverhalten auf Baustelle"
      - "Kommunikation Bauleiter ↔ Team"
      - "Digitale Tool-Nutzung"
    meso_examples:
      - "Kulturentwicklung über Quartale"
      - "Anreizsystem-Anpassungen"
      - "Führungskräfte-Entwicklung"
    rationale_inactive: |
      Macro (Jahre): Bei einem 6-12 Monats-Projekt nicht direkt relevant.
      Langfrist-Dynamik wird im Monitoring erfasst, aber nicht modelliert.

  advanced_features:
    tipping_points: true
    tipping_point_examples:
      - "Kritische Masse Digitalisierung: Ab ~30% BIM-Nutzung kippt Norm"
      - "Sicherheitskultur: Ab 3 Monate ohne Vorfall → neue Baseline"
      - "Führungswechsel: Bereichsleiter-Rotation als Tipping Event"
    network_effects: false
    regime_switching: false
    bayesian_hierarchical: false

  sub_models:
    active: ["SDM-1.0"]
    inactive: ["SOCM-1.0"]
    rationale: |
      SDM-1.0 (Strategy Design): Aktiv für Prozessgestaltung.
      SOCM-1.0 (Option Comparison): Nicht nötig — Zindel hat eine klare
      Stossrichtung (Transformation), kein Vergleich mehrerer Strategieoptionen.

