# Style Profiles for Paper Generation
# =====================================
# Based on 8D Algorithm (Appendix CCC/DDD)
#
# Dimensions:
#   D1 (knowledge): 0=Laie → 1=Expert
#   D2 (proximity): 0=Fern → 1=Gleiches Feld
#   D3 (scope): 0=Persönlich → 1=Gesellschaftlich
#   D4 (time): 0=Wenig → 1=Viel Lesezeit
#   D5 (goal): G1=Informieren, G2=Handeln, G3=Überzeugen
#   D6 (context): 0=Intern → 1=Extern
#   D7 (emotion): 0=Sachlich → 1=Emotional
#   D8 (persistence): 0=Kurzlebig → 1=Archiv

profiles:
  ernst_fehr:
    name: "Ernst Fehr Academic Style"
    description: "Precise, empirical, formal, direct with minimal hedging"
    dimensions:
      knowledge: 0.9
      proximity: 0.9
      scope: 0.7
      time: 0.8
      goal: G1
      context: 1.0
      emotion: 0.1
      persistence: 0.95
    style:
      hedging: false
      formal_register: true
      use_equations: true
      include_tables: true
      min_references: 40
      max_pages: 50
      sentence_complexity: high
      passive_voice: minimal
    vocabulary:
      preferred:
        - "evidence suggests"
        - "the data indicate"
        - "this finding demonstrates"
        - "contrary to"
        - "consistent with"
      avoid:
        - "it seems"
        - "arguably"
        - "one might say"
        - "perhaps"

  kahneman_tversky:
    name: "Kahneman-Tversky Style"
    description: "Clear, example-rich, accessible yet rigorous"
    dimensions:
      knowledge: 0.8
      proximity: 0.7
      scope: 0.65
      time: 0.7
      goal: G1
      context: 1.0
      emotion: 0.2
      persistence: 0.9
    style:
      hedging: true
      formal_register: true
      use_equations: true
      include_tables: true
      min_references: 30
      max_pages: 40
      sentence_complexity: medium
      passive_voice: moderate
    vocabulary:
      preferred:
        - "consider the following"
        - "this suggests"
        - "an important finding"
        - "the evidence shows"
      avoid:
        - "obviously"
        - "clearly"

  policy_brief:
    name: "Policy Brief Style"
    description: "Action-oriented, concise, decision-focused"
    dimensions:
      knowledge: 0.6
      proximity: 0.4
      scope: 0.85
      time: 0.3
