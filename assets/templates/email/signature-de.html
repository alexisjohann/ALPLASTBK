<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>FehrAdvice E-Mail-Signatur</title>
</head>
<body>
<!--
    FehrAdvice & Partners AG - E-Mail-Signatur (Deutsch)
    =====================================================

    ANLEITUNG:
    1. Ersetzen Sie [PLATZHALTER] mit Ihren Daten
    2. Kopieren Sie den gesamten Inhalt ab <table>
    3. Fügen Sie ihn in Ihre E-Mail-Signatur-Einstellungen ein

    FARBEN:
    - Dunkelblau: #024079
    - Dunkelgrau: #25212A
    - Hellgrau: #666666
-->

<table cellpadding="0" cellspacing="0" border="0" style="font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 13px; line-height: 1.4; color: #25212A;">
    <tr>
        <td style="padding-bottom: 12px;">
            <span style="color: #25212A;">Mit freundlichen Grüssen</span>
        </td>
    </tr>
    <tr>
        <td style="padding-bottom: 15px; border-bottom: 2px solid #024079;">
            <table cellpadding="0" cellspacing="0" border="0">
                <tr>
                    <td>
                        <span style="font-size: 16px; font-weight: 600; color: #024079;">[Vorname Nachname]</span><br>
                        <span style="font-size: 12px; color: #666666;">[Funktion / Titel]</span>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
    <tr>
        <td style="padding-top: 15px;">
            <table cellpadding="0" cellspacing="0" border="0">
                <tr>
                    <td style="vertical-align: top; padding-right: 20px;">
                        <!-- Logo hier einfügen wenn verfügbar -->
                        <span style="font-size: 14px; font-weight: 700; color: #024079;">FEHR</span><span style="font-size: 14px; font-weight: 700; color: #024079;">ADVICE</span>
                    </td>
                    <td style="vertical-align: top; font-size: 12px; color: #666666; line-height: 1.6;">
                        <strong style="color: #024079;">FehrAdvice & Partners AG</strong><br>
                        [Strasse und Hausnummer]<br>
                        [PLZ] [Ort], Schweiz
                    </td>
                </tr>
            </table>
        </td>
    </tr>
    <tr>
        <td style="padding-top: 10px; font-size: 12px; color: #666666;">
            <table cellpadding="0" cellspacing="0" border="0">
                <tr>
                    <td style="padding-right: 20px;">
                        <span style="color: #024079;">T</span> +41 [XX XXX XX XX]
                    </td>
                    <td>
                        <span style="color: #024079;">M</span> +41 [XX XXX XX XX]
                    </td>
                </tr>
            </table>
        </td>
    </tr>
    <tr>
        <td style="padding-top: 5px; font-size: 12px;">
            <a href="mailto:[vorname.nachname]@fehradvice.com" style="color: #024079; text-decoration: none;">[vorname.nachname]@fehradvice.com</a>
            <span style="color: #666666;"> | </span>
            <a href="https://www.fehradvice.com" style="color: #024079; text-decoration: none;">www.fehradvice.com</a>
        </td>
    </tr>
    <tr>
        <td style="padding-top: 15px; font-size: 10px; color: #999999; font-style: italic;">
            Behavioral Economics Consultancy Group
        </td>
    </tr>
</table>

</body>
</html>
