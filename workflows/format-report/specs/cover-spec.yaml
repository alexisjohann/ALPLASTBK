# =============================================================================
# FEHRADVICE COVER SHEET - MASCHINENLESBARE SPEZIFIKATION
# =============================================================================
# Version: 2.0
# Erstellt: 2026-01-29
# SSOT: Diese Datei ist die Single Source of Truth für Cover-Generierung
#
# EINHEITEN:
#   - Alle Masse in Millimetern (mm)
#   - Alle Farben in RGB (0-255) + Hex + CMYK
#   - Alle Schriftgrössen in Punkten (pt)
#   - Koordinatensystem: Ursprung oben links
# =============================================================================

metadata:
  name: "FehrAdvice Cover Sheet"
  version: "2.0"
  created: "2026-01-29"
  updated: "2026-01-29"
  author: "FehrAdvice & Partners AG"
  status: "approved"

# =============================================================================
# SEITENFORMAT
# =============================================================================
page:
  format: "A4"
  orientation: "portrait"
  width_mm: 210
  height_mm: 297

  # Für Druck
  bleed_mm: 3                    # Beschnittzugabe für professionellen Druck
  safe_zone_mm: 5                # Sicherheitsabstand vom Rand für wichtige Inhalte

  # Für Digital (Default)
  digital_bleed_mm: 0            # Kein Beschnitt für Bildschirm

# =============================================================================
# TYPOGRAFIE - Inter als Standardschrift
# =============================================================================
typography:
  # Primäre Schriftfamilie
  font_family:
    name: "Inter"
    fallback: ["Helvetica Neue", "Helvetica", "Arial", "sans-serif"]
    source: "https://fonts.google.com/specimen/Inter"
    license: "SIL Open Font License 1.1"

  # LaTeX-Paket
  latex:
    package: "inter"                # \usepackage{inter}
    fallback_package: "helvet"      # Falls Inter nicht verfügbar

  # Schriftstile
  styles:
    title:
      font_size_pt: 32
      font_weight: 700              # Bold
      line_height: 1.15             # Enger für Headlines
      letter_spacing_em: -0.02      # Leicht enger
      text_transform: "uppercase"
      color_ref: "white"

    subtitle:
      font_size_pt: 18
      font_weight: 400              # Regular
      line_height: 1.3
      letter_spacing_em: 0
      text_transform: "none"
      color_ref: "white"

    meta:                           # Firma, Datum
      font_size_pt: 12
      font_weight: 400
      line_height: 1.5
      letter_spacing_em: 0
      text_transform: "none"
      color_ref: "white"

    logo_fallback:
      font_size_pt: 16
      font_weight: 700
      line_height: 1.0
      letter_spacing_em: 0.05       # Weiter für Logo-Text
      text_transform: "uppercase"
      color_ref: "primary_dark_blue"

# =============================================================================
# FARBEN
# =============================================================================
colors:
  # Primärfarben
  primary_dark_blue:
    name: "FehrAdvice Dunkelblau"
    rgb: [2, 64, 121]
    hex: "#024079"
    cmyk: [98, 47, 0, 53]
    pantone: "534 C"                # Für Druckereien
    usage: ["Hauptflächen", "Headlines", "Links"]

  primary_light_blue:
    name: "FehrAdvice Hellblau"
    rgb: [84, 158, 222]
    hex: "#549EDE"
    cmyk: [62, 29, 0, 13]
    usage: ["Akzente", "Sekundäre Elemente"]

  white:
    name: "Weiss"
    rgb: [255, 255, 255]
    hex: "#FFFFFF"
    cmyk: [0, 0, 0, 0]
    usage: ["Header", "Text auf Blau"]

  primary_dark_gray:
    name: "Dunkelgrau"
    rgb: [37, 33, 42]
    hex: "#25212A"
    cmyk: [12, 21, 0, 84]
    usage: ["Fliesstext auf Weiss"]

  primary_light_gray:
    name: "Hellgrau"
    rgb: [243, 245, 247]
    hex: "#F3F5F7"
    cmyk: [2, 1, 0, 3]
    usage: ["Hintergründe", "Tabellen-Alternation"]

  # Sekundärfarben (für Akzente)
  secondary_lilac:
    rgb: [161, 160, 198]
    hex: "#A1A0C6"

  secondary_mint:
    rgb: [126, 189, 172]
    hex: "#7EBDAC"

  secondary_ocher:
    rgb: [222, 203, 63]
    hex: "#DECB3F"

  secondary_orange:
    rgb: [222, 157, 62]
    hex: "#DE9D3E"

# =============================================================================
# LAYOUT-BEREICHE
# =============================================================================
layout:
  header:
    description: "Weisser Bereich oben mit Logo"
    y_start_mm: 0
    y_end_mm: 25
    height_mm: 25
    background_color_ref: "white"

  main:
    description: "Dunkelblauer Hauptbereich"
    y_start_mm: 25
    y_end_mm: 297
    height_mm: 272
    background_color_ref: "primary_dark_blue"

  content_area:
    description: "Bereich für Text-Inhalte"
    x_start_mm: 20                  # Linker Rand
    x_end_mm: 190                   # Rechter Rand (210 - 20)
    y_start_mm: 90                  # Start Textbereich
    y_end_mm: 270                   # Ende Textbereich
    width_mm: 170                   # Nutzbare Breite

# =============================================================================
# ELEMENTE MIT EXAKTEN POSITIONEN
# =============================================================================
elements:
  logo:
    description: "FehrAdvice Logo rechts oben im Header"
    enabled: true
    position:
      anchor: "top-right"
      x_from_right_mm: 15
      y_from_top_mm: 5
    size:
      height_mm: 15
      width_mm: null                # Automatisch (Seitenverhältnis beibehalten)
      max_width_mm: 50
    clear_space_mm: 8               # Mindestabstand zu anderen Elementen
    file:
      primary: "assets/logo/color/fehradvice-logo-2lines.png"
      alternatives:
        - "assets/logo/color/fehradvice-logo-color-tagline.png"
        - "assets/logo/color/fehradvice-schlussstein-symbol.png"
      format_preference: ["png", "svg"]
      min_resolution_dpi: 300
      notes: |
        Logo ohne Tagline (2-Zeilen: FEHR / ADVICE).
        Extrahiert aus CI-Guide Seite 8, Version "Large, 2 lines".
        1133x272 Pixel bei 300 DPI.
    fallback:
      type: "text"
      lines:
        - text: "FEHR"
          weight: 700
        - text: "ADVICE"
          weight: 700
      style_ref: "logo_fallback"

  title:
    description: "Haupttitel des Dokuments"
    enabled: true
    position:
      anchor: "top-left"
      x_from_left_mm: 20
      y_from_top_mm: 110
    style_ref: "title"
    constraints:
      max_width_mm: 170
      max_lines: 3
      max_characters: 80
      overflow_behavior: "wrap"     # wrap | truncate | shrink
      min_font_size_pt: 24          # Bei shrink: nicht kleiner als
    hyphenation: false              # Keine Silbentrennung

  subtitle:
    description: "Untertitel des Dokuments"
    enabled: true
    position:
      anchor: "top-left"
      x_from_left_mm: 20
      y_from_top_mm: null           # Dynamisch: nach Titel
    spacing:
      after_title_mm: 8
    style_ref: "subtitle"
    constraints:
      max_width_mm: 170
      max_lines: 2
      max_characters: 150
      overflow_behavior: "wrap"
    optional: true                  # Kann leer sein

  company:
    description: "Firmenname"
    enabled: true
    position:
      anchor: "top-left"
      x_from_left_mm: 20
      y_from_top_mm: null           # Dynamisch: nach Untertitel
    spacing:
      after_subtitle_mm: 25
    style_ref: "meta"
    default_value: "FehrAdvice & Partners AG"
    editable: false                 # Normalerweise nicht ändern

  date:
    description: "Datum"
    enabled: true
    position:
      anchor: "top-left"
      x_from_left_mm: 20
      y_from_top_mm: null           # Dynamisch: nach Firma
    spacing:
      after_company_mm: 4
    style_ref: "meta"
    format:
      pattern: "{month_name} {year}"
      locale: "de_CH"
      examples:
        - "Januar 2026"
        - "Februar 2026"
    auto_generate: true             # Wenn leer: aktuelles Datum

  # Optionale Elemente
  client_logo:
    description: "Kundenlogo (optional)"
    enabled: false                  # Default: aus
    position:
      anchor: "top-left"
      x_from_left_mm: 15
      y_from_top_mm: 5
    size:
      height_mm: 12
      max_width_mm: 40
    conditions:
      - "Nur wenn Kunde Logo bereitstellt"
      - "Muss vom Kunden genehmigt sein"

  confidentiality:
    description: "Vertraulichkeitsstufe"
    enabled: false                  # Default: aus
    position:
      anchor: "bottom-center"
      y_from_bottom_mm: 10
    style:
      font_size_pt: 9
      font_weight: 400
      color_ref: "white"
      opacity: 0.7
    values:
      - id: "confidential"
        text_de: "Vertraulich"
        text_en: "Confidential"
      - id: "internal"
        text_de: "Intern"
        text_en: "Internal"
      - id: "public"
        text_de: "Öffentlich"
        text_en: "Public"

# =============================================================================
# PARAMETER (variable Eingabewerte)
# =============================================================================
parameters:
  - name: "title"
    type: "string"
    required: true
    default: "TITEL"
    validation:
      min_length: 1
      max_length: 80
      pattern: null                 # Keine Einschränkung
    description: "Haupttitel des Dokuments"
    examples:
      - "PROJEKTBRIEFING"
      - "STRATEGISCHE ANALYSE"
      - "BEHAVIORAL INSIGHTS"

  - name: "subtitle"
    type: "string"
    required: false
    default: ""
    validation:
      max_length: 150
    description: "Untertitel (optional)"
    examples:
      - "Kundenverhalten im digitalen Zeitalter"
      - "Q1 2026 Report"

  - name: "company"
    type: "string"
    required: false
    default: "FehrAdvice & Partners AG"
    validation:
      max_length: 100
    description: "Firmenname"

  - name: "date"
    type: "date"
    required: false
    default: null                   # Auto: aktuelles Datum
    format: "MMMM YYYY"             # Januar 2026
    locale: "de_CH"
    description: "Publikationsdatum"

  - name: "logo_path"
    type: "filepath"
    required: false
    default: "assets/fehradvice-logo.png"
    validation:
      file_exists: true
      extensions: [".png", ".svg", ".pdf"]
    description: "Pfad zum Logo"

  - name: "document_type"
    type: "enum"
    required: false
    default: "report"
    options:
      - id: "report"
        label: "Report"
      - id: "briefing"
        label: "Projektbriefing"
      - id: "proposal"
        label: "Proposal"
      - id: "presentation"
        label: "Präsentation"
    description: "Art des Dokuments"

# =============================================================================
# DOKUMENTTYP-VARIANTEN
# =============================================================================
variants:
  report:
    description: "Standard-Report"
    title_prefix: null

  briefing:
    description: "Projektbriefing"
    title_prefix: "PROJEKTBRIEFING"
    subtitle_becomes_title: true

  proposal:
    description: "Angebot/Proposal"
    title_prefix: "PROPOSAL"

  presentation:
    description: "Präsentation"
    page_format: "16:9"             # Anderes Format
    width_mm: 338
    height_mm: 190

# =============================================================================
# VALIDIERUNGSREGELN
# =============================================================================
validation:
  rules:
    - id: "VAL-001"
      severity: "error"
      element: "title"
      rule: "not_empty"
      message_de: "Titel darf nicht leer sein"
      message_en: "Title must not be empty"

    - id: "VAL-002"
      severity: "error"
      element: "title"
      rule: "max_length"
      value: 80
      message_de: "Titel darf max. 80 Zeichen haben"

    - id: "VAL-003"
      severity: "error"
      element: "colors.primary_dark_blue.rgb"
      rule: "exact_match"
      value: [2, 64, 121]
      message_de: "Dunkelblau muss RGB(2,64,121) sein"

    - id: "VAL-004"
      severity: "warning"
      element: "logo"
      rule: "file_exists"
      message_de: "Logo-Datei nicht gefunden, verwende Fallback"

    - id: "VAL-005"
      severity: "error"
      element: "typography.font_family.name"
      rule: "exact_match"
      value: "Inter"
      message_de: "Schriftart muss Inter sein"

# =============================================================================
# RENDERING
# =============================================================================
rendering:
  # Reihenfolge der Elemente
  layer_order:
    1: "background"                 # Hintergrundfarben
    2: "logo"                       # Logo
    3: "title"                      # Titel
    4: "subtitle"                   # Untertitel
    5: "meta"                       # Firma, Datum
    6: "optional"                   # Optionale Elemente

  # Ausgabeformate
  outputs:
    pdf:
      engine: "latex"
      template: "templates/fehradvice-cover.latex"
      color_profile: "sRGB"         # Für Digital

    pdf_print:
      engine: "latex"
      template: "templates/fehradvice-cover.latex"
      color_profile: "CMYK"         # Für Druck
      include_bleed: true

    png:
      engine: "imagemagick"
      dpi: 300
      background: "white"

    svg:
      engine: "inkscape"
      embed_fonts: true

# =============================================================================
# QUALITÄTSPRÜFUNG
# =============================================================================
quality_checklist:
  - id: "QC-001"
    check: "Header ist weiss, 25mm hoch"
    automated: true

  - id: "QC-002"
    check: "Logo rechts oben, 15mm Abstand vom Rand"
    automated: true

  - id: "QC-003"
    check: "Hauptbereich ist Dunkelblau #024079"
    automated: true

  - id: "QC-004"
    check: "Alle Texte sind weiss"
    automated: true

  - id: "QC-005"
    check: "Alle Texte sind linksbündig"
    automated: true

  - id: "QC-006"
    check: "Schriftart ist Inter"
    automated: true

  - id: "QC-007"
    check: "Titel ist 32pt Bold"
    automated: true

  - id: "QC-008"
    check: "Keine Rechtschreibfehler"
    automated: false

  - id: "QC-009"
    check: "Datum ist korrekt"
    automated: false

# =============================================================================
# BEISPIELE
# =============================================================================
examples:
  minimal:
    title: "TITEL"
    subtitle: ""
    company: "FehrAdvice & Partners AG"
    date: "Januar 2026"

  standard:
    title: "BEHAVIORAL INSIGHTS"
    subtitle: "Kundenverhalten im Energiesektor"
    company: "FehrAdvice & Partners AG"
    date: "Januar 2026"

  full:
    title: "STRATEGISCHE ANALYSE"
    subtitle: "Digitale Transformation der Kundeninteraktion"
    company: "FehrAdvice & Partners AG"
    date: "Januar 2026"
    document_type: "report"
    confidentiality: "confidential"
