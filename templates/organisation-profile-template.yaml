# =============================================================================
# ORGANISATIONS-PROFIL TEMPLATE
# Single Source of Truth für Kunden/Organisationen
# =============================================================================
# SSOT: templates/organisation-profile-template.yaml
# Version: 1.0
# Erstellt: 2026-02-04
#
# VERWENDUNG:
# 1. Kopieren nach: data/customers/{org}/{org}_profile.yaml
# 2. Platzhalter {ORG}, {ORG_NAME}, etc. ersetzen
# 3. Nicht benötigte optionale Felder löschen
# =============================================================================

# =============================================================================
# IDENTIFIKATION (PFLICHT)
# =============================================================================
id: "ORG-{NNN}"
slug: "{org}"  # Ordnername, lowercase, keine Sonderzeichen
name: "{ORG_NAME}"
short_name: "{ORG_KURZNAME}"
legal_name: "{ORG_NAME} AG"  # Mit Rechtsform

# =============================================================================
# KLASSIFIKATION (PFLICHT)
# =============================================================================
classification:
  industry: "{INDUSTRY}"  # finance | packaging | construction | fmcg | pharma_health | energy | technology | public_sector | manufacturing | retail | professional_services
  industry_subcategory: "{SUBCATEGORY}"
  segment: "{SEGMENT}"  # enterprise | mid_market | smb | government | ngo

  # Grösse
  employee_count: null  # Anzahl Mitarbeiter
  revenue_eur: null     # Jahresumsatz in EUR

  # Geografie
  headquarters:
    country: "CH"  # ISO-Code
    city: "{CITY}"
    canton: "{CANTON}"  # Nur CH
  geographic_scope: "national"  # local | national | european | global

# =============================================================================
# KONTAKTE (Personen bei diesem Kunden)
# =============================================================================
contacts:
  # Liste aller Person-Profile in diesem Ordner
  - file: "{person}_profile.yaml"
    role: "primary"  # primary | secondary | former

# =============================================================================
# SALES STATUS (Lead-Tracking)
# =============================================================================
sales:
  # Aktive Leads für diesen Kunden
  active_leads: []  # z.B. ["LEAD-049"]

  # Abgeschlossene Leads (Won/Lost)
  closed_leads: []

  # Aktive Projekte
  active_projects: []  # z.B. ["PRJ-001"]

  # Gesamtstatus
  customer_status: "prospect"  # prospect | active | dormant | churned
  customer_since: null  # Datum des ersten gewonnenen Deals

  # Umsatz
  lifetime_value_eur: null
  annual_value_eur: null

# =============================================================================
# BEZIEHUNG ZU FEHRADVICE
# =============================================================================
relationship:
  owner: "{OWNER_CODE}"  # GF, EB, MR, etc.

  # Erstkontakt
  first_contact:
    date: "{YYYY-MM-DD}"
    channel: "{CHANNEL}"  # REFERRAL | INBOUND | OUTBOUND | RESEARCH
    via: "{KONTAKTPERSON oder EVENT}"

  # Beziehungsstärke
  relationship_strength: "cold"  # cold | warm | hot | partner

  # Anrede-Default für Organisation
  formality: "Sie"  # Du | Sie (Default für neue Kontakte)

# =============================================================================
# ORGANISATION HINTERGRUND (optional)
# =============================================================================
background:
  description: |
    {Kurzbeschreibung der Organisation, 2-3 Sätze}

  # Wichtige Fakten
  facts:
    - "{Fakt 1}"
    - "{Fakt 2}"

  # Aktuelle Situation / Herausforderungen
  current_situation: |
    {Was beschäftigt die Organisation aktuell?}

  # Strategische Prioritäten
  strategic_priorities:
    - "{Priorität 1}"
    - "{Priorität 2}"

# =============================================================================
# BEHAVIORAL INSIGHTS (EBF-spezifisch, optional)
# =============================================================================
behavioral_profile:
  # Organisations-Kultur
  decision_culture: null  # hierarchical | consensus | agile | bureaucratic

  # Innovation & Change
  change_readiness: null  # resistant | cautious | open | eager
  ai_readiness: null  # none | exploring | experimenting | adopting

  # Für EBF relevante Kontextfaktoren
  ebf_context:
    psi_dimensions: []  # Relevante Ψ-Dimensionen
    notes: null

# =============================================================================
# DOKUMENTE
# =============================================================================
documents:
  # Deliverables (an Kunden geliefert)
  deliverables: []

  # Interne Dokumente
  internal: []

# =============================================================================
# QUELLEN
# =============================================================================
sources:
  website: "{https://...}"
  linkedin: null
  other: []

# =============================================================================
# METADATA
# =============================================================================
metadata:
  created: "{YYYY-MM-DD}"
  updated: "{YYYY-MM-DD}"
  created_by: "Claude Code"
  version: "1.0"
  template_version: "1.0"
  changes:
    - version: "1.0"
      date: "{YYYY-MM-DD}"
      description: "Initial creation"
