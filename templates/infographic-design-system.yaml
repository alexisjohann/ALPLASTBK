# ============================================================================
# INFOGRAPHIC DESIGN SYSTEM — Single Source of Truth (SSOT)
# ============================================================================
# Extrahiert aus 4+ validierten NotebookLM-Infografiken (SPÖ Inflation,
# prio.suisse Medikamente, EMRK-Strategie, Prävention/Gesundheit)
#
# Version: 1.0
# Erstellt: 2026-02-06
# Autor: FehrAdvice & Partners AG
# Verwendung: NotebookLM Infographic Generator (Google)
# Skill: /infographic
# ============================================================================

meta:
  version: "1.0"
  created: "2026-02-06"
  ssot_for: "NotebookLM Infographic Prompts"
  validated_against:
    - "SPÖ Inflation Landscape (Score 8.5/10)"
    - "SPÖ Inflation Portrait (Score 9.0/10)"
    - "prio.suisse Medikamentenpreise"
    - "EMRK-Strategie der SPÖ"
    - "Prävention statt Zwei-Klassen-Medizin"
  platform:
    name: "Google NotebookLM"
    constraint: "Kann nicht iterieren — jeder Prompt muss KOMPLETT sein"
    formats: ["landscape", "portrait", "square"]
    detail_levels: ["concise", "standard", "detailed"]

# ============================================================================
# 1. FARBSYSTEM (3+1 Regel)
# ============================================================================
colors:
  rule: "Nur 3 Farben + 1 Hintergrund. Keine Ausnahmen."
  primary:
    name: "Rot"
    hex: "#E3000F"
    usage: "Icons, Killer-Zahlen, Akzente, Balken"
    note: "SPÖ-Rot. Bei anderen Kunden: Primärfarbe des Kunden verwenden."
  secondary:
    name: "Schwarz"
    hex: "#1A1A1A"
    usage: "Headlines, Fliesstext, Rahmenlinien"
  tertiary:
    name: "Weiss"
    hex: "#FFFFFF"
    usage: "Hintergrund, Text auf dunklen Flächen"
  accent:
    name: "Hellgrau"
    hex: "#F5F5F5"
    usage: "Box-Hintergründe, Tabellen-Alternation, Trenner"
  forbidden:
    - "Farbverläufe (Gradients)"
    - "Schatten (Drop Shadows)"
    - "Mehr als 3+1 Farben"
    - "Transparenzen"

# ============================================================================
# 2. TYPOGRAFIE
# ============================================================================
typography:
  headline:
    style: "Bold, Versalien oder Mixed Case"
    size_primary: "28-36pt (abhängig von Format)"
    color: "Schwarz oder Weiss auf Rot-Banner"
  killer_number:
    primary:
      size: "72pt"
      color: "Rot"
      max_count: 1
      rule: "DIE eine Zahl, die alles sagt"
    secondary:
      size: "48pt"
      color: "Rot oder Schwarz"
      max_count: 2
      rule: "Stützende Zahlen, nie wichtiger als Primary"
  body:
    style: "Regular"
    size: "12-14pt"
    color: "Schwarz"
    max_words_per_cluster: 25
  source_line:
    size: "8-10pt"
    color: "Grau (#666666)"
    content: "Quelle: {QUELLE} | Stand: {DATUM}"
    position: "bottom_right"

# ============================================================================
# 3. ICON-SYSTEM
# ============================================================================
icons:
  style: "Flat Line Art"
  color: "Rot (einfarbig)"
  complexity: "Einfach — erkennbar in 0.5 Sekunden"
  forbidden:
    - "3D-Icons"
    - "Foto-realistische Icons"
    - "Mehrfarbige Icons"
    - "Icons mit Schatten"
  recommended_per_section: 1
  usage: "Jeder Informations-Cluster bekommt EIN Icon"

# ============================================================================
# 4. LAYOUT-ARCHITEKTUR (pro Format)
# ============================================================================
formats:
  landscape:
    aspect_ratio: "16:9"
    use_case: "Präsentation, Desktop, Social Media Querformat"
    architecture:
      header:
        height_percent: 20
        content: "Rot-Banner mit Titel + Untertitel"
        elements:
          - "Action Title (These + Richtung)"
          - "Untertitel mit Kontext"
      content:
        height_percent: 55
        layout: "2 Spalten"
        left_column:
          label: "TREND / PROBLEM"
          elements:
            - "Killer-Zahl (Starburst oder Kreis)"
            - "Trendlinie oder Vergleich"
            - "1-2 Kontext-Datenpunkte"
        right_column:
          label: "LÖSUNG / MASSNAHMEN"
          elements:
            - "3 Massnahmen-Cards mit Icons"
            - "Jede Card: Icon + Titel + 1 Zahl + 1 Satz"
      summary:
        height_percent: 25
        content: "Fakten-Check Tabelle oder Vergleichstabelle"
        elements:
          - "3-4 Spalten Vergleich (vorher/nachher oder Land A/B)"
          - "Ehrlichkeits-Linie (Behavioral Inoculation)"
          - "Fazit-Satz"

  portrait:
    aspect_ratio: "9:16"
    use_case: "Mobile, Instagram Story, vertikales Scrollen"
    architecture:
      sections: 7
      flow: "Vertikal — von oben nach unten lesen"
      section_1:
        label: "HEADER"
        content: "Rot-Banner mit Action Title"
      section_2:
        label: "KILLER-ZAHL"
        content: "Grosser Starburst oder Kreis mit Primary Number"
      section_3:
        label: "TREND + KONTEXT"
        content: "Trendlinie oder 2-3 Kontext-Datenpunkte"
      section_4:
        label: "EHRLICHKEITS-LINIE"
        content: "Behavioral Inoculation — kleine Konzession"
        behavioral_science: "McGuire (1961) Inoculation Theory"
      section_5:
        label: "MASSNAHMEN"
        content: "3 Schritte mit Checkmarks und konkreten Zahlen"
      section_6:
        label: "VERGLEICH"
        content: "Tabelle oder Side-by-Side (vorher/nachher oder wir/sie)"
      section_7:
        label: "CLOSER"
        content: "Hashtag + Claim + Quellenangabe"

  square:
    aspect_ratio: "1:1"
    use_case: "Instagram Feed, Social Media Quadrat"
    architecture:
      layout: "2x2 Grid"
      header:
        position: "top_full_width"
        content: "Rot-Banner mit Action Title"
      grid:
        top_left:
          label: "KILLER-ZAHL"
          content: "Primary Number mit Kontext"
        top_right:
          label: "MASSNAHMEN"
          content: "3 Checkmark-Items"
        bottom_left:
          label: "VERGLEICH"
          content: "Mini-Tabelle oder Before/After"
        bottom_right:
          label: "BELEGE"
          content: "3 Massnahmen mit Icons und Zahlen"
      closer:
        position: "bottom_full_width"
        content: "Hashtag + Fazit + Quelle"

# ============================================================================
# 5. INHALTLICHE REGELN
# ============================================================================
content_rules:
  action_title:
    rule: "Titel ist THESE + RICHTUNG, nicht Beschreibung"
    good_examples:
      - "Preise runter, Löhne rauf"
      - "Ordnung statt Chaos"
      - "Prävention statt Zwei-Klassen-Medizin"
    bad_examples:
      - "Übersicht zur Inflationsentwicklung"
      - "Aktuelle Wirtschaftsdaten"
      - "Zusammenfassung der Massnahmen"

  killer_numbers:
    rule: "Maximal 1 Primary + 2 Secondary. Jede Zahl muss KONKRET sein."
    hierarchy:
      primary: "Die EINE Zahl, die die Kernbotschaft transportiert"
      secondary: "Stützende Zahlen, die die Primary kontextualisieren"
    forbidden:
      - "Vage Adjektive statt Zahlen ('hohe Strafen' → '15.000 €')"
      - "Prozent ohne Basis ('50% weniger' → '50% weniger als 2022')"
      - "Veraltete Zahlen ohne Datum"

  information_clusters:
    min: 4
    max: 7
    rule: "Jeder Cluster = 1 Icon + 1 Titel + max 25 Worte + min 1 Zahl"

  ehrlichkeits_linie:
    rule: "PFLICHT bei politischen Infografiken"
    purpose: "Behavioral Inoculation — kleine Konzession VOR dem Hauptargument"
    theory: "McGuire (1961): Inoculation steigert Überzeugungskraft um 20-40%"
    example: "«Gegen die Teuerung gewinnt man nie ganz — aber man kann sie bremsen.»"
    position: "Vor den Massnahmen (Section 4 bei Portrait, im Summary bei Landscape)"

  source_line:
    rule: "PFLICHT — Datum und Quelle müssen EXPLIZIT im Prompt stehen"
    warning: "NotebookLM halluziniert Daten/Quellen wenn nicht explizit vorgegeben"
    format: "Quelle: {Konkrete Institution} | Stand: {Monat Jahr}"

  bottom_anchor:
    rule: "Jede Infografik braucht einen visuellen Anker unten"
    options:
      - "Fakten-Check Tabelle (3-4 Spalten)"
      - "Vergleichstabelle (vorher/nachher)"
      - "Card-Reihe (3 nebeneinander)"
      - "Fazit-Box mit Hashtag"

# ============================================================================
# 6. VERHALTENSÖKONOMISCHE PRINZIPIEN
# ============================================================================
behavioral_economics:
  anchoring:
    rule: "Primary Killer-Zahl wird zuerst wahrgenommen → setzt den Anker"
    application: "Grösste Zahl = stärkstes Argument als Anchor"

  framing:
    rule: "Immer Gain-Frame für eigene Massnahmen, Loss-Frame für Status Quo"
    application: "Massnahmen = 'Entlastung von X €', Problem = 'Verlust von Y €'"

  inoculation:
    rule: "Kleine Schwäche eingestehen VOR dem Hauptargument"
    application: "Ehrlichkeits-Linie (s.o.)"
    source: "McGuire (1961), Compton (2013)"

  social_proof:
    rule: "Vergleiche mit erfolgreichen Beispielen zeigen"
    application: "Ländervergleich, Best-Practice Tabelle"

  salience:
    rule: "Das Wichtigste ist das Grösste und Röteste"
    application: "Killer-Zahl in 72pt Rot"

  processing_fluency:
    rule: "Einfach zu verarbeiten = überzeugender"
    application: "Max 7 Cluster, max 25 Worte pro Cluster, klare Hierarchie"

# ============================================================================
# 7. QUALITÄTS-GATES & 3-ITERATIONEN QA-LOOP (PFLICHT)
# ============================================================================
#
# LEARNING (SPÖ Inflation, 2026-02-06):
# Score-Verlauf war 6.0 → 8.0 → 8.5 → 9.0 über 4 Iterationen.
# Jede Iteration fand ANDERE Fehler. Minimum 3 Runden sind PFLICHT.
# NotebookLM kann nicht iterieren → jede Runde = NEUER KOMPLETTER Prompt.
#
quality_gates:
  pre_generation:
    - "Alle Zahlen mit Quelle und Datum verifiziert?"
    - "Action Title ist These (nicht Beschreibung)?"
    - "Ehrlichkeits-Linie formuliert?"
    - "Max 1 Primary + 2 Secondary Killer Numbers?"
    - "Quellenangabe mit konkretem Datum im Prompt?"

  post_generation:
    - "Wurden alle Zahlen korrekt übernommen (keine Halluzination)?"
    - "Stimmt das Datum in der Quellenangabe?"
    - "Sind alle 3 Farben eingehalten (keine Extra-Farben)?"
    - "Hat jeder Cluster mindestens eine Zahl?"
    - "Ist die Ehrlichkeits-Linie vorhanden?"
    - "Stimmt die Leserichtung (Links=Problem, Rechts=Lösung)?"

  # ════════════════════════════════════════════════════════════════════════
  # 3-ITERATIONEN QA-LOOP (PFLICHT — Minimum 3 Runden!)
  # ════════════════════════════════════════════════════════════════════════
  #
  # WARUM 3 RUNDEN?
  # Runde 1 findet: Strukturfehler, fehlende Elemente, falsches Layout
  # Runde 2 findet: Halluzinationen, falsche Zahlen, vage Adjektive
  # Runde 3 findet: Feinheiten — Datum, Quellenformat, Hierarchie
  #
  # Jede Runde = NEUER kompletter Prompt (NotebookLM kann nicht iterieren)
  #
  iteration_loop:
    min_iterations: 3
    target_score: 8.0
    release_score: 8.5
    excellence_score: 9.0

    runde_1:
      name: "Struktur & Vollständigkeit"
      fokus:
        - "Sind alle Elemente vorhanden? (Header, Killer-Zahl, Massnahmen, Vergleich, Closer)"
        - "Stimmt die Architektur? (2 Spalten bei Landscape, 7 Sektionen bei Portrait, 2x2 bei Square)"
        - "Ist die Leserichtung klar? (Links=Problem, Rechts=Lösung)"
        - "Sind alle 3 Massnahmen mit konkreten Zahlen dargestellt?"
        - "Ist die Ehrlichkeits-Linie vorhanden und richtig platziert?"
      typische_fehler:
        - "Fehlende Sektion (z.B. kein Vergleich)"
        - "Falsches Layout (z.B. 3 Spalten statt 2)"
        - "Ehrlichkeits-Linie fehlt oder falsch platziert"
        - "Zu viele Cluster (>7)"
      aktion_bei_fail: "Prompt-Architektur überarbeiten, fehlende Blöcke ergänzen"
      erwarteter_score: "6.0-7.5"

    runde_2:
      name: "Daten-Integrität & Halluzinationen"
      fokus:
        - "Stimmen ALLE Zahlen exakt mit der Quelle überein?"
        - "Hat NotebookLM Daten halluziniert? (falsche Jahreszahl, erfundene Quelle)"
        - "Stehen konkrete Zahlen statt vager Adjektive? ('15.000 €' nicht 'hohe Strafen')"
        - "Ist das Datum in der Quellenangabe korrekt?"
        - "Sind die Vergleichswerte korrekt? (z.B. Orbán: 3,7% nicht 4,1%)"
      typische_fehler:
        - "NotebookLM schreibt 'Oktober 2023' statt 'Jänner 2026'"
        - "NotebookLM schreibt 'Nationale Statistikämter' statt 'Statistik Austria'"
        - "'Hohe Strafen' statt '15.000 €'"
        - "Zahlen gerundet oder verfälscht"
      aktion_bei_fail: "Halluzinierte Stellen im Prompt EXPLIZITER machen, Zahlen ausschreiben"
      erwarteter_score: "7.5-8.5"

    runde_3:
      name: "Feinschliff & Verhaltensökonomie"
      fokus:
        - "Ist der Anchor (Killer-Zahl) das visuell dominanteste Element?"
        - "Wirkt der Gain-Frame für Massnahmen? (Entlastung, nicht Kosten)"
        - "Ist die Ehrlichkeits-Linie GENAU richtig formuliert? (nicht zu schwach, nicht zu stark)"
        - "Passt der Closer? (Hashtag + Fazit + korrekte Quelle)"
        - "Ist die Zielgruppe getroffen? (Sprache, Kanal, Format)"
        - "Gibt es Angriffsfläche? (Cherry-Picking, fehlender Kontext)"
      typische_fehler:
        - "Anchor nicht dominant genug (zu klein, falsche Farbe)"
        - "Ehrlichkeits-Linie zu schwach ('manchmal schwierig') oder zu stark ('geht nicht')"
        - "Vergleich unfair → Angriffsfläche"
        - "Sprache zu technisch für Zielgruppe"
      aktion_bei_fail: "Nuancen im Prompt anpassen, Formulierungen schärfen"
      erwarteter_score: "8.5-9.5"

    runde_bonus:
      name: "Exzellenz (optional, bei Score < 9.0 nach Runde 3)"
      fokus:
        - "Gibt es EIN Element, das den Score von 8.5 auf 9.0+ hebt?"
        - "Ist der emotionale Bogen vollständig? (Problem → Lösung → Beweis → Hoffnung)"
        - "Würde ein Journalist diese Grafik ohne Änderung verwenden?"
      erwarteter_score: "9.0-10.0"

    workflow:
      beschreibung: |
        RUNDE 1: Prompt generieren → In NotebookLM einfügen → Bild scoren
                 → Struktur-Fixes in neuem Prompt einbauen
        RUNDE 2: Neuen Prompt generieren → In NotebookLM einfügen → Bild scoren
                 → Halluzinations-Fixes in neuem Prompt einbauen
        RUNDE 3: Neuen Prompt generieren → In NotebookLM einfügen → Bild scoren
                 → Feinschliff-Fixes (falls nötig)

        ≥ 8.5 nach Runde 3 → FREIGABE
        < 8.5 nach Runde 3 → Runde 4 (Bonus)
        < 8.0 nach Runde 3 → Grundsätzliche Überarbeitung nötig

    tracking:
      format: |
        ## Iterations-Protokoll
        | Runde | Fokus | Score | Fixes |
        |-------|-------|-------|-------|
        | R1 | Struktur | _/10 | [...] |
        | R2 | Daten | _/10 | [...] |
        | R3 | Feinschliff | _/10 | [...] |
        | R4* | Exzellenz | _/10 | [...] |

        *optional
      pflicht_dokumentation:
        - "Score pro Runde"
        - "Konkrete Fixes zwischen Runden"
        - "Finale Version mit Score ≥ 8.5"

# ============================================================================
# 8. NOTEBOOKLM-SPEZIFISCHE REGELN
# ============================================================================
notebooklm:
  critical_constraints:
    - "Kann NICHT iterieren — jeder Prompt muss KOMPLETT sein"
    - "Halluziniert Daten wenn nicht explizit vorgegeben"
    - "Halluziniert Quellen wenn nicht explizit vorgegeben"
    - "Interpretiert 'hohe Strafen' als vagen Text statt '15.000 €'"
    - "Setzt falsche Jahreszahlen wenn Zeitraum nicht explizit ist"

  prompt_rules:
    - "ALLE Zahlen explizit mit Einheit im Prompt nennen"
    - "Quellenangabe als EXAKTEN Text vorgeben"
    - "Farbcodes als Hex-Werte angeben"
    - "Layout-Anweisungen spatial beschreiben (links/rechts/oben/unten)"
    - "Bei Vergleichstabellen: Alle Zeilen und Spalten ausschreiben"
    - "Keine impliziten Annahmen — alles explizit"

# ============================================================================
# 9. ANPASSUNG FÜR ANDERE KUNDEN
# ============================================================================
customization:
  per_customer:
    colors:
      rule: "Primärfarbe des Kunden ersetzt Rot"
      example:
        spo: "#E3000F (SPÖ-Rot)"
        fehradvice: "#024079 (FA-Dunkelblau)"
        lukb: "#006341 (LUKB-Grün)"

    ehrlichkeits_linie:
      political: "PFLICHT"
      corporate: "EMPFOHLEN (erhöht Glaubwürdigkeit)"
      scientific: "NICHT NÖTIG (Hedging übernimmt die Rolle)"

    hashtag:
      rule: "Kunden-spezifischer Hashtag im Closer"
      examples:
        spo: "#OrdnenStattSpalten"
        fehradvice: "#EvidenceBasedDecisions"
