# =============================================================================
# PROJECT SCOPE TEMPLATE - FehrAdvice & Partners AG
# =============================================================================
# Verwendung: Für jedes neue Projekt die Scope-Definition erstellen
# Speicherort: data/customers/{kunde}/projects/{projekt_id}_scope.yaml
#
# Superkey Format: PRJ-{KUNDE}-{NNN}
# Reference: Appendix BN REF-SUPERKEY
#
# Version: 1.0.0
# Created: 2026-01-28
# =============================================================================

# =============================================================================
# PROJEKT-IDENTIFIKATION
# =============================================================================
project_id: "PRJ-{KUNDE}-{NNN}"
project_name: "[Projektname]"
client: "[Kundenname]"
lead_id: "LEAD-{NNN}"  # Referenz zur Lead-Datenbank

status: "SCOPING"  # SCOPING | APPROVED | ACTIVE | COMPLETED | ON_HOLD | CANCELLED

created: "YYYY-MM-DD"
updated: "YYYY-MM-DD"
author: "[Wer hat das Scope erstellt]"
owner: "[FehrAdvice Partner Code, z.B. GF, EB, MR]"

# Projektvolumen (CHF)
volume:
  type: "[FIXED | RANGE | TBD]"
  amount_chf: null           # Exakter Betrag (bei FIXED)
  range_min_chf: null        # Untergrenze (bei RANGE)
  range_max_chf: null        # Obergrenze (bei RANGE)
  billing_model: "[FIXED_PRICE | TIME_AND_MATERIALS | RETAINER | BLENDED]"
  notes: null                # z.B. "Exkl. Reisekosten", "Phase 1 only"

# Projektmitarbeitende
team:
  fa_team:   # FehrAdvice-Seite
    - name: "[Name]"
      role: "Project Lead"
      owner_code: "[z.B. GF]"
      allocation_pct: 100     # Auslastung in % (z.B. 50 = halbtags)
    - name: "[Name]"
      role: "[z.B. Senior Consultant, Analyst, Data Scientist]"
      owner_code: null
      allocation_pct: null
  client_team:   # Kundenseite
    - name: "[Name]"
      role: "[z.B. Projektleiter, Fachexperte]"
      availability: "[z.B. 2 Tage/Woche]"
    - name: "[Name]"
      role: "[Rolle]"
      availability: null
  external:   # Externe Partner (optional)
    - name: null
      organization: null
      role: null

# Zeitdauer
duration:
  start_date: "YYYY-MM-DD"
  end_date: "YYYY-MM-DD"
  duration_weeks: null        # Automatisch berechnet oder manuell
  duration_months: null       # Alternative Angabe
  phases:
    - phase: 1
      name: "[Phase 1 Name, z.B. Analyse]"
      start: "YYYY-MM-DD"
      end: "YYYY-MM-DD"
      duration: "[z.B. 4 Wochen]"
    - phase: 2
      name: "[Phase 2 Name, z.B. Konzept]"
      start: "YYYY-MM-DD"
      end: "YYYY-MM-DD"
      duration: "[z.B. 6 Wochen]"
  milestones:
    - name: "[z.B. Kick-off]"
      date: "YYYY-MM-DD"
      type: "HARD"  # HARD | SOFT
    - name: "[z.B. Zwischenpräsentation]"
      date: "YYYY-MM-DD"
      type: "SOFT"

# =============================================================================
# 1. ZIEL (SMART)
# =============================================================================
# Was soll am Ende des Projekts erreicht sein?
# SMART: Specific, Measurable, Achievable, Relevant, Time-bound

goal:
  statement: |
    [Ziel in einem klaren Satz formulieren]

  smart_criteria:
    specific: "[Was genau?]"
    measurable: "[Wie messen wir Erfolg?]"
    achievable: "[Warum ist es erreichbar?]"
    relevant: "[Warum ist es wichtig für den Kunden?]"
    time_bound: "[Bis wann?]"

  success_metrics:
    - metric: "[KPI 1]"
      baseline: "[Ausgangswert]"
      target: "[Zielwert]"
      measurement_method: "[Wie messen?]"

    - metric: "[KPI 2]"
      baseline: "[Ausgangswert]"
      target: "[Zielwert]"
      measurement_method: "[Wie messen?]"

# =============================================================================
# 2. IN-SCOPE (Was ist Teil des Projekts)
# =============================================================================
in_scope:
  # Aktivitäten die durchgeführt werden
  activities:
    - id: "IS-1"
      description: "[Aktivität 1]"
      deliverable: "[Was entsteht daraus?]"

    - id: "IS-2"
      description: "[Aktivität 2]"
      deliverable: "[Was entsteht daraus?]"

  # Bereiche/Abteilungen die einbezogen werden
  organizational_scope:
    - "[Bereich 1, z.B. Vertrieb]"
    - "[Bereich 2, z.B. Marketing]"

  # Geografischer Scope
  geographic_scope:
    - "[Region 1, z.B. DACH]"
    - "[Region 2, z.B. Schweiz national]"

  # Zeitlicher Scope (Details siehe top-level "duration" Sektion)
  temporal_scope_ref: "→ Siehe duration (Projekt-Identifikation)"

# =============================================================================
# 3. OUT-OF-SCOPE (Was ist NICHT Teil des Projekts)
# =============================================================================
# KRITISCH: Explizit definieren was NICHT gemacht wird, um Scope Creep zu vermeiden

out_of_scope:
  - id: "OS-1"
    item: "[Was nicht gemacht wird]"
    reason: "[Warum nicht]"
    alternative: "[Wie wird es stattdessen adressiert? z.B. 'Folge-Projekt']"

  - id: "OS-2"
    item: "[Was nicht gemacht wird]"
    reason: "[Warum nicht]"
    alternative: null

# =============================================================================
# 4. LIEFEROBJEKTE (Deliverables)
# =============================================================================
deliverables:
  - id: "DEL-1"
    name: "[Name des Deliverables]"
    description: "[Beschreibung]"
    format: "[z.B. PDF Report, Workshop, YAML-Datenbank, Präsentation]"
    due_date: "YYYY-MM-DD"
    acceptance_criteria:
      - "[Kriterium 1]"
      - "[Kriterium 2]"
    owner: "[Wer ist verantwortlich]"
    status: "PLANNED"  # PLANNED | IN_PROGRESS | REVIEW | DELIVERED | ACCEPTED

  - id: "DEL-2"
    name: "[Name des Deliverables]"
    description: "[Beschreibung]"
    format: "[Format]"
    due_date: "YYYY-MM-DD"
    acceptance_criteria:
      - "[Kriterium 1]"
    owner: "[Verantwortlich]"
    status: "PLANNED"

# =============================================================================
# 5. NEBENBEDINGUNGEN (Constraints)
# =============================================================================
constraints:
  # Budget (Details siehe top-level "volume" Sektion)
  budget_ref: "→ Siehe volume (Projekt-Identifikation)"

  # Zeitliche Constraints (Termine siehe top-level "duration" Sektion)
  timeline:
    hard_deadline: null  # Falls es eine nicht verhandelbare Deadline gibt
    blackout_periods:
      - "[z.B. Weihnachtsferien 23.12-06.01]"

  # Ressourcen-Constraints (Team siehe top-level "team" Sektion)
  resources:
    required_skills:
      - "[Skill 1]"
      - "[Skill 2]"

  # Technische/Organisatorische Constraints
  technical:
    - "[z.B. 'Muss mit SAP integrierbar sein']"
    - "[z.B. 'Keine Cloud-Speicherung sensibler Daten']"

  # Regulatorische Constraints
  regulatory:
    - "[z.B. 'FINMA-Compliance erforderlich']"
    - "[z.B. 'DSGVO-konform']"

# =============================================================================
# 6. ANNAHMEN (Assumptions)
# =============================================================================
# Was nehmen wir an? Falls Annahmen nicht zutreffen, muss Scope angepasst werden

assumptions:
  - id: "ASM-1"
    assumption: "[Annahme]"
    risk_if_false: "[Was passiert wenn Annahme nicht stimmt]"
    validation_method: "[Wie prüfen wir die Annahme]"

  - id: "ASM-2"
    assumption: "[Annahme]"
    risk_if_false: "[Risiko]"
    validation_method: "[Validierung]"

# =============================================================================
# 7. RISIKEN
# =============================================================================
risks:
  - id: "RSK-1"
    description: "[Risiko-Beschreibung]"
    probability: "MEDIUM"  # LOW | MEDIUM | HIGH
    impact: "HIGH"  # LOW | MEDIUM | HIGH
    mitigation: "[Wie reduzieren wir das Risiko?]"
    owner: "[Wer ist verantwortlich für Mitigation]"

  - id: "RSK-2"
    description: "[Risiko-Beschreibung]"
    probability: "LOW"
    impact: "MEDIUM"
    mitigation: "[Mitigation]"
    owner: "[Owner]"

# =============================================================================
# 8. STAKEHOLDER
# =============================================================================
stakeholders:
  # Projektteam → Siehe top-level "team" Sektion für Zuordnung & Auslastung
  # Hier: Governance-Rollen (Sponsor, Decision Maker, etc.)
  client_side:
    - name: "[Name]"
      role: "[Rolle beim Kunden]"
      type: "SPONSOR"  # SPONSOR | DECISION_MAKER | KEY_USER | SUBJECT_EXPERT
      involvement: "[z.B. 'Kick-off, Steering, Final Review']"
      email: null

    - name: "[Name]"
      role: "[Rolle]"
      type: "KEY_USER"
      involvement: "[Involvement]"
      email: null

  fa_side_ref: "→ Siehe team.fa_team (Projekt-Identifikation)"

# =============================================================================
# 9. ABHÄNGIGKEITEN
# =============================================================================
dependencies:
  # Was muss VOR Projektstart erledigt sein?
  prerequisites:
    - "[z.B. 'NDA unterzeichnet']"
    - "[z.B. 'Zugang zu CRM-Daten']"

  # Von welchen externen Faktoren hängt der Erfolg ab?
  external:
    - "[z.B. 'Verfügbarkeit von Kundendaten']"
    - "[z.B. 'Board-Genehmigung für Budget']"

  # Verknüpfung zu anderen Projekten
  related_projects:
    - project_id: null
      relationship: null  # PREDECESSOR | SUCCESSOR | PARALLEL | DEPENDENT

# =============================================================================
# 10. CHANGE MANAGEMENT
# =============================================================================
change_management:
  # Wie werden Scope-Änderungen gehandhabt?
  change_process: |
    1. Change Request schriftlich einreichen
    2. Impact Assessment (Zeit, Budget, Qualität)
    3. Genehmigung durch [Sponsor/Steering]
    4. Scope-Dokument aktualisieren

  # Wer darf Änderungen genehmigen?
  approval_authority:
    minor_changes: "[z.B. 'Project Lead']"  # < 10% Budget/Zeit
    major_changes: "[z.B. 'Steering Committee']"  # > 10% Budget/Zeit

  # Change Log
  change_log: []
    # - date: "YYYY-MM-DD"
    #   description: "[Was wurde geändert]"
    #   requested_by: "[Wer]"
    #   approved_by: "[Wer]"
    #   impact: "[Auswirkung]"

# =============================================================================
# 11. GENEHMIGUNG
# =============================================================================
approval:
  client_approval:
    name: null
    role: null
    date: null
    signature_ref: null  # Link zu unterschriebenem Dokument

  fa_approval:
    name: null
    role: null
    date: null

# =============================================================================
# EBF INTEGRATION
# =============================================================================
ebf_integration:
  # Verknüpfung zu EBF-Registries
  intervention_registry_ref: null  # PRJ-XXX in intervention-registry.yaml
  customer_registry_ref: null  # CUS-XXX
  case_registry_refs: []  # Relevante Cases

  # 10C Dimensionen die adressiert werden
  target_10c_dimensions:
    - dimension: null  # WHO, WHAT, HOW, WHEN, WHERE, AWARE, READY, STAGE
      delta_goal: null  # Was soll sich ändern?

  # Geplante Interventionstypen
  planned_interventions: []

# =============================================================================
# NOTES
# =============================================================================
notes: |
  [Freitext für zusätzliche Informationen]

# =============================================================================
# VERSION HISTORY
# =============================================================================
version_history:
  - version: "1.0"
    date: "YYYY-MM-DD"
    author: "[Autor]"
    changes: "Initial scope definition"
