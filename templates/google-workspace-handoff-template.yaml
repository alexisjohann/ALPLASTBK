# =============================================================================
# GOOGLE WORKSPACE HANDOFF TEMPLATE
# =============================================================================
# Zweck: Maschinenlesbare CI/CD-Referenz für externe Design-Tools
# Ablage: data/customers/{kunde}/ci-cd/google-workspace-handoff.yaml
# Nicht zum Drucken - nur für Systeme (NotebookLM, Slides, Docs, Canva)
# =============================================================================
# VERWENDUNG:
# 1. Template kopieren nach data/customers/{kunde}/ci-cd/
# 2. Kunden-CI-Werte eintragen (oder Placeholder markieren)
# 3. Bei Deliverable: YAML + Markdown an externes Tool übergeben
# =============================================================================

client: ""                    # Kundenname
ci_status: ""                 # COMPLETE | PARTIAL | INCOMPLETE
last_updated: ""              # YYYY-MM-DD

# -----------------------------------------------------------------------------
# LOGO
# -----------------------------------------------------------------------------
logo:
  available: false            # true | false
  file: null                  # Pfad zur Datei oder null
  fallback: ""                # z.B. "Kundenname in Primärfarbe"

# -----------------------------------------------------------------------------
# FARBEN (Hex-Codes für Copy-Paste)
# -----------------------------------------------------------------------------
colors:
  # Primär (Hauptfarbe)
  primary: ""                 # z.B. "#024079"
  primary_light: ""           # Hellere Variante

  # Text
  text_dark: "#1A1A1A"        # Standard Dunkelgrau
  text_muted: "#6B7280"       # Für Untertitel, Captions
  text_light: "#FFFFFF"       # Auf dunklem Hintergrund

  # Hintergrund
  bg_white: "#FFFFFF"
  bg_light: "#F8FAFC"         # Leichtes Grau
  bg_accent: ""               # Highlight-Boxen

  # Akzent (Links, Buttons)
  accent: ""

  # Chart-Farben (für Diagramme, in Reihenfolge)
  chart:
    - ""                      # Primär
    - ""                      # Sekundär
    - ""                      # Tertiär

# -----------------------------------------------------------------------------
# SCHRIFTEN (Google Fonts Namen)
# -----------------------------------------------------------------------------
fonts:
  headline: ""                # z.B. "Roboto", "Inter"
  headline_weight: "700"      # Bold
  body: ""                    # z.B. "Open Sans", "Inter"
  body_weight: "400"          # Regular

  # Für Google Fonts Import (falls bekannt)
  google_fonts_import: ""     # z.B. "Roboto:wght@400;700"

  # Fallback wenn Font nicht verfügbar
  fallback: "Arial, Helvetica, sans-serif"

# -----------------------------------------------------------------------------
# STIL
# -----------------------------------------------------------------------------
style:
  tone: ""                    # z.B. "sachlich, professionell"
  corners: "4px"              # Border-radius für Boxen
  shadows: "subtle"           # none | subtle | medium

# -----------------------------------------------------------------------------
# ORTHOGRAPHIE
# -----------------------------------------------------------------------------
orthography:
  # Schweiz: ss statt ß
  eszett: false               # true = ß verwenden, false = ss

  # Gendering
  gendering: ":"              # ":" | "*" | "_" | "none"

  # Anführungszeichen
  quotes: "«»"                # Schweiz: «» | Deutschland: „"

  # Tausendertrennzeichen
  thousands: "'"              # Schweiz: ' | Deutschland: .

# -----------------------------------------------------------------------------
# NOTEBOOKLM / AI PROMPT
# -----------------------------------------------------------------------------
# Diesen Prompt in NotebookLM/Gemini verwenden:

notebooklm_prompt: |
  Gestalte dieses Dokument für {client}:

  FARBEN:
  - Primär: {primary}
  - Text: {text_dark}
  - Hintergrund: {bg_white}

  SCHRIFT:
  - {headline} für Headlines
  - {body} für Text

  STIL:
  - {tone}
  - Viel Weissraum
  - Klare Hierarchie
  - Professionell

  FORMAT:
  - Titelfolie
  - Executive Summary
  - Inhalt strukturiert
  - Key Statistics hervorheben
  - Fazit

# -----------------------------------------------------------------------------
# METADATEN
# -----------------------------------------------------------------------------
_template:
  id: "TPL-GWH-001"
  name: "Google Workspace Handoff"
  version: "1.0"
  created: "2026-02-04"
