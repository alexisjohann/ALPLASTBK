# =============================================================================
# TEMPLATE: Documents Section für Kunden-/Personen-Profile
# =============================================================================
# SSOT: templates/customer-documents-section.yaml
# Version: 1.0
# Erstellt: 2026-02-04
# =============================================================================
# ANWENDUNG:
#   Dieses Template in jedes Kunden-/Personen-Profil einfügen,
#   das Dokumente trackt. Kopieren und anpassen.
#
# REFERENZ-IMPLEMENTIERUNG:
#   data/customers/prio-swiss/saskia_schenker_profile.yaml
# =============================================================================

# KOPIERE AB HIER IN DAS PROFIL:
# -----------------------------------------------------------------------------

# =============================================================================
# DOKUMENTE (Deliverables & Interne Dokumente)
# =============================================================================
documents:

  # ---------------------------------------------------------------------------
  # Deliverables: An Kunde/Kontakt gelieferte Dokumente
  # ---------------------------------------------------------------------------
  deliverables:
    - id: DOC-{KUNDE}-001              # Format: DOC-{KUNDE_KÜRZEL}-{NNN}
      name: "{Dokumentname}"
      file: "outputs/sessions/{SESSION_ID}/{filename}.md"
      type: "analyse"                  # analyse | report | praesentation | offerte
      format: "markdown"               # markdown | pdf | pptx | docx
      status: "final"                  # draft | review | final
      created: "YYYY-MM-DD"
      meeting_ref: "MTG-YYYY-MM-DD-NNN"        # Optional: Verknüpftes Meeting
      session_ref: "EBF-S-YYYY-MM-DD-XXX-NNN"  # Optional: Verknüpfte EBF-Session
      beschreibung: |
        Kurze Beschreibung des Dokuments und seines Zwecks.
      versand:                         # Optional: Nur bei pending Versand
        geplant: "YYYY-MM-DD"
        status: "pending"              # pending | sent | confirmed

  # ---------------------------------------------------------------------------
  # Meeting-Reports: Dokumentation von Meetings
  # ---------------------------------------------------------------------------
  meeting_reports:
    - id: DOC-{KUNDE}-MR-001           # Format: DOC-{KUNDE_KÜRZEL}-MR-{NNN}
      name: "Meeting-Report {Name}"
      file: "outputs/sessions/{SESSION_ID}/meeting-report-{name}.md"
      type: "meeting_report"
      format: "markdown"
      status: "final"
      created: "YYYY-MM-DD"
      meeting_ref: "MTG-YYYY-MM-DD-NNN"
      template_used: "TPL-MTG-001"     # TPL-MTG-001 (voll) | TPL-MTG-002 (kurz)

  # ---------------------------------------------------------------------------
  # Begleitschreiben: Follow-up Emails zu Meetings
  # ---------------------------------------------------------------------------
  begleitschreiben:
    - id: DOC-{KUNDE}-BGL-001          # Format: DOC-{KUNDE_KÜRZEL}-BGL-{NNN}
      name: "Begleitschreiben {Thema}"
      file: "outputs/sessions/{SESSION_ID}/begleitschreiben-{name}.md"
      type: "begleitschreiben"
      format: "markdown"
      status: "final"
      created: "YYYY-MM-DD"
      meeting_ref: "MTG-YYYY-MM-DD-NNN"
      template_used: "TPL-BGL-001"

  # ---------------------------------------------------------------------------
  # Internal: Interne Dokumente (Profile, Notizen, Analysen)
  # ---------------------------------------------------------------------------
  internal:
    - id: DOC-{KUNDE}-INT-001          # Format: DOC-{KUNDE_KÜRZEL}-INT-{NNN}
      name: "{Name} Profil"
      file: "data/customers/{kunde}/{name}_profile.yaml"
      type: "person_profile"           # person_profile | org_profile | notizen | analyse
      format: "yaml"
      status: "aktiv"                  # aktiv | archiviert
      created: "YYYY-MM-DD"
      updated: "YYYY-MM-DD"

# =============================================================================
# ID-KONVENTIONEN
# =============================================================================
# DOC-{KUNDE}-{NNN}        Deliverables (001-999)
# DOC-{KUNDE}-MR-{NNN}     Meeting-Reports
# DOC-{KUNDE}-BGL-{NNN}    Begleitschreiben
# DOC-{KUNDE}-INT-{NNN}    Interne Dokumente
#
# Beispiele:
#   DOC-PRIO-001           → prio.swiss Deliverable #1
#   DOC-LUKB-MR-003        → LUKB Meeting-Report #3
#   DOC-UBS-INT-007        → UBS Internes Dokument #7
# =============================================================================

# =============================================================================
# VERKNÜPFUNGEN
# =============================================================================
# meeting_ref    → data/meeting-registry.yaml (MTG-YYYY-MM-DD-NNN)
# session_ref    → data/model-building-session.yaml (EBF-S-...)
# template_used  → data/meeting-registry.yaml templates section (TPL-xxx)
# =============================================================================

# =============================================================================
# STATUS-WERTE
# =============================================================================
# Dokument-Status:
#   draft     = In Arbeit
#   review    = Zur Überprüfung
#   final     = Fertiggestellt
#   archiviert = Nicht mehr aktiv
#
# Versand-Status:
#   pending   = Noch nicht versendet
#   sent      = Versendet
#   confirmed = Empfang bestätigt
# =============================================================================
