# =============================================================================
# CONTEXT VECTOR TEMPLATE: SCHNELL (~30 Faktoren)
# =============================================================================
# Version: 1.0.0
# Framework: EBF Context Vector Architecture (CVA)
# Use Case: Quick Assessment, Pitch, Screening
# Erstellungszeit: 2-4 Stunden
# =============================================================================
#
# ANLEITUNG:
# 1. Kopiere diese Datei nach: data/dr-datareq/sources/clients/<kunde>/external/
# 2. Benenne um zu: BCM2_MIKRO_<KUNDE>_context.yaml
# 3. Ersetze alle <PLATZHALTER> mit kundenspezifischen Werten
# 4. Validiere mit: python scripts/check_context_vector_compliance.py <datei>
#
# =============================================================================

metadata:
  name: "<KUNDENNAME> Schnellkontext"
  code: "BCM2_MIKRO_<KUERZEL>"
  layer: "mikro"
  version: "1.0"
  last_updated: "<YYYY-MM-DD>"
  cva_stufe: "SCHNELL"
  total_factors: 32
  description: |
    Schneller Kontextvektor für <KUNDENNAME>.
    Enthält Ψ-Dimensionen, Kernsegmente und Verhaltensparameter.

    Zweck: <Quick Assessment / Pitch / Screening>

  hierarchy:
    parent: "BCM2_MESO_<BRANCHE>_CH"
    grandparent: "BCM2_04_KON (MAKRO Schweiz)"

  ebf_mapping:
    primary_10c:
      - "WHO"      # Wer sind die Stakeholder?
      - "WHAT"     # Was treibt Verhalten?
      - "WHEN"     # Welcher Kontext?
    primary_psi:
      - "kappa_INST"
      - "kappa_SOCIAL"
      - "kappa_IDENTITY"

# =============================================================================
# ORGANISATION (~8 Faktoren)
# =============================================================================
organisation:
  name_de: "<Vollständiger Firmenname>"
  name_short: "<Kürzel>"

  # Grösse
  employees: <ZAHL>
  revenue_chf_mio: <ZAHL>
  # Für Banken:
  # bilanzsumme_chf_mrd: <ZAHL>
  # aum_chf_mrd: <ZAHL>

  # Klassifikation
  industry: "<Branche>"
  sub_industry: "<Unterbranche>"
  ownership: "<privat/öffentlich/genossenschaft/kotiert>"

  # Geografie
  headquarters: "<Stadt>"
  geographic_scope: "<lokal/regional/national/international>"

  # Strategie (Kurzform)
  strategy_name: "<Strategie 2030>"
  strategy_pillars:
    - "<Säule 1>"
    - "<Säule 2>"
    - "<Säule 3>"

# =============================================================================
# Ψ-DIMENSIONEN (8 Faktoren)
# =============================================================================
# Skala: 0.0 (niedrig) bis 1.0 (hoch)
# Jede Dimension = 1 aggregierter Wert + kurze Begründung
# =============================================================================

psi_dimensions:

  psi_I_institutional:
    value: <0.00-1.00>
    label: "Institutionell"
    description: |
      <Welche Regeln, Gesetze, Defaults gelten?>
      <Wie stark ist die regulatorische Einbettung?>
    key_factors:
      - "<Faktor 1: z.B. Staatsgarantie>"
      - "<Faktor 2: z.B. FINMA-Regulierung>"
    ebf_kappa: "kappa_INST"

  psi_S_social:
    value: <0.00-1.00>
    label: "Sozial"
    description: |
      <Wer ist dabei? Welche sozialen Normen?>
      <Wie stark sind Peer Effects?>
    key_factors:
      - "<Faktor 1: z.B. Regionale Identität>"
      - "<Faktor 2: z.B. Mitarbeiter als Kunden>"
    ebf_kappa: "kappa_SOCIAL"

  psi_C_cognitive:
    value: <0.00-1.00>
    label: "Kognitiv"
    description: |
      <Wie komplex sind die Entscheidungen?>
      <Wie hoch ist die kognitive Last?>
    key_factors:
      - "<Faktor 1: z.B. Produktkomplexität>"
      - "<Faktor 2: z.B. Digitalkompetenz>"
    ebf_kappa: "kappa_COG"

  psi_K_cultural:
    value: <0.00-1.00>
    label: "Kulturell"
    description: |
      <Welche kulturellen Werte dominieren?>
      <Wie konservativ/progressiv ist die Zielgruppe?>
    key_factors:
      - "<Faktor 1: z.B. Schweizer Konservativismus>"
      - "<Faktor 2: z.B. Nachhaltigkeitsbewusstsein>"
    ebf_kappa: "kappa_CULT"

  psi_E_economic:
    value: <0.00-1.00>
    label: "Ökonomisch"
    description: |
      <Welche Ressourcen sind verfügbar?>
      <Wie ist die Kaufkraft/Finanzsituation?>
    key_factors:
      - "<Faktor 1: z.B. Durchschnittseinkommen Region>"
      - "<Faktor 2: z.B. Vermögenskonzentration>"
    ebf_kappa: "kappa_ECON"

  psi_T_temporal:
    value: <0.00-1.00>
    label: "Temporal"
    description: |
      <Welcher Zeithorizont dominiert?>
      <Wie stark ist Zeitdruck/Langfristdenken?>
    key_factors:
      - "<Faktor 1: z.B. Generationenwechsel>"
      - "<Faktor 2: z.B. Strategiehorizont>"
    ebf_kappa: "kappa_TEMP"

  psi_M_material:
    value: <0.00-1.00>
    label: "Materiell"
    description: |
      <Welche technologische Infrastruktur?>
      <Welche Tools/Kanäle sind verfügbar?>
    key_factors:
      - "<Faktor 1: z.B. Digital Banking Penetration>"
      - "<Faktor 2: z.B. Filialnetz>"
    ebf_kappa: "kappa_MAT"

  psi_F_physical:
    value: <0.00-1.00>
    label: "Physisch"
    description: |
      <Wo finden Interaktionen statt?>
      <Online vs. Offline Mix?>
    key_factors:
      - "<Faktor 1: z.B. Filialbesuche/Jahr>"
      - "<Faktor 2: z.B. App-Nutzung>"
    ebf_kappa: "kappa_PHYS"

# =============================================================================
# KUNDENSEGMENTE (~4-6 Segmente, je ~4 Faktoren = 16-24 Faktoren)
# =============================================================================

customer_segments:

  - id: "SEG-01"
    name: "<Segmentname 1>"
    description: "<Kurzbeschreibung>"
    share: <0.00-1.00>  # Anteil am Kundenstamm

    behavioral_parameters:
      lambda_loss_aversion: <1.50-3.00>
      beta_present_bias: <0.70-1.00>
      kappa_default_sensitivity: <0.40-0.90>
      sigma_social_proof: <0.30-0.80>

    intervention_affinity:
      high: ["<z.B. Digital Nudges>", "<Defaults>"]
      medium: ["<z.B. Social Proof>"]
      low: ["<z.B. Persönliche Beratung>"]

  - id: "SEG-02"
    name: "<Segmentname 2>"
    description: "<Kurzbeschreibung>"
    share: <0.00-1.00>

    behavioral_parameters:
      lambda_loss_aversion: <1.50-3.00>
      beta_present_bias: <0.70-1.00>
      kappa_default_sensitivity: <0.40-0.90>
      sigma_social_proof: <0.30-0.80>

    intervention_affinity:
      high: ["<...>"]
      medium: ["<...>"]
      low: ["<...>"]

  - id: "SEG-03"
    name: "<Segmentname 3>"
    description: "<Kurzbeschreibung>"
    share: <0.00-1.00>

    behavioral_parameters:
      lambda_loss_aversion: <1.50-3.00>
      beta_present_bias: <0.70-1.00>
      kappa_default_sensitivity: <0.40-0.90>
      sigma_social_proof: <0.30-0.80>

    intervention_affinity:
      high: ["<...>"]
      medium: ["<...>"]
      low: ["<...>"]

  - id: "SEG-04"
    name: "<Segmentname 4>"
    description: "<Kurzbeschreibung>"
    share: <0.00-1.00>

    behavioral_parameters:
      lambda_loss_aversion: <1.50-3.00>
      beta_present_bias: <0.70-1.00>
      kappa_default_sensitivity: <0.40-0.90>
      sigma_social_proof: <0.30-0.80>

    intervention_affinity:
      high: ["<...>"]
      medium: ["<...>"]
      low: ["<...>"]

# =============================================================================
# AGGREGIERTE VERHALTENSPARAMETER
# =============================================================================
# Gewichtete Durchschnitte über alle Segmente
# =============================================================================

behavioral_parameters_aggregate:

  core_parameters:
    loss_aversion:
      symbol: "λ"
      value: <2.00-2.50>
      range: [<min>, <max>]
      source: "Segment-gewichteter Durchschnitt"

    present_bias:
      symbol: "β"
      value: <0.80-0.90>
      range: [<min>, <max>]
      source: "Segment-gewichteter Durchschnitt"

    default_sensitivity:
      symbol: "κ_default"
      value: <0.60-0.75>
      range: [<min>, <max>]
      source: "Segment-gewichteter Durchschnitt"

    social_proof:
      symbol: "σ_social"
      value: <0.50-0.65>
      range: [<min>, <max>]
      source: "Segment-gewichteter Durchschnitt"

# =============================================================================
# STRATEGISCHE IMPLIKATIONEN (Quick Assessment)
# =============================================================================

strategic_implications:

  top_3_opportunities:
    - dimension: "<10C-Dimension, z.B. AWARE>"
      opportunity: "<Beschreibung>"
      intervention_type: "<z.B. Information Salience>"

    - dimension: "<10C-Dimension>"
      opportunity: "<Beschreibung>"
      intervention_type: "<...>"

    - dimension: "<10C-Dimension>"
      opportunity: "<Beschreibung>"
      intervention_type: "<...>"

  top_3_risks:
    - risk: "<Beschreibung>"
      mitigation: "<Empfehlung>"

    - risk: "<Beschreibung>"
      mitigation: "<Empfehlung>"

    - risk: "<Beschreibung>"
      mitigation: "<Empfehlung>"

  recommended_next_step: |
    <Empfehlung für nächsten Schritt>
    <z.B. "Upgrade auf STANDARD für vollständiges Interventions-Design">

# =============================================================================
# UPGRADE-PFAD
# =============================================================================

upgrade_path:
  current_level: "SCHNELL"
  next_level: "STANDARD"
  requirements_for_upgrade:
    - "Zugang zu Geschäftsberichten (3 Jahre)"
    - "Interview mit Management (2-3 Stunden)"
    - "Kundensegmentierungs-Daten"
  estimated_effort: "1-2 Tage"
  recommended_trigger: "<z.B. Projektbudget > CHF 50k>"

# =============================================================================
# METADATEN
# =============================================================================

_validation:
  min_factors: 25
  min_completion: 0.80
  min_ebf_mapping: 0.50

_changelog:
  - version: "1.0"
    date: "<YYYY-MM-DD>"
    author: "<Name>"
    changes: "Initiale Erstellung"
