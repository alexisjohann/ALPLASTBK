# =============================================================================
# SLIDE-TYPE DEFINITIONEN - PPTX Generator
# =============================================================================
# Definiert alle verfügbaren Slide-Typen mit ihren Textfeldern und Layouts
#
# Version: 1.0
# Date: January 2026
# =============================================================================

metadata:
  name: "EBF Slide Types"
  version: "1.0"
  created: "2026-01-26"
  total_types: 12

# =============================================================================
# SLIDE-TYPEN
# =============================================================================

slide_types:

  # ---------------------------------------------------------------------------
  # TYPE 01: TITLE - Titelfolie
  # ---------------------------------------------------------------------------
  TITLE:
    description: "Titelfolie mit Haupttitel, Untertitel und Meta-Informationen"
    use_for: ["session_start", "section_divider"]

    layout:
      background: "white"
      has_logo: true
      has_footer: false

    elements:
      - id: "main_title"
        type: "text"
        content_source: "session.question"
        style:
          font: "headline"
          size: 44
          color: "primary.darkblue"
          bold: true
          align: "center"
        position:
          x: 0.5
          y: 2.0
          width: 12.333
          height: 1.5

      - id: "subtitle"
        type: "text"
        content_source: "template"
        template: "Eine verhaltensökonomische Analyse"
        style:
          font: "subheadline"
          size: 24
          color: "primary.darkgray"
          align: "center"
        position:
          x: 0.5
          y: 3.6
          width: 12.333
          height: 0.6

      - id: "meta_info"
        type: "text"
        content_source: "template"
        template: |
          Session: {session_id}
          Fragesteller: {author}
          Datum: {date}
        style:
          font: "body"
          size: 14
          color: "semantic.neutral"
          align: "center"
        position:
          x: 0.5
          y: 5.0
          width: 12.333
          height: 1.0

      - id: "company"
        type: "text"
        content_source: "static"
        text: "FehrAdvice & Partners AG\nEvidence-Based Framework (EBF)"
        style:
          font: "body"
          size: 14
          color: "primary.darkblue"
          bold: true
          align: "center"
        position:
          x: 0.5
          y: 6.2
          width: 12.333
          height: 0.8

      - id: "illustration"
        type: "image"
        content_source: "graphic"
        graphic_id: "title_illustration"
        optional: true
        position:
          x: 9.5
          y: 1.5
          width: 3.5
          height: 3.5

  # ---------------------------------------------------------------------------
  # TYPE 02: EXECUTIVE_SUMMARY - Zusammenfassung mit KPIs
  # ---------------------------------------------------------------------------
  EXECUTIVE_SUMMARY:
    description: "Executive Summary mit Kernbefund und Key Metrics"
    use_for: ["summary", "overview"]

    layout:
      background: "white"
      has_logo: true
      has_footer: true

    elements:
      - id: "title"
        type: "text"
        content_source: "static"
        text: "Executive Summary"
        style:
          font: "headline"
          size: 36
          color: "primary.darkblue"
          bold: true
        position:
          x: 0.5
          y: 0.3
          width: 12.333
          height: 0.8

      - id: "quote_box"
        type: "shape"
        shape_type: "rounded_rectangle"
        fill: "primary.lightgray"
        elements:
          - id: "quote_text"
            type: "text"
            content_source: "session.key_finding_main"
            style:
              font: "body"
              size: 20
              color: "primary.darkgray"
              italic: true
              align: "center"
        position:
          x: 0.5
          y: 1.3
          width: 12.333
          height: 1.2

      - id: "kpi_table"
        type: "table"
        content_source: "session.kpis"
        columns: 2
        style:
          header_style: "fa_header"
          alternating_rows: true
        position:
          x: 0.5
          y: 2.8
          width: 5.5
          height: 2.5

      - id: "takeaway"
        type: "text"
        content_source: "session.main_implication"
        style:
          font: "body"
          size: 18
          color: "primary.darkblue"
          bold: true
        position:
          x: 0.5
          y: 5.8
          width: 12.333
          height: 0.8

  # ---------------------------------------------------------------------------
  # TYPE 03: DATA_CHART - Daten-Visualisierung
  # ---------------------------------------------------------------------------
  DATA_CHART:
    description: "Slide mit prominentem Chart und Erklärungstext"
    use_for: ["data_visualization", "results"]

    layout:
      background: "white"
      has_logo: true
      has_footer: true

    elements:
      - id: "title"
        type: "text"
        content_source: "dynamic"
        style:
          font: "headline"
          size: 36
          color: "primary.darkblue"
          bold: true
        position:
          x: 0.5
          y: 0.3
          width: 12.333
          height: 0.8

      - id: "chart"
        type: "image"
        content_source: "graphic"
        graphic_id: "dynamic"  # Wird zur Laufzeit bestimmt
        position:
          x: 0.5
          y: 1.3
          width: 7.5
          height: 4.5

      - id: "insight_box"
        type: "shape"
        shape_type: "rounded_rectangle"
        fill: "primary.lightgray"
        elements:
          - id: "insight_title"
            type: "text"
            content_source: "static"
            text: "Kernbefund"
            style:
              font: "headline"
              size: 18
              color: "primary.darkblue"
              bold: true

          - id: "insight_text"
            type: "text"
            content_source: "dynamic"
            style:
              font: "body"
              size: 16
              color: "primary.darkgray"
        position:
          x: 8.3
          y: 1.3
          width: 4.5
          height: 4.5

      - id: "source"
        type: "text"
        content_source: "dynamic"
        style:
          font: "body"
          size: 11
          color: "semantic.neutral"
        position:
          x: 0.5
          y: 6.0
          width: 7.5
          height: 0.4

  # ---------------------------------------------------------------------------
  # TYPE 04: TWO_COLUMN - Zwei Spalten
  # ---------------------------------------------------------------------------
  TWO_COLUMN:
    description: "Zweispaltiges Layout für Vergleiche oder Text+Grafik"
    use_for: ["comparison", "text_with_visual"]

    layout:
      background: "white"
      has_logo: true
      has_footer: true

    elements:
      - id: "title"
        type: "text"
        content_source: "dynamic"
        style:
          font: "headline"
          size: 36
          color: "primary.darkblue"
          bold: true
        position:
          x: 0.5
          y: 0.3
          width: 12.333
          height: 0.8

      - id: "left_column"
        type: "container"
        position:
          x: 0.5
          y: 1.3
          width: 5.8
          height: 5.0

      - id: "right_column"
        type: "container"
        position:
          x: 6.8
          y: 1.3
          width: 5.8
          height: 5.0

  # ---------------------------------------------------------------------------
  # TYPE 05: BULLET_LIST - Aufzählungsliste
  # ---------------------------------------------------------------------------
  BULLET_LIST:
    description: "Slide mit Bullet-Points"
    use_for: ["key_points", "list"]

    layout:
      background: "white"
      has_logo: true
      has_footer: true

    elements:
      - id: "title"
        type: "text"
        content_source: "dynamic"
        style:
          font: "headline"
          size: 36
          color: "primary.darkblue"
          bold: true
        position:
          x: 0.5
          y: 0.3
          width: 12.333
          height: 0.8

      - id: "bullets"
        type: "bullet_list"
        content_source: "dynamic"
        max_items: 6
        style:
          font: "body"
          size: 20
          color: "primary.darkgray"
          bullet_color: "primary.darkblue"
          line_spacing: 1.5
        position:
          x: 0.5
          y: 1.5
          width: 12.333
          height: 4.5

  # ---------------------------------------------------------------------------
  # TYPE 06: COMPARISON - Vergleich (✓/✗)
  # ---------------------------------------------------------------------------
  COMPARISON:
    description: "Zwei-Spalten-Vergleich mit Check/Cross Icons"
    use_for: ["pros_cons", "do_dont", "when_works"]

    layout:
      background: "white"
      has_logo: true
      has_footer: true

    elements:
      - id: "title"
        type: "text"
        content_source: "dynamic"
        style:
          font: "headline"
          size: 36
          color: "primary.darkblue"
          bold: true
        position:
          x: 0.5
          y: 0.3
          width: 12.333
          height: 0.8

      - id: "left_header"
        type: "text"
        content_source: "dynamic"
        default: "Funktioniert ✓"
        style:
          font: "headline"
          size: 24
          color: "semantic.success"
          bold: true
        position:
          x: 0.5
          y: 1.3
          width: 5.8
          height: 0.6

      - id: "left_items"
        type: "bullet_list"
        content_source: "dynamic"
        style:
          font: "body"
          size: 18
          color: "primary.darkgray"
          bullet_char: "✓"
          bullet_color: "semantic.success"
        position:
          x: 0.5
          y: 2.0
          width: 5.8
          height: 4.0

      - id: "right_header"
        type: "text"
        content_source: "dynamic"
        default: "Funktioniert nicht ✗"
        style:
          font: "headline"
          size: 24
          color: "semantic.error"
          bold: true
        position:
          x: 6.8
          y: 1.3
          width: 5.8
          height: 0.6

      - id: "right_items"
        type: "bullet_list"
        content_source: "dynamic"
        style:
          font: "body"
          size: 18
          color: "primary.darkgray"
          bullet_char: "✗"
          bullet_color: "semantic.error"
        position:
          x: 6.8
          y: 2.0
          width: 5.8
          height: 4.0

  # ---------------------------------------------------------------------------
  # TYPE 07: IMPLICATIONS - Implikationen mit Icons
  # ---------------------------------------------------------------------------
  IMPLICATIONS:
    description: "4 Implikationen/Empfehlungen mit Icons"
    use_for: ["recommendations", "next_steps", "key_takeaways"]

    layout:
      background: "white"
      has_logo: true
      has_footer: true

    elements:
      - id: "title"
        type: "text"
        content_source: "dynamic"
        default: "Was bedeutet das für Sie?"
        style:
          font: "headline"
          size: 36
          color: "primary.darkblue"
          bold: true
        position:
          x: 0.5
          y: 0.3
          width: 12.333
          height: 0.8

      - id: "grid"
        type: "icon_grid"
        layout: "2x2"
        content_source: "session.implications"
        style:
          icon_size: 0.8
          icon_color: "primary.darkblue"
          title_font: "headline"
          title_size: 20
          title_color: "primary.darkblue"
          text_font: "body"
          text_size: 16
          text_color: "primary.darkgray"
        position:
          x: 0.5
          y: 1.5
          width: 12.333
          height: 4.5

  # ---------------------------------------------------------------------------
  # TYPE 08: CALL_TO_ACTION - Handlungsaufforderung
  # ---------------------------------------------------------------------------
  CALL_TO_ACTION:
    description: "Call to Action mit klarer Handlungsempfehlung"
    use_for: ["conclusion", "next_steps", "decision"]

    layout:
      background: "primary.lightgray"
      has_logo: true
      has_footer: true

    elements:
      - id: "title"
        type: "text"
        content_source: "static"
        text: "Nächste Schritte"
        style:
          font: "headline"
          size: 36
          color: "primary.darkblue"
          bold: true
        position:
          x: 0.5
          y: 0.3
          width: 12.333
          height: 0.8

      - id: "main_action"
        type: "shape"
        shape_type: "rounded_rectangle"
        fill: "white"
        border_color: "primary.darkblue"
        border_width: 2
        elements:
          - id: "action_text"
            type: "text"
            content_source: "session.main_recommendation"
            style:
              font: "body"
              size: 24
              color: "primary.darkblue"
              bold: true
              align: "center"
        position:
          x: 1.5
          y: 2.0
          width: 10.333
          height: 2.0

      - id: "sub_actions"
        type: "numbered_list"
        content_source: "session.action_items"
        max_items: 3
        style:
          font: "body"
          size: 18
          color: "primary.darkgray"
          number_color: "primary.darkblue"
        position:
          x: 1.5
          y: 4.5
          width: 10.333
          height: 2.0

  # ---------------------------------------------------------------------------
  # TYPE 09: QUOTE - Zitat
  # ---------------------------------------------------------------------------
  QUOTE:
    description: "Prominentes Zitat"
    use_for: ["quote", "testimonial", "key_statement"]

    layout:
      background: "primary.darkblue"
      has_logo: true
      logo_variant: "white"
      has_footer: false

    elements:
      - id: "quote_mark"
        type: "text"
        content_source: "static"
        text: "«"
        style:
          font: "accent"
          size: 120
          color: "primary.lightblue"
          align: "left"
        position:
          x: 0.5
          y: 1.0
          width: 2.0
          height: 2.0

      - id: "quote_text"
        type: "text"
        content_source: "dynamic"
        style:
          font: "accent"
          size: 32
          color: "white"
          italic: true
          align: "center"
        position:
          x: 1.5
          y: 2.5
          width: 10.333
          height: 2.5

      - id: "attribution"
        type: "text"
        content_source: "dynamic"
        style:
          font: "body"
          size: 18
          color: "primary.lightblue"
          align: "right"
        position:
          x: 6.0
          y: 5.5
          width: 6.333
          height: 0.6

  # ---------------------------------------------------------------------------
  # TYPE 10: METHODOLOGY - Modell/Formel
  # ---------------------------------------------------------------------------
  METHODOLOGY:
    description: "Methodologie mit Formel und Variablen-Erklärung"
    use_for: ["model", "formula", "methodology"]

    layout:
      background: "white"
      has_logo: true
      has_footer: true

    elements:
      - id: "title"
        type: "text"
        content_source: "dynamic"
        default: "Modell"
        style:
          font: "headline"
          size: 36
          color: "primary.darkblue"
          bold: true
        position:
          x: 0.5
          y: 0.3
          width: 12.333
          height: 0.8

      - id: "formula_image"
        type: "image"
        content_source: "graphic"
        graphic_id: "formula_render"
        position:
          x: 1.0
          y: 1.5
          width: 11.333
          height: 1.5

      - id: "variables_table"
        type: "table"
        content_source: "session.model_variables"
        columns: 3
        column_headers: ["Variable", "Bedeutung", "Effekt"]
        style:
          header_style: "fa_header"
          alternating_rows: true
          font_size: 14
        position:
          x: 0.5
          y: 3.2
          width: 12.333
          height: 3.0

  # ---------------------------------------------------------------------------
  # TYPE 11: SOURCES - Quellen
  # ---------------------------------------------------------------------------
  SOURCES:
    description: "Quellenangaben und Kontakt"
    use_for: ["sources", "references", "contact"]

    layout:
      background: "white"
      has_logo: true
      has_footer: false

    elements:
      - id: "title"
        type: "text"
        content_source: "static"
        text: "Quellen & Kontakt"
        style:
          font: "headline"
          size: 36
          color: "primary.darkblue"
          bold: true
        position:
          x: 0.5
          y: 0.3
          width: 12.333
          height: 0.8

      - id: "sources_header"
        type: "text"
        content_source: "static"
        text: "Wissenschaftliche Basis"
        style:
          font: "headline"
          size: 20
          color: "primary.darkblue"
          bold: true
        position:
          x: 0.5
          y: 1.3
          width: 6.0
          height: 0.5

      - id: "sources_list"
        type: "bullet_list"
        content_source: "session.sources"
        style:
          font: "body"
          size: 14
          color: "primary.darkgray"
        position:
          x: 0.5
          y: 1.9
          width: 6.0
          height: 3.5

      - id: "contact_header"
        type: "text"
        content_source: "static"
        text: "Kontakt"
        style:
          font: "headline"
          size: 20
          color: "primary.darkblue"
          bold: true
        position:
          x: 7.0
          y: 1.3
          width: 5.5
          height: 0.5

      - id: "contact_info"
        type: "text"
        content_source: "static"
        text: |
          FehrAdvice & Partners AG
          Klausstrasse 20
          8008 Zürich

          www.fehradvice.com
        style:
          font: "body"
          size: 16
          color: "primary.darkgray"
        position:
          x: 7.0
          y: 1.9
          width: 5.5
          height: 2.5

      - id: "session_info"
        type: "text"
        content_source: "template"
        template: |
          Evidence-Based Framework (EBF)
          Session: {session_id}
          Modell: {model_id}
        style:
          font: "body"
          size: 12
          color: "semantic.neutral"
        position:
          x: 7.0
          y: 4.8
          width: 5.5
          height: 1.2

  # ---------------------------------------------------------------------------
  # TYPE 12: BACKUP - Backup-Slide
  # ---------------------------------------------------------------------------
  BACKUP:
    description: "Backup-Slide für zusätzliche Details"
    use_for: ["backup", "appendix", "detail"]

    layout:
      background: "primary.lightgray"
      has_logo: true
      has_footer: true

    elements:
      - id: "backup_label"
        type: "text"
        content_source: "static"
        text: "BACKUP"
        style:
          font: "headline"
          size: 14
          color: "semantic.neutral"
          bold: true
        position:
          x: 0.5
          y: 0.2
          width: 2.0
          height: 0.4

      - id: "title"
        type: "text"
        content_source: "dynamic"
        style:
          font: "headline"
          size: 32
          color: "primary.darkblue"
          bold: true
        position:
          x: 0.5
          y: 0.5
          width: 12.333
          height: 0.7

      - id: "content"
        type: "container"
        position:
          x: 0.5
          y: 1.4
          width: 12.333
          height: 5.0

# =============================================================================
# FOOTER TEMPLATES
# =============================================================================

footer:
  default:
    elements:
      - id: "page_number"
        type: "text"
        content_source: "auto"
        template: "{page} / {total}"
        style:
          font: "body"
          size: 11
          color: "semantic.neutral"
        position:
          x: 12.0
          y: 6.9
          width: 0.8
          height: 0.3

      - id: "confidential"
        type: "text"
        content_source: "static"
        text: "Vertraulich"
        optional: true
        style:
          font: "body"
          size: 11
          color: "semantic.neutral"
        position:
          x: 0.5
          y: 6.9
          width: 1.5
          height: 0.3
