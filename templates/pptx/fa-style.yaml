# =============================================================================
# FEHRADVICE CORPORATE STYLE - PPTX Generator
# =============================================================================
# Single Source of Truth für alle visuellen Elemente
# Basiert auf: appendices/REF-STYLE_SG_corporate_style_guide.tex
#
# Version: 1.0
# Date: January 2026
# =============================================================================

metadata:
  name: "FehrAdvice Corporate Style"
  version: "1.0"
  created: "2026-01-26"
  ssot: "appendices/REF-STYLE_SG_corporate_style_guide.tex"

# =============================================================================
# FARBEN
# =============================================================================

colors:
  # Primärfarben
  primary:
    darkblue:
      hex: "#024079"
      rgb: [2, 64, 121]
      usage: "Headlines, Links, Akzente, Chart-Primärfarbe"

    lightblue:
      hex: "#549EDE"
      rgb: [84, 158, 222]
      usage: "Sekundäre Elemente, Chart-Sekundärfarbe"

    darkgray:
      hex: "#25212A"
      rgb: [37, 33, 42]
      usage: "Fliesstext, Body Text"

    lightgray:
      hex: "#F3F5F7"
      rgb: [243, 245, 247]
      usage: "Hintergründe, Tabellen-Alternation, Boxes"

  # Sekundärfarben (für Charts mit >2 Kategorien)
  secondary:
    lilac:
      hex: "#A1A0C6"
      rgb: [161, 160, 198]
      usage: "Chart-Farbe 3"

    mint:
      hex: "#7EBDAC"
      rgb: [126, 189, 172]
      usage: "Chart-Farbe 4, Positive Werte"

    ocher:
      hex: "#DECB3F"
      rgb: [222, 203, 63]
      usage: "Chart-Farbe 5, Warnungen"

    orange:
      hex: "#DE9D3E"
      rgb: [222, 157, 62]
      usage: "Chart-Farbe 6, Highlights"

  # Semantische Farben
  semantic:
    success:
      hex: "#7EBDAC"
      usage: "Checkmarks, positive Werte"

    warning:
      hex: "#DECB3F"
      usage: "Warnungen, Achtung"

    error:
      hex: "#C94C4C"
      rgb: [201, 76, 76]
      usage: "Fehler, negative Werte, Crosses"

    neutral:
      hex: "#888888"
      usage: "Deaktiviert, Quellenangaben"

  # Hintergrundfarben
  backgrounds:
    white: "#FFFFFF"
    light: "#F3F5F7"
    gradient_start: "#024079"
    gradient_end: "#549EDE"

# =============================================================================
# TYPOGRAFIE
# =============================================================================

typography:
  # Fonts
  fonts:
    headline:
      family: "Roboto"
      weight: "Bold"
      fallback: "Arial Black"

    subheadline:
      family: "Roboto"
      weight: "Regular"
      fallback: "Arial"

    body:
      family: "Open Sans"
      weight: "Regular"
      fallback: "Calibri"

    accent:
      family: "Playfair Display"
      weight: "Regular"
      fallback: "Georgia"
      usage: "Zitate, besondere Hervorhebungen"

  # Font-Grössen nach Slide-Element
  sizes:
    # Titel-Slide
    title_main: 44
    title_subtitle: 24
    title_meta: 14

    # Content-Slides
    slide_title: 36
    slide_subtitle: 24
    body_large: 20
    body_normal: 18
    body_small: 16
    caption: 14
    source: 11

    # Tabellen
    table_header: 16
    table_body: 14

    # Charts
    chart_title: 18
    chart_axis: 12
    chart_label: 11

  # Zeilenabstände
  line_spacing:
    tight: 1.0
    normal: 1.2
    relaxed: 1.5

# =============================================================================
# SLIDE-LAYOUTS
# =============================================================================

slide:
  # Dimensionen (PowerPoint Standard 16:9)
  dimensions:
    width_inches: 13.333
    height_inches: 7.5
    width_emu: 12192000  # EMUs (English Metric Units)
    height_emu: 6858000

  # Margins
  margins:
    top: 0.5
    bottom: 0.5
    left: 0.5
    right: 0.5

  # Content-Bereiche (in inches, von links oben)
  zones:
    title_area:
      x: 0.5
      y: 0.3
      width: 12.333
      height: 1.0

    content_area:
      x: 0.5
      y: 1.5
      width: 12.333
      height: 5.0

    footer_area:
      x: 0.5
      y: 6.8
      width: 12.333
      height: 0.5

# =============================================================================
# TABELLEN
# =============================================================================

tables:
  header:
    background: "#024079"
    text_color: "#FFFFFF"
    font_weight: "Bold"
    font_size: 16

  body:
    text_color: "#25212A"
    font_size: 14
    row_height: 0.4  # inches

  alternating_rows:
    even: "#FFFFFF"
    odd: "#F3F5F7"

  borders:
    color: "#E0E0E0"
    width: 0.5  # points

# =============================================================================
# CHARTS
# =============================================================================

charts:
  # Farbreihenfolge für Kategorien
  color_sequence:
    - "#024079"  # Dunkelblau
    - "#549EDE"  # Hellblau
    - "#A1A0C6"  # Lilac
    - "#7EBDAC"  # Mint
    - "#DECB3F"  # Ocher
    - "#DE9D3E"  # Orange

  # Allgemeine Chart-Einstellungen
  general:
    background: "transparent"
    grid_color: "#E0E0E0"
    grid_alpha: 0.5
    title_color: "#024079"
    axis_color: "#25212A"
    label_color: "#25212A"

  # Bar Charts
  bar:
    width: 0.6
    edge_color: "none"
    horizontal_preferred: true  # Horizontale Balken bevorzugt

  # Line Charts
  line:
    width: 2.5
    marker_size: 8
    marker_style: "o"

  # Pie/Donut Charts
  pie:
    start_angle: 90
    explode_max: 0.05
    donut_width: 0.4  # Für Donut-Charts

  # Annotations
  annotations:
    font_size: 11
    color: "#25212A"
    arrow_color: "#888888"

# =============================================================================
# ICONS & SYMBOLE
# =============================================================================

icons:
  # Semantische Icons (Unicode oder Pfad zu SVG)
  checkmark: "✓"
  cross: "✗"
  arrow_right: "→"
  arrow_up: "↑"
  arrow_down: "↓"
  bullet: "•"

  # Konzept-Icons (Pfade relativ zu assets/)
  paths:
    brain: "illustrations/icons/brain.svg"
    network: "illustrations/icons/network.svg"
    chart: "illustrations/icons/chart.svg"
    people: "illustrations/icons/people.svg"
    clock: "illustrations/icons/clock.svg"
    target: "illustrations/icons/target.svg"
    lightbulb: "illustrations/icons/lightbulb.svg"
    warning: "illustrations/icons/warning.svg"

# =============================================================================
# LOGO
# =============================================================================

logo:
  primary:
    path: "logos/fehradvice_logo.png"
    width: 1.5  # inches
    position: "bottom_right"
    margin: 0.3

  white:
    path: "logos/fehradvice_logo_white.png"
    usage: "Auf dunklem Hintergrund"

  ebf:
    path: "logos/ebf_logo.png"
    width: 1.0

# =============================================================================
# SCHWEIZER ORTHOGRAPHIE
# =============================================================================

orthography:
  language: "de-CH"

  rules:
    # Anführungszeichen
    quotes:
      open: "«"
      close: "»"
      nested_open: "‹"
      nested_close: "›"

    # Kein Eszett
    no_eszett: true  # ss statt ß

    # Zahlenformat
    numbers:
      thousands_separator: "'"  # 1'000.00
      decimal_separator: "."

    # Gendering
    gender_separator: ":"  # Kund:innen

  # Englisch (wenn verwendet)
  english:
    variant: "US"  # behavior, not behaviour
