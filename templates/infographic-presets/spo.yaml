# ============================================================================
# INFOGRAPHIC PRESET: SPÖ — Sozialdemokratische Partei Österreichs
# ============================================================================
# Verwendung: /infographic --preset spo
# SSOT: templates/infographic-design-system.yaml
# Kunde: data/customers/spo/
# Version: 1.0 | 2026-02-06
# ============================================================================

meta:
  preset_id: "PRESET-SPO"
  version: "1.0"
  created: "2026-02-06"
  customer: "SPÖ — Sozialdemokratische Partei Österreichs"
  customer_path: "data/customers/spo/"
  strategy_ssot: "data/customers/spo/spo_strategiebriefing_parteitag_2026.md"
  mandate_preamble: "data/customers/spo/spo_mandate_preamble.yaml"

# ============================================================================
# VISUELLE DEFAULTS
# ============================================================================
visual:
  primaerfarbe:
    name: "SPÖ-Rot"
    hex: "#E3000F"
  sekundaerfarbe:
    name: "Schwarz"
    hex: "#1A1A1A"
  hintergrund:
    name: "Weiss"
    hex: "#FFFFFF"
  akzent:
    name: "Hellgrau"
    hex: "#F5F5F5"

# ============================================================================
# STRATEGISCHE DEFAULTS
# ============================================================================
strategie:
  frame: "Ordnen statt Spalten"
  claim: "Ordnung wirkt."
  hashtag: "#OrdnenStattSpalten"
  tonalitaet: "Sachlich-entschlossen, nicht aggressiv"
  gegner_frame_vermeiden:
    - "FPÖ-Begriffe (Festung, Remigration, Volk)"
    - "Oppositions-Sprache (Regierung versagt)"
    - "Emotionale Eskalation (Skandal, Katastrophe)"

# ============================================================================
# KOMMUNIKATIONS-DEFAULTS (aus Strategiebriefing v3.4)
# ============================================================================
kommunikation:
  5_schritt_architektur:
    - schritt: 1
      name: "Anerkennung"
      template: "Ja, {{PROBLEM}} ist real."
    - schritt: 2
      name: "Kontext"
      template: "Die Ursache: {{URSACHE}}."
    - schritt: 3
      name: "Massnahme"
      template: "Deshalb: {{MASSNAHME}} — konkret {{ZAHL}}."
    - schritt: 4
      name: "Ehrlichkeit"
      template: "{{EHRLICHKEITS_LINIE}}"
    - schritt: 5
      name: "Beweis"
      template: "Das Ergebnis: {{BEWEIS_ZAHL}}."

  10_gebote:
    - "Ordnung ist das Frame, nicht Empörung"
    - "Zahlen statt Adjektive"
    - "Vergleiche statt Behauptungen"
    - "Anerkennen, nicht leugnen"
    - "Konkrete Massnahme vor allgemeiner Forderung"
    - "Ehrlichkeits-Linie PFLICHT"
    - "Kurze Sätze (max 15 Worte)"
    - "Österreichisches Deutsch (Jänner, Matura, ...)"
    - "Immer Quellenangabe mit Datum"
    - "Hashtag als Closer"

# ============================================================================
# STANDARD-EHRLICHKEITS-LINIEN (pro Thema)
# ============================================================================
ehrlichkeits_linien:
  inflation:
    text: "Gegen die Teuerung gewinnt man nie ganz — aber man kann sie bremsen."
    behavioral_basis: "McGuire (1961) Inoculation Theory"
  migration:
    text: "Migration lässt sich nicht auf null setzen — aber ordnen."
  gesundheit:
    text: "Kein System ist perfekt — aber unseres kann besser werden."
  wohnen:
    text: "Wohnraum wird nicht über Nacht billig — aber Spekulation muss enden."
  bildung:
    text: "Bildung braucht Zeit — aber jedes Jahr ohne Reform kostet eine Generation."
  energie:
    text: "Die Energiewende ist teuer — aber Nichtstun ist teurer."
  default:
    text: "Einfache Lösungen gibt es nicht — aber ehrliche schon."

# ============================================================================
# STANDARD-VERGLEICHE
# ============================================================================
vergleiche:
  default:
    spalte_a: "SPÖ-Regierungsprogramm"
    spalte_b: "Orbán-Modell (Ungarn)"
  inflation:
    spalte_a: "Österreich (SPÖ)"
    spalte_b: "Ungarn (Orbán)"
    zeilen:
      - kategorie: "Inflation"
        wert_a: "2,0%"
        wert_b: "3,7%"
      - kategorie: "Lebensmittel"
        wert_a: "MwSt gesenkt"
        wert_b: "Preise ↑26%"
      - kategorie: "Mieten"
        wert_a: "Gedeckelt"
        wert_b: "+22% seit 2022"
  migration:
    spalte_a: "Ordnen (SPÖ)"
    spalte_b: "Spalten (FPÖ)"

# ============================================================================
# QUELLEN-DEFAULTS
# ============================================================================
quellen:
  primaer:
    - name: "Statistik Austria"
      domain: "statistik.at"
    - name: "Eurostat"
      domain: "ec.europa.eu/eurostat"
    - name: "OeNB"
      domain: "oenb.at"
  standard_format: "Statistik Austria, Eurostat"
  sprache: "Österreichisches Deutsch"
  orthografie:
    monatsnamen: "Jänner, Feber (nicht Januar, Februar)"
    waehrung: "€ (Euro, nicht EUR)"
    tausender: "1.000 (Punkt, nicht Apostroph)"
    anführungszeichen: "« » (Guillemets)"

# ============================================================================
# THEMEN-BIBLIOTHEK (vorkonfigurierte Datenpunkte)
# ============================================================================
themen:
  inflation:
    titel_optionen:
      - "Preise runter, Löhne rauf"
      - "Österreich bremst die Teuerung"
      - "Ordnung bei den Preisen"
    killer_zahl_primary:
      wert: "-0,7%"
      label: "Preisrückgang im Monatsvergleich"
      quelle: "Statistik Austria"
      datum: "Jänner 2026"
      staerke: "Unverwundbar — stärkster Monatsrückgang seit Jän. 2019"
    killer_zahl_secondary:
      - wert: "11% → 2%"
        label: "Inflation 2023 → 2026"
      - wert: "-4,9%"
        label: "Energiepreise im Jahresvergleich"
    massnahmen:
      - titel: "MwSt-Senkung Lebensmittel"
        zahl: "1,4 Mrd. € Entlastung"
        text: "Mehrwertsteuer auf Grundnahrungsmittel halbiert"
        icon: "Einkaufswagen"
      - titel: "Mietpreisbremse"
        zahl: "300.000 Haushalte geschützt"
        text: "Mieterhöhungen auf Inflationsniveau gedeckelt"
        icon: "Haus mit Schild"
      - titel: "Anti-Shrinkflation-Gesetz"
        zahl: "Bis zu 15.000 € Strafe"
        text: "Transparenzpflicht für 100 Produkte"
        icon: "Waage / Lupe"
    ehrlichkeit: "Gegen die Teuerung gewinnt man nie ganz — aber man kann sie bremsen."
    hashtag: "#OrdnenStattSpalten"

  migration:
    titel_optionen:
      - "Ordnung statt Chaos"
      - "Regeln statt Populismus"
    killer_zahl_primary:
      wert: "14.156"
      label: "Abschiebungen 2025"
    massnahmen:
      - titel: "Schnellverfahren an der Grenze"
        zahl: "48 Stunden Entscheidung"
        icon: "Uhr"
      - titel: "Sichere Drittstaaten-Regelung"
        zahl: "12 Partnerländer"
        icon: "Handschlag"
      - titel: "Arbeitsmarkt-Integration"
        zahl: "80% Beschäftigungsquote Ziel"
        icon: "Fabrik"
    ehrlichkeit: "Migration lässt sich nicht auf null setzen — aber ordnen."

  gesundheit:
    titel_optionen:
      - "Prävention statt Zwei-Klassen-Medizin"
      - "Gesundheit für alle"
    ehrlichkeit: "Kein System ist perfekt — aber unseres kann besser werden."

  wohnen:
    titel_optionen:
      - "Wohnen muss leistbar bleiben"
      - "Gegen Mietwucher"
    ehrlichkeit: "Wohnraum wird nicht über Nacht billig — aber Spekulation muss enden."

# ============================================================================
# BEKANNTE VERWUNDBARKEITEN (aus EBF-Analyse)
# ============================================================================
verwundbarkeiten:
  inflation:
    - risiko: "VPI vs. HVPI"
      detail: "VPI 2,0% (national) vs. HVPI 3,8% (EU-harmonisiert)"
      mitigation: "MoM -0,7% als Primary verwenden (unverwundbar)"
    - risiko: "1,4 Mrd. im Kontext von 15 Mrd. Sparpaket"
      detail: "Entlastung wirkt klein neben Gesamtbudget"
      mitigation: "Pro-Haushalt-Zahl verwenden oder nicht im selben Bild"
    - risiko: "Veraltete Daten"
      detail: "NotebookLM setzt falsche Jahreszahlen"
      mitigation: "Datum EXPLIZIT im Prompt: 'Stand: Jänner 2026'"

  migration:
    - risiko: "FPÖ Issue Ownership"
      detail: "Migration auf Wirtschafts-Plakat aktiviert FPÖ-Kompetenz"
      mitigation: "Strikt trennen: Plakat A = Wirtschaft, Plakat B = Sicherheit"
