# ============================================================================
# INFOGRAPHIC SCORING CHECKLIST — EBF-basierte Qualitätsbewertung
# ============================================================================
# Verwendung: Nach Generierung einer NotebookLM-Infografik durchgehen
# Ziel-Score: ≥ 8.0/10 für Freigabe
# SSOT: templates/infographic-design-system.yaml
# Version: 1.0 | 2026-02-06
# ============================================================================

meta:
  version: "1.0"
  created: "2026-02-06"
  target_score: 8.0
  max_score: 10.0
  scale: "0-10 pro Kriterium, gewichteter Durchschnitt"

# ============================================================================
# DIE 6 BEWERTUNGSKRITERIEN
# ============================================================================
criteria:
  - id: "K1"
    name: "Frame-Konsistenz"
    weight: 0.20
    description: "Passt die Infografik zur übergeordneten Strategie/Botschaft?"
    sub_checks:
      - "Action Title transportiert die Kernthese (nicht nur beschreibend)"
      - "Alle Inhalte stützen denselben Frame (kein Themenwechsel)"
      - "Hashtag/Closer verstärkt den Frame"
      - "Keine Elemente, die den Gegner-Frame aktivieren"
    scoring_guide:
      10: "Perfekte Konsistenz — jedes Element stützt den Frame"
      8: "Gute Konsistenz — 1 Element könnte schärfer sein"
      6: "Akzeptabel — Frame erkennbar, aber 2+ Schwächen"
      4: "Problematisch — Frame unklar oder widersprüchlich"
      2: "Verfehlt — kein erkennbarer Frame"

  - id: "K2"
    name: "Verhaltensökonomische Wirksamkeit"
    weight: 0.20
    description: "Nutzt die Infografik verhaltensökonomische Prinzipien korrekt?"
    sub_checks:
      - "Anchoring: Killer-Zahl setzt den richtigen Anker"
      - "Framing: Gain-Frame für Massnahmen, Loss-Frame für Status Quo"
      - "Salience: Das Wichtigste ist visuell dominant"
      - "Processing Fluency: Einfach zu verarbeiten (≤7 Cluster)"
      - "Social Proof: Vergleiche/Belege vorhanden"
      - "Inoculation: Ehrlichkeits-Linie vorhanden (bei politischen Infografiken)"
    scoring_guide:
      10: "Alle 6 Prinzipien korrekt angewendet"
      8: "5/6 Prinzipien, 1 fehlt oder ist schwach"
      6: "4/6 Prinzipien angewendet"
      4: "Nur 2-3 Prinzipien erkennbar"
      2: "Keine verhaltensökonomische Struktur"

  - id: "K3"
    name: "Angriffsfläche (invertiert)"
    weight: 0.20
    description: "Wie verwundbar ist die Infografik für Gegenangriffe?"
    sub_checks:
      - "Zahlen sind korrekt und aktuell (Quelle + Datum prüfen)"
      - "Keine Cherry-Picking-Vorwürfe möglich (z.B. VPI vs. HVPI)"
      - "Keine veralteten Daten ohne Kennzeichnung"
      - "Ehrlichkeits-Linie schützt vor 'zu optimistisch'-Vorwurf"
      - "Vergleiche sind fair (kein Strohmann)"
      - "Keine Themen, die Gegner-Kompetenz aktivieren"
    scoring_guide:
      10: "Keine erkennbare Angriffsfläche — faktisch wasserdicht"
      8: "Minimale Angriffsfläche — 1 Punkt angreifbar, aber verteidigbar"
      6: "Mässige Angriffsfläche — 2 Punkte, die Gegner nutzen könnten"
      4: "Hohe Angriffsfläche — offensichtliche Schwachstellen"
      2: "Einladung zum Angriff — leicht widerlegbar"

  - id: "K4"
    name: "Visuelle Klarheit"
    weight: 0.15
    description: "Ist die Infografik sofort verständlich?"
    sub_checks:
      - "Leserichtung klar (Links→Rechts oder Oben→Unten)"
      - "Farbsystem eingehalten (nur 3+1 Farben)"
      - "Icons sind Flat Line Art, einfarbig"
      - "Hierarchie erkennbar (Primary > Secondary > Body)"
      - "Nicht mehr als 7 Informations-Cluster"
      - "Genug Weissraum (nicht überladen)"
    scoring_guide:
      10: "Sofort erfassbar — 3-Sekunden-Test bestanden"
      8: "Sehr klar — 1 Element könnte besser platziert sein"
      6: "Akzeptabel — braucht 5+ Sekunden zum Erfassen"
      4: "Unübersichtlich — zu viele Elemente oder unklar"
      2: "Verwirrend — Leserichtung unklar, überladen"

  - id: "K5"
    name: "Daten-Integrität"
    weight: 0.15
    description: "Sind alle Daten korrekt, aktuell und ehrlich dargestellt?"
    sub_checks:
      - "Alle Zahlen stimmen mit Originalquelle überein"
      - "Datum in Quellenangabe ist korrekt (keine Halluzination)"
      - "Quellen sind konkret benannt (nicht 'Nationale Statistikämter')"
      - "Zeiträume sind klar (nicht '11% (2023)' sondern '11% (Jän. 2023)')"
      - "Vage Adjektive durch konkrete Zahlen ersetzt"
      - "Keine NotebookLM-Halluzinationen in den Daten"
    scoring_guide:
      10: "Alle Daten verifiziert, keine Halluzinationen"
      8: "1 kleine Ungenauigkeit (z.B. Monat fehlt)"
      6: "2 Ungenauigkeiten oder 1 Halluzination"
      4: "Mehrere Fehler oder wichtige Halluzination"
      2: "Daten nicht vertrauenswürdig"

  - id: "K6"
    name: "Zielgruppen-Abdeckung"
    weight: 0.10
    description: "Erreicht die Infografik die definierte Zielgruppe?"
    sub_checks:
      - "Sprache passt zur Zielgruppe (nicht zu technisch, nicht zu simpel)"
      - "Relevante Themen für die Zielgruppe abgedeckt"
      - "Format passt zum Kanal (Landscape=Desktop, Portrait=Mobile, Square=Social)"
      - "Handlungsaufforderung vorhanden (CTA oder Hashtag)"
    scoring_guide:
      10: "Perfekt auf Zielgruppe zugeschnitten"
      8: "Sehr gut — 1 Aspekt könnte zielgruppenspezifischer sein"
      6: "Akzeptabel — generisch, aber funktional"
      4: "Teilweise an Zielgruppe vorbei"
      2: "Verfehlt die Zielgruppe"

# ============================================================================
# SCORING-FORMEL
# ============================================================================
scoring:
  formula: "Score = Σ(weight_i × score_i)"
  thresholds:
    freigabe: 8.0
    nachbesserung: 6.0
    neustart: 4.0
  interpretation:
    "9.0-10.0": "Exzellent — sofort einsetzbar"
    "8.0-8.9": "Gut — Freigabe mit optionalen Feinheiten"
    "6.0-7.9": "Nachbesserung — 1-2 Bereiche konkret verbessern, neu generieren"
    "4.0-5.9": "Substanzielle Überarbeitung — Prompt anpassen, neu generieren"
    "0.0-3.9": "Neustart — komplett neuer Ansatz nötig"

# ============================================================================
# SCHNELL-CHECK (5-Sekunden-Version)
# ============================================================================
quick_check:
  description: "Für schnelle Bewertung ohne vollständige Analyse"
  questions:
    - question: "Erkenne ich die Kernbotschaft in 3 Sekunden?"
      fail_action: "Action Title überarbeiten"
    - question: "Stimmen ALLE Zahlen mit der Quelle überein?"
      fail_action: "Daten-Integrität prüfen (K5)"
    - question: "Ist das Datum in der Quellenangabe korrekt?"
      fail_action: "NotebookLM-Halluzination — Datum im Prompt expliziter machen"
    - question: "Hat jeder Abschnitt mindestens EINE Zahl?"
      fail_action: "Fehlende Zahlen im Prompt ergänzen"
    - question: "Gibt es eine Ehrlichkeits-Linie (bei politischen Themen)?"
      fail_action: "Inoculation-Satz hinzufügen"

# ============================================================================
# SCORING-TEMPLATE (zum Ausfüllen)
# ============================================================================
template:
  header: |
    ## Infografik-Bewertung
    **Thema:** [...]
    **Format:** [Landscape / Portrait / Square]
    **Datum:** [...]
    **Version:** [...]
  table: |
    | # | Kriterium | Gewicht | Score | Gewichtet |
    |---|-----------|---------|-------|-----------|
    | K1 | Frame-Konsistenz | 20% | _/10 | _ |
    | K2 | Verhaltenswirksamkeit | 20% | _/10 | _ |
    | K3 | Angriffsfläche (inv.) | 20% | _/10 | _ |
    | K4 | Visuelle Klarheit | 15% | _/10 | _ |
    | K5 | Daten-Integrität | 15% | _/10 | _ |
    | K6 | Zielgruppen-Abdeckung | 10% | _/10 | _ |
    | | **GESAMT** | 100% | | **_/10** |
  verdict: |
    **Verdict:** [Freigabe ≥8.0 / Nachbesserung 6.0-7.9 / Neustart <6.0]
    **Top-Stärke:** [...]
    **Top-Schwäche:** [...]
    **Konkrete Verbesserung:** [...]
