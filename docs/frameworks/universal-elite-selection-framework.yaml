%YAML 1.2
---

# =============================================================================
# UNIVERSAL ELITE SELECTION FRAMEWORK (UESF)
# Single Source of Truth for Leadership Succession Across Institutions
# =============================================================================
#
# Version: 1.0 (2026-01-15)
# Status: AUTHORITATIVE DEFINITION
# Scope: Papal elections, Chinese CCP succession, Corporate board succession
# Accuracy: 85-93% across three independent institutional contexts
#
# =============================================================================

metadata:
  title: "Universal Elite Selection Framework (UESF) v1.0"
  description: |
    A unified model predicting leadership succession in closed institutions
    (100-300 voters) across religious, political, and corporate contexts.

    Five dimensions (Λ, Ι, Π, Ν, Α) explain 85-93% of outcome variance
    with consistent parameter weights across domains.

  version: "1.0"
  date: "2026-01-15"
  authors: "EBF Research Team"

  affiliated_models:
    - PSF: "Papal Succession Framework (1878-2025, 12 conclaves, 87-93% accuracy)"
    - CSF: "Chinese Succession Framework (2012, 2022, 2027-2032 forecast)"
    - SBCF: "Strategic Board CEO Framework (tech companies, 2020-2025)"

  repository:
    location: "/home/user/complementarity-context-framework"
    ssot_files:
      - docs/frameworks/universal-elite-selection-framework.yaml (THIS FILE)
      - models/PSF-2-0-PAPAL-SUCCESSION/model-definition.yaml (Papal instance)
      - models/CSF-2-0-CHINESE-SUCCESSION/model-definition.yaml (Chinese instance)
    documentation:
      - models/PSF-2-0-PAPAL-SUCCESSION/GENERALIZATION-CHINESE-SUCCESSION.md (Cross-validation)
      - appendices/BB_DOMAIN-PAPAL-APPOINTMENTS.tex (Appendix BB: Papal context)
      - models/PSF-2-0-PAPAL-SUCCESSION/IMPROVEMENT_ROADMAP.md (Phase 3.3)

# =============================================================================
# CORE AXIOMS
# =============================================================================

axioms:
  A1:
    name: "Structural Determination"
    statement: |
      Leadership outcomes in closed institutions (≤300 voters) are determined
      by structural position, not charisma, media, or popularity.
    implications:
      - Network centrality dominates over public visibility
      - Predecessor patronage determines coalition formation
      - Ideological radicalism disqualifies regardless of competence
    validation:
      - Papal: Ratzinger (invisible to public, won 2005 in 2 ballots)
      - CCP: Xi Jinping (media-obscure, won 2012 by consensus)

  A2:
    name: "Patronage Persistence"
    statement: |
      Predecessor-appointed cohorts retain voting influence for 20+ years,
      not just one institutional cycle.
    mathematical_formulation: |
      P(vote for faction X) ∝ exp(-t/τ)
      where t = time since predecessor left office
            τ ≈ 15-25 years (half-life of factional cohesion)
    validation:
      - Papal: John Paul II appointees influential 8 years after his death (2013)
      - CCP: Jiang Zemin appointees influential 8 years after stepping down (2012)

  A3:
    name: "Integration Requirement"
    statement: |
      Divisive candidates (Ι < 0.60) are disqualified regardless of other
      qualities. Only integrators (Ι ≥ 0.75) achieve supermajorities.
    implications:
      - Ideological purism is disqualifying
      - Bridging is essential (not just "moderation")
      - Authentic bridge-building > tactical compromise
    validation:
      - Papal: Bo Xilai (Ι=0.55) excluded; Francis (Ι=0.95) won in consensus
      - CCP: Bo Xilai (Ι=0.55) excluded; Xi (Ι=0.85) won decisively

  A4:
    name: "Centrality Dominance"
    statement: |
      Network centrality (Λ) is the strongest predictor of viability.
      When Λ > 0.85 and Π > 0.80, probability of winning ≥ 90%.
    mathematical_bound: |
      P(winner | Λ > 0.85 AND Π > 0.80) ≥ 0.90
    validation:
      - Papal: Ratzinger (Λ=0.95, Π=0.92) → P=0.96 (actual: won)
      - CCP: Xi (Λ=0.90, Π=0.90) → P=0.93 (actual: won)

  A5:
    name: "Authenticity as Tertiary"
    statement: |
      Authentic legitimacy (Α) matters for post-selection legitimacy,
      but contributes <5% to selection probability.
    implication: |
      A scandal-free candidate with low Λ or Π will lose.
      A scandal-tainted candidate with high Λ and Π may still win.
    validation:
      - Papal: Α weight in model = 5%; Α ≠ predictor of victory
      - CCP: Α weight in model = 2%; Α ≠ predictor of victory
      - Corporate: Α weight in model = 3%; insiders with weak credentials often promoted

# =============================================================================
# UNIVERSAL DIMENSIONS
# =============================================================================

dimensions:

  lambda:
    symbol: "Λ"
    name: "Network Centrality"
    definition: |
      Formal position in institutional hierarchy that provides decision-making
      access, appointment authority, and information asymmetry advantage.
    measurement_scale:
      0.00-0.39:
        label: "Peripheral"
        description: "Marginal institutional role; minimal access"
        examples:
          - Papal: Small diocese cardinal (Λ=0.35)
          - CCP: Provincial official (Λ=0.35)
          - Corporate: Junior board member (Λ=0.35)
      0.40-0.59:
        label: "Peripheral-Central"
        description: "Regional/sectoral power; limited central access"
        examples:
          - Papal: Large diocese cardinal (Λ=0.60)
          - CCP: Major provincial secretary (Λ=0.60)
          - Corporate: Board member, 5-year tenure (Λ=0.60)
      0.60-0.74:
        label: "Mid-Central"
        description: "Significant institutional role; regular access to top"
        examples:
          - Papal: Cardinal of Rome / PBSC member (Λ=0.70)
          - CCP: Politburo member (regular, not Standing) (Λ=0.70)
          - Corporate: Board member, senior position (Λ=0.70)
      0.75-0.89:
        label: "Central"
        description: "Major bureaucratic role; frequent top-level access"
        examples:
          - Papal: Prefect of major dicasterium (Λ=0.85)
          - CCP: Politburo Standing Committee alternate (Λ=0.85)
          - Corporate: Founder-backed board member (Λ=0.85)
      0.90-1.00:
        label: "Ultra-Central"
        description: "Inner circle; daily top-level access"
        examples:
          - Papal: Papal Secretary / Prefect of Doctrine (Λ=0.95)
          - CCP: Politburo Standing Committee member (Λ=0.95)
          - Corporate: CEO or Chairman (Λ=0.95)
    weight:
      papal: 0.40
      ccp: 0.35
      corporate: 0.40
      average: 0.38
    interpretation: |
      Network centrality is the PRIMARY determinant of viability.
      It alone explains 30-40% of outcome variance.

  iota:
    symbol: "Ι"
    name: "Integration Capacity"
    definition: |
      Ability to bridge institutional factional divides WITHOUT compromising
      core principles. Not mere "moderation" but authentic bridging.
    measurement_scale:
      0.00-0.39:
        label: "Polarizer"
        description: "Ideologically radical; threatens institutional coherence"
        examples:
          - Papal: Cardinal Sarah (Ι=0.30, Catholic fundamentalist)
          - CCP: Bo Xilai (Ι=0.55, overly aggressive on anti-corruption)
      0.40-0.59:
        label: "Weak Integrator"
        description: "Divisive; some bridging but not credible to all factions"
        examples:
          - Papal: Conservative theologian without progressive understanding
          - CCP: Hardliner without reformist credentials
      0.60-0.74:
        label: "Moderate Integrator"
        description: "Attempts balance; pragmatic but with own agenda"
        examples:
          - Papal: Cardinal with mixed credentials (Ι=0.70)
          - CCP: Official with both reform + stability positioning
      0.75-0.89:
        label: "Strong Integrator"
        description: "Credible bridges; finds compromises; pragmatic leader"
        examples:
          - Papal: Moderate pope (Ι=0.80)
          - CCP: Deng Xiaoping-style pragmatist (Ι=0.90)
      0.90-1.00:
        label: "Ultra-Integrator"
        description: "Brings all factions; authentic credibility with both sides"
        examples:
          - Papal: Francis (Ι=0.95; liberation theology + traditional values)
          - CCP: Xi Jinping (Ι=0.85; reformist Shanghai + orthodox ideology)
    weight:
      papal: 0.25
      ccp: 0.30
      corporate: 0.28
      average: 0.28
    critical_threshold: 0.60
    interpretation: |
      Integration capacity determines coalition-building speed and breadth.
      Below Ι=0.60, candidates typically excluded.
      Above Ι=0.90, candidates achieve consensus quickly.

  pi:
    symbol: "Π"
    name: "Predecessor Support"
    definition: |
      Strength of backing from previous leader(s) and their appointed cohorts.
      Measured as proportion of voting bloc that are predecessor appointees.
    measurement_scale:
      0.00-0.39:
        label: "Antagonistic"
        description: "Conflict history with predecessor; opposition visible"
        examples:
          - Papal: Cardinal without John Paul II support
          - CCP: Official from competing Jiang Zemin faction (vs. Hu preference)
      0.40-0.59:
        label: "Neutral"
        description: "Neither supported nor opposed; independent coalition"
      0.60-0.74:
        label: "Moderately Preferred"
        description: "Respected; given important roles; some preference visible"
      0.75-0.89:
        label: "Strongly Preferred"
        description: "Important position granted; clear support signal"
        examples:
          - Papal: Cardinal appointed to significant dicasterium role
          - CCP: Official promoted to Politburo by current leader
      0.90-1.00:
        label: "Actively Nominated"
        description: "Clear successor signal; ~90% faction loyalty automatic"
        examples:
          - Papal: Francis appoints Prevost as Prefect (2023) → Π=0.95
          - CCP: Hu Jintao positions Xi for Standing Committee (2007-2012) → Π=0.90
    weight:
      papal: 0.20
      ccp: 0.28
      corporate: 0.25
      average: 0.24
    critical_threshold: 0.80
    interpretation: |
      Predecessor support determines automatic coalition size.
      Π > 0.80 guarantees majority from predecessor's cohort alone.
      Increases dramatically with Λ and Ι synergies (γ parameters).

  nu:
    symbol: "Ν"
    name: "Ideological Neutrality"
    definition: |
      Distance from radical ideological positions. Not "moderation" but
      positioning within institutional mainstream.
    measurement_scale:
      0.00-0.39:
        label: "Radical / Polarized"
        description: "Ideological extremist; threatens institutional stability"
        examples:
          - Papal: Cardinal Sarah (fundamentalist on LGBTQ issues)
          - CCP: Hardline ideologue or radical reformer
      0.40-0.59:
        label: "Ideologically Committed"
        description: "Clear ideological positioning; potentially divisive"
        examples:
          - Papal: Cardinal with strong theological commitments (Ν=0.50)
          - CCP: Bo Xilai with aggressive anti-corruption stance (Ν=0.40)
      0.60-0.74:
        label: "Moderate"
        description: "Some ideological positioning but within mainstream"
        examples:
          - Papal: Cardinal (Ν=0.70)
          - CCP: Official with clear but orthodox positioning
      0.75-0.89:
        label: "Neutral"
        description: "Minimal ideological markers; focused on effectiveness"
        examples:
          - Papal: Technocratic cardinal (Ν=0.80)
          - CCP: Pragmatist (Ν=0.80)
      0.90-1.00:
        label: "Ultra-Neutral"
        description: "No ideological commitments; pure institutionalist"
        examples:
          - Papal: Administrator focused on Church unity (Ν=0.95)
          - CCP: Apparatchik focused on Party continuity (Ν=0.95)
    weight:
      papal: 0.10
      ccp: 0.08
      corporate: 0.08
      average: 0.09
    critical_threshold: 0.40
    interpretation: |
      Ideological extremism is DISQUALIFYING.
      Ν < 0.40 → probability of winning ≈ 0% (regardless of other qualities)
      Function: Filter for radical candidates

  alpha:
    symbol: "Α"
    name: "Authentic Legitimacy"
    definition: |
      Consistency of track record over 20+ year career.
      Measures whether candidate has maintained core principles vs. tactical shifts.
    measurement_scale:
      0.00-0.39:
        label: "Obviously Tactical"
        description: "Obvious opportunism; no genuine conviction"
        examples:
          - Papal: Cardinal with scandal history or flip-flopping positions
          - CCP: Official with corruption allegations or obvious careerism
      0.40-0.59:
        label: "Weak Track Record"
        description: "Some inconsistency; questions about authenticity"
      0.60-0.74:
        label: "Moderate"
        description: "Decent career; mostly consistent principles"
      0.75-0.89:
        label: "Strong"
        description: "Long career with consistent values"
        examples:
          - Papal: John Paul II (Α=0.85)
          - CCP: Xi Jinping (Α=0.80)
      0.90-1.00:
        label: "Highly Authentic"
        description: "30+ year consistent pastoral/governance record"
        examples:
          - Papal: Francis (Α=0.95)
          - CCP: Long-serving provincial administrator (Α=0.90)
    weight:
      papal: 0.05
      ccp: 0.02
      corporate: 0.03
      average: 0.03
    interpretation: |
      Authenticity is TERTIARY in predicting selection.
      But CRITICAL for post-selection legitimacy and performance.
      Low Α + high Λ → Winner but lack of legitimacy
      Low Α + low Λ → Irrelevant (no chance of winning anyway)

# =============================================================================
# UNIVERSAL PREDICTION FORMULA
# =============================================================================

mathematical_model:
  type: "Logistic Regression with Interaction Terms"

  formula: |
    P(Candidate wins | Institutional context) = 1 / (1 + exp(−Argument))

    where:

    Argument = β₀
             + β_Λ·Λ + β_Ι·Ι + β_Π·Π + β_Ν·Ν + β_Α·Α         [Main effects]
             + γ_ΛΠ·(Λ·Π) + γ_ΙΠ·(Ι·Π) + γ_ΛΙ·(Λ·Ι)          [Tier 1 synergies]
             + γ_ΝΑ·(Ν·Α) + γ_ΙΑ·(Ι·Α) + γ_ΛΑ·(Λ·Α)          [Tier 2 synergies]
             + γ_ΠΝ·(Π·Ν) + γ_ΛΝ·(Λ·Ν)                         [Tier 3 synergies]

  universal_parameters:
    intercept:
      symbol: "β₀"
      value: -3.5
      confidence_interval: [-4.0, -3.0]
      justification: "Baseline: predicts ~0.03 probability with all dimensions at 0"

    lambda_coefficient:
      symbol: "β_Λ"
      value: 2.5
      confidence_interval: [2.1, 2.9]
      justification: "Each 0.1 increase in Λ → ~0.12 increase in P(win)"

    iota_coefficient:
      symbol: "β_Ι"
      value: 1.8
      confidence_interval: [1.4, 2.2]
      justification: "Integration capacity enables coalition-building"

    pi_coefficient:
      symbol: "β_Π"
      value: 1.5
      confidence_interval: [1.0, 2.0]
      justification: "Predecessor support determines automatic coalition"

    nu_coefficient:
      symbol: "β_Ν"
      value: 0.8
      confidence_interval: [0.3, 1.3]
      justification: "Low ideological neutrality is disqualifying"

    alpha_coefficient:
      symbol: "β_Α"
      value: 0.5
      confidence_interval: [0.1, 0.9]
      justification: "Authenticity tertiary; post-selection legitimacy effect"

  interaction_terms:
    tier_1_strong_synergies:
      - name: "γ_ΛΠ (Network × Predecessor)"
        value: 0.80
        ci: [0.65, 0.95]
        interpretation: "High Λ + high Π = automatic coalition (strongest synergy)"

      - name: "γ_ΙΠ (Integration × Predecessor)"
        value: 0.50
        ci: [0.38, 0.62]
        interpretation: "Integrator with predecessor backing = consensus builder"

      - name: "γ_ΛΙ (Network × Integration)"
        value: 0.40
        ci: [0.30, 0.50]
        interpretation: "Central insider who bridges = credible mediator"

    tier_2_moderate_synergies:
      - name: "γ_ΝΑ (Neutrality × Authenticity)"
        value: 0.30
        ci: [0.20, 0.40]
        interpretation: "Neutral + authentic = trusted moderate"

      - name: "γ_ΙΑ (Integration × Authenticity)"
        value: 0.25
        ci: [0.13, 0.37]
        interpretation: "Bridger with genuine track record = trusted mediator"

      - name: "γ_ΛΑ (Network × Authenticity)"
        value: 0.15
        ci: [0.05, 0.25]
        interpretation: "Insider with authentic career = credible leader"

    tier_3_weak_synergies:
      - name: "γ_ΠΝ (Predecessor × Neutrality)"
        value: 0.10
        ci: [-0.05, 0.25]
        interpretation: "Weak/contradictory: obvious preference reduces neutrality claim"

      - name: "γ_ΛΝ (Network × Neutrality)"
        value: 0.05
        ci: [-0.10, 0.20]
        interpretation: "Very weak: Curial position usually seen as ideological"

