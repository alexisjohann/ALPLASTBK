# ═══════════════════════════════════════════════════════════════════════════════

meta:
  name: "10C CORE Framework"
  version: "1.0.0"
  status: "canonical"
  ssot: true
  description: |
    Das 10C Framework ist die Struktur des Evidence-Based Framework (EBF).
    Es besteht aus genau 10 komplementären Dimensionen (COREs), die gemeinsam
    menschliches Verhalten vollständig beschreiben.
    
    WICHTIG: Es sind genau 10 COREs — nicht 9, nicht 11. Der Name "10C" ist fix.

# ═══════════════════════════════════════════════════════════════════════════════
# THE 10 COREs
# ═══════════════════════════════════════════════════════════════════════════════

cores:
  - id: 1
    name: "WHO"
    code: "AAA"
    question: "Wer hat Utility?"
    output: "Levels L (Individual → Society)"
    chapter: 2
    description: "Definiert die Aggregationsebene der Analyse"
    
  - id: 2
    name: "WHAT"
    code: "C"
    question: "Was ist Utility?"
    output: "FEPSDE Dimensionen"
    chapter: 3
    description: "Definiert die Utility-Dimensionen (Financial, Emotional, Physical, Social, Digital, Ecological)"
    
  - id: 3
    name: "HOW"
    code: "B"
    question: "Wie interagieren Dimensionen?"
    output: "Komplementarität γ"
    chapter: 4
    description: "Definiert die Wechselwirkungen zwischen Dimensionen"
    
  - id: 4
    name: "WHEN"
    code: "V"
    question: "Wann zählt Kontext?"
    output: "8 Ψ-Dimensionen"
    chapter: 5
    description: "Definiert den Kontext der Entscheidung"
    
  - id: 5
    name: "WHERE"
    code: "BBB"
    question: "Woher die Zahlen?"
    output: "Parameter Θ"
    chapter: 6
    description: "Definiert die Datenquellen und Parameterschätzung"
    
  - id: 6
    name: "AWARE"
    code: "AU"
    question: "Wie bewusst?"
    output: "Awareness A(·) ∈ [0,1]"
    chapter: 11
    description: "Filtert Utility durch Bewusstsein"
    
  - id: 7
    name: "READY"
    code: "AV"
    question: "Handlungsbereit?"
    output: "Willingness WAX ≥ θ"
    chapter: 12
    description: "Prüft die Handlungsbereitschaft"
    
  - id: 8
    name: "STAGE"
    code: "AW"
    question: "Wo in der Journey?"
    output: "BCJ Phase S(t)"
    chapter: 13
    description: "Positioniert in der Behavioral Change Journey"
    
  - id: 9
    name: "HIERARCHY"
    code: "HI"
    question: "Wie stratifizieren Entscheidungen?"
    output: "Levels L0-L3"
    chapter: 15
    description: "Ordnet Entscheidungsebenen hierarchisch"
    
  - id: 10
    name: "EIT"
    code: "IE"
    question: "Wie emergieren Interventionen?"
    output: "Vektor I⃗ ∈ [0,1]⁹"
    chapter: 17
    description: "Designt evidenzbasierte Interventionen"

# ═══════════════════════════════════════════════════════════════════════════════
# EBF PROCESSING PIPELINE (6 Stages)
# ═══════════════════════════════════════════════════════════════════════════════

pipeline:
  description: "Die 10 COREs bilden eine sequenzielle Verarbeitungskette"
  
  stages:
    - stage: 1
      name: "Potential Utility"
      cores: ["WHO", "WHAT", "HOW", "WHEN"]
      formula: "U^pot = Σ_L α^L(Ψ) · [Σ_d ω^L_d · U^L_d + Σ γ^L_dd' · U^L_d·U^L_d']"
      
    - stage: 2
      name: "Effective Utility"
      cores: ["AWARE"]
      formula: "U^eff(t*) = A(t*) × U^pot"
      
    - stage: 3
      name: "Action Decision"
      cores: ["READY"]
      formula: "Action ⟺ WAX(U^eff, φ, Ψ) ≥ θ(Ψ)"
      
    - stage: 4
      name: "Change Journey"
      cores: ["STAGE"]
      formula: "dS/dt = (1/τ) · [S*(A, WAX, Ψ) - S(t)]"
      
    - stage: 5
      name: "Decision Hierarchy"
      cores: ["HIERARCHY"]
      formula: "N_L2 = α · γ_avg × n × (1-m) / log(n)"
      
    - stage: 6
      name: "Intervention"
      cores: ["EIT"]
      formula: "I⃗ ∈ [0,1]⁹ mit E-modes (E-Full, E-Partial, E-None)"

# ═══════════════════════════════════════════════════════════════════════════════
# 10C vs 9D DISTINCTION
# ═══════════════════════════════════════════════════════════════════════════════

distinction:
  "10C":
    definition: "Das theoretische Framework (10 CORE Fragen)"
    count: 10
    purpose: "Vollständige Beschreibung menschlichen Verhaltens"
    
  "9D":
    definition: "Der Interventionsvektor I⃗ ∈ [0,1]⁹"
    count: 9
    purpose: "Targetiert COREs 1-9"
    note: "EIT (CORE 10) ist die Methodologie für Interventionen, nicht ein Target selbst"

# ═══════════════════════════════════════════════════════════════════════════════
# IRREDUCIBILITY PROOF
# ═══════════════════════════════════════════════════════════════════════════════

irreducibility:
  statement: "Jeder CORE beantwortet eine eigene, nicht-reduzierbare Frage"
  
  proofs:
    WHO: "Definiert die Aggregationsebene — ohne WHO keine Zuordnung von Utility"
    WHAT: "Definiert die Utility-Dimensionen — ohne WHAT keine Messung möglich"
    HOW: "Definiert die Wechselwirkungen — ohne HOW keine Komplementaritäten"
    WHEN: "Definiert den Kontext — ohne WHEN keine Situationsabhängigkeit"
    WHERE: "Definiert die Datenquellen — ohne WHERE keine empirische Basis"
    AWARE: "Filtert durch Bewusstsein — ohne AWARE keine Wahrnehmungsbarrieren"
    READY: "Prüft Handlungsbereitschaft — ohne READY kein Entscheidungsmoment"
    STAGE: "Positioniert in der Journey — ohne STAGE keine Veränderungsdynamik"
    HIERARCHY: "Ordnet Entscheidungsebenen — ohne HIERARCHY keine Stratifikation"
    EIT: "Designt Interventionen — ohne EIT keine systematische Verhaltensänderung"
