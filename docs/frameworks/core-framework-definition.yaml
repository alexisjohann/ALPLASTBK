# ============================================================================
# GLOSSAR-INTEGRATION
# ============================================================================
# Zentrale Begriffe pro CORE, verlinkt mit Appendix G (Glossary)

glossary_terms:
  WHO:
    - term: "Welfare Level (L)"
      definition: "Aggregationsebene der Utility-Betrachtung: Individual, Dyad, Group, Society"
      symbol: "L ∈ {1,2,3,4}"
    - term: "Level Weight (α^L)"
      definition: "Kontextabhängige Gewichtung der Welfare Levels"
      symbol: "α^L(Ψ)"

  WHAT:
    - term: "FEPSDE"
      definition: "Die 6 Utility-Dimensionen: Financial, Emotional, Physical, Social, Development, Existential"
      symbol: "d ∈ {F,E,P,S,D,E}"
    - term: "Dimension Weight (ω)"
      definition: "Gewichtung der einzelnen Utility-Dimensionen"
      symbol: "ω^L_d"

  HOW:
    - term: "Complementarity (γ)"
      definition: "Interaktionsparameter zwischen Utility-Dimensionen"
      symbol: "γ^L_{dd'}"
    - term: "Substitutes"
      definition: "Negative Komplementarität (γ < 0)"
      symbol: "γ < 0"

  WHEN:
    - term: "Context Vector (Ψ)"
      definition: "8-dimensionaler Kontextvektor"
      symbol: "Ψ = (Ψ₁,...,Ψ₈)"
    - term: "Context Dimensions"
      definition: "Economic, Social, Temporal, Spatial, Institutional, Cultural, Technological, Environmental"
      symbol: "Ψ₁-Ψ₈"

  WHERE:
    - term: "Parameter Set (Θ)"
      definition: "Alle zu schätzenden Parameter des Frameworks"
      symbol: "Θ"
    - term: "Epistemic Status (E)"
      definition: "Unsicherheitsquantifizierung der Parameter"
      symbol: "E(θ)"

  AWARE:
    - term: "Awareness Function (A)"
      definition: "Filter von potentieller zu effektiver Utility"
      symbol: "A(t*) ∈ [0,1]"
    - term: "Effective Utility"
      definition: "Bewusst wahrgenommene Utility"
      symbol: "U^eff = A × U^pot"

  READY:
    - term: "Willingness (WAX)"
      definition: "Aggregierte Handlungsbereitschaft"
      symbol: "WAX(U^eff, φ, Ψ)"
    - term: "Action Threshold (θ)"
      definition: "Schwelle für Handlungsauslösung"
      symbol: "θ(Ψ)"

  STAGE:
    - term: "Stage State (S)"
      definition: "Position auf der Behavioral Change Journey"
      symbol: "S(t)"
    - term: "Stage Dynamics"
      definition: "Zeitliche Entwicklung des Verhaltens"
      symbol: "dS/dt"
    - term: "Time Constant (τ)"
      definition: "Geschwindigkeit der Verhaltensänderung"
      symbol: "τ"

  HIERARCHY:
    - term: "Decision Level (L0-L3)"
      definition: "Stratifizierung von Entscheidungen nach strategischer Relevanz"
      symbol: "L0, L1, L2, L3"
    - term: "L2 Complexity Formula"
      definition: "Universelle Formel für benötigte koordinierte Entscheidungen"
      symbol: "N_L2 = α·γ_avg × n × (1-m) / log(n)"
    - term: "Strategic Coherence Index (SCI)"
      definition: "Maß für Kohärenz zwischen Entscheidungsebenen"
      symbol: "SCI = ∏_k Coherence_k"

  EIT:
    - term: "Intervention Vector (I⃗)"
      definition: "9-dimensionaler Vektor der Interventionsintensitäten"
      symbol: "I⃗ ∈ [0,1]^9"
    - term: "E-modes (Emergence Modes)"
      definition: "Klassifikation der Emergenz: E-Full, E-Partial, E-None"
      symbol: "E-Full, E-Partial, E-None"
    - term: "10C Intervention Dimensions (DEPRECATED: T1-T8)"
      definition: "Interventionen existieren als Vektoren I⃗ ∈ [0,1]^9 im kontinuierlichen 10C-Raum. Die alte T1-T8 Notation (diskrete Typen) ist überholt."
      symbol: "I_AWARE, I_WHO (self), I_WHO,o (others), I_WHAT,F (financial), I_HOW, I_WHEN, etc."
    - term: "Phase-Type Affinity (α_BCJ)"
      definition: "Matrix der Affinität zwischen Intervention-Typen und BCJ-Phasen"
      symbol: "α_BCJ ∈ [0,1]"
    - term: "Segment Multiplier (β_BCS)"
      definition: "Matrix der Segmentspezifischen Interventionswirksamkeit"
      symbol: "β_BCS ∈ ℝ"

