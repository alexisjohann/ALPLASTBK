# ============================================================================
# EBF CORE FRAMEWORK DEFINITION - SINGLE SOURCE OF TRUTH
# ============================================================================
#
# ACHTUNG: Diese Datei ist die EINZIGE autoritative Quelle für das nC CORE
# Framework. Alle anderen Dateien im Repository MÜSSEN mit dieser Definition
# konsistent sein.
#
# ERWEITERUNG: Um das Framework auf (n+1)C zu erweitern:
# 1. Neuen CORE-Eintrag unten hinzufügen
# 2. Validierungsscript ausführen: python scripts/validate_core_framework.py
# 3. Alle Fehler beheben
# 4. In quality/checklist.md dokumentieren
#
# Version: 2.3 (10C + MECE Epistemology)
# Erstellt: 2026-01-11
# Aktualisiert: 2026-01-20 (MECE Taxonomy complete)
# ============================================================================

framework:
  name: "EBF CORE Framework"
  version: "10C"
  count: 10

  # Die zentrale Frage, die das Framework beantwortet
  central_question: "Wie entsteht und manifestiert sich menschliches Wohlfahrtsverhalten?"

  # Output-Gleichungen (Stage 1-6: EBF Processing Pipeline)
  equations:
    stage_1:
      name: "Potential Utility"
      formula: "U^pot = Σ_L α^L(Ψ) · [Σ_d ω^L_d · U^L_d + Σ γ^L_dd' · U^L_d·U^L_d']"
      depends_on: [WHO, WHAT, HOW, WHEN]
    stage_2:
      name: "Effective Utility"
      formula: "U^eff(t*) = A(t*) × U^pot"
      depends_on: [AWARE]
    stage_3:
      name: "Action Decision"
      formula: "Action ⟺ WAX(U^eff, φ, Ψ) ≥ θ(Ψ)"
      depends_on: [READY]
    stage_4:
      name: "Behavioral Change Journey"
      formula: "dS/dt = (1/τ) · [S*(A, WAX, Ψ) - S(t)]"
      depends_on: [STAGE]
    stage_5:
      name: "Decision Hierarchy"
      formula: "N_L2 = α · γ_avg × n × (1-m) / log(n)"
      depends_on: [HIERARCHY]
      emergence: "γ > 0 creates stratification into L0-L3 decision levels"
    stage_6:
      name: "Intervention"
      formula: "I⃗ ∈ [0,1]^9 with E-modes (E-Full, E-Partial, E-None)"
      depends_on: [EIT]
      emergence: "Intervention vectors I⃗ ∈ [0,1]^9 emerge from 10C integration (continuous space)"
      output: "P_eff = σ(WEC × α_BCJ × β_BCS)"

# ============================================================================
# DIE 10 CORE APPENDICES
# ============================================================================
#
# Reihenfolge ist semantisch: WHO → WHAT → HOW → WHEN → WHERE → AWARE → READY → STAGE → HIERARCHY → EIT
# Diese Reihenfolge reflektiert den logischen Aufbau des Frameworks.
# Stages 1-4: Utility Computation → Stages 5-6: Organizational & Intervention Emergence
# ============================================================================

cores:
  # --------------------------------------------------------------------------
  # CORE 1: WHO - Die Welfare Hierarchy
  # --------------------------------------------------------------------------
  - number: 1
    code: "WHO"
    appendix_code: "AAA"
    full_name: "CORE-WHO"
    title: "The Welfare Hierarchy"
    question_de: "Wer hat Utility?"
    question_en: "Who has utility?"
    output: "Levels L"
    primary_symbol: "L"
    chapter_reference: 2
    file: "appendices/WHO_aggregation_levels.tex"
    key_concepts:
      - "Individual (L=1)"
      - "Dyad (L=2)"
      - "Group (L=3)"
      - "Society (L=4)"
      - "α^L(Ψ) weight functions"

  # --------------------------------------------------------------------------
  # CORE 2: WHAT - Die Utility-Dimensionen
  # --------------------------------------------------------------------------
  - number: 2
    code: "WHAT"
    appendix_code: "C"
    full_name: "CORE-WHAT"
    title: "The Utility Dimensions"
    question_de: "Was ist Utility?"
    question_en: "What is utility?"
    output: "Dimensionen d (FEPSDE)"
    primary_symbol: "d, FEPSDE"
    chapter_reference: 3
    file: "appendices/WAT_fepsde_matrix.tex"
    key_concepts:
      - "Financial (F)"
      - "Emotional (E)"
      - "Physical (P)"
      - "Social (S)"
      - "Development (D)"
      - "Existential (E)"

  # --------------------------------------------------------------------------
  # CORE 3: HOW - Die Komplementaritätsstruktur
  # --------------------------------------------------------------------------
  - number: 3
    code: "HOW"
    appendix_code: "B"
    full_name: "CORE-HOW"
    title: "The Complementarity Structure"
    question_de: "Wie interagieren die Dimensionen?"
    question_en: "How do dimensions interact?"
    output: "Komplementarität γ"
    primary_symbol: "γ"
    chapter_reference: 4
    file: "appendices/HOW_complementarity_levels.tex"
    key_concepts:
      - "γ > 0: Complements"
      - "γ < 0: Substitutes"
      - "γ = 0: Independent"
      - "Cross-level interactions"

  # --------------------------------------------------------------------------
  # CORE 4: WHEN - Der Kontextrahmen
  # --------------------------------------------------------------------------
  - number: 4
    code: "WHEN"
    appendix_code: "V"
    full_name: "CORE-WHEN"
    title: "The Context Framework"
    question_de: "Wann zählt Kontext?"
    question_en: "When does context matter?"
    output: "Kontext Ψ"
    primary_symbol: "Ψ"
    chapter_reference: 5
    file: "appendices/WEN_psi_dimensions.tex"
    key_concepts:
      - "Ψ₁: Economic"
      - "Ψ₂: Social"
      - "Ψ₃: Temporal"
      - "Ψ₄: Spatial"
      - "Ψ₅: Institutional"
      - "Ψ₆: Cultural"
      - "Ψ₇: Technological"
      - "Ψ₈: Environmental"

  # --------------------------------------------------------------------------
  # CORE 5: WHERE - Die Parameterkalibrierung
  # --------------------------------------------------------------------------
  - number: 5
    code: "WHERE"
    appendix_code: "BBB"
    full_name: "CORE-WHERE"
    title: "The Parameter Calibration"
    question_de: "Woher die Zahlen?"
    question_en: "Where do the numbers come from?"
    output: "Parameter Θ, E(θ)"
    primary_symbol: "Θ"
    chapter_reference: 6
    file: "appendices/EST_estimation_methodology.tex"
    key_concepts:
      - "Parameter estimation"
      - "Calibration methods"
      - "Epistemic status"
      - "Uncertainty quantification"

  # --------------------------------------------------------------------------
  # CORE 6: AWARE - Der Awareness-Filter
  # --------------------------------------------------------------------------
  - number: 6
    code: "AWARE"
    appendix_code: "AU"
    full_name: "CORE-AWARE"
    title: "The Awareness Filter"
    question_de: "Wie bewusst?"
    question_en: "How aware?"
    output: "Awareness A(·)"
    primary_symbol: "A(·)"
    chapter_reference: 11
    file: "appendices/AWA_bcm_axiom_formalization.tex"
    key_concepts:
      - "A(t*) ∈ [0,1]"
      - "Salience effects"
      - "Attention allocation"
      - "Bounded awareness"

  # --------------------------------------------------------------------------
  # CORE 7: READY - Die Handlungsbereitschaft
  # --------------------------------------------------------------------------
  - number: 7
    code: "READY"
    appendix_code: "AV"
    full_name: "CORE-READY"
    title: "The Action Readiness"
    question_de: "Handlungsbereit?"
    question_en: "Ready to act?"
    output: "Willingness WAX, θ"
    primary_symbol: "WAX, θ"
    chapter_reference: 12
    file: "appendices/REA_willingness_formalization.tex"
    key_concepts:
      - "WAX ≥ θ threshold"
      - "Action barriers"
      - "Implementation intentions"
      - "Behavioral friction"

  # --------------------------------------------------------------------------
  # CORE 8: STAGE - Die Behavioral Change Journey
  # --------------------------------------------------------------------------
  - number: 8
    code: "STAGE"
    appendix_code: "AW"
    full_name: "CORE-STAGE"
    title: "The Behavioral Change Journey"
    question_de: "Wo in der Verhaltensänderung?"
    question_en: "Where in the change journey?"
    output: "Journey S(t), dS/dt"
    primary_symbol: "S(t), dS/dt"
    chapter_reference: 13
    file: "appendices/STA_behavioral_change_journey.tex"
    key_concepts:
      - "S(t) state variable"
      - "dS/dt dynamics"
      - "τ time constant"
      - "S* equilibrium state"
      - "Stage transitions"

  # --------------------------------------------------------------------------
  # CORE 9: HIERARCHY - Die Entscheidungshierarchie
  # --------------------------------------------------------------------------
  - number: 9
    code: "HIERARCHY"
    appendix_code: "HI"
    full_name: "CORE-HIERARCHY"
    title: "The Decision Hierarchy"
    question_de: "Wie stratifizieren Entscheidungen?"
    question_en: "How do decisions stratify into levels?"
    output: "Levels L0-L3, N_L2"
    primary_symbol: "L0, L1, L2, L3, N_L2"
    chapter_reference: 15
    file: "appendices/HIE_decision_hierarchy.tex"
    key_concepts:
      - "L0 (Operative) - Implementation details"
      - "L1 (Strategic Roots) - Core direction"
      - "L2 (Derived) - Coordinated decisions"
      - "L3 (Emergent) - System-level patterns"
      - "N_L2 = α·γ_avg × n × (1-m) / log(n)"
      - "Strategic Coherence Index (SCI)"

  # --------------------------------------------------------------------------
  # CORE 10: EIT - Emergent Intervention Theory
  # --------------------------------------------------------------------------
  - number: 10
    code: "EIT"
    appendix_code: "IE"
    full_name: "CORE-EIT"
    title: "Emergent Intervention Theory"
    question_de: "Wie emergieren Interventionen aus dem 10C-System?"
    question_en: "How do interventions emerge from the 10C system?"
    output: "Intervention Vector I⃗ ∈ [0,1]⁹, E-modes (emergent from 10C)"
    primary_symbol: "I⃗, E-Full, E-Partial, E-None"
    chapter_reference: 17
    file: "appendices/IE_CORE-EIT.tex"
    key_concepts:
      - "10C Emergence Classification (Fundamental/Semi-Emergent/Fully Emergent)"
      - "E-Full: Dimensions + Values entirely determined by prior COREs"
      - "E-Partial: Dimensions determined, values require configuration"
      - "E-None: Neither dimensions nor values determined"
      - "Continuous Intervention Space [0,1]⁹ targeting COREs 1-9"
      - "Why 9D in 10C: EIT (CORE 10) is the METHODOLOGY, not a target dimension"
      - "Phase-Type Affinity Matrix α_BCJ"
      - "Segment Multiplier Matrix β_BCS"
      - "P_eff = σ(WEC × α_BCJ × β_BCS)"

# ============================================================================
# ERWEITERUNGSREGELN
# ============================================================================

extension_rules:
  adding_new_core:
    description: "Wie man das Framework auf (n+1)C erweitert"
    steps:
      - step: 1
        action: "Neuen CORE in dieser YAML-Datei hinzufügen"
        details: "Am Ende der 'cores' Liste einen neuen Eintrag mit allen Pflichtfeldern"
      - step: 2
        action: "framework.count und framework.version aktualisieren"
        details: "z.B. count: 10, version: '10C'"
      - step: 3
        action: "Validierungsscript ausführen"
        command: "python scripts/validate_core_framework.py"
      - step: 4
        action: "Alle gemeldeten Inkonsistenzen beheben"
        details: "Das Script zeigt alle Dateien, die aktualisiert werden müssen"
      - step: 5
        action: "Neue Appendix-Datei erstellen"
        template: "appendices/00_appendix_template.tex"
      - step: 6
        action: "In appendices/00_appendix_index.tex eintragen"
      - step: 7
        action: "Qualitätsprüfung durchführen"
        command: "python scripts/check_template_compliance.py appendices/<new_file>.tex"

  required_fields:
    - "number"
    - "code"
    - "appendix_code"
    - "full_name"
    - "title"
    - "question_de"
    - "question_en"
    - "output"
    - "primary_symbol"
    - "chapter_reference"
    - "file"
    - "key_concepts"

  naming_convention:
    code: "UPPERCASE, 2-6 Buchstaben, keine Sonderzeichen"
    appendix_code: "1-3 Großbuchstaben (A-Z, AA-ZZ, AAA-ZZZ)"
    full_name: "CORE-{CODE}"
    file: "appendices/{appendix_code}_{lowercase_name}.tex"

# ============================================================================
# VALIDIERUNGSREGELN
# ============================================================================

validation:
  files_to_check:
    - pattern: "README.md"
      expected_pattern: "{count}C"
    - pattern: "CLAUDE.md"
      expected_pattern: "{count}C"
    - pattern: "appendices/README.md"
      expected_pattern: "{count}C"
    - pattern: "appendices/00_appendix_index.tex"
      expected_pattern: "CORE-{code}"
    - pattern: "docs/frameworks/appendix-category-definitions.md"
      expected_pattern: "{count}"
    - pattern: "chapters/*/README.md"
      expected_pattern: "{count}C"

  consistency_checks:
    - name: "CORE count matches"
      rule: "Anzahl der cores-Einträge == framework.count"
    - name: "All files exist"
      rule: "Jede referenzierte Datei in cores[].file existiert"
    - name: "No duplicate codes"
      rule: "Alle cores[].code sind eindeutig"
    - name: "No duplicate appendix_codes"
      rule: "Alle cores[].appendix_code sind eindeutig"
    - name: "Sequential numbering"
      rule: "cores[].number ist 1, 2, 3, ..., n ohne Lücken"

# ============================================================================
# DERIVED STRUCTURES: HHH 20-FIELD INTERVENTION SCHEMA
# ============================================================================
#
# Die 20 HHH-Felder emergieren systematisch aus den 10C COREs.
# Diese Mapping-Tabelle dokumentiert die Ableitungslogik für Reproduzierbarkeit.
#
# Referenz: Appendix HHH (METHOD-TOOLKIT), Theoreme HHH-T1 bis HHH-T7
# ============================================================================

derived_structures:
  hhh_20_field_schema:
    name: "HHH 20-Field Intervention Schema"
    source_appendix: "HHH"
    total_fields: 20

    # -------------------------------------------------------------------------
    # EMERGENTE FELDER (direkt aus 10C via Theoreme abgeleitet)
    # -------------------------------------------------------------------------
    emergent_fields:
      - field: "F2"
        name: "Intervention Type"
        theorem: "HHH-T1"
        source: "W_eff Decomposition"
        cardinality: 8
        categories:
          - "Awareness (→ A)"
          - "Feedback (→ κ_AWX)"
          - "Contextual (→ κ_KON)"
          - "Temporal (→ κ_JNY)"
          - "Identity (→ W_base)"
          - "Social (→ u_S)"
          - "Financial (→ u_F)"
          - "Binding (→ γ_ij)"
        derivation: |
          Emerges from decomposition of effective willingness:
          W_eff = W_base · A(·) · (1 + κ_AWX) · (1 + κ_KON) · (1 + κ_JNY)
          Each intervention type targets exactly one component.

      - field: "F4"
        name: "Target Structure"
        theorem: "HHH-T3"
        source_core: "WHO"
        source_appendix: "AAA"
        cardinality: 4
        categories:
          - "Individual (L1)"
          - "Dyadic (L2)"
          - "Group (L3)"
          - "Societal (L4)"
        derivation: |
          Emerges from Welfare Hierarchy levels.
          L(I) = max{L : ∂E(I)/∂U^L ≠ 0}

      - field: "F5"
        name: "FEPSDE Dimension"
        theorem: "HHH-T4"
        source_core: "WHAT"
        source_appendix: "C"
        cardinality: 6
        categories:
          - "Financial (F)"
          - "Emotional (E)"
          - "Physical (P)"
          - "Social (S)"
          - "Development (D)"
          - "Existential (X)"
        derivation: |
          Emerges from utility dimensions.
          d*(I) = argmax_d |∂E(I)/∂u_d|

      - field: "F6"
        name: "Journey Phase"
        theorem: "HHH-T5"
        source_core: "STAGE"
        source_appendix: "AW"
        cardinality: 5
        categories:
          - "Awareness (S ∈ [0, 0.2))"
          - "Trigger (S ∈ [0.2, 0.4))"
          - "Action (S ∈ [0.4, 0.6))"
          - "Maintenance (S ∈ [0.6, 0.8))"
          - "Stabilization (S ∈ [0.8, 1.0])"
        derivation: |
          Emerges from Behavioral Change Journey state S(t).
          φ*(I) = argmax_φ E(I | φ)

      - field: "F12"
        name: "Temporal Scope"
        theorem: "HHH-T2"
        source_core: "HIERARCHY"
        source_appendix: "HI"
        cardinality: 5
        categories:
          - "Instant (L3, hours-days)"
          - "Operative (L3, days-weeks)"
          - "Tactical (L2, weeks-months)"
          - "Strategic (L1, months-years)"
          - "System (L0, years-decades)"
        derivation: |
          Emerges from decision hierarchy levels.
          T(I) = f(L_target) where L ∈ {L0, L1, L2, L3}

      - field: "F21_proposed"
        name: "Awareness Regime"
        theorem: "HHH-T6"
        source_core: "AWARE"
        source_appendix: "AU"
        cardinality: 3
        categories:
          - "Low (A < 0.3)"
          - "Medium (0.3 ≤ A < 0.7)"
          - "Full (A ≥ 0.7)"
        derivation: |
          Emerges from Awareness filter A(·).
          Proposed extension to 21-field schema.
        status: "proposed"

    # -------------------------------------------------------------------------
    # KONTEXT-FELD (Ψ-Dimensionen)
    # -------------------------------------------------------------------------
    context_fields:
      - field: "F3"
        name: "Context Level"
        source_core: "WHEN"
        source_appendix: "V"
        cardinality: 8
        categories:
          - "Economic (Ψ₁)"
          - "Social (Ψ₂)"
          - "Temporal (Ψ₃)"
          - "Spatial (Ψ₄)"
          - "Institutional (Ψ₅)"
          - "Cultural (Ψ₆)"
          - "Technological (Ψ₇)"
          - "Environmental (Ψ₈)"
        derivation: |
          Maps directly to the 8 Ψ-dimensions from WHEN.
          Context determines γ(Ψ) complementarity matrix.

    # -------------------------------------------------------------------------
    # INTERFACE-FELDER (Links zu anderen COREs)
    # -------------------------------------------------------------------------
    interface_fields:
      - field: "F9"
        name: "Target Segment"
        links_to: "BA (Segmentation)"
        source_core: "WHO"
        derivation: "Links intervention to behavioral segments from Appendix BA"

      - field: "F10"
        name: "Complementarity"
        links_to: "B (Complementarity Matrix)"
        source_core: "HOW"
        derivation: |
          References γ-matrix for intervention combinations.
          E(I_H) = Σ E(I_i) + Σ γ_ij · √(E(I_i)·E(I_j))

    # -------------------------------------------------------------------------
    # OPERATIONALE FELDER (Fixed, zweckgebunden)
    # -------------------------------------------------------------------------
    operational_fields:
      administrative:
        - field: "F1"
          name: "Title/Label"
          purpose: "Human-readable identifier"
        - field: "F18"
          name: "System Link/ID"
          purpose: "Technical system integration"
        - field: "F19"
          name: "Description"
          purpose: "Mechanism explanation"
        - field: "F20"
          name: "Status/Validation"
          purpose: "Lifecycle tracking"

      design_parameters:
        - field: "F7"
          name: "Framing Logic"
          options: ["Positive", "Negative", "Social", "Neutral"]
          purpose: "Communication design"
        - field: "F8"
          name: "Autonomy Level"
          options: ["Voluntary", "Default", "Mandate", "Prohibition"]
          purpose: "Choice architecture"
        - field: "F11"
          name: "Side Effect Risk"
          options: ["Low", "Medium", "High"]
          purpose: "Risk assessment"

      implementation:
        - field: "F13"
          name: "Evaluation Plan"
          purpose: "Measurement strategy"
        - field: "F14"
          name: "Path Function"
          options: ["Door-opener", "Amplifier", "Escalator", "Stabilizer"]
          purpose: "Journey role classification"
        - field: "F15"
          name: "Repetition Required"
          options: ["Yes", "No", "Cyclic"]
          purpose: "Dosing strategy"
        - field: "F16"
          name: "Responsible Role"
          purpose: "Accountability assignment"
        - field: "F17"
          name: "Source/Evidence"
          purpose: "Literature backing"

    # -------------------------------------------------------------------------
    # KOMBINATORIK (14,400 → Feasible)
    # -------------------------------------------------------------------------
    combinatorics:
      theoretical_space:
        formula: "8 × 5 × 4 × 6 × 5 × 3 = 14,400"
        components:
          - "Type (HHH-T1): 8"
          - "Scope (HHH-T2): 5"
          - "Level (HHH-T3): 4"
          - "Dimension (HHH-T4): 6"
          - "Phase (HHH-T5): 5"
          - "Awareness (HHH-T6): 3"

      feasibility_reduction:
        theorem: "HHH-T8"
        method: "Four constraint classes"
        constraints:
          - "C_affinity: Type-Phase and Type-Awareness affinity ≥ θ_α"
          - "C_logical: No self-contradictory combinations"
          - "C_scale: Scope-Level coherence |s_rank - l_rank| ≤ 2"
          - "C_empirical: Evidence base exists for (Type, Dimension) pairing"
        result: "~2,000 feasible archetypes"

      gamma_filter:
        description: "Context-dependent complementarity as universal feasibility filter"
        formula: "Feasible(I | Ψ) ⟺ γ(Ψ → target_FEPSDE(I)) ≥ θ"
        data_file: "data/gamma_matrix_complete.json"
        estimation_method: "LLM Monte Carlo (Appendix III)"

# ============================================================================
# EPISTEMOLOGY: MECE TAXONOMY OF SCIENTIFIC CONSTRUCTS
# ============================================================================
#
# SSOT für epistemologische Begriffe im EBF Framework.
# Diese Definitionen sind BINDEND für alle Appendices und Kapitel.
#
# MECE = Mutually Exclusive, Collectively Exhaustive
# Jeder wissenschaftliche Baustein gehört zu GENAU EINER Kategorie.
#
# ============================================================================

epistemology:
  # ==========================================================================
  # ÜBERSICHT: DIE 6 MECE KATEGORIEN
  # ==========================================================================
  #
  # ┌─────────────────────────────────────────────────────────────────────────┐
  # │  KATEGORIE 1: PRÄMISSEN (Inputs - nicht innerhalb EBF bewiesen)         │
  # │  ├── Axiom (structural, empirical, theoretical)                         │
  # │  └── Assumption (implizite Annahme)                                     │
  # ├─────────────────────────────────────────────────────────────────────────┤
  # │  KATEGORIE 2: NAMENGEBUNG (Tautologisch - per Definition wahr)          │
  # │  ├── Definition (Konzept benennen)                                      │
  # │  └── Notation (Symbol einführen)                                        │
  # ├─────────────────────────────────────────────────────────────────────────┤
  # │  KATEGORIE 3: BEWIESENE AUSSAGEN (Outputs - logisch abgeleitet)         │
  # │  ├── Theorem (Hauptresultat, vollständiger Beweis)                      │
  # │  ├── Proposition (mittleres Resultat, Beweis)                           │
  # │  ├── Lemma (Hilfsaussage für Theorem)                                   │
  # │  └── Corollary (direkte Folge aus Theorem/Proposition)                  │
  # ├─────────────────────────────────────────────────────────────────────────┤
  # │  KATEGORIE 4: OFFENE AUSSAGEN (Noch nicht bewiesen)                     │
  # │  ├── Conjecture (Vermutung, plausibel aber unbewiesen)                  │
  # │  └── Open Issue (offene Forschungsfrage)                                │
  # ├─────────────────────────────────────────────────────────────────────────┤
  # │  KATEGORIE 5: ILLUSTRATIONEN (Veranschaulichung, nicht Beweis)          │
  # │  ├── Example (konkretes Beispiel)                                       │
  # │  ├── Remark (ergänzende Bemerkung)                                      │
  # │  ├── Observation (empirische Beobachtung)                               │
  # │  └── Critical Foundation (Schlüsseleinsicht aus Literatur)              │
  # ├─────────────────────────────────────────────────────────────────────────┤
  # │  KATEGORIE 6: PRAKTISCHE REGELN (Nützlich aber nicht garantiert)        │
  # │  └── Heuristic (Faustregel)                                             │
  # └─────────────────────────────────────────────────────────────────────────┘
  #
  # ==========================================================================

  # ==========================================================================
  # MECE DECISION TREE: Welches Konstrukt verwenden?
  # ==========================================================================
  decision_tree: |
    START: Was ist die Natur der Aussage?
    │
    ├── Führt Notation/Terminologie ein? ────────────────────────────→ KATEGORIE 2
    │   ├── Benennt ein Konzept? ──────────────────────────────────→ Definition
    │   └── Führt Symbol ein? ─────────────────────────────────────→ Notation
    │
    ├── Ist eine Grundannahme (nicht bewiesen innerhalb EBF)?───────→ KATEGORIE 1
    │   ├── Explizit und nummeriert? ──────────────────────────────→ Axiom
    │   │   ├── Definiert Struktur/Kategorien? ────────────────────→ structural
    │   │   ├── Behauptet empirische Tatsache? ────────────────────→ empirical
    │   │   └── Abgeleitet aus externer Theorie? ──────────────────→ theoretical
    │   └── Implizit verwendet? ───────────────────────────────────→ Assumption
    │
    ├── Ist logisch bewiesen? ──────────────────────────────────────→ KATEGORIE 3
    │   ├── Hauptresultat mit großer Bedeutung? ───────────────────→ Theorem
    │   ├── Mittleres Resultat? ───────────────────────────────────→ Proposition
    │   ├── Hilfsaussage für größeres Theorem? ────────────────────→ Lemma
    │   └── Folgt direkt aus Theorem/Proposition? ─────────────────→ Corollary
    │
    ├── Ist eine unbewiesene Vermutung? ────────────────────────────→ KATEGORIE 4
    │   ├── Spezifische Vermutung (könnte bewiesen werden)? ───────→ Conjecture
    │   └── Offene Forschungsfrage (braucht mehr Arbeit)? ─────────→ Open Issue
    │
    ├── Veranschaulicht/illustriert? ───────────────────────────────→ KATEGORIE 5
    │   ├── Konkretes Anwendungsbeispiel? ─────────────────────────→ Example
    │   ├── Ergänzende Bemerkung? ─────────────────────────────────→ Remark
    │   ├── Empirische Beobachtung (kein Beweis)? ─────────────────→ Observation
    │   └── Wichtige Einsicht aus Literatur? ──────────────────────→ Critical Foundation
    │
    └── Ist eine praktische Faustregel? ────────────────────────────→ KATEGORIE 6
        └── Funktioniert meist, keine Garantie? ───────────────────→ Heuristic

  # ==========================================================================
  # FORMALE MATHEMATISCHE DEFINITIONEN (MECE)
  # ==========================================================================
  #
  # Notation:
  #   𝒜(EBF) = Menge aller Axiome im EBF
  #   𝒯(EBF) = Menge aller Theoreme im EBF
  #   ⊢      = "beweist" (syntaktische Ableitbarkeit)
  #   ⊨      = "impliziert" (semantische Folgerung)
  #   ≡      = "ist definiert als" (Identität per Definition)
  #   𝒫      = Beweis (Sequenz von Ableitungsschritten)
  #   ℰ      = Evidenzmenge (peer-reviewed Quellen)
  #   σ      = Signifikanz-Funktion (subjektive Wichtigkeit)
  #
  # ==========================================================================

  formal_definitions:
    # ========================================================================
    # KATEGORIE 1: PRÄMISSEN
    # ========================================================================
    axiom:
      symbol: "α"
      formal: |
        α ∈ 𝒜(EBF) ⟺
          (1) α ist eine wohlgeformte Aussage in der Sprache von EBF
          (2) ¬∃𝒫: 𝒜(EBF)\{α} ⊢ α  (nicht aus anderen Axiomen ableitbar)
          (3) α wird als Prämisse akzeptiert

      subtypes:
        structural:
          formal: |
            α_struct ∈ 𝒜_struct(EBF) ⟺
              α ∈ 𝒜(EBF) ∧ α definiert Struktur S
              ∧ ¬∃ empirischer Test T: T widerlegt α
          interpretation: "Modellierungsentscheidung, nicht falsifizierbar"

        empirical:
          formal: |
            α_emp ∈ 𝒜_emp(EBF) ⟺
              α ∈ 𝒜(EBF) ∧ ∃ℰ ⊆ Literature: |ℰ| ≥ 1
              ∧ ∀e ∈ ℰ: e supports α ∧ peer_reviewed(e)
          interpretation: "Empirisch gestützte Annahme, falsifizierbar"

        theoretical:
          formal: |
            α_theo ∈ 𝒜_theo(EBF) ⟺
              α ∈ 𝒜(EBF) ∧ ∃ externe Theorie 𝒯_ext: 𝒯_ext ⊢ α
              ∧ documented(derivation(𝒯_ext, α))
          interpretation: "Von externer Theorie importiert"

    assumption:
      symbol: "ι"
      formal: |
        ι ∈ Assumptions(EBF) ⟺
          (1) ι wird stillschweigend in Beweisen verwendet
          (2) ι ∉ 𝒜(EBF)  (nicht explizit als Axiom gelistet)
          (3) ∃𝒫 ∈ Proofs(EBF): ι appears_in 𝒫
      interpretation: "Implizite Prämisse, sollte explizit gemacht werden wenn zentral"

    # ========================================================================
    # KATEGORIE 2: NAMENGEBUNG (Tautologisch)
    # ========================================================================
    definition:
      symbol: "δ"
      formal: |
        δ: t_new ≡ expr(t_1, ..., t_n) ⟺
          (1) t_new ist ein neuer Term (nicht bereits definiert)
          (2) t_1, ..., t_n sind bereits definierte Terme
          (3) δ ist eine reine Namensgebung (keine Behauptung)
          (4) ∀ Kontexte K: t_new kann durch expr ersetzt werden (Eliminierbarkeit)
      interpretation: "Abkürzung/Benennung, macht keine inhaltliche Aussage"
      truth_value: "Immer wahr per Konvention (tautologisch)"

    notation:
      symbol: "ν"
      formal: |
        ν: symbol ↦ meaning ⟺
          (1) symbol ist ein neues Zeichen
          (2) meaning ist eine syntaktische Konvention
          (3) ν ändert nicht die Aussagenkraft des Systems
      interpretation: "Rein syntaktische Abkürzung"
      truth_value: "Weder wahr noch falsch (metasprachlich)"

    # ========================================================================
    # KATEGORIE 3: BEWIESENE AUSSAGEN
    # ========================================================================
    theorem:
      symbol: "τ"
      formal: |
        τ ∈ 𝒯(EBF) ⟺
          (1) ∃𝒫: 𝒜(EBF) ⊢ τ  (beweisbar aus Axiomen)
          (2) σ(τ) ≥ θ_theorem  (hohe Signifikanz)
          (3) 𝒫 ist dokumentiert und verifizierbar
      interpretation: "Hauptresultat mit vollständigem Beweis"

    proposition:
      symbol: "π"
      formal: |
        π ∈ Propositions(EBF) ⟺
          (1) ∃𝒫: 𝒜(EBF) ⊢ π  (beweisbar aus Axiomen)
          (2) θ_lemma < σ(π) < θ_theorem  (mittlere Signifikanz)
      interpretation: "Bewiesenes Zwischenresultat"
      relation: "𝒯(EBF) ∩ Propositions(EBF) = ∅ (disjunkt nach σ)"

    lemma:
      symbol: "λ"
      formal: |
        λ ∈ Lemmas(EBF) ⟺
          (1) ∃𝒫: 𝒜(EBF) ⊢ λ  (beweisbar)
          (2) ∃τ ∈ 𝒯(EBF): λ appears_in proof(τ)  (dient einem Theorem)
          (3) σ(λ) < θ_lemma  (geringe eigenständige Signifikanz)
      interpretation: "Hilfsaussage für größeren Beweis"

    corollary:
      symbol: "κ"
      formal: |
        κ ∈ Corollaries(EBF) ⟺
          (1) ∃τ ∈ 𝒯(EBF) ∪ Propositions(EBF): τ ⊨ κ  (folgt direkt)
          (2) Der Schluss von τ nach κ ist trivial (≤ 2 Schritte)
      interpretation: "Unmittelbare Konsequenz eines Theorems/Proposition"

    # ========================================================================
    # KATEGORIE 4: OFFENE AUSSAGEN
    # ========================================================================
    conjecture:
      symbol: "ξ"
      formal: |
        ξ ∈ Conjectures(EBF) ⟺
          (1) ξ ist wohlgeformt in der Sprache von EBF
          (2) ¬∃𝒫: 𝒜(EBF) ⊢ ξ  (kein Beweis bekannt)
          (3) ¬∃𝒫: 𝒜(EBF) ⊢ ¬ξ  (kein Gegenbeweis bekannt)
          (4) ∃ plausibility_argument(ξ)  (Plausibilitätsargument existiert)
      interpretation: "Unbewiesene aber präzise formulierte Vermutung"

    open_issue:
      symbol: "ω"
      formal: |
        ω ∈ OpenIssues(EBF) ⟺
          (1) ω ist eine Frage Q oder Lücke G im Framework
          (2) ¬∃ξ ∈ Conjectures: ω = "Prove ξ"  (nicht als Conjecture formulierbar)
          (3) ∃ importance_justification(ω)
      interpretation: "Offene Forschungsfrage, noch nicht präzise genug für Conjecture"

    # ========================================================================
    # KATEGORIE 5: ILLUSTRATIONEN
    # ========================================================================
    example:
      symbol: "ε"
      formal: |
        ε ∈ Examples(EBF) ⟺
          (1) ε ist eine konkrete Instanz I eines abstrakten Konzepts C
          (2) ε demonstriert C, beweist aber nichts über C
          (3) ∃ takeaway(ε): Lerneffekt aus ε
      interpretation: "Veranschaulichung, kein Beweis"
      epistemic_status: "Illustrativ (ILL)"

    remark:
      symbol: "ρ"
      formal: |
        ρ ∈ Remarks(EBF) ⟺
          (1) ρ bezieht sich auf ein anderes Konstrukt X
          (2) ρ ∉ 𝒯(EBF) ∪ Propositions ∪ Lemmas  (kein eigenständiges Resultat)
          (3) ρ gibt Kontext, Vergleich oder Erläuterung zu X
      interpretation: "Ergänzende Bemerkung zu einem anderen Konstrukt"

    observation:
      symbol: "ο"
      formal: |
        ο ∈ Observations(EBF) ⟺
          (1) ο beschreibt ein empirisches Muster M
          (2) ∃ℰ ⊆ Data ∪ Literature: ℰ supports M
          (3) ο ist nicht formal bewiesen (ο ∉ 𝒯 ∪ Propositions)
      interpretation: "Empirisch beobachtetes Muster ohne formalen Beweis"
      epistemic_status: "Empirisch (EMP), aber schwächer als empirisches Axiom"

    critical_foundation:
      symbol: "φ"
      formal: |
        φ ∈ CriticalFoundations(EBF) ⟺
          (1) φ ist eine zentrale Einsicht aus externer Literatur L
          (2) ∃ source(φ) ∈ PeerReviewedLiterature
          (3) φ ist fundamental für EBF (σ_importance(φ) ≥ θ_critical)
          (4) φ ∉ 𝒜(EBF)  (nicht als EBF-Axiom formalisiert)
      interpretation: "Wichtige externe Erkenntnis, auf der EBF aufbaut"

    # ========================================================================
    # KATEGORIE 6: PRAKTISCHE REGELN
    # ========================================================================
    heuristic:
      symbol: "η"
      formal: |
        η ∈ Heuristics(EBF) ⟺
          (1) η ist eine Entscheidungsregel R
          (2) P(R correct | typical_cases) ≥ θ_heuristic  (meist korrekt)
          (3) ∃ edge_cases: R incorrect  (keine Garantie)
          (4) ¬∃𝒫: 𝒜(EBF) ⊢ "R always correct"  (kein allgemeiner Beweis)
      interpretation: "Praktische Faustregel ohne Garantie"
      epistemic_status: "Illustrativ (ILL)"

  # ==========================================================================
  # MECE PARTITIONIERUNG (Beweis der Vollständigkeit)
  # ==========================================================================
  mece_proof:
    mutually_exclusive: |
      Die 6 Kategorien sind disjunkt durch die folgenden Unterscheidungsmerkmale:

      1. PRÄMISSEN vs. REST: Nicht aus EBF-Axiomen bewiesen (α, ι)
      2. NAMENGEBUNG vs. REST: Tautologisch, macht keine Behauptung (δ, ν)
      3. BEWIESEN vs. REST: ∃𝒫: 𝒜 ⊢ X (τ, π, λ, κ)
      4. OFFEN vs. REST: Noch nicht bewiesen, aber formuliert (ξ, ω)
      5. ILLUSTRATION vs. REST: Veranschaulicht, beweist nicht (ε, ρ, ο, φ)
      6. HEURISTIK vs. REST: Praktische Regel ohne Garantie (η)

      Formaler Test für beliebiges Konstrukt X:
        is_premise(X)     := ¬provable(X) ∧ accepted_as_input(X)
        is_naming(X)      := tautological(X)
        is_proven(X)      := ∃𝒫: 𝒜 ⊢ X
        is_open(X)        := ¬proven(X) ∧ ¬disproven(X) ∧ well_formed(X)
        is_illustration(X) := demonstrates(X) ∧ ¬proves(X)
        is_heuristic(X)   := practical_rule(X) ∧ ¬guaranteed(X)

      ∀X: Genau eine dieser Funktionen ist wahr.

    collectively_exhaustive: |
      Jedes wissenschaftliche Konstrukt in EBF fällt in genau eine Kategorie:

      Universe(EBF) = 𝒜 ∪ Assumptions ∪ Definitions ∪ Notations
                    ∪ 𝒯 ∪ Propositions ∪ Lemmas ∪ Corollaries
                    ∪ Conjectures ∪ OpenIssues
                    ∪ Examples ∪ Remarks ∪ Observations ∪ CriticalFoundations
                    ∪ Heuristics

      Beweis: Für jedes X ∈ Universe(EBF), frage:
        1. Wird X als wahr angenommen? → Prämisse (Kat. 1)
        2. Führt X nur einen Namen ein? → Namengebung (Kat. 2)
        3. Ist X bewiesen? → Bewiesene Aussage (Kat. 3)
        4. Ist X eine unbewiesene Behauptung? → Offene Aussage (Kat. 4)
        5. Illustriert X ein Konzept? → Illustration (Kat. 5)
        6. Ist X eine praktische Regel? → Heuristik (Kat. 6)

      Da diese Fragen erschöpfend sind, ist jedes X klassifiziert. ∎

  # ==========================================================================
  # KATEGORIE 1: PRÄMISSEN (Inputs)
  # ==========================================================================
  # --------------------------------------------------------------------------
  # KATEGORIE 1a: AXIOM
  # --------------------------------------------------------------------------
  axiom:
    definition_de: |
      Ein Axiom im EBF ist eine fundamentale Aussage, die als Ausgangspunkt für
      Ableitungen dient und nicht innerhalb des Frameworks bewiesen wird.
    definition_en: |
      An axiom in EBF is a fundamental statement that serves as a starting point
      for derivations and is not proven within the framework.

    # Die drei Axiom-Typen
    types:
      structural:
        name_de: "Strukturelles Axiom"
        name_en: "Structural Axiom"
        definition: |
          Definiert die Struktur des Frameworks selbst (z.B. Dimensionen,
          Klassifikationen, Taxonomien). Ist eine Modellierungsentscheidung.
        evidence_required: false
        epistemic_tag: "THR"
        examples:
          - "EIT-1: 10C Completeness Axiom - Jede Intervention lässt sich durch 10C kategorisieren"
          - "EIT-12: Continuous Intervention Space - I⃗ ∈ [0,1]^9 statt diskrete Typen"
        criteria:
          - "Definiert Kategorien oder Strukturen"
          - "Ist eine Wahl, keine empirische Behauptung"
          - "Konsistenz ist das Hauptkriterium"
          - "Kann nicht 'falsch' sein, nur 'weniger nützlich'"

      empirical:
        name_de: "Empirisches Axiom"
        name_en: "Empirical Axiom"
        definition: |
          Behauptet eine empirische Tatsache als Grundlage. MUSS durch
          peer-reviewed Literatur gestützt sein.
        evidence_required: true
        evidence_minimum: 1  # Mindestens 1 Zitat
        evidence_recommended: 3  # Empfohlen: 3+ Zitate
        epistemic_tag: "EMP"
        examples:
          - "λ = 2.25 als Loss Aversion Parameter [Tversky & Kahneman 1992]"
          - "Crowding-Out: I_WHAT,F kann I_WHO untergraben [Deci & Ryan 1985; Frey 1997]"
        criteria:
          - "Macht eine Behauptung über die Realität"
          - "Könnte durch Daten widerlegt werden"
          - "MUSS Literaturzitat haben"
          - "Zitat MUSS peer-reviewed sein"

      theoretical:
        name_de: "Theoretisches Postulat"
        name_en: "Theoretical Postulate"
        definition: |
          Abgeleitet aus anderen etablierten Theorien. Erbt die Evidenzbasis
          der Quelltheorie.
        evidence_required: true
        evidence_type: "derivation"  # Ableitung, nicht direkter Nachweis
        epistemic_tag: "THR"
        examples:
          - "Supermodularität impliziert Komplementarität [Topkis 1998]"
          - "Portfolio Optimization Existence [aus konvexer Optimierungstheorie]"
        criteria:
          - "Logisch aus etablierter Theorie abgeleitet"
          - "Ableitungsschritte MÜSSEN dokumentiert sein"
          - "Quelltheorie MUSS peer-reviewed sein"

    # Pflicht-Elemente für jedes Axiom
    required_elements:
      - element: "Code"
        format: "[PREFIX]-[NUMBER]"
        example: "EIT-5"
      - element: "Name"
        format: "Kurzer beschreibender Name"
        example: "Emergence Classification Axiom"
      - element: "Statement"
        format: "Formale mathematische Aussage"
        example: "∀I: E(I) ∈ {E-Full, E-Partial, E-None}"
      - element: "Type"
        format: "structural | empirical | theoretical"
        required: true
      - element: "Evidence"
        format: "[Autor Jahr] für empirische Axiome"
        conditional: "PFLICHT wenn type = empirical"
      - element: "Interpretation"
        format: "Was bedeutet das Axiom?"
        required: true
      - element: "Implication"
        format: "Was folgt daraus?"
        required: true
      - element: "Cross-References"
        format: "Verwandte Axiome/Theoreme"
        required: true

    # Latex-Template
    latex_template: |
      \begin{axiom}[CODE]{Name}
      \textbf{Type:} [structural/empirical/theoretical]

      \textbf{Statement:} [Formale Aussage]

      \textbf{Evidence:} [Zitate für empirische Axiome]

      \textbf{Interpretation:} [Bedeutung]

      \textbf{Implication:} [Konsequenzen]

      \textbf{Cross-References:} [Verwandte Elemente]
      \end{axiom}

  # --------------------------------------------------------------------------
  # KATEGORIE 1b: ASSUMPTION (implizite Annahme)
  # --------------------------------------------------------------------------
  assumption:
    definition_de: |
      Eine Assumption ist eine implizite Annahme, die nicht explizit als Axiom
      nummeriert ist, aber stillschweigend vorausgesetzt wird.
    definition_en: |
      An assumption is an implicit premise that is not explicitly numbered
      as an axiom but is tacitly presupposed.

    evidence_required: false
    epistemic_tag: "THR"

    distinction_from_axiom:
      axiom: "Explizit nummeriert und formal dokumentiert"
      assumption: "Implizit vorausgesetzt, nicht formal dokumentiert"

    examples:
      - "Rationale Agenten maximieren Expected Utility"
      - "Märkte sind liquide genug für kontinuierlichen Handel"
      - "Befragte antworten ehrlich auf Survey-Fragen"

    when_to_make_explicit: |
      Eine Assumption sollte zu einem Axiom werden, wenn:
      - Sie zentral für wichtige Ergebnisse ist
      - Sie kontrovers oder nicht-offensichtlich ist
      - Sie von anderen Frameworks anders behandelt wird

  # ==========================================================================
  # KATEGORIE 2: NAMENGEBUNG (Tautologisch)
  # ==========================================================================

  # --------------------------------------------------------------------------
  # KATEGORIE 2a: NOTATION (Symbol einführen)
  # --------------------------------------------------------------------------
  notation:
    definition_de: |
      Eine Notation führt ein Symbol oder eine Schreibweise ein, die im weiteren
      Verlauf verwendet wird. Sie ist rein syntaktisch und macht keine
      inhaltliche Aussage.
    definition_en: |
      A notation introduces a symbol or writing convention to be used throughout.
      It is purely syntactic and makes no substantive claim.

    evidence_required: false
    epistemic_tag: "THR"  # Per Definition wahr

    examples:
      - code: "NOT-1"
        content: "Wir schreiben $\\gamma_{ij}$ für die Komplementarität zwischen $i$ und $j$"
      - code: "NOT-2"
        content: "Die Menge aller Interventionen sei $\\mathcal{I}$"

    distinction_from_definition:
      notation: "Führt nur Symbol ein (rein syntaktisch)"
      definition: "Erklärt Bedeutung eines Konzepts (semantisch)"

    latex_template: |
      \textbf{Notation:} [Symbol-Erklärung]

  # ==========================================================================
  # KATEGORIE 3: BEWIESENE AUSSAGEN (Outputs)
  # ==========================================================================

  # --------------------------------------------------------------------------
  # KATEGORIE 3a: THEOREM (Hauptresultat)
  # --------------------------------------------------------------------------
  theorem:
    definition_de: |
      Ein Theorem im EBF ist eine Aussage, die aus den Axiomen BEWIESEN wird.
    definition_en: |
      A theorem in EBF is a statement that is PROVEN from the axioms.

    evidence_required: true
    evidence_type: "proof"  # Beweis aus Axiomen
    epistemic_tag: "THR"

    required_elements:
      - element: "Code"
        format: "[PREFIX]-T[NUMBER]"
        example: "IE-T4"
      - element: "Name"
        format: "Kurzer beschreibender Name"
      - element: "Statement"
        format: "Formale mathematische Aussage"
      - element: "Proof Sketch"
        format: "Beweisskizze oder Verweis auf vollständigen Beweis"
        required: true
      - element: "Depends On"
        format: "Liste der verwendeten Axiome"
        required: true
      - element: "Implication"
        format: "Praktische Konsequenzen"

    latex_template: |
      \begin{theorem}[CODE]{Name}
      \textbf{Statement:} [Formale Aussage]

      \textbf{Proof Sketch:} [Beweisskizze]

      \textbf{Depends On:} [Axiome und Theoreme]

      \textbf{Implication:} [Konsequenzen]
      \end{theorem}

  # --------------------------------------------------------------------------
  # KATEGORIE 3b: PROPOSITION (mittleres Resultat)
  # --------------------------------------------------------------------------
  proposition:
    definition_de: |
      Eine Proposition ist ein bewiesenes Resultat von mittlerer Bedeutung.
      Weniger wichtig als ein Theorem, aber dennoch ein eigenständiges Ergebnis
      mit Beweis.
    definition_en: |
      A proposition is a proven result of intermediate importance.
      Less significant than a theorem, but still a standalone result with proof.

    evidence_required: true
    evidence_type: "proof"
    epistemic_tag: "THR"

    distinction_from_theorem:
      theorem: "Hauptresultat, hohe Bedeutung, oft mit Namen (z.B. 'Arrow's Theorem')"
      proposition: "Mittleres Resultat, unterstützt größere Theorie"

    required_elements:
      - element: "Code"
        format: "[PREFIX]-P[NUMBER]"
        example: "IE-P1"
      - element: "Statement"
        format: "Formale mathematische Aussage"
        required: true
      - element: "Proof or Proof Sketch"
        format: "Beweis oder Verweis auf Beweis"
        required: true

    latex_template: |
      \begin{proposition}[CODE]{Name}
      \textbf{Statement:} [Formale Aussage]

      \textbf{Proof:} [Beweis]
      \end{proposition}

  # --------------------------------------------------------------------------
  # KATEGORIE 3c: LEMMA (Hilfsaussage)
  # --------------------------------------------------------------------------
  lemma:
    definition_de: |
      Ein Lemma ist eine Hilfsaussage, die primär dazu dient, einen größeren
      Beweis (Theorem oder Proposition) zu unterstützen. Es wird bewiesen,
      hat aber keine eigenständige Bedeutung außerhalb des Hauptbeweises.
    definition_en: |
      A lemma is an auxiliary statement primarily serving to support a larger
      proof (theorem or proposition). It is proven but has no standalone
      significance outside the main proof.

    evidence_required: true
    evidence_type: "proof"
    epistemic_tag: "THR"

    distinction:
      theorem: "Eigenständig bedeutsam"
      proposition: "Eigenständig bedeutsam (weniger als Theorem)"
      lemma: "Nur bedeutsam als Baustein für größeren Beweis"

    required_elements:
      - element: "Code"
        format: "[PREFIX]-L[NUMBER]"
        example: "IE-L1"
      - element: "Statement"
        format: "Formale mathematische Aussage"
        required: true
      - element: "Used In"
        format: "Verweis auf Theorem/Proposition, das dieses Lemma nutzt"
        required: true
      - element: "Proof"
        format: "Kurzer Beweis"
        required: true

    latex_template: |
      \begin{lemma}[CODE]{Name}
      \textbf{Statement:} [Formale Aussage]

      \textbf{Used In:} [Theorem/Proposition-Referenz]

      \textbf{Proof:} [Beweis]
      \end{lemma}

  # ==========================================================================
  # (Kategorie 2 Fortsetzung: Definition)
  # ==========================================================================

  # --------------------------------------------------------------------------
  # KATEGORIE 2b: DEFINITION (Konzept benennen)
  # --------------------------------------------------------------------------
  definition:
    definition_de: |
      Eine Definition im EBF führt Notation oder Terminologie ein. Sie ist
      tautologisch: sie behauptet nichts über die Realität, sondern benennt
      ein Konzept für spätere Verwendung.
    definition_en: |
      A definition in EBF introduces notation or terminology. It is tautological:
      it makes no claim about reality, but names a concept for later use.

    evidence_required: false
    epistemic_tag: "THR"  # Definitionen sind per Definition wahr

    # Unterschied zu Axiom
    distinction_from_axiom:
      axiom: "Macht eine Annahme (kann falsch oder weniger nützlich sein)"
      definition: "Benennt ein Konzept (kann nicht falsch sein, nur unklar)"

    examples:
      - code: "IE-D0"
        name: "Status Quo Vector"
        content: "$\\vec{S}_0 = (L, d, \\gamma, \\Psi, \\Theta, A_0, W_0, \\varphi_0, \\text{Scope})$"
        type: "Notation für Zustandsvektor"
      - code: "IE-D1"
        name: "Data Sufficiency Score"
        content: "$D_{\\text{suff}} = \\frac{1}{|\\vec{S}_0|} \\sum_c w_c \\cdot C_{\\text{source}}(c)$"
        type: "Berechnungsformel benennen"

    required_elements:
      - element: "Code"
        format: "[PREFIX]-D[NUMBER]"
        example: "IE-D0"
      - element: "Name"
        format: "Kurzer beschreibender Name"
        example: "Status Quo Vector"
      - element: "Content"
        format: "Mathematische Notation oder Begriffserklärung"
        required: true
      - element: "Purpose"
        format: "Warum wird diese Definition eingeführt?"
        required: false

    latex_template: |
      \begin{definition}[CODE]{Name}
      \textbf{Content:} [Notation/Terminologie]

      \textbf{Purpose:} [Warum eingeführt]
      \end{definition}

    # Wann Definition vs. Axiom?
    decision_guide:
      use_definition_when:
        - "Ein Symbol oder Term wird zum ersten Mal eingeführt"
        - "Eine Formel wird benannt (aber nicht behauptet)"
        - "Eine Abkürzung wird erklärt"
      use_axiom_when:
        - "Eine Annahme über die Realität gemacht wird"
        - "Eine Struktur postuliert wird (z.B. '[0,1]^9 Raum existiert')"
        - "Eine empirische Behauptung als Grundlage dient"

  # --------------------------------------------------------------------------
  # KATEGORIE 3d: COROLLARY (direkte Folge)
  # --------------------------------------------------------------------------
  corollary:
    definition_de: |
      Ein Corollary folgt unmittelbar aus einem Theorem ohne zusätzlichen
      Beweis. Es ist eine direkte Konsequenz.
    definition_en: |
      A corollary follows immediately from a theorem without additional
      proof. It is a direct consequence.

    evidence_required: true
    evidence_type: "derivation"  # Folgt aus Theorem
    epistemic_tag: "THR"

    required_elements:
      - element: "Code"
        format: "[PREFIX]-C[NUMBER]"
        example: "IE-C1"
      - element: "Statement"
        format: "Formale Aussage"
        required: true
      - element: "Follows From"
        format: "Verweis auf Theorem"
        required: true

    latex_template: |
      \textbf{Corollary [CODE]:} [Statement]
      \textit{Follows from Theorem [REF].}

  # ==========================================================================
  # KATEGORIE 4: OFFENE AUSSAGEN (Noch nicht bewiesen)
  # ==========================================================================

  # --------------------------------------------------------------------------
  # KATEGORIE 4a: CONJECTURE (Vermutung)
  # --------------------------------------------------------------------------
  conjecture:
    definition_de: |
      Eine Conjecture ist eine plausible Vermutung, die noch nicht bewiesen wurde.
      Sie ist spezifisch genug, dass ein Beweis oder Gegenbeweis prinzipiell
      möglich wäre, aber der Beweis fehlt noch.
    definition_en: |
      A conjecture is a plausible claim that has not yet been proven.
      It is specific enough that a proof or disproof would be possible in principle,
      but the proof is still missing.

    evidence_required: false  # Noch nicht bewiesen!
    epistemic_tag: "HYP"  # Hypothetisch

    distinction:
      theorem: "Bewiesen"
      conjecture: "Nicht bewiesen, aber spezifisch genug für Beweis"
      open_issue: "Noch nicht präzise genug formuliert"

    examples:
      - code: "FND-CONJ-1"
        name: "Sparsity Conjecture"
        content: "Empirische γ-Matrizen sind sparse mit Dichte < 0.3"
      - code: "FND-CONJ-2"
        name: "Universality Conjecture"
        content: "Qualitative γ-Struktur ist kulturinvariant"

    required_elements:
      - element: "Code"
        format: "[PREFIX]-CONJ-[NUMBER]"
        example: "IE-CONJ-1"
      - element: "Statement"
        format: "Präzise Aussage"
        required: true
      - element: "Plausibility Argument"
        format: "Warum glauben wir, dass es wahr ist?"
        required: true
      - element: "Path to Proof"
        format: "Wie könnte man es beweisen?"
        required: false

    latex_template: |
      \begin{conjecture}[CODE]{Name}
      \textbf{Statement:} [Präzise Aussage]

      \textbf{Plausibility:} [Warum plausibel]

      \textbf{Path to Proof:} [Möglicher Beweisweg]
      \end{conjecture}

  # --------------------------------------------------------------------------
  # KATEGORIE 4b: OPEN ISSUE (offene Forschungsfrage)
  # --------------------------------------------------------------------------
  open_issue:
    definition_de: |
      Ein Open Issue ist eine offene Forschungsfrage, die noch nicht präzise
      genug formuliert ist, um als Conjecture zu gelten. Es markiert eine
      Lücke im Framework, die zukünftige Arbeit erfordert.
    definition_en: |
      An open issue is an open research question that is not yet precise enough
      to qualify as a conjecture. It marks a gap in the framework requiring
      future work.

    evidence_required: false
    epistemic_tag: "HYP"

    distinction_from_conjecture:
      conjecture: "Spezifische Behauptung, könnte bewiesen/widerlegt werden"
      open_issue: "Frage oder Lücke, braucht mehr Entwicklung"

    examples:
      - "Wie skaliert γ mit der Anzahl der Dimensionen?"
      - "Welche Messinstrumente sind für Ψ₆ (Cultural) am validesten?"
      - "Wie interagieren 10C-Dimensionen bei sequenziellem Portfolio-Deployment?"

    required_elements:
      - element: "Code"
        format: "[PREFIX]-OI-[NUMBER]"
        example: "IE-OI-1"
      - element: "Question"
        format: "Die offene Frage"
        required: true
      - element: "Why Important"
        format: "Warum muss dies gelöst werden?"
        required: true
      - element: "Suggested Approach"
        format: "Mögliche Lösungsansätze"
        required: false

    latex_template: |
      \textbf{Open Issue [CODE]:} [Frage]
      \textit{Importance:} [Warum wichtig]
      \textit{Approach:} [Mögliche Ansätze]

  # ==========================================================================
  # KATEGORIE 5: ILLUSTRATIONEN (Veranschaulichung)
  # ==========================================================================

  # --------------------------------------------------------------------------
  # KATEGORIE 5a: EXAMPLE (konkretes Beispiel)
  # --------------------------------------------------------------------------
  example:
    definition_de: |
      Ein Example ist ein konkretes Anwendungsbeispiel, das ein abstraktes
      Konzept illustriert. Es beweist nichts, sondern veranschaulicht.
    definition_en: |
      An example is a concrete application illustrating an abstract concept.
      It proves nothing, but demonstrates.

    evidence_required: false
    epistemic_tag: "ILL"  # Illustrativ

    types:
      worked_example: "Vollständig durchgerechnetes Beispiel"
      counterexample: "Zeigt Grenzen einer Aussage"
      motivating_example: "Motiviert ein Konzept zu Beginn"

    required_elements:
      - element: "Code"
        format: "[PREFIX]-EX-[NUMBER]"
        example: "IE-EX-1"
      - element: "Setup"
        format: "Situation beschreiben"
        required: true
      - element: "Application"
        format: "Konzept anwenden"
        required: true
      - element: "Takeaway"
        format: "Was lernen wir?"
        required: false

    latex_template: |
      \begin{example}[CODE]{Name}
      \textbf{Setup:} [Situation]

      \textbf{Application:} [Anwendung des Konzepts]

      \textbf{Takeaway:} [Erkenntnis]
      \end{example}

  # --------------------------------------------------------------------------
  # KATEGORIE 5b: REMARK (ergänzende Bemerkung)
  # --------------------------------------------------------------------------
  remark:
    definition_de: |
      Ein Remark ist eine ergänzende Bemerkung, die kein eigenständiges Ergebnis
      ist, sondern einen Aspekt eines Theorems/Proposition erläutert oder
      in Kontext setzt.
    definition_en: |
      A remark is a supplementary comment that is not a standalone result,
      but elaborates on an aspect of a theorem/proposition or puts it in context.

    evidence_required: false
    epistemic_tag: "THR"  # Wenn logisch, THR; wenn illustrativ, ILL

    examples:
      - "Remark: Theorem 3 verallgemeinert das klassische Resultat von Arrow (1951)"
      - "Remark: Die Annahme γ > 0 kann relaxiert werden, wenn..."

    latex_template: |
      \textbf{Remark:} [Ergänzende Bemerkung]

  # --------------------------------------------------------------------------
  # KATEGORIE 5c: OBSERVATION (empirische Beobachtung)
  # --------------------------------------------------------------------------
  observation:
    definition_de: |
      Eine Observation ist eine empirische Beobachtung ohne vollständige
      theoretische Herleitung. Sie beschreibt ein Muster in Daten oder
      Literatur, ohne es formal zu beweisen.
    definition_en: |
      An observation is an empirical finding without full theoretical derivation.
      It describes a pattern in data or literature without formally proving it.

    evidence_required: true
    evidence_type: "empirical_pattern"
    epistemic_tag: "EMP"  # Empirisch, aber kein strenger Beweis

    distinction:
      theorem: "Formal bewiesen aus Axiomen"
      empirical_axiom: "Etablierte Tatsache mit starker Evidenz"
      observation: "Beobachtetes Muster, weniger formalisiert"

    examples:
      - "Observation: In 80% der untersuchten Studien gilt γ(F,S) > 0"
      - "Observation: Loss Aversion scheint für kleine Beträge stärker"

    required_elements:
      - element: "Code"
        format: "[PREFIX]-OBS-[NUMBER]"
        example: "IE-OBS-1"
      - element: "Pattern"
        format: "Das beobachtete Muster"
        required: true
      - element: "Evidence Base"
        format: "Worauf basiert die Beobachtung?"
        required: true

    latex_template: |
      \textbf{Observation [CODE]:} [Muster]
      \textit{Evidence:} [Quellen/Daten]

  # --------------------------------------------------------------------------
  # KATEGORIE 5d: CRITICAL FOUNDATION (Schlüsseleinsicht aus Literatur)
  # --------------------------------------------------------------------------
  critical_foundation:
    definition_de: |
      Eine Critical Foundation ist eine wichtige Einsicht aus der existierenden
      Literatur, die für das EBF zentral ist. Sie ist keine EBF-eigene Erfindung,
      sondern eine externe Grundlage, auf der EBF aufbaut.
    definition_en: |
      A critical foundation is an important insight from existing literature
      that is central to EBF. It is not an EBF invention, but an external
      foundation upon which EBF builds.

    evidence_required: true
    evidence_type: "literature_citation"
    epistemic_tag: "EMP"  # Basiert auf peer-reviewed Literatur

    examples:
      - code: "CF-1"
        content: "Prospect Theory: Verluste wiegen schwerer als Gewinne"
        source: "Kahneman & Tversky (1979)"
      - code: "CF-2"
        content: "Soziale Präferenzen existieren robust"
        source: "Fehr & Schmidt (1999)"

    required_elements:
      - element: "Code"
        format: "[PREFIX]-CF-[NUMBER]"
        example: "IE-CF-1"
      - element: "Insight"
        format: "Die zentrale Einsicht"
        required: true
      - element: "Source"
        format: "Peer-reviewed Quelle"
        required: true
      - element: "Integration"
        format: "Wie integriert EBF diese Einsicht?"
        required: true

    latex_template: |
      \textbf{Critical Foundation [CODE]:} [Einsicht]
      \textit{Source:} [Zitat]
      \textit{Integration:} [Wie EBF dies nutzt]

  # ==========================================================================
  # KATEGORIE 6: PRAKTISCHE REGELN (Nützlich aber nicht garantiert)
  # ==========================================================================

  # --------------------------------------------------------------------------
  # KATEGORIE 6a: HEURISTIC (Faustregel)
  # --------------------------------------------------------------------------
  heuristic:
    definition_de: |
      Eine Heuristik im EBF ist eine praktische Faustregel, die in den meisten
      Fällen funktioniert, aber keine theoretische Garantie hat.
    definition_en: |
      A heuristic in EBF is a practical rule of thumb that works in most cases
      but has no theoretical guarantee.

    evidence_required: false
    epistemic_tag: "ILL"  # Illustrativ, nicht bewiesen

    examples:
      - "A1-A8 Cluster als Shortcuts für Intervention Selection"
      - "Phase-Type Affinity Matrix als 'first approximation'"

    distinction_from_theorem:
      theorem: "Bewiesen aus Axiomen, immer gültig"
      heuristic: "Empirisch bewährt, Ausnahmen möglich"

    latex_template: |
      \textbf{Heuristic [CODE]:} [Practical Rule]
      \textit{Note: This is a practical shortcut, not a proven result.}

  # --------------------------------------------------------------------------
  # EPISTEMIC TAG MAPPING
  # --------------------------------------------------------------------------
  epistemic_tags:
    EMP:
      name: "Empirically Validated"
      confidence: 5  # ★★★★★
      definition: "Direkter empirischer Nachweis aus peer-reviewed Publikation"
      applies_to: ["empirical axiom", "empirical finding"]

    THR:
      name: "Theoretically Derived"
      confidence: 4  # ★★★★☆
      definition: "Logisch aus etablierten Axiomen/Theoremen abgeleitet"
      applies_to: ["structural axiom", "theoretical postulate", "theorem"]

    LLM:
      name: "LLM-Monte-Carlo Estimated"
      confidence: 3  # ★★★☆☆
      definition: "Via LLM-MC Simulation geschätzt"
      applies_to: ["parameter estimate"]
      warning: "Nicht peer-reviewed, als vorläufig behandeln"

    ILL:
      name: "Illustrative"
      confidence: 2  # ★★☆☆☆
      definition: "Beispielhafte Werte ohne empirische Basis"
      applies_to: ["example", "demonstration"]
      warning: "Darf NICHT als Grundlage für Schlussfolgerungen dienen"

    HYP:
      name: "Hypothetical"
      confidence: 1  # ★☆☆☆☆
      definition: "Spekulative Annahme für theoretische Exploration"
      applies_to: ["thought experiment", "counterfactual"]

  # Aggregationsregel für zusammengesetzte Konstrukte
  aggregation_rule: |
    Der Gesamt-Tag ist der schwächste Einzeltag:
    EMP > THR > LLM > ILL > HYP

    Beispiel: Ein Konstrukt aus EMP + THR + LLM erhält Tag LLM.

  # --------------------------------------------------------------------------
  # VALIDATION RULES FOR AXIOMS
  # --------------------------------------------------------------------------
  validation_rules:
    empirical_axiom:
      - rule: "MUST have at least 1 peer-reviewed citation"
        error_code: "AXIOM_NO_EVIDENCE"
      - rule: "Citation MUST be verifiable in bcm_master.bib"
        error_code: "AXIOM_CITATION_NOT_FOUND"
      - rule: "SHOULD have 3+ supporting citations"
        warning_code: "AXIOM_WEAK_EVIDENCE"

    structural_axiom:
      - rule: "MUST specify axiom type explicitly"
        error_code: "AXIOM_TYPE_MISSING"
      - rule: "SHOULD justify modeling choice"
        warning_code: "AXIOM_JUSTIFICATION_MISSING"

    theoretical_postulate:
      - rule: "MUST cite source theory"
        error_code: "POSTULATE_NO_SOURCE"
      - rule: "MUST document derivation steps"
        error_code: "POSTULATE_NO_DERIVATION"

