# ============================================================================
# ANWENDUNGS-WORKFLOW
# ============================================================================
# Wie wendet man das 10C Framework praktisch an?

application_workflow:
  description: "Schritt-für-Schritt Anwendung des 10C Frameworks"
  reference: "appendices/REF-APPLY_ebf_workflow.tex"

  steps:
    - step: 1
      name: "Define Welfare Levels"
      core: WHO
      question: "Wer sind die relevanten Akteure?"
      output: "L ∈ {1,2,3,4}"

    - step: 2
      name: "Identify Utility Dimensions"
      core: WHAT
      question: "Welche Utility-Dimensionen sind relevant?"
      output: "d ∈ FEPSDE"

    - step: 3
      name: "Map Interactions"
      core: HOW
      question: "Wie interagieren die Dimensionen?"
      output: "γ Matrix"

    - step: 4
      name: "Analyze Context"
      core: WHEN
      question: "Welcher Kontext liegt vor?"
      output: "Ψ Vector"

    - step: 5
      name: "Estimate Parameters"
      core: WHERE
      question: "Was sind die Parameter-Werte?"
      output: "Θ, E(θ)"

    - step: 6
      name: "Calculate Awareness"
      core: AWARE
      question: "Wie bewusst ist der Akteur?"
      output: "A(t*), U^eff"

    - step: 7
      name: "Assess Readiness"
      core: READY
      question: "Ist die Handlungsschwelle erreicht?"
      output: "WAX ≥ θ?"

    - step: 8
      name: "Track Journey"
      core: STAGE
      question: "Wo steht der Akteur in der Veränderung?"
      output: "S(t), dS/dt"

    - step: 9
      name: "Design Decision Hierarchy"
      core: HIERARCHY
      question: "Wie viele koordinierte Entscheidungen sind nötig?"
      output: "N_L2, SCI"

    - step: 10
      name: "Design Emergent Interventions"
      core: EIT
      question: "Welche Interventionen emergieren aus dem 10C-System?"
      output: "I⃗ ∈ [0,1]^9, α_BCJ, β_BCS"

