## 1. Phase 1: Complete Inventory & Mapping

### Step 1.1: Scan All Appendices and Create Mapping

```
[3-LETTER-CODE] [CATEGORY]: [DESCRIPTION]
```

**Logic für 3-Buchstaben-Codes:**
- Verwende aussagekräftige Abkürzungen: `LAB` (Labor), `MAT` (Matching), `IOO` (IO)
- CORE codes: `WHO`, `WAT`, `HOW`, `WEN`, `WHERE`, `AWA`, `REA`, `STA`, `HIE`
- FORMAL codes: `DER`, `PRF`, `SEG`, `EQU`, `PBB`, `EIH`, `LET`, `MEP`, `MEQ`, `GTC`, `FND`, `MDL`
- METHOD codes: `LLM`, `SRL`, `OPS`, `EVL`, `CON`, `DTP`, `DSN`, `REG`, `CFG`, `TKT`, `CMP`, `RSH`, `CAL`
- Etc.

