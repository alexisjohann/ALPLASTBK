    step_3: "Create RESERVED entry in this file"
    step_4: "Create appendix file: BF_DOMAIN-YourTopic.tex"
    step_5: "Register in 00_appendix_index.tex (all 4 locations)"
    step_6: "Update SOP-APPEND-02 section on category assignments"

  "I found a code conflict":
    step_1: "Document in appendices/ which files use the code"
    step_2: "Run: python check_code_conflicts.py --code X"
    step_3: "Choose replacement codes from BF-BZ or CA-DZ"
    step_4: "Update appendix files, index, and THIS registry"
    step_5: "Commit with message: fix: resolve code conflict for X"

