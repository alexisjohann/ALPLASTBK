## SECTION 5: MONTE CARLO SIMULATION PARAMETERS

monte_carlo_config:

  simulation_runs: 10000

  portfolio_weight_constraints:
    # Feasibility constraints on portfolio allocation
    ce:
      min: 0.20
      max: 0.50
      rationale: "Core strategy; minimum commitment but not single-bet"

    innov:
      min: 0.10
      max: 0.40
      rationale: "Supporting strategy; always present but limited R&D budget"

    bio:
      min: 0.00
      max: 0.40
      rationale: "Emerging; optional, but cap due to pre-commercial status"

    geo:
      min: 0.10
      max: 0.35
      rationale: "Steady-state geographic presence; always active"

    scale:
      min: 0.05
      max: 0.25
      rationale: "Operational requirement; but constrain to avoid CE conflict"

    ma:
      min: 0.00
      max: 0.20
      rationale: "Optional; cap to avoid organic growth destruction"

  strategic_conflict_penalties:
    # Penalize high-conflict combinations
    scale_ce_conflict:
      trigger: "w_SCALE > 0.20 AND w_CE > 0.30"
      penalty_gamma: -0.25
      rationale: "Amplify negative γ if conflict zone exceeded"

    ma_innov_conflict:
      trigger: "w_INNOV > 0.30 AND w_MA > 0.15"
      penalty_gamma: -0.30
      rationale: "Amplify strongest negative γ if both high"

  sampling_distributions:
    # Distribution type for each uncertainty parameter
    context_factors: "NORMAL"  # Ψ factors use normal distribution
    dimension_scores: "NORMAL"  # C[i,j] scores use normal distribution
    gamma_parameters: "NORMAL"  # γ values use normal distribution

  output_metrics:
    # Key outputs to report from simulation
    - portfolio_utility
    - organic_growth_impact
    - probability_scenario_b_superior
    - probability_organic_growth_above_6_percent
    - confidence_intervals_optimal_weights
    - sensitivity_which_psi_matters_most
    - robustness_across_parameter_ranges
    - risk_metrics_worst_case_scenarios

