## SECTION 6: KEY RESEARCH QUESTIONS FOR MONTE CARLO

research_questions:

  question_1_scenario_preference:
    question: "Given parameter uncertainty, what is P(Scenario B > Scenario A)?"
    hypothesis: "P > 0.75 (Scenario B robust despite uncertainty)"
    success_criterion: "Scenario B superior in >75% of simulations"
    implication: "Sustainable Mix is robust recommendation"

  question_2_organic_growth_distribution:
    question: "What is median and 95% CI for Scenario B organic growth impact?"
    hypothesis: "Median 6.9% ± 1.5% [range: 5.4%-8.4%]"
    success_criterion: "Organic growth stays above 5% in 90%+ of simulations"
    implication: "Sustainable Mix growth target is achievable"

  question_3_execution_risk_sensitivity:
    question: "Which dimension (R scores) has highest impact on portfolio utility?"
    hypothesis: "Execution Risk (R) for MA option; Technology Risk (R) for BIO option"
    success_criterion: "Sensitivity analysis shows R > F for utility variation"
    implication: "Execution capability is binding constraint, not capital"

  question_4_technology_readiness_bottleneck:
    question: "If Ψ₆ (Tech Readiness) drops to 0.40, which scenarios survive?"
    hypothesis: "Scenario C (GEO-heavy) more robust than Scenario B (BIO-heavy)"
    success_criterion: "Scenario C utility drops <10%; Scenario B utility drops >15%"
    implication: "Technology delay risk shifts strategy from BIO-heavy to GEO-heavy"

  question_5_regulatory_uncertainty:
    question: "If Ψ₅ (Regulatory) drops to 0.65, does CE still dominate?"
    hypothesis: "Yes, but margin reduces; GEO/INNOV become competitive"
    success_criterion: "CE utility drops 5-10%; GEO/INNOV utilities increase"
    implication: "CE-dominant strategy robust to regulatory delay, but not delay-proof"

  question_6_capital_constraint_sensitivity:
    question: "If Ψ₂ (Capital) drops to 0.45, does optimal portfolio shift?"
    hypothesis: "Yes; shift toward lower-capex options (INNOV > CE > GEO)"
    success_criterion: "Capital-constrained scenario favors INNOV-heavy vs. CE-heavy"
    implication: "Capital scarcity would shift away from €50M/year recycling investments"

