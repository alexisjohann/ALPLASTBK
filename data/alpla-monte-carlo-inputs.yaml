## SECTION 7: SENSITIVITY ANALYSIS PARAMETERS

sensitivity_analysis:

  one_way_sensitivity:
    # Test impact of varying each Ψ factor ±20% from baseline
    - factor: Ψ₁ (Market Pressure)
      range: [0.60, 0.90]
      expected_impact: "Market pressure drop → SCALE/GEO become more competitive"

    - factor: Ψ₂ (Capital Availability)
      range: [0.45, 0.85]
      expected_impact: "Capital constraint → INNOV/GEO preferred over CE/MA"

    - factor: Ψ₃ (Organic Growth Baseline)
      range: [0.30, 0.90]
      expected_impact: "Low baseline → GEO expansion critical; high baseline → CE/INNOV sufficient"

    - factor: Ψ₄ (Execution Capability)
      range: [0.45, 0.85]
      expected_impact: "Low execution → avoid MA/BIO; favor SCALE/CE"

    - factor: Ψ₅ (Regulatory Environment)
      range: [0.60, 0.95]
      expected_impact: "Low regulatory → SCALE/MA competitive; high regulatory → CE/BIO essential"

    - factor: Ψ₆ (Technology Readiness)
      range: [0.30, 0.80]
      expected_impact: "Low tech → delay BIO/INNOV; favor GEO; high tech → accelerate BIO"

  two_way_interactions:
    # Test key interaction effects
    - interaction: "Ψ₅ (Regulatory) × Ψ₆ (Technology)"
      scenario: "High regulatory pressure but low tech readiness"
      expected_outcome: "Impossible combination: regulatory demands tech that doesn't exist yet"
      implication: "May require regulatory delay or external tech acquisition"

    - interaction: "Ψ₂ (Capital) × Ψ₃ (Organic Growth)"
      scenario: "High organic growth but low capital availability"
      expected_outcome: "Resource allocation tension: reinvest organic profits vs. fund new initiatives"
      implication: "May require external funding (debt/equity)"

    - interaction: "γ(CE,INNOV) × Ψ₆ (Technology)"
      scenario: "Strong synergy but pre-commercial technology"
      expected_outcome: "Synergy potential blocked by execution risk"
      implication: "Timing of technology commercialization is critical path item"

