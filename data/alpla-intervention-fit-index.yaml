# ALPLA Intervention Fit Index (IFI)
# Version: 1.0
# Date: 2026-01-19
# Purpose: Categorize plants by intervention potential for field experiment
# Integrates with: PCI (alpla-pci-estimates.csv), Job Profiles (alpla-job-profiles.yaml)

metadata:
  version: "1.0"
  created: "2026-01-19"
  methodology: "Multi-dimensional scoring based on workforce composition, plant characteristics, and local labor market"
  total_plants: 17
  dimensions: 5
  clusters: 5

# ============================================================
# IFI METHODOLOGY
# ============================================================

methodology:
  description: |
    The Intervention Fit Index (IFI) measures how well different behavioral interventions
    fit a specific plant's characteristics. Unlike PCI (which measures similarity),
    IFI measures intervention receptivity.

    Each dimension (I1-I5) scores 0-100 based on weighted factors.
    Plants are then clustered based on their IFI profile.

  dimensions:
    I1_rotation_fit:
      name: "Job Rotation Fit"
      description: "How well does job rotation work at this plant?"
      target_churn_drivers: [monotony, repetitive, standing]
      factors:
        - name: "BC5 workforce share"
          weight: 0.25
          logic: "More BC5 = more rotation potential (entry-level jobs)"
        - name: "Plant size"
          weight: 0.25
          logic: "Larger plants = more rotation options"
        - name: "Monotony exposure (BC1+BC5 share)"
          weight: 0.25
          logic: "Higher monotony = higher need for rotation"
        - name: "Shift flexibility (3-shift vs 2-shift)"
          weight: 0.15
          logic: "3-shift = more scheduling flexibility"
        - name: "Customer constraints"
          weight: 0.10
          logic: "In-house = less flexibility"
      formula: |
        I1 = 0.25 * norm(BC5_pct) + 0.25 * norm(employees) +
             0.25 * norm(BC1_pct + BC5_pct) + 0.15 * shift_score +
             0.10 * (1 - customer_constraint)

    I2_career_fit:
      name: "Career Pathway Fit"
      description: "How well does a career development program work?"
      target_churn_drivers: [low_status, no_growth]
      factors:
        - name: "BC4+BC5 workforce share"
          weight: 0.25
          logic: "More entry-level jobs = more career need"
        - name: "Local unemployment rate"
          weight: 0.20
          logic: "Higher unemployment = workers value stability/growth more"
        - name: "Plant type (HQ vs standalone)"
          weight: 0.20
          logic: "HQ/larger = more career options"
        - name: "Average tenure"
          weight: 0.20
          logic: "Lower tenure = career program may help retention"
        - name: "Churn rate BC4+BC5"
          weight: 0.15
          logic: "Higher churn in these categories = higher need"
      formula: |
        I2 = 0.25 * norm(BC4_pct + BC5_pct) + 0.20 * norm(unemployment) +
             0.20 * plant_type_score + 0.20 * (1 - norm(tenure)) +
             0.15 * norm(churn_BC4_BC5)

    I3_skill_pay_fit:
      name: "Skill-Based Pay Fit"
      description: "How well does skill-based pay differentiation work?"
      target_churn_drivers: [no_growth, low_status]
      factors:
        - name: "BC1+BC3 workforce share"
          weight: 0.30
          logic: "Technical jobs = more skill differentiation possible"
        - name: "Local wage competition"
          weight: 0.25
          logic: "More competition = pay differentiation matters more"
        - name: "Skill variance within plant"
          weight: 0.25
          logic: "Higher variance = more room for tiered pay"
        - name: "Manufacturing density"
          weight: 0.20
          logic: "More competition = workers compare pay more"
      formula: |
        I3 = 0.30 * norm(BC1_pct + BC3_pct) + 0.25 * norm(wage_competition) +
             0.25 * skill_variance_score + 0.20 * norm(mfg_establishments)

    I4_workload_fit:
      name: "Workload Management Fit"
      description: "How well does workload balancing/predictive maintenance work?"
      target_churn_drivers: [time_pressure, overtime, on_call]
      factors:
        - name: "BC3 workforce share"
          weight: 0.35
          logic: "More maintenance staff = more workload issues"
        - name: "Equipment age/complexity"
          weight: 0.25
          logic: "Older/complex equipment = more breakdowns"
        - name: "Overtime frequency proxy"
          weight: 0.25
          logic: "More overtime = higher need for workload mgmt"
        - name: "Number of production lines"
          weight: 0.15
          logic: "More lines = more maintenance demand"
      formula: |
        I4 = 0.35 * norm(BC3_pct) + 0.25 * equipment_score +
             0.25 * overtime_proxy + 0.15 * norm(production_lines)

    I5_autonomy_fit:
      name: "Autonomy Enhancement Fit"
      description: "How well does increased worker autonomy work?"
      target_churn_drivers: [monotony, responsibility]
      factors:
        - name: "Plant type independence"
          weight: 0.30
          logic: "Standalone = more autonomy possible"
        - name: "Supervisor span of control"
          weight: 0.25
          logic: "Larger span = autonomy more necessary"
        - name: "Average worker experience"
          weight: 0.25
          logic: "More experience = can handle autonomy"
        - name: "Process standardization"
          weight: 0.20
          logic: "Lower standardization = autonomy more natural"
      formula: |
        I5 = 0.30 * plant_independence_score + 0.25 * norm(supervisor_span) +
             0.25 * experience_score + 0.20 * (1 - standardization_score)

  clustering:
    method: "Profile-based assignment"
    clusters:
      A_rotation_ready:
        name: "Rotation-Ready"
        criteria: "I1 >= 60 AND I1 is top-2 dimension"
        primary_intervention: "Job Rotation"
        secondary_intervention: "Team-based goals"

      B_career_hungry:
        name: "Career-Hungry"
        criteria: "I2 >= 60 AND I2 is top-2 dimension"
        primary_intervention: "Career Pathway Program"
        secondary_intervention: "Skill Certificates"

      C_tech_focused:
        name: "Tech-Focused"
        criteria: "I3 >= 55 OR I4 >= 55"
        primary_intervention: "Skill-Based Pay / Workload Mgmt"
        secondary_intervention: "Training Investment"

      D_autonomy_seeking:
        name: "Autonomy-Seeking"
        criteria: "I5 >= 60 AND standalone plant"
        primary_intervention: "Self-Managed Teams"
        secondary_intervention: "Decision Rights Expansion"

      E_constrained:
        name: "Constrained"
        criteria: "All dimensions < 50 OR in-house plant"
        primary_intervention: "Minimal / Recognition-only"
        secondary_intervention: "Process Micro-improvements"

