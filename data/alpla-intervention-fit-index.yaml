# ============================================================
# FIELD EXPERIMENT DESIGN IMPLICATIONS
# ============================================================

field_experiment_design:
  matching_strategy:
    approach: "Within-cluster matching for homogeneous treatment effects"

    recommended_pairs:
      cluster_A:
        pair_1:
          treatment: "US-006"   # St Peters MO (1)
          control: "US-007"    # St Peters MO (2) - Same location!
          pci_distance: 0.12
          ifi_similarity: 0.95
          note: "Ideal pair - same location, same cluster"

        pair_2:
          treatment: "US-013"   # Lima OH
          control: "US-014"    # Dayton OH
          pci_distance: 0.18
          ifi_similarity: 0.88
          note: "Both Ohio, similar profiles"

        pair_3:
          treatment: "US-002"   # Bethlehem PA
          control: "US-009"    # Bowling Green KY (1)
          pci_distance: 0.25
          ifi_similarity: 0.82
          note: "Similar size and profile"

        unpaired: "US-005"     # Jefferson City MO (odd one out)

      cluster_B:
        pair_1:
          treatment: "US-015"   # Salt Lake City UT
          control: "US-017"    # West Bend WI
          pci_distance: 0.22
          ifi_similarity: 0.85
          note: "Both small, career-focused"

        pair_2:
          treatment: "US-004"   # Iowa City IA (2)
          control: "US-008"    # Kansas City MO
          pci_distance: 0.28
          ifi_similarity: 0.78
          note: "Moderate match"

      cluster_C:
        note: "Only 2 plants - both in treatment or matched pair"
        option_1: "Both as treatment, compare to Cluster A control"
        option_2:
          treatment: "US-016"   # Houston TX
          control: "US-003"    # Iowa City IA (1)

      cluster_D:
        note: "Only 1 plant (McDonough HQ) - unique, cannot match"
        recommendation: "Treat as separate case study or exclude from RCT"

      cluster_E:
        note: "In-house plants with limited intervention options"
        option_1: "Exclude from main experiment"
        option_2: "Separate mini-experiment with recognition intervention"
        if_included:
          treatment: "US-011"   # Florence KY (1)
          control: "US-012"    # Florence KY (2) - Same customer!

  treatment_arms:
    arm_1_rotation:
      intervention: "Job Rotation"
      target_clusters: [A]
      plants: [US-006, US-013, US-002]  # Treatment
      control: [US-007, US-014, US-009]
      expected_n: ~600 employees
      power_analysis: "80% power to detect 5% churn reduction"

    arm_2_career:
      intervention: "Career Pathway"
      target_clusters: [B]
      plants: [US-015, US-004]  # Treatment
      control: [US-017, US-008]
      expected_n: ~240 employees
      power_analysis: "70% power to detect 6% churn reduction"

    arm_3_skill_pay:
      intervention: "Skill-Based Pay"
      target_clusters: [C]
      plants: [US-016]  # Treatment
      control: [US-003]
      expected_n: ~150 employees
      power_analysis: "60% power - consider combining with Arm 1"

  timeline_recommendation:
    phase_1_pilot:
      duration: "3 months"
      focus: "Cluster A (largest, most homogeneous)"
      plants: "St Peters pair (US-006 vs US-007)"

    phase_2_expansion:
      duration: "6 months"
      focus: "Full Cluster A + Cluster B"

    phase_3_full_rollout:
      duration: "12 months"
      focus: "All clusters with tailored interventions"

