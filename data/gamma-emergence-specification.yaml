# =============================================================================
# EIT-EMP-1: EMPIRICAL GAMMA EMERGENCE SPECIFICATION
# =============================================================================
#
# Erweiterung zu Appendix IE (CORE-EIT), Axiom EIT-15
#
# Purpose: Spezifiziert wie die γ-Funktion empirisch parametrisiert wird
#          durch Kombination von Literatur-Baseline und LLMMC-Emergenz
#
# Version: 1.0 (Januar 2026)
# Status: Draft
# Depends on: EIT-15 (General Complementarity Function)
# =============================================================================

metadata:
  code: "EIT-EMP-1"
  name: "Empirical Gamma Emergence Specification"
  type: "Empirical Extension"
  version: "1.0"
  date: "2026-01-23"
  authors: ["EBF Framework"]
  status: "draft"

  # Beziehung zu EIT
  extends: "EIT-15"
  relationship: |
    EIT-15 definiert: γ: [0,1]⁹ × [0,1]⁹ → [-1,1] (die Funktion existiert)
    EIT-EMP-1 spezifiziert: WIE γ konkret berechnet wird (Parametrisierung)

# =============================================================================
# TEIL 1: DIE 7 EMERGENZ-PRINZIPIEN
# =============================================================================

emergence_principles:

  E1_continuous_space:
    name: "Kontinuierlicher Raum"
    source: "EIT-1"
    statement: |
      Interventionen sind Punkte in [0,1]^k, keine diskreten Typen.
      "Kategorien" sind Dichteregionen, nicht ontologische Primitive.
    implication: "Keine fixen Interventionstypen vordefinieren"

  E2_context_transformation:
    name: "Kontext-abhängige Transformation"
    source: "EIT-2"
    statement: |
      ΔS_c = f_c(I_c, S₀, Ψ)
      Die Wirkung ist IMMER eine Funktion des Kontexts.
    implication: "Keine fixen Effektstärken"

  E3_cluster_emergence:
    name: "Cluster-Emergenz"
    source: "EIT-3"
    statement: |
      Beobachtete "Typen" sind empirische Dichteregionen.
      Sie emergieren aus praktischen Constraints, nicht aus Theorie.
      Die Anzahl K ist NICHT theoretisch fixiert.
    implication: "Cluster werden entdeckt, nicht definiert"

  E4_journey_emergence:
    name: "Journey-Position Emergenz"
    source: "EIT-4"
    statement: |
      φ = h(S₀)
      Die Journey-Position emergiert aus dem Status Quo Vektor.
    implication: "Phasen sind Regionen, nicht Kategorien"

  E5_horizon_emergence:
    name: "Zeithorizont Emergenz"
    source: "EIT-5"
    statement: |
      τ = g(I⃗)
      Der Effekt-Horizont emergiert aus dem Interventionsvektor.
    implication: "Keine vordefinierten Zeitkategorien"

  E6_gamma_emergence:
    name: "Komplementaritäts-Emergenz"
    source: "EIT-15 + EIT-EMP-1 (diese Erweiterung)"
    statement: |
      γ_ij = γ_ij(Ψ, S₀)
      Die γ-Matrix ist keine Konstante, sondern eine Funktion.
      γ₀ aus Literatur (Baseline) + β aus Daten (Sensitivität)
    implication: "Crowding-Out Stärke ist kontextabhängig"

  E7_mode_emergence:
    name: "Modus-Emergenz"
    source: "EIT-10"
    statement: |
      Emergence Mode = f(D_suff)
      E-Full / E-Partial / E-None emergiert aus Datenverfügbarkeit.
    implication: "Komplexität passt sich an Evidenz an"

# =============================================================================
# TEIL 2: DIE GAMMA-ARCHITEKTUR
# =============================================================================

gamma_architecture:

  # ---------------------------------------------------------------------------
  # Schicht 1: Baseline aus Literatur (γ₀)
  # ---------------------------------------------------------------------------

  layer_1_baseline:
    name: "Literatur-Baseline"
    symbol: "γ₀"
    source: "Meta-Analysen, experimentelle Studien"
    status: "FIXIERT nach initialer Kalibrierung"
    update_frequency: "Jährlich bei neuer Meta-Evidenz"

    description: |
      Die Baseline-Werte γ₀ werden aus der Literatur abgeleitet.
      Sie repräsentieren den "durchschnittlichen" Effekt über Kontexte.

    structure:
      # Faktor-Level (20 Parameter)
      referent:
        Self_Comm: -0.30          # AWX-A34: Egocentric Bias
        sources: ["Fehr1999", "Charness2002"]

      utility_type:
        INU_KNU: +0.25            # AWX-A38
        INU_IDN: +0.40            # AWX-A39
        KNU_IDN: +0.35            # AWX-A40
        sources: ["Akerlof2000", "Tajfel1979"]

      domain:  # FEPSDE × FEPSDE (15 Parameter)
        F_E:  +0.15               # Mental Accounting
        F_P:  +0.20               # Health Economics
        F_S:  -0.25               # CROWDING OUT (Vorzeichen fixiert per EIT-T9!)
        F_D:  +0.30               # Human Capital
        F_Ex: +0.10               # Maslow
        E_P:  +0.35               # Mind-Body
        E_S:  +0.40               # Social-Emotional
        E_D:  +0.25               # Growth Mindset
        E_Ex: +0.45               # Meaning-Emotion
        P_S:  +0.20               # Sports/Community
        P_D:  +0.15               # Embodied Cognition
        P_Ex: +0.10               # Mortality Salience
        S_D:  +0.35               # Social Learning
        S_Ex: +0.50               # Belonging-Meaning (STRONGEST)
        D_Ex: +0.40               # Self-Actualization
        sources: ["Frey1997", "Gneezy2000", "Deci1971", "Thaler1985"]

      valence:
        pos_neg: -0.50            # Loss Aversion (λ ≈ 2)
        sources: ["Kahneman1979", "Tversky1992"]

      # Block-Level (28 Parameter)
      block_10c:
        # 10C × 10C Interaktionen
        WHO_WHAT:       +0.30
        WHO_HOW:        +0.25
        WHO_WHEN:       +0.20
        WHO_READY:      -0.15     # Collective Action Problem
        WHO_STAGE:      +0.20
        WHO_HIERARCHY:  +0.35
        WHAT_HOW:       +0.40
        WHAT_WHEN:      +0.30
        WHAT_READY:     +0.25
        WHAT_STAGE:     +0.30
        WHAT_HIERARCHY: +0.20
        HOW_WHEN:       +0.35
        HOW_READY:      +0.30
        HOW_STAGE:      +0.25
        HOW_HIERARCHY:  +0.45     # γ defines emergence
        WHEN_READY:     +0.35
        WHEN_STAGE:     +0.30
        WHEN_HIERARCHY: +0.25
        READY_STAGE:    +0.50     # STRONGEST
        READY_HIERARCHY: +0.30
        STAGE_HIERARCHY: +0.35

      # Cross-Block (8 Parameter)
      cross_block:
        WHO_AWARE:       +0.40
        WHAT_AWARE:      +0.50
        HOW_AWARE:       +0.45
        WHEN_AWARE:      +0.35
        WHERE_AWARE:     +0.20
        READY_AWARE:     +0.30
        STAGE_AWARE:     +0.40
        HIERARCHY_AWARE: +0.25

    total_parameters: 48

  # ---------------------------------------------------------------------------
  # Schicht 2: Kontext-Sensitivität aus LLMMC (β)
  # ---------------------------------------------------------------------------

  layer_2_sensitivity:
    name: "Kontext-Sensitivität"
    symbol: "β"
    source: "LLMMC aus beobachteten Interventionen"
    status: "EMERGIERT kontinuierlich"
    update_frequency: "Bei jeder neuen Beobachtung (Bayesian Update)"

    description: |
      Die Sensitivitäten β beschreiben, wie stark der Kontext Ψ
      die Baseline γ₀ moduliert.
      Sie werden via LLMMC aus beobachteten Interventions-Outcomes geschätzt.

    structure:
      # Für jeden γ₀: 8 Sensitivitäten (eine pro Ψ-Dimension)
      dimensions:
        - Ψ_economic      # Wirtschaftlicher Kontext
        - Ψ_social        # Sozialer Kontext
        - Ψ_temporal      # Zeitlicher Kontext
        - Ψ_spatial       # Räumlicher Kontext
        - Ψ_institutional # Institutioneller Kontext
        - Ψ_cultural      # Kultureller Kontext
        - Ψ_technological # Technologischer Kontext
        - Ψ_environmental # Umwelt-Kontext

    initial_values: "Alle β = 0 (keine Modulation) bis Daten vorliegen"

    # Beispiel: Crowding-Out Sensitivität
    example_F_S:
      description: "Wie Kontext das Crowding-Out (F×S) moduliert"
      baseline: "γ₀(F,S) = -0.25"
      sensitivities:
        β_F_S_institutional: +0.18  # Vertrauen REDUZIERT Crowding-Out
        β_F_S_cultural: +0.12       # Kollektivismus reduziert Crowding-Out
        β_F_S_economic: -0.05       # Armut verstärkt Crowding-Out leicht
        # andere β ≈ 0
      interpretation: |
        γ(F,S | Ψ) = -0.25 + 0.18·Ψ_inst + 0.12·Ψ_cult - 0.05·Ψ_econ

        Bei Ψ_inst=0.9, Ψ_cult=0.7, Ψ_econ=0.5:
        γ(F,S) = -0.25 + 0.16 + 0.08 - 0.03 = -0.04 (fast kein Crowding-Out)

        Bei Ψ_inst=0.2, Ψ_cult=0.3, Ψ_econ=0.8:
        γ(F,S) = -0.25 + 0.04 + 0.04 - 0.04 = -0.21 (starkes Crowding-Out)

  # ---------------------------------------------------------------------------
  # Schicht 3: Emergente γ-Berechnung
  # ---------------------------------------------------------------------------

  layer_3_computation:
    name: "Emergente γ-Berechnung"
    symbol: "γ(Ψ)"

    formula:
      general: "γ_ij(Ψ) = γ₀_ij + Σ_k β_ijk · Ψ_k"
      expanded: |
        γ_ij(Ψ) = γ₀_ij
                  + β_ij_econ · Ψ_economic
                  + β_ij_soc · Ψ_social
                  + β_ij_temp · Ψ_temporal
                  + β_ij_spat · Ψ_spatial
                  + β_ij_inst · Ψ_institutional
                  + β_ij_cult · Ψ_cultural
                  + β_ij_tech · Ψ_technological
                  + β_ij_env · Ψ_environmental

    constraints:
      sign_preservation: |
        Per EIT-T9: Das VORZEICHEN von γ(F,S) bleibt IMMER negativ.
        Formal: γ(F,S | Ψ) < 0 ∀ Ψ
        Dies wird durch Constraint auf β sichergestellt:
        γ₀(F,S) + Σ β_ij_k · Ψ_k < 0 für alle Ψ ∈ [0,1]⁸

    bounded: |
      γ_ij(Ψ) ∈ [-1, 1] per EIT-15
      Bei Überschreitung: Clipping auf Grenzen

  # ---------------------------------------------------------------------------
  # Schicht 4: Feedback-Loop
  # ---------------------------------------------------------------------------

  layer_4_feedback:
    name: "Kontinuierliches Lernen"

    process:
      1_observe: "Neue Intervention durchgeführt mit bekanntem I⃗, Ψ"
      2_measure: "Outcome gemessen (Effektstärke, Erfolg/Misserfolg)"
      3_infer: "LLMMC schätzt welche γ-Werte aktiv waren"
      4_update: "Bayesian Update der β-Verteilung"
      5_refine: "Verbesserte γ(Ψ) für nächste Intervention"

    llmmc_prompt_template: |
      Gegeben:
      - Intervention: {intervention_description}
      - Kontext Ψ: {psi_vector}
      - Outcome: {outcome_description}
      - Effektstärke: {effect_size}

      Frage: Welche Komplementaritäten (γ-Werte) waren wahrscheinlich aktiv?
      Wie stark war die Kontext-Modulation verglichen mit der Baseline?

      Antworte im Format:
      - Aktive γ-Paare: [...]
      - Geschätzte Abweichung von Baseline: [...]
      - Konfidenz: [...]

# =============================================================================
# TEIL 3: DIE 80D AWARENESS-SPEZIFIKATION
# =============================================================================

awareness_specification:

  description: |
    Für AWARE (AU) wird die 10C-Dimension in 72 Sub-Dimensionen aufgelöst:
    2 (Self/Comm) × 3 (INU/KNU/IDN) × 6 (FEPSDE) × 2 (pos/neg) = 72

    Der vollständige Interventionsraum für AWARE-fokussierte Interventionen:
    8 (andere 10C) + 72 (AWARE-Detail) = 80 Dimensionen

  structure:
    block_A_other_10C:
      count: 8
      dimensions:
        D1: "WHO"
        D2: "WHAT"
        D3: "HOW"
        D4: "WHEN"
        D5: "WHERE"
        D6: "READY"
        D7: "STAGE"
        D8: "HIERARCHY"

    block_B_aware_detail:
      count: 72
      structure:
        referent: ["Self", "Comm"]
        utility_type: ["INU", "KNU", "IDN"]
        domain: ["F", "E", "P", "S", "D", "Ex"]
        valence: ["pos", "neg"]

      enumeration: |
        D9:  Self_INU_F_pos
        D10: Self_INU_F_neg
        D11: Self_INU_E_pos
        D12: Self_INU_E_neg
        ...
        D79: Comm_IDN_Ex_pos
        D80: Comm_IDN_Ex_neg

  gamma_computation_for_awareness:
    description: |
      Für zwei AWARE-Detail-Dimensionen wird γ aus den Faktor-γ berechnet.

    formula: |
      γ(D_i, D_j) = aggregate(
        γ_referent(ref_i, ref_j),
        γ_utility(util_i, util_j),
        γ_domain(dom_i, dom_j),
        γ_valence(val_i, val_j)
      )

    aggregation_options:
      additive: "γ = (γ_ref + γ_util + γ_dom + γ_val) / 4"
      multiplicative: "γ = γ_ref × γ_util × γ_dom × γ_val"
      max_dominant: "γ = max(|γ_ref|, |γ_util|, |γ_dom|, |γ_val|) × sign"

    recommended: "additive"
    rationale: |
      Additiv ermöglicht partielle Komplementarität.
      Multiplikativ würde γ = 0 erzwingen wenn ein Faktor = 0.

# =============================================================================
# TEIL 4: VALIDIERUNG UND CONSTRAINTS
# =============================================================================

validation:

  # Constraint 1: Vorzeichen-Erhaltung (EIT-T9)
  sign_constraints:
    - pair: "F_S"
      sign: "negative"
      rationale: "Crowding-Out ist universal (EIT-T9)"
      enforcement: "β-Werte so beschränken, dass γ(F,S) < 0 ∀ Ψ"

  # Constraint 2: Bounded [-1, 1]
  bound_constraints:
    min: -1.0
    max: +1.0
    enforcement: "Clipping nach Berechnung"

  # Constraint 3: Symmetrie
  symmetry_constraint:
    statement: "γ(i,j) = γ(j,i)"
    enforcement: "Matrix symmetrisch speichern"

  # Constraint 4: Self-Neutrality
  self_neutrality:
    statement: "γ(i,i) = 0"
    enforcement: "Diagonale = 0"

# =============================================================================
# TEIL 5: INTEGRATION MIT EIT
# =============================================================================

integration:

  relationship_to_eit_15:
    description: |
      EIT-15 definiert γ als abstrakte Funktion.
      EIT-EMP-1 liefert die konkrete Parametrisierung.

    formal_mapping:
      EIT_15: "γ: [0,1]⁹ × [0,1]⁹ → [-1,1]"
      EIT_EMP_1: "γ(I_i, I_j; Ψ) = γ₀(dom_i, dom_j) + Σ β·Ψ"

  relationship_to_eit_t9:
    description: |
      EIT-T9 beweist, dass Crowding-Out universal ist (Vorzeichen fixiert).
      EIT-EMP-1 respektiert dies durch Constraint auf β.

  new_contributions:
    - "48 Baseline-Parameter γ₀ aus Literatur"
    - "Struktur für β-Emergenz via LLMMC"
    - "80D Awareness-Spezifikation"
    - "Feedback-Loop für kontinuierliches Lernen"

# =============================================================================
# TEIL 6: ANWENDUNG
# =============================================================================

application:

  workflow:
    step_1:
      name: "Kontext erfassen"
      action: "Ψ-Vektor für aktuelle Situation bestimmen"

    step_2:
      name: "γ-Matrix berechnen"
      action: "γ(Ψ) = γ₀ + Σ β·Ψ für alle relevanten Paare"

    step_3:
      name: "Intervention designen"
      action: "I⃗ optimieren unter Berücksichtigung von γ(Ψ)"

    step_4:
      name: "Outcome beobachten"
      action: "Effektstärke messen"

    step_5:
      name: "β updaten"
      action: "LLMMC → Bayesian Update der Sensitivitäten"

  example:
    scenario: "Finanzielle Anreize für nachhaltiges Verhalten in der Schweiz"
    context:
      Ψ_institutional: 0.85  # Hohes Vertrauen
      Ψ_cultural: 0.65       # Gemischt individualistisch/kollektivistisch
      Ψ_economic: 0.75       # Wohlhabend

    gamma_calculation:
      baseline: "γ₀(F,S) = -0.25"
      modulation: "+0.18×0.85 + 0.12×0.65 - 0.05×0.75 = +0.19"
      result: "γ(F,S | Ψ_CH) = -0.25 + 0.19 = -0.06"

    interpretation: |
      In der Schweiz ist Crowding-Out schwach (γ = -0.06 statt -0.25).
      Finanzielle Anreize können mit sozialen Normen kombiniert werden,
      aber Vorsicht ist geboten (γ < 0, nicht = 0).
