# Unified Task Log
# Konsolidiert: coding-mode-log.yaml + recommendation-log.yaml
# SSOT für alle Tasks, Empfehlungen und Outcomes
#
# DREI LERNSCHLEIFEN:
#   1. Default-Kalibrierung: Akzeptanzrate → richtige Stufe empfehlen
#   2. Coding-Mode-Kalibrierung: TRADITIONAL/EXPERIMENTAL → richtige Methode wählen
#   3. Outcome/EBF-Impact: Hat die Aktion das EBF weitergebracht?
#
# SCHEMA (10 Felder pro Eintrag):
#   task_id:          TL-NNN (fortlaufend)
#   task_description: Was wurde gemacht?
#   task_type:        quick_win | medium | large
#   recommendation:   Default, Reasoning, User-Wahl, Accepted?
#   coding_mode:      TRADITIONAL | EXPERIMENTAL + Begründung
#   features:         Technische Merkmale (Dateien, Zeilen, Pattern)
#   timing:           Start, End, Duration (gemessen!)
#   outcome:          Status, Ergebnis
#   ebf_impact:       Was wurde im EBF verbessert?
#   learning:         Was wurde gelernt?

