learnings:
- id: TLL-001
  trigger: Session-Learnings konsolidiert
  observation: User will 3-Stufen-Format, Default-Empfehlung, keine Zeitschätzungen ohne Evidenz
  insight: Empfehlungen müssen EBF-Kontext-abhängig sein, nicht generisch
  action: Recommendation-Schema implementiert, jetzt in task-log.yaml konsolidiert
- id: TLL-002
  trigger: Evidenz aus TL-001
  observation: 'Erster EXPERIMENTAL Task: Konzeptionszeit ≈ Ausführungszeit (32 vs 30 min)'
  insight: Bei grossen Batch-Tasks lohnt sich die Vorab-Planung
  action: EXPERIMENTAL-Modus bei >5 Dateien oder >500 Zeilen verwenden
- id: TLL-003
  trigger: Evidenz aus TL-002, TL-003, TL-004
  observation: Kette Quick Win → Medium → Large funktioniert gut (Diagnose → Tool → Prävention)
  insight: Sequentielle Eskalation ist effektiver als direkt die grösste Lösung
  action: Noch nicht genug Datenpunkte für Regel (3/3 nötig, aber gleiches Muster)
- id: TLL-004
  trigger: User Korrektur bei TL-005
  observation: Claude hat Empfehlung gezeigt aber sofort losgelegt ohne User-Bestätigung abzuwarten
  insight: Empfehlung zeigen UND auf Bestätigung warten - auch bei Context-Continuation
  action: IMMER nach Empfehlung pausieren. Auch wenn letzter User-Input 'empfehlung' war.
- id: TLL-005
  trigger: User Meta-Feedback bei TL-013 Vorbereitung
  observation: '4 Abweichungen in einer Session: (1) Lösung vor Problem, (2) Fragen statt Empfehlen, (3) Nummernliste statt
    Box, (4) Vorgreifen ohne Bestätigung'
  insight: Der Prozess IST das Hilfreiche. Hilfreich ≠ Schnell. Prozesstreue = Qualität.
  action: 'Prüfkette VOR jeder Antwort: Ist es ein Task? → Box. Problem verstanden? → Erst analysieren. Default? → Empfehlen.
    Pausieren? → Ja.'
- id: TLL-006
  trigger: User Meta-Feedback nach Sørensen-Integration (TL-020 Vorbereitung)
  observation: 'Gleicher Fehler wie TLL-005 Typ 2: Nach Task-Abschluss ''Soll ich die restlichen 16 Papers durcharbeiten?''
    gefragt statt 3-Tier-Box mit Default zu zeigen. 3× aufgetreten → strukturelles Problem.'
  insight: Prüfkette allein reicht nicht — braucht explizite POST-TASK Regel. Fehler passiert NACH dem Task, nicht VOR dem
    Task. Die bestehende Prüfkette adressiert nur den VOR-Zustand.
  action: 'POST-TASK Regel in CLAUDE.md + MEMORY.md verankert: Nach JEDEM Task-Abschluss → SOFORT nächste 3-Tier-Box. Anti-Pattern
    ''Soll ich...?'' explizit als VERBOTEN markiert.'
  structural_fix: 'CLAUDE.md: POST-TASK REGEL Box + VERBOTEN-Liste erweitert. MEMORY.md: POST-TASK Regel in Prüfkette.'

