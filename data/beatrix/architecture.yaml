# ============================================================
# 15. PLANNED vs ACTUAL (Historische Korrektur)
# ============================================================

corrections:
  description: |
    Die Datei docs/bea-lab-architecture.md beschreibt eine GEPLANTE Architektur
    die nie umgesetzt wurde. Hier die wichtigsten Abweichungen:
  items:
    - aspect: "Frontend Framework"
      planned: "Next.js 14 + TypeScript + Tailwind + shadcn/ui"
      actual: "Vanilla HTML5 + CSS3 + JavaScript (KEIN Framework)"
    - aspect: "Backend"
      planned: "Next.js API Routes (Serverless)"
      actual: "FastAPI (Python) auf Railway"
    - aspect: "Datenbank"
      planned: "Supabase (PostgreSQL + Auth + Realtime)"
      actual: "PostgreSQL auf Railway + Custom JWT Auth"
    - aspect: "Auth"
      planned: "Supabase Auth + NextAuth.js"
      actual: "Custom JWT (HS256) + bcrypt"
    - aspect: "Embedding/Search"
      planned: "Nicht spezifiziert"
      actual: "Voyage AI + pgvector + Hybrid Search (70/20/10)"
    - aspect: "Chat Streaming"
      planned: "Vercel AI SDK"
      actual: "Server-Sent Events (SSE) via FastAPI"
    - aspect: "Deployment"
      planned: "Vercel für alles (Full-Stack)"
      actual: "Vercel (Frontend) + Railway (Backend) — Split Architecture"
    - aspect: "Build Step"
      planned: "npm install + npm run build + Type Check"
      actual: "KEINER — Push = Live"
    - aspect: "Design System Font"
      planned: "Inter + JetBrains Mono"
      actual: "Plus Jakarta Sans (Google Fonts CDN)"
    - aspect: "Farben"
      planned: "#2563eb (Blau), #10b981 (Grün), #f59e0b (Amber)"
      actual: "#1B365D (Navy), rgb(251,191,36) (Gold), rgb(52,211,153) (Teal)"
    - aspect: "Code-Generierung"
      planned: "Menschlicher Entwickler"
      actual: "Claude (Anthropic) — vollständig AI-generiert"
