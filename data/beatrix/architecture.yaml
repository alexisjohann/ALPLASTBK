# ============================================================
# 10. ARCHITECTURE PATTERNS
# ============================================================

patterns:
  - name: "Two-Path Architecture"
    inspiration: "AlphaGo (Neural Net + Tree Search)"
    implementation: "Fast Path (~12s) + Deep Path (~4.5 Min)"

  - name: "Self-Learning Loop"
    inspiration: "AlphaGo (jede Partie verbessert Netzwerk)"
    implementation: "Deep-Path-Antworten werden embedded → erweitern KB für Fast Path"

  - name: "3+1 Choice Architecture"
    inspiration: "EBF Axiom MD-1"
    implementation: "3 kuratierte Optionen + 1 Custom bei jedem Workflow-Step"

  - name: "Hybrid Search"
    inspiration: "Information Retrieval Best Practices"
    implementation: "Vector (70%) + Fulltext (20%) + Keyword (10%)"

  - name: "EEE Workflow"
    inspiration: "EBF METHOD-DESIGN"
    implementation: "9-Step Model-Building mit Progress-Bar und visuellen Karten"

# ============================================================
# 11. DEVELOPMENT WORKFLOW
# ============================================================

development:
  principle: "Kein lokales Development-Setup. Alles remote über APIs."
  builder: "Claude (Anthropic) — kein menschlicher Entwickler im klassischen Sinn"

  workflow:
    - step: 1
      action: "Claude schreibt Code (Python Backend / HTML+CSS+JS Frontend)"
      tool: "Claude Chat (claude.ai) oder Claude Code"
    - step: 2
      action: "Push via GitHub REST API (Base64-encoded) oder git push"
      tool: "GitHub REST API v3"
    - step: 3
      action: "Auto-Deploy"
      details:
        frontend: "Vercel erkennt Push → Live in ~30 Sekunden"
        backend: "Railway erkennt Push → Rebuild in 90-100 Sekunden"
    - step: 4
      action: "Test gegen Live-API"
      tool: "curl / Python Scripts / Browser"
    - step: 5
      action: "Iterate (Fehler fixen, erneut deployen)"

  which_repo_for_what:
    - task: "Frontend ändern (UI, Styling, JS)"
      repo: "bea-lab-frontend + bea-lab-upload/frontend/ (DUAL PUSH!)"
      tool: "Claude Chat → GitHub API Push"
    - task: "Backend ändern (API, DB, Auth)"
      repo: "bea-lab-upload"
      tool: "Claude Chat → GitHub API Push"
    - task: "EBF-Daten ändern (YAML, Cases, Papers, Theorien)"
      repo: "complementarity-context-framework"
      tool: "Claude Code (dieses Repo)"
    - task: "Architektur dokumentieren"
      repo: "complementarity-context-framework"
      tool: "Claude Code (data/beatrix/architecture.yaml)"

  what_claude_code_can_do:
    - "Dieses Repo (complementarity-context-framework) direkt bearbeiten"
    - "YAML-Daten, Docs, Scripts erstellen und committen"
    - "Git push auf dieses Repo"
  what_claude_code_cannot_do:
    - "bea-lab-frontend direkt bearbeiten (separates Repo)"
    - "bea-lab-upload direkt bearbeiten (separates Repo)"
    - "Externe APIs aufrufen (Sandbox blockiert)"

