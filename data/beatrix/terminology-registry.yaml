# ═══════════════════════════════════════════════════════════════════════════════
# BEATRIX TERMINOLOGY REGISTRY — Canonical Naming Rules
# ═══════════════════════════════════════════════════════════════════════════════
# Purpose: Enforce correct naming conventions across all BEATRIX outputs
# Last Updated: 2026-02-15
# ═══════════════════════════════════════════════════════════════════════════════

meta:
  version: "1.0.0"
  enforcement_level: "HARD_BLOCK"
  description: |
    Diese Registry definiert die verbindlichen Bezeichnungen für alle Konzepte
    im FehrAdvice Behavioral Economics Framework. Abweichungen werden blockiert.

# ═══════════════════════════════════════════════════════════════════════════════
# FRAMEWORK TERMINOLOGY
# ═══════════════════════════════════════════════════════════════════════════════

frameworks:
  - id: "TRM-FRM-001"
    concept: "Evidence-Based Framework"
    acronym: "EBF"
    correct: "Evidence-Based Framework (EBF)"
    incorrect:
      - "Evidence Based Framework"  # Missing hyphen
      - "Evidenzbasiertes Framework"
    notes: "Always use hyphen between Evidence and Based"
    enforcement: "HARD_BLOCK"

  - id: "TRM-FRM-002"
    concept: "Behavioral Change Model"
    acronym: "BCM"
    correct: "Behavioral Change Model (BCM)"
    incorrect:
      - "Behavioral Competence Model"
      - "Behavioral Context Model"
      - "Behaviour Change Model"  # British spelling
    notes: "CHANGE, not Competence or Context"
    enforcement: "HARD_BLOCK"
    ssot: "data/knowledge/canonical/bcm.yaml"

  - id: "TRM-FRM-003"
    concept: "10C CORE Framework"
    correct: "10C CORE Framework"
    incorrect:
      - "10C Framework"  # Missing CORE
      - "9C Framework"
      - "11C Framework"
    notes: "Exactly 10 COREs, always include 'CORE' in full name"
    enforcement: "HARD_BLOCK"
    ssot: "docs/frameworks/core-framework-definition.yaml"

# ═══════════════════════════════════════════════════════════════════════════════
# COMPONENT TERMINOLOGY
# ═══════════════════════════════════════════════════════════════════════════════

components:
  - id: "TRM-CMP-001"
    concept: "FEPSDE Utility Dimensions"
    correct: "FEPSDE"
    expansion: "Financial, Emotional, Physical, Social, Digital, Ecological"
    incorrect:
      - "FEPSED"
      - "FEPDSE"
    enforcement: "SOFT_WARN"

  - id: "TRM-CMP-002"
    concept: "8 Psi Dimensions"
    correct: "8 Ψ-Dimensionen"
    symbols: ["Ψ_I", "Ψ_S", "Ψ_C", "Ψ_K", "Ψ_E", "Ψ_T", "Ψ_M", "Ψ_F"]
    incorrect:
      - "7 Ψ-Dimensionen"
      - "9 Ψ-Dimensionen"
    enforcement: "HARD_BLOCK"

  - id: "TRM-CMP-003"
    concept: "BCM2 Context Database"
    correct: "BCM2 Kontextdatenbank"
    databases:
      - "BCM2_04_KON (404 Faktoren)"
      - "BCM2_05_IND (48 Faktoren)"
      - "BCM2_06_META (42 Faktoren)"
    enforcement: "SOFT_WARN"

# ═══════════════════════════════════════════════════════════════════════════════
# PRODUCT TERMINOLOGY
# ═══════════════════════════════════════════════════════════════════════════════

products:
  - id: "TRM-PRD-001"
    concept: "BEATRIX Platform"
    correct: "BEATRIX – The Strategic Intelligence Suite"
    short: "BEATRIX"
    incorrect:
      - "Beatrix"  # Always uppercase
      - "BEA-TRIX"
      - "B.E.A.T.R.I.X."
    enforcement: "SOFT_WARN"

# ═══════════════════════════════════════════════════════════════════════════════
# ENFORCEMENT RULES
# ═══════════════════════════════════════════════════════════════════════════════

enforcement_rules:
  HARD_BLOCK:
    description: "Incorrect term must never appear in any BEATRIX output"
    action: "Replace with correct term automatically"
    
  SOFT_WARN:
    description: "Incorrect term triggers warning but is not blocked"
    action: "Suggest correct term to user"
    
  INFO_ONLY:
    description: "Preference noted but not enforced"
    action: "No automatic action"
