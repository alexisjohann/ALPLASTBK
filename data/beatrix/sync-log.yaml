# =============================================================================
# BEATRIX SYNC LOG — Chronologisches Protokoll aller Sync-Events
# =============================================================================
#
# Jeder Eintrag dokumentiert EINE Synchronisation zwischen
# GitHub (SSOT) und BEATRIX Backend (Railway).
#
# GESCHRIEBEN VON:
#   1. GitHub Action (sync-beatrix.yml) — nach jedem Deploy-Trigger
#   2. Backend (server.py) — wenn Seeds tatsächlich geladen werden
#   3. Manuell via: python scripts/log_beatrix_sync.py
#
# SCHEMA:
#   id:               SYNC-{NNN} (fortlaufend)
#   timestamp:        ISO 8601 UTC
#   trigger:          push | manual | redeploy | startup
#   source:           github_action | backend | manual
#   commit_sha:       Git Commit der den Sync ausgelöst hat
#   commit_message:   Erste Zeile der Commit-Message
#   branch:           Branch (normalerweise "main")
#   files_changed:    Liste der geänderten SSOT-Dateien
#   seeds_affected:   Betroffene Seeds mit Hash-Vergleich
#     - path:         Pfad zur Seed-Datei
#       old_hash:     SHA-256 vor Sync (aus letztem Manifest)
#       new_hash:     SHA-256 nach Sync
#       status:       updated | unchanged | new | deleted
#   deploy:
#     triggered:      true/false
#     target:         railway
#     status:         success | failed | pending | skipped
#     duration_s:     Dauer in Sekunden (falls messbar)
#   verification:
#     manifest_regenerated: true/false
#     all_hashes_match:     true/false
#   notes:            Optionale Bemerkungen
#
# =============================================================================

