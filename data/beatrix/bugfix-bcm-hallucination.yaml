verification:
  after_patches:
    - test: "grep -c 'Behavioral Competence' server.py"
      expected: "0"
      description: "Kein falscher Name mehr"

    - test: "grep -c 'Behavioral Change Model' server.py"
      expected: ">= 3"
      description: "Richtiger Name an allen Stellen"

    - test: "grep -c 'score.*3' server.py (Zeile ~4424)"
      expected: "0 (oder 1.5 statt 3)"
      description: "3x-Boost entfernt oder reduziert"

    - test: "grep 'KB_FRESHNESS_DAYS' server.py"
      expected: "KB_FRESHNESS_DAYS = 14"
      description: "Freshness reduziert"

  after_deployment:
    - test: "BEATRIX-Chat: 'Was ist BCM?'"
      expected: |
        - Sagt "Behavioral Change Model" (NICHT "Competence")
        - Nennt P = f(W, A, C) Formel
        - Nennt 8 Psi-Dimensionen
        - Erfindet KEINE Zahlen
      description: "BCM-Antwort korrekt"

    - test: "BEATRIX-Chat: 'Was ist das 10C Framework?'"
      expected: |
        - Listet alle 10 COREs korrekt auf
        - Keine erfundenen Statistiken
      description: "10C-Antwort korrekt"

    - test: "BEATRIX-Chat: 'Wie viele API-Endpoints hat BEATRIX?'"
      expected: |
        - Sagt NICHT "384" (halluziniert)
        - Sagt entweder die korrekte Zahl oder "Ich bin nicht sicher"
      description: "Keine erfundenen Zahlen"

