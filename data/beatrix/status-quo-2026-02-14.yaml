# ============================================================
# 4. DATABASE SCHEMA (18 Tabellen verifiziert)
# ============================================================

database_schema:
  type: "PostgreSQL 16 on Railway"
  extension: "pgvector (512 dim, Cosine Similarity)"
  source: "grep 'CREATE TABLE|class.*Base' server.py"
  table_count: 18

  orm_models:
    - name: "users"
      orm_class: "User(Base)"
      fields: ["id (UUID)", "email (String 320, unique)", "name", "password_hash", "password_salt",
               "is_active", "is_admin", "email_verified", "verification_token", "verification_sent_at",
               "reset_token", "reset_sent_at", "position", "company", "bio", "phone",
               "linkedin_url", "linkedin_id", "profile_photo_url", "expertise (JSON)",
               "role (researcher|sales|operations|admin)", "crm_access (Boolean)",
               "crm_role (none|viewer|manager|admin)", "crm_owner_code",
               "lead_management (Boolean)", "created_at", "last_login"]
      purpose: "Benutzerverwaltung + Profil + Rollen"

    - name: "user_insights"
      orm_class: "UserInsight(Base)"
      fields: ["id (UUID)", "user_email", "question_text", "question_category",
               "answer_text", "choice_index", "latency_ms", "session_number",
               "question_number", "was_mandatory", "was_nudged", "skipped",
               "domain_signal (REL/FIN/HLT/ENV/POL/ORG/EDU/OTH)",
               "thinking_style (theoretical/practical/analytical/creative)",
               "abstraction_level (abstract/concrete/mixed)",
               "autonomy_signal (high/low/moderate)",
               "created_at", "context (onboarding/login/model_building)"]
      purpose: "Behavioral Ψ-Profiling via Fragen"

    - name: "documents"
      orm_class: "Document(Base)"
      fields: ["id (UUID)", "title", "content", "filename", "sha256_hash",
               "source_type", "tags", "category", "database_target",
               "embedding (vector 512)", "embedding_json (TEXT fallback)",
               "github_url", "status"]
      purpose: "Knowledge Base (Embeddings fuer RAG)"

    - name: "chat_messages"
      orm_class: "ChatMessage(Base)"
      fields: ["id", "user_id", "question", "answer", "path",
               "knowledge_score", "issue_number"]
      purpose: "Chat-Historie + Deep-Path Issue Tracking"

  raw_sql_tables:
    - name: "chat_sessions"
      purpose: "Session-Management fuer Chat"

    - name: "knowledge_checks"
      purpose: "Knowledge Calibration Checks"

    - name: "belief_analyses"
      purpose: "Belief Analysis Storage"

    - name: "leads"
      purpose: "Lead Management"

    - name: "crm_companies"
      purpose: "CRM Firmendaten (mit ZEFIX-Enrichment)"

    - name: "crm_contacts"
      purpose: "CRM Kontaktpersonen"

    - name: "crm_deals"
      purpose: "CRM Deals/Pipeline"
      fields_include: ["psi_profile (JSON)"]

    - name: "crm_activities"
      purpose: "CRM Aktivitaeten-Log"

    - name: "contexts"
      purpose: "Kontext-Verwaltung"

    - name: "psi_analyses"
      purpose: "Versionierte Ψ-Analysen mit Lineage"
      fields_include: ["psi_profile (JSONB)"]

    - name: "feedback"
      purpose: "User-Feedback mit Screenshots"

    - name: "project_edits"
      purpose: "Projekt-Aenderungs-Tracking"
      fields_include: ["synced_to_github (Boolean)"]

    - name: "tasks"
      purpose: "Task-Management"

    - name: "reviewer_keys"
      purpose: "Externe Reviewer API-Keys"

