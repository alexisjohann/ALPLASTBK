# BEATRIX Chat-Types Definition
# Master-Datei für Backend, Frontend und Skills
# Version: 1.0.0
# Datum: 2025-02-14

chat_types:

  lead:
    label: "Pipeline"
    icon: "🎯"
    color: "251,191,36"
    description: "Akquise und Neugeschäft"
    when: |
      Neuer Kontakt, Anfrage erhalten, Angebot in Arbeit, 
      noch kein Auftrag – wir wollen den Kunden gewinnen.
    behavior: |
      CRM-Zugriff, Lead-Erfassung, Qualifizierungsfragen,
      Angebotsentwürfe, Pipeline-Tracking, Follow-up-Planung.
    not_when: "Auftrag bereits erteilt → Mandat"
    keywords:
      - lead
      - anfrage
      - akquise
      - prospect
      - angebot
      - pitch
      - neugeschäft
      - offerte
      - präsentation
      - erstgespräch
      - kontakt

  project:
    label: "Mandat"
    icon: "📋"
    color: "52,211,153"
    description: "Aktive Kundenprojekte"
    when: |
      Kunde hat beauftragt, Projekt läuft, Deliverables in Arbeit –
      wir arbeiten für den Kunden.
    behavior: |
      Projekt-Kontext laden, Team/Timeline, Deliverables tracken,
      Statusupdates, Projekt-Dokumentation, Kundenkommunikation.
    not_when: "Noch kein Auftrag → Pipeline"
    keywords:
      - projekt
      - mandat
      - kunde
      - auftrag
      - deliverable
      - timeline
      - milestone
      - workshop
      - lieferung
      - abschluss

  model:
    label: "Modell"
    icon: "🔬"
    color: "139,170,255"
    description: "BCM-Modellierung und Interventionsdesign"
    when: |
      BCM bauen, Axiome definieren, Interventionen designen,
      Modell validieren – von Kontext zu Wirkung.
    behavior: |
      Model-Builder-Logik, BCM-Struktur, Axiom-Bibliothek,
      Interventions-Templates, Wirkungsvorhersage, Validierung.
    not_when: "Nur Kontext verstehen wollen → Kontext Ψ"
    keywords:
      - modell
      - bcm
      - axiom
      - intervention
      - nudge
      - design
      - bauen
      - behavior
      - verhalten
      - change
      - wirkung

  context:
    label: "Kontext Ψ"
    icon: "🧠"
    color: "232,163,61"
    description: "Situationsanalyse mit 8 Ψ-Dimensionen"
    when: |
      Situation analysieren, Zielgruppe verstehen, Einflussfaktoren
      erfassen – bevor wir intervenieren.
    behavior: |
      8 Ψ-Dimensionen Framework, Kontextdatenbank, Situationsanalyse,
      Persona-Ableitung, Stakeholder-Mapping, Umfeldanalyse.
    not_when: "Bereits Intervention designen → Modell"
    keywords:
      - kontext
      - psi
      - dimension
      - situation
      - zielgruppe
      - analyse
      - umfeld
      - stakeholder
      - kultur
      - umgebung
      - einfluss

  research:
    label: "Literatur"
    icon: "📚"
    color: "168,162,255"
    description: "Akademische Recherche und Knowledge Base"
    when: |
      Paper suchen, Studie zitieren, Theorie nachschlagen,
      akademische Frage – Evidenz finden.
    behavior: |
      RAG über Knowledge Base, Paper-Referenzen, akademischer Ton,
      Quellenangaben, Literaturverweise, Forschungsstand.
    not_when: "Projektbezogene Frage → Mandat"
    keywords:
      - paper
      - studie
      - literatur
      - forschung
      - theorie
      - quelle
      - evidenz
      - autor
      - referenz
      - zitat
      - beleg
      - nachweis

  general:
    label: "Fragen"
    icon: "💬"
    color: "42,127,142"
    description: "Allgemeine Fragen und schnelle Antworten"
    when: |
      Alles andere – schnelle Antwort, allgemeine Frage,
      kein spezifischer Kontext nötig.
    behavior: |
      Standard-Chat, keine spezielle Datenquelle, flexible Antworten,
      Brainstorming, Erklärungen, Hilfestellungen.
    not_when: "Spezifischer Kontext würde helfen → anderen Typ wählen"
    keywords:
      - frage
      - was ist
      - erkläre
      - hilfe
      - allgemein
      - wie geht
      - kannst du

# Flow-Hinweis für UI:
# Typischer Ablauf: Pipeline → Mandat → (Kontext Ψ → Modell) → Abschluss
# Literatur kann jederzeit parallel genutzt werden
