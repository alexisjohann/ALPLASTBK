  - Upload + Duplikat-Check → GitHub papers/evaluated/integrated/
  - Chat/RAG (Claude API)
  - 'CRM: Deals, Pipeline, Sync GitHub↔PostgreSQL'
  - 'Firmen: Hierarchisch, 4 Kategorie-Filter, Profil-Seiten'
  - 'Projekte: Liste + Wizard (Schnell/Geführt), GitHub Read+Write'
  - 'Model Builder: Schnell/Geführt, Ψ-Profil Smart Defaults'


