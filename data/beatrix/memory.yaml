learnings:
- id: L001
  topic: Railway SSL
  lesson: Railway SSL nach CNAME-Wechsel kann 30-60 Min dauern. NICHT Domain löschen/neu
    anlegen! Einfach warten.
  date: '2026-01-15'
- id: L002
  topic: GitHub PAT
  lesson: 'GitHub PATs laufen ab. Immer prüfen bevor Push. Bei 401 neuen Token: github.com/settings/tokens/new
    (Scope: repo)'
  date: '2026-01-15'
- id: L003
  topic: DNS
  lesson: DNS bei Squarespace Domains. Resend-Records (DKIM, SPF, MX) dort eingetragen.
    Änderungen brauchen 5-30 Min.
  date: '2026-01-15'
- id: L004
  topic: Deploy-Ablauf
  lesson: 1) server.py + index.html editieren, 2) GitHub push (SHA holen, PUT), 3)
    Railway serviceInstanceDeploy, 4) 90-100s warten, 5) Version prüfen
  date: '2026-01-15'
- id: L005
  topic: APP_URL
  lesson: APP_URL muss auf funktionierende URL zeigen (Railway-URL als Fallback bei
    Custom Domain SSL-Problem). E-Mail-Links nutzen APP_URL.
  date: '2026-01-15'
- id: L006
  topic: Resend/Cloudflare
  lesson: 'Resend API von Railway braucht User-Agent Header, sonst Cloudflare Error
    1010. Immer ''User-Agent: BEATRIXLab/3.4'' setzen.'
  date: '2026-01-20'
- id: L007
  topic: Frontend Dual-Push
  lesson: 'Frontend-Updates in BEIDE Repos: FehrAdvice-Partners-AG/bea-lab-frontend
    (Vercel) + gerhardfehr/bea-lab-upload/frontend/ (Backup)'
  date: '2026-01-20'
- id: L008
  topic: FehrAdvice Wertschöpfung
  lesson: Projektarten leiten sich aus Kunden-Behavioral-Journey ab (Schwelle 'spannend'→'wertvoll'
    = WTP). 10C-Modell für eigene Mandatsentscheidung wird über bea-lab.io gebaut.
  date: '2026-02-09'
- id: L009
  topic: Memory System
  lesson: Extended Memory auf GitHub ausgelagert. Claude Memory nur für Essentials
    (Credentials, IDs). Alles andere in data/beatrix/memory.yaml
  date: '2026-02-09'
decisions:
- id: D001
  topic: Presentation Standards
  decision: 'Readout Decks (standalone) vs Speaker Decks (live). Consulting deliverables:
    navy header bars, proper tables, FehrAdvice CI/CD colors (NAVY: 1B365D, TEAL:
    2A7F8E, ORANGE: E8A33D)'
  date: '2026-01-25'
- id: D002
  topic: GitHub als Single Source of Truth
  decision: Alle Projekt-, Kunden- und Modell-Daten leben in GitHub YAML. BEATRIX
    liest/schreibt über API. PostgreSQL nur für User/Auth/CRM-Deals.
  date: '2026-02-01'
version_history:
