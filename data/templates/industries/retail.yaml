---
# Industry Template: Retail & E-Commerce
# Use with /new-customer --template retail
# Version: 1.0.0

industry:
  name: "Retail & E-Commerce"
  sub_types:
    - "Omnichannel Retail"
    - "Pure E-Commerce"
    - "Grocery/Supermarket"
    - "Fashion/Apparel"
    - "Consumer Electronics"
    - "Home & DIY"

# Financial Benchmarks
financial_benchmarks:
  revenue_growth_rate: 0.06  # 6% CAGR (e-commerce higher)
  ebitda_margin: 0.06        # 6% median (low margin business)
  gross_margin: 0.35         # 35% median
  net_margin: 0.03           # 3% median

  # Capital intensity (lower than manufacturing)
  capex_to_revenue: 0.03    # 3% typical
  maintenance_capex_pct: 0.40  # 40% maintenance, 60% growth

  # Working capital (inventory heavy)
  dso_days: 5               # Very short (consumer pays immediately)
  dpo_days: 45              # Days Payable Outstanding
  dio_days: 60              # Higher inventory days

# Organizational Benchmarks
organizational_benchmarks:
  revenue_per_employee: 300000  # EUR per FTE (higher than manufacturing)

  headcount_distribution:
    store_operations: 0.55   # 55% (retail specific)
    warehouse_logistics: 0.15 # 15%
    sales_marketing: 0.10    # 10%
    it_digital: 0.06         # 6% (e-commerce driven)
    merchandising: 0.04      # 4%
    finance_admin: 0.04      # 4%
    hr: 0.02                 # 2%
    management: 0.02         # 2%
    other: 0.02              # 2%

  # Function growth rates
  function_growth_multipliers:
    store_operations: 0.6    # Shrinks (automation, online shift)
    warehouse_logistics: 1.2 # Grows (e-commerce)
    it_digital: 1.8          # Grows fast (digital transformation)
    sales_marketing: 1.3     # Grows (customer acquisition)

  payroll_cost_per_fte: 40000  # EUR annual avg (many part-time)

# Regional Patterns (regional retailer)
regional_defaults:
  regions:
    - name: "Home Market"
      revenue_share: 0.70
      cagr: 0.04
      headcount_share: 0.75
    - name: "Adjacent Markets"
      revenue_share: 0.20
      cagr: 0.10
      headcount_share: 0.18
    - name: "New Markets"
      revenue_share: 0.10
      cagr: 0.15
      headcount_share: 0.07

# Capex Patterns
capex_defaults:
  categories:
    - name: "Store Network"
      share: 0.30
      roi_years: 6
    - name: "E-Commerce Platform"
      share: 0.25
      roi_years: 3
    - name: "Logistics/Warehousing"
      share: 0.20
      roi_years: 5
    - name: "IT Infrastructure"
      share: 0.15
      roi_years: 3
    - name: "Store Refurbishment"
      share: 0.10
      roi_years: 4

# Model-Specific Parameters
model_parameters:
  # CLV/CAC (B2C - very different from B2B)
  clv:
    avg_customer_lifetime_years: 5
    annual_revenue_per_customer: 800  # Much lower than B2B
    retention_rate: 0.65              # Higher churn
    purchase_frequency: 12            # Per year
  cac:
    sales_cycle_months: 0.1          # Instant
    cost_per_acquisition: 25         # EUR (digital marketing)

  # Monte Carlo
  monte_carlo:
    revenue_volatility: 0.12         # Higher (seasonal, fashion)
    cost_volatility: 0.08
    correlation_revenue_cost: 0.4

  # Valuation
  valuation:
    wacc: 0.09
    terminal_growth: 0.025
    ev_ebitda_multiple: 10.0         # Higher for growth retailers

# ESG Defaults
esg_defaults:
  environmental_score: 55
  social_score: 60                   # Supply chain labor issues
  governance_score: 65

  key_metrics:
    carbon_intensity_tonnes_per_m_revenue: 20
    packaging_sustainability: 0.30
    employee_turnover: 0.25          # High in retail

# Risk Profile
risk_profile:
  key_risks:
    - "E-commerce disruption"
    - "Consumer behavior shifts"
    - "Inventory management"
    - "Labor costs/availability"
    - "Real estate costs"
    - "Supply chain (imports)"

  beta: 1.2  # Higher beta
  credit_rating: "BB+"

# Channel Mix (retail specific)
channel_mix:
  physical_stores: 0.65
  e_commerce: 0.30
  marketplace: 0.05
  channel_growth_rates:
    physical_stores: -0.02    # Declining
    e_commerce: 0.15          # Growing fast
    marketplace: 0.10         # Growing

metadata:
  template_version: "1.0.0"
  created: "2026-01-16"
  based_on: "Industry benchmarks, public retailer data"
  applicable_revenue_range: "EUR 50M - 50B"
