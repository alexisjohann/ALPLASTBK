---
# Industry Template: Financial Services
# Use with /new-customer --template financial_services
# Version: 1.0.0

industry:
  name: "Financial Services"
  sub_types:
    - "Universal Bank"
    - "Regional/Retail Bank"
    - "Asset Management"
    - "Insurance"
    - "Fintech"
    - "Wealth Management"

# Financial Benchmarks
financial_benchmarks:
  revenue_growth_rate: 0.04  # 4% CAGR (mature industry)
  cost_income_ratio: 0.60    # 60% (bank-specific)
  net_interest_margin: 0.015 # 1.5% NIM (banks)
  roe: 0.10                  # 10% Return on Equity
  roa: 0.008                 # 0.8% Return on Assets

  # Capital requirements (Basel III/IV)
  cet1_ratio: 0.13          # 13% CET1
  leverage_ratio: 0.05      # 5%

  # Fee income
  fee_to_total_revenue: 0.35 # 35% fee income

# Organizational Benchmarks
organizational_benchmarks:
  revenue_per_employee: 350000  # EUR per FTE (high productivity)

  headcount_distribution:
    retail_banking: 0.35      # 35% (branch network)
    corporate_banking: 0.15   # 15%
    operations_processing: 0.15 # 15%
    it_technology: 0.12       # 12% (high tech intensity)
    risk_compliance: 0.08     # 8%
    finance_controlling: 0.05 # 5%
    hr_admin: 0.04            # 4%
    management: 0.03          # 3%
    other: 0.03               # 3%

  # Function growth rates
  function_growth_multipliers:
    retail_banking: 0.6       # Shrinks (digital banking)
    it_technology: 1.5        # Grows (digitalization)
    risk_compliance: 1.4      # Grows (regulation)
    operations_processing: 0.7 # Shrinks (automation)

  payroll_cost_per_fte: 85000  # EUR annual avg (higher than other industries)

# Regional Patterns (regional bank)
regional_defaults:
  regions:
    - name: "Home Market"
      revenue_share: 0.80
      cagr: 0.03
      headcount_share: 0.85
    - name: "CEE/Expansion"
      revenue_share: 0.15
      cagr: 0.07
      headcount_share: 0.12
    - name: "Other"
      revenue_share: 0.05
      cagr: 0.05
      headcount_share: 0.03

# Capex Patterns (IT heavy)
capex_defaults:
  categories:
    - name: "Core Banking Systems"
      share: 0.30
      roi_years: 7
    - name: "Digital/Mobile Banking"
      share: 0.25
      roi_years: 3
    - name: "Cybersecurity"
      share: 0.15
      roi_years: 2
    - name: "Regulatory Compliance"
      share: 0.15
      roi_years: 3
    - name: "Branch Modernization"
      share: 0.10
      roi_years: 5
    - name: "Data/Analytics"
      share: 0.05
      roi_years: 3

# Model-Specific Parameters
model_parameters:
  # CLV/CAC (banking specific)
  clv:
    avg_customer_lifetime_years: 12    # Long relationships
    annual_revenue_per_customer: 400   # EUR (retail banking)
    retention_rate: 0.92               # High switching costs
    cross_sell_ratio: 3.5              # Products per customer
  cac:
    sales_cycle_months: 1
    cost_per_acquisition: 150          # EUR

  # Monte Carlo
  monte_carlo:
    revenue_volatility: 0.06           # Lower (regulated)
    cost_volatility: 0.04
    correlation_revenue_cost: 0.2

  # Valuation
  valuation:
    coe: 0.10                          # Cost of Equity
    terminal_growth: 0.015
    price_to_book: 0.9                 # Below book for many banks
    price_to_earnings: 10.0

# ESG Defaults
esg_defaults:
  environmental_score: 50              # Financed emissions issue
  social_score: 65
  governance_score: 75                 # High (regulated)

  key_metrics:
    financed_emissions: "To be measured"
    financial_inclusion_products: true
    board_independence: 0.60

# Risk Profile
risk_profile:
  key_risks:
    - "Interest rate risk"
    - "Credit risk (NPLs)"
    - "Regulatory changes"
    - "Fintech disruption"
    - "Cybersecurity"
    - "Talent retention"

  beta: 1.3                            # Higher beta (financial sector)
  credit_rating: "A-"

# Banking-Specific Metrics
banking_metrics:
  loan_to_deposit: 0.85
  npl_ratio: 0.025                     # 2.5% NPL
  coverage_ratio: 0.70                 # 70% provisions
  liquidity_coverage_ratio: 1.30      # >100% required

  segment_breakdown:
    retail: 0.50
    corporate: 0.30
    investment: 0.15
    other: 0.05

  digital_metrics:
    digital_adoption: 0.65             # 65% customers digital
    mobile_active_users: 0.45          # 45% monthly active
    digital_sales_share: 0.30          # 30% products sold online

metadata:
  template_version: "1.0.0"
  created: "2026-01-16"
  based_on: "Industry benchmarks, ECB data, public bank filings"
  applicable_revenue_range: "EUR 500M - 50B"
  regulatory_framework: "Basel III/IV, MiFID II, PSD2"
