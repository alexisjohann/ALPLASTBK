---
# Industry Template: Manufacturing
# Use with /new-customer --template manufacturing
# Version: 1.0.0

industry:
  name: "Manufacturing"
  sub_types:
    - "Discrete Manufacturing"
    - "Process Manufacturing"
    - "Packaging"
    - "Industrial Equipment"
    - "Automotive Supplier"

# Financial Benchmarks
financial_benchmarks:
  revenue_growth_rate: 0.05  # 5% CAGR typical
  ebitda_margin: 0.10       # 10% median
  gross_margin: 0.30        # 30% median
  net_margin: 0.05          # 5% median

  # Capital intensity
  capex_to_revenue: 0.05    # 5% typical
  maintenance_capex_pct: 0.60  # 60% maintenance, 40% growth

  # Working capital
  dso_days: 45              # Days Sales Outstanding
  dpo_days: 60              # Days Payable Outstanding
  dio_days: 30              # Days Inventory Outstanding

# Organizational Benchmarks
organizational_benchmarks:
  revenue_per_employee: 200000  # EUR per FTE

  headcount_distribution:
    operations: 0.45        # 45%
    sales_service: 0.12     # 12%
    quality: 0.05           # 5%
    rd: 0.04                # 4%
    supply_chain: 0.08      # 8%
    finance_admin: 0.08     # 8%
    hr: 0.03                # 3%
    it: 0.03                # 3%
    management: 0.02        # 2%
    other: 0.10             # 10%

  # Function growth rates (relative to headcount growth)
  function_growth_multipliers:
    operations: 0.8         # Grows slower (automation)
    it: 1.5                 # Grows faster (digitalization)
    rd: 1.3                 # Grows faster (innovation)
    supply_chain: 1.1       # Grows faster (complexity)

  payroll_cost_per_fte: 60000  # EUR annual avg

# Regional Patterns (global manufacturer)
regional_defaults:
  regions:
    - name: "Europe"
      revenue_share: 0.45
      cagr: 0.03
      headcount_share: 0.50
    - name: "APAC"
      revenue_share: 0.25
      cagr: 0.08
      headcount_share: 0.25
    - name: "Americas"
      revenue_share: 0.20
      cagr: 0.05
      headcount_share: 0.18
    - name: "MEA"
      revenue_share: 0.10
      cagr: 0.06
      headcount_share: 0.07

# Capex Patterns
capex_defaults:
  categories:
    - name: "Production Equipment"
      share: 0.40
      roi_years: 5
    - name: "Digital/IT"
      share: 0.15
      roi_years: 3
    - name: "Maintenance"
      share: 0.25
      roi_years: 2
    - name: "Expansion"
      share: 0.15
      roi_years: 7
    - name: "Sustainability"
      share: 0.05
      roi_years: 6

# Model-Specific Parameters
model_parameters:
  # CLV/CAC (B2B)
  clv:
    avg_customer_lifetime_years: 8
    annual_revenue_per_customer: 500000
    retention_rate: 0.90
  cac:
    sales_cycle_months: 6
    cost_per_acquisition: 25000

  # Monte Carlo
  monte_carlo:
    revenue_volatility: 0.08
    cost_volatility: 0.05
    correlation_revenue_cost: 0.3

  # Valuation
  valuation:
    wacc: 0.08
    terminal_growth: 0.02
    ev_ebitda_multiple: 8.0

# ESG Defaults
esg_defaults:
  environmental_score: 60
  social_score: 65
  governance_score: 70

  key_metrics:
    carbon_intensity_tonnes_per_m_revenue: 50
    recycling_rate: 0.40
    employee_safety_ltir: 2.5

# Risk Profile
risk_profile:
  key_risks:
    - "Supply chain disruption"
    - "Raw material price volatility"
    - "Labor shortages"
    - "Regulatory compliance"
    - "Technology obsolescence"

  beta: 1.1  # Market beta
  credit_rating: "BBB"

metadata:
  template_version: "1.0.0"
  created: "2026-01-16"
  based_on: "ALPLA, PORR, industry benchmarks"
  applicable_revenue_range: "EUR 100M - 10B"
