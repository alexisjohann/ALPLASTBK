metadata:
  version: '3.0'
  last_updated: '2026-01-27'
  script: scripts/batch_doi_by_journal.py
  total_journals: 43
  superkey_format: JRN-{registrant}-{abbrev}
  predictability_types:
    STRUCTURED: 'Pattern: j.v.i.p - vorhersagbar aus Volume/Issue/Page'
    ISSN_YEAR: 'Pattern: j.issn.yyyy - vorhersagbar aus ISSN + Jahr'
    NUMERIC: 'Pattern: NNNNNNN - JSTOR oder Publisher-interne ID (Lookup)'
    LONG_CODE: 'Pattern: 10-16 digit - Publisher-Code (Lookup)'
    ALPHA_NUM: 'Pattern: xxxNNN - Hash oder Code (Lookup)'
    OTHER: Unstrukturiert (Lookup erforderlich)
