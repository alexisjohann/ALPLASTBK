# =============================================================================
# CUSTOMER-CONTACTS REGISTRY
# =============================================================================
# Zentrale Verlinkung zwischen Kunden (data/customers/) und Personen (person-registry.yaml)
#
# Diese Datei ist die SINGLE SOURCE OF TRUTH für alle Kunden-Personen-Beziehungen.
# Verlinkt:
# - data/customers/{kunde}/ → Kundenprofil
# - data/person-registry.yaml → Personen (PER-EXT-xxx)
# - data/sales/lead-database.yaml → Leads (LEAD-xxx)
#
# Version: 1.0.0
# Created: 2026-02-04
# =============================================================================

metadata:
  version: "1.0.0"
  last_updated: "2026-02-04"
  description: "Zentrale Kunden-Kontakte-Verlinkung"
  purpose: |
    Verbindet Kundenprofile mit der zentralen Person Registry.
    Ermöglicht schnelle Suche: "Wer sind unsere Kontakte bei Kunde X?"

