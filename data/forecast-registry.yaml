# =============================================================================
# FORECAST REGISTRY - Systematisches Tracking aller EBF-Prognosen
# =============================================================================
# Version: 1.0
# Created: 2026-01-30
# Purpose: Tracking von Prognosen, Vergleich mit Realität, Modell-Kalibrierung
# =============================================================================

metadata:
  version: "1.2"
  created: "2026-01-30"
  last_updated: "2026-02-02"
  description: |
    Zentrale Datenbank für alle EBF-Prognosen mit:
    - Systematischem Tracking von Vorhersagen
    - Vergleich Prognose vs. tatsächliches Ergebnis
    - Kalibrierungsmetriken (Brier Score, Log Loss, etc.)
    - Learnings für Modellverbesserung

  id_format: "FCT-{DOMAIN}-{YYYY}-{NNN}"
  domains:
    - POL: "Politische Abstimmungen, Wahlen"
    - GEO: "Geopolitische Ereignisse, Konflikte"
    - ECO: "Wirtschaftsprognosen"
    - FIN: "Finanzmarkt-Prognosen"
    - BEH: "Verhaltensvorhersagen"
    - ORG: "Organisationale Outcomes"

# =============================================================================
# KALIBRIERUNGS-METRIKEN (Aggregiert)
# =============================================================================

calibration_summary:
  total_forecasts: 5
  resolved_forecasts: 0  # Mit bekanntem Outcome
  pending_forecasts: 5   # Noch offen

  # Wird nach Auflösung berechnet
  metrics:
    brier_score: null        # 0 = perfekt, 1 = schlecht
    log_loss: null           # Niedriger = besser
    calibration_error: null  # Abweichung von perfekter Kalibrierung
    resolution: null         # Fähigkeit zur Diskriminierung

  by_domain:
    POL:
      count: 3
      resolved: 0
      avg_brier: null
    GEO:
      count: 1
      resolved: 0
      avg_brier: null
    FIN:
      count: 1
      resolved: 0
      avg_brier: null

# =============================================================================
# PROGNOSEN
# =============================================================================

forecasts:

  # ---------------------------------------------------------------------------
  # FCT-POL-2025-001: 10-Millionen-Initiative
  # ---------------------------------------------------------------------------
  - id: "FCT-POL-2025-001"

    # === IDENTIFIKATION ===
    title: "10-Millionen-Initiative (Keine 10-Millionen-Schweiz!)"
    domain: POL
    subdomain: "referendum"
    country: CH

    # === ZEITRAHMEN ===
    dates:
      forecast_created: "2025-06-01"
      forecast_updated: "2025-11-30"
      event_date: "2025-Q4"  # Genaues Datum war noch offen
      event_resolved: null   # Datum wenn Ergebnis bekannt

    # === FRAGE ===
    question:
      original: |
        Wie wird die Volksinitiative «Keine 10-Millionen-Schweiz!» ausgehen?
        Ziel: Begrenzung der Wohnbevölkerung auf 10 Mio. bis 2050
      binary_framing: "Wird die Initiative angenommen?"
      direction: "JA = Annahme, NEIN = Ablehnung"

    # === MODELL ===
    model:
      id: "MOD-ECOS-10MIO-001"
      name: "Referendum Dynamics Model (RDM)"
      type: "Dynamic Bayesian Forecast"
      session_ref: null  # Damals keine Session-ID
      project_ref: "PRJ-ECOS-001"

    # === PROGNOSEN (SZENARIEN) ===
    scenarios:

      baseline:
        name: "Business as Usual"
        description: "Ohne zusätzliche Interventionen"
        assumptions:
          nein_campaign_budget_mio: 5
          ja_campaign_budget_mio: 3
          media_sentiment: "neutral"
        prediction:
          ja: 0.52
          nein: 0.48
          confidence_interval_95:
            ja: [0.48, 0.56]
            nein: [0.44, 0.52]
          p_ja_wins: 0.55
          p_nein_wins: 0.45
        conclusion: "Knapp, aber Tendenz zu JA (Annahme)"

      full_portfolio:
        name: "Full Portfolio Deployment"
        description: "Alle Interventionen aktiviert"
        assumptions:
          nein_campaign_budget_mio: 8
          ja_campaign_budget_mio: 3
          interventions_active: "all"
          media_sentiment: "leicht positiv für Nein"
        prediction:
          ja: 0.46
          nein: 0.54
          confidence_interval_95:
            ja: [0.42, 0.50]
            nein: [0.50, 0.58]
          p_ja_wins: 0.30
          p_nein_wins: 0.70
        conclusion: "Nein gewinnt mit solidem Vorsprung"

      focused:
        name: "Focused on Swing Voters"
        description: "Konzentration auf SEG-MITTE und SEG-BESORGT"
        assumptions:
          nein_campaign_budget_mio: 6
          ja_campaign_budget_mio: 3
          interventions_active:
            - "INT-SHORT-001"
            - "INT-MEDIUM-001"
            - "INT-MEDIUM-002"
          media_sentiment: "neutral"
        prediction:
          ja: 0.48
          nein: 0.52
          confidence_interval_95:
            ja: [0.44, 0.52]
            nein: [0.48, 0.56]
          p_ja_wins: 0.40
          p_nein_wins: 0.60
        conclusion: "Empfohlene Strategie: Effizient & effektiv"
        is_recommended: true

      adverse:
        name: "Adverse Events"
        description: "Negative Ereignisse (Wirtschaftskrise, Terror)"
        assumptions:
          nein_campaign_budget_mio: 5
          ja_campaign_budget_mio: 3
          adverse_event_impact: -0.05
          media_sentiment: "negativ für Zuwanderung"
        prediction:
          ja: 0.57
          nein: 0.43
          confidence_interval_95:
            ja: [0.53, 0.61]
            nein: [0.39, 0.47]
          p_ja_wins: 0.75
          p_nein_wins: 0.25
        conclusion: "Risiko-Szenario: JA gewinnt deutlich"

    # === HAUPT-PROGNOSE (für Kalibrierung) ===
    primary_forecast:
      scenario_used: "baseline"
      point_estimate:
        ja: 0.52
        nein: 0.48
      probability:
        p_ja_wins: 0.55
        p_nein_wins: 0.45
      confidence: "MITTEL"
      uncertainty_drivers:
        - "Mobilisierungsdynamik beider Seiten"
        - "Externe Ereignisse (Wirtschaft, Migration)"
        - "Kampagnen-Intensität"

    # === TATSÄCHLICHES ERGEBNIS ===
    actual_outcome:
      resolved: false
      date: null
      result:
        ja: null
        nein: null
      turnout: null
      standeresult: null  # Bei Volksinitiativen relevant
      source: null

    # === KALIBRIERUNG (nach Auflösung) ===
    calibration:
      brier_score: null
      log_loss: null
      absolute_error: null
      direction_correct: null
      within_ci: null

    # === METADATEN ===
    client: "economiesuisse"
    tags:
      - migration
      - svp
      - referendum
      - switzerland
    notes: |
      Projekt für economiesuisse zur Entwicklung eines Forecast-Modells
      und Interventionsportfolios für die NEIN-Kampagne.

      WICHTIG: Baseline-Prognose zeigt JA-Tendenz - ohne Interventionen
      wäre die Initiative wahrscheinlich angenommen worden!

