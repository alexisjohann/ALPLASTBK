  # ---------------------------------------------------------------------------
  # FCT-GEO-2026-001: US/Israel Angriff auf Iran
  # ---------------------------------------------------------------------------
  - id: "FCT-GEO-2026-001"

    # === IDENTIFIKATION ===
    title: "Militärischer Angriff auf iranische Nuklearanlagen"
    domain: GEO
    subdomain: "military_conflict"
    region: "Middle East"

    # === ZEITRAHMEN ===
    dates:
      forecast_created: "2026-01-30"
      forecast_updated: "2026-01-30"
      time_horizon: "2026-12-31"  # Bis Ende 2026
      event_resolved: null

    # === FRAGE (PRÄZISE DEFINITION) ===
    question:
      original: |
        Wird es 2026 einen militärischen Angriff auf iranische
        Nuklearanlagen geben?
      binary_framing: "Erfolgt ein Angriff auf Iran bis Ende 2026?"
      direction: "JA = Angriff erfolgt, NEIN = Kein Angriff"

      # Präzise Auflösungskriterien (wichtig für Kalibrierung!)
      resolution_criteria:
        what_counts_as_yes:
          - "Luftangriffe auf Nuklearanlagen (Fordow, Natanz, Isfahan, Arak)"
          - "Cruise Missile / Drohnenangriffe auf nukleare Infrastruktur"
          - "Spezialoperationen mit signifikanter Zerstörung"
          - "Cyberangriff mit physischer Zerstörung (Stuxnet 2.0 mit Explosion)"
        what_counts_as_no:
          - "Sanktionen (auch verschärfte)"
          - "Cyberangriffe ohne physische Zerstörung"
          - "Attentate auf Einzelpersonen (Wissenschaftler)"
          - "Proxy-Konflikte ohne direkte Beteiligung"
          - "Rhetorische Drohungen"
        actors_included:
          - "USA (direkt)"
          - "Israel (direkt)"
          - "USA + Israel (koordiniert)"
        actors_excluded:
          - "Saudi-Arabien allein"
          - "Nicht-staatliche Akteure"

    # === MODELL ===
    model:
      id: "MOD-GEO-001"
      name: "US-Iran Crisis Escalation Model"
      type: "Sequential Game (Extensive Form)"
      solution_concept: "Subgame Perfect Equilibrium"
      session_ref: "EBF-S-2026-01-28-GEO-001"
      approach: |
        Backward Induction mit 2 Hauptakteuren (USA, Iran).
        Utility-Gewichte: Credibility, Security, War Cost, Face-Saving.
        Dekonstruktion in bedingte Wahrscheinlichkeiten:
        P(Angriff) = P(Trigger) × P(Entscheidung|Trigger) × P(Ausführung)

    # === PROBABILITY HISTORY (Zeitreihe für Updates) ===
    probability_history:
      # --- INITIALE SCHÄTZUNG (28. Januar 2026) ---
      - date: "2026-01-28"
        time_horizon: "48h"
        probability: 0.18
        confidence_interval: [0.12, 0.25]
        confidence: "MEDIUM"
        reasoning: |
          Sequential Game Analyse (Backward Induction):
          - Gleichgewicht: Verhandlung → Deal (Pareto-optimal)
          - USS Abraham Lincoln vor Ort (Drohkulisse)
          - Davos-Signal (24.01.) de-eskalierend
          - Trump 48h Deadline möglich aber nicht angekündigt
        key_drivers:
          positive:  # Erhöhen P(Angriff)
            - "USS Abraham Lincoln vor Ort"
            - "Trump hawkish rhetoric"
            - "5'002 Tote bei Iran-Protesten"
            - "Face-Saving Zwang beidseitig"
          negative:  # Senken P(Angriff)
            - "Gleichgewicht ist Verhandlung"
            - "Davos de-eskalierend"
            - "Keine konkrete Deadline"
            - "Iran-Regime will überleben"
        trigger_scenarios:
          - trigger: "Iran exekutiert Demonstranten"
            p_strike: 0.45
            delta: "+27pp"
          - trigger: "Proxy greift US-Truppen an"
            p_strike: 0.60
            delta: "+42pp"
          - trigger: "Trump-Tweet mit Deadline"
            p_strike: 0.33
            delta: "+15pp"
          - trigger: "Direkter Trump-Iran Call"
            p_strike: 0.05
            delta: "-13pp"
        updated_by: "EBF-S-2026-01-28-GEO-001"

      # --- AKTUELLER STAND (30. Januar 2026) ---
      - date: "2026-01-30"
        time_horizon: "2026-12-31"
        probability: 0.35
        confidence_interval: [0.20, 0.55]
        confidence: "LOW"
        reasoning: |
          Extrapolation von 48h auf Jahres-Horizont:
          - Kurzfristig (48h): 18% → stabil, kein Trigger eingetreten
          - Kumulativ 2026: ~35% (viele potenzielle Trigger-Fenster)
          - Q1: 25%, Q2: 35%, Q3: 40%, Q4: 45% (steigend)
        key_drivers:
          positive:
            - "Trump 2.0: Maximum Pressure zurück"
            - "Iran Breakout-Zeit verkürzt auf ~2 Wochen"
            - "Netanyahu unter Druck (Gaza, Libanon)"
            - "Abraham Accords + potentieller Saudi-Deal"
          negative:
            - "US Kriegsmüdigkeit"
            - "Ölpreis-Risiko ($120+ möglich)"
            - "Russland/China diplomatische Unterstützung"
            - "Iranische Vergeltungskapazität (Proxies, Hormuz)"
        updated_by: "Update 30.01.2026"

    # === SZENARIEN MIT BEDINGTEN WAHRSCHEINLICHKEITEN ===
    conditional_scenarios:

      - name: "Iran erreicht Breakout"
        condition: "Iran produziert waffenfähiges Uran (>90%)"
        p_condition: 0.40  # P(Breakout in 2026)
        p_attack_given_condition: 0.70
        combined_probability: 0.28  # 0.40 × 0.70

      - name: "Status Quo"
        condition: "Iran bleibt bei 60% Anreicherung"
        p_condition: 0.50
        p_attack_given_condition: 0.15
        combined_probability: 0.075

      - name: "Diplomatischer Durchbruch"
        condition: "Neues Abkommen / De-Eskalation"
        p_condition: 0.10
        p_attack_given_condition: 0.02
        combined_probability: 0.002

    # === HAUPT-PROGNOSE ===
    primary_forecast:
      # Kurzfristig (48h, aus Session 28.01.)
      short_term:
        time_horizon: "48h"
        point_estimate: 0.18
        confidence_interval_95: [0.12, 0.25]
        model_session: "EBF-S-2026-01-28-GEO-001"
        equilibrium: "Verhandlung → Deal"

      # Langfristig (Jahr 2026)
      annual:
        time_horizon: "2026-12-31"
        point_estimate: 0.35
        confidence_interval_80: [0.20, 0.55]
        confidence: "LOW"

      time_decay: |
        Wahrscheinlichkeit steigt über das Jahr:
        - Q1 2026: 25% (Neue Administration, Orientierung)
        - Q2 2026: 35% (Policy kristallisiert, Iran-Policy klar)
        - Q3 2026: 40% (Vor Midterms, politisches Fenster)
        - Q4 2026: 45% (Letztes Fenster vor 2027)

    # === TATSÄCHLICHES ERGEBNIS ===
    actual_outcome:
      resolved: false
      date: null
      result: null  # "attack" oder "no_attack"
      details: null
      source: null

    # === KALIBRIERUNG ===
    calibration:
      brier_score: null
      log_loss: null
      direction_correct: null

    # === UPDATE-PROTOKOLL ===
    update_triggers:
      automatic:
        - "IAEA Report (monatlich)"
        - "Signifikante Truppenbewegungen"
        - "Hochrangige Statements (POTUS, PM Israel)"
      manual:
        - "Geopolitische Schocks"
        - "Neue Intelligence"

    update_workflow: |
      Bei jedem Update:
      1. Neuen Eintrag in probability_history hinzufügen
      2. Reasoning dokumentieren (was hat sich geändert?)
      3. Key Drivers aktualisieren
      4. Conditional Scenarios anpassen falls nötig
      5. forecast_updated Datum aktualisieren

    # === METADATEN ===
    tags:
      - iran
      - nuclear
      - israel
      - usa
      - middle-east
      - trump
      - geopolitics

    related_forecasts:
      - "Regional war escalation"
      - "Oil price spike >$150"
      - "Strait of Hormuz closure"

    notes: |
      GEOPOLITISCHE PROGNOSEN unterscheiden sich von Referenden:
      - Kein fixes Datum → Zeitraum mit Wahrscheinlichkeit
      - Bedingte Wahrscheinlichkeiten wichtiger
      - Updates bei neuen Informationen PFLICHT
      - Resolution-Kriterien VORHER festlegen!

      WICHTIG: Diese Prognose dient der analytischen Einschätzung
      und hat keinen operativen oder beratenden Charakter.

  # ---------------------------------------------------------------------------
  # FCT-POL-2026-002: SPÖ Nationalratswahl Österreich 2029
  # ---------------------------------------------------------------------------
  - id: "FCT-POL-2026-002"

    # === IDENTIFIKATION ===
    title: "SPÖ Stimmenanteil Nationalratswahl Österreich 2029"
    domain: POL
    subdomain: "election"
    country: AT

    # === ZEITRAHMEN ===
    dates:
      forecast_created: "2026-02-02"
      forecast_updated: "2026-02-02"
      event_date: "2029-Q3"  # Voraussichtlich Herbst 2029
      event_resolved: null

    # === FRAGE ===
    question:
      original: |
        Welchen Stimmenanteil erreicht die SPÖ bei der nächsten
        österreichischen Nationalratswahl (voraussichtlich 2029)?
      binary_framing: "Erreicht SPÖ mindestens 30%?"
      direction: "JA = SPÖ ≥ 30%, NEIN = SPÖ < 30%"

      resolution_criteria:
        what_counts:
          - "Offizielles Endergebnis der Nationalratswahl"
          - "Amtliches Ergebnis vom BMI"
        measurement: "Stimmenanteil in Prozent (gerundet auf 1 Dezimalstelle)"

    # === MODELL ===
    model:
      id: "MOD-SPO-TWOPATH-001"
      name: "Two-Path γ_{E×X} Model + 10-Axiom Framework"
      type: "Monte Carlo Simulation with Scenario Analysis"
      session_ref: "EBF-S-2026-01-27-POL-002"
      project_ref: null
      approach: |
        Erweitertes EBF-Modell basierend auf:
        1. Two-Path γ_{E×X} Modell (Funktion vs. Ausschluss)
        2. 10 Axiome K1-K10 (AXIOME_ordnung_statt_spalten.yaml)
        3. Utility-Funktion: U_i = α·F + β·S + Σ_k [γ^{k}·(E^{k} × X^{k})·Salience_k·Credibility_{p,k}]

        Kernunterscheidung:
        - γ^{Ausschluss} = E(Grenzen) × X(Herkunft) → FPÖ (γ=0.42)
        - γ^{Funktion} = E(Systeme) × X(Beitrag) → SPÖ-Ziel (γ=0.15→0.35)

    # === ERFOLGSBEDINGUNGEN ===
    success_conditions:
      C1_execution:
        name: "EXECUTION"
        description: "SPÖ zeigt, dass Systeme funktionieren"
        probability: 0.60  # Erhöht von 0.55 durch Narrativ-Entwicklung
        impact_if_fulfilled: "+0.20 auf γ^{Funktion}"
        update_reason: "Migration/EMRK-Narrativ (B1-B8) liefert konkretes Kommunikationsgerüst"

      C2_consistency:
        name: "KONSISTENZ"
        description: "Keine Rückfälle in alte Frames"
        probability: 0.50  # Erhöht von 0.40 durch modulares Narrativ
