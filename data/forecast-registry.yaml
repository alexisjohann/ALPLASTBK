# =============================================================================
# SCHEMA-DEFINITION
# =============================================================================

_schema:
  forecast_entry:
    required:
      - id
      - title
      - domain
      - dates.forecast_created
      - dates.event_date
      - question.binary_framing
      - primary_forecast.point_estimate
      - primary_forecast.probability
    optional:
      - scenarios
      - historical_comparisons
      - client
      - tags
      - notes

  calibration_metrics:
    brier_score:
      formula: "(probability - outcome)^2"
      range: "[0, 1]"
      interpretation: "0 = perfekt, 0.25 = Zufall bei 50/50"

    log_loss:
      formula: "-[outcome * log(p) + (1-outcome) * log(1-p)]"
      range: "[0, ∞)"
      interpretation: "Niedriger = besser, bestraft overconfidence"

    absolute_error:
      formula: "|predicted - actual|"
      interpretation: "Direkter Fehler in Prozentpunkten"

