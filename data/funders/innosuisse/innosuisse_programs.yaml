  last_updated: "2026-01-27"

# =============================================================================
# PROGRAMM 1: INNOVATION CHEQUE (Innovationsscheck)
# =============================================================================
innovation_cheque:
  id: "PROG-IC"
  name: "Innovation Cheque"
  name_de: "Innovationsscheck"
  our_status: "AKTIV"  # BEATRIX-Projekt

  # Eckdaten
  basics:
    amount_chf: 15000
    duration_months: "3-6"
    submission: "Rolling (keine Fristen)"
    processing_time_weeks: "4-6"
    portal: "Innolink"
    url: "https://www.innosuisse.admin.ch/de/innovationsscheck"

  # Zielgruppe
  eligibility:
    applicant:
      - "Schweizer KMU (< 250 Mitarbeiter)"
      - "Schweizer Startups"
    excluded:
      - "Grossunternehmen"
      - "Ausländische Unternehmen ohne CH-Niederlassung"

  # Förderzweck
  purpose:
    eligible:
      - "Vorstudien"
      - "Machbarkeitsanalysen"
      - "Prototyp-Validierungen"
      - "Technische Feasibility Studies"
      - "Marktanalysen mit Forschungsanteil"
    not_eligible:
      - "Vollständige Produktentwicklung"
      - "Reine Marktforschung ohne Forschungspartner"
      - "Betriebskosten"
      - "Anschaffung von Equipment"

  # Forschungspartner
  research_partner:
    required: true
    eligible_institutions:
      - "Universitäten (UZH, ETHZ, EPFL, etc.)"
      - "Fachhochschulen (ZHAW, FHNW, etc.)"
      - "Forschungsinstitute"
    role: "Wissenschaftliche Expertise, Methoden, Know-how"
    invoicing: "Forschungspartner fakturiert direkt an Innosuisse"

  # Mentor-Unterstützung
  mentor_support:
    available: true
    hours: 35
    cost: "Kostenlos (von Innosuisse finanziert)"
    benefits:
      - "Hilfe bei Partnersuche"
      - "Unterstützung bei Antragsstellung"
      - "Erhöht Erfolgswahrscheinlichkeit"
    our_mentor: "Dr. Daniel Fasnacht"

  # Antragsstruktur (Innolink)
  application_structure:
    sections:
      - id: 1
        name: "Introduction"
        content:
          - "Application name"
          - "Abstract (max. 250 Wörter)"
          - "Context of application"

      - id: 2
        name: "Organisations & People"
        content:
          - "Implementation Partner (KMU/Startup)"
          - "Research Partner (Hochschule)"
          - "Project Manager"
          - "Innovation Mentor"

      - id: 3
        name: "Value Creation & Solution"
        importance: "WICHTIGSTER TEIL"
        questions:
          - id: "a"
            name: "Innovation Potential"
            focus: "Was ist technologisch/geschäftlich neu?"
          - id: "b"
            name: "Market Relevance"
            focus: "Welches Problem wird gelöst? Marktgrösse?"
          - id: "c"
            name: "Feasibility & Risk Reduction"
            focus: "Wie reduziert der Forschungspartner Risiken?"
          - id: "d"
            name: "Collaboration with Research Partner"
            focus: "Warum dieser Partner? Beitrag?"
          - id: "e"
            name: "Impact for Switzerland"
            focus: "Schweizer Wertschöpfung, Jobs, Know-how?"

      - id: 4
        name: "Contribution of Research Partner"
        content:
          - "Konkrete Deliverables"
          - "Zeitplan"
          - "Wissenschaftlicher Beitrag"

  # Erfolgskriterien
  evaluation_criteria:
    - criterion: "Innovationspotenzial"
      weight: "Hoch"
      description: "Neuheit der Idee, Differenzierung vom Markt"
    - criterion: "Marktrelevanz"
      weight: "Hoch"
      description: "Problemlösung, Zielgruppe, Marktgrösse"
    - criterion: "Machbarkeit"
      weight: "Mittel"
      description: "Realistische Ziele mit CHF 15'000"
    - criterion: "Partnerschaftsqualität"
      weight: "Mittel"
      description: "Komplementäre Expertise, klare Rollenverteilung"
    - criterion: "Schweizer Impact"
      weight: "Mittel"
      description: "Wertschöpfung in der Schweiz"

  # TRL (Technology Readiness Level)
  trl:
    typical_start: "TRL 2-4"
    typical_end: "TRL 4-6"
    note: "Proof of Concept Niveau"

  # Follow-up Möglichkeiten
  follow_up:
    - "Innovationsprojekt (CHF 100K-2M+)"
    - "Startup Coaching"
    - "Internationale Kooperationen"

# =============================================================================
# PROGRAMM 2: INNOVATIONSPROJEKTE (mit Umsetzungspartner)
# =============================================================================
innovation_projects:
  id: "PROG-IP"
  name: "Innovation Projects"
  name_de: "Innovationsprojekte mit Umsetzungspartner"
  our_status: "GEPLANT"  # Nach BEATRIX Phase 1

  # Eckdaten
  basics:
    amount_chf: "100'000 - 2'000'000+"
    duration_months: "12-36"
    submission: "Rolling (keine Fristen)"
    processing_time_weeks: "8-12"
    portal: "Innolink"
    url: "https://www.innosuisse.admin.ch/de/innovationsprojekte-mit-umsetzungspartner"

  # Förderzweck
  purpose:
    eligible:
      - "Vollständige F&E-Projekte"
      - "Technologieentwicklung"
      - "Produktentwicklung mit Forschungsanteil"
      - "Prozessinnovation"
    not_eligible:
      - "Reine Grundlagenforschung (→ SNF)"
      - "Projekte ohne Umsetzungspartner"

  # Finanzierungsmodell
  funding_model:
    innosuisse_contribution: "50% der Forschungskosten"
    company_contribution: "50% + eigene Implementierungskosten"
    cash_contribution_required: true

  # Anforderungen
  requirements:
    - "Innovationspotenzial nachgewiesen"
    - "Qualifizierter Forschungspartner"
    - "Umsetzungspartner mit Eigenleistung"
    - "Klarer Projektplan mit Meilensteinen"
    - "Wirtschaftliche Verwertung geplant"

  # TRL
  trl:
    typical_start: "TRL 4-6"
    typical_end: "TRL 7-9"
    note: "Von Proof of Concept zu Marktreife"

# =============================================================================
# PROGRAMM 3: STARTUP COACHING
# =============================================================================
startup_coaching:
  id: "PROG-STARTUP"
  name: "Startup Coaching"
  our_status: "NICHT RELEVANT"

  basics:
    description: "Coaching und Beratung für Schweizer Startups"
    target: "Startups in frühen Phasen"
    url: "https://www.innosuisse.admin.ch/de/startup-coaching"

  services:
    - "Business Model Coaching"
    - "Pitch Training"
    - "Netzwerk-Zugang"
    - "Investoren-Matching"

  relevance_for_us: |
    Nicht direkt relevant für FehrAdvice (etabliertes KMU),
    aber potenziell für Spin-offs oder Joint Ventures.

# =============================================================================
# PROGRAMM 4: INTERNATIONALISIERUNG
# =============================================================================
internationalization:
  id: "PROG-INTL"
  name: "Internationalisierung"
  our_status: "NICHT RELEVANT"

  basics:
    description: "Unterstützung für internationale Forschungskooperationen"
    target: "Schweizer Unternehmen mit internationalen Partnern"

  programs:
    - "Eurostars (EU)"
    - "Bilaterale Programme"
    - "ERA-NET Cofund"

  relevance_for_us: |
    Potenziell relevant für spätere BEATRIX-Expansion
    in EU-Märkte oder internationale Forschungskooperationen.

# =============================================================================
# UNSERE PROGRAMM-STRATEGIE
# =============================================================================
our_strategy:
  current_phase: "Phase 1: Innovation Cheque"

  roadmap:
    - phase: 1
      program: "Innovation Cheque"
      project: "BEATRIX"
      amount_chf: 15000
      timeline: "2026-Q1 bis 2026-Q3"
      goal: "Proof of Concept (TRL 6-7)"
      status: "IN ARBEIT"

    - phase: 2
      program: "Innovationsprojekt"
      project: "BEATRIX Platform"
      amount_chf: "500'000 - 1'000'000"
      timeline: "2026-Q4 bis 2028"
      goal: "Vollentwicklung (TRL 7-9)"
      status: "GEPLANT"

    - phase: 3
      program: "Internationalisierung"
      project: "BEATRIX EU"
      timeline: "2028+"
      goal: "EU-Expansion"
      status: "OPTION"

  success_metrics:
    phase_1:
      - "Innovation Cheque bewilligt"
      - "Proof of Concept validiert"
      - "Forschungspartnerschaft etabliert"
    phase_2:
      - "Innovationsprojekt bewilligt"
      - "TRL 9 erreicht"
      - "Erste zahlende Kunden"

# =============================================================================
# VERGLEICH: INNOVATION CHEQUE vs. INNOVATIONSPROJEKT
# =============================================================================
program_comparison:
  - aspect: "Fördersumme"
    innovation_cheque: "CHF 15'000"
    innovation_project: "CHF 100K - 2M+"

  - aspect: "Laufzeit"
    innovation_cheque: "3-6 Monate"
    innovation_project: "12-36 Monate"

  - aspect: "TRL Ziel"
    innovation_cheque: "TRL 4-6 (PoC)"
    innovation_project: "TRL 7-9 (Marktreife)"

  - aspect: "Eigenleistung"
    innovation_cheque: "Minimal (Zeit)"
    innovation_project: "50% + Implementierung"

  - aspect: "Komplexität"
    innovation_cheque: "Niedrig"
    innovation_project: "Hoch"

  - aspect: "Bearbeitungszeit"
    innovation_cheque: "4-6 Wochen"
    innovation_project: "8-12 Wochen"

  - aspect: "Ideal für"
    innovation_cheque: "Erste Validierung, Türöffner"
    innovation_project: "Vollständige Entwicklung"

