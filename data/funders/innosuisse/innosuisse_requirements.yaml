  source: "Dr. Daniel Fasnacht (Innosuisse Mentor) + offizielle Dokumentation"

# =============================================================================
# INNOVATION CHEQUE: ANFORDERUNGEN
# =============================================================================
innovation_cheque_requirements:

  # Formale Voraussetzungen
  formal_requirements:
    applicant:
      - requirement: "Schweizer KMU oder Startup"
        check: "Handelsregistereintrag in der Schweiz"
        mandatory: true
      - requirement: "< 250 Mitarbeiter"
        check: "Personalbestand prüfen"
        mandatory: true
      - requirement: "Eigenständiges Unternehmen"
        check: "Keine Tochter eines Grosskonzerns"
        mandatory: true

    research_partner:
      - requirement: "Akkreditierte Schweizer Forschungsinstitution"
        check: "Universität, ETH, FH, oder anerkanntes Institut"
        mandatory: true
      - requirement: "Wissenschaftliche Expertise im Projektgebiet"
        check: "Publikationen, Projekte, Know-how"
        mandatory: true

    project:
      - requirement: "Forschungscharakter"
        check: "Nicht reine Produktentwicklung"
        mandatory: true
      - requirement: "Realistisch mit CHF 15'000"
        check: "Machbar in 3-6 Monaten"
        mandatory: true

  # Bewertungskriterien (5 Fragen a-e)
  evaluation_criteria:

    - id: "a"
      name: "Innovation Potential"
      weight: "25%"
      key_questions:
        - "Was ist technologisch oder geschäftlich neu?"
        - "Wie unterscheidet es sich von existierenden Lösungen?"
        - "Was validiert der Forschungspartner?"
      success_indicators:
        - "Klare Differenzierung zum Stand der Technik"
        - "Neuartiger Ansatz oder Methode"
        - "Potenzial für IP oder Wettbewerbsvorteil"
      red_flags:
        - "Nur inkrementelle Verbesserung"
        - "Bereits existierende Lösung"
        - "Kein Forschungsanteil"

    - id: "b"
      name: "Market Relevance"
      weight: "25%"
      key_questions:
        - "Welches konkrete Problem wird gelöst?"
        - "Wer sind die Zielkunden?"
        - "Wie gross ist der Markt?"
        - "Welcher Impact ist zu erwarten?"
      success_indicators:
        - "Klares, quantifizierbares Problem"
        - "Identifizierte Zielgruppe"
        - "Attraktive Marktgrösse"
        - "Messbare Vorteile (Kosten, Zeit, Qualität)"
      red_flags:
        - "Vages Problem ohne Zahlen"
        - "Kein klarer Kundennutzen"
        - "Zu kleiner Markt"

    - id: "c"
      name: "Feasibility & Risk Reduction"
      weight: "20%"
      key_questions:
        - "Welche Machbarkeit muss getestet werden?"
        - "Was ist der Proof-of-Concept mit CHF 15'000?"
        - "Wie reduziert der Forschungspartner Risiken?"
        - "Was sind die nächsten Schritte bei Erfolg?"
      success_indicators:
        - "Klare, testbare Hypothese"
        - "Realistischer PoC-Scope"
        - "Identifizierte Risiken mit Mitigationsplan"
        - "Definierter Pfad zum nächsten Schritt"
      red_flags:
        - "Unrealistische Ziele"
        - "Keine Risikobetrachtung"
        - "Kein Follow-up Plan"

    - id: "d"
      name: "Collaboration with Research Partner"
      weight: "15%"
      key_questions:
        - "Welche Expertise fehlt intern?"
        - "Warum dieser Forschungspartner?"
        - "Was ist der konkrete Beitrag?"
        - "Kann das zu längerer Partnerschaft führen?"
      success_indicators:
        - "Komplementäre Expertise"
        - "Nachgewiesene Kompetenz des Partners"
        - "Klare Rollenverteilung"
        - "Langfristiges Potenzial"
      red_flags:
        - "Partner nur wegen Formalität"
        - "Unklare Aufgabenteilung"
        - "Keine echte Zusammenarbeit"

    - id: "e"
      name: "Impact for Switzerland"
      weight: "15%"
      key_questions:
        - "Wie stärkt es die Schweizer Wettbewerbsfähigkeit?"
        - "Welcher Wissenstransfer findet statt?"
        - "Welche Arbeitsplätze/IP entstehen in der Schweiz?"
        - "Positioniert es die Schweiz als Leader?"
      success_indicators:
        - "Jobs in der Schweiz"
        - "IP/Know-how in der Schweiz"
        - "Stärkung KMU-Hochschul-Kooperation"
        - "Gesellschaftlicher Nutzen"
      red_flags:
        - "Wertschöpfung primär im Ausland"
        - "Kein Schweizer Bezug"
        - "Nur Eigennutz ohne breiteren Impact"

# =============================================================================
# CHECKLISTE: VOR ANTRAGSSTELLUNG
# =============================================================================
pre_application_checklist:

  phase_1_vorbereitung:
    - item: "Projektidee definiert"
      description: "Klare Innovationsidee mit Forschungsanteil"
      status_field: "idea_defined"

    - item: "Forschungspartner identifiziert"
      description: "Akkreditierte Institution, passende Expertise"
      status_field: "partner_identified"

    - item: "Mentor kontaktiert (optional)"
      description: "Akkreditierter Innosuisse-Mentor eingebunden"
      status_field: "mentor_engaged"

    - item: "Innolink-Account erstellt"
      description: "Registrierung auf innolink.innosuisse.ch"
      status_field: "innolink_account"

  phase_2_inhalte:
    - item: "Abstract verfasst"
      description: "Max. 250 Wörter, prägnant"
      status_field: "abstract_written"

    - item: "Frage a) beantwortet"
      description: "Innovation Potential dokumentiert"
      status_field: "question_a"

    - item: "Frage b) beantwortet"
      description: "Market Relevance dokumentiert"
      status_field: "question_b"

    - item: "Frage c) beantwortet"
      description: "Feasibility & Risk Reduction dokumentiert"
      status_field: "question_c"

    - item: "Frage d) beantwortet"
      description: "Collaboration dokumentiert"
      status_field: "question_d"

    - item: "Frage e) beantwortet"
      description: "Swiss Impact dokumentiert"
      status_field: "question_e"

    - item: "Work Package definiert"
      description: "Konkrete Aufgaben für CHF 15'000"
      status_field: "work_package"

    - item: "Deliverables spezifiziert"
      description: "Was wird geliefert nach 3-6 Monaten?"
      status_field: "deliverables"

  phase_3_review:
    - item: "Mentor-Review (falls vorhanden)"
      description: "Feedback von Innosuisse-Mentor"
      status_field: "mentor_review"

    - item: "Interne Freigabe"
      description: "Management-Approval"
      status_field: "internal_approval"

    - item: "Partner-Abstimmung"
      description: "Forschungspartner hat zugestimmt"
      status_field: "partner_alignment"

  phase_4_einreichung:
    - item: "Antrag in Innolink erfasst"
      description: "Alle Rubriken ausgefüllt"
      status_field: "innolink_submitted"

    - item: "Dokumente hochgeladen"
      description: "Falls erforderlich"
      status_field: "documents_uploaded"

    - item: "Antrag eingereicht"
      description: "Submit-Button gedrückt"
      status_field: "submitted"

# =============================================================================
# QUALITÄTS-FRAMEWORK
# =============================================================================
quality_framework:

  abstract_criteria:
    max_words: 250
    must_include:
      - "Problemstellung"
      - "Innovativer Ansatz"
      - "Rolle des Forschungspartners"
      - "Erwarteter Nutzen"
    style: "Prägnant, faktenbasiert, kein Marketing-Sprech"

  answer_criteria:
    each_answer:
      - "Konkret und spezifisch (keine Allgemeinplätze)"
      - "Quantifiziert wo möglich (Zahlen, Prozente)"
      - "Auf Innosuisse-Kriterien abgestimmt"
      - "Konsistent mit anderen Antworten"

  red_flags_to_avoid:
    - "Buzzword-Overload ohne Substanz"
    - "Unrealistische Versprechen"
    - "Copy-Paste aus anderen Anträgen"
    - "Widersprüche zwischen Abschnitten"
    - "Fehlende Schweizer Wertschöpfung"

# =============================================================================
# BEATRIX-SPEZIFISCHE STÄRKEN (für Antrag nutzen)
# =============================================================================
beatrix_strengths:
  note: "Diese Punkte bei Antragsstellung hervorheben"

  innovation_potential:
    - "Erste Schweizer Management-Innovation für Behavioral AI"
    - "Komplementarität von Verhaltensökonomik + KI (neu)"
    - "General Decision Support System (GDSS) - neue Klasse"
    - "Kontext-Modellierung (Ψ) mathematisch formalisiert"

  market_relevance:
    - "Quantifizierter Nutzen: -85% Zeit, -60% Kosten, +45% Genauigkeit"
    - "Klare Zielgruppen: Beratungen, Verwaltungen, Unternehmen"
    - "Globaler Markt für Behavioral Consulting wächst"

  feasibility:
    - "20+ Pilotprojekte bereits durchgeführt"
    - "1'500+ validierte Studien in Bibliothek"
    - "Prototyp funktioniert (Claude Code Skills)"
    - "Track Record: ±2% Prognosegenauigkeit"

  collaboration:
    - "Prof. Gall (UZH): Weltklasse in Software Evolution"
    - "Prof. Luger (UZH): Human-AI-Collaboration Expertise"
    - "Komplementär: Theorie (UZH) + Praxis (FehrAdvice)"
    - "Langfristiges Forschungsprogramm geplant"

  swiss_impact:
    - "Jobs in der Schweiz (FehrAdvice + UZH)"
    - "IP bleibt in der Schweiz"
    - "Positioniert CH als Leader für Behavioral AI"
    - "KMU-Hochschul-Kooperation stärken"

# =============================================================================
# TYPISCHE FEHLER (vermeiden!)
# =============================================================================
common_mistakes:
  - mistake: "Zu viel Fokus auf Technologie, zu wenig auf Nutzen"
    solution: "Immer Kundennutzen und Marktrelevanz betonen"

  - mistake: "Forschungspartner nur pro forma"
    solution: "Echte wissenschaftliche Frage definieren"

  - mistake: "Unrealistischer Scope für CHF 15'000"
    solution: "Fokussierter PoC, nicht vollständiges Produkt"

  - mistake: "Kein Follow-up Plan"
    solution: "Klar kommunizieren: Innovation Cheque → Innovationsprojekt"

  - mistake: "Zu viele Buzzwords, zu wenig Substanz"
    solution: "Konkret, quantifiziert, faktenbasiert"

  - mistake: "Schweizer Impact vergessen"
    solution: "Explizit Jobs, IP, Wissenstransfer adressieren"

