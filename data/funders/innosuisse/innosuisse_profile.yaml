# =============================================================================
# ORGANISATION
# =============================================================================
organization:
  name: "Innosuisse"
  full_name: "Schweizerische Agentur für Innovationsförderung"
  name_en: "Swiss Innovation Agency"
  name_fr: "Agence suisse pour l'encouragement de l'innovation"
  name_it: "Agenzia svizzera per la promozione dell'innovazione"

  legal_status: "Öffentlich-rechtliche Anstalt des Bundes"
  established: 2018  # Nachfolger der KTI (Kommission für Technologie und Innovation)
  predecessor: "KTI (Kommission für Technologie und Innovation, 1943-2017)"

  headquarters:
    address: "Einsteinstrasse 2"
    city: "Bern"
    postal_code: "3003"
    country: "Switzerland"

  contact:
    website: "https://www.innosuisse.admin.ch"
    portal: "https://innolink.innosuisse.ch"
    email: "info@innosuisse.ch"
    phone: "+41 58 461 61 90"

# =============================================================================
# MISSION & STRATEGIE
# =============================================================================
mission:
  statement: |
    Innosuisse fördert wissenschaftsbasierte Innovation im Interesse von
    Wirtschaft und Gesellschaft in der Schweiz.

  strategic_goals:
    - "Förderung der Zusammenarbeit zwischen Forschung und Wirtschaft"
    - "Stärkung der Innovationsfähigkeit von Schweizer Unternehmen"
    - "Unterstützung von Startups und KMU"
    - "Wissens- und Technologietransfer beschleunigen"

  focus_areas:
    - "Wissenschaftsbasierte Innovation"
    - "KMU-Hochschul-Kooperationen"
    - "Startup-Ökosystem"
    - "Internationalisierung"

# =============================================================================
# BUDGET & KENNZAHLEN
# =============================================================================
financials:
  annual_budget_chf_m: 350  # Ungefähr, variiert jährlich
  funding_sources:
    - "Bundeshaushalt (SBFI)"

  key_metrics_2024:
    innovation_projects_funded: "~400"
    startups_supported: "~300"
    total_disbursements_chf_m: "~300"
    success_rate_percent: "~60"  # Annahme basierend auf typischen Werten

