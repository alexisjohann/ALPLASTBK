# Health Domain Kontextvektor: Master-Übersicht
# Version: 1.0
# Quelle: FehrAdvice Unternehmenskontextvektor-Architektur 2026
# Letzte Aktualisierung: 2026-01-28
# EBF-Relevanz: Alle Ψ-Dimensionen für Gesundheitsverhalten und -entscheidungen

metadata:
  name: "Health Domain Kontextvektor Master-Übersicht"
  code: "BCM2_HLT_HEALTH"
  version: "1.0"
  total_factors: 400
  sub_axes: 40
  main_axes: 8
  description: "Vollständige Faktorenstruktur für Gesundheitskontext (Schweiz/DACH) 2024-2030"
  quantitative_coverage: "100% - alle 400 Faktoren mit Zeitreihen/Zielwerten"
  template_source: "BCM2_04_KON (Schweizer Kontextvektor)"
  domain: "HLT"
  geographic_scope: "CH primary, AT/DE secondary"

# =============================================================================
# DATENQUELLEN-ÜBERSICHT
# =============================================================================
data_sources:
  summary:
    primary_sources: 12
    secondary_sources: 20
    internal_systems: 8
    time_horizon: "2020-2030"
    update_frequency: "quarterly"

  primary_official:
    - name: "Bundesamt für Gesundheit (BAG)"
      url: "https://www.bag.admin.ch"
      coverage: "Gesundheitspolitik, Epidemiologie, Versicherung"
      factors_covered: 80
      api: "opendata.swiss"

    - name: "Bundesamt für Statistik (BFS)"
      url: "https://www.bfs.admin.ch"
      coverage: "Gesundheitsstatistik, Demografie, Kosten"
      factors_covered: 100
      api: "https://www.pxweb.bfs.admin.ch"

    - name: "Schweizerisches Gesundheitsobservatorium (Obsan)"
      url: "https://www.obsan.admin.ch"
      coverage: "Gesundheitsversorgung, Indikatoren, Monitoring"
      factors_covered: 60

    - name: "santésuisse"
      url: "https://www.santesuisse.ch"
      coverage: "Krankenversicherung, Prämien, Leistungen"
      factors_covered: 40

  primary_research:
    - name: "Swiss Health Survey (SGB)"
      url: "https://www.bfs.admin.ch/sgb"
      coverage: "Gesundheitszustand, Verhalten, Inanspruchnahme"
      factors_covered: 50
      frequency: "5-jährlich"

    - name: "SHARE Survey"
      url: "https://share-eric.eu"
      coverage: "Alterung, Gesundheit, Sozioökonomie 50+"
      factors_covered: 30

    - name: "European Social Survey (ESS)"
      url: "https://europeansocialsurvey.org"
      coverage: "Vertrauen, Werte, Gesundheitseinstellungen"
      factors_covered: 20

    - name: "World Values Survey (WVS)"
      url: "https://worldvaluessurvey.org"
      coverage: "Kulturelle Werte, Gesundheitsverhalten"
      factors_covered: 15

  primary_clinical:
    - name: "SASIS AG / NewIndex"
      url: "https://www.sasis.ch"
      coverage: "Leistungsdaten, Tarife, Abrechnungen"
      factors_covered: 25

    - name: "ANQ (Nationaler Verein für Qualitätsentwicklung)"
      url: "https://www.anq.ch"
      coverage: "Qualitätsindikatoren Spitäler, Reha, Psychiatrie"
      factors_covered: 15

    - name: "Spitex Verband Schweiz"
      url: "https://www.spitex.ch"
      coverage: "Ambulante Pflege, Spitex-Statistik"
      factors_covered: 10

    - name: "CURAVIVA"
      url: "https://www.curaviva.ch"
      coverage: "Pflegeheime, Langzeitpflege"
      factors_covered: 10

  secondary:
    - name: "OECD Health Statistics"
    - name: "WHO Health Observatory"
    - name: "European Health Interview Survey (EHIS)"
    - name: "Konjunkturforschungsstelle KOF"
    - name: "CSS Institut für empirische Gesundheitsökonomie"
    - name: "Helsana Gesundheitsreport"
    - name: "SWICA Gesundheitskompass"
    - name: "Interpharma / Scienceindustries"
    - name: "FMH Ärztestatistik"
    - name: "Swissmedic"

# =============================================================================
# Gesamtübersicht: 8 Hauptachsen × 40 Unterachsen = 400 Faktoren
# =============================================================================
overview:
  total_factors: 400
  total_sub_axes: 40
  quantitative_status: "100% vollständig"

  main_axes:
    - name: "Klinischer Status & Bevölkerungsgesundheit"
      code: "CLI"
      factors: 60
      percentage: 15
      sub_axes: 6
      description: "Morbidität, Mortalität, Krankheitslast, Gesundheitszustand"
      data_coverage: "BAG, BFS, Obsan, SGB"

    - name: "Gesundheitsverhalten"
      code: "BEH"
      factors: 80
      percentage: 20
      sub_axes: 8
      description: "Prävention, Lebensstil, Adhärenz, Inanspruchnahme"
      data_coverage: "SGB, SHARE, ESS, Helsana Reports"

    - name: "Gesundheitsökonomie"
      code: "FIN"
      factors: 60
      percentage: 15
      sub_axes: 6
      description: "Kosten, Finanzierung, Effizienz, Ausgaben"
      data_coverage: "BFS, BAG, santésuisse, Obsan"

    - name: "Versicherung & Zugang"
      code: "INS"
      factors: 50
      percentage: 12.5
      sub_axes: 5
      description: "Versicherungsstruktur, Prämien, Franchise, Zugang"
      data_coverage: "BAG, santésuisse, Comparis"

    - name: "Regulierung & Politik"
      code: "REG"
      factors: 40
      percentage: 10
      sub_axes: 4
      description: "Gesundheitspolitik, Gesetzgebung, Qualitätsstandards"
      data_coverage: "BAG, Parlament, FINMA"

    - name: "Soziale Determinanten"
      code: "SOC"
      factors: 50
      percentage: 12.5
      sub_axes: 5
      description: "Demografie, Bildung, Einkommen, Migration, Ungleichheit"
      data_coverage: "BFS, SGB, SHARE, ESS"

    - name: "Digitale Gesundheit & Technologie"
      code: "TEC"
      factors: 40
      percentage: 10
      sub_axes: 4
      description: "eHealth, Telemedizin, Apps, Daten, KI"
      data_coverage: "eHealth Suisse, BFS, Tech Reports"

    - name: "Gesundheitssystem & Infrastruktur"
      code: "SYS"
      factors: 20
      percentage: 5
      sub_axes: 2
      description: "Versorgungsstruktur, Kapazitäten, Personal"
      data_coverage: "BFS, FMH, H+, Curaviva"

# =============================================================================
# Detailstruktur nach Hauptachse
# =============================================================================
structure:
  # ---------------------------------------------------------------------------
  # KLINISCHER STATUS & BEVÖLKERUNGSGESUNDHEIT (CLI) – 60 Faktoren
  # ---------------------------------------------------------------------------
  CLI:
    name: "Klinischer Status & Bevölkerungsgesundheit"
    total_factors: 60
    function: "Gesundheitszustand und Krankheitslast der Bevölkerung"
    sub_axes:
      - code: CLI-MOR
        name: "Mortalität & Lebenserwartung"
        description: "Sterblichkeit, Todesursachen, Lebenserwartung"
        factors: 10

      - code: CLI-MRB
        name: "Morbidität & Krankheitslast"
        description: "Prävalenz, Inzidenz, DALYs, chronische Erkrankungen"
        factors: 15

      - code: CLI-PSY
        name: "Psychische Gesundheit"
        description: "Depression, Angst, Stress, Burnout, Suizid"
        factors: 10

      - code: CLI-FUN
        name: "Funktionaler Gesundheitszustand"
        description: "Behinderung, Einschränkungen, Pflegebedürftigkeit"
        factors: 10

      - code: CLI-SUB
        name: "Subjektive Gesundheit"
        description: "Selbsteinschätzung, Lebensqualität, Wohlbefinden"
        factors: 8

      - code: CLI-EPI
        name: "Epidemiologische Trends"
        description: "Infektionskrankheiten, Pandemierisiko, Impfung"
        factors: 7

  # ---------------------------------------------------------------------------
  # GESUNDHEITSVERHALTEN (BEH) – 80 Faktoren
  # ---------------------------------------------------------------------------
  BEH:
    name: "Gesundheitsverhalten"
    total_factors: 80
    function: "Verhaltensfaktoren und Lebensstil"
    sub_axes:
      - code: BEH-ERN
        name: "Ernährung"
        description: "Essverhalten, Diät, BMI, Übergewicht"
        factors: 12

      - code: BEH-BEW
        name: "Bewegung & Sport"
        description: "Körperliche Aktivität, Sitzverhalten, Fitness"
        factors: 10

      - code: BEH-SUB
        name: "Substanzkonsum"
        description: "Tabak, Alkohol, Drogen, Medikamentenmissbrauch"
        factors: 12

      - code: BEH-SCH
        name: "Schlaf & Erholung"
        description: "Schlafqualität, Schlafstörungen, Erholung"
        factors: 8

      - code: BEH-PRV
        name: "Prävention & Vorsorge"
        description: "Screening, Impfung, Check-ups, Selbstuntersuchung"
        factors: 12

      - code: BEH-ADH
        name: "Adhärenz & Compliance"
        description: "Medikamentenadhärenz, Therapietreue, Arztbesuche"
        factors: 10

      - code: BEH-HLI
        name: "Health Literacy"
        description: "Gesundheitskompetenz, Informationssuche, Verständnis"
        factors: 8

      - code: BEH-INA
        name: "Inanspruchnahme"
        description: "Arztbesuche, Notfall, Spitalaufenthalte, Wartezeiten"
        factors: 8

  # ---------------------------------------------------------------------------
  # GESUNDHEITSÖKONOMIE (FIN) – 60 Faktoren
  # ---------------------------------------------------------------------------
  FIN:
    name: "Gesundheitsökonomie"
    total_factors: 60
    function: "Kosten, Finanzierung und wirtschaftliche Aspekte"
    sub_axes:
      - code: FIN-AUS
        name: "Gesundheitsausgaben"
        description: "Pro Kopf, Total, Wachstum, international"
        factors: 12

      - code: FIN-FNZ
        name: "Finanzierungsstruktur"
        description: "OKP, Zusatz, Staat, Out-of-Pocket, Mix"
        factors: 10

      - code: FIN-PRE
        name: "Prämien & Selbstbehalt"
        description: "Prämienentwicklung, Franchise, Kostenbeteiligung"
        factors: 10

      - code: FIN-EFF
        name: "Effizienz & Produktivität"
        description: "Kosten-Nutzen, QALY, Produktivitätsverluste"
        factors: 10

      - code: FIN-ANB
        name: "Anbieterökonomie"
        description: "Arztkosten, Spitalkosten, Medikamentenkosten"
        factors: 10

      - code: FIN-LAS
        name: "Lastenverteilung"
        description: "Solidarität, Risikoausgleich, Subventionen"
        factors: 8

  # ---------------------------------------------------------------------------
  # VERSICHERUNG & ZUGANG (INS) – 50 Faktoren
  # ---------------------------------------------------------------------------
  INS:
    name: "Versicherung & Zugang"
    total_factors: 50
    function: "Versicherungsstruktur und Zugangsbedingungen"
    sub_axes:
      - code: INS-OKP
        name: "Obligatorische Krankenversicherung"
        description: "Versicherungspflicht, Leistungskatalog, Wechsel"
        factors: 12

      - code: INS-ZUS
        name: "Zusatzversicherungen"
        description: "Spital, Ambulant, Alternativ, Dental, Ausland"
        factors: 10

      - code: INS-ZUG
        name: "Versorgungszugang"
        description: "Wartezeiten, Distanzen, Verfügbarkeit, Barrieren"
        factors: 12

      - code: INS-WAH
        name: "Wahlfreiheit & Modelle"
        description: "Freie Arztwahl, HMO, Hausarztmodell, Telmed"
        factors: 8

      - code: INS-MKT
        name: "Versicherungsmarkt"
        description: "Anbieter, Konzentration, Wettbewerb, Prämienvergleich"
        factors: 8

  # ---------------------------------------------------------------------------
  # REGULIERUNG & POLITIK (REG) – 40 Faktoren
  # ---------------------------------------------------------------------------
  REG:
    name: "Regulierung & Politik"
    total_factors: 40
    function: "Gesundheitspolitischer Rahmen und Steuerung"
    sub_axes:
      - code: REG-GES
        name: "Gesetzgebung"
        description: "KVG, VVG, Heilmittelgesetz, Datenschutz"
        factors: 10

      - code: REG-POL
        name: "Gesundheitspolitik"
        description: "Strategie 2030, Reformen, Kantone vs. Bund"
        factors: 12

      - code: REG-QUA
        name: "Qualitätsstandards"
        description: "ANQ, Akkreditierung, Patientensicherheit, Reporting"
        factors: 10

      - code: REG-ETH
        name: "Ethik & Patientenrechte"
        description: "Informed Consent, Patientenverfügung, Autonomie"
        factors: 8

  # ---------------------------------------------------------------------------
  # SOZIALE DETERMINANTEN (SOC) – 50 Faktoren
  # ---------------------------------------------------------------------------
  SOC:
    name: "Soziale Determinanten"
    total_factors: 50
    function: "Sozioökonomische und demografische Einflussfaktoren"
    sub_axes:
      - code: SOC-DEM
        name: "Demografie"
        description: "Alter, Geschlecht, Lebensform, Urbanisierung"
        factors: 12

      - code: SOC-BIL
        name: "Bildung"
        description: "Bildungsniveau, Gesundheitswissen, Schule"
        factors: 10

      - code: SOC-EIN
        name: "Einkommen & Vermögen"
        description: "Armut, Ungleichheit, Working Poor, Reichtum"
        factors: 10

      - code: SOC-ARB
        name: "Arbeit & Beschäftigung"
        description: "Arbeitslosigkeit, Arbeitsbedingungen, Stress"
        factors: 10

      - code: SOC-MIG
        name: "Migration & Kultur"
        description: "Migrationshintergrund, Sprachbarrieren, Kulturelle Faktoren"
        factors: 8

  # ---------------------------------------------------------------------------
  # DIGITALE GESUNDHEIT & TECHNOLOGIE (TEC) – 40 Faktoren
  # ---------------------------------------------------------------------------
  TEC:
    name: "Digitale Gesundheit & Technologie"
    total_factors: 40
    function: "Digitalisierung und technologische Innovation"
    sub_axes:
      - code: TEC-EPD
        name: "Elektronisches Patientendossier"
        description: "EPD-Adoption, Nutzung, Datenaustausch"
        factors: 10

      - code: TEC-TEL
        name: "Telemedizin"
        description: "Videokonsultation, Fernüberwachung, Online-Apotheken"
        factors: 10

      - code: TEC-APP
        name: "Health Apps & Wearables"
        description: "Fitness-Tracker, Symptom-Checker, Medikamenten-Apps"
        factors: 10

      - code: TEC-DAT
        name: "Gesundheitsdaten & KI"
        description: "Big Data, Machine Learning, Präzisionsmedizin"
        factors: 10

  # ---------------------------------------------------------------------------
  # GESUNDHEITSSYSTEM & INFRASTRUKTUR (SYS) – 20 Faktoren
  # ---------------------------------------------------------------------------
  SYS:
    name: "Gesundheitssystem & Infrastruktur"
    total_factors: 20
    function: "Versorgungsstruktur und Kapazitäten"
    sub_axes:
      - code: SYS-ANB
        name: "Leistungserbringer"
        description: "Ärzte, Spitäler, Apotheken, Spitex, Heime"
        factors: 12

      - code: SYS-PER
        name: "Gesundheitspersonal"
        description: "Fachkräftemangel, Ausbildung, Arbeitsbedingungen"
        factors: 8

# =============================================================================
# Systemische Kopplung
# =============================================================================
systemic_coupling:
  diagram: |
    CLI ──► BEH ──► FIN
     │       │       │
     └───────┼───────┘
             │
             ▼
           SOC ◄── TEC ◄── REG
             │
             ▼
           INS ◄── SYS

  description: |
    - Klinischer Status (CLI) resultiert aus Gesundheitsverhalten (BEH) und beeinflusst Kosten (FIN)
    - Soziale Determinanten (SOC) sind Wurzelursachen und wirken auf alle anderen Achsen
    - Technologie (TEC) transformiert das System über Regulierung (REG) und Verhalten (BEH)
    - Versicherung (INS) und Systeminfrastruktur (SYS) sind Enabler und Barrieren
    - Gesundheitsverhalten (BEH) ist die zentrale Transformationsachse für Interventionen

# =============================================================================
# EBF Verhaltensökonomische Mapping
# =============================================================================
ebf_mapping:
  primary_10c_dimensions:
    WHAT:
      relevance: "KRITISCH"
      description: "Gesundheitsentscheidungen involvieren Trade-offs: U_F (Kosten), U_P (Prävention), U_E (Aufwand), U_S (Sozial)"
      key_factors: ["BEH-PRV", "FIN-PRE", "INS-WAH"]

    WHEN:
      relevance: "KRITISCH"
      description: "Zeitliche Diskontierung zentral: Prävention = zukünftiger Nutzen, Behandlung = sofortiger Aufwand"
      key_factors: ["BEH-ADH", "BEH-PRV", "CLI-EPI"]

    AWARE:
      relevance: "HOCH"
      description: "Health Literacy moderiert Effektivität von Informationsinterventionen"
      key_factors: ["BEH-HLI", "TEC-APP", "SOC-BIL"]

    READY:
      relevance: "HOCH"
      description: "Identitätseffekte: 'Ich bin gesund' vs. 'Ich bin Risikopatient' formen Verhaltensbereitschaft"
      key_factors: ["CLI-SUB", "BEH-PRV", "BEH-ADH"]

    STAGE:
      relevance: "MITTEL"
      description: "Lebensphasen beeinflussen Gesundheitsprioritäten (jung: Prävention, alt: Behandlung)"
      key_factors: ["SOC-DEM", "CLI-FUN", "INS-ZUS"]

  primary_psi_dimensions:
    Psi_T:
      relevance: "KRITISCH"
      description: "Temporal: Zeitdiskontierung bei präventivem Gesundheitsverhalten"
      modifies: ["BEH-PRV", "BEH-ADH", "FIN-PRE"]

    Psi_C:
      relevance: "HOCH"
      description: "Kognitiv: Health Literacy ermöglicht informierte Entscheidungen"
      modifies: ["BEH-HLI", "TEC-APP", "INS-WAH"]

    Psi_S:
      relevance: "HOCH"
      description: "Sozial: Peer-Verhalten und Arzt-Vertrauen beeinflussen Gesundheitsentscheidungen"
      modifies: ["BEH-ERN", "BEH-BEW", "BEH-SUB"]

    Psi_I:
      relevance: "HOCH"
      description: "Institutionell: Regulierung, Versicherungsstruktur, Defaults"
      modifies: ["REG-GES", "INS-OKP", "INS-WAH"]

    Psi_E:
      relevance: "MITTEL"
      description: "Ökonomisch: Affordability, Out-of-Pocket-Belastung"
      modifies: ["FIN-PRE", "INS-ZUG", "SOC-EIN"]

  behavioral_parameters:
    lambda_health:
      description: "Verlustaversion bei Gesundheitsentscheidungen"
      range: [2.5, 3.5]
      note: "Höher als bei finanziellen Entscheidungen"

    beta_health:
      description: "Zeitdiskontierung bei Prävention"
      range: [0.85, 0.95]
      note: "Prävention involviert zukünftigen Nutzen"

    sigma_social:
      description: "Soziale Normen bei Gesundheitsverhalten"
      range: [0.4, 0.7]
      note: "Peer-Effekte bei Ernährung, Bewegung, Rauchen"

    kappa_default:
      description: "Default-Sensitivität bei Versicherungswahl"
      range: [0.6, 0.8]
      note: "Versicherungsmodell-Wahl, Organ-Donation"

