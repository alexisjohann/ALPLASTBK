# Health Domain Kontextvektor: Klinischer Status & Bevölkerungsgesundheit
# Version: 1.0
# Letzte Aktualisierung: 2026-01-28
# Faktoren: 60

metadata:
  name: "Klinischer Status & Bevölkerungsgesundheit"
  code: "CLI"
  layer: "clinical"
  version: "1.0"
  last_updated: "2026-01-28"
  total_factors: 60
  sub_axes: 6
  description: "Morbidität, Mortalität, Krankheitslast, Gesundheitszustand der Bevölkerung"
