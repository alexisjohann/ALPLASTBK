# =============================================================================
# CLI-MOR – Mortalität & Lebenserwartung (10 Faktoren)
# =============================================================================
CLI_MOR:
  name: "Mortalität & Lebenserwartung"
  description: "Sterblichkeit, Todesursachen, Lebenserwartung"
  factor_count: 10
  factors:
    - id: HLT-CLI-MOR-01
      name: "Lebenserwartung bei Geburt"
      definition: "Mittlere Lebenserwartung bei Geburt (gesamt)"
      values:
        2020: 83.1
        2024: 84.0
        2025: 84.2
        2030: 85.0
      unit: "Jahre"
      trend: "steigend"
      source: "BFS"
      international_comparison: "CH Rang 3 OECD"

    - id: HLT-CLI-MOR-02
      name: "Lebenserwartung Männer"
      definition: "Mittlere Lebenserwartung bei Geburt (männlich)"
      values:
        2020: 81.0
        2024: 81.8
        2025: 82.0
        2030: 82.8
      unit: "Jahre"
      trend: "steigend"
      source: "BFS"

    - id: HLT-CLI-MOR-03
      name: "Lebenserwartung Frauen"
      definition: "Mittlere Lebenserwartung bei Geburt (weiblich)"
      values:
        2020: 85.1
        2024: 86.0
        2025: 86.2
        2030: 87.0
      unit: "Jahre"
      trend: "steigend"
      source: "BFS"

    - id: HLT-CLI-MOR-04
      name: "Gesunde Lebensjahre"
      definition: "Healthy Life Years (HLY) bei Geburt"
      values:
        2020: 68.5
        2024: 69.5
        2025: 70.0
        2030: 72.0
      unit: "Jahre"
      trend: "steigend"
      source: "Eurostat/BFS"

    - id: HLT-CLI-MOR-05
      name: "Sterberate (roh)"
      definition: "Todesfälle pro 1000 Einwohner"
      values:
        2020: 9.4
        2024: 8.5
        2025: 8.4
        2030: 8.8
      unit: "pro 1000"
      trend: "leicht steigend (Alterung)"
      source: "BFS"

    - id: HLT-CLI-MOR-06
      name: "Standardisierte Sterberate"
      definition: "Altersstandardisierte Mortalitätsrate"
      values:
        2020: 480
        2024: 450
        2025: 445
        2030: 420
      unit: "pro 100'000"
      trend: "fallend"
      source: "BFS"

    - id: HLT-CLI-MOR-07
      name: "Vermeidbare Sterblichkeit"
      definition: "Todesfälle die durch Prävention/Behandlung vermeidbar wären"
      values:
        2020: 105
        2024: 98
        2025: 95
        2030: 85
      unit: "pro 100'000"
      trend: "fallend"
      source: "OECD/Eurostat"

    - id: HLT-CLI-MOR-08
      name: "Säuglingssterblichkeit"
      definition: "Todesfälle im 1. Lebensjahr pro 1000 Lebendgeburten"
      values:
        2020: 3.5
        2024: 3.3
        2025: 3.2
        2030: 3.0
      unit: "pro 1000"
      trend: "fallend"
      source: "BFS"

    - id: HLT-CLI-MOR-09
      name: "Todesursache: Herz-Kreislauf"
      definition: "Anteil kardiovaskulärer Todesursachen"
      values:
        2020: 30.7
        2024: 29.5
        2025: 29.0
        2030: 27.0
      unit: "%"
      trend: "fallend"
      source: "BFS Todesursachenstatistik"

    - id: HLT-CLI-MOR-10
      name: "Todesursache: Krebs"
      definition: "Anteil Krebs-Todesursachen"
      values:
        2020: 25.2
        2024: 25.8
        2025: 26.0
        2030: 26.5
      unit: "%"
      trend: "leicht steigend"
      source: "BFS Todesursachenstatistik"

