# =============================================================================
# EBF FRAMEWORK INTEGRATION
# =============================================================================

ebf_integration:
  # 10C CORE Mapping
  core_10c_mapping:
    WHO:
      description: "Digital Natives, Young Professionals, Tech-Savvy Schweizer 18-40"
      relevant_layers: ["MKT", "PEO", "STK"]
      key_factors: ["MKT-ZIE-01", "MKT-ZIE-02", "PEO-TEA-01"]

    WHAT:
      description: "Einfachheit, Transparenz, Kostenfreiheit, Nachhaltigkeit"
      relevant_layers: ["STR", "MKT", "TEC"]
      key_factors: ["STR-VIS-01", "MKT-PRD-01", "TEC-APP-01"]

    HOW:
      description: "100% Mobile App, Self-Service, Instant, Frictionless"
      relevant_layers: ["TEC", "MKT", "ORG"]
      key_factors: ["TEC-APP-01", "MKT-KAN-01", "ORG-STR-01"]

    WHEN:
      description: "Alltaegliche Transaktionen, Reisen, Sparziele (Spaces)"
      relevant_layers: ["MKT", "TEC", "FIN"]
      key_factors: ["MKT-PRD-03", "TEC-APP-05", "FIN-REV-03"]

    WHERE:
      description: "Schweiz (Hauptmarkt), Global (FX), 100% Digital"
      relevant_layers: ["MKT", "TEC", "ORG"]
      key_factors: ["MKT-POS-01", "TEC-INF-01", "ORG-REG-01"]

    AWARE:
      description: "Sehr hoch bei Zielgruppe via Social Media, Word-of-Mouth"
      relevant_layers: ["MKT", "STK", "STR"]
      key_factors: ["MKT-WET-08", "STK-COM-01", "STR-GRW-05"]

    READY:
      description: "Extrem hoch - Onboarding in 10 Minuten via App"
      relevant_layers: ["TEC", "MKT", "ORG"]
      key_factors: ["TEC-APP-03", "MKT-KAN-02", "ORG-COM-03"]

    STAGE:
      description: "Growth/Scale-up Phase (2019-heute)"
      relevant_layers: ["FIN", "STR", "ORG"]
      key_factors: ["FIN-GRW-01", "STR-GRW-01", "ORG-GOV-01"]

  # Psi Dimension Mapping
  psi_dimension_mapping:
    psi_I:
      name: "Institutional Context"
      description: "Keine eigene Banklizenz, Partner-Modell mit Hypi Lenzburg"
      weight: 0.70
      primary_layers: ["ORG", "RIS"]
      unique_aspect: "BaaS-Modell statt Vollbanklizenz"

    psi_S:
      name: "Social Context"
      description: "Digital Native Community, Social Media Praesenz, Referral-Kultur"
      weight: 0.85
      primary_layers: ["MKT", "STK", "PEO"]

    psi_K:
      name: "Cultural Context"
      description: "Startup-Kultur, Schweizer Fintech, Nachhaltigkeitsbewusstsein"
      weight: 0.80
      primary_layers: ["PEO", "STR"]

    psi_E:
      name: "Economic Context"
      description: "Freemium-Modell, VC-funded, Pre-Profit Growth"
      weight: 0.80
      primary_layers: ["FIN", "STR"]

    psi_T:
      name: "Temporal Context"
      description: "Jung (seit 2017/2019), schnelles Wachstum, Startup-Phase"
      weight: 0.85
      primary_layers: ["FIN", "STR"]

    psi_M:
      name: "Material/Technical Context"
      description: "100% Mobile/Digital, Cloud-Native, API-First"
      weight: 0.95
      primary_layers: ["TEC", "MKT"]

    psi_F:
      name: "Physical Context"
      description: "Keine physische Praesenz, vollstaendig virtuell"
      weight: 0.60
      primary_layers: ["MKT", "ORG"]

    psi_C:
      name: "Cognitive Context"
      description: "Simplicity-focused, Intuitive UX, Low Cognitive Load"
      weight: 0.90
      primary_layers: ["TEC", "MKT"]

  # Behavioral Parameters
  behavioral_parameters:
    lambda_NEON:
      name: "Loss Aversion (Neon-spezifisch)"
      value: 1.8
      description: "Tiefere Loss Aversion bei Digital Native Zielgruppe"
      source: "LLMMC + Digital Native research"

    tau_SIMPLICITY:
      name: "Trust Transfer - Einfachheit"
      value: 0.85
      description: "Vertrauen durch transparente, einfache Produkte"
      source: "Neobank literature"

    tau_SWISS:
      name: "Trust Transfer - Schweizer Herkunft"
      value: 0.75
      description: "Vertrauensbonus als Schweizer Fintech"
      source: "Country-of-origin effects"

    beta_DIGITAL:
      name: "Digital Affinity"
      value: 0.95
      description: "Extrem hohe Digitalaffinitaet der Zielgruppe"
      source: "Target segment characteristics"

    alpha_SWITCH:
      name: "Switching Propensity"
      value: 0.65
      description: "Hoehere Wechselbereitschaft bei Neobank-Nutzern"
      source: "Fintech adoption studies"

    iota_FREEMIUM:
      name: "Identity Alignment - Freemium"
      value: 0.70
      description: "Identifikation mit kostenlosem, fairem Banking"
      source: "Freemium business model research"

    sigma_MOBILE:
      name: "Channel Preference - Mobile"
      value: 0.98
      description: "Fast ausschliessliche Mobile-Praeferenz"
      source: "Neon usage data"

    omega_SUSTAINABILITY:
      name: "Sustainability Orientation"
      value: 0.65
      description: "Nachhaltigkeitsbewusstsein (Neon Green)"
      source: "ESG consumer research"

