answer: "Ah, **Real-Time Performance Assessment** - das ist deutlich komplexer und\
  \ praxisrelevanter!\n\n## Live-Bewertung: Die Herausforderung\n\n### Das Grundproblem\n\
  Klassische Metriken versagen bei Live-Bewertung:\n- **Saves/Shots**: Nur reaktiv,\
  \ kein vollständiges Bild\n- **xG prevented**: Braucht Post-Match-Analyse\n- **Passing\
  \ accuracy**: Irrelevant für Kernleistung\n\n### BCM-Ansatz für Live-Assessment\n\
  \n**REAL-TIME Verhaltensindkatoren:**\n\n1. **Positionelle Intelligenz** (kontinuierlich\
  \ messbar)\n   - Optimale Position vs. tatsächliche Position\n   - Anpassungsgeschwindigkeit\
  \ bei Spielverlagerung\n\n2. **Entscheidungsqualität unter Druck**\n   - Timing\
  \ beim Herauslaufen\n   - Ball vs. Mann bei 1vs1\n   - Risiko-Kalibrierung je Spielstand\n\
  \n3. **Führungsverhalten** (Audio/Gestik-Tracking)\n   - Kommunikationsfrequenz\
  \ mit Abwehr\n   - Proaktive vs. reaktive Kommandos\n\n### Praktisches Live-Modell\n\
  \n**3-Stufen-Bewertung während des Spiels:**\n- **Mikro-Level**: Einzelaktion-Bewertung\
  \ (0-10 Punkte)\n- **Meso-Level**: 15-Minuten-Phasen (Trend-Analyse)\n- **Makro-Level**:\
  \ Gesamtspiel-Impact (adjustiert für Spielsituation)\n\n**Die Kernfrage:** Welche\
  \ Stakeholder brauchen diese Live-Bewertung? Trainer für Auswechslungen? Scouts?\
  \ TV-Broadcast?\n\nDas bestimmt, wie granular und automatisiert das System sein\
