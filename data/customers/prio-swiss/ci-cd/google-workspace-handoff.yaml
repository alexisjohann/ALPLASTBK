# =============================================================================
# GOOGLE WORKSPACE HANDOFF: prio.swiss
# =============================================================================
# Zweck: Maschinenlesbare CI/CD-Referenz für externe Design-Tools
# Ablage: data/customers/{kunde}/ci-cd/google-workspace-handoff.yaml
# Nicht zum Drucken - nur für Systeme (NotebookLM, Slides, Docs)
# =============================================================================

client: "prio.swiss"
ci_status: "INCOMPLETE"  # COMPLETE | PARTIAL | INCOMPLETE
last_updated: "2026-02-04"

# -----------------------------------------------------------------------------
# LOGO
# -----------------------------------------------------------------------------
logo:
  available: false
  file: null
  fallback: "Text 'prio.swiss' in Primärfarbe"

# -----------------------------------------------------------------------------
# FARBEN (Hex-Codes für Copy-Paste)
# -----------------------------------------------------------------------------
colors:
  # Primär
  primary: "#0077B6"          # [PLACEHOLDER bis offizielle Farbe]
  primary_light: "#48CAE4"

  # Text
  text_dark: "#1A1A1A"
  text_muted: "#6B7280"
  text_light: "#FFFFFF"

  # Hintergrund
  bg_white: "#FFFFFF"
  bg_light: "#F8FAFC"
  bg_accent: "#E0F2FE"

  # Akzent
  accent: "#00B4D8"

  # Chart-Farben (für Diagramme)
  chart:
    - "#0077B6"
    - "#48CAE4"
    - "#00B4D8"
    - "#90E0EF"
    - "#CAF0F8"

# -----------------------------------------------------------------------------
# SCHRIFTEN (Google Fonts Namen)
# -----------------------------------------------------------------------------
fonts:
  headline: "Inter"
  headline_weight: "600"      # Semibold
  body: "Inter"
  body_weight: "400"          # Regular

  google_fonts_import: "Inter:wght@400;500;600;700"

# -----------------------------------------------------------------------------
# STIL
# -----------------------------------------------------------------------------
style:
  tone: "sachlich, professionell, schweizerisch"
  corners: "4px"              # Border-radius
  shadows: "subtle"

# -----------------------------------------------------------------------------
# ORTHOGRAPHIE (Schweiz)
# -----------------------------------------------------------------------------
orthography:
  eszett: false               # ss statt ß
  gendering: ":"              # Versicherte:innen
  quotes: "«»"                # Guillemets
  thousands: "'"              # 1'000

# -----------------------------------------------------------------------------
# GOOGLE NOTEBOOKLM PROMPT
# -----------------------------------------------------------------------------
# Diesen Prompt in NotebookLM verwenden zusammen mit dem Markdown-Content:

notebooklm_prompt: |
  Gestalte dieses Dokument für prio.swiss (Schweizer Krankenversicherer-Verband):

  FARBEN:
  - Primär: #0077B6 (Blau)
  - Text: #1A1A1A
  - Hintergrund: #FFFFFF, Akzent-Boxen: #E0F2FE

  SCHRIFT:
  - Inter (Google Font)
  - Headlines: Semibold
  - Text: Regular

  STIL:
  - Sachlich, professionell
  - Schweizer Orthographie (ss statt ß)
  - Gendering mit Doppelpunkt (Versicherte:innen)
  - Viel Weissraum
  - Klare Hierarchie

  FORMAT:
  - Titelfolie mit Titel + Datum
  - Executive Summary
  - Inhalt in logischen Abschnitten
  - Key Statistics gross hervorheben
  - Fazit am Ende
