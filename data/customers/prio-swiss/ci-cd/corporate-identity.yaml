# =============================================================================
# ANFRAGE-VORLAGE
# =============================================================================
request_template:
  subject: "Anfrage Brand Guidelines / Corporate Design prio.swiss"

  body_de: |
    Sehr geehrte Damen und Herren

    Im Rahmen unserer Zusammenarbeit mit prio.swiss möchten wir sicherstellen,
    dass alle von uns erstellten Dokumente und Präsentationen den Corporate
    Design Richtlinien entsprechen.

    Könnten Sie uns bitte folgende Materialien zur Verfügung stellen:

    1. Logo-Dateien (SVG, PNG, EPS)
    2. Farbpalette mit Hex/RGB/CMYK-Werten
    3. Schriftarten-Spezifikation
    4. Allfällige Brand Guidelines / CI-Manual
    5. PowerPoint/Word-Vorlagen (falls vorhanden)

    Vielen Dank im Voraus.

    Freundliche Grüsse
    [Name]
    FehrAdvice & Partners AG

