# =============================================================================
# MARKENNAME & PHILOSOPHIE
# =============================================================================
brand:
  name: "prio.swiss"
  tagline: "Der Verband Schweizer Krankenversicherer"

  naming_philosophy: |
    Der Name "prio" steht für die Priorität des Verbandes, sich gemeinsam
    für ein qualitativ hochstehendes und nachhaltig finanzierbares
    Gesundheitswesen für die Schweiz einzusetzen.

  naming_origin: |
    Metaloop arbeitete eng mit Branchenvertretern zusammen, um einen
    neuen Markennamen und eine konsistente visuelle Identität zu entwickeln.

  brand_values:
    - "Qualität im Gesundheitswesen"
    - "Finanzielle Nachhaltigkeit"
    - "Interessenvertretung der Prämienzahler:innen"
    - "Einheit der Branche (nach Fusion)"

  sources:
    - url: "https://www.handelszeitung.ch/insurance/neuer-krankenkassenverband-das-kind-heisst-prioswiss-761308"
      title: "Handelszeitung: Neuer Krankenkassenverband"

