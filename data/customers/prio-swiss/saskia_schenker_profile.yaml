        Saskia wirkt sehr entschlossen und zukunftsorientiert.
        Fokus auf langfristige Positionierung des Verbands.

    - thema: "Tardoc-Einführung"
      details: |
        Anfang 2026 tritt der neue Arzttarif Tardoc in Kraft,
        ergänzt mit Fallpauschalen. Grosses Projekt für prio.swiss.

    - thema: "Medikamentenpreise"
      details: |
        Volumenrabatte für Medikamente wurden März 2025 beschlossen.
        Umsetzung ist Priorität, Standortpolitik der Pharma darf
        nicht auf Kosten der Prämienzahler gehen.

    - thema: "Spitalplanung"
      details: |
        prio.swiss fordert bessere kantonale Spitalplanung
        zur Vermeidung von Überversorgung.

  gespraechsthemen_empfohlen:
