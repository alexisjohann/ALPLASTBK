# =============================================================================
# Ψ-DIMENSIONEN (8 Faktoren)
# =============================================================================
psi_dimensions:

  psi_I_institutional:
    value: 0.95
    label: "Institutionell"
    description: |
      Extrem stark regulierter Sektor (KVG, Obligatorium).
      Prämien müssen vom BAG genehmigt werden.
      Leistungskatalog gesetzlich definiert.
    key_factors:
      - "KVG-Obligatorium seit 1996"
      - "Keine Gewinnorientierung in OKP erlaubt"
      - "BAG-Prämienaufsicht"
      - "Kontrahierungszwang"
    ebf_kappa: "kappa_INST"

  psi_S_social:
    value: 0.80
    label: "Sozial"
    description: |
      Solidaritätsprinzip: Einheitsprämien unabhängig von Gesundheitszustand.
      Starke soziale Normen rund um Gesundheitsversorgung.
      Prämien als emotionales Thema für Bevölkerung.
    key_factors:
      - "Solidaritätsprinzip im KVG"
      - "Prämien als Politikum (Wahlen)"
      - "Risikoausgleich zwischen Kassen"
    ebf_kappa: "kappa_SOCIAL"

  psi_C_cognitive:
    value: 0.70
    label: "Kognitiv"
    description: |
      Hohe Komplexität: Franchise-Modelle, Managed Care, Zusatzversicherungen.
      Jährliche Kassenwechsel-Entscheidung im Herbst.
      Information Overload bei Prämienvergleich.
    key_factors:
      - "Franchise-Optionen (300-2500 CHF)"
      - "Tarifkomplexität (Tardoc 2026)"
      - "Verständnis Grund- vs. Zusatzversicherung"
    ebf_kappa: "kappa_COG"

  psi_K_cultural:
    value: 0.65
    label: "Kulturell"
    description: |
      Schweizer Gesundheitssystem als Kulturgut.
      Hohe Qualitätserwartungen.
      Regionalismus in Versorgung (Kantone).
    key_factors:
      - "Subsidiaritätsprinzip (Kantone)"
      - "Hohe Gesundheitsausgaben als Norm"
      - "Prävention vs. Heilung Diskurs"
    ebf_kappa: "kappa_CULT"

  psi_E_economic:
    value: 0.75
    label: "Ökonomisch"
    description: |
      Prämien als Belastung für Mittelstand.
      Kostenwachstum übersteigt Lohnwachstum.
      Prämienverbilligung für tiefe Einkommen.
    key_factors:
      - "Prämienanstieg 2024: +8.7%, 2025: +6%"
      - "Gesundheitskosten 12% BIP"
      - "Prämienverbilligung (IPV) für 30% der Bevölkerung"
    ebf_kappa: "kappa_ECON"

  psi_T_temporal:
    value: 0.60
    label: "Temporal"
    description: |
      Jährlicher Prämien-Zyklus (Herbst-Ankündigung).
      Langfristige demografische Herausforderungen.
      Tardoc-Einführung 2026 als Meilenstein.
    key_factors:
      - "Jährliche Prämienrunde (September)"
      - "Kassenwechsel-Fenster (November)"
      - "Alterung der Bevölkerung"
    ebf_kappa: "kappa_TEMP"

  psi_M_material:
    value: 0.55
    label: "Materiell"
    description: |
      Digitalisierung im Aufbau.
      Elektronisches Patientendossier (EPD) langsam.
      Apps für Prämienvergleich (Comparis, etc.).
    key_factors:
      - "EPD-Einführung schleppend"
      - "Comparis/Priminfo für Vergleich"
      - "Telemedizin-Modelle wachsend"
    ebf_kappa: "kappa_MAT"

  psi_F_physical:
    value: 0.40
    label: "Physisch"
    description: |
      Kaum physische Interaktion Kasse-Versicherte.
      Kontakt meist bei Leistungsabrechnungen.
      Verbandsarbeit in Bern (politischer Kontext).
    key_factors:
      - "Wenig Filialen/Kundencenter"
      - "Hauptsächlich digitale Interaktion"
      - "Bern als politisches Zentrum"
    ebf_kappa: "kappa_PHYS"

# =============================================================================
# STAKEHOLDER-SEGMENTE (Verband-spezifisch)
# =============================================================================
stakeholder_segments:

  - id: "STK-01"
    name: "Mitglieds-Kassen (CEOs)"
    description: "Die 10 grössten Krankenversicherer als Mitglieder"
    importance: 0.95
    interest_areas:
      - "Politische Interessenvertretung"
      - "Tarifverhandlungen (Tardoc)"
      - "Branchenstandards"
    behavioral_parameters:
      lambda_loss_aversion: 2.0  # Moderate - Fokus auf Langfrist
      kappa_consensus_seeking: 0.85  # Hoch - Verband braucht Einigkeit
      sigma_competitive_tension: 0.60  # Konkurrenz im Markt, Kooperation im Verband

  - id: "STK-02"
    name: "Prämienzahler:innen"
    description: "8.7 Mio Versicherte (fast gesamte Bevölkerung)"
    importance: 0.90
    interest_areas:
      - "Tiefere Prämien"
      - "Gute Versorgung"
      - "Einfache Prozesse"
    behavioral_parameters:
      lambda_loss_aversion: 2.8  # Hoch - Prämien als Verlust
      beta_present_bias: 0.75  # Kurzfristig - Prämie jetzt vs. Gesundheit später
      kappa_default_sensitivity: 0.80  # Hoch - Bleiben bei aktueller Kasse

  - id: "STK-03"
    name: "Politik (Parlament, Kantone)"
    description: "Regulatoren und Gesetzgeber"
    importance: 0.85
    interest_areas:
      - "Kostendämpfung"
      - "Versorgungssicherheit"
      - "Wählerstimmen"
    behavioral_parameters:
      lambda_political_risk: 2.5  # Prämien als Wahlkampfthema
      kappa_compromise_seeking: 0.70

  - id: "STK-04"
    name: "Leistungserbringer"
    description: "Ärzte, Spitäler, Apotheken"
    importance: 0.75
    interest_areas:
      - "Faire Tarife"
      - "Administrative Entlastung"
      - "Behandlungsfreiheit"
    behavioral_parameters:
      sigma_professional_identity: 0.85
      lambda_income_sensitivity: 2.2

# =============================================================================
# AKTUELLE THEMEN (Meeting-relevant)
# =============================================================================
aktuelle_themen:

  - id: "TOPIC-01"
    name: "Tardoc-Einführung 2026"
    priority: "HOCH"
    description: |
      Neuer ambulanter Arzttarif ersetzt TARMED.
      Inkrafttreten Anfang 2026 mit Fallpauschalen.
    behavioral_relevance: |
      Komplexitätsreduktion für Ärzte und Patienten.
      Potenzial für Nudging bei Abrechnungsprozessen.
    status: "In Umsetzung"

  - id: "TOPIC-02"
    name: "Medikamenten-Volumenrabatte"
    priority: "HOCH"
    description: |
      März 2025 beschlossen.
      Schnelle Umsetzung gefordert.
      Konflikt mit Pharma-Standortpolitik.
    behavioral_relevance: |
      Framing: Prämienentlastung vs. Standortnachteile.
      Loss Aversion bei Pharma-Arbeitsplätzen.
    status: "Umsetzung ausstehend"

  - id: "TOPIC-03"
    name: "Prämienentwicklung"
    priority: "MITTEL"
    description: |
      2024: +8.7%, 2025: +6%, 2026: ~+4% (erwartet).
      Trend zur Stabilisierung, aber noch über Lohnwachstum.
    behavioral_relevance: |
      Mental Accounting: Prämie als separater "Verlust".
      Reference Point: Vorjahresprämie.
    status: "Laufend"

  - id: "TOPIC-04"
    name: "Spitalplanung"
    priority: "MITTEL"
    description: |
      Forderung nach besserer kantonaler Koordination.
      Vermeidung von Überversorgung.
    behavioral_relevance: |
      Sunk Cost bei Spitalinvestitionen.
      Status Quo Bias bei Kantonen.
    status: "Politische Diskussion"

  - id: "TOPIC-05"
    name: "Direktorinnen-Wechsel"
    priority: "HOCH"
    description: |
      Saskia Schenker verlässt prio.swiss Ende Februar 2026.
      Nachfolge noch nicht kommuniziert.
    behavioral_relevance: |
      Organisatorische Transition.
      Window of Opportunity für neue Partnerschaften?
    status: "Akut"

# =============================================================================
# AGGREGIERTE VERHALTENSPARAMETER
# =============================================================================
behavioral_parameters_aggregate:

  core_parameters:
    loss_aversion:
      symbol: "λ"
      value: 2.5
      range: [2.0, 3.0]
      source: "Prämien als Verlust, Gesundheitsrisiko"
      note: "Hoch wegen emotionaler Gesundheitsthematik"

    present_bias:
      symbol: "β"
      value: 0.78
      range: [0.70, 0.85]
      source: "Kurzfristiger Prämien-Fokus vs. Prävention"

    default_sensitivity:
      symbol: "κ_default"
      value: 0.82
      range: [0.75, 0.90]
      source: "Hohe Kassen-Loyalität trotz Wechselmöglichkeit"

    consensus_seeking:
      symbol: "κ_consensus"
      value: 0.80
      range: [0.70, 0.90]
      source: "Verbandslogik erfordert Mitglieder-Einigkeit"
      note: "Spezifisch für Verband, nicht Endkunden"

# =============================================================================
# STRATEGISCHE IMPLIKATIONEN
# =============================================================================
strategic_implications:

  top_3_opportunities:
    - dimension: "AWARE"
      opportunity: "Transparenz bei Kostenentwicklung erhöhen"
      intervention_type: "Information Salience, Framing"
      note: "Verständnis für Prämientreiber schaffen"

    - dimension: "WHEN"
      opportunity: "Nudging bei Kassenwechsel-Entscheidung"
      intervention_type: "Defaults, Simplification"
      note: "November-Fenster optimal nutzen"

    - dimension: "WHO"
      opportunity: "Verband als neutrale Stimme positionieren"
      intervention_type: "Trust Building, Credibility"
      note: "Nach Fusion neue Identität etablieren"

  top_3_risks:
    - risk: "Interessenkonflikte zwischen Mitgliedern"
      mitigation: "Konsens-Mechanismen, Win-Win Framing"

    - risk: "Politische Instrumentalisierung der Prämien"
      mitigation: "Proaktive Kommunikation, Fakten-First"

    - risk: "Führungsvakuum nach Schenker-Abgang"
      mitigation: "Schnelle Nachfolge-Kommunikation"

  recommended_next_step: |
    Meeting nutzen um:
    1. Relationship-Building vor Direktorinnen-Wechsel
    2. Verständnis für aktuelle Prioritäten
    3. Potenzial für Verhaltensökonomie-Projekte sondieren
       (z.B. Kassenwechsel-Verhalten, Prävention, Compliance)

# =============================================================================
# MEETING-VORBEREITUNG
# =============================================================================
meeting_preparation:

  gespraechsthemen_empfohlen:
    - topic: "Erfahrungen bei der Fusion Curafutura/Santésuisse"
      why: "Organisationspsychologie, Change Management"
      ebf_angle: "Wie wurden unterschiedliche Verbandskulturen integriert?"

    - topic: "Verhaltensökonomie im Gesundheitswesen"
      why: "Core Competency FehrAdvice"
      ebf_angle: "Nudging bei Prävention, Kassenwechsel, Compliance"

    - topic: "Prämienentwicklung und öffentliche Wahrnehmung"
      why: "Aktuelles Kernthema"
      ebf_angle: "Framing, Loss Aversion, Reference Points"

    - topic: "Ihre nächsten Pläne"
      why: "Sie verlässt Ende Februar"
      ebf_angle: "Potenzielle Weiterführung der Beziehung"

  fragen_zum_vorbereiten:
    - "Was sind die grössten Verhaltensbarrieren für effiziente Gesundheitsversorgung?"
    - "Wo sehen Sie Potenzial für evidenzbasierte Interventionen?"
    - "Wie gehen Sie mit dem Spannungsfeld Wettbewerb vs. Kooperation um?"

