# =============================================================================
# ORGANISATION (~20 Faktoren)
# =============================================================================
organisation:
  name_de: "Schweizerische Südostbahn AG"
  name_short: "SOB"

  # Grösse
  employees: 1062  # Stand 2024, Quelle: DOC-004
  employees_growth: "verdoppelt in 10 Jahren"
  revenue_chf_mio: ~150  # Schätzung basierend auf Branche
  fluctuation_rate: 0.16  # 16%, erhöht (DOC-004)

  # Leistungskennzahlen
  passengers_per_year_mio: 12.9
  vehicle_km_per_year_mio: 5.9
  network_km: 128.9
  bridges: 177
  tunnels: 19
  tunnel_km: 8.5

  # Highlight
  notable_infrastructure: "Sitterviadukt (99m hoch, 365m lang) - höchste Eisenbahnbrücke der Schweiz"

  # Klassifikation
  industry: "Öffentlicher Verkehr"
  sub_industry: "Regionaler Personenverkehr / Fernverkehr / Infrastruktur / Immobilien"
  legal_form: "Aktiengesellschaft (AG)"

  # Eigentümerstruktur (DOC-003)
  ownership:
    type: "öffentlich-privat"
    structure:
      - entity: "Bund (BAV)"
        share: 0.358
        role: "Besteller Fernverkehr + Infrastruktur-Finanzierung"
      - entity: "Kanton St. Gallen"
        share: 0.192
        role: "Besteller Regionalverkehr + Eigner"
      - entity: "Kanton Schwyz"
        share: 0.058
        role: "Besteller Regionalverkehr + Eigner"
      - entity: "Weitere Kantone/Gemeinden/Privat"
        share: 0.392
        role: "Diverse"
    governance_implication: |
      Multi-Prinzipal-Problem: 3 Haupteigner mit unterschiedlichen Interessen.
      Bund = systemorientiert, Kantone = regionalpolitisch.
      Doppelrolle: Eigner sind gleichzeitig Besteller (DOC-003).
    eignerstrategie:
      date: "2022-02"
      review_cycle: "alle 4 Jahre"
      key_directives:
        business:  # 7/8 in aktueller Strategie adressiert
          - "Wirtschaftlich betreiben"
          - "Hohe Qualitätsstandards"
          - "Fernverkehr ausbauen"
          - "Keine nicht tragbaren Ergebnisrisiken"
          - "Ökologische Nachhaltigkeit"
          - "Kooperationen ausbauen (SBB+X)"
          - "Digitalisierung vorantreiben"
          - "Eigenständiges Unternehmen bleiben"
        organizational:  # Nur 1/4 in aktueller Strategie adressiert
          - "Attraktive Arbeitgeberin"  # ← einzige adressierte
          - "Chancengleichheit"
          - "Angemessene Entlöhnung"
          - "Diversity"

  # Geschichte
  founded: 2001  # Fusion SOB + Bodensee-Toggenburg-Bahn
  predecessor_companies:
    - "Schweizerische Südostbahn (ursprünglich)"
    - "Bodensee-Toggenburg-Bahn (BT)"
  ceo:
    name: "Thomas Küchler"
    since: "2025-05"  # Amtsantritt Mai 2025
    previous_ceo: "unbekannt"

  # Geografie
  headquarters: "St. Gallen"
  geographic_scope: "regional (Ostschweiz, Zentralschweiz)"
  main_routes:
    - "St. Gallen - Luzern (Voralpen-Express)"
    - "St. Gallen - Chur (Alpenrhein-Express, seit Dez 2024)"
    - "Wädenswil - Einsiedeln"
    - "Rapperswil - Arth-Goldau"

  # Zertifizierungen
  certifications:
    - "ISO 9001 (seit 2005)"
    - "ECM (seit 2005)"

  # 5 Geschäftsbereiche (DOC-007, DOC-008, DOC-009)
  geschaeftsbereiche:
    - id: "GB-V"
      name: "Verkehr"
      function: "Regional- und Fernverkehr (EVU-Rolle)"
      strengths:  # DOC-009 SWOT
        - "Kundenorientierung und Marktposition"
        - "Innovationskraft (AFAS, FSS)"
        - "Betriebliche Flexibilität"
      weaknesses:
        - "Übergreifende Zusammenarbeit (Silos)"
        - "Fachkräftemangel Lokführer"
    - id: "GB-I"
      name: "Infrastruktur"
      function: "Infrastrukturbetreiberin (ISB-Rolle)"
      strengths:
        - "Technische Expertise"
        - "Sicherheitskultur"
      weaknesses:
        - "Ressourcenknappheit"
        - "Übergreifende Zusammenarbeit"
    - id: "GB-RO"
      name: "Rollmaterial"
      function: "Fahrzeugflotte und Instandhaltung"
      strengths:
        - "Fachkompetenz"
        - "FLIRT-Flotte modern"
      weaknesses:
        - "Fachkräftemangel"
        - "Übergreifende Zusammenarbeit"
    - id: "GB-IMM"
      name: "Immobilien"
      function: "Immobilienbesitzerin (Bahnhöfe, Liegenschaften)"
      strengths:
        - "Wachstumspotenzial"
        - "Standort-Attraktivität"
      weaknesses:
        - "Strategische Positionierung unklar"
    - id: "GB-PO"
      name: "P&O (Personal & Organisation)"
      function: "HR, Organisationsentwicklung"
      status: "KRITISCH -- keine strategische Rolle"  # DOC-008 Befund
      strengths:
        - "Engagierte Mitarbeitende"
      weaknesses:
        - "Kein Platz in 4-Rollen-Strategie (DOC-008)"
        - "FK-Entwicklung nicht mit Behavioral Change verknüpft"
        - "Keine systematische OE"

  # Unternehmenswerte (DOC-011)
  corporate_values:
    values:
      - name: "Fairness"
        since: 2012
        operationalized: false
      - name: "Verlässlichkeit"
        since: 2012
        operationalized: false
      - name: "Wertschätzung"
        since: 2012
        operationalized: false
      - name: "Transparenz"
        since: 2012
        operationalized: false
      - name: "Lernbereitschaft"
        since: 2012
        operationalized: false
    assessment:
      awareness_score: 78  # DOC-004: Werte sind bekannt
      lived_score: 69  # DOC-004: Werte werden gelebt
      say_do_gap: 9  # Punkte Differenz
      years_unchanged: 14  # Seit 2012 unverändert
      missing_values:  # DOC-011 Analyse
        - "Innovation"
        - "Mut"
        - "Zusammenarbeit"
        - "Verantwortung"
    ebf_assessment: |
      Die 5 Werte sind verhaltensökonomisch solide (Fairness → Inequity Aversion,
      Verlässlichkeit → Commitment), aber «eingefroren»: 14 Jahre ohne
      Operationalisierung, Messung oder Konsequenzen. Empfehlung: AKTIVIEREN,
      nicht ersetzen. Pro Wert 3-5 konkrete Verhaltensbeispiele definieren.

  # Strategie-Architektur (DOC-002, DOC-008)
  strategy:
    current_strategy:
      name: "Strategie und Vision SOB"
      valid_since: "2023-01-01"
      four_roles:
        - "Infrastrukturbetreiberin (ISB)"
        - "Eisenbahnverkehrsunternehmen (EVU)"
        - "Mobilitätsdienstleisterin"
        - "Immobilienbesitzerin"
      missing_role: "Arbeitgeberin / Lernende Organisation (5. Rolle)"  # DOC-008 Befund
    new_strategy:
      name: "Strategie SOB 2026ff."
      date: "2025-11"
      structure:
        vision: 1
        leitsaetze: 7
        ziele: 0  # ← LÜCKE
        massnahmen: 0  # ← LÜCKE
        kpis: 0  # ← LÜCKE (separat in DOC-005, nicht verknüpft)
      assessment: |
        Strategiepyramide unvollständig: «WAS» definiert, aber «WIE» fehlt.
        7 Leitsätze operieren auf Werte-Level, nicht auf Ziel-Level.
        Kein einziger messbarer Zielwert. Keine Massnahmenableitung.
    vision_concepts:
      - name: "Meine Lieblingsbahn"
        source: "DOC-010 (GL-Workshop)"
        status: "Nicht in Strategie 2026 übernommen"
        ebf_assessment: |
          Verhaltensökonomisch stark: «Meine» aktiviert Endowment Effect,
          «Lieblings-» aktiviert emotionale Bindung, «Bahn» = klare Identität.
          Risiko: Impliziert Vergleich (mit SBB?), kann banal klingen ohne Substanz.
    schwerpunktthemen:
      total: 24  # DOC-007
      gb_isolated: 22  # 22 von 24 sind GB-spezifisch
      cross_functional: 2  # Nur 2 von 24 sind GB-übergreifend
      assessment: "Kein Schwerpunkt bei 24 Themen. Empfehlung: Reduktion auf 5-7."
    concession_renewal: 2029  # Harte Deadline (DOC-009)

