# =============================================================================

metadata:
  name: "Südostbahn Schnellkontext"
  code: "BCM2_MIKRO_SOB"
  layer: "mikro"
  version: "1.0"
  last_updated: "2026-01-28"
  cva_stufe: "SCHNELL"
  total_factors: 32
  description: |
    Schneller Kontextvektor für die Schweizerische Südostbahn AG (SOB).
    Regionalbahn in der Ostschweiz mit Fokus auf Personen- und Fernverkehr.

    Zweck: Quick Assessment für Verhaltensinterventionen im ÖV-Bereich.

  hierarchy:
    parent: "BCM2_MESO_OEV_CH"
    grandparent: "BCM2_04_KON (MAKRO Schweiz)"

  data_sources:
    - name: "SOB Website"
      url: "https://www.sob.ch/die-sob/ueber-uns/zahlen-und-fakten"
      accessed: "2026-01-28"
    - name: "Leader Digital"
      url: "https://www.leaderdigital.ch/news/sob-mit-mitarbeiterrekord-10556.html"
      accessed: "2026-01-28"

  ebf_mapping:
    primary_10c:
      - "WHO"      # Pendler, Freizeitreisende, Touristen
      - "WHAT"     # Pünktlichkeit, Komfort, Preis
      - "WHEN"     # Fahrplan, Stosszeiten, Saisonalität
    primary_psi:
      - "kappa_INST"     # ÖV-Regulierung, Konzessionen
      - "kappa_SOCIAL"   # Regionale Identität Ostschweiz
      - "kappa_IDENTITY" # Schweizer ÖV-Kultur

# =============================================================================
# ORGANISATION (~8 Faktoren)
# =============================================================================
organisation:
  name_de: "Schweizerische Südostbahn AG"
  name_short: "SOB"

  # Grösse
  employees: 1004  # Stand Februar 2024
  employees_growth: "verdoppelt in 10 Jahren"
  revenue_chf_mio: ~150  # Schätzung basierend auf Branche

  # Leistungskennzahlen
  passengers_per_year_mio: 12.9
  vehicle_km_per_year_mio: 5.9
  network_km: 128.9
  bridges: 177
  tunnels: 19
  tunnel_km: 8.5

  # Highlight
  notable_infrastructure: "Sitterviadukt (99m hoch, 365m lang) - höchste Eisenbahnbrücke der Schweiz"

  # Klassifikation
  industry: "Öffentlicher Verkehr"
  sub_industry: "Regionaler Personenverkehr / Fernverkehr"
  ownership: "öffentlich-privat (Kantone + Bund)"
  legal_form: "Aktiengesellschaft (AG)"

  # Geschichte
  founded: 2001  # Fusion SOB + Bodensee-Toggenburg-Bahn
  predecessor_companies:
    - "Schweizerische Südostbahn (ursprünglich)"
    - "Bodensee-Toggenburg-Bahn (BT)"

  # Geografie
  headquarters: "St. Gallen"
  geographic_scope: "regional (Ostschweiz, Zentralschweiz)"
  main_routes:
    - "St. Gallen - Luzern (Voralpen-Express)"
    - "St. Gallen - Chur (Alpenrhein-Express, seit Dez 2024)"
    - "Wädenswil - Einsiedeln"
    - "Rapperswil - Arth-Goldau"

  # Zertifizierungen
  certifications:
    - "ISO 9001 (seit 2005)"
    - "ECM (seit 2005)"

  # Unternehmenswerte
  corporate_values:
    - "Fairness"
    - "Verlässlichkeit"
    - "Wertschätzung"
    - "Transparenz"
    - "Lernbereitschaft"

  # Strategie
  strategy_pillars:
    - "Wachstum durch neue Linien (Alpenrhein-Express)"
    - "Mitarbeiterentwicklung (150+ Berufsfelder)"
    - "Qualität und Pünktlichkeit"

# =============================================================================
# PSI-DIMENSIONEN (8 Faktoren)
# =============================================================================

psi_dimensions:

  psi_I_institutional:
    value: 0.85
    label: "Institutionell"
    description: |
      Stark regulierter ÖV-Markt in der Schweiz.
      Konzessionssystem, BAV-Aufsicht, Leistungsvereinbarungen mit Kantonen.
    key_factors:
      - "Bundeskonzession für Personenverkehr"
      - "Leistungsvereinbarungen mit Kantonen SG, SZ, ZH"
      - "BAV-Regulierung und -Aufsicht"
      - "Subventionierter Regionalverkehr"
    ebf_kappa: "kappa_INST"
    behavioral_implication: "Hohe Default-Compliance; Regulatorische Nudges sehr effektiv"

  psi_S_social:
    value: 0.75
    label: "Sozial"
    description: |
      Starke regionale Identität in der Ostschweiz.
      SOB als "unsere Bahn" - emotionale Bindung.
    key_factors:
      - "Regionale Identität Ostschweiz"
      - "Mitarbeiter oft auch Kunden und Anwohner"
      - "Pendlergemeinschaften (tägliche Kontakte)"
      - "Tourismus-Verbundenheit (Voralpen-Express)"
    ebf_kappa: "kappa_SOCIAL"
    behavioral_implication: "Social Proof durch lokale Testimonials; Community-basierte Interventionen"

  psi_C_cognitive:
    value: 0.45
    label: "Kognitiv"
    description: |
      Mittlere kognitive Komplexität - Fahrplan ist Standard,
      aber GA/Halbtax-Entscheidungen komplex.
    key_factors:
      - "Fahrplan-Apps reduzieren kognitive Last"
      - "Tarifsystem (GA, Halbtax, Verbünde) komplex"
      - "Umsteigeverbindungen erfordern Planung"
    ebf_kappa: "kappa_COG"
    behavioral_implication: "Vereinfachung durch Defaults; Salient Pricing"

  psi_K_cultural:
    value: 0.70
    label: "Kulturell"
    description: |
      Schweizer ÖV-Kultur: Pünktlichkeit, Sauberkeit, Service.
      Ostschweiz tendenziell konservativ.
    key_factors:
      - "Schweizer Pünktlichkeitserwartung (99%+)"
      - "Ostschweizer Pragmatismus"
      - "Nachhaltigkeitsbewusstsein steigend"
      - "Qualitätsbewusstsein hoch"
    ebf_kappa: "kappa_CULT"
    behavioral_implication: "Qualitäts-Framing; Pünktlichkeits-Commitment"

  psi_E_economic:
    value: 0.65
    label: "Ökonomisch"
    description: |
      Ostschweiz mit solidem Wohlstand, aber nicht Zürich-Niveau.
      Preissensitivität bei Gelegenheitsfahrern.
    key_factors:
      - "Median-Einkommen Region: ~CHF 75k"
      - "GA-Penetration hoch bei Pendlern"
      - "Preissensitivität bei Freizeit/Tourismus"
      - "Konkurrenz durch MIV (Auto)"
    ebf_kappa: "kappa_ECON"
    behavioral_implication: "Loss-Framing bei Nicht-Nutzung; Bundling-Angebote"

  psi_T_temporal:
    value: 0.60
    label: "Temporal"
    description: |
      Gemischte Zeithorizonte: Tägliches Pendeln (kurz) vs. GA-Entscheidung (jährlich).
    key_factors:
      - "Tägliche Pendler: Routine, wenig Reflexion"
      - "GA-Entscheidung: Jahresplanung"
      - "Saisonalität: Tourismus-Peaks"
      - "Fahrplanwechsel: Dezember (jährlich)"
    ebf_kappa: "kappa_TEMP"
    behavioral_implication: "Timing-Interventionen bei Fahrplanwechsel; Pre-Commitment für GA"

  psi_M_material:
    value: 0.70
    label: "Materiell"
    description: |
      Moderne Flotte, gute digitale Infrastruktur.
      SBB Mobile App als Standard.
    key_factors:
      - "Moderne Flotten (FLIRT-Züge)"
      - "WLAN in Zügen"
      - "SBB Mobile / SOB App"
      - "Kontaktloses Zahlen"
    ebf_kappa: "kappa_MAT"
    behavioral_implication: "Digital Nudges möglich; App als Interventionskanal"

  psi_F_physical:
    value: 0.55
    label: "Physisch"
    description: |
      Mix aus Bahnhof (physisch) und App (digital).
      Landschaftserlebnis als USP (Voralpen).
    key_factors:
      - "32 Bahnhöfe im Netz"
      - "Panorama-Erlebnis (Sitterviadukt, Voralpen)"
      - "Schalter vs. Automat vs. App"
      - "Zug als "dritter Ort" (Arbeiten unterwegs)"
    ebf_kappa: "kappa_PHYS"
    behavioral_implication: "Point-of-Decision Nudges an Bahnhöfen; Erlebnis-Framing"

# =============================================================================
# KUNDENSEGMENTE (~4 Segmente)
# =============================================================================

customer_segments:

  - id: "SEG-01"
    name: "Berufspendler"
    description: "Tägliche Pendler St. Gallen - Zürich / Luzern"
    share: 0.45

    behavioral_parameters:
      lambda_loss_aversion: 2.10  # Verspätungen = Verlust
      beta_present_bias: 0.85    # Routine reduziert Bias
      kappa_default_sensitivity: 0.80  # GA = Default
      sigma_social_proof: 0.55   # Pendlergemeinschaft

    intervention_affinity:
      high: ["Defaults (GA-Automatik)", "App-Nudges", "Pünktlichkeits-Feedback"]
      medium: ["Social Proof", "Gamification"]
      low: ["Preis-Aktionen", "Erlebnis-Marketing"]

  - id: "SEG-02"
    name: "Freizeitreisende"
    description: "Wochenend-Ausflügler, Familien"
    share: 0.30

    behavioral_parameters:
      lambda_loss_aversion: 1.80
      beta_present_bias: 0.75    # Spontaner
      kappa_default_sensitivity: 0.60
      sigma_social_proof: 0.70   # "Wo gehen andere hin?"

    intervention_affinity:
      high: ["Erlebnis-Framing", "Social Proof", "Bundling (Bahn + Eintritt)"]
      medium: ["Spar-Angebote", "Familien-Defaults"]
      low: ["B2B-Kommunikation"]

  - id: "SEG-03"
    name: "Touristen"
    description: "Internationale/nationale Touristen (Voralpen-Express)"
    share: 0.15

    behavioral_parameters:
      lambda_loss_aversion: 1.60  # Weniger investiert
      beta_present_bias: 0.70    # Urlaub = Gegenwartsfokus
      kappa_default_sensitivity: 0.50  # Weniger Default-gebunden
      sigma_social_proof: 0.80   # "Swiss Experience"

    intervention_affinity:
      high: ["Erlebnis-Marketing", "Panorama-Framing", "Swiss Quality"]
      medium: ["Multi-Language Nudges", "Booking-Defaults"]
      low: ["Lokale Community-Ansätze"]

  - id: "SEG-04"
    name: "Gelegenheitsfahrer"
    description: "Selten-Nutzer, Auto-Besitzer"
    share: 0.10

    behavioral_parameters:
      lambda_loss_aversion: 2.40  # Höher (Unsicherheit)
      beta_present_bias: 0.65    # Auto = "einfacher"
      kappa_default_sensitivity: 0.40  # Kein GA
      sigma_social_proof: 0.45   # Wenig ÖV-Identität

    intervention_affinity:
      high: ["Verlust-Framing (Parkkosten, Stau)", "Einstiegs-Defaults", "Erst-Fahrt-Rabatte"]
      medium: ["Umwelt-Framing", "Vergleichsrechner"]
      low: ["GA-Werbung", "Pendler-Kommunikation"]

# =============================================================================
# AGGREGIERTE VERHALTENSPARAMETER
# =============================================================================

behavioral_parameters_aggregate:

  core_parameters:
    loss_aversion:
      symbol: "lambda"
      value: 2.05
      range: [1.60, 2.40]
      source: "Segment-gewichteter Durchschnitt"
      note: "Verspätungen und verpasste Züge = hohe Verlust-Sensitivität"

    present_bias:
      symbol: "beta"
      value: 0.78
      range: [0.65, 0.85]
      source: "Segment-gewichteter Durchschnitt"
      note: "Pendler-Routine stabilisiert; Gelegenheitsfahrer impulsiver"

    default_sensitivity:
      symbol: "kappa_default"
      value: 0.68
      range: [0.40, 0.80]
      source: "Segment-gewichteter Durchschnitt"
      note: "GA/Halbtax als starke Defaults bei Vielfahrern"

    social_proof:
      symbol: "sigma_social"
      value: 0.60
      range: [0.45, 0.80]
      source: "Segment-gewichteter Durchschnitt"
      note: "Regionale Identität verstärkt Social Proof"

# =============================================================================
# STRATEGISCHE IMPLIKATIONEN
# =============================================================================

strategic_implications:

  top_3_opportunities:
    - dimension: "WHEN"
      opportunity: "Fahrplanwechsel Dezember als Interventions-Fenster"
      intervention_type: "Timing + Pre-Commitment (GA-Erneuerung)"
      expected_effect: "+15% GA-Retention"

    - dimension: "AWARE"
      opportunity: "Pünktlichkeits-Feedback in Echtzeit"
      intervention_type: "Salience + Positive Reinforcement"
      expected_effect: "+10% Zufriedenheit"

    - dimension: "WHAT"
      opportunity: "Erlebnis-Framing für Voralpen-Express"
      intervention_type: "Utility-Reframing (Transport → Experience)"
      expected_effect: "+20% Tourismus-Umsatz"

  top_3_risks:
    - risk: "Konkurrenz durch MIV (Auto) bei Gelegenheitsfahrern"
      mitigation: "Verlust-Framing (Parkkosten, Stau, CO2)"

    - risk: "Verspätungen untergraben Pünktlichkeits-Erwartung"
      mitigation: "Proaktive Kommunikation; Kompensations-Defaults"

    - risk: "Komplexes Tarifsystem schreckt Neukunden ab"
      mitigation: "Einstiegs-Defaults; Vereinfachte Optionen"

  recommended_next_step: |
    Upgrade auf STANDARD für vollständiges Interventions-Design.
    Empfohlen: Interview mit SOB Marketing/Kundenservice (2-3h)
    für segment-spezifische Verhaltensparameter.

# =============================================================================
# UPGRADE-PFAD
# =============================================================================

upgrade_path:
  current_level: "SCHNELL"
  next_level: "STANDARD"
  requirements_for_upgrade:
    - "Zugang zu SOB Geschäftsberichten (3 Jahre)"
    - "Interview mit Management (2-3 Stunden)"
    - "Kundensegmentierungs-Daten (anonymisiert)"
    - "Pünktlichkeits- und Zufriedenheitsstatistiken"
  estimated_effort: "1-2 Tage"
  recommended_trigger: "Projektbudget > CHF 30k oder strategische Initiative"

# =============================================================================
# METADATEN
# =============================================================================

_validation:
  min_factors: 25
  actual_factors: 32
  min_completion: 0.80
  actual_completion: 0.95
  min_ebf_mapping: 0.50
  actual_ebf_mapping: 0.85

