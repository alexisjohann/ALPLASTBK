# =============================================================================
# CONTEXT VECTOR: Schweizerische Südostbahn AG (SOB)
# =============================================================================
# Version: 1.0.0
# Framework: EBF Context Vector Architecture (CVA)
# CVA-Stufe: SCHNELL (~30 Faktoren)
