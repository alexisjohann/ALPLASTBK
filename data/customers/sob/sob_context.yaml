# =============================================================================

psi_dimensions:

  # --- EXTERN (Kunden/Markt) ---

  psi_I_institutional:
    value: 0.85
    label: "Institutionell"
    description: |
      Stark regulierter ÖV-Markt in der Schweiz.
      Konzessionssystem, BAV-Aufsicht, Leistungsvereinbarungen mit Kantonen.
      KRITISCH: Konzessionserneuerung 2029 als harte Deadline.
    key_factors:
      - "Bundeskonzession für Personenverkehr"
      - "Leistungsvereinbarungen mit Kantonen SG, SZ, ZH"
      - "BAV-Regulierung und -Aufsicht"
      - "Subventionierter Regionalverkehr"
      - "Konzessionserneuerung 2029 (DOC-009)"
    ebf_kappa: "kappa_INST"
    behavioral_implication: "Hohe Default-Compliance; Regulatorische Nudges sehr effektiv; Zeitdruck durch 2029"

  psi_S_social:
    value: 0.75
    label: "Sozial"
    description: |
      Starke regionale Identität in der Ostschweiz.
      SOB als «unsere Bahn» - emotionale Bindung.
      «Meine Lieblingsbahn» als potenzielles Identitätskonzept (DOC-010).
    key_factors:
      - "Regionale Identität Ostschweiz"
      - "Mitarbeiter oft auch Kunden und Anwohner"
      - "Pendlergemeinschaften (tägliche Kontakte)"
      - "Tourismus-Verbundenheit (Voralpen-Express)"
      - "Vision «Meine Lieblingsbahn» im Raum (DOC-010)"
    ebf_kappa: "kappa_SOCIAL"
    behavioral_implication: "Social Proof durch lokale Testimonials; Community-basierte Interventionen; Endowment-Effekt bei «Meine»"

  psi_C_cognitive:
    value: 0.45
    label: "Kognitiv"
    description: |
      Mittlere kognitive Komplexität - Fahrplan ist Standard,
      aber GA/Halbtax-Entscheidungen komplex.
    key_factors:
      - "Fahrplan-Apps reduzieren kognitive Last"
      - "Tarifsystem (GA, Halbtax, Verbünde) komplex"
      - "Umsteigeverbindungen erfordern Planung"
    ebf_kappa: "kappa_COG"
    behavioral_implication: "Vereinfachung durch Defaults; Salient Pricing"

  psi_K_cultural:
    value: 0.70
    label: "Kulturell"
    description: |
      Schweizer ÖV-Kultur: Pünktlichkeit, Sauberkeit, Service.
      Ostschweiz tendenziell konservativ.
    key_factors:
      - "Schweizer Pünktlichkeitserwartung (99%+)"
      - "Ostschweizer Pragmatismus"
      - "Nachhaltigkeitsbewusstsein steigend"
      - "Qualitätsbewusstsein hoch"
    ebf_kappa: "kappa_CULT"
    behavioral_implication: "Qualitäts-Framing; Pünktlichkeits-Commitment"

  psi_E_economic:
    value: 0.65
    label: "Ökonomisch"
    description: |
      Ostschweiz mit solidem Wohlstand, aber nicht Zürich-Niveau.
      Preissensitivität bei Gelegenheitsfahrern.
      Subventionsrahmen wird enger (DOC-009).
    key_factors:
      - "Median-Einkommen Region: ~CHF 75k"
      - "GA-Penetration hoch bei Pendlern"
      - "Preissensitivität bei Freizeit/Tourismus"
      - "Konkurrenz durch MIV (Auto)"
      - "Wirtschaftlicher Druck durch Bund/Kantone steigend (DOC-003, DOC-009)"
    ebf_kappa: "kappa_ECON"
    behavioral_implication: "Loss-Framing bei Nicht-Nutzung; Bundling-Angebote; Effizienz-Nudges intern"

  psi_T_temporal:
    value: 0.60
    label: "Temporal"
    description: |
      Gemischte Zeithorizonte: Tägliches Pendeln (kurz) vs. GA-Entscheidung (jährlich).
      CEO-Wechsel 2025 öffnet Transformationsfenster.
    key_factors:
      - "Tägliche Pendler: Routine, wenig Reflexion"
      - "GA-Entscheidung: Jahresplanung"
      - "Saisonalität: Tourismus-Peaks"
      - "Fahrplanwechsel: Dezember (jährlich)"
      - "CEO-Wechsel Mai 2025: Momentum-Fenster (DOC-001)"
      - "Konzessionserneuerung 2029: Countdown (DOC-009)"
    ebf_kappa: "kappa_TEMP"
    behavioral_implication: "Timing-Interventionen bei Fahrplanwechsel; CEO-Momentum nutzen; 2029 als Urgency-Frame"

  psi_M_material:
    value: 0.70
    label: "Materiell"
    description: |
      Moderne Flotte, gute digitale Infrastruktur.
      SBB Mobile App als Standard.
    key_factors:
      - "Moderne Flotten (FLIRT-Züge)"
      - "WLAN in Zügen"
      - "SBB Mobile / SOB App"
      - "Kontaktloses Zahlen"
    ebf_kappa: "kappa_MAT"
    behavioral_implication: "Digital Nudges möglich; App als Interventionskanal"

  psi_F_physical:
    value: 0.55
    label: "Physisch"
    description: |
      Mix aus Bahnhof (physisch) und App (digital).
      Landschaftserlebnis als USP (Voralpen).
    key_factors:
      - "32 Bahnhöfe im Netz"
      - "Panorama-Erlebnis (Sitterviadukt, Voralpen)"
      - "Schalter vs. Automat vs. App"
      - "Zug als «dritter Ort» (Arbeiten unterwegs)"
    ebf_kappa: "kappa_PHYS"
    behavioral_implication: "Point-of-Decision Nudges an Bahnhöfen; Erlebnis-Framing"

  # --- INTERN (Organisation) --- NEU in v2.0

  psi_ORG_silo:
    value: 0.30
    label: "Organisationale Silos"
    description: |
      Stärkste organisationale Kontextdimension der SOB.
      5 GBs arbeiten weitgehend isoliert voneinander.
      Abt.-übergreifende Prozesse = tiefster Score (56) in MA-Umfrage.
    key_factors:
      - "5 autonome GBs mit eigenen Anreizsystemen"
      - "22/24 Schwerpunktthemen sind GB-spezifisch (DOC-007)"
      - "Abt.-übergreifende Prozesse: 56 (DOC-004)"
      - "«Kohärenz statt Einzeloptimierung» als K8-Forderung (DOC-009)"
    ebf_kappa: "kappa_ORG_SILO"
    behavioral_implication: |
      Silo-Identität dominiert: In-Group (eigener GB) vs. Out-Group (andere GBs).
      Interventionen müssen übergeordnete SOB-Identität aktivieren.
      Social Identity Theory: Superordinate Identity stärken.

  psi_ORG_leadership:
    value: 0.55
    label: "Führungskultur"
    description: |
      Vorgesetzte gut bewertet (81), aber Führungsprozesse formalistisch (67).
      Entscheidungswege zu langsam (59).
    key_factors:
      - "Vorgesetzten-Score: 81 (DOC-004)"
      - "Führungsprozesse: 67 -- formalistisch (DOC-004)"
      - "Entscheidungsgeschwindigkeit: 59 (DOC-004)"
      - "FK-Entwicklung nicht mit Behavioral Change verknüpft (DOC-009)"
    ebf_kappa: "kappa_ORG_LEAD"
    behavioral_implication: |
      Gute individuelle FK, aber System behindert.
      Interventionen an Prozessen, nicht an Personen ansetzen.
      Choice Architecture für schnellere Entscheidungen.

  psi_ORG_change:
    value: 0.45
    label: "Veränderungsfähigkeit"
    description: |
      SOB fordert explizit «Behavioral Change-Fähigkeit systematisch entwickeln» (DOC-009).
      Engagement hoch (77), aber kein Framework für Wandel vorhanden.
    key_factors:
      - "Engagement 77, über Benchmark (DOC-004)"
      - "Lernbereitschaft als Wert (DOC-011)"
      - "Kein Behavioral Change Framework (DOC-009)"
      - "Intuitionsbasiert statt evidenzbasiert (DOC-010)"
      - "24 Themen = Überforderung, kein Fokus (DOC-007)"
    ebf_kappa: "kappa_ORG_CHANGE"
    behavioral_implication: |
      Bereitschaft ist da, Fähigkeit fehlt. Klassischer READY-EIT Gap.
      FehrAdvice-Kernauftrag: Systematische Veränderungskompetenz aufbauen.
      Nicht mehr tun, sondern anders tun (DOC-009, K1).

  psi_ORG_identity:
    value: 0.65
    label: "Organisationale Identität"
    description: |
      Starke lokale Identität, MA sind stolz auf SOB.
      Aber: GB-Identität > SOB-Gesamtidentität.
      «Meine Lieblingsbahn» als potenzieller Identitätsanker.
    key_factors:
      - "Identifikation mit SOB: 75 (DOC-004)"
      - "Sprachleitfaden definiert SOB-Tonalität (DOC-006)"
      - "4-Rollen-Modell gibt Markt-Identität (DOC-008)"
      - "«Meine Lieblingsbahn» potenziell identitätsstiftend (DOC-010)"
    ebf_kappa: "kappa_ORG_IDN"
    behavioral_implication: |
      Identität vorhanden, aber fragmentiert (GB > SOB).
      Identity Economics (Akerlof & Kranton): Superordinate Category aktivieren.
      «Meine Lieblingsbahn» könnte als vereinigendes Identitätskonzept funktionieren.

