ten_c_diagnosis:
  date: "2026-02-10"
  source: "SYNTHESE_Gesamtanalyse-11-Dokumente.md"

  # Kerngleichung
  core_equation:
    formula: "U_SOB = Σ gᵢ + Σ γᵢⱼ × gᵢ × gⱼ"
    interpretation: |
      gᵢ (Einzelleistung GBs) = HOCH (bestätigt durch alle Dokumente)
      γᵢⱼ (Zusammenarbeit zwischen GBs) = NIEDRIG (~0.30, DOC-004: Score 56)
      → SOB optimiert Summanden, nicht das Gesamtprodukt.
      → FehrAdvice-Auftrag: γ erhöhen.

  dimensions:
    WHO:
      score: 0.65
      key_findings:
        - "3 Eigner mit Multi-Prinzipal-Problem (DOC-003)"
        - "5 GBs mit unterschiedlichen Anreizen (DOC-007)"
        - "1'062 MA, 16% Fluktuationsrisiko (DOC-004)"
        - "Kunden: «Loyalität gering, preisbewusst» (DOC-009)"

    WHAT:
      score: 0.55
      key_findings:
        - "5 Werte definiert, aber nicht operationalisiert (DOC-011)"
        - "7 Leitsätze auf Werte-Level, nicht Ziel-Level (DOC-002)"
        - "Fehlend: Innovation, Mut, Zusammenarbeit (DOC-011)"
        - "Nachhaltigkeit: operativ, nicht strategisch (DOC-008)"

    HOW:
      score: 0.35
      priority: "KERN -- höchster Handlungsbedarf"
      key_findings:
        - "γ zwischen GBs ≈ 0.30 (niedrig, DOC-004/DOC-009)"
        - "Abt.-übergreifende Prozesse: Score 56 (tiefster Wert, DOC-004)"
        - "22/24 Schwerpunkte GB-isoliert (DOC-007)"
        - "«Kohärenz» als zentrale Herausforderung (DOC-009, K8)"

    WHEN:
      score: 0.50
      key_findings:
        - "Kapazitätsgrenze erreicht (DOC-009, K1)"
        - "Konzessionserneuerung 2029 -- harte Deadline (DOC-009)"
        - "Finanzdruck Bund/Kantone steigend (DOC-003, DOC-009)"
        - "CEO-Wechsel 2025 -- Fenster für Wandel (DOC-001)"

    WHERE:
      score: 0.60
      key_findings:
        - "12 KPIs auf VR-Stufe, Finanz-/Marktlastig (DOC-005)"
        - "0 KPIs für Prozesse & Organisation (DOC-005)"
        - "MA-Umfrage als einzige Kultur-Messung (DOC-004)"
        - "Regulatorischer Rahmen stabil (DOC-003)"

    AWARE:
      score: 0.50
      key_findings:
        - "Strategie-Awareness ≈ 0.30 (niedrig, DOC-001)"
        - "Werte-Awareness ≈ 0.78 (hoch, DOC-004)"
        - "Marke stark, nicht strategisch verankert (DOC-009)"
        - "Wissen-Handeln-Gap dominant (DOC-004, DOC-011)"

    READY:
      score: 0.60
      key_findings:
        - "Engagement hoch: 77, über ÖV-Benchmark 73 (DOC-004)"
        - "Lernbereitschaft als Wert definiert (DOC-011)"
        - "ABER: Führungsprozesse formalistisch -- 67 (DOC-004)"
        - "ABER: Entscheidungswege zu langsam -- 59 (DOC-004)"

    STAGE:
      score: 0.55
      key_findings:
        - "Transition: «strategisch geführt» → «strategisch lebend» (DOC-001)"
        - "100-Tage-Fenster des neuen CEO (DOC-001)"
        - "Digitalisierung: «Pflicht, nicht Option» (DOC-009)"
        - "Behavioral Change explizit gefordert (DOC-009, I6)"

    HIERARCHY:
      score: 0.45
      key_findings:
        - "3-Stufen: VR → GL → GBs (DOC-005)"
        - "Verbindlichkeit fehlt -- VR→GB Durchgriff (DOC-002)"
        - "Doppelrolle Eigner: Besteller + Eigentümer (DOC-003)"
        - "Governance-Blindspot bei Prozessen (DOC-005)"

    EIT:
      score: 0.25
      priority: "TIEFSTER WERT -- FehrAdvice-Kernauftrag"
      key_findings:
        - "Kein Behavioral Change Framework vorhanden (DOC-009)"
        - "Keine systematische Interventions-Planung (DOC-007)"
        - "Intuitionsbasiert statt evidenzbasiert (DOC-010)"
        - "FehrAdvice-Auftrag: EIT aufbauen (DOC-009, I6)"

  weakness_ranking:
