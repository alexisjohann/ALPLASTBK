# =============================================================================
out_of_scope:
  - id: "OS-1"
    item: "Detaillierte Massnahmenplanung pro Bereich"
    reason: "Erfordert tiefe Bereichskenntnis und mehr Zeit"
    alternative: "Folge-Projekt SOB003 mit Bereichsleitern"

  - id: "OS-2"
    item: "Change Management / Kommunikationskonzept"
    reason: "Eigene Disziplin, separates Budget erforderlich"
    alternative: "Empfehlung für Kommunikationspartner liefern"

  - id: "OS-3"
    item: "IT-Implementierung ausserhalb BEATRIX"
    reason: "Technisches Projekt, andere Kompetenzen"
    alternative: "Spezifikation liefern, SOB-IT setzt um"

  - id: "OS-4"
    item: "Schulungen / Trainings für Führungskräfte"
    reason: "Nach Strategie-Abnahme sinnvoller"
    alternative: "Phase 2 Projekt (SOB003)"

  - id: "OS-5"
    item: "Quantitative Marktforschung (Kundenbefragung)"
    reason: "Zeit- und Budget-Rahmen überschritten"
    alternative: "Nutzung bestehender SOB-Kundendaten"

  - id: "OS-6"
    item: "Lohn-/Anreizsystem-Redesign"
    reason: "HR-Projekt mit eigener Komplexität"
    alternative: "Empfehlungen im Strategiemodell formulieren"

  - id: "OS-7"
    item: "VR-Strategie-Retreat Moderation"
    reason: "Politisch sensitiv, separate Beauftragung"
    alternative: "Optional als Add-on bei Bedarf"

