    # Phase 1: Konsolidierung (Wochen 1-4)
    - id: "IS-1"
      phase: 1
      description: "Integration Vision + Mission in Strategiearchitektur"
      deliverable: "Strategie-Pyramide (1 Seite)"

    - id: "IS-2"
      phase: 1
      description: "Stakeholder-Mapping (VR, GL, Bereichsleiter, MA)"
      deliverable: "Stakeholder-Matrix"

    - id: "IS-3"
      phase: 1
      description: "Ist-Analyse der bestehenden Strategiedokumente"
      deliverable: "Gap-Analyse Report"

    # Phase 2: Modellentwicklung (Wochen 5-8)
    - id: "IS-4"
      phase: 2
      description: "Entwicklung SOB-Strategiemodell mit EBF/BEATRIX-Framework"
      deliverable: "Strategiemodell (10C-basiert) in BEATRIX"

    - id: "IS-5"
      phase: 2
      description: "Definition der Strategie-Dimensionen"
      deliverable: "Dimensions-Katalog"

    - id: "IS-6"
      phase: 2
      description: "Verhaltensparameter pro Dimension kalibrieren"
      deliverable: "Parameter-Set (YAML)"

    # Phase 3: Implementierungsplanung (Wochen 9-12)
    - id: "IS-7"
      phase: 3
      description: "Projektions-Tool für Implementierung in BEATRIX"
      deliverable: "BEATRIX Dashboard / Projektions-Modul"

    - id: "IS-8"
      phase: 3
      description: "Bereichsspezifische Übersetzung"
      deliverable: "4-5 Bereichs-Factsheets"

    - id: "IS-9"
      phase: 3
      description: "GL-Workshop zur Validierung"
      deliverable: "Workshop-Protokoll + Anpassungen"

    - id: "IS-10"
      phase: 3
      description: "Finale Dokumentation + Übergabe"
      deliverable: "Strategie-Handbuch"

  organizational_scope:
    - "Geschäftsleitung (GL)"
    - "Betrieb (Lokführer, Zugbegleiter)"
    - "Kundenservice"
    - "Werkstatt/Technik"
