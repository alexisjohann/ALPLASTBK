# =============================================================================
# PSI-DIMENSIONEN (8 Faktoren)
# =============================================================================
# Skala: 0.0 (niedrig) bis 1.0 (hoch)
# =============================================================================

psi_dimensions:

  psi_I_institutional:
    value: 0.90
    label: "Institutionell"
    description: |
      Anwaltskanzleien operieren in einem hochregulierten Umfeld.
      Berufsrecht (BGFA), kantonale Anwaltsaufsicht, FINMA-Regulierung
      fuer Bank-/Finanzmandate, internationale Compliance-Standards.
      Starke institutionelle Defaults (Standesregeln, Sorgfaltspflicht).
    key_factors:
      - "BGFA (Bundesgesetz ueber die Freizuegigkeit der Anwaeltinnen und Anwaelte)"
      - "Kantonale Anwaltsaufsicht (Zuerich, Genf)"
      - "FINMA-Regulierung bei Finanzmarkt-Mandaten"
      - "Internationales Netzwerk erfordert Multi-Jurisdiktions-Compliance"
    ebf_kappa: "kappa_INST"

  psi_S_social:
    value: 0.80
    label: "Sozial"
    description: |
      Reputationsgetriebene Branche. Mandatsakquisition ueber persoenliche
      Netzwerke, Referrals, Branchenveranstaltungen. Partnership-Modell
      mit starkem internem Sozialdruck. Klient:innen-Beziehungen sind
      langfristig und vertrauensbasiert.
    key_factors:
      - "Referral-basierte Mandatsakquisition"
      - "Partnership-Modell mit Reputationsrisiko"
      - "Langfristige Mandatsbeziehungen"
    ebf_kappa: "kappa_SOCIAL"

  psi_C_cognitive:
    value: 0.85
    label: "Kognitiv"
    description: |
      Hohe kognitive Komplexitaet fuer Mandant:innen: Rechtsfragen sind
      abstrakt, Ergebnisse unsicher, Kosten schwer einschaetzbar.
      Informationsasymmetrie zwischen Anwalt und Mandant ist erheblich.
      Entscheidungen unter Unsicherheit (Prozessrisiko, Regulierung).
    key_factors:
      - "Hohe Informationsasymmetrie (Anwalt > Mandant)"
      - "Unsicherheit ueber Ausgang und Kosten"
      - "Abstrakte, komplexe Rechtsmaterie"
    ebf_kappa: "kappa_COG"

  psi_K_cultural:
    value: 0.70
    label: "Kulturell"
    description: |
      Schweizer Rechtsmarkt ist konservativ, vertrauensbasiert und
      diskret. Qualitaet und Zuverlaessigkeit zaehlen mehr als Marketing.
      Zweisprachigkeit (DE/FR) ist Differenzierungsmerkmal. Internationale
      Kanzlei-Kultur trifft auf Schweizer Praezisionsdenken.
    key_factors:
      - "Schweizer Diskretion und Vertrauenskultur"
      - "Zweisprachigkeit Deutsch/Franzoesisch"
      - "Konservative Branchenkultur trifft auf internationale Dynamik"
    ebf_kappa: "kappa_CULT"

  psi_E_economic:
    value: 0.80
    label: "Oekonomisch"
    description: |
      High-Value-Dienstleistung. Stundensaetze CHF 400-800+.
      Mandant:innen sind typischerweise zahlungskraeftige Unternehmen
      oder vermogende Privatpersonen. Preissensitivitaet ist moderat
      (Qualitaet vor Preis), aber zunehmend unter Druck durch
      Alternative Legal Service Providers (ALSP) und Legal Tech.
    key_factors:
      - "High-Value Professional Services (CHF 400-800+/h)"
      - "Zahlungskraeftige Mandant:innen (Corporate + HNWI)"
      - "Zunehmender Preisdruck durch Legal Tech / ALSP"
    ebf_kappa: "kappa_ECON"

  psi_T_temporal:
    value: 0.65
    label: "Temporal"
    description: |
      Mix aus dringenden Mandaten (M&A Closing, Litigation Deadlines)
      und langfristigen Beziehungen (Retainer, laufende Beratung).
      Strategiehorizont der Kanzlei ist mittelfristig (3-5 Jahre).
      Branchentransformation (Legal Tech, AI) erfordert Anpassung.
    key_factors:
      - "Transaktions-Deadlines vs. laufende Beratungsmandate"
      - "Mittelfristiger Strategiehorizont (3-5 Jahre)"
      - "Legal Tech / AI Disruption erfordert Anpassungsgeschwindigkeit"
    ebf_kappa: "kappa_TEMP"

  psi_M_material:
    value: 0.60
    label: "Materiell"
    description: |
      Traditionell papierbasierte Branche im digitalen Wandel.
      Document Management Systeme, aber noch wenig AI-Integration
      im Vergleich zu angelsaechsischen Kanzleien. CMS global
      investiert in Legal Tech (CMS REACT, etc.).
    key_factors:
      - "Document Management Systeme (DMS)"
      - "CMS globale Legal Tech Initiativen"
      - "Digitale Transformation im Gang, aber Branche traditionell"
    ebf_kappa: "kappa_MAT"

  psi_F_physical:
    value: 0.55
    label: "Physisch"
    description: |
      Hybrid-Modell: Persoenliche Meetings fuer wichtige Mandate,
      zunehmend virtuelle Beratung. Kanzlei-Standorte in Prestigelagen
      (Zuerich Seefeld, Genf Pont-Rouge) signalisieren Status.
      Post-COVID Shift zu mehr Remote-Arbeit auch bei Anwaelt:innen.
    key_factors:
      - "Prestige-Standorte als Vertrauenssignal"
      - "Hybrid: Persoenlich fuer High-Stakes, virtuell fuer Routine"
      - "Post-COVID Remote-Shift auch in Kanzleien"
    ebf_kappa: "kappa_PHYS"

# =============================================================================
# KUNDENSEGMENTE (~4 Segmente, je ~4 Faktoren)
# =============================================================================

customer_segments:

  - id: "SEG-01"
    name: "Corporate / Institutional"
    description: |
      Grosse Unternehmen, boersenkotierte Gesellschaften, institutionelle
      Investoren. M&A, Compliance, Finanzmarktregulierung. Hohe Mandate,
      langfristige Beziehungen, oft Panel-Strukturen.
    share: 0.45

    behavioral_parameters:
      lambda_loss_aversion: 2.20
      beta_present_bias: 0.90
      kappa_default_sensitivity: 0.55
      sigma_social_proof: 0.60

    intervention_affinity:
      high: ["Thought Leadership Content", "Industry Events", "Cross-Selling"]
      medium: ["Webinare", "Newsletter", "Legal Updates"]
      low: ["Social Media Ads", "Cold Outreach"]

  - id: "SEG-02"
    name: "KMU / Mittelstand"
    description: |
      Kleine und mittlere Unternehmen. Arbeitsrecht, Handelsrecht,
      Immobilien, Vertragsrecht. Preissensitiver als Corporates,
      aber loyaler bei guter Erfahrung. Haeufig Erstkontakt ueber
      persoenliche Empfehlung.
    share: 0.25

    behavioral_parameters:
      lambda_loss_aversion: 2.50
      beta_present_bias: 0.82
      kappa_default_sensitivity: 0.70
      sigma_social_proof: 0.75

    intervention_affinity:
      high: ["Empfehlungsnetzwerk", "Branchenevents", "Praxisnahe Seminare"]
      medium: ["Website-Content", "Legal Guides"]
      low: ["Generische Werbung", "Kaltakquise"]

  - id: "SEG-03"
    name: "Private Clients & Family Offices"
    description: |
      Vermogende Privatpersonen (HNWI/UHNWI), Family Offices,
      Stiftungen. Steuerplanung, Nachfolge, Vermoegenstrukturierung.
      Extrem vertrauensbasiert, Diskretion ist Pflicht.
      Hoechste Mandatswerte, langfristigste Beziehungen.
    share: 0.15

    behavioral_parameters:
      lambda_loss_aversion: 2.80
      beta_present_bias: 0.88
      kappa_default_sensitivity: 0.45
      sigma_social_proof: 0.40

    intervention_affinity:
      high: ["Persoenliche Einfuehrung", "Exklusive Events", "Diskreter Service"]
      medium: ["Spezialisierte Publikationen", "Private Banking Referrals"]
      low: ["Jede Form oeffentlicher Werbung", "Social Media"]

  - id: "SEG-04"
    name: "Public Sector & Regulatoren"
    description: |
      Oeffentliche Hand, staatsnahe Betriebe, regulatorische Behoerden.
      Public Procurement, Verwaltungsrecht, Konzessionen.
      Beschaffungsrechtliche Einschraenkungen, formale Prozesse.
    share: 0.15

    behavioral_parameters:
      lambda_loss_aversion: 2.60
      beta_present_bias: 0.85
      kappa_default_sensitivity: 0.85
      sigma_social_proof: 0.50

    intervention_affinity:
      high: ["Fachpublikationen Verwaltungsrecht", "Referenzen oeffentliche Mandate"]
      medium: ["Branchenspezifische Seminare", "Legal Updates Regulierung"]
      low: ["Aggressive Akquise", "Preiswettbewerb"]

# =============================================================================
# AGGREGIERTE VERHALTENSPARAMETER
# =============================================================================

behavioral_parameters_aggregate:

  core_parameters:
    loss_aversion:
      symbol: "lambda"
      value: 2.42
      range: [2.20, 2.80]
      source: "Segment-gewichteter Durchschnitt (LLMMC Prior)"
      interpretation: |
        Mandant:innen von Wirtschaftskanzleien haben ueberdurchschnittliche
        Verlustaversion. Rechtliche Risiken werden staerker gewichtet als
        Chancen. Besonders hoch bei Private Clients (Vermoegensschutz).

    present_bias:
      symbol: "beta"
      value: 0.87
      range: [0.82, 0.90]
      source: "Segment-gewichteter Durchschnitt (LLMMC Prior)"
      interpretation: |
        Moderater Present Bias. Corporate Clients sind disziplinierter
        (beta naeher 1.0), KMU eher kurzfristiger orientiert.

    default_sensitivity:
      symbol: "kappa_default"
      value: 0.62
      range: [0.45, 0.85]
      source: "Segment-gewichteter Durchschnitt (LLMMC Prior)"
      interpretation: |
        Mittlere Default-Sensitivitaet insgesamt, aber starke Varianz:
        Public Sector (0.85) vs. Private Clients (0.45). Bei oeffentlichen
        Mandaten dominieren formale Defaults (Beschaffungsrecht).

    social_proof:
      symbol: "sigma_social"
      value: 0.59
      range: [0.40, 0.75]
      source: "Segment-gewichteter Durchschnitt (LLMMC Prior)"
      interpretation: |
        Referral-basierte Branche: Social Proof ist zentral fuer
        Mandatsakquisition. Rankings (Legal 500, Chambers) funktionieren
        als institutionalisierter Social Proof. KMU reagieren am
        staerksten auf persoenliche Empfehlungen.

# =============================================================================
# STRATEGISCHE IMPLIKATIONEN (Quick Assessment)
# =============================================================================

strategic_implications:

  top_3_opportunities:
    - dimension: "AWARE"
      opportunity: |
        CMS hat 20 Legal-500-Rankings und 10 individuell ausgezeichnete
        Anwaelt:innen. Diese Sichtbarkeit wird auf der Website und in
        der Kommunikation moeglicherweise nicht voll ausgeschoepft.
        Behavioral Insight: Rankings sind institutionalisierter Social
        Proof (sigma_social = 0.59) — besonders wirksam bei KMU.
      intervention_type: "Salience Enhancement, Social Proof Display"

    - dimension: "WHEN"
      opportunity: |
        Legal Tech / AI transformiert die Branche. CMS global hat
        Initiativen (Future Facing), aber die Schweizer Website
        koennte AI-Tools und digitale Services staerker als
        Differenzierungsmerkmal positionieren.
        Behavioral Insight: Temporal Framing (psi_T = 0.65) —
        «jetzt handeln» vs. «spaeter bereuen» bei Digitalisierung.
      intervention_type: "Temporal Framing, Innovation Signaling"

    - dimension: "WHAT"
      opportunity: |
        Branchenspezifische Beratung (11 Industry Sectors) ist ein
        Alleinstellungsmerkmal. Cross-Selling zwischen Practice Areas
        und Industry Sectors ist ein Hebel fuer Mandatswachstum.
        Behavioral Insight: Complementarity gamma(expertise, trust) > 0.
      intervention_type: "Cross-Selling Architecture, Expertise Bundling"

  top_3_risks:
    - risk: |
        Preisdruck durch Alternative Legal Service Providers (ALSP)
        und Legal Tech Startups, besonders im KMU-Segment.
      mitigation: |
        Wertbasierte Kommunikation statt Stundenhonorar-Fokus.
        Behavioral Framing: «Kosten der Unterlassung» > «Kosten der Beratung».

    - risk: |
        Informationsasymmetrie (psi_C = 0.85) fuehrt bei potentiellen
        Mandant:innen zu Entscheidungslahmung oder Aufschieben.
      mitigation: |
        Komplexitaetsreduktion auf der Website: Klare Einstiegspunkte,
        Self-Assessment Tools, transparente Prozessbeschreibungen.

    - risk: |
        Zweisprachigkeit (DE/FR) als Herausforderung fuer konsistente
        Markenbotschaft und SEO-Strategie.
      mitigation: |
        Unified Content Strategy mit lokalisierten Varianten.
        Nicht uebersetzen, sondern kulturell adaptieren.

  recommended_next_step: |
    1. Website-Analyse mit verhaltensorientiertem Audit durchfuehren
    2. Bei konkretem Projektinteresse: Upgrade auf STANDARD (400 Faktoren)
       mit Management-Interview und detaillierter Segmentanalyse
    3. Konkrete Interventions-Empfehlungen via /design-intervention

