upgrade_path:
  current_level: "SCHNELL"
  next_level: "STANDARD"
  requirements_for_upgrade:
    - "Zugang zu internen Kennzahlen (Mandatsstruktur, Client Base)"
    - "Interview mit Managing Partner oder Marketing-Verantwortlichen (2-3h)"
