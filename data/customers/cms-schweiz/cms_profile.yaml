    - "Wettbewerbsanalyse (Homburger, Walder Wyss, Bär & Karrer, Lenz & Staehelin)"
  estimated_effort: "1-2 Tage"
  recommended_trigger: "Konkretes Beratungsmandat oder Pitch-Situation"

