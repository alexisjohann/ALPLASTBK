# =============================================================================
# CONCORDIA KONTEXTVEKTOR - ACHSE 3: KUNDEN & SEGMENTE
# =============================================================================
# Faktoren: 60 | Sub-Achsen: 6
# =============================================================================

metadata:
  axis: "KUN"
  axis_name: "Kunden & Segmente"
  total_factors: 60
  version: "1.0"
  last_updated: "2026-01-28"

# =============================================================================
# KUN-SEG: KUNDENSEGMENTIERUNG (10 Faktoren)
# =============================================================================
kun_seg:
  name: "Kundensegmentierung"
  factors:
    - id: "KUN-SEG-01"
      name: "Segmentierungsmodell"
      approach: "Werte-Lebensphasen-Hybrid"
      dimensions: ["Wertorientierung", "Lebensphase", "Preissensitivität"]
      segments: 6

    - id: "KUN-SEG-02"
      name: "Segment A: Solidarische Familien"
      size: 220000
      share: 33
      unit: "%"
      profile: "Familie, Werte wichtig, preisbewusst"
      clv: 14500

    - id: "KUN-SEG-03"
      name: "Segment B: Treue Senioren"
      size: 180000
      share: 27
      unit: "%"
      profile: "55+, lange Zugehörigkeit, Service wichtig"
      clv: 18200

    - id: "KUN-SEG-04"
      name: "Segment C: Genossenschaftler"
      size: 95000
      share: 14
      unit: "%"
      profile: "Genossenschaftsidee wichtig, aktiv"
      clv: 16800

    - id: "KUN-SEG-05"
      name: "Segment D: Pragmatiker"
      size: 100000
      share: 15
      unit: "%"
      profile: "Preis-Leistung entscheidend"
      clv: 11200

    - id: "KUN-SEG-06"
      name: "Segment E: Junge Mobile"
      size: 53000
      share: 8
      unit: "%"
      profile: "18-35, digital, wechselbereit"
      clv: 8500
      churn_risk: "Hoch"

    - id: "KUN-SEG-07"
      name: "Segment F: Firmenversicherte"
      size: 20000
      share: 3
      unit: "%"
      profile: "Über Arbeitgeber, passiv"
      clv: 9800

    - id: "KUN-SEG-08"
      name: "Segment-Profitabilität"
      ranking:
        - segment: "Treue Senioren"
          profitability: "Sehr hoch"
        - segment: "Genossenschaftler"
          profitability: "Hoch"
        - segment: "Solidarische Familien"
          profitability: "Mittel"
        - segment: "Junge Mobile"
          profitability: "Tief"

    - id: "KUN-SEG-09"
      name: "Wachstumspotential nach Segment"
      high_potential: ["Junge Mobile", "Pragmatiker"]
      stable: ["Solidarische Familien", "Genossenschaftler"]
      declining: ["Treue Senioren"]

    - id: "KUN-SEG-10"
      name: "Segment-Migration"
      typical_paths:
        - "Junge Mobile → Solidarische Familien (Familiengründung)"
        - "Solidarische Familien → Treue Senioren (Alter)"
        - "Pragmatiker → Abwanderung (Preis)"

# =============================================================================
# KUN-BED: KUNDENBEDÜRFNISSE (10 Faktoren)
# =============================================================================
kun_bed:
  name: "Kundenbedürfnisse"
  factors:
    - id: "KUN-BED-01"
      name: "Top-Bedürfnis 1"
      need: "Faire Prämien"
      importance: 4.5
      scale: "1-5"
      concordia_score: 3.8

    - id: "KUN-BED-02"
      name: "Top-Bedürfnis 2"
      need: "Schnelle Leistungsabrechnung"
      importance: 4.3
      scale: "1-5"
      concordia_score: 4.0

    - id: "KUN-BED-03"
      name: "Top-Bedürfnis 3"
      need: "Persönliche Beratung"
      importance: 4.1
      scale: "1-5"
      concordia_score: 4.3
      description: "Concordia-Stärke"

    - id: "KUN-BED-04"
      name: "Top-Bedürfnis 4"
      need: "Einfache Prozesse"
      importance: 4.0
      scale: "1-5"
      concordia_score: 3.5

    - id: "KUN-BED-05"
      name: "Top-Bedürfnis 5"
      need: "Digitale Services"
      importance: 3.8
      scale: "1-5"
      concordia_score: 3.2
      description: "Concordia-Schwäche"

    - id: "KUN-BED-06"
      name: "Segment-spezifische Bedürfnisse"
      needs:
        familien: "Familienrabatte, Kinderdeckung"
        senioren: "Persönlicher Kontakt, Hilfe bei Formularen"
        junge: "App, schnelle digitale Prozesse"

    - id: "KUN-BED-07"
      name: "Unmet Needs"
      gaps:
        - need: "Vollständig digitale Customer Journey"
          gap_size: "Gross"
        - need: "Telemedizin-Integration"
          gap_size: "Mittel"
        - need: "Präventions-App"
          gap_size: "Mittel"

    - id: "KUN-BED-08"
      name: "Latente Bedürfnisse"
      identified:
        - "Gesundheitscoaching"
        - "Mental Health Support"
        - "Nachhaltige Versicherung"

    - id: "KUN-BED-09"
      name: "Bedürfnis-Trend"
      rising: ["Digital", "Prävention", "Nachhaltigkeit"]
      stable: ["Service", "Preis"]
      declining: ["Physische Präsenz"]

    - id: "KUN-BED-10"
      name: "Bedürfnis-Erfüllungsgrad Overall"
      value: 72
      unit: "%"
      benchmark: 75
      description: "Leicht unter Markt"

