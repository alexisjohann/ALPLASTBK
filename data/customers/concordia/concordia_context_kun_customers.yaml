# =============================================================================
# KUN-JRN: CUSTOMER JOURNEY (10 Faktoren)
# =============================================================================
kun_jrn:
  name: "Customer Journey"
  factors:
    - id: "KUN-JRN-01"
      name: "Awareness-Phase"
      primary_channels:
        - "Word-of-Mouth (35%)"
        - "Vergleichsportale (25%)"
        - "Regionale Werbung (20%)"
      conversion_rate: 8
      unit: "%"

    - id: "KUN-JRN-02"
      name: "Consideration-Phase"
      touchpoints:
        - "Website"
        - "Prämienrechner"
        - "Beratungsgespräch"
      avg_duration: 3.5
      unit: "Wochen"

    - id: "KUN-JRN-03"
      name: "Purchase-Phase"
      conversion_channels:
        persönlich: 45
        online: 35
        telefon: 20
      unit: "%"
      description: "Persönlicher Abschluss stark"

    - id: "KUN-JRN-04"
      name: "Onboarding-Phase"
      avg_duration: 14
      unit: "Tage"
      satisfaction: 75
      digital_onboarding: 40
      unit_digital: "%"

    - id: "KUN-JRN-05"
      name: "Usage-Phase"
      key_moments:
        - "Erste Rechnung"
        - "Erster Leistungsfall"
        - "Jahresabrechnung"
      critical_touchpoint: "Erster Leistungsfall"

    - id: "KUN-JRN-06"
      name: "Service-Phase"
      avg_interactions: 3.8
      unit: "pro Jahr"
      satisfaction_service: 78

    - id: "KUN-JRN-07"
      name: "Loyalty-Phase"
      loyalty_program: "Concordia Club"
      participation: 25
      unit: "%"
      benefits: ["Rabatte Partner", "Events"]

    - id: "KUN-JRN-08"
      name: "Advocacy-Phase"
      referral_program: true
      referral_bonus: 50
      unit: "CHF"
      referral_rate: 28
      unit_rate: "%"

    - id: "KUN-JRN-09"
      name: "Pain Points Journey"
      critical_pain_points:
        - phase: "Consideration"
          pain: "Digitaler Vergleich schwach"
        - phase: "Usage"
          pain: "App-Funktionalität begrenzt"
        - phase: "Service"
          pain: "Wartezeiten Hotline"

    - id: "KUN-JRN-10"
      name: "Journey Satisfaction Score"
      overall: 72
      benchmark: 75
      lowest_phase: "Digital Experience"
      highest_phase: "Persönliche Beratung"

