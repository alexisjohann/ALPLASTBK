# A-Train Stockholm - Scenario Definitions
# For use with /apply-models and /sensitivity-analysis
# Created: 2026-02-05

scenarios:
  # ==========================================================================
  # CONSERVATIVE SCENARIO
  # ==========================================================================
  conservative:
    scenario_name: "Conservative Path"
    description: |
      Slower recovery, increased competition from buses and commuter rail.
      Business travel remains below pre-COVID levels.

    adjustments:
      revenue_cagr: -0.015      # Base 3% → 1.5%
      passenger_growth: -0.01   # Base 2.5% → 1.5%
      ebitda_margin: -0.02      # Base 18% → 16%

    assumptions:
      - "Arlanda passenger growth only 1-2% p.a."
      - "Flygbussarna gains market share with aggressive pricing"
      - "Remote work reduces business travel permanently by 15%"
      - "Price increases limited by competition"

    key_metrics_2029:
      revenue_eur_m: "CALCULATED"
      ebitda_eur_m: "CALCULATED"
      passengers_m: "CALCULATED"

    status: "AWAITING /apply-models"

  # ==========================================================================
  # BASE CASE SCENARIO
  # ==========================================================================
  base_case:
    scenario_name: "Base Case"
    description: |
      Steady recovery continuing. Premium positioning maintained.
      Modest passenger growth in line with airport forecasts.

    adjustments:
      revenue_cagr: 0.00        # As per assumptions (3%)
      passenger_growth: 0.00    # As per assumptions (2.5%)
      ebitda_margin: 0.00       # As per assumptions (18%)

    assumptions:
      - "Arlanda passenger growth 2-4% p.a."
      - "Market share stable at ~30% of airport passengers"
      - "Business travel at 85% of pre-COVID"
      - "Inflation-linked price increases accepted"

    key_metrics_2029:
      revenue_eur_m: "CALCULATED"
      ebitda_eur_m: "CALCULATED"
      passengers_m: "CALCULATED"

    status: "AWAITING /apply-models"

  # ==========================================================================
  # OPTIMISTIC SCENARIO
  # ==========================================================================
  optimistic:
    scenario_name: "Optimistic Path"
    description: |
      Strong travel recovery. Environmental preferences drive modal shift
      from taxi/car to rail. New customer segments captured.

    adjustments:
      revenue_cagr: +0.02       # Base 3% → 5%
      passenger_growth: +0.015  # Base 2.5% → 4%
      ebitda_margin: +0.02      # Base 18% → 20%

    assumptions:
      - "Arlanda becomes major European hub (growth 5%+ p.a.)"
      - "Corporate sustainability mandates favor rail"
      - "New commuter segment from Arlanda City development"
      - "Premium pricing power maintained"

    key_metrics_2029:
      revenue_eur_m: "CALCULATED"
      ebitda_eur_m: "CALCULATED"
      passengers_m: "CALCULATED"

    status: "AWAITING /apply-models"

  # ==========================================================================
  # DISRUPTION SCENARIO
  # ==========================================================================
  disruption:
    scenario_name: "Disruption Risk"
    description: |
      Major negative event: extended service disruption, new competitor,
      or significant change in concession terms.

    adjustments:
      revenue_cagr: -0.05       # Base 3% → -2%
      passenger_growth: -0.04   # Base 2.5% → -1.5%
      ebitda_margin: -0.05      # Base 18% → 13%

    assumptions:
      - "6-month service disruption (infrastructure issue)"
      - "OR: SL extends Pendeltåg with dedicated airport service"
      - "OR: Concession renegotiation with adverse terms"
      - "Reputation damage affects premium positioning"

    key_metrics_2029:
      revenue_eur_m: "CALCULATED"
      ebitda_eur_m: "CALCULATED"
      passengers_m: "CALCULATED"

    probability: 0.10           # 10% probability
    status: "AWAITING /apply-models"

# ==========================================================================
# SENSITIVITY PARAMETERS
# ==========================================================================
sensitivity_analysis:
  parameters_to_test:
    - parameter: "passenger_growth"
      range: [-0.02, +0.02]
      description: "Passenger growth ±2pp"

    - parameter: "avg_ticket_price"
      range: [-10%, +10%]
      description: "Ticket price ±10%"

    - parameter: "ebitda_margin"
      range: [-0.03, +0.03]
      description: "EBITDA margin ±3pp"

    - parameter: "capex_intensity"
      range: [-0.02, +0.02]
      description: "Capex/Revenue ±2pp"

  key_questions:
    - "What passenger growth is needed to justify €5M train refurbishment?"
    - "At what occupancy rate does adding a train become profitable?"
    - "How much can we increase prices before losing 10% of leisure segment?"

metadata:
  scenarios_version: "1.0.0"
  created_date: "2026-02-05"
  last_updated: "2026-02-05"
  notes: |
    Run /apply-models a-train-stockholm to calculate scenario outcomes.
    Run /sensitivity-analysis a-train-stockholm all for full parameter sweep.
