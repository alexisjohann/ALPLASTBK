# A-Train Stockholm - Dependencies & Stakeholder Map
# Placeholder - To be populated during analysis
# Created: 2026-02-05

dependencies:
  status: "PLACEHOLDER"

  # ==========================================================================
  # EXTERNAL DEPENDENCIES
  # ==========================================================================
  external:
    - entity: "Swedavia (Arlanda Airport)"
      type: "Infrastructure Partner"
      dependency_level: "Critical"
      description: "Airport passenger volumes directly drive demand"
      risks:
        - "Airport capacity constraints"
        - "Route changes to/from Arlanda"
        - "Competition from Bromma Airport"

    - entity: "Trafikverket"
      type: "Infrastructure Owner"
      dependency_level: "Critical"
      description: "Railway infrastructure provider"
      risks:
        - "Track maintenance disruptions"
        - "Capacity allocation conflicts"
        - "Infrastructure investment priorities"

    - entity: "Transportstyrelsen"
      type: "Regulator"
      dependency_level: "High"
      description: "Safety certification, operating license"
      risks:
        - "Regulatory changes"
        - "Safety requirements"
        - "Environmental standards"

    - entity: "Alstom (Train Supplier)"
      type: "Equipment Supplier"
      dependency_level: "High"
      description: "X3 train maintenance and spare parts"
      risks:
        - "Parts availability"
        - "Maintenance costs"
        - "Technology obsolescence"

  # ==========================================================================
  # INTERNAL DEPENDENCIES
  # ==========================================================================
  internal:
    - function: "Operations"
      dependencies:
        - "Train crew availability"
        - "Rolling stock condition"
        - "Station facilities"

    - function: "Commercial"
      dependencies:
        - "Pricing systems"
        - "Distribution channels"
        - "Corporate contracts"

    - function: "Technology"
      dependencies:
        - "Ticketing platform"
        - "Passenger information"
        - "Revenue management system"

  # ==========================================================================
  # STAKEHOLDER MAP
  # ==========================================================================
  stakeholders:
    high_power_high_interest:
      - name: "Owners/Board"
        interest: "Financial returns, asset value"
        engagement: "Manage closely"

      - name: "Swedavia"
        interest: "Reliable airport access"
        engagement: "Strategic partnership"

    high_power_low_interest:
      - name: "Trafikverket"
        interest: "Network efficiency"
        engagement: "Keep satisfied"

      - name: "Transportstyrelsen"
        interest: "Safety, compliance"
        engagement: "Keep satisfied"

    low_power_high_interest:
      - name: "Employees"
        interest: "Job security, working conditions"
        engagement: "Keep informed"

      - name: "Regular passengers"
        interest: "Service quality, price"
        engagement: "Monitor"

    low_power_low_interest:
      - name: "General public"
        interest: "Transport options"
        engagement: "Monitor"

  # ==========================================================================
  # DATA DEPENDENCIES
  # ==========================================================================
  data_sources:
    required:
      - source: "A-Train AB Annual Report"
        status: "NOT_OBTAINED"
        priority: "High"
        data: ["Revenue", "Passengers", "Financials"]

      - source: "Swedavia Traffic Statistics"
        status: "AVAILABLE"
        priority: "High"
        data: ["Arlanda passenger numbers", "Trends"]

      - source: "Trafikverket"
        status: "AVAILABLE"
        priority: "Medium"
        data: ["Rail traffic statistics"]

    nice_to_have:
      - source: "Customer surveys"
        status: "NOT_OBTAINED"
        data: ["NPS", "Satisfaction", "Preferences"]

      - source: "Competitor pricing"
        status: "PARTIAL"
        data: ["Flygbussarna prices", "SL tariffs"]

metadata:
  dependencies_version: "0.1.0"
  created_date: "2026-02-05"
  status: "PLACEHOLDER"
  next_action: "Map detailed stakeholder relationships during discovery phase"
