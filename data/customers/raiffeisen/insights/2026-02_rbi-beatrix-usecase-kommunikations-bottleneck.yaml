# =================================================================
# ZUSAMMENFASSUNG
# =================================================================

summary:
  one_liner: |
    BEATRIX transformiert Aleksandras Team vom operativen Bottleneck
    zum strategischen Kommunikations-Architekten - indem 80% der
    Routine automatisiert und 100% verhaltensoptimiert wird.

  three_key_points:
    - point: "Von 5% auf 100% professionell unterstuetzte Kommunikation"
      mechanism: "BEATRIX skaliert ohne Personalaufwand"

    - point: "Verhaltensoptimiert statt nur sprachlich korrekt"
      mechanism: |
        Segment-spezifisches Framing, Backfire-Praevention,
        Referenzpunkt-Konsistenz - das kann kein ChatGPT

    - point: "Perfektes Timing: CEO-Transition als Proof of Concept"
      mechanism: |
        Hoechste Dringlichkeit + Hoechster Wert = ueberzeugender Pilot.
        Wenn BEATRIX die CEO-Transition-Kommunikation meistert,
        ist der Business Case fuer den Rollout klar.

  call_to_action: |
    Naechster Schritt: Workshop mit Aleksandra und dem Internal
    Communications Team (3 Stunden) um:
    1. Ist-Prozesse zu verstehen
    2. Die 5-10 haeufigsten Kommunikationstypen zu identifizieren
    3. Den Pilot-Scope gemeinsam festzulegen
    4. Timing an CEO-Transition Roadmap auszurichten

