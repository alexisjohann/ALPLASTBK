# =================================================================
# QUALITAETSSTEIGERUNG (das eigentliche Argument)
# =================================================================

quality_improvement:
  title: "Warum Qualitaet WICHTIGER ist als Kostenersparnis"

  core_argument: |
    Die Aufwandsersparnis ist nett. Aber der EIGENTLICHE Wert von
    BEATRIX liegt in der QUALITAET der Kommunikation.

    Warum? Zurueck zur Verhaltens-Oekonomie:

  dimensions:
    - dimension: "Referenzpunkt-Konsistenz"
      without_beatrix: |
        500+ Fuehrungskraefte interpretieren die CEO-Strategie individuell.
        Manche sagen «alles aendert sich», andere «fast nichts».
        Ergebnis: 43'000 Mitarbeiter haben 500 verschiedene Referenzpunkte.
        → Erwartungsmanagement UNMOEGLICH.
      with_beatrix: |
        Alle Kommunikation basiert auf derselben Referenzpunkt-Architektur:
        «DIESE 3 Prioritaeten in DIESEM Zeitrahmen.»
        → Einheitlicher Referenzpunkt = manageable Erwartungen.
      ebf_theory: "Koszegi-Rabin (2006): Referenzpunkte werden durch Erwartungen geformt"

    - dimension: "Segment-spezifisches Framing"
      without_beatrix: |
        One-size-fits-all Kommunikation.
        Hoffnungsvolle werden weiter inflationiert.
        Skeptiker werden nicht adressiert.
        Bedrohte erhalten keine Fairness-Signale.
      with_beatrix: |
        BEATRIX optimiert JEDE Kommunikation fuer alle 4 Segmente.
        Wo eine Team-Zusammensetzung 40% Skeptiker hat,
        wird automatisch mehr Evidenz und weniger Versprechen eingebaut.
      ebf_theory: "Heterogeneous Reference Points (Prinzip 5)"

    - dimension: "Backfire-Praevention"
      without_beatrix: |
        Niemand prueft ob eine Formulierung unbeabsichtigt Widerstand
        ausloest. Beispiel: «Wir optimieren unsere Kostenstruktur» wird
        von Bedrohten als «Kuendigungswelle» interpretiert.
        → Aktiver Widerstand, Fluktuation, Geruechtekueche.
      with_beatrix: |
        BEATRIX simuliert die Reaktion aller 4 Segmente und warnt:
        «Absatz 3 hat 38% Backfire-Risiko bei Segment Bedrohte.
        Vorschlag: Transparenz-Satz einfuegen.»
        → Probleme werden VOR dem Versand erkannt.
      ebf_theory: "Loss Aversion (lambda = 2.25): Negative Reaktion 2.25x staerker"

    - dimension: "Kulturelle Anpassung (11 Maerkte)"
      without_beatrix: |
        Zentraleinkommunikation aus Wien wird 1:1 uebersetzt.
        Aber: Was in Oesterreich als «direkt» gilt, ist in
        Tschechien «unhöflich» und in Rumaenien «autoritaer».
      with_beatrix: |
        Layer A kennt die Psi_K (kulturelle Dimension) jedes Marktes.
        BEATRIX passt Framing automatisch an:
        - AT: Direkt, konsensorientiert
        - CZ: Formeller, hierarchiebewusster
        - RO: Beziehungsorientierter
        - HR: Stärkere Fairness-Signale
      ebf_theory: "Psi_K Kulturelle Dimension (8 Psi-Framework)"

    - dimension: "Lern-Effekt fuer Fuehrungskraefte"
      without_beatrix: |
        Fuehrungskraefte kommunizieren nach Bauchgefuehl.
        Keine Feedback-Schleife. Kein Skill-Aufbau.
      with_beatrix: |
        BEATRIX erklaert WARUM es Aenderungen vorschlaegt.
        «Weil das Segment der Skeptiker konkrete Belege braucht...»
        → Fuehrungskraefte LERNEN verhaltens-oekonomische Kommunikation
        → Langfristig steigt Kompetenz auch ohne BEATRIX
        → KEIN Skill Atrophy (CAS-AI-003), sondern Skill BUILDING
      ebf_theory: "CAS-AI-003: Skill Atrophy Prevention durch Erklaerung"

