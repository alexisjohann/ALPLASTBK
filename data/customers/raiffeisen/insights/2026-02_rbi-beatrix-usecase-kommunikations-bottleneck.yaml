ceo_transition_synergy:
  title: "Warum BEATRIX GERADE JETZT am wertvollsten ist"

  synergies:
    - point: "Referenzpunkt-Kalibrierung ueber 11 Maerkte"
      description: |
        Die 3 CEO-Prioritaeten muessen KONSISTENT kommuniziert werden.
        BEATRIX stellt sicher dass in JEDEM Markt dieselbe
        Erwartungs-Architektur vermittelt wird.

    - point: "Honeymoon-Fenster optimal nutzen"
      description: |
        6 Monate sind KURZ fuer 43'000 Mitarbeiter in 11 Laendern.
        Ohne BEATRIX: Bis alle informiert sind, ist das Fenster zu.
        Mit BEATRIX: Alle erhalten innerhalb von TAGEN optimierte
        Kommunikation - nicht nach WOCHEN Queue-Wartezeit.

    - point: "Erwartungs-Monitoring in Echtzeit"
      description: |
        BEATRIX trackt wie Kommunikation wirkt (Feedback-Loop).
        Das liefert DATEN fuer das Phase 0 KPI-Framework:
        Erwartungs-Alignment Score, Segment-Verteilung,
        Konsistenz-Score - alles aus BEATRIX-Daten ableitbar.

    - point: "Pilot-Timing perfekt"
      description: |
        Setup (Maerz-Mai 2026) faellt in Phase 0 (Pre-Transition).
        Pilot (Juni-September 2026) faellt in Phase 0/1.
        → BEATRIX waechst MIT der CEO-Transition.
        → Perfektes Timing fuer einen ueberzeugenden Proof of Concept.

