# =================================================================
# DAS PROBLEM (Verhaltens-oekonomisch formuliert)
# =================================================================

problem:
  title: Der Kommunikations-Bottleneck als O-Ring-Problem

  situation: |
    Stakeholder in der Linie (Bereichsleiter, Abteilungsleiter, Team Leads)
    muessen regelmaessig intern UND extern kommunizieren:
    - Mitarbeiter-Updates, Change-Kommunikation, Strategie-Erklaerungen
    - Kunden-Kommunikation, Partner-Updates, Markt-Kommunikation

    Sie benoetigen Unterstuetzung von «Interner Kommunikation» und
    Aleksandras Innovation-Team fuer:
    - Strategische Abstimmung (Was ist die Kernbotschaft?)
    - Professionelle Aufbereitung (Wie formulieren?)
    - Verhaltens-Optimierung (Wie rahmen wir das?)
    - Konsistenz-Sicherung (Sagen wir alle das Gleiche?)

    ABER: Ressourcenengpaesse und Fokus-Konflikte bedeuten, dass die
    Unterstuetzung oft NICHT im noetigen Ausmass verfuegbar ist.

  behavioral_diagnosis:
    bottleneck_type: O-Ring (CAS-850)
    mechanism: |
      Das ist KEIN lineares Skalierungsproblem. Es ist ein
      O-RING-PROBLEM (Gans & Goldfarb, NBER):

      Bei multiplikativer Komplementaritaet (gamma = 1.0) gilt:
      Gesamtqualitaet = q_1 x q_2 x ... x q_n

      Wenn q_i (Kommunikation eines Touchpoints) gegen 0 geht,
      geht die GESAMTE Kommunikationsqualitaet gegen 0.

      In Zahlen fuer RBI:
      - 43'000 Mitarbeiter
      - ~500+ Fuehrungskraefte die regelmaessig kommunizieren
      - ~50-100 davon mit hoher externer Sichtbarkeit
      - Aleksandras Team: ~5-10 Personen?

      Kapazitaet: 5-10 Personen / 500+ Anfragen = <2% Abdeckung

      → 98% der Kommunikation passiert OHNE professionelle Unterstuetzung
      → Bei O-Ring-Logik: Ein einziger schlecht kommunizierter
        Standort kann die gesamte Narrative untergraben

    reference: CAS-850
    theory: |
      Gans & Goldfarb (NBER): "When tasks are quality-complements,
      standard task-by-task automation logic FAILS."

      Uebertragen auf Kommunikation:
      - Wenn Standort A sagt «alles aendert sich» und
        Standort B sagt «nichts aendert sich»
      - Dann ist die Gesamtwirkung SCHLECHTER als keine
        Kommunikation (Widerspruch = Vertrauensverlust)

    cheap_talk_problem: |
      MS-IF-007 (Crawford & Sobel 1982) + Bregolin et al. (2026):
      50% der Empfaenger updaten ihre Beliefs NICHT,
      selbst bei perfekter Information.

      Implikation: Es reicht nicht, die RICHTIGE Botschaft zu senden.
      Die Botschaft muss VERHALTENSOPTIMIERT sein:
      - Richtig gerahmt (Loss vs. Gain Frame)
      - Richtig getimed (Honeymoon-Fenster)
      - Richtig segmentiert (4 Erwartungs-Segmente)
      - Richtig personalisiert (Kontext des Empfaengers)

    ceo_transition_amplifier: |
      KRITISCH: Waehrend der CEO-Transition (Juli 2026+) wird das
      Problem EXPONENTIELL verschaerft:

      1. Kommunikationsvolumen STEIGT (jeder will erklaeren «was heisst
         das fuer uns»)
      2. Erwartungen sind HOCH (Discovery Interviews: 80%+ erwarten
         substantielle Veraenderung)
      3. Jede inkonsistente Botschaft ZERSTOERT Referenzpunkt-Kalibrierung
      4. Honeymoon-Fenster ist ZEITBEGRENZT (6 Monate)

      Ohne Loesung: Der Kommunikations-Bottleneck wird zum
      HAUPTRISIKOFAKTOR fuer die gesamte CEO-Transition.

  quantified_gap:
    communication_events_per_month: "~2'000-5'000 (geschaetzt, alle Touchpoints)"
    professionally_supported: "<5% (Kapazitaet Aleksandras Team)"
    unsupported: ">95%"
    quality_variance: |
      Mit Support: Konsistente Kernbotschaft, verhaltensoptimiert
      Ohne Support: Individuell interpretiert, oft widersprüchlich
    risk_during_transition: KRITISCH

# =================================================================
# DIE BEATRIX-LOESUNG
# =================================================================

beatrix_solution:
  title: BEATRIX als verhaltensbasierter Kommunikations-Co-Pilot

  core_value_proposition: |
    BEATRIX ist KEIN Text-Generator wie ChatGPT.
    BEATRIX ist ein VERHALTENSMODELLIERUNGS-SYSTEM.

    Der Unterschied:

    ┌──────────────────────────────────────────────────────────────┐
    │  ChatGPT/Copilot:     P(Text | Kontext)                     │
    │  → "Was klingt gut?"                                        │
    │                                                              │
    │  BEATRIX:              P(Verhalten | Kontext, Ψ, Segment)   │
    │  → "Wie wird Segment X in Kontext Y auf Botschaft Z         │
    │     REAGIEREN, und welches Framing maximiert die             │
    │     Wahrscheinlichkeit der gewuenschten Verhaltensaenderung?"│
    └──────────────────────────────────────────────────────────────┘

    BEATRIX optimiert nicht SPRACHE, sondern WIRKUNG.

  architecture_for_rbi:
    layer_a:
      name: Semantic Calibration Engine
      function: |
        Ingestiert RBI-spezifischen Kontext:
        - CEO-Kommunikationsstrategie (die 3 Prioritaeten)
        - Brand Guidelines und Corporate Wording
        - Markt-spezifische Kontexte (11 CEE-Maerkte)
        - Discovery Interview Insights
        - Aktuelle interne Stimmungslage (Pulse Surveys)

      input_sources:
        - RBI Corporate Communications Playbook
        - CEO Talking Points (die 3 Prioritaeten)
        - HR Discovery Interview Synthese
        - Markt-spezifische Kontextfaktoren
        - Regulatorische Constraints pro Markt

    layer_b:
      name: LLM Monte Carlo Simulation
      function: |
        Simuliert die WIRKUNG jeder Kommunikation auf die
        4 Mitarbeiter-Segmente BEVOR sie versendet wird:

        Segment 1: Hoffnungsvolle (40%)
        → Wie reagiert dieses Segment auf den Draft?
        → Risiko: Wird der Referenzpunkt weiter inflationiert?

        Segment 2: Skeptiker (25%)
        → Wird die Botschaft als «leeres Versprechen» wahrgenommen?
        → Risiko: Zynismus-Verstaerkung?

        Segment 3: Pragmatiker (25%)
        → Wird Handlungsrelevanz klar? («Was heisst das fuer mich?»)
        → Risiko: Botschaft wird ignoriert?

        Segment 4: Bedrohte (10%)
        → Wird Fairness signalisiert?
        → Risiko: Aktiver Widerstand, Fluktuation?

      output: |
        Fuer jeden Kommunikations-Draft:
        - Wirkungsprognose pro Segment (mit Konfidenzintervall)
        - Backfire-Risiken identifiziert
        - Optimierungsvorschlaege mit Begruendung
        - Konsistenz-Score mit zentraler Strategie

    layer_c:
      name: FEPSDE Welfare Calculation
      function: |
        Bewertet jede Kommunikation entlang der 6 Utility-Dimensionen:
        - F (Financial): Werden finanzielle Implikationen klar?
        - E (Emotional): Wie fuehlen sich Empfaenger?
        - P (Physical): Werden Arbeitsbedingungen adressiert?
        - S (Social): Werden soziale Normen aktiviert/verletzt?
        - D (Digital): Ist der Kanal optimal?
        - E (Ecological): Nachhaltigkeits-Aspekte relevant?

# =================================================================
# DER PROZESS: Wie es konkret funktioniert
# =================================================================

process:
  title: "Der BEATRIX-Kommunikations-Workflow bei RBI"

  overview: |
    ┌───────────────────────────────────────────────────────────────────┐
    │                                                                   │
    │  HEUTE (ohne BEATRIX):                                            │
    │                                                                   │
    │  Linie hat Kommunikationsbedarf                                   │
    │       ↓                                                           │
    │  Anfrage an Aleksandras Team (Ticket/Email)                       │
    │       ↓                                                           │
    │  Warten (Tage bis Wochen)                                         │
    │       ↓                                                           │
    │  ┌── Kapazitaet vorhanden? ──┐                                    │
    │  │ JA (5%)     │ NEIN (95%)  │                                    │
    │  │ Support     │ Improvisation│                                   │
    │  │ (high quality)│ (variable) │                                   │
    │  └─────────────┴─────────────┘                                    │
    │                                                                   │
    │                                                                   │
    │  MIT BEATRIX:                                                     │
    │                                                                   │
    │  Linie hat Kommunikationsbedarf                                   │
    │       ↓                                                           │
    │  BEATRIX: Kontext + Segment + Kanal eingeben (~5 min)             │
    │       ↓                                                           │
    │  BEATRIX generiert verhaltensoptimierten Draft                    │
    │       ↓                                                           │
    │  BEATRIX zeigt: Wirkungsprognose pro Segment                      │
    │       ↓                                                           │
    │  Linie personalisiert + sendet (Routine, ~80%)                    │
    │       ↓                                                           │
    │  High-Stakes? → Aleksandras Team reviewt (~20%)                   │
    │       ↓                                                           │
    │  BEATRIX lernt aus Feedback (Engagement-Daten)                    │
    │                                                                   │
    └───────────────────────────────────────────────────────────────────┘

  steps:
    - step: 1
      name: "Kontext-Eingabe (Line Manager, ~5 Minuten)"
      description: |
        Der Line Manager gibt in BEATRIX ein:

        1. WAS kommunizieren?
           → Thema auswaehlen (z.B. «Strategie-Update», «Restrukturierung»,
             «Neue Prozesse», «Performance Review»)

        2. AN WEN?
           → Zielgruppe definieren (Team, Abteilung, Markt, extern)
           → BEATRIX kennt die Segment-Verteilung pro Einheit

        3. UEBER WELCHEN KANAL?
           → Email, Town Hall, 1:1, Intranet, Video
           → BEATRIX optimiert Framing pro Kanal

        4. WAS IST DER KONTEXT?
           → Aktuelle Phase (Pre-Transition, First 100 Days, etc.)
           → Gibt es aktuelle Ereignisse die Einfluss haben?

      beatrix_does: |
        Layer A laed automatisch:
        - Zentrale Strategie und Kernbotschaften
        - Markt-spezifischen Kontext (Ψ_K, Ψ_I)
        - Segment-Verteilung der Zielgruppe
        - Historische Kommunikation zu diesem Thema

    - step: 2
      name: "Verhaltensoptimierter Draft (BEATRIX, ~30 Sekunden)"
      description: |
        BEATRIX generiert NICHT einfach Text.
        BEATRIX generiert einen verhaltensoptimierten Entwurf:

        ┌─────────────────────────────────────────────────────────────┐
        │  BEATRIX OUTPUT                                             │
        │                                                             │
        │  DRAFT:                                                     │
        │  [Kommunikationsentwurf - verhaltensoptimiert]              │
        │                                                             │
        │  VERHALTENS-ANALYSE:                                        │
        │  ├── Segment «Hoffnungsvolle»: Wirkung 78% positiv         │
        │  │   ⚠️  Risiko: Absatz 3 koennte Erwartungen inflationieren│
        │  │   → Vorschlag: «spezifisch» statt «umfassend»           │
        │  │                                                          │
        │  ├── Segment «Skeptiker»: Wirkung 52% positiv              │
        │  │   ⚠️  Risiko: Zu vage, keine konkreten Belege            │
        │  │   → Vorschlag: Konkretes Beispiel hinzufuegen            │
        │  │                                                          │
        │  ├── Segment «Pragmatiker»: Wirkung 65% positiv            │
        │  │   ✅ Handlungsrelevanz klar                               │
        │  │                                                          │
        │  └── Segment «Bedrohte»: Wirkung 41% positiv               │
        │      ❌ Fairness-Signal fehlt                                │
        │      → Vorschlag: Transparenz-Absatz hinzufuegen            │
        │                                                             │
        │  KONSISTENZ-SCORE: 87% (mit zentraler Strategie)            │
        │  REFERENZPUNKT-CHECK: ✅ Spezifisch, nicht inflationaer      │
        │                                                             │
        └─────────────────────────────────────────────────────────────┘

      beatrix_does: |
        Layer B (LLM Monte Carlo):
        - Simuliert 1'000 «synthetische Empfaenger» pro Segment
        - Berechnet Wirkungswahrscheinlichkeit und Backfire-Risiko
        - Identifiziert problematische Formulierungen

        Layer C (FEPSDE):
        - Prueft ob alle relevanten Utility-Dimensionen adressiert sind
        - Warnt wenn eine Dimension vernachlaessigt wird

    - step: 3
      name: "Personalisierung + Review (Line Manager, ~10 Minuten)"
      description: |
        Der Line Manager:
        1. Prueft den Draft auf lokale Anpassungen
        2. Fuegt persoenliche Anekdoten/Bezuege hinzu
        3. Entscheidet ob Vorschlaege uebernommen werden

        WICHTIG (CAS-AI-003 - Skill Atrophy Prevention):
        BEATRIX erklaert WARUM es Aenderungen vorschlaegt.
        Das macht den Line Manager kompetenter, nicht abhaengiger.

        «Ich schlage ‹spezifisch› statt ‹umfassend› vor, weil
        das Segment der Hoffnungsvollen dazu neigt, vage
        Formulierungen als Bestaetigung maximaler Erwartungen
        zu interpretieren (Koszegi-Rabin Referenzpunkt-Effekt).»

        → Line Manager LERNT verhaltens-oekonomische Kommunikation
        → Langfristig steigt Kompetenz AUCH ohne BEATRIX

    - step: 4
      name: "Routing-Entscheidung (automatisch)"
      description: |
        BEATRIX entscheidet automatisch ob menschliches Review noetig ist:

        ROUTINE (→ direkt senden, ~80%):
        - Konsistenz-Score > 85%
        - Kein Backfire-Risiko > 30%
        - Zielgruppe < 500 Personen
        - Kein externes Publikum

        REVIEW (→ Aleksandras Team, ~20%):
        - Konsistenz-Score < 85%
        - Backfire-Risiko > 30% in einem Segment
        - Zielgruppe > 500 Personen
        - Externes Publikum (Kunden, Regulatoren, Medien)
        - Erste Kommunikation zu einem neuen Thema
        - CEO-bezogene Inhalte

      impact: |
        Aleksandras Team reviewed 20% statt 100% der Anfragen.
        Aber: Die 20% sind die RICHTIGEN 20% (hoechstes Risiko).
        Die restlichen 80% sind qualitaetsgesichert durch BEATRIX.

    - step: 5
      name: "Feedback + Lernen (kontinuierlich)"
      description: |
        Nach Versand erfasst BEATRIX:
        - Oeffnungsrate (Email)
        - Engagement (Kommentare, Reaktionen)
        - Pulse Survey Ergebnisse (falls vorhanden)
        - Follow-up Anfragen (= Zeichen fuer Unklarheit)

        Daraus lernt BEATRIX:
        - Welche Framings wirken bei welchem Segment?
        - Welche Kanaele funktionieren in welchem Markt?
        - Wo entstehen Missverstaendnisse?
        - Wie entwickeln sich Erwartungen ueber Zeit?

