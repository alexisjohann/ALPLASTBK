# =================================================================
# SCHRITT 0: SESSION
# =================================================================

session:
  id: EBF-S-2026-02-12-ORG-001
  question: |
    Wie kann man die Erwartungshaltung der RBI-Mitarbeiter an den neuen
    CEO (Michael Höllerer, ab 01.07.2026) managen?

    Kontext aus Discovery Interviews:
    - Mitarbeiter erwarten dass sich ALLES verändert
    - Neuer CEO soll mit seinem Team ALLE Probleme lösen
    - Dilemma: Erwartungen sind (a) unmöglich zu erfüllen,
      aber (b) das Momentum soll genutzt werden um die
      wichtigsten Themen proaktiv anzugehen

  classification: Verhaltensänderung → Schritt 5 aktiv
  domain: ORG
  mode: STANDARD

# =================================================================
# SCHRITT 1: KONTEXT
# =================================================================

context:
  summary: |
    CEO-Transition in einer europäischen Grossbank mit 43'000 Mitarbeitern
    in 11 Märkten. Discovery Interviews zeigen überhöhte Erwartungen:
    «Der neue CEO wird alles richten.» Das klassische Erwartungs-Paradoxon:
    Zu hohe Erwartungen → garantierte Enttäuschung → Momentum verloren.
    Zu niedrige Erwartungen → kein Momentum → nichts verändert sich.

  psi_dimensions:
    Psi_I: |
      Regulatorisch: 11 nationale Regulierungen + EZB + EBA
      Intern: Vorstandsmandate, Governance-Regeln, Betriebsräte
      Constraint: CEO kann nicht «alles» ändern - regulatorische + strukturelle Grenzen
    Psi_S: |
      43'000 Mitarbeiter, 11 nationale Kulturen, starke Betriebsräte (AT)
      Genossenschaftliche Tradition (Raiffeisen-Werte)
      Discovery Interviews = Mitarbeiter haben Erwartungen ARTIKULIERT
      → Erwartungen sind SOZIAL GETEILT (nicht nur individuell)
    Psi_C: |
      Kognitive Verzerrungen: Optimism Bias, Projection Bias
      «Neuer CEO = neue Ära» ist ein kognitiver Shortcut (System 1)
      Fluency Heuristic: «Höllerer kennt RBI von innen» → «Er weiss was zu tun ist»
    Psi_K: |
      Österreichische Unternehmenskultur: Hierarchisch, konsensorientiert
      CEE-Kulturen: Variabel (von autoritätshörig bis skeptisch)
      Genossenschafts-Tradition: Erwartung an «Gemeinschaftsentscheidungen»
    Psi_E: |
      RBI profitabel (EUR 1.44 Mrd. Gewinn 2025)
      Aber: Russland-Rückstellungen, Deripaska-Klage (EUR 2.4 Mrd.)
      Budget für Veränderung ist vorhanden, aber nicht unbegrenzt
    Psi_T: |
      KRITISCH: Honeymoon-Fenster = ~6 Monate (Juli - Dezember 2026)
      Danach: Loss Aversion normalisiert sich, Status Quo Bias dominiert
      CEO-Wechsel ist ZEITGEBUNDENE RESSOURCE - nicht wiederholbar

  ten_c_mapping:
    WHO: RBI-Mitarbeiter (43'000), segmentiert nach Markt und Hierarchie
    WHAT: Erwartungen an Veränderung (Identität, Arbeitsqualität, Karriere)
    HOW: Erwartungen interagieren komplementär (γ > 0)
    WHEN: Honeymoon-Phase (6 Monate) = kritisches Zeitfenster
    WHERE: 11 CEE-Märkte mit unterschiedlichen Kontexten
    AWARE: Mitarbeiter sind sich ihrer Erwartungen BEWUSST (Discovery Interviews)
    READY: Hohe initiale Bereitschaft (Honeymoon), aber fragil
    STAGE: Transition-Phase (Pre-Contemplation → Contemplation)

# =================================================================
# SCHRITT 2: MODELL
# =================================================================

model:
  name: Expectation Reference Point Model (ERPM)
  type: new_application
  theoretical_basis:
    primary:
      - theory_id: MS-RD-007
        name: Koszegi-Rabin Expectation-Based Reference Points (2006)
        key_insight: |
          Referenzpunkte werden durch ERWARTUNGEN geformt, nicht durch
          den Status Quo. Wenn Mitarbeiter erwarten dass «alles» sich
          ändert, wird «alles ändert sich» zum Referenzpunkt.
          Jede Abweichung NACH UNTEN wird als Verlust erlebt.
        paper: koszegi2006model

    secondary:
      - theory_id: MS-RD-007_ext
        name: Schmidt & von Wangenheim - Organizational Change & Reference-Dependent Preferences
        key_insight: |
          Direkteste Anwendung von Koszegi-Rabin auf Organisationsveränderung.
          Review of Economic Studies (2025). Zeigt:
          1. Veränderung ist typischerweise stagnierend (Status Quo Bias)
          2. Krisen/Transitionen katalysieren plötzliche Veränderung
          3. Erwartungsmanagement ist kritisch - auch bei rationalen Agenten
          4. Loss-averse Mitarbeiter erfordern spezifische Vertragsdesigns
        paper: schmidt2025organizational
        journal: Review of Economic Studies

      - theory_id: MS-SP-006
        name: Guilt Aversion (Charness & Dufwenberg 2006)
        key_insight: |
          Wenn der CEO Versprechen macht (oder Erwartungen nicht korrigiert),
          aktiviert Nicht-Erfüllung Guilt Aversion bei ihm UND
          Enttäuschungs-Aversion bei Mitarbeitern.
        paper: charness2006promises

      - theory_id: MS-IB-006
        name: Optimism Bias (Weinstein 1980)
        key_insight: |
          Mitarbeiter überschätzen systematisch die Wahrscheinlichkeit
          positiver Veränderungen. «Unrealistic Optimism about Future
          Life Events» → übertragen auf organisationale Erwartungen.
        paper: weinstein1980unrealistic

      - theory_id: MS-TP-007
        name: Commitment Devices (Thaler & Benartzi 2004)
        key_insight: |
          Save More Tomorrow-Prinzip auf CEO-Transition anwendbar:
          Pre-Commitment auf spezifische Ziele bindet CEO UND
          begrenzt Erwartungen auf das Zugesagte.
        paper: thaler2004save

  core_mechanism: |
    ┌─────────────────────────────────────────────────────────────────────┐
    │  DAS ERWARTUNGS-PARADOXON (Formal)                                  │
    │                                                                     │
    │  REFERENZPUNKT r = E[Veränderung]                                   │
    │                                                                     │
    │  Wenn r = «alles ändert sich» (Discovery Interview Befund):         │
    │                                                                     │
    │  U(outcome) = v(outcome) + λ · L(outcome - r)                       │
    │                                                                     │
    │  wobei L(x) = { x        wenn x ≥ 0  (Gewinn)                      │
    │               { λ · x    wenn x < 0  (Verlust, λ = 2.25)           │
    │                                                                     │
    │  PROBLEM:                                                           │
    │  Wenn r = ∞ (alles), dann ist outcome - r < 0 für JEDES             │
    │  realistische Outcome. → ALLES wird als Verlust erlebt.             │
    │                                                                     │
    │  LÖSUNG:                                                            │
    │  r auf spezifische, erreichbare Ziele kalibrieren:                  │
    │  r = {Ziel_1, Ziel_2, Ziel_3}                                       │
    │  Dann: outcome ≥ r möglich → Gewinne erlebbar                      │
    │                                                                     │
    │  ABER: r darf nicht zu NIEDRIG sein (sonst kein Momentum)           │
    │  → r_optimal = ambitioniert + spezifisch + erreichbar               │
    │                                                                     │
    └─────────────────────────────────────────────────────────────────────┘

  the_paradox_explained: |
    ┌─────────────────────────────────────────────────────────────────────┐
    │  SZENARIO A: Erwartungen bleiben «alles wird sich ändern»           │
    │  r = maximal → outcome < r → Verlust = λ × (r - outcome)           │
    │  Bei λ = 2.25: Enttäuschung wiegt 2.25× stärker als jede           │
    │  Verbesserung. Ergebnis: Frustration, Zynismus, Widerstand.        │
    │                                                                     │
    │  SZENARIO B: Erwartungen werden «gesenkt» (klassisches Mgmt)        │
    │  r = niedrig → Momentum stirbt → Status Quo Bias dominiert          │
    │  Ergebnis: Nichts verändert sich. Chance verpasst.                  │
    │                                                                     │
    │  SZENARIO C: Erwartungen werden UMSTRUKTURIERT (EBF-Ansatz)         │
    │  r = {3 spezifische, ambitionierte Ziele}                           │
    │  → Momentum bleibt (ambitioniert!)                                  │
    │  → Erreichbar (spezifisch!)                                         │
    │  → Messbar (outcome ≥ r möglich!)                                   │
    │  → Enttäuschung begrenzt auf nicht-priorisierte Themen              │
    │  Ergebnis: Gezielte Veränderung + manageable Erwartungen            │
    │                                                                     │
    └─────────────────────────────────────────────────────────────────────┘

# =================================================================
# SCHRITT 3: PARAMETER
# =================================================================

parameters:
  loss_aversion:
    symbol: lambda
    value: 2.25
    range: [2.0, 2.5]
    source: PAR-BEH-001
    papers: [kahneman1979prospect, tversky1992advances]
    interpretation: |
      Enttäuschte Erwartungen (= Verlust relativ zum Referenzpunkt)
      wiegen 2.25× schwerer als erfüllte Erwartungen (= Gewinn).
      Beispiel: Wenn der CEO 7 von 10 erwarteten Problemen löst,
      werden die 3 ungelösten 2.25× stärker wahrgenommen als
      die 7 gelösten. Netto-Empfindung: NEGATIV.

  present_bias:
    symbol: beta
    value: 0.70
    range: [0.65, 0.85]
    source: PAR-BEH-003
    papers: [laibson1997golden, odonoghue1999doing]
    interpretation: |
      CEO und Team bevorzugen kurzfristige Quick Wins
      gegenüber langfristigen strukturellen Veränderungen.
      β = 0.70 heisst: Langfristiger Nutzen wird um 30% abgewertet.
      → Commitment Devices nötig um langfristige Ziele zu verfolgen.

  honeymoon_window:
    symbol: tau_H
    value: 6  # Monate
    range: [3, 9]
    source: empirical_literature
    papers: [gallup_honeymoon, oxford_ceo_strategy, fti_ceo_transition]
    interpretation: |
      ~6 Monate erhöhte Offenheit und reduzierte Loss Aversion.
      Investoren: Grace Period für Strategiedarstellung.
      Mitarbeiter: Initiale Begeisterung überwiegt negative Eindrücke.
      DANACH: Loss Aversion normalisiert, Status Quo Bias dominiert.
      → Härteste Entscheidungen INNERHALB des Fensters treffen.

  expectation_inflation:
    symbol: E_inflation
    value: 0.80  # 80% der Mitarbeiter erwarten «substantielle» Veränderung
    source: discovery_interviews_rbi
    interpretation: |
      Aus den Discovery Interviews abgeleitet.
      Hohe Erwartungs-Inflation = hoher Referenzpunkt = hohes Enttäuschungsrisiko.

  organizational_coupling:
    symbol: gamma_org
    value: 0.55
    range: [0.40, 0.70]
    source: CAS-913
    interpretation: |
      Mittlere bis hohe Kopplung in Bankorganisationen.
      Bedeutet: Partielle Veränderungen können Synergien ZERSTÖREN
      bevor neue aufgebaut werden. → Sequenzierung kritisch.

# =================================================================
# SCHRITT 4: ANALYSE & ERGEBNIS
# =================================================================

analysis:
  title: Die Erwartungs-Architektur - 5 Prinzipien

  principle_1:
    name: SPEZIFIZIEREN statt SENKEN
    mechanism: Reference Point Narrowing (Koszegi-Rabin)
    description: |
      NICHT: «Senkt eure Erwartungen» (das tötet Momentum)
      NICHT: «Alles wird sich ändern» (das garantiert Enttäuschung)
      SONDERN: «DIESE 3 Dinge werden sich in den ersten 100 Tagen ändern»

      Warum funktioniert das?
      Koszegi-Rabin (2006) zeigen: Menschen evaluieren Gewinne und Verluste
      DIMENSION FÜR DIMENSION, nicht als Gesamtpaket. Wenn der Referenzpunkt
      aus 3 spezifischen Zielen besteht statt aus «alles», wird jedes
      erreichte Ziel als Gewinn erlebt, nicht als «weniger als alles».

    formula: |
      Undifferenzierter Referenzpunkt:
        r = «alles» → P(outcome ≥ r) ≈ 0 → sicherer Verlust

      Spezifizierter Referenzpunkt:
        r = {Z₁, Z₂, Z₃} → P(outcome ≥ Zᵢ) > 0 → Gewinne möglich

    rbi_application: |
      CEO Höllerer identifiziert in den ersten Wochen (Juli 2026)
      die TOP 3 Prioritäten aus den Discovery Interviews.
      Kommuniziert: «Ich habe zugehört. DAS sind unsere 3 Prioritäten
      für die ersten 100 Tage. Alles andere steht auf der Roadmap,
      aber diese 3 haben absolute Priorität.»

  principle_2:
    name: HONEYMOON für das HÄRTESTE nutzen
    mechanism: Temporal Loss Aversion Suppression
    description: |
      In den ersten 6 Monaten ist Loss Aversion TEMPORÄR REDUZIERT.
      Optimismus und Hoffnung überwiegen. Das ist ein einmaliges Fenster.

      Schmidt & von Wangenheim (2025, RES) zeigen formal:
      Organisatorische Veränderung passiert typischerweise NICHT graduell,
      sondern in SCHÜBEN - ausgelöst durch Krisen oder Transitionen.
      Eine CEO-Transition IST ein solcher Auslöser.

      ABER: Wenn die Honeymoon-Phase verstreicht ohne substantielle
      Veränderung, reassertiert sich Status Quo Bias.

    rbi_application: |
      Die schwierigsten Entscheidungen (Russland-Strategie, Kostenstruktur,
      Organisationsumbau) JETZT treffen, nicht in 12 Monaten.

      Kognitive Mechanik:
      - Monat 1-3: λ_eff ≈ 1.5 (reduziert durch Optimismus)
      - Monat 4-6: λ_eff ≈ 2.0 (normalisiert sich)
      - Monat 7+: λ_eff ≈ 2.25 (volle Loss Aversion)

      → Schmerzhafte Veränderungen in Monat 1-3 kosten
        emotional 33% weniger als in Monat 7+.

  principle_3:
    name: EARLY WINS als neue Referenzpunkte verankern
    mechanism: Reference Point Ratcheting
    description: |
      Jeder Early Win verschiebt den Referenzpunkt NACH OBEN.
      Sobald Mitarbeiter eine Verbesserung erlebt haben,
      wird diese zum neuen Status Quo. Sie wollen sie nicht verlieren.

      Das aktiviert Loss Aversion FÜR die Veränderung:
      «Wir haben jetzt X, und wir wollen X nicht wieder verlieren.»

      Das ist das Gegenteil von Szenario A:
      Statt «wir haben weniger als erwartet» (Verlust)
      → «wir haben jetzt X und wollen es behalten» (Endowment Effect)

    formula: |
      t₀: r₀ = Status Quo (vor CEO-Wechsel)
      t₁: Early Win → r₁ = r₀ + Δ₁ (neuer, höherer Referenzpunkt)
      t₂: Zweiter Win → r₂ = r₁ + Δ₂
      ...
      → Jeder Win ERHÖHT den Referenzpunkt schrittweise
      → Loss Aversion schützt jetzt die Veränderung (nicht den alten Status Quo)

    rbi_application: |
      Monat 1: Quick Win (z.B. vereinfachtes Reporting-Tool)
      Monat 2: Quick Win (z.B. transparente Kommunikation)
      Monat 3: Substantiver Win (z.B. erste Strukturentscheidung)

      Jeder Win wird AKTIV kommuniziert und gefeiert.
      «Das haben wir in 90 Tagen erreicht. Das ist der neue Standard.»

  principle_4:
    name: PRE-COMMITMENT als Erwartungs-Anker
    mechanism: Commitment Device (Thaler & Benartzi 2004)
    description: |
      CEO committed sich ÖFFENTLICH zu spezifischen, messbaren Zielen.
      Das wirkt als doppeltes Commitment Device:

      1. FÜR DEN CEO: Öffentliche Zusage = schwer rückgängig zu machen
         → Überwindet eigenen Present Bias (β = 0.70)
         → Verhindert dass kurzfristige Probleme langfristige Ziele verdrängen

      2. FÜR DIE MITARBEITER: Spezifische Zusage = kalibrierbarer Referenzpunkt
         → «Er hat A, B, C versprochen» statt «er soll alles ändern»
         → Evaluation wird fair: Wurde A, B, C erreicht? Ja/Nein.

    rbi_application: |
      CEO Höllerer kommuniziert im Juli 2026 öffentlich:
      «In 12 Monaten werden wir drei Dinge messbar verändert haben:
      1. [Spezifisches Ziel mit KPI]
      2. [Spezifisches Ziel mit KPI]
      3. [Spezifisches Ziel mit KPI]
      Darüber hinaus arbeiten wir an einer Roadmap für 2027-2028.»

      Das Wort «messbar» ist entscheidend:
      Es transformiert vage Erwartungen in überprüfbare Versprechen.

  principle_5:
    name: SEGMENTIERUNG der Erwartungen
    mechanism: Heterogeneous Reference Points
    description: |
      NICHT alle 43'000 Mitarbeiter haben die GLEICHEN Erwartungen.
      Die Discovery Interviews zeigen ein AGGREGIERTES Bild.
      In Wirklichkeit gibt es mindestens 4 Segmente:

    segments:
      - name: Die Hoffnungsvollen (geschätzt 40%)
        expectation: «Endlich wird alles besser»
        risk: Grösste Enttäuschungsgefahr (λ = 2.5)
        intervention: |
          Spezifizieren (Prinzip 1): Erwartungen kanalisieren
          Early Wins (Prinzip 3): Positive Erfahrungen schaffen
        reference_point: Sehr hoch → muss kalibriert werden

      - name: Die Skeptiker (geschätzt 25%)
        expectation: «Es wird sich sowieso nichts ändern»
        risk: Self-Fulfilling Prophecy (Cynismus → Widerstand)
        intervention: |
          Early Wins (Prinzip 3): Beweise liefern dass Veränderung real ist
          Involvement: In Veränderungsprozesse einbinden
        reference_point: Status Quo → muss erhöht werden

      - name: Die Pragmatiker (geschätzt 25%)
        expectation: «Mal schauen, ich konzentriere mich auf meine Arbeit»
        risk: Passivität (weder Unterstützung noch Widerstand)
        intervention: |
          Commitment Device (Prinzip 4): Klare Erwartungen setzen
          Relevanz herstellen: «Was bedeutet das für DEINE Arbeit?»
        reference_point: Neutral → braucht Aktivierung

      - name: Die Bedrohten (geschätzt 10%)
        expectation: «Der neue CEO wird meinen Bereich umstrukturieren»
        risk: Aktiver Widerstand, Sabotage, Fluktuation
        intervention: |
          Transparenz (Prinzip 4): Klare Kommunikation was sich ändert UND was nicht
          Fairness: Fehr-Schmidt Parameter beachten (α = 0.6)
        reference_point: Negativ → braucht Sicherheit

    implication: |
      One-size-fits-all Kommunikation ist KONTRAPRODUKTIV.
      Jedes Segment braucht eine angepasste Erwartungs-Architektur.
      Die Discovery Interviews liefern die Datenbasis für die Segmentierung.

# =================================================================
# SCHRITT 5: INTERVENTION
# =================================================================

intervention:
  name: RBI Expectation Architecture (REA)
  ten_c_target: [AWARE, WHEN, READY]
  delta_goal: |
    AWARE: A(Erwartungen) ↑ - Mitarbeiter werden sich ihrer eigenen
           Erwartungsverzerrung bewusst
    WHEN: Ψ_T → Honeymoon-Fenster strategisch nutzen
    READY: W_level kalibrieren (nicht senken, KALIBRIEREN)

  phases:
    - phase: 0
      name: Pre-Transition (jetzt bis Juni 2026)
      duration: 4 Monate
      actions:
        - Segmentierung aus Discovery Interviews ableiten
        - TOP 3 Pain Points identifizieren (Grundlage für CEO-Ziele)
        - Kommunikation CEO designatus: «Ich höre zu, ich lerne»
        - NICHT: Versprechungen machen
        - Erwartungs-Baseline messen (Referenzpunkt t₀)
      behavioral_principle: |
        Höllerer ist noch NICHT CEO. Jede Aussage wird interpretiert.
        Optimale Strategie: Zuhören signalisiert Kompetenz und Respekt.
        «Ich kenne RBI, aber ich will von EUCH hören was die
        wichtigsten Themen sind.» → Involvement erhöht Commitment.

    - phase: 1
      name: First 100 Days (Juli - Oktober 2026)
      duration: 100 Tage
      actions:
        - Woche 1-2: CEO-Kommunikation «Die 3 Prioritäten»
        - Woche 3-4: Quick Win #1 (sichtbar, symbolisch)
        - Monat 2: Quick Win #2 + Tiefere Strukturarbeit beginnt
        - Monat 3: Quick Win #3 + Erste Substanz-Entscheidung
        - Tag 100: Transparentes Review - Was erreicht, was nicht, warum
      behavioral_principle: |
        Honeymoon-Fenster ist OFFEN. Loss Aversion temporär reduziert.
        Härteste Entscheidungen JETZT treffen (nicht in Monat 7).
        Quick Wins schaffen neue Referenzpunkte die Lock-In erzeugen.

    - phase: 2
      name: Momentum (November 2026 - März 2027)
      duration: 5 Monate
      actions:
        - Honeymoon endet → Ergebnisse müssen sichtbar sein
        - 3 neue Prioritäten auf Basis der Phase-1-Learnings
        - Skeptiker-Segment mit Evidenz adressieren
        - Commitment Device erneuern: «Das haben wir erreicht.
          DAS sind die nächsten 3 Ziele.»
      behavioral_principle: |
        Loss Aversion normalisiert sich (λ → 2.25).
        Neue Referenzpunkte aus Phase 1 SCHÜTZEN die Veränderung.
        «Wir wollen das Erreichte nicht verlieren» > «Wir wollen mehr.»

    - phase: 3
      name: Institutionalisierung (ab April 2027)
      duration: ongoing
      actions:
        - Veränderungen in Strukturen und Prozesse einbetten
        - Status Quo Bias NUTZEN: Neue Strukturen werden zum Default
        - Systematisches Change Management (keine Honeymoon mehr)
        - Regelmässige Erwartungs-Kalibrierung (jährliche Surveys)
      behavioral_principle: |
        Status Quo Bias arbeitet jetzt FÜR die Veränderung.
        Die neuen Strukturen sind der neue Default.
        Wer zurück will, muss aktiv werden (Opt-Out > Opt-In).

  measurement:
    - metric: Erwartungs-Alignment Score
      method: Survey (Baseline Juni, Follow-up Oktober, Januar, April)
      target: Shift von «alles soll sich ändern» zu «diese Ziele sind klar»
    - metric: Employee Engagement (Honeymoon Decay)
      method: Pulse Survey monatlich
      target: Engagement-Dip nach 6 Monaten < 10% (statt typisch 20-30%)
    - metric: CEO Trust Index
      method: Survey
      target: Stabil über 12 Monate (nicht typischer Honeymoon-Crash)
    - metric: Change Adoption Rate
      method: KPI-Tracking der 3 Prioritäten
      target: ≥2 von 3 Zielen in 12 Monaten erreicht

# =================================================================
# SCHRITT 6: ZUSAMMENFASSUNG
# =================================================================

summary:
  one_sentence: |
    Erwartungen nicht SENKEN sondern SPEZIFIZIEREN - das Honeymoon-Fenster
    für die härtesten Entscheidungen nutzen und Early Wins als neue
    Referenzpunkte verankern die Loss Aversion FÜR die Veränderung aktivieren.

  key_insight: |
    Das zentrale Theorem (Koszegi-Rabin 2006, Schmidt & von Wangenheim 2025):
    Erwartungen SIND der Referenzpunkt. Wenn Erwartungen = «alles», dann ist
    JEDES realistische Ergebnis ein Verlust. Die Lösung ist nicht «weniger
    erwarten» (das tötet Momentum), sondern «ANDERS erwarten»: spezifisch,
    messbar, ambitioniert, sequenziert.

  the_formula: |
    Enttäuschung = λ × max(0, Erwartung - Realität)

    Wenn Erwartung = «alles»: Enttäuschung = λ × ∞ = garantiert
    Wenn Erwartung = «3 Ziele»: Enttäuschung = λ × max(0, 3 - Erreichte)
    → Bei 2 von 3 erreicht: Enttäuschung = 2.25 × 1 = 2.25 (manageable)
    → Bei 3 von 3 erreicht: Enttäuschung = 0, PLUS Gewinn-Erlebnis

  five_principles_summary:
    - Prinzip 1: SPEZIFIZIEREN statt SENKEN (Referenzpunkt kalibrieren)
    - Prinzip 2: HONEYMOON für das HÄRTESTE nutzen (λ ist temporär reduziert)
    - Prinzip 3: EARLY WINS als neue Referenzpunkte (Lock-In für Veränderung)
    - Prinzip 4: PRE-COMMITMENT als Erwartungs-Anker (Commitment Device)
    - Prinzip 5: SEGMENTIERUNG der Erwartungen (4 Segmente, 4 Strategien)

