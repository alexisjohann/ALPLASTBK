# ============================================================
# TEIL 3: STRATEGISCHE GESPRÄCHSFÜHRUNG
# ============================================================

meeting_strategy:
  positioning: |
    BEATRIX als nächste Evolutionsstufe nach RBI's internem ChatGPT:
    - RBI hat ChatGPT für Produktivität → BEATRIX für Entscheidungsqualität
    - RBI hat AI Champions → BEATRIX liefert verhaltensökonomische Evidenz
    - RBI hat 16.5M Kunden → BEATRIX optimiert Kundeninteraktion

  key_messages:
    - id: MSG-01
      message: |
        «RBI hat mit dem internen ChatGPT bewiesen, dass AI-Adoption funktioniert.
        BEATRIX geht einen Schritt weiter: Statt Dokumente zusammenzufassen,
        analysiert es WARUM Kunden sich so verhalten wie sie es tun.»
    - id: MSG-02
      message: |
        «In 11 CEE-Märkten mit 16.5M Kunden ist Kontext ALLES.
        Was in Österreich funktioniert, kann in Tschechien scheitern.
        BEATRIX modelliert diese Kontextunterschiede systematisch.»
    - id: MSG-03
      message: |
        «RBI's AI-Champions verstehen Technologie. BEATRIX gibt ihnen
        das verhaltensökonomische Wissen - evidenzbasiert, nicht Bauchgefühl.»

  tailored_per_participant:
    armin_woworsky:
      angle: Technical Integration & Architecture
      talking_points:
        - BEATRIX als API-Layer über bestehende Azure-Infrastruktur
        - Kompatibilität mit Azure OpenAI (gleicher Tech-Stack)
        - Datenintegration mit bestehendem Data Warehouse
        - Skalierbarkeit über 11 Märkte
        - Konkrete Use Cases für Technology Guidance
      avoid:
        - Zu viel Marketing-Sprache (er ist Ingenieur)
        - Versprechungen ohne technische Substanz
      recommended_demo: |
        Live-Demo einer Kontextanalyse: Gleiche Kundenentscheidung in
        AT vs. CZ vs. RO → unterschiedliche Verhaltensparameter

    aleksandra_petkov_georgieva:
      angle: Innovation Impact & Corporate Transformation
      talking_points:
        - BEATRIX als Innovation-Tool (nicht nur Consulting)
        - Von «PowerPoint zu real value» (ihr eigenes Zitat nutzen)
        - Intrapreneurship-Enabler für RBI-Teams
        - Messbare Verhaltensänderung statt Innovation-Theater
        - Passt zum ELEVATE Accelerator Mindset
      avoid:
        - Zu akademisch/theoretisch (sie will Impact)
        - Langwierige Framework-Erklärungen
      recommended_demo: |
        Case Study: Wie BEATRIX eine konkrete Kundeninteraktion
        verbessert hat (z.B. Hypothekenberatung, Onboarding)

  opportunities:
    - id: OPP-01
      name: BEATRIX Pilot (1 Markt)
      description: |
        Pilotierung in einem CEE-Markt (z.B. Tschechien oder Slowakei)
        für ein spezifisches Kundenproblem (z.B. Digital Onboarding,
        Kreditentscheidung, Nachhaltigkeitsprodukte)
      estimated_value_eur: 50000-80000
      probability_note: Einstieg über Innovation Team (Aleks)

    - id: OPP-02
      name: BEATRIX Enterprise (Multi-Market)
      description: |
        Ausrollung über mehrere CEE-Märkte nach erfolgreichem Pilot.
        Integration in bestehende AI-Infrastruktur (Azure).
      estimated_value_eur: 150000-300000
      probability_note: Abhängig von Pilot-Ergebnissen

    - id: OPP-03
      name: Behavioral AI Advisory
      description: |
        Beratung zur Integration verhaltensökonomischer Modelle
        in RBI's bestehende AI-Tools (ChatGPT, Copilot, Sentiment).
      estimated_value_eur: 80000-120000
      probability_note: Komplementär zu BEATRIX

  risks:
    - risk: Russland-Thema dominiert interne Agenda
      mitigation: Fokus auf CEE-Kerngeschäft (exkl. RU) - dort liegt das Wachstum
    - risk: Vorstandswechsel (Strobl → Höllerer) führt zu Verzögerungen
      mitigation: Höllerer ist seit Januar designiert, Strategie steht. Innovation-Team unabhängig.
    - risk: Budget-Restriktionen durch Russland-Rückstellungen
      mitigation: BEATRIX-Pilot ist vergleichsweise günstig (50-80k). ROI-Argumentation vorbereiten.
    - risk: Technische Komplexität (11 Märkte, verschiedene Regulierungen)
      mitigation: Genau das ist EBF's Stärke - Kontextuelle Parametrisierung pro Markt

  ebf_relevance:
    psi_dimensions:
      Psi_I: FINMA-äquivalent (FMA Österreich) + 11 nationale Regulierungen
      Psi_S: Genossenschaftliche Eigentümerstruktur (Raiffeisen-Tradition)
      Psi_K: CEE-Diversität (AT, CZ, SK, HU, RO, BG, HR, RS, BA, AL, BY)
      Psi_E: Breite Kundenstruktur (Retail + Corporate + Institutional)
      Psi_T: Vorstandswechsel 2026, Post-Russia Strategiephase
      Psi_M: Azure-basierte AI-Infrastruktur (20'000+ User)
      Psi_F: 11 Märkte, physische + digitale Kanäle

