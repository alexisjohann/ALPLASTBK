# ============================================================
# EMPFOHLENE MEETING-STRUKTUR (90 Minuten)
# ============================================================

meeting_structure:
  total_duration: 90min
  blocks:
    - block: 1
      title: Einstieg - Warum Kontext alles verändert
      duration: 15min
      case: CAS-888
      reason: |
        Aleksandra kommt aus Innovation - sie will Impact sehen.
        CAS-888 (Plattform-Kunden) zeigt in 5 Minuten:
        - Konkrete Zahlen (3.6% Conversion-Funnel)
        - Timing-Effekt (Honeymoon-Phase Monat 1-3)
        - Direkte Umsatzrelevanz für Digital Banking
      hook_for_aleksandra: |
        «Stellt euch vor: Ihr gewinnt 100 Plattform-Kunden.
        Ohne Intervention bleiben 96 davon reine Hypothekenkunden.
        Mit der richtigen Intervention im richtigen Moment
        verdreifacht sich der Revenue pro Kunde.»

    - block: 2
      title: Deep Dive - SME Banking & Mental Accounting
      duration: 20min
      case: CAS-886
      reason: |
        RBI hat 11 Märkte mit KMU-Kunden. CAS-886 zeigt:
        - Warum Unternehmer Privat- und Firmenkonto trennen
        - Mental Accounting erklärt 35% des Verhaltens
        - Reframing-Intervention mit messbarem Effekt
      hook_for_aleksandra: |
        «Eure KMU-Kunden in Tschechien verhalten sich
        ANDERS als in Österreich - aber der MECHANISMUS
        (Mental Accounting) ist derselbe. Das ist der Punkt:
        Wir verstehen das WARUM, nicht nur das WAS.»

    - block: 3
      title: Lifecycle Revenue - Die grösste Chance
      duration: 20min
      case: CAS-889
      reason: |
        Generation X (45-60) ist die profitabelste Kohorte.
        CAS-889 zeigt +180% Revenue-Potenzial.
        Für RBI mit 16.5M Kunden ist das massiv.
      hook_for_aleksandra: |
        «Gen X hat das höchste Einkommen, die komplexesten
        Bedürfnisse, aber den niedrigsten Share-of-Wallet.
        In euren 11 Märkten sind das Millionen von Kunden
        die ihr untermonetarisiert.»

    - block: 4
      title: Default Power - Der mächtigste Hebel
      duration: 15min
      cases:
        - CAS-002
        - CAS-003
      reason: |
        Defaults sind der stärkste Nudge. CAS-002 zeigt
        50% → 90% Participation nur durch Opt-Out.
        Für RBI's Produktenrollment, Investment-Defaults,
        und Digital Onboarding direkt anwendbar.
      hook_for_aleksandra: |
        «Ein einziger Default-Wechsel - von Opt-In zu Opt-Out -
        kann die Nutzungsrate eines Produkts verdoppeln.
        Ohne zusätzliche Kosten. Ohne Marketing-Budget.
        Nur durch besseres Design.»

    - block: 5
      title: Cross-Cultural - Der RBI-Trumpf
      duration: 15min
      cases:
        - CAS-885
        - CAS-881
      reason: |
        RBI's einzigartiger Vorteil: 11 Märkte.
        CAS-885 zeigt dass Self-Control MESSBAR variiert
        zwischen Ländern. CAS-881 zeigt Fairness-Unterschiede.
        Das ist der BEATRIX-Pitch: Kontextuelle Parametrisierung.
      hook_for_aleksandra: |
        «Was in Wien funktioniert, kann in Bukarest scheitern.
        Nicht weil die Menschen anders sind - sondern weil
        der KONTEXT anders ist. Genau das modellieren wir.
        Für jedes eurer 11 Märkte. Evidenzbasiert.»

    - block: 6
      title: Wrap-up & Next Steps
      duration: 5min
      content: |
        - Zusammenfassung der 3 stärksten Cases
        - Konkreter nächster Schritt (Pilot in 1 Markt?)
        - Follow-up mit Armin (technische Integration)

# ============================================================
# CASE DETAILS (für Vorbereitung)
# ============================================================

cases:

  # --- TIER 1: BANKING-SPEZIFISCHE CASES ---

  - id: CAS-888
    name: Plattform-Kunden Cross-Selling
    tier: 1_critical
    domain: Finance, Digital Banking, Cross-Selling
    one_liner: |
      Honeymoon-Phase Monat 1-3 entscheidet über Kundenbeziehung
    key_numbers:
      conversion_funnel: 0.036  # 3.6% ohne Intervention
      honeymoon_window: 1-3 Monate
      stages: 5  # Welcome → Contact → Account → Bundle → Pre-Renewal
      gamma: 0.65  # Journey-driven complementarity
    rbi_application: |
      - Digital Onboarding in allen 11 Märkten
      - Plattform-Kunden (Hypothek-only) zu Full-Relationship
      - Integration mit bestehendem CRM / AI-Tools
      - A/B-Testing über Azure-Infrastruktur möglich

  - id: CAS-886
    name: Unternehmer Bank-Trennung (SME Mental Accounting)
    tier: 1_critical
    domain: Finance, SME, Regional Banking
    one_liner: |
      Mental Accounting erklärt warum KMU-Inhaber Banken splitten
    key_numbers:
      mental_accounting_share: 0.35  # 35% Erklärungsanteil
      loss_aversion: 0.08
      control_illusion: 0.20
      gamma: 0.55
    rbi_application: |
      - Corporate Banking Strategie für KMU-Segment
      - Reframing: Gesamtbeziehung vs. isolierte Produkte
      - Cross-Selling Corporate ↔ Private Banking
      - In 11 Märkten: Gleicher Mechanismus, andere Ausprägung

  - id: CAS-889
    name: Generation X Revenue Maximierung
    tier: 1_critical
    domain: Finance, Wealth Management, Lifecycle
    one_liner: |
      +180% Revenue pro Gen-X Kunde möglich (7'600 → 21'300 CHF)
    key_numbers:
      current_share_of_wallet: 0.35  # 35%
      revenue_current: 7600  # CHF
      revenue_potential: 21300  # CHF
      uplift: 1.80  # +180%
      segments: 4  # Sandwich, Peak Earners, Future Planners, Delegators
      gamma: 0.50
    rbi_application: |
      - Wealth Management Strategie für 45-60 Kohorte
      - 5 bestehende + 5 neue Revenue-Bereiche
      - Lifecycle-Banking über Generationen
      - Segmentspezifische Ansprache (4 Typen)

  - id: CAS-887
    name: Zweitwohnungsbesitzer (Cross-Border Mortgages)
    tier: 1_critical
    domain: Finance, Mortgages, Cross-Border
    one_liner: |
      Timing-Mismatch: Kunden entscheiden VOR dem Bankbesuch
    key_numbers:
      switching_cost_tau: 0.70
      segment_count: 4  # Convenience 40%, Mountain 25%, Prestige 20%, Legacy 15%
      gamma: 0.50
    rbi_application: |
      - Cross-Border Immobilienfinanzierung in CEE
      - Proaktive Outreach-Strategie statt reaktiv
      - Timing der Kundenansprache optimieren
      - Segment-spezifische Wertversprechen

  # --- TIER 2: MECHANISMEN-CASES ---

  - id: CAS-002
    name: Automatische Altersvorsorge (Opt-Out Default)
    tier: 2_mechanism
    domain: Finance, Retirement
    one_liner: |
      Opt-Out erhöht Teilnahme von 50% auf 90%+
    key_numbers:
      opt_in_rate: 0.50
      opt_out_rate: 0.90
      theta_default: 0.30  # Status quo bias strength
    rbi_application: |
      - Pension-Produkte Default-Enrollment
      - Investment-Defaults bei Kontoeröffnung
      - Insurance-Produkte Auto-Enrollment
      - Digital Onboarding Default-Settings

  - id: CAS-006
    name: SEED Account (Commitment Savings)
    tier: 2_mechanism
    domain: Finance, Savings, Self-Control
    one_liner: |
      Commitment-Devices erhöhen Sparquote um 80%
    key_numbers:
      savings_increase: 0.80  # +80%
      w_level: 0.55
      theta: 0.50
    rbi_application: |
      - Savings-Produkte mit Commitment-Feature
      - Segmentierung: sophisticated vs. naive Sparer
      - Digitale Spar-Challenges / Rundungs-Sparen
      - Awareness-basierte Produktzuweisung

  - id: CAS-003
    name: Organspende (Default-Power Demonstration)
    tier: 2_mechanism
    domain: Policy (aber gleicher Mechanismus)
    one_liner: |
      Default-Dominanz wenn θ>0.7 und Awareness<0.3
    key_numbers:
      theta_high: 0.80
      awareness_low: 0.20
    rbi_application: |
      - Zeigt universelle Kraft von Defaults
      - Übertragbar auf jede Enrollment-Entscheidung
      - Cross-Domain Analogie für Aleksandra (Innovation)

  # --- TIER 3: CROSS-CULTURAL / MULTI-MARKET ---

  - id: CAS-885
    name: Global Variation in Self-Control
    tier: 3_crosscultural
    domain: Psychology, Cross-Cultural (61 Länder, N>13'000)
    one_liner: |
      Self-Control variiert messbar zwischen Ländern (μ=3.2, σ²=0.8)
    key_numbers:
      countries: 61
      sample_size: 13000
      mean_sc: 3.2
      variance: 0.8
    rbi_application: |
      - Kalibrierung der READY-Dimension pro CEE-Markt
      - Spar- und Kredit-Verhalten variiert mit Self-Control
      - Produktdesign anpassen pro Markt
      - Evidenz für kontextuelle Parametrisierung

  - id: CAS-881
    name: Inequity Aversion & Fairness-Präferenzen
    tier: 3_crosscultural
    domain: Inequality, Policy (N>3'000 CH)
    one_liner: |
      Nachteilige Ungleichheit (α=0.85) >> Vorteilige (β=0.45)
    key_numbers:
      alpha_disadvantageous: 0.85
      beta_advantageous: 0.45
    rbi_application: |
      - Pricing-Fairness in verschiedenen Märkten
      - Gebührenstrukturen und Wahrnehmung
      - Inclusive Banking Policies für CEE
      - Kommunikation von Preisänderungen

  - id: CAS-910
    name: Customer Journey Segmentation & Loyalty
    tier: 3_crosscultural
    domain: Retail, CX, Loyalty (DACH, N=5'092)
    one_liner: |
      Loyalty-Pfade radikal unterschiedlich nach Segment
    key_numbers:
      sample_size: 5092
      segments: 5
      journey_satisfaction_beta: 0.58  # Multi-touchpoint shoppers
      product_satisfaction_beta: 0.40  # Store-focused
    rbi_application: |
      - Omnichannel-Banking Strategie
      - Segment-spezifische Loyalty-Programme
      - Digital vs. Branch Customer Experience
      - One-size-fits-all ist ineffektiv (bewiesen)

