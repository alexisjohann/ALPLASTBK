# =============================================================================
# PROJEKTBESCHREIBUNG
# =============================================================================
description:
  summary: |
    Entscheidungsmodell zur Priorisierung des politischen Engagements von
    economiesuisse über verschiedene Abstimmungen hinweg.

  context: |
    Economiesuisse steht vor der Herausforderung, begrenzte Ressourcen
    (Budget, Personal, politisches Kapital) über mehrere parallele
    Abstimmungen zu verteilen. Die Komplexität entsteht durch heterogene
    Stakeholder-Interessen und Interdependenzen zwischen Vorlagen.

  objectives:
    - Priorisierung nach strategischem Wert und Risiko
    - Berücksichtigung interner Stakeholder-Heterogenität
    - Identifikation von Spillover-Effekten
    - Optimale Ressourcen-Allokation

