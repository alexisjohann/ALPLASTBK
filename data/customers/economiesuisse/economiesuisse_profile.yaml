# =============================================================================
# Ψ-DIMENSIONEN (Politischer Kampagnen-Kontext)
# =============================================================================

psi_dimensions:

  psi_I_institutional:
    value: 0.95
    label: "Institutionell"
    description: |
      Schweizer direkte Demokratie mit hoher institutioneller Stabilität.
      Abstimmungen folgen klaren Regeln (Sammelfrist, Abstimmungstermine).
      Starke Tradition der Vernehmlassung und Konsenssuche.
    key_factors:
      - "Direkte Demokratie (Volksinitiative, Referendum)"
      - "Konkordanzsystem"
      - "Föderalismus (Kantone als Multiplikatoren)"
    ebf_kappa: "kappa_INST"

  psi_S_social:
    value: 0.75
    label: "Sozial"
    description: |
      Starke regionale und sprachliche Identitäten.
      Rösti-Graben bei Wirtschaftsthemen weniger ausgeprägt.
      Peer Effects in ländlichen vs. urbanen Gebieten unterschiedlich.
    key_factors:
      - "Regionale Identität (Stadt/Land)"
      - "Sprachregionen (DE/FR/IT)"
      - "Berufsgruppen-Solidarität"
    ebf_kappa: "kappa_SOCIAL"

  psi_C_cognitive:
    value: 0.55
    label: "Kognitiv"
    description: |
      Komplexe Abstimmungsvorlagen erfordern hohe kognitive Verarbeitung.
      Tendenz zu Status-Quo-Bias bei Unsicherheit.
      Informationsasymmetrie zwischen Experten und Stimmbürgern.
    key_factors:
      - "Abstimmungskomplexität"
      - "Medienkonsum-Muster"
      - "Politische Bildung"
    ebf_kappa: "kappa_COG"

  psi_K_cultural:
    value: 0.70
    label: "Kulturell"
    description: |
      Schweizerische Werte: Unabhängigkeit, Neutralität, Wohlstand.
      Skepsis gegenüber Masseneinwanderung (historisch).
      Aber auch: Offenheit für Wirtschaft, Pragmatismus.
    key_factors:
      - "Unabhängigkeits-Narrativ"
      - "Wohlstands-Erhalt"
      - "Identitätspolitik (wer ist 'Schweizer'?)"
    ebf_kappa: "kappa_CULT"

  psi_E_economic:
    value: 0.80
    label: "Ökonomisch"
    description: |
      Wirtschaftliche Argumente haben hohes Gewicht.
      Arbeitsplatz-Argument traditionell stark.
      Aber: Wohnungsmarkt, Infrastruktur als Gegenargumente.
    key_factors:
      - "Arbeitsplatz-Sicherheit"
      - "Wohnungsmarkt-Druck"
      - "Infrastruktur-Kapazität"
    ebf_kappa: "kappa_ECON"

  psi_T_temporal:
    value: 0.65
    label: "Temporal"
    description: |
      Abstimmungskampagnen haben festen Zeithorizont.
      Meinungsbildung oft in letzten 4-6 Wochen.
      Langfristige Konsequenzen schwer kommunizierbar.
    key_factors:
      - "Kampagnen-Timing (6-8 Wochen)"
      - "Medienzyklen"
      - "Saisonalität (Sommerloch, Ferienzeit)"
    ebf_kappa: "kappa_TEMP"

  psi_M_material:
    value: 0.70
    label: "Materiell/Technologisch"
    description: |
      Mix aus traditionellen und digitalen Kanälen.
      Abstimmungsbüchlein (bundesrat) als Referenz.
      Social Media zunehmend wichtig, aber nicht dominant.
    key_factors:
      - "Abstimmungsbüchlein"
      - "TV-Sendungen (Arena, etc.)"
      - "Social Media (Facebook, X, Instagram)"
      - "Plakate & Inserate"
    ebf_kappa: "kappa_MAT"

  psi_F_physical:
    value: 0.60
    label: "Physisch"
    description: |
      Briefwahl dominant (>90%).
      Physische Events (Podien) noch relevant aber rückläufig.
      Stimmlokal-Besuche selten.
    key_factors:
      - "Briefwahl-Dominanz"
      - "Podiumsdiskussionen"
      - "Standaktionen"
    ebf_kappa: "kappa_PHYS"

# =============================================================================
# STAKEHOLDER-SEGMENTE (Politischer Kontext)
# =============================================================================

stakeholder_segments:

  - id: "SEG-WIRTSCHAFT"
    name: "Wirtschaftsnahe Stimmbürger"
    description: "Unternehmer, Kaderleute, FDP/Mitte-Wähler"
    share: 0.25
    position_10mio: "Nein"
    persuadability: 0.10  # Bereits überzeugt

    behavioral_parameters:
      lambda_loss_aversion: 2.20
      beta_present_bias: 0.88
      kappa_default_sensitivity: 0.55
      sigma_social_proof: 0.45

    key_arguments:
      effective:
        - "Fachkräftemangel"
        - "Wirtschaftswachstum"
        - "Bilaterale Verträge"
      ineffective:
        - "Emotionale Appelle"

  - id: "SEG-MITTE"
    name: "Unentschlossene Mitte"
    description: "Swing-Voters, pragmatisch, abwägend"
    share: 0.30
    position_10mio: "Unentschieden"
    persuadability: 0.70  # Kernzielgruppe!

    behavioral_parameters:
      lambda_loss_aversion: 2.50
      beta_present_bias: 0.82
      kappa_default_sensitivity: 0.75
      sigma_social_proof: 0.65

    key_arguments:
      effective:
        - "Konkrete Zahlen & Fakten"
        - "Lokale Beispiele"
        - "Kompromiss-Narrative"
      ineffective:
        - "Extreme Positionen"
        - "Reine Wirtschaftsargumente"

  - id: "SEG-BESORGT"
    name: "Besorgte Mitte"
    description: "Sorgen um Wohnungsmarkt, Infrastruktur, Identität"
    share: 0.25
    position_10mio: "Tendenz Ja"
    persuadability: 0.40

    behavioral_parameters:
      lambda_loss_aversion: 2.80
      beta_present_bias: 0.78
      kappa_default_sensitivity: 0.80
      sigma_social_proof: 0.70

    key_arguments:
      effective:
        - "Verständnis für Sorgen zeigen"
        - "Konkrete Lösungsvorschläge"
        - "Lokale Kontrolle betonen"
      ineffective:
        - "Belehrend"
        - "Wirtschafts-Technokratie"

  - id: "SEG-SVP"
    name: "SVP-Kernwähler"
    description: "Überzeugte Befürworter der Initiative"
    share: 0.20
    position_10mio: "Ja"
    persuadability: 0.05  # Kaum überzeugbar

    behavioral_parameters:
      lambda_loss_aversion: 3.00
      beta_present_bias: 0.75
      kappa_default_sensitivity: 0.85
      sigma_social_proof: 0.80

    key_arguments:
      effective:
        - "Nicht Zielgruppe für Nein-Kampagne"
      ineffective:
        - "Wirtschaftsargumente"
        - "Internationale Verpflichtungen"

# =============================================================================
# AGGREGIERTE VERHALTENSPARAMETER
# =============================================================================

behavioral_parameters_aggregate:

  core_parameters:
    loss_aversion:
      symbol: "lambda"
      value: 2.55
      range: [2.20, 3.00]
      source: "Segment-gewichteter Durchschnitt"
      note: "Hoch - Verlustangst dominiert Abstimmungsverhalten"

    present_bias:
      symbol: "beta"
      value: 0.82
      range: [0.75, 0.88]
      source: "Segment-gewichteter Durchschnitt"
      note: "Kurzfristige Auswirkungen überbetont"

    default_sensitivity:
      symbol: "kappa_default"
      value: 0.72
      range: [0.55, 0.85]
      source: "Segment-gewichteter Durchschnitt"
      note: "Status-Quo-Bias bei komplexen Vorlagen"

    social_proof:
      symbol: "sigma_social"
      value: 0.62
      range: [0.45, 0.80]
      source: "Segment-gewichteter Durchschnitt"
      note: "Peer Effects regional unterschiedlich"

  # Politikspezifische Parameter
  political_parameters:
    status_quo_bias:
      symbol: "kappa_SQ"
      value: 0.65
      note: "Tendenz zur Ablehnung von Initiativen"

    information_asymmetry:
      symbol: "delta_info"
      value: 0.55
      note: "Expertenposition vs. Bauchgefühl"

    emotional_reactance:
      symbol: "rho_react"
      value: 0.40
      note: "Widerstand gegen als manipulativ empfundene Kampagnen"

