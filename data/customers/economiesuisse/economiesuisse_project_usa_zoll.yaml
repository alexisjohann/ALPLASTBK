# =============================================================================
# PROJEKTBESCHREIBUNG
# =============================================================================
description:
  summary: |
    Prognose des politischen Prozesses für das Schweiz-USA Zollabkommen 2026.
    Drei-Stufen-Analyse: Parlament → Referendum → Volksabstimmung.

  context: |
    Am 14. November 2025 verkündeten die Schweiz und USA eine Einigung im
    Zollstreit (Reduktion von 39% auf 15%). Der Deal ist kontrovers aufgrund
    der «Gold Bar Diplomacy» - Geschenke an Trump vor dem Deal.

  objectives:
    - Prognose der Parlamentsabstimmung (National- und Ständerat)
    - Einschätzung der Referendum-Wahrscheinlichkeit
    - Prognose einer möglichen Volksabstimmung
    - Identifikation von Pivotal Agents

# =============================================================================
# TIMELINE
# =============================================================================
timeline:
  - date: '2025-11-04'
    event: "Schweizer Wirtschaftsdelegation bei Trump (Gold Bar Diplomacy)"

  - date: '2025-11-14'
    event: "Deal verkündet: 39% → 15% Zölle"

  - date: '2025-12-XX'
    event: "APK-Abstimmungen: NR 17:2:5, SR einstimmig"

  - date: '2026-01-14'
    event: "Bundesrat verabschiedet Verhandlungsmandat"

  - date: '2026-03-31'
    event: "Deadline für verbindlichen Vertrag"
    deadline: true

  - date: '2026-Q2'
    event: "Parlamentsabstimmung (erwartet)"
    forecast: true

  - date: '2026-Q3-Q4'
    event: "Mögliche Volksabstimmung"
    forecast: true
    conditional: "Falls Referendum zustande kommt"

