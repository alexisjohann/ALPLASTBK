# =============================================================================
# ECONOMIESUISSE Unternehmenskontextvektor: Master-Übersicht
# =============================================================================
# Version: 1.0
# Quelle: FehrAdvice Unternehmenskontextvektor-Architektur 2026
# Letzte Aktualisierung: 2026-01-30
# CVA-Stufe: STANDARD (400 Faktoren)
# EBF-Relevanz: Alle Ψ-Dimensionen für Verbandskontext
# =============================================================================

metadata:
  name: "economiesuisse Verbandskontextvektor Master-Übersicht"
  code: "BCM2_ORG_ECOS"
  version: "1.0"
  total_factors: 400
  sub_axes: 40
  main_axes: 8
  cva_stufe: "STANDARD"
  description: |
    Vollständige Faktorenstruktur für den Dachverband der Schweizer Wirtschaft.
    Angepasst für Verbandskontext: Politik, Kampagnen, Mitglieder statt
    Finanzkennzahlen und Kundenprodukte.
  quantitative_coverage: "85% - Kernfaktoren vollständig, Details teilweise geschätzt"
  template_source: "BCM2_04_KON (Schweizer Kontextvektor)"

# =============================================================================
# ORGANISATION BASICS
# =============================================================================
organisation:
  name_de: "economiesuisse - Verband der Schweizer Unternehmen"
  name_short: "economiesuisse"
  type: "Wirtschafts-Dachverband"
  legal_form: "Verein (ZGB Art. 60ff)"
  founded: 2000
  headquarters: "Zürich"
  employees: 100
  member_associations: 100
  member_companies_indirect: 100000
  annual_budget_chf_mio: 25

# =============================================================================
# DATENQUELLEN-ÜBERSICHT
# =============================================================================
data_sources:
  summary:
    primary_sources: 6
    secondary_sources: 10
    internal_systems: 5
    time_horizon: "2020-2030"
    update_frequency: "quarterly"

  primary_internal:
    - name: "economiesuisse Jahresberichte"
      coverage: "Finanzen, Aktivitäten, Mitglieder"
      factors_covered: 80

    - name: "Abstimmungs-Tracking-System"
      coverage: "Kampagnen, Resultate, Ausgaben"
      factors_covered: 60

    - name: "Mitgliederdatenbank"
      coverage: "Verbände, Kontakte, Engagement"
      factors_covered: 50

  primary_external:
    - name: "BFS Abstimmungsstatistik"
      url: "https://www.bfs.admin.ch"
      coverage: "Abstimmungsresultate, Stimmbeteiligung"
      factors_covered: 40

    - name: "gfs.bern / Sotomo"
      coverage: "Umfragen, Meinungsforschung"
      factors_covered: 30

    - name: "Parlamentsdienste"
      url: "https://www.parlament.ch"
      coverage: "Vernehmlassungen, Vorstösse"
      factors_covered: 40

  secondary:
    - name: "Medienresonanz-Analyse (Argus, etc.)"
    - name: "Social Media Analytics"
    - name: "NZZ, Tagesanzeiger, 20min"
    - name: "SRF Arena Tracking"
    - name: "Lobbywatch.ch"
    - name: "Smartvote"

# =============================================================================
# GESAMTÜBERSICHT: 8 Hauptachsen = 400 Faktoren
# =============================================================================
overview:
  total_factors: 400
  total_sub_axes: 40
  quantitative_status: "85% vollständig"

  main_axes:
    - name: "Finanzen & Ressourcen"
      code: "FIN"
      factors: 50
      percentage: 12.5
      sub_axes: 5
      description: "Budget, Mitgliederbeiträge, Sponsoring, Personalkosten"
      data_coverage: "Jahresberichte, Budgetplanung"
      file: "economiesuisse_context_fin_financial.yaml"

    - name: "Politik & Einfluss"
      code: "POL"
      factors: 60
      percentage: 15
      sub_axes: 6
      description: "Lobbying, Vernehmlassungen, Parlamentskontakte, Bundesratszugang"
      data_coverage: "Parlamentsdienste, Lobbywatch, interne Tracking"
      file: "economiesuisse_context_pol_political.yaml"

    - name: "Organisation & Governance"
      code: "ORG"
      factors: 40
      percentage: 10
      sub_axes: 4
      description: "Vorstand, Geschäftsleitung, Gremien, Prozesse"
      data_coverage: "Statuten, Organigramme, Governance-Dokumente"
      file: "economiesuisse_context_org_governance.yaml"

    - name: "Strategie & Positionierung"
      code: "STR"
      factors: 40
      percentage: 10
      sub_axes: 4
      description: "Strategische Themen, Positionierungen, Prioritäten"
      data_coverage: "Strategiepapiere, Positionspapiere"
      file: "economiesuisse_context_str_strategy.yaml"

    - name: "Mitglieder & Netzwerk"
      code: "MEM"
      factors: 60
      percentage: 15
      sub_axes: 6
      description: "Mitgliederverbände, Unternehmen, Engagement, Zufriedenheit"
      data_coverage: "Mitgliederdatenbank, Umfragen"
      file: "economiesuisse_context_mem_members.yaml"

    - name: "Kommunikation & Medien"
      code: "COM"
      factors: 50
      percentage: 12.5
      sub_axes: 5
      description: "Medienarbeit, Social Media, Events, Publikationen"
      data_coverage: "Medienanalysen, Social Media Analytics"
      file: "economiesuisse_context_com_communication.yaml"

    - name: "Stakeholder & Partner"
      code: "STK"
      factors: 40
      percentage: 10
      sub_axes: 4
      description: "Bundesrat, Parlament, Kantone, andere Verbände, International"
      data_coverage: "Stakeholder-Mapping, Beziehungspflege"
      file: "economiesuisse_context_stk_stakeholder.yaml"

    - name: "Kampagnen & Abstimmungen"
      code: "CAM"
      factors: 60
      percentage: 15
      sub_axes: 6
      description: "Abstimmungskampagnen, Initiativen, Referenden, Erfolgsquoten"
      data_coverage: "BFS, Kampagnen-Tracking, Nachanalysen"
      file: "economiesuisse_context_cam_campaigns.yaml"

# =============================================================================
# EBF Ψ-DIMENSION MAPPING
# =============================================================================
psi_mapping:
  psi_I_institutional:
    primary_axes: ["POL", "ORG"]
    description: "Politische Institutionen, Verbandsstrukturen"
    key_factors:
      - "POL-LOB-001: Parlamentskontakte"
      - "POL-VER-001: Vernehmlassungs-Erfolgsquote"
      - "ORG-GOV-001: Vorstandsstruktur"

  psi_S_social:
    primary_axes: ["MEM", "STK"]
    description: "Mitglieder-Netzwerk, Stakeholder-Beziehungen"
    key_factors:
      - "MEM-VER-001: Mitgliederverbände"
      - "STK-POL-001: Bundesratskontakte"
      - "MEM-ENG-001: Mitglieder-Engagement"

  psi_K_cultural:
    primary_axes: ["STR", "COM"]
    description: "Wirtschaftsliberale Werte, Kommunikationskultur"
    key_factors:
      - "STR-POS-001: Kernpositionierungen"
      - "COM-NAR-001: Narrative & Framing"

  psi_C_cognitive:
    primary_axes: ["CAM", "COM"]
    description: "Abstimmungskomplexität, Informationsverarbeitung"
    key_factors:
      - "CAM-MSG-001: Message Complexity"
      - "COM-SAL-001: Salience Score"

  psi_E_economic:
    primary_axes: ["FIN", "MEM"]
    description: "Ressourcen, Mitgliederbeiträge, Kampagnenbudgets"
    key_factors:
      - "FIN-BUD-001: Jahresbudget"
      - "CAM-BUD-001: Kampagnenbudgets"

  psi_T_temporal:
    primary_axes: ["CAM", "STR"]
    description: "Abstimmungskalender, Strategiezyklen"
    key_factors:
      - "CAM-TIM-001: Abstimmungskalender"
      - "STR-HOR-001: Strategiehorizont"

  psi_M_material:
    primary_axes: ["COM", "CAM"]
    description: "Kommunikationskanäle, Kampagneninfrastruktur"
    key_factors:
      - "COM-CHA-001: Kanalportfolio"
      - "CAM-INF-001: Kampagneninfrastruktur"

  psi_F_physical:
    primary_axes: ["ORG", "COM"]
    description: "Standorte, Events, physische Präsenz"
    key_factors:
      - "ORG-STA-001: Standorte"
      - "COM-EVT-001: Event-Kalender"

