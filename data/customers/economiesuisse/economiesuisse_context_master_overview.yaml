# =============================================================================
# AGGREGIERTE VERHALTENSPARAMETER
# =============================================================================
behavioral_parameters:
  aggregate:
    loss_aversion:
      symbol: "λ"
      value: 2.55
      range: [2.20, 3.00]
      note: "Stimmbürger-Durchschnitt, relevant für Kampagnen"

    present_bias:
      symbol: "β"
      value: 0.82
      range: [0.75, 0.88]
      note: "Kurzfristorientierung in Abstimmungen"

    status_quo_bias:
      symbol: "κ_SQ"
      value: 0.65
      range: [0.55, 0.75]
      note: "Tendenz zur Ablehnung von Initiativen"

    social_proof:
      symbol: "σ"
      value: 0.62
      range: [0.45, 0.80]
      note: "Peer-Einfluss, regional unterschiedlich"

  campaign_specific:
    campaign_effectiveness_nein:
      symbol: "α_nein"
      value: 0.015
      note: "Effekt pro CHF 1 Mio Kampagnenausgaben"

    campaign_effectiveness_ja:
      symbol: "α_ja"
      value: 0.012
      note: "Initianten typischerweise weniger effektiv"

    media_sensitivity:
      symbol: "β_media"
      value: 0.008
      note: "Einfluss Medienberichterstattung"

