# =============================================================================
# COMPARISON METRICS
# =============================================================================

peer_comparison:
  peers:
    - name: "UBS Global Wealth Management"
      aum_ratio: 0.15  # JB is ~15% of UBS GWM
      positioning: "Larger, more diversified"

    - name: "Credit Suisse (now UBS)"
      aum_ratio: "N/A"
      positioning: "Absorbed by UBS 2023"

    - name: "Pictet"
      aum_ratio: 0.70  # JB is ~70% of Pictet
      positioning: "Partnership model, more conservative"

    - name: "Lombard Odier"
      aum_ratio: 1.30  # JB is ~130% of LO
      positioning: "Similar pure-play, family-owned"

    - name: "EFG International"
      aum_ratio: 2.50  # JB is ~250% of EFG
      positioning: "Smaller, entrepreneurial"

  differentiators_vs_peers:
    vs_ubs: "Pure-play focus, no conflicts, more personalized"
    vs_pictet: "Public company, more growth-oriented, wider geographic reach"
    vs_lombard: "Larger scale, more digital investment, public transparency"
    vs_efg: "Larger scale, stronger brand, more established"
