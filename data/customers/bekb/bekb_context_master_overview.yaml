# =============================================================================
# EBF FRAMEWORK INTEGRATION
# =============================================================================

ebf_integration:
  # 10C CORE Mapping
  core_10c_mapping:
    WHO:
      description: "Berner Bevölkerung, KMU, Bundesverwaltung, Institutionelle"
      relevant_layers: ["MKT", "PEO", "STK"]
      key_factors: ["KUN-01", "KUN-02", "KUN-03", "STK-EIG-01"]

    WHAT:
      description: "Sicherheit, Stabilität, Regionale Identität, Tradition"
      relevant_layers: ["FIN", "STR", "ORG"]
      key_factors: ["FIN-KAP-01", "STR-VIS-01", "ORG-GOV-01"]

    HOW:
      description: "Hybrider Ansatz (Digital + Persönlich), 70 Standorte"
      relevant_layers: ["TEC", "MKT", "STR"]
      key_factors: ["TEC-DIG-01", "MKT-KAN-01", "STR-INI-01"]

    WHEN:
      description: "Lebensphasen (Eigenheim, Vorsorge, Anlage)"
      relevant_layers: ["MKT", "STR", "FIN"]
      key_factors: ["MKT-PRD-01", "STR-INI-03", "FIN-ANL-01"]

    WHERE:
      description: "Kanton Bern, Mittelland und Oberland, Stadt und Land"
      relevant_layers: ["MKT", "PEO", "ORG"]
      key_factors: ["MKT-KAN-02", "PEO-BES-05", "ORG-STR-01"]

    AWARE:
      description: "191 Jahre Präsenz, 'Bärn'-Marke, IFZ-Auszeichnung"
      relevant_layers: ["STK", "MKT", "STR"]
      key_factors: ["STK-REP-01", "MKT-ANT-01", "STR-VIS-02"]

    READY:
      description: "Etablierte Kundenbeziehungen, Staatsgarantie-Vertrauen"
      relevant_layers: ["RIS", "ORG", "STK"]
      key_factors: ["RIS-REG-01", "ORG-GOV-02", "STK-EIG-01"]

    STAGE:
      description: "Mature Institution (gegründet 1834)"
      relevant_layers: ["STR", "PEO", "ORG"]
      key_factors: ["STR-VIS-03", "PEO-KUL-01", "ORG-GOV-01"]

  # Psi Dimension Mapping
  psi_dimension_mapping:
    psi_I:
      name: "Institutional Context"
      description: "Staatsgarantie, Kantonalbank-Gesetz, FINMA-Regulierung, Bundesstadt"
      weight: 0.92
      primary_layers: ["ORG", "RIS"]

    psi_S:
      name: "Social Context"
      description: "Berner Gemeinschaft, Bundesverwaltung, KMU-Netzwerk"
      weight: 0.88
      primary_layers: ["PEO", "STK", "MKT"]

    psi_K:
      name: "Cultural Context"
      description: "Berner Identität, Berndeutsch, Konservativ-solide, 'Bärn'"
      weight: 0.88
      primary_layers: ["PEO", "STK"]

    psi_E:
      name: "Economic Context"
      description: "Dienstleistungswirtschaft, Bundesverwaltung, Tourismus Oberland"
      weight: 0.78
      primary_layers: ["FIN", "MKT"]

    psi_T:
      name: "Temporal Context"
      description: "191 Jahre Geschichte, Generationenübergreifend"
      weight: 0.82
      primary_layers: ["STR", "PEO"]

    psi_M:
      name: "Material/Technical Context"
      description: "70 Filialen, Mobile Banking, Hybrid-Modell"
      weight: 0.72
      primary_layers: ["TEC", "MKT"]

    psi_F:
      name: "Physical Context"
      description: "Mittelland, Berner Oberland, Emmental, dezentral"
      weight: 0.80
      primary_layers: ["MKT", "PEO"]

    psi_C:
      name: "Cognitive Context"
      description: "Sicherheitsorientierung, Konservativ, Vertrauensbasiert"
      weight: 0.88
      primary_layers: ["STR", "RIS"]

  # Behavioral Parameters
  behavioral_parameters:
    lambda_BEKB:
      name: "Loss Aversion (BEKB-spezifisch)"
      value: 2.1
      description: "Durch Staatsgarantie und konservative Positionierung moderiert"
      source: "Inferred from state guarantee effect"

    tau_STAATSGARANTIE:
      name: "Trust Transfer - Staatsgarantie"
      value: 0.95
      description: "Vertrauenstransfer durch kantonale Garantie"
      source: "Regulatory framework"

    tau_REGIONAL:
      name: "Trust Transfer - Regional"
      value: 0.88
      description: "Vertrauen durch 191 Jahre lokale Präsenz"
      source: "Historical presence"

    beta_BERNER:
      name: "Present Bias Modifier - Berner"
      value: 0.90
      description: "Regionale Präferenz-Verstärkung, Berndeutsch-Effekt"
      source: "Regional identity studies"

    iota_BE:
      name: "Identity Alignment - Bern"
      value: 0.82
      description: "Identifikation mit Kanton Bern und 'Bärn'-Marke"
      source: "Customer surveys"

    sigma_HYBRID:
      name: "Channel Preference - Hybrid"
      value: 0.82
      description: "Präferenz für Kombination digital/persönlich"
      source: "Customer behavior analysis"

