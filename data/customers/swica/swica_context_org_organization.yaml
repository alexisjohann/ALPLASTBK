# ==============================================================================
# SUB-ACHSE: ORG-STR (Struktur)
# ==============================================================================

ORG-STR:
  name: "Struktur"
  description: "Rechtliche und organisatorische Struktur"
  factors: 10

  factors_list:
    - id: "SWICA-ORG-STR-01"
      name: "Rechtsform"
      definition: "Juristische Organisationsform"
      values:
        2024:
          type: "Genossenschaft"
          genossenschaft_seit: 1982
          note: "Mitglieder = Versicherte"
      source: "Handelsregister"

    - id: "SWICA-ORG-STR-02"
      name: "Konzernstruktur"
      definition: "Aufbau des SWICA-Konzerns"
      values:
        2024:
          holding: "SWICA Holding"
          entities:
            - name: "SWICA Krankenversicherung AG"
              type: "OKP"
            - name: "SWICA Versicherungen AG"
              type: "VVG"
            - name: "SWICA Gesundheitsorganisation"
              type: "Managed Care"
            - name: "sante24"
              type: "Telemedizin"
      source: "SWICA Geschäftsbericht"

    - id: "SWICA-ORG-STR-03"
      name: "Gründungsjahr"
      definition: "Jahr der Unternehmensgründung"
      values:
        original: 1896
        swica_name: 1992
        note: "Fusion mehrerer Kassen"
      source: "SWICA Historie"

    - id: "SWICA-ORG-STR-04"
      name: "Hauptsitz"
      definition: "Standort der Hauptverwaltung"
      values:
        city: "Winterthur"
        canton: "ZH"
        address: "Römerstrasse 38"
      source: "Handelsregister"

    - id: "SWICA-ORG-STR-05"
      name: "Mitglieder Genossenschaft"
      definition: "Anzahl Genossenschaftsmitglieder"
      values:
        2024: 1550000
        2022: 1500000
        note: "Alle OKP-Versicherten automatisch Mitglieder"
      unit: "Mitglieder"
      source: "SWICA Geschäftsbericht"

    - id: "SWICA-ORG-STR-06"
      name: "Unternehmensmarken"
      definition: "Anzahl und Art der Marken"
      values:
        2024:
          count: 1
          brands:
            - name: "SWICA"
              positioning: "Premium/Qualität"
          note: "Mono-Brand Strategie"
      source: "SWICA"

    - id: "SWICA-ORG-STR-07"
      name: "Geschäftsfelder"
      definition: "Strategische Geschäftsbereiche"
      values:
        2024:
          - "Grundversicherung OKP"
          - "Zusatzversicherungen VVG"
          - "Managed Care Modelle"
          - "Präventionsangebote"
          - "Telemedizin (sante24)"
      source: "SWICA Strategie"

    - id: "SWICA-ORG-STR-08"
      name: "Tochtergesellschaften"
      definition: "Anzahl konsolidierte Tochtergesellschaften"
      values:
        2024: 5
        key_entities:
          - "sante24 AG"
          - "SWICA Gesundheitszentren"
      source: "SWICA Geschäftsbericht"

    - id: "SWICA-ORG-STR-09"
      name: "Strategische Partnerschaften"
      definition: "Wichtige Kooperationen"
      values:
        2024:
          - partner: "Medbase"
            type: "Ärztenetzwerk"
          - partner: "Hirslanden"
            type: "Spitalnetzwerk"
          - partner: "Swisscom Health"
            type: "Digital Health"
      source: "SWICA"

    - id: "SWICA-ORG-STR-10"
      name: "Delegiertenversammlung"
      definition: "Oberstes Organ der Genossenschaft"
      values:
        2024:
          delegates: 120
          meetings_per_year: 1
          election_cycle: 4
      source: "SWICA Statuten"

