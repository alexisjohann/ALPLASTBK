          vs_average: 1.05
          position: "leicht über Durchschnitt"
          premium_positioning: true
      source: "BAG Prämienvergleich"

    - id: "SWICA-MKT-WET-04"
      name: "Qualitätsranking"
      definition: "Position in Qualitätsrankings"
      values:
        2024:
          comparis: 1
          ktipp: 2
          bonus_ch: 1
        2022:
          comparis: 1
      source: "Comparis/K-Tipp"

    - id: "SWICA-MKT-WET-05"
      name: "Service-Differenzierung"
      definition: "Einzigartige Serviceangebote"
      values:
        2024:
          unique_services:
            - "sante24 (24/7 Telemedizin)"
            - "SWICA Gesundheitszentren"
            - "BENEVITA Bonusprogramm"
            - "Präventionsbeiträge"
      source: "SWICA"

    - id: "SWICA-MKT-WET-06"
      name: "Marktkonzentration"
      definition: "Konzentration im Gesamtmarkt"
      values:
        2024:
          top_5_share: 0.58
          hhi: 0.082
          trend: "zunehmende Konsolidierung"
      source: "BAG Statistik"

    - id: "SWICA-MKT-WET-07"
      name: "Eintrittsbarrieren"
      definition: "Barrieren für neue Marktteilnehmer"
      values:
        2024:
          regulatory: "sehr hoch"
          capital: "hoch"
          reputation: "hoch"
          new_entries_since_2010: 0
