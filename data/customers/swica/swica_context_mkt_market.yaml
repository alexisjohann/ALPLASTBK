metadata:
  axis_code: "MKT"
  axis_name: "Market & Competition"
  axis_name_de: "Markt & Wettbewerb"
  layer: "MACRO"
  version: "1.0.0"
  total_factors: 50
  sub_axes: 5
  description: |
    Marktposition der SWICA, Wettbewerbsumfeld, Marktentwicklung,
    regionale Stärken und Differenzierung.
  data_sources:
    - "BAG Statistik der obligatorischen Krankenversicherung"
    - "SWICA Geschäftsberichte"
    - "santésuisse Branchendaten"
    - "Comparis Marktanalysen"

# ==============================================================================
# SUB-ACHSE: MKT-POS (Marktposition)
# ==============================================================================

MKT-POS:
  name: "Marktposition"
  description: "Position im Schweizer Krankenversicherungsmarkt"
  factors: 10

  factors_list:
    - id: "SWICA-MKT-POS-01"
      name: "Marktanteil OKP"
      definition: "Anteil am Gesamtmarkt obligatorische Krankenversicherung"
      values:
        2024: 0.085
        2022: 0.082
        2020: 0.080
      unit: "Anteil"
      trend: "leicht steigend"
      source: "BAG Statistik"

    - id: "SWICA-MKT-POS-02"
      name: "Marktrang OKP"
      definition: "Position unter Schweizer Krankenversicherern"
      values:
        2024: 4
        2022: 4
        2020: 4
      unit: "Rang"
      source: "BAG Statistik"

    - id: "SWICA-MKT-POS-03"
      name: "Marktanteil VVG"
      definition: "Anteil am Zusatzversicherungsmarkt"
      values:
        2024: 0.095
        2022: 0.092
      unit: "Anteil"
      trend: "stabil"
      source: "FINMA/SWICA"

    - id: "SWICA-MKT-POS-04"
      name: "Versicherte Total"
      definition: "Gesamtzahl versicherte Personen"
      values:
        2024: 1550000
        2022: 1500000
        2020: 1450000
      unit: "Personen"
      trend: "wachsend"
      source: "SWICA Geschäftsbericht"

    - id: "SWICA-MKT-POS-05"
      name: "Wachstumsrate"
      definition: "Jährliches Wachstum Versichertenzahl"
      values:
        2024: 0.033
        2022: 0.028
        2020: 0.025
      unit: "Quote"
      trend: "beschleunigt"
      source: "SWICA Geschäftsbericht"

    - id: "SWICA-MKT-POS-06"
      name: "Marktanteil Deutschschweiz"
      definition: "Regionale Marktposition Deutschschweiz"
      values:
        2024: 0.12
        strongest_cantons: ["ZH", "TG", "SH", "AG"]
      unit: "Anteil"
      source: "BAG/SWICA"

    - id: "SWICA-MKT-POS-07"
      name: "Marktanteil Romandie"
      definition: "Regionale Marktposition Westschweiz"
      values:
        2024: 0.025
        note: "Schwache Position"
      unit: "Anteil"
      source: "BAG/SWICA"

    - id: "SWICA-MKT-POS-08"
      name: "Managed Care Marktanteil"
      definition: "Position im Managed Care Segment"
      values:
        2024: 0.14
        note: "Überdurchschnittlich stark"
      unit: "Anteil"
      source: "santésuisse"

    - id: "SWICA-MKT-POS-09"
      name: "Firmenkundenmarkt"
      definition: "Anteil Firmenkunden-Geschäft"
      values:
        2024: 0.15
        corporate_clients: 8500
      unit: "Anteil"
      source: "SWICA"

    - id: "SWICA-MKT-POS-10"
      name: "Positionierung"
      definition: "Strategische Marktpositionierung"
      values:
        2024:
          position: "Premium/Qualität"
          usp: ["Prävention", "Service", "sante24"]
          target: "Qualitätsbewusste"
      source: "SWICA Strategie"

# ==============================================================================
# SUB-ACHSE: MKT-WET (Wettbewerb)
# ==============================================================================

MKT-WET:
  name: "Wettbewerb"
  description: "Wettbewerbsumfeld und Konkurrenzanalyse"
  factors: 10

  factors_list:
    - id: "SWICA-MKT-WET-01"
      name: "Hauptkonkurrenten"
      definition: "Wichtigste Wettbewerber"
      values:
        2024:
          direct:
            - name: "CSS"
              type: "Qualitätswettbewerber"
            - name: "Helsana"
              type: "Grössenkonkurrent"
            - name: "Sanitas"
              type: "Qualitätswettbewerber"
