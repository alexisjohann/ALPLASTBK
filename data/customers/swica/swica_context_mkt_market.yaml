          reason: "Versicherungsobligatorium"
      source: "Marktanalyse"

    - id: "SWICA-MKT-WET-09"
      name: "Innovationsvorsprung"
      definition: "Position bei Innovation"
      values:
        2024:
          digital: "führend"
          prevention: "Marktführer"
          telemedizin: "Pionier"
      source: "Branchenanalyse"

    - id: "SWICA-MKT-WET-10"
      name: "Verhandlungsmacht Leistungserbringer"
      definition: "Verhandlungsposition gegenüber Ärzten/Spitälern"
      values:
        2024:
          hospital_negotiation: "mittel"
