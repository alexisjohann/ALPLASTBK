            - name: "Assura"
              type: "Preisführer"
      source: "SWICA Strategie"

    - id: "SWICA-MKT-WET-02"
      name: "Wettbewerbsintensität"
      definition: "Intensität des Wettbewerbs"
      values:
        2024:
          overall: "hoch"
          price_competition: "sehr hoch"
          quality_competition: "mittel"
          service_competition: "hoch"
