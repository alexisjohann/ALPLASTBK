      name: "OKP-Modelle"
      definition: "Angebotene Versicherungsmodelle"
      values:
        2024:
          models:
            - name: "STANDARD"
              type: "Freie Arztwahl"
              share: 0.28
            - name: "HAUSARZT"
              type: "Hausarztmodell"
              share: 0.35
              rabatt: 0.12
            - name: "FAVORIT TELMED"
              type: "Telemedizin-first"
              share: 0.22
              rabatt: 0.18
