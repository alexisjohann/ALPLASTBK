# =============================================================================
# ENTWICKLUNGSPLAN (3 Phasen)
# =============================================================================
development_plan:
  phase_1_foundation:
    period: "2026-2027"
    focus: "Quick Wins + Grundlagen"
    measures:
      - name: "Data Literacy Bootcamp"
        target: "Alle 50 HR-MA"
        format: "Blended Learning (2 Tage + E-Learning)"
        duration_months: 3

      - name: "Power BI / Dashboard Training"
        target: "8-10 HR-Reporting + Payroll"
        format: "Praxis-Workshop + Projekt"
        duration_months: 6

      - name: "HRIS Deep Dive"
        target: "6-8 Ops + Payroll"
        format: "Zertifizierung + Shadowing IT"
        duration_months: 4

      - name: "Strategic HRBP Upgrade"
        target: "6-8 HRBPs"
        format: "Coaching + Case-based Learning (OD, Change)"
        duration_months: 6

  phase_2_rebuild:
    period: "2027-2028"
    focus: "Profilwechsel + Spezialisierung"
    measures:
      - name: "People Analytics Programm"
        target: "3-4 aus Reporting/Payroll"
        format: "CAS Data Science (extern, z.B. HSLU/ZHAW) + internes Projekt"
        duration_months: 12

      - name: "OD & Change Zertifizierung"
        target: "3-4 aus HRBP"
        format: "CAS OD (extern) + LUKB30-Projekte als Praxis"
        duration_months: 12

      - name: "Service Design fuer HR"
        target: "3-4 aus Ops/Recruiting"
        format: "Design Thinking Workshop + Employee Journey Projekt"
        duration_months: 6

      - name: "HR Tech / AI Academy"
        target: "3-4 aus Ops"
        format: "RPA-Zertifizierung + AI in HR (extern)"
        duration_months: 9

  phase_3_excellence:
    period: "2029-2030"
    focus: "Vertiefung + Differenzierung"
    measures:
      - name: "Predictive Workforce Modelling"
        target: "Analytics-Team"
        format: "Advanced Analytics + Machine Learning"
        ongoing: true

      - name: "Behavioral HR Design"
        target: "Change & EX Team"
        format: "EBF-Methodik (internes FehrAdvice Know-how)"
        ongoing: true

      - name: "Strategic Workforce Planning Mastery"
        target: "WFP-Team"
        format: "Szenario-Workshops + Tool-Expertise"
        ongoing: true

