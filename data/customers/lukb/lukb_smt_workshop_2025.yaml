# ============================================================================
# LUKB SMT Workshop 2025 - Leadership & Growth Mindset
# ============================================================================
# Facilitator: Silvana Leasi
# Event Date: 28.10.2025
# Created: 2026-02-05
# Duration: 140 Minuten
# Context: Follows keynote by Prof. Wolfgang Jenewein
# ============================================================================

metadata:
  document_type: "workshop_design"
  customer_id: "LUKB"
  version: "1.0"
  event: "SMT 2025"
  facilitator: "Silvana Leasi"
  event_date: "2025-10-28"
  duration_minutes: 140
  keynote_speaker: "Wolfgang Jenewein"
  target_audience: "Senior Management Team (Schlüsselkader)"
  strategic_context: "Vorbereitung Strategieperiode 2026"

# ============================================================================
# WORKSHOP GOALS
# ============================================================================
goals:
  primary: "Transfer aus dem Referat von Jenewein: 'Leadership beginnt bei mir.'"
  secondary:
    - "Reflektion des eigenen Mindsets: Was muss ich loslassen / was will ich stärken?"
    - "Konkretes Commitment zur Haltung für die neue Strategieperiode (2026)"

core_message:
  strategy: "Strategie vermittelt Richtung"
  attitude: "Haltung erzeugt Bewegung"
  leadership: "Leadership beginnt bei mir"
  transformation: |
    Denn Transformation beginnt nicht unten.
    Transformation beginnt oben – bei uns.
    Und sie beginnt nicht irgendwann.
    Sie beginnt jetzt, bei jedem von uns.

# ============================================================================
# WORKSHOP AGENDA
# ============================================================================
agenda:
  total_duration: 140

  blocks:
    - id: 1
      time: "14:30-14:40"
      duration: 10
      title: "Warm-up"
      goal: "Energie vom Speech aufnehmen"
      method: |
        Frage in Zweiergruppen:
        „Was aus dem Vortrag hat mich als Leader persönlich angesprochen?"
      materials:
        - "Stifte"
        - "Blöcke (stellt Montana zur Verfügung)"

    - id: 2
      time: "14:40-14:50"
      duration: 10
      title: "Einführung Growth & Fixed Mindset"
      goal: "Auffrischen des Wissens"
      method: "Kurz-Input"
      materials:
        - "pptx"
      theory_reference: "Carol Dweck - Growth Mindset"

    - id: 3
      time: "14:50-15:20"
      duration: 30
      title: "Selbst-Reflexion (Mindset Check)"
      goal: "Bewusstsein schaffen – wo stehe ich?"
      method: |
        Vorbereitung von 8-10 Fragen auf Slide – Mindset Check
        (Growth vs. Fixed Mindset + Selbstführung + Resilienz).
        Danach kurze Partnerreflexion
      materials:
        - "pptx Folie 14"

    - id: 4
      time: "15:20-15:35"
      duration: 15
      title: "PAUSE"
      goal: null
      method: null

    - id: 5
      time: "15:35-15:45"
      duration: 10
      title: "Who we are is how we lead"
      goal: "Verbindung Persönlichkeit & Führung"
      method: "Kurz-Input"
      theory_reference: "Brené Brown"
      key_attributes:
        - "Authentisch"
        - "Mutig"
        - "Empathisch"

    - id: 6
      time: "15:45-16:00"
      duration: 15
      title: "Meine Führungsvision 2026"
      goal: "Vision der eigenen Führungsrolle schärfen"
      method: |
        Einzelarbeit → 1 Satz formulieren:
        "Ich möchte dass meine Mitarbeitenden mich als Leader folgendermassen sehen..."
        Inkl. Austausch zu zweit
      materials:
        - "Karten"

    - id: 7
      time: "16:00-16:20"
      duration: 20
      title: "Haltung in Handlung übersetzen"
      goal: "Haltung in Stresssituationen reflektieren"
      method: |
        Arbeit in 2er Teams
        Kurze Einführung, kurze alleine und dann Murmelgruppen evtl. mit konkreten Beispielen
      reflection_questions:
        - "Wie bin ich in Stresssituationen?"
        - "Welche Haltung zeige ich?"
        - "Wie äussert sich das in meinem Verhalten?"
        - "Welche Wirkung hat dies auf mein Team?"

    - id: 8
      time: "16:20-16:40"
      duration: 20
      title: "Dead Leaf & New Seed"
      goal: "Transformation ermöglichen"
      method: |
        Jede*r schreibt auf zwei Karten:
        - Dead Leaf (loslassen): „Womit höre ich auf?"
        - New Seed (starten): „Welche neue Gewohnheit etabliere ich?"
        Karten werden an eine „Mindset Wall" gehängt.
      materials:
        - "Karten grün (New Seed)"
        - "Karten rot (Dead Leaf)"
        - "Mindset Wall"

    - id: 9
      time: "16:45"
      duration: null
      title: "Abschluss CEO"
      goal: "Strategische Einordnung"
      method: "CEO Closing"

# ============================================================================
# THEORETICAL FRAMEWORKS
# ============================================================================
theoretical_frameworks:
  growth_mindset:
    author: "Carol Dweck"
    core_distinction:
      fixed_mindset:
        goal: "Intelligent wirken"
        effort: "Schätzt Anstrengung nicht"
        feedback: "Nimmt Kritik persönlich"
        beliefs:
          - "Meine Ansichten sind richtig"
          - "Ich bin wie ich bin und kann mich nicht verändern"
          - "Mein Potential ist vorbestimmt und gesetzt"

      growth_mindset:
        goal: "Lernen"
        effort: "Schätzt Anstrengung"
        feedback: "Nimmt Kritik als Möglichkeit zu wachsen"
        beliefs:
          - "Nimmt andere Perspektiven ein"
          - "Ich kann alles lernen, was ich wirklich möchte"
          - "Meine Anstrengungen und innere Einstellung beeinflusst meine Fähigkeiten"

    key_message: "Nicht alles können wir heute – aber alles können wir lernen"

  brene_brown:
    author: "Brené Brown"
    credentials: "Professorin University of Houston & University of Texas, Autorin & Speaker"
    core_message: "Who we are is how we lead"
    leadership_attributes:
      - "Authentisch"
      - "Mutig"
      - "Empathisch"
    quote: |
      "If you think you're being brave and it doesn't involve risk or uncertainty -
      you're not being that brave."

# ============================================================================
# MINDSET CHECK QUESTIONS
# ============================================================================
mindset_check:
  focus: "Haltung, nicht Kompetenz"
  answer_format: "Skala 1-10"
  questions:
    - id: MC-01
      question: "Ich gehe bewusst dorthin, wo ich Unsicherheit spüre."
      dimension: "Growth Mindset / Mut"

    - id: MC-02
      question: "Ich frage mich regelmässig: „Welches Signal sende ich jetzt als Leader?""
      dimension: "Selbstführung / Awareness"

    - id: MC-03
      question: "Ich ziehe Entscheidungen nicht in die Länge, um perfekt zu sein."
      dimension: "Growth Mindset / Handlungsorientierung"

    - id: MC-04
      question: "Ich gehe voran, anstatt zu warten."
      dimension: "Leadership / Initiative"

    - id: MC-05
      question: "Ich sehe Rückschläge als Teil des Weges."
      dimension: "Resilienz"

    - id: MC-06
      question: "Ich halte mein Ego im Zaum und höre anderen aktiv und offen zu."
      dimension: "Demut / Empathie"

    - id: MC-07
      question: "Ich handle, auch wenn ich noch nicht alles weiß."
      dimension: "Growth Mindset / Handeln unter Unsicherheit"

# ============================================================================
# KEY EXERCISES
# ============================================================================
exercises:
  leadership_vision:
    name: "Meine Führungsvision"
    prompt: "Ich möchte dass meine Mitarbeitenden mich als Leader folgendermassen sehen..."
    format: "1 Satz formulieren"
    duration: 15
    method: "Einzelarbeit → Austausch zu zweit"

  stress_reflection:
    name: "Haltung in Stresssituationen"
    questions:
      - "Wie bin ich in Stresssituationen?"
      - "Welche Haltung zeige ich?"
      - "Wie äussert sich das in meinem Verhalten?"
      - "Welche Wirkung hat dies auf mein Team?"
    duration: 20
    method: "Selbstreflexion → Austausch zu zweit"

  dead_leaf_new_seed:
    name: "Dead Leaf & New Seed"
    description: "Loslassen & Starten"
    components:
      dead_leaf:
        color: "rot"
        prompt: "Womit höre ich auf?"
        meaning: "Loslassen"
      new_seed:
        color: "grün"
        prompt: "Welche neue Gewohnheit etabliere ich?"
        meaning: "Starten"
    output: "Mindset Wall"
    duration: 20

# ============================================================================
# EBF INTEGRATION
# ============================================================================
ebf_integration:
  relevant_10c_dimensions:
    WHO: "Senior Management Team als Multiplikatoren"
    WHAT:
      - "U_IDN (Identität): Leadership Identity, Führungsvision"
      - "U_A (Awareness): Mindset-Bewusstsein, Selbstreflexion"
    HOW:
      - "Komplementarität: Strategie × Haltung × Verhalten"
      - "Transformation als Kaskade: Oben → Unten"
    WHEN:
      - "Ψ_T (Temporal): Strategieperiode 2026, Übergangsmoment"
      - "Ψ_C (Cognitive): Stress-Situationen als Kontext"
    AWARE:
      - "Awareness-Level durch Mindset Check"
      - "Signal-Bewusstsein als Leader"
    READY:
      - "Willingness: Dead Leaf (Loslassen) vs New Seed (Starten)"
      - "Commitment zur Haltung"
    STAGE:
      - "Leadership Journey: Reflexion → Vision → Commitment"

  behavioral_insights:
    - insight: "Growth Mindset als Voraussetzung für Transformation"
      theory: "Carol Dweck (2006)"
      application: "Mindset Check als Self-Assessment"

    - insight: "Authentizität als Leadership-Fundament"
      theory: "Brené Brown - Daring Leadership"
      application: "Who we are is how we lead"

    - insight: "Commitment durch öffentliche Bekundung"
      theory: "Commitment & Consistency (Cialdini)"
      application: "Mindset Wall mit persönlichen Karten"

    - insight: "Soziale Verstärkung durch Peer-Austausch"
      theory: "Social Learning (Bandura)"
      application: "Murmelgruppen, Zweiergruppen durchgehend"

  intervention_design:
    target_dimension: "AWARE × READY"
    mechanism:
      - "Awareness erhöhen (Mindset Check)"
      - "Vision schärfen (Führungsvision-Satz)"
      - "Commitment erzeugen (Dead Leaf & New Seed)"
    gamma_hypothesis: "γ(AWARE, READY) > 0: Awareness verstärkt Readiness"

