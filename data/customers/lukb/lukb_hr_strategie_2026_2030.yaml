# ALIGNMENT MIT BRAND IDENTITY & FÜHRUNGSVERSTÄNDNIS
# ============================================================================
alignment:
  brand_identity_2026:
    promise_connection: |
      "Wir schaffen Raum" → HR-Strategie schafft Raum für:
      - Führungskräfte: Raum für Entwicklung und Wirkung
      - Mitarbeitende: Raum für Potenzialentfaltung
      - Organisation: Raum für Innovation und Anpassung

    values_connection:
      verlässlich: "Klare Governance, transparente Entscheidungswege"
      zugänglich: "Offenheit, Feedbackorientierung, Wertschätzung"
      ambitioniert: "Neue Massstäbe, Spitzenleistung, High-Potential-Entwicklung"

    vp_mitarbeitende: |
      "Wir schaffen Raum für Ambition – mit offenen Türen,
      persönlicher Förderung und echtem Mitgestalten im Team."
      → HR-Strategie ist die operative Umsetzung dieser VP

  fuehrungsverstaendnis:
    lukb_acronym_connection:
      L_leidenschaftlich: "Inspirierende Führung, kulturelle Vorbilder"
      U_unternehmerisch: "Strategieverzahnung, langfristiger Erfolg"
      K_kollaborativ: "Interdisziplinäre Zusammenarbeit, agile Teams"
      B_bemerkenswert: "Differenzierte Entwicklung, sichtbare Anerkennung"

    three_levels_connection:
      ich: "Individuelle Entwicklungspläne, High-Potential-Identifikation"
      team: "Teamentwicklung, funktionsübergreifende Teams"
      organisation: "Adaptive Organisationsmodelle, Governance"

# ============================================================================
# EBF INTEGRATION
# ============================================================================
ebf_integration:
  relevant_10c_dimensions:
    WHO:
      - "Führungskräfte als primäres Segment"
      - "High-Potentials als Subsegment"
      - "Gesamtorganisation als System"
    WHAT:
      - "U_IDN (Identität): Führungsidentität, kulturelle Vorbilder"
      - "U_A (Awareness): 360°-Feedbacks, Leadership Analytics"
      - "U_S (Sozial): Zusammenarbeit, Feedbackkultur"
    HOW:
      - "Führung als Hebel zur Strategieumsetzung (Multiplikator)"
      - "γ(Führung, Organisation) > 0: Führungsqualität verstärkt Organisationsresilienz"
    WHEN:
      - "Ψ_I (Institutional): Governance, Rollenklärung, Kompetenzmodell"
      - "Ψ_T (Temporal): 5-Jahres-Horizont 2026-2030"
    AWARE:
      - "Datenbasierte Steuerung erhöht Awareness"
      - "Stimmungsbarometer für Team-Awareness"
    READY:
      - "Willingness durch Vergütungs-/Karriereverknüpfung"
      - "Entwicklungspläne als Readiness-Instrument"
    STAGE:
      - "Leadership Pipeline: Identifikation → Entwicklung → Transformation"

  intervention_design:
    primary_dimensions: ["AWARE", "READY", "WHAT(U_IDN)"]
    mechanisms:
      - "360°-Feedback → Awareness erhöhen"
      - "Individuelle Entwicklungspläne → Readiness steigern"
      - "Kulturelle Vorbildfunktion → Identity stärken"
    complementarity: |
      γ(AWARE, READY) > 0: Höhere Awareness verstärkt Entwicklungsbereitschaft
      γ(Führung, Mitarbeitende) > 0: Bessere Führung multipliziert Mitarbeiterengagement

