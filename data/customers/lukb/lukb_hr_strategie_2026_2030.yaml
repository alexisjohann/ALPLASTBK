# ============================================================================
# FOKUSTHEMA 1A: FÜHRUNGSENTWICKLUNG
# ============================================================================
fuehrungsentwicklung:
  id: "1A"
  status: "Fokusthema"

  zielbild_2030:
    title: "Führung ist wirksam, zukunftsorientiert und kulturprägend"
    description: |
      Wir etablieren ein modernes Führungsverständnis, das Wirkung, Haltung
      und Entwicklung systematisch verbindet. Führung wird als entscheidender
      Hebel zur Strategieumsetzung verstanden – individuell messbar,
      kontinuierlich entwickelt und konsequent gefördert.

      Unsere Führungskräfte sind kulturelle Vorbilder und Veränderungstreiber.
      Führung wird differenziert entwickelt, sichtbar anerkannt – und bei Bedarf
      klar reflektiert und angepasst.

  kernelemente:
    - name: "Strategieverzahnung"
      elements:
        - "Führungskompetenzen werden an der Unternehmensstrategie und den Zukunftsfeldern ausgerichtet"
        - "Führungskräfte verstehen ihre Rolle als aktive Gestalter des Wandels"

    - name: "Datenbasierte Steuerung"
      elements:
        - "Nutzung von 360°-Feedbacks, Leadership Analytics und Stimmungsbarometern"
        - "Führungserfolg wird durch KPIs zu Mitarbeiterbindung, Teamperformance, Kulturbeitrag etc. sichtbar gemacht"

    - name: "Klarer Entwicklungsfokus"
      elements:
        - "High-Potential-Leaders werden identifiziert, gezielt entwickelt und in Transformationsrollen gebracht"
        - "Individuelle Entwicklungspläne basieren auf einem transparenten Kompetenzmodell"

    - name: "Verknüpfung mit Vergütung & Karriere"
      elements:
        - "Leadership wird zum festen Bestandteil von Talentmanagement und Nachfolgeplanung"

# ============================================================================
# THEMA 1B: ORGANISATIONSENTWICKLUNG
# ============================================================================
organisationsentwicklung:
  id: "1B"
  status: "Thema (kein Fokusthema)"

  zielbild_2030:
    title: "Organisationen sind adaptiv, innovationsfähig und kollaborativ"
    description: |
      Wir entwickeln Strukturen und Prozesse, die auf Veränderungsfähigkeit,
      interdisziplinäre Zusammenarbeit und Wertschöpfung ausgerichtet sind.

      Dabei setzen wir auf adaptive Organisationsmodelle, klare Governance und
      massgeschneiderte Beratungsangebote. Die Organisation wird als lebendiges
      System verstanden – kontinuierlich lernend und gestaltend.

  kernelemente:
    - name: "Adaptive Organisationsmodelle"
      elements:
        - "Fördern flexibler Strukturen (z.B. Netzwerkorganisation, Zellstruktur, agile Tribes)"
        - "Fokus auf dynamische Rollenkonzepte, Entscheidungsfähigkeit und Kundennähe"

    - name: "Förderung von interdisziplinärer Zusammenarbeit"
      elements:
        - "Kultur der Offenheit, Diversität und Feedbackorientierung"
        - "Bildung agiler, funktionsübergreifender Teams für strategische Initiativen"

    - name: "Klare Governance & Rollenklärung"
      elements:
        - "Transparente Entscheidungswege, klare Verantwortlichkeiten und schnelle Eskalationslogiken"

    - name: "Individuelle Beratungs- & Entwicklungsdienstleistungen"
      elements:
        - "OE-Beratung für Teams, Führungskräfte und Organisationseinheiten (z.B. bei Reorganisation, Teamentwicklung, Konfliktklärung)"
        - "Methodische Unterstützung: Systemische Prozessbegleitung, Change-Design, Moderation"
        - "Wirksame Kombination aus Standardangeboten und massgeschneiderten Formaten ('One Size Fits One')"

# ============================================================================
# HAUPTFELD 1: MANAGEMENT SUMMARY
# ============================================================================
hauptfeld_1_summary:
  title: "Führung & Organisation"

  core_statement: |
    Eine starke und zukunftsfähige Organisation braucht inspirierende Führung,
    resiliente Strukturen und eine nachhaltige Performancekultur.

  context: |
    In einer dynamischen Arbeitswelt sind Führungskräfte nicht nur Entscheider,
    sondern Gestalter von Zusammenarbeit, Innovation und langfristigem Unternehmenserfolg.

    Eine gezielte Führungs- und Organisationsentwicklung stellt sicher, dass die
    Unternehmensstrategie effektiv umgesetzt wird und Mitarbeitende ihr volles
    Potenzial entfalten können. Ein strukturiertes und Zukunft gerichtetes
    Performancemanagement ist dabei die Basis.

  strategisches_rational: |
    Um in einer dynamischen, komplexen Arbeitswelt erfolgreich zu bleiben,
    braucht es moderne Führung, adaptive Strukturen und eine leistungsfördernde Kultur.

    Führungskräfte müssen Orientierung geben, Verantwortung fördern und
    Zusammenarbeit stärken. So entstehen resiliente, innovative und effiziente Organisationen.

    Das steigert nicht nur die Wettbewerbsfähigkeit und Veränderungsfähigkeit,
    sondern auch die Attraktivität als Arbeitgeberin und sichert langfristige Wertschöpfung.

  stakeholder_impact: |
    Die Stärkung moderner Führung steigert messbar die Mitarbeiterzufriedenheit,
    Motivation und Bindung. Führungskräfte schaffen ein produktives, wertschätzendes
    Arbeitsumfeld, welches diverse Teams effektiv zusammenführt.

    Gleichzeitig erhöhen agile Strukturen und klare Governance die Effizienz,
    Innovationskraft und Anpassungsfähigkeit der Organisation.

    Für Stakeholder wie Mitarbeitende, Kunden und Kundinnen und Öffentlichkeit bedeutet das:
    - Bessere Zusammenarbeit
    - Höhere Servicequalität
    - Ein attraktives Arbeitgeberimage
    - Eine resiliente und zukunftsfähige Organisation

