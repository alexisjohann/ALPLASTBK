      - id: "2A"
        name: "Talent- und Nachfolgemanagement"
        focus: false
      - id: "2B"
        name: "MA-Entwicklung (inkl. Up- & Reskilling)"
        focus: false
      - id: "2C"
        name: "Strategisches Performancemanagement"
        focus: true

  - id: 3
    name: "Employer Branding & Rekrutierung"
    description: |
      Positionierung als attraktive Arbeitgeberin und
      zielgerichtete Talentgewinnung
    themen:
      - id: "3A"
        name: "Workplace Excellence inkl. New Work"
        focus: true
