# ============================================================================
# AMBITION 2030
# ============================================================================
ambition_2030:
  statement: |
    Bis 2030 setzen wir neue Massstäbe für Führung,
    Organisationsentwicklung und Talentförderung.

  key_elements:
    fuehrung: |
      Unsere Führungskräfte gestalten aktiv
      Transformation und Innovation.
    organisation: |
      Unsere Organisation wird zum Vorbild für resiliente Strukturen
      und eine Kultur der Spitzenleistung.
    talente: |
      Durch konsequente Entwicklung und Bindung von Talenten
      sichern wir unseren nachhaltigen Erfolg und prägen die
      Zukunft der Arbeit in unserem Marktumfeld entscheidend mit.

# ============================================================================
