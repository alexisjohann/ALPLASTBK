# LUKB Unternehmenskontextvektor: Master-Übersicht
# Version: 1.0
# Quelle: FehrAdvice Unternehmenskontextvektor-Architektur 2026
# Letzte Aktualisierung: 2026-01-26
# EBF-Relevanz: Alle Ψ-Dimensionen für organisationale Kontexte

metadata:
  name: "LUKB Unternehmenskontextvektor Master-Übersicht"
  code: "BCM2_ORG_LUKB"
  version: "1.0"
  total_factors: 400
  sub_axes: 40
  main_axes: 8
  description: "Vollständige Faktorenstruktur für Unternehmenskontext LUKB 2024-2030"
  quantitative_coverage: "100% - alle 400 Faktoren mit Zeitreihen/Zielwerten"
  template_source: "BCM2_04_KON (Schweizer Kontextvektor)"

# =============================================================================
# DATENQUELLEN-ÜBERSICHT
# =============================================================================
data_sources:
  summary:
    primary_sources: 8
    secondary_sources: 12
    internal_systems: 15
    time_horizon: "2020-2030"
    update_frequency: "quarterly"

  primary_internal:
    - name: "LUKB Geschäftsberichte"
      coverage: "Finanzen, Strategie, Governance"
      factors_covered: 120

    - name: "LUKB HR-Systeme"
      coverage: "Mitarbeiter, Kultur, Entwicklung"
      factors_covered: 80

    - name: "LUKB Core Banking"
      coverage: "Kunden, Produkte, Transaktionen"
      factors_covered: 60

    - name: "LUKB Risk Management"
      coverage: "Risiken, Compliance, Regulierung"
      factors_covered: 30

  primary_external:
    - name: "SIX Swiss Exchange"
      url: "https://www.six-group.com"
      coverage: "Aktienkurs, Bewertung"
      factors_covered: 15

    - name: "FINMA"
      url: "https://www.finma.ch"
      coverage: "Regulierung, Compliance"
      factors_covered: 20

    - name: "Verband Schweizerischer Kantonalbanken (VSKB)"
      url: "https://www.vskb.ch"
      coverage: "Branchenbenchmarks"
      factors_covered: 40

    - name: "SNB"
      url: "https://www.snb.ch"
      coverage: "Zinsen, Geldpolitik"
      factors_covered: 15

  secondary:
    - name: "BFS Bankenstatistik"
    - name: "Finews / Finanz und Wirtschaft"
    - name: "Bilanz / Handelszeitung"
    - name: "Kundenumfragen"
    - name: "Mitarbeiterbefragungen"

# =============================================================================
# Gesamtübersicht: 8 Hauptachsen × 40 Unterachsen = 400 Faktoren
# =============================================================================
overview:
  total_factors: 400
  total_sub_axes: 40
  quantitative_status: "100% vollständig"

  main_axes:
    - name: "Finanzen & Performance"
      code: "FIN"
      factors: 80
      percentage: 20
      sub_axes: 8
      description: "Ertrag, Kosten, Profitabilität, Bilanz, Liquidität, Kapital"
      data_coverage: "Geschäftsberichte, Core Banking, SIX"

    - name: "Markt & Wettbewerb"
      code: "MKT"
      factors: 60
      percentage: 15
      sub_axes: 6
      description: "Marktanteile, Wettbewerber, Kundenstruktur, Produkte, Preise"
      data_coverage: "VSKB, SNB Bankenstatistik, Kundenumfragen"

    - name: "Organisation & Governance"
      code: "ORG"
      factors: 50
      percentage: 12.5
      sub_axes: 5
      description: "Struktur, Führung, Prozesse, Compliance, Entscheidungswege"
      data_coverage: "Corporate Governance Report, Organigramme"

    - name: "Strategie & Transformation"
      code: "STR"
      factors: 40
      percentage: 10
      sub_axes: 4
      description: "Strategische Initiativen, Change, Innovation, Projekte"
      data_coverage: "Strategiepapiere, Projektportfolio"

    - name: "Menschen & Kultur"
      code: "PEO"
      factors: 80
      percentage: 20
      sub_axes: 8
      description: "Mitarbeiter, Kultur, Engagement, Führung, Entwicklung, Diversität"
      data_coverage: "HR-Systeme, Mitarbeiterbefragungen"

    - name: "Technologie & Digital"
      code: "TEC"
      factors: 40
      percentage: 10
      sub_axes: 4
      description: "IT-Infrastruktur, Digitalisierung, Daten, KI, Cybersecurity"
      data_coverage: "IT-Systeme, Digital Banking Metrics"

    - name: "Risiko & Compliance"
      code: "RIS"
      factors: 30
      percentage: 7.5
      sub_axes: 3
      description: "Regulierung, Risikomanagement, Kreditrisiko, Operationelles Risiko"
      data_coverage: "Risk Reports, FINMA Audits"

    - name: "Stakeholder & Reputation"
      code: "STK"
      factors: 20
      percentage: 5
      sub_axes: 2
      description: "Eigentümer, Kunden, Politik, Medien, Öffentlichkeit"
      data_coverage: "Medienanalysen, Stakeholder-Befragungen"

# =============================================================================
# Detailstruktur nach Hauptachse
# =============================================================================
structure:
  # ---------------------------------------------------------------------------
  # FINANZEN & PERFORMANCE (FIN) – 80 Faktoren
  # ---------------------------------------------------------------------------
  FIN:
    name: "Finanzen & Performance"
    total_factors: 80
    function: "Finanzielle Basis und Leistungsmessung"
    sub_axes:
      - code: FIN-ERG
        name: "Ertragslage"
        description: "Zinsertrag, Kommissionsertrag, Handelsertrag"
        factors: 15

      - code: FIN-KOS
        name: "Kostenlage"
        description: "Personal, Sachaufwand, Abschreibungen"
        factors: 10

      - code: FIN-PRO
        name: "Profitabilität"
        description: "Gewinn, Margen, ROE, ROA"
        factors: 10

      - code: FIN-BIL
        name: "Bilanzstruktur"
        description: "Aktiva, Passiva, Bilanzsumme"
        factors: 15

      - code: FIN-LIQ
        name: "Liquidität"
        description: "LCR, NSFR, Liquiditätsreserven"
        factors: 8

      - code: FIN-KAP
        name: "Kapitalausstattung"
        description: "Eigenmittel, CET1, Leverage"
        factors: 10

      - code: FIN-KRE
        name: "Kreditportfolio"
        description: "Hypotheken, Firmenkredite, Ausfallraten"
        factors: 7

      - code: FIN-ANL
        name: "Anlagegeschäft"
        description: "AuM, Performance, Flows"
        factors: 5

  # ---------------------------------------------------------------------------
  # MARKT & WETTBEWERB (MKT) – 60 Faktoren
  # ---------------------------------------------------------------------------
  MKT:
    name: "Markt & Wettbewerb"
    total_factors: 60
    function: "Marktposition und Wettbewerbsdynamik"
    sub_axes:
      - code: MKT-ANT
        name: "Marktanteile"
        description: "Hypotheken, Spargelder, Firmenkunden nach Region"
        factors: 12

      - code: MKT-WET
        name: "Wettbewerber"
        description: "ZKB, SGKB, BCV, Raiffeisen, UBS Position"
        factors: 10

      - code: MKT-KUN
        name: "Kundenstruktur"
        description: "Segmente, Altersverteilung, Beziehungsdauer"
        factors: 12

      - code: MKT-PRO
        name: "Produktportfolio"
        description: "Produktnutzung, Cross-Selling, Penetration"
        factors: 10

      - code: MKT-PRS
        name: "Preispositionierung"
        description: "Hypothekarzinsen, Gebühren, Spreads"
        factors: 8

      - code: MKT-KAN
        name: "Vertriebskanäle"
        description: "Filialen, Digital, Berater"
        factors: 8

  # ---------------------------------------------------------------------------
  # ORGANISATION & GOVERNANCE (ORG) – 50 Faktoren
  # ---------------------------------------------------------------------------
  ORG:
    name: "Organisation & Governance"
    total_factors: 50
    function: "Strukturelle Rahmenbedingungen und Steuerung"
    sub_axes:
      - code: ORG-STR
        name: "Organisationsstruktur"
        description: "Departemente, Bereiche, Hierarchie"
        factors: 10

      - code: ORG-GOV
        name: "Corporate Governance"
        description: "VR, GL, Ausschüsse, Kontrolle"
        factors: 12

      - code: ORG-PRO
        name: "Prozesse"
        description: "Kernprozesse, Effizienz, Automation"
        factors: 12

      - code: ORG-ENT
        name: "Entscheidungswege"
        description: "Delegation, Kompetenzen, Geschwindigkeit"
        factors: 8

      - code: ORG-COM
        name: "Compliance & Kontrolle"
        description: "IKS, Audit, Revision"
        factors: 8

  # ---------------------------------------------------------------------------
  # STRATEGIE & TRANSFORMATION (STR) – 40 Faktoren
  # ---------------------------------------------------------------------------
  STR:
    name: "Strategie & Transformation"
    total_factors: 40
    function: "Strategische Ausrichtung und Veränderungsfähigkeit"
    sub_axes:
      - code: STR-VIS
        name: "Vision & Positionierung"
        description: "LUKB30, Top 5 Ambition, Differenzierung"
        factors: 8

      - code: STR-INI
        name: "Strategische Initiativen"
        description: "Projekte, Programme, Meilensteine"
        factors: 12

      - code: STR-INN
        name: "Innovation"
        description: "Neue Produkte, Piloten, Experimente"
        factors: 10

      - code: STR-CHG
        name: "Change Management"
        description: "Veränderungsfähigkeit, Agilität, Resilienz"
        factors: 10

  # ---------------------------------------------------------------------------
  # MENSCHEN & KULTUR (PEO) – 80 Faktoren
  # ---------------------------------------------------------------------------
  PEO:
    name: "Menschen & Kultur"
    total_factors: 80
    function: "Humankapital und kulturelle Dynamik"
    sub_axes:
      - code: PEO-BES
        name: "Personalbestand"
        description: "Headcount, FTE, Struktur"
        factors: 12

      - code: PEO-FLU
        name: "Fluktuation & Rekrutierung"
        description: "Kündigungen, Neueinstellungen, Time-to-Hire"
        factors: 10

      - code: PEO-ENG
        name: "Engagement & Zufriedenheit"
        description: "eNPS, Engagement Index, Stimmung"
        factors: 12

      - code: PEO-KUL
        name: "Unternehmenskultur"
        description: "Werte, Normen, Verhaltensweisen"
        factors: 12

      - code: PEO-FUE
        name: "Führung & Leadership"
        description: "Führungsstile, 360°-Feedback, Kaderqualität"
        factors: 10

      - code: PEO-ENT
        name: "Entwicklung & Lernen"
        description: "Weiterbildung, Karrierepfade, Talentmanagement"
        factors: 10

      - code: PEO-DIV
        name: "Diversität & Inklusion"
        description: "Gender, Alter, Herkunft"
        factors: 8

      - code: PEO-VER
        name: "Vergütung & Benefits"
        description: "Lohnstruktur, Variable, Nebenleistungen"
        factors: 6

  # ---------------------------------------------------------------------------
  # TECHNOLOGIE & DIGITAL (TEC) – 40 Faktoren
  # ---------------------------------------------------------------------------
  TEC:
    name: "Technologie & Digital"
    total_factors: 40
    function: "Technologische Basis und digitale Transformation"
    sub_axes:
      - code: TEC-INF
        name: "IT-Infrastruktur"
        description: "Core Banking, Systeme, Cloud"
        factors: 10

      - code: TEC-DIG
        name: "Digital Banking"
        description: "E-Banking, Mobile, Adoption"
        factors: 12

      - code: TEC-DAT
        name: "Daten & Analytics"
        description: "Data Quality, Analytics Maturity, Use Cases"
        factors: 10

      - code: TEC-SEC
        name: "Cybersecurity"
        description: "Incidents, Schutzlevel, Awareness"
        factors: 8

  # ---------------------------------------------------------------------------
  # RISIKO & COMPLIANCE (RIS) – 30 Faktoren
  # ---------------------------------------------------------------------------
  RIS:
    name: "Risiko & Compliance"
    total_factors: 30
    function: "Risikomanagement und regulatorische Compliance"
    sub_axes:
      - code: RIS-KRE
        name: "Kreditrisiko"
        description: "Ausfälle, Wertberichtigungen, LTV"
        factors: 10

      - code: RIS-OPR
        name: "Operationelles Risiko"
        description: "Incidents, Verluste, Near-Misses"
        factors: 10

      - code: RIS-REG
        name: "Regulatorische Compliance"
        description: "FINMA, AML, DSG, MiFID"
        factors: 10

  # ---------------------------------------------------------------------------
  # STAKEHOLDER & REPUTATION (STK) – 20 Faktoren
  # ---------------------------------------------------------------------------
  STK:
    name: "Stakeholder & Reputation"
    total_factors: 20
    function: "Beziehungen zu externen Anspruchsgruppen"
    sub_axes:
      - code: STK-EIG
        name: "Eigentümer"
        description: "Kanton, Aktionäre, Dividende"
        factors: 8

      - code: STK-REP
        name: "Reputation & Medien"
        description: "Medienresonanz, Image, Vertrauen"
        factors: 12

# =============================================================================
# Systemische Kopplung
# =============================================================================
systemic_coupling:
  diagram: |
    FIN ──► MKT ──► STK
     │       │       │
     └───────┼───────┘
             │
             ▼
           PEO ◄── TEC ◄── STR
             │
             ▼
           ORG ◄── RIS

  description: |
    - Finanzielle Performance (FIN) treibt Marktposition (MKT) und Reputation (STK)
    - Strategie (STR) transformiert über Technologie (TEC) und Menschen (PEO)
    - Organisation (ORG) und Risiko (RIS) sind Enabler und Constraints
    - Menschen & Kultur (PEO) ist die zentrale Transformationsachse

