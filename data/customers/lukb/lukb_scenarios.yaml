# =============================================================================
# MONTE CARLO PARAMETERS
# =============================================================================
monte_carlo:
  description: "Parameter für Monte Carlo Simulation"
  iterations: 10000

  distributions:
    gdp_growth:
      type: "normal"
      mean: 0.015
      std: 0.008

    interest_rate_2030:
      type: "triangular"
      min: 0.00
      mode: 0.75
      max: 1.50

    strategy_execution:
      type: "beta"
      alpha: 4
      beta: 3
      # Mean ~0.57, skewed slightly positive

    change_success:
      type: "beta"
      alpha: 3.5
      beta: 2.5
      # Mean ~0.58

    competitive_pressure:
      type: "uniform"
      min: 0.3
      max: 0.8

  correlations:
    gdp_to_real_estate: 0.65
    interest_to_profit: 0.45
    change_to_execution: 0.70
    execution_to_profit: 0.55

