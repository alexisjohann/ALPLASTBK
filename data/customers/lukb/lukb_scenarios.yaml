    makroökonomisches Umfeld, erhöhter Wettbewerbsdruck und interne
    Umsetzungsprobleme führen zu Stagnation.

    Der Change-Prozess scheitert teilweise: Identitäts-Widerstand
    blockiert die nationale Expansion, Skeptiker gewinnen Oberhand.
    Das Rebranding wird als "Aufgabe der Luzerner Identität"
    wahrgenommen und erzeugt Unruhe bei Mitarbeitern und Kunden.

    Die LUKB muss auf Defensive umschalten und Luzern verteidigen.

