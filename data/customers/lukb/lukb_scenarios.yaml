    Die LUKB setzt ihre Strategie LUKB30 erfolgreich um, erreicht aber nicht
    alle ambitionierten Ziele. Der Heimatmarkt Luzern bleibt stabil, die
    nationale Expansion im Private Banking zeigt moderate Erfolge.

    Das Zinsumfeld normalisiert sich, was den Nettozinsertrag unter Druck
    setzt. Die Diversifikation der Erträge gelingt teilweise. Die CIR
    bleibt unter 50%, aber der Effizienzvorsprung schrumpft.

    Der Change-Prozess erreicht 60-70% der Kader nachhaltig.

  assumptions:
    macro:
      snb_policy_rate_2030: 0.75
      gdp_growth_ch_annual: 0.015
      gdp_growth_luzern_annual: 0.018
      real_estate_price_growth: 0.02
      inflation_rate: 0.012

    competitive:
      market_consolidation: "moderat"
      fintech_disruption: "begrenzt"
      großbank_retail_aktivität: "stabil"

    internal:
      strategy_execution_score: 0.70
      change_success_rate: 0.65
      talent_retention_rate: 0.92
      digital_transformation_progress: 0.75

