# =============================================================================
# SCENARIO OVERVIEW
# =============================================================================
scenario_overview:
  description: |
    Drei Szenarien für die LUKB30-Strategie basierend auf:
    - Makroökonomische Entwicklung Schweiz
    - Wettbewerbsdynamik im Banking
    - Interne Umsetzungsfähigkeit
    - Erfolg des Change-Prozesses (Off-Site + Follow-up)

  scenario_drivers:
    macro:
      - "Zinsentwicklung SNB"
      - "BIP-Wachstum Schweiz/Zentralschweiz"
      - "Immobilienmarkt"
      - "Digitalisierungstempo"
    competitive:
      - "Konsolidierung unter Kantonalbanken"
      - "FinTech-Disruption"
      - "Grossbanken-Aktivität im Retail"
    internal:
      - "Strategieumsetzung LUKB30"
      - "Change-Erfolg bei Kadern"
      - "Technologie-Investitionen"
      - "Talent Retention"

  probability_distribution:
    base: 0.55
    optimistic: 0.25
    pessimistic: 0.20

