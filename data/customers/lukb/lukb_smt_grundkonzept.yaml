# ============================================================================
# ⚠️ OFFENE PUNKTE / ZU KLÄREN
# ============================================================================
open_items:
  status: "WORK IN PROGRESS - Validierung erforderlich"

  note: |
    Dieses Dokument fasst unser Verständnis aus dem Gespräch mit den
    3 HR-Damen zusammen. Folgende Punkte müssen noch geklärt werden:

  priority_high:
    - item: "Exakter Jahresrhythmus bestätigen"
      our_understanding: "3-4 Events: 1× März, 1× November, 1-2× Juni/Juli"
      question: "Stimmt das? Gibt es Ausnahmen?"

    - item: "Thematische Ausrichtung pro Event"
      our_understanding: "Q1=Strategie, Q2/Q3=Entwicklung, Q4=Inspiration"
      question: "Ist das so geplant oder variiert es?"

    - item: "Gibt es ein formelles SMT-Grundkonzept?"
      our_understanding: "Scheint kein dokumentiertes Konzept zu existieren"
      question: "Soll eines erstellt werden? Von wem?"

  priority_medium:
    - item: "Teilnehmerkreis"
      our_understanding: "~46 Personen (5 GL + ~40 Kader)"
      question: "Exakte Zahl? Wer gehört dazu?"

    - item: "Historische SMT-Themen 2024/2025"
      our_understanding: "Nur Oktober 2025 dokumentiert"
      question: "Was waren die Themen der anderen SMTs?"

    - item: "Erfolgsmessung"
      our_understanding: "Keine systematische Messung bekannt"
      question: "Wird NPS/Feedback erhoben? Wie?"

  nice_to_have:
    - item: "Budget und Ressourcen"
      our_understanding: "Nicht besprochen"

    - item: "Externe Partner"
      our_understanding: "Jenewein, Leasi bekannt - wer noch?"

    - item: "Verbindung zu Führungsverständnis/HR-Strategie"
      our_understanding: "Implizit vorhanden, aber nicht formalisiert"
