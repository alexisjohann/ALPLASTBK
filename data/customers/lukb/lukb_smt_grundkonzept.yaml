# ============================================================================
# LUKB SMT Grundkonzept - Senior Management Team Events
# ============================================================================
# Work-In-Progress: Zusammenfassung aus Gespräch mit HR-Team
# Created: 2026-02-05
# ============================================================================

metadata:
  document_type: "conversation_notes"
  customer_id: "LUKB"
  version: "0.1-WIP"
  title: "SMT Grundkonzept - Gesprächsnotizen HR-Team"
  status: "Work-In-Progress"
  context: |
    Zusammenfassung aus Gespräch mit den 3 HR-Damen.
    Nicht als fertiges Vorschlagsdokument zu verstehen,
    sondern als Arbeitsgrundlage zur weiteren Klärung.

# ============================================================================
# WAS WIR VERSTANDEN HABEN
# ============================================================================
understanding:
  gespraechspartner: "3 HR-Damen (Namen einfügen)"
  gespraechsdatum: "TBD"

  smt_definition: |
    Das Senior Management Team (SMT) ist das erweiterte Führungsgremium der LUKB,
    bestehend aus der Geschäftsleitung (GL, 5 Personen) und den Schlüsselkadern
    (~40 Führungskräfte), insgesamt ca. 45-50 Teilnehmende.
    → Zu validieren: Exakte Zusammensetzung

  strategischer_zweck: |
    Die SMT-Events scheinen als zentrales HR-Instrument der Führungsentwicklung
    zu dienen. Aus dem Gespräch verstanden wir folgende Funktionen:
    - Strategievermittlung (top-down)
    - Führungsentwicklung (inside-out)
    - Kulturprägung (peer-to-peer)
    - Transformation (bottom-up Commitment)
    → Zu validieren: Ist das vollständig?

  kernbotschaft_smt_2025: |
    "Strategie vermittelt Richtung.
     Haltung erzeugt Bewegung.
     Leadership beginnt bei mir."
    (aus SMT Oktober 2025 - Silvana Leasi Workshop)

# ============================================================================
# JÄHRLICHER RHYTHMUS (wie verstanden)
# ============================================================================
annual_calendar:
  total_days: "3-4 Tage pro Jahr (gemäss Gespräch)"
  note: "Zu validieren - basiert auf mündlicher Information"

  events:
    - id: SMT-Q1
      timing: "März"
      duration: "1 Tag"
      typical_focus: "Jahresstart & Strategische Prioritäten"
      themes:
        - "Rückblick Vorjahr & Lessons Learned"
        - "Strategische Prioritäten des Jahres"
        - "Operative Ziele & KPIs"
        - "Marktentwicklung & Wettbewerb"
      format: "Informations- und Planungsevent"

    - id: SMT-Q2/Q3
      timing: "Juni/Juli"
      duration: "1-2 Tage"
      typical_focus: "Vertiefung & Entwicklung"
      themes:
        - "Deep-Dive in strategische Themen"
        - "Führungsentwicklung & Skills"
        - "Teambuilding & Vernetzung"
        - "Innovation & Zukunftsthemen"
      format: "Workshop- und Entwicklungsevent"
      note: "Längeres Format ermöglicht tiefere Arbeit"

    - id: SMT-Q4
      timing: "Oktober/November"
      duration: "1 Tag"
      typical_focus: "Inspiration & Ausrichtung"
      themes:
        - "Externe Impulse (Keynote Speaker)"
        - "Leadership & Mindset"
        - "Kulturentwicklung"
        - "Commitment für neue Strategieperiode"
      format: "Inspirations- und Reflexionsevent"
      example_2025:
        date: "2025-10-28"
        keynote: "Prof. Wolfgang Jenewein"
        workshop: "Silvana Leasi - Growth Mindset"
        duration_workshop: "140 Minuten"

# ============================================================================
# STRATEGISCHE FUNKTION ALS HR-INSTRUMENT
# ============================================================================
strategic_hr_function:
  alignment_hr_strategie:
    reference: "Funktionalstrategie HR 2026-2030"
    hauptfeld: "1. Führung & Organisation"
    fokusthema: "1A Führungsentwicklung"

  zielbild_connection: |
    "Führung ist wirksam, zukunftsorientiert und kulturprägend"
    → SMT-Events sind der primäre Ort, wo dieses Zielbild
      erlebt, entwickelt und multipliziert wird.

  four_pillars:
    - pillar: "Strategieverzahnung"
      smt_role: |
        Führungskräfte verstehen und internalisieren strategische Prioritäten.
        Sie werden zu "Übersetzern" der Strategie in ihre Teams.
      events: ["SMT-Q1", "SMT-Q4"]

    - pillar: "Datenbasierte Steuerung"
      smt_role: |
        Präsentation von Leadership Analytics, 360°-Feedback Insights,
        Stimmungsbarometer-Ergebnisse im geschützten Rahmen.
      events: ["SMT-Q1", "SMT-Q2/Q3"]

    - pillar: "Klarer Entwicklungsfokus"
      smt_role: |
        Workshops zur Führungsentwicklung, Selbstreflexion,
        High-Potential-Identifikation und -Entwicklung.
      events: ["SMT-Q2/Q3", "SMT-Q4"]

    - pillar: "Kulturprägung"
      smt_role: |
        SMT als "Kulturträger" - was hier gelebt wird,
        multipliziert sich in die gesamte Organisation.
      events: ["alle"]

# ============================================================================
# VERBINDUNG ZUM FÜHRUNGSVERSTÄNDNIS
# ============================================================================
fuehrungsverstaendnis_integration:
  lukb_acronym_in_smt:
    L_leidenschaftlich:
      smt_manifestation: "Keynotes inspirieren, Energie aufbauen"
      workshop_elements: ["Warm-up", "Meine Führungsvision"]

    U_unternehmerisch:
      smt_manifestation: "Strategische Prioritäten, Gesamtbank-Blick"
      workshop_elements: ["Strategiepräsentation", "Marktanalyse"]

    K_kollaborativ:
      smt_manifestation: "Murmelgruppen, Peer-Reflexion, Vernetzung"
      workshop_elements: ["Partnerreflexion", "Teamübungen"]

    B_bemerkenswert:
      smt_manifestation: "Commitment sichtbar machen, Mindset Wall"
      workshop_elements: ["Dead Leaf & New Seed", "Führungsvision-Satz"]

  three_levels_in_smt:
    ich:
      focus: "Selbstführung, eigenes Mindset"
      smt_time_share: "~40%"
      methods: ["Selbstreflexion", "Mindset Check", "Führungsvision"]

    mensch_und_team:
      focus: "Teamführung, Peer-Exchange"
      smt_time_share: "~35%"
      methods: ["Murmelgruppen", "Partnerreflexion", "Networking"]

    organisation:
      focus: "Organisationsführung, Strategie"
      smt_time_share: "~25%"
      methods: ["Keynotes", "GL-Inputs", "Strategiepräsentation"]

# ============================================================================
# METHODISCHE BAUSTEINE
# ============================================================================
methodical_elements:
  theoretical_frameworks:
    - name: "Growth Mindset"
      author: "Carol Dweck"
      application: "Basis für Mindset-Entwicklung"
      typical_event: "SMT-Q4"

    - name: "Daring Leadership"
      author: "Brené Brown"
      application: "Authentizität, Mut, Empathie"
      typical_event: "SMT-Q4"

    - name: "Leadership Pipeline"
      application: "Entwicklungsstufen Ich → Team → Organisation"
      typical_event: "SMT-Q2/Q3"

  recurring_formats:
    - format: "Keynote + Workshop"
      description: "Externer Input gefolgt von interner Verarbeitung"
      duration: "3-4 Stunden"
      typical_event: "SMT-Q4"

    - format: "Strategiepräsentation GL"
      description: "Top-down Vermittlung strategischer Prioritäten"
      duration: "60-90 Minuten"
      typical_event: "SMT-Q1"

    - format: "Deep-Dive Workshop"
      description: "Intensive Arbeit an spezifischen Themen"
      duration: "2-4 Stunden"
      typical_event: "SMT-Q2/Q3"

    - format: "Reflexions-Übung"
      description: "Strukturierte Selbstreflexion mit Peer-Austausch"
      duration: "20-40 Minuten"
      typical_event: "alle"

  signature_exercises:
    - name: "Mindset Check"
      description: "8-10 Fragen zur Selbsteinschätzung (Skala 1-10)"
      focus: "Growth vs Fixed Mindset, Selbstführung, Resilienz"
      source: "SMT Oktober 2025"

    - name: "Meine Führungsvision"
      description: |
        1 Satz formulieren:
        "Ich möchte dass meine Mitarbeitenden mich als Leader
        folgendermassen sehen..."
      focus: "Führungsidentität, Vision"
      source: "SMT Oktober 2025"

    - name: "Dead Leaf & New Seed"
      description: |
        Zwei Karten schreiben:
        - Dead Leaf (rot): "Womit höre ich auf?"
        - New Seed (grün): "Welche neue Gewohnheit etabliere ich?"
      focus: "Transformation, Commitment"
      output: "Mindset Wall"
      source: "SMT Oktober 2025"

# ============================================================================
# VERBINDUNG ZUR BRAND IDENTITY 2026
# ============================================================================
brand_identity_alignment:
  promise_connection: |
    "WIR SCHAFFEN RAUM" → SMT schafft Raum für:
    - Reflexion (Zeit für Selbstführung)
    - Vernetzung (Peer-Exchange)
    - Entwicklung (Neue Kompetenzen)
    - Transformation (Loslassen & Starten)

  values_in_smt:
    verlässlich:
      manifestation: "Regelmässiger Rhythmus, klare Struktur"
      smt_example: "3-4 feste Termine pro Jahr"

    zugänglich:
      manifestation: "Offener Austausch, Du-Kultur, keine Hierarchiebarrieren"
      smt_example: "Murmelgruppen GL + Kader gemischt"

    ambitioniert:
      manifestation: "Hochkarätige Keynotes, anspruchsvolle Reflexion"
      smt_example: "Prof. Jenewein, Growth Mindset Challenge"

  experience_principles_in_smt:
    nahbar: "Persönliche Reflexion teilen, Peer-Feedback"
    souverän: "Haltung zeigen auch unter Druck, klare Commitments"
    begeisternd: "Inspirierende Keynotes, transformative Übungen"

# ============================================================================
# ERFOLGSMESSUNG
# ============================================================================
success_metrics:
  quantitative:
    - metric: "Teilnahmequote"
      target: "> 95%"
      frequency: "pro Event"

    - metric: "NPS (Net Promoter Score)"
      target: "> 50"
      frequency: "nach jedem Event"

    - metric: "Commitment-Umsetzungsrate"
      target: "> 70%"
      frequency: "Follow-up 3 Monate nach Event"
      description: "Dead Leaf wirklich losgelassen, New Seed etabliert"

  qualitative:
    - metric: "Führungswirksamkeit"
      measurement: "360°-Feedback, Mitarbeiterbefragung"
      frequency: "jährlich"

    - metric: "Kulturentwicklung"
      measurement: "Stimmungsbarometer, Engagement Survey"
      frequency: "halbjährlich"

    - metric: "Strategieverständnis"
      measurement: "Pulse Survey nach SMT"
      frequency: "nach SMT-Q1"

# ============================================================================
# ROLLEN & VERANTWORTLICHKEITEN
# ============================================================================
roles:
  gl_role:
    description: "Strategische Ausrichtung, Sponsorship, Vorbildfunktion"
    activities:
      - "Eröffnung und Abschluss der Events"
      - "Strategiepräsentation"
      - "Aktive Teilnahme an Workshops (nicht nur Beobachtung)"

  hr_role:
    description: "Konzeption, Organisation, Qualitätssicherung"
    activities:
      - "Jahresplanung der SMT-Events"
      - "Auswahl externer Speaker/Facilitators"
      - "Workshop-Design gemeinsam mit externen Partnern"
      - "Nachbereitung und Follow-up"

  external_partners:
    description: "Fachliche Inputs, neutrale Moderation"
    examples:
      - type: "Keynote Speaker"
        example: "Prof. Wolfgang Jenewein (HSG)"
        focus: "Leadership, Transformation"
      - type: "Workshop Facilitator"
        example: "Silvana Leasi"
        focus: "Growth Mindset, Führungsentwicklung"
      - type: "Beratungspartner"
        example: "FehrAdvice & Partners"
        focus: "Behavioral Insights, EBF-Integration"

# ============================================================================
# EBF INTEGRATION
# ============================================================================
ebf_integration:
  relevant_10c_dimensions:
    WHO:
      - "Senior Management Team als Multiplikator-Segment"
      - "~46 Führungskräfte mit Hebelwirkung auf ~800 MA"
    WHAT:
      - "U_IDN (Identität): Leadership Identity, L-U-K-B"
      - "U_A (Awareness): Selbstreflexion, Mindset Check"
    HOW:
      - "Komplementarität: Strategie × Haltung × Verhalten"
      - "Multiplikator-Effekt: SMT → Teams → Organisation"
    WHEN:
      - "Ψ_T (Temporal): 3-4 strategische Momente pro Jahr"
      - "Ψ_C (Cognitive): Geschützter Raum, Zeit für Reflexion"
    AWARE:
      - "Signal-Bewusstsein als Leader"
      - "Awareness durch strukturierte Reflexion erhöhen"
    READY:
      - "Willingness: Dead Leaf (Loslassen) vs New Seed (Starten)"
      - "Commitment öffentlich machen (Mindset Wall)"
    STAGE:
      - "Leadership Journey: Reflexion → Vision → Commitment → Action"

  behavioral_insights:
    - insight: "Commitment durch öffentliche Bekundung"
      theory: "Commitment & Consistency (Cialdini)"
      application: "Mindset Wall, Führungsvision teilen"

    - insight: "Soziale Verstärkung durch Peer-Austausch"
      theory: "Social Learning (Bandura)"
      application: "Murmelgruppen, gemischte Teams"

    - insight: "Identitäts-Aktivierung durch Akronyme"
      theory: "Chunking, Mnemonic Devices"
      application: "L-U-K-B als Gedächtnisanker"

    - insight: "Implementation Intentions steigern Umsetzung"
      theory: "Gollwitzer (1999)"
      application: "Dead Leaf & New Seed als konkrete Absichten"

  gamma_hypotheses:
    - hypothesis: "γ(SMT, Teamperformance) > 0"
      explanation: |
        Bessere SMT-Führungsentwicklung verstärkt Teamperformance.
        Multiplikator-Effekt durch Führungskaskade.

    - hypothesis: "γ(AWARE, READY) > 0"
      explanation: |
        Höhere Awareness (Mindset Check) verstärkt Readiness (Commitment).
        Selbsterkenntnis als Voraussetzung für Verhaltensänderung.

