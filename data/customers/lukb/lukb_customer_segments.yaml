# =============================================================================
# SEGMENT INTERDEPENDENCIES
# =============================================================================
segment_interdependencies:
  description: |
    Segmente sind nicht isoliert - es gibt wichtige Verbindungen.

  cross_segment_flows:
    retail_to_mass_affluent:
      trigger: "Einkommen steigt, Erbschaft, Immobilienkauf"
      conversion_rate_annual: 0.03
      lukb_action: "Proaktive Erkennung + Upgrade-Beratung"

    mass_affluent_to_hnwi:
      trigger: "Unternehmensverkauf, Karrieresprung, Erbschaft"
      conversion_rate_annual: 0.02
      lukb_action: "Frühzeitig Private Banking einbinden"

    kmu_owner_to_private_banking:
      trigger: "Unternehmer ist oft auch HNWI"
      penetration_current: 0.40
      penetration_target: 0.70
      lukb_action: "Systematische Verknüpfung FK + PB"

  segment_synergies:
    - synergy: "KMU-Inhaber sind oft HNWI"
      value: "Cross-Selling Private Banking"
    - synergy: "HNWI empfehlen an Peer-Netzwerk"
      value: "Referral-Potenzial"
    - synergy: "Familien über Generationen betreuen"
      value: "Intergenerational Wealth Transfer"

