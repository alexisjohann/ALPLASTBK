      - "Liquide Vermögenswerte < CHF 100'000"
      - "Standardprodukte (Konto, Karte, Hypothek)"
      - "Wenig Beratungsbedarf"
    volume_thresholds:
      deposits_max: 100000
      aum_max: 50000
      income_typical: [50000, 120000]

  demographics:
    age_distribution:
      "18-30": 0.15
      "31-45": 0.30
      "46-60": 0.30
      "60+": 0.25
    household_types:
      singles: 0.35
      families: 0.45
      rentner: 0.20
    geographic:
      luzern_stadt: 0.30
      luzern_agglomeration: 0.40
      zentralschweiz_uebrige: 0.25
      ausserkantonal: 0.05

  behavioral_profile:
    # 10C: WHAT - Utility Dimensions
    utility_weights:
      u_F: 0.45  # Finanziell - Preis wichtig
      u_S: 0.20  # Sozial - Empfehlungen von Bekannten
      u_D: 0.15  # Bequemlichkeit
      u_P: 0.10  # Prozess-Einfachheit
      u_X: 0.05  # Identität (Bank als Teil von mir)
      u_E: 0.05  # Emotion

    # 10C: AWARE - Awareness & Information
    awareness:
      financial_literacy: 0.55  # Mittel
      product_knowledge: 0.45  # Niedrig-Mittel
      digital_savviness: 0.60  # Mittel
      price_awareness: 0.75   # Hoch

    # 10C: READY - Willingness
    readiness:
      switch_willingness: 0.35  # Niedrig (Trägheit)
      advice_seeking: 0.40      # Mittel
      digital_adoption: 0.65    # Mittel-hoch
      product_complexity_tolerance: 0.35  # Niedrig

    # Behavioral Parameters
    parameters:
      loss_aversion_lambda: 2.2
      present_bias_beta: 0.85
      social_proof_sensitivity: 0.65
      default_effect_strength: 0.78
      hassle_cost_sensitivity: 0.82

  needs_and_pain_points:
    primary_needs:
      - need: "Einfaches, günstiges Banking"
        priority: 1
        solution: "Digital-first, tiefe Gebühren"
      - need: "Erreichbarkeit bei Problemen"
        priority: 2
        solution: "Lokale Filialen + guter Support"
      - need: "Sichere Bank"
        priority: 3
        solution: "Staatsgarantie kommunizieren"

    pain_points:
      - pain: "Komplizierte Prozesse"
        severity: 0.75
        lukb_performance: 0.60
      - pain: "Zu teure Gebühren"
        severity: 0.70
        lukb_performance: 0.65
      - pain: "Schlechte App/Online-Banking"
        severity: 0.60
        lukb_performance: 0.70

  channel_preferences:
    digital_banking: 0.55
    branch_visits: 0.25
    phone: 0.15
    paper_mail: 0.05

  product_penetration:
    lohnkonto: 0.95
    sparkonto: 0.80
    debitkarte: 0.92
    kreditkarte: 0.45
    hypothek: 0.25
    vorsorge_3a: 0.35
    anlagefonds: 0.15

  intervention_sensitivity:
    # EBF Intervention Type Effectiveness
    T1_information: 0.50      # Mittel
    T2_incentives: 0.75       # Hoch (preissensitiv)
    T3_choice_architecture: 0.80  # Hoch (Defaults wichtig)
    T4_commitment: 0.45       # Mittel
    T5_identity: 0.35         # Niedrig
    T6_social: 0.65           # Mittel-hoch

  strategic_implications:
    lukb30_role: "Verteidigen, nicht investieren"
    growth_potential: "Niedrig (Commodity)"
    churn_risk: "Mittel (Neobanks, Raiffeisen)"
    recommended_actions:
      - "Digitales Banking verbessern"
      - "Gebühren wettbewerbsfähig halten"
      - "Cross-Selling zu Mass Affluent"

