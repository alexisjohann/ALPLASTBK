# =============================================================================
# SEGMENT OVERVIEW
# =============================================================================
segment_overview:
  description: |
    LUKB bedient fünf Hauptkundensegmente:
    - Retail (Basis-Privatkunden)
    - Mass Affluent (gehobene Privatkunden)
    - HNWI (High Net Worth Individuals)
    - KMU (Kleine und mittlere Unternehmen)
    - Institutionelle (Pensionskassen, Stiftungen)

  segment_distribution:
    retail:
      clients_estimate: 180000
      share_of_clients: 0.75
      share_of_revenue: 0.30
    mass_affluent:
      clients_estimate: 45000
      share_of_clients: 0.19
      share_of_revenue: 0.35
    hnwi:
      clients_estimate: 8000
      share_of_clients: 0.03
      share_of_revenue: 0.25
    kmu:
      clients_estimate: 6500
      share_of_clients: 0.027
      share_of_revenue: 0.08
    institutional:
      clients_estimate: 350
      share_of_clients: 0.001
      share_of_revenue: 0.02

  strategic_focus_lukb30:
    primary_growth: ["mass_affluent", "hnwi"]
    defend: ["retail", "kmu"]
    develop: ["institutional"]

