---
# LUKB Gamma Matrix (γ) - Factor Interdependencies
# How Factors Influence Each Other in LUKB30 Context
# Last Updated: 2026-01-26
# Database Version: 1.0.0

metadata:
  customer: "LUKB"
  context: "Interdependenz-Matrix für Strategie LUKB30 und Change"
  version: "1.0.0"
  last_updated: "2026-01-26"
  ebf_reference: "Appendix B (CORE-HOW): Complementarity γ"
  methodology: |
    γ > 0: Positive Komplementarität (verstärken sich)
    γ < 0: Negative Komplementarität (schwächen sich / Crowding-Out)
    γ = 0: Unabhängig
    Skala: [-1.0, +1.0]

# =============================================================================
# STRATEGIC FACTOR INTERDEPENDENCIES (LUKB30 Pillars)
# =============================================================================
strategic_interdependencies:
  description: |
    Wie beeinflussen sich die 5 strategischen Säulen von LUKB30 gegenseitig?

  matrix:
    # S1-DEFEND: Luzern verteidigen
    S1_DEFEND:
      S1_DEFEND: 1.00
      S2_EXPAND: -0.25  # Spannung: Ressourcen, Identität
      S3_DATA: +0.35    # KI hilft bei lokalem Service
      S4_DIVERSIFY: +0.15  # Neue Produkte auch lokal
      S5_EFFICIENT: +0.40  # Effizienz hilft Verteidigung

    # S2-EXPAND: Schweiz erobern
    S2_EXPAND:
      S1_DEFEND: -0.25  # Ressourcen-Konkurrenz
      S2_EXPAND: 1.00
      S3_DATA: +0.55    # KI skaliert national
      S4_DIVERSIFY: +0.60  # Neue Produkte für Expansion
      S5_EFFICIENT: +0.30  # Effizienz ermöglicht Expansion

    # S3-DATA: KI & Daten
    S3_DATA:
      S1_DEFEND: +0.35
      S2_EXPAND: +0.55
      S3_DATA: 1.00
      S4_DIVERSIFY: +0.45  # KI für neue Produkte
      S5_EFFICIENT: +0.65  # KI = Automatisierung

    # S4-DIVERSIFY: Zinsunabhängig wachsen
    S4_DIVERSIFY:
      S1_DEFEND: +0.15
      S2_EXPAND: +0.60
      S3_DATA: +0.45
      S4_DIVERSIFY: 1.00
      S5_EFFICIENT: -0.20  # Neue Produkte = Komplexität

    # S5-EFFICIENT: Kosteneffizienz
    S5_EFFICIENT:
      S1_DEFEND: +0.40
      S2_EXPAND: +0.30
      S3_DATA: +0.65
      S4_DIVERSIFY: -0.20  # Trade-off
      S5_EFFICIENT: 1.00

  key_insights:
    positive_synergies:
      - pair: ["S3_DATA", "S5_EFFICIENT"]
        gamma: +0.65
        explanation: "KI-Investment zahlt sich in Effizienz aus"
      - pair: ["S2_EXPAND", "S4_DIVERSIFY"]
        gamma: +0.60
        explanation: "Nationale Expansion braucht neue Produkte"

    tensions:
      - pair: ["S1_DEFEND", "S2_EXPAND"]
        gamma: -0.25
        explanation: "Ressourcen-Allokation und Identitäts-Spannung"
        mitigation: "Sowohl-Als-Auch Framing"
      - pair: ["S4_DIVERSIFY", "S5_EFFICIENT"]
        gamma: -0.20
        explanation: "Neue Produkte erhöhen Komplexität"
        mitigation: "Standardisierte Produktplattformen"

# =============================================================================
# CHANGE FACTOR INTERDEPENDENCIES
# =============================================================================
change_interdependencies:
  description: |
    Wie beeinflussen sich Change-relevante Faktoren bei den Kadern?

  matrix:
    # Identity Factors
    identity_threat:
      identity_threat: 1.00
      identity_extension: -0.55  # Bedrohung blockiert Erweiterung
      self_efficacy: -0.40       # Bedrohung senkt Selbstwirksamkeit
      collective_efficacy: -0.35
      commitment_strength: -0.50
      peer_influence: +0.30      # Bedrohte suchen Peers

    identity_extension:
      identity_threat: -0.55
      identity_extension: 1.00
      self_efficacy: +0.45
      collective_efficacy: +0.50
      commitment_strength: +0.60
      peer_influence: +0.25

    # Efficacy Factors
    self_efficacy:
      identity_threat: -0.40
      identity_extension: +0.45
      self_efficacy: 1.00
      collective_efficacy: +0.70  # Stark korreliert
      commitment_strength: +0.55
      peer_influence: +0.20

    collective_efficacy:
      identity_threat: -0.35
      identity_extension: +0.50
      self_efficacy: +0.70
      collective_efficacy: 1.00
      commitment_strength: +0.65
      peer_influence: +0.45

    # Commitment Factors
    commitment_strength:
      identity_threat: -0.50
      identity_extension: +0.60
      self_efficacy: +0.55
      collective_efficacy: +0.65
      commitment_strength: 1.00
      peer_influence: +0.50

    # Social Factors
    peer_influence:
      identity_threat: +0.30  # Bedrohte suchen Peers
      identity_extension: +0.25
      self_efficacy: +0.20
      collective_efficacy: +0.45
      commitment_strength: +0.50
      peer_influence: 1.00

  key_insights:
    critical_path:
      description: |
        Der kritische Pfad für erfolgreichen Change:
        1. Identity Threat SENKEN (γ = -0.55 zu Extension)
        2. Identity Extension ERMÖGLICHEN
        3. Self/Collective Efficacy STEIGERN
        4. Commitment EINHOLEN
        5. Peer Influence NUTZEN

    leverage_points:
      - factor: "collective_efficacy"
        why: "Höchste positive γ-Werte zu Commitment (+0.65)"
        intervention: "Zeigen, dass LUKB als Team Top 5 kann"

      - factor: "identity_extension"
        why: "Blockiert alles wenn nicht erreicht (+0.60 zu Commitment)"
        intervention: "Sowohl-Als-Auch Framing konsequent"

    risk_factors:
      - factor: "identity_threat"
        why: "Negative γ zu allen anderen Faktoren"
        warning: "Wenn nicht adressiert, blockiert alles"

# =============================================================================
# INTERVENTION TYPE INTERDEPENDENCIES
# =============================================================================
intervention_interdependencies:
  description: |
    Wie beeinflussen sich verschiedene Interventionstypen?
    Basierend auf EBF Intervention Framework.

  matrix:
    # T1: Information
    T1_information:
      T1_information: 1.00
      T2_incentives: +0.20
      T3_choice_arch: +0.35
      T4_commitment: +0.40
      T5_identity: +0.25
      T6_social: +0.30

    # T2: Financial Incentives
    T2_incentives:
      T1_information: +0.20
      T2_incentives: 1.00
      T3_choice_arch: +0.15
      T4_commitment: -0.30  # CROWDING OUT!
      T5_identity: -0.25    # CROWDING OUT!
      T6_social: -0.20      # CROWDING OUT!

    # T3: Choice Architecture
    T3_choice_arch:
      T1_information: +0.35
      T2_incentives: +0.15
      T3_choice_arch: 1.00
      T4_commitment: +0.45
      T5_identity: +0.20
      T6_social: +0.35

    # T4: Commitment Devices
    T4_commitment:
      T1_information: +0.40
      T2_incentives: -0.30  # CROWDING OUT!
      T3_choice_arch: +0.45
      T4_commitment: 1.00
      T5_identity: +0.55
      T6_social: +0.60

    # T5: Identity Interventions
    T5_identity:
      T1_information: +0.25
      T2_incentives: -0.25  # CROWDING OUT!
      T3_choice_arch: +0.20
      T4_commitment: +0.55
      T5_identity: 1.00
      T6_social: +0.50

    # T6: Social Interventions
    T6_social:
      T1_information: +0.30
      T2_incentives: -0.20  # CROWDING OUT!
      T3_choice_arch: +0.35
      T4_commitment: +0.60
      T5_identity: +0.50
      T6_social: 1.00

  crowding_out_warnings:
    - combination: ["T2_incentives", "T4_commitment"]
      gamma: -0.30
      explanation: |
        Finanzielle Anreize untergraben intrinsische Motivation
        und echtes Commitment. NICHT kombinieren.
      lukb_implication: |
        Am Off-Site: KEINE finanziellen Anreize für Commitment.
        Aktienprogramm ist OK (bereits existiert), aber nicht
        als Belohnung für LUKB30-Commitment framen.

    - combination: ["T2_incentives", "T5_identity"]
      gamma: -0.25
      explanation: |
        Finanzielle Anreize trivialisieren Identitäts-Appelle.
      lukb_implication: |
        "Sei Luzerner UND national" funktioniert nicht mit
        "und du kriegst Bonus dafür".

  synergy_opportunities:
    - combination: ["T4_commitment", "T6_social"]
      gamma: +0.60
      explanation: "Öffentliches Commitment vor Peers = sehr stark"
      lukb_application: |
        Off-Site: Commitment-Cards vor Gruppe teilen.
        Peer-Accountability aufbauen.

    - combination: ["T5_identity", "T4_commitment"]
      gamma: +0.55
      explanation: "Identitäts-basiertes Commitment ist nachhaltiger"
      lukb_application: |
        "Als Luzerner Kader committe ich zu..."
        Identität mit Commitment verknüpfen.

# =============================================================================
# ORGANIZATIONAL FACTOR INTERDEPENDENCIES
# =============================================================================
organizational_interdependencies:
  description: |
    Wie beeinflussen sich organisationale Faktoren (aus 400-Faktoren-Vektor)?

  key_matrices:
    # Financial → People
    fin_to_peo:
      konzerngewinn_to_engagement:
        gamma: +0.45
        explanation: "Erfolg steigert Engagement"
        lag: "1-2 Quartale"

      cost_pressure_to_fluktuation:
        gamma: +0.55
        explanation: "Kostendruck erhöht Fluktuation"
        warning: "S5-EFFICIENT kann kontraproduktiv sein"

    # Strategy → Culture
    str_to_peo:
      ambition_to_engagement:
        gamma_champions: +0.70
        gamma_pragmatiker: +0.30
        gamma_skeptiker: -0.20
        explanation: "Segment-abhängige Wirkung"

      change_speed_to_resistance:
        gamma: +0.60
        explanation: "Schnellerer Change = mehr Widerstand"
        implication: "Tempo dosieren"

    # Technology → Efficiency
    tec_to_fin:
      digital_adoption_to_cir:
        gamma: -0.50  # Negativ = CIR sinkt = gut
        explanation: "Digitalisierung senkt Kosten"
        lag: "2-4 Quartale"

      ai_investment_to_productivity:
        gamma: +0.40
        explanation: "KI steigert Produktivität"
        lag: "1-2 Jahre"

    # Market → Strategy
    mkt_to_str:
      competitive_pressure_to_urgency:
        gamma: +0.65
        explanation: "Mehr Wettbewerb = höhere Dringlichkeit"

      market_share_loss_to_strategy_revision:
        gamma: +0.70
        explanation: "Marktanteilsverlust triggert Strategieanpassung"
        threshold: "-2% p.a."

# =============================================================================
# SEGMENT-SPECIFIC γ-MATRICES
# =============================================================================
segment_specific:
  description: |
    Unterschiedliche γ-Werte je nach Kader-Segment.

  by_archetype:
    champions:
      identity_to_commitment: +0.80
      peer_influence_to_commitment: +0.50
      efficacy_to_commitment: +0.75

    pragmatiker:
      identity_to_commitment: +0.45
      peer_influence_to_commitment: +0.65  # Höher!
      efficacy_to_commitment: +0.60
      evidence_to_commitment: +0.70  # Zusätzlich

    skeptiker:
      identity_threat_to_resistance: +0.80
      peer_influence_to_commitment: +0.55
      security_to_commitment: +0.70  # Sicherheit wichtig
      efficacy_to_commitment: +0.50

    widerstaendler:
      identity_threat_to_resistance: +0.95
      peer_influence_to_commitment: +0.30  # Niedrig
      any_intervention_to_commitment: +0.15  # Sehr niedrig

# =============================================================================
# TEMPORAL DYNAMICS
# =============================================================================
temporal_dynamics:
  description: |
    Wie verändern sich γ-Werte über Zeit?

  off_site_to_post:
    immediate_after_event:
      commitment_to_action: +0.80
      enthusiasm_to_commitment: +0.75
      peer_pressure_to_commitment: +0.70

    two_weeks_after:
      commitment_to_action: +0.55  # Sinkt
      daily_routine_to_commitment: -0.40  # Erosion
      follow_up_to_commitment: +0.60  # Kritisch!

    three_months_after:
      commitment_to_action: +0.35  # Stark gesunken
      quick_wins_to_commitment: +0.65  # Wichtig!
      visible_progress_to_commitment: +0.70

  implication: |
    Die γ-Werte zwischen Off-Site und nachhaltigem Change
    sinken rapide. Follow-up-Mechanismen sind KRITISCH.

# =============================================================================
# APPLICATION GUIDELINES
# =============================================================================
application_guidelines:
  off_site_design:
    maximize:
      - "T4 + T6 Kombination (γ = +0.60)"
      - "T5 + T4 Kombination (γ = +0.55)"
      - "Identity Extension → Commitment Pfad"
    avoid:
      - "T2 (Financial) mit T4/T5/T6 (γ < 0)"
      - "Identity Threat ohne Adressierung"

  intervention_sequencing:
    optimal_order:
      1: "T5_identity (Luzerner DNA validieren)"
      2: "T1_information (Evidenz für Machbarkeit)"
      3: "T6_social (Peer-Testimonials)"
      4: "T4_commitment (Öffentliches Commitment)"
      5: "T3_choice_arch (Follow-up Default)"

  measurement:
    leading_indicators:
      - "Identity Extension Score (Woche 1)"
      - "Commitment Quality (Tag 1)"
    lagging_indicators:
      - "Commitment Sustainability (Monat 3)"
      - "Behavioral Change (Monat 6)"
