# ============================================================================
# LUKB Führungsverständnis
# ============================================================================
# Das Leadership Framework der LUKB mit dem L-U-K-B Akronym
# Created: 2026-02-05
# ============================================================================

metadata:
  document_type: "leadership_framework"
  customer_id: "LUKB"
  version: "1.0"
  title: "Das LUKB Führungsverständnis"

# ============================================================================
# L-U-K-B AKRONYM
# ============================================================================
lukb_acronym:
  description: "Die vier Säulen des LUKB Führungsverständnisses"

  L:
    word: "leidenschaftlich"
    english: "passionate"
    description: |
      Als Führungskräfte zeigen wir Freude an der Arbeit und inspirieren
      und motivieren unsere Teams durch unsere Vision. Damit schaffen wir
      eine Arbeitsatmosphäre, die das Engagement und die Zielerreichung
      der Mitarbeitenden fördert.
    key_behaviors:
      - "Freude an der Arbeit zeigen"
      - "Teams durch Vision inspirieren und motivieren"
      - "Engagement-fördernde Arbeitsatmosphäre schaffen"
      - "Zielerreichung der Mitarbeitenden unterstützen"

  U:
    word: "unternehmerisch"
    english: "entrepreneurial"
    description: |
      Als Führungskräfte entscheiden wir leistungs- und resultateorientiert
      mit Blick auf die Gesamtbank und auf den langfristigen Unternehmenserfolg.
      Die Bedürfnisse unserer Anspruchsgruppen sind im Fokus unseres Handelns.
    key_behaviors:
      - "Leistungs- und resultateorientiert entscheiden"
      - "Gesamtbank-Perspektive einnehmen"
      - "Langfristigen Unternehmenserfolg im Blick"
      - "Bedürfnisse der Anspruchsgruppen fokussieren"

  K:
    word: "kollaborativ"
    english: "collaborative"
    description: |
      Als Führungskräfte fördern wir als ambitionierte Vorbilder eine Kultur
      des gegenseitigen Vertrauens, der Transparenz, der Wertschätzung und
      der kontinuierlichen Weiterentwicklung. Wir ermutigen Mitarbeitende
      proaktiv zu handeln und Verantwortung zu übernehmen.
    key_behaviors:
      - "Als ambitionierte Vorbilder agieren"
      - "Kultur des gegenseitigen Vertrauens fördern"
      - "Transparenz und Wertschätzung leben"
      - "Kontinuierliche Weiterentwicklung ermöglichen"
      - "Mitarbeitende zu proaktivem Handeln ermutigen"
      - "Verantwortungsübernahme fördern"

  B:
    word: "bemerkenswert"
    english: "remarkable"
    description: |
      Als Führungskräfte überzeugen wir durch unsere Persönlichkeit,
      klare Kommunikation und inspirierendes Engagement für unsere Mitarbeitenden.
    key_behaviors:
      - "Durch Persönlichkeit überzeugen"
      - "Klar kommunizieren"
      - "Inspirierendes Engagement für Mitarbeitende zeigen"

# ============================================================================
# FÜHRUNGSLANDSCHAFT (Leadership Landscape)
# ============================================================================
fuehrungslandschaft:
  description: |
    Das Führungsverständnis dient als Leitfaden für alle Führungskräfte.
    Entlang dieser Prinzipien entwickeln sie ihre Führungskompetenzen, um auf
    den drei Führungsebenen – Selbstführung, Mensch und Team sowie
    Organisation – erfolgreich zu agieren. Das Zusammenspiel von Mindset,
    Toolset und Skillset unterstützt die umfassende Führungsaufgabe.

  three_levels:
    ich:
      name: "Ich – Selbstführung"
      english: "Self-Leadership"
      description: |
        Eigene Fähigkeiten, Werte und Stärken erkennen und entwickeln,
        um andere effektiv zu führen.
      position: "inner_circle"

    mensch_und_team:
      name: "Mensch & Team – Teamführung"
      english: "Team Leadership"
      description: |
        Ein motivierendes und unterstützendes Arbeitsumfeld schaffen,
        in dem die Zusammenarbeit gedeiht und sich die Mitarbeitenden
        weiterentwickeln können. Damit das Team auch in unsicheren Zeiten
        auf Kurs bleibt.
      position: "middle_circle"

    organisation:
      name: "Organisation – Führen der Organisation"
      english: "Organizational Leadership"
      description: |
        Einflussnahme auf die Zukunfts- und Widerstandsfähigkeit der
        Organisation für einen langfristigen Erfolg.
      position: "outer_circle"

  three_capabilities:
    mindset:
      name: "Mindset"
      description: |
        Die Einstellung über Lösungen nachzudenken, Probleme anders
        anzugehen, mit offenen Augen durchs Leben zu gehen und ständig anzupassen.
      lukb_values:
        - "Leidenschaftlich"
        - "Unternehmerisch"

    toolset:
      name: "Toolset"
      description: |
        Werkzeug und Methoden helfen uns, uns zu orientieren,
        zu konzentrieren und gute Entscheidungen zu treffen.
      lukb_values:
        - "Kollaborativ"
        - "Bemerkenswert"

    skillset:
      name: "Skillset"
      description: |
        Nur mit den richtigen Fähigkeiten können wir Werkzeuge
        und Methoden effizient anwenden.

  model_structure: |
    ┌─────────────────────────────────────────────────────┐
    │                                                     │
    │    ┌─────────────────────────────────────────┐      │
    │    │                                         │      │
    │    │    ┌─────────────────────────────┐      │      │
    │    │    │                             │      │      │
    │    │    │          ICH                │      │      │
    │    │    │     (Selbstführung)         │      │      │
    │    │    │                             │      │      │
    │    │    │   Mindset · Toolset ·       │      │      │
    │    │    │        Skillset             │      │      │
    │    │    │                             │      │      │
    │    │    └─────────────────────────────┘      │      │
    │    │                                         │      │
    │    │           MENSCH & TEAM                 │      │
    │    │          (Teamführung)                  │      │
    │    │                                         │      │
    │    └─────────────────────────────────────────┘      │
    │                                                     │
    │                  ORGANISATION                       │
    │           (Führen der Organisation)                 │
    │                                                     │
    └─────────────────────────────────────────────────────┘

