# ============================================================================
# Q&A HIGHLIGHTS
# ============================================================================
qa_highlights:
  typisch_lozaern:
    question: "Was ist mit «Typisch Lozärn» passiert?"
    answer: |
      «Typisch Lozärn» ist kein Heimatfilm, sondern unser Charakter.
      Es gilt «Typisch Lozärn» als Haltung statt Herkunft zu verstehen.
      Unsere Wesenszüge wie Nähe, Greifbarkeit, Ehrlichkeit und souveräne
      Bescheidenheit besitzen überregionale Anschlussfähigkeit.

  leistungskonzepte:
    question: "Was passiert mit 'Unternehmerbank' und 'Immobilienbank'?"
    answer: |
      Beide Konstrukte wurden als Leistungskonzepte bereits vor über 10 Jahren
      eingeführt und werden als solche beibehalten. Sie sind aber weder eine
      Marke noch Synonyme für die LUKB. Um die Marke LUKB nicht zu schwächen,
      müssen sie stärker gekoppelt mit der Marke LUKB eingesetzt werden.

  lukberry:
    question: "Ist 'Berry' die neue LUKB-Farbe?"
    answer: |
      Nein, "LUKBerry" ist eine Zweitfarbe – ein Sparringpartner für das
      LUKB-Blau. Mit LUKBerry erzielen wir die gewünschte Hochwertigkeit
      und können uns gegenüber den "blauen" Mitbewerbern differenzieren.
      Mit dem "Farbregler" schaffen wir Differenzierung zwischen
      Retail Banking, Corporate und Private Banking.

