# ============================================================================
# STRATEGISCHES ZIEL
# ============================================================================
strategic_goal:
  primary: |
    Marktführerin im Wirtschaftsraum Luzern –
    als verlässliche Partnerin für Kund:innen, Kanton und Gesellschaft.
  secondary: |
    Wachstum in ausgewählten Geschäftsfeldern in der ganzen Schweiz –
    klare Profilierung weg vom klassischen Kantonalbank-Image
    durch unsere Leistungsfähigkeit.

# ============================================================================
# ZENTRALE ERKENNTNISSE (aus Audit-Phase)
# ============================================================================
key_insights:
  - id: KI-01
    title: "Vertrauen strategisch nutzen"
    description: |
      Vertrauen in uns und unsere Verlässlichkeit ist in einem
      Umfeld von Unsicherheit unser strategisches Kapital.
      Nicht nur besitzen – aktiv nutzen.

  - id: KI-02
    title: "Fachliche Stärke muss Strahlkraft entwickeln"
    description: |
      Im Markenkern muss der Mehrwert unserer Fachkompetenz und
      unseres Leistungswillens spürbar werden. Damit sprechen wir
      unsere Kund:innen auf emotionaler Ebene ihrer Bedürfnisse an.

  - id: KI-03
    title: "Typisch Lozärn als Haltung statt Herkunft"
    description: |
      «Typisch Lozärn» ist kein Heimatfilm, sondern unser Charakter.
      Unsere Herkunft kann überregional limitierend wirken, aber unsere
      Wesenszüge wie Nähe, Greifbarkeit, Ehrlichkeit und souveräne
      Bescheidenheit besitzen überregionale Anschlussfähigkeit.

  - id: KI-04
    title: "Vom Produktanbieter zum Trusted Advisor"
    description: |
      Die Idee des «Trusted Advisor» spricht insbesondere im
      zinsunabhängigen Geschäft die Bedürfnisse der Kund:innen an.
      Er fördert die Kund:innenbindung und verbindet unsere Stärken
      Verlässlichkeit, Kompetenz und Nähe.

  - id: KI-05
    title: "Markenauftritt muss Ambition tragen"
    description: |
      Unsere Identität muss emotional bewegen und Souveränität
      transportieren. Nicht laut, aber klar dürfen wir sagen:
      Wir sind kein Verwalter, sondern ein Ermöglicher.
      Das öffnet Kopf und Herz, mobilisiert intern und differenziert extern.

red_thread: |
  Alle wollen richtig etwas bewegen,
  die Marke muss mutiger werden.

# ============================================================================
# PURPOSE
# ============================================================================
purpose:
  statement: "Mit uns werden aus Möglichkeiten Wirklichkeiten."
  elaboration: |
    Heute und für kommende Generationen handeln wir verantwortungsvoll,
    um aus finanziellen Möglichkeiten echten Wert zu schaffen.
    Für Menschen, für Unternehmen, für unseren Wirtschaftsraum.
  previous_purpose: |
    Mit uns werden Pläne seit Generationen Wirklichkeit.
    Dafür sorgen wir mit überzeugenden Lösungen.
    Und punkten mit einem aufmerksamen Service.
    So schaffen wir Wert. Auch in Zukunft.
  evolution_note: |
    Basis beibehalten, Aussage geschärft.
    "Pläne" → "Möglichkeiten" (breiter, emotionaler)

# ============================================================================
# WERTE (3 Kernwerte)
# ============================================================================
values:
  - id: W-01
    name: "VERLÄSSLICH"
    german_name: "Verlässlich"
    description: |
      Unser Handschlag zählt. Wir stehen zu unseren Zusagen –
      konsequent, verbindlich, transparent. Kund:innen und Kolleg:innen
      können sich darauf verlassen, dass wir halten, was wir versprechen,
      auch wenn es anspruchsvoll wird.
    leitsatz: "Üses Wort stohd wie de Pilatus."
    leitsatz_translation: "Unser Wort steht wie der Pilatus."
    source_keywords:
      - Vertrauen
      - zuverlässig
      - verlässlich
      - berechenbar
      - Sicherheit
      - stabil
      - Langfristigkeit
      - verbindlich
      - Wort halten
      - durchdacht
      - kontrolliert

  - id: W-02
    name: "ZUGÄNGLICH"
    german_name: "Zugänglich"
    description: |
      Wir nehmen einander ernst, mit Aufmerksamkeit, Respekt und
      echtem Interesse am Gegenüber. Ob im Gespräch mit Kund:innen
      oder im Team, wir sind immer greifbar. Zuhören, Einordnen und
      respektvolles Handeln prägen unsere Kultur. Das Miteinander
      bringt uns weiter.
    leitsatz: "Mer boued Brogge."
    leitsatz_translation: "Wir bauen Brücken."
    source_keywords:
      - nahbar
      - auf Augenhöhe
      - empathisch
      - Wertschätzung
      - hilfsbereit
      - Du-Kultur
      - respektvoll
      - authentisch
      - kollegial
      - menschlich
      - tolerant
      - Team
      - miteinander
      - vernetzt
      - verbunden
      - familiär
      - Zusammenhalt

  - id: W-03
    name: "AMBITIONIERT"
    german_name: "Ambitioniert"
    description: |
      Wir sind ein Winner-Team und setzen uns ehrgeizige Ziele,
      individuell und gemeinsam. Höchste Qualität ist für uns kein
      Zustand, sondern unser Antrieb. Wir wollen Dinge nicht einfach
      erledigen, sondern auf das nächste Level bringen.
    leitsatz: "Emmer vorwärts, wie d'Rüüss."
    leitsatz_translation: "Immer vorwärts, wie die Reuss."
    source_keywords:
      - mutig
      - innovativ
      - vorausdenkend
      - proaktiv
      - lebenslanges Lernen
      - Change-Bereitschaft
      - neue Wege gehen
      - Out of the box
      - kreativ
      - zukunftsorientiert
      - Winner-Mentalität
      - exzellent
      - best-in-class
      - Spitzenleistung
      - resultatorientiert
      - anspruchsvoll
      - Qualitätsanspruch

# ============================================================================
# ERLEBNISPRINZIPIEN (3 Experience Principles)
# ============================================================================
experience_principles:
  intro: |
    Unsere 3 Erlebnisprinzipien halten fest, wie sich jede Interaktion
    mit der LUKB in Zukunft anfühlen soll.

  principles:
    - id: EP-01
      name: "NAHBAR"
      feeling: "Es fühlt sich NAHBAR an"
      description: |
        Unser Erlebnis ist einladend, verständlich und ohne Allüren.
        Wir denken aus der Perspektive unseres Gegenübers und
        vermeiden alles, was distanziert oder abgehoben wirkt.

    - id: EP-02
      name: "SOUVERÄN"
      feeling: "Es fühlt sich SOUVERÄN an"
      description: |
        Unser Erlebnis fühlt sich kompetent und klar an, aber mit
        Gelassenheit. Man spürt Qualität, ohne dass sie betont werden muss.
        Wir treten mit Haltung auf: selbstbewusst, aber nie überheblich.

    - id: EP-03
      name: "BEGEISTERND"
      feeling: "Es fühlt sich BEGEISTERND an"
      description: |
        Das Erlebnis ist frisch, lebendig und etwas unerwartet. Aber nicht
        verspielt, sondern sinnvoll dynamisch. Begeisterung für Banking entsteht
        durch das gewisse Extra im Moment.

# ============================================================================
# PROMISE & MANIFESTO
# ============================================================================
promise:
  statement: "WIR SCHAFFEN RAUM."

  strengths:
    - "Positive, emotionale Assoziationen: Möglichkeiten, Entfaltung, Perspektiven"
    - "Implizit spricht es Bedürfnisse von Bankkund:innen an: Sicherheit, Wachstum, Möglichkeiten"
    - "Betont den Mehrwert, der für alle Stakeholder übersetzt werden kann"
    - "Besonders geeignet für Private Banking und E&E"
    - "Profiliert sich gegenüber klassischen Bankversprechen: Sicherheit, Nähe & Vertrauen"
    - "Potenzial, alle Segmente zu verbinden"
    - "Erzeugt Storytelling"
    - "Flexibel für jedes Thema, jeden Stakeholder"

manifesto:
  full_text: |
    Wenn es um Geld geht,
    geht es Menschen selten nur um Geld.

    Hinter jeder Zahl steht ein Wunsch, ein Ziel,
    ein Lebensentwurf. Genau das treibt uns an.

    Wir verstehen Banking als Werkzeug,
    um Menschen und Unternehmen Freiraum
    zu ermöglichen.

    Wir wollen ihnen Raum geben für ihre Ambitionen
    und Ziele: Sei es das Eigenheim,
    die Unternehmensnachfolge oder ein Vermögen, das
    für Generationen wirken soll.

    Das geht nur mit erstklassiger Beratung,
    die auf Möglichkeiten fokussiert und dabei ihre
    Verantwortung ernst nimmt.

    Mit Verlässlichkeit, die auch hält,
    wenn's darauf ankommt. Und mit Ambition, die aus
    Ideen Realität macht.

    Wir vereinen das Beste:
    die Leistungsstärke und das umfassende Angebot einer
    grossen Bank mit der Sicherheit und Zugänglichkeit
    einer Kantonalbank.

    Wenn das zusammenkommt,
    dann entsteht Raum.

    Für Entscheidungen,
    für Entwicklung,
    für Wirkung.

    LUZERNER KANTONALBANK

# ============================================================================
# VALUE PROPOSITIONS
# ============================================================================
value_propositions:
  overall:
    full: |
      Für Menschen, Unternehmen und Unternehmerfamilien,
      die finanzielle Möglichkeiten sicher in Wirkung verwandeln wollen,
      bieten wir unabhängige, proaktive 360°-Beratung und Lösungen, die Raum
      schaffen für Entscheidungen, Entwicklung und Generationen.
      Wir sind die Trusted Advisorin mit der Leistungsbreite einer grossen Bank,
      weil wir Verantwortung übernehmen, aus einer Hand koordinieren und die
      Sicherheit und Zugänglichkeit einer Kantonalbank bieten.
    condensed: |
      Wir schaffen Raum – mit der vernetzten Kompetenz einer grossen Bank
      und der Nähe einer Kantonalbank.

  segments:
    - segment: "Privatkund:innen"
      segment_id: "PK"
      condensed: |
        Wir schaffen Raum im Alltag –
        Banking ohne Hürden, digital stark und persönlich nah.
      key_benefits:
        - "Klare, nahtlose Prozesse / Übergänge"
        - "Multikanal-Erreichbarkeit"
        - "Regionale Verankerung & Nähe"

    - segment: "Geschäftskund:innen"
      segment_id: "GK"
      condensed: |
        Wir schaffen Raum fürs Kerngeschäft –
        eine Sparring-Partnerin, die alle Finanzthemen
        orchestriert und zügig vorwärtsbringt.
      key_benefits:
        - "Ganzheitliche 360°-Beratung & aktive Navigationsrolle"
        - "Individuell & aus einer Hand (klare Verantwortlichkeit)"
        - "Kurze Entscheidungswege & Umsetzungstempo"

    - segment: "Private Banking Kund:innen"
      segment_id: "PB"
      condensed: |
        Wir schaffen Raum für kluge Vermögensentscheide –
        als Partnerin mit Exzellenz und Bodenhaftung, beständig an Ihrer Seite.
      key_benefits:
        - "Persönliche, kontinuierliche Betreuung auf Augenhöhe"
        - "Proaktives Mitdenken/Guidance"
        - "Umfassende Expertise/Abdeckung von Spezialthemen"
        - "Exzellenz mit Bodenhaftung"

    - segment: "Entrepreneurs & Executives"
      segment_id: "E&E"
      condensed: |
        Wir schaffen Raum für Unternehmer:innen –
        mit klarer Verantwortung, kurzen Wegen
        und integrierter Beratung über Firma und Privat aus einer Hand.
      perspectives:
        geschaeftskunden: |
          Wir schaffen Raum fürs Kerngeschäft von Unternehmer:innen – als Sparring-
          Partnerin, die Firma und Privat integriert denkt, klare Verantwortung
          übernimmt und Entscheidungen zügig auf den Punkt bringt.
        private_banking: |
          Wir schaffen Raum für kluge Vermögensentscheide – mit einer Partnerin, die
          Privat- und Unternehmensvermögen vernetzt führt, komplexe Themen aus
          einer Hand steuert und mit kurzen Wegen zuverlässig umsetzt.

    - segment: "Immobilienkund:innen"
      segment_id: "IMM"
      condensed: |
        Wir schaffen Raum für Immobilien – als Partnerin,
        die Finanzierung und Expertenthemen 360°
        koordiniert und Projekte zügig ermöglicht.

    - segment: "Mitarbeitende"
      segment_id: "MA"
      condensed: |
        Wir schaffen Raum für Ambition –
        mit offenen Türen, persönlicher Förderung
        und echtem Mitgestalten im Team.

# ============================================================================
# RAUM-MECHANIK (Storytelling-Potential)
# ============================================================================
raum_mechanic:
  description: |
    Die Raum-Mechanik funktioniert flexibel für jedes Thema,
    jeden Stakeholder und schafft Relevanz.

  stakeholder_applications:
    privat_und_geschaeftskunden:
      - "für Finanzierung & Vorsorge"
      - "für Selbstverwirklichung, Studium"
      - "für unternehmerische Entscheidungen, Expansion, Liquidität, Investition, Innovation"

    investoren:
      - "für nachhaltiges, solides Wachstum"
      - "für Marktpotenzial, Innovationsfähigkeit"
      - "für Performance, Resilienz, Stabilität"

    mitarbeitende:
      - "für Eigenverantwortung, Entwicklung"
      - "für Weiterbildung, Karriere, Kollaboration"

    gesellschaft_und_politik:
      - "für soziale Teilhabe und Förderung der Region"
      - "für finanzielle Bildung und Befähigung"
      - "für aktives Engagement"

# ============================================================================
# BRAND DESIGN
# ============================================================================
brand_design:
  colors:
    primary:
      - name: "LUKBlue"
        description: "Aufgefrischtes LUKB-Blau (Hauptfarbe)"
        usage: "Headlines, Hauptakzente, Retail Banking dominant"

      - name: "LUKBerry"
        description: "Neue warme Zweitfarbe (Berry/Aubergine)"
        usage: "Private Banking dominant, Corporate, Hochwertigkeit"
        note: |
          Ein richtig guter Sparringpartner bringt das Beste seines
          Gegenübers zum Vorschein. Mit LUKBerry erzielen wir die
          gewünschte Hochwertigkeit im Auftritt und können uns
          gegenüber den "blauen" Mitbewerbern differenzieren.

    segment_balance:
      retail_banking: "LUKBlue dominant, LUKBerry als Akzent"
      corporate: "Ausgewogen, je nach Kontext"
      private_banking: "LUKBerry dominant, LUKBlue als Akzent"

  typography:
    house_font: "YOGA for LUKB"
    note: "Bleibt bestehen"

  imagery:
    perspective: "Vogelperspektive"
    rationale: |
      Der Perspektivenwechsel (Vogelperspektive) weckt Assoziation mit "Raum",
      ist leichter zu merken und ästhetisch ansprechender als die typischen,
      oft klischeehaften Bankmotive.
    range: "Von Bild bis Illustration"
    segment_differentiation:
      retail: "Fotografischer, nahbarer"
      private_banking: "Abstrakter, hochwertiger"

  elements:
    - "Logo-Ausprägungen (modernisiert)"
    - "Grafiken"
    - "Icons"
    - "Illustrationen"

  logo:
    evolution: |
      Marken müssen sich an veränderte Sehgewohnheiten und Anwendungen
      anpassen können. Plakativere Anwendungen von Logos haben Sinn und
      Zweck und dienen einer Wahrnehmungssteigerung in digitalen Umgebungen.
      Mit der Modernisierung soll unser Logo mehr Wirkung entfalten,
      zukunftsfähiger werden, aber auch gegenüber den anderen
      Kantonalbanken differenzieren.

  desired_perception:
    - "Klare Differenzierung, Eigenständigkeit"
    - "Wertig, solide, modern, auf Augenhöhe mit Privatbanken"
    - "Verlässlich und nahbar aber auch souverän, ambitioniert und begeisternd"
    - "Eine Bank, die sich bewegt – glaubwürdig, authentisch"

# ============================================================================
# VP ANFORDERUNGEN (Qualitätskriterien)
# ============================================================================
vp_requirements:
  inhaltliche_qualitaet:
    - "Klar & verständlich: einfach, eindeutig, nicht erklärungsbedürftig"
    - "Realistisch & glaubwürdig: ehrlich, bodenständig, authentisch"
    - "Ambitioniert & visionär: mutig, zukunftsgerichtet, inspirierend"
    - "Differenziert & relevant: nicht generisch, unterscheidbar, adressiert Kundenprobleme"

  markenfunktion:
    - "Fixstern/Nordstern: Orientierung, Leitlinie, roter Faden"
    - "Identitätsstiftend: Ausdruck der Marke, MA spiegeln Verhalten daran"
    - "Verbindlich & dauerhaft: klare Fokussierung, Energie bündeln"

  zielgruppenbezug:
    - "Kundenperspektive: Outside-in, Nutzen im Gespräch, Kunde findet sich wieder"
    - "Sub-Gruppen berücksichtigen: verschiedene Segmente ansprechbar"

  marktwirkung:
    - "Emotional & attraktiv: motivierend, anziehend, soll hängenbleiben"
    - "Positionierbar & bekannt: am Markt platzieren, Produktpalette beinhalten"
    - "Einprägsam: Elevator-Pitch-Charakter, muss hängenbleiben"
    - "Vertrauen schaffen: glaubwürdige Grundlage für Kommunikation und Dialog"

# ============================================================================
# ROLLOUT
# ============================================================================
rollout:
  timeline:
    audit_identitaet: "Mai / Juni 2025"
    verbal: "Juni / Juli 2025"
    gap_behaviour: "August bis Oktober 2025"
    design_value_propositions: "ab September 2025"
    rollout_konzept_intern: "Q4 2025"
    rollout_touchpoints: "Q1-Q2 2026"
    go_live_extern: "Anfang Q2 2026"

  three_levels:
    - level: 1
      name: "Informations-Ebene"
      formats:
        - "One-Pager"
        - "Q&As"
        - "FAQs"
        - "Kommunikation (1 to many)"
      goal: |
        Alle Stakeholder werden über die neue Markenidentität informiert
        und kennen die Roll-out-Planung. Jede Person weiss, wie die
        Implementierung sie konkret betrifft. Die Kommunikation ist sachlich-rational.
      cascade: "GL → K&F → MA"

    - level: 2
      name: "Aktivierungs-Ebene"
      formats:
        - "Marken-Trainings"
        - "Behaviour Workshops"
        - "Reflexionsfragen"
        - "Identifikations-Massnahmen"
      goal: |
        Mitarbeitende interagieren mit der Marke – in Übungen, Dialogen und
        ersten Anwendungen. Es entsteht ein Grundverständnis, das über Wissen
        hinausgeht: Man kann die Marke im eigenen Kontext anwenden.
        Die Formate kombinieren rationale Anleitung und emotionale Motivation.

    - level: 3
      name: "Kommunikations-Ebene"
      formats:
        - "Plakate"
        - "Give-Aways"
        - "Guerilla-Massnahmen"
      goal: |
        Die Marke wird erlebbar gemacht – mit Formaten und Medien, die
        inspirieren und unterhalten. Ziel ist die emotionale Verankerung
        und Identifikation. Der Ton ist klar emotional.

  confidentiality_note: |
    Bitte behält alle Materialien und Infos bis Anfang Q2 2026 strikt intern,
    damit der Auftritt zum richtigen Zeitpunkt seine volle Wirkung entfalten kann.
    Bis zum externen Go Live gelten unsere aktuellen Brand Guidelines und Content Strategie.

