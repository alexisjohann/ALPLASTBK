---
# LUKB KPI Database
# Key Performance Indicators for Strategy LUKB30 and Off-Site Success
# Last Updated: 2026-01-26
# Database Version: 1.0.0

metadata:
  customer: "LUKB"
  context: "Strategie LUKB30 (2026-2030) + Off-Site 6. März 2026"
  version: "1.0.0"
  last_updated: "2026-01-26"

# =============================================================================
# STRATEGIC KPIs (LUKB30)
# =============================================================================
strategic_kpis:
  description: "KPIs für die Strategieumsetzung LUKB30"

  financial_kpis:
    - id: "LUKB-FIN-01"
      name: "Konzerngewinn"
      unit: "CHF Mio"
      baseline_2024: 286.6
      target_2030: 340.0
      growth_required_percent: 18.6
      cagr_required_percent: 2.9
      tracking_frequency: "Quarterly"
      owner: "CFO"

    - id: "LUKB-FIN-02"
      name: "Zinsunabhängige Erträge"
      unit: "CHF Mio"
      baseline_2024: 206.5
      target_2030: 310.0
      growth_required_percent: 50.1
      cagr_required_percent: 7.0
      tracking_frequency: "Quarterly"
      owner: "GL"
      strategic_pillar: "S4-DIVERSIFY"

    - id: "LUKB-FIN-03"
      name: "Cost-Income-Ratio"
      unit: "Percent"
      baseline_2024: 46.1
      target_2030: "<50.0"
      direction: "Maintain below threshold"
      tracking_frequency: "Quarterly"
      owner: "CFO"
      strategic_pillar: "S5-EFFICIENT"

    - id: "LUKB-FIN-04"
      name: "Kreditwachstum p.a."
      unit: "Percent"
      baseline_2024: 4.0
      target_range: [2.5, 4.0]
      tracking_frequency: "Quarterly"
      owner: "Firmenkundengeschäft"

  market_kpis:
    - id: "LUKB-MKT-01"
      name: "Marktanteil Hypotheken Luzern"
      unit: "Percent"
      baseline_2024: "TBD"
      target_2030: "Verteidigen/Ausbauen"
      tracking_frequency: "Annually"
      owner: "Privatkundengeschäft"
      strategic_pillar: "S1-DEFEND"

    - id: "LUKB-MKT-02"
      name: "AuM Wachstum (Private Banking)"
      unit: "Percent p.a."
      baseline_2024: 4.8
      target_2030: ">5.0"
      tracking_frequency: "Quarterly"
      owner: "Private Banking"
      strategic_pillar: "S2-EXPAND"

    - id: "LUKB-MKT-03"
      name: "Neukundenakquisition ausserhalb Luzern"
      unit: "Anzahl p.a."
      baseline_2024: "TBD"
      target_2030: "Signifikant steigern"
      tracking_frequency: "Monthly"
      owner: "Private Banking + Firmenkundengeschäft"
      strategic_pillar: "S2-EXPAND"

  digital_kpis:
    - id: "LUKB-DIG-01"
      name: "Digital Banking Adoption"
      unit: "Percent der Kunden"
      baseline_2024: "TBD"
      target_2030: ">80%"
      tracking_frequency: "Quarterly"
      owner: "IT/Digital"
      strategic_pillar: "S3-DATA"

    - id: "LUKB-DIG-02"
      name: "AI Use Cases produktiv"
      unit: "Anzahl"
      baseline_2024: "TBD"
      target_2030: ">20"
      tracking_frequency: "Quarterly"
      owner: "IT/Digital"
      strategic_pillar: "S3-DATA"

# =============================================================================
# OFF-SITE SUCCESS KPIs
# =============================================================================
offsite_kpis:
  description: "KPIs für den Erfolg des Off-Site Days 6. März 2026"

  immediate_kpis:
    description: "Messbar am Tag selbst oder unmittelbar danach"

    - id: "OS-IMM-01"
      name: "Teilnehmer-Engagement"
      measurement: "Beobachtung + Selbsteinschätzung"
      target: ">80% aktive Teilnahme an interaktiven Elementen"
      owner: "FehrAdvice + HR"

    - id: "OS-IMM-02"
      name: "Commitment-Quote"
      measurement: "Anzahl abgegebener Commitments / Teilnehmer"
      target: ">90%"
      owner: "FehrAdvice"

    - id: "OS-IMM-03"
      name: "Net Promoter Score (Event)"
      measurement: "Würden Sie dieses Format weiterempfehlen?"
      target: ">50"
      owner: "HR"

    - id: "OS-IMM-04"
      name: "Strategie-Verständnis"
      measurement: "Können die 5 Säulen von LUKB30 benennen?"
      target: ">85% korrekt"
      owner: "HR"

  short_term_kpis:
    description: "Messbar 2-4 Wochen nach Off-Site"

    - id: "OS-ST-01"
      name: "Commitment-Umsetzung (selbst-berichtet)"
      measurement: "Follow-up Survey: Haben Sie Ihr Commitment umgesetzt?"
      target: ">60% vollständig oder teilweise"
      timeframe: "4 Wochen nach Event"
      owner: "HR"

    - id: "OS-ST-02"
      name: "Strategie-Kommunikation an Teams"
      measurement: "Haben Sie LUKB30 in Ihrem Team besprochen?"
      target: ">80%"
      timeframe: "4 Wochen nach Event"
      owner: "HR"

    - id: "OS-ST-03"
      name: "Rebranding-Akzeptanz"
      measurement: "Identifizieren Sie sich mit der neuen Marke?"
      target: ">70% zustimmend"
      timeframe: "4 Wochen nach Event"
      owner: "Marketing + HR"

  medium_term_kpis:
    description: "Messbar 3-6 Monate nach Off-Site"

    - id: "OS-MT-01"
      name: "Mitarbeiter-Engagement Index"
      measurement: "Jährliche Mitarbeiterbefragung"
      baseline: "TBD"
      target: "Stabil oder steigend"
      timeframe: "6 Monate"
      owner: "HR"

    - id: "OS-MT-02"
      name: "Fluktuation Kader"
      measurement: "Kündigungen in Kader-Gruppe"
      target: "<5%"
      timeframe: "6 Monate"
      owner: "HR"

    - id: "OS-MT-03"
      name: "Strategieumsetzungs-Initiativen gestartet"
      measurement: "Anzahl konkreter Projekte aus LUKB30"
      target: ">10 Initiativen"
      timeframe: "6 Monate"
      owner: "GL"

# =============================================================================
# BEHAVIORAL KPIs (EBF-spezifisch)
# =============================================================================
behavioral_kpis:
  description: "Verhaltensökonomische Indikatoren"

  identity_kpis:
    - id: "BEH-IDN-01"
      name: "Identitäts-Integration"
      measurement: "Wie gut passt 'nationale Ambition' zu 'Luzerner Bank'?"
      scale: "1-7 Likert"
      target: ">5.0 Durchschnitt"
      timeframe: "4 Wochen nach Event"

    - id: "BEH-IDN-02"
      name: "Stolz auf LUKB"
      measurement: "Wie stolz sind Sie, bei der LUKB zu arbeiten?"
      scale: "1-7 Likert"
      baseline: "TBD"
      target: "Stabil oder steigend"

  efficacy_kpis:
    - id: "BEH-EFF-01"
      name: "Self-Efficacy für LUKB30"
      measurement: "Ich kann persönlich zu LUKB30 beitragen"
      scale: "1-7 Likert"
      target: ">5.5 Durchschnitt"
      timeframe: "Unmittelbar nach Event"

    - id: "BEH-EFF-02"
      name: "Collective Efficacy"
      measurement: "Die LUKB kann Top 5 werden"
      scale: "1-7 Likert"
      target: ">5.0 Durchschnitt"
      timeframe: "4 Wochen nach Event"

  commitment_kpis:
    - id: "BEH-COM-01"
      name: "Commitment-Qualität"
      measurement: "Spezifität der abgegebenen Commitments (SMART)"
      scale: "1-5 Rating durch Beobachter"
      target: ">3.5 Durchschnitt"
      timeframe: "Am Event"

    - id: "BEH-COM-02"
      name: "Implementation Intention Completeness"
      measurement: "Wenn-Dann-Plan vollständig formuliert?"
      target: ">70% vollständig"
      timeframe: "Am Event"

# =============================================================================
# DASHBOARD CONFIGURATION
# =============================================================================
dashboard:
  description: "Konfiguration für KPI-Dashboard"

  views:
    strategic:
      title: "LUKB30 Strategic KPIs"
      kpis: ["LUKB-FIN-01", "LUKB-FIN-02", "LUKB-FIN-03", "LUKB-MKT-02"]
      refresh: "Quarterly"

    offsite:
      title: "Off-Site Success Metrics"
      kpis: ["OS-IMM-01", "OS-IMM-02", "OS-ST-01", "OS-ST-02"]
      refresh: "Event-triggered"

    behavioral:
      title: "Behavioral Indicators"
      kpis: ["BEH-IDN-01", "BEH-EFF-01", "BEH-COM-01"]
      refresh: "Survey-triggered"

  alerts:
    - condition: "OS-ST-01 < 40%"
      action: "Follow-up Intervention erforderlich"
      owner: "HR + FehrAdvice"

    - condition: "BEH-EFF-01 < 4.0"
      action: "Efficacy-Building Massnahmen"
      owner: "GL"
