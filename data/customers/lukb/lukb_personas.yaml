# =============================================================================
# KADER-ARCHETYPEN (40 Teilnehmer Off-Site)
# =============================================================================
kader_archetypen:
  description: |
    Archetypen für die 40 Kader + GL am Off-Site.
    Basierend auf Annahmen zur Einstellungsverteilung.

  distribution:
    champions: 0.20
    pragmatiker: 0.50
    skeptiker: 0.20
    widerstaendler: 0.10

  # ---------------------------------------------------------------------------
  # ARCHETYP: CHAMPION
  # ---------------------------------------------------------------------------
  champion:
    id: "ARCH-CHAMP"
    name: "Champion"
    german: "Begeisterte/r Unterstützer/in"
    share: 0.20
    count_estimate: 8

    profile:
      description: |
        "Endlich Top 5! Das habe ich immer gewollt.
         Ich bin bereit, dafür zu kämpfen."
      typical_role: ["Bereichsleitung Innovation", "Jüngere Kader", "Private Banking"]
      tenure_typical: "3-7 Jahre"
      age_typical: "35-45"

    behavioral_profile:
      openness_to_change: 0.90
      risk_tolerance: 0.70
      self_efficacy: 0.80
      collective_efficacy: 0.85

      utility_weights:
        u_X: 0.35  # Identität mit neuer Vision
        u_S: 0.25  # Will Anerkennung als Treiber
        u_F: 0.20  # Karriere-Chancen
        u_D: 0.20  # Gestaltungswille

    change_behavior:
      likely_actions:
        - "Früh positiv äußern"
        - "Andere mitziehen wollen"
        - "Konkrete Ideen einbringen"
      risks:
        - "Überschwänglichkeit schreckt Skeptiker ab"
        - "Ungeduld mit Bedenkenträgern"

    intervention_approach:
      strategy: "Als Testimonials nutzen, aber nicht übertreiben lassen"
      off_site_role:
        - "Früh sprechen lassen (nach GL)"
        - "Konkrete Beispiele geben lassen"
        - "Als Peer-Influencer einsetzen"
      warning: "Nicht als GL-Marionetten wirken lassen"

  # ---------------------------------------------------------------------------
  # ARCHETYP: PRAGMATIKER
  # ---------------------------------------------------------------------------
  pragmatiker:
    id: "ARCH-PRAG"
    name: "Pragmatiker"
    german: "Abwartende/r Beobachter/in"
    share: 0.50
    count_estimate: 20

    profile:
      description: |
        "Top 5 klingt gut, aber schauen wir mal.
         Zeigt mir, wie das konkret funktionieren soll.
         Ich bin dabei, wenn es realistisch ist."
      typical_role: ["Bereichsleitung etabliert", "Stabsfunktionen", "Retail-Kader"]
      tenure_typical: "8-15 Jahre"
      age_typical: "42-55"

    behavioral_profile:
      openness_to_change: 0.55
      risk_tolerance: 0.45
      self_efficacy: 0.60
      collective_efficacy: 0.55

      utility_weights:
        u_P: 0.30  # Sicherheit, Stabilität
        u_F: 0.25  # Konkrete Vorteile
        u_D: 0.20  # Will Klarheit
        u_S: 0.15  # Peer-Orientierung
        u_X: 0.10  # Identität weniger wichtig

    change_behavior:
      likely_actions:
        - "Abwarten und beobachten"
        - "Fragen stellen (nicht kritisch)"
        - "Nach konkreten Beispielen fragen"
        - "Sich von Stimmung leiten lassen"
      decision_trigger:
        - "Evidenz für Machbarkeit"
        - "Frühe Quick Wins"
        - "Peer-Bewegung (wenn Champions gehen)"
        - "GL-Commitment glaubhaft"

    intervention_approach:
      strategy: "Mit Evidenz und Quick Wins überzeugen"
      off_site_role:
        - "Fakten präsentieren"
        - "Konkrete erste Schritte zeigen"
        - "Fragen ermöglichen"
        - "Peer-Dynamik nutzen"
      key_message: "Hier sind die Zahlen. So machen wir das."

  # ---------------------------------------------------------------------------
  # ARCHETYP: SKEPTIKER
  # ---------------------------------------------------------------------------
  skeptiker:
    id: "ARCH-SKEPT"
    name: "Skeptiker"
    german: "Kritische/r Bedenkenträger/in"
    share: 0.20
    count_estimate: 8

    profile:
      description: |
        "Wir sind doch gut so wie wir sind.
         Warum müssen wir Top 5 werden?
         Das gefährdet unsere Luzerner Identität."
      typical_role: ["Langjährige Bereichsleitung", "Retail-Kader Luzern", "Ops/Back-Office"]
      tenure_typical: "15+ Jahre"
      age_typical: "50-60"

    behavioral_profile:
      openness_to_change: 0.35
      risk_tolerance: 0.30
      self_efficacy: 0.50  # "Ich kann, aber will nicht"
      collective_efficacy: 0.45  # "Kann die LUKB das?"

      identity_threat_sensitivity: 0.75
      loss_aversion: 2.8
      status_quo_bias: 0.80

      utility_weights:
        u_P: 0.35  # Sicherheit paramount
        u_X: 0.25  # Identität (Luzerner!)
        u_S: 0.20  # Standing bei Kollegen
        u_F: 0.10  # Wenig Karriere-Ambitionen
        u_D: 0.10

    change_behavior:
      likely_actions:
        - "Bedenken äußern"
        - "Fragen stellen (kritisch)"
        - "Auf Risiken hinweisen"
        - "Langsam reagieren"
      hidden_fears:
        - "Meine Erfahrung wird entwertet"
        - "Ich passe nicht mehr"
        - "Luzern wird aufgegeben"

    intervention_approach:
      strategy: "Verlustangst adressieren, Identität sichern"
      off_site_role:
        - "ZUERST Luzerner Identität validieren"
        - "Erweiterung, nicht Ersetzung framen"
        - "Erfahrung wertschätzen"
        - "Konkrete Rolle in LUKB30 zeigen"
      key_message: "Luzern bleibt. Wir verlieren nichts. Du bist wichtig."
      warning: "Nicht ignorieren - werden sonst lauter"

  # ---------------------------------------------------------------------------
  # ARCHETYP: WIDERSTÄNDLER
  # ---------------------------------------------------------------------------
  widerstaendler:
    id: "ARCH-RESIST"
    name: "Widerständler"
    german: "Aktive/r Gegner/in"
    share: 0.10
    count_estimate: 4

    profile:
      description: |
        "Das ist nicht unsere DNA.
         Das wird scheitern.
         Ich werde das nicht unterstützen."
      typical_role: ["Einzelne Senior-Kader", "Informelle Meinungsführer"]
      tenure_typical: "20+ Jahre oder frustrierte Ex-Aufsteiger"
      age_typical: "Variabel"

    behavioral_profile:
      openness_to_change: 0.15
      risk_tolerance: 0.20
      self_efficacy: 0.60  # "Ich kann Widerstand leisten"
      collective_efficacy: 0.30  # "Das wird sowieso scheitern"

      identity_threat_sensitivity: 0.90
      loss_aversion: 3.2
      status_quo_bias: 0.95
      cynicism: 0.80

      utility_weights:
        u_X: 0.35  # Identität (alte LUKB)
        u_P: 0.30  # Sicherheit
        u_D: 0.20  # Kontrolle behalten
        u_S: 0.15  # Peer-Standing als Kritiker

    change_behavior:
      likely_actions:
        - "Öffentlich widersprechen"
        - "Negative Stimmung verbreiten"
        - "Pragmatiker beeinflussen"
        - "Nach Event weitermachen wie bisher"
      influence_potential:
        on_pragmatiker: 0.40  # Mittel
        on_skeptiker: 0.60    # Hoch

    intervention_approach:
      strategy: "Nicht bekämpfen, nicht ignorieren, neutralisieren"
      off_site_role:
        - "Keine Bühne geben"
        - "Bedenken kurz anerkennen"
        - "Nicht in Diskussion verwickeln lassen"
        - "Peer-Druck durch Champions"
      key_message: "Wir verstehen die Bedenken. Hier ist unser Plan."
      warning: |
        NICHT: Öffentliche Konfrontation
        NICHT: Ignorieren (vergiftet Pausengespräche)
        NICHT: Zu viel Zeit investieren

