  # ---------------------------------------------------------------------------
  ceo:
    id: "PERS-CEO-DS"
    name: "Daniel Salzmann"
    role: "CEO / Vorsitzender der Geschäftsleitung"
    department: "Präsidialdepartement"

    # Basic Profile
    profile:
      seit: "2014-07"
      tenure_years: 11.5
      age_estimate: "Mitte 50"
      education: "Executive MBA HSLU"
      career_path:
        - period: "2004-2014"
          role: "Leiter Departement Privat- und Gewerbekunden"
          org: "LUKB"
        - period: "Davor"
          role: "Führungsfunktionen"
          org: "SBG/UBS, Credit Suisse"
        - period: "1990-1993"
          role: "Leiter Rechnungswesen/Controlling"
          org: "Ascom Telematic"

      external_mandates:
        - "Belvédère Asset Management AG (VR)"
        - "FG Next Holding AG (VR)"
        - "Schweizerische Bankiervereinigung (VR)"
        - "Verband Schweizerischer Kantonalbanken VSKB (VR)"
        - "Viseca Payment Services AG (Vizepräsident)"
        - "St. Niklausen Schiffgesellschaft (VR)"

    # Behavioral Profile
    behavioral_profile:
      # Leadership Style (LLMMC Assessment)
      leadership_style:
        primary: "Transformational"
        secondary: "Strategic"
        description: |
          Langfristig orientierter Stratege mit 11+ Jahren CEO-Erfahrung.
          Hat die LUKB durch mehrere Strategiezyklen geführt.
          LUKB30 ist sein "Legacy-Projekt" vor möglicher Pensionierung.

      # Personality Indicators (Big Five Estimate)
      personality_estimate:
        openness: 0.70        # Offen für Innovation (Krypto-Vorreiter)
        conscientiousness: 0.85  # Sehr strukturiert, planvoll
        extraversion: 0.65    # Präsent, aber nicht dominant
        agreeableness: 0.60   # Diplomatisch, aber durchsetzungsfähig
        neuroticism: 0.30     # Ruhig, belastbar

      # Decision-Making Style
      decision_making:
        style: "Analytisch-Konsensual"
        speed: "Mittel (gründliche Vorbereitung)"
        risk_tolerance: 0.55
        data_driven: 0.75
        intuition_weight: 0.40

      # Communication Style
      communication:
        preferred_format: "Strukturiert, mit Zahlen unterlegt"
        meeting_style: "Gut vorbereitet, erwartet dasselbe von anderen"
        feedback_style: "Direkt, aber respektvoll"
        public_speaking: "Kompetent, nicht charismatisch"

    # Motivational Profile
    motivational_profile:
      # Utility Weights
      utility_weights:
        u_X: 0.30  # Identität/Legacy - LUKB30 als Vermächtnis
        u_S: 0.25  # Sozial - Anerkennung durch VR, Branche
        u_F: 0.15  # Finanziell - bereits gut situiert
        u_D: 0.15  # Macht/Einfluss - Gestaltungswille
        u_P: 0.10  # Sicherheit - stabile Position
        u_E: 0.05  # Andere

      # Key Motivators
      motivators:
        primary:
          - "LUKB30 erfolgreich umsetzen (Legacy)"
          - "Top 5 Ambition erreichen"
          - "LUKB für nächste Generation aufstellen"
        secondary:
          - "Anerkennung in Bankenbranche"
          - "Erfolgreiche Übergabe vorbereiten"
          - "Krypto-Vorreiterrolle ausbauen"

      # Pain Points / Concerns
      concerns:
        - concern: "Strategieumsetzung bei Kadern verankern"
          severity: 0.75
        - concern: "GL-Nachfolge (Beat Hodel geht)"
          severity: 0.60
        - concern: "Externe Schocks (Markt, Regulierung)"
          severity: 0.55

    # Change-Specific Profile
    change_profile:
      role_in_change: "Sponsor & Vorbild"
      commitment_level: 0.90
      visibility_expectation: "Hoch - muss selbst committen"

      influence_on_kader:
        signaling_weight: 0.78
        credibility: 0.80
        trust_level: 0.75

      off_site_role:
        - "Opening: Strategie-Vision präsentieren"
        - "Sichtbar committen (nicht nur reden)"
        - "Q&A souverän meistern"
        - "Closing: Call-to-Action"

      potential_blockers:
        - "Wenn CEO nicht authentisch wirkt"
        - "Wenn Fragen nicht beantwortet werden"
        - "Wenn 'corporate speak' dominiert"

    # Engagement Guidelines
    engagement_guidelines:
      do:
        - "Mit Zahlen und Evidenz argumentieren"
        - "Langfristige Perspektive betonen"
        - "Legacy-Aspekt subtil ansprechen"
        - "GL-Alignment demonstrieren"
      dont:
        - "Zu emotional werden"
        - "Unrealistische Versprechen machen"
        - "Kritik an bisheriger Strategie"
        - "Zu lange Redezeit beanspruchen"

