# =============================================================================
# PROGRAM STRUCTURE
# =============================================================================
program_structure:
  confirmed_elements:
    - element: "Rebranding-Präsentation"
      owner: "Jung von Matt / BrandEvolution"
      duration_estimate: "45-60 min"
      position: "Früh (emotional, visuell)"

    - element: "Akademischer Input"
      owner: "Prof. Jenewein"
      duration: "50 min"
      position: "Nach Rebranding"
      reference: "Drehbuch vom letzten Mal"

    - element: "FehrAdvice Input"
      owner: "FehrAdvice & Partners"
      roles:
        - "Keynote (verhaltensökonomische Perspektive)"
        - "Fachliche Begleitung"
        - "Format-Gestaltung"
      duration_estimate: "60-90 min total"
      position: "Nach Jenewein, vor Closing"

    - element: "CEO Opening & Closing"
      owner: "Daniel Salzmann"
      duration: "15 min Opening + 15 min Closing"

  proposed_agenda:
    # Annahme: Ganztags-Event (09:00 - 17:00)
    morning:
      "09:00-09:15":
        element: "CEO Opening"
        owner: "Daniel Salzmann"
        content: "Vision LUKB30, Warum heute"
        behavioral_goal: "Frame setzen, Importance signalisieren"

      "09:15-10:15":
        element: "Rebranding-Präsentation"
        owner: "Jung von Matt"
        content: "Neue Marke, Visuelle Identität"
        behavioral_goal: "Emotionaler Moment, Stolz"
        risk: "Kann Widerstand auslösen"

      "10:15-10:45":
        element: "Pause"
        behavioral_goal: "Informeller Austausch, Verarbeitung"
        intervention: "Champions strategisch verteilen"

      "10:45-11:35":
        element: "Akademischer Input"
        owner: "Prof. Jenewein"
        content: "Wissenschaftliche Perspektive auf Transformation"
        behavioral_goal: "Intellektuelle Legitimierung"
        risk: "Kognitive Erschöpfung danach"

      "11:35-12:30":
        element: "FehrAdvice Teil 1"
        owner: "FehrAdvice"
        content: "Keynote: Verhaltensökonomik des Change"
        behavioral_goal: "Aktivierung nach Jenewein"
        format: "Interaktiv, nicht Vortrag"

    lunch:
      "12:30-13:30":
        element: "Mittagessen"
        behavioral_goal: "Networking, informeller Austausch"
        intervention: "Gemischte Tischgruppen"

    afternoon:
      "13:30-15:00":
        element: "FehrAdvice Teil 2"
        owner: "FehrAdvice"
        content: "Workshop-Formate"
        behavioral_goal: "Identität + Commitment"
        format: "Interaktiv, Gruppenarbeit"

      "15:00-15:30":
        element: "Pause"

      "15:30-16:30":
        element: "Commitment-Runde"
        owner: "FehrAdvice + HR"
        content: "Persönliche Commitments"
        behavioral_goal: "Öffentliches Commitment vor Peers"
        format: "Commitment Cards, Pledge Wall"

      "16:30-17:00":
        element: "CEO Closing"
        owner: "Daniel Salzmann"
        content: "Call-to-Action, Nächste Schritte"
        behavioral_goal: "Momentum in Alltag überführen"

# =============================================================================
# INTERVENTION DESIGN (EBF-Based)
# =============================================================================
intervention_design:
  overview:
    primary_10c_targets:
      - "WHAT (C.X): Identität erweitern"
      - "AWARE: Strategie-Verständnis"
      - "READY: Handlungsbereitschaft"
      - "HOW (B): Commitment aufbauen"

    intervention_portfolio:
      T1_information: 0.15
      T2_incentives: 0.00  # NICHT am Off-Site
      T3_choice_architecture: 0.20
      T4_commitment: 0.30
      T5_identity: 0.25
      T6_social: 0.10

  # ---------------------------------------------------------------------------
  # INTERVENTION 1: Identitäts-Integration
  # ---------------------------------------------------------------------------
  INT1_identity:
    id: "LUKB-INT-001"
    name: "Luzerner DNA + Schweizer Ambition"
    target_10c: "WHAT (C.X)"
    intervention_type: "T5_Identity"

    behavioral_target:
      current_state: "Identität als Bedrohung wahrgenommen"
      target_state: "Identität als Erweiterung verstanden"
      delta: "σ_IDN -0.20, τ_EXT +0.25"

    key_message: |
      "Wir bleiben Luzerner – und werden von hier aus
       die Schweiz erobern. Das eine schliesst das
       andere nicht aus. Es ist unser Vorteil."

    format_elements:
      - element: "Identitäts-Mapping"
        description: |
          Gruppenübung: Was macht LUKB aus?
          - Was bleibt? (Luzerner Wurzeln)
          - Was kommt dazu? (Nationale Reichweite)
          - Was verbindet beides? (Qualität, Vertrauen)
        duration: "20 min"

      - element: "Storytelling: Von Luzern in die Welt"
        description: |
          3 kurze Beispiele von Luzerner Unternehmen,
          die von hier aus gewachsen sind
          (z.B. Emmi, Schindler, B. Braun Medical)
        duration: "10 min"

      - element: "Sowohl-Als-Auch Visualisierung"
        description: |
          Rebranding zeigen als ERWEITERUNG
          Luzerner Elemente bleiben sichtbar
        owner: "Jung von Matt Integration"

    success_metrics:
      - metric: "Identitäts-Integration Score"
        measurement: "Likert 1-7: Passt nationale Ambition zu Luzerner Bank?"
        target: ">5.0"
        timing: "Unmittelbar nach Event"

  # ---------------------------------------------------------------------------
  # INTERVENTION 2: Ambitions-Glaubwürdigkeit
  # ---------------------------------------------------------------------------
  INT2_efficacy:
    id: "LUKB-INT-002"
    name: "Top 5 = Machbar"
    target_10c: "AWARE + READY"
    intervention_type: "T1_Information + T6_Social"

    behavioral_target:
      current_state: "Skepsis über Erreichbarkeit Top 5"
      target_state: "Überzeugung, dass es machbar ist"
      delta: "ε_EFF +0.15, ε_COLL +0.20"

    key_message: |
      "Wir haben alles, was es braucht:
       - Stärkste CIR unter Kantonalbanken (46.1%)
       - Krypto-Vorreiter
       - 175 Jahre Vertrauen
       Hier ist der konkrete Weg."

    format_elements:
      - element: "Evidenz-Präsentation"
        description: |
          Fakten-basierte Analyse:
          - Wo stehen wir? (Rang 8)
          - Wo stehen die anderen?
          - Was ist der Gap?
          - Wie schliessen wir ihn?
        duration: "15 min"
        owner: "FehrAdvice / GL"

      - element: "Champion-Testimonials"
        description: |
          3 Champions aus verschiedenen Bereichen:
          "Warum ich an LUKB30 glaube"
          - Authentisch, nicht gescripted
          - Peer-Voice, nicht GL-Voice
        duration: "10 min"
        selection_criteria:
          - "Glaubwürdig"
          - "Nicht zu begeistert (schreckt Pragmatiker ab)"
          - "Aus verschiedenen Bereichen"

      - element: "Quick Win Showcase"
        description: |
          2-3 konkrete Beispiele:
          "Was haben wir in den letzten 6 Monaten
           bereits in Richtung LUKB30 erreicht?"
        duration: "10 min"

    success_metrics:
      - metric: "Collective Efficacy Score"
        measurement: "Likert 1-7: Die LUKB kann Top 5 werden"
        target: ">5.0"

      - metric: "Self-Efficacy Score"
        measurement: "Likert 1-7: Ich kann persönlich beitragen"
        target: ">5.5"

  # ---------------------------------------------------------------------------
  # INTERVENTION 3: Ownership & Commitment
  # ---------------------------------------------------------------------------
  INT3_commitment:
    id: "LUKB-INT-003"
    name: "Mein LUKB30-Beitrag"
    target_10c: "HOW (B) + STAGE"
    intervention_type: "T4_Commitment + T6_Social"

    behavioral_target:
      current_state: "CEO-Strategie, nicht meine"
      target_state: "UNSERE Strategie, mein Beitrag"
      delta: "κ_COMMIT +0.30, δ_IMPL +0.25"

    key_message: |
      "LUKB30 wird nicht im Verwaltungsrat entschieden.
       Sie wird von EUCH umgesetzt.
       Was ist DEIN Beitrag?"

    format_elements:
      - element: "GL-Commitment zuerst"
        description: |
          Jedes GL-Mitglied macht sichtbares,
          persönliches Commitment.
          MUSS vor Kader-Commitment passieren.
        duration: "15 min"
        critical: true
        rationale: "ω_GL = 0.78 - höchstes Signaling-Gewicht"

      - element: "Persönliches Commitment formulieren"
        description: |
          Jeder Kader formuliert:
          1. "Mein Beitrag zu LUKB30 ist..."
          2. "Konkret werde ich in den nächsten 30 Tagen..."
          3. "Dabei unterstützt mich..."

          Format: Commitment Cards (physisch)
        duration: "15 min"
        individual: true

      - element: "Peer-Commitment-Runde"
        description: |
          In Kleingruppen (5-6 Personen):
          - Commitments teilen
          - Peer-Feedback
          - Accountability-Partner wählen
        duration: "25 min"
        critical: true
        rationale: "γ_PEER = 0.72, κ_COMMIT = 0.75"

      - element: "Pledge Wall"
        description: |
          Alle Commitment Cards sichtbar aufhängen.
          Foto für Follow-up.
        duration: "10 min"
        symbolisch: true

      - element: "Implementation Intentions"
        description: |
          Wenn-Dann-Pläne formulieren:
          "WENN [Situation], DANN [Verhalten]"
          Konkret für erste Arbeitswoche.
        duration: "10 min"
        critical: true
        rationale: "δ_IMPL = 0.62"

    success_metrics:
      - metric: "Commitment-Quote"
        measurement: "Anteil abgegebener Commitments"
        target: ">90%"

      - metric: "Commitment-Qualität"
        measurement: "SMART-Rating durch Beobachter (1-5)"
        target: ">3.5"

      - metric: "Implementation Intention Completeness"
        measurement: "Vollständige Wenn-Dann-Pläne"
        target: ">70%"

  # ---------------------------------------------------------------------------
  # INTERVENTION 4: Follow-up Ankündigung
  # ---------------------------------------------------------------------------
  INT4_followup:
    id: "LUKB-INT-004"
    name: "100-Tage-Plan"
    target_10c: "WHEN (V)"
    intervention_type: "T3_ChoiceArchitecture"

    behavioral_target:
      current_state: "Off-Site = einmaliges Event"
      target_state: "Off-Site = Start eines Prozesses"
      delta: "Commitment-Sustainability +0.30"

    key_message: |
      "Heute ist der Startschuss, nicht das Ziel.
       In 30, 60, 90 Tagen werden wir messen,
       wie wir vorangekommen sind."

    format_elements:
      - element: "Follow-up-Mechanismus ankündigen"
        description: |
          - Tag 30: Pulse Check (kurze Umfrage)
          - Tag 60: Peer-Accountability-Check
          - Tag 90: Mini-Off-Site / Review
        owner: "HR"

      - element: "Visuelle Timeline"
        description: |
          100-Tage-Roadmap zeigen:
          - Meilensteine
          - Checkpoints
          - Quick Wins geplant
        duration: "5 min"

    success_metrics:
      - metric: "Follow-up Awareness"
        measurement: "Können Mechanismus beschreiben"
        target: ">80%"

# =============================================================================
# SUCCESS METRICS & 100-DAY PLAN
# =============================================================================
success_metrics:
  overview:
    measurement_philosophy: |
      Erfolg wird auf drei Ebenen gemessen:
      1. Unmittelbar (Tag 0): Event-Qualität
      2. Kurzfristig (Tag 30-90): Commitment-Umsetzung
      3. Mittelfristig (6-12 Monate): Verhaltensänderung

  # ---------------------------------------------------------------------------
  # IMMEDIATE METRICS (Tag 0)
  # ---------------------------------------------------------------------------
  immediate:
    timeframe: "Am Event selbst / unmittelbar danach"

    metrics:
      - id: "IMM-01"
        name: "Teilnehmer-Engagement"
        measurement: "Beobachtung + Selbsteinschätzung"
        target: ">80% aktive Teilnahme"
        owner: "FehrAdvice + HR"
        collection: "Beobachtungsbogen"

      - id: "IMM-02"
        name: "Commitment-Quote"
        measurement: "Abgegebene Commitments / Teilnehmer"
        target: ">90%"
        owner: "FehrAdvice"
        collection: "Commitment Cards zählen"

      - id: "IMM-03"
        name: "Event NPS"
        measurement: "Würden Sie dieses Format weiterempfehlen?"
        target: ">50"
        owner: "HR"
        collection: "Kurz-Feedback am Ende"

      - id: "IMM-04"
        name: "Strategie-Verständnis"
        measurement: "Können die 5 Säulen von LUKB30 benennen"
        target: ">85%"
        owner: "HR"
        collection: "Quiz-Frage im Feedback"

      - id: "IMM-05"
        name: "Identitäts-Integration"
        measurement: "Sowohl-Als-Auch verstanden (Likert 1-7)"
        target: ">5.0"
        owner: "FehrAdvice"
        collection: "Feedback-Bogen"

      - id: "IMM-06"
        name: "Collective Efficacy"
        measurement: "LUKB kann Top 5 werden (Likert 1-7)"
        target: ">5.0"
        owner: "FehrAdvice"
        collection: "Feedback-Bogen"

  # ---------------------------------------------------------------------------
  # SHORT-TERM METRICS (Tag 30-90)
  # ---------------------------------------------------------------------------
  short_term:
    timeframe: "30-90 Tage nach Event"

    metrics:
      - id: "ST-01"
        name: "Commitment-Umsetzung (30 Tage)"
        measurement: "Selbstbericht: Commitment umgesetzt?"
        target: ">60% vollständig oder teilweise"
        owner: "HR"
        collection: "Pulse Survey Tag 30"

      - id: "ST-02"
        name: "Team-Kommunikation"
        measurement: "LUKB30 im eigenen Team besprochen?"
        target: ">80%"
        owner: "HR"
        collection: "Pulse Survey Tag 30"

      - id: "ST-03"
        name: "Rebranding-Akzeptanz"
        measurement: "Identifikation mit neuer Marke (Likert 1-7)"
        target: ">5.0"
        owner: "Marketing + HR"
        collection: "Survey Tag 60"

      - id: "ST-04"
        name: "Peer-Accountability"
        measurement: "Kontakt mit Accountability-Partner gehabt?"
        target: ">50%"
        owner: "HR"
        collection: "Survey Tag 60"

      - id: "ST-05"
        name: "Implementation Intention Umsetzung"
        measurement: "Wenn-Dann-Plan umgesetzt?"
        target: ">50%"
        owner: "HR"
        collection: "Survey Tag 30"

  # ---------------------------------------------------------------------------
  # MEDIUM-TERM METRICS (6-12 Monate)
  # ---------------------------------------------------------------------------
  medium_term:
    timeframe: "6-12 Monate nach Event"

    metrics:
      - id: "MT-01"
        name: "Mitarbeiter-Engagement"
        measurement: "Engagement Index (jährliche Befragung)"
        baseline: "TBD"
        target: "Stabil oder steigend"
        owner: "HR"

      - id: "MT-02"
        name: "Fluktuation Kader"
        measurement: "Kündigungen in Kader-Gruppe"
        target: "<5% in 6 Monaten"
        owner: "HR"

      - id: "MT-03"
        name: "Strategie-Initiativen"
        measurement: "Anzahl gestarteter LUKB30-Projekte"
        target: ">10 in 6 Monaten"
        owner: "GL"

      - id: "MT-04"
        name: "Behavioral Change (beobachtet)"
        measurement: "Qualitative Einschätzung HR"
        categories:
          - "Kommunikation nationale Ambition"
          - "Cross-Selling Private Banking"
          - "Digitale Initiativen"
        owner: "HR"

# =============================================================================
# 100-DAY PLAN
# =============================================================================
hundred_day_plan:
  overview:
    philosophy: |
      Der Off-Site ist der Startschuss, nicht das Ziel.
      Die 100 Tage danach entscheiden über nachhaltigen Erfolg.

  phases:
    # ---------------------------------------------------------------------------
    # PHASE 1: MOMENTUM (Tag 1-30)
    # ---------------------------------------------------------------------------
    phase_1:
      name: "Momentum"
      timeframe: "Tag 1-30"
      objective: "Energie aus Off-Site in Alltag überführen"

      week_1:
        activities:
          - activity: "CEO-Mail an alle MA"
            description: "Zusammenfassung Off-Site, Dank an Kader"
            owner: "CEO"
            day: 2

          - activity: "Commitment-Foto an Kader"
            description: "Pledge Wall Foto als Reminder"
            owner: "HR"
            day: 3

          - activity: "Kader kommunizieren in Teams"
            description: "Jeder Kader informiert sein Team über LUKB30"
            owner: "Kader"
            day: 3-5

        success_criteria:
          - "100% der Kader haben Team informiert"

      week_2_3:
        activities:
          - activity: "Quick Wins identifizieren"
            description: "GL identifiziert 3 schnelle Erfolge"
            owner: "GL"

          - activity: "Accountability-Partner Kontakt"
            description: "Erster Check-in mit Partner"
            owner: "Kader"

        success_criteria:
          - "Quick Wins definiert und kommuniziert"

      week_4:
        activities:
          - activity: "Pulse Survey 1"
            description: "Kurze Umfrage: Commitment-Umsetzung"
            owner: "HR"
            metrics: ["ST-01", "ST-02", "ST-05"]

          - activity: "Quick Win #1 verkünden"
            description: "Erster sichtbarer Erfolg kommunizieren"
            owner: "CEO/GL"

        success_criteria:
          - "Pulse Survey Response >80%"
          - "Quick Win kommuniziert"

    # ---------------------------------------------------------------------------
    # PHASE 2: VERANKERUNG (Tag 31-60)
    # ---------------------------------------------------------------------------
    phase_2:
      name: "Verankerung"
      timeframe: "Tag 31-60"
      objective: "Commitment in Routinen überführen"

      activities:
        - activity: "Quick Win #2"
          description: "Zweiter sichtbarer Erfolg"
          owner: "GL"

        - activity: "Peer-Accountability Check"
          description: "Strukturierter Check-in mit Partner"
          owner: "Kader"

        - activity: "Pulse Survey 2"
          description: "Fokus: Rebranding, Peer-Accountability"
          owner: "HR"
          metrics: ["ST-03", "ST-04"]

        - activity: "Mini-Learning (optional)"
          description: "1h virtuelles Follow-up mit FehrAdvice"
          owner: "FehrAdvice + HR"

      success_criteria:
        - "Commitment-Umsetzung >60%"
        - "Peer-Accountability-Kontakt >50%"

    # ---------------------------------------------------------------------------
    # PHASE 3: NACHHALTIGKEIT (Tag 61-100)
    # ---------------------------------------------------------------------------
    phase_3:
      name: "Nachhaltigkeit"
      timeframe: "Tag 61-100"
      objective: "Langfristige Verankerung sichern"

      activities:
        - activity: "Quick Win #3"
          description: "Dritter sichtbarer Erfolg"
          owner: "GL"

        - activity: "100-Tage-Review"
          description: "Mini-Off-Site oder virtuelles Review"
          owner: "HR + GL"
          format: "2h, Kader-Gruppen"

        - activity: "Learnings dokumentieren"
          description: "Was hat funktioniert? Was nicht?"
          owner: "HR + FehrAdvice"

        - activity: "Strategie-Anpassung (falls nötig)"
          description: "GL passt Umsetzungsplan an"
          owner: "GL"

      success_criteria:
        - "3 Quick Wins kommuniziert"
        - "100-Tage-Review durchgeführt"
        - "Learnings dokumentiert"

  governance:
    steering:
      frequency: "Alle 2 Wochen"
      participants: ["HR-Chefin", "1 GL-Mitglied"]
      topics:
