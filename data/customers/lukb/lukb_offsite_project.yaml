        - "Risiken und Blocker"
        - "Nächste Schritte"

    escalation:
      trigger: "Commitment-Umsetzung <40% bei Tag 30"
      action: "Sofort-Intervention mit GL"

    reporting:
      to_gl: "Monatlich"
      to_vr: "Quartalsweise (Teil des LUKB30-Reportings)"

