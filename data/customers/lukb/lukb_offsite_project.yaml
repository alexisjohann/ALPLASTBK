# RISK MANAGEMENT
# =============================================================================
risk_management:
  pre_event_risks:
    - risk: "GL nicht aligned"
      probability: 0.15
      impact: "Hoch"
      mitigation: "GL-Alignment-Meeting vor Event"

    - risk: "Widerständler bereiten sich vor"
      probability: 0.30
      impact: "Mittel"
      mitigation: "Champions identifizieren und briefen"

    - risk: "Rebranding stösst auf Ablehnung"
      probability: 0.25
      impact: "Hoch"
      mitigation: "Luzerner Elemente betonen"

  event_risks:
    - risk: "Öffentlicher Widerstand"
      probability: 0.20
      impact: "Hoch"
      mitigation: "Moderation, keine Bühne geben"

    - risk: "Kognitive Überlastung"
      probability: 0.35
      impact: "Mittel"
      mitigation: "Aktivierende Formate nach Jenewein"

    - risk: "CEO wirkt nicht authentisch"
      probability: 0.10
      impact: "Sehr hoch"
      mitigation: "CEO-Coaching vor Event"

  post_event_risks:
    - risk: "Momentum verpufft"
      probability: 0.45
      impact: "Hoch"
      mitigation: "100-Tage-Plan strikt umsetzen"

    - risk: "Keine Quick Wins"
      probability: 0.30
      impact: "Hoch"
      mitigation: "Quick Wins vor Event identifizieren"

    - risk: "Kader-Kündigungen"
      probability: 0.15
      impact: "Mittel"
      mitigation: "HR-Monitoring, 1:1 Gespräche"

