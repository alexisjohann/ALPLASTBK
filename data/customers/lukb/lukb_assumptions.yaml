---
# LUKB Assumptions Database
# Behavioral and Strategic Assumptions for Change Intervention
# Last Updated: 2026-01-26
# Database Version: 1.0.0

metadata:
  customer: "LUKB"
  context: "Off-Site Day 6. März 2026 - Strategie LUKB30 + Rebranding"
  version: "1.0.0"
  last_updated: "2026-01-26"

# =============================================================================
# MACRO-KONTEXT ANNAHMEN (Schweiz / Banking)
# =============================================================================
macro_assumptions:
  switzerland_banking:
    description: "Annahmen über Schweizer Bankenmarkt 2026"

    market_dynamics:
      - assumption: "Zinsumfeld normalisiert sich"
        confidence: 0.70
        impact: "Nettozinsmarge unter Druck"
        source: "SNB Guidance 2025"

      - assumption: "Konsolidierung unter Kantonalbanken"
        confidence: 0.55
        impact: "Wettbewerbsdruck steigt"
        source: "VSKB Outlook"

      - assumption: "Digitalisierung beschleunigt sich"
        confidence: 0.85
        impact: "Investitionsbedarf steigt"
        source: "Industry Consensus"

    regulatory:
      - assumption: "FINMA-Anforderungen stabil"
        confidence: 0.75
        impact: "Keine neuen Eigenkapitalanforderungen"

      - assumption: "Staatsgarantie bleibt bestehen"
        confidence: 0.90
        impact: "Vertrauensvorsprung erhalten"

  central_switzerland:
    description: "Annahmen über Wirtschaftsraum Luzern"

    economic:
      - assumption: "BIP-Wachstum Zentralschweiz +1.5-2.0% p.a."
        confidence: 0.65
        impact: "Solide Basis für Heimatmarkt"

      - assumption: "Bevölkerungswachstum Luzern +0.8% p.a."
        confidence: 0.70
        impact: "Organisches Hypothekenwachstum"

# =============================================================================
# MESO-KONTEXT ANNAHMEN (LUKB Organisation)
# =============================================================================
meso_assumptions:
  strategy_lukb30:
    description: "Annahmen zur Strategieumsetzung"

    feasibility:
      - assumption: "Top 5 Ambition ist realistisch erreichbar"
        confidence: 0.60
        uncertainty_range: [0.45, 0.75]
        key_dependencies:
          - "Erfolgreiche nationale Expansion Private Banking"
          - "KI-Investitionen zahlen sich aus"
          - "Keine externe Schocks (Rezession)"
        source: "LUKB Management, FehrAdvice Assessment"

      - assumption: "Zinsunabhängige Erträge +50% bis 2030 machbar"
        confidence: 0.55
        uncertainty_range: [0.40, 0.70]
        key_dependencies:
          - "Gebührenwachstum"
          - "Trading-Erträge"
          - "Krypto-Geschäft skaliert"

      - assumption: "CIR unter 50% haltbar trotz Investitionen"
        confidence: 0.70
        uncertainty_range: [0.55, 0.85]
        rationale: "Historisch stark, Prozesseffizienz hoch"

  organization:
    description: "Annahmen zur Organisationsbereitschaft"

    change_readiness:
      - assumption: "40 Kader sind grundsätzlich change-bereit"
        confidence: 0.65
        distribution:
          champions_percent: 20
          pragmatiker_percent: 50
          skeptiker_percent: 20
          widerstaendler_percent: 10
        source: "HR-Einschätzung (Silvana), LLMMC"

      - assumption: "HR hat Standing für Change-Begleitung"
        confidence: 0.75
        rationale: "2.5 Jahre Aufbauarbeit, hohe Reputation"

      - assumption: "GL ist aligned und committed"
        confidence: 0.80
        rationale: "Strategie wurde gemeinsam entwickelt"

# =============================================================================
# MICRO-KONTEXT ANNAHMEN (Off-Site Day)
# =============================================================================
micro_assumptions:
  offsite_context:
    description: "Annahmen zum Off-Site Setting"

    physical_context:
      - assumption: "Off-Site Location = neutraler Boden"
        confidence: 0.85
        impact: "Erleichtert neue Perspektiven"

      - assumption: "Ganztägiges Format = ausreichend Zeit"
        confidence: 0.70
        risk: "Ermüdung nach 50min Jenewein"

    social_context:
      - assumption: "Peer-Commitment vor Gleichrangigen bindet stärker"
        confidence: 0.78
        source: "Cialdini 2001, Social Psychology Literature"

      - assumption: "GL-Präsenz = Signaling-Effekt"
        confidence: 0.82
        impact: "Kader beobachten GL-Commitment genau"

    timing_context:
      - assumption: "Strategiestart = Momentum für Veränderung"
        confidence: 0.75
        rationale: "Psychologischer Reset möglich"

      - assumption: "Rebranding-Enthüllung = emotionaler Moment"
        confidence: 0.70
        impact: "Kann Begeisterung ODER Widerstand auslösen"

# =============================================================================
# BEHAVIORAL ASSUMPTIONS (Verhaltensökonomisch)
# =============================================================================
behavioral_assumptions:
  identity_dynamics:
    description: "Annahmen zu Identität und Change"

    identity_threat:
      - assumption: "Nationale Ambition wird als Identitätsbedrohung wahrgenommen"
        confidence: 0.65
        severity: 0.72
        mitigation: "Framing als Erweiterung, nicht Ersetzung"

      - assumption: "Luzerner DNA ist emotional stark verankert"
        confidence: 0.80
        implication: "Muss respektiert und integriert werden"

    identity_extension:
      - assumption: "Sowohl-Als-Auch Framing kann funktionieren"
        confidence: 0.68
        condition: "Nur wenn Luzerner Identität ZUERST validiert wird"
        source: "Identity Economics (Akerlof/Kranton)"

  social_dynamics:
    description: "Annahmen zu sozialen Einflüssen"

    peer_effects:
      - assumption: "Peer-Meinung wiegt schwerer als Hierarchie-Signal"
        confidence: 0.72
        implication: "Champions als Testimonials nutzen"

      - assumption: "Öffentliches Commitment erhöht Konsistenz-Druck"
        confidence: 0.78
        source: "Commitment & Consistency (Cialdini)"

    leadership_effects:
      - assumption: "CEO-Commitment wird genau beobachtet"
        confidence: 0.80
        risk: "Unglaubwürdiges CEO-Statement = Backfire"

  cognitive_dynamics:
    description: "Annahmen zu kognitiven Prozessen"

    ambition_processing:
      - assumption: "Top 5 Ambition löst Skepsis aus bei 30%+ Kadern"
        confidence: 0.60
        mitigation: "Evidenzbasierte Argumentation"

      - assumption: "Selbstwirksamkeit ist Schlüssel für Commitment"
        confidence: 0.75
        source: "Bandura 1977, 2000"

    knowing_doing_gap:
      - assumption: "Strategie verstehen ≠ Montag anders handeln"
        confidence: 0.85
        mitigation: "Implementation Intentions, Wenn-Dann-Pläne"
        source: "Gollwitzer 1999"

# =============================================================================
# INTERVENTION ASSUMPTIONS
# =============================================================================
intervention_assumptions:
  fehradvice_input:
    description: "Annahmen zum FehrAdvice-Beitrag"

    role:
      - assumption: "Keynote + fachliche Begleitung + Format-Gestaltung"
        confidence: 1.0
        source: "Kundenbriefing"

    effectiveness:
      - assumption: "Verhaltensökonomischer Input differenziert von Jenewein"
        confidence: 0.75
        risk: "Überlappung vermeiden"

      - assumption: "Interaktive Formate erhöhen Engagement"
        confidence: 0.80
        condition: "Nicht zu viel nach Jenewein"

    timing:
      - assumption: "Slot nach Jenewein = kognitive Erschöpfung möglich"
        confidence: 0.65
        mitigation: "Aktivierende, nicht überwältigende Formate"

  success_factors:
    description: "Annahmen zu Erfolgsfaktoren"

    critical:
      - assumption: "GL muss ZUERST sichtbar committen"
        confidence: 0.82
        rationale: "Ohne GL-Signal kein Kader-Commitment"

      - assumption: "Konkrete Handlungsimpulse wichtiger als Vision"
        confidence: 0.75
        rationale: "Pragmatiker brauchen Greifbares"

      - assumption: "Follow-up-Mechanismus muss angekündigt werden"
        confidence: 0.70
        rationale: "Sonst Event-Effekt verpufft"

# =============================================================================
# PARAMETER ESTIMATES (LLMMC)
# =============================================================================
parameter_estimates:
  description: "LLMMC-basierte Parameterschätzungen für Modelle"
  method: "LLM Monte Carlo (Prior)"

  identity_parameters:
    sigma_IDN:
      name: "Identity Threat Sensitivity"
      value: 0.68
      range: [0.55, 0.80]
      description: "Sensitivität auf wahrgenommene Identitätsbedrohung"

    tau_EXT:
      name: "Identity Extension Openness"
      value: 0.55
      range: [0.40, 0.70]
      description: "Bereitschaft zur Identitätserweiterung"

  social_parameters:
    gamma_PEER:
      name: "Peer Influence Strength"
      value: 0.72
      range: [0.60, 0.85]
      description: "Einfluss von Peer-Meinungen auf Kader"

    omega_GL:
      name: "GL Signaling Weight"
      value: 0.78
      range: [0.65, 0.90]
      description: "Gewicht von GL-Signalen für Kader-Verhalten"

  commitment_parameters:
    kappa_COMMIT:
      name: "Public Commitment Binding"
      value: 0.75
      range: [0.65, 0.85]
      description: "Bindungswirkung von öffentlichem Commitment"

    delta_IMPL:
      name: "Implementation Intention Effect"
      value: 0.62
      range: [0.50, 0.75]
      description: "Effekt von konkreten Wenn-Dann-Plänen"

  efficacy_parameters:
    epsilon_EFF:
      name: "Self-Efficacy Belief"
      value: 0.58
      range: [0.45, 0.70]
      description: "Glaube an eigene Wirksamkeit für LUKB30"

    epsilon_COLL:
      name: "Collective Efficacy Belief"
      value: 0.62
      range: [0.50, 0.75]
      description: "Glaube an kollektive Fähigkeit"

# =============================================================================
# VALIDATION STATUS
# =============================================================================
validation:
  status: "Pre-Event Assumptions"
  next_validation: "Post Off-Site (März 2026)"
  validation_methods:
    - "Teilnehmer-Feedback nach Off-Site"
    - "Follow-up Survey nach 4 Wochen"
    - "HR-Beobachtungen"
  learnings_target: "data/customers/lukb/lukb_learnings.yaml"
