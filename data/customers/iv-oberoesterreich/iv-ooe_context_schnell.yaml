# =============================================================================
# Ψ-DIMENSIONEN (8 Faktoren)
# =============================================================================
psi_dimensions:

  psi_I_institutional:
    value: 0.75
    label: "Institutionell"
    description: |
      Österreich hat ein stark institutionell geprägtes Umfeld:
      Sozialpartnerschaft, Kammerpflicht, starke Regulierung.
      OÖ ist traditionell industriefreundlicher als Wien, aber
      der EU-Regulierungsdruck (Green Deal, Lieferkettengesetz)
      wird als zunehmende Belastung wahrgenommen.
    key_factors:
      - "Sozialpartnerschaft (OÖ-Tradition, stark)"
      - "EU-Regulierung (Green Deal, CBAM, Lieferkettengesetz)"
      - "Industrielle Standortpolitik des Landes OÖ"
      - "Bürokratiebelastung (KMU-Klagen zunehmend)"
    ebf_kappa: "kappa_INST"
    trend: "leicht fallend"  # Regulierungsdruck nimmt zu

  psi_S_social:
    value: 0.70
    label: "Sozial"
    description: |
      OÖ hat eine starke industrielle Identität. Industriearbeit geniesst
      traditionell hohes Ansehen. Allerdings verschiebt sich die
      öffentliche Meinung: Umwelt- und Klimathemen gewinnen, was
      zu Spannungen mit der Industrielogik führen kann.
      Die Baseline 2020 zeigte noch hohe Wirtschaftsfreundlichkeit.
    key_factors:
      - "Industrielle Identität OÖ (historisch stark)"
      - "Arbeitsethos und Leistungsorientierung"
      - "Zunehmende Umwelt-/Klimasensibilität"
      - "Stadt-Land-Gefälle (Linz vs. Mühlviertel)"
    ebf_kappa: "kappa_SOCIAL"
    trend: "leicht fallend"  # Spannungsfeld Industrie vs. Klima

  psi_C_cognitive:
    value: 0.55
    label: "Kognitiv"
    description: |
      Die Bevölkerung hat ein mittleres Verständnis wirtschaftlicher
      Zusammenhänge. Industrieproduktion ist "sichtbar" (voestalpine,
      BMW Steyr), was Awareness erhöht. Gleichzeitig ist das
      Verständnis für globale Wertschöpfungsketten und Standortwettbewerb
      begrenzt. Media Framing (Krise, Transformation) beeinflusst stark.
    key_factors:
      - "Sichtbarkeit der Industrie in OÖ (physische Präsenz)"
      - "Begrenzte Economic Literacy bei Nicht-Industrie-Bevölkerung"
      - "Media Framing: Krisen-Narrative dominant seit 2022"
      - "Availability Bias: Eigene Job-Erfahrung als Referenz"
    ebf_kappa: "kappa_COG"
    trend: "stabil"

  psi_K_cultural:
    value: 0.72
    label: "Kulturell"
    description: |
      OÖ ist kulturell konservativ-pragmatisch. Starke Arbeitsmoral,
      Industrietradition (seit Gründerzeit), Innovationsoffenheit
      (Mechatronik-Cluster). Gleichzeitig wachsende Wertepluralität
      bei jüngerer Bevölkerung. Patriotismus ("Mein OÖ") ist Faktor.
    key_factors:
      - "Industriekultur und Arbeitsethos (historisch verwurzelt)"
      - "Pragmatismus ('schauen, dass es funktioniert')"
      - "Regionaler Patriotismus (Identifikation mit OÖ)"
      - "Generationenwandel: Jüngere weniger industrieaffin"
    ebf_kappa: "kappa_CULT"
    trend: "langsam fallend"  # Generationenwandel

  psi_E_economic:
    value: 0.68
    label: "Ökonomisch"
    description: |
      OÖ ist wirtschaftlich stark (BIP/Kopf über AT-Durchschnitt),
      aber die Industrie steht unter Transformationsdruck:
      Energiekosten seit 2022 gestiegen, Fachkräftemangel akut,
      China-Konkurrenz in Kernbranchen. Die Bevölkerung spürt
      Inflation und Kaufkraftverlust (2022-2024), was die
      Wirtschaftswahrnehmung beeinflusst.
    key_factors:
      - "Hohe Kaufkraft, aber Inflationsschock 2022-2024"
      - "Fachkräftemangel als erlebtes Problem"
      - "Energiekosten-Steigerung trifft Industrie und Haushalte"
      - "Transformationsunsicherheit (E-Mobilität, Dekarbonisierung)"
    ebf_kappa: "kappa_ECON"
    trend: "volatil"  # Post-Inflationsschock, Erholung unsicher

  psi_T_temporal:
    value: 0.55
    label: "Temporal"
    description: |
      Der Zeithorizont der Bevölkerung ist durch multiple Krisen
      (COVID, Energie, Inflation, Ukraine) verkürzt. Kurzfristiges
      Sicherheitsdenken dominiert über langfristige Transformationslogik.
      Die Industrie braucht langfristige Rahmenbedingungen, die
      Bevölkerung denkt in Monaten, nicht Jahrzehnten.
    key_factors:
      - "Krisenbedingt verkürzter Zeithorizont (β erhöht)"
      - "Diskrepanz: Industrieplanung (10+ Jahre) vs. Bevölkerung (1-2 Jahre)"
      - "Nostalgie: 'Früher war es besser' (Status Quo Bias)"
      - "Generationenperspektive: Junge sorgen sich um Klimazukunft"
    ebf_kappa: "kappa_TEMP"
    trend: "fallend"  # Present Bias durch Krisen verstärkt

  psi_M_material:
    value: 0.65
    label: "Materiell"
    description: |
      Gute Infrastruktur (Autobahnen, Westbahn), aber digitale
      Transformation im öffentlichen Sektor langsam. IV OÖ nutzt
      klassische Kanäle (Events, Presse) und zunehmend Digital.
      Für die Studie relevant: Befragung wahrscheinlich online + CATI.
    key_factors:
      - "Gute physische Infrastruktur (Verkehr, Industrie)"
      - "Digitalisierung im Mittelfeld (AT-weit)"
      - "IV-Kommunikationskanäle: Events, Presse, Social Media"
      - "Befragungsmethodik: Online-Panel + CATI"
    ebf_kappa: "kappa_MAT"
    trend: "steigend"

  psi_F_physical:
    value: 0.60
    label: "Physisch"
    description: |
      Mix aus urbanem Zentrum (Linz, 210k) und ländlichem Raum.
      Industrie ist physisch präsent und sichtbar (Werke, Schlote,
      Logistik). Dies erhöht die Salience von Wirtschaftsthemen
      im Vergleich zu Dienstleistungs-dominierten Bundesländern.
    key_factors:
      - "Industrielle Sichtbarkeit (Werke, Logistik)"
      - "Stadt-Land-Struktur (Linz vs. ländlicher Raum)"
      - "Pendlerströme (viele arbeiten in Industrie, wohnen ländlich)"
      - "Physische Nähe zur Industrie erhöht Awareness"
    ebf_kappa: "kappa_PHYS"
    trend: "stabil"

# =============================================================================
# GESELLSCHAFTLICHE SPANNUNGSFELDER (aus Kick-Off 11.02.2026)
# =============================================================================
spannungsfelder:

  - id: "SF-01"
    name: "Arbeitsplatzsicherheit vs. Automatisierung/KI"
    description: |
      KI und Automatisierung sichern langfristig Wettbewerbsfähigkeit,
      erzeugen aber kurzfristig Angst vor Arbeitsplatzverlust.
    narrative_frame: "KI als Werkzeug gegen Arbeitskräftemangel (nicht gegen Arbeitnehmer)"
    psi_affected: ["psi_E", "psi_T"]
    segment_sensitivity:
      SEG-WIRTSCHAFTSNAH: "niedrig"
      SEG-AMBIVALENT: "hoch"
      SEG-SKEPTIKER: "sehr hoch"
      SEG-JUNGE: "mittel"

  - id: "SF-02"
    name: "Nachhaltigkeit & Klima vs. Industrielogik"
    description: |
      Klimathemen werden als Gegenposition zur Industrie geframt.
      Industrie wird als Verursacher wahrgenommen, nicht als Lösung.
    narrative_frame: "Industrie als Lösungstreiber (Innovation, Dekarbonisierung)"
    psi_affected: ["psi_S", "psi_K"]
    segment_sensitivity:
      SEG-WIRTSCHAFTSNAH: "niedrig"
      SEG-AMBIVALENT: "mittel"
      SEG-SKEPTIKER: "sehr hoch"
      SEG-JUNGE: "hoch"

  - id: "SF-03"
    name: "Leistung & Eigenverantwortung vs. Work-Life-Balance"
    description: |
      Generationenkonflikt: Leistungsgedanke (Bründl: «Wer beiträgt, erhält»)
      trifft auf Wunsch nach mehr Freizeit und Flexibilität.
      (Haindl-Grutsch: «Warum nicht 1-2h länger arbeiten gegen Inflation?»)
    narrative_frame: "Selbstwirksamkeit als Brücke: Eigene Ziele setzen = Freiheit + Leistung"
    psi_affected: ["psi_K", "psi_C"]
    segment_sensitivity:
      SEG-WIRTSCHAFTSNAH: "niedrig"
      SEG-AMBIVALENT: "mittel"
      SEG-SKEPTIKER: "hoch"
      SEG-JUNGE: "sehr hoch"

  - id: "SF-04"
    name: "Inflation & Kaufkraft vs. Leistungsdebatte"
    description: |
      Inflation hat Kaufkraft erodiert. Gleichzeitig wird «Leistung soll sich lohnen»
      von der IV gefordert — was bei Kaufkraftverlust als zynisch empfunden werden kann.
    narrative_frame: "Widerstandsfähigkeit: Starke Industrie = stabile Löhne = Kaufkraft"
    psi_affected: ["psi_E", "psi_S"]
    segment_sensitivity:
      SEG-WIRTSCHAFTSNAH: "mittel"
      SEG-AMBIVALENT: "hoch"
      SEG-SKEPTIKER: "hoch"
      SEG-JUNGE: "mittel"

  - id: "SF-05"
    name: "Marktwirtschaft & Liberalität vs. Symbolpolitik"
    description: |
      IV-Position: Mehr Marktwirtschaft, weniger Symbolpolitik.
      Herausforderung: Wie wird marktwirtschaftliche Logik gesellschaftlich
      anschlussfähig vermittelt? Freiheit und Verantwortung zusammen denken.
    narrative_frame: "Eigenverantwortung als Ausdruck von Freiheit und Würde"
    psi_affected: ["psi_I", "psi_K"]
    segment_sensitivity:
      SEG-WIRTSCHAFTSNAH: "niedrig"
      SEG-AMBIVALENT: "mittel"
      SEG-SKEPTIKER: "sehr hoch"
      SEG-JUNGE: "mittel"

  - id: "SF-06"
    name: "Strukturwandel als Bedrohung vs. Chance"
    description: |
      Beispiel Lenzing: Strukturwandel ist real. Veränderung wird oft als
      Bedrohung erlebt, muss aber als Chance kommuniziert werden.
      «Ohne Änderungen werden wir keine anderen Ergebnisse haben» (Bründl).
    narrative_frame: "Veränderung = Chance. Offenheit für Neues ist Voraussetzung."
    psi_affected: ["psi_T", "psi_C"]
    segment_sensitivity:
      SEG-WIRTSCHAFTSNAH: "mittel"
      SEG-AMBIVALENT: "hoch"
      SEG-SKEPTIKER: "mittel"
      SEG-JUNGE: "mittel"

# =============================================================================
# BEVÖLKERUNGSSEGMENTE (~4 Segmente für Wirtschaftsfreundlichkeit)
# =============================================================================
# Segmente basieren auf typischen Einstellungsmustern zur Wirtschaft/Industrie
# in der oberösterreichischen Bevölkerung.
# Parameter: LLMMC Prior (Tier 2), informed by AT-Makro-Kontext

population_segments:

  - id: "SEG-WIRTSCHAFTSNAH"
    name: "Wirtschaftsnahe"
    description: |
      Personen mit direktem Bezug zur Industrie: Beschäftigte in
      Industriebetrieben, Unternehmer:innen, Gewerbetreibende,
      wirtschaftsnahe Berufe. Hohe Economic Literacy, positive
      Grundhaltung zu Wirtschaft und Industrie.
    share: 0.30  # ca. 30% der OÖ-Bevölkerung
    demographics:
      age_range: "30-65"
      education: "Lehre bis Uni, häufig technisch"
      urban_rural: "Überwiegend suburban/ländlich"
      income: "Über Median"

    behavioral_parameters:
      lambda_loss_aversion: 2.00
      beta_present_bias: 0.88
      kappa_default_sensitivity: 0.55
      sigma_social_proof: 0.60

    wirtschaftsfreundlichkeit:
      baseline_2020: 0.82    # Hohe Zustimmung
      expected_2026: 0.78    # Leicht gesunken (Transformationsunsicherheit)
      key_drivers:
        positive:
          - "Eigene Erfahrung: Industrie = guter Arbeitgeber"
          - "Regionale Identität mit Industriestandort"
        negative:
          - "Energiekosten und Regulierungsdruck erlebt"
          - "Sorge um Standort im globalen Wettbewerb"

    intervention_affinity:
      high: ["Faktenbasierte Kommunikation", "Erfolgsgeschichten aus OÖ"]
      medium: ["Standortvergleiche (international)"]
      low: ["Emotionale Appelle"]

  - id: "SEG-AMBIVALENT"
    name: "Ambivalente Mitte"
    description: |
      Grösste Gruppe: Keine direkte Industrieverbindung, aber
      grundsätzlich positive Haltung zu Wirtschaft. Beeinflusst
      durch Media Framing. Schwankt zwischen "Wirtschaft ist
      wichtig" und "Umwelt/Soziales geht vor".
    share: 0.35  # ca. 35% der OÖ-Bevölkerung
    demographics:
      age_range: "25-55"
      education: "Breit gestreut"
      urban_rural: "Gemischt"
      income: "Median-Bereich"

    behavioral_parameters:
      lambda_loss_aversion: 2.30
      beta_present_bias: 0.82
      kappa_default_sensitivity: 0.70
      sigma_social_proof: 0.72

    wirtschaftsfreundlichkeit:
      baseline_2020: 0.65
      expected_2026: 0.55    # Stärker gesunken (Krisenmüdigkeit, Framing)
      key_drivers:
        positive:
          - "Grundverständnis: Wirtschaft sichert Wohlstand"
          - "Lokale Arbeitgeber werden geschätzt"
        negative:
          - "Inflationsfrustration ('Wirtschaft profitiert, ich nicht')"
          - "Klimadebatte: Industrie als Problem-Verursacher geframt"
          - "Ungleichheits-Narrative (CEO-Gehälter vs. Reallöhne)"

    intervention_affinity:
      high: ["Social Proof (Nachbarn, Gemeinde)", "Konkrete Beispiele aus dem Alltag"]
      medium: ["Default Framing", "Loss Framing (was passiert ohne Industrie)"]
      low: ["Abstrakte Wirtschaftsdaten", "Top-down Kommunikation"]

  - id: "SEG-SKEPTIKER"
    name: "Wirtschaftsskeptiker"
    description: |
      Kritische Haltung gegenüber "der Wirtschaft". Sieht Industrie
      primär als Umweltverschmutzer, Profitmaximierer oder
      Ungleichheitstreiber. Häufig links-grün orientiert oder
      von wirtschaftlicher Prekarisierung betroffen.
    share: 0.20  # ca. 20% der OÖ-Bevölkerung
    demographics:
      age_range: "18-45 oder 55+"
      education: "Bimodal: Akademiker (Geistes-/Sozialwiss.) oder niedriger Abschluss"
      urban_rural: "Überwiegend urban (Linz)"
      income: "Unter Median oder studentisch"

    behavioral_parameters:
      lambda_loss_aversion: 2.60
      beta_present_bias: 0.78
      kappa_default_sensitivity: 0.65
      sigma_social_proof: 0.55

    wirtschaftsfreundlichkeit:
      baseline_2020: 0.35
      expected_2026: 0.28    # Weiter gesunken (Klimadebatte, Ungleichheit)
      key_drivers:
        positive:
          - "Wenige — systemische Skepsis"
        negative:
          - "Klimakrise: Industrie als Verursacher"
          - "Soziale Ungleichheit: Gewinnkonzentration"
          - "Globalisierungskritik: Outsourcing, Preisdumping"
          - "Misstrauen gegenüber Interessenvertretungen"

    intervention_affinity:
      high: ["Authentische Geschichten von Arbeiter:innen", "Nachhaltigkeitstransformation"]
      medium: ["Dialogformate (nicht einseitig)"]
      low: ["IV-Branding", "Standort-Rankings", "Abstrakte Wachstumszahlen"]

  - id: "SEG-JUNGE"
    name: "Junge Generation (18-30)"
    description: |
      Digital Natives mit spezifischer Wertelandschaft: Klimaprioritär,
      Work-Life-Balance orientiert, weniger industrieaffin als
      Elterngeneration. Aber auch: Pragmatisch, wenn es um eigenen
      Job/Karriere geht. Entscheidendes Segment für langfristige
      Wirtschaftsfreundlichkeit.
    share: 0.15  # ca. 15% der OÖ-Bevölkerung (Wahlalter)
    demographics:
      age_range: "18-30"
      education: "In Ausbildung oder Berufseinstieg"
      urban_rural: "Urban-orientiert"
      income: "Niedrig (Einstieg)"

    behavioral_parameters:
      lambda_loss_aversion: 1.80    # Weniger verlustavers (weniger zu verlieren)
      beta_present_bias: 0.75      # Stärker gegenwartsfokussiert
      kappa_default_sensitivity: 0.72
      sigma_social_proof: 0.80     # Stark peer-orientiert

    wirtschaftsfreundlichkeit:
      baseline_2020: 0.50
      expected_2026: 0.42    # Gesunken (Klimapriorisierung, FFF-Effekt)
      key_drivers:
        positive:
          - "Pragmatismus bei eigener Karriere/Job"
          - "Technik-Affinität (Innovation positiv besetzt)"
        negative:
          - "Klima als Leitthema der Generation"
          - "Work-Life-Balance vs. Industrie-Image ('Fabrik')"
          - "Social-Media-Framing (anti-corporate Narrative)"
          - "Gefühl: 'System arbeitet nicht für uns'"

    intervention_affinity:
      high: ["Peer-Kommunikation (Influencer, Azubis)", "Innovation & Tech Stories"]
      medium: ["Social Media Content", "Erlebnisformate (Werksbesuche)"]
      low: ["Klassische Medien", "Formelle Kommunikation", "Wachstumszahlen"]

