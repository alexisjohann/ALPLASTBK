metadata:
  name: "IV Oberösterreich Schnellkontext"
  code: "BCM2_MIKRO_IVOO"
  layer: "mikro"
  version: "2.0"
  last_updated: "2026-02-26"
  cva_stufe: "SCHNELL"
  total_factors: 32
  description: |
    Kontextvektor für die Industriellenvereinigung Oberösterreich.
    Projekt: «Exzellenzstrategie KI für den Industriestandort OÖ».

    Kernauftrag (aus Kick-Off 11.02.2026):
    Evidenzbasierte Grundlage schaffen, um die Beziehung zwischen
    Bevölkerung und IV OÖ zu verstehen, zu stärken und als
    Standortvorteil zu nutzen — mit KI-Strategie als Transformationshebel.

    Zentrales Narrativ: WIDERSTANDSFÄHIGKEIT (nicht «Produktivität»).
    Technologie ist Mittel — nicht Zweck.

    Die Segmente beschreiben die oberösterreichische Bevölkerung
    (Zielgruppe der Studie), nicht die IV-Mitglieder.

  project_context:
    project_id: "PRJ-IVO001"
    project_code: "IVO002"
    project_title: "Exzellenzstrategie KI für den Industriestandort Oberösterreich"
    study_title: "Wirtschaftsfreundlichkeit der Bevölkerung OÖ"
    baseline_year: 2020
    followup_year: 2026
    kickoff_date: "2026-02-11"
    kickoff_protocol: "data/customers/iv-oberoesterreich/kickoff_protokoll_2026-02-11.md"

    strategic_core_question: |
      Wie sichern wir breite gesellschaftliche Unterstützung für die
      industrielle Zukunft Oberösterreichs?

    concrete_objectives:
      - "Identitätswert messen: Wie stark identifizieren sich Menschen mit Industrie/Leitbetrieben?"
      - "Treiber & Hemmnisse erkennen: Was stärkt Vertrauen? Wo sind Wahrnehmungslücken?"
      - "Zielgruppenprofile erstellen: Segmentierung nach Alter, Region, Beruf, Werthaltungen"
      - "Kontaktpunkte bewerten: Welche Berührungspunkte wirken besonders stark?"
      - "Narrative testen: Welche KI-Strategie-Botschaften finden in welchen Segmenten Resonanz?"
      - "Benchmark schaffen: Messbare Ausgangsbasis für langfristiges Monitoring"

    central_narrative:
      frame: "Widerstandsfähigkeit"
      why_not_productivity: |
        «Produktivitätserhöhung» ist abstrakt und wenig anschlussfähig.
        Der Begriff erzeugt Distanz oder Missverständnisse.
        (Erkenntnis aus Kick-Off, Bründl/Haindl-Grutsch)
      resilience_dimensions:
        - "Krisenfestigkeit"
        - "Sicherung von Arbeitsplätzen"
        - "Stabilität des Sozialsystems"
        - "Internationale Wettbewerbsfähigkeit"

    ki_strategy_positioning: |
      KI ist ein Vehikel zur langfristigen Absicherung von Wohlstand.
      Automatisierung als Antwort auf Arbeitskräftemangel.
      Anforderungen an Kommunikation:
      - Verständliche, einfache Säulen
      - Klarer roter Faden
      - Keine kurzfristigen «Strohfeuer»

    political_window: |
      Landtagswahl OÖ 2027 — politisches Zeitfenster für Positionierung.
      Ergebnisse müssen vor LTW vorliegen und kommunikativ nutzbar sein.

  hierarchy:
    parent: "BCM2_04_KON_AT (MAKRO Österreich)"
    grandparent: "BCM2_04_KON (Europa)"
    regional_focus: "Oberösterreich"

  ebf_mapping:
    primary_10c:
      - "AWARE"    # Wirtschaftliches Verständnis, KI-Awareness
      - "WHAT"     # Identität, Leistung, Selbstwirksamkeit
      - "WHEN"     # Kontext: Krisen, Transformation, Zeitfenster LTW 2027
      - "WHO"      # Segmente: Wirtschaftsnahe, Ambivalente, Skeptiker, Junge
      - "HOW"      # Narrative-Wirkung: Wie interagieren Botschaften × Segmente?
    primary_psi:
      - "psi_K_cultural"       # Industriekultur, Arbeitsethos, Leistungsgedanke
      - "psi_I_institutional"  # Sozialpartnerschaft, Regulierung, Förderlandschaft
      - "psi_S_social"         # Soziale Normen, Peer Effects, Schneeball-Effekt
      - "psi_E_economic"       # Standortdruck, Energiekosten, Fachkräftemangel
      - "psi_C_cognitive"      # Economic Literacy, Media Framing, Availability Bias

# =============================================================================
# ORGANISATION (~8 Faktoren)
# =============================================================================
organisation:
  name_de: "Industriellenvereinigung Oberösterreich"
  name_short: "IV OÖ"

  # Grösse
  members: 450        # ca. 450 Mitgliedsunternehmen
  employees_iv: 25    # Geschäftsstelle
  employees_members_total: 120000  # Beschäftigte in Mitgliedsbetrieben

  # Klassifikation
  industry: "Interessenvertretung / Industrie-Verband"
  sub_industry: "Freiwillige Industrievertretung (nicht WKO)"
  ownership: "Verein (freiwillige Mitgliedschaft)"
  legal_form: "Verein nach Vereinsgesetz"

  # Geografie
  headquarters: "Linz"
  bundesland: "Oberösterreich"
  geographic_scope: "regional"  # OÖ mit bundespolitischem Einfluss

  # Schlüsselpersonen (aus Kick-Off 11.02.2026)
  key_people:
    - name: "Thomas Bründl"
      role: "Präsident IV OÖ"
      key_positions:
        - "Industrie muss sich vom Bild des «rauchenden Schlots» lösen"
        - "Industrie ist Innovation, Qualität, Zukunft — nicht Emission"
        - "Selbstwirksamkeit: «Nicht ein Dritter legt deine Ziele fest — sondern du selbst»"
        - "Veränderungsbereitschaft als kulturelle Notwendigkeit"
    - name: "Dr. Joachim Haindl-Grutsch"
      role: "Geschäftsführer IV OÖ"
      key_positions:
        - "Leistungsbereitschaft als Standortfaktor stärken"
        - "Exportorientierung: Abschottung ist keine Option"
        - "Qualität als Differenzierungsstrategie (nicht Kostenführer)"

  # Strategische Positionierung
  role_description: |
    Die IV OÖ ist die freiwillige Interessenvertretung der Industrie in
    Oberösterreich. Im Gegensatz zur Wirtschaftskammer (Pflichtmitgliedschaft)
    vertritt sie ausschliesslich industrielle Grossbetriebe. OÖ ist mit
    ~25% der österreichischen Industrieproduktion der stärkste Industriestandort.

  industry_reframing_vision: |
    Industrie muss stärker mit Wohlstand verknüpft werden (Bründl).
    Es geht um die Menschen unter dieser Industrieklammer — es braucht
    eine Mindset-Änderung. Weg vom «rauchenden Schlot» hin zu Innovation,
    Qualität und Zukunft. Perfektion nicht als Last, sondern als Freude
    an Weiterentwicklung. Respektvolles Miteinander als Standortprinzip.

  key_themes:
    - "Standortpolitik und Wirtschaftsfreundlichkeit"
    - "KI-Exzellenzstrategie als Transformationshebel"
    - "Fachkräfte und Bildung"
    - "Energie und Transformation"
    - "Bürokratieabbau und Regulierung"
    - "Innovation und Technologie"
    - "Selbstwirksamkeit und Eigenverantwortung"

