# AGGREGIERTE VERHALTENSPARAMETER
# =============================================================================
behavioral_parameters_aggregate:

  core_parameters:
    loss_aversion:
      symbol: "λ"
      value: 2.22
      range: [1.80, 2.60]
      source: "Segment-gewichteter Durchschnitt (LLMMC Tier 2)"
      note: "Leicht über AT-Durchschnitt wegen Krisenerfahrung"

    present_bias:
      symbol: "β"
      value: 0.82
      range: [0.75, 0.88]
      source: "Segment-gewichteter Durchschnitt (LLMMC Tier 2)"
      note: "Krisenbedingt verstärkter Present Bias"

    default_sensitivity:
      symbol: "κ_default"
      value: 0.66
      range: [0.55, 0.72]
      source: "Segment-gewichteter Durchschnitt"
      note: "Mittel — OÖ Bevölkerung folgt Defaults moderat"

    social_proof:
      symbol: "σ_social"
      value: 0.68
      range: [0.55, 0.80]
      source: "Segment-gewichteter Durchschnitt"
      note: "Hoch bei Jungen und Ambivalenter Mitte"

  study_specific_parameters:
    wirtschaftsfreundlichkeit_aggregiert:
      symbol: "WF_agg"
      baseline_2020: 0.62
      expected_2026: 0.55
      delta: -0.07
      note: |
        Aggregierte Wirtschaftsfreundlichkeit über alle Segmente.
        Rückgang von 0.62 auf 0.55 erwartet (-7 Prozentpunkte).
        Haupttreiber: Ambivalente Mitte und Junge Generation.

    key_delta_drivers:
      - driver: "Inflationsschock 2022-2024"
        effect: -0.04
        mechanism: "Kaufkraftverlust → 'Wirtschaft hilft mir nicht'"
        psi: "psi_E"
      - driver: "Klima-Framing in Medien"
        effect: -0.03
        mechanism: "Industrie = Umweltproblem (Availability Bias)"
        psi: "psi_S, psi_C"
      - driver: "Fachkräftemangel (positiv)"
        effect: +0.02
        mechanism: "Industrie bietet gute Jobs → persönliche Erfahrung"
        psi: "psi_E"
      - driver: "Transformations-Narrative"
        effect: -0.02
        mechanism: "Unsicherheit über Zukunft der Industriejobs"
        psi: "psi_T"

# =============================================================================
# STRATEGISCHE IMPLIKATIONEN
# =============================================================================
strategic_implications:

  # ─────────────────────────────────────────────────────────────
  # A. NARRATIVE-STRATEGIE (zentrale Erkenntnis aus Kick-Off)
  # ─────────────────────────────────────────────────────────────
  narrative_strategy:
    central_frame: "Widerstandsfähigkeit"
    rejected_frame: "Produktivitätserhöhung"
    rejection_reason: "Abstrakt und wenig anschlussfähig, erzeugt Distanz"

    five_pillars:
      - pillar: "Sicherung des Wohlstands"
        10c: "WHAT"
        psi: "psi_E"
      - pillar: "Steigerung der Widerstandsfähigkeit"
        10c: "WHEN"
        psi: "psi_I, psi_E"
      - pillar: "Reaktivierung des Leistungsgedankens"
        10c: "WHAT (Identity)"
        psi: "psi_K"
      - pillar: "Stärkung individueller Selbstwirksamkeit"
        10c: "READY"
        psi: "psi_C, psi_K"
      - pillar: "Positionierung OÖ als Qualitäts- und Innovationsregion Europas"
        10c: "AWARE"
        psi: "psi_S, psi_K"

    ki_positioning: |
      Technologie ist Mittel — nicht Zweck.
      KI als Vehikel zur langfristigen Absicherung von Wohlstand.
      Automatisierung auch als Antwort auf Arbeitskräftemangel
      (nicht ausschliesslich durch Zuwanderung lösen).

    communication_requirements:
      - "Verständliche, einfache Säulen"
      - "Klarer roter Faden"
      - "Keine kurzfristigen «Strohfeuer»"
      - "Widerstandsfähigkeit als zentrales gesellschaftliches Narrativ"

  # ─────────────────────────────────────────────────────────────
  # B. OPPORTUNITIES (mit Spannungsfeld-Bezug)
  # ─────────────────────────────────────────────────────────────
  top_3_opportunities:
    - dimension: "AWARE"
      opportunity: |
        KI-Narrative testen, die «Widerstandsfähigkeit» konkret machen.
        Ambivalente Mitte ist grundsätzlich offen, braucht aber
        verständliche Botschaften (nicht «Produktivität», sondern
        «Krisenfestigkeit», «Arbeitsplatzsicherung»). SF-01 adressieren.
      intervention_type: "Narrative Testing + Information Salience"
      target_segment: "SEG-AMBIVALENT"
      spannungsfeld_ref: "SF-01"

    - dimension: "WHAT (Identity)"
      opportunity: |
        Industrie-Identität OÖ re-framen: Weg vom «rauchenden Schlot»,
        hin zu Innovation, Qualität, KI-Exzellenz. «Mein OÖ» als starkes
        Identity Frame nutzen — Industrie als Teil dieser Identität,
        nicht als Gegner von Umwelt/Lebensqualität.
      intervention_type: "Identity Reframing + Regional Pride"
      target_segment: "SEG-AMBIVALENT, SEG-JUNGE"
      spannungsfeld_ref: "SF-02"

    - dimension: "READY (Selbstwirksamkeit)"
      opportunity: |
        Bründls Kernbotschaft als Intervention: «Nicht ein Dritter legt
        deine Ziele fest — sondern du selbst.» Selbstwirksamkeit als
        Brücke zwischen Leistungsgedanke und Work-Life-Balance.
        Veränderungsbereitschaft als Chance, nicht Bedrohung.
      intervention_type: "Self-Efficacy Activation + Empowerment"
      target_segment: "SEG-JUNGE, SEG-AMBIVALENT"
      spannungsfeld_ref: "SF-03, SF-06"

  # ─────────────────────────────────────────────────────────────
  # C. RISKS
  # ─────────────────────────────────────────────────────────────
  top_3_risks:
    - risk: "Backfire bei zu industriefreundlicher Kommunikation"
      mitigation: |
        Skeptiker und Junge reagieren negativ auf reine IV-Propaganda.
        Dialogformate, Sozialpartner einbinden, Transformations-Narrativ
        verwenden. Schneeball-Effekt zwischen Gruppen anstreben.
      segment: "SEG-SKEPTIKER, SEG-JUNGE"

    - risk: "Leistungsrhetorik als zynisch empfunden bei Kaufkraftverlust"
      mitigation: |
        «Leistung soll sich lohnen» muss mit konkretem Nutzen verbunden
        sein (Löhne, Ausbildung, Sozialstabilität). Nicht isoliert
        kommunizieren. Widerstandsfähigkeit betonen, nicht Leistungsdruck.
      segment: "SEG-AMBIVALENT, SEG-SKEPTIKER"

    - risk: "KI-Narrative erzeugt Angst statt Aufbruch"
      mitigation: |
        KI als Werkzeug gegen Arbeitskräftemangel framen (nicht gegen
        Arbeitnehmer). Konkrete Anwendungsbeispiele aus OÖ-Betrieben.
        «Kostenführer» wäre nicht glaubwürdig — «Verlässlicher Partner
        durch stabile Rahmenbedingungen» realistischer.
      segment: "SEG-AMBIVALENT, SEG-JUNGE"

  # ─────────────────────────────────────────────────────────────
  # D. BASELINE-HYPOTHESEN (Bevölkerungsmessung)
  # ─────────────────────────────────────────────────────────────
  baseline_comparison_hypotheses:
    - hypothesis: "H1: Wirtschaftsfreundlichkeit ist seit 2020 gesunken"
      expected_delta: "-0.05 to -0.10"
      confidence: "HIGH"
      rationale: "Multiple Krisen, Klima-Framing, Inflationsfrustration"

    - hypothesis: "H2: Grösster Rückgang bei Ambivalenter Mitte"
      expected_delta_segment: -0.10
      confidence: "HIGH"
      rationale: "Framing-anfälligste Gruppe, Kaufkraftverlust spürbar"

    - hypothesis: "H3: Wirtschaftsnahe bleiben stabil"
      expected_delta_segment: -0.04
      confidence: "MEDIUM"
      rationale: "Eigene positive Erfahrung puffert, aber Transformationssorge"

    - hypothesis: "H4: Junge sind stärker gesunken als Ältere"
      expected_delta_segment: -0.08
      confidence: "MEDIUM-HIGH"
      rationale: "Klimapriorisierung, FFF-Effekt, anti-corporate Social Media"

    - hypothesis: "H5: Widerstandsfähigkeit-Frame resoniert stärker als Produktivitäts-Frame"
      expected_delta_segment: "+0.05 to +0.10 (Framing-Effekt)"
      confidence: "MEDIUM"
      rationale: "Kick-Off-Erkenntnis: Konkrete Resilienz-Sprache > abstrakte Produktivität"

  # ─────────────────────────────────────────────────────────────
  # E. NÄCHSTE SCHRITTE (aus Kick-Off vereinbart)
  # ─────────────────────────────────────────────────────────────
  recommended_next_steps:
    - step: "KI-Strategie analysieren"
      description: "Dr. Haindl-Grutsch übermittelt FehrAdvice das vollständige KI-Strategiepapier"
      deadline: "ASAP"
      owner: "IV OÖ (Haindl-Grutsch)"

    - step: "Modellbasierte Narrative entwickeln"
      description: "FehrAdvice: Segmentgenaue Narrative auf Basis der Ψ-Dimensionen und Spannungsfelder"
      deadline: "2026-03-04"
      owner: "FehrAdvice (AJ, MADLW)"

    - step: "Strategisches Sounding"
      description: "Gemeinsames Review und Diskussion der ersten Narrative"
      deadline: "2026-03-04 08:30"
      owner: "Alle"

    - step: "Bevölkerungsmessung durchführen"
      description: "Repräsentative Befragung OÖ (n≈1000) mit Narrative-Test"
      deadline: "2026-06"
      owner: "FehrAdvice"

    - step: "Ergebnisse präsentieren"
      description: "Strategische Handlungsableitung und Massnahmen-Detaillierung"
      deadline: "2026-06/07"
      owner: "FehrAdvice + IV OÖ"

