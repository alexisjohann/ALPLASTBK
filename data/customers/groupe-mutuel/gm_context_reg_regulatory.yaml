metadata:
  axis_code: "REG"
  axis_name: "Regulatory & Compliance"
  axis_name_de: "Regulierung & Compliance"
  layer: "MACRO"
  version: "1.0.0"
  total_factors: 50
  sub_axes: 5
  description: |
    Regulatorisches Umfeld der Groupe Mutuel, Aufsicht durch BAG und FINMA,
    Compliance-Anforderungen, KVG/VVG-Rahmen und politische Entwicklungen.
  data_sources:
    - "BAG Krankenversicherungsaufsicht"
    - "FINMA Berichte"
    - "Groupe Mutuel Compliance Reports"
    - "Bundesratsbotschaften"

# ==============================================================================
# SUB-ACHSE: REG-AUF (Aufsicht)
# ==============================================================================

REG-AUF:
  name: "Aufsicht"
  description: "Aufsichtsrechtliche Rahmenbedingungen und Behörden"
  factors: 10

  factors_list:
    - id: "GM-REG-AUF-01"
      name: "BAG Aufsicht OKP"
      definition: "Aufsichtsbehörde für obligatorische Krankenversicherung"
      values:
        2024:
          authority: "Bundesamt für Gesundheit (BAG)"
          scope: "Prämien, Reserven, Leistungen"
          intensity: "hoch"
      source: "BAG"

    - id: "GM-REG-AUF-02"
      name: "FINMA Aufsicht VVG"
      definition: "Aufsichtsbehörde für Zusatzversicherungen"
      values:
        2024:
          authority: "FINMA"
          scope: "Solvenz, Governance, Produkte"
          intensity: "mittel"
      source: "FINMA"

    - id: "GM-REG-AUF-03"
      name: "Prüfungsfrequenz BAG"
      definition: "Häufigkeit der BAG-Prüfungen"
      values:
        2024: "jährlich"
        scope: ["Prämientarife", "Reservenberechnung", "Risikoausgleich"]
      source: "BAG"

    - id: "GM-REG-AUF-04"
      name: "Prüfungsfrequenz FINMA"
      definition: "Häufigkeit der FINMA-Prüfungen"
      values:
        2024: "alle 3 Jahre"
        last_audit: 2023
      source: "FINMA"

    - id: "GM-REG-AUF-05"
      name: "Aufsichtsrechtliche Massnahmen"
      definition: "Sanktionen und Massnahmen der letzten 5 Jahre"
      values:
        2024:
          warnings: 0
          sanctions: 0
          special_audits: 1
      source: "Groupe Mutuel Compliance"

    - id: "GM-REG-AUF-06"
      name: "Aufsichtskategorie FINMA"
      definition: "Einstufung nach FINMA-Aufsichtskategorien"
      values:
        2024: 3
        scale: "1-5 (1=höchste Intensität)"
      source: "FINMA"

    - id: "GM-REG-AUF-07"
      name: "Meldepflichten"
      definition: "Anzahl regulatorische Meldungen pro Jahr"
      values:
        2024: 48
        categories: ["Prämien", "SST", "Risikoausgleich", "Governance"]
      unit: "Meldungen/Jahr"
      source: "Groupe Mutuel Compliance"

    - id: "GM-REG-AUF-08"
      name: "Ombudsman-Fälle"
      definition: "Fälle beim Ombudsmann der Krankenversicherung"
      values:
        2024: 145
        2022: 165
        2020: 180
        outcome_gm: 0.52
      unit: "Fälle"
      trend: "sinkend"
      source: "Ombudsmann KV"

    - id: "GM-REG-AUF-09"
      name: "Beschwerden BAG"
      definition: "Beschwerden bei BAG gegen Groupe Mutuel"
      values:
        2024: 38
        2022: 45
        categories: ["Prämien", "Leistungen", "Service"]
      unit: "Beschwerden"
      source: "BAG"

    - id: "GM-REG-AUF-10"
      name: "Aufsichtskosten"
      definition: "Jährliche Kosten für Aufsichtsabgaben"
      values:
        2024: 4200000
        share_of_admin: 0.008
      unit: "CHF"
      source: "Groupe Mutuel Geschäftsbericht"

# ==============================================================================
# SUB-ACHSE: REG-KVG (KVG-Rahmen)
# ==============================================================================

REG-KVG:
  name: "KVG-Rahmen"
  description: "Krankenversicherungsgesetz und Verordnungen"
  factors: 10

  factors_list:
    - id: "GM-REG-KVG-01"
      name: "Prämienregulierung"
      definition: "Regulatorische Anforderungen an Prämiengestaltung"
      values:
        2024:
          approval: "BAG-Genehmigung erforderlich"
          deadline: "31. Juli für Folgejahr"
          constraints: ["Kostendeckung", "Keine Gewinnmarge OKP"]
      source: "KVG Art. 61"

    - id: "GM-REG-KVG-02"
      name: "Reservenvorschriften"
      definition: "Minimale Reserveanforderungen OKP"
      values:
        2024:
          minimum: 0.10
          target: 0.15
          gm_actual: 0.35
      unit: "Quote"
      source: "KVV Art. 78"

    - id: "GM-REG-KVG-03"
      name: "Risikoausgleich"
      definition: "Obligatorischer Risikoausgleich zwischen Versicherern"
      values:
        2024:
          gm_position: "Nettozahler"
          amount: -150000000
          factors: ["Alter", "Geschlecht", "Spitalaufenthalt Vorjahr", "Arzneimittelkosten"]
      unit: "CHF"
      source: "KVAG"

    - id: "GM-REG-KVG-04"
      name: "Leistungskatalog"
      definition: "Gesetzlich definierter Leistungsumfang OKP"
      values:
        2024:
          scope: "einheitlich für alle"
          updates: "kontinuierlich"
          recent_additions: ["Telemedizin", "Psychotherapie direkt"]
      source: "KLV"

    - id: "GM-REG-KVG-05"
      name: "Franchisen-System"
      definition: "Regulierte Franchise-Stufen"
      values:
        2024:
          adult: [300, 500, 1000, 1500, 2000, 2500]
          child: [0, 100, 200, 300, 400, 500, 600]
          selbstbehalt: 0.10
          max_selbstbehalt: 700
      source: "KVG Art. 64"

    - id: "GM-REG-KVG-06"
      name: "Aufnahmepflicht"
      definition: "Obligatorische Aufnahme aller Antragsteller OKP"
      values:
        2024:
          scope: "absolut"
          no_health_check: true
          no_exclusions: true
      source: "KVG Art. 4"

    - id: "GM-REG-KVG-07"
      name: "Wechselrecht"
      definition: "Kündigungsfristen und Wechselmöglichkeiten"
      values:
        2024:
          standard: "30.11. für Folgejahr"
          alternative: "31.03. bei Prämienerhöhung"
          no_penalty: true
      source: "KVG Art. 7"

    - id: "GM-REG-KVG-08"
      name: "Prämienverbilligung"
      definition: "Interaktion mit kantonaler Prämienverbilligung"
      values:
        2024:
          beneficiaries_gm: 380000
          share_of_insured: 0.17
          process: "kantonal unterschiedlich"
      source: "Groupe Mutuel Data"

    - id: "GM-REG-KVG-09"
      name: "Managed Care Regulierung"
      definition: "Gesetzlicher Rahmen für alternative Modelle"
      values:
        2024:
          allowed_models: ["HMO", "Hausarzt", "Telmed"]
          max_rabatt: 0.20
          requirements: ["Gatekeeping", "Qualitätssicherung"]
      source: "KVG Art. 41"

    - id: "GM-REG-KVG-10"
      name: "Datenaustausch"
      definition: "Regulierung elektronischer Datenaustausch"
      values:
        2024:
          standard: "Forum Datenaustausch"
          epdg_compliance: true
          implementation: "in progress"
      source: "KVG/EPDG"

# ==============================================================================
# SUB-ACHSE: REG-VVG (VVG-Rahmen)
# ==============================================================================

REG-VVG:
  name: "VVG-Rahmen"
  description: "Versicherungsvertragsgesetz für Zusatzversicherungen"
  factors: 10

  factors_list:
    - id: "GM-REG-VVG-01"
      name: "Produktgenehmigung"
      definition: "FINMA-Genehmigungspflicht für VVG-Produkte"
      values:
        2024:
          requirement: "Produktanzeige"
          review_time: "30 Tage"
          approval_rate: 0.98
      source: "FINMA"

    - id: "GM-REG-VVG-02"
      name: "Gesundheitsprüfung"
      definition: "Erlaubte Gesundheitsprüfung bei Zusatzversicherungen"
      values:
        2024:
          allowed: true
          methods: ["Fragebogen", "Ärztliche Untersuchung"]
          vorbehalte: "bis 5 Jahre"
      source: "VVG"

    - id: "GM-REG-VVG-03"
      name: "Kündigungsrecht VVG"
      definition: "Kündigungsbestimmungen Zusatzversicherungen"
      values:
        2024:
          versicherer_kuendigung: "möglich"
          schadenfall_kuendigung: true
          frist: "3 Monate"
      source: "VVG Art. 35"

    - id: "GM-REG-VVG-04"
      name: "Freizügigkeit VVG"
      definition: "Mitgaberecht bei Versichererwechsel"
      values:
        2024:
          spital_allgemein: true
          spital_privat: "eingeschränkt"
          alterungsrueckstellung: "nicht portabel"
      source: "VVG"

    - id: "GM-REG-VVG-05"
      name: "Prämiengestaltung VVG"
      definition: "Freiheiten bei Prämiengestaltung Zusatz"
      values:
        2024:
          risk_based: true
          age_factors: true
          gender_factors: "nicht mehr seit 2024"
          profit_allowed: true
      source: "VVG/FINMA"

    - id: "GM-REG-VVG-06"
      name: "Informationspflichten"
      definition: "Gesetzliche Informationspflichten gegenüber Kunden"
      values:
        2024:
          pre_contractual: ["AVB", "Produktinformation"]
          annual: ["Prämienanpassung", "Leistungsübersicht"]
          format: "schriftlich oder elektronisch"
      source: "VVG Art. 3"

    - id: "GM-REG-VVG-07"
      name: "Widerrufsrecht"
      definition: "Widerrufsrecht bei Neuabschlüssen"
      values:
        2024:
          period: 14
          unit: "Tage"
          scope: "Neuabschlüsse"
      source: "VVG Art. 2a"

    - id: "GM-REG-VVG-08"
      name: "Tarifanpassung"
      definition: "Regeln für Prämienanpassungen VVG"
      values:
        2024:
          unilateral: true
          notice_period: "30 Tage"
          extraordinary_termination: true
      source: "VVG"

    - id: "GM-REG-VVG-09"
      name: "Alterungsrückstellungen"
      definition: "Regulierung der Alterungsrückstellungen"
      values:
        2024:
          required: true
          minimum_rate: 0.02
          gm_rate: 0.035
      source: "FINMA-RS"

    - id: "GM-REG-VVG-10"
      name: "Vermittlerregulierung"
      definition: "Anforderungen an Versicherungsvermittler"
      values:
        2024:
          registration: "FINMA-Register"
          training: "Cicero-zertifiziert"
          commission_disclosure: "ab 2024"
      source: "VAG"

# ==============================================================================
# SUB-ACHSE: REG-COM (Compliance)
# ==============================================================================

REG-COM:
  name: "Compliance"
  description: "Interne Compliance-Organisation und -Prozesse"
  factors: 10

  factors_list:
    - id: "GM-REG-COM-01"
      name: "Compliance-Organisation"
      definition: "Struktur der Compliance-Funktion"
      values:
        2024:
          fte: 25
          reporting: "CEO/VR"
          independence: "vollständig"
      source: "Groupe Mutuel Governance"

    - id: "GM-REG-COM-02"
      name: "Compliance-Schulungen"
      definition: "Jährliche Compliance-Schulungen für Mitarbeitende"
      values:
        2024:
          mandatory: true
          completion_rate: 0.98
          topics: ["Datenschutz", "Geldwäscherei", "Marktverhalten"]
      source: "Groupe Mutuel HR"

    - id: "GM-REG-COM-03"
      name: "Whistleblowing"
      definition: "Whistleblowing-System und Nutzung"
      values:
        2024:
          system: "extern betrieben"
          reports_2024: 12
          substantiated: 3
      source: "Groupe Mutuel Compliance"

    - id: "GM-REG-COM-04"
      name: "Geldwäschereibekämpfung"
      definition: "AML-Compliance für Lebensversicherungen"
      values:
        2024:
          scope: "Lebensversicherung, Cash-Transaktionen"
          suspicious_reports: 2
          training: "jährlich"
      source: "GwG/FINMA"

    - id: "GM-REG-COM-05"
      name: "Interessenkonflikte"
      definition: "Management von Interessenkonflikten"
      values:
        2024:
          policy: true
          register: true
          reviews: "quartalsweise"
      source: "Groupe Mutuel Governance"

    - id: "GM-REG-COM-06"
      name: "Regulatory Change Management"
      definition: "Prozess zur Umsetzung regulatorischer Änderungen"
      values:
        2024:
          tracking_system: true
          changes_2024: 28
          implementation_rate: 1.0
      source: "Groupe Mutuel Compliance"

    - id: "GM-REG-COM-07"
      name: "Compliance-Monitoring"
      definition: "Laufende Compliance-Überwachung"
      values:
        2024:
          automated_controls: 45
          manual_controls: 32
          testing_frequency: "quartalsweise"
      source: "Groupe Mutuel Compliance"

    - id: "GM-REG-COM-08"
      name: "Third-Party Risk"
      definition: "Compliance-Anforderungen an Dritte"
      values:
        2024:
          vendor_assessments: 85
          high_risk_vendors: 12
          monitoring: "kontinuierlich"
      source: "Groupe Mutuel Procurement"

    - id: "GM-REG-COM-09"
      name: "Sanktionen-Screening"
      definition: "Prüfung gegen Sanktionslisten"
      values:
        2024:
          frequency: "täglich"
          lists: ["SECO", "EU", "UN", "OFAC"]
          hits_2024: 0
      source: "Groupe Mutuel Compliance"

    - id: "GM-REG-COM-10"
      name: "Compliance-Budget"
      definition: "Jährliches Budget für Compliance-Funktion"
      values:
        2024: 4800000
        share_of_admin: 0.009
        trend: "steigend"
      unit: "CHF"
      source: "Groupe Mutuel Finance"

# ==============================================================================
# SUB-ACHSE: REG-DSG (Datenschutz)
# ==============================================================================

REG-DSG:
  name: "Datenschutz"
  description: "Datenschutz und Datensicherheit"
  factors: 10

  factors_list:
    - id: "GM-REG-DSG-01"
      name: "DSG-Compliance"
      definition: "Compliance mit neuem Datenschutzgesetz (revDSG)"
      values:
        2024:
          status: "vollständig compliant"
          implementation: "September 2023"
          gaps: 0
      source: "Groupe Mutuel Legal"

    - id: "GM-REG-DSG-02"
      name: "Datenschutzbeauftragter"
      definition: "Datenschutzorganisation"
      values:
        2024:
          dpo: true
          reporting: "Geschäftsleitung"
          fte: 5
      source: "Groupe Mutuel Governance"

    - id: "GM-REG-DSG-03"
      name: "Bearbeitungsverzeichnis"
      definition: "Register der Datenbearbeitungen"
      values:
        2024:
          entries: 185
          last_update: "2024-Q3"
          automated: "teilweise"
      source: "Groupe Mutuel Legal"

    - id: "GM-REG-DSG-04"
      name: "Betroffenenrechte"
      definition: "Anfragen zur Auskunft, Löschung, etc."
      values:
        2024: 1250
        2022: 980
        response_time_days: 18
        target: 30
      unit: "Anfragen"
      trend: "steigend"
      source: "Groupe Mutuel Legal"

    - id: "GM-REG-DSG-05"
      name: "Datenschutz-Vorfälle"
      definition: "Meldepflichtige Datenschutzvorfälle"
      values:
        2024: 3
        2022: 2
        severity: "gering"
        edoeb_meldungen: 2
      unit: "Vorfälle"
      source: "Groupe Mutuel IT Security"

    - id: "GM-REG-DSG-06"
      name: "Privacy by Design"
      definition: "Integration Datenschutz in Entwicklung"
      values:
        2024:
          mandatory: true
          pia_durchgeführt: 12
          projects_reviewed: 0.95
      source: "Groupe Mutuel IT"

    - id: "GM-REG-DSG-07"
      name: "Datenübermittlung Ausland"
      definition: "Grenzüberschreitende Datentransfers"
      values:
        2024:
          countries: ["EU", "USA"]
          safeguards: ["SCC", "Angemessenheit EU"]
          cloud_provider: "CH/EU located"
      source: "Groupe Mutuel Legal"

    - id: "GM-REG-DSG-08"
      name: "Aufbewahrungsfristen"
      definition: "Datenlöschung nach Ablauf"
      values:
        2024:
          policy: true
          categories: 25
          automated_deletion: "teilweise"
      source: "Groupe Mutuel Legal"

    - id: "GM-REG-DSG-09"
      name: "Einwilligungsmanagement"
      definition: "Consent Management für Marketing"
      values:
        2024:
          system: "implementiert"
          opt_in_rate: 0.42
          granular_consent: true
      source: "Groupe Mutuel Marketing"

    - id: "GM-REG-DSG-10"
      name: "Datensicherheit"
      definition: "Technische und organisatorische Massnahmen"
      values:
        2024:
          encryption: "AES-256"
          access_control: "RBAC"
          certifications: ["ISO 27001"]
          penetration_tests: 2
      source: "Groupe Mutuel IT Security"

