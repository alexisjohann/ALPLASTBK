summary:
  description: |
    Groupe Mutuel ist der grösste Krankenversicherer der Schweiz mit
    rund 2.2 Millionen Versicherten. Die Holding mit Sitz in Martigny
    vereint 6 Marken und bedient alle Marktsegmente von Premium bis
    Low-Cost. Besonders stark in der Romandie, expandiert GM in die
    Deutschschweiz.
