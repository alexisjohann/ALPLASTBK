# ORF Unternehmenskontextvektor: Master-Übersicht
# Version: 1.0
# Quelle: FehrAdvice Unternehmenskontextvektor-Architektur 2026
# Letzte Aktualisierung: 2026-01-28
# EBF-Relevanz: Alle Psi-Dimensionen für öffentlich-rechtlichen Rundfunk

metadata:
  name: "ORF Unternehmenskontextvektor Master-Übersicht"
  code: "BCM2_ORG_ORF"
  version: "1.0"
  total_factors: 400
  sub_axes: 40
  main_axes: 8
  description: "Vollständige Faktorenstruktur für Unternehmenskontext ORF 2024-2030"
  quantitative_coverage: "100% - alle 400 Faktoren mit Zeitreihen/Zielwerten"
  template_source: "BCM2_04_KON (Österreichischer Kontextvektor)"
  organization_type: "public_broadcasting"
  country: "AT"
  legal_form: "Stiftung des öffentlichen Rechts"

# =============================================================================
# ORGANISATIONSPROFIL
# =============================================================================
organization_profile:
  full_name: "Österreichischer Rundfunk"
  short_name: "ORF"
  founded: 1955
  legal_basis: "ORF-Gesetz (ORF-G)"
  headquarters: "Wien, Küniglberg"
  regulatory_authority: "KommAustria / RTR-GmbH"
  public_mandate: "Öffentlich-rechtlicher Rundfunk gemäss ORF-Gesetz"

  channels:
    tv:
      - "ORF 1"
      - "ORF 2"
      - "ORF III"
      - "ORF Sport +"
    radio:
      - "Ö1"
      - "Ö3"
      - "FM4"
      - "9 Regionalradios"
    digital:
      - "ORF.at"
      - "ORF TVthek"
      - "ORF Sound"
      - "ORF ON"

# =============================================================================
# DATENQUELLEN-ÜBERSICHT
# =============================================================================
data_sources:
  summary:
    primary_sources: 10
    secondary_sources: 15
    internal_systems: 12
    time_horizon: "2020-2030"
    update_frequency: "quarterly"

  primary_internal:
    - name: "ORF Geschäftsberichte"
      coverage: "Finanzen, Strategie, Governance"
      factors_covered: 100

    - name: "ORF Publikumsforschung"
      coverage: "Reichweiten, Marktanteile, Nutzungsverhalten"
      factors_covered: 60

    - name: "ORF HR-Systeme"
      coverage: "Mitarbeiter, Kultur, Entwicklung"
      factors_covered: 80

    - name: "ORF Programmplanung"
      coverage: "Content, Produktion, Lizenzen"
      factors_covered: 40

    - name: "ORF Technik"
      coverage: "Broadcast, Digital, Infrastruktur"
      factors_covered: 40

  primary_external:
    - name: "RTR-GmbH (Rundfunk und Telekom Regulierungs-GmbH)"
      url: "https://www.rtr.at"
      coverage: "Regulierung, Marktdaten, Compliance"
      factors_covered: 30

    - name: "KommAustria"
      url: "https://www.kommaustria.at"
      coverage: "Aufsicht, Beschwerden, Lizenzen"
      factors_covered: 15

    - name: "GIS Gebühren Info Service"
      url: "https://www.gis.at"
      coverage: "Gebühreneinnahmen, Haushalte"
      factors_covered: 10

    - name: "Statistik Austria"
      url: "https://www.statistik.at"
      coverage: "Demografie, Wirtschaft, Mediennutzung"
      factors_covered: 40

    - name: "AGTT (Arbeitsgemeinschaft Teletest)"
      url: "https://www.agtt.at"
      coverage: "TV-Reichweiten, Marktanteile"
      factors_covered: 25

  secondary:
    - name: "Mediaanalyse (MA)"
    - name: "Radiotest"
    - name: "ÖWA (Österreichische Webanalyse)"
    - name: "EBU (European Broadcasting Union)"
    - name: "Medienberichte (Der Standard, Kurier, Presse)"
    - name: "Rechnungshof-Berichte"
    - name: "Parlamentarische Anfragen"
    - name: "SORA Institute"

# =============================================================================
# Gesamtübersicht: 8 Hauptachsen × 40 Unterachsen = 400 Faktoren
# =============================================================================
overview:
  total_factors: 400
  total_sub_axes: 40
  quantitative_status: "100% vollständig"

  main_axes:
    - name: "Finanzen & Performance"
      code: "FIN"
      factors: 80
      percentage: 20
      sub_axes: 8
      description: "Gebühreneinnahmen, Werbung, Kosten, Investitionen, Bilanz"
      data_coverage: "Geschäftsberichte, GIS, RTR"

    - name: "Publikum & Wettbewerb"
      code: "MKT"
      factors: 60
      percentage: 15
      sub_axes: 6
      description: "Reichweiten, Marktanteile, Zielgruppen, Konkurrenz, Streaming"
      data_coverage: "AGTT, Mediaanalyse, Radiotest, ÖWA"

    - name: "Organisation & Governance"
      code: "ORG"
      factors: 50
      percentage: 12.5
      sub_axes: 5
      description: "Stiftungsrat, Geschäftsführung, Gremien, Prozesse, Compliance"
      data_coverage: "Corporate Governance Report, ORF-Gesetz"

    - name: "Strategie & Transformation"
      code: "STR"
      factors: 40
      percentage: 10
      sub_axes: 4
      description: "ORF-Player Strategie, Digitalisierung, Content-Strategie, Innovation"
      data_coverage: "Strategiepapiere, ORF 2030"

    - name: "Menschen & Kultur"
      code: "PEO"
      factors: 80
      percentage: 20
      sub_axes: 8
      description: "Mitarbeiter, Journalisten, Kreative, Kultur, Führung, Diversität"
      data_coverage: "HR-Systeme, Mitarbeiterbefragungen, Redaktionsstatut"

    - name: "Technologie & Broadcast"
      code: "TEC"
      factors: 40
      percentage: 10
      sub_axes: 4
      description: "Sendeanlagen, Studios, Digital-Plattformen, Archive, KI"
      data_coverage: "ORF Technik, IT-Systeme"

    - name: "Risiko & Compliance"
      code: "RIS"
      factors: 30
      percentage: 7.5
      sub_axes: 3
      description: "Regulierung, Medienrecht, Content-Risiken, Operationell"
      data_coverage: "KommAustria, Rechnungshof, Interne Revision"

    - name: "Stakeholder & Reputation"
      code: "STK"
      factors: 20
      percentage: 5
      sub_axes: 2
      description: "Politik, Publikum, Medienkritik, Vertrauen, Legitimität"
      data_coverage: "SORA, Medienanalysen, Beschwerden"

# =============================================================================
# Detailstruktur nach Hauptachse
# =============================================================================
structure:
  # ---------------------------------------------------------------------------
  # FINANZEN & PERFORMANCE (FIN) - 80 Faktoren
  # ---------------------------------------------------------------------------
  FIN:
    name: "Finanzen & Performance"
    total_factors: 80
    function: "Finanzielle Basis und Ressourcenallokation"
    sub_axes:
      - code: FIN-GEB
        name: "Gebühreneinnahmen"
        description: "ORF-Beitrag, GIS, Haushalte"
        factors: 12

      - code: FIN-WER
        name: "Werbung & Sponsoring"
        description: "TV-Werbung, Radio-Werbung, Online, Sponsoring"
        factors: 12

      - code: FIN-SON
        name: "Sonstige Erträge"
        description: "Lizenzen, Koproduktionen, Archiv, Veranstaltungen"
        factors: 8

      - code: FIN-KOS
        name: "Kostenlage"
        description: "Personal, Programm, Technik, Verwaltung"
        factors: 15

      - code: FIN-INV
        name: "Investitionen"
        description: "Technik, Digitalisierung, Infrastruktur"
        factors: 10

      - code: FIN-BIL
        name: "Bilanzstruktur"
        description: "Aktiva, Passiva, Rückstellungen"
        factors: 10

      - code: FIN-PRO
        name: "Programmkosten"
        description: "Eigenproduktion, Lizenzen, Rechte, Sport"
        factors: 8

      - code: FIN-EFF
        name: "Effizienz"
        description: "Kosten pro Minute, Reichweitenkosten"
        factors: 5

  # ---------------------------------------------------------------------------
  # PUBLIKUM & WETTBEWERB (MKT) - 60 Faktoren
  # ---------------------------------------------------------------------------
  MKT:
    name: "Publikum & Wettbewerb"
    total_factors: 60
    function: "Reichweiten, Marktposition und Publikumsbindung"
    sub_axes:
      - code: MKT-TVR
        name: "TV-Reichweiten"
        description: "Tagesreichweite, Marktanteil, Prime Time"
        factors: 12

      - code: MKT-RAD
        name: "Radio-Reichweiten"
        description: "Tagesreichweite, Marktanteil nach Sender"
        factors: 10

      - code: MKT-DIG
        name: "Digital-Nutzung"
        description: "ORF.at, TVthek, ORF ON, Apps"
        factors: 12

      - code: MKT-ZGR
        name: "Zielgruppen"
        description: "Altersverteilung, Bildung, Regionen"
        factors: 10

      - code: MKT-WET
        name: "Wettbewerber"
        description: "ServusTV, Puls4, ATV, Streaming"
        factors: 10

      - code: MKT-BIN
        name: "Publikumsbindung"
        description: "Sehdauer, Loyalty, Cross-Platform"
        factors: 6

  # ---------------------------------------------------------------------------
  # ORGANISATION & GOVERNANCE (ORG) - 50 Faktoren
  # ---------------------------------------------------------------------------
  ORG:
    name: "Organisation & Governance"
    total_factors: 50
    function: "Steuerung, Aufsicht und Struktur"
    sub_axes:
      - code: ORG-GOV
        name: "Governance-Struktur"
        description: "Stiftungsrat, Publikumsrat, Geschäftsführung"
        factors: 12

      - code: ORG-STR
        name: "Organisationsstruktur"
        description: "Direktionen, Hauptabteilungen, Landesstudios"
        factors: 10

      - code: ORG-PRO
        name: "Prozesse"
        description: "Programmplanung, Produktion, Entscheidungswege"
        factors: 12

      - code: ORG-RED
        name: "Redaktionelle Unabhängigkeit"
        description: "Redaktionsstatut, Selbstkontrolle, Ombudsmann"
        factors: 8

      - code: ORG-COM
        name: "Compliance & Kontrolle"
        description: "Interne Revision, Rechnungshof, KommAustria"
        factors: 8

  # ---------------------------------------------------------------------------
  # STRATEGIE & TRANSFORMATION (STR) - 40 Faktoren
  # ---------------------------------------------------------------------------
  STR:
    name: "Strategie & Transformation"
    total_factors: 40
    function: "Strategische Ausrichtung und Wandlungsfähigkeit"
    sub_axes:
      - code: STR-VIS
        name: "Vision & Positionierung"
        description: "ORF 2030, Public Value, Differenzierung"
        factors: 8

      - code: STR-DIG
        name: "Digitale Transformation"
        description: "ORF ON, Streaming-Strategie, Player"
        factors: 12

      - code: STR-CON
        name: "Content-Strategie"
        description: "Programmstrategie, Genres, Eigenproduktion"
        factors: 12

      - code: STR-INN
        name: "Innovation"
        description: "Neue Formate, KI, Technologie-Experimente"
        factors: 8

  # ---------------------------------------------------------------------------
  # MENSCHEN & KULTUR (PEO) - 80 Faktoren
  # ---------------------------------------------------------------------------
  PEO:
    name: "Menschen & Kultur"
    total_factors: 80
    function: "Humankapital und Organisationskultur"
    sub_axes:
      - code: PEO-BES
        name: "Personalbestand"
        description: "Headcount, FTE, Struktur nach Bereichen"
        factors: 12

      - code: PEO-JOU
        name: "Journalismus"
        description: "Redakteure, Reporter, Korrespondenten"
        factors: 10

      - code: PEO-KRE
        name: "Kreative & Produktion"
        description: "Regisseure, Kameraleute, Cutter, Techniker"
        factors: 10

      - code: PEO-FLU
        name: "Fluktuation & Rekrutierung"
        description: "Kündigungen, Neueinstellungen, Talentmarkt"
        factors: 10

      - code: PEO-ENG
        name: "Engagement & Zufriedenheit"
        description: "Mitarbeiterzufriedenheit, eNPS, Stimmung"
        factors: 10

      - code: PEO-KUL
        name: "Unternehmenskultur"
        description: "Werte, Normen, Zusammenarbeit"
        factors: 10

      - code: PEO-FUE
        name: "Führung"
        description: "Führungsqualität, Entscheidungsstile"
        factors: 8

      - code: PEO-DIV
        name: "Diversität"
        description: "Gender, Alter, Herkunft, Inklusion"
        factors: 10

  # ---------------------------------------------------------------------------
  # TECHNOLOGIE & BROADCAST (TEC) - 40 Faktoren
  # ---------------------------------------------------------------------------
  TEC:
    name: "Technologie & Broadcast"
    total_factors: 40
    function: "Technische Infrastruktur und Digitalisierung"
    sub_axes:
      - code: TEC-BRO
        name: "Broadcast-Infrastruktur"
        description: "Sendeanlagen, DVB-T2, DAB+, Satellit"
        factors: 10

      - code: TEC-STU
        name: "Studios & Produktion"
        description: "Küniglberg, Landesstudios, Mobile Units"
        factors: 10

      - code: TEC-DIG
        name: "Digital-Plattformen"
        description: "ORF ON, TVthek, Apps, CMS"
        factors: 12

      - code: TEC-ARC
        name: "Archive & KI"
        description: "Digitalisierung, MAM, KI-Anwendungen"
        factors: 8

  # ---------------------------------------------------------------------------
  # RISIKO & COMPLIANCE (RIS) - 30 Faktoren
  # ---------------------------------------------------------------------------
  RIS:
    name: "Risiko & Compliance"
    total_factors: 30
    function: "Risikomanagement und regulatorische Compliance"
    sub_axes:
      - code: RIS-REG
        name: "Regulierung"
        description: "ORF-Gesetz, Medienrecht, EU-Richtlinien"
        factors: 12

      - code: RIS-CON
        name: "Content-Risiken"
        description: "Beschwerden, Klagen, Gegendarstellungen"
        factors: 10

      - code: RIS-OPR
        name: "Operationelle Risiken"
        description: "Sendeausfälle, Cybersecurity, Datenschutz"
        factors: 8

  # ---------------------------------------------------------------------------
  # STAKEHOLDER & REPUTATION (STK) - 20 Faktoren
  # ---------------------------------------------------------------------------
  STK:
    name: "Stakeholder & Reputation"
    total_factors: 20
    function: "Beziehungen zu Anspruchsgruppen und öffentliche Wahrnehmung"
    sub_axes:
      - code: STK-POL
        name: "Politik & Öffentlichkeit"
        description: "Regierung, Parlament, Parteien, Legitimität"
        factors: 10

      - code: STK-REP
        name: "Reputation & Vertrauen"
        description: "Medienvertrauen, Image, Glaubwürdigkeit"
        factors: 10

# =============================================================================
# Systemische Kopplung
# =============================================================================
systemic_coupling:
  diagram: |
    FIN ──► MKT ──► STK
     │       │       │
     └───────┼───────┘
             │
             ▼
           PEO ◄── TEC ◄── STR
             │
             ▼
           ORG ◄── RIS

  description: |
    - Finanzielle Ressourcen (FIN) ermöglichen Programmqualität (MKT) und Reputation (STK)
    - Strategie (STR) transformiert über Technologie (TEC) und Menschen (PEO)
    - Organisation (ORG) und Regulierung (RIS) sind Enabler und Constraints
    - Menschen & Kultur (PEO) ist die zentrale Transformationsachse
    - Öffentliches Vertrauen (STK) legitimiert Gebührenfinanzierung (FIN)

