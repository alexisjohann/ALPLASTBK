# =============================================================================
# Ψ-DIMENSIONEN (8 Faktoren)
# =============================================================================
psi_dimensions:

  psi_I_institutional:
    value: 0.75
    label: "Institutionell"
    description: |
      Stark regulierter Markt mit Zertifizierungsanforderungen.
      LBMA-Standards, Schweizer Qualitätssiegel, Zollvorschriften.
      Geldwäscheprävention (KYC) bei grösseren Transaktionen.
    key_factors:
      - "LBMA Good Delivery Standard"
      - "Schweizer Prägungen (höchste Akzeptanz)"
      - "KYC/AML bei Transaktionen >10k EUR"
      - "Zollfreie Lager (Schweiz, Liechtenstein)"
    ebf_kappa: "kappa_INST"

  psi_S_social:
    value: 0.55
    label: "Sozial"
    description: |
      Edelmetallkauf oft durch Familientradition geprägt.
      Vererbung als wichtiges Motiv. Status-Komponente bei
      physischem Gold. Empfehlungen im sozialen Umfeld relevant.
    key_factors:
      - "Generationenübergreifende Weitergabe"
      - "Status-Symbol (physisches Gold)"
      - "Empfehlungsmarketing wichtig"
      - "Vertrauen in etablierte Händler"
    ebf_kappa: "kappa_SOCIAL"

  psi_C_cognitive:
    value: 0.60
    label: "Kognitiv"
    description: |
      Mittlere Komplexität: Preisbildung transparent (Spotpreis),
      aber Produktvielfalt (Barren, Münzen, Legierungen) und
      Lageroptionen erfordern Beratung.
    key_factors:
      - "Spotpreis als Referenz (transparent)"
      - "Aufgeld-Vergleiche komplex"
      - "Lageroptionen (Heimlager vs. Bankschliessfach vs. Zollfrei)"
      - "Steuerliche Aspekte (MWST auf Silber)"
    ebf_kappa: "kappa_COG"

  psi_K_cultural:
    value: 0.70
    label: "Kulturell"
    description: |
      Starke kulturelle Verankerung von Gold als "sicherer Hafen".
      DACH-Region mit hoher Affinität zu physischem Gold.
      Misstrauen gegenüber Papiergeld historisch verankert.
    key_factors:
      - "Gold als Krisenwährung (kulturell verankert)"
      - "DACH: Höchste Pro-Kopf-Goldnachfrage weltweit"
      - "Misstrauen gegenüber Zentralbanken/Inflation"
      - "Tradition physischer Wertaufbewahrung"
    ebf_kappa: "kappa_CULT"

  psi_E_economic:
    value: 0.75
    label: "Ökonomisch"
    description: |
      Edelmetallkunden tendenziell vermögend oder sparorientiert.
      Kaufentscheidungen stark von Goldpreis und Wirtschaftslage
      abhängig. Krisenzeiten = erhöhte Nachfrage.
    key_factors:
      - "Zielgruppe: Vermögende und Sicherheitsorientierte"
      - "Korrelation mit Unsicherheit (Krisen, Inflation)"
      - "Durchschnittlicher Kaufbetrag: 5-50k EUR"
      - "Wiederholungskäufe bei Stammkunden"
    ebf_kappa: "kappa_ECON"

  psi_T_temporal:
    value: 0.85
    label: "Temporal"
    description: |
      Extrem langfristiger Zeithorizont. Gold als Generationen-Asset.
      Kaufentscheidungen oft antizyklisch (bei Krisen).
      Timing des Kaufs wichtiger als bei anderen Assets.
    key_factors:
      - "Generationen-Perspektive (20-50+ Jahre)"
      - "Antizyklisches Kaufverhalten"
      - "Timing-Sensitivität (Spotpreis-Beobachtung)"
      - "Kein kurzfristiger Handel (Buy & Hold)"
    ebf_kappa: "kappa_TEMP"

  psi_M_material:
    value: 0.65
    label: "Materiell"
    description: |
      Hybrid-Modell: Online-Shop + 17 Filialen. Eigene Produktion
      (Goldwerk) als USP. Physische Auslieferung oder Lagerung.
    key_factors:
      - "Online-Shop mit Preisalarm-Funktion"
      - "17 Filialen für persönliche Beratung"
      - "Eigene Barrenproduktion (Goldwerk)"
      - "Zollfreie Lageroptionen"
    ebf_kappa: "kappa_MAT"

  psi_F_physical:
    value: 0.60
    label: "Physisch"
    description: |
      Ca. 60% Online-Käufe, 40% Filialbesuche. Bei Erstkäufen
      und grossen Beträgen Präferenz für persönlichen Kontakt.
    key_factors:
      - "Erstkauf oft in Filiale (Vertrauensaufbau)"
      - "Wiederholungskäufe vermehrt online"
      - "Grosskunden: Persönliche Betreuung"
      - "Abholung in Filiale beliebt"
    ebf_kappa: "kappa_PHYS"

# =============================================================================
# KUNDENSEGMENTE (4 Segmente)
# =============================================================================
customer_segments:

  - id: "SEG-01"
    name: "Sicherheitsorientierte Sparer"
    description: |
      Mittelstand, 45-65 Jahre, kauft Gold als Krisenvorsorge.
      Regelmässige kleinere Käufe (1-10 Unzen/Jahr).
    share: 0.40

    behavioral_parameters:
      lambda_loss_aversion: 2.80
      beta_present_bias: 0.95
      kappa_default_sensitivity: 0.70
      sigma_social_proof: 0.55

    key_drivers:
      - "Inflationsangst"
      - "Misstrauen gegenüber Banken"
      - "Vererbungsabsicht"

    intervention_affinity:
      high: ["Preisalarme", "Sparplan-Defaults", "Inflations-Framing"]
      medium: ["Testimonials", "Expertenmeinungen"]
      low: ["Aggressive Verkaufstaktiken"]

  - id: "SEG-02"
    name: "Vermögende Diversifizierer"
    description: |
      High-Net-Worth Individuals, 50-70 Jahre, Gold als
      Portfolio-Beimischung (5-15% des Vermögens).
    share: 0.25

    behavioral_parameters:
      lambda_loss_aversion: 2.20
      beta_present_bias: 0.90
      kappa_default_sensitivity: 0.55
      sigma_social_proof: 0.40

    key_drivers:
      - "Portfolio-Diversifikation"
      - "Steueroptimierung"
      - "Diskrete Vermögenssicherung"

    intervention_affinity:
      high: ["Persönliche Beratung", "Zollfreie Lagerung", "White Glove Service"]
      medium: ["Marktanalysen", "Timing-Empfehlungen"]
      low: ["Standard-Marketing", "Massen-Kommunikation"]

  - id: "SEG-03"
    name: "Junge Digitalanleger"
    description: |
      25-40 Jahre, digital-affin, Gold als Alternative zu Crypto.
      Kleinere Beträge, hohe Frequenz, preissensitiv.
    share: 0.20

    behavioral_parameters:
      lambda_loss_aversion: 2.00
      beta_present_bias: 0.75
      kappa_default_sensitivity: 0.80
      sigma_social_proof: 0.70

    key_drivers:
      - "Alternative zu Crypto/Aktien"
      - "Einfacher Online-Kauf"
      - "Transparente Preise"

    intervention_affinity:
      high: ["App-basierte Nudges", "Social Proof", "Gamification"]
      medium: ["Preisalarme", "Vergleichstools"]
      low: ["Persönliche Beratung", "Tradition-Framing"]

  - id: "SEG-04"
    name: "Sammler & Numismatiker"
    description: |
      Münzsammler, Fokus auf Raritäten und Sonderprägungen.
      Emotional getrieben, weniger preissensitiv.
    share: 0.15

    behavioral_parameters:
      lambda_loss_aversion: 1.80
      beta_present_bias: 0.85
      kappa_default_sensitivity: 0.45
      sigma_social_proof: 0.50

    key_drivers:
      - "Sammlerleidenschaft"
      - "Ästhetik & Geschichte"
      - "Community-Zugehörigkeit"

    intervention_affinity:
      high: ["Exklusivität", "Limited Editions", "Vorbestellungen"]
      medium: ["Expertenwissen", "Sammlertreffen"]
      low: ["Preisargumente", "Rendite-Framing"]

# =============================================================================
# AGGREGIERTE VERHALTENSPARAMETER
# =============================================================================
behavioral_parameters_aggregate:

  core_parameters:
    loss_aversion:
      symbol: "λ"
      value: 2.45
      range: [1.80, 2.80]
      source: "Segment-gewichteter Durchschnitt"
      note: |
        Überdurchschnittlich hoch (Benchmark: 2.25).
        Edelmetallkunden sind stark verlustavers -
        erklärt die Präferenz für physisches Gold.

    present_bias:
      symbol: "β"
      value: 0.88
      range: [0.75, 0.95]
      source: "Segment-gewichteter Durchschnitt"
      note: |
        Relativ niedrig (langfristig orientiert).
        Edelmetallanleger denken in Generationen.

    default_sensitivity:
      symbol: "κ_default"
      value: 0.68
      range: [0.45, 0.80]
      source: "Segment-gewichteter Durchschnitt"
      note: |
        Moderat. Sparpläne als Default könnten
        Kauffrequenz signifikant erhöhen.

    social_proof:
      symbol: "σ_social"
      value: 0.55
      range: [0.40, 0.70]
      source: "Segment-gewichteter Durchschnitt"
      note: |
        Moderat. Testimonials wirken,
        aber "Mainstream" zu werden ist Risiko.

  domain_specific_parameters:
    safe_haven_bias:
      symbol: "η_safe"
      value: 0.78
      description: "Präferenz für Gold in Krisenzeiten"
      source: "LLMMC Prior basierend auf Baur & Lucey (2010)"

    tangibility_premium:
      symbol: "τ_tangible"
      value: 0.65
      description: "Aufpreis-Akzeptanz für physisches vs. Papier-Gold"
      source: "LLMMC Prior basierend auf philoro Marktdaten"

    inflation_sensitivity:
      symbol: "ι_inflation"
      value: 0.72
      description: "Kaufbereitschaft bei Inflationserwartungen"
      source: "LLMMC Prior basierend auf WGC Reports"

# =============================================================================
# STRATEGISCHE IMPLIKATIONEN
# =============================================================================
strategic_implications:

  top_3_opportunities:
    - dimension: "WHEN"
      opportunity: |
        Timing-basierte Interventionen: Preisalarme,
        Krisenindikator-basierte Kommunikation.
      intervention_type: "Salience + Framing"
      expected_lift: "+15-25% Conversion bei Trigger-Events"

    - dimension: "AWARE"
      opportunity: |
        Transparenz als Trust-Builder: Aufgeld-Vergleich,
        Preishistorie, Echtzeit-Spotpreis-Integration.
      intervention_type: "Information Salience"
      expected_lift: "+10-15% Erstkundenkonversion"

    - dimension: "HOW"
      opportunity: |
        Sparplan-Defaults: Regelmässige Käufe als
        Standard-Option statt Einmalkauf.
      intervention_type: "Choice Architecture (Defaults)"
      expected_lift: "+30-50% Kundenlebenswert"

  top_3_risks:
    - risk: |
        "Mainstream-Risiko": Wenn Gold zu populär wird,
        verliert es für Kernzielgruppe den Exklusivitätswert.
      mitigation: |
        Segmentierte Kommunikation. Premium-Segment
        separat ansprechen. Exklusivitäts-Cues erhalten.

    - risk: |
        Preisvolatilität: Starke Preisschwankungen können
        zu Vertrauensverlust führen (trotz Buy & Hold Mentalität).
      mitigation: |
        Langfrist-Framing verstärken. Historische Charts
        über 50+ Jahre zeigen. "Generationen-Perspektive" betonen.

    - risk: |
        Digitale Disruption: Crypto, Gold-ETFs, Neobroker
        als Konkurrenz für jüngere Zielgruppen.
      mitigation: |
        Hybrid-Strategie: Digital + Physisch kombinieren.
        USP "Echtes Gold, nicht nur Zahlen" betonen.

  recommended_next_step: |
    EMPFEHLUNG: Upgrade auf STANDARD-Kontextvektor

    Für ein vollständiges Interventions-Design benötigen wir:
    1. Kundendaten-Analyse (Segmentgrößen validieren)
    2. Journey-Mapping (Touchpoints identifizieren)
    3. A/B-Test-Infrastruktur für Nudge-Validierung

    Geschätzter Aufwand: 1-2 Beratertage
    ROI-Potential: +15-25% Conversion, +30% CLV

