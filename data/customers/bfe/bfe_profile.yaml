ebf_integration:
  # 10C Mapping für BFE
  who:
    primary: ["Hausbesitzer", "STWE", "MFH-Verwaltungen"]
    secondary: ["Mieter", "Installateure", "Kantone"]

  what:
    utility_dimensions:
      - "u_F: Finanzielle Kosten/Einsparungen"
      - "u_E: Umwelt/Klima-Bewusstsein"
      - "u_P: Komfort/Wärme"
      - "u_S: Soziale Normen/Nachbarschaft"

  when:
    critical_moments:
      - "Heizungsdefekt (55% aller Ersetzungen)"
      - "Hauskauf/-verkauf"
      - "Grosse Renovation"
      - "Ablauf Förderfristen"

  where:
    psi_dimensions:
      - "kappa_INST: Förderung, Gesetze"
      - "kappa_ARCH: Defaults, Opt-out"
      - "kappa_SOCIAL: Nachbarschaftsnormen"
      - "kappa_AWX: Information, Bewusstsein"

  # Attitudinale Segmente (aus ECHfP Marketingkonzept 1.0)
  attitudinal_segments:
    - segment_id: "SEG_RATLOS"
      name: "Die Ratlosen"
      share: 0.42
      barrier_type: "Orientierungs-Barriere"
      psi_dominant: [kappa_KOG, kappa_INST]
      key_intervention: "Handlungsarchitektur, Step-by-Step Guides"

    - segment_id: "SEG_UEBERZEUGT"
      name: "Die Überzeugten"
      share: 0.23
      barrier_type: "Kontext-Barriere"
      psi_dominant: [kappa_INST, kappa_SOCIAL]
      key_intervention: "Prozessvereinfachung, Peer-Netzwerke"

    - segment_id: "SEG_SKEPTISCH"
      name: "Die Skeptischen"
      share: 0.20
      barrier_type: "Vertrauens-Barriere"
      psi_dominant: [kappa_FRM, kappa_INST]
      key_intervention: "ROI-Belege, Testimonials, Garantien"

notes: |
  - Hauptprojekt 2026: Wirkungsmessung ECHfP (Energie Schweiz für Private)
  - Vorgänger-Programm: «erneuerbar heizen» (2021-2025), abgelöst durch ECHfP
  - ECHfP = ganzheitliche Marketing-Plattform unter Dachmarke EnergieSchweiz
  - 5 Module: Gesamtmodernisierung, Heizung, Gebäudehülle, Solar, E-Mobilität
  - 3 Zielsegmente: Ratlos (42%), Überzeugt (23%), Skeptisch (20%)
  - Kritische Erkenntnis: 55% der Heizungsersetzungen sind Notfälle (nur 2-4 Wochen Window)
  - Installateur ist Haupthebel bei Notfall-Ersetzungen
  - Evaluation: FehrAdvice mit BEATRIX KI-Tool, halbjährlich 2026/27
  - Learning Loop mit BCM2 Kontextdatenbank aktiv
  - Budget: 800K (2025), 2.48M (2026), 2.39M (2027), 2.07M (2028)
