  headquarters: "Bern, Schweiz"
  website: "https://www.bfe.admin.ch"

  description: |
    Das Bundesamt für Energie (BFE) ist das Kompetenzzentrum des Bundes für Fragen
    der Energieversorgung und Energienutzung. Es ist Teil des Eidgenössischen
    Departements für Umwelt, Verkehr, Energie und Kommunikation (UVEK).

    Hauptaufgaben:
    - Energiepolitik entwickeln und umsetzen
    - Energieversorgungssicherheit gewährleisten
    - Energieeffizienz fördern
    - Erneuerbare Energien ausbauen
    - Atomaufsicht (via ENSI)

  organization:
    type: "government_agency"
    parent: "UVEK"
    employees: "~300"
    budget: "CHF 1.2 Mrd (inkl. Fördermittel)"

