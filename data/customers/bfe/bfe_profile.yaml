behavioral_parameters:
  # Aggregierte Parameter aus Projekten
  primary_segments:
    - segment_id: "SEG_EFH"
      name: "Einfamilienhaus-Eigentümer"
      beta: 0.72
      lambda: 2.35
      theta: 0.45
      w_base: 0.38

    - segment_id: "SEG_MFH"
      name: "Mehrfamilienhaus-Eigentümer"
      beta: 0.78
      lambda: 2.15
      theta: 0.52
      w_base: 0.42

    - segment_id: "SEG_STWE"
      name: "Stockwerkeigentümer"
      beta: 0.68
      lambda: 2.45
      theta: 0.62
      w_base: 0.28

    - segment_id: "SEG_MIETER"
      name: "Mieter"
      beta: 0.82
      lambda: 2.05
      theta: 0.38
      w_base: 0.52

  context_multipliers:
    emergency_replacement: 1.8   # Bei Heizungsdefekt
    planned_renovation: 1.2     # Geplante Sanierung
    neighbor_switched: 1.4      # Nachbar hat gewechselt
    installer_recommendation: 1.6  # Installateur empfiehlt

ebf_integration:
  # 10C Mapping für BFE
  who:
    primary: ["Hausbesitzer", "STWE", "MFH-Verwaltungen"]
    secondary: ["Mieter", "Installateure", "Kantone"]

  what:
    utility_dimensions:
      - "u_F: Finanzielle Kosten/Einsparungen"
      - "u_E: Umwelt/Klima-Bewusstsein"
      - "u_P: Komfort/Wärme"
      - "u_S: Soziale Normen/Nachbarschaft"

  when:
    critical_moments:
      - "Heizungsdefekt (55% aller Ersetzungen)"
      - "Hauskauf/-verkauf"
      - "Grosse Renovation"
      - "Ablauf Förderfristen"

  where:
    psi_dimensions:
      - "kappa_INST: Förderung, Gesetze"
      - "kappa_ARCH: Defaults, Opt-out"
      - "kappa_SOCIAL: Nachbarschaftsnormen"
      - "kappa_AWX: Information, Bewusstsein"

