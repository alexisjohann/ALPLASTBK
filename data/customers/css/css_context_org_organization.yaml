metadata:
  axis_code: "ORG"
  axis_name: "Organization & Culture"
  axis_name_de: "Organisation & Kultur"
  layer: "MESO"
  version: "1.0.0"
  total_factors: 50
  sub_axes: 5
  description: |
    Organisationsstruktur, Governance, Unternehmenskultur, Human Resources
    und strategische Ausrichtung der CSS Gruppe.
  data_sources:
    - "CSS Geschäftsbericht"
    - "Kununu Arbeitgeberbewertungen"
    - "LinkedIn Unternehmensseite"
    - "FINMA Registrierung"

# ==============================================================================
# SUB-ACHSE: ORG-STR (Struktur & Governance)
# ==============================================================================

ORG-STR:
  name: "Struktur & Governance"
  description: "Organisationsstruktur, Führungsgremien, Rechtsform"
  factors: 10

  factors_list:
    - id: "CSS-ORG-STR-01"
      name: "Rechtsform"
      definition: "Juristische Organisationsform der CSS"
      values:
        current: "AG (nicht gewinnorientiert)"
        note: "Aktiengesellschaft nach Schweizer Recht, aber nicht gewinnorientiert"
      source: "Handelsregister Luzern"

    - id: "CSS-ORG-STR-02"
      name: "Konzernstruktur"
      definition: "Anzahl Tochtergesellschaften und Marken"
      values:
        2024: 4
        brands: ["CSS", "Intras", "Arcosana", "Sanagate"]
      unit: "Marken/Gesellschaften"
      source: "CSS Geschäftsbericht"

    - id: "CSS-ORG-STR-03"
      name: "Verwaltungsrat Grösse"
      definition: "Anzahl Mitglieder im Verwaltungsrat"
      values:
        2024: 9
      unit: "Personen"
      source: "CSS Geschäftsbericht"

    - id: "CSS-ORG-STR-04"
      name: "Verwaltungsrat Frauenanteil"
      definition: "Anteil weiblicher VR-Mitglieder"
      values:
        2024: 0.33
        2020: 0.22
      unit: "Anteil"
      trend: "steigend"
      source: "CSS Geschäftsbericht"

    - id: "CSS-ORG-STR-05"
      name: "Geschäftsleitung Grösse"
      definition: "Anzahl Mitglieder der Geschäftsleitung"
      values:
        2024: 7
      unit: "Personen"
      source: "CSS Geschäftsbericht"

    - id: "CSS-ORG-STR-06"
      name: "Geschäftsleitung Frauenanteil"
      definition: "Anteil weiblicher GL-Mitglieder"
      values:
        2024: 0.29
        2020: 0.14
      unit: "Anteil"
      trend: "steigend"
      source: "CSS Geschäftsbericht"

    - id: "CSS-ORG-STR-07"
      name: "Organisationseinheiten"
      definition: "Anzahl Hauptabteilungen/Divisionen"
      values:
        2024: 6
        divisions: ["Privatkunden", "Firmenkunden", "Leistungen", "IT", "Finanzen", "HR"]
      unit: "Divisionen"
      source: "CSS Organigramm"

    - id: "CSS-ORG-STR-08"
      name: "Dezentralisierungsgrad"
      definition: "Anzahl regionale Standorte/Agenturen"
      values:
        2024: 120
        2020: 130
      unit: "Standorte"
      trend: "leicht sinkend"
      source: "CSS Website"

    - id: "CSS-ORG-STR-09"
      name: "Hierarchieebenen"
      definition: "Anzahl Führungsebenen vom VR bis Sachbearbeiter"
      values:
        2024: 5
      unit: "Ebenen"
      source: "Schätzung basierend auf Organigramm"

    - id: "CSS-ORG-STR-10"
      name: "Entscheidungszentralisierung"
      definition: "Grad der zentralen vs. dezentralen Entscheidungsfindung"
      values:
        2024: 0.65
      unit: "Index 0-1 (1=zentral)"
      note: "Hybrid-Modell mit zentraler Strategie und dezentraler Umsetzung"
      source: "Qualitative Einschätzung"

# ==============================================================================
# SUB-ACHSE: ORG-HR (Human Resources)
# ==============================================================================

ORG-HR:
  name: "Human Resources"
  description: "Mitarbeitende, Personalstruktur, Fluktuation"
  factors: 10

  factors_list:
    - id: "CSS-ORG-HR-01"
      name: "Mitarbeiterzahl"
      definition: "Anzahl Mitarbeitende (FTE)"
      values:
        2024: 2700
        2022: 2650
        2020: 2600
      unit: "FTE"
      trend: "leicht steigend"
      source: "CSS Geschäftsbericht"

    - id: "CSS-ORG-HR-02"
      name: "Frauenanteil Gesamt"
      definition: "Anteil weiblicher Mitarbeitender"
      values:
        2024: 0.62
        2020: 0.60
      unit: "Anteil"
      trend: "stabil"
      source: "CSS Nachhaltigkeitsbericht"

    - id: "CSS-ORG-HR-03"
      name: "Durchschnittsalter"
      definition: "Durchschnittliches Alter der Mitarbeitenden"
      values:
        2024: 42.5
        2020: 41.8
      unit: "Jahre"
      trend: "leicht steigend"
      source: "CSS Nachhaltigkeitsbericht"

    - id: "CSS-ORG-HR-04"
      name: "Betriebszugehörigkeit"
      definition: "Durchschnittliche Betriebszugehörigkeit"
      values:
        2024: 9.2
        2020: 8.5
      unit: "Jahre"
      trend: "stabil"
      source: "CSS Nachhaltigkeitsbericht"

    - id: "CSS-ORG-HR-05"
      name: "Fluktuationsrate"
      definition: "Jährliche Mitarbeiterfluktuation"
      values:
        2024: 0.085
        2022: 0.092
        2020: 0.078
      unit: "Anteil"
      trend: "stabil"
      source: "CSS Geschäftsbericht"

    - id: "CSS-ORG-HR-06"
      name: "Teilzeitquote"
      definition: "Anteil Mitarbeitende in Teilzeit"
      values:
        2024: 0.42
        2020: 0.38
      unit: "Anteil"
      trend: "steigend"
      source: "CSS Nachhaltigkeitsbericht"

    - id: "CSS-ORG-HR-07"
      name: "Lernende/Trainees"
      definition: "Anzahl Lernende und Trainees"
      values:
        2024: 85
        2020: 75
      unit: "Personen"
      trend: "steigend"
      source: "CSS Nachhaltigkeitsbericht"

    - id: "CSS-ORG-HR-08"
      name: "Weiterbildungstage"
      definition: "Durchschnittliche Weiterbildungstage pro Mitarbeiter"
      values:
        2024: 4.5
        2020: 3.8
      unit: "Tage/Jahr"
      trend: "steigend"
      source: "CSS Nachhaltigkeitsbericht"

    - id: "CSS-ORG-HR-09"
      name: "Homeoffice-Anteil"
      definition: "Anteil der Arbeitszeit im Homeoffice"
      values:
        2024: 0.40
        2022: 0.50
        2019: 0.10
      unit: "Anteil"
      trend: "stabilisiert nach Corona"
      source: "CSS HR-Bericht"

    - id: "CSS-ORG-HR-10"
      name: "Arbeitgeberbewertung"
      definition: "Kununu-Score (1-5)"
      values:
        2024: 3.8
        2022: 3.6
        2020: 3.5
      unit: "Score 1-5"
      trend: "steigend"
      source: "kununu.com"

# ==============================================================================
# SUB-ACHSE: ORG-KUL (Unternehmenskultur)
# ==============================================================================

ORG-KUL:
  name: "Unternehmenskultur"
  description: "Werte, Kultur, Mitarbeiterengagement"
  factors: 10

  factors_list:
    - id: "CSS-ORG-KUL-01"
      name: "Unternehmenswerte"
      definition: "Definierte Kernwerte der CSS"
      values:
        current: ["Partnerschaftlich", "Engagiert", "Vorausschauend"]
      source: "CSS Website"

    - id: "CSS-ORG-KUL-02"
      name: "Purpose Statement"
      definition: "Unternehmenszweck/Mission"
      values:
        current: "Gemeinsam für Gesundheit"
      source: "CSS Geschäftsbericht"

    - id: "CSS-ORG-KUL-03"
      name: "Mitarbeiterzufriedenheit"
      definition: "Mitarbeiterzufriedenheits-Index"
      values:
        2024: 0.72
        2022: 0.70
        2020: 0.68
      unit: "Index 0-1"
      trend: "steigend"
      source: "CSS Mitarbeiterbefragung"

    - id: "CSS-ORG-KUL-04"
      name: "Engagement Score"
      definition: "Mitarbeiterengagement-Score"
      values:
        2024: 0.68
        2022: 0.65
      unit: "Index 0-1"
      trend: "steigend"
      source: "CSS Mitarbeiterbefragung"

    - id: "CSS-ORG-KUL-05"
      name: "Innovationskultur"
      definition: "Selbsteinschätzung Innovationsfreundlichkeit"
      values:
        2024: 0.70
      unit: "Index 0-1"
      note: "CSS positioniert sich als Innovationsführer"
      source: "Qualitative Einschätzung"

    - id: "CSS-ORG-KUL-06"
      name: "Fehlerkultur"
      definition: "Offenheit für Fehler und Lernen"
      values:
        2024: 0.60
      unit: "Index 0-1"
      source: "Qualitative Einschätzung"

    - id: "CSS-ORG-KUL-07"
      name: "Diversitäts-Commitment"
      definition: "Formale Diversitätsstrategie vorhanden"
      values:
        2024: true
        programs: ["Diversity Council", "Mentoring", "Flexible Arbeit"]
      source: "CSS Nachhaltigkeitsbericht"

    - id: "CSS-ORG-KUL-08"
      name: "Nachhaltigkeits-Commitment"
      definition: "Formale Nachhaltigkeitsstrategie"
      values:
        2024: true
        certifications: ["ISO 14001"]
      source: "CSS Nachhaltigkeitsbericht"

    - id: "CSS-ORG-KUL-09"
      name: "Kundenorientierung"
      definition: "Kulturelle Verankerung Kundenorientierung"
      values:
        2024: 0.75
      unit: "Index 0-1"
      source: "Qualitative Einschätzung"

    - id: "CSS-ORG-KUL-10"
      name: "Change Readiness"
      definition: "Bereitschaft für Veränderungen"
      values:
        2024: 0.65
      unit: "Index 0-1"
      note: "Relevant für digitale Transformation"
      source: "Qualitative Einschätzung"

# ==============================================================================
# SUB-ACHSE: ORG-STR (Strategie)
# ==============================================================================

ORG-STRAT:
  name: "Strategie"
  description: "Strategische Ausrichtung, Ziele, Initiativen"
  factors: 10

  factors_list:
    - id: "CSS-ORG-STRAT-01"
      name: "Strategiehorizont"
      definition: "Zeitraum der aktuellen Unternehmensstrategie"
      values:
        current: "2023-2027"
        years: 5
      unit: "Jahre"
      source: "CSS Geschäftsbericht"

    - id: "CSS-ORG-STRAT-02"
      name: "Strategische Säulen"
      definition: "Hauptpfeiler der Unternehmensstrategie"
      values:
        current: ["Kundennähe", "Digitale Exzellenz", "Effizienz", "Innovation"]
      source: "CSS Geschäftsbericht"

    - id: "CSS-ORG-STRAT-03"
      name: "Wachstumsziel Versicherte"
      definition: "Angestrebtes jährliches Wachstum Versichertenzahl"
      values:
        target: 0.02
        2024: 0.015
      unit: "Anteil p.a."
      source: "CSS Geschäftsbericht"

    - id: "CSS-ORG-STRAT-04"
      name: "Digitalisierungsgrad Ziel"
      definition: "Angestrebter Anteil digitaler Interaktionen"
      values:
        target_2027: 0.80
        2024: 0.65
      unit: "Anteil"
      source: "CSS Digitalstrategie"

    - id: "CSS-ORG-STRAT-05"
      name: "Kostenziel"
      definition: "Angestrebte Verwaltungskostenquote"
      values:
        target: 0.045
        2024: 0.052
      unit: "Anteil der Prämien"
      source: "CSS Geschäftsbericht"

    - id: "CSS-ORG-STRAT-06"
      name: "Investitionsfokus"
      definition: "Hauptinvestitionsbereiche"
      values:
        current: ["IT/Digital", "Kundenservice", "Prävention"]
        it_share: 0.45
      source: "CSS Geschäftsbericht"

    - id: "CSS-ORG-STRAT-07"
      name: "Markenpositionierung"
      definition: "Strategische Positionierung der Hauptmarke"
      values:
        current: "Premium-Gesundheitspartner"
        differentiator: "Digitale Services und Prävention"
      source: "CSS Markenstrategie"

    - id: "CSS-ORG-STRAT-08"
      name: "Mehrmarkenstrategie"
      definition: "Aktive Nutzung mehrerer Marken für Segmentierung"
      values:
        current: true
        rationale: "Preissegmentierung ohne Kannibalisierung"
      source: "CSS Geschäftsbericht"

    - id: "CSS-ORG-STRAT-09"
      name: "Partnerschaftsstrategie"
      definition: "Fokus auf strategische Partnerschaften"
      values:
        current: true
        key_partners: ["Medbase", "Medi24", "Startups"]
      source: "CSS Geschäftsbericht"

    - id: "CSS-ORG-STRAT-10"
      name: "M&A Aktivität"
      definition: "Akquisitionsstrategie"
      values:
        current: "selektiv"
        recent: "Keine grösseren Akquisitionen"
      source: "CSS Geschäftsbericht"

# ==============================================================================
# SUB-ACHSE: ORG-GOV (Governance & Compliance)
# ==============================================================================

ORG-GOV:
  name: "Governance & Compliance"
  description: "Corporate Governance, Risikomanagement, Compliance"
  factors: 10

  factors_list:
    - id: "CSS-ORG-GOV-01"
      name: "FINMA Aufsichtskategorie"
      definition: "Aufsichtskategorie bei der FINMA"
      values:
        current: 2
        note: "Kategorie 2 = Mittlere Aufsichtsintensität"
      source: "FINMA"

    - id: "CSS-ORG-GOV-02"
      name: "Solvenzquote"
      definition: "SST-Solvenzquote"
      values:
        2024: 2.15
        2022: 2.05
        2020: 1.95
      unit: "Ratio"
      trend: "stabil über Minimum"
      source: "CSS Geschäftsbericht"

    - id: "CSS-ORG-GOV-03"
      name: "IKS Maturität"
      definition: "Reifegrad Internes Kontrollsystem"
      values:
        2024: 0.80
      unit: "Index 0-1"
      source: "CSS Geschäftsbericht"

    - id: "CSS-ORG-GOV-04"
      name: "Compliance-Organisation"
      definition: "Dedizierte Compliance-Abteilung"
      values:
        current: true
        fte: 15
      source: "CSS Organigramm"

    - id: "CSS-ORG-GOV-05"
      name: "Risikomanagement-Framework"
      definition: "Formales ERM-Framework implementiert"
      values:
        current: true
        standard: "COSO ERM"
      source: "CSS Geschäftsbericht"

    - id: "CSS-ORG-GOV-06"
      name: "Audit-Committee"
      definition: "Eigenständiges Audit-Committee im VR"
      values:
        current: true
        meetings_per_year: 6
      source: "CSS Geschäftsbericht"

    - id: "CSS-ORG-GOV-07"
      name: "Datenschutz-Maturität"
      definition: "DSG/GDPR Compliance-Level"
      values:
        2024: 0.85
      unit: "Index 0-1"
      source: "CSS Datenschutzbericht"

    - id: "CSS-ORG-GOV-08"
      name: "Cyber-Security-Maturität"
      definition: "IT-Sicherheits-Reifegrad"
      values:
        2024: 0.75
        certifications: ["ISO 27001"]
      unit: "Index 0-1"
      source: "CSS IT-Sicherheit"

    - id: "CSS-ORG-GOV-09"
      name: "Whistleblowing-System"
      definition: "Formales Meldesystem für Compliance-Verstösse"
      values:
        current: true
        anonymous: true
      source: "CSS Compliance"

    - id: "CSS-ORG-GOV-10"
      name: "ESG-Reporting"
      definition: "Formales ESG/Nachhaltigkeits-Reporting"
      values:
        current: true
        standards: ["GRI", "SDG"]
      source: "CSS Nachhaltigkeitsbericht"

# ==============================================================================
# SUMMARY
# ==============================================================================

summary:
  total_factors: 50
  data_quality: "Hoch für öffentliche Daten, mittel für interne Schätzungen"
  key_insights:
    - "CSS ist eine nicht gewinnorientierte AG mit stabiler Governance"
    - "Führungsgremien zeigen positive Diversitätsentwicklung"
    - "Mehrmarkenstrategie ermöglicht Segmentdifferenzierung"
    - "Starker Fokus auf Digitalisierung und Innovation"
    - "Mitarbeiterzufriedenheit und -bindung überdurchschnittlich"
  behavioral_relevance:
    - "Unternehmenskultur beeinflusst Servicequalität"
    - "Strategischer Fokus auf Prävention ermöglicht Nudging-Initiativen"
    - "Dezentrale Struktur ermöglicht lokale Kundenansprache"
