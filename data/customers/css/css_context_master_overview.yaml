# ==============================================================================
# EBF INTEGRATION
# ==============================================================================

ebf_mapping:
  psi_dimensions:
    psi_temporal:
      short_term: "Prämienentscheide, Arztwahl"
      medium_term: "Franchisewahl, Modellwechsel"
      long_term: "Kassenwechsel, Vorsorge"

    psi_cognitive:
      complexity: "Hoch (OKP vs. VVG, Franchise, Modelle)"
      information_overload: "Sehr hoch (Prämienvergleiche)"
      decision_fatigue: "Jährlich im Herbst (Prämienrunde)"

    psi_social:
      peer_effects: "Moderat (Empfehlungen)"
      social_proof: "Hoch (Ratings, Bewertungen)"
      family_decisions: "Sehr relevant (Familienversicherung)"

    psi_institutional:
      mandatory: "OKP obligatorisch"
      regulated: "Stark (KVG, FINMA)"
      defaults: "Ordentliche Franchise als Default"

    psi_economic:
      price_sensitivity: "Sehr hoch (Prämien)"
      loss_aversion: "Hoch (Leistungskürzungen)"
      present_bias: "Relevant (Franchise vs. Prämie)"

  behavioral_parameters:
    lambda_loss_aversion:
      value: 2.4
      context: "Leistungseinschränkungen, Prämienerhöhungen"
      source: "Health insurance switching studies"

    beta_time_discounting:
      value: 0.75
      context: "Franchise-Entscheide (hohe Franchise = niedrigere Prämie)"
      source: "Swiss health insurance choice data"

    sigma_social_proof:
      value: 0.65
      context: "Ratings, Empfehlungen, Vergleichsportale"
      source: "comparis.ch user behavior"

    kappa_default_sensitivity:
      value: 0.70
      context: "Franchise-Default, Modell-Default"
      source: "BAG switching statistics"

    theta_complexity_aversion:
      value: 0.80
      context: "Tarifkomplexität, Modellvielfalt"
      source: "Health literacy surveys"

