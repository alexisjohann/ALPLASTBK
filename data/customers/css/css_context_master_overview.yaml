# ==============================================================================
# SUMMARY
# ==============================================================================

summary:
  description: |
    Die CSS Kranken-Versicherung AG ist die drittgrösste Krankenversicherung
    der Schweiz mit rund 1.7 Millionen Versicherten. Als nicht gewinnorientierte
    AG mit Sitz in Luzern bietet CSS über vier Marken (CSS, Intras, Arcosana,
    Sanagate) sowohl obligatorische Grundversicherung (OKP) als auch
    Zusatzversicherungen (VVG) an.

    CSS positioniert sich als Innovationsführer im Bereich Digital Health
    mit der myCSS App und dem Active365 Bonusprogramm. Die Mehrmarkenstrategie
    ermöglicht die Bedienung unterschiedlicher Kundensegmente von
    preissensitiv bis premiumorientiert.

    Dieser Context Vector erfasst 400 CSS-spezifische Faktoren über 8 Achsen
    und ermöglicht präzise verhaltensökonomische Analysen für Kundenbindung,
    Produktentwicklung und Kommunikation.

  key_use_cases:
    - "Kundenbindung und Churn-Prevention"
    - "Prämienkommunikation und Framing"
    - "Franchise-Beratung (Present Bias)"
    - "Digitale Adoption (myCSS)"
    - "Präventionsprogramme (Active365)"
    - "Wechselverhalten und Timing"
