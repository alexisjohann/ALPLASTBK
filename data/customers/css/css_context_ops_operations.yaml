# ==============================================================================
# CSS CONTEXT VECTOR - OPS: OPERATIONS & PROCESSES
# ==============================================================================
# Achse: OPS (Operations & Processes)
# Faktoren: 40
# Sub-Achsen: 4
# Version: 1.0.0
# ==============================================================================

metadata:
  axis_code: "OPS"
  axis_name: "Operations & Processes"
  axis_name_de: "Betrieb & Prozesse"
  layer: "MESO"
  version: "1.0.0"
  total_factors: 40
  sub_axes: 4
  description: |
    Operative Prozesse der CSS, Leistungsabwicklung, Kundenservice,
    Effizienz und Qualitätsmanagement.
  data_sources:
    - "CSS Operations Reports"
    - "CSS Qualitätsmanagement"
    - "santésuisse Benchmarks"

# ==============================================================================
# SUB-ACHSE: OPS-LEI (Leistungsabwicklung)
# ==============================================================================

OPS-LEI:
  name: "Leistungsabwicklung"
  description: "Verarbeitung von Rechnungen und Leistungen"
  factors: 10

  factors_list:
    - id: "CSS-OPS-LEI-01"
      name: "Rechnungen pro Jahr"
      definition: "Anzahl verarbeitete Rechnungen jährlich"
      values:
        2024: 28000000
        2022: 26000000
        2020: 24000000
      unit: "Rechnungen"
      trend: "steigend"
      source: "CSS Operations"

    - id: "CSS-OPS-LEI-02"
      name: "Automatisierungsgrad"
      definition: "Anteil automatisch verarbeiteter Rechnungen"
      values:
        2024: 0.82
        2022: 0.75
        2020: 0.65
      unit: "Anteil"
      trend: "steigend"
      source: "CSS Operations"

    - id: "CSS-OPS-LEI-03"
      name: "Durchlaufzeit Standard"
      definition: "Durchschnittliche Bearbeitungszeit einfache Rechnungen"
      values:
        2024: 2.5
        2022: 3.2
        2020: 4.5
      unit: "Arbeitstage"
      trend: "verbessert"
      source: "CSS Operations"

    - id: "CSS-OPS-LEI-04"
      name: "Durchlaufzeit Komplex"
      definition: "Durchschnittliche Bearbeitungszeit komplexe Fälle"
      values:
        2024: 8.5
        2022: 12.0
      unit: "Arbeitstage"
      trend: "verbessert"
      source: "CSS Operations"

    - id: "CSS-OPS-LEI-05"
      name: "First-Time-Right Rate"
      definition: "Anteil korrekt beim ersten Mal bearbeiteter Rechnungen"
      values:
        2024: 0.94
        2022: 0.91
      unit: "Anteil"
      trend: "verbessert"
      source: "CSS Qualitätsmanagement"

    - id: "CSS-OPS-LEI-06"
      name: "Ablehnungsquote"
      definition: "Anteil abgelehnter Rechnungen"
      values:
        2024: 0.03
        reasons: ["Nicht gedeckt", "Formal fehlerhaft", "Doppelt"]
      unit: "Anteil"
      source: "CSS Operations"

    - id: "CSS-OPS-LEI-07"
      name: "Einsprüche"
      definition: "Einsprüche pro 1000 verarbeitete Rechnungen"
      values:
        2024: 5.2
        2022: 6.8
      unit: "pro 1000"
      trend: "sinkend"
      source: "CSS Operations"

    - id: "CSS-OPS-LEI-08"
      name: "Kosten pro Rechnung"
      definition: "Durchschnittliche Bearbeitungskosten pro Rechnung"
      values:
        2024: 4.20
        2022: 4.80
        2020: 5.50
      unit: "CHF"
      trend: "sinkend"
      source: "CSS Operations"

    - id: "CSS-OPS-LEI-09"
      name: "Tiers Payant Quote"
      definition: "Anteil direkte Abrechnung mit Leistungserbringern"
      values:
        2024: 0.65
        2020: 0.55
      unit: "Anteil"
      trend: "steigend"
      source: "CSS Operations"

    - id: "CSS-OPS-LEI-10"
      name: "Digitale Rechnungseinreichung"
      definition: "Anteil digital eingereichte Rechnungen"
      values:
        2024: 0.72
        2022: 0.58
        2020: 0.42
      unit: "Anteil"
      trend: "stark steigend"
      source: "CSS Digital"

# ==============================================================================
# SUB-ACHSE: OPS-KSV (Kundenservice)
# ==============================================================================

OPS-KSV:
  name: "Kundenservice"
  description: "Kundenservice und Support"
  factors: 10

  factors_list:
    - id: "CSS-OPS-KSV-01"
      name: "Service-Mitarbeitende"
      definition: "Anzahl Mitarbeitende im Kundenservice"
      values:
        2024: 450
        2022: 480
        2020: 520
      unit: "FTE"
      trend: "sinkend durch Digitalisierung"
      source: "CSS HR"

    - id: "CSS-OPS-KSV-02"
      name: "Anfragen pro Jahr"
      definition: "Gesamtzahl Kundenanfragen"
      values:
        2024: 2800000
        2022: 3100000
        2020: 3500000
      unit: "Anfragen"
      trend: "sinkend durch Self-Service"
      source: "CSS Operations"

    - id: "CSS-OPS-KSV-03"
      name: "Kanalverteilung Telefon"
      definition: "Anteil telefonische Anfragen"
      values:
        2024: 0.35
        2022: 0.45
        2020: 0.55
      unit: "Anteil"
      trend: "sinkend"
      source: "CSS Operations"

    - id: "CSS-OPS-KSV-04"
      name: "Kanalverteilung Digital"
      definition: "Anteil digitale Anfragen (App, Web, Chat)"
      values:
        2024: 0.52
        2022: 0.38
        2020: 0.28
      unit: "Anteil"
      trend: "stark steigend"
      source: "CSS Operations"

    - id: "CSS-OPS-KSV-05"
      name: "Kanalverteilung Agentur"
      definition: "Anteil persönliche Besuche Agentur"
      values:
        2024: 0.08
        2022: 0.10
        2020: 0.12
      unit: "Anteil"
      trend: "sinkend"
      source: "CSS Operations"

    - id: "CSS-OPS-KSV-06"
      name: "Average Handling Time"
      definition: "Durchschnittliche Bearbeitungszeit pro Anfrage"
      values:
        2024: 6.5
        2022: 7.2
      unit: "Minuten"
      trend: "verbessert"
      source: "CSS Operations"

    - id: "CSS-OPS-KSV-07"
      name: "First Contact Resolution"
      definition: "Anteil beim ersten Kontakt gelöster Anfragen"
      values:
        2024: 0.78
        2022: 0.72
      unit: "Anteil"
      trend: "verbessert"
      source: "CSS Operations"

    - id: "CSS-OPS-KSV-08"
      name: "Service Level"
      definition: "Anteil Anrufe innerhalb 30 Sek. angenommen"
      values:
        2024: 0.85
        target: 0.80
      unit: "Anteil"
      source: "CSS Operations"

    - id: "CSS-OPS-KSV-09"
      name: "Kundenzufriedenheit Service"
      definition: "Zufriedenheit mit Kundenservice (CSAT)"
      values:
        2024: 0.82
        2022: 0.78
      unit: "Index 0-1"
      trend: "verbessert"
      source: "CSS Kundenbefragung"

    - id: "CSS-OPS-KSV-10"
      name: "Chatbot Nutzung"
      definition: "Anteil durch Chatbot bearbeitete Anfragen"
      values:
        2024: 0.25
        2022: 0.15
        resolution_rate: 0.65
      unit: "Anteil"
      trend: "steigend"
      source: "CSS Digital"

# ==============================================================================
# SUB-ACHSE: OPS-EFF (Effizienz)
# ==============================================================================

OPS-EFF:
  name: "Effizienz"
  description: "Operative Effizienz und Kostenkennzahlen"
  factors: 10

  factors_list:
    - id: "CSS-OPS-EFF-01"
      name: "Verwaltungskostenquote"
      definition: "Verwaltungskosten in % der Prämien"
      values:
        2024: 0.052
        2022: 0.055
        2020: 0.058
        benchmark_ch: 0.050
      unit: "Anteil"
      trend: "sinkend"
      source: "CSS Geschäftsbericht"

    - id: "CSS-OPS-EFF-02"
      name: "Kosten pro Versicherten"
      definition: "Jährliche Verwaltungskosten pro Versicherten"
      values:
        2024: 285
        2022: 295
        2020: 310
      unit: "CHF"
      trend: "sinkend"
      source: "CSS Geschäftsbericht"

    - id: "CSS-OPS-EFF-03"
      name: "Versicherte pro Mitarbeiter"
      definition: "Anzahl Versicherte pro FTE"
      values:
        2024: 630
        2022: 605
        2020: 580
      unit: "Versicherte/FTE"
      trend: "steigend"
      source: "CSS HR"

    - id: "CSS-OPS-EFF-04"
      name: "IT-Kostenanteil"
      definition: "IT-Kosten in % der Verwaltungskosten"
      values:
        2024: 0.32
        2022: 0.28
        2020: 0.25
      unit: "Anteil"
      trend: "steigend (Investitionen)"
      source: "CSS IT"

    - id: "CSS-OPS-EFF-05"
      name: "Prozessautomatisierung"
      definition: "Anteil automatisierter Kernprozesse"
      values:
        2024: 0.75
        2022: 0.65
        2020: 0.55
      unit: "Anteil"
      trend: "steigend"
      source: "CSS Operations"

    - id: "CSS-OPS-EFF-06"
      name: "Papierverbrauch"
      definition: "Jährlicher Papierverbrauch"
      values:
        2024: 45000000
        2022: 65000000
        2020: 95000000
      unit: "Blatt"
      trend: "stark sinkend"
      source: "CSS Nachhaltigkeit"

    - id: "CSS-OPS-EFF-07"
      name: "Energie-Effizienz"
      definition: "Energieverbrauch pro Mitarbeiter"
      values:
        2024: 3200
        2022: 3500
        2020: 4200
      unit: "kWh/FTE"
      trend: "sinkend"
      source: "CSS Nachhaltigkeit"

    - id: "CSS-OPS-EFF-08"
      name: "Immobilien-Fläche"
      definition: "Bürofläche pro Mitarbeiter"
      values:
        2024: 12
        2022: 15
        2020: 18
      unit: "m²/FTE"
      trend: "sinkend (Flex Work)"
      source: "CSS Facility"

    - id: "CSS-OPS-EFF-09"
      name: "Fraud Detection Rate"
      definition: "Erkennungsrate bei Versicherungsbetrug"
      values:
        2024: 0.92
        savings: 15000000
      unit: "Index"
      source: "CSS Risk"

    - id: "CSS-OPS-EFF-10"
      name: "Continuous Improvement"
      definition: "Anzahl umgesetzte Verbesserungsvorschläge pro Jahr"
      values:
        2024: 320
        2022: 280
      unit: "Vorschläge"
      trend: "steigend"
      source: "CSS Operations"

# ==============================================================================
# SUB-ACHSE: OPS-QUA (Qualität)
# ==============================================================================

OPS-QUA:
  name: "Qualitätsmanagement"
  description: "Qualitätssicherung und -management"
  factors: 10

  factors_list:
    - id: "CSS-OPS-QUA-01"
      name: "ISO Zertifizierung"
      definition: "Qualitätsmanagement-Zertifizierungen"
      values:
        2024:
          certifications: ["ISO 9001", "ISO 14001", "ISO 27001"]
          scope: "Gesamtunternehmen"
      source: "CSS Qualitätsmanagement"

    - id: "CSS-OPS-QUA-02"
      name: "Fehlerquote"
      definition: "Anteil fehlerhafte Prozessabläufe"
      values:
        2024: 0.008
        2022: 0.012
      unit: "Anteil"
      trend: "sinkend"
      source: "CSS Qualitätsmanagement"

    - id: "CSS-OPS-QUA-03"
      name: "Interne Audits"
      definition: "Anzahl interne Qualitäts-Audits pro Jahr"
      values:
        2024: 24
        findings_per_audit: 3.5
      unit: "Audits"
      source: "CSS Qualitätsmanagement"

    - id: "CSS-OPS-QUA-04"
      name: "Externe Audits"
      definition: "Anzahl externe Audits pro Jahr"
      values:
        2024: 8
        auditors: ["FINMA", "Revisoren", "ISO-Zertifizierer"]
      unit: "Audits"
      source: "CSS Compliance"

    - id: "CSS-OPS-QUA-05"
      name: "Beschwerden"
      definition: "Formelle Beschwerden pro 10'000 Versicherte"
      values:
        2024: 8.5
        2022: 10.2
        2020: 12.5
      unit: "pro 10'000"
      trend: "sinkend"
      source: "CSS Ombudsstelle"

    - id: "CSS-OPS-QUA-06"
      name: "Beschwerden-Bearbeitungszeit"
      definition: "Durchschnittliche Bearbeitungszeit Beschwerden"
      values:
        2024: 5.5
        2022: 7.2
      unit: "Arbeitstage"
      trend: "verbessert"
      source: "CSS Ombudsstelle"

    - id: "CSS-OPS-QUA-07"
      name: "Ombudsfälle"
      definition: "Eskalation zum Ombudsmann der Krankenversicherung"
      values:
        2024: 85
        2022: 105
        outcome_css: 0.55
      unit: "Fälle"
      trend: "sinkend"
      source: "Ombudsmann KV"

    - id: "CSS-OPS-QUA-08"
      name: "Datenschutz-Vorfälle"
      definition: "Meldepflichtige Datenschutzvorfälle"
      values:
        2024: 2
        2022: 3
        severity: "gering"
      unit: "Vorfälle"
      source: "CSS Datenschutz"

    - id: "CSS-OPS-QUA-09"
      name: "Prozess-Maturität"
      definition: "CMMI-ähnlicher Prozessreifegrad"
      values:
        2024: 3.5
        scale: "1-5"
        target: 4.0
      unit: "Level"
      source: "CSS Operations"

    - id: "CSS-OPS-QUA-10"
      name: "NPS Operations"
      definition: "Net Promoter Score für operative Leistungen"
      values:
        2024: 32
        2022: 28
        components: ["Rechnungen", "Service", "App"]
      unit: "NPS"
      trend: "steigend"
      source: "CSS Kundenbefragung"

# ==============================================================================
# SUMMARY
# ==============================================================================

summary:
