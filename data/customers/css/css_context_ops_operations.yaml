    - "Verwaltungskostenquote leicht über Benchmark"
    - "Starke Digitalisierung reduziert Serviceanfragen"
    - "Kontinuierliche Qualitätsverbesserung (sinkende Beschwerden)"
    - "IT-Investitionen treiben Effizienzgewinne"
  behavioral_relevance:
    - "Schnelle Rechnungsbearbeitung erhöht Zufriedenheit"
    - "Self-Service reduziert Cognitive Load"
    - "Tiers Payant eliminiert Vorfinanzierung"
    - "Digitale Kanäle ermöglichen Nudging-Touchpoints"
