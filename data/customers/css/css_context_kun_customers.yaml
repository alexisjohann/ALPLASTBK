# ==============================================================================
# CSS CONTEXT VECTOR - KUN: CUSTOMERS & MEMBERS
# ==============================================================================
# Achse: KUN (Customers & Members)
# Faktoren: 60
# Sub-Achsen: 6
# Version: 1.0.0
# ==============================================================================

metadata:
  axis_code: "KUN"
  axis_name: "Customers & Members"
  axis_name_de: "Kunden & Versicherte"
  layer: "MESO"
  version: "1.0.0"
  total_factors: 60
  sub_axes: 6
  description: |
    Versichertenbasis der CSS, demographische Struktur, Segmentierung,
    Kundenverhalten, Zufriedenheit und Loyalität.
  data_sources:
    - "CSS CRM-Daten"
    - "CSS Kundenbefragungen"
    - "BAG Versichertenstatistik"
    - "K-Tipp Ratings"

# ==============================================================================
# SUB-ACHSE: KUN-DEM (Demographie)
# ==============================================================================

KUN-DEM:
  name: "Demographie"
  description: "Demographische Struktur der CSS-Versichertenbasis"
  factors: 10

  factors_list:
    - id: "CSS-KUN-DEM-01"
      name: "Versicherte Total"
      definition: "Gesamtzahl OKP-Versicherte (alle Marken)"
      values:
        2024: 1700000
        2022: 1650000
        2020: 1600000
      unit: "Personen"
      trend: "wachsend"
      source: "CSS Geschäftsbericht"

    - id: "CSS-KUN-DEM-02"
      name: "Altersstruktur 0-18"
      definition: "Anteil Kinder und Jugendliche"
      values:
        2024: 0.18
        benchmark_ch: 0.20
      unit: "Anteil"
      note: "Leicht unter CH-Durchschnitt"
      source: "CSS CRM"

    - id: "CSS-KUN-DEM-03"
      name: "Altersstruktur 19-25"
      definition: "Anteil junge Erwachsene"
      values:
        2024: 0.08
        benchmark_ch: 0.08
      unit: "Anteil"
      note: "Entspricht CH-Durchschnitt"
      source: "CSS CRM"

    - id: "CSS-KUN-DEM-04"
      name: "Altersstruktur 26-45"
      definition: "Anteil mittleres Alter"
      values:
        2024: 0.28
        benchmark_ch: 0.27
      unit: "Anteil"
      source: "CSS CRM"

    - id: "CSS-KUN-DEM-05"
      name: "Altersstruktur 46-65"
      definition: "Anteil ältere Erwerbstätige"
      values:
        2024: 0.26
        benchmark_ch: 0.26
      unit: "Anteil"
      source: "CSS CRM"

    - id: "CSS-KUN-DEM-06"
      name: "Altersstruktur 65+"
      definition: "Anteil Rentner"
      values:
        2024: 0.20
        benchmark_ch: 0.19
      unit: "Anteil"
      note: "Leicht über CH-Durchschnitt"
      source: "CSS CRM"

    - id: "CSS-KUN-DEM-07"
      name: "Durchschnittsalter"
      definition: "Durchschnittliches Alter der Versicherten"
      values:
        2024: 43.5
        2020: 42.8
        benchmark_ch: 42.2
      unit: "Jahre"
      trend: "alternd"
      source: "CSS CRM"

    - id: "CSS-KUN-DEM-08"
      name: "Geschlechterverteilung"
      definition: "Anteil weibliche Versicherte"
      values:
        2024: 0.52
        benchmark_ch: 0.51
      unit: "Anteil"
      source: "CSS CRM"

    - id: "CSS-KUN-DEM-09"
      name: "Regionale Verteilung"
      definition: "Anteil Versicherte nach Sprachregion"
      values:
        2024:
          deutsch: 0.72
          franzoesisch: 0.22
          italienisch: 0.06
      unit: "Anteil"
      source: "CSS CRM"

    - id: "CSS-KUN-DEM-10"
      name: "Stadt/Land Verteilung"
      definition: "Anteil Versicherte in urbanen Gebieten"
      values:
        2024: 0.65
        benchmark_ch: 0.75
      unit: "Anteil"
      note: "Stärkere ländliche Präsenz"
      source: "CSS CRM"

# ==============================================================================
# SUB-ACHSE: KUN-SEG (Segmentierung)
# ==============================================================================

KUN-SEG:
  name: "Segmentierung"
  description: "Kundensegmente und deren Charakteristiken"
  factors: 10

  factors_list:
    - id: "CSS-KUN-SEG-01"
      name: "Segment Familien"
      definition: "Anteil Familien-Policen"
      values:
        2024: 0.42
        avg_members: 3.4
      unit: "Anteil"
      source: "CSS CRM"

    - id: "CSS-KUN-SEG-02"
      name: "Segment Singles"
      definition: "Anteil Einzelpersonen-Policen"
      values:
        2024: 0.35
        age_profile: "25-45 überrepräsentiert"
      unit: "Anteil"
      source: "CSS CRM"

    - id: "CSS-KUN-SEG-03"
      name: "Segment Senioren"
      definition: "Anteil 65+ Versicherte"
      values:
        2024: 0.20
        trend: "wachsend"
        profitability: "unterdurchschnittlich"
      unit: "Anteil"
      source: "CSS CRM"

    - id: "CSS-KUN-SEG-04"
      name: "Segment Young Professionals"
      definition: "Anteil 25-35 urbane Berufstätige"
      values:
        2024: 0.12
        digital_affinity: "sehr hoch"
        churn_risk: "hoch"
      unit: "Anteil"
      source: "CSS Segmentierung"

    - id: "CSS-KUN-SEG-05"
      name: "Segment Gesundheitsbewusste"
      definition: "Anteil aktive Gesundheitsmanager"
      values:
        2024: 0.18
        active365_usage: 0.65
        prevention_usage: "hoch"
      unit: "Anteil"
      source: "CSS Segmentierung"

    - id: "CSS-KUN-SEG-06"
      name: "Segment Preissensitive"
      definition: "Anteil primär preisorientierte Versicherte"
      values:
        2024: 0.25
        brands: ["Sanagate", "Arcosana"]
        wechselrate: 0.15
      unit: "Anteil"
      source: "CSS Segmentierung"

    - id: "CSS-KUN-SEG-07"
      name: "Segment Premiumkunden"
      definition: "Anteil mit umfassenden Zusatzversicherungen"
      values:
        2024: 0.22
        avg_premium: 5500
        loyalty: "sehr hoch"
      unit: "Anteil"
      source: "CSS Segmentierung"

    - id: "CSS-KUN-SEG-08"
      name: "Segment Firmenkunden"
      definition: "Anteil über Firmenkollektiv versichert"
      values:
        2024: 0.28
        companies: 12000
        avg_size: 45
      unit: "Anteil"
      source: "CSS B2B"

    - id: "CSS-KUN-SEG-09"
      name: "Segment Digital Natives"
      definition: "Anteil mit ausschliesslich digitaler Interaktion"
      values:
        2024: 0.15
        app_only: true
        avg_age: 32
      unit: "Anteil"
      source: "CSS Digital Analytics"

    - id: "CSS-KUN-SEG-10"
      name: "Segment Traditionell"
      definition: "Anteil mit primär analoger Interaktion"
      values:
        2024: 0.18
        avg_age: 62
        paper_preference: "hoch"
      unit: "Anteil"
      source: "CSS Segmentierung"

