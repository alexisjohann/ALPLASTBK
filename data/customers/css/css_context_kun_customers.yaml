# ==============================================================================
# SUMMARY
# ==============================================================================

summary:
  total_factors: 60
  data_quality: "Hoch (CRM-Daten, Befragungen)"
  key_insights:
    - "Ältere Versichertenstruktur als CH-Durchschnitt"
    - "Starke VVG-Penetration (72%)"
    - "Überdurchschnittliche Kundenzufriedenheit (NPS 25)"
    - "Steigende digitale Adoption (52% App-Nutzung)"
    - "Geringere Wechselrate als Markt (6% vs. 8%)"
  behavioral_relevance:
    - "Franchise-Wahl zeigt Present Bias (hohe Franchise trotz Kosten)"
    - "Active365 nutzt Commitment-Devices"
    - "App-Engagement korreliert mit Retention"
    - "Preissensitivität variiert stark nach Segment"
    - "Social Proof durch Empfehlungen relevant"
