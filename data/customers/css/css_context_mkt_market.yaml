# ==============================================================================
# CSS CONTEXT VECTOR - MKT: MARKET & COMPETITION
# ==============================================================================
# Achse: MKT (Market & Competition)
# Faktoren: 50
# Sub-Achsen: 5
# Version: 1.0.0
# ==============================================================================

metadata:
  axis_code: "MKT"
  axis_name: "Market & Competition"
  axis_name_de: "Markt & Wettbewerb"
  layer: "MESO"
  version: "1.0.0"
  total_factors: 50
  sub_axes: 5
  description: |
    Marktposition der CSS, Wettbewerbslandschaft, Marktdynamik und
    Branchentrends im Schweizer Krankenversicherungsmarkt.
  data_sources:
    - "BAG Statistik Krankenversicherung"
    - "santésuisse Datenpool"
    - "comparis.ch Marktdaten"
    - "FINMA Statistiken"

# ==============================================================================
# SUB-ACHSE: MKT-POS (Marktposition)
# ==============================================================================

MKT-POS:
  name: "Marktposition"
  description: "Position der CSS im Schweizer Krankenversicherungsmarkt"
  factors: 10

  factors_list:
    - id: "CSS-MKT-POS-01"
      name: "Marktanteil OKP"
      definition: "Anteil CSS an allen OKP-Versicherten"
      values:
        2024: 0.105
        2022: 0.103
        2020: 0.100
      unit: "Anteil"
      trend: "leicht steigend"
      source: "BAG Statistik"

    - id: "CSS-MKT-POS-02"
      name: "Marktrang OKP"
      definition: "Rangposition nach Versichertenzahl"
      values:
        2024: 3
        note: "Nach Groupe Mutuel und Helsana"
      unit: "Rang"
      source: "BAG Statistik"

    - id: "CSS-MKT-POS-03"
      name: "Versicherte Total"
      definition: "Gesamtzahl OKP-Versicherte (alle Marken)"
      values:
        2024: 1700000
        2022: 1650000
        2020: 1600000
      unit: "Personen"
      trend: "wachsend"
      source: "CSS Geschäftsbericht"

    - id: "CSS-MKT-POS-04"
      name: "Versicherte nach Marke - CSS"
      definition: "Versicherte unter Hauptmarke CSS"
      values:
        2024: 1100000
        share: 0.65
      unit: "Personen"
      source: "CSS Geschäftsbericht"

    - id: "CSS-MKT-POS-05"
      name: "Versicherte nach Marke - Intras"
      definition: "Versicherte unter Marke Intras"
      values:
        2024: 280000
        share: 0.16
      unit: "Personen"
      source: "CSS Geschäftsbericht"

    - id: "CSS-MKT-POS-06"
      name: "Versicherte nach Marke - Arcosana"
      definition: "Versicherte unter Marke Arcosana"
      values:
        2024: 200000
        share: 0.12
      unit: "Personen"
      source: "CSS Geschäftsbericht"

    - id: "CSS-MKT-POS-07"
      name: "Versicherte nach Marke - Sanagate"
      definition: "Versicherte unter Marke Sanagate"
      values:
        2024: 120000
        share: 0.07
      unit: "Personen"
      source: "CSS Geschäftsbericht"

    - id: "CSS-MKT-POS-08"
      name: "Regionale Stärke"
      definition: "Stärkste Präsenz nach Kantonen"
      values:
        strong_cantons: ["LU", "ZG", "NW", "OW", "SZ"]
        strongest: "LU"
        market_share_lu: 0.25
      source: "BAG regionale Statistik"

    - id: "CSS-MKT-POS-09"
      name: "Prämienpositionierung"
      definition: "Relative Prämienposition im Markt"
      values:
        2024: "mittel-hoch"
        percentile: 0.65
        note: "Günstiger als Helsana, teurer als Assura"
      source: "comparis.ch"

    - id: "CSS-MKT-POS-10"
      name: "Markenbekanntheit"
      definition: "Gestützte Markenbekanntheit Schweiz"
      values:
        2024: 0.92
        2020: 0.89
      unit: "Anteil"
      trend: "stabil hoch"
      source: "CSS Marktforschung"

# ==============================================================================
# SUB-ACHSE: MKT-WET (Wettbewerb)
# ==============================================================================

MKT-WET:
  name: "Wettbewerb"
  description: "Wettbewerbslandschaft und Konkurrenzanalyse"
  factors: 10

  factors_list:
    - id: "CSS-MKT-WET-01"
      name: "Anzahl Wettbewerber"
      definition: "Anzahl aktive Krankenversicherer in der Schweiz"
      values:
        2024: 51
        2020: 54
        2015: 61
      unit: "Versicherer"
      trend: "Konsolidierung"
      source: "BAG"

    - id: "CSS-MKT-WET-02"
      name: "Top-5 Marktanteil"
      definition: "Kumulierter Marktanteil der 5 grössten Versicherer"
      values:
        2024: 0.52
        top5: ["Groupe Mutuel", "Helsana", "CSS", "Swica", "Concordia"]
      unit: "Anteil"
      source: "BAG Statistik"

    - id: "CSS-MKT-WET-03"
      name: "Hauptkonkurrent 1 - Groupe Mutuel"
      definition: "Marktanteil Groupe Mutuel"
      values:
        2024: 0.135
        versicherte: 2200000
      unit: "Anteil"
      source: "BAG Statistik"

    - id: "CSS-MKT-WET-04"
      name: "Hauptkonkurrent 2 - Helsana"
      definition: "Marktanteil Helsana Gruppe"
      values:
        2024: 0.120
        versicherte: 1950000
      unit: "Anteil"
      source: "BAG Statistik"

    - id: "CSS-MKT-WET-05"
      name: "Hauptkonkurrent 3 - Swica"
      definition: "Marktanteil Swica"
      values:
        2024: 0.095
        versicherte: 1550000
      unit: "Anteil"
      source: "BAG Statistik"

    - id: "CSS-MKT-WET-06"
      name: "Hauptkonkurrent 4 - Concordia"
      definition: "Marktanteil Concordia"
      values:
        2024: 0.070
        versicherte: 1150000
      unit: "Anteil"
      source: "BAG Statistik"

    - id: "CSS-MKT-WET-07"
      name: "Billigkonkurrenz - Assura"
      definition: "Marktanteil Assura (Billigsegment)"
      values:
        2024: 0.065
        positioning: "Preisführer"
      unit: "Anteil"
      source: "BAG Statistik"

    - id: "CSS-MKT-WET-08"
      name: "Wettbewerbsintensität"
      definition: "Herfindahl-Index des Marktes"
      values:
        2024: 0.085
        interpretation: "Moderat konzentriert"
      unit: "HHI"
      source: "Berechnung aus BAG Daten"

    - id: "CSS-MKT-WET-09"
      name: "Preiswettbewerb Intensität"
      definition: "Prämienspreizung im Markt"
      values:
        2024: 0.35
        note: "Differenz günstigste zu teuerste Prämie"
      unit: "Anteil"
      source: "comparis.ch"

    - id: "CSS-MKT-WET-10"
      name: "Differenzierungsstrategie"
      definition: "CSS Positionierung vs. Wettbewerb"
      values:
        current: "Service und Digital"
        differentiators: ["myCSS App", "Active365", "Telemedizin"]
      source: "CSS Strategie"

# ==============================================================================
# SUB-ACHSE: MKT-DYN (Marktdynamik)
# ==============================================================================

MKT-DYN:
  name: "Marktdynamik"
  description: "Marktentwicklung, Wechselverhalten, Trends"
  factors: 10

  factors_list:
    - id: "CSS-MKT-DYN-01"
      name: "Wechselquote Markt"
      definition: "Jährliche Wechselrate aller OKP-Versicherten"
      values:
        2024: 0.08
        2022: 0.095
        2020: 0.07
      unit: "Anteil"
      trend: "zyklisch"
      source: "BAG Statistik"

    - id: "CSS-MKT-DYN-02"
      name: "CSS Netto-Wechselbilanz"
      definition: "Zuwachs minus Abgänge durch Wechsel"
      values:
        2024: 25000
        2023: 30000
        2022: -5000
      unit: "Personen"
      trend: "positiv"
      source: "CSS Geschäftsbericht"

    - id: "CSS-MKT-DYN-03"
      name: "CSS Retention Rate"
      definition: "Anteil Versicherte die bei CSS bleiben"
      values:
        2024: 0.94
        2022: 0.92
        2020: 0.93
      unit: "Anteil"
      trend: "stabil"
      source: "CSS Geschäftsbericht"

    - id: "CSS-MKT-DYN-04"
      name: "Prämienentwicklung Markt"
      definition: "Durchschnittliche jährliche Prämienerhöhung OKP"
      values:
        2025: 0.06
        2024: 0.087
        2023: 0.062
      unit: "Anteil"
      trend: "volatil, tendenziell steigend"
      source: "BAG"

    - id: "CSS-MKT-DYN-05"
      name: "CSS Prämienentwicklung"
      definition: "CSS-spezifische Prämienerhöhung"
      values:
        2025: 0.055
        2024: 0.08
      unit: "Anteil"
      note: "Leicht unter Marktdurchschnitt"
      source: "CSS"

    - id: "CSS-MKT-DYN-06"
      name: "Marktkonsolidierung"
      definition: "Anzahl Fusionen/Übernahmen pro Jahr"
      values:
        2024: 2
        2023: 1
        trend: "moderat"
      unit: "Transaktionen"
      source: "FINMA"

    - id: "CSS-MKT-DYN-07"
      name: "Digitalisierungsdruck"
      definition: "Anteil Versicherter mit App-Nutzung marktweit"
      values:
        2024: 0.45
        2022: 0.35
        2020: 0.25
      unit: "Anteil"
      trend: "stark steigend"
      source: "Branchenschätzung"

    - id: "CSS-MKT-DYN-08"
      name: "Alternative Modelle Wachstum"
      definition: "Anteil Versicherte in alternativen Modellen (HMO, Hausarzt)"
      values:
        2024: 0.72
        2020: 0.65
        2015: 0.55
      unit: "Anteil"
      trend: "steigend"
      source: "BAG Statistik"

    - id: "CSS-MKT-DYN-09"
      name: "Telemedizin-Adoption"
      definition: "Anteil Versicherte mit Telemedizin-Nutzung"
      values:
        2024: 0.25
        2022: 0.18
        2020: 0.12
      unit: "Anteil"
      trend: "stark steigend"
      source: "Branchenschätzung"

    - id: "CSS-MKT-DYN-10"
      name: "Prävention-Trend"
      definition: "Wachstum Präventionsangebote im Markt"
      values:
        2024: 0.15
        note: "Jährliches Wachstum Prävention-Ausgaben"
      unit: "Anteil p.a."
      source: "santésuisse"

# ==============================================================================
# SUB-ACHSE: MKT-SEG (Marktsegmente)
# ==============================================================================

MKT-SEG:
  name: "Marktsegmente"
  description: "Kundesegmente und deren Dynamik"
  factors: 10

  factors_list:
    - id: "CSS-MKT-SEG-01"
      name: "Segment Preisorientiert"
      definition: "Anteil preissensitiver Versicherter im Markt"
      values:
        2024: 0.35
        characteristics: ["Hohe Wechselbereitschaft", "Nur OKP", "Online"]
      unit: "Anteil"
      source: "Marktforschung"

    - id: "CSS-MKT-SEG-02"
      name: "Segment Qualitätsorientiert"
      definition: "Anteil serviceorientierter Versicherter"
      values:
        2024: 0.25
        characteristics: ["Geringe Wechselbereitschaft", "Zusatzversicherungen", "Beratung"]
      unit: "Anteil"
      source: "Marktforschung"

    - id: "CSS-MKT-SEG-03"
      name: "Segment Digital-Affin"
      definition: "Anteil digital-affiner Versicherter"
      values:
        2024: 0.20
        characteristics: ["App-Nutzung", "Telemedizin", "Online-Abschluss"]
      unit: "Anteil"
      source: "Marktforschung"

    - id: "CSS-MKT-SEG-04"
      name: "Segment Traditionell"
      definition: "Anteil traditionell orientierter Versicherter"
      values:
        2024: 0.20
        characteristics: ["Persönlicher Kontakt", "Papier", "Lange Treue"]
      unit: "Anteil"
      source: "Marktforschung"

    - id: "CSS-MKT-SEG-05"
      name: "CSS Stärke Preisorientiert"
      definition: "CSS Marktanteil im preisorientierten Segment"
      values:
        2024: 0.06
        note: "Unter Marktanteil, primär über Sanagate"
      unit: "Anteil"
      source: "CSS Schätzung"

    - id: "CSS-MKT-SEG-06"
      name: "CSS Stärke Qualitätsorientiert"
      definition: "CSS Marktanteil im qualitätsorientierten Segment"
      values:
        2024: 0.18
        note: "Über Marktanteil, Kernzielgruppe"
      unit: "Anteil"
      source: "CSS Schätzung"

    - id: "CSS-MKT-SEG-07"
      name: "CSS Stärke Digital-Affin"
      definition: "CSS Marktanteil im digitalen Segment"
      values:
        2024: 0.15
        note: "Über Marktanteil, myCSS als Differentiator"
      unit: "Anteil"
      source: "CSS Schätzung"

    - id: "CSS-MKT-SEG-08"
      name: "Familiensegment Anteil"
      definition: "Anteil Familienversicherungen am Markt"
      values:
        2024: 0.45
        avg_family_size: 3.2
      unit: "Anteil"
      source: "BAG Statistik"

    - id: "CSS-MKT-SEG-09"
      name: "Firmenkunden Anteil"
      definition: "Anteil KMU/Firmen-Kollektivverträge"
      values:
        2024: 0.25
        note: "CSS stark bei KMU"
      unit: "Anteil"
      source: "CSS Geschäftsbericht"

    - id: "CSS-MKT-SEG-10"
      name: "Junge Erwachsene (18-25)"
      definition: "Anteil und Dynamik junge Erwachsene"
      values:
        market_share: 0.085
        churn_risk: "hoch"
        price_sensitivity: "sehr hoch"
      source: "BAG Statistik"

# ==============================================================================
# SUB-ACHSE: MKT-TRD (Branchentrends)
# ==============================================================================

MKT-TRD:
  name: "Branchentrends"
  description: "Aktuelle und zukünftige Trends im Krankenversicherungsmarkt"
  factors: 10

  factors_list:
    - id: "CSS-MKT-TRD-01"
      name: "Trend Digitalisierung"
      definition: "Wichtigkeit digitaler Transformation"
      values:
        importance: 0.95
        css_position: "Vorreiter"
      unit: "Index 0-1"
      source: "Branchenanalyse"

    - id: "CSS-MKT-TRD-02"
      name: "Trend Prävention"
      definition: "Wachstum präventiver Gesundheitsleistungen"
      values:
        importance: 0.85
        growth_rate: 0.12
        css_position: "Stark (Active365)"
      unit: "Index 0-1"
      source: "Branchenanalyse"

    - id: "CSS-MKT-TRD-03"
      name: "Trend Telemedizin"
      definition: "Wachstum telemedizinischer Konsultationen"
      values:
        importance: 0.80
        growth_rate: 0.20
        css_position: "Gut (Medi24 Partnerschaft)"
      unit: "Index 0-1"
      source: "Branchenanalyse"

    - id: "CSS-MKT-TRD-04"
      name: "Trend Personalisierung"
      definition: "Individualisierte Angebote und Kommunikation"
      values:
        importance: 0.75
        css_position: "In Entwicklung"
      unit: "Index 0-1"
      source: "Branchenanalyse"

    - id: "CSS-MKT-TRD-05"
      name: "Trend Ökosysteme"
      definition: "Vernetzung mit Gesundheits-Ökosystemen"
      values:
        importance: 0.70
        css_position: "Partnerschaften aktiv"
      unit: "Index 0-1"
      source: "Branchenanalyse"

    - id: "CSS-MKT-TRD-06"
      name: "Trend Kostendruck"
      definition: "Politischer und gesellschaftlicher Druck auf Kosten"
      values:
        importance: 0.90
        regulatory_risk: "hoch"
        note: "EFAS, Einheitskasse-Diskussionen"
      unit: "Index 0-1"
      source: "Branchenanalyse"

    - id: "CSS-MKT-TRD-07"
      name: "Trend Wearables/IoT"
      definition: "Integration von Wearables und Health-IoT"
      values:
        importance: 0.65
        css_position: "Active365 mit Fitness-Tracker"
      unit: "Index 0-1"
      source: "Branchenanalyse"

    - id: "CSS-MKT-TRD-08"
      name: "Trend Mental Health"
      definition: "Wachsende Bedeutung psychischer Gesundheit"
      values:
        importance: 0.80
        growth_rate: 0.15
        css_position: "Ausbau Angebote"
      unit: "Index 0-1"
      source: "Branchenanalyse"

    - id: "CSS-MKT-TRD-09"
      name: "Trend Nachhaltigkeit"
      definition: "ESG und Nachhaltigkeit in der Branche"
      values:
        importance: 0.60
        css_position: "Nachhaltigkeitsstrategie"
      unit: "Index 0-1"
      source: "Branchenanalyse"

    - id: "CSS-MKT-TRD-10"
      name: "Trend Regulierung"
      definition: "Zunehmende regulatorische Anforderungen"
      values:
        importance: 0.85
        areas: ["Datenschutz", "EFAS", "Risikoausgleich", "Transparenz"]
      unit: "Index 0-1"
      source: "Branchenanalyse"

# ==============================================================================
# SUMMARY
# ==============================================================================

summary:
  total_factors: 50
  data_quality: "Hoch (öffentliche Statistiken)"
  key_insights:
    - "CSS ist Nr. 3 im Markt mit ~10.5% Marktanteil"
    - "Mehrmarkenstrategie ermöglicht breite Segmentabdeckung"
    - "Starke Position bei qualitäts- und digitalorientierten Kunden"
    - "Positive Wechselbilanz durch Differenzierung"
    - "Markt konsolidiert sich weiter, Wettbewerb bleibt intensiv"
  behavioral_relevance:
    - "Hohe Wechselbereitschaft im Herbst (Timing-Effekte)"
    - "Preissensitivität variiert stark nach Segment"
    - "Markenvertrauen als Wechselbarriere"
    - "Digitale Services als Retention-Treiber"
