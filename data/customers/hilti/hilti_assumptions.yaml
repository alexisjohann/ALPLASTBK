---
# Hilti Strategic Assumptions
# Pre-populated from Manufacturing Template + Hilti-specific adjustments
# Last Updated: 2026-02-19
# Version: 1.0.0

strategic_assumptions:
  industry: "manufacturing"
  sub_type: "Industrial Equipment / Construction Tools"
  template_version: "1.0.0"

  # Financial Benchmarks (Hilti-adjusted: higher margins than template)
  financial_benchmarks:
    revenue_growth_rate: 0.06      # 6% CAGR (above mfg template 5%, Hilti's track record)
    ebitda_margin: 0.16            # 16% (above mfg template 10%, premium + direct sales)
    gross_margin: 0.52             # 52% (above mfg template 30%, premium brand + services)
    net_margin: 0.10               # 10% (above mfg template 5%)
    capex_to_revenue: 0.04         # 4% (slightly below mfg template 5%)
    maintenance_capex_pct: 0.55    # 55% maintenance, 45% growth
    rd_to_revenue: 0.08            # 8% R&D intensity (high for construction industry)

    # Working capital
    dso_days: 50                   # Days Sales Outstanding (direct sales → slightly higher)
    dpo_days: 55                   # Days Payable Outstanding
    dio_days: 35                   # Days Inventory Outstanding

  # Regional Growth Rates (Hilti-specific)
  regional_growth_rates:
    Europe:
      cagr: 0.04                   # 4% (mature but steady, construction demand)
      revenue_2024_eur_m: 2970
      revenue_share: 0.45
      headcount_share: 0.50
      rationale: "Mature market, renovation wave (EU Green Deal), infrastructure investment"
    North_America:
      cagr: 0.07                   # 7% (strong US construction market)
      revenue_2024_eur_m: 1650
      revenue_share: 0.25
      headcount_share: 0.20
      rationale: "Infrastructure bill, data center construction, strong commercial building"
    APAC:
      cagr: 0.09                   # 9% (highest growth, urbanization)
      revenue_2024_eur_m: 990
      revenue_share: 0.15
      headcount_share: 0.15
      rationale: "Urbanization, infrastructure development, India growth"
    South_America:
      cagr: 0.05                   # 5% (moderate, construction cycles)
      revenue_2024_eur_m: 528
      revenue_share: 0.08
      headcount_share: 0.08
      rationale: "Brazil & Mexico construction, mining demand"
    AMET:
      cagr: 0.08                   # 8% (Middle East mega-projects)
      revenue_2024_eur_m: 462
      revenue_share: 0.07
      headcount_share: 0.07
      rationale: "Saudi Vision 2030, UAE development, Turkey infrastructure"

  # Organizational Benchmarks (Hilti-specific: direct sales model)
  organizational:
    total_employees_2024: 33000
    revenue_per_employee: 200000   # EUR per FTE (in line with mfg template)

    headcount_distribution:
      operations: 0.25             # 25% (lower than mfg 45% - Hilti is less labor-intensive)
      sales_field_force: 0.30      # 30% (UNIQUE to Hilti - direct sales model)
      sales_customer_service: 0.10 # 10%
      rd: 0.08                     # 8% (higher than mfg 4% - innovation focus)
      supply_chain: 0.05           # 5%
      finance_admin: 0.07          # 7%
      hr: 0.03                     # 3%
      it_digital: 0.05             # 5% (higher than mfg 3% - digital strategy)
      marketing: 0.04              # 4%
      management: 0.01             # 1%
      other: 0.02                  # 2%

    # Function growth rates (relative to headcount growth)
    function_growth_multipliers:
      operations: 0.7              # Grows slower (automation, lean manufacturing)
      sales_field_force: 1.0       # Grows at company rate (core model)
      it_digital: 1.8              # Grows fastest (digital transformation)
      rd: 1.4                      # Grows fast (innovation pipeline)
      supply_chain: 1.1            # Grows faster (global complexity)

    payroll_cost_per_fte: 75000    # EUR annual avg (higher than mfg 60K - premium talent)

  # Capex Patterns (Hilti-specific)
  capex:
    total_capex_to_revenue: 0.04
    categories:
      - name: "Production Equipment & Tooling"
        share: 0.30
        roi_years: 5
      - name: "Digital/IT & Software Development"
        share: 0.25
        roi_years: 3
        note: "Fieldwire, ON!Track, PROFIS, Nuron platform"
      - name: "R&D Labs & Testing"
        share: 0.15
        roi_years: 4
      - name: "Maintenance & Replacement"
        share: 0.15
        roi_years: 2
      - name: "Sales Infrastructure & Fleet"
        share: 0.10
        roi_years: 3
        note: "Vehicle fleet, Hilti Centers, demo equipment"
      - name: "Sustainability & Energy"
        share: 0.05
        roi_years: 6

  # Model-Specific Parameters
  model_parameters:
    # CLV/CAC (B2B Direct Sales)
    clv:
      avg_customer_lifetime_years: 12   # Higher than mfg template (8) - direct relationship
      annual_revenue_per_customer: 15000  # EUR (professional contractors, smaller ticket)
      retention_rate: 0.92               # Very high - Fleet Management lock-in
      fleet_management_penetration: 0.35 # 35% of revenue via subscription

    cac:
      sales_cycle_months: 2             # Shorter than mfg template (6) - field sales efficiency
      cost_per_acquisition: 3000        # Lower than B2B avg due to field sales model

    # Monte Carlo
    monte_carlo:
      revenue_volatility: 0.06          # Lower than mfg template (0.08) - subscription stabilizes
      cost_volatility: 0.04             # Lower than mfg template (0.05) - direct cost control
      correlation_revenue_cost: 0.25

    # Valuation
    valuation:
      wacc: 0.07                        # Lower risk due to trust ownership, premium position
      terminal_growth: 0.025            # Slightly above mfg template (0.02)
      ev_ebitda_multiple: 14.0          # Premium to mfg template (8.0) - brand, services, growth

  # ESG Profile (Hilti-specific)
  esg:
    environmental_score: 70              # Above mfg template (60) - sustainability commitments
    social_score: 80                     # Well above mfg template (65) - Great Place to Work
    governance_score: 85                 # Well above mfg template (70) - trust structure

    key_metrics:
      carbon_intensity_tonnes_per_m_revenue: 20  # Lower than mfg template (50)
      recycling_rate: 0.50
      employee_safety_ltir: 1.5         # Better than mfg template (2.5)
      great_place_to_work_rank: "Consistently top 10 in Europe"

    sustainability_targets:
      - "Science-based targets (SBTi) committed"
      - "Nuron battery platform (lithium-ion, repairable, recyclable)"
      - "Fleet Management reduces tool waste"
      - "Carbon neutral operations target"

  # Risk Profile (Hilti-specific)
  risk_profile:
    key_risks:
      - "Construction cycle sensitivity (downturn risk)"
      - "Direct sales model cost in new markets"
      - "Battery technology disruption (Nuron platform bet)"
      - "Skilled labor shortage in construction (affects customers)"
      - "Raw material prices (steel, lithium, rare earths)"
      - "Software competition (Procore, PlanGrid/Autodesk)"
      - "Geopolitical risks in AMET region"

    key_opportunities:
      - "Fleet Management expansion (SaaS-like recurring revenue)"
      - "Construction digitalization (Fieldwire, BIM)"
      - "Infrastructure investment cycles (US, EU, Middle East)"
      - "Fire protection regulation tightening"
      - "Emerging market urbanization (India, SE Asia, Africa)"

    beta: 0.9                    # Lower than mfg template (1.1) - defensive, premium
    credit_rating: "A"           # Better than mfg template (BBB) - trust-owned, low debt

metadata:
  version: "1.0.0"
  created: "2026-02-19"
  template_source: "manufacturing.yaml v1.0.0"
  hilti_adjustments:
    - "Higher margins (16% EBITDA vs 10% template) - premium + direct sales"
    - "Different headcount distribution (30% sales force vs 12% template)"
    - "Higher CLV lifetime (12y vs 8y) - direct relationships"
    - "Lower volatility - subscription model (Fleet Management)"
    - "Higher EV/EBITDA (14x vs 8x) - brand premium, growth"
    - "Higher R&D intensity (8% vs 4% template)"
  note: "Values are estimates based on public information. Update with actual Hilti data when available."
