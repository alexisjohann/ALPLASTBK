metadata:
  name: "Graubünden MACRO-Kontext"
  code: "GR-MACRO"
  version: "1.0"
  last_updated: "2026-02-25"
  total_factors: 42
  sub_axes: 6
  description: |
    GR-spezifische Kontextfaktoren, die über den nationalen CH-MACRO
    hinausgehen. Graubünden hat als grösster Kanton mit Tourismus-Dominanz,
    dezentraler Talstruktur und starker regionaler Identität signifikante
    Abweichungen vom CH-Durchschnitt.
  parent_context: "data/dr-datareq/sources/context/ch/BCM2_04_KON_*.yaml"
  customer_link: "data/customers/gkb/gkb_context_master_overview.yaml"
  project_link: "GKB MABE 2030 - Marktbearbeitungsstrategie Generation X"

  data_sources:
    primary:
      - name: "Amt für Wirtschaft und Tourismus Graubünden (AWT)"
        url: "https://www.awt.gr.ch"
      - name: "Bundesamt für Statistik (BFS) - Kanton GR"
        url: "https://www.bfs.admin.ch"
      - name: "Graubünden Ferien"
        url: "https://www.graubuenden.ch"
    secondary:
      - name: "Wüest Partner (Immobilien)"
        url: "https://www.wuestpartner.com"
      - name: "Kanton Graubünden Statistik"
        url: "https://www.gr.ch/statistik"
      - name: "Schweizerischer Tourismus-Verband (STV)"
        url: "https://www.stv-fst.ch"

  behavioral_relevance:
    regional_identity: 0.90
    tourism_dependency: 0.85
    geographic_isolation: 0.80
    seasonal_patterns: 0.75

# =============================================================================
# Zusammenfassung
# =============================================================================
summary:
  trends:
    steigend: 18
    fallend: 10
    stabil: 8
    saisonal: 6
  uncertainty:
    gering: 15
    mittel: 20
    hoch: 7
  key_insight: |
    Graubünden ist ein «Sonderkanton»: Grösste Fläche, dünnste Besiedlung,
    höchste Tourismus-Abhängigkeit, stärkste regionale Identität.
    Für GKB bedeutet das: Verhaltensparameter weichen systematisch
    vom CH-Durchschnitt ab (τ_REGIONAL = 0.85, ι_GR = 0.85).

# =============================================================================
# GR-DEM – Demografie Graubünden (8 Faktoren)
# =============================================================================
GR_DEM:
  name: "Demografie Graubünden"
  description: "Bevölkerungsstruktur und -dynamik im Kanton GR"
  factor_count: 8
  factors:
    - id: GR-DEM-01
      name: "Wohnbevölkerung GR"
      definition: "Ständige Wohnbevölkerung Kanton Graubünden"
      trend: "steigend"
      uncertainty: "gering"
      values:
        2020: 200096
        2023: 204856
        2024: 206138
        2025_est: 208000
        2030_est: 215000
      unit: "Personen"
      source: "BFS STATPOP / Kanton GR"
      delta_ch: "2.3% der CH-Bevölkerung (unterdurchschnittlich)"

    - id: GR-DEM-02
      name: "Bevölkerungswachstum GR"
      definition: "Jährliche Veränderung Wohnbevölkerung GR"
      trend: "steigend"
      uncertainty: "mittel"
      values:
        2020: 0.8
        2023: 1.0
        2024: 1.2
      unit: "% p.a."
      source: "BFS STATPOP"
      delta_ch: "Leicht über CH-Durchschnitt (0.68%), Aufholeffekt"

    - id: GR-DEM-03
      name: "Bevölkerungsdichte GR"
      definition: "Einwohner pro km² im Kanton GR"
      trend: "stabil"
      uncertainty: "gering"
      values:
        2024: 29
      unit: "Einwohner/km²"
      source: "BFS"
      delta_ch: "Massiv unter CH-Durchschnitt (220/km²). Faktor 7.6× dünner besiedelt."
      behavioral_implication: |
        Dezentrale Versorgung kritisch. Filial-Netz der GKB (45 Standorte)
        hat strategische Bedeutung. Digital-Hybrid-Modell zwingend.

    - id: GR-DEM-04
      name: "Ausländeranteil GR"
      definition: "Anteil ausländische Staatsangehörige an Wohnbevölkerung"
      trend: "steigend"
      uncertainty: "gering"
      values:
        2020: 19.5
        2024: 21.2
      unit: "%"
      source: "BFS STATPOP"
      delta_ch: "Unter CH-Durchschnitt (26.5%). Homogenere Bevölkerung."

    - id: GR-DEM-05
      name: "Altersquotient GR"
      definition: "Verhältnis 65+ zu 20-64-Jährige"
      trend: "steigend"
      uncertainty: "gering"
      values:
        2020: 34.2
        2024: 36.8
        2030_est: 42.0
      unit: "%"
      source: "BFS Szenarien"
      delta_ch: "Über CH-Durchschnitt. GR altert schneller als CH."
      behavioral_implication: |
        Vorsorge- und Erbschaftsplanung überproportional relevant.
        GenX-Kohorte (45-60J) ist die letzte grosse «Vollverdiener-Generation».

    - id: GR-DEM-06
      name: "GenX-Anteil GR (45-60 Jahre)"
      definition: "Anteil der 45-60-Jährigen an der GR-Bevölkerung"
      trend: "stabil"
      uncertainty: "mittel"
      values:
        2024: 22.5
        2024_absolut: 46400
      unit: "%"
      source: "BFS Altersstruktur GR, Schätzung"
      delta_ch: "Leicht über CH-Durchschnitt. Zielgruppe MABE 2030 = ~25'000 GKB-Kunden."

    - id: GR-DEM-07
      name: "Mehrsprachigkeit GR"
      definition: "Anteil der Bevölkerung mit Romanisch oder Italienisch als Erstsprache"
      trend: "fallend"
      uncertainty: "mittel"
      values:
        romanisch: 14.0
        italienisch: 10.0
        deutsch: 76.0
      unit: "%"
      source: "BFS Strukturerhebung"
      behavioral_implication: |
        Drei Amtssprachen = drei Kommunikationsstrategien.
        GKB-Kommunikation muss sprachlich segmentiert werden.

    - id: GR-DEM-08
      name: "Wegzugsrate Junge (20-30J)"
      definition: "Netto-Abwanderung der 20-30-Jährigen aus GR"
      trend: "stabil"
      uncertainty: "mittel"
      values:
        2024_est: -2.5
      unit: "% p.a. (Netto)"
      source: "BFS Wanderungsstatistik, Schätzung"
      delta_ch: "Typisch für alpine Kantone. Brain Drain in Zentren (ZH, BE)."
      behavioral_implication: |
        Eltern (GenX) finanzieren oft Kinder im Unterland.
        Familien-Finanzierung ist relevanter Use Case (UC-GKB-004).

# =============================================================================
# GR-TOU – Tourismus-Ökonomie (8 Faktoren)
# =============================================================================
GR_TOU:
  name: "Tourismus-Ökonomie Graubünden"
  description: "Tourismus als dominanter Wirtschaftsfaktor in GR"
  factor_count: 8
  factors:
    - id: GR-TOU-01
      name: "Hotelübernachtungen GR"
      definition: "Jährliche Hotelübernachtungen (Logiernächte) im Kanton GR"
      trend: "steigend"
      uncertainty: "mittel"
      values:
        2019: 5200000
        2023: 5400000
        2024: 5500000
      unit: "Logiernächte"
      source: "BFS HESTA / Graubünden Ferien"
      delta_ch: "GR = #2 nach Bern für Hotelübernachtungen"

    - id: GR-TOU-02
      name: "Gesamtübernachtungen GR"
      definition: "Alle Übernachtungen inkl. Zweitwohnungen, Ferienwohnungen, Camping"
      trend: "steigend"
      uncertainty: "mittel"
      values:
        2024: 19100000
      unit: "Übernachtungen"
      source: "AWT Graubünden"
      behavioral_implication: |
        19.1 Mio Übernachtungen bei 206k Einwohnern = 93× Einwohnerzahl.
        Tourismus dominiert die Wirtschaft komplett.

    - id: GR-TOU-03
      name: "Tourismus-Anteil am BIP GR"
      definition: "Anteil des Tourismus an der kantonalen Bruttowertschöpfung"
      trend: "stabil"
      uncertainty: "mittel"
      values:
        2024: 30
      unit: "%"
      source: "AWT Graubünden, Schätzung"
      delta_ch: "CH-Durchschnitt ~3%. GR ist 10× tourismusabhängiger."
      behavioral_implication: |
        Saisonale Einkommensschwankungen für KMU und Selbständige.
        GKB muss saisonale Liquiditätsmuster berücksichtigen.

    - id: GR-TOU-04
      name: "Hotelbetriebe GR"
      definition: "Anzahl klassifizierte Hotelbetriebe im Kanton GR"
      trend: "fallend"
      uncertainty: "gering"
      values:
        2024: 654
      unit: "Betriebe"
      source: "BFS HESTA"
      delta_ch: "Konsolidierungstrend. Weniger, aber grössere Betriebe."

    - id: GR-TOU-05
      name: "Hotelbetten GR"
      definition: "Gesamtzahl verfügbare Hotelbetten im Kanton GR"
      trend: "stabil"
      uncertainty: "gering"
      values:
        2024: 46000
      unit: "Betten"
      source: "BFS HESTA"

    - id: GR-TOU-06
      name: "Saisonalitätsindex GR"
      definition: "Verhältnis Hochsaison zu Nebensaison (Übernachtungen)"
      trend: "stabil"
      uncertainty: "mittel"
      values:
        winter_share: 45
        summer_share: 40
        shoulder_share: 15
      unit: "%"
      source: "AWT Graubünden, Schätzung"
      behavioral_implication: |
        Starke Saisonalität beeinflusst Kreditbedarf und Liquiditätsplanung.
        Winter- und Sommersaison sind fast gleichgewichtig.

    - id: GR-TOU-07
      name: "Tourismus-Herkunft International"
      definition: "Anteil internationaler Gäste an Hotelübernachtungen"
      trend: "steigend"
      uncertainty: "mittel"
      values:
        schweiz: 52
        deutschland: 18
        andere_eu: 15
        uebrige: 15
      unit: "%"
      source: "BFS HESTA"
      delta_ch: "Stärkere Inlandabhängigkeit als CH-Durchschnitt."

    - id: GR-TOU-08
      name: "Tourismus-Investitionsbedarf"
      definition: "Jährlicher Investitionsbedarf in touristische Infrastruktur"
      trend: "steigend"
      uncertainty: "hoch"
      values:
        2024_est: 500
      unit: "CHF Mio."
      source: "STV, Schätzung"
      behavioral_implication: |
        Hoher Investitionsbedarf = Finanzierungsbedarf.
        GKB als regionaler Kreditgeber für Tourismus-KMU zentral.

# =============================================================================
# GR-ECO – Regionale Wirtschaft (7 Faktoren)
# =============================================================================
GR_ECO:
  name: "Regionale Wirtschaft Graubünden"
  description: "Wirtschaftsstruktur und -leistung des Kantons GR"
  factor_count: 7
  factors:
    - id: GR-ECO-01
      name: "BIP pro Kopf GR"
      definition: "Bruttoinlandsprodukt pro Einwohner im Kanton GR"
      trend: "steigend"
      uncertainty: "mittel"
      values:
        2024_est: 72000
      unit: "CHF"
      source: "BFS VGR / Schätzung"
      delta_ch: "~10% unter CH-Durchschnitt (CHF 82'000). Tourismusbasiert."

    - id: GR-ECO-02
      name: "Wirtschaftliche Konzentration Plessur"
      definition: "Anteil der Region Plessur (Chur) am kantonalen BIP"
      trend: "steigend"
      uncertainty: "mittel"
      values:
        2024: 29.1
      unit: "%"
      source: "BFS / AWT GR"
      behavioral_implication: |
        Fast ein Drittel der Wirtschaftsleistung in der Region Chur.
        Periphere Täler sind wirtschaftlich abhängig vom Tourismus.

    - id: GR-ECO-03
      name: "KMU-Anteil GR"
      definition: "Anteil der Unternehmen mit <250 Mitarbeitenden"
      trend: "stabil"
      uncertainty: "gering"
      values:
        2024: 99.5
      unit: "%"
      source: "BFS STATENT"
      delta_ch: "Nahezu identisch mit CH (99.7%). Aber: Kleiner-KMU-dominiert."
      behavioral_implication: |
        Micro-KMU (<10 MA) dominieren. Inhabergeführt, emotional gebunden.
        Direkt relevant für UC-GKB-001 (Unternehmer Bank-Trennung).

    - id: GR-ECO-04
      name: "Wasserkraft-Ertrag GR"
      definition: "Jährliche Einnahmen des Kantons aus Wasserkraftkonzessionen"
      trend: "steigend"
      uncertainty: "mittel"
      values:
        2024_est: 120
      unit: "CHF Mio."
      source: "Kanton GR Rechnung, Schätzung"
      behavioral_implication: |
        Wasserkraft als «zweite Säule» neben Tourismus.
        Stabile Einnahmen für Kanton = Staatsgarantie für GKB gestärkt.

    - id: GR-ECO-05
      name: "Arbeitslosenquote GR"
      definition: "Registrierte Arbeitslosenquote im Kanton GR"
      trend: "stabil"
      uncertainty: "gering"
      values:
        2024: 1.2
      unit: "%"
      source: "SECO Arbeitsmarktstatistik"
      delta_ch: "Deutlich unter CH-Durchschnitt (2.0%). Quasi-Vollbeschäftigung."
      behavioral_implication: |
        Tiefer Arbeitsmarktdruck = hohe Jobsicherheit.
        Reduziert Verlustangst (λ), erhöht Investitionsbereitschaft.

    - id: GR-ECO-06
      name: "Branchenstruktur GR"
      definition: "Verteilung der Beschäftigung nach Wirtschaftssektoren"
      trend: "stabil"
      uncertainty: "gering"
      values:
        primaer: 3.5
        sekundaer: 18.0
        tertiaer: 78.5
      unit: "%"
      source: "BFS STATENT"
      delta_ch: "Primärsektor über CH-Schnitt (1.3%). Tourismus treibt Tertiär."

    - id: GR-ECO-07
      name: "Medianlohn GR"
      definition: "Bruttomedianlohn (Vollzeitstellen) im Kanton GR"
      trend: "steigend"
      uncertainty: "mittel"
      values:
        2022: 6200
        2024_est: 6500
      unit: "CHF/Monat"
      source: "BFS LSE, Schätzung"
      delta_ch: "~5% unter CH-Median (CHF 6'788). Lebenshaltung aber auch tiefer."

# =============================================================================
# GR-IMM – Immobilien & Zweitwohnungen (7 Faktoren)
# =============================================================================
GR_IMM:
  name: "Immobilien & Zweitwohnungen Graubünden"
  description: "Immobilienmarkt und Zweitwohnungssituation in GR"
  factor_count: 7
  factors:
    - id: GR-IMM-01
      name: "Zweitwohnungen GR"
      definition: "Gesamtzahl Zweitwohnungen im Kanton GR"
      trend: "stabil"
      uncertainty: "mittel"
      values:
        2024: 80000
      unit: "Wohnungen"
      source: "ARE / Kanton GR"
      behavioral_implication: |
        80'000 Zweitwohnungen bei 206k Einwohnern = fast 1 Zweitwohnung
        pro 2.5 Einwohner. MASSIVES Hypothekenpotenzial.
        Direkt relevant für UC-GKB-002 (Zweitwohnungsbesitzer).

    - id: GR-IMM-02
      name: "Durchschnittspreis Immobilien GR"
      definition: "Durchschnittlicher Quadratmeterpreis Wohneigentum GR"
      trend: "steigend"
      uncertainty: "mittel"
      values:
        2023: 8170
        2024: 8737
        growth_2024: 6.9
      unit: "CHF/m²"
      source: "Wüest Partner / Raiffeisen Immobilienmonitor"
      delta_ch: "Deutlich unter CH-Schnitt (CHF 10'500), aber stark steigend."

    - id: GR-IMM-03
      name: "Leerwohnungsziffer GR"
      definition: "Anteil leerstehende Mietwohnungen am Gesamtbestand"
      trend: "fallend"
      uncertainty: "gering"
      values:
        2024: 0.57
      unit: "%"
      source: "BFS Leerwohnungszählung"
      delta_ch: "Fast Hälfte des CH-Durchschnitts (1.08%). Sehr angespannter Markt."
      behavioral_implication: |
        Knappe Verfügbarkeit erhöht Kaufbereitschaft.
        Stärkere Loss Aversion bei bestehenden Eigentümern.

    - id: GR-IMM-04
      name: "Durchschnittliches Hypothekarvolumen Zweitwohnung GR"
      definition: "Mittleres Hypothekarvolumen für Ferienliegenschaften in GR"
      trend: "steigend"
      uncertainty: "mittel"
      values:
        2024_est: 650000
      unit: "CHF"
      source: "GKB Use Case Daten / Schätzung"
      behavioral_implication: |
        Bei 80k Zweitwohnungen und 15% GKB-Marktanteil:
        Aktuell ~12k Hypotheken. Target: 24k (+100%).
        Revenue-Impact: CHF 7.8 Mrd potentielles Hypothekarvolumen.

    - id: GR-IMM-05
      name: "GKB Hypothekar-Marktanteil Ferienliegenschaften"
      definition: "Marktanteil GKB bei Hypotheken für Ferienliegenschaften in GR"
      trend: "stabil"
      uncertainty: "mittel"
      values:
        current: 15
        target: 30
      unit: "%"
      source: "GKB Use Case UC-GKB-002"
      delta_ch: "Deutlich unter GKB Gesamtmarktanteil (45%). Hausbank-Problem."

    - id: GR-IMM-06
      name: "Jährliche Zweitwohnungs-Investition pro Objekt"
      definition: "Durchschnittliche jährliche Investition pro Zweitwohnung in GR"
      trend: "steigend"
      uncertainty: "hoch"
      values:
        2024: 11600
      unit: "CHF/Jahr"
      source: "AWT Graubünden / HotellerieSuisse"
      behavioral_implication: |
        CHF 11'600 × 80'000 = CHF 928 Mio jährliche Investitionen.
        Finanzierungsbedarf über Lombardkredite, Renovationshypotheken.

    - id: GR-IMM-07
      name: "Zweitwohnungs-Initiative Effekt"
      definition: "Auswirkung der Zweitwohnungsinitiative (2012) auf Neubau"
      trend: "stabil"
      uncertainty: "gering"
      values:
        gemeinden_ueber_20pct: 56
        neubau_zweitwohnung_erlaubt: false
        bestand_geschuetzt: true
      unit: "Status"
      source: "ARE / Kanton GR"
      behavioral_implication: |
        Keine neuen Zweitwohnungen in 56 Gemeinden. Bestand wird wertvoller.
        Verstärkt Renovierungs- und Umbau-Finanzierungsbedarf.

# =============================================================================
# GR-KUL – Kulturelle Identität (6 Faktoren)
# =============================================================================
GR_KUL:
  name: "Kulturelle Identität Graubünden"
  description: "Regionale Identität, Werte und kulturelle Besonderheiten"
  factor_count: 6
  factors:
    - id: GR-KUL-01
      name: "Regionale Identifikation"
      definition: "Stärke der Identifikation mit dem Kanton Graubünden (vs. Schweiz)"
      trend: "stabil"
      uncertainty: "mittel"
      values:
        identifikation_gr: 0.85
        identifikation_ch: 0.75
      unit: "Score [0-1]"
      source: "EBF LLMMC Prior / ESS-analoger Wert"
      behavioral_implication: |
        Sehr hohe regionale Identifikation.
        ι_GR = 0.85 → GKB profitiert als «Unseri Bank».
        In-Group Preference für regionale Anbieter.

    - id: GR-KUL-02
      name: "Vertrauen in Staatsgarantie"
      definition: "Vertrauensniveau der GR-Bevölkerung in die kantonale Staatsgarantie"
      trend: "stabil"
      uncertainty: "gering"
      values:
        trust_score: 0.95
      unit: "Score [0-1]"
      source: "EBF behavioral parameter τ_STAATSGARANTIE"
      behavioral_implication: |
        Staatsgarantie ist stärkstes Vertrauenssignal.
        τ = 0.95 → Fast perfekter Vertrauenstransfer auf GKB.
        Reduziert Wechselneigung massiv (Switching Cost τ = 0.70).

    - id: GR-KUL-03
      name: "Traditions-Affinität"
      definition: "Bedeutung von Tradition und Kontinuität in GR"
      trend: "stabil"
      uncertainty: "mittel"
      values:
        tradition_score: 0.82
      unit: "Score [0-1]"
      source: "EBF LLMMC Prior / WVS-analoger Wert"
      behavioral_implication: |
        Hohe Traditionsbindung verstärkt Status-Quo-Bias.
        GKB seit 1870 = 156 Jahre Tradition = starker Anker.
        Aber: Kann auch Innovation bremsen (Digital Adoption).

    - id: GR-KUL-04
      name: "Gemeinschaftsorientierung"
      definition: "Stärke des Gemeinschaftssinns und der Nachbarschaftshilfe"
      trend: "stabil"
      uncertainty: "mittel"
      values:
        community_score: 0.80
      unit: "Score [0-1]"
      source: "EBF LLMMC Prior"
      behavioral_implication: |
        Soziale Normen sind starker Hebel.
        «Peer Effects» in Gemeinden funktionieren besser als in Städten.
        Word-of-Mouth und lokale Empfehlungen sind zentral.

    - id: GR-KUL-05
      name: "Hybrid-Kanal-Präferenz"
      definition: "Präferenz für Kombination digital/persönliche Beratung"
      trend: "steigend"
      uncertainty: "mittel"
      values:
        hybrid: 0.55
        nur_persoenlich: 0.30
        nur_digital: 0.15
      unit: "Anteil"
      source: "EBF behavioral parameter σ_HYBRID / LLMMC Prior"
      behavioral_implication: |
        Noch stärkere Präferenz für persönlichen Kontakt als CH-Durchschnitt.
        Aber: Hybrid steigt. GKB-App-Nutzung wächst.
        Beratungsgespräch bleibt zentral für Lebensmitte-Check.

    - id: GR-KUL-06
      name: "Sprachregionale Unterschiede"
      definition: "Verhaltensdifferenzen zwischen deutsch-, romanisch- und italienischsprachiger GR"
      trend: "stabil"
      uncertainty: "hoch"
      values:
        deutsch_traditionell: 0.75
        romanisch_gemeinschaft: 0.90
        italienisch_flexibel: 0.65
      unit: "Score Traditionsbindung [0-1]"
      source: "EBF LLMMC Prior"
      behavioral_implication: |
        Romanisch-sprachige Regionen: Stärkere Gemeinschaftsbindung.
        Italienisch-sprachige (Puschlav, Misox): Flexibler, offener.
        Segmentierung muss sprachregional differenzieren.

# =============================================================================
# GR-GEO – Geografische Besonderheiten (6 Faktoren)
# =============================================================================
GR_GEO:
  name: "Geografische Besonderheiten Graubünden"
  description: "Topografie, Erreichbarkeit und räumliche Struktur"
  factor_count: 6
  factors:
    - id: GR-GEO-01
      name: "Kantonsfläche"
      definition: "Gesamtfläche des Kantons GR (grösster Kanton der Schweiz)"
      trend: "stabil"
      uncertainty: "gering"
      values:
        2024: 7105
      unit: "km²"
      source: "BFS"
      delta_ch: "17.2% der CH-Fläche. Grösster Kanton. 1/6 der Schweiz."

    - id: GR-GEO-02
      name: "Anzahl Gemeinden"
      definition: "Politische Gemeinden im Kanton GR"
      trend: "fallend"
      uncertainty: "gering"
      values:
        2024: 101
      unit: "Gemeinden"
      source: "Kanton GR"
      behavioral_implication: |
        101 Gemeinden, davon viele Kleinstgemeinden.
        GKB mit 45 Standorten deckt nahezu alle Talschaften ab.
        Dezentrale Präsenz = Wettbewerbsvorteil gegenüber Grossbanken.

    - id: GR-GEO-03
      name: "Anzahl Täler"
      definition: "Grosse Täler und Talschaften in GR"
      trend: "stabil"
      uncertainty: "gering"
      values:
        haupttaeler: 11
        seitentaeler: 39
      unit: "Täler"
      source: "Kanton GR / Geografie"
      behavioral_implication: |
        150 Seitentäler → extreme Dezentralität.
        Jedes Tal hat eigene Mikro-Identität.
        GKB muss Kommunikation talspezifisch anpassen.

    - id: GR-GEO-04
      name: "Durchschnittliche Höhenlage Siedlungen"
      definition: "Mittlere Höhenlage der bewohnten Siedlungen in GR"
      trend: "stabil"
      uncertainty: "gering"
      values:
        durchschnitt: 1200
        minimum: 260
        maximum: 2126
      unit: "m ü.M."
      source: "BFS / Kanton GR"
      delta_ch: "CH-Schnitt ~540 m. GR doppelt so hoch gelegen."

    - id: GR-GEO-05
      name: "Erreichbarkeit Zentren"
      definition: "Durchschnittliche Fahrzeit zum nächsten regionalen Zentrum"
      trend: "stabil"
      uncertainty: "mittel"
      values:
        durchschnitt_min: 35
        max_peripher_min: 90
      unit: "Minuten (PKW)"
      source: "ARE Erreichbarkeitsmodell, Schätzung"
      behavioral_implication: |
        35 min durchschnittlich = deutlich über CH (15 min).
        Digitale Kanäle sind in peripheren Tälern nicht «nice-to-have»
        sondern essenziell. Hybrid-Modell zwingend.

    - id: GR-GEO-06
      name: "GKB Filial-Abdeckung"
      definition: "Anteil der GR-Bevölkerung mit GKB-Filiale innerhalb 20 Minuten"
      trend: "stabil"
      uncertainty: "mittel"
      values:
        abdeckung_20min: 85
        abdeckung_30min: 95
      unit: "%"
      source: "GKB Filialstrategie, Schätzung"
      behavioral_implication: |
        85% innerhalb 20 Minuten = hervorragende Abdeckung.
        Verbleibende 15% = Digital-Priorität.
        Kein Wettbewerber hat vergleichbare physische Präsenz.

