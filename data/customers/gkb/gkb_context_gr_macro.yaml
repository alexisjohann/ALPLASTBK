mabe_2030_relevance:
  description: |
    Dieser Kontextvektor ist die MACRO-Grundlage für das MABE 2030 Projekt.
    Er definiert den Rahmen, in dem die GenX-Interventionen wirken.

  key_implications:
    - area: "Schlüsselereignis-Ranking (F1)"
      factors: ["GR-DEM-05", "GR-DEM-08", "GR-IMM-01"]
      implication: |
        Vorsorge und Erbschaft sind in GR durch schnellere Alterung noch
        dringlicher als im CH-Schnitt. Kinder im Unterland = Familien-
        Finanzierung als Schlüsselereignis.

    - area: "Motivationstyp-Profile (F2)"
      factors: ["GR-KUL-01", "GR-KUL-03", "GR-KUL-06"]
      implication: |
        Stärkere Gewichtung von Tradition und Gemeinschaft.
        «Dynastiewahrer» und «Passiver Erbe» Segmente grösser als anderswo.
        Sprachregionale Differenzierung bei Ansprache nötig.

    - area: "Verhaltenshürden-Diagnose (F3)"
      factors: ["GR-ECO-03", "GR-TOU-03", "GR-KUL-05"]
      implication: |
        KMU-Inhaber haben Tourismus-bedingte Liquiditätsschwankungen.
        Mental Accounting verstärkt durch saisonale Einkommensmuster.
        Persönlicher Beratungskontakt ist Non-Negotiable.

  missing_layers_for_model_s:
    - layer: "INDIVIDUAL (GenX-Kohorten)"
      status: "PENDING"
      factors_needed: 90
      description: "3 Kohorten: Vor-Pensionäre, Pensionsplaner, Vermögensaufbauer"

    - layer: "META (Schlüsselereignis-Architektur)"
      status: "PENDING"
      factors_needed: 80
      description: "Lebensereignisse mit Entscheidungsarchitektur-Parametern"

