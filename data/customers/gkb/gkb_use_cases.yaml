    summary:
      current_revenue_per_customer: 7600
      potential_revenue_per_customer: 21300
      growth_absolute_chf: 13700
      growth_percent: 180

    top_intervention:
      name: "Lebensmitte-Check"
      description: |
        Strukturiertes 90-Minuten-Beratungsgespräch zu allen Lebensbereichen
        mit Handlungsempfehlungen und Follow-up-Roadmap.
      10C_targets: [AWARE, WHAT, HOW, STAGE]
      expected_revenue_increase: 8500

# =============================================================================
# CROSS-CASE INSIGHTS
# =============================================================================

cross_case_insights:

  common_patterns:
    - pattern: "Proaktivität entscheidend"
      cases: [UC-GKB-002, UC-GKB-003, UC-GKB-004]
      insight: "GKB wartet oft, bis Kunden kommen - Konkurrenz ist schneller"

    - pattern: "Mental Accounting durchgängig"
      cases: [UC-GKB-001, UC-GKB-004]
      insight: "Kunden haben kognitive Silos, GKB hat Produkt-Silos"

    - pattern: "Timing ist kritisch"
      cases: [UC-GKB-002, UC-GKB-003]
      insight: "Fenster für Beziehungsaufbau ist kurz und früh"

    - pattern: "Segment-Differenzierung unterentwickelt"
      cases: [UC-GKB-001, UC-GKB-002, UC-GKB-004]
      insight: "One-size-fits-all funktioniert nicht, Segmente brauchen spezifische Ansprache"

  strategic_recommendation: |
    GKB sollte von reaktiver zu proaktiver Kundenansprache wechseln.
    Die Bank hat alle Voraussetzungen (Vertrauen, Präsenz, Produkte) -
    aber die Konkurrenz ist schneller beim Kunden.

    Priorität 1: Timing verbessern (Zweitwohnungen, Plattform-Kunden)
    Priorität 2: Ganzheitliche Beratung (Gen X, Unternehmer)
    Priorität 3: Segmentierung schärfen (alle Use Cases)

