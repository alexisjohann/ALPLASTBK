# =============================================================================
# USE CASE OVERVIEW
# =============================================================================

use_cases:

  # ---------------------------------------------------------------------------
  # USE CASE 1: Unternehmer Bank-Trennung
  # ---------------------------------------------------------------------------
  UC-GKB-001:
    case_registry_id: CAS-886
    title: "Unternehmer Bank-Trennung"
    subtitle: "Mental Accounting bei KMU-Inhabern"

    problem_statement: |
      Graubündner KMU-Inhaber trennen systematisch Vermögenswerte und
      Kredite auf verschiedene Bankinstitute - obwohl dies wirtschaftlich
      suboptimal ist.

    key_insight: |
      Mental Accounting ist Haupttreiber (35%): "Vermögen = Sicherheit"
      vs "Kredit = Risiko" - kognitive Trennung verhindert rationale
      Gesamtbetrachtung.

    segments:
      - name: "Passiver Erbe"
        share: 0.35
        driver: "Gewohnheit, tradierte Muster"
        intervention: "Education, Bewusstmachung"
      - name: "Dynastiewahrer"
        share: 0.25
        driver: "Kontrolle, Familienvermögen schützen"
        intervention: "Transparenz-Tools, Reporting"
      - name: "Rationaler Optimierer"
        share: 0.20
        driver: "Konditionenvergleich"
        intervention: "Best-Price-Garantie"
      - name: "Festungsbauer"
        share: 0.20
        driver: "Verlustangst, Worst-Case-Denken"
        intervention: "Garantie-Narrative, Staatsgarantie"

    interventions:
      - id: INT-GKB-001-A
        name: "Mental Accounting Sichtbarmachung"
        description: "Visualisierung der versteckten Kosten durch Trennung"
        10C_target: AWARE
        expected_effect: "+15% Konsolidierung"
      - id: INT-GKB-001-B
        name: "Alles-aus-einer-Hand CHF-Rechner"
        description: "Konkrete CHF-Beträge für Gesamtbeziehungsvorteil"
        10C_target: WHAT
        expected_effect: "+20% Interesse"
      - id: INT-GKB-001-C
        name: "Segment-spezifische Narrative"
        description: "Angepasste Kommunikation pro Segment"
        10C_target: HOW
        expected_effect: "+25% Conversion"

    metrics:
      current_separation_rate: 0.65
      target_separation_rate: 0.40
      revenue_impact_per_customer: 2500
      estimated_customers_affected: 1200

  # ---------------------------------------------------------------------------
  # USE CASE 2: Zweitwohnungsbesitzer
  # ---------------------------------------------------------------------------
  UC-GKB-002:
    case_registry_id: CAS-887
    title: "Zweitwohnungsbesitzer"
    subtitle: "Hausbank-Loyalität vs. Lokale Expertise"

    problem_statement: |
      >80'000 Zweitwohnungen in Graubünden, aber GKB-Hypothekenwachstum
      bei Ferienliegenschaften unterdurchschnittlich. Die Hausbank im
      Unterland macht das Geschäft.

    key_insight: |
      GKB kommt zu spät - Kunden kontaktieren ihre Hausbank VOR dem
      Ferienhauskauf. Switching Costs (τ=0.70) verhindern späteren Wechsel.

    data_source: "Amt für Wirtschaft und Tourismus Graubünden"

    market_data:
      total_second_homes: 80000
      gkb_market_share_current: 0.15
      gkb_market_share_target: 0.30
      avg_mortgage_volume: 650000

    segments:
      - name: "Convenience Seeker"
        share: 0.40
        behavior: "Bleibt bei Hausbank, will keinen Aufwand"
        intervention: "Proaktive Ansprache, One-Stop-Shop"
      - name: "Mountain Lover"
        share: 0.25
        behavior: "Emotionale Bindung an Region"
        intervention: "Lokale Expertise betonen, Community"
      - name: "Prestige Player"
        share: 0.20
        behavior: "Status, Premium wichtig"
        intervention: "Private Banking Angebot, Exklusivität"
      - name: "Legacy Builder"
        share: 0.15
        behavior: "Generationen-Denken, Weitergabe"
        intervention: "Familien-Paket, Erbschaftsplanung"

    interventions:
      - id: INT-GKB-002-A
        name: "Makler-Netzwerk Integration"
        description: "Frühzeitige Information über Kaufinteressenten"
        10C_target: WHEN
        expected_effect: "+30% Early Contact Rate"
      - id: INT-GKB-002-B
        name: "Lokale Expertise Kampagne"
        description: "Positioning als Graubünden-Spezialist"
        10C_target: WHAT
        expected_effect: "+20% Brand Preference"
      - id: INT-GKB-002-C
        name: "Ferienhaus-Paket"
        description: "Hypo + Versicherung + lokale Services"
        10C_target: HOW
        expected_effect: "+25% Abschlussrate"

  # ---------------------------------------------------------------------------
  # USE CASE 3: Plattform-Kunden Cross-Selling
  # ---------------------------------------------------------------------------
  UC-GKB-003:
    case_registry_id: CAS-888
    title: "Plattform-Kunden Cross-Selling"
    subtitle: "Von Hypo-Transaktion zu Vollbeziehung"

    problem_statement: |
      Hypotheken-Plattform-Kunden haben nur transaktionale Beziehung
      zur GKB. Ohne proaktive Intervention bleiben sie Single-Product-Kunden.

    key_insight: |
      Honeymoon-Phase (Monat 1-3) hat höchste Öffnungsrate für
      Beziehungsaufbau. Danach sinkt Engagement drastisch.

    customer_journey:
      - phase: "Welcome"
        timing: "Woche 1-4"
        intervention: "Welcome Journey mit Mehrwert-Kommunikation"
        conversion: 0.60
      - phase: "Personal Contact"
        timing: "Monat 2"
        intervention: "Telefonat mit konkretem Angebot"
        conversion: 0.40
      - phase: "Account Opening"
        timing: "Monat 3"
        intervention: "Kostenlose Kontoführung 2 Jahre"
        conversion: 0.50
      - phase: "Bundle Upgrade"
        timing: "Monat 6"
        intervention: "Mortgage-Plus: Versicherung + Vorsorge"
        conversion: 0.30
      - phase: "Pre-Renewal"
        timing: "18 Monate vor Ablauf"
        intervention: "Proaktive Refinanzierungsberatung"
        conversion: 0.70

    metrics:
      current_cross_sell_rate: 0.08
      target_cross_sell_rate: 0.25
      avg_additional_revenue: 1800
      platform_customers_annual: 500

  # ---------------------------------------------------------------------------
  # USE CASE 4: Generation X Revenue-Maximierung
  # ---------------------------------------------------------------------------
  UC-GKB-004:
    case_registry_id: CAS-889
    title: "Generation X Revenue-Maximierung"
    subtitle: "Von CHF 7'600 auf CHF 21'300 pro Kunde"

    problem_statement: |
      Gen X (45-60 Jahre) ist in Peak-Earning-Phase mit komplexen
      Bedürfnissen. Aktueller Share-of-Wallet bei GKB nur 35%,
      signifikantes Upselling-Potenzial ungenutzt.

    key_insight: |
      Gen X = "Sandwich Generation": Kinder finanzieren, Eltern pflegen,
      eigene Vorsorge. Braucht ganzheitliche Beratung, bekommt aber
      Produkt-Silos.

    gen_x_profile:
      age_range: "45-60 Jahre (Jahrgang 1965-1980)"
      characteristics:
        - "Peak Earning Phase"
        - "Sandwich Generation (Kinder + Eltern)"
        - "Komplexe Finanzplanung"
        - "Digital Immigrants"
        - "Delegations-affin bei guter Beratung"
      estimated_customers: 25000

    revenue_areas:
      existing:
        - area: "Hypotheken"
          current_chf: 3200
          potential_chf: 4700
          delta_chf: 1500
          intervention: "Refinanzierung, Lombard-Strategie"
        - area: "Lombardkredit"
          current_chf: 0
          potential_chf: 1300
          delta_chf: 1300
          intervention: "Proaktive Ansprache bei Vermögen"
        - area: "Vermögensverwaltung"
          current_chf: 2500
          potential_chf: 7000
          delta_chf: 4500
          intervention: "Advisory Upgrade, Mandate"
        - area: "Vorsorge 3a/3b"
          current_chf: 1200
          potential_chf: 1800
          delta_chf: 600
          intervention: "Maximierung, Säule 3b"
        - area: "Zahlungsverkehr/Karten"
          current_chf: 700
          potential_chf: 1100
          delta_chf: 400
          intervention: "Premium-Karten, Zusatzservices"

      new_areas:
        - area: "Erbschafts- & Nachlassplanung"
          potential_chf: 1500
          rationale: "Komplexe Familiensituationen, Steuern"
          intervention: "Lebensmitte-Check mit Notar-Netzwerk"
        - area: "Immobilien-Dienstleistungen"
          potential_chf: 2000
          rationale: "Über Hypothek hinaus: Bewertung, Renovation"
          intervention: "Real Estate Hub mit Partnern"
        - area: "Steueroptimierungs-Beratung"
          potential_chf: 800
