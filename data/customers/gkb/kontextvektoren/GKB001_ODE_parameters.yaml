metadata:
  model_id: GKB001-ODE-v1.0
  model_name: Digital Transformation & Customer Deepening Behavior Dynamics
  created: '2026-02-16'
  method: LLMMC + Bayesian Update (from CVA + Strategy Context)
  context_factors_used: 350
  literature_sources: 10
  session_ref: EBF-S-2026-02-16-FIN-001
utility_growth_rates:
  alpha_F:
    name: Financial Utility Growth
    prior_source: Swiss banking ROE studies, Kantonalbank benchmarks
    prior_mean: 0.06
    context_adjustment: +0.02 (Kommissionsgeschaeft-Diversifikation 32.5%->40%, Gioia-Oekosystem)
    posterior_mean: 0.08
    ci_95:
    - 0.05
    - 0.11
    unit: per month
    interpretation: Revenue diversification via advisory fees and digital products builds steadily
  alpha_E:
    name: Emotional Utility Growth
    prior_source: Kahneman (2011), Organizational identity studies
    prior_mean: 0.14
    context_adjustment: +0.02 (156-Jahre-Tradition, Buendner Identitaet=0.85, Stolz=0.85)
    posterior_mean: 0.16
    ci_95:
    - 0.11
    - 0.21
    unit: per month
    interpretation: Strong emotional engagement through regional identity and institutional pride
  alpha_P:
    name: Physical/Effort Utility Growth
    prior_source: Deci & Ryan (2000), Banking digitalization studies
    prior_mean: 0.05
    context_adjustment: +0.00 (Process Automation=0.55, Cloud=0.45 — moderate digitalization)
    posterior_mean: 0.05
    ci_95:
    - 0.03
    - 0.07
    unit: per month
    interpretation: Effort reduction slow — 45 branches maintain physical presence, hybrid model
  alpha_S:
    name: Social Utility Growth
    prior_source: Cialdini (2007), Clan culture studies
    prior_mean: 0.10
    context_adjustment: +0.02 (Clan-Kultur, 12J Tenure, Zusammenarbeit=0.75, eNPS=35)
    posterior_mean: 0.12
    ci_95:
    - 0.08
    - 0.16
    unit: per month
    interpretation: Team culture strong through low turnover and regional bonds
  alpha_D:
    name: Development Utility Growth
    prior_source: Dweck (2006), Banking skill development
    prior_mean: 0.10
    context_adjustment: +0.01 (Dig.Kompetenz=0.65, 5 WB-Tage, Innovationskultur=0.55)
    posterior_mean: 0.11
    ci_95:
    - 0.07
    - 0.15
    unit: per month
    interpretation: Moderate learning rate — good foundations but innovation culture still developing
  alpha_X:
    name: Existential Utility Growth
    prior_source: Frankl (1959), Purpose in institutional banking
    prior_mean: 0.06
    context_adjustment: +0.03 (Kantonalbank-Mandat, 156 Jahre, Regionalentwicklung, Staatsgarantie)
    posterior_mean: 0.09
    ci_95:
    - 0.05
    - 0.13
    unit: per month
    interpretation: Strong institutional purpose through cantonal mandate and generational continuity
utility_decay_rates:
  delta_F:
    name: Financial Utility Decay
    posterior_mean: 0.04
    ci_95:
    - 0.03
    - 0.05
    unit: per month
    interpretation: Banking revenue stable, Staatsgarantie buffers setbacks
  delta_E:
    name: Emotional Utility Decay
    posterior_mean: 0.09
    ci_95:
    - 0.06
    - 0.12
    unit: per month
    interpretation: Identity-based engagement decays slower than pure emotion but needs reinforcement
  delta_P:
    name: Physical Utility Decay
    posterior_mean: 0.03
    ci_95:
    - 0.02
    - 0.04
    unit: per month
    interpretation: Digital banking workflows persist once established
  delta_S:
    name: Social Utility Decay
    posterior_mean: 0.05
    ci_95:
    - 0.03
    - 0.07
    unit: per month
    interpretation: Low turnover (6%) and long tenure sustain team cohesion
  delta_D:
    name: Development Utility Decay
    posterior_mean: 0.04
    ci_95:
    - 0.03
    - 0.05
    unit: per month
    interpretation: Banking skills decay slowly with regular client interactions
  delta_X:
    name: Existential Utility Decay
    posterior_mean: 0.02
    ci_95:
    - 0.01
    - 0.03
    unit: per month
    interpretation: Cantonal mandate deeply institutional, extremely slow to erode
complementarities:
  gamma_SX:
    name: Social x Existential
    posterior_mean: 0.30
    ci_95:
    - 0.20
    - 0.40
    interpretation: Buendner Teamkultur verstaerkt Kantonalbank-Mission — staerker als RMS, schwaecher als Zindel Familienbetrieb
    source: Grant (2013), Prosocial motivation in institutional settings
  gamma_DX:
    name: Development x Existential
    posterior_mean: 0.25
    ci_95:
    - 0.15
    - 0.35
    interpretation: Lernen staerkt Modernisierungsvision, aber weniger als bei KI-First-Unternehmen (RMS)
    source: Deci & Ryan (2000), SDT
  gamma_FS:
    name: Financial x Social
    posterior_mean: -0.10
    ci_95:
    - -0.20
    - 0.00
    interpretation: Schwaecher als RMS/Zindel — Staatsgarantie puffert Crowding-Out, keine Entlassungswellen
    source: Frey & Jegen (2001), Crowding-out in public institutions
  gamma_SD:
    name: Social x Development
    posterior_mean: 0.20
    ci_95:
    - 0.10
    - 0.30
    interpretation: Peer-Lernen in Filialen moderat — Silostruktur begrenzt Cross-Learning
    source: Bandura (1977), Social learning
  gamma_FP:
    name: Financial x Physical
    posterior_mean: 0.20
    ci_95:
    - 0.10
    - 0.30
    interpretation: Effizienzgewinne direkt sichtbar im Cost-Income-Ratio (48.0%)
    source: Behavioral economics standard
  gamma_ED:
    name: Emotional x Development
    posterior_mean: 0.20
    ci_95:
    - 0.10
    - 0.30
    interpretation: Stolz auf GKB treibt Weiterbildungsbereitschaft moderat
    source: Fredrickson (2001), Broaden-and-build
process_dynamics:
  beta_adoption:
    name: Adoption Rate (S-Curve)
    prior_source: Bass (1969), Rogers (2003)
    prior_mean: 0.30
    context_adjustment: +0.00 (CEO-sponsored aber konservative Kultur, Hierarchie=0.65, Agile=0.45)
    posterior_mean: 0.30
    ci_95:
    - 0.20
    - 0.40
    unit: per month
    interpretation: Slowest of 3 cases — conservative bank culture, hierarchy, long decision cycles
  rho_resistance_decay:
    name: Resistance Decay Rate
    prior_source: Rogers (2003), Banking transformation studies
    prior_mean: 0.025
    context_adjustment: +0.000 (Tradition=0.80, Hierarchie=0.65, Change Acceptance=0.65)
    posterior_mean: 0.025
    ci_95:
    - 0.015
    - 0.035
    unit: per month
    interpretation: Slowest resistance decay — 156 years of tradition, cautious institutional culture
  r_setback_sensitivity:
    name: Setback Sensitivity
    posterior_mean: 0.12
    ci_95:
    - 0.08
    - 0.16
    unit: per event
    interpretation: Lowest of 3 cases — Staatsgarantie buffers failures, less public scrutiny than media
  eta_habit_formation:
    name: Habit Formation Rate
    prior_source: Lally et al. (2010)
    prior_mean: 0.015
    context_adjustment: None (robust finding)
    posterior_mean: 0.015
    ci_95:
    - 0.01
    - 0.02
    unit: per day
    monthly_equivalent: 0.40
    interpretation: Standard habit formation rate — banking routines support consistency
  mu_momentum:
    name: Momentum Build-up
    posterior_mean: 0.07
    ci_95:
    - 0.05
    - 0.09
    unit: per success event
    interpretation: Moderate momentum — less internal communication speed than media company
  friction:
    name: Momentum Friction
    posterior_mean: 0.04
    ci_95:
    - 0.03
    - 0.05
    unit: per month
    interpretation: Low friction — stable organization retains momentum better than fast-paced sectors
stage_thresholds:
  theta_1:
    name: Foundation -> Implementation
    posterior_mean: 0.25
    ci_95:
    - 0.20
    - 0.30
    interpretation: Readiness >25% triggers implementation (conservative, needs more preparation)
    expected_timing: End of Month 3 (Mai 2026)
  theta_2:
    name: Implementation -> Scaling
    posterior_mean: 0.55
    ci_95:
    - 0.50
    - 0.60
    interpretation: Readiness >55% triggers scaling phase
    expected_timing: End of Month 8 (Oktober 2026)
  theta_3:
    name: Scaling -> Full Integration
    posterior_mean: 0.80
    ci_95:
    - 0.75
    - 0.85
    interpretation: Readiness >80% enables full organizational integration
    expected_timing: End of Month 14+ (April 2027+)
context_elasticities:
  alpha_psi_I:
    name: Institutional Context Elasticity
    posterior_mean: 0.90
    ci_95:
    - 0.70
    - 1.10
    interpretation: Strong institutional framework — Kantonalbank-Mandat, FINMA, Staatsgarantie
    gkb_specific: Regulatorischer Rahmen klar, Mandat gibt Richtung
  alpha_psi_S:
    name: Social Context Elasticity
    posterior_mean: 0.85
    ci_95:
    - 0.65
    - 1.05
    interpretation: Clan-Kultur amplifies when aligned, but hierarchy can slow diffusion
    gkb_specific: CEO Daniel Fust als Sponsor, aber keine Ladina-Heimgartner-Dynamik
  alpha_psi_C:
    name: Cognitive Context Elasticity
    posterior_mean: 0.70
    ci_95:
    - 0.50
    - 0.90
    interpretation: Moderate cognitive load — regulated banking environment is structured, not chaotic
    gkb_specific: Weniger Stress als Newsroom, aber Compliance-Last + Transformation gleichzeitig
  alpha_psi_K:
    name: Cultural Context Elasticity
    posterior_mean: 1.05
    ci_95:
    - 0.85
    - 1.25
    interpretation: Buendner Identitaet ist staerkster kultureller Multiplikator — Tradition als Asset UND Barriere
    gkb_specific: 156 Jahre Geschichte, 75% der MA aus Graubuenden, Mehrsprachigkeit
  alpha_psi_E:
    name: Economic Context Elasticity
    posterior_mean: 0.80
    ci_95:
    - 0.60
    - 1.00
    interpretation: Stabile Ertraege (CHF 528M), aber Zinsdruck + Margenerosion + Konkurrenz
    gkb_specific: CIR 48% gut, aber Zinsabhaengigkeit 67.5% = Risiko
  alpha_psi_T:
    name: Temporal Context Elasticity
    posterior_mean: 0.75
    ci_95:
    - 0.55
    - 0.95
    interpretation: Weniger Zeitdruck als RMS (kein schliessendes Fenster), aber Konkurrenz waechst stetig
    gkb_specific: Kein Disruptionsrisiko wie Medien, aber Neobanken + Plattformen fordern heraus
  alpha_psi_M:
    name: Material Context Elasticity
    posterior_mean: 0.75
    ci_95:
    - 0.55
    - 0.95
    interpretation: Avaloq/Finnova vorhanden, Cloud=0.45, aber AI/ML=0.35 = niedrigste Tech-Reife
    gkb_specific: Gioia-Produkte zeigen Innovation, aber Core Banking traditionell
  alpha_psi_F:
    name: Physical Context Elasticity
    posterior_mean: 0.70
    ci_95:
    - 0.50
    - 0.90
    interpretation: 45 Filialen = starke physische Praesenz, Umbau zu Beratungszentren laeuft (50%)
    gkb_specific: Hybrides Modell gefordert — physisch bleibt wichtig in Graubuenden
initial_conditions:
  U_0:
    name: Initial Total Utility
    posterior_mean: 0.18
    ci_95:
    - 0.12
    - 0.24
    interpretation: Moderate baseline motivation — Strategie existiert, aber breite Dringlichkeit fehlt
  Adoption_0:
    name: Initial Adoption
    posterior_mean: 0.10
    ci_95:
    - 0.05
    - 0.15
    interpretation: Early stage — Gioia products, some digital initiatives, but most processes traditional
    gkb_context: Gioia 3a (15K Users), Gioia Kids (3K Users), Digital Onboarding 65%
  Resistance_0:
    name: Initial Resistance
    posterior_mean: 0.60
    ci_95:
    - 0.50
    - 0.70
    interpretation: Moderate-high resistance — conservative culture, 12J Tenure, Tradition=0.80, Fehlerkultur=0.60
    gkb_context: Hierarchiedenken=0.65, Change Acceptance=0.65, Agile=0.45
  Habit_0:
    name: Initial Habit Strength
    posterior_mean: 0.05
    ci_95:
    - 0.02
    - 0.08
    interpretation: Few new digital habits — most workflows still traditional banking processes
  Momentum_0:
    name: Initial Momentum
    posterior_mean: 0.08
    ci_95:
    - 0.04
    - 0.12
    interpretation: Some momentum from Gioia success and Best Recruiter award, but limited
  Decision_0:
    name: Initial Decision Capability
    posterior_mean: 0.25
    ci_95:
    - 0.15
    - 0.35
    interpretation: Moderate — participative leadership but hierarchy slows decisions, consensus culture
intervention_effects:
  INT-GKB-001:
    name: Unternehmer-Kontostruktur (Mental Accounting, Q2)
    effects_when_removed:
      alpha_F_multiplier: 0.7
      alpha_S_multiplier: 0.8
    interpretation: >
      Without Mental Accounting intervention for entrepreneurs,
      financial growth drops 30% (lost cross-sell) and social utility
      reduced 20% (less relationship deepening). Key revenue diversification blocked.
  INT-GKB-002:
    name: Zweitwohnungsbesitzer-Offensive (Q2-Q3)
    effects_when_removed:
      alpha_F_multiplier: 0.6
      mu_momentum_multiplier: 0.8
    interpretation: >
      Without proactive Zweitwohnungsbesitzer targeting,
      financial growth drops 40% (CHF 80K avg mortgage lost) and
      momentum building slows 20%. Major market share opportunity missed.
  INT-GKB-003:
    name: Plattform-Kunden Cross-Selling (Q2-Q4)
    effects_when_removed:
      beta_adoption_multiplier: 0.7
      alpha_S_multiplier: 0.7
    interpretation: >
      Without cross-selling program, adoption rate drops 30% and
      social utility reduced 30%. Transactional relationships stay transactional.
  INT-GKB-004:
    name: Lebensmitte-Check Gen X (Q3-Q4)
    effects_when_removed:
      alpha_D_multiplier: 0.7
      alpha_F_multiplier: 0.8
      alpha_E_multiplier: 0.8
    interpretation: >
      Without Lebensmitte-Check, development growth drops 30% (no advisory
      skill building), financial growth drops 20% (CHF 13.7K/Kunde potential
      lost), and emotional engagement reduced 20%.
