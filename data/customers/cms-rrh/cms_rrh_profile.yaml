    use_case_details:
      esg_behavioral_compliance:
        relevance: 0.95
        description: >
          CSDDD (ab 2028/2029) betrifft ~6'000 EU-Unternehmen. CMS berät diese
          bei der rechtlichen Umsetzung. BEATRIX ergänzt mit Verhaltensanalyse:
          Welche Compliance-Architekturen werden tatsächlich befolgt?
        value_proposition: >
          Recht sagt was man MUSS. BEATRIX sagt wie man es SCHAFFT.
          Compliance-Defaults, Nudges und Entscheidungsarchitekturen
          für ESG-Programme, die nicht nur rechtlich korrekt sondern
          verhaltensökonomisch wirksam sind.
        csddd_context:
          directive: "Corporate Sustainability Due Diligence Directive"
          effective: "2028 (>3'000 MA) / 2029 (>1'000 MA)"
          affected_companies_eu: 6000
          affected_companies_non_eu: 900
          requirements:
            - "Menschenrechtsverletzungen in Lieferketten identifizieren"
            - "Umweltauswirkungen entlang der Wertschöpfungskette mindern"
            - "Interne Prozesse & Risikomanagement implementieren"
          behavioral_gap: >
            CSDDD verlangt Prozessänderungen in grossen Organisationen.
            Erfahrung zeigt: 70% von Change-Projekten scheitern.
            BEATRIX schliesst die Lücke zwischen Regulierung und Umsetzung.

      ma_cultural_due_diligence:
        relevance: 0.80
        description: >
          Bei M&A-Transaktionen (Wiesers Kerngebiet) kann BEATRIX vor dem Deal
          kulturelle Kompatibilität modellieren und Post-Merger-Integrationsrisiken
          quantifizieren. Von 4-6 Wochen Berater-Interviews zu 3-5 Tagen Simulation.
        value_proposition: >
          Behavioral Due Diligence als neuer Standard bei M&A:
          Kohärenz-Audit, Mitarbeiterfluktions-Prognose,
          Widerstandsmodellierung vor Closing.

      legal_tech_partnership:
        relevance: 0.70
        description: >
          CMS investiert bereits in Legal Tech (CSDDD Navigator, AI Disputes).
          BEATRIX als neue Kategorie «Behavioral Tech» ergänzt das Portfolio
          ohne Kannibalisierung bestehender Tools.
        channel_potential: >
          CMS-Klient:innen (Fortune 500, DAX 30) sind direkt BEATRIXs Zielgruppe.
          CMS als Vertriebskanal für Behavioral Compliance Services.

