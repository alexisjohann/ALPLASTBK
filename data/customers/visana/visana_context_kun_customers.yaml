# =============================================================================
# KUN-SEG: KUNDENSEGMENTIERUNG (10 Faktoren)
# =============================================================================
kun_seg:
  name: "Kundensegmentierung"
  factors:
    - id: "KUN-SEG-01"
      name: "Segmentierungsmodell"
      approach: "Digital-Behavioral"
      dimensions: ["Digital Affinity", "Value Orientation", "Life Stage"]
      segments: 5

    - id: "KUN-SEG-02"
      name: "Segment A: Digital Natives"
      size: 175000
      share: 25
      unit: "%"
      profile: "18-40, digital-first, app-heavy"
      clv: 11500

    - id: "KUN-SEG-03"
      name: "Segment B: Modern Families"
      size: 195000
      share: 28
      unit: "%"
      profile: "30-50, Kinder, convenience-oriented"
      clv: 15800

    - id: "KUN-SEG-04"
      name: "Segment C: Pragmatic Savers"
      size: 155000
      share: 22
      unit: "%"
      profile: "Preisbewusst, MC-affin"
      clv: 10200

    - id: "KUN-SEG-05"
      name: "Segment D: Established Traditionals"
      size: 115000
      share: 17
      unit: "%"
      profile: "50+, langjährig, Service wichtig"
      clv: 16500

    - id: "KUN-SEG-06"
      name: "Segment E: Corporate"
      size: 55000
      share: 8
      unit: "%"
      profile: "Über Arbeitgeber versichert"
      clv: 9800

    - id: "KUN-SEG-07"
      name: "Segment-Profitabilität"
      ranking:
        - "Established Traditionals"
        - "Modern Families"
        - "Digital Natives"
        - "Pragmatic Savers"
        - "Corporate"

    - id: "KUN-SEG-08"
      name: "Wachstumspotential"
      high: ["Digital Natives", "Modern Families"]
      stable: ["Corporate"]
      declining: ["Established Traditionals"]

    - id: "KUN-SEG-09"
      name: "Segment-Migration"
      typical: "Digital Natives → Modern Families → Traditionals"

    - id: "KUN-SEG-10"
      name: "Targeting-Priorität"
      priority_1: "Digital Natives"
      priority_2: "Modern Families"
      reason: "Aligned mit Digital Strategy"

