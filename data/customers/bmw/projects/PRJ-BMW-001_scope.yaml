updated: "2026-01-29"
author: "Gerhard Fehr"
owner: "MdL"  # Marvin auf der Landwehr

# =============================================================================
# 1. ZIEL (SMART)
# =============================================================================
goal:
  statement: |
    Entwicklung und Implementierung eines verhaltensbasierten Ansatzes zur
    Verbesserung der Produkt-Compliance bei BMW durch Verständnis und
    Beeinflussung des "Faktor Mensch".

  smart_criteria:
    specific: "Verhaltensmodell für Compliance-Verhalten entwickeln, KPIs definieren, Handlungsempfehlungen ableiten"
    measurable: "Messung über Selbstreflexions-Module und definierte KPIs"
    achievable: "Strukturierter 3-Phasen-Ansatz mit klaren Deliverables"
    relevant: "Produkt-Compliance ist kritisch für BMW (Regulierung, Reputation, Qualität)"
    time_bound: "Oktober 2025 bis März 2026 (6 Monate)"

  success_metrics:
    - metric: "Verhaltensmodell Vollständigkeit"
      baseline: "Kein formales Modell"
      target: "Vollständiges 10C-basiertes Modell"
      measurement_method: "Modell-Review und Dokumentation"

    - metric: "KPI-Operationalisierung"
      baseline: "Keine verhaltensbasierten KPIs"
      target: "Definierte und messbare KPIs"
      measurement_method: "KPI-Framework dokumentiert"

    - metric: "Handlungsempfehlungen"
      baseline: "Keine strukturierten Empfehlungen"
      target: "Priorisierte Empfehlungen mit Umsetzungsplan"
      measurement_method: "Projekt-Report mit Empfehlungen"

# =============================================================================
# 2. IN-SCOPE (Was ist Teil des Projekts)
# =============================================================================
in_scope:
  # Arbeitspakete aus Leistungsvereinbarung
  work_packages:
    - id: "AP-1"
      name: "Projektsteuerung"
      teilpakete:
        - id: "1.1"
          name: "Strategische Vorgehensweise"
          deliverables:
            - "Formulierung einer strategischen Stossrichtung für das Thema 'Faktor Mensch in der Produkt Compliance'"
            - "Definition einer Mission und Vision des Projekts"
            - "Definition von Projekt-Erfolgskriterien"
            - "Erstellung eines Projektplans"
            - "Definition der Fokusfelder und Eckpunkte für das weitere Vorgehen inkl. Zeitplanung"
            - "Projekt Management Synchronisierung"
            - "Regelmässige Jour Fixes als Synchro Punkte"
          location: "offsite"
          tools: "Microsoft MS Teams"

        - id: "1.2"
          name: "Messkonzept"
          deliverables:
            - "Definition des Zielverhaltens, Hypothesen und massgeblichen KPIs"
            - "Verhaltensmodell, Hypothesen und Gesamt-Messkonzept"
            - "Methode zur Messung der Wirksamkeit der Selbstreflexions-Module inkl. KPI Definition"
            - "Operationalisierung des Messkonzepts"
          location: "offsite"

        - id: "1.3"
          name: "Handlungsempfehlungen"
          deliverables:
            - "Aufbereitung der Analysen aus Messungen"
            - "(Gemeinsame) Ableitungen von Empfehlungen für die Organisation"
            - "Projekt-Report inkl. Handlungsempfehlungen"
          location: "offsite"
          tools: "Microsoft MS Teams"

        - id: "1.4"
          name: "Aufbau eines Change-Netzwerks"
          deliverables:
            - "Aufbau eines (innerbetrieblichen) Multiplikatoren Netzwerks inkl. Befähigung"
            - "Definition Rolle eines Multiplikatoren und Roll-Out Plan zur Befähigung"
          location: "offsite"
          timeline: "2026"

    - id: "AP-2"
      name: "Awareness"
      teilpakete:
        - id: "2"
          name: "Awareness Modul zum Thema Faktor Mensch in der Produkt Compliance"
          deliverables:
            - "Unterstützung bei der Entwicklung eines Awareness Moduls"
            - "Entwicklung von Awareness-Formaten zur breiten Ausspielung im Unternehmen"
            - "Sounding und Feedback zu Storyboard, Konzept, Formaten und Wirkungsmessung"
          location: "offsite"

    - id: "AP-3"
      name: "Selbstreflexion"
      teilpakete:
        - id: "3.1"
          name: "Selbstreflexions Modul zum Thema Entscheidungsverhalten"
          deliverables:
            - "Kick-Off Workshop auf Basis von zugelieferten 'Basis Fallstudien'"
            - "Erarbeitung eines Case-Study Workshopkonzepts zum Thema 'Entscheidungsverhalten in Produkt Compliance kritischen Situationen'"
            - "Finales Workshopkonzept 'Entscheidungsverhalten in Produkt Compliance kritischen Situationen'"
            - "Vorbereitung und Durchführung der Case Study Workshops (4 Case Studies)"
            - "Erstellung der Veranstaltungs- und Teilnehmerunterlagen"
            - "Trainingsunterlagen zu einem Fachvortrag"
            - "Messung des Erfolgs der Case Study Workshops"
            - "Refinement des erarbeiteten Workshopkonzepts"
          location: "anteilig onsite (≤20%)"
          input_bmw: "'Basis Fallstudien', sowie vorliegende Erfahrungen zu Produkt Compliance Themen"

        - id: "3.2"
          name: "Selbstreflexions Modul zum Thema Fehlerkultur und Fehlverhalten"
          deliverables:
            - "Kick-Off Workshop auf Basis von zugelieferten Produkt Compliance Vorfällen"
            - "Erarbeitung eines Workshopkonzepts zum Thema 'Fehlerkultur bzw. Fehlverhalten in Produkt Compliance kritischen Situationen'"
            - "Finales Workshopkonzept 'Fehlerkultur bzw. Fehlverhalten'"
            - "Vorbereitung und Durchführung der Workshops (4 Workshops)"
            - "Erstellung der Veranstaltungs- und Teilnehmerunterlagen"
            - "Messung des Erfolgs der Workshops"
            - "Refinement des erarbeiteten Workshopkonzepts"
          location: "anteilig onsite (≤20%)"
          note: "Teilweise ohne Aufwand kalkuliert (0 EUR) - ggf. optional"

    - id: "AP-4"
      name: "Verhaltensänderung"
      teilpakete:
        - id: "4.1"
          name: "Entwicklung eines Konzepts zum Modul 'Verhaltensänderung'"
          deliverables:
            - "Entwicklung von Konzepten zur individuellen Begleitung von Personen mit hohem Compliance-Risiko"
            - "Verstärkte Sensibilisierung"
            - "Unterstützung bei der Verhaltensänderung"
            - "Leitfäden für die Evaluation im individuellen Dialog"
            - "Optional: Durchführung von Interviews / digitale Follow-ups zur Massnahmen-Evaluation"
            - "Tiefen-Evaluation der erarbeiteten Massnahmen"
          location: "offsite"
          timeline: "2026"

  # Bereiche/Abteilungen die einbezogen werden
  organizational_scope:
    - "AF4 (Auftraggeber-Abteilung)"
    - "Produkt-Compliance relevante Bereiche"

  # Geografischer Scope
  geographic_scope:
    - "Deutschland"
    - "BMW Standorte (primär München)"

  # Zeitlicher Scope
  temporal_scope:
    start_date: "2025-10-01"
    end_date: "2026-03-31"
    duration_weeks: 26
    phases:
      - phase: 1
        name: "Strategische Vorgehensweise"
        description: "Mission, Vision, Projektplan"
      - phase: 2
        name: "Messkonzept"
        description: "Verhaltensmodell, KPIs, Operationalisierung"
      - phase: 3
        name: "Handlungsempfehlungen"
        description: "Analysen, Empfehlungen, Abschlussbericht"

# =============================================================================
# 3. OUT-OF-SCOPE (Was ist NICHT Teil des Projekts)
