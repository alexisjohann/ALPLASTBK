behavioral_parameters_aggregate:

  loss_aversion:
    symbol: "λ"
    value: 2.35
    range: [2.10, 2.60]
    context: "Premium-Käufer, hoher Investitionsbetrag"
    interpretation: |
      Überdurchschnittliche Verlustaversion bei BMW-Käufern:
      - Hoher Anschaffungspreis (50k-100k€) verstärkt λ
      - Angst vor Restwert-Verlust bei BEV (Range Anxiety)
      - Status-Verlust wenn "falsche" Technologie gewählt
    source: "LLMMC Prior + DE Automobilmarkt Studien"

  present_bias:
    symbol: "β"
    value: 0.82
    range: [0.75, 0.88]
    context: "Leasing-Kultur reduziert Langfristdenken"
    interpretation: |
      Moderate Present Bias:
      - Leasing (60%) reduziert langfristige TCO-Kalkulation
      - Quartalsweise Neuwagen-Wechsel (Firmenwagen)
      - Aber: Umweltbewusstsein erhöht Langfristdenken
    source: "LLMMC Prior"

  default_sensitivity:
    symbol: "κ_default"
    value: 0.68
    range: [0.60, 0.75]
    context: "Händler-Konfiguration als starker Default"
    interpretation: |
      Mittlere bis hohe Default-Sensitivität:
      - Händler-Konfigurationen stark einflussreich
      - Online-Konfigurator: Empfohlene Pakete
      - Werks-Abholung: Weniger Defaults, mehr Kontrolle
    source: "LLMMC Prior"

  social_proof:
    symbol: "σ_social"
    value: 0.62
    range: [0.55, 0.70]
    context: "Markenidentität & Peer Effects"
    interpretation: |
      Moderate soziale Effekte:
      - BMW als Statussymbol (Peer Influence)
      - E-Auto-Adoptation: "Early Majority" Phase
      - Flottenmanager: Stark von Peers beeinflusst
    source: "LLMMC Prior"

  status_sensitivity:
    symbol: "σ_status"
    value: 0.75
    range: [0.70, 0.80]
    context: "Premium-Marke, Statuskonsum"
    interpretation: |
      Hohe Status-Sensitivität:
      - Auto als Identitätssymbol in Deutschland
      - BMW M, i-Modelle: Status-Differenzierung
      - Firmenwagen: Status-Hierarchie
    source: "LLMMC Prior + Premium-Markt Literatur"

