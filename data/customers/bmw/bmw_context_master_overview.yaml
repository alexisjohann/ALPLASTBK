# =============================================================================
# AGGREGATED PSI-DIMENSIONS (Deutschland Fokus)
# =============================================================================

psi_dimensions_aggregate:

  psi_I_institutional:
    value: 0.78
    label: "Institutionell (Hoch)"
    description: |
      Starke regulatorische Einbettung in Deutschland:
      - EU-Flottenemissionsstandards (CO2-Ziele)
      - Mitbestimmung & IG Metall (Tarifverträge)
      - Verkehrswende-Politik (Förderung E-Mobilität)
      - ESG-Berichtspflichten (CSRD)
    key_drivers:
      - "EU CO2-Flottenziele: 95g/km (2021) → 0g/km (2035)"
      - "Mitbestimmung: 50% Arbeitnehmervertreter im Aufsichtsrat"
      - "Staatliche E-Auto-Prämien (bis 2023: 6.000€)"
    ebf_kappa: "kappa_INST = 0.78"

  psi_S_social:
    value: 0.65
    label: "Sozial (Mittel-Hoch)"
    description: |
      Mittelstarke soziale Normen & Identität:
      - BMW als Statussymbol in DE/Europa
      - "Freude am Fahren" Markenidentität
      - Nachhaltigkeit als Premiumattribut
      - Gesellschaftlicher Druck: E-Mobilität
    key_drivers:
      - "Markenwahrnehmung: Performance + Nachhaltigkeit"
      - "Soziale Norm: E-Auto als Progressiv-Signal"
      - "IG Metall: Starke Arbeitnehmeridentität"
    ebf_kappa: "kappa_SOCIAL = 0.65"

  psi_C_cognitive:
    value: 0.70
    label: "Kognitiv (Hoch)"
    description: |
      Hohe kognitive Anforderungen:
      - Komplexe Produktpalette (50+ Modelle)
      - Technologie-Transformation (ICE → BEV → FCEV)
      - Software-Defined Vehicle (neue Features)
      - Kaufentscheidung: TCO vs. Anschaffungspreis
    key_drivers:
      - "BEV vs. ICE Entscheidung (Range Anxiety, Ladeinfra)"
      - "Software-Updates & Abo-Modelle (komplexe Pricing)"
      - "Autonomes Fahren: Vertrauensbildung"
    ebf_kappa: "kappa_COG = 0.70"

  psi_K_cultural:
    value: 0.72
    label: "Kulturell (Hoch)"
    description: |
      Starke kulturelle Werte (Deutschland):
      - Ingenieurskunst & Qualität ("Made in Germany")
      - Umweltbewusstsein & Energiewende
      - Autobahn-Kultur (Geschwindigkeit, Freiheit)
      - Konservative Kaufmuster (Diesel-Tradition)
    key_drivers:
      - "Deutsche Ingenieurskultur: Präzision, Innovation"
      - "Energiewende-Werte: Nachhaltigkeit als Pflicht"
      - "Statuskonsum: Auto als Identitätssymbol"
    ebf_kappa: "kappa_CULT = 0.72"

  psi_E_economic:
    value: 0.68
    label: "Ökonomisch (Mittel-Hoch)"
    description: |
      Mittlere bis hohe Ressourcenverfügbarkeit:
      - Deutschland: Hohe Kaufkraft (Median 40k€/Jahr)
      - Leasing-Kultur (60% der Neuzulassungen)
      - TCO-Vorteil BEV bei steigenden Energiepreisen
      - Inflationsdruck & Zinsanstieg (2022-2024)
    key_drivers:
      - "Durchschnittseinkommen DE: 40.000€/Jahr (Median)"
      - "Premium-Auto: 50.000-100.000€ Anschaffung"
      - "Leasing: 60% Neuzulassungen, niedrige Einstiegshürde"
    ebf_kappa: "kappa_ECON = 0.68"

  psi_T_temporal:
    value: 0.75
    label: "Temporal (Hoch)"
    description: |
      Hoher Zeitdruck & Transformation:
      - 2025: Neue Klasse Launch (kritisches Timing)
      - 2030: 50% BEV-Anteil Ziel
      - 2035: EU-Verbrenner-Verbot
      - Quartalsweise Software-Updates erforderlich
    key_drivers:
      - "Neue Klasse 2025: Make-or-Break für E-Strategie"
      - "EU 2035: Faktisches ICE-Aus"
      - "China BEV-Wettbewerb: Schnelle Marktanteils-Erosion"
    ebf_kappa: "kappa_TEMP = 0.75"

  psi_M_material:
    value: 0.73
    label: "Materiell (Hoch)"
    description: |
      Hohe technologische Infrastruktur:
      - Ladeinfrastruktur Deutschland: 100.000+ Ladepunkte
      - BMW Charging Network & Partnerschaften
      - Digitale Ökosysteme (BMW ConnectedDrive, App)
      - Produktion: Industrie 4.0, Robotik
    key_drivers:
      - "Ladeinfrastruktur DE: 100k+ Ladepunkte (2024)"
      - "BMW iDrive 9: Software-Defined Vehicle"
      - "5G-Connectivity: V2X-Kommunikation"
    ebf_kappa: "kappa_MAT = 0.73"

  psi_F_physical:
    value: 0.58
    label: "Physisch (Mittel)"
    description: |
      Mittlere physische Präsenz (Hybrid):
      - Händlernetz: ~350 BMW-Partner in Deutschland
      - Online-Konfiguration & Direct-to-Consumer Wachstum
      - Showrooms: Markenerleben (z.B. BMW Welt München)
