    - parameter: "kappa_READY"
      value: 0.65
      note: "Change Readiness 65% → mittlere Handlungsbereitschaft"
    - parameter: "beta_transformation"
      value: 0.78
      note: "Transformation Angst (52%) reduziert Langfristdenken"
  
  behavioral_implications: |
    Mitbestimmung ist Double-Edged Sword:
    - (+) Hohe Akzeptanz durch Partizipation (IG Metall Agreement)
    - (-) Langsamere Entscheidungen, Standortgarantien limitieren Flexibilität
    - λ_job_loss = 2.8 (höher als λ_standard 2.35) → Verlustaversion bzgl. Jobs
    
    Kultur im Wandel:
    - Performance-Kultur (0.85) stabil, aber Innovation (0.72) ausbaufähig
    - Tech Talent Fluktuation (14%) doppelt so hoch wie Durchschnitt
    - Retraining 250 Mio € zeigt Commitment, aber 52% Angst Index zeigt Gap

