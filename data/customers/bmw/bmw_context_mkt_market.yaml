strategic_implications:

  market_position:
    overall_score: 0.76
    assessment: "Stark im Premium ICE, unter Druck im BEV"
    strengths:
      - "Marktführer Premium Deutschland (26.2% Share)"
      - "Starke Marke (Brand Value 39.8 Mrd USD)"
      - "Hohe Kundenloyalität (68% Retention)"
      - "China-Präsenz (33% Absatz)"

    challenges:
      - "BEV Marktanteil China nur 4.2% (vs. BYD 29.5%)"
      - "Tesla setzt Software-Maßstab (12 OTA-Updates/Jahr)"
      - "Brand Switching zu Tesla steigend (8%)"
      - "Nachhaltigkeit-Image schwächer als Tesla (52% vs. 82%)"

    behavioral_implications:
      social_proof_dynamics: |
        BEV-Adoption ist sozialer Prozess:
        - Early Majority Phase (13% Eco-Premium Segment)
        - Tesla als Referenzpunkt (σ_social = 0.62)
        - Firmenwagen als Default-Multiplikator

      loss_aversion_in_transition: |
        ICE→BEV Wechsel aktiviert λ = 2.35:
        - Range Anxiety (48% der Interessierten)
        - Restwertrisiko BEV
        - Status-Verlust-Angst (82% Status-Association)

      default_power_fleet: |
        Firmenwagen-Segment (62%) ist Default-getrieben:
        - Dienstwagen-Liste setzt Default
        - κ_default = 0.68 (hoch)
        - BEV-1%-Regelung als Policy-Nudge

