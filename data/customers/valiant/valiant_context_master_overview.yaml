# =============================================================================
# EBF FRAMEWORK INTEGRATION
# =============================================================================

ebf_integration:
  # 10C CORE Mapping
  core_10c_mapping:
    WHO:
      description: "Mittelland-Bevölkerung, KMU, Eigenheimkäufer, Sparer"
      relevant_layers: ["MKT", "PEO", "STK"]
      key_factors: ["KUN-01", "KUN-02", "KUN-03", "STK-EIG-01"]

    WHAT:
      description: "Einfache Bankprodukte, Nähe, persönliche Beratung"
      relevant_layers: ["FIN", "STR", "MKT"]
      key_factors: ["FIN-KAP-01", "STR-VIS-01", "MKT-PRD-01"]

    HOW:
      description: "Persönliche Beratung in 100 Filialen + Digital"
      relevant_layers: ["TEC", "MKT", "STR"]
      key_factors: ["TEC-DIG-01", "MKT-KAN-01", "STR-INI-01"]

    WHEN:
      description: "Lebensphasen (Eigenheim, Vorsorge, Sparen)"
      relevant_layers: ["MKT", "STR", "FIN"]
      key_factors: ["MKT-PRD-01", "STR-INI-03", "FIN-ANL-01"]

    WHERE:
      description: "Schweizer Mittelland, 9 Kantone, 100 Standorte"
      relevant_layers: ["MKT", "PEO", "ORG"]
      key_factors: ["MKT-KAN-02", "PEO-BES-05", "ORG-STR-01"]

    AWARE:
      description: "Regionale Bekanntheit, \"Näher dran\" Claim"
      relevant_layers: ["STK", "MKT", "STR"]
      key_factors: ["STK-REP-01", "MKT-ANT-01", "STR-VIS-02"]

    READY:
      description: "Hohe Präsenz, Filialnetz, persönliche Beziehungen"
      relevant_layers: ["MKT", "ORG", "STK"]
      key_factors: ["MKT-KAN-01", "ORG-STR-03", "STK-OEK-01"]

    STAGE:
      description: "Established Institution (seit 1997)"
      relevant_layers: ["STR", "PEO", "ORG"]
      key_factors: ["STR-VIS-03", "PEO-KUL-01", "ORG-GOV-01"]

  # Psi Dimension Mapping
  psi_dimension_mapping:
    psi_I:
      name: "Institutional Context"
      description: "FINMA-Regulierung, keine Staatsgarantie, AG-Form"
      weight: 0.85
      primary_layers: ["ORG", "RIS"]

    psi_S:
      name: "Social Context"
      description: "Mittelland-Gemeinschaft, regionale Netzwerke"
      weight: 0.80
      primary_layers: ["PEO", "STK", "MKT"]

    psi_K:
      name: "Cultural Context"
      description: "Mittelland-Werte, Bodenständigkeit, Pragmatismus"
      weight: 0.80
      primary_layers: ["PEO", "STK"]

    psi_E:
      name: "Economic Context"
      description: "Diversifizierte Wirtschaft, industriell/dienstleistungsorientiert"
      weight: 0.75
      primary_layers: ["FIN", "MKT"]

    psi_T:
      name: "Temporal Context"
      description: "27 Jahre Geschichte, Fusionshintergrund"
      weight: 0.70
      primary_layers: ["STR", "PEO"]

    psi_M:
      name: "Material/Technical Context"
      description: "100 Filialen, Mobile Banking, Hybrid-Modell"
      weight: 0.75
      primary_layers: ["TEC", "MKT"]

    psi_F:
      name: "Physical Context"
      description: "Mittelland, urban/suburban, gut erschlossen"
      weight: 0.75
      primary_layers: ["MKT", "PEO"]

    psi_C:
      name: "Cognitive Context"
      description: "Pragmatisch, nähebedürftig, beratungsorientiert"
      weight: 0.80
      primary_layers: ["STR", "MKT"]

  # Behavioral Parameters
  behavioral_parameters:
    lambda_VALIANT:
      name: "Loss Aversion (Valiant-spezifisch)"
      value: 2.25
      description: "Leicht erhöht ohne Staatsgarantie"
      source: "Inferred from no state guarantee"

    tau_PROXIMITY:
      name: "Trust Transfer - Nähe"
      value: 0.80
      description: "Vertrauensaufbau durch persönliche Beratung"
      source: "\"Näher dran\" Strategie"

    tau_BRAND:
      name: "Trust Transfer - Marke"
      value: 0.75
      description: "Vertrauen durch etablierte Retailbank-Marke"
      source: "27 Jahre Geschichte"

    beta_MITTELLAND:
      name: "Present Bias Modifier - Mittelland"
      value: 0.88
      description: "Regionale Präferenz-Verstärkung"
      source: "Regional identity studies"

    iota_MITTELLAND:
      name: "Identity Alignment - Mittelland"
      value: 0.75
      description: "Identifikation mit Mittelland-Region"
      source: "Customer surveys"

    sigma_PERSONAL:
      name: "Channel Preference - Personal"
      value: 0.85
      description: "Präferenz für persönliche Beratung"
      source: "Customer behavior analysis"

