# EBF Behavioral Parameter Mapping
ebf_integration:
  # Psi (Ψ) Context Dimensions
  psi_dimensions:
    psi_I_institutional:
      description: "Regulatorisches Umfeld, FINMA, Compliance-Anforderungen"
      relevant_layers: ["ORG", "RIS"]
      key_factors:
        - "FINMA-Regulierung"
        - "Einlagensicherung esisuisse"
        - "Genossenschafts-Governance (MGB)"

    psi_S_social:
      description: "Soziale Normen, Team-Dynamik, Unternehmenskultur"
      relevant_layers: ["PEO", "ORG"]
      key_factors:
        - "Genossenschafts-Werte (Kundennutzen > Gewinn)"
        - "Diversität (50% Frauenanteil)"
        - "Flache Hierarchien"

    psi_C_cognitive:
      description: "Mentale Verfassung, Stress, Digitalisierungsdruck"
      relevant_layers: ["PEO", "TEC"]
      key_factors:
        - "Digitale Transformation"
        - "Gen-AI Adoption"
        - "Change-Belastung"

    psi_K_cultural:
      description: "Migros-DNA, Schweizer Werte, Kundennutzen-Fokus"
      relevant_layers: ["STK", "PEO"]
      key_factors:
        - "Migros-Genossenschafts-Kultur"
        - "Keine Aktionärsinteressen"
        - "Schweizer Bodenständigkeit"

    psi_E_economic:
      description: "Ressourcen, Budget, Investitionskapazität"
      relevant_layers: ["FIN"]
      key_factors:
        - "Eigenmittelstärke (>20% Kapitalquote)"
        - "Keine Dividendenpflicht"
        - "Investitionsfreiheit"

    psi_T_temporal:
      description: "Zeitdruck, Transformationszyklen, Migros-Umbau"
      relevant_layers: ["STR"]
      key_factors:
        - "2026 erstes Jahr mit 4-Felder-Fokus der Migros"
        - "Digitalisierungs-Roadmap"
        - "Generationswechsel Management"

    psi_M_material:
      description: "Technologie, IT-Infrastruktur, Digitale Tools"
      relevant_layers: ["TEC"]
      key_factors:
        - "Gen-AI produktiv im Einsatz"
        - "Mobile Banking App"
        - "1700+ Bargeldstandorte (Migros-Netz)"

    psi_F_physical:
      description: "Standorte, Filialnetz, Arbeitsumgebung"
      relevant_layers: ["MKT", "ORG"]
      key_factors:
        - "76 Geschäftsstellen schweizweit"
        - "Hauptsitz Zürich"
        - "Migros-Integration (Filialen)"

