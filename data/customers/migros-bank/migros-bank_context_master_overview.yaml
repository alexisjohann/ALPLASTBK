# Key Behavioral Insights for Migros Bank
behavioral_insights:
  unique_context:
    - insight: "Genossenschafts-DNA eliminiert Shareholder-Value Druck"
      implication: "Langfristorientierung möglich, echte Kundennutzen-Fokussierung"
      ebf_relevance: "U_social und U_identity höher gewichtet als U_financial"

    - insight: "Migros-Ökosystem als Trust-Multiplier"
      implication: "Markenvertrauen transferiert von Migros-Supermarkt zur Bank"
      ebf_relevance: "Psi_K (Kultur) stark durch Migros-Werte geprägt"

    - insight: "Digitalste Retailbank ohne Innovationsdruck durch Aktionäre"
      implication: "Digitalisierung aus Überzeugung, nicht aus Zwang"
      ebf_relevance: "Intrinsische Motivation für Change höher"

    - insight: "50% Frauenanteil als kultureller Anker"
      implication: "Diversitäts-Werte authentisch, nicht compliance-getrieben"
      ebf_relevance: "Psi_S (Sozial) mit starker Equity-Komponente"

  intervention_leverage_points:
    - point: "Kundennutzen-Narrativ"
      description: "Jede Massnahme über 'Kundennutzen' framen"
      expected_effect: "Hohe intrinsische Akzeptanz"

    - point: "Migros-Identität"
      description: "Genossenschafts-Werte als Identitätsanker nutzen"
      expected_effect: "Starke U_identity Aktivierung"

    - point: "Digital-Leadership Pride"
      description: "'Digitalste Retailbank' als Stolz-Narrativ"
      expected_effect: "Innovations-Adoption beschleunigen"

