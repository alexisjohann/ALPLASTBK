# =============================================================================
# STR-VIS – Vision & Mission (6 Faktoren)
# =============================================================================
STR_VIS:
  name: "Vision & Mission"
  description: "Strategische Ausrichtung und Purpose"
  factor_count: 6
  factors:
    - id: MIGB-STR-VIS-01
      name: "Purpose Statement"
      definition: "Daseinszweck der Migros Bank"
      value: "Kundennutzen maximieren – weil wir es können"
      interpretation: |
        Als 100%-Tochter des MGB ohne externe Aktionäre ist der einzige
        Stakeholder der Kunde. Gewinne fliessen in bessere Konditionen
        und Services, nicht in Dividenden.
      source: "Positionierung"

    - id: MIGB-STR-VIS-02
      name: "Vision"
      definition: "Strategisches Zielbild"
      value: "Die bevorzugte digitale Retailbank der Schweiz"
      components:
        - "Digitalste Retailbank"
        - "Bevorzugt durch Vertrauen und Fairness"
        - "Schweizweite Präsenz"
      source: "Strategie"

    - id: MIGB-STR-VIS-03
      name: "Mission"
      definition: "Operativer Auftrag"
      value: |
        Schweizer Privatkunden und KMU mit einfachen, fairen und digitalen
        Bankdienstleistungen bedienen – eingebettet im Migros-Ökosystem.
      source: "Strategie"

    - id: MIGB-STR-VIS-04
      name: "Strategische Positionierung"
      definition: "Marktpositionierung"
      value: "Digitalste Retailbank mit Genossenschafts-DNA"
      differentiators:
        - "Keine Aktionärsinteressen"
        - "Migros-Ökosystem"
        - "Digital Leadership"
        - "Faire Konditionen"
      source: "Positionierung"

    - id: MIGB-STR-VIS-05
      name: "Werte"
      definition: "Unternehmenswerte"
      values_list:
        - name: "Kundennutzen"
          description: "Jede Entscheidung am Kundennutzen messen"
        - name: "Einfachheit"
          description: "Komplexität reduzieren, nicht erhöhen"
        - name: "Fairness"
          description: "Transparente und faire Konditionen"
        - name: "Innovation"
          description: "Digitale Vorreiterrolle behaupten"
        - name: "Nachhaltigkeit"
          description: "Langfristig denken, nicht kurzfristig optimieren"
      source: "Unternehmenskultur"

    - id: MIGB-STR-VIS-06
      name: "Migros-Gruppe Einbettung"
      definition: "Rolle im MGB-Portfolio"
      value: |
        Finanzdienstleistungen sind eines von 4 strategischen Geschäftsfeldern
        der Migros-Gruppe (neben Food Retail, Non-Food Retail, Gesundheit).
        2026 ist das erste vollständige Jahr mit diesem Fokus.
      strategic_fields:
        - "Food Retail"
        - "Non-Food Retail"
        - "Gesundheit"
        - "Finanzdienstleistungen"
      source: "Migros Strategie"

# =============================================================================
# STR-INI – Strategische Initiativen (12 Faktoren)
# =============================================================================
STR_INI:
