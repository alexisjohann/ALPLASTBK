# =============================================================================
# KONTEXT: STEUERDIREKTABZUG SCHWEIZ
# =============================================================================
domain_context:
  description: |
    Der Steuerdirektabzug (auch: Quellenabzug, Lohnabzug fuer Steuern) ermoeglicht
    es, Steuerschulden direkt vom Lohn abziehen zu lassen. Dies kann:
    - Freiwillig vereinbart werden (zur Vermeidung von Steuerschulden)
    - Im Rahmen einer Betreibung angeordnet werden
    - Als praeventive Massnahme bei Schuldenberatung empfohlen werden

  regulatory_framework:
    - "Kantonale Steuergesetze"
    - "Bundesgesetz ueber die direkte Bundessteuer (DBG)"
    - "Betreibungs- und Konkursrecht (SchKG)"

  relevant_actors:
    - "Steuerverwaltung Kanton Basel"
    - "Arbeitgeber (fuer Lohnabzug)"
    - "Sozialamt / Sozialhilfe"
    - "Schuldenberatung (Plusminus)"

