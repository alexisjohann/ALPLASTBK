# =============================================================================
# GESCHAEFTSMODELL
# =============================================================================
business_model:
  mission: |
    Unterstützung von Privatpersonen und Haushalten bei finanziellen
    Schwierigkeiten durch professionelle Budget- und Schuldenberatung.

  services:
    - service: "Budgetberatung"
      description: "Erstellung und Optimierung von Haushaltsbudgets"
      target_group: "Alle Einkommensklassen"

    - service: "Schuldenberatung"
      description: "Analyse der Schuldensituation, Sanierungsplanung"
      target_group: "Überschuldete Haushalte"

    - service: "Privatkonkurs-Begleitung"
      description: "Unterstützung im Konkursverfahren"
      target_group: "Personen in Privatkonkurs"

    - service: "Praevention"
      description: "Finanzbildung, Workshops, Schulprojekte"
      target_group: "Jugendliche, junge Erwachsene"

  revenue_model:
    type: "Non-Profit / Subventioniert"
    components:
      - "Kantonale Subventionen"
      - "Gemeindebeitraege"
      - "Mandatspauschalen"
      - "Spenden und Legate"

# =============================================================================
# ZIELGRUPPEN (KLIENTEN-SEGMENTE)
# =============================================================================
client_segments:

  - id: "KLI-01"
    name: "Akut Ueberschuldete"
    description: "Personen mit Betreibungen, Pfaendungen, akutem Handlungsdruck"
    share: 0.40
    characteristics:
      income_level: "niedrig bis mittel"
      debt_ratio: "> 100% Jahreseinkommen"
      urgency: "hoch"
      motivation: "extrinsisch (Druck)"

  - id: "KLI-02"
    name: "Praekritische Haushalte"
    description: "Haushalte mit Zahlungsschwierigkeiten, noch keine Betreibungen"
    share: 0.30
    characteristics:
      income_level: "mittel"
      debt_ratio: "50-100% Jahreseinkommen"
      urgency: "mittel"
      motivation: "gemischt"

  - id: "KLI-03"
    name: "Praeventiv-Klienten"
    description: "Personen die Budget-Hilfe suchen bevor Probleme entstehen"
    share: 0.15
    characteristics:
      income_level: "alle"
      debt_ratio: "< 50% Jahreseinkommen"
      urgency: "niedrig"
      motivation: "intrinsisch"

  - id: "KLI-04"
    name: "Privatkonkurs-Klienten"
      description: "Personen im oder nach Privatkonkursverfahren"
    share: 0.15
    characteristics:
      income_level: "niedrig"
      debt_ratio: "Konkurs"
      urgency: "hoch"
      motivation: "extrinsisch"

# =============================================================================
# EBF PROJEKTKONTEXT
# =============================================================================
ebf_project_context:
  project_type: "Behavioral Intervention Design"

  potential_use_cases:
    - use_case: "Beratungsadhärenz steigern"
      description: "Klienten dazu bringen, Beratungstermine wahrzunehmen"
      10c_focus: ["AWARE", "READY", "STAGE"]

    - use_case: "Budgeteinhaltung verbessern"
      description: "Klienten dabei unterstuetzen, vereinbarte Budgets einzuhalten"
      10c_focus: ["HOW", "WHEN", "AWARE"]

    - use_case: "Fruehzeitige Kontaktaufnahme foerdern"
      description: "Menschen ermutigen, vor Eskalation Hilfe zu suchen"
      10c_focus: ["AWARE", "READY", "STAGE"]

    - use_case: "Schuldensanierungsplaene einhalten"
      description: "Langfristige Adhärenz bei Sanierungsvereinbarungen"
      10c_focus: ["HOW", "WHEN", "READY"]

    - use_case: "Praevention bei Jugendlichen"
      description: "Finanzkompetenzen bei jungen Menschen aufbauen"
      10c_focus: ["AWARE", "WHAT", "STAGE"]

  relevant_behavioral_barriers:
    - barrier: "Scham und Stigma"
      description: "Schulden sind tabuisiert, Betroffene scheuen Hilfe"
      10c_dimension: "AWARE"

    - barrier: "Ostrich-Effekt"
      description: "Vermeidung negativer Informationen ueber eigene Finanzen"
      10c_dimension: "AWARE"

    - barrier: "Present Bias"
      description: "Kurzfristige Beduerfnisse ueberwiegen langfristige Ziele"
      10c_dimension: "HOW"

    - barrier: "Overwhelm und Decision Paralysis"
      description: "Komplexitaet der Schuldensituation ueberfordert"
      10c_dimension: "READY"

    - barrier: "Identitaetskonflikt"
      description: "\"Schuldner\" als negative Identitaet"
      10c_dimension: "WHO"

