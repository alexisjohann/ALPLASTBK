# =============================================================================
# PLUSMINUS SCHULDENBERATUNG - SCHNELL KONTEXTVEKTOR
# =============================================================================
# Typ: SCHNELL (~30 Faktoren)
# Framework: EBF Context Vector Architecture (CVA)
# Use Case: Behavioral Intervention Design fuer Schuldenberatung
# Version: 1.0
# Erstellt: 2026-01-27
# =============================================================================

metadata:
  name: "Plusminus Schuldenberatung Schnellkontext"
  code: "BCM2_MIKRO_PLUSMINUS"
  layer: "mikro"
  version: "1.0"
  last_updated: "2026-01-27"
  cva_stufe: "SCHNELL"
  total_factors: 32
  description: |
    Schneller Kontextvektor fuer Plusminus Budget- und Schuldenberatung.
    Enthaelt Psi-Dimensionen, Klientensegmente und Verhaltensparameter
    fuer das Design verhaltensorientierter Interventionen.

    Primaerer Fokus: Beratungsadhärenz, Praevention, Schuldensanierung

  hierarchy:
    parent: "BCM2_MESO_SOZIALBERATUNG_CH"
    grandparent: "BCM2_04_KON (MAKRO Schweiz)"

  ebf_mapping:
    primary_10c:
      - "WHO"      # Klientensegmente, Identitaet
      - "WHAT"     # Motivationstreiber (Scham, Hoffnung, Druck)
      - "WHEN"     # Timing (Krise vs. Praevention)
      - "AWARE"    # Problembewusstsein, Informationsvermeidung
      - "READY"    # Handlungsbereitschaft
      - "STAGE"    # Position in der Schulden-Journey
    primary_psi:
      - "kappa_INST"     # Betreibungsrecht, Sozialversicherung
      - "kappa_SOCIAL"   # Stigma, Familie, soziale Unterstuetzung
      - "kappa_COG"      # Kognitive Last, Overwhelm
      - "kappa_ECON"     # Finanzielle Ressourcen (per Definition knapp)

# =============================================================================
# ORGANISATION (~8 Faktoren)
# =============================================================================
organisation:
  name_de: "Plusminus Budget- und Schuldenberatung"
  name_short: "Plusminus"

  # Groesse (TBD - bitte ausfuellen)
  employees: null
  ehrenamtliche: null
  beratungen_pro_jahr: null

  # Klassifikation
  industry: "Sozialberatung"
  sub_industry: "Schulden- und Budgetberatung"
  ownership: "non-profit"

  # Geografie
  headquarters: "Schweiz"  # TBD
  geographic_scope: "regional"  # TBD

  # Mission
  mission: |
    Menschen in finanziellen Schwierigkeiten durch professionelle
    Beratung zu unterstuetzen und praeventiv Finanzkompetenz zu foerdern.

# =============================================================================
# PSI-DIMENSIONEN (8 Faktoren)
# =============================================================================
# Skala: 0.0 (niedrig) bis 1.0 (hoch)
# Werte sind LLMMC-Schaetzungen fuer typische Schuldenberatungs-Klienten
# =============================================================================

psi_dimensions:

  psi_I_institutional:
    value: 0.75
    label: "Institutionell"
    description: |
      Hoher institutioneller Druck durch Betreibungsrecht (SchKG),
      Lohnpfaendungen, Steuerschulden. Starke rechtliche Rahmenbedingungen.
      Gleichzeitig existiert Sozialversicherungsnetz als Auffangstruktur.
    key_factors:
      - "Betreibungsrecht (SchKG) mit klaren Fristen"
      - "Existenzminimum-Schutz bei Pfaendung"
      - "Sozialversicherung als Sicherheitsnetz"
      - "Privatkonkurs als letzte Option"
    ebf_kappa: "kappa_INST"

  psi_S_social:
    value: 0.85
    label: "Sozial"
    description: |
      Extrem hohe soziale Dimension: Schulden sind stark stigmatisiert
      in der Schweiz. Familie oft involviert (Mit-Haftung, gemeinsame
      Schulden). Scham verhindert fruehzeitige Hilfesuche.
    key_factors:
      - "Starkes Schulden-Stigma in CH-Gesellschaft"
      - "Familie als Betroffene und Ressource"
      - "Soziale Isolation bei Ueberschuldung"
      - "Peer-Netzwerke kaum vorhanden"
    ebf_kappa: "kappa_SOCIAL"

  psi_C_cognitive:
    value: 0.80
    label: "Kognitiv"
    description: |
      Hohe kognitive Last: Komplexe Schuldensituation (multiple
      Glaeubiger, Zinsen, Fristen), oft verbunden mit psychischem
      Stress (Depression, Angst). Entscheidungsfaehigkeit eingeschraenkt.
    key_factors:
      - "Multiple Glaeubiger und Forderungen"
      - "Zinseszins-Komplexitaet"
      - "Psychische Belastung (Stress, Angst)"
      - "Eingeschraenkte Entscheidungsfaehigkeit"
    ebf_kappa: "kappa_COG"

  psi_K_cultural:
    value: 0.70
    label: "Kulturell"
    description: |
      Schweizer Kultur betont Eigenverantwortung und finanzielle
      Selbststaendigkeit. Schulden gelten als persoenliches Versagen.
      Gleichzeitig: Solidaritaetsprinzip im Sozialstaat.
    key_factors:
      - "Eigenverantwortungs-Ethos"
      - "Schulden = persoenliches Versagen (Narrativ)"
      - "Schweizer Sparkultur"
      - "Sozialstaatliche Solidaritaet als Gegengewicht"
    ebf_kappa: "kappa_CULT"

  psi_E_economic:
    value: 0.90
    label: "Oekonomisch"
    description: |
      Per Definition kritisch: Klienten haben unzureichende finanzielle
      Ressourcen. Einnahmen-Ausgaben-Luecke. Oft Working Poor oder
      nach Schicksalsschlag (Scheidung, Krankheit, Jobverlust).
    key_factors:
      - "Einnahmen < Ausgaben (strukturell)"
      - "Kein finanzieller Puffer"
      - "Oft: Schicksalsschlag als Ausloeser"
      - "Working Poor, prekäre Beschaeftigung"
    ebf_kappa: "kappa_ECON"

  psi_T_temporal:
    value: 0.75
    label: "Temporal"
    description: |
      Starker Zeitdruck durch Betreibungsfristen, aber auch
      Langzeit-Perspektive bei Sanierung (3-7 Jahre). Spannung zwischen
      akuter Krise und langfristiger Verhaltensaenderung.
    key_factors:
      - "Betreibungsfristen (10 Tage Zahlungsbefehl)"
      - "Sanierungsdauer 3-7 Jahre"
      - "Akute Krise vs. langfristige Planung"
      - "Fruehzeitige Intervention kritisch"
    ebf_kappa: "kappa_TEMP"

  psi_M_material:
    value: 0.50
    label: "Materiell"
    description: |
      Gemischte digitale Kompetenz der Klienten. Beratung oft noch
      analog (persoenlich, telefonisch). E-Banking vorhanden aber
      nicht immer genutzt. Budget-Apps als Potential.
    key_factors:
      - "Persoenliche Beratung dominiert"
      - "E-Banking verfuegbar, variabel genutzt"
      - "Budget-Apps als Potential"
      - "Digitale Kompetenz heterogen"
    ebf_kappa: "kappa_MAT"

  psi_F_physical:
    value: 0.60
    label: "Physisch"
    description: |
      Beratung findet primaer in Beratungsstellen statt.
      Hausbesuche moeglich. Telefonische und Video-Beratung
      als Alternative. Erreichbarkeit wichtig.
    key_factors:
      - "Beratungsstellen als Anlaufpunkt"
      - "Telefonische Erstberatung"
      - "Hausbesuche bei Bedarf"
      - "Video-Beratung zunehmend"
    ebf_kappa: "kappa_PHYS"

# =============================================================================
# KLIENTENSEGMENTE MIT VERHALTENSPARAMETERN
# =============================================================================

client_segments:

  - id: "SEG-01"
    name: "Akut Ueberschuldete"
    description: |
      Personen mit laufenden Betreibungen, Pfaendungen, akutem
      Handlungsdruck. Kommen oft erst wenn "das Wasser bis zum Hals steht".
    share: 0.40

    behavioral_parameters:
      lambda_loss_aversion: 3.20
      # Sehr hohe Verlustaversion - jeder weitere Verlust schmerzt extrem
      beta_present_bias: 0.65
      # Starker Present Bias - kurzfristige Beduerfnisse dominieren
      kappa_default_sensitivity: 0.85
      # Hohe Default-Sensitivitaet - folgen Empfehlungen wenn klar
      sigma_social_proof: 0.45
      # Mittlere Social Proof - Scham reduziert Offenheit
      ostrich_effect: 0.80
      # Stark: Vermeiden negative Informationen
      decision_paralysis: 0.75
      # Hoch: Ueberwaeltigt von Komplexitaet

    intervention_affinity:
      high:
        - "Klare Defaults (\"Das empfehlen wir\")"
        - "Kleine erste Schritte (Foot-in-the-door)"
        - "Sofortige kleine Erfolge (Quick Wins)"
      medium:
        - "Commitment Devices"
        - "Implementation Intentions"
      low:
        - "Langfristige Planung (zu abstrakt)"
        - "Social Proof (Scham)"

  - id: "SEG-02"
    name: "Praekritische Haushalte"
    description: |
      Haushalte mit Zahlungsschwierigkeiten aber noch ohne Betreibungen.
      Fruehzeitige Intervention moeglich. Oft durch Dritte vermittelt.
    share: 0.30

    behavioral_parameters:
      lambda_loss_aversion: 2.50
      beta_present_bias: 0.75
      kappa_default_sensitivity: 0.70
      sigma_social_proof: 0.55
      ostrich_effect: 0.60
      decision_paralysis: 0.50

    intervention_affinity:
      high:
        - "Fruehwarnsysteme"
        - "Budget-Tracking Tools"
        - "Praevention Messaging"
      medium:
        - "Commitment Devices"
        - "Social Proof (\"Viele in Ihrer Situation...\")"
      low:
        - "Krisenintervention (noch nicht noetig)"

  - id: "SEG-03"
    name: "Praeventiv-Klienten"
    description: |
      Personen die proaktiv Budget-Hilfe suchen. Oft junge Erwachsene,
      Personen nach Lebensereignis (Scheidung, neuer Job).
    share: 0.15

    behavioral_parameters:
      lambda_loss_aversion: 2.10
      beta_present_bias: 0.85
      kappa_default_sensitivity: 0.65
      sigma_social_proof: 0.70
      ostrich_effect: 0.30
      decision_paralysis: 0.35

    intervention_affinity:
      high:
        - "Finanzbildung"
        - "Budget-Apps und Tools"
        - "Gamification"
        - "Social Proof"
      medium:
        - "Goal Setting"
        - "Progress Tracking"
      low:
        - "Krisenintervention"

  - id: "SEG-04"
    name: "Privatkonkurs-Klienten"
    description: |
      Personen im oder nach Privatkonkursverfahren. Neustart-Phase.
      Benoetigen Begleitung fuer schuldenfreies Leben.
    share: 0.15

    behavioral_parameters:
      lambda_loss_aversion: 2.80
      beta_present_bias: 0.70
      kappa_default_sensitivity: 0.80
      sigma_social_proof: 0.40
      ostrich_effect: 0.55
      decision_paralysis: 0.60

    intervention_affinity:
      high:
        - "Neustart-Narrative (Fresh Start)"
        - "Klare Regeln und Struktur"
        - "Kleine Erfolge feiern"
      medium:
        - "Commitment Devices"
        - "Budget-Tracking"
      low:
        - "Social Proof (Stigma)"
        - "Komplexe Planung"

# =============================================================================
# AGGREGIERTE VERHALTENSPARAMETER
# =============================================================================

behavioral_parameters_aggregate:

  core_parameters:
    loss_aversion:
      symbol: "lambda"
      value: 2.78
      range: [2.10, 3.20]
      source: "Segment-gewichteter Durchschnitt (LLMMC)"
      note: |
        Deutlich ueber Bevoelkerungsdurchschnitt (2.25).
        Finanzielle Verluste wiegen bei Ueberschuldeten besonders schwer.

    present_bias:
      symbol: "beta"
      value: 0.72
      range: [0.65, 0.85]
      source: "Segment-gewichteter Durchschnitt (LLMMC)"
      note: |
        Unter Bevoelkerungsdurchschnitt (0.85). Kurzfristige Beduerfnisse
        dominieren - ein Kernproblem bei Ueberschuldung.

    default_sensitivity:
      symbol: "kappa_default"
      value: 0.77
      range: [0.65, 0.85]
      source: "Segment-gewichteter Durchschnitt (LLMMC)"
      note: |
        Hoch - Klienten folgen klaren Empfehlungen. Chance fuer
        verhaltensorientierte Beratung.

    social_proof:
      symbol: "sigma_social"
      value: 0.50
      range: [0.40, 0.70]
      source: "Segment-gewichteter Durchschnitt (LLMMC)"
      note: |
        Reduziert durch Scham/Stigma. Social Proof funktioniert nur
        wenn anonymisiert oder in Peer-Gruppen.

  domain_specific_parameters:
    ostrich_effect:
      symbol: "omega_ostrich"
      value: 0.62
      range: [0.30, 0.80]
      description: "Tendenz, negative finanzielle Informationen zu vermeiden"
      source: "Karlsson, Loewenstein & Seppi (2009)"

    decision_paralysis:
      symbol: "delta_paralysis"
      value: 0.58
      range: [0.35, 0.75]
      description: "Entscheidungslahmung durch Komplexitaet/Overwhelm"
      source: "Iyengar & Lepper (2000), adaptiert"

    shame_sensitivity:
      symbol: "sigma_shame"
      value: 0.75
      range: [0.50, 0.90]
      description: "Sensitivitaet gegenueber Scham/Stigma bei Schulden"
      source: "LLMMC Schaetzung, CH-Kontext"

# =============================================================================
# STRATEGISCHE IMPLIKATIONEN
# =============================================================================

strategic_implications:

  top_3_opportunities:
    - dimension: "AWARE"
      opportunity: "Ostrich-Effekt reduzieren"
      intervention_type: "Gentle Information Disclosure"
      description: |
        Klienten vermeiden negative Finanzinformationen aktiv.
        Intervention: Sanfte, nicht-bedrohliche Informationsvermittlung.
        Z.B. "Finanz-Check-in" statt "Schuldenanalyse".

    - dimension: "READY"
      opportunity: "Decision Paralysis ueberwinden"
      intervention_type: "Choice Architecture / Simplification"
      description: |
        Komplexitaet der Schuldensituation ueberwaeltigt.
        Intervention: Klare Defaults, kleine erste Schritte,
        "Was ist der EINE naechste Schritt?"

    - dimension: "STAGE"
      opportunity: "Fruehzeitige Kontaktaufnahme foerdern"
      intervention_type: "Reframing / Entstigmatisierung"
      description: |
        Klienten kommen zu spaet. Intervention: Schuldenberatung
        als "normale" Dienstleistung framen. Praevention betonen.

  top_3_risks:
    - risk: "Crowding-Out intrinsischer Motivation"
      mitigation: |
        Keine externen Anreize (Geld) fuer Beratungsadhärenz.
        Stattdessen: Autonomie-unterstuetzende Kommunikation.

    - risk: "Reaktanz bei Bevormundung"
      mitigation: |
        Klienten in Krise sind sensibel fuer Kontrollverlust.
        Empfehlungen als Optionen praesentieren, nicht als Vorschriften.

    - risk: "Scham verstaerken durch falsche Kommunikation"
      mitigation: |
        Sprache sorgfaeltig waehlen. Nicht "Schuldner" sondern
        "Menschen in finanziellen Schwierigkeiten".

  recommended_next_step: |
    1. Projekt-Scope definieren: Welcher Use Case hat Prioritaet?
       - Beratungsadhärenz? Praevention? Budgeteinhaltung?

    2. Klientensegmente mit Plusminus-Team validieren

    3. Bei konkretem Projekt: Upgrade auf STANDARD-Kontext fuer
       detaillierte Interventionsentwicklung

# =============================================================================
# 10C CORE MAPPING FUER SCHULDENBERATUNG
# =============================================================================

core_10c_mapping:

  WHO:
    description: "Wer sind die Klienten und Stakeholder?"
    key_actors:
      - "Klienten (ueberschuldet, praekritisch, praeventiv)"
      - "Angehoerige (Mit-Betroffene, Unterstuetzer)"
      - "Glaeubiger (Banken, Steuern, Krankenkassen)"
      - "Arbeitgeber (bei Lohnpfaendung)"
      - "Sozialstaat (Sozialhilfe, IV)"
    behavioral_relevance: |
      Identitaet als "Schuldner" ist belastend. Reframing zu
      "Person in Uebergang" kann helfen.

  WHAT:
    description: "Was treibt Verhalten?"
    utility_dimensions:
      U_F: "Finanzielle Stabilitaet (primaer)"
      U_S: "Soziale Anerkennung, Schamvermeidung"
      U_P: "Psychisches Wohlbefinden, Stressreduktion"
      U_D: "Autonomie, Kontrolle ueber eigenes Leben"
    behavioral_relevance: |
      Schamvermeidung (U_S negativ) oft staerker als
      rationale Kostenreduktion (U_F).

  HOW:
    description: "Wie interagieren die Faktoren?"
    key_interactions:
      - "Scham x Informationssuche = Vermeidung (gamma negativ)"
      - "Defaults x Decision Paralysis = hohe Wirksamkeit (gamma positiv)"
      - "Zeitdruck x Kognitive Last = schlechte Entscheidungen"
    behavioral_relevance: |
      Present Bias x Loss Aversion = "Ich kann nicht sparen,
      weil ich jetzt schon zu wenig habe" (Scarcity Mindset)

  WHEN:
    description: "Wann ist Kontext relevant?"
    critical_moments:
      - "Erste Mahnung / Zahlungsbefehl (Trigger)"
      - "Beratungsgespraech (Intervention Window)"
      - "Monatsende (Budget-Stress)"
      - "Lohntag (Versuchung vs. Pflicht)"
      - "Lebensuebergaenge (Scheidung, Jobverlust)"
    behavioral_relevance: |
      Timing ist kritisch: Intervention muss VOR Eskalation
      erfolgen, aber Klienten kommen oft erst danach.

  WHERE:
    description: "Wo finden Entscheidungen statt?"
    decision_contexts:
      - "Beratungsstelle (strukturiert, unterstuetzt)"
      - "Zuhause (E-Banking, Budget-App)"
      - "Geschaeft (Impulskauf-Versuchung)"
      - "Online (Bestellungen, Abos)"
    behavioral_relevance: |
      Beratung ist "kontrollierte Umgebung" - Alltag nicht.
      Interventionen muessen im Alltag wirken.

  AWARE:
    description: "Wie bewusst ist das Problem?"
    awareness_levels:
      - "Unbewusst: Problem wird nicht erkannt"
      - "Vermeidend: Problem bekannt aber ignoriert (Ostrich)"
      - "Ueberwaeltigt: Problem erkannt aber paralysiert"
      - "Handlungsbereit: Problem erkannt und bereit zu handeln"
    behavioral_relevance: |
      Viele Klienten sind "vermeidend" oder "ueberwaeltigt".
      Awareness-Intervention: Sanfte Konfrontation + naechster Schritt.

  READY:
    description: "Wie handlungsbereit?"
    readiness_factors:
      - "Selbstwirksamkeit (\"Kann ich das schaffen?\")"
      - "Outcome Expectancy (\"Bringt das was?\")"
      - "Kosten-Nutzen der Aenderung"
      - "Emotionale Kapazitaet"
    behavioral_relevance: |
      Scham und Overwhelm reduzieren Readiness.
      Kleine Erfolge und klare Schritte erhoehen sie.

  STAGE:
    description: "Wo in der Schulden-Journey?"
    journey_stages:
      - "Praevention (noch keine Probleme)"
      - "Fruehwarnung (erste Zeichen)"
      - "Akute Krise (Betreibung, Pfaendung)"
      - "Sanierung (aktive Schuldenreduktion)"
      - "Neustart (nach Konkurs/Sanierung)"
    behavioral_relevance: |
      Interventionen muessen stage-spezifisch sein.
      Was in Praevention wirkt, versagt in akuter Krise.

# =============================================================================
# UPGRADE-PFAD
# =============================================================================

upgrade_path:
  current_level: "SCHNELL"
  next_level: "STANDARD"
  requirements_for_upgrade:
    - "Anonymisierte Klientendaten (Segmentvalidierung)"
    - "Prozessdokumentation Beratungsablauf"
    - "Erfolgskennzahlen (Sanierungsquote, Adhaerenz)"
    - "Interview mit Beratungsteam (2-3h)"
  estimated_effort: "1-2 Tage"
  recommended_trigger: "Konkrete Interventionsentwicklung / Projektauftrag"

