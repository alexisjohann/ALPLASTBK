# =============================================================================
# PSI-DIMENSIONEN
# =============================================================================

psi_dimensions:

  psi_I_institutional:
    value: 0.40
    label: "Institutionell"
    description: |
      Moderate Regulierung. Medienmarkt ist weniger reguliert als Rundfunk (SRG).
      WEKO hat RMS-Gruendung genehmigt. Keine Konzession wie SRG.
      DSG (Datenschutzgesetz) relevant fuer Datennutzung/Personalisierung.
      Medienfoerderung: Indirekte Pressefoerderung (Posttaxen), aber RMS nicht
      primaerer Empfaenger.
    key_factors:
      - "WEKO-Genehmigung erteilt (keine Auflagen)"
      - "Kein Service-Public-Auftrag (anders als SRG)"
      - "DSG 2023 relevant fuer Data Hub / Personalisierung"
    ebf_kappa: "kappa_INST"

  psi_S_social:
    value: 0.70
    label: "Sozial"
    description: |
      Hohe soziale Relevanz. Blick ist Teil der Schweizer Alltagskultur.
      Beobachter hat starke Marke (120k Abonnenten, 6k digital, Premium-Abo).
      Markenidentitaet ist fuer Redaktionen UND Leser:innen emotional.
      Fusionsangst in Redaktionen bei One-Platform-Szenario.
    key_factors:
      - "Blick = Volkszeitung, breite Verankerung"
      - "Beobachter = Vertrauensmarke, 100 Jahre"
      - "Redaktionelle Identitaet = starker Social Factor"
      - "Journalisten-Loyalitaet zu 'ihrer' Marke"
    ebf_kappa: "kappa_SOCIAL"

  psi_C_cognitive:
    value: 0.55
    label: "Kognitiv"
    description: |
      Medienkonsum ist habituell (System 1). User waehlen Marke oft aus
      Gewohnheit, nicht bewusster Entscheidung. Abo-Entscheidung ist
      dagegen deliberativ (System 2). Informationsueberflutung fuehrt
      zu Choice Overload bei zu vielen Angeboten.
    key_factors:
      - "Habitueller Medienkonsum (Gewohnheit > bewusste Wahl)"
      - "Abo-Entscheidung = deliberativ, preissensitiv"
      - "Information Overload bei fragmentiertem Portfolio"
    ebf_kappa: "kappa_COG"

  psi_K_cultural:
    value: 0.65
    label: "Kulturell"
    description: |
      Schweizer Medienvielfalt wird als demokratischer Wert gesehen.
      Konsolidierung kann als Verarmung wahrgenommen werden.
      Sprachregionen (DE/FR) erfordern separate Angebote.
      Blick hat Boulevard-Image, das nicht zu Bilanz/HZ passt.
    key_factors:
      - "Medienvielfalt als demokratischer Wert in CH"
      - "Sprachregionale Unterschiede (DE vs. FR)"
      - "Image-Gap: Blick (Boulevard) vs. Bilanz (Premium)"
    ebf_kappa: "kappa_CULT"

  psi_E_economic:
    value: 0.35
    label: "Oekonomisch"
    description: |
      Hoher wirtschaftlicher Druck. Print-Erloese sinken, Online-Werbung
      stagniert fuer Publisher (-1.1%), waehrend Big Tech +7% waechst.
      Kostensenkungsprogramm laeuft (~5% Gesamtkosten).
      Blick+ Abo-Erloese "noch nicht signifikant".
    key_factors:
      - "Print-Erloese sinken strukturell"
      - "Online-Werbung -1.1% fuer Publisher vs. +7% Big Tech"
      - "5% Kostensenkungsprogramm laeuft"
      - "Blick+ 30k Abos (Feb 2026, Quelle: RMS)"
    ebf_kappa: "kappa_ECON"

  psi_T_temporal:
    value: 0.80
    label: "Temporal"
    description: |
      Hoher Zeitdruck. Window of Opportunity fuer digitale Transformation
      schliesst sich. 20 Minuten stellt Print ein (Ende 2025).
      KI-Chatbots als Nachrichtenquelle wachsen rasant (60% KI-Nutzung).
      Entscheidung ueber Plattform-Architektur muss JETZT fallen.
    key_factors:
      - "Print-Deadline: 20min stellt ein, andere folgen"
      - "KI-Disruption beschleunigt sich (60% Nutzung)"
      - "foeg 2035: Eigene Kanaele JETZT ausbauen"
    ebf_kappa: "kappa_TEMP"

  psi_M_material:
    value: 0.70
    label: "Materiell/Technologisch"
    description: |
      Gute technologische Basis. OneLog (SSO) ist live.
      Ringier Data Hub existiert. AdUnit als One-Stop-Shop.
      Audio/Video Powerhouse zentralisiert.
      Aber: Separate CMSe pro Marke (wie Schibsted vor Konsolidierung).
    key_factors:
      - "OneLog (SSO) = branchenweite Login-Infrastruktur"
      - "Ringier Data Hub = Daten-Plattform"
      - "AdUnit (ab Maerz 2026) = Werbe-One-Stop-Shop"
      - "Separate CMSe pro Marke (Konsolidierungspotenzial)"
    ebf_kappa: "kappa_MAT"

  psi_F_physical:
    value: 0.20
    label: "Physisch"
    description: |
      Primaer digitaler Konsum. Print nimmt ab.
      Livesystems-Partnerschaft bringt Content auf 13'000 Screens.
      Physische Touchpoints (Kiosk, Events) werden weniger relevant.
    key_factors:
      - "Medienkonsum primaer digital/mobil"
      - "13'000 DOOH-Screens (Livesystems ab 2026)"
      - "Print-Kiosk-Vertrieb ruecklaeufig"
    ebf_kappa: "kappa_PHYS"

