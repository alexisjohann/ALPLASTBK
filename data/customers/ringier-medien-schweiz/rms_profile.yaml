  code: "BCM2_ORG_RMS"
  layer: "meso"
  version: "1.0"
  last_updated: "2026-02-06"
  cva_stufe: "SCHNELL"
  total_factors: 32
  description: |
    Kontextvektor fuer Ringier Medien Schweiz (RMS).
    Groesstes privates Medienhaus der Schweiz mit 12+ Marken.

    Aktuelle Herausforderung:
    - STRATEGISCH: One-Platform-Entscheidung (Konsolidierung unter Blick?)
    - MARKT: Sinkende Print-Erloese, Big Tech dominiert Werbemarkt
    - DIGITAL: Blick+ Paywall (16k+ Abos), Bilanz.ch Relaunch

  hierarchy:
    parent: "BCM2_MESO_MEDIEN_CH"
    grandparent: "BCM2_04_KON (MAKRO Schweiz)"

  ebf_mapping:
    primary_10c:
      - "WHO"      # User-Segmente (Massenmarkt vs. Nische)
      - "WHAT"     # Was treibt Medienkonsum/Abo-Entscheidung?
      - "WHEN"     # Zeitdruck der Transformation
      - "AWARE"    # Markenbekanntheit und -wahrnehmung
      - "HOW"      # Komplementaritaet zwischen Marken
    primary_psi:
      - "kappa_INST"      # Medienregulierung, WEKO
      - "kappa_IDENTITY"  # Markenidentitaet (Blick vs. Beobachter vs. Bilanz)
      - "kappa_ECON"      # Werbe- und Abo-Erloese unter Druck

