# =============================================================================
# ONE-PLATFORM SPEZIFISCHE ANALYSE
# =============================================================================

one_platform_context:

  current_state: "Multi-Brand mit partieller Buendelung"

  already_consolidated:
    - "Blick+ inkludiert HZ/Bilanz/Beobachter/cash/SI Inhalte"
    - "Audio/Video Powerhouse zentralisiert (Nov 2025)"
    - "Ringier Advertising = zentrale Vermarktung"
    - "AdUnit = One-Stop-Shop Werbung (ab Maerz 2026)"
    - "Livesystems = Blick als Newslieferant (13k Screens)"
    - "OneLog = branchenweites SSO"

  not_yet_consolidated:
    - "Separate Websites/Apps pro Marke"
    - "Separate CMSe (vermutlich)"
    - "Separate Redaktionen mit eigener Identitaet"
    - "Bilanz.ch Relaunch als EIGENSTAENDIGE Plattform (gegenlaeufig!)"

  key_tension: |
    RMS buendelt de facto bereits Inhalte unter Blick+ (Abo-Ebene)
    und Ringier Advertising (Werbe-Ebene), aber Bilanz.ch wurde
    gerade als eigenstaendige Plattform relauncht. Es gibt zwei
    gegenlaefugie Bewegungen im selben Unternehmen.

  platform_levels:
    - level: "Backend/CMS"
      description: "Gemeinsame technische Plattform (Schibsted-Modell)"
      consolidation_status: "nicht konsolidiert"
    - level: "Abo/Paywall"
      description: "Blick+ als Bundle-Zugang"
      consolidation_status: "teilweise konsolidiert"
    - level: "Werbevermarktung"
      description: "Ringier Advertising + AdUnit"
      consolidation_status: "konsolidiert"
    - level: "User-Destination"
      description: "Eine Website/App fuer alles"
      consolidation_status: "nicht konsolidiert (= die Kernfrage)"

  international_references:
    - name: "Schibsted (Norwegen/Schweden)"
      approach: "Backend-Konsolidierung, separate Frontends"
