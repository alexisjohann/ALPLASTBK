      ebf_dimension: "READY"

    - id: RMS-STR-CHG-09
      name: "Schulungs- und Upskilling-Programm"
      definition: |
        Umfang und Effektivitaet des KI- und Digital-Schulungsprogramms
        fuer alle Mitarbeitenden. Pflichtkurse und freiwillige
        Vertiefungen.
      values:
        hours_per_employee_year: 24
        completion_rate_mandatory: 0.88
        completion_rate_voluntary: 0.42
