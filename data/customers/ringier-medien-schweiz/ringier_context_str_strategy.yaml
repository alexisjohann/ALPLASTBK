# =============================================================================
# RINGIER MEDIEN SCHWEIZ (RMS) - KONTEXTVEKTOR: STRATEGY (STR)
# =============================================================================
# Version: 1.0.0
# Framework: EBF Context Vector Architecture (CVA)
# Kategorie: STR - Strategy
# Faktoren: 40
# Created: 2026-02-06
# =============================================================================

metadata:
  code: "BCM2_RMS_STR"
  name: "Ringier Medien Schweiz Strategy Context Vector"
  category: "STR"
  layer: "meso"
  version: "1.0"
  last_updated: "2026-02-06"
  total_factors: 40
  sub_axes: 4
  customer_ref: "data/customers/ringier-medien-schweiz/ringier_profile.yaml"

  description: |
    Kontextvektor fuer strategische Aspekte von Ringier Medien Schweiz (RMS).
    Umfasst Vision & Positionierung, strategische Initiativen (KI-Transformation,
    Digital First, Werbeumsatz, Content Excellence), Innovation und
    Change Management. Ringier verfolgt unter CEO Marc Walder die Ambition,
    ein KI-getriebenes Medienunternehmen zu werden.

  ebf_mapping:
    primary_10c:
      - "WHAT"     # Strategische Ziele und Utility-Dimensionen
      - "READY"    # Transformationsbereitschaft Organisation
      - "STAGE"    # Phase der KI- und Digital-Transformation
      - "AWARE"    # Bewusstsein fuer strategischen Wandel
    primary_psi:
      - "kappa_TECH"   # Technologischer Wandel (KI, Automation)
      - "kappa_INST"   # Institutioneller Rahmen (Medienmarkt CH)
      - "kappa_ECON"   # Oekonomischer Druck (Werbeerloes-Shift)

  data_sources:
    - "Ringier Geschaeftsbericht 2024"
    - "Marc Walder Interviews / Keynotes"
    - "Medienberichte (Persoenlich, Klein Report, Medienwoche)"
    - "Ringier Advertising Factsheets"
    - "Blick Group Strategie-Kommunikation"

  strategic_pillars:
    - code: "S1-AI"
      name: "KI-Transformation"
      weight: 0.30
    - code: "S2-DIGITAL"
      name: "Digital First"
      weight: 0.25
    - code: "S3-ADVERTISING"
      name: "Werbeumsatz sichern & ausbauen"
      weight: 0.25
    - code: "S4-CONTENT"
      name: "Content Excellence"
      weight: 0.20

# =============================================================================
# STR-VIS - Vision & Positionierung (8 Faktoren)
# =============================================================================
STR_VIS:
  name: "Vision & Positionierung"
  description: "Mission, Markenversprechen, Differenzierung, strategische Ambition"
  factor_count: 8
  factors:
    - id: RMS-STR-VIS-01
      name: "Vision Statement"
      definition: |
        Uebergeordnete Vision von Ringier Medien Schweiz: Fuehrendes und
        innovativstes Medienunternehmen der Schweiz.
      values:
        current: "Fuehrendes und innovativstes Medienunternehmen der Schweiz"
        since: 2023
      unit: "qualitativ"
      trend: "stabil"
      source: "Ringier Strategie-Kommunikation"

    - id: RMS-STR-VIS-02
      name: "KI-Unternehmens-Ambition"
      definition: |
        Strategische Ambition, Ringier als KI-getriebenes Unternehmen zu
        positionieren. Marc Walder: 'Ringier will ein KI-getriebenes
        Unternehmen werden.' Betrifft alle Geschaeftsbereiche.
      values:
        commitment_level: 0.90
        ceo_priority: "hoechste"
        announced: 2023
      unit: "qualitativ"
      trend: "verstaerkend"
      source: "Marc Walder Keynotes, Interviews 2023-2025"

    - id: RMS-STR-VIS-03
      name: "Marktpositionierung Schweiz"
      definition: |
        Positionierung im Schweizer Medienmarkt relativ zu TX Group
        (Tamedia/20 Minuten), CH Media und NZZ-Mediengruppe.
      values:
        rank_reach: 1
        rank_digital: 1
        rank_innovation: 1
        key_differentiator: "KI-First, Reichweite, Boulevard + Quality"
      unit: "Rang"
      trend: "stabil"
      source: "NET-Metrix, Medienberichte"

    - id: RMS-STR-VIS-04
      name: "Markenarchitektur"
      definition: |
        Portfolio-Struktur der Ringier-Medienmarken in der Schweiz.
        Blick als Flaggschiff, Bilanz/Handelszeitung im Wirtschaftssegment,
        Beobachter im Ratgeber, GaultMillau/Landliebe als Nischen.
      values:
        flagship: "Blick"
        premium_business: ["Bilanz", "Handelszeitung"]
        consumer_advisory: "Beobachter"
        lifestyle_niche: ["GaultMillau", "Landliebe", "Schweizer Illustrierte"]
      unit: "qualitativ"
      trend: "konsolidierend"
      source: "Ringier Portfolio-Uebersicht"

    - id: RMS-STR-VIS-05
      name: "Brand Promise Blick"
      definition: |
        Markenversprechen der Kernmarke Blick: schnellste, relevanteste
        und unterhaltsamste Nachrichtenmarke der Schweiz.
      values:
        promise: "Schnell, relevant, unterhaltend"
        target_audience: "18-55, breit, digital-affin"
        brand_strength_index: 78.0
      unit: "Index (100=Max)"
      trend: "steigend (digitale Staerkung)"
      source: "Blick Markenstrategie"

    - id: RMS-STR-VIS-06
      name: "Differenzierung vs. Wettbewerb"
      definition: |
        Wahrgenommene strategische Differenzierung gegenueber TX Group,
        CH Media und NZZ. Hauptdifferenzierung: KI-Vorreiter, Reichweite,
        digitale Geschwindigkeit.
      values:
        vs_tx_group: "Schneller digital, staerker KI, breiter Boulevard"
        vs_ch_media: "Nationaler vs. regional, digitaler"
        vs_nzz: "Massenmarkt vs. Quality, KI-getrieben vs. Premium-Abo"
        differentiation_score: 7.2
      unit: "Index (1-10)"
      trend: "steigend"
      source: "Medienberichte, Experteneinschaetzung"

    - id: RMS-STR-VIS-07
      name: "Strategische Ambitions-Glaubwuerdigkeit"
      definition: |
        Inwieweit werden die strategischen Ambitionen (KI-Fuehrerschaft,
        Digital First) von Branche und Mitarbeitenden als glaubwuerdig
        eingestuft?
      values:
        external_credibility: 0.72
        internal_credibility: 0.65
        execution_track_record: 0.68
      unit: "Score (0-1)"
      trend: "steigend"
      source: "Branchenumfragen, MA-Befragung (Schaetzung)"

    - id: RMS-STR-VIS-08
      name: "Portfolio-Bereinigungsstrategie"
      definition: |
        Konsequente Bereinigung des Portfolios: DeinDeal verkauft (2024),
        Swissprinters geschlossen (2024). Fokus auf Kerngeschaeft
        Medien + Advertising + Marktplaetze.
      values:
        divested_2024: ["DeinDeal", "Swissprinters"]
        focus_areas: ["Medien", "Advertising", "Marktplaetze"]
        portfolio_clarity_score: 0.78
      unit: "qualitativ"
      trend: "klar steigend"
      source: "Ringier Geschaeftsbericht 2024, Medienberichte"

# =============================================================================
# STR-INI - Strategische Initiativen (12 Faktoren)
# =============================================================================
STR_INI:
  name: "Strategische Initiativen"
  description: "KI-Transformation, Digital Subscriptions, AdUnit, Livesystems, Relaunch-Projekte"
  factor_count: 12
  factors:
    - id: RMS-STR-INI-01
      name: "S1-AI: KI-Transformation Gesamtprogramm"
      definition: |
        Uebergreifendes KI-Transformationsprogramm unter Leitung
        Business & AI Transformation Unit (Roman Sigrist). Umfasst
        Content-Automation, Palantir-Partnerschaft, AI Super Desk.
      values:
        strategic_weight: 0.30
        budget_share: 0.25
        status: "Rollout"
        lead: "Roman Sigrist (Business & AI Transformation)"
        start: 2023
      unit: "qualitativ"
      trend: "stark steigend"
      source: "Ringier Organisationsstruktur, Medienberichte"

    - id: RMS-STR-INI-02
      name: "Palantir-Partnerschaft"
      definition: |
        Strategische Partnerschaft mit Palantir Technologies fuer
        datengetriebene Entscheidungsfindung und KI-Infrastruktur.
        Palantir AIP als Basisplattform fuer KI-Anwendungen.
      values:
        partner: "Palantir Technologies"
        platform: "Palantir AIP (Artificial Intelligence Platform)"
        partnership_since: 2023
        integration_depth: 0.70
        use_cases: ["Datenanalyse", "Content-Optimierung", "Werbe-Targeting", "Redaktionssteuerung"]
      unit: "qualitativ"
      trend: "vertiefend"
      source: "Ringier/Palantir Kommunikation, Handelszeitung"

    - id: RMS-STR-INI-03
      name: "AI Super Desk"
      definition: |
        RMS Super Desk als crossmediale Steuerungszentrale fuer
        alle Ringier-Medientitel. KI-gestuetzte Themenplanung,
        automatisierte Content-Distribution, Echtzeit-Performance-Tracking.
      values:
        operational_since: 2024
        titles_connected: ["Blick", "Bilanz", "Handelszeitung", "Beobachter", "SI"]
        automation_rate: 0.35
        target_automation_2027: 0.60
      unit: "qualitativ"
      trend: "stark steigend"
      source: "Ringier Newsroom-Kommunikation"

    - id: RMS-STR-INI-04
      name: "Automatisierte Content-Erstellung"
      definition: |
        KI-gestuetzte automatische Erstellung von Inhalten: Sport-
        Resultate, Wetter, Boersen, Event-Zusammenfassungen.
        Freisetzung redaktioneller Kapazitaet fuer Qualitaetscontent.
      values:
        automated_articles_per_day: 120
        article_types: ["Sport-Resultate", "Wetter", "Boersen", "Aggregation"]
        quality_score_automated: 6.8
        capacity_freed_percent: 15.0
      unit: "Artikel/Tag"
      trend: "stark steigend"
      source: "Ringier Tech-Kommunikation (Schaetzung)"

    - id: RMS-STR-INI-05
      name: "S2-DIGITAL: Blick+ Subscriptions"
      definition: |
        Digitales Abo-Modell Blick+ (Paid Content). Strategisches Ziel:
        digitale Erloesstroeme neben Werbung aufbauen. Freemium-Modell
        mit Premium-Artikeln hinter Paywall.
      values:
        subscribers_current: 25000
        subscriber_target_2027: 80000
        arpu_monthly_chf: 12.90
        conversion_rate_free_to_paid: 0.028
        churn_rate_monthly: 0.06
      unit: "Abonnenten"
      trend: "wachsend"
      source: "Blick+ Kommunikation, Medienberichte"

    - id: RMS-STR-INI-06
      name: "bilanz.ch Relaunch"
      definition: |
        Strategischer Relaunch von bilanz.ch als fuehrendes
        Schweizer Wirtschaftsportal. Digital-only Fokus,
        Premium-Content-Strategie, Zielgruppe Entscheidungstraeger.
      values:
        relaunch_date: "2024"
        format: "digital-only"
        target_audience: "C-Level, Entscheidungstraeger, Investoren"
        unique_users_monthly: 450000
        premium_content_share: 0.40
      unit: "qualitativ"
      trend: "steigend"
      source: "Ringier Medien-Kommunikation"

    - id: RMS-STR-INI-07
      name: "Digital-Only Formate"
      definition: |
        Entwicklung reiner Digital-Formate ohne Print-Aequivalent:
        Newsletters, Podcasts, Video-Formate, interaktive Specials.
      values:
        digital_only_formats: 18
        newsletter_subscribers_total: 280000
        podcast_downloads_monthly: 850000
        video_views_monthly: 12000000
      unit: "Formate"
      trend: "stark steigend"
      source: "Ringier Digital-Reporting (Schaetzung)"

    - id: RMS-STR-INI-08
      name: "S3-ADVERTISING: AdUnit Akquisition"
      definition: |
        Uebernahme von AdUnit zur Staerkung des Werbegeschaefts.
        Integration in Ringier Advertising fuer erweitertes
        Inventar und Performance-Marketing-Capabilities.
      values:
        acquired: 2024
        integration_status: "laufend"
        added_capabilities: ["Performance Marketing", "Programmatic", "Native"]
        revenue_contribution_target: 0.12
      unit: "qualitativ"
      trend: "integrierend"
      source: "Ringier Advertising Kommunikation, Medienberichte"

    - id: RMS-STR-INI-09
      name: "Livesystems Partnerschaft"
      definition: |
        Strategische Partnerschaft mit Livesystems fuer Digital
        Out-of-Home (DOOH) Werbung. Erweiterung des Werbe-Oekosystems
        ueber digitale Bildschirme im oeffentlichen Raum.
      values:
        partner: "Livesystems"
        screens_network: 5500
        partnership_since: 2024
        dooh_revenue_share: 0.08
        coverage: "Schweizweit (Bahnhoefe, oeffentlicher Raum)"
      unit: "qualitativ"
      trend: "aufbauend"
      source: "Ringier Advertising, Livesystems"

    - id: RMS-STR-INI-10
      name: "Ringier Advertising Gesamtstrategie"
      definition: |
        Ringier Advertising als Full-Service-Vermarkter mit
        Cross-Channel-Capabilities: Print, Digital, DOOH, Audio,
        Performance, Native. Vermarktung Drittkunden zusaetzlich
        zu Eigeninventar.
      values:
        channels: ["Print", "Digital Display", "Video", "DOOH", "Audio", "Native", "Performance"]
        advertiser_clients: 2500
        cross_channel_campaigns_share: 0.35
        revenue_target_growth_yoy: 0.08
      unit: "qualitativ"
      trend: "steigend"
      source: "Ringier Advertising Factsheet"

    - id: RMS-STR-INI-11
      name: "S4-CONTENT: Content Excellence Programm"
      definition: |
        Qualitaetsjournalismus als strategischer Differenzierungsfaktor.
        Investition in investigativen Journalismus, Datenjournalismus,
        Longform und multimediale Formate.
      values:
        strategic_weight: 0.20
        investigative_team_size: 12
        quality_score_blick: 6.5
        quality_target_2027: 7.5
        awards_per_year: 8
      unit: "qualitativ"
      trend: "steigend"
      source: "Blick Redaktionsstrategie"

    - id: RMS-STR-INI-12
      name: "Audio/Video Konsolidierung"
      definition: |
        Zusammenfuehrung und Ausbau der Audio- und Video-Produktion
        ueber alle Titel hinweg. Cross-Title-Synergien bei Podcasts,
        Video-Formaten und Live-Streaming.
      values:
        podcast_titles: 15
        video_formats: 8
        cross_title_synergy_rate: 0.40
        production_efficiency_gain: 0.20
        audio_monthly_reach: 1200000
      unit: "qualitativ"
      trend: "konsolidierend"
      source: "RMS Medien-Strategie"

