# =============================================================================
# STR-CHG - Change Management (10 Faktoren)
# =============================================================================
STR_CHG:
  name: "Change Management"
  description: "Transformationsbereitschaft, Restrukturierung, Mitarbeiter-Adoption, Kulturwandel"
  factor_count: 10
  factors:
    - id: RMS-STR-CHG-01
      name: "Transformation Readiness Index"
      definition: |
        Gesamtindex der organisatorischen Bereitschaft fuer die
        laufende KI- und Digital-Transformation. Composite aus
        Faehigkeiten, Bereitschaft und Ressourcen.
      values:
        2023: 0.45
        2024: 0.55
        2025: 0.63
        2027_target: 0.80
      unit: "Score (0-1)"
      trend: "steigend"
      source: "RMS HR/Strategie (Schaetzung)"
      ebf_dimension: "READY"

    - id: RMS-STR-CHG-02
      name: "Restrukturierungs-Impact"
      definition: |
        Auswirkungen der organisatorischen Restrukturierungen
        2023-2025: Zusammenlegung Redaktionen, neue Unit-Struktur,
        Portfolio-Bereinigung (DeinDeal, Swissprinters).
      values:
        positions_affected: 180
        units_restructured: 5
        synergy_savings_chf_mio: 15.0
        morale_impact: -0.20
        efficiency_gain: 0.18
      unit: "qualitativ"
      trend: "stabilisierend"
      source: "Medienberichte, Ringier Kommunikation"

    - id: RMS-STR-CHG-03
      name: "KI-Adoption Mitarbeitende"
      definition: |
        Anteil Mitarbeitende die KI-Tools aktiv im Arbeitsalltag
        nutzen (nicht nur Schulung erhalten, sondern regelmaessig
        anwenden).
      values:
        2023: 0.12
        2024: 0.28
        2025: 0.45
        2027_target: 0.75
      unit: "Anteil (0-1)"
      trend: "stark steigend"
      source: "RMS HR (Schaetzung)"
      ebf_dimension: "AWARE"

    - id: RMS-STR-CHG-04
      name: "Digital Skills Readiness"
      definition: |
        Anteil Mitarbeitende mit ausreichenden digitalen Kompetenzen
        fuer die Anforderungen der neuen Strategie.
      values:
        2023: 0.40
        2024: 0.52
        2025: 0.62
        2027_target: 0.82
      unit: "Anteil (0-1)"
      trend: "steigend"
      source: "RMS HR/Learning (Schaetzung)"

    - id: RMS-STR-CHG-05
      name: "Kulturwandel Digital-First"
      definition: |
        Fortschritt des kulturellen Wandels von Print-First zu
        Digital-First Denkweise in der Redaktion und im gesamten
        Unternehmen.
      values:
        mindset_digital_first: 0.58
        process_digital_first: 0.65
        kpi_digital_first: 0.72
        composite: 0.65
      unit: "Score (0-1)"
      trend: "steigend"
      source: "RMS Strategie (Schaetzung)"

    - id: RMS-STR-CHG-06
      name: "Fuehrungskrafte-Alignment"
      definition: |
        Grad der Ausrichtung des Fuehrungsteams auf die strategischen
        Prioritaeten (KI, Digital, Advertising, Content).
      values:
        strategy_understanding: 0.82
        strategy_commitment: 0.75
        strategy_execution: 0.65
        composite: 0.74
      unit: "Score (0-1)"
      trend: "steigend"
      source: "RMS Leadership (Schaetzung)"

    - id: RMS-STR-CHG-07
      name: "Change Communication Effectiveness"
      definition: |
        Effektivitaet der internen Kommunikation zum Strategie-
        und Transformationsprozess. Mitarbeitende fuehlen sich
        informiert und eingebunden.
      values:
        information_reach: 0.78
        understanding: 0.62
        buy_in: 0.55
        composite: 0.65
      unit: "Score (0-1)"
      trend: "leicht steigend"
      source: "RMS MA-Befragung (Schaetzung)"

    - id: RMS-STR-CHG-08
      name: "Widerstand gegen Veraenderung"
      definition: |
        Ausmass des organisatorischen Widerstands gegen die laufenden
        Transformationen. Hauptquellen: Angst vor KI-Jobverlust,
