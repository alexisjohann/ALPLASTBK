Q7_bilanz_traffic_clarification:
  question: "Sind die 2.5M Bilanz-Sessions eigenstaendiger Traffic oder Teil von HZ?"
  status: "BEANTWORTET — State of Traffic Report (Jan 2026)"
  priority: "PRIO 1 — Aendert Bilanz-Parameter"
  context: |
    BEANTWORTET durch RMS State of Traffic Report!
    Bilanz ist auf eigener Domain (bilanz.ch), 2'509'756 Sessions sind
    EIGENSTAENDIGER Traffic.

  answer:
    source: "RMS State of Traffic Report, Jan 2026, S.8-9"
    finding: |
      Bilanz Traffic-Aufschluesselung (2'509'756 Sessions):
      - Referral (von Blick):  541'732 (40%) ← GROESSTE QUELLE!
      - SEO:                   514'883 (21%) — Trend 3m: +14% (wachsend trotz Google-Sandboxing)
      - Direct/Aggregators:    437'533 (17%)
      - Social:                378'101 (15%) — Trend 3m: +15%
      - Newsletters:            36'599  (3%) — Bilanz bekommt MEHR Traffic
                                               von HZ "Lunch Topics" als eigene NL!

      KRITISCHE ERKENNTNISSE:
      1. bilanz.ch ist EIGENSTAENDIGE Domain (bestaetigt)
      2. 40% des Traffics kommt von BLICK als Referral
         → Cross-Brand-Traffic EXISTIERT BEREITS ohne One-Platform!
         → Dies ist DIREKTE EVIDENZ fuer G2 (Cross-Discovery) im PCUM
      3. SEO waechst (+14% 3m Trend) — trotz "Google Sandboxing Risk"
         bei neuen Domains. Gutes Zeichen.
      4. Homepage-Anteil: nur 9% → Fast kein Habit, alles Intent-basiert
      5. Bilanz bekommt mehr NL-Traffic von HZ als von eigenen NL
         → Die alte HZ-Bilanz-Verbindung lebt noch

    impact_on_model: |
      MODELL-KORREKTUR NOETIG:
      1. G2 (Cross-Discovery) im Baseline (S1) ist NICHT null!
         Bilanz bekommt bereits 40% von Blick → G2_baseline ≈ 0.05-0.10
      2. V1 (Identity Loss) fuer Bilanz bleibt HOCH:
         Bilanz baut gerade eigenstaendige digitale Identitaet auf.
         Integration JETZT waere kontraproduktiv.
      3. EMPFEHLUNG BESTAETIGT: Bilanz 12-18 Monate wachsen lassen
         vor jeglicher L4-Integration. S2 (Backend + Abo) ist unproblematisch.

    remaining_question: |
      OFFEN: Wie wird der Blick→Bilanz Referral-Traffic generiert?
