Q2_user_overlap:
  question: "Wie hoch ist der User-Overlap zwischen den 5 digitalen Titeln?"
  status: "OFFEN — Braucht interne Daten"
  priority: "PRIO 1 — Zentral fuer Cross-Discovery-Modellierung (G2)"
  impact_on_model: |
    User-Overlap bestimmt das Cross-Discovery-Potenzial (G2).
    Hoher Overlap → G2 niedrig (User kennen die anderen Titel bereits)
    Niedriger Overlap → G2 hoch (Platform erschliesst neue Inhalte)

  hypothesis:
    blick_cash_overlap: "HOCH (30-40%) — Gleiche Zielgruppe, Daily News + Finance"
    blick_beobachter_overlap: "NIEDRIG (5-10%) — Verschiedene Nutzungsmuster"
    blick_bilanz_overlap: "SEHR NIEDRIG (<5%) — Komplett verschiedene Zielgruppen"
    cash_bilanz_overlap: "MITTEL (15-25%) — Beide Wirtschaft, aber anders"
    beobachter_alle_overlap: "NIEDRIG (<10%) — Intent-User, selten Habit-User"

  data_request:
    what: "Overlap-Matrix (Unique Users die ≥2 Titel nutzen)"
    format: |
      5×5 Matrix:
                   Blick   cash.ch   Bilanz   Beobachter   Blick_FR
      Blick          —       X%        X%        X%           X%
      cash.ch       X%        —        X%        X%           X%
      Bilanz        X%       X%         —        X%           X%
      Beobachter    X%       X%        X%         —           X%
      Blick_FR      X%       X%        X%        X%            —
    source: "RMS One-ID / Analytics (falls One-ID existiert) oder Inferred via Cookie/IP"
    fallback: "Falls kein One-ID: WEMF Cross-Platform-Daten oder Survey"
    note: |
      KRITISCH: Ohne Overlap-Daten ist G2 (Cross-Discovery) eine reine
      Schaetzung. Mit Overlap-Daten kann G2 empirisch kalibriert werden.

