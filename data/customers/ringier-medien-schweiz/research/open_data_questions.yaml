Q5_newsletter:
  question: "Wie hoch sind die Newsletter-Oeffnungsraten pro Titel?"
  status: "OFFEN — Braucht interne Daten"
  priority: "PRIO 3 — Relevant fuer Habit-Transfer (G4)"
  impact_on_model: |
    Newsletter = Proxy fuer Markenbindung und Habit-Staerke.
    Hohe Oeffnungsraten → Starke Marke → Hoeherer V1 (Identity Loss)
    Niedrige Oeffnungsraten → Schwache Bindung → Niedrigerer V1

  data_request:
    what: "Newsletter-KPIs pro Titel"
    format: |
      Titel          Abonnenten    Open Rate    CTR
      Blick          X             X%           X%
      cash.ch        X             X%           X%
      Beobachter     X             X%           X%
      Bilanz         X             X%           X%
    note: |
      Benchmark: Median Open Rate fuer News-Newsletter = 22-28%
      Wenn Bilanz/Beobachter deutlich hoeher → Starke Nischen-Bindung
      → V1 (Identity Loss) dort besonders hoch = bestaetigt PCUM

