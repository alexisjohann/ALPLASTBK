Q3_churn_rates:
  question: "Wie hoch sind die Abo-Kuendigungsraten pro Titel?"
  status: "OFFEN — Braucht interne Daten"
  priority: "PRIO 2 — Relevant fuer S2 (Abo-Buendelung)"
  impact_on_model: |
    Hohe Churn → Abo-Buendelung (S2) ist wertvoller (Retention-Effekt)
    Niedrige Churn → Buendelungs-Effekt ist kleiner

  data_request:
    what: "Monatliche Kuendigungsrate (Churn) pro Titel"
    format: |
      Titel        Abo-Typ       Monatl. Churn   Jaehrl. Churn
      Blick+       Digital        X%              X%
      Beobachter   Premium-Abo    X%              X%
      Bilanz       Premium-Abo    X%              X%
      cash.ch      (falls Abo)    X%              X%
    additional:
      - "Churn-Gruende (wenn bekannt): Preis / Content / Vergessen / Konkurrenz"
      - "Kuendigungszeitpunkt: Nach Probeabo? Nach X Monaten? Saisonal?"
      - "Retention-Massnahmen und deren Wirksamkeit"
    note: |
      Benchmark: Typische Digital-News-Churn-Rate in DACH = 5-8% monatlich.
      Wenn Blick+ Churn hoeher → Buendel-Effekt mit Beobachter/Bilanz besonders wertvoll.

