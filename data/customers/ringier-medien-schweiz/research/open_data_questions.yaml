Q4_digital_destinations:
  question: "Wo leben HZ, SI, Landliebe und andere Titel digital?"
  status: "BEANTWORTET"
  priority: "PRIO 3 — Klaert ob die '7 ohne digitale Destination' korrekt ist"

  research_findings:
    # -----------------------------------------------------------------------
    # KRITISCHER FUND: BILANZ WAR TEIL VON HANDELSZEITUNG.CH!
    # -----------------------------------------------------------------------
    critical_bilanz_finding:
      finding: |
        BILANZ hatte bisher KEINE eigene Website!
        Bilanz war eine RUBRIK unter handelszeitung.ch.
        Ab Mitte 2025: bilanz.ch wird als eigenstaendige Website gelauncht.
      source: "ringier.com / persoenlich.com"
      url: "https://www.ringier.com/de/neuausrichtung-ringier-medien-schweiz-schaerft-sein-wirtschaftsportfolio/"
      implication_for_model: |
        PARADOX: RMS EXPANDIERT digitale Destinationen (bilanz.ch NEU)
        waehrend gleichzeitig One-Platform diskutiert wird.
        → Bilanz-Traffic bisher in HZ-Zahlen enthalten!
        → Bilanz 2.5M Sessions im CVA = wahrscheinlich HZ+Bilanz kombiniert

    handelszeitung:
      url: "handelszeitung.ch"
      status: "EXISTIERT — wird aber zurueckgefahren"
      details: |
        - Print: Ab 20. Maerz 2025 nur noch zweiwoechentlich (statt woechentlich)
        - HZ Banking: Eingestellt
        - HZ Insurance: Fokus-Vertical bleibt
        - Digital: handelszeitung.ch existiert weiter, aber de-priorisiert
        - Bilanz-Inhalte werden herausgeloest auf eigene Domain
      traffic: "Nicht oeffentlich (WEMF/ODS Daten noetig)"
      digital_destination: true  # Korrektur: HZ HAT eine digitale Destination!
      note: |
        KORREKTUR NOETIG im CVA: HZ wurde als "keine digitale Destination"
        klassifiziert. Das ist FALSCH. handelszeitung.ch existiert.
        Richtig waere: "HZ hat digitale Destination, wird aber de-priorisiert."

    schweizer_illustrierte:
      url: "schweizer-illustrierte.ch"
      status: "EXISTIERT — aktiv betrieben"
      details: |
        - People-Magazin: Celebrities, Lifestyle, Health, Fashion/Beauty
        - ePaper-App verfuegbar
        - Schweiz beliebtestes People-Magazin
        - Ringier Advertising listet es als eigenes Brand
      traffic: "Nicht oeffentlich"
      digital_destination: true  # Korrektur!

    landliebe:
      url: "landliebe.ch"
      status: "EXISTIERT — seit 10-Jahr-Jubilaeum"
      details: |
        - Wanderungen, Gaerten, Rezepte, DIY
        - Inhouse von Ringier entwickelt
        - Auch auf Facebook und Instagram aktiv
        - E-Paper-App: CHF 7.00 Einzelkauf, CHF 36.00 Jahresabo
      traffic: "Nicht oeffentlich, vermutlich niedrig"
      digital_destination: true  # Korrektur!

    glueckspost:
      url: "glueckspost.ch (vermutlich)"
      status: "UNKLAR — nicht explizit gefunden"
      digital_destination: "UNKLAR"

    tele:
      url: "tele.ch (vermutlich)"
      status: "TV-Programm-Guide — nischig"
      digital_destination: "MINIMAL"

    l_illustre:
      url: "illustre.ch (vermutlich)"
      status: "UNKLAR — Westschweizer People-Magazin"
      digital_destination: "UNKLAR"

    pme:
      url: "pme.ch"
      status: "EXISTIERT — Franzoesischsprachiges Wirtschaftsmagazin"
      details: |
        - PME Magazine: Franzoesischsprachiges Pendant zu HZ/Bilanz
        - Teil des RMS Wirtschaftsportfolios
      digital_destination: true

  # -----------------------------------------------------------------------
  # KORREKTUR FUER CVA
  # -----------------------------------------------------------------------
  cva_correction_needed:
    issue: |
      Im CVA (rms_profile.yaml) sind 7 Titel als "digital_destination: false"
      markiert. Das ist TEILWEISE FALSCH. Korrekte Klassifikation:
    corrected_classification:
      - brand: "Handelszeitung"
        was: "digital_destination: false"
        should_be: "digital_destination: true (aber de-priorisiert)"
        reason: "handelszeitung.ch existiert und wird weiter betrieben"

      - brand: "Schweizer Illustrierte"
        was: "digital_destination: false"
        should_be: "digital_destination: true"
        reason: "schweizer-illustrierte.ch aktiv, ePaper-App, Ringier-Brand"

      - brand: "Landliebe"
        was: "digital_destination: false"
        should_be: "digital_destination: true (Low-Traffic)"
        reason: "landliebe.ch existiert seit 10-Jahr-Jubilaeum"

      - brand: "PME"
        was: "digital_destination: false"
        should_be: "digital_destination: true"
        reason: "pme.ch aktiv, Franzoesischsprachiges RMS-Wirtschaftsmedium"

      - brand: "Glueckspost"
        status: "UNKLAR — zu pruefen"

      - brand: "Tele"
        status: "MINIMAL — TV-Guide, kaum eigenstaendige Destination"

      - brand: "L'Illustre"
        status: "UNKLAR — zu pruefen"

    model_implication: |
      WICHTIG: Die Korrektur aendert das PCUM-Modell NICHT fundamental.
      HZ, SI, Landliebe haben zwar Websites, aber diese sind:
      1. Nicht Teil der One-Platform-Entscheidung (bestaetigt durch RMS)
      2. Traffic vermutlich sehr niedrig vs. die 5 Kern-Titel
      3. Keine Paywall/Abo-Integration geplant

      ABER: Es ist praeziser zu sagen:
      "Diese Titel haben digitale Praesenz, sind aber NICHT Teil der
      One-Platform-Entscheidung" statt "haben keine digitale Destination."

      Fuer Patrick: Bestaetigungsfrage — sind diese Titel BEWUSST
      ausserhalb der One-Platform-Diskussion? Oder koennten SI/Landliebe
      spaeter integriert werden?

