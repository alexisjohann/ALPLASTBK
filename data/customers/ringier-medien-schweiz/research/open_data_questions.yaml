# =============================================================================
# FRAGE 1: BLICK -7% BENCHMARK VS. MARKT
# Status: BEANTWORTET (State of Traffic Report Jan 2026 + Web-Research)
# KRITISCHE KORREKTUR: Haupttreiber ist POLARIS, nicht Google AI!
# =============================================================================

Q1_blick_benchmark:
  question: "Ist Blick -7% YoY Markteffekt oder Blick-spezifisch?"
  status: "BEANTWORTET — KORRIGIERT durch State of Traffic Report"
  priority: "PRIO 1 — Aendert Modell-Interpretation fundamental"
  impact_on_model: |
    NEUE ERKENNTNIS: Blick -7% ist UEBERWIEGEND Blick-spezifisch!
    Haupttreiber = "continued decline in true direct traffic since Polaris"
    → Das ist ein PRODUKT/UX-Problem, KEIN exogener Markteffekt!
    → Platform-Architektur kann dies DIREKT adressieren (Habit-Design)

  # -----------------------------------------------------------------------
  # PRIMAERQUELLE: RMS STATE OF TRAFFIC REPORT (Jan 2026)
  # -----------------------------------------------------------------------
  primary_source:
    document: "01-2026 _ RMS State of Traffic.pdf"
    pages: 19
    author: "RMS intern"
    location: "data/customers/ringier-medien-schweiz/input-von-kunde/"

  research_findings:
    # -----------------------------------------------------------------------
    # ERGEBNIS 1 (NEU — aus State of Traffic): POLARIS IST HAUPTTREIBER!
    # -----------------------------------------------------------------------
    polaris_true_direct_decline:
      source: "RMS State of Traffic Report, Jan 2026, S.12-13"
      finding: |
        KRITISCHE KORREKTUR unserer frueheren Analyse!
        Der State of Traffic Report identifiziert EXPLIZIT:
        "The decline is largely driven by continued decline in 'true direct'
        traffic since Polaris."

        Detaillierte Blick-Aufschluesselung:
        - SEO:                336'315'923 (35%) — Trend 12m: -6% (moderat!)
        - Direct/Aggregators: 484'910'038 (50%) — Trend 12m: -19% ← HAUPTTREIBER!
        - Social:              70'554'353 (7%)  — Trend 12m: +62% (stark wachsend!)
        - Newsletters:         10'977'741 (1%)  — Trend 12m: +67%
        - Push:                31'109'251 (3%)  — keine Trenddaten

        Homepage %: 74% (true direct), Non-Home: 26%
        Brand Search %: 68%

        SCHLUSSFOLGERUNG:
        - SEO-Verlust erklaert NUR ~2PP der -7% (0.35 × 0.06 = 0.021)
        - Direct-Verlust erklaert ~9.5PP (0.50 × 0.19 = 0.095)
        - Social + Newsletters WACHSEN und kompensieren teilweise
        - NETTO: Direct-Rückgang (~-9.5%) minus Wachstumskanäle (~+2.5%) ≈ -7%
      implication: |
        Die Blick-Erosion ist ein PRODUKT-PROBLEM (Polaris Redesign),
        KEIN primaerer Google-AI-Effekt! Das aendert die Empfehlung fundamental:
        → One-Platform muss Habit-Design priorisieren (Homepage, Push, Personalisierung)
        → Die Google-AI-Bedrohung ist REAL aber SEKUNDAER fuer Blick
        → Google AI ist PRIMAER fuer Beobachter (53% SEO) und cash.ch (37% SEO)

    # -----------------------------------------------------------------------
    # ERGEBNIS 2 (NEU): RMS OUTPERFORMED INDUSTRY BENCHMARKS
    # -----------------------------------------------------------------------
    rms_vs_industry:
      source: "RMS State of Traffic Report, Jan 2026, S.2-3"
      finding: |
        Industry benchmarks (europaeische Publisher):
        - Search Traffic: -17% YoY
        - Google Discover: -18% YoY
        RMS Performance:
        - Groesster SEO-Verlust: Beobachter -13% (immer noch besser als -17%!)
        - cash.ch SEO: +28% (deutlich BESSER als Industrie)
        - Blick SEO: -6% (DEUTLICH besser als -17% Industrie)
        - Blick FR SEO: +18% (Wachstum trotz Branchenrueckgang!)
      implication: |
        RMS hat die Google-AI-Disruption besser gemeistert als der Markt.
        Das Blick -7% Problem ist NICHT Google-getrieben, sondern Polaris.

    # -----------------------------------------------------------------------
    # ERGEBNIS 3 (NEU): SOCIAL ALS WACHSTUMSKANAL
    # -----------------------------------------------------------------------
    social_growth:
      source: "RMS State of Traffic Report, Jan 2026"
      finding: |
        ALLE Marken sehen starkes Social-Wachstum:
        - Blick Social: +62% YoY (WhatsApp 70% der Shares!)
        - Beobachter Social: +56% YoY (Facebook-driven)
        - Blick FR Social: -% (Flipboard-Drop, aber WhatsApp steigt)
        - Cash Social: gemischt (49% ist Google News Showcase!)
      implication: |
        Social kompensiert TEILWEISE den Direct-Rueckgang.
        WhatsApp Shares sind ein neuer Distributionskanal.
        ACHTUNG: Cash "Social" ist zu 49% Google News Showcase
        (fälschlicherweise als Social in GA attributiert).

    # -----------------------------------------------------------------------
    # ERGEBNIS 4 (Weiterhin gültig): Gesamtmarkt sinkt
    # -----------------------------------------------------------------------
    market_decline_confirmed:
      source: "foeg/Reuters Digital News Report 2025"
      url: "https://www.foeg.uzh.ch/dam/jcr:e51f7798-28c9-420e-80e5-e15e091fd76d/DNR_25_Schweiz.pdf"
      finding: |
        Newssite-Nutzung in der Schweiz ist seit 2016 um 13 Prozentpunkte
        gesunken (wöchentliche Nutzung). Der Rückgang erfasst ALLE
        Altersgruppen — nicht nur Junge.
      implication: "Genereller Marktrueckgang, aber Blick -7% ist NICHT dadurch erklaert"

    # -----------------------------------------------------------------------
    # ERGEBNIS 5 (Weiterhin gültig): Google AI Overviews
    # -----------------------------------------------------------------------
    google_ai_overviews:
      source_1: "mediamotion.ch"
      url_1: "https://www.mediamotion.ch/blog/detail/seit-maerz-in-der-schweiz-google-ai-overviews-und-ihre-auswirkungen-auf-seo.html"
      finding: |
        Google AI Overviews seit 26. Maerz 2025 in der Schweiz aktiv.
        ABER: Blick SEO-Traffic ist nur -6% (vs. -17% Industrie).
        → Google AI ist eine Bedrohung, aber Blick ist gut positioniert.
        → Beobachter (53% SEO, -13%) und Cash (37% SEO) sind staerker betroffen.
      implication: |
        KORREKTUR: Google AI ist NICHT der Haupttreiber fuer Blick -7%.
        Es ist ein SEKUNDAERER Faktor (~2PP von -7%).
        Fuer Beobachter ist Google AI dagegen die PRIMAERE Bedrohung.

    # -----------------------------------------------------------------------
    # ERGEBNIS 6 (Weiterhin gültig): FehrAdvice-Studie zu Google
    # -----------------------------------------------------------------------
    fehadvice_google_study:
      source: "schweizermedien.ch / netzwoche.ch"
      url: "https://www.schweizermedien.ch/aktuelles/medienmitteilungen/2025/2025-10-09-google-lanciert-ai-mode-leistungsschutzrecht-wichtiger-denn-je/"
      finding: |
        FehrAdvice-Studie: Google schuldet Schweizer Medien jaehrlich
        mindestens CHF 154 Millionen. 50-70% aller Google-Suchen sind
        Zero-Click-Searches.
      implication: "Systemische Bedrohung, aber Blick hat sie besser pariert als die Industrie"

  # -----------------------------------------------------------------------
  # SYNTHESE: Blick -7% Erklaerungsmodell (KORRIGIERT!)
  # -----------------------------------------------------------------------
  synthesis:
    total_decline: "-7% YoY (966M → ~898M Sessions)"
    correction_note: |
      ⚠️ KRITISCHE KORREKTUR (2026-02-08):
      Unsere fruehere Analyse identifizierte Google AI Overviews als Haupttreiber.
      Der RMS State of Traffic Report (Primaerquelle!) zeigt jedoch:
      POLARIS "true direct" Decline ist der HAUPTTREIBER.

    decomposition:
      H6_polaris_true_direct:
        estimated_contribution: "-4 bis -5%"
        confidence: "SEHR HOCH (Primaerquelle RMS)"
        evidence: |
          Direct/Aggregators -19% YoY bei 50% Anteil → ~-9.5PP Beitrag.
          Kompensiert durch Social +62% und Newsletter +67% → Netto ~-5%
          Explizit im Report: "largely driven by continued decline in
          true direct traffic since Polaris"
        note: "NEUER HAUPTTREIBER — Polaris Redesign ist Produkt/UX-Problem"

      H2_google_ai_overviews:
        estimated_contribution: "-1.5 bis -2.5%"
        confidence: "MITTEL"
        evidence: |
          SEO-Traffic nur -6% (vs. -17% Industrie).
          Bei 35% SEO-Anteil: 0.35 × 0.06 = ~2PP Beitrag.
          RMS outperformed die Industrie deutlich.
        note: "HERABGESTUFT von Haupttreiber zu sekundaerem Faktor"

      H1_market_effect:
        estimated_contribution: "-0.5 bis -1%"
        confidence: "MITTEL"
        evidence: "DNR 2025, aber RMS outperformed den Markt"

      H3_social_growth_offset:
        estimated_contribution: "+1 bis +2%"
        confidence: "HOCH"
        evidence: "Social +62%, Newsletter +67% (kompensieren teilweise)"

    sum_estimated: "Polaris (~-5%) + Google AI (~-2%) + Markt (~-1%) + Social-Offset (~+1.5%) ≈ -6.5%"
    conclusion: |
      KORRIGIERTE SCHLUSSFOLGERUNG:
      Blick -7% ist PRIMAER ein Produkt/UX-Problem (Polaris Redesign),
      NICHT ein exogener Google-AI-Effekt.

      Implikationen fuer PCUM:
      1. One-Platform kann Blick-Erosion DIREKT adressieren (Habit-Design!)
      2. Google AI ist SEKUNDAER fuer Blick, aber PRIMAER fuer Beobachter
      3. Social (WhatsApp!) und Newsletters sind Wachstumskanäle
      4. RMS outperformed die europaeische Industrie deutlich

      → Platform-Architektur sollte Habit-Transfer priorisieren (G4)
      → Beobachter braucht Google-AI-Schutz (G5 Survival)
      → Social-Integration (WhatsApp Shares) ist neues Gain-Potenzial

  still_needed_from_rms:
    - "Polaris-Timeline: Wann genau wurde Polaris deployed? Welche Aenderungen?"
    - "True Direct vs. Google Discover: Wie wird Discover in GA attributiert?"
    - "Homepage-Redesign-Metriken: Bounce Rate, Time-on-Site vor/nach Polaris"

