# =============================================================================
# EXECUTIVE SUMMARY
# =============================================================================

executive_summary:
  presse_portale: |
    Unabhaengig des Titels nutzt die Mehrheit der RMS-User auch 20 Minuten.
    Am groessten ist die Reichweite von 20 Minuten bei Blick-Usern, in der
    Deutschschweiz mit 69% in der Romandie gar mit 80%. Beide Werte fallen
    hoeher aus als noch 2024.
    In der Deutschschweiz faellt auf, dass die RMS-User nebst 20min.ch auch
    sehr stark die Seiten von watson.ch und nau.ch nutzen.
  social_media: |
    YouTube ist das von den RMS-Usern am meisten genutzte Social-Media-Portal.
    Instagram und Facebook folgen, wobei die Cash-User diese beiden Seiten
    deutlich weniger oft nutzen als User von blick.ch und beobachter.ch.
    LinkedIn wird von allen ausgewerteten RMS-Seiten deutlich staerker genutzt
    als von durchschnittlichen Deutschschweizer-Usern.
    Social Media wird in der Romandie deutlich haeufiger genutzt als in der
    Deutschschweiz.
  brand_insights:
    blick_ch: |
      Blick-User sind ueberdurchschnittlich affin fuer die uebrigen RMS-Titel.
      Damit koennte es sich anbieten, dass Blick-User vermehrt auf deren Angebot
      aufmerksam gemacht werden.
      Blick-User sind aelter, maennlicher, besitzen haeufig Wohneigentum und sind
      politisch etwas rechter als 20-Minuten-User. Sie interessieren sich stark
      fuer News- und Sportthemen.
    cash_ch: |
      Cash-User nutzen haeufig auch die Seiten des Blicks und des Beobachters.
      Sie interessieren sich fuer Finanz-, Wirtschafts- und Newsthemen. Aber auch
      Sport und Reisen stossen auf deutlich groesseres Interesse als bei der Basis.
    beobachter_ch: |
      Die Interessensschwerpunkte liegen bei den Beobachter-Usern auf News-,
      Gesundheits- und Ernaehrungsthemen sowie auch Konsumenteninformationen.
    blick_ch_fr: |
      Blick(F)-User sind unter anderem ueberdurchschnittlich affin fuer
      Wirtschaftsthemen, Hintergrundberichte und Analysen sowie Konsumenten-
      informationen. Damit koennte eine verstaerkte Kooperation von Blick(F)
      mit den Wirtschaftstiteln (auch PME) und dem Beobachter in Betracht
      gezogen werden.

