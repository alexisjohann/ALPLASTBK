metadata:
  source: "MACH Strategy 2025 (WEMF)"
  title: "RMS-Digitalangebote: Erkenntnisse aus der MACH Strategy 2025"
  date_integrated: "2026-02-07"
  survey_period: "12. April 2023 bis 31. März 2025"
  frequency: "Jaehrlich im Oktober"
  population:
    total: 7546695  # Wohnbevoelkerung CH + FL ab 14 Jahren
    german_speaking: 5386077  # 71.4%
    french_speaking: 1835160  # 24.3%
  rus_definition: |
    Regular Usership (RUS): Fuer alle digitalen Marken mit Nutzung in den
    letzten 6 Monaten: Wie haeufig nutzen Sie Inhalte von bestimmter Marke
    in digitaler Form? Antwortkategorien: taeglich oder fast taeglich +
    mehrmals in der Woche
  benchmark_portals:
    german:
