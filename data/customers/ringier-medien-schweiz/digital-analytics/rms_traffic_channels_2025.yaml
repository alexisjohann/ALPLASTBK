  shared_by: "Patrick Rademacher (CSIO)"
  date_shared: "2026-02-06"
  period: "2025 vs 2024"
  note: |
    Rows do not total 100% due to rest of traffic sources (Referral, Paid, etc.)
    Bilanz marked with * (Relaunch-Effekte moeglich)
    RMS-Prioritaet: Google-Abhaengigkeit reduzieren, Habit-Kanaele staerken
    (Newsletters, Push)

traffic_data:

  - brand: "Beobachter"
    total_sessions_2025: 9690517
    yoy_change: "+2%"
    channels:
      seo: 0.53           # 53% — STARK Google-abhaengig
      direct_home: 0.07   # 7%  — Sehr niedrig (kein Habit Loop)
      aggregator_nonhome: 0.93  # 93% — Fast alle Visits auf Unterseiten (Artikelseiten)
      social: 0.09        # 9%
      newsletters: 0.07   # 7%
      push: 0.008         # 0.8% — Praktisch kein Push
    insights:
      - "Hoechste Google-Abhaengigkeit im Portfolio (53% SEO)"
      - "Niedrigster Direct Traffic (7%) — bestaetigt: kein Habit Loop"
      - "93% Aggregator/Non-Home = User kommen fuer SPEZIFISCHE Fragen via Google"
      - "Fast kein Push (0.8%) = keine App-Nutzung"
      - "Nur 9.7M Sessions = kleines digitales Volumen"
    behavioral_interpretation: |
      Beobachter-User sind INTENTIONAL: Sie haben ein spezifisches Problem
      (Mietrecht, Kuendigung, Versicherung), googlen es, landen auf einem
      Beobachter-Artikel. Kein habituelles Verhalten, kein Browsing.
      Beobachter ist eine SUCH-Destination, keine BROWSE-Destination.
      KORREKTUR: Beobachter ist ein Premium-Abo-Modell (wie Bilanz),
      KEIN Membership-Modell. 120k Abonnenten gesamt, 6k digital.

  - brand: "Bilanz"
    total_sessions_2025: 2509756
    yoy_change: "n/a"  # Asterisk im Original — vermutlich Relaunch-Effekt
    channels:
      seo: 0.21           # 21%
      direct_home: 0.09   # 9% — Niedrig
      aggregator_nonhome: 0.91  # 91%
      social: 0.15        # 15% — Hoechster Social-Anteil im Portfolio
      newsletters: 0.03   # 3%
      push: null           # Kein Push-Kanal
    insights:
      - "Kleinstes digitales Volumen (2.5M Sessions)"
      - "Hoechster Social-Anteil (15%) — LinkedIn-Effekt?"
      - "Nur 9% Direct = keine Habit-Bildung digital"
      - "Relaunch bilanz.ch koennte Zahlen verzerren"
    behavioral_interpretation: |
      Bilanz ist digital noch nicht etabliert. Wenig Volumen, wenig Direct.
      Social (15%) deutet auf LinkedIn-Sharing hin (Business-Content).
      Bilanz-User kommen GEZIELT (91% Non-Home) aber selten DIREKT.

  - brand: "Blick"
    total_sessions_2025: 966645101
    yoy_change: "-7%"
    channels:
      seo: 0.35           # 35% — Signifikant, aber nicht dominant
      direct_home: 0.30   # 30% — HOECHSTER Direct-Anteil (ausser cash)
      aggregator_nonhome: 0.70  # 70%
      social: 0.07        # 7%
      newsletters: 0.01   # 1%
      push: 0.03          # 3%
    insights:
      - "966M Sessions = mit Abstand groesstes Volumen (100× Beobachter)"
      - "30% Direct Home = staerkster Habit Loop im Portfolio"
      - "Aber: -7% YoY — Ruecklaeufig!"
      - "35% SEO = immer noch signifikante Google-Abhaengigkeit"
      - "Nur 1% Newsletters — grosses ungenutztes Potenzial"
      - "3% Push = App-Nutzung vorhanden aber ausbaufaehig"
    behavioral_interpretation: |
      Blick hat den staerksten Habit Loop (30% Direct), aber dieser erodiert (-7%).
      Die Kombination Direct (30%) + Push (3%) = 33% Habit-Traffic.
      SEO (35%) bleibt Google-abhaengig — Risiko bei AI Overviews/SGE.
      Newsletter-Kanal (1%) ist massiv unterentwickelt relativ zu Volumen.

  - brand: "Blick FR"
    total_sessions_2025: 54668791
    yoy_change: "+10%"
    channels:
      seo: 0.37           # 37%
      direct_home: 0.20   # 20%
      aggregator_nonhome: 0.80  # 80%
      social: 0.17        # 17% — Hoechster Social-Anteil
      newsletters: 0.01   # 1%
      push: 0.03          # 3%
    insights:
      - "+10% YoY — Einzige Marke mit starkem Wachstum"
      - "Hoechster Social-Anteil (17%) — Romandie-spezifisch?"
      - "20% Direct = moderater Habit Loop"
    behavioral_interpretation: |
      Blick FR waechst als einzige Marke zweistellig.
      Social (17%) ist ueberproportional — Romandie nutzt Social staerker?
      Oder aktive Social-Strategie der FR-Redaktion.

  - brand: "cash.ch"
    total_sessions_2025: 69848718
    yoy_change: "+5%"
    channels:
      seo: 0.37           # 37%
      direct_home: 0.58   # 58% — HOECHSTER Direct-Anteil im gesamten Portfolio!
      aggregator_nonhome: 0.42  # 42% — Niedrigster Non-Home-Anteil
      social: 0.01        # 1%
      newsletters: 0.05   # 5%
      push: 0.02          # 2%
    insights:
      - "58% Direct Home = STAERKSTER Habit Loop im gesamten Portfolio!"
      - "Finanz-User bookmarken cash.ch als taegliches Tool"
      - "42% Non-Home = niedrigster Wert (User starten auf Homepage)"
      - "Kaum Social (1%) — Finance-Content wird nicht geteilt"
      - "+5% YoY — stabiles Wachstum"
    behavioral_interpretation: |
      cash.ch ist das HABIT-VORBILD im RMS-Portfolio. 58% Direct zeigt:
      Finance-User haben cash.ch als taegliches Ritual (Boersenkurse checken).
      Das ist der staerkste Habit Loop — sogar staerker als Blick.
      Implikation: Habit-Bildung funktioniert am besten bei UTILITY-Content
      (Boersenkurse = taeglicher Nutzwert), nicht bei News-Content allein.

