# =============================================================================
# IMPLIKATIONEN FUER ONE-PLATFORM-MODELL
# =============================================================================

one_platform_implications:

  key_insight: |
    Die Traffic-Daten zeigen ZWEI fundamental verschiedene Nutzungsmuster:

    PATTERN A — HABIT (Blick, cash.ch):
    Hoher Direct Traffic, taegliche Nutzung, Homepage-Einstieg.
    User kommen GEWOHNHEITSMAESSIG. Habit Loop funktioniert.

    PATTERN B — INTENT (Beobachter, Bilanz):
    Hoher SEO/Aggregator-Anteil, anlassbezogene Nutzung, Artikelseiten.
    User kommen mit SPEZIFISCHER ABSICHT via Google.

    One-Platform muss BEIDE Patterns bedienen koennen.
    Eine reine Habit-Plattform (Blick-Style) wuerde Intent-User verlieren.
    Eine reine Intent-Plattform wuerde Habit-User langweilen.

  correction_to_model: |
    KORREKTUR: cash.ch hat den hoechsten Direct Traffic (58%), NICHT Blick (30%).
    Das bedeutet: Utility-Content (Boersenkurse) bildet STAERKERE Habits
    als News-Content. Implikation: One-Platform braucht Utility-Elemente
    (Portfolio-Tracker, Rechtsauskunft-Tool, Wetter) nicht nur News-Feed.

  blick_erosion_warning: |
    Blick verliert -7% YoY bei 966M Sessions = ~74M Sessions weniger.
    Das ist MEHR als das gesamte Beobachter-Volumen (9.7M).
    Prioritaet: Blick-Erosion stoppen hat hoechste Dringlichkeit.
