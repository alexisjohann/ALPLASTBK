# =============================================================================
# Detailstruktur nach Hauptachse
# =============================================================================
structure:
  # ---------------------------------------------------------------------------
  # FINANZEN & PERFORMANCE (FIN) - 80 Faktoren
  # ---------------------------------------------------------------------------
  FIN:
    name: "Finanzen & Performance"
    total_factors: 80
    function: "Finanzielle Basis und Leistungsmessung eines Medienhauses"
    sub_axes:
      - code: FIN-WER
        name: "Werbeerloes"
        description: "Display, Programmatic, Native, Print-Anzeigen, Rubrikenmarkt, CPM-Entwicklung"
        factors: 15

      - code: FIN-ABO
        name: "Abonnement- & Lesererloes"
        description: "Print-Abos, Digital-Abos, Einzelverkauf, Paywall-Conversion, ARPU"
        factors: 12

      - code: FIN-EVE
        name: "Events & Diversifikation"
        description: "Konferenzen, Award Shows, Licensing, Content Syndication, E-Commerce"
        factors: 8

      - code: FIN-KOS
        name: "Kostenstruktur"
        description: "Redaktionskosten, Druckkosten, Distribution, Technologie, Overhead"
        factors: 10

      - code: FIN-PRO
        name: "Profitabilitaet"
        description: "EBITDA, EBIT, Margen nach Segment (Print, Digital, Marktplaetze)"
        factors: 10

      - code: FIN-DPE
        name: "Digital vs. Print Oekonomie"
        description: "Digital Revenue Share, Print-Erosionsrate, Break-Even Digital"
        factors: 10

      - code: FIN-INV
        name: "Investitionen & Beteiligungen"
        description: "CapEx, Akquisitionen, Venture Portfolio, Joint Ventures"
        factors: 8

      - code: FIN-KPI
        name: "Medien-KPIs"
        description: "Revenue per Employee, Cost per Article, Revenue per Unique User"
        factors: 7

  # ---------------------------------------------------------------------------
  # MARKT & WETTBEWERB (MKT) - 60 Faktoren
  # ---------------------------------------------------------------------------
  MKT:
    name: "Markt & Wettbewerb"
    total_factors: 60
    function: "Marktposition und Wettbewerbsdynamik im Schweizer Medienmarkt"
    sub_axes:
      - code: MKT-REI
        name: "Reichweiten & Audience"
        description: "Print-Auflagen, Unique Clients, Page Views, Verweildauer, App-Downloads"
        factors: 12

      - code: MKT-WET
        name: "Wettbewerber"
        description: "TX Group (Tamedia/20 Minuten), CH Media, NZZ Mediengruppe, SRG SSR, watson"
        factors: 10

      - code: MKT-WBM
        name: "Werbemarkt"
        description: "Werbemarktanteil, Shift Print-to-Digital, Programmatic Share, Google/Meta Anteil"
        factors: 12

      - code: MKT-SEG
        name: "Zielgruppen & Segmente"
        description: "Altersverteilung, Sprachregionen, Soziodemografie, Heavy vs. Light User"
        factors: 10

      - code: MKT-MAR
        name: "Markenportfolio"
        description: "Blick, SonntagsBlick, Blick TV, Ringier Axel Springer, Markenbekanntheit"
        factors: 8

      - code: MKT-PLT
        name: "Plattform-Oekosystem"
        description: "Google Discover, Apple News, Social Referrals, Newsletter, App-Oekosystem"
        factors: 8

  # ---------------------------------------------------------------------------
  # ORGANISATION & GOVERNANCE (ORG) - 50 Faktoren
  # ---------------------------------------------------------------------------
  ORG:
    name: "Organisation & Governance"
    total_factors: 50
    function: "Strukturelle Rahmenbedingungen und Steuerung des Medienhauses"
    sub_axes:
      - code: ORG-STR
        name: "Organisationsstruktur"
        description: "Business Units, Redaktionen, Shared Services, Matrix vs. Linie"
        factors: 10

      - code: ORG-FAM
        name: "Familienbesitz & Governance"
        description: "Familie Ringier, VR-Zusammensetzung, CEO-Rolle, Generationenwechsel"
        factors: 12

      - code: ORG-RED
        name: "Redaktionsorganisation"
        description: "Newsroom-Modell, Desk-Struktur, Konvergenz Print/Digital/Video"
        factors: 12

      - code: ORG-ENT
        name: "Entscheidungswege"
        description: "Delegation, Kompetenzen, Geschwindigkeit, redaktionelle Unabhaengigkeit"
        factors: 8

      - code: ORG-INT
        name: "Internationale Struktur"
        description: "Laendergesellschaften, Ringier Axel Springer, Joint Ventures, Beteiligungen"
        factors: 8

  # ---------------------------------------------------------------------------
  # STRATEGIE & TRANSFORMATION (STR) - 40 Faktoren
  # ---------------------------------------------------------------------------
  STR:
    name: "Strategie & Transformation"
    total_factors: 40
    function: "Strategische Ausrichtung und Veraenderungsfaehigkeit"
    sub_axes:
      - code: STR-DIG
        name: "Digitale Transformation"
        description: "Digital-First Strategie, Print-Transition, Paywall-Modell, Plattformstrategie"
        factors: 12

      - code: STR-KI
        name: "KI-Strategie"
        description: "Generative AI im Newsroom, Automated Content, Personalisierung, AI Ethics"
        factors: 10

      - code: STR-CON
        name: "Content-Strategie"
        description: "Video-First, Multimedia, investigativer Journalismus, Boulevard vs. Qualitaet"
        factors: 10

      - code: STR-INN
        name: "Innovation & Ventures"
        description: "Neue Geschaeftsmodelle, Startup-Beteiligungen, Lab/Inkubator, Pilotprojekte"
        factors: 8

  # ---------------------------------------------------------------------------
  # MENSCHEN & KULTUR (PEO) - 80 Faktoren
  # ---------------------------------------------------------------------------
  PEO:
    name: "Menschen & Kultur"
    total_factors: 80
    function: "Humankapital und kulturelle Dynamik im Medienhaus"
    sub_axes:
      - code: PEO-JOU
        name: "Journalist:innen & Redaktion"
        description: "Headcount Redaktion, Erfahrung, Spezialisierung, Freelancer-Anteil"
        factors: 12

      - code: PEO-TEC
        name: "Tech-Talente & Digital"
        description: "Software Engineers, Data Scientists, Product Manager, Recruiting-Pipeline"
        factors: 10

      - code: PEO-FLU
        name: "Fluktuation & Arbeitsmarkt"
        description: "Kuendigungen, Abwerbung (zu Tech-Firmen), Time-to-Hire, Arbeitgeberattraktivitaet"
        factors: 10

      - code: PEO-ENG
        name: "Engagement & Zufriedenheit"
        description: "eNPS, Engagement Index, Stimmung, Identifikation mit Mission"
        factors: 12

      - code: PEO-KUL
        name: "Redaktionskultur"
        description: "Newsroom-Werte, Pressefreiheit-Ethos, Innovationsbereitschaft, Silodenken"
        factors: 12

      - code: PEO-FUE
        name: "Fuehrung & Leadership"
        description: "Chefredaktion, Ressortleitung, Digital Leadership, Fuehrungskraefteentwicklung"
        factors: 10

      - code: PEO-DIV
        name: "Diversitaet & Inklusion"
        description: "Gender in Redaktion und Fuehrung, Sprachregionen, Altersstruktur"
        factors: 8

      - code: PEO-CHG
        name: "Change Readiness"
        description: "Veraenderungsbereitschaft, Digitalkompetenz, Umschulungsprogramme, Resilienz"
        factors: 6

  # ---------------------------------------------------------------------------
  # TECHNOLOGIE & DIGITAL (TEC) - 40 Faktoren
  # ---------------------------------------------------------------------------
  TEC:
    name: "Technologie & Digital"
    total_factors: 40
    function: "Technologische Basis und digitale Infrastruktur"
    sub_axes:
      - code: TEC-CMS
        name: "Content Management & Publishing"
        description: "CMS-Plattform, Workflow-Automation, Multi-Channel-Publishing, API-First"
        factors: 10

      - code: TEC-ADT
        name: "Ad Tech & Monetarisierung"
        description: "SSP, DMP, Programmatic Stack, First-Party Data, Yield Optimization"
        factors: 12

      - code: TEC-KIM
        name: "KI & Machine Learning"
        description: "Palantir-Partnerschaft, Recommendation Engine, NLP, generative KI im Newsroom"
        factors: 10

      - code: TEC-DAT
        name: "Dateninfrastruktur & Analytics"
        description: "Data Warehouse, Real-Time Analytics, A/B Testing, Attribution, CDP"
        factors: 8

  # ---------------------------------------------------------------------------
  # RISIKO & COMPLIANCE (RIS) - 30 Faktoren
  # ---------------------------------------------------------------------------
  RIS:
    name: "Risiko & Compliance"
    total_factors: 30
    function: "Risikomanagement und regulatorische Compliance fuer Medienunternehmen"
    sub_axes:
      - code: RIS-REG
        name: "Medienregulierung"
        description: "BAKOM-Auflagen, Mediengesetz, EU Digital Services Act, Medienfoerderung"
        factors: 10

      - code: RIS-REP
        name: "Reputations- & Rechtsrisiko"
        description: "Verleumdungsklagen, Presserat-Entscheide, Quellenschutz, Fake-News-Vorwuerfe"
        factors: 10

      - code: RIS-PLT
        name: "Plattform- & Technologierisiko"
        description: "Google-Abhaengigkeit, Social-Plattform-Aenderungen, DSG/DSGVO, Copyright, KI-Regulierung"
        factors: 10

  # ---------------------------------------------------------------------------
  # STAKEHOLDER & REPUTATION (STK) - 20 Faktoren
  # ---------------------------------------------------------------------------
  STK:
    name: "Stakeholder & Reputation"
    total_factors: 20
    function: "Beziehungen zu externen Anspruchsgruppen"
    sub_axes:
      - code: STK-EIG
        name: "Eigentuemer & Familie"
        description: "Familie Ringier, Eignerstrategie, Nachfolge, Dividendenpolitik, Philanthropie"
        factors: 8

      - code: STK-EXT
        name: "Externe Stakeholder"
        description: "Werbekund:innen, Leser:innen, Regulatoren (BAKOM), Politik, Oeffentlichkeit, Presserat"
        factors: 12

# =============================================================================
# Systemische Kopplung
# =============================================================================
systemic_coupling:
  diagram: |
    FIN -----> MKT -----> STK
     |          |          |
     |          |          |
     +----------+----------+
                |
                v
              PEO <--- TEC <--- STR
                |
                v
              ORG <--- RIS

  description: |
    - Werbeerloes und Abo-Revenue (FIN) haengen direkt von Reichweite und Marktposition (MKT) ab
    - Marktposition (MKT) bestimmt Reputation und Stakeholder-Beziehungen (STK)
    - Digitale Transformation (STR) wirkt ueber Technologie (TEC) auf Redaktion und Mitarbeitende (PEO)
    - Menschen & Kultur (PEO) ist die zentrale Transformationsachse: Journalist:innen muessen Digital-Skills aufbauen
    - Organisation (ORG) und Regulierung (RIS) sind Enabler und Constraints
    - Familienbesitz (ORG-FAM) ermoeglicht langfristige Strategien, schraenkt aber Kapitalzugang ein
    - Plattformabhaengigkeit (RIS-PLT) ist existenzielles Risiko: Google/Meta kontrollieren Traffic und Werbegelder
    - KI-Strategie (STR-KI) veraendert alle anderen Achsen simultan (Disruptions-Multiplikator)

