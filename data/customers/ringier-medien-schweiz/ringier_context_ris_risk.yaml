---
# Ringier Medien Schweiz (RMS) Unternehmenskontextvektor - RIS (Risiko)
# 30 Faktoren zu strategischen, operationellen und regulatorischen Risiken
# Last Updated: 2026-02-06
# Database Version: 1.0.0

metadata:
  customer: "RMS"
  customer_full: "Ringier Medien Schweiz"
  category: "RIS"
  category_name: "Risiko"
  factor_count: 30
  version: "1.0.0"
  last_updated: "2026-02-06"
  parent_file: "ringier_profile.yaml"
  cva_level: "STANDARD"
  note: "Media-industry specific risk profile; ratings on 1-5 scale where 5 = highest risk"

# =============================================================================
# RIS-STR: STRATEGISCHE RISIKEN (12 Faktoren)
# =============================================================================
RIS_STR:
  name: "Strategische Risiken"
  factor_count: 12

  factors:
    RMS-RIS-STR-01:
      name: "Struktureller Print-Rückgang"
      definition: "Langfristiger Rückgang von Print-Auflagen und Print-Werbeerlösen durch Digitalisierung und verändertes Mediennutzungsverhalten"
      value: 5
      scale: "1-5 (1=tief, 5=sehr hoch)"
      trend: "steigend"
      time_horizon: "langfristig (strukturell)"
      quantification: "Print-Werbemarkt CH schrumpft ca. 8-12% p.a.; Auflagen seit 2010 um >50% gesunken"
      affected_brands: ["Blick (Print)", "SonntagsBlick", "Schweizer Illustrierte", "Handelszeitung (Print)", "Glückspost", "Tele"]
      mitigation: "Digital-First-Strategie, Blick+ Abomodell, Print-Konsolidierung (HZ auf 14-täglich)"
      source: "Stiftung Werbestatistik Schweiz; WEMF-Auflagezahlen; Ringier Jahresbericht 2024"

    RMS-RIS-STR-02:
      name: "Plattformabhängigkeit (Google/Meta)"
      definition: "Abhängigkeit von globalen Tech-Plattformen für Traffic-Zuweisung und Werbebudgetverteilung; Google und Meta binden >50% der digitalen Werbeausgaben in der Schweiz"
      value: 5
      scale: "1-5"
      trend: "steigend"
      quantification: "Google + Meta: >55% des CH-Digital-Werbeumsatzes; Referral-Traffic für News-Sites ca. 30-40% via Google/Social"
      risk_drivers:
        - "Algorithmus-Änderungen reduzieren Reichweite ohne Vorwarnung"
        - "Werbebudgets fliessen zu Plattformen statt zu Publishern"
        - "Apple Privacy-Änderungen schwächen Social-Referral-Modell"
      mitigation: "Direkttraffic-Strategie, Newsletter-Aufbau, Blick+ Abos, Ringier Digital Network"
      source: "IAB Switzerland; Stiftung Werbestatistik; Web Research 2026"

    RMS-RIS-STR-03:
      name: "KI-Disruptionsrisiko"
      definition: "Risiko, dass generative KI (LLMs, AI Overviews) die Nachfrage nach redaktionellen Nachrichteninhalten und damit Traffic und Werbeerlöse substantiell reduziert"
      value: 4
      scale: "1-5"
      trend: "stark_steigend"
      time_horizon: "mittelfristig (2-5 Jahre)"
      risk_drivers:
        - "Google AI Overviews reduzieren Click-Through zu Publisher-Websites"
        - "ChatGPT/Perplexity als alternative Informationsquellen"
        - "Automatisierte Content-Erstellung senkt Wettbewerbsbarrieren"
        - "Leser gewöhnen sich an KI-generierte Zusammenfassungen"
      mitigation: "Eigene KI-Strategie (Palantir-Partnerschaft), AI Super Desk, exklusive Inhalte, Blick+ Paywall"
      source: "Ringier Jahresbericht 2024; Branchenanalysen; Eigene Einschätzung"

    RMS-RIS-STR-04:
      name: "Konzentrationsrisiko Blick"
      definition: "Überproportionale Abhängigkeit von der Marke Blick (Print + Digital) für Reichweite, Werbeerlöse und öffentliche Wahrnehmung der RMS-Division"
      value: 4
      scale: "1-5"
      trend: "stabil"
      quantification: "Blick generiert geschätzt 50-60% der RMS-Gesamtreichweite und >40% der RMS-Werbeerlöse"
      risk_drivers:
        - "Einbruch bei Blick betrifft gesamte RMS-Performance"
        - "Boulevard-Positionierung begrenzt Premiumwerbe-Potenzial"
        - "Reputationsschäden bei Blick strahlen auf gesamtes RMS-Portfolio aus"
      mitigation: "Portfolio-Diversifikation (Wirtschaftstitel, Magazine), Ringier Digital Network (45+ Marken)"
      source: "Eigene Einschätzung basierend auf Reichweiten- und Portfolioanalyse"

    RMS-RIS-STR-05:
      name: "Technologische Obsoleszenz"
      definition: "Risiko, dass bestehende technologische Infrastruktur (CMS, Ad-Server, Datenplattformen) veraltet und Investitionsrückstände entstehen"
      value: 3
      scale: "1-5"
      trend: "stabil"
      risk_drivers:
        - "Legacy-Systeme aus RASCH-Ära müssen modernisiert werden"
        - "Hohe Investitionskosten für Plattform-Migration"
        - "Wettbewerber investieren aggressiv in Tech-Stacks"
      mitigation: "Palantir-Partnerschaft, CDO-Rolle (Sandro Inguscio), laufende Modernisierung"
      source: "Eigene Einschätzung; Ringier Jahresbericht 2024"

    RMS-RIS-STR-06:
      name: "Wettbewerbsrisiko Schweizer Medienmarkt"
      definition: "Intensiver Wettbewerb mit TX Group (Tamedia/20 Minuten), CH Media, NZZ und SRG SSR um Leser, Abonnenten und Werbebudgets in einem schrumpfenden Markt"
      value: 4
      scale: "1-5"
      trend: "steigend"
      key_competitors:
        - competitor: "TX Group / Tamedia"
          threat_level: "hoch"
          reason: "20 Minuten als grösster Gratistitel; Tages-Anzeiger als Qualitätsmarke"
        - competitor: "CH Media"
          threat_level: "mittel"
          reason: "Regional stark, aber kleinere digitale Reichweite"
        - competitor: "SRG SSR"
          threat_level: "mittel-hoch"
          reason: "Gebührenfinanziertes Online-Angebot konkurriert um digitale Aufmerksamkeit"
      mitigation: "Grösste Reichweite (4.6 Mio), AdUnit-Akquisition, DOOH-Expansion"
      source: "WEMF/NET-Metrix; Eigene Wettbewerbsanalyse"

    RMS-RIS-STR-07:
      name: "Werbemarkt-Zyklizität"
      definition: "Konjunkturabhängigkeit der Werbeerlöse; in Rezessionsphasen kürzen Unternehmen Werbebudgets überproportional"
      value: 3
      scale: "1-5"
      trend: "stabil"
      quantification: "Werbebudgets sinken in Rezessionen typisch um 10-20%; Print-Werbung überproportional betroffen"
      historical_events:
        - "2009: Finanzkrise, CH-Werbemarkt -12%"
        - "2020: COVID, Print-Werbung -25%"
      mitigation: "Abo-Modelle (Blick+, Beobachter), diversifizierte Erlösquellen, DOOH (weniger zyklisch)"
      source: "Stiftung Werbestatistik Schweiz; Konjunkturforschung"

    RMS-RIS-STR-08:
      name: "Copyright- und KI-Trainings-Risiko"
      definition: "Rechtliche und finanzielle Risiken durch ungeklärte Urheberrechtsfragen bei KI-Training mit journalistischen Inhalten sowie potenzielle Erlösausfälle durch unkompensierten Content-Scraping"
      value: 4
      scale: "1-5"
      trend: "stark_steigend"
      risk_drivers:
        - "LLM-Anbieter trainieren auf News-Content ohne Vergütung"
        - "EU AI Act Implikationen für Content-Lizenzierung"
        - "Fehlende Schweizer Gesetzgebung zu KI und Copyright"
        - "Vertragliche Grauzonen bei Indexierung und Aggregation"
      mitigation: "Ringier AG Verhandlungen mit Tech-Konzernen; Brancheninitiative Verlegerverband; Rechtliche Absicherung"
      source: "EU AI Act (2024); Swiss DSG; Branchendiskussionen VSM"

    RMS-RIS-STR-09:
      name: "Digitale Abo-Konversion"
      definition: "Risiko, dass die Transformation von einem werbebasierten Gratismodell zu einem bezahlten Digital-Abomodell (Blick+) nicht schnell genug gelingt"
      value: 3
      scale: "1-5"
      trend: "stabil"
      quantification: "Blick+ ca. 25'000 Abos (2024); Konkurrent 20 Minuten hat noch kein Bezahlmodell; CH Zahlungsbereitschaft für News bei ca. 17%"
      risk_drivers:
        - "Boulevard-Leserschaft historisch zahlungsunwillig"
        - "Konkurrenz durch kostenlose SRG-Angebote"
        - "Churn-Rate bei Digital-Abos typisch 5-8% pro Monat"
      mitigation: "Paywall-Strategie Blick+, exklusive Premium-Inhalte, Bundle-Angebote"
      source: "Reuters Digital News Report 2025; Ringier Geschäftsbericht; Eigene Einschätzung"

    RMS-RIS-STR-10:
      name: "Integrationsrisiko AdUnit"
      definition: "Risiko, dass die Integration von AdUnit (übernommen von TX Group/Goldbach per März 2026) operationelle Friktionen und Kundenabwanderung verursacht"
      value: 3
      scale: "1-5"
      trend: "kurzfristig_erhöht"
      time_horizon: "kurzfristig (6-18 Monate)"
      risk_drivers:
        - "Zusammenführung von Salesteams und Systemen"
        - "Kunden könnten Plattformwechsel als Anlass für Neuausschreibung nutzen"
        - "Kulturelle Integration (AdUnit-DNA vs. Ringier Advertising)"
      mitigation: "Klare Integrations-Roadmap, Retention-Massnahmen für Schlüsselkunden, COO-Verantwortung (Markus Wirth)"
      source: "persoenlich.com; Ringier Medienmitteilungen; Eigene Einschätzung"

    RMS-RIS-STR-11:
      name: "Geopolitisches Risiko (EU-Regulierung & Trump-Effekt)"
      definition: "Spillover-Effekte internationaler Entwicklungen auf den Schweizer Medienmarkt: EU Digital Markets Act, EU AI Act, US-Handelspolitik und Medienpolitik unter Trump"
      value: 3
      scale: "1-5"
      trend: "steigend"
      risk_drivers:
        - "EU AI Act beeinflusst Schweizer KI-Strategie indirekt"
        - "EU DSA/DMA verändert Plattform-Publisher-Dynamik"
        - "Trump-Regierung schwächt Press Freedom Normen international"
        - "Mögliche Retorsionszölle belasten Schweizer Wirtschaft und damit Werbemarkt"
      mitigation: "Monitoring EU-Regulierung, VSM-Branchenvertretung, diversifiziertes Erlösmodell"
      source: "EU Digital Services Act; EU AI Act; Medienberichte 2025-2026"

    RMS-RIS-STR-12:
      name: "Strategisches Transformationsrisiko"
      definition: "Risiko, dass die gleichzeitige Bewältigung mehrerer strategischer Transformationen (KI, Digital-Abos, AdUnit-Integration, Organisationsumbau) Managementkapazitäten überfordert"
      value: 3
      scale: "1-5"
      trend: "kurzfristig_erhöht"
      risk_drivers:
        - "Mehrfacher GL-Wechsel (neue CFO, neue Rollen) parallel zu Transformationen"
        - "Begrenzte finanzielle Ressourcen für parallele Investitionen"
        - "Change Fatigue bei Mitarbeitenden nach RASCH-Auflösung und Restrukturierungen"
      mitigation: "Klare Priorisierung der 4 Strategiesäulen, dedizierte Rolle 'Head of Business & AI Transformation' (Roman Sigrist)"
      source: "Eigene Einschätzung basierend auf Organisationsanalyse"

# =============================================================================
# RIS-OPR: OPERATIONELLE RISIKEN (10 Faktoren)
# =============================================================================
RIS_OPR:
  name: "Operationelle Risiken"
  factor_count: 10

  factors:
    RMS-RIS-OPR-01:
      name: "Systemverfügbarkeit digitale Plattformen"
      definition: "Risiko von Ausfällen oder Performance-Einbrüchen bei blick.ch, cash.ch und weiteren digitalen Plattformen, die Reichweite und Werbeerlöse direkt beeinträchtigen"
      value: 3
      scale: "1-5"
      trend: "stabil"
      quantification: "Blick.ch: 90 Mio Visits/Monat; 1h Downtime = geschätzt 30'000-50'000 CHF Erlösausfall"
      risk_drivers:
        - "Hohe Traffic-Spitzen bei Breaking News"
        - "Komplexe Legacy-Infrastruktur"
        - "Abhängigkeit von Drittanbietern (CDN, Cloud)"
      mitigation: "Redundante Infrastruktur, 24/7-Monitoring, Cloud-Migration"
      source: "SimilarWeb-Daten; Eigene Einschätzung"

    RMS-RIS-OPR-02:
      name: "Redaktionelle Fehler und Korrekturen"
      definition: "Risiko faktischer Fehler, Falschinformationen oder ethischer Verstösse in der Berichterstattung mit potenziellen rechtlichen und reputativen Folgen"
      value: 3
      scale: "1-5"
      trend: "steigend"
      risk_drivers:
        - "Hoher Publikationstakt (Blick.ch publiziert 200+ Artikel/Tag)"
        - "KI-unterstützte Texterstellung erhöht Fehlerrisiko ohne adäquate Kontrolle"
        - "Boulevardjournalismus operiert an rechtlichen Grenzen (Persönlichkeitsrecht)"
        - "Social-Media-Beschleunigung (Zeitdruck)"
      mitigation: "Mehraugenprinzip, AI Super Desk mit Human-in-the-Loop, redaktionelle Richtlinien, Rechtsabteilung"
      source: "Presserat-Statistiken; Branchenpraxis"

    RMS-RIS-OPR-03:
      name: "Datenschutzverletzung / Data Breach"
      definition: "Risiko eines unbefugten Zugriffs auf Leser- und Abonnentendaten, Werbedaten oder interne Redaktionsdaten"
      value: 4
      scale: "1-5"
      trend: "steigend"
      quantification: "RMS verfügt über Daten von Millionen registrierter Nutzer und Abonnenten"
      risk_drivers:
        - "Umfangreiche First-Party-Daten (Leserprofile, Abo-Daten, Zahlungsinformationen)"
        - "Zunehmende Cyberangriffe auf Medienhäuser weltweit"
        - "Komplexe Datenflüsse zwischen redaktionellen, Werbe- und Abo-Systemen"
        - "DSG-Revision verschärft Meldepflichten und Bussgelder"
      mitigation: "Cyber-Security-Framework, Daten-Governance, DSG-Compliance-Programm, Penetration Tests"
      source: "NCSC Lageberichte; DSG Schweiz; Eigene Einschätzung"

    RMS-RIS-OPR-04:
      name: "Integrationsrisiko organisatorische Restrukturierung"
      definition: "Operationelle Reibungsverluste durch fortlaufende Organisationsänderungen: RASCH-Auflösung (2023), neue GL-Struktur (2025/26), AdUnit-Eingliederung (2026)"
      value: 3
      scale: "1-5"
      trend: "kurzfristig_erhöht"
      risk_drivers:
        - "Parallele Integrationsprojekte binden Managementressourcen"
        - "Unterschiedliche IT-Systeme und Prozesse müssen harmonisiert werden"
        - "Mitarbeitende in Veränderungsmüdigkeit"
      mitigation: "Dedizierte Integrationsorganisation, stufenweiser Ansatz, Change-Management"
      source: "persoenlich.com; Medienmitteilungen RMS; Eigene Einschätzung"

    RMS-RIS-OPR-05:
      name: "Talentabwanderung und Fachkräftemangel"
      definition: "Risiko, qualifizierte Journalist:innen, Datenanalyst:innen und Tech-Spezialist:innen nicht halten oder rekrutieren zu können in einem Markt mit strukturellem Stellenabbau und attraktiven Tech-Alternativen"
      value: 4
      scale: "1-5"
      trend: "steigend"
      risk_drivers:
        - "Medienbranche bietet unterdurchschnittliche Gehälter im Tech-Vergleich"
        - "Strukturelle Verunsicherung durch Stellenabbau (Ringier AG: -523 Stellen 2024)"
        - "Tech-Talente (KI, Daten) werden von allen Branchen umworben"
        - "Journalistische Nachwuchsprobleme (sinkende Attraktivität des Berufs)"
      mitigation: "Employer Branding, KI als Arbeitserleichterung positionieren, Weiterbildungsprogramme, flexible Arbeitsmodelle"
      source: "Ringier Jahresbericht 2024 (-523 MA); Branchenstudien; Eigene Einschätzung"

    RMS-RIS-OPR-06:
      name: "Lieferkettenrisiko Print-Produktion"
      definition: "Risiko von Störungen in der physischen Herstellung und Distribution von Print-Produkten (Papierpreise, Druckkapazitäten, Logistik)"
      value: 2
      scale: "1-5"
      trend: "sinkend"
      note: "Abnehmende Relevanz durch rückläufige Print-Auflagen und Schliessung Swissprinters (2024)"
      risk_drivers:
        - "Papierpreisvolatilität (seit 2022 gestiegen)"
        - "Schliessung eigener Druckerei (Swissprinters) macht abhängig von Drittdruckern"
        - "Logistik (Zustellung) wird teurer durch sinkende Auflagen"
      mitigation: "Langfristverträge mit Druckpartnern, Digital-First reduziert Print-Abhängigkeit"
      source: "Ringier Jahresbericht 2024 (Swissprinters-Schliessung); Branchenberichte"

    RMS-RIS-OPR-07:
      name: "KI-Modellrisiko (AI Super Desk)"
      definition: "Risiko fehlerhafter, voreingenommener oder ethisch problematischer Outputs durch KI-gestützte Redaktionstools (AI Super Desk, Palantir AIP)"
      value: 3
      scale: "1-5"
      trend: "stark_steigend"
      risk_drivers:
        - "Halluzinationen in KI-generierten Texten"
        - "Bias in Trainings-Daten beeinflusst Berichterstattung"
        - "Fehlende Transparenz über KI-Einsatz gegenüber Lesern"
        - "Haftungsfragen bei KI-generierten Fehlern"
      mitigation: "Human-in-the-Loop Pflicht, KI-Kennzeichnungspolitik, interne KI-Ethik-Richtlinien"
      source: "Ringier KI-Strategie; Branchendiskussion; Eigene Einschätzung"

    RMS-RIS-OPR-08:
      name: "Werbesystem-Komplexität"
      definition: "Operationelle Risiken durch zunehmende Komplexität des programmatischen Werbe-Ökosystems (Header Bidding, SSPs, DSPs, ID-Lösungen, Cookie-Deprecation)"
      value: 3
      scale: "1-5"
      trend: "steigend"
      risk_drivers:
        - "Cookie-Deprecation erfordert Umstellung auf First-Party-Daten"
        - "AdUnit-Integration bringt zusätzliche Werbesysteme"
        - "Programmatic-Betrug (Ad Fraud) im Schweizer Markt geschätzt 5-10%"
        - "Komplexität der DOOH-Integration (Livesystems)"
      mitigation: "Unified Ad Stack, First-Party-Data-Strategie, Brand Safety Tools"
      source: "IAB Switzerland; Eigene Einschätzung"

    RMS-RIS-OPR-09:
      name: "Betriebskontinuität bei Grossereignissen"
      definition: "Fähigkeit, den Redaktions- und Werbebetrieb bei Krisen aufrechtzuerhalten (Naturereignisse, Pandemien, Cyberangriffe, Stromausfälle)"
      value: 2
      scale: "1-5"
      trend: "stabil"
      assessment: "Medienhäuser haben seit COVID robuste Remote-Fähigkeiten aufgebaut"
      mitigation: "Remote-Work-Infrastruktur, Notfallpläne, redundante Systeme, Cloud-basierte Redaktionssysteme"
      source: "COVID-Erfahrungen; Eigene Einschätzung"

    RMS-RIS-OPR-10:
      name: "Third-Party-Abhängigkeitsrisiko"
      definition: "Abhängigkeit von kritischen Drittanbietern für Kernprozesse: Cloud (AWS/Azure), CDN, CMS-Anbieter, Palantir (KI), Zahlungsdienstleister (Abo)"
      value: 3
      scale: "1-5"
      trend: "steigend"
      critical_vendors:
        - vendor: "Palantir"
          criticality: "hoch"
          dependency: "KI-Infrastruktur, Datenplattform"
        - vendor: "Cloud Provider"
          criticality: "hoch"
          dependency: "Hosting, Skalierung"
        - vendor: "CMS-Anbieter"
          criticality: "mittel"
          dependency: "Redaktionssystem"
      mitigation: "Vendor-Diversifikation wo möglich, vertragliche SLAs, Exit-Strategien"
      source: "Eigene Einschätzung"

# =============================================================================
# RIS-REG: REGULATORISCHE & REPUTATIONSRISIKEN (8 Faktoren)
# =============================================================================
RIS_REG:
  name: "Regulatorische & Reputationsrisiken"
  factor_count: 8

  factors:
    RMS-RIS-REG-01:
      name: "Medienregulierung und BAKOM"
      definition: "Regulatorische Risiken durch neue Mediengesetzgebung, indirekte Presseförderung, und BAKOM-Aufsicht über Online-Medien"
      value: 3
      scale: "1-5"
      trend: "steigend"
      risk_drivers:
        - "Neue Medienförderungsgesetze könnten Wettbewerbsverzerrungen schaffen"
        - "Diskussion über Online-Medien-Regulierung (Sorgfaltspflichten)"
        - "SRG-Gebührendebatte beeinflusst Wettbewerbslandschaft"
        - "Potenzielle Werberegulierung (z.B. Alkohol, Glücksspiel online)"
      mitigation: "Aktive Verbandspolitik (VSM), Lobbying, Dialog mit BAKOM"
      source: "BAKOM; VSM; Parlamentarische Vorstösse 2025-2026"

    RMS-RIS-REG-02:
      name: "Datenschutz (DSG und Cookie-Consent)"
      definition: "Compliance-Risiken durch das revidierte Schweizer Datenschutzgesetz (DSG), Cookie-Consent-Anforderungen und potenzielle Annäherung an EU-DSGVO-Standards"
      value: 4
      scale: "1-5"
      trend: "steigend"
      risk_drivers:
        - "DSG-Revision 2023 mit verschärften Meldepflichten und Bussgeldern"
        - "Cookie-Consent-Regimes reduzieren adressierbare Reichweite (Consent-Rate typisch 50-70%)"
        - "First-Party-Data-Strategie erfordert Einwilligungsmanagement"
        - "EDÖB prüft vermehrt Online-Tracking"
      quantification: "DSG-Bussen bis CHF 250'000 (persönliche Haftung); Consent-Verluste reduzieren Werbewert um 20-30%"
      mitigation: "Consent Management Platform, Privacy-by-Design, DSG-Compliance-Team, First-Party-Data-Fokus"
      source: "DSG Schweiz (revDSG 2023); EDÖB Berichte; IAB Switzerland"

    RMS-RIS-REG-03:
      name: "Presserat-Beschwerden und Rügen"
      definition: "Reputationsrisiko durch öffentliche Rügen des Schweizer Presserats wegen Verstössen gegen den Journalistenkodex"
      value: 3
      scale: "1-5"
      trend: "stabil"
      quantification: "Blick gehört historisch zu den am häufigsten gerügten Titeln (ca. 5-10 Stellungnahmen/Jahr)"
      risk_drivers:
        - "Boulevard-Berichterstattung operiert an ethischen Grenzen"
        - "Persönlichkeitsrechtsverletzungen (Prominente, Opfer)"
        - "Tempo-Druck im Online-Journalismus"
        - "KI-generierte Inhalte könnten neue ethische Fragen aufwerfen"
      mitigation: "Ombudsmann, redaktionelle Richtlinien, Rechtsabteilung, Sensibilisierung"
      source: "Schweizer Presserat Stellungnahmen; Eigene Einschätzung"

    RMS-RIS-REG-04:
      name: "Markenreputation Blick"
      definition: "Reputationsrisiko durch die polarisierende Markenwahrnehmung von Blick als Boulevardmedium; potenzielle negative Ausstrahlung auf gesamtes RMS-Portfolio und Werbekunden"
      value: 4
      scale: "1-5"
      trend: "stabil"
      assessment: "Blick ist die bekannteste, aber auch polarisierendste Medienmarke der Schweiz; hohe Reichweite, aber tiefes Vertrauen"
      risk_drivers:
        - "Boulevard-Image schreckt Premium-Werbekunden ab"
        - "Skandalberichterstattung kann Boykott-Aufrufe auslösen"
        - "Social-Media-Shitstorms bei kontroversen Artikeln"
        - "Imagetransfer auf Wirtschaftstitel (Handelszeitung, Bilanz) unerwünscht"
      mitigation: "Marken-Separierung im Portfolio, Qualitätsoffensive Blick+, Brand Safety für Werbepartner"
      source: "Reuters Digital News Report (Trust Scores); Medienforschung; Eigene Einschätzung"

    RMS-RIS-REG-05:
      name: "KI-Ethik und Transparenz"
      definition: "Regulatorisches und ethisches Risiko bei Einsatz von KI im Journalismus: Kennzeichnungspflichten, Transparenzanforderungen, gesellschaftliche Akzeptanz"
      value: 3
      scale: "1-5"
      trend: "stark_steigend"
      risk_drivers:
        - "Fehlende klare Schweizer Regulierung zu KI in Medien"
        - "EU AI Act klassifiziert bestimmte KI-Anwendungen als hochriskant"
        - "Leservertrauen sinkt bei Verdacht auf KI-generierte Inhalte ohne Kennzeichnung"
        - "Branchenweite Debatte über Grenzen von KI im Journalismus"
