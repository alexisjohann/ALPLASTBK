# =============================================================================
# THEORETISCHE FUNDIERUNG
# =============================================================================

theoretical_foundation:
  primary_theories:
    - theory: "Habit Formation"
      authors: "Wood & Neal (2007), Lally et al. (2010)"
      key_finding: "Habits bestehen aus Cue-Routine-Reward Loops; neue Habits brauchen 66+ Tage"
      application: "Polaris hat alle drei Loop-Komponenten gestoert"

    - theory: "Cognitive Load Theory"
      authors: "Sweller (1988)"
      key_finding: "Hohe kognitive Last reduziert Engagement und verhindert Automatisierung"
      application: "Neues Layout erhoeht kognitive Last → verhindert Habit-Formation"

    - theory: "Mere Exposure Effect"
      authors: "Zajonc (1968)"
      key_finding: "Wiederholte Exposition erhoeht Praeferenz"
      application: "Newsletter/Push/Social als wiederholte Exposition = Habit-Aufbau"

    - theory: "Implementation Intentions"
      authors: "Gollwitzer (1999)"
      key_finding: "'Wenn X, dann Y' Plaene erhoehen Handlungswahrscheinlichkeit"
      application: "Morning Briefing = 'Wenn morgens Email, dann Blick lesen'"

    - theory: "Fogg Behavior Model"
      authors: "Fogg (2009)"
      key_finding: "Behavior = Motivation × Ability × Trigger (alle drei noetig)"
      application: "Push = Trigger, einfaches Layout = Ability, Content = Motivation"

  ebf_mapping:
    parameter_context_transformation: |
      Habit-Staerke ist KONTEXTABHAENGIG:
      θ_habit = f(Ψ_T, Ψ_M, Ψ_C)

      Ψ_T (Zeit): Morgen-Routine = staerkster Habit-Kontext
      Ψ_M (Tools): App > Mobile Web > Desktop fuer Habit-Formation
      Ψ_C (Kognitiv): Niedriger Cognitive Load = staerkerer Habit

      Polaris hat Ψ_C verschlechtert (hoeherer Cognitive Load)
      → θ_habit sinkt → Direct Traffic sinkt

# =============================================================================
# PCUM-INTEGRATION
# =============================================================================

pcum_integration:
  maps_to_dimension: "G4 (Habit Transfer)"

  impact_on_scenarios:
    note: |
      Erfolgreiche Polaris Habit-Fix hat POSITIVEN Effekt auf ALLE Szenarien:
      - G4 steigt → U_netto steigt fuer S1, S2, S3, S4
