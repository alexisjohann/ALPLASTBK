    Alle positiv oder neutral = Portfolio ist konsistent.

  matrix:
    #                      Push    NL    WhatsApp  Homepage  App     Re-Eng
    push_personalization:   [1.00, 0.15,  0.10,    -0.05,   0.20,   0.15]
    morning_newsletter:     [0.15, 1.00,  0.05,     0.00,   0.10,   0.10]
    whatsapp_channel:       [0.10, 0.05,  1.00,     0.00,   0.10,   0.05]
    homepage_hybrid:        [-0.05, 0.00, 0.00,     1.00,   0.05,   0.00]
    app_features:           [0.20, 0.10,  0.10,     0.05,   1.00,   0.15]
