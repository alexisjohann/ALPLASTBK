# =============================================================================
# F1: PROBLEM DEFINITION
# =============================================================================

F1_problem:
  statement: |
    Blick.ch verliert 74M Sessions/Jahr (-7% YoY), primaer durch einen
    Rueckgang des True Direct Traffic um -19% seit dem Polaris-Redesign.
    Dies ist ein PRODUKT/UX-Problem, kein Markteffekt.

  behavioral_diagnosis: |
    Polaris hat den etablierten HABIT LOOP der Stammleser gestoert:

    VOR Polaris:
      CUE     → Morgens Handy nehmen / Browser oeffnen
      ROUTINE → blick.ch Homepage → vertrautes Layout scannen → Top-Stories lesen
      REWARD  → Informiert fuehlen, Kontrollgefuehl, Routine-Befriedigung

    NACH Polaris:
      CUE     → Morgens Handy nehmen / Browser oeffnen
      ROUTINE → blick.ch Homepage → NEUES Layout → Desorientierung → weniger lesen
      REWARD  → REDUZIERT (Kontrollverlust, "finde nichts mehr")

    KONSEQUENZ: Habit Loop bricht → User kommen seltener → Direct Traffic sinkt

  scope:
    affected_users: "True Direct Users (ca. 484M Sessions, 50% von Blick-Total)"
    affected_metric: "Direct/Aggregators -19% YoY"
    urgency: "HOCH — jeder Monat = ca. 6M weitere verlorene Sessions"

  evidence:
    - source: "RMS State of Traffic Report, Jan 2026"
      finding: "Direct/Aggregators: 484M Sessions (50%), -19% YoY"
      quote: "largely driven by continued decline in true direct traffic since Polaris"
    - source: "RMS State of Traffic Report"
      finding: "Homepage-Anteil bei Direct: 74%"
      interpretation: "Homepage-Aenderung = Habit-Stoerung fuer 3/4 der Direct Users"
    - source: "RMS State of Traffic Report"
      finding: "SEO nur -6% (Industrie: -17%)"
      interpretation: "Google AI ist NICHT der Haupttreiber — Polaris ist es"

# =============================================================================
# F2: TARGET POPULATION
# =============================================================================

F2_target:
  primary_segment:
    name: "Lapsed Habit Users"
    definition: |
      User, die VOR Polaris regelmaessig (mind. 3x/Woche) blick.ch direkt
      besuchten und NACH Polaris ihre Frequenz reduziert haben.
    estimated_size: "150'000 - 300'000 User (geschaetzt aus -19% Direct Decline)"
    behavioral_profile:
      habit_strength_pre_polaris: "STARK (automatisiertes Verhalten)"
      habit_strength_post_polaris: "GESTOERT (bewusstes Ueberdenken statt Automatik)"
      loss_aversion: "MITTEL (lambda ~1.80 fuer News-Segment)"
      platform: "Desktop 40%, Mobile Web 35%, App 25% (geschaetzt)"

  secondary_segment:
    name: "Dormant Users"
    definition: |
      User, die vor Polaris gelegentlich (1-2x/Woche) direkt kamen
      und nach Polaris fast komplett aufgehoert haben.
    estimated_size: "100'000 - 200'000 User"
    note: "Schwerere Reaktivierung — Habit war bereits schwach"

  excluded:
    - "SEO-Only-User (kein Habit-Problem, sondern Suchmaschinen-abhaengig)"
    - "Social-Only-User (kommen ueber externes Cue, nicht eigenen Habit)"
    - "Neue User post-Polaris (kennen nur neues Layout, kein Habit-Bruch)"

# =============================================================================
# F3: 10C TARGET DIMENSIONS
# =============================================================================

F3_10c_targets:
  note: |
    Intervention zielt auf 4 der 10 CORE-Dimensionen.
    Primaer: STAGE (Habit-Journey). Sekundaer: AWARE, WHEN, HOW.

  primary_target:
    dimension: "STAGE (AW)"
    current_state: "Lapsed Habit (Phase: Habit → Disruption → Decline)"
    target_state: "Re-Habituated (Phase: Re-Cue → Re-Routine → Re-Reward)"
    delta: "Journey-Transition von Lapsed zurueck zu Active Habit"
    mechanism: |
      Habit Re-Formation nach Wood & Neal (2007):
      1. Context Cue wiederherstellen (vertraute visuelle Anker)
      2. Routine vereinfachen (weniger kognitive Last)
      3. Reward verstaerken (Mehrwert deutlicher machen)
      → Lally et al. (2010): Neuer Habit braucht 18-254 Tage (Median: 66 Tage)

  secondary_targets:
    - dimension: "AWARE (AU)"
      delta: "A(blick.ch) erhoehen durch Push/Newsletter/Social Cues"
      mechanism: "Salience = Awareness erhoehen, damit Habit-Cue ausgeloest wird"

    - dimension: "WHEN (V)"
      delta: "Kontext-Trigger staerken (Morgen-Routine, Pendler-Kontext)"
      mechanism: "Psi_T (zeitlicher Kontext) als Habit-Trigger nutzen"

    - dimension: "HOW (B)"
      delta: "Komplementaritaet Social → Direct staerken (gamma > 0)"
      mechanism: "Social-Engagement als Gateway zu Direct-Habit aufbauen"

# =============================================================================
# F4: INTERVENTION VECTOR (9D)
# =============================================================================

F4_intervention_vector:
  note: |
    EBF 9D Interventionsvektor I ∈ [0,1]^9
    Werte zeigen Intensitaet der Intervention pro CORE-Dimension.

  vector:
    I_WHO: 0.10      # Gering — Segmentierung, nicht Identitaet
    I_WHAT: 0.20     # Moderat — Content-Value-Proposition staerken
    I_HOW: 0.30      # Moderat-Hoch — Cross-Channel-Komplementaritaet
    I_WHEN: 0.50     # Hoch — Zeitliche Kontexte (Morgen, Pendler) als Trigger
    I_WHERE: 0.10    # Gering — Parameter kalibrieren, nicht veraendern
    I_AWARE: 0.60    # Hoch — Push/Newsletter/Social als Awareness-Cues
    I_READY: 0.40    # Moderat-Hoch — Motivation zur Rueckkehr staerken
    I_STAGE: 0.80    # HOECHSTE — Habit Re-Formation ist Kernziel
    I_HIERARCHY: 0.15 # Gering — keine Entscheidungshierarchie-Aenderung

# =============================================================================
# F5: BEHAVIORAL MECHANISMS
# =============================================================================

F5_mechanisms:
  primary_mechanism:
    name: "Habit Loop Restoration"
    theory: "Habit Formation (Wood & Neal 2007, Lally et al. 2010)"
    theory_id: "Verwandt mit MS-NU-002 (Default Effects)"
    description: |
      Habits bestehen aus drei Komponenten: Cue, Routine, Reward.
      Polaris hat alle drei gestoert. Intervention muss alle drei adressieren.

    components:
      cue_restoration:
        problem: "Vertraute visuelle Homepage-Anker sind verschwunden"
        intervention: |
          A/B Test: Hybrid-Homepage mit bekannten Elementen:
          - Top-Story-Position beibehalten (staerkstes visuelles Anker)
          - Rubrik-Leiste an gewohnter Position
          - "Meine Themen" Widget fuer personalisierte Anker
          - Morning Briefing Box (neues Cue, taeglicher Anlass)
        expected_effect: "Wiedererkennungswert +40%, Verweildauer +15%"

      routine_simplification:
        problem: "Neues Layout erhoehte kognitive Last beim Scannen"
        intervention: |
          Reduzierte kognitive Komplexitaet:
          - Weniger visuelle Elemente auf Homepage (Cognitive Load Theory)
          - Klarere Informationshierarchie (F-Pattern optimiert)
          - Schnellerer Pfad zu "meinen" Inhalten (max. 2 Klicks)
          - Progressive Disclosure: Details nur bei Interesse
        expected_effect: "Time-to-First-Story -30%, Bounce Rate -10%"

      reward_amplification:
        problem: "Informationswert ist gleich, aber 'Gefuehl von Kontrolle' fehlt"
        intervention: |
          Expliziten Reward-Moment einbauen:
          - "Du bist auf dem neusten Stand" Badge nach 5 Stories
          - Personalisierte Zusammenfassung: "Deine 3 wichtigsten Stories heute"
          - Lesefortschritt sichtbar machen (wie viel habe ich gelesen?)
          - Social Proof: "123'456 lesen gerade mit dir" (Zugehoerigkeit)
        expected_effect: "Return Rate +20%, Session-Frequenz +1.5x/Woche"

  secondary_mechanisms:
    push_as_external_cue:
      name: "Push Notifications als externer Habit-Cue"
      theory: "External Cue → Internal Habit (Fogg Behavior Model)"
      description: |
        Push-Notifications ersetzen den internen Cue (Gewohnheit), bis
        der interne Cue wieder aufgebaut ist. Uebergangs-Strategie.
        ABER: Muss personalisiert sein, sonst Opt-Out-Risiko.
      actions:
        - "Personalisierte Push basierend auf Lese-Historie (nicht nur Breaking News)"
        - "Morning Push um 07:00: 'Dein Blick-Briefing ist bereit'"
        - "Frequenz-Optimierung: Testen ob 2x, 3x, 4x taeglich optimal"
        - "Re-Engagement Push: 'Du warst 3 Tage nicht da — hier ist was du verpasst hast'"
      risk: |
        Push-Fatigue: Zu viele Pushes → Opt-Out → Kanal verloren.
        Mitigation: A/B Test der Frequenz, sofortige Reduktion bei Opt-Out-Anstieg.

    social_to_direct_funnel:
      name: "Social als Habit-Gateway"
      theory: "Mere Exposure Effect → Familiarity → Habit"
      description: |
        Social-User (+62% YoY!) koennen zu Direct-Usern konvertiert werden.
        WhatsApp (70% aller Shares) hat besondere Habit-Qualitaet:
        Persoenliche Empfehlung → Hoeheres Vertrauen → Wiederbesuch
      actions:
        - "WhatsApp Channel mit taeglichem Briefing"
        - "Deep Links von Social Posts zu App (nicht Mobile Web)"
        - "Social-Returnee tracking: Wer kommt via Social ZURUECK?"
        - "Personalisierte 'Mehr davon' Page nach Social-Einstieg"

    newsletter_habit_building:
      name: "Newsletter als Habit-Infrastruktur"
      theory: "Implementation Intentions (Gollwitzer 1999)"
      description: |
        Newsletter (+67% YoY) sind die staerkste Habit-Infrastruktur:
        Fixe Zeit + Fixe Inbox + Personalisierter Inhalt = perfekter Habit Loop.
        Morning Newsletter = "wenn ich morgens Email checke, lese ich Blick zuerst"
      actions:
        - "Morning Briefing Newsletter (06:30, vor Arbeitsbeginn)"
        - "Abend-Recap Newsletter (18:00, Pendler-Kontext)"
        - "Personalisierte Themen-Newsletter (Sport, Wirtschaft, Lifestyle)"
        - "Newsletter → App Deep Link (nicht Mobile Web)"

# =============================================================================
# F6: PHASE-DIMENSION AFFINITY
# =============================================================================

F6_phase_affinity:
  note: |
    User befinden sich in der "Lapsed" Phase der Behavioral Customer Journey.
    Phase-Dimension Affinity (Kapitel 18) bestimmt welche Interventionen
    in dieser Phase am effektivsten sind.

  user_phase: "Lapsed (hatten Habit, haben ihn verloren)"

  affinity_scores:
    AWARE_interventions:
      alpha: 0.75
      interpretation: "STARK empfohlen — Lapsed Users brauchen Reminder-Cues"
    STAGE_interventions:
      alpha: 0.85
      interpretation: "SEHR STARK — Habit Re-Formation ist phasen-optimal"
    WHEN_interventions:
      alpha: 0.70
      interpretation: "STARK — Kontext-Trigger sind effektiv bei Lapsed Users"
    WHAT_interventions:
      alpha: 0.45
      interpretation: "MODERAT — Content-Value ist nicht das Problem (Polaris = UX)"
    WHO_interventions:
      alpha: 0.30
      interpretation: "NIEDRIG — Identitaet ist nicht das Problem bei Habit-Bruch"

# =============================================================================
# F7: SEGMENT-MULTIPLIER
# =============================================================================

F7_segment_multiplier:
  note: |
    Nicht alle User-Segmente reagieren gleich auf Habit-Interventionen.
    Segment-Type Multiplier Matrix (Kapitel 19).

  multipliers:
    s1_news:
      sigma: 1.4
      note: "HOECHSTE Wirkung — News-User haben staerksten Habit-Bruch erlitten"
    s5_young_digital:
      sigma: 1.2
      note: "HOCH — Digital Natives reagieren schnell auf UX-Aenderungen"
    s2_wirtschaft:
      sigma: 0.8
      note: "MODERAT — Kommen oft ueber andere Kanaele (Bilanz, cash.ch)"
    s4_lifestyle:
      sigma: 0.7
      note: "MODERAT-NIEDRIG — Lifestyle ist weniger habit-getrieben"
    s3_service:
      sigma: 0.4
      note: "NIEDRIG — Beobachter-User kommen intent-basiert, nicht habit-basiert"

# =============================================================================
# F8: CROWDING-OUT ANALYSIS
# =============================================================================

F8_crowding_out:
  note: |
    Pruefung ob Interventionen sich gegenseitig VERSTAERKEN oder SCHWAEECHEN.

  interaction_check:
    push_plus_newsletter:
      gamma: "+0.15"
      interpretation: "KOMPLEMENTAER — Push treibt Newsletter-Oeffnung und umgekehrt"
      risk: "Gering — verschiedene Kanaele, nicht konkurrierende Cues"

    push_plus_social:
      gamma: "+0.10"
      interpretation: "KOMPLEMENTAER — Social-Engagement macht Push-Content relevanter"
      risk: "Gering"

    push_plus_app_gamification:
      gamma: "+0.20"
      interpretation: "STARK KOMPLEMENTAER — Push treibt App-Oeffnung, Gamification haelt dort"
      risk: "Gering"

    homepage_redesign_plus_push:
      gamma: "-0.05"
      interpretation: "LEICHT NEGATIV — wenn Homepage besser wird, werden Pushes weniger noetig"
      risk: "Akzeptabel — ist erwuenschter Effekt (interne Cues ersetzen externe)"
      note: "Kein echtes Crowding-Out, sondern gradueller Uebergang von extern zu intern"

  overall_assessment: |
    KEIN relevantes Crowding-Out-Risiko.
    Alle Interventionen sind komplementaer — sie adressieren verschiedene
    Touchpoints des Habit Loops (Cue, Routine, Reward) und verschiedene
    Kontexte (Morgen, Unterwegs, Abend).

