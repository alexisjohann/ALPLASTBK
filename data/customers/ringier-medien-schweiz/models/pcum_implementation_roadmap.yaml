metadata:
  title: "PCUM Implementation Roadmap: Phasen 0-3"
  model_ref: "MOD-ORG-PCUM-001 v3.0"
  version: "1.0"
  created: "2026-02-08"
  author: "FehrAdvice & Partners AG"
  status: "draft"
  description: |
    Priorisierte Implementation der PCUM-Empfehlungen fuer RMS.
    Basiert auf Sensitivity Analysis v3.0 mit G2-Korrektur und Polaris-Diagnose.

    KERNLOGIK:
    - Phase 0 ist UNABHAENGIG von One-Platform und kann SOFORT starten
    - Phasen 1-3 sind SEQUENTIELL mit klaren Go/No-Go Gates
    - Jede Phase hat messbare Behavioral KPIs
    - S2 (Backend+Abo) ist Zielkonfiguration, S3 (L4b) nur bei Dreifach-Bedingung

# =============================================================================
# STRATEGISCHE UEBERSICHT
# =============================================================================

strategic_overview:
  ranking: "S2 (+0.215) > S1 (+0.136) > S3 (+0.098) > S4 (-0.118)"
  target_scenario: "S2 (Backend + Abo)"
  optionality: "S3 (L4b House of Brands) nur bei Dreifach-Bedingung"

  key_insight: |
    Die v3.0 Analyse zeigt: Der GROESSTE sofortige Hebel ist NICHT die
    One-Platform-Entscheidung, sondern der Polaris Habit-Fix.

    Blick verliert 74M Sessions/Jahr durch einen PRODUKT-Fehler (Polaris),
    nicht durch Markteffekte. Das ist mehr als das gesamte Beobachter-Volumen.

    Darum: Phase 0 ZUERST, unabhaengig von der Plattform-Strategie.

  timeline_summary:
    phase_0: "Q1-Q2 2026 (SOFORT)"
    phase_1: "Q2-Q4 2026"
    phase_2: "Q1-Q2 2027"
    phase_3: "fruehestens H2 2027 (optional, Go/No-Go Gate)"

# =============================================================================
# PHASE 0: POLARIS HABIT-FIX (SOFORT — Unabhaengig von One-Platform!)
# =============================================================================

phase_0:
  name: "Polaris Habit-Fix"
  priority: "HOECHSTE (PRIO 0)"
  timeline: "Q1-Q2 2026 (Start: SOFORT)"
  owner: "CSIO + CPO + Chefredaktion Blick"
  budget_estimate: "Klein — primaer Produkt/UX-Aenderungen, kein Infrastruktur-Invest"

  independence: |
    Phase 0 ist VOLLSTAENDIG UNABHAENGIG von der One-Platform-Entscheidung.
    Kann (und MUSS) sofort starten, egal wie S1/S2/S3-Entscheidung ausfaellt.
    Jeder Monat Verzoegerung = ~6M weitere verlorene Sessions.

  diagnosis:
    problem: "Blick -7% YoY = 74M Sessions/Jahr verloren"
    root_cause: "Polaris Redesign hat Habit Loop gestoert"
    evidence:
      - "Direct/Aggregators: -19% YoY (484M Sessions, 50% Anteil)"
      - "Explizit im Report: 'largely driven by continued decline in true direct traffic since Polaris'"
      - "Homepage-Anteil: 74% (true direct) → Homepage-Aenderung = Habit-Stoerung"
      - "SEO nur -6% (besser als -17% Industrie) → NICHT Google AI als Haupttreiber"
    behavioral_mechanism: |
      Habit Loop (Cue → Routine → Reward) wurde durch Polaris unterbrochen:
      - CUE: Homepage-Layout geaendert → gewohnte visuelle Anker weg
      - ROUTINE: Scroll-Pattern gestoert → User finden Inhalte nicht mehr intuitiv
      - REWARD: Kontrollgefuehl verloren → User kehren seltener zurueck
      Theorie: Habit Formation (Wood & Neal 2007, Lally et al. 2010)

  interventions:
    I1_homepage_habit_restore:
      name: "Homepage Habit Loop Restoration"
      10c_target: "STAGE (Journey-Phase: Habit → Lapsed → Re-Habit)"
      mechanism: |
        True Direct Users hatten einen stabilen Habit Loop mit der alten Homepage.
        Polaris hat diesen Loop unterbrochen. Zwei Strategien:
        a) RESTORE: Elemente des alten Layouts zurueckbringen (Familiar Anchors)
        b) RE-LEARN: Neuen Habit Loop aufbauen (braucht 66+ Tage, Lally 2010)
        Empfehlung: Hybrid — bekannte Elemente + neue Struktur
      actions:
        - "A/B Test: Vergleich aktuelles Layout vs. Hybrid mit alten Ankerpunkten"
        - "Heatmap-Analyse: Wo klicken True-Direct-User jetzt vs. vor Polaris?"
        - "Scroll-Tiefe messen: Sinkt Engagement oder nur Frequenz?"
        - "Exit-Survey fuer abgewanderte User (warum kommst du seltener?)"
      kpi:
        primary: "True Direct Sessions/Woche (Ziel: +10% in 3 Monaten)"
        secondary: "Homepage Bounce Rate, Time-on-Site Direct Users"
      timeline: "Q1 2026 (A/B Test innerhalb 2 Wochen startbar)"

    I2_push_notification_optimization:
      name: "Push/Newsletter Habit Staerkung"
      10c_target: "AWARE (Salience erhoehen fuer Wiederkehr)"
      mechanism: |
        Push und Newsletter sind CUE-Generatoren fuer den Habit Loop.
        +67% Newsletter-Wachstum zeigt: Kanal funktioniert!
        Aber: Push muss PERSONALISIERT sein, sonst = Opt-Out-Risiko.
      actions:
        - "Push-Segmentierung nach User-Interessen (News, Sport, Wirtschaft)"
        - "Optimale Push-Frequenz testen (2-4x taeglich vs. 6-8x)"
        - "Newsletter-Personalisierung (nicht nur Breaking News)"
        - "Push-Timing-Optimierung (Morgen-Habit vs. Mittag vs. Abend)"
      kpi:
        primary: "Push-Open-Rate (Ziel: >8%)"
        secondary: "Newsletter-Returning-User-Rate, Push-Opt-Out-Rate"
      timeline: "Q1 2026"

    I3_social_distribution:
      name: "Social als Wachstumskanal (WhatsApp-First)"
      10c_target: "HOW (Komplementaritaet Social → Direct)"
      mechanism: |
        Social: +62% YoY (70M Sessions). WhatsApp = 70% aller Blick-Shares.
        Social ist kein Kannibalisator, sondern KOMPLEMENTAER:
        Social-User, die wiederkommen, werden zu Direct-Usern.
        WhatsApp hat besondere Habit-Qualitaet (persoenliche Empfehlung).
      actions:
        - "WhatsApp Channel ausbau (Broadcasts, Gruppen)"
        - "Social-to-Direct Funnel messen (wieviele Social-Erstbesucher werden Returnees?)"
        - "Instagram Reels/TikTok → Blick-App Deep Links"
        - "Community-Features testen (Kommentar-Bereiche, Umfragen)"
      kpi:
        primary: "Social Referral Sessions (Ziel: +30% YoY)"
        secondary: "Social-to-Direct Conversion Rate"
      timeline: "Q1-Q2 2026"

    I4_app_engagement:
      name: "App Habit Loop (Morning Routine)"
      10c_target: "WHEN (Kontext: Morgen-Routine als Habit-Trigger)"
      mechanism: |
        Mobile App ist der staerkste Habit-Kanal (Push + Startscreen + Widget).
        Morning Briefing als taeglicher Cue:
        - 07:00 Push → App oeffnen → Briefing lesen → Habit staerken
        - Widget auf Startscreen = permanenter visueller Cue
      actions:
        - "Morning Briefing Feature (personalisiert, 5 Stories)"
        - "App Widget fuer iOS/Android Startscreen"
        - "App-Onboarding optimieren (Habit-Intention Setting)"
        - "Gamification: Streak-Counter fuer taegliche Nutzung"
      kpi:
        primary: "DAU/MAU Ratio (Ziel: >0.35)"
        secondary: "Morning Session Rate, App Opens/User/Woche"
      timeline: "Q1-Q2 2026"

  success_criteria:
    must_have:
      - "True Direct Sessions Trend-Umkehr (von -19% auf mindestens -5%)"
      - "Netto-Effekt: mindestens 30M der 74M verlorenen Sessions zurueckgewinnen"
    nice_to_have:
      - "Direct Traffic Anteil zurueck auf >35% (aktuell ~30%)"
      - "Newsletter-Abonnenten +50% YoY"

  go_nogo_gate:
    timing: "Ende Q2 2026"
    criteria: |
      GO fuer Phase 1: True Direct Trend stabilisiert (≥-10% statt -19%)
      GO unabhaengig: Phase 1 kann parallel starten, da tech-fokussiert
    note: "Phase 0 hat KEIN Gate fuer Phase 1 — Phase 1 startet parallel!"

# =============================================================================
# PHASE 1: L1 — BACKEND/CMS KONSOLIDIERUNG
# =============================================================================

phase_1:
  name: "L1 Backend/CMS Konsolidierung"
  priority: "PRIO 1"
  timeline: "Q2-Q4 2026"
  owner: "CDDO (Sandro Inguscio) + CPO (Stephanie Leue)"
  budget_estimate: "Mittel-Hoch — CMS-Migration, technische Infrastruktur"

  pcum_value:
    u_netto: "+0.136"
    note: "S1 allein ist bereits positiv — geringes Risiko, solider Nutzen"

  rationale: |
    L1 (Backend-Konsolidierung) ist der risikoaermste Schritt:
    - Fuer User UNSICHTBAR (kein Identity-Loss, kein Habit-Bruch)
    - V1 = 0, V2 = 0, V4 = 0 (keine negativen Effekte ausser V3 minimal)
    - Schafft INFRASTRUKTUR fuer Phase 2 und 3
    - Schibsted-Modell beweist: Tech-Konsolidierung funktioniert

  workstreams:
    WS1_cms_migration:
      name: "Einheitliches CMS"
      description: |
        Alle 5 digitalen Titel auf ein CMS migrieren.
        Aktuell: Blick auf eigenem System, Bilanz/Beobachter auf separatem.
        Ziel: Ein System fuer alle (vermutlich Blick-Basis erweitern).
      deliverables:
        - "CMS-Evaluation und -Entscheid"
        - "Migration Bilanz (kleinster Titel, geringste Komplexitaet)"
        - "Migration Beobachter"
        - "Migration cash.ch (Utility-Content braucht spezielle Logik)"
      dependencies: ["Keine externen Abhaengigkeiten"]
      risk: "NIEDRIG — technische Migration ohne User-Impact"

    WS2_data_infrastructure:
      name: "One-ID / Data Layer"
      description: |
        Gemeinsame User-Identifikation ueber alle Titel.
        Voraussetzung fuer Cross-Brand-Personalisierung (Phase 2+3).
        Status: Q6 (offen) — Wo steht One-ID Projekt bei RMS?
      deliverables:
        - "Unified Login (SSO fuer alle RMS-Titel)"
        - "Cross-Brand User-Profiling"
        - "Consent Management harmonisieren"
        - "Data Warehouse fuer cross-brand Analytics"
      dependencies: ["One-ID Projekt-Status von RMS (Q6, offen)"]
      risk: "MITTEL — Datenschutz/DSGVO-Compliance erforderlich"

    WS3_ad_tech_harmonization:
      name: "Ad-Tech Harmonisierung"
      description: |
        L3 (Werbevermarktung via Ringier Advertising) ist bereits DONE.
        Aber: Backend-Konsolidierung ermoeglicht bessere Cross-Sell-Daten.
        Ein User, der Blick UND Bilanz liest, ist wertvoller fuer Werbetreibende.
      deliverables:
        - "Cross-Brand Audience Segments fuer Ringier Advertising"
        - "Unified Ad-Server-Integration"
      dependencies: ["WS2 (One-ID) muss teilweise stehen"]
      risk: "NIEDRIG"

  editorial_communication:
    strategy: |
      Phase 1 betrifft Redaktionen MINIMAL (Backend, nicht Frontend).
      Trotzdem: FRUEH kommunizieren, um Vertrauen aufzubauen.
      - Botschaft: "Wir machen euch das Leben einfacher, nicht komplizierter"
      - Proof Point: Bilanz-Migration zeigt: Content bleibt, nur System aendert sich
    lever: "Lever 3 (Sequential Approach) aus PCUM Showstopper Analysis"

  success_criteria:
    must_have:
      - "Alle 5 Titel auf einheitlichem CMS"
      - "Cross-Brand Analytics Dashboard live"
    nice_to_have:
      - "One-ID fuer >50% der registrierten User"
      - "Cross-Brand Audience Segments in Ringier Advertising"

  go_nogo_gate:
    timing: "Ende Q4 2026"
    criteria: |
      GO fuer Phase 2 wenn:
      1. CMS-Migration fuer mind. 3 von 5 Titeln abgeschlossen
      2. One-ID Basis steht (Unified Login live)
      3. Kein signifikanter redaktioneller Widerstand (V3 < Warnschwelle)
      4. KEINE negative User-Impact-Signale (Traffic-Daten stabil)

# =============================================================================
# PHASE 2: L2 — ABO-BUENDELUNG (BLICK+ SUPER-BUNDLE)
# =============================================================================

phase_2:
  name: "L2 Abo-Buendelung (Blick+ Super-Bundle)"
  priority: "PRIO 1 (nach Phase 1 Grundlagen)"
  timeline: "Q1-Q2 2027"
  owner: "CSIO (Patrick Rademacher) + Commercial (Max Buder)"
  budget_estimate: "Mittel — primaer Produktentwicklung und Marketing"

  pcum_value:
    u_netto: "+0.215"
    delta_vs_s1: "+0.079 (marginaler Nutzen ueber S1)"
    note: "S2 ist das OPTIMALE Szenario — hoechster U_netto aller Varianten"

  rationale: |
    Abo-Buendelung bietet den GROESSTEN marginalen Nutzen:
    - G2 (Cross-Discovery) steigt durch gemeinsames Abo signifikant
    - G3 (Data Synergy) durch gemeinsames Nutzerverhalten im Bundle
    - V1 (Identity Loss) bleibt MODERAT (Marken behalten eigene Destination)
    - V4 (Model Incompatibility) ist NIEDRIG (Beobachter = Premium-Abo wie Bilanz)

    Blick+ hat 16k+ Abonnenten — Basis fuer Erweiterung vorhanden.

  bundle_architecture:
    tier_1_blick_plus:
      name: "Blick+ (bestehend)"
      price_indication: "CHF 9.90/Monat"
      content: "Blick Premium-Artikel"
      status: "LIVE (16k+ Abos)"

    tier_2_super_bundle:
      name: "Blick+ Complete (NEU)"
      price_indication: "CHF 14.90-19.90/Monat"
      content: "Blick+ PLUS Bilanz + Beobachter + cash.ch Premium"
      value_proposition: |
        "Ein Abo, alle Schweizer Perspektiven"
        - News (Blick) + Wirtschaft (Bilanz) + Service (Beobachter) + Finanzen (cash.ch)
        - Fuer Familien: Jeder findet etwas
        - Fuer Professionals: Alle relevanten Quellen in einem Abo
      pricing_logic: |
        Bilanz Abo: CHF 19/Monat (standalone)
        Beobachter Abo: CHF 12/Monat (standalone)
        Super-Bundle = CHF 15-20 (massive Ersparnis vs. Einzel-Abos)
        → Perceived Gain hoch, da Einzelsumme CHF 41+ waere

    tier_3_family:
      name: "Blick+ Family (optional)"
      price_indication: "CHF 24.90/Monat"
      content: "Super-Bundle + 3 Profile"
      note: "Spaetere Erweiterung, abhaengig von One-ID Infrastruktur"

  behavioral_design:
    default_architecture: |
      NUDGE: Beim Bilanz/Beobachter-Abo-Kauf wird Super-Bundle als DEFAULT angezeigt.
      "Fuer nur CHF 5 mehr bekommst du auch Blick+ und cash.ch dazu"
      → Anchoring auf Gesamtwert, nicht auf Einzelpreis.

    trial_strategy: |
      ENDOWMENT EFFECT: 30 Tage kostenlos Super-Bundle fuer alle Blick+ User.
      Nach 30 Tagen: "Du hast in den letzten 30 Tagen 12 Bilanz-Artikel gelesen.
      Behalte deinen Zugang fuer nur CHF 5/Monat mehr."
      → Verlustaversion arbeitet FUER uns (User will nicht verlieren, was er hatte).

    cross_discovery_nudge: |
      Im Blick+-Feed: "Mehr dazu auf Bilanz" Widget (fuer Super-Bundle-User).
      Im Bilanz-Feed: "Aktuelle News auf Blick" Widget.
      → G2 (Cross-Discovery) wird durch UX-Design aktiviert.

  editorial_communication:
    strategy: |
      Phase 2 ist SENSITIVER als Phase 1 — Abo-Buendelung betrifft Markenwahrnehmung.
      Kommunikation an Redaktionen:
      - "Eure Reichweite VERDREIFACHT sich" (Blick+ Basis von 16k+ wird zugaenglich)
      - "Bilanz-Journalisten: Eure Artikel erreichen jetzt AUCH Blick-Leser"
      - "Kein Content-Sharing — jede Marke behalt eigene Inhalte und Redaktion"
    lever: "Lever 2 (Status Upgrade) aus PCUM Showstopper Analysis"

  risk_mitigation:
    cannibalization: |
      RISIKO: Bilanz-Standalone-Abos werden durch guenstigeres Bundle kannibalisiert.
      MITIGATION:
      - Bilanz-Standalone bleibt verfuegbar (kein Zwang)
      - Super-Bundle als UPGRADE positionieren, nicht als Ersatz
      - Bilanz-Premium-Features (CEO-Interviews, Exclusives) nur im Bilanz-Abo
    abo_churn: |
      RISIKO: Bundle-Kuendiger gehen komplett verloren (nicht nur ein Titel).
      MITIGATION:
      - Downgrade-Option: "Moechtest du nur Blick+ behalten?" (statt Voll-Kuendigung)
      - Exit-Survey: Gruende fuer Kuendigung systematisch erfassen
      - Q3 (offene Frage): Abo-Kuendigungsraten bei bisherigen Integrationen erfragen

  success_criteria:
    must_have:
      - "Super-Bundle Live mit mind. 3 Titeln"
      - "Conversion Rate: >20% der Blick+ User upgraden auf Super-Bundle (nach Trial)"
      - "Netto-Abo-Wachstum: +25% in 6 Monaten"
    nice_to_have:
      - "Bilanz-Standalone-Churn <15%"
      - "Cross-Brand-Reading: >30% der Bundle-User lesen 2+ Marken/Monat"

  go_nogo_gate:
    timing: "Ende Q2 2027"
    criteria: |
      GO fuer Phase 3 wenn ALLE DREI Bedingungen erfuellt:
      1. Cross-Discovery messbar: >25% der Bundle-User lesen cross-brand
         (= Evidenz fuer G2 Uplift)
      2. Editorial Resistance sinkt: Redaktions-Survey <4.0/7.0 auf Widerstandsindex
         (= Evidenz fuer V3 Reduktion)
      3. Identity-Wahrnehmung stabil: Brand-Search fuer Bilanz/Beobachter nicht ruecklaeufig
         (= Evidenz fuer V1 Kontrolle)

      ACHTUNG: SA-7 zeigt — ALLE DREI muessen erfuellt sein!
      Zwei von drei reichen nicht (V3-50%+G2+50% = +0.208 < S2 +0.215).

# =============================================================================
# PHASE 3: L4b — HOUSE OF BRANDS (OPTIONAL, NUR BEI DREIFACH-BEDINGUNG)
# =============================================================================

phase_3:
  name: "L4b House of Brands (User-Destination Konsolidierung)"
  priority: "PRIO 3 (optional)"
  timeline: "Fruehestens H2 2027 — abhaengig von Phase 2 Go/No-Go Gate"
  owner: "CSIO + CDO + Chefredaktion ALLER Titel"
  budget_estimate: "Hoch — Frontend-Redesign, Brand Architecture, Change Management"

  pcum_value:
    u_netto_baseline: "+0.098 (S3 ohne Optimierung)"
    u_netto_optimized: "+0.234 (S3 mit Dreifach-Bedingung)"
    u_netto_target: "+0.215 (muss S2 schlagen)"
    note: |
      Phase 3 wird NUR verfolgt wenn Phase 2 zeigt, dass die Dreifach-Bedingung
      erreichbar ist. Ohne positive Evidenz bleibt S2 die Zielkonfiguration.

  dreifach_bedingung:
    note: |
      SA-7 zeigt: S3 schlaegt S2 NUR wenn ALLE DREI Bedingungen gleichzeitig erfuellt sind.
      Zwei von drei reichen NICHT (V3-50%+G2+50% = +0.208 < S2 +0.215 = knapp LOSE).

    bedingung_1_cross_discovery:
      requirement: "+50% G2 Uplift gegenueber S3-Baseline"
      measurement: "Cross-Brand-Reading-Rate aus Phase 2"
      threshold: ">40% der Bundle-User lesen regelmaessig 2+ Marken"
      evidence_from_phase_2: "Wird in Phase 2 Go/No-Go Gate gemessen"

    bedingung_2_editorial_resistance:
      requirement: "-50% V3 Reduktion"
      measurement: "Redaktions-Widerstandsindex (Survey)"
      threshold: "<3.5/7.0 auf standardisiertem Widerstandsindex"
      evidence_from_phase_2: "Phase 2 Erfahrungen zeigen Editorial Buy-In"

    bedingung_3_identity_design:
      requirement: "-30% V1 Reduktion"
      measurement: "Brand-Search-Trends fuer Bilanz/Beobachter"
      threshold: "Brand Search stabil oder steigend"
      design: |
        L4b (House of Brands) ist das Identity-Design:
        - Marken bleiben als eigene Bereiche/Tabs sichtbar
        - Eigene URLs (bilanz.blick.ch oder blick.ch/bilanz)
        - Eigene visuelle Identitaet (Farben, Typografie)
        - Eigene Bylines und Autorenseiten

  brand_architecture_l4b:
    concept: "House of Brands auf einer Plattform"
    ux_design:
      homepage: |
        Blick-Homepage mit prominenten Zugaengen zu Marken-Bereichen:
        - Tab/Section "Bilanz" (Wirtschaft & Finanzen)
        - Tab/Section "Beobachter" (Ratgeber & Recht)
        - Tab/Section "cash.ch" (Boerse & Geld)
        - Personalisiert: User sieht seinen "Haupt-Tab" zuerst
      navigation: |
        Horizontale Navigation: Blick | Bilanz | Beobachter | cash | Sport | ...
        Jeder Tab hat eigenes Look & Feel (Farben, Layout-Variante)
        Cross-Brand-Widgets: "Mehr zum Thema auf Bilanz" (kontextuell)
      url_strategie:
        option_a: "Subdomains: bilanz.blick.ch, beobachter.blick.ch"
        option_b: "Pfade: blick.ch/bilanz, blick.ch/beobachter"
        recommendation: "Option A (Subdomains) — SEO-freundlicher, eigenstaendigere Wahrnehmung"

  change_management:
    editorial_board:
      purpose: "Gemeinsames Gremium aller Chefredaktionen"
      frequency: "Woechentlich in Uebergangsphase, monatlich im Steady State"
      mandate: |
        - Themenhoheit bleibt bei jeweiliger Marke
        - Keine zentrale Steuerung der Inhalte
        - Cross-Promotion nur bei redaktionellem Mehrwert
        - Klare Regeln fuer Homepage-Platzierung

    identity_rituals:
      purpose: "Markenidentitaet bewahren trotz gemeinsamer Plattform"
      examples:
        - "Bilanz Annual Awards (eigenes Event)"
        - "Beobachter Rechts-Hotline (eigener Service)"
        - "cash.ch Boersen-Opening (eigenes Format)"
        - "Eigene Social-Media-Kanaele pro Marke"

    success_stories_first:
      strategy: |
        SEQUENTIELL: Bilanz zuerst (kleinstes Volumen, hoechster Cross-Brand-Effekt).
        Wenn Bilanz-Team sieht: "Unsere Reichweite hat sich verfuenffacht" →
        Beobachter-Team wird offener.
        Dann: Beobachter (zweitkleinst, staerkstes SEO-Survival-Argument).
        Zuletzt: cash.ch (eigenstaendigster Habit Loop, braucht spezielle Integration).

  success_criteria:
    must_have:
      - "U_netto(S3) > U_netto(S2) = +0.215 (empirisch gemessen, nicht modelliert)"
      - "Kein Netto-Traffic-Verlust bei Integration (Summe aller Titel stabil)"
      - "Redaktionelle Fluktuation <10% in 12 Monaten"
    nice_to_have:
      - "Cross-Brand-Sessions > 20% aller Sessions"
      - "Bundle-Abo-Wachstum +50% durch L4b-Integration"

  abort_criteria:
    note: |
      Phase 3 wird ABGEBROCHEN wenn eines dieser Kriterien eintritt:
    criteria:
      - "Brand Search fuer Bilanz oder Beobachter faellt >30% (Identity zerstoert)"
      - "Redaktionelle Kuendigungswelle (>20% der Schluesselpersonen)"
      - "Traffic-Verlust >15% fuer integrierten Titel in ersten 3 Monaten"
      - "User-Satisfaction Score <3.0/5.0 fuer integrierten Bereich"

# =============================================================================
# CROSS-CUTTING: BEOBACHTER-INTEGRATION (Unabhaengig, PRIO 2)
# =============================================================================

cross_cutting_beobachter:
  name: "Beobachter-Integration als Survival-Projekt"
  priority: "PRIO 2 (parallel zu Phase 1-2)"
  timeline: "Ab Q2 2026"
  owner: "CSIO + Beobachter-Chefredaktion"

  rationale: |
    SA-2 zeigt: Beobachter ist bei 30%+ SEO-Verlust standalone nicht viable.
    53% SEO-Abhaengigkeit = existenzielle Google-AI-Bedrohung.
    ABER: Task Force Q4 zeigt — Intervention WIRKT (SEO Trend +48%!).

    Beobachter-Integration in Blick-Oekosystem ist ein SURVIVAL-Argument,
    das unabhaengig von der One-Platform-Entscheidung relevant ist.

  measures:
    - "SEO-Diversifikation fortsetzen (Brand Search 2% → 6% → Ziel 15%)"
    - "Blick-Referral ausbauen (aktuell nur Bilanz 40%, nicht Beobachter)"
    - "Direct Traffic aufbauen (aktuell nur 7%)"
    - "Newsletter/Push-Kanal etablieren"
    - "Integration in Blick+ Super-Bundle (Phase 2)"

  pcum_relevance: |
    Beobachter hat nur 10% Segment-Gewicht im Gesamt-PCUM.
    ABER: Beobachter-Survival-Argument reduziert V3 (Editorial Resistance)
    fuer das gesamte Projekt, weil es zeigt: Integration = Rettung, nicht Bedrohung.

# =============================================================================
# BEHAVIORAL KPIs (Phase-uebergreifend)
# =============================================================================

behavioral_kpis:
  note: |
    FehrAdvice-Ansatz: Nicht nur klassische KPIs (Revenue, Reichweite),
    sondern Behavioral KPIs die Verhaltensaenderung messen.
    Mapping zu PCUM-Dimensionen.

  kpis:
    habit_strength:
      definition: "Direct Traffic Anteil + Wiederkehrquote"
      maps_to: "G4 (Habit Transfer)"
      baseline: "Blick 30% Direct, cash.ch 58%"
      target_phase_0: "Blick Direct Trend-Umkehr (>-10% statt -19%)"
      target_phase_2: "Cross-Brand Returning Users >30%"

    identity_binding:
      definition: "Brand Search Volume + Newsletter Open Rate"
      maps_to: "V1 (Identity Loss) — INVERTIERT"
      baseline: "Bilanz Brand Search = niedrig, Beobachter = 6%"
      target: "Brand Search stabil oder steigend bei Integration"

    cross_discovery_rate:
      definition: "Anteil User die 2+ Marken nutzen / Monat"
      maps_to: "G2 (Cross-Discovery)"
      baseline: "Geschaetzt <10% (ausser Bilanz-Blick 40% Referral)"
      target_phase_2: ">25% (Go/No-Go fuer Phase 3)"
      target_phase_3: ">40%"

    editorial_resistance_index:
      definition: "Standardisierter Survey (1-7 Skala, 7=max. Widerstand)"
      maps_to: "V3 (Editorial Resistance)"
      baseline: "Nicht gemessen — ERSTERHEBUNG noetig!"
      target_phase_1: "<5.0/7.0 (nach Backend-Migration)"
      target_phase_2: "<4.0/7.0 (nach Abo-Bundle)"
      target_phase_3: "<3.5/7.0 (Go/No-Go Schwelle)"

    bundle_health:
      definition: "Net Revenue per User + Churn Rate"
      maps_to: "V4 (Model Incompatibility)"
      baseline: "Blick+ 16k Abos, Einzelpreis CHF 9.90"
      target: "Super-Bundle ARPU > CHF 15, Churn <5%/Monat"

# =============================================================================
# OPEN DATA REQUESTS (Fuer Patrick Rademacher)
# =============================================================================

open_data_requests:
  note: |
    Diese Datenpunkte wuerden die Modell-Qualitaet SIGNIFIKANT verbessern
    und sind fuer die Go/No-Go Gates NOTWENDIG.

  critical:
    Q2_user_overlap:
      question: "Wieviele User nutzen mehrere RMS-Titel?"
      why: "Bestimmt G2 Cross-Discovery Baseline und Uplift-Potenzial"
      data_needed: "User-Overlap-Matrix (5x5 Titel) basierend auf Cookie/Login-Daten"
      status: "OFFEN"

    Q3_abo_churn:
      question: "Was sind Kuendigungsraten bei bisherigen Integrationen?"
      why: "Bestimmt V4-Risiko bei Abo-Buendelung"
      data_needed: "Churn-Raten Blick+, historische Daten bei Preis-/Produktaenderungen"
      status: "OFFEN"

    Q6_one_id:
      question: "Wo steht das One-ID Projekt?"
      why: "Bestimmt Phase 1 Timeline und Machbarkeit"
      data_needed: "Projekt-Status, Registrierungsquoten pro Titel, SSO-Plan"
      status: "OFFEN"

  nice_to_have:
    editorial_survey:
      question: "Wie gross ist der aktuelle redaktionelle Widerstand?"
      why: "V3 Baseline-Messung fuer Go/No-Go Gates"
      data_needed: "Anonyme Umfrage bei Redaktionen (Widerstandsindex 1-7)"

    benchmark_competitors:
      question: "Wie performen 20min, SRF, NZZ YoY?"
      why: "Kalibrierung: Ist Blick -7% schlechter als Markt?"
      data_needed: "DNR 2025 oder SimilarWeb-Vergleichsdaten"

# =============================================================================
# RISIKEN UND MITIGATIONEN
# =============================================================================

risk_register:
  R1_polaris_fix_fails:
    risk: "Phase 0 bringt keine Trend-Umkehr bei True Direct"
    probability: "MITTEL"
    impact: "HOCH — Blick verliert weiterhin 6M Sessions/Monat"
    mitigation: |
      - A/B Testing statt Big-Bang-Redesign
      - Parallele Kanaele staerken (Push, Social, Newsletter)
      - Falls Direct nicht zurueckkommt: Social-First-Strategie als Plan B

  R2_editorial_revolt:
    risk: "Redaktionelle Schluesselpersonen kuendigen bei Integrations-Ankuendigung"
    probability: "MITTEL-HOCH (bei Phase 3)"
    impact: "SEHR HOCH — Content-Qualitaet sinkt, Marke leidet"
    mitigation: |
      - Sequentielles Vorgehen (Phase 1 unsichtbar, Phase 2 vorsichtig)
      - Editorial Board mit echtem Mandat (nicht nur Informationsgremium)
      - Retention-Pakete fuer Schluesselpersonen
      - Identity Preservation durch L4b Brand Architecture

  R3_bundle_cannibalization:
    risk: "Super-Bundle kannibalisiert teurere Einzel-Abos (Bilanz CHF 19 → Bundle CHF 15)"
    probability: "HOCH"
    impact: "MITTEL — kurzfristiger Umsatzrueckgang"
    mitigation: |
      - Bilanz-Premium-Features nur im Einzel-Abo (Differenzierung)
      - Trial-Strategie: Bundle als Upgrade, nicht als Ersatz
      - Kalkulierte Kannibalisierung: ARPU sinkt, aber Volumen steigt

  R4_google_ai_acceleration:
    risk: "Google AI Overviews verschaerfen sich, Beobachter verliert >30% SEO"
    probability: "MITTEL"
    impact: "HOCH fuer Beobachter, NIEDRIG fuer Gesamt-PCUM (10% Gewicht)"
    mitigation: |
      - Cross-Cutting Beobachter-Projekt (PRIO 2)
      - Content-Diversifikation (AI-resistente Formate: Tools, Rechner, Beratung)
      - Blick-Plattform als Traffic-Buffer (G5 Survival Factor)

  R5_dreifach_bedingung_unerreichbar:
    risk: "Phase 2 zeigt: Dreifach-Bedingung fuer S3 ist nicht erreichbar"
    probability: "MITTEL-HOCH"
    impact: "NIEDRIG — S2 ist ohnehin das optimale Szenario"
    mitigation: |
      Phase 3 wird einfach nicht verfolgt. S2 bleibt die Zielkonfiguration.
      Das ist kein Misserfolg, sondern rationale Entscheidung auf Basis von Evidenz.

# =============================================================================
# ZUSAMMENFASSUNG
# =============================================================================

summary:
  one_liner: |
    Polaris SOFORT fixen, L1+L2 sequentiell aufbauen, L4b nur bei Dreifach-Evidenz.

  for_csio: |
    Patrick, die Roadmap hat vier klare Phasen:

    PHASE 0 (JETZT): Polaris Habit-Fix — 74M verlorene Sessions/Jahr sind ein
    Produkt-Problem, kein Markt-Fatum. Startbar in 2 Wochen, unabhaengig von
    jeder Plattform-Entscheidung.

    PHASE 1 (Q2-Q4 2026): Backend/CMS konsolidieren — unsichtbar fuer User,
    schafft Infrastruktur fuer alles Weitere. Geringes Risiko.

    PHASE 2 (Q1-Q2 2027): Blick+ Super-Bundle — der groesste Nutzen-Hebel
    (U_netto +0.215). Behavioral Design mit Trial und Cross-Discovery.

    PHASE 3 (optional, ab H2 2027): House of Brands — NUR wenn Phase 2 zeigt,
    dass Cross-Discovery, Editorial Buy-In UND Identity Preservation funktionieren.
    Drei Go/No-Go Kriterien, alle drei muessen erfuellt sein.

    Parallel: Beobachter-Survival-Projekt (Google-Abhaengigkeit reduzieren).
