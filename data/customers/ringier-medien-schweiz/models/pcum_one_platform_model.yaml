  # ---------------------------------------------------------------------------
  # TRUST × REACH POSITIONING MAP (Modell-Output)
  # ---------------------------------------------------------------------------

  trust_reach_map:
    description: |
      Die Trust × Reach Map ist ein 2D-Output des Modells, nicht ein Input.
      X-Achse: Reach = Sessions_2025 (log-skaliert)
      Y-Achse: Trust = trust_sensitivity × identity_strength (V1-Vulnerabilitaet)

      Interpretation: Titel oben-links (hoher Trust, niedrige Reach) brauchen
      Tier I (eigene Destination schuetzt Trust). Titel unten-rechts (niedriger
      Trust, hohe Reach) koennen Tier III (Syndication) vertragen.

    positions:
      blick:         { reach_log: 8.99, trust: 0.285, tier: "PLATFORM" }
      cash:          { reach_log: 7.84, trust: 0.600, tier: "I" }
      beobachter:    { reach_log: 6.99, trust: 0.855, tier: "I" }
      bilanz:        { reach_log: 6.40, trust: 0.595, tier: "I" }
      blick_fr:      { reach_log: 7.74, trust: 0.285, tier: "PLATFORM" }
      landliebe:     { reach_log: 4.00, trust: 0.420, tier: "II" }
      pme:           { reach_log: 4.00, trust: 0.358, tier: "II" }
      gault_millau:  { reach_log: 4.00, trust: 0.765, tier: "II" }
      si:            { reach_log: 5.00, trust: 0.240, tier: "II" }
      handelszeitung:{ reach_log: 4.50, trust: 0.455, tier: "III" }
      tele:          { reach_log: 3.50, trust: 0.080, tier: "III" }
      glueckspost:   { reach_log: 3.50, trust: 0.158, tier: "III" }
      illustre:      { reach_log: 3.50, trust: 0.220, tier: "III" }

    insight: |
      Das Muster ist klar:
      - TIER I cluster oben-mitte: Hoher Trust, mittlere-hohe Reach
      - TIER II cluster links-mitte: Mittlerer Trust, niedrige Reach
      - TIER III cluster unten-links: Niedriger Trust, niedrige Reach
      - PLATFORM oben-rechts: Blick = maximale Reach

      Die Map bestaetigt: Trust ist der PRIMAERE Treiber der Tier-Entscheidung,
      nicht Reach allein. Titel mit hohem Trust MUESSEN ihre eigene Destination
      behalten (oder zumindest Branded Section), sonst wird Trust zerstoert.
