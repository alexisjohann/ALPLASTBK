# BEOBACHTER RECOVERY (NEU — State of Traffic Report)
# =============================================================================

beobachter_recovery:
  source: "State of Traffic Report, S.4-5"
  narrative: |
    Beobachter hatte Mitte 2025 eine SEO-Krise (Trend -13% YoY).
    Massnahmen:
    1. Task Force eingesetzt (Details nicht im Report)
    2. Brand Search gesteigert: 2% → 6% des Traffics
    3. Direct/Aggregators: +78% (Google Discover waechst!)
    4. Social: +56% (Facebook-driven)

    Ergebnis Q4: SEO-Trend 3m = +48% (starke Erholung!)
    Gesamt-YoY: +2% (trotz SEO-Krise positiv!)

  implications_for_pcum:
    editorial_resistance: |
      Die Task Force zeigt: GEZIELTE INTERVENTION funktioniert.
      Wenn Beobachter-Team Ergebnisse sieht (Trend-Umkehr),
      sinkt Widerstand gegen Plattform-Integration.
      → V3 (Editorial Resistance) kann durch "Proof Points" reduziert werden.
    survival_factor: |
      G5 (Survival) fuer Beobachter ist BESTAETIGT relevant:
      Ohne Intervention waere SEO weiter gefallen.
      One-Platform als "Sicherheitsnetz" (Blick-Traffic als Buffer)
      ist fuer Beobachter attraktiv.

# =============================================================================
# BILANZ CROSS-BRAND EVIDENCE (NEU — State of Traffic Report)
# =============================================================================

bilanz_cross_brand:
  source: "State of Traffic Report, S.8-9"
  key_finding: |
    40% des Bilanz-Traffics (541'732 Sessions) kommt als REFERRAL von Blick.
    Dies ist die GROESSTE Traffic-Quelle fuer Bilanz!

    Was bedeutet das fuer PCUM?
    1. Cross-Discovery (G2) existiert BEREITS im Baseline (S1)!
       G2 ist NICHT null, sondern ~0.05-0.10 im Status Quo.
    2. Die Frage wird: Wie viel MEHR G2 bringt formale Integration?
    3. Bilanz profitiert BEREITS von Blick-Anbindung ohne One-Platform.
    4. Aber: Bilanz baut gerade eigenstaendige Identitaet auf (bilanz.ch).
       Formale Integration JETZT koennte diesen Aufbau stoeren.

  model_correction_needed:
    G2_baseline_S1:
      old_value: 0.00
      new_value: 0.05
      reason: "Cross-Brand-Traffic existiert bereits (Bilanz 40% von Blick)"
    G2_marginal_S2:
      note: "Marginaler G2-Zuwachs durch Abo-Integration ist KLEINER als gedacht"
    recommendation: |
      S2 (Backend + Abo) bleibt optimal, aber der MARGINALE Nutzen
      von S3 (Full Platform) gegenueber S2 sinkt, weil G2 bereits
      teilweise im Baseline realisiert wird.

