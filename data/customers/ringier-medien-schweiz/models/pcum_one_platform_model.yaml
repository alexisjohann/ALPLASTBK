# =============================================================================
# TITLE-LEVEL EXTENSION (v5.0)
# =============================================================================
# Erweiterung: Endogene Tier-Zuweisung pro Titel
#
# MOTIVATION:
#   Das Basismodell (v4.1) evaluiert Szenarien S0-S4 auf Portfolio-Ebene.
#   Die Drei-Tier-Architektur (Tier I / II / III) im One-Pager war bisher
#   EXOGEN — behauptet, nicht aus dem Modell abgeleitet.
#
#   Diese Erweiterung macht die Tier-Zuweisung ENDOGEN:
#   Fuer jeden Titel t berechnet das Modell U(tau, t) fuer alle drei Tiers
#   und leitet den optimalen Tier ab: tau*(t) = argmax_tau U(tau, t)
#
# NEUE GLEICHUNG:
#   U(tau, t) = G(tau, t) - lambda_bar(t) * V(tau, t) - C_ops(tau, t)
#
#   WO:
#     tau ∈ {I, II, III}          Integrations-Tier
#     t ∈ {blick, cash, beo, ...} Titel
#     G(tau, t) = Sigma_d g_d(tau, t)    Summe ueber 6 Gain-Dimensionen
#     V(tau, t) = Sigma_d v_d(tau, t)    Summe ueber 4 Loss-Dimensionen
#     lambda_bar(t) = gewichtete Verlustaversion des Titel-Publikums
#     C_ops(tau, t) = Operational Cost (Destination-Betrieb, Redaktion)
#
#   GAIN/LOSS pro Dimension:
#     g_d(tau, t) = tier_gain_multiplier(tau, d) * title_characteristic(t, d)
#     v_d(tau, t) = tier_loss_multiplier(tau, d) * title_vulnerability(t, d)
#
# THEORETISCHE FUNDIERUNG:
#   - Prospect Theory: lambda_bar(t) variiert mit Titel-Publikum
#   - Identity Economics: V1 haengt von trust_sensitivity(t) ab
#   - Habit Formation: G4 haengt von habit_strength(t) ab
#   - Trust-Context-Theory: V1 × G6 Interaktion (Appendix V Trust-Dampening)
#
# =============================================================================

