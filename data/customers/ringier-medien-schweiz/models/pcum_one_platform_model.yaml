      separate Destination besuchen = Friction. Beobachter-Rechtsberatung
      wird im Blick+ Premium Bundle beworben, bleibt aber auf beobachter.ch.

  S3:
    G1_tech: {s1: 0.15, s2: 0.15, s3: 0.15, s4: 0.10, s5: 0.15}
    G2_cross: {s1: 0.25, s2: 0.30, s3: 0.20, s4: 0.15, s5: 0.25}
    G3_data: {s1: 0.20, s2: 0.20, s3: 0.20, s4: 0.15, s5: 0.20}
    G4_habit: {s1: 0.15, s2: 0.10, s3: 0.10, s4: 0.05, s5: 0.15}
    G5_survival: {s1: 0.00, s2: 0.05, s3: 0.25, s4: 0.00, s5: 0.00}
    G6_growth: {s1: 0.12, s2: 0.15, s3: 0.12, s4: 0.08, s5: 0.10}
    note: "G5 Beobachter (s3): +0.25 Survival, weil 53% SEO-Abhaengigkeit durch Blick-Plattform abgefedert"
    note_g6: |
      G6 v4.0 ORIGINAL: {s3: 0.20, s5: 0.15} — basierend auf Patricks Belief (B1).
      G6 v4.1 KORRIGIERT: {s3: 0.12, s5: 0.10} — nach EBF Trust-Dampening-Analyse.

      KORREKTUR-BEGRUENDUNG (3 Faktoren):
      1. Trust-Context-Multiplier (Psi_I): Conversion(Service) = Reach × Salience × Trust.
         Rechtsberatung auf beobachter.ch: Trust = 0.90. Auf blick.ch: Trust ≈ 0.45.
         → s3 reduziert von 0.20 auf 0.12 (Trust-Dampening ca. -40%).
         EVIDENZ: Blick Marketing-Reporting Q2/2025 (YouGov SMBO, n=3827-6243):
         blick.ch (D) Glaubwuerdigkeit = 13%, srf.ch = 69%, 20min.ch = 26%.
         Trust ≈ 0.45 ist damit konservativ — normalisiert waere 13/69 ≈ 0.19.
         Unser Parameter ist GROSSZUEGIG fuer Blick, nicht zu streng.
      2. Lebensphasen-Problem: Beobachter-Kernservices (Mietrecht, Scheidung, Erbschaft)
         adressieren Lebensphasen ab ~30+. Junge Zielgruppen (18-25) haben wenig Bedarf.
         → s5 reduziert von 0.15 auf 0.10.
         EVIDENZ: Blick SMBO Q2/25: Juengere nutzen blick.ch unterdurchschnittlich,
         nur 10% sagen blick.ch passt zu ihnen. Image bei Juengeren negativ.
      3. Belief B1 Differenzierung: Services = Conversion-Driver (korrekt),
         NICHT Acquisition-Driver (Patricks Annahme). Neukunden kommen ueber Content,
         Services monetarisieren sie. Zero-Friction Discovery ist deshalb weniger wert
         als reine Reichweiten-Multiplikation suggeriert.

  S4:
    G1_tech: {s1: 0.20, s2: 0.20, s3: 0.20, s4: 0.15, s5: 0.20}
    G2_cross: {s1: 0.30, s2: 0.25, s3: 0.15, s4: 0.10, s5: 0.30}
    G3_data: {s1: 0.25, s2: 0.25, s3: 0.25, s4: 0.20, s5: 0.25}
    G4_habit: {s1: 0.20, s2: 0.10, s3: 0.05, s4: 0.05, s5: 0.20}
    G5_survival: {s1: 0.00, s2: 0.05, s3: 0.20, s4: 0.00, s5: 0.00}
    G6_growth: {s1: 0.08, s2: 0.10, s3: 0.12, s4: 0.04, s5: 0.12}
    note_g6: |
      G6 GEDAEMPFT: Services auf Blick-Plattform, aber Marken verschwinden.
      "Blick Rechtsberatung" statt "Beobachter Rechtsberatung" = Vertrauens-Defizit.
      s3: 0.12 statt 0.20 (S3) weil Brand-Trust als Credibility-Signal fehlt.
      Junge User (s5) weniger betroffen: 0.12 (Marke weniger wichtig fuer digital natives).

