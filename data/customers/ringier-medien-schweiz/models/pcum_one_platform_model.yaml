# =============================================================================

results_q1:
  header: "U_netto pro Szenario (segment-gewichteter Durchschnitt)"

  scenario_results:
    S1:
      u_netto: 0.115
      interpretation: "Positiv, aber kleiner Effekt. Reine Tech-Konsolidierung."

    S2:
      u_netto: 0.206
      interpretation: |
        HOECHSTER NETTO-NUTZEN. Backend + Abo-Buendelung bieten
        substanzielle Gains bei moderaten Identity-Losses.
        Empfehlung: S2 als Basis-Szenario.

    S3:
      u_netto: 0.098
      interpretation: |
        Positiv, aber tiefer als S2. Cross-Discovery-Gains werden
        durch Identity-Losses und Editorial Resistance aufgefressen.
        NUR mit L4b (House of Brands) noch positiv.

    S4:
      u_netto: -0.12
      interpretation: |
        NEGATIV! Monobrand (alles unter Blick) vernichtet Wert.
        Identity-Losses fuer Wirtschafts- und Service-Segmente
        ueberwiegen massiv. NICHT EMPFOHLEN.

  ranking: ["S2 (+0.206)", "S1 (+0.115)", "S3 (+0.098)", "S4 (-0.12)"]

  recommendation_q1: |
    S2 (Backend + Abo) ist das optimale Szenario.
    S3 (volle Plattform) ist nur als L4b (House of Brands) positiv.
    S4 (Monobrand) ist wertvernichtend.

# =============================================================================
# ERGEBNISSE (Frage 2: Markenarchitektur bei L4)
# =============================================================================

results_q2:
  header: "Falls L4 verfolgt wird: Welche Markenarchitektur?"

  variants:
    L4a_monobrand:
      u_netto: -0.12
      identity_loss: "MAXIMAL"
      editorial_resistance: "MAXIMAL"
      recommendation: "NICHT EMPFOHLEN"
      reason: |
        Bilanz-/Beobachter-User verlieren Markenidentitaet.
        Journalisten beider Marken werden massiv widerstaendig.
        Kein internationales Vorbild fuer erfolgreichen Monobrand.

    L4b_house_of_brands:
      u_netto: 0.14
      identity_loss: "MODERAT"
      editorial_resistance: "MITTEL"
      recommendation: "BESTE L4-VARIANTE"
      reason: |
        Marken bleiben sichtbar (Tabs/Sections auf einer Plattform).
        User koennen "ihren" Bereich finden.
        Journalisten behalten Markenidentitaet (partiell).

    L4c_endorsed_brands:
      u_netto: 0.08
      identity_loss: "MITTEL-HOCH"
      editorial_resistance: "HOCH"
      recommendation: "SUBOPTIMAL"
      reason: |
        "Bilanz by Blick" verwischt Marken-Hierarchie.
        Fuer Premium-Marken (Bilanz) ist "by Blick" IMAGE-SCHAEDLICH.
        Blick-Boulevard-Image kontaminiert Premium-Positionierung.

  recommendation_q2: |
    L4b (House of Brands) ist die einzige L4-Variante mit positivem Netto-Nutzen.
    Aber: S2 (ohne L4) hat hoeheren Netto-Nutzen als S3 mit L4b.
    L4 lohnt sich nur, wenn die Gains durch Cross-Discovery
    und Habit-Transfer hoeher ausfallen als hier geschaetzt.

# =============================================================================
# TRAFFIC-KORREKTUREN (Version 2.0)
# =============================================================================

traffic_corrections:
  - correction: "cash.ch vs Blick Direct Traffic"
    original_claim: "cash.ch ist Habit-Champion (58% Direct)"
    corrected_view: |
      PROZENTUAL hat cash.ch den staerksten Habit Loop (58%).
      VOLUMETRISCH dominiert Blick mit 290M Direct Sessions
      vs. cash.ch 41M (7x mehr). Blick ist der absolute Habit-Champion.
      ABER: cash.ch zeigt, dass Utility-Content (Boersenkurse)
      staerkere Habits bildet als News-Content allein.
    implication: "One-Platform braucht Utility-Elemente (Portfolio-Tracker, Rechts-Tool)"

  - correction: "Beobachter Geschaeftsmodell"
    original_claim: "Beobachter hat einzigartiges Membership-Modell"
    corrected_view: |
      Beobachter ist ein PREMIUM-ABO-MODELL, gleich wie Bilanz.
      120k Abonnenten gesamt, 6k digital. KEIN Membership mit
      Rechtsberatung als USP. V4 (Model-Incompatibility) reduziert
      von 0.40-0.45 auf 0.10-0.15.
    implication: "Beobachter und Bilanz haben gleiches Geschaeftsmodell — vereinfacht Integration"

  - correction: "Titel ohne digitale Destination"
    original_assumption: "Alle 12+ RMS-Titel sind Entscheidungsvariablen"
    corrected_view: |
      STRATEGISCHER ENTSCHEID (RMS): HZ, SI, Landliebe, Glueckspost,
      Tele, L'Illustre, PME haben KEINE eigene digitale Destination mehr.
      One-Platform betrifft nur 5 Titel: Blick, Blick FR, cash.ch, Bilanz, Beobachter.
    implication: "Modell vereinfacht sich erheblich. Nur 5 Marken in der Entscheidungsmatrix."

# =============================================================================
# ZWEI NUTZUNGSMUSTER
# =============================================================================

usage_patterns:
  pattern_a_habit:
    brands: ["Blick", "Blick FR", "cash.ch"]
    characteristics:
      - "Hoher Direct Traffic (20-58%)"
      - "Taegliche Nutzung"
      - "Homepage-Einstieg"
      - "User kommen GEWOHNHEITSMAESSIG"
    implication: "Habit-Plattform-Design: Homepage, Push, Personalisierung"

  pattern_b_intent:
    brands: ["Beobachter", "Bilanz"]
    characteristics:
      - "Hoher SEO/Aggregator-Anteil (21-53%)"
      - "Anlassbezogene Nutzung"
      - "Artikelseiten-Einstieg"
      - "User kommen mit SPEZIFISCHER ABSICHT via Google"
    implication: "Intent-Plattform-Design: SEO, Suchdestination, spezifische Loesungen"

  platform_requirement: |
    One-Platform muss BEIDE Patterns bedienen koennen.
    Eine reine Habit-Plattform (Blick-Style) wuerde Intent-User verlieren.
    Eine reine Intent-Plattform wuerde Habit-User langweilen.

# =============================================================================
# SHOWSTOPPER: REDAKTIONELLER WIDERSTAND
# =============================================================================

showstopper_editorial_resistance:
  severity: "HOECHSTE PRIORITAET (bestaetigt durch RMS)"
  mechanism: "Identity Economics (Akerlof & Kranton 2000)"

  three_mechanisms:
    identity_loss:
      description: |
        "Ich bin Bilanz-Journalist:in" → "Ich bin... Content-Lieferant:in fuer Blick?"
        Je staerker die Markenidentifikation, desto staerker der Widerstand.
      affected_brands: ["Bilanz", "Beobachter", "Handelszeitung"]
      severity: "HOCH"

    status_loss:
      description: |
        Bilanz-Journalist:in schreibt fuer Premium-Leser:innen (CEO, CFO).
        Blick-Plattform = Statusverlust in der Peer Group.
        "Was sagen meine Quellen, wenn ich bei Blick bin?"
      affected_brands: ["Bilanz", "Handelszeitung"]
      severity: "HOCH"

    autonomy_threat:
      description: |
        Eigene Marke = eigene Agenda, eigene Themenhoheit.
        One-Platform = zentrale Steuerung, Klick-Optimierung?
        "Wer bestimmt, was auf der Homepage steht?"
      affected_brands: ["alle"]
      severity: "MITTEL-HOCH"

  three_levers:
    lever_1_identity_preservation:
      strategy: "L4b: Marken bleiben sichtbar auf der Plattform"
      mechanism: "Identitaet wird nicht ausgeloescht, sondern eingebettet"
      expected_effect: "Reduziert Widerstand um ~30-40%"

    lever_2_status_upgrade:
      strategy: "Zeigen: 'Eure Reichweite verdreifacht sich'"
      mechanism: "Blick-Plattform als Reichweiten-Multiplikator, nicht Identitaets-Killer"
      expected_effect: "Konvertiert Widerstand in Ambivalenz bei ~20% der Journalisten"

    lever_3_sequential_approach:
      strategy: "Proof Points vor voller Integration"
      mechanism: |
        Phase 1: Backend-Konsolidierung (unsichtbar fuer User)
        Phase 2: Abo-Integration (Blick+ als Super-Bundle)
        Phase 3: Nur bei Erfolg und Akzeptanz: User-Destination
      expected_effect: "Reduziert Widerstand durch positive Erfahrung"

# =============================================================================
# BLICK -7% ANALYSE
# =============================================================================

blick_erosion_analysis:
  fact: "Blick -7% YoY bei 966M Sessions = ~74M Sessions weniger"
  context: "Das ist mehr als das gesamte Beobachter-Volumen (9.7M)"

  five_hypotheses:
    H1_market_effect:
      description: "Gesamter CH-Medienmarkt schrumpft (foeg 2035 Szenarien)"
      probability: "HOCH"
      test: "Vergleich 20min, SRF, NZZ YoY"
      note: "Wenn alle -5 bis -10%: Markteffekt, nicht Blick-spezifisch"

    H2_google_ai:
      description: "Google AI Overviews / SGE fangen News-Traffic ab"
      probability: "MITTEL-HOCH"
      test: "SEO-Traffic isoliert betrachten (ist der -7% ueberproportional SEO?)"
      note: "Blick hat 35% SEO — wenn AI Overviews 10-20% davon abfaengt = -3 bis -7%"

    H3_social_substitution:
      description: "User konsumieren News auf TikTok/Instagram statt Blick"
      probability: "MITTEL"
      test: "Social Referral analysieren, Altersstruktur"
      note: "Blick Social nur 7% — aber ZUGANG koennte ueber Social passieren ohne Klick"

    H4_measurement:
      description: "Cookie-Consent, Tracking-Aenderungen veraendern Messung"
      probability: "MITTEL"
      test: "Methodik-Wechsel 2024/2025 pruefen"
      note: "Consent-Banner und ITP koennen Sessions unterschaetzen"

    H5_editorial:
      description: "Content-/Redaktionsstrategie-Wechsel (nach Buchli-Abgang)"
      probability: "NIEDRIG-MITTEL"
      test: "Content-Mix 2024 vs 2025 vergleichen"
      note: "Buchli ging April 2025, COO-Rolle aufgeloest — moeglicherweise strategischer Shift"

  strategic_priority: |
    Blick-Erosion stoppen hat HOECHSTE DRINGLICHKEIT.
    -7% bei 966M Sessions = 74M Sessions weniger = mehr als das gesamte
    Beobachter-Volumen. Egal wie gut One-Platform laeuft — wenn Blick
    weiter erodiert, erodiert die ganze Plattform.

