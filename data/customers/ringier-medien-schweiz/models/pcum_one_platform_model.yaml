traffic_corrections:
  - correction: "cash.ch vs Blick Direct Traffic"
    original_claim: "cash.ch ist Habit-Champion (58% Direct)"
    corrected_view: |
      PROZENTUAL hat cash.ch den staerksten Habit Loop (58%).
      VOLUMETRISCH dominiert Blick mit 290M Direct Sessions
      vs. cash.ch 41M (7x mehr). Blick ist der absolute Habit-Champion.
      ABER: cash.ch zeigt, dass Utility-Content (Boersenkurse)
      staerkere Habits bildet als News-Content allein.
    implication: "One-Platform braucht Utility-Elemente (Portfolio-Tracker, Rechts-Tool)"

  - correction: "Beobachter Geschaeftsmodell"
    original_claim: "Beobachter hat einzigartiges Membership-Modell"
    corrected_view: |
      Beobachter ist ein PREMIUM-ABO-MODELL, gleich wie Bilanz.
      120k Abonnenten gesamt, 6k digital. KEIN Membership mit
      Rechtsberatung als USP. V4 (Model-Incompatibility) reduziert
      von 0.40-0.45 auf 0.10-0.15.
    implication: "Beobachter und Bilanz haben gleiches Geschaeftsmodell — vereinfacht Integration"

  - correction: "Titel ohne digitale Destination"
    original_assumption: "Alle 12+ RMS-Titel sind Entscheidungsvariablen"
    corrected_view: |
      STRATEGISCHER ENTSCHEID (RMS): HZ, SI, Landliebe, Glueckspost,
      Tele, L'Illustre, PME haben KEINE eigene digitale Destination mehr.
      One-Platform betrifft nur 5 Titel: Blick, Blick FR, cash.ch, Bilanz, Beobachter.
    implication: "Modell vereinfacht sich erheblich. Nur 5 Marken in der Entscheidungsmatrix."

