fehadvice_strategy_context:
  source: "20250320_RMS Strategy Process.pdf (FehrAdvice Deck, Maerz 2025)"
  strategy_levels:
    - level: "Unternehmensstrategie"
      scope: "Ringier AG"
    - level: "Portfoliostrategie"
      scope: "Welche Marken/Geschaeftsfelder?"
    - level: "Bereichsstrategie"
      scope: "RMS als Bereich"
    - level: "Markenstrategie"
      scope: "Pro Marke (Blick, Bilanz, etc.)"
  why_strategies_fail:
    - "Kognitiv statt verhaltensoekonomisch"
    - "Abstrakt statt operativ"
    - "Psychologischen Widerstand unterschaetzt"
  six_meta_questions:
    MQ1: "Wie kann das Kerngeschaeft (Medien) gestaerkt werden?"
    MQ2: "Sollen neue Zielgruppen erschlossen werden? Wenn ja, welche und wie?"
    MQ3: "Welche neuen Geschaeftsmodelle sind zu entwickeln?"
    MQ4: "Welche Rolle soll KI spielen?"
    MQ5: "Wie soll die Organisationsstruktur angepasst werden?"
    MQ6: "Welche Investitionen/Desinvestitionen?"
  behavioral_kpis_concept: |
    FehrAdvice Ansatz: Nicht nur klassische KPIs (Reichweite, Revenue),
    sondern Behavioral KPIs messen:
    - Habit-Staerke (Direct Traffic, Wiederkehrquote)
    - Identity-Bindung (Brand Search, Newsletter-Open-Rate)
    - Widerstandsindex (Redaktions-Surveys, Fluktuation)
    → PCUM-Dimensionen G4 (Habit) und V1 (Identity) sind bereits Behavioral KPIs!
  mapping_to_pcum: |
    MQ1 (Kerngeschaeft) → PCUM Frage 1 (Konsolidierungsebene)
    MQ2 (Zielgruppen)   → PCUM Segmente s1-s5
    MQ3 (Geschaeftsmodelle) → PCUM V4 (Model Incompatibility)
    MQ5 (Organisation)  → PCUM V3 (Editorial Resistance)
    "Why strategies fail: Psychologischer Widerstand" → PCUM Showstopper Analysis

