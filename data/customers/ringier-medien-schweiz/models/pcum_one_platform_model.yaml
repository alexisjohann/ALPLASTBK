# =============================================================================
# USER-SEGMENTE MIT LOSS AVERSION
# =============================================================================

segments:
  - id: "s1"
    name: "News (Blick)"
    weight: 0.55
    lambda: 1.80
    note: "Niedrige Verlustaversion — geringes Investment"
  - id: "s2"
    name: "Wirtschaft (HZ/Bilanz/cash)"
    weight: 0.15
    lambda: 2.40
    note: "Hohe Verlustaversion — schuetzen Informationsvorsprung"
  - id: "s3"
    name: "Service (Beobachter)"
    weight: 0.10
    lambda: 2.80
    note: "Sehr hoch — kommen mit konkretem Problem, hohe Stakes"
  - id: "s4"
    name: "Lifestyle"
    weight: 0.15
    lambda: 2.20
    note: "Mittel-hoch — Print-Gewohnheit"
  - id: "s5"
    name: "Young Digital"
    weight: 0.05
    lambda: 1.50
    note: "Niedrig — geringes Commitment, plattform-agnostisch"

# =============================================================================
# SZENARIEN (FRAGE 1: Konsolidierungsebene)
# =============================================================================

scenarios:
  S1:
    name: "Nur L1 (Backend)"
    levels: ["L1"]
    description: "Technische Konsolidierung, alles andere bleibt separat"

  S2:
    name: "L1 + L2 (Backend + Abo)"
    levels: ["L1", "L2"]
    description: "Tech-Konsolidierung + ein uebergreifendes Abo-Buendel"

  S3:
    name: "L1 + L2 + L4b (Full Platform, House of Brands)"
    levels: ["L1", "L2", "L4b"]
    description: "Volle Konsolidierung inkl. User-Destination, Marken bleiben"

  S4:
    name: "L1 + L2 + L4a (Full Platform, Monobrand)"
    levels: ["L1", "L2", "L4a"]
    description: "Alles unter Blick — andere Marken verschwinden"

