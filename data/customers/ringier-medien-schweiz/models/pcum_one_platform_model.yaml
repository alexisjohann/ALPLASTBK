results_q1:
  header: "U_netto pro Szenario (segment-gewichteter Durchschnitt)"

  scenario_results:
    S1:
      u_netto_retention: 0.136  # v3.0: Nur G1-G5 (Retention-Perspektive)
      u_netto_with_growth: 0.142  # v4.0: G1-G6 inkl. Growth
      interpretation: |
        Positiv. Reine Tech-Konsolidierung mit existierender Cross-Discovery.
        v3.0: G2 Baseline-Korrektur: Bilanz 40% Referral von Blick.
        v4.0: G6 minimal (+0.006) — Backend allein erschliesst keine neuen Zielgruppen.

    S2:
      u_netto_retention: 0.215  # v3.0: Nur G1-G5
      u_netto_with_growth: 0.264  # v4.0: G1-G6 inkl. Growth (+0.049)
      interpretation: |
        HOECHSTER NETTO-NUTZEN (beide Perspektiven).
        v3.0: Backend + Abo-Buendelung = substanzielle Gains bei moderaten Losses.
        v4.0: G6 moderat (+0.049) — Bundle schafft Awareness fuer Services,
        aber Friction bleibt (Services auf separaten Destinations).
        EMPFEHLUNG: S2 als Basis-Szenario.

    S3:
      u_netto_retention: 0.098  # v3.0: Nur G1-G5
      u_netto_with_growth: 0.216  # v4.1: G1-G6 inkl. Growth, Trust-Dampening korrigiert
      interpretation: |
        v3.0 (Retention): Positiv aber tiefer als S2. Platz 3.
        v4.0 (mit Growth, original): 0.226 — basierend auf Patricks unveraendertem Belief.
        v4.1 (mit Growth, korrigiert): 0.216 — nach Trust-Dampening-Korrektur.
        Gap zu S2: 0.048 (v4.1) statt 0.038 (v4.0).
        Korrektur: s3 (Service/Beo) 0.20→0.12 (Trust-Dampening auf Boulevard-Domain),
        s5 (Young Digital) 0.15→0.10 (Lebensphasen-Problem).
        G6 bleibt groesster Einzeleffekt (+0.118 statt +0.128).
        → S3 attraktiver mit Growth, aber Gap zu S2 ROBUSTER als v4.0 suggerierte.

    S4:
      u_netto_retention: -0.118  # v3.0: Nur G1-G5
      u_netto_with_growth: -0.035  # v4.0: G1-G6 inkl. Growth (+0.083)
      interpretation: |
        Immer noch NEGATIV — auch mit Growth. Monobrand zerstoert
        Markenvertrauen, was den Growth-Effekt ueberwiegt.
        Aber: Viel weniger negativ als in v3.0 (-0.035 statt -0.118).
        NICHT EMPFOHLEN — S3 (House of Brands) liefert Growth ohne Brand-Zerstoerung.

  ranking_retention: ["S2 (+0.215)", "S1 (+0.136)", "S3 (+0.098)", "S4 (-0.118)"]
  ranking_with_growth: ["S2 (+0.264)", "S3 (+0.216)", "S1 (+0.142)", "S4 (-0.035)"]
  ranking_note: |
    v4.0 → v4.1: Trust-Dampening-Korrektur angewendet.
    S3 BLEIBT auf Platz 2, aber Gap wird ROBUSTER:
    Gap S2-S3: 0.117 (Retention) → 0.048 (mit Growth, v4.1) [war 0.038 in v4.0].
    Ranking-Wechsel S1↔S3 bleibt: S3 vor S1 wenn Growth einbezogen wird.
    Korrektur-Grund: Belief B1 nur TEILWEISE KORREKT (Trust-Dampening + Lebensphasen).

  recommendation_q1: |
    S2 (Backend + Abo) bleibt das optimale Szenario — BEIDE Perspektiven.

    v3.0 (Retention): S2 gewinnt KLAR (Gap 0.117 zu S3).
    v4.0 (mit Growth, original): S2 gewinnt KNAPP (Gap 0.038 zu S3).
    v4.1 (mit Growth, Trust-Dampening): S2 gewinnt SOLIDE (Gap 0.048 zu S3).

    BELIEF-REVISION (v4.1): Patricks Belief B1 ("Services = Wachstumstreiber")
    ist TEILWEISE KORREKT:
    - B1a (Services = hoehe WTP): KORREKT ✓
    - B1b (Services = Neukundengewinnung): PROBLEMATISCH — Services sind
      Conversion-Driver, nicht Acquisition-Driver. Neukunden kommen ueber Content.
    - B1c (Services brauchen max. Reichweite): ZU EINFACH — Trust-Context-
      Multiplier (Psi_I) daempft Conversion auf Boulevard-Domain.

    STRATEGISCHE IMPLIKATION: Sequentieller Ansatz (GESTAERKT durch v4.1)
    Phase 1: S2 (Dual Presence + Bundle) — sofort, Retention gesichert
    Phase 2: Service-Discovery messen (Blick-User → Beo-Services Conversion)
    Phase 3: Falls Growth-Evidenz stark UND Trust-Problem loesbar → S3

    KRITISCHER PARAMETER: Bei G6 × 1.70 wird S3 = S2 (Trust-Dampening korrigiert).
    D.h. Growth muesste ~70% wichtiger sein als konservativ geschaetzt → S3 gewinnt.
    (v4.0 war optimistischer: G6 × 1.48 = ~50% wichtiger)

# =============================================================================
# ERGEBNISSE (Frage 2: Markenarchitektur bei L4)
# =============================================================================

results_q2:
  header: "Falls L4 verfolgt wird: Welche Markenarchitektur?"

  variants:
    L4a_monobrand:
      u_netto: -0.12
      identity_loss: "MAXIMAL"
      editorial_resistance: "MAXIMAL"
      recommendation: "NICHT EMPFOHLEN"
      reason: |
        Bilanz-/Beobachter-User verlieren Markenidentitaet.
        Journalisten beider Marken werden massiv widerstaendig.
        Kein internationales Vorbild fuer erfolgreichen Monobrand.

    L4b_house_of_brands:
      u_netto: 0.14
      identity_loss: "MODERAT"
      editorial_resistance: "MITTEL"
      recommendation: "BESTE L4-VARIANTE"
      reason: |
        Marken bleiben sichtbar (Tabs/Sections auf einer Plattform).
        User koennen "ihren" Bereich finden.
        Journalisten behalten Markenidentitaet (partiell).

    L4c_endorsed_brands:
      u_netto: 0.08
      identity_loss: "MITTEL-HOCH"
      editorial_resistance: "HOCH"
      recommendation: "SUBOPTIMAL"
      reason: |
        "Bilanz by Blick" verwischt Marken-Hierarchie.
        Fuer Premium-Marken (Bilanz) ist "by Blick" IMAGE-SCHAEDLICH.
        Blick-Boulevard-Image kontaminiert Premium-Positionierung.

  recommendation_q2: |
    L4b (House of Brands) ist die einzige L4-Variante mit positivem Netto-Nutzen.
    Aber: S2 (ohne L4) hat hoeheren Netto-Nutzen als S3 mit L4b.
    v3.0: L4 lohnt sich NUR wenn ALLE DREI Bedingungen erfuellt sind:
    1. Cross-Discovery +50% Uplift (G2)
    2. Editorial Resistance -50% (V3)
    3. Identity Loss -30% (V1)
    Zwei von drei reichen nicht — SA-7 zeigt: V3-50%+G2+50% = +0.208 < S2 +0.215.

