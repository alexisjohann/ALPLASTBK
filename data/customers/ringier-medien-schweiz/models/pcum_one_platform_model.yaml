      lambda_bar: 1.80
      destination_maturity: 0.05
      operational_cost_own: 0.25

  # ---------------------------------------------------------------------------
  # TIER-DEFINITIONEN
  # ---------------------------------------------------------------------------
  # Drei Integrationstiers mit unterschiedlichen Gain/Loss-Profilen.
  # Basiert auf der bestehenden Konsolidierungslogik (L1-L4):
  #   Tier I  = L4b-Modus: Branded Section auf Blick + eigene Destination
  #   Tier II = L4b-Light:  Branded Section auf Blick, keine eigene Destination
  #   Tier III = L3-Nathan: Article-Syndication (Nathan-Logik), kein Branding
  # ---------------------------------------------------------------------------

  tier_definitions:

    tier_I:
      name: "Branded Section + eigene Destination"
      description: |
        Titel behaelt eigene digitale Destination (z.B. cash.ch, beobachter.ch)
        UND erhaelt Branded Section auf der One-Platform (Blick).
        Dual Presence: Maximale Gains, aber auch hoechste Kosten.
      consolidation_level: "L4b (House of Brands) + L2 (eigene Destination)"
      # Gain-Multiplikatoren: Wie stark profitiert ein Titel von Gains in diesem Tier?
      gain_multipliers:
        G1_tech: 0.60          # Teilweise Tech-Synergien (CMS geteilt, aber eigene Domain)
        G2_cross: 1.00         # Volle Cross-Discovery (Branded Section + Referral)
        G3_data: 0.80          # Data-Synergien ueber OneLog, aber getrennte Domains
        G4_habit: 0.90         # Habit bleibt auf eigener Destination erhalten
        G5_survival: 0.70      # Platform schuetzt, aber eigene Destination = eigenes Risiko
        G6_growth: 0.85        # Blick-Reichweite + eigene Conversion-Destination
      # Loss-Multiplikatoren: Wie stark trifft der Loss in diesem Tier?
      loss_multipliers:
        V1_identity: 0.20      # Minimaler Identity Loss (eigene Destination bleibt!)
        V2_cognitive: 0.30     # Etwas Verwirrung (zwei Touchpoints), aber handhabbar
        V3_editorial: 0.40     # Moderate Resistance (Redaktion behaelt Destination)
        V4_model: 0.25         # Geschaeftsmodell bleibt auf eigener Destination
      # Operational Cost
      operational_cost:
        base: 0.20             # Kosten fuer eigene Destination
        note: "Skaliert mit destination_maturity(t) — reife Destinationen kosten weniger relativ"

    tier_II:
      name: "Branded Section only"
      description: |
        Titel erhaelt Branded Section auf der One-Platform (Blick),
        aber KEINE eigene Destination mehr. Content lebt ausschliesslich
        auf der Plattform, unter eigener Marke.
      consolidation_level: "L4b (House of Brands)"
      gain_multipliers:
        G1_tech: 0.90          # Hohe Tech-Synergien (kein eigenes CMS noetig)
        G2_cross: 0.90         # Cross-Discovery fast maximal (eine Plattform)
        G3_data: 0.95          # Nahezu vollstaendige Daten-Konsolidierung
        G4_habit: 0.40         # Habit-Loss — Leser:innen muessen neuen Weg lernen
        G5_survival: 0.90      # Maximaler Platform-Schutz
        G6_growth: 0.90        # Volle Blick-Reichweite als Hebel
      loss_multipliers:
        V1_identity: 0.60      # Moderater Identity Loss (Branded Section, aber keine Destination)
        V2_cognitive: 0.50     # Mehr Verwirrung (Content auf Blick-Domain)
        V3_editorial: 0.70     # Hoehere Resistance (Redaktion verliert "Haus")
        V4_model: 0.60         # Geschaeftsmodell muss angepasst werden (Abo auf Blick?)
      operational_cost:
        base: 0.05             # Keine eigene Destination, nur Content-Produktion
        note: "Deutlich guenstiger — aber Abhaengigkeit von Plattform"

    tier_III:
      name: "Nathan-Logik (Article Syndication)"
      description: |
        Titel liefert Artikel an die One-Platform (Blick) per Syndication.
        Kein eigenes Branding auf der Plattform. Artikel erscheinen als
        Blick-Content oder mit minimaler Quellenangabe.
        Nathan = Content-as-a-Service-Modell.
      consolidation_level: "L3 (Content-Sharing)"
      gain_multipliers:
        G1_tech: 0.95          # Maximale Tech-Effizienz (nur API-Anbindung)
        G2_cross: 0.30         # Minimale Cross-Discovery (kein Branding)
        G3_data: 0.95          # Volle Daten-Integration
        G4_habit: 0.10         # Habit komplett zerstoert (Marke verschwindet)
        G5_survival: 0.95      # Maximaler Schutz (kein eigenes Risiko mehr)
        G6_growth: 0.40        # Reichweite ja, aber ohne Marke = kein Conversion-Funnel
      loss_multipliers:
        V1_identity: 0.95      # Nahezu totaler Identity Loss (Marke verschwindet)
        V2_cognitive: 0.20     # Kein Confusion (nur eine Marke: Blick)
        V3_editorial: 0.95     # Maximale Resistance (Redaktion verliert alles)
        V4_model: 0.90         # Geschaeftsmodell wird komplett abhaengig
      operational_cost:
        base: 0.02             # Minimal — nur Content liefern
        note: "Guenstigste Option, aber maximale Abhaengigkeit"

  # ---------------------------------------------------------------------------
  # UTILITY-BERECHNUNG PRO TITEL × TIER
  # ---------------------------------------------------------------------------
  #
  # U(tau, t) = G_total(tau, t) - lambda_bar(t) * V_total(tau, t) - C_ops(tau, t)
  #
  # G_total(tau, t) = Sigma_d  tier_gain_mult(tau, d) * title_char(t, d)
  # V_total(tau, t) = Sigma_d  tier_loss_mult(tau, d) * title_vuln(t, d)
  # C_ops(tau, t)   = tier_ops_base(tau) * (1 - destination_maturity(t))
  #                   → reife Destinationen haben NIEDRIGERE Zusatzkosten
  #                   → unreife Destinations: Kosten hoch relativ zu Nutzen
  #
  # MAPPING title_char → gain_dimensions:
  #   G1 ← tech_efficiency
  #   G2 ← cross_discovery_potential
  #   G3 ← data_richness
  #   G4 ← habit_strength
  #   G5 ← (1 - destination_maturity)  [je schwaechere Destination, desto mehr Survival-Wert]
  #   G6 ← growth_potential
  #
  # MAPPING title_vuln → loss_dimensions:
  #   V1 ← trust_sensitivity * identity_strength
  #   V2 ← (1 - content_uniqueness)  [je generischer, desto mehr Cognitive Overload]
  #   V3 ← editorial_autonomy
  #   V4 ← model_specificity
  # ---------------------------------------------------------------------------

  # ---------------------------------------------------------------------------
  # C_ops SKALIERUNG (Traffic-Feasibility)
  # ---------------------------------------------------------------------------
  # Eine Destination kostet unabhaengig vom Traffic. Die Kosten pro
  # Utility-Einheit sind daher VIEL hoeher fuer Low-Traffic-Titel.
  #
  # C_ops(tau, t) = tier_ops_base(tau) * (1 - dest_maturity(t)) * traffic_factor(t)
  #
  # Traffic-Factor:
  #   sessions >= 50M:     1.0  (effizient)
  #   sessions 10-50M:     1.5  (moderat)
  #   sessions 1-10M:      2.5  (teuer)
  #   sessions < 1M/null:  5.0  (prohibitiv)
  # ---------------------------------------------------------------------------

  utility_calculations:

    blick:
      note: "Blick IST die One-Platform. Keine Tier-Entscheidung noetig."
      tier: "PLATFORM"

    cash:
      # traffic_factor = 1.5 (70M Sessions)
      # C_ops Tier I:  0.20 * (1-0.85) * 1.5 = 0.045
      # C_ops Tier II: 0.05 * (1-0.85) * 1.5 = 0.011
      tier_I:   { G: 0.505, V: 0.145, C: 0.045, U: "+0.142" }
      tier_II:  { G: 0.478, V: 0.319, C: 0.011, U: "-0.263" }
      tier_III: { G: 0.319, V: 0.450, C: 0.005, U: "-0.719" }
      optimal_tier: "I"
      interpretation: |
        Cash.ch ist EINDEUTIG Tier I (+0.142 = einziger positiver Titel).
        Starker Habit Loop (58% Direct) + hohe Content-Uniqueness (Boersentools).
        Tier II/III vernichten Habit und Finanz-Trust-Kapital.

    beobachter:
      # traffic_factor = 2.5 (9.7M Sessions)
      # C_ops Tier I:  0.20 * (1-0.45) * 2.5 = 0.275
      tier_I:   { G: 0.384, V: 0.192, C: 0.275, U: "-0.408" }
      tier_II:  { G: 0.409, V: 0.424, C: 0.069, U: "-0.806" }
      tier_III: { G: 0.291, V: 0.612, C: 0.028, U: "-1.390" }
      optimal_tier: "I"
      interpretation: |
        Tier I = geringstes Uebel (-0.408). ALLE Tiers negativ.
        Trust-Sensitivity (0.95) dominiert. Destination unreif (0.45)
        treibt C_ops hoch. → Destination-Maturity ERST aufbauen (Task Force!).
        Break-Even bei dest_maturity ca. 0.70 + Traffic-Verdopplung.

    bilanz:
      # traffic_factor = 2.5 (2.5M Sessions)
      # C_ops Tier I:  0.20 * (1-0.35) * 2.5 = 0.325
      tier_I:   { G: 0.429, V: 0.157, C: 0.325, U: "-0.272" }
      tier_II:  { G: 0.462, V: 0.340, C: 0.081, U: "-0.437" }
      tier_III: { G: 0.316, V: 0.474, C: 0.033, U: "-0.855" }
      optimal_tier: "I"
      interpretation: |
        Tier I optimal dank hohem Cross-Discovery (0.90 = 40% Blick-Referral).
        Aber hohe C_ops wegen niedriger Destination-Maturity (0.35) und
        kleinem Traffic (2.5M). Domain-Reifung = kritischer Pfad.

    handelszeitung:
      # traffic_factor = 5.0 (keine Sessions)
      # C_ops Tier I:  0.20 * (1-0.20) * 5.0 = 0.800
      tier_I:   { U: "-0.809" }
      tier_II:  { U: "-0.492" }
      tier_III: { U: "-0.594" }
      optimal_tier: "II"
      note: |
        Modell sagt Tier II. One-Pager hat Tier III.
        ABWEICHUNG erklaerbar: HZ hat moderate Markenstaerke, die in Tier II
        als Branded Section besser bewahrt wird als in reiner Syndication.
        Aber HZ ist de-priorisiert → praktisch Tier III realistischer.
      practical_override: "III (de-priorisiert)"

    landliebe:
      # traffic_factor = 5.0 (keine Sessions)
      tier_I:   { U: "-0.841" }
      tier_II:  { U: "-0.397" }
      tier_III: { U: "-0.488" }
      optimal_tier: "II"
      interpretation: "Branded Section optimal — eigene Destination prohibitiv teuer."

    pme:
      tier_I:   { U: "-0.814" }
      tier_II:  { U: "-0.411" }
      tier_III: { U: "-0.487" }
      optimal_tier: "II"
      interpretation: "FR-KMU-Nische braucht Markensichtbarkeit → Branded Section."

    gault_millau:
      tier_I:   { U: "-0.965" }
      tier_II:  { U: "-0.684" }
      tier_III: { U: "-0.974" }
      optimal_tier: "II"
      interpretation: |
        Tier II optimal. Hohe Trust-Sensitivity (0.85) und Uniqueness (0.90)
        verbieten Tier III (Marke verschwindet). Tier I prohibitiv teuer
        (keine Destination, kein Traffic). Branded Section = bester Kompromiss.

    schweizer_illustrierte:
      # traffic_factor = 5.0 (keine Sessions)
      tier_I:   { U: "-0.713" }
      tier_II:  { U: "-0.306" }
      tier_III: { U: "-0.355" }
      optimal_tier: "II"
      note: |
        ABWEICHUNG vs. One-Pager (dort Tier III).
        Modell zeigt: SI hat staerkere People-Affinitaet zu Blick als
        Tele/Glueckspost. Branded Section generiert mehr Wert als Syndication.
        → Empfehlung: SI auf Tier II upgraden.

    tele:
      tier_I:   { U: "-0.873" }
      tier_II:  { U: "-0.260" }
      tier_III: { U: "-0.145" }
      optimal_tier: "III"
      interpretation: "TV-Guide = hochgradig fungibel. Nathan-Logik optimal."

    glueckspost:
      tier_I:   { U: "-0.873" }
      tier_II:  { U: "-0.296" }
      tier_III: { U: "-0.221" }
      optimal_tier: "III"
      interpretation: "Senioren-Unterhaltung. Niedrige Identity-Anforderung → Syndication."

    illustre:
      tier_I:   { U: "-0.897" }
      tier_II:  { U: "-0.337" }
      tier_III: { U: "-0.294" }
      optimal_tier: "III"
      interpretation: "FR-Sprachregion + niedriges digitales Profil → Nathan-Logik."

