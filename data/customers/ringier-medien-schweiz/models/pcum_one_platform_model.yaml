# =============================================================================
# PCUM — Platform Consolidation Utility Model
# =============================================================================
# Session: EBF-S-2026-02-06-ORG-001
# Version: 2.0 (nach Traffic-Daten und Client-Korrekturen)
# Erstellt: 2026-02-06
# Theorie-Basis: Prospect Theory, Identity Economics, Platform Competition
# =============================================================================

metadata:
  model_name: "PCUM — Platform Consolidation Utility Model"
  model_id: "MOD-ORG-PCUM-001"
  version: "2.0"
  session: "EBF-S-2026-02-06-ORG-001"
  created: "2026-02-06"
  status: "draft"
  description: |
    Verhaltensorientiertes Modell fuer die One-Platform-Entscheidung
    bei Ringier Medien Schweiz (RMS). Beantwortet zwei Kernfragen:
    Q1: Welche Konsolidierungsebenen sind optimal?
    Q2: Welche Markenarchitektur bei User-Destination (L4)?

# =============================================================================
# ZENTRALE GLEICHUNG
# =============================================================================

equation:
  formula: "U_netto(L) = Sigma_s w_s * [G(L,s) - lambda_s * V(L,s)]"
  components:
    G: "Gain-Funktion (4 Dimensionen)"
    V: "Loss-Funktion (4 Dimensionen)"
    lambda_s: "Segment-spezifische Verlustaversion"
    w_s: "Segment-Gewicht"
  gain_dimensions:
    G1_tech_efficiency: "E(L) — Technische Effizienz durch Konsolidierung"
    G2_cross_discovery: "X(L,s) — Cross-Content-Discovery zwischen Marken"
    G3_data_synergy: "D(L) — Datensynergien (One-ID, Personalisierung)"
    G4_habit_transfer: "H(L,s) — Habit-Transfer zwischen Marken"
  loss_dimensions:
    V1_identity_loss: "I(L,s) — Markenidenditaetsverlust"
    V2_cognitive_overload: "C(L,s) — Kognitive Ueberlastung"
    V3_editorial_resistance: "R(L) — Redaktioneller Widerstand"
    V4_model_incompatibility: "M(L,s) — Geschaeftsmodell-Inkompatibilitaet"

# =============================================================================
# THEORETISCHE FUNDIERUNG
# =============================================================================

theories:
  - id: "MS-RD-001"
    name: "Prospect Theory (Kahneman & Tversky 1979)"
    role: "Gains/Losses asymmetrisch bewerten (lambda > 1)"
  - id: "MS-IB-001"
    name: "Identity Economics (Akerlof & Kranton 2000)"
    role: "Markenidenditaet als Utility-Dimension, Journalist Resistance"
  - id: "MS-IB-008"
    name: "Social Identity Theory (Tajfel & Turner 1979)"
    role: "In-Group / Out-Group bei Markenkonsolidierung"
  - id: "MS-NU-002"
    name: "Default Effects"
    role: "Plattform-Defaults bestimmen User-Verhalten"
  - id: "MS-TA-002"
    name: "Time-Intensive Goods"
    role: "Medienkonsum als zeitintensives Gut"
  - id: "Rochet/Tirole 2003"
    name: "Platform Competition"
    role: "Two-sided markets (User + Werbetreibende)"

# =============================================================================
# KONSOLIDIERUNGSEBENEN
# =============================================================================

consolidation_levels:
  L1:
    name: "Backend/CMS"
    description: "Gemeinsame technische Plattform (Schibsted-Modell)"
    status: "nicht konsolidiert"
    variable: true
  L2:
    name: "Abo/Paywall"
    description: "Blick+ als Bundle-Zugang fuer alle Titel"
    status: "teilweise konsolidiert (Blick+ inkludiert andere Titel)"
    variable: true
  L3:
    name: "Werbevermarktung"
    description: "Ringier Advertising + AdUnit"
    status: "VOLL UMGESETZT"
    variable: false  # Bereits implementiert — keine Entscheidungsvariable
  L4:
    name: "User-Destination"
    description: "Eine zentrale Website/App fuer alles"
    status: "nicht konsolidiert"
    variable: true
    sub_variants:
      L4a:
        name: "Monobrand"
        description: "Nur noch Blick — alle anderen Marken verschwinden"
      L4b:
        name: "House of Brands"
        description: "Eine Plattform, aber Marken bleiben sichtbar (Tabs/Sections)"
      L4c:
        name: "Endorsed Brands"
        description: "Hybridmodell: 'Bilanz by Blick', 'Beobachter by Blick'"

# =============================================================================
# DIGITALE TITEL (nur 5 mit eigener Destination)
# =============================================================================

