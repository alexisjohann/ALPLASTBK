# =============================================================================
# SHOWSTOPPER: REDAKTIONELLER WIDERSTAND
# =============================================================================

showstopper_editorial_resistance:
  severity: "HOECHSTE PRIORITAET (bestaetigt durch RMS)"
  mechanism: "Identity Economics (Akerlof & Kranton 2000)"

  three_mechanisms:
    identity_loss:
      description: |
        "Ich bin Bilanz-Journalist:in" → "Ich bin... Content-Lieferant:in fuer Blick?"
        Je staerker die Markenidentifikation, desto staerker der Widerstand.
      affected_brands: ["Bilanz", "Beobachter", "Handelszeitung"]
      severity: "HOCH"

    status_loss:
      description: |
        Bilanz-Journalist:in schreibt fuer Premium-Leser:innen (CEO, CFO).
        Blick-Plattform = Statusverlust in der Peer Group.
        "Was sagen meine Quellen, wenn ich bei Blick bin?"
      affected_brands: ["Bilanz", "Handelszeitung"]
      severity: "HOCH"

    autonomy_threat:
      description: |
        Eigene Marke = eigene Agenda, eigene Themenhoheit.
        One-Platform = zentrale Steuerung, Klick-Optimierung?
        "Wer bestimmt, was auf der Homepage steht?"
      affected_brands: ["alle"]
      severity: "MITTEL-HOCH"

  three_levers:
    lever_1_identity_preservation:
      strategy: "L4b: Marken bleiben sichtbar auf der Plattform"
      mechanism: "Identitaet wird nicht ausgeloescht, sondern eingebettet"
      expected_effect: "Reduziert Widerstand um ~30-40%"

    lever_2_status_upgrade:
      strategy: "Zeigen: 'Eure Reichweite verdreifacht sich'"
      mechanism: "Blick-Plattform als Reichweiten-Multiplikator, nicht Identitaets-Killer"
      expected_effect: "Konvertiert Widerstand in Ambivalenz bei ~20% der Journalisten"

    lever_3_sequential_approach:
      strategy: "Proof Points vor voller Integration"
      mechanism: |
        Phase 1: Backend-Konsolidierung (unsichtbar fuer User)
        Phase 2: Abo-Integration (Blick+ als Super-Bundle)
        Phase 3: Nur bei Erfolg und Akzeptanz: User-Destination
      expected_effect: "Reduziert Widerstand durch positive Erfahrung"

# =============================================================================
# BLICK -7% ANALYSE
# =============================================================================

blick_erosion_analysis:
  fact: "Blick -7% YoY bei 966M Sessions = ~74M Sessions weniger"
  context: "Das ist mehr als das gesamte Beobachter-Volumen (9.7M)"
  primary_source: "RMS State of Traffic Report, Jan 2026"

  # =========================================================================
  # KORRIGIERTE HYPOTHESEN (basierend auf State of Traffic Report)
  # =========================================================================
  correction_note: |
    ⚠️ KRITISCHE KORREKTUR (v3.0, 2026-02-08):
    Fruehere Analyse identifizierte Google AI als Haupttreiber.
    State of Traffic Report zeigt: POLARIS True-Direct-Decline ist Haupttreiber!
    SEO ist nur -6% (BESSER als -17% Industrie).
    Direct/Aggregators ist -19% (= Haupttreiber).

  hypotheses_corrected:
    H6_polaris_true_direct:
      description: "True Direct Traffic sinkt seit Polaris-Redesign kontinuierlich"
      probability: "SEHR HOCH (Primaerquelle RMS)"
      estimated_contribution: "-4 bis -5%"
      evidence: |
        Direct/Aggregators: 484M Sessions (50%), -19% YoY
        Explizit im Report: "largely driven by continued decline in true direct
        traffic since Polaris"
        Homepage-Anteil: 74% (true direct)
      implication: |
        Dies ist ein PRODUKT/UX-PROBLEM, kein Markteffekt!
        → One-Platform muss Habit-Design priorisieren
        → Polaris-Redesign hat Habit-Loop gestoert
        → G4 (Habit Transfer) wird wichtiger als gedacht

    H2_google_ai:
      description: "Google AI Overviews reduzieren SEO-Traffic"
      probability: "MITTEL (HERABGESTUFT)"
      estimated_contribution: "-1.5 bis -2.5%"
      evidence: |
        SEO: 336M Sessions (35%), nur -6% YoY
        Industrie-Benchmark: -17% (Blick performt DEUTLICH besser!)
        Bei 35% SEO-Anteil: 0.35 × 0.06 = ~2PP
      implication: |
        Google AI ist SEKUNDAER fuer Blick, aber PRIMAER fuer Beobachter.
        Blick hat gute SEO-Resilienz (vermutlich Markenstaerke + Breaking News).
        Beobachter (53% SEO, -13%) ist viel staerker betroffen.

    H1_market_effect:
      description: "Gesamter CH-Medienmarkt schrumpft"
      probability: "MITTEL (HERABGESTUFT)"
      estimated_contribution: "-0.5 bis -1%"
      evidence: "DNR 2025, aber RMS outperformed den Markt insgesamt"

    H7_social_growth_offset:
      description: "Social- und Newsletter-Wachstum kompensieren teilweise"
      probability: "HOCH"
      estimated_contribution: "+1 bis +2%"
      evidence: |
        Social: 70M Sessions (7%), +62% YoY
        Newsletters: 11M Sessions (1%), +67% YoY
        WhatsApp = 70% aller Blick Shares

    H3_social_substitution:
      description: "User konsumieren News auf TikTok/Instagram statt Blick"
      probability: "NIEDRIG (HERABGESTUFT)"
      evidence: "Social waechst +62%, nicht substituiert sondern additiv"

  decomposition_summary: |
    Polaris Direct Decline:   ~-5.0%
    Google AI (SEO):          ~-2.0%
    Markteffekt:              ~-0.5%
    Social/NL Wachstum:       ~+1.5%
    ────────────────────────────────
    Netto:                    ~-6.0% (beobachtet: -7%)

  strategic_priority: |
    KORRIGIERTE PRIORITAET:
    Blick-Erosion ist ein PRODUKT-PROBLEM (Polaris), kein Markt-Fatum.
    Das bedeutet: One-Platform kann DIREKT helfen!
    → Habit-Design (Homepage, Push, Personalisierung) = Gegenmassnahme
    → Social-Integration (WhatsApp) = Wachstumskanal
    → Newsletter-Ausbau = Habit-Staerkung

    Vorherige Schlussfolgerung "Platform loest Erosion nicht" war FALSCH.
    Neue Schlussfolgerung: Platform kann Erosion direkt adressieren,
    wenn sie Habit-Design priorisiert (G4 steigt in Bedeutung).

