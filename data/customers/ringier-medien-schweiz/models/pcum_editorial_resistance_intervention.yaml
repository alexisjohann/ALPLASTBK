metadata:
  title: "Editorial Resistance Intervention (V3 Reduction)"
  intervention_id: "INT-RMS-002"
  model_ref: "MOD-ORG-PCUM-001 v3.0"
  roadmap_ref: "Cross-cutting, relevant fuer Phase 2 + 3"
  version: "1.0"
  created: "2026-02-08"
  author: "FehrAdvice & Partners AG"
  status: "draft"

# =============================================================================
# F1: PROBLEM DEFINITION
# =============================================================================

F1_problem:
  statement: |
    Redaktioneller Widerstand (V3) ist der SHOWSTOPPER fuer jede Konsolidierung
    ueber L1 (Backend) hinaus. RMS hat dies selbst als hoechste Prioritaet bestaetigt.

    PCUM-Wirkung: V3 betrifft ALLE Segmente gleichmaessig (0.060 in S3).
    Bei lambda-Gewichtung: V3 kostet im Modell -0.121 an U_netto.
    Ohne V3 waere S3 bei +0.219 statt +0.098 — UEBER S2!

  behavioral_diagnosis: |
    Drei psychologische Mechanismen treiben Editorial Resistance:

    1. IDENTITY LOSS (Akerlof & Kranton 2000):
       "Ich bin Bilanz-Journalist:in" → Plattform bedroht berufliche Identitaet.
       Je staerker die Marken-Identifikation, desto staerker der Widerstand.
       BETRIFFT: Bilanz (STARK), Beobachter (STARK), cash.ch (MODERAT)

    2. STATUS LOSS (Social Identity Theory, Tajfel & Turner 1979):
       "Was sagen meine Quellen, wenn ich bei Blick bin?"
       Blick-Boulevard-Image = Statusverlust fuer Premium-Journalist:innen.
       BETRIFFT: Bilanz (SEHR STARK), Beobachter (MITTEL)

    3. AUTONOMY THREAT (Self-Determination Theory, Deci & Ryan 2000):
       "Wer bestimmt, was auf der Homepage steht?"
       Zentrale Plattform = gefuehlter Kontrollverlust ueber eigene Agenda.
       BETRIFFT: Alle Redaktionen

  why_showstopper: |
    V3 ist einzigartig, weil es NICHT durch Produkt-Design geloest werden kann.
    V1 (Identity Loss) kann durch L4b-Architektur reduziert werden (technisch).
    V2 (Cognitive Overload) kann durch UX-Design reduziert werden (technisch).
    V3 braucht MENSCHEN-ARBEIT: Change Management, Vertrauen, Proof Points.

    Das macht V3 zum langsamsten und schwierigsten Hebel — aber auch zum
    entscheidenden: Ohne Editorial Buy-In scheitert jede Integration.

# =============================================================================
# F2: TARGET POPULATION
# =============================================================================

F2_target:
  note: |
    Target ist NICHT die User-Seite (s1-s5), sondern die INTERNE Seite:
    Redaktionen und Journalist:innen der zu integrierenden Marken.

  primary_target:
    name: "Bilanz-Redaktion"
    size: "~15-25 Journalist:innen (geschaetzt)"
    resistance_level: "SEHR HOCH"
    reasons:
      - "Staerkste Markenidentifikation im Portfolio"
      - "Premium-Positionierung vs. Blick-Boulevard-Image"
      - "Gerade eigenstaendige Domain relauncht (bilanz.ch)"
      - "Quellen-Netzwerk im C-Level, das durch Blick-Assoziation leidet"
    key_personas:
      - "Wirtschaftsjournalist:in (Mitte 40, 15 Jahre Bilanz, starkes Netzwerk)"
      - "Redaktionsleitung (verantwortlich fuer Positionierung und Personal)"

  secondary_target:
    name: "Beobachter-Redaktion"
    size: "~20-30 Journalist:innen (geschaetzt)"
    resistance_level: "HOCH"
    reasons:
      - "100 Jahre Markengeschichte ('Recht & Gerechtigkeit')"
      - "Service-orientiert — ganz anderer Journalismus als Blick"
      - "120k Abonnenten = starke Bindung zwischen Marke und Leser:innen"
    mitigating_factor: |
      Beobachter hat ein SURVIVAL-Argument: 53% SEO-Abhaengigkeit.
      Google AI bedroht Standalone-Existenz. Integration = Rettung.
      Task Force Q4 zeigt: Gezielte Intervention wirkt (SEO +48%).

  tertiary_target:
    name: "cash.ch-Redaktion"
    size: "~10-15 Journalist:innen (geschaetzt)"
    resistance_level: "MODERAT"
    reasons:
      - "Utility-Content (Boersenkurse) hat staerksten eigenstaendigen Habit"
      - "58% Direct Traffic = staerkste Eigenstaendigkeit im Portfolio"
    mitigating_factor: "Utility-Content funktioniert unabhaengig von Marke"

  low_resistance:
    name: "Blick-Redaktion"
    resistance_level: "NIEDRIG"
    reason: "Blick IST die Plattform — Integration bedroht ihre Identitaet NICHT"

# =============================================================================
# F3: 10C TARGET DIMENSIONS
# =============================================================================

F3_10c_targets:
  primary_target:
    dimension: "HOW (B)"
    current_state: "gamma(Bilanz, Blick) < 0 (wahrgenommene Inkompatibilitaet)"
    target_state: "gamma(Bilanz, Blick) ≥ 0 (Komplementaritaet akzeptiert)"
    mechanism: |
      Journalist:innen muessen Blick-Plattform als KOMPLEMENTAER erleben:
      "Meine Arbeit wird MEHR gesehen" statt "Meine Arbeit wird VERWASSERT".
      Reframing von Nullsumme (Identitaet vs. Reichweite) zu Positivsumme.

  secondary_targets:
    - dimension: "AWARE (AU)"
      delta: "Bewusstsein fuer Reichweiten-Effekt schaffen"
      mechanism: "Journalist:innen sehen konkrete Zahlen: Reichweite ×3-5"

    - dimension: "READY (AV)"
      delta: "Willingness fuer Veraenderung aufbauen"
      mechanism: "Von 'Nein, niemals' zu 'Schauen wir mal' zu 'Ja, wenn...'"

    - dimension: "STAGE (AW)"
      delta: "Journey: Widerstand → Ambivalenz → Offenheit → Engagement"
      mechanism: "Sequentielles Vorgehen mit Proof Points pro Phase"

# =============================================================================
# F4: INTERVENTION VECTOR (9D)
# =============================================================================

F4_intervention_vector:
  vector:
    I_WHO: 0.30      # Identitaet bewahren (L4b Architektur)
    I_WHAT: 0.20     # Value Proposition fuer Journalist:innen
    I_HOW: 0.70      # KERN: Komplementaritaet statt Wettbewerb
    I_WHEN: 0.50     # Timing und Sequenzierung
    I_WHERE: 0.15    # Parameter-Kalibrierung
    I_AWARE: 0.60    # Reichweiten-Evidenz zeigen
    I_READY: 0.65    # Willingness aufbauen
    I_STAGE: 0.55    # Journey managen
    I_HIERARCHY: 0.40 # Entscheidungsarchitektur fuer Redaktionen

# =============================================================================
# F5: BEHAVIORAL MECHANISMS (7 Interventionen)
# =============================================================================

F5_mechanisms:

  INT_A_reframing:
    name: "Status Reframing: Reichweiten-Multiplikator"
    pcum_lever: "Lever 2 (Status Upgrade)"
    target: "Bilanz + Beobachter Redaktionen"
    mechanism: |
      AKTUELLES FRAMING (Verlust-Frame):
      "Wir werden zu Content-Zulieferern fuer Blick"

      NEUES FRAMING (Gewinn-Frame):
      "Unsere Arbeit erreicht 5x mehr Menschen. Blick-Plattform ist
      unser Megafon, nicht unser Grab."

      KONKRET:
      Bilanz-Journalist:in heute: 2.5M Sessions, davon 40% von Blick
      Bilanz auf Blick-Plattform: potenziell 50-100M Reichweite
      → "Dein Bilanz-Artikel wird von 100k statt 10k gelesen"
    actions:
      - "Individuelle Reichweiten-Simulation pro Journalist:in"
      - "Dashboard: 'So viele Leser:innen haettest du mit Plattform'"
      - "Vergleich: LinkedIn-Followership von Bilanz-Journalist:innen
        vor vs. nach hypothetischer Plattform-Integration"
    expected_v3_reduction: "15-20%"
    timeline: "Phase 2 (vor Super-Bundle-Launch)"

  INT_B_identity_preservation:
    name: "Identity Architecture (L4b Design)"
    pcum_lever: "Lever 1 (Identity Preservation)"
    target: "Alle Redaktionen"
    mechanism: |
      L4b (House of Brands) bewahrt Identitaet durch Design:
      - Eigener Bereich/Tab auf der Plattform
      - Eigene visuelle Identitaet (Farben, Typografie)
      - Eigene Bylines und Autorenseiten
      - Eigene URL (bilanz.blick.ch)
      - Eigene Social-Media-Kanaele

      ZUSAETZLICH (NEU):
      - "Bilanz-Redaktion" Label bleibt UEBERALL sichtbar
      - "Diese Story aus der Bilanz-Redaktion" Badge bei Cross-Brand
      - Eigene Newsletter unter Markenname
    actions:
      - "L4b Design-Prototyp erstellen und Redaktionen zeigen"
      - "Mock-ups: 'So sieht DEIN Artikel auf der Plattform aus'"
      - "Vergleich: Schibsted VG → Aftenposten bleibt eigenstaendig"
    expected_v3_reduction: "20-30%"
    timeline: "Phase 2-3 (Design vor Implementation zeigen)"

  INT_C_proof_points:
    name: "Sequentielle Proof Points"
    pcum_lever: "Lever 3 (Sequential Approach)"
    target: "Alle Redaktionen"
    mechanism: |
      NICHT: "Ab morgen sind wir alle eine Plattform"
      SONDERN: "Schaut was bei Phase 1 passiert ist — nichts Schlimmes!"

      Sequenz:
      1. Phase 1 (Backend): Komplett unsichtbar. Redaktionen merken: "Aha, das war harmlos."
      2. Phase 2 (Abo-Bundle): Reichweiten-Dashboard zeigt: "Eure Artikel werden mehr gelesen."
      3. Phase 3 (L4b): Nur wenn Phase 2 positive Erfahrungen gebracht hat.

      PSYCHOLOGIE: Endowment Effect + Status Quo Bias FUER uns nutzen.
      Wenn Journalist:innen die Vorteile einmal HABEN (Reichweite), wollen sie
      sie nicht mehr ABGEBEN. → Verlustaversion arbeitet FÜR die Integration.
    actions:
      - "Wöchentlicher 'Integration Impact Report' fuer Redaktionen"
      - "Highlight: 'Diese Bilanz-Story hat via Blick-Feed 50k Views bekommen'"
      - "Testimonials von Journalist:innen, die von Reichweite profitiert haben"
    expected_v3_reduction: "15-25% (kumulativ ueber Phasen)"
    timeline: "Ab Phase 1 (kontinuierlich)"

  INT_D_autonomy_guarantee:
    name: "Editorial Autonomy Charter"
    target: "Alle Redaktionen, insbesondere Bilanz + Beobachter"
    mechanism: |
      ANGST: "Blick-Algorithmus bestimmt was auf Homepage steht"
      LÖSUNG: Formale Autonomie-Garantie (Charter/Vertrag)

      CHARTER-INHALTE:
      1. Themenhoheit: Jede Redaktion bestimmt eigene Agenda
      2. Homepage-Platzierung: Jede Marke hat eigenen Bereich
      3. Kein Klick-Zwang: Keine Optimierung auf Blick-Metriken
      4. Redaktionskonferenz: Getrennt (nicht fusioniert)
      5. Kündigungsklausel: Marke kann sich wieder lösen (Exit-Option)

      PSYCHOLOGIE: Self-Determination Theory (Deci & Ryan 2000)
      Autonomie-Wahrnehmung = Widerstandsreduktion.
      Die EXIT-OPTION ist entscheidend: Wer gehen KANN, bleibt eher.
    actions:
      - "Editorial Autonomy Charter schriftlich verfassen"
      - "Von CSIO und CEO unterzeichnen lassen"
      - "Oeffentlich kommunizieren (auch extern)"
      - "Jährliche Review-Klausel einbauen"
    expected_v3_reduction: "10-15%"
    timeline: "VOR Phase 2 (Vertrauens-Basis schaffen)"

  INT_E_editorial_board:
    name: "Joint Editorial Board (mit echtem Mandat)"
    target: "Chefredaktionen aller 5 Titel"
    mechanism: |
      NICHT: Informationsveranstaltung ("Management informiert euch")
      SONDERN: Echtes Mitbestimmungs-Gremium

      BESETZUNG:
      - Chefredaktor:in Blick (Rolf Cavalli)
      - Chefredaktor:in Bilanz
      - Chefredaktor:in Beobachter
      - Chefredaktor:in cash.ch
      - CSIO (Patrick Rademacher) als Moderator
      - KEIN externer Berater als Vorsitz (Redaktionen muessen Ownership fuehlen)

      MANDAT:
      - Cross-Brand-Regeln festlegen
      - Homepage-Algorithmus-Prinzipien definieren
      - Qualitaetsstandards fuer Cross-Brand-Content
      - Eskalationsinstanz bei Konflikten
    actions:
      - "Editorial Board einberufen (VOR Phase 2)"
      - "Erstes Mandat: Cross-Promotion-Regeln fuer Abo-Bundle"
      - "Quartalstreffen institutionalisieren"
    expected_v3_reduction: "10-15%"
    timeline: "Ab Phase 1 (proaktiv)"

  INT_F_champion_network:
    name: "Integration Champions (Bottom-Up)"
    target: "2-3 Journalist:innen pro Redaktion"
    mechanism: |
      NICHT: Top-Down-Kommunikation ("Management sagt, es wird so gemacht")
      SONDERN: Bottom-Up-Advocacy durch respektierte Peers

      AUSWAHL-KRITERIEN fuer Champions:
      1. Hohe Peer-Reputation (wird gehoert und respektiert)
      2. Digitale Affinitaet (versteht Plattform-Logik)
      3. Nicht Management-nah (wird nicht als "eingekauft" wahrgenommen)
      4. Idealerweise: Skeptiker:in, die ueberzeugt wurde (staerkste Wirkung)

      ROLLE:
      - Frueher Zugang zu Plattform-Prototypen
      - Feedback-Kanal zur Redaktion
      - Storytelling: "Ich war skeptisch, aber..."
    actions:
      - "Pro Redaktion 2-3 Champions identifizieren"
      - "Fruehzeitig einbinden (nicht erst bei Launch)"
      - "Champions bekommen exklusive Reichweiten-Daten vorab"
    expected_v3_reduction: "10-15%"
    timeline: "Ab Phase 1"

  INT_G_beobachter_survival:
    name: "Beobachter Survival Narrative"
    target: "Beobachter-Redaktion spezifisch"
    mechanism: |
      EINZIGARTIGES ARGUMENT fuer Beobachter:
      "Integration ist nicht Annexion — Integration ist Rettung"

      FAKTEN:
      - 53% SEO-Abhaengigkeit = Google-AI-Risiko
      - Task Force Q4: Hat funktioniert (SEO +48%), aber das ist Symptombekaempfung
      - Langfristig: Standalone-Beobachter ist bei >30% SEO-Verlust nicht viable
      - Blick-Plattform = Sicherheitsnetz (100M+ Sessions als Buffer)

      FRAMING:
      "Wollt ihr allein auf Google angewiesen sein, oder habt ihr lieber
      ein Sicherheitsnetz mit 1 Milliarde Sessions?"

      PSYCHOLOGIE: Protection Motivation Theory (Rogers 1983)
      Threat Appraisal (Google AI) + Coping Appraisal (Integration hilft)
      → Motivation zur Schutzhandlung (Integration akzeptieren)
    actions:
      - "Szenario-Praesentation: 'Beobachter bei 30% SEO-Verlust'"
      - "Vergleich: Task-Force-Ergebnisse (kurzfristig) vs. strukturelle Loesung"
      - "Workshop: 'Wie wuerde Beobachter AUF der Plattform aussehen?'"
    expected_v3_reduction: "15-20% (Beobachter-spezifisch)"
    timeline: "Ab Phase 1 (parallel)"

# =============================================================================
# F9: INTERVENTION PORTFOLIO — ZUSAMMENFASSUNG
# =============================================================================

F9_portfolio_summary:
  total_interventions: 7
  total_expected_v3_reduction: "60-80% (kumulativ, nicht additiv)"
  note: |
    Interventionen sind KOMPLEMENTAER und wirken auf verschiedene
    psychologische Mechanismen. Kumulative Wirkung ist NICHT die Summe
    der Einzelwirkungen, sondern weniger (Diminishing Returns).

    Realistische Schaetzung: V3-Reduktion um 50-60% ist erreichbar.
    Das entspricht der SA-6 Annahme von -50% V3.

  priority_ranking:
    - rank: 1
      intervention: "INT-RMS-002-B (Identity Architecture)"
      reason: "Groesster Einzeleffekt, adressiert Kernangst"
    - rank: 2
      intervention: "INT-RMS-002-D (Autonomy Charter)"
      reason: "Formale Absicherung, schafft Vertrauen"
    - rank: 3
      intervention: "INT-RMS-002-A (Status Reframing)"
      reason: "Konkreter Nutzen-Nachweis, datengetrieben"
    - rank: 4
      intervention: "INT-RMS-002-C (Proof Points)"
      reason: "Langfristig staerkster Effekt, braucht aber Zeit"
    - rank: 5
      intervention: "INT-RMS-002-E (Editorial Board)"
      reason: "Institutionelle Verankerung"
    - rank: 6
      intervention: "INT-RMS-002-F (Champion Network)"
      reason: "Bottom-Up-Legitimierung"
    - rank: 7
      intervention: "INT-RMS-002-G (Beobachter Survival)"
      reason: "Markenspezifisch, aber starkes Argument"

# =============================================================================
# F11: SUCCESS METRICS
# =============================================================================

F11_metrics:
  primary_kpi:
    name: "Editorial Resistance Index (ERI)"
    definition: "Standardisierter Survey, 7-Punkt-Skala (1=kein Widerstand, 7=maximal)"
    baseline: "Nicht gemessen — ERSTERHEBUNG NOETIG (Open Data Request)"
    target_phase_1: "<5.0/7.0"
    target_phase_2: "<4.0/7.0 (Go/No-Go fuer Phase 3)"
    target_phase_3: "<3.5/7.0"
    measurement: "Anonyme Befragung, quartalweise"

  secondary_kpis:
    - name: "Redaktionelle Fluktuation"
      baseline: "Branchenueblich ~10-15%/Jahr"
      target: "<10% (keine Ueberfluktuation durch Integration)"
    - name: "Cross-Brand-Content-Bereitschaft"
      definition: "Anteil Journalist:innen die Cross-Brand-Promotion akzeptieren"
      baseline: "Geschaetzt <20%"
      target: ">50% nach Phase 2"
    - name: "Reichweiten-Awareness"
      definition: "Anteil Journalist:innen die ihren Cross-Brand-Reichweiten-Effekt kennen"
      baseline: "Geschaetzt <10%"
      target: ">80% nach Reframing-Intervention"

# =============================================================================
# F12: IMPLEMENTATION TIMELINE
# =============================================================================

F12_implementation:
  pre_phase_2:
    timing: "Q3-Q4 2026 (VOR Abo-Bundle-Launch)"
    actions:
      - "Editorial Resistance Index Ersterhebung (Baseline messen)"
      - "Editorial Autonomy Charter verfassen und unterzeichnen"
      - "Editorial Board einberufen"
      - "Champion Network aufbauen (2-3 pro Redaktion)"
      - "L4b Design-Prototypen erstellen"
    goal: "ERI < 5.0 und institutionelle Grundlagen gelegt"

  during_phase_2:
    timing: "Q1-Q2 2027 (waehrend Abo-Bundle)"
    actions:
      - "Reichweiten-Dashboard live schalten (Status Reframing)"
      - "Woechentlicher Integration Impact Report starten"
      - "Beobachter Survival Workshop durchfuehren"
      - "Champion Testimonials sammeln"
    goal: "ERI < 4.0 und erste Proof Points sichtbar"

  pre_phase_3_gate:
    timing: "Ende Q2 2027"
    actions:
      - "ERI messen (muss < 4.0 sein)"
      - "Fluktuation prüfen (muss < 10% sein)"
      - "Cross-Brand-Bereitschaft messen (muss > 40% sein)"
    decision: |
      ERI < 4.0 UND Fluktuation < 10% UND Cross-Brand > 40%
      → GO fuer Phase 3 (V3-Bedingung der Dreifach-Bedingung ERFUELLT)

      Sonst → Phase 3 verschieben oder verwerfen

# =============================================================================
# ZUSAMMENFASSUNG
# =============================================================================

summary:
  for_csio: |
    Patrick, redaktioneller Widerstand (V3) ist der groesste Einzelhebel
    im PCUM — und der schwierigste. 7 Interventionen adressieren die drei
    psychologischen Mechanismen (Identity Loss, Status Loss, Autonomy Threat).

    SOFORT STARTEN (vor Phase 2):
    - Editorial Resistance Index messen (Baseline!)
    - Autonomy Charter unterzeichnen
    - Editorial Board einberufen
    - Champions identifizieren

    KRITISCHER PFAD:
    V3-Reduktion um 50% ist die Mindestvoraussetzung fuer Phase 3.
    Ohne Editorial Buy-In bleibt S2 das optimale Szenario — was KEIN
    Misserfolg waere, sondern eine rationale Entscheidung.

    EINZIGARTIGER HEBEL:
    Beobachter hat ein Survival-Argument (53% Google-Abhaengigkeit),
    das den Widerstand in der Beobachter-Redaktion REDUZIERT.
    → Beobachter-Integration als Pilotprojekt fuer L4b?
