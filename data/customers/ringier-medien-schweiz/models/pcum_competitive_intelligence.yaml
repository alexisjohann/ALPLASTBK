# =============================================================================
# WETTBEWERBSLANDSCHAFT SCHWEIZ (Digitale Medien)
# =============================================================================

competitive_landscape:
  description: |
    Der Schweizer digitale Medienmarkt ist ein Oligopol mit 3 dominanten Playern
    (TX Group/Tamedia, Ringier/RMS, NZZ) und 2 oeffentlichen Akteuren (SRG, Keystone-SDA).
    Die One-Platform-Entscheidung muss im Kontext dieser Wettbewerbsdynamik betrachtet werden.

  market_dynamics:
    - "Schweizer Digital-Werbemarkt ~CHF 2.5 Mrd (2025), davon ~75% Big Tech (Google, Meta)"
    - "Publisher-Anteil am Digital-Werbemarkt schrumpft: ~CHF 300-400M (2025)"
    - "Abo-Erloese wachsen, aber langsamer als Werbe-Erosion"
    - "Google AI Overviews: SEO-Traffic sinkt branchenweit -17% YoY (Blick nur -6%)"
    - "Print-Auflagen sinken 5-8% p.a. (strukturell, nicht zyklisch)"

# =============================================================================
# DIREKTE WETTBEWERBER
# =============================================================================

competitors:

  tx_group_tamedia:
    name: "TX Group / Tamedia"
    relevance: "HOECHSTE — direkter Konkurrent in allen Segmenten"
    brands:
      news_mass: ["20 Minuten (CH #1 Reichweite)", "Tagesanzeiger", "24heures", "Tribune de Geneve"]
      business: ["Finanz und Wirtschaft (FuW)"]
      service: ["Doodle", "Ricardo", "Homegate (Marktplaetze)"]
    strategy: |
      TX Group hat die AGGRESSIVSTE Konsolidierungsstrategie:
      - 20 Minuten: Gratismodell, hoechste Reichweite CH
      - Tagesanzeiger: Premium-Abo, Qualitaetsjournalismus
      - Marktplaetze (Ricardo, Homegate): Diversifizierung jenseits Medien
      - ONE LOG: Gemeinsames Login ueber alle TX-Titel (bereits implementiert!)
      - Paid Content: Tagesanzeiger "Abo+" mit ~50k Digital-Abos
    one_platform_status: |
      TX hat BEREITS teilkonsolidiert:
      - Gemeinsames CMS (intern)
      - ONE LOG als uebergreifendes Login
      - Cross-Selling zwischen Marken
      ABER: Kein House of Brands. Marken bleiben vollstaendig separat.
    pcum_relevance: |
      TX zeigt: L1 (Backend) + L2-light (gemeinsames Login) funktioniert OHNE L4.
      TX hat NICHT zu einer einzigen Plattform konsolidiert — Marken bleiben getrennt.
      → Staerkt S2-Empfehlung (Backend + Abo, ohne volle Plattform-Konsolidierung).

    competitive_threat:
      news: "20 Minuten dominiert Gratis-News. Blick muss sich differenzieren."
      business: "FuW ist direkte Konkurrenz fuer Bilanz. Premium-Wirtschaftsjournalismus."
      abo: "Tagesanzeiger Abo+ = ~50k Subscriber, vergleichbar mit Blick+ Ziel"
    threat_level: "HOCH"

  nzz_mediengruppe:
    name: "NZZ Mediengruppe"
    relevance: "HOCH — Premium-Segment, Talent-Konkurrenz"
    brands:
      news_quality: ["NZZ (Neue Zuercher Zeitung)", "NZZ am Sonntag"]
      regional: ["Luzerner Zeitung", "St. Galler Tagblatt", "Berner Zeitung (CH Media JV)"]
      niche: ["NZZ Bellevue (Luxury)", "The Market (Finance)"]
    strategy: |
      NZZ verfolgt die PREMIUM-STRATEGIE:
      - NZZ Digital: ~200k Abo-Subscriber (groesstes News-Abo CH!)
      - ARPU hoch: CHF 22-35/Monat
      - Konsequente Paywall (80%+ Artikel hinter Paywall)
      - Internationale Expansion (NZZ DE, NZZ International)
      - The Market als Finanz-Nische (CHF 29/Monat)
    one_platform_status: |
      NZZ hat KEINE Plattform-Konsolidierung im RMS-Sinn.
      Jeder Titel hat eigene Destination. Aber: CH Media JV fuer Regionale.
    pcum_relevance: |
      NZZ ist das ABWANDERUNGSZIEL Nr.1 fuer Bilanz-Journalist:innen.
      Bei V3 (Editorial Resistance) ist NZZ der "Exit-Option"-Anker.
      → Editorial Resistance Intervention (INT-RMS-002) muss NZZ-Vergleich adressieren.
    competitive_threat:
      premium_abo: "NZZ mit ~200k Subscribern zeigt: Schweizer ZAHLEN fuer Qualitaet"
      talent: "NZZ als attraktivster Arbeitgeber fuer Premium-Journalist:innen"
      bilanz_risk: "Bilanz-Journalist:innen koennten zu NZZ/The Market wechseln"
    threat_level: "HOCH (speziell fuer Bilanz)"

  ch_media:
    name: "CH Media"
    relevance: "MITTEL — Regional-Fokus, weniger direkte Konkurrenz"
    brands:
      regional: ["Aargauer Zeitung", "Solothurner Zeitung", "Luzerner Zeitung (via NZZ JV)"]
      tv_radio: ["TV24", "3+", "Radio 24", "Radio Argovia"]
    strategy: |
      CH Media = Joint Venture NZZ + AZ Medien.
      Fokus: Regionale Medien + Unterhaltungs-TV.
      Weniger relevant fuer RMS One-Platform (andere Zielgruppe).
    pcum_relevance: |
      Gering fuer die One-Platform-Entscheidung.
      Potentiell relevant als Partner/Akquisitionsziel fuer RMS.
    threat_level: "NIEDRIG"

  srg_ssr:
    name: "SRG SSR"
    relevance: "MITTEL-HOCH — oeffentlich finanziert, News-Konkurrenz"
    brands: ["SRF News", "RTS Info", "RSI News", "SWI swissinfo.ch"]
    strategy: |
      SRG Online-Auftritte: Gratis-News ohne Paywall.
      Hohe Reichweite (SRF News #1 in Vertrauen).
      ABER: BAKOM-Regulierung beschraenkt Online-Textjournalismus.
      SRG-Initiative (Halbierung) = Unsicherheit.
    pcum_relevance: |
      SRG-Initiative koennte Wettbewerbslandschaft fundamental aendern:
      - Halbierung → weniger SRG Online → mehr Raum fuer Private
      - Ablehnung → Status Quo, SRG bleibt starker Gratis-Anbieter
      → Fuer S2/S3: Bei SRG-Reduktion steigt Wert der Blick-Plattform
    threat_level: "MITTEL (regulierungsabhaengig)"

# =============================================================================
# INTERNATIONALE REFERENZFAELLE
# =============================================================================

international_benchmarks:

  schibsted_norway:
    name: "Schibsted (Norwegen/Schweden)"
    relevance: "HOECHSTE — Direktes Vorbild fuer RMS One-Platform"
    brands: ["VG (Verdens Gang)", "Aftenposten", "E24", "Bergens Tidende"]
    platform_strategy: |
      Schibsted ist das EINZIGE erfolgreiche House-of-Brands Modell im Medienbereich:
      - VG: Massenmarkt (wie Blick)
      - Aftenposten: Qualitaet (wie NZZ/Tagesanzeiger)
      - Marken bleiben getrennt, aber gemeinsame Tech-Plattform
      - Abo-Bundle: VG+ inkludiert Aftenposten+ und E24+
    what_worked:
      - "Gemeinsames CMS (L1): Signifikante Tech-Einsparungen"
      - "Abo-Bundle (L2): VG+ als Super-Bundle erfolgreich"
      - "Schibsted ID (One-ID): Cross-Brand-Login seit 2015"
      - "Data Platform: Gemeinsame Dateninfrastruktur fuer Werbung"
    what_didnt_work:
      - "User-Destination (L4): Schibsted hat NICHT zu einer Plattform konsolidiert!"
      - "Marken bleiben vollstaendig separate Destinations"
      - "House of Brands nur im Backend, NICHT im Frontend"
    pcum_relevance: |
      Schibsted validiert S2 (Backend + Abo), aber NICHT S3 (House of Brands Frontend).
      Schibsted hat L1 + L2 umgesetzt, aber L4 bewusst NICHT verfolgt.
      → Staerkt die S2-Empfehlung erheblich.
      → S3 waere Neuland — kein internationales Vorbild!

  axel_springer_germany:
    name: "Axel Springer (Deutschland)"
    relevance: "HOCH — Bild + Welt als Parallel-Fall"
    brands: ["Bild", "Welt", "Business Insider", "Politico"]
    platform_strategy: |
      Axel Springer hat RADIKAL konsolidiert:
      - Bild: Digital First, hohe Paywall (BILDplus, ~600k Subscriber)
      - Welt: Premium-Repositionierung
      - Newsroom-Transformation: Steffi Buchli (ex-RMS!) rekrutiert fuer BILD
      - KAI (KI-Investition): Axel Springer ist AI-Early-Adopter
    what_worked:
      - "BILDplus: 600k+ Subscriber zeigt Boulevard CAN work with Paywall"
      - "Welt Relaunch: Qualitaets-Repositionierung funktioniert"
      - "KI-Integration: Automatisierte Sport-/Finanz-Berichterstattung"
    what_didnt_work:
      - "Bild + Welt bleiben SEPARATE Destinations"
      - "Kein gemeinsames Abo-Bundle (verschiedene Zielgruppen)"
      - "Marken bewusst getrennt gehalten"
    pcum_relevance: |
      Axel Springer zeigt: Auch bei aggressiver Digital-Strategie
      bleiben Marken separate Destinations. Kein House of Brands.
      BILDplus-Erfolg (600k) = Blick+ Upside-Referenz (30k → 100k+ moeglich?)

  guardian_uk:
    name: "The Guardian (UK)"
    relevance: "MITTEL — Membership-Modell, nicht direkt vergleichbar"
    model: "Membership (freiwillige Beitraege) statt Hard Paywall"
    subscribers_members: 1000000  # >1M Members/Subscriber weltweit
    pcum_relevance: |
      Guardian zeigt: Ein starkes Single-Brand kann ohne Multi-Brand funktionieren.
      ABER: Guardian ist EIN Brand, nicht ein Portfolio.
      Weniger relevant fuer RMS Multi-Brand-Entscheidung.

  tamedia_one_log:
    name: "TX Group ONE LOG (Schweiz)"
    relevance: "HOCH — direkter Schweizer Konkurrent mit bereits implementiertem Login"
    description: |
      ONE LOG ist das schweizerische Pendant zu Schibsted ID:
      - Gemeinsames Login ueber alle Tamedia-Titel
      - Ermoeglicht Cross-Brand-Daten
      - Kein gemeinsames Abo-Bundle (noch)
    pcum_relevance: |
      TX hat den RMS-Plan bereits TEILWEISE umgesetzt (One-ID = G3).
      Wenn RMS NICHT nachzieht, entsteht Datennachteil im Werbemarkt.
      → Dringlichkeit fuer mindestens S1 (L1 Backend + One-ID) steigt.

# =============================================================================
# GOOGLE AI OVERVIEWS: BRANCHEN-IMPACT
# =============================================================================

google_ai_impact:
  description: |
    Google AI Overviews (AIO) sind der groesste externe Disruptionsfaktor
    fuer ALLE Publisher. Schweizer Daten (RMS State of Traffic, Jan 2026):

  industry_averages:
    seo_traffic_change_12m: "-17%"  # Branchendurchschnitt CH
    source: "RMS State of Traffic Report + Branchenschaetzung"

  rms_performance_vs_industry:
    blick:
      seo_change: "-6%"
      vs_industry: "BESSER (11pp ueber Durchschnitt)"
      reason: "Breaking News + hohe Domain-Autoritaet"
    beobachter:
      seo_change: "-12% (bis Task Force), dann +48% Recovery"
      vs_industry: "VOLATIL — anfangs schlechter, dann stark erholt"
      risk: "53% SEO-Abhaengigkeit = existentielles Risiko"
    bilanz:
      seo_change: "+14% (3 Monate seit Relaunch)"
      vs_industry: "BESSER — aber neue Domain, Baseline-Effekt"
    cash_ch:
      seo_change: "stabil bis leicht positiv"
      vs_industry: "BESSER — Utility-Content (Boersenkurse) weniger betroffen"

  strategic_implications:
    for_s1: "Kein direkter Impact — Backend-Konsolidierung aendert SEO nicht"
    for_s2: |
      Abo-Bundle reduziert SEO-Abhaengigkeit:
      - Subscriber kommen direkt (nicht via Google)
      - Bundle-Marketing ueber eigene Kanaele
      → S2 ist AUCH ein Hedge gegen Google AI
    for_s3: |
      Eine starke Plattform mit hoher Domain-Autoritaet
      koennte SEO-Resilienz erhoehen (Blick-Domain fuer alle Inhalte).
      ABER: Domain-Migration birgt kurzfristiges SEO-Risiko!
    for_beobachter: |
      Beobachter ist der VULNERABELSTE Titel.
      - 53% SEO-Abhaengigkeit
      - Service-Content = GENAU der Typ, den AI Overviews ersetzen
      - Integration in eine staerkere Plattform = Survival-Strategie

# =============================================================================
# SCHWEIZER MEDIENREGULIERUNG
# =============================================================================

regulatory_context:
  weko:
    description: "WEKO genehmigte RMS-Gruendung 2023 (Blick + RASCH)"
    relevance: "One-Platform koennte erneute WEKO-Pruefung ausloesen (unwahrscheinlich)"
    risk: "NIEDRIG — Konsolidierung innerhalb bestehender Gruppe"

  srg_initiative:
    description: "Volksinitiative zur Halbierung der SRG-Gebuehren"
    status: "In Unterschriftensammlung / parlamentarische Debatte"
    impact_if_accepted: |
      - Weniger SRG Online → mehr Raum fuer Private
      - Blick koennte SRG-News-Luecke fuellen
      - Werbemarkt: Weniger SRG-Inventar → hoehere CPMs fuer Private
    impact_if_rejected: "Status Quo bleibt"

  bakom_online_regulation:
    description: "BAKOM-Regulierung beschraenkt SRG-Online-Textjournalismus"
    relevance: "Indirekt positiv fuer Private — SRG darf weniger Text online stellen"

# =============================================================================
# KERNAUSSAGEN FUER CSIO
# =============================================================================

key_messages:
  message_1: |
    KEIN internationaler Player hat ein vollstaendiges House-of-Brands Frontend (L4b) umgesetzt.
    Schibsted, Axel Springer, TX Group: Alle konsolidieren Backend + Abo, aber NICHT Frontend.
    → S3 waere WELTWEIT ein Novum. Hohes Innovationsrisiko, aber auch First-Mover-Chance.

  message_2: |
    TX Group ist bereits mit ONE LOG voraus (One-ID implementiert).
    RMS muss mindestens S1 + One-ID umsetzen, um nicht in den Datennachteil zu geraten.
    → S1 ist nicht optional, sondern DEFENSIV NOTWENDIG.

  message_3: |
    Google AI Overviews sind fuer Beobachter EXISTENTIELL (53% SEO).
    Blick performt ueberdurchschnittlich (-6% vs. -17% Industrie).
    → Integration des Beobachter in eine staerkere Plattform ist Survival-Strategie.

  message_4: |
    NZZ mit ~200k Digital-Abos zeigt: Schweizer BEZAHLEN fuer Qualitaet.
    Blick+ mit 30k Subscribern hat massives Wachstumspotential.
    S2 (Super-Bundle) koennte diese Luecke schliessen.

  message_5: |
    Der Werbemarkt wird von Big Tech dominiert (~75% Google/Meta).
    Publisher-Anteil schrumpft. Abo-Erloese sind der einzige Wachstumspfad.
    → S2 (Abo-Bundle) ist strategisch ALIGNED mit dem Markttrend.
