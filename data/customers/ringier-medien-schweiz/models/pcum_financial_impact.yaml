    Die groesste Einzelunsicherheit ist Blick+ Bundle-Uptake.
    Bei 50k Subscribern (statt 65k) sinkt S2 um ~CHF 15M.
    → A/B-Test der Bundle-Bereitschaft ist hoechste Forschungsprioritaet.
