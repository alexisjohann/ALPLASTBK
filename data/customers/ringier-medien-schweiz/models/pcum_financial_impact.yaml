      lost_sessions: {low: 770000, mid: 1541000, high: 2568000}
    revenue_at_risk_chf_mio: {low: 0.5, mid: 1.5, high: 3.0}
    subscriber_churn_risk: |
      Weniger SEO-Sichtbarkeit → weniger Neukunden-Akquise
