    S2 generiert ueber 5 Jahre ~CHF 78M kumulativen Wert — DREIMAL so viel wie S1 (CHF 21M).
    Der Haupttreiber ist Blick+ Bundle-Wachstum (30k → 65k Subscriber).

  message_2: |
    S3 generiert ~CHF 56M — aber NUR wenn die Dreifach-Bedingung erfuellt wird.
    Ohne Editorial Resistance Management sinkt S3 auf CHF 20-30M (unter S1-Niveau!).

  message_3: |
    Polaris Habit-Fix hat den hoechsten ROI aller Massnahmen (3-6x im ersten Jahr).
    Bei geschaetzten CHF 300k Investment → CHF 1-3M p.a. wiederhergestellte Werbeerlöse.

  message_4: |
    S4 (Monobrand) vernichtet ~CHF 82M in 5 Jahren. Allein der Beobachter-Subscriber-Churn
    kostet CHF 9-15M. S4 ist unter KEINEM Szenario empfehlenswert.

