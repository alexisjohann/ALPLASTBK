# =============================================================================
# REVENUE-SCHAETZUNG BASELINE (Stand 2025/26)
# =============================================================================

revenue_baseline:
  method: "Bottom-Up Schaetzung aus oeffentlichen Datenpunkten"

  digital_advertising:
    description: "Werbeerloese ueber Ringier Advertising + AdUnit"
    estimation_basis: |
      - RMS-Portfolio: ~1.1 Mrd Sessions p.a.
      - Schweizer Display-CPM: CHF 8-15 (Premium-Publisher)
      - Programmatic-Anteil ~60% (tieferer CPM), Direct-Sales ~40%
      - Blended CPM geschaetzt: CHF 6-10
      - Fill Rate geschaetzt: 70-80%
      - Pageviews/Session: ~2.5 (Branchendurchschnitt CH-News)
    range_chf_mio:
      low: 40
      mid: 55
      high: 70
    confidence: "LOW — Revenue-Split nicht oeffentlich"
    note: |
      L3 (Werbevermarktung) ist BEREITS KONSOLIDIERT via Ringier Advertising.
      One-Platform-Szenarien betreffen primaer Data-Synergien (G3),
      nicht die Vermarktungsstruktur selbst.

  subscriptions:
    blickplus:
      subscribers: 30000  # Quelle: RMS/Patrick Rademacher, Feb 2026
      price_monthly_chf: 9.90
      annual_revenue_chf_mio: 3.6  # 30k × 9.90 × 12
      note: "Aktuell ~10% der Artikel hinter Paywall"
    beobachter:
      subscribers_total: 120000  # Quelle: RMS-Kommunikation
      subscribers_digital: 6000
      avg_annual_price_chf: 250  # Geschaetzt (Print+Digital)
      annual_revenue_chf_mio: 30.0  # 120k × 250
      note: "Primaer Print-Abos. Digital-Anteil waechst."
    bilanz:
      subscribers_total: null  # Nicht oeffentlich
      note: "Print-Abo via Ringier-Verlag, Preis ~CHF 290/Jahr"
      annual_revenue_chf_mio_estimate: 5.0  # LLMMC Prior, LOW confidence
    total_subscriptions_chf_mio:
      low: 35
      mid: 40
      high: 50
    confidence: "MEDIUM — Blick+ und Beobachter-Zahlen bekannt, Rest geschaetzt"

  print_and_other:
    description: "Print-Werbung, Events, Lizenzen, Sonderpublikationen"
    note: "Ausserhalb PCUM-Scope (Print ist nicht entscheidungsrelevant fuer One-Platform)"
    excluded_from_analysis: true

  total_digital_revenue_baseline:
    range_chf_mio:
      low: 75
      mid: 95
      high: 120
    note: "Digital Advertising + Subscriptions, ohne Print"

# =============================================================================
# SCENARIO IMPACT TRANSLATION
# =============================================================================
# Methodik: U_netto-Werte werden in relative Revenue-Veraenderungen uebersetzt.
# U_netto = 0.10 entspricht etwa +5-10% Revenue-Uplift auf den betroffenen
# Bereich. Die Relation ist NICHT linear — groessere U-Aenderungen haben
# abnehmende marginale Revenue-Effekte (konkav).
#
# Translation: Delta_Rev ≈ k × ln(1 + U_netto/alpha)
# Mit k = Baseline Revenue, alpha = Skalierungsparameter (~0.3)
# =============================================================================

