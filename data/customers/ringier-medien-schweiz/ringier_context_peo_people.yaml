    - "Titel-Identitaet > RMS-Identitaet: Mitarbeitende identifizieren sich mit Blick/HZ, nicht mit RMS"
    - "Super Desk als kultureller Katalysator fuer Cross-Title-Zusammenarbeit und KI-Adoption"
    - "Frauenanteil GL vorbildlich (38%); Chefredaktionen noch maennlich dominiert"
    - "Redaktionelle Unabhaengigkeit unter Beobachtung (Walder-Kontroverse nachwirkend)"
    - "KI-Adoption polarisiert: 25% Enthusiasten vs. 15% Verweigerer"

