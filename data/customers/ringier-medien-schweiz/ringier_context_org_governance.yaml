# =============================================================================
# ORG-STR: ORGANISATIONSSTRUKTUR (10 Faktoren)
# =============================================================================
ORG_STR:
  name: "Organisationsstruktur"
  factor_count: 10

  factors:
    RMS-ORG-STR-01:
      name: "Organisationsform"
      definition: "Grundlegende Organisationsstruktur der Division RMS innerhalb von Ringier AG"
      value: "divisional_matrix"
      year: 2026
      description: >
        RMS ist als Division der Ringier AG organisiert, mit Matrixstruktur
        zwischen redaktionellen Einheiten (Blick Newsroom, Magazine) und
        Querschnittsfunktionen (Advertising, Mediatech & Services, Digital).
        Seit Nov 2023 als eigenstaendige Division nach Rueckkauf der
        Axel-Springer-Anteile.
      divisions:
        - "Blick Newsroom (Super Desk)"
        - "Magazine (SI, Beobachter, Handelszeitung, Bilanz, etc.)"
        - "Ringier Advertising"
        - "Ringier Mediatech & Services"
        - "Audio & Video (konsolidiert seit 2025)"
      trend: "zunehmend integriert"
      source: "Ringier Medien Schweiz Website"

    RMS-ORG-STR-02:
      name: "Hierarchiestufen"
      definition: "Anzahl formeller Fuehrungsebenen von CEO bis Mitarbeiter"
      value: 4
      unit: "levels"
      year: 2026
      breakdown:
        - "GL (CEO, COO, CFO, CDO, CPO, Head AI Transformation)"
        - "Bereichsleiter / Chefredaktoren"
        - "Teamleiter / Ressortleiter / Desk Heads"
        - "Redakteure / Spezialisten / Mitarbeiter"
      benchmark_ch_media: 5
      flatness_score: 0.80
      description: "Relativ flache Hierarchie fuer ein Medienhaus dieser Groesse"
      source: "Eigene Analyse basierend auf oeffentlichen Organigrammen"

    RMS-ORG-STR-03:
      name: "Anzahl Geschaeftsleitungsmitglieder RMS"
      definition: "Groesse der erweiterten Geschaeftsleitung RMS"
      value: 8
      unit: "count"
      year: 2026
      composition:
        - "Ladina Heimgartner (CEO)"
        - "Markus Wirth (COO)"
        - "Lea Eberle (CFO)"
        - "Sandro Inguscio (CDO)"
        - "Stephanie Leue (CPO)"
        - "Roman Sigrist (Head Business & AI Transformation)"
        - "Rolf Cavalli (Chefredaktor Blick)"
        - "Daniel Egli (Leiter Audio & Video)"
      gender_ratio_female: 0.25
      avg_tenure_years: 2.5
      new_since_2025: 3
      description: "GL stark erneuert seit 2025 (COO, CFO, CPO neu)"
      trend: "Stabilisierung nach Umbauphase"
      source: "Ringier Medien Schweiz, persoenlich.com"

    RMS-ORG-STR-04:
      name: "Anzahl Organisationseinheiten"
      definition: "Formelle Organisationseinheiten unterhalb GL-Ebene"
      value: 12
      unit: "count"
      year: 2026
      breakdown:
        editorial:
          - "Blick Newsroom (Super Desk)"
          - "Magazin-Redaktionen (SI, Beobachter, HZ/Bilanz, etc.)"
          - "Audio & Video"
          - "Romandie-Redaktionen (L'Illustre, PME)"
        commercial:
          - "Ringier Advertising"
          - "AdUnit (ab Maerz 2026)"
        support:
          - "Ringier Mediatech & Services"
          - "Digital / Product & Tech"
          - "Finance & Controlling"
          - "HR / People"
          - "Strategy & Business Development"
          - "Business & AI Transformation"
      source: "Eigene Analyse"

    RMS-ORG-STR-05:
      name: "Mitarbeiterzahl RMS"
      definition: "Gesamtanzahl Mitarbeitende in der Division RMS"
      value: 1150
      unit: "FTE_approx"
      year: 2026
      breakdown:
        rms_core: 1000
        ringier_advertising: 150
        adunit_incoming: "~50 (ab Maerz 2026)"
      trend: "leicht steigend durch AdUnit-Integration"
      benchmark_note: "TX Group Medien-Segment ca. 1'800, CH Media ca. 1'500"
      source: "Ringier Jahresbericht 2024, Schaetzung"

    RMS-ORG-STR-06:
      name: "Span of Control GL"
      definition: "Durchschnittliche Fuehrungsspanne der GL-Mitglieder"
      value: 5
      unit: "direct_reports"
      year: 2026
      description: >
        Relativ enge Fuehrungsspanne auf GL-Ebene, bedingt durch
        die breite GL-Zusammensetzung (8 Mitglieder).
      benchmark_media: 6
      source: "Schaetzung"

    RMS-ORG-STR-07:
      name: "Matrix-Strukturen Anteil"
      definition: "Anteil Mitarbeitende mit Doppelzuordnung (fachlich + disziplinarisch)"
      value: 0.35
      unit: "ratio"
      year: 2026
      description: >
        Hoher Matrixanteil v.a. im Newsroom (Super Desk: Journalisten arbeiten
        Cross-Title), in Tech/Product (zentrale Teams fuer mehrere Marken)
        und Advertising (markenuebergreifende Vermarktung).
      high_matrix_areas:
        - "Super Desk (Cross-Title-Journalismus)"
        - "Product & Tech (zentrale Plattformen)"
        - "Ringier Advertising (alle Marken)"
      trend: "steigend"
      source: "Eigene Analyse"

    RMS-ORG-STR-08:
      name: "Zentralisierungsgrad"
      definition: "Grad der Zentralisierung von Funktionen und Entscheidungen"
      value: 0.60
      unit: "index"
      scale: "0-1 (1=vollstaendig zentral)"
      year: 2026
      centralized_functions:
        - "Technologie / Product & Tech"
        - "Werbevermarktung (Ringier Advertising)"
        - "Finance & Controlling"
        - "HR / People"
        - "AI Transformation"
      decentralized_functions:
        - "Redaktionelle Entscheide (Chefredaktion autonom)"
        - "Magazin-spezifische Inhalte"
        - "Romandie-Redaktionen"
      trend: "steigend (Super Desk zentralisiert Cross-Title)"
      source: "Eigene Einschaetzung"

    RMS-ORG-STR-09:
      name: "Agile Teams Anteil"
      definition: "Anteil Mitarbeitende in agilen Arbeitsformen (Scrum, Kanban, Squads)"
      value: 0.30
      unit: "ratio"
      year: 2026
      areas:
        - "Product & Tech (Squads)"
        - "Super Desk (agiler Newsroom-Workflow)"
        - "AI Transformation (Cross-funktionale Teams)"
      trend: "steigend"
      target_2027: 0.45
      description: "Newsroom Super Desk als agiles Steuerungsmodell ist Vorreiter"
      source: "Schaetzung"

    RMS-ORG-STR-10:
      name: "Reorganisationsfrequenz"
      definition: "Haeufigkeit groesserer organisatorischer Umstrukturierungen"
      value: "hoch"
      unit: "qualitative"
      year: 2026
      recent_changes:
        - date: "2023-11"
          description: "Gruendung RMS nach Rueckkauf Axel-Springer-Anteile"
        - date: "2024"
          description: "Content Hub aufgeloest, Audio/Video konsolidiert"
        - date: "2025"
          description: "Neue GL-Mitglieder (COO Wirth, CPO Leue), Sigrist → AI Transformation"
        - date: "2026-01"
          description: "Neue CFO (Lea Eberle), AdUnit-Integration vorbereitet"
      organizational_fatigue_risk: "mittel-hoch"
      description: >
        Sehr hohe Reorganisationsdichte seit Gruendung. Wichtig fuer
        Change-Management: Organisation braucht Stabilisierungsphase.
      source: "persoenlich.com, Handelszeitung"

# =============================================================================
# ORG-GOV: CORPORATE GOVERNANCE (12 Faktoren)
# =============================================================================
ORG_GOV:
  name: "Corporate Governance"
  factor_count: 12

  factors:
    RMS-ORG-GOV-01:
      name: "Eigentumsstruktur Ringier AG"
      definition: "Eigentumsverhaeltnisse der uebergeordneten Ringier AG"
      value: "familienunternehmen_100_prozent"
      year: 2026
      owner: "Familie Ringier"
      key_person: "Michael Ringier (VR-Praesident)"
      legal_form: "Nicht boersenkotiert, Familienbesitz"
      governance_impact: >
        Keine quartalsweisen Gewinnzwaenge, langfristige strategische
        Perspektive moeglich. Familiaere Werte praegen Unternehmenskultur.
        Michael Ringier persoenlich stark in strategische Richtungsentscheide
        involviert.
      description: "Ringier seit 1833 in Familienbesitz, 5. Generation"
      source: "Ringier Corporate Website"

    RMS-ORG-GOV-02:
      name: "Verwaltungsrat Ringier AG"
      definition: "Zusammensetzung und Groesse des VR der Muttergesellschaft"
      value: 7
      unit: "count"
      year: 2026
      president: "Michael Ringier"
      key_members:
        - "Michael Ringier (Praesident)"
        - "Marc Walder (CEO, Delegierter des VR)"
        - "Annabella Bassler"
        - "Robin Cornelius"
        - "Claudio Cisullo"
      independent_ratio: 0.43
      description: >
        Kleiner VR mit starkem Familien- und CEO-Einfluss.
        Michael Ringier und Marc Walder bilden das strategische Zentrum.
      source: "Ringier Jahresbericht 2024"

    RMS-ORG-GOV-03:
      name: "RMS Divisionsleitung Governance"
      definition: "Governance-Einbettung der Division RMS in Ringier AG"
      value: "division_mit_hoher_autonomie"
      year: 2026
      reporting_line: "CEO RMS (Heimgartner) → CEO Ringier AG (Walder)"
      autonomy_level: 0.70
      autonomous_areas:
        - "Redaktionelle Inhalte"
        - "Operative Entscheide"
        - "Personalentscheide (bis GL-1)"
      requires_group_approval:
        - "Strategische Investitionen >5 Mio CHF"
        - "M&A-Transaktionen"
        - "GL-Berufungen"
        - "Marken-Lancierungen / -Einstellungen"
      source: "Schaetzung basierend auf Medienbericht-Analyse"

    RMS-ORG-GOV-04:
      name: "Konzernleitung Ringier AG"
      definition: "Zusammensetzung der Konzernleitung (uebergeordnet zu RMS)"
      value: 6
      unit: "count_approx"
      year: 2026
      ceo: "Marc Walder"
      key_functions:
        - "CEO (Walder)"
        - "CFO Gruppe"
        - "CTO Gruppe"
        - "CEO RMS (Heimgartner)"
        - "CEO RSMG"
        - "CEO Marketplaces"
      note: "RMS ist eine von drei Hauptdivisionen"
      source: "Ringier Corporate Website, Schaetzung"

    RMS-ORG-GOV-05:
      name: "VR-Ausschuesse Ringier AG"
      definition: "Anzahl und Art der VR-Ausschuesse"
      value: 3
      unit: "count"
      year: 2026
      names:
        - "Audit & Risk Committee"
        - "Compensation Committee"
        - "Strategy Committee"
      note: >
        Weniger Ausschuesse als bei boersenkotierten Unternehmen ueblich,
        da keine regulatorische Pflicht (Privatunternehmen).
      source: "Schaetzung basierend auf Branchenpraxis"

    RMS-ORG-GOV-06:
      name: "GL-Sitzungen RMS pro Jahr"
      definition: "Haeufigkeit der Geschaeftsleitungs-Sitzungen der Division RMS"
      value: 48
      unit: "count"
      year: 2026
      frequency: "woechentlich"
      avg_duration_hours: 2
      format: "Praesenz + Remote (Hybrid)"
      additional_offsites: 4
      source: "Schaetzung basierend auf Medienhaus-Praxis"

    RMS-ORG-GOV-07:
      name: "Familien-Governance Einfluss"
      definition: "Grad des direkten Einflusses der Familie Ringier auf RMS"
      value: 0.55
      unit: "index"
      scale: "0-1 (1=volle operative Kontrolle durch Familie)"
      year: 2026
      description: >
        Michael Ringier ist strategisch praegend (Vision, Werte, Markenidentitaet)
        aber operativ weniger involviert. Marc Walder als langjähriger CEO
        fungiert als Scharnier zwischen Familie und operativem Geschaeft.
        Familiaere Langfristorientierung ermoeglicht Investitionen in
        Transformation ohne kurzfristigen Renditedruck.
      direct_involvement:
        - "Strategische Richtungsentscheide"
        - "M&A-Genehmigungen"
        - "CEO-Berufungen"
      delegated:
        - "Operative Fuehrung"
        - "Redaktionelle Inhalte"
        - "Personalentscheide"
      source: "Medienberichte, eigene Analyse"

    RMS-ORG-GOV-08:
      name: "Corporate Governance Transparenz"
      definition: "Grad der oeffentlichen Transparenz ueber Governance-Strukturen"
      value: 0.45
      unit: "index"
      scale: "0-1 (1=boersenkotierte Transparenz)"
      year: 2026
      published:
        - "Jahresbericht mit EBITDA und Umsatz"
        - "Konzernstruktur"
        - "Nachhaltigkeitsbericht"
      not_published:
        - "Detaillierte Segmentzahlen RMS"
        - "Einzelverguetungen"
        - "Detailliertes Organigramm"
      description: >
        Als Privatunternehmen keine Pflicht zur boersenkotierten Transparenz.
        Ringier publiziert dennoch freiwillig Jahresbericht mit Kennzahlen.
      benchmark_ch_private: 0.40
      source: "Ringier Jahresbericht 2024"

    RMS-ORG-GOV-09:
      name: "Strategische Planungszyklen"
      definition: "Planungshorizonte und -rhythmen der Division RMS"
      value: "jaehrlich_mit_3_jahres_rahmen"
      year: 2026
      cycles:
        long_term: "3-Jahres-Strategie (Ringier AG Level)"
        medium_term: "Jaehrl. Businessplan (RMS Division)"
        short_term: "Quartals-Reviews (GL-Sitzungen)"
        agile: "Monatliche OKR-Zyklen (einzelne Teams)"
      description: "Familienunternehmen erlaubt laengere Planungshorizonte als boersenkotiert"
      source: "Schaetzung"

    RMS-ORG-GOV-10:
      name: "Dual-Leadership Modell Newsroom"
      definition: "Governance-Modell der geteilten Fuehrung im Blick Newsroom"
      value: true
      year: 2026
      structure:
        editorial: "Rolf Cavalli (Chefredaktor Blick)"
        digital_distribution: "Sandro Inguscio (CDO)"
        audio_video: "Daniel Egli (Leiter Audio & Video, stv. Chefredaktor)"
      description: >
        Super Desk wird dual gefuehrt: Chefredaktion verantwortet
        redaktionelle Inhalte, CDO verantwortet digitale Distribution
        und Plattformstrategie. Dieses Modell ist typisch fuer moderne
        Newsrooms und erfordert klare Governance-Regeln.
      conflict_potential: "mittel"
      source: "persoenlich.com, Handelszeitung"

    RMS-ORG-GOV-11:
      name: "Nachfolgeplanung GL"
      definition: "Systematik der Nachfolgeplanung fuer Schlüsselpositionen"
      value: 0.50
      unit: "index"
      scale: "0-1"
      year: 2026
      recent_successions:
        - role: "COO"
          from: "Roman Sigrist"
          to: "Markus Wirth (extern, Goldbach)"
          year: 2025
        - role: "CFO"
          from: "Sascha Hilpert"
          to: "Lea Eberle"
          year: 2026
        - role: "Chefredaktor Blick"
          from: "Steffi Buchli"
          to: "Rolf Cavalli (intern)"
          year: 2025
      observation: >
        Mischung aus externen und internen Besetzungen. Hohe GL-Fluktuation
        2024-2026 deutet auf Transformationsphase hin. Nachfolgeplanung
        scheint eher reaktiv als systematisch.
      source: "persoenlich.com, Medienberichte"

    RMS-ORG-GOV-12:
      name: "Stakeholder-Governance RMS"
      definition: "Formelle Governance-Mechanismen gegenueber Stakeholdern"
      value: "informell_dominiert"
      year: 2026
      stakeholder_governance:
        employees: "Personalkommission, keine formelle Mitbestimmung"
        advertisers: "Key Account Management, kein formelles Advisory Board"
        public: "Presserat als Selbstregulierungsinstanz"
        regulators: "BAKOM-Compliance, Datenschutzbeauftragter"
        family: "Direkte Beziehung Walder-Ringier"
      formalization_level: 0.35
      description: >
        Governance stark auf informelle Kanaele (Familienunternehmen,
        persoenliche Netzwerke, direkte Fuehrung) ausgerichtet.
        Weniger formalisiert als bei boersenkotierten Medienkonzernen.
      source: "Eigene Analyse"

# =============================================================================
# ORG-PRO: PROZESSE (12 Faktoren)
# =============================================================================
ORG_PRO:
  name: "Prozesse"
  factor_count: 12

  factors:
    RMS-ORG-PRO-01:
      name: "Super Desk Workflow"
      definition: "Zentraler Newsroom-Steuerungsprozess (Blick)"
      value: "ai_augmented_super_desk"
      year: 2026
      description: >
        Das Super Desk ist das operative Herzstueck des Blick Newsrooms.
        Es steuert Cross-Title-Content-Produktion und -Distribution
        ueber alle Kanaele (Print, Web, App, Video, Social). Seit 2025
        mit KI-Augmentierung (Palantir-Partnerschaft): automatisierte
        Content-Priorisierung, Engagement-Prediction, Kanal-Allokation.
      process_steps:
        - "Story-Eingang (Agenturen, Reporter, Social Listening, KI-Alerts)"
        - "Triage am Super Desk (Relevanz, Kanaleignung, Dringlichkeit)"
        - "Content-Produktion (Text, Video, Audio, Grafik)"
        - "Multi-Channel-Distribution (Web-first, dann Print/Video/Social)"
        - "Performance-Tracking (Real-Time Analytics Dashboard)"
        - "Feedback-Loop (Engagement-Daten → naechste Story-Entscheide)"
      ai_integration:
        - "Automatische Themenerkennung"
        - "Engagement-Prediction fuer Headline-Varianten"
        - "Automatisierte Zusammenfassungen"
        - "Cross-Title Content-Empfehlungen"
      cycle_time_breaking_news: "< 15 Minuten"
      source: "Ringier Medien Schweiz, Medienberichte"

    RMS-ORG-PRO-02:
      name: "Cross-Title Content-Prozess"
      definition: "Prozess fuer markenuebergreifende Content-Nutzung"
      value: "systematisiert_seit_2024"
      year: 2026
      description: >
        Content kann zwischen Titeln geteilt werden (z.B. Blick-Recherche
        wird fuer Handelszeitung aufbereitet, SI-Interview wird auf Blick TV
        verwertet). Seit Auflosung des Content Hub direkter Austausch
        zwischen Redaktionen unter Koordination des Super Desk.
      participating_titles:
        - "Blick → Handelszeitung/Bilanz (Wirtschaftsthemen)"
        - "Blick → SI (People-Themen)"
        - "Blick → Audio/Video (Multimedia)"
        - "Beobachter → Blick (Konsumententhemen)"
      synergy_realization: 0.45
      target_synergy: 0.65
      trend: "steigend"
      source: "Eigene Analyse"

    RMS-ORG-PRO-03:
      name: "Werbevermarktung Prozess (Ringier Advertising)"
      definition: "End-to-End Prozess der Werbevermarktung fuer alle RMS-Marken"
      value: "integriert_crossmedial"
      year: 2026
      process_steps:
        - "Kundenkontakt / Briefing"
        - "Medienplanung (Cross-Channel: Print, Digital, Video, DOOH)"
        - "Angebotserstellung"
        - "Kampagnen-Setup (AdServer, Programmatic)"
        - "Durchfuehrung & Optimierung"
        - "Reporting & Abrechnung"
      channels:
        - "Print (Blick, SI, HZ, Magazine)"
        - "Digital (Display, Native, Programmatic)"
        - "Video (Blick TV, Pre-Roll)"
        - "Audio (Podcasts)"
        - "DOOH (Livesystems-Partnerschaft, 13'000 Screens)"
        - "Regionale Werbung (AdUnit, ab Maerz 2026)"
      automation_level: 0.55
      trend: "steigend (Programmatic, AdUnit-Integration)"
      source: "Ringier Advertising, Medienberichte"

    RMS-ORG-PRO-04:
      name: "Digital Subscription Prozess (Blick+)"
      definition: "Prozess fuer digitale Abonnement-Gewinnung und -Retention"
      value: "aufbauend"
      year: 2026
      current_subs: 25000
      process_steps:
        - "Paywall-Trigger (Freemium-Modell, metered)"
        - "Conversion Funnel (Landing Page, Trial, Payment)"
        - "Onboarding (Personalisierung, Newsletter)"
        - "Engagement (Push-Notifications, Empfehlungen)"
        - "Retention (Churn-Prediction, Re-Engagement)"
      churn_rate_monthly: 0.08
      arpu_chf: 15
      conversion_rate_visitor_to_trial: 0.02
      maturity: 0.40
      benchmark_note: "Deutlich hinter NZZ (~120k Abos) und Tages-Anzeiger"
      trend: "wachsend, hohe strategische Prioritaet"
      source: "Schaetzung basierend auf Marktdaten"

    RMS-ORG-PRO-05:
      name: "Audio & Video Produktionsprozess"
      definition: "Konsolidierter Produktionsprozess fuer Audio- und Video-Inhalte"
      value: "konsolidiert_seit_2025"
      year: 2026
      leader: "Daniel Egli"
      formats:
        - "Blick TV (Livestream, Clips)"
        - "Video-Reportagen"
        - "Podcasts (diverse Formate)"
        - "Social Video (TikTok, Instagram Reels)"
      production_workflow:
        - "Themenplanung (Teil des Super Desk)"
        - "Produktion (Studio + mobil)"
        - "Post-Production"
        - "Multi-Plattform-Distribution"
      daily_video_output: "50+ Clips"
      efficiency_gain_consolidation: "~20%"
      source: "persoenlich.com, Medienberichte"

    RMS-ORG-PRO-06:
      name: "Prozessautomatisierung Grad"
