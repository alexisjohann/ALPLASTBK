# =============================================================================
# ORG-ENT: ENTSCHEIDUNGSWEGE (8 Faktoren)
# =============================================================================
ORG_ENT:
  name: "Entscheidungswege"
  factor_count: 8

  factors:
    RMS-ORG-ENT-01:
      name: "Redaktionelle Unabhaengigkeit"
      definition: "Grad der Unabhaengigkeit redaktioneller Entscheide von Konzernleitung und Eigentuemern"
      value: 0.80
      unit: "index"
      scale: "0-1 (1=volle redaktionelle Autonomie)"
      year: 2026
      description: >
        Redaktionelle Inhalte werden autonom durch Chefredaktion entschieden.
        Kein direkter Eingriff durch Eigentuemer (Michael Ringier) oder
        Konzern-CEO (Marc Walder) in Tagesgeschaeft. Redaktionsstatut
        regelt Unabhaengigkeit formal. Allerdings: CEO-Kommunikationslinie
        auf Konzernebene (Marc Walder als oeffentliche Figur) kann
        impliziten Einfluss auf Tonalitaet haben.
      formal_guarantee: "Redaktionsstatut"
      presserat_mitglied: true
      source: "Branchenstandard, Medienberichte"

    RMS-ORG-ENT-02:
      name: "Investitionskompetenz RMS GL"
      definition: "Finanzielle Entscheidungskompetenz der GL RMS ohne Konzern-Genehmigung"
      value: 2000000
      unit: "CHF"
      year: 2026
      above_limit: "Genehmigung durch Konzernleitung Ringier AG erforderlich"
      major_investments: "VR-Genehmigung (M&A, neue Marken, >10 Mio CHF)"
      description: >
        Als Division (nicht eigenstaendige AG) hat RMS begrenzte
        autonome Investitionskompetenz. Groessere Entscheide gehen
        ueber Marc Walder / Konzernleitung.
      source: "Schaetzung basierend auf Divisionsstruktur"

    RMS-ORG-ENT-03:
      name: "Entscheidungsgeschwindigkeit operativ"
      definition: "Durchschnittliche Dauer fuer operative Entscheide"
      value: 0.75
      unit: "index"
      scale: "0-1 (1=sofort)"
      year: 2026
      fast_decisions:
        - "Redaktionelle Entscheide (Minuten-Takt im Newsroom)"
        - "Ad-Hoc-Kampagnen (1-2 Tage)"
        - "Social Media (sofort)"
      slow_decisions:
        - "IT-Projekte (Wochen-Monate)"
        - "Personalentscheide GL (Monate)"
        - "Strategische Investitionen (Monate)"
      description: >
        Medienbranche erfordert hohe operative Geschwindigkeit.
        Im Newsroom exzellent schnell, bei strukturellen Entscheiden
        typische Konzern-Langsamkeit.
      source: "Eigene Einschaetzung"

    RMS-ORG-ENT-04:
      name: "Dezentralisierung redaktionelle Entscheide"
      definition: "Grad der Delegation redaktioneller Entscheide an Desk Heads und Ressortleiter"
      value: 0.70
      unit: "index"
      year: 2026
      delegated:
        - "Tagesplanung (Desk Heads am Super Desk)"
        - "Story-Auswahl und -Priorisierung"
        - "Kanal-Zuweisung (Web, Print, Video)"
      requires_chefredaktion:
        - "Investigative Recherchen"
        - "Politisch sensitive Themen"
        - "Persoenlichkeitsrecht-Faelle"
        - "Cross-Title Schwerpunkte"
      trend: "stabil"
      source: "Newsroom-Branchenpraxis"

    RMS-ORG-ENT-05:
      name: "Gremien und Komitees RMS"
      definition: "Anzahl und Art formeller Entscheidungsgremien"
      value: 8
      unit: "count"
      year: 2026
      gremien:
        - name: "GL RMS"
          frequency: "woechentlich"
          scope: "Gesamtsteuerung Division"
        - name: "Chefredaktionskonferenz"
          frequency: "taeglich"
          scope: "Redaktionelle Tagesplanung"
        - name: "Product Board"
          frequency: "2-woechentlich"
          scope: "Digitale Produktentwicklung"
        - name: "Advertising Steering"
          frequency: "monatlich"
          scope: "Werbeumsatz, Kampagnen"
        - name: "Tech Review Board"
          frequency: "monatlich"
          scope: "IT-Architektur, Releases"
        - name: "AI Transformation Board"
          frequency: "2-woechentlich"
          scope: "KI-Projekte, Use Cases"
        - name: "Budget Review"
          frequency: "quartalsweise"
          scope: "Finanzplanung und -kontrolle"
        - name: "People Committee"
          frequency: "monatlich"
          scope: "Personalplanung, Entwicklung"
      source: "Schaetzung basierend auf Organisationsanalyse"

    RMS-ORG-ENT-06:
      name: "Eskalationswege"
      definition: "Formelle Eskalationsstufen fuer Konflikte und kritische Entscheide"
      value: 3
      unit: "levels"
      year: 2026
      stufen:
        - level: 1
          name: "Fachebene / Desk Head"
          scope: "Operative Konflikte, tagesaktuelle Entscheide"
          response_time: "Stunden"
        - level: 2
          name: "GL-Mitglied (CEO, COO, CDO)"
          scope: "Divisionale Konflikte, Ressourcenverteilung"
          response_time: "1-3 Tage"
        - level: 3
          name: "Konzernleitung Ringier AG"
          scope: "Strategische Konflikte, Markenentscheide, Krisen"
          response_time: "1-2 Wochen"
      special_case: >
        Bei akuten Medienkrisen (Rechtsstreitigkeiten, Gegendarstellungen):
        direkte Eskalation Chefredaktion → Rechtsabteilung → CEO.
      source: "Schaetzung"

    RMS-ORG-ENT-07:
      name: "Partizipationsgrad Mitarbeitende"
      definition: "Ausmass der Mitarbeiterbeteiligung an Entscheidungen"
      value: 0.40
      unit: "index"
      scale: "0-1"
      year: 2026
      mechanisms:
        - "Redaktionskonferenzen (offen fuer alle Redakteur:innen)"
        - "Town Halls (quartalsweise, CEO-Update)"
        - "Innovations-Pitches (KI-Ideen)"
        - "Mitarbeitendenumfrage (jaehrlich)"
      limitations:
        - "Keine formelle Mitbestimmung (kein Gesamtarbeitsvertrag Medien)"
        - "Strategische Entscheide top-down"
        - "Personalentscheide ohne Mitsprache"
      trend: "leicht steigend (agile Methoden, Town Halls)"
      source: "Schaetzung"

    RMS-ORG-ENT-08:
      name: "Autonomie Romandie-Redaktionen"
      definition: "Grad der Selbststaendigkeit der franzoesischsprachigen Titel"
      value: 0.60
      unit: "index"
      scale: "0-1"
      year: 2026
      titles: ["L'Illustre", "PME"]
      autonomous_in:
        - "Content-Auswahl und Themenplanung"
        - "Romandie-spezifische Berichterstattung"
        - "Lokale Werbepartnerschaften"
      integrated_with_deutschweiz:
        - "Technologie-Plattform (gemeinsam)"
        - "Werbevermarktung (Ringier Advertising)"
        - "Grosse Recherchen (Cross-Language)"
      description: >
        Romandie-Redaktionen haben kulturell bedingt hohe Autonomie,
        sind aber technologisch und kommerziell integriert.
      source: "Medienbranche Schweiz, Schaetzung"

# =============================================================================
# ORG-COM: COMPLIANCE & KONTROLLE (8 Faktoren)
# =============================================================================
ORG_COM:
  name: "Compliance & Kontrolle"
  factor_count: 8

  factors:
    RMS-ORG-COM-01:
      name: "Presserat-Compliance"
      definition: "Einhaltung der Richtlinien des Schweizer Presserats"
      value: 0.85
      unit: "index"
      scale: "0-1"
      year: 2026
      description: >
        Ringier Medien Schweiz ist Mitglied des Schweizer Presserats.
        Blick als Boulevardtitel hat historisch hoehere Beanstandungsrate
        als Qualitaetsmedien, haelt aber die wesentlichen journalistischen
        Grundsaetze ein. Beobachter hat exzellente Compliance.
      beanstandungen_letzte_5_jahre: "mehrere (Blick), wenige (Magazine)"
      mechanism: "Selbstregulierung Branche"
      pressekodex: "Erklaerung der Pflichten und Rechte der Journalistinnen und Journalisten"
      source: "presserat.ch, Medienberichte"

    RMS-ORG-COM-02:
      name: "Datenschutz-Compliance (DSG/DSGVO)"
      definition: "Einhaltung Schweizer DSG und EU-DSGVO fuer digitale Angebote"
      value: 0.75
      unit: "index"
      scale: "0-1"
      year: 2026
      relevance: >
        Sehr hoch: 4.6 Mio monatliche digitale Nutzer:innen, umfangreiche
        Datenerhebung fuer Personalisierung und Werbung, Programmatic
        Advertising erfordert Consent Management.
      measures:
        - "Cookie Consent Management (CMP)"
        - "Datenschutzbeauftragter bestellt"
        - "Privacy Policy fuer alle Plattformen"
        - "Data Processing Agreements mit Partnern"
      challenges:
        - "KI-Einsatz und Datenschutz (Palantir-Integration)"
        - "Cross-Device Tracking"
        - "Third-Party Cookie Deprecation"
      trend: "Investitionen steigend"
      source: "Schaetzung basierend auf Branchenstandards"

    RMS-ORG-COM-03:
      name: "Redaktionelle Richtlinien"
      definition: "Existenz und Durchsetzung interner redaktioneller Standards"
      value: true
      year: 2026
      guidelines:
        - name: "Redaktionsstatut"
          scope: "Unabhaengigkeit, Trennungsprinzip (Redaktion/Werbung)"
          enforcement: "hoch"
        - name: "KI-Richtlinien"
          scope: "Einsatz von KI in der Redaktion, Kennzeichnungspflicht"
          enforcement: "mittel (in Entwicklung)"
          note: "Ringier war eines der ersten CH-Medienhaeuser mit KI-Richtlinien"
        - name: "Social Media Policy"
          scope: "Verhalten von Mitarbeitenden auf Social Media"
          enforcement: "mittel"
        - name: "Quellenschutz"
          scope: "Schutz journalistischer Quellen"
          enforcement: "hoch"
      source: "Medienberichte, Branchenstandard"

    RMS-ORG-COM-04:
      name: "Qualitaetskontrolle Content"
      definition: "Systematik der redaktionellen Qualitaetssicherung"
      value: "mehrstufig"
      year: 2026
      mechanisms:
        - level: "Vor Publikation"
          measures:
            - "Gegenleser / Korrektorat (Print)"
            - "Faktencheck (bei sensiblen Themen)"
            - "Rechtscheck (Persoenlichkeitsrecht)"
        - level: "Nach Publikation"
          measures:
            - "Leserreaktionen-Monitoring"
            - "Social Media Feedback"
            - "Gegendarstellungsmanagement"
        - level: "Systematisch"
          measures:
            - "Quartalsweise Qualitaetsreviews"
            - "fög Medienqualitaets-Rating (extern)"
      foeg_rating_blick: "unterdurchschnittlich (Boulevard)"
      foeg_rating_beobachter: "ueberdurchschnittlich (Ratgeber)"
      source: "foeg.uzh.ch, Schaetzung"

    RMS-ORG-COM-05:
      name: "Werbe-Compliance (Trennungsprinzip)"
      definition: "Einhaltung der Trennung von redaktionellem und kommerziellem Inhalt"
      value: 0.75
      unit: "index"
      scale: "0-1"
      year: 2026
      description: >
        Das Trennungsprinzip (Werbung klar als solche erkennbar) ist
        Branchenstandard. Bei Native Advertising und Sponsored Content
        ist die Grenze manchmal duenn. Blick markiert Sponsored Content,
        aber die Flaeche nimmt zu.
      mechanisms:
        - "Kennzeichnung 'Sponsored', 'Anzeige', 'Publireportage'"
        - "Redaktionsstatut verbietet Einflussnahme auf Inhalte"
        - "Advertising Team getrennt von Redaktion"
      risk_areas:
        - "Native Advertising / Branded Content"
        - "Influencer-Kooperationen"
        - "Event-Sponsoring mit redaktioneller Begleitung"
      source: "lauterkeit.ch, Schaetzung"

    RMS-ORG-COM-06:
      name: "KI-Ethik und KI-Governance"
      definition: "Governance-Rahmen fuer den Einsatz von KI in Redaktion und Kommerz"
      value: 0.45
      unit: "index"
      scale: "0-1"
      year: 2026
      description: >
        Ringier hat als eines der ersten Schweizer Medienhaeuser
        KI-Richtlinien erlassen. Die Governance ist aber noch im Aufbau.
        Roman Sigrist (Head AI Transformation) verantwortet das Thema.
      existing_measures:
        - "KI-Richtlinien fuer Redaktion (Kennzeichnungspflicht)"
        - "Palantir-Partnerschaft mit Datenschutz-Auflagen"
        - "AI Transformation Board (regelmaessige Reviews)"
      gaps:
        - "Kein formelles KI-Ethik-Board"
        - "Begrenzte Transparenz ueber KI-Einsatz fuer Leser:innen"
        - "Schulungsprogramm fuer Redakteur:innen in Aufbau"
      eu_ai_act_relevance: "mittel (Medien als high-impact Bereich)"
      trend: "stark steigend"
      source: "Ringier Medien Schweiz, Medienberichte"

    RMS-ORG-COM-07:
      name: "Urheberrecht-Compliance"
      definition: "Einhaltung urheberrechtlicher Bestimmungen bei Content-Nutzung"
      value: 0.80
      unit: "index"
      scale: "0-1"
      year: 2026
      relevance: >
        Hoch: Bildrechte (Agenturen vs. User-Generated), Zitate,
        Content-Aggregation, KI-generierte Inhalte (Trainingsdata).
      measures:
        - "Lizenzvertraege mit Bildagenturen (Keystone-SDA, AFP, Reuters)"
        - "Rights Management System"
        - "Schulungen fuer Redakteur:innen"
      current_issues:
        - "KI-Training auf urheberrechtlich geschuetztem Material"
        - "Content-Scraping durch Dritte"
        - "Vergütung fuer Journalisten bei Cross-Title-Nutzung"
      source: "Branchenstandard, Schaetzung"

    RMS-ORG-COM-08:
      name: "Internes Kontrollsystem (IKS)"
      definition: "Formelles internes Kontrollsystem fuer finanzielle und operative Risiken"
      value: 0.65
      unit: "index"
      scale: "0-1"
      year: 2026
      description: >
        Als Division eines Privatunternehmens weniger formalisiert als
        bei boersenkotierten Medienkonzernen. Grundlegende Kontrollen
        vorhanden (4-Augen-Prinzip, Budgetkontrolle), aber kein
        SOX-aehnliches System.
      controls:
        - "Budgetprozess mit quartalsweisen Reviews"
        - "4-Augen-Prinzip fuer Zahlungen"
        - "Interne Revision (Ringier AG Ebene)"
        - "Externe Revision (Jahresabschluss Ringier AG)"
      not_implemented:
        - "Eigenstaendige interne Revision RMS"
        - "Detailliertes Risikomanagement-Framework"
        - "Compliance-Hotline / Whistleblower-System (unklar)"
      benchmark_note: "Tiefer als boersenkotierte Medien (TX Group), hoeher als Startups"
      source: "Schaetzung basierend auf Privatunternehmens-Praxis"

