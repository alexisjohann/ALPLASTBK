    RMS-ORG-PRO-09:
      name: "Magazin-Produktionsprozess"
      definition: "Produktionszyklus fuer Print-Magazine (SI, Beobachter, etc.)"
      value: "woechentlich_bis_monatlich"
      year: 2026
      cycles:
