  description: |
    Kontextvektor fuer finanzielle Aspekte von Ringier Medien Schweiz (RMS).
    Umfasst Ertragslage, Kostenstruktur, Profitabilitaet, Werbe- und
    Abo-Oekonomie, Digital vs Print Economics, Investitionen und
    Konzern-Kontext. RMS ist die Schweizer Mediendivision der Ringier AG
    und betreibt 20+ Medienmarken mit 4.6 Mio Reichweite.

    Hinweis: RMS publiziert keine separaten Finanzzahlen. Wo Einzelwerte
    nicht oeffentlich verfuegbar sind, werden fundierte Schaetzungen auf
    Basis der Ringier AG Konzernzahlen, Branchenbenchmarks und
    oeffentlichen Quellen verwendet. Diese sind als "Schaetzung" markiert.

  ebf_mapping:
