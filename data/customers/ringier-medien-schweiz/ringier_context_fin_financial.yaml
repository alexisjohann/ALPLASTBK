      - "WHERE"    # Parameter & Kennzahlen
      - "WHEN"     # Kontext-abhaengige Finanzdynamik
    primary_psi:
      - "Psi_E"    # Oekonomischer Kontext (Ressourcen)
      - "Psi_T"    # Temporaler Kontext (Medien-Strukturwandel)

