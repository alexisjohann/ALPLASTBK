  name: "Ringier Medien Schweiz Market Context Vector"
  category: "MKT"
  category_name: "Markt & Wettbewerb"
  layer: "meso"
  version: "1.0.0"
  last_updated: "2026-02-06"
  total_factors: 60
  customer_ref: "data/customers/ringier-medien-schweiz/ringier_profile.yaml"

  description: |
    Kontextvektor fuer Markt und Wettbewerb von Ringier Medien Schweiz (RMS).
    Umfasst Reichweite & Audience, Wettbewerber, Werbemarkt, Kundenstruktur,
    Produktportfolio und Vertriebskanaele im Schweizer Medienmarkt.
    RMS erreicht 4.6 Mio. Nutzer:innen (>50% der Schweizer Bevoelkerung)
    ueber 20+ Medienmarken in Deutsch und Franzoesisch.

  ebf_mapping:
    primary_10c:
      - "AWARE"    # Reichweite & Wahrnehmung
      - "WHAT"     # Nutzungsmotive & Werbewirkung
      - "WHEN"     # Nutzungskontext & Timing
      - "WHO"      # Zielgruppen-Segmentierung
    primary_psi:
      - "kappa_TECH"   # Digitale Transformation
      - "kappa_SOCIAL" # Mediennutzungsmuster
      - "kappa_ECON"   # Werbemarkt-Oekonomie

