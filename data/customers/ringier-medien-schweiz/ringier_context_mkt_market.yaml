      competitive_intensity: 0.85
      strengths:
        - "20 Minuten: hoechste Pendler-Reichweite CH"
        - "Tages-Anzeiger: Qualitaetssegment Deutschschweiz"
        - "Goldbach Advertising: Starke Vermarktung"
        - "Starke Rubrikenportale (Homegate, Tutti, Jobs.ch)"
      weaknesses:
