metadata:
  model_id: RMS001-ODE-v1.0
  model_name: Digital Transformation Behavior Dynamics
  created: '2026-02-16'
  method: LLMMC + Bayesian Update (from CVA + Strategy Session)
  context_factors_used: 262
  literature_sources: 8
  session_ref: EBF-S-2026-02-13-MED-001
utility_growth_rates:
  alpha_F:
    name: Financial Utility Growth
    prior_source: PwC Media Outlook 2025-2029, Subscription Economy Index
    prior_mean: 0.06
    context_adjustment: +0.02 (KI-Lizenzierung als neuer Erloesstrom)
    posterior_mean: 0.08
    ci_95:
    - 0.05
    - 0.11
    unit: per month
    interpretation: Revenue diversification builds slowly but steadily
  alpha_E:
    name: Emotional Utility Growth
    prior_source: Kahneman (2011), Newsroom culture studies
    prior_mean: 0.14
    context_adjustment: +0.04 (Medien = Leidenschaftsbranche, hohe Identifikation)
    posterior_mean: 0.18
    ci_95:
    - 0.12
    - 0.24
    unit: per month
    interpretation: Emotional engagement high - journalism as calling, not just job
  alpha_P:
    name: Physical/Effort Utility Growth
    prior_source: Deci & Ryan (2000), Digital workflow studies
    prior_mean: 0.05
    context_adjustment: +0.01 (35% Automation bereits = Effort sinkt)
    posterior_mean: 0.06
    ci_95:
    - 0.03
    - 0.09
    unit: per month
    interpretation: Digital workflows gradually reduce physical production effort
  alpha_S:
    name: Social Utility Growth
    prior_source: Cialdini (2007), Organizational culture
    prior_mean: 0.10
    context_adjustment: +0.02 (Redaktionskultur stark, aber ambivalent bei Transformation)
    posterior_mean: 0.12
    ci_95:
    - 0.08
    - 0.16
    unit: per month
    interpretation: Team culture amplifies when aligned, resists when threatened
  alpha_D:
    name: Development Utility Growth
    prior_source: Dweck (2006), KI-Kompetenzaufbau
    prior_mean: 0.10
    context_adjustment: +0.04 (40 KI-Use-Cases produktiv = Lernkultur existiert)
    posterior_mean: 0.14
    ci_95:
    - 0.09
    - 0.19
    unit: per month
    interpretation: High learning rate due to KI-First strategy and existing pilots
  alpha_X:
    name: Existential Utility Growth
    prior_source: Frankl (1959), Purpose in journalism
    prior_mean: 0.06
    context_adjustment: +0.02 (Journalismus-Mission unter Druck = Purpose-Reflexion)
    posterior_mean: 0.08
    ci_95:
    - 0.04
    - 0.12
    unit: per month
    interpretation: Existential pressure from industry disruption forces purpose clarity
utility_decay_rates:
  delta_F:
    name: Financial Utility Decay
    posterior_mean: 0.05
    ci_95:
    - 0.03
    - 0.07
    unit: per month
    interpretation: Revenue setbacks linger (declining print visible quarterly)
  delta_E:
    name: Emotional Utility Decay
    posterior_mean: 0.10
    ci_95:
    - 0.07
    - 0.13
    unit: per month
    interpretation: Emotional engagement fades fast without visible wins
  delta_P:
    name: Physical Utility Decay
    posterior_mean: 0.03
    ci_95:
    - 0.02
    - 0.04
    unit: per month
    interpretation: Digital workflows once established persist
  delta_S:
    name: Social Utility Decay
    posterior_mean: 0.07
    ci_95:
    - 0.05
    - 0.09
    unit: per month
    interpretation: Team cohesion needs constant nurturing during transformation
  delta_D:
    name: Development Utility Decay
    posterior_mean: 0.05
    ci_95:
    - 0.03
    - 0.07
    unit: per month
    interpretation: Digital skills decay without ongoing practice
  delta_X:
    name: Existential Utility Decay
    posterior_mean: 0.03
    ci_95:
    - 0.02
    - 0.04
    unit: per month
    interpretation: Journalism purpose deeply held, slow to erode
complementarities:
  gamma_SX:
    name: Social x Existential
    posterior_mean: 0.25
    ci_95:
    - 0.15
    - 0.35
    interpretation: Redaktions-Mission verstaerkt Purpose, aber schwaecher als Zindel (kein Familienunternehmen)
    source: Grant (2013), Prosocial motivation in teams
  gamma_DX:
    name: Development x Existential
    posterior_mean: 0.35
    ci_95:
    - 0.25
    - 0.45
    interpretation: KI-Lernen verstaerkt Zukunftsvision stark
    source: Deci & Ryan (2000), SDT
  gamma_FS:
    name: Financial x Social
    posterior_mean: -0.20
    ci_95:
    - -0.30
    - -0.10
    interpretation: ACHTUNG STAERKER als Zindel - Sparrunden in Medien zerstoeren Teamkultur direkt
    source: Frey & Jegen (2001), Crowding-out + Media industry layoff studies
  gamma_SD:
    name: Social x Development
    posterior_mean: 0.30
    ci_95:
    - 0.20
    - 0.40
    interpretation: Team-Lernen in Redaktionen verstaerkt sich (Peer Learning stark)
    source: Bandura (1977), Social learning
  gamma_FP:
    name: Financial x Physical
    posterior_mean: 0.15
    ci_95:
    - 0.05
    - 0.25
    interpretation: Effizienzgewinne motivieren Aufwandsreduktion
    source: Behavioral economics standard
  gamma_ED:
    name: Emotional x Development
    posterior_mean: 0.25
    ci_95:
    - 0.15
    - 0.35
    interpretation: Leidenschaft fuer Journalismus treibt Lernbereitschaft
    source: Fredrickson (2001), Broaden-and-build
process_dynamics:
  beta_adoption:
    name: Adoption Rate (S-Curve)
    prior_source: Bass (1969), Rogers (2003)
    prior_mean: 0.35
    context_adjustment: +0.05 (Ladina Heimgartner als CEO-Sponsorin, KI-First)
    posterior_mean: 0.40
    ci_95:
    - 0.28
    - 0.52
    unit: per month
    interpretation: Moderate adoption rate - media moves fast but buy-in needed
  rho_resistance_decay:
    name: Resistance Decay Rate
    prior_source: Rogers (2003), Journalismus-Kulturstudien
    prior_mean: 0.025
    context_adjustment: +0.005 (KI-Erfolge sichtbar, 40 Use Cases)
    posterior_mean: 0.03
    ci_95:
    - 0.02
    - 0.04
    unit: per month
    interpretation: Journalist resistance decays slower than construction - cultural identity
  r_setback_sensitivity:
    name: Setback Sensitivity
    posterior_mean: 0.20
    ci_95:
    - 0.15
    - 0.25
    unit: per event
    interpretation: High - media professionals are sensitive to visible failures (public scrutiny)
  eta_habit_formation:
    name: Habit Formation Rate
    prior_source: Lally et al. (2010)
    prior_mean: 0.015
    context_adjustment: None (robust finding)
    posterior_mean: 0.015
    ci_95:
    - 0.01
    - 0.02
    unit: per day
    monthly_equivalent: 0.40
    interpretation: Newsroom deadline culture helps habit formation
  mu_momentum:
    name: Momentum Build-up
    posterior_mean: 0.10
    ci_95:
    - 0.07
    - 0.13
    unit: per success event
    interpretation: Media loves success stories - momentum builds fast
  friction:
    name: Momentum Friction
    posterior_mean: 0.06
    ci_95:
    - 0.04
    - 0.08
    unit: per month
    interpretation: But momentum also decays fast in 24h news cycle
stage_thresholds:
  theta_1:
    name: Foundation -> Implementation
    posterior_mean: 0.20
    ci_95:
    - 0.15
    - 0.25
    interpretation: Readiness >20% triggers implementation (faster than construction)
    expected_timing: End of Month 2 (April 2026)
  theta_2:
    name: Implementation -> Scaling
    posterior_mean: 0.50
    ci_95:
    - 0.45
    - 0.55
    interpretation: Readiness >50% triggers scaling phase
    expected_timing: End of Month 6 (August 2026)
  theta_3:
    name: Scaling -> Platform Transformation
    posterior_mean: 0.75
    ci_95:
    - 0.70
    - 0.80
    interpretation: Readiness >75% enables full platform transformation
    expected_timing: End of Month 10 (Dezember 2026)
