    interpretation: HIGH cognitive load - daily news production + transformation simultaneously
    rms_specific: Newsroom-Stress + Transformationsdruck
  alpha_psi_K:
    name: Cultural Context Elasticity
    posterior_mean: 0.90
    ci_95:
