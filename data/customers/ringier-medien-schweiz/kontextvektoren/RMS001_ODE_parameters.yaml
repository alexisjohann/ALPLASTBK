    rms_specific: Strategiefenster 2026-2028 = maximale Zeitdringlichkeit
  alpha_psi_M:
    name: Material Context Elasticity
    posterior_mean: 0.95
    ci_95:
    - 0.75
    - 1.15
    interpretation: Good tech infrastructure (KI-First, 40 Use Cases, OneLog)
    rms_specific: Bereits KI-Vorreiter in CH
  alpha_psi_F:
    name: Physical Context Elasticity
    posterior_mean: 0.65
    ci_95:
    - 0.45
    - 0.85
    interpretation: Digital-first company - physical environment less constraining
initial_conditions:
