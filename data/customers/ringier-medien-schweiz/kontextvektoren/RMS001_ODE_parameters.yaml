    interpretation: Moderate resistance - KI-friendly leadership but cultural inertia in newsrooms
    rms_context: Journalism culture = Identitaet, Aenderung bedroht Selbstverstaendnis
  Habit_0:
    name: Initial Habit Strength
    posterior_mean: 0.10
