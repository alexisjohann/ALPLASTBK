    - 0.15
    interpretation: Some digital habits established (automation workflows)
  Momentum_0:
    name: Initial Momentum
    posterior_mean: 0.15
    ci_95:
    - 0.10
    - 0.20
    interpretation: 40 KI-Use-Cases + KI-Vorreiter-Status = momentum exists
  Decision_0:
    name: Initial Decision Capability
    posterior_mean: 0.25
    ci_95:
    - 0.15
    - 0.35
    interpretation: Strategic decisions pending - RMS at Scheideweg, 3 Sofortentscheidungen offen
intervention_effects:
  INT-RMS-001:
    name: KI-Deal Sofortentscheidung (Q2)
    effects_when_removed:
      alpha_D_multiplier: 0.6
      mu_momentum_multiplier: 0.7
    interpretation: >
      Without KI licensing deal, development growth drops 40% and
      momentum building slows 30%. Key revenue diversification blocked.
  INT-RMS-002:
    name: Buendel-Abo Launch (Q3)
    effects_when_removed:
      alpha_F_multiplier: 0.5
      alpha_S_multiplier: 0.8
    interpretation: >
      Without bundled subscription, financial growth halved and
      social utility reduced (less team alignment on product).
  INT-RMS-003:
    name: Plattform-Transformation (Q4)
    effects_when_removed:
      beta_adoption_multiplier: 0.6
      alpha_E_multiplier: 0.7
    interpretation: >
      Without platform transformation, adoption rate drops 40% and
      emotional engagement reduced (no visible transformation wins).
  INT-RMS-004:
    name: Redaktions-Identitaetsprogramm
    effects_when_removed:
      rho_resistance_multiplier: 0.5
      alpha_S_multiplier: 0.7
    interpretation: >
      Without identity program, resistance decays 50% slower and
      social utility growth drops 30%. Journalistic identity remains threatened.
