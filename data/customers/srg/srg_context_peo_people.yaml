# =============================================================================
# VERHALTENSPARAMETER (EBF)
# =============================================================================

behavioral_parameters:

  # Aggregiert aus SRG017 Befragung
  core:
    loss_aversion:
      symbol: "lambda"
      value: 2.40
      range: [2.0, 2.8]
      note: "Angst vor Stellenabbau, Veraenderungswiderstand"

    identity_utility:
      symbol: "U_IDN"
      value: 0.715
      note: "Identity-Index → Willingness (staerkster Praediktor!)"
      source: "SRG017 H5.2"

    social_proof:
      symbol: "sigma"
      value: null
      note: "Teamzusammenhalt, Kollegialitaet"

    change_readiness:
      symbol: "theta_change"
      value: null
      note: "Willingness-Index (abhaengige Variable)"
      source: "SRG017"

  # Aus SRG017 Hypothesen-Tests
  srg017_befunde:
    leadership_index:
      mit_fuehrung: 0.58
      ohne_fuehrung: 0.56
      differenz: 0.02
      signifikant: false
      note: "H1.1: Kein Unterschied nach Fuehrungsverantwortung"

    awareness_index:
      mit_fuehrung: 3.74
      ohne_fuehrung: 3.52
      differenz: 0.22
      signifikant: true
      note: "H3.1: Fuehrungskraefte besser informiert (p < .001)"

    unsicherheits_score:
      mit_fuehrung: 3.95
      ohne_fuehrung: 3.90
      differenz: 0.05
      signifikant: false
      note: "H2.1: Kein Unterschied nach Fuehrungsverantwortung"

    regressionskoeffizienten:
      leadership_to_willingness: 0.378
      awareness_to_willingness: 0.430
      awareness_to_uncertainty: 0.351
      leadership_to_health: 0.366
      health_to_willingness: 0.418
      leadership_to_identity: 0.358
      identity_to_willingness: 0.715  # STAERKSTER EFFEKT

    kernbefund: |
      Identity-Index ist mit β = 0.715 der staerkste Praediktor fuer
      Willingness (Veraenderungsbereitschaft). Identifikation mit der
      SRG-Mission ist der wichtigste Hebel fuer Change Readiness.

  # Nach Segment differenziert
  by_segment:
    note: "Detaillierte Segmentanalyse in hypothesen_ergebnisse.yaml"
    reference: "data/customers/srg/SRG017/hypothesen_ergebnisse.yaml"

