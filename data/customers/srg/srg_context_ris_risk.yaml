metadata:
  code: "BCM2_SRG_RIS"
  name: "SRG Risk & Compliance Context Vector"
  category: "RIS"
  layer: "meso"
  version: "1.0"
  last_updated: "2026-02-03"
  total_factors: 35
  customer_ref: "data/customers/srg/srg_profile.yaml"

  description: |
    Kontextvektor fuer Risiko- und Compliance-Aspekte der SRG SSR.
    Umfasst regulatorische, politische, finanzielle und operationelle
    Risiken sowie Compliance-Anforderungen.

  ebf_mapping:
    primary_10c:
      - "WHEN"    # Risiko-Timing
      - "WHERE"   # Risiko-Parameter
    primary_psi:
      - "psi_I"   # Institutioneller Kontext
      - "psi_T"   # Temporaler Kontext

# =============================================================================
# RIS-REG: REGULATORISCHE RISIKEN (~10 Faktoren)
# =============================================================================

ris_regulatorisch:

  - id: "RIS-REG-001"
    name: "Konzessionsrisiko"
    description: "Risiko des Konzessionsentzugs oder -einschraenkung"
    probability: 0.05
    impact: "kritisch"
    mitigation: "Konzessionspflichten erfuellen"
    source: "BAKOM"

  - id: "RIS-REG-002"
    name: "Konzessionsdauer"
    value: 2028
    unit: "Jahr"
    note: "Aktuelle Konzession bis 2028"
    renewal_process: "ab 2026"

  - id: "RIS-REG-003"
    name: "BAKOM-Aufsicht"
    description: "Regulatorische Aufsicht durch BAKOM"
    intensity: "hoch"
    inspections_per_year: 4
    compliance_rate: 0.98

  - id: "RIS-REG-004"
    name: "Leistungsauftrag-Compliance"
    value: 0.95
    unit: "Ratio"
    note: "Erfuellungsgrad Service Public"
    target: 1.00

  - id: "RIS-REG-005"
    name: "Werberegulierung"
    description: "Werbezeitbeschraenkungen"
    max_minutes_per_hour: 12
    restrictions:
      - "Keine Alkoholwerbung vor 21h"
      - "Keine Tabakwerbung"
      - "Sponsoring-Regeln"

  - id: "RIS-REG-006"
    name: "Datenschutz-Compliance"
    framework: "DSG / DSGVO"
    compliance_level: "hoch"
    dpo_appointed: true

  - id: "RIS-REG-007"
    name: "Barrierefreiheit-Anforderungen"
    description: "Untertitelung, Gebaerdensprache"
    compliance_target: 0.80
    current_level: 0.65
    gap: 0.15

  - id: "RIS-REG-008"
    name: "Medienkartellrecht"
    description: "Wettbewerbsrechtliche Einschraenkungen"
    regulator: "WEKO"
    risk_level: "mittel"

  - id: "RIS-REG-009"
    name: "Urheberrecht-Compliance"
    description: "Lizenzierung von Inhalten"
    annual_disputes: null
    compliance_process: "etabliert"

  - id: "RIS-REG-010"
    name: "EU-Regulierung Auswirkungen"
    description: "Indirekte Auswirkungen von EU-Medienrecht"
    relevance: "mittel"
    note: "Digital Services Act, AI Act"

# =============================================================================
# RIS-POL: POLITISCHE RISIKEN (~10 Faktoren)
# =============================================================================

ris_politisch:

  - id: "RIS-POL-001"
    name: "Halbierungsinitiative"
    description: "Volksinitiative zur Halbierung der Medienabgabe"
    status: "haengig"
    abstimmung: "2026-03-08"
    probability_ja: 0.35
    impact_if_ja: "kritisch"

  - id: "RIS-POL-002"
    name: "Politische Polarisierung"
    description: "Links-Rechts Spaltung bei SRG-Themen"
    intensity: "hoch"
    trend: "zunehmend"
    note: "SVP-Kritik vs. links-gruene Unterstuetzung"

  - id: "RIS-POL-003"
    name: "Parlamentarische Vorstoesse"
    description: "Anzahl SRG-kritischer Vorstoesse pro Jahr"
    value: 15
    unit: "Vorstoesse p.a."
    trend: "stabil"

  - id: "RIS-POL-004"
    name: "Bundesrats-Haltung"
    description: "Aktuelle Regierungsposition zur SRG"
    position: "unterstuetzend"
    note: "Bundesrat empfiehlt NEIN zur Initiative"

  - id: "RIS-POL-005"
    name: "Reputationsrisiko Politik"
    description: "Wahrnehmung als 'staatsnahe' vs. 'unabhaengig'"
    risk_level: "mittel"
    mitigation: "Transparenz, Unabhaengigkeit betonen"

  - id: "RIS-POL-006"
    name: "Regionale Politische Risiken"
    description: "Unterschiedliche Haltung nach Sprachregion"
    pattern:
      deutschschweiz: "kritischer"
      romandie: "unterstuetzender"
      svizzera_italiana: "unterstuetzend"

  - id: "RIS-POL-007"
    name: "Internationale Medientrends"
    description: "Europaeische Trends bei oeffentl. Rundfunk"
    trend: "Druck zunehmen"
    examples:
      - "BBC Lizenzdebatte UK"
      - "ORF-Reform Oesterreich"
      - "ARD/ZDF Debatte Deutschland"

  - id: "RIS-POL-008"
    name: "Demokratie-Legitimation"
    description: "Gesellschaftliche Akzeptanz des Modells"
    support_level: 0.55
    note: "Knappe Mehrheit unterstuetzt SRG"

  - id: "RIS-POL-009"
    name: "Generationenkonflikt"
    description: "Juengere Generation nutzt SRG weniger"
    risk: "Legitimationserosion"
    age_gap:
      under_35_support: 0.42
      over_55_support: 0.68

  - id: "RIS-POL-010"
    name: "Medienkritik-Intensitaet"
    description: "Staerke der oeffentlichen Medienkritik"
    level: "mittel-hoch"
    hauptkritikpunkte:
      - "Zu teuer"
      - "Zu links"
      - "Nicht mehr zeitgemaess"

# =============================================================================
# RIS-FIN: FINANZIELLE RISIKEN (~8 Faktoren)
# =============================================================================

ris_finanziell:

  - id: "RIS-FIN-001"
    name: "Gebuehrensenkungsrisiko"
    description: "Risiko weiterer Abgabensenkungen"
    probability: 0.60
    scenarios:
      - "200 CHF (Initiative)"
      - "280 CHF (Kompromiss)"
      - "300 CHF (moderate Senkung)"

  - id: "RIS-FIN-002"
    name: "Werbemarkt-Erosion"
    description: "Rueckgang der Werbeeinnahmen"
    annual_decline: -0.05
    driver: "Digital-Shift zu Google/Meta"
    forecast_2030: 120
    unit: "Mio CHF"

  - id: "RIS-FIN-003"
    name: "Kostenexplosion"
    description: "Risiko unkontrollierter Kostensteigerungen"
    risk_areas:
      - "Personalkosten (+3% p.a.)"
      - "Sportrechte (volatil)"
      - "IT/Digital (steigend)"

  - id: "RIS-FIN-004"
    name: "Liquiditaetsrisiko"
    description: "Kurzfristige Zahlungsfaehigkeit"
    risk_level: "tief"
    reserves_months: 6
    note: "Solide Liquiditaetsposition"

  - id: "RIS-FIN-005"
    name: "Pensionskassen-Risiko"
    description: "Unterdeckung Vorsorgeeinrichtungen"
    deckungsgrad: null
    note: "Historisch relevant bei SRG"

  - id: "RIS-FIN-006"
    name: "Waehrungsrisiko"
    description: "Fremdwaehrungsexposure"
    exposure: "mittel"
    hauptwaehrungen:
      - "EUR (Sportrechte)"
      - "USD (Lizenzen)"

  - id: "RIS-FIN-007"
    name: "Investitions-Stau"
    description: "Risiko aufgeschobener Investitionen"
    risk_level: "mittel"
    affected_areas:
      - "Studioinfrastruktur"
      - "IT-Modernisierung"
      - "Archivdigitalisierung"

  - id: "RIS-FIN-008"
    name: "Break-Even-Sensitivitaet"
    description: "Wie schnell wird Verlust bei Einnahmenrueckgang?"
    break_even_fee: 310
    unit: "CHF"
    current_fee: 335
    buffer: 25

# =============================================================================
# RIS-OPE: OPERATIONELLE RISIKEN (~7 Faktoren)
# =============================================================================

ris_operationell:

  - id: "RIS-OPE-001"
    name: "Transformationsrisiko Enavant"
    description: "Risiko des Scheiterns der Transformation"
    probability: 0.20
    impact: "hoch"
    mitigations:
      - "Agiles Vorgehen"
      - "Change Management"
      - "Kommunikation"

  - id: "RIS-OPE-002"
    name: "Fachkraeftemangel"
    description: "Schwierigkeit, Talente zu gewinnen"
    risk_level: "mittel-hoch"
    kritische_bereiche:
      - "IT/Digital"
      - "Data Science"
      - "Produktmanagement"

  - id: "RIS-OPE-003"
    name: "Brain Drain"
    description: "Abwanderung von Schluesselkraeften"
    annual_turnover: 0.08
    critical_positions_at_risk: null
    note: "Durch Transformation verstaerkt"

  - id: "RIS-OPE-004"
    name: "Cyber-Security"
    description: "IT-Sicherheitsrisiken"
    risk_level: "hoch"
    incidents_per_year: null
    note: "Als Medienunternehmen besonders exponiert"

  - id: "RIS-OPE-005"
    name: "Sendeausfall-Risiko"
    description: "Technische Ausfaelle"
    availability_target: 0.9999
    current_availability: 0.9995
    redundancy: "vorhanden"

  - id: "RIS-OPE-006"
    name: "Change Fatigue"
    description: "Ermuedung durch staendigen Wandel"
    risk_level: "mittel-hoch"
    indicator: "PEO-CHA-003"
    note: "Direkt relevant fuer SRG017"

  - id: "RIS-OPE-007"
    name: "Kulturelle Fragmentierung"
    description: "Risiko der Silobildung zwischen Regionen"
    risk_level: "mittel"
    affected_units:
      - "SRF vs. RTS"
      - "RSI Sonderrolle"
      - "RTR Ressourcen"

