# =============================================================================
# SRG017 - HYPOTHESEN-ERGEBNISSE PERSONALBEFRAGUNG
# =============================================================================
# Version: 1.0.0
# Framework: EBF Evidence-Based Framework
# Projekt: SRG017 Personalbefragung
# Created: 2026-02-02
# =============================================================================

metadata:
  project_id: "SRG017"
  name: "Hypothesen-Ergebnisse Personalbefragung"
  analysis_date: "2026-02-02"
  analyst: null  # Bitte ergänzen
  sample_size: null  # Bitte ergänzen

# =============================================================================
# INDIZES (KONSTRUKTE)
# =============================================================================

indizes:
  - id: "IDX-LEAD"
    name: "Leadership-Index"
    description: "Wahrnehmung der Fuehrungsqualitaet"
    scale: "0-1 oder 1-5"  # Bitte spezifizieren
    ebf_dimension: "WHAT_S"
    note: "Unabhaengige Variable fuer H1.2, H4.1, H5.1"

  - id: "IDX-WILL"
    name: "Willingness-Index"
    description: "Veraenderungsbereitschaft / Handlungsbereitschaft"
    scale: null
    ebf_dimension: "READY"
    note: "Zentrale abhaengige Variable"

  - id: "IDX-AWARE"
    name: "Awareness-Index"
    description: "Bewusstsein / Informiertheit"
    scale: null
    ebf_dimension: "AWARE"
    note: "Unabhaengige Variable fuer H2.2, H3.2"

  - id: "IDX-UNCERT"
    name: "Unsicherheits-Score"
    description: "Wahrgenommene Unsicherheit"
    scale: "1-5 (hoeher = mehr Unsicherheit)"
    ebf_dimension: "WHAT_F"
    note: "Abhaengige Variable fuer H2.1, H2.2"

  - id: "IDX-HEALTH"
    name: "Health-Index"
    description: "Organisationale Gesundheit / Wohlbefinden"
    scale: null
    ebf_dimension: "WHAT"
    note: "Mediator zwischen Leadership und Willingness"

  - id: "IDX-IDENT"
    name: "Identity-Index"
    description: "Identifikation mit der Organisation"
    scale: null
    ebf_dimension: "WHAT_IDN"
    note: "Staerkster Praediktor fuer Willingness (β = 0.715)"

  - id: "UV-FUEHRUNG"
    name: "Fuehrungsverantwortung"
    description: "Dichotom: Ja/Nein"
    scale: "binaer"
    note: "Unabhaengige Variable fuer Gruppenvergleiche"

# =============================================================================
# HYPOTHESEN-ERGEBNISSE
# =============================================================================

hypothesen:

  # ---------------------------------------------------------------------------
  # H1: Leadership und Führungsverantwortung/Willingness
  # ---------------------------------------------------------------------------

  - id: "H1.1"
    av: "Leadership-Index"
    uv: "Fuehrungsverantwortung"
    methode: "t-Test / Gruppenvergleich"
    ergebnis:
      signifikant: false
      p_value: 0.353
      mittelwert_mit_fv: 0.58
      mittelwert_ohne_fv: 0.56
      differenz: 0.02
    interpretation: |
      Es gibt keinen signifikanten Unterschied zwischen Personen mit und ohne
      Fuehrungsverantwortung hinsichtlich des Leadership-Index.
      Beide Gruppen bewerten die Fuehrung aehnlich.
    implikation: |
      Die Wahrnehmung der Fuehrungsqualitaet ist unabhaengig davon, ob man
      selbst Fuehrungsverantwortung traegt. Dies deutet auf eine konsistente
      Fuehrungswahrnehmung in der Organisation hin.

  - id: "H1.2"
    av: "Willingness-Index"
    uv: "Leadership-Index"
    methode: "Regression"
    ergebnis:
      signifikant: true
      p_value: "<.001"
      beta: 0.378
      effektstaerke: "mittel"
    interpretation: |
      Der Leadership-Index hat einen signifikanten positiven Einfluss auf den
      Willingness-Index. Mit jedem Anstieg des Leadership-Index um 1 Einheit
      steigt der Willingness-Index um 0.378 Einheiten.
    implikation: |
      Gute Fuehrung foerdert die Veraenderungsbereitschaft der Mitarbeitenden.
      → Intervention: Fuehrungskraefteentwicklung als Hebel fuer Change.

  # ---------------------------------------------------------------------------
  # H2: Unsicherheit und Führungsverantwortung/Awareness
  # ---------------------------------------------------------------------------

  - id: "H2.1"
    av: "Unsicherheits-Score"
    uv: "Fuehrungsverantwortung"
    methode: "t-Test / Gruppenvergleich"
    ergebnis:
      signifikant: false
      p_value: 0.152
      mittelwert_mit_fv: 3.95
      mittelwert_ohne_fv: 3.90
      differenz: 0.05
    interpretation: |
      Es gibt keinen signifikanten Unterschied zwischen Personen mit und ohne
      Fuehrungsverantwortung hinsichtlich des Unsicherheits-Scores.
      Fuehrungskraefte empfinden aehnlich viel Unsicherheit wie Mitarbeitende.
    implikation: |
      Unsicherheit ist in der gesamten Organisation verbreitet, nicht nur
      auf einer Hierarchieebene. Dies koennte auf allgemeine Transformations-
      unsicherheit (z.B. Halbierungsinitiative) hindeuten.

  - id: "H2.2"
    av: "Unsicherheits-Score"
    uv: "Awareness-Index"
    methode: "Regression"
    ergebnis:
      signifikant: true
      p_value: "<.001"
      beta: 0.351
      effektstaerke: "mittel"
    interpretation: |
      Der Awareness-Index hat einen signifikanten positiven Einfluss auf den
      Unsicherheits-Score. Hoehere Awareness geht mit hoeherer wahrgenommener
      Unsicherheit einher (Anstieg 0.351).
    implikation: |
      Wer mehr weiss/informiert ist, nimmt auch mehr Unsicherheit wahr.
      Dies ist konsistent mit Literatur zu "informed uncertainty".
      → Kommunikation sollte Unsicherheit nicht verschweigen, sondern
         kontextualisieren und mit Handlungsoptionen verbinden.

  # ---------------------------------------------------------------------------
  # H3: Awareness und Führungsverantwortung/Willingness
  # ---------------------------------------------------------------------------

  - id: "H3.1"
    av: "Awareness-Index"
    uv: "Fuehrungsverantwortung"
    methode: "t-Test / Gruppenvergleich"
    ergebnis:
      signifikant: true
      p_value: "<.001"
      mittelwert_mit_fv: 3.74
      mittelwert_ohne_fv: 3.52
      differenz: 0.22
      effektstaerke: "klein bis mittel"
    interpretation: |
      Es gibt einen signifikanten Unterschied: Personen mit Fuehrungsverantwortung
      haben einen hoeheren Awareness-Index (3.74) als Personen ohne (3.52).
    implikation: |
      Fuehrungskraefte sind besser informiert als Mitarbeitende.
      → Informationskaskade funktioniert nicht vollstaendig.
      → Intervention: Transparentere Kommunikation fuer alle Ebenen.

  - id: "H3.2"
    av: "Willingness-Index"
    uv: "Awareness-Index"
    methode: "Regression"
    ergebnis:
      signifikant: true
      p_value: "<.001"
      beta: 0.430
      effektstaerke: "mittel bis gross"
    interpretation: |
      Der Awareness-Index hat einen signifikanten positiven Einfluss auf den
      Willingness-Index (Anstieg 0.430). Informiertheit foerdert
      Veraenderungsbereitschaft.
    implikation: |
      Information ist ein Schluesselhebel fuer Change Readiness.
      → Intervention: Systematische Kommunikationskampagnen zu Strategie
         und Veraenderungen.

  # ---------------------------------------------------------------------------
  # H4: Health und Leadership/Willingness
  # ---------------------------------------------------------------------------

  - id: "H4.1"
    av: "Health-Index"
    uv: "Leadership-Index"
    methode: "Regression"
    ergebnis:
      signifikant: true
      p_value: "<.001"
      beta: 0.366
      effektstaerke: "mittel"
    interpretation: |
      Der Leadership-Index hat einen signifikanten positiven Einfluss auf den
      Health-Index (Anstieg 0.366). Gute Fuehrung foerdert organisationale
      Gesundheit/Wohlbefinden.
    implikation: |
      Fuehrungsqualitaet wirkt sich direkt auf das Wohlbefinden der
      Mitarbeitenden aus.

  - id: "H4.2"
    av: "Willingness-Index"
    uv: "Health-Index"
    methode: "Regression"
    ergebnis:
      signifikant: true
      p_value: "<.001"
      beta: 0.418
      effektstaerke: "mittel bis gross"
    interpretation: |
      Der Health-Index hat einen signifikanten positiven Einfluss auf den
      Willingness-Index (Anstieg 0.418). Wohlbefinden foerdert
      Veraenderungsbereitschaft.
    implikation: |
      Organisationale Gesundheit ist ein wichtiger Mediator.
      → Pfad: Leadership → Health → Willingness
      → Intervention: Gesundheitsfoerderung als Change-Enabler.

  # ---------------------------------------------------------------------------
  # H5: Identity und Leadership/Willingness
  # ---------------------------------------------------------------------------

  - id: "H5.1"
    av: "Identity-Index"
    uv: "Leadership-Index"
    methode: "Regression"
    ergebnis:
      signifikant: true
      p_value: "<.001"
      beta: 0.358
      effektstaerke: "mittel"
    interpretation: |
      Der Leadership-Index hat einen signifikanten positiven Einfluss auf den
      Identity-Index (Anstieg 0.358). Gute Fuehrung staerkt die Identifikation
      mit der Organisation.
    implikation: |
      Fuehrung formt Identitaet.

  - id: "H5.2"
    av: "Willingness-Index"
    uv: "Identity-Index"
    methode: "Regression"
    ergebnis:
      signifikant: true
      p_value: "<.001"
      beta: 0.715
      effektstaerke: "gross"
    interpretation: |
      Der Identity-Index hat den STAERKSTEN signifikanten positiven Einfluss
      auf den Willingness-Index (Anstieg 0.715). Identifikation ist der
      wichtigste Praediktor fuer Veraenderungsbereitschaft.
    implikation: |
      KERNBEFUND: Identifikation mit der SRG ist der staerkste Hebel fuer
      Change Readiness.
      → Pfad: Leadership → Identity → Willingness
      → Intervention: Staerkung der SRG-Identitaet, Purpose-Kommunikation,
         Service-Public-Narrativ als Identitaetsanker.

  # ---------------------------------------------------------------------------
  # H6: Interaktion Leadership x Awareness
  # ---------------------------------------------------------------------------

  - id: "H6.1"
    av: "Willingness-Index"
    uv: "Leadership-Index x Awareness-Index (Interaktion)"
    methode: "Moderierte Regression"
    ergebnis:
      signifikant: false
      p_value: 0.244
    interpretation: |
      Die Interaktion zwischen Leadership- und Awareness-Index ist NICHT
      signifikant. Die Effekte sind additiv, nicht multiplikativ.

  - id: "H6.2"
    av: "Willingness-Index"
    uv: "Leadership-Index + Awareness-Index (Haupteffekte)"
    methode: "Multiple Regression"
    ergebnis:
      signifikant: true
      leadership_beta: 0.141
      leadership_p: "<.001"
      awareness_beta: 0.411
      awareness_p: "<.001"
    interpretation: |
      Beide Haupteffekte sind signifikant. Awareness (β = 0.411) hat einen
      staerkeren Effekt als Leadership (β = 0.141) auf Willingness.
    implikation: |
      Leadership und Awareness wirken unabhaengig voneinander auf Willingness.
      → Keine Verstaerkung durch Kombination, aber beide Hebel parallel nutzen.

# =============================================================================
# ZUSAMMENFASSUNG & KERNBEFUNDE
# =============================================================================

kernbefunde:

  - rang: 1
    befund: "Identity-Index ist staerkster Praediktor fuer Willingness (β = 0.715)"
    ebf_dimension: "WHAT_IDN"
    implikation: "Identifikation mit SRG-Mission ist Schluesselhebel fuer Change"
    intervention: "Purpose-Kommunikation, Service-Public-Narrativ staerken"

  - rang: 2
    befund: "Awareness hat starken Effekt auf Willingness (β = 0.430 / 0.411)"
    ebf_dimension: "AWARE"
    implikation: "Information foerdert Veraenderungsbereitschaft"
    intervention: "Transparente Kommunikation zu Strategie und Veraenderungen"

  - rang: 3
    befund: "Health als Mediator zwischen Leadership und Willingness (β = 0.418)"
    ebf_dimension: "WHAT"
    implikation: "Wohlbefinden ist Voraussetzung fuer Change Readiness"
    intervention: "Gesundheitsfoerderung, Belastungsreduktion"

  - rang: 4
    befund: "Leadership wirkt ueber Identity und Health auf Willingness"
    ebf_dimension: "WHAT_S"
    implikation: "Fuehrung ist indirekter, aber wichtiger Hebel"
    intervention: "Fuehrungskraefteentwicklung"

  - rang: 5
    befund: "Fuehrungskraefte sind besser informiert (Awareness-Gap)"
    differenz: 0.22
    implikation: "Informationskaskade funktioniert nicht vollstaendig"
    intervention: "Direkte Kommunikation an alle Ebenen"

  - rang: 6
    befund: "Awareness erhoeht auch Unsicherheitswahrnehmung (β = 0.351)"
    implikation: "Information allein reicht nicht - Kontext und Handlungsoptionen noetig"
    intervention: "Kommunikation mit konkreten Handlungsempfehlungen verbinden"

# =============================================================================
# EBF-MODELL (Pfadmodell)
# =============================================================================

pfadmodell:
  description: |
    Basierend auf den Hypothesen-Ergebnissen ergibt sich folgendes Pfadmodell:

    Leadership ──0.358──► Identity ──0.715──► Willingness
         │                                        ▲
         │──0.366──► Health ───────0.418──────────┤
         │                                        │
         └──0.378──────────────────────────────────┤
                                                  │
    Awareness ───────────0.430────────────────────┘
         │
         └──0.351──► Uncertainty

  staerkster_pfad:
    path: "Leadership → Identity → Willingness"
    total_effect: "0.358 × 0.715 = 0.256 (indirekt) + 0.378 (direkt)"

  empfohlene_interventionen:
    - target: "Identity"
      priority: 1
      reason: "Staerkster Praediktor (β = 0.715)"
      interventions:
        - "Purpose-Kampagne (Service Public)"
        - "Mitarbeiter-Testimonials"
        - "SRG-Stolz foerdern"

    - target: "Awareness"
      priority: 2
      reason: "Zweiter starker Praediktor (β = 0.430)"
      interventions:
        - "Strategiekommunikation"
        - "Townhalls / All-Hands"
        - "Transparente Zahlen"

    - target: "Leadership"
      priority: 3
      reason: "Wirkt ueber Identity und Health"
      interventions:
        - "Fuehrungskraefte-Training"
        - "Change-Leadership-Programm"
        - "Feedback-Kultur staerken"

