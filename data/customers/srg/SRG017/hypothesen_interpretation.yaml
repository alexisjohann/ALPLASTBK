# =============================================================================
# ÜBERSICHT: ALLE HYPOTHESEN
# =============================================================================

uebersicht:
  total_hypothesen: 12
  signifikant: 9
  nicht_signifikant: 3

  zusammenfassung: |
    Von 12 getesteten Hypothesen sind 9 signifikant (75%).
    Die nicht-signifikanten Befunde (H1.1, H2.1, H6.1) sind inhaltlich
    ebenso bedeutsam, da sie zeigen, wo KEINE Unterschiede bestehen.

# =============================================================================
# H1: LEADERSHIP UND FÜHRUNGSVERANTWORTUNG
# =============================================================================

h1:
  thema: "Führungswahrnehmung und Veränderungsbereitschaft"

  h1_1:
    hypothese: |
      H1.1: Personen mit Führungsverantwortung bewerten den Leadership-Index
      anders als Personen ohne Führungsverantwortung.

    ergebnis:
      signifikant: false
      p_value: 0.353
      mittelwert_mit_fv: 0.58
      mittelwert_ohne_fv: 0.56
      differenz: 0.02

    interpretation: |
      Die Nullhypothese kann NICHT verworfen werden. Führungskräfte und
      Mitarbeitende bewerten die Führungsqualität praktisch identisch.

      Dies ist ein POSITIVER Befund:
      - Keine "Führungsblasen-Wahrnehmung" (Führungskräfte überschätzen sich nicht)
      - Konsistente Führungswahrnehmung über Hierarchieebenen hinweg
      - Die SRG hat keine gespaltene Führungskultur

      ABER: Die absoluten Werte (0.56-0.58) liegen im mittleren Bereich.
      Es gibt Raum für Verbesserung - aber die Verbesserung muss für alle
      gleichermassen erfolgen, nicht nur für bestimmte Gruppen.

    praktische_implikation: |
      Führungsentwicklungsprogramme sollten auf ALLE Ebenen zielen, nicht nur
      auf Top-Management. Die Wahrnehmung ist homogen - die Intervention
      sollte es auch sein.

    ebf_dimension: "WHAT_S (Social Utility)"

  h1_2:
    hypothese: |
      H1.2: Der Leadership-Index hat einen positiven Einfluss auf den
      Willingness-Index (Veränderungsbereitschaft).

    ergebnis:
      signifikant: true
      p_value: "<.001"
      beta: 0.378
      r_squared_partial: 0.143  # β² als Approximation

    interpretation: |
      Die Hypothese wird BESTÄTIGT. Bessere Führungswahrnehmung führt zu
      höherer Veränderungsbereitschaft.

      Der Effekt (β = 0.378) ist moderat bis stark:
      - Pro 1 Einheit bessere Leadership-Wahrnehmung steigt Willingness um 0.378
      - Leadership erklärt ca. 14% der Varianz in Willingness (direkt)

      WICHTIG: Dies ist der DIREKTE Effekt. Leadership wirkt zusätzlich
      INDIREKT über Identity (H5.1) und Health (H4.1).

      Gesamteffekt von Leadership:
      - Direkt:                    0.378
      - Via Identity (0.358×0.715): 0.256
      - Via Health (0.366×0.418):   0.153
      - TOTAL:                     ~0.79

      Leadership ist damit einer der stärksten Hebel überhaupt.

    praktische_implikation: |
      Investition in Führungskräfteentwicklung zahlt sich dreifach aus:
      1. Direkt auf Veränderungsbereitschaft
      2. Indirekt über stärkere Identifikation
      3. Indirekt über bessere organisationale Gesundheit

    ebf_dimension: "WHAT_S → READY"

# =============================================================================
# H2: UNSICHERHEIT UND AWARENESS
# =============================================================================

h2:
  thema: "Unsicherheitswahrnehmung in der Organisation"

  h2_1:
    hypothese: |
      H2.1: Personen mit Führungsverantwortung haben einen anderen
      Unsicherheits-Score als Personen ohne Führungsverantwortung.

    ergebnis:
      signifikant: false
      p_value: 0.152
      mittelwert_mit_fv: 3.95
      mittelwert_ohne_fv: 3.90
      differenz: 0.05

    interpretation: |
      Die Nullhypothese kann NICHT verworfen werden. Führungskräfte und
      Mitarbeitende empfinden GLEICH VIEL Unsicherheit.

      Dies ist ein BEDEUTSAMER Befund:
      - Unsicherheit ist KEIN Hierarchie-Phänomen
      - Die Transformation betrifft alle Ebenen emotional gleich
      - Führungskräfte sind nicht "abgeschirmt" oder "gelassener"

      Im Kontext der Halbierungsinitiative:
      - Auch das Management fühlt die Bedrohung
      - Es gibt keine "sichere" Ebene in der Organisation
      - Die Unsicherheit ist SYSTEMISCH, nicht individuell

      Die absoluten Werte (3.90-3.95 auf einer 5er-Skala) sind HOCH.
      Das zeigt: Die gesamte Organisation ist verunsichert.

    praktische_implikation: |
      Unsicherheitsreduktion muss auf ALLEN Ebenen ansetzen. Führungskräfte
      brauchen ebenso Unterstützung wie Mitarbeitende. "Führung muss stark
      sein" ist hier keine hilfreiche Haltung - authentische Kommunikation
      über gemeinsame Unsicherheit kann verbindend wirken.

    ebf_dimension: "WHAT_F (Financial/Existential Utility)"

  h2_2:
    hypothese: |
      H2.2: Der Awareness-Index hat einen Einfluss auf den Unsicherheits-Score.

    ergebnis:
      signifikant: true
      p_value: "<.001"
      beta: 0.351
      richtung: "positiv"

    interpretation: |
      Die Hypothese wird BESTÄTIGT - aber die Richtung ist KONTRAINTUITIV:
      Mehr Awareness führt zu MEHR Unsicherheit, nicht weniger!

      Dies ist das "Informed Uncertainty"-Phänomen:
      - Wer mehr weiss, erkennt auch mehr Risiken
      - Unwissende unterschätzen Komplexität (Dunning-Kruger-Effekt)
      - Information ohne Kontext erzeugt Angst

      Der Effekt (β = 0.351) ist substantiell:
      - Pro 1 Einheit mehr Awareness steigt Unsicherheit um 0.351
      - Das ist KEIN Grund, weniger zu informieren!
      - Aber: Information muss KONTEXTUALISIERT werden

      WICHTIG: Awareness hat gleichzeitig einen POSITIVEN Effekt auf
      Willingness (H3.2, β = 0.430). Der Nettoeffekt von Information
      ist also positiv - aber er geht mit erhöhter Unsicherheit einher.

    praktische_implikation: |
      Information allein reicht nicht. Jede Kommunikation sollte enthalten:
      1. WAS passiert (Information)
      2. WARUM es passiert (Kontext)
      3. WAS DU TUN KANNST (Handlungsoption)

      Beispiel SCHLECHT: "Die Gebühren könnten um 40% sinken."
      Beispiel GUT: "Die Gebühren könnten um 40% sinken. Deshalb arbeiten
      wir an Plan B. Hier ist, wie du dich einbringen kannst..."

    ebf_dimension: "AWARE → WHAT_F"

# =============================================================================
# H3: AWARENESS UND FÜHRUNGSVERANTWORTUNG
# =============================================================================

h3:
  thema: "Informationsverteilung in der Organisation"

  h3_1:
    hypothese: |
      H3.1: Personen mit Führungsverantwortung haben einen höheren
      Awareness-Index als Personen ohne Führungsverantwortung.

    ergebnis:
      signifikant: true
      p_value: "<.001"
      mittelwert_mit_fv: 3.74
      mittelwert_ohne_fv: 3.52
      differenz: 0.22
      effektstaerke: "klein bis mittel (d ≈ 0.3)"

    interpretation: |
      Die Hypothese wird BESTÄTIGT. Führungskräfte sind signifikant
      besser informiert als Mitarbeitende.

      Der "Awareness-Gap" von 0.22 Punkten bedeutet:
      - Information "versickert" auf dem Weg nach unten
      - Führungskräfte haben einen Informationsvorsprung
      - Die Kaskadenkommunikation funktioniert nicht vollständig

      Im Kontext von H2.2 (Awareness → Uncertainty):
      - Führungskräfte wissen MEHR und sind TROTZDEM gleich unsicher
      - Bei Mitarbeitenden fehlt Information, die Unsicherheit ist aber gleich
      - Das deutet auf UNTERSCHIEDLICHE Unsicherheitsquellen hin:
        * FK: Unsicher wegen WISSEN um Risiken
        * MA: Unsicher wegen NICHTWISSEN

      Dies ist ein KRITISCHER Befund:
      - 0.22 Punkte Differenz × 5000 Mitarbeitende = massive Wissenslücke
      - Gerüchte und Spekulationen füllen das Vakuum
      - Vertrauen leidet, wenn MA sich uninformiert fühlen

    praktische_implikation: |
      Die Informationskaskade (GL → Bereichsleitung → Team) ist zu langsam
      oder zu verlustbehaftet. Alternativen:

      1. DIREKTE Kommunikation an alle (All-Hands, Newsletter)
      2. Parallele Kanäle (nicht nur via Führungskraft)
      3. Pull-Angebote (Intranet, FAQ, Ask-Me-Anything)
      4. Führungskräfte als Multiplikatoren SCHULEN, nicht nur informieren

    ebf_dimension: "AWARE (Hierarchie-Gradient)"

  h3_2:
    hypothese: |
      H3.2: Der Awareness-Index hat einen positiven Einfluss auf den
      Willingness-Index.

    ergebnis:
      signifikant: true
      p_value: "<.001"
      beta: 0.430
      r_squared_partial: 0.185

    interpretation: |
      Die Hypothese wird BESTÄTIGT. Bessere Informiertheit führt zu
      höherer Veränderungsbereitschaft.

      Der Effekt (β = 0.430) ist STARK:
      - Pro 1 Einheit mehr Awareness steigt Willingness um 0.430
      - Awareness erklärt ca. 18.5% der Varianz in Willingness
      - Das ist der ZWEITSTÄRKSTE Effekt nach Identity (0.715)

      Zusammen mit H2.2 ergibt sich ein differenziertes Bild:
      - Awareness → Willingness: +0.430 (positiv)
      - Awareness → Uncertainty: +0.351 (auch positiv, aber unerwünscht)

      Der NETTO-Effekt von Awareness ist positiv:
      - Informierte Menschen sind veränderungsbereiter
      - Sie sind auch unsicherer - aber das ist verkraftbar
      - Uninformiertheit ist KEINE Lösung

      WICHTIG: Der Awareness-Gap (H3.1) bedeutet, dass Mitarbeitende
      WENIGER Willingness haben als sie KÖNNTEN, wenn sie besser
      informiert wären. Das ist verschenktes Potenzial.

    praktische_implikation: |
      Information ist ein Schlüsselhebel für Change Readiness.
      Der Awareness-Gap (H3.1) zeigt: Hier liegt ungenutztes Potenzial.

      Rechenbeispiel:
      - Gap: 0.22 Punkte Awareness
      - Effekt: β = 0.430
      - Potenzial: 0.22 × 0.430 = 0.095 Punkte mehr Willingness
      - Bei 5000 MA: Signifikanter Organisationseffekt

    ebf_dimension: "AWARE → READY"

# =============================================================================
# H4: HEALTH ALS MEDIATOR
# =============================================================================

h4:
  thema: "Organisationale Gesundheit als Vermittler"

  h4_1:
    hypothese: |
      H4.1: Der Leadership-Index hat einen positiven Einfluss auf den
      Health-Index (organisationale Gesundheit/Wohlbefinden).

    ergebnis:
      signifikant: true
      p_value: "<.001"
      beta: 0.366
      r_squared_partial: 0.134

    interpretation: |
      Die Hypothese wird BESTÄTIGT. Bessere Führung führt zu
      höherem organisationalem Wohlbefinden.

      Der Effekt (β = 0.366) ist moderat bis stark:
      - Pro 1 Einheit bessere Leadership steigt Health um 0.366
      - Leadership erklärt ca. 13.4% der Varianz in Health

      Dies bestätigt klassische Führungsforschung:
      - Führung hat direkten Einfluss auf Mitarbeitergesundheit
      - Schlechte Führung macht krank (Burnout, Stress)
      - Gute Führung schützt (Puffer-Effekt)

      Im SRG-Kontext besonders relevant:
      - Hohe Arbeitsbelastung in Medienbranche
      - Transformationsstress durch Digitalisierung
      - Existenzielle Unsicherheit (Initiative)
      - Führung als "Schutzschild" gegen diese Stressoren

    praktische_implikation: |
      Führungskräfteentwicklung ist auch Gesundheitsförderung.
      Programme sollten explizit "gesundheitsförderliche Führung"
      adressieren:
      - Überlastung erkennen
      - Ressourcen bereitstellen
      - Psychologische Sicherheit schaffen
      - Vorbild sein (eigene Gesundheit)

    ebf_dimension: "WHAT_S → WHAT (Health)"

  h4_2:
    hypothese: |
      H4.2: Der Health-Index hat einen positiven Einfluss auf den
      Willingness-Index.

    ergebnis:
      signifikant: true
      p_value: "<.001"
      beta: 0.418
      r_squared_partial: 0.175

    interpretation: |
      Die Hypothese wird BESTÄTIGT. Höheres Wohlbefinden führt zu
      höherer Veränderungsbereitschaft.

      Der Effekt (β = 0.418) ist stark:
      - Pro 1 Einheit mehr Health steigt Willingness um 0.418
      - Health erklärt ca. 17.5% der Varianz in Willingness
      - Das ist der DRITTSTÄRKSTE Effekt nach Identity und Awareness

      Dies ist ein WICHTIGER Befund:
      - Erschöpfte Menschen können sich nicht verändern
      - Veränderung braucht Energie - Energie braucht Gesundheit
      - "Change Fatigue" ist real und messbar

      Health fungiert als MEDIATOR im Pfad:
      Leadership → Health → Willingness
      (0.366 × 0.418 = 0.153 indirekter Effekt)

      Das bedeutet:
      - Leadership wirkt TEILWEISE über Health auf Willingness
      - Ohne Health als Vermittler wäre der Leadership-Effekt geringer
      - Gesundheit ist kein "Nice-to-have", sondern Change-Enabler

    praktische_implikation: |
      Vor grossen Veränderungsprojekten sollte die "Gesundheitsreserve"
      der Organisation geprüft werden:

      - Hohe Health-Werte: Organisation kann Transformation stemmen
      - Niedrige Health-Werte: Erst stabilisieren, dann transformieren

      Bei der SRG: Die Halbierungsinitiative ist ein ZUSÄTZLICHER
      Stressor. Gesundheitsförderung ist jetzt besonders wichtig.

    ebf_dimension: "WHAT (Health) → READY"

# =============================================================================
# H5: IDENTITY ALS SCHLÜSSELVARIABLE
# =============================================================================

h5:
  thema: "Identifikation als stärkster Treiber"

  h5_1:
    hypothese: |
      H5.1: Der Leadership-Index hat einen positiven Einfluss auf den
      Identity-Index (Identifikation mit der Organisation).

    ergebnis:
      signifikant: true
      p_value: "<.001"
      beta: 0.358
      r_squared_partial: 0.128

    interpretation: |
      Die Hypothese wird BESTÄTIGT. Bessere Führung stärkt die
      Identifikation mit der Organisation.

      Der Effekt (β = 0.358) ist moderat:
      - Pro 1 Einheit bessere Leadership steigt Identity um 0.358
      - Leadership erklärt ca. 12.8% der Varianz in Identity

      Dies ist ein ZENTRALER Befund:
      - Führungskräfte FORMEN die Identität der Mitarbeitenden
      - Durch Vorleben von Werten
      - Durch Kommunikation der Mission
      - Durch Schaffung von Zugehörigkeit

      Bei der SRG besonders relevant:
      - Der Service-Public-Auftrag ist identitätsstiftend
      - Führungskräfte müssen diesen Auftrag VERKÖRPERN
      - Wenn FK die Mission nicht leben, leidet die Identifikation

      Der Pfad Leadership → Identity → Willingness ist ENTSCHEIDEND:
      - Indirekter Effekt: 0.358 × 0.715 = 0.256
      - Das ist GRÖSSER als der direkte Effekt von Health!

    praktische_implikation: |
      Führungskräfteentwicklung sollte "Purpose Leadership" betonen:

      1. WARUM existiert die SRG? (Mission)
      2. WIE verkörpere ich das als FK? (Vorbild)
      3. WIE verbinde ich mein Team damit? (Sinnstiftung)

      Führungskräfte sind "Identitätsmultiplikatoren".

    ebf_dimension: "WHAT_S → WHAT_IDN"

  h5_2:
    hypothese: |
      H5.2: Der Identity-Index hat einen positiven Einfluss auf den
      Willingness-Index.

    ergebnis:
      signifikant: true
      p_value: "<.001"
      beta: 0.715
      r_squared_partial: 0.511

    interpretation: |
      Die Hypothese wird BESTÄTIGT - und der Effekt ist AUSSERGEWÖHNLICH.

      β = 0.715 ist ein SEHR STARKER Effekt:
      - Pro 1 Einheit mehr Identity steigt Willingness um 0.715
      - Identity erklärt über 51% der Varianz in Willingness!
      - Das ist mit Abstand der stärkste Prädiktor im Modell

      Zum Vergleich:
      - Identity:   β = 0.715 (51% Varianz)
      - Awareness:  β = 0.430 (18% Varianz)
      - Health:     β = 0.418 (17% Varianz)
      - Leadership: β = 0.378 (14% Varianz)

      KERNBEFUND DER STUDIE:
      Wer sich mit der SRG-Mission identifiziert, ist AUTOMATISCH
      veränderungsbereit. Identifikation ist der "Master-Switch".

      Warum ist dieser Effekt so stark?
      - Identifikation reduziert "Selbst-vs-Organisation"-Konflikt
      - Veränderung wird nicht als Bedrohung, sondern als Chance gesehen
      - "Wenn die SRG sich verändert, verändere ich mich MIT ihr"
      - Die Mission gibt dem Wandel SINN

      Bei der SRG besonders stark ausgeprägt:
      - Service-Public-Auftrag ist ein starkes Identitätsmerkmal
      - "Wir informieren die Schweiz" ist ein Purpose
      - Journalistische Identität ist tief verankert

    praktische_implikation: |
      Identity ist der WICHTIGSTE Hebel für Change Readiness.

      Investitionen in Identity-Stärkung haben den höchsten ROI:
      - Purpose-Kampagnen
      - Mitarbeiter-Testimonials ("Was mir die SRG bedeutet")
      - Service-Public-Erlebnisse (Begegnung mit Publikum)
      - Onboarding mit Mission-Fokus
      - Jubiläen und Traditionen pflegen

      WARNUNG: Die Halbierungsinitiative bedroht genau diese Identity.
      Die Kommunikation sollte die Mission STÄRKEN, nicht verteidigen:
      - Nicht: "Die SRG ist bedroht"
      - Sondern: "Die SRG-Mission ist wichtiger denn je"

    ebf_dimension: "WHAT_IDN → READY"

# =============================================================================
# H6: INTERAKTIONSEFFEKTE
# =============================================================================

h6:
  thema: "Zusammenspiel von Leadership und Awareness"

  h6_1:
    hypothese: |
      H6.1: Es gibt eine signifikante Interaktion zwischen Leadership-Index
      und Awareness-Index in ihrer Wirkung auf Willingness.

    ergebnis:
      signifikant: false
      p_value: 0.244
      interaktionsterm: "Leadership × Awareness"

    interpretation: |
      Die Hypothese wird NICHT bestätigt. Es gibt keine signifikante
      Interaktion - die Effekte sind ADDITIV, nicht multiplikativ.

      Was bedeutet das?
      - Gute Führung verstärkt den Effekt von Awareness NICHT
      - Hohe Awareness verstärkt den Effekt von Leadership NICHT
      - Beide Faktoren wirken UNABHÄNGIG voneinander

      Das ist ein PRAKTISCH WICHTIGER Befund:
      - Man muss nicht "alles gleichzeitig" verbessern
      - Investitionen in Leadership und Awareness "kannibalisieren" sich nicht
      - Jede Verbesserung hat einen eigenständigen Effekt

      Mathematisch:
      - KEIN Interaktionseffekt: Willingness = a + b×Leadership + c×Awareness
      - MIT Interaktionseffekt: Willingness = a + b×L + c×A + d×L×A
      - Der Term d×L×A ist NICHT signifikant

      Das VEREINFACHT die Interventionsplanung:
      - Nicht nötig: "Erst Leadership, dann Awareness"
      - Möglich: Parallele Investitionen in beide Bereiche

    praktische_implikation: |
      Interventionen können parallel laufen ohne Effizienzeinbussen:

      - Führungskräfteentwicklung (Leadership)
      - Kommunikationskampagnen (Awareness)
      - Beide gleichzeitig möglich und sinnvoll

    ebf_dimension: "WHAT_S × AWARE"

  h6_2:
    hypothese: |
      H6.2: Leadership-Index und Awareness-Index haben unabhängige
      Haupteffekte auf den Willingness-Index.

    ergebnis:
      signifikant: true
      leadership_beta: 0.141
      leadership_p: "<.001"
      awareness_beta: 0.411
      awareness_p: "<.001"

    interpretation: |
      Beide Haupteffekte sind signifikant, wenn sie GEMEINSAM im
      Modell sind. Allerdings sind die Effekte KLEINER als in den
      Einzelregressionen:

      - Leadership: 0.141 (vs. 0.378 in H1.2)
      - Awareness:  0.411 (vs. 0.430 in H3.2)

      Das zeigt: Es gibt GETEILTE VARIANZ
      - Leadership und Awareness korrelieren miteinander
      - Im gemeinsamen Modell wird nur die UNIQUE Varianz geschätzt
      - Der Leadership-Effekt sinkt stärker → mehr Überlappung mit Awareness

      Der Awareness-Effekt bleibt fast gleich stark (0.411 vs 0.430)
      → Awareness hat mehr "unique" Erklärungskraft

      Der Leadership-Effekt halbiert sich fast (0.141 vs 0.378)
      → Viel vom Leadership-Effekt läuft über Awareness (Mediation)

      Mögliche Erklärung:
      - Gute Führungskräfte INFORMIEREN besser
      - Der "Leadership-Effekt" ist teilweise ein "Kommunikationseffekt"
      - Leadership ohne gute Kommunikation verliert viel Wirkung

    praktische_implikation: |
      Awareness ist der "robustere" Prädiktor:
      - Bleibt stark auch bei Kontrolle für Leadership
      - Direkter Hebel für Veränderungsbereitschaft

      Leadership wirkt zu einem grossen Teil DURCH Kommunikation:
      - Führungskräfte müssen nicht nur "gut führen"
      - Sie müssen vor allem GUT KOMMUNIZIEREN
      - Training: "Führen durch Informieren"

    ebf_dimension: "WHAT_S + AWARE → READY"

