# =============================================================================
# STR-SCN: STRATEGISCHE SZENARIEN (~5 Faktoren)
# =============================================================================

str_szenarien:

  - id: "STR-SCN-001"
    name: "Szenario: Vollausstattung"
    trigger: "Initiative abgelehnt, Gebuehr stabil"
    strategy: "Qualitaetsoffensive, Digital-Ausbau"
    probability: 0.60

  - id: "STR-SCN-002"
    name: "Szenario: Moderate Kuerzung"
    trigger: "Politischer Druck, -15-20%"
    strategy: "Fokussierung, Effizienz"
    probability: 0.25

  - id: "STR-SCN-003"
    name: "Szenario: Radikale Kuerzung"
    trigger: "Initiative angenommen, -40%"
    strategy: "Kernangebot, Notbetrieb"
    probability: 0.10
    consequences:
      - "Verlust von ~2000 Stellen"
      - "Reduktion auf Grundversorgung"
      - "Wegfall Sportrechte"
      - "Gefaehrdung Minderheitensprachen"

  - id: "STR-SCN-004"
    name: "Szenario: Strukturwandel"
    trigger: "Fundamentaler Medienwandel"
    strategy: "Neuerfindung als digitale Plattform"
    probability: 0.05
    timeframe: "2030+"

  - id: "STR-SCN-005"
    name: "Strategic Flexibility Index"
    value: 0.50
    scale: "0-1"
    note: "Faehigkeit, auf Szenarien zu reagieren"

