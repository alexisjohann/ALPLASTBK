# =============================================================================
# STR-MIS: MISSION & AUFTRAG (~8 Faktoren)
# =============================================================================

str_mission:

  - id: "STR-MIS-001"
    name: "Service-Public-Auftrag"
    definition: |
      Die SRG erbringt einen Service public im Bereich Radio und Fernsehen.
      Sie traegt zur freien Meinungsbildung, zur kulturellen Entfaltung
      und zur Unterhaltung bei.
    source: "Art. 93 BV, SRG-Konzession"

  - id: "STR-MIS-002"
    name: "Kernauftraege"
    components:
      - name: "Information"
        priority: 1
        description: "Unabhaengige, vielfaeltige Berichterstattung"
      - name: "Kultur"
        priority: 2
        description: "Foerderung Schweizer Kultur und Sprachen"
      - name: "Bildung"
        priority: 3
        description: "Wissensvermittlung"
      - name: "Unterhaltung"
        priority: 4
        description: "Qualitaetsunterhaltung"
      - name: "Sport"
        priority: 5
        description: "Breite Sportberichterstattung"

  - id: "STR-MIS-003"
    name: "Sprachregionen-Auftrag"
    requirement: "Gleichwertige Versorgung aller 4 Sprachregionen"
    challenge: "Kostenintensiv, aber identitaetsstiftend"

  - id: "STR-MIS-004"
    name: "Minderheiten-Auftrag"
    components:
      - "Raetoromanisch (RTR)"
      - "Barrierefreie Angebote"
      - "Regionale Berichterstattung"

  - id: "STR-MIS-005"
    name: "Unabhaengigkeit"
    value: "Redaktionelle Unabhaengigkeit von Staat und Wirtschaft"
    challenges:
      - "Politischer Druck (Initiativen)"
      - "Finanzielle Abhaengigkeit von Gebuehren"

  - id: "STR-MIS-006"
    name: "Vision 2030"
    value: null
    note: "Bitte ergaenzen falls vorhanden"

  - id: "STR-MIS-007"
    name: "Strategische Prioritaeten"
    priorities:
      - "Digital First"
      - "Junge Zielgruppen"
      - "Effizienzsteigerung"
      - "Innovation"

  - id: "STR-MIS-008"
    name: "Differenzierung"
    value: "Qualitaet, Vertrauen, Schweizer Identitaet"
    vs_private: "Tiefe statt Breite, Public Value"

