# =============================================================================
# SRG SSR - INTERVENTIONSBAUKASTEN CHANGE READINESS
# =============================================================================
# Version: 1.0.0
# Framework: EBF Evidence-Based Framework
# Modell-Basis: MOD-SRG-001 (SRG Change Readiness Model)
# Created: 2026-02-03
# =============================================================================

metadata:
  toolkit_id: "TKT-SRG-001"
  name: "SRG Change Readiness Interventionsbaukasten"
  model_basis: "MOD-SRG-001"
  projekt_kontext: "Enavant SRG SSR Transformation"

  empirische_basis:
    studie: "SRG017 Personalbefragung"
    n: 2847
    methodik: "Strukturgleichungsmodell (SEM)"

  zielvariable:
    name: "Willingness (Veränderungsbereitschaft)"
    beschreibung: "Bereitschaft, die Transformation aktiv mitzutragen"

# =============================================================================
# ÜBERSICHT: HEBEL NACH WIRKUNGSSTÄRKE
# =============================================================================

hebel_ranking:
  - rang: 1
    variable: "Identity"
    direkter_effekt: 0.715
    interventionen_count: 6
    prioritaet: "KRITISCH"

  - rang: 2
    variable: "Awareness"
    direkter_effekt: 0.430
    interventionen_count: 5
    prioritaet: "HOCH"

  - rang: 3
    variable: "Health"
    direkter_effekt: 0.418
    interventionen_count: 5
    prioritaet: "HOCH"

  - rang: 4
    variable: "Leadership"
    direkter_effekt: 0.378
    total_effekt: 0.787  # inkl. Mediation über Identity & Health
    interventionen_count: 6
    prioritaet: "HOCH"

# =============================================================================
# INTERVENTIONEN: IDENTITY (β = 0.715)
# =============================================================================
# Stärkster Hebel! Wer sich mit der SRG-Mission identifiziert,
# trägt den Wandel automatisch mit.

interventionen_identity:

  - id: "INT-IDN-001"
    name: "Service-Public-Storytelling"
    ziel: "Identity ↑"
    beschreibung: |
      Regelmässige Kommunikation von Impact-Stories: Wie hat SRG-Journalismus
      konkret einen Unterschied gemacht? Demokratie gestärkt? Minderheiten
      eine Stimme gegeben?

    massnahmen:
      - "Monatlicher «Impact Report» mit konkreten Beispielen"
      - "Video-Testimonials von Bürger:innen, die SRG-Inhalte schätzen"
      - "Interne Plattform für «Stolz-Momente» der Mitarbeitenden"

    erwarteter_effekt: "Identity +0.10 → Willingness +0.07"
    aufwand: "mittel"
    zeithorizont: "kurzfristig (1-3 Monate)"
    verantwortlich: "Unternehmenskommunikation"

  - id: "INT-IDN-002"
    name: "Purpose-Workshops"
    ziel: "Identity ↑"
    beschreibung: |
      Moderierte Team-Workshops: «Warum arbeite ich bei der SRG?»
      Verbindung zwischen persönlicher Motivation und SRG-Mission herstellen.

    massnahmen:
      - "2-stündige Workshops pro Team (max. 15 Personen)"
      - "Visualisierung: Persönliche Werte ↔ SRG-Werte"
      - "Commitment-Statement pro Team"

    erwarteter_effekt: "Identity +0.15 → Willingness +0.11"
    aufwand: "hoch"
    zeithorizont: "mittelfristig (3-6 Monate)"
    verantwortlich: "HR + Führungskräfte"

  - id: "INT-IDN-003"
    name: "Identitätsbrücken schaffen"
    ziel: "Identity ↑"
    beschreibung: |
      Explizit kommunizieren: Die NEUE SRG ist immer noch die GLEICHE Mission.
      Vertikalisierung ändert die Struktur, nicht den Purpose.

    massnahmen:
      - "Kernbotschaft: «Neue Wege, gleiche Mission»"
      - "Konkrete Beispiele: Wie Vertikalisierung Journalismus STÄRKT"
      - "Regionale Identität bewahren trotz Zentralisierung"

    erwarteter_effekt: "Identity +0.08 → Willingness +0.06"
    aufwand: "niedrig"
    zeithorizont: "kurzfristig (1-3 Monate)"
    verantwortlich: "Geschäftsleitung"

  - id: "INT-IDN-004"
    name: "Alumni-Botschafter:innen"
    ziel: "Identity ↑"
    beschreibung: |
      Ehemalige SRG-Mitarbeitende als Botschafter:innen einsetzen.
      «Ich bin stolz, bei der SRG gearbeitet zu haben, weil...»

    massnahmen:
      - "Alumni-Netzwerk aufbauen"
      - "Testimonial-Videos von bekannten Ex-Mitarbeitenden"
      - "Alumni-Events mit aktuellen Mitarbeitenden"

    erwarteter_effekt: "Identity +0.05 → Willingness +0.04"
    aufwand: "mittel"
    zeithorizont: "mittelfristig (3-6 Monate)"
    verantwortlich: "HR + Kommunikation"

  - id: "INT-IDN-005"
    name: "Zukunftsbild co-kreieren"
    ziel: "Identity ↑"
    beschreibung: |
      Mitarbeitende aktiv in die Gestaltung der «SRG 2030» einbinden.
      Wer mitgestaltet, identifiziert sich stärker.

    massnahmen:
      - "Ideation-Workshops: «Meine SRG 2030»"
      - "Digitale Plattform für Verbesserungsvorschläge"
      - "Sichtbare Umsetzung von Mitarbeiter-Ideen"

    erwarteter_effekt: "Identity +0.12 → Willingness +0.09"
    aufwand: "hoch"
    zeithorizont: "mittelfristig (3-6 Monate)"
    verantwortlich: "Transformation Office"

  - id: "INT-IDN-006"
    name: "Symbolische Kontinuität"
    ziel: "Identity ↑"
    beschreibung: |
      Rituale, Symbole und Traditionen der SRG bewusst pflegen,
      um Identitätskontinuität zu signalisieren.

    massnahmen:
      - "SRG-Jubiläen und Meilensteine feiern"
      - "Geschichte sichtbar machen (Museum, Timeline)"
      - "Traditions-Elemente in neue Strukturen übernehmen"

    erwarteter_effekt: "Identity +0.05 → Willingness +0.04"
    aufwand: "niedrig"
    zeithorizont: "kurzfristig (1-3 Monate)"
    verantwortlich: "Unternehmenskommunikation"

# =============================================================================
# INTERVENTIONEN: AWARENESS (β = 0.430)
# =============================================================================
# Zweitstärkster Hebel! Information macht veränderungsbereit.
# ABER: Awareness-Gap zwischen FK (3.74) und MA (3.52) schliessen!

interventionen_awareness:

  - id: "INT-AWA-001"
    name: "Transparenz-Offensive"
    ziel: "Awareness ↑, Awareness-Gap ↓"
    beschreibung: |
      Direkte, ungefilterte Kommunikation an ALLE Mitarbeitenden.
      Keine Informationskaskade über Führungsebenen.

    massnahmen:
      - "Monatliches CEO-Update direkt an alle (Video/Text)"
      - "Echtzeit-Dashboard: Transformationsfortschritt"
      - "FAQ-Datenbank mit ehrlichen Antworten"

    erwarteter_effekt: "Awareness +0.15, Gap -0.10 → Willingness +0.06"
    aufwand: "mittel"
    zeithorizont: "kurzfristig (1-3 Monate)"
    verantwortlich: "Generaldirektorin + Kommunikation"

  - id: "INT-AWA-002"
    name: "Information + Kontext + Handlung"
    ziel: "Awareness ↑, Unsicherheit ↓"
    beschreibung: |
      Information allein erhöht Unsicherheit (β=0.351)!
      Deshalb: Jede Information mit Kontext und Handlungsoptionen verbinden.

    massnahmen:
      - "Template: «Was passiert → Warum → Was bedeutet das für dich → Was kannst du tun»"
      - "Jede Ankündigung mit «Next Steps» für Betroffene"
      - "Konkrete Anlaufstellen nennen"

    erwarteter_effekt: "Awareness ↑ OHNE Unsicherheit ↑"
    aufwand: "niedrig"
    zeithorizont: "sofort"
    verantwortlich: "Alle Kommunikationsverantwortlichen"

  - id: "INT-AWA-003"
    name: "Fragerunden ohne Filter"
    ziel: "Awareness ↑"
    beschreibung: |
      Regelmässige Q&A-Sessions mit Geschäftsleitung.
      Alle Fragen werden beantwortet - auch die unbequemen.

    massnahmen:
      - "Monatliche Townhalls mit Live-Q&A"
      - "Anonyme Frage-Box vor jeder Session"
      - "Nachbereitung: Alle Fragen + Antworten schriftlich"

    erwarteter_effekt: "Awareness +0.10 → Willingness +0.04"
    aufwand: "mittel"
    zeithorizont: "kurzfristig (1-3 Monate)"
    verantwortlich: "Geschäftsleitung"

  - id: "INT-AWA-004"
    name: "Peer-to-Peer Information"
    ziel: "Awareness ↑"
    beschreibung: |
      Change Agents auf Peer-Ebene, die Information weitergeben
      und Fragen beantworten können.

    massnahmen:
      - "Change Agent Netzwerk (1 pro 20-30 MA)"
      - "Wöchentliche Briefings für Change Agents"
      - "Change Agents als erste Ansprechpartner"

    erwarteter_effekt: "Awareness +0.12, Vertrauen ↑ → Willingness +0.05"
    aufwand: "hoch"
    zeithorizont: "mittelfristig (3-6 Monate)"
    verantwortlich: "HR + Transformation Office"

  - id: "INT-AWA-005"
    name: "Szenario-Kommunikation"
    ziel: "Awareness ↑"
    beschreibung: |
      Transparente Kommunikation über verschiedene Szenarien
      (inkl. Halbierungsinitiative). Vorbereitung reduziert Schock.

    massnahmen:
      - "Drei Szenarien klar kommunizieren: Best/Base/Worst Case"
      - "Was passiert bei JA zur Halbierungsinitiative?"
      - "Konkrete Massnahmen pro Szenario aufzeigen"

    erwarteter_effekt: "Awareness ↑, Kontrollgefühl ↑ → Willingness +0.05"
    aufwand: "mittel"
    zeithorizont: "kurzfristig (vor 8. März 2026)"
    verantwortlich: "Geschäftsleitung + Kommunikation"

# =============================================================================
# INTERVENTIONEN: HEALTH (β = 0.418)
# =============================================================================
# Erschöpfte Menschen können sich nicht verändern!
# Gesundheitsförderung ist Change-Enabler.

interventionen_health:

  - id: "INT-HLT-001"
    name: "Resilienz-Check"
    ziel: "Health ↑"
    beschreibung: |
      Regelmässige, anonyme Pulse-Checks zum organisationalen Wohlbefinden.
      Frühwarnsystem für Überlastung.

    massnahmen:
      - "Monatlicher 3-Fragen-Pulse (anonym)"
      - "Team-Level Auswertung (keine Einzelpersonen)"
      - "Automatische Alerts bei kritischen Werten"

    erwarteter_effekt: "Früherkennung → gezielte Intervention"
    aufwand: "niedrig"
    zeithorizont: "kurzfristig (1-3 Monate)"
    verantwortlich: "HR"

  - id: "INT-HLT-002"
    name: "Führungskräfte als Schutzschild"
    ziel: "Health ↑ via Leadership"
    beschreibung: |
      Führungskräfte schulen, Überlastungszeichen zu erkennen
      und proaktiv zu handeln.

    massnahmen:
      - "Training: «Früherkennung von Überlastung»"
      - "Checkliste für 1:1-Gespräche"
      - "Escalation-Pfade bei Warnsignalen"

    erwarteter_effekt: "Leadership → Health (+0.366) → Willingness"
    aufwand: "mittel"
    zeithorizont: "kurzfristig (1-3 Monate)"
    verantwortlich: "HR + Führungskräfte"

  - id: "INT-HLT-003"
    name: "Change-Pausen"
    ziel: "Health ↑"
    beschreibung: |
      Bewusste Phasen OHNE neue Veränderungskommunikation.
      «Change Fatigue» durch Erholungsphasen reduzieren.

    massnahmen:
      - "Nach grossen Ankündigungen: 2-4 Wochen «Verdauungszeit»"
      - "Keine parallelen Grossprojekte starten"
      - "Priorisierung: Was kann warten?"

    erwarteter_effekt: "Health ↑, Change Fatigue ↓ → Willingness +0.05"
    aufwand: "niedrig"
    zeithorizont: "sofort"
    verantwortlich: "Transformation Office"

  - id: "INT-HLT-004"
    name: "Peer-Support-Gruppen"
    ziel: "Health ↑"
    beschreibung: |
      Moderierte Austauschrunden für Mitarbeitende in ähnlichen Situationen.
      Geteilte Unsicherheit = halbe Unsicherheit.

    massnahmen:
      - "Gruppen nach Betroffenheit (z.B. Standortwechsel, neue Rollen)"
      - "Externe Moderation (neutral)"
      - "Freiwillige Teilnahme"

    erwarteter_effekt: "Health +0.08 → Willingness +0.03"
    aufwand: "mittel"
    zeithorizont: "mittelfristig (3-6 Monate)"
    verantwortlich: "HR + externe Partner"

  - id: "INT-HLT-005"
    name: "Ressourcen-Transparenz"
    ziel: "Health ↑"
    beschreibung: |
      Klar kommunizieren: Welche Unterstützung gibt es?
      EAP, Coaching, Weiterbildung, Outplacement.

    massnahmen:
      - "Übersicht aller Unterstützungsangebote"
      - "Niederschwelliger Zugang (keine Stigmatisierung)"
      - "Führungskräfte als Multiplikatoren"

    erwarteter_effekt: "Kontrollgefühl ↑ → Health ↑ → Willingness +0.04"
    aufwand: "niedrig"
    zeithorizont: "kurzfristig (1-3 Monate)"
    verantwortlich: "HR"

# =============================================================================
# INTERVENTIONEN: LEADERSHIP (β = 0.378, total = 0.787)
# =============================================================================
# Dreifache Wirkung: direkt + via Identity + via Health!
# Führungskräfte sind Schlüssel zur Transformation.

interventionen_leadership:

  - id: "INT-LDR-001"
    name: "Führungskräfte als Identitätsmultiplikatoren"
    ziel: "Leadership → Identity → Willingness"
    beschreibung: |
      Führungskräfte schulen, die SRG-Mission authentisch zu verkörpern
      und in ihren Teams zu vermitteln.

    massnahmen:
      - "Workshop: «Meine Verbindung zur SRG-Mission»"
      - "Storytelling-Training für Führungskräfte"
      - "Regelmässige Identity-Gespräche in Teams"

    erwarteter_effekt: "Leadership → Identity (+0.358) → Willingness"
    aufwand: "hoch"
    zeithorizont: "mittelfristig (3-6 Monate)"
    verantwortlich: "HR + Leadership Development"

  - id: "INT-LDR-002"
    name: "FK auch verunsichert - authentisch kommunizieren"
    ziel: "Leadership ↑"
    beschreibung: |
      FK sind genauso verunsichert wie MA (3.95 vs 3.90)!
      Authentische Kommunikation über eigene Unsicherheit schafft Verbindung.

    massnahmen:
      - "Training: «Vulnerable Leadership»"
      - "Ermutigung: «Ich weiss es auch nicht, aber...»"
      - "Gemeinsame Lösungssuche statt Allwissenheit"

    erwarteter_effekt: "Vertrauen ↑, Authentizität ↑ → Leadership ↑ → Willingness"
    aufwand: "niedrig"
    zeithorizont: "kurzfristig (1-3 Monate)"
    verantwortlich: "Geschäftsleitung (Vorbild)"

  - id: "INT-LDR-003"
    name: "Führungskräfte-Netzwerk"
    ziel: "Leadership ↑"
    beschreibung: |
      Peer-Support für Führungskräfte. Austausch über Herausforderungen,
      Best Practices, gegenseitige Unterstützung.

    massnahmen:
      - "Monatliche FK-Runden (cross-funktional)"
      - "Buddy-System für neue Führungsrollen"
      - "Erfahrungsaustausch über Regionen hinweg"

    erwarteter_effekt: "FK-Kompetenz ↑ → Leadership ↑ → Willingness"
    aufwand: "mittel"
    zeithorizont: "mittelfristig (3-6 Monate)"
    verantwortlich: "HR"

  - id: "INT-LDR-004"
    name: "Kommunikations-Toolkit für FK"
    ziel: "Leadership ↑"
    beschreibung: |
      Führungskräfte mit konkreten Tools ausstatten für
      schwierige Gespräche und Change-Kommunikation.

    massnahmen:
      - "Gesprächsleitfäden für typische Situationen"
      - "FAQ mit Argumentationshilfen"
      - "Hotline für akute Fragen"

    erwarteter_effekt: "FK-Sicherheit ↑ → Leadership ↑ → Willingness"
    aufwand: "mittel"
    zeithorizont: "kurzfristig (1-3 Monate)"
    verantwortlich: "Transformation Office + HR"

  - id: "INT-LDR-005"
    name: "Walk the Talk"
    ziel: "Leadership ↑"
    beschreibung: |
      Geschäftsleitung sichtbar machen. Präsenz vor Ort,
      nicht nur digitale Kommunikation.

    massnahmen:
      - "GL-Mitglieder besuchen alle Standorte"
      - "Informelle Gespräche (Kaffee, Kantine)"
      - "Zuhören statt nur kommunizieren"

    erwarteter_effekt: "Nähe ↑, Vertrauen ↑ → Leadership ↑ → Willingness"
    aufwand: "hoch (Zeit)"
    zeithorizont: "laufend"
    verantwortlich: "Geschäftsleitung"

  - id: "INT-LDR-006"
    name: "Mittleres Management stärken"
    ziel: "Leadership ↑"
    beschreibung: |
      Mittleres Management ist am stärksten «eingeklemmt».
      Spezifische Unterstützung für diese Ebene.

    massnahmen:
      - "Dedicated Coaching für mittleres Management"
      - "Entscheidungsspielräume klar definieren"
      - "Rückendeckung von oben zusichern"

    erwarteter_effekt: "Leadership auf kritischer Ebene ↑ → Willingness"
    aufwand: "hoch"
    zeithorizont: "mittelfristig (3-6 Monate)"
    verantwortlich: "HR + Geschäftsleitung"

# =============================================================================
# PRIORISIERUNGS-MATRIX
# =============================================================================

priorisierung:

  sofort_starten:  # Quick Wins mit hohem Impact
    - "INT-IDN-001"  # Service-Public-Storytelling
    - "INT-IDN-003"  # Identitätsbrücken
    - "INT-AWA-002"  # Information + Kontext + Handlung
    - "INT-LDR-002"  # FK authentisch kommunizieren
    - "INT-HLT-003"  # Change-Pausen

  kurzfristig:  # 1-3 Monate
    - "INT-AWA-001"  # Transparenz-Offensive
    - "INT-AWA-003"  # Fragerunden ohne Filter
    - "INT-AWA-005"  # Szenario-Kommunikation (vor 8. März!)
    - "INT-HLT-001"  # Resilienz-Check
    - "INT-HLT-002"  # FK als Schutzschild
    - "INT-HLT-005"  # Ressourcen-Transparenz
    - "INT-LDR-004"  # Kommunikations-Toolkit

  mittelfristig:  # 3-6 Monate
    - "INT-IDN-002"  # Purpose-Workshops
    - "INT-IDN-005"  # Zukunftsbild co-kreieren
    - "INT-AWA-004"  # Change Agent Netzwerk
    - "INT-HLT-004"  # Peer-Support-Gruppen
    - "INT-LDR-001"  # FK als Identitätsmultiplikatoren
    - "INT-LDR-003"  # Führungskräfte-Netzwerk
    - "INT-LDR-006"  # Mittleres Management stärken

# =============================================================================
# WIRKUNGSMODELL: INTERVENTIONEN → WILLINGNESS
# =============================================================================

wirkungsmodell:

  beschreibung: |
    Jede Intervention wirkt auf eine oder mehrere Modellvariablen.
    Der Effekt auf Willingness berechnet sich über die β-Koeffizienten.

  formel: |
    ΔWillingness = 0.715·ΔIdentity + 0.430·ΔAwareness + 0.418·ΔHealth + 0.378·ΔLeadership

  beispielrechnung:
    szenario: "Kombinierte Intervention (3 Monate)"
    interventionen:
      - "INT-IDN-001 → Identity +0.10"
      - "INT-AWA-001 → Awareness +0.15"
      - "INT-HLT-002 → Health +0.08"
    berechnung: |
      ΔWillingness = 0.715·0.10 + 0.430·0.15 + 0.418·0.08
                   = 0.072 + 0.065 + 0.033
                   = 0.17
    interpretation: |
      Eine kombinierte Intervention über 3 Monate könnte die
      Veränderungsbereitschaft um ca. 17% einer Standardabweichung erhöhen.

# =============================================================================
# RISIKEN & WARNUNGEN
# =============================================================================

risiken:

  - risiko: "Crowding-Out Social + Financial"
    beschreibung: |
      NICHT: Finanzielle Anreize für Transformations-Engagement.
      Das würde die intrinsische Motivation (Identity) untergraben.
    vermeiden:
      - "Keine Boni für «Change Champions»"
      - "Keine monetären Belohnungen für Partizipation"

  - risiko: "Information Overload"
    beschreibung: |
      Mehr Information kann Unsicherheit ERHÖHEN (β=0.351).
      Information braucht Kontext und Handlungsoptionen.
    vermeiden:
      - "Nie Information ohne «Was bedeutet das für mich?»"
      - "Nie Information ohne «Was kann ich tun?»"

  - risiko: "Pseudo-Partizipation"
    beschreibung: |
      Partizipation ohne echten Einfluss macht zynisch.
      Besser keine Beteiligung als Schein-Beteiligung.
    vermeiden:
      - "Nur fragen, wenn Antworten auch gehört werden"
      - "Transparent kommunizieren, was entschieden ist"

