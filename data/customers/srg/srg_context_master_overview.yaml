    psi_T_temporal:
      value: 0.75
      sources: ["STR-TRA-*"]
      description: "Enavant Timeline, Abstimmungsdatum"

    psi_M_material:
      value: 0.60
      sources: ["TEC-*"]
      description: "Technische Infrastruktur, Digitalisierung"

    psi_F_physical:
