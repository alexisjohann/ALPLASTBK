    psi_K_cultural:
      value: 0.85
      sources: ["ORG-REG-*", "MKT-REG-*"]
      description: "4 Sprachregionen, kulturelle Vielfalt"

    psi_E_economic:
      value: 0.65
      sources: ["FIN-*", "RIS-FIN-*"]
