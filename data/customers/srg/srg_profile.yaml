  beschreibung: |
    Grösstes Transformationsprojekt in der SRG-Geschichte.
    Umfassende Neustrukturierung mit Vertikalisierung der
    Funktionsbereiche und Abbau von 900 Vollzeitstellen.

  sparbedarf_mio_chf: 270
  sparbedarf_percent: 17

  kernelemente:
    - element: "Vertikalisierung"
      beschreibung: "HR, Finanzen, IT werden SRG-weit zentral gefuehrt"
      start: "Januar 2026"

    - element: "Redaktions-Zusammenlegung"
      beschreibung: "Merger der bisher separaten Redaktionen"
      start: "Januar 2026"

    - element: "Stellenabbau"
      anzahl: 900
      percent_von_belegschaft: 12.6
      zeitraum: "bis 2029"

    - element: "Integration"
      beschreibung: "Swissinfo und SwissTXT werden integriert"

  timeline_kurzfassung:
    - "2024-10: Lancierung Enavant"
    - "2025-06: Oeffentliche Ankuendigung"
    - "2025-11: Konkretisierung Stellenabbau (900 FTE)"
    - "2026-01: Start Vertikalisierung (HR, Finanzen)"
    - "2026-04: Verkleinerung Geschaeftsleitung"
    - "2029-12: Abschluss Transformation"

  projekt_details: "srg_project_enavant.yaml"

  verbindung_srg017:
    projekt: "SRG017 Personalbefragung"
    zweck: "Messung Change Readiness im Enavant-Kontext"
    kernbefund: "Identity ist staerkster Treiber fuer Willingness (beta=0.715)"

# =============================================================================
# PSI-DIMENSIONEN (SRG-spezifisch)
# =============================================================================

psi_dimensions:

  psi_I_institutional:
    value: 0.90
    label: "Institutionell"
    description: |
      SRG als Institution mit Verfassungsauftrag (Art. 93 BV).
      Konzession durch BAKOM, politische Kontrolle durch Parlament.
      Service-Public-Debatte ist wiederkehrendes Thema.
    key_factors:
      - "Verfassungsauftrag Radio/TV"
      - "SRG-Konzession (Leistungsauftrag)"
      - "BAKOM-Aufsicht"
      - "Direkte Demokratie (Abstimmungen)"
    ebf_kappa: "kappa_INST"

  psi_S_social:
    value: 0.70
    label: "Sozial"
    description: |
      SRG-Nutzung variiert stark nach Alter und Region.
      Starke emotionale Bindung bei aelteren Generationen.
      Juengere Generation nutzt vermehrt Streaming-Dienste.
    key_factors:
      - "Generationenunterschied (Boomer vs. Gen Z)"
      - "Regionale Identitaet (SRF vs. RTS vs. RSI)"
      - "Stadt-Land-Gefaelle"
    ebf_kappa: "kappa_SOCIAL"

  psi_C_cognitive:
    value: 0.50
    label: "Kognitiv"
    description: |
      Viele Stimmberechtigte unterschaetzen SRG-Leistungsumfang.
      Komplexitaet des Medienmarkts wird oft nicht verstanden.
      Emotionale Argumente (Tatort!) oft wirksamer als rationale.
    key_factors:
      - "Wissen ueber SRG-Leistungen"
      - "Verstaendnis Medienfinanzierung"
      - "Emotionale vs. rationale Entscheidung"
    ebf_kappa: "kappa_COG"

  psi_K_cultural:
    value: 0.85
    label: "Kulturell"
    description: |
      SRG als Teil der schweizerischen Identitaet.
      Verbindung der vier Sprachregionen.
      Aber auch: Skepsis gegenueber "Staatsmedien".
    key_factors:
      - "Schweizerische Medienkultur"
      - "Mehrsprachigkeit als Wert"
      - "Misstrauen gegen 'Mainstream-Medien'"
    ebf_kappa: "kappa_CULT"

  psi_E_economic:
    value: 0.65
    label: "Oekonomisch"
    description: |
      335 CHF als spuerbarer Betrag fuer Haushalte.
      Aber: Vergleich mit Netflix/Spotify relativiert.
      Wirtschaftliche Argumente (Arbeitsplaetze) relevant.
    key_factors:
      - "Haushaltsbelastung"
      - "Vergleich mit Streaming-Kosten"
      - "Arbeitsplaetze bei SRG"
    ebf_kappa: "kappa_ECON"

  psi_T_temporal:
    value: 0.70
    label: "Temporal"
    description: |
      Abstimmungskampagne laeuft seit Januar 2026.
      Meinungsbildung in letzten 4 Wochen entscheidend.
      No-Billag 2018 als praegender Referenzpunkt.
    key_factors:
      - "Kampagnen-Timing"
      - "No-Billag-Erinnerung"
      - "Medienpaket 2022 als juengster Referenzpunkt"
    ebf_kappa: "kappa_TEMP"

