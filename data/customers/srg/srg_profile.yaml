  description: |
    Kontextvektor fuer die Schweizerische Radio- und Fernsehgesellschaft (SRG SSR).
    Oeffentlich-rechtlicher Rundfunk der Schweiz mit vier Sprachregionen.

    Aktuelle Herausforderungen:
