# =============================================================================
# VERBINDUNG ZU SRG017 (PERSONALBEFRAGUNG)
# =============================================================================

srg017_verbindung:

  projekt_id: "SRG017"
  name: "Personalbefragung Change Readiness"

  relevanz: |
    Die SRG017-Befragung misst die Veränderungsbereitschaft (Willingness)
    der Mitarbeitenden im Kontext der Enavant-Transformation.

  kernbefunde:
    - befund: "Identity → Willingness (β=0.715)"
      implikation: |
        Stärkste Hebelwirkung: Wer sich mit der SRG-Mission identifiziert,
        ist bereit für den Wandel. Purpose-Kommunikation ist kritisch.

    - befund: "Awareness → Willingness (β=0.430)"
      implikation: |
        Information macht veränderungsbereit. Aber: Es gibt einen
        Awareness-Gap zwischen Führung und Mitarbeitenden (Δ=0.22).

    - befund: "Alle gleich verunsichert (FK = MA)"
      implikation: |
        Die Transformation verunsichert alle Hierarchieebenen gleich.
        Führungskräfte sind nicht "abgeschirmt".

    - befund: "Mehr Wissen → Mehr Unsicherheit"
      implikation: |
        Information allein reicht nicht. Muss mit Kontext und
        Handlungsoptionen verbunden werden.

  empfehlungen:
    - prioritaet: 1
      intervention: "Identity-Stärkung"
      beschreibung: "Service-Public-Narrativ, Purpose-Kommunikation"

    - prioritaet: 2
      intervention: "Awareness-Steigerung"
      beschreibung: "Transparente, direkte Kommunikation an alle"

    - prioritaet: 3
      intervention: "Leadership-Entwicklung"
      beschreibung: "FK als Identitätsmultiplikatoren schulen"

