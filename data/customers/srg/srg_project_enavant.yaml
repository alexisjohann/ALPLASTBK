# =============================================================================
# SRG SSR - TRANSFORMATIONSPROJEKT «ENAVANT SRG SSR»
# =============================================================================
# Version: 1.0.0
# Framework: EBF Evidence-Based Framework
# Created: 2026-02-03
# =============================================================================

metadata:
  project_id: "PRJ-SRG-002"
  name: "Enavant SRG SSR"
  name_meaning: "Vorwärts (Rätoromanisch)"
  type: "Organisationstransformation"
  status: "active"
  start_date: "2024-10"
  end_date: "2029-12"

  description: |
    «Enavant SRG SSR» ist das grösste Transformationsprojekt in der
    Geschichte der SRG. Es umfasst eine tiefgreifende Neustrukturierung
    der Organisation mit dem Ziel, bis 2029 rund 270 Mio. CHF einzusparen.

    Kernelemente:
    - Vertikalisierung der Funktionsbereiche (HR, Finanzen, IT)
    - Auflösung der regional-autonomen Struktur
    - Integration von Swissinfo und SwissTXT
    - Abbau von 900 Vollzeitstellen

  leadership:
    initiiert_durch: "Verwaltungsrat & Generaldirektorin"
    generaldirektorin: "Susanne Wille"
    seit: "2024-10"

  related_projects:
    - "PRJ-SRG-001: Halbierungsinitiative (externe Bedrohung)"
    - "SRG017: Personalbefragung Change Readiness"

# =============================================================================
# FINANZIELLE RAHMENBEDINGUNGEN
# =============================================================================

financial_context:

  sparbedarf_total_mio_chf: 270
  sparbedarf_percent: 17
  zeithorizont: "bis 2029"

  ursachen:
    - faktor: "Serafe-Gebührensenkung"
      details: "335 CHF → 312 CHF (2027) → 300 CHF (2029)"
      impact_mio_chf: -130

    - faktor: "Rückgang kommerzielle Einnahmen"
      details: "Werbung, Sponsoring"
      impact_mio_chf: -90

    - faktor: "Teuerung & Betriebskosten"
      details: "Inflation, Lohnkosten"
      impact_mio_chf: +60

  szenario_halbierungsinitiative:
    description: |
      Falls die Halbierungsinitiative am 8. März 2026 angenommen wird,
      erhöht sich der Sparbedarf massiv.
    zusaetzlicher_stellenabbau: 1500
    total_stellenabbau: 2400

# =============================================================================
# VERTIKALISIERUNG - ORGANISATIONSSTRUKTUR
# =============================================================================

vertikalisierung:

  definition: |
    Übergang von einer horizontal-regionalen Struktur (jede Unternehmens-
    einheit mit eigenen Funktionsbereichen) zu einer vertikal-funktionalen
    Struktur (zentrale Funktionsbereiche über alle Regionen hinweg).

  bisherige_struktur:
    name: "Regional-autonom"
    beschreibung: |
      Jede Unternehmenseinheit (SRF, RTS, RSI, RTR) verfügt über eigene:
      - HR-Abteilung
      - Finanzabteilung
      - IT/Technologie
      - Produktionsplanung
      - Redaktionen

    nachteile:
      - "Redundante Strukturen"
      - "Fehlende SRG-übergreifende Standards"
      - "Nur 3-5% der Inhalte werden mehrfach genutzt"
      - "Keine einheitliche Erfolgsmessung"
      - "Hohe Kosten für Parallelstrukturen"

  neue_struktur:
    name: "Funktional-vertikal"
    beschreibung: |
      Zentrale Funktionsbereiche, die SRG-weit einheitlich geführt werden.
      Die Unternehmenseinheiten fokussieren auf Content/Journalismus.

    zentrale_funktionen:
      - bereich: "Human Resources"
        status: "Ab Januar 2026 SRG-weit"

      - bereich: "Finanzen"
        status: "Ab Januar 2026 SRG-weit"

      - bereich: "IT/Technologie"
        status: "Umsetzung 2026"

      - bereich: "Produktionsplanung"
        status: "Harmonisierung geplant"

    regionale_verankerung:
      beschreibung: |
        Trotz Zentralisierung bleibt die regionale Verankerung zentral.
        Journalismus und Content-Produktion bleiben regional.
      bereiche:
        - "Journalismus (SRF, RTS, RSI, RTR)"
        - "Regionale Berichterstattung"
        - "Sprachregionale Identität"

  integration:
    - name: "Swissinfo"
      status: "Integration geplant"
      beschreibung: "Internationale Berichterstattung"

    - name: "SwissTXT"
      status: "Integration geplant"
      beschreibung: "Untertitelung, Teletext, Accessibility"

