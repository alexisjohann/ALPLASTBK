# =============================================================================
# ÜBERGEORDNETE STRATEGIE KANTON SG
# =============================================================================

cantonal_strategy:

  energiekonzept:
    name: "Energiekonzept Kanton St. Gallen 2021-2030"
    status: "aktiv"
    horizon: "2030"

    vision: |
      Der Kanton St. Gallen strebt eine nachhaltige, sichere und
      wirtschaftliche Energieversorgung an. Der Anteil erneuerbarer
      Energien soll deutlich gesteigert, die Energieeffizienz verbessert
      und die CO2-Emissionen reduziert werden.

    goals:
      - goal: "Reduktion CO2-Emissionen Gebäude"
        target: "-40% vs. 2010"
        deadline: "2030"
        status: "on_track"

      - goal: "Anteil erneuerbare Heizungen"
        target: "50%"
        deadline: "2030"
        current: "35%"
        gap: "15pp"

      - goal: "Ersatz fossiler Heizungen"
        target: "40'000 Anlagen"
        deadline: "2030"
        current: "~15'000"
        annual_target: "5'000/Jahr"

      - goal: "Energieeffizienz Gebäude"
        target: "+20% vs. 2015"
        deadline: "2030"

    pillars:
      - name: "Heizungsersatz"
        priority: "1"
        budget_share: 0.60
        key_measure: "Impulsprogramm 2025-2026"

      - name: "Gebäudehülle"
        priority: "2"
        budget_share: 0.25
        key_measure: "GEAK-Förderung"

      - name: "Erneuerbare Produktion"
        priority: "3"
        budget_share: 0.10
        key_measure: "PV-Förderung"

      - name: "Sensibilisierung"
        priority: "4"
        budget_share: 0.05
        key_measure: "Kommunikationskampagnen"

  klimastrategie:
    name: "Klimastrategie Kanton St. Gallen"
    status: "in_development"
    expected: "2026"
    alignment: "Paris Agreement"

# =============================================================================
# AWE ABTEILUNGSSTRATEGIE ENERGIE
# =============================================================================

energy_division_strategy:

  mission: |
    Die Abteilung Energie und Klima unterstützt Bevölkerung und
    Wirtschaft beim Umstieg auf erneuerbare Energien und fördert
    die effiziente Energienutzung im Kanton St. Gallen.

  strategic_priorities_2026:
    - priority: 1
      name: "Impulsprogramm maximieren"
      description: "Maximale Ausschöpfung der +30% Bundesförderung bis Ende 2026"
      kpis:
        - "Anzahl Anträge MFH"
        - "Anzahl Anträge Industrie"
        - "Fördermittel-Absorption"
      ebf_relevance: "critical"

    - priority: 2
      name: "Notfallersetzungen lenken"
      description: "Erhöhung Erneuerbare-Anteil bei Notfallersetzungen"
      kpis:
        - "% erneuerbar bei Defekt-Ersatz"
      ebf_relevance: "high"

    - priority: 3
      name: "Multipliatoren aktivieren"
      description: "Installateure als Partner für Energiewende"
      kpis:
        - "Schulungsteilnahmen"
        - "Empfehlungsrate"
      ebf_relevance: "high"

    - priority: 4
      name: "Digitalisierung Förderung"
      description: "Vereinfachung und Beschleunigung Förderprozesse"
      kpis:
        - "Bearbeitungszeit"
        - "Online-Quote"
        - "Abbruchrate"
      ebf_relevance: "medium"

# =============================================================================
# FÖRDERSTRATEGIE
# =============================================================================

funding_strategy:

  principles:
    - "Heizungsersatz vor Dämmung"
    - "Grössere Anlagen priorisieren"
    - "Multiplikatoren einbinden"
    - "Einfacher Zugang"

  resource_allocation:
    heizungsersatz: 0.65
    gebaeudehuelle: 0.20
    erneuerbare_produktion: 0.10
    beratung_kommunikation: 0.05

  impulsprogramm_strategy:
    focus_segments:
      - segment: "MFH"
        rationale: "Grösste Hebelwirkung, Impulsprogramm-Fokus"
        target_share: 0.45
      - segment: "Industrie"
        rationale: "Grosse Anlagen, Impulsprogramm-Fokus"
        target_share: 0.30
      - segment: "EFH"
        rationale: "Volumen, aber kleinere Einzelförderung"
        target_share: 0.25

    communication_strategy:
      key_message: "Jetzt +30% mehr Förderung - nur noch bis Ende 2026"
      channels:
        - "Direkt-Mailing an MFH-Eigentümer"
        - "Branchenverbände"
        - "Installateur-Netzwerk"
        - "Gemeinden"

# =============================================================================
# KOMMUNIKATIONSSTRATEGIE
# =============================================================================

communication_strategy:

  brand_positioning:
    tone: "kompetent, unterstützend, pragmatisch"
    key_messages:
      - "Wir unterstützen Sie beim Heizungsersatz"
      - "Jetzt profitieren: +30% Förderung bis Ende 2026"
      - "Einfach online beantragen"

  channels:
    primary:
      - channel: "Energieagentur Website"
        reach: "medium"
        control: "high"
      - channel: "Förderportal"
        reach: "high"
        control: "high"
      - channel: "Installateure"
        reach: "very_high"
        control: "low"
    secondary:
      - channel: "Gemeinden"
        reach: "medium"
        control: "medium"
      - channel: "Medien"
        reach: "high"
        control: "low"

  target_group_specific:
    efh:
      messages: ["Förderung", "Kosteneinsparung", "Wertsteigerung"]
      channels: ["Installateur", "Gemeinde", "Print"]
    mfh:
      messages: ["Impulsprogramm +30%", "ROI", "Deadline"]
      channels: ["Direkt-Mailing", "Verwaltungen", "Energieberater"]
    industrie:
      messages: ["Grossförderung", "CO2-Bilanz", "Compliance"]
      channels: ["Branchenverbände", "Direktkontakt"]

# =============================================================================
# PARTNERSCHAFTSSTRATEGIE
# =============================================================================

partnership_strategy:

  energieagentur:
    role: "Strategischer Umsetzungspartner"
    responsibilities:
      - "Förderabwicklung"
      - "Energieberatung"
      - "Kommunikation"
      - "Installateur-Netzwerk"
    governance: "Leistungsvereinbarung"

  installateure:
    strategy: "Partnerschaftlich aktivieren"
    initiatives:
      - name: "Schulungsprogramm"
        status: "geplant"
        goal: "100 Installateure/Jahr"
      - name: "Vereinfachte Anträge"
        status: "in_development"
        goal: "Installateur kann für Kunde einreichen"
      - name: "Empfehlungs-Tracking"
        status: "konzept"
        goal: "Erfolgsmessung"

  gemeinden:
    strategy: "Als Multiplikatoren nutzen"
    initiatives:
      - "Gemeinde-Infoveranstaltungen"
      - "Zusatzförderung koordinieren"
      - "Vorbildprojekte öffentliche Gebäude"

