# =============================================================================
# CONTEXT VECTOR: AWE SG SCHNELL (~32 Faktoren)
# =============================================================================
# Amt für Wasser und Energie Kanton St. Gallen
# Version: 1.0
# Framework: EBF Context Vector Architecture (CVA)
# Use Case: Quick Assessment, Pitch, Akquise
# =============================================================================

metadata:
  name: "AWE St. Gallen Schnellkontext"
  code: "BCM2_MIKRO_AWE_SG"
  layer: "mikro"
  version: "1.0"
  last_updated: "2026-02-02"
  cva_stufe: "SCHNELL"
  total_factors: 32
  description: |
    Schneller Kontextvektor für das Amt für Wasser und Energie St. Gallen.
    Enthält Ψ-Dimensionen, Kernsegmente und Verhaltensparameter.

    Zweck: Akquise-Vorbereitung, Pitch, Synergie-Prüfung mit BFE

  hierarchy:
    parent: "BCM2_MESO_ENERGY_CH"
    grandparent: "BCM2_04_KON (MAKRO Schweiz)"

  ebf_mapping:
    primary_10c:
      - "WHO"      # Hausbesitzer, MFH, Industrie, Installateure
      - "WHAT"     # u_F (Förderung), u_E (Klima), u_P (Komfort)
      - "WHEN"     # Heizungsdefekt, Impulsprogramm-Deadline
      - "AWARE"    # Information via Energieagentur
    primary_psi:
      - "kappa_INST"    # Förderung, MuKEn
      - "kappa_SOCIAL"  # Nachbarschaftsnormen
      - "kappa_TEMP"    # Deadline 2026

# =============================================================================
# ORGANISATION (~8 Faktoren)
# =============================================================================
organisation:
  name_de: "Amt für Wasser und Energie Kanton St. Gallen"
  name_short: "AWE SG"

  # Grösse
  employees: 60  # Schätzung
  budget_chf_mio: null  # Fördermittel via Bund

  # Klassifikation
  industry: "Public Sector"
  sub_industry: "Cantonal Energy Agency"
  ownership: "public"

  # Geografie
  headquarters: "St. Gallen"
  geographic_scope: "cantonal"
  canton: "SG"
  region: "Ostschweiz"

  # Strategie
  strategy_name: "Förderprogramm Energie 2025-2030"
  strategy_pillars:
    - "Heizungsersatz fördern (Impulsprogramm)"
    - "Erneuerbare Energien ausbauen"
    - "Energieeffizienz steigern"
    - "Klimaziele Kanton SG erreichen"

# =============================================================================
# Ψ-DIMENSIONEN (8 Faktoren)
# =============================================================================
# Skala: 0.0 (niedrig) bis 1.0 (hoch)
# =============================================================================

psi_dimensions:

  psi_I_institutional:
    value: 0.80
    label: "Institutionell"
    description: |
      Starker regulatorischer Rahmen: MuKEn, kantonales Energiegesetz,
      Bundesförderung. Impulsprogramm mit +30% bis Ende 2026.
    key_factors:
      - "MuKEn-Umsetzung Kanton SG"
      - "Bundesimpulsprogramm (+30% Förderung 2025-2026)"
      - "Förderpflicht vor Baubeginn"
    ebf_kappa: "kappa_INST"

  psi_S_social:
    value: 0.55
    label: "Sozial"
    description: |
      Moderate soziale Normen. Nachbarschaftseffekte vorhanden,
      aber weniger ausgeprägt als in urbanen Gebieten.
    key_factors:
      - "Nachbarschaftsnormen (ländlich-suburban)"
      - "Gemeinde-Identität"
      - "Installateure als Vertrauenspersonen"
    ebf_kappa: "kappa_SOCIAL"

  psi_C_cognitive:
    value: 0.60
    label: "Kognitiv"
    description: |
      Mittlere kognitive Last. Förderanträge sind komplex,
      aber Energieagentur bietet Unterstützung.
    key_factors:
      - "Förderportal-Komplexität"
      - "Technische Entscheidungen (Wärmepumpentyp)"
      - "Energieberater-Verfügbarkeit"
    ebf_kappa: "kappa_COG"

  psi_K_cultural:
    value: 0.65
    label: "Kulturell"
    description: |
      Ostschweiz tendenziell konservativer. Skepsis gegenüber
      Neuerungen, aber wachsendes Klimabewusstsein.
    key_factors:
      - "Schweizer Konservativismus (Ostschweiz)"
      - "Eigentümer-Mentalität (Selbstverantwortung)"
      - "Steigendes Klimabewusstsein"
    ebf_kappa: "kappa_CULT"

  psi_E_economic:
    value: 0.70
    label: "Ökonomisch"
    description: |
      Gute Kaufkraft, hohe Eigentümerquote (42%). Aber Investitions-
      entscheidungen sind Stakes-hoch (CHF 30-80k Heizung).
    key_factors:
      - "Hohe Eigentümerquote (42%)"
      - "Solide Einkommensbasis (Industrie)"
      - "Hohe Investitionssummen"
    ebf_kappa: "kappa_ECON"

  psi_T_temporal:
    value: 0.75
    label: "Temporal"
    description: |
      HOHER Zeitdruck durch Impulsprogramm-Ende 2026.
      Notfallersetzungen haben sehr kurzen Zeithorizont.
    key_factors:
      - "Impulsprogramm endet 2026"
      - "Notfallersetzungen (24-72h Entscheidung)"
      - "Generationenwechsel Liegenschaften"
    ebf_kappa: "kappa_TEMP"

  psi_M_material:
    value: 0.60
    label: "Materiell/Technisch"
    description: |
      Gute digitale Infrastruktur (Förderportal online),
      aber Zielgruppe teils wenig digital-affin.
    key_factors:
      - "Förderportal (efoerderportal.sg.ch)"
      - "Digitale Affinität variiert stark"
      - "Installateure als Vermittler"
    ebf_kappa: "kappa_MAT"

  psi_F_physical:
    value: 0.55
    label: "Physisch"
    description: |
      Mix aus ländlichen und suburbanen Gebieten.
      Viele EFH, aber auch MFH in St. Gallen Stadt.
    key_factors:
      - "77 Gemeinden, heterogen"
      - "Ländlich-suburbaner Mix"
      - "Heizungskeller als Entscheidungsort"
    ebf_kappa: "kappa_PHYS"

# =============================================================================
# KUNDENSEGMENTE (4 Segmente, je ~4 Faktoren = 16 Faktoren)
# =============================================================================

customer_segments:

  - id: "SEG-AWE-01"
    name: "Einfamilienhaus-Eigentümer (EFH)"
    description: "Grösstes Segment, höchster Fossile-Anteil, konservativer"
    share: 0.45

    behavioral_parameters:
      lambda_loss_aversion: 2.40
      beta_present_bias: 0.70
      kappa_default_sensitivity: 0.55
      sigma_social_proof: 0.45

    intervention_affinity:
      high: ["Finanzielle Anreize", "Installer-Empfehlung", "Deadline-Framing"]
      medium: ["Nachbarschaftseffekte", "Energieberatung"]
      low: ["Digitale Nudges", "Gamification"]

    critical_moment: "Heizungsdefekt im Winter"

  - id: "SEG-AWE-02"
    name: "Mehrfamilienhaus-Eigentümer (MFH)"
    description: "Impulsprogramm-Fokus, höhere Förderung, komplexere Entscheidungen"
    share: 0.25

    behavioral_parameters:
      lambda_loss_aversion: 2.20
      beta_present_bias: 0.75
      kappa_default_sensitivity: 0.60
      sigma_social_proof: 0.50

    intervention_affinity:
      high: ["Impulsprogramm-Förderung (+30%)", "Deadline-Framing", "ROI-Kalkulation"]
      medium: ["Verwaltungs-Netzwerke", "Best Practice Sharing"]
      low: ["Emotionale Appelle"]

    critical_moment: "Impulsprogramm-Ende 2026"

  - id: "SEG-AWE-03"
    name: "Industrie/Dienstleistung"
    description: "Impulsprogramm-Fokus, grösste Anlagen, professionelle Entscheider"
    share: 0.15

    behavioral_parameters:
      lambda_loss_aversion: 1.95
      beta_present_bias: 0.82
      kappa_default_sensitivity: 0.65
      sigma_social_proof: 0.40

    intervention_affinity:
      high: ["ROI-basierte Argumentation", "Regulatorische Compliance", "Grossförderung"]
      medium: ["Branchennetzwerke", "Energieberater"]
      low: ["Emotionale Appelle", "Soziale Normen"]

    critical_moment: "Budget-Zyklen, Erneuerungsplanung"

  - id: "SEG-AWE-04"
    name: "Installateure (Multiplikatoren)"
    description: "Schlüsselhebel bei 55% der Ersetzungen, Vertrauenspersonen"
    share: 0.15  # Nicht Endkunden, aber kritisch

    behavioral_parameters:
      lambda_loss_aversion: 1.80
      beta_present_bias: 0.88
      kappa_default_sensitivity: 0.70
      sigma_social_proof: 0.55

    intervention_affinity:
      high: ["Schulungen", "Empfehlungs-Incentives", "Vereinfachte Förderanträge"]
      medium: ["Branchennetzwerke", "Margen-Optimierung"]
      low: ["Endkunden-Kampagnen"]

    critical_moment: "Notfall-Anruf vom Kunden"

# =============================================================================
# AGGREGIERTE VERHALTENSPARAMETER
# =============================================================================

behavioral_parameters_aggregate:

  core_parameters:
    loss_aversion:
      symbol: "λ"
      value: 2.25
      range: [1.80, 2.40]
      source: "LLMMC Prior + BFE-Kalibrierung"
      notes: "Leicht höher als CH-Durchschnitt (Ostschweiz)"

    present_bias:
      symbol: "β"
      value: 0.78
      range: [0.70, 0.88]
      source: "LLMMC Prior"
      notes: "Kurzfristdenken bei Notfallersetzungen"

    default_sensitivity:
      symbol: "κ_default"
      value: 0.62
      range: [0.55, 0.70]
      source: "LLMMC Prior"
      notes: "Förderportal-Defaults wirksam"

    social_proof:
      symbol: "σ_social"
      value: 0.48
      range: [0.40, 0.55]
      source: "LLMMC Prior"
      notes: "Moderat, Nachbarschaftseffekte vorhanden"

  context_multipliers:
    notfall_heizungsdefekt: 1.9
    impulsprogramm_deadline: 1.5
    installer_empfehlung: 1.7
    nachbar_gewechselt: 1.3
    geplante_renovation: 1.2

# =============================================================================
# STRATEGISCHE IMPLIKATIONEN
# =============================================================================

strategic_implications:

  top_3_opportunities:
    - dimension: "WHEN"
      opportunity: "Impulsprogramm-Deadline 2026 als Urgency-Hebel"
      intervention_type: "Deadline Framing, Scarcity"
      priority: "HIGH"

    - dimension: "WHO"
      opportunity: "Installateure als Multiplikatoren bei Notfallersetzungen"
      intervention_type: "B2B Behavioral Training, Incentives"
      priority: "HIGH"

    - dimension: "AWARE"
      opportunity: "Förderportal UX-Optimierung mit Nudges"
      intervention_type: "Choice Architecture, Defaults"
      priority: "MEDIUM"

  top_3_risks:
    - risk: "Konservativismus in Ostschweiz (Widerstand gegen Neues)"
      mitigation: "Vertraute Botschafter (Installateure), lokale Testimonials"

    - risk: "Komplexität Förderanträge (Abbruch)"
      mitigation: "Pre-filled Forms, Energieberater-Unterstützung"

    - risk: "Notfallersetzungen ohne Förderung (Zeitdruck)"
      mitigation: "Express-Fördertrack, Installer-Schulung"

  recommended_next_step: |
    1. Kontakt zu Energieagentur St. Gallen herstellen
    2. BFE-Erfahrungen präsentieren (Heizungsersatz-Modell)
    3. Pilotprojekt "Impulsprogramm-Kommunikation 2026" pitchen
    4. Bei Projektstart: Upgrade auf CVA STANDARD

# =============================================================================
# SYNERGIEN MIT BESTEHENDEN PROJEKTEN
# =============================================================================

synergies:
  bfe_projects:
    - project: "ECHfP Wirkungsmessung"
      synergy: "Segmentierung übertragbar"
      transferable:
        - "EFH/MFH/STWE Segmente"
        - "Installateur-Hebel"
        - "Notfall-vs-Geplant Typologie"

    - project: "Heizungsersatz Behavioral Analysis"
      synergy: "Modell validiert"
      transferable:
        - "λ, β, θ Parameter"
        - "Critical Moments"
        - "Context Multipliers"

  awel_zh:
    status: "Lead in Pipeline (LEAD-034)"
    synergy: "Ähnliche Struktur, urbaner Kontext"

# =============================================================================
# UPGRADE-PFAD
# =============================================================================

upgrade_path:
  current_level: "SCHNELL"
  next_level: "STANDARD"
  requirements_for_upgrade:
    - "Projektauftrag erhalten"
    - "Zugang zu Förderdaten (anonymisiert)"
    - "Interview mit Energieagentur SG"
    - "Gemeinde-spezifische Daten"
  estimated_effort: "1-2 Tage"
  recommended_trigger: "Projektbudget > CHF 50k"

