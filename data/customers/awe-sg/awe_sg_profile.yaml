# =============================================================================
# FÖRDERPROGRAMM ENERGIE 2025-2030
# =============================================================================

foerderprogramm:
  name: "Förderprogramm Energie Kanton St. Gallen 2025-2030"
  portal: "https://efoerderportal.sg.ch"

  impulsprogramm_bund:
    active: true
    period: "2025-2026"
    bonus: "+30%"
    description: |
      30% höhere Förderbeiträge für Heizungsersatz in 2025-2026.
      Vollständig vom Bund finanziert (Impulsprogramm).
    target: "Mehrfamilienhäuser, Dienstleistungs- und Industriegebäude"

  massnahmen:
    - name: "Wärmepumpe Luft-Wasser"
      type: "heizungsersatz"
      funding: "Basisförderung + 30% Impuls"
    - name: "Wärmepumpe Sole-Wasser"
      type: "heizungsersatz"
      funding: "Basisförderung + 30% Impuls"
    - name: "Wärmepumpe Wasser-Wasser"
      type: "heizungsersatz"
      funding: "Basisförderung + 30% Impuls"
    - name: "Ersatz dezentrale Elektroheizungen"
      type: "heizungsersatz"
      funding: "Basisförderung + 30% Impuls"

  antragstellung:
    timing: "Vor Ausführung des Vorhabens"
    portal: "https://efoerderportal.sg.ch"
    retroactive: "Rückwirkend ab 01.01.2025"

# =============================================================================
# EBF INTEGRATION (10C Mapping)
# =============================================================================

ebf_integration:

  who:
    primary:
      - "Einfamilienhaus-Eigentümer (EFH)"
      - "Mehrfamilienhaus-Eigentümer/Verwaltungen (MFH)"
      - "Stockwerkeigentümer (STWE)"
      - "Industrie- und Dienstleistungsgebäude"
    secondary:
      - "Installateure (Multiplikatoren)"
      - "Energieberater"
      - "Gemeinden"
      - "Mieter (indirekt)"

  what:
    utility_dimensions:
      - "u_F: Finanzielle Kosten/Einsparungen/Förderung"
      - "u_E: Umwelt/Klima-Bewusstsein (Ostschweiz)"
      - "u_P: Komfort, Wärme, Versorgungssicherheit"
      - "u_S: Nachbarschaft, regionale Identität"

  when:
    critical_moments:
      - "Heizungsdefekt (Notfallersatz)"
      - "Ablauf Förderfristen (2026 Ende Impulsprogramm)"
      - "Hauskauf/-verkauf"
      - "Grosse Renovation"
      - "Generationenwechsel Liegenschaft"

  where:
    psi_dimensions:
      - "kappa_INST: MuKEn, kantonale Energiegesetze, Förderung"
      - "kappa_ARCH: Defaults bei Förderanträgen"
      - "kappa_SOCIAL: Nachbarschaftsnormen Ostschweiz"
      - "kappa_AWX: Information via Energieagentur"

# =============================================================================
# BEHAVIORAL PARAMETERS (LLMMC Prior)
# =============================================================================

behavioral_parameters:
  source: "LLMMC Prior basierend auf BFE-Erfahrungen + regionale Anpassung"
  confidence: "medium"

  primary_segments:
    - segment_id: "SEG_EFH_SG"
      name: "Einfamilienhaus-Eigentümer SG"
      beta: 0.70
      lambda: 2.40
      theta: 0.42
      w_base: 0.35
      notes: "Konservativer als CH-Durchschnitt (Ostschweiz)"

    - segment_id: "SEG_MFH_SG"
      name: "Mehrfamilienhaus-Eigentümer SG"
      beta: 0.75
      lambda: 2.20
      theta: 0.48
      w_base: 0.40
      notes: "Impulsprogramm-Fokus 2025-2026"

    - segment_id: "SEG_INDUSTRIE_SG"
      name: "Industrie/Dienstleistung SG"
      beta: 0.82
      lambda: 1.95
      theta: 0.55
      w_base: 0.45
      notes: "Impulsprogramm-Fokus 2025-2026"

    - segment_id: "SEG_INSTALLER_SG"
      name: "Installateure SG (Multiplikatoren)"
      beta: 0.88
      lambda: 1.80
      theta: 0.65
      w_base: 0.60
      notes: "Schlüsselhebel bei Notfallersetzungen"

  context_multipliers:
    emergency_replacement: 1.9     # Bei Heizungsdefekt (höher als CH wg. Winter)
    impulsprogramm_deadline: 1.5   # Zeitdruck Ende 2026
    planned_renovation: 1.2        # Geplante Sanierung
    neighbor_switched: 1.3         # Nachbar hat gewechselt (regional)
    installer_recommendation: 1.7  # Installateur empfiehlt

