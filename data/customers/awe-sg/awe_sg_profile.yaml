  description: |
    Das Amt für Wasser und Energie (AWE) ist Teil des Bau- und Umweltdepartements
    des Kantons St. Gallen. Es ist zuständig für:

    - Wasserbau und Hochwasserschutz
    - Gewässerschutz und Gewässernutzung
    - Gewässerqualität
    - Energie und Klima (Energiefachstelle)

    Im Bereich Energie arbeitet das AWE eng mit der Energieagentur St. Gallen GmbH
    zusammen, die den operativen Energievollzug und die Förderprogramme administriert.

