# =============================================================================
# CUSTOMER JOURNEY MAPPING
# =============================================================================

customer_journey:

  stages:
    - stage: "Awareness"
      duration: "Monate-Jahre"
      triggers:
        - "Heizung wird alt"
        - "Energiekosten steigen"
        - "Nachbar wechselt"
      touchpoints: ["Medien", "Nachbarn", "Installateur"]
      barriers: ["Kein Handlungsdruck", "Aufschub"]

    - stage: "Consideration"
      duration: "Wochen-Monate"
      triggers:
        - "Heizungsdefekt"
        - "Förder-Deadline"
        - "Beratung"
      touchpoints: ["Installateur", "Energieagentur", "Portal"]
      barriers: ["Kosten", "Komplexität", "Unsicherheit"]

    - stage: "Decision"
      duration: "Tage-Wochen"
      triggers:
        - "Angebot liegt vor"
        - "Zeitdruck"
      touchpoints: ["Installateur", "Familie"]
      barriers: ["Finanzierung", "Technologiewahl"]

    - stage: "Action"
      duration: "Wochen"
      triggers:
        - "Entscheidung gefallen"
      touchpoints: ["Installateur", "Förderportal"]
      barriers: ["Förderantrag", "Wartezeit"]

    - stage: "Loyalty"
      duration: "Jahre"
      triggers:
        - "Zufriedenheit"
      touchpoints: ["Nachbarn", "Online-Bewertungen"]
      opportunity: "Weiterempfehlung"

  critical_path:
    bottleneck: "Consideration → Decision bei Notfall"
    intervention: "Installer als Entscheidungshelfer"
