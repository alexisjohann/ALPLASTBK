_validation:
  model_type: "10C Intervention Model"
  completeness:
    10c_dimensions: 10
    interventions: 5
    segments: 4
  data_quality: "medium"
  sources:
    - "BFS Mikrozensus Mobilität"
    - "Kantonale Mobilitätsstrategie"
    - "LLMMC Priors"
    - "Analogie andere Kantone"
  gaps:
    - "Mikrozensus 2025 Ergebnisse (erst 2026 verfügbar) - aktuelle Daten 2020-2022"
    - "Detaillierte regionale Pendlerströme innerhalb Kanton SG"
    - "KMU-Mobilitätsdaten (Betriebliches Mobilitätsmanagement Baseline)"
    - "Wirkungsmessung der Pendlerabzug-Erhöhung auf Modal Split"
    - "Ergebnisse Projekt öV42 für spezifische Hotspots"
  gaps_resolved:
    - gap: "Aktuelle Modal-Split-Daten"
      resolved: "2026-02-25"
      source: "BFS Strukturerhebung 2023, Watson-Analyse"
      finding: "SG: Auto-Anteil +1.0pp (2019→2023), ÖV und LV rückläufig"

    - gap: "E-Mobilitäts-Status"
      resolved: "2026-02-25"
      source: "Energieagentur SG, EBP-Bericht, SGSW"
      finding: "Massnahmenpaket Ziel 2025, Ladeinfrastruktur-Förderung aktiv"

    - gap: "Kantonale Strategie Mobilität"
      resolved: "2026-02-25"
      source: "Schwerpunktplanung 2025-2035"
      finding: "Massnahme 15: Betriebliches Mobilitätsmanagement mit OSTWIND/42hacks"

