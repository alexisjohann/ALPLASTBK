# BEATRIX-Anwendung für Kanton St. Gallen
# =============================================================================

metadata:
  model_id: "MOD-AWE-SG-MOB-001"
  customer_id: "AWE-SG"
  model_name: "10C Mobilität & Infrastruktur St. Gallen"
  module: "Modul 2"
  version: "2.0"
  created: "2026-02-02"
  updated: "2026-02-25"
  status: "confirmed"
  decision_date: "2026-02-25"
  notes: "Modul 2 definitiv als Mobilität bestätigt. Update mit aktuellen Daten."

  theoretical_basis:
    - "Prospect Theory (Kahneman & Tversky 1979)"
    - "Habit Formation (Verplanken & Wood 2006)"
    - "Social Norms (Cialdini 2007)"
    - "Mental Accounting (Thaler 1999)"
    - "Commitment Devices (Bryan et al. 2010)"
    - "Choice Architecture (Thaler & Sunstein 2008)"

# =============================================================================
# EXECUTIVE SUMMARY
# =============================================================================

executive_summary:

  core_insight: |
    Mobilitätsentscheidungen sind zu 70% habituell (System 1). Der Moment des
    Wechsels (neuer Job, Umzug, neue Infrastruktur) ist das kritische Fenster.
    Betriebliche Mobilität wird durch Defaults und soziale Normen im Unternehmen
    geprägt - der Arbeitgeber ist der zentrale Hebel.

  strategic_priorities:
    - priority: 1
      intervention: "Betriebliches Mobilitätsmanagement"
      dimension: "WHO"
      rationale: "Arbeitgeber als Gatekeeper für Pendlerverhalten"
      expected_impact: "+20% ÖV/Velo bei teilnehmenden Firmen"

    - priority: 2
      intervention: "Lebensereignis-Trigger Kampagne"
      dimension: "WHEN"
      rationale: "Habits ändern sich nur bei Disruption"
      expected_impact: "+15% Moduswechsel bei Umzug/Jobwechsel"

    - priority: 3
      intervention: "Ladeinfrastruktur Choice Architecture"
      dimension: "AWARE"
      rationale: "E-Mobilität scheitert an Lade-Unsicherheit"
      expected_impact: "+25% E-Auto Consideration"

  key_numbers:
    pendler_sg_total: 180000
    pendler_miv_anteil: 0.65
    pendler_oev_anteil: 0.22
    pendler_velo_fuss: 0.13
    kmu_im_kanton: 28000
    co2_verkehr_anteil: 0.32
    motorisierungsgrad_2024: 555  # PW pro 1'000 Einwohner (BFS)
    pw_bestand_2023: 295000       # Personenwagen im Kanton

  data_sources:
    - source: "BFS Pendlermobilität 2020-2022"
      url: "https://www.bfs.admin.ch/bfs/de/home/statistiken/mobilitaet-verkehr/personenverkehr/pendlermobilitaet.html"
      notes: "Nächster Mikrozensus geplant für 2025 (Ergebnisse 2026)"

    - source: "Projekt öV42 (Swisscom Mobilfunkdaten)"
      url: "https://www.sg.ch/verkehr/oeffentlicher-verkehr/grundlagen/projekt-oev42.html"
      notes: |
        Seit 2022 im Kanton SG aktiv. KI-basierte Analyse von Modal Split
        und Verkehrsaufkommen. 10 grösste Hotspots generieren 27.5% des
        Gesamtverkehrs und 12% des Strassenverkehrs.

    - source: "Schwerpunktplanung Kanton SG 2025-2035"
      url: "https://www.schwerpunktplanung.sg.ch/Klimaschutz/Mobilitaetsmanagement_und_Mobilitaetsloesungen.html"
      notes: |
        Massnahme 15: Effizientes Mobilitätsmanagement.
        Ziel bis Ende 2025: 5 weitere Firmenverträge mit OSTWIND/42hacks.
        Fokus: Pendlermobilität, dann KMU.

    - source: "Kanton SG Pendlerströme"
      url: "https://www.sg.ch/verkehr/oeffentlicher-verkehr/zahlen-und-fakten/pendlerstroeme-.html"
      notes: "Pendlersaldo leicht positiv. ~25% ÖV-Anteil Pendler."

  critical_context_update_2025:
    trend_auto_zunahme: |
      ACHTUNG: Kanton St. Gallen gehört zu nur 3 Kantonen (neben TG und BE),
      in denen der Auto-Anteil beim Pendeln 2023 gegenüber 2019 ZUGENOMMEN hat
      (+1.0 Prozentpunkte). ÖV und Langsamverkehr beide rückläufig.
      Quelle: Watson/BFS Strukturerhebung 2023.
    trend_source: "https://www.watson.ch/schweiz/velo/896751583-mehr-velo-und-bahn-die-schweiz-pendelt-umweltbewusster"

    pendlerabzug_erhoehung: |
      Kantonsrat hat gegen Willen der Regierung die Erhöhung des Pendlerabzugs
      für Autofahrende beschlossen (Volksabstimmung November 2024 knapp angenommen).
      Dies setzt falsche Anreize und erschwert den Modal Shift.
      Quelle: SRF/Tagesanzeiger.
    pendlerabzug_source: "https://www.srf.ch/news/schweiz/abstimmungen-24-november-2024/abstimmung-kanton-st-gallen-st-galler-steuerstreit-ueber-den-abzug-von-fahrkosten"

    pilotprojekte_oev42: |
      Kanton lanciert mit SOB und Postauto Pilotprojekte:
      - Anreise Flumserberge per ÖV stärken
      - Pilotprojekt Linthgebiet mit Arbeitgebern
      - Region Wil: ÖV-Anteil überdurchschnittlich (Bahnstrecke ZH-SG)
      Quelle: Mobimag/sg.ch.
    pilotprojekte_source: "https://mobimag.ch/modal-split/"

    e_mobilitaet_status: |
      Massnahmenpaket E-Mobilität hatte Umsetzungsziel 2025.
      Ladeinfrastruktur-Förderung aktiv: Einstellhallen mit Lastmanagement (≥4 Stationen).
      E-Bus-Strategie: Batterie-Trolleybusse ab Agglomeration SG.
      Stadt SG Pilotprojekt «E-Ladestationen im Quartier» (3 Quartiere).
      Stadtwerke (SGSW): Beratung & Installation Ladeinfrastruktur.
    e_mobilitaet_source: "https://www.energieagentur-sg.ch/ladeinfrastruktur"

    betriebliches_mobilitaetsmanagement_kanton: |
      Schwerpunktplanung Massnahme 15: Kanton fördert betriebliches
      Mobilitätsmanagement. Zusammenarbeit mit OSTWIND/42hacks für
      Firmen-ÖV-Verträge. Fokus Pendlermobilität, dann KMU.
      Ziel: 5 weitere Firmenverträge bis Ende 2025.
      Dies ist DIREKT komplementär zu unserem INT-MOB-001.
    bmm_source: "https://www.schwerpunktplanung.sg.ch/Klimaschutz/Mobilitaetsmanagement_und_Mobilitaetsloesungen.html"

# =============================================================================
# 10C DIMENSION MAPPING
# =============================================================================

ebf_10c_mapping:

  # -------------------------------------------------------------------------
  # WHO: Wer sind die Zielgruppen?
  # -------------------------------------------------------------------------
  WHO:
    code: "AAA"
    question: "Wer hat Utility? Wer entscheidet?"

    primary_segments:
      - id: "SEG-PEND"
        name: "Pendler:innen"
        population: 180000
        share: 0.50
        behavioral_profile:
          lambda: 2.15
          beta: 0.72
          kappa: 0.58  # Habit strength
          decision_mode: "habitual"
          key_barrier: "Gewohnheit, Komfort, Zeit"
        sub_segments:
          - name: "Auto-Pendler (hartnäckig)"
            share: 0.40
            switchability: 0.15
          - name: "Auto-Pendler (offen)"
            share: 0.25
            switchability: 0.45
          - name: "Multimodale"
            share: 0.20
            switchability: 0.70
          - name: "ÖV/Velo-Nutzer"
            share: 0.15
            switchability: 0.10  # Bereits nachhaltig

      - id: "SEG-KMU"
        name: "KMU (Arbeitgeber)"
        population: 28000
        share: 0.30
        behavioral_profile:
          lambda: 1.85
          beta: 0.80
          theta: 0.52
          decision_mode: "rational"
          key_barrier: "Kosten, Komplexität, Mitarbeiterakzeptanz"
        priority: "HIGH"  # Multiplikator-Effekt

      - id: "SEG-GROSS"
        name: "Grossunternehmen"
        population: 350
        share: 0.10
        behavioral_profile:
          lambda: 1.70
          beta: 0.85
          theta: 0.65
          decision_mode: "strategic"
          key_barrier: "Prozesse, Stakeholder"
        priority: "MEDIUM"  # Oft schon aktiv

      - id: "SEG-GEM"
        name: "Gemeinden (Infrastruktur)"
        population: 77
        share: 0.10
        behavioral_profile:
          lambda: 2.30
          beta: 0.68
          theta: 0.48
          decision_mode: "political"
          key_barrier: "Budget, politischer Wille"
        priority: "HIGH"  # Infrastruktur-Enabler

    decision_influence_matrix:
      pendler_moduswahl:
        individuum: 0.35
        arbeitgeber: 0.30
        infrastruktur: 0.20
        soziales_umfeld: 0.15
      betriebliche_mobilitaet:
        geschaeftsleitung: 0.45
        hr_abteilung: 0.25
        mitarbeitende: 0.20
        externe_beratung: 0.10

  # -------------------------------------------------------------------------
  # WHAT: Was treibt die Entscheidung?
  # -------------------------------------------------------------------------
  WHAT:
    code: "C"
    question: "Was ist Utility? Welche Dimensionen?"

    utility_dimensions:
      u_T_time:
        weight: 0.35
        components:
          - "Reisezeit (Tür-zu-Tür)"
          - "Zuverlässigkeit"
          - "Flexibilität"
          - "Produktive Nutzung (ÖV)"
        current_perception:
          auto: 0.80
          oev: 0.55
          velo: 0.50

      u_F_financial:
        weight: 0.25
        components:
          - "Direkte Kosten (Benzin, Ticket)"
          - "Fixkosten (Auto-Besitz)"
          - "Steuervorteile"
          - "Arbeitgeber-Beiträge"
        current_perception:
          auto: 0.40  # Wird unterschätzt
          oev: 0.60
          velo: 0.90

      u_P_practical:
        weight: 0.20
        components:
          - "Komfort"
          - "Gepäck/Einkäufe"
          - "Wetter-Unabhängigkeit"
          - "Anschlussmobilität"
        current_perception:
          auto: 0.85
          oev: 0.50
          velo: 0.35

      u_S_social:
        weight: 0.10
        components:
          - "Status"
          - "Kolleg:innen-Verhalten"
          - "Unternehmenskultur"
          - "Umwelt-Image"
        current_perception:
          auto: 0.60
          oev: 0.50
          velo: 0.55

      u_E_environmental:
        weight: 0.10
        components:
          - "CO2-Fussabdruck"
          - "Luftqualität"
          - "Klimaschutz"
        current_perception:
          auto: 0.20
          oev: 0.70
          velo: 0.95

    mental_accounting:
      auto_kosten_wahrnehmung:
        actual_monthly: 850  # CHF (TCO)
        perceived_monthly: 350  # Nur Benzin
        gap: 500
        intervention: "Vollkosten-Transparenz"

  # -------------------------------------------------------------------------
  # HOW: Wie interagieren die Faktoren?
  # -------------------------------------------------------------------------
  HOW:
    code: "B"
    question: "Wie interagieren Dimensionen? Komplementarität?"

    complementarity_matrix:
      - pair: ["Arbeitgeber-Default", "Soziale Norm"]
        gamma: 0.55
        effect: "Kultur-Verstärkung"
        mechanism: "Wenn Chef Velo fährt + Velo-Default → starker Effekt"

      - pair: ["Infrastruktur", "Information"]
        gamma: 0.45
        effect: "Enablement"
        mechanism: "Gute Velowege + Routenplaner = Nutzung"

      - pair: ["Lebensereignis", "Angebot"]
        gamma: 0.60
        effect: "Window of Opportunity"
        mechanism: "Umzug + ÖV-Probe-Abo = hohe Konversion"

      - pair: ["Finanzielle Anreize", "Commitment"]
        gamma: 0.35
        effect: "Verstärkung"
        mechanism: "Velo-Bonus + öffentliches Commitment"

      - pair: ["E-Auto Anschaffung", "Ladeinfrastruktur"]
        gamma: 0.70
        effect: "Enabling Condition"
        mechanism: "Keine Lademöglichkeit = kein E-Auto"

    crowding_effects:
      - pair: ["Finanzielle Anreize", "Intrinsische Motivation"]
        gamma: -0.20
        risk: "Crowding Out bei Umweltmotivierten"
        mitigation: "Framing als Anerkennung, nicht Bestechung"

  # -------------------------------------------------------------------------
  # WHEN: Wann ist der richtige Zeitpunkt?
  # -------------------------------------------------------------------------
  WHEN:
    code: "V"
    question: "Wann zählt Kontext? Kritische Momente?"

    critical_moments:
      - id: "MOM-JOB"
        name: "Neuer Job / Jobwechsel"
        frequency: 0.12  # Pro Jahr
        time_window: "2-4 Wochen"
        habit_disruption: "high"
        context_multiplier: 2.1
        intervention_priority: "CRITICAL"
        interventions:
          - "Mobilitäts-Onboarding durch Arbeitgeber"
          - "ÖV-Probe-Abo (3 Monate gratis)"
          - "Velo-Leasing Angebot"

      - id: "MOM-UMZUG"
        name: "Umzug"
        frequency: 0.08
        time_window: "1-2 Monate"
        habit_disruption: "very_high"
        context_multiplier: 2.4
        intervention_priority: "CRITICAL"
        interventions:
          - "Willkommenspaket Gemeinde mit ÖV-Info"
          - "Nachbarschafts-Mobilitätsberatung"
          - "E-Bike Testwochen"

      - id: "MOM-AUTO"
        name: "Auto-Ersatz / Neukauf"
        frequency: 0.07
        time_window: "Wochen-Monate"
        habit_disruption: "medium"
        context_multiplier: 1.8
        intervention_priority: "HIGH"
        interventions:
          - "E-Auto Informationskampagne"
          - "TCO-Rechner (Vollkosten)"
          - "Probefahrt-Programm"

      - id: "MOM-INFRA"
        name: "Neue Infrastruktur (Velowege, ÖV-Linie)"
        frequency: "varies"
        time_window: "Launch-Phase"
        habit_disruption: "medium"
        context_multiplier: 1.5
        intervention_priority: "HIGH"
        interventions:
          - "Launch-Kampagne"
          - "Gratis-Testphase"
          - "Community-Events"

      - id: "MOM-FAMILY"
        name: "Familiengründung"
        frequency: 0.02
        time_window: "Monate"
        habit_disruption: "high"
        context_multiplier: 1.6
        intervention_priority: "MEDIUM"
        interventions:
          - "Familien-Mobilitätsberatung"
          - "Cargo-Bike Förderung"
          - "Kombinierte Lösungen"

  # -------------------------------------------------------------------------
  # WHERE: Welcher Kontext gilt?
  # -------------------------------------------------------------------------
  WHERE:
    code: "BBB"
    question: "Woher die Zahlen? Welcher Kontext?"

    context_dimensions:
      psi_I_institutional:
        value: 0.60
        description: "Gemischte Anreize: Förderung vorhanden, aber Pendlerabzug kontraproduktiv"
        components:
          - "Kantonale Mobilitätsstrategie vorhanden (Schwerpunktplanung 2025-2035)"
          - "Bundesförderung E-Mobilität"
          - "Gemeinde-Autonomie bei Infrastruktur"
          - "NEGATIV: Erhöhter Pendlerabzug für Autofahrende (Volksabstimmung Nov 2024)"
          - "Projekt öV42: KI-basiertes Monitoring seit 2022"
          - "Massnahme 15: Betriebliches Mobilitätsmanagement (Firmenverträge OSTWIND)"
        updated: "2026-02-25"
        notes: |
          Wert von 0.65 auf 0.60 gesenkt wegen Pendlerabzug-Erhöhung.
          Der erhöhte Steuerabzug setzt einen kontraproduktiven finanziellen
          Anreiz zugunsten des Autos.

      psi_T_temporal:
        value: 0.60
        description: "Transformationsphase"
        components:
          - "Klimaziele 2030/2050"
          - "E-Mobilität Wachstumsphase"
          - "Post-COVID Arbeitsmuster"

      psi_E_economic:
        value: 0.70
        description: "Wirtschaftlich attraktive Region"
        components:
          - "Hohe Kaufkraft"
          - "Steigende Energiepreise"
          - "TCO E-Auto zunehmend konkurrenzfähig"

      psi_K_cultural:
        value: 0.50
        description: "Ostschweizer Auto-Affinität - Trend gegenläufig zum Rest der CH"
        components:
          - "Ländliche Prägung, hohe Distanzen"
          - "Auto als Freiheitssymbol"
          - "EMPIRISCH: SG einer von nur 3 Kantonen mit steigendem Auto-Pendeln (2019→2023: +1.0pp)"
          - "ÖV- und Langsamverkehr-Anteil beide rückläufig"
          - "Motorisierungsgrad 555 PW/1000 Einw. (2024) - weiter steigend"
          - "Wachsendes Umweltbewusstsein bei Jüngeren"
        updated: "2026-02-25"
        notes: |
          Wert von 0.55 auf 0.50 gesenkt. Empirische Daten zeigen, dass
          St. Gallen dem nationalen Trend zur Verlagerung auf ÖV/Velo
          WIDERSPRICHT. Die Auto-Kultur ist stärker verankert als angenommen.

      psi_C_cognitive:
        value: 0.50
        description: "Starke Gewohnheiten"
        components:
          - "Pendeln ist automatisiert"
          - "Geringe aktive Reflexion"
          - "Confirmation Bias für Status quo"

      psi_M_material:
        value: 0.60
        description: "Infrastruktur ausbaufähig - Ladeinfrastruktur aktiv gefördert"
        components:
          - "ÖV-Netz gut in Zentren (Achse ZH-Winterthur-SG)"
          - "Region Wil: ÖV-Anteil überdurchschnittlich"
          - "Kurze Strecken: ÖV kaum genutzt"
          - "Ladeinfrastruktur: Förderung Einstellhallen mit Lastmanagement (≥4 Stationen)"
          - "Stadt SG: Pilotprojekt E-Ladestationen im Quartier (3 Quartiere)"
          - "Stadtwerke SGSW: Full-Service Ladeinfrastruktur"
          - "E-Bus-Strategie: Batterie-Trolleybusse ab Agglomeration SG"
          - "Velowege heterogen - Topografie als Barriere"
        updated: "2026-02-25"

      psi_S_social:
        value: 0.55
        description: "Soziale Dynamik im Wandel"
        components:
          - "Auto-Kultur noch dominant"
          - "Jüngere Generation offener"
          - "Betriebliche Vorbilder selten"

      psi_F_physical:
        value: 0.50
        description: "Topografie als Barriere"
        components:
          - "Hügelige Landschaft"
          - "Distanzen oft >10km"
          - "E-Bike als Lösung"

  # -------------------------------------------------------------------------
  # AWARE: Wie bewusst ist die Zielgruppe?
  # -------------------------------------------------------------------------
  AWARE:
    code: "AU"
    question: "Wie bewusst? Awareness-Level?"

    awareness_levels:
      auto_vollkosten:
        level: 0.25
        description: "Kaum jemand kennt TCO des eigenen Autos"
        gap: "KRITISCH"

      oev_optionen:
        level: 0.55
        description: "Grundkenntnisse vorhanden"

      e_mobilitaet_foerderung:
        level: 0.40
        description: "Förderung bekannt, Details unklar"

      betriebliches_mobilitaetsmanagement:
        level: 0.20
        description: "Für die meisten KMU Neuland"
        gap: "HOCH"

      co2_fussabdruck_pendeln:
        level: 0.35
        description: "Abstrakt bekannt, nicht personalisiert"

    touchpoint_effectiveness:
      - touchpoint: "Arbeitgeber"
        reach: 0.85
        trust: 0.70
        conversion: 0.45
        timing: "Onboarding, HR-Prozesse"

      - touchpoint: "Gemeinde"
        reach: 0.60
        trust: 0.55
        conversion: 0.25
        timing: "Umzug, lokale Events"

      - touchpoint: "Autohändler"
        reach: 0.70
        trust: 0.45
        conversion: 0.35
        timing: "Kaufentscheidung"

      - touchpoint: "ÖV-Unternehmen"
        reach: 0.50
        trust: 0.60
        conversion: 0.30
        timing: "Tarifänderungen, neue Linien"

  # -------------------------------------------------------------------------
  # READY: Handlungsbereitschaft
  # -------------------------------------------------------------------------
  READY:
    code: "AV"
    question: "Handlungsbereit? Willingness?"

    willingness_by_segment:
      pendler_auto_offen:
        w_base: 0.35
        barriers:
          - "Gewohnheit (70% automatisch)"
          - "Zeitwahrnehmung (Auto = schneller)"
          - "Komfort-Verlust befürchtet"
          - "Anschlussmobilität unklar"
        enablers:
          - "Kostendruck"
          - "Stau-Frustration"
          - "Gesundheitsbewusstsein"
          - "Umweltmotivation"

      kmu:
        w_base: 0.30
        barriers:
          - "Kein Budget/Ressourcen"
          - "Nicht auf dem Radar"
          - "Angst vor Mitarbeiter-Widerstand"
          - "Komplexität"
        enablers:
          - "Fachkräftemangel (Benefit)"
          - "Image/Employer Branding"
          - "Kosteneinsparungen"
          - "Regulatorischer Druck"

      gemeinden:
        w_base: 0.45
        barriers:
          - "Budget-Restriktionen"
          - "Politische Widerstände"
          - "Planungshorizonte"
        enablers:
          - "Kantonsförderung"
          - "Bürgerinitiativen"
          - "Klimaziele"

  # -------------------------------------------------------------------------
  # STAGE: Customer Journey Phase
  # -------------------------------------------------------------------------
  STAGE:
    code: "AW"
    question: "Wo in der Journey? Phase?"

    journey_stages:
      pre_contemplation:
        share: 0.45
        description: "Denkt nicht über Wechsel nach"
        intervention_focus: "Awareness, Trigger-Events"

      contemplation:
        share: 0.25
        description: "Erwägt Alternativen, aber nicht aktiv"
        intervention_focus: "Information, Kosten-Transparenz"

      preparation:
        share: 0.15
        description: "Plant konkret, informiert sich"
        intervention_focus: "Vereinfachung, Angebote"

      action:
        share: 0.10
        description: "Testet oder wechselt gerade"
        intervention_focus: "Support, Feedback"

      maintenance:
        share: 0.05
        description: "Hat gewechselt, neue Gewohnheit"
        intervention_focus: "Verstärkung, Advocacy"

    critical_transition: "Pre-contemplation → Contemplation"
    transition_barrier: "Fehlender Trigger, keine Reflexion"

  # -------------------------------------------------------------------------
  # HIERARCHY: Entscheidungsebenen
  # -------------------------------------------------------------------------
  HIERARCHY:
    code: "HI"
    question: "Wie stratifizieren Entscheidungen? Levels?"

    decision_levels:
      L0_automatic:
        share: 0.70
        description: "Autopilot: Wie immer zur Arbeit"
        typical_situation: "Tägliches Pendeln"
        implication: "Nur durch Disruption änderbar"

      L1_habitual:
        share: 0.15
        description: "Gewohnheit mit minimalem Nachdenken"
        typical_situation: "Bekannte Route, kleine Variation"
        implication: "Nudges können wirken"

      L2_deliberate:
        share: 0.10
        description: "Bewusstes Abwägen"
        typical_situation: "Neuer Job, Umzug, neues Auto"
        implication: "Information + Angebote"

      L3_strategic:
        share: 0.05
        description: "Grundsätzliche Mobilitätsstrategie"
        typical_situation: "Lebensplanung, Wohnortwahl"
        implication: "Langfrist-Beratung"

  # -------------------------------------------------------------------------
  # EIT: Emergent Intervention Targeting
  # -------------------------------------------------------------------------
  EIT:
    code: "IE"
    question: "Wie emergieren Interventionen?"

    intervention_vector:
      I_WHO: 0.80      # Arbeitgeber als Multiplikator
      I_WHAT_T: 0.70   # Zeit-Wahrnehmung korrigieren
      I_WHAT_F: 0.65   # Kostenwahrnehmung korrigieren
      I_WHAT_S: 0.55   # Soziale Normen aktivieren
      I_HOW: 0.60      # Komplementaritäten nutzen
      I_WHEN: 0.90     # Lebensereignisse = kritisch
      I_WHERE: 0.55    # Infrastruktur verbessern
      I_AWARE: 0.75    # Awareness massiv erhöhen
      I_READY: 0.65    # Barrieren abbauen

# =============================================================================
# INTERVENTIONS-PORTFOLIO
# =============================================================================

intervention_portfolio:

  # -------------------------------------------------------------------------
  # INTERVENTION 1: Betriebliches Mobilitätsmanagement (WHO)
  # -------------------------------------------------------------------------
  - id: "INT-MOB-001"
    name: "KMU Mobilitätsmanagement Programm"
    priority: 1
    status: "design"

    target_dimension: "WHO"
    target_segment: ["KMU", "GROSS"]
    indirect_impact: ["PEND"]

    mechanism:
      primary: "Employer as Choice Architect"
      secondary: ["Social Norms", "Defaults", "Incentives"]

    behavioral_levers:
      - lever: "Parkplatz-Monetarisierung"
        description: "Parkplatz-Verzicht = CHF X/Monat"
        expected_shift: "+0.15"

      - lever: "ÖV-Abo als Default"
        description: "Automatisch im Lohnpaket, Opt-out"
        expected_shift: "+0.20"

      - lever: "Velo-Leasing Angebot"
        description: "E-Bike über Arbeitgeber, steueroptimiert"
        expected_shift: "+0.10"

      - lever: "Mobilitätsbudget"
        description: "Flexibles Budget statt Firmenwagen"
        expected_shift: "+0.12"

    implementation:
      components:
        - "Toolbox für KMU (Checklisten, Vorlagen)"
        - "Beratungsangebot (subventioniert)"
        - "Best Practice Netzwerk"
        - "Label 'Mobilitätsfreundlicher Arbeitgeber'"
        - "Pilotprojekte mit Leuchtturm-Firmen"

      timeline:
        q1_2026: "Toolbox-Entwicklung, 5 Pilotfirmen"
        q2_2026: "Rollout Beratungsangebot"
        q3_2026: "Label-Launch, 20 Firmen"
        q4_2026: "Skalierung, 50 Firmen"

      budget_estimate: "CHF 60-90k"

    expected_impact:
      reach_firmen: 50
      reach_mitarbeitende: 5000
      modal_shift: 0.15
      co2_reduction_tonnes: 750

  # -------------------------------------------------------------------------
  # INTERVENTION 2: Lebensereignis-Trigger Kampagne (WHEN)
  # -------------------------------------------------------------------------
  - id: "INT-MOB-002"
    name: "Mobility Life Events Programm"
    priority: 2
    status: "design"

    target_dimension: "WHEN"
    target_segment: ["PEND"]

    mechanism:
      primary: "Habit Disruption Targeting"
      secondary: ["Timing", "Trial Offers", "Onboarding"]

    behavioral_levers:
      - lever: "Umzugs-Willkommenspaket"
        description: "Gemeinde sendet Mobilitäts-Info bei Anmeldung"
        expected_shift: "+0.12"

      - lever: "Job-Onboarding Integration"
        description: "Mobilitäts-Beratung als Teil des Onboardings"
        expected_shift: "+0.18"

      - lever: "3-Monats-ÖV-Probe"
        description: "Gratis ÖV-Abo für Neuzuzüger/neue Jobs"
        expected_shift: "+0.25"

      - lever: "E-Bike Testmonat"
        description: "Gratis E-Bike Test bei Lebensereignis"
        expected_shift: "+0.15"

    implementation:
      components:
        - "Daten-Kooperation mit Gemeinden (Anmeldungen)"
        - "Arbeitgeber-Onboarding-Toolkit"
        - "ÖV-Kooperation für Probe-Abos"
        - "E-Bike Sharing für Tests"

      timeline:
        q1_2026: "Pilot 5 Gemeinden + 10 Arbeitgeber"
        q2_2026: "Evaluation + Skalierung"
        q3_2026: "Kantonsweite Verfügbarkeit"

      budget_estimate: "CHF 40-60k"

    expected_impact:
      reach: 8000  # Umzüge + Jobwechsel p.a.
      conversion_rate: 0.20
      new_sustainable_commuters: 1600

  # -------------------------------------------------------------------------
  # INTERVENTION 3: Vollkosten-Transparenz (AWARE)
  # -------------------------------------------------------------------------
  - id: "INT-MOB-003"
    name: "True Cost of Driving Kampagne"
    priority: 3
    status: "design"

    target_dimension: "AWARE"
    target_segment: ["PEND"]

    mechanism:
      primary: "Mental Accounting Correction"
      secondary: ["Information", "Personalization", "Comparison"]

    behavioral_levers:
      - lever: "TCO-Rechner personalisiert"
        description: "Echte Autokosten vs. wahrgenommene"
        expected_shift: "+0.10"

      - lever: "Vergleichs-Dashboard"
        description: "Auto vs. ÖV vs. E-Bike Vollkosten"
        expected_shift: "+0.08"

      - lever: "Jährlicher Kosten-Report"
        description: "Automatischer Jahresbericht Mobilitätskosten"
        expected_shift: "+0.05"

    implementation:
      components:
        - "Online TCO-Rechner"
        - "Integration in Arbeitgeber-Tools"
        - "Kampagne 'Was kostet dein Arbeitsweg wirklich?'"

      timeline:
        q2_2026: "Tool-Entwicklung + Launch"
        q3_2026: "Kampagne"

      budget_estimate: "CHF 25-40k"

  # -------------------------------------------------------------------------
  # INTERVENTION 4: Ladeinfrastruktur-Kommunikation (AWARE + WHERE)
  # -------------------------------------------------------------------------
  - id: "INT-MOB-004"
    name: "E-Mobility Confidence Building"
    priority: 4
    status: "design"

    target_dimension: "AWARE"
    target_segment: ["PEND", "KMU"]

    mechanism:
      primary: "Uncertainty Reduction"
      secondary: ["Information", "Visibility", "Social Proof"]

    behavioral_levers:
      - lever: "Lade-Karte mit Echtzeit-Verfügbarkeit"
        description: "App zeigt freie Ladestationen"
        expected_shift: "+0.08"

      - lever: "Range Anxiety Kampagne"
        description: "Testimonials: 'Mein Alltag mit E-Auto'"
        expected_shift: "+0.06"

      - lever: "Arbeitgeber-Laden Förderung"
        description: "Subventionierte Ladestationen am Arbeitsplatz"
        expected_shift: "+0.12"

    implementation:
      components:
        - "Lade-Infrastruktur-Portal"
        - "Testimonial-Kampagne"
        - "Arbeitgeber-Förderprogramm Ladestationen"

      budget_estimate: "CHF 35-50k"

  # -------------------------------------------------------------------------
  # INTERVENTION 5: Soziale Normen & Gamification (WHAT.S)
  # -------------------------------------------------------------------------
  - id: "INT-MOB-005"
    name: "Sustainable Commuting Challenge"
    priority: 5
    status: "concept"

    target_dimension: "WHAT"
    utility_sub: "u_S"
    target_segment: ["PEND", "KMU"]

    mechanism:
      primary: "Social Norms"
      secondary: ["Gamification", "Competition", "Recognition"]

    behavioral_levers:
      - lever: "Firmen-Challenge"
        description: "Wettbewerb zwischen Unternehmen"
        expected_shift: "+0.08"

      - lever: "Team-Tracking"
        description: "Gemeinsam CO2 sparen als Team"
        expected_shift: "+0.06"

      - lever: "Öffentliche Anerkennung"
        description: "Rangliste, Badges, PR"
        expected_shift: "+0.04"

    implementation:
      components:
        - "Challenge-Plattform/App"
        - "Firmen-Wettbewerb jährlich"
        - "Medienbegleitung"

      budget_estimate: "CHF 20-30k"

