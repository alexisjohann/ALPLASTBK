  wirkung_langfristig:
    - "Steigerung erneuerbare Heizungen um 20% (Modul 1)"
    - "Ausschöpfung Impulsprogramm >80%"
    - "Messbare Verhaltensänderung in Modul 2"
    - "AWE nutzt BEATRIX eigenständig (Modul 3)"

# =============================================================================
