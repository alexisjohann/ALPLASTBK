# =============================================================================
# KOMMUNIKATION & GOVERNANCE
# =============================================================================

governance:

  meetings:
    - type: "Steering Committee"
      frequency: "Monatlich"
      attendees: ["Thomas Wartberger", "FA Projektleitung"]
      purpose: "Status, Entscheidungen, Eskalation"

    - type: "Arbeits-Calls"
      frequency: "Wöchentlich"
      attendees: ["Projektteam"]
      purpose: "Fortschritt, Abstimmung, Fragen"

    - type: "Workshops"
      frequency: "Gemäss Plan"
      attendees: ["Erweitertes Team"]
      purpose: "Ergebnispräsentation, Validierung"

  reporting:
    - "Monatlicher Statusbericht"
    - "Workshop-Protokolle"
    - "Deliverable-Tracking"

  eskalation:
    level_1: "Projektleitung FA ↔ Thomas Wartberger"
    level_2: "FA Partner ↔ Ralph Brändle"

# =============================================================================
# RISIKEN
# =============================================================================

risks:

  - id: "R1"
    risk: "Verzögerung Datenlieferung AWE"
    probability: "medium"
    impact: "medium"
    mitigation: "Frühzeitige Anforderungsliste, Eskalationspfad"

  - id: "R2"
    risk: "Modul 2 Entscheid verzögert sich"
    probability: "resolved"
    impact: "none"
    mitigation: "Entscheid 2026-02-25: Mobilität gewählt"
    resolved: "2026-02-25"

  - id: "R3"
    risk: "Stakeholder-Widerstand"
    probability: "medium"
    impact: "high"
    mitigation: "Frühe Einbindung, Workshop-Format"

  - id: "R4"
    risk: "Impulsprogramm-Verlängerung (entwertet Deadline-Hebel)"
    probability: "low"
    impact: "medium"
    mitigation: "Alternative Hebel im Design vorbereiten"

  - id: "R5"
    risk: "Ressourcen-Engpass AWE"
    probability: "medium"
    impact: "medium"
    mitigation: "Klare Erwartungen, minimaler AWE-Aufwand definiert"

