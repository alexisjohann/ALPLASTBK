# =============================================================================
# AWE002 - PROJEKTPLAN: BEATRIX AWE ENERGIEKONZEPT ST. GALLEN
# =============================================================================
# Verhaltensrobuste Weiterentwicklung Energiekonzept 2021-2030
# Basierend auf Offerte vom 15.12.2025
# =============================================================================

metadata:
  project_id: "AWE002"
  project_name: "BEATRIX AWE Energiekonzept St. Gallen"
  customer_id: "AWE-SG"
  version: "1.2"
  created: "2026-02-02"
  updated: "2026-02-25"
  status: "final"

  project_lead_kunde: "Thomas Wartberger"
  project_lead_fa: null  # Zu definieren

# =============================================================================
# EXECUTIVE SUMMARY
# =============================================================================

executive_summary:

  ziel: |
    Verhaltensrobuste Weiterentwicklung des Energiekonzepts 2021-2030 mit BEATRIX.
    Das AWE wird befähigt, Verhalten systematisch zu analysieren, bestehende
    Instrumente zu kalibrieren und die Energiepolitik so zu gestalten, dass sie
    nicht nur gewollt, sondern gelebt wird.

  uebergeordnete_ziele:
    - "Weiterentwicklung Energiekonzept 2021-2030 im Lichte Regierungsbericht 2025"
    - "Systematische Verhaltensanalyse der Akteursgruppen"
    - "Kalibrierung bestehender Instrumente (Förderung, Kommunikation, Regulierung)"
    - "Stärkung der Steuerungsfähigkeit des AWE durch BEATRIX"
    - "Vorbereitung Strategie 2026-2030 mit Fokus Behavioral Governance"

  module:
    - id: "M1"
      name: "Erneuerbar Heizen 2030"
      status: "confirmed"

    - id: "M2"
      name: "Mobilität & Infrastruktur"
      status: "confirmed"
      decided: "2026-02-25"
      notes: "Entscheid für Mobilität (statt Stromproduktion)"
      model_ref: "MOD-AWE-SG-MOB-001"

    - id: "M3"
      name: "Befähigung & Verstetigung"
      status: "optional_phase_2"

  timeline_overview:
    kickoff: "2026-02 (KW 9, Ende Februar)"
    modul_1_2: "2026-03 bis 2026-05 (parallel)"
    integration: "2026-05 bis 2026-06"
    modul_3_optional: "2026-06 bis 2026-09"

  note: "Kompakte Timeline gemäss Offerte vom 15.12.2025"

# =============================================================================
# PHASE 0: PRE-KICKOFF & KICKOFF
# =============================================================================

phase_0:
  name: "Pre-Kickoff & Projektstart"
  duration: "3 Wochen"
  timeframe: "Februar 2026 (KW 6-9)"

  milestones:
    - id: "MS-0.1"
      name: "Pre-Kickoff Meeting"
      date: "2026-02-03"
      status: "scheduled"
      attendees:
        - "Thomas Wartberger (AWE)"
        - "FehrAdvice Team"
      objectives:
        - "Validierung der Vorbereitung"
        - "Klärung Modul 2 Wahl"
        - "Abstimmung Timeline"
        - "Identifikation Stakeholder"

    - id: "MS-0.2"
      name: "Dokumenten-Übergabe"
      date: "2026-02-W2"
      deliverables_from_awe:
        - "Regierungsbericht 28. Oktober 2025"
        - "Förderstatistiken 2024-2025"
        - "Aktuelle KPIs Energiekonzept"
        - "Stakeholder-Übersicht"

    - id: "MS-0.3"
      name: "Kickoff-Workshop (gemeinsam M1+M2)"
      date: "2026-02-27 oder 2026-02-28"  # Ende Februar, KW 9
      duration: "0.5 Tage"
      location: "AWE St. Gallen"
      attendees:
        - "Thomas Wartberger (PL AWE)"
        - "Elena Hazeberger (M1 Erneuerbar Heizen)"
        - "Eve Studer (M2 Mobilität)"
        - "Ralph Brändle (Amtsleiter, optional)"
        - "FehrAdvice Team"
      agenda:
        - "Begrüssung & BEATRIX-Intro (20 min)"
        - "Gemeinsame Analyse: Lösungsraum M1 + M2 (40 min)"
        - "Themen-Priorisierung pro Modul — mit Vorschlag (40 min)"
        - "Timeline & Projektablauf — Regeltermine, Erwartungen (30 min)"
        - "Zusammenarbeit & Formate — Weeklies, Rollen (20 min)"
        - "Erwartungen Elena + Eve abholen — Commitment (15 min)"
        - "Wrap-up & nächste Schritte (5 min)"
      agenda_document: "kickoff_agenda_2026-02-27.md"

  deliverables:
    - "Kickoff-Protokoll mit Entscheidungen"
    - "Finalisierter Projektplan"
    - "Priorisierte Verhaltensfelder"
    - "Daten-Anforderungsliste"

# =============================================================================
# PHASE 1: DIAGNOSE & ANALYSE (Modul 1 + Modul 2 parallel)
# =============================================================================

phase_1:
  name: "Diagnose & Verhaltensanalyse (Modul 1 + Modul 2 parallel)"
  duration: "8 Wochen"
  timeframe: "März - April 2026 (KW 10-17)"

  # ---------------------------------------------------------------------------
  # MODUL 1: ERNEUERBAR HEIZEN 2030
  # ---------------------------------------------------------------------------
  modul_1:
    name: "Erneuerbar Heizen 2030"

    workstreams:
      - id: "WS-1.1"
        name: "Verhaltensdiagnose Heizungsersatz"
        duration: "4 Wochen"
        activities:
          - "Analyse psychologischer Entscheidungslogiken"
          - "Identifikation Barrieren und Treiber"
          - "Segmentierung nach Verhaltensmustern"
          - "Validierung mit Stakeholder-Interviews"
        deliverables:
          - "Verhaltensdiagnose-Report"
          - "Segment-Profile (EFH, MFH, Industrie, Installateure)"

      - id: "WS-1.2"
        name: "Instrumenten-Mapping"
        duration: "3 Wochen"
        activities:
          - "Mapping bestehender Förderinstrumente"
          - "Analyse Kommunikationsmassnahmen"
          - "Bewertung Verhaltenswirkung"
          - "Identifikation Optimierungspotenzial"
        deliverables:
          - "Instrumenten-Wirkungsmatrix"
          - "Gap-Analyse"

      - id: "WS-1.3"
        name: "BEATRIX-Simulation"
        duration: "3 Wochen"
        activities:
          - "Modellierung unterschiedlicher Massnahmenarchitekturen"
          - "Simulation: Förderung, Defaults, Kommunikation"
          - "Simulation: Verpflichtungsszenarien"
          - "Sensitivitätsanalyse"
        deliverables:
          - "Simulationsdokumentation"
          - "Szenario-Vergleich"

    milestone:
      id: "MS-1.1"
      name: "Zwischenpräsentation Modul 1"
      date: "2026-04-W2"  # Mitte April
      deliverable: "BEATRIX-Diagnosebericht 'Erneuerbar Heizen 2030' (Draft)"

  # ---------------------------------------------------------------------------
  # MODUL 2: MOBILITÄT ODER STROMPRODUKTION (parallel)
  # ---------------------------------------------------------------------------
  modul_2:
    name: "Mobilität & Infrastruktur"
    status: "confirmed"
    decided: "2026-02-25"
    model_ref: "MOD-AWE-SG-MOB-001"

    workstreams:
      - id: "WS-2.1"
        name: "Verhaltensanalyse Mobilität"
        duration: "4 Wochen"
        activities:
          - "Analyse Pendler-Entscheidungslogiken"
          - "Identifikation Habit-Disruption-Momente"
          - "Segmentierung (Auto-Pendler, KMU, Gemeinden)"
          - "Stakeholder-Interviews (Arbeitgeber, Gemeinden, ÖV-Betreiber)"
        deliverables:
          - "Mobilitäts-Verhaltensdiagnose"
          - "Segment-Profile mit Verhaltensparametern"

      - id: "WS-2.2"
        name: "Barrieren & Anreize"
        duration: "3 Wochen"
        activities:
          - "Identifikation situativer Barrieren (Habit, Komfort, Infrastruktur)"
          - "Analyse sozialer Vergleichsdynamiken (Arbeitgeber, Nachbarschaft)"
          - "Mapping struktureller Anreize (Förderung, Infrastruktur, Arbeitgeber)"
          - "Mental Accounting: Vollkosten Auto vs. wahrgenommene Kosten"
        deliverables:
          - "Barrieren-Anreize-Matrix"
          - "Mental Accounting Gap-Analyse"

      - id: "WS-2.3"
        name: "BEATRIX-Simulation Mobilität"
        duration: "3 Wochen"
        activities:
          - "Simulation Kommunikationsoptionen (Framing, Kanäle)"
          - "Simulation Infrastruktur-Szenarien (Lade-Netz, Velowege)"
          - "Modellierung Arbeitgeber-Interventionen (Defaults, Anreize)"
          - "Lebensereignis-Trigger Modellierung (Umzug, Jobwechsel)"
        deliverables:
          - "Simulationsdokumentation Mobilität"
          - "Szenario-Vergleich (5 Interventionen)"

    milestone:
      id: "MS-1.2"
      name: "Zwischenpräsentation Modul 2"
      date: "2026-04-W3"  # Ende April
      deliverable: "BEATRIX-Diagnosebericht Modul 2 (Draft)"

  # ---------------------------------------------------------------------------
  # Phase 1 Abschluss
  # ---------------------------------------------------------------------------
  phase_1_abschluss:
    milestone:
      id: "MS-1.3"
      name: "Diagnose-Workshop"
      date: "2026-04-W4"  # Ende April
      duration: "0.5 Tage"
      location: "AWE St. Gallen"
      objectives:
        - "Präsentation Diagnose-Ergebnisse Modul 1 + 2"
        - "Validierung mit AWE-Team"
        - "Priorisierung Interventionen"
        - "Vorbereitung Integration"

    deliverables:
      - "BEATRIX-Diagnosebericht Modul 1 (Draft)"
      - "BEATRIX-Diagnosebericht Modul 2 (Draft)"
      - "Simulationsdokumentation"
      - "Workshop-Protokoll mit Priorisierungen"

# =============================================================================
# PHASE 2: DESIGN & EMPFEHLUNGEN
# =============================================================================

phase_2:
  name: "Zwischenphase / Integration & Synthese"
  duration: "5-6 Wochen"
  timeframe: "Mai - Juni 2026 (KW 18-23)"

  beschreibung: |
    Gemeinsame Ergebnissynthese und Transfer.
    Entscheid über allfällige Durchführung von Modul 3.

  workstreams:
    - id: "WS-3.1"
      name: "Interventions-Design Modul 1"
      duration: "4 Wochen"
      activities:
        - "Ausarbeitung priorisierter Interventionen"
        - "Detaillierung Installateur-Programm"
        - "Design Kommunikationskampagne Impulsprogramm"
        - "Spezifikation Förderportal-Optimierung"
      deliverables:
        - "Interventions-Konzept 'Heizen 2030'"
        - "Implementierungsplan"

    - id: "WS-3.2"
      name: "Interventions-Design Modul 2"
      duration: "4 Wochen"
      activities:
        - "Ausarbeitung priorisierter Interventionen"
        - "Detaillierung Kernmassnahmen"
        - "Entwicklung Kommunikationskonzept"
      deliverables:
        - "Interventions-Konzept Modul 2"
        - "Implementierungsplan"

    - id: "WS-3.3"
      name: "Wirkungsprognose & KPIs"
      duration: "2 Wochen"
      activities:
        - "Quantifizierung erwarteter Wirkung"
        - "Definition Monitoring-KPIs"
        - "Entwicklung Evaluationskonzept"
      deliverables:
        - "Wirkungsprognose"
        - "KPI-Dashboard-Konzept"

  milestones:
    - id: "MS-2.1"
      name: "Design-Workshop"
      date: "2026-05-W3"  # Mitte Mai
      duration: "0.5 Tage"
      location: "AWE St. Gallen"
      objectives:
        - "Präsentation Interventions-Designs"
        - "Feedback und Anpassungen"
        - "Priorisierung für Umsetzung"
        - "Abstimmung Quick Wins vs. strategische Massnahmen"

    - id: "MS-2.2"
      name: "Abschlusspräsentation Phase 1+2 & Entscheid Modul 3"
      date: "2026-06-W2"  # Anfang Juni
      attendees:
        - "Thomas Wartberger"
        - "Ralph Brändle (Amtsleiter)"
        - "Weitere Entscheidungsträger"
      deliverables:
        - "Verhaltensrobustes Design 'Heizen 2030' (Final)"
        - "Verhaltensrobustes Design Modul 2 (Final)"
        - "Massnahmenvorschläge mit Priorisierung"
        - "Implementierungs-Roadmap"
        - "Entscheidungsvorlage Modul 3"

# =============================================================================
# HINWEIS: Umsetzungsbegleitung ist in Modul 3 integriert
# =============================================================================

# =============================================================================
# MODUL 3: BEFÄHIGUNG (Optional - Phase 2)
# =============================================================================

modul_3:
  name: "BEATRIX Onboarding & Anwendungsbegleitung"
  status: "optional"
  timeframe: "Juni - September 2026 (KW 24-39)"

  beschreibung: |
    Befähigung des AWE-Teams, BEATRIX eigenständig als Analyse-,
    Reflexions- und Steuerungsinstrument einzusetzen.
    Entscheid erfolgt Ende Phase 2 (Anfang Juni 2026).

  leistungen:
    - "BEATRIX-Schulung für AWE-Team (2 Tage)"
    - "Train-the-Trainer Konzept"
    - "Entwicklung AWE-spezifischer BEATRIX-Tools"
    - "Begleitetes Praxisprojekt (Pilot-Intervention)"
    - "Anwendungsbegleitung über 3 Monate"
    - "Dokumentation und Handbuch"

  milestones:
    - id: "MS-3.1"
      name: "BEATRIX-Schulung"
      date: "2026-06-W3"
      duration: "2 Tage"

    - id: "MS-3.2"
      name: "Pilot-Start"
      date: "2026-07-W1"

    - id: "MS-3.3"
      name: "Abschluss & Übergabe"
      date: "2026-09-W4"

# =============================================================================
# TIMELINE-ÜBERSICHT
# =============================================================================

timeline:

  2026_februar:
    - "KW 6: Pre-Kickoff (03.02.)"
    - "KW 7: Dokumentenübergabe"
    - "KW 9: Kickoff-Workshop (27./28.02.) - gemeinsam M1+M2"

  2026_maerz:
    - "KW 10-11: Verhaltensdiagnose M1 + M2 parallel"
    - "KW 12-13: Instrumenten-Mapping + Barrieren-Analyse"

  2026_april:
    - "KW 14-15: BEATRIX-Simulationen"
    - "KW 16: Zwischenpräsentation M1"
    - "KW 17: Zwischenpräsentation M2"
    - "KW 18: Diagnose-Workshop (Abschluss Phase 1)"

  2026_mai:
    - "KW 19-20: Interventions-Design & Synthese"
    - "KW 21: Design-Workshop"
    - "KW 22: Finalisierung & Wirkungsprognose"

  2026_juni:
    - "KW 23: Abschlusspräsentation + Entscheid Modul 3"
    - "KW 24-26: Modul 3 Start (optional): BEATRIX-Schulung"

  2026_juli_september:
    - "Modul 3 (optional): Anwendungsbegleitung & Pilot"
    - "KW 39: Abschluss Modul 3"

