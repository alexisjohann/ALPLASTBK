# =============================================================================
# EXECUTIVE SUMMARY
# =============================================================================

executive_summary:

  organization: |
    Das AWE SG ist das kantonale Amt für Wasser und Energie, Teil des
    Bau- und Umweltdepartements. Neuer Amtsleiter seit Mai 2025: Ralph Brändle.
    Operativer Partner für Energiethemen: Energieagentur St. Gallen GmbH.

  opportunity: |
    KRITISCHES ZEITFENSTER: Das Impulsprogramm des Bundes bietet +30%
    höhere Förderung für Heizungsersatz - NUR NOCH BIS ENDE 2026.
    Fokus auf MFH und Industrie mit grossem Hebel.

  key_challenge: |
    55% aller Heizungsersetzungen sind Notfälle mit 24-72h Entscheidungsfenster.
    In dieser Situation entscheiden Installateure faktisch über erneuerbar/fossil.
    Der Installateur ist der kritische Hebel.

  recommended_approach: |
    1. Impulsprogramm-Kommunikation mit Deadline-Framing
    2. Installateur-Multiplikatoren-Programm für Notfallersetzungen
    3. Förderportal-Optimierung mit Nudges

