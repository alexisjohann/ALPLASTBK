---
# ALPLA Strategic Dependency & Integration Map
# How Digital, HR, and Sales strategies reinforce each other
# Last Updated: 2026-01-15
# Database Version: 1.0.0

strategic_dependencies:

  # ============================================================================
  # DEPENDENCY 1: DIGITAL STRATEGY ENABLES SALES GROWTH
  # ============================================================================

  digital_to_sales:
    dependency_id: "DEP_DIGITAL_SALES_001"
    description: "Digital infrastructure transformation enables geographic expansion and account management at scale"

    supply_chain_visibility:
      capability: "Real-time supply chain visibility (ERP + IoT)"
      timeline: "Phase 1-2 (ERP pilot 2025, full rollout 2027-29)"
      sales_impact: "APAC market entry"

      mechanism:
        - "Thailand plant ERP operational by Q2 2025"
        - "Enables customer data integration with key APAC customers (Coca-Cola, local bottlers)"
        - "Real-time inventory tracking reduces lead times 20-30%"
        - "Supply chain reliability becomes sales differentiator in emerging markets"

      sales_revenue_impact:
        phase_1_impact: "€5-10M (competitive advantage in APAC negotiations)"
        phase_2_impact: "€50-100M (scale-up of Vietnam, India operations)"
        cumulative_impact: "€150-200M by 2035"

    demand_forecasting:
      capability: "Advanced demand forecasting via data platform"
      timeline: "Phase 2 (data platform 2027-29, ML models 2028+)"
      sales_impact: "Key account management productivity"

      mechanism:
        - "Snowflake data platform captures 2+ years of customer order history"
        - "ML models identify seasonality, growth trends, risk indicators"
        - "Sales team gets predictive alerts 6-12 months early"
        - "Enables proactive pricing, product recommendations"

      sales_productivity_gain:
        phase_2_impact: "15-20% improvement in forecast accuracy"
        phase_3_impact: "5-10% increase in sales team productivity"
        revenue_impact: "€100-150M (better pricing, cross-sell, churn prevention)"

    customer_360_platform:
      capability: "Unified customer data platform (CDP)"
      timeline: "Phase 2-3 (2027-2035)"
      sales_impact: "Account executive effectiveness"

      mechanism:
        - "All customer interactions centralized (orders, service, payments, feedback)"
        - "Account executives see full customer journey"
        - "Enables tailored conversations, cross-selling, early churn signals"
        - "Reduces sales cycle time 20-30%"

      sales_productivity_gain:
        phase_3_impact: "€200-300M (improved account penetration, retention)"


  # ============================================================================
  # DEPENDENCY 2: HR STRATEGY ENABLES DIGITAL TRANSFORMATION
  # ============================================================================

  hr_to_digital:
    dependency_id: "DEP_HR_DIGITAL_001"
    description: "Talent acquisition and capability development enable digital transformation execution"

    it_digital_talent:
      capability: "Recruitment of 700 IT/digital specialists over 11 years"
      timeline: "Phase 1-3 (150 Phase 1, 250 Phase 2, 300 Phase 3)"
      digital_impact: "ERP & IoT implementation success"

      mechanism:
        - "2025: Hire 150 ERP specialists, cloud architects, data engineers"
        - "Phase 1 capex: €95M requires specialized technical talent"
        - "Without talent → implementations fail, capex burned"
        - "With talent → projects deliver on time, within budget"

      dependency_severity: "CRITICAL"
      consequences_if_unfulfilled:
        - "ERP pilots delayed 6-12 months"
        - "Digital capex €95M at risk (20% probability of write-off)"
        - "APAC expansion delayed (supply chain system unavailable)"

    organizational_change_management:
      capability: "HR-led organizational transformation program"
      timeline: "Phase 1-3 (2025-2035)"
      digital_impact: "User adoption of new systems"

      mechanism:
        - "ERP implementation requires 95% plant coverage (240 plants)"
        - "Each plant: 50-100 people need to change workflows"
        - "Without OCM → user resistance, low adoption (30-40%)"
        - "With OCM → adoption >80%, ROI achieved"

      hr_capability_required:
        - "OCM lead at steering committee"
        - "Plant-level change champions (1 per plant)"
        - "Training program (500+ sessions across 240 plants)"

      dependency_severity: "HIGH"


  # ============================================================================
  # DEPENDENCY 3: SALES STRATEGY FUNDS HR & DIGITAL INVESTMENT
  # ============================================================================

  sales_to_hr_digital:
    dependency_id: "DEP_SALES_FUNDING_001"
    description: "Revenue growth funds capex investment in HR and Digital"

    ebitda_generation:
      mechanism:
        - "Revenue €4.9B (2024) → €9.9B (2035)"
        - "EBITDA margin 10.2% → 12.0%"
        - "EBITDA €500M (2024) → €1,188M (2035)"

      capex_funding_model:
        - "Annual capex budget: €50M average"
        - "Funded from operating cash flow (EBITDA + working capital)"
        - "Capex/revenue ratio: ~1.0% (sustainable)"

      dependency:
        - "If revenue growth underperforms → capex budget squeezed"
        - "If APAC expansion delivers <€50M by 2026 → digital budget cuts"
        - "If recycled materials revenue <€100M in Phase 1 → Phase 2 funding risk"

      sensitivity_analysis:
        conservative_scenario_impact: "Capex reduction €50M (€330M vs €380M Phase 2 plan)"
        optimistic_scenario_impact: "Capex acceleration €100M (€330M Phase 2 capex increased)"

    market_expansion_enables_organization:
      mechanism:
        - "APAC, AMET expansion requires 5,100 new hires (Phase 2)"
        - "New hires require payroll: €15M+ annual"
        - "Can only afford if revenue grows to fund payroll"
        - "Sales growth → headcount investment → capability for further growth"

      virtuous_cycle:
        2025_base: "€4.9B revenue → €50M annual capex → new capabilities"
        2026_outcome: "New capabilities enable customer wins"
        2027_result: "€5.3B revenue → €77M annual capex (phase 2) → scale up"
        loop_continuation: "Each phase funds next phase capex"

      dependency_severity: "CRITICAL"


  # ============================================================================
  # DEPENDENCY 4: CIRCULAR ECONOMY DIFFERENTIATION (Cross-Functional)
  # ============================================================================

  circular_economy_integration:
    dependency_id: "DEP_CIRCULAR_001"
    description: "Circular economy positioning integrates Digital + HR + Sales"

    digital_capability_for_circularity:
      requirement:
        - "Track recycled material flows across supply chain"
        - "Carbon accounting system (Scope 1, 2, 3 emissions)"
        - "Customer sustainability reporting (monthly/quarterly)"

      implementation:
        - "IoT sensors on recycling plants → real-time capacity utilization"
        - "ERP tracks recycled material SKUs separately"
        - "Data platform calculates customer carbon footprint"

      timeline: "Phase 2-3 (2027-2035)"

      sales_impact:
        - "Sustainability premium: 5-10% on recycled materials"
        - "Pharma customers demand carbon-neutral production"
        - "Revenue uplift: €100-150M by 2035"

      failure_scenario:
        - "Without digital tracking → cannot prove sustainability claims"
        - "Premium pricing collapses → €300M revenue at risk"


    hr_capability_for_circularity:
      requirement:
        - "Advanced recycling engineers (50-100 specialists)"
        - "Sustainability officers in each region"
        - "Process scientists for continuous improvement"

      timeline: "Phase 1-3 (2025-2035)"

      headcount_impact:
        - "Advanced recycling function: 200 people by 2035"
        - "Avg cost: €60K/person = €12M annual payroll"
        - "ROI: €60-80M annual profit from recycled materials"

      failure_scenario:
        - "Cannot scale recycling 350K → 700K tonnes without specialist talent"
        - "Recycling margin stays at 15% (vs target 22%)"
        - "€200M profit at risk"


    sales_strategy_for_circularity:
      requirement:
        - "Recycled materials as distinct product line"
        - "Account execs trained on circular pitch"
        - "Pricing model: Premium on recycled content"

      mechanism:
        - "2024 recycled materials revenue: €735M (15% of total)"
        - "2035 target: €1,100M (11% of total, but higher margin)"
        - "Requires sales team trained on circular value proposition"

      sales_org_changes:
        - "Circular economy specialist sales role (new)"
        - "Product management for recycled materials (new)"
        - "Key account sustainability officer (embedded in top customers)"

      revenue_at_stake: "€1.1B by 2035 (12% of total revenue)"


  # ============================================================================
  # DEPENDENCY 5: GEOGRAPHIC EXPANSION (Cross-Functional)
  # ============================================================================

  geographic_expansion_integration:
    dependency_id: "DEP_GEO_001"
    description: "APAC & AMET expansion requires coordinated Digital + HR + Sales execution"

    sales_opens_markets:
      thailand_entry_example:
        phase: "Phase 1 (2025)"
        sales_role: "Market validation, customer identification"

        sequence:
          step_1_2024: "Sales identifies Coca-Cola interest in Thailand plant"
          step_2_2025: "Plant operationalized (capex: €20M)"
          step_3_2025: "First customer orders: €5M"
          step_4_2026: "Plant reaches 100% capacity: €30M revenue"
          step_5_2029: "Vietnam expansion: €15M revenue"

        sales_dependency:
          - "Without customer pre-commitment → plant underutilized"
          - "Coca-Cola commitment = plant viability"
          - "Sales drives plant ROI"

    digital_infrastructure_for_expansion:
      thailand_operations:
        erp_requirement: "Local ERP instance for Thailand plant"
        timeline: "Live by Q2 2025"
        capability_enabled:
          - "Real-time inventory visibility with Coca-Cola"
          - "Demand forecasting for Thailand market"
          - "Quality control integration (global standards)"

        failure_consequence:
          - "Without ERP → manual forecasting, high stockouts"
          - "Revenue loss: €5-10M in Year 1"

      iot_deployment:
        requirement: "Predictive maintenance on Thailand plant"
        timeline: "Phase 2 (2027+)"
        benefit:
          - "Equipment downtime: 10% → 5%"
          - "Revenue protection: €2-3M/year"

    hr_capability_for_expansion:
      regional_leadership:
        apac_md_hire_2025:
          role: "Asia-Pacific Managing Director"
          cost: "€180K + bonus + relocation"
          responsibility: "Build region from 740M€ → 1,600M€ revenue"

        critical_hires_phase_1:
          - "Thailand plant manager (local or expat)"
          - "Vietnam country manager"
          - "India pharma hub director"
          - "Regional finance manager"
          - "Regional supply chain manager"

      failure_scenario:
        - "Cannot attract APAC regional talent → market entry delayed"
        - "Revenue impact: €200M+ in 2029-2035"

    sales_execution_for_expansion:
      vietnam_entry_example:
        phase_2_timeline: "2027-2029"
        sales_activities:
          - "Identify 50+ beverage customers in Vietnam/Indonesia"
          - "Conduct feasibility studies"
          - "Negotiate long-term contracts (€50M pipeline)"
          - "Support plant design optimization for Vietnam market"

        sales_headcount_required: "15-20 dedicated APAC account executives"

      failure_scenario:
        - "Cannot identify 50+ customers → plant investment not justified"
        - "Vietnam plant ROI at risk"


  # ============================================================================
  # DEPENDENCY 6: PABOCO INNOVATION ECOSYSTEM
  # ============================================================================

  paboco_integration:
    dependency_id: "DEP_PABOCO_001"
    description: "Paboco success requires Digital, HR, Sales, Operations alignment"

    innovation_capability:
      requirement: "R&D team of 50+ scientists and engineers"
      timeline: "Phase 1-3 (2025-2035)"
      cost: "€5M/year average"

      hr_dependency:
        - "Cannot hire specialized materials scientists in commodity market"
        - "Requires premium compensation (€100K+ vs €70K market)"
        - "Executive recruitment: €50-100K per hire"

    sales_commercialization:
      paboco_unit_targets:
        phase_1_2026: "100M units/year"
        phase_2_2029: "250M units/year"
        phase_3_2035: "500M units/year"

      sales_requirement:
        - "Identify Coca-Cola, Danone, PepsiCo acceptance"
        - "Negotiate volume commitments"
        - "Manage supply chain to customers"

      sales_headcount:
        - "Paboco product manager"
        - "Account executives for Paboco contracts (2-3 people)"
        - "Supply chain specialist for paper sourcing"

      failure_scenario:
        - "Cannot land anchor customer by 2026 → Paboco growth stalls"
        - "Investment €30M+ at risk"
        - "Revenue impact: €100-200M by 2035"

    digital_tracking:
      requirement: "Track Paboco production, quality, customer data"
      technology: "ERP module for Paboco (built into SAP S/4HANA)"
      timeline: "Phase 2 (2027-2029)"
      capability:
        - "Production planning across multiple plants"
        - "Quality tracking (each bottle tracked to customer)"
        - "Sustainability footprint calculation"

    operations_capability:
      requirement: "New manufacturing process for paper bottles"
      timeline: "Phase 1-2 (2025-2029)"
      investment: "€30M capex (molds, equipment, training)"
      staffing: "50-100 plant operators trained on new process"


  # ============================================================================
  # DEPENDENCY 7: ADVANCED RECYCLING SCALING
  # ============================================================================

  advanced_recycling_integration:
    dependency_id: "DEP_RECYCLING_001"
    description: "Advanced recycling scaling requires Digital + HR + Sales"

    technology_scaling:
      current_state: "350K tonnes/year (mechanical recycling)"
      target_state: "700K tonnes/year (advanced recycling)"
      phases:
        - "Phase 1: Optimize mechanical (350K → 380K)"
        - "Phase 2: Add advanced recycling (38 0K → 500K)"
        - "Phase 3: Scale advanced (500K → 700K)"

      hr_requirement:
        - "Advanced recycling engineers: 50-100 specialists"
        - "Process scientists: 15-20"
        - "Plant operators (new facilities): 200+"

      failure_scenario:
        - "Cannot hire recycling specialists → scaling delayed 2+ years"
        - "Revenue impact: €150-200M (recycled materials not available)"

    sales_market_readiness:
      requirement: "Build customer base for advanced recycled materials"
      market_opportunity:
        - "Beverage companies: Need 25%+ recycled content (EU mandate)"
        - "Pharma companies: Emerging demand for sustainable packaging"
        - "OEMs: Carbon reduction via circular materials"

      sales_activities:
        phase_1: "Identify 20+ customers interested in advanced recycled materials"
        phase_2: "Secure multi-year contracts for 400-500K tonnes/year"
        phase_3: "Expand to 700K+ tonne contracts"

      sales_headcount:
        - "Circular economy specialist (1 person, €80K)"
        - "Account executives (3-5 dedicated to recycled materials)"

      failure_scenario:
        - "Cannot sell 700K tonnes → capacity underutilized"
        - "Margin collapses: 22% → 12%"
        - "€100M EBITDA impact"

    digital_tracking:
      requirement: "Track recycled material quality, traceability, compliance"
      technology: "Blockchain-enabled supply chain tracking"
      timeline: "Phase 2-3 (2027-2035)"
      benefit:
        - "100% traceability for regulatory compliance"
        - "Customer confidence in sustainability claims"
        - "Premium pricing: 5-10% on verified recycled content"


  # ============================================================================
  # DEPENDENCY MATRIX: WHO DEPENDS ON WHOM
  # ============================================================================

  dependency_matrix:
    digital_strategy_depends_on:
      - "HR: IT talent acquisition (150 Phase 1, 250 Phase 2, 300 Phase 3)"
      - "Sales: Revenue to fund €95M capex"
      - "Ops: Change management for ERP adoption"

    hr_strategy_depends_on:
      - "Digital: IT capability to support global talent systems"
      - "Sales: Revenue to fund €1.3B payroll over 11 years"
      - "Finance: Compensation budget allocation"

    sales_strategy_depends_on:
      - "Digital: Supply chain visibility, demand forecasting"
      - "HR: Talent to expand sales org (+1,700 people)"
      - "Ops: Product availability (plants, recycling)"

    operations_depends_on:
      - "Digital: ERP for production planning, IoT for maintenance"
      - "HR: Operators, engineers, specialists (14,150 new hires)"
      - "Sales: Customer orders to drive capacity utilization"


  # ============================================================================
  # CRITICAL PATH ANALYSIS
  # ============================================================================

  critical_path:
    phase_1_critical_path:
      sequence:
        step_1: "HR hires APAC MD + regional team (Q1-Q2 2025)"
        step_2: "Sales confirms Thailand customer (Coca-Cola commitment, Q1 2025)"
        step_3: "Ops ramps Thailand plant to 100% (Q1-Q2 2025)"
        step_4: "Digital deploys ERP pilot in Thailand (Q2-Q3 2025)"
        step_5: "HR hires IT specialists for ERP rollout (Q1-Q2 2025)"

      critical_activities:
        - "HR recruitment: If delayed >3 months → all other activities delayed"
        - "Sales customer lock-in: If no customer by Q1 2025 → Thailand plant capacity unused"
        - "Digital ERP pilot: If delayed >6 months → Phase 2 rollout at risk"

    phase_2_critical_path:
      sequence:
        step_1: "HR hires 5,100 people for expansion (Q1 2027 - Q4 2029)"
        step_2: "Digital deploys ERP to 150 plants (€50M capex, 2027-2029)"
        step_3: "Sales opens Vietnam, India, Egypt markets (2027-2029)"
        step_4: "Ops builds 4 new plants (€60M capex, 2027-2029)"

      critical_activities:
        - "HR talent pipeline: If <70% hiring success → delay all other Phase 2 activities"
        - "Digital ERP rollout: If >6 months delayed → supply chain chaos on expansion"


  # ============================================================================
  # RISK CASCADES: FAILURE PROPAGATION
  # ============================================================================

  risk_cascades:

    cascade_1_sales_miss:
      trigger: "APAC revenue <€50M in Phase 1 (vs €50M target)"
      immediate_impact: "Thailand plant underutilized"
      cascading_effects:
        - "Digital: ERP ROI lower (fewer users, lower transaction volume)"
        - "HR: Justification for regional hiring weakened"
        - "Finance: Capex for Vietnam/India expansion questionable"
      mitigation:
        - "Pre-commit customer before plant opens"
        - "Flexible plant capacity (ramp up/down)"
        - "Alternative markets (if APAC weak, pivot to AMET)"

    cascade_2_hr_failure:
      trigger: "Cannot hire APAC MD or key regional team (Q1-Q2 2025)"
      immediate_impact: "APAC strategy stalls"
      cascading_effects:
        - "Sales: Market exploration delayed 12+ months"
        - "Digital: ERP pilot in Thailand delayed (no IT leadership)"
        - "Finance: €300M APAC revenue projection at risk by 2035"
      mitigation:
        - "Offer premium compensation (€200K+ for APAC MD)"
        - "External recruiter engagement (early 2024)"
        - "Interim leadership from Europe region"

    cascade_3_digital_delay:
      trigger: "ERP pilot delayed >6 months (Q4 2025 instead of Q2)"
      immediate_impact: "Thailand plant operates without ERP"
      cascading_effects:
        - "Sales: Cannot provide supply chain visibility to customers"
        - "HR: Digital transformation timeline extends (all 150 plants delayed)"
        - "Operations: Manual demand forecasting, inventory chaos"
        - "Finance: Digital capex benefits delayed (€5-10M profit loss/year)"
      mitigation:
        - "Parallel build (while running legacy systems)"
        - "Phased rollout (start with simple modules)"
        - "External consulting support (+€5M cost)"


  # ============================================================================
  # INTEGRATION GOVERNANCE
  # ============================================================================

  integration_governance:

    steering_committee_mandate:
      composition:
        - "CEO (Chair)"
        - "Chief Digital Officer"
        - "Chief HR Officer"
        - "Chief Sales Officer"
        - "COO"

      responsibilities:
        - "Monitor cross-functional dependencies"
        - "Escalate interdependency risks"
        - "Resolve resource conflicts"
        - "Approve dependency trade-offs"

      meeting_frequency: "Monthly during Phase 1-2, Quarterly during Phase 3"

    integration_gates:
      phase_1_gates:
        gate_1: "Q1 2025 - APAC leadership confirmed"
        gate_2: "Q2 2025 - Sales customer lock-in + ERP pilot approved"
        gate_3: "Q4 2025 - ERP pilot successful, Phase 2 plan approved"

      decision_rules:
        - "If any gate missed → pause related Phase 2 capex"
        - "If APAC MD not hired by Q2 2025 → re-evaluate APAC strategy"
        - "If ERP pilot <80% success → reduce Phase 2 plant expansion (de-risk)"


metadata:
  database_version: "1.0.0"
  created_date: "2026-01-15"
  updated_date: "2026-01-15"
  maintained_by: "Strategic Planning Office"
  dependency_review_frequency: "Quarterly"
  next_integration_review: "Q2 2026"
  total_dependencies_mapped: 7
  critical_dependencies: 5
  high_risk_cascades: 3
