      expected_case_50th_percentile: 9900
      upside_scenario_90th_percentile: 10900

    correlation_matrix:
      regional_cagrs: "Moderate positive correlation (0.45-0.65)"
      capex_timing_vs_revenue: "Strong positive correlation (0.78)"
      competitive_response_vs_market_share: "Strong negative correlation (-0.82)"

    validation:
      model_convergence: true
      bootstrap_validation: "10 random samples of 1,000 runs each = ±5% confidence interval"
      historical_accuracy: "Model calibrated to previous 5-year forecasts (+2.3% MAPE)"

    source_code:
