  # ============================================================================
  # MONTE CARLO STOCHASTIC ANALYSIS
  # ============================================================================

  monte_carlo_analysis:
    analysis_id: "MCA_ALPLA_10K"
    simulation_date: "2026-01-15"
    simulations_run: 10000
    confidence_level: 0.95

    methodology:
      description: "Log-normal distribution sampling across regional CAGR uncertainties, timing uncertainties, competitive dynamics"
      key_uncertainties_modeled:
        - "Regional CAGR (±15% around base case)"
        - "Capex execution timing (±2 years)"
        - "Commodity price volatility (±20%)"
        - "Competitive response (±5pp market share)"
        - "Regulatory changes (acceleration/delay)"

    base_case_distribution:
      mean_revenue_2035_eur_m: 9900
      std_dev_eur_m: 850
      percentile_5_eur_m: 8700
      percentile_25_eur_m: 9300
      percentile_50_eur_m: 9900
      percentile_75_eur_m: 10500
      percentile_95_eur_m: 11100
      coefficient_of_variation: 0.086

    probability_analysis:
      prob_exceeds_conservative_8700: 0.979
      prob_exceeds_10b: 0.455
      prob_below_8b: 0.001
      prob_in_base_case_range_9_to_10: 0.35
      prob_in_confident_range_8p5_to_11b: 0.88

    sensitivity_analysis:
      most_sensitive_variables:
        - variable: "Asia-Pacific CAGR"
          sensitivity_range: "±0.4B per ±1% CAGR"
          elasticity: "High"
        - variable: "Europe CAGR"
          sensitivity_range: "±0.25B per ±1% CAGR"
          elasticity: "Medium"
        - variable: "Pharma segment growth"
          sensitivity_range: "±0.35B per ±10% growth"
          elasticity: "High"

    risk_scenarios_from_monte_carlo:
