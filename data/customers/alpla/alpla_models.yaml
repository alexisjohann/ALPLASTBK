models_registry:

  # ============================================================================
  # TIER 1: CORE STRATEGIC MODELS
  # ============================================================================

  SOCM_1_0:
    model_id: "SOCM-1.0"
    name: "Strategy Option Comparison Model"
    category: "Core Strategic Framework"
    version: "1.0"
    status: "VALIDATED"
    created_date: "2025-12-20"
    last_updated: "2026-01-15"

    description: "Comparative analysis of 6 strategic options (Circular Economy, Innovation, Geographic Expansion, Bio-Materials, Scale/Efficiency, M&A) with Monte Carlo validation across 10,000 scenarios"

    framework:
      evaluation_dimensions: 6
      - "Strategic Fit"
      - "Financial Impact"
      - "Feasibility"
      - "Risk Profile"
      - "Competitive Advantage"
      - "Organizational Capability"

    strategic_options: 6
      option_1:
        name: "Circular Economy (CE)"
        utility_score: 0.795
        ranking: 1
        characterization: "Recycling, take-back programs, closed-loop design"

      option_2:
        name: "Innovation (INNOV)"
        utility_score: 0.775
        ranking: 2
        characterization: "Digital, smart packaging, IoT integration"

      option_3:
        name: "Geographic Expansion (GEO)"
        utility_score: 0.735
        ranking: 3
        characterization: "New markets, APAC, AMET focus"

      option_4:
        name: "Bio-Materials (BIO)"
        utility_score: 0.685
        ranking: 4
        characterization: "Paboco, PEF bottles, sustainable alternatives"

      option_5:
        name: "Scale/Efficiency (SCALE)"
        utility_score: 0.675
        ranking: 5
        characterization: "Cost leadership, lean manufacturing"

      option_6:
        name: "M&A/Consolidation (MA)"
        utility_score: 0.615
        ranking: 6
        characterization: "Acquisitions, competitive consolidation"

    complementarity_effects:
      strongest_synergies:
        - pair: "CE + INNOV"
          gamma: "+0.20"
          interpretation: "Digital enables circular economy tracking and optimization"
        - pair: "CE + BIO"
          gamma: "+0.18"
          interpretation: "Bio-materials support circular transition"
        - pair: "GEO + INNOV"
          gamma: "+0.15"
          interpretation: "Digital tools accelerate market entry"

      conflicts:
        - pair: "SCALE + CE"
          gamma: "-0.18"
          interpretation: "Cost-cutting conflicts with sustainability capex"
        - pair: "MA + INNOV"
          gamma: "-0.22"
          interpretation: "Acquisitions typically disrupt innovation cultures"

    recommended_portfolio:
      strategy_name: "Sustainable Mix"
      allocation:
        - option: "Circular Economy"
          weight: 0.40
        - option: "Innovation"
          weight: 0.20
        - option: "Bio-Materials"
          weight: 0.30
        - option: "Scale/Efficiency"
          weight: 0.10
      expected_revenue_2035_eur_m: 9900
      expected_cagr_percent: 6.9

    monte_carlo_validation:
      simulations: 10000
      confidence_level: 0.95
      probability_exceeds_conservative: 0.979
      base_case_revenue_2035: 9900
      confidence_interval_lower: 8700
      confidence_interval_upper: 11100

    source_documents:
      primary: "outputs/ALPLA_Board_Presentation_Summary.md (Slide 2-3)"
      detailed_analysis: "SOCM_Alpla_Monte_Carlo_simple.py"

    validation_status:
      peer_reviewed: true
      board_approved: true
      implemented: true
      approval_date: "2025-12-28"


