  # ===========================================================================
  # AI STRATEGY: "SMALL MODEL" APPROACH
  # ===========================================================================

  ai_strategy:
    approach: "Small Model"
    description: "ALPLA ist AI-Anwender (Consumer), nicht AI-Entwickler"

    what_alpla_does:
      - "Nutzt externe Foundation Models (OpenAI, Google, Anthropic)"
      - "Fokus auf Generative AI für Anwendungen"
      - "Klassische ML für Operations (Anomaly Detection, Predictive Maint.)"
      - "API-basierte Integration"

    what_alpla_does_not:
      - "Keine eigenen Foundation Models entwickeln"
      - "Kein eigenes Training großer Modelle"
      - "Keine eigene Cloud Inference Infrastruktur"
      - "Keine Hardware-Entwicklung"

    ai_capability_focus:
      primary:
        - name: "Generate (Generative AI)"
          use_cases: ["LLM-Anwendungen", "Text/Image Generation"]
          risk_level: "HOCH"
      secondary:
        - name: "Discover (Unsupervised)"
          use_cases: ["Anomaly Detection", "Clustering", "Quality"]
          risk_level: "GERING"
        - name: "Estimate (Supervised)"
          use_cases: ["Predictive Maintenance", "Regression", "Classification"]
          risk_level: "MITTEL"

    key_vendors:
