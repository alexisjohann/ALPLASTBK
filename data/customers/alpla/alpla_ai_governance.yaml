ai_governance_profile:

  # ===========================================================================
  # AI CENTER OF EXCELLENCE
  # ===========================================================================

  ai_coe:
    name: "AI Center of Excellence"
    lead: "Matthäus Greber-Schaffgotsch"
    fte_count: 1.5
    reports_to: "CFO (Ricardo Rehm)"
    established: "~2024"

    scope:
      included:
        - "Transparency"
        - "Method"
        - "Training"
        - "Policy"
        - "Enablement"
      excluded:
        - "Budget für AI-Projekte (liegt bei BUs)"
