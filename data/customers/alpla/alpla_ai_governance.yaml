      - level: 3
        name: "Global Solution Governance (Green)"
        role: "BU Directors"
        responsibility: "AI Strategy for Business Area, Budget Owners"

      - level: 4
        name: "Regional Solution Governance (Green)"
        role: "Managing Unit Directors"
        responsibility: "AI Strategy Regional, Budget Owners"

