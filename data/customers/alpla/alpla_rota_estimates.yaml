rota_estimates:

  # ============================================================================
  # METHODOLOGY & ASSUMPTIONS
  # ============================================================================

  methodology:
    description: "ROTA estimated from available EBITDA margins and industry benchmarks"

    formula: "ROTA = EBIT / Total Assets = EBIT_Margin × Asset_Turnover"

    key_assumptions:
      asset_turnover:
        value: 0.85
        unit: "x (Revenue / Total Assets)"
        rationale: "Typical for capital-intensive plastics manufacturing"
        source: "Industry benchmark (packaging sector average 0.8-1.2x)"

      total_assets_revenue_ratio:
        value: 1.18
        unit: "x (Total Assets / Revenue)"
        rationale: "Inverse of asset turnover"

      depreciation_rate:
        value: 3.0
        unit: "% of revenue"
        rationale: "Typical for machinery-intensive manufacturing"
        source: "Industry benchmark"

      ebit_calculation: "EBIT = EBITDA - Depreciation (3% of revenue)"

    regional_adjustments:
      europe:
        asset_intensity_factor: 1.25
        ebit_margin_adjustment_pp: 0.5
        rationale: "Older, fully depreciated assets; premium pricing"

      south_america:
        asset_intensity_factor: 1.15
        ebit_margin_adjustment_pp: 0.0
        rationale: "Established operations, baseline"

      north_america:
        asset_intensity_factor: 1.20
        ebit_margin_adjustment_pp: 0.3
        rationale: "Premium segments (pharma), efficient operations"

      asia_pacific:
        asset_intensity_factor: 0.95
        ebit_margin_adjustment_pp: -0.5
        rationale: "New investments, pre-profit growth phase"

      africa_middle_east:
        asset_intensity_factor: 0.85
        ebit_margin_adjustment_pp: -1.0
        rationale: "Greenfield investments, start-up phase"

    limitations:
      - "No actual Total Assets data available - estimated from industry benchmarks"
      - "Regional EBIT margins are estimates based on segment mix"
      - "Depreciation estimated at 3% of revenue (industry standard)"
      - "Not validated against ALPLA internal financial data"
      - "Assumes constant asset turnover ratio over projection period"

    data_quality: "LOW - Derived estimates, not primary data"
    confidence_interval: "±1.5 percentage points"
    recommended_action: "Request actual balance sheet data from ALPLA for validation"


