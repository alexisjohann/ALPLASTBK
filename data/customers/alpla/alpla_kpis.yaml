---
# ALPLA Strategic KPI Framework
# Metrics for monitoring strategic execution and business performance
# Last Updated: 2026-01-15
# Database Version: 1.0.0

kpi_framework:

  # ============================================================================
  # TIER 1: STRATEGIC FINANCIAL KPIs (Board-Level Monitoring)
  # ============================================================================

  strategic_financial_kpis:

    revenue_kpi:
      kpi_id: "KPI_REV_001"
      name: "Total Revenue"
      category: "Strategic Financial"
      unit: "€ Millions"
      reporting_frequency: "Monthly"
      owner: "CFO"

      targets:
        baseline_2024: 4900
        phase_1_2026: 5300
        phase_2_2029: 7000
        phase_3_2035: 9900

      cagr_targets:
        phase_1_cagr: 4.0
        phase_2_cagr: 6.0
        phase_3_cagr: 7.0
        cumulative_cagr_2024_2035: 6.9

      tracking_approach:
        - "Monthly board report"
        - "vs Conservative/Base/Optimistic scenarios"
        - "by region (Europe, SA, NA, APAC, AMET)"
        - "by segment (Beverage, Pharma, Industrial, Recycled Materials)"

      variance_threshold:
        warning_level: "±3% vs quarterly forecast"
        critical_level: "±5% vs quarterly forecast"


    ebitda_margin_kpi:
      kpi_id: "KPI_EB_001"
      name: "EBITDA Margin %"
      category: "Strategic Financial"
      unit: "%"
      reporting_frequency: "Monthly"
      owner: "CFO"

      targets:
        baseline_2024: 10.2
        phase_1_2026: 10.5
        phase_2_2029: 11.2
        phase_3_2035: 12.0

      margin_drivers:
        - "Scale economies: +0.5pp"
        - "Recycled materials premium: +0.7pp"
        - "Digital efficiency: +0.4pp"
        - "Mix shift to pharma/specialty: +0.2pp"

      variance_threshold:
        warning_level: "±50 basis points vs target"
        critical_level: "±100 basis points vs target"


    organic_growth_kpi:
      kpi_id: "KPI_OG_001"
      name: "Organic Revenue Growth"
      category: "Strategic Financial"
      unit: "%"
      reporting_frequency: "Quarterly"
      owner: "CEO"

      targets:
        phase_1_organic_growth: "3.5% (vs 4.0% with capex ramp)"
        phase_2_organic_growth: "5.5% (vs 6.0% with geographic expansion)"
        phase_3_organic_growth: "6.5% (vs 7.0% with maturation)"

      calculation:
        - "Revenue growth excluding acquisitions"
        - "Organic = Total growth - M&A contribution"

      variance_threshold:
        warning_level: "±1.0pp"
        critical_level: "±1.5pp"


  # ============================================================================
  # TIER 2: OPERATIONAL KPIs (Functional Leadership Monitoring)
  # ============================================================================

  operational_kpis:

    headcount_kpi:
      kpi_id: "KPI_HC_001"
      name: "Total Headcount"
      category: "Operational"
      unit: "Employees"
      reporting_frequency: "Monthly"
      owner: "HR Director"

      targets:
        baseline_2024: 24350
        phase_1_2026: 27400
        phase_2_2029: 32500
        phase_3_2035: 38500

      regional_targets_2035:
        europe: 14500
        south_america: 5200
        north_america: 3000
        asia_pacific: 8050
        amet: 4000
        global_support: 3750

      hiring_rate_targets:
        phase_1_annual_average: 1525
        phase_2_annual_average: 1700
        phase_3_annual_average: 1000

      variance_threshold:
        warning_level: "±3% vs plan (750 people)"
        critical_level: "±5% vs plan (1250 people)"


    capex_investment_kpi:
      kpi_id: "KPI_CX_001"
      name: "Capex Investment"
      category: "Operational"
      unit: "€ Millions"
      reporting_frequency: "Monthly"
      owner: "CFO"

      targets:
        phase_1_total: 180
        phase_1_annual_average: 90
        phase_2_total: 230
        phase_2_annual_average: 77
        phase_3_total: 140
        phase_3_annual_average: 23
        cumulative_11_years: 550

      allocation_tracking:
        - "ERP transformation: €35M"
        - "IoT deployment: €25M"
        - "Data platform: €15M"
        - "Cybersecurity: €20M"
        - "Recycling expansion: €60M"
        - "Geographic expansion: €60M"
        - "Maintenance capex: €335M"

      variance_threshold:
        warning_level: "±5% per quarter"
        critical_level: "±10% per quarter"


    recycling_capacity_kpi:
      kpi_id: "KPI_RC_001"
      name: "Recycling Capacity"
      category: "Operational"
      unit: "K Tonnes/Year"
      reporting_frequency: "Quarterly"
      owner: "COO"

      targets:
        baseline_2024: 350
        phase_1_2026: 380
        phase_2_2029: 500
        phase_3_2035: 700

      utilization_targets:
        baseline_utilization: 85
        target_utilization_2035: 90

      margin_targets:
        recycling_ebitda_margin_percent_2024: 15
        recycling_ebitda_margin_percent_2035: 22

      variance_threshold:
        warning_level: "±5% vs quarterly target"
        critical_level: "±10% vs quarterly target"


    erp_plant_coverage_kpi:
      kpi_id: "KPI_ERP_001"
      name: "ERP Plant Coverage"
      category: "Operational"
      unit: "% of Plants"
      reporting_frequency: "Quarterly"
      owner: "Chief Digital Officer"

      targets:
        end_of_phase_1_2026: 1.3
        end_of_phase_2_2029: 62.5
        end_of_phase_3_2035: 95

      absolute_targets:
        plants_covered_phase_1: 3
        plants_covered_phase_2: 150
        plants_covered_phase_3: 240

      variance_threshold:
        warning_level: "±5pp (10 plants Phase 2, 20 plants Phase 3)"
        critical_level: "±10pp (20 plants Phase 2, 50 plants Phase 3)"


    iot_plant_coverage_kpi:
      kpi_id: "KPI_IOT_001"
      name: "IoT Plant Coverage"
      category: "Operational"
      unit: "% of Plants"
      reporting_frequency: "Quarterly"
      owner: "Chief Digital Officer"

      targets:
        end_of_phase_1_2026: 5
        end_of_phase_2_2029: 25
        end_of_phase_3_2035: 80

      absolute_targets:
        plants_with_iot_phase_1: 10
        plants_with_iot_phase_2: 50
        plants_with_iot_phase_3: 200

      expected_benefits:
        downtime_reduction_percent: 15
        maintenance_cost_reduction_percent: 20

      variance_threshold:
        warning_level: "±2pp"
        critical_level: "±5pp"


  # ============================================================================
  # TIER 3: STRATEGIC INITIATIVE KPIs (Project-Level Tracking)
  # ============================================================================

  strategic_initiative_kpis:

    geographic_expansion_kpi:
      kpi_id: "KPI_GEO_001"
      name: "Asia-Pacific Revenue"
      category: "Strategic Initiative (Geographic Expansion)"
      unit: "€ Millions"
      reporting_frequency: "Quarterly"
      owner: "APAC Regional MD"

      targets:
        baseline_2024: 740
        target_phase_1_2026: 50
        target_phase_2_2029: 800
        target_phase_3_2035: 1600

      cumulative_growth: "+116% from 2024 to 2035"

      regional_breakdown_2035:
        thailand: 400
        vietnam: 350
        india: 400
        southeast_asia_other: 450

      key_milestones:
        thailand_operational_2025: true
        vietnam_operational_2027: true
        india_operational_2027: true
        apac_revenue_target_100m: 2026
        apac_revenue_target_800m: 2029

      variance_threshold:
        warning_level: "±€50M vs quarterly forecast"
        critical_level: "±€100M vs quarterly forecast"


    amet_expansion_kpi:
      kpi_id: "KPI_AMET_001"
      name: "Africa/Middle East Revenue"
      category: "Strategic Initiative (Geographic Expansion)"
      unit: "€ Millions"
      reporting_frequency: "Quarterly"
      owner: "AMET Regional Director"

      targets:
        baseline_2024: 240
        target_phase_1_2026: 15
        target_phase_2_2029: 250
        target_phase_3_2035: 500

      cumulative_growth: "+108% from 2024 to 2035"

      regional_breakdown_2035:
        egypt: 200
        south_africa: 150
        morocco: 80
        gcc: 70

      variance_threshold:
        warning_level: "±€25M vs quarterly forecast"
        critical_level: "±€50M vs quarterly forecast"


    paboco_production_kpi:
      kpi_id: "KPI_PABOCO_001"
      name: "Paboco Production Units"
      category: "Strategic Initiative (Innovation)"
      unit: "Million Units/Year"
      reporting_frequency: "Quarterly"
      owner: "Head of Innovation"

      targets:
        baseline_2024: 0
        production_start_2025: 10
        phase_1_target_2026: 100
        phase_2_target_2029: 250
        phase_3_target_2035: 500

      profitability_targets:
        gross_margin_target_percent: 35
        ebitda_margin_target_percent: 18
        profitability_achievement_timeline: 2028

      variance_threshold:
        warning_level: "±20M units"
        critical_level: "±40M units"


    recycled_materials_revenue_kpi:
      kpi_id: "KPI_RCMAT_001"
      name: "Recycled Materials Revenue"
      category: "Strategic Initiative (Circular Economy)"
      unit: "€ Millions"
      reporting_frequency: "Quarterly"
      owner: "Head of Circular Economy"

      targets:
        baseline_2024: 735
        phase_1_target_2026: 100
        phase_2_target_2029: 400
        phase_3_target_2035: 1100

      segment_mix_2035:
        - "Internal recycled materials: 60% (€660M)"
        - "External recycled materials trading: 40% (€440M)"

      margin_targets:
        recycled_materials_margin_percent_2024: 15
        recycled_materials_margin_percent_2035: 22

      variance_threshold:
        warning_level: "±€50M vs quarterly forecast"
        critical_level: "±€100M vs quarterly forecast"


  # ============================================================================
  # TIER 4: CAPABILITY & TALENT KPIs (HR-Related Metrics)
  # ============================================================================

  capability_kpis:

    executive_retention_kpi:
      kpi_id: "KPI_RET_EXEC"
      name: "Executive Team Retention"
      category: "Capability"
      unit: "%"
      reporting_frequency: "Quarterly"
      owner: "HR Director"

      target: 95
      focus_levels: "C-suite and regional presidents"
      variance_threshold:
        warning_level: "<90%"
        critical_level: "<85%"


    critical_role_retention_kpi:
      kpi_id: "KPI_RET_CRIT"
      name: "Critical Role Turnover"
      category: "Capability"
      unit: "%"
      reporting_frequency: "Quarterly"
      owner: "HR Director"

      target: "<10% on critical roles"
      critical_roles:
        - "Plant managers"
        - "Regional leaders"
        - "R&D specialists"
        - "Recycling engineers"
        - "Sales account executives"

      variance_threshold:
        warning_level: ">12%"
        critical_level: ">15%"


    it_talent_acquisition_kpi:
      kpi_id: "KPI_IT_TALENT"
      name: "IT/Digital Talent Hiring"
      category: "Capability"
      unit: "% of Plan"
      reporting_frequency: "Quarterly"
      owner: "Chief Digital Officer"

      targets:
        phase_1_hiring_target: 150
        phase_2_hiring_target: 250
        phase_3_hiring_target: 300
        cumulative_11_years: 700

      variance_threshold:
        warning_level: "<80% of plan"
        critical_level: "<70% of plan"


  # ============================================================================
  # TIER 5: CUSTOMER & MARKET KPIs
  # ============================================================================

  market_kpis:

    market_share_kpi:
      kpi_id: "KPI_MKTSHARE_001"
      name: "Global Market Share"
      category: "Market"
      unit: "%"
      reporting_frequency: "Quarterly"
      owner: "CEO"

      targets:
        baseline_2024: 1.1
        target_2035: 1.6

      calculation_basis: "ALPLA revenue / Global integrated packaging market revenue"


    top_20_account_concentration_kpi:
      kpi_id: "KPI_ACC_CONC_001"
      name: "Top 20 Accounts Revenue Concentration"
      category: "Market"
      unit: "% of Total Revenue"
      reporting_frequency: "Quarterly"
      owner: "Chief Sales Officer"

      targets:
        baseline_2024: 60
        target_2035: 65

      top_5_accounts_targets:
        baseline_2024: 30
        target_2035: 35

      variance_threshold:
        warning_level: "±3pp"
        critical_level: "±5pp"


    customer_retention_kpi:
      kpi_id: "KPI_CUST_RET_001"
      name: "Customer Retention Rate"
      category: "Market"
      unit: "%"
      reporting_frequency: "Quarterly"
      owner: "Chief Sales Officer"

      target: 95

      variance_threshold:
        warning_level: "<93%"
        critical_level: "<90%"


  # ============================================================================
  # TIER 6: SUSTAINABILITY & ESG KPIs
  # ============================================================================

  sustainability_kpis:

    recycled_content_kpi:
      kpi_id: "KPI_RECCONT_001"
      name: "Average Recycled Content %"
      category: "Sustainability"
      unit: "%"
      reporting_frequency: "Semi-Annually"
      owner: "Chief Sustainability Officer"

      targets:
        baseline_2024: 18
        phase_1_target_2026: 25
        phase_2_target_2029: 30
        phase_3_target_2035: 35


    carbon_reduction_kpi:
      kpi_id: "KPI_CARBON_001"
      name: "Carbon Reduction Index"
      category: "Sustainability"
      unit: "% vs 2024 Baseline"
      reporting_frequency: "Annually"
      owner: "Chief Sustainability Officer"

      targets:
        phase_1_2026: 15
        phase_2_2029: 35
        phase_3_2035: 60


    waste_to_landfill_kpi:
      kpi_id: "KPI_WASTE_001"
      name: "Waste to Landfill"
      category: "Sustainability"
      unit: "%"
      reporting_frequency: "Quarterly"
      owner: "Chief Sustainability Officer"

      target_2030: 0
      target_2035: 0


  # ============================================================================
  # REPORTING ARCHITECTURE & DASHBOARDS
  # ============================================================================

  reporting_architecture:

    monthly_executive_dashboard:
      audience: "CEO, CFO, COO, Regional CEOs"
      frequency: "Monthly (by 5th of following month)"
      kpis_included:
        - "Revenue (vs target, vs plan, vs prior year)"
        - "EBITDA margin"
        - "Capex spend (vs budget)"
        - "Headcount (vs plan)"
        - "Regional revenue breakdown"
        - "Segment revenue breakdown"
        - "Key risks & escalations"

    quarterly_board_report:
      audience: "Board of Directors"
      frequency: "Quarterly"
      kpis_included:
        - "All Tier 1 strategic financial KPIs"
        - "Phase milestone tracking"
        - "Capex investment pace"
        - "Headcount evolution"
        - "Recycling capacity expansion"
        - "Digital transformation progress (ERP, IoT coverage)"
        - "Regional geographic expansion (APAC, AMET)"
        - "Strategic initiative progress (Paboco, recycled materials)"
        - "Risk register updates"
        - "Scenario variance (Conservative/Base/Optimistic)"

    steering_committee_dashboard:
      audience: "Steering Committee (monthly)"
      frequency: "Monthly"
      kpis_included:
        - "Revenue vs forecast"
        - "Capex tracking"
        - "Headcount status"
        - "Major project milestones"
        - "Risk escalations"
        - "Decision gate readiness"

    functional_scorecard:
      audience: "Function leads (CFO, COO, CDO, Chief HR, Chief Sales)"
      frequency: "Monthly"
      kpis_included:
        - "Function-specific operational KPIs"
        - "Initiative progress"
        - "Budget tracking"
        - "Talent metrics"


metadata:
  database_version: "1.0.0"
  created_date: "2026-01-15"
  updated_date: "2026-01-15"
  maintained_by: "Strategic Planning Office"
  kpi_review_frequency: "Quarterly"
  next_kpi_review: "2026-04-15"
  dashboard_update_frequency: "Monthly"
  total_kpis_tracked: 25
  tier_1_count: 3
  tier_2_count: 7
  tier_3_count: 5
  tier_4_count: 3
  tier_5_count: 3
  tier_6_count: 3
