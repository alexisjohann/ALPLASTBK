  # ============================================================================
  # CROSS-PHASE GOVERNANCE & DECISION ARCHITECTURE
  # ============================================================================

  governance_framework:

    steering_committee:
      frequency: "Monthly during active phases"
      composition:
        - "CEO (Chair)"
        - "CFO"
        - "COO"
        - "Regional CEOs (APAC, AMET, Europe)"
        - "Function leads (Digital, HR, Sales)"
      responsibilities:
        - "Capex tracking vs budget"
        - "Milestone achievement monitoring"
        - "Risk escalation"
        - "Decision gate readiness assessment"

    board_oversight:
      frequency: "Quarterly"
      review_scope:
        - "Revenue vs target"
        - "Phase completion status"
        - "Capex investment pace"
        - "Headcount hiring progress"
        - "Risk register updates"
        - "Scenario tracking (vs Conservative/Base/Optimistic)"
      escalation_thresholds:
        - "Revenue variance >5%"
        - "Capex overrun >10%"
        - "Headcount shortfall >5%"
        - "Missed decision gates"

    key_performance_indicators:

      financial_kpis:
        - metric: "Revenue (€M)"
          frequency: "Monthly"
          phase_1_target: "5300"
          phase_2_target: "7000"
          phase_3_target: "9900"

        - metric: "EBITDA Margin (%)"
          frequency: "Monthly"
          phase_1_target: "10.5"
          phase_2_target: "11.2"
          phase_3_target: "12.0"

        - metric: "Capex Spend (€M)"
          frequency: "Monthly"
          phase_1_target: "180"
          phase_2_target: "230"
          phase_3_target: "140"

      operational_kpis:
        - metric: "Headcount"
          frequency: "Monthly"
          target_2026: "27400"
          target_2029: "32500"
          target_2035: "38500"

        - metric: "Recycling Capacity (K tonnes/year)"
          frequency: "Quarterly"
          target_2026: "380"
          target_2029: "500"
          target_2035: "700"

        - metric: "ERP Plant Coverage (%)"
          frequency: "Quarterly"
          target_2026: "1"
          target_2029: "62"
          target_2035: "95"

        - metric: "IoT Plant Coverage (%)"
          frequency: "Quarterly"
          target_2026: "0"
          target_2029: "25"
          target_2035: "80"

      strategic_kpis:
        - metric: "APAC Revenue (€M)"
          frequency: "Quarterly"
          target_2026: "50"
          target_2029: "800"
          target_2035: "1600"

        - metric: "Recycled Materials Revenue (€M)"
          frequency: "Quarterly"
          target_2026: "100"
          target_2029: "400"
          target_2035: "1100"

        - metric: "Paboco Units/Year (M)"
          frequency: "Quarterly"
          target_2026: "100"
          target_2029: "250"
          target_2035: "500"


  # ============================================================================
  # RISK MANAGEMENT & CONTINGENCY
  # ============================================================================

  risk_contingencies:

    critical_risks:
      risk_1:
        name: "Asia-Pac execution delays"
        probability: "Medium"
        impact: "High (€300M+ revenue impact)"
        mitigation:
          - "Regional PMO with external expertise"
          - "Early contractor engagement (build plants in parallel)"
          - "Contingency capex budget (+15%)"
        escalation_trigger: "Timeline delay >6 months"

      risk_2:
        name: "Talent acquisition in APAC"
        probability: "Medium"
        impact: "Medium (hiring delays 6+ months)"
        mitigation:
          - "Aggressive compensation benchmarking (Q75)"
          - "Early recruitment (12+ months before plant go-live)"
          - "Expat leadership pipeline"
        escalation_trigger: "Key executive turnover or hiring <70% vs plan"

      risk_3:
        name: "Competitive response"
        probability: "High"
        impact: "Medium (margin pressure 2-3%)"
        mitigation:
          - "Accelerate Paboco profitability"
          - "Strengthen pharma positioning"
          - "Deepen recycling competitive advantage"
        escalation_trigger: "Major customer loss or price war"

      risk_4:
        name: "Regulatory disruptions"
        probability: "Medium"
        impact: "Low-Medium"
        mitigation:
          - "Proactive regulatory engagement"
          - "Sustainability roadmap flexibility"
        escalation_trigger: "Regulatory change requiring >€30M capex"

    contingency_triggers:
      trigger_1: "If APAC revenue lags >€100M in Year 1 → accelerate Vietnam expansion"
      trigger_2: "If ERP pilot exceeds budget >20% → reassess Phase 2 rollout scope"
      trigger_3: "If Paboco cannot reach profitability by 2028 → strategic review"
      trigger_4: "If capex market conditions improve → accelerate recycling capacity expansion"


