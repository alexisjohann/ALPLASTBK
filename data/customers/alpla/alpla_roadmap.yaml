          - "APAC regional MD onboarded"
          - "Digital transformation office established"
          - "ERP vendor selection finalized (SAP S/4HANA)"
          - "Recycling capacity expansion project approved (€20M)"
          - "Paboco production equipment installed"

        success_criteria:
          - "Thailand plant producing at 70% capacity"
          - "APAC MD hires 3 key executives"
          - "ERP pilot scope locked (3 plants)"
          - "Paboco: 10M units/year production"

