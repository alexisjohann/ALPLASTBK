# Comparison with ALPLA NOAM
alpla_comparison:
  note: |
    ALPLA NOAM turnover rates significantly exceed US averages.
    US average 2022: ~4% monthly = ~48% annual
    ALPLA NOAM 2022: ~5% monthly = ~59% annual (pre-intervention)
    This indicates ALPLA faces industry-specific and regional challenges
    beyond normal US labor market dynamics.
  us_annual_2022: 0.48  # ~48% annualized
  alpla_annual_2022: 0.59  # 59%
  gap_percentage_points: 11
  alpla_vs_benchmark: 1.23  # ALPLA 23% higher than US average

