# -----------------------------------------------------------------------------
# EXECUTIVE SUMMARY
# -----------------------------------------------------------------------------
executive_summary:
  headline: "Reduktion der Fluktuation durch verhaltensökonomisch fundierte Massnahmen"

  ausgangslage:
    baseline_turnover_2022: 0.75  # 75%
    baseline_turnover_2023: 0.59  # 59% - erste leichte Verbesserungen
    annual_exits_baseline: 900
    total_workforce: 1500
    hourly_workers: 1200

  projektziele:
    - "Reduktion von Fluktuationskosten"
    - "Stärkung von Mitarbeiterbindung und Unternehmenskultur"
    - "Aufbau stabiler und effizienter Teams"

  pilot_plants:
    - plant_code: "BET"
      name: "Bethlehem"
      go_live: "2024-10"
    - plant_code: "WEB"
      name: "West Bend"
      go_live: "2024-10"
    - plant_code: "SLC"
      name: "Salt Lake City"
      go_live: "2024-10"

# -----------------------------------------------------------------------------
# CONTEXT & CHALLENGES
# -----------------------------------------------------------------------------
context_challenges:
  overview:
    - "Hoher Onboarding-Aufwand und Einarbeitungskosten"
    - "Kulturelle Spannungen und mangelnde Erwartungsklarheit bei neuen Mitarbeitenden"
    - "Unterschiedliche Voraussetzungen an den Pilotstandorten"

  integration_zugehoerigkeit:
    description: "Neue Mitarbeitende fühlen sich anfangs oft orientierungslos und isoliert"
    issues:
      - "Kulturelle Unterschiede und Sprachbarrieren erschweren Teamkohäsion"
      - "Es fehlt an frühen, persönlichen Beziehungsangeboten durch Führungskräfte"
    implikation: "Ohne emotionalen Anker entsteht kein Zugehörigkeitsgefühl – der 'Startmoment' entscheidet über Verbleib oder Abbruch."
    quote:
      text: "Some people leave after the first week because they don't feel welcome."
      source: "HR workshop participant"

  fuehrung_kommunikation:
    description: "Führung wird oft als kontrollierend statt unterstützend erlebt"
    issues:
      - "Feedbackkultur ist schwach ausgeprägt – wenig Lob, kaum individuelle Wertschätzung"
      - "Supervisors sind überfordert mit der Umsetzung neuer Massnahmen ohne klare Begleitung"
    implikation: "Mitarbeiterbindung braucht sichtbare, glaubwürdige Führung und eine positive Kommunikationskultur."
    quote:
      text: "Supervisors often don't know what to do – how are they supposed to guide others?"
      source: "Plant manager"

  arbeitsrealitaet_erwartungen:
    description: "Hohe physische Belastung, monotone Tätigkeiten, lange Schichten"
    issues:
      - "Erwartungen an den Job werden im Auswahlprozess nicht ausreichend geklärt"
      - "Frühzeitige Desillusionierung führt zu kurzfristiger Kündigung"
    implikation: "Realistische Erwartungssteuerung durch z.B. Storytelling und transparente Interviews ist zentral."
    quote:
      text: "People walk in and are shocked – nobody told them what it's really like."
      source: "Production lead"

  research_basis:
    workshops: 30
    participants: "Mitarbeitende, HR und Führung"
    method: "Stakeholder-Workshops"

# -----------------------------------------------------------------------------
# INTERVENTIONS IMPLEMENTED
# -----------------------------------------------------------------------------
interventions:
  - id: "INT-001"
    name: "Extended Interview"
    name_de: "Erweitertes Interview"
    description: "Erwartungsklarheit durch strukturierte Bewerbungsgespräche und realistische Einblicke"
    target_10c: "AWARE"
    mechanism: "Realistic Job Preview (RJP)"

  - id: "INT-002"
    name: "Nudges"
    name_de: "Personalisierte Nachrichten"
    description: "Personalisierte Nachrichten vor und während des Onboardings"
    target_10c: "AWARE"
    mechanism: "Salience, Commitment"

  - id: "INT-003"
    name: "Welcome Gift"
    name_de: "Willkommensgeschenk"
    description: "Symbolische Willkommensgeschenke zur Wertschätzung"
    target_10c: "WHO"
    mechanism: "Reciprocity, Identity"

  - id: "INT-004"
    name: "Shift Commitment"
    name_de: "Schicht-Commitment"
    description: "Gemeinsame Werte und Verhaltensstandards je Schicht"
    target_10c: "WHO"
    mechanism: "Social Norms, Identity"

  - id: "INT-005"
    name: "Supervisor Bonus"
    name_de: "Vorgesetzten-Bonus"
    description: "Anreize für Vorgesetzte bei niedriger Fluktuation"
    target_10c: "WHAT"
    mechanism: "Financial Incentive"

# -----------------------------------------------------------------------------
# RESULTS
# -----------------------------------------------------------------------------
results:
  summary_quote: "The observed trend reflects progress in building more stable and engaged teams."

  kpi_wirkung:
    headline: "Rückgang der Fluktuation"
    description: "Alle drei Pilotwerke zeigten einen deutlichen Rückgang der Turnover-Raten nach dem Go-live im Herbst 2024"
    example: "Bethlehem: Stabil niedrige Turnover-Raten seit Oktober 2024 – nach vorherigem Hoch im Mai"

    cost_savings:
      annual_exits_before: 900
      annual_exits_after: 450
      reduction_percent: 50
      cost_per_exit_usd: 5000
      annual_savings_usd: 2250000
      calculation: "Reduktion der jährlichen Kündigungen von 900 auf 450 = 2,25 Mio. USD Kosteneinsparung/Jahr"

  kulturelle_wirkung:
    headline: "Stärkere Bindung & Teamintegration"
    achievements:
      - "Neue Mitarbeitende fühlen sich früher eingebunden und unterstützt"
      - "Verbesserte Feedback- und Willkommenskultur durch Nudges, Supervisor-Engagement und Welcome-Geschenke"
      - "Teamkohäsion wurde durch Shift Commitment und symbolische Rituale gestärkt"
    quote: "The program is seen as helpful in creating a more welcoming environment for new employees."

  organisationale_wirkung:
    headline: "Führung & Routinen gestärkt"
    achievements:
      - "Führungskräfte als Retention-Hebel: Bonusprogramm motiviert zur aktiven Begleitung"
      - "Regelmässige Check-ins, strukturierte Interviews und lokale Adaptionen fördern einheitliche, skalierbare Praxis"
      - "Retention als Führungsaufgabe sichtbar gemacht (KPI-Verankerung, Meetingstrukturen, Feedbackkultur)"
    quote: "Structured onboarding, leadership engagement, and cultural reinforcement proved critical for retention success."

# -----------------------------------------------------------------------------
# KEY LEARNINGS
# -----------------------------------------------------------------------------
key_learnings:
  zentrale_erkenntnisse:
    - insight: "Retention ist multifaktoriell"
      detail: "Lohnniveau, Struktur, Kultur & Verhalten müssen zusammenspielen"

    - insight: "Grösster Hebel: Strukturiertes Onboarding"
      detail: "Der grösste Hebel liegt im strukturierten Onboarding und in der frühen Mitarbeiterbindung"

    - insight: "Führungskräfte als Schlüsselakteure"
      detail: "Ihre Haltung, Kommunikation und Präsenz wirken direkt auf das Bleibeverhalten"

# -----------------------------------------------------------------------------
# RECOMMENDATIONS
# -----------------------------------------------------------------------------
recommendations:
  naechste_phase:
    - priority: 1
      action: "Strukturiertes Onboarding institutionalisieren"
      detail: "Inkl. Interview, Nudges, Feedbackprozesse"

    - priority: 2
      action: "Massnahmen regional ausrollen"
      detail: "Angepasst an die jeweiligen Bedingungen"

    - priority: 3
      action: "Retention als Teil der strategischen Personal- und Unternehmensplanung verankern"
      detail: "KPI-Integration, Management-Commitment"

# -----------------------------------------------------------------------------
# BARRIERS & RESISTANCE
# -----------------------------------------------------------------------------
barriers_resistance:
  summary: "Das Retention-Programm muss mit klaren Rollen, geschulten Führungskräften, lokaler Anpassung und strukturierter Verankerung in KPIs und Routinen skaliert werden – begleitet von klarer Kommunikation und Zeitfenstern zur Umsetzung."

  identified_barriers:
    - id: "BAR-001"
      category: "Verantwortlichkeiten"
      issue: "Unklare Verantwortlichkeiten"
      quote: "Einige Supervisor wussten gar nicht, dass das Programm gestartet war."
      mitigation: "Rollen und Zuständigkeiten müssen klar definiert sein."

    - id: "BAR-002"
      category: "Ressourcen"
      issue: "Zeitmangel im Alltag"
      quote: "Wir haben kaum Kapazitäten für tägliche Check-ins."
      mitigation: "Retention-Massnahmen benötigen Zeitfenster im operativen Tagesgeschäft."

    - id: "BAR-003"
      category: "Kultur"
      issue: "Kulturelle Skepsis"
      quote: "Das funktioniert bei uns nicht – unsere Leute ticken anders."
      mitigation: "Lokale Kontexte müssen berücksichtigt werden, sonst droht Ablehnung."

    - id: "BAR-004"
      category: "Kompetenz"
      issue: "Fehlendes Training für Führung"
      quote: "Ich würde gerne mehr unterstützen, aber mir fehlt das richtige Werkzeug."
      mitigation: "Supervisors brauchen Schulung für Nudging, Interviews & Kommunikation."

    - id: "BAR-005"
      category: "Struktur"
      issue: "Fehlende Verankerung in Strukturen"
      quote: "Wenn das Bonusprogramm nicht läuft, machen es viele halt nicht."
      mitigation: "Ohne KPI-Einbindung und Management-Commitment verliert das Programm an Zugkraft."

