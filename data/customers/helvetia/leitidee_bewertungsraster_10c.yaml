# =============================================================================
# 10C BEWERTUNGSRASTER: Kommunikative Leitidee Helvetia Baloise
# =============================================================================
# Zweck: Live-Evaluation der 3 Agenturkonzepte in Session mit Marketingteam
# Methode: BEATRIX / EBF 10C Framework
# Version: 1.0
# Datum: 2026-02-10
# =============================================================================

metadata:
  title: "10C Bewertungsraster - Kommunikative Leitidee"
  client: "Helvetia Baloise Holding AG"
  contact: "Benjamin Clerc, Leiter CRM-Marketing"
  use_case: "Evaluation 3 Agentur-Pitches für neue Leitidee"
  framework: "EBF 10C + Ψ-Kontextanalyse"
  created: "2026-02-10"

# =============================================================================
# ANLEITUNG FÜR DIE LIVE-SESSION
# =============================================================================
#
# PRO AGENTURKONZEPT:
# 1. Konzept vorstellen lassen (5 min)
# 2. Jede 10C-Dimension bewerten (Skala 0-10)
# 3. Segment-Fit prüfen (4 Segmente)
# 4. Spannungsfelder-Check (5 Spannungsfelder)
# 5. Gesamtscore berechnen
#
# SCORING:
# 0-3: Schwach / Nicht adressiert
# 4-6: Teilweise / Ausbaufähig
# 7-8: Gut / Überzeugend
# 9-10: Exzellent / Best Practice
#
# =============================================================================

# =============================================================================
# DIMENSION 1: WHO — Zielgruppenabdeckung
# =============================================================================
dimension_WHO:
  weight: 0.15
  question: "Wen spricht das Konzept an — und wen nicht?"

  kriterien:
    K1_segment_coverage:
      label: "Segmentabdeckung"
      frage: "Funktioniert die Leitidee für ALLE 4 Segmente?"
      segments:
        - name: "Privatkund:innen Traditionell (45%)"
          was_zaehlt: "Vertrauen, Kontinuität, persönliche Beziehung"
        - name: "KMU-Unternehmer:innen (25%)"
          was_zaehlt: "Stärke, Zuverlässigkeit, Einfachheit"
        - name: "Digital-Affine Jüngere (20%)"
          was_zaehlt: "Modern, relevant, preiswert"
        - name: "Ex-Baloise-Kund:innen (10%)"
          was_zaehlt: "Wertschätzung, Identität bewahrt, nicht vergessen"

    K2_mitarbeitende:
      label: "Interne Wirkung"
      frage: "Können sich die 22'000 Mitarbeitenden mit der Leitidee identifizieren?"
      beachte: "2'600 Stellen werden abgebaut. Zynismus-Risiko bei zu positiver Botschaft."

    K3_exclusion_check:
      label: "Ausschluss-Prüfung"
      frage: "Schliesst das Konzept unbeabsichtigt eine Gruppe aus?"
      risiken:
        - "Zu Helvetia-zentriert → Baloise-Kunden fühlen sich fremd"
        - "Zu schweizerisch → internationale Märkte nicht bedient"
        - "Zu corporate → KMU und Private fühlen sich nicht gemeint"

  evaluation_template:
    konzept_a: { score: null, kommentar: "" }
    konzept_b: { score: null, kommentar: "" }
    konzept_c: { score: null, kommentar: "" }

# =============================================================================
# DIMENSION 2: WHAT — Utility-Aktivierung
# =============================================================================
dimension_WHAT:
  weight: 0.20
  question: "Welche Werte und Bedürfnisse aktiviert die Leitidee?"

  kriterien:
    K1_trust:
      label: "Vertrauen (U_S)"
      frage: "Vermittelt das Konzept Sicherheit und Zuverlässigkeit?"
      benchmark: "Versicherung IST Vertrauen. Score < 7 = disqualifizierend."
      parameter: "τ_trust = 0.85 (sehr hoch bei Versicherungskunden)"

    K2_identity:
      label: "Identität (U_X)"
      frage: "Passt die Leitidee zur Selbstwahrnehmung der Kunden?"
      beachte: |
        Identity Economics (Akerlof/Kranton 2000):
        Wenn Markenkategorie nicht zur Selbstwahrnehmung passt → U_IDN sinkt.
        Kunden fragen: «Bin ich ein Helvetia-Mensch?»

    K3_emotion:
      label: "Emotion (U_E)"
      frage: "Erzeugt das Konzept positive Gefühle?"
      beachte: "Nicht zu rational (Versicherung = auch emotionales Produkt)"

    K4_financial_strength:
      label: "Solidität (U_F)"
      frage: "Signalisiert das Konzept finanzielle Stärke?"
      beachte: "CHF 20 Mrd. Volumen, SST 290% — Stärke ist da, muss kommuniziert werden"

    K5_simplicity:
      label: "Einfachheit"
      frage: "Ist die Kernbotschaft in einem Satz verständlich?"
      benchmark: "'einfach. klar. helvetia.' war vorher der Standard"

  evaluation_template:
    konzept_a: { score: null, kommentar: "" }
    konzept_b: { score: null, kommentar: "" }
    konzept_c: { score: null, kommentar: "" }

# =============================================================================
# DIMENSION 3: HOW — Komplementarität der Konzeptelemente
# =============================================================================
dimension_HOW:
  weight: 0.15
  question: "Verstärken sich die Elemente gegenseitig oder widersprechen sie sich?"

  kriterien:
    K1_coherence:
      label: "Kohärenz Wort + Bild"
      frage: "Passt die Wortmarke (Helvetia) zur Bildmarke (Basilisk) zur Farbwelt (Baloise)?"
      gamma_erwartung: "γ > 0 (positiv) = verstärkend"
      risiko: "γ < 0 (negativ) = widersprüchlich → Verwirrung"

    K2_claim_visual:
      label: "Claim × Visueller Auftritt"
      frage: "Unterstützt der Claim das visuelle Erlebnis?"
      beispiel_positiv: "Mobiliar: 'Die persönlichste' + Orange + Illustrationen = kohärent"
      beispiel_negativ: "'Innovation' + konservatives Design = inkohärent"

    K3_internal_external:
      label: "Interne vs. externe Botschaft"
      frage: "Funktioniert die Leitidee nach innen UND nach aussen?"
      risiko: |
        Crowding-Out: Wenn die externe Botschaft «Stärke» ist,
        aber intern 2'600 Stellen abgebaut werden → Glaubwürdigkeitsverlust.
        γ(extern, intern) muss positiv sein!

    K4_channel_consistency:
      label: "Kanalübergreifende Konsistenz"
      frage: "Funktioniert das Konzept auf TV, Digital, Print, Agentur?"

  evaluation_template:
    konzept_a: { score: null, kommentar: "" }
    konzept_b: { score: null, kommentar: "" }
    konzept_c: { score: null, kommentar: "" }

# =============================================================================
# DIMENSION 4: WHEN — Zeitliche Passung
# =============================================================================
dimension_WHEN:
  weight: 0.15
  question: "Passt die Leitidee zum JETZIGEN Zeitpunkt UND zur Zukunft?"

  kriterien:
    K1_now:
      label: "Passung JETZT (2026)"
      frage: "Funktioniert die Leitidee in der aktuellen Post-Fusions-Phase?"
      kontext:
        - "Stellenabbau läuft (2'000-2'600 Stellen)"
        - "Medien fokussieren auf Jobs (SRF, NZZ, Blick)"
        - "Markenverwirrung (Helvetia? Baloise? Beides?)"

    K2_future:
      label: "Passung ZUKUNFT (2030+)"
      frage: "Funktioniert die Leitidee wenn die Integration abgeschlossen ist?"
      beachte: "Leitidee = 10+ Jahre. Nicht für die Übergangsphase designen."

    K3_adaptability:
      label: "Adaptierbarkeit"
      frage: "Kann die Leitidee an veränderte Umstände angepasst werden?"
      szenarien:
        - "Konjunktureinbruch → funktioniert sie bei Sparsamkeit?"
        - "Nächste Übernahme → bleibt sie gültig?"
        - "Digitale Disruption → ist sie technologie-agnostisch?"

  evaluation_template:
    konzept_a: { score: null, kommentar: "" }
    konzept_b: { score: null, kommentar: "" }
    konzept_c: { score: null, kommentar: "" }

# =============================================================================
# DIMENSION 5: WHERE — Kanalwirkung
# =============================================================================
dimension_WHERE:
  weight: 0.05
  question: "Auf welchen Kanälen und in welchen Ländern funktioniert es?"

  kriterien:
    K1_multichannel:
      label: "Omnichannel-Tauglichkeit"
      frage: "TV, Digital, Social Media, Print, Agentur-Gespräch?"

    K2_international:
      label: "Internationale Adaptierbarkeit"
      frage: "Funktioniert es in CH, DE, AT, IT, ES, FR, BE, LU?"
      beachte: "8 Länder, 4 Sprachen. Swissness-Claim limitiert international."

  evaluation_template:
    konzept_a: { score: null, kommentar: "" }
    konzept_b: { score: null, kommentar: "" }
    konzept_c: { score: null, kommentar: "" }

# =============================================================================
# DIMENSION 6: AWARE — Wahrnehmung & Salienz
# =============================================================================
dimension_AWARE:
  weight: 0.15
  question: "Wird die Botschaft wahrgenommen, verstanden und erinnert?"

  kriterien:
    K1_salience:
      label: "Salienz"
      frage: "Fällt die Leitidee auf im Versicherungs-Einerlei?"
      benchmark: |
        Mobiliar = Orange/Illustrationen (hoch salient)
        Swiss Life = sachlich/seriös (mittel salient)
        Zurich = blau/corporate (niedrig differenziert)

    K2_memorability:
      label: "Erinnerbarkeit"
      frage: "Kann ein Kunde den Claim nach 1× Hören wiedergeben?"
      test: "5-Sekunden-Test: Ist die Kernbotschaft in 5 Sekunden klar?"

    K3_distinctiveness:
      label: "Differenzierung"
      frage: "Unterscheidet es sich KLAR von AXA, Zurich, Mobiliar, Swiss Life?"
      wettbewerber_claims:
        - "Mobiliar: 'Die persönlichste Versicherung der Schweiz'"
        - "AXA: 'Know You Can'"
        - "Swiss Life: 'Finanzpartner für selbstbestimmtes Leben'"
        - "Zurich: 'For Those Who Truly Love'"
      frage_2: "Besetzt die Leitidee ein EIGENES Territorium?"

  evaluation_template:
    konzept_a: { score: null, kommentar: "" }
    konzept_b: { score: null, kommentar: "" }
    konzept_c: { score: null, kommentar: "" }

# =============================================================================
# DIMENSION 7: READY — Handlungsbereitschaft
# =============================================================================
dimension_READY:
  weight: 0.10
  question: "Löst die Leitidee eine Handlung aus?"

  kriterien:
    K1_retention:
      label: "Bleibe-Motivation"
      frage: "Motiviert die Leitidee bestehende Kunden zum BLEIBEN?"
      prioritaet: "HOCH — Post-Fusion ist Churn-Risiko am grössten"

    K2_acquisition:
      label: "Wechsel-Motivation"
      frage: "Motiviert sie potenzielle Neukunden zum WECHSELN?"
      beachte: "Sekundär in der aktuellen Phase. Retention > Akquisition."

    K3_recommendation:
      label: "Empfehlungsbereitschaft"
      frage: "Würde ein Kunde die Leitidee weitererzählen?"
      test: "Ist sie 'erzählbar' im Gespräch mit Freunden?"

  evaluation_template:
    konzept_a: { score: null, kommentar: "" }
    konzept_b: { score: null, kommentar: "" }
    konzept_c: { score: null, kommentar: "" }

# =============================================================================
# DIMENSION 8: STAGE — Customer Journey Wirkung
# =============================================================================
dimension_STAGE:
  weight: 0.05
  question: "In welcher Phase der Customer Journey wirkt die Leitidee?"

  kriterien:
    K1_awareness_phase:
      label: "Awareness"
      frage: "Erzeugt sie Aufmerksamkeit bei Menschen die noch nicht Kunde sind?"

    K2_consideration_phase:
      label: "Consideration"
      frage: "Hilft sie bei der Entscheidung zwischen Versicherern?"

    K3_loyalty_phase:
      label: "Loyalty"
      frage: "Stärkt sie die Bindung bestehender Kunden?"
      prioritaet: "HÖCHSTE Priorität in Post-Fusions-Phase"

  evaluation_template:
    konzept_a: { score: null, kommentar: "" }
    konzept_b: { score: null, kommentar: "" }
    konzept_c: { score: null, kommentar: "" }

# =============================================================================
# SPANNUNGSFELD-CHECK (Helvetia-spezifisch)
# =============================================================================
spannungsfeld_check:
  description: |
    Jedes Agenturkonzept wird gegen die 5 identifizierten Spannungsfelder
    geprüft. Ein gutes Konzept LÖST das Spannungsfeld, ein schlechtes
    verschärft es.

  felder:
    SF1_kontinuitaet_vs_aufbruch:
      label: "Kontinuität vs. Aufbruch"
      score_meaning:
        low: "Konzept verschärft die Spannung (entweder nur alt ODER nur neu)"
        mid: "Konzept adressiert eine Seite, ignoriert die andere"
        high: "Konzept integriert beides überzeugend"
      evaluation_template:
        konzept_a: { score: null, wie_geloest: "" }
        konzept_b: { score: null, wie_geloest: "" }
        konzept_c: { score: null, wie_geloest: "" }

    SF2_helvetia_vs_baloise:
      label: "Helvetia vs. Baloise Identität"
      score_meaning:
        low: "Eine Identität dominiert, die andere wird ignoriert"
        mid: "Baloise wird erwähnt, aber nicht integriert"
        high: "Beide Identitäten werden wertschätzend vereint"
      evaluation_template:
        konzept_a: { score: null, wie_geloest: "" }
        konzept_b: { score: null, wie_geloest: "" }
        konzept_c: { score: null, wie_geloest: "" }

    SF3_groesse_vs_naehe:
      label: "Grösse vs. Nähe"
      score_meaning:
        low: "Klingt nach Grosskonzern ODER verniedlicht die Grösse"
        mid: "Erwähnt beides, löst aber nicht auf"
        high: "'Grösse ERMÖGLICHT Nähe' — überzeugender Brückenschlag"
      evaluation_template:
        konzept_a: { score: null, wie_geloest: "" }
        konzept_b: { score: null, wie_geloest: "" }
        konzept_c: { score: null, wie_geloest: "" }

    SF4_effizienz_vs_empathie:
      label: "Effizienz vs. Empathie"
      score_meaning:
        low: "Ignoriert den Stellenabbau oder wirkt zynisch"
        mid: "Vermeidet das Thema geschickt"
        high: "Rahmt Veränderung empathisch und glaubwürdig"
      evaluation_template:
        konzept_a: { score: null, wie_geloest: "" }
        konzept_b: { score: null, wie_geloest: "" }
        konzept_c: { score: null, wie_geloest: "" }

    SF5_schweiz_vs_international:
      label: "Schweiz vs. International"
      score_meaning:
        low: "Zu schweizerisch (8 Märkte!) oder zu generisch (kein Heimvorteil)"
        mid: "Swissness als Qualitätsmerkmal, nicht als Beschränkung"
        high: "Universell mit Schweizer DNA — 'Swiss quality, global reach'"
      evaluation_template:
        konzept_a: { score: null, wie_geloest: "" }
        konzept_b: { score: null, wie_geloest: "" }
        konzept_c: { score: null, wie_geloest: "" }

# =============================================================================
# SEGMENT-FIT MATRIX
# =============================================================================
segment_fit:
  description: |
    Für jedes Konzept: Wie gut passt es zu den 4 Kundensegmenten?
    Score 0-10 pro Segment.

  matrix:
    konzept_a:
      seg01_privat_traditionell: { score: null, kommentar: "" }
      seg02_kmu: { score: null, kommentar: "" }
      seg03_digital_jung: { score: null, kommentar: "" }
      seg04_ex_baloise: { score: null, kommentar: "" }
    konzept_b:
      seg01_privat_traditionell: { score: null, kommentar: "" }
      seg02_kmu: { score: null, kommentar: "" }
      seg03_digital_jung: { score: null, kommentar: "" }
      seg04_ex_baloise: { score: null, kommentar: "" }
    konzept_c:
      seg01_privat_traditionell: { score: null, kommentar: "" }
      seg02_kmu: { score: null, kommentar: "" }
      seg03_digital_jung: { score: null, kommentar: "" }
      seg04_ex_baloise: { score: null, kommentar: "" }

# =============================================================================
# GESAMTSCORE-BERECHNUNG
# =============================================================================
scoring:
  formel: |
    Gesamtscore = Σ (dimension_weight × dimension_score)
               + 0.15 × Spannungsfeld-Durchschnitt
               + 0.10 × Segment-Fit-Minimum

  erklärung: |
    Der Gesamtscore gewichtet die 10C-Dimensionen, PLUS einen Bonus
    für Spannungsfeld-Auflösung und einen Malus wenn ein Segment
    schlecht bedient wird (Minimum-Score zählt, nicht Durchschnitt).

    Warum Minimum? Weil ein Konzept das für 3 Segmente perfekt ist
    aber das 4. verliert, trotzdem ein Problem hat (Churn-Risiko).

  dimension_weights:
    WHO: 0.15
    WHAT: 0.20
    HOW: 0.15
    WHEN: 0.15
    WHERE: 0.05
    AWARE: 0.15
    READY: 0.10
    STAGE: 0.05
    # Total: 1.00

  interpretation:
    excellent: "≥ 8.0 — Klare Empfehlung, Feintuning genügt"
    good: "6.5–7.9 — Gute Basis, gezielte Überarbeitung nötig"
    adequate: "5.0–6.4 — Grundidee vorhanden, substanzielle Arbeit nötig"
    weak: "< 5.0 — Konzept adressiert die Anforderungen nicht ausreichend"

  gesamtscores:
    konzept_a: { total: null, empfehlung: "" }
    konzept_b: { total: null, empfehlung: "" }
    konzept_c: { total: null, empfehlung: "" }

# =============================================================================
# BEATRIX MEHRWERT vs. KLASSISCHE MARKTFORSCHUNG
# =============================================================================
beatrix_mehrwert:
  was_marktforschung_misst:
    - "Gefällt mir / Gefällt mir nicht (stated preference)"
    - "Recall und Recognition"
    - "Demografische Unterschiede"
    - "A/B Preferenz (welches besser?)"

  was_beatrix_zusaetzlich_liefert:
    - "WARUM es wirkt (welche Verhaltensmechanismen)"
    - "Segment-spezifische Verhaltensprognose (nicht nur Demografie)"
    - "Komplementarität: Verstärken sich die Elemente? (γ-Matrix)"
    - "Spannungsfeld-Analyse: Löst das Konzept die zentralen Dilemmata?"
    - "Risiko-Identifikation: Wo ist Churn-Gefahr, Backfire-Risiko?"
    - "Winner's Curse Schutz: Kalibrierte Effekt-Schätzungen (CAS-912)"
    - "Zeitliche Robustheit: Funktioniert es auch in 5 Jahren?"

  positioning: |
    BEATRIX ersetzt die Marktforschung NICHT.
    BEATRIX ergänzt sie um eine Ebene, die klassische Methoden
    nicht abdecken können: die verhaltensökonomische Tiefenanalyse.

    Zusammen: Marktforschung (WAS gefällt) + BEATRIX (WARUM es wirkt)
    = deutlich fundiertere Entscheidungsgrundlage.
