# =============================================================================
# Ψ-DIMENSIONEN (8 Faktoren)
# =============================================================================

psi_dimensions:

  psi_I_institutional:
    value: 0.85
    label: "Institutionell"
    description: |
      Stark regulierte Branche (FINMA). Post-Fusionsphase mit laufenden
      Konsultationsverfahren (Stellenabbau ab Jan 2026). SST-Quote ~290%
      (sehr solide). Versicherungsaufsicht in 8 Ländern.
    key_factors:
      - "FINMA-Regulierung + Solvenz (SST ~290%)"
      - "Konsultationsverfahren Stellenabbau (Jan 2026)"
      - "AM Best Rating bestätigt (stabil nach Fusion)"
    ebf_kappa: "kappa_INST"

  psi_S_social:
    value: 0.80
    label: "Sozial"
    description: |
      «Jeder 3. Haushalt in der Schweiz» = massive soziale Durchdringung.
      Vertrauen ist Kernwert der Marke. Aber: Stellenabbau (2'600 Stellen)
      erzeugt interne und öffentliche Spannungen. Mitarbeitende als
      wichtigste Markenbotschafter sind verunsichert.
    key_factors:
      - "Jeder 3. CH-Haushalt ist Kunde"
      - "Stellenabbau → Verunsicherung bei Mitarbeitenden"
      - "Zwei Unternehmenskulturen (St. Gallen vs. Basel)"
      - "Agenturnetz als lokale Vertrauensanker"
    ebf_kappa: "kappa_SOCIAL"

  psi_C_cognitive:
    value: 0.70
    label: "Kognitiv"
    description: |
      Versicherungsprodukte sind komplex (Leben, Nicht-Leben, BVG, 3a/3b).
      KMU-Kunden: bis zu 8 kombinierte Produkte. Fusionskommunikation
      erfordert Vereinfachung komplexer Sachverhalte. Markenverwirrung
      möglich (Helvetia? Baloise? Basilisk?).
    key_factors:
      - "Produktkomplexität (Allbranchen-Portfolio)"
      - "Markenverwirrung post-Fusion (welches Logo? welcher Name?)"
      - "Informationsüberflutung zu Fusion in Medien"
    ebf_kappa: "kappa_COG"

  psi_K_cultural:
    value: 0.75
    label: "Kulturell"
    description: |
      Swissness als Kernwert («Ihre Schweizer Versicherung»). Aber:
      Baloise hat Basler Identität (Basilisk). Fusion zweier starker
      Regionalidentitäten. Schweizer Werte: Vertrauen, Qualität,
      Stabilität, Langfristigkeit. ESG-Rating A (MSCI).
    key_factors:
      - "Swissness als Markenversprechen"
      - "Regionalidentität: St. Gallen (Helvetia) vs. Basel (Baloise)"
      - "Nachhaltigkeit: klimaneutral seit 2018, Net Zero 2040"
      - "Top Employer Europe (3× in Folge)"
    ebf_kappa: "kappa_CULT"

  psi_E_economic:
    value: 0.70
    label: "Ökonomisch"
    description: |
      Finanziell sehr stark (CHF 20 Mrd. kombiniert, SST ~290%).
      Synergieziel CHF 350 Mio./Jahr (2/3 Personalkosten). Höhere
      Prämien angedeutet (Jara, BILANZ). Pro-forma H1/2025:
      CHF 517 Mio. Halbjahresgewinn.
    key_factors:
      - "CHF 20 Mrd. Geschäftsvolumen (Nr. 1 Allbranchen CH)"
      - "CHF 350 Mio. Synergieziel (Kostendruck)"
      - "Höhere Prämien angekündigt → Kundensensitivität"
    ebf_kappa: "kappa_ECON"

  psi_T_temporal:
    value: 0.90
    label: "Temporal"
    description: |
      KRITISCHER ZEITPUNKT: Fusion gerade vollzogen (12/2025),
      Rebranding angekündigt (05.02.2026), Stellenabbau läuft (2026-2028),
      Capital Markets Day im April 2026. Die kommunikative Leitidee
      muss JETZT stimmen - sie prägt die nächsten 10+ Jahre.
    key_factors:
      - "Fusion vollzogen 05.12.2025"
      - "Neuer Markenauftritt angekündigt 05.02.2026"
      - "Stellenabbau-Konsultation läuft (Jan 2026)"
      - "Capital Markets Day 15.04.2026"
      - "Rollout neue Marke: 2026 CH+DE, dann weitere Märkte"
    ebf_kappa: "kappa_TEMP"

  psi_M_material:
    value: 0.65
    label: "Materiell"
    description: |
      Hybrides Vertriebsmodell (Agentur + Digital). Zwei IT-Landschaften
      müssen konsolidiert werden. Cloud-First Strategie (AWS).
      Ecosystem HOME (MoneyPark, Movu). App für Schadensmeldung.
    key_factors:
      - "Hybridmodell: Agenturnetz + Digital"
      - "IT-Integration zweier Systeme (grösste Herausforderung)"
      - "Ecosystem HOME: MoneyPark, Movu, SmartHome"
      - "CHF 55 Mio. InsurTech-Investitionen"
    ebf_kappa: "kappa_MAT"

  psi_F_physical:
    value: 0.60
    label: "Physisch"
    description: |
      Zwei Hauptstandorte (St. Gallen + Basel) = physische Manifestation
      der Dualität. Breites Agenturnetz in CH. Internationale Präsenz
      in 8 Ländern. Kundenkontakt zunehmend digital, aber Berater:innen
      bleiben Kern des Modells.
    key_factors:
      - "Dual-Hauptsitz: St. Gallen + Basel"
      - "Agenturnetz schweizweit"
      - "Berater:innen nicht vom Stellenabbau betroffen"
    ebf_kappa: "kappa_PHYS"

# =============================================================================
# KUNDENSEGMENTE (~4 Segmente, je ~4 Faktoren)
# =============================================================================

customer_segments:

  - id: "SEG-01"
    name: "Privatkund:innen Traditionell"
    description: |
      Bestandskunden mit langjähriger Beziehung. Oft über lokale
      Berater:in versichert. Hohe Loyalität, aber empfindlich auf
      Veränderung. Sorge: «Wird mein Berater bleiben?»
    share: 0.45

    behavioral_parameters:
      lambda_loss_aversion: 2.50       # Hoch: Angst vor Verschlechterung
      beta_present_bias: 0.85          # Moderat: langfristig orientiert
      kappa_default_sensitivity: 0.80  # Hoch: bleiben wenn nichts passiert
      sigma_social_proof: 0.55         # Moderat: Empfehlung durch Berater

    intervention_affinity:
      high: ["Persönliche Beratung", "Vertrauens-Signale", "Kontinuität"]
      medium: ["Loyalty-Programme", "Kombi-Rabatte"]
      low: ["Rein digitale Kanäle", "Gamification"]

    leitidee_relevanz: |
      KRITISCH: Dieses Segment hat Angst vor Veränderung. Die Leitidee
      muss Kontinuität und Vertrauen kommunizieren, nicht Innovation.
      Loss Frame dominiert: «Was verliere ich?» statt «Was gewinne ich?»

  - id: "SEG-02"
    name: "KMU-Unternehmer:innen"
    description: |
      Kernklientel. Kombinierte Geschäftsversicherung (bis 8 Produkte).
      Pragmatisch, preissensitiv aber qualitätsbewusst. Sorge:
      «Bleiben meine Konditionen?» «Wird der Service schlechter?»
    share: 0.25

    behavioral_parameters:
      lambda_loss_aversion: 2.20       # Hoch aber rational
      beta_present_bias: 0.80          # Unternehmer denken langfristig
      kappa_default_sensitivity: 0.70  # Wechseln eher als Privatkunden
      sigma_social_proof: 0.65         # Branchennetzwerke wichtig

    intervention_affinity:
      high: ["Kombi-Rabatte", "Prämienbefreiung", "Branchenlösungen"]
      medium: ["Digital Self-Service", "Netzwerk-Events"]
      low: ["Emotionale Kampagnen", "Lifestyle-Marketing"]

    leitidee_relevanz: |
      Die Leitidee muss KMU-Relevanz signalisieren: Stärke, Zuverlässigkeit,
      Einfachheit. Fusion = grösserer Partner = besser? Oder = anonymer?
      Framing entscheidend: «Mehr Kraft für Ihr KMU» vs. «Wir werden grösser»

  - id: "SEG-03"
    name: "Digital-Affine Jüngere"
    description: |
      Unter 40, digital first, vergleichen auf Comparis/Moneyland.
      Geringste Markenbindung. Preissensitiv. Nutzen App.
      Für sie ist Fusion = irrelevant, solange Preis/Service stimmt.
    share: 0.20

    behavioral_parameters:
      lambda_loss_aversion: 1.80       # Niedriger: weniger investiert
      beta_present_bias: 0.75          # Stärker: kurzfristiger orientiert
      kappa_default_sensitivity: 0.50  # Wechselbereit
      sigma_social_proof: 0.70         # Online-Bewertungen, Influencer

    intervention_affinity:
      high: ["Digital Nudges", "App-Features", "Preistransparenz"]
      medium: ["Social Media", "Ecosystem-Angebote (MoneyPark)"]
      low: ["Traditionelle Werbung", "Agenturgespräche"]

    leitidee_relevanz: |
      Für dieses Segment muss die Leitidee digital und relevant sein.
      «Swissness» allein reicht nicht. Was zählt: Einfachheit, Preis,
      Ecosystem (Wohnen, Vorsorge, Mobilität als Bundle).

  - id: "SEG-04"
    name: "Ehemalige Baloise-Kund:innen"
    description: |
      SPEZIAL-SEGMENT: Kund:innen die als «Baloise» versichert waren
      und nun unter «Helvetia» firmieren. Identitätsverlust möglich.
      Basler Regionalstolz. «Mein Basilisk verschwindet nicht wirklich?»
    share: 0.10  # ~10% des kombinierten Bestands aus Baloise CH

    behavioral_parameters:
      lambda_loss_aversion: 2.80       # SEHR HOCH: Identitätsverlust
      beta_present_bias: 0.85          # Langfristig, aber emotional
      kappa_default_sensitivity: 0.75  # Bleiben, aber unzufrieden
      sigma_social_proof: 0.60         # Basler Identität, lokale Medien

    intervention_affinity:
      high: ["Basilisk-Bildmarke als Brücke", "Persönliche Ansprache"]
      medium: ["Lokale Events Basel", "Heritage-Kommunikation"]
      low: ["Rein Helvetia-zentrierte Botschaften"]

    leitidee_relevanz: |
      HÖCHSTES RISIKO: Dieses Segment verliert «seine» Marke. Die Leitidee
      MUSS das Baloise-Erbe sichtbar integrieren (Basilisk!). Sonst
      Churn-Risiko. Identity Economics (Akerlof/Kranton): Wenn die
      Markenkategorie nicht mehr passt, sinkt U_IDN → Wechsel.

# =============================================================================
# AGGREGIERTE VERHALTENSPARAMETER
# =============================================================================

behavioral_parameters_aggregate:

  core_parameters:
    loss_aversion:
      symbol: "λ"
      value: 2.40
      range: [1.80, 2.80]
      source: "Segment-gewichteter Durchschnitt"
      note: |
        Überdurchschnittlich hoch wegen Post-Fusions-Unsicherheit.
        Versicherungskunden sind per Definition risiko-/verlustavers.
        Fusion erhöht λ um geschätzte 0.2-0.3 Punkte.

    present_bias:
      symbol: "β"
      value: 0.82
      range: [0.75, 0.90]
      source: "Segment-gewichteter Durchschnitt"
      note: "Versicherungskunden tendentiell langfristig orientiert"

    default_sensitivity:
      symbol: "κ_default"
      value: 0.72
      range: [0.50, 0.85]
      source: "Segment-gewichteter Durchschnitt"
      note: |
        Hoch: Versicherungswechsel hat hohe Trägheit.
        Post-Fusion verstärkt: «Mal abwarten was passiert»

    social_proof:
      symbol: "σ_social"
      value: 0.60
      range: [0.50, 0.70]
      source: "Segment-gewichteter Durchschnitt"
      note: "Berater:innen als primärer Social Proof Kanal"

  # Zusätzliche Parameter spezifisch für Leitidee-Evaluation
  leitidee_parameters:
    trust_sensitivity:
      symbol: "τ_trust"
      value: 0.85
      range: [0.75, 0.95]
      description: "Wie stark reagieren Kunden auf Vertrauenssignale"
      note: "Versicherung = Vertrauensprodukt par excellence"

    identity_attachment:
      symbol: "ι_identity"
      value: 0.70
      range: [0.40, 0.90]
      description: "Wie stark ist die emotionale Bindung an die Marke"
      note: "Heterogen: Baloise-Kunden (0.90) vs. Digital-Affine (0.40)"

    change_fatigue:
      symbol: "φ_fatigue"
      value: 0.65
      range: [0.50, 0.80]
      description: "Müdigkeit gegenüber Veränderungskommunikation"
      note: "Fusion + Stellenabbau + Rebranding = hohe Veränderungslast"

# =============================================================================
# KOMMUNIKATIVE LEITIDEE: KONTEXT-SPEZIFISCHE ANALYSE
# =============================================================================

leitidee_context:

  ausgangslage: |
    Helvetia erarbeitet eine neue kommunikative Leitidee. Drei Agenturen
    wurden zum Pitch eingeladen. Die Ergebnisse werden anschliessend via
    Marktforschung geprüft. BEATRIX soll parallel eine verhaltens-
    ökonomische Bewertung liefern.

  timing_kritisch: |
    - Fusion vollzogen: 05.12.2025
    - Neuer Markenauftritt angekündigt: 05.02.2026
    - Capital Markets Day: 15.04.2026
    - Stellenabbau-Konsultation: läuft seit Jan 2026
    → Die Leitidee muss in diesem Spannungsfeld funktionieren.

  zentrale_spannungsfelder:
    - name: "Kontinuität vs. Aufbruch"
      description: |
        Bestandskunden wollen Sicherheit und Stabilität.
        Fusion kommuniziert aber Veränderung und Wachstum.
        Leitidee muss beides bedienen.
      tension_score: 0.85  # Sehr hoch

    - name: "Helvetia vs. Baloise Identität"
      description: |
        Helvetia-Name bleibt, Baloise-Bildsprache wird integriert.
        Baloise-Kunden verlieren «ihren» Namen.
        Basilisk als Brückenelement?
      tension_score: 0.80

    - name: "Grösse vs. Nähe"
      description: |
        «Grösster Allbranchenversicherer» klingt nach Konzern.
        Kunden wollen aber «meine Versicherung», nicht «die grösste».
        Typischer Zielkonflikt bei Fusionen.
      tension_score: 0.75

    - name: "Effizienz vs. Empathie"
      description: |
        Synergien = Stellenabbau = Effizienz-Story.
        Kunden und Mitarbeitende brauchen Empathie-Story.
        Öffentliche Debatte (SRF, NZZ, Blick) fokussiert auf Jobs.
      tension_score: 0.70

    - name: "Schweiz vs. International"
      description: |
        «Ihre Schweizer Versicherung» war der alte Claim.
        Neu: 8 Länder, 22'000 MA, international.
        Swissness noch authentisch bei dieser Grösse?
      tension_score: 0.55

  bewertungsdimensionen_10c:
    WHO:
      frage: "Welche Zielgruppen spricht das Konzept primär an?"
      kriterien:
        - "Deckt es alle 4 Segmente ab? (Privat, KMU, Digital, ex-Baloise)"
        - "Differenziert es nach Segment oder ist es universell?"
        - "Fühlen sich Mitarbeitende ebenfalls angesprochen?"
    WHAT:
      frage: "Welche Utility-Dimensionen werden aktiviert?"
      kriterien:
        - "Vertrauen (U_S): Wird Sicherheit und Zuverlässigkeit vermittelt?"
        - "Identität (U_X): Passt das zur Selbstwahrnehmung der Kunden?"
        - "Finanzielle Stärke (U_F): Wird Solidität kommuniziert?"
        - "Emotion (U_E): Erzeugt es positive Gefühle?"
    HOW:
      frage: "Verstärken sich die Konzeptelemente gegenseitig?"
      kriterien:
        - "γ-Matrix: Ergänzen sich Wortmarke, Bildmarke, Farbwelt?"
        - "Inkonsistenzen: Widerspricht die Botschaft dem visuellen Auftritt?"
        - "Crowding-Out: Kannibalisiert ein Element ein anderes?"
    WHEN:
      frage: "Passt das Konzept zum aktuellen Zeitpunkt?"
      kriterien:
        - "Funktioniert es JETZT (Post-Fusion, Stellenabbau)?"
        - "Funktioniert es in 3 Jahren (Integration abgeschlossen)?"
        - "Ist es zeitlos genug für 10+ Jahre?"
    WHERE:
      frage: "Auf welchen Kanälen funktioniert das Konzept?"
      kriterien:
        - "TV/Print, Digital, Social Media, Agentur-Gespräch?"
        - "Ist es kanalübergreifend konsistent?"
        - "Funktioniert es in allen 8 Ländern?"
    AWARE:
      frage: "Wird die Botschaft wahrgenommen und erinnert?"
      kriterien:
        - "Salienz: Hebt es sich vom Versicherungs-Einerlei ab?"
        - "Memorability: Ist der Claim erinnerbar?"
        - "Distinctiveness: Unterscheidet es sich von AXA, Zurich, Mobiliar?"
    READY:
      frage: "Löst es Handlungsbereitschaft aus?"
      kriterien:
        - "Motiviert es zum Bleiben (Retention)?"
        - "Motiviert es zum Wählen (Akquisition)?"
        - "Call-to-Action: Gibt es einen nächsten Schritt?"

# =============================================================================
# STRATEGISCHE IMPLIKATIONEN
# =============================================================================

strategic_implications:

  top_3_opportunities:
    - dimension: "WHAT (Vertrauen)"
      opportunity: |
        Vertrauen ist der stärkste Hebel in der Versicherung.
        Die Leitidee sollte Vertrauens-Signale maximieren.
        Fusion als «mehr Sicherheit durch Stärke» framen.
      intervention_type: "Trust Framing"

    - dimension: "AWARE (Differenzierung)"
      opportunity: |
        Post-Fusion = maximale Medienaufmerksamkeit. Diese Phase
        nutzen um die neue Marke zu verankern. Fenster schliesst
        sich in 6-12 Monaten.
      intervention_type: "Salience Window"

    - dimension: "WHO (Segment-Differenzierung)"
      opportunity: |
        Eine Leitidee, die für alle 4 Segmente funktioniert, aber
        unterschiedlich aktiviert werden kann. Universeller Kern +
        segmentspezifische Aussteuerung.
      intervention_type: "Adaptive Messaging"

  top_3_risks:
    - risk: |
        Identitätsverlust bei Ex-Baloise-Kunden. Wenn der Basilisk
        zu wenig sichtbar bleibt, droht Churn in Basel/NW-Schweiz.
      mitigation: "Basilisk prominent in Bildmarke + regionale Kampagnen"

    - risk: |
        Change Fatigue. Mitarbeitende und Kunden sind übersättigt
        mit Fusions-Kommunikation. Noch eine «grosse Botschaft»
        kann auf Widerstand stossen.
      mitigation: "Einfachheit priorisieren. Weniger ist mehr. Kein Corporate-Speak."

    - risk: |
        Winner's Curse bei Marktforschung (CAS-912). Klassische
        Tests können Effekte massiv überschätzen (55% → 0%).
        BEATRIX als Korrektiv einsetzen.
      mitigation: "BEATRIX-Analyse parallel zur Marktforschung als Second Opinion"

  recommended_next_step: |
    1. BEATRIX-Session mit Benjamin Clerc & Marketingteam durchführen
    2. 10C-Bewertungsraster auf die 3 Agenturkonzepte anwenden
    3. Bei Erfolg: Upgrade auf CVA-STANDARD (400 Faktoren)
    4. Langfrist: Verhaltensmodell für Kundenbindung post-Fusion

