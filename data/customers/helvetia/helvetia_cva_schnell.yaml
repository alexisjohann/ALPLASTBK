  code: "BCM2_MIKRO_HELVETIA"
  layer: "mikro"
  version: "1.0"
  last_updated: "2026-02-10"
  cva_stufe: "SCHNELL"
  total_factors: 32
  description: |
    Schneller Kontextvektor für Helvetia Baloise Holding AG.
    Erstellt im Kontext der Mega-Fusion Helvetia-Baloise (12/2025)
    und der Erarbeitung einer neuen kommunikativen Leitidee (02/2026).

    Zweck: BEATRIX Demo / Evaluation kommunikative Leitidee
    Anlass: Benjamin Clerc (Leiter CRM-Marketing) Use Case

  hierarchy:
    parent: "BCM2_MESO_VERSICHERUNG_CH"
    grandparent: "BCM2_04_KON (MAKRO Schweiz)"

  ebf_mapping:
    primary_10c:
      - "WHO"      # Kund:innen, Mitarbeitende, Agenturen
      - "WHAT"     # Vertrauen, Sicherheit, Identität
      - "WHEN"     # Post-Fusion, Rebranding-Phase
      - "AWARE"    # Markenwahrnehmung, Salienz
    primary_psi:
      - "kappa_INST"      # FINMA, KVG/VVG Regulierung
      - "kappa_SOCIAL"    # Vertrauen, «jeder 3. Haushalt»
      - "kappa_IDENTITY"  # Fusion zweier Markenidentitäten

