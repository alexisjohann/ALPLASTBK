---
# Lindt Co-Packing Strategic Assumptions
# Supply Chain Optimization Parameters
# Model User: Patrick Santa Maria
# Last Updated: 2026-01-24
# Version: 1.0.0

strategic_assumptions:
  industry: "food_manufacturing_copacking"
  template_version: "1.0.0"
  model_focus: "Supply Chain Optimization"

  # ============================================================================
  # FINANCIAL BENCHMARKS
  # ============================================================================
  financial_benchmarks:
    # Revenue Projections
    revenue_2024_eur_m: 320
    revenue_growth_rate_base: 0.06       # 6% CAGR baseline
    revenue_growth_rate_optimized: 0.09  # 9% with utilization improvement

    # Margin Structure
    gross_margin: 0.32                   # 32% (premium co-packing)
    ebitda_margin: 0.12                  # 12% (before optimization)
    ebitda_margin_target: 0.15           # 15% (after optimization)

    # Cost Structure
    raw_material_percent: 0.45           # Chocolate, cocoa, packaging
    labor_percent: 0.18                  # Direct labor
    overhead_percent: 0.12               # Facility, utilities
    depreciation_percent: 0.05           # Equipment
    other_percent: 0.08                  # Admin, sales

    # Capex
    capex_to_revenue: 0.04               # 4% maintenance + improvement
    capex_growth_years: [2026, 2027]     # Investment years

  # ============================================================================
  # SUPPLY CHAIN PARAMETERS (Patrick Santa Maria's Focus)
  # ============================================================================
  supply_chain_parameters:

    # Capacity Metrics
    capacity:
      total_capacity_tonnes: 45000
      current_utilization_percent: 68
      target_utilization_percent: 82
      peak_utilization_percent: 92
      capacity_cost_per_tonne_eur: 2850
      target_cost_per_tonne_eur: 2650

    # Inventory Management
    inventory:
      days_inventory_outstanding: 43
      target_dio: 32
      inventory_value_eur_m: 38
      safety_stock_days: 14
      raw_material_lead_time_days: 21
      finished_goods_buffer_days: 7

    # Lead Times
    lead_times:
      order_to_delivery_days: 21
      target_lead_time_days: 14
      production_cycle_days: 5
      packaging_cycle_days: 2
      quality_release_days: 3
      shipping_average_days: 4

    # Production Efficiency
    production_efficiency:
      changeover_time_hours: 4.5
      target_changeover_hours: 2.5
      oee_current_percent: 72            # Overall Equipment Effectiveness
      oee_target_percent: 85
      waste_rate_percent: 2.3
      target_waste_percent: 1.5
      yield_rate_percent: 97.7

    # Service Levels
    service_levels:
      on_time_delivery_percent: 94.2
      target_otd_percent: 98.0
      order_fulfillment_rate_percent: 97.5
      target_fulfillment_percent: 99.0
      customer_complaint_rate_ppm: 850
      target_complaint_ppm: 400

  # ============================================================================
  # REGIONAL PARAMETERS (Production Facilities)
  # ============================================================================
  regional_parameters:
    switzerland:
      facility: "Kilchberg"
      capacity_tonnes: 12000
      utilization_percent: 72
      cost_per_tonne_eur: 3200          # Higher Swiss costs
      specialization: "Premium, Swiss Made"
      growth_rate: 0.03                  # 3% (mature market)

    germany:
      facility: "Aachen"
      capacity_tonnes: 15000
      utilization_percent: 65
      cost_per_tonne_eur: 2700
      specialization: "Volume production"
      growth_rate: 0.05                  # 5% (EU growth driver)

    france:
      facility: "Oloron-Sainte-Marie"
      capacity_tonnes: 8000
      utilization_percent: 70
      cost_per_tonne_eur: 2800
      specialization: "French market, specialty"
      growth_rate: 0.04

    italy:
      facility: "Induno Olona"
      capacity_tonnes: 6000
      utilization_percent: 62
      cost_per_tonne_eur: 2650
      specialization: "Southern Europe"
      growth_rate: 0.06                  # 6% (growth opportunity)

    usa:
      facility: "Stratham"
      capacity_tonnes: 4000
      utilization_percent: 75
      cost_per_tonne_eur: 2950          # USD/EUR adjusted
      specialization: "North America"
      growth_rate: 0.08                  # 8% (high growth market)

  # ============================================================================
  # OPTIMIZATION LEVERS (Supply Chain Improvement Projects)
  # ============================================================================
  optimization_levers:

    lever_1_capacity_utilization:
      name: "Capacity Utilization Improvement"
      current_value: 0.68
      target_value: 0.82
      improvement_percent: 20.6
      revenue_impact_eur_m: 45
      investment_required_eur_m: 2.5
      payback_months: 8
      timeline_months: 24
      priority: 1
      owner: "Patrick Santa Maria"

    lever_2_lead_time_reduction:
      name: "Lead Time Reduction"
      current_value: 21
      target_value: 14
      improvement_percent: 33.3
      cost_saving_eur_m: 8
      investment_required_eur_m: 1.2
      payback_months: 6
      timeline_months: 18
      priority: 2
      owner: "Patrick Santa Maria"

    lever_3_changeover_efficiency:
      name: "SMED Changeover Optimization"
      current_value: 4.5
      target_value: 2.5
      improvement_percent: 44.4
      capacity_gain_percent: 8
      investment_required_eur_m: 0.8
      payback_months: 4
      timeline_months: 12
      priority: 3
      owner: "Production Manager"

    lever_4_inventory_optimization:
      name: "Inventory & Working Capital"
      current_value: 43                  # DIO
      target_value: 32
      improvement_percent: 25.6
      working_capital_release_eur_m: 12
      investment_required_eur_m: 0.5
      payback_months: 1
      timeline_months: 18
      priority: 4
      owner: "Patrick Santa Maria"

    lever_5_cost_reduction:
      name: "Cost per Tonne Reduction"
      current_value: 2850
      target_value: 2650
      improvement_percent: 7.0
      annual_saving_eur_m: 6.4
      investment_required_eur_m: 3.0
      payback_months: 6
      timeline_months: 30
      priority: 5
      owner: "Patrick Santa Maria"

  # ============================================================================
  # MODEL PARAMETERS (for /apply-models)
  # ============================================================================
  model_parameters:

    # Customer Lifetime Value Model
    clv:
      avg_customer_lifetime_years: 4     # Co-packing contracts
      retention_rate: 0.85               # 85% annual retention
      avg_contract_value_eur_k: 2500     # Per customer per year
      customer_acquisition_cost_eur_k: 150
      discount_rate: 0.08

    # Monte Carlo Simulation Parameters
    monte_carlo:
      simulations: 10000
      revenue_volatility: 0.12           # Higher seasonality
      cost_volatility: 0.08              # Raw material price swings
      demand_volatility: 0.15            # Customer order variability
      seasonal_factor_q4: 1.45           # Christmas peak
      seasonal_factor_q1: 0.65           # Post-holiday low

    # Operational Simulation Parameters
    operational_simulation:
      production_variability: 0.10
      quality_variability: 0.05
      supplier_reliability: 0.95
      equipment_availability: 0.92

    # Valuation Parameters
    valuation:
      wacc: 0.07                         # Lower risk, established business
      terminal_growth_rate: 0.02
      ev_ebitda_multiple: 9.0            # Premium food industry

  # ============================================================================
  # BEHAVIORAL ECONOMICS PARAMETERS (10C Framework Integration)
  # ============================================================================
  behavioral_parameters:

    # WHO: Decision Makers
    who_decision_levels:
      L0_individual: "Production operators (changeover execution)"
      L1_team: "Shift supervisors (daily scheduling)"
      L2_organization: "Patrick Santa Maria (supply chain strategy)"
      L3_system: "Lindt Group (capacity allocation)"

    # WHAT: Utility Dimensions for Supply Chain
    what_utility_dimensions:
      financial: 0.40      # Cost reduction, margin improvement
      efficiency: 0.30     # OEE, utilization, lead time
      quality: 0.15        # Waste reduction, customer satisfaction
      sustainability: 0.10 # Resource efficiency, carbon footprint
      flexibility: 0.05    # Ability to handle demand variability

    # HOW: Complementarity Effects
    how_complementarity:
      capacity_x_efficiency: 0.65        # γ: Utilization improves with OEE
      inventory_x_leadtime: 0.55         # γ: Lower inventory enables faster delivery
      quality_x_cost: -0.20              # γ: Quality investment short-term cost
      changeover_x_flexibility: 0.70     # γ: SMED enables product mix flexibility

    # WHEN: Context Factors
    when_context_psi:
      seasonal_demand: 0.85              # High seasonality (Christmas)
      raw_material_price: 0.60           # Cocoa price volatility
      customer_concentration: 0.45       # Top 5 customers = 60% revenue
      regulatory_pressure: 0.30          # Food safety, sustainability

    # STAGE: Implementation Journey
    stage_bcj_phase:
      current_phase: "ACTION"            # Already implementing changes
      maturity_level: 0.65               # 65% of optimization potential realized
      change_readiness: 0.75             # Organization ready for transformation

  # ============================================================================
  # CONSTRAINTS & RISKS
  # ============================================================================
  constraints:
    capacity_ceiling_tonnes: 45000
    minimum_utilization_percent: 55      # Break-even threshold
    maximum_lead_time_days: 28           # Customer tolerance
    quality_minimum_oee_percent: 65
    labor_availability_factor: 0.90

  risks:
    cocoa_price_volatility:
      probability: 0.35
      impact_margin_reduction_pp: 2.0
      mitigation: "Hedging contracts, supplier diversification"

    customer_concentration:
      probability: 0.20
      impact_revenue_loss_percent: 15
      mitigation: "Customer diversification, long-term contracts"

    equipment_failure:
      probability: 0.15
      impact_downtime_days: 5
      mitigation: "Predictive maintenance, spare parts inventory"

    demand_volatility:
      probability: 0.40
      impact_utilization_swing_pp: 15
      mitigation: "Flexible workforce, demand forecasting"

  # ============================================================================
  # METADATA
  # ============================================================================
  metadata:
    version: "1.0.0"
    created_date: "2026-01-24"
    model_user: "Patrick Santa Maria"
    focus: "Supply Chain Optimization"
    status: "INITIALIZED - Ready for /apply-models"
    next_review_date: "2026-04-24"
