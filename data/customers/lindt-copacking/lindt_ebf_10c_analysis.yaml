---
# Lindt Co-Packing EBF 10C Analysis
# Evidence-Based Framework Workflow
# Model User: Patrick Santa Maria
# Date: 2026-01-26
# Version: 1.0.0

# ============================================================================
# PROBLEM DEFINITION
# ============================================================================
problem:
  statement: |
    Lindt muss entscheiden: Co-Packing intern oder extern?

  context:
    - "Lindt produziert Schokolade"
    - "Co-Packing = Verpackung in Verkaufsprodukte"
    - "Verpackung macht die Differenzierung (nicht die Schokolade)"
    - "Einzigartige Formate: Cornet, Teddy, Gold-Bunny (IP-geschützt)"

  internal_belief: |
    "Lindt-Mitarbeiter setzen Lindt-Standards besser um als Externe"

  belief_status: "UNGEPRÜFT - Nie objektiv gemessen"

# ============================================================================
# 10C ANALYSIS
# ============================================================================
ten_c_analysis:

  # --------------------------------------------------------------------------
  # WHO: Wer entscheidet? Wer ist betroffen?
  # --------------------------------------------------------------------------
  who:
    dimension: "WHO"
    appendix: "AAA"
    question: "Wer sind die relevanten Akteure?"

    decision_makers:
      L3_system:
        actor: "Lindt Group Board"
        role: "Finale Entscheidung"
        weight: 0.40

      L2_organization:
        primary:
          actor: "Patrick Santa Maria"
          role: "Supply Chain Optimisation - Empfehlung & Analyse"
          weight: 0.35
          is_model_user: true
        secondary:
          actor: "Operations Director"
          role: "Produktionsleitung"
          weight: 0.10

    affected_parties:
      L1_team:
        actor: "Produktionsteams"
        concern: "Verantwortung, Prozesse"
        weight: 0.10

      L0_individual:
        actor: "Verpackungsmitarbeiter"
        concern: "Jobsicherheit"
        weight: 0.05

  # --------------------------------------------------------------------------
  # WHAT: Was ist wichtig? (Utility-Dimensionen)
  # --------------------------------------------------------------------------
  what:
    dimension: "WHAT"
    appendix: "C"
    question: "Welche Faktoren zählen bei der Entscheidung?"

    stated_priorities:  # Was Lindt SAGT
      quality: 0.50
      cost: 0.30
      knowhow: 0.15
      other: 0.05

    actual_priorities:  # Was WIRKLICH zählt (EBF Hypothese)
      identity_P:
        weight: 0.35
        description: "Identität, Stolz, 'Wir sind Lindt'"
        note: "UNTERSCHÄTZT von Lindt selbst"
      quality_E:
        weight: 0.30
        description: "Qualität, Standards"
      financial_F:
        weight: 0.20
        description: "Kosten, Effizienz"
      knowhow_D:
        weight: 0.10
        description: "Know-how Schutz"
      reputation_S:
        weight: 0.05
        description: "Marke, Kundenwahrnehmung"

    key_insight: |
      Identität (P) ist der versteckte Hauptfaktor.
      "Wir sind Chocolatiers, nicht Outsourcer" treibt die Entscheidung.

  # --------------------------------------------------------------------------
  # HOW: Wie interagieren die Dimensionen?
  # --------------------------------------------------------------------------
  how:
    dimension: "HOW"
    appendix: "B"
    question: "Verstärken oder schwächen sich die Faktoren?"

    complementarities:
      quality_x_identity:
        gamma: 0.70
        type: "STRONG POSITIVE"
        mechanism: |
          "Wir machen es besser" = "Wir SIND Lindt"
          Qualitäts-Belief ist mit Identität VERSCHMOLZEN
        implication: |
          Extern vergeben bedroht nicht nur Qualität,
          sondern das SELBSTBILD der Organisation

      cost_x_quality:
        gamma: -0.25
        type: "TRADE-OFF"
        mechanism: "Billiger ≠ besser (in Wahrnehmung)"

      identity_x_reputation:
        gamma: 0.55
        type: "POSITIVE"
        mechanism: "Stolz auf interne Qualität stärkt Marke"

    critical_coupling:
      description: |
        γ(Qualität, Identität) = +0.70 ist der Schlüssel!

        Die Frage "Intern oder Extern?" ist KEINE rationale Kostenfrage.
        Es ist eine IDENTITÄTSFRAGE.
        Widerstand gegen Extern ist EMOTIONAL, nicht nur rational.

  # --------------------------------------------------------------------------
  # WHEN: Kontext-Faktoren (Ψ)
  # --------------------------------------------------------------------------
  when:
    dimension: "WHEN"
    appendix: "V"
    question: "Welche externen Faktoren beeinflussen die Situation?"

    context_factors:
      seasonality:
        psi: 0.85
        description: "Q4 = 2.8x Normalvolumen"
        implication: "Braucht Flexibilität für Peaks"

      capacity_utilization:
        psi: 0.78
        description: "Nahe am Limit"
        implication: "Druck für externe Kapazität"

      competition:
        psi: 0.65
        description: "Ferrero, Nestlé, Mondelez"
        implication: "Qualität ist kritisch"

      brand_premium:
        psi: 0.90
        description: "Lindt = Premium-Positionierung"
        implication: "Standards nicht verhandelbar"

      organizational_identity:
        psi: 0.85
        description: "Starke 'Wir sind Chocolatiers' Kultur"
        implication: "Identitätsbedrohung bei Outsourcing"

  # --------------------------------------------------------------------------
  # WHERE: Woher die Zahlen?
  # --------------------------------------------------------------------------
  where:
    dimension: "WHERE"
    appendix: "BBB"
    question: "Haben wir Daten oder nur Beliefs?"

    data_availability:
      cost_internal:
        available: true
        source: "Controlling"
        confidence: 0.90

      cost_external:
        available: "partial"
        source: "Angebote von Co-Packern"
        confidence: 0.70

      quality_internal:
        available: true
        source: "QA-Daten"
        confidence: 0.85

      quality_external:
        available: false
        source: "NUR BELIEF!"
        confidence: 0.00

      quality_comparison:
        available: false
        source: "NIE GEMESSEN!"
        confidence: 0.00

    critical_finding: |
      Der Belief "Intern ist besser" wurde NIE VALIDIERT!
      Es gibt keinen objektiven Vergleich Intern vs. Extern.
      Die Entscheidung basiert auf ANNAHMEN, nicht auf DATEN.

  # --------------------------------------------------------------------------
  # AWARE: Bewusstsein über Biases
  # --------------------------------------------------------------------------
  aware:
    dimension: "AWARE"
    appendix: "AU"
    question: "Wie bewusst sind die Akteure über ihre Biases?"

    biases_present:
      overconfidence:
        description: "Wir sind besser als Externe"
        awareness: false
        strength: 0.80

      status_quo:
        description: "Wir machen das seit 50 Jahren so"
        awareness: false
        strength: 0.70

      identity_threat:
        description: "Extern = Bedrohung für 'Wir sind Lindt'"
        awareness: false
        strength: 0.85

      confirmation_bias:
        description: "Sucht Beweise für 'Intern ist besser'"
        awareness: false
        strength: 0.75

    overall_awareness_level: 0.25
    interpretation: "NIEDRIG - Biases sind nicht bewusst"

  # --------------------------------------------------------------------------
  # READY: Handlungsbereitschaft
  # --------------------------------------------------------------------------
  ready:
    dimension: "READY"
    appendix: "AV"
    question: "Wie bereit ist Lindt, etwas zu ändern?"

    readiness_by_actor:
      L3_board:
        readiness: 0.50
        reason: "Offen für Effizienz, aber Marke schützen"

      L2_patrick:
        readiness: 0.60
        reason: "Will optimieren, braucht Daten"

      L2_operations:
        readiness: 0.30
        reason: "Will Kontrolle behalten"

      L1_teams:
        readiness: 0.20
        reason: "Sorge um Jobsicherheit"

    overall_readiness: 0.40
    interpretation: "MITTEL-NIEDRIG - Widerstand erwartet"

  # --------------------------------------------------------------------------
  # STAGE: Wo in der Journey?
  # --------------------------------------------------------------------------
  stage:
    dimension: "STAGE"
    appendix: "AW"
    question: "In welcher Entscheidungsphase ist Lindt?"

    bcj_phases:
      - phase: "AWARENESS"
        status: "completed"
      - phase: "CONSIDERATION"
        status: "completed"
      - phase: "EVALUATION"
        status: "current"  # ← LINDT IST HIER
      - phase: "ACTION"
        status: "pending"
      - phase: "MAINTENANCE"
        status: "pending"

    current_phase: "EVALUATION"
    needs: "DATEN zum Entscheiden"
    blocker: "Fehlender objektiver Vergleich Intern vs. Extern"

# ============================================================================
# SYNTHESIS: EBF DIAGNOSE
# ============================================================================
synthesis:

  situation:
    belief: "Intern ist VIEL besser als Extern"
    reality: "Nie gemessen, Belief basiert auf Identität"
    coupling: "Qualität ↔ Identität (γ = +0.70)"

  mechanism:
    step_1: "'Wir sind Lindt' (Identität)"
    step_2: "'Lindt = beste Qualität' (Markenversprechen)"
    step_3: "'Wir machen es besser' (Belief, ungeprüft)"
    step_4: "'Extern = Qualitätsverlust' (Angst)"
    step_5: "'Extern = Wir sind nicht mehr Lindt' (Identitätsbedrohung)"

  problem:
    - "Der Belief wurde NIE GETESTET"
    - "Die Entscheidung basiert auf Identität, nicht auf Daten"
    - "Awareness über diesen Mechanismus: NIEDRIG"

  llmmc_estimation:
    quality_internal: 0.892
    quality_external_trained: 0.868
    actual_gap_percent: 2.7
    believed_gap_percent: 15.0
    overconfidence_factor: 5.5  # Lindt überschätzt 5.5x

# ============================================================================
# RECOMMENDATIONS
# ============================================================================
recommendations:

  principle_1:
    title: "NICHT den Belief frontal angreifen"
    reason: "Identitätsbedrohung führt zu Widerstand"

  principle_2:
    title: "REFRAMING der Frage"
    old_framing: "Sollen wir outsourcen?"
    new_framing: "Wie exportieren wir Lindt-Standards zu Partnern?"
    effect: "Identität wird gestärkt, nicht bedroht"

  principle_3:
    title: "PILOT als 'Qualitäts-Mission'"
    narrative:
      - "Wir BRINGEN Lindt-Qualität zu einem Partner"
      - "Wir BEWEISEN, dass nur Lindt-Training funktioniert"
      - "Wir ERWEITERN den Lindt-Standard"
    effect: "Identität GESTÄRKT, nicht bedroht"

  principle_4:
    title: "MESSEN vor Entscheiden"
    actions:
      - "Pilot mit 5M Einheiten"
      - "Objektiver Qualitätsvergleich"
      - "Dann datenbasiert entscheiden"
    timeline: "6 Monate Training + 6 Monate Messung"

  intervention_design:
    target_dimension: "AWARE"
    target_change: "Awareness über Belief-Realität Gap erhöhen"
    method: "Objektive Daten durch Pilot generieren"
    expected_effect: "Von Belief-basiert zu Daten-basiert"

# ============================================================================
# 10C SUMMARY TABLE
# ============================================================================
summary_table:
  WHO: "L2 Patrick entscheidet, L3 Board genehmigt"
  WHAT: "Identität (35%) > Qualität (30%) > Kosten (20%)"
  HOW: "γ(Qualität, Identität) = +0.70 → stark gekoppelt"
  WHEN: "Saisonalität 0.85, Kapazität 0.78 → Druck vorhanden"
  WHERE: "Keine Vergleichsdaten → Belief ungeprüft"
  AWARE: "Niedrig (0.25) → Biases nicht bewusst"
  READY: "Mittel-Niedrig (0.40) → Widerstand erwartet"
  STAGE: "Evaluation → braucht Daten"

# ============================================================================
# METADATA
# ============================================================================
metadata:
  version: "1.0.0"
  created_date: "2026-01-26"
  framework: "EBF 10C Analysis"
  model_user: "Patrick Santa Maria"
  status: "COMPLETE"
  next_step: "Pilot Project Design"
