---
# Lindt Co-Packing Scenario Definitions
# Supply Chain Optimization Scenarios
# Model User: Patrick Santa Maria
# Last Updated: 2026-01-24
# Version: 1.0.0

scenarios:

  # ============================================================================
  # SCENARIO 1: CONSERVATIVE (Minimal Investment)
  # ============================================================================
  conservative:
    scenario_name: "Conservative - Organic Improvement"
    description: "Minimal investment, focus on quick wins and operational discipline"

    assumptions:
      revenue_cagr: 0.04                 # 4% growth
      utilization_target: 0.72           # 72% (vs 68% current)
      cost_reduction_percent: 3.0        # 3% cost improvement
      capex_eur_m: 1.5                   # Minimal investment
      timeline_years: 3

    expected_outcomes:
      revenue_2028_eur_m: 360
      ebitda_2028_eur_m: 45
      ebitda_margin_2028: 0.125
      cumulative_savings_eur_m: 8
      working_capital_release_eur_m: 4

    key_initiatives:
      - "Basic process standardization"
      - "Shift scheduling optimization"
      - "Inventory policy tightening"

    risks:
      - "Competitors gain market share"
      - "Customer service levels may decline"
      - "Limited capacity for new business"

    probability_of_success: 0.85
    status: "DEFINED - Run /apply-models to calculate"

  # ============================================================================
  # SCENARIO 2: BASE CASE (Balanced Optimization)
  # ============================================================================
  base_case:
    scenario_name: "Base Case - Balanced Optimization"
    description: "Patrick Santa Maria's recommended path: balanced investment with measurable ROI"

    assumptions:
      revenue_cagr: 0.06                 # 6% growth
      utilization_target: 0.78           # 78%
      cost_reduction_percent: 5.5        # 5.5% cost improvement
      capex_eur_m: 5.0                   # Moderate investment
      timeline_years: 3

    expected_outcomes:
      revenue_2028_eur_m: 382
      ebitda_2028_eur_m: 53
      ebitda_margin_2028: 0.139
      cumulative_savings_eur_m: 18
      working_capital_release_eur_m: 8

    key_initiatives:
      - "SMED changeover optimization (4.5h → 3.0h)"
      - "Demand forecasting improvement"
      - "Inventory optimization (DIO 43 → 36)"
      - "OEE improvement program (72% → 78%)"
      - "Lead time reduction (21 → 17 days)"

    risks:
      - "Implementation delays"
      - "Change resistance in operations"
      - "Cocoa price volatility"

    probability_of_success: 0.70
    status: "RECOMMENDED - Patrick's primary scenario"

  # ============================================================================
  # SCENARIO 3: OPTIMISTIC (Full Transformation)
  # ============================================================================
  optimistic:
    scenario_name: "Optimistic - Full Supply Chain Transformation"
    description: "Aggressive investment in digitalization and automation"

    assumptions:
      revenue_cagr: 0.09                 # 9% growth
      utilization_target: 0.82           # 82% target
      cost_reduction_percent: 7.0        # 7% cost improvement
      capex_eur_m: 8.0                   # Significant investment
      timeline_years: 3

    expected_outcomes:
      revenue_2028_eur_m: 415
      ebitda_2028_eur_m: 62
      ebitda_margin_2028: 0.150
      cumulative_savings_eur_m: 32
      working_capital_release_eur_m: 12

    key_initiatives:
      - "Full SMED implementation (4.5h → 2.5h)"
      - "AI-powered demand forecasting"
      - "Inventory optimization (DIO 43 → 32)"
      - "OEE world-class program (72% → 85%)"
      - "Lead time excellence (21 → 14 days)"
      - "Digital twin for production planning"
      - "Automated quality inspection"

    risks:
      - "High execution risk"
      - "Technology integration challenges"
      - "Requires significant change management"
      - "Skilled labor availability"

    probability_of_success: 0.50
    status: "STRETCH TARGET - Requires board approval"

  # ============================================================================
  # SCENARIO 4: STRESS TEST (Adverse Conditions)
  # ============================================================================
  stress_test:
    scenario_name: "Stress Test - Adverse Market Conditions"
    description: "Tests resilience under cocoa price spike + demand decline"

    assumptions:
      revenue_cagr: 0.01                 # 1% growth (near-stagnation)
      utilization_target: 0.65           # Utilization decline
      cocoa_price_increase_percent: 25   # Major price spike
      customer_churn_percent: 10         # Loss of 2 major customers
      capex_eur_m: 2.0                   # Survival mode
      timeline_years: 3

    expected_outcomes:
      revenue_2028_eur_m: 330
      ebitda_2028_eur_m: 30
      ebitda_margin_2028: 0.091
      cash_burn_risk: "LOW"
      break_even_utilization: 0.55

    key_responses:
      - "Cost containment program"
      - "Flexible workforce model"
      - "Customer retention focus"
      - "Supplier renegotiation"

    triggers:
      - "Cocoa price > €4,500/tonne"
      - "Utilization < 60%"
      - "Loss of top-3 customer"

    probability_of_occurrence: 0.15
    status: "CONTINGENCY PLAN"

  # ============================================================================
  # SCENARIO 5: GROWTH ACCELERATION (New Markets)
  # ============================================================================
  growth_acceleration:
    scenario_name: "Growth Acceleration - New Market Entry"
    description: "Expand co-packing into new geographies and segments"

    assumptions:
      revenue_cagr: 0.12                 # 12% growth
      new_facility_investment_eur_m: 15  # New facility in Eastern Europe
      new_segment_penetration: "Plant-based chocolate"
      utilization_target: 0.80
      timeline_years: 4

    expected_outcomes:
      revenue_2028_eur_m: 450
      ebitda_2028_eur_m: 63
      ebitda_margin_2028: 0.140
      new_capacity_tonnes: 10000
      new_customer_count: 8

    key_initiatives:
      - "Eastern Europe facility (Poland or Czech Republic)"
      - "Plant-based chocolate capability"
      - "Premium segment expansion"
      - "US market growth acceleration"
      - "Digital platform for customer ordering"

    risks:
      - "Capital allocation competition within Lindt Group"
      - "New market entry execution"
      - "Cannibalization of existing business"

    probability_of_success: 0.40
    status: "STRATEGIC OPTION - Requires Group strategy alignment"

  # ============================================================================
  # SCENARIO COMPARISON MATRIX
  # ============================================================================
  comparison_matrix:
    metrics:
      - metric: "Revenue 2028 (€M)"
        conservative: 360
        base_case: 382
        optimistic: 415
        stress_test: 330
        growth: 450

      - metric: "EBITDA Margin 2028"
        conservative: "12.5%"
        base_case: "13.9%"
        optimistic: "15.0%"
        stress_test: "9.1%"
        growth: "14.0%"

      - metric: "Utilization Target"
        conservative: "72%"
        base_case: "78%"
        optimistic: "82%"
        stress_test: "65%"
        growth: "80%"

      - metric: "Capex Required (€M)"
        conservative: 1.5
        base_case: 5.0
        optimistic: 8.0
        stress_test: 2.0
        growth: 15.0

      - metric: "Probability of Success"
        conservative: "85%"
        base_case: "70%"
        optimistic: "50%"
        stress_test: "N/A"
        growth: "40%"

  # ============================================================================
  # METADATA
  # ============================================================================
  metadata:
    version: "1.0.0"
    created_date: "2026-01-24"
    model_user: "Patrick Santa Maria"
    recommended_scenario: "base_case"
    status: "DEFINED - Run /apply-models to populate calculations"
    next_steps:
      - "Review scenarios with Patrick Santa Maria"
      - "Run /apply-models lindt-copacking"
      - "Run /sensitivity-analysis lindt-copacking"
      - "Present to management"
