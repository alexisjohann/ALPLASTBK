---
# Lindt Co-Packing Make-or-Buy Analysis
# Strategic Decision: Inhouse vs. External Co-Packing
# Model User: Patrick Santa Maria (Supply Chain Optimisation)
# Last Updated: 2026-01-24
# Database Version: 2.0.0

customer:
  name: "Lindt"
  full_name: "Chocoladefabriken Lindt & Sprüngli AG"
  business_type: "Premium Chocolate Manufacturer"
  description: "Swiss premium chocolate manufacturer analyzing optimal co-packing strategy (inhouse vs. external)"

  # ============================================================================
  # MODEL USER & STRATEGIC QUESTION
  # ============================================================================
  model_context:
    model_user:
      name: "Patrick Santa Maria"
      role: "Head of Supply Chain Optimisation"
      department: "Supply Chain & Operations"

    strategic_question: |
      Welche Co-Packing-Aktivitäten soll Lindt INTERN durchführen
      und welche sollen EXTERN vergeben werden?

    decision_type: "Make-or-Buy Decision"
    analysis_scope: "Co-Packing = Verpackung von Schokolade in Verkaufsprodukte"

    key_questions:
      - "Welche Produkte/Volumina intern verpacken?"
      - "Welche Produkte/Volumina extern vergeben?"
      - "Was sind die Entscheidungskriterien?"
      - "Wie viel Flexibilität brauchen wir?"
      - "Was sind die Kostenunterschiede?"
      - "Wie schützen wir Qualität und Marke?"

  # ============================================================================
  # CORPORATE STRUCTURE
  # ============================================================================
  ownership:
    type: "Publicly traded (SIX Swiss Exchange)"
    headquarters: "Kilchberg, Zurich, Switzerland"
    establishment_year: 1845
    market_cap_chf_b: 22  # ~2025

  # Financial Profile (2024)
  financial_2024:
    total_revenue_chf_m: 5200
    total_revenue_eur_m: 5400
    ebitda_margin_percent: 15.5
    currency: "CHF"

  # ============================================================================
  # CO-PACKING DEFINITION & SCOPE
  # ============================================================================
  copacking_definition:
    description: |
      Co-Packing bei Lindt umfasst die Verpackung von Schokoladenprodukten
      in verkaufsfertige Einheiten - von Einzelverpackung bis zu
      komplexen Geschenksets.

    activities:
      primary_packaging:
        description: "Verpackung von Einzelprodukten (Tafeln, Kugeln, Pralinen)"
        examples:
          - "Tafelverpackung (Goldfolie, Karton)"
          - "Lindor Kugeln in Beutel/Boxen"
          - "Pralinenschachteln"
        complexity: "LOW-MEDIUM"
        automation_potential: "HIGH"

      secondary_packaging:
        description: "Zusammenstellung von Mehrfachpackungen"
        examples:
          - "Multipack-Beutel (5er, 10er Lindor)"
          - "Displaykartons für Retail"
          - "Promotionspacks"
        complexity: "MEDIUM"
        automation_potential: "MEDIUM"

      gift_packaging:
        description: "Geschenkverpackungen und Präsente"
        examples:
          - "Geschenkboxen (Weihnachten, Ostern, Valentinstag)"
          - "Premium Präsentschachteln"
          - "Saisonale Kollektionen"
        complexity: "HIGH"
        automation_potential: "LOW"

      special_packaging:
        description: "Sonderformate und Kundenspezifisches"
        examples:
          - "Corporate Gifts (Logo-Prägung)"
          - "Airline/Hotel-Spezialformate"
          - "Duty-Free Exklusivsets"
          - "Sonderaktionen (z.B. Adventskalender)"
        complexity: "VERY HIGH"
        automation_potential: "VERY LOW"

  # ============================================================================
  # CURRENT STATE: INHOUSE VS. EXTERN
  # ============================================================================
  current_state:
    description: "Aktuelle Aufteilung der Co-Packing Aktivitäten"

    total_copacking_volume_tonnes: 85000
    total_copacking_units_m: 450  # Millionen Verkaufseinheiten

    inhouse:
      volume_percent: 72
      volume_tonnes: 61200
      units_m: 324

      activities:
        - category: "Primary Packaging (Standard)"
          percent_of_inhouse: 55
          lines: 28
          locations: ["Kilchberg CH", "Aachen DE", "Stratham US"]

        - category: "Secondary Packaging (Standard)"
          percent_of_inhouse: 30
          lines: 12
          locations: ["Kilchberg CH", "Aachen DE"]

        - category: "Gift Packaging (Core)"
          percent_of_inhouse: 15
          lines: 6
          locations: ["Kilchberg CH"]

      strengths:
        - "Volle Qualitätskontrolle"
        - "Schutz von Rezepturen und Prozessen"
        - "Schnelle Reaktion auf Änderungen"
        - "Keine Transportkosten zwischen Produktion und Verpackung"

      weaknesses:
        - "Hohe Fixkosten"
        - "Kapazitätsengpässe in Peak-Zeiten"
        - "Begrenzte Flexibilität bei Sonderformaten"

    external:
      volume_percent: 28
      volume_tonnes: 23800
      units_m: 126

      activities:
        - category: "Gift Packaging (Overflow)"
          percent_of_external: 45
          partners: 4
          regions: ["DACH", "France"]

        - category: "Special Packaging"
          percent_of_external: 35
          partners: 6
          regions: ["Europe", "US"]

        - category: "Seasonal Overflow"
          percent_of_external: 20
          partners: 3
          regions: ["DACH"]

      current_partners:
        - name: "Partner A (DACH)"
          specialization: "Gift Sets, Seasonal"
          volume_percent: 35
          quality_rating: 4.2
          relationship_years: 8

        - name: "Partner B (France)"
          specialization: "Premium Packaging"
          volume_percent: 25
          quality_rating: 4.5
          relationship_years: 5

        - name: "Partner C (DACH)"
          specialization: "Volume, Overflow"
          volume_percent: 20
          quality_rating: 3.8
          relationship_years: 12

        - name: "Others"
          specialization: "Various"
          volume_percent: 20
          quality_rating: "varies"

      strengths:
        - "Flexibilität bei Volumenspitzen"
        - "Spezialkompetenzen (z.B. Handverpackung)"
        - "Variable Kosten statt Fixkosten"
        - "Zugang zu Spezialmaschinen"

      weaknesses:
        - "Qualitätsschwankungen"
        - "Transportkosten und -risiken"
        - "Geringere Kontrolle"
        - "IP/Rezeptur-Risiko"
        - "Lead Time länger"

  # ============================================================================
  # COST COMPARISON: INHOUSE VS. EXTERN
  # ============================================================================
  cost_comparison:
    currency: "EUR"

    inhouse_costs:
      fixed_costs_eur_m:
        equipment_depreciation: 8.5
        facility_overhead: 4.2
        management_admin: 2.8
        total_fixed: 15.5

      variable_costs_per_unit:
        labor_eur: 0.12
        packaging_material_eur: 0.45  # Purchased externally
        utilities_eur: 0.03
        quality_control_eur: 0.02
        total_variable_eur: 0.62

      fully_loaded_cost_per_unit_eur: 0.67  # At current volume

    external_costs:
      variable_costs_per_unit:
        copacker_fee_eur: 0.55        # All-in fee (labor + overhead)
        packaging_material_eur: 0.48  # Slightly higher (markup)
        transport_eur: 0.08
        quality_audit_eur: 0.03
        total_variable_eur: 1.14

      no_fixed_costs: true
      note: "Extern ist teurer pro Einheit, aber keine Fixkosten"

    break_even_analysis:
      fixed_costs_eur_m: 15.5
      cost_difference_per_unit_eur: 0.47  # 1.14 - 0.67
      break_even_volume_m_units: 33       # 15.5M / 0.47 = 33M units
      current_inhouse_volume_m: 324
      conclusion: "Inhouse ist deutlich günstiger bei aktuellem Volumen"

    marginal_analysis:
      incremental_inhouse_cost_eur: 0.62  # Variable only
      external_cost_eur: 1.14
      savings_per_unit_if_inhouse_eur: 0.52
      note: "Für zusätzliches Volumen: Inhouse €0.52/Einheit günstiger"

  # ============================================================================
  # DECISION CRITERIA (10C Framework Integration)
  # ============================================================================
  decision_criteria:

    # WHAT: Utility Dimensions
    what_utility_weights:
      cost: 0.30           # Kosteneffizienz
      quality: 0.25        # Qualitätssicherung
      flexibility: 0.20    # Flexibilität bei Volumen/Mix
      speed: 0.10          # Reaktionsgeschwindigkeit
      risk: 0.10           # Risikominimierung (IP, Lieferkette)
      sustainability: 0.05 # Nachhaltigkeitsaspekte

    # HOW: Complementarity Effects
    how_complementarity:
      cost_x_volume:
        gamma: 0.75
        description: "Inhouse wird mit steigendem Volumen relativ günstiger"

      quality_x_complexity:
        gamma: 0.65
        description: "Komplexe Produkte profitieren stärker von Inhouse-Qualität"

      flexibility_x_seasonality:
        gamma: 0.80
        description: "Externe Partner wichtig für saisonale Spitzen"

      speed_x_customization:
        gamma: -0.30
        description: "Customization verlangsamt beide Optionen, aber Inhouse weniger"

    # WHEN: Context Factors (Ψ)
    when_context_factors:
      seasonal_demand:
        psi: 0.85
        peak_q4_factor: 2.8   # Weihnachten = 2.8x Normalvolumen
        implication: "Hohe Saisonalität spricht für externen Puffer"

      product_complexity:
        psi: 0.70
        implication: "Komplexe Geschenksets schwieriger extern zu kontrollieren"

      ip_sensitivity:
        psi: 0.60
        implication: "Neue Produkte/Rezepturen besser intern"

      capacity_utilization:
        psi: 0.72
        current_inhouse_utilization: 0.78
        implication: "Kapazität weitgehend ausgelastet"

    # STAGE: Decision Journey
    stage_current_phase: "EVALUATION"
    stage_maturity: 0.65
    stage_next_milestone: "Recommendation to Board Q2 2026"

  # ============================================================================
  # STRATEGIC OPTIONS
  # ============================================================================
  strategic_options:

    option_1_status_quo:
      name: "Status Quo (72% Inhouse / 28% Extern)"
      description: "Aktuelle Aufteilung beibehalten"
      pros:
        - "Kein Änderungsrisiko"
        - "Bekannte Partner und Prozesse"
      cons:
        - "Kapazitätsengpässe in Q4 bleiben"
        - "Suboptimale Kostenstruktur"
      recommendation: "NICHT EMPFOHLEN"

    option_2_more_inhouse:
      name: "Mehr Inhouse (85% / 15%)"
      description: "Kapazitätserweiterung intern, weniger extern"
      investment_eur_m: 12
      incremental_volume_m_units: 65
      annual_savings_eur_m: 8.5
      payback_years: 1.4
      pros:
        - "Kostenreduktion €8.5M/Jahr"
        - "Bessere Qualitätskontrolle"
        - "Schnellere Reaktion"
      cons:
        - "Hohe Investition"
        - "Weniger Flexibilität bei Abschwung"
        - "Peak-Kapazität muss extern bleiben"
      recommendation: "PRÜFEN"

    option_3_hybrid_optimized:
      name: "Optimierter Hybrid (80% / 20%)"
      description: "Strategische Kriterien für Make-or-Buy"
      investment_eur_m: 6
      approach: |
        INHOUSE (80%):
        - Alles Standard-Primärverpackung
        - Alle Premium-Geschenksets
        - Neue Produkte (erste 12 Monate)
        - Alles mit IP-Sensitivität

        EXTERN (20%):
        - Saisonale Spitzen (>120% Normalkapazität)
        - Spezialformate (Handverpackung)
        - Regionale Sonderaktionen
        - Auslaufprodukte
      annual_savings_eur_m: 5.2
      payback_years: 1.2
      pros:
        - "Optimale Balance Kosten/Flexibilität"
        - "Klare Entscheidungskriterien"
        - "Manageable Investment"
      cons:
        - "Komplexere Steuerung"
        - "Partner-Management nötig"
      recommendation: "EMPFOHLEN"

    option_4_more_external:
      name: "Mehr Extern (60% / 40%)"
      description: "Outsourcing-Strategie"
      investment_eur_m: 0
      annual_cost_increase_eur_m: 12
      pros:
        - "Maximale Flexibilität"
        - "Keine Investition"
        - "Variable Kosten"
      cons:
        - "Deutlich höhere Kosten"
        - "Qualitätsrisiko"
        - "IP-Risiko"
        - "Weniger Kontrolle"
      recommendation: "NICHT EMPFOHLEN"

  # ============================================================================
  # DECISION MATRIX: WAS INTERN VS. EXTERN?
  # ============================================================================
  decision_matrix:
    description: "Kriterien für Make-or-Buy Entscheidung pro Produktkategorie"

    criteria_for_inhouse:
      must_criteria:
        - "IP-sensitiv (neue Rezepturen, Innovationen)"
        - "Premium-Qualitätsanforderung (Flagship-Produkte)"
        - "Hohe Volumenstabilität (Jahresprodukte)"
      should_criteria:
        - "Volumen > 5M Einheiten/Jahr"
        - "Standard-Verpackungsformat"
        - "Direkte Anbindung an Produktion sinnvoll"

    criteria_for_external:
      must_criteria:
        - "Saisonale Spitzen (>120% Normalkapazität)"
        - "Spezialkompetenzen erforderlich (z.B. Handverpackung)"
        - "Regionale Sonderformate (kleine Volumina)"
      should_criteria:
        - "Volumen < 2M Einheiten/Jahr"
        - "Auslaufprodukte (letzte 6 Monate)"
        - "Einmalige Sonderaktionen"

    product_category_allocation:
      - category: "Lindor Kugeln Standard"
        volume_m_units: 180
        recommendation: "INHOUSE"
        reason: "Hochvolumen, Standard, IP-sensitiv"

      - category: "Tafelschokolade Excellence"
        volume_m_units: 95
        recommendation: "INHOUSE"
        reason: "Flagship, Qualität kritisch"

      - category: "Weihnachts-Geschenksets"
        volume_m_units: 45
        recommendation: "HYBRID"
        reason: "Basis intern, Peak extern"
        split: "70% intern / 30% extern"

      - category: "Oster-Produkte"
        volume_m_units: 35
        recommendation: "HYBRID"
        reason: "Basis intern, Spezialformen extern"
        split: "60% intern / 40% extern"

      - category: "Corporate Gifts"
        volume_m_units: 8
        recommendation: "EXTERN"
        reason: "Kleine Volumina, Spezialformate"

      - category: "Duty-Free Exclusives"
        volume_m_units: 12
        recommendation: "INHOUSE"
        reason: "Premium-Qualität, Markenimage"

      - category: "Promotional Packs"
        volume_m_units: 25
        recommendation: "EXTERN"
        reason: "Variable Volumina, kurze Zyklen"

      - category: "Adventskalender"
        volume_m_units: 15
        recommendation: "HYBRID"
        reason: "Komplex, aber hochsaisonal"
        split: "50% intern / 50% extern"

  # ============================================================================
  # STAKEHOLDERS
  # ============================================================================
  stakeholders:
    key_contacts:
      supply_chain_lead:
        name: "Patrick Santa Maria"
        role: "Head of Supply Chain Optimisation"
        responsibility: "Make-or-Buy Analyse und Empfehlung"
        model_user: true

      operations_director:
        name: "TBD"
        role: "Director Operations"
        responsibility: "Inhouse-Kapazität und Investitionen"

      procurement_head:
        name: "TBD"
        role: "Head of Procurement"
        responsibility: "Externe Partner und Verträge"

  # ============================================================================
  # METADATA
  # ============================================================================
  metadata:
    database_version: "2.0.0"
    created_date: "2026-01-24"
    updated_date: "2026-01-24"
    model_user: "Patrick Santa Maria"
    strategic_question: "Co-Packing: Inhouse vs. Extern"
    status: "ANALYSIS READY"
