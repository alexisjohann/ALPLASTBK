---
# Lindt Co-Packing Cross-Functional Dependencies
# Supply Chain Optimization Project
# Model User: Patrick Santa Maria
# Last Updated: 2026-01-24
# Version: 1.0.0

dependencies:
  title: "Supply Chain Optimization - Cross-Functional Dependencies"
  owner: "Patrick Santa Maria"
  status: "TEMPLATE"

  # ============================================================================
  # INTERNAL DEPENDENCIES
  # ============================================================================
  internal:

    production_operations:
      department: "Production / Operations"
      dependency_type: "CRITICAL"
      description: "Production team executes optimization initiatives"
      dependencies:
        - initiative: "SMED Changeover Optimization"
          requirement: "Operator training and time allocation"
          status: "PENDING"
          owner: "Production Manager"

        - initiative: "OEE Improvement"
          requirement: "Maintenance schedule alignment"
          status: "PENDING"
          owner: "Maintenance Lead"

        - initiative: "Waste Reduction"
          requirement: "Quality feedback loops"
          status: "PENDING"
          owner: "Quality Manager"

      risks:
        - "Production priorities may conflict with optimization"
        - "Resource availability during peak season"

    it_digital:
      department: "IT / Digital"
      dependency_type: "HIGH"
      description: "IT enables data visibility and analytics"
      dependencies:
        - initiative: "Real-time Dashboards"
          requirement: "Data integration from MES and ERP"
          status: "PENDING"
          owner: "IT Manager"

        - initiative: "Demand Forecasting"
          requirement: "Historical data access and analytics platform"
          status: "PENDING"
          owner: "IT Manager"

        - initiative: "Customer Portal"
          requirement: "Web development and integration"
          status: "FUTURE"
          owner: "IT Manager"

      risks:
        - "IT resource constraints"
        - "Legacy system integration challenges"

    finance:
      department: "Finance"
      dependency_type: "HIGH"
      description: "Finance approves investments and tracks benefits"
      dependencies:
        - initiative: "Business Case Approval"
          requirement: "Investment approval (€5M for base case)"
          status: "PENDING"
          owner: "CFO"

        - initiative: "Benefit Tracking"
          requirement: "Monthly savings validation"
          status: "PENDING"
          owner: "Finance Controller"

        - initiative: "Working Capital Tracking"
          requirement: "Inventory reduction monitoring"
          status: "PENDING"
          owner: "Treasury"

      risks:
        - "Budget constraints"
        - "Competing investment priorities"

    procurement:
      department: "Procurement"
      dependency_type: "MEDIUM"
      description: "Procurement supports supplier collaboration"
      dependencies:
        - initiative: "Supplier Lead Time Reduction"
          requirement: "Renegotiation with key suppliers"
          status: "PENDING"
          owner: "Procurement Manager"

        - initiative: "VMI Implementation"
          requirement: "Supplier contracts update"
          status: "FUTURE"
          owner: "Procurement Manager"

      risks:
        - "Supplier resistance"
        - "Market conditions"

    hr_training:
      department: "HR / Training"
      dependency_type: "MEDIUM"
      description: "HR supports change management and training"
      dependencies:
        - initiative: "SMED Training"
          requirement: "Operator certification program"
          status: "PENDING"
          owner: "HR Manager"

        - initiative: "Change Management"
          requirement: "Communication and engagement program"
          status: "PENDING"
          owner: "HR Manager"

      risks:
        - "Training capacity"
        - "Employee resistance to change"

    quality:
      department: "Quality Assurance"
      dependency_type: "HIGH"
      description: "Quality ensures no compromise during optimization"
      dependencies:
        - initiative: "Process Changes Validation"
          requirement: "Quality impact assessment"
          status: "PENDING"
          owner: "Quality Manager"

        - initiative: "Waste Reduction"
          requirement: "Root cause analysis support"
          status: "PENDING"
          owner: "Quality Manager"

      risks:
        - "Quality/efficiency trade-off concerns"

  # ============================================================================
  # EXTERNAL DEPENDENCIES
  # ============================================================================
  external:

    key_customers:
      stakeholder: "Major Co-Packing Customers"
      dependency_type: "HIGH"
      description: "Customer collaboration for demand visibility"
      dependencies:
        - initiative: "Demand Forecasting Improvement"
          requirement: "Customer forecast sharing"
          status: "PENDING"
          engagement_lead: "Customer Service Manager"

        - initiative: "Lead Time Reduction"
          requirement: "Customer acceptance of new processes"
          status: "PENDING"
          engagement_lead: "Customer Service Manager"

      risks:
        - "Customer unwillingness to share forecasts"
        - "Contractual constraints"

    key_suppliers:
      stakeholder: "Raw Material Suppliers"
      dependency_type: "MEDIUM"
      description: "Supplier collaboration for inventory optimization"
      dependencies:
        - initiative: "VMI Program"
          requirement: "Supplier system integration"
          status: "FUTURE"
          engagement_lead: "Procurement Manager"

        - initiative: "Lead Time Reduction"
          requirement: "Shorter supplier lead times"
          status: "PENDING"
          engagement_lead: "Procurement Manager"

      risks:
        - "Supplier capability"
        - "Cost implications"

    technology_vendors:
      stakeholder: "Software / Equipment Vendors"
      dependency_type: "MEDIUM"
      description: "Technology partners for digital initiatives"
      dependencies:
        - initiative: "Analytics Platform"
          requirement: "Vendor selection and implementation"
          status: "FUTURE"
          engagement_lead: "IT Manager"

        - initiative: "MES Upgrade"
          requirement: "System enhancement"
          status: "FUTURE"
          engagement_lead: "IT Manager"

      risks:
        - "Vendor delivery"
        - "Integration complexity"

    lindt_group:
      stakeholder: "Lindt Group Corporate"
      dependency_type: "HIGH"
      description: "Group alignment and resource allocation"
      dependencies:
        - initiative: "Investment Approval"
          requirement: "Group capex committee approval"
          status: "PENDING"
          engagement_lead: "Co-Packing Director"

        - initiative: "Capacity Sharing"
          requirement: "Production line allocation decisions"
          status: "ONGOING"
          engagement_lead: "Co-Packing Director"

      risks:
        - "Group priority shifts"
        - "Brand production priority over co-packing"

  # ============================================================================
  # DEPENDENCY MATRIX (RACI)
  # ============================================================================
  raci_matrix:
    initiatives:
      - initiative: "SMED Changeover"
        responsible: "Production Manager"
        accountable: "Patrick Santa Maria"
        consulted: ["Quality", "HR"]
        informed: ["Finance", "IT"]

      - initiative: "Inventory Optimization"
        responsible: "Patrick Santa Maria"
        accountable: "Co-Packing Director"
        consulted: ["Procurement", "Finance", "Customers"]
        informed: ["Production", "IT"]

      - initiative: "OEE Improvement"
        responsible: "Production Manager"
        accountable: "Patrick Santa Maria"
        consulted: ["Maintenance", "Quality"]
        informed: ["HR", "Finance"]

      - initiative: "Digital Dashboards"
        responsible: "IT Manager"
        accountable: "Patrick Santa Maria"
        consulted: ["Production", "Quality"]
        informed: ["Finance", "HR"]

      - initiative: "Demand Forecasting"
        responsible: "Patrick Santa Maria"
        accountable: "Co-Packing Director"
        consulted: ["IT", "Customers"]
        informed: ["Production", "Procurement"]

  # ============================================================================
  # CRITICAL PATH
  # ============================================================================
  critical_path:
    description: "Dependencies that could delay the entire program"
    items:
      - dependency: "Finance approval for €5M investment"
        blocker_for: "All Phase 2 initiatives"
        mitigation: "Early engagement with CFO"
        status: "PENDING"

      - dependency: "IT data integration"
        blocker_for: "Real-time dashboards, analytics"
        mitigation: "Parallel workstream, interim manual solutions"
        status: "PENDING"

      - dependency: "Production resource availability"
        blocker_for: "SMED implementation, OEE improvement"
        mitigation: "Off-peak season scheduling"
        status: "PENDING"

  # ============================================================================
  # METADATA
  # ============================================================================
  metadata:
    version: "1.0.0"
    created_date: "2026-01-24"
    owner: "Patrick Santa Maria"
    status: "TEMPLATE"
    review_frequency: "Monthly"
