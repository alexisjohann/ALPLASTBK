  - factor: "Junge Versichertenstruktur"
    description: "Überdurchschnittlich viele junge, gesunde Versicherte"
    strategic_relevance: "high"

  - factor: "Minimaler Kundenservice"
    description: "Bewusst reduzierter Service zugunsten tiefer Prämien"
    strategic_relevance: "high"

