    strategic_relevance: "high"

  - factor: "Romandie-Verankerung"
    description: "Starke Präsenz in Westschweiz, Hauptsitz Pully"
    strategic_relevance: "high"

  - factor: "Hohe Franchise-Durchdringung"
    description: "Überdurchschnittlicher Anteil 2500er Franchise"
    strategic_relevance: "high"

  - factor: "Santésuisse-Mitglied"
    description: "Mitglied des grossen Kassenverbands santésuisse"
