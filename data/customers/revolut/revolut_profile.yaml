# =============================================================================
# SECTION 9: DELTA ANALYSIS vs. NEON
# =============================================================================

delta_analysis:
  note: "Key differences between Revolut and Neon from Swiss customer perspective"

  advantages_vs_neon:
    - dimension: "FX Rates"
      revolut: "Interbank + 1% (weekends/above limit)"
      neon: "Standard rate + 0.35% surcharge (since May 2025)"
      advantage: "Revolut 0.50-1% cheaper for FX"

    - dimension: "Global Scale"
      revolut: "45M users, 40+ currencies"
      neon: "200k users, focused on CHF/EUR"
      advantage: "Revolut: Economies of scale, network effects"

    - dimension: "Product Breadth"
      revolut: "Banking + Stocks + Crypto + Insurance"
      neon: "Banking only (+ Neon Invest in development)"
      advantage: "Revolut: All-in-one super-app"

    - dimension: "Premium Tiers"
      revolut: "4 tiers (Standard, Plus, Premium, Metal, Ultra)"
      neon: "3 tiers (Free, Green, Metal)"
      advantage: "Revolut: More choice, better perks"

  disadvantages_vs_neon:
    - dimension: "Swiss IBAN"
      revolut: "Shared IBAN (PostFinance) - not personal"
      neon: "Personal Swiss IBAN"
      disadvantage: "Revolut: Cannot reliably receive salary"

    - dimension: "Swiss Payment Features"
      revolut: "No TWINT, no QR-Rechnung, no eBill"
      neon: "Full Swiss features (TWINT, QR, eBill)"
      disadvantage: "Revolut: Friction for daily Swiss payments"

    - dimension: "Deposit Guarantee"
      revolut: "Lithuanian deposit guarantee (€100k)"
      neon: "Swiss deposit guarantee (CHF 100k)"
      disadvantage: "Revolut: Lower trust for risk-averse Swiss"

    - dimension: "Local Presence"
      revolut: "Representation office only (Zurich)"
      neon: "Swiss company, Swiss headquarters"
      disadvantage: "Revolut: Perceived as 'foreign' bank"

    - dimension: "Regulatory Clarity"
      revolut: "No full Swiss license (yet)"
      neon: "Clear partner model with CH bank (Hypi Lenzburg)"
      disadvantage: "Revolut: Regulatory uncertainty"

  use_case_fit:
    revolut_better_for:
      - "Frequent international travelers"
      - "Cross-border workers (EUR salary)"
      - "Expats living in Switzerland"
      - "Crypto & stock investors"
      - "Multi-currency management"
      - "Secondary/travel bank account"

    neon_better_for:
      - "Primary Swiss bank account"
      - "Salary account (employer needs personal IBAN)"
      - "Daily Swiss payments (TWINT, QR-Rechnung)"
      - "Swiss-only users (minimal FX needs)"
      - "Risk-averse customers (prefer CH deposit guarantee)"
      - "Sustainability-focused (Neon Green)"

