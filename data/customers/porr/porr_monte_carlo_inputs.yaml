## SECTION 6: MONTE CARLO SIMULATION PARAMETERS

monte_carlo_config:

  simulation_runs: 10000

  portfolio_weight_constraints:
    digital:
      min: 0.20
      max: 0.40
      rationale: "Core digital strategy; sufficient but not overweight"

    sustainability:
      min: 0.15
      max: 0.35
      rationale: "ESG imperative; capex constraint limits max"

    regional:
      min: 0.15
      max: 0.35
      rationale: "Growth driver; M&A execution risk limits max"

    specialist:
      min: 0.05
      max: 0.25
      rationale: "Niche excellence; capital-light, leverage"

  sampling_distributions:
    context_factors: "NORMAL"
    regional_cagrs: "LOG_NORMAL"
    dimension_scores: "NORMAL"
    gamma_parameters: "NORMAL"

  output_metrics:
    - portfolio_utility
    - expected_revenue_2035
    - expected_ebit_margin
    - probability_scenario_b_superior
    - probability_margin_above_4_percent
    - regional_cagr_sensitivity
    - execution_risk_assessment

