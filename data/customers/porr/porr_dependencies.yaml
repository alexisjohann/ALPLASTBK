---
# PORR Strategic Dependencies Matrix
# Critical path items and interdependencies for 2025-2035
# Last Updated: 2026-01-15
# Database Version: 1.0.0

dependencies:

  critical_path_items:

    item_1_digital_foundation:
      name: "Digital Transformation Foundation"
      priority: "CRITICAL"
      phase: "2025-2026"
      owner: "CTO / Chief Digital Officer"
      deliverables:
        - "BIM platform implementation (Autodesk, Revit enterprise)"
        - "IoT sensor deployment framework (10 pilot projects)"
        - "Data infrastructure (cloud, analytics, reporting)"
        - "Project controls suite (schedule, cost, resource management)"
      dependencies_on:
        - "Organizational readiness (50% of projects)"
        - "Training program launch (500+ users by Q4 2025)"
        - "Vendor partnerships established"
      dependent_downstream:
        - "Digital productivity gains (0.6pp margin improvement)"
        - "Project delivery acceleration (15% cost reduction)"
        - "Phase 2 scaling (200 projects by 2030)"
      risk_level: "HIGH (technology + organizational)"
      budget_eur_m: 80
      timeline_months: 18

    item_2_regional_consolidation:
      name: "Poland/CEE Market Consolidation"
      priority: "CRITICAL"
      phase: "2025-2027"
      owner: "VP Central & Eastern Europe"
      deliverables:
        - "Romania operational hub fully staffed (200+ employees)"
        - "Poland regional center consolidation"
        - "SME acquisition integration (3-5 targets)"
        - "Regional leadership team embedded"
      dependencies_on:
        - "Talent acquisition: 500+ CEE engineers/managers"
        - "Capex deployment: €60M for bases"
        - "Organizational alignment"
      dependent_downstream:
        - "CEE CAGR achievement (5.2-8.0% depending on scenario)"
        - "Headcount addition: 1,500 Phase 1"
        - "International infrastructure projects"
      risk_level: "MEDIUM (labor market, integration)"
      budget_eur_m: 120
      timeline_months: 24

    item_3_infrastructure_pipeline:
      name: "Infrastructure Spending Pipeline Realization"
      priority: "CRITICAL"
      phase: "2025-2035"
      owner: "VP Business Development"
      deliverables:
        - "ÖBB (Austrian Railways): €500M+ contract wins"
        - "Asfinag (Austrian Motorways): €300M+ contract participation"
        - "DB (German Railways): €200M+ contract wins"
        - "Polish motorways (S1, A2 expansion): €400M+ wins"
        - "Czech highways (D2, D3 completion): €200M+ participation"
        - "Alpine corridor projects (Brenner BBT, Lyon-Turin): €800M+ participation"
      dependencies_on:
        - "Government budget appropriations (EU Next Gen)"
        - "Tender calendar execution (2025-2027 peak)"
        - "Project financing closure"
      dependent_downstream:
        - "Revenue forecast achievement (90% correlation)"
        - "Order backlog replenishment (maintain 15+ months)"
        - "Segment mix shift (civil engineering >57%)"
      risk_level: "MEDIUM (external macro environment)"
      budget_eur_m: "N/A (client-funded)"
      timeline_months: 144

    item_4_sustainability_roadmap:
      name: "Carbon-Neutral Construction Deployment"
      priority: "HIGH"
      phase: "2025-2027, 2028-2032"
      owner: "Chief Sustainability Officer"
      deliverables:
        - "Fleet electrification: 50% by 2030 (80 electric/hydrogen units)"
        - "Low-carbon material sourcing: 60% of projects by 2028"
        - "Carbon-neutral pilot projects: 5 major projects by 2027"
        - "Sustainability certification: 100% of projects ISO 14001"
      dependencies_on:
        - "Equipment supplier development (electric excavators, trucks)"
        - "Capex deployment: €180M"
        - "Supply chain partner alignment"
      dependent_downstream:
        - "Regulatory compliance (EU 2026+ requirements)"
        - "Customer ESG differentiation (premium pricing 5-8%)"
        - "Talent attraction (young engineers prioritize ESG)"
      risk_level: "MEDIUM (supply chain, capex intensity)"
      budget_eur_m: 180
      timeline_months: 60

    item_5_margin_expansion_execution:
      name: "Structural Margin Improvement Execution"
      priority: "CRITICAL"
      phase: "2024-2035 (continuous)"
      owner: "CFO / COO"
      deliverables:
        - "Digital productivity: -15% project costs by 2029"
        - "Prefabrication scaling: 45% of residential by 2035"
        - "Supply chain optimization: -8% material costs"
        - "Fixed cost absorption: -0.3pp overhead by 2030"
      dependencies_on:
        - "Digital foundation (Item 1)"
        - "Operational capex discipline"
        - "Project execution excellence"
      dependent_downstream:
        - "EBIT margin: 2.6% → 4.0% by 2035"
        - "EBIT € generation: €158M → €380M"
        - "Stock valuation uplift (20-30% multiple re-rating)"
      risk_level: "HIGH (execution complexity)"
      budget_eur_m: 900 (total capex)
      timeline_months: 144

  interdependency_matrix:

    digital_foundation_enables:
      - "Infrastructure pipeline realization (better tendering, scheduling)"
      - "Margin expansion (productivity gains)"
      - "Sustainability roadmap (monitoring, reporting)"
      - "Regional consolidation (centralized controls)"

    infrastructure_pipeline_depends_on:
      - "Regional capacity (human + equipment)"
      - "Sustainability roadmap (customers demand ESG)"
      - "Margin expansion (competitive bidding)"

    regional_consolidation_enables:
      - "Infrastructure pipeline (local presence for bids)"
      - "Digital foundation scaling (more projects)"
      - "Margin expansion (CEE lower-cost base)"

    sustainability_roadmap_impacts:
      - "Capex budget (€180M allocation)"
      - "Margin (short-term cost, long-term premium)"
      - "Customer preferences (positive differentiation)"

  risk_dependencies:

    labor_market_risk:
      affected_items:
        - "Regional consolidation (need 500+ hires 2025-26)"
        - "Digital transformation (need 150+ IT specialists)"
        - "Decarbonisation (need engineering talent)"
      mitigation:
        - "Above-market compensation (Q75 vs market)"
        - "Structured career development"
        - "Remote work flexibility"
      timeline_criticality: "2025-2026 peak"

    infrastructure_spending_risk:
      affected_items:
        - "Revenue projections (direct correlation 0.90)"
        - "Order backlog replenishment"
        - "CEE expansion momentum"
      mitigation:
        - "Tender calendar management"
        - "Multiple-scenario planning"
        - "Geographic diversification (7 home markets)"
      timeline_criticality: "2025-2027"

    technology_execution_risk:
      affected_items:
        - "Digital foundation (adoption, training, change management)"
        - "Margin expansion (cost savings realization)"
        - "Productivity gains (15-35% target improvement)"
      mitigation:
        - "Phased rollout (pilots first)"
        - "Vendor accountability (SLAs)"
        - "Change management program"
      timeline_criticality: "2025-2030"

    geopolitical_risk:
      affected_items:
        - "CEE operations (Poland, Romania, Slovakia proximity to conflict)"
        - "Supply chain (material sourcing)"
        - "Regional stability (political/regulatory changes)"
      mitigation:
        - "Supply chain diversification"
        - "Political risk insurance"
        - "Local partnerships"
      timeline_criticality: "Ongoing"

  go_no_go_decision_points:

    decision_point_1:
      name: "Digital Foundation Go-Live"
      date: "2026-Q3"
      criteria:
        - "BIM adoption: 50%+ of projects"
        - "IoT pilots: 10+ projects with 80%+ uptime"
        - "Cost/benefit: Payback case validated"
      decision_owners: ["CTO", "CFO", "CEO"]
      go_forward_action: "Accelerate Phase 2 scaling (€70M capex 2027-29)"
      no_go_action: "Reassess technology strategy; consider alternative platforms"

    decision_point_2:
      name: "Infrastructure Pipeline Realization"
      date: "2026-Q4"
      criteria:
        - "Order intake: 95%+ of plan"
        - "Backlog: >15 months coverage"
        - "Regional capacity: Staffing on track"
      decision_owners: ["VP BD", "CFO", "CEO"]
      go_forward_action: "Accelerate capex deployment (€90M 2027)"
      no_go_action: "Slow capex; return excess cash to shareholders"

    decision_point_3:
      name: "CEE Consolidation Progress"
      date: "2027-Q2"
      criteria:
        - "Regional revenue: €450M+ (on plan)"
        - "EBIT margin: 2.8%+ achieved"
        - "Acquisition integration: 3+ targets closed"
      decision_owners: ["VP CEE", "CFO", "CEO"]
      go_forward_action: "Continue aggressive CEE expansion"
      no_go_action: "Consolidate gains; reduce new acquisition target"

    decision_point_4:
      name: "Margin Expansion Realization"
      date: "2028-Q4"
      criteria:
        - "EBIT margin: 3.2%+ (vs 2.6% baseline)"
        - "Digital productivity: -12%+ cost reduction demonstrated"
        - "Prefabrication: 25%+ of units"
      decision_owners: ["CFO", "COO", "CEO"]
      go_forward_action: "Increase capex for Phase 3 acceleration (€150M+ 2029-35)"
      no_go_action: "Maintain steady-state capex; reassess margin targets"

metadata:
  database_version: "1.0.0"
  created_date: "2026-01-15"
  updated_date: "2026-01-15"
  critical_path_review: "Quarterly"
  dependency_mapping: "Annual deep-dive"
