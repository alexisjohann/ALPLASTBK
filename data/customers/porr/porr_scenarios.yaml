  # ============================================================================
  # MONTE CARLO STOCHASTIC ANALYSIS
  # ============================================================================

  monte_carlo_analysis:
    analysis_id: "MCA_PORR_10K"
    simulation_date: "2026-01-15"
    simulations_run: 10000
    confidence_level: 0.95

    methodology:
      description: "Log-normal distribution sampling across regional CAGR uncertainties, capex timing, infrastructure pipeline"
      key_uncertainties_modeled:
        - "Regional CAGR (±1.2pp around base case)"
        - "Infrastructure spending timeline (±3 years)"
        - "Digital adoption pace (±2 years)"
        - "Labor cost escalation (±3% annually)"
        - "Margin realization (±0.4pp)"

    base_case_distribution:
      mean_revenue_2035_eur_m: 9500
      std_dev_eur_m: 920
      percentile_5_eur_m: 8200
      percentile_25_eur_m: 8900
      percentile_50_eur_m: 9500
      percentile_75_eur_m: 10100
      percentile_95_eur_m: 11000
      coefficient_of_variation: 0.097

    probability_analysis:
      prob_exceeds_conservative_8200: 0.978
      prob_exceeds_10b: 0.420
      prob_below_8b: 0.008
      prob_in_base_case_range_9_to_10: 0.35
      prob_in_confident_range_8p5_to_11b: 0.87

    sensitivity_analysis:
      most_sensitive_variables:
        - variable: "Infrastructure spending (Timeline)"
          sensitivity_range: "±€1.5B per ±2 year delay"
          elasticity: "Very High"

        - variable: "Poland/CEE CAGR"
          sensitivity_range: "±€0.7B per ±1% CAGR"
          elasticity: "High"

        - variable: "Digital productivity realization"
          sensitivity_range: "±€0.5B per ±0.3pp margin"
          elasticity: "High"

        - variable: "Austria/Germany CAGR"
          sensitivity_range: "±€0.3B per ±1% CAGR"
          elasticity: "Medium"

    risk_scenarios_from_monte_carlo:
      downside_scenario_10th_percentile: 8450
      expected_case_50th_percentile: 9500
      upside_scenario_90th_percentile: 10650


  # ============================================================================
  # SCENARIO COMPARISON & DECISION MATRIX
  # ============================================================================

  scenario_comparison:
