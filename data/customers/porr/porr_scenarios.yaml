      - criterion: "Revenue 2035 Target"
        conservative: "€8.2B"
        base_case: "€9.5B (Recommended)"
        optimistic: "€11.0B"

      - criterion: "Capex Investment"
        conservative: "€600M (lower capital intensity)"
        base_case: "€900M (€82M/year)"
        optimistic: "€1,250M (+39% higher; includes M&A)"

      - criterion: "Execution Risk"
        conservative: "LOW ✓"
        base_case: "MODERATE ✓✓"
        optimistic: "HIGH ✗✗✗"

      - criterion: "Digital Transformation"
        conservative: "Laggard (35% BIM adoption)"
        base_case: "Industry leader (95% BIM adoption)"
        optimistic: "Market setter (100% + advanced tech)"

      - criterion: "EBIT Margin 2035"
        conservative: "3.4%"
        base_case: "4.0%"
        optimistic: "4.6%"

      - criterion: "Organizational Capability"
        conservative: "MAINTAIN ✓"
        base_case: "EVOLVE ✓✓"
        optimistic: "TRANSFORM ✗"

      - criterion: "Market Share Gain"
        conservative: "-10pp (1.1% → 2.0%)"
        base_case: "+70pp (1.1% → 2.8%)"
        optimistic: "+150pp (1.1% → 3.5%)"

    decision_recommendation:
      primary_recommendation: "BASE_CASE"
      rationale_summary: "Balanced growth with achievable execution, structural margin improvement justified by digital transformation, sustainable competitive advantage"
      board_action: "APPROVED with quarterly tracking against milestones"
      alternative_consideration: "Monitor infrastructure spending pipeline; preserve optionality for Phase 2 capex acceleration if spending accelerates"


