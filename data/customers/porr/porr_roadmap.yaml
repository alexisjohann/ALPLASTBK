---
# PORR Strategic Roadmap 2025-2035
# Phase-by-phase implementation plan with milestones
# Last Updated: 2026-01-15
# Database Version: 1.0.0

strategic_roadmap:

  phase_1_foundation_acceleration:
    period: "2025-2026"
    headline: "Digital Foundation & Regional Positioning"
    duration_months: 24

    financial_targets:
      revenue_target_eur_m: 6500
      revenue_growth_vs_2024_percent: 5
      ebit_margin_target_percent: 2.8
      margin_improvement_pp: 0.2
      capex_deployment_eur_m: 180

    strategic_objectives:
      - objective_id: "OBJ-1.1"
        name: "Digital Foundation Launch"
        description: "BIM platform, IoT pilots, data infrastructure operational"
        key_milestones:
          - "Q1 2025: BIM platform selected and team mobilized"
          - "Q2 2025: IoT pilots on 10 projects started"
          - "Q4 2025: 30% BIM adoption, ROI model validated"
          - "Q2 2026: 50% BIM adoption, cost savings demonstrable"
        success_metrics:
          - "BIM adoption: 35% → 50%"
          - "Project schedule variance: 12% → 10%"
          - "IoT projects: 2 → 10"
        owner: "Chief Technology Officer"
        budget_eur_m: 80

      - objective_id: "OBJ-1.2"
        name: "CEE Regional Positioning"
        description: "Romania hub established, Poland consolidation, talent acquisition"
        key_milestones:
          - "Q1 2025: Romania general manager hired"
          - "Q2 2025: Romania operational base constructed"
          - "Q4 2025: 200+ Romanian employees on-boarded"
          - "Q2 2026: Poland regional consolidation completed"
        success_metrics:
          - "Regional headcount: 1,100 → 1,550"
          - "Romania revenue: €300M → €380M"
          - "Poland revenue: €1,100M → €1,250M"
        owner: "VP Central & Eastern Europe"
        budget_eur_m: 60

      - objective_id: "OBJ-1.3"
        name: "Sustainability Roadmap Kick-off"
        description: "Carbon-neutral pilot projects, fleet electrification begins"
        key_milestones:
          - "Q1 2025: Sustainability strategy approved by Board"
          - "Q2 2025: Electric equipment procurement started"
          - "Q4 2025: First 2 carbon-neutral projects launched"
          - "Q2 2026: 5 carbon-neutral projects in execution"
        success_metrics:
          - "CO2 reduction: 0.45 → 0.40 tonnes per output"
          - "Electric fleet: 0 → 20 units"
          - "Carbon-neutral projects: 0 → 5"
        owner: "Chief Sustainability Officer"
        budget_eur_m: 40

      - objective_id: "OBJ-1.4"
        name: "Order Pipeline Acceleration"
        description: "Infrastructure tender wins, backlog replenishment"
        key_milestones:
          - "Q2 2025: ÖBB railway tender wins €150M+"
          - "Q3 2025: German infrastructure contracts signed"
          - "Q4 2025: Polish motorway projects awarded"
          - "Q2 2026: Backlog 15+ months confirmed"
        success_metrics:
          - "New order intake: €6,846M → €6,950M"
          - "Order backlog: €8,543M → €9,200M"
          - "Backlog coverage: 15.2 months → 15.8 months"
        owner: "VP Business Development"
        budget_eur_m: 0

    organizational_changes:
      - "Chief Digital Officer role created (new hire, external)"
      - "CEE Regional GM hired (external)"
      - "150 digital/BIM specialists hired (internal + external)"
      - "Sustainability office established"

    phase_1_outputs:
      - "Digital Transformation Strategy (Board-approved)"
      - "Romania operational hub fully staffed"
      - "5 carbon-neutral pilot projects in execution"
      - "Order backlog: 15+ months confirmed"


  phase_2_expansion_and_scaling:
    period: "2027-2029"
    headline: "Digital Scaling & Market Consolidation"
    duration_months: 36

    financial_targets:
      revenue_target_eur_m: 7500
      revenue_growth_vs_2024_percent: 21
      ebit_margin_target_percent: 3.5
      margin_improvement_pp: 0.9
      capex_deployment_eur_m: 360

    strategic_objectives:
      - objective_id: "OBJ-2.1"
        name: "Digital Transformation Scaling"
        description: "85% BIM adoption, IoT on 50 projects, AI scheduling live"
        key_milestones:
          - "Q1 2027: BIM adoption 65%, cost reduction -12% demonstrated"
          - "Q3 2027: IoT deployment on 50 projects"
          - "Q1 2028: AI scheduling system live on 30 projects"
          - "Q4 2029: BIM adoption 85%, ROI fully materialized"
        success_metrics:
          - "BIM adoption: 50% → 85%"
          - "Project cost overruns: 18% → 10%"
          - "Digital productivity savings: -15%"
        owner: "Chief Technology Officer"
        budget_eur_m: 100

      - objective_id: "OBJ-2.2"
        name: "CEE Market Consolidation"
        description: "Regional competitors acquired, geographic footprint expanded"
        key_milestones:
          - "Q2 2027: 2 Polish competitors acquired (€200M capex)"
          - "Q4 2027: Integration completed, combined entity profitable"
          - "Q2 2028: Czech Republic market consolidation initiated"
          - "Q1 2029: Regional market share 18% → 22%"
        success_metrics:
          - "Poland revenue: €1,250M → €1,500M"
          - "Czech revenue: €800M → €1,050M"
          - "Romania revenue: €380M → €500M"
          - "Regional headcount: 1,550 → 2,500"
        owner: "VP Central & Eastern Europe"
        budget_eur_m: 200

      - objective_id: "OBJ-2.3"
        name: "Sustainability Scale-up"
        description: "50% CO2 reduction, carbon-neutral standard, prefabrication 25%"
        key_milestones:
          - "Q2 2027: CO2 reduction 50% achieved"
          - "Q4 2027: 50 carbon-neutral projects in execution"
          - "Q2 2028: Prefabrication 25% of residential"
          - "Q1 2029: Sustainability premium realized (5-8% pricing)"
        success_metrics:
          - "CO2 reduction: 0.40 → 0.23 tonnes per output"
          - "Renewable energy: 15% → 40%"
          - "Waste recycling: 35% → 60%"
        owner: "Chief Sustainability Officer"
        budget_eur_m: 120

      - objective_id: "OBJ-2.4"
        name: "Specialized Infrastructure Niche Growth"
        description: "Alpine tunneling, European rail corridors, premium positioning"
        key_milestones:
          - "Q1 2027: Brenner Base Tunnel (BBT) major contract signed"
          - "Q3 2027: Lyon-Turin Alpine project participation confirmed"
          - "Q2 2028: 3-5 European rail corridor projects active"
          - "Q1 2029: International infrastructure revenue €650M+ pipeline"
        success_metrics:
          - "International specialist segment: €545M → €750M"
          - "Project margins: 4.2% → 5.0%"
          - "Specialist team: 200 → 400 experts"
        owner: "VP Infrastructure International"
        budget_eur_m: 80

    organizational_changes:
      - "Regional consolidation: 3-5 acquisitions integrated"
      - "1,700 net new employees across regions"
      - "Advanced Recycling/Prefabrication Centers opened (3 locations)"
      - "International Infrastructure Division strengthened"

    phase_2_outputs:
      - "Digital transformation delivering 15% cost reduction"
      - "CEE market share: 15% → 22%"
      - "Carbon-neutral standard embedded in operations"
      - "Alpine specialization revenue: €650M+ pipeline"


  phase_3_optimization_and_maturation:
    period: "2030-2035"
    headline: "Market Leadership & Maturation"
    duration_months: 72

    financial_targets:
      revenue_target_eur_m: 9500
      revenue_growth_vs_2024_percent: 53
      ebit_margin_target_percent: 4.0
      margin_improvement_pp: 1.4
      capex_deployment_eur_m: 360

    strategic_objectives:
      - objective_id: "OBJ-3.1"
        name: "Digital Leadership Consolidation"
        description: "95% BIM adoption, AI-driven project management standard"
        key_milestones:
          - "Q2 2030: BIM adoption 95% across all projects"
          - "Q4 2030: AI project controls deployed on 80% of projects"
          - "Q2 2032: Drone monitoring & autonomous equipment 20% of fleet"
          - "Q1 2035: Digital-first construction methodology standard"
        success_metrics:
          - "BIM adoption: 95%+"
          - "Project schedule accuracy: ±5%"
          - "Project cost accuracy: ±8%"
          - "Digital productivity gain: -35%"
        owner: "Chief Technology Officer"
        budget_eur_m: 120

      - objective_id: "OBJ-3.2"
        name: "European Market Leadership"
        description: "Consolidated #5-7 European contractor; consolidated #1-2 in home markets"
        key_milestones:
          - "Q1 2030: PORR market share in home markets: 2.3%"
          - "Q2 2032: PORR market share in home markets: 2.6%"
          - "Q1 2035: PORR market share in home markets: 2.8%"
          - "Q4 2035: Top 5-7 European contractor ranking achieved"
        success_metrics:
          - "Home market revenue: €8,500M → €9,200M"
          - "Market share: 2.3% → 2.8%"
          - "Continental market consolidation: 95%+ of output from 7 markets"
        owner: "Chief Executive Officer"
        budget_eur_m: 160

      - objective_id: "OBJ-3.3"
        name: "Carbon Neutral & Green Leader"
        description: "Fully carbon-neutral construction; green premium sustained"
        key_milestones:
          - "Q2 2030: All major projects carbon-neutral"
          - "Q4 2032: Fleet 80% electric/renewable energy powered"
          - "Q2 2035: Carbon-neutral construction the market standard"
          - "Q1 2035: PORR sustainability premium: 5-8% pricing power"
        success_metrics:
          - "CO2 neutral: All major projects"
          - "Renewable energy: 75% of total energy"
          - "Green revenue premium: 5-8%"
        owner: "Chief Sustainability Officer"
        budget_eur_m: 100

      - objective_id: "OBJ-3.4"
        name: "Segment Mix Optimization"
        description: "Civil engineering 59%, International 10%, Building 24%, Residential 7%"
        key_milestones:
          - "Q2 2030: Civil engineering: 58% of revenue"
          - "Q4 2032: Alpine infrastructure: €1.0B+ annual revenue"
          - "Q1 2035: Segment mix optimized for margin (4.0% EBIT)"
        success_metrics:
          - "Civil engineering: 57% → 59%"
          - "International specialist: €545M → €1,040M"
          - "Segment EBIT margin: 2.6% → 4.0%"
        owner: "Chief Operating Officer"
        budget_eur_m: 80

    organizational_changes:
      - "1,800 net new employees (mature growth)"
      - "Organizational structure stabilized (4-5 regions)"
      - "Digital COE (Center of Excellence) established"
      - "Sustainability office upgraded to strategic function"

    phase_3_outputs:
      - "Revenue target: €9.5B achieved"
      - "EBIT margin: 4.0% achieved"
      - "Market leadership position: Top 5-7 European contractor"
      - "Sustainability: Carbon-neutral, green premium embedded"
      - "Digital: Industry pace-setter in BIM, IoT, AI"


  cross_phase_critical_success_factors:

    financial_discipline:
      - "Maintain capex discipline: €82M/year average"
      - "ROIC target: 8%+ by 2030"
      - "Quarterly variance tracking vs plan"

    execution_excellence:
      - "Phase 1 digital foundation on-time, on-budget"
      - "CEE consolidation 0 failed acquisitions"
      - "Sustainability roadmap delivered as planned"

    organizational_capability:
      - "Talent retention: <5% voluntary turnover critical roles"
      - "Leadership continuity: CEO/CFO/COO transitions planned"
      - "Digital skill development: 500+ employees trained by 2026"

    market_environment:
      - "Infrastructure spending materializes as planned"
      - "Regulatory environment supports green construction"
      - "Geopolitical stability in Eastern Europe"


metadata:
