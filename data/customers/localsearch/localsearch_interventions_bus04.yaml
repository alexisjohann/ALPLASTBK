---
# ==============================================================================
# Localsearch BUS-04 Intervention Portfolio
# Behavioral Funnel Optimization for Tradespeople / renovero (14% of TAM)
# ==============================================================================
#
# Model: MOD-LOC-001 (Localsearch SME Digital Adoption Model)
# Segment: BUS-04 (Trades/renovero, N≈35'000, net γ = -0.45)
# Schema: 20-Field Intervention Schema (Chapter 17, Appendix HHH)
#
# BUS-04 SPECIFICS:
#   - Bottleneck: F6_RETENTION (55%) — seasonal churn
#   - Primary barrier: Time cost (τ = 100 CHF/h for trades vs. 80 avg)
#   - Unique asset: renovero platform as existing entry point
#   - net γ = -0.45 → Negative interactions dominate (similar to BUS-02)
#   - Key negative: γ_FT = -0.45 (time erodes financial benefit heavily)
#
# Created: 2026-02-25
# Version: 1.0.0
# ==============================================================================

metadata:
  portfolio_id: "PF-LOC-BUS04-001"
  model_id: "MOD-LOC-001"
  target_segment: "BUS-04"
  segment_name: "Tradespeople (renovero)"
  segment_size: 35000
  net_gamma: -0.45
  created: "2026-02-25"
  version: "1.0.0"
  total_interventions: 3

# ==============================================================================
# SEGMENT ANALYSIS
# ==============================================================================

segment_profile:
  bottleneck_phase: "F6_RETENTION"
  bottleneck_rate: 0.55
  primary_barrier: "seasonal_demand_variation"
  secondary_barrier: "time_cost_high"
  unique_assets:
    - "renovero as existing platform (familiarity, trust)"
    - "Direct lead attribution (project = revenue, measurable)"
    - "Action-oriented mindset (practical, ROI-focused)"
  key_gamma_insight: |
    γ_FT = -0.45 is the dominant negative: Time investment erodes
    any financial benefit. For tradespeople billing 100+ CHF/h,
    every minute on digital tools feels like lost revenue.
    → ALL interventions must minimize time investment.

# ==============================================================================
# DEPLOYMENT SEQUENCE
# ==============================================================================

deployment_sequence:
  - phase: 1
    weeks: "1-4"
    interventions: ["INT-LOC-006"]
    rationale: "Address time barrier first (γ_FT neutralization)"

  - phase: 2
    weeks: "5-12"
    interventions: ["INT-LOC-007"]
    rationale: "Smooth seasonal churn (retention bottleneck)"

  - phase: 3
    weeks: "13+"
    interventions: ["INT-LOC-008"]
    rationale: "Social proof via trade networks (trust-based channels)"

# ==============================================================================
# INTERVENTION 6: ZERO-TIME SETUP — renovero-to-digitalONE Bridge
# ==============================================================================

interventions:

  - id: "INT-LOC-006"
    name: "Zero-Time Setup — Automatic digitalONE from renovero Profile"
    priority: 1
    deployment_phase: 1

    F1_title:
      id: "INT-LOC-006"
      name: "Zero-Time Setup — Automatic digitalONE from renovero Profile"

    F2_target_dimension:
      dimension_10c: "WHEN"
      delta_target: "κ_KON→"
      intervention_vector: "I_WHEN"
      description: |
        Automatically generate a digitalONE trial from existing renovero
        profile data. Zero additional time investment required.
        Tradesperson sees their new enhanced profile in 60 seconds.

    F3_design:
      mechanism: |
        Time cost (τ = 100 CHF/h for BUS-04) means even 30 minutes of
        setup feels like CHF 50 lost. Combined with γ_FT = -0.45,
        time investment DESTROYS any perceived financial benefit.

        Solution: Eliminate time cost entirely.
        renovero profile already has: name, trade, location, photos,
        reviews, availability. Map this 1:1 to digitalONE profile.

        "Ihr digitalONE-Profil ist schon fertig. Basierend auf Ihrem
        renovero-Profil. Schauen Sie es sich an — 60 Sekunden."

      gamma_FT_neutralization: |
        When τ_effective ≈ 0 (auto-generated), γ_FT becomes irrelevant
        because u_T ≈ 0. The negative interaction γ_FT · u_F · u_T ≈ 0.
        This removes the single largest drag on BUS-04 utility.

      implementation:
        - "Build automated renovero → digitalONE profile mapper"
        - "Pre-populate: business name, trade category, location, photos, reviews"
        - "Show preview in renovero dashboard: 'So sieht Ihr digitalONE-Profil aus'"
        - "One-button activation: 'Profil aktivieren' (no form, no input needed)"
        - "Include first month free as bridge incentive"

    F4_target_structure:
      level: "IND"
      aggregation: "direct"

    F5_fepsde_dimension:
      primary: "F"
      secondary: "D"
      weights: {F: 0.4, E: 0.0, P: 0.0, S: 0.0, D: 0.5, X: 0.1}

    F6_journey_phase:
      optimal_phases: ["triggered", "action"]
      phase_affinity:
        awareness: 0.3
        triggered: 0.9
        action: 0.85
        maintenance: 0.3
        stable: 0.1

    F7_funnel_mapping:
      primary_phase: "F2_INTEREST"
      secondary_phases: ["F3_TRIAL", "F5_ACTIVATION"]
      F2_baseline: 0.35
      F2_projected: 0.55
      F2_uplift: 1.57
      confidence: "MEDIUM-HIGH"

    F8_parameters:
      primary:
        - par_id: "PAR-LOC-011"
          symbol: "τ_time"
          baseline: "100 CHF/h"
          projected_effective: "~0 CHF/h"
          mechanism: "Auto-generation eliminates time cost entirely"
      complementarity_effects:
        - interaction: "γ_FT"
          baseline: -0.45
          projected: "~0 (u_T ≈ 0 → interaction neutralized)"
          mechanism: "No time investment → γ_FT irrelevant"

    F9_segment:
      target: "BUS-04"
      segment_multiplier: 2.0  # Highest time sensitivity
      backfire_risk: "none"

    F10_complementarity:
      interacts_with: ["INT-LOC-007"]
      gamma_effects:
        - pair: "INT-LOC-006 × INT-LOC-007"
          gamma: 0.15
          mechanism: "Easy setup + seasonal value → continuous engagement"
      crowding_out_check:
        financial_component: false
        social_component: false
        conflict: "NONE"

    F11_autonomy:
      level: "libertarian_paternalism"
      reactance_risk: "very_low"
      autonomy_cues: ["Preview before activation", "Can customize after activation"]

    F12_temporal_scope:
      scope: "tactical"
      duration_weeks: 4
      persistence: "high"
      decision_level: "L1"

    F13_measurement:
      primary_kpi: "renovero-to-digitalONE trial conversion rate"
      secondary_kpis: ["preview view rate", "time-to-activation", "profile completeness"]
      measurement_method: "A/B: renovero users with vs. without auto-profile"
      sample_size_required: 300
      measurement_duration_weeks: 8

    F14_cost_estimate:
      implementation: "MEDIUM (data mapping + UX)"
      ongoing: "LOW"
      estimated_chf: 30000

# ==============================================================================
# INTERVENTION 7: SEASONAL RETENTION — Counter-Cyclical Value Demonstration
# ==============================================================================

  - id: "INT-LOC-007"
    name: "Seasonal Retention — Lead Pipeline Smoothing"
    priority: 1
    deployment_phase: 2

    F1_title:
      id: "INT-LOC-007"
      name: "Seasonal Retention — Lead Pipeline Smoothing"

    F2_target_dimension:
      dimension_10c: "AWARE"
      delta_target: "A(·)↑"
      intervention_vector: "I_AWARE_k"
      description: |
        Counter seasonal churn by showing tradespeople the value of
        maintaining visibility during slow periods. Use loss framing:
        "Projects you'll MISS in spring if you cancel now."

    F3_design:
      mechanism: |
        BUS-04 churn peaks in winter (construction/renovation slow season).
        Tradespeople cancel because they see no immediate leads.
        But spring demand surges, and those who cancelled lose pipeline.

        Intervention: Monthly "Pipeline Forecast" report showing:
        1. Current leads this month
        2. PROJECTED leads next 3 months (seasonal model)
        3. Loss comparison: "Without digitalONE, you'd miss X leads worth ~CHF Y"

        Loss framing (λ = 2.5): Showing lost leads is 2.5× more effective
        than showing gained leads.

        Timing: Send forecast in Month 10 (2 months before typical cancel point).

      seasonal_model: |
        Construction/renovation demand by month (CH):
        Jan: 0.4  Feb: 0.5  Mar: 0.8  Apr: 1.0  May: 1.2  Jun: 1.3
        Jul: 1.2  Aug: 1.1  Sep: 0.9  Oct: 0.7  Nov: 0.5  Dec: 0.3

        Cancellation risk peaks: Nov-Jan (low demand → questioning ROI)
        Retention intervention timing: Oct-Dec (before cancel decision)

      implementation:
        - "Build seasonal demand model per trade category and PLZ"
        - "Monthly 'Pipeline Forecast' email/SMS with projected leads"
        - "Loss-framed: 'X Projekte im Wert von CHF Y gehen verloren'"
        - "Include 1-2 concrete lead examples from the platform"
        - "Trigger retention call from rep when usage drops >50%"
        - "Offer seasonal pause (instead of cancel): 'Pausieren statt kündigen'"

    F4_target_structure:
      level: "IND"
      aggregation: "direct"

    F5_fepsde_dimension:
      primary: "F"  # Financial (future revenue)
      secondary: "E"  # Emotional (fear of missing out)
      weights: {F: 0.5, E: 0.3, P: 0.0, S: 0.0, D: 0.1, X: 0.1}

    F6_journey_phase:
      optimal_phases: ["maintenance", "stable"]
      phase_affinity:
        awareness: 0.1
        triggered: 0.3
        action: 0.4
        maintenance: 0.90
        stable: 0.85

    F7_funnel_mapping:
      primary_phase: "F6_RETENTION"
      secondary_phases: []
      baseline_rate: 0.55
      projected_rate: 0.72
      uplift_factor: 1.31
      confidence: "MEDIUM"

    F8_parameters:
      primary:
        - par_id: "PAR-LOC-001"
          symbol: "λ_marketing"
          baseline: 2.5
          projected: 2.5  # Unchanged — intervention leverages it
          mechanism: "Loss framing activates existing loss aversion for retention"

    F9_segment:
      target: "BUS-04"
      segment_multiplier: 1.8
      backfire_risk: "low"
      seasonal_sensitivity: "HIGH — intervention must be timed to Oct-Dec window"

    F10_complementarity:
      interacts_with: ["INT-LOC-006"]
      gamma_effects:
        - pair: "INT-LOC-007 × INT-LOC-006"
          gamma: 0.15
          mechanism: "Easy setup + seasonal value reminders"
      crowding_out_check:
        financial_component: true  # Loss-framed financial
        social_component: false
        conflict: "NONE"

    F11_autonomy:
      level: "information"
      reactance_risk: "low"
      autonomy_cues: ["Seasonal pause option preserves autonomy"]

    F12_temporal_scope:
      scope: "operative"
      duration_weeks: 12
      persistence: "medium"
      decision_level: "L0"

    F13_measurement:
      primary_kpi: "12-month retention rate"
      secondary_kpis: ["seasonal churn rate", "pause vs. cancel ratio", "forecast email open rate"]
      measurement_method: "A/B: forecast emails vs. no forecast"
      sample_size_required: 400
      measurement_duration_weeks: 24

    F14_cost_estimate:
      implementation: "LOW (seasonal model + email automation)"
      ongoing: "LOW"
      estimated_chf: 15000

# ==============================================================================
# INTERVENTION 8: TRADE NETWORK SOCIAL PROOF
# ==============================================================================

  - id: "INT-LOC-008"
    name: "Trade Network Social Proof — Peer Tradesperson Success"
    priority: 2
    deployment_phase: 3

    F1_title:
      id: "INT-LOC-008"
      name: "Trade Network Social Proof — Peer Tradesperson Success"

    F2_target_dimension:
      dimension_10c: "WHAT"
      delta_target: "u_S↑"
      intervention_vector: "I_WHO_o"
      description: |
        Leverage trade-specific networks (Schreinermeister-Verband, SUISSETEC,
        etc.) to showcase digitalONE success stories from peer tradespeople.
        Format: Video testimonial from local tradesperson, 90 seconds.

    F3_design:
      mechanism: |
        Tradespeople trust other tradespeople more than marketers.
        σ_peer = 0.55 (PAR-LOC-005) but with TRADE-SPECIFIC social proof,
        effective σ could reach 0.70 for BUS-04.

        Key: Must be SAME TRADE, SAME REGION.
        "Ein Elektriker aus Winterthur erklärt, wie er mit digitalONE
        5 zusätzliche Aufträge pro Monat bekommt."

        Channel: Trade association newsletters, Fachmessen, renovero
        platform, WhatsApp forwarding (trades heavily use WhatsApp).

      implementation:
        - "Recruit 10-15 tradesperson ambassadors (different trades, different regions)"
        - "Produce 90-second video testimonials (smartphone quality = authentic)"
        - "Distribute via trade associations, renovero platform, WhatsApp"
        - "Include concrete numbers: 'X Aufträge, Y CHF Mehrumsatz'"
        - "QR code to simplified upgrade page (INT-LOC-001 adapted for BUS-04)"

    F4_target_structure:
      level: "IND"
      aggregation: "direct"

    F5_fepsde_dimension:
      primary: "S"
      secondary: "F"
      weights: {F: 0.2, E: 0.1, P: 0.0, S: 0.6, D: 0.0, X: 0.1}

    F6_journey_phase:
      optimal_phases: ["awareness", "triggered"]
      phase_affinity:
        awareness: 0.9
        triggered: 0.8
        action: 0.4
        maintenance: 0.2
        stable: 0.1

    F7_funnel_mapping:
      primary_phase: "F1_REACH"
      secondary_phases: ["F2_INTEREST"]
      baseline_rate: 0.25
      projected_rate: 0.35
      uplift_factor: 1.40
      confidence: "MEDIUM"

    F8_parameters:
      primary:
        - par_id: "PAR-LOC-005"
          symbol: "σ_peer"
          baseline: 0.55
          projected_effective: 0.70
          mechanism: "Trade-specific social proof amplifies σ by ~27%"

    F9_segment:
      target: "BUS-04"
      segment_multiplier: 1.4
      backfire_risk: "low"

    F10_complementarity:
      interacts_with: []
      crowding_out_check:
        financial_component: false
        social_component: true
        conflict: "NONE — deployed separately from financial interventions"

    F11_autonomy:
      level: "information"
      reactance_risk: "very_low"
      autonomy_cues: ["Peer stories, no direct sales pressure"]

    F12_temporal_scope:
      scope: "tactical"
      duration_weeks: 12
      persistence: "medium"
      decision_level: "L0"

    F13_measurement:
      primary_kpi: "F1 reach rate from trade network channels"
      secondary_kpis: ["video view rate", "QR scan rate", "ambassador referral count"]
      measurement_method: "Track referral source in CRM"
      sample_size_required: 500
      measurement_duration_weeks: 12

    F14_cost_estimate:
      implementation: "MEDIUM (video production + ambassador program)"
      ongoing: "LOW"
      estimated_chf: 25000

