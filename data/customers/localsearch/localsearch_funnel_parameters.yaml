  # Portfolio totals (all segments combined)
  portfolio_total:
    paid_customers: 7792
    activated: 6217
    retained_12m: 4713
    expanded: 1224

# ==============================================================================
# BOTTLENECK ANALYSIS
# ==============================================================================

bottleneck_analysis:
  overall_bottleneck: "F1_REACH for BUS-02 (Traditional SMEs)"
  explanation: |
    The Traditional SME segment (BUS-02) represents 65% of the addressable
    market but has a 12% reach-to-interest rate. This is the single biggest
    lever: moving BUS-02 F1 from 0.12 to 0.18 (+50%) would increase total
    BUS-02 paid customers by 50% in absolute terms.

  per_segment_bottlenecks:
    BUS-01:
      phase: "F2_INTEREST"
      rate: 0.55
      explanation: "Competitive alternatives pull away interested Digital-Natives"
      intervention_class: "differentiation"

    BUS-02:
      phase: "F1_REACH"
      rate: 0.12
      explanation: "Status quo bias (kappa=0.70) prevents any engagement"
      intervention_class: "social_proof_and_loss_framing"

    BUS-03:
      phase: "F3_TRIAL"
      rate: 0.50
      explanation: "HQ budget approval process slows pilot initiation"
      intervention_class: "executive_case_study"

    BUS-04:
      phase: "F6_RETENTION"
      rate: 0.55
      explanation: "Seasonal demand variation causes churn in slow periods"
      intervention_class: "smoothing_and_value_reminders"

# ==============================================================================
# INTERVENTION UPLIFT SCENARIOS (BUS-02 Focus)
# ==============================================================================
#
# Since BUS-02 is the biggest opportunity, we model uplift scenarios
# for behavioral interventions targeting each funnel phase.

intervention_scenarios:
  target_segment: "BUS-02"
  baseline_paid_customers: 446

  scenarios:
    - scenario_id: "INT-01"
      name: "Social proof campaign"
      target_phase: "F1_REACH"
      intervention: |
        Show Traditional SMEs that their direct competitors and neighbors
        use digitalONE successfully. Leverage sigma_peer_adoption=0.55.
        Format: Postcard/email with local success story + QR code.
      baseline_rate: 0.12
      projected_rate: 0.18
      uplift_factor: 1.50
      confidence: "MEDIUM"
      evidence_basis: "sigma_peer_adoption_sme=0.55; peer effect literature"
      downstream_impact:
        paid_customers: 669  # 446 * 1.50
        incremental: 223

    - scenario_id: "INT-02"
      name: "Radical simplification"
      target_phase: "F2_INTEREST"
      intervention: |
        Reduce digitalONE evaluation from 5+ steps to 1 step.
        Show a single-page comparison: your listing now vs. digitalONE.
        Counter complexity_penalty=-0.35 by eliminating steps.
      baseline_rate: 0.18
      projected_rate: 0.35
      uplift_factor: 1.94
      confidence: "MEDIUM"
      evidence_basis: "complexity_penalty=-0.35; each removed step recovers 35%"
      downstream_impact:
        paid_customers: 866
        incremental: 420

    - scenario_id: "INT-03"
      name: "One-click free trial from existing listing"
      target_phase: "F3_TRIAL"
      intervention: |
        Allow SMEs to upgrade their existing free listing to digitalONE
        trial with ONE click from their admin dashboard. No forms, no
        credit card, no sales call. Directly counters lambda=2.5 by
        removing any perceived loss.
      baseline_rate: 0.25
      projected_rate: 0.50
      uplift_factor: 2.00
      confidence: "MEDIUM-HIGH"
      evidence_basis: "lambda=2.5 but zero-cost trial removes loss; delta effect"
      downstream_impact:
        paid_customers: 892
        incremental: 446

    - scenario_id: "INT-04"
      name: "Auto-conversion default"
      target_phase: "F4_CONVERSION"
      intervention: |
        Trial auto-converts to paid after 30 days unless explicitly
        cancelled. Leverage delta_auto_renewal=0.75. Combined with
        immediate value demonstration during trial.
      baseline_rate: 0.30
      projected_rate: 0.45
      uplift_factor: 1.50
      confidence: "HIGH"
      evidence_basis: "delta_auto_renewal=0.75; SaaS default conversion literature"
      downstream_impact:
        paid_customers: 669
        incremental: 223

    - scenario_id: "INT-05"
      name: "Guided onboarding with local sales rep"
      target_phase: "F5_ACTIVATION"
      intervention: |
        Personal onboarding call from local sales rep within 48h of
        conversion. Walk through 3 key features together. Implementation
        intentions: set specific goals for first month.
      baseline_rate: 0.50
      projected_rate: 0.75
      uplift_factor: 1.50
      confidence: "HIGH"
      evidence_basis: "Implementation intentions literature; complexity reduction"
      downstream_impact:
        activated_customers_from_baseline: 335  # 446 * 0.75
        incremental_activated: 112

    - scenario_id: "INT-COMBINED"
      name: "Full behavioral funnel optimization"
      target_phases: ["F1", "F2", "F3", "F4", "F5"]
      description: "All five interventions combined"
      projected_rates:
        F1: 0.18
        F2: 0.35
        F3: 0.50
        F4: 0.45
        F5: 0.75
        F6: 0.65  # unchanged
        F7: 0.08  # unchanged
      projected_end_to_end:
        reach_to_paid: 0.014   # 0.18 * 0.35 * 0.50 * 0.45
        reach_to_activated: 0.011
        reach_to_retained: 0.007
      absolute_impact:
        paid_customers: 3938   # 275000 * 0.014
        activated: 2953        # * 0.75
        retained_12m: 1920     # * 0.65
      vs_baseline:
        paid_multiplier: 8.8   # 3938 / 446
        incremental_paid: 3492
      caveat: |
        Combined scenario assumes independence between interventions.
        In practice, complementarities and crowding-out effects may
        alter the combined impact. See localsearch_gamma_matrix.yaml
        (future file) for interaction modelling.

# ==============================================================================
# SENSITIVITY ANALYSIS
# ==============================================================================

sensitivity:
  description: |
    Which parameters, if wrong by +/-20%, most affect total paid customers?

  tornado_chart_bus02:
    # Sorted by impact magnitude (highest first)
    - parameter: "F1_rate"
      base: 0.12
      low_scenario: 0.096  # -20%
      high_scenario: 0.144 # +20%
      impact_on_paid: [-89, +89]  # absolute change in paid customers
      elasticity: 1.0  # linear pass-through

    - parameter: "F2_rate"
      base: 0.18
      low_scenario: 0.144
      high_scenario: 0.216
      impact_on_paid: [-89, +89]
      elasticity: 1.0

    - parameter: "F3_rate"
      base: 0.25
      low_scenario: 0.20
      high_scenario: 0.30
      impact_on_paid: [-89, +89]
      elasticity: 1.0

    - parameter: "F4_rate"
      base: 0.30
      low_scenario: 0.24
      high_scenario: 0.36
      impact_on_paid: [-89, +89]
      elasticity: 1.0

    - parameter: "kappa_traditional"
      base: 0.70
      impact_phases: ["F1", "F6"]
      note: |
        kappa has DUAL effect: suppresses F1 (reach) but supports F6
        (retention). Net impact depends on which phase dominates.
        At current conversion rates, F1 suppression dominates.

    - parameter: "lambda_marketing"
      base: 2.5
      impact_phases: ["F3", "F7"]
      note: |
        Higher lambda suppresses trial initiation and expansion.
        Reducing perceived loss (e.g., free trial) effectively
        reduces lambda for that decision context.

  key_insight: |
    All four early-funnel rates (F1-F4) have identical elasticity=1.0
    on total paid customers. However, F1 (reach) has the lowest
    baseline rate (0.12) and the largest addressable population,
    making it the highest-ROI intervention target.

# ==============================================================================
# CALIBRATION PLAN
# ==============================================================================

calibration_plan:
  description: |
    These LLMMC estimates require empirical calibration. Priority data
    requests for Localsearch analytics team.

  priority_1_immediate:
    - metric: "Current digitalONE conversion funnel"
      maps_to: "F1-F4 rates"
      data_source: "CRM + Analytics"
      gap_ref: "GAP-02"

    - metric: "12-month retention rate by product"
      maps_to: "F6 rates"
      data_source: "Subscription database"
      gap_ref: "GAP-03"

    - metric: "Current digitalONE adoption by segment"
      maps_to: "Segment sizes and F1 baselines"
      data_source: "Customer segmentation data"
      gap_ref: "GAP-01"

  priority_2_within_4_weeks:
    - metric: "Feature usage patterns post-conversion"
      maps_to: "F5 activation rates"
      data_source: "Product analytics"

    - metric: "Upgrade/cross-sell rates by tenure"
      maps_to: "F7 expansion rates"
      data_source: "Revenue analytics"

    - metric: "Sales channel effectiveness"
      maps_to: "F1 rates by acquisition channel"
      data_source: "CRM"

  bayesian_update_protocol: |
    When client data arrives:
    1. Calculate empirical rates per phase x segment
    2. Use LLMMC estimates as priors
    3. Bayesian update: posterior = f(prior, data, sample_size)
    4. Update this file with posterior estimates
    5. Re-run sensitivity analysis
    6. Update intervention scenarios with calibrated rates
