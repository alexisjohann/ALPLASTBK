---
# Localsearch Context Master Overview
# BCM2 Context Integration for Customer Analysis
# Last Updated: 2026-01-29
# Version: 1.1.0

# =============================================================================
# HEADER
# =============================================================================

metadata:
  customer_id: "CUST-LOCALSEARCH"
  customer_name: "Localsearch (Swisscom Directories AG)"
  context_version: "1.1.0"
  created_date: "2026-01-29"
  updated_date: "2026-01-29"
  cva_level: "STANDARD"  # Upgraded from SCHNELL after research
  maintainer: "FehrAdvice"
  status: "ACTIVE"

# =============================================================================
# MACRO CONTEXT (Country/Market Level)
# =============================================================================

macro_context:
  country: "CH"
  market: "Digital Marketing Services / Local Search"
  reference_files:
    - "data/dr-datareq/sources/context/ch/BCM2_04_KON_demographic.yaml"
    - "data/dr-datareq/sources/context/ch/BCM2_04_KON_economic.yaml"
    - "data/dr-datareq/sources/context/ch/BCM2_04_KON_tech_ecological.yaml"

  # Key Swiss Digital Market Parameters
  market_parameters:
    internet_penetration_percent: 96
    smartphone_penetration_percent: 92
    sme_count_total: 600000
    sme_digital_presence_percent: 75
    local_search_market_leader: "localsearch"

  # Swiss SME Landscape
  swiss_sme_context:
    total_smes: 600000
    micro_enterprises_percent: 90  # <10 employees
    small_enterprises_percent: 8   # 10-49 employees
    medium_enterprises_percent: 2  # 50-249 employees
    digital_marketing_adoption:
      website_ownership: 0.75
      social_media_active: 0.55
      paid_advertising: 0.25
      online_booking: 0.15

# =============================================================================
# MESO CONTEXT (Industry/Company Level)
# =============================================================================

meso_context:
  industry: "Digital Directory & SME Marketing Services"
  industry_code: "NACE-J63"  # Information service activities

  # Industry-specific behavioral parameters
  industry_parameters:
    digital_advertising_growth_pa: 0.05
    sme_marketing_budget_share: 0.03  # % of revenue spent on marketing
    local_search_usage_frequency: "weekly"  # Consumer usage pattern
    business_listing_update_frequency: "quarterly"

  # Company-specific context
  company_context:
    market_position: "Leader"
    brand_awareness_percent: 85
    trust_score: 0.82  # High due to Swisscom backing
    digital_maturity: "High"
    transformation_stage: "Post-transformation (Print → Digital complete)"

    # Key Company Metrics
    reach:
      monthly_unique_users: 3900000
      monthly_users_local_search: 2700000
      swiss_population_reach: 0.25  # 1 in 4 Swiss people
      monthly_searches: 7200000

    business_relationships:
      total_sme_customers: 400000
      business_profiles: 640000
      bookable_smes: 145000
      premium_customers: "TBD"

    # Swisscom Integration Context
    parent_company_synergies:
      - "Swisscom customer base access (retail + B2B)"
      - "Infrastructure and billing integration"
      - "Brand trust transfer (Swisscom = trusted)"
      - "Cross-selling opportunities"
      - "Technology sharing"

# =============================================================================
# STAKEHOLDER SEGMENTS (Updated with Research)
# =============================================================================

stakeholder_segments:
  # Consumer Segments (B2C)
  consumers:
    - segment_id: "CON-01"
      name: "Active Local Searchers"
      description: "Frequent users searching for local businesses weekly"
      size_estimate: "2.7M monthly"
      share_of_swiss_population: 0.25
      behavioral_profile:
        search_frequency: "weekly"
        preferred_channels: ["mobile_app", "web"]
        primary_use_cases:
          - "Find nearby restaurants/services"
          - "Get contact information"
          - "Check opening hours"
          - "Read reviews"
          - "Book appointments"
        decision_factors:
          - "Proximity"
          - "Reviews/Ratings"
          - "Opening hours"
          - "Photos"
          - "Online booking availability"
        pain_points:
          - "Outdated business information"
          - "Missing reviews"
          - "No online booking option"
          - "Slow loading times"

    - segment_id: "CON-02"
      name: "Occasional Users"
      description: "Use local search for specific needs"
      size_estimate: "3M+ quarterly"
      behavioral_profile:
        search_frequency: "monthly"
        preferred_channels: ["web", "google_redirect"]
        trigger_events:
          - "Moving to new area"
          - "Emergency services needed"
          - "Special occasion planning"
          - "Home renovation (→ renovero)"

    - segment_id: "CON-03"
      name: "Trades Seekers (renovero)"
      description: "Users seeking tradespeople for projects"
      size_estimate: "TBD"
      behavioral_profile:
        search_frequency: "project-based"
        preferred_channels: ["renovero.ch", "mobile"]
        decision_factors:
          - "Price quotes"
          - "Reviews"
          - "Response time"
          - "Availability"

  # Business Segments (B2B) - Localsearch's 400'000 SME Customers
  businesses:
    - segment_id: "BUS-01"
      name: "Digital-Native SMEs"
      description: "Tech-savvy businesses actively managing online presence"
      size_estimate: "50'000-80'000"
      share_of_customer_base: 0.15
      behavioral_profile:
        digital_maturity: "High"
        marketing_budget_monthly_chf: "500-2000"
        adoption_readiness: 0.8
        current_products:
          - "digitalONE (full suite)"
          - "advertiseONE"
          - "Premium entries"
        pain_points:
          - "ROI measurement across channels"
          - "Multi-platform management"
          - "Review management at scale"
        opportunities:
          - "Upsell to advertiseONE"
          - "Cross-sell renovero (if trades)"

    - segment_id: "BUS-02"
      name: "Traditional SMEs"
      description: "Established businesses with limited digital presence"
      size_estimate: "250'000-300'000"
      share_of_customer_base: 0.65
      behavioral_profile:
        digital_maturity: "Low"
        marketing_budget_monthly_chf: "0-200"
        adoption_readiness: 0.3
        current_products:
          - "Basic listing (free)"
          - "Maybe premium entry"
        pain_points:
          - "Complexity of digital tools"
          - "Time constraints"
          - "Unclear value proposition"
          - "Fear of technology"
        behavioral_barriers:
          - barrier: "Status quo bias"
            strength: 0.7
            note: "Happy with current situation"
          - barrier: "Loss aversion"
            strength: 0.6
            note: "Fear of wasting money"
          - barrier: "Complexity aversion"
            strength: 0.65
            note: "Digital feels overwhelming"
          - barrier: "Present bias"
            strength: 0.5
            note: "Future benefits discounted"
        opportunities:
          - "digitalONE adoption (biggest opportunity)"
          - "Simplified onboarding"
          - "Regional sales relationship"

    - segment_id: "BUS-03"
      name: "Franchise/Chain Locations"
      description: "Local outlets of larger chains"
      size_estimate: "20'000-30'000"
      share_of_customer_base: 0.06
      behavioral_profile:
        digital_maturity: "Medium-High"
        decision_maker: "HQ + Local Manager"
        adoption_readiness: 0.6
        pain_points:
          - "HQ vs local control tension"
          - "Consistency across locations"
          - "Local relevance"

    - segment_id: "BUS-04"
      name: "Tradespeople (renovero)"
      description: "Craftsmen and service providers on renovero"
      size_estimate: "TBD"
      behavioral_profile:
        digital_maturity: "Medium"
        primary_platform: "renovero"
        business_model: "Project-based bidding"
        pain_points:
          - "Competition for projects"
          - "Time to respond"
          - "Managing reputation"

# =============================================================================
# BEHAVIORAL PARAMETERS (EBF Framework)
# =============================================================================

behavioral_parameters:
  # Loss Aversion (λ)
  loss_aversion:
    sme_marketing_investment:
      lambda: 2.5
      note: "SMEs highly loss averse for marketing spend"
      source: "EBF-LLMMC estimate"
      context: "Traditional SMEs fear wasting money on digital"

    subscription_cancellation:
      lambda: 1.8
      note: "Once subscribed, loss aversion keeps them"
      source: "EBF-LLMMC estimate"

  # Present Bias (β)
  present_bias:
    digital_adoption:
      beta: 0.7
      note: "SMEs heavily discount future benefits of digital presence"
      source: "EBF-LLMMC estimate"
      implication: "Need immediate, tangible benefits"

    booking_vs_call:
      beta: 0.85
      note: "Consumers prefer immediate action"
      source: "EBF-LLMMC estimate"

  # Status Quo Bias (κ)
  status_quo:
    traditional_sme_switching:
      kappa: 0.70
      note: "High inertia in changing marketing approach"
      source: "EBF-LLMMC estimate"

    platform_loyalty:
      kappa: 0.55
      note: "Users stick with familiar search platform"
      source: "EBF-LLMMC estimate"

  # Social Proof (σ)
  social_proof:
    review_influence_consumer:
      sigma: 0.72
      note: "Strong influence of reviews on consumer choice"
      source: "Industry benchmark"

    peer_adoption_sme:
      sigma: 0.55
      note: "SMEs influenced by competitor digital presence"
      source: "EBF-LLMMC estimate"
      intervention: "Show successful peers in same industry/region"

    star_rating_threshold:
      value: 4.0
      note: "Businesses below 4 stars see significant drop in clicks"
      source: "Industry pattern"

  # Default Effect (δ)
  default_effect:
    subscription_auto_renewal:
      delta: 0.75
      note: "Auto-renewal significantly increases retention"
      source: "SaaS industry benchmark"

    premium_vs_basic_default:
      delta: 0.40
      note: "Defaulting to premium increases adoption"
      source: "EBF-LLMMC estimate"

  # Complexity Aversion
  complexity_aversion:
    digital_tool_adoption:
      complexity_penalty: -0.35
      note: "Each additional step reduces adoption by ~35%"
      source: "EBF-LLMMC estimate"
      implication: "Simplify digitalONE onboarding"

# =============================================================================
# POTENTIAL USE CASES (Prioritized)
# =============================================================================

potential_use_cases:
  high_priority:
    - use_case_id: "UC-01"
      name: "digitalONE Adoption for Traditional SMEs"
      description: "Increase digitalONE adoption among BUS-02 segment (250k+ potential)"
      target_segment: "BUS-02"
      business_impact: "High - largest untapped segment"
      10c_dimensions:
        primary: "AWARE"  # Awareness of benefits
        secondary: ["READY", "WHEN", "HOW"]
      behavioral_barriers:
        - "Status quo bias (κ=0.70)"
        - "Loss aversion (λ=2.5)"
        - "Complexity aversion"
      potential_interventions:
        - type: "Simplification"
          description: "One-click onboarding from existing listing"
          target_barrier: "Complexity aversion"
        - type: "Social proof"
          description: "Show successful peers in same Branche/Region"
          target_barrier: "Status quo bias"
        - type: "Loss framing"
          description: "Show lost customers going to competitors"
          target_barrier: "Status quo bias"
        - type: "Free trial with default"
          description: "30-day trial, auto-converts unless cancelled"
          target_barrier: "Loss aversion, Status quo"
        - type: "Regional sales nudge"
          description: "Personal call from local sales rep"
          target_barrier: "Trust, Complexity"

    - use_case_id: "UC-02"
      name: "Search-to-Booking Conversion"
      description: "Increase conversion from search to booking/contact"
      target_segment: "CON-01"
      business_impact: "High - direct revenue impact"
      10c_dimensions:
        primary: "HOW"  # Choice architecture
        secondary: ["WHAT", "WHEN"]
      potential_interventions:
        - type: "Simplification"
          description: "One-tap booking/calling"
        - type: "Urgency"
          description: "Show real-time availability"
        - type: "Social proof"
          description: "X people booked this week"

  medium_priority:
    - use_case_id: "UC-03"
      name: "Review Generation"
      description: "Increase business reviews through behavioral design"
      target_segment: "CON-01, CON-02"
      business_impact: "Medium - improves data quality and engagement"
      10c_dimensions:
        primary: "WHEN"  # Timing of review request
        secondary: ["AWARE", "WHAT"]
      potential_interventions:
        - type: "Timing"
          description: "Request review immediately after positive interaction"
        - type: "Reciprocity"
          description: "Thank them first, then ask"
        - type: "Simplification"
          description: "One-tap star rating, optional text"
        - type: "Social proof"
          description: "X others have reviewed this business"

    - use_case_id: "UC-04"
      name: "Pricing & Packaging Optimization"
      description: "Optimize digitalONE/advertiseONE packages using behavioral pricing"
      target_segment: "BUS-01, BUS-02"
      business_impact: "Medium - revenue per customer"
      10c_dimensions:
        primary: "WHAT"  # Value perception
        secondary: ["HOW", "AWARE"]
      potential_interventions:
        - type: "Decoy pricing"
          description: "Add dominated option to make target attractive"
        - type: "Anchoring"
          description: "Show high anchor first"
        - type: "Default selection"
          description: "Pre-select recommended package"
        - type: "Loss framing"
          description: "Show what they lose without upgrade"

    - use_case_id: "UC-05"
      name: "Churn Reduction"
      description: "Reduce subscription cancellations"
      target_segment: "BUS-01, BUS-02"
      business_impact: "Medium-High - retention is cheaper than acquisition"
      10c_dimensions:
        primary: "WHEN"  # Intervention timing
        secondary: ["AWARE", "WHAT"]
      potential_interventions:
        - type: "Early warning"
          description: "Identify at-risk customers via usage patterns"
        - type: "Value reminder"
          description: "Monthly ROI summary email"
        - type: "Switching cost salience"
          description: "Show what they built (reviews, bookings)"
        - type: "Win-back offer"
          description: "Pause instead of cancel option"

  lower_priority:
    - use_case_id: "UC-06"
      name: "renovero Tradesperson Activation"
      description: "Increase tradesperson responsiveness and quality"
      target_segment: "BUS-04"
      10c_dimensions:
        primary: "WHEN"
        secondary: ["AWARE", "HOW"]

    - use_case_id: "UC-07"
      name: "Sales Force Behavioral Training"
      description: "Train regional sales reps in behavioral selling"
      target_segment: "Internal (Sales)"
      10c_dimensions:
        primary: "AWARE"
        secondary: ["HOW"]

