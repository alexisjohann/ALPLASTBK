# ==============================================================================
# INTERVENTION 5: GUIDED ACTIVATION — 3-FEATURE ONBOARDING
# ==============================================================================
# Funnel target: F5_ACTIVATION (50% → 75%)
# 10C Target: AWARE (AU) — Feedback + Implementation Intentions
# Utility mechanism: u_C↓ (complexity reduced) + AWARE↑

  - id: "INT-LOC-005"
    name: "3-Feature Guided Activation with Personal Rep Call"
    priority: 4
    deployment_phase: 4

    F1_title:
      id: "INT-LOC-005"
      name: "3-Feature Guided Activation with Personal Rep Call"

    F2_target_dimension:
      dimension_10c: "AWARE"
      delta_target: "A(·)↑"
      intervention_vector: "I_AWARE"
      description: |
        Within 48h of trial/conversion, local sales rep calls to walk
        the SME through exactly 3 features (not more). Uses implementation
        intentions: "Which 3 features will you set up THIS WEEK?"

    F3_design:
      mechanism: |
        Complexity aversion (χ = -0.35) means every additional feature
        overwhelms. Solution: Constrain to EXACTLY 3 features.

        Implementation intentions (Gollwitzer 1999):
        "Wenn-Dann" plans increase follow-through by 2-3×.
        "WANN werden Sie Ihr Profil-Foto hochladen?"
        "WO werden Sie die erste Bewertung teilen?"

        The call serves three purposes:
        1. Reduce complexity (from 8+ features to exactly 3)
        2. Create implementation intentions (when + where + what)
        3. Build personal relationship (trust for retention)

      three_feature_menu:
        - feature: "Profil vervollständigen (Foto, Öffnungszeiten, Beschreibung)"
          difficulty: "easy"
          time: "10 min"
          immediate_value: "Sichtbarkeit +40% laut Daten"
        - feature: "Erste Kundenbewertung aktiv einholen"
          difficulty: "medium"
          time: "5 min + Wartezeit"
          immediate_value: "Vertrauen +60%"
        - feature: "Google-Sichtbarkeit prüfen und verbessern"
          difficulty: "easy"
          time: "5 min"
          immediate_value: "Direkt messbar in Search Console"

      implementation:
        - "Sales rep calls within 48h of conversion/trial activation"
        - "Script: 'Ich zeige Ihnen 3 Dinge, die sofort wirken. Dauert 15 Minuten.'"
        - "Walk through 3 features together (screen share or phone guidance)"
        - "Set implementation intentions for each feature"
        - "Follow-up SMS after 7 days: 'Haben Sie Feature X schon ausprobiert?'"

    F4_target_structure:
      level: "IND"
      aggregation: "direct"

    F5_fepsde_dimension:
      primary: "D"  # Development
      secondary: "S"  # Social (relationship with rep)
      weights: {F: 0.0, E: 0.1, P: 0.0, S: 0.2, D: 0.6, X: 0.1}

    F6_journey_phase:
      optimal_phases: ["action", "maintenance"]
      phase_affinity:
        awareness: 0.1
        triggered: 0.3
        action: 0.90
        maintenance: 0.85
        stable: 0.3

    F7_funnel_mapping:
      primary_phase: "F5_ACTIVATION"
      secondary_phases: ["F6_RETENTION"]
      baseline_rate: 0.50
      projected_rate: 0.75
      uplift_factor: 1.50
      confidence: "HIGH"

    F8_parameters:
      primary:
        - par_id: "PAR-LOC-009"
          symbol: "χ_complexity"
          baseline: 0.35
          projected: 0.12
          mechanism: "Guided 3-feature path reduces perceived complexity by 2/3"

    F9_segment:
      target: "BUS-02"
      segment_multiplier: 1.7
      backfire_risk: "none"

    F10_complementarity:
      interacts_with: ["INT-LOC-001"]
      gamma_effects:
        - pair: "INT-LOC-005 × INT-LOC-001"
          gamma: 0.15
          mechanism: "Simplified product + guided activation = minimal friction"
      crowding_out_check:
        financial_component: false
        social_component: false
        conflict: "NONE"

    F11_autonomy:
      level: "coaching"
      reactance_risk: "very_low"
      autonomy_cues: ["SME chooses WHICH 3 features", "No pressure for more"]

    F12_temporal_scope:
      scope: "operative"
      duration_weeks: 4
      persistence: "high"
      decision_level: "L0"

    F13_measurement:
      primary_kpi: "F5 activation rate (3+ features in 30 days)"
      secondary_kpis: ["feature adoption sequence", "rep call completion rate", "7-day follow-up response"]
      measurement_method: "A/B: guided onboarding vs. self-service"
      sample_size_required: 200
      measurement_duration_weeks: 8

    F14_cost_estimate:
      implementation: "MEDIUM (rep training + scripts)"
      ongoing: "MEDIUM (rep time per new customer, ~15 min)"
      estimated_chf: 25000  # Training + first 200 calls

    F15_risk_assessment:
      risks:
        - risk: "Scaling challenge — rep time per customer"
          probability: "HIGH"
          mitigation: "Automate for BUS-01/03, manual only for BUS-02/04"
        - risk: "Rep quality variation"
          probability: "MEDIUM"
          mitigation: "Standardized script + quality monitoring"

    F16_ethical:
      manipulation_risk: "VERY LOW"
      transparency: "Genuine help, no hidden upsell"
      informed_consent: "Yes"

