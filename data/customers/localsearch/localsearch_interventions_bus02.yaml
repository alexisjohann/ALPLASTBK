---
# ==============================================================================
# Localsearch BUS-02 Intervention Portfolio
# Behavioral Funnel Optimization for Traditional SMEs (65% of TAM)
# ==============================================================================
#
# Model: MOD-LOC-001 (Localsearch SME Digital Adoption Model)
# Segment: BUS-02 (Traditional SMEs, N≈275'000, net γ = -0.50)
# Schema: 20-Field Intervention Schema (Chapter 17, Appendix HHH)
# Compliance: Validated against templates/intervention-schema.yaml
#
# DESIGN PRINCIPLES (from gamma-matrix analysis):
#   1. SIMPLIFICATION FIRST — triple impact via u_C + γ_FC + γ_XC
#   2. SOCIAL + DEFAULT SYNERGY — exploit γ_SD = +0.45 (strongest positive)
#   3. CROWDING-OUT AVOIDANCE — NEVER social + financial in same stage
#   4. SEQUENTIAL DEPLOYMENT — address negative γ before activating positive γ
#
# Created: 2026-02-25
# Version: 1.0.0
# ==============================================================================

metadata:
  portfolio_id: "PF-LOC-BUS02-001"
  model_id: "MOD-LOC-001"
  target_segment: "BUS-02"
  segment_name: "Traditional SMEs"
  segment_size: 275000
  net_gamma: -0.50
  created: "2026-02-25"
  version: "1.0.0"
  estimation_method: "LLMMC"
  evidence_tier: 2
  deployment_strategy: "sequential"
  total_interventions: 5

# ==============================================================================
# DEPLOYMENT SEQUENCE (ORDER MATTERS!)
# ==============================================================================
#
# Phase 1 (Weeks 1-4):   INT-LOC-001 Simplification
#    → Eliminates negative γ_FC and γ_XC FIRST
#    → Must be in place before any other intervention
#
# Phase 2 (Weeks 5-8):   INT-LOC-002 Social Proof + INT-LOC-003 Smart Default
#    → Deployed TOGETHER to exploit γ_SD = +0.45 synergy
#    → Social proof ONLY (no financial incentives! PAR-COMP-002)
#
# Phase 3 (Weeks 9-12):  INT-LOC-004 Zero-Loss Trial
#    → After simplified product + social proof established
#    → Financial framing now safe (social proof was in earlier stage)
#
# Phase 4 (Weeks 13+):   INT-LOC-005 Guided Activation
#    → Post-conversion, ongoing
#    → Continues simplification theme into onboarding

deployment_sequence:
  - phase: 1
    weeks: "1-4"
    interventions: ["INT-LOC-001"]
    rationale: "Neutralize negative complementarities before activating positives"

  - phase: 2
    weeks: "5-8"
    interventions: ["INT-LOC-002", "INT-LOC-003"]
    rationale: "Exploit γ_SD = +0.45 synergy (social + default together)"

  - phase: 3
    weeks: "9-12"
    interventions: ["INT-LOC-004"]
    rationale: "Financial framing safe — social proof was in earlier stage"

  - phase: 4
    weeks: "13+"
    interventions: ["INT-LOC-005"]
    rationale: "Post-conversion activation, continuous"

# ==============================================================================
# CROWDING-OUT GUARD (PAR-COMP-002)
# ==============================================================================

crowding_out_analysis:
  par_ref: "PAR-COMP-002"
  gamma_social_financial: -0.68
  rule: "Social proof and financial incentives MUST NOT appear in the same funnel stage"
  compliance_check:
    INT-LOC-001: "u_C (complexity) — no conflict"
    INT-LOC-002: "u_S (social) — social ONLY, no financial"
    INT-LOC-003: "u_D (default) — no conflict"
    INT-LOC-004: "u_F (financial framing) — deployed in LATER stage than social"
    INT-LOC-005: "u_C (complexity reduction) — no conflict"
  status: "COMPLIANT — no stage combines social + financial"

# ==============================================================================
# INTERVENTION 1: RADICAL SIMPLIFICATION
# ==============================================================================
# Funnel target: F2_INTEREST (18% → 35%)
# 10C Target: WHEN (V) — Choice Architecture
# Utility mechanism: u_C↑ (direct) + γ_FC neutralized + γ_XC neutralized
# TRIPLE IMPACT: This single intervention affects 3 model terms

interventions:

  - id: "INT-LOC-001"
    name: "Radical Simplification — One-Page Upgrade Path"
    priority: 1
    deployment_phase: 1

    # --- F1: Title ---
    F1_title:
      id: "INT-LOC-001"
      name: "Radical Simplification — One-Page Upgrade Path"

    # --- F2: 10C Target ---
    F2_target_dimension:
      dimension_10c: "WHEN"
      delta_target: "κ_KON→"
      intervention_vector: "I_WHEN"
      description: |
        Restructure the evaluation experience from 5+ page/step process
        to a single-page side-by-side comparison: "Your listing now" vs.
        "Your listing with digitalONE". One button to proceed.

    # --- F3: Specific Intervention Design ---
    F3_design:
      mechanism: |
        Current state: SME visits digitalONE page → sees 8+ features →
        needs to understand pricing tiers → must fill form → gets sales call.
        Each step loses ~35% (χ = -0.35, PAR-LOC-009).
        5 steps: 0.65^5 = 0.12 survival rate.

        Simplified state: SME sees own listing → sees enhanced version next to it →
        one "Upgrade" button → auto-fills from existing account data → done.
        1 effective step: 0.65^1 = 0.65 survival rate.

        Additionally, simplification neutralizes two negative complementarities:
        γ_FC = -0.50: When product is simple, financial ROI is easier to see
        γ_XC = -0.35: When product is simple, identity threat is eliminated

      triple_impact_analysis:
        direct_u_C: "+0.35 → complexity penalty reduced from -0.35 to ~-0.10"
        gamma_FC_neutralized: "From -0.50 to ~-0.15 (ROI visible despite low financial literacy)"
        gamma_XC_neutralized: "From -0.35 to ~-0.10 (no longer threatening to self-image)"
        total_model_impact: |
          ΔU = Δu_C + Δγ_FC · u_F · u_C + Δγ_XC · u_X · u_C
             ≈ +0.25 + (+0.35)(0.3)(0.25) + (+0.25)(0.5)(0.25)
             ≈ +0.25 + 0.026 + 0.031
             ≈ +0.31 utility units

      implementation:
        - "Remove multi-page product tour — replace with single comparison page"
        - "Auto-populate SME data from existing free listing account"
        - "Show 3 key metrics only: visibility score, competitor comparison, monthly cost"
        - "Single CTA button: 'Upgrade für CHF X/Monat'"
        - "No form, no sales call required, no feature overwhelm"

    # --- F4: Target Structure ---
    F4_target_structure:
      level: "IND"
      aggregation: "direct"

    # --- F5: FEPSDE ---
    F5_fepsde_dimension:
      primary: "D"  # Development (reducing cognitive load = enabling development)
      secondary: "F"  # Financial (ROI becomes visible through simplicity)
      weights: {F: 0.3, E: 0.0, P: 0.0, S: 0.0, D: 0.6, X: 0.1}

    # --- F6: Journey Phase ---
    F6_journey_phase:
      optimal_phases: ["triggered", "action"]
      phase_affinity:
        awareness: 0.3
        triggered: 0.9
        action: 0.8
        maintenance: 0.4
        stable: 0.2

    # --- F7: Funnel Mapping ---
    F7_funnel_mapping:
      primary_phase: "F2_INTEREST"
      secondary_phases: ["F3_TRIAL", "F5_ACTIVATION"]
      baseline_rate: 0.18
      projected_rate: 0.35
      uplift_factor: 1.94
      confidence: "MEDIUM"

    # --- F8: Parameters Affected ---
    F8_parameters:
      primary:
        - par_id: "PAR-LOC-009"
          symbol: "χ_complexity"
          baseline: 0.35
          projected: 0.10
          mechanism: "Steps reduced from 5 to 1"
      complementarity_effects:
        - interaction: "γ_FC"
          baseline: -0.50
          projected: -0.15
          mechanism: "Simple product → ROI visible"
        - interaction: "γ_XC"
          baseline: -0.35
          projected: -0.10
          mechanism: "Simple product → no identity threat"

    # --- F9: Segment Specificity ---
    F9_segment:
      target: "BUS-02"
      segment_multiplier: 1.8  # Highest impact for lowest digital maturity
      backfire_risk: "none"
      sigma_effect: |
        BUS-02 benefits most because complexity is their PRIMARY barrier.
        σ(BUS-02) = 1.8 (nearly 2× average effect).
        BUS-01 would see σ = 0.4 (barely helps, already comfortable).

    # --- F10: Complementarity ---
    F10_complementarity:
      interacts_with: ["INT-LOC-002", "INT-LOC-003"]
      gamma_effects:
        - pair: "INT-LOC-001 × INT-LOC-002"
          gamma: 0.15
          mechanism: "Simplified product + social proof: peers make simple choice feel validated"
        - pair: "INT-LOC-001 × INT-LOC-003"
          gamma: 0.20
          mechanism: "Simplified product + smart default: one-click path is the perfect default"
      sequencing_requirement: "INT-LOC-001 MUST be deployed before INT-LOC-002/003"

    # --- F11: Autonomy Level ---
    F11_autonomy:
      level: "libertarian_paternalism"  # Choice preserved, architecture improved
      reactance_risk: "low"
      autonomy_cues: ["SME can still choose full product tour via 'Show me all features' link"]

    # --- F12: Temporal Scope ---
    F12_temporal_scope:
      scope: "tactical"
      duration_weeks: 4
      persistence: "high"
      decision_level: "L1"

    # --- F13-F20: Extended Fields ---
    F13_measurement:
      primary_kpi: "F2 conversion rate (interest → evaluation)"
      secondary_kpis: ["time-on-page", "drop-off-point", "CTA click rate"]
      measurement_method: "A/B test: current page vs. simplified page"
      sample_size_required: 500
      measurement_duration_weeks: 4

    F14_cost_estimate:
      implementation: "LOW (UX redesign, no new infrastructure)"
      ongoing: "NONE"
      estimated_chf: 15000  # One-time UX/dev cost

    F15_risk_assessment:
      risks:
        - risk: "Oversimplification loses informed buyers"
          probability: "LOW"
          mitigation: "'Show all features' escape hatch"
        - risk: "Higher conversion but lower quality leads"
          probability: "MEDIUM"
          mitigation: "Monitor activation rate (F5) for quality signal"

    F16_ethical:
      manipulation_risk: "LOW"
      transparency: "Full product info available on demand"
      informed_consent: "Yes — SME always sees pricing before proceeding"

# ==============================================================================
# INTERVENTION 2: HYPERLOCAL SOCIAL PROOF
# ==============================================================================
# Funnel target: F1_REACH (12% → 18%)
# 10C Target: WHAT (u_S) — Social Norms
# Utility mechanism: u_S↑ (direct) + γ_SD synergy when combined with INT-LOC-003
# SYNERGY: Deployed together with INT-LOC-003 for γ_SD = +0.45

  - id: "INT-LOC-002"
    name: "Hyperlocal Social Proof — Competitor Success Stories"
    priority: 2
    deployment_phase: 2

    F1_title:
      id: "INT-LOC-002"
      name: "Hyperlocal Social Proof — Competitor Success Stories"

    F2_target_dimension:
      dimension_10c: "WHAT"
      delta_target: "u_S↑"
      intervention_vector: "I_WHO_o"
      description: |
        Show each Traditional SME that businesses in their specific
        postcode/industry already use digitalONE successfully.
        Leverage σ_peer = 0.55 (PAR-LOC-005).

    F3_design:
      mechanism: |
        Current state: Traditional SME has no visibility into peer adoption.
        They assume "nobody in my industry does this".

        Intervention: Personalized touchpoint (email/postcard/SMS) showing:
        "3 von 5 Restaurants in PLZ 8001 nutzen digitalONE. Ihre Konkurrenz
        ist sichtbar — Sie noch nicht."

        Format variants:
        a) Postcard with QR code (physical → digital bridge)
        b) Email with dynamic local stats
        c) SMS with local competitor count

        Key: Must be HYPERLOCAL (same postcode, same industry) for
        maximum σ_peer activation. Generic "10'000 Swiss SMEs" is weak.

      behavioral_mechanism: |
        Conditional cooperation (MS-SP-008): "If others do it, I should too"
        Social image (MS-SP-007): "I don't want to be the one left behind"
        Loss framing (MS-RD-001): Framed as "you're losing visibility"
        NOT "you could gain" — loss frame is 2.5× more effective.

      implementation:
        - "Build dynamic local stats database: digitalONE users per PLZ × industry"
        - "Generate personalized postcards/emails per SME"
        - "Include specific competitor names ONLY if consent given; otherwise use counts"
        - "QR code links to simplified comparison page (INT-LOC-001)"
        - "A/B test: postcard vs. email vs. SMS delivery channel"

    F4_target_structure:
      level: "IND"
      aggregation: "direct"

    F5_fepsde_dimension:
      primary: "S"  # Social
      secondary: "E"  # Emotional (fear of being left behind)
      weights: {F: 0.0, E: 0.25, P: 0.0, S: 0.65, D: 0.0, X: 0.1}

    F6_journey_phase:
      optimal_phases: ["awareness", "triggered"]
      phase_affinity:
        awareness: 0.9
        triggered: 0.8
        action: 0.4
        maintenance: 0.2
        stable: 0.1

    F7_funnel_mapping:
      primary_phase: "F1_REACH"
      secondary_phases: ["F2_INTEREST"]
      baseline_rate: 0.12
      projected_rate: 0.18
      uplift_factor: 1.50
      confidence: "MEDIUM"

    F8_parameters:
      primary:
        - par_id: "PAR-LOC-005"
          symbol: "σ_peer"
          baseline: 0.55
          projected: 0.55  # Parameter unchanged; intervention ACTIVATES it
          mechanism: "Makes peer adoption visible (currently invisible)"

    F9_segment:
      target: "BUS-02"
      segment_multiplier: 1.5
      backfire_risk: "low"
      sigma_effect: |
        Traditional SMEs are most susceptible to local peer influence.
        They know their neighborhood competitors personally.
        BUS-01 would see σ = 0.6 (already aware of digital landscape).

    F10_complementarity:
      interacts_with: ["INT-LOC-003"]
      gamma_effects:
        - pair: "INT-LOC-002 × INT-LOC-003"
          gamma: 0.45
          mechanism: "Social proof + smart default = γ_SD synergy"
          par_ref: "gamma_SD in localsearch_gamma_matrix.yaml"
      sequencing_requirement: "Deploy SIMULTANEOUSLY with INT-LOC-003 for max synergy"
      crowding_out_check:
        financial_component: false
        social_component: true
        conflict: "NONE — no financial incentive in this intervention"

    F11_autonomy:
      level: "information"
      reactance_risk: "low"
      autonomy_cues: ["Unsubscribe option", "No pressure to act"]

    F12_temporal_scope:
      scope: "operative"
      duration_weeks: 8
      persistence: "medium"
      decision_level: "L0"

    F13_measurement:
      primary_kpi: "F1 conversion rate (reach → interest)"
      secondary_kpis: ["postcard response rate", "QR scan rate", "email open rate"]
      measurement_method: "RCT: treatment PLZ vs. control PLZ"
      sample_size_required: 2000
      measurement_duration_weeks: 8

    F14_cost_estimate:
      implementation: "MEDIUM (personalized print + data pipeline)"
      ongoing: "LOW (automated after setup)"
      estimated_chf: 45000  # Print + postage for 2000 + data pipeline

    F15_risk_assessment:
      risks:
        - risk: "Local stats too low — '1 of 5 restaurants' is weak"
          probability: "MEDIUM"
          mitigation: "Only deploy in PLZ with ≥3 digitalONE users"
        - risk: "Perceived as spam"
          probability: "LOW"
          mitigation: "Physical postcard feels more legitimate than email"

    F16_ethical:
      manipulation_risk: "LOW"
      transparency: "Stats are real and verifiable"
      informed_consent: "Competitor names only with consent"

# ==============================================================================
# INTERVENTION 3: SMART DEFAULT UPGRADE PATH
# ==============================================================================
# Funnel target: F3_TRIAL + F4_CONVERSION
# 10C Target: WHEN (V) — Default Architecture
# Utility mechanism: u_D↑ (direct) + γ_SD synergy when combined with INT-LOC-002
# SYNERGY: γ_SD = +0.45 — social proof makes default feel legitimate

  - id: "INT-LOC-003"
    name: "Smart Default — One-Click Trial from Existing Listing"
    priority: 2
    deployment_phase: 2

    F1_title:
      id: "INT-LOC-003"
      name: "Smart Default — One-Click Trial from Existing Listing"

    F2_target_dimension:
      dimension_10c: "WHEN"
      delta_target: "κ_KON→"
      intervention_vector: "I_WHEN"
      description: |
        Transform the free listing admin dashboard into a trial activation
        gateway. When SME logs in to manage their free listing, they see
        a pre-configured digitalONE trial that can be activated with ONE click.
        All data auto-populated from existing account.

    F3_design:
      mechanism: |
        Current state: Trial requires new signup process, separate from
        existing listing. Mental model: "This is a NEW thing I must learn."

        Intervention: Trial appears as natural extension of what they already
        have. Mental model: "My listing just got better."

        Default architecture (MS-NU-002):
        - Pre-configured trial based on existing listing data
        - δ_premium = 0.40 (PAR-LOC-008) → 40% would accept if defaulted
        - Combined with social proof banner: "Upgrade wie 3 andere in Ihrer PLZ"
        - Auto-conversion after 30 days (δ_renewal = 0.75, PAR-LOC-007)

      synergy_with_social_proof: |
        γ_SD = +0.45 for BUS-02 (strongest positive complementarity).
        When SME sees BOTH "your neighbors use this" (INT-LOC-002) AND
        "click here to try for free" (INT-LOC-003), the combined effect
        exceeds the sum of parts by 45%.

        Mechanism: Social proof resolves the "is this legitimate?" concern
        that prevents default acceptance. The default resolves the
        "is this too much effort?" concern that prevents social proof
        from converting to action.

      implementation:
        - "Add 'Upgrade to digitalONE' banner in free listing dashboard"
        - "Pre-fill all trial fields from existing account data"
        - "Show social proof count next to CTA: 'X businesses in PLZ upgraded'"
        - "One-click activation, no credit card for trial"
        - "Auto-conversion to paid after 30 days (with 48h pre-notification)"
        - "Easy cancellation path (but require active decision to cancel)"

    F4_target_structure:
      level: "IND"
      aggregation: "direct"

    F5_fepsde_dimension:
      primary: "F"  # Financial (subscription upgrade)
      secondary: "D"  # Development (easier path to digital)
      weights: {F: 0.5, E: 0.0, P: 0.0, S: 0.1, D: 0.3, X: 0.1}

    F6_journey_phase:
      optimal_phases: ["triggered", "action"]
      phase_affinity:
        awareness: 0.2
        triggered: 0.85
        action: 0.90
        maintenance: 0.3
        stable: 0.1

    F7_funnel_mapping:
      primary_phase: "F3_TRIAL"
      secondary_phases: ["F4_CONVERSION"]
      F3_baseline: 0.25
      F3_projected: 0.50
      F3_uplift: 2.00
      F4_baseline: 0.30
      F4_projected: 0.45
      F4_uplift: 1.50
      confidence: "MEDIUM-HIGH"

    F8_parameters:
      primary:
        - par_id: "PAR-LOC-007"
          symbol: "δ_renewal"
          baseline: 0.75
          projected: 0.75
          mechanism: "Auto-conversion leverages existing default strength"
        - par_id: "PAR-LOC-008"
          symbol: "δ_premium"
          baseline: 0.40
          projected: 0.60
          mechanism: "Pre-configuration raises default acceptance from 40% to 60%"

    F9_segment:
      target: "BUS-02"
      segment_multiplier: 1.6
      backfire_risk: "low"
      sigma_effect: |
        Traditional SMEs already have free listings — the path is natural.
        BUS-01 would see σ = 0.8 (already comfortable with SaaS trials).
        BUS-04 would see σ = 1.2 (renovero users familiar with platform).

    F10_complementarity:
      interacts_with: ["INT-LOC-002"]
      gamma_effects:
        - pair: "INT-LOC-003 × INT-LOC-002"
          gamma: 0.45
          mechanism: "γ_SD synergy — social proof legitimizes the default"
      crowding_out_check:
        financial_component: false  # Trial is FREE, no financial incentive
        social_component: false  # Social proof is in INT-LOC-002, not here
        conflict: "NONE"

    F11_autonomy:
      level: "libertarian_paternalism"
      reactance_risk: "low"
      autonomy_cues:
        - "Clear 'Not now' option"
        - "No penalty for declining"
        - "48h advance notice before auto-conversion"
        - "One-click cancellation available"

    F12_temporal_scope:
      scope: "tactical"
      duration_weeks: 12
      persistence: "high"
      decision_level: "L1"

    F13_measurement:
      primary_kpi: "F3 conversion rate (evaluation → trial)"
      secondary_kpis: ["dashboard banner click rate", "trial-to-paid rate", "cancellation rate"]
      measurement_method: "A/B test: dashboard with vs. without upgrade path"
      sample_size_required: 1000
      measurement_duration_weeks: 12

    F14_cost_estimate:
      implementation: "MEDIUM (dashboard UX development)"
      ongoing: "LOW (automated)"
      estimated_chf: 35000

    F15_risk_assessment:
      risks:
        - risk: "Regulatory concern about auto-conversion"
          probability: "MEDIUM"
          mitigation: "48h advance notification, easy cancellation, Swiss consumer protection compliant"
        - risk: "High cancellation rate after auto-conversion"
          probability: "MEDIUM"
          mitigation: "Ensure value delivered during trial (link to INT-LOC-005)"

    F16_ethical:
      manipulation_risk: "MEDIUM"
      transparency: "Auto-conversion clearly communicated at signup and before conversion"
      informed_consent: "Yes — advance notification with opt-out"
      regulatory_note: "Must comply with Swiss UWG Art. 3 (unfair competition law)"

# ==============================================================================
# INTERVENTION 4: ZERO-LOSS TRIAL FRAMING
# ==============================================================================
# Funnel target: F3_TRIAL (25% → 50%, amplifying INT-LOC-003)
# 10C Target: WHAT (u_F) — Financial Framing
# Utility mechanism: u_F reframed (loss eliminated) + u_T reduced
# WARNING: Financial framing — must be in DIFFERENT stage than social proof!

  - id: "INT-LOC-004"
    name: "Zero-Loss Trial — Remove All Perceived Costs"
    priority: 3
    deployment_phase: 3

    F1_title:
      id: "INT-LOC-004"
      name: "Zero-Loss Trial — Remove All Perceived Costs"

    F2_target_dimension:
      dimension_10c: "WHAT"
      delta_target: "u_F↑"
      intervention_vector: "I_WHAT_F"
      description: |
        Eliminate ALL perceived losses from trial activation:
        no time cost (pre-configured), no money cost (free),
        no learning cost (identical to current interface),
        no commitment cost (cancel anytime, no questions).

    F3_design:
      mechanism: |
        Loss aversion (λ = 2.5, PAR-LOC-001) means Traditional SMEs
        weight potential losses 2.5× heavier than gains. For a FREE trial,
        the perceived losses are NOT financial — they are:

        L1: Time loss (learning new tool) → Addressed by pre-configuration
        L2: Autonomy loss (fear of being locked in) → Addressed by no-commitment guarantee
        L3: Identity loss (admitting "I need help") → Addressed by framing as natural upgrade
        L4: Control loss (sales pressure) → Addressed by no-sales-contact guarantee

        Zero-Loss Frame: "Nichts zu verlieren. Kein Vertrag. Kein Verkaufsgespräch.
        Kein neues Login. Ihr Eintrag wird einfach besser."

      behavioral_anchors:
        lambda_effective: |
          Baseline λ = 2.5 for marketing investment.
          Zero-Loss framing reduces PERCEIVED losses to near zero.
          Effective λ ≈ 1.0 (neutral) because losses are eliminated,
          not just reduced. This is more powerful than discounting.

      implementation:
        - "Guarantee banner: 'Kein Vertrag · Kein Risiko · Jederzeit kündbar'"
        - "No credit card required for trial"
        - "No sales call unless SME requests one"
        - "Same login, same dashboard — trial appears as enhancement"
        - "Explicit 'Wir rufen Sie NICHT an' promise"
        - "30-day trial with 3 concrete deliverables promised upfront"

    F4_target_structure:
      level: "IND"
      aggregation: "direct"

    F5_fepsde_dimension:
      primary: "F"
      secondary: "E"  # Emotional (reducing anxiety)
      weights: {F: 0.5, E: 0.3, P: 0.0, S: 0.0, D: 0.1, X: 0.1}

    F6_journey_phase:
      optimal_phases: ["triggered", "action"]
      phase_affinity:
        awareness: 0.3
        triggered: 0.85
        action: 0.90
        maintenance: 0.2
        stable: 0.1

    F7_funnel_mapping:
      primary_phase: "F3_TRIAL"
      secondary_phases: ["F2_INTEREST"]
      baseline_rate: 0.25
      projected_rate: 0.50
      uplift_factor: 2.00
      confidence: "MEDIUM-HIGH"

    F8_parameters:
      primary:
        - par_id: "PAR-LOC-001"
          symbol: "λ_marketing"
          baseline: 2.5
          projected_effective: 1.0
          mechanism: "Perceived losses eliminated (not reduced, eliminated)"
        - par_id: "PAR-LOC-011"
          symbol: "τ_time"
          baseline: "80 CHF/h"
          projected_effective: "~10 CHF/h"
          mechanism: "Pre-configuration reduces time investment from hours to minutes"

    F9_segment:
      target: "BUS-02"
      segment_multiplier: 2.0  # Highest loss aversion segment
      backfire_risk: "none"

    F10_complementarity:
      interacts_with: ["INT-LOC-001", "INT-LOC-003"]
      gamma_effects:
        - pair: "INT-LOC-004 × INT-LOC-001"
          gamma: 0.20
          mechanism: "Simple product makes zero-loss claim credible"
