# =============================================================================
# INTERVENTION 1: CU-Champions Netzwerk
# =============================================================================
interventions:
  - # F1: Title/Label
    F1_title:
      id: "INT-ZIN-001"
      name: "CU-Champions Netzwerk"
      short_name: "Champions"

    # F2: 10C Target Dimension
    F2_target_dimension:
      dimension_10c: "WHO"
      delta_target: "u_S↑"
      intervention_vector: "I_WHO_o"
      description: "Soziale Utility durch Peer-Champions erhöhen"

    # F3: Mechanism (from Theory Catalog)
    F3_mechanism:
      theory_id: "MS-IF-008"
      theory_name: "Social Proof"
      authors: "Cialdini (1984)"
      mechanism: "Peer-Einfluss durch lokale Opinion Leaders"
      ebf_pathway: "Champions → Beobachtung → Nachahmung → u_S↑"

    # F4: Target Structure
    F4_target_structure:
      level: "COL"
      aggregation: "emergent"
      target_group: "9-köpfiges Kernteam + Baustellen-Teams"
      n_targets: 50

    # F5: FEPSDE Dimension
    F5_fepsde_dimension:
      primary: "S"
      secondary: "X"
      weights:
        F: 0.0
        E: 0.10
        P: 0.0
        S: 0.70
        D: 0.05
        X: 0.15

    # F6: Journey Phase
    F6_journey_phase:
      optimal_phases: ["awareness", "triggered", "action"]
      phase_affinity:
        awareness: 0.85
        triggered: 0.90
        action: 0.80
        maintenance: 0.65
        stable: 0.50

    # F7: Framing Logic
    F7_framing:
      frame_type: "social"
      loss_gain_frame: "gain"
      message_template: "Deine Kollegen bei [Team] machen bereits mit – werde Teil der Zukunft!"

    # F8: Autonomy Level
    F8_autonomy:
      level: "voluntary"
      reactance_risk: "low"
      autonomy_cue_required: false
      autonomy_message: null

    # F9: Expected Effect Size
    F9_effect_size:
      point_estimate: 0.25
      ci_95: [0.15, 0.35]
      effect_type: "adoption_increase"
      source: "LLMMC + Zindel Context (starke Teamkultur)"

    # F10: Complementarity
    F10_complementarity:
      positive_synergies:
        - pair: [INT-ZIN-001, INT-ZIN-005]
          gamma: 0.35
          mechanism: "Social × Existential: Team verstärkt Sinn"
        - pair: [INT-ZIN-001, INT-ZIN-002]
          gamma: 0.25
          mechanism: "Champions × Retrospektiven: Verstärkung"
      negative_synergies:
        - pair: [INT-ZIN-001, INT-ZIN-006]
          gamma: -0.15
          mechanism: "CROWDING-OUT: Financial untergräbt Social"
          warning: "INT-ZIN-006 ERST ab Monat 6!"

    # F11: Side Effect Risk
    F11_side_effects:
      risk_level: "low"
      potential_risks:
        - risk: "Champion-Burnout"
          probability: 0.15
          mitigation: "Rotation alle 2 Monate"
        - risk: "In-Group/Out-Group"
          probability: 0.10
          mitigation: "Alle können Champion werden"

    # F12: Temporal Scope
    F12_temporal_scope:
      scope: "tactical"
      duration_weeks: 32
      persistence: "high"
      decision_level: "L1"
      start_month: 1
      end_month: 8

    # F13: Resource Requirements
    F13_resources:
      budget_chf: 5000
      fte_hours: 40
      materials: "Champion-Kit (T-Shirt, Badge, Handbuch)"
      dependencies: ["Kick-off Workshop"]

    # F14: Implementation Steps
    F14_implementation:
      steps:
        - step: 1
          action: "Champions identifizieren (Arno Solèr + 3-4 weitere)"
          week: 1
        - step: 2
          action: "Champion-Training (2h Workshop)"
          week: 2
        - step: 3
          action: "Wöchentliche Champion-Meetings starten"
          week: 3
        - step: 4
          action: "Rotation nach 8 Wochen"
          week: 9

    # F15: Success Metrics
    F15_metrics:
      primary_kpi: "# aktive Champions"
      target_value: 5
      secondary_kpis:
        - "# Peer-Interaktionen/Woche"
        - "Champion-Zufriedenheit (1-5)"

    # F16: Monitoring Plan
    F16_monitoring:
      frequency: "weekly"
      responsible: "Projektleiter"
      dashboard: true
      alert_threshold: "< 3 aktive Champions"

    # F17: Adjustment Rules
    F17_adjustment:
      triggers:
        - condition: "Champion-Dropout > 2"
          action: "Sofort neue Champions rekrutieren"
        - condition: "Peer-Interaktionen < 5/Woche"
          action: "Champion-Incentives prüfen (NICHT finanziell!)"

    # F18: Exit Criteria
    F18_exit:
      success_criteria: "≥80% kennen mindestens 1 Champion"
      failure_criteria: "< 3 Champions nach Monat 2"
      transition: "Übergang zu informellem Netzwerk"

    # F19: Documentation
    F19_documentation:
      templates: ["Champion-Handbuch", "Wöchentlicher Report"]
      storage: "SharePoint/ZIN003/Champions"

    # F20: Learnings Capture
    F20_learnings:
      review_schedule: "Monat 3, Monat 6, Monat 8"
      learning_questions:
        - "Welche Champion-Eigenschaften sind erfolgskritisch?"
        - "Wie oft sollte rotiert werden?"

