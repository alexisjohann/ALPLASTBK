# =============================================================================
  # INTERVENTION 7: Entscheidungsarchitektur (NEU aus Diagnose v2.0)
  # =============================================================================
  - F1_title:
      id: "INT-ZIN-007"
      name: "CU-Entscheidungsarchitektur"
      short_name: "Entscheidungen"
      diagnosis_origin: "v2.0 - Handeln unter Unsicherheit"

    F2_target_dimension:
      dimension_10c: "HOW"
      delta_target: "γ→"
      intervention_vector: "I_HOW"
      description: "Komplementarität in firmenübergreifenden Entscheidungen erhöhen"
      rationale: |
        Zindel's Realität: Entscheidungen betreffen mehrere Einheiten gleichzeitig.
        Risiken sind früh sichtbar, aber schwer abschliessend bewertbar.
        → Unsicherheit führt zu Vertagung statt zu Handeln.

    F3_mechanism:
      theory_id: "Decision Architecture"
      theory_name: "Type 1 vs Type 2 Decisions (Bezos Framework)"
      authors: "Bezos (2016), Kahneman (System 1/2)"
      mechanism: |
        Reversibilität als Entscheidungs-Heuristik:
        - Type 1 (irreversibel): Sorgfältige Analyse, mehr Zeit
        - Type 2 (reversibel): Schnelle Entscheidung, schnelles Lernen
      ebf_pathway: "Klassifikation → Klarheit → Handlung → γ↑"

    F4_target_structure:
      level: "COL"
      aggregation: "institutional"
      target_group: "Entscheidungsträger aller Ebenen"
      n_targets: 30

    F5_fepsde_dimension:
      primary: "D"
      secondary: "S"
      weights:
        F: 0.05
        E: 0.15
        P: 0.0
        S: 0.25
        D: 0.45
        X: 0.10

    F6_journey_phase:
      optimal_phases: ["triggered", "action", "maintenance"]
      phase_affinity:
        awareness: 0.60
        triggered: 0.85
        action: 0.95
        maintenance: 0.90
        stable: 0.80

    F7_framing:
      frame_type: "procedural"
      loss_gain_frame: "gain"
      message_template: |
        "Ist diese Entscheidung reversibel (Type 2)?
        → Dann: Entscheide JETZT, lerne schnell!
        → Wenn nicht: Wer muss noch involviert werden?"

    F8_autonomy:
      level: "guided"
      reactance_risk: "low"
      autonomy_cue_required: true
      autonomy_message: "Du entscheidest, ob Type 1 oder Type 2 - das Framework hilft nur bei der Klassifikation."

    F9_effect_size:
      point_estimate: 0.30
      ci_95: [0.20, 0.40]
      effect_type: "decision_speed_increase"
      source: "Bezos Letters, Agile Decision Studies"

    F10_complementarity:
      positive_synergies:
        - pair: [INT-ZIN-007, INT-ZIN-008]
          gamma: 0.45
          mechanism: "Entscheidungen × Lern-Loops: Schnelle Entscheidungen + systematisches Lernen"
        - pair: [INT-ZIN-007, INT-ZIN-002]
          gamma: 0.30
          mechanism: "Retros reflektieren Entscheidungsqualität"
        - pair: [INT-ZIN-007, INT-ZIN-003]
          gamma: 0.25
          mechanism: "Training vermittelt Entscheidungs-Framework"
      negative_synergies: []

    F11_side_effects:
      risk_level: "medium"
      potential_risks:
        - risk: "Über-Vereinfachung komplexer Entscheidungen"
          probability: 0.20
          mitigation: "Klare Eskalationspfade für echte Type-1 Entscheidungen"
        - risk: "Framework-Müdigkeit"
          probability: 0.15
          mitigation: "Leichtgewichtig halten, in bestehende Meetings integrieren"

    F12_temporal_scope:
      scope: "strategic"
      duration_weeks: 32
      persistence: "very_high"
      decision_level: "L1-L2"
      start_month: 1
      end_month: 8

    F13_resources:
      budget_chf: 4000
      fte_hours: 32
      materials: "Entscheidungs-Canvas, Type 1/2 Checkliste"
      dependencies: ["Kernteam-Buy-In", "Bestehende Meeting-Strukturen"]

    F14_implementation:
      steps:
        - step: 1
          action: "Entscheidungs-Framework mit Kernteam entwickeln"
          week: 1-2
        - step: 2
          action: "Pilot: Type 1/2 Klassifikation in Pilot-Meetings"
          week: 3-4
        - step: 3
          action: "Rollout auf alle CU-relevanten Entscheidungen"
          week: 5
        - step: 4
          action: "Monatliche Retro: Welche Entscheidungen waren Type 2?"
          week: 8+

    F15_metrics:
      primary_kpi: "# Type-2 Entscheidungen/Monat"
      target_value: 10
      secondary_kpis:
        - "Durchschnittliche Entscheidungs-Zeit (Type 2)"
        - "# vertagte Entscheidungen (sollte sinken)"
        - "Entscheidungs-Zufriedenheit (1-5)"

    F16_monitoring:
      frequency: "bi-weekly"
