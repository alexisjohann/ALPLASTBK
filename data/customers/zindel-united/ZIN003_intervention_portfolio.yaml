        Strukturierte Lern-Zyklen:
        1. Lern-Hypothese: "Wir glauben, dass X zu Y führt"
        2. Experiment: "Wir testen X in Pilot Z"
        3. Lern-Protokoll: "Was ist passiert? Warum?"
