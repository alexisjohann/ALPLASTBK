      reactance_risk: "low"
      autonomy_cue_required: false

    F9_effect_size:
      point_estimate: 0.25
      ci_95: [0.15, 0.35]
      effect_type: "learning_rate_increase"
      source: "Action Learning Studies, Organizational Learning Literature"

    F10_complementarity:
      positive_synergies:
        - pair: [INT-ZIN-008, INT-ZIN-007]
          gamma: 0.45
          mechanism: "Lern-Loops × Entscheidungen: Schnelle Type-2 Entscheidungen generieren Lern-Material"
        - pair: [INT-ZIN-008, INT-ZIN-002]
          gamma: 0.40
          mechanism: "Retros → Lern-Hypothesen → Experimente"
        - pair: [INT-ZIN-008, INT-ZIN-004]
          gamma: 0.35
