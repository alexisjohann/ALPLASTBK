metadata:
  model_id: ZIN003-ODE-v1.0
  model_name: Kreislaufwirtschaft Behavior Dynamics
  created: '2026-02-02'
  method: LLMMC + Bayesian Update
  context_factors_used: 983
  literature_sources: 12
utility_growth_rates:
  alpha_F:
    name: Financial Utility Growth
    prior_source: Thaler & Sunstein (2008), ROI studies
    prior_mean: 0.08
    prior_sd: 0.02
    context_adjustment: +0.02 (ROI 6.2% in CH CE)
    posterior_mean: 0.1
    posterior_sd: 0.015
    ci_95:
    - 0.07
    - 0.13
    unit: per month
    interpretation: Financial benefits accumulate at 10%/month when interventions
      active
  alpha_E:
    name: Emotional Utility Growth
    prior_source: Kahneman (2011), Affect heuristic
    prior_mean: 0.12
    prior_sd: 0.03
    context_adjustment: +0.03 (Familienunternehmen, hohe Identifikation)
    posterior_mean: 0.15
    posterior_sd: 0.025
    ci_95:
    - 0.1
    - 0.2
    unit: per month
    interpretation: Emotional engagement grows faster due to family business identity
  alpha_P:
    name: Physical/Effort Utility Growth
    prior_source: Deci & Ryan (2000), Effort studies
    prior_mean: 0.05
    prior_sd: 0.02
    context_adjustment: -0.01 (Baubranche = physisch anspruchsvoll)
    posterior_mean: 0.04
    posterior_sd: 0.015
    ci_95:
    - 0.01
    - 0.07
    unit: per month
    interpretation: Effort reduction grows slowly - new processes initially more work
  alpha_S:
    name: Social Utility Growth
    prior_source: Cialdini (2007), Social proof studies
    prior_mean: 0.1
    prior_sd: 0.03
    context_adjustment: +0.05 (9-köpfiges Kernteam, starke Teamkultur)
    posterior_mean: 0.15
    posterior_sd: 0.03
    ci_95:
    - 0.09
    - 0.21
    unit: per month
    interpretation: Social dynamics amplified by tight-knit team structure
  alpha_D:
    name: Development Utility Growth
    prior_source: Dweck (2006), Growth mindset
    prior_mean: 0.08
    prior_sd: 0.02
    context_adjustment: '+0.02 (Innovationskultur: Invias AG, TorAlva)'
    posterior_mean: 0.1
    posterior_sd: 0.02
    ci_95:
    - 0.06
    - 0.14
    unit: per month
    interpretation: Learning grows steadily with pilot projects
  alpha_X:
    name: Existential Utility Growth
    prior_source: Frankl (1959), Meaning literature
    prior_mean: 0.06
    prior_sd: 0.02
    context_adjustment: +0.04 (8. Generation, "Zukunft bauen" Narrativ)
    posterior_mean: 0.1
    posterior_sd: 0.025
    ci_95:
    - 0.05
    - 0.15
    unit: per month
    interpretation: Purpose/legacy dimension strong due to generational continuity
utility_decay_rates:
  delta_F:
    name: Financial Utility Decay
    posterior_mean: 0.03
    ci_95:
    - 0.02
    - 0.04
    unit: per month
    interpretation: Financial benefits remembered well (low decay)
  delta_E:
    name: Emotional Utility Decay
    posterior_mean: 0.08
    ci_95:
    - 0.05
    - 0.11
    unit: per month
    interpretation: Emotions fade faster without reinforcement
  delta_P:
    name: Physical Utility Decay
    posterior_mean: 0.02
    ci_95:
    - 0.01
    - 0.03
    unit: per month
    interpretation: Once effort reduced, stays reduced
  delta_S:
    name: Social Utility Decay
    posterior_mean: 0.06
    ci_95:
    - 0.04
    - 0.08
    unit: per month
    interpretation: Social recognition needs ongoing visibility
  delta_D:
    name: Development Utility Decay
    posterior_mean: 0.04
    ci_95:
    - 0.02
    - 0.06
    unit: per month
    interpretation: Skills decay slowly with practice
  delta_X:
    name: Existential Utility Decay
    posterior_mean: 0.02
    ci_95:
    - 0.01
    - 0.03
    unit: per month
    interpretation: Purpose once found is stable
