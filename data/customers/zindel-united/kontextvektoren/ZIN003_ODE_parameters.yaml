process_dynamics:
  beta_adoption:
    name: Adoption Rate (S-Curve)
    prior_source: Bass (1969), Rogers (2003)
    prior_mean: 0.4
    context_adjustment: +0.1 (starke Führung durch Andreas Zindel)
    posterior_mean: 0.5
    ci_95:
    - 0.35
    - 0.65
    unit: per month
    interpretation: Moderate-fast adoption due to CEO sponsorship
  rho_resistance_decay:
    name: Resistance Decay Rate
    prior_source: Rogers (2003), Innovation resistance
    prior_mean: 0.03
    context_adjustment: '+0.01 (Innovationsgeschichte: Prix SVC)'
    posterior_mean: 0.04
    ci_95:
    - 0.02
    - 0.06
    unit: per month
    interpretation: Resistance breaks down as evidence accumulates
  r_setback_sensitivity:
    name: Setback Sensitivity
    posterior_mean: 0.15
    ci_95:
