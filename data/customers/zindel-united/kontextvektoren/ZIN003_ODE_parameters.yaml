    - 0.2
    unit: per event
    interpretation: How much resistance rebounds after setbacks
  eta_habit_formation:
    name: Habit Formation Rate
    prior_source: 'Lally et al. (2010): 66 days average'
    prior_mean: 0.015
    context_adjustment: None (robust finding)
    posterior_mean: 0.015
    ci_95:
    - 0.01
    - 0.02
    unit: per day
    monthly_equivalent: 0.45
    interpretation: 66 days to form habit (well-established)
  mu_momentum:
    name: Momentum Build-up
    posterior_mean: 0.08
    ci_95:
    - 0.05
    - 0.11
    unit: per success event
    interpretation: Each success builds organizational momentum
  friction:
