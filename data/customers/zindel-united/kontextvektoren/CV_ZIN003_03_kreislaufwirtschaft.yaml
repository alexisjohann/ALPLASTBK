- id: GEI-DES-F03
  dimension: Design & Produktionsprinzipien
  faktor: Zero-Waste-Design & Materialeffizienz
  definition: Produktionsprozesse sollen so gestaltet werden, dass keine Abfälle entstehen
    und Reststoffe als Input für neue Prozesse genutzt werden.
  kontext: 'In der Bauwirtschaft: Abfallarme Fertigung, additive Produktion und modulare
    Vorfertigung senken Materialverluste.'
  salienz: 0.85
  indikator: Abfallreduktionsrate pro Projekt (%)
  gruende: 1. Paper integriert Zero-Waste in CE-Kernlogik. 2. Hohe strategische Relevanz
