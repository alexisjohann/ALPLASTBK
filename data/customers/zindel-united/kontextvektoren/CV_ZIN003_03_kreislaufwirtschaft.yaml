- id: GEI-BUS-F01
  dimension: Geschäftsmodelle & Wertschöpfungslogiken
  faktor: Leistungs- statt Produktorientierung
  definition: Das Paper betont den Übergang von produkt- zu leistungsorientierten
    Geschäftsmodellen („Product-as-a-Service“), bei denen der Nutzen und nicht der
    Besitz im Vordergrund steht.
  kontext: 'In der Bauindustrie: Gebäudenutzung als Dienstleistung, z. B. Licht- oder
    Flächenleasing, anstelle klassischer Eigentumsmodelle.'
  salienz: 0.9
  indikator: Anteil servicebasierter Modelle in der Branche (%)
