    psi_dimension: Ψ_E
- id: GEI-MAT-F01
  dimension: Material- & Stoffkreisläufe
  faktor: Biologische und technische Zyklen
  definition: Die Circular Economy unterscheidet zwischen biologischen und technischen
    Kreisläufen. Biologische Stoffe können in natürliche Systeme zurückgeführt werden,
    technische Materialien müssen zirkulär wiederverwendet oder recycelt werden.
  kontext: 'In der Bauindustrie: Holz, Lehm oder Natursteine gehören zu biologischen
    Zyklen, während Beton, Stahl und Glas technische Kreisläufe bilden.'
  salienz: 0.95
  indikator: Anteil wiederverwertbarer Materialien pro Baustoffklasse (%)
  gruende: 1. Fundamentales Unterscheidungskriterium im Paper. 2. Operationalisierbar
    über Materialflussanalysen. 3. Zentrale Relevanz für Baustoffstrategie.
  datenpunkt: 68 % der Baumaterialien mit technischem Kreislaufpotenzial
  trend: steigend
  unsicherheit: niedrig
  risiko_chance: Chance
  staerke_schwaeche: Stärke
  beeinflussbarkeit: hoch
  ebf_mapping:
    10c_dimensions:
    - WHAT
    psi_dimension: Ψ_E
- id: GEI-MAT-F02
  dimension: Material- & Stoffkreisläufe
  faktor: 3R-Prinzipien – Reduce, Reuse, Recycle
  definition: 'Die 3R bilden die Kernhierarchie der Ressourcennutzung: Vermeidung,
    Wiederverwendung, Recycling. Im Paper als primärer Mechanismus der Entropievermeidung
    beschrieben.'
  kontext: 'In der Bauwirtschaft: Materialeffizienz (Reduce), Wiederverwendung von
    Bauelementen (Reuse) und stoffliches Recycling (Recycle) strukturieren Kreisläufe.'
  salienz: 1.0
  indikator: Materialeffizienzindex (0–1)
  gruende: 1. Wissenschaftlich an die thermodynamische Logik gekoppelt. 2. Praktisch
    messbar. 3. Politisch anschlussfähig (EU CE Action Plan).
  datenpunkt: Index 0.72 (CH Bau 2024)
  trend: steigend
  unsicherheit: niedrig
  risiko_chance: Chance
  staerke_schwaeche: Stärke
  beeinflussbarkeit: hoch
  ebf_mapping:
    10c_dimensions:
    - WHAT
    psi_dimension: Ψ_E
- id: GEI-MAT-F03
  dimension: Material- & Stoffkreisläufe
  faktor: Entropieprinzip und Energiebedarf
  definition: Nach Georgescu-Roegen ist jede Form der Ressourcennutzung durch Entropiezunahme
    begrenzt. Die CE zielt darauf ab, Stoffströme energetisch effizient zu schließen.
  kontext: 'In der Bauindustrie: Recyclingprozesse verursachen hohen Energieeinsatz,
    daher ist geschlossene Zirkularität oft nur partiell realisierbar.'
  salienz: 0.8
  indikator: Energieaufwand pro Recycling-Tonne (kWh/t)
  gruende: 1. Zentrale physikalische Einschränkung. 2. Paper weist auf Energie-Ressourcen-Dilemma
    hin. 3. Relevanz für Nachhaltigkeitsbewertung.
  datenpunkt: 140 kWh/t Betonrecycling (CH Ø)
  trend: stabil
  unsicherheit: mittel
  risiko_chance: Risiko & Chance
  staerke_schwaeche: Schwäche
  beeinflussbarkeit: mittel
  ebf_mapping:
    10c_dimensions:
    - WHAT
    psi_dimension: Ψ_E
- id: GEI-DES-F01
  dimension: Design & Produktionsprinzipien
  faktor: Design for Reuse & Disassembly
  definition: Produkte und Gebäude sollen so gestaltet werden, dass sie leicht demontierbar
    und wiederverwendbar sind – ein zentrales Prinzip des regenerativen Designs.
  kontext: 'In der Bauindustrie: modulare Bauteile, lösbare Verbindungen und Materialpässe
    fördern Wiederverwendung nach der Nutzungsphase.'
  salienz: 0.95
  indikator: Anteil modularer, rückbaubarer Bauelemente (%)
  gruende: 1. Höchster Hebel für Ressourceneffizienz. 2. Direkt beeinflussbar im Bauwesen.
    3. Kernprinzip im CE-Designansatz.
  datenpunkt: 28 % modular rückbaubar (CH Bau, 2025)
  trend: steigend
  unsicherheit: mittel
  risiko_chance: Chance
  staerke_schwaeche: Stärke
  beeinflussbarkeit: hoch
