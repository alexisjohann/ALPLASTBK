  dimension: Design & Produktionsprinzipien
  faktor: Cradle-to-Cradle & Biomimetik
  definition: Das C2C-Prinzip und biomimetische Ansätze orientieren sich an natürlichen
    Kreisläufen, um Abfall zu vermeiden und Regeneration zu ermöglichen.
  kontext: 'In der Bauwirtschaft: Einsatz von C2C-zertifizierten Materialien und biologisch
