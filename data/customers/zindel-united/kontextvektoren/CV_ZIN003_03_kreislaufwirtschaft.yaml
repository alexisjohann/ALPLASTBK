faktoren:
- id: GEP-DEF-F01
  dimension: Definition & Kernlogik
  faktor: Kernbegriff der Circular Economy
  definition: Wirtschaftssystem, das auf der restaurativen und regenerativen Nutzung
    von Ressourcen basiert; Produkte, Materialien und Komponenten sollen stets ihren
    höchsten Nutzenwert behalten.
  kontext: 'In der Bauindustrie: Materialien (z. B. Beton, Holz, Metalle) werden so
    genutzt, dass sie nicht zu Abfall werden, sondern wiederverwendet oder rückgebaut
    werden können.'
  salienz: 1.0
  indikator: Anteil wiederverwendbarer Materialien, Materialnutzungsgrad (%)
  gruende: 1. Kernbegriff laut Ellen MacArthur Foundation. 2. Von Geisendorf & Pietrulla
    als zentrale Definition herausgearbeitet. 3. Messbar über Materialflussanalysen.
  datenpunkt: 80 % Materialrückführungspotenzial (theoretisch)
  trend: steigend
  unsicherheit: mittel
  risiko_chance: Chance
  staerke_schwaeche: Stärke
  beeinflussbarkeit: hoch
  ebf_mapping:
    10c_dimensions:
    - WHAT
    psi_dimension: Ψ_E
- id: GEP-DEF-F02
  dimension: Definition & Kernlogik
  faktor: Abgrenzung zu verwandten Konzepten
  definition: Circular Economy integriert, unterscheidet sich aber klar von verwandten
    Konzepten wie Cradle-to-Cradle, Industrial Ecology und Blue Economy – sie geht
    über reine Effizienz oder Abfallreduktion hinaus.
  kontext: 'In der Bauwirtschaft: zirkuläre Prinzipien umfassen nicht nur Recycling
    (Industrial Ecology), sondern auch Design for Reuse (C2C) und lokale Wertschöpfung
    (Blue Economy).'
  salienz: 0.9
  indikator: Umfang der integrierten Prinzipien in Bauprojekten (%)
  gruende: 1. Paper führt systematische Konzeptvergleichsmatrix ein. 2. Ermöglicht
    klare Abgrenzung im Diskurs. 3. Relevant für interdisziplinäre CE-Projekte.
  datenpunkt: 7 verwandte Konzepte identifiziert
  trend: steigend
  unsicherheit: niedrig
  risiko_chance: Chance
  staerke_schwaeche: Stärke
  beeinflussbarkeit: mittel
  ebf_mapping:
    10c_dimensions:
    - WHAT
    psi_dimension: Ψ_E
- id: GEP-DEF-F03
  dimension: Definition & Kernlogik
  faktor: Core vs. Framing Conditions
  definition: Trennung zwischen Kerneigenschaften der CE (z. B. Ressourcenzirkulation)
    und Rahmenbedingungen (Profitabilität, soziale Effekte, politische Steuerung).
  kontext: 'Für den Bausektor zentral: CE kann auch ohne kurzfristige Profitabilität
    sinnvoll sein, wenn politische und normative Enabler greifen.'
  salienz: 0.95
  indikator: Anteil der Projekte, die Circularity unabhängig von Profitabilität umsetzen
  gruende: 1. Neue begriffliche Präzision im Paper. 2. Ermöglicht klare Politik- und
    Forschungszuordnung. 3. Relevanz für öffentliche Infrastrukturprojekte.
  datenpunkt: 60 % theoretisch reine „Core“-Merkmale
  trend: stabil
  unsicherheit: niedrig
  risiko_chance: Chance
  staerke_schwaeche: Stärke
  beeinflussbarkeit: hoch
  ebf_mapping:
    10c_dimensions:
    - WHAT
    psi_dimension: Ψ_E
- id: GEI-SYS-F01
  dimension: Systemebenen & Skalierungsebenen
  faktor: Mikroebene – Produkt & Unternehmen
  definition: Die Mikroebene der Circular Economy umfasst einzelne Produkte, Materialien
    oder Unternehmen und beschreibt, wie Ressourcenschlüsselelemente auf betrieblicher
    Ebene zirkulär gestaltet werden können.
  kontext: 'In der Bauwirtschaft: Unternehmen implementieren Rückbaukonzepte, Materialpässe
    oder Design-for-Reuse-Prinzipien auf Projektebene.'
  salienz: 0.9
  indikator: Anteil Unternehmen mit zirkulären Produkt- oder Materialstrategien (%)
  gruende: 1. Mikroebene bildet die operative Basis aller CE-Anwendungen. 2. Praktische
    Umsetzbarkeit in der Bauwirtschaft. 3. Hohe Innovationsnähe.
  datenpunkt: 35 % der Unternehmen mit Pilotprojekten (CH, 2025)
  trend: steigend
  unsicherheit: mittel
  risiko_chance: Chance
  staerke_schwaeche: Stärke
  beeinflussbarkeit: hoch
  ebf_mapping:
    10c_dimensions:
    - WHAT
    psi_dimension: Ψ_E
- id: GEI-SYS-F02
  dimension: Systemebenen & Skalierungsebenen
  faktor: Mesoebene – Industrielle Symbiosen & Netzwerke
  definition: Die Mesoebene umfasst industrielle Netzwerke und regionale Cluster,
    die Stoff- und Energiekreisläufe verbinden (z. B. „Eco-Industrial Parks“).
  kontext: 'In der Bauindustrie: lokale Wertstoffhöfe, Wiederverwendungsplattformen
    und Materialbörsen schaffen Symbiosen zwischen Abbruch-, Recycling- und Produktionsbetrieben.'
  salienz: 0.85
  indikator: Anzahl regionaler Materialaustausch-Netzwerke / Jahr
  gruende: 1. Zentrale Zwischenebene zwischen Mikro und Makro. 2. Direkt politisch
    beeinflussbar. 3. Relevanz für Ressourceneffizienz.
  datenpunkt: 17 aktive Netzwerke (CH, 2024)
  trend: steigend
  unsicherheit: mittel
  risiko_chance: Chance
  staerke_schwaeche: Stärke
  beeinflussbarkeit: mittel
  ebf_mapping:
    10c_dimensions:
    - WHAT
    psi_dimension: Ψ_E
- id: GEI-SYS-F03
  dimension: Systemebenen & Skalierungsebenen
  faktor: Makroebene – Volkswirtschaft & Politik
  definition: Die Makroebene beschreibt die Circular Economy als gesamtwirtschaftliches
    System, das durch Regulierungen, Anreizmechanismen und makroökonomische Steuerung
    stabilisiert wird.
  kontext: 'In der Schweiz: Strategien auf Bundes- und Kantonsebene zur Ressourcenschonung
    (z. B. Kreislaufwirtschafts-Aktionsplan 2025).'
  salienz: 0.95
  indikator: Existenz und Tiefe nationaler CE-Strategien (0–1 Index)
  gruende: 1. Politische Rahmenbedingungen bestimmen Skalierbarkeit. 2. Paper betont
    Governance-Abhängigkeit. 3. Notwendig für Sektoren wie Bau mit Langzyklus-Investitionen.
  datenpunkt: Index 0.8 (hohe Policy-Dichte)
  trend: stabil
  unsicherheit: niedrig
  risiko_chance: Chance
  staerke_schwaeche: Stärke
  beeinflussbarkeit: hoch
