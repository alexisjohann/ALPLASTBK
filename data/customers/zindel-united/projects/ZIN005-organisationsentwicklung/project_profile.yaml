# =============================================================================
# PROJECT OVERVIEW
# =============================================================================

overview:
  title: "Organisationsentwicklung bei Zindel United – Führung, Struktur und Wertschöpfung"

  description: |
    Zindel United steht als Familienunternehmen in der 8. Generation vor der
    Herausforderung, strategische Weichenstellungen (Kreislaufwirtschaft,
    INKOH-M&A, Führungsentwicklung) in nachhaltige Wertschöpfung zu übersetzen.

    Dieses Projekt wendet erstmals das FA-SM-1.0 (FehrAdvice Strategy Model) an:
    Die zentrale Erkenntnis ist, dass Strategie OHNE Verhaltensintegration nicht
    umsetzbar ist, und Strategie NUR an Verhaltenszielen ausgerichtet auch nicht
    funktioniert — weil Verhalten nur Mittel zum Zweck ist.

    Das ultimative Ziel ist WERTSCHÖPFUNG.

  strategic_context: |
    Zindel United hat in den letzten Monaten drei parallele strategische
    Stossrichtungen verfolgt:
    1. ZIN003: Kreislaufwirtschaft (laufend, Kickoff Feb 2026)
    2. INKOH AG M&A: 60%-Verkauf an Holcim/Axpo/Terre Suisse Konsortium
    3. Führungsentwicklung: Nächste Führungsgeneration aufbauen

    Diese drei Stossrichtungen sind nicht unabhängig — sie interagieren.
    FA-SM-1.0 modelliert genau diese Wechselwirkungen.

  why_fa_sm: |
    Das FA-SM-1.0 korrigiert die kausale Kette:

      WERTSTEIGERUNG (Ziel)  ←  VERHALTEN (Hebel)  ←  KONTEXT-DESIGN (Instrument)
           V(t)                     B(t)                    Ψ(t)

    Für Zindel bedeutet das:
    - V(t): Was ist der Unternehmenswert in 3-5 Jahren?
    - B(t): Welches Verhalten der Führung, des Managements, der Mitarbeitenden
            und der externen Stakeholder erzeugt diesen Wert?
    - Ψ(t): Welche Kontextbedingungen (Governance, Anreize, Information,
            Kultur, Fähigkeiten) müssen geschaffen werden?

# =============================================================================
# FA-SM LAYER 0: WERTSCHÖPFUNGSZIEL
# =============================================================================

fa_sm_layer_0:
  _note: "Was ist das Wertschöpfungsziel für Zindel United?"

  value_dimensions:
    V_F:
      name: "Finanzielle Wertschöpfung"
      weight: 0.25
      targets:
        - metric: "EBITDA-Marge"
          current: "~5-7%"
          target: "8-10%"
          horizon: "3 Jahre"
        - metric: "Umsatzwachstum"
          current: "~2-3%"
          target: "5-8%"
          horizon: "3 Jahre"
          note: "Durch Kreislaufwirtschaft + neue Geschäftsmodelle"
        - metric: "INKOH-Erlös optimiert"
          target: "Faire Bewertung bei 60%-Verkauf"
          horizon: "2026"

    V_S:
      name: "Strategische Wertschöpfung"
      weight: 0.25
      targets:
        - metric: "Marktposition Kreislaufwirtschaft GR/CH"
          current: "Follower"
          target: "Regionaler Vorreiter"
          horizon: "3-5 Jahre"
        - metric: "Diversifikation"
          current: "Baugewerbe-lastig"
          target: "Bau + Circular + Energie (via INKOH)"
          horizon: "5 Jahre"
        - metric: "Familien-DNA gesichert"
          target: "Governance schützt Werte auch als 40%-Aktionär"
          horizon: "2026"

    V_O:
      name: "Organisationale Wertschöpfung"
      weight: 0.25
      targets:
        - metric: "Führungsqualität"
          current: "Abhängig von Andreas Zindel"
          target: "Breite Führungsmannschaft (5-8 Leader)"
          horizon: "2-3 Jahre"
        - metric: "Entscheidungsgeschwindigkeit"
          current: "Teilweise träge"
          target: "48h-Regel in allen Schlüsselprozessen"
          horizon: "1 Jahr"
        - metric: "Organisationale Resilienz"
          target: "Funktionsfähig auch bei Key-Person-Ausfall"
          horizon: "2-3 Jahre"

    V_C:
      name: "Kundenwertschöpfung"
      weight: 0.15
      targets:
        - metric: "Kundenzufriedenheit Bauherren"
          target: "Messbar höher durch Kreislauf-Kompetenz"
          horizon: "2 Jahre"
        - metric: "Neue Kundensegmente"
          target: "ESG-orientierte institutionelle Auftraggeber"
          horizon: "2-3 Jahre"

    V_I:
      name: "Innovationswertschöpfung"
      weight: 0.10
      targets:
        - metric: "Neue Geschäftsmodelle"
          target: "Mindestens 1 kreislauf-basiertes Modell live"
          horizon: "2 Jahre"
        - metric: "Pilotprojekte erfolgreich"
          target: "3+ Piloten mit positivem Proof of Concept"
          horizon: "1 Jahr"

