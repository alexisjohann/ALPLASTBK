# =============================================================================
# COMPLEMENTARITY ANALYSIS
# =============================================================================

complementarity_analysis:
  _note: "Wechselwirkungen zwischen den drei strategischen Stossrichtungen"

  strategic_interactions:
    - pair: "ZIN003 (Kreislauf) × INKOH (M&A)"
      gamma: 0.18
      interpretation: |
        Positiv: INKOH-Biochar ist Kernstück der Kreislauf-Strategie.
        Aber: Verkauf von 60% an Konzerne könnte Innovationskultur gefährden.
        Netto: Positiv, WENN ABV-Klauseln Innovationsfreiheit sichern.

    - pair: "ZIN003 (Kreislauf) × Führungsentwicklung"
      gamma: 0.25
      interpretation: |
        Stark positiv: ZIN003-Kernteam IST die nächste Führungsgeneration.
        Das Kreislauf-Projekt ist gleichzeitig Führungsentwicklungs-Labor.

    - pair: "INKOH (M&A) × Führungsentwicklung"
      gamma: -0.15
      interpretation: |
        Trade-off: M&A-Prozess bindet Führungskapazität.
        Key-Person-Flight-Risk (π = 0.40) gefährdet beides.
        Mitigierung: Retention-Pakete + klare Rollen in neuer Struktur.

  crowding_out_risks:
    - risk: "Finanzielle Anreize × Intrinsische Motivation"
      gamma: -0.15
      source: "PAR-COMP-002 (Social × Financial Crowding-Out)"
      mitigation: "Finanzielle KPIs ERST ab Monat 6 einführen"

    - risk: "Konzern-Governance (Holcim) × Familien-Autonomie"
      gamma: -0.45
      source: "MTG-2026-02-18-001 (CCS-Analyse)"
      mitigation: "ABV-Klauseln + Zindel+TS Allianz = 50%"

# =============================================================================
# BIDIRECTIONAL ANALYSIS
# =============================================================================

bidirectional:
  top_down:
    name: "Was brauchen wir?"
    V_star: "EBITDA 8-10%, regionaler Kreislauf-Vorreiter, breite Führung"
    B_star: "Systematische Delegation, Tochter-übergreifende Zusammenarbeit, 48h-Kultur"
    Psi_star: "Governance aufräumen, Information fliessen lassen, Führung entwickeln"

  bottom_up:
    name: "Was wird passieren?"
    Psi_current: "Governance 0.45, Anreize 0.35, Information 0.40, Kultur 0.70, Fähigkeiten 0.50"
    B_predicted: |
      Bei aktuellem Kontext: Moderater Fortschritt in Kreislaufwirtschaft (Szenario 2: «Fast geschafft»),
      aber Führungsentwicklung stagniert und INKOH-Integration riskant.
    V_predicted: |
      V_F: EBITDA bleibt bei 5-7% (kein Sprung)
      V_S: Kreislauf-Position verbessert sich langsam
      V_O: Führungsabhängigkeit von Andreas Zindel bleibt

  gap_analysis:
    V_gap: "V* - V_predicted = deutliche Lücke bei V_O (organisational) und V_S (strategisch)"
    priority_interventions:
      - "Ψ_GOV: Governance sofort aufräumen (INKOH + interne Entscheidungsrechte)"
      - "Ψ_CAP: Führungsentwicklung starten (5-8 Leader identifizieren)"
      - "Ψ_INF: Information Architecture (Transparenz, Weekly-Rhythmus ausweiten)"

