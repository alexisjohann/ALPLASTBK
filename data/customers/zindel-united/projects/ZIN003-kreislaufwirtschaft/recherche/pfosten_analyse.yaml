# Systematische Pfosten-Analyse für ZIN003
# Methode: Bottom-up Clustering der 183 Faktoren → Pfosten-Kandidaten
# Erstellt: 2026-02-05

metadata:
  input_faktoren: 183
  input_beispiele: 38
  input_dimensionen: 50
  output_cluster: 8
  output_pfosten_kandidaten: 6
  methode: "Thematisches Clustering + Zindel-Relevanz-Filter"

# =============================================================================
# SCHRITT 1: CLUSTERING DER 50 DIMENSIONEN → 8 THEMEN-CLUSTER
# =============================================================================
clustering:

  cluster_1_material_technik:
    name: "Material & Produktionstechnik"
    dimensionen:
      - "Mechanische Eigenschaften (Druck, Zug, Biegung)" # 6 Faktoren
      - "Materialeigenschaften & Mikrostruktur" # 4 Faktoren
      - "Leistungsfähigkeit & Qualität recycelter Materialien" # 4 Faktoren
      - "Hydration, Wasserhaushalt & interne Curing-Mechanismen" # 4 Faktoren
      - "Chemische Zusammensetzung & Reaktivität" # 3 Faktoren
      - "Dauerhaftigkeit, Schrumpfung & Mikrostruktur" # 3 Faktoren
    anzahl_faktoren: 24
    kernfrage: "Können wir mit RC-Materialien die gleiche Qualität liefern?"
    datenpunkte:
      - "68% der Baumaterialien haben technisches Kreislaufpotenzial"
      - "TRL 5-6 für Recycling-Technologien (Pilotphase)"
      - "140 kWh/t Energieaufwand für Betonrecycling"
    zindel_relevanz: "HOCH - Zindel hat KLARK, TABREC, Logbau"

  cluster_2_recycling_rueckbau:
    name: "Recycling & Rückbau"
    dimensionen:
      - "Recyclingstrategien & Technologien" # 4 Faktoren
      - "Wiederverwendung & Deconstruction" # 4 Faktoren
      - "Materialwiederverwendung" # 5 Faktoren
      - "Strukturelle & Nicht-Strukturelle Deconstruction" # 3 Faktoren
      - "Reuse, Recycling & Up-/Downcycling-Pfade" # 3 Faktoren
      - "End-of-Life-Konzepte & Hierarchien" # 3 Faktoren
    anzahl_faktoren: 22
    kernfrage: "Wie bauen wir rück und was machen wir mit dem Material?"
    datenpunkte:
      - "7.5 Mio. Tonnen Bauschutt pro Jahr in CH"
      - "Selektiver Rückbau: 20-40% weniger Emissionen"
      - "50% der Studien nennen hohe Kosten/Zeit als Hürde"
    zindel_relevanz: "HOCH - TABREC ist Kernkompetenz"

  cluster_3_design_planung:
    name: "Design & Planung"
    dimensionen:
      - "Circular Design im Planungsprozess" # 5 Faktoren
      - "Design-for-Deconstruction (DfD) & Planungsprinzipien" # 4 Faktoren
      - "Konstruktive Systeme & Deconstructability" # 4 Faktoren
      - "Materialwahl & Verbindungstechnologien" # 3 Faktoren
      - "Design & Produktionsprinzipien" # 3 Faktoren
    anzahl_faktoren: 19
    kernfrage: "Wie planen wir von Anfang an für Kreislauf?"
    datenpunkte:
      - "28% der CH-Bauten sind modular rückbaubar (2025)"
      - "12% C2C-zertifiziert (2024)"
      - "<15% integrative Planung"
    zindel_relevanz: "MITTEL - Zindel ist Ausführer, nicht Planer"

  cluster_4_dokumentation_daten:
    name: "Dokumentation & Daten"
    dimensionen:
      - "Materialpässe & digitale Nachverfolgbarkeit" # 5 Faktoren
      - "Materialbestände (Material Stocks)" # 5 Faktoren
      - "Technologische & digitale Infrastruktur" # 4 Faktoren
      - "Informations- & Awareness-Systeme" # 4 Faktoren
      - "Digitale und methodische Unterstützung" # 2 Faktoren
      - "Messung, Indikatoren & Governance" # 3 Faktoren
    anzahl_faktoren: 23
    kernfrage: "Können wir dokumentieren, was wir verbauen?"
    datenpunkte:
      - "45% der relevanten Daten vorhanden"
      - "<10% Städte mit Materialinventar"
      - "SBB, Zurich Insurance nutzen Madaster bereits"
    zindel_relevanz: "HOCH - Kunden fordern Materialpässe"

  cluster_5_markt_kunden:
    name: "Markt & Kunden"
    dimensionen:
      - "Ökonomische Strukturen & Marktmechanismen" # 4 Faktoren
      - "Ökonomische Machbarkeit & Marktaspekte" # 3 Faktoren
      - "Geschäftsmodelle & Wertschöpfungslogiken" # 3 Faktoren
      - "Stakeholderrollen & Verantwortung" # 4 Faktoren
      - "Akteure & Verhaltensfaktoren" # 3 Faktoren
    anzahl_faktoren: 17
    kernfrage: "Wer will das und was zahlt er dafür?"
    datenpunkte:
      - "38% der CH-Bauprojekte haben CE-Anforderungen (2025)"
      - "<10% aktive Nachfrage von Bauherren"
      - "<5% Marktanteil für CE-Produkte"
    zindel_relevanz: "HOCH - Positionierung entscheidet über Zukunft"

  cluster_6_regulierung_normen:
    name: "Regulierung & Normen"
    dimensionen:
      - "Politische & regulatorische Rahmenbedingungen" # 4 Faktoren
      - "Governance & Koordination" # 3 Faktoren
      - "Enabling Conditions & Rahmenbedingungen" # 3 Faktoren
    anzahl_faktoren: 10
    kernfrage: "Was wird Pflicht und wann?"
    datenpunkte:
      - "27% gesetzlich geregelt (CH, 2024)"
      - "CSRD Berichtspflicht ab 2025/2026"
      - "EU-Taxonomie als Finanzierungskriterium"
    zindel_relevanz: "MITTEL - Zindel reagiert auf Normen, gestaltet sie nicht"

  cluster_7_wirtschaftlichkeit:
    name: "Wirtschaftlichkeit & Business Case"
    dimensionen:
      - "Ökologische & ökonomische Effekte" # 4 Faktoren
      - "Ökologische und sozioökonomische Auswirkungen" # 3 Faktoren
      - "Ökologische Effekte & Ressourceneffizienz" # 3 Faktoren
      - "Lebenszyklusanalyse & Bewertung" # 5 Faktoren
      - "Prozess- und Performance-Optimierung" # 3 Faktoren
    anzahl_faktoren: 18
    kernfrage: "Rechnet sich das für Zindel?"
    datenpunkte:
      - "ROI 6.2% für CE-Projekte (CH Ø)"
      - "+25-35% Anfangsinvestition"
      - "-18% Materialabfall ggü. 2020"
    zindel_relevanz: "KRITISCH - Ohne Business Case kein Pilotprojekt"

  cluster_8_kooperation_netzwerk:
    name: "Kooperation & Netzwerk"
    dimensionen:
      - "Institutionelle & organisatorische Kooperation" # 4 Faktoren
      - "Systemebenen & Skalierungsebenen" # 3 Faktoren
      - "Integrationslogik & Cross-Concept-Synergien" # 3 Faktoren
      - "Kulturelle & verhaltensbezogene Dynamiken" # 3 Faktoren
    anzahl_faktoren: 13
    kernfrage: "Mit wem müssen wir zusammenarbeiten?"
    datenpunkte:
      - "17 aktive CE-Netzwerke in CH (2024)"
      - "55% der Studien nennen fehlende Kooperation als Barriere"
      - "22% der CH-Unternehmen mit CE-Strategie"
    zindel_relevanz: "MITTEL - Zindel kann von anderen lernen"

  # Nicht-zugeordnet: Grundlagen-Faktoren (keine Handlungsrelevanz)
  cluster_0_grundlagen:
    name: "Theoretische Grundlagen (kein Pfosten)"
    dimensionen:
      - "Definition & Kernlogik" # 3 Faktoren
      - "Systemlogik & CE-Framework" # 4 Faktoren
      - "Systemische Grundlagen & Lifecycle-Kontext" # 4 Faktoren
      - "Entwicklung der Circular Economy im Bauwesen" # 5 Faktoren
      - "Forschungslücken & zukünftige Themen" # 4 Faktoren
      - "Grenzen & Risiken" # 3 Faktoren
      - "Lebenszyklusintegration" # 3 Faktoren
      - "Materialkreisläufe & Stoffflüsse" # 4 Faktoren
      - "Implementierung, Forschungslücken & Sicherheit" # 3 Faktoren
    anzahl_faktoren: 33
    kernfrage: "Was ist Kreislaufwirtschaft?"
    zindel_relevanz: "NIEDRIG - Hintergrundwissen, kein Testfeld"

# =============================================================================
# SCHRITT 2: CLUSTER → PFOSTEN-KANDIDATEN (mit Zindel-Filter)
# =============================================================================
pfosten_ableitung:

  methode: |
    Cluster mit HOCH/KRITISCH Zindel-Relevanz → Pfosten-Kandidat
    Cluster mit MITTEL Relevanz → Optional / Kombinieren
    Cluster mit NIEDRIG Relevanz → Kein Pfosten (Hintergrund)

  mapping:
    cluster_1_material_technik:
      zindel_relevanz: "HOCH"
      wird_pfosten: true
      pfosten_name: "Material & Produkte"
      begründung: "Zindel hat KLARK, TABREC, Logbau - Kernkompetenz"
      testfrage: "Können wir RC-Beton/KLARK als Standard anbieten?"
      beispiele_zugeordnet: ["E01", "E02", "E03", "T02", "T03"]

    cluster_2_recycling_rueckbau:
      zindel_relevanz: "HOCH"
      wird_pfosten: true
      pfosten_name: "Rückbau & Verwertung"
      begründung: "TABREC ist Kernkompetenz, Urban Mining als Chance"
      testfrage: "Können wir selektiven Rückbau als Service anbieten?"
      beispiele_zugeordnet: ["E03", "G01", "G02", "G08"]

    cluster_3_design_planung:
      zindel_relevanz: "MITTEL"
      wird_pfosten: false
      begründung: "Zindel ist Ausführer, nicht Planer - aber Input an Planer möglich"
      integration_in: "cluster_4_dokumentation_daten"

    cluster_4_dokumentation_daten:
      zindel_relevanz: "HOCH"
      wird_pfosten: true
      pfosten_name: "Dokumentation & Nachweise"
      begründung: "Kunden fordern Materialpässe, Zindel muss liefern können"
      testfrage: "Können wir Materialpässe für unsere Projekte erstellen?"
      beispiele_zugeordnet: ["T01", "T05", "T09", "M01", "M04"]

    cluster_5_markt_kunden:
      zindel_relevanz: "HOCH"
      wird_pfosten: true
      pfosten_name: "Kunden & Positionierung"
      begründung: "Wer fragt nach CE? Wie positionieren wir uns?"
      testfrage: "Welche Kunden wollen CE und was zahlen sie?"
      beispiele_zugeordnet: ["M01", "M02", "M03", "M05", "M06", "M07", "M08"]

    cluster_6_regulierung_normen:
      zindel_relevanz: "MITTEL"
      wird_pfosten: false
      begründung: "Zindel reagiert auf Normen, gestaltet sie nicht"
      integration_in: "cluster_4_dokumentation_daten"

    cluster_7_wirtschaftlichkeit:
      zindel_relevanz: "KRITISCH"
      wird_pfosten: true
      pfosten_name: "Wirtschaftlichkeit"
      begründung: "Ohne Business Case kein nachhaltiges Engagement"
      testfrage: "Rechnet sich CE für Zindel? Unter welchen Bedingungen?"
      beispiele_zugeordnet: ["Alle - Querschnittsthema"]

    cluster_8_kooperation_netzwerk:
      zindel_relevanz: "MITTEL"
      wird_pfosten: false
      begründung: "Wichtig, aber kein eigenständiges Testfeld"
      integration_in: "cluster_5_markt_kunden"

# =============================================================================
# SCHRITT 3: FINALE PFOSTEN-KANDIDATEN (priorisiert)
# =============================================================================
pfosten_kandidaten:

  anzahl: 6
  empfehlung_fuer_pilot: 4-5

  liste:
    - id: P1
      name: "Material & Produkte"
      cluster_basis: "cluster_1_material_technik"
      faktoren_anzahl: 24
      kernfrage: "Können wir RC-Beton/KLARK als Standard anbieten?"
      zindel_asset: "KLARK, TABREC, Logbau"
      hürde: "TRL 5-6, Qualitätsnachweis"
      priorität: 1
      begründung: "Direkte Verbindung zu Zindel-Kernkompetenzen"

    - id: P2
      name: "Kunden & Positionierung"
      cluster_basis: "cluster_5_markt_kunden"
      faktoren_anzahl: 17
      kernfrage: "Welche Kunden wollen CE und was zahlen sie dafür?"
      zindel_asset: "Regionale Verankerung, Bestandskunden"
      hürde: "<10% aktive Nachfrage"
      priorität: 2
      begründung: "Ohne Kunden kein Geschäft - muss früh getestet werden"

    - id: P3
      name: "Dokumentation & Nachweise"
      cluster_basis: "cluster_4_dokumentation_daten + cluster_6"
      faktoren_anzahl: 33
      kernfrage: "Können wir Materialpässe erstellen?"
      zindel_asset: "Digitalisierungs-Know-how (TorAlva/ETH)"
      hürde: "45% Datenverfügbarkeit, Tools nötig"
      priorität: 3
      begründung: "Kunden fordern es, Regulierung kommt"

    - id: P4
      name: "Wirtschaftlichkeit"
      cluster_basis: "cluster_7_wirtschaftlichkeit"
      faktoren_anzahl: 18
      kernfrage: "Rechnet sich CE für Zindel?"
      zindel_asset: "Integrierte Wertschöpfungskette"
      hürde: "+25% Anfangsinvestition"
      priorität: 4
      begründung: "Business Case entscheidet über Go/No-Go"

    - id: P5
      name: "Rückbau & Verwertung"
      cluster_basis: "cluster_2_recycling_rueckbau"
      faktoren_anzahl: 22
      kernfrage: "Können wir selektiven Rückbau als Service anbieten?"
      zindel_asset: "TABREC, mobile Aufbereitung"
      hürde: "Hohe Kosten, wenig Nachfrage"
      priorität: 5
      begründung: "Langfristige Chance, aber noch früh"

    - id: P6
      name: "Kooperation & Lernen"
      cluster_basis: "cluster_8_kooperation_netzwerk"
      faktoren_anzahl: 13
      kernfrage: "Von wem können wir lernen?"
      zindel_asset: "ETH-Partnerschaft (TorAlva)"
      hürde: "Zeitaufwand"
      priorität: 6
      begründung: "Enabler für andere Pfosten, kein Selbstzweck"

# =============================================================================
# SCHRITT 4: EMPFEHLUNG FÜR DEN PILOTEN
# =============================================================================
empfehlung:

  titel: "4 Pfosten für den Zindel-Piloten"

  begründung: |
    Basierend auf der systematischen Analyse von 183 Faktoren aus 12 wissenschaftlichen
    Studien empfehlen wir 4 Pfosten für den Piloten. Diese decken die Cluster mit
    HOHER und KRITISCHER Zindel-Relevanz ab und bauen auf bestehenden Kompetenzen auf.

  empfohlene_pfosten:
    - P1: "Material & Produkte"
    - P2: "Kunden & Positionierung"
    - P3: "Dokumentation & Nachweise"
    - P4: "Wirtschaftlichkeit"

  optional_als_fuenfter:
    - P5: "Rückbau & Verwertung"

  nicht_empfohlen_fuer_pilot:
    - P6: "Kooperation & Lernen" # Enabler, kein Testfeld

  mapping_zu_erkenntnissen:
    erkenntnis_1_wir_koennen_das: "→ P1 Material & Produkte"
    erkenntnis_2_markt_zieht_an: "→ P2 Kunden & Positionierung"
    erkenntnis_3_regulierung_kommt: "→ P3 Dokumentation & Nachweise"
    erkenntnis_4_neue_erloesquellen: "→ P5 Rückbau & Verwertung (optional)"
    erkenntnis_5_region_bewegt_sich: "→ Input für P2 (Wettbewerb beobachten)"
    realitaets_check_huerden: "→ P4 Wirtschaftlichkeit"

# =============================================================================
# VISUALISIERUNG: EVIDENZ-FLUSS
# =============================================================================
evidenz_fluss:
  beschreibung: |
    183 Faktoren (Forschung)
           ↓ gruppiert in
    50 Dimensionen
           ↓ geclustert zu
    8 Themen-Cluster
           ↓ Zindel-Relevanz-Filter
    6 Pfosten-Kandidaten
           ↓ priorisiert
    4 empfohlene Pfosten für Piloten

  transparenz: |
    Jeder Pfosten ist rückverfolgbar zu:
    - Anzahl Faktoren (wissenschaftliche Basis)
    - Konkrete Datenpunkte (quantifiziert)
    - Zindel-Assets (Kernkompetenzen)
    - Hürden (Risiken)
    - Praxisbeispiele (38 recherchiert)
