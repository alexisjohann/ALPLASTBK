# Fragen-Katalog für Pfosten-Definition ZIN003
# Diese 10 Fragen führen die Teilnehmer zu konkreten Pfosten (Testelementen)
# Erstellt: 2026-02-05
# Version: 1.0

metadata:
  projekt: ZIN003-kreislaufwirtschaft
  workshop: WS001
  block: 4
  zweck: "Fragen → Pfosten (Teilnehmer definieren konkrete Testelemente)"
  logik: |
    1. Erkenntnisse zeigen den Kontext (WARUM CE wichtig ist)
    2. Fragen strukturieren die Diskussion
    3. Teilnehmer definieren Pfosten (konkrete Testelemente für den Piloten)

# =============================================================================
# DIE 10 FRAGEN FÜR DIE PFOSTEN-DEFINITION
# =============================================================================

fragen:

  # --- STRATEGISCH (Systemgrenzen & Geschäftsmodell) ---

  F1:
    frage: "Was gehört für uns NICHT zur Kreislaufwirtschaft?"
    bereich: "Systemgrenzen"
    zweck: "Fokus schärfen durch Ausschluss"
    beispiel_antworten:
      - "Wir machen KEIN Design for Disassembly (wir sind Ausführer)"
      - "Wir betreiben KEINE eigene Bauteilbörse"
      - "Wir handeln KEINE CO₂-Zertifikate"
      - "Wir bauen KEINE eigene Recycling-Anlage wie EbiMIK"
    fuehrt_zu_pfosten: "Klare Abgrenzung des Pilot-Scope"

  F2:
    frage: "Wofür würden Kunden (mehr) zahlen?"
    bereich: "Geschäftsmodell"
    zweck: "Hypothese für Business Case formulieren"
    beispiel_antworten:
      - "Für CO₂-neutrale Produkte (KLARK)"
      - "Für Materialpässe (Nachweis für CSRD)"
      - "Für regionale Kreislaufwirtschaft (kurze Wege)"
      - "Gar nicht - gleicher Preis, aber Differenzierung"
    fuehrt_zu_pfosten: "Preismodell / Mehrwert-Kommunikation"
    hinweis: "Hypothese - wird im Piloten getestet"

  # --- MATERIAL & PRODUKTE ---

  F3:
    frage: "Welche Materialien wollen wir einsetzen?"
    bereich: "Material"
    zweck: "Konkrete Produkte für den Piloten definieren"
    zindel_assets:
      - "KLARK-Beton (Logbau = Gründungspartner)"
      - "RC-Beton (bereits Standard laut Andreas)"
      - "TABREC-Output (mobile Aufbereitung)"
    beispiel_antworten:
      - "KLARK-Wand im Pilotprojekt"
      - "RC-Beton mit 30% Anteil"
      - "Aufbereitetes Material von TABREC"
    fuehrt_zu_pfosten: "Konkretes Material-Testelement"

  # --- KUNDE & PROJEKT ---

  F4:
    frage: "Haben wir Kunden, mit denen wir pilotieren könnten?"
    bereich: "Kunde"
    zweck: "Pilot-Partner identifizieren"
    kriterien:
      - "Offen für Innovation"
      - "Bereit, 'Versuchskaninchen' zu sein"
      - "Hat CE-Anforderungen oder Interesse"
    beispiel_antworten:
      - "Kanton GR (hat bereits KLARK-Erfahrung: Fischzuchtanlage)"
      - "Öffentliche Hand (RC-Beton-Pflicht)"
      - "Architekt mit CE-Vision (wie Olgiati)"
    fuehrt_zu_pfosten: "Konkreter Pilot-Kunde"

  F5:
    frage: "Welches konkrete Projekt eignet sich?"
    bereich: "Projekt"
    zweck: "Pilot-Objekt definieren"
    kriterien:
      - "Überschaubare Grösse (nicht zu komplex)"
      - "Zeitlich passend (Start 2026)"
      - "Kunde ist bereit"
    beispiel_antworten:
      - "Projekt X in Maienfeld"
      - "Öffentlicher Bau in GR"
      - "Eigenes Objekt (Halle, Büro)"
    fuehrt_zu_pfosten: "Konkretes Pilot-Projekt"

  # --- PARTNER ---

  F6:
    frage: "Haben wir Partner, mit denen wir zusammenarbeiten könnten?"
    bereich: "Partner"
    zweck: "Kooperationen für den Piloten identifizieren"
    mögliche_partner:
      - "ETH (TorAlva-Erfahrung)"
      - "Madaster (Materialpass-Plattform)"
      - "Lieferanten (Holcim, etc.)"
      - "Architekten/Planer"
    beispiel_antworten:
      - "ETH für Dokumentation/Forschung"
      - "Madaster für Materialpass"
      - "Kein externer Partner nötig"
    fuehrt_zu_pfosten: "Partner-Einbindung ja/nein"

  # --- DOKUMENTATION ---

  F7:
    frage: "Wie wollen wir dokumentieren?"
    bereich: "Dokumentation"
    zweck: "Nachweis-Methode für den Piloten definieren"
    optionen:
      - "Madaster Materialpass"
      - "Eigenes Excel/System"
      - "BIM-Modell"
      - "Einfache Lieferschein-Dokumentation"
    quellen:
      - url: "https://madaster.ch/"
        beschreibung: "Schweizer Materialpass-Plattform"
      - url: "https://news.sbb.ch/artikel/90627/sbb-ist-neuer-strategischer-partner-von-madaster-schweiz"
        beschreibung: "SBB nutzt Madaster"
    fuehrt_zu_pfosten: "Dokumentations-Methode"

  # --- WIRTSCHAFTLICHKEIT ---

  F8:
    frage: "Was darf es (mehr) kosten?"
    bereich: "Budget"
    zweck: "Kostenrahmen für den Piloten definieren"
    kontext:
      - "+25-35% Mehrkosten sind realistisch (Quelle: circularhub.ch)"
      - "ROI 6.2% für CE-Projekte in CH"
    beispiel_antworten:
      - "Max. +10% Mehrkosten"
      - "Max. CHF 50'000 Lernbudget"
      - "Kostenneutral (muss sich rechnen)"
    fuehrt_zu_pfosten: "Budget-Grenze für Pilot"

  F9:
    frage: "Wann ist der Pilot für uns ein Erfolg?"
    bereich: "Erfolg"
    zweck: "Qualitative Erfolgskriterien definieren"
    beispiel_antworten:
      - "Kunde ist zufrieden und bestellt wieder"
      - "Wir haben nicht draufgezahlt"
      - "Wir haben was gelernt"
      - "Wir können es wiederholen"
      - "Presse/Marketing-Wert"
    fuehrt_zu_pfosten: "Erfolgskriterien"

  # --- KOMMUNIKATION ---

  F10:
    frage: "Wie kommunizieren wir das nach aussen?"
    bereich: "Kommunikation"
    zweck: "Marketing/Positionierung definieren"
    optionen:
      - "Pressemitteilung bei Abschluss"
      - "Case Study auf Website"
      - "Vortrag an Branchenanlass"
      - "Gar nicht (intern lernen)"
    beispiel_antworten:
      - "Case Study + Pressearbeit"
      - "Erst mal intern, später extern"
      - "LinkedIn-Posts während Projekt"
    fuehrt_zu_pfosten: "Kommunikations-Strategie"

# =============================================================================
# WORKSHOP-ABLAUF
# =============================================================================

workshop_ablauf:
  schritt_1:
    name: "Erkenntnisse präsentieren"
    dauer: "10 min"
    inhalt: "5 Erkenntnisse aus der Recherche (Kontext)"

  schritt_2:
    name: "Fragen durchgehen"
    dauer: "30 min"
    inhalt: "10 Fragen diskutieren, Teilnehmer antworten"
    methode: "Pro Frage: 2-3 Min Diskussion, Antworten sammeln"

  schritt_3:
    name: "Pfosten definieren"
    dauer: "15 min"
    inhalt: "Aus Antworten konkrete Testelemente (Pfosten) ableiten"
    output: "4-6 konkrete Pfosten für den Piloten"

# =============================================================================
# BEISPIEL-PFOSTEN (Vorschläge von uns zur Diskussion)
# =============================================================================

beispiel_pfosten:
  hinweis: "Diese Vorschläge stellen wir zur Diskussion - Teilnehmer ergänzen/streichen"

  P1:
    name: "KLARK-Wand verbauen"
    beschreibung: "Eine KLARK-Wand im Pilotprojekt einsetzen"
    testet: "Funktioniert KLARK in der Praxis? Kundenakzeptanz?"
    zindel_asset: "KLARK (Logbau = Gründungspartner)"

  P2:
    name: "Materialpass erstellen"
    beschreibung: "Für das Pilotprojekt einen Materialpass erstellen"
    testet: "Können wir dokumentieren? Aufwand?"
    optionen: ["Madaster", "Eigenes System"]

  P3:
    name: "TABREC einsetzen"
    beschreibung: "Rückbau-Material mit TABREC aufbereiten und wiederverwenden"
    testet: "Kreislauf schliessen - funktioniert das?"
    zindel_asset: "TABREC"

  P4:
    name: "Kunden-Feedback einholen"
    beschreibung: "Strukturiertes Feedback vom Pilot-Kunden"
    testet: "Würde der Kunde wieder bestellen? Was zahlt er?"
