# =============================================================================
# WORKSHOP WS002: KERNTEAM-WORKSHOP «PFOSTEN SETZEN»
# =============================================================================
# Projekt: ZIN003 - Kreislaufwirtschaft Verhaltensänderung
# Kunde: Zindel United
