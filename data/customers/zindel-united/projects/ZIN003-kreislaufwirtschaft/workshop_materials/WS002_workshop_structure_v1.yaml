metadata:
  workshop_id: WS002
  workshop_name: "Pfosten setzen"
  version: "1.0"
  total_duration: "3.5 Stunden (210 Min)"
  participants: "Kernteam (9 Personen)"
  date: "TBD - Februar/März 2026"
  location: "Zindel United Hauptsitz, Maienfeld"
  facilitator: "FehrAdvice & Partners AG"
  previous_workshop: WS001

# =============================================================================
# WORKSHOP-PHILOSOPHIE
# =============================================================================
philosophy:
  headline: "Der Workshop endet nicht mit Pfosten auf Papier, sondern mit OWNERN die in 48h starten"

  design_prinzipien:
    - prinzip: "Quick Wins zuerst"
      quelle: "FC04: Sichtbare Fortschritte + FC05: Erfolgsdruck"
    - prinzip: "Veto-Kultur aktiv nutzen"
      quelle: "FC05: Gesprächskultur fortführen"
    - prinzip: "Intrinsische Motivation, nicht Compliance"
      quelle: "FC04: Commitment statt Pflicht"
    - prinzip: "Skalierbarkeit einbauen"
      quelle: "FC05: Skalierbarkeit mitdenken"
    - prinzip: "Pragmatisch, nicht akademisch"
      quelle: "FC05: Auf den Boden bringen"

  proof_of_readiness:
    - "3-5 Pfosten sind definiert und vom Team akzeptiert"
    - "Jeder Pfosten hat einen Owner und einen Co-Owner"
    - "Jeder Pfosten hat eine Lern-Hypothese"
    - "Jeder Owner hat einen konkreten 48h-Schritt"
    - "Bad Ragaz ist als Pilot-Feld einem Pfosten zugeordnet"
    - "Retro-Termin in 3 Wochen steht"

  leitplanken_aus_ws001:
    - leitplanke: "ARGE ≠ Strategische Initiative"
      quelle: "WS001 Protokoll: Gerhard Fehr Leitplanke"
      facilitator_aktion: "Bei ARGE-Sprache sofort reframen"
    - leitplanke: "Kontrolle UND Vertrauen"
      quelle: "FC03: Spannungsfeld - nicht entweder-oder"
      facilitator_aktion: "Leitplanken = Vertrauen mit Struktur"
    - leitplanke: "Keine finanziellen Anreize"
      quelle: "FC04: Commitment statt Pflicht, Freiwilligkeit statt Zwang"
      facilitator_aktion: "Crowding-Out Risiko! Anerkennung statt Boni"

# =============================================================================
# AGENDA-ÜBERSICHT
# =============================================================================
agenda_overview:
  - block: 0
    name: "Ankommen & Rückblick"
    time: "0:00 - 0:20"
    duration: "20 Min"
    focus: "WO STEHEN WIR"

  - block: 1
    name: "Pfosten verstehen"
    time: "0:20 - 0:50"
    duration: "30 Min"
    focus: "WAS SIND PFOSTEN"

  - block: 2
    name: "Pfosten definieren"
    time: "0:50 - 1:40"
    duration: "50 Min"
    focus: "WELCHE PFOSTEN SETZEN WIR"

  - block: "Pause"
    time: "1:40 - 1:55"
    duration: "15 Min"

  - block: 3
    name: "Lern-Hypothesen formulieren"
    time: "1:55 - 2:30"
    duration: "35 Min"
    focus: "WAS WOLLEN WIR LERNEN"

  - block: 4
    name: "Owner & 48h-Schritte"
    time: "2:30 - 3:05"
    duration: "35 Min"
    focus: "WER MACHT WAS - SOFORT"

  - block: 5
    name: "Commitment & Vereinbarungen"
    time: "3:05 - 3:30"
    duration: "25 Min"
    focus: "WIR STARTEN JETZT"

# =============================================================================
# BLOCK 0: ANKOMMEN & RÜCKBLICK (20 Min)
# =============================================================================
block_0:
  name: "Ankommen & Rückblick"
  time: "0:00 - 0:20"
  duration: "20 Minuten"

  goal: "WS001-Energie reaktivieren, Zwischenergebnisse würdigen, Richtung bestätigen"

  elements:
    - element: "Begrüssung & Check-in"
      time: "0:00 - 0:05"
      duration: "5 Min"
      responsible: "FehrAdvice"
      content:
        - "Willkommen zurück"
        - "Blitz-Check-in: «Ein Satz: Was hat sich seit dem Kick-Off bei euch getan?»"
        - "Runde durchs Team (je 30 Sekunden)"
      moderationshinweis: "Schnell, energetisch - zeigt dass zwischen den Workshops etwas passiert ist"

    - element: "WS001-Rückblick & Flipchart-Highlights"
      time: "0:05 - 0:12"
      duration: "7 Min"
      responsible: "FehrAdvice"
      content:
        - "5 Flipcharts kurz zeigen (Fotos an Wand)"
        - "3 Kern-Erkenntnisse aus WS001 zusammenfassen:"
        - "  1. «Ihr wollt Commitment statt Pflicht» (FC04)"
        - "  2. «Vertrauen mit Leitplanken, nicht Kontrolle» (FC03)"
        - "  3. «Wenn wir es hier nicht schaffen, schafft es niemand» (FC05)"
        - "Überleitung: «Heute setzen wir die Pfosten, die das möglich machen»"
      moderationstext: |
        Im Kick-Off habt ihr fünf Dinge erarbeitet, die heute unsere Leitplanken sind.
        [Flipchart-Fotos zeigen]
        Besonders wichtig: Ihr habt gesagt, Commitment statt Pflicht.
        Das nehmen wir ernst. Heute zwingen wir niemanden. Wer einen Pfosten übernimmt,
        tut es weil er oder sie will - nicht weil er muss.
      why: "Reaktiviert WS001-Vereinbarungen, schafft Kontinuität"

    - element: "Bad Ragaz Update"
      time: "0:12 - 0:20"
      duration: "8 Min"
      responsible: "Jörg Ryffel / Ivo Bonderer"
      content:
        - "Kurz-Update zum Stand Bad Ragaz"
        - "Was hat sich seit dem Kick-Off konkret getan?"
        - "Gibt es neue Erkenntnisse?"
        - "Bestätigung: Bad Ragaz = unser Pilot-Feld"
      moderationshinweis: |
        Jörg oder Ivo berichten - NICHT FehrAdvice!
        Das Team muss spüren: Es passiert etwas, auch zwischen den Workshops.
      why: "Zeigt Fortschritt, bestätigt Pilotfeld, gibt dem Team Ownership"

# =============================================================================
# BLOCK 1: PFOSTEN VERSTEHEN (30 Min)
# =============================================================================
block_1:
  name: "Pfosten verstehen"
  time: "0:20 - 0:50"
  duration: "30 Minuten"

  goal: "Alle verstehen was ein Pfosten ist, warum wir Pfosten brauchen, und wie sie funktionieren"

  elements:
    - element: "Was ist ein Pfosten?"
      time: "0:20 - 0:30"
      duration: "10 Min"
      responsible: "FehrAdvice"
      content:
        - "Metapher: «Ein Pfosten im Zaun. Ohne Pfosten hängt der Draht durch.»"
        - "Pfosten = Ein Lern-Feld, in dem wir TESTEN ob Kreislaufwirtschaft funktioniert"
        - "Pfosten ≠ Projekt. Pfosten = Frage + Test + Antwort"
        - "Jeder Pfosten hat:"
        - "  → Einen NAMEN (was testen wir?)"
        - "  → Eine KERNFRAGE (was wollen wir wissen?)"
        - "  → Eine LERN-HYPOTHESE (was vermuten wir?)"
        - "  → Einen OWNER (wer treibt?)"
        - "  → Einen 48h-SCHRITT (was passiert SOFORT?)"
      moderationstext: |
        Stellt euch einen Weidezaun vor. Die Pfosten halten den Draht.
        Ohne Pfosten hängt alles durch.

        So ist es auch mit unserer Kreislaufwirtschaft.
        Wir brauchen feste Punkte - Pfosten - an denen wir konkret TESTEN.

        Ein Pfosten ist kein Projekt. Ein Pfosten ist eine FRAGE,
        die wir mit einem TEST beantworten.

        Heute definieren wir 3-5 solcher Pfosten.
      why: "Klare Definition verhindert Missverständnisse und ARGE-Drift"

    - element: "Evidenz-Basis zeigen"
      time: "0:30 - 0:40"
      duration: "10 Min"
      responsible: "FehrAdvice"
      content:
        - "Kurz zeigen: «Wir haben 183 Faktoren aus 12 Studien analysiert»"
        - "Diese haben wir in 8 Themen-Cluster gruppiert"
        - "Daraus ergeben sich 6 Pfosten-Kandidaten"
        - "4 davon empfehlen wir für den Piloten"
        - "Transparenz: «Das ist nicht unsere Meinung - das sind eure Kompetenzen + Forschung»"
      moderationstext: |
        Bevor wir Pfosten definieren - kurz zur Transparenz:
        Wir haben nicht einfach 4 Themen ausgedacht.

        Wir haben 183 Faktoren aus der Forschung analysiert,
        in 8 Cluster gruppiert, und mit euren Kernkompetenzen abgeglichen.

        [Folie: Evidenz-Fluss 183 → 50 → 8 → 6 → 4]

        Die 4 empfohlenen Pfosten bauen auf dem auf, was Zindel SCHON KANN.
        Nicht auf dem, was ihr noch lernen müsst.
      why: "Legitimiert die Pfosten-Auswahl, zeigt Wissenschaftlichkeit ohne Akademie"

    - element: "Die 6 Pfosten-Kandidaten vorstellen"
      time: "0:40 - 0:50"
      duration: "10 Min"
      responsible: "FehrAdvice"
      content:
        - "6 Pfosten-Kandidaten auf Flipchart/Folie:"
        - "  P1: Material & Produkte (KLARK, RC-Beton)"
        - "  P2: Kunden & Positionierung (Wer will CE?)"
        - "  P3: Dokumentation & Nachweise (Materialpässe)"
        - "  P4: Wirtschaftlichkeit (Business Case)"
        - "  P5: Rückbau & Verwertung (Selektiver Rückbau)"
        - "  P6: Kooperation & Lernen (Netzwerke)"
        - "Empfehlung: P1-P4 für Piloten, P5 optional, P6 als Enabler"
        - "ABER: «Das ist ein Vorschlag. IHR entscheidet.» (Veto-Kultur!)"
      moderationstext: |
        Aus der Analyse ergeben sich 6 mögliche Pfosten.
        Wir empfehlen 4 davon für den Piloten - das sind die,
        wo Zindel schon Kompetenzen hat.

        ABER: Das ist ein Vorschlag. Ihr könnt andere wählen,
        Pfosten kombinieren, oder neue hinzufügen.
        Erinnert euch: Veto-Kultur. Jeder darf Einspruch erheben.
      why: "Gibt Orientierung ohne zu diktieren - Balance Expertise × Ownership"

# =============================================================================
# BLOCK 2: PFOSTEN DEFINIEREN (50 Min)
# =============================================================================
block_2:
  name: "Pfosten definieren"
  time: "0:50 - 1:40"
  duration: "50 Minuten"

  goal: "Team wählt 3-5 Pfosten, definiert Kernfragen, ordnet Bad Ragaz zu"

  elements:
    - element: "Individuelle Reflexion (Silent Writing)"
      time: "0:50 - 0:57"
      duration: "7 Min"
      responsible: "FehrAdvice (Moderation)"
      content:
        - "Jede:r schreibt auf 2 Post-its:"
        - "  Post-it 1: «Der wichtigste Pfosten für mich ist _____ weil _____»"
        - "  Post-it 2: «Ein Pfosten den wir NICHT brauchen ist _____ weil _____»"
        - "STILLE - kein Diskutieren"
      moderationshinweis: "Silent Writing verhindert Groupthink und gibt introvertierten Stimmen Raum"
      why: "Psychologische Sicherheit: Eigene Meinung bilden BEVOR Gruppendynamik einsetzt"

    - element: "Dot-Voting Pfosten"
      time: "0:57 - 1:07"
      duration: "10 Min"
      responsible: "FehrAdvice"
      content:
        - "6 Pfosten-Kandidaten an der Wand (Flipchart)"
        - "Jede:r hat 3 Punkte (Klebepunkte oder Stifte)"
        - "«Verteile deine 3 Punkte auf die Pfosten, die DU am wichtigsten findest»"
        - "Post-its unter die Pfosten kleben"
        - "Ergebnis zählen und visualisieren"
      moderationshinweis: |
        Kein Diskutieren WÄHREND des Votings.
        Erst abstimmen, dann diskutieren.
        Das verhindert, dass starke Stimmen (Andreas, Jörg) die Gruppe beeinflussen.
      why: "Demokratisches Verfahren - jede Stimme zählt gleich viel"

    - element: "Diskussion & Auswahl"
      time: "1:07 - 1:30"
      duration: "23 Min"
      responsible: "FehrAdvice + Team"
      content:
        - "Ergebnis des Dot-Votings zeigen"
        - "Top 3-5 Pfosten identifizieren"
        - "Für jeden Pfosten:"
        - "  → Kernfrage schärfen"
        - "  → Verbindung zu Bad Ragaz prüfen"
        - "  → Verbindung zu Z1 (Business Case) und Z2 (Mitarbeitende mitnehmen)"
        - "VETO-RUNDE: «Gibt es bei jemandem ein echtes VETO gegen einen Pfosten?»"
      moderationstext: |
        Hier ist euer Ergebnis. [Dot-Voting zeigen]

        Lasst uns die Top-Pfosten anschauen.
        Für jeden Pfosten stellen wir eine Kernfrage.
        Eine Frage, die wir im Piloten BEANTWORTEN wollen.

        Und dann die Veto-Frage:
        Hat jemand ein echtes Veto? Nicht «ich find's nicht optimal» -
        sondern «das dürfen wir auf keinen Fall machen»?
      why: "Kombination aus demokratischer Wahl und expliziter Veto-Möglichkeit"

    - element: "Pfosten-Tableau fixieren"
      time: "1:30 - 1:40"
      duration: "10 Min"
      responsible: "FehrAdvice"
      content:
        - "Finale Pfosten auf grosses Flipchart schreiben"
        - "Für jeden Pfosten:"
        - "  PFOSTEN: [Name]"
        - "  KERNFRAGE: [Was wollen wir wissen?]"
        - "  BAD RAGAZ: [Ja/Nein - testbar im Piloten?]"
        - "  ZINDEL-ASSET: [Worauf bauen wir auf?]"
        - "Team bestätigt: «Das sind unsere Pfosten»"
      moderationshinweis: "Flipchart-Foto machen! Das ist DAS Referenz-Dokument"
      why: "Verbindliche Fixierung - das Tableau hängt ab jetzt im Büro"

# =============================================================================
# PAUSE (15 Min)
# =============================================================================
pause:
  time: "1:40 - 1:55"
  duration: "15 Min"
  note: "Flipchart-Tableau bleibt sichtbar. Informelle Gespräche nutzen."

# =============================================================================
# BLOCK 3: LERN-HYPOTHESEN FORMULIEREN (35 Min)
# =============================================================================
block_3:
  name: "Lern-Hypothesen formulieren"
  time: "1:55 - 2:30"
  duration: "35 Minuten"

  goal: "Für jeden Pfosten eine testbare Lern-Hypothese formulieren"

  lern_hypothese_format: |
    «Wir glauben, dass _______________________________________
     zu _____________________________________________________ führt.
     Wir messen: _______________________________________________
     über: ____________________________________________________ .»

  elements:
    - element: "Format erklären + Beispiel"
      time: "1:55 - 2:02"
      duration: "7 Min"
      responsible: "FehrAdvice"
      content:
        - "Lern-Hypothese ≠ Ziel. Es ist eine VERMUTUNG die wir TESTEN."
        - "Format vorstellen (siehe oben)"
        - "Beispiel für P1 (Material):"
        - "  «Wir glauben, dass der Einsatz von RC-Beton bei Bad Ragaz"
        - "   zu 15% tieferen Entsorgungskosten führt."
        - "   Wir messen: Entsorgungskosten pro m³"
        - "   über: Vergleich Bad Ragaz (mit RC) vs. Referenzprojekt (ohne RC).»"
        - "Wichtig: «Wir DÜRFEN falsch liegen! Das ist der Sinn des Testens.»"
      moderationstext: |
        Eine Lern-Hypothese ist keine Zielvorgabe.
        Es ist eine Vermutung.

        Und Vermutungen dürfen falsch sein.
        Wenn wir testen und die Hypothese ist falsch,
        haben wir trotzdem etwas gelernt.

        Das Schlimmste ist nicht eine falsche Hypothese.
        Das Schlimmste ist KEINE Hypothese - weil wir dann nicht wissen,
        was wir messen sollen.
      why: "Entkoppelt Hypothese von Erfolgsdruck - Fehlerkultur (FC02) leben"

    - element: "Gruppenarbeit: Hypothesen formulieren"
      time: "2:02 - 2:20"
      duration: "18 Min"
      responsible: "Team (Kleingruppen à 2-3 Personen)"
      content:
        - "Je 2-3 Personen pro Pfosten (Selbstzuordnung)"
        - "Template auf A3-Blatt (vorgedruckt):"
        - "  PFOSTEN: ______________________"
        - "  WIR GLAUBEN, DASS: _____________"
        - "  ZU: ____________________________"
        - "  WIR MESSEN: ____________________"
        - "  ÜBER: ___________________________"
        - "Jede Gruppe hat 18 Minuten"
        - "FehrAdvice geht von Gruppe zu Gruppe und hilft schärfen"
      moderationshinweis: |
        Nicht alle Pfosten müssen gleich viele Leute haben.
        Wer sich für keinen Pfosten meldet → sanft fragen, nicht zwingen (Freiwilligkeit!).
        Wenn ein Pfosten niemanden hat → ist das ein Signal. Diskutieren!

    - element: "Plenum: Hypothesen vorstellen & schärfen"
      time: "2:20 - 2:30"
      duration: "10 Min"
      responsible: "Gruppenvertreter:innen"
      content:
        - "Jede Gruppe stellt ihre Hypothese vor (je 2 Min)"
        - "Team gibt Feedback: «Ist das testbar? Ist das messbar?»"
        - "FehrAdvice hilft schärfen wenn nötig"
        - "Finale Hypothesen auf Flipchart notieren"
      moderationshinweis: "Zeitstreng! Je 2 Min pro Gruppe, dann weiter"

# =============================================================================
# BLOCK 4: OWNER & 48h-SCHRITTE (35 Min)
# =============================================================================
block_4:
  name: "Owner & 48h-Schritte"
  time: "2:30 - 3:05"
  duration: "35 Minuten"

  goal: "Jeder Pfosten hat einen Owner, Co-Owner und einen konkreten 48h-Schritt"

  elements:
    - element: "Owner-Logik erklären"
      time: "2:30 - 2:35"
      duration: "5 Min"
      responsible: "FehrAdvice"
      content:
        - "Owner = Treiber, NICHT Alleinverantwortlicher"
        - "Co-Owner = Sparring-Partner und Backup"
        - "Owner entscheidet NICHT allein - aber er/sie sorgt dafür, dass entschieden wird"
        - "Analogie: «Owner = Projektleiter des Pfostens» (FC01 Aufgaben nutzen!)"
      moderationstext: |
        Erinnert euch an eure Flipcharts vom letzten Mal:
        Der Projektleiter sorgt für Überblick, Meilensteine, Kommunikation.
        Der Pfosten-Owner ist genau das - aber für SEINEN Pfosten.

        Und erinnert euch: Commitment statt Pflicht.
        Wer sich meldet, will es. Wer sich nicht meldet, hat gute Gründe.
      why: "Verbindet FC01 (PL-Aufgaben) mit Pfosten-Ownership - Kontinuität"

    - element: "Freiwillige Owner-Zuordnung"
      time: "2:35 - 2:50"
      duration: "15 Min"
      responsible: "Team"
      content:
        - "Pfosten-Tableau an der Wand"
        - "«Wer möchte einen Pfosten als Owner übernehmen? Meldet euch freiwillig.»"
        - "Für jeden Owner: Co-Owner bestimmen"
        - "Matrix ausfüllen:"
        - "  | Pfosten | Owner | Co-Owner |"
        - "  |---------|-------|----------|"
        - "Wenn Pfosten ohne Owner: Team-Diskussion (Brauchen wir den Pfosten?)"
      moderationshinweis: |
        WICHTIG: NICHT zuweisen! Freiwilligkeit (FC04).
        Wenn jemand zögert: «Kein Problem. Wer möchte als Co-Owner unterstützen?»
        Wenn KEIN Owner für einen Pfosten: «Das ist ein Signal.
        Vielleicht ist der Pfosten doch nicht so wichtig? Oder braucht es mehr Info?»
      why: "Freiwilligkeit statt Zwang (FC04) - wer einen Pfosten nicht will, wird ihn nicht treiben"

    - element: "48h-Schritte definieren"
      time: "2:50 - 3:05"
      duration: "15 Min"
      responsible: "Owner (mit FehrAdvice-Unterstützung)"
      content:
        - "Jeder Owner beantwortet:"
        - "  «Was ist das EINE, das ich in den nächsten 48 Stunden tue?»"
        - "Regeln für 48h-Schritte:"
        - "  → Konkret (kein «ich informiere mich»)"
        - "  → Machbar (kein «ich baue ein Pilotprojekt auf»)"
        - "  → Sichtbar (jemand anderes muss es sehen können)"
        - "Beispiele:"
        - "  ✅ «Ich rufe den Bauleiter Bad Ragaz an und frage nach den aktuellen Entsorgungskosten»"
        - "  ✅ «Ich schreibe eine Mail an Röbi mit den 3 wichtigsten Lieferanten für RC-Material»"
        - "  ❌ «Ich denke darüber nach» (nicht sichtbar)"
        - "  ❌ «Ich erstelle einen Projektplan» (zu gross)"
      moderationstext: |
        Jetzt wird's ernst.
        Jeder Owner: Was ist das EINE, das du in 48 Stunden tust?

        Nicht planen. Nicht informieren. MACHEN.
        Klein genug, dass es in 48 Stunden geht.
        Gross genug, dass es jemand sehen kann.
      why: "48h-Regel aus WS001 wird real - die Brücke zwischen Workshop und Alltag"

# =============================================================================
# BLOCK 5: COMMITMENT & VEREINBARUNGEN (25 Min)
# =============================================================================
block_5:
  name: "Commitment & Vereinbarungen"
  time: "3:05 - 3:30"
  duration: "25 Minuten"

  goal: "Verbindliche Vereinbarungen treffen, nächste Schritte festlegen, Energie sichern"

  elements:
    - element: "Pfosten-Owner-Matrix vorlesen"
      time: "3:05 - 3:10"
      duration: "5 Min"
      responsible: "Jörg Ryffel (Projektleiter)"
      content:
        - "Jörg liest die komplette Matrix vor:"
        - "  «Pfosten 1: [Name] - Owner: [Name] - 48h-Schritt: [Was]»"
        - "  ... für alle Pfosten"
        - "Nach jedem Pfosten: «[Name], stimmst du zu?» → Ja/Nein"
      moderationshinweis: |
        JÖRG macht das, NICHT FehrAdvice.
        Das ist SEINE Rolle als Projektleiter (FC01).
        Es ist sein erstes «Meilensteine setzen» in der neuen Rolle.
      why: "Jörg übernimmt Projektleiter-Rolle aktiv - FC01 wird gelebt"

    - element: "Vereinbarungen für die Zusammenarbeit"
      time: "3:10 - 3:18"
      duration: "8 Min"
      responsible: "FehrAdvice + Team"
      content:
        - "Drei Vereinbarungen fixieren:"
        - "  1. RHYTHMUS: «Wir treffen uns alle [X] Wochen zum Pfosten-Review»"
        - "     → Team entscheidet: 2 Wochen oder 3 Wochen?"
        - "  2. FORMAT: «Pfosten-Reviews dauern max. 60 Min»"
        - "     → Jeder Owner berichtet 5 Min: Was gelernt? Was als nächstes?"
        - "  3. VETO: «Jede:r kann jederzeit VETO sagen - dann diskutieren wir»"
        - "     → Bestätigung der WS001-Vereinbarung"
      moderationstext: |
        Drei Vereinbarungen für die nächsten Monate:

        Erstens: Wie oft treffen wir uns? Alle 2 oder alle 3 Wochen?
        Das entscheidet ihr jetzt.

        Zweitens: Die Reviews dauern maximal 60 Minuten.
        Jeder Owner hat 5 Minuten: Was gelernt? Was als nächstes?
        Kurz und knapp.

        Drittens: Die Veto-Regel bleibt. Wie im Kick-Off vereinbart.
      why: "Operationalisiert die Zusammenarbeit - vom Wunsch (FC05) zur Struktur"

    - element: "Commitment-Runde"
      time: "3:18 - 3:26"
      duration: "8 Min"
      responsible: "Alle"
      content:
        - "Jede:r sagt EINEN Satz (im Kreis stehend):"
        - "«Mein Beitrag in den nächsten 3 Wochen ist: _______________»"
        - "NICHT: «Ich werde versuchen...» → SONDERN: «Ich werde...»"
        - "Franziska (HR/Kultur) beginnt → Luis (Praktiker) → ... → Andreas (Sponsor) schliesst"
      moderationshinweis: |
        Reihenfolge ist bewusst: Franziska eröffnet (Kultur-Signal),
        Luis gibt Praxis-Perspektive, Andreas schliesst (Sponsor-Bestätigung).
        NICHT umgekehrt - sonst dominiert die Hierarchie.
      why: "Verbindliches Commitment vor der Gruppe - Identity-Aktivierung (U_IDN)"

    - element: "Abschluss & nächste Schritte"
      time: "3:26 - 3:30"
      duration: "4 Min"
      responsible: "FehrAdvice"
      content:
