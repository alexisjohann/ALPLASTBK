# ============================================================================
# FLIPCHART 1: Projektleiter - Aufgaben
# ============================================================================
flipchart_01:
  titel: "Projektleiter - Aufgaben"
  foto_beschreibung: "Braune Pinnwand mit Post-its, Flipchart-Beschriftung in blauer Handschrift"
  kontext: "Erarbeitung des Rollenverständnisses für Jörg Ryffel als Projektleiter"

  transkription:
    haupttitel: "Projektleiter - Aufgaben"
    inhalt:
      - "Kick-Off Datum setzen"
      - "Projektteam zusammenstellen"
      - "Überblick wahren"
      - "Meilensteine setzen"
      - "Controlling Budget & Timeline"
      - "Zwischenergebnisse kommunizieren"
      - "Reporting ans Management"
      - "Gesamtverantwortung"
      - "Entscheidungen treffen"
      - "Eskalationsstufe"
      - "Motivator / Treiber"
      - "Schnittstelle zu externen Partnern"

  analyse:
    zusammenfassung: |
      Das Team hat ein erstaunlich vollständiges Bild der Projektleiterrolle erarbeitet.
      Es zeigt sich ein Spannungsfeld: Einerseits klassisches PM (Meilensteine, Budget, Reporting),
      andererseits Führungsaspekte (Motivator, Entscheidungen, Eskalation).
    schluessel_erkenntnisse:
      - text: "Überblick wahren" als separate Aufgabe zeigt Komplexitätsbewusstsein
      - text: "Motivator / Treiber" - Team erwartet emotionale Führung, nicht nur PM
      - text: "Eskalationsstufe" - klare Hierarchie-Erwartung wenn Probleme entstehen
      - text: "Schnittstelle zu externen Partnern" - Boundary-Spanning-Rolle erkannt
    spannungsfeld: "PM-Kontrolle vs. People Leadership"

  ebf_relevanz:
    10c_dimensionen:
      - dimension: WHO
        bezug: "Rollenverteilung, Hierarchie, Entscheidungsrechte"
      - dimension: HIERARCHY
        bezug: "Eskalationsstufe, Reporting ans Management"
      - dimension: AWARE
        bezug: "Überblick wahren, Zwischenergebnisse kommunizieren"
    ws002_implikation: |
      Jörg Ryffel muss in WS002 sowohl als PM (Struktur) als auch als Leader (Motivation) auftreten.
      Die Rollenklärung war offenbar ein Bedürfnis des Teams.

# ============================================================================
# FLIPCHART 2: Führungsverständnis
# ============================================================================
flipchart_02:
  titel: "Führungsverständnis"
  foto_beschreibung: "Flipchart mit blauer Handschrift, zwei Spalten: links Aufzählung, rechts Ergänzungen"
  kontext: "Vertiefung des Führungsthemas - was bedeutet Führung im Kontext Kreislaufwirtschaft"

  transkription:
    haupttitel: "Führungsverständnis"
    inhalt:
      - "Wertschätzung"
      - "Eigenverantwortung"
      - "Kommunikation"
      - "Vertrauen"
      - "Vorleben"
      - "Fehlerkultur"
      - "Zuhören"
      - "Ziele setzen"
      - "Ressourcen bereitstellen"
      - "Entscheiden"
      - "Klarheit"

  analyse:
    zusammenfassung: |
      Das Team zeigt ein modernes, partizipatives Führungsverständnis.
      Bemerkenswert: "Wertschätzung" und "Eigenverantwortung" stehen ganz oben.
      "Fehlerkultur" und "Zuhören" deuten auf psychologische Sicherheit als Wert hin.
    schluessel_erkenntnisse:
      - text: "Vorleben" - Leadership by Example, besonders wichtig bei Kulturwandel
      - text: "Fehlerkultur" - In der Baubranche kulturell ungewöhnlich, zeigt Reife
      - text: "Eigenverantwortung" - Dezentralisierung gewünscht, nicht Command & Control
      - text: "Klarheit" - Bedürfnis nach eindeutiger Kommunikation
    dominant_pattern: "Psychologische Sicherheit + Empowerment"

  ebf_relevanz:
    10c_dimensionen:
      - dimension: WHO
        bezug: "Dezentrales Führungsverständnis vs. hierarchische Baubranche"
      - dimension: AWARE
        bezug: "Fehlerkultur = Bewusstsein für Lernprozesse"
      - dimension: HOW
        bezug: "Eigenverantwortung als Komplementarität zu Kontrolle"
    ws002_implikation: |
      Das Team WILL psychologische Sicherheit. WS002 muss diesen Wunsch aufgreifen
      und konkretisieren. "Fehlerkultur" ist ein Hebel für die Pilotphase.

# ============================================================================
# FLIPCHART 3: Führungskultur - Spannungsfeld
# ============================================================================
flipchart_03:
  titel: "Führungskultur - Spannungsfeld"
  foto_beschreibung: "Flipchart mit Diagonale/Achse, links 'Kontrolle', rechts 'Vertrauen', Punkte/Positionen markiert"
  kontext: "Visualisierung des Spannungsfelds zwischen Kontrolle und Vertrauen in der Führungskultur"

  transkription:
    haupttitel: "Führungskultur"
    untertitel: "Spannungsfeld"
    achse_links: "Kontrolle"
    achse_rechts: "Vertrauen"
    inhalt:
      - "Baubranche: eher kontrollgetrieben"
      - "Kreislaufwirtschaft: braucht Vertrauen"
      - "Team positioniert sich Mitte-rechts"
      - "Ambition: mehr Vertrauen, aber mit Leitplanken"

  analyse:
    zusammenfassung: |
      Das Team hat erkannt, dass die traditionelle Baubranche kontrollgetrieben ist,
      aber Kreislaufwirtschaft als Innovation mehr Vertrauen und Eigeninitiative braucht.
      Die Selbstpositionierung "Mitte-rechts" zeigt Bereitschaft zur Veränderung.
    schluessel_erkenntnisse:
      - text: "Kontrolle vs. Vertrauen" als bewusstes Spannungsfeld erkannt
      - text: "Leitplanken" - kein naives Vertrauen, sondern strukturiertes Empowerment
      - text: "Baubranche = Kontrolle" ist ein ehrliches Eingeständnis der Ist-Kultur
    kulturdiagnose: |
      IST: Kontrollkultur (Baubranche-typisch, Sicherheit, Compliance, Hierarchie)
      SOLL: Vertrauenskultur mit Leitplanken (Innovation braucht Freiraum)
      GAP: Signifikant aber machbar - Team hat den Willen

  ebf_relevanz:
    10c_dimensionen:
      - dimension: WHEN
        bezug: "Kontextwechsel: Baubranche-Kultur → Innovations-Kultur"
        psi_dimension: "Psi_I (institutioneller Kontext), Psi_K (Kulturwerte)"
      - dimension: HOW
        bezug: "Komplementarität Kontrolle × Vertrauen (nicht entweder-oder)"
      - dimension: READY
        bezug: "Team positioniert sich selbst als 'bereit für Veränderung'"
    ws002_implikation: |
      WS002 muss das Spannungsfeld produktiv nutzen: Nicht "Kontrolle abschaffen"
      sondern "Vertrauen ergänzen". Leitplanken definieren = psychologische Sicherheit schaffen.

# ============================================================================
# FLIPCHART 4: Zielbild Führung
# ============================================================================
flipchart_04:
  titel: "Zielbild Führung"
  foto_beschreibung: "Flipchart mit zentralem Kreis/Stern und umgebenden Begriffen"
  kontext: "Synthese: Wie soll Führung im Kreislaufwirtschaft-Projekt konkret aussehen?"

  transkription:
    haupttitel: "Zielbild Führung"
    inhalt:
      - "Gemeinsame Entscheidungen"
      - "Vorbild sein"
      - "Commitment statt Pflicht"
      - "Freiwilligkeit statt Zwang"
      - "Neue Wege (Werkzeuge)"
      - "Sichtbare Fortschritte"
      - "Lernende Organisation"
      - "Respekt vor Erfahrung"

  analyse:
    zusammenfassung: |
      Ein ambitioniertes Zielbild. Besonders auffällig: "Commitment statt Pflicht" und
      "Freiwilligkeit statt Zwang" - das Team will intrinsische Motivation, nicht Compliance.
      "Respekt vor Erfahrung" zeigt Bewusstsein für die erfahrenen Bauarbeiter auf der Baustelle.
    schluessel_erkenntnisse:
      - text: "Commitment statt Pflicht" - intrinsische vs. extrinsische Motivation (Crowding-Out!)
      - text: "Freiwilligkeit statt Zwang" - Autonomie als Kernwert
      - text: "Lernende Organisation" - Senge-Konzept, erstaunlich für Baubranche
      - text: "Respekt vor Erfahrung" - Brücke zu den operativen Mitarbeitern
      - text: "Sichtbare Fortschritte" - Quick Wins als Motivationsstrategie
    crowding_risk: |
      ACHTUNG: "Commitment statt Pflicht" + "Freiwilligkeit statt Zwang" bedeutet,
      dass finanzielle Anreize oder KPIs die Motivation UNTERGRABEN könnten (Crowding-Out).
      Interventionen müssen auf intrinsische Motivation setzen, nicht auf Boni.

  ebf_relevanz:
    10c_dimensionen:
      - dimension: WHAT
        bezug: "Commitment = U_identity (Selbstkonzept), nicht U_financial"
      - dimension: AWARE
        bezug: "Sichtbare Fortschritte = Feedback-Mechanismus, Awareness erhöhen"
      - dimension: STAGE
        bezug: "Lernende Organisation = Journey-Perspektive, nicht Einzelmassnahme"
    ws002_implikation: |
      WS002 muss "sichtbare Fortschritte" liefern - konkrete Quick Wins für den Piloten.
      WARNUNG: Keine KPI-Systeme oder finanzielle Anreize vorschlagen - das Team will
      intrinsische Motivation. Stattdessen: Anerkennung, Storytelling, Peer-Recognition.

# ============================================================================
# FLIPCHART 5: Erwartungen an die Zusammenarbeit
# ============================================================================
flipchart_05:
  titel: "Erwartungen an die Zusammenarbeit"
  foto_beschreibung: "Flipchart mit kurzer Liste, ein Punkt hervorgehoben ('Veto' in Anführungszeichen)"
  kontext: "Abschluss-Flipchart: Was erwartet das Team von FehrAdvice?"

  transkription:
    haupttitel: "Erwartungen an die Zusammenarbeit"
    inhalt:
      - "Skalierbarkeit mitdenken"
      - "Auf den Boden bringen"
      - "Wenn wir es in der Runde nicht schaffen, dann auch nicht als ZG (Zindel Gruppe)"
      - "Gesprächskultur aus dem Kick-Off fortführen «Veto»"

  analyse:
    zusammenfassung: |
      Das Team formuliert vier klare Erwartungen an FehrAdvice:
      1. Skalierbarkeit von Anfang an einbauen
      2. Pragmatismus statt Theorie
      3. Diese Gruppe als Lackmustest (hoher Erfolgsdruck)
      4. Offene Gesprächskultur mit Veto-Recht beibehalten
    schluessel_erkenntnisse:
      - text: "Skalierbarkeit mitdenken" - Pilot darf kein Silo sein
      - text: "Auf den Boden bringen" - klare Erwartung an Pragmatismus
      - text: "Lackmustest-Aussage" - enormer Erfolgsdruck auf WS002
      - text: "Veto-Kultur" - psychologische Sicherheit wurde im Kick-Off etabliert
    kritische_warnung: |
      "Wenn wir es in der Runde nicht schaffen, dann auch nicht als ZG" setzt
      WS002 unter hohen Druck. Der Workshop MUSS ein Erfolgserlebnis liefern.

  ebf_relevanz:
    10c_dimensionen:
      - dimension: HOW
        bezug: "Veto-Kultur = bidirektionale Kommunikation, Komplementarität Hierarchie × Offenheit"
      - dimension: STAGE
        bezug: "Skalierbarkeit = Journey-Perspektive, von Pilot zu Organisation"
      - dimension: READY
        bezug: "Team bereit aber skeptisch - Handlungsbereitschaft mit Vorbehalt"
    ws002_implikation: |
      WS002 muss ein konkretes, sichtbares Ergebnis liefern.
      Veto-Kultur aktiv nutzen (kritische Stimmen einbeziehen, nicht unterdrücken).
      Skalierbarkeit als Design-Prinzip in jede Massnahme einbauen.

