# =============================================================================
# WORKSHOP "ES GEHT LOS" - FINALE STRUKTUR v3.1
# =============================================================================
# Projekt: ZIN003 - Kreislaufwirtschaft Verhaltensänderung
# Kunde: Zindel United
# Version: 3.1
# Datum: 2026-02-03
# Status: FINAL
# =============================================================================

metadata:
  workshop_name: "Es geht los"
  version: "3.1"
  total_duration: "3 Stunden (180 Min)"
  participants: "Kernteam (9 Personen) + Champions"
  date: "TBD - Februar 2026"
  location: "Zindel United Hauptsitz"

# =============================================================================
# WORKSHOP-PHILOSOPHIE
# =============================================================================
philosophy:
  headline: "Der Workshop endet nicht mit Verständnis, sondern mit HANDLUNG"

  proof_of_readiness:
    - "✅ Zwei gemeinsame Ziele sind definiert und akzeptiert"
    - "✅ 3-5 Pfosten (Lern-Felder) sind benannt"
    - "✅ Jeder Pfosten hat einen Owner"
    - "✅ Mindestens 1 Lern-Hypothese ist formuliert"
    - "✅ Jemand startet in 48 Stunden"

# =============================================================================
# DIE ZWEI GEMEINSAMEN ZIELE (Roter Faden)
# =============================================================================
shared_goals:
  description: |
    Diese zwei Ziele sind der RAHMEN für alles, was im Workshop passiert.
    Sie werden in Block 1 definiert und ziehen sich durch den ganzen Tag.

  goal_1:
    id: "Z1"
    title: "Wir beweisen, dass Kreislaufwirtschaft ein Business Case ist"
    question: "Ist CU wirtschaftlich sinnvoll für Zindel?"
    success_metrics:
      - "-15% Entsorgungskosten"
      - "-8% Materialkosten"
      - "+0.5-0.7% Marge"
    answered_by: "Pfosten + Lern-Hypothesen (Block 4 + 6)"
    priority: "VORAUSSETZUNG - muss zuerst beantwortet werden"

  goal_2:
    id: "Z2"
    title: "Wir nehmen alle Mitarbeitenden mit"
    question: "Wie schaffen wir es, dass alle mitmachen?"
    success_metrics:
      - "Champions aktiv"
      - "Klare Rollen"
      - "Commitment sichtbar"
    answered_by: "Rollen & Zusammenarbeit (Block 5)"
    priority: "UMSETZUNG - nur relevant wenn Z1 = JA"

  logic: |
    Z1 → Z2 (sequenziell)
    Erst beweisen, dass es funktioniert.
    Dann skalieren mit den Menschen.

# =============================================================================
# AGENDA-ÜBERSICHT
# =============================================================================
agenda_overview:
  - block: 1
    name: "Sinn & Orientierung"
    time: "0:00 - 0:30"
    duration: "30 Min"
    focus: "WARUM und WOHIN"

  - block: 2
    name: "Szenarien"
    time: "0:30 - 1:00"
    duration: "30 Min"
    focus: "WAS KANN PASSIEREN"

  - block: 3
    name: "48h-Regel erleben"
    time: "1:00 - 1:30"
    duration: "30 Min"
    focus: "WIE ENTSCHEIDEN WIR"

  - block: "Pause"
    time: "1:30 - 1:45"
    duration: "15 Min"

  - block: 4
    name: "Pfosten definieren"
    time: "1:45 - 2:15"
    duration: "30 Min"
    focus: "WAS TESTEN WIR"

  - block: 5
    name: "Rollen & Zusammenarbeit"
    time: "2:15 - 2:45"
    duration: "30 Min"
    focus: "WER MACHT WAS"

  - block: 6
    name: "Commitment & Los"
    time: "2:45 - 3:00"
    duration: "15 Min"
    focus: "START IN 48H"

# =============================================================================
# BLOCK 1: SINN & ORIENTIERUNG (30 Min)
# =============================================================================
block_1:
  name: "Sinn & Orientierung"
  time: "0:00 - 0:30"
  duration: "30 Minuten"

  goal: "Gemeinsames Verständnis für das WARUM und WOHIN schaffen"

  output:
    - "Outcome-Visualisierung verstanden"
    - "Zwei gemeinsame Ziele (Z1, Z2) definiert und akzeptiert"
    - "Team ist motiviert und ausgerichtet"

  elements:
    - element: "Begrüssung Andreas Zindel"
      time: "0:00 - 0:05"
      duration: "5 Min"
      responsible: "Andreas Zindel"
      content:
        - "Willkommen"
        - "Warum sind wir hier? Warum jetzt?"
        - "Kurzer Rückblick auf Vorbereitungsgespräche"
      moderationshinweis: "Kurz und energetisch - nicht predigen"

    - element: "Outcome-Visualisierung"
      time: "0:05 - 0:15"
      duration: "10 Min"
      responsible: "FehrAdvice"
      content:
        - "Headline: 'ZINDEL BAUT ZUKUNFT – DER KREIS SCHLIESST SICH'"
        - "5 KPIs zeigen:"
        - "  → Entsorgungskosten: -15%"
        - "  → Materialkosten: -8%"
        - "  → CO₂-Emissionen: -17%"
        - "  → Entscheidungen: 60% schneller"
        - "  → Marge: +0.5-0.7%"
        - "Testimonials (Zielbild): Ivo Bonderer, Röbi Heeb"
        - "Engagement-Kampagne: 'MACH MIT – DEIN MOMENT IM KREISLAUF'"
      moderationstext: |
        "Stellt euch vor, wir sind in 8 Monaten. Das Projekt ist abgeschlossen.
        So sieht Erfolg aus..."
      why: "Versetzt das Team ans Ende - macht Erfolg greifbar und motiviert"

    - element: "Zwei gemeinsame Ziele definieren"
      time: "0:15 - 0:25"
      duration: "10 Min"
      responsible: "FehrAdvice + Andreas Zindel"
      content:
        - "Ziel 1 vorstellen: 'Wir beweisen, dass CU ein Business Case ist'"
        - "Ziel 2 vorstellen: 'Wir nehmen alle Mitarbeitenden mit'"
        - "Logik erklären: Z1 → Z2 (erst beweisen, dann skalieren)"
        - "Frage ans Team: 'Stimmt ihr zu? Fehlt etwas?'"
      moderationstext: |
        "Alles was wir heute machen, dient zwei Zielen:

        ZIEL 1: Wir beweisen, dass Kreislaufwirtschaft ein Business Case ist.
        Kann Zindel damit Geld verdienen oder sparen?

        ZIEL 2: Wir nehmen alle Mitarbeitenden mit.
        Wie schaffen wir es, dass alle mitmachen?

        Ziel 2 ist nur relevant, wenn Ziel 1 funktioniert.
        Erst beweisen, dann skalieren.

        Stimmt ihr zu? Fehlt etwas?"
      output: "Zwei Ziele sind vom Team akzeptiert"
      why: "Gemeinsame Ziele schaffen Alignment und roten Faden"

    - element: "Kurze Reflexion"
      time: "0:25 - 0:30"
      duration: "5 Min"
      responsible: "FehrAdvice"
      content:
        - "Blitzlicht-Runde (freiwillig): 'Was bedeutet das für dich persönlich?'"
        - "2-3 kurze Statements"
      moderationshinweis: "Nicht erzwingen - nur wenn jemand will"
      why: "Persönliche Verbindung zum Thema herstellen"

  behavioral_activation:
    awareness: "Team versteht das WARUM"
    alignment: "Gemeinsame Richtung ist klar"
    willingness: "Motivation ist aktiviert"

# =============================================================================
# BLOCK 2: SZENARIEN (30 Min)
# =============================================================================
block_2:
  name: "Szenarien – Strategische Klarheit"
  time: "0:30 - 1:00"
  duration: "30 Minuten"

  goal: "Verständnis der vier realistischen Projektverläufe"

  output:
    - "Team kennt alle 4 Szenarien"
    - "Strategische Wachsamkeit ist aktiviert"
    - "Wunschdenken ist verhindert"

  elements:
    - element: "4 Szenarien vorstellen"
      time: "0:30 - 0:40"
      duration: "10 Min"
      responsible: "FehrAdvice"
      content:
        - "Szenario 1: 'Der Beweis ist da' (50-60%)"
        - "  → Alles läuft, KPIs erreicht, bereit zum Skalieren"
        - "Szenario 2: 'Fast geschafft' (25-30%)"
        - "  → Funktioniert, aber noch nicht stabil"
        - "Szenario 3: 'Technisch ok, keine Wirkung' (10-15%)"
        - "  → Prozesse laufen, aber Zahlen ändern sich nicht"
        - "Szenario 4: 'Kein Nutzen erkennbar' (5-10%)"
        - "  → Zu viel Aufwand, rechnet sich nicht"
      moderationstext: |
        "Jetzt schauen wir, was alles passieren KANN.
        Nicht um euch Angst zu machen, sondern um strategisch wach zu sein.
        Es gibt vier realistische Szenarien..."
      why: "Bewusstes Durchspielen verhindert Wunschdenken"

    - element: "Gruppenarbeit: 'Wie fühlt sich das an?'"
      time: "0:40 - 0:50"
      duration: "10 Min"
      responsible: "Alle (2er-Teams)"
      content:
        - "2er-Teams bilden"
        - "Frage: 'Wie fühlt sich jedes Szenario bei UNS an?'"
        - "5 Min Diskussion, 5 Min Notizen"
      moderationstext: |
        "Findet euch zu zweit zusammen.
        Geht die 4 Szenarien durch und fragt euch:
        'Wie würde sich das bei Zindel anfühlen?'
        Ihr habt 10 Minuten."
      why: "Persönliche Verbindung zu abstrakten Szenarien"

    - element: "Plenum: 'Wo wollen wir landen?'"
      time: "0:50 - 1:00"
      duration: "10 Min"
      responsible: "FehrAdvice + Alle"
      content:
        - "Sammlung: Was kam in den 2er-Teams raus?"
        - "Frage: 'Wo wollen wir landen?'"
        - "Frage: 'Was müssen wir tun, um Szenario 1-2 zu erreichen?'"
      moderationstext: |
        "Was ist euch aufgefallen? Wo wollen wir landen?
        Und was glaubt ihr, müssen wir tun, um dorthin zu kommen?"
      output: "Gemeinsames Verständnis, dass Erfolg nicht garantiert ist"
      why: "Aktiviert Handlungsbereitschaft und strategische Wachsamkeit"

  behavioral_activation:
    awareness: "Risiken sind bewusst"
    willingness: "Bereitschaft, aktiv zu steuern"

# =============================================================================
# BLOCK 3: 48h-REGEL ERLEBEN (30 Min)
# =============================================================================
block_3:
  name: "48h-Regel erleben"
  time: "1:00 - 1:30"
  duration: "30 Minuten"

  goal: "Das Entscheidungswerkzeug verstehen und praktisch erleben"

  output:
    - "Team versteht 🟢🔴🔵"
    - "Team hat das Werkzeug praktisch angewendet"
    - "Andreas hat erlebt, dass er nicht eingreifen muss"

  elements:
    - element: "48h-Regel + 🟢🔴🔵 einführen"
      time: "1:00 - 1:10"
      duration: "10 Min"
      responsible: "FehrAdvice"
      content:
        - "Die 48-Stunden-Regel erklären"
        - "Die drei Zustände:"
        - "  🟢 TESTEN: Reversibel → Lern-Hypothese → Start in 48h"
        - "  🔴 BEWUSST STOPPEN: Entscheidung NEIN → Dokumentieren warum"
        - "  🔵 ESKALIEREN: Type-1 → Führungsebene einbeziehen"
        - "5-Fragen-Eskalationsfilter vorstellen"
        - "Handout verteilen"
      moderationstext: |
        "Jetzt gebe ich euch ein Werkzeug, das alles verändert.
        Es heisst: Die 48-Stunden-Regel.

        Die Idee: Wenn eine Entscheidung reversibel ist,
        dann entscheide SOFORT und lerne aus dem Ergebnis.

        Es gibt drei Zustände..."
      why: "Werkzeug muss verstanden werden, bevor es angewendet wird"

    - element: "ÜBUNGS-SIMULATION"
      time: "1:10 - 1:25"
      duration: "15 Min"
      responsible: "Team (FehrAdvice beobachtet)"
      content:
        - "Szenario vorlesen:"
        - "  'Die Bauleitung will beim neuen Projekt RC-Material verwenden,"
        - "   aber die Kalkulation sieht keine Zeit dafür vor.'"
        - "  'Sollen wir es trotzdem testen?'"
        - "Team hat 10 Minuten für Entscheidung"
        - "REGEL: Andreas Zindel darf NICHT eingreifen!"
        - "FehrAdvice beobachtet: Wer spricht? Wer entscheidet? Was hilft/bremst?"
      moderationstext: |
        "Jetzt wird's praktisch. Hier ist ein Szenario:
        [Szenario vorlesen]

        Ihr habt 10 Minuten, um zu entscheiden: Testen - ja oder nein?
        Nutzt die 5 Fragen. Nutzt 🟢🔴🔵.

        WICHTIG: Andreas, du darfst NICHT eingreifen.
        Das Team entscheidet alleine.

        Los geht's - 10 Minuten ab jetzt."
      andreas_regel: "DARF NICHT EINGREIFEN - beobachtet nur"
      why: "Praktisches Erleben ist wirkungsvoller als Theorie"

    - element: "Nachbesprechung"
      time: "1:25 - 1:30"
      duration: "5 Min"
      responsible: "FehrAdvice"
      content:
        - "Fragen ans Team:"
        - "  'Wie wurde entschieden?'"
        - "  'Wer hat Verantwortung übernommen?'"
        - "  'Was hat geholfen? Was hat gebremst?'"
        - "Beobachtungen von FehrAdvice teilen"
        - "Key Insight: '48h ist keine Regel, sondern eine Haltung'"
      why: "Reflexion verankert das Gelernte"

  behavioral_activation:
    how: "Entscheidungsfähigkeit unter Unsicherheit"
    ready: "Handlungsbereitschaft aktiviert"

# =============================================================================
# PAUSE (15 Min)
# =============================================================================
pause:
  time: "1:30 - 1:45"
  duration: "15 Minuten"
  content: "Kaffee, informeller Austausch"
  facilitator_task:
    - "Flipcharts für Pfosten vorbereiten"
    - "Post-Its und Marker bereitlegen"
    - "Kurzer Check-in mit Andreas: 'Wie geht's dir damit?'"

# =============================================================================
# BLOCK 4: PFOSTEN DEFINIEREN (30 Min)
# =============================================================================
block_4:
  name: "Pfosten definieren"
  time: "1:45 - 2:15"
  duration: "30 Minuten"

  goal: "3-5 Lern-Felder (Pfosten) identifizieren, die Z1 beantworten"

  method_note: |
    WICHTIG: Hier KEINE 48h-Regel anwenden!
    Pfosten definieren = Priorisierung, nicht Entscheidung unter Unsicherheit.
    → Offene Diskussion + Konsens

  output:
    - "15-20 Themen gesammelt"
    - "3-5 Pfosten (Lern-Felder) definiert"
    - "Jeder Pfosten hat einen Namen"

  elements:
    - element: "Themen sammeln"
      time: "1:45 - 1:55"
      duration: "10 Min"
      responsible: "Alle"
      content:
        - "Frage: 'Was müssen wir testen/lernen, um Z1 zu beantworten?'"
        - "  (Z1 = 'Ist CU ein Business Case für Zindel?')"
        - "Jeder schreibt Themen auf Post-Its (1 Thema pro Post-It)"
        - "Alle Post-Its an die Wand"
      moderationstext: |
        "Wir wollen Ziel 1 beantworten: 'Ist Kreislaufwirtschaft ein Business Case?'

        Was müssen wir dafür TESTEN oder LERNEN?
        Schreibt jedes Thema auf einen Post-It.
        Ihr habt 8 Minuten."
      why: "Divergentes Denken - alles auf den Tisch"

    - element: "Clustern + Priorisieren"
      time: "1:55 - 2:10"
      duration: "15 Min"
      responsible: "FehrAdvice + Alle"
      content:
        - "Themen gemeinsam clustern (Was gehört zusammen?)"
        - "Cluster benennen → Das werden die Pfosten"
        - "OFFENE DISKUSSION: 'Welche 3-5 Cluster sind am wichtigsten?'"
        - "Konsens finden (nicht abstimmen!)"
      moderationstext: |
        "Lasst uns die Themen gruppieren. Was gehört zusammen?
        [Clustern]

        Jetzt benennen wir die Cluster - das werden unsere Pfosten.
        [Benennen]

        Welche 3-5 sind am wichtigsten für Ziel 1?
        Diskutiert offen - wir suchen Konsens, nicht Mehrheit."
      method: "Offene Diskussion, KEINE 48h-Regel hier"
      why: "Konvergentes Denken - Fokus finden"

    - element: "Pfosten benennen"
      time: "2:10 - 2:15"
      duration: "5 Min"
      responsible: "Andreas Zindel bestätigt"
      content:
        - "3-5 Pfosten mit Arbeitstiteln auf Flipchart"
        - "Andreas bestätigt: 'Das sind unsere Fokus-Themen'"
      output: "3-5 Pfosten mit Namen"
      example_pfosten:
        - "Pfosten 1: Material-Qualität (RC-Beton)"
        - "Pfosten 2: Rückbau-Prozess"
        - "Pfosten 3: Logistik & Partner"
        - "Pfosten 4: Wirtschaftlichkeit & Messung"

  connection_to_goals:
    Z1: "Pfosten beantworten direkt Ziel 1 (Business Case)"
    Z2: "Pfosten-Owner werden in Block 5 definiert (Mitarbeitende mitnehmen)"

# =============================================================================
# BLOCK 5: ROLLEN & ZUSAMMENARBEIT (30 Min)
# =============================================================================
block_5:
  name: "Rollen & Zusammenarbeit"
  time: "2:15 - 2:45"
  duration: "30 Minuten"

  goal: "Klären wer was macht - beantwortet Z2 (Mitarbeitende mitnehmen)"

  output:
    - "Jeder Pfosten hat einen Owner"
    - "Jeder weiss seine Rolle"
    - "Erwartungen sind ausgesprochen"

  elements:
    - element: "Einführung: Wie wir zusammenarbeiten"
      time: "2:15 - 2:20"
      duration: "5 Min"
      responsible: "FehrAdvice"
      content:
        - "Kernteam-Struktur erklären"
        - "Formate: Weekly, Circular Update, 48h-Regel"
        - "Champions-Rolle kurz vorstellen"
      why: "Rahmen setzen für Rollenklärung"

    - element: "Gruppenarbeit: Meine Rolle"
      time: "2:20 - 2:35"
      duration: "15 Min"
      responsible: "Alle"
      content:
        - "Jeder für sich (5 Min): 'Meine Rolle - mein Beitrag - meine Erwartung an andere'"
        - "Austausch in 3er-Gruppen (10 Min)"
      moderationstext: |
        "Jetzt geht's um euch persönlich.

        Schreibt für euch auf:
        1. Meine Rolle in diesem Projekt
        2. Mein konkreter Beitrag
        3. Was ich von anderen brauche

        5 Minuten für euch, dann Austausch in 3er-Gruppen."
      why: "Persönliche Verantwortung aktivieren"

    - element: "Plenum: Pfosten-Owner + Was brauchen wir?"
      time: "2:35 - 2:45"
      duration: "10 Min"
      responsible: "Andreas Zindel + Alle"
      content:
        - "Für jeden Pfosten: 'Wer ist Owner?'"
        - "Owner = Überblick behalten, nicht alles selbst machen"
        - "Sammlung: 'Was brauchen wir voneinander, damit das gelingt?'"
      output: "Pfosten-Owner-Matrix"
      moderationstext: |
        "Wer übernimmt welchen Pfosten?
        Owner heisst: Du behältst den Überblick.
        Du musst nicht alles selbst machen.

        [Pfosten durchgehen, Owner zuweisen]

        Was braucht ihr voneinander, damit das funktioniert?"
      why: "Klare Verantwortlichkeiten schaffen Vertrauen"

  connection_to_goals:
    Z2: "Dieser Block beantwortet direkt Ziel 2 (Mitarbeitende mitnehmen)"

  behavioral_activation:
    complementarity: "Gegenseitige Verlässlichkeit"
    identity: "Teil des Teams sein"

# =============================================================================
# BLOCK 6: COMMITMENT & LOS (15 Min)
# =============================================================================
block_6:
  name: "Commitment & Es geht los"
  time: "2:45 - 3:00"
  duration: "15 Minuten"

  goal: "Mindestens 1 echte Entscheidung + Start in 48h"

  output:
    - "1 Lern-Hypothese formuliert (für Pfosten 1)"
    - "1 Verantwortlicher startet in 48h"
    - "Commitment ist sichtbar und dokumentiert"
    - "Retro-Termin steht"

  elements:
    - element: "48h-Regel für Pfosten 1"
      time: "2:45 - 2:52"
      duration: "7 Min"
      responsible: "FehrAdvice + Pfosten-1-Owner"
      content:
        - "Konkretes Thema aus Pfosten 1 nehmen"
        - "5-Fragen-Filter anwenden → 🟢 TESTEN"
        - "Lern-Hypothese formulieren:"
        - "  'Wir glauben, dass [AKTION] zu [ERGEBNIS] führt.'"
        - "  'Wir messen [METRIK] über [ZEITRAUM].'"
        - "Erster Schritt + Deadline (innerhalb 48h)"
      moderationstext: |
        "Jetzt wird's ernst. Wir nehmen Pfosten 1 und machen
        eine ECHTE Entscheidung - keine Übung mehr.

        [5 Fragen durchgehen]
        → Das ist 🟢 TESTEN.

        Jetzt formulieren wir eine Lern-Hypothese..."
      why: "Echter Abschluss mit konkreter Handlung"

    - element: "Commitment-Runde"
      time: "2:52 - 2:57"
      duration: "5 Min"
      responsible: "Alle"
      content:
        - "Jeder sagt 1 Satz: 'Ich starte am Montag mit...'"
        - "Reihum - jeder kommt dran"
      moderationstext: |
        "Zum Abschluss: Jeder von euch sagt einen Satz.
        'Ich starte am Montag mit...'

        [Reihum]"
      why: "Öffentliches Commitment erhöht Umsetzungswahrscheinlichkeit"

    - element: "Abschluss + Foto"
      time: "2:57 - 3:00"
      duration: "3 Min"
      responsible: "Andreas Zindel"
      content:
        - "Kurze Abschlussworte Andreas"
        - "Gruppenfoto: 'Wir handeln in 48 Stunden!'"
        - "Retro-Termin ankündigen (in 2 Wochen)"
      output: "Energie und Richtung für den Start"

  behavioral_activation:
    identity: "Zugehörigkeit zum Projekt"
    commitment: "Öffentliche Verpflichtung"

# =============================================================================
# MATERIALIEN-CHECKLISTE
# =============================================================================
materials:
  print:
    - item: "48h-Regel Handout"
      quantity: "15 Stück"
      file: "WS001_48h_rule_handout.md"
    - item: "Lern-Hypothese Template"
      quantity: "10 Stück"
      file: "In Facilitator Guide Anhang A"
    - item: "Outcome-Visualisierung (Poster/Slide)"
      quantity: "1"
      file: "TBD"
    - item: "Szenarien-Übersicht"
      quantity: "1 Slide"
      file: "TBD"

  room:
    - "Beamer + Laptop"
    - "Flipchart-Papier (10 Blatt)"
    - "Post-Its gelb (2 Blöcke)"
    - "Marker schwarz, blau, rot (je 3)"
    - "Timer (sichtbar)"
    - "Kamera für Gruppenfoto"

  digital:
    - "Kalendereinladung für Retro (in 2 Wochen)"
    - "Protokoll-Template"

# =============================================================================
# NACH DEM WORKSHOP
# =============================================================================
follow_up:
  within_2h:
    - "Protokoll an alle senden"
    - "Fotos beifügen (Flipcharts, Gruppenfoto)"
    - "Lern-Hypothese als PDF"
    - "Retro-Termin als Kalendereinladung"

  within_48h:
    - "Check-in mit Lern-Hypothese-Owner: 'Läuft der Start?'"
    - "Check-in mit Pfosten-Ownern: 'Alles klar?'"
    - "Dokumentieren: Wurde gestartet?"

  after_2_weeks:
    - "Retro / Lern-Loop durchführen"
    - "Lern-Hypothese auswerten: Was haben wir gelernt?"
    - "Nächste 🟢 TESTEN Entscheidungen"
