# =============================================================================
# SZENARIEN (Mögliche Projektverläufe)
# =============================================================================
# Source: FehrAdvice_Outcome Visualisierung_Szenarien_WS Struktur.pdf, S.3
# =============================================================================

scenarios:
  _note: |
    Vier mögliche Verläufe, die zeigen, was passieren kann – vom vollen Erfolg
    bis zur Erkenntnis, dass es anders gedacht werden muss.

  scenario_1:
    name: "Der Beweis ist da"
    short: "Es läuft richtig gut"
    probability: "50-60%"
    description: |
      Alles greift ineinander: Rückbau, Recycling, Neubau – alles läuft.
      CO₂, Kosten und Zeit sinken.
    interpretation: |
      Der Pilot zeigt: Kreislaufwirtschaft funktioniert – technisch,
      organisatorisch, menschlich.
    next_steps: "Ausweiten auf weitere Projekte, Partner und Standorte."

  scenario_2:
    name: "Fast geschafft"
    short: "Es funktioniert – aber ist noch nicht stabil"
    probability: "25-30%"
    description: |
      Die Wirkung ist sichtbar (z.B. weniger Abfall, schnellere Abläufe),
      aber sie hängt noch stark an einzelnen Personen oder Projekten.
    interpretation: |
      Wir wissen: Der Ansatz ist richtig, aber Routinen und Verantwortungen
      müssen klarer werden.
    next_steps: "Routinen festigen, Standards definieren, Abläufe vereinheitlichen."

  scenario_3:
    name: "Funktioniert technisch, aber bringt's noch nicht"
    short: "Es läuft sauber – aber zeigt (noch) keine Wirkung"
    probability: "10-15%"
    description: |
      Alle machen mit, Prozesse laufen ordentlich, aber CO₂, Kosten oder
      Zeit verändern sich kaum.
    interpretation: |
      Der Ablauf stimmt, aber der Hebel fehlt: Material, Partner oder
      Markt müssen mitziehen.
    next_steps: |
      Wirkungstreiber identifizieren, Partner stärker einbinden,
      ökonomischen Hebel nachjustieren.

  scenario_4:
    name: "Kein Nutzen erkennbar"
    short: "Es funktioniert nicht – wir müssen's anders denken"
    probability: "5-10%"
    description: |
      Zu viel Aufwand und Kosten, zu wenig Nutzen. Es rechnet sich nicht,
      oder die Abläufe passen nicht.
    interpretation: |
      Die Idee stimmt, aber Rahmenbedingungen oder Umsetzung passen (noch) nicht.
    next_steps: "Lernpunkte sichern, Entscheidung über Neustart oder Fokuswechsel."

# =============================================================================
# PROJECT HYPOTHESES (Startideen)
# =============================================================================
# Source: One Pager_Projekt Kreislaufwirtschaft.pdf, S.1-2
# =============================================================================

hypotheses:
  _note: "Vier Startideen, die im Projekt getestet werden"

  - id: "H1"
    name: "Glaubwürdigkeit"
    hypothesis: |
      Wir vermuten, dass unsere Glaubwürdigkeit dann wächst, wenn
      Kreislaufwirtschaft in unseren Projekten sichtbar wird – also dort,
      wo wir sie tatsächlich anwenden, nicht nur kommunizieren.

  - id: "H2"
    name: "Zusammenarbeit"
    hypothesis: |
      Wir vermuten, dass Kooperation mit Partnern, Lieferanten und Gemeinden
      der Schlüssel für funktionierende Kreislaufwirtschaft ist – weil
      gemeinsam mehr Ideen und Lösungen entstehen.

  - id: "H3"
    name: "Wirtschaftlichkeit"
    hypothesis: |
      Wir vermuten, dass Kreislaufwirtschaft nur dann Teil unseres
      Kerngeschäfts wird, wenn sie sich wirtschaftlich trägt – also
      Zeit, Material oder Kosten spart.

  - id: "H4"
    name: "Lernen"
    hypothesis: |
      Wir vermuten, dass gezieltes Lernen in Projekten der wirksamste
      Weg ist, Kreislaufwirtschaft langfristig zu verankern – weil
      Praxiswissen nachhaltiger wirkt als Vorgaben.

# =============================================================================
# PROJECT GOALS
# =============================================================================
# Source: One Pager_Projekt Kreislaufwirtschaft.pdf, S.1
# =============================================================================

goals:
  discover:
    - "Ob und wo Kreislaufwirtschaft für uns wirtschaftlich tragfähig ist – also welchen Nutzen sie bringt"
    - "Welche Rolle Zindel United in einer regionalen Kreislaufwirtschaft einnehmen kann"
    - "Wo Kreislaufwirtschaft heute schon funktioniert (z.B. RC-Beton, Materialkreisläufe, Wiederverwertung)"
    - "Welche Abläufe oder Standards wir anpassen sollten, damit erfolgreiche Ansätze in unseren Alltag übergehen können"

  benefits:
    - benefit: "Wirtschaftlich sinnvoll"
      description: "Wir erkennen, wo Kreislaufwirtschaft für Zindel Nutzen bringt – durch weniger Abfall, bessere Ressourcennutzung und neue Geschäftsmöglichkeiten."

    - benefit: "Gezielt statt blind"
      description: "Wir investieren erst, wenn wir verstanden haben, was funktioniert – das senkt Risiko und erhöht Wirkung."

    - benefit: "Lernorientiert"
      description: "Wir entwickeln Wissen aus Erfahrung und schaffen Routinen, die bleiben."

    - benefit: "Glaubwürdig"
      description: "Wir zeigen Kreislaufwirtschaft im Tun – praktisch, nachvollziehbar und typisch Zindel."

  expected_outcomes:
    - "Praktisch erprobte Ansätze, wie Kreislaufwirtschaft bei Zindel funktioniert – in Planung, Bau und Betrieb"
    - "Erkenntnisse, wo Kreislaufwirtschaft für Zindel wirtschaftlich und organisatorisch Sinn macht"
    - "Konkrete Routinen oder Standards, die im Alltag bleiben, weil sie Nutzen bringen"
    - "Ein gemeinsames Verständnis, welche Rolle Zindel in der regionalen Kreislaufwirtschaft einnehmen will"

