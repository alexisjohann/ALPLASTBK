# =============================================================================
# WORKSHOP STRUCTURE (Kick-off)
# =============================================================================
# Source: FehrAdvice_Outcome Visualisierung_Szenarien_WS Struktur.pdf, S.5-6
# =============================================================================

workshop:
  name: "Kick-off Workshop"
  duration: "3 Stunden"
  goal: "Nach dem Workshop weiss jede:r, was der Beweis ist – und was er oder sie dazu beiträgt."
  principle: "Verbindet Sinn, Struktur und Verhalten"

  elements:
    - element: "Einstieg – Sinn & Orientierung"
      time: "0:00 – 0:30 (30 Min)"
      goal: "Gemeinsames Verständnis für das «Warum» schaffen"
      benefit: "Alle verstehen, weshalb Kreislaufwirtschaft strategisch, wirtschaftlich und kulturell wichtig ist"
      activities:
        - "Begrüssung durch Andreas Zindel: «Warum jetzt?»"
        - "Wrap-up zu den Vorbereitungsgesprächen"
        - "Präsentation der Outcome-Visualisierung («Zindel baut Zukunft – der Kreis schliesst sich»)"
        - "Reflexion im Plenum zu den Annahmen der Ergebnisvisualisierung"
        - "Gemeinsame Definition von quantitativen Zielen"
      behavioral_activation: "Awareness (Verstehen) und Alignment (Richtung)"

    - element: "Szenarien – Strategische Klarheit (MECE)"
      time: "0:30 – 1:00 (30 Min)"
      goal: "Verständnis der vier realistischen Projektverläufe"
      benefit: "Das Team erkennt, was Erfolg bedeutet – und welche Risiken dazugehören"
      activities:
        - "Vorstellung der vier Szenarien durch FehrAdvice (10 Min.)"
        - "Gruppenarbeit in 2er-Teams: «Wie fühlt sich jedes Szenario bei uns an?» (10 Min.)"
        - "Gemeinsame Diskussion im Plenum: «Wo wollen wir landen?» (10 Min.)"
      behavioral_activation: "Awareness + Willingness"

    - element: "Der Weg zum Ziel – Projektarchitektur & Formate (Simulation)"
      time: "1:00 – 1:40 (40 Min)"
      goal: "Verständnis, wie das Projekt geführt und entschieden wird"
      benefit: "Alle kennen das «Operating System» (Weekly, Kernteam, 48h-Regel) und erleben es praktisch"
      activities:
        - "Vorstellung der Roadmap 2026: Vier Phasen, Proof-Schritte"
        - "Einführung 48h-Regel als Entscheidungslogik und Formate der Zusammenarbeit"
        - "Simulation: «Die Bauleitung will beim neuen Projekt RC-Material verwenden, aber die Kalkulation sieht keine Zeit dafür vor.»"
        - "Das Team hat 10 Minuten, um zu entscheiden: Testen – ja oder nein? Andreas Zindel darf nicht eingreifen."
        - "FehrAdvice beobachtet Kommunikation & Entscheidungsverhalten"
        - "Kurze Nachbesprechung: «Wie wurde entschieden? Wer übernahm Verantwortung? Was half, was bremste?»"
      behavioral_activation: "Willingness (Handlungsbereitschaft) & Pragmatismus"
      insight: "Zeigt, dass «48h» keine Regel, sondern eine Haltung ist"

    - element: "Rollen & Zusammenarbeit"
      time: "1:40 – 2:30 (50 Min)"
      goal: "Erwartungen, Rollen und Verantwortung klären"
      benefit: "Jede:r weiss, welchen Beitrag er oder sie leistet – und was man von anderen braucht"
      activities:
        - "Einführung: «Wie wir als Kernteam zusammenarbeiten und welche Rollen es gibt»"
        - "Gruppenarbeit: «Meine Rolle – mein Beitrag – meine Erwartung an andere»"
        - "Sammlung & Diskussion im Plenum (20 Min.): «Was brauchen wir voneinander, damit das gelingt?»"
      behavioral_activation: "Komplementarität (K) – gegenseitige Verlässlichkeit und Transparenz"

    - element: "Abschluss & Commitment – Energie & Richtung"
      time: "2:30 – 3:00 (30 Min)"
      goal: "Motivation & Orientierung für die nächsten Schritte"
      benefit: "Alle wissen, was jetzt startet – und fühlen sich als Teil des Projekts"
      activities:
        - "Gemeinsame Reflexion: «Was nehme ich heute mit?»"
        - "Vorstellung der nächsten Schritte: Weeklys, Circular Update, 48h-Regel aktiv"
        - "Commitment-Runde + Gruppenfoto: «Wir handeln in 48 Stunden»"
      behavioral_activation: "Identity (IDN) – Zugehörigkeit und Zukunftsorientierung"

