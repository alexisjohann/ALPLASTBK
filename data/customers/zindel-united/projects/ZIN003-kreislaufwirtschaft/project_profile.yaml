# =============================================================================
# PROJECT OVERVIEW
# =============================================================================

overview:
  title: "Kreislaufwirtschaft bei Zindel United – von der Idee zur Praxis"
  vision: "ZINDEL BAUT ZUKUNFT – DER KREIS SCHLIESST SICH"

  description: |
    Wir wollen verstehen, ob und wie Kreislaufwirtschaft für Zindel United
    funktioniert – auf der Baustelle, im Werkhof, in der Planung und im Büro.
    Es geht nicht darum, bestehende Ideen zu bestätigen, sondern herauszufinden,
    was für uns wirklich machbar, sinnvoll und wirtschaftlich ist.

  why_now: |
    Kreislaufwirtschaft bleibt ein wichtiges Thema – Kund:innen, Gemeinden und
    Partner fordern Lösungen. Wenn wir das Thema aus unserer eigenen Praxis
    heraus prüfen und gestalten, schaffen wir uns einen Vorteil: Wir wissen,
    wo Kreislaufwirtschaft zu uns passt – und wo nicht.

  strategic_benefit: |
    Damit werden wir glaubwürdig, effizient und zukunftsfähig – für Kunden,
    Mitarbeitende und Partner.

  # Relevante Tochtergesellschaften für Kreislaufwirtschaft
  relevant_subsidiaries:
    - name: "TABREC Recycling AG"
      role: "Kernkompetenz Recycling & mobile Aufbereitung"
      focus: "Baustoff-Recycling, Rückbau"

    - name: "Logbau AG"
      role: "Nachhaltiges Bauen"
      focus: "CO2-neutraler Beton, REBA25 Bindemittel, RC-Beton"

    - name: "Speztec AG"
      role: "Schadstoffsanierung"
      focus: "Fachgerechte Entsorgung, Dekontamination"

    - name: "Invias AG"
      role: "Innovation"
      focus: "Neue Ideen und Aussenperspektive"

    - name: "Kieswerke (Tardis, Schiers)"
      role: "Primärrohstoffe"
      focus: "Kiesgewinnung, Aufbereitung"

    - name: "Betonwerke (Tardis, Flums)"
      role: "Betonproduktion"
      focus: "Integration von Recycling-Materialien"

  keywords:
    - "Kreislaufwirtschaft"
    - "Circular Economy"
    - "Baustoff-Recycling"
    - "RC-Beton"
    - "CO2-neutraler Beton"
    - "Nachhaltigkeit"
    - "Ressourceneffizienz"
    - "Materialkreisläufe"
    - "Wiederverwertung"

