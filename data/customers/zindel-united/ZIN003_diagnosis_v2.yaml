# =============================================================================
# ZIN003 KREISLAUFWIRTSCHAFT - DIAGNOSE v2.0
# =============================================================================
# Verdichtung aus Vorabgesprächen
# Kritische Aktualisierung der Projekt-Annahmen
# Erstellt: 2026-02-02
# =============================================================================

metadata:
  version: "2.0"
  date: "2026-02-02"
  source: "Vorabgespräche Kernteam Zindel"
  updated_by: "FehrAdvice"
  supersedes: "Ursprüngliche Annahmen in MOD-ZIN-001 v1.0"

# =============================================================================
# KERN-DIAGNOSE: REFRAME DES PROBLEMS
# =============================================================================
core_diagnosis:

  original_assumption:
    description: |
      Das ursprüngliche ODE-Modell (MOD-ZIN-001) ging davon aus, dass die
      Hauptbarrieren in MOTIVATION (u_S, u_X) und KOMPETENZ (u_D) liegen.
      Die Interventionen fokussierten daher auf:
      - Champions für Social Proof
      - Training für Kompetenzaufbau
      - Narrativ für Purpose/Meaning

    implied_model: "Wollen + Können → Handeln"

  revised_diagnosis:
    description: |
      Die Vorabgespräche zeigen ein anderes Bild:
      - Know-how ist VORHANDEN
      - Motivation ist VORHANDEN
      - Erste Erfahrungen sind VORHANDEN

      ⚠️ Die Barriere liegt NICHT im Wollen oder Können,
      sondern im HANDELN UNTER UNSICHERHEIT und in der ENTSCHEIDUNGSFÄHIGKEIT.

    implied_model: "Wollen + Können + Entscheidungsfähigkeit unter Unsicherheit → Handeln"

    key_insight: |
      "Die Herausforderung liegt nicht im Wollen oder Können,
      sondern im Handeln unter Unsicherheit und Entscheidungsfähigkeit"

# =============================================================================
# WAS WIR HEUTE SEHEN
# =============================================================================
current_state:

  positives:
    - observation: "Kreislaufwirtschaft ist inhaltlich angekommen"
      evidence: "Know-how vorhanden, erste Erfahrungen gemacht, Motivation da"
      implication: "Training (INT-ZIN-003) ist wichtig, aber nicht der Haupthebel"

    - observation: "Team ist motiviert und freut sich auf externe Unterstützung"
      evidence: "Positive Resonanz in Vorabgesprächen"
      implication: "Champions (INT-ZIN-001) werden gut funktionieren"

    - observation: "Potentieller Nutzen wird als hoch eingeordnet"
      evidence: "Alle Kernteam-Mitglieder sehen Wert"
      implication: "Narrativ (INT-ZIN-005) hat guten Boden"

  challenges:
    - observation: "Unterschiedliche, legitime Verständnisse von Kreislaufwirtschaft"
      perspectives:
        - name: "Material & Technik"
          focus: "Was ist technisch möglich? Welche Materialien eignen sich?"
        - name: "Wirtschaftlichkeit & Risiko"
          focus: "Rechnet sich das? Was sind die Risiken?"
        - name: "Logistik & Prozesse"
          focus: "Wie organisieren wir das? Welche Abläufe ändern sich?"
        - name: "Haltung & Zukunftsfähigkeit"
          focus: "Wer wollen wir sein? Was ist unsere Verantwortung?"
      implication: |
        Diese Perspektiven sind ALLE legitim und müssen integriert werden.
        → Entscheidungen erfordern EXPLIZITE Abwägung, nicht impliziten Konsens.

    - observation: "Skeptisch bezüglich kurzfristigem Business Case"
      evidence: "Kernteam sieht langfristigen Wert, aber kurzfristige Unsicherheit"
      implication: |
        Finanzieller ROI allein wird nicht überzeugen.
        → Brauchen Entscheidungsrahmen, der mit Unsicherheit umgehen kann.

    - observation: "Unsicherheit führt zu Vertagung statt zu Lernen"
      pattern: "Wenn unklar → vertagen → bleibt offen"
      implication: |
        ⚠️ DIES IST DER ZENTRALE HEBEL!
        → Müssen Entscheidungsmechanismen ändern, nicht nur Motivation.

# =============================================================================
# ORGANISATORISCHE REALITÄT
# =============================================================================
organizational_reality:

  structure:
    - fact: "Kreislaufwirtschaft ist firmenübergreifend"
      entities: ["Zindel Bau", "Invias AG", "TorAlva", "TABREC", "Logbau"]
      implication: "Keine einzelne Einheit kann allein entscheiden"

    - fact: "Entscheidungen betreffen mehrere Einheiten gleichzeitig"
      example: "Material-Wiederverwendung betrifft Bau, Logistik, Qualität, Finanzen"
      implication: "Koordinationskosten sind hoch"

    - fact: "Risiken sind früh sichtbar, aber schwer abschliessend bewertbar"
      risk_types:
        - type: "Kosten"
          uncertainty: "Zusatzaufwand für Sortierung, Lagerung, Prüfung"
        - type: "Qualität"
          uncertainty: "Ist wiederverwendetes Material gleichwertig?"
        - type: "Haftung"
          uncertainty: "Wer trägt Verantwortung bei Qualitätsmängeln?"
        - type: "Timing"
          uncertainty: "Passt verfügbares Material zu Projektbedarf?"
      implication: "Klassische ROI-Rechnung versagt bei hoher Unsicherheit"

  consequences:
    - consequence: "Strategische Themen bleiben 'wichtig, aber häufig offen'"
      mechanism: "Ohne klare Entscheidungsregel → keine Entscheidung"

    - consequence: "Lernen passiert punktuell, nicht systematisch"
      mechanism: "Erfahrungen werden gemacht, aber nicht explizit ausgewertet"
      missing: "Feedback-Loop von Erfahrung zu neuer Entscheidung"

    - consequence: "Verantwortung wandert implizit nach oben"
      mechanism: "Wenn unsicher → eskalieren → Andreas Zindel entscheidet"
      problem: "Skaliert nicht, blockiert operatives Team"

# =============================================================================
# 10C REFRAME: WO LIEGT DER WAHRE HEBEL?
# =============================================================================
ten_c_reframe:

  original_focus:
    primary:
      - dimension: "WHAT (u_S)"
        weight_original: 0.30
        interventions: ["INT-ZIN-001 Champions", "INT-ZIN-002 Retros"]
      - dimension: "WHAT (u_D)"
        weight_original: 0.25
        interventions: ["INT-ZIN-003 Training"]
      - dimension: "WHAT (u_X)"
        weight_original: 0.20
        interventions: ["INT-ZIN-005 Narrativ"]
    secondary:
      - dimension: "AWARE"
        weight_original: 0.15
        interventions: ["INT-ZIN-004 Stories"]
      - dimension: "WHAT (u_F)"
        weight_original: 0.10
        interventions: ["INT-ZIN-006 Bonus"]

  revised_focus:
    critical_addition:
      - dimension: "HOW (γ)"
        weight_revised: 0.35
        rationale: |
          "Handeln unter Unsicherheit" ist ein HOW-Problem.
          Wie werden Entscheidungen getroffen? Wie wird Unsicherheit gehandhabt?
        new_interventions: ["INT-ZIN-007 Entscheidungsarchitektur"]

      - dimension: "READY (WAX)"
        weight_revised: 0.20
        rationale: |
          Willingness to Act trotz Unsicherheit.
          Nicht "wollen wir CU?" sondern "sind wir bereit zu handeln ohne Sicherheit?"
        mechanism: "Risiko-Akzeptanz, Lernbereitschaft, Fehlertoleranz"

      - dimension: "HIERARCHY (HI)"
        weight_revised: 0.15
        rationale: |
          "Verantwortung wandert nach oben" ist ein HIERARCHY-Problem.
          Wer darf/muss entscheiden auf welcher Ebene?
        mechanism: "Entscheidungsrechte, Delegation, Autonomie"

    reduced_weight:
      - dimension: "WHAT (u_D)"
        weight_revised: 0.10
        rationale: "Know-how ist bereits vorhanden"

      - dimension: "AWARE"
        weight_revised: 0.05
        rationale: "Awareness ist nicht das Problem"

# =============================================================================
# MODELL-IMPLIKATIONEN
# =============================================================================
model_implications:

  ode_adjustments:
    original_bottleneck: "Utility (U) und Adoption (A)"
    revised_bottleneck: "Resistance (R) durch Entscheidungs-Unsicherheit"

    parameter_updates:
      - parameter: "R_0 (Initial Resistance)"
        original: 0.60
        revised: 0.45
        rationale: "Widerstand ist nicht gegen CU, sondern gegen Unsicherheit"

      - parameter: "ρ (Resistance Decay)"
        original: 0.04
        revised: 0.02
        rationale: "Resistance baut langsamer ab, weil strukturell verankert"
        note: "Ohne Entscheidungsarchitektur-Intervention bleibt R hoch!"

      - parameter: "evidence_effectiveness"
        original: "basiert auf Quick Wins"
        revised: "basiert auf LERN-ERFOLGE, nicht nur Projekt-Erfolge"
        mechanism: "Explizites Lernen → R↓ stärker als implizites Tun"

    new_state_variable:
      name: "D (Decision Capability)"
      description: "Fähigkeit, unter Unsicherheit zu entscheiden"
      initial: 0.30
      equation: "dD/dt = θ · learning_events · (1-D) - forgetting · D"
      coupling: "A hängt jetzt auch von D ab: dA/dt = β · U · A · (1-A) · D"

  intervention_implications:
    keep_as_is:
      - id: "INT-ZIN-001"
        reason: "Champions sind weiterhin wichtig für Social Learning"
      - id: "INT-ZIN-002"
        reason: "Retros werden wichtiger als LERN-Mechanismus (nicht nur Reflexion)"
      - id: "INT-ZIN-005"
        reason: "Narrativ gibt Orientierung bei Unsicherheit"

    adjust:
      - id: "INT-ZIN-003"
        adjustment: "Weniger technisches Training, mehr Entscheidungs-Training"
        new_focus: "Wie entscheide ich unter Unsicherheit? Welche Kriterien?"

      - id: "INT-ZIN-004"
        adjustment: "Stories über LERN-Erfolge, nicht nur Projekt-Erfolge"
        new_focus: "'Wir haben X versucht, Y gelernt, jetzt machen wir Z'"

    add_new:
      - id: "INT-ZIN-007"
        name: "Entscheidungsarchitektur"
        target_10c: "HOW (γ)"
        description: "Strukturierte Entscheidungsprozesse für CU-Fragen"
        priority: "CRITICAL"

      - id: "INT-ZIN-008"
        name: "Lern-Loops"
        target_10c: "READY (WAX)"
        description: "Explizite Auswertung und Weitergabe von Erfahrungen"
        priority: "HIGH"

# =============================================================================
# NEUE INTERVENTION: ENTSCHEIDUNGSARCHITEKTUR
# =============================================================================
new_intervention_007:

  F1_title:
    id: "INT-ZIN-007"
    name: "CU-Entscheidungsarchitektur"
    short_name: "Entscheidungen"

  F2_target_dimension:
    dimension_10c: "HOW"
    delta_target: "γ_decision↑"
    intervention_vector: "I_HOW"
    description: "Strukturierte Entscheidungsprozesse unter Unsicherheit"

  core_concept:
    problem: |
      Unsicherheit → Vertagung → bleibt offen → wandert nach oben

    solution: |
      Entscheidungsrahmen, der EXPLIZIT mit Unsicherheit umgeht:
      1. Nicht "haben wir alle Infos?" sondern "können wir entscheiden?"
      2. Nicht "ist es sicher richtig?" sondern "ist es umkehrbar?"
      3. Nicht "wer ist verantwortlich?" sondern "wer darf entscheiden?"

  mechanism:
    name: "Reversibility-Based Decision Framework"
    source: "Bezos 'Type 1 vs Type 2' + Real Options Theory"

    decision_types:
      type_1:
        name: "Türen die sich schliessen (irreversibel)"
        examples:
          - "Grosse Investition in CU-Infrastruktur"
          - "Langfristige Lieferantenverträge"
          - "Öffentliche Positionierung"
        decision_rule: "Sorgfältig analysieren, eskalieren wenn nötig"
        decision_level: "L1+ (Andreas Zindel + Kernteam)"

      type_2:
        name: "Türen die offen bleiben (reversibel)"
        examples:
          - "Pilot-Projekt starten"
          - "Material für ein Projekt testen"
          - "Prozess für 3 Monate ausprobieren"
        decision_rule: "Schnell entscheiden, schnell lernen, anpassen"
        decision_level: "L0 (Projektteam autonom)"

    key_questions:
      - question: "Ist diese Entscheidung umkehrbar?"
        if_yes: "Type 2 → Team entscheidet, 48h Frist"
        if_no: "Type 1 → Analyse + Kernteam"
      - question: "Was ist das Worst Case Szenario?"
        threshold: "Wenn Worst Case tragbar → entscheiden, nicht vertagen"
      - question: "Was lernen wir, wenn wir es versuchen?"
        principle: "Lernwert oft höher als Wartekosten"

  implementation:
    week_1:
      - task: "Entscheidungs-Framework dokumentieren"
        output: "1-Pager mit Type 1/Type 2 Logik"
      - task: "Entscheidungsrechte definieren"
        output: "Wer darf was entscheiden? (RACI-artig)"
    week_2:
      - task: "Training für Kernteam (2h)"
        content: "Framework verstehen, Beispiele durchspielen"
      - task: "Erste Anwendung: Offene CU-Entscheidungen klassifizieren"
        output: "Liste: Welche sind Type 1, welche Type 2?"
    ongoing:
      - task: "Bei jeder CU-Entscheidung: Framework anwenden"
        ritual: "Start jedes Entscheidungsmeetings: 'Type 1 oder 2?'"
      - task: "In Retros: Entscheidungs-Review"
        question: "Haben wir richtig klassifiziert? Was haben wir gelernt?"

  expected_effect:
    primary: "Entscheidungsgeschwindigkeit↑ bei Type 2 Entscheidungen"
    secondary: "Klarheit↑ bei Type 1 Entscheidungen (wann eskalieren)"
    tertiary: "Lernrate↑ durch mehr Experimente"

    quantitative:
      decision_speed_type2: "+300% (von Wochen zu Tagen)"
      decisions_per_month: "+50%"
      escalations_to_CEO: "-40%"

# =============================================================================
# NEUE INTERVENTION: LERN-LOOPS
# =============================================================================
new_intervention_008:

  F1_title:
    id: "INT-ZIN-008"
    name: "Explizite Lern-Loops"
    short_name: "Lern-Loops"

  F2_target_dimension:
    dimension_10c: "READY"
    delta_target: "WAX↑"
    intervention_vector: "I_READY"
    description: "Systematisches Lernen aus CU-Erfahrungen"

  core_concept:
    problem: |
      "Lernen passiert punktuell, nicht systematisch und explizit"
      → Erfahrungen gehen verloren
      → Dieselben Fehler werden wiederholt
      → Erfolge werden nicht repliziert

    solution: |
      Explizite Lern-Loops mit definiertem Prozess:
      1. PLANEN: Was wollen wir lernen?
      2. TESTEN: Experiment durchführen
      3. AUSWERTEN: Was ist passiert? Warum?
      4. WEITERGEBEN: Wer muss das wissen?
      5. ANPASSEN: Was ändern wir?

  mechanism:
    name: "Structured Learning Cycles"
    source: "PDCA + Action Learning + After Action Review"

    learning_artifacts:
      - artifact: "Lern-Hypothese"
        template: "Wir glauben, dass [X] zu [Y] führt, weil [Z]"
        example: "Wir glauben, dass Beton-Recycling vor Ort 20% Kosten spart, weil Transport entfällt"

      - artifact: "Experiment-Design"
        template: "Um das zu testen, werden wir [Aktion] bei [Projekt] messen [Metrik]"
        example: "Um das zu testen, werden wir bei Baustelle A Beton vor Ort recyclen und Kosten tracken"

      - artifact: "Lern-Protokoll"
        template: |
          - Hypothese: [war]
          - Ergebnis: [ist]
          - Überraschung: [was haben wir nicht erwartet]
          - Implikation: [was bedeutet das für andere]

      - artifact: "Wissens-Update"
        template: "Ab jetzt gilt: [neue Regel/Erkenntnis]"
        distribution: "An alle relevant Personen kommunizieren"

  integration_with_retros:
    current_retro: "Was war gut? Was war schwierig? Was nehmen wir mit?"
    enhanced_retro: |
      + "Was haben wir GELERNT?" (nicht nur gemacht)
      + "Welche Hypothese wurde bestätigt/widerlegt?"
      + "Wer muss das wissen?"

  implementation:
    kickoff:
      - task: "Lern-Loop Prozess erklären (im Kick-off Training)"
        duration: "30 min als Teil von M4"
    ongoing:
      - task: "Für jeden Pilot: Lern-Hypothese formulieren"
        responsible: "Pilot-Team + Projektleiter"
      - task: "Monatlicher 'Lern-Review' (30 min)"
        agenda: "Alle Lern-Protokolle durchgehen, Implikationen diskutieren"
      - task: "Lern-Datenbank pflegen"
        format: "Einfaches Wiki/SharePoint mit Suchfunktion"

  expected_effect:
    primary: "Explizites Lernen statt implizites Vergessen"
    secondary: "Fehler werden einmal gemacht, nicht wiederholt"
    tertiary: "Erfolgs-Replikation beschleunigt"

    quantitative:
      documented_learnings_per_month: "10+"
      knowledge_retrieval_rate: "+200%"
      repeat_mistakes: "-60%"

