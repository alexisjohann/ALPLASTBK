            - "Warum jetzt? Warum wir?"
            - "Outcome-Bild kurz zeigen"
            - "Quantitative Ziele: -15% Entsorgung, -8% Material, -17% CO₂"
          notes: "Kompakt - nicht ausführlich diskutieren"

        - time: "08:30 - 08:45"
          item: "48h-Regel ERLEBEN (Kernelement 1)"
          responsible: "FehrAdvice"
          duration: "15 Min"
          content:
            - "Simulation: RC-Beton Entscheidung"
            - "5-Fragen-Checkliste durchgehen"
            - "Ergebnis: 🟢 TESTEN"
            - "«Das ist unser Werkzeug»"
          intervention: "INT-ZIN-007"
          notes: "VORHER Szenarien - Team hat Werkzeug!"

        - time: "08:45 - 09:00"
          item: "Szenarien KURZ (mit 48h-Brille)"
          responsible: "FehrAdvice"
          duration: "15 Min"
          content:
            - "4 Szenarien zeigen"
            - "«Welches Szenario? Hängt ab von wie oft 🟢 TESTEN»"
          notes: "Nicht durchspielen - sie haben jetzt das Werkzeug"

    pause_1:
      - time: "09:00 - 09:15"
        item: "Kaffeepause"
        duration: "15 Min"
        notes: "Informeller Austausch"

    phase_2_fokus:
      title: "PHASE 2: FOKUS FINDEN (60 Min)"
      elements:
        - time: "09:15 - 09:35"
          item: "Themen sammeln (Kernelement 2, Teil 1)"
          responsible: "FehrAdvice"
          duration: "20 Min"
          content:
            - "3 externe Beispiele: RC-Beton, Rückbau, Logistik"
            - "Teams ergänzen eigene Themen (Post-its)"
          output: "15-20 Themen an der Wand"
          intervention: "INT-ZIN-007"

        - time: "09:35 - 10:05"
          item: "Themen filtern (Kernelement 2, Teil 2)"
          responsible: "FehrAdvice + Team"
          duration: "30 Min"
          content:
            - "Jedes Thema durch 5-Fragen-Checkliste"
            - "Schnell: «Ist das 🟢, 🔴 oder 🔵?»"
            - "Clustering: Was gehört zusammen?"
          method: "~2 Min pro Thema"

        - time: "10:05 - 10:15"
          item: "Pfosten definieren"
          responsible: "FehrAdvice + Andreas Zindel"
          duration: "10 Min"
          content:
            - "Aus Clustern 3-5 Lern-Felder ableiten"
            - "«Das sind unsere Fokus-Themen für Monat 1-3»"
          output: "3-5 Pfosten mit Namen"

    phase_3_es_geht_los:
      title: "PHASE 3: ES GEHT LOS (60 Min)"
      elements:
        - time: "10:15 - 10:45"
          item: "ECHTE Entscheidung für Pfosten 1"
          responsible: "FehrAdvice + Team"
          duration: "30 Min"
          content:
            - "Konkretes Thema aus Pfosten 1"
            - "5-Fragen nochmal (ERNST - nicht Simulation!)"
            - "Andreas Zindel darf NICHT eingreifen"
            - "Entscheidung: 🟢 TESTEN"
            - "WER macht WAS bis WANN?"
            - "Lern-Hypothese formulieren"
          output:
            - "1 echte Entscheidung (🟢 TESTEN)"
            - "1 Lern-Hypothese dokumentiert"
            - "1 Verantwortlicher mit 48h-Commitment"
          intervention: "INT-ZIN-007 + INT-ZIN-008"
          notes: "DAS IST DER KERN - hier entsteht 'Es geht los'"

        - time: "10:45 - 11:00"
          item: "Verantwortlichkeiten klären"
          responsible: "Andreas Zindel + Team"
          duration: "15 Min"
          content:
            - "Für jeden Pfosten: Wer ist Owner?"
            - "Champions sichtbar machen"
            - "«Du bist verantwortlich für Pfosten X»"
          output: "Pfosten-Owner-Matrix"

        - time: "11:00 - 11:15"
          item: "Commitment & Abschluss (Bau-Version)"
          responsible: "Andreas Zindel + FehrAdvice"
          duration: "15 Min"
          method: "bcm_best_practices.commitment_bau_version"
          content:
            - "Jeder sagt LAUT: «Ich bin verantwortlich für [PFOSTEN]. Am Montag mache ich [SCHRITT].»"
            - "FehrAdvice schreibt auf Flipchart: Name + Erster Schritt"
            - "Foto vom Commitment-Flipchart"
            - "Gruppenfoto: «Wir handeln in 48 Stunden»"
            - "Nächster Termin: Retro in 2 Wochen"
          output: "Commitment-Flipchart + Foto + Retro-Termin"
          why: "Mündlich vor Kollegen zählt mehr als Kärtchen (Bau-Kultur)"

    buffer_networking:
      - time: "11:15 - 11:30"
        item: "Buffer + informeller Austausch"
        duration: "15 Min"
        notes: "Falls Phase 3 länger dauert oder für Fragen"

    optional_vertiefung:
      - time: "11:30 - 12:00"
        item: "OPTIONAL: Vertiefung zu einzelnen Pfosten"
        duration: "30 Min"
        notes: "Nur falls Zeit und Bedarf"

