# =============================================================================
# 1. CHAMPIONS IDENTIFIZIERUNG
# =============================================================================
champions:
  description: |
    CU-Champions sind lokale Opinion Leaders, die als Multiplikatoren für
    Kreislaufwirtschafts-Praktiken dienen. Sie müssen VOR dem Kick-off
    identifiziert und vorbereitet werden.

  target_count: 5

  selection_criteria:
    must_have:
      - criterion: "Intrinsische Motivation für Nachhaltigkeit"
        weight: 0.30
        assessment: "Interview-Frage: Warum ist dir Kreislaufwirtschaft wichtig?"
      - criterion: "Respekt im Team"
        weight: 0.25
        assessment: "Peer-Nomination oder Führungskraft-Einschätzung"
      - criterion: "Kommunikationsfähigkeit"
        weight: 0.20
        assessment: "Kann komplexe Themen einfach erklären"
      - criterion: "Verfügbarkeit (2-3h/Woche)"
        weight: 0.15
        assessment: "Explizite Zusage + Vorgesetzten-Freigabe"
      - criterion: "Diverse Abteilungen/Standorte"
        weight: 0.10
        assessment: "Mix aus Büro, Baustelle, Logistik"

    nice_to_have:
      - "Bereits Erfahrung mit Veränderungsprojekten"
      - "Informeller Einfluss über formale Rolle hinaus"
      - "Technisches Verständnis für CU-Prozesse"

  candidate_sources:
    - source: "Kernteam (9 Personen)"
      priority: "HIGH"
      expected_champions: 2-3
      rationale: "Bereits involviert, hohe Identifikation"
    - source: "Invias AG / TorAlva"
      priority: "HIGH"
      expected_champions: 1
      rationale: "Innovationsträger, technisches Know-how"
    - source: "Baustellen-Teams"
      priority: "MEDIUM"
      expected_champions: 1-2
      rationale: "Praxis-Perspektive, Glaubwürdigkeit"
    - source: "TABREC / Logbau"
      priority: "MEDIUM"
      expected_champions: 1
      rationale: "Infrastruktur-Experten"

  known_candidates:
    - name: "Arno Solèr"
      role: "Kernteam-Mitglied"
      department: "Operations"
      champion_score: 0.92
      strengths: ["Hohe Motivation", "Respektiert", "Erfahren"]
      notes: "Bereits als Champion vorgesehen in Projektplan"
    - name: "[TBD - aus Invias AG]"
      role: "Innovations-Lead"
      department: "Invias AG"
      champion_score: "TBD"
      strengths: ["Technisches Know-how", "Startup-Mentalität"]
      notes: "Mit Andreas Zindel abstimmen"
    - name: "[TBD - Baustellen-Vorarbeiter]"
      role: "Vorarbeiter"
      department: "Bau"
      champion_score: "TBD"
      strengths: ["Praxis-Glaubwürdigkeit", "Team-Respekt"]
      notes: "Wichtig für Buy-in auf Baustellen"

  champion_onboarding:
    timeline:
      week_1:
        - task: "Champion-Kandidaten identifizieren"
          responsible: "Projektleiter + Andreas Zindel"
          output: "Liste mit 8-10 Kandidaten"
        - task: "Kurz-Interviews führen (15 min)"
          responsible: "Projektleiter"
          output: "Champion-Scores für jeden Kandidaten"
      week_2:
        - task: "Finale 5 Champions auswählen"
          responsible: "Projektleiter + Andreas Zindel"
          output: "Bestätigte Champion-Liste"
        - task: "Vorgesetzten-Freigabe einholen"
          responsible: "Andreas Zindel"
          output: "Schriftliche Zusagen"
      week_3:
        - task: "Champion-Training (2h Workshop)"
          responsible: "FehrAdvice"
          output: "Trainierte Champions mit Kit"
          content:
            - "Rolle des Champions verstehen"
            - "Kommunikationstechniken"
            - "Umgang mit Widerstand"
            - "Reporting-Anforderungen"

    champion_kit:
      physical:
        - item: "Champion T-Shirt/Badge"
          purpose: "Sichtbare Identifikation"
        - item: "Pocket-Guide (Laminiert)"
          purpose: "Quick Reference für CU-Praktiken"
        - item: "Feedback-Karten"
          purpose: "Schnelles Sammeln von Team-Feedback"
      digital:
        - item: "Champion-Handbuch (PDF)"
          purpose: "Detaillierte Anleitungen"
        - item: "FAQ-Dokument"
          purpose: "Antworten auf häufige Fragen"
        - item: "Teams-Kanal Zugang"
          purpose: "Champion-Netzwerk-Kommunikation"

# =============================================================================
# 2. NARRATIV-VIDEO KONZEPT
# =============================================================================
narrative_video:
  description: |
    Das «Zukunft Bauen» Narrativ-Video ist ein zentrales Element von INT-ZIN-005.
    Es wird beim Kick-off Event gezeigt und danach im Intranet verfügbar sein.

  specifications:
    duration: "3-4 Minuten"
    format: "16:9, Full HD (1920x1080)"
    language: "Schweizerdeutsch mit deutschen Untertiteln"
    tone: "Authentisch, emotional, nicht werblich"

  key_messages:
    primary: "8 Generationen Zindel – jetzt bauen WIR die Zukunft!"
    secondary:
      - "Kreislaufwirtschaft ist keine Option, sondern unsere Verantwortung"
      - "Jeder Beitrag zählt – vom Büro bis zur Baustelle"
      - "Wir sind Pioniere, nicht Nachzügler"

  content_structure:
    intro:
      duration: "30 sec"
      content: "Historische Aufnahmen/Fotos der Zindel-Geschichte"
      voiceover: "Seit 8 Generationen baut Familie Zindel..."
    challenge:
      duration: "45 sec"
      content: "Klimawandel, Ressourcenknappheit, Bauabfälle"
      voiceover: "Aber die Welt hat sich verändert..."
    vision:
      duration: "60 sec"
      content: "Andreas Zindel spricht direkt in Kamera"
      key_quote: "Zukunft bauen heisst heute: im Kreislauf denken."
    how:
      duration: "45 sec"
      content: "Konkrete CU-Beispiele (TABREC, Logbau, Piloten)"
      voiceover: "Und so machen wir es..."
    call_to_action:
      duration: "30 sec"
      content: "Team-Montage, gemeinsames Commitment"
      voiceover: "Gemeinsam. Für die nächsten 8 Generationen."
    outro:
      duration: "10 sec"
      content: "Logo, Hashtag #ZukunftBauen"

  production_plan:
    week_1:
      - task: "Storyboard entwickeln"
        responsible: "FehrAdvice + Kommunikation Zindel"
        output: "Storyboard mit Szenen und Text"
      - task: "Interview mit Andreas Zindel planen"
        responsible: "Projektleiter"
        output: "Termin + Fragen-Katalog"
    week_2:
      - task: "Dreh: Andreas Zindel Interview"
        responsible: "Videograf"
        location: "Zindel Hauptsitz"
        duration: "2h"
      - task: "Dreh: B-Roll (Baustellen, Team, Material)"
        responsible: "Videograf"
        location: "Diverse Standorte"
        duration: "1 Tag"
      - task: "Historisches Material sammeln"
        responsible: "Zindel Archiv"
        output: "Fotos/Videos der Firmengeschichte"
    week_3:
      - task: "Schnitt und Postproduktion"
        responsible: "Videograf"
        output: "Erster Rohschnitt"
      - task: "Review mit Andreas Zindel"
        responsible: "Projektleiter"
        output: "Feedback und Anpassungen"
      - task: "Finalisierung + Untertitel"
        responsible: "Videograf"
        output: "Finales Video"

  budget:
    videograf: 4000
    equipment: 500
    postproduktion: 1500
    total_chf: 6000

# =============================================================================
# 3. TRAINING-CURRICULUM
# =============================================================================
training_curriculum:
  description: |
    Das CU-Pilot Training (INT-ZIN-003) vermittelt die praktischen Fähigkeiten
    für Kreislaufwirtschafts-Praktiken. Das Curriculum wird mit Invias AG entwickelt.

  structure:
    kick_off_training:
      date: "Kick-off Event (Woche 4)"
      duration: "4 Stunden"
      participants: "Alle Pilot-Team-Mitglieder (30 Personen)"
      modules:
        - module: "M1: Warum Kreislaufwirtschaft?"
          duration: "45 min"
          content:
            - "Globale Herausforderungen"
            - "Chancen für die Baubranche"
            - "Zindel's Vision"
          method: "Vortrag + Diskussion"
        - module: "M2: CU-Grundlagen"
          duration: "60 min"
          content:
            - "Was ist Circular Use?"
            - "Material-Kategorien"
            - "Kreislauf-Prinzipien"
          method: "Interaktiver Vortrag"
        - module: "M3: Praktische Anwendung"
          duration: "90 min"
          content:
            - "Material-Identifikation"
            - "Sortierung und Lagerung"
            - "Dokumentation"
          method: "Hands-on Workshop mit Materialproben"
        - module: "M4: Piloten verstehen"
          duration: "45 min"
          content:
            - "Welche Piloten starten?"
            - "Rollen und Verantwortlichkeiten"
            - "Erfolgsmessung"
          method: "Projektvorstellung + Q&A"

    monthly_deep_dives:
      - month: 2
        topic: "Material-Ströme optimieren"
        duration: "2 Stunden"
        focus: "Praktische Problemlösung"
      - month: 3
        topic: "Qualitätssicherung im Kreislauf"
        duration: "2 Stunden"
        focus: "Standards und Prüfverfahren"
      - month: 4
        topic: "Skalierung und Transfer"
        duration: "2 Stunden"
        focus: "Von Pilot zu Standard"

    certification:
      name: "Zindel CU-Experte"
      requirements:
        - "Teilnahme Kick-off Training"
        - "Mind. 2 von 3 Deep Dives"
        - "Wissenstest bestanden (≥70%)"
        - "Praktische Anwendung dokumentiert"
      benefits:
        - "Zertifikat für Personalakte"
        - "Berechtigung als Trainer für andere"
        - "Priorisierung bei internen Projekten"

# =============================================================================
# 4. WORKSHOP-STRUKTUR v2.0: "ES GEHT LOS"
# =============================================================================
workshop_structure_v2:
  name: "Workshop-Struktur v2.0: Es geht los"
  philosophy: |
    Der Workshop endet nicht mit Verständnis, sondern mit einer
    ECHTEN Entscheidung und einem Experiment, das in 48h startet.

    PROOF OF READINESS = ES GEHT LOS

  duration: "3 Stunden"
  participants: "Kernteam (9 Personen)"

  proof_of_readiness:
    description: "Am Ende des Workshops:"
    checklist:
      - "✅ 3-5 konkrete Themen (Pfosten) sind definiert"
      - "✅ Jedes Thema hat einen Zustand (🟢/🔴/🔵)"
      - "✅ Mindestens 1 Lern-Hypothese ist formuliert"
      - "✅ Jemand ist verantwortlich und startet in 48h"
    summary: "DAS ist der Beweis, dass Zindel handlungsfähig ist."

  # ---------------------------------------------------------------------------
  # PHASE 1: ORIENTIERUNG (45 Min)
  # ---------------------------------------------------------------------------
  phase_1_orientierung:
    name: "Phase 1: Orientierung"
    duration: "45 Minuten"
    time: "0:00 - 0:45"

    elements:
      - element: "Begrüssung Andreas Zindel"
        time: "0:00 - 0:15"
        duration: "15 Min"
        responsible: "Andreas Zindel"
        content:
          - "Warum jetzt? Warum wir?"
          - "Outcome-Bild kurz zeigen (nicht diskutieren)"
          - "Quantitative Ziele nennen (-15% Entsorgung, -8% Material, etc.)"
        why: "Sinn und Richtung in 15 Minuten - nicht mehr"

      - element: "48h-Regel ERLEBEN (Kernelement 1)"
        time: "0:15 - 0:30"
        duration: "15 Min"
        responsible: "FehrAdvice"
        content:
          - "Simulation: RC-Beton Entscheidung"
          - "5-Fragen-Checkliste durchgehen"
          - "Ergebnis: 🟢 TESTEN"
          - "«Das ist unser Werkzeug für heute und die nächsten 8 Monate»"
        why: "Team hat das Werkzeug BEVOR sie Szenarien hören"
        intervention: "INT-ZIN-007"

      - element: "Szenarien KURZ (mit 48h-Brille)"
        time: "0:30 - 0:45"
        duration: "15 Min"
        responsible: "FehrAdvice"
        content:
          - "4 Szenarien zeigen (nicht durchspielen)"
          - "«Welches Szenario? Hängt davon ab, wie oft wir 🟢 TESTEN»"
          - "Kein langes Durchspielen - sie haben jetzt das Werkzeug"
        why: "Szenarien NACH der 48h-Regel erzeugen keine Lähmung"

    phase_output: "Team versteht WARUM und hat das WERKZEUG"

  # ---------------------------------------------------------------------------
  # PAUSE (15 Min)
  # ---------------------------------------------------------------------------
  pause_1:
    time: "0:45 - 1:00"
    duration: "15 Minuten"
    content: "Kaffee + informeller Austausch"

  # ---------------------------------------------------------------------------
  # PHASE 2: FOKUS FINDEN (60 Min)
  # ---------------------------------------------------------------------------
  phase_2_fokus:
    name: "Phase 2: Fokus finden"
    duration: "60 Minuten"
    time: "1:00 - 2:00"

    elements:
      - element: "Themen sammeln (Kernelement 2, Teil 1)"
        time: "1:00 - 1:20"
        duration: "20 Min"
        responsible: "FehrAdvice"
        content:
          - "3 externe Beispiele vorstellen:"
          - "  → RC-Beton (Material-Kreislauf)"
          - "  → Rückbau (Prozess-Innovation)"
          - "  → Logistik (Systemoptimierung)"
          - "Teams ergänzen eigene Themen (Post-its)"
        output: "15-20 Themen an der Wand"
        why: "Divergentes Denken - alles auf den Tisch"
        intervention: "INT-ZIN-007"

      - element: "Themen filtern (Kernelement 2, Teil 2)"
        time: "1:20 - 1:50"
        duration: "30 Min"
        responsible: "FehrAdvice + Team"
        content:
          - "Jedes Thema durch 5-Fragen-Checkliste"
          - "Schnell: «Ist das 🟢, 🔴 oder 🔵?»"
          - "Clustering: Was gehört zusammen?"
        method: |
          Pro Thema ~2 Minuten:
          1. Kurz vorstellen (wer hat's geschrieben?)
          2. 5 Fragen durchgehen (Daumen hoch/runter)
          3. Zustand zuweisen (🟢/🔴/🔵)
          4. An Clusterwand positionieren
        why: "Konvergentes Denken - Fokus finden"

      - element: "Pfosten definieren"
        time: "1:50 - 2:00"
        duration: "10 Min"
        responsible: "FehrAdvice + Andreas Zindel"
        content:
          - "Aus Clustern 3-5 Lern-Felder (Pfosten) ableiten"
          - "«Das sind unsere Fokus-Themen für Monat 1-3»"
          - "Jeder Pfosten bekommt einen Arbeitstitel"
        output: "3-5 Pfosten mit Namen"
        why: "Klarheit worauf sich Energie konzentriert"

    phase_output: "3-5 fokussierte Lern-Felder (Pfosten)"

  # ---------------------------------------------------------------------------
  # PHASE 3: ES GEHT LOS (60 Min)
  # ---------------------------------------------------------------------------
  phase_3_es_geht_los:
    name: "Phase 3: Es geht los"
    duration: "60 Minuten"
    time: "2:00 - 3:00"

    elements:
      - element: "ECHTE Entscheidung für Pfosten 1"
        time: "2:00 - 2:30"
        duration: "30 Min"
        responsible: "FehrAdvice + Team"
        content:
          - "Konkretes Thema aus Pfosten 1 nehmen"
          - "5-Fragen nochmal (diesmal ERNST - nicht Simulation!)"
          - "Andreas Zindel darf NICHT eingreifen"
          - "Entscheidung: 🟢 TESTEN"
          - "WER macht WAS bis WANN?"
          - "Lern-Hypothese formulieren"
        output: |
          - 1 echte Entscheidung (🟢 TESTEN)
          - 1 Lern-Hypothese dokumentiert
          - 1 Verantwortlicher mit 48h-Commitment
        why: "Unterschied zur Simulation: Das ist ECHT"
        intervention: "INT-ZIN-007 + INT-ZIN-008"

      - element: "Verantwortlichkeiten klären"
        time: "2:30 - 2:45"
        duration: "15 Min"
        responsible: "Andreas Zindel + Team"
        content:
          - "Für jeden Pfosten: Wer ist Owner?"
          - "Champions sichtbar machen"
          - "«Du bist verantwortlich für Pfosten X»"
        output: "Pfosten-Owner-Matrix"
        why: "Keine anonymen Themen - jemand ist verantwortlich"

      - element: "Commitment & Abschluss"
        time: "2:45 - 3:00"
        duration: "15 Min"
        responsible: "Andreas Zindel"
        content:
          - "Jeder sagt 1 Satz: «Ich starte am Montag mit...»"
          - "Gruppenfoto: «Wir handeln in 48 Stunden»"
          - "Nächster Termin: Retro in 2 Wochen"
        output: "Commitment dokumentiert + Retro-Termin steht"
        why: "Abschluss erzeugt Energie und Verbindlichkeit"

    phase_output: |
      - 1 echte 🟢 TESTEN Entscheidung
      - 1 Lern-Hypothese
      - 1 Verantwortlicher startet in 48h
      - Retro-Termin in 2 Wochen

  # ---------------------------------------------------------------------------
  # WORKSHOP OUTPUT SUMMARY
  # ---------------------------------------------------------------------------
  workshop_output:
    title: "Was der Workshop liefert"

    deliverables:
      - deliverable: "15-20 Themen gesammelt"
        phase: "Phase 2"
        format: "Post-its an Wand"

      - deliverable: "3-5 Pfosten definiert"
        phase: "Phase 2"
        format: "Clusterwand + Namen"

      - deliverable: "1 echte 🟢 TESTEN Entscheidung"
        phase: "Phase 3"
        format: "Entscheidungs-Log"

      - deliverable: "1 Lern-Hypothese formuliert"
        phase: "Phase 3"
        format: "Lern-Hypothese-Template"

      - deliverable: "1 Verantwortlicher startet in 48h"
        phase: "Phase 3"
        format: "Name + konkreter erster Schritt"

      - deliverable: "Pfosten-Owner-Matrix"
        phase: "Phase 3"
        format: "Tabelle: Pfosten → Owner"

      - deliverable: "Retro-Termin in 2 Wochen"
        phase: "Phase 3"
        format: "Kalender-Einladung"

    difference_to_pdf_version:
      title: "Was sich geändert hat vs. PDF-Version"
      changes:
        - aspect: "Reihenfolge"
          pdf: "Szenarien VOR 48h-Regel"
          neu: "48h-Regel VOR Szenarien"
          why: "Team hat Werkzeug bevor Unsicherheit thematisiert wird"

        - aspect: "Szenarien-Zeit"
          pdf: "30 Min Szenarien durchspielen"
          neu: "15 Min Szenarien MIT 48h-Brille"
          why: "Weniger Analyse-Paralyse"

        - aspect: "Rollen-Diskussion"
          pdf: "50 Min abstrakte Rollen-Diskussion"
          neu: "60 Min echte Themen filtern"
          why: "Handlungsorientiert statt diskussionsorientiert"

        - aspect: "Simulation vs. Realität"
          pdf: "Simulation als Übung"
          neu: "ECHTE Entscheidung am Ende"
          why: "Workshop endet mit Commitment, nicht mit Verständnis"

        - aspect: "Output"
          pdf: "«Wir haben verstanden»"
          neu: "«Experiment startet Montag»"
          why: "Proof of Readiness = Es geht los"

  # ---------------------------------------------------------------------------
  # KERNELEMENT 1: 48h-REGEL (Detail)
  # ---------------------------------------------------------------------------
  kernelement_1_48h_regel:
    name: "Kernelement 1: 48h-Regel ERLEBEN"
    intervention_reference: "INT-ZIN-007"

    three_states:
      - state: "🟢 TESTEN"
        meaning: "Reversibel → Schnell entscheiden, schnell lernen"
        action: "→ Lern-Hypothese formulieren, Experiment starten"
      - state: "🔴 BEWUSST STOPPEN"
        meaning: "Bewusste Entscheidung GEGEN Weitermachen"
        action: "→ Dokumentieren warum, Ressourcen freigeben"
      - state: "🔵 ESKALIEREN"
        meaning: "Echte Type-1 Entscheidung, braucht höhere Ebene"
        action: "→ Klarer Eskalationspfad, definierte Entscheider"

    five_questions_checklist:
      title: "5-Fragen Eskalationsfilter"
      questions:
        - number: 1
          question: "Strategische Richtungsentscheidung?"
          if_yes: "→ 🔵 ESKALIEREN"
          zindel_example_ja: "Wir steigen aus Kreislaufwirtschaft aus"
          zindel_example_nein: "RC-Beton im Pilot testen"

        - number: 2
          question: "Nicht begrenzbares Risiko?"
          if_yes: "→ 🔵 ESKALIEREN"
          zindel_example_ja: "Liefervertrag ohne Ausstiegsklausel"
          zindel_example_nein: "Pilotprojekt mit definiertem Budget"

        - number: 3
          question: "Zielkonflikt ohne Autorität?"
          if_yes: "→ 🔵 ESKALIEREN"
          zindel_example_ja: "Bau vs. Logistik ohne gemeinsamen Chef"
          zindel_example_nein: "Entscheidung liegt im Pilotteam"

        - number: 4
          question: "Risikoleitplanken überschritten?"
          if_yes: "→ 🔵 ESKALIEREN"
          zindel_example_ja: "Budget +50% ohne Freigabe"
          zindel_example_nein: "Innerhalb Pilotbudget"

        - number: 5
          question: "Verantwortung blockiert?"
          if_yes: "→ 🔵 ESKALIEREN"
          zindel_example_ja: "Niemand will unterschreiben"
          zindel_example_nein: "Pilotleiter hat Mandat"

    simulation_example:
      question: |
        "Sollen wir RC-Beton in einem konkreten Pilotprojekt einsetzen,
        obwohl Qualität, Mengen und Kalkulation noch unsicher sind?"
      answers:
        - question: "Strategische Richtungsentscheidung?"
          answer: "Nein"
          explanation: "Pilot ist kein Strategiewechsel"
        - question: "Nicht begrenzbares Risiko?"
          answer: "Nein"
          explanation: "Pilot ist räumlich und zeitlich begrenzt"
        - question: "Zielkonflikt ohne Autorität?"
          answer: "Nein"
          explanation: "Pilotteam hat Entscheidungskompetenz"
        - question: "Risikoleitplanken überschritten?"
          answer: "Nein"
          explanation: "Innerhalb definierter Budgets/Toleranzen"
        - question: "Verantwortung blockiert?"
          answer: "Nein"
          explanation: "Klare Verantwortlichkeiten im Pilotteam"
      result: "🟢 TESTEN"
      key_insight: |
        Wir entscheiden nicht, ob RC-Beton «gut» ist,
        sondern WIE WIR MIT UNSICHERHEIT UMGEHEN.

  # ---------------------------------------------------------------------------
  # KERNELEMENT 2: FOKUS SICHERSTELLEN (Detail)
  # ---------------------------------------------------------------------------
  kernelement_2_fokus:
    name: "Kernelement 2: Fokus sicherstellen"
    intervention_reference: "INT-ZIN-007"

    part_1_sammeln:
      name: "Themen sammeln (divergent)"
      duration: "20 Min"
      method: |
        1. FehrAdvice zeigt 3 externe Beispiele:
           - RC-Beton (Material-Kreislauf)
           - Rückbau (Prozess-Innovation)
           - Logistik (Systemoptimierung)
        2. Teams ergänzen eigene Themen (Post-its)
        3. Alle Themen an die Wand
      output: "15-20 Themen"
      rule: "Kein Thema wird bewertet oder diskutiert"

    part_2_filtern:
      name: "Themen filtern (konvergent)"
      duration: "30 Min"
      method: |
        Pro Thema ~2 Minuten:
        1. Wer hat's geschrieben? (kurz vorstellen)
        2. 5 Fragen durchgehen (Daumen hoch/runter)
        3. Zustand zuweisen (🟢/🔴/🔵)
        4. An Clusterwand positionieren
      output: "Themen mit Zustand + Cluster"

    part_3_pfosten:
      name: "Pfosten definieren"
      duration: "10 Min"
      method: |
        1. Aus Clustern 3-5 Lern-Felder ableiten
        2. Jeder Pfosten bekommt Arbeitstitel
        3. Andreas Zindel bestätigt
      output: "3-5 Pfosten mit Namen"
      examples:
        - "Pfosten 1: Material-Qualität (RC-Beton)"
        - "Pfosten 2: Rückbau-Prozess"
        - "Pfosten 3: Logistik-Optimierung"
        - "Pfosten 4: Dokumentation & Messung"

  # ---------------------------------------------------------------------------
  # LERN-HYPOTHESE TEMPLATE
  # ---------------------------------------------------------------------------
  lern_hypothese_template:
    name: "Lern-Hypothese Template"
    intervention_reference: "INT-ZIN-008"

    template: |
      "Wir glauben, dass [INTERVENTION/AKTION]
       zu [ERGEBNIS] führt.
       Wir messen [METRIK] über [ZEITRAUM]."

    example: |
      "Wir glauben, dass RC-Beton in Pilot-Projekt Landquart
       die gleiche Druckfestigkeit wie Neubeton erreicht.
       Wir messen Druckfestigkeit (N/mm²) über 4 Wochen."

    fields:
      - field: "Thema"
        example: "RC-Beton Qualität"
      - field: "Lern-Hypothese"
        example: "RC-Beton erreicht ≥95% der Neubeton-Festigkeit"
      - field: "Metrik"
        example: "Druckfestigkeit (N/mm²)"
      - field: "Zeitraum"
        example: "4 Wochen"
      - field: "Verantwortlich"
        example: "Ivo Bonderer"
      - field: "Start"
        example: "Montag, 10.02.2026"

  # ---------------------------------------------------------------------------
  # BCM BEST PRACTICES & FACILITATOR-REGELN (Bau-tauglich)
  # ---------------------------------------------------------------------------
  bcm_best_practices:
    title: "BCM-konforme Ergänzungen (angepasst für Bauunternehmen)"

    # -------------------------------------------------------------------------
    # 1. PRE-MORTEM (5 Min nach 48h-Simulation)
    # -------------------------------------------------------------------------
    pre_mortem:
      name: "Pre-Mortem"
      when: "Nach 48h-Regel Simulation, vor Szenarien"
      duration: "5 Min"
      bcm_principle: "Prospective Hindsight (Klein 2007)"
      method: |
        FehrAdvice fragt:
        "Stellt euch vor, es ist Oktober 2026.
         Das Projekt ist gescheitert. Warum?"

        Team nennt spontan Risiken (keine Diskussion, nur sammeln).
        FehrAdvice schreibt auf Flipchart.
      output: "3-5 Risiken auf Flipchart"
      why: "Bau-Denken: 'Was kann schiefgehen?' ist vertraut"

    # -------------------------------------------------------------------------
    # 2. SOZIALE NORM (In Begrüssung integriert)
    # -------------------------------------------------------------------------
    soziale_norm:
      name: "Soziale Norm aktivieren"
      when: "In Begrüssung Andreas Zindel"
      duration: "+2 Min"
      bcm_principle: "Ψ_S (Social Context) - Descriptive Norms"
      method: |
        Andreas oder FehrAdvice zeigt 1 Beispiel:
        "PORR hat mit ähnlichem Ansatz in 6 Monaten
         ihre Recyclingquote um 23% gesteigert."

        NICHT: "Andere machen das auch"
        SONDERN: "Andere BAUUNTERNEHMEN haben das geschafft"
      why: "Peer-Referenz (anderes Bauunternehmen) ist glaubwürdiger"

    # -------------------------------------------------------------------------
    # 3. DEFAULT-REGEL
    # -------------------------------------------------------------------------
    default_regel:
      name: "Default bei Unentschiedenheit"
      when: "Bei jeder 5-Fragen-Anwendung"
      duration: "0 Min (nur Aussage)"
      bcm_principle: "Ψ_I (Institutional) - Default Effects"
      rule: |
        "Im Zweifel: 🟢 TESTEN"

        Wenn Team bei 5-Fragen unentschieden ist
        (z.B. 3x Nein, 2x unsicher):
        → DEFAULT ist 🟢 TESTEN

        Begründung: "Lieber testen und lernen als warten und hoffen."
      facilitator_script: |
        "Ich sehe, ihr seid nicht ganz einig.
         Unsere Regel: Im Zweifel testen wir.
         Also: 🟢 TESTEN. Wer übernimmt?"

    # -------------------------------------------------------------------------
    # 4. COMMITMENT BAU-VERSION (Mündlich + Flipchart)
    # -------------------------------------------------------------------------
    commitment_bau_version:
      name: "Commitment Bau-Version"
      when: "Phase 3: Commitment & Abschluss"
      duration: "15 Min"
      bcm_principle: "Public Commitment + Accountability"
      why_not_cards: |
        Commitment-Karten werden in Bauunternehmen oft als
        "HR-Schnickschnack" wahrgenommen. Handschlag und
        mündliches Wort vor Kollegen zählt mehr.
      method: |
        1. Jeder sagt LAUT vor der Gruppe:
           "Ich bin verantwortlich für [PFOSTEN].
            Am Montag mache ich [KONKRETER SCHRITT]."

        2. FehrAdvice schreibt auf Flipchart:
           ┌────────────────┬─────────────────────────┐
           │ Name           │ Erster Schritt (48h)    │
           ├────────────────┼─────────────────────────┤
           │ Ivo Bonderer   │ RC-Beton Lieferant      │
           │                │ anrufen                 │
           │ Röbi Heeb      │ Lagerplatz prüfen       │
           └────────────────┴─────────────────────────┘

        3. Foto vom Flipchart machen

        4. In Retro (2 Wochen): Flipchart-Foto zeigen
           Andreas fragt: "Ivo, du hast gesagt Lieferant
           anrufen. Und?"
      output: "Commitment-Flipchart + Foto"

    # -------------------------------------------------------------------------
    # 5. FACILITATOR-ESKALATIONSREGEL
    # -------------------------------------------------------------------------
    facilitator_eskalation:
      name: "Facilitator-Intervention bei Blockade"
      when: "Phase 3: Falls Team keine Entscheidung trifft"
      bcm_principle: "Process Facilitation + Time Boxing"
      trigger: |
        Team diskutiert > 10 Min ohne Fortschritt:
        - Endlos-Diskussion über Details
        - Niemand will Verantwortung übernehmen
        - "Wir müssen noch mehr analysieren"
      intervention_script: |
        FehrAdvice unterbricht:

        "Stopp. Ich sehe, wir drehen uns im Kreis.
         Das ist genau die Situation, für die wir
         die 48h-Regel haben.

         Frage an euch: Ist das eine Type-1 Entscheidung?
         [Pause - Team sagt meist 'Nein']

         Dann testen wir. Wer macht den ersten Schritt?
         [Pause - warten bis jemand sich meldet]

         [Falls niemand nach 30 Sek:]
         Ivo, du hast vorhin [X] gesagt. Übernimmst du?"
      escalation_to_andreas: |
        NUR wenn nach Facilitator-Intervention immer noch
        keine Entscheidung:

        FehrAdvice zu Andreas:
        "Andreas, dein Team braucht gerade deine Hilfe.
         Nicht um zu entscheiden, sondern um jemanden
         zu benennen, der den ersten Schritt macht."

    # -------------------------------------------------------------------------
    # 6. FEEDBACK-LOOP FÜR ANDREAS (Nach Workshop)
    # -------------------------------------------------------------------------
    feedback_loop_andreas:
      name: "48h Feedback-Loop"
      when: "Nach Workshop (Donnerstag 18:00)"
      bcm_principle: "Accountability + Follow-through"
      rule: |
        Wenn bis Donnerstag 18:00 kein Update von
        den Verantwortlichen → Andreas fragt aktiv nach.

        NICHT: "Wie läuft's?"
        SONDERN: "Ivo, was hast du seit Montag gemacht?"
      implementation: |
        1. FehrAdvice schickt Donnerstag 17:00 Reminder
           an Andreas mit Commitment-Flipchart-Foto

        2. Andreas schreibt/ruft jeden Verantwortlichen an
           der sich nicht gemeldet hat

        3. Ergebnisse fliessen in Retro (2 Wochen)

