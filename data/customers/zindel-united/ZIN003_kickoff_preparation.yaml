    mitigation: "Backup-Equipment, Video auf USB, Generalprobe"

# =============================================================================
# 8. ERFOLGSKRITERIEN KICK-OFF (v2.0: "Es geht los")
# =============================================================================
success_criteria:
  primary_success:
    title: "PROOF OF READINESS = ES GEHT LOS"
    criteria:
      - criterion: "Mindestens 1 ECHTE 🟢 TESTEN Entscheidung"
        target: 1
        measurement: "Entscheidungs-Log ausgefüllt"
        weight: "KRITISCH"

      - criterion: "1 Verantwortlicher startet in 48h"
        target: 1
        measurement: "Name + konkreter erster Schritt dokumentiert"
        weight: "KRITISCH"

      - criterion: "1 Lern-Hypothese formuliert"
        target: 1
        measurement: "Lern-Hypothese-Template ausgefüllt"
        weight: "KRITISCH"

    success_definition: |
      Der Workshop ist erfolgreich, wenn am Ende:
      - Eine ECHTE Entscheidung getroffen wurde (nicht Simulation)
      - Jemand konkret weiss, was er/sie in 48h startet
      - Eine testbare Hypothese dokumentiert ist

  secondary_success:
    criteria:
      - criterion: "3-5 Pfosten definiert"
        target: "3-5"
        measurement: "Pfosten-Liste mit Namen"

      - criterion: "15-20 Themen gesammelt"
        target: "15-20"
        measurement: "Post-its gezählt"

      - criterion: "Pfosten-Owner-Matrix komplett"
        target: "100%"
        measurement: "Jeder Pfosten hat einen Owner"

      - criterion: "Retro-Termin in 2 Wochen steht"
        target: 1
        measurement: "Kalender-Einladung versendet"

  qualitative:
    - criterion: "48h-Regel ist ERLEBT (nicht nur erklärt)"
      assessment: "Können Teilnehmer die 5 Fragen nennen?"
      test: "Stichprobe: 'Was sind die 5 Eskalationsfragen?'"

    - criterion: "Team hat Entscheidung SELBST getroffen"
      assessment: "Andreas Zindel hat in Phase 3 NICHT eingegriffen"
      test: "Beobachtung durch FehrAdvice"

    - criterion: "Energie ist auf HANDELN gerichtet"
      assessment: "Teilnehmer sprechen über 'was wir tun' nicht 'was wir verstehen'"
      test: "Commitment-Runde: Sätze beginnen mit 'Ich starte...'"

  anti_patterns:
    title: "Woran erkennen wir, dass es NICHT funktioniert hat?"
    red_flags:
      - "Diskussionen über 'ob' statt 'wie'"
      - "Andreas Zindel musste in Phase 3 eingreifen"
      - "Keine konkrete Person für 48h-Start benannt"
      - "Lern-Hypothese ist zu vage ('wir schauen mal')"
      - "Themen bleiben 'offen' ohne Zustand (🟢/🔴/🔵)"
      - "Team will 'noch mehr analysieren' bevor Entscheidung"
