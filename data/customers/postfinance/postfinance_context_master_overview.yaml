# =============================================================================
# EBF FRAMEWORK INTEGRATION
# =============================================================================

ebf_integration:
  # 10C CORE Mapping
  core_10c_mapping:
    WHO:
      description: "2.5 Mio Schweizer Kunden, digital-affin, wertbewusst, breit"
      relevant_layers: ["MKT", "PEO", "STK"]
      key_factors: ["KUN-01", "KUN-02", "STK-OEK-01"]

    WHAT:
      description: "Convenience, digitale Zugänglichkeit, Post-Vertrauen, faire Preise"
      relevant_layers: ["FIN", "STR", "TEC"]
      key_factors: ["FIN-ZAH-01", "STR-VIS-01", "TEC-DIG-01"]

    HOW:
      description: "Digital-first (E-Finance, App, TWINT), Post-Netzwerk"
      relevant_layers: ["TEC", "MKT", "STR"]
      key_factors: ["TEC-DIG-01", "TEC-DIG-03", "MKT-KAN-01"]

    WHEN:
      description: "Tägliche Zahlungen, Payment Moments, Lebensereignisse"
      relevant_layers: ["MKT", "STR", "FIN"]
      key_factors: ["MKT-PRD-01", "FIN-ZAH-01", "STR-INI-01"]

    WHERE:
      description: "Schweiz national, 16 Filialen + Post-Netzwerk + Digital"
      relevant_layers: ["MKT", "PEO", "ORG"]
      key_factors: ["MKT-KAN-01", "MKT-KAN-02", "ORG-STR-01"]

    AWARE:
      description: "Sehr hoch (Post-Marke Ubiquität, TWINT Marktführer)"
      relevant_layers: ["STK", "MKT", "STR"]
      key_factors: ["STK-REP-01", "MKT-ANT-01", "TEC-DIG-03"]

    READY:
      description: "Hoch (bestehende digitale Infrastruktur, grosse Kundenbasis)"
      relevant_layers: ["TEC", "ORG", "STK"]
      key_factors: ["TEC-DIG-01", "TEC-INF-01", "STK-EIG-01"]

    STAGE:
      description: "Mature Institution in digitaler Transformation"
      relevant_layers: ["STR", "PEO", "ORG"]
      key_factors: ["STR-CHG-01", "PEO-KUL-01", "ORG-GOV-01"]

  # Psi Dimension Mapping
  psi_dimension_mapping:
    psi_I:
      name: "Institutional Context"
      description: "POA Lending Restrictions, FINMA Supervision, Systemically Important"
      weight: 0.95
      primary_layers: ["ORG", "RIS"]

    psi_S:
      name: "Social Context"
      description: "Swiss Mass Market, Digital Adopters, Post-Brand Community"
      weight: 0.85
      primary_layers: ["PEO", "STK", "MKT"]

    psi_K:
      name: "Cultural Context"
      description: "Swiss Efficiency, Trust in Post Institution, Digital Openness"
      weight: 0.80
      primary_layers: ["PEO", "STK"]

    psi_E:
      name: "Economic Context"
      description: "High Interest Rate Sensitivity, No Lending Buffer, Fee-Dependent"
      weight: 0.90
      primary_layers: ["FIN", "MKT"]

    psi_T:
      name: "Temporal Context"
      description: "118 Years Post Financial Services, Digital Pioneer since 2014"
      weight: 0.75
      primary_layers: ["STR", "PEO"]

    psi_M:
      name: "Material/Technical Context"
      description: "E-Finance, TWINT Ecosystem, 16 Branches + Post Network"
      weight: 0.90
      primary_layers: ["TEC", "MKT"]

    psi_F:
      name: "Physical Context"
      description: "National Coverage, Urban/Rural through Post Network"
      weight: 0.70
      primary_layers: ["MKT", "PEO"]

    psi_C:
      name: "Cognitive Context"
      description: "Convenience-Oriented, Digital-First, Value-Conscious"
      weight: 0.85
      primary_layers: ["STR", "TEC"]

  # Behavioral Parameters
  behavioral_parameters:
    lambda_PF:
      name: "Loss Aversion (PostFinance-spezifisch)"
      value: 2.1
      description: "Moderate loss aversion, high digital convenience"
      source: "LLMMC + Context Analysis"

    tau_POST:
      name: "Trust Transfer - Post Brand"
      value: 0.78
      description: "Trust transfer from Swiss Post to PostFinance"
      source: "Brand equity studies"

    tau_TWINT:
      name: "Trust Transfer - TWINT Leadership"
      value: 0.85
      description: "Trust from TWINT market leadership"
      source: "Market position analysis"

    beta_DIGITAL:
      name: "Digital Adoption Propensity"
      value: 0.88
      description: "High digital adoption among PostFinance customers"
      source: "Customer behavior analysis"

    delta_CONVENIENCE:
      name: "Default Bias - Convenience"
      value: 0.72
      description: "Strong preference for convenient digital solutions"
      source: "LLMMC + Usage patterns"

    sigma_INTEREST:
      name: "Interest Rate Sensitivity"
      value: 0.95
      description: "Very high interest rate sensitivity (no lending buffer)"
      source: "Business model analysis"

# =============================================================================
# UNIQUE CHARACTERISTICS
# =============================================================================

unique_characteristics:
  lending_restriction:
    description: "Cannot grant own loans/mortgages (POA restriction)"
    impact: "Revenue diversification limited, interest rate sensitive"
    behavioral_implication: "Partnership model creates trust complexity"

  twint_leadership:
    description: "Co-founder and largest bank in TWINT ecosystem"
    users: 1100000
    behavioral_implication: "Strong digital identity, convenience expectation"

  post_brand:
    description: "100% Swiss Post ownership, yellow brand identity"
    behavioral_implication: "Trust transfer, ubiquitous awareness, accessibility perception"

  systemically_important:
    description: "Classified by SNB since 2015"
    behavioral_implication: "Perceived safety, special requirements"

