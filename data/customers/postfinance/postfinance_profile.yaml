  headquarters:
    city: "Bern"
    canton: "Bern"
    country: "Schweiz"
    address: "Mingerstrasse 20, 3030 Bern"

  ownership:
    type: "100% Subsidiary of Swiss Post"
    parent_company: "Die Schweizerische Post AG"
    parent_share: 1.00  # 100%
    public_trading: false
    staatsgarantie: false
    systemically_important: true  # Since 2015, classified by SNB
    regulatory_framework: "Postal Organization Act (POA)"

  subsidiaries:
