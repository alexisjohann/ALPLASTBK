# =============================================================================
# 8. STRATEGY PRACTICES ASSESSMENT (Yang et al. 2020)
# =============================================================================
#
# Basis: Yang, Christensen, Bloom, Sadun & Rivkin (2020) "How Do CEOs Make
# Strategy?" HBS Working Paper 21-063. Survey von 262 CEOs, 14-Item Scoring Grid.
#
# Kernerkenntnisse fuer Kaufland:
# 1. Strukturierte Strategieprozesse korrelieren mit 1.92x Firmengroesse
# 2. MBA-Ausbildung veraendert Strategiepraktiken kausal (Porter RDD 1983)
# 3. Erfahrene Manager verlassen sich MEHR auf Intuition, WENIGER auf Struktur
# 4. Branche erklaert fast NULL Varianz — Management-Praktiken sind der Hebel
#

strategy_practices_assessment:

  beschreibung: |
    Adaption des Yang et al. (2020) Strategy Practices Grid fuer die
    Kaufland-Filialleiterebene. Misst wie strukturiert Filialleitungen
    strategische Entscheidungen treffen (Sortimentsaenderungen,
    Personalplanung, Qualitaetsprozesse, Filialentwicklung).

  drei_dimensionen:

    formalization:
      name: "Strategische Formalisierung"
      kaufland_fragen:
        - "KF1: Kann die FK die Filialstrategie in 2 Saetzen formulieren?"
        - "KF2: Hat die FK bewusste Schwerpunkte (Sortiment, Kundensegmente)?"
        - "KF3: Kann die FK erklaeren was ihre Filiale von anderen unterscheidet?"
      skala: "1 (intuitiv) bis 5 (formalisiert)"
      yang_korrelation: "Formalization korreliert positiv mit Firmengroesse"

    development:
      name: "Strategieentwicklung"
      kaufland_fragen:
        - "KD1: Sucht die FK aktiv nach Verbesserungsmoeglichkeiten (vs. reagiert auf Probleme)?"
        - "KD2: Nutzt die FK Daten fuer Entscheidungen (vs. Bauchgefuehl)?"
        - "KD3: Gibt es regelmaessige Strategie-Gespraeche (vs. ad hoc)?"
        - "KD4: Werden Alternativen systematisch verglichen?"
        - "KD5: Werden Risiken strukturiert bewertet?"
      skala: "1 (reaktiv) bis 5 (proaktiv, evidenzbasiert)"
      yang_finding: "Development erklaert den groessten Anteil an Heterogenitaet"

    implementation:
      name: "Strategieumsetzung"
      kaufland_fragen:
        - "KI1: Antizipiert die FK Umsetzungsprobleme bei Entscheidungen?"
        - "KI2: Fuehrt die FK regelmaessige Reviews der Ergebnisse durch?"
        - "KI3: Lernt die FK systematisch aus ueberraschenden Ergebnissen?"
        - "KI4: Kommuniziert die FK Strategieaenderungen aktiv an das Team?"
        - "KI5: Antizipiert und adressiert die FK Widerstand gegen Veraenderungen?"
      skala: "1 (keine Nachverfolgung) bis 5 (systematisches Lernen)"
      yang_warning: |
        ACHTUNG: Formalization und Implementation sind NEGATIV korreliert!
        Training das nur Formalisierung staerkt (KPIs, Ziele) ohne
        Implementation (Ausfuehrung, Lernen) erzeugt lopsided Effekte.
        FK-Akademie MUSS beides abdecken.

  anwendung:
    pilot: "50 Filialen — Strategy Practices Grid mit 13 Kaufland-Fragen"
    benchmark: "Innerhalb Filial-Cluster vergleichen (branchenbereinigt)"
    intervention: |
      FKs mit niedrigem Score → Gezieltes Training (FK-Akademie INT-K-005/INT-K-006)
      FKs mit hohem Score → Best Practice Sharing, Mentor-Rolle
    messung:
      vorher: "Baseline-Assessment bei PX-Start"
      nachher: "6 Monate nach FK-Akademie"
      erwarteter_effekt: |
        Yang et al.: 1 SD = 4.7% Employment Growth.
        Uebertragen auf Kaufland: 1 SD Strategy Practice Improvement bei FK
        → erwartete +3-5% Filialleistung (TUEV-Score, Umsatz/MA, Fluktuation)
    erfahrungs_bias:
      warnung: |
        Yang et al. zeigen: Erfahrene Manager nutzen WENIGER strukturierte
        Prozesse. Kauflands erfahrene Filialleitungen (>10 Jahre) koennten
        sich gegen strukturierte Ansaetze wehren. Intervention-Design muss
        Autonomie-Cues einbauen und den Mehrwert durch EIGENE Filial-Daten
        demonstrieren (nicht Top-Down aufzwingen).
      betrifft: "WHO-01 Filialleitung — Erfahrungs-Segment"
      mitigation: "Self-Assessment-first → Daten zeigen → dann strukturieren"

  porter_rdd_implikation: |
    Die Porter-RDD beweist: Management-AUSBILDUNG veraendert Strategiepraktiken
    KAUSAL — noch Jahrzehnte spaeter. Das validiert Kauflands FK-Akademie-
    Investition. Aber Porters Curriculum erhoehte Formalization (+0.83 SD)
    waehrend Implementation SANK (-1.22 SD). Lektion fuer FK-Akademie:
    Curriculum muss BEIDE Dimensionen explizit adressieren.

  bib_keys:
    - "yang2020strategy"
    - "roberts2022managers"
    - "milgrom1995complementarities"

# =============================================================================
# 9. LEADERSHIP STYLE ECONOMICS (Dur, Kvaløy & Schöttner 2020)
# =============================================================================
# Formales oekonomisches Modell: Wie Arbeitsmarktbedingungen Fuehrungsstile
# bestimmen. Direkt relevant fuer Kaufland wegen Tarifvertrag.
# =============================================================================

leadership_style_economics:

  uebersicht: |
    Dur, Kvaløy & Schöttner (2020) zeigen formal: Fuehrungsstil ist ENDOGEN
    zu den Arbeitsmarktbedingungen. Unter kompetitivem Lohnsetting ist
    unfreundliche Fuehrung NIE optimal. Unter nicht-kompetitivem Lohnsetting
    (Tarifvertrag, Mindestlohn) wird unfreundliche Fuehrung profitabel,
    weil sie Arbeiter-Renten extrahiert.

    Kaufland operiert unter Tarifvertrag → Proposition 2 gilt direkt.

  tarifvertrag_analyse:
    situation: |
      Kaufland Deutschland: Tarifgebundener Einzelhandel.
      Wage floor w_bar > u (Marktlohn) → Worker Rent = w_bar - u > 0.
      Proposition 2 Bedingung: (1-rho)*k_U^l + max{s-(w_bar-u), 0} < rho*s
    risiko: |
      Strukturelle Bedingungen fuer unfreundliche Fuehrung EXISTIEREN bei Kaufland.
      Dies ist kein individuelles Versagen einzelner FKs, sondern ein
      institutionelles Ergebnis der Tarifstruktur.
    gegenmassnahmen:
      - "Leader Selection: Screening auf altruistische Sozialpraeferenzen (theta > 0)"
      - "FK-Akademie: Bewusstsein fuer strukturelle Anreize schaffen (AWARE)"
      - "Praise-Training: Lob als Fuehrungsinstrument staerken (Condition F)"
      - "Kompensationsstruktur: Einkommensluecke FK ↔ Verkauf reduzieren (Prop 4)"
      - "Monitoring: 360-Grad-Feedback zu Fuehrungsverhalten implementieren"

  fuehrungsstil_typologie:
    friendly_conditional:
      beschreibung: "Lob bei guter Leistung (Condition F: k_F^h < r)"
      kaufland_anwendung: "ZIEL-Stil fuer WHO-01 Filialleitung"
      selbstdurchsetzung: "Moderat altruistische FK (theta in (theta_F, theta_FF))"

    unfriendly_conditional:
      beschreibung: "Soziale Bestrafung bei schlechter Leistung"
      kaufland_risiko: |
        Wird profitabel wenn Tarifvertrag-Rente (w_bar - u) gross genug.
        Ca. 10% der Beschaeftigten erleben abusive supervision (Tepper 2017).
      selbstdurchsetzung: "Moderat boshaft (theta in (theta_UU, theta_U))"

    selfish_leader:
      beschreibung: "Kann sich weder zu Lob noch Bestrafung glaubwuerdig verpflichten"
      kaufland_implikation: |
        Egoistische FKs (theta = 0) sind als Fuehrungskraefte ineffektiv.
        Weder Lob noch Konsequenz ist glaubwuerdig → Mitarbeitende erkennen dies.

  einkommensluecke_prop4:
    mechanismus: |
      Proposition 4: Wenn Fuehrungskraefte bessere Aussenoptionen haben (u_l > u),
      werden boshaft eingestellte Fuehrungskraefte relativ billiger eingestellt.
      → Mehr unfreundliche Fuehrung.
    kaufland_mapping:
      who_01_filialleitung: "Hoehere Gehaelter, bessere Aussenoptionen"
      who_04_verkaufspersonal: "Tarifvertrag-Minimum, geringe Aussenoptionen"
      gap_risiko: |
        Grosse Einkommensluecke zwischen WHO-01 und WHO-04 verstaerkt
        den Proposition-4-Effekt. Kaufland sollte Kompensationsverhaeltnisse
        monitoren.

  int_k_integration:
    int_k_002_leadership_commitment:
      erweiterung: |
        Leadership Commitment Program muss explizit auf Dur et al.
        Erkenntnisse eingehen: Warum existieren strukturelle Anreize
        fuer unfreundliche Fuehrung? Wie erkennt man sie? Wie widersteht man?
    int_k_005_fk_akademie:
      neues_modul: "Leadership Economics: Institutionelle Anreize verstehen"
      inhalt:
        - "Tarifvertrag und Fuehrungsanreize (Proposition 2)"
        - "Lob vs. Bestrafung: Wann ist was effektiv? (Condition F vs. U)"
        - "Sozialpraeferenzen als Fuehrungskapital (theta-Screening)"
        - "Einkommensluecke und ihre Folgen (Proposition 4)"
    int_k_006_peer_coaching:
      verbindung: |
        Peer-Coaching kann den Proposition-2-Mechanismus abschwaecken:
        Kollegiales Feedback und Normen fuer positiven Fuehrungsstil
        erhoehen die sozialen Kosten unfreundlicher Fuehrung (k_U steigt).

  neues_risiko:
    id: "RISK-K-007"
    name: "Tarifvertragsinduzierte unfreundliche Fuehrung"
    beschreibung: |
      Strukturelles Risiko: Tarifvertrag erzeugt Bedingungen unter denen
      unfreundliche Fuehrung profitabel wird (Dur et al. 2020, Prop. 2).
      Nicht individuelles Versagen, sondern institutionelles Ergebnis.
    wahrscheinlichkeit: "MITTEL-HOCH (Bedingungen strukturell gegeben)"
    auswirkung: "HOCH (10% abusive supervision Praevelenz, Fluktuation, Engagement)"
    mitigation:
      - "Leader Selection mit Sozialpraeferenz-Screening"
      - "FK-Akademie Modul Leadership Economics"
      - "360-Grad-Feedback-System"
      - "Kompensationsluecken-Monitoring"
    verbindung_zu: "RISK-K-001 bis RISK-K-006"

  bib_keys:
    - "dur2020leadership"

# =============================================================================
# 10. EMPIRISCHE LEADERSHIP-ENGAGEMENT-PERFORMANCE PFADE
#     (Mphaluwa, Hui, Marere & Banda 2025)
# =============================================================================
# SEM-Pfadkoeffizienten fuer den Kausalzusammenhang:
# Leadership Style → Employee Engagement → Employee Performance
# Empirische Validierung von Sektion 9 (Dur et al. 2020 Theorie)
# =============================================================================

leadership_engagement_performance:

  uebersicht: |
    Mphaluwa et al. (2025) liefern empirische SEM-Pfadkoeffizienten fuer die
    in Sektion 9 (Dur et al. 2020) theoretisch hergeleiteten Fuehrungsstil-
    Wirkungen. N=231 (Malawi SMEs). Trotz anderem Kontext (Entwicklungsland)
    sind die RELATIVEN Effektstaerken direkt uebertragbar: Charismatische
    Fuehrung > Autokratische Fuehrung > Demokratische Fuehrung.

  pfadkoeffizienten:
    note: |
      Alle Koeffizienten standardisiert (b), p < 0.001, 5000 Bootstrap Resamples.
      Caveat: Malawi-SME-Kontext — absolute Werte NICHT direkt auf Kaufland
      uebertragbar, aber relative Verhaeltnisse sind informativ.

    leadership_to_engagement:
      charismatic: {b: 0.37, ci_low: 0.29, ci_high: 0.45, p: "<0.001"}
      autocratic:  {b: 0.24, ci_low: 0.15, ci_high: 0.33, p: "<0.001"}
      democratic:  {b: 0.15, ci_low: 0.07, ci_high: 0.23, p: "<0.001"}
      kaufland_interpretation: |
        Charismatische/inspirierende Fuehrung hat den staerksten Engagement-
        Effekt. ABER: Autokratische Fuehrung ist NICHT negativ — Struktur
        und Klarheit erzeugen ebenfalls Engagement. Fuer Kaufland heisst das:
        TUEV-Standards und klare Prozesse (autokratisch) sind engagement-
        foerdernd, solange sie mit inspirierender Fuehrung (charismatisch)
        kombiniert werden.

    leadership_to_performance:
      charismatic: {b: 0.43, ci_low: 0.34, ci_high: 0.52, p: "<0.001"}
      democratic:  {b: 0.22, ci_low: 0.14, ci_high: 0.30, p: "<0.001"}
      autocratic:  {b: 0.21, ci_low: 0.13, ci_high: 0.29, p: "<0.001"}
      kaufland_interpretation: |
        Charismatisch → Performance ist DOPPELT so stark wie autokratisch
        (0.43 vs. 0.21). ROI-Implikation: Investition in charismatische
        FK-Entwicklung bringt ~2x den Performance-Return.

    engagement_to_performance:
      b: 0.41
      p: "<0.001"
      kaufland_interpretation: |
        Engagement → Performance Konversionsfaktor: 1 SD Engagement-
        Verbesserung → 0.41 SD Performance-Verbesserung. Ermoeglicht
        Umrechnung von PX-Survey-Scores in erwartete Leistungseffekte.

    mediation_indirect_effects:
      charismatic: {b: 0.15, z: 4.61, ci_low: 0.10, ci_high: 0.22}
      autocratic:  {b: 0.10, z: 5.05, ci_low: 0.07, ci_high: 0.14}
      democratic:  {b: 0.06, z: 3.26, ci_low: 0.03, ci_high: 0.10}
      kaufland_interpretation: |
        35% des charismatischen Performance-Effekts laeuft ueber Engagement
        (0.15/0.43). Das bedeutet: PX-Survey misst einen KAUSALEN Mediator,
        nicht nur einen Indikator. Engagement-Verbesserung IST Performance-
        Verbesserung.

  dur_validierung:
    theorie_empirie_bruecke: |
      Dur et al. (2020): Theoretisches Modell → friendly leadership optimal
      Mphaluwa et al. (2025): Empirische SEM → charismatic leadership staerkster Effekt

      MAPPING:
      - Dur "friendly conditional (F)" ≈ Mphaluwa "charismatic" → STAERKSTER Effekt
      - Dur "unfriendly conditional (U)" ≈ Mphaluwa "autocratic" → Positiv aber schwaecher
      - Mphaluwa "democratic" → Kein Dur-Aequivalent (partizipative Dimension nicht modelliert)

    nuancierung: |
      Mphaluwa nuanciert Dur's scharfe friendly/unfriendly Dichotomie:
      Autokratische Fuehrung ist empirisch NICHT rein negativ — Struktur
      und Klarheit haben eigenstaendigen Engagement-Wert (b=0.24).
      Fuer Kaufland: Optimaler Stil ist charismatisch-strukturiert,
      nicht charismatisch STATT strukturiert.

  kaufland_anwendung:
    leadership_stil_portfolio:
      empfehlung: |
        HYBRID-ANSATZ: Charismatisch + Strukturiert
        - Charismatisch: Vision, Inspiration, emotionale Bindung (→ b=0.37 Engagement)
        - Strukturiert: Klare Erwartungen, TUEV-Standards, Prozesstreue (→ b=0.24 Engagement)
        - NICHT demokratisch als Primaerstil (→ nur b=0.15 Engagement in diesem Kontext)
      who_01_anwendung: |
        Filialleitung soll beide Dimensionen beherrschen:
        1. Inspirierende Kommunikation der Filial-Vision (charismatisch)
        2. Klare Verantwortlichkeiten und Standards (strukturiert)
        FK-Akademie Curriculum muss BEIDE trainieren.

    roi_schaetzung:
      methode: "SEM-Pfadkoeffizienten als Benchmark (nicht als exakte Werte)"
      rechnung: |
        Wenn FK-Akademie charismatische Fuehrung um 0.5 SD verbessert:
        → Engagement-Effekt: 0.5 × 0.37 = +0.185 SD
        → Performance-Effekt (direkt): 0.5 × 0.43 = +0.215 SD
        → Performance-Effekt (via Engagement): 0.185 × 0.41 = +0.076 SD
        → Total Performance-Effekt: ~0.29 SD (konservativ 0.15-0.30 SD)
      caveat: |
        Koeffizienten aus Malawi-SME-Kontext. Fuer Kaufland als Richtgroesse
        nutzen, nicht als exakte Vorhersage. Eigene Pilot-Messung noetig.

    messrahmen_erweiterung:
      px_survey_als_mediator: |
        PX-Survey (INT-K-001) misst Engagement — und Engagement ist KAUSALER
        Mediator (nicht nur Korrelat). Das bedeutet:
        - Engagement-Score-Veraenderung → erwartete Performance-Veraenderung
        - Konversionsfaktor: 1 SD Engagement ≈ 0.41 SD Performance
        - Enables: Engagement-Based Forecasting fuer Filial-Performance
      neue_metriken:
        - "ENG-CHAR: Charismatische Fuehrungsqualitaet (Items aus MLQ)"
        - "ENG-STRUCT: Strukturelle Klarheit (Items adaptiert)"
        - "ENG-MED: Engagement-Mediation-Index (indirekter Pfad-Proxy)"

  bib_keys:
    - "mphaluwa2025leadership"

# =============================================================================
# 11. PEOPLE MANAGEMENT SKILLS: KAUSALE EVIDENZ (Hoffman & Tadelis 2018/2020)
# =============================================================================
#
# NBER Working Paper 24360. Grosse US High-Tech-Firma, 10'000+ Mitarbeitende,
# 1'000+ Manager, 100'000+ Personenmonate. People Management Skills (MOR) gemessen
# via 6-Item Upward-Feedback-Survey mit ~95% Ruecklaufquote. Kausale Identifikation
# durch drei komplementaere Designs: New Joiners, Manager-Switcher, Manager-Moves.
#
# KERNBEFUND: People Management Skills reduzieren Fluktuation KAUSAL und STARK
# (60% Reduktion p10→p90), wirken aber NICHT auf Produktivitaets-Outcomes.
# Gute People Manager werden von der Firma belohnt.
# =============================================================================

people_management_causal_evidence:

  # --- 11.1 MOR-Survey als Template fuer PX-Survey ---
  mor_survey_design:
    beschreibung: |
      Hoffman & Tadelis verwenden einen 6-Item Upward-Feedback-Survey (Manager
      Overall Rating = MOR) mit ~95% Ruecklaufquote. Jedes Item wird als Anteil
      "Agree/Strongly Agree" kodiert (0-100). MOR = Durchschnitt ueber 6 Items.
    items:
      - id: "MOR-1"
        text: "Kommuniziert klare Erwartungen an meine Arbeit"
        kaufland_adaption: "Mein/e Filialleiter:in kommuniziert klar, was von mir erwartet wird"
      - id: "MOR-2"
        text: "Bietet kontinuierliches Coaching und Anleitung zur Leistungsverbesserung"
        kaufland_adaption: "Mein/e Filialleiter:in gibt mir regelmaessig Feedback zu meiner Arbeit"
      - id: "MOR-3"
        text: "Unterstuetzt aktiv meine berufliche Entwicklung"
        kaufland_adaption: "Mein/e Filialleiter:in foerdert meine berufliche Weiterentwicklung"
      - id: "MOR-4"
        text: "Bezieht Mitarbeitende in Entscheidungen ein"
        kaufland_adaption: "Mein/e Filialleiter:in bezieht unser Team in wichtige Entscheidungen ein"
      - id: "MOR-5"
        text: "Erzeugt positive Stimmung im Team, auch unter schwierigen Bedingungen"
        kaufland_adaption: "Mein/e Filialleiter:in haelt die Stimmung aufrecht, auch wenn es stressig ist"
      - id: "MOR-6"
        text: "Ist jemand, dem ich vertrauen kann"
        kaufland_adaption: "Ich vertraue meinem/meiner Filialleiter:in"
    methodische_standards:
      ruecklaufquote_benchmark: "95%"
      anonymitaet: "Third-party confidential — Einzelantworten nie sichtbar fuer Manager"
      mindest_teamgroesse: "5 Mitarbeitende pro Manager fuer Aggregation"
      aggregation: "Anteil Agree/Strongly Agree (0-100 Skala)"
    kaufland_empfehlung: |
      PX-Survey sollte MOR-6-Items als Kern uebernehmen, adaptiert auf Filialkontext.
      Zusaetzliche Kaufland-spezifische Items (Sauberkeitsfoerderung, Teamzusammenhalt)
      ergaenzen, aber NICHT die 6 Kern-Items ersetzen. 95% Ruecklaufquote als Ziel —
      erreicht durch Management-Commitment und klare Anonymitaetsgarantie.

  # --- 11.2 Kausale Wirkungskette MOR → Fluktuation ---
  kausale_evidenz:
    haupteffekt:
      beschreibung: "1 SD MOR-Erhoehung reduziert monatliche Fluktuation um 0.475pp (35%)"
      ols_koeffizient: -0.156
      iv_koeffizient: -0.475
      ols_iv_ratio: "3x — OLS stark abwaerts verzerrt durch Messfehler"
      p10_p90_effekt: "60% Fluktuationsreduktion"
      interpretation: |
        Der IV-Schaetzer ist dreimal groesser als OLS, weil klassischer Messfehler
        in Surveys den wahren Effekt massiv unterschaetzt. Die kausale Identifikation
        wird durch drei komplementaere Designs gestuetzt.
    nach_fluktuationstyp:
      quits_iv: "-0.278pp pro SD (p<0.01)"
      fires_iv: "-0.188pp pro SD (p<0.01)"
      regretted_quits_iv: "-0.230pp pro SD (37% Reduktion) — staerkster prozentualer Effekt"
      non_regretted_quits_iv: "-0.048pp pro SD (n.s.)"
      kaufland_interpretation: |
        MOR reduziert BESONDERS die Fluktuation, die das Unternehmen bedauert
        (regretted quits). Fuer Kaufland: FK-Akademie-Investition schuetzt
        genau die Mitarbeitenden, die Kaufland behalten WILL. Nicht-bedauerte
        Kuendigungen (Low Performer) werden kaum beeinflusst — ein erwuenschter
        Effekt der natuerlichen Selektion.
    identifikationsstrategien:
      - design: "New Joiners"
        beschreibung: "Nur neue Mitarbeitende analysiert — MOR vor ihrem Eintritt gemessen"
        iv_koeffizient: -0.550
        staerke: "Eliminiert reverse causality und contemporaneous shocks"
      - design: "Manager Switcher + Rothstein Test"
        beschreibung: "Mitarbeitende wechseln Manager — Rothstein Test zeigt kein systematisches Sorting"
        regretted_quit_iv: -0.412
        staerke: "Event-Study zeigt graduellen Aufbau ueber 7-12 Monate"
      - design: "Manager Moves (Location/Function)"
        beschreibung: "Manager wechseln Standort/Funktion — aggregierte Analyse"
        iv_koeffizient: "-0.53 bis -0.66pp"
        staerke: "Adressiert persistente Unobservables, folgt Chetty et al. (2014)"

  # --- 11.3 Hierarchie-Komplementaritaet (WHO-01 vs WHO-04) ---
  hierarchie_komplementaritaet:
    befund: |
      MOR-Fluktuationseffekt ist SIGNIFIKANT STAERKER fuer Mitarbeitende in
      hoeheren Hierarchieebenen (p=0.04 fuer Gesamtfluktuation, p=0.02 fuer
      Kuendigungen). Interpretation: People Management Skills und kognitive
      Faehigkeiten der Mitarbeitenden sind KOMPLEMENTE.
    p_werte:
      attrition_hierarchy_interaction: 0.04
      quit_hierarchy_interaction: 0.02
      fire_hierarchy_interaction: 0.36
    kaufland_mapping:
      - hierarchie: "WHO-01 (Filialleiter:innen)"
        ebene: "Hoch"
        mor_effekt: "STAERKSTER Effekt — hoechster ROI der PX-Investition"
        empfehlung: "FK-Akademie Schwerpunkt auf Bezirksleitungs-Training fuer WHO-01-Fuehrung"
      - hierarchie: "WHO-02/03 (Abteilungsleiter, Teamleads)"
        ebene: "Mittel"
        mor_effekt: "Starker Effekt — signifikant ueber Baseline"
        empfehlung: "Filialleiter-Training fuer WHO-02/03-Fuehrung"
      - hierarchie: "WHO-04 (Fachkraefte)"
        ebene: "Niedrig"
        mor_effekt: "Positiver Effekt, aber schwaecher als bei WHO-01/02"
        empfehlung: "Basiswirkung sichern, aber Investitions-Schwerpunkt hoeher legen"
    implikation_fuer_investment: |
      Kaufland sollte PX-Investitionen PRIORISIEREN: Bezirksleitungs-Training
      fuer Filialleiter-Fuehrung (WHO-01) hat den hoechsten marginalen ROI.
      Filialleiter-Training fuer Abteilungsleiter (WHO-02/03) ist zweitpriorisiert.
      Dies widerspricht der Intuition, dass Basis-Mitarbeitende (WHO-04) den
      groessten Bedarf haben — der EFFEKT pro investiertem Euro ist bei WHO-01 am groessten.

  # --- 11.4 Nicht-Fluktuations-Outcomes: Strategischer Null-Befund ---
  null_befund_produktivitaet:
    befund: |
      MOR hat KEINEN konsistenten positiven Effekt auf: Gehaltserhoeungen,
      Befoerderungswahrscheinlichkeit, oder Patente. Kleiner positiver Effekt
      auf subjektive Leistungsbewertung (IV: +0.09 SD, p<0.01), aber nicht
      robust ueber alle Designs.
    koeffizienten:
      salary_growth_iv: "0.064% (n.s.)"
      promotion_iv: "-0.020pp (n.s.)"
      patents_iv: "0.011 (n.s.)"
      subjective_performance_iv: "+0.090 SD (p<0.01, aber nicht robust)"
    kaufland_strategische_implikation: |
      KRITISCH FUER FK-AKADEMIE POSITIONIERUNG: People Management Training
      sollte NICHT als Produktivitaetssteigerung verkauft werden, sondern als
      RETENTIONSMASSNAHME. Der kausale Kanal ist Zufriedenheit/Motivation,
      nicht Skill-Transfer. Dies aendert die FK-Akademie Value Proposition:
      "Wir senken Ihre Fluktuation um bis zu 60%" statt "Wir steigern Ihre
      Produktivitaet". Retentions-ROI ist quantifizierbar und ueberzeugender.

  # --- 11.5 Manager-Belohnungssystem ---
  manager_belohnungen:
    befund: |
      Gute People Manager werden von der Firma belohnt mit hoeheren
      Leistungsbewertungen, mehr Befoerderungen und hoeheren Gehaltssteigerungen.
      Die Firma zahlt ~$0.27 Mehrvergütung pro $1 Retentions-Benefit.
    koeffizienten:
      manager_performance_iv: "+0.40 SD pro SD MOR (p<0.01)"
      manager_promotion_iv: "+0.67pp monatlich pro SD MOR (p<0.05)"
      manager_salary_growth_iv: "+1.4% jaehrlich pro SD MOR (p<0.05)"
      cost_benefit_ratio: "0.27:1.00 (Manager-Mehrkosten : Retentions-Benefit)"
    kaufland_empfehlung: |
      INT-K-002 (Leadership Commitment) MUSS PX-Survey-Ergebnisse in die
      Leistungsbewertung von Filialleiter:innen integrieren. Konkret:
      (a) MOR-aehnlicher Score als KPI fuer Bezirksleitungs-Gespraeche
      (b) Top-20% MOR-Filialleiter:innen erhalten Anerkennungspraemie
      (c) Bottom-20% erhalten gezieltes Coaching (nicht Sanktion)
      (d) Befoerderung zur Bezirksleitung: MOR-Score als Kriterium

  # --- 11.6 Zeitpfad und Mess-Implikationen ---
  zeitpfad:
    befund: |
      Event-Study zeigt: MOR-Fluktuationseffekt ist in den ersten 6 Monaten
      nach Manager-Wechsel KLEIN. Der Haupteffekt baut sich ueber 7-12 Monate
      auf. Interpretation: Manager und Mitarbeitende brauchen Zeit, um eine
      Arbeitsbeziehung aufzubauen.
    monate_bis_effekt: "7-12"
    kaufland_mess_implikation: |
      FK-Akademie Evaluation DARF NICHT nach 3 Monaten Fluktuationsreduktion
      erwarten. Messplan:
      - T0: Baseline PX-Survey + Fluktuationsrate
      - T+6: Erste PX-Survey-Nachmessung (Friueh-Indikator)
      - T+12: Fluktuations-Outcome-Messung (primaerer Endpunkt)
      - T+24: Langzeit-Follow-up (sekundaerer Endpunkt)

  # --- 11.7 Kosten-Nutzen-Framework ---
  kosten_nutzen:
    parameter:
      hiring_cost_assumption: "4 Monatsgehaelter pro Neueinstellung (Blatter et al. 2012)"
      savings_per_team_member: "5% des Jahresgehalts pro Teammitglied (p90 vs p10 MOR)"
      typical_team_size: 9
      total_annual_savings: "~0.5 Jahresgehaelter pro Team (p90 vs p10)"
    kaufland_kalkulation: |
      Konservative Uebertragung auf Kaufland (Retail-Kontext, niedrigere Gehaelter
      als High-Tech, aber hoehere Basislfluktuation):
      - Durchschnittsgehalt WHO-04: ~30'000 EUR
      - Hiring Cost (4 Monate): ~10'000 EUR
      - Team pro Filialleiter: ~15-25 Mitarbeitende
      - Fluktuationsreduktion 30% (konservativ, halber Hoffman-Effekt):
        → ~4-6 vermiedene Kuendigungen pro Filiale/Jahr
        → ~40'000-60'000 EUR Einsparung pro Filiale/Jahr
      - FK-Akademie Kosten: ~2'000-5'000 EUR pro Filialleiter/Jahr
      - ROI: 8-30x pro investiertem Euro
      CAVEAT: Retail-Kontext unterscheidet sich von High-Tech. Konservative
      Halbierung des Hoffman-Effekts empfohlen fuer Kaufland-Prognosen.

  # --- 11.8 Integration mit Sektionen 9-10 ---
  integration_sektionen_9_10:
    dur_2020_verbindung: |
      Dur et al. (2020) liefern das theoretische WARUM: Tarifvertrag ermoeglicht
      unfreundliche Fuehrung. Hoffman & Tadelis quantifizieren das empirische
      WIE VIEL: 60% Fluktuationsreduktion durch gute People Management Skills.
      Zusammen: Kauflands Tarifvertrags-Risiko (Sektion 9, RISK-K-007) ist
      durch gezieltes People Management Training (FK-Akademie) quantifizierbar
      adressierbar.
    mphaluwa_2025_verbindung: |
      Mphaluwa et al. (2025) zeigen den Engagement-Mediations-Pfad (b=0.41).
      Hoffman & Tadelis zeigen, dass der Hauptkanal NICHT Produktivitaet ist,
      sondern Zufriedenheit/Motivation — konsistent mit Engagement als Mediator.
      Die 6 MOR-Items operationalisieren, was Mphaluwa als "charismatische
      Fuehrung" identifiziert: Vertrauen, positive Atmosphaere, Coaching.
    synthese: |
      Die drei Papers bilden eine geschlossene Evidenzkette:
      (1) Dur (2020): Theorie — WARUM Fuehrungsstile von Arbeitsmarktbedingungen abhaengen
      (2) Mphaluwa (2025): Engagement — WIE Fuehrung ueber Engagement auf Performance wirkt
      (3) Hoffman & Tadelis (2018): Retention — WAS der kausale, quantifizierte Effekt ist
      Fuer Kaufland: FK-Akademie adressiert (1) strukturelles Risiko, trainiert (2)
      Engagement-foerdernde Fuehrung, und erzielt (3) messbaren Retentions-ROI.

  bib_keys:
    - "hoffman2018people"

