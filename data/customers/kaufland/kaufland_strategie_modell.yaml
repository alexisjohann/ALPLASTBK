_changelog:
  - version: "1.0"
    date: "2026-02-20"
    author: "EBF/Claude"
    changes: |
      Initiale Erstellung des Kaufland Integrated Behavioral Strategy Model
      (KIBSM). Integriert Sauberkeit + People Experience in ein 10C-Framework
      mit Synergiemodell, integriertem Interventions-Portfolio (11 Interventionen
      in 3 Waves), Messrahmen und Commercial Framework.

  - version: "1.1"
    date: "2026-02-20"
    author: "EBF/Claude"
    changes: |
      Sektion 8 (Strategy Practices Assessment) hinzugefuegt basierend auf
      Yang, Christensen, Bloom, Sadun & Rivkin (2020). 13-Item Kaufland-
      adaptiertes Strategy Practices Grid fuer Filialleiter-Ebene. Porter-RDD
      Implikation fuer FK-Akademie-Design. Erfahrungs-Bias-Warnung fuer
      erfahrene Filialleitungen. Literaturvalidierung (Roberts & Shaw 2022,
      Milgrom & Roberts 1995) im Synergiemodell ergaenzt.

  - version: "1.2"
    date: "2026-02-20"
    author: "EBF/Claude"
    changes: |
      Sektion 9 (Leadership Style Economics) hinzugefuegt basierend auf
      Dur, Kvaløy & Schöttner (2020). Formales Modell: Tarifvertrag erzeugt
      strukturelle Bedingungen fuer unfreundliche Fuehrung (Proposition 2).
      Fuehrungsstil-Typologie (F/FF/U/UU/FU) mit Kaufland-Mapping. Einkommens-
      luecke WHO-01 ↔ WHO-04 als Risikofaktor (Proposition 4). Neues Risiko
      RISK-K-007 (Tarifvertragsinduzierte unfreundliche Fuehrung). Integration
      in INT-K-002/005/006 (Leadership Commitment, FK-Akademie, Peer Coaching).

  - version: "1.3"
    date: "2026-02-20"
    author: "EBF/Claude"
    changes: |
      Sektion 10 (Empirische Leadership-Engagement-Performance Pfade) hinzugefuegt
      basierend auf Mphaluwa, Hui, Marere & Banda (2025). SEM-Pfadkoeffizienten
      (N=231): Charismatisch→Engagement b=0.37, →Performance b=0.43. Engagement
      als kausaler Mediator (b=0.41) validiert. Theorie-Empirie-Bruecke zu Dur
      et al. (2020): friendly≈charismatic (staerkster Effekt). Hybrid-Empfehlung
      charismatisch+strukturiert. ROI-Schaetzung: 0.5 SD FK-Verbesserung → ~0.29 SD
      Performance-Gewinn. PX-Survey als Mediator-Messinstrument bestaetigt.

  - version: "1.4"
    date: "2026-02-21"
    author: "EBF/Claude"
    changes: |
      Sektion 11 (People Management Skills: Kausale Evidenz) hinzugefuegt basierend
      auf Hoffman & Tadelis (2018/2020, NBER WP 24360). Kausale Identifikation
      (IV + 3 Designs): MOR p10→p90 = 60% Fluktuationsreduktion. 6-Item MOR-Survey
      als Template fuer PX-Survey mit Kaufland-Adaptionen. Hierarchie-Komplementaritaet
      (p=0.04): WHO-01 profitiert STAERKER als WHO-04 von People Management —
      Investitions-Priorisierung. Strategischer Null-Befund: MOR wirkt auf Retention,
      NICHT auf Produktivitaet — aendert FK-Akademie Value Proposition. Manager-
      Belohnungssystem: PX-Score in Leistungsbewertung integrieren. Kosten-Nutzen:
      40-60k EUR Einsparung pro Filiale/Jahr, ROI 8-30x. Synthese mit Sektionen 9-10
      als geschlossene Evidenzkette: Dur (Theorie) + Mphaluwa (Engagement) +
      Hoffman/Tadelis (Retention).
