# KAUFLAND GESAMTSTRATEGIE-MODELL (EBF)
# =============================================================================
# Model-ID: MOD-013
# Customer: CUS-KAUF (Kaufland Stiftung & Co. KG)
# Version: 1.0.0
# Typ: Integratives Verhaltensmodell — 2 Projekte, 1 Strategie
# Erstellt: 2026-02-20
# Basis: kaufland_context_schnell.yaml (CVA SCHNELL)
#         kaufland_projekt_sauberkeit.yaml (CVA MITTEL)
#         kaufland_projekt_people_experience.yaml (Exploration)
# =============================================================================
#
# ZWECK: Uebergreifendes Verhaltensmodell fuer die gesamte Kaufland-Strategie.
# Integriert die zwei aktiven Projekte (Sauberkeit + People Experience) in ein
# kohaerentes 10C-Framework mit gemeinsamen Psi-Dimensionen, Synergien und
# einem einheitlichen Interventions-Portfolio.
#
# KERNTHESE: Sauberkeit und People Experience sind NICHT zwei separate Projekte,
# sondern zwei Facetten DESSELBEN Verhaltenssystems: Organisationale Exzellenz
# durch verhaltensorientierte Fuehrung. Die Synergien zwischen beiden Projekten
# sind der strategische Hebel fuer FehrAdvice.
#
# =============================================================================

metadata:
  model_id: "MOD-013"
  name: "Kaufland Integrated Behavioral Strategy Model (KIBSM)"
  short_name: "KIBSM"
  version: "1.4"
  created: "2026-02-20"
  last_updated: "2026-02-20"
  customer_id: "CUS-KAUF"
  lead_ref: "LEAD-025"
  status: "active"
  cva_stufe: "SCHNELL"
  model_type: "integrated_strategy"
  description: |
    Integratives Verhaltensmodell fuer die gesamte Kaufland-Strategie.
    Vereint Sauberkeit (operatives Verhalten) und People Experience
    (Fuehrungs- und Personalentwicklung) in einem 10C-Framework.

# =============================================================================
# 1. STRATEGISCHER RAHMEN: DAS VERHALTENSSYSTEM KAUFLAND
# =============================================================================

strategic_framework:

  vision: |
    Kaufland wird zum verhaltensorientiert gesteuerten Einzelhaendler:
    Jede Entscheidung — von der Filialreinigung bis zur Fuehrungskraefte-
    entwicklung — basiert auf evidenzbasierten Verhaltensprinzipien.

  these: |
    Sauberkeit und People Experience sind zwei Manifestationen desselben
    Grundproblems: Wie bringt man 170'000 Menschen in 780 Filialen dazu,
    KONSISTENT das Richtige zu tun — trotz Zeitdruck, Routine-Blindheit
    und dezentraler Kultur?

  strategische_saeulen:
    s1_operatives_verhalten:
      name: "Operatives Verhalten (Sauberkeit)"
      projekt: "Sauberkeit"
      fokus: "Mitarbeitende → Hygienestandards einhalten"
      zeithorizont: "Sofort (Post-Skandal-Urgency)"
      status: "qualified"

    s2_fuehrungsverhalten:
      name: "Fuehrungsverhalten (People Experience)"
      projekt: "People Experience"
      fokus: "Fuehrungskraefte → evidenzbasiert fuehren"
      zeithorizont: "Mittelfristig (12-24 Monate)"
      status: "exploration"

    s3_organisationale_exzellenz:
      name: "Organisationale Exzellenz (Synergie)"
      projekt: "Emergent aus S1 + S2"
      fokus: "Gute Fuehrung → gutes operatives Verhalten → messbare Ergebnisse"
      zeithorizont: "Langfristig (24-36 Monate)"
      status: "konzeptionell"
      synergy_hypothesis: |
        S3 = f(S1, S2, gamma_S1S2)
        Wenn gamma_S1S2 > 0 (positive Komplementaritaet), dann ist der
        kombinierte Effekt groesser als die Summe der Einzelprojekte.
        Hypothese: gamma_S1S2 ≈ +0.35 (PAR-COMP-001 Analogie:
        Identity x Social Proof).
      literature_validation:
        primary: "milgrom1995complementarities"
        review: "roberts2022managers"
        evidence: |
          Roberts & Shaw (2022, NBER WP 30730) validieren den Komplementaritaets-
          Ansatz empirisch: Management-Praktiken wirken als Cluster, nicht isoliert.
          Einzelne Praktiken (z.B. nur Monitoring OHNE Incentives) bringen wenig.
          Erst das Buendel (Monitoring + Incentives + Training + Hiring) erzielt
          den vollen Effekt. Direkt anwendbar auf KIBSM: S1 (Sauberkeit) und
          S2 (People Experience) muessen als Buendel implementiert werden.

# =============================================================================
# 2. 10C MAPPING: GESAMTSTRATEGIE
# =============================================================================

ten_c_mapping:

  WHO:
    description: "Wer sind die Zielgruppen im Verhaltenssystem?"
    segmente:
      # Uebergreifend (beide Projekte)
      - id: "WHO-01"
        name: "Filialleitung (Hausleiter:innen)"
        headcount: 1600
        rolle_sauberkeit: "Change Agent, verantwortlich fuer TUEV-Zertifizierung"
        rolle_px: "Evaluations-Subjekt UND -Objekt, zentrale FK-Rolle"
        overlap: "HOECHSTE — Schluesselsegment fuer BEIDE Projekte"
        lambda: 2.80
        beta: 0.85
        kappa: 0.75

      - id: "WHO-02"
        name: "Warenbereichsleiter:innen (WBL)"
        headcount: 3000
        rolle_sauberkeit: "Bereichsverantwortung Hygiene (Frische, Non-Food)"
        rolle_px: "Nachwuchspool fuer Hausleitung, Evaluations-Kandidat:innen"
        overlap: "HOCH"
        lambda: 2.50
        beta: 0.80
        kappa: 0.78

      # Sauberkeit-primaer
      - id: "WHO-03"
        name: "Frischetheken-Personal"
        headcount: 25000
        rolle_sauberkeit: "Hoechste Hygienerelevanz, HACCP-kritisch"
        rolle_px: "Fachkraefte-Pool, Talent-Reservoir"
        overlap: "MITTEL"
        lambda: 2.40
        beta: 0.78
        kappa: 0.80

      - id: "WHO-04"
        name: "Verkaufspersonal"
        headcount: 75000
        rolle_sauberkeit: "Reinigung, Regalpflege, MHD-Kontrolle"
        rolle_px: "Breiter Talentpool, Hidden Talents"
        overlap: "MITTEL"
        lambda: 2.10
        beta: 0.72
        kappa: 0.70

      - id: "WHO-05"
        name: "Logistik / Lager"
        headcount: 34000
        rolle_sauberkeit: "Kuehlketten-Integritaet"
        rolle_px: "Oft unsichtbar im Talent-System"
        overlap: "NIEDRIG"
        lambda: 2.00
        beta: 0.75
        kappa: 0.85

      - id: "WHO-06"
        name: "Reinigungskraefte"
        headcount: 25000
        rolle_sauberkeit: "Dedizierte Reinigung, hoechste Fluktuation"
        rolle_px: "Selten im PX-Scope"
        overlap: "NIEDRIG"
        lambda: 1.80
        beta: 0.68
        kappa: 0.85

      # PX-primaer
      - id: "WHO-07"
        name: "Verkaufsleiter:innen"
        headcount: 200
        rolle_sauberkeit: "Multi-Filial-Steuerung Hygiene-Standards"
        rolle_px: "Evaluierende, Karriere-Gatekeeper"
        overlap: "HOCH"
        lambda: 2.60
        beta: 0.88
        kappa: 0.70

      - id: "WHO-08"
        name: "PX-Team (Dammeyer, Karg, Oster, Luisa)"
        headcount: 20
        rolle_sauberkeit: "Indirekt (FK-Entwicklung beeinflusst Filialqualitaet)"
        rolle_px: "Auftraggeber, Multiplikatoren, Diagnostik"
        overlap: "KATALYSATOR"

  WHAT:
    description: "Was treibt das Verhalten? Welche Utility-Dimensionen?"
    utility_dimensions:

      u_compliance:
        name: "Compliance-Utility"
        beschreibung: "Nutzen aus Einhaltung von Standards (Hygiene, Fuehrung)"
        primaer_sauberkeit: true
        primaer_px: false
        formel: "U_comp = kappa_eff × Standard_Klarheit × (1 - Routine_Blindheit)"

      u_identity:
        name: "Identitaets-Utility"
        beschreibung: |
          Nutzen aus professioneller Identitaet: 'Ich bin eine gute FK'
          oder 'Wir sind ein sauberer Markt'. Akerlof/Kranton (2000).
        primaer_sauberkeit: true
        primaer_px: true
        formel: "U_id = I_category × I_prescriptions × I_match"
        ref: "akerlof2000economics"

      u_career:
        name: "Karriere-Utility"
        beschreibung: "Nutzen aus Karrierefortschritt und Entwicklung"
        primaer_sauberkeit: false
        primaer_px: true
        formel: "U_career = P(Befoerderung|Performance) × Delta_Gehalt × Fit(Tasks_aktuell, Tasks_ziel)"

      u_social:
        name: "Soziale Utility"
        beschreibung: "Nutzen aus sozialer Anerkennung, Peer Effects, Normen"
        primaer_sauberkeit: true
        primaer_px: true
        formel: "U_social = sigma × Norm_Staerke × Sichtbarkeit"

      u_autonomy:
        name: "Autonomie-Utility"
        beschreibung: "Nutzen aus Selbstbestimmung und Handlungsfreiheit"
        primaer_sauberkeit: false
        primaer_px: true
        formel: "U_aut = Entscheidungsfreiraum × Kompetenzerleben × Selbstwirksamkeit"
        ref: "deci2000what"

    gesamtutility: |
      U_total = w1 × U_comp + w2 × U_id + w3 × U_career + w4 × U_social + w5 × U_aut
               + gamma_12 × U_comp × U_id
               + gamma_24 × U_id × U_social
      wobei gamma_12, gamma_24 > 0 (Komplementaritaet)

  HOW:
    description: "Wie interagieren die Utility-Dimensionen?"
    complementarity_matrix:
      # gamma > 0: verstaerkend, gamma < 0: crowding-out
      # Theoretische Basis: Milgrom & Roberts (1990, 1995); Review: Roberts & Shaw (2022)
      # Kernaussage: Management-Praktiken sind komplementaer — Buendel > Summe Einzelteile
      compliance_x_identity:
        gamma: 0.35
        interpretation: |
          TUEV-Zertifikat verstaerkt professionelle Identitaet.
          'Wir sind zertifiziert' = Compliance PLUS Identitaet.
        source: "PAR-COMP-001 (Identity x Social)"
        relevant_for: ["Sauberkeit", "People Experience"]

      identity_x_social:
        gamma: 0.28
        interpretation: |
          Professionelle Identitaet wird durch soziale Anerkennung verstaerkt.
          Peer Recognition + Ranking = Identitaet PLUS Social Proof.
        source: "PAR-COMP-004 (Social x Warm Glow)"
        relevant_for: ["People Experience"]

      financial_x_social:
        gamma: -0.68
        interpretation: |
          WARNUNG: Finanzielle Strafen untergraben soziale Normen.
          Hygiene-Bussen zerstoeren intrinsische Sauberkeits-Motivation.
        source: "PAR-COMP-002 (Social x Financial Crowding-Out)"
        relevant_for: ["Sauberkeit"]

      career_x_identity:
        gamma: 0.30
        interpretation: |
          Karriereaussichten verstaerken professionelle Identitaet.
          'Wenn gute Fuehrung belohnt wird, identifiziere ich mich staerker.'
        relevant_for: ["People Experience"]

      sauberkeit_x_px:
        gamma: 0.35
        interpretation: |
          KERNHYPOTHESE DES MODELLS: Die beiden Projekte verstaerken sich
          gegenseitig. Bessere Fuehrung (PX) → bessere Hygiene (Sauberkeit).
          Bessere Hygiene-Ergebnisse → Fuehrungsqualitaet sichtbar.
        testbar: true
        test_design: |
          Filialen MIT PX-Intervention vs. OHNE → Delta in TUEV-Scores?
          Erwartet: Filialen mit guter FK-Entwicklung haben +15% TUEV-Bestehensrate.

  WHEN:
    description: "Welcher Kontext bestimmt das Verhalten?"
    psi_dimensions:

      psi_I_institutional:
        sauberkeit: 0.90
        px: 0.60
        gesamt: 0.78
        key_factor: "Post-Skandal Regulierungsdruck + Umstrukturierung 2026"

      psi_S_social:
        sauberkeit: 0.45
        px: 0.65
        gesamt: 0.53
        key_factor: "Dezentrale Filialkultur, aber PX nutzt Team-Effekte"

      psi_C_cognitive:
        sauberkeit: 0.80
        px: 0.55
        gesamt: 0.70
        key_factor: "Operativer Zeitdruck vs. Reflexion in FK-Entwicklung"

      psi_K_cultural:
        sauberkeit: 0.50
        px: 0.40
        gesamt: 0.46
        key_factor: "Schwarz-Gruppe Effizienz-Kultur, heterogene Belegschaft"

      psi_E_economic:
        sauberkeit: 0.50
        px: 0.55
        gesamt: 0.52
        key_factor: "500 Mio EUR/Jahr Investition, moderate Tariflohene"

      psi_T_temporal:
        sauberkeit: 0.90
        px: 0.50
        gesamt: 0.74
        key_factor: |
          Sauberkeit: Post-Skandal-Urgency (schliesst sich).
          PX: Umstrukturierung schafft neues Zeitfenster.

      psi_M_material:
        sauberkeit: 0.70
        px: 0.45
        gesamt: 0.60
        key_factor: "Physische Artefakte (Sauberkeit) vs. digitale Tools (PX)"

      psi_F_physical:
        sauberkeit: 0.85
        px: 0.50
        gesamt: 0.71
        key_factor: "100% Filial-basiert (Sauberkeit) vs. teilw. zentral (PX)"

  WHERE:
    description: "Woher kommen die Parameter?"
    parameter_sources:
      tier_1_literature:
        - "PAR-COMP-001: gamma = 0.35 (Identity x Social)"
        - "PAR-COMP-002: gamma = -0.68 (Social x Financial)"
        - "PAR-COMP-004: gamma = 0.28 (Social x Warm Glow)"
        - "jones2025habits: h_rate = 0.14/Woche"
        - "hussam2022rational: Habit Formation unter Constraints"
        - "kahneman2021noise: Inter-Rater Noise"
        - "akerlof2000economics: Identity Economics"
      tier_2_llmmc:
        - "lambda pro Segment: LLMMC mit LEH-Kontext"
        - "beta pro Segment: LLMMC mit Zeitdruck-Kontext"
        - "kappa pro Segment: LLMMC mit Compliance-Kontext"
      tier_3_empirical:
        - "TUEV-Scores (ab Pilot verfuegbar)"
        - "FK-Evaluations-Daten (nach Zugang via PX-Team)"
        - "Fluktuation, Krankenstand, MA-Zufriedenheit pro Filiale"

  AWARE:
    description: "Wie bewusst sind die Akteure?"
    awareness_gaps:
      gap_1_routine_blindheit:
        beschreibung: "MA sehen Verschmutzung nicht mehr (Habituation)"
        segment: ["WHO-03", "WHO-04", "WHO-06"]
        intervention: "ATP-Feedback, sichtbare Dashboards"
        projekt: "Sauberkeit"

      gap_2_kontext_ignoranz:
        beschreibung: "FK-Bewertungen ignorieren Filial-Kontext"
        segment: ["WHO-07", "WHO-08"]
        intervention: "Kontextbereinigte KPIs, EBF-Training"
        projekt: "People Experience"

      gap_3_bias_blindheit:
        beschreibung: "Evaluierende kennen eigene Biases nicht"
        segment: ["WHO-07"]
        intervention: "Noise Audit, Bias-Training, strukturierte Verfahren"
        projekt: "People Experience"

      gap_4_talent_unsichtbarkeit:
        beschreibung: "Talente in unsichtbaren Rollen werden uebersehen"
        segment: ["WHO-04", "WHO-05", "WHO-06"]
        intervention: "Peer-Netzwerkanalyse, kontextbereinigte Performance"
        projekt: "People Experience"

  READY:
    description: "Wie handlungsbereit sind die Akteure?"
    readiness_by_segment:
      WHO-01_filialleitung:
        readiness: 0.85
        treiber: "Post-Skandal Druck + Karriere-Implikationen"
        blocker: "Zeitknappheit im operativen Alltag"

      WHO-02_wbl:
        readiness: 0.70
        treiber: "Befoerderungswunsch, professioneller Anspruch"
        blocker: "Unklar ob PX-Massnahmen sie betreffen"

      WHO-03_frischetheken:
        readiness: 0.65
        treiber: "Fachkraft-Identitaet, HACCP-Schulung vorhanden"
        blocker: "Zeitdruck in Stosszeiten"

      WHO-04_verkauf:
        readiness: 0.50
        treiber: "Team-Normen (wenn aktiv)"
        blocker: "Routine-Blindheit, geringe Eigeninitiative"

      WHO-07_verkaufsleiter:
        readiness: 0.75
        treiber: "Verantwortung fuer mehrere Filialen, sichtbare Rolle"
        blocker: "Umstrukturierung 2026 = eigene Unsicherheit"

  STAGE:
    description: "Wo stehen die Akteure in der Behavioral Change Journey?"
    bcj_phasen:

      sauberkeit:
        phase_aktuell: "ACTION (Woche 4-12)"
        phase_history:
          - "AWARENESS (Post-Skandal Apr 2025 → Standards gesetzt)"
          - "INTENTION (5-Punkte-Plan, TUEV-Commitment → Mai-Aug 2025)"
          - "ACTION (Pilot-Interventionen laufen seit Herbst 2025)"
        phase_naechste: "MAINTENANCE (Habit Formation ab ~Woche 12)"
        risiko: "Post-Skandal-Urgency schliesst sich → Rebound moeglich"

      people_experience:
        phase_aktuell: "PRE-AWARENESS (Exploration)"
        phase_history:
          - "TRIGGER (Gespraech mit Dammeyer, Feb 2026)"
        phase_naechste: "AWARENESS (Kick-off, Pilotprojekt definieren)"
        risiko: "Ohne konkretes Pilotprojekt bleibt es bei Exploration"

      gesamt:
        phase_aktuell: "ASYMMETRISCH — Sauberkeit voraus, PX am Anfang"
        strategische_sequenz: |
          1. Sauberkeit: Habit Formation abschliessen (Q2 2026)
          2. PX: Pilotprojekt starten (Q2-Q3 2026)
          3. Synergie: FK-Entwicklung MIT Sauberkeits-KPIs verknuepfen (Q4 2026)
          4. Integration: Ein Verhaltens-Dashboard fuer FK (2027)

  HIERARCHY:
    description: "Wie sind Entscheidungen stratifiziert?"
    levels:
      L0_automatisch:
        beschreibung: "Defaults, Timer, Checklisten — kein Nachdenken noetig"
        beispiele: ["Reinigungstimer bei Schichtbeginn", "HACCP-Checkliste"]
        projekt: "Sauberkeit"

      L1_heuristisch:
        beschreibung: "Einfache Regeln fuer Routineentscheidungen"
        beispiele: ["Wenn Audit naht → extra Reinigung", "Wenn MA auffaellig → Gespraech"]
        projekt: "Sauberkeit + PX"

      L2_deliberativ:
        beschreibung: "Bewusste Abwaegung bei komplexen Entscheidungen"
        beispiele: ["FK-Evaluation durchfuehren", "Talent-Nominierung", "Karriereplanung"]
        projekt: "People Experience"

      L3_strategisch:
        beschreibung: "Langfristige strategische Entscheidungen"
        beispiele: ["Filial-Cluster-Strategie", "FK-Pipeline", "Kulturwandel"]
        projekt: "Gesamt"

# =============================================================================
# 3. SYNERGIEMODELL: SAUBERKEIT x PEOPLE EXPERIENCE
# =============================================================================

synergy_model:

  kernhypothese: |
    gamma(Sauberkeit, PX) > 0: Die Kombination beider Projekte erzeugt
    mehr Wert als die Summe der Einzelprojekte, weil:
    1. Gute Fuehrung → bessere Hygiene-Compliance (kausaler Pfad)
    2. Messbare Hygiene-KPIs → objektivere FK-Evaluation (Daten-Pfad)
    3. Gemeinsame Infrastruktur → geringere Grenzkosten (Effizienz-Pfad)

  drei_synergievektoren:

    v1_kausaler_pfad:
      name: "Fuehrung → Operatives Verhalten"
      mechanismus: |
        Bessere FK (PX) → hoehere Compliance (Sauberkeit).
        FK die Feedback geben, Prioritaeten setzen und Vorbilder sind,
        erzeugen bessere Hygiene-Ergebnisse in ihren Filialen.
      messbar: true
      test: "Korrelation FK-Quality-Score ↔ TUEV-Score nach Kontext-Bereinigung"
      erwarteter_effekt: "r >= 0.25 (moderat)"

    v2_daten_pfad:
      name: "Operatives Verhalten → Objektive FK-Bewertung"
      mechanismus: |
        TUEV-Scores, Checklisten-Completion, Hygiene-KPIs liefern
        OBJEKTIVE Daten fuer FK-Evaluation (reduziert Bias + Noise).
        Statt: "Ich finde Maria ist eine gute FK" (subjektiv)
        Lieber: "Marias Filiale hat TUEV bestanden, Checklisten 95%,
        Fluktuation -12% relativ zum Cluster" (objektiv).
      messbar: true
      test: "Noise-Reduktion in FK-Bewertungen nach Einführung objektiver KPIs"
      erwarteter_effekt: "Inter-Rater-Reliabilitaet +0.15"

    v3_effizienz_pfad:
      name: "Gemeinsame Infrastruktur"
      mechanismus: |
        Ein Verhaltens-Dashboard das BEIDE Projekte abbildet:
        - Operatives Tab: TUEV, Checklisten, Hygiene-KPIs
        - Fuehrungs-Tab: Feedback-Frequenz, Entwicklungsgespraeche, Talent-Rate
        - Kontext-Tab: Filial-Cluster, Ψ-Vektor, erwartete Performance
        → Grenzkosten des zweiten Projekts sinken durch geteilte Dateninfrastruktur.
      messbar: true
      test: "Implementierungskosten PX (mit Sauberkeits-Infrastruktur) vs. standalone"
      erwarteter_effekt: "-30% Implementierungskosten"

  synergy_quantification:
    gamma_estimate: 0.35
    confidence: "MEDIUM (LLMMC Prior, keine empirische Kalibrierung)"
    validation_plan: |
      Phase 1: Pilot in 50 Filialen (25 mit PX-Intervention, 25 ohne)
      Phase 2: 6 Monate TUEV-Scores vergleichen
      Phase 3: gamma empirisch schaetzen via DiD

# =============================================================================
# 4. INTEGRIERTES INTERVENTIONS-PORTFOLIO
# =============================================================================

integrated_portfolio:

  # --- SOFORT (Q1-Q2 2026): Sauberkeit abschliessen ---
  wave_1_sofort:
    name: "Operativer Quick Impact"
    timeline: "Q1-Q2 2026"
    fokus: "Sauberkeit: Habit Formation abschliessen"
    interventions:
      - id: "INT-K-001"
        name: "Smart Defaults + Timer"
        target_10c: "WHEN"
        segment: "ALLE"
        alpha: 0.90
        status: "empfohlen"

      - id: "INT-K-002"
        name: "Leadership Commitment + Filial-Ranking"
        target_10c: "WHO + HOW"
        segment: "WHO-01"
        alpha: 0.80
        status: "empfohlen"

      - id: "INT-K-003"
        name: "Habit Stacking: Reinigung = Schichtbeginn"
        target_10c: "WHEN"
        segment: "WHO-03, WHO-04, WHO-06"
        alpha: 0.85
        status: "empfohlen"

      - id: "INT-K-004"
        name: "ATP-Feedback-Loop"
        target_10c: "AWARE"
        segment: "WHO-03, WHO-06"
        alpha: 0.75
        status: "empfohlen"

      - id: "INT-K-005"
        name: "TUEV-Stolz: Zertifikat als Identity Signal"
        target_10c: "WHAT + AWARE"
        segment: "ALLE"
        alpha: 0.70
        status: "empfohlen"

  # --- MITTELFRISTIG (Q2-Q4 2026): People Experience starten ---
  wave_2_mittelfristig:
    name: "Fuehrungs-Exzellenz"
    timeline: "Q2-Q4 2026"
    fokus: "People Experience: Pilotprojekt FK-Evaluation"
    interventions:
      - id: "INT-K-006"
        name: "Kontextbereinigte FK-KPIs"
        target_10c: "WHEN + WHO"
        segment: "WHO-01, WHO-07"
        beschreibung: |
          FK-Performance relativ zum Filial-Kontext (Ψ-Vektor) bewerten.
          Filial-Cluster bilden, innerhalb Cluster vergleichen.
        alpha: 0.85

      - id: "INT-K-007"
        name: "Bias-Reduktion FK-Evaluation"
        target_10c: "AWARE + HOW"
        segment: "WHO-07, WHO-08"
        beschreibung: |
          Strukturierte Bewertungsverfahren: Mediating Assessments,
          unabhaengige Bewertungen vor Diskussion, Kalibrierungs-Sessions.
        alpha: 0.80
        ref: "kahneman2021noise"

      - id: "INT-K-008"
        name: "Task-basierte Wertschoepfungsanalyse (Pilot)"
        target_10c: "WHAT + WHO"
        segment: "WHO-01, WHO-02, WHO-03"
        beschreibung: |
          Fuer 2 Marktbereiche (Frischetheke, Kasse): Tasks identifizieren,
          Dreifach-Wert bewerten (U_kunde, U_firma, U_ma), Task-Profile erstellen.
        alpha: 0.75

      - id: "INT-K-009"
        name: "Hidden Talent Discovery"
        target_10c: "AWARE + STAGE"
        segment: "WHO-04, WHO-05"
        beschreibung: |
          Peer-basierte Talentnetzwerke + kontextbereinigte Performance-Analyse.
          Talente in unsichtbaren Rollen sichtbar machen.
        alpha: 0.70

  # --- LANGFRISTIG (2027): Integration ---
  wave_3_langfristig:
    name: "Integrierte Verhaltenssteuerung"
    timeline: "2027"
    fokus: "Synergie: Ein Dashboard, ein System"
    interventions:
      - id: "INT-K-010"
        name: "Verhaltens-Dashboard (operativ + FK)"
        target_10c: "AWARE + HIERARCHY"
        segment: "WHO-01, WHO-07, WHO-08"
        beschreibung: |
          Ein integriertes Dashboard das operatives Verhalten (Sauberkeit)
          UND Fuehrungsverhalten (PX) in Echtzeit abbildet — kontextbereinigt.
        alpha: 0.85
        prerequisite: "INT-K-006 + INT-K-001 implementiert"

      - id: "INT-K-011"
        name: "Evidenzbasierte FK-Pipeline"
        target_10c: "STAGE + READY + WHO"
        segment: "WHO-02, WHO-04"
