          Performance + Peer-Signalen. Ersetzt subjektive Nominations.
        alpha: 0.80
        prerequisite: "INT-K-008 + INT-K-009 implementiert"

  crowding_check: |
    Portfolio geprueft auf Crowding-Out-Risiken:
    ✓ Keine Financial x Social Konflikte (keine Strafen im Portfolio)
    ✓ INT-K-007 (Bias-Reduktion) komplementaer zu INT-K-006 (KPIs)
