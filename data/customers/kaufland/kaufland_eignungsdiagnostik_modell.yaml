# 4. INTERVENTIONEN (aus Diagnostik abgeleitet)
# =============================================================================

interventions:

  - id: "INT-DIAG-01"
    name: "Kontextualisierte Anforderungsprofile"
    target_10c: "WHEN (V)"
    description: |
      780 Filialen erhalten filialspezifische Anforderungsprofile
      statt einheitlicher Standard-Profile.
    implementation:
      - "Psi-Profiling fuer alle 780 Filialen (8 Dimensionen)"
      - "PCT-Transformation der 22 Standard-Rollenprofile"
      - "Jaehrliche Aktualisierung via HR-Daten-Pipeline"
    expected_impact: "Matching-Qualitaet +15% (durch kontextgerechte Selektion)"

  - id: "INT-DIAG-02"
    name: "Bidirektionales Interview-Design"
    target_10c: "AWARE (AU)"
    description: |
      Interview-Redesign nach MS-IF-013: Anspruchsvolle, Kaufland-
      spezifische Diagnostik als Qualitaetssignal.
    implementation:
      - "Szenarien-Pool aus echtem Filialltag (20 pro Rolle)"
      - "Fachliche Vertiefungsfragen aus STAX-KAUF-001"
      - "Transparentes Feedback-Gespraech (15 Min) am Ende"
    expected_impact: "Retention +10%, Bewerber:innen-Qualitaet +Selektion"

  - id: "INT-DIAG-03"
    name: "SLTE-basierte Potenzialanalyse"
    target_10c: "READY (AV)"
    description: |
      Nicht nur IST-Zustand messen, sondern LERNPOTENZIAL schaetzen.
      Aus SLTE (MOD-ORG-SBO-001): T(s,p,Psi) = Trainingszeit.
      Personen mit niedrigem IST aber hohem Potenzial → Development Fit.
    implementation:
      - "SLTE-Rechner in Diagnostik-Tool integrieren"
      - "Lernfaehigkeits-Assessment (3 Items in SI + Lernprobe)"
      - "Development-Plan automatisch aus Gap + SLTE generieren"
    expected_impact: "Hidden Talents Discovery +25% (Sichtbarkeits-Bias Reduktion)"

  - id: "INT-DIAG-04"
    name: "Kontextbereinigte FK-Evaluation"
    target_10c: "WHO (AAA)"
    description: |
      Fuehrungskraefte fair bewerten trotz unterschiedlicher Filialkontexte.
      KPI_bereinigt = KPI_roh / E[KPI | Psi_filiale]
    implementation:
      - "Kontext-Variablen pro Filiale erheben (Standort, Bausubstanz, etc.)"
      - "Regressionsmodell: E[KPI | Psi] schaetzen"
      - "Dashboard: Kontextbereinigte vs. rohe KPIs nebeneinander"
    expected_impact: "Faire Beurteilung, +20% Genauigkeit bei Talent-Identifikation"
    source: "Meeting MTG-2026-02-20-001, Kernfrage 2+3"

