metadata:
  name: "Kaufland Schnellkontext"
  code: "BCM2_MIKRO_KAUF"
  layer: "mikro"
  version: "1.0"
  last_updated: "2026-02-20"
  cva_stufe: "SCHNELL"
  total_factors: 32
  description: |
    Schneller Kontextvektor fuer Kaufland Stiftung & Co. KG.
    Fokus: Projekt "Sauberkeit" — Verhaltensaenderung bei Hygiene
    und Filialqualitaet nach dem Hygieneskandal (April 2025).

    Zweck: Pitch / Projektphase Sauberkeit / Screening

  hierarchy:
    parent: "BCM2_MESO_LEH_DE"
    grandparent: "BCM2_04_KON (MAKRO Deutschland)"

  ebf_mapping:
    primary_10c:
      - "WHO"      # Filial-MA, Fuehrungskraefte, Kund:innen
      - "WHAT"     # Compliance-Motivation, Sauberkeitsverhalten
      - "WHEN"     # Post-Skandal Kontext, Zeitdruck im Filialgeschaeft
      - "AWARE"    # Hygienebewusstsein, Feedback-Schleifen
    primary_psi:
      - "kappa_INST"    # Lebensmittelrecht, HACCP, TUEV-Zertifizierung
      - "kappa_SOCIAL"  # Team-Normen, Fuehrungskultur
      - "kappa_COG"     # Zeitdruck, Routine-Blindheit
      - "kappa_TEMP"    # Post-Skandal Urgency

# =============================================================================
# ORGANISATION (~8 Faktoren)
# =============================================================================
organisation:
  name_de: "Kaufland Stiftung & Co. KG"
  name_short: "KAUF"

  # Groesse
  employees: 170000
  revenue_eur_mrd: 35.2  # GJ 2024, Stichtag 28.02.2025
  parent_group: "Schwarz Gruppe"
  parent_revenue_eur_mrd: 175.4  # GJ 2024

  # Klassifikation
  industry: "Lebensmitteleinzelhandel (LEH)"
  sub_industry: "Hypermarkt / SB-Warenhaus"
  ownership: "Familienstiftung (privat, nicht kotiert)"

  # Geografie
  headquarters: "Neckarsulm, Baden-Wuerttemberg"
  geographic_scope: "international"
  countries: ["DE", "PL", "RO", "CZ", "SK", "HR", "BG", "MD"]
  stores_total: 1500
  stores_germany: 780

  # Strategie (Kurzform)
  strategy_name: "Qualitaetsoffensive 2025-2026"
  strategy_pillars:
    - "Filialqualitaet & Hygiene (5-Punkte-Plan, 500 Mio EUR/Jahr)"
    - "Expansion (20+ neue Filialen/Jahr)"
    - "Kuehltechnik-Modernisierung (200+ Standorte)"
    - "TUEV-SUED-Zertifizierung aller Filialen"
    - "Personalqualifizierung (Frischetheken-Trainer)"

# =============================================================================
# PSI-DIMENSIONEN (8 Faktoren)
# =============================================================================
# Skala: 0.0 (niedrig) bis 1.0 (hoch)
# Kontext: Filial-Mitarbeitende im Projekt "Sauberkeit"
# =============================================================================

psi_dimensions:

  psi_I_institutional:
    value: 0.80
    label: "Institutionell"
    description: |
      Stark reguliertes Umfeld: Lebensmittelrecht (LFGB), EU-Hygieneverordnung
      (852/2004), HACCP-Pflicht, Lebensmittelueberwachung durch Veterinaer-
      aemter. Seit 2025 zusaetzlich: TUEV-SUED-Zertifizierung "FilialQualitaet",
      verschaerftes internes Audit-System. Defaults sind stark (MUSS-Vorschriften),
      aber Enforcement in 780 Filialen war historisch lueckenhaft.
    key_factors:
      - "LFGB + EU-VO 852/2004 (HACCP-Pflicht)"
      - "TUEV-SUED FilialQualitaet-Zertifizierung (neu seit 2025)"
      - "Interne Audits + externe Kontrolle durch Lebensmittelueberwachung"
      - "5-Punkte-Plan als neuer Standard"
    ebf_kappa: "kappa_INST"

  psi_S_social:
    value: 0.55
    label: "Sozial"
    description: |
      Filial-Teams arbeiten in Schichten mit wechselnder Besetzung.
      Soziale Normen variieren stark zwischen Filialen (dezentrale Kultur).
      Nach dem Skandal: Stigma fuer "schlechte" Filialen, aber auch
      Team-Solidaritaet ("wir schaffen das"). Fuehrungskultur ist
      hierarchisch (Marktleiter → Abteilungsleiter → Team).
      Peer Effects moderat — jede:r arbeitet an eigenem Bereich.
    key_factors:
      - "Dezentrale Filialkultur (jeder Markt ist anders)"
      - "Schichtarbeit reduziert Team-Kohaesion"
      - "Post-Skandal Stigma-Effekt auf Filial-Ebene"
      - "Hierarchische Fuehrung: Marktleiter als Schluesselfigur"
    ebf_kappa: "kappa_SOCIAL"

  psi_C_cognitive:
    value: 0.70
    label: "Kognitiv"
    description: |
      Hohe kognitive Last im Filialgeschaeft: Gleichzeitig Regale auffuellen,
      Kund:innen bedienen, Frische pruefen, Kuehltechnik ueberwachen.
      Hygiene-Routinen konkurrieren mit operativem Zeitdruck. Nach dem
      Skandal: Zusaetzliche Checklisten und Audits erhoehen die Last.
      "Routine-Blindheit" bei repetitiven Taetigkeiten (taegliches Reinigen)
      ist der Haupttreiber fuer Hygienemaengel.
    key_factors:
      - "Multitasking im Filialgeschaeft (Auffuellen + Bedienen + Pruefen)"
      - "Zeitdruck vs. Hygiene-Standards (Kernkonflikt)"
      - "Routine-Blindheit bei repetitiven Reinigungsaufgaben"
      - "Zusaetzliche Audit-Last durch 5-Punkte-Plan"
    ebf_kappa: "kappa_COG"

  psi_K_cultural:
    value: 0.45
    label: "Kulturell"
    description: |
      Gemischte Belegschaft: Deutsche Stammbelegschaft + hoher Anteil
      Mitarbeitende mit Migrationshintergrund (besonders in Logistik
      und Frischetheken). Kulturelle Heterogenitaet erfordert
      mehrsprachige Kommunikation. Deutsche "Gruendlichkeits"-Norm
      ist Referenzpunkt, aber nicht universal geteilt. Discounter-Mentalitaet
      der Schwarz-Gruppe (Effizienz > Perfektion) praegt die Kultur.
    key_factors:
      - "Kulturell heterogene Belegschaft (mehrsprachig)"
      - "Schwarz-Gruppe Effizienz-Kultur (Kostenoptimierung)"
      - "Deutsche Gruendlichkeitsnorm als Referenz"
      - "Spannungsfeld: Discount-DNA vs. Qualitaetsanspruch"
    ebf_kappa: "kappa_CULT"

  psi_E_economic:
    value: 0.55
    label: "Oekonomisch"
    description: |
      Kaufland investiert 500 Mio EUR/Jahr in Filialqualitaet — signifikantes
      Budget. MA-Loehne im LEH sind moderat (Tarifvertrag Einzelhandel).
      Hohe Fluktuation im Filialgeschaeft (Branchenproblem).
      Fachkraeftemangel im LEH erhoecht den Zeitdruck fuer vorhandenes
      Personal. Bonussysteme auf Filial-Ebene existieren, sind aber
      nicht primaer an Hygiene gekoppelt.
    key_factors:
      - "500 Mio EUR/Jahr fuer Filialqualitaet (Investitionsbereitschaft hoch)"
      - "Tarifloehne LEH (moderat, nicht Premium)"
      - "Hohe Personalfluktuation (Branchenproblem)"
      - "Fachkraeftemangel erhoecht Zeitdruck"
    ebf_kappa: "kappa_ECON"

  psi_T_temporal:
    value: 0.85
    label: "Temporal"
    description: |
      HOHE URGENCY: Post-Skandal-Fenster (April 2025). Oeffentlicher Druck
      durch Team Wallraff, Medienberichte, Social Media. Kaufland muss
      SCHNELL sichtbare Ergebnisse liefern. TUEV-Zertifizierung als
      externer Zeitgeber (alle 780 Filialen muessen zertifiziert werden).
      Gleichzeitig: Langfristiger Kulturwandel braucht Jahre — Spannung
      zwischen kurzfristigem Handlungsdruck und langfristiger Verankerung.
    key_factors:
      - "Post-Skandal Urgency (April 2025, Team Wallraff)"
      - "TUEV-Zertifizierung als externer Zeitgeber"
      - "Medien-/Social-Media-Druck fuer schnelle Ergebnisse"
      - "Spannung: Kurzfristige Massnahmen vs. langfristiger Kulturwandel"
    ebf_kappa: "kappa_TEMP"

  psi_M_material:
    value: 0.60
    label: "Materiell"
    description: |
      Kuehltechnik-Modernisierung laeuft (200+ Standorte). Digitale
      Infrastruktur: Schwarz Digits (eigene IT-Sparte mit STACKIT Cloud).
      Checklisten-Apps und digitale Audits im Aufbau. Aber: Viele Filialen
      operieren noch mit analogen Prozessen (Papier-Checklisten).
      TUEV-SUED-Pruefung schafft neues materielles Artefakt
      (sichtbares Zertifikat in Filiale).
    key_factors:
      - "Kuehltechnik-Modernisierung (200+ Standorte geplant)"
      - "Schwarz Digits / STACKIT fuer Digitalisierung"
      - "Analoge vs. digitale Checklisten (Transitionsphase)"
      - "TUEV-Zertifikat als sichtbares Artefakt"
    ebf_kappa: "kappa_MAT"

  psi_F_physical:
    value: 0.75
    label: "Physisch"
    description: |
      Alle relevanten Interaktionen finden IN DER FILIALE statt
      (kein Remote-Thema). Grossflaechige Maerkte (5'000-15'000 m2)
      mit komplexer Raumstruktur: Trockensortiment, Frischetheken,
      Kuehlregale, Lager, Backstube. Die physische Umgebung IST
      das Interventionsfeld. Sichtbarkeit von Sauberkeit/Unsauberkeit
      ist direkt — Kund:innen sehen alles.
    key_factors:
      - "100% physische Interaktion (Filialgeschaeft)"
      - "Grosse Flaeche (5'000-15'000 m2 pro Markt)"
      - "Komplexe Raumstruktur (Frische, Kuehlung, Lager, Backstube)"
      - "Hohe Sichtbarkeit: Kund:innen als implizite Auditoren"
    ebf_kappa: "kappa_PHYS"

# =============================================================================
# KUNDENSEGMENTE (~5 Segmente, je 4 Parameter)
# =============================================================================
# Segmente = MITARBEITENDE (nicht Endkunden), da Projekt "Sauberkeit"
# auf Mitarbeiterverhalten zielt
# =============================================================================

customer_segments:

  - id: "SEG-01"
    name: "Filialleitung (Marktleiter:innen)"
    description: |
      Schluesselsegment: Marktleiter:innen bestimmen die Hygiene-Kultur
      ihrer Filiale. Direkt verantwortlich fuer TUEV-Zertifizierung.
      Hohes Verantwortungsbewusstsein, aber zwischen operativem Druck
      und Qualitaetsanspruch eingeklemmt.
    share: 0.05  # ~780 Personen bei 780 DE-Filialen + Stellvertreter
    headcount_approx: 1600

    behavioral_parameters:
      lambda_loss_aversion: 2.80
      # Hohe Verlustaversion: Jobverlust bei Hygienemaengeln (2 Marktleiter
      # nach Skandal ausgetauscht). TUEV-Durchfallen = Reputationsverlust.
      beta_present_bias: 0.85
      # Moderat — planen voraus, aber operativer Alltag dominiert.
      kappa_default_sensitivity: 0.75
      # Folgen Unternehmensstandards, aber interpretieren lokal.
      sigma_social_proof: 0.65
      # Vergleichen sich mit anderen Filialen (internes Ranking).

    intervention_affinity:
      high: ["Commitment Devices (TUEV-Ziel)", "Ranking/Benchmarking"]
      medium: ["Fuehrungskraefte-Coaching", "Peer Learning (Best Practice)"]
      low: ["Finanzielle Anreize (bereits eingepreist)"]

  - id: "SEG-02"
    name: "Frischetheken-Personal"
    description: |
      Hoechste Hygienerelevanz: Direkter Kontakt mit offenen Lebensmitteln.
      Spezialisierte Fachkraefte (Metzger:innen, Baecker:innen) mit
      beruflichem Selbstverstaendnis. Kerngruppe fuer Schulungsmassnahmen.
      Allerdings: Hoher Zeitdruck in Stosszeiten.
    share: 0.15
    headcount_approx: 25000

    behavioral_parameters:
      lambda_loss_aversion: 2.40
      # Verlust der Fachkraft-Identitaet bei Hygieneversagen.
      beta_present_bias: 0.78
      # Stosszeiten fuehren zu "Abkuerzungen" (Present Bias).
      kappa_default_sensitivity: 0.80
      # HACCP-geschult — folgen Protokollen wenn vorhanden.
      sigma_social_proof: 0.55
      # Arbeiten oft allein an Theke — wenig Peer Observation.

    intervention_affinity:
      high: ["Checklisten/Defaults", "Salienz (Hygiene-Reminder)"]
      medium: ["Fachtrainer (Peer Learning)", "Feedback-Loops"]
      low: ["Abstrakte Informationskampagnen"]

  - id: "SEG-03"
    name: "Verkaufspersonal (Trockensortiment/Regalpflege)"
    description: |
      Groesstes Segment: Regaleinraeumung, Preisauszeichnung, Kundenservice.
      Hygiene-Relevanz mittelhoch (keine offenen Lebensmittel, aber
      Reinigung, Maeusepraevention, abgelaufene Ware). Hohe Fluktuation,
      viele Teilzeitkraefte und Aushilfen. "Routine-Blindheit" am staerksten.
    share: 0.45
    headcount_approx: 75000

    behavioral_parameters:
      lambda_loss_aversion: 2.10
      # Moderat — Job ist austauschbar, weniger existenziell.
      beta_present_bias: 0.72
      # Staerker: Reinigung wird aufgeschoben wenn operativer Druck hoch.
      kappa_default_sensitivity: 0.70
      # Folgen Anweisungen, aber Eigeninitiative gering.
      sigma_social_proof: 0.60
      # Team-Schichten: Wenn Kolleg:innen sauber arbeiten, dann ich auch.

    intervention_affinity:
      high: ["Social Norms (Team-Standards)", "Defaults (Reinigungs-Timer)"]
      medium: ["Salienz (sichtbare Checklisten)", "Micro-Incentives"]
      low: ["Schulungen (zu abstrakt)", "Finanzielle Strafen (Reaktanz)"]

  - id: "SEG-04"
    name: "Logistik/Lager-Personal"
    description: |
      Wareneingang, Kuehllager, Kommissionierung. Kritisch fuer
      Kuehlketten-Integritaet. Arbeiten im Hintergrund, wenig
      Kund:innen-Kontakt. Koerperlich anspruchsvolle Taetigkeit,
      hoher Zeitdruck bei Anlieferungen. Hygiene = Kuehlkette halten.
    share: 0.20
    headcount_approx: 34000

    behavioral_parameters:
      lambda_loss_aversion: 2.00
      # Moderat — Kuehltechnik-Fehler haben aber klare Konsequenzen.
      beta_present_bias: 0.75
      # Zeitdruck bei Anlieferung: "Schnell rein, spaeter sortieren."
      kappa_default_sensitivity: 0.85
      # Stark: Kuehlketten-Protokolle sind klar und messbar (Temperatur).
      sigma_social_proof: 0.45
      # Arbeiten oft allein oder in Kleingruppen — wenig Social Proof.

    intervention_affinity:
      high: ["Technische Defaults (Kuehlalarm)", "Automatische Ueberwachung"]
      medium: ["Checklisten bei Wareneingang", "Training (Kuehlkette)"]
      low: ["Soziale Normen (zu isoliert)", "Gamification"]

  - id: "SEG-05"
    name: "Reinigungskraefte (intern/extern)"
    description: |
      Dediziertes Reinigungspersonal und externe Dienstleister.
      Direkt zustaendig fuer Grundreinigung, aber oft unsichtbar
      (Nachtschichten, Randzeiten). Niedrigste Qualifikation,
      hoechste Fluktuation. Nach 5-Punkte-Plan: Aufwertung der Rolle.
    share: 0.15
    headcount_approx: 25000

    behavioral_parameters:
      lambda_loss_aversion: 1.80
      # Niedrig: Austauschbare Taetigkeit, geringere Bindung.
      beta_present_bias: 0.68
      # Stark: Routinearbeit fuehrt zu Abkuerzungen.
      kappa_default_sensitivity: 0.85
      # Sehr hoch: Reinigungsplaene und -standards werden befolgt wenn klar.
      sigma_social_proof: 0.40
      # Sehr niedrig: Arbeiten oft allein, nachts, unsichtbar.

    intervention_affinity:
      high: ["Klare Standards/Defaults (Reinigungsplan)", "Sichtbare Ergebnisse"]
      medium: ["Anerkennung (Aufwertung der Rolle)", "Team-Integration"]
      low: ["Schulungen (Sprachbarrieren)", "Abstrakte Kampagnen"]

# =============================================================================
# AGGREGIERTE VERHALTENSPARAMETER
# =============================================================================
# Gewichtete Durchschnitte ueber alle Segmente
# Gewichtung: SEG-01(0.05) SEG-02(0.15) SEG-03(0.45) SEG-04(0.20) SEG-05(0.15)
# =============================================================================

behavioral_parameters_aggregate:

  core_parameters:
    loss_aversion:
      symbol: "lambda"
      value: 2.16
      range: [1.80, 2.80]
      source: |
        Segment-gewichteter Durchschnitt. Filialleitung (2.80) treibt
        oberes Ende — Jobverlust-Risiko nach Skandal. Reinigungskraefte
        (1.80) am unteren Ende — austauschbare Taetigkeit.

    present_bias:
      symbol: "beta"
      value: 0.74
      range: [0.68, 0.85]
      source: |
        Segment-gewichteter Durchschnitt. Starker Present Bias im
        Filialgeschaeft: Zeitdruck fuehrt zu Hygiene-Abkuerzungen.
        Filialleitung (0.85) am wenigsten betroffen.

    default_sensitivity:
      symbol: "kappa_default"
      value: 0.78
      range: [0.70, 0.85]
      source: |
        Segment-gewichteter Durchschnitt. Hohe Default-Sensitivitaet
        quer durch alle Segmente — starke Checklisten-Kultur im LEH.
        Schluesselinsight: WENN Standards klar und sichtbar, DANN
        hohe Compliance. Problem = Standards waren unklar/unsichtbar.

    social_proof:
      symbol: "sigma_social"
      value: 0.55
      range: [0.40, 0.65]
      source: |
        Segment-gewichteter Durchschnitt. Moderater Social Proof —
        viele Taetigkeiten finden isoliert statt (Lager, Reinigung,
        Nachtschicht). Staerkster Hebel bei Verkaufspersonal in
        Team-Schichten.

# =============================================================================
# PROJEKT-SPEZIFISCHE PARAMETER: "SAUBERKEIT"
# =============================================================================

project_sauberkeit:

  context:
    trigger_event: "Hygieneskandal April 2025 (Team Wallraff)"
    public_pressure: "hoch"
    media_coverage: "national (RTL, Stern, Spiegel, Bild)"
    management_commitment: "sehr hoch (500 Mio EUR/Jahr, 5-Punkte-Plan)"
    timeline: "Sofortmassnahmen 2025, Kulturwandel 2025-2028"

  core_behavioral_challenge: |
    Das Kernproblem ist NICHT fehlendes Wissen (HACCP-Schulungen existieren),
    sondern die Luecke zwischen Wissen und Handeln (Intention-Action Gap).
    Haupttreiber:
    1. Zeitdruck vs. Hygiene-Standards (beta = 0.74 → Present Bias)
    2. Routine-Blindheit (taegliches Reinigen wird "automatisch" schlecht)
    3. Dezentrale Kultur (jede Filiale eigene Normen, kein Standard)
    4. Unsichtbarkeit (Reinigung nachts, Lager unsichtbar)

  ebf_diagnosis:
    primary_gap: "Intention-Action Gap (AWARE → READY Uebergang)"
    secondary_gap: "Norm Fragmentation (WHEN: kappa_INST hoch aber Enforcement niedrig)"
    tertiary_gap: "Visibility Gap (HOW: Sauberkeit ist primaer unsichtbar)"

  recommended_intervention_dimensions:
    - dimension: "WHEN"
      target: "kappa_INST Enforcement erhoehen"
      mechanism: "Defaults + Checklisten + automatische Timer"
      expected_effect: "Hoch (kappa_default = 0.78 → hohes Potenzial)"

    - dimension: "AWARE"
      target: "Salienz von Hygiene-Standards erhoehen"
      mechanism: "Sichtbare Artefakte (TUEV-Zertifikat, Live-Dashboards)"
      expected_effect: "Mittel-Hoch"

    - dimension: "WHO"
      target: "Marktleiter:innen als Change Agents"
      mechanism: "Commitment Devices + Ranking + Coaching"
      expected_effect: "Hoch (Schluesselfiguren)"

    - dimension: "WHAT"
      target: "Intrinsische Motivation staerken"
      mechanism: "Professionelle Identitaet + Anerkennung"
      expected_effect: "Mittel (langfristig)"

# =============================================================================
# STRATEGISCHE IMPLIKATIONEN (Quick Assessment)
# =============================================================================

strategic_implications:

  top_3_opportunities:
    - dimension: "WHEN (Defaults)"
      opportunity: |
        Hohe Default-Sensitivitaet (kappa = 0.78) bei gleichzeitig
        historisch schwachem Enforcement. Der 5-Punkte-Plan schafft
        das Fenster: Neue, klare Standards einsetzen die automatisch
        befolgt werden.
      intervention_type: "Choice Architecture / Defaults"

    - dimension: "AWARE (Salienz)"
      opportunity: |
        TUEV-Zertifikat als "proud signal" — Filialen die bestehen,
        zeigen Zertifikat. Kombiniert Salienz + Social Proof +
        Commitment Device. Bereits 200+ Filialen zertifiziert.
      intervention_type: "Salienz + Commitment Device"

    - dimension: "WHO (Fuehrung)"
      opportunity: |
        Marktleiter:innen sind der entscheidende Hebel. Post-Skandal
        Verlustaversion (lambda = 2.80) schafft hohe Motivation.
        Filial-Ranking + Peer Learning zwischen Maerkten.
      intervention_type: "Leadership Commitment + Benchmarking"

  top_3_risks:
    - risk: |
        Reaktanz bei Filial-MA durch "Audit-Muedigkeit": Zu viele
        Checklisten und Kontrollen fuehren zu Compliance-Fatigue
        statt intrinsischer Motivation.
      mitigation: |
        Balance zwischen Kontrolle und Autonomie: Self-Assessment
        vor Fremd-Audit, MA in Standardentwicklung einbeziehen.

    - risk: |
        Crowding-Out: Finanzielle Strafen (Abmahnung bei Maengeln)
        untergraben soziale Normen und intrinsische Sauberkeits-
        motivation (gamma_SF = -0.68).
      mitigation: |
        Primaer auf positive Anreize setzen: Anerkennung, TUEV-Stolz,
        Best-Practice-Austausch. Strafen nur als letztes Mittel.

    - risk: |
        Nachhaltigkeit: Post-Skandal-Urgency (psi_T = 0.85) nimmt
        mit der Zeit ab. Wenn Medien-Druck sinkt, sinkt Motivation.
        "Rebound" auf altes Verhalten nach 12-18 Monaten.
      mitigation: |
        Habit Formation: Standards in Routinen verankern bevor
        Urgency nachlässt. TUEV als permanenter externer Zeitgeber.
        Kulturwandel-Programm mit 3-Jahres-Horizont.

  recommended_next_step: |
    1. Workshop mit Kaufland-Projektteam: EBF-Diagnose vorstellen
       (Intention-Action Gap, nicht Wissensdefizit)
    2. Pilot in 5-10 Filialen: Defaults + Salienz + Leadership testen
    3. Messung: Baseline → 3 Monate → 6 Monate (TUEV-Scores als KPI)
    4. Bei Erfolg: Skalierung auf alle 780 DE-Filialen

    Upgrade auf CVA STANDARD empfohlen nach Projektstart.

