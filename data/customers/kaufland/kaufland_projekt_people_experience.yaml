          im Sauberkeits-Projekt. Synergie zwischen PX und Sauberkeit.
        relevanz: "Hoch — wenn Sauberkeit FK-Entwicklung braucht"

      - name: "MA-Befragung / Engagement"
        beschreibung: "Befragungen verhaltensorientiert redesignen"
        relevanz: "Mittel — abhaengig ob im PX-Scope"

# =============================================================================
# GESPRAECHSLEITFADEN (fuer Exploration mit Thomas)
# =============================================================================

exploration_questions:

  block_1_verstaendnis:
    titel: "People Experience verstehen"
    fragen:
      - "Was gehoert bei Kaufland alles zu People Experience?"
      - "Welche Programme/Instrumente habt ihr bereits?"
      - "Wie gross ist das Team?"

  block_2_fk_evaluation:
    titel: "Fuehrungskraefte-Evaluation vertiefen"
    fragen:
      - "Wie laeuft die FK-Evaluation aktuell ab?"
      - "Welche Kriterien werden angewendet?"
      - "Wer evaluiert? (Vorgesetzte, HR, extern?)"
      - "Wie viele MA durchlaufen das pro Jahr?"
      - "Was funktioniert gut, was nicht?"
      - "Fuer welche Karriereschritte wird evaluiert?"
      - "Gibt es bekannte Schwachstellen oder Frustrationen?"

  block_3_jobs_und_tasks:
    titel: "Jobs, Tasks und Wertschoepfung"
    fragen:
      - "Wie sind die Jobs bei Kaufland aktuell designt/beschrieben?"
      - "Gibt es Stellenprofile oder Task-Beschreibungen pro Marktbereich?"
      - "Wie detailliert ist die SBO-Taxonomie (STAX-KAUF-001) im Task-Bereich?"
      - "Werden Tasks nach Wertbeitrag (Kunde/Firma/MA) differenziert?"
      - "Kennt ihr die typischen Tasks pro Karrierestufe?"

  block_4_fuehrungsqualitaet:
    titel: "Fuehrungsqualitaet messen und steuern"
    fragen:
      - "Wie messt ihr heute Fuehrungsqualitaet? Welche KPIs?"
      - "Werden KPIs um den Filial-Kontext bereinigt?"
      - "Wie vergleicht ihr FK ueber 780 Maerkte hinweg?"
      - "Gibt es verhaltensbasierte KPIs (Feedback-Frequenz, Entwicklungsgespraeche)?"
      - "Unterscheidet ihr zwischen Ergebnis-KPIs und Fuehrungs-KPIs?"
      - "Wie steuert ihr Fuehrungsqualitaet aktiv (nicht nur messen)?"

  block_5_talente:
    titel: "Talente entdecken und foerdern"
    fragen:
      - "Wie werden Talente heute identifiziert? (Nomination, Daten, Assessment?)"
      - "Welche Rollen/Bereiche sind im Talentmanagement gut abgedeckt?"
      - "Wo vermutet ihr unentdeckte Talente?"
      - "Gibt es MA in weniger sichtbaren Rollen (Nachtschicht, Lager), die uebersehen werden?"
      - "Wie diversifiziert ist der Talentpool (Geschlecht, Alter, Herkunft)?"

  block_6_schmerzpunkte:
    titel: "Wo drueckt der Schuh?"
    fragen:
      - "Was sind die groessten Herausforderungen in der PE/FE?"
      - "Wo waere externer Input am wertvollsten?"
      - "Was hat bisher nicht funktioniert?"

  block_7_zusammenarbeit:
    titel: "Moegliche Zusammenarbeit"
    fragen:
      - "Koennte eine verhaltensorientierte Perspektive helfen?"
      - "Gibt es Budget/Mandat fuer externe Beratung?"
      - "Welcher Zeithorizont?"

# =============================================================================
# HYPOTHESEN ZUR FK-EVALUATION (vor Gespraech)
# =============================================================================

hypotheses:

  h0_abteilung:
    hypothesis: |
      "People Experience" ist Kauflands Bezeichnung fuer die bestehende
      Abteilung Personal- und Fuehrungsentwicklung (PE/FE).
    typ: "organisational"
    testbar: true
    test: "Im Gespraech bestaetigen"
    status: "teilweise_bestaetigt"
    evidenz: |
      Gespraech 2026-02-20: Team umfasst Talentmanagement (Susanne Karg),
      Eignungsdiagnostik (Joshua Oster, Psychologe), und weitere (Luisa).
      Funktionsumfang bestaetigt PE/FE-Hypothese. Kernfrage des Teams
      zeigt klaren Fokus auf Fuehrungsqualitaet und Messbarkeit.

  h1_evaluation_biases:
    hypothesis: |
      Die FK-Evaluation bei Kaufland ist — wie in den meisten
      Unternehmen — anfaellig fuer systematische Biases: Halo,
      Recency, Aehnlichkeit, Peter-Prinzip. Diese fuehren dazu,
      dass nicht die besten Kandidat:innen befoerdert werden,
      sondern die sichtbarsten/aeltesten/aehnlichsten.
    typ: "behavioral"
    target_10c: "AWARE + WHO"
    testbar: true
    test: "Evaluationsdaten analysieren (Korrelation Performance → Befoerderung)"

  h2_kontext_ignoriert:
    hypothesis: |
      Die Evaluation beruecksichtigt den Filial-Kontext nicht
      ausreichend. MA in «schwierigen» Filialen (hohe Fluktuation,
      laendlich, Personalengpass) werden systematisch unterschaetzt,
      weil ihre KPIs schlechter aussehen — obwohl sie unter
      schwierigeren Bedingungen arbeiten.
    typ: "contextual"
    target_10c: "WHEN (Kontext als Erklaerung, nicht Noise)"
    testbar: true
    test: "KPI-Streuung nach Filial-Kontext analysieren"

  h3_noise:
    hypothesis: |
      Es gibt hohe Noise (unsystematische Varianz) zwischen
      Evaluierenden. Zwei Vorgesetzte bewerten denselben MA
      unterschiedlich — nicht wegen verschiedener Meinungen,
      sondern wegen unstrukturiertem Verfahren.
    typ: "procedural"
    target_10c: "HOW (Entscheidungsarchitektur)"
    testbar: true
    test: "Inter-Rater-Reliabilitaet pruefen"
    evidenz: "kahneman2021noise"

  h4_tasks_vs_kompetenzen:
    hypothesis: |
      Kauflands FK-Evaluation basiert auf Kompetenz-Ratings
      (weiche Labels wie "kommunikativ", "durchsetzungsstark"),
      nicht auf beobachtbaren Task-Profilen. Kompetenz-Ratings
      sind anfaelliger fuer Bias als Task-basierte Bewertungen,
      weil Tasks beobachtbar und messbar sind.
    typ: "methodological"
    target_10c: "WHAT (Value-Messung) + AWARE (Beobachtbarkeit)"
    testbar: true
    test: |
      Bestehende Evaluationsboegen analysieren: Wieviel % der
      Kriterien sind beobachtbare Tasks vs. vage Kompetenzen?

  h5_kpi_ohne_kontext:
    hypothesis: |
      FK-KPIs bei Kaufland werden NICHT um den Filial-Kontext
      bereinigt. Das fuehrt dazu, dass FK in gutem Kontext
      (Top-Standort, stabiles Team) systematisch besser bewertet
      werden als FK in schwierigem Kontext — unabhaengig von
      tatsaechlicher Fuehrungsqualitaet.
    typ: "contextual"
    target_10c: "WHEN (Kontext) + WHO (FK-Segmente)"
    testbar: true
    test: |
      KPI-Verteilung nach Filialtyp analysieren. Wenn Korrelation
      (Filial-Kontext, FK-Bewertung) > 0.3: Kontext dominiert.

  h6_hidden_talents:
    hypothesis: |
      Es gibt eine signifikante Anzahl unentdeckter Talente bei
      Kaufland (geschaetzt 3-8% der 170k MA), die im bestehenden
      Nominations-System nicht sichtbar werden. Gruende:
      Sichtbarkeits-Bias, Kontext-Maskierung, Nominations-Bias,
      lineare Karrierepfad-Annahme.
    typ: "structural"
    target_10c: "AWARE (Sichtbarkeit) + STAGE (Karrierepfad)"
    testbar: true
    test: |
      Randomisiertes Talent-Experiment: Zufaellig ausgewaehlte MA
      vs. nominierte MA in Entwicklungsprogramm → Performance
      vergleichen. Wenn kein signifikanter Unterschied: System
      uebersieht Talente.

