organisationsdesign:

  umstrukturierung_2026:
    status: "LAUFEND — Februar 2026"
    headline: "Kaufland eliminiert komplette Hierarchieebene"
    kernveraenderung: |
      Die bisherigen 6 Vertriebsregionen werden aufgeloest.
      Vertrieb und Logistik werden zentral aus Neckarsulm gesteuert.
      Eine komplette Fuehrungsebene (Regionalgeschaeftsfuehrer) faellt weg.
    vorher:
      struktur: "6 Vertriebsregionen"
      regionen:
        - "West (Martin Pralow — ausgeschieden)"
        - "Ost (Ralph Zill — ausgeschieden)"
        - "Sued (Nicole Krauss — ausgeschieden)"
        - "West-2 (Nadine Braun — ausgeschieden)"
        - "Ost-2 (Cathrin Gebhardt — ausgeschieden)"
        - "Sued-Ost (Lehel Salat — ausgeschieden)"
    nachher:
      struktur: "Zentrale Steuerung Neckarsulm"
      fuehrung:
        gf_vorsitzender: "Stefan Hoppe (seit 2025)"
        gf_vertrieb_logistik_scm: "Heiko Koch"
      zitat_koch: |
        Die Verantwortlichkeiten sind jetzt klarer geregelt, unsere Strukturen
        schlanker und Arbeits- und Entscheidungsprozesse einfacher gestaltet.
        Wir schaffen damit flache Hierarchien und kurze Kommunikationswege
        zwischen unserer Zentrale und den Filialen.
    quellen:
      - "Lebensmittel Zeitung: Drei Topmanager gehen — Kaufland stampft Regionen ein"
      - "STIMME.de: Kaufland zentralisiert den Vertrieb — operatives Erdbeben"
      - "Lebensmittelpraxis: Kaufland schafft Regionen ab, Manager muessen gehen"
      - "Supermarkt-Inside: Radikale Umstrukturierung bei Kaufland"

  hierarchie_filiale:
    kaufland_terminologie:
      hausleiter: "= Marktleiter / Filialleiter (Kaufland-intern: Hausleiter)"
      warenbereichsleiter: "= Abteilungsleiter (WBL, z.B. Food / Non-Food)"
      verkaufsleiter: "= Bezirksleiter / Regionalleiter (betreut mehrere Filialen)"
      geschaeftsfuehrer_verkauf: "= Vertriebsdirektor (~40 Filialen)"
    ebenen_von_oben:
      1_schwarz_gruppe: "Holding (Kaufland + Lidl)"
      2_kaufland_de_gl: "Geschaeftsleitung DE (Hoppe, Koch)"
      3_gf_verkauf: "Geschaeftsfuehrer Verkauf (~40 Filialen, ~100 MA/Filiale)"
      4_verkaufsleiter: "Verkaufsleiter (betreut mehrere Filialen)"
      5_hausleiter: "Hausleiter / Marktleiter (1 Filiale)"
      6_stv_hausleiter: "Stellvertretende Hausleitung"
      7_warenbereichsleiter: "WBL Food / WBL Non-Food"
      8_teamleiter: "Teamleitung (z.B. Kasse)"
      9_mitarbeiter: "Fachkraefte und Mitarbeitende"

  karrierepfade:
    typisch:
      - "Azubi/Aushilfe → Mitarbeiter Verkauf → Fachkraft [1-2 J.]"
      - "Fachkraft → Warenbereichsleiter (WBL) [2-4 J.]"
      - "WBL → Stv. Hausleiter [2-3 J.]"
      - "Stv. Hausleiter → Hausleiter [2-3 J.]"
      - "Hausleiter → Verkaufsleiter [3-5 J.]"
      - "Verkaufsleiter → Geschaeftsfuehrer Verkauf"
    schwarz_prinzip: |
      Schwarz-Gruppe ist bekannt dafuer, Top-Positionen bevorzugt
      mit langjahrigen eigenen Gewachsen zu besetzen. Interne Karriere
      vom Azubi bis zum GF ist moeglich und gewuenscht.
    alternative_pfade:
      - "Hausleiter → Bezirksleiter"
      - "Hausleiter → Expansionsmanager (Neueroeffnungen)"
      - "Hausleiter → Trainer Personalentwicklung"
      - "Hausleiter → Internationale Expansion"

  kennzahlen:
    filialen_de: 780
    filialen_international: 1500
    laender: 8
    mitarbeiter: 170000
    umsatz_2024_eur_mrd: 35.2
    artikel_pro_filiale: 30000
    ma_pro_filiale: "100-250 (je nach Groesse)"
    gehalt_hausleiter_median: 68800
    gehalt_hausleiter_range: "34'800 - 84'100 EUR"

  implikationen_fuer_projekt:
    timing: |
      Das PX-Projekt trifft auf eine Organisation im UMBRUCH.
      Die Skill-Taxonomie MUSS die neue Struktur abbilden.
      Regionale Fuehrung faellt als Karrierestufe weg.
    span_of_control: |
      Hausleiter berichten DIREKTER an Zentrale.
      Mehr Autonomie + mehr Verantwortung fuer Hausleiter.
      Skills wie strategisches Denken, Data-Driven Decision werden wichtiger.
    flachere_hierarchien: |
      Weniger nach oben managen (Regionsebene weg).
      Mehr lateral fuehren (direkt mit Zentrale).
      Kommunikation + analytische Faehigkeiten steigen.
    verunsicherung: |
      6 Topmanager gerade entlassen, operatives Erdbeben.
      People Experience-Projekt = Signal: Wir investieren in euch.
      Vertrauensaufbau ist aktuell besonders wichtig.
    karrierepfade_neu: |
      Verkaufsleiter-Ebene: existiert sie noch gleich?
      Zentralere Steuerung = mehr Zentrale-Karrieren?
      Hausleiter-Rolle wird aufgewertet.
    chance: |
      Das PX-Projekt kann die NEUE Struktur mitdefinieren,
      statt die alte zu dokumentieren. Das erhoht unseren
      strategischen Wert erheblich.

# =============================================================================
# ZUSAMMENARBEITSMOEGLICHKEITEN (fuer Explorationsgespraech)
# =============================================================================
# Konkreter Anknuepfungspunkt: Fuehrungskraefte-Evaluation
# Weitere Moeglichkeiten: im Gespraech zu identifizieren
# =============================================================================

collaboration_opportunities:

  # -------------------------------------------------------------------
  # OPPORTUNITY 1: Fuehrungskraefte-Evaluation (KONKRETER ANKNUEPFUNGSPUNKT)
  # -------------------------------------------------------------------
  opp1_fk_evaluation:
    name: "Fuehrungskraefte-Evaluation"
    status: "konkreter_anknuepfungspunkt"
    description: |
      Kaufland nutzt eine Fuehrungskraefte-Evaluation, um Mitarbeitende
      fuer naechste Karriereschritte zu identifizieren und zu evaluieren.
      FehrAdvice kann hier mit verhaltensorientierter Expertise ansetzen.

    was_wir_wissen:
      - "Kaufland hat ein bestehendes Evaluationsverfahren"
      - "Ziel: MA fuer naechste Karriereschritte identifizieren"
      - "Details des Verfahrens noch unbekannt (im Gespraech klaeren)"

    was_wir_noch_nicht_wissen:
      - "Wie sieht das Verfahren konkret aus? (Assessment Center, Interview, Rating?)"
      - "Wer evaluiert? (Vorgesetzte, HR, extern, Peers?)"
      - "Welche Kriterien werden angewendet?"
      - "Wie viele MA durchlaufen das jaehrlich?"
      - "Was sind bekannte Schwachstellen aus Sicht von Thomas?"
      - "Fuer welche Karriereschritte? (Team → Abteilung → Markt → Region?)"

    ebf_mehrwert_hypothesen:
      # Was FehrAdvice konkret beitragen koennte:

      bias_reduktion:
        name: "Bewertungs-Biases reduzieren"
        beschreibung: |
          Evaluationen sind anfaellig fuer systematische Verzerrungen.
          FehrAdvice kann diese identifizieren und das Verfahren
          entzerren — ohne es komplett umzubauen.
        typische_biases:
          - name: "Halo-Effekt"
            beschreibung: "Ein positiver Eindruck in einer Dimension faerbt auf alle ab"
            evidenz: "thorndike1920constant, nisbett1977halo"
          - name: "Anker-Effekt"
            beschreibung: "Erste Information (z.B. aktuelle Position) verankert Bewertung"
            evidenz: "tversky1974judgment"
          - name: "Kontrasteffekt"
            beschreibung: "Kandidat:in wirkt besser/schlechter je nach Vorgaenger:in"
          - name: "Aehnlichkeits-Bias"
            beschreibung: "Evaluierende bevorzugen Kandidat:innen die ihnen aehneln"
          - name: "Recency Bias"
            beschreibung: "Juengste Leistung uebergewichtet, fruehe Leistung vergessen"
          - name: "Peter-Prinzip-Falle"
            beschreibung: |
              Performance in aktueller Rolle ≠ Potenzial fuer naechste Rolle.
              Beste Fachkraft ≠ beste Fuehrungskraft. Klassischer Fehler
              in Befoerderungsentscheidungen.
        target_10c: "AWARE (Bewusstheit der Evaluierenden)"

      kontextabhaengigkeit:
        name: "Kontext-sensitive Evaluation"
        beschreibung: |
          EBF-Kernthese: Dieselbe Person performt unterschiedlich in
          unterschiedlichen Kontexten. Eine Evaluation, die den Kontext
          ignoriert, misst die SITUATION, nicht die PERSON.
        beispiel: |
          Marktleiter:in A in prosperierender Filiale (Uni-Stadt, wenig
          Fluktuation) vs. Marktleiter:in B in schwieriger Filiale
          (laendlich, hohe Fluktuation). B ist vielleicht die bessere
          Fuehrungskraft — der Kontext maskiert das.
        psi_dimensionen:
          - "psi_E: Oekonomischer Kontext der Filiale"
          - "psi_S: Team-Zusammensetzung und Kohaesion"
          - "psi_T: Dauer in der Rolle"
          - "psi_F: Standort-Typ (Stadt/Land, Groesse)"
        target_10c: "WHEN (Kontext) + WHO (Person vs. Situation)"

      noise_reduktion:
        name: "Noise in Bewertungen reduzieren"
        beschreibung: |
          Nach Kahneman/Sibony/Sunstein (2021, "Noise"): Urteile
          streuen nicht nur wegen Bias, sondern wegen unsystematischer
          Varianz (Noise). Zwei Evaluierende bewerten denselben
          Kandidaten unterschiedlich — nicht weil sie verschiedene
          Meinungen haben, sondern weil das Verfahren zu viel
          Interpretationsspielraum laesst.
        massnahmen:
          - "Strukturierte Bewertungskriterien (statt freier Eindruck)"
          - "Unabhaengige Bewertungen VOR Diskussion (kein Groupthink)"
          - "Mediating Assessments (Teilurteile vor Gesamturteil)"
          - "Kalibrierungs-Sessions zwischen Evaluierenden"
        evidenz: "kahneman2021noise"
        target_10c: "HOW (Entscheidungsarchitektur)"

      entscheidungsarchitektur:
        name: "Choice Architecture des Evaluationsprozesses"
        beschreibung: |
          Der PROZESS der Evaluation beeinflusst das ERGEBNIS.
          Reihenfolge der Kandidat:innen, Format der Bewertungsboegen,
          Zeitdruck, Setting — alles Kontext-Variablen die das
          Ergebnis verschieben koennen.
        beispiele:
          - "Reihenfolge-Effekte: Wer zuerst praesentiert, wird anders bewertet"
          - "Bewertungsskalen: 5-Punkt vs. 10-Punkt veraendert Verteilung"
          - "Defaults: 'Nicht befoerdern' als Default vs. 'Befoerdern'"
          - "Timing: Evaluation am Montag frueh vs. Freitag spaet"
        target_10c: "WHEN (Prozess-Design)"

  # -------------------------------------------------------------------
  # OPPORTUNITY 2: Task-basierte Wertschoepfungsanalyse
  # -------------------------------------------------------------------
  # Idee: Von den Maerkten (Hypermarkt, Fleisch, Backwaren, Kasse, ...)
  # ausgehen und eine erschoepfende Menge an Tasks identifizieren.
  # Jeder Task wird dreifach bewertet: Kundenwert, Firmenwert, MA-Nutzen.
  # Das ergibt ein fundamentales Fundament fuer FK-Evaluation UND
  # Talentmanagement — weil man nicht Personen, sondern Task-Profile
  # vergleicht.
  # -------------------------------------------------------------------
  opp2_task_based_value:
    name: "Task-basierte Wertschoepfungsanalyse"
    status: "konzeptionell"
    description: |
      Kaufland-Maerkte in ihre Funktionsbereiche zerlegen, fuer jeden
      Bereich die notwendigen Tasks erschoepfend identifizieren und
      jeden Task dreifach bewerten: Welchen Wert schafft er fuer den
      Kunden, fuer das Unternehmen, und fuer die Nutzenstruktur des MA?

    kernidee: |
      U_task = { U_kunde, U_firma, U_ma }

      Statt: "Ist Maria eine gute Fuehrungskraft?" (vage, bias-anfaellig)
      Lieber: "Welche Tasks beherrscht Maria, und welchen Dreifach-Wert
      erzeugen diese Tasks im Zielkontext der naechsten Rolle?"

    methodik:
      schritt_1_marktbereiche:
        name: "Marktbereiche identifizieren"
        beschreibung: |
          Exhaustive Liste der Funktionsbereiche in einem Kaufland-Markt:
          Frischetheke (Fleisch, Fisch, Kaese), Backwaren, Obst/Gemuese,
          Trockensortiment, Kasse, Lager/Logistik, Marktleitung, etc.
        output: "Liste aller Marktbereiche mit Unterstruktur"

      schritt_2_tasks:
        name: "Tasks pro Bereich identifizieren"
        beschreibung: |
          Fuer jeden Marktbereich: Welche konkreten Taetigkeiten sind
          notwendig? Nicht Kompetenz-Labels ("kommunikativ"), sondern
          beobachtbare Tasks ("Kundengespräch bei Reklamation fuehren").
        output: "Exhaustive Task-Liste pro Marktbereich"
        beispiel_frischetheke:
          - "Ware annehmen und Qualitaet pruefen"
          - "Kuehltechnik ueberwachen und Temperatur dokumentieren"
          - "Kund:innen aktiv beraten (Empfehlungen, Zubereitungstipps)"
          - "Bestellmengen kalkulieren (Saisonalitaet, Schwund minimieren)"
          - "Mitarbeitende einarbeiten und anleiten"
          - "HACCP-Protokolle fuehren und pruefen"

      schritt_3_dreifachwert:
        name: "Dreifach-Wert pro Task bestimmen"
        beschreibung: |
          Fuer jeden Task drei Wertdimensionen schaetzen:
          U_kunde: Wieviel Wert schafft dieser Task fuer den Kunden?
          U_firma: Wieviel Wert schafft dieser Task fuer Kaufland?
          U_ma:    Wieviel Nutzen/Entwicklung bringt dieser Task dem MA?
        skala: "0 (kein Wert) bis 1 (hoechster Wert), relativ"
        beispiel:
          - task: "Kund:innen aktiv beraten"
            U_kunde: 0.9   # Direkt wertschoepfend fuer Kunden
            U_firma: 0.7   # Kundenbindung, Upselling
            U_ma: 0.6      # Kommunikation trainiert, aber repetitiv
          - task: "HACCP-Protokolle fuehren"
            U_kunde: 0.3   # Indirekt (Lebensmittelsicherheit)
            U_firma: 0.9   # Regulatorisch kritisch, Haftung
            U_ma: 0.2      # Wenig Entwicklung, Compliance-Routine

      schritt_4_profilierung:
        name: "Task-Profile fuer Rollen erstellen"
        beschreibung: |
          Aus den Tasks ergeben sich natuerliche Rollen-Profile:
          Welche Tasks gehoeren zu "Marktleiter:in"?
          Welche zu "Abteilungsleiter:in Frische"?
          → Karriereschritt = Wechsel von Task-Profil A zu Task-Profil B
          → Eignung = Ueberlappung des persoenlichen Task-Portfolios
              mit dem Ziel-Profil
        output: "Task-Profile pro Karrierestufe"

    ebf_anknuepfung:
      who: "Segmente = MA-Gruppen mit aehnlichen Task-Portfolios"
      what: "Utility = Dreifach-Wert (Kunde, Firma, MA)"
      when: "Kontext = Filialtyp, Marktbereich, Tageszeit"
      aware: "Bewusstheit ueber eigenes Task-Portfolio und dessen Wert"
      stage: "Karrierephase = aktuelles vs. naechstes Task-Profil"

    verbindung_zu_opp1: |
      Die Task-basierte Analyse ist das FUNDAMENT fuer opp1 (FK-Evaluation):
      Statt vage Kompetenz-Ratings zu verwenden, evaluiert man die
      Ueberlappung zwischen aktuellem Task-Portfolio und Ziel-Task-Profil.
      Das reduziert Bias (weil Tasks beobachtbar sind) und Noise
      (weil die Bewertung strukturiert ist).

    verbindung_sbo: |
      Kaufland hat bereits SBO-Taxonomie (STAX-KAUF-001, 170k MA, 120 Skills).
      Aber Skills ≠ Tasks. Skills sind INPUT ("kann Kundengespraech fuehren"),
      Tasks sind OUTPUT ("fuehrt 15 Kundengespraeche/Tag in Frischetheke").
      EBF ergaenzt SBO um die Wertschoepfungsperspektive.

    target_10c: "WHAT (Value) + WHO (Profile) + WHEN (Kontext)"

  # -------------------------------------------------------------------
  # OPPORTUNITY 3: Fuehrungsqualitaet messen und steuern
  # -------------------------------------------------------------------
  opp3_leadership_quality:
    name: "Fuehrungsqualitaet messen und steuern"
    status: "konzeptionell"
    description: |
      Wie kann Kaufland Fuehrungsqualitaet systematisch messen,
      steuern und verbessern? Welche Kennzahlen (KPIs) bilden
      Fuehrungsqualitaet ab — jenseits von Umsatz/Produktivitaet?

    kernfragen:
      - "Wie messen wir Fuehrungsqualitaet? (nicht nur Ergebnis, sondern Fuehrungsverhalten)"
      - "Welche KPIs sind verhaltensrelevant und nicht manipulierbar?"
      - "Wie steuern wir Fuehrungsqualitaet ueber 780 Maerkte hinweg?"
      - "Wie unterscheiden wir gute Fuehrung von gutem Kontext?"

    ebf_ansatz:
      problem_mit_klassischen_kpis: |
        Klassische FK-KPIs (Umsatz, Fluktuation, Kundenzufriedenheit)
        messen ERGEBNISSE, nicht FUEHRUNG. Marktleiter:in in Top-Lage
        hat bessere KPIs als in schwieriger Lage — unabhaengig von
        Fuehrungsqualitaet. EBF-Kernthese: θ = f(Ψ, 10C) — Parameter
        sind kontextabhaengig.

      kontextbereinigte_kpis:
        beschreibung: |
          KPIs muessen um den Filial-Kontext (Ψ) bereinigt werden:
          KPI_bereinigt = KPI_roh × Kontext-Korrekturfaktor
          Dann vergleicht man FK nicht nach absoluten Zahlen, sondern
          nach Performance RELATIV zum Kontext.
        psi_faktoren:
          - "psi_E: Kaufkraft im Einzugsgebiet, Wettbewerb"
          - "psi_F: Filialgroesse, Alter, Bausubstanz"
          - "psi_S: Teamzusammensetzung, Erfahrungsmix, Fluktuation"
          - "psi_T: Dauer der FK in der Rolle"
          - "psi_I: Lokale Regulierung, Oeffnungszeiten"

      vorgeschlagene_kpis:
        ergebnis_kpis_kontextbereinigt:
          - name: "Fluktuation (kontextbereinigt)"
            formel: "Fluktuation_roh / E[Fluktuation|Ψ_filiale]"
            beschreibung: "Fluktuation relativ zum erwarteten Wert fuer diesen Filialtyp"
          - name: "Krankenstand (kontextbereinigt)"
            formel: "Krankenstand_roh / E[Krankenstand|Ψ_filiale]"
            beschreibung: "Krankenstand relativ zum Filial-Kontext"
          - name: "MA-Zufriedenheit (Delta)"
            formel: "Zufriedenheit(t) - Zufriedenheit(t-1)"
            beschreibung: "Veraenderung unter dieser FK, nicht Niveau"

        fuehrungs_kpis_verhaltensbasiert:
          - name: "Feedback-Frequenz"
            beschreibung: "Wie oft gibt FK strukturiertes Feedback?"
            messbar: true
            manipulierbar: "mittel (Quantitaet ≠ Qualitaet)"
          - name: "Entwicklungsgespraeche-Quote"
            beschreibung: "% der MA mit dokumentiertem Entwicklungsplan"
            messbar: true
          - name: "Autonomie-Score"
            beschreibung: "Wieviel Entscheidungsfreiraum gibt FK dem Team?"
            messbar: "via MA-Befragung"
          - name: "Talent-Weitergabe-Rate"
            beschreibung: "Wie viele MA aus diesem Team werden befoerdert?"
            messbar: true
            note: "Beste FK entwickeln MA WEITER, nicht nur nutzen"

      steuerung_ueber_780_maerkte: |
        Herausforderung: 780 Maerkte in DE, unterschiedliche Kontexte.
        Loesung: Filial-Cluster bilden (aehnlicher Ψ-Vektor),
        innerhalb der Cluster Fuehrungsqualitaet vergleichen.
        → "Beste Fuehrung unter schwierigen Bedingungen" wird sichtbar.

    target_10c: "WHO (FK-Segmente) + WHEN (Kontext) + HOW (Messverfahren)"

  # -------------------------------------------------------------------
  # OPPORTUNITY 4: Hidden Talent Discovery
  # -------------------------------------------------------------------
  opp4_hidden_talents:
    name: "Hidden Talent Discovery"
    status: "konzeptionell"
    description: |
      Bei 170'000 Mitarbeitenden gibt es Talente, die im bestehenden
      System nicht entdeckt werden. EBF kann systematische blinde Flecken
      identifizieren und alternative Erkennungsmechanismen vorschlagen.

    warum_talente_uebersehen_werden:
      sichtbarkeits_bias:
        beschreibung: |
          Talente in sichtbaren Rollen (Marktleitung, Teamleitung) werden
          erkannt. Talente in weniger sichtbaren Rollen (Nachtschicht,
          Lager, Kasse) werden systematisch uebersehen — nicht weil sie
          weniger talentiert sind, sondern weil die SICHTBARKEIT fehlt.
        target_10c: "AWARE (Sichtbarkeit im System)"

      kontext_maskierung:
        beschreibung: |
          Gute Leistung in schwierigem Kontext (laendliche Filiale,
          hohe Fluktuation, Personalmangel) wird nicht als Talent erkannt,
          weil die absoluten Zahlen nicht glaenzen. Aber: Wer unter
          schwierigen Bedingungen gute Ergebnisse liefert, hat
          moeglicherweise MEHR Talent als jemand mit glaenzenden
          Zahlen unter perfekten Bedingungen.
        target_10c: "WHEN (Kontext als Maskierung)"

      nominations_bias:
        beschreibung: |
          Wenn Vorgesetzte Talente nominieren, greifen dieselben Biases
          wie bei FK-Evaluation (Halo, Aehnlichkeit, Recency).
          Introvertierte, anderskulturelle, teilzeitarbeitende MA
          werden systematisch seltener nominiert.
        target_10c: "WHO (wer wird gesehen, wer nicht)"

      peter_prinzip_umkehrung:
        beschreibung: |
          Manche MA sind in ihrer aktuellen Rolle "unauffaellig",
          haetten aber in einer ANDEREN Rolle (z.B. Schulung, Prozess-
          optimierung, Standortentwicklung) aussergewoehnliches Talent.
          Das aktuelle System erkennt Talent nur INNERHALB des bestehenden
          Karrierepfads — nicht quer dazu.
        target_10c: "STAGE (alternativer Karrierepfad)"

    ebf_loesungsansaetze:
      ansatz_1_datengetrieben:
        name: "Kontext-bereinigte Performance-Analyse"
        beschreibung: |
          Performance-Daten um Filial-Kontext bereinigen (siehe opp3).
          Dann: Wer performt UEBERDURCHSCHNITTLICH fuer seinen Kontext?
          → Systematische Talentliste jenseits von Nominations.
        aufwand: "Mittel (Datenanalyse, Algorithmus)"

      ansatz_2_peer_signals:
        name: "Peer-basierte Talentnetzwerke"
        beschreibung: |
          Statt nur Vorgesetzte zu fragen: "Wen wuerdest du anrufen,
          wenn du ein Problem in der Frischetheke hast?" → Informelle
          Expertise-Netzwerke sichtbar machen. Wer oft genannt wird,
          hat unsichtbares Talent.
        aufwand: "Niedrig (Befragung, Netzwerkanalyse)"

      ansatz_3_task_matching:
        name: "Task-Profil-basiertes Matching (→ opp2)"
        beschreibung: |
          Aus der Task-Analyse (opp2) Task-Profile erstellen.
          Dann: MA-Portfolio gegen ALLE Ziel-Profile matchen,
          nicht nur den naechsten linearen Karriereschritt.
          → Entdeckt Quereinsteiger-Talente.
        aufwand: "Hoch (setzt opp2 voraus)"
        verbindung: "Direkte Verbindung zu opp2_task_based_value"

      ansatz_4_talent_experiment:
        name: "Talent-Entdeckungs-Experiment"
        beschreibung: |
          Randomisiert ausgewaehlte MA aus "unauffaelligen" Rollen
          in Entwicklungsprogramm einladen (statt nur Nominierte).
          Vergleich: Wie performen "entdeckte" vs. "nominierte" Talente?
          → Empirischer Test ob Nominations-System Talente uebersieht.
        aufwand: "Mittel (RCT-Design)"
        evidenz_basis: "Randomisierung als Gold-Standard (Fehr/EBF)"

    scale: |
      Bei 170'000 MA und konservativer Schaetzung von 5% unentdecktem
      Talent-Potenzial: ~8'500 MA mit nicht erkanntem Talent.
      Bei einer Befoerderung, die durchschnittlich 5'000 EUR/Jahr
      Mehrwert generiert: ~42.5M EUR/Jahr ungehobenes Potenzial.
      (Grobe Kalkulation fuer Dimension — nicht als Prognose!)

    target_10c: "AWARE (Sichtbarkeit) + WHO (Segmente) + WHEN (Kontext)"

  # -------------------------------------------------------------------
  # OPPORTUNITY 5: Weitere Moeglichkeiten (im Gespraech zu explorieren)
  # -------------------------------------------------------------------
  opp5_weitere:
    name: "Weitere Zusammenarbeitsfelder"
    status: "offen"
    description: |
      Im Gespraech mit Thomas weitere Felder identifizieren,
      in denen FehrAdvice Mehrwert schaffen kann.

    moegliche_felder:
      - name: "Onboarding-Optimierung"
        beschreibung: "Erste 90 Tage verhaltensorientiert gestalten"
        relevanz: "Hoch — Fruehfluktuation ist teuer"

      - name: "Fuehrungskraefte-Entwicklung"
        beschreibung: "Trainings mit Behavioral Insights anreichern"
        relevanz: "Mittel — abhaengig von bestehenden Programmen"

      - name: "Verbindung zu Sauberkeits-Projekt"
        beschreibung: |
