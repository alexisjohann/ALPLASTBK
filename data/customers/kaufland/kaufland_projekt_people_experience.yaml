# =============================================================================
# ABTEILUNGS-KONTEXT: "People Experience" = Personal- & Fuehrungsentwicklung
# =============================================================================
# HYPOTHESE: "People Experience" ist Kauflands interne Bezeichnung fuer die
# Abteilung Personal- und Fuehrungsentwicklung — KEIN neues Transformations-
# projekt. Das Rebranding in "People Experience" folgt dem HR-Trend
# (Personnel Development → People Experience), aendert aber nicht notwendig
# den Funktionsumfang. Im Kick-off zu validieren.
# =============================================================================

department:
  name: "People Experience"
  short: "PX"
  kaufland_bezeichnung: "People Experience"
  traditionelle_bezeichnung: "Personal- und Fuehrungsentwicklung (PE/FE)"
  hypothesis_status: "zu_validieren"  # Im Kick-off bestaetigen

  position_in_org:
    parent: "HR / Personalbereich Kaufland"
    level: "Abteilung (unterhalb HR-Leitung)"
    scope: "Personal- und Fuehrungsentwicklung"
    note: |
      HYPOTHESE: People Experience ist die BESTEHENDE PE/FE-Abteilung
      mit modernem Naming. Kein neues Mandat, sondern bestehender
      Funktionsumfang. Zu klaeren: Hat das Rebranding den Scope
      erweitert (z.B. Employee Journey) oder nur den Namen geaendert?

  typischer_funktionsumfang:
    # AKTUALISIERT nach Gespraech 2026-02-20 (bestaetigt/ergaenzt)
    kernaufgaben_bestaetigt:
      - "Talentmanagement: Identifizieren und Entwickeln (Susanne Karg)"
      - "Eignungsdiagnostik: Diagnostische Verfahren (Joshua Oster, Psychologe)"
      - "Feedback-Prozesse fuer Entwicklung"
      - "Fuehrungskraefteentwicklung (Marktleiter:innen, Abteilungsleiter:innen)"
    kernaufgaben_vermutet:
      - "Aus- und Weiterbildung (Fachtrainings, Onboarding-Programme)"
      - "Nachfolgeplanung (Fuehrungspipeline sicherstellen)"
      - "Lernformate gestalten (Praesenzseminare, E-Learning, Blended)"
    moeglicherweise_erweitert:
      - "Employee Journey Design (Recruiting → Exit)"
      - "Employer Branding (Arbeitgebermarke)"
      - "Employee Engagement / Zufriedenheitsmessung"
      - "Organisationsentwicklung"
    vermutlich_NICHT_im_scope:
      - "Personalverwaltung (Payroll, Vertraege)"
      - "Arbeitsrecht / Betriebsrat"
      - "Recruiting-Operations (Stellenausschreibungen)"
      - "Verguetung / Benefits-Design"

  strategische_einordnung:
    ist_hypothese: |
      Klassische PE/FE-Abteilung mit modernem Namen. Kernkompetenz
      liegt in Trainings-Design und Fuehrungskraefteentwicklung.
      Nicht zu verwechseln mit einem unternehmensweiten
      Transformationsprogramm.
    implikation_fuer_projekt: |
      Unser Projekt arbeitet MIT einer bestehenden Abteilung,
      nicht AN einem neuen Programm. Das bedeutet:
      1. Es gibt bestehende Programme, Strukturen, Budgets
      2. Es gibt bestehende Beziehungen zu Filialen/Fuehrungskraeften
      3. Verhaltensorientierte Ansaetze (EBF) sind ERGAENZUNG, nicht Ersatz
      4. Wir muessen an bestehende Formate andocken, nicht neu erfinden

exploration:
  name: "FehrAdvice x Kaufland People Experience"
  short: "PX"
  status: "exploration"
  phase: "Follow-Up — Drei thematische Working Sessions vorbereiten"

  contacts:
    - name: "Thomas Dammeyer"
      role: "Head of People Experience"
      function: "Abteilungsleitung PE/FE"

    - name: "Susanne Karg"
      role: "Talentmanagement"
      function: |
        Identifizieren und Entwickeln von Talenten.
        Eignungsdiagnostik, Feedback-Prozesse fuer Entwicklung.
      bei_kaufland_seit: "~2008 (18 Jahre)"
      relevanz: |
        ZENTRALE Ansprechpartnerin fuer opp1 (FK-Evaluation),
        opp4 (Hidden Talents) und Eignungsdiagnostik.
        18 Jahre Kaufland-Erfahrung = tiefes Systemwissen.

    - name: "Joshua Oster"
      role: "Eignungsdiagnostik"
      function: "Eignungsdiagnostik (psychologischer Hintergrund)"
      ausbildung: "Psychologe"
      relevanz: |
        Fachlicher Ansprechpartner fuer diagnostische Verfahren,
        Testguete, Validitaet. Versteht Bias/Noise-Thematik
        aus psychologischer Perspektive.

    - name: "Luisa Gerlinde Wolf"
      role: "Consultant People Experience"
      function: "Consultant People Experience"
      bei_kaufland_seit: "2017"

  # ==========================================================================
  # THEMATISCHE ZUORDNUNG (identifiziert im Explorationsgespraech 2026-02-20)
  # ==========================================================================
  # Nach dem Explorationsgespraech wurden drei Kernthemen identifiziert,
  # die jeweils bei einem Teammitglied staerker aufgehangen sind.
  # Naechster Schritt: Je ein Follow-Up mit ca. 2 Working Sessions pro
  # Person, um ein Modell fuer ihr Thema aufzusetzen und erste Ergebnisse
  # zu generieren.
  # ==========================================================================

  thematic_ownership:

    theme_1_skillsystem:
      owner: "Joshua Oster"
      name: "Skillsystem"
      kernfrage: "Welche Skills? Wie messen?"
      beschreibung: |
        Aufbau eines validen, kontextsensitiven Skillsystems fuer Kaufland.
        Welche Skills brauchen Fuehrungskraefte und Mitarbeitende —
        und wie lassen sich diese reliabel und valide messen?
        Joshuas psychologischer Hintergrund (Eignungsdiagnostik) macht
        ihn zum natuerlichen Owner fuer Messbarkeit und Testguete.
      verbindung_opportunities: ["opp2_task_based_value", "opp1_fk_evaluation"]
      verbindung_10c: ["WHAT", "AWARE", "WHO"]
      ebf_modell_ziel: |
        Kontextualisiertes Skill-Modell: KSAO(Ψ) — welche Skills sind
        in WELCHEM Filial-Kontext entscheidend? Task-basierte Ableitung
        statt generischer Kompetenzlisten.
      working_sessions:
        anzahl: 2
        status: "zu_planen"
        ziel: "Modell aufsetzen + erste Ergebnisse"

    theme_2_fuehrungskompetenzmessung:
      owner: "Luisa Gerlinde Wolf"
      name: "Fuehrungskompetenzmessung"
      kernfrage: "Wie Fuehrungskompetenzen messen?"
      beschreibung: |
        Wie lassen sich Fuehrungskompetenzen bei Kaufland systematisch
        und valide messen? Welche KPIs bilden Fuehrungsqualitaet ab —
        jenseits von Umsatz und Produktivitaet? Wie unterscheidet man
        gute Fuehrung von gutem Kontext?
      verbindung_opportunities: ["opp3_leadership_quality", "opp1_fk_evaluation"]
      verbindung_10c: ["WHEN", "HOW", "AWARE"]
      ebf_modell_ziel: |
        Kontextbereinigte FK-KPIs: KPI_bereinigt = KPI_roh / E[KPI|Ψ].
        Verhaltensbasierte Fuehrungs-Indikatoren (Feedback-Frequenz,
        Autonomie-Score, Talent-Weitergabe-Rate). Fruehwarnsystem
        fuer schlechte Fuehrung.
      working_sessions:
        anzahl: 2
        status: "zu_planen"
        ziel: "Modell aufsetzen + erste Ergebnisse"

    theme_3_strategische_komplementaritaeten:
      owner: "Susanne Karg"
      name: "Strategische Komplementaritaeten"
      kernfrage: "Wie lassen sich projekt- und themenubergreifend strategische Potentiale erschliessen?"
      beschreibung: |
        Susannes 18-jaehrige Kaufland-Erfahrung und ihre Rolle im
        Talentmanagement geben ihr eine einzigartige Querschnittsperspektive.
        Kernfrage: Wie lassen sich die verschiedenen Projekte und Themen
        (Sauberkeit, PX, Skillsystem, FK-Messung) so verknuepfen, dass
        strategische Synergien entstehen statt isolierter Initiativen?
        Das dockt direkt an den EBF-Kern an: Komplementaritaet gamma.
      verbindung_opportunities: ["opp4_hidden_talents", "opp1_fk_evaluation"]
      verbindung_10c: ["HOW", "STAGE", "HIERARCHY"]
      ebf_modell_ziel: |
        Komplementaritaetsmodell: gamma-Matrix zwischen Kaufland-Projekten
        und -Themen. Wo verstaerken sich Initiativen gegenseitig (gamma > 0)?
        Wo droht Crowding-Out (gamma < 0)? Strategische Roadmap fuer
        integrierte People-Strategie.
      working_sessions:
        anzahl: 2
        status: "zu_planen"
        ziel: "Modell aufsetzen + erste Ergebnisse"

  description: |
    Explorationsgespraech mit Thomas Dammeyer (Head of People
    Experience / Personal- und Fuehrungsentwicklung) bei Kaufland.
    Ziel: Moegliche Zusammenarbeitsfelder identifizieren, in denen
    FehrAdvice mit verhaltensorientierten Ansaetzen Mehrwert
    schaffen kann.
    Ein konkreter Anknuepfungspunkt: Die Fuehrungskraefte-Evaluation,
    mit der Kaufland MA fuer naechste Karriereschritte identifiziert.

    UPDATE 2026-02-23: Drei Kernthemen identifiziert mit personenbezogener
    Zuordnung. Naechster Schritt: Je ein Follow-Up mit ~2 Working Sessions
    pro Person, um ein EBF-Modell aufzusetzen und erste Ergebnisse zu
    generieren.

  # ==========================================================================
  # KERNFRAGE AUS DEM GESPRAECH (direkt vom Kaufland-Team formuliert)
  # ==========================================================================
  kernfrage_kaufland: |
    "Wie koennen wir unsere Anforderungen messbar machen,
     Evidenz fuer gute Fuehrung [schaffen],
     und welche kausalen Auswirkungen hat dies auf das operative Ergebnis —
     und wie finden wir heraus, ob schlechte Fuehrung stattfindet?"

  ausgangssituation_kaufland: |
    Kaufland arbeitet mit KSAOs (Knowledge, Skills, Abilities, Other
    characteristics) — dem Standardmodell der Arbeits-/Organisationspsychologie
    fuer Anforderungsprofile. Die Frage ist: Wie kommen wir zu QUALITATIVEN
    KSAOs? D.h. nicht nur "welche KSAOs braucht eine Rolle", sondern:
    Welche KSAOs sind WIRKLICH entscheidend, wie messen wir sie VALIDE,
    und wie beruecksichtigen wir den KONTEXT?

  ksao_framework:
    definition: |
      KSAO = Knowledge, Skills, Abilities, Other characteristics
      Standardmodell der I/O-Psychologie fuer Job Analysis und
      Anforderungsprofile. Basis fuer Personalauswahl, Entwicklung,
      Eignungsdiagnostik.
    genealogie:
      beschreibung: |
        KSAO hat keinen einzelnen Erfinder. Das Akronym entstand organisch
        aus der US-Bundesverwaltung (OPM) und wurde von I/O-Psychologen
        formalisiert. Die "O" (Other characteristics) kam erst spaeter dazu —
        urspruenglich hiess es nur KSA.
      gruender:
        - wer: "Edwin A. Fleishman"
          beitrag: "Ability-Taxonomie (52 Abilities systematisiert)"
          jahr: "1960er-1992"
          primaer_referenz:
            bib_key: fleishman1992handbook
            paper_id: PAP-fleishman1992handbook
            titel: "Handbook of Human Abilities"
          sekundaer_referenz:
            bib_key: fleishman1975taxonomy
            paper_id: PAP-fleishman1975taxonomy
            titel: "Toward a Taxonomy of Human Performance"
          bedeutung: |
            Definierte das A in KSAO. 30 Jahre Faktorenanalyse ergaben
            52 messbare Abilities mit verhaltensverankerten Skalen.
            Grundlage fuer O*NET Ability-Anforderungen.
        - wer: "Marvin D. Dunnette"
          beitrag: "Integration in Personalauswahl-Theorie"
          jahr: 1976
          primaer_referenz:
            bib_key: dunnette1976handbook
            paper_id: PAP-dunnette1976handbook
            titel: "Handbook of Industrial and Organizational Psychology"
          bedeutung: |
            Landmark Handbook — definierte das Feld der I/O-Psychologie.
            Integrierte KSA-Framework in systematische Personalauswahl-
            Theorie. Enthielt Grundlagenkapitel zu Job Analysis (McCormick),
            Aptitudes (Dunnette), und Selection (Guion).
        - wer: "Frank J. Landy & James L. Farr"
          beitrag: "KSAO als formales Framework in I/O-Lehrbuch"
          jahr: 1983
          primaer_referenz:
            bib_key: landy1983measurement
            paper_id: PAP-landy1983measurement
            titel: "The Measurement of Work Performance"
          sekundaer_referenz:
            bib_key: landy1985psychology
            paper_id: PAP-landy1985psychology
            titel: "Psychology of Work Behavior"
          bedeutung: |
            Formalisierte KSAO als Vier-Komponenten-Messframework.
            Machte KSAO zum Standard-Akronym in I/O-Ausbildung.
        - wer: "U.S. EEOC / Office of Personnel Management"
          beitrag: "KSAOs als rechtlicher Standard"
          jahr: "1970er-1980er"
          primaer_referenz:
            bib_key: eeoc1978uniform
            paper_id: PAP-eeoc1978uniform
            titel: "Uniform Guidelines on Employee Selection Procedures"
          bedeutung: |
            Rechtliche Grundlage: Jede Personalauswahl muss auf
            nachweisbarer Job Analysis basieren. Machte KSA (spaeter KSAO)
            zum rechtlichen Standard fuer Personalentscheidungen.
      ergaenzend:
        - wer: "Ernest J. McCormick, Paul R. Jeanneret & Robert C. Mecham"
          beitrag: "Position Analysis Questionnaire (PAQ) — erstes standardisiertes KSAO-Instrument"
          jahr: 1972
          primaer_referenz:
            bib_key: mccormick1972paq
            paper_id: PAP-mccormick1972paq
            titel: "Job Characteristics and Dimensions Based on the PAQ"
          bedeutung: |
            194-Item Fragebogen zur standardisierten Job-Analyse.
            Bruecke zu David Autors Task-Typology: PAQ → DOT → O*NET → Autor (2025).
      entwicklungslinie: |
        Fleishman (1960er: Abilities)
          → McCormick (1972: PAQ-Instrument)
            → Dunnette (1976: I/O-Theorie-Integration)
              → EEOC/OPM (1978: Rechtlicher Standard)
                → Landy & Farr (1983: KSAO-Messframework)
                  → O*NET (1998: Nationales Berufssystem)
                    → Autor (2003-2025: Task-basierte Arbeitsmarkttheorie)
                      → EBF: KSAO(Ψ) — kontextualisierte Anforderungsprofile
    komponenten:
      K_knowledge:
        name: "Knowledge (Wissen)"
        beschreibung: "Deklaratives + prozedurales Wissen fuer die Rolle"
        beispiel_marktleitung: "Warenwirtschaft, HACCP, Arbeitsrecht, Budgetierung"
        messbarkeit: "Hoch (Wissenstests, Zertifikate)"
      S_skills:
        name: "Skills (Fertigkeiten)"
        beschreibung: "Erlernbare, beobachtbare Taetigkeiten"
        beispiel_marktleitung: "Personaleinsatzplanung, Gespraechsfuehrung, Reporting"
        messbarkeit: "Mittel-Hoch (Arbeitsproben, Simulationen)"
      A_abilities:
        name: "Abilities (Faehigkeiten)"
        beschreibung: "Stabile kognitive und physische Kapazitaeten"
        beispiel_marktleitung: "Analytisches Denken, Belastbarkeit, Entscheidungsfaehigkeit"
        messbarkeit: "Mittel (psychometrische Tests, Assessments)"
      O_other:
        name: "Other characteristics (Andere Merkmale)"
        beschreibung: "Persoenlichkeit, Motivation, Werte, Integritaet"
        beispiel_marktleitung: "Leistungsmotivation, Serviceorientierung, Integritaet"
        messbarkeit: "Niedrig-Mittel (Persoenlichkeitstests, Interviews)"

    ebf_erweiterung:
      problem_mit_statischen_ksaos: |
        Traditionelle KSAOs sind KONTEXTFREI: "Marktleiter:in braucht
        Durchsetzungsvermoegen" — aber WIE VIEL Durchsetzungsvermoegen
        haengt vom KONTEXT ab. In einer stabilen Filiale mit erfahrenem
        Team ist kooperativer Stil effektiver. In einer Turnaround-
        Situation ist Durchsetzung kritisch.
      loesung_kontextualisierte_ksaos: |
        KSAO(Ψ) statt KSAO: Anforderungsprofile als Funktion des Kontexts.
        θ_KSAO = f(Ψ, 10C) — dieselbe Rolle erfordert unterschiedliche
        KSAO-Gewichtungen je nach Filial-Kontext.
      drei_ebenen:
        ebene_1_identifikation:
          frage: "Welche KSAOs braucht eine Rolle?"
          methode: "Task-basierte Job Analysis (→ opp2)"
          kaufland_kompetenz: "Vorhanden (Susanne, Joshua)"
        ebene_2_messung:
          frage: "Wie messen wir KSAOs valide?"
          methode: "Eignungsdiagnostik, Assessments, strukturierte Interviews"
          kaufland_kompetenz: "Vorhanden (Joshua = Psychologe, Eignungsdiagnostik)"
        ebene_3_kontextualisierung:
          frage: "Welche KSAOs sind in WELCHEM Kontext entscheidend?"
          methode: "EBF Psi-Dimensionen, kontextbereinigte Gewichtung"
          kaufland_kompetenz: "FEHLT — das ist der FehrAdvice-USP"

  skill_taxonomy_validierung:
    kernproblem: |
      Wie validiert man eine Skill-Taxonomie fuer ZUKUENFTIGE Anforderungen?
      Paradox: Traditionelle Validierung erfordert Outcomes — aber die
      Outcomes zukuenftiger Skills existieren noch nicht.
    drei_strategien:
      s1_rueckwaerts_content_validity:
        name: "RUECKWAERTS: Von Tasks zu Skills (Content Validity)"
        prinzip: |
          Nicht fragen "Welche Skills brauchen wir?" (zu abstrakt),
          sondern "Welche AUFGABEN kommen auf uns zu?" (konkret).
          Skills werden aus zukuenftigen Tasks ABGELEITET, nicht
          als Wunschliste definiert. = opp2 (Task-basierte Wertanalyse).
        beispiel: |
          "Filiale mit AI-Tools steuern" → Digital Fluency + Urteilskraft
          "Diverse Teams fuehren" → Kulturelle Intelligenz
          "Schnelle Sortimentsanpassung" → Datengetriebene Entscheidung
        kaufland_bezug: "Direkt umsetzbar via opp2"
      s2_vorwaerts_criterion_validity:
        name: "VORWAERTS: Empirische Validierung im Feld (Criterion Validity)"
        prinzip: |
          Phase 1: Taxonomie entwickeln + FK bewerten
          Phase 2: 12-18 Monate warten + Outcomes messen
          Phase 3: Score vs. Outcome korrelieren → kalibrieren
        kaufland_vorteil: "~1500 Maerkte = riesige Stichprobe"
        timeline: "12-18 Monate fuer Criterion Validity"
      s3_seitwaerts_kontextuell:
        name: "SEITWAERTS: Kontextuelle Differenzierung (EBF-USP)"
        prinzip: |
          Nicht "Digital Fluency ist wichtig" (generisch), sondern
          "Digital Fluency hat in DIESEM Kontext DIESES Gewicht."
          Kontextuelle Gewichtung macht generische Taxonomie spezifisch.
        beispiel_gewichtung:
          grossstadt_junges_team: 0.85
          laendlich_erfahrenes_team: 0.45
          click_and_collect_filiale: 0.95
          klassischer_verbrauchermarkt: 0.55
    fuenf_aussagekraft_kriterien:
      k1_differenzierung:
        frage: "Unterscheidet die Taxonomie zwischen gut und sehr gut?"
        test: "Varianz in Bewertungen > 0?"
      k2_verhaltensnaehe:
        frage: "Sind Skills beobachtbar oder nur Buzzwords?"
        test: "Kann man ein konkretes Beispiel-Verhalten nennen?"
      k3_kontextsensitivitaet:
        frage: "Aendert sich die Gewichtung je nach Filial-Typ?"
        test: "Gleiche Skills, andere Prioritaeten je Kontext?"
      k4_praediktive_kraft:
        frage: "Sagen die Skills Performance vorher?"
        test: "Korrelation mit Filial-KPIs nach 12 Monaten"
      k5_zukunftsrobustheit:
        frage: "Bleiben die Skills relevant bei Marktveraenderung?"
        test: "Szenario-Test: Was wenn AI/Discount/Online?"
    empfehlung: |
      "Aussagekraeftig" heisst NICHT "vollstaendig".
      Es heisst: Die Skills, die drin sind, DIFFERENZIEREN tatsaechlich
      zwischen erfolgreichen und weniger erfolgreichen FK — im jeweiligen
      Kontext. Lieber 8 valide Skills als 25 generische.
    phasen_kaufland:
      phase_1_jetzt: "Task-Analyse → Skills ableiten (Content Validity) + Joshua prueft Messbarkeit + EBF kontextualisiert"
      phase_2_pilot: "50-100 Filialen, FK bewerten + KPIs tracken"
      phase_3_12_monate: "Criterion Validity, Taxonomie kalibrieren, Skills ohne Vorhersagekraft entfernen"

  autor_task_based_framework:
    quelle: "Autor, Levy & Murnane (2003) AER + Autor (2025) Schumpeter Lecture"
    ebf_integration: "35 Papers, davon 2 auf Level 4-5. Theories: MS-LM-002, MS-LM-005"
    kernkritik_an_ksao: |
      David Autor argumentiert, dass SKILLS die falsche Analyseeinheit sind.
      Die richtige Einheit sind TASKS — konkrete Taetigkeiten. Skills werden
      aus Tasks ABGELEITET, nicht umgekehrt. "Welche Tasks werden
      automatisiert?" ist die bessere Frage als "Welche Skills brauchen wir?"
    task_taxonomie:
      routine_kognitiv:
        beispiele: "Dateneingabe, Buchfuehrung, Bestellabwicklung"
        prognose: "AUTOMATISIERBAR"
      routine_manuell:
        beispiele: "Regalauffuellung, Kassieren, Sortierung"
        prognose: "TEILWEISE automatisierbar"
      non_routine_analytisch:
        beispiele: "Problemloesung, Urteilskraft, Entscheidung"
        prognose: "KOMPLEMENTAER mit Technologie — wird WERTVOLLER"
      non_routine_interpersonell:
        beispiele: "Fuehrung, Verhandlung, Motivation, Konfliktloesung"
        prognose: "KOMPLEMENTAER — Kernaufgabe von Fuehrung"
      non_routine_manuell:
        beispiele: "Handwerk, Service, Kundenkontakt vor Ort"
        prognose: "SCHWER automatisierbar — bleibt menschlich"
    expertise_effekt_2025:
      insight: |
        Schumpeter Lecture 2025: DIESELBE Technologie erzeugt
        GEGENSAETZLICHE Expertise-Effekte je nach Berufskontext.
        Professional → MEHR Expertise (Routine weg = Rest komplexer)
        Clerical → WENIGER Expertise (komplexe Tasks auch weg)
      kaufland_implikation: |
        Marktleitung = Professional im Retail: Automatisierung der
        Routine-Tasks ERHOEHT den Expertise-Bedarf im Non-Routine-Bereich.
        FK muessen BESSERE Fuehrungskraefte werden, nicht technischere.
    konsequenz_fuer_kaufland:
      schritt_1: "Tasks der Marktleitung auflisten (nicht Skills!)"
      schritt_2: "Klassifizieren: Routine vs. Non-Routine"
      schritt_3: "Prognose: Welche Tasks in 3-5 Jahren automatisiert"
      schritt_4: "VERBLEIBENDE Tasks → daraus Skills ableiten"
      schritt_5: "KONTEXTUALISIEREN (Filialtyp, Region, Teamstruktur)"
      verbindung_zu_opp2: "= opp2 (Task-basierte Wertanalyse), Autor-fundiert"

  kernfrage_analyse:
    teilfrage_1_messbarkeit:
      frage: "Wie koennen wir unsere Anforderungen messbar machen?"
      ebf_antwort: |
        Task-basierte Operationalisierung (opp2): Anforderungen nicht als
        vage Kompetenzen ("kommunikativ"), sondern als beobachtbare Tasks
        mit Dreifach-Wert formulieren. Tasks sind messbar, Kompetenzen nicht.
      target_opp: "opp2_task_based_value"
      target_10c: "WHAT (Was genau ist messbar?)"

    teilfrage_2_evidenz_gute_fuehrung:
      frage: "Evidenz fuer gute Fuehrung?"
      ebf_antwort: |
        Kontextbereinigte KPIs (opp3): Gute Fuehrung zeigt sich in
        ueberdurchschnittlicher Performance RELATIV zum Filial-Kontext.
        Plus: verhaltensbasierte Fuehrungs-KPIs (Feedback-Frequenz,
        Entwicklungsgespraeche, Talent-Weitergabe-Rate).
      target_opp: "opp3_leadership_quality"
      target_10c: "WHEN (Kontext bereinigen) + HOW (messen)"

    teilfrage_3_kausale_auswirkung:
      frage: "Welche kausalen Auswirkungen auf das operative Ergebnis?"
      ebf_antwort: |
        DAS ist die wissenschaftlich anspruchsvollste Frage. Kausalitaet
        erfordert mehr als Korrelation. Ansaetze:
        1. Natuerliche Experimente: FK-Wechsel als Quasi-Experiment
           (neue FK in bestehender Filiale → Delta vorher/nachher)
        2. Instrumentalvariablen: Exogene Variation nutzen
           (z.B. Pensionierung → zufaellige FK-Zuweisung)
        3. Difference-in-Differences: FK-Entwicklungsprogramm als
           Treatment → Vergleich Treatment vs. Control-Filialen
      target_opp: "opp3_leadership_quality + neues Kausalitaets-Design"
      target_10c: "HOW (kausale Identifikation)"
      evidenz_methodik:
        - "angrist2009mostly"  # Angrist/Pischke: Mostly Harmless Econometrics
        - "fehr1999theory"     # Fehr/Schmidt: Inequity Aversion (Experimental Design)

    teilfrage_4_schlechte_fuehrung:
      frage: "Wie finden wir heraus, ob schlechte Fuehrung stattfindet?"
      ebf_antwort: |
        Fruehwarnsystem mit Verhaltenssignalen:
        1. Kontextbereinigte Ausreisser: Filiale performt signifikant
           UNTER dem erwarteten Wert fuer ihren Kontext → Fuehrungs-Flag
        2. Verhaltens-Indikatoren: Sinkende Feedback-Frequenz,
           steigende Fluktuation relativ zum Cluster, sinkende
           MA-Zufriedenheits-Deltas
        3. Peer-Signale: Abnehmende Nennungen im Expertise-Netzwerk
        4. Pattern-Matching: Bekannte Muster schlechter Fuehrung
           aus Literatur (z.B. Micromanagement → Autonomie-Score sinkt)
      target_opp: "opp3_leadership_quality + opp4_hidden_talents (inverse)"
      target_10c: "AWARE (Fruehwarnung) + WHEN (Kontext-Bereinigung)"

  ebf_mapping:
    primary_10c:
      - "WHO"       # MA-Segmente, Fuehrungskraefte, Bewerber:innen
      - "WHAT"      # Arbeitgeber-Attraktivitaet, Identitaet, Zufriedenheit
      - "STAGE"     # Employee Journey Phasen
      - "AWARE"     # Feedback-Kultur, Sichtbarkeit von Angeboten
      - "READY"     # Wechselbereitschaft, Engagement
    primary_psi:
      - "kappa_INST"    # Tarifvertrag, Arbeitsrecht, Betriebsrat
      - "kappa_SOCIAL"  # Team-Kohaesion, Fuehrungskultur
      - "kappa_COG"     # Arbeitsbelastung, Stress
      - "kappa_ECON"    # Lohnniveau, Benefits, Karriereperspektive

