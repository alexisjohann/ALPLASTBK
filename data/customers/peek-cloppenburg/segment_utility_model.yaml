      implication: "P&C sollte generell von transaktionalem zu relationalem CRM wechseln"
    - pattern: "Financial ist NIE dominant — maximal 22% (Smart Value)"
      implication: "Rabatte sind kein primaerer Bindungshebel, bei keinem Segment"
