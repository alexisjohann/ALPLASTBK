      implication: "Store-Events lohnen sich primaer fuer das groesste Loyalitaets-Segment"
    - pattern: "Status (Transactional) ist bei 3 Segmenten negativ"
      implication: "Punkte-Kommunikation schadet mehr als sie nuetzt"

# ===========================================================================
# 5. STRATEGISCHE GESAMTBEWERTUNG
# ===========================================================================

strategic_synthesis:
  headline: "Von Transactional CRM zu Relational CRM — empirisch begruendet"

  core_finding: |
    Das NL-Experiment zeigt ein konsistentes Bild: P&C-Kund:innen wollen
    BEZIEHUNG, nicht TRANSAKTION. In 4 von 5 Segmenten ist Social oder
    Identity die dominante Nutzendimension. Financial ist nirgends dominant.
    Status (Transactional) ist bei 3 Segmenten aktiv schaedlich.

    Das aktuelle CRM-Modell (transaktional, punkte-basiert, sale-getrieben)
    spricht die FALSCHE Nutzendimension an — bei den meisten Kund:innen.

  three_strategic_moves:
    - move: "STOP: Transactional-Default abschalten"
      segments_affected: ["Core Loyalists (24%)", "Smart Premium (11%)", "Clearance Hunters (29%)"]
      total_share: 0.64
      rationale: |
        64% der Kund:innen reagieren negativ oder neutral auf Transactional.
        Punkte-Reminder und Status-Updates sollten aus dem Standard-NL
        entfernt und nur on-demand (App, Website) verfuegbar sein.
      cost: "Null (weniger senden kostet nichts)"
      expected_impact: "Open Rate +5-10pp durch Vermeidung negativer Effekte"

    - move: "START: Segment-spezifische NL-Tracks"
      implementation: |
        5 separate NL-Tracks statt one-size-fits-all:
        1. Core Loyalists    → Retail-NL (woechentlich, lokal)
        2. Premium Loyalists → Control+ (2x/Monat, kuratiert, subtil)
        3. Smart Value       → Relational-NL (woechentlich, persoenlich)
        4. Smart Premium     → Inspirational-NL (2x/Monat, editorisch)
        5. Clearance Hunters → Relational-NL (woechentlich, anerkennend)
      cost: "Mittel (Content-Erstellung, Segmentierung in ESP)"
      expected_impact: "Gewichteter Ø-Uplift: +14.3pp (vs. Control-Baseline)"

    - move: "PROTECT: Crowding-Out-Firewall"
      rule: |
        NIEMALS Social + Financial in einem Touchpoint kombinieren.
        gamma(social, financial) = -0.68 — das staerkste Crowding-Out
        im EBF-Parameterraum. Gilt besonders fuer:
        - Clearance Hunters (w_social=0.63, w_financial=0.16)
        - Smart Value (w_social=0.33, w_financial=0.22)
      implementation: |
        CRM-System-Regel: Wenn ein NL Relational-Frame hat,
        darf er KEINEN Rabatt-Code/Sale-Link enthalten.
        Wenn ein NL Sale-Content hat, darf er KEINE
        Beziehungssprache verwenden.
      cost: "Gering (Prozessregel im CRM-Tool)"
      expected_impact: "Vermeidung von -5 bis -15pp Crowding-Out-Verlust"

  prioritized_actions:
    - priority: 1
      action: "Transactional-NL fuer Core Loyalists + Clearance Hunters stoppen"
      effort: "Gering"
      impact: "Hoch (53% der Kunden betroffen)"
      timing: "Sofort"

    - priority: 2
      action: "Relational-NL-Track fuer Clearance Hunters aufsetzen"
      effort: "Mittel"
      impact: "Sehr hoch (+20pp bei 29% der Kunden)"
      timing: "Maerz 2026 (mit H1-Test)"

    - priority: 3
      action: "Inspirational-NL-Track fuer Smart Premium aufsetzen"
      effort: "Mittel-Hoch (Content-Produktion)"
      impact: "Hoch (+14.2pp, hoechster AOV)"
      timing: "Maerz 2026 (mit H2-Test)"

    - priority: 4
      action: "Store-Event-Programm fuer Core Loyalists pilotieren"
      effort: "Hoch (Filial-Koordination)"
      impact: "Hoch (+16.7pp, 24% der Kunden)"
      timing: "April 2026 (mit H4-Test)"

    - priority: 5
      action: "Non-Monetary Reciprocity fuer Smart Value testen"
      effort: "Mittel"
      impact: "Mittel-Hoch (H3)"
      timing: "Maerz 2026 (mit H3-Test)"

    - priority: 6
      action: "Early Access fuer Premium Loyalists einrichten"
      effort: "Gering-Mittel"
      impact: "Mittel (+10pp, 11%)"
      timing: "April 2026 (mit H5-Test)"
