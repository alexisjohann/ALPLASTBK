# ===========================================================================
# PEEK & CLOPPENBURG — META-NUTZENSTRUKTUR
# ===========================================================================
#
# Zweck:    Verdichtet die 5 retail-spezifischen Nutzendimensionen auf
#           3 Meta-Kategorien: Individuell, Kollektiv, Identitaer.
#           Verbindet diese mit der EBF-Kerntheorie (Appendix C: WHAT)
#           und deckt das strategische Komplementaritaets-Dreieck auf.
#
# Theorie:  Die Dreiteilung folgt der EBF-Dekomposition:
#           U_F (Financial, homo oeconomicus)  → Individueller Nutzen
#           U_S (Social, homo socialis)         → Kollektiver Nutzen
#           U_IDN (Identity, homo identitatis)  → Identitaerer Nutzen
#
# Quellen:  - segment_utility_model.yaml (5D Nutzengewichte)
#           - data/parameter-registry.yaml (PAR-COMP-001 bis -008)
#           - appendices/UNMAPPED_C_CORE-WHAT.tex (FEPSDE-Theorie)
#           - MS-IB-001: Akerlof & Kranton (2000) — Identity Economics
#           - MS-SP-001: Fehr & Schmidt (1999) — Social Preferences
#
# Erstellt: 2026-02-27
# Version:  1.0
# ===========================================================================

metadata:
  customer: "Peek & Cloppenburg"
  model_id: "MOD-PC-METAUTIL-001"
  model_name: "P&C Meta-Utility Structure (3D)"
  created: "2026-02-27"
  version: "1.0"
  parent_model: "MOD-PC-SEGUTIL-001"
  ebf_framework: "10C WHAT + Complementarity Triangle"
  theoretical_grounding:
    - "MS-IB-001: Identity Economics (Akerlof & Kranton 2000)"
    - "MS-SP-001: Inequity Aversion (Fehr & Schmidt 1999)"
    - "MS-IB-008: Social Identity (Tajfel & Turner 1979)"
    - "MS-SP-004: Warm Glow (Andreoni 1990)"
    - "PAR-COMP-001 bis PAR-COMP-008 (Tier 1, validiert 2026-02-22)"

# ===========================================================================
# 1. DIE DREI META-NUTZENKATEGORIEN
# ===========================================================================
#
# Die 5 retail-spezifischen Dimensionen verdichten sich auf 3 Ebenen:
#
#   INDIVIDUELL (U_ind)  = u_financial + u_status
#   KOLLEKTIV  (U_kol)   = u_social + u_experience
#   IDENTITAER (U_id)    = u_identity
#
# Diese Aggregation ist nicht willkuerlich — sie folgt der EBF-Dekomposition
# in Appendix C (CORE-WHAT), wo Nutzen zerlegt wird in:
#   U_F  (Financial)     → was ICH materiell bekomme
#   U_S  (Social)        → was ICH durch ANDERE erfahre
#   U_IDN (Identity)     → wer ICH BIN
#
# ===========================================================================

meta_categories:

  - id: "U_ind"
    name: "Individueller Nutzen"
    symbol: "U^{ind}"
    label_de: "Was bekomme ICH?"
    label_en: "What do I GET?"
    homo_type: "Homo Oeconomicus"
    color: "#549EDE"  # FA Hellblau
    components:
      - dimension: "u_financial"
        symbol: "U^F"
        role: "Materieller Gewinn (Rabatte, Preis-Leistung, Sparanreize)"
      - dimension: "u_status"
        symbol: "U^{Sta}"
        role: "Transaktionale Anerkennung (Punkte, Tier, Kaufhistorie)"
    ebf_mapping:
      fepsde: "F (Financial)"
      theory: "MS-SP-001 (Fehr & Schmidt) — im Spezialfall alpha=0, beta=0"
      appendix: "C (CORE-WHAT), §2.1 Financial Dimension"
    crm_paradigm: "Transactional CRM (Punkte, Rabatte, Status-Tier)"
    mechanism: |
      Der individuell Nutzen folgt der klassischen oekonomischen Logik:
      rationale Nutzenkalkulation, Preis-Leistung, materieller Gegenwert.
      Im CRM typischerweise ueber Punkte-Programme, Rabatte und Status-
      Levels adressiert. Entspricht dem Modell des Homo Oeconomicus.

  - id: "U_kol"
    name: "Kollektiver Nutzen"
    symbol: "U^{kol}"
    label_de: "Wo gehoere ICH hin?"
    label_en: "Where do I BELONG?"
    homo_type: "Homo Socialis"
    color: "#7EBdAC"  # FA Mint
    components:
      - dimension: "u_social"
        symbol: "U^S"
        role: "Beziehung, Wertschaetzung, Reziprozitaet, Zugehoerigkeit"
      - dimension: "u_experience"
        symbol: "U^{Exp}"
        role: "Gemeinsames Erleben, Community-Events, 'dritter Ort'"
    ebf_mapping:
      fepsde: "S (Social) + P (Physical, Community-Aspekt)"
      theory: "MS-SP-001 (Fehr & Schmidt), MS-IB-008 (Tajfel & Turner)"
      appendix: "C (CORE-WHAT), §2.4 Social Dimension"
    crm_paradigm: "Relational CRM (Beziehung, Community, Erlebnis)"
    mechanism: |
      Kollektiver Nutzen entsteht durch Zugehoerigkeit, Anerkennung und
      geteilte Erlebnisse. Kund:innen sind keine isolierten Individuen —
      sie suchen Beziehung, Gemeinschaft und das Gefuehl, als Person
      (nicht als Datenpunkt) wahrgenommen zu werden. Der Laden wird zum
      'dritten Ort' (neben Zuhause und Arbeit). Entspricht dem Homo Socialis.

  - id: "U_id"
    name: "Identitaerer Nutzen"
    symbol: "U^{id}"
    label_de: "Wer BIN ich?"
    label_en: "Who AM I?"
    homo_type: "Homo Identitatis"
    color: "#A1A0C6"  # FA Lilac
    components:
      - dimension: "u_identity"
        symbol: "U^{ID}"
        role: "Selbstkonzept, Aspiration, Kuration, 'Wer bin ich als Kaeufer:in?'"
    ebf_mapping:
      fepsde: "E (Emotional, Aspiration) + P (Psychological, Identitaet)"
      theory: "MS-IB-001 (Akerlof & Kranton 2000)"
      appendix: "C (CORE-WHAT), §2.3 + §2.5 Identity Extensions"
      formal_restriction: "U_IDN > 0 wenn psi_category salient"
    crm_paradigm: "Identity CRM (Kuration, Aspiration, Selbstbild-Spiegel)"
    mechanism: |
      Identitaerer Nutzen entsteht, wenn eine Marke das Selbstbild der
      Kund:innen spiegelt und bestaetigt. Es geht nicht darum, was man
      BEKOMMT (individuell) oder zu wem man GEHOERT (kollektiv), sondern
      wer man IST. Akerlof & Kranton (2000) zeigen: Identitaet ist keine
      externe Variable — sie generiert eigenstaendigen Nutzen (U_IDN > 0).
      Kuration, Lifestyle-Content und Aspiration aktivieren diese Dimension.
      Entspricht dem Homo Identitatis.

# ===========================================================================
# 2. DAS KOMPLEMENTARITAETS-DREIECK
# ===========================================================================
#
#            U_id (Identitaer)
#            /\
#    +0.35  /  \  -0.45
#          /    \
#   U_kol /______\ U_ind
#  (Koll.)  -0.68  (Indiv.)
#
# EINE Synergie-Achse: Identitaer ↔ Kollektiv (+0.35)
# ZWEI Crowding-Out-Achsen:
#   - Kollektiv ↔ Individuell (-0.68)
#   - Identitaer ↔ Individuell (-0.45)
#
# META-EINSICHT:
# Individueller Nutzen ist der STOERFAKTOR. Er unterlauft BEIDE anderen
# Nutzenkategorien. Das ist die formale Begruendung dafuer, warum
# transaktionales CRM (individuell) bei P&C scheitert.
#
# ===========================================================================

complementarity_triangle:
  description: |
    Das Komplementaritaets-Dreieck zeigt die Interaktion der drei
    Meta-Nutzenkategorien. Es offenbart eine fundamentale Asymmetrie:
    Die einzige Synergie besteht zwischen identitaerem und kollektivem
    Nutzen. Individueller Nutzen unterlauft BEIDE anderen Kategorien.

  edges:
    # --- SYNERGIE-ACHSE ---
    - pair: ["U_id", "U_kol"]
      label: "Identitaet × Gemeinschaft"
      gamma_meta: +0.35
      gamma_source: "PAR-COMP-001"
      tier: 1
      type: "synergy"
      interpretation: |
        Wenn Kund:innen ihre Identitaet ('Wer bin ich?') in einer Gemein-
        schaft bestaetigt sehen ('Du gehoerst zu uns'), verstaerken sich
        beide Nutzendimensionen. Die soziale Bestaetigung des Selbstbilds
        erzeugt einen Flywheel-Effekt:
        Identitaet → Teilen → Feedback → Bestaetigung → staerkere Identitaet
      pc_example: |
        Smart Premium teilt Inspirational Content (U_id) in sozialer Umgebung
        (U_kol). Das soziale Feedback bestaetigt das Stil-Selbstbild.
        Bonus: +0.35 × 0.56 × 0.44 = +0.086 (+8.6% Zusatznutzen)

    # --- CROWDING-OUT-ACHSEN ---
    - pair: ["U_kol", "U_ind"]
      label: "Gemeinschaft × Eigennutz"
      gamma_meta: -0.68
      gamma_source: "PAR-COMP-002"
      tier: 1
      type: "crowding_out"
      interpretation: |
        DAS STAERKSTE CROWDING-OUT IM EBF.
        Wenn eine Beziehung (kollektiv) durch Geld 'bezahlt' wird
        (individuell), verliert sie ihren sozialen Wert. Der Mechanismus:
        Monetaere Kompensation signalisiert, dass die Beziehung einen
        Preis hat — und damit verhandelbar, austauschbar, unecht ist.
        128-Studien Meta-Analyse bestaetigt phi = 0.65.
      pc_example: |
        'Danke fuer deine Treue — hier ist ein 10%-Gutschein.'
        Das Danke (U_kol) wird durch den Gutschein (U_ind) entwertet.
        Der Gutschein signalisiert: 'Deine Treue hat einen Preis von 10%.'
        Besonders toxisch bei Clearance Hunters (U_kol = 0.72).

    - pair: ["U_id", "U_ind"]
      label: "Identitaet × Eigennutz"
      gamma_meta: -0.45
      gamma_source: "GAMMA-PC-FINANCIAL-IDENTITY"
      tier: 2
      type: "crowding_out"
      interpretation: |
        Rabatte signalisieren das Gegenteil von Aspiration.
        Wenn ein identitaer aufgeladenes Erlebnis (Kuration, Exklusivitaet)
        mit einem monetaeren Anreiz kombiniert wird, verwandelt sich
        Kuration in Kommerz und Exklusivitaet in Abverkauf.
      pc_example: |
        Ein Inspirational-NL zeigt kuratierte Fruehlings-Looks (U_id).
        Am Ende: 'Mit Code SPRING20 sparst du 20%' (U_ind).
        Der Rabatt-Code entwertet die Kuration: 'Es geht doch nur ums
        Verkaufen.' Besonders toxisch bei Smart Premium (U_id = 0.56).

  meta_insight: |
    INDIVIDUELLER NUTZEN IST DER STOERFAKTOR.

    Er unterlauft kollektiven Nutzen (gamma = -0.68) UND identitaeren
    Nutzen (gamma = -0.45). Die einzige synergetische Verbindung ist
    Identitaet × Gemeinschaft (gamma = +0.35).

    Das bedeutet: Transaktionales CRM (Punkte, Rabatte, Status) ist
    nicht einfach 'weniger effektiv' als relationales oder identitaeres
    CRM — es ZERSTOERT AKTIV die beiden wirksameren Nutzendimensionen.

    Die strategische Implikation ist fundamental:
    P&C sollte nicht 'mehr relational' und 'weniger transaktional' werden.
    P&C sollte transaktionale Elemente ISOLIEREN — weil sie die beiden
    wertvolleren Dimensionen kontaminieren, sobald sie im selben
    Kommunikationsraum auftreten.

  strategic_zones:
    - zone: "Synergie-Zone (U_id × U_kol)"
      gamma: "+0.35"
      segments: ["Smart Premium", "Premium Loyalists"]
      strategy: "Kuration × Community = Flywheel"
      examples:
        - "Inspirational Content, der geteilt und sozial bestaetigt wird"
        - "Exklusive Community-Events, die Identitaet bestaetigen"
        - "Personal Styling mit sozialem Feedback-Moment"

    - zone: "Crowding-Out-Zone 1 (U_kol × U_ind)"
      gamma: "-0.68"
      segments: ["Clearance Hunters", "Smart Value Seekers"]
      risk: "'Danke + Gutschein' zerstoert sozialen Wert"
      strategy: "ENTKOPPELN: Beziehung und Geld nie im selben Touchpoint"
      examples:
        - "Woche 1: Relational-NL (rein sozial). Woche 2: Value-Angebot (rein finanziell)"
        - "Nicht-monetaere Reziprozitaet: Kaffee, Blume, Raffle statt Gutschein"
        - "CRM-Firewall: NL mit Beziehungsframe darf keinen Rabatt-Code enthalten"

    - zone: "Crowding-Out-Zone 2 (U_id × U_ind)"
      gamma: "-0.45"
      segments: ["Smart Premium"]
      risk: "Rabatt in Inspirational-Content entwertet Kuration"
      strategy: "SEPARIEREN: Sale-Content NIE an identitaer getriebene Segmente"
      examples:
        - "Sale-NL nur an Smart Value und Clearance Hunters (separater Track)"
        - "Inspirational-NL fuer Smart Premium rabattfrei halten"
        - "Wenn Preisvorteil: als 'Early Access' framen, nicht als Rabatt"

# ===========================================================================
# 3. META-NUTZENPROFILE PRO SEGMENT
# ===========================================================================
#
# Aggregation der 5D-Gewichte auf die 3 Meta-Kategorien.
# Formel:
#   U_ind = w_financial + w_status
#   U_kol = w_social + w_experience
#   U_id  = w_identity
#
# ===========================================================================

segment_meta_profiles:

  - id: "SEG-PC-001"
    name: "Core Loyalists"
    share: 0.24

    meta_weights:
      U_ind: -0.23  # u_financial(0.07) + u_status(-0.30)
      U_kol: +0.78  # u_social(0.18) + u_experience(0.60)
      U_id:  +0.14  # u_identity(0.14)

    dominant: "KOLLEKTIV"
    homo_type: "Homo Socialis"
    ratio_kol_to_ind: "∞"  # U_ind negativ → Verhaeltnis nicht definiert

    narrative: |
      Core Loyalists leben fast ausschliesslich im KOLLEKTIVEN Nutzenraum.
      78% ihres Nutzens entstehen durch Zugehoerigkeit und Erleben — der
      Laden als Gemeinschaft, als 'dritter Ort'. Individueller Nutzen ist
      nicht einfach irrelevant — er ist NEGATIV. Jede transaktionale
      Kommunikation (Punkte, Status) unterlauft die Beziehung.

      Das Segment verhaelt sich wie ein VEREINSMITGLIED: Es kommt nicht
      wegen der Vorteile, sondern wegen der Zugehoerigkeit. Mitglieds-
      beitraege (Kaufakte) sind der Preis fuer Zugehoerigkeit, nicht
      der Grund dafuer.

    crm_implication: |
      REINES RELATIONAL CRM.
      Kein Punkte-Reminder, kein Status-Update, keine Sale-Kommunikation.
      Stattdessen: Store-Events, rhythmische lokale NL, persoenliche
      Begruessung in der Filiale. Der CRM-Kanal sollte sich wie ein
      Vereinsbrief anfuehlen, nicht wie ein Werbeprospekt.

    crowding_out_risk:
      primary: "U_kol × U_ind (gamma = -0.68)"
      risk_level: "HOCH"
      reason: |
        Individueller Nutzen ist NEGATIV (-0.23). Jede transaktionale
        Aktivierung verstaerkt den negativen Effekt. Das Punkte-System
        existiert fuer dieses Segment nicht als Nutzen, sondern als Stoerung.

    synergy_opportunity:
      primary: "U_kol × U_id (gamma = +0.35)"
      opportunity_level: "MITTEL"
      reason: |
        Identitaeter Nutzen ist niedrig (0.14), aber vorhanden. Community-
        Events, die auch die P&C-Identitaet ansprechen ('Dein Laden'),
        koennen dieses Potenzial heben.
        Bonus: +0.35 × 0.78 × 0.14 = +0.038 (+3.8%)

  - id: "SEG-PC-002"
    name: "Premium Loyalists"
    share: 0.11

    meta_weights:
      U_ind: +0.16  # u_financial(0.04) + u_status(0.12)
      U_kol: +0.50  # u_social(0.27) + u_experience(0.23)
      U_id:  +0.35  # u_identity(0.35)

    dominant: "KOLLEKTIV (knapp)"
    homo_type: "Hybrid: Socialis-Identitatis"
    ratio_kol_to_ind: 3.1  # 0.50 / 0.16

    narrative: |
      Premium Loyalists sind das AUSGEWOGENSTE Segment — alle drei Meta-
      Kategorien sind positiv, keine ist toxisch. Aber die Hierarchie ist
      klar: Kollektiv (50%) > Identitaer (35%) > Individuell (16%).

      Dieses Segment ist ein HYBRID zwischen Homo Socialis und Homo
      Identitatis. Es schaetzt Beziehung UND Identitaetsbestaetigung —
      und die Synergie zwischen beiden (gamma = +0.35) ist der staerkste
      Hebel: +0.35 × 0.50 × 0.35 = +0.061 (+6.1%).

      Individueller Nutzen existiert (16%), ist aber KEIN Hebel. Er schadet
      nicht aktiv, aber Ressourcen, die in transaktionale Kommunikation
      fliessen, waeren in den anderen Dimensionen besser investiert.

    crm_implication: |
      IDENTITY-RELATIONAL CRM.
      Exklusivitaet (U_id) in sozialem Rahmen (U_kol): Private Shopping,
      Early Access, kuratierte Events. Die Kommunikation sollte dezent,
      kuratiert und qualitaetsvoll sein — weniger ist mehr.

    crowding_out_risk:
      primary: "U_id × U_ind (gamma = -0.45) — latent"
      risk_level: "NIEDRIG-MITTEL"
      reason: |
        Individueller Nutzen ist positiv aber klein (0.16). Solange
        Sale-Kommunikation nicht mit Inspirational-Content vermischt wird,
        ist das Risiko kontrollierbar. Aber: Ueberkommunikation (zu viele
        NL, zu laute Botschaften) wird als Qualitaetsverlust interpretiert.

    synergy_opportunity:
      primary: "U_id × U_kol (gamma = +0.35)"
      opportunity_level: "HOCH"
      reason: |
        Beide Dimensionen sind stark (0.35 + 0.50). Die Synergie ist
        der wirksamste Hebel: Exklusivitaet, die sozial erlebt wird.
        '48h Early Access — fuer Mitglieder, vor allen anderen.'
        Bonus: +0.35 × 0.50 × 0.35 = +0.061 (+6.1%)

  - id: "SEG-PC-003"
    name: "Smart Value Seekers"
    share: 0.20

    meta_weights:
      U_ind: +0.33  # u_financial(0.22) + u_status(0.11)
      U_kol: +0.52  # u_social(0.33) + u_experience(0.19)
      U_id:  +0.14  # u_identity(0.14)

    dominant: "KOLLEKTIV (knapp vor Individuell)"
    homo_type: "Hybrid: Socialis-Oeconomicus (SPANNUNGSFELD)"
    ratio_kol_to_ind: 1.6  # 0.52 / 0.33

    narrative: |
      Smart Value Seekers sind das SPANNUNGSREICHSTE Segment. Kollektiv (52%)
      und Individuell (33%) koexistieren auf hohem Niveau — und genau diese
      Koexistenz aktiviert das staerkste Crowding-Out im EBF (gamma = -0.68).

      Das Verhaeltnis U_kol/U_ind = 1.6 ist das NIEDRIGSTE aller Segmente.
      Das bedeutet: Kollektiv dominiert nur knapp. Es braucht wenig, um das
      Gleichgewicht zu kippen — ein Gutschein im Beziehungs-NL reicht, um
      den sozialen Wert zu zerstoeren.

      Dieses Segment wuenscht sich eine BEZIEHUNG, die auch oekonomisch fair
      ist. Aber: 'Beziehung + Fairness' ist etwas anderes als 'Beziehung +
      Rabatt'. Die EBF-Theorie zeigt den Ausweg: SUBSTITUTION des finanziellen
      Nutzens durch nicht-monetaere Reziprozitaet (Geschenke statt Gutscheine).

    crm_implication: |
      RELATIONAL CRM MIT FAIRNESS-FRAME.
      Die Beziehung steht vorn (Relational-NL), der oekonomische Vorteil
      kommt GETRENNT und als Reziprozitaet, nicht als Rabatt. Zeitliche
      Entkopplung ist essenziell: Woche 1 sozial, Woche 2 Wert — niemals
      gleichzeitig.

    crowding_out_risk:
      primary: "U_kol × U_ind (gamma = -0.68)"
      risk_level: "KRITISCH"
      reason: |
        HOECHSTES CROWDING-OUT-RISIKO aller Segmente.
        Beide Dimensionen sind hoch genug, um das Crowding-Out-Potenzial
        voll zu aktivieren: -0.68 × 0.52 × 0.33 = -0.117 (-11.7% Verlust).
        Das ist mehr als der gesamte identitaere Nutzen (0.14).

        Naive CRM-Logik: 'Social = 33% + Financial = 22% → beides ansprechen!'
        EBF-Logik: 'NIEMALS gleichzeitig — Netto-Effekt ist NEGATIV!'

    synergy_opportunity:
      primary: "U_kol × U_id (gamma = +0.35)"
      opportunity_level: "NIEDRIG"
      reason: |
        Identitaerer Nutzen ist zu niedrig (0.14), um substanzielle
        Synergien zu erzeugen. Bonus: +0.35 × 0.52 × 0.14 = +0.025 (+2.5%)
        Die primaere Strategie ist daher CROWDING-OUT VERMEIDEN, nicht
        Synergien maximieren.

  - id: "SEG-PC-004"
    name: "Smart Premium"
    share: 0.11

    meta_weights:
      U_ind: -0.24  # u_financial(-0.16) + u_status(-0.08)
      U_kol: +0.44  # u_social(0.32) + u_experience(0.12)
      U_id:  +0.56  # u_identity(0.56)

    dominant: "IDENTITAER"
    homo_type: "Homo Identitatis"
    ratio_kol_to_ind: "∞"  # U_ind negativ → Verhaeltnis nicht definiert

    narrative: |
      Smart Premium ist das EINZIGE identitaer dominierte Segment.
      56% des Nutzens kommen aus dem Selbstkonzept — 'Wer bin ich als
      Kaeufer:in?' Kollektiver Nutzen (44%) unterstuetzt das Selbstbild
      von aussen.

      Individueller Nutzen ist NEGATIV (-0.24). Rabatte und Punkte-Reminder
      signalisieren 'Massenmarkt' — das Gegenteil dessen, was dieses Segment
      sucht. Jede transaktionale Kommunikation BESCHAEDIGT das Selbstbild.

      Die Synergie U_id × U_kol (+0.35) ist hier am STAERKSTEN:
      +0.35 × 0.56 × 0.44 = +0.086 (+8.6%). Kein anderes Segment hat
      ein hoeheres Synergiepotenzial. Der Flywheel-Effekt:
      Aspirativer Content → Teilen → Feedback → Identitaetsbestaetigung → Bindung

      Das Segment verliert P&C nicht an Zalando (Preis/individuell), sondern
      an Breuninger (Erlebnis + Identitaet). Das Schlachtfeld ist U_id × U_kol.

    crm_implication: |
      REINES IDENTITY CRM.
      Kuration, Aspiration, Lifestyle-Content. Keine Rabatte, keine
      Punkte, keine Sale-Hinweise. Der NL sollte sich wie ein Style-
      Magazin anfuehlen, nicht wie ein Kaufhaus-Prospekt. Die soziale
      Komponente verstaerkt den Identitaets-Effekt: teilbarer Content,
      exklusive Community, Personal Styling.

    crowding_out_risk:
      primary: "U_id × U_ind (gamma = -0.45)"
      secondary: "U_kol × U_ind (gamma = -0.68)"
      risk_level: "HOCH (beide Crowding-Out-Achsen aktiv)"
      reason: |
        Individueller Nutzen ist NEGATIV (-0.24). Beide Crowding-Out-
        Achsen sind gleichzeitig aktiv:
        1. Rabatt in Inspirational-NL → U_id × U_ind (-0.45) → Kuration entwertet
        2. Gutschein nach Beziehungsaufbau → U_kol × U_ind (-0.68) → Beziehung entwertet
        Smart Premium ist das Segment, bei dem transaktionale Kommunikation
        den GROESSTEN Schaden anrichtet — weil sie BEIDE wertschoepfenden
        Dimensionen gleichzeitig unterlauft.

    synergy_opportunity:
      primary: "U_id × U_kol (gamma = +0.35)"
      opportunity_level: "MAXIMAL"
      reason: |
        HOECHSTES SYNERGIEPOTENZIAL aller Segmente.
        Bonus: +0.35 × 0.56 × 0.44 = +0.086 (+8.6%)
        Smart Premium ist das Segment, fuer das die Identitaet-
        Gemeinschaft-Synergie am staerksten arbeitet. Hier zahlt sich
        Identity CRM × Community am meisten aus.

  - id: "SEG-PC-005"
    name: "Clearance Hunters"
    share: 0.29

    meta_weights:
      U_ind: +0.13  # u_financial(0.16) + u_status(-0.03)
      U_kol: +0.72  # u_social(0.63) + u_experience(0.09)
      U_id:  +0.13  # u_identity(0.13)

    dominant: "KOLLEKTIV (extrem)"
    homo_type: "Homo Socialis (am reinsten)"
    ratio_kol_to_ind: 5.5  # 0.72 / 0.13

    narrative: |
      Clearance Hunters sind der REINSTE AUSDRUCK des Homo Socialis
      bei P&C. 72% ihres Nutzens sind kollektiv — das ist nicht nur der
      hoechste Wert, sondern auch das klarste Profil aller Segmente.

      Das Paradox: Der Name 'Clearance Hunters' impliziert Homo Oeconomicus.
      Die Daten zeigen Homo Socialis. Das ist nicht nur ein Benennungsfehler —
      es ist eine STRATEGISCHE FEHLALLOKATION. Das gesamte CRM fuer 29%
      der Kund:innen basiert auf der falschen Nutzenannahme.

      Identitaerer und individueller Nutzen sind identisch niedrig (je 0.13).
      Das Segment hat kein starkes Selbstbild als 'P&C-Kund:in' — aber einen
      Identity Score von 7.1/10. Das bedeutet: Die Identitaet existiert,
      wird aber durch das aktuelle CRM nicht aktiviert.

      Das Crowding-Out-Risiko (gamma = -0.68 bei U_kol=0.72, U_ind=0.13)
      ist der HAEUFIGSTE strategische Fehler im P&C-CRM: 'Danke fuer
      deine Treue — hier ist ein Gutschein.'

    crm_implication: |
      REINES RELATIONAL CRM (wie Core Loyalists, aber intensiver).
      Die Beziehungskommunikation muss DOMINIEREN und jede transaktionale
      Botschaft muss strikt getrennt werden. Segment umbenennen:
      'Community Members' statt 'Clearance Hunters' — intern und in der
      CRM-Logik.

    crowding_out_risk:
      primary: "U_kol × U_ind (gamma = -0.68)"
      risk_level: "SEHR HOCH"
      reason: |
        Das GROESSTE systemische Risiko im P&C-CRM.
        Drei Faktoren kumulieren:
        1. Groesstes Segment (29% der Kund:innen)
        2. Hoechster kollektiver Nutzen (0.72)
        3. Staerkstes Crowding-Out des EBF (gamma = -0.68)

        Absoluter Crowding-Out-Verlust: -0.68 × 0.72 × 0.13 = -0.064
        Bei 29% der Kund:innen = -0.019 gewichteter Gesamtverlust.
        Das klingt klein, aber: Es ist der HAEUFIGSTE Fehler (bei jeder
        'Danke+Gutschein'-Kombination) und er kumuliert ueber Monate.

    synergy_opportunity:
      primary: "U_kol × U_id (gamma = +0.35)"
      opportunity_level: "LATENT"
      reason: |
        Identitaeter Nutzen ist niedrig (0.13), aber Identity Score ist
        7.1/10 (zweithöchster). Das bedeutet: Die Identitaet existiert,
        wird aber vom CRM nicht aktiviert. Wenn die Beziehungskommunikation
        auch die P&C-Identitaet anspricht ('Du bist eine:r von uns'), kann
        die Synergie freigesetzt werden.
        Latentes Potenzial: +0.35 × 0.72 × [0.13 → 0.25?] = +0.063

  - id: "SEG-PC-006"
    name: "Dormant Potentials"
    share: 0.05
    status: "PLACEHOLDER"
    meta_weights: null
    dominant: null
    narrative: "Keine Datenbasis. In Phase 4 erheben."

# ===========================================================================
# 4. META-VERGLEICHSMATRIX
# ===========================================================================

meta_comparison:
  header: ["Segment", "U_ind", "U_kol", "U_id", "Dominant", "Homo-Typ", "Synergie-Potenzial", "CO-Risiko"]
  rows:
    - ["Core Loyalists (24%)",     -0.23, +0.78, +0.14, "KOLLEKTIV",  "Socialis",                     "+3.8%",  "HOCH"]
    - ["Premium Loyalists (11%)",  +0.16, +0.50, +0.35, "KOLLEKTIV",  "Socialis-Identitatis (Hybrid)", "+6.1%",  "NIEDRIG"]
    - ["Smart Value (20%)",        +0.33, +0.52, +0.14, "KOLLEKTIV",  "Socialis-Oeconomicus (SPANNUNG)", "+2.5%",  "KRITISCH"]
    - ["Smart Premium (11%)",      -0.24, +0.44, +0.56, "IDENTITAER", "Identitatis",                  "+8.6%",  "HOCH"]
    - ["Clearance Hunters (29%)",  +0.13, +0.72, +0.13, "KOLLEKTIV",  "Socialis (reinst)",            "LATENT",  "SEHR HOCH"]

  population_weighted:
    description: |
      Gewichteter Meta-Nutzen ueber den gesamten Kundenstamm (exkl. Dormant):
    U_ind_weighted: +0.03  # -0.23*0.24 + 0.16*0.11 + 0.33*0.20 + (-0.24)*0.11 + 0.13*0.29
    U_kol_weighted: +0.60  # 0.78*0.24 + 0.50*0.11 + 0.52*0.20 + 0.44*0.11 + 0.72*0.29
    U_id_weighted:  +0.20  # 0.14*0.24 + 0.35*0.11 + 0.14*0.20 + 0.56*0.11 + 0.13*0.29
    insight: |
      Ueber ALLE Kund:innen gewichtet:
        KOLLEKTIV:   60% ← der mit Abstand staerkste Treiber
        IDENTITAER:  20% ← zweitwichtigster Treiber
        INDIVIDUELL:  3% ← nahezu irrelevant!

      Das heisst: Der gesamte P&C-Kundenstamm (95%) ist zu 60% kollektiv,
      zu 20% identitaer und zu 3% individuell motiviert.

      Das aktuelle CRM (Punkte, Rabatte, Status-Tier) adressiert die
      3%-Dimension und ignoriert die 80%-Dimension.

      Das ist nicht Ineffizienz — das ist eine STRUKTURELLE FEHLALLOKATION.

# ===========================================================================
# 5. DAS NUTZEN-MISMATCH: IST vs. SOLL
# ===========================================================================

utility_mismatch:
  description: |
    Das aktuelle P&C-CRM adressiert primaer individuellen Nutzen
    (Punkte, Rabatte, Status-Tier). Die Daten zeigen: Individueller
    Nutzen macht gewichtet nur 3% der Nutzenmotivation aus.

  current_crm:
    label: "IST-Zustand: Transactional CRM"
    resource_allocation:
      U_ind: 0.70  # Punkte-Programm, Rabatte, Status-Emails, Sale-NL
      U_kol: 0.20  # Gelegentliche Events, Geburtstags-Mails
      U_id:  0.10  # Wenig Kuration, kaum Lifestyle-Content
    note: "Geschaetzte Ressourcenverteilung (Budget, Content, Kommunikation)"

  customer_needs:
    label: "SOLL-Zustand: Empirische Nutzenstruktur"
    utility_weights:
      U_ind: 0.03  # Gewichteter Meta-Nutzen
      U_kol: 0.60  # Gewichteter Meta-Nutzen
      U_id:  0.20  # Gewichteter Meta-Nutzen

  mismatch_factor:
    U_ind: "23x UEBERINVESTIERT (70% Ressourcen fuer 3% Nutzen)"
    U_kol: "3x UNTERINVESTIERT (20% Ressourcen fuer 60% Nutzen)"
    U_id:  "2x UNTERINVESTIERT (10% Ressourcen fuer 20% Nutzen)"

  visualization: |
    IST (Ressourcen)              SOLL (Nutzen)
    ━━━━━━━━━━━━━━━━━━━━━━━━━━    ━━━━━━━━━━━━━━━━━━━━━━━━━━
    U_ind ██████████████████ 70%   U_ind █ 3%
    U_kol █████ 20%                U_kol ████████████████ 60%
    U_id  ███ 10%                  U_id  █████ 20%
    ━━━━━━━━━━━━━━━━━━━━━━━━━━    ━━━━━━━━━━━━━━━━━━━━━━━━━━

    Die Balken sollten gleich lang sein. Sie sind es nicht.
    Das ist das Problem.

  transformation_roadmap:
    phase_1:
      name: "STOP (sofort, kostenlos)"
      action: "Transaktionale Kommunikation aus Standard-NL entfernen"
      reallocation: "U_ind: 70% → 30% (Punkte nur noch on-demand)"
      affected: "Core Loyalists (24%), Smart Premium (11%), Clearance Hunters (29%) = 64%"

    phase_2:
      name: "SHIFT (Q1 2026, mittel)"
      action: "Freigewordene Ressourcen in Relational + Inspirational NL investieren"
      reallocation: "U_kol: 20% → 45%, U_id: 10% → 25%"
      affected: "Alle Segmente"

    phase_3:
      name: "SCALE (Q2-Q3 2026, hoch)"
      action: "Segment-spezifische CRM-Tracks mit Meta-Nutzen-Ausrichtung"
      target_allocation:
        U_ind: 0.15  # Nur fuer Smart Value (separiert) + on-demand
        U_kol: 0.55  # Core Loyalists, Clearance Hunters, Smart Value
        U_id:  0.30  # Premium Loyalists, Smart Premium
      note: "Ziel: Ressourcenverteilung approximiert Nutzenverteilung"

# ===========================================================================
# 6. SEGMENT-CLUSTER UND CRM-ARCHETYPEN
# ===========================================================================
#
# Die Meta-Struktur deckt natuerliche Cluster auf:
#
# CLUSTER A: Der Kollektiv-Cluster (53%)
#   Core Loyalists (24%) + Clearance Hunters (29%)
#   → Homo Socialis, Relational CRM, Community-Building
#
# CLUSTER B: Der Identitaets-Cluster (22%)
#   Premium Loyalists (11%) + Smart Premium (11%)
#   → Homo Identitatis/Hybrid, Identity CRM, Kuration
#
# CLUSTER C: Die Spannungszone (20%)
#   Smart Value Seekers (20%)
#   → Homo Oeconomicus-Socialis Hybrid, Crowding-Out-Management
#
# ===========================================================================

segment_clusters:

  - id: "CLUSTER-A"
    name: "Der Kollektiv-Cluster"
    label: "Zugehoerigkeits-Kund:innen"
    share: 0.53
    color: "#7EBdAC"  # FA Mint
    segments: ["Core Loyalists (24%)", "Clearance Hunters (29%)"]
    dominant_meta: "U_kol"
    average_U_kol: 0.75  # (0.78 + 0.72) / 2
    shared_characteristics:
      - "Kollektiver Nutzen > 70%"
      - "Individueller Nutzen negativ oder minimal"
      - "Relational-NL und Retail-NL als primaere Kanaele"
      - "Punkte-Kommunikation schaedlich"
    crm_archetype: "RELATIONAL CRM"
    crm_principle: |
      Die Beziehung IST das Produkt. Der Kauf ist ein Nebeneffekt der
      Zugehoerigkeit, nicht umgekehrt.
    key_metrics:
      - "Besuchsfrequenz (nicht Conversion Rate)"
      - "NPS / Relationship Score (nicht AOV)"
      - "Event-Teilnahme (nicht Punkte-Einloesungen)"
    differentiation:
      Core_Loyalists: "Community ueber ERLEBNIS (Store als dritter Ort)"
      Clearance_Hunters: "Community ueber BEZIEHUNG (persoenliche Wertschaetzung)"

  - id: "CLUSTER-B"
    name: "Der Identitaets-Cluster"
    label: "Selbstbild-Kund:innen"
    share: 0.22
    color: "#A1A0C6"  # FA Lilac
    segments: ["Premium Loyalists (11%)", "Smart Premium (11%)"]
    dominant_meta: "U_id (+ U_kol als Verstaerker)"
    average_U_id: 0.46  # (0.35 + 0.56) / 2
    shared_characteristics:
      - "Identitaerer + kollektiver Nutzen zusammen > 80%"
      - "Individueller Nutzen irrelevant oder toxisch"
      - "Inspirational-NL und kuratierte Erlebnisse als primaere Kanaele"
      - "Sale-Kommunikation kontraproduktiv"
    crm_archetype: "IDENTITY CRM"
    crm_principle: |
      Die Marke IST ein Spiegel. Der Kauf ist eine Identitaetshandlung,
      kein oekonomischer Akt.
    key_metrics:
      - "AOV / Share of Wallet (nicht Transaktionszahl)"
      - "Content-Engagement (nicht Open Rate)"
      - "Breuninger-Retention (nicht Zalando-Retention)"
    differentiation:
      Premium_Loyalists: "Identitaet ueber EXKLUSIVITAET (dezent, kuratiert)"
      Smart_Premium: "Identitaet ueber ASPIRATION (laut, editorisch, teilbar)"

  - id: "CLUSTER-C"
    name: "Die Spannungszone"
    label: "Hybrid-Kund:innen"
    share: 0.20
    color: "#DECB3F"  # FA Ocher
    segments: ["Smart Value Seekers (20%)"]
    dominant_meta: "U_kol (knapp, mit U_ind-Spannung)"
    shared_characteristics:
      - "Einziges Segment mit substanziellem individuellen UND kollektiven Nutzen"
      - "Crowding-Out-Risiko ist das HOECHSTE aller Segmente"
      - "Erfordert SEQUENZIERUNG (nie gleichzeitig)"
    crm_archetype: "SEQUENZIERTES CRM"
    crm_principle: |
      Die Reihenfolge entscheidet. Beziehung ZUERST, Wert DANACH.
      Nie gleichzeitig — weil gamma = -0.68 alles zerstoert.
    key_metrics:
      - "Crowding-Out-Inzidenz (Anzahl 'Danke+Gutschein' Events)"
      - "Sequenzierungs-Compliance (Social-First Rate)"
      - "Non-Monetary Reciprocity Rate (Goodies statt Gutscheine)"
    management_rule: |
      CRM-FIREWALL: Wenn ein NL fuer Smart Value den Relational-Frame hat,
      darf er KEINEN Rabatt-Code oder Sale-Link enthalten. Der Sale kommt
      in Woche 2, als separater NL, ohne Beziehungssprache.

# ===========================================================================
# 7. STRATEGISCHE META-EINSICHTEN
# ===========================================================================

strategic_meta_insights:

  insight_1:
    title: "Die 3%-70%-Fehlallokation"
    finding: |
      Individueller Nutzen macht gewichtet 3% der Kundenmotivation aus.
      Das aktuelle CRM investiert ~70% der Ressourcen in transaktionale
      Kommunikation (Punkte, Rabatte, Status).
    implication: |
      Das ist keine Frage der Optimierung — es ist eine STRUKTURELLE
      FEHLALLOKATION. Die Reallokation von transaktional zu relational
      und identitaer ist der groesste einzelne Hebel fuer P&C.
    action: "Phase 1: STOP transaktionale Default-Kommunikation (sofort, kostenlos)"

  insight_2:
    title: "Der Individuell-Stoerfaktor"
    finding: |
      Individueller Nutzen hat ZWEI negative Interaktionen:
      - gamma(kol, ind) = -0.68 (Beziehung wird zur Transaktion)
      - gamma(id, ind) = -0.45 (Kuration wird zum Kommerz)
      Er hat KEINE positive Interaktion mit den anderen Kategorien.
    implication: |
      Transaktionale Kommunikation ist nicht einfach 'weniger effektiv' —
      sie ZERSTOERT AKTIV die beiden wirksameren Nutzendimensionen. Das
      Komplementaritaets-Dreieck hat nur EINE Synergie (id × kol = +0.35),
      aber ZWEI Crowding-Outs (beide involvieren U_ind).
    action: "Crowding-Out-Firewall: Transaktional ISOLIEREN, nie mischen"

  insight_3:
    title: "Die Clearance-Hunters-Entdeckung"
    finding: |
      Das groesste Segment (29%) wird systematisch falsch adressiert.
      Das CRM behandelt sie als Homo Oeconomicus (preisgetrieben).
      Die Daten zeigen: Sie sind der reinste Homo Socialis im Portfolio.
    implication: |
      Die Korrektur dieser einen Fehlzuordnung betrifft 29% der Kund:innen
      und erfordert keine neuen Systeme — nur eine ANDERE KOMMUNIKATION.
      Das ist der Quick Win mit dem hoechsten ROI.
    action: |
      Segment umbenennen ('Community Members'), Relational-NL-Track
      aufsetzen, 'Danke+Gutschein'-Muster eliminieren.

  insight_4:
    title: "Die Identitaet-Gemeinschaft-Synergie"
    finding: |
      Die EINZIGE positive Interaktion im Dreieck ist gamma(id, kol) = +0.35.
      Sie ist am staerksten bei Smart Premium (+8.6%) und Premium Loyalists (+6.1%).
    implication: |
      Die Synergie-Zone ist das strategische Zentrum. Jede Massnahme, die
      Identitaet UND Gemeinschaft gleichzeitig aktiviert, erzeugt ueber-
      proportionalen Nutzen. Das ist der Schluessel zum Breuninger-Gap.
    action: |
      Identity × Community Flywheel aufbauen: Teilbarer Inspirational-Content,
      exklusive Community-Events, Social Sharing Triggers.

  insight_5:
    title: "53% wollen Zugehoerigkeit, 22% wollen Spiegel"
    finding: |
      CLUSTER A (53%): Homo Socialis → Relational CRM
      CLUSTER B (22%): Homo Identitatis → Identity CRM
      CLUSTER C (20%): Spannungszone → Sequenziertes CRM
    implication: |
      Drei CRM-Archetypen statt One-Size-Fits-All:
      1. RELATIONAL: Beziehung, Community, Events (53% der Kund:innen)
      2. IDENTITY: Kuration, Exklusivitaet, Aspiration (22%)
      3. SEQUENZIERT: Beziehung zuerst, dann Wert — nie gleichzeitig (20%)
    action: |
      CRM-Architektur in 3 Tracks aufteilen. Keine generischen NL mehr.
      Jeder Track hat eigene Regeln, Kanaele, Metriken.
