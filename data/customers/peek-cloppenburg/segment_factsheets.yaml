    identity_belonging:     [ secondary, secondary, not_priority, primary,   secondary ]
    fairness_value:         [ not_priority, not_priority, secondary, not_priority, not_priority ]
    trust_consistency:      [ primary,   not_priority, not_priority, not_priority, not_priority ]
    reciprocity_gratitude:  [ not_priority, not_priority, primary,   not_priority, primary   ]
    saving_scarcity:        [ not_priority, primary,   not_priority, secondary,   not_priority ]

