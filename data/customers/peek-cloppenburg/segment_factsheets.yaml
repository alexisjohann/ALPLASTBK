# PEEK & CLOPPENBURG — SEGMENT FACTSHEETS
# Quelle: Behavioral CRM Workshop (25. Februar 2026)
# Facilitators: Alexis Johann, Emily Zima
# Datenbasis: Newsletter-A/B-Test (5 NL-Typen × 6 Segmente), 7 Stakeholder-Interviews, Segmentdaten
# Erstellt: 2026-02-27
# SSOT: outputs/PeC_CRM_Workshop_Feb2026_Deck.md (Slides 11, 14, 17, 20)

metadata:
  customer: "Peek & Cloppenburg"
  project: "Behavioral CRM Transformation"
  workshop_date: "2026-02-25"
  created: "2026-02-27"
  source_deck: "outputs/PeC_CRM_Workshop_Feb2026_Deck.md"
  data_sources:
    - type: "newsletter_experiment"
      description: "A/B-Test über 6 Segmente, 5 NL-Typen + Control"
      metric: "Uplift in Prozentpunkten vs. Baseline"
    - type: "stakeholder_interviews"
      description: "7 Interviews (CRM, Analytics, Brand, Märkte)"
    - type: "segment_data"
      description: "Verhaltensprofile, KPIs, Share of Wallet"
  phase: "Phase 3 — In-Person Workshop"
  next_phase: "Phase 4 — Prototype Testing (März 2026)"

# =============================================================================
# NEWSLETTER-TYPEN (getestet im Experiment)
# =============================================================================
newsletter_types:
  control:
    code: "CTL"
    description: "Standard-Format, kein spezifischer Behavioral Frame"
  transactional:
    code: "TRA"
    description: "Kaufhistorie, Punkte-Status, persoenliche Statistiken"
  relational:
    code: "REL"
    description: "Beziehungs-Sprache, persoenliche Ansprache, Wertschaetzung"
  sales:
    code: "SAL"
    description: "Angebote, Rabatte, Sale-Hinweise"
  inspirational:
    code: "INS"
    description: "Looks, Trends, Lifestyle-Content, Kuration"
  retail:
    code: "RET"
    description: "Store-Events, lokale Inhalte, Filial-Bezug"

# =============================================================================
# HEATMAP: NL-Wirkung je Segment (Uplift in Prozentpunkten vs. Baseline)
# =============================================================================
heatmap:
  note: "Werte sind Uplift in Prozentpunkten. Fett = staerkster Typ je Segment."
  matrix:
    core_loyalists:     { control: +10.0, transactional: -8.3, relational: +5.0,  sales: +2.0,  inspirational: +4.0,  retail: +16.7 }
    premium_loyalists:  { control: +10.0, transactional: +3.0, relational: +7.0,  sales: +1.0,  inspirational: +9.0,  retail: +6.0  }
    smart_value:        { control: +3.0,  transactional: +4.0, relational: +12.0, sales: +8.0,  inspirational: +5.0,  retail: +7.0  }
    smart_premium:      { control: +5.0,  transactional: -2.0, relational: +8.0,  sales: -4.0,  inspirational: +14.2, retail: +3.0  }
    clearance_hunters:  { control: +2.0,  transactional: -1.0, relational: +20.0, sales: +5.0,  inspirational: +4.0,  retail: +3.0  }
    dormant_potentials: { control: null,   transactional: null,  relational: null,   sales: null,   inspirational: null,   retail: null   }

# =============================================================================
# SEGMENT 1: CORE LOYALISTS
# =============================================================================
segments:
  - id: "SEG-PC-001"
    name: "Core Loyalists"
    share: 0.24
    share_label: "24%"

    profile:
      description: "Stammkund:innen mit hoher Besuchsfrequenz und emotionaler Bindung an die Filiale. Reagieren stark auf lokale, community-orientierte Kommunikation."
      key_characteristic: "Reagieren auf Retail NL (+16.7pp), negativ auf Transactional (-8.3pp)"

    newsletter_response:
      best_type: "retail"
      best_uplift_pp: +16.7
      worst_type: "transactional"
      worst_uplift_pp: -8.3
      full_response:
        control: +10.0
        transactional: -8.3
        relational: +5.0
        sales: +2.0
        inspirational: +4.0
        retail: +16.7

    key_insight:
      id: "KI-3"
      headline: "Transactional ist giftig fuer das groesste Segment"
      detail: |
        Core Loyalists (24% der Kunden) reagieren am schlechtesten auf die haeufigste
        Kommunikationsform (Transactional, -8.3pp). Sie wollen keine Punkte-Reminder
        oder Status-Updates — sie wollen Store-Events, lokale Inhalte, Zugehoerigkeit.
      implication: |
        Das Segment, das am haeufigsten angesprochen wird, reagiert am schlechtesten
        auf die haeufigste Kommunikationsform. Sofortige NL-Umstellung empfohlen.
      bisherige_annahme: "Transactional (Punkte, Status) bindet loyale Kunden"
      was_daten_zeigen: "Core Loyalists wollen Retail — Store-Events, lokale Angebote, Zugehoerigkeit"

    behavioral_pillars:
      primary: "trust_consistency"
      primary_rationale: "Wollen Rhythmus und Verlaesslichkeit — keine kreative Ueberraschung, sondern regelmässigen Kontakt"
      secondary: "identity_belonging"
      secondary_rationale: "Starke emotionale Bindung an P&C als Marke und Filiale"

    beatrix_hypothesis:
      id: "H4"
      title: "Store-Event-Trigger erhoeht Besuchsrate bei Core Loyalists"
      test_design: "Standard Retail-NL vs. Retail-NL + lokaler Event-Cue"
      kpi: ["Store Visit (Kundenkarten-Scan)", "NL Open Rate"]
      expectation: "Event-Trigger > Standard (basierend auf +16.7pp Retail)"
      impact_if_confirmed: "Habit-Muster zu emotionalem Engagement upgraden"

    open_questions:
      - "POS-Integration: CRM endet heute beim Postfach — nicht beim Kauf (D4)"

  # =============================================================================
  # SEGMENT 2: PREMIUM LOYALISTS
  # =============================================================================
  - id: "SEG-PC-002"
    name: "Premium Loyalists"
    share: 0.11
    share_label: "11%"

    profile:
      description: "Qualitaetsbewusste Kund:innen mit hoher Markentreue. Reagieren auf sachliche, zurueckhaltende Kommunikation und Exklusivitaetssignale."
      key_characteristic: "Reagieren auf Control NL (+10pp) — schaetzen zurueckhaltende Kommunikation"

    newsletter_response:
      best_type: "control"
      best_uplift_pp: +10.0
      worst_type: "sales"
      worst_uplift_pp: +1.0
      full_response:
        control: +10.0
        transactional: +3.0
        relational: +7.0
        sales: +1.0
        inspirational: +9.0
        retail: +6.0

    key_insight:
      headline: "Weniger ist mehr — Premium Loyalists schaetzen Zurueckhaltung"
      detail: |
        Premium Loyalists reagieren am staerksten auf das Standard-Format (Control, +10pp).
        Inspirational ist zweitstaerkster Typ (+9pp). Sales und Transactional sind nahezu
        wirkungslos. Dieses Segment will nicht umworben werden — es will respektiert werden.
      implication: |
        Exklusivitaets-Signale (Early Access, Preview) schliessen den Experience-Gap
        zu Breuninger, ohne aufdringlich zu wirken.

    behavioral_pillars:
      primary: "saving_scarcity"
      primary_rationale: "Exklusivitaets-Framing ('Nur fuer Sie — 48h vor allen anderen') wirkt staerker als Rabatte"
      secondary: "identity_belonging"
      secondary_rationale: "Status-Bestaetigung durch Premium-Mitgliedschaft"

    beatrix_hypothesis:
      id: "H5"
      title: "Early Access Signal erhoeht Conversion bei Premium Loyalists"
      test_design: "Standard vs. 'Nur fuer Sie — 48h vor allen anderen'"
      kpi: ["Conversion", "AOV", "Retention (3 Monate)"]
      expectation: "Early Access > Standard"
      impact_if_confirmed: "Exklusivitaets-Frame schliesst Experience-Gap zu Breuninger"

    open_questions:
      - "Fairness & Trust: Noch kein NL-Typ zugeordnet — offene Frage fuer Test-Phase (D5)"

  # =============================================================================
  # SEGMENT 3: SMART VALUE SEEKERS
  # =============================================================================
  - id: "SEG-PC-003"
    name: "Smart Value Seekers"
    share: 0.20
    share_label: "20%"

    profile:
      description: "Preisbewusste Kund:innen, die Wert schaetzen — aber nicht nur Rabatte. Reagieren stark auf persoenliche, beziehungsorientierte Kommunikation."
      key_characteristic: "Reagieren auf Relational NL (+12pp) — Beziehung schlaegt Preis"

    newsletter_response:
      best_type: "relational"
      best_uplift_pp: +12.0
      worst_type: "control"
      worst_uplift_pp: +3.0
      full_response:
        control: +3.0
        transactional: +4.0
        relational: +12.0
        sales: +8.0
        inspirational: +5.0
        retail: +7.0

    key_insight:
      headline: "Smart Value sucht Wertschaetzung, nicht nur Wert"
      detail: |
        Relational (+12pp) schlaegt Sales (+8pp) deutlich. Diese Kund:innen reagieren
        staerker auf persoenliche Ansprache als auf Rabatte. Non-Monetary-Anreize
        (Goodie, Raffle) koennten Rabatt-Budget teilweise ersetzen.
      implication: |
        Rabatt-Budget kann teilweise durch Non-Monetary-Anreize ersetzt werden,
        wenn der Beziehungsaspekt im Vordergrund steht.

    behavioral_pillars:
      primary: "reciprocity_gratitude"
      primary_rationale: "Non-Monetary-Anreize (Goodie, Raffle) als Alternative zu Rabatten"
      secondary: "fairness_value"
      secondary_rationale: "Transparenz ueber Wert schafft Bindung"

    beatrix_hypothesis:
      id: "H3"
      title: "Goodie / Raffle schlaegt Rabatt bei Smart Value"
      test_design: "10%-Rabatt vs. Goodie-Bag vs. Raffle-Chance"
      kpi: ["Store Traffic", "Conversion", "Perceived Value"]
      expectation: "Goodie >= Rabatt (Non-Monetary wirkt)"
      impact_if_confirmed: "Rabatt-Budget teilweise durch Non-Monetary ersetzen"

    open_questions: []

  # =============================================================================
  # SEGMENT 4: SMART PREMIUM
  # =============================================================================
  - id: "SEG-PC-004"
    name: "Smart Premium"
    share: 0.11
    share_label: "11%"

    profile:
      description: "Hoechster AOV aller Segmente. Sucht Inspiration, Kuration und Status. Verliert P&C nicht an Zalando (Preis), sondern an Breuninger (Experience)."
      key_characteristic: "Reagieren auf Inspirational NL (+14.2pp), hoechster AOV"

    newsletter_response:
      best_type: "inspirational"
      best_uplift_pp: +14.2
      worst_type: "sales"
      worst_uplift_pp: -4.0
      full_response:
        control: +5.0
        transactional: -2.0
        relational: +8.0
        sales: -4.0
        inspirational: +14.2
        retail: +3.0

    key_insight:
      id: "KI-2"
      headline: "Smart Premium verliert P&C nicht an Zalando — sondern an Breuninger"
      detail: |
        Smart Premium kauft bei P&C — aber das grosse, emotionale Shopping-Erlebnis
        findet anderswo statt. Der Experience-Gap, nicht der Price-Gap, ist das Problem.
        Sales-NL hat sogar negativen Effekt (-4pp).
      implication: |
        Inspirational NL ist Anfang — aber der Hebel geht bis zum POS und
        zur Beratungsqualitaet. Nicht Preis-Wettbewerb mit Zalando,
        sondern Experience-Wettbewerb mit Breuninger.
      bisherige_annahme: "Das Problem ist Preis-Wettbewerb mit Online-Plattformen"
      was_daten_zeigen: "Das Problem ist Experience-Gap zu Breuninger & Co."

    behavioral_pillars:
      primary: "identity_belonging"
      primary_rationale: "Hoechster Identity-Score — sucht Spiegelung des Selbstbilds in der Marke"
      secondary: "saving_scarcity"
      secondary_rationale: "Kuration und Exklusivitaet statt Massenangebot"

    beatrix_hypothesis:
      id: "H2"
      title: "Inspiration schlaegt reiner Sales bei Smart Premium"
      test_design: "Inspiration vs. Sales vs. Inspiration+Deal (3-Arm)"
      kpi: ["Conversion", "AOV"]
      expectation: "Inspiration+Deal >= Inspiration > Sales"
      impact_if_confirmed: "Komplementaritaet zwischen Content und Angebot bestaetigt"

    open_questions:
      - "AT/EE-Maerkte: Preissensitivitaet dort vermutlich hoeher — Playbook braucht lokale Ebene (D3)"

  # =============================================================================
  # SEGMENT 5: CLEARANCE HUNTERS
  # =============================================================================
  - id: "SEG-PC-005"
    name: "Clearance Hunters"
    share: 0.29
    share_label: "29%"

    profile:
      description: "Groesstes Segment. Empirisch KEINE Discounters — Identity-Score 7.1/10, staerkstes Relational-Ergebnis aller Segmente. Emotional verbunden, falsch eingeschaetzt."
      key_characteristic: "Reagieren auf Relational NL (+20pp — staerkstes Ergebnis ueberhaupt), Identity 7.1/10"

    newsletter_response:
      best_type: "relational"
      best_uplift_pp: +20.0
      worst_type: "transactional"
      worst_uplift_pp: -1.0
      full_response:
        control: +2.0
        transactional: -1.0
        relational: +20.0
        sales: +5.0
        inspirational: +4.0
        retail: +3.0

    key_insight:
      id: "KI-1"
      headline: "Clearance Hunters sind keine Discounters"
      detail: |
        Identity-Score 7.1/10 (hoechster nach Smart Premium).
        +20pp auf Relational NL — staerkstes Ergebnis aller Segmente ueberhaupt.
        -1pp auf Transactional — kein Effekt. Rabatte sind neutral bis irrelevant.
      implication: |
        Clearance Hunters wollen Beziehung, nicht Rabatte. Der bisherige Ansatz
        (mehr Rabatte = mehr Bindung) ist empirisch widerlegt.
        Naming 'Clearance = disloyal' ist falsch — braucht neuen Namen.
      bisherige_annahme: "Clearance Hunters kaufen nur im Sale — mehr Rabatte binden sie"
      was_daten_zeigen: "Clearance Hunters wollen Beziehung — Rabatte sind neutral bis irrelevant"
      identity_score: 7.1
      identity_scale: "0-10"

    behavioral_pillars:
      primary: "reciprocity_gratitude"
      primary_rationale: "Staerkstes Relational-Ergebnis aller Segmente (+20pp) — Anerkennung, nicht Rabatt"
      secondary: "identity_belonging"
      secondary_rationale: "Identity 7.1/10 — emotional verbunden trotz Sale-Kaufverhalten"

    beatrix_hypothesis:
      id: "H1"
      title: "Relational schlaegt Transactional bei Clearance Hunters"
      test_design: "Relational vs. Transactional vs. Control (3-Arm)"
      kpi: ["Open Rate", "Click Rate", "ggf. Store Visit"]
      expectation: "Relational > Transactional"
      impact_if_confirmed: "Sofortige NL-Umstellung fuer groesstes Segment"
      note: "Groesstes N (29%) — hoechste statistische Power"

    open_questions:
      - "Naming: 'Clearance = disloyal' ist empirisch falsch — brauchen neuen Namen (D2)"
      - "AT/EE-Maerkte: Preissensitivitaet dort vermutlich hoeher (D3)"

  # =============================================================================
  # SEGMENT 6: DORMANT POTENTIALS (PLACEHOLDER)
  # =============================================================================
  - id: "SEG-PC-006"
    name: "Dormant Potentials"
    share: 0.05
    share_label: "5%"
    status: "PLACEHOLDER"

    profile:
      description: "Zu wenig Datenbasis fuer Enrichment. Segment existiert, aber Verhaltensprofile fehlen."
      key_characteristic: "Insufficient data"

    newsletter_response:
      best_type: null
      best_uplift_pp: null
      worst_type: null
      worst_uplift_pp: null
      full_response:
        control: null
        transactional: null
        relational: null
        sales: null
        inspirational: null
        retail: null

    key_insight:
      headline: "Zu wenig Daten — offener Arbeitsauftrag"
      detail: "5% Kundenstamm, aber keine ausreichende Datenbasis fuer Newsletter-Experiment oder Segment-Enrichment."

    behavioral_pillars:
      primary: null
      secondary: null

    beatrix_hypothesis: null

    open_questions:
      - "Datenbasis erweitern bevor Hypothesen moeglich (D1)"

# =============================================================================
# BEHAVIORAL TOOLBOX: 5 PILLARS
# =============================================================================
behavioral_pillars:
  - id: "PIL-01"
    name: "Identity & Belonging"
    principle: "Menschen handeln konsistent mit ihrer Identitaet"
    crm_example: "Nike Membership: 'You're a runner' — +32% Laufaktivitaet nach Beitritt"
    pc_relevance: "Smart Premium (Identity 8.2/10) und Clearance Hunters (7.1/10) reagieren auf Zugehoerigkeitssignale staerker als auf Rabatte"

  - id: "PIL-02"
    name: "Fairness & Value"
    principle: "Transparenz ueber Wert schafft mehr Bindung als Wert allein"
    crm_example: "Spotify Wrapped: Keine Rabatte — 78% teilen aktiv"
    pc_relevance: "'Weil du Premium-Mitglied bist' ist staerker als 'Exklusiv fuer dich' — der Grund ist Teil des Angebots"

  - id: "PIL-03"
    name: "Trust & Consistency"
    principle: "Konsistenz ueber Zeit ist wertvoller als Ueberraschungen"
    crm_example: "Amazon Lieferversprechen: 'Morgen, 18:00 Uhr' — Praezision entlastet emotional"
    pc_relevance: "Core Loyalists (+16.7pp Retail) wollen Rhythmus — 'Ich weiss, dass ich Mittwochs von P&C hoere'"

  - id: "PIL-04"
    name: "Reciprocity & Gratitude"
    principle: "Wer gibt, ohne zu rechnen, bekommt mehr zurueck"
    crm_example: "Starbucks Birthday Reward: ~0.50 USD Kosten, +34% Purchase Frequency"
    pc_relevance: "Clearance Hunters (+20pp Relational) — Reciprocity ist Primaerhebel, kein Rabatt sondern Anerkennung"

  - id: "PIL-05"
    name: "Saving & Scarcity"
    principle: "Framing zaehlt mehr als der Preis"
    crm_example: "Booking.com: 'Nur noch 2 Zimmer' — +18% Buchungsrate"
    pc_relevance: "Nicht '30% Rabatt' — sondern 'Nur fuer INSIDER: 48h vor allen anderen'"

