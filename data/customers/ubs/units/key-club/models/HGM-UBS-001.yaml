# =============================================================================
# MODEL FORMULA
# =============================================================================

formula:
  notation: "P(Hauptbank) = σ( Σᵢ gᵢ·wᵢ + Σᵢⱼ γᵢⱼ·gᵢ·gⱼ - SQ )"
  components:
    P_hauptbank: "Wahrscheinlichkeit, dass Kundin Hauptbank-Status erreicht"
    g_i: "Gravitationskraft (Lock-in) von Produkt i ∈ [0, 1]"
    w_i: "Alltags-Gewicht (Touchpoint-Frequenz) von Produkt i ∈ [0, 1]"
    gamma_ij: "Komplementarität zwischen Produkt i und j ∈ [-1, +1]"
    SQ: "Status Quo Bias (Trägheit, zu überwinden)"
    sigma: "Sigmoid-Funktion: σ(x) = 1 / (1 + e^(-x))"

# =============================================================================
# PRODUCT GRAVITY MAP
# =============================================================================

products:
  - id: "LOHN"
    name: "Lohnkonto/Zahlungsverkehr"
    g_lockin: 0.90
    w_alltag: 0.95
    gravity: 0.855  # g × w
    tier: "T1"
    source: "Samuelson & Zeckhauser 1988"
    g_justification: "Daueraufträge, LSV, Arbeitgeber-Meldung, psychologischer Anker"
    w_justification: "Tägliche Nutzung (E-Banking, Überweisungen, Zahlungen)"

  - id: "HYPO"
    name: "Hypothek"
    g_lockin: 0.95
    w_alltag: 0.30
    gravity: 0.285
    tier: "T1"
    source: "Samuelson & Zeckhauser 1988"
    g_justification: "5-10 Jahre Vertragsbindung, höchste Wechselkosten"
    w_justification: "Monatliche Zahlung, sonst unsichtbar"

  - id: "KARTE"
    name: "Kreditkarte"
    g_lockin: 0.35
    w_alltag: 0.80
    gravity: 0.280
    tier: "T2"
    source: "LLMMC (Anker: empirische Switching-Daten)"
    g_justification: "Leicht kündbar, niedrige Bindung"
    w_justification: "Tägliche Nutzung (Zahlungen, Online-Shopping)"

  - id: "3A"
    name: "3. Säule (3a/3b)"
    g_lockin: 0.60
    w_alltag: 0.15
    gravity: 0.090
    tier: "T2"
    source: "LLMMC (Anker: CH Steuersystem)"
    g_justification: "Jährliche Entscheidung, aber Steuer-Lock-in"
    w_justification: "Jährliche Einzahlung, Steuererklärung"

  - id: "VORSORGE"
    name: "Vorsorge (2. Säule)"
    g_lockin: 0.70
    w_alltag: 0.10
    gravity: 0.070
    tier: "T2"
    source: "LLMMC"
    g_justification: "Arbeitgeber-gebunden, selten gewechselt"
    w_justification: "Kaum aktive Interaktion"

  - id: "ADVISORY"
    name: "Advisory/Vermögen"
    g_lockin: 0.50
    w_alltag: 0.20
    gravity: 0.100
    tier: "T2"
    source: "Bereits bei UBS (Key Club)"
    g_justification: "Performance-abhängig, wechselbar"
    w_justification: "Quartalsweise Gespräche, Performance-Check"

