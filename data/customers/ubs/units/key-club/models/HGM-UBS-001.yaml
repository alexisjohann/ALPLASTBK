# =============================================================================
# BEHAVIORAL BARRIERS (Status Quo)
# =============================================================================

barriers:
  - name: "Status Quo Bias"
    strength: 0.8
    sq_contribution: 1.80
    mechanism: "λ ≈ 2.25 → Wechselkosten 2.25× überschätzt"
    source: "Samuelson & Zeckhauser (1988), Kahneman & Tversky (1979)"

  - name: "Mental Accounting"
    strength: 0.6
    sq_contribution: 0.60
    mechanism: "«UBS = Anlagen, KB = Alltag» — mentale Trennung"
    source: "Thaler (1985, 1999)"

  - name: "Verlust-Angst"
    strength: 0.4
    sq_contribution: 0.40
    mechanism: "Endowment Effect auf bestehende Bankbeziehung"
    source: "Kahneman, Knetsch & Thaler (1991)"

  - name: "Identität"
    strength: 0.4
    sq_contribution: 0.40
    mechanism: "«Ich bin KB-Kundin» → Identitäts-Wechselkosten"
    source: "Akerlof & Kranton (2000)"

  total_sq: 3.20

# =============================================================================
# SEQUENCE STRATEGIES
# =============================================================================

sequences:
  - id: "SEQ-A"
    name: "Alltags-Pfad (ohne Life Event)"
    sequence: "Karte (T=0) → Lohn (T=1) → 3a (T=2) → Hypo (T=3)"
    timing: "3-6 Monate zwischen Schritten"
    estimated_conversion: [0.15, 0.25]  # P(Hauptbank)
    steps:
      - step: 1
        product: "Kreditkarte"
        mechanism: "Identity Priming (Akerlof & Kranton)"
        intervention: "Exklusive Key Club Card, Status-Signal"
        delta_sq: -0.40

      - step: 2
        product: "Lohnkonto"
        mechanism: "Hassle Reduction (Thaler & Sunstein)"
        intervention: "«Wir erledigen ALLES für Sie» Wechselservice"
        delta_sq: -1.20

      - step: 3
        product: "3. Säule"
        mechanism: "Loss Framing (Kahneman & Tversky)"
        intervention: "«Sie verschenken CHF X Steuerersparnis»"
        delta_sq: -0.30

      - step: 4
        product: "Hypothek"
        mechanism: "Natural Moment (Erneuerung)"
        intervention: "Gesamtbeziehungs-Kondition + Steuer-Synergie"
        delta_sq: -0.80

  - id: "SEQ-B"
    name: "Life-Event-Pfad (mit Life Event)"
    sequence: "Life Event → Hypo → Lohn → 3a → Karte"
    estimated_conversion: [0.45, 0.65]  # P(Hauptbank)
    trigger_events:
      - "Immobilienkauf / Hypothekar-Erneuerung"
      - "Heirat / Scheidung"
      - "Geburt eines Kindes"
      - "Jobwechsel / Beförderung / Grosser Bonus"
      - "Erbschaft / Schenkung"
      - "Pensionierung (Kapitalbezug 2. Säule)"
    key_insight: "Bei Life Events sinkt SQ von λ ≈ 2.25 auf λ ≈ 1.3 (Status Quo bereits gebrochen)"

# =============================================================================
# CROWDING-OUT WARNING
# =============================================================================

crowding_out:
  gamma: -0.68
  parameter_ref: "PAR-COMP-002"
  source: "Frey & Jegen (2001), Deci, Koestner & Ryan (1999)"

  verboten:
    - "CHF-Bonus für Lohnkonto-Wechsel"
    - "Prozent-Rabatt auf Hypothek bei Gesamtbeziehung"
    - "Gratis-Kreditkarte als Wechselanreiz"

  stattdessen:
    - "Exklusivität (Events, Services nur für Hauptbankkund:innen)"
    - "Convenience (Wechselservice, Hassle-Reduktion)"
    - "Steueroptimierung (Loss Frame auf bestehende Verluste)"
    - "Social Proof («73% unserer Key-Club-Mitglieder haben Hauptbank bei uns»)"

# =============================================================================
