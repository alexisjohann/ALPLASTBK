      purpose: "Sequenz-B-Opportunitäten quantifizieren"

# =============================================================================
# FALSIFIABILITY
# =============================================================================

falsifiability:
  predictions:
    - hypothesis: "P(Hauptbank | Sequenz A) ≈ 0.20"
      test: "Conversion Rate ohne Life Event"
    - hypothesis: "P(Hauptbank | Sequenz B) ≈ 0.55"
