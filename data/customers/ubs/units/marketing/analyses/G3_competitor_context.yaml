# =============================================================================
# 1. AI/DIGITAL MORTGAGE TOOLS — SCHWEIZER WETTBEWERB
# =============================================================================

mortgage_competitors:

  market_gap_headline: |
    KEIN Schweizer Hypothekaranbieter bietet aktuell einen kund:innen-seitigen
    KI-Chatbot für Hypothekenberatung an. AI wird intern genutzt (ZKB ChatGPT,
    Raiffeisen Copilot), aber NICHT als kund:innen-gerichtetes Produkt.
    → UBS hat eine SIGNIFIKANTE First-Mover-Opportunity.

  competitors:

    - name: "MoneyPark (Helvetia)"
      type: "broker"
      ai_features: false
      chatbot: false
      digital_journey_score: 3  # 1-5
      lender_count: 100
      annual_volume: "CHF 3+ Mrd."
      market_position: "Grösster unabhängiger Hypothekenbroker CH"
      detail: |
        Helvetia-Mutter hat KI-Chatbot «Clara» (ChatGPT-basiert) für Versicherungsfragen,
        aber NICHT für Hypotheken. MoneyPark setzt auf menschliche Beratung an 30+ Standorten.
      ubs_gpt_differenzierung: |
        MoneyPark = Breite (100+ Kreditgeber). UBS GPT = Geschwindigkeit + 24/7-Verfügbarkeit.
        Komplementär: GPT als Erstberatung → Berater-Handoff (B1: gamma_ai_human = 0.35).

    - name: "Comparis (+ HypoPlus)"
      type: "comparison_platform"
      ai_features: false
      chatbot: false
      digital_journey_score: 3
      lender_count: 30
      market_position: "Grösste Vergleichsplattform CH"
      detail: |
        Regelbasierte Rechner (Hypothekenrechner, Tragbarkeit, Zinsprognosen).
        Beratung via Partner HypoPlus (menschlich). Kein konversationaler KI-Chatbot.
      ubs_gpt_differenzierung: |
        Comparis = Start der Mortgage Journey für viele Schweizer:innen.
        UBS GPT fängt Nutzer:innen FRÜHER ab mit personalisierten KI-Antworten
        statt statischer Vergleichstabellen.

    - name: "VZ VermögensZentrum"
      type: "independent_advisor"
      ai_features: false
      chatbot: false
      digital_journey_score: 3
      market_position: "Unabhängige Premium-Beratung (1'800+ Mitarbeitende)"
      detail: |
        VZ Financial Portal bietet Hypothekenmonitoring (Zinsalarme, Verlängerungstracking),
        aber Beratung selbst ist menschlich geführt. BSI CRM intern, kein Chatbot.
      ubs_gpt_differenzierung: |
        VZ = Vertrauen durch Unabhängigkeit. UBS GPT = Monitoring-Features von VZ
        PLUS konversationale KI-Schicht, die VZ nicht hat.

    - name: "key4 (UBS)"
      type: "bank_platform"
      ai_features: false
      chatbot: false
      digital_journey_score: 4  # Höchste unter Schweizer Banken
      market_position: "Digital fortschrittlichste Bank-Plattform CH"
      unique_features:
        - "Multi-Kreditgeber Tranchensplitting (markteinzigartig)"
        - "Homegate-Partnerschaft (Auto-Datenübertragung)"
        - "Houzy-Partnerschaft (Eigenheim-Plattform)"
        - "Integration in UBS Mobile Banking App"
      detail: |
        key4 ist bereits die digital ausgereifteste Hypothekenplattform unter CH-Banken.
        Echtzeit-Angebote, Multi-Anbieter-Vergleich, Tranchensplitting.
        Migration auf ubs.com im Gang (2026).
      ubs_gpt_differenzierung: |
        key4 = stärkste digitale Basis. KI-GPT-Layer DARAUF = First-Mover-Vorteil.
        Kein anderer CH-Anbieter hat diese Kombination (Plattform + KI + Ökosystem).

    - name: "ZKB (Zürcher Kantonalbank)"
      type: "cantonal_bank"
      ai_features: "intern (ZKB ChatGPT für Mitarbeitende)"
      chatbot: false
      digital_journey_score: 3
      market_position: "Grösste Kantonalbank; finanziert jedes 3. Haus in Kanton ZH"
      detail: |
        Internes «ZKB ChatGPT» (Azure OpenAI): Recherche, Texterstellung, Zusammenfassungen.
        KI in Asset Management für Alpha-Generierung. KI in Legal (Legartis).
        KEIN kund:innenseitiger Hypotheken-Chatbot.
      ubs_gpt_differenzierung: |
        ZKB hat KI-Kapazität (intern), aber nutzt sie nicht kund:innengerichtet.
        Risiko: Falls ZKB einen kund:innen-Chatbot lanciert, starker Wettbewerber (ZH-Dominanz).
        → UBS First-Mover-Fenster: 12-18 Monate Vorsprung.

    - name: "Raiffeisen"
      type: "cooperative_bank"
      ai_features: "intern (Microsoft Copilot, 300 AI Champions)"
      chatbot: false
      digital_journey_score: 2
      market_position: "Grösster Hypothekarkreditgeber CH (~17% Marktanteil)"
      detail: |
        Microsoft Copilot gruppenweit ausgerollt (Frühling 2024). 300 interne AI Champions.
        Kund:innenseitiger Chatbot «gut vorstellbar in Zukunft» — aber noch nicht umgesetzt.
        900+ Filialen, konservativer Digital-Ansatz.
      ubs_gpt_differenzierung: |
        Raiffeisen = stärkstes Filialnetz, höchstes Volumen, aber digital konservativ.
        UBS GPT adressiert die Segment-Lücke: Digital-affine Kund:innen, die Raiffeisen
        nicht digital bedient. Raiffeisen ist 1-2 Jahre zurück bei kund:innenseitiger KI.

    - name: "Valuu (PostFinance)"
      type: "bank_platform"
      ai_features: false
      chatbot: false
      digital_journey_score: 3
      market_position: "PostFinance's Antwort auf key4"
      detail: |
        Digitaler Hypothekenbroker von PostFinance. Vergleicht mehrere Anbieter online.
        Kein KI-Chatbot.
      ubs_gpt_differenzierung: |
        Direkte Konkurrenz zu key4, aber ohne KI-Differenzierung.
        Falls PostFinance KI ergänzt, wird Valuu relevanter.

  competitive_matrix:
    dimensions:
      - dimension: "KI/Chatbot"
        leader: "NIEMAND (Marktlücke)"
        ubs_opportunity: "First Mover"
      - dimension: "Digitale Journey-Vollständigkeit"
        leader: "key4 (UBS)"
        ubs_opportunity: "Bereits führend; KI erweitern"
      - dimension: "Kreditgeberbreite"
        leader: "MoneyPark (100+)"
        ubs_opportunity: "key4 Multi-Anbieter-Ansatz"
      - dimension: "Vertrauen/Marke"
        leader: "UBS, ZKB, Raiffeisen"
        ubs_opportunity: "Bankenvertrauen + KI = einzigartige Kombination"
      - dimension: "Marktanteil Hypotheken"
        leader: "Raiffeisen (~17%)"
        ubs_opportunity: "Digitalkanal für Wachstum nutzen"

  first_mover_window:
    estimate: "12-18 Monate"
    basis: |
      ZKB hat interne KI-Kapazität, braucht aber Zeit für kund:innenseitigen Launch.
      Raiffeisen ist 1-2 Jahre zurück. Kantonalbanken sind konservativ.
      Helvetia/MoneyPark hat Clara (Versicherung), könnte auf Hypotheken erweitern.
    risk: "MITTEL — ZKB ist der wahrscheinlichste schnelle Follower"

# =============================================================================
# 2. TRAVEL-eSIM — WETTBEWERBSLANDSCHAFT
# =============================================================================

esim_competitors:

  market_overview: |
    Der Travel-eSIM-Markt wird von Pure-Play-Anbietern (Airalo, Holafly, Saily) dominiert.
    KRITISCHE Entwicklung: Neobanken (N26, Revolut) integrieren eSIM in ihre Banking-Apps.
    N26 lancierte Juli 2025 als ERSTE Digitalbank ein In-App-eSIM.
    Revolut folgte mit vollständigen MVNO-Plänen.
    → Direkte Referenzmodelle für UBS.

  pure_esim_providers:

    - name: "Airalo"
      type: "pure_esim_marketplace"
      founded: 2019
      users: "20+ Mio."
      countries: 200
      pricing: "USD 3.43 - 158.51"
      unlimited_plans: false
      app_rating_ios: 4.3
      app_rating_android: 4.0
      unique_features: ["Grösster eSIM-Marktplatz", "AirMoney Loyalty", "B2B API (Airalo Partners)"]
      limitations: ["Keine Unlimited-Pläne", "Neuinstallation auf neuem Gerät = Neukauf"]
      ubs_relevance: "HOCH"
      note: |
        Marktführer und Benchmark. Airalo Partners B2B-API könnte als Infrastruktur
        für UBS eSIM dienen (White-Label). Differenzierung: UBS = Trust + Integration.

    - name: "Holafly"
      type: "pure_esim_provider"
      founded: 2017
      countries: 200
      pricing: "Ab USD 5.90/Tag unlimited"
      unlimited_plans: true
      app_rating_ios: 4.6
      trustpilot: "4.6 (79'108 Reviews)"
      unique_features: ["Unlimited Daten (alle Pläne)", "Telefonnummer inkl. (seit Nov 2025)", "24/7 WhatsApp Support"]
      limitations: ["Fair Usage Policy: Drosselung nach 3-5GB/Tag", "Teurer bei gedeckelten Plänen"]
      ubs_relevance: "HOCH"
      note: |
        Starke Unlimited-Positionierung und hohe Bewertungen. Bedrohung falls UBS
        Datenlimits hat. UBS-Differenzierung: Keine Drosselung + Swiss Quality.

    - name: "Saily (Nord Security / NordVPN)"
      type: "pure_esim_provider"
      founded: 2024
      countries: 202
      pricing: "Ab USD 1.79/GB"
      unlimited_plans: true
      unique_features: ["Eingebauter VPN", "Werbeblocker (-28.6% Datenverbrauch)", "NordVPN/NordPass-Bundle"]
      ubs_relevance: "MITTEL"
      note: |
        Security-fokussierte Positionierung. Interessant für Geschäftsreisende.
        UBS differenziert durch Banking-Integration vs. Security-Fokus.

  neobank_esim_reference_models:
    description: |
      N26 und Revolut sind DIREKTE Referenzmodelle für UBS.
      Sie zeigen: Banken, denen Kund:innen mit Geld vertrauen,
      wird auch bei Konnektivität vertraut.

    - name: "N26"
      type: "neobank_with_esim"
      esim_launch: "Juli 2025"
      integration: "Direkt in Banking-App (ERSTE Digitalbank)"
      countries: "24 EU + 100+ Reiseziele"
      pricing: "Ab EUR 1.79/GB"
      key_feature: "Aktiviert automatisch bei Ankunft am Reiseziel"
      travel_cashback: "1% auf internationale POS-Transaktionen (Go/Metal)"
      ubs_relevance: "KRITISCH"
      learning: |
        N26 zeigt: In-App-eSIM ohne zweite App = tiefste Friction.
        UBS MUSS dieses Integrationslevel mindestens erreichen.

    - name: "Revolut"
      type: "neobank_with_esim"
      esim_launch: "2024"
      integration: "In Revolut Super-App"
      countries: "100+"
      evolution: "Von eSIM zu vollem MVNO (Mobilfunkanbieter)"
      key_insight: "eSIM ist #1 Nicht-Banking-Produkt nach Nutzung"
      ubs_relevance: "KRITISCH"
      learning: |
        Revolut zeigt: «Wer mir sein Geld anvertraut, vertraut mir auch sein Telefon an.»
        eSIM als Einstiegsprodukt → Cross-Sell zu weiteren Reise-Services.

  swiss_telco_gap:
    description: |
      Stand Februar 2026 bietet KEINER der drei Schweizer Mobilfunkanbieter
      (Swisscom, Sunrise, Salt) eSIMs für Tourist:innen an. Nur Postpaid-Vertragskund:innen.
      → UBS Travel-eSIM füllt eine echte Marktlücke.
    operators:
      swisscom: "eSIM nur für Postpaid-Vertragskund:innen"
      sunrise: "eSIM nur für Postpaid-Vertragskund:innen"
      salt: "eSIM nur für Postpaid-Vertragskund:innen"
    tourist_esim: "NICHT verfügbar (nur physische Prepaid-SIM am Flughafen)"

  market_data:
    consumer_willingness_bank_esim_premium: "64%"
    source: "YouGov Survey 2025"
    interpretation: |
      64% der potenziellen Neobank-Wechsler:innen würden einen Aufpreis für
      eSIM von ihrer Bank zahlen. → Starke Zahlungsbereitschaft.

# =============================================================================
# 3. UBS DIFFERENZIERUNGSSTRATEGIE
# =============================================================================

ubs_differentiation:

  mortgage_gpt:
    primary_differentiator: "Einziger kund:innenseitiger KI-Hypotheken-Chatbot in CH"
    secondary_differentiators:
      - "key4-Ökosystem (Homegate, Houzy) als Daten-Backbone"
      - "Multi-Kreditgeber-Tranchensplitting + KI-Empfehlung"
      - "Berater-Handoff nach KI-Erstberatung (gamma_ai_human = 0.35)"
      - "24/7-Verfügbarkeit vs. Bürozeiten-Beratung"
    positioning: "'Der erste KI-Hypothekenberater der Schweiz'"
    risk: "ZKB als schneller Follower (12-18 Monate Fenster)"

  esim:
    primary_differentiator: "Banken-Trust + In-App-Integration"
    bank_unique_advantages:
      - advantage: "Transaktionsgetriggerte Angebote"
        pure_esim_can_match: false
        detail: "Bank sieht Flug-/Hotelbuchung → proaktives eSIM-Angebot"
      - advantage: "Bündelung mit Finanzprodukten"
        pure_esim_can_match: false
        detail: "Gratis-eSIM mit Premium-Kreditkarte, Hypothekenabschluss-Geschenk"
      - advantage: "Schweizer regulatorisches Vertrauen"
        pure_esim_can_match: false
        detail: "FINMA-reguliert vs. unregulierte eSIM-Startups"
      - advantage: "Single-App-Ökosystem"
        pure_esim_can_match: false
        detail: "Banking + Investing + eSIM in einer App"
      - advantage: "Physische Filiale als Fallback"
        pure_esim_can_match: false
        detail: "Bei Problemen: UBS-Filiale vs. Airalo-Email-Support"
      - advantage: "Corporate/Wealth-Bündelung"
        pure_esim_can_match: false
        detail: "Wealth-Management-Kund:innen erhalten Premium-eSIM als Beziehungsperk"
      - advantage: "Cross-Sell-Engine"
        pure_esim_can_match: false
        detail: "eSIM-Nutzungsdaten informieren Reiseversicherung, FX, Kreditkarten-Angebote"
    positioning: "'Alles für Ihre Reise — in einer App'"

# =============================================================================
# 4. SURVEY-IMPLIKATIONEN DES WETTBEWERBSKONTEXTS
# =============================================================================

survey_implications:

  mortgage_gpt:
    - implication: "Kein Wettbewerber-Vergleich nötig (Marktlücke)"
      survey_action: "Fragen fokussieren auf GENERELLE KI-Akzeptanz, nicht Wettbewerbervergleich"
      questions_affected: ["Q_M04", "Q_M05", "Q_M06"]

    - implication: "MoneyPark/Comparis als Journey-Startpunkt"
      survey_action: "Kanalidentifikation (Q_M01) muss Vergleichsplattformen erfassen"
      questions_affected: ["Q_M01"]

    - implication: "Berater-Handoff ist Wettbewerbsvorteil"
      survey_action: "Q_M15 (Berater-Gespräch) misst direkte Conversion UND Differenzierung"
      questions_affected: ["Q_M15"]

  esim:
    - implication: "Airalo/Holafly als bekannte Alternative"
      survey_action: "Q_E02 (aktuelle Lösung) muss eSIM-Anbieter als Option enthalten"
      questions_affected: ["Q_E02"]

    - implication: "N26/Revolut als Referenzmodelle zeigen Machbarkeit"
      survey_action: "Falls Befragte N26/Revolut kennen: höhere Akzeptanz erwartet"
      questions_affected: ["Q_E03", "Q_E09"]

    - implication: "Preis-Benchmark existiert (Airalo ~CHF 4-7/Tag)"
      survey_action: "Q_E06 (WTP) Optionen müssen wettbewerbsfähig kalibriert sein"
      questions_affected: ["Q_E06"]

    - implication: "Trust als USP validieren"
      survey_action: "Q_E05 (Data Trust) misst den KERN der UBS-Differenzierung"
      questions_affected: ["Q_E05"]

    - implication: "In-App vs. Landing Page Differenz"
      survey_action: |
        Q_E07 (In-App-Nützlichkeit) validiert B2-Hypothese:
        Pilot (Landing Page) = 75% der finalen Adoption.
        Wenn Q_E07 hoch → bestätigt 1.33× Multiplikator.
      questions_affected: ["Q_E07"]
