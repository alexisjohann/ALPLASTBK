# =============================================================================
# FRAGENFUEHRUNG: Wie wir durch die 11 Antworten navigieren
# =============================================================================
# Der rote Faden durch die Demo. Jede Karte wird nicht isoliert praesentiert,
# sondern als Teil eines NARRATIV-BOGENS, der UBS durch drei Einsichten fuehrt:
#
#   1. Das Modell liefert klare Antworten, wo die Evidenz stark ist
#   2. Das Modell sagt ehrlich, wo es unsicher ist — und warum
#   3. Das Modell zeigt GENAU, welche Daten die Unsicherheit aufloesen
#
# Created: 2026-02-25
# Depends on: DEMO_antwort_karten.yaml, DEMO_antwortstrategie.yaml, live_rechner.py
# =============================================================================

metadata:
  analysis_id: UBS-GMA-FLOW-001
  title: "Fragenfuehrung fuer UBS Demo-Session"
  type: presentation_flow
  created: "2026-02-25"
  total_dauer: "75-80 Minuten"

# =============================================================================
# DER NARRATIV-BOGEN: DREI AKTE
# =============================================================================
# Die Demo erzaehlt eine Geschichte in drei Akten.
# Jeder Akt hat eine klare Botschaft und ein emotionales Ziel.

narrativ_bogen:

  akt_1:
    name: "DAS MODELL FUNKTIONIERT"
    karten: [M1, M2, M3]
    ampel: "🟢🟢🟢"
    dauer: "~8 min"
    botschaft: |
      Drei gruene Antworten hintereinander. UBS erlebt:
      «Die koennen klare Aussagen machen, mit Evidenz.»
    emotionales_ziel: "Vertrauen aufbauen"

  akt_2:
    name: "DAS MODELL IST EHRLICH"
    karten: [M4, M5, M7, M6]
    ampel: "🟡🟡🟡🔴"
    dauer: "~14 min + Power Move"
    botschaft: |
      Gelb zeigt: Die Richtung stimmt, die Praezision haengt von UBS-Daten ab.
      Rot zeigt: Hier wissen wir es NICHT — und das ist ehrlich.
      Dazwischen: Live-Recalculation beweist Modellflexibilitaet.
    emotionales_ziel: "Glaubwuerdigkeit staerken"

  akt_3:
    name: "DAS MODELL UEBERRASCHT"
    karten: [E1, E2, E3, E4]
    ampel: "🟢🟡🔴🟡"
    dauer: "~13 min"
    botschaft: |
      eSIM zeigt den Kontrast: Gleiche Methode, anderes Ergebnis.
      Markt kleiner als gedacht. Adoption unsicher. Aber: klarer Pfad.
    emotionales_ziel: "Respekt fuer die Methode, nicht nur die Ergebnisse"

# =============================================================================
# VOLLSTAENDIGER ABLAUF MIT UEBERGAENGEN
# =============================================================================

ablauf:

  # ─────────────────────────────────────────────────────────────────────────
  # INTRO: Was BEATRIX ist (bevor die Karten starten)
  # ─────────────────────────────────────────────────────────────────────────

  intro:
    dauer: "8-10 min"
    sprecher: "FehrAdvice Lead"
    inhalt: |
      Nicht mit Technik anfangen. Mit dem PROBLEM anfangen:

      «Sie stehen vor zwei Entscheidungen:
      1. Sollen Sie einen Mortgage GPT launchen?
      2. Soll UBS eSIM anbieten?

      Beide Fragen klingen einfach. Beide sind es nicht.

      Denn die Antwort haengt nicht von EINER Zahl ab, sondern von einem
      Zusammenspiel aus Kundenpsychologie, Marktdaten und Produktdesign.

      Wir haben beides mit BEATRIX durchmodelliert. Was wir Ihnen jetzt
      zeigen, ist nicht eine Praesentation mit fertigen Antworten.
      Es ist ein DENKMODELL, das Ihnen zeigt:
      - Wo die Evidenz stark genug fuer eine klare Empfehlung ist  🟢
      - Wo wir die Richtung kennen, aber die Groesse noch nicht   🟡
      - Wo wir es ehrlich nicht wissen — und was man tun muesste   🔴

      Dieses Ampelsystem werden Sie bei jeder Antwort sehen.
      Es ist kein Zeichen von Schwaeche — es ist die Art, wie gute
      Entscheidungen getroffen werden: mit kalibrierter Unsicherheit.»

    ueberleitung_zu_M1: |
      «Fangen wir mit der ersten Frage an — und gleich mit einer gruenen:
      Werden Ihre Kund:innen den Mortgage GPT ueberhaupt nutzen?»

  # ─────────────────────────────────────────────────────────────────────────
  # AKT 1: DAS MODELL FUNKTIONIERT (3 × 🟢)
  # ─────────────────────────────────────────────────────────────────────────

  schritt_01_M1:
    karte: M1_adoption
    ampel: "🟢"
    dauer: "3 min"
    kern_aussage: |
      «Ja, sie werden es nutzen — Grand Mean 4.65/7, nur 2% Scheiterns-Risiko.
      ABER: nur mit Modifizierbarkeit. Ohne sinkt die Akzeptanz auf 3.7.
      Das ist keine KI-Frage. Das ist eine DESIGN-Frage.»

    was_betonen: |
      - Die Evidenz ist STARK (Dietvorst 3× repliziert, Silber meta-analytisch)
      - Modifizierbarkeit ist der Schluessel — nicht KI ja/nein
      - Das Ergebnis ist ACTIONABLE: Modifizierbarkeit einbauen → Problem geloest

    was_NICHT_betonen: |
      - Absolute Zahlen (die koennen sich mit UBS-Daten aendern)
      - Technische Details des Monte Carlo
      - Vergleiche mit anderen Banken

    ueberleitung_zu_M2: |
      «Das ist die gute Nachricht. Jetzt die wichtigere Frage:
      Was passiert, wenn der GPT einen Fehler macht?
      Denn bei CHF 750'000 Hypotheken gibt es keinen zweiten Versuch.»

    timing_hinweis: |
      M1 ist der OPENER. Hier setzen wir den Ton: Klar, evidenzbasiert,
      actionable. UBS soll nach 3 Minuten denken: «Die haben das
      strukturiert durchdacht.»

  schritt_02_M2:
    karte: M2_error_recovery
    ampel: "🟢"
    dauer: "3 min"
    kern_aussage: |
      «Ein einziger GPT-Fehler senkt das Vertrauen um 40%.
      72% Risiko unter der roten Schwelle — nach EINEM Fehler.
      Error Prevention ist nicht ein Feature. Es ist DIE Voraussetzung.»

    was_betonen: |
      - Die ASYMMETRIE: Vertrauen aufbauen = langsam, Vertrauen zerstoeren = sofort
      - Das ist kein UBS-Problem, das ist ein MENSCHLICHES Muster
      - Vier konkrete Error-Prevention-Massnahmen (Ranges, Disclaimer, Handoff, Complexity Routing)

    was_NICHT_betonen: |
      - Dass die 40% aus allgemeinen AI-Studien kommen (stimmt, aber lenkt ab)
      - Recovery-Geschwindigkeit (wissen wir nicht genau genug)

    ueberleitung_zu_M3: |
      «Gut — Fehler vermeiden ist Prioritaet eins. Aber hier kommt eine Frage,
      die UBS regulatorisch beantworten MUSS: Sollen Sie die KI offenlegen?
      Die ueberraschende Antwort: Ja — und es kostet Sie fast nichts.»

    timing_hinweis: |
      M2 erzeugt ein leichtes «oh» — nach der positiven M1 kommt jetzt das
      Risiko-Bewusstsein. Aber wir loesen es sofort auf (4 Massnahmen).
      Das zeigt: BEATRIX identifiziert Probleme UND loest sie.

  schritt_03_M3:
    karte: M3_disclosure
    ampel: "🟢"
    dauer: "2 min"
    kern_aussage: |
      «FINMA verlangt es, die Wissenschaft bestaetigt es, und der Nachteil
      ist minimal: nur -0.6 Punkte mit richtigem Framing.
      «Intelligenter Zinsrechner» performt fast gleich gut wie ohne Disclosure.
      Die Frage stellt sich nicht.»

    was_betonen: |
      - FINMA-Compliance ist Pflicht (regulatorisch keine Option)
      - Gute Nachricht: kein relevanter Akzeptanzverlust
      - Die Loesung ist einfach: Aufgabe betonen, nicht Technologie

    was_NICHT_betonen: |
      - Technische Details der FINMA-Guidance
      - Akademische Debatte um Algorithmic Transparency

    ueberleitung_zu_M4: |
      «Das fuehrt direkt zur naechsten Frage: WENN wir offenlegen — wie genau?
      Denn der NAME des Produkts beeinflusst die Akzeptanz messbar.
      Und hier wird es zum ersten Mal gelb — wir kennen die Richtung,
      aber die genaue Staerke muss noch validiert werden.»

    timing_hinweis: |
      M3 ist kurz (2 min) und schliesst den 🟢-Block ab. Drei gruene
      Antworten hintereinander — UBS hat jetzt Vertrauen in die Methode.
      Der Uebergang zu 🟡 muss ERKLAERT werden: «Gelb heisst nicht
      schlecht — es heisst: Richtung klar, Praezision folgt.»

  # ─────────────────────────────────────────────────────────────────────────
  # AMPEL-WECHSEL ERKLAEREN
  # ─────────────────────────────────────────────────────────────────────────

  ampelwechsel_gruen_zu_gelb:
    dauer: "30 Sekunden"
    text: |
      «Ab jetzt werden Sie auch gelbe Ampeln sehen. Das heisst:
      Wir kennen die RICHTUNG — z.B. «objektiv framen ist besser» —
      aber die GENAUE GROESSE muss noch mit UBS-Daten kalibriert werden.
      Gelb ist kein Alarmsignal. Gelb heisst: noch ein Schritt, und
      es wird gruen.»

  # ─────────────────────────────────────────────────────────────────────────
  # AKT 2: DAS MODELL IST EHRLICH (3 × 🟡 + 1 × 🔴)
  # ─────────────────────────────────────────────────────────────────────────

  schritt_04_M4:
    karte: M4_framing
    ampel: "🟡"
    dauer: "3 min"
    kern_aussage: |
      «Objektiv framen schlaegt subjektiv framen — das ist klar.
      «Intelligenter Zinsrechner» statt «KI-Berater».
      Der genaue Effekt bei Hypotheken? Noch nicht getestet — darum gelb.
      Aber: Das laesst sich im Survey miterheben, ohne Mehrkosten.»

    was_betonen: |
      - Die Logik HINTER dem Framing (Aufgabe = objektiv → Algorithmus akzeptiert)
      - Die Empfehlung ist klar, auch wenn der Effekt noch quantifiziert werden muss
      - Der naechste Schritt ist GRATIS (im Survey integrierbar)

    ueberleitung_zu_M5: |
      «Jetzt kommen wir zur Frage, die alle interessiert:
      Wie viel Geld bringt das? Und hier zeigen wir etwas, das den
      Unterschied zwischen BEATRIX und einer Beraterpraesentation macht.»

    timing_hinweis: |
      M4 ist die SANFTE EINFUEHRUNG in Gelb. Richtung klar, Unsicherheit
      gering, naechster Schritt einfach. Das bereitet vor auf M5, wo die
      Unsicherheit GROESSER wird — aber aus gutem Grund.

  schritt_05_M5:
    karte: M5_revenue
    ampel: "🟡"
    dauer: "4 min + POWER MOVE"
    kern_aussage: |
      «Median CHF 1.47 Mrd Neuvolumen pro Jahr. Klingt gut.
      Aber das CI geht von 0.55 bis 3.45 Mrd — Faktor 6×.
      Warum so breit? Weil eine MULTIPLIKATIVE KETTE die Unsicherheit
      potenziert. Das ist keine Modellschwaeche — das ist Mathematik.

      ABER — und jetzt wird es spannend — 38% dieser Unsicherheit
      kommt von EINEM Wert: Chatbot-Traffic. Den kennt UBS.»

    was_betonen: |
      - Die EHRLICHKEIT: Wir geben nicht eine schoene Punktschaetzung
      - Die STRUKTUR: WOHER kommt die Unsicherheit? (Tornado-Logik)
      - Die LOESUNG: Eine Zahl von UBS → CI verengt sich um 40%

    power_move_cue: |
      ★ HIER kommt der entscheidende Moment der Demo.

      «Wissen Sie zufaellig, wie viele Besucher Ihr Hypothekenrechner
      monatlich hat?»

      SZENARIO A — UBS nennt eine Zahl:
        → Laptop aufklappen: «Moment, das rechne ich kurz durch.»
        → python live_rechner.py --param monthly_leads=XXXX --compare
        → «Sehen Sie? Mit Ihrer Zahl veraendert sich das Bild sofort.
          Das CI wird enger. DAS passiert, wenn echte Daten ins Modell
          kommen. Stellen Sie sich vor, was passiert wenn wir ALLE
          UBS-Daten integrieren.»

      SZENARIO B — UBS kennt die Zahl nicht auf Anhieb:
        → «Kein Problem. Lassen Sie mich zeigen, WAS passiert wenn
          wir den Wert kennen:»
        → python live_rechner.py --param monthly_leads=3500 --compare
        → «Das ist ein Beispiel mit 3'500. Mit dem echten Wert verengt
          sich das Konfidenzintervall um geschaetzt 40%. Eine Zahl,
          ein E-Mail, 48 Stunden — und wir haben ein praeziseres Modell.»

      SZENARIO C — UBS hat eine kritische Rueckfrage zum Revenue:
        → «Guter Punkt. Welchen Wert wuerden SIE fuer [Parameter] ansetzen?»
        → Wert live einsetzen → sofort neues Ergebnis
        → «Sehen Sie: Das Modell reagiert auf Ihr Wissen. Es ersetzt
          Sie nicht — es integriert Sie.»

    ueberleitung_zu_M7: |
      «Das Revenue-Modell behandelt alle Kund:innen gleich. Aber das
      stimmt natuerlich nicht. Nicht jeder reagiert gleich auf einen
      KI-Hypothekenrechner. Das fuehrt zur naechsten Frage.»

    timing_hinweis: |
      M5 ist der LAENGSTE Moment — bis zu 8 Minuten mit Power Move.
      Das ist gewollt: Hier zeigt BEATRIX was es kann.
      WICHTIG: Der Power Move wirkt nur, wenn er BEILAEUFIG kommt.
      Nicht «und jetzt zeigen wir unseren Live-Rechner», sondern
      «Moment, das rechne ich kurz durch» — als waere es das
      natuerlichste der Welt.

  schritt_06_M7:
    karte: M7_segmente
    ampel: "🟡"
    dauer: "4 min"
    kern_aussage: |
      «Vier Segmente, 2.5 Punkte Spread. Tech-Savvy sind begeistert (5.4/7),
      Affluent Traditional lehnen ab (2.9/7). Ein einheitlicher Launch
      wuerde bei 30% brillieren und bei 20% backfiren.
      Die Segmentierung ist klar — die GROESSEN sind geschaetzt.»

    was_betonen: |
      - Der SPREAD ist die Botschaft (2.5 Punkte = riesig)
      - Vier verschiedene Strategien, nicht eine
      - Die Segmentierung basiert auf EINSTELLUNG, nicht Demografie

    was_NICHT_betonen: |
      - Genaue Segment-Anteile (30/25/20/25 sind Schaetzungen)
      - Technische Details der UTAUT2-Theorie

    ueberleitung_zu_M6: |
      «Und dann gibt es noch eine fuenfte Gruppe, die in keinem
      Segment-Modell auftaucht, weil sie ganz neu ist: die 800'000
      CS-Migrierten. Und hier muessen wir ehrlich sein — hier
      sehen Sie die erste rote Ampel.»

    timing_hinweis: |
      M7 VOR M6 ist bewusst. Die Segmente liefern den KONTEXT fuer
      die CS-Migrierten-Frage: «Die normalen Segmente verstehen wir.
      Aber diese Gruppe ist anders.»

  ampelwechsel_gelb_zu_rot:
    dauer: "20 Sekunden"
    text: |
      «Rot heisst: Wir koennen das heute nicht belastbar beantworten.
      Und das BEWUSST zu sagen ist Teil des Wertes.
      Denn wenn jemand Ihnen hier eine gruene Zahl gibt,
      dann luegt er — oder er weiss nicht, dass er lügt.»

  schritt_07_M6:
    karte: M6_cs_migrierte
    ampel: "🔴"
    dauer: "3 min"
    kern_aussage: |
      «800'000 CS-Migrierte starten mit niedrigerem UBS-Trust.
      Das beeinflusst die GANZE Kaskade — nicht nur etwas weniger,
      sondern STRUKTURELL anders.

      Unser Prior sagt: -1.7 Punkte Trust. Aber das ist eine
      Schaetzung, kein Fakt. Wir MARKIEREN das bewusst als rot.»

    was_betonen: |
      - Die EHRLICHKEIT: Wir sagen «wir wissen es nicht» statt zu raten
      - Der GRUND warum: Keine Vergleichsdaten (CS→UBS Migration ist einmalig)
      - Der WEG ZUM WISSEN: NPS-Erhebung, 2 Wochen, CHF 5'000 → dann gruen

    was_NICHT_betonen: |
      - Konkrete Szenarien-Zahlen als «wahrscheinlich» darstellen
      - Vergleiche mit anderen Bank-Migrationen (gibt es kaum)

    rhetorische_pointe: |
      «Paradoxerweise STAERKT das unsere Glaubwuerdigkeit.
      Denn jetzt wissen Sie: Wenn wir gruen sagen, MEINEN wir gruen.
      Wir sagen nicht einfach bei allem «ja, klar».
      Wir sagen: Hier ja, dort noch nicht — und so kommen wir hin.»

    ueberleitung_zu_esim: |
      «Das war Mortgage GPT — die ueberwiegende Evidenz sagt GO,
      mit drei klaren Bedingungen: Modifizierbarkeit, Error Prevention,
      und CS-Migrierte separat behandeln.

      Jetzt zu eSIM. Und hier sieht das Bild BEWUSST anders aus.
      Nicht weil eSIM schlecht ist — sondern weil die Datenlage anders ist.»

  # ─────────────────────────────────────────────────────────────────────────
  # BLOCK-WECHSEL: MORTGAGE → eSIM
  # ─────────────────────────────────────────────────────────────────────────

  blockwechsel:
    dauer: "30 Sekunden"
    text: |
      «Warum zeigen wir Ihnen beide Themen? Weil der KONTRAST
      die Methode zeigt: Gleiche Maschine, gleicher Rigor —
      unterschiedliche Ergebnisse. Bei Mortgage sind wir bei 80% gruen.
      Bei eSIM? Viel weniger. Und das ist GENAU die Information,
      die Sie brauchen, um Ihr Budget richtig zu allokieren.»

  # ─────────────────────────────────────────────────────────────────────────
  # AKT 3: DAS MODELL UEBERRASCHT (🟢🟡🔴🟡)
  # ─────────────────────────────────────────────────────────────────────────

  schritt_08_E1:
    karte: E1_marktgroesse
    ampel: "🟢"
    dauer: "3 min"
    kern_aussage: |
      «63'000 Nutzer. Nicht 200'000. Warum? Weil EU-Reisende kein eSIM
      brauchen (Free Roaming). Das alleine halbiert die Basis.
      Revenue: ~CHF 1.4 Mio/Jahr. Das ist <0.1% des Mortgage-Volumens.»

    was_betonen: |
      - Die UEBERRASCHUNG: Markt ist 3× kleiner als implizit angenommen
      - Das «warum» ist einfach und ueberzeugend (Free Roaming Filter)
      - Aber: strategischer Wert ≠ Revenue-Wert (Engagement, Cross-Sell)

    rhetorische_pointe: |
      «Das ist der Moment, wo Sie sehen: BEATRIX erzaehlt Ihnen nicht
      was Sie hoeren wollen. Es erzaehlt Ihnen, was die Daten sagen.
      63'000 ist kein schlechtes Ergebnis — es ist ein EHRLICHES Ergebnis.
      Und damit koennen Sie bessere Entscheidungen treffen als mit 200'000
      die auf einer Serviette stehen.»

    ueberleitung_zu_E2: |
      «Das Revenue ist klein. Heisst das, eSIM ist wertlos? Nicht
      unbedingt. Es kommt darauf an, ob eSIM zur UBS-Marke PASST.
      Denn ein Produkt das nicht zum Brand passt, schadet — egal
      ob gratis oder profitabel.»

  schritt_09_E2:
    karte: E2_brand_fit
    ampel: "🟡"
    dauer: "3 min"
    kern_aussage: |
      «Brand Fit: 4.1/7 — gelbe Zone. Bank→Telco ist kein natuerlicher Fit.
      ABER: Mit Travel-Ecosystem-Framing → 4.8 (gruen).
      Mit Co-Branding → 5.1 (sicher).
      Der Fit ist nicht natuerlich — er muss GESTALTET werden.»

    was_betonen: |
      - Orange Bank als warnendes Beispiel (gescheitert 2024)
      - Die Loesung: Framing als Reise-Ecosystem, nicht als Telco-Produkt
      - Co-Branding reduziert Reputationsrisiko

    ueberleitung_zu_E3: |
      «Der Fit laesst sich loesen. Aber dann bleibt die haerteste Frage:
      Werden UBS-Kund:innen es tatsaechlich NUTZEN? Und hier wird es
      zum zweiten Mal rot.»

  schritt_10_E3:
    karte: E3_adoption
    ampel: "🔴"
    dauer: "4 min"
    kern_aussage: |
      «71% der Unsicherheit kommt von EINEM Parameter: der
      Psi-Transformation (Pilot → Full Launch). Und den kennen wir nicht.

      Drei Szenarien — alle plausibel:
      Szenario A: 3.6/7 → GO fraglich
      Szenario B: 5.0/7 → klares GO
      Szenario C: 6.1/7 → excellenter Launch

      Ein Spread von 2.5 Punkten. Das ist der Unterschied zwischen
      einem Success und einem Flop.»

    was_betonen: |
      - Ein Parameter erklaert 71% — das ist KLAR, nicht vage
      - Der Spread zwischen Szenarien ist RIESIG (3.6 vs 6.1)
      - Die Loesung: Soft-Launch mit 5'000 Kund:innen, CHF 50K, 4 Wochen

    rhetorische_pointe: |
      «Das ist der Punkt: Wir koennten Ihnen eine schoene Zahl geben.
      Wir koennen Ihnen auch sagen, dass wir es nicht wissen.
      Oder wir koennen Ihnen sagen: Fuer CHF 50K und 4 Wochen
      WISSEN wir es. Bevor Sie CHF 2 Mio investieren.
      DAS ist informierte Entscheidungsfindung.»

    ueberleitung_zu_E4: |
      «Angenommen, UBS entscheidet sich fuer eSIM — wie sollte der
      Launch dann aussehen? Das koennen wir angeben.»

  schritt_11_E4:
    karte: E4_launch_strategie
    ampel: "🟡"
    dauer: "3 min"
    kern_aussage: |
      «Vier Hebel: Co-Branding, Travel-Ecosystem-Framing, Non-EU-Fokus,
      Risk-Reduction-Messaging. Die Konfiguration ist klar — die
      genaue Wirkung muss im Pilot bestaetigt werden.»

    was_betonen: |
      - Die 4 Hebel sind ACTIONABLE und TESTBAR
      - Non-EU-Fokus eliminiert 54% des «Kein-Bedarf»-Segments
      - Die Empfehlung schliesst den Kreis: Pilot zuerst, dann skalieren

    timing_hinweis: |
      E4 ist der ABSCHLUSS des Inhaltsblocks. Die Karte muss kurz und
      konstruktiv sein — nicht mit neuer Unsicherheit enden, sondern
      mit einem klaren Pfad.

  # ─────────────────────────────────────────────────────────────────────────
  # SYNTHESE: Die drei Botschaften
  # ─────────────────────────────────────────────────────────────────────────

  synthese:
    dauer: "5 min"
    sprecher: "FehrAdvice Lead"
    inhalt: |

      «Lassen Sie mich zusammenfassen, was Sie gerade gesehen haben.

      ┌──────────────────────────────────────────────────────────────────┐
      │  MORTGAGE GPT                                                    │
      │  🟢🟢🟢🟡🟡🟡🔴                                                  │
      │                                                                  │
      │  Empfehlung: GO — mit drei Bedingungen:                          │
      │  1. Modifizierbarkeit einbauen (DESIGN-Entscheidung, kein Geld)  │
      │  2. Error Prevention als Prioritaet #1 im Produktdesign          │
      │  3. CS-Migrierte separat behandeln (erst messen, dann launchen)  │
      │                                                                  │
      │  Revenue-Potential: substantiell, praezisierbar mit einer Zahl   │
      └──────────────────────────────────────────────────────────────────┘

      ┌──────────────────────────────────────────────────────────────────┐
      │  eSIM                                                            │
      │  🟢🟡🔴🟡                                                        │
      │                                                                  │
      │  Empfehlung: TESTEN — nicht blind launchen.                      │
      │  1. Markt ist 3× kleiner als gedacht (63K, nicht 200K)           │
      │  2. Strategischer Wert > Revenue-Wert                            │
      │  3. Soft-Launch CHF 50K → Go/No-Go mit 95% Konfidenz            │
      └──────────────────────────────────────────────────────────────────┘

      Das ist der Unterschied: Nicht zwei mal «ja, machen wir», sondern
      einmal «ja, investieren» und einmal «erst testen, dann entscheiden».
      UND — und das ist entscheidend — wir sagen Ihnen GENAU, welche
      Daten die offenen Fragen loesen.»

  # ─────────────────────────────────────────────────────────────────────────
  # METHODEN-BLOCK: Wie BEATRIX fuer UBS arbeiten wuerde
  # ─────────────────────────────────────────────────────────────────────────

  methoden_block:
    dauer: "8-10 min"
    inhalt: |

      «Was Sie gesehen haben, basiert auf OEFFENTLICHEN Daten und
      wissenschaftlicher Literatur. Stellen Sie sich vor, was passiert,
      wenn UBS-eigene Daten dazukommen.»

    punkt_1_bayesian:
      name: "Bayesian Update"
      text: |
        «Sie haben den Live-Rechner gesehen: Eine Zahl von UBS
        veraendert sofort das Ergebnis. Das Modell LERNT.
        Je mehr Daten, desto enger die Konfidenzintervalle.

        Heute: 🟢🟢🟢🟡🟡🟡🔴 🟢🟡🔴🟡
        Mit UBS-Daten: Mehr Gruen, weniger Rot. Nicht durch Magie —
        durch Mathematik.»

    punkt_2_priorisierung:
      name: "Daten-Priorisierung"
      text: |
        «Nicht alle Daten sind gleich wichtig. Die Tornado-Analyse
        zeigt GENAU, welche Zahl den groessten Hebel hat:
        - Mortgage: Monthly Leads (38% der Varianz)
        - eSIM: Psi-Transformation (71% der Varianz)

        Zwei Datenpunkte. Nicht 200 KPIs. ZWEI.
        Damit werden 4 der 5 gelben Ampeln gruen.»

    punkt_3_timeline:
      name: "Timeline"
      text: |
        «In 6 Wochen von hier zu einer Go/No-Go Empfehlung:
        Woche 1-2: UBS liefert 5 Datenpunkte
        Woche 3-4: Modell-Update + Survey-Design
        Woche 5-6: Survey-Ergebnisse → finale Empfehlung

        Kosten: ~CHF 35'000 (Survey + Analyse).
        Das ist 0.002% des Mortgage-Potentials.»

  # ─────────────────────────────────────────────────────────────────────────
  # DISKUSSION: Q&A
  # ─────────────────────────────────────────────────────────────────────────

  diskussion:
    dauer: "15-20 min"
    vorbereitung: |
      In der Diskussion gelten drei Regeln:

      REGEL 1: Jede Antwort folgt dem 5-Schritt-Template
        Einordnung → Modell → Parameter → Ergebnis → Naechster Schritt

      REGEL 2: Bei jeder «Was wenn...?»-Frage sofort Live-Rechner anbieten
        «Guter Punkt. Welchen Wert wuerden Sie ansetzen? [Tippt] ...sehen Sie?»

      REGEL 3: Bei jedem Zweifel → Daten anbieten, nicht verteidigen
        «Sie haben Recht, da fehlen UBS-Daten. Mit [Datenpunkt X] wird das gruen.»

    erwartete_fragen:

      - frage: "Wie zuverlaessig sind die Zahlen?"
        antwort_strategie: |
          → Ampel-System erklaeren: Gruen = belastbar, Gelb = Richtung klar,
          Rot = Szenarien. Die Zuverlaessigkeit ist TRANSPARENT — das ist
          der Unterschied zu einer Beraterpraesentation mit nur gruenen Zahlen.

      - frage: "Was muesste UBS als erstes liefern?"
        antwort_strategie: |
          → Die TOP-3 Datenpunkte:
          1. Monthly Leads Hypothekenrechner (loest 38% Revenue-Unsicherheit)
          2. NPS CS-Migrierte (macht M6 von rot zu gelb/gruen)
          3. Segment-Groessen aus CRM (schaerft M7)
          «Drei E-Mails. Dann sieht das Modell fundamental anders aus.»

      - frage: "Wieviel kostet eine Zusammenarbeit?"
        antwort_strategie: |
          → Nicht mit Preis fuehren, sondern mit Wert:
          «Die Frage ist nicht was es kostet, sondern was es SPART.
          Eine falsche eSIM-Investition von CHF 2 Mio vermeiden lohnt sich.
          Ein Mortgage GPT ohne Error Prevention kann die Brand beschaedigen.
          Das Modell schuetzt vor teuren Fehlern — und identifiziert guenstige Hebel.»

      - frage: "Machen das andere Banken auch?"
        antwort_strategie: |
          → Nicht Konkurrenten nennen (Vertraulichkeit).
          «Wir arbeiten mit mehreren Finanzinstituten im DACH-Raum.
          Was wir sagen koennen: Die Methodik ist erprobt. Der Ansatz —
          evidenzbasierte Entscheidungsarchitektur statt Bauchgefuehl —
          wird zum Standard in der Branche.»

      - frage: "Koennen wir das intern auch?"
        antwort_strategie: |
          → Ehrlich: Teilweise ja, teilweise nein.
          «Die Datenerhebung koennen Sie intern machen. Die MODELLIERUNG
          erfordert Spezialisierung: 2'400 Papers, kalibrierte Parameter,
          Monte-Carlo-Simulation mit Bayesian Updating. Das ist unser
          Kerngeschaeft — wie eine Anwaltskanzlei fuer Verhaltens-oekonomie.»

