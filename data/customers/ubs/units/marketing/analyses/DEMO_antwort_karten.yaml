# =============================================================================
# ANTWORT-KARTEN: 18 vorformulierte Demo-Antworten
# =============================================================================
# Jede Karte folgt dem 5-Schritt-Template:
#   1. Einordnung (🟢🟡🔴)
#   2. Modell (Wie wir rangegangen sind)
#   3. Parameter (Worauf die Zahlen basieren)
#   4. Ergebnis (Was das Modell sagt)
#   5. Naechster Schritt (Was UBS tun kann)
#
# Created: 2026-02-25
# Depends on: SIM v1.1, IMP v1, MC, DEMO_antwortstrategie
# =============================================================================

metadata:
  analysis_id: UBS-GMA-CARDS-001
  title: "18 Antwort-Karten fuer UBS Demo-Session"
  type: presentation_cards
  created: "2026-02-25"
  usage: |
    Jede Karte ist eine in sich geschlossene Antwort auf eine UBS-Frage.
    Der Presenter liest die Karte vor oder paraphrasiert sie.
    Zeitbudget pro Karte: 3-5 Minuten (inkl. Diskussion).

# =============================================================================
# MORTGAGE GPT — 7 KARTEN
# =============================================================================

karten:

  # ═══════════════════════════════════════════════════════════════════════════
  # KARTE M1: Werden Kund:innen den Mortgage GPT nutzen?
  # ═══════════════════════════════════════════════════════════════════════════

  M1_adoption:
    frage: "Werden UBS-Kund:innen den Mortgage GPT nutzen?"
    modus: "🟢 BELASTBAR"
    zeit: "3 min"
    block: "Mortgage GPT"

    einordnung: |
      Diese Frage koennen wir belastbar beantworten. Der zentrale Mechanismus —
      dass Modifizierbarkeit die Algorithm Aversion ueberwindet — ist einer der
      best-replizierten Befunde der letzten zehn Jahre.

    modell: |
      Wir haben das ueber drei Faktoren modelliert:

      FAKTOR 1 — Algorithm Aversion: Menschen lehnen algorithmische Empfehlungen
      ab, NACHDEM sie einen Fehler sehen — selbst wenn der Algorithmus besser ist
      als menschliche Berater. Das ist kein irrationales Verhalten, sondern ein
      asymmetrischer Vertrauensmechanismus.

      FAKTOR 2 — Modifizierbarkeit: Wenn Nutzer:innen das Ergebnis ANPASSEN
      koennen (z.B. Risikobereitschaft, Laufzeit), steigt die Akzeptanz dramatisch.
      Nicht weil sie bessere Anpassungen machen, sondern weil das Gefuehl von
      Kontrolle den Widerstand gegen den Algorithmus aufloest.

      FAKTOR 3 — Framing: Ob der GPT als «KI-Berater» oder als «Intelligenter
      Zinsrechner» vorgestellt wird, beeinflusst die initiale Akzeptanz.

    parameter: |
      Unsere Zahlen basieren auf:
      • Dietvorst, Simmons & Massey (2015, 2018) — 3× repliziert, N=402+
        «Algorithm Aversion»: d = 0.85 → Effekt ist GROSS und stabil
      • Silber et al. (2025) — meta-analytisch, N=4'500
        Modifiability-Effekt: +1.3 Punkte auf 7er-Skala
      • Castelo et al. (2019) — «objektiv» Framing > «subjektiv» Framing
      • 10'000 Monte-Carlo-Draws ueber 27 Parameter

      Am unsichersten: delta_AI (generelles AI-Trust-Niveau) — die Richtung
      ist klar, die exakte Staerke bei Hypotheken muss kalibriert werden.

    ergebnis: |
      Grand Mean: 4.65 / 7 (95% CI: [3.99, 5.30])
      Risiko unter Rot-Schwelle (3.5): nur 2%

      ABER — und das ist der entscheidende Punkt:
      MIT Modifizierbarkeit: 5.6 / 7 → klares Gruen
      OHNE Modifizierbarkeit: 3.7 / 7 → 38% Risiko unter Rot

      Das heisst: Ob dieses Produkt funktioniert, haengt nicht von der Frage ab
      «KI ja oder nein?», sondern von einer DESIGN-ENTSCHEIDUNG: Koennen
      Kund:innen die Empfehlung anpassen?

    naechster_schritt: |
      Empfehlung: Modifizierbarkeit ist kein Feature Request, sondern eine
      Voraussetzung. Konkret: Risikobereitschaft, Laufzeit und LTV-Ratio
      muessen im GPT anpassbar sein. Survey-Validierung mit N=340 (2×2 Design)
      kostet ~CHF 10'200 und liefert in 3 Wochen definitive Zahlen.

  # ═══════════════════════════════════════════════════════════════════════════
  # KARTE M2: Was passiert bei einem GPT-Fehler?
  # ═══════════════════════════════════════════════════════════════════════════

  M2_error_recovery:
    frage: "Was passiert, wenn der GPT einen Fehler macht?"
    modus: "🟢 BELASTBAR"
    zeit: "3 min"
    block: "Mortgage GPT"

    einordnung: |
      Auch hier koennen wir belastbar antworten. Der Mechanismus —
      asymmetrischer Trust-Verlust bei algorithmischen Fehlern — ist
      robust repliziert und gilt ueber verschiedene Domaenen.

    modell: |
      Wir modellieren Trust als asymmetrischen Prozess:
      Aufbau: langsam (viele positive Interaktionen noetig)
      Verlust: schnell (ein Fehler reicht)

      Das ist keine UBS-Spezifitaet, sondern ein universeller Befund.
      Bei Hypotheken ist der Effekt vermutlich STAERKER als im Labor,
      weil die Stakes hoeher sind (CHF 750K statt Laborexperiment).

    parameter: |
      • Dietvorst et al. (2015): «Seeing the algorithm err» → starke Ablehnung
      • Trust Dynamics Literatur (2025): Recovery-Asymmetrie dokumentiert
      • rho_error_penalty = 0.40 (CI: [0.30, 0.50]) — 40% Trust-Verlust
        Tier 2: trianguliert aus mehreren Studien

    ergebnis: |
      Pre-Error Trust: 4.95 / 7
      Post-Error Trust: 2.97 / 7 (95% CI: [2.15, 3.80])
      Risiko unter Rot-Schwelle nach Fehler: 72%

      Ein EINZIGER Fehler — z.B. eine falsche Zinsindikation — kann das gesamte
      Vertrauen in das Produkt zerstoeren. Und zwar nicht nur fuer die betroffene
      Person, sondern durch Word-of-Mouth fuer ihr Netzwerk.

    naechster_schritt: |
      Error Prevention ist Prioritaet #1 im Produktdesign:
      1. Konfidenz-Ranges statt Punkt-Schaetzungen zeigen
      2. Disclaimer bei jeder Zinsindikation
      3. Sofortige Human-Handoff bei erkanntem Fehler
      4. Einfache Cases zuerst — komplexe Faelle an Berater:innen weiterleiten

  # ═══════════════════════════════════════════════════════════════════════════
  # KARTE M3: Soll UBS die KI offenlegen?
  # ═══════════════════════════════════════════════════════════════════════════

  M3_disclosure:
    frage: "Soll UBS offenlegen, dass ein GPT die Empfehlungen generiert?"
    modus: "🟢 BELASTBAR"
    zeit: "2 min"
    block: "Mortgage GPT"

    einordnung: |
      Hier gibt es eine klare regulatorische UND eine wissenschaftliche Antwort.

    modell: |
      Zwei unabhaengige Gruende fuer Offenlegung:
      1. REGULATORISCH: FINMA Guidance 08/2024 verlangt Transparenz bei KI im
         Kundenberatungsprozess. Stealth-AI ist keine Option.
      2. WISSENSCHAFTLICH: Disclosure reduziert initiale Akzeptanz leicht
         (ca. -0.6 Punkte), aber Modifizierbarkeit kompensiert das vollstaendig.

    parameter: |
      • FINMA AI Survey 2024/2025 + Guidance 08/2024
      • Disclosed + Modifiable: 5.6/7 vs. Undisclosed + Modifiable: 5.0/7
        Differenz: nur 0.6 Punkte — und Undisclosed ist regulatorisch nicht erlaubt.

    ergebnis: |
      Die Frage stellt sich nicht: Offenlegung ist Pflicht.
      Gute Nachricht: Mit dem richtigen Framing gibt es keinen relevanten Nachteil.
      «Intelligenter Zinsrechner» performt fast gleich gut wie ohne Disclosure.

    naechster_schritt: |
      Framing klären: «Intelligenter Zinsrechner unterstützt von KI» ist besser
      als «KI-Hypothekenberater». Nicht verbergen, aber auch nicht ueberbetonen.

  # ═══════════════════════════════════════════════════════════════════════════
  # KARTE M4: Welches Framing funktioniert?
  # ═══════════════════════════════════════════════════════════════════════════

  M4_framing:
    frage: "Wie sollte der GPT positioniert und benannt werden?"
    modus: "🟡 INDIKATIV"
    zeit: "3 min"
    block: "Mortgage GPT"

    einordnung: |
      Die RICHTUNG koennen wir angeben — objektiv-utilitaristisches Framing
      schlaegt subjektiv-kreatives Framing. Die genaue Effektstaerke bei
      Hypotheken muss noch validiert werden.

    modell: |
      Wir unterscheiden zwei Framing-Achsen:
      • AUFGABEN-Framing: «objektiv» (Zahlen berechnen) vs. «subjektiv» (beraten)
      • TOOL-Framing: «Werkzeug» (Tool) vs. «Agent» (Berater)

      Forschung zeigt: Wenn die Aufgabe als OBJEKTIV wahrgenommen wird,
      akzeptieren Menschen Algorithmen leichter. Hypothekenzinsen berechnen
      ist objektiver als «Lebensberatung» — das ist ein natuerlicher Vorteil.

    parameter: |
      • Castelo et al. (2019): Objektiv-Framing → +15-20% Akzeptanz
      • Logg et al. (2019): «Appreciation for algorithms» bei quantitativen Aufgaben
      • Tier 2: Richtung klar, Effektstaerke bei Hypotheken nicht direkt getestet

    ergebnis: |
      Empfohlenes Framing: «Intelligenter Zinsrechner»
      Vermeiden: «KI-Berater», «Robo-Advisor», «Digitaler Hypothekenberater»

      Der Name sollte die AUFGABE betonen (Zins berechnen), nicht die TECHNOLOGIE
      (KI). Das nutzt den natuerlichen Vorteil, dass Zinsberechnung als objektive
      Aufgabe wahrgenommen wird.

    naechster_schritt: |
      Im Survey 3-4 Naming-Varianten testen (within-subjects):
      «UBS Zinsrechner Plus», «UBS Hypotheken-Assistent», «UBS Mortgage GPT»
      Kosten: ~CHF 0 zusaetzlich (wird im bestehenden Survey integriert)

  # ═══════════════════════════════════════════════════════════════════════════
  # KARTE M5: Wie viel Revenue generiert der GPT?
  # ═══════════════════════════════════════════════════════════════════════════

  M5_revenue:
    frage: "Wie viel zusaetzliches Hypotheken-Neuvolumen generiert der GPT?"
    modus: "🟡 INDIKATIV"
    zeit: "4 min"
    block: "Mortgage GPT"

    einordnung: |
      Die Richtung ist klar — der GPT generiert substantielles Volumen.
      Die genaue Groesse haengt von einem Wert ab, den nur UBS kennt:
      Monthly Leads auf dem Hypothekenrechner.

    modell: |
      Revenue ist eine multiplikative Kette:
      Monthly Leads × 12 × Lead-to-Appointment × Appointment-to-Close × Ø Hypothek

      Bei multiplikativen Ketten potenziert sich die Unsicherheit.
      Deshalb ist das Konfidenzintervall breit — nicht weil das Modell
      schlecht ist, sondern weil die Physik so funktioniert.

    parameter: |
      • Monthly Leads: 2'000 (GESCHAETZT — Tier 3, LLMMC)
        → DAS ist der groesste Hebel. UBS kennt diesen Wert.
      • Lead-to-Appointment: 8% (CI: [5%, 12%]) — Branchendaten
      • Appointment-to-Close: 35% (CI: [25%, 45%]) — UBS-nah
      • Ø Hypothek: CHF 750K — UBS-intern verifizierbar

    ergebnis: |
      Median: CHF 1.47 Mrd/Jahr (95% CI: [0.55, 3.45 Mrd])

      Das CI ist breit (Faktor 6×). Aber schauen wir uns an, WOHER
      die Unsicherheit kommt:
      • 38% von monthly_leads → UBS-Daten wuerden das sofort loesen
      • 22% von lead_to_appointment → nach 3 Monaten Betrieb messbar
      • 10% von avg_mortgage → UBS kennt den Wert

      Mit EINER Zahl von UBS (Chatbot-Traffic) verengt sich das CI um 40%.

    naechster_schritt: |
      Frage an UBS: Wie viele Besucher hat der Hypothekenrechner pro Monat?
      Mit dieser einen Zahl koennen wir in 48 Stunden ein praeziseres Revenue-
      Modell liefern. Das ist der hoechste Informationsgewinn pro Datenpunkt.

    live_rechner_hinweis: |
      ★ POWER MOVE: Wenn UBS hier eine Zahl nennt, den Live-Rechner starten
      und zeigen wie sich das CI in Echtzeit veraendert.

  # ═══════════════════════════════════════════════════════════════════════════
  # KARTE M6: Wie reagieren die CS-Migrierten?
  # ═══════════════════════════════════════════════════════════════════════════

  M6_cs_migrierte:
    frage: "Wie reagieren die 800K CS-migrierten Kund:innen auf den GPT?"
    modus: "🔴 EXPLORATIV"
    zeit: "3 min"
    block: "Mortgage GPT"

    einordnung: |
      Hier muessen wir ehrlich sein: Wir koennen das heute nicht belastbar
      beantworten. Aber wir koennen zeigen, WARUM das wichtig ist und WAS
      man tun muesste.

    modell: |
      CS-Migrierte starten mit niedrigerem UBS-Brand-Trust (tau_brand_CS).
      Das beeinflusst die gesamte Trust-Kaskade:
      Niedrigerer Base Trust → niedrigere GPT-Akzeptanz → hoeheres Error-Risiko

      Es ist ein kumulativer Effekt — nicht nur «etwas weniger», sondern
      strukturell anders.

    parameter: |
      • tau_brand_CS = 0.55 (CI: [0.40, 0.70])
      • Tier 3: LLMMC-Schaetzung OHNE UBS-NPS-Daten
      • Annahme basiert auf: Brand-Migrations-Literatur (generell, nicht UBS-spezifisch)

      ⚠️  Das ist unsere schwächste Schaetzung. Wir MARKIEREN sie bewusst als Rot.

    ergebnis: |
      Szenario A (pessimistisch, tau=0.40):
        CS-Trust = 3.4 / 7 → UNTER Rot-Schwelle bereits VOR GPT-Launch
        Nach Fehler: 2.0 → Katastrophal

      Szenario B (optimistisch, tau=0.70):
        CS-Trust = 4.5 / 7 → Knapp ueber Gelb → handhabbar
        Nach Fehler: 2.7 → Immer noch kritisch

      Beide Szenarien zeigen: CS-Migrierte brauchen einen ANDEREN Pfad.

    naechster_schritt: |
      Empfehlung: NPS-Erhebung bei CS-Migrierten (vor/nach Migration).
      Aufwand: ~2 Wochen, ~CHF 5'000.
      Dann koennen wir tau_brand_CS kalibrieren und eine belastbare
      Aussage machen. Bis dahin: Human-First-Pfad fuer dieses Segment einplanen.

  # ═══════════════════════════════════════════════════════════════════════════
  # KARTE M7: Wie gross und unterschiedlich sind die Segmente?
  # ═══════════════════════════════════════════════════════════════════════════

  M7_segmente:
    frage: "Reagieren alle Kund:innen gleich auf den GPT?"
    modus: "🟡 INDIKATIV"
    zeit: "4 min"
    block: "Mortgage GPT"

    einordnung: |
      Die Richtung ist sehr klar: Nein, Kund:innen reagieren SEHR unterschiedlich.
      Wir koennen vier Segmente identifizieren und deren relative Position angeben.
      Die GROESSEN der Segmente sind geschaetzt.

    modell: |
      Wir modellieren Segmente ueber W_algo — die «Algorithm Willingness».
      Das ist ein Persoenlichkeitsmerkmal, nicht eine demographische Variable.
      Alter oder Einkommen alleine sagen wenig — entscheidend ist die
      Einstellung zu algorithmischen Empfehlungen.

    parameter: |
      Segment-Struktur basiert auf:
      • Algorithm Aversion Literatur (Dietvorst, Logg, Castelo)
      • UTAUT2-Segmentierung (Venkatesh 2012)
      • Segment-Anteile: geschaetzt (30/25/20/25%) — Tier 3

    ergebnis: |
      Segment                   GPT-Akzeptanz    Strategie
      ──────────────────────────────────────────────────────
      Tech-Savvy (W=0.75)       5.4 / 7          GPT-First → direkt anbieten
      Digital Mainstream (0.55)  4.8 / 7          Hybrid → GPT mit Berater-Option
      Affluent Traditional(0.30) 2.9 / 7 ⚠️       Human-First → Berater mit GPT-Support
      Skeptics (0.20)           3.3 / 7          GPT-Assisted → Berater nutzt GPT intern

      Spread: 2.5 Punkte. Das ist der Unterschied zwischen begeistert und ablehnend.
      Ein einheitlicher Launch wuerde bei 30% brillieren und bei 20% backfiren.

    naechster_schritt: |
      Zwei Dinge, die UBS beisteuern kann:
      1. CRM-Segmentgroessen: Wie viele Kund:innen fallen in welches Segment?
         (Alter, Digital-Nutzung, Beratungshistorie als Proxies)
      2. Maximization Scale (3 Items, Schwartz 2002) im Survey → praezise
         Segment-Zuordnung fuer N=340

  # ═══════════════════════════════════════════════════════════════════════════
  # eSIM — 4 KARTEN
  # ═══════════════════════════════════════════════════════════════════════════

  # ═══════════════════════════════════════════════════════════════════════════
  # KARTE E1: Wie gross ist der eSIM-Markt?
  # ═══════════════════════════════════════════════════════════════════════════

  E1_marktgroesse:
    frage: "Wie gross ist der adressierbare eSIM-Markt fuer UBS?"
    modus: "🟢 BELASTBAR"
    zeit: "3 min"
    block: "eSIM"

    einordnung: |
      Hier haben wir solide Marktdaten. Was wir zeigen koennen, wird
      vermutlich kleiner sein als erwartet — aber das ist genau der
      Wert einer ehrlichen Analyse.

    modell: |
      Wir rechnen den Markt als Filterkaskade:
      UBS-Kund:innen → reisen non-EU → eSIM-faehig → aware → willing

      Jeder Filter reduziert den adressierbaren Markt. EU-Reisende
      brauchen kein eSIM (Free Roaming). Das alleine halbiert die Basis.

    parameter: |
      • UBS-Kund:innen: ~3.5 Mio
      • Non-EU-Reiseanteil: 40% (BFS Reisestatistik)
      • eSIM-faehige Smartphones: 52% (TCA 2024)
      • eSIM Consumer Awareness: 36% (Mobilise Global 2024)
      • Adoption Rate (unter Aware): 24% (European Data 2024)
      • Alle Tier 1-2: Industrie-Reports, keine Schaetzungen

    ergebnis: |
      Adressierbarer Markt: ~63'000 Nutzer/Jahr
      Revenue: ~CHF 1.4 Mio/Jahr (bei ~CHF 15/Trip)

      Das ist ein Faktor 3× kleiner als die implizite Annahme von ~200K.
      eSIM ist als DIREKTES Revenue-Center marginal (<0.1% des Mortgage-Volumens).

      ABER: Der strategische Wert liegt anderswo —
      • +2.3 App-Sessions/Monat bei eSIM-Nutzern
      • 15% Cross-Sell-Rate auf Bankprodukte
      • Habit-Building fuer das Digital-Ecosystem

    naechster_schritt: |
      Strategische Frage fuer UBS: Ist eSIM ein Revenue-Produkt oder ein
      Engagement-Tool? Unser Modell sagt klar: Engagement-Tool. Die Investition
      muss ueber Cross-Sell und Retention gerechtfertigt werden, nicht ueber
      direkten eSIM-Umsatz.

  # ═══════════════════════════════════════════════════════════════════════════
  # KARTE E2: Passt eSIM zur UBS-Marke?
  # ═══════════════════════════════════════════════════════════════════════════

  E2_brand_fit:
    frage: "Passt ein eSIM-Service zur UBS-Marke?"
    modus: "🟡 INDIKATIV"
    zeit: "3 min"
    block: "eSIM"

    einordnung: |
      Die Richtung koennen wir angeben: Der Brand Fit liegt in einer
      kritischen Zone. Die genaue Reaktion haengt vom Enhancement ab.

    modell: |
      Brand Fit messen wir ueber die Brand Extension Theorie:
      Wie gut passt «Telekommunikation» zu «Banking»?

      Die Antwort haengt davon ab, wie das Produkt GEFRAMED wird.
      «UBS verkauft SIM-Karten» → niedriger Fit.
      «UBS schuetzt Ihre Daten auch im Ausland» → hoeherer Fit.

    parameter: |
      • Brand Extension Literatur (Monga & John 2010)
      • Brand Fit Score: 4.1 / 7 — GELBE ZONE
      • Warnendes Beispiel: Orange Bank (France) — Bank→Telco gescheitert (2024 Exit)
      • Tier 2: Theorie gut, UBS-spezifischer Test fehlt

    ergebnis: |
      Brand Fit 4.1/7 = Gelbe Zone.

      Ohne Enhancement: Produkt scheitert am Fit-Problem.
      Mit Travel-Ecosystem-Framing: 4.8/7 → Gruene Zone.
      Mit Co-Branding (z.B. Airalo): 5.1/7 → Sicher.

      Der Fit ist NICHT natuerlich — er muss GESTALTET werden.

    naechster_schritt: |
      Im eSIM-Survey testen: Kontrollgruppe (nur «UBS eSIM») vs.
      Treatment (Travel-Ecosystem-Framing). Kostet ~CHF 0 extra.
      Liefert empirische Evidenz fuer die Framing-Entscheidung.

  # ═══════════════════════════════════════════════════════════════════════════
  # KARTE E3: Wird der eSIM-Service adoptiert?
  # ═══════════════════════════════════════════════════════════════════════════

  E3_adoption:
    frage: "Wird der eSIM-Service von UBS-Kund:innen adoptiert?"
    modus: "🔴 EXPLORATIV"
    zeit: "4 min"
    block: "eSIM"

    einordnung: |
      Das koennen wir heute NICHT belastbar beantworten. Und das bewusst
      zu sagen ist Teil des Wertes, den das Modell liefert.

    modell: |
      Die Adoption haengt von einer Psi-Transformation ab:
      Was im Pilot gemessen wird, muss auf den Full-Launch hochgerechnet werden.
      Dieser Multiplikator (psi) erklaert 71% der gesamten Unsicherheit.

      Das Problem: Wir haben keine empirische Basis fuer psi bei UBS.
      Jede Prognose ohne diesen Wert ist Spekulation — und DAS zu wissen
      ist bereits eine wertvolle Information.

    parameter: |
      • psi_transformation = 2.46 (CI: [1.60, 3.40])
      • Tier 3: Kalibriert aus generischer Digital-Adoption-Literatur
      • KEIN UBS-Benchmark (Key4? Twint-Integration? UBS Neo?)

      ⚠️  71% der Output-Varianz kommt von DIESEM EINEN Parameter.

    ergebnis: |
      Drei Szenarien — und alle drei sind plausibel:

      Szenario A (psi = 1.6): Final = 3.6/7 → GELB-ROT → GO fraglich
      Szenario B (psi = 2.5): Final = 5.0/7 → GRUEN → klares GO
      Szenario C (psi = 3.4): Final = 6.1/7 → STARK → excellenter Launch

      Das ist ein Spread von 2.5 Punkten. Wir wissen nicht, wo UBS landet.

    naechster_schritt: |
      Empfehlung: Bevor UBS CHF 2 Mio in den Full-Launch investiert,
      CHF 50K in einen 4-Wochen Soft-Launch mit 5'000 Kund:innen investieren.
      Damit wird psi empirisch bestimmt — und dann sagt das Modell mit
      95% Konfidenz, ob sich der Full-Launch lohnt.

      DAS ist informierte Entscheidungsfindung: Nicht raten, sondern erst
      messen, dann investieren.

  # ═══════════════════════════════════════════════════════════════════════════
  # KARTE E4: Wie soll UBS den eSIM-Launch strukturieren?
  # ═══════════════════════════════════════════════════════════════════════════

  E4_launch_strategie:
    frage: "Wie sollte UBS den eSIM-Service launchen?"
    modus: "🟡 INDIKATIV"
    zeit: "3 min"
    block: "eSIM"

    einordnung: |
      Die Grundrichtung koennen wir angeben — basierend auf Brand Extension
      Theorie und Digital Adoption Literatur. Die exakte Konfiguration muss
      im Pilot getestet werden.

    modell: |
      Drei Hebel bestimmen den eSIM-Erfolg:
      1. FRAMING: Travel-Ecosystem vs. Standalone-eSIM
      2. PARTNERING: UBS allein vs. Co-Branding
      3. FOKUS: Alle Reisen vs. Non-EU only (wegen Free Roaming)

    parameter: |
      • Travel-Ecosystem-Framing: +0.7 Brand Fit (Monga & John 2010)
      • Co-Branding-Effekt: +0.3 Perceived Quality (Brand Alliance Literatur)
      • Non-EU-Fokus: eliminiert 54% «Kein-Bedarf»-Segment
      • Tier 2: Theoretisch fundiert, nicht UBS-spezifisch getestet

    ergebnis: |
      Empfohlene Konfiguration:
      1. Co-Branding mit etabliertem eSIM-Provider (Airalo oder Holafly)
         → Signalisiert Kompetenz + reduziert UBS-Reputationsrisiko
      2. Travel-Ecosystem-Framing: «Alles fuer Ihre Reise — in einer App»
         → Erhoet Brand Fit von 4.1 auf ~4.8 (Gruene Zone)
      3. Fokus auf Non-EU-Reisen (USA, Asien, Afrika)
         → Dort gibt es echten Bedarf (kein Free Roaming)
      4. Risk-Reduction-Framing: «Sichere Daten im Ausland»
         → Nutzt UBS-Kernkompetenz (Sicherheit, Vertrauen)

    naechster_schritt: |
      Im eSIM-Survey die Framing-Varianten A/B-testen.
      Pilot-Erfolgsmetrik definieren: 1.5% Conversion = Minimum
      (entspricht ~3.7% Final nach Psi-Transformation).

  # ═══════════════════════════════════════════════════════════════════════════
  # KARTE M8: Ueber welche Kanaele soll der GPT distribuiert werden?
  # ═══════════════════════════════════════════════════════════════════════════

  M8_channel_praeferenzen:
    frage: "Ueber welche Kanaele sollte der Mortgage GPT angeboten werden?"
    modus: "🟢 BELASTBAR"
    zeit: "4 min"
    block: "Mortgage GPT"

    einordnung: |
      Die Kanalstrategie koennen wir belastbar beantworten. Wir haben fuenf
      Kanaele mit ihren jeweiligen Trust-Profilen, Conversion-Funnels und
      Segment-Affinitaeten modelliert. Die Daten basieren auf UBS-eigenen
      Metriken (3.5 Mio Privatkund:innen, 65% Mobile Penetration) und
      Channel-Trust-Literatur.

    modell: |
      Jeder Kanal hat ein eigenes Psi-Profil — also einen Kontext, der das
      Verhalten beeinflusst. Wir messen das ueber tau_channel (Kanal-Trust):

      KANAL                   tau     Conversion    Rolle
      ─────────────────────────────────────────────────────────
      UBS Website             0.85    0.49%         Primary Entry Point
      UBS App                 0.90    0.37%         Retention Engine
      Partner (Homegate)      0.60    0.10%         Intent Acquisition
      ChatGPT Marketplace     0.45    0.04%         Innovation Signal
      Social Media            0.35    0.006%        Awareness

      Entscheidend: Trust und Conversion korrelieren stark (r > 0.8).
      Mehr Trust = mehr Abschluesse. Das ist keine Ueberraschung, aber
      die GROESSE der Unterschiede ist bemerkenswert: Faktor 80× zwischen
      bestem und schwaemstem Kanal.

    parameter: |
      • tau_channel Werte: aus Trust-Literatur (Gefen 2003, Kim 2009) +
        Psi-Kontextmodifikatoren pro Kanal
      • Conversion-Funnels: 5-stufig (Visit → Engagement → Completion → Lead → Close)
      • Segment × Channel Affinitaets-Matrix:
        Erstkaeufer:innen → Partner-Plattformen (0.90)
        Anschlussfinanzierer:innen → UBS App (0.90)
        Informationssuchende → UBS Website (0.85)
      • Komplementaritaet: gamma(Web×Social) = +0.20, gamma(Web×Partner) = +0.15
      • Tier 1-2: Metriken basieren auf UBS-Daten und Branchen-Benchmarks

    ergebnis: |
      Empfohlene 3-Phasen-Strategie:

      PHASE 1 (Monat 1-3): Website + App → 2'469 Closings/Monat
      Hoechster Trust, volle Kontrolle, kontrolliertes Testing.

      PHASE 2 (Monat 4-6): + Partner → 3'351 Closings/Monat
      Neukundenakquise ueber Homegate/ImmoScout24.

      PHASE 3 (Monat 7-12): + Marketplace + Social → 3'396 Closings/Monat
      Awareness-Kanaele nach Proof-of-Concept.

      80% des Volumens kommt aus nur 3 Kanaelen (Web + App + Partner).
      Marketplace und Social sind Signalling — nicht Revenue.

    naechster_schritt: |
      Frage an UBS: Monatliche Besucherzahlen der Hypotheken-Sektion
      auf ubs.com? Damit koennen wir die Website-Funnel-Schaetzung
      kalibrieren. Ausserdem: Bestehende Homegate-Partnerschaft vorhanden?

  # ═══════════════════════════════════════════════════════════════════════════
  # KARTE M9: Welche Features erwarten Kund:innen?
  # ═══════════════════════════════════════════════════════════════════════════

  M9_feature_erwartungen:
    frage: "Welche Features und Zusatzservices erwarten Kund:innen beim Mortgage GPT?"
    modus: "🟡 INDIKATIV"
    zeit: "3 min"
    block: "Mortgage GPT"

    einordnung: |
      Die RICHTUNG koennen wir klar angeben — drei Feature-Cluster treiben
      die Akzeptanz. Die genaue GEWICHTUNG bei UBS-Kund:innen muss noch
      validiert werden.

    modell: |
      Wir kombinieren zwei Frameworks:

      FRAMEWORK 1 — Algorithm Aversion (Dietvorst 2018): Was brauchen
      Menschen, um einem Algorithmus zu vertrauen?
      → Modifizierbarkeit, Transparenz, Kontrolle

      FRAMEWORK 2 — UTAUT2 (Venkatesh 2012): Was treibt Technologie-Adoption?
      → Performance Expectancy (beta=0.42), Effort Expectancy (beta=0.20),
        Facilitating Conditions (beta=0.15)

      Daraus ergeben sich drei Feature-Cluster:

    parameter: |
      • Modifizierbarkeit: +41pp Nutzung (Dietvorst 2018) — Tier 1
      • Personalisierung: Uniqueness Neglect Penalty = -0.83 (Longoni 2019) — Tier 1
      • Performance Expectancy: beta = 0.42 (Davis 1989, Venkatesh 2003) — Tier 1
      • Effort Expectancy: beta = 0.20 (Venkatesh 2003) — Tier 1
      • Facilitating Conditions: beta = 0.15 (Venkatesh 2003) — Tier 1

    ergebnis: |
      Drei Feature-Cluster nach Prioritaet:

      CLUSTER 1 — KONTROLLE (Prioritaet HOCH):
      • Risikobereitschaft anpassen (Schieberegler)
      • Laufzeit und Amortisationsmodell waehlen
      • Ergebnis-Parameter selbst veraendern koennen
      → Effekt: +41pp Nutzungsbereitschaft (von 32% auf 73%)

      CLUSTER 2 — PERSONALISIERUNG (Prioritaet HOCH):
      • Eingabefaktoren sichtbar anzeigen (Einkommen, LTV, Kanton, Laufzeit)
      • Individuelle Situation explizit beruecksichtigen
      • «Basierend auf IHREN Angaben» statt generischer Output
      → Effekt: Reduziert Uniqueness Neglect (Penalty -0.83 → ~-0.30)

      CLUSTER 3 — NAHTLOSIGKEIT (Prioritaet MITTEL):
      • Sofortige Berater:innen-Anbindung nach Indikation
      • Termin-Buchung direkt im GPT-Flow
      • Ergebnis-Export als PDF oder in die App
      → Effekt: Erhoeht Completion-to-Lead um ~50%

    naechster_schritt: |
      Im Survey koennen die Feature-Cluster gerankt werden (MaxDiff-Methode):
      Welches Feature hat den hoechsten inkrementellen Wert? Kosten: ~CHF 0
      zusaetzlich im bestehenden Survey-Design.

  # ═══════════════════════════════════════════════════════════════════════════
  # KARTE M10: Spielt die Bankmarke eine Rolle? Werden Kund:innen empfehlen?
  # ═══════════════════════════════════════════════════════════════════════════

  M10_bankmarke_wom:
    frage: "Wie wichtig ist die UBS-Marke fuer die GPT-Akzeptanz? Werden Kund:innen den Service weiterempfehlen?"
    modus: "🟡 INDIKATIV"
    zeit: "4 min"
    block: "Mortgage GPT"

    einordnung: |
      Die Richtung ist sehr klar: Die Bankmarke ist der STAERKSTE
      einzelne Treiber fuer die Adoption von Financial AI. Word-of-Mouth
      laesst sich aus den Trust-Modellen ableiten — die exakte Staerke
      bei UBS muss noch validiert werden.

    modell: |
      Trust hat einen DUALEN PFAD auf die Adoption:

      PFAD 1 — Direkt: Vertrauen → Nutzungsintention (beta = 0.21)
      PFAD 2 — Indirekt: Vertrauen → Perceived Usefulness → Intention (beta = 0.34)
      TOTAL: beta_trust = 0.55 (staerkster Praediktor!)

      Das bedeutet: Trust erklaert MEHR Varianz als alle anderen Faktoren
      zusammen. Und Trust basiert bei Financial AI massgeblich auf der
      Bankmarke.

      Word-of-Mouth modellieren wir ueber Social Influence (UTAUT2):
      SI beta = 0.18, MODERIERT durch Alter (staerker bei 45+).

    parameter: |
      • Trust-TAM Dual Path: Gefen et al. (2003), Kim et al. (2009) — Tier 1
      • Mobile Banking Trust: Trust (0.38) > PU (0.31) > PEOU (0.14) — Tier 1
      • Social Influence: beta = 0.18, Age-Moderator (Venkatesh 2003) — Tier 1
      • Brand Conviction: beta = 0.36 (Voelckner & Sattler 2006) — Tier 1
      • UBS Brand Status: 60% Prestige / 40% Functional (Prestige-Advantage
        ermoeglicht distantere Extensionen — Park et al. 1991)

    ergebnis: |
      BANKMARKE:
      UBS hat einen strukturellen Vorteil. Als Prestige-Brand hat UBS
      hoehere Grundakzeptanz fuer AI-Tools als eine Regionalbank.
      Trust_UBS ≈ 5.2/7 als Baseline (vor GPT-Interaktion).

      Das erklaert, warum der ChatGPT Marketplace (tau=0.45) so viel
      schlechter performt als die UBS Website (tau=0.85): Es fehlt
      der Brand Frame.

      WORD-OF-MOUTH:
      Erwartete WoM-Intention: 4.3/7 (CI: [3.6, 5.0])
      • Tech-Savvy Segment: 5.1/7 → aktive Promoter
      • Traditional Affluent: 3.2/7 → passive, kaum WoM
      • Nach positivem Erlebnis: +1.2 Punkte (auf 5.5/7)
      • Nach Fehler: -2.0 Punkte (auf 2.3/7) ⚠️

      WoM ist ASYMMETRISCH: Negative Erfahrungen werden 2× haeufiger
      geteilt als positive (Negativity Bias in WoM).

    naechster_schritt: |
      Zwei Empfehlungen:
      1. UBS-Brand IMMER sichtbar im GPT (Logo, Farbschema, Disclaimer)
         → Auch auf Marketplace und Partner-Plattformen
      2. NPS-Messung nach GPT-Interaktion einbauen (1 Frage, 10 Sekunden)
         → Fruehwarnsystem fuer Negativspirale via WoM

  # ═══════════════════════════════════════════════════════════════════════════
  # KARTE M11: Bevorzugen Kund:innen Voice oder Text?
  # ═══════════════════════════════════════════════════════════════════════════

  M11_voice_vs_text:
    frage: "Soll der Mortgage GPT als Text-Chat oder Voice-Interface angeboten werden?"
    modus: "🔴 EXPLORATIV"
    zeit: "3 min"
    block: "Mortgage GPT"

    einordnung: |
      Hier muessen wir differenziert antworten. Die GRUNDTENDENZ koennen
      wir aus der Effort-Expectancy-Literatur ableiten, aber die UBS-spezifische
      Praeferenz ist nicht getestet.

    modell: |
      Die Modality-Praeferenz haengt von zwei Faktoren ab:

      FAKTOR 1 — Effort Expectancy (beta = 0.20): Wie einfach fuehlt sich
      die Interaktion an? Text ist bei komplexen Finanzfragen praeziser,
      Voice bei einfachen Fragen schneller.

      FAKTOR 2 — Algorithm Aversion nach Modalitaet: Voice-AI loest
      STAERKERE Aversion aus als Text-AI, weil Voice anthropomorpher
      wirkt und die Uniqueness-Neglect-Wahrnehmung verstaerkt
      (Longoni 2019: «AI ignores my individual situation»).

      FAKTOR 3 — Kontext (Psi_F): In der App (mobil) ist Voice natuerlicher;
      auf der Website (Desktop) ist Text natuerlicher.

    parameter: |
      • Effort Expectancy: beta = 0.20 (Venkatesh 2003) — Tier 1
      • Conversational UI Bonus: +0.10 auf EE (Kim 2009) — Tier 1
      • Voice Anthropomorphism Penalty: geschaetzt -0.15 (Longoni-Extrapolation)
        — Tier 3, nicht direkt fuer Hypotheken getestet
      • Kontext-Moderator: Desktop (Text +0.2) vs. Mobile (Voice +0.1) — Tier 2

    ergebnis: |
      Empfehlung: TEXT-FIRST mit optionalem Voice.

      Gruende:
      1. Hypothekenfragen sind KOMPLEX → Text erlaubt Praezision
         (Zahlen, Laufzeiten, Konditionen sind schwer per Voice)
      2. Privacy-Kontext: Hypothekarfragen sind intim → viele Menschen
         wollen nicht laut ueber CHF 750K sprechen
      3. Dokumentation: Text-Chat hat automatisches Protokoll
      4. Algorithm Aversion: Text wirkt weniger «menschlich» und
         loest dadurch WENIGER Aversion aus (paradoxer Vorteil)

      Voice als OPTION fuer:
      • Einfache Einstiegsfragen («Was kann ich mir leisten?»)
      • App-Kontext (unterwegs, Micro-Moments)
      • Accessibility (Barrierefreiheit)

    naechster_schritt: |
      Im Survey eine Praeferenzfrage einbauen:
      «Wie moechten Sie mit dem Zinsrechner interagieren?
      □ Text-Chat □ Spracheingabe □ Beides □ Egal»
      Kosten: CHF 0 (1 zusaetzliche Frage). Liefert definitive Antwort.

  # ═══════════════════════════════════════════════════════════════════════════
  # eSIM — 3 ZUSAETZLICHE KARTEN
  # ═══════════════════════════════════════════════════════════════════════════

  # ═══════════════════════════════════════════════════════════════════════════
  # KARTE E5: Was sind Kund:innen bereit fuer eSIM zu zahlen?
  # ═══════════════════════════════════════════════════════════════════════════

  E5_pricing_packages:
    frage: "Was sind Kund:innen bereit fuer den eSIM-Service zu zahlen? Welche Pakete und Regionen?"
    modus: "🟡 INDIKATIV"
    zeit: "3 min"
    block: "eSIM"

    einordnung: |
      Die Richtung koennen wir angeben — Price Value ist der STAERKSTE
      Treiber fuer eSIM-Adoption (beta = 0.28, Rang 1 von 5). Die exakte
      Zahlungsbereitschaft bei UBS-Kund:innen muss im Survey validiert werden.

    modell: |
      Price Value im UTAUT2-Framework (Venkatesh 2012) misst das
      Kosten-Nutzen-Verhaeltnis aus Kundensicht:

      PV = Perceived_Benefit (Roaming-Ersparnis) - Perceived_Cost (eSIM-Preis)

      Der Referenzpunkt ist entscheidend: Kund:innen vergleichen NICHT
      mit «kein Netz», sondern mit dem bestehenden Roaming-Tarif ihres
      Anbieters. Das ist klassisches Reference-Dependent Pricing.

    parameter: |
      • Price Value: beta = 0.28 (hoechster Treiber, Venkatesh 2012) — Tier 1
      • Roaming-Kosten CH→Non-EU: ~CHF 12-20/Tag (Swisscom/Sunrise 2024)
      • eSIM-Marktpreise: CHF 5-15 fuer 1-5GB (Airalo, Holafly 2024)
      • WTP-Schaetzung: CHF 5-8 pro Trip (LLMMC, kalibriert an Marktpreisen) — Tier 3
      • Prestige-Premium-Tolerance: UBS-Kund:innen akzeptieren +15-20%
        wenn Convenience-Vorteil klar (Brand Trust Halo) — Tier 2

    ergebnis: |
      Empfohlene Preisstruktur:

      PAKET           PREIS       DATEN    ZIELGRUPPE
      ──────────────────────────────────────────────────
      Basic           CHF 7.90    1 GB     Kurzreisen (3-5 Tage)
      Comfort         CHF 12.90   3 GB     Standardreisen (1-2 Wo.)
      Premium         CHF 19.90   5 GB     Langzeitreisen
      Unlimited       CHF 29.90   unlim.   Vielreisende/Business

      REGIONEN-FOKUS (nach Bedarf sortiert):
      1. USA (40% Non-EU-Reisen aus CH) → Prioritaet 1
      2. Suedostasien (Thailand, Bali) → Prioritaet 2
      3. Mittlerer Osten (Dubai, Oman) → Prioritaet 3

      EU BEWUSST AUSSCHLIESSEN: Free Roaming macht eSIM dort wertlos.
      Kommunikation: «Fuer Ihre Reisen AUSSERHALB Europas.»

    naechster_schritt: |
      Van-Westendorp-Analyse im Survey (4 Preisfragen, 30 Sekunden):
      «Zu welchem Preis waere eSIM zu teuer / teuer aber akzeptabel /
      ein gutes Angebot / zu guenstig?» → Optimaler Preispunkt empirisch.
      Kosten: CHF 0 zusaetzlich.

  # ═══════════════════════════════════════════════════════════════════════════
  # KARTE E6: Welche zusaetzlichen Features wuenschen Kund:innen?
  # ═══════════════════════════════════════════════════════════════════════════

  E6_features_esim:
    frage: "Welche zusaetzlichen Features braucht der eSIM-Service neben der Konnektivitaet?"
    modus: "🟡 INDIKATIV"
    zeit: "3 min"
    block: "eSIM"

    einordnung: |
      Die Feature-Treiber koennen wir aus dem UTAUT2-Framework ableiten.
      Die Praezisierung fuer UBS-Kund:innen fehlt noch, aber die Richtung
      ist fundiert.

    modell: |
      Vier UTAUT2-Konstrukte bestimmen, welche Features wirken:

      1. Performance Expectancy (beta = 0.22): Was LEISTET der Service?
      2. Facilitating Conditions (beta = 0.15): Wie EINFACH ist es?
      3. Hedonic Motivation (beta = 0.15): Macht es SPASS?
      4. Habit (beta = 0.26): Passt es in BESTEHENDE Routinen?

      Entscheidend: Habit ist der zweitstaerkste Treiber (nach Price Value).
      Features, die sich in die bestehende App-Nutzung einfuegen, haben
      den hoechsten Adoptionseffekt.

    parameter: |
      • UTAUT2 Betas: Venkatesh et al. (2012) — Tier 1
      • Habit-Effekt: beta = 0.26 bei existierenden App-Usern — Tier 1
      • Pilot vs. Final Differenz:
        Pilot (Landing Page): Adoption-Modifier = 0.75 (Effort-Penalty -0.15)
        Final (In-App): Adoption-Modifier = 1.00 (Habit-Bonus +0.26)
        → In-App Version wird ~33% besser adoptiert als Pilot
      • Hedonic Value bei eSIM: MODERAT (0.15) — Reise hat Spass-Kontext

    ergebnis: |
      Feature-Prioritaeten (nach UTAUT2-Impact gerankt):

      PRIORITAET 1 — IN-APP INTEGRATION (Habit beta=0.26):
      • 1-Tap Aktivierung direkt in UBS App
      • Automatische Erkennung der Reisedestination
      • Nahtlose Integration in bestehende App-Journey
      → Effekt: +33% Adoption vs. externe Landing Page

      PRIORITAET 2 — TRAVEL ECOSYSTEM (PE beta=0.22):
      • Waehrungsrechner fuer Reiseland
      • Notfallnummern und Botschafts-Kontakte
      • Reiseversicherungs-Cross-Sell
      → Effekt: Erhoeht Brand Fit von 4.1 auf ~4.8 (Travel-Framing)

      PRIORITAET 3 — SIMPLICITY (FC beta=0.15):
      • QR-Code-Aktivierung (keine manuelle Konfiguration)
      • Automatische APN-Einstellungen
      • «Es funktioniert einfach» als Designprinzip
      → Effekt: Reduziert Effort-Expectancy-Penalty um 50%

      PRIORITAET 4 — DELIGHT (HM beta=0.15):
      • Reise-Countdown im App-Dashboard
      • Datenverbrauchs-Tracker mit Reisemotiv
      → Effekt: Differenzierung zu generischen eSIM-Anbietern

    naechster_schritt: |
      Feature-Priorisierung im Survey via MaxDiff:
      8 Features ranken lassen → Top 3 Features identifizieren.
      Kosten: ~CHF 1'500 fuer MaxDiff-Design (marginal).

  # ═══════════════════════════════════════════════════════════════════════════
  # KARTE E7: Wie sollte der eSIM-Service vermarktet werden? Empfehlen Kund:innen?
  # ═══════════════════════════════════════════════════════════════════════════

  E7_channels_wom_esim:
    frage: "Ueber welche Kanaele soll der eSIM-Service vermarktet werden? Werden Kund:innen ihn weiterempfehlen?"
    modus: "🟡 INDIKATIV"
    zeit: "4 min"
    block: "eSIM"

    einordnung: |
      Die Kanal- und WoM-Strategie koennen wir aus der Brand Extension
      Theorie und UTAUT2 ableiten. Marketing Support (beta = 0.28) ist
      der drittwichtigste Erfolgsfaktor fuer Brand Extensions.

    modell: |
      KANAELE: Bei Brand Extensions gilt: Der Kanal muss den FIT
      zwischen Stammmarke und Extension VERSTAERKEN, nicht nur Reichweite
      liefern. Ein eSIM-Ad auf LinkedIn verstaerkt den Fit nicht —
      ein eSIM-Angebot im Reise-Kontext der App schon.

      WORD-OF-MOUTH: WoM bei Brand Extensions folgt einer besonderen
      Dynamik. Kund:innen empfehlen nicht «UBS eSIM», sondern erzaehlen
      eine GESCHICHTE: «Stell dir vor, meine Bank bietet jetzt auch
      Reise-Internet an — und es funktioniert!»

      Das «und es funktioniert» ist der Trigger. Ohne positive Erfahrung
      wird die Geschichte zu: «Meine Bank versucht jetzt auch Telco zu
      spielen...» — und DAS ist Brand Dilution.

    parameter: |
      • Marketing Support: beta = 0.28 (Voelckner & Sattler 2006) — Tier 1
      • Testimonial-Effekt auf Brand Fit: +0.03 BFS (Tier 2)
      • Social Influence: beta = 0.18, Age-Moderator (Venkatesh 2003) — Tier 1
      • Brand Dilution Risk: LOW (0.08) — UBS Prestige-Brand ist geschuetzt
      • Travel-Peer-Effect: Reisende erzaehlen von Reise-Hacks
        → eSIM hat natuerliche WoM-Eigenschaft (Tier 3, aber intuitiv stark)

    ergebnis: |
      KANAL-EMPFEHLUNG (nach Fit-Verstaerkung sortiert):

      1. IN-APP PUSH vor Reise (hoechster Fit):
         «Sie reisen naechste Woche in die USA?
          Aktivieren Sie UBS Travel Connect in 30 Sekunden.»
         → Timing × Kontext × Personalisierung = maximale Conversion

      2. E-MAIL nach Kreditkarten-Auslandstransaktion:
         «Sie haben gerade in Bangkok bezahlt. Naechstes Mal mit
          UBS Travel Connect auch guenstiger telefonieren?»
         → Behavioral Trigger, hohe Relevanz

      3. REISEBUERO-PARTNERSCHAFTEN (Co-Marketing):
         Kuoni, Hotelplan, SBB International
         → Kontext-Fit ist natuerlich, erreicht Nicht-App-User

      4. SOCIAL MEDIA (Awareness, NICHT Conversion):
         Reise-Content mit eSIM-Integration, Influencer-Partnerschaften
         → Fuer Bekanntheit, nicht fuer direkten Verkauf

      WORD-OF-MOUTH PROGNOSE:
      • Baseline WoM-Intention: 3.8/7 (CI: [3.1, 4.5])
      • Nach positivem Reise-Erlebnis: 5.2/7 → aktive Empfehlung
      • «Reise-Hack»-Effekt: eSIM-Empfehlung ist ein natuerlicher
        Gespraechsstoff unter Reisenden
      • Risiko: WoM KIPPT bei technischen Problemen (Aktivierung
        funktioniert nicht am Flughafen = Negativspirale)

    naechster_schritt: |
      Zwei Empfehlungen:
      1. Pilot-Kanal: In-App Push an 5'000 Kund:innen mit bekannter
         Non-EU-Reise → Conversion messen → Dann skalieren
      2. WoM-Tracking einbauen: «Wie haben Sie von UBS Travel Connect
         erfahren?» → Messung des organischen WoM-Effekts
