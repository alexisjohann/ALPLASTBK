      current: 0.10  # Completion → Lead
      target: 0.25
      impact: "+150% Leads, aber Basis ist klein (13 → ~33 Closings)"

  cross_channel_synergies:
    primary: "Partner → Website → App (Neukundenakquise)"
    secondary: "Social → Website (Awareness-zu-Intent)"
    tertiary: "App Push → App GPT (Retention)"
    measurement: |
      Multi-Touch Attribution nötig!
