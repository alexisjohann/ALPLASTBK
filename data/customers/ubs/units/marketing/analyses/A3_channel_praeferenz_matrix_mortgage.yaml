# =============================================================================
# ANALYSE A3: CHANNEL-PRÄFERENZ-MATRIX — MORTGAGE CUSTOM GPT
# =============================================================================
# Superkey: ANA-UBS-GM-A3-CHANNEL
# Created: 2026-02-25
# Purpose: Kanal-spezifische Conversion-Erwartungen und Ψ-Modifikatoren
# Model-Ref: MOD-UBS-GMA-001 (Module A+D), ANA-UBS-GM-A1-JOURNEY, A2-TRUST
# =============================================================================

metadata:
  id: "ANA-UBS-GM-A3-CHANNEL"
  name: "Channel-Präferenz-Matrix: Mortgage Custom GPT"
  version: "1.0.0"
  created: "2026-02-25"
  customer: "UBS"
  unit: "Marketing / Growth Marketing"
  topic: "Mortgage Custom GPT — Kanalvergleich"

# =============================================================================
# 1. CHANNEL-ÜBERSICHT: 5 DISTRIBUTIONSKANÄLE
# =============================================================================
# Die Mortgage-GPT-Lösung soll auf 5 Kanälen eingesetzt werden.
# Jeder Kanal hat eigene Ψ-Bedingungen, Zielgruppen und Trust-Level.
# =============================================================================

channels:

  # ---------------------------------------------------------------------------
  # KANAL 1: UBS WEBSITE (ubs.com/hypotheken)
  # ---------------------------------------------------------------------------
  CH_WEB:
    name: "UBS Website (Eigenheim-Sektion)"
    description: |
      Integration des Mortgage GPT als Widget/Chatfenster auf der bestehenden
      UBS Eigenheim- und Hypotheken-Sektion. Primärer Einstiegspunkt für
      organische Besucher und SEO-Traffic.

    reach:
      monthly_visitors_estimate: 250000  # UBS CH Hypo-Seiten
      share_of_tam: 0.45  # 45% der Zielgruppe startet hier
      source: "Geschätzt basierend auf MKT-KUN-11 (65% Mobile Penetration)"

    psi_context:
      Psi_I: "institutional_branded"  # UBS Domain, starke Brand-Cues
      Psi_S: "anonymous"  # Allein, keine Peers sichtbar
      Psi_C: "deliberate"  # Bewusst nach Info suchend (System 2)
      Psi_T: "self_paced"  # Kein Zeitdruck, explorative Phase
      Psi_F: "digital_desktop_dominant"  # 60% Desktop, 40% Mobile
      Psi_M: "high_bandwidth"  # Rich Content möglich

    trust_profile:
      tau_channel: 0.85  # Hoher Trust (eigene Domain)
      trust_cues:
        - "UBS Logo und Brand Frame persistent sichtbar"
        - "SSL/Banking-Grade Security erkennbar"
        - "Disclaimer über indikative Natur"
        - "Link zu RM-Kontakt jederzeit verfügbar"
      trust_risks:
        - "Chatbot-Fatigue wenn Ergebnis unbefriedigend"
        - "Erwartungshaltung 'offizielle UBS-Beratung' zu hoch"

    target_segments:
      primary: "Erstkäufer:innen (40%)"
      secondary: "Anschlussfinanzierer:innen (25%)"
      tertiary: "Informationssuchende (30%)"
      not_reached: "Erben (selten über Website)"

    conversion_funnel:
      visit_to_engagement: 0.30  # 30% starten GPT-Interaktion
      engagement_to_completion: 0.60  # 60% schliessen Fragenkatalog ab
      completion_to_lead: 0.30  # 30% hinterlassen Kontaktdaten
      lead_to_appointment: 0.30  # 30% buchen Beratungstermin
      appointment_to_close: 0.30  # 30% schliessen Hypothek ab
      total_conversion: 0.0049  # Visit → Close: ~0.5%

    monthly_estimates:
      visits: 250000
      gpt_starts: 75000
      completions: 45000
      leads: 13500
      appointments: 4050
      closings: 1215

    strategic_role: "Primary Qualified Entry Point"
    strengths:
      - "Höchster Trust (eigene Domain)"
      - "SEO-Traffic bereits vorhanden"
      - "Volle Kontrolle über UX und Framing"
      - "Nahtlose Integration in bestehende Hypo-Journey"
    weaknesses:
      - "Nur bestehende UBS-Besucher erreicht"
      - "Desktop-lastig → Mobile-Optimierung nötig"
      - "Konkurrenz mit existierenden Hypo-Rechnern"

  # ---------------------------------------------------------------------------
  # KANAL 2: UBS MOBILE BANKING APP
  # ---------------------------------------------------------------------------
  CH_APP:
    name: "UBS Mobile Banking App"
    description: |
      Integration in die UBS Mobile Banking App als neues Feature
      im Eigenheim/Hypotheken-Bereich. Erreicht bestehende Kunden
      mit höchster digitaler Affinität.

    reach:
      active_app_users: 2275000  # 3.5M × 65% Mobile Penetration
      share_of_tam: 0.25  # 25% der Zielgruppe erreichbar via App
      source: "MKT-KUN-11 (65%), MKT-KUN-01 (3.5M Privatkunden)"

    psi_context:
      Psi_I: "institutional_authenticated"  # Login = höchste Identifikation
      Psi_S: "private"  # Persönliches Gerät, intim
      Psi_C: "variable"  # Mal fokussiert, mal nebenbei
      Psi_T: "micro_moments"  # Kurze Sessions, oft unterwegs
      Psi_F: "mobile_only"  # 100% Mobile, Touch-optimiert
      Psi_M: "personalized"  # Bekannte Kundendaten verfügbar

    trust_profile:
      tau_channel: 0.90  # Höchster Trust (authentifiziert, persönlich)
      trust_cues:
        - "Bereits eingeloggt = bestehende Kundenbeziehung"
        - "Personalisierung möglich (Salär, bestehende Produkte)"
        - "Direkter Draht zu RM via App"
        - "Banking-Grade Security bereits validiert"
      trust_risks:
        - "Micro-Moment-Kontext: zu wenig Zeit für Hypothekarfragen"
        - "App-Bloat-Risiko (noch ein Feature)"

    target_segments:
      primary: "Anschlussfinanzierer:innen (45%)"  # Bestehende Kunden
      secondary: "Erstkäufer:innen (UBS-Kund:innen, 30%)"
      tertiary: "Informationssuchende (25%)"
      advantage: "Bestehende Kund:innen mit bekannten Finanzdaten"

    conversion_funnel:
      visit_to_engagement: 0.15  # Nur 15% sehen/nutzen Hypo-Feature
      engagement_to_completion: 0.50  # 50% schliessen ab (kürzer in App)
      completion_to_lead: 0.40  # 40% (bereits Kunde, niedrige Barrier)
      lead_to_appointment: 0.35  # 35% (1-Click Terminbuchung)
      appointment_to_close: 0.35  # 35% (Personalisierung)
      total_conversion: 0.0037  # Visit → Close: ~0.4%

    monthly_estimates:
      feature_views: 341250  # 2.275M × 15%
      gpt_starts: 51188
      completions: 25594
      leads: 10238
      appointments: 3583
      closings: 1254

    strategic_role: "Retention & Cross-Sell Engine"
    strengths:
      - "Höchster Trust aller Kanäle (authentifiziert)"
      - "Personalisierung möglich (Salär, 3a, Vermögen)"
      - "Push-Notifications für Timing-Events"
      - "Nahtlose RM-Integration"
    weaknesses:
      - "Nur bestehende UBS-Kund:innen"
      - "Hypothekar-Kontext nicht primärer App-Use-Case"
      - "Micro-Moment vs. deliberate Hypothekarplanung"

  # ---------------------------------------------------------------------------
  # KANAL 3: CHATGPT MARKETPLACE
  # ---------------------------------------------------------------------------
  CH_MARKETPLACE:
    name: "ChatGPT Marketplace (OpenAI Store)"
    description: |
      UBS Mortgage GPT als Custom GPT im OpenAI Marketplace verfügbar.
      Erreicht ChatGPT-Power-User, die nach Finanz-Tools suchen.
      Höchste Reichweite, aber niedrigstes Trust-Level.

    reach:
      chatgpt_users_ch_estimate: 750000  # ~8.5% der CH-Bevölkerung
      share_of_tam: 0.15  # 15% der Zielgruppe erreicht (Überlappung)
      source: "CH-KI-10 (LLM-Nutzung 22%), Geschätzt"

    psi_context:
      Psi_I: "third_party_platform"  # OpenAI-Umgebung, nicht UBS
      Psi_S: "anonymous_exploratory"  # Neugierig, vergleichend
      Psi_C: "experimental"  # «Mal schauen was der kann»
      Psi_T: "self_paced"  # Keine Zeitbegrenzung
      Psi_F: "chatgpt_native"  # ChatGPT-Interface, kein UBS-Branding
      Psi_M: "text_only"  # Kein Rich Content, kein Kalkulator

    trust_profile:
      tau_channel: 0.45  # Niedriger Trust (Drittplattform, kein UBS-Frame)
      trust_cues:
        - "UBS Name im GPT-Titel"
        - "Beschreibung referenziert UBS"
      trust_risks:
        - "Kein UBS-Branding im Chat-Interface"
        - "Andere GPTs in Konkurrenz sichtbar"
        - "Kein Login = keine Personalisierung"
        - "Prompt-Injection-Risiko (Reputationsrisiko)"
        - "Halluzinationsrisiko bei Zinssätzen"
        - "ChatGPT-skeptische Zielgruppe ausgeschlossen"

    target_segments:
      primary: "Digital Natives / Early Adopters (50%)"
      secondary: "Informationssuchende (40%)"
      tertiary: "Vergleichende Erstkäufer:innen (10%)"
      not_reached: "Anschlussfinanzierer:innen (bestehende Kund:innen)"

    conversion_funnel:
      discovery_rate: 0.02  # 2% der CH ChatGPT-User finden es
      visit_to_engagement: 0.50  # 50% interagieren (sie kamen bewusst)
      engagement_to_completion: 0.35  # 35% (kein Commitment)
      completion_to_lead: 0.10  # 10% (Hürde: externer Link zu UBS)
      lead_to_appointment: 0.20  # 20% (kalter Lead, Trust-Gap)
      appointment_to_close: 0.25  # 25% (Qualität unklar)
      total_conversion: 0.0004  # Discovery → Close: ~0.04%

    monthly_estimates:
      discoveries: 15000  # 750K × 2%
      gpt_starts: 7500
      completions: 2625
      leads: 263
      appointments: 53
      closings: 13

    strategic_role: "Brand Awareness & Innovation Signal"
    strengths:
      - "Neue Zielgruppe (ChatGPT-User)"
      - "Innovation-Positioning für UBS"
      - "Kosteneffizient (marginale Kosten)"
      - "SEO/PR-Wert ('UBS hat einen ChatGPT')"
    weaknesses:
      - "Sehr niedrige Conversion (Trust-Gap)"
      - "Kein UBS-Branding-Kontrolle"
      - "Halluzinations- und Reputationsrisiko"
      - "Prompt-Injection-Angriffe möglich"
      - "Kalte Leads, lange Conversion-Zyklen"

  # ---------------------------------------------------------------------------
  # KANAL 4: PARTNER-PLATTFORMEN (Homegate, ImmoScout24)
  # ---------------------------------------------------------------------------
  CH_PARTNER:
    name: "Partner-Plattformen (Homegate, ImmoScout24, Comparis)"
    description: |
      Mortgage GPT als White-Label oder Co-Branded Widget auf Immobilien-
      Plattformen. Erreicht Nutzer:innen genau im Moment der
      Immobiliensuche (höchste Relevanz, aber geteiltes Branding).

    reach:
      platform_visitors_monthly: 3500000  # Homegate + ImmoScout24 + Comparis
      share_of_tam: 0.35  # 35% der Zielgruppe nutzt aktiv
      source: "Geschätzt (Homegate ~2M, ImmoScout ~1M, Comparis ~500K)"

    psi_context:
      Psi_I: "partner_context"  # Immobilien-Plattform, nicht Bank
      Psi_S: "high_intent"  # Aktiv nach Immobilien suchend
      Psi_C: "motivated"  # System 2, hohe Relevanz
      Psi_T: "decision_proximate"  # Nah an Kaufentscheidung
      Psi_F: "mixed"  # 50% Mobile, 50% Desktop
      Psi_M: "integrated_in_search"  # Während Objektsuche

    trust_profile:
      tau_channel: 0.60  # Mittlerer Trust (Plattform-vertrauen + UBS-Name)
      trust_cues:
        - "UBS als bekannter Partner"
        - "Kontext-Relevanz (Hypothek bei Immobiliensuche)"
        - "Plattform-Endorsement (Homegate empfiehlt)"
      trust_risks:
        - "Konkurrenz mit anderen Hypothekar-Angeboten"
        - "Geteilte Aufmerksamkeit (Objektsuche dominiert)"
        - "Lead-Sharing mit Plattform"

    target_segments:
      primary: "Erstkäufer:innen (55%)"
      secondary: "Informationssuchende (30%)"
      tertiary: "Anschlussfinanzierer:innen (15%)"
      advantage: "Höchste Kaufintention aller Kanäle"

    conversion_funnel:
      widget_view_rate: 0.08  # 8% sehen Hypo-Widget bei Objektsuche
      visit_to_engagement: 0.40  # 40% (hohe Relevanz)
      engagement_to_completion: 0.45  # 45% (motiviert)
      completion_to_lead: 0.25  # 25% (UBS-spezifisch)
      lead_to_appointment: 0.25  # 25% (warm aber Plattform-Wechsel)
      appointment_to_close: 0.28  # 28%
      total_conversion: 0.0010  # View → Close: ~0.1%

    monthly_estimates:
      widget_views: 280000  # 3.5M × 8%
      gpt_starts: 112000
      completions: 50400
      leads: 12600
      appointments: 3150
      closings: 882

    strategic_role: "Intent-Driven Acquisition"
    strengths:
      - "Höchste Kaufintention (aktive Immobiliensuche)"
      - "Kontext-relevantester Touchpoint"
      - "Neue Kund:innen (nicht nur UBS-Bestand)"
      - "Win-Win für Plattform und Bank"
    weaknesses:
      - "Geteiltes Branding reduziert Trust"
      - "Konkurrenz mit anderen Finanzierern auf Plattform"
      - "Abhängigkeit von Partner-Bedingungen"
      - "Lead-Kosten/-Sharing"

  # ---------------------------------------------------------------------------
  # KANAL 5: SOCIAL MEDIA (LinkedIn, Instagram, YouTube)
  # ---------------------------------------------------------------------------
  CH_SOCIAL:
    name: "Social Media (LinkedIn, Instagram, YouTube)"
    description: |
      Promotion des Mortgage GPT über Social-Media-Kampagnen mit
      Link zur UBS Website oder direkt zum GPT. Awareness-Kanal
      mit niedrigster direkter Conversion, aber breiter Reichweite.

    reach:
      social_media_reach: 2000000  # UBS CH Social Media Follower (geschätzt)
      share_of_tam: 0.10  # 10% der Zielgruppe
      source: "Geschätzt (UBS LinkedIn ~1M, Instagram ~300K, YouTube ~200K)"

    psi_context:
      Psi_I: "social_feed"  # Zwischen Katzenvideos und News
      Psi_S: "public_social"  # Soziales Umfeld sichtbar
      Psi_C: "distracted"  # System 1, Scrolling-Modus
      Psi_T: "micro_moment"  # 3-5 Sekunden Aufmerksamkeit
      Psi_F: "mobile_dominant"  # 90% Mobile
      Psi_M: "scroll_feed"  # Muss aus Feed herausstechen

    trust_profile:
      tau_channel: 0.35  # Niedrigster Trust (Werbung in Social Feed)
      trust_cues:
        - "UBS Verified Account"
        - "Professionelles Creative"
      trust_risks:
        - "Ad-Fatigue und Banner-Blindness"
        - "Skepsis gegenüber Finanzwerbung"
        - "Kommentarspalte kann Narrativ übernehmen"
        - "FINMA-Compliance bei Zinsangaben in Ads"

    target_segments:
      primary: "Informationssuchende (50%)"
      secondary: "Erstkäufer:innen (early awareness, 35%)"
      tertiary: "Digital Natives (15%)"

    conversion_funnel:
      impression_to_click: 0.015  # 1.5% CTR (Finance-Benchmark)
      click_to_engagement: 0.30  # 30% starten GPT
      engagement_to_completion: 0.25  # 25% (niedrige Attention)
      completion_to_lead: 0.15  # 15%
      lead_to_appointment: 0.15  # 15%
      appointment_to_close: 0.25  # 25%
      total_conversion: 0.00006  # Impression → Close: ~0.006%

    monthly_estimates:
      impressions: 5000000
      clicks: 75000
      gpt_starts: 22500
      completions: 5625
      leads: 844
      appointments: 127
      closings: 32

    strategic_role: "Top-of-Funnel Awareness"
    strengths:
      - "Breite Reichweite"
      - "Targeting nach Lebensereignissen möglich"
      - "Retargeting-Audiences aufbauen"
      - "Content-Marketing-Synergien"
    weaknesses:
      - "Niedrigste Conversion aller Kanäle"
      - "Hohe Kosten pro Lead"
      - "FINMA-Compliance-Restriktionen"
      - "System-1-Kontext vs. System-2-Entscheidung"

# =============================================================================
# 2. VERGLEICHSMATRIX
# =============================================================================

comparison_matrix:
  columns: ["Kanal", "τ_channel", "Reach", "Conv. Rate", "Closings/Mo", "CAC-Rang", "Strategische Rolle"]
  rows:
    - ["UBS Website",     0.85, "250K",  "0.49%",  1215, 1, "Primary Entry Point"]
    - ["UBS App",         0.90, "341K*", "0.37%",  1254, 2, "Retention Engine"]
    - ["Partner",         0.60, "280K",  "0.10%",   882, 3, "Intent Acquisition"]
    - ["ChatGPT Market.", 0.45, "15K",   "0.04%",    13, 5, "Innovation Signal"]
    - ["Social Media",    0.35, "75K*",  "0.006%",   32, 4, "Awareness"]
  note: |
    * App: Feature Views (nicht App-Opens)
    * Social: Clicks (nicht Impressions)
    Total geschätzte Closings/Monat: ~3'396
    Total geschätzte Closings/Jahr: ~40'752
    Bei Ø CHF 750K Hypothek = ~CHF 30.6 Mrd. Volumen
    Bei Ø 1.2% Marge = ~CHF 367 Mio. Jahresertrag

# =============================================================================
# 3. CHANNEL-KOMPLEMENTARITÄT (γ-MATRIX)
# =============================================================================
# Aus MOD-UBS-GMA-001 und erweitert für Mortgage GPT
# γ > 0: Kanäle verstärken sich gegenseitig
# γ < 0: Kanäle kannibalisieren sich
# γ = 0: Unabhängig
# =============================================================================

channel_complementarity:
  description: |
    Die Komplementaritäts-Matrix zeigt, wie Kanalpaare interagieren.
    Positive γ-Werte bedeuten Synergie (1+1 > 2),
    negative bedeuten Kannibalisierung.

  matrix:
    WEB_x_APP:
      gamma: -0.05
      interpretation: "Leichte Substitution (gleiche UBS-Kunden)"
      note: "Aus MOD-UBS-GMA-001: -0.10, angepasst für Mortgage-Kontext"

    WEB_x_PARTNER:
      gamma: 0.15
      interpretation: |
        Moderat positiv: Partner-Plattform lenkt neue User auf UBS Website.
        Retargeting-Effekt: Wer auf Homegate den GPT nutzt, googelt danach UBS.

    WEB_x_MARKETPLACE:
      gamma: 0.10
      interpretation: |
        Leicht positiv: ChatGPT-Nutzer, die den GPT ausprobieren, besuchen
        danach die offizielle UBS-Seite für «echte» Informationen.

    WEB_x_SOCIAL:
      gamma: 0.20
      interpretation: |
        Positiv: Social Media treibt Traffic auf Website.
        Standard-Marketing-Komplementarität.

    APP_x_PARTNER:
      gamma: 0.05
      interpretation: "Minimal: App erreicht Bestand, Partner Neukund:innen"

    APP_x_MARKETPLACE:
      gamma: 0.00
      interpretation: "Unabhängig: Unterschiedliche Zielgruppen"

    APP_x_SOCIAL:
      gamma: 0.10
      interpretation: "Leicht positiv: Social erinnert App-User an Feature"

    PARTNER_x_MARKETPLACE:
      gamma: -0.10
      interpretation: "Leichte Kannibalisierung: Beide erreichen Suchende"

    PARTNER_x_SOCIAL:
      gamma: 0.15
      interpretation: "Positiv: Social Ads bei Immobiliensuche verstärken Partner"

    MARKETPLACE_x_SOCIAL:
      gamma: 0.05
      interpretation: "Minimal: Social kann auf GPT verweisen"

# =============================================================================
# 4. SEGMENT × CHANNEL PRÄFERENZ-MATRIX
# =============================================================================

segment_channel_preferences:
  description: |
    Welcher Kanal erreicht welches Segment am effektivsten?
    Werte: Affinität 0-1 (0 = irrelevant, 1 = primärer Kanal)

  matrix:
    # Segment:        WEB   APP   PARTNER  MARKET  SOCIAL
    Erstkaeufer:     [0.80, 0.40, 0.90,    0.30,   0.50]
    Anschlussfinanz: [0.50, 0.90, 0.20,    0.10,   0.20]
    Erben:           [0.60, 0.50, 0.10,    0.05,   0.15]
    Informations:    [0.85, 0.30, 0.60,    0.60,   0.70]

  insights:
    - segment: "Erstkäufer:innen"
      best_channel: "Partner-Plattformen"
      reason: |
        Erstkäufer:innen sind aktiv auf Immobilienportalen (Homegate,
        ImmoScout24). Dort ist die Kaufintention am höchsten und der
        Hypothekar-Kontext am relevantesten.
      second_best: "UBS Website"
      multi_channel: "Partner → Website → App (nach Kontoeröffnung)"

    - segment: "Anschlussfinanzierer:innen"
      best_channel: "UBS App"
      reason: |
        Bestehende Kund:innen nutzen primär die App. Push-Notification
        6-12 Monate vor Ablauf der Festhypothek ist höchster ROI-Trigger.
        Personalisierung (aktuelle Konditionen, Vergleich) möglich.
      second_best: "UBS Website"
      multi_channel: "Push → App → Website (Deep Dive) → RM"

    - segment: "Erben"
      best_channel: "UBS Website"
      reason: |
        Erben suchen primär allgemeine Information (Erbschaftssteuer,
        Übernahme vs. Verkauf). Website-Content fängt diese Suche ab.
      second_best: "UBS App (falls bestehende Kundin)"
      multi_channel: "Search → Website → RM (hochkomplex)"

    - segment: "Informationssuchende"
      best_channel: "UBS Website"
      reason: |
        Exploratives Verhalten, vergleichend, noch nicht entschieden.
        Website bietet die beste Kombination aus Tiefe und Breite.
      second_best: "Social Media (Awareness) + Partner (Intent)"
      multi_channel: "Social → Website → Partner → Website → Lead"

# =============================================================================
# 5. KANAL-SPEZIFISCHE SURVEY-IMPLIKATIONEN
# =============================================================================
# Die bestehenden ~15 Survey-Fragen müssen pro Kanal angepasst werden.
# =============================================================================

survey_implications:

  channel_identification:
    critical: true
    recommendation: |
      PFLICHT: Jede Survey-Response MUSS den Kanal identifizieren.
      Ohne Kanal-Zuordnung ist die Datenanalyse wertlos, da die
      Ψ-Kontexte (Trust, Intent, Attention) stark variieren.
    implementation:
      - "UTM-Parameter für Kanalherkunft"
      - "Erste Frage: 'Wie sind Sie auf diesen Service aufmerksam geworden?'"
      - "Technisches Tracking des Referrers"

  channel_specific_adjustments:
    marketplace:
      issue: "Niedrigster Trust, höchste Skepsis"
      adjustments:
        - "Trust-Building Frage früh: 'Wie wichtig ist Ihnen, dass diese Beratung von einer Bank stammt?'"
        - "Expliziter UBS-Hinweis zu Beginn"
        - "Weniger Fragen (max 8 statt 15) — Attention-Budget niedriger"

    partner:
      issue: "Hohe Intent, geteiltes Branding"
      adjustments:
        - "Intent-Level-Frage: 'Haben Sie bereits ein konkretes Objekt im Blick?'"
        - "Plattform-spezifische Referenz: 'Bezugnehmend auf Ihre Suche auf [Homegate]...'"
        - "Co-Branding klar kommunizieren"

    app:
      issue: "Micro-Moments, bereits Kunde"
      adjustments:
        - "Kürzer (max 10 Fragen)"
        - "Personalisierung: 'Basierend auf Ihrem UBS-Profil...'"
        - "Skip-Logic für bekannte Informationen"
        - "Push-Notification Opt-in für Follow-up"

    social:
      issue: "Niedrigste Attention, Scroll-Kontext"
      adjustments:
        - "Maximal 5 Einstiegsfragen"
        - "Gamification-Element: 'Finden Sie in 2 Minuten Ihre Tragbarkeit heraus'"
        - "Progressive Disclosure: Mehr Fragen nur bei Engagement"

# =============================================================================
# 6. STRATEGISCHE EMPFEHLUNGEN
# =============================================================================

strategic_recommendations:

  channel_prioritization:
    description: "Empfohlene Reihenfolge der Kanal-Aktivierung"
    phases:
      phase_1_launch:
        timing: "Monat 1-3"
        channels: ["UBS Website", "UBS App"]
        rationale: |
          Höchster Trust, volle Kontrolle, bestehende Infrastruktur.
          Erlaubt kontrolliertes Testing vor Öffnung auf Drittplattformen.
        expected_closings_monthly: 2469  # Website + App

      phase_2_expansion:
        timing: "Monat 4-6"
        channels: ["Partner-Plattformen (Homegate)"]
        rationale: |
          Nach Validierung der Conversion-Funnel auf eigenen Kanälen
          öffnen für Partner. Höchste Neukundenakquise.
        expected_closings_monthly: 3351  # + Partner

      phase_3_ecosystem:
        timing: "Monat 7-12"
        channels: ["ChatGPT Marketplace", "Social Media"]
        rationale: |
          Awareness-Kanäle nach Proof-of-Concept auf Kernkanälen.
          ChatGPT Marketplace als Innovation-Signal, Social als Traffic-Treiber.
        expected_closings_monthly: 3396  # + Marketplace + Social

  key_insight: |
    80% des erwarteten Volumens (Website + App + Partner) erfordern
    nur 3 Kanäle. ChatGPT Marketplace und Social Media sind
    Awareness-Kanäle mit marginalem Conversion-Beitrag aber
    strategischem Signalling-Wert.

  trust_optimization_by_channel:
    highest_roi:
      channel: "UBS Website"
      lever: "GPT-zu-RM-Handoff optimieren (Completion → Lead)"
      current: 0.30
      target: 0.45
      impact: "+50% mehr Leads bei gleichen Visits"

    biggest_volume:
