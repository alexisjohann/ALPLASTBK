      RANGE: CHF 1.0 Mrd (pessimistisch) — CHF 1.4 Mrd (expected) — CHF 1.9 Mrd (optimistisch).

      Aenderung: CHF 1.8 → 1.4 Mrd (-22%). Immer noch ein starker Business Case.
      GROESSTER HEBEL: Monthly Engagements (12,500) hat KEINE empirische Basis.
      UBS-interne Traffic-Daten wuerden diese Schaetzung massiv schaerfen.

