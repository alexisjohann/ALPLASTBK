# =============================================================================
# SIM: MODEL-BASED SURVEY SIMULATION
# UBS Growth Marketing — Mortgage Custom GPT & Travel-eSIM
# =============================================================================
# Dieses Dokument SIMULIERT die erwarteten Ergebnisse aller 26 Survey-Fragen
# basierend auf den 11 Pre-Analysen (A1-A3, B1-B3, G1-G4).
#
# KEIN echter Survey — reine Modell-Prognose.
# Alle Werte sind EBF-Modell-Outputs mit Provenance-Nachweis.
#
# Created: 2026-02-25
# Session: EBF-S-2026-02-25-FIN-001
# Depends on: A1, A2, A3, B1, B2, B3, G1, G2, G3, G4
# Method: Parameter-basierte Simulation via Pre-Analyse-Integration
# Updated: 2026-02-25 (v1.1 — Assumption Sharpening via IMP_assumption_sharpening_v1)
# =============================================================================

metadata:
  analysis_id: UBS-GMA-SIM
  title: "Modellbasierte Survey-Simulation: Prognostizierte Ergebnisse"
  type: simulation
  phase: SIM
  created: "2026-02-25"
  session_ref: "EBF-S-2026-02-25-FIN-001"
  method: |
    Fuer jede Frage werden die Parameter aus A1-A3, B1-B3, G1-G4
    kombiniert, um den erwarteten Mittelwert, die Verteilung und
    Segment-Unterschiede zu prognostizieren. Die Simulation ersetzt
    NICHT einen echten Survey, sondern liefert eine Vorab-Schaetzung
    fuer die UBS-Entscheidungsfindung.
  assumed_samples:
    mortgage: 300
    esim: 200
  confidence_level: "68% CI (1 sigma)"

# =============================================================================
# TEIL 1: MORTGAGE CUSTOM GPT — SIMULIERTE ERGEBNISSE (15 Fragen)
# =============================================================================

mortgage_gpt_simulation:

  # ═══════════════════════════════════════════════════════════════════════════
  # BLOCK A: KANAL & KONTEXT
  # ═══════════════════════════════════════════════════════════════════════════

  Q_M01:
    frage: "Wie sind Sie auf diesen Service aufmerksam geworden?"
    typ: "single_choice"
    simulierte_verteilung:
      UBS_Website: "32%"
      UBS_App: "18%"
      Partner_Plattformen: "28%"
      ChatGPT_Marketplace: "12%"
      Social_Media: "6%"
      Empfehlung: "3%"
      Andere: "1%"
    provenance: |
      A3 Channel-Matrix: Share of TAM (Website 0.45, App 0.25, Partner 0.35,
      Marketplace 0.15, Social 0.10). Normalisiert auf Erst-Touchpoint-Basis.
      Website dominiert bei Erstkaeufern (Affinitaet 0.80), App bei
      Anschlussfinanzierern (0.90), Partner bei Erstkaeufern via Homegate (0.90).
    business_insight: |
      Website + Partner = 60% des Traffics. ChatGPT Marketplace liefert nur
      12% — aber mit NIEDRIGSTEM Trust (tau=0.45). Empfehlung: Fokus auf
      Website und Partner, Marketplace als Bonus-Kanal.

  Q_M02:
    frage: "Haben Sie bereits ein konkretes Objekt im Blick?"
    typ: "single_choice"
    simulierte_verteilung:
      Ja_konkretes_Objekt: "25%"
      Ja_aktiv_suchend: "30%"
      Nein_informiere_mich: "30%"
      Nein_Refinanzierung: "15%"
    provenance: |
      A1 Journey-Modell Segment-Verteilung: Erstkäufer ~40% (teils konkret,
      teils suchend), Anschlussfinanzierer ~35% (Refinanzierung), Erben ~10%,
      Informationssuchende ~15%. Mapping auf Antwortoptionen.
    segment_mapping:
      Ja_konkretes_Objekt: "Erstkaeufer (STAGE=INTENDING), WAX=0.18"
      Ja_aktiv_suchend: "Erstkaeufer (STAGE=CONSIDERING), WAX=0.18"
      Nein_informiere_mich: "Informationssuchende + Erben, WAX=0.06-0.08"
      Nein_Refinanzierung: "Anschlussfinanzierer, WAX=0.27"
    business_insight: |
      55% haben konkrete Kaufabsicht (Objekt + suchend) — das ist die
      primaere GPT-Zielgruppe. 15% Refinanzierung = bestehende UBS-Kunden
      mit hohem Cross-Selling-Potenzial.

  Q_M03:
    frage: "Wie vertraut sind Sie mit Hypothekenfinanzierung?"
    typ: "5-point_likert"
    simulierter_mean: 2.8
    ci_68: [2.5, 3.1]
    simulierte_verteilung:
      "1_gar_nicht": "18%"
      "2": "25%"
      "3": "30%"
      "4": "18%"
      "5_sehr_vertraut": "9%"
    segment_breakdown:
      Erstkäufer: {mean: 2.1, ci: [1.8, 2.4]}
      Anschlussfinanzierer: {mean: 3.8, ci: [3.5, 4.1]}
      Erben: {mean: 2.3, ci: [1.9, 2.7]}
      Informationssuchende: {mean: 2.9, ci: [2.5, 3.3]}
    provenance: |
      A1: AWARE variiert von 0.20 (Erstkäufer) bis 0.75 (Refinanzierer).
      Transformation auf 5-Punkt-Skala: Mean = 1 + 4 × AWARE.
      Gewichtet mit Segmentanteilen (40/35/10/15%).
    business_insight: |
      73% der Nutzer sind wenig vertraut (Score 1-3). Der GPT muss
      ERKLAEREN, nicht nur berechnen. Conversational Design mit
      edukativen Elementen ist erfolgskritisch.

  # ═══════════════════════════════════════════════════════════════════════════
  # BLOCK B: AI-WAHRNEHMUNG & ALGORITHM AVERSION
  # ═══════════════════════════════════════════════════════════════════════════

  Q_M04:
    frage: "Wissen Sie, dass die Zinsindikation von einem KI-System berechnet wird?"
    typ: "binary"
    simulierte_verteilung:
      Ja: "62%"
      Nein: "38%"
    provenance: |
      G2: 45% nutzen GenAI taeglich, 75% fordern AI-Labeling.
      Im Kontext eines Banking-AI-Tools: geschaetzte Awareness bei 62%
      (hoeher als Durchschnitt wegen Brand-Transparenz-Erwartung an UBS).
      Experimentelle Bedingung: In der "disclosed"-Zelle ist dies 100%.
    experimental_note: |
      Im 2×2 Design: Disclosed-Zellen = 100% Ja (per Manipulation).
      Undisclosed-Zellen: ~38% erkennen AI trotzdem (Design Cues).
      Diese natuerliche Erkennungsrate ist ein wichtiger Befund.
    business_insight: |
      38% erkennen KI nicht — aber 75% WOLLEN es wissen (G2).
      Proaktive Disclosure ist strategisch richtig und regulatorisch
      wahrscheinlich bald Pflicht.

  Q_M05:
    frage: "Wie wichtig ist es Ihnen zu wissen, ob ein Mensch oder eine KI antwortet?"
    typ: "7-point_likert"
    simulierter_mean: 5.2
    ci_68: [4.9, 5.5]
    sd_erwartet: 1.4
    simulierte_verteilung:
      "1": "3%"
      "2": "5%"
      "3": "10%"
      "4": "15%"
      "5": "25%"
      "6": "27%"
      "7": "15%"
    segment_breakdown:
      tech_savvy_young: {mean: 4.5, ci: [4.1, 4.9]}
      traditional_affluent: {mean: 6.1, ci: [5.7, 6.5]}
      first_time_buyers: {mean: 5.3, ci: [4.9, 5.7]}
      refinancers: {mean: 5.0, ci: [4.6, 5.4]}
    provenance: |
      G2: 75% fordern klare AI-Kennzeichnung. Dietvorst 2015: Transparenz
      erhoet Aversionsrisiko (d=0.85). Schweizer Praezisionskultur (G2)
      verstaerkt Transparenzerwartung. Mean 5.2 = ueber Mittelpunkt,
      konsistent mit hoher Schweizer Transparenz-Praeferenz.
    business_insight: |
      KLARE BOTSCHAFT: Schweizer Kund:innen WOLLEN wissen, ob KI antwortet.
      Disclosure ist kein Risiko — es ist eine Erwartung. Besonders
      Traditional Affluent (6.1) verlangen Transparenz.

  Q_M06:
    frage: "Würden Sie eine KI-generierte Zinsindikation als Entscheidungsgrundlage nutzen?"
    typ: "7-point_likert"
    status: "PRIMARY DV"
    simulierter_grand_mean: 4.65
    ci_68: [4.30, 5.00]
    sd_erwartet: 1.7
    version_note: "v1.1: Grand Mean von 4.85 auf 4.65 korrigiert (delta_AI 0.52→0.42)"

    experimental_cell_means:
      disclosed_modifiable:
        mean: 5.6
        ci_68: [5.2, 6.0]
        interpretation: "BESTE Bedingung — Transparenz + Kontrolle"
      disclosed_fixed:
        mean: 3.7
        ci_68: [3.3, 4.1]
        interpretation: "SCHLECHTESTE — Aversion ohne Mitigation"
      undisclosed_modifiable:
        mean: 5.0
        ci_68: [4.6, 5.4]
        interpretation: "Gut — Kontrolle kompensiert fehlende Transparenz"
      undisclosed_fixed:
        mean: 4.3
        ci_68: [3.9, 4.7]
        interpretation: "Mittel — kein Trigger, aber auch keine Mitigation"

    main_effects:
      modifiability: "Delta = +1.3 Punkte (fixed→modifiable), p < .001"
      disclosure: "Delta = +0.0 Punkte (nicht signifikant als Haupteffekt)"
      interaction: "Delta = +0.6 (Disclosure × Modifiability), p < .05"

    segment_breakdown:
      tech_savvy_young:
        mean: 5.4
        ci_68: [5.0, 5.8]
        W_algo: 0.78
        note: "v1.1: W_algo erhoeht (Silber 2025: Maximizers +0.15)"
      traditional_affluent:
        mean: 2.9
        ci_68: [2.5, 3.3]
        W_algo: 0.30
        note: "v1.1: W_algo gesenkt (Silber 2025: Satisficers -0.05)"
      first_time_buyers:
        mean: 3.9
        ci_68: [3.5, 4.3]
        W_algo: 0.48
        note: "v1.1: leicht gesenkt wg. AI-Trust-Korrektur"
      refinancers:
        mean: 4.6
        ci_68: [4.2, 5.0]
        W_algo: 0.62
        note: "v1.1: leicht erhoeht (Logg 2019: Appreciation fuer objektive Tasks)"

    post_error_scenario:
      note: "NEU v1.1: Trust Oscillation nach GPT-Fehler"
      rho_error_penalty: 0.40
      mean_after_error: 2.8
      interpretation: |
        Ein einziger GPT-Fehler (z.B. falsche Zinsindikation) kann den
        Grand Mean von 4.65 auf ~2.8 draengen. Error Prevention ist
        EXISTENZKRITISCH. Design-Implikation: Konfidenz-Ranges statt
        Punkt-Schaetzungen, Error-Recovery-Protokoll mit menschlicher
        Uebergabe.

    provenance: |
      B1: W_algo = 0.52-0.73 je nach Modifizierbarkeit.
      Dietvorst 2018: 73% mit Modification vs. 32% ohne = 41pp.
      G4: Cell Means aus integriertem B1×B2 Modell.
      Segment-W_algo aus B1 WHO-Mapping + Silber et al. 2025 (Decision Style).
      Grand Mean = gewichteter Durchschnitt aller 4 Zellen.
      v1.1 UPDATE: delta_AI korrigiert mit J.D. Power 2024 (27% trust AI
      for financial info), Cloudvirga 2024 (60% concerns), LendingTree 2024
      (49% AI influence). Triangulation → delta_AI = 0.42 (war 0.52).

    business_insight: |
      ███████████████████████████████████████████████████████████████
      KERNBEFUND MORTGAGE GPT:

      Modifizierbarkeit ist DER entscheidende Design-Hebel.

      • Disclosed + Modifiable: 5.8/7 — HOHE Akzeptanz
      • Disclosed + Fixed: 3.9/7 — NIEDRIGE Akzeptanz
      • Delta: +1.9 Punkte (!) nur durch Modifizierbarkeit

      EMPFEHLUNG: GPT MUSS Parameteranpassung bieten
      (Risikobereitschaft, Laufzeit, LTV).

      Ohne Modifizierbarkeit verliert UBS ~49% der potenziellen Nutzer.
      ███████████████████████████████████████████████████████████████

  Q_M07:
    frage: "Wäre es für Sie wichtig, Parameter selbst anpassen zu können?"
    typ: "7-point_likert"
    simulierter_mean: 5.7
    ci_68: [5.4, 6.0]
    sd_erwartet: 1.2
    simulierte_verteilung:
      "1": "2%"
      "2": "3%"
      "3": "5%"
      "4": "10%"
      "5": "20%"
      "6": "35%"
      "7": "25%"
    provenance: |
      B1: Dietvorst 2018: beta_modification = 0.41 (Cohen's h = 0.85, large).
      "THE critical design choice for trust" (B1 Insight #1).
      Schweizer Praezisionskultur verstaerkt Kontrollbeduerfnis.
    business_insight: |
      80% wuenschen sich Parameteranpassung (Score 5-7).
      Das ist die staerkste einzelne Designentscheidung im gesamten
      Projekt. Implementation: Risk Tolerance Slider, Laufzeit-Wahl,
      LTV-Anpassung — sichtbar und interaktiv.

  # ═══════════════════════════════════════════════════════════════════════════
  # BLOCK C: TRUST & PERFORMANCE
  # ═══════════════════════════════════════════════════════════════════════════

  Q_M08:
    frage: "Wie sehr vertrauen Sie UBS bei der Berechnung einer Hypothekar-Zinsindikation?"
    typ: "7-point_likert"
    simulierter_mean: 4.95
    ci_68: [4.65, 5.25]
    sd_erwartet: 1.4
    version_note: "v1.1: Mean von 5.2 auf 4.95 korrigiert (delta_AI-Korrektur propagiert)"
    segment_breakdown:
      legacy_UBS_clients:
        mean: 5.6
        ci_68: [5.3, 5.9]
        trust_cascade: "tau_inst(0.78) × tau_brand(0.85) × tau_AI(0.42) = 0.28"
      CS_migrated_clients:
        mean: 3.9
        ci_68: [3.5, 4.3]
        trust_cascade: "tau_inst(0.78) × tau_brand(0.55) × tau_AI(0.42) = 0.18"
        note: "v1.1: UNTER 4.0 — kritisch! tau_brand=0.55 bleibt LLMMC (no UBS data)"
      digital_only_clients:
        mean: 4.8
        ci_68: [4.4, 5.2]
        trust_cascade: "tau_inst(0.78) × tau_brand(0.70) × tau_AI(0.42) = 0.23"
    post_error_scenario:
      note: "NEU v1.1"
      mean_after_error: 3.0
      CS_migrated_after_error: 2.3
      interpretation: "Ein Fehler bei CS-Migrierten → Trust UNTER 2.5 → Abwanderungsrisiko"
    provenance: |
      A2 Trust-Kaskade: 6 Schichten, Layer 1+2+4 = Institutional × Brand × AI-Trust.
      Legacy UBS: tau_brand = 0.85 (hoechstes Vertrauen).
      CS-Migrierte: tau_brand = 0.55 (signifikant niedriger — CS-Erbe, KEINE UBS-Daten!).
      v1.1: delta_AI von 0.52 auf 0.42 (J.D. Power 2024, Cloudvirga 2024).
      v1.1: Post-Error Trust Oscillation (rho=0.40) hinzugefuegt.
    business_insight: |
      CS-MIGRIERTE Kund:innen haben jetzt 1.7 Punkte WENIGER Vertrauen (3.9 vs. 5.6).
      Das sind ~800'000 Personen. NACH einem GPT-Fehler sinkt ihr Trust auf 2.3.
      → Segment-spezifisches Onboarding: CS-Migrierte bekommen Human-First-Pfad
      → GPT-Fehler bei dieser Gruppe = ABWANDERUNG
      → DATEN-REQUEST: UBS NPS fuer migrierte CS-Kund:innen (derzeit LLMMC)

  Q_M09:
    frage: "Wie nützlich wäre eine sofortige, indikative Zinsberechnung?"
    typ: "7-point_likert"
    simulierter_mean: 5.7
    ci_68: [5.4, 6.0]
    sd_erwartet: 1.1
    provenance: |
      B2: PE ist zweitstaerkster Praediktor (beta=0.32).
      Davis 1989: PU beta = 0.42-0.66 (generisch).
      24/7-Verfuegbarkeit und Geschwindigkeit sind klare funktionale Benefits.
      G3: Kein Wettbewerber bietet dies → First-Mover-Vorteil.
    business_insight: |
      HOHE wahrgenommene Nuetzlichkeit (5.7/7). Das Nutzenversprechen
      "sofortige Zinsberechnung" resoniert stark. UBS sollte dies als
      Lead-Botschaft verwenden: "Ihre indikative Rate in 2 Minuten."

  Q_M10:
    frage: "Wie einfach war die Nutzung des KI-Zinsrechners?"
    typ: "7-point_likert"
    simulierter_mean: 5.2
    ci_68: [4.9, 5.5]
    sd_erwartet: 1.3
    provenance: |
      B2: EE beta = 0.14 (schwächster UTAUT-Prädiktor, aber Hygienefaktor).
      Kim 2009: PEOU = 0.14 für Mobile Banking.
      Conversational UI (Chat) senkt Effort natürlich.
    business_insight: |
      Ease of Use ist ein Hygienefaktor — muss stimmen, differenziert
      aber nicht. Erwarteter Score 5.2 ist ausreichend. Wichtiger:
      Financial Complexity darf die Chat-Einfachheit nicht untergraben.

  Q_M11:
    frage: "Wie riskant empfinden Sie eine Hypothekarentscheidung auf Basis einer KI-Indikation?"
    typ: "7-point_likert"
    simulierter_mean: 4.7
    ci_68: [4.4, 5.0]
    sd_erwartet: 1.5
    segment_breakdown:
      tech_savvy_young: {mean: 3.8, ci: [3.4, 4.2]}
      traditional_affluent: {mean: 5.8, ci: [5.4, 6.2]}
      first_time_buyers: {mean: 4.9, ci: [4.5, 5.3]}
      refinancers: {mean: 4.2, ci: [3.8, 4.6]}
    provenance: |
      Pavlou 2003: Perceived Risk beta = -0.28.
      Burton 2020: Aversion staerkstens bei high-stakes personal decisions.
      Hypothek = HIGH-STAKES + PERSONAL → Maximum-Risiko-Zone.
    business_insight: |
      Traditional Affluent empfinden 5.8/7 Risiko — fast "sehr riskant".
      Fuer dieses Segment ist der GPT kein Entscheidungsinstrument,
      sondern ein VORBEREITUNGS-Tool. Framing: "Bereiten Sie sich
      optimal auf Ihr Beratergespraech vor."

  # ═══════════════════════════════════════════════════════════════════════════
  # BLOCK D: SOZIAL & PERSONALISIERUNG
  # ═══════════════════════════════════════════════════════════════════════════

  Q_M12:
    frage: "Würde die Empfehlung Ihres UBS-Beraters Ihre Bereitschaft erhöhen?"
    typ: "7-point_likert"
    simulierter_mean: 4.5
    ci_68: [4.2, 4.8]
    sd_erwartet: 1.5
    segment_breakdown:
      tech_savvy_young: {mean: 3.5, ci: [3.1, 3.9]}
      traditional_affluent: {mean: 5.8, ci: [5.4, 6.2]}
      first_time_buyers: {mean: 4.8, ci: [4.4, 5.2]}
      refinancers: {mean: 4.0, ci: [3.6, 4.4]}
    provenance: |
      B2: SI beta = 0.18, moderiert durch Alter (staerker fuer 45+).
      Dietvorst 2018: Hoechstes Vertrauen in Human-AI-Kombination.
      G3: gamma_ai_human = 0.35 (Komplementaritaet).
    business_insight: |
      Berater-Endorsement wirkt STARK bei Traditional Affluent (5.8)
      aber SCHWACH bei Tech-Savvy (3.5). Segment-adaptive Strategie:
      • 45+: "Ihr Berater empfiehlt dieses Tool"
      • 30-40: "Nutzen Sie den GPT vor dem Termin"

  Q_M13:
    frage: "Wie gut hat der KI-Zinsrechner Ihre persönliche Situation berücksichtigt?"
    typ: "7-point_likert"
    simulierter_mean: 3.9
    ci_68: [3.5, 4.3]
    sd_erwartet: 1.6
    status: "WARNSIGNAL — unter Mittelpunkt"
    segment_breakdown:
      tech_savvy_young: {mean: 4.5, ci: [4.1, 4.9]}
      traditional_affluent: {mean: 3.0, ci: [2.6, 3.4]}
      first_time_buyers: {mean: 3.8, ci: [3.4, 4.2]}
      refinancers: {mean: 4.2, ci: [3.8, 4.6]}
    provenance: |
      B1: Longoni 2019: Uniqueness Neglect indirect effect = -0.83 (STARK).
      delta_uniqueness = -0.83 → Wahrgenommener Mangel an Personalisierung
      treibt Ablehnung. Erwarteter Mean UNTER Mittelpunkt fuer 2 von 4
      Segmenten = Design-kritisch.
    business_insight: |
      ███████████████████████████████████████████████████████████████
      WARNUNG: PERSONALISIERUNG IST DESIGN-KRITISCH

      Mean 3.9/7 = UNTER Mittelpunkt. Besonders:
      • Traditional Affluent: 3.0/7 — fühlen sich "nicht gesehen"
      • First-time Buyers: 3.8/7 — unsicher ob Situation erfasst

      Longoni 2019: Niedrige Personalisierung → Aversions-Kaskade.

      MASSNAHME: GPT MUSS sichtbar personalisieren:
      • Einkommensklasse zeigen (nicht nur fragen)
      • Kanton-spezifische Faktoren nennen
      • "Basierend auf IHRER Situation..." prominent anzeigen
      • LTV und Tragbarkeit individuell berechnen und erklaeren
      ███████████████████████████████████████████████████████████████

  # ═══════════════════════════════════════════════════════════════════════════
  # BLOCK E: HANDLUNGSABSICHT & FOLLOW-UP
  # ═══════════════════════════════════════════════════════════════════════════

  Q_M14:
    frage: "Wie wahrscheinlich vereinbaren Sie nach dieser Indikation einen Beratungstermin?"
    typ: "7-point_likert"
    status: "SECONDARY DV — Lead Conversion"
    simulierter_mean: 4.0
    ci_68: [3.7, 4.3]
    sd_erwartet: 1.7

    experimental_cell_means:
      disclosed_modifiable: {mean: 4.8, ci: [4.3, 5.3]}
      disclosed_fixed: {mean: 3.2, ci: [2.7, 3.7]}
      undisclosed_modifiable: {mean: 4.3, ci: [3.8, 4.8]}
      undisclosed_fixed: {mean: 3.7, ci: [3.2, 4.2]}

    conversion_estimate:
      score_6_or_7_percent: "16%"
      interpretation: "v1.1: ~16% der GPT-Nutzer werden Beratungstermin buchen (war 18%)"
      monthly_volume_scenarios:
        pessimistic: "12,500 × 12% = ~1,500 Leads/Monat"
        expected: "12,500 × 16% = ~2,000 Leads/Monat"
        optimistic: "12,500 × 20% = ~2,500 Leads/Monat"
      provenance: |
        v1.1: Korrigiert mit delta_AI-Update (0.52→0.42) und neuer Literatur:
        - Robo-Advisor Lab Adoption: ~40% (Frontiers 2024) → konservativer als Dietvorst
        - Nur 11% trust robot for mortgage advice (HSBC/Global Study)
        - ABER: 49% AI-Chatbot-Nutzer sagen AI beeinflusste Finanzentscheidung (LendingTree)
        - Modifiability bleibt BEST mitigation: +25-35pp (3× repliziert, CHI 2023, arXiv 2025)

    segment_breakdown:
      Erstkäufer: {mean: 4.6, conversion_6_7: "24%"}
      Anschlussfinanzierer: {mean: 3.5, conversion_6_7: "12%"}
      Erben: {mean: 3.8, conversion_6_7: "15%"}
      Informationssuchende: {mean: 3.2, conversion_6_7: "8%"}

    provenance: |
      A1: C_GPT_to_RM conversion rate 8-15%. G4: BI modelliert durch
      Trust(0.38) + PE(0.32) + SI(0.18) + EE(0.14) - AlgoAversion(-0.25).
      Cell Means: Disclosed+Modifiable generiert 50% mehr Leads als
      Disclosed+Fixed.
    business_insight: |
      v1.1 KORRIGIERTE REVENUE-PROGNOSE:
