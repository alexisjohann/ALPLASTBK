# =============================================================================
# 1. LITERATURE FOUNDATION
# =============================================================================

literature_foundation:
  core_papers:
    - key: davis1989perceived
      finding: "TAM: Perceived Usefulness (PU) beta=0.42-0.66, Perceived Ease of Use (PEOU) beta=0.16-0.25 on Behavioral Intention"
      effect_size: "R² = 0.40-0.52"
      evidence_tier: 1
      ubs_relevance: "FOUNDATIONAL — PU is 2-3x stronger than PEOU; focus survey on perceived usefulness, not just usability"

    - key: venkatesh2003user
      finding: "UTAUT: 4 constructs (PE, EE, SI, FC) + 4 moderators (age, gender, experience, voluntariness) → R²=0.69"
      effect_size: "R² = 0.69 (substantially higher than TAM's 0.40)"
      evidence_tier: 1
      ubs_relevance: "CRITICAL — Social Influence (SI) moderates by age: older segments need peer/advisor endorsement"

    - key: venkatesh2012consumer
      finding: "UTAUT2: +Hedonic Motivation, Price Value, Habit → R²=0.74 for consumer contexts"
      effect_size: "R² = 0.74; Habit beta=0.26 (strongest new predictor)"
      evidence_tier: 1
      ubs_relevance: "KEY — Habit (beta=0.26) is critical for eSIM: habitual banking app users will adopt faster"

    - key: gefen2003trust
      finding: "Trust-TAM Integration: Trust has direct effect (0.21) AND indirect via PU (0.34) on adoption"
      effect_size: "Trust→Intention: 0.21 direct; Trust→PU→Intention: 0.34 indirect"
      evidence_tier: 1
      ubs_relevance: "CENTRAL — Trust is dual-path: builds usefulness perception AND drives adoption independently"

    - key: pavlou2003consumer
      finding: "Perceived risk (-0.28) and perceived trust (0.32) are significant in e-commerce adoption"
      effect_size: "Risk→Intention: beta = -0.28; Trust→Intention: beta = 0.32"
      evidence_tier: 1
      ubs_relevance: "RISK MEASUREMENT — Include perceived risk scale in both surveys (mortgage + eSIM)"

    - key: kim2009understanding
      finding: "Mobile banking adoption: Trust (0.38) > PU (0.31) > PEOU (0.14); structural assurance = key antecedent"
      effect_size: "R² = 0.59 for mobile banking adoption"
      evidence_tier: 1
      ubs_relevance: "DIRECTLY APPLICABLE — Mobile banking context matches UBS app; trust dominates for financial mobile services"

  theory_integration:
    primary_theories:
      - id: MS-TC-001
        name: "Technology Acceptance Model (TAM)"
        key_constructs: ["PU", "PEOU"]
        key_prediction: "PU > PEOU for financial tools (2-3× stronger)"

      - id: MS-TC-002
        name: "UTAUT"
        key_constructs: ["PE", "EE", "SI", "FC"]
        key_prediction: "SI moderated by age: critical for 45+ segment"

      - id: MS-TC-003
        name: "UTAUT2"
        key_constructs: ["HM", "PV", "Habit"]
        key_prediction: "Habit (beta=0.26) predicts eSIM adoption for existing app users"

      - id: MS-TC-004
        name: "Trust-TAM Integration"
        key_constructs: ["Trust", "PU", "Risk"]
        key_prediction: "Trust dual-path: direct (0.21) + via PU (0.34) = total 0.55"

# =============================================================================
# 2. 10C MAPPING: UTAUT2 → EBF Dimensions
# =============================================================================

mapping_10c:
  UTAUT2_to_10C:
    Performance_Expectancy:
      maps_to: "READY (Willingness)"
      ebf_parameter: "W_PE"
      beta: 0.42
      interpretation: "PE directly feeds readiness to adopt"
      mortgage_gpt: "Rate accuracy, time savings, 24/7 availability"
      esim: "Seamless connectivity, cost savings vs roaming"

    Effort_Expectancy:
      maps_to: "AWARE (ability awareness)"
      ebf_parameter: "A_EE"
      beta: 0.20
      interpretation: "PEOU/EE determines if user feels ABLE to use"
      mortgage_gpt: "Conversational interface reduces effort; but financial complexity increases it"
      esim: "Pilot landing page adds friction; final in-app version reduces it"

    Social_Influence:
      maps_to: "WHO (social context)"
      ebf_parameter: "sigma_SI"
      beta: 0.18
      moderator: "age (stronger for 45+)"
      interpretation: "Peer and advisor endorsement drives adoption for older segments"
      mortgage_gpt: "Advisor recommendation is social influence proxy"
      esim: "Peer travelers as reference group"

    Facilitating_Conditions:
      maps_to: "WHEN (context Ψ_M material)"
      ebf_parameter: "psi_FC"
      beta: 0.15
      interpretation: "Technical infrastructure, support availability"
      mortgage_gpt: "Device compatibility, app version, internet connectivity"
      esim: "Phone eSIM compatibility, activation ease"

    Hedonic_Motivation:
      maps_to: "WHAT (utility dimension U_hedonic)"
      ebf_parameter: "U_HM"
      beta: 0.15
      interpretation: "Enjoyment/pleasure from using technology"
      mortgage_gpt: "LOW hedonic value (serious financial decision)"
      esim: "MODERATE hedonic value (travel convenience, novelty)"

    Price_Value:
      maps_to: "WHAT (utility dimension U_financial)"
      ebf_parameter: "U_PV"
      beta: 0.18
      interpretation: "Cost-benefit assessment"
      mortgage_gpt: "Free service → PV not a barrier"
      esim: "Price vs roaming costs → PV is a KEY driver"

    Habit:
      maps_to: "STAGE (behavioral inertia)"
      ebf_parameter: "phi_habit"
      beta: 0.26
      interpretation: "Existing behavioral patterns in UBS app usage"
      mortgage_gpt: "Low habit (new feature) → need to build trial"
      esim: "High habit for regular app users → in-app version benefits from this"

    Trust:
      maps_to: "READY (trust component)"
      ebf_parameter: "tau_trust"
      beta_direct: 0.21
      beta_indirect_via_PU: 0.34
      beta_total: 0.55
      interpretation: "Trust is the DOMINANT predictor for financial mobile services"
      mortgage_gpt: "Links directly to A2 Trust-Kaskade; tau_final = 0.142-0.285"
      esim: "Brand trust (UBS) vs service trust (Telco partner)"

# =============================================================================
# 3. PARAMETER ESTIMATES
# =============================================================================

parameter_estimates:
  mortgage_gpt_adoption:
    model: "Trust-UTAUT2 (adapted for financial AI)"
    R_squared_expected: "0.62-0.68 (adjusted for Swiss banking context)"
    key_drivers_ranked:
      - rank: 1
        construct: "Trust (tau_trust)"
        beta_expected: "0.38 (Kim 2009: mobile banking)"
        measurement: "A2 Trust-Kaskade 6-layer decomposition"
      - rank: 2
        construct: "Performance Expectancy (PU)"
        beta_expected: "0.32 (Davis 1989, adjusted for AI context)"
        measurement: "Rate accuracy, time savings, availability"
      - rank: 3
        construct: "Effort Expectancy (PEOU)"
        beta_expected: "0.14 (Kim 2009, reduced for conversational UI)"
        measurement: "Ease of interaction, learning curve"
      - rank: 4
        construct: "Social Influence"
        beta_expected: "0.18 × age_moderator (Venkatesh 2003)"
        measurement: "Advisor recommendation, peer usage"
      - rank: 5
        construct: "Algorithm Aversion (from B1)"
        beta_expected: "-0.25 (Dietvorst 2015, mitigated by modification)"
        measurement: "B1 algorithm aversion constructs"

  esim_adoption:
    model: "UTAUT2 + Brand Extension Fit"
    R_squared_expected: "0.55-0.65 (consumer mobile service context)"
    key_drivers_ranked:
      - rank: 1
        construct: "Price Value"
        beta_expected: "0.28 (cost savings vs roaming is primary driver)"
        measurement: "Perceived savings, willingness to pay"
      - rank: 2
        construct: "Habit (app usage)"
        beta_expected: "0.26 (Venkatesh 2012; existing UBS app users)"
        measurement: "App usage frequency, feature engagement"
      - rank: 3
        construct: "Performance Expectancy"
        beta_expected: "0.22 (ease of connectivity abroad)"
        measurement: "Network quality expectations, coverage"
      - rank: 4
        construct: "Brand Extension Fit (from B3)"
        beta_expected: "0.20 (BFS from A1: 0.405)"
        measurement: "B3 brand extension constructs"
      - rank: 5
        construct: "Facilitating Conditions"
        beta_expected: "0.15 (device compatibility, activation process)"
        measurement: "eSIM-capable device ownership, tech comfort"

  pilot_vs_final_differences:
    description: "UTAUT2 predicts different drivers in pilot (landing page) vs final (in-app)"
    pilot_phase:
      effort_expectancy_penalty: "-0.15 (extra steps: leave app → external page → return)"
      habit_bonus: 0.0  # No habit for landing page
      trust_penalty: "-0.10 (third-party context reduces UBS trust halo)"
      net_adoption_modifier: 0.75  # 25% reduction vs final
    final_phase:
      effort_expectancy_bonus: "+0.10 (seamless in-app experience)"
      habit_bonus: "+0.26 (full UTAUT2 habit effect)"
      trust_bonus: "+0.05 (full UBS brand halo)"
      net_adoption_modifier: 1.0  # Baseline
    implication: "Pilot adoption rates should be multiplied by ~1.33× to estimate final adoption (1.0/0.75)"

# =============================================================================
# 4. SURVEY DESIGN MAPPING
# =============================================================================

survey_design_mapping:
  shared_constructs:
    description: "Constructs applicable to BOTH mortgage GPT and eSIM surveys"
    constructs:
      - name: "Performance Expectancy"
        items: 4
        scale: "7-point Likert"
        source: "Venkatesh et al. (2012) UTAUT2"
        adaptation: "Replace 'system' with product-specific term"

      - name: "Effort Expectancy"
        items: 3
        scale: "7-point Likert"
        source: "Venkatesh et al. (2012) UTAUT2"

      - name: "Social Influence"
        items: 3
        scale: "7-point Likert"
        source: "Venkatesh et al. (2003) UTAUT"
        note: "Capture both advisor (mortgage) and peer (eSIM) influence"

      - name: "Trust"
        items: 4
        scale: "7-point Likert"
        source: "Gefen et al. (2003), Kim et al. (2009)"
        note: "Decompose into ability, benevolence, integrity (Mayer 1995)"

  mortgage_specific:
    - name: "Algorithm Aversion (from B1)"
      items: 3
      source: "Dietvorst et al. (2015), adapted"
    - name: "Perceived Risk"
      items: 3
      source: "Pavlou (2003)"
    - name: "Modifiability Preference"
      items: 2
      source: "Dietvorst et al. (2018)"

  esim_specific:
    - name: "Price Value"
      items: 3
      source: "Venkatesh et al. (2012) UTAUT2"
    - name: "Habit (UBS App Usage)"
      items: 3
      source: "Venkatesh et al. (2012) UTAUT2"
    - name: "Brand Extension Fit (from B3)"
      items: 4
      source: "Voelckner & Sattler (2006), adapted"

# =============================================================================
# 5. MODERATOR ANALYSIS
# =============================================================================

moderator_analysis:
  age:
    literature: "Venkatesh 2003: age moderates EE→BI and SI→BI"
    hypothesis: "Older users (45+) weight social influence and ease more heavily"
    mortgage_gpt_impact: "Segment 'traditional_affluent' (45-60) needs advisor endorsement"
    esim_impact: "Older travelers need simpler activation process"

  experience:
    literature: "Venkatesh 2003: experience moderates EE→BI and Habit→BI"
    hypothesis: "Experienced UBS app users adopt new features faster (habit transfer)"
    mortgage_gpt_impact: "Regular digital banking users more receptive"
    esim_impact: "Heavy app users show +0.26 habit effect (UTAUT2)"

  gender:
    literature: "Venkatesh 2003: gender moderates SI→BI (stronger for women)"
    hypothesis: "Women weight social recommendations more (SI moderator)"
    note: "Measure but handle with sensitivity in Swiss context"

  voluntariness:
    literature: "Venkatesh 2003: voluntariness moderates SI→BI"
    hypothesis: "Both products are voluntary → SI effect present but not dominant"
    note: "eSIM is fully voluntary; mortgage GPT may feel 'pushed' if prominently placed"

# =============================================================================
# 6. CROSS-ANALYSIS LINKAGES
# =============================================================================

cross_analysis_linkages:
  to_A1_journey_model:
    link: "UTAUT2 constructs map to 10C journey stages"
    mapping:
      Pre_Awareness: "PE (performance expectancy) drives initial interest"
      Information_Search: "EE (effort expectancy) determines search behavior"
      Evaluation: "Trust + PU determine evaluation outcome"
      Decision: "SI (social influence) tips final decision"
      Post_Purchase: "Habit determines retention"

  to_A2_trust_kaskade:
    link: "Trust-TAM dual path integrates with 6-layer cascade"
    integration: "tau_trust from A2 (0.142-0.285) becomes Trust construct in UTAUT2 regression"
    combined_model: "Trust-UTAUT2 with A2 Trust-Kaskade as Trust operationalization"

  to_B1_algorithm_aversion:
    link: "Algorithm aversion is a NEGATIVE moderator of PE for AI tools"
    integration: "PE_effective = PE_base × (1 - alpha_aversion × (1 - beta_modification))"
    implication: "With modification feature: PE_effective ≈ 0.90 × PE_base (minor reduction)"
    without_modification: "PE_effective ≈ 0.60 × PE_base (substantial reduction)"

  to_B3_brand_extension:
    link: "Brand Extension Fit moderates Trust in UTAUT2 for eSIM"
    integration: "Trust_esim = Trust_UBS × BFS_adjustment (0.405 from A1)"
    implication: "eSIM trust is ~40% of base UBS banking trust"
