# =============================================================================
# ANALYSE A1: BRAND-FIT-ANALYSE — UBS TRAVEL-eSIM
# =============================================================================
# Superkey: ANA-UBS-GM-A1-BRANDFIT
# Created: 2026-02-25
# Purpose: Systematische Bewertung der Kategorie-Kongruenz Bank → Telco/eSIM
# Theoretical Basis: Aaker & Keller (1990), Völckner & Sattler (2006)
# Model-Ref: MOD-UBS-GMA-001 (Brand Perception)
# =============================================================================

metadata:
  id: "ANA-UBS-GM-A1-BRANDFIT"
  name: "Brand-Fit-Analyse: UBS Travel-eSIM"
  version: "1.0.0"
  created: "2026-02-25"
  customer: "UBS"
  unit: "Marketing / Growth Marketing"
  topic: "UBS Travel-eSIM — Brand Extension Analysis"

# =============================================================================
# 1. THEORETISCHER RAHMEN: BRAND EXTENSION FIT
# =============================================================================
# Aaker & Keller (1990): Brand Extensions — Transfer, Complement, Substitute
# Völckner & Sattler (2006): Drivers of Brand Extension Success — meta-review
# Park, Milberg & Lawson (1991): Feature vs. Concept Consistency
# =============================================================================

theoretical_framework:

  core_model: "Aaker & Keller (1990) Brand Extension Evaluation"
  description: |
    Brand Extension Erfolg hängt von drei Fit-Dimensionen ab:
    1. TRANSFER: Können Kernkompetenzen der Muttermarke auf Erweiterung
       übertragen werden?
    2. COMPLEMENT: Ergänzt das neue Produkt das bestehende Portfolio
       sinnvoll?
    3. SUBSTITUTE: Ist das neue Produkt ein Substitut für bestehende
       Produkte (gefährlich: Kannibalisierung)?

    Erweiterter Rahmen (Völckner & Sattler 2006):
    4. BRAND_QUALITY: Generelle Markenqualität als Multiplikator
    5. CATEGORY_DISTANCE: Je grösser die Distanz zwischen Kategorien,
       desto stärker muss der Fit sein
    6. MARKETING_SUPPORT: Investition in Erklärung des Fits

  formula: |
    Brand_Extension_Success = f(Transfer × Complement × (1 - Substitute)
                                 × Brand_Quality × (1 - Category_Distance)
                                 × Marketing_Support)

  ebf_mapping:
    Transfer: "WHAT (C.X) — Kann die Identität übertragen werden?"
    Complement: "HOW (γ) — Synergie zwischen Produkten"
    Substitute: "HOW (γ) — Negative Komplementarität"
    Brand_Quality: "AWARE (τ_brand) — Markenstärke"
    Category_Distance: "Ψ_K — Kulturelle Erwartung an Kategoriezugehörigkeit"
    Marketing_Support: "AWARE (A_benefit) — Kommunizierter Nutzen"

# =============================================================================
# 2. BEWERTUNG: UBS → eSIM (6 DIMENSIONEN)
# =============================================================================

brand_fit_assessment:

  # -------------------------------------------------------------------------
  # DIMENSION 1: TRANSFER (Kompetenz-Übertragbarkeit)
  # -------------------------------------------------------------------------
  transfer:
    score: 0.25
    ci_68: [0.15, 0.35]
    assessment: "NIEDRIG"
    rationale: |
      UBS-Kernkompetenzen (Vermögensverwaltung, Finanzberatung, Risikomanagement)
      haben WENIG direkte Übertragbarkeit auf Telekommunikation/eSIM.

      TRANSFERIERBARE Kompetenzen:
      + Digitale Plattform-Kompetenz (App, E-Banking)
      + Kund:innenservice-Infrastruktur
      + Vertrauenswürdigkeit und Datensicherheit
      + Payment-Integration (Abrechnung über Konto)

      NICHT TRANSFERIERBAR:
      - Netzwerk-Infrastruktur (UBS hat kein Mobilfunknetz)
      - Telco-Expertise (Tarife, Roaming-Verträge)
      - Technische eSIM-Kompetenz (Provisioning, QoS)
      - Kundensupport für Konnektivitätsprobleme

    benchmark_comparison:
      revolut: 0.45  # Stärker (Digital-first, globaler Reise-Use-Case)
      n26: 0.40  # Stärker (Mobile-only DNA, Reisende als Kernzielgruppe)
      bunq: 0.50  # Am stärksten (Travel-Bank Positionierung)
      traditional_bank_avg: 0.20  # Generell niedrig für Traditional Banks
      note: |
        Neobanken haben höheren Transfer-Score weil:
        1. «Digital-first» DNA ≈ Telco-Adjacency
        2. Reisende als explizite Kernzielgruppe
        3. Globale Positionierung (vs. UBS = Schweiz-fokussiert Retail)

  # -------------------------------------------------------------------------
  # DIMENSION 2: COMPLEMENT (Portfolioergänzung)
  # -------------------------------------------------------------------------
  complement:
    score: 0.65
    ci_68: [0.55, 0.75]
    assessment: "MITTEL-HOCH"
    rationale: |
      eSIM ergänzt das UBS-Portfolio sinnvoll im Reisekontext:

      STARKE KOMPLEMENTARITÄT:
      + Reise-Ökosystem: eSIM + Travel Insurance + Kreditkarte + Währungswechsel
      + Cross-Sell-Potenzial: eSIM-Nutzer:innen sehen UBS-App häufiger
      + Engagement-Driver: Nicht-finanzielle Interaktion erhöht App-Stickiness
      + Daten-Signal: Reiseverhalten → Wealth Management Insights

      MÄSSIGE KOMPLEMENTARITÄT:
      ~ Payment-Integration (eSIM-Kosten über UBS-Konto)
      ~ Loyalty-Programm (Punkte für eSIM-Kauf)

      SCHWACH:
      - Kein direkter Bezug zu Core Banking (Sparen, Anlegen, Finanzieren)

    usage_scenario_analysis:
      scenario_1_business_trip:
        frequency: "4-6x/Jahr"
        complementary_products: ["Business Kreditkarte", "Spesen-Management", "Travel Insurance"]
        complement_score: 0.75

      scenario_2_vacation:
        frequency: "2-3x/Jahr"
        complementary_products: ["Reise-Kreditkarte", "Währungswechsel", "Travel Insurance"]
        complement_score: 0.60

      scenario_3_expatriate:
        frequency: "Permanent"
        complementary_products: ["International Banking", "Vermögensverwaltung"]
        complement_score: 0.50
        note: "Eher GWM-Klientel, nicht Retail-Zielgruppe"

  # -------------------------------------------------------------------------
  # DIMENSION 3: SUBSTITUTE (Kannibalisierungsrisiko)
  # -------------------------------------------------------------------------
  substitute:
    score: 0.05
    ci_68: [0.00, 0.10]
    assessment: "MINIMAL"
    rationale: |
      Kein Kannibalisierungsrisiko — eSIM konkurriert mit KEINEM
      bestehenden UBS-Produkt. Es ist eine reine Portfolio-Erweiterung.

      Einzige marginale Substitution:
      - UBS Travel Insurance bietet teilweise Roaming-Entschädigung
        → aber eSIM ist komplementär (Prävention vs. Versicherung)
    positive_for_extension: true
    note: "Niedriger Substitute-Score ist GUT für Brand Extension"

  # -------------------------------------------------------------------------
  # DIMENSION 4: BRAND QUALITY (Markenstärke als Multiplikator)
  # -------------------------------------------------------------------------
  brand_quality:
    score: 0.80
    ci_68: [0.75, 0.85]
    assessment: "HOCH"
    rationale: |
      UBS ist eine der wertvollsten Bankenmarken weltweit:
      - MKT-POS-10: Brand Value USD 15.2 Mrd. (2024)
      - Hohe Markenbekanntheit in der Schweiz (~98%)
      - Assoziationen: Sicherheit, Zuverlässigkeit, Premium

      ABER: Brand Quality im Bankensektor transferiert sich NICHT
      automatisch auf Telco-Kategorie.

      «Ich vertraue UBS mit meinem Geld»
      ≠ «Ich vertraue UBS mit meiner Konnektivität»

    brand_associations:
      positive_for_esim:
        - "Zuverlässigkeit (wichtig für Auslandskonnektivität)"
        - "Sicherheit (Datenschutz bei eSIM-Provisioning)"
        - "Premium (bereit für Aufpreis zu zahlen)"
      negative_for_esim:
        - "Konservativ (nicht der erste Ort für Tech-Innovation)"
        - "Teuer (Erwartung hoher Preise)"
        - "Swiss-fokussiert (vs. globale Konnektivität)"

  # -------------------------------------------------------------------------
  # DIMENSION 5: CATEGORY DISTANCE (Kategorie-Distanz Bank → Telco)
  # -------------------------------------------------------------------------
  category_distance:
    score: 0.75
    ci_68: [0.65, 0.85]
    assessment: "HOCH"
    rationale: |
      Bank → Telco ist eine WEITE Kategorie-Extension:

      DISTANZ-SKALA (0 = identisch, 1 = maximal fremd):
      Bank → Versicherung:    0.25 (nah, gleiche Regulierung)
      Bank → Immobilien:      0.35 (nah, Hypotheken-Link)
      Bank → Payment:         0.20 (sehr nah, gleiche Infrastruktur)
      Bank → Telco/eSIM:      0.75 (WEIT, andere Industrie)
      Bank → Lebensmittel:    0.90 (sehr weit)

      Die Distanz ist das HAUPTRISIKO dieser Extension.

    category_distance_benchmarks:
      revolut_to_esim: 0.45  # Geringer (Digital Lifestyle Platform)
      apple_to_card: 0.50  # Mittel (Tech → Finance)
      amazon_to_pharmacy: 0.55  # Mittel (Retail → Health)
      virgin_to_airline: 0.60  # Hoch (Music → Aviation)
      ubs_to_esim: 0.75  # Sehr hoch (Traditional Bank → Telco)

    mitigation_strategies:
      - strategy: "Framing als Reise-Service, nicht als Telco-Produkt"
        effect: "Reduziert wahrgenommene Distanz um ~0.10"
        new_distance: 0.65
      - strategy: "Integration in App-Ökosystem (nicht standalone)"
        effect: "Reduziert Distanz um ~0.15"
        new_distance: 0.60
      - strategy: "Co-Branding mit etabliertem eSIM-Provider"
        effect: "Reduziert Distanz um ~0.20"
        new_distance: 0.55

  # -------------------------------------------------------------------------
  # DIMENSION 6: MARKETING SUPPORT (Erklärungsaufwand)
  # -------------------------------------------------------------------------
  marketing_support:
    required_level: "HOCH"
    score_needed: 0.70
    rationale: |
      Aufgrund der hohen Kategorie-Distanz muss UBS AKTIV erklären,
      WARUM eine Bank eSIMs anbietet. Ohne starkes Marketing-Narrativ
      entsteht kognitive Dissonanz.

    narrative_options:
      option_1_travel_ecosystem:
        narrative: "Alles für Ihre Reise — in einer App"
        fit: 0.75
        pro: "Natürliche Erweiterung des Travel-Bundles"
        con: "UBS ist keine Reiseplattform"

      option_2_convenience:
        narrative: "Roaming? Erledigt. Direkt in Ihrem UBS."
        fit: 0.70
        pro: "Convenience-Argument ist stark"
        con: "Warum nicht direkt bei Swisscom/Salt?"

      option_3_savings:
        narrative: "Sparen Sie bis zu 90% Roaming-Kosten"
        fit: 0.65
        pro: "Finanzieller Nutzen = Bank-nah"
        con: "Price-Sensitivity Framing passt nicht zu Premium-Brand"

      option_4_digital_lifestyle:
        narrative: "UBS: Ihre digitale Lebensbegleiterin"
        fit: 0.55
        pro: "Langfristige Plattform-Vision"
        con: "Zu weit von aktueller Wahrnehmung entfernt"

      recommended: "option_1_travel_ecosystem"

# =============================================================================
# 3. GESAMTBEWERTUNG: BRAND FIT SCORE
# =============================================================================

overall_brand_fit:

  formula: |
    BFS = Transfer × w_T + Complement × w_C + (1-Substitute) × w_S
          + Brand_Quality × w_BQ - Category_Distance × w_CD
          + Marketing_Support × w_MS

    Gewichte (Völckner & Sattler 2006 Meta-Analyse):
    w_T = 0.25, w_C = 0.20, w_S = 0.10, w_BQ = 0.20, w_CD = 0.15, w_MS = 0.10

  calculation:
    Transfer:          { value: 0.25, weight: 0.25, weighted: 0.0625 }
    Complement:        { value: 0.65, weight: 0.20, weighted: 0.1300 }
    "1-Substitute":    { value: 0.95, weight: 0.10, weighted: 0.0950 }
    Brand_Quality:     { value: 0.80, weight: 0.20, weighted: 0.1600 }
    Category_Distance: { value: -0.75, weight: 0.15, weighted: -0.1125 }
    Marketing_Support: { value: 0.70, weight: 0.10, weighted: 0.0700 }

  total_brand_fit_score: 0.405
  ci_68: [0.32, 0.49]
  assessment: "MODERATER FIT — Machbar mit starkem Marketing"

  interpretation: |
    BFS = 0.405 liegt im MODERATEN Bereich:

    BFS > 0.70:  STARKER FIT → Go (z.B. Apple → Card)
    BFS 0.50-0.70: GUTER FIT → Go mit Anpassungen
    BFS 0.35-0.50: MODERATER FIT → Go nur mit starkem Marketing ← UBS eSIM
    BFS 0.20-0.35: SCHWACHER FIT → Risikobehaftet
    BFS < 0.20:  KEIN FIT → Don't (z.B. UBS → Restaurant)

    UBS Travel-eSIM ist MACHBAR, aber KEIN Selbstläufer.
    Die hohe Kategorie-Distanz (0.75) ist der grösste Risikofaktor
    und muss durch Marketing-Narrativ und App-Integration kompensiert werden.

  sensitivity_analysis:
    biggest_lever: "Category_Distance"
    scenario_mit_integration:
      description: "eSIM vollständig in App integriert + Reise-Ökosystem-Framing"
      category_distance_reduced: 0.55  # von 0.75
      new_bfs: 0.435
      delta: "+0.03 (marginal)"

    scenario_co_branding:
      description: "Co-Branding mit bekanntem Anbieter (z.B. Airalo, Holafly)"
      transfer_increased: 0.40  # von 0.25
      category_distance_reduced: 0.55  # von 0.75
      new_bfs: 0.502
      delta: "+0.10 (substantiell — über Good-Fit-Schwelle)"

    scenario_neobank_level:
      description: "UBS erreicht Revolut-Level Transfer (hypothetisch)"
      transfer_increased: 0.45
      category_distance_reduced: 0.45
      new_bfs: 0.557
      delta: "+0.15 (guter Fit, aber unrealistisch für Traditional Bank)"

# =============================================================================
# 4. NEOBANK-BENCHMARK: WARUM REVOLUT/N26 ES BESSER KÖNNEN
# =============================================================================

neobank_benchmark:
  description: |
    Neobanken haben bei eSIM strukturelle Vorteile. Dieser Abschnitt
    quantifiziert den «Digital-first DNA Gap» und identifiziert
    Learnings für UBS.

  competitors:
    revolut:
      launch: "2023"
      status: "Number one non-banking product"
      customers: 52500000  # Stand 2024
      esim_coverage: "150+ countries"
      pricing_model: "included_in_premium_plans"
      brand_fit_score: 0.62
      key_advantage: |
        Revolut positioniert sich NICHT als Bank, sondern als
        «Global Financial Super-App». eSIM ist konsistent mit
        dieser Positionierung. Kein Kategorie-Distanz-Problem.

    n26:
      launch: "2025-07"
      status: "Launched July 2025"
      coverage: "100+ countries"
      pricing: "8.49 EUR für Morocco 5GB (vs. Airalo 25.50 EUR)"
      brand_fit_score: 0.55
      key_advantage: |
        Mobile-only DNA. Reisende sind explizite Kernzielgruppe
        (keine Filialen = globale Nomaden als Basis).

    bunq:
      launch: "2024"
      status: "160+ countries, 8GB/year free on Elite"
      pricing: "Included in subscription"
      brand_fit_score: 0.65
      key_advantage: |
        «Bank of The Free» — Travel-Positionierung von Anfang an.
        eSIM als natürliche Erweiterung des Freedom-Narrativs.

    nubank:
      launch: "2024-10"
      status: "NuCel — Full MVNO in Brazil"
      customers: 100000000
      brand_fit_score: 0.70
      key_advantage: |
        Nubank ging noch weiter: eigenes Mobilfunknetz (MVNO).
        Tiefste Integration möglich (Banking + Telco in einer App).

  ubs_vs_neobanks:
    gap_analysis:
      transfer_gap: -0.20  # UBS 0.25 vs. Neobank-Avg 0.45
      complement_gap: +0.05  # UBS leicht besser (breiteres Portfolio)
      category_distance_gap: -0.25  # UBS 0.75 vs. Neobank 0.50
      brand_quality_gap: +0.20  # UBS stärker (Premium-Brand)
      overall_gap: -0.15  # UBS ~0.41 vs. Neobank ~0.56

    implications: |
      UBS hat einen Brand-Fit-Nachteil von ~0.15 gegenüber Neobanken.
      Dieser Nachteil ist STRUKTURELL (Traditional vs. Digital DNA)
      und kann NICHT vollständig ausgeglichen werden.

      ABER: UBS hat zwei Vorteile, die Neobanken fehlen:
      1. BRAND QUALITY (+0.20) — Vertrauen und Glaubwürdigkeit
      2. BESTEHENDE KUNDENBASIS — 3.5M Kund:innen, kein Acquisition-Kosten

      Strategie: Nicht versuchen Revolut zu imitieren, sondern
      UBS-spezifische Stärken nutzen (Trust + Convenience + Bundle).

# =============================================================================
# 5. SCHWEIZER REISEMARKT-KONTEXT (Ψ_K, Ψ_E)
# =============================================================================

swiss_travel_context:
  description: |
    Schweizer Reiseverhalten bestimmt den adressierbaren Markt für eSIM.
    Schweiz ist NICHT in der EU → kein «Roam-like-home» → Roaming-Kosten
    sind ein echtes Problem.

  key_data:
    overnight_trips_abroad:
      annual: 12500000  # ~12.5 Mio Übernachtungsreisen/Jahr
      source: "BFS Reisestatistik"
      note: "Schweiz hat höchste Reisefrequenz Europas pro Kopf"

    destination_distribution:
      europe: 0.96  # 96% der Reisen innerhalb Europa
      intercontinental: 0.04
      top_destinations: ["Deutschland", "Frankreich", "Italien", "Spanien", "Österreich"]

    roaming_pain_point:
      swiss_not_eu: true
      description: |
        Die Schweiz ist NICHT Teil des EU «Roam-like-home» Regimes.
        Schweizer zahlen deutlich mehr für Roaming als EU-Bürger:innen.

        Beispiele (2024):
        - Salt: CHF 60/400MB ausserhalb EU (teuerster Anbieter)
        - Swisscom: CHF 5-15/Tag (Europe Pass)
        - Sunrise: CHF 5-10/Tag

        → eSIM-Einsparung: Bis zu 90% gegenüber Carrier-Roaming

      pain_intensity:
        score: 0.70  # Hoher Pain Point
        note: |
          Für Vielreisende (4+ Reisen/Jahr) ist Roaming ein realer
          finanzieller Schmerz (CHF 200-500/Jahr bei aktiver Nutzung).
          Für 1-2 Reisen/Jahr ist es ärgerlich aber nicht dramatisch.

    travel_spending:
      annual_outbound: 18900000000  # CHF 18.9 Mrd. (2024, +7.8%)
      source: "BFS Tourismusstatistik"
      per_capita: "~CHF 2'200/Jahr"

  addressable_market:
    total_travelers: 5800000  # Schweizer mit mind. 1 Auslandsreise/Jahr
    digitally_affine: 0.65  # 65% (MKT-KUN-11 als Proxy)
    esim_aware: 0.30  # 30% kennen eSIM (Schätzung)
    esim_willing: 0.15  # 15% würden eSIM von Bank kaufen
    tam: 870000  # 5.8M × 0.65 × 0.30 × 15%? Nein → konservativer
    tam_conservative: 250000  # ~250K potenzielle Erstnutzer:innen
    source: "Geschätzt basierend auf BFS + CH-KI-09 (Chatbot-Adoption)"

# =============================================================================
# 6. CUSTOMER WILLINGNESS: BANK-eSIM-AKZEPTANZ
# =============================================================================

willingness_assessment:

  WAX_analysis:
    description: |
      Willingness × Ability × Context für eSIM-Adoption von Bank

    willingness:
      score: 0.40
      ci_68: [0.30, 0.50]
      drivers:
        positive:
          - "Convenience (alles in einer App): +0.15"
          - "Roaming-Ersparnis: +0.12"
          - "Vertrauen in UBS: +0.08"
          - "Neugier (Innovation): +0.05"
        negative:
          - "Category Incongruence ('warum Bank?'): -0.15"
          - "Bestehende Alternativen (Swisscom Day Pass): -0.10"
          - "eSIM-Unkenntnis: -0.08"
          - "Preiserwartung hoch (UBS = teuer): -0.07"

      benchmark: |
        YouGov-Studie: 64% «willing to pay premium for eSIM from neobank»
        ABER: Neobank ≠ Traditional Bank. Für Traditional Bank geschätzt: ~40%

    ability:
      score: 0.60
      drivers:
        positive:
          - "eSIM-fähiges Gerät: 85%+ der UBS-App-Nutzer"
          - "UBS App bereits installiert"
          - "Digitale Kompetenz vorhanden (MKT-KUN-11: 65%)"
        negative:
          - "eSIM-Setup-Komplexität (QR-Code, Profile)"
          - "Dual-SIM Konfiguration nicht trivial"
          - "Pilot: Separate Landing Page = zusätzliche Friction"

    context:
      score: 0.55
      psi_dimensions:
        Psi_I: 0.50  # Institutional: UBS ist glaubwürdig, aber Telco?
        Psi_T: 0.70  # Temporal: Vor der Reise = klarer Moment
        Psi_C: 0.55  # Cognitive: Muss bewusst entscheiden (System 2)
        Psi_E: 0.60  # Economic: Ersparnis vs. Status-quo-Bias

    WAX_total: 0.132  # 0.40 × 0.60 × 0.55
    interpretation: |
      WAX = 0.132 ist NIEDRIG-MODERAT.

      Zum Vergleich:
      - Revolut eSIM WAX (geschätzt): ~0.25
      - Swisscom Day Pass WAX: ~0.40 (einfacher, bekannt)

      Der grösste Hebel ist WILLINGNESS (Category Fit erklären)
      gefolgt von CONTEXT (Timing vor Reise triggern).

# =============================================================================
# 7. STRATEGISCHE IMPLIKATIONEN FÜR SURVEY-DESIGN
# =============================================================================

survey_implications:

  critical_questions_to_add:
    - question: "Von wem würden Sie am ehesten eine eSIM kaufen?"
      options: ["Mobilfunkanbieter", "Spezialisierter eSIM-Anbieter (Airalo)", "Ihre Bank", "Im Reisebüro"]
      purpose: "Category Congruence messen"
      expected_insight: "Bank-Option vermutlich 15-25%"

    - question: "Wenn UBS eine Reise-eSIM in der App anbieten würde, wie interessiert wären Sie?"
      scale: "1 (gar nicht) bis 7 (sehr)"
      purpose: "Willingness quantifizieren"
      expected_mean: 3.5  # Moderat

    - question: "Was wäre Ihr Hauptgrund, eine eSIM über die UBS App zu kaufen?"
      options: ["Convenience (alles an einem Ort)", "Günstigerer Preis", "Vertrauen in UBS", "Automatische Abrechnung"]
      purpose: "Value Proposition priorisieren"

    - question: "Was würde Sie davon ABHALTEN, eine eSIM über Ihre Bank zu kaufen?"
      options: ["Bank sollte sich auf Banking konzentrieren", "Zu teuer erwartet", "Kenne eSIM nicht", "Nutze bereits andere Lösung"]
      purpose: "Barriers identifizieren (Category Distance)"

    - question: "Haben Sie bei Ihrer letzten Auslandsreise unter Roaming-Kosten gelitten?"
      purpose: "Pain Point Intensität messen"
      expected: "~40% ja bei Nicht-EU-Reisen"

  questions_to_modify:
    existing_esim_questions: |
      Die bestehenden ~11 Survey-Fragen fokussieren auf Nutzungsbereitschaft
      und Features. Sie MISSEN die fundamentale Frage:
      «Akzeptiere ich meine BANK als eSIM-Anbieter?»

      PFLICHT-Ergänzung: Category Congruence explizit abfragen!

# =============================================================================
# 8. EMPFEHLUNGEN
# =============================================================================

recommendations:

  go_no_go:
    verdict: "CONDITIONAL GO"
    conditions:
      - "Co-Branding mit etabliertem eSIM-Provider (erhöht BFS auf ~0.50)"
      - "Integration in App-Ökosystem (nicht standalone)"
      - "Reise-Ökosystem-Narrativ (eSIM + Insurance + FX + Card)"
      - "Kein Versuch Revolut zu imitieren — UBS-spezifische Stärken nutzen"
    risks:
      - "Brand Dilution wenn schlecht umgesetzt"
      - "Customer Support Overflow bei technischen eSIM-Problemen"
      - "Wahrgenommene Ablenkung von Core Banking"

  positioning:
    recommended: "Convenience-in-Ecosystem"
    description: |
      NICHT: «UBS bietet jetzt auch eSIM an» (Category Dissonance!)

      SONDERN: «Alles für Ihre Reise — direkt in Ihrer UBS App.
      Kreditkarte, Versicherung, Währungswechsel — und jetzt auch
      Datenverbindung im Ausland. Einfach. Sicher. Swiss.»

    key_principle: |
      Das eSIM muss als FEATURE im Reise-Bundle erscheinen,
      NICHT als eigenständiges Telco-Produkt.

  pilot_critical_insight: |
    ACHTUNG PILOT: Separate Landing Page bei Drittanbieter
    maximiert die Category Distance (τ_channel sehr niedrig)
    und MINIMIERT die grössten UBS-Vorteile (Trust, Convenience, Bundle).

    Pilot-Ergebnisse werden daher SYSTEMATISCH pessimistischer ausfallen
    als die finale App-integrierte Version.
    → Siehe ANA-UBS-GM-A2-ESIM-PSI für Ψ-Differenz-Berechnung

