# =============================================================================
# 1. LITERATURE FOUNDATION
# =============================================================================

literature_foundation:
  core_papers:
    - key: dietvorst2015algorithm
      finding: "Algorithm aversion: 73% refuse algorithm after seeing it err, even when it outperforms human"
      effect_size: "d = 0.85 (large)"
      evidence_tier: 1
      ubs_relevance: "CRITICAL — Mortgage GPT will inevitably produce imprecise rates; users may reject entire system after one error"

    - key: dietvorst2018overcoming
      finding: "Modifiability restores algorithm use: 73% use when modifiable vs 32% without"
      effect_size: "41pp increase in usage (Cohen's h = 0.85)"
      evidence_tier: 1
      ubs_relevance: "DESIGN IMPLICATION — Allow users to adjust GPT parameters (e.g., risk tolerance, rate preferences) to restore trust"

    - key: logg2019algorithm
      finding: "Algorithm appreciation: people preferentially weight algorithmic advice for OBJECTIVE tasks"
      effect_size: "d = 0.40-0.65 (medium-large)"
      evidence_tier: 1
      ubs_relevance: "POSITIVE — Mortgage rate calculation is objective → expect appreciation, not aversion"

    - key: castelo2019task
      finding: "Task objectivity is KEY moderator: objective → appreciation; subjective → aversion"
      effect_size: "Interaction beta = 0.38"
      evidence_tier: 2
      ubs_relevance: "FRAMING — Present GPT as 'rate calculator' (objective) not 'financial advisor' (subjective)"

    - key: longoni2019resistance
      finding: "Uniqueness neglect: AI perceived as ignoring individual circumstances"
      effect_size: "Indirect effect via uniqueness neglect: -0.83"
      evidence_tier: 1
      ubs_relevance: "RISK — Mortgage clients have highly individual situations (income, property, LTV); GPT must signal personalization"

    - key: jussupow2020algorithm
      finding: "Systematic review: 3 mechanism clusters — performance expectation, cognitive bias, individual differences"
      evidence_tier: 2
      ubs_relevance: "FRAMEWORK — Use all 3 mechanism clusters for survey design"

    - key: burton2020systematic
      finding: "Meta-review: aversion strongest with high-stakes personal decisions"
      evidence_tier: 2
      ubs_relevance: "WARNING — Mortgage is HIGH-STAKES + PERSONAL → maximum aversion risk zone"

    - key: prahl2017understanding
      finding: "Reliance vs compliance framework for human-algorithm interaction"
      evidence_tier: 2
      ubs_relevance: "MEASUREMENT — Use reliance/compliance distinction in survey instruments"

  theory_integration:
    primary_theories:
      - id: MS-AI-002
        name: "Algorithm Aversion & Appreciation Framework"
        key_prediction: "Mortgage GPT in 'modifiable rate calculator' frame → appreciation; in 'AI financial advisor' frame → aversion"
      - id: MS-AI-003
        name: "Uniqueness Neglect in AI Resistance"
        key_prediction: "Users who feel their mortgage situation is 'unique' will resist GPT more (indirect effect -0.83)"

# =============================================================================
# 2. 10C MAPPING: Algorithm Aversion → Mortgage Journey
# =============================================================================

mapping_10c:
  AWARE:
    dimension: "Awareness of AI nature"
    parameter: "A_algo"
    literature_value: "Transparency increases trust initially but triggers aversion after errors (Dietvorst 2015)"
    survey_questions:
      - "Q_AA1: Wissen Sie, dass die Zinsindikation von einem KI-System berechnet wird?"
      - "Q_AA2: Wie wichtig ist es Ihnen zu wissen, ob ein Mensch oder eine KI antwortet?"
    design_implication: "Disclose AI nature but frame as 'calculation tool' not 'advisor'"

  READY:
    dimension: "Willingness to use AI for mortgage"
    parameter: "W_algo"
    literature_value: "Base willingness 32% (no modification) to 73% (with modification) — Dietvorst 2018"
    modifiers:
      task_objectivity: "+0.35 (mortgage rates are objective → Castelo 2019)"
      stakes_penalty: "-0.20 (high stakes → Burton 2020)"
      modification_boost: "+0.41 (if user can adjust parameters → Dietvorst 2018)"
    net_expected: "W_algo ≈ 0.52-0.73 depending on modification feature"
    survey_questions:
      - "Q_AA3: Würden Sie eine KI-generierte Zinsindikation als Entscheidungsgrundlage nutzen?"
      - "Q_AA4: Wäre es für Sie wichtig, Parameter (z.B. Risikobereitschaft) selbst anpassen zu können?"

  WHO:
    dimension: "Segment-specific algorithm attitudes"
    segments:
      tech_savvy_young:
        age: "30-40"
        expected_aversion: "LOW (digital natives, Logg 2019: appreciation for objective tasks)"
        W_algo: 0.70
      traditional_affluent:
        age: "45-60"
        expected_aversion: "HIGH (prefer human advisor, Burton 2020: high-stakes personal)"
        W_algo: 0.35
      first_time_buyers:
        age: "30-45"
        expected_aversion: "MEDIUM (uncertain, seek validation → uniqueness neglect risk)"
        W_algo: 0.50
      refinancers:
        age: "40-55"
        expected_aversion: "LOW-MEDIUM (experienced, objective comparison task)"
        W_algo: 0.60

  WHAT:
    dimension: "Utility components affected by algorithm perception"
    utility_shift:
      U_functional: "+0.15 (speed, convenience, 24/7 availability)"
      U_trust: "-0.25 to +0.10 (depends on framing and error exposure)"
      U_identity: "-0.10 (uniqueness neglect, Longoni 2019)"
    net_effect: "Positive IF framing is correct (objective + modifiable)"

  HOW:
    dimension: "Complementarity between AI and human advisor"
    gamma_ai_human: 0.35
    interpretation: "AI + Human advisor is COMPLEMENTARY (not substitute)"
    evidence: "Dietvorst 2018: highest trust when human can override AI; Prahl 2017: reliance + compliance"
    design_implication: "Position GPT as 'first step' before human advisor, not replacement"

  WHEN:
    dimension: "Context factors affecting algorithm aversion"
    psi_conditions:
      psi_T_time_pressure: "Under time pressure → LESS aversion (rely on efficient AI)"
      psi_C_cognitive_load: "High cognitive load → MORE aversion (revert to human heuristic)"
      psi_S_social_observation: "When observed → MORE aversion (social image concerns)"
      psi_I_institutional_trust: "High bank trust → LESS aversion (institutional halo effect)"

# =============================================================================
# 3. DESIGN RECOMMENDATIONS FOR SURVEY
# =============================================================================

survey_design_recommendations:
  must_measure:
    - construct: "Algorithm Aversion Level"
      items: 3
      scale: "7-point Likert"
      source: "Adapted from Dietvorst et al. (2015)"

    - construct: "Perceived Task Objectivity"
      items: 2
      scale: "7-point Likert"
      source: "Adapted from Castelo & Ward (2019)"

    - construct: "Uniqueness Neglect Perception"
      items: 3
      scale: "7-point Likert"
      source: "Adapted from Longoni et al. (2019)"

    - construct: "Modification Preference"
      items: 2
      scale: "Binary + 7-point"
      source: "Adapted from Dietvorst et al. (2018)"

  experimental_conditions:
    recommended_design: "2×2 between-subjects"
    factor_1: "AI disclosure (disclosed vs. not disclosed)"
    factor_2: "Modifiability (fixed output vs. adjustable parameters)"
    primary_dv: "Willingness to use for mortgage decision"
    secondary_dvs:
      - "Trust in recommendation"
      - "Perceived personalization"
      - "Intention to proceed to human advisor"

# =============================================================================
# 4. PARAMETER ESTIMATES (for A2 Trust-Kaskade Integration)
# =============================================================================

parameter_integration:
  trust_cascade_update:
    delta_AI_layer:
      original_estimate: "delta_AI accounts for 48% of trust variance (A2)"
      refined_estimate:
        with_modification: "delta_AI = 0.72 (modifiable GPT → trust restored)"
        without_modification: "delta_AI = 0.31 (fixed output → aversion dominates)"
        with_error_exposure: "delta_AI = 0.18 (after visible error → severe aversion)"
      implication: "Modification feature is THE critical design choice for trust"

  key_parameters:
    - symbol: "alpha_aversion"
      name: "Base Algorithm Aversion"
      value: 0.68
      ci_68: [0.55, 0.80]
      source: "Dietvorst et al. (2015), adapted for financial domain"
      interpretation: "68% of users show some aversion without mitigation"

    - symbol: "beta_modification"
      name: "Modification Effect on Usage"
      value: 0.41
      ci_68: [0.33, 0.49]
      source: "Dietvorst et al. (2018): 73% - 32% = 41pp"
      interpretation: "Modifiability increases usage by 41 percentage points"

    - symbol: "gamma_objectivity"
      name: "Task Objectivity Moderator"
      value: 0.38
      ci_68: [0.25, 0.51]
      source: "Castelo & Ward (2019)"
      interpretation: "Objective framing shifts from aversion to appreciation"

    - symbol: "delta_uniqueness"
      name: "Uniqueness Neglect Penalty"
      value: -0.83
      ci_68: [-1.05, -0.61]
      source: "Longoni et al. (2019): indirect effect"
      interpretation: "Strong negative: perceived lack of personalization drives resistance"

# =============================================================================
# 5. ACTIONABLE INSIGHTS FOR UBS
# =============================================================================

actionable_insights:
  critical_design_choices:
    - priority: 1
      choice: "Make GPT output modifiable"
      evidence: "Dietvorst 2018: +41pp usage"
      implementation: "Allow users to adjust risk tolerance, preferred term, LTV assumptions"

    - priority: 2
      choice: "Frame as 'rate calculator' not 'financial advisor'"
      evidence: "Castelo 2019: objectivity → appreciation; Logg 2019: appreciation for objective tasks"
      implementation: "UI copy: 'Berechnen Sie Ihre indikative Rate' not 'Lassen Sie sich von KI beraten'"

    - priority: 3
      choice: "Signal personalization actively"
      evidence: "Longoni 2019: uniqueness neglect indirect effect -0.83"
      implementation: "Show input factors (income, LTV, canton, term) visibly in calculation"

    - priority: 4
      choice: "Position as complement to human advisor"
      evidence: "Dietvorst 2018: highest trust in human-AI combination; γ_ai_human = 0.35"
      implementation: "End GPT flow with 'Möchten Sie diese Indikation mit einem Berater besprechen?'"

  risk_mitigation:
    - risk: "Error-triggered aversion cascade"
      probability: "HIGH (GPT will produce imprecise rates)"
      mitigation: "Transparent confidence intervals; 'Diese Indikation liegt typischerweise ±0.15% vom finalen Angebot'"
      source: "Dietvorst 2015: seeing algorithm err triggers lasting aversion"

    - risk: "Segment-specific rejection (traditional affluent)"
      probability: "MEDIUM-HIGH"
      mitigation: "Segment-adaptive entry: offer human-first path with GPT as optional tool"
      source: "Burton 2020: high-stakes personal decisions → maximum aversion"

    - risk: "Social image concerns in multi-party decisions"
      probability: "MEDIUM (couples deciding together)"
      mitigation: "Position as 'preparation tool' for joint discussion, not decision-maker"
      source: "Ψ_S social context from A2 Trust-Kaskade"
