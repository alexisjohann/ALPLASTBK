# =============================================================================
# MORTGAGE CUSTOM GPT
# =============================================================================

mortgage_gpt:

  konzept: |
    Eine Conversational Interface, die sich darauf spezialisiert hat,
    Erstunterstuetzung bei Fragen rund um die Eigenheimfinanzierung in der
    Schweiz zu geben und indikative Hypothekarzinssaetze bereitzustellen.
    Der Service ist ueber mehrere digitale Kanaele zugaenglich, darunter
    die UBS-Website, die Mobile Banking App, den ChatGPT-Marktplatz,
    Partnerplattformen und moeglicherweise soziale Medien (ueber die
    Direktnachrichten-Funktion).

  zielgruppe: |
    Personen in der Schweiz, 30+, die sich aktiv mit dem Kauf oder der
    Finanzierung von Wohneigentum beschaeftigen — insbesondere digital
    affine Kund:innen, die Informationen und erste Einschaetzungen bequem
    ueber Online-Kanaele einholen moechten. Dazu zaehlen sowohl Erstkaeufer
    als auch bestehende Hypothekarnehmer, die sich ueber Anschluss-
    finanzierungen oder aktuelle Zinssaetze informieren wollen.

  fragen:

    - id: MF01
      frage: "Wie hilfreich finden Sie digitale Unterstuetzung bei Finanzierungsfragen generell?"
      karten_mapping: [M1]

    - id: MF02
      frage: "Ueber welche digitalen Kanaele informieren Sie sich am liebsten zu Finanzthemen? (z.B. Website, App, Chatbots, Social Media)"
      karten_mapping: [M8]

    - id: MF03
      frage: "Wie wahrscheinlich ist es, dass Sie einen Chatbot oder ein Conversational Interface fuer Fragen zur Eigenheimfinanzierung nutzen wuerden?"
      karten_mapping: [M1]

    - id: MF04
      frage: "Welche Informationen oder Funktionen erwarten Sie von einem digitalen Assistenten zur Eigenheimfinanzierung?"
      karten_mapping: [M9]

    - id: MF05
      frage: "Wie wichtig ist es Ihnen, direkt indikative Hypothekarzinssaetze zu erhalten?"
      karten_mapping: [M5]

    - id: MF06
      frage: "Welche weiteren Services wuerden Sie sich wuenschen? (bspw. Steuerfuss, demographische Daten zu Gemeinden, Terminvereinbarung, Rueckrufservice)"
      karten_mapping: [M9]

    - id: MF06a
      frage: "Wie hilfreich faenden Sie die Moeglichkeit, direkt ueber den digitalen Assistenten einen Beratungstermin zur Eigenheimfinanzierung zu vereinbaren?"
      karten_mapping: [M9]

    - id: MF06b
      frage: "Inwiefern wuerde die Option zur Terminvereinbarung Ihre Bereitschaft erhoehen, den digitalen Service fuer Finanzierungsfragen zu nutzen?"
      karten_mapping: [M1, M9]

    - id: MF06c
      frage: "Ueber welchen Kanal wuerden Sie am liebsten einen Termin fuer eine persoenliche Beratung vereinbaren (z.B. Webseite, Mobile App, ChatGPT-Marktplatz, Partnerplattformen wie Homegate)?"
      karten_mapping: [M8]

    - id: MF07
      frage: "Wie sehr vertrauen Sie digitalen Assistenten bei sensiblen Finanzthemen?"
      karten_mapping: [M1, M2, M10]

    - id: MF08
      frage: "Welche Bedenken haetten Sie bei der Nutzung eines solchen Services (z.B. Datenschutz, Verlaesslichkeit der Informationen)?"
      karten_mapping: [M2, M3]

    - id: MF09
      frage: "Ueber welche Kanaele wuerden Sie einen solchen Service am ehesten nutzen? (Mehrfachauswahl moeglich: Website, Mobile App, ChatGPT-Marktplatz, Partnerplattformen, Social Media)"
      karten_mapping: [M8]

    - id: MF10
      frage: "Gibt es Kanaele, ueber die Sie einen solchen Service auf keinen Fall nutzen wuerden? Warum?"
      karten_mapping: [M8]

    - id: MF11
      frage: "Wie sehr wuerde ein solcher Service Ihre Entscheidung fuer eine Bank oder einen Anbieter beeinflussen?"
      karten_mapping: [M5, M10]

    - id: MF12
      frage: "Was muesste ein digitaler Assistent bieten, damit Sie ihn weiterempfehlen wuerden?"
      karten_mapping: [M10]

    - id: MF13
      frage: "Bevorzugen Sie bei der Nutzung eines digitalen Assistenten zur Eigenheimfinanzierung die Kommunikation per Sprache (Voice) oder per Text? Bitte begruenden Sie Ihre Wahl."
      karten_mapping: [M11]

    - id: MF14
      frage: "In welchen Situationen wuerden Sie eher die Sprachfunktion und in welchen eher die Texteingabe bei einem digitalen Assistenten nutzen? (z.B. abhaengig vom Ort, der Komplexitaet der Frage oder dem gewuenschten Tempo)"
      karten_mapping: [M11]

# =============================================================================
# UBS TRAVEL-eSIM
# =============================================================================

esim:

  konzept: |
    Ein vollstaendig in die UBS Mobile Banking App integriertes Travel-eSIM-
    Angebot. Kunden koennen eSIM-Pakete fuer ueber 100 Laender auswaehlen,
    aktivieren, aufladen und verwalten — mit transparenter Preisuebersicht,
    In-App-Top-ups, optionalen Gratiskontingenten in ausgewaehlten Bankpaketen
    und Support-Abwicklung ueber den Telco-Partner.

    Info: Waehrend der Pilotphase wird das Travel-eSIM-Angebot nicht in die
    UBS Mobile Banking App integriert, sondern eine separate Landing Page
    bei unserem Drittanbieter erstellt.

  zielgruppe: |
    Primaer Retail-Kunden in der Schweiz, die mindestens 1-2 Mal pro Jahr
    ausserhalb der «Roam-like-home»-Zonen reisen, kosten- und transparenz-
    sensitiv sind und eine einfach aktivierbare Datenloesung wuenschen.
    Besonders relevant sind digital affine Segmente mit hoher App-Nutzung
    und Potenzial fuer Up-/Cross-Selling in bestehende Bankpakete.

  fragen:

    - id: EF01
      frage: "Wie attraktiv ist ein eSIM-Reiseangebot in der Schweiz im Vergleich zu bestehenden Telco-Paketen?"
      karten_mapping: [E1]

    - id: EF02
      frage: "Welche Pain Points (Kosten, Transparenz, Aktivierung, Awareness) bestehen aktuell bei der Nutzung von Roaming/eSIM-Loesungen?"
      karten_mapping: [E1, E6]

    - id: EF03
      frage: "Welche Preis- und Paketgroessen (z.B. 1/3/5/10/20 GB) sowie Regionen (EU, USA, Asien etc.) sind fuer Sie am relevantesten?"
      karten_mapping: [E5]

    - id: EF04
      frage: "Wie wichtig ist Ihnen eine einfache, schnelle Aktivierung und Verwaltung direkt in der Banking App?"
      karten_mapping: [E6]

    - id: EF05
      frage: "Welche Zusatzfunktionen (z.B. In-App-Top-up, Uebersicht ueber Verbrauch, Support-Chat) erwarten Sie?"
      karten_mapping: [E6]

    - id: EF06
      frage: "Wie wahrscheinlich ist es, dass Sie ein eSIM-Angebot Ihrer Bank nutzen wuerden?"
      karten_mapping: [E3]

    - id: EF07
      frage: "Welche Bedenken haetten Sie bei der Nutzung eines solchen Services (z.B. Datenschutz, Support, Zuverlaessigkeit)?"
      karten_mapping: [E2, E3]

    - id: EF08
      frage: "Ueber welche Kanaele wuerden Sie sich ueber das Angebot informieren bzw. es nutzen (z.B. Mobile App, Website, E-Mail, Social Media, Partnerplattformen)?"
      karten_mapping: [E7]

    - id: EF09
      frage: "Wie sehr wuerde ein solches Angebot Ihre Entscheidung fuer eine Bank beeinflussen?"
      karten_mapping: [E1, E4]

    - id: EF10
      frage: "Was muesste das eSIM-Angebot bieten, damit Sie es weiterempfehlen wuerden?"
      karten_mapping: [E7]

    - id: EF11
      frage: "Welche Erfahrungen haben Sie bisher mit eSIM- oder Roaming-Angeboten gemacht?"
      karten_mapping: [E1]
