new_constructs:

  construct_01_post_error_aversion:
    name: "Post-Error Aversion (rho_error)"
    status: "NEU HINZUGEFUEGT"
    parameter: "rho_error_penalty"
    value: 0.40
    ci_68: [0.30, 0.50]
    tier: 2
    source: "Trust Dynamics Research 2025 (Multiple Papers)"
    description: |
      Ein einziger GPT-Fehler (z.B. falsche Zinsindikation) verursacht
      einen ueberproportionalen Trust-Verlust von ~40%.

      Trust-Erholung ist ASYMMETRISCH:
      - Zerstoerung: 1 Fehler → -40% Trust
      - Aufbau: ~5 korrekte Interaktionen noetig fuer Erholung

      DESIGN-IMPLIKATIONEN:
      1. GPT MUSS Konfidenz-Ranges statt Punkt-Schaetzungen ausgeben
      2. Disclaimer: "Dies ist eine Indikation, kein verbindliches Angebot"
      3. Error-Recovery-Protokoll: Bei erkanntem Fehler sofort menschliche
         Uebergabe anbieten
      4. Erste Interaktion = kritischste → Best-Case-Szenario sicherstellen
    simulation_impact: |
      Neuer Parameter fuer Q_M08 (Trust):
      - Ohne Fehler: 5.2 → 4.95 (nur delta_AI-Korrektur)
      - Nach Fehler: 4.95 × (1 - 0.40) = 2.97 → UNTER Schwellenwert
      → Error Prevention ist EXISTENZKRITISCH fuer das Projekt

  construct_02_stated_revealed_gap:
    name: "Stated-Revealed Preference Gap"
    status: "NEU HINZUGEFUEGT — als Korrekturfaktor"
    parameter: "kappa_SR_gap"
    value: 0.75
    ci_68: [0.65, 0.85]
    tier: 2
    source: "Standard Behavioral Economics (Kahneman, Thaler)"
    description: |
      Surveys messen STATED Preferences. Tatsaechliches Verhalten
      (REVEALED Preferences) liegt systematisch 15-35% darunter.

      Fuer AI-Akzeptanz: "Ich wuerde AI nutzen" ≠ "Ich nutze AI tatsaechlich"

      Korrekturfaktor kappa_SR = 0.75 (25% Gap)
      → Alle BI-Means sollten mit × 0.75 korrigiert werden
         fuer realistische Adoption-Prognosen.
    simulation_impact: |
      Q_M06 Revealed BI: 4.65 × 0.75 = 3.49 → PROBLEMATISCH (< 3.5 = Rot)
      ABER: Dies gilt fuer reale Adoption, nicht fuer Survey-Response.
      Im Survey werden wir die STATED Werte messen.
      → Kappa_SR als INTERPRETATIONS-Hinweis, nicht als Survey-Korrektur.

  construct_03_decision_style:
    name: "Decision Style Moderator (Maximizing vs. Satisficing)"
    status: "NEU HINZUGEFUEGT"
    parameter: "theta_decision_style"
    source: "Silber et al. 2025"
    description: |
      Maximizers (die immer die BESTE Option suchen) zeigen weniger
      Algorithm Aversion als Satisficers (die eine "gut genuge" Option akzeptieren).

      Mapping auf UBS-Segmente:
      - Tech-Savvy: 65% Maximizers → theta = 0.65
      - Refinancers: 55% Maximizers → theta = 0.55
      - First-Time Buyers: 40% Maximizers → theta = 0.40
      - Traditional Affluent: 20% Maximizers → theta = 0.20

      W_algo_adjusted = W_algo × (1 + 0.15 × (theta - 0.50))
    recommendation: |
      SURVEY-ITEM HINZUFUEGEN: Maximization Scale (Schwartz et al. 2002)
      3 Items genuegen (6-item short form):
      "Ich gebe mich nicht mit dem Zweitbesten zufrieden"
      "Wenn ich einkaufe, vergleiche ich alle Optionen"
      "Ich hinterfrage meine Entscheidungen haeufig"

  construct_04_trust_oscillation:
    name: "Trust Oscillation (Dynamic Trust)"
    status: "NEU HINZUGEFUEGT — als konzeptueller Rahmen"
    description: |
      Trust ist kein statischer Parameter, sondern ein dynamischer Prozess
      mit Oszillationen:

      1. INITIAL: Mittleres Trust-Level (our baseline)
      2. POSITIVE EXPERIENCE: Trust steigt (langsam, +5-10% pro Interaktion)
      3. NEGATIVE EXPERIENCE: Trust faellt (schnell, -30-45% pro Fehler)
      4. RECOVERY: Trust erholt sich (sehr langsam, 5+ Interaktionen)

      Implikation: Der ERSTE GPT-Kontakt ist entscheidend.
      → Onboarding-Flow muss einfache, sichere Faelle priorisieren
      → Keine Edge Cases (z.B. Renovation + Erbe + SARON) im ersten Kontakt

