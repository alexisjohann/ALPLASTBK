parameter_updates:

  # ─────────────────────────────────────────────────────────────────────────
  # UPDATE 1: delta_AI_advice (Trust-Kaskade Layer 4)
  # ─────────────────────────────────────────────────────────────────────────

  update_01_delta_AI:
    parameter: "delta_AI_advice"
    location: "A2_trust_kaskade_mortgage_gpt.yaml → layer_4_ai_advice"
    old_value: 0.52
    old_confidence: "LOW-MEDIUM"
    old_tier: 2
    new_value: 0.42
    new_ci_68: [0.35, 0.50]
    new_confidence: "MEDIUM"
    new_tier: 2
    change: "-0.10 (19% Reduktion)"
    justification: |
      J.D. Power 2024: 27% trust AI for financial info (US).
      CH-Korrektur: × 1.40 (hoehere Tech-Affinitaet + Inst. Trust).
      27% × 1.40 = 37.8% → Trust-Skala [0,1]: ≈ 0.38.

      Cloudvirga 2024: 60% serious concerns about lender AI.
      40% ohne serious concerns → Trust-Skala: ≈ 0.40.

      LendingTree 2024: 49% say AI influenced decision (Chatbot-Nutzer).
      Aber: Selektionsbias (nur Nutzer).

      Triangulation: 0.38 / 0.40 / [0.49 mit Bias] → 0.42 als Mittelwert.

      ALTE Berechnung: 0.452 × 0.85 × 0.80 × 1.15 = 0.354 (skaliert auf 0.52)
      NEUE Berechnung: Direkte empirische Kalibrierung → 0.42
    impact_on_simulation: |
      Q_M06 Grand Mean: sinkt von 4.85 auf ~4.65 (-0.20)
      Q_M08 Trust Grand Mean: sinkt von 5.2 auf ~4.95 (-0.25)
      Q_M14 Conversion: sinkt von 18% auf ~16%
      Revenue Projection: CHF 1.8 Mrd → CHF 1.6 Mrd (-11%)

  # ─────────────────────────────────────────────────────────────────────────
  # UPDATE 2: Revenue-Kette (5 Multiplikatoren)
  # ─────────────────────────────────────────────────────────────────────────

  update_02_revenue_chain:
    parameter: "Revenue Projection Chain"
    location: "SIM Q_M14 → conversion_estimate"
    old_chain:
      monthly_engagements: 12500
      gpt_to_lead_rate: "30%"
      lead_to_appointment_rate: "30%"
      appointment_to_closing_rate: "30% (implizit)"
      average_mortgage: "CHF 750K"
      annual_volume: "CHF 1.8 Mrd"
    new_chain:
      monthly_engagements:
        value: 12500
        confidence: "LOW"
        note: "Keine UBS-Benchmarks fuer GPT-Traffic verfuegbar"
      gpt_to_lead_rate:
        old: "30%"
        new: "25-35%"
        source: "LendingTree 49% influence (Obergrenze), Cloudvirga 60% concerns (Untergrenze)"
        note: "Range statt Punkt-Schaetzung"
      lead_to_appointment_rate:
        old: "30%"
        new: "25-30%"
        note: "Realistischer mit niedrigerem AI-Trust"
      appointment_to_closing_rate:
        old: "30% (implizit)"
        new: "30-35%"
        note: "Berater-Phase ist unabhaengig von AI-Trust — bleibt stabil"
      average_mortgage:
        old: "CHF 750K"
        new: "CHF 750K"
        note: "Keine Aenderung — marktbasiert"
    new_annual_volume:
      pessimistic: "CHF 1.0 Mrd"
      expected: "CHF 1.4 Mrd"
      optimistic: "CHF 1.9 Mrd"
    justification: |
      Die alte Punkt-Schaetzung (CHF 1.8 Mrd) war das optimistische Szenario.
      Mit korrigierten Conversion-Raten ergibt sich ein Expected Case
      von CHF 1.4 Mrd — immer noch ein starkes Business Case.

      KRITISCH: Monthly Engagements (12'500) hat KEINE empirische Basis.
      Dies ist der groesste Hebel im gesamten Modell.

      DATEN-REQUEST AN UBS:
      - Aktuelle Chatbot-Nutzungszahlen (wie viele Interaktionen/Monat?)
      - Key Advisor Platform Traffic
      - Mortgage Calculator Nutzung auf Website

  # ─────────────────────────────────────────────────────────────────────────
  # UPDATE 3: Algorithm Appreciation by Decision Style
  # ─────────────────────────────────────────────────────────────────────────

  update_03_W_algo_segments:
    parameter: "W_algo (Segment-spezifisch)"
    location: "SIM Q_M06 → segment_breakdown"
    changes:
      tech_savvy:
        old_W_algo: 0.70
        new_W_algo: 0.78
        justification: "Silber 2025: Maximizers +0.15; Tech-Savvy ≈ 65% Maximizers → +0.10"
        new_mean: 5.4
        old_mean: 5.2
      traditional_affluent:
        old_W_algo: 0.35
        new_W_algo: 0.30
        justification: "Silber 2025: Satisficers -0.05; Traditional ≈ 80% Satisficers → -0.05"
        new_mean: 2.9
        old_mean: 3.1
      first_time_buyers:
        old_W_algo: 0.50
        new_W_algo: 0.48
        justification: "Mixed Decision Styles; leicht nach unten wg. AI-Trust-Korrektur"
        new_mean: 3.9
        old_mean: 4.0
      refinancers:
        old_W_algo: 0.60
        new_W_algo: 0.62
        justification: "Erfahrene Nutzer = mehr Maximizers; Logg 2019 Appreciation fuer objektive Tasks"
        new_mean: 4.6
        old_mean: 4.6
    impact: |
      Groessere Segmentdifferenzierung: Tech-Savvy noch positiver,
      Traditional Affluent noch skeptischer.
      → Verstaerkt die Empfehlung fuer Segment-adaptive Strategie.

  # ─────────────────────────────────────────────────────────────────────────
  # UPDATE 4: Psi-Transformation (Pilot → Final)
  # ─────────────────────────────────────────────────────────────────────────

  update_04_psi_transformation:
    parameter: "Psi-Transformation Multiplikator"
    location: "A2_pilot_vs_final_psi_esim.yaml"
    old_value: 2.46
    old_ci: [1.80, 3.20]
    new_value: 2.46
    new_ci: [1.60, 3.40]
    change: "Punkt-Schaetzung unveraendert, CI ERWEITERT"
    justification: |
      Keine direkt vergleichbaren Pilot→Final Transformationsstudien gefunden.
      ABER: Die Asymmetrie der Evidenz (8 Psi-Dimensionen × je 2 Quellen = 16
      Expert-Schaetzungen, keine empirische Validierung) rechtfertigt ein
      BREITERES Konfidenzintervall.

      Zwei moderierend Faktoren:
      1. eSIM-Markt waechst schneller als erwartet (Finding B2)
         → Psi_K (Kultur) Delta koennte GROESSER sein als 0.30
      2. Aber: Swiss German Analytic Thinking (Monga 2010)
         → Psi_C (Cognitive) Delta koennte KLEINER sein als 0.25

      NET: Punkt-Schaetzung bleibt, aber Unsicherheit steigt.
    recommendation: |
      DRINGEND: Pilot-Daten sammeln und tatsaechliche Transformation messen.
      Wenn Pilot bei 1.5% Conversion liegt:
      - Pessimistisch: 1.5% × 1.60 = 2.4% Final
      - Expected: 1.5% × 2.46 = 3.7% Final
      - Optimistisch: 1.5% × 3.40 = 5.1% Final

  # ─────────────────────────────────────────────────────────────────────────
  # UPDATE 5: BFS (Brand Fit Score) mit Peng et al. 2023
  # ─────────────────────────────────────────────────────────────────────────

  update_05_bfs:
    parameter: "BFS Fit-Gewichtung"
    location: "B3_brand_extension_esim.yaml → success_factor_analysis"
    old_meta_beta_fit: 0.41
    new_meta_beta_fit: 0.37
    source: "Peng, Bijmolt, Voelckner & Zhao (2023), Journal of Marketing"
    change: "-0.04 (10% Reduktion der Fit-Gewichtung)"
    justification: |
      Peng et al. (2023) aktualisieren die Voelckner & Sattler (2006) Meta-Analyse
      mit 2,134 Effektgroessen aus 1990-2020.
      Hauptbefund: Fit bleibt staerkster Praediktor, aber Beta sinkt von 0.41 auf 0.37.

      MODERATOR: Service Brand Extensions haben HOEHERE Erfolgsrate als
      Product Extensions. UBS als Service-Brand profitiert davon.

      Netto-Effekt auf BFS Composite:
      - Alt: BFS_fit = 0.405 × 0.41 = 0.166
      - Neu: BFS_fit = 0.405 × 0.37 = 0.150
      - Service-Moderator: +0.02 → BFS_fit_adjusted = 0.170

      BFS Composite:
      - Alt: 0.868
      - Neu: 0.868 - 0.016 + 0.020 = 0.872
