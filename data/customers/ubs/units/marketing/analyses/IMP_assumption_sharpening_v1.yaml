# =============================================================================
# TEIL 2: LITERATUR-RECHERCHE ERGEBNISSE (Neue Quellen)
# =============================================================================

new_literature_findings:

  # ─────────────────────────────────────────────────────────────────────────
  # CLUSTER A: AI Trust & Algorithm Aversion (Mortgage GPT)
  # ─────────────────────────────────────────────────────────────────────────

  finding_A1:
    source: "J.D. Power 2024 U.S. Retail Banking Satisfaction Study"
    key_data: "Only 27% of consumers trust AI for financial information"
    url: "J.D. Power 2024 Survey"
    impact_on: "delta_AI_advice (Layer 4 Trust-Kaskade)"
    direction: "NACH UNTEN — 27% ist deutlich unter unserer Schaetzung von 52%"
    caveat: |
      J.D. Power misst US-Bevoelkerung, nicht Schweiz. CH hat:
      - Hoehere Tech-Affinitaet (78% Mobile Banking vs. ~60% US)
      - Hoeheres institutionelles Vertrauen (0.78 vs. ~0.55 US)
      - Aber: Financial AI Trust ist NICHT dasselbe wie Tech-Nutzung
    revised_estimate: "delta_AI wird von 0.52 auf 0.38-0.45 gesenkt"

  finding_A2:
    source: "Cloudvirga Mortgage Technology Survey 2024"
    key_data: "60% of consumers have serious concerns about lender AI"
    url: "Cloudvirga 2024"
    impact_on: "delta_AI_advice + delta_mortgage_domain"
    direction: "NACH UNTEN — Hypotheken-Domaene verstaerkt AI-Skepsis"
    caveat: "US-Stichprobe, aber Hypotheken-spezifisch = hoch relevant"
    revised_estimate: "Bestaetigt Reduktion; delta_mortgage bleibt bei 0.65"

  finding_A3:
    source: "LendingTree Consumer AI Finance Survey 2024"
    key_data: "49% of AI chatbot users say AI influenced a financial decision"
    url: "LendingTree 2024"
    impact_on: "Conversion-Kette (GPT→Lead→Termin→Abschluss)"
    direction: "POSITIV — Hoeher als erwartet; AI BEEINFLUSST Finanzentscheidungen"
    caveat: "Selektionsbias: Nur Chatbot-NUTZER befragt (nicht Verweigerer)"
    revised_estimate: "C_GPT_to_RM Conversion +2pp (8-15% auf 10-17%)"

  finding_A4:
    source: "Trust Dynamics in AI (2025 Research, Multiple Papers)"
    key_data: "Single algorithmic error causes disproportionate trust loss ('trust oscillation')"
    url: "Various 2025 publications"
    impact_on: "MISSING: Post-Error Aversion — bisher nicht modelliert"
    direction: "NEUES KONSTRUKT — Trust ist nicht statisch, sondern oszilliert"
    caveat: "Generisch, nicht hypotheken-spezifisch"
    revised_estimate: |
      Neuer Parameter: rho_error_penalty = 0.35-0.45
      Bedeutung: Ein einziger GPT-Fehler (falsche Zinsindikation)
      reduziert Trust um 35-45% (asymmetrisch: Trust-Aufbau dauert
      laenger als Trust-Zerstoerung).
      DESIGN-IMPLIKATION: GPT muss Konfidenz-Ranges statt Punkt-
      schaetzungen ausgeben ("CHF 2'450-2'680/Monat" statt "CHF 2'565").

  finding_A5:
    source: "Silber et al. 2025: Decision Style Moderates Algorithm Aversion"
    key_data: "Maximizing decision style reduces algorithm aversion significantly"
    url: "Silber et al. 2025"
    impact_on: "Segment-spezifische Algorithm Appreciation (W_algo)"
    direction: "DIFFERENZIERUNG — Maximizers nutzen AI mehr als Satisficers"
    caveat: "Neues Paper, noch nicht repliziert"
    revised_estimate: |
      W_algo Adjustment nach Decision Style:
      - Maximizers (ca. 30% der Pop): W_algo + 0.15
      - Satisficers (ca. 70% der Pop): W_algo - 0.05
      Mapping auf UBS-Segmente:
      - Tech-Savvy = ueberproportional Maximizers → W_algo 0.70 → 0.80
      - Traditional Affluent = ueberproportional Satisficers → W_algo 0.35 → 0.30

  finding_A6:
    source: "Mortgage AI Adoption Industry Data 2024-2025"
    key_data: "38% of mortgage institutions now use AI (up from 15% in 2023)"
    url: "STRATMOR Group / Scotsman Guide"
    impact_on: "Market Readiness / Normative Adoption Pressure"
    direction: "POSITIV — Schnelle institutionelle Adoption normalisiert AI im Hypothekenmarkt"
    caveat: "Institutionelle Adoption ≠ Consumer-Akzeptanz"
    revised_estimate: |
      Social Influence (SI) von 0.18 auf 0.22 erhoehen:
      38% der Institute = beginnende Normalisierung
      → Reduziert novelty anxiety
      → Erhoet "andere machen das auch" Effekt

  finding_A7:
    source: "FINMA AI Survey 2024/2025"
    key_data: |
      50% der ~400 Schweizer Finanzinstitute nutzen bereits AI.
      91% davon nutzen generative AI (Chatbots).
      60% der Bankmitarbeitenden nutzen GenAI.
      50% haben explizite AI-Strategie.
    url: "https://www.finma.ch/en/news/2025/04/20250424-mm-umfrage-ki/"
    impact_on: "Schweizer Markt-Readiness (organisational)"
    direction: "STARK POSITIV — CH-Banken sind weiter als angenommen"
    revised_estimate: |
      Organisationale Readiness: 50% der FIs nutzen AI → UBS ist nicht First-Mover,
      sondern Teil einer Welle. Dies reduziert "Novelty Risk" und erhoet
      die Akzeptanz bei regulierungsaffinen Schweizer Kund:innen.

  finding_A8:
    source: "FINMA Guidance 08/2024"
    key_data: "AI-Disclosure PFLICHT wenn nicht offensichtlich. Keine Dark Patterns."
    url: "https://www.finma.ch/en/news/2024/12/20241218-mm-finma-am-08-24/"
    impact_on: "Experimentelles Design (Disclosure-Bedingung)"
    direction: "REGULATORISCH — 'Undisclosed' Bedingung ist in CH nicht legal deploybrar"
    revised_estimate: |
      KRITISCH fuer Survey-Design: Die 'Undisclosed' Bedingung im 2×2 Design
      ist zwar fuer Forschungszwecke valide, aber UBS kann sie NICHT im
      Live-Produkt umsetzen. Disclosure ist PFLICHT.
      → Survey misst trotzdem den kausalen Effekt von Disclosure
      → Aber fuer Go/No-Go sind NUR die 'Disclosed' Zellen relevant

  finding_A9:
    source: "Global Trust Study: Robot vs. Human Mortgage Advice"
    key_data: "11% trust robot for mortgage advice vs. 41% human broker"
    url: "Frontiers/FPA Journal 2024"
    impact_on: "delta_AI_advice — zusaetzliche Validierung"
    direction: "STARK NACH UNTEN — 11% ist erschreckend niedrig"
    caveat: |
      Global, nicht CH-spezifisch. CH-Korrektur: × 2.0 (hoehere Tech-Affinitaet
      + institutionelles Vertrauen) → 22%. Immer noch deutlich unter 52%.
      ABER: "Robot mortgage advice" ≠ "AI-gestuetzte Zinsindikation".
      Das Framing macht einen RIESIGEN Unterschied (Castelo 2019).
    revised_estimate: "Bestaetigt delta_AI = 0.42. Unterstreicht Framing-Relevanz."

  finding_A10:
    source: "Robo-Advisor Lab Study (Frontiers 2024, Rossi et al. Bocconi)"
    key_data: |
      In Lab-Experimenten: Nur ~40% entscheiden sich fuer Robo-Advisor
      (trotz sichtbarem Effizienz-Vorteil).
      Ongoing Disutility (Praeferenz) ist wichtiger als Pessimismus (Belief).
    impact_on: "Adoption Baseline"
    direction: "NACH UNTEN — 40% Lab Adoption als konservative Baseline"
    revised_estimate: |
      40% Lab-Adoption bei sichtbarem Vorteil → reale Adoption niedriger.
      Fuegt Evidenz hinzu fuer konservativere Conversion-Schaetzung.

  finding_A11:
    source: "gfs.bern Banking Monitor + Connect4B.net Survey (N=800)"
    key_data: |
      83% zufrieden mit EIGENER Bank. ABER:
      Trust in Banken allgemein SINKT seit 2021.
      75% kritisieren Profit-Orientierung.
      >50% sehen hohen UBS-Systemrisiko.
      <10% sehen Wert in CS-Akquisition.
      AI ist POLARISIEREND bei aelteren Kund:innen.
    impact_on: "Trust-Environment (MACRO-Level)"
    direction: "GEMISCHT — Eigene Bank gut, Sektor schlecht"
    revised_estimate: |
      Duale Dynamik: Bestehende UBS-Kund:innen (tau_brand hoch) werden
      Mortgage GPT eher akzeptieren. Neukunden-Akquise ist schwieriger
      (niedriges Sektor-Vertrauen).
      AI-Polarisierung bei 40-55-Jaehrigen (Kern-Hypotheken-Demografie!)
      → Altersabhaengige Adoption-Kurve modellieren

  # ─────────────────────────────────────────────────────────────────────────
  # CLUSTER B: Brand Extension & eSIM Adoption
  # ─────────────────────────────────────────────────────────────────────────

  finding_B1:
    source: "Peng, Bijmolt, Voelckner & Zhao (2023): Brand Extension Meta-Analysis Update"
    journal: "Journal of Marketing"
    key_data: "2,134 effect sizes from 1990-2020. Updated fit→success relationship: beta_fit = 0.37 (slightly lower than Voelckner 2006's 0.41)"
    impact_on: "BFS Composite und Fit-Gewichtung in B3"
    direction: "LEICHTE REDUKTION — Fit ist etwas weniger dominant als 2006 geschaetzt"
    caveat: "Inkludiert alle Branchen, nicht nur Financial Services"
    revised_estimate: |
      BFS Meta-Beta: 0.41 → 0.37
      Effekt auf UBS eSIM: BFS Contribution = 0.405 × 0.37 = 0.150 (statt 0.166)
      ABER: Peng et al. finden dass SERVICE brand extensions (vs. product)
      hoehere Erfolgsrate haben → positiver Moderator fuer UBS
      NET EFFECT: BFS-Gewichtung leicht reduziert, aber Service-Moderator
      kompensiert teilweise.

  finding_B2:
    source: "eSIM Market Data 2024-2025 (GSMA, Grand View Research, Juniper, Holafly)"
    key_data: |
      Globaler eSIM-Markt: $10.32B (2024) → $17.67B (2033), CAGR 5.1%.
      eSIM Smartphone-Penetration: 28.9% global (2024), 57.7% (2030 projected).
      Consumer Awareness: NUR 36% der Smartphone-Besitzer kennen "eSIM".
      Travel eSIM Users: 40M (2024) → 215M (2028) = 440% Wachstum.
      Travel eSIM Spend: <$15/Trip, 35% Ersparnis gegenueber Roaming.
      EU-Reisende: 54% nutzen Free Roaming → BRAUCHEN KEIN eSIM.
      Adoption (unter Aware): 24% der eSIM-bewussten Europaeer nutzen Travel eSIM.
    impact_on: "eSIM Addressable Market — DEUTLICH kleiner als angenommen"
    direction: "MIXED — Markt waechst, aber effektiver Markt viel kleiner"
    revised_estimate: |
      KRITISCHE KORREKTUR:
      Awareness nur 36% (nicht 55% wie initial geschaetzt).
      Effektiver Markt fuer UBS Travel eSIM:
      3.5M UBS-Kunden × 40% Non-EU-Reisende × 52% eSIM-faehig × 36% Aware × 24% Adoption
      = ~63,000 potenzielle Nutzer/Jahr

      Average Revenue pro Trip: <CHF 15.
      Jahresumsatz: ~63,000 × CHF 15 = ~CHF 950,000.
      Das ist ein SEHR kleines Geschaeft (vs. Mortgage GPT: CHF 1.4 Mrd).

      ABER: Strategischer Wert (Engagement, Habit-Building, App-Nutzung)
      uebersteigt den direkten Revenue. eSIM ist ein HOOK, kein Profit-Center.

  finding_B4:
    source: "Orange Bank Failure (France 2024) + European Super App Analysis"
    key_data: |
      Orange Bank: Telco→Banking Extension GESCHEITERT, 2024 an BNP Paribas transferiert.
      Revolut: 50M Kunden (Neobank→Super App funktioniert).
      Deutsche Studie (N=764): Banking und E-Commerce als Top Super-App-Kategorien;
      Telco NICHT unter den praeferierten Kategorien.
      Europa: GDPR, reifes Banking-Ecosystem und dezentralisierte Praeferenzen als Barrieren.
    impact_on: "Banking→Telco Extension Viability"
    direction: "WARNEND — Cross-Category Extensions im EU-Banking sind riskant"
    revised_estimate: |
      Die Orange Bank-Failure zeigt: Selbst eine starke Telco-Marke konnte
      keine erfolgreiche Banking-Extension aufbauen.
      UBS versucht die UMGEKEHRTE Richtung (Banking→Telco).
      Positiv: UBS hat hoeheres Brand Equity als Orange.
      Negativ: Die Richtung Banking→Telco hat noch weniger "natuerlichen Fit".
      → Verstaerkt die Empfehlung fuer Co-Branding mit etabliertem eSIM-Player.

  finding_B3:
    source: "UBS-Credit Suisse Integration Status 2025-2026"
    key_data: |
      - 1.3 Millionen CS-Kund:innen werden migriert
      - 95 Filialen zusammengelegt (von 320 auf 225)
      - Migration Completion erwartet: Ende 2026
      - UBS hat Euromoney Awards 2024 gewonnen (Best Bank Switzerland)
      - Keine oeffentlichen Trust-Surveys fuer migrierte Kund:innen verfuegbar
    impact_on: "SEG-CS-MIGRATED Trust-Parameter (tau_brand = 0.55)"
    direction: "UNVERAENDERT — Keine besseren Daten verfuegbar"
    caveat: |
      Kritischer Blindspot: Wir haben KEINEN empirischen Trust-Wert fuer
      migrierte CS-Kund:innen. Der Wert 0.55 ist eine Schaetzung basierend auf:
      - Generelle Post-Merger Trust-Literatur
      - CS-Skandal-Effekte (Greensill, Archegos)
      - Schweizer Medienberichterstattung
      UBS-interne Daten (NPS, Abwanderungsrate) waeren hier Gold wert.
    revised_estimate: "tau_brand_CS = 0.55 bleibt (LLMMC), Confidence: LOW"
    data_request: |
      EMPFEHLUNG AN UBS: Interne NPS-Daten fuer migrierte CS-Kund:innen
      bereitstellen. Bereits eine Kennzahl (NPS vorher/nachher) wuerde
      den Parameter auf Tier-1 heben.

