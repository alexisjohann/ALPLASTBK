# =============================================================================
# TEIL 2: MODELL-GLEICHUNGEN (Wie Parameter in Outputs fliessen)
# =============================================================================

model_equations:

  Q_M06_grand_mean:
    name: "Mortgage GPT Adoption Intent (Grand Mean, 7-point)"
    equation: |
      Q_M06 = Σ_s [w_s × μ_s]

      wobei fuer jedes Segment s:
      μ_s = baseline + δ_AI × trust_factor_s + β_mod × mod_boost
            - α_aversion × (1 - W_algo_s) + ε

      Linearisiert (1st-order Taylor um Punkt-Schaetzungen):
      Q_M06 ≈ 4.65
        + 3.0 × (delta_AI - 0.42)
        + 2.0 × (beta_modification - 0.41)
        - 1.5 × (alpha_aversion - 0.68)
        + 0.8 × (PE_beta - 0.32)
        + 0.6 × (Trust_beta - 0.38)
        + Σ_s [sensitivity_s × (W_algo_s - W_algo_s_mean)]
    sensitivity_coefficients:
      delta_AI: 3.0
      beta_modification: 2.0
      alpha_aversion: -1.5
      PE_beta: 0.8
      Trust_beta: 0.6
      W_algo_tech_savvy: 0.5
      W_algo_affluent: 0.2
      seg_tech_savvy_share: 1.0
      seg_ftb_share: -0.3

  Q_M08_trust_mean:
    name: "Trust Grand Mean (7-point)"
    equation: |
      Q_M08 ≈ 4.95
        + 4.0 × (delta_AI - 0.42)
        + 0.8 × (Trust_beta - 0.38)
        + 0.4 × (SI_beta - 0.22)

      Post-Error Szenario:
      Q_M08_post_error = Q_M08 × (1 - rho_error_penalty)
    sensitivity_coefficients:
      delta_AI: 4.0
      Trust_beta: 0.8
      SI_beta: 0.4
      rho_error_penalty: -4.95

  Q_M14_revenue:
    name: "Annual Mortgage Revenue (CHF)"
    equation: |
      Revenue = monthly_leads × 12 × lead_to_appt × appt_to_close × avg_mortgage

      Dies ist ein MULTIPLIKATIVER Chain → Unsicherheit potenziert sich.
      Log-Normal Approximation fuer Produkt normaler Variablen.
    note: |
      WARNUNG: Multiplikative Ketten haben breite Tails.
      Der CV (Coefficient of Variation) des Outputs ist GROESSER als
      der CV jedes einzelnen Inputs.

  Q_E09_esim_adoption:
    name: "eSIM Adoption Intent (7-point)"
    equation: |
      Q_E09_pilot = 3.8 + noise
      Q_E09_final = Q_E09_pilot × psi_transformation

      Bound: max(Q_E09_final, 7.0) wg. Ceiling

  esim_revenue:
    name: "eSIM Annual Revenue (CHF)"
    equation: |
      Revenue_eSIM = esim_addressable_users × esim_revenue_per_trip × trips_per_year

      trips_per_year ≈ 1.5 (gewichtet: 35% × 1 + 30% × 2.5 + 10% × 4)

