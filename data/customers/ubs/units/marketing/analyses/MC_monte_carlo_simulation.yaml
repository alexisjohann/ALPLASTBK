# =============================================================================
# TEIL 5: POWER-ANALYSE (2×2 Experimentaldesign)
# =============================================================================

power_analysis:

  design:
    type: "2×2 Between-Subjects Factorial"
    factor_A: "AI Disclosure (Disclosed vs. Undisclosed)"
    factor_B: "Modifiability (Modifiable vs. Non-Modifiable)"
    primary_dv: "Q_M06 (Behavioral Intent, 7-point Likert)"
    alpha: 0.05
    assumed_sd: 1.70

  effect_sizes:
    main_effect_modifiability:
      description: "Modifiable (5.3) vs. Non-Modifiable (4.0)"
      delta: 1.30
      cohens_d: 0.76
      cohens_f: 0.38
      classification: "Large Effect"
    main_effect_disclosure:
      description: "Disclosed (4.65) vs. Undisclosed (4.65)"
      delta: 0.00
      cohens_d: 0.00
      classification: "Null Effect — disclosure aendert Mittelwert NICHT"
      note: |
        Disclosure hat keinen Haupteffekt auf den Mittelwert,
        aber einen INTERAKTIONSEFFEKT mit Modifiability.
    interaction_effect:
      description: "(Discl×Mod - Discl×NonMod) - (Undisc×Mod - Undisc×NonMod)"
      delta: 1.20
      explanation: "(5.6-3.7) - (5.0-4.3) = 1.9 - 0.7 = 1.2"
      cohens_d_interaction: 0.35
      cohens_f_interaction: 0.175
      classification: "Small-to-Medium Effect"
      theoretical_meaning: |
        Modifiability hilft MEHR wenn AI disclosed ist.
        Bei Disclosure: Delta = 1.9 (Mod vs. NonMod)
        Bei Undisclosed: Delta = 0.7 (Mod vs. NonMod)
        → Disclosure VERSTAERKT den Modifiability-Effekt um 1.2 Punkte.

  power_calculations:

    mortgage_survey_N300:
      total_N: 300
      n_per_cell: 75
      power_main_modifiability:
        effect: "d = 0.76"
        lambda: 43.8
        power: "> 0.99"
        verdict: "UEBERDIMENSIONIERT — 99%+ Power"
      power_main_disclosure:
        effect: "d ≈ 0.00"
        power: "0.05 (= alpha, kein Effekt)"
        verdict: "Kein Haupteffekt erwartet — OK"
      power_interaction:
        effect: "f = 0.175"
        lambda: 9.19
        power: "0.86"
        verdict: "GUT — 86% Power fuer Interaktion"
      overall_verdict: |
        N=300 liefert ausreichend Power fuer alle relevanten Effekte:
        ✅ Haupteffekt Modifiability:  >99%
        ✅ Interaktion Discl × Mod:   86%
        ❌ Haupteffekt Disclosure:     Kein Effekt erwartet

    minimum_sample_sizes:
      for_main_modifiability:
        power_80: { n_per_cell: 28, total_N: 112 }
        power_90: { n_per_cell: 36, total_N: 144 }
        power_95: { n_per_cell: 46, total_N: 184 }
      for_interaction:
        power_80: { n_per_cell: 63, total_N: 252 }
        power_90: { n_per_cell: 85, total_N: 340 }
        power_95: { n_per_cell: 108, total_N: 432 }

    optimal_design:
      recommended_N: 340
      n_per_cell: 85
      rationale: |
        N=340 (85 pro Zelle) liefert:
        • >99% Power fuer Haupteffekt Modifiability
        • 90% Power fuer Interaktionseffekt
        • Genuegend Freiheitsgrade fuer Segment-Subanalysen
        • 4 Segmente × 4 Zellen = 16 Subgruppen mit ~21 pro Gruppe
      cost_benefit: |
        N=300 → 86% Power fuer Interaktion (akzeptabel)
        N=340 → 90% Power fuer Interaktion (empfohlen)
        N=430 → 95% Power fuer Interaktion (luxury)

        Delta N=300→340: +40 Befragte × ~CHF 30 = CHF 1'200 Mehrkosten
        → Fuer CHF 1'200 steigt die Interaktions-Power von 86% auf 90%.
        EMPFEHLUNG: N=340 (oder mindestens N=300).

    esim_survey_N200:
      total_N: 200
      note: "Kein 2×2 Design fuer eSIM — einfaches Pre/Post"
      power_for_brand_fit_difference:
        effect: "d = 0.50 (mit vs. ohne Framing)"
        n_per_group: 100
        power: "0.94"
        verdict: "AUSREICHEND"
      power_for_pilot_final_comparison:
        effect: "Nicht testbar im selben Survey (braucht echte Pilot-Daten)"
        verdict: "Kein Power-Problem — Psi wird NACH Pilot kalibriert"

  segment_subgroup_analysis:
    description: |
      Mit N=340 und 4 Segmenten (40/10/35/15%) ergeben sich:
    segment_sizes:
      tech_savvy: { share: "40%", n: 136, n_per_cell: 34, power_interaction: "0.48" }
      traditional_affluent: { share: "10%", n: 34, n_per_cell: 8.5, power_interaction: "0.12" }
      first_time_buyers: { share: "35%", n: 119, n_per_cell: 30, power_interaction: "0.42" }
      refinancers: { share: "15%", n: 51, n_per_cell: 13, power_interaction: "0.19" }
    recommendation: |
      ⚠️  Segment-Level Power ist NIEDRIG (unter 50% fuer alle Segmente).

      LOESUNG 1: Oversampling von Traditional Affluent (von 10% auf 20%)
      → Erhoet n auf 68, Power auf ~25% (immer noch niedrig)

      LOESUNG 2: Segments NICHT als 2×2 analysieren, sondern als Moderator
      → Interaktionsmodell: BI = β₀ + β₁×Mod + β₂×Segment + β₃×Mod×Segment
      → Braucht N=340 gesamt, nicht pro Segment

      LOESUNG 3: Segmente fuer primaere Analyse zusammenfassen:
      → AI-Affin (Tech-Savvy + Refinancers) vs. AI-Skeptisch (Affluent + FTB)
      → n_affin = 187, n_skeptisch = 153
      → Power fuer Moderatoranalyse: ~78%

      EMPFEHLUNG: Loesung 2 + 3 kombinieren.

