# =============================================================================
# MC: MONTE CARLO SIMULATION — 10'000 Draws fuer Key Metrics
# UBS Growth Marketing — Mortgage Custom GPT & Travel-eSIM
# =============================================================================
# Propagiert Parameter-Unsicherheit aus IMP und SIM durch die Modell-Gleichungen.
# Liefert Konfidenzintervalle, Tornado-Diagramme und Power-Analyse.
#
# Created: 2026-02-25
# Session: EBF-S-2026-02-25-FIN-001
# Depends on: SIM v1.1, IMP v1, A1-A3, B1-B3, G1-G4
# Method: Parametric Monte Carlo (10'000 Draws, Seed 42)
# =============================================================================

metadata:
  analysis_id: UBS-GMA-MC-001
  title: "Monte Carlo Simulation: Konfidenzintervalle fuer Key Metrics"
  type: monte_carlo
  phase: MC
  created: "2026-02-25"
  session_ref: "EBF-S-2026-02-25-FIN-001"
  depends_on:
    - SIM_model_based_survey_simulation.yaml
    - IMP_assumption_sharpening_v1.yaml
  n_draws: 10000
  seed: 42
  method: |
    Parametric Monte Carlo mit 10'000 Draws:
    1. Alle 27 unsicheren Parameter werden als Verteilungen definiert
    2. In jedem Draw wird ein Vektor aus allen Verteilungen gezogen
    3. Die Modell-Gleichungen werden mit dem gezogenen Vektor evaluiert
    4. Aus den 10'000 Ergebnis-Vektoren werden Perzentile, CIs und
       Sensitivitaets-Koeffizienten berechnet

