    die steigende Chatbot-Nutzung (91% der AI-Nutzer) zeigen Readiness.
    Für den Mortgage GPT bedeutet dies: Die INSTITUTIONELLE Seite ist bereit,
    aber die KONSUMENTENSEITE hinkt nach (nur ~19'500 Robo-Users).

