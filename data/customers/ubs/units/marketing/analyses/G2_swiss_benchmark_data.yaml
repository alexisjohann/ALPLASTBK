    Notwendigkeit, um den Marktanteilsverlust aufzuhalten.
    >33% der Hypothekarnehmer sind offen für Broker-Modelle → GPT als
    digitaler "Erst-Berater" kann diesen Trend für UBS nutzen.

# =============================================================================
# 5. SWISS CONSUMER TRUST IN AI
# =============================================================================

consumer_trust_ai:

  adoption_metrics:
    swiss_genai_daily_use: "45%"
    global_genai_daily_use: "38%"
    swiss_above_global: true
    source: "EY Decoding Digital Home 2025"

  concern_metrics:
    fear_data_misuse_ai: "58%"
    fear_government_not_limiting_ai: "59%"
    concern_ai_less_trustworthy_content: "61%"
    fear_ai_misuse_bad_actors: "66%"
    demand_clear_ai_labeling: "75%"
    source: "EY Switzerland 2025"

  financial_sector_institutional:
    financial_institutions_using_ai: "~50%"
    institutions_with_ai_strategy: "~50%"
    top_ai_risks: "Data quality, data protection, explainability"
    banks_unready_for_ai_regulation: "19%"
    swiss_execs_genai_roi_1yr: "52% (vs 38% global)"
    swiss_businesses_using_ai: "46% (up from 31%)"
    companies_ai_in_strategy: "65%"
    companies_measurable_ai_kpis: "13%"
    source: "FINMA 2024/25; Deloitte; CorpIn 2025"

  key_paradox:
    name: "Swiss AI Adoption-Trust Gap"
    description: |
      Swiss consumers adopt AI at rates ABOVE global averages (45% vs 38% daily),
      but simultaneously express HIGHER concerns about:
      - Data privacy (58%)
      - Regulatory gaps (59%)
      - Content trustworthiness (61%)
    implication_mortgage_gpt: |
      Die Schweizer NUTZEN KI, VERTRAUEN ihr aber nicht vollständig.
      → B1-Design-Empfehlungen sind KRITISCH:
        1. Transparenz (75% fordern klare AI-Kennzeichnung)
        2. Modifizierbarkeit (gibt Kontrolle zurück)
        3. Framing als "Rechner" nicht "Berater"
      → A2 Trust-Kaskade: Transparenz-Layer muss STARK sein (delta_AI = 0.72 mit Modification)
    implication_esim: |
      Für eSIM weniger relevant (kein AI-Aspekt), aber:
      - 58% sorgen sich um Datenmissbrauch → Privacy-Messaging wichtig
      - UBS Brand Trust kann als "sicherer Hafen" positioniert werden
      - "Ihre Daten bleiben bei Ihrer Bank" als USP

