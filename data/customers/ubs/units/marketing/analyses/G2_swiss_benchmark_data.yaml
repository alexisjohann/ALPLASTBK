    PARADOX: Schweiz hat hohe Online-Banking-Nutzung (73%) aber fällt im
    internationalen Digitalranking zurück (27. Platz, 0 Digital Champions).
    Das Digital-Fatigue-Signal bei 18-34 ist KRITISCH für den Mortgage GPT:
    Die digital-affinste Zielgruppe nutzt Banking-Apps WENIGER intensiv.
    → GPT muss MEHRWERT liefern, nicht nur "digital sein".
    → B2 Habit-Bonus (+0.26) gilt nur für aktive App-Nutzer.

