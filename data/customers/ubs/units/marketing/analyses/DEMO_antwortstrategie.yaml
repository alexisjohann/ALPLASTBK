session_ablauf:

  block_1_intro:
    dauer: "10 min"
    inhalt: "Was ist BEATRIX? Wie denkt das Modell?"
    key_slide: |
      Nicht: "BEATRIX ist ein AI-Framework"
      Sondern: "BEATRIX strukturiert Entscheidungen so, wie es kein Mensch
      alleine kann — weil es 2'400 Papers, 850 Cases und 150 Theorien
      gleichzeitig im Blick hat."
    enden_mit: "Lassen Sie uns das an Ihrem konkreten Problem zeigen."

  block_2_mortgage_demo:
    dauer: "25 min"
    inhalt: "Mortgage GPT Analyse live durchgehen"
    struktur:
      - "Q: 'Werden Kund:innen das nutzen?' → 🟢 Belastbar (2 min)"
      - "Q: 'Was passiert bei Fehlern?' → 🟢 Belastbar (2 min)"
      - "Q: 'Wie viel Revenue?' → 🟡 Indikativ (3 min) → Tornado live"
      - "Q: 'Welche Segmente?' → 🟡 Indikativ (3 min) → 4 Balken"
      - "Q: 'CS-Migrierte?' → 🔴 Explorativ (2 min) → Ehrliche Luecke"
      - "POWER MOVE: Live-Recalculation mit UBS-Input (5 min)"
      - "NARRATIV N2: Die 3 Hebel zeigen (3 min)"
    enden_mit: "Das waren Mortgage-Ergebnisse. Jetzt eSIM — da sieht es anders aus."

  block_3_esim_demo:
    dauer: "15 min"
    inhalt: "eSIM-Analyse — bewusst 🔴 dominant"
    struktur:
      - "Q: 'Wie gross ist der Markt?' → 🟢 Belastbar (2 min) → 63K Ueberraschung"
      - "Q: 'Passt eSIM zur Marke?' → 🟡 Indikativ (2 min)"
      - "Q: 'Wird es adoptiert?' → 🔴 Explorativ (3 min)"
      - "NARRATIV N1: Transparente Unsicherheit (3 min)"
      - "EMPFEHLUNG: Soft-Launch statt Blind-Launch (3 min)"
    enden_mit: "Sehen Sie den Kontrast? Mortgage: investierbar. eSIM: erst testen."

  block_4_methode:
    dauer: "10 min"
    inhalt: "Wie BEATRIX fuer UBS arbeiten wuerde"
    struktur:
