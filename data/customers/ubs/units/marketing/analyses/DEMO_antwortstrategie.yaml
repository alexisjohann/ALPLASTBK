# =============================================================================
# DEMO STRATEGIE: UBS Growth Marketing — Vorführsession BEATRIX/EBF
# =============================================================================
# Wie wir die Analysen prasentieren, OHNE von Ergebnissen abhaengig zu sein.
#
# KERNPRINZIP: Wir zeigen die DENKMASCHINE, nicht die Zahlen.
#              Die Zahlen illustrieren, was die Maschine kann.
#              Die Maschine ist das Produkt.
#
# Created: 2026-02-25
# Session: EBF-S-2026-02-25-FIN-001
# =============================================================================

metadata:
  analysis_id: UBS-GMA-DEMO-001
  title: "Antwortstrategie fuer UBS Vorfuehrsession"
  type: presentation_strategy
  phase: DEMO
  created: "2026-02-25"
  audience: "UBS Marketing Leadership"
  session_goal: "Zeigen was BEATRIX kann — nicht was die Ergebnisse sagen"

# =============================================================================
# TEIL 1: DIE DREI PRASENTATIONS-MODI
# =============================================================================
# Jede Frage im Demo wird in einem von drei Modi beantwortet.
# Der Modus haengt von der DATENQUALITAET ab, nicht von der Frage selbst.

antwort_modi:

  modus_A_belastbar:
    name: "BELASTBAR — Ergebnis + Methode"
    icon: "🟢"
    wann: |
      Parameter-Basis ist stark genug fuer eine Aussage:
      - Mindestens 2 Tier-1 Papers oder 3 Tier-2 Papers stuetzen den Wert
      - 68% CI ist eng genug fuer eine klare Richtungsaussage
      - Sensitivitaetsanalyse zeigt Robustheit (Ergebnis kippt nicht bei ±1 SD)
    wie_praesentieren: |
      1. ERGEBNIS nennen: "Unsere Modellierung zeigt X"
      2. KONFIDENZ angeben: "Mit 95% Konfidenz liegt der Wert zwischen Y und Z"
      3. METHODE erklaeren: "Das basiert auf [Papers], kalibriert mit [Daten]"
      4. TREIBER zeigen: "Der staerkste Hebel ist Parameter P (erklaert X% der Varianz)"
      5. LIMITATION benennen: "Was das NICHT sagt: ..."
    beispiele:
      - frage: "Werden Kund:innen den Mortgage GPT nutzen?"
        antwort_kern: |
          JA — Grand Mean 4.65/7, P(Scheitern) = 2%.
          Aber NUR mit Modifizierbarkeit: Ohne sinkt Akzeptanz auf 3.7/7.
        evidenz_staerke: |
          Tier 1: Dietvorst 2015 (N=402), Dietvorst 2018 (3× repliziert),
          Silber 2025 (N=4,500, meta-analytisch).
          → Modifiability-Effekt ist einer der best-replizierten Befunde in
          der Algorithm Aversion Literatur.
        was_wir_NICHT_wissen: |
          Wie gross der Effekt bei Hypotheken GENAU ist (Lab-Studien nutzten
          einfachere Vorhersageaufgaben). Die Richtung ist sicher, die
          Effektstaerke muss UBS-spezifisch kalibriert werden.

      - frage: "Ist Error Recovery kritisch?"
        antwort_kern: |
          JA — ein einziger GPT-Fehler senkt Trust um 40% (4.95 → 2.97).
          72% Risiko unter der roten Schwelle.
        evidenz_staerke: |
          Dietvorst 2015: "Seeing the algorithm err" → starke Ablehnung.
          Trust Dynamics 2025: Asymmetrische Recovery (langsam aufbauen,
          schnell zerstoeren). Repliziert ueber mehrere Domaenen.
        was_wir_NICHT_wissen: |
          Recovery-Geschwindigkeit bei Hypotheken spezifisch. Die 40% stammen
          aus allgemeinen AI-Trust Studien — bei High-Stakes (CHF 750K) koennte
          der Effekt STAERKER sein.

  modus_B_indikativ:
    name: "INDIKATIV — Richtung + Methode"
    icon: "🟡"
    wann: |
      Wir koennen eine Richtung angeben, aber nicht die genaue Groesse:
      - Mix aus Tier-1/2 und Tier-3 Parametern
      - 68% CI ist breit, aber Vorzeichen ist stabil
      - Sensitivitaet zeigt: Richtung kippt nicht, aber Groesse variiert stark
    wie_praesentieren: |
      1. RICHTUNG nennen: "Unsere Modellierung deutet auf X hin"
      2. RANGE angeben: "Der Wert liegt wahrscheinlich zwischen Y und Z"
      3. METHODE erklaeren: "Wir haben das SO modelliert: [Ansatz]"
      4. UNSICHERHEIT transparent machen: "Der groesste Unsicherheitsfaktor ist P"
      5. SCHAERFUNG vorschlagen: "Mit UBS-Daten D koennte man das um X% praezisieren"
    beispiele:
      - frage: "Wie viel Revenue generiert der Mortgage GPT?"
        antwort_kern: |
          Unsere Modellierung deutet auf einen Median von CHF 1.47 Mrd
          Neuvolumen pro Jahr hin — aber die Bandbreite ist gross:
          95% CI [0.55, 3.45 Mrd].
        was_das_zeigt: |
          Nicht den genauen Revenue, sondern WO die Unsicherheit sitzt:
          → 38% der Varianz kommt von monthly_leads (UBS-Chatbot Traffic)
          → 22% von lead_to_appointment (Conversion-Rate)
          Diese zwei Zahlen hat UBS — und damit verengt sich das CI um ~40%.
        was_wir_NICHT_wissen: |
          Die absoluten Zahlen. Monthly Leads (2'000) und Conversion Rates
          sind Branchenschaetzungen, keine UBS-Daten. Die RELATIVE Struktur
          (welche Hebel am staerksten wirken) ist belastbar.
        demo_value: |
          "Wir koennen Ihnen heute nicht sagen, ob es 0.5 oder 3 Mrd sind.
          Aber wir koennen Ihnen sagen: Wenn Sie uns Ihre Chatbot-Nutzungszahlen
          geben, koennen wir das in 48 Stunden auf ±20% eingrenzen.
          DAS ist der Wert des Modells — es weiss, welche Daten es braucht."

      - frage: "Wie gross sind die Segmente?"
        antwort_kern: |
          Vier Segmente mit unterschiedlicher GPT-Akzeptanz:
          Tech-Savvy (5.4/7), Digital Mainstream (4.8), Affluent (2.9),
          Skeptics (3.3). Spread: 2.5 Punkte.
        was_das_zeigt: |
          Eine Ein-Groesse-fuer-alle-Strategie funktioniert nicht.
          Die EXISTENZ der Segmente ist robust (basiert auf Algorithm Aversion
          Literatur). Die GROESSEN sind geschaetzt.
        was_wir_NICHT_wissen: |
          Segment-Anteile bei UBS. Wir schaetzen 30/25/20/25%.
          Mit UBS CRM-Daten waere das praezise bestimmbar.

  modus_C_exploratv:
    name: "EXPLORATIV — Methode + Fragen"
    icon: "🔴"
    wann: |
      Die Datenbasis ist zu duenn fuer eine Richtungsaussage:
      - Ueberwiegend Tier-3/4 Parameter (LLMMC, Expert Elicitation)
      - 95% CI schliesst sowohl "Erfolg" als auch "Misserfolg" ein
      - Sensitivitaet zeigt: Ergebnis kippt bei realistischen Parametervariationen
    wie_praesentieren: |
      1. FRAGE formulieren: "Die entscheidende Frage ist X"
      2. MODELL zeigen: "Wir haben das SO strukturiert: [Framework]"
      3. SZENARIEN aufspannen: "Unter Annahme A passiert X, unter Annahme B passiert Y"
      4. DATEN-BEDARF benennen: "Um das zu beantworten, brauchen wir D"
      5. DESIGN vorschlagen: "Wir empfehlen Experiment E, um D zu messen"
    beispiele:
      - frage: "Wird der eSIM-Service erfolgreich?"
        antwort_kern: |
          Das koennen wir heute NICHT belastbar beantworten.
          Aber wir koennen zeigen, WARUM es unsicher ist und WAS man
          tun muesste, um es zu klaeren.
        was_das_zeigt: |
          Die Psi-Transformation (Pilot → Final) erklaert 71% der Varianz.
          Dieser Parameter hat keine empirische Basis fuer UBS.
          OHNE diesen Wert ist jede Prognose Spekulation.
        was_wir_konkret_zeigen: |
          1. SZENARIO-ANALYSE: Wenn psi=1.6 → eSIM scheitert (3.35/7).
             Wenn psi=3.4 → eSIM gelingt (6.69/7). Riesiger Spread.
          2. STRUKTURELLES RISIKO: Brand Fit Score 4.1/7 = Gelbe Zone.
             Ohne Enhancement scheitert das Produkt unabhaengig von psi.
          3. DATEN-EMPFEHLUNG: Ein 4-Wochen Soft-Launch mit 5'000 Kund:innen
             wuerde psi empirisch bestimmen und die Prognose ermoeglichen.
        demo_value: |
          "Das Modell sagt Ihnen hier NICHT 'Ja machen' oder 'Nein lassen'.
          Es sagt Ihnen: 'Bevor Sie CHF 2M investieren, investieren Sie
          CHF 50K in einen Soft-Launch — und dann sagt Ihnen das Modell
          mit 95% Konfidenz ob es sich lohnt.' DAS ist informierte Entscheidung."

# =============================================================================
# TEIL 2: PRASENTATIONS-ZUORDNUNG ALLER ANALYSEN
# =============================================================================
# Jede unserer Analysen/Fragen wird einem Modus zugeordnet.

zuordnung_pro_frage:

  mortgage_gpt:
    - frage: "Werden Kund:innen den GPT nutzen?"
      modus: A_belastbar
      grund: "3× replizierter Modifiability-Effekt, meta-analytische Evidenz"
      key_message: "GO mit 98% Konfidenz — ABER nur mit Modifizierbarkeit"

    - frage: "Was passiert bei einem GPT-Fehler?"
      modus: A_belastbar
      grund: "Dietvorst 2015 + Trust Dynamics 2025, konsistente Replikation"
      key_message: "40% Trust-Verlust. Error Prevention = Prioritaet #1"

    - frage: "Soll UBS die KI offenlegen?"
      modus: A_belastbar
      grund: "FINMA 08/2024 = regulatorisch PFLICHT + Forschung zeigt: kein Nachteil"
      key_message: "Keine Wahl — FINMA verlangt es. Gute Nachricht: Framing neutralisiert"

    - frage: "Welches Framing funktioniert?"
      modus: B_indikativ
      grund: "Castelo 2019 + Logg 2019 geben Richtung, aber kein Hypotheken-Experiment"
      key_message: "'Intelligenter Zinsrechner' > 'KI-Berater'. Richtung klar, Effektstaerke offen"

    - frage: "Wie viel Revenue?"
      modus: B_indikativ
      grund: "Multiplikative Kette mit Tier-3 Inputs (monthly_leads)"
      key_message: "Median CHF 1.47 Mrd, aber CI breit. UBS-Traffic-Daten wuerden CI halbieren"

    - frage: "Wie reagieren CS-Migrierte?"
      modus: C_explorativ
      grund: "tau_brand_CS ist LLMMC ohne empirische UBS-Daten"
      key_message: "Wir vermuten 1.7 Punkte weniger Trust — aber brauchen NPS-Daten"

    - frage: "Wie personalisiert muss es sein?"
      modus: C_explorativ
      grund: "Customization-Effekt bei Hypotheken nicht empirisch untersucht"
      key_message: "Modell zeigt: liegt unter Mittelpunkt (3.9/7). Spezifisches Experiment noetig"

  esim:
    - frage: "Passt eSIM zur UBS-Marke?"
      modus: B_indikativ
      grund: "Brand Extension Literatur + Monga/John 2010, aber kein UBS-spezifischer Test"
      key_message: "Brand Fit 4.1/7 = Gelbe Zone. Enhancement-Strategie noetig"

    - frage: "Wie gross ist der Markt?"
      modus: A_belastbar
      grund: "GSMA, Juniper, Mobilise, Holafly — gut dokumentierter Markt"
      key_message: "~63'000 Nutzer/Jahr (nicht 200K). Low-Margin Geschaeft. Fakten."

    - frage: "Wird der eSIM-Service adoptiert?"
      modus: C_explorativ
      grund: "Psi-Transformation dominiert (71% Varianz), kein UBS-Benchmark"
      key_message: "KANN NICHT beantwortet werden ohne Pilot-Daten"

    - frage: "Wie soll UBS den Launch strukturieren?"
      modus: B_indikativ
      grund: "Travel-Ecosystem Framing hat theoretische Basis, aber kein Test"
      key_message: "Co-Branding + Travel-Framing + Non-EU-Fokus"

# =============================================================================
# TEIL 3: DIE 5 DEMO-NARRATIVE
# =============================================================================
# Fuenf Geschichten, die wir in der Demo erzaehlen koennen.
# Jede zeigt einen anderen Aspekt der BEATRIX-Staerke.

demo_narrative:

  N1_transparente_unsicherheit:
    titel: "Wir sagen Ihnen auch, was wir NICHT wissen"
    kernbotschaft: |
      Jede Beratung gibt Ihnen eine Empfehlung. BEATRIX gibt Ihnen eine
      Empfehlung UND sagt Ihnen, wie sicher sie ist — und was passieren
      muesste, damit sie sich aendert.
    illustration: |
      "Mortgage GPT: GO (98% Konfidenz). eSIM: Wir wissen es nicht (71%
      der Unsicherheit kommt von einem einzigen Parameter). Beide Aussagen
      sind ehrlich — und beide sind nützlich. Die erste sagt: Investieren.
      Die zweite sagt: Erst testen, dann investieren."
    ubs_value: |
      Keine Beratung der Welt kann Ihnen mit 100% Sicherheit sagen ob ein
      Produkt funktioniert. Aber BEATRIX kann Ihnen sagen, WO die Unsicherheit
      sitzt und WAS Sie tun koennen, um sie zu reduzieren. Das spart Ihnen
      Millionen, die Sie sonst in blinde Launches investieren wuerden.
    demo_moment: |
      ZEIGEN: Monte Carlo CI fuer Mortgage (eng) vs. eSIM (breit).
      ERKLAEREN: "Sehen Sie den Unterschied? Mortgage ist investierbar.
      eSIM braucht einen CHF 50K Soft-Launch bevor Sie CHF 2M committen."

  N2_die_hebel_kennen:
    titel: "Wir zeigen Ihnen die 3 Hebel, die 80% des Erfolgs bestimmen"
    kernbotschaft: |
      BEATRIX identifiziert nicht nur OB etwas funktioniert, sondern
      WARUM — und damit auch, was Sie aendern koennen.
    illustration: |
      "Mortgage GPT haengt zu 80% von drei Faktoren ab:
      1. Modifizierbarkeit (3× repliziert, klar)
      2. Error Prevention (starke Evidenz, klar)
      3. Monthly Leads (Ihr Chatbot-Traffic — kennen nur SIE).

      Faktor 1 und 2 koennen wir Ihnen sagen.
      Faktor 3 muessen SIE uns sagen.
      Dann haben wir zusammen die Antwort."
    ubs_value: |
      Sie wissen danach genau, wo Sie investieren muessen (Error Prevention)
      und wo nicht (z.B. Disclosure-Format — macht kaum Unterschied).
    demo_moment: |
      ZEIGEN: Tornado-Diagramm mit 3 grossen Balken.
      ERKLAEREN: "Die oberen drei Balken — das sind Ihre Hebel.
      Alles darunter ist Feintuning."

  N3_segment_statt_durchschnitt:
    titel: "Der Durchschnitt ist eine Luege"
    kernbotschaft: |
      Grand Mean 4.65/7 sagt nichts. Tech-Savvy sind bei 5.4,
      Affluent Traditionalists bei 2.9. Derselbe GPT, voellig
      andere Reaktion. BEATRIX zeigt das — weil das Modell
      Segmente modelliert, nicht Durchschnitte.
    illustration: |
      "Stellen Sie sich vor, Sie launchen den GPT fuer alle 3.5 Mio
      Kund:innen gleich. Result: Tech-Savvy lieben es, Affluent
      Traditionalists finden es respektlos, CS-Migrierte misstrauen.
      Ein Launch, drei Reaktionen. Durchschnitts-Feedback: 'geht so'.
      Wahrheit: Bei 30% funktioniert es glaenzend, bei 20% backfired es."
    ubs_value: |
      Segment-adaptive Launches kosten nicht mehr, vermeiden aber
      Reputationsschaeden bei Ihren wertvollsten Kund:innen.
    demo_moment: |
      ZEIGEN: 4 Segment-Balken nebeneinander (5.4, 4.8, 2.9, 3.3).
      FRAGEN: "Wuerden Sie fuer alle vier dasselbe Produkt launchen?"

  N4_daten_priorisierung:
    titel: "Nicht alle Daten sind gleich wichtig"
    kernbotschaft: |
      BEATRIX sagt Ihnen nicht nur 'wir brauchen mehr Daten', sondern
      WELCHE Daten den groessten Informationsgewinn haben — und quantifiziert das.
    illustration: |
      "Sie koennten 20 verschiedene Datenpunkte erheben. Unser Modell
      sagt: EINER davon (Monthly Chatbot Traffic) verengt die Revenue-
      Prognose um 40%. Ein anderer (eSIM-Awareness) veraendert fast nichts.
      Wir zeigen Ihnen, wo jeder Franken Forschungsbudget den groessten
      Return hat."
    ubs_value: |
      Kein verschwendetes Forschungsbudget. Statt 'umfassende Marktforschung'
      (CHF 200K) machen Sie gezielte Datenbeschaffung (CHF 16K) und
      wissen danach MEHR.
    demo_moment: |
      ZEIGEN: Priorisierte Datenliste mit Impact-Quantifizierung.
      FRAGEN: "Wenn Sie uns EINE Zahl geben koennten — welche waere es?
      [Pause] Unser Modell hat die Antwort: Monthly Leads."

  N5_bayesian_update:
    titel: "Das Modell lernt mit Ihren Daten"
    kernbotschaft: |
      Die heutigen Ergebnisse sind der STARTPUNKT. Mit jedem UBS-Datenpunkt
      werden die Prognosen praeziser. BEATRIX ist nicht statisch — es ist
      ein lernendes System.
    illustration: |
      "Heute: Revenue CI [0.55, 3.45 Mrd] — Faktor 6×.
      Nach UBS-Traffic-Daten: CI [0.9, 2.2 Mrd] — Faktor 2.4×.
      Nach Pilot (N=500): CI [1.1, 1.8 Mrd] — Faktor 1.6×.
      Nach Full Launch (3 Monate): CI [1.25, 1.65 Mrd] — Faktor 1.3×.

      Jeder Schritt halbiert die Unsicherheit."
    ubs_value: |
      Sie investieren nie mehr, als die aktuelle Unsicherheit rechtfertigt.
      Kleine Investition → Daten → Modell-Update → informierte grosse Investition.
    demo_moment: |
      ZEIGEN: 4 CIs uebereinander, die immer enger werden.
      ERKLAEREN: "So sieht informierte Entscheidungsfindung aus.
      Kein Bauchgefuehl, kein Sprung ins Ungewisse."

# =============================================================================
# TEIL 4: ANTWORT-TEMPLATE FUER JEDE FRAGE
# =============================================================================
# Dieses Template strukturiert jede Antwort in der Demo.

antwort_template:

  schritt_1_einordnung:
    was: "Modus deklarieren"
    format: |
      [🟢/🟡/🔴] Diese Frage koennen wir [belastbar/indikativ/explorativ]
      beantworten — hier ist warum:
    dauer: "30 Sekunden"
    zweck: "Sofortige Transparenz. UBS weiss, wie die Antwort einzuordnen ist."

  schritt_2_modell:
    was: "Wie wir rangegangen sind"
    format: |
      Unser Modell arbeitet so:
      • Welche FAKTOREN beeinflussen das? [3-5 Faktoren nennen]
      • Wie INTERAGIEREN sie? [Additiv? Multiplikativ? Veto-Logik?]
      • Welche THEORIE steht dahinter? [1-2 Papers/Autoren]
    dauer: "2-3 Minuten"
    zweck: |
      DAS ist das Herzstück. UBS soll denken:
      "So strukturiert hat noch nie jemand ueber unser Problem nachgedacht."

  schritt_3_parameter:
    was: "Worauf die Zahlen basieren"
    format: |
      Die Parameter kommen aus:
      • [Tier 1]: Replizierte Studien (N=..., Autor Jahr)
      • [Tier 2]: Einzel-Studien, Industry Data
      • [Tier 3]: Kalibrierte Schaetzungen (LLMMC)

      Am unsichersten: [Parameter X] — mit UBS-Daten D schaerfbar.
    dauer: "1-2 Minuten"
    zweck: "Zeigt wissenschaftliche Rigorosität ohne arrogant zu wirken."

  schritt_4_ergebnis:
    was: "Was das Modell sagt"
    format_A: |
      [🟢 BELASTBAR]
      Ergebnis: X (95% CI: [Y, Z])
      Das heisst konkret: [Business-Implikation]
      Was das NICHT heisst: [Limitation]
    format_B: |
      [🟡 INDIKATIV]
      Richtung: X (aber Bandbreite [Y, Z])
      Der groesste Unsicherheitsfaktor ist: [Parameter]
      Mit UBS-Daten D wuerde das CI um ~X% enger.
    format_C: |
      [🔴 EXPLORATIV]
      Wir koennen das heute nicht belastbar beantworten.
      Aber: Szenario A → X, Szenario B → Y.
      Empfehlung: [Daten/Experiment] wuerde die Frage klaeren.
    dauer: "2-3 Minuten"
    zweck: "Ergebnis mit eingebauter Ehrlichkeit."

  schritt_5_naechster_schritt:
    was: "Was UBS tun kann"
    format: |
      Um das zu praezisieren:
      • [Aktion 1]: Daten X liefern → CI verengt sich um Y%
      • [Aktion 2]: Experiment Z durchfuehren → Frage wird belastbar
      • [Timeline]: In X Wochen haben wir die Antwort.
    dauer: "1 Minute"
    zweck: "Immer mit konkretem naechstem Schritt enden. Nie im Ungefaehren haengen."

# =============================================================================
# TEIL 5: DO's UND DONT's FUER DIE DEMO
# =============================================================================

dos:
  - regel: "IMMER die Ampel zeigen (🟢🟡🔴)"
    grund: "UBS soll sofort wissen, wie belastbar eine Aussage ist"

  - regel: "IMMER erklaeren WIE wir rangegangen sind"
    grund: "Die Methode ist das Produkt, nicht das Ergebnis"

  - regel: "IMMER den groessten Unsicherheitstreiber benennen"
    grund: "Zeigt dass wir wissen, was wir nicht wissen"

  - regel: "IMMER mit konkretem naechstem Schritt enden"
    grund: "UBS soll nie denken 'interessant, aber was jetzt?'"

  - regel: "IMMER Szenarien statt Punktschaetzungen bei 🟡/🔴"
    grund: "Ranges sind ehrlicher und nuetzlicher als falsche Praezision"

  - regel: "BEI JEDER Zahl die Quelle nennen koennen"
    grund: "Falls UBS fragt 'woher kommt die 0.42?' muss die Antwort sofort da sein"

  - regel: "Eigene Unsicherheit als FEATURE verkaufen, nicht als Bug"
    grund: |
      'Wir wissen es nicht' + 'hier ist wie wir es rausfinden koennen'
      ist staerker als 'wir wissen es' + [liegt daneben]

donts:
  - regel: "NIEMALS eine Punktschaetzung als 'die Antwort' praesentieren"
    grund: "CHF 1.47 Mrd ohne CI ist irreführend. IMMER Range dazu."

  - regel: "NIEMALS 🔴-Ergebnisse als Handlungsempfehlung formulieren"
    grund: "Explorativ heisst: wir zeigen Szenarien, keine Empfehlungen"

  - regel: "NIEMALS sagen 'das Modell sagt' ohne 'basierend auf'"
    grund: "Modell-Output ohne Provenance ist wertlos — das ist GPT-Niveau"

  - regel: "NIEMALS UBS-interne Zahlen raten"
    grund: |
      Monthly Leads, Segment-Groessen, NPS — das sind UBS-Daten.
      Wir schaetzen sie transparent als Platzhalter und flaggen sie.

  - regel: "NIEMALS Ergebnisse verteidigen, die UBS anzweifelt"
    grund: |
      Richtige Reaktion: "Guter Punkt. Welchen Wert wuerden Sie fuer
      Parameter X ansetzen? Wir rechnen das Modell in 5 Minuten neu durch."
      → Zeigt Flexibilitaet der Maschine.

  - regel: "NIEMALS 'Bauchgefuehl' vs 'unser Modell' framen"
    grund: |
      UBS-Manager haben valides Domainwissen. Das Modell INTEGRIERT ihr
      Wissen, es ersetzt es nicht. Framing: "Ihr Wissen + unsere Struktur = bessere Entscheidungen."

# =============================================================================
# TEIL 6: POWER-MOVES FUER DIE DEMO
# =============================================================================
# Momente, in denen BEATRIX besonderen Eindruck macht.

power_moves:

  PM1_live_recalculation:
    moment: "UBS nennt einen eigenen Wert fuer einen Parameter"
    reaktion: |
      "Sie sagen, Monthly Leads sind eher 3'500? Moment..."
      [Modell mit neuem Wert durchrechnen]
      "Mit 3'500 statt 2'000: Revenue steigt auf CHF 2.6 Mrd (Median).
      Sehen Sie, wie das CI enger wird? DAS passiert wenn echte Daten reinkommen."
    wirkung: "UBS erlebt live, dass das Modell REAGIERT — nicht statisch ist"

  PM2_kontrafaktisch:
    moment: "UBS fragt 'was waere wenn wir X machen?'"
    reaktion: |
      Szenario sofort modellieren:
      "Was wenn kein Error Recovery? → Trust sinkt auf 2.1, 94% unter Rot.
      Was wenn perfektes Error Recovery? → Trust bleibt bei 4.2, 15% unter Rot.
      Die Wahrheit liegt dazwischen — und genau dort designen wir das Produkt."
    wirkung: "UBS sieht: Das Modell beantwortet IHRE Fragen, nicht unsere"

  PM3_ueberraschungsfund:
    moment: "Etwas zeigen, das UBS nicht erwartet hat"
    kandidaten:
      - "eSIM addressable market ist nur 63K (nicht 200K) — die Zahlen zeigen warum"
      - "CS-Migrierte brauchen einen ANDEREN Launch als Stamm-UBS-Kund:innen"
      - "Personalisierung liegt unter dem Mittelpunkt — Uniqueness Neglect Risiko"
      - "EU-Reisende brauchen kein eSIM (Free Roaming) — nur Non-EU ist relevant"
    wirkung: "UBS denkt: 'Das haetten wir ohne BEATRIX nicht gesehen'"

  PM4_ehrliche_luecke:
    moment: "Bewusst eine Schwaeche zeigen"
    reaktion: |
      "Hier ist etwas, das wir NICHT beantworten koennen: Wie reagieren
      Ihre 800K CS-migrierten Kund:innen? Unser LLMMC-Prior sagt -1.7 Punkte
      Trust. Aber das ist eine Schaetzung, kein Fakt. Wir empfehlen: Messen
      Sie NPS vor/nach Migration — dann haben wir in 2 Wochen die Antwort."
    wirkung: |
      Paradoxerweise STAERKT das die Glaubwuerdigkeit.
      "Die sagen auch, was sie nicht wissen" > "Die tun so als wuessten sie alles"

