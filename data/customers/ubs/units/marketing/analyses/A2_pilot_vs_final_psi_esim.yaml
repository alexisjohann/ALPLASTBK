# ANALYSE A2: PILOT VS. FINAL — Ψ-KONTEXT-DIFFERENZ — UBS TRAVEL-eSIM
# =============================================================================
# Superkey: ANA-UBS-GM-A2-ESIM-PSI
# Created: 2026-02-25
# Purpose: Quantifizierung der Kontext-Differenz zwischen Pilot (Landing Page)
#          und Final (App-integriert), um Survey-Ergebnisse korrekt zu
#          interpretieren und zu transformieren.
