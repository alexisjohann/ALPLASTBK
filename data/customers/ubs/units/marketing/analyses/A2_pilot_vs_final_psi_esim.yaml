metadata:
  id: "ANA-UBS-GM-A2-ESIM-PSI"
  name: "Pilot vs. Final Ψ-Transformation: UBS Travel-eSIM"
  version: "1.0.0"
  created: "2026-02-25"
  customer: "UBS"
  unit: "Marketing / Growth Marketing"
  topic: "UBS Travel-eSIM — Context Difference Analysis"
  analyst: "FehrAdvice EBF"

# =============================================================================
# 1. DAS KERNPROBLEM: PILOT ≠ FINAL
# =============================================================================
# Die Pilot-Phase nutzt eine SEPARATE LANDING PAGE bei einem Drittanbieter.
# Die finale Version wird in die UBS Mobile Banking App integriert.
#
# Das bedeutet: Der KONTEXT (Ψ) ist FUNDAMENTAL ANDERS.
# Survey-Ergebnisse aus der Pilot-Phase können NICHT 1:1 auf die
# finale Version übertragen werden — sie müssen transformiert werden.
#
# Dies ist ein klassischer PCT-Anwendungsfall:
# θ_final = θ_pilot × ∏ᵢ M(ΔΨᵢ)
# =============================================================================

core_problem:
  statement: |
    Die Pilot-Phase (Landing Page bei Drittanbieter) und die finale Version
    (in UBS App integriert) unterscheiden sich in ALLEN 8 Ψ-Dimensionen.

    Pilot-Ergebnisse werden systematisch PESSIMISTISCHER ausfallen, weil:
    1. Kein UBS-Trust-Frame (τ_channel drastisch niedriger)
    2. Zusätzliche Friction (externe Seite, kein Login)
    3. Kein Bundle-Kontext (isoliertes Produkt statt Reise-Ökosystem)
    4. Keine Personalisierung (anonymer Besucher)
    5. Keine In-App-Trigger (kein Push vor Reise)

    OHNE Ψ-Transformation wird UBS die finale Version UNTERSCHÄTZEN
    und möglicherweise ein vielversprechendes Produkt vorzeitig einstellen.

  analogy: |
    Es ist, als würde man einen Ferrari testen, indem man ihn auf einem
    unbefestigten Feldweg fährt — und dann schlussfolgert, er sei langsam.

# =============================================================================
# 2. Ψ-PROFIL: PILOT (ANCHOR CONTEXT)
# =============================================================================

psi_pilot:
  name: "Pilot: Separate Landing Page bei Drittanbieter"
  description: |
    Kund:innen werden per Link (aus UBS App oder E-Mail) auf eine
    externe Landing Page geleitet, wo sie eine eSIM kaufen können.
    Kein UBS-Login, minimales UBS-Branding, separate Bezahlung.

  dimensions:

    Psi_I:
      name: "Institutional Context"
      value: 0.30
      label: "third_party_unbranded"
      description: |
        Externe Website mit minimalem UBS-Bezug. Nutzer:innen sehen
        den Drittanbieter-Brand, nicht UBS. Keine FINMA-regulierte
        Umgebung. Kein Banking-Grade Security-Signal.
      modifiers:
        trust_frame: "absent"
        regulatory_perception: "unregulated"
        brand_cues: "minimal"

    Psi_S:
      name: "Social Context"
      value: 0.20
      label: "anonymous_unknown"
      description: |
        Anonyme Interaktion. Kein Login = keine Personalisierung.
        Kein Kontext zu bestehender Kundenbeziehung. Nutzer:in ist
        «irgendwer auf einer eSIM-Website».
      modifiers:
        personalization: "none"
        relationship_cues: "absent"
        peer_effects: "none"

    Psi_C:
      name: "Cognitive Context"
      value: 0.40
      label: "skeptical_evaluative"
      description: |
        Nutzer:innen sind in evaluativem Modus: «Soll ich hier
        wirklich kaufen?» Hohe kognitive Belastung durch unbekannte
        Umgebung, neue Entscheidung (eSIM), unbekannter Anbieter.
      modifiers:
        cognitive_load: "high"
        decision_mode: "system_2_skeptical"
        familiarity: "low"

    Psi_K:
      name: "Cultural Context"
      value: 0.35
      label: "category_incongruent"
      description: |
        Kulturelle Erwartung: eSIM ≠ Bank. Die separate Landing Page
        verstärkt die Category-Inkongruenz maximal, weil kein
        Banking-Kontext sichtbar ist.
      modifiers:
        category_fit_perception: "low"
        cultural_expectation: "telco_not_bank"

    Psi_E:
      name: "Economic/Resource Context"
      value: 0.45
      label: "unknown_pricing"
      description: |
        Preise auf der Landing Page ohne UBS-Kontext. Keine
        Vergleichsmöglichkeit mit bestehenden Konditionen.
        Separate Zahlungsmethode nötig (nicht über UBS-Konto).
      modifiers:
        payment_friction: "high"
        price_reference: "external"
        perceived_value: "uncertain"

    Psi_T:
      name: "Temporal Context"
      value: 0.45
      label: "ad_hoc_no_trigger"
      description: |
        Kein automatischer Trigger. Nutzer:innen müssen SELBST
        an eSIM denken oder manuell auf den Link klicken.
        Kein Push vor Reise, kein kontextueller Moment.
      modifiers:
        trigger_mechanism: "manual"
        timing_relevance: "variable"
        urgency: "low"

    Psi_M:
      name: "Material/Tool Context"
      value: 0.35
      label: "external_website"
      description: |
        Separate Website (nicht UBS App). Browser-basiert,
        keine App-spezifischen Features (Push, Biometrie,
        In-App-Purchase). Möglicherweise nicht Mobile-optimiert.
      modifiers:
        platform: "browser"
        ux_quality: "unknown"
        integration_level: "none"

    Psi_F:
      name: "Physical/Spatial Context"
      value: 0.40
      label: "digital_anonymous"
      description: |
        Rein digital, aber ausserhalb des vertrauten UBS-Ökosystems.
        Kein «Home-Feeling» der Banking-App.
      modifiers:
        environment: "unfamiliar_digital"
        comfort_level: "low"

  psi_vector_pilot: [0.30, 0.20, 0.40, 0.35, 0.45, 0.45, 0.35, 0.40]
  psi_mean_pilot: 0.363

# =============================================================================
# 3. Ψ-PROFIL: FINAL (TARGET CONTEXT)
# =============================================================================

psi_final:
  name: "Final: In UBS Mobile Banking App integriert"
  description: |
    eSIM vollständig in die UBS Mobile Banking App integriert.
    Kund:innen sehen das Angebot im Reise-Bereich der App.
    Login-basiert, personalisiert, UBS-Branding, In-App-Purchase.

  dimensions:

    Psi_I:
      name: "Institutional Context"
      value: 0.85
      label: "institutional_authenticated"
      description: |
        Innerhalb der UBS Banking App = höchste institutionelle
        Einbettung. Banking-Grade Security, regulierte Umgebung,
        vollständiges UBS-Branding. Kund:in fühlt sich «bei UBS».
      modifiers:
        trust_frame: "strong"
        regulatory_perception: "FINMA_supervised"
        brand_cues: "omnipresent"

    Psi_S:
      name: "Social Context"
      value: 0.70
      label: "personalized_known"
      description: |
        Login = bekannte Kundin. Name, Kontostand, bestehende
        Produkte sichtbar. Personalisierte Empfehlungen möglich
        (z.B. «Sie reisen nach Thailand? Hier ist Ihr eSIM-Paket»).
      modifiers:
        personalization: "full"
        relationship_cues: "strong"
        peer_effects: "possible"  # «X andere UBS-Kunden nutzen eSIM»

    Psi_C:
      name: "Cognitive Context"
      value: 0.65
      label: "familiar_confident"
      description: |
        Vertraute App-Umgebung. Kognitive Belastung niedrig, weil
        Navigation bekannt ist. Entscheidung wird erleichtert durch
        Kontext (Reise-Bundle, Preisvergleich, 1-Click-Kauf).
      modifiers:
        cognitive_load: "low"
        decision_mode: "system_1_heuristic"
        familiarity: "high"

    Psi_K:
      name: "Cultural Context"
      value: 0.55
      label: "ecosystem_framed"
      description: |
        eSIM als Teil des Reise-Ökosystems (neben Kreditkarte,
        Versicherung, Währungswechsel) reduziert Category-Distanz.
        «Natürlich bietet meine Banking-App auch Konnektivität».
      modifiers:
        category_fit_perception: "moderate"
        cultural_expectation: "convenience_bundle"

    Psi_E:
      name: "Economic/Resource Context"
      value: 0.70
      label: "integrated_payment"
      description: |
        Bezahlung über bestehendes UBS-Konto (keine neue Zahlungsmethode).
        Preisvergleich mit Roaming-Kosten möglich. Transparente Abrechnung.
      modifiers:
        payment_friction: "minimal"
        price_reference: "internal_comparison"
        perceived_value: "clear"

    Psi_T:
      name: "Temporal Context"
      value: 0.75
      label: "triggered_contextual"
      description: |
        Push-Notification 1-3 Tage vor gebuchter Reise:
        «Sie fliegen morgen nach Barcelona? Aktivieren Sie Ihr
        eSIM-Paket für nur CHF 9.90.»
        Höchste Relevanz im höchsten Moment.
      modifiers:
        trigger_mechanism: "automated_push"
        timing_relevance: "perfect"
        urgency: "high"

    Psi_M:
      name: "Material/Tool Context"
      value: 0.80
      label: "native_app"
      description: |
        Native App mit Biometrie-Login, In-App-Purchase,
        1-Click-eSIM-Aktivierung, automatische Konfiguration.
        Optimale UX, keine Medienbrüche.
      modifiers:
        platform: "native_app"
        ux_quality: "optimized"
        integration_level: "full"

    Psi_F:
      name: "Physical/Spatial Context"
      value: 0.65
      label: "personal_device"
      description: |
        Persönliches Smartphone, vertraute App-Umgebung.
        «Zu Hause» im digitalen Sinn. Hoher Comfort-Level.
      modifiers:
        environment: "familiar_digital"
        comfort_level: "high"

  psi_vector_final: [0.85, 0.70, 0.65, 0.55, 0.70, 0.75, 0.80, 0.65]
  psi_mean_final: 0.706

# =============================================================================
# 4. Ψ-DIFFERENZ UND MULTIPLIKATOREN
# =============================================================================

psi_delta:
  description: |
    Für jede Ψ-Dimension berechnen wir die Differenz (Δ) und den
    resultierenden Multiplikator M(Δ) für die Parameter-Transformation.

    FORMEL (PCT): θ_final = θ_pilot × ∏ᵢ M(ΔΨᵢ)

    M(Δ) > 1: Parameter wird im finalen Kontext HÖHER (besser)
    M(Δ) < 1: Parameter wird im finalen Kontext NIEDRIGER
    M(Δ) = 1: Kein Kontext-Effekt

  dimensions:

    Psi_I:
      pilot: 0.30
      final: 0.85
      delta: 0.55
      multiplier: 1.45
      rationale: |
        Grösster Sprung. Von «fremder Website» zu «meiner Banking-App».
        Trust-Frame-Effekt ist der stärkste Einzelfaktor.
        M = 1 + 0.82 × Δ = 1 + 0.82 × 0.55 = 1.45
        (Koeffizient 0.82 basierend auf context-dimensions.yaml:
        institutional context → trust_modifier = 0.82)

    Psi_S:
      pilot: 0.20
      final: 0.70
      delta: 0.50
      multiplier: 1.35
      rationale: |
        Von «anonym» zu «persönlich bekannt». Personalisierung
        erhöht Conversion massiv (Endowment-Effekt: «für MICH»).
        M = 1 + 0.70 × 0.50 = 1.35

    Psi_C:
      pilot: 0.40
      final: 0.65
      delta: 0.25
      multiplier: 1.15
      rationale: |
        Von «skeptisch-evaluativ» zu «vertraut-heuristisch».
        Niedrigere kognitive Belastung = höhere Conversion.
        M = 1 + 0.60 × 0.25 = 1.15

    Psi_K:
      pilot: 0.35
      final: 0.55
      delta: 0.20
      multiplier: 1.10
      rationale: |
        Category-Distanz wird reduziert durch Ecosystem-Framing.
        Aber fundamentale Bank→Telco Distanz bleibt. Moderater Effekt.
        M = 1 + 0.50 × 0.20 = 1.10

    Psi_E:
      pilot: 0.45
      final: 0.70
      delta: 0.25
      multiplier: 1.18
      rationale: |
        Integrierte Zahlung (kein neues Payment nötig) + Preisvergleich
        mit Roaming-Kosten. Friction-Reduktion.
        M = 1 + 0.72 × 0.25 = 1.18

    Psi_T:
      pilot: 0.45
      final: 0.75
      delta: 0.30
      multiplier: 1.25
      rationale: |
        Von «ad hoc» zu «kontextuell getriggert vor Reise».
        Push-Notification im richtigen Moment ist enormer Hebel.
        M = 1 + 0.83 × 0.30 = 1.25

    Psi_M:
      pilot: 0.35
      final: 0.80
      delta: 0.45
      multiplier: 1.38
      rationale: |
        Von «Browser auf externer Website» zu «Native App mit
        1-Click-Kauf und Biometrie». UX-Differenz massiv.
        M = 1 + 0.85 × 0.45 = 1.38

    Psi_F:
      pilot: 0.40
      final: 0.65
      delta: 0.25
      multiplier: 1.13
      rationale: |
        Von «unvertrauter Digital-Umgebung» zu «mein Smartphone, meine App».
        Comfort-Effekt moderat aber real.
        M = 1 + 0.50 × 0.25 = 1.13

  # -------------------------------------------------------------------------
  # ZUSAMMENFASSUNG
  # -------------------------------------------------------------------------
  summary_table:
    columns: ["Ψ-Dimension", "Pilot", "Final", "Δ", "M(Δ)", "Rang"]
    rows:
      - ["Ψ_I Institutional", 0.30, 0.85, 0.55, 1.45, 1]
      - ["Ψ_M Material/Tool",  0.35, 0.80, 0.45, 1.38, 2]
      - ["Ψ_S Social",         0.20, 0.70, 0.50, 1.35, 3]
      - ["Ψ_T Temporal",       0.45, 0.75, 0.30, 1.25, 4]
      - ["Ψ_E Economic",       0.45, 0.70, 0.25, 1.18, 5]
      - ["Ψ_C Cognitive",      0.40, 0.65, 0.25, 1.15, 6]
      - ["Ψ_F Physical",       0.40, 0.65, 0.25, 1.13, 7]
      - ["Ψ_K Cultural",       0.35, 0.55, 0.20, 1.10, 8]

  # Gesamtmultiplikator: Produkt aller M(Δ)
  total_multiplier_product: 4.44  # 1.45 × 1.38 × 1.35 × 1.25 × 1.18 × 1.15 × 1.13 × 1.10

  # ABER: Nicht alle Dimensionen wirken multiplikativ (EXC-1: Default additiv!)
  # Nur Ψ_I (Trust = Veto-Faktor) und Ψ_M (Tool = Veto-Faktor) sind multiplikativ.
  # Rest ist additiv (EXC-5 Whitelist: V1 und G1 Tests bestanden nur für Ψ_I, Ψ_M).

  exc_1_correction:
    description: |
      EXC-1 Anwendung: Additiv ist Default.
      Multiplikativ nur wenn V1-Test bestanden (f=0 → Y=0).

      Ψ_I (Institutional): V1 bestanden — wenn τ=0 (kein Trust), dann
        Conversion = 0. Trust ist Veto-Faktor. → MULTIPLIKATIV ✓

      Ψ_M (Tool/Material): V1 bestanden — ohne funktionierendes Tool
        kann niemand kaufen. → MULTIPLIKATIV ✓

      Alle anderen: V1 NICHT bestanden (können Conversion reduzieren
        aber nicht auf 0 setzen). → ADDITIV

    corrected_formula: |
      θ_final = θ_pilot × M(ΔΨ_I) × M(ΔΨ_M) × [1 + Σ(Δ_rest × w_i)]

      Multiplikativer Teil: M_I × M_M = 1.45 × 1.38 = 2.00
      Additiver Teil: gewichtete Summe der restlichen Δ
        = 0.20 × (Δ_S × 0.70 + Δ_C × 0.60 + Δ_K × 0.50 + Δ_E × 0.72 + Δ_T × 0.83 + Δ_F × 0.50)
        = 0.20 × (0.35 + 0.15 + 0.10 + 0.18 + 0.25 + 0.13)
        = 0.20 × 1.16 = 0.232

      θ_final = θ_pilot × 2.00 × (1 + 0.232)
             = θ_pilot × 2.00 × 1.232
             = θ_pilot × 2.46

    total_multiplier_corrected: 2.46
    ci_68: [1.80, 3.20]

    interpretation: |
      Die finale App-integrierte Version wird schätzungsweise
      2.5× BESSER performen als die Pilot-Landing-Page-Version.

      Das heisst: Wenn der Pilot eine Conversion von 3% zeigt,
      erwarten wir im Final ~7.4% (3% × 2.46).

# =============================================================================
# 5. PARAMETER-TRANSFORMATION: PILOT → FINAL
# =============================================================================

parameter_transformations:

  description: |
    Wir transformieren die wichtigsten Survey/Verhaltens-Parameter
    von Pilot-Kontext in Final-Kontext.

  parameters:

    conversion_rate:
      name: "eSIM Purchase Conversion Rate"
      pilot_expected: 0.03  # 3% (basierend auf eSIM-Markt-Benchmarks)
      multiplier: 2.46
      final_expected: 0.074
      ci_68: [0.054, 0.096]
      note: |
        Pilot 3% ist konservativ (Airalo/Holafly Conversion ~5-8%,
        aber mit Selbstselektion). UBS-Pilot hat kalten Traffic.

    willingness_to_try:
      name: "Bereitschaft, eSIM auszuprobieren (Survey 1-7)"
      pilot_expected: 3.2  # Unterdurchschnittlich (Category Dissonance)
      multiplier: 1.80  # Nicht voller Multiplikator (bounded scale)
      final_expected: 4.5  # Moderat positiv
      ci_68: [3.8, 5.2]
      note: |
        Bounded Scale: Multiplikator auf 7-Punkt-Skala ist gedämpft.
        Transformation: (3.2 - 4) × 1.80 + 4 = 2.56 + 4 = Nein...
        Korrekt: Verhältnis zum Mittelwert transformieren.
        3.2/4.0 × 1.80 = 1.44 → 4.0 × (1 + (3.2/4.0 - 1) × 1.80) = 4.0 × (1 - 0.36) ≈ 3.56
        Alternativ: Direkt kalibriert über Vergleichsstudien.
        Pragmatisch: Final ≈ 4.3-4.7 (oberhalb Skalenmitte).

    trust_in_service:
      name: "Vertrauen in den eSIM-Service (Survey 1-7)"
      pilot_expected: 2.8  # Niedrig (externe Landing Page)
      final_expected: 4.8  # Substantiell höher (UBS App)
      multiplier_effective: 1.71  # 4.8/2.8
      note: "Trust ist der stärkste Ψ-Treiber"

    perceived_value:
      name: "Wahrgenommenes Preis-Leistungs-Verhältnis (1-7)"
      pilot_expected: 3.5  # Neutral (unbekannter Anbieter)
      final_expected: 4.6  # Gut (UBS Bundle, Kontovergleich)
      multiplier_effective: 1.31

    recommendation_intent:
      name: "Weiterempfehlungsbereitschaft (NPS-ähnlich, 0-10)"
      pilot_expected: 4.0  # Passiv
      final_expected: 6.5  # Moderat positiv
      multiplier_effective: 1.63

# =============================================================================
# 6. IMPLIKATIONEN FÜR PILOT-DESIGN UND EVALUATION
# =============================================================================

pilot_evaluation_framework:

  critical_warning: |
    ⚠️ WENN UBS die Pilot-Ergebnisse OHNE Ψ-Transformation bewertet,
    wird die finale App-Version um Faktor ~2.5× UNTERSCHÄTZT.

    Konkretes Beispiel:
    - Pilot zeigt 3% Conversion → «Zu niedrig, Projekt einstellen»
    - RICHTIG wäre: 3% × 2.46 = 7.4% erwartet bei App-Integration
    - 7.4% wäre ein GUTES Ergebnis im eSIM-Markt

    → Die Pilot-Phase MUSS mit Ψ-Korrekturfaktor bewertet werden!

  pilot_success_thresholds:
    description: |
      Transformierte Schwellenwerte: Was muss der Pilot zeigen,
      damit die finale Version voraussichtlich erfolgreich ist?

    metrics:
      conversion_rate:
        pilot_minimum: 0.015  # 1.5% → Final ≈ 3.7% (break-even)
        pilot_target: 0.030   # 3.0% → Final ≈ 7.4% (good)
        pilot_stretch: 0.050  # 5.0% → Final ≈ 12.3% (excellent)

      willingness_survey:
        pilot_minimum: 2.5  # Skalenwert → Final ≈ 3.8 (neutral)
        pilot_target: 3.5   # → Final ≈ 4.5 (positiv)
        pilot_stretch: 4.5  # → Final ≈ 5.5 (stark positiv)

      trust_survey:
        pilot_minimum: 2.0  # → Final ≈ 3.4
        pilot_target: 3.0   # → Final ≈ 5.1
        pilot_stretch: 4.0  # → Final ≈ 6.8

  pilot_design_recommendations:

    maximize_signal:
      - recommendation: "Zielgruppen-Selektion im Pilot klar dokumentieren"
        reason: "Selbstselektion im Pilot ist anders als In-App-Population"

      - recommendation: "UBS-Branding so stark wie möglich auf Landing Page"
        reason: "Reduziert Ψ_I-Differenz, macht Pilot-Ergebnisse übertragbarer"

      - recommendation: "Tracking ALLER Touchpoints (nicht nur Conversion)"
        reason: "Drop-off-Analyse zeigt, welche Ψ-Dimensionen am stärksten wirken"

    minimize_bias:
      - recommendation: "Kontrollgruppe: eSIM direkt bei Drittanbieter (ohne UBS)"
        reason: "Isoliert den UBS-Brand-Effekt vom generellen eSIM-Interesse"

      - recommendation: "A/B-Test: Starkes vs. schwaches UBS-Branding auf LP"
        reason: "Misst den Ψ_I-Effekt direkt (anstatt ihn zu schätzen)"

      - recommendation: "Post-Purchase-Survey mit Trust/Category-Fit-Fragen"
        reason: "Validiert die theoretischen Ψ-Multiplikatoren empirisch"

    survey_additions_for_psi_validation:
      - question: "Wie sehr fühlen Sie sich auf dieser Seite 'bei UBS'?"
        scale: "1-7"
        measures: "Ψ_I (Institutional Context)"

      - question: "Wie einfach war der Kaufprozess?"
        scale: "1-7"
        measures: "Ψ_M (Material/Tool Context)"

      - question: "Hätten Sie dieses eSIM lieber direkt in Ihrer Banking-App gekauft?"
        scale: "1-7"
        measures: "App-Preference (direkter Final-Indikator)"

      - question: "Wie relevant war das Angebot für Ihre nächste Reise?"
        scale: "1-7"
        measures: "Ψ_T (Temporal Context)"

# =============================================================================
# 7. SENSITIVITÄTSANALYSE: WAS WENN DIE MULTIPLIKATOREN ANDERS SIND?
# =============================================================================

sensitivity:

  scenario_conservative:
    name: "Konservatives Szenario"
    description: "Ψ-Effekte sind 50% schwächer als geschätzt"
    total_multiplier: 1.73  # √2.46 ≈ 1.57, adjustiert auf 1.73
    pilot_3pct_becomes: 0.052  # 3% × 1.73 = 5.2%
    implication: "Auch konservativ ist Final >5% — machbar"

  scenario_base:
    name: "Basis-Szenario"
    total_multiplier: 2.46
    pilot_3pct_becomes: 0.074
    implication: "7.4% — gutes Ergebnis"

  scenario_optimistic:
    name: "Optimistisches Szenario"
    description: "Ψ-Effekte sind 30% stärker (Netzwerkeffekte, Word-of-Mouth)"
    total_multiplier: 3.20
    pilot_3pct_becomes: 0.096
    implication: "9.6% — sehr gutes Ergebnis"

  robustness_check: |
    In ALLEN drei Szenarien ist die finale Version mindestens
    1.7× besser als der Pilot. Die Richtung ist robust,
    auch wenn die genaue Magnitude unsicher ist.

    Die grössten Unsicherheits-Treiber sind:
    1. Ψ_I-Multiplikator (Trust-Frame): ±0.20
    2. Ψ_M-Multiplikator (App vs. Browser): ±0.15
    3. Push-Notification-Effekt (Ψ_T): ±0.15

# =============================================================================
# 8. ZUSAMMENFASSUNG UND HANDLUNGSEMPFEHLUNGEN
# =============================================================================

