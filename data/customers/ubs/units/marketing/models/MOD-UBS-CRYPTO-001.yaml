  # ===========================================================================
  # D17: RISK COMMUNICATION GUIDELINES
  # Wie UBS Crypto-Risiken kommuniziert — Sprache, Prinzipien, Beispiele
  # ===========================================================================
  D17_risk_communication:
    description: |
      Guidelines für die Kommunikation von Crypto-Risiken,
      die UBS-Brand-konform sind: ehrlich, aber nicht abschreckend.

    principles:
      - id: "RC-1"
        principle: "Transparent, nicht alarmistisch"
        rationale: "Ehrlichkeit baut Vertrauen (τ_ubs ↑); Alarmstufe treibt weg"
        example_good: "Kryptowährungen können stark schwanken. Deshalb empfehlen wir eine Beimischung von 1-5%."
        example_bad: "WARNUNG: Sie können Ihr gesamtes Investment verlieren!"

      - id: "RC-2"
        principle: "Kontext statt Isolation"
        rationale: "Crypto-Risiko im Portfolio-Kontext relativieren"
        example_good: "Auch Aktien schwanken — Bitcoin hat eine ähnliche Volatilität wie Tech-Einzelwerte."
        example_bad: "Bitcoin ist 4x volatiler als der SMI."

      - id: "RC-3"
        principle: "Kontrolle betonen"
        rationale: "Perceived Control reduziert emotionale Barriere (λ_crypto ↓)"
        example_good: "Sie bestimmen den Betrag. Sie bestimmen den Zeitpunkt. Sie können jederzeit verkaufen."
        example_bad: "Die Märkte sind unvorhersehbar."

      - id: "RC-4"
        principle: "UBS als Sicherheitsnetz"
        rationale: "Trust Transfer: UBS-Kompetenz auf Crypto übertragen"
        example_good: "Ihre Crypto-Anlagen werden im gleichen sicheren Rahmen verwahrt wie alle Ihre UBS-Werte."
        example_bad: "Wir versuchen, das Risiko zu minimieren."

      - id: "RC-5"
        principle: "Historisch, nicht prognostisch"
        rationale: "Vermeidet Haftung und Enttäuschung"
        example_good: "Bitcoin hat seit 2015 eine durchschnittliche Jahresrendite von X% erzielt — bei hoher Schwankung."
        example_bad: "Bitcoin wird wahrscheinlich steigen."

    risk_disclaimers:
      standard_short: |
        Kryptowährungen unterliegen hohen Kursschwankungen.
        Der Wert kann steigen oder fallen. Vergangene Wertentwicklung
        ist kein Indikator für zukünftige Ergebnisse.
      standard_long: |
        Bitcoin und Ethereum sind volatile Anlageklassen. UBS empfiehlt
        eine Beimischung von maximal 1-5% des Gesamtportfolios. Die
        Verwahrung erfolgt durch UBS nach Schweizer Regulierungsstandards.
        Kryptowährungen sind nicht durch die Einlagensicherung geschützt.
        Informieren Sie sich vor einer Investition über die Risiken.

    channel_specific:
      app:
        risk_display: "Volatilitäts-Anzeige neben Kurs (visuell, nicht alarmierend)"
        format: "Interaktiver Slider: 'Bei CHF 1'000 Investment: mögliche Range CHF 600-1'800 (12 Monate)'"
      advisor:
        risk_display: "Portfolio-Kontext-Visualisierung"
        format: "iPad: 'So verändert 3% Crypto Ihr Portfolio-Risiko'"
      email:
        risk_display: "Kompakter Disclaimer am Ende"
        format: "Standard Short Disclaimer"

  # ===========================================================================
  # D18: TONALITY & LANGUAGE GUIDELINES
  # Sprache, Ton, verbotene und empfohlene Begriffe
  # ===========================================================================
  D18_tonality_guidelines:
    description: |
      Sprachrichtlinien für UBS Crypto-Kommunikation.
      Konsistent mit UBS Brand Voice, angepasst an Crypto-Kontext.

    tone_of_voice:
      overall: "Ruhig, kompetent, einladend — nicht hype-getrieben"
      description: |
        UBS spricht über Crypto wie über jede andere Anlageklasse:
        sachlich, informiert, im Kontext des Gesamtportfolios.
        Wir sind weder Crypto-Evangelisten noch Crypto-Skeptiker.
        Wir sind professionelle Vermögensverwalter, die eine neue
        Anlageklasse zugänglich machen.

    by_segment:
      SEG-CRYPTO-SELBST:
        tone: "Direkt, technisch versiert, respektvoll"
        register: "Peer-to-Peer (nicht belehrend)"
        example: "Bitcoin und Ethereum jetzt direkt im UBS-Depot handeln."
      SEG-CRYPTO-BEZIEH:
        tone: "Persönlich, empathisch, begleitend"
        register: "Berater-zu-Kunde (vertraut, warm)"
        example: "Ihr Berater erklärt Ihnen, wie Crypto in Ihre Strategie passt."
      SEG-CRYPTO-ORIENT:
        tone: "Erklärend, ermutigend, schrittweise"
        register: "Coach-zu-Lernenden (geduldig, klar)"
        example: "Crypto verstehen — in drei einfachen Schritten."
      SEG-CRYPTO-SCHWELL:
        tone: "Beruhigend, sicherheitsbetont, niederschwellig"
        register: "Beschützer (sanft, Sicherheitsnetz betonen)"
        example: "Schon ab CHF 100 — mit dem Sicherheitsnetz von UBS."

    recommended_terms:
      - term: "Digitale Anlageklasse"
        instead_of: "Kryptowährung (wo möglich)"
        reason: "Professioneller, eingebettet in Anlage-Vokabular"
      - term: "Beimischung"
        instead_of: "Investment"
        reason: "Betont kleinen Anteil, reduziert wahrgenommenes Risiko"
      - term: "Portfolio-Ergänzung"
        instead_of: "Neues Produkt"
        reason: "Einbettung in Bestehendes"
      - term: "Verwahrt bei UBS"
        instead_of: "Custody"
        reason: "Deutsch, verständlich, Vertrauen"
      - term: "Reguliert"
        instead_of: "Compliant"
        reason: "Deutsch, Autorität"

    prohibited_terms:
      - term: "revolutionär"
        reason: "Widerspricht UBS-Positionierung (Stabilität, nicht Disruption)"
      - term: "disruptiv"
        reason: "Beunruhigt konservative Segmente"
      - term: "zum Mond / to the moon"
        reason: "Crypto-Slang, untergräbt Seriosität"
      - term: "HODL"
        reason: "Internet-Meme, nicht UBS-Level"
      - term: "Blockchain-Revolution"
        reason: "Hype-Sprache"
      - term: "FOMO"
        reason: "Manipulativ, widerspricht Vertrauens-Positionierung"
      - term: "risikolos / garantiert"
        reason: "Falsch und regulatorisch problematisch"
      - term: "100x / Moonshot"
        reason: "Spekulationssprache"
      - term: "Krypto-Börse"
        reason: "Assoziiert mit FTX, Binance — UBS ist KEIN Exchange"
      - term: "Trading"
        reason: "Spekulativ — besser: 'investieren' oder 'anlegen'"
      - term: "Coins / Token"
        reason: "Technisch korrekt, aber casual — besser: 'Bitcoin', 'Ethereum'"

    language_pairs:
      # Deutsch (CH) — konsistent mit UBS-Kommunikation
      - say: "Investieren Sie in Bitcoin"
        not: "Kaufen Sie Coins"
      - say: "Digitale Vermögenswerte"
        not: "Kryptos"
      - say: "Ihr Portfolio, erweitert"
        not: "Neues Crypto-Angebot"
      - say: "Wertentwicklung"
        not: "Kursexplosion"
      - say: "Schwankungen gehören dazu"
        not: "Crypto crasht regelmässig"

  # ===========================================================================
  # D23: OBJECTION HANDLING GUIDE
  # Top-Einwände pro Segment mit Antwort-Strategien
  # ===========================================================================
  D23_objection_handling:
    description: |
      Die 15 häufigsten Einwände gegen Crypto-Investment bei UBS-Kunden,
      kategorisiert nach Typ und mit segment-spezifischen Antworten.

    objections:
      - id: "OBJ-01"
        objection: "Crypto ist reine Spekulation"
        type: "cognitive"
        frequency_by_segment:
          SEG-CRYPTO-ORIENT: 0.80
          SEG-CRYPTO-TRADIT: 0.90
          SEG-CRYPTO-SCHWELL: 0.70
        advisor_response: |
          "Das ist verständlich. Viele denken so, weil Crypto in den Medien
          oft extrem dargestellt wird. Was wir sehen: Bitcoin hat über 10 Jahre
          eine der stärksten Wertentwicklungen aller Anlageklassen gezeigt —
          bei hoher Schwankung. Deshalb empfehlen wir nicht 100%, sondern
          1-5% als Beimischung. Das verändert das Risiko Ihres Portfolios kaum,
          gibt Ihnen aber Zugang zu einer neuen Anlageklasse."
        key_technique: "Reframe: Spekulation → Diversifikation"

      - id: "OBJ-02"
        objection: "Ich verstehe Crypto nicht"
        type: "cognitive"
        frequency_by_segment:
          SEG-CRYPTO-ORIENT: 0.85
          SEG-CRYPTO-SCHWELL: 0.90
          SEG-CRYPTO-BEZIEH: 0.60
        advisor_response: |
          "Das muss man auch nicht im Detail verstehen — genau wie Sie nicht
          wissen müssen, wie der SMI-Index berechnet wird, um in einen
          Indexfonds zu investieren. Was wichtig ist: Bitcoin ist begrenzt
          auf 21 Millionen Stück, wird von Millionen Menschen genutzt, und
          UBS verwahrt ihn für Sie genauso sicher wie Ihre Aktien."
        key_technique: "Analogie: Indexfonds (verstehen auch wenige)"

      - id: "OBJ-03"
        objection: "Crypto ist unsicher — FTX, Hacker..."
        type: "emotional"
        frequency_by_segment:
          SEG-CRYPTO-SCHWELL: 0.85
          SEG-CRYPTO-ORIENT: 0.70
          SEG-CRYPTO-BEZIEH: 0.55
        advisor_response: |
          "Sie haben Recht — auf Crypto-Börsen gab es Probleme. Deshalb bieten
          wir Crypto NICHT über eine Börse an, sondern direkt über Ihr UBS-Konto.
          Ihre Bitcoin werden in der gleichen Infrastruktur verwahrt wie Ihre
          anderen Anlagen. FINMA-reguliert, UBS-versichert, Schweizer Standard."
        key_technique: "Differenzierung: Crypto-Börse ≠ UBS"

      - id: "OBJ-04"
        objection: "Das passt nicht zu mir"
        type: "identity"
        frequency_by_segment:
          SEG-CRYPTO-TRADIT: 0.95
          SEG-CRYPTO-SCHWELL: 0.50
        advisor_response: |
          "Das kann ich nachvollziehen. Crypto muss nicht zu jedem passen.
          Was ich Ihnen zeigen kann: Wie eine kleine Beimischung von 2%
          Ihr bestehendes Portfolio beeinflusst — ohne dass sich Ihre
          Anlagephilosophie ändert. Möchten Sie das einmal sehen?"
        key_technique: "Respekt + Unverbindliche Visualisierung"

      - id: "OBJ-05"
        objection: "Warum bei UBS und nicht bei Binance/SwissBorg?"
        type: "structural"
        frequency_by_segment:
          SEG-CRYPTO-SELBST: 0.70
        advisor_response: |
          "Gute Frage. Der Hauptvorteil: Bei UBS haben Sie alles an einem Ort.
          Crypto, Aktien, Fonds, 3a — ein Portfolio, ein Steuer-Report,
          eine Vermögensübersicht. Kein Seed, kein Wallet-Management,
          kein Transfer-Risiko. Und wenn etwas ist, haben Sie einen Ansprechpartner."
        key_technique: "Integration + Convenience + Ansprechpartner"

      - id: "OBJ-06"
        objection: "Crypto schadet der Umwelt"
        type: "values"
        frequency_by_segment:
          SEG-CRYPTO-ORIENT: 0.40
          SEG-CRYPTO-TRADIT: 0.35
        advisor_response: |
          "Ein berechtigter Punkt. Tatsächlich hat sich viel verändert:
          Ethereum ist seit 2022 auf Proof-of-Stake umgestiegen und verbraucht
          99% weniger Energie. Bei Bitcoin steigt der Anteil erneuerbarer
          Energie laufend. UBS beobachtet die ESG-Entwicklung aktiv."
        key_technique: "Anerkennung + Aktualisierung + UBS als Monitor"

      - id: "OBJ-07"
        objection: "Die Gebühren bei UBS sind zu hoch"
        type: "financial"
        frequency_by_segment:
          SEG-CRYPTO-SELBST: 0.80
        advisor_response: |
          "Die Gebühren sind etwas höher als bei reinen Crypto-Plattformen.
          Dafür erhalten Sie: sichere Verwahrung, Steuer-Report, Portfolio-
          Integration und Beratung. Viele Kunden sagen: Das ist mir die
          Sicherheit wert. Und es gibt keine versteckten Spread-Kosten."
        key_technique: "Premium-Justifikation (Trust ≠ kostenlos)"

      - id: "OBJ-08"
        objection: "Ich warte bis die Kurse fallen"
        type: "behavioral"
        frequency_by_segment:
          SEG-CRYPTO-ORIENT: 0.60
          SEG-CRYPTO-BEZIEH: 0.45
        advisor_response: |
          "Timing ist bei allen Anlageklassen schwierig. Eine Möglichkeit:
          Starten Sie mit einem kleinen Betrag und investieren regelmässig.
          So glätten Sie den Einstiegskurs über die Zeit — wie bei einem
          Fondssparplan."
        key_technique: "DCA (Dollar Cost Averaging) als Lösung"

    objection_routing:
      description: "Welcher Kanal beantwortet welche Einwände am besten?"
      advisor_best:
        - "OBJ-01 (Spekulation)"
        - "OBJ-04 (Passt nicht zu mir)"
        - "OBJ-08 (Timing)"
      app_best:
        - "OBJ-02 (Verstehe nicht → Micro-Learning)"
        - "OBJ-05 (Warum UBS → Vergleichs-Feature)"
        - "OBJ-07 (Gebühren → Transparenz-Seite)"
      content_best:
        - "OBJ-03 (Unsicher → Sicherheits-Erklärvideo)"
        - "OBJ-06 (Umwelt → ESG-Factsheet)"

