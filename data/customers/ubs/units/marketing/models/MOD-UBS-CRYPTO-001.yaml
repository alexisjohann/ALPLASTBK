# =============================================================================
# UBS CRYPTO INVESTMENT COMMUNICATION MODEL
# =============================================================================
# Superkey: MOD-UBS-CRYPTO-001
# Version: 1.0.0
# Created: 2026-02-26
# Purpose: Behavioral model for UBS crypto offering communication strategy
# Scope: Segment Analysis, Prioritisation, Communication Strategy, Patterns
# Briefing: BRIEFING_crypto_offering_communication_2026.md
# Architecture: Based on MOD-UBS-GMA-001 (10C → 4 Modules → Unified Score)
# =============================================================================

metadata:
  id: "MOD-UBS-CRYPTO-001"
  name: "UBS Crypto Investment Communication Model"
  short_name: "CICM"
  version: "1.0.0"
  created: "2026-02-26"
  created_for: "Dang Nguyen (UBS Marketing)"
  customer: "UBS"
  unit: "Marketing / Digital Communication & Growth"
  project_id: "UBS-MKT-2026-CR-001"
  based_on: "MOD-UBS-GMA-001"

  question_types:
    - "Q1: Welche Segmente haben die höchste Crypto-Affinität?"
    - "Q2: Wie priorisieren wir Segmente für den Rollout?"
    - "Q3: Welche Positionierung maximiert Adoption über Segmente?"
    - "Q4: Welche kanalspezifischen Kommunikationsmuster funktionieren?"

  products:
    - name: "Bitcoin (BTC)"
      type: "crypto_asset"
      ubs_classification: "alternative_investment"
      regulatory_status: "approved_ch"
    - name: "Ethereum (ETH)"
      type: "crypto_asset"
      ubs_classification: "alternative_investment"
      regulatory_status: "approved_ch"

# =============================================================================
# SECTION 1: MODELL-ARCHITEKTUR
# =============================================================================

architecture:
  type: "Multi-Question Integrated Model"
  approach: "10C → 4 Question Modules → Unified Adoption Score"

  modules:
    Q1_segment_analysis:
      name: "Segment Analysis & Crypto Affinity"
      primary_10c: [WHO, WHAT, AWARE]
      question: "Welches Segment hat welche Crypto-Affinität?"

    Q2_prioritisation:
      name: "Segment Prioritisation"
      primary_10c: [WHO, READY, STAGE]
      question: "In welcher Reihenfolge ansprechen?"

    Q3_positioning:
      name: "Communication Strategy (Macro)"
      primary_10c: [WHAT, HOW, WHEN]
      question: "Welche Positionierung für welches Segment?"

    Q4_patterns:
      name: "Communication Patterns (Micro)"
      primary_10c: [HOW, WHERE, WHEN, AWARE]
      question: "Welche Trigger, Kanäle, Botschaften?"

# =============================================================================
# SECTION 2: 10C CORE SPECIFICATION
# =============================================================================

core_10c:

  WHO:
    description: "5 Investmentsegmente aus UBS-Briefing (verhaltensbasiert)"

    segments:
      - id: "SEG-CRYPTO-SELBST"
        name: "Selbstentscheider"
        description: "Independent, well-informed, decisive, seeks control"
        briefing_crypto_affinity: "High"
        size_estimate_pct: 0.15  # ~15% des Kundenstamms
        archetype: "Thomas, 38, Software Engineer, handelt seit 2020 auf Binance"

      - id: "SEG-CRYPTO-BEZIEH"
        name: "Beziehungssuchende"
        description: "Values personal advice, trust-oriented, relationship-focused"
        briefing_crypto_affinity: "Medium"
        size_estimate_pct: 0.25
        archetype: "Anna, 52, KMU-Inhaberin, vertraut ihrem Berater seit 15 Jahren"

      - id: "SEG-CRYPTO-ORIENT"
        name: "Orientierungssuchende"
        description: "Uncertain, seeks structure and guidance, decision-averse"
        briefing_crypto_affinity: "Low-Medium"
        size_estimate_pct: 0.20
        archetype: "Lukas, 45, Lehrer, liest NZZ aber traut sich nicht"

      - id: "SEG-CRYPTO-SCHWELL"
        name: "Schwellenängstliche"
        description: "Hesitant, risk-averse, high decision barriers"
        briefing_crypto_affinity: "Low"
        size_estimate_pct: 0.20
        archetype: "Maria, 58, Verwaltungsangestellte, hat 3a bei UBS"

      - id: "SEG-CRYPTO-TRADIT"
        name: "Traditionskunden"
        description: "Conservative, sceptical of novelty, stability-focused"
        briefing_crypto_affinity: "Very Low"
        size_estimate_pct: 0.20
        archetype: "Heinrich, 67, pensioniert, Vermögensverwaltungsmandat"

    # =========================================================================
    # BEHAVIORAL PARAMETERS BY SEGMENT
    # Quellen: UBS Profile (λ_UBS=1.8, τ_BRAND=0.80), GMA-001, LLMMC Priors
    # =========================================================================
    behavioral_parameters_by_segment:

      SEG-CRYPTO-SELBST:
        # --- Basis-Parameter ---
        lambda: 1.5          # Niedrigere Loss Aversion (risikoaffiner)
        tau_ubs: 0.75         # Gutes UBS-Vertrauen
        beta: 0.75            # Moderate present bias (handelt schnell)
        iota_brand: 0.50      # Moderate Brand-Identität (nutzt auch Konkurrenz)
        sigma_social: 0.30    # Geringe Social Proof Sensitivität (eigenständig)
        kappa_default: 0.40   # Tiefe Default-Sensitivität (wählt aktiv)
        epsilon_effort: 0.35  # Tiefe Effort-Sensitivität (nimmt Aufwand in Kauf)
        # --- Crypto-spezifische Parameter ---
        tau_crypto: 0.70      # Hohes Crypto-Vertrauen (Erfahrung!)
        iota_crypto: 0.75     # Crypto ist Teil der Identität
        lambda_crypto: 1.2    # Tiefe Crypto-Loss-Aversion (kennt Volatilität)
        sigma_crypto_peers: 0.60  # Tech-Peers als Referenz
        knowledge_crypto: 0.80    # Hohe Crypto-Kompetenz
        prior_crypto_experience: true
        # --- Derived ---
        crypto_affinity_score: 0.82  # Composite (see formula below)

      SEG-CRYPTO-BEZIEH:
        lambda: 1.9
        tau_ubs: 0.85         # Höchstes UBS-Vertrauen (Beziehung!)
        beta: 0.85            # Moderate present bias
        iota_brand: 0.80      # Starke UBS-Identität
        sigma_social: 0.55    # Moderate Social Proof (Berater als Referenz)
        kappa_default: 0.70   # Hohe Default-Sensitivität (nimmt Empfehlung an)
        epsilon_effort: 0.60  # Moderate Effort-Aversion
        tau_crypto: 0.35      # Tiefes Crypto-Vertrauen (unbekannt)
        iota_crypto: 0.15     # Crypto nicht identitätsrelevant
        lambda_crypto: 2.4    # Hohe Crypto-Loss-Aversion
        sigma_crypto_peers: 0.25  # Peers investieren kaum
        knowledge_crypto: 0.25    # Tiefe Crypto-Kompetenz
        prior_crypto_experience: false
        crypto_affinity_score: 0.38

      SEG-CRYPTO-ORIENT:
        lambda: 2.1
        tau_ubs: 0.70
        beta: 0.80
        iota_brand: 0.55
        sigma_social: 0.70    # Hohe Social Proof Sensitivität
        kappa_default: 0.80   # Sehr hohe Default-Sensitivität
        epsilon_effort: 0.75  # Hohe Effort-Aversion
        tau_crypto: 0.25      # Sehr tiefes Crypto-Vertrauen
        iota_crypto: 0.10     # Crypto nicht identitätsrelevant
        lambda_crypto: 2.8    # Sehr hohe Crypto-Loss-Aversion
        sigma_crypto_peers: 0.40  # Schaut auf Nachbarn/Medien
        knowledge_crypto: 0.15
        prior_crypto_experience: false
        crypto_affinity_score: 0.22

      SEG-CRYPTO-SCHWELL:
        lambda: 2.5           # Höchste Loss Aversion
        tau_ubs: 0.75
        beta: 0.90            # Hoher present bias (procrastination)
        iota_brand: 0.65
        sigma_social: 0.50
        kappa_default: 0.85   # Sehr hohe Default-Sensitivität
        epsilon_effort: 0.85  # Sehr hohe Effort-Aversion (Barrieren!)
        tau_crypto: 0.15      # Minimal Crypto-Vertrauen
        iota_crypto: 0.05     # Crypto identitätsfremd
        lambda_crypto: 3.2    # Extreme Crypto-Loss-Aversion
        sigma_crypto_peers: 0.20
        knowledge_crypto: 0.10
        prior_crypto_experience: false
        crypto_affinity_score: 0.12

      SEG-CRYPTO-TRADIT:
        lambda: 2.3
        tau_ubs: 0.85         # Hohes UBS-Vertrauen (Langzeitkunde)
        beta: 0.92            # Status Quo Bias dominant
        iota_brand: 0.85      # Starke UBS-Identität (traditionell)
        sigma_social: 0.35    # Tiefe Peer-Sensitivität (eigene Meinung)
        kappa_default: 0.90   # Extrem hohe Default-Sensitivität
        epsilon_effort: 0.70
        tau_crypto: 0.10      # Misstraut Crypto fundamental
        iota_crypto: -0.20    # Crypto ist ANTI-Identität (Ablehnung!)
        lambda_crypto: 3.5    # Extreme Crypto-Loss-Aversion
        sigma_crypto_peers: 0.10  # "Meine Freunde investieren nicht in sowas"
        knowledge_crypto: 0.08
        prior_crypto_experience: false
        crypto_affinity_score: 0.05

    # =========================================================================
    # CRYPTO AFFINITY SCORE FORMULA
    # =========================================================================
    crypto_affinity_formula:
      description: |
        CAS(s) = w₁×τ_crypto + w₂×(1-λ_crypto/4) + w₃×ι_crypto
               + w₄×knowledge + w₅×σ_peers - w₆×ε_effort

        Wobei Gewichte aus LLMMC Prior (N=1000, informed by:
        Identity Economics MS-IB-001, Prospect Theory MS-RD-001)
      weights:
        w1_trust: 0.25
        w2_loss_aversion_inv: 0.20
        w3_identity: 0.20
        w4_knowledge: 0.15
        w5_social_proof: 0.10
        w6_effort_penalty: 0.10
      parameter_refs:
        - "PAR-BEH-016 (λ via MS-RD-001 Prospect Theory)"
        - "PAR-COMP-001 (γ Identity × Social)"
        - "PAR-COMP-004 (γ Social × Warm Glow)"

    # =========================================================================
    # CRYPTO AFFINITY RANKING (Q1 ANSWER)
    # =========================================================================
    crypto_affinity_ranking:
      - rank: 1
        segment: "SEG-CRYPTO-SELBST"
        score: 0.82
        classification: "HIGH"
        implication: "Ready to adopt — ACTIVATE"

      - rank: 2
        segment: "SEG-CRYPTO-BEZIEH"
        score: 0.38
        classification: "MEDIUM"
        implication: "Needs advisor-mediated trust transfer — ENABLE ADVISOR"

      - rank: 3
        segment: "SEG-CRYPTO-ORIENT"
        score: 0.22
        classification: "LOW-MEDIUM"
        implication: "Needs structured guidance and social proof — EDUCATE"

      - rank: 4
        segment: "SEG-CRYPTO-SCHWELL"
        score: 0.12
        classification: "LOW"
        implication: "Massive barriers — only with extreme friction reduction"

      - rank: 5
        segment: "SEG-CRYPTO-TRADIT"
        score: 0.05
        classification: "VERY LOW"
        implication: "Anti-identity — DO NOT TARGET (dilution risk)"

  WHAT:
    description: "Utility-Dimensionen bei Crypto-Investment-Entscheidung"

    utility_dimensions:
      - dim: "u_F"
        name: "Financial Utility"
        description: "Rendite, Diversifikation, Portfolio-Optimierung"
        weight_default: 0.25
        crypto_specific: "Erwartete Rendite vs. Volatilitätskosten"

      - dim: "u_E"
        name: "Emotional Utility"
        description: "Sicherheitsgefühl, Kontrolle, Vertrauen"
        weight_default: 0.25
        crypto_specific: "Angstabbau durch UBS-Verpackung"

      - dim: "u_S"
        name: "Social Utility"
        description: "Status, Modernität, Peer-Konformität"
        weight_default: 0.15
        crypto_specific: "Signaling: 'Ich bin modern aber seriös'"

      - dim: "u_P"
        name: "Process Utility"
        description: "Einfachheit, Convenience, UX"
        weight_default: 0.20
        crypto_specific: "Kein Wallet-Management, kein Seed, kein Exchange"

      - dim: "u_D"
        name: "Identity Utility"
        description: "Konsistenz mit Selbstbild"
        weight_default: 0.15
        crypto_specific: "Bin ich jemand, der Crypto besitzt?"

    utility_weights_by_segment:
      SEG-CRYPTO-SELBST:
        u_F: 0.35  # Rendite-getrieben
        u_E: 0.10  # Braucht keine Beruhigung
        u_S: 0.15  # Tech-Status
        u_P: 0.25  # Will gute UX
        u_D: 0.15  # Crypto ist Identität

      SEG-CRYPTO-BEZIEH:
        u_F: 0.20
        u_E: 0.35  # Sicherheit höchste Priorität!
        u_S: 0.10
        u_P: 0.15
        u_D: 0.20  # "Mein Berater empfiehlt es"

      SEG-CRYPTO-ORIENT:
        u_F: 0.15
        u_E: 0.30  # Angstabbau wichtig
        u_S: 0.20  # "Andere machen es auch"
        u_P: 0.25  # Muss extrem einfach sein
        u_D: 0.10

      SEG-CRYPTO-SCHWELL:
        u_F: 0.10
        u_E: 0.40  # Sicherheit dominiert alles
        u_S: 0.10
        u_P: 0.30  # Muss barrierefrei sein
        u_D: 0.10

      SEG-CRYPTO-TRADIT:
        u_F: 0.20
        u_E: 0.30
        u_S: 0.05  # Peers lehnen Crypto ab
        u_P: 0.10
        u_D: 0.35  # Identität GEGEN Crypto!

  HOW:
    description: "Kommunikationskanäle und deren Effektivität pro Segment"

    channels:
      - id: "CH-ADVISOR"
        name: "Kundenberater (persönlich)"
        description: "Beratungsgespräch, Telefon, Video"
        trust_transfer_capacity: 0.90  # Höchste!
        reach_by_segment:
          SEG-CRYPTO-SELBST: 0.20    # Will keinen Berater
          SEG-CRYPTO-BEZIEH: 0.85    # Primärkanal!
          SEG-CRYPTO-ORIENT: 0.40
          SEG-CRYPTO-SCHWELL: 0.30
          SEG-CRYPTO-TRADIT: 0.60

      - id: "CH-APP"
        name: "UBS Mobile Banking App"
        trust_transfer_capacity: 0.50
        reach_by_segment:
          SEG-CRYPTO-SELBST: 0.90    # Primärkanal!
          SEG-CRYPTO-BEZIEH: 0.50
          SEG-CRYPTO-ORIENT: 0.60
          SEG-CRYPTO-SCHWELL: 0.40
          SEG-CRYPTO-TRADIT: 0.25

      - id: "CH-EBANKING"
        name: "E-Banking Web"
        trust_transfer_capacity: 0.55
        reach_by_segment:
          SEG-CRYPTO-SELBST: 0.70
          SEG-CRYPTO-BEZIEH: 0.40
          SEG-CRYPTO-ORIENT: 0.55
          SEG-CRYPTO-SCHWELL: 0.45
          SEG-CRYPTO-TRADIT: 0.50

      - id: "CH-EMAIL"
        name: "Email / Newsletter"
        trust_transfer_capacity: 0.30
        reach_by_segment:
          SEG-CRYPTO-SELBST: 0.40
          SEG-CRYPTO-BEZIEH: 0.55
          SEG-CRYPTO-ORIENT: 0.60
          SEG-CRYPTO-SCHWELL: 0.50
          SEG-CRYPTO-TRADIT: 0.55

      - id: "CH-EVENT"
        name: "Webinar / Event"
        trust_transfer_capacity: 0.70
        reach_by_segment:
          SEG-CRYPTO-SELBST: 0.30
          SEG-CRYPTO-BEZIEH: 0.40
          SEG-CRYPTO-ORIENT: 0.50
          SEG-CRYPTO-SCHWELL: 0.20
          SEG-CRYPTO-TRADIT: 0.15

    channel_complementarity:
      ADVISOR_x_APP: 0.35      # Berater erklärt → Kunde handelt in App
      ADVISOR_x_EVENT: 0.25    # Event weckt Interesse → Berater vertieft
      APP_x_EMAIL: 0.15        # Email triggers App-Visit
      EVENT_x_EMAIL: 0.20      # Event-Teilnahme → Follow-up Email
      APP_x_EBANKING: -0.10    # Leichte Kannibalisierung

  WHEN:
    description: "Zeitliche Kontexte und Trigger-Momente für Crypto-Adoption"

    temporal_triggers:
      # Life Events
      life_events:
        - event: "Bitcoin ATH / Medienpräsenz"
          timing: "Marktgetrieben"
          activation_multiplier: 2.5
          primary_segments: [SEG-CRYPTO-ORIENT, SEG-CRYPTO-BEZIEH]
          risk: "FOMO-getrieben, kann zu Reue führen"

        - event: "Bonus / 13. Monatslohn"
          timing: "Dezember-Januar"
          activation_multiplier: 1.6
          primary_segments: [SEG-CRYPTO-SELBST, SEG-CRYPTO-BEZIEH]

        - event: "Peer-Erfahrung ('Mein Kollege hat Bitcoin')"
          timing: "Anytime"
          activation_multiplier: 1.8
          primary_segments: [SEG-CRYPTO-ORIENT, SEG-CRYPTO-BEZIEH]

        - event: "Portfolio-Review beim Berater"
          timing: "Quartalsweise"
          activation_multiplier: 2.0
          primary_segments: [SEG-CRYPTO-BEZIEH, SEG-CRYPTO-TRADIT]

        - event: "Regulatorische Klarheit (z.B. EU MiCA)"
          timing: "Event-driven"
          activation_multiplier: 1.4
          primary_segments: [SEG-CRYPTO-SCHWELL, SEG-CRYPTO-TRADIT]

        - event: "UBS Crypto Launch-Kommunikation"
          timing: "Einmalig (Launch)"
          activation_multiplier: 1.5
          primary_segments: [SEG-CRYPTO-SELBST, SEG-CRYPTO-ORIENT]

      # Kontext-Dimensionen (Ψ)
      psi_context:
        psi_I_regulatory: "FINMA-approved, MiFID-compliant"
        psi_S_social_norm: "Crypto-Normalisation in CH (SBB, PostFinance)"
        psi_K_cultural: "Swiss caution × Crypto-Skepsis = hohe Schwelle"
        psi_E_economic: "Niedrigzins-Umfeld treibt Alternative-Suche"
        psi_T_temporal: "Post-Halving-Cycle 2024 → bull market sentiment"
        psi_M_technology: "UBS App als Trust-Interface (keine Wallet-Komplexität)"

  WHERE:
    description: "Touchpoints für Crypto-Kommunikation"

    touchpoints:
      digital:
        - "App: Crypto-Sektion in Investment-Bereich"
        - "App: Push-Notification bei Kurs-Trigger"
        - "E-Banking: Crypto-Info-Seite"
        - "Email: Personalisierte Crypto-Insights"
        - "Webinar: 'Crypto für UBS-Kunden erklärt'"
      physical:
        - "Beratungsgespräch: Crypto als Portfolio-Ergänzung"
        - "Branch: Crypto-Infomaterial (QR zu App)"
        - "Events: Crypto-Abend für Kunden"
      hybrid:
        - "Video-Call: Crypto-Beratung"
        - "Chat: Crypto-FAQ-Bot"

    context_modifiers:
      app_crypto_section:
        attention_available: 0.4
        decision_readiness: 0.25
        trust_context: 0.70  # In UBS-App = vertrauensvoll
      advisor_meeting:
        attention_available: 0.9
        decision_readiness: 0.7
        trust_context: 0.90  # Höchstes Vertrauen
      email:
        attention_available: 0.2
        decision_readiness: 0.10
        trust_context: 0.50

  AWARE:
    description: "Awareness-Dimensionen für Crypto-Investment"

    awareness_dimensions:
      - dim: "A_product"
        name: "Produktkenntnis (UBS bietet Crypto an)"
        by_segment:
          SEG-CRYPTO-SELBST: 0.60   # Weiss möglicherweise schon
          SEG-CRYPTO-BEZIEH: 0.20
          SEG-CRYPTO-ORIENT: 0.25
          SEG-CRYPTO-SCHWELL: 0.10
          SEG-CRYPTO-TRADIT: 0.05

      - dim: "A_benefit"
        name: "Nutzenkenntnis (Warum Crypto im Portfolio?)"
        by_segment:
          SEG-CRYPTO-SELBST: 0.75
          SEG-CRYPTO-BEZIEH: 0.20
          SEG-CRYPTO-ORIENT: 0.15
          SEG-CRYPTO-SCHWELL: 0.08
          SEG-CRYPTO-TRADIT: 0.05

      - dim: "A_risk"
        name: "Risiko-Awareness (akkurate Risikoeinschätzung)"
        by_segment:
          SEG-CRYPTO-SELBST: 0.70   # Realistisch
          SEG-CRYPTO-BEZIEH: 0.85   # Überschätzt Risiko
          SEG-CRYPTO-ORIENT: 0.90   # Stark überschätzt
          SEG-CRYPTO-SCHWELL: 0.95  # Extrem überschätzt
          SEG-CRYPTO-TRADIT: 0.95   # Extrem überschätzt
        note: "Höhere Werte = stärkere Risikowahrnehmung (Barriere!)"

      - dim: "A_action"
        name: "Handlungswissen (Wie kaufe ich Crypto bei UBS?)"
        by_segment:
          SEG-CRYPTO-SELBST: 0.50   # Kennt Prozess nicht bei UBS
          SEG-CRYPTO-BEZIEH: 0.10
          SEG-CRYPTO-ORIENT: 0.08
          SEG-CRYPTO-SCHWELL: 0.05
          SEG-CRYPTO-TRADIT: 0.03

      - dim: "A_ubs_advantage"
        name: "UBS-Differenzierung (Warum bei UBS und nicht Crypto-Börse?)"
        by_segment:
          SEG-CRYPTO-SELBST: 0.30   # Sieht noch keinen UBS-Vorteil
          SEG-CRYPTO-BEZIEH: 0.50   # Versteht intuitiv: "UBS = sicher"
          SEG-CRYPTO-ORIENT: 0.40
          SEG-CRYPTO-SCHWELL: 0.55   # Genau das brauchen sie
          SEG-CRYPTO-TRADIT: 0.60    # "Wenn überhaupt, dann nur bei UBS"

  READY:
    description: "Handlungsbereitschaft (WAX-Modell)"

    readiness_model:
      willingness:
        SEG-CRYPTO-SELBST: 0.80     # Will — wartet auf UBS-Angebot
        SEG-CRYPTO-BEZIEH: 0.35     # Braucht Empfehlung
        SEG-CRYPTO-ORIENT: 0.20     # Unsicher
        SEG-CRYPTO-SCHWELL: 0.10    # Blockiert
        SEG-CRYPTO-TRADIT: 0.05     # Lehnt ab

      ability:
        financial: 0.75              # Haben Geld (UBS-Kunden)
        knowledge:
          SEG-CRYPTO-SELBST: 0.80
          SEG-CRYPTO-BEZIEH: 0.25
          SEG-CRYPTO-ORIENT: 0.15
          SEG-CRYPTO-SCHWELL: 0.10
          SEG-CRYPTO-TRADIT: 0.08
        access: 0.90                 # UBS App = hoher Zugang

      context:
        regulatory_clarity: +0.10    # FINMA-Approved = positiv
        market_sentiment: +0.15      # Bull-Markt 2025-26
        media_noise: -0.10           # Crypto-Crashes in Erinnerung
        ubs_trust_premium: +0.20     # UBS-Wrapper reduziert Barriere

  STAGE:
    description: "Customer Journey Phasen für Crypto-Adoption"

    journey_stages:
      - stage: "UNAWARE"
        description: "Weiss nicht, dass UBS Crypto anbietet"
        share_by_segment:
          SEG-CRYPTO-SELBST: 0.10
          SEG-CRYPTO-BEZIEH: 0.40
          SEG-CRYPTO-ORIENT: 0.45
          SEG-CRYPTO-SCHWELL: 0.60
          SEG-CRYPTO-TRADIT: 0.70
        primary_intervention: "Launch Communication"

      - stage: "AWARE_CURIOUS"
        description: "Weiss von Angebot, ist neugierig"
        share_by_segment:
          SEG-CRYPTO-SELBST: 0.25
          SEG-CRYPTO-BEZIEH: 0.30
          SEG-CRYPTO-ORIENT: 0.35
          SEG-CRYPTO-SCHWELL: 0.25
          SEG-CRYPTO-TRADIT: 0.15
        primary_intervention: "Education + Social Proof"

      - stage: "CONSIDERING"
        description: "Denkt aktiv darüber nach"
        share_by_segment:
          SEG-CRYPTO-SELBST: 0.30
          SEG-CRYPTO-BEZIEH: 0.20
          SEG-CRYPTO-ORIENT: 0.15
          SEG-CRYPTO-SCHWELL: 0.10
          SEG-CRYPTO-TRADIT: 0.10
        primary_intervention: "Advisor Enablement + Friction Reduction"

      - stage: "READY_TO_ACT"
        description: "Bereit, braucht letzten Anstoss"
        share_by_segment:
          SEG-CRYPTO-SELBST: 0.25
          SEG-CRYPTO-BEZIEH: 0.08
          SEG-CRYPTO-ORIENT: 0.04
          SEG-CRYPTO-SCHWELL: 0.04
          SEG-CRYPTO-TRADIT: 0.04
        primary_intervention: "Activation Nudge + Timing"

      - stage: "ACTIVE"
        description: "Hat Crypto bei UBS gekauft"
        share_by_segment:
          SEG-CRYPTO-SELBST: 0.10
          SEG-CRYPTO-BEZIEH: 0.02
          SEG-CRYPTO-ORIENT: 0.01
          SEG-CRYPTO-SCHWELL: 0.01
          SEG-CRYPTO-TRADIT: 0.01
        primary_intervention: "Retention + Deepening"

# =============================================================================
# SECTION 3: Q2 — SEGMENT PRIORITISATION MODEL
# =============================================================================

module_Q2_prioritisation:

  description: |
    Priorisierung basiert auf 4 Faktoren:
    (1) Crypto Affinity Score (CAS)
    (2) Revenue Potential (RP)
    (3) Conversion Probability (CP)
    (4) Brand Risk (BR, negativ)

  prioritisation_formula:
    description: |
      Priority(s) = w₁×CAS(s) + w₂×RP(s) + w₃×CP(s) - w₄×BR(s)
    weights:
      w1_affinity: 0.30
      w2_revenue: 0.25
      w3_conversion: 0.30
      w4_brand_risk: 0.15

  segment_scores:
    SEG-CRYPTO-SELBST:
      CAS: 0.82
      RP: 0.60    # Mittel (handelt selbst, tiefe Marge)
      CP: 0.75    # Hoch (will, kann, weiss)
      BR: 0.05    # Minimal (erwartet Crypto)
      priority: 0.71  # 0.30×0.82 + 0.25×0.60 + 0.30×0.75 - 0.15×0.05

    SEG-CRYPTO-BEZIEH:
      CAS: 0.38
      RP: 0.85    # Hoch (Berater-Marge, Cross-Selling)
      CP: 0.45    # Mittel (braucht Berater)
      BR: 0.10    # Tief
      priority: 0.50  # 0.30×0.38 + 0.25×0.85 + 0.30×0.45 - 0.15×0.10

    SEG-CRYPTO-ORIENT:
      CAS: 0.22
      RP: 0.50
      CP: 0.25
      BR: 0.15
      priority: 0.28

    SEG-CRYPTO-SCHWELL:
      CAS: 0.12
      RP: 0.40
      CP: 0.10
      BR: 0.25
      priority: 0.13

    SEG-CRYPTO-TRADIT:
      CAS: 0.05
      RP: 0.70    # Hohes AuM, ABER...
      CP: 0.03    # Fast keine Conversion
      BR: 0.60    # HOCH! Kann Brand-Wahrnehmung beschädigen
      priority: -0.04  # NEGATIV! Nicht ansprechen.

  rollout_recommendation:
    phase_1:
      name: "Quick Wins"
      timing: "Launch (Monat 1-2)"
      segments: ["SEG-CRYPTO-SELBST"]
      strategy: "Self-Service Activation via App"
      expected_conversion: "15-25%"
      rationale: "Höchste Affinität, tiefste Kosten, schnellster ROI"

    phase_2:
      name: "Advisor-Enabled"
      timing: "Monat 2-4"
      segments: ["SEG-CRYPTO-BEZIEH"]
      strategy: "Advisor Crypto Enablement + Empfehlungs-Toolkit"
      expected_conversion: "8-15%"
      rationale: "Höchstes Revenue-Potenzial, braucht Berater-Training"

    phase_3:
      name: "Education Wave"
      timing: "Monat 4-8"
      segments: ["SEG-CRYPTO-ORIENT"]
      strategy: "Content-Marketing + Social Proof + Webinars"
      expected_conversion: "3-8%"
      rationale: "Grösstes Volumen, braucht längere Education"

    phase_4:
      name: "Barrier Reduction"
      timing: "Monat 8-12"
      segments: ["SEG-CRYPTO-SCHWELL"]
      strategy: "Ultra-Low-Entry + Micro-Investment + Garantie-Narrative"
      expected_conversion: "1-3%"
      rationale: "Nur mit extremer Friction Reduction"

    not_targeted:
      segments: ["SEG-CRYPTO-TRADIT"]
      rationale: |
        Crypto widerspricht der Kernidentität dieser Gruppe.
        ι_crypto = -0.20 (Anti-Identität!). Aktive Ansprache
        riskiert Cognitive Dissonance und Brand Dilution.
        Besser: Berater beantwortet bei Nachfrage, aber kein Push.

# =============================================================================
# SECTION 4: Q3 — POSITIONING STRATEGY (MACRO)
# =============================================================================

module_Q3_positioning:

  description: |
    5 Positionierungsoptionen aus dem Briefing, bewertet über
    Brand Extension Fit (Voelckner 2006) und Segment-Resonanz.

  # =========================================================================
  # BRAND EXTENSION RECALIBRATION: Bank → Crypto
  # Based on B3_brand_extension_esim.yaml, recalibrated for crypto
  # =========================================================================
  brand_extension_crypto:
    framework: "Voelckner & Sattler (2006) — 10 Factors recalibrated"

    factors:
      - name: "Fit (Perceived Similarity)"
        meta_beta: 0.41
        ubs_crypto_score: 0.30  # LOWER than eSIM (0.40) — Bank→Crypto more distant
        assessment: "LOW-MODERATE — Banking → Crypto is category-distant"
        action: "Frame as 'Digital Asset Management' not 'Crypto Trading'"

      - name: "Parent Brand Conviction"
        meta_beta: 0.36
        ubs_crypto_score: 0.80  # HIGHER — UBS trust is THE asset here
        assessment: "HIGH — UBS trust wraps crypto in safety"
        action: "UBS brand must be PROMINENT — this IS the value proposition"

      - name: "Marketing Support"
        meta_beta: 0.28
        ubs_crypto_score: 0.55  # Moderate investment expected
        assessment: "CRITICAL COMPENSATORY LEVER"
        action: "Invest heavily — this compensates for low fit"

      - name: "Retailer Acceptance"
        meta_beta: 0.22
        ubs_crypto_score: 0.45  # Advisor channel = quasi-retailer
        assessment: "MODERATE — Advisor = trust-transfer channel"
        action: "Advisor enablement is the 'distribution channel'"

      - name: "Parent Brand Experience"
        meta_beta: 0.19
        ubs_crypto_score: 0.75  # Long relationships
        assessment: "HIGH — long-tenure customers accept more"

      - name: "Number of Prior Extensions"
        meta_beta: 0.15
        ubs_crypto_score: 0.35  # Few non-financial extensions
        assessment: "LOW — Crypto is unusual for UBS"

      - name: "Parent Brand Width"
        meta_beta: 0.13
        ubs_crypto_score: 0.60  # Wealth Management = broad
        assessment: "MODERATE-HIGH — WM covers broad asset classes"

      - name: "Category Risk"
        meta_beta: -0.18
        ubs_crypto_score: 0.75  # HIGH! Crypto is volatile
        assessment: "HIGH RISK — volatility, loss potential, regulatory"
        action: "Position sizing limits (1-5% portfolio), education"

      - name: "Consumer Innovativeness"
        meta_beta: 0.12
        ubs_crypto_score: 0.45
        assessment: "MODERATE — Swiss are cautious adopters"

      - name: "Extension Price"
        meta_beta: -0.10
        ubs_crypto_score: 0.50  # Fees vs. crypto exchanges
        assessment: "MODERATE — UBS fees higher, but trust premium"

    composite_prediction:
      calculation:
        fit: "0.41 × 0.30 = 0.123"
        conviction: "0.36 × 0.80 = 0.288"
        marketing: "0.28 × 0.55 = 0.154"
        retailer: "0.22 × 0.45 = 0.099"
        experience: "0.19 × 0.75 = 0.143"
        prior_ext: "0.15 × 0.35 = 0.053"
        width: "0.13 × 0.60 = 0.078"
        risk: "-0.18 × 0.75 = -0.135"
        innovativeness: "0.12 × 0.45 = 0.054"
        price: "-0.10 × 0.50 = -0.050"
      total: 0.807
      interpretation: |
        Score 0.81 (MODERATE on 0-2 scale).
        Above failure zone (<0.50), below clear success zone (>0.90).
        KEY INSIGHT: Brand Conviction (0.288) carries this extension.
        Without UBS trust, crypto extension would FAIL (score ~0.52).
      comparison_esim:
        esim_score: 0.868
        crypto_score: 0.807
        delta: -0.061
        driver: "Lower fit (-0.10), higher category risk (-0.09)"
      verdict: |
        Crypto extension is VIABLE but more fragile than eSIM.
        UBS brand conviction is the load-bearing pillar.
        Marketing support and advisor enablement are compensatory.

    # Prestige Brand Advantage (Park 1991) for Crypto
    prestige_brand_crypto:
      brand_type: "Prestige (60% prestige / 40% functional)"
      implication: "Can extend to distant category (crypto)"
      distance_penalty_reduction: 0.38  # Park 1991
      critical_narrative: |
        UBS = "Serious institution adds crypto for serious investors"
        NOT: "UBS becomes a crypto company"
        The prestige framing PROTECTS the parent brand.

    # Dilution Risk for Crypto (Loken 1993)
    dilution_risk_crypto:
      risk_assessment: "MODERATE (0.35) — higher than eSIM (0.25)"
      risk_factors:
        - factor: "Crypto crash while UBS offers it"
          probability: 0.40
          dilution_impact: 0.20
          mitigation: "Position sizing limits, disclaimers, education"
        - factor: "Regulatory backlash"
          probability: 0.15
          dilution_impact: 0.30
          mitigation: "FINMA pre-approval documented, compliance prominent"
        - factor: "Customer losses"
          probability: 0.50
          dilution_impact: 0.25
          mitigation: "Risk warnings, suitability checks, small allocations"
      protective_factors:
        brand_typicality: 0.85
        category_distance: 0.85  # High → failure attributed to crypto, not UBS
        brand_strength: 0.90
      net_dilution_risk: 0.12
      verdict: "Manageable — but higher than eSIM. Requires active risk framing."

  # =========================================================================
  # POSITIONING-SCORE MATRIX (5 Options × 5 Segments)
  # =========================================================================
  positioning_options:

    - id: "POS-ACCESS"
      name: "Access Provider"
      tagline: "UBS gives you access to crypto"
      brand_fit: 0.65      # Moderate — access is generic
      trust_leverage: 0.50  # Low — doesn't emphasise safety
      segment_resonance:
        SEG-CRYPTO-SELBST: 0.85   # LOVE IT — "finally access via UBS"
        SEG-CRYPTO-BEZIEH: 0.30   # "Access allein reicht nicht"
        SEG-CRYPTO-ORIENT: 0.25
        SEG-CRYPTO-SCHWELL: 0.15
        SEG-CRYPTO-TRADIT: 0.05
      strengths: "Klar, einfach, ehrlich"
      weaknesses: "Differenziert nicht von Crypto-Börsen"
      dilution_risk: 0.10

    - id: "POS-SECURITY"
      name: "Security Wrapper"
      tagline: "Crypto, made secure by UBS"
      brand_fit: 0.85      # HIGH — leverages core UBS asset
      trust_leverage: 0.90  # Highest!
      segment_resonance:
        SEG-CRYPTO-SELBST: 0.55   # "Sicherheit brauche ich nicht so"
        SEG-CRYPTO-BEZIEH: 0.80   # "Genau was ich brauche!"
        SEG-CRYPTO-ORIENT: 0.75
        SEG-CRYPTO-SCHWELL: 0.70  # Einzige Positionierung die funktioniert
        SEG-CRYPTO-TRADIT: 0.20   # Auch Sicherheit ändert Anti-Identität nicht
      strengths: "Nutzt UBS-Kernkompetenz, höchster Brand Fit"
      weaknesses: "Impliziert, dass Crypto unsicher ist (Framing-Risiko)"
      dilution_risk: 0.08

    - id: "POS-EXPERTISE"
      name: "Expertise Guide"
      tagline: "Navigate crypto with UBS expertise"
      brand_fit: 0.80
      trust_leverage: 0.75
      segment_resonance:
        SEG-CRYPTO-SELBST: 0.40   # "Brauche keine Anleitung"
        SEG-CRYPTO-BEZIEH: 0.75   # "Mein Berater als Guide"
        SEG-CRYPTO-ORIENT: 0.85   # LOVE IT — "endlich jemand, der erklärt"
        SEG-CRYPTO-SCHWELL: 0.50  # "Hilft, aber reicht nicht"
        SEG-CRYPTO-TRADIT: 0.15
      strengths: "Education-led, reduces knowledge gap"
      weaknesses: "Kann paternalistisch wirken"
      dilution_risk: 0.07

    - id: "POS-MODERN"
      name: "Modernisation"
      tagline: "UBS evolves with the market"
      brand_fit: 0.55
      trust_leverage: 0.40
      segment_resonance:
        SEG-CRYPTO-SELBST: 0.70
        SEG-CRYPTO-BEZIEH: 0.45
        SEG-CRYPTO-ORIENT: 0.40
        SEG-CRYPTO-SCHWELL: 0.20
        SEG-CRYPTO-TRADIT: 0.08
      strengths: "Zukunftsorientiert, dynamisch"
      weaknesses: "Kann beunruhigen ('Warum ändert sich meine Bank?')"
      dilution_risk: 0.20  # HIGHER — challenges traditional brand image

    - id: "POS-INNOVATION"
      name: "Innovation Leader"
      tagline: "UBS leads in digital assets"
      brand_fit: 0.40       # LOW — UBS is not perceived as innovator
      trust_leverage: 0.30
      segment_resonance:
        SEG-CRYPTO-SELBST: 0.60
        SEG-CRYPTO-BEZIEH: 0.25
        SEG-CRYPTO-ORIENT: 0.20
        SEG-CRYPTO-SCHWELL: 0.10
        SEG-CRYPTO-TRADIT: 0.03
      strengths: "Differenziert bei Tech-Segment"
      weaknesses: "UBS ist nicht innovativ konnotiert, Credibility Gap"
      dilution_risk: 0.30   # HIGHEST — biggest gap to brand identity

  # =========================================================================
  # POSITIONING RECOMMENDATION
  # =========================================================================
  positioning_recommendation:
    primary: "POS-SECURITY"
    rationale: |
      Security Wrapper hat den höchsten Brand Fit (0.85) und
      Trust Leverage (0.90). Es nutzt die UBS-Kernkompetenz als
      load-bearing pillar der Brand Extension.

      Entscheidend: Es funktioniert für die 3 grössten Segmente
      (Beziehungssuchende, Orientierungssuchende, Schwellenängstliche).

    secondary: "POS-EXPERTISE"
    secondary_rationale: |
      Für Orientierungssuchende (grösstes erreichbares Volumen in Phase 3)
      ist "Expertise Guide" noch resonanter als Security Wrapper.
      → Hybrid: "Secure & Guided"

    segment_specific_positioning:
      SEG-CRYPTO-SELBST: "POS-ACCESS"
      SEG-CRYPTO-BEZIEH: "POS-SECURITY"
      SEG-CRYPTO-ORIENT: "POS-EXPERTISE"
      SEG-CRYPTO-SCHWELL: "POS-SECURITY"
      SEG-CRYPTO-TRADIT: null  # Not targeted

    unified_positioning:
      headline: "Crypto. Sicher bei UBS."
      subline: "Bitcoin und Ethereum — mit der Sicherheit, die Sie von UBS kennen."
      segment_adaptations:
        SEG-CRYPTO-SELBST: "Jetzt Bitcoin und Ethereum direkt in der UBS App."
        SEG-CRYPTO-BEZIEH: "Ihr Berater erklärt Ihnen, wie Crypto in Ihr Portfolio passt."
        SEG-CRYPTO-ORIENT: "Crypto verstehen und sicher investieren — Schritt für Schritt."
        SEG-CRYPTO-SCHWELL: "Ab CHF 100 in Bitcoin investieren. Mit UBS Sicherheitsnetz."

# =============================================================================
# SECTION 5: Q4 — COMMUNICATION PATTERNS (MICRO)
# =============================================================================

module_Q4_patterns:

  description: |
    Kanalspezifische Kommunikationsmuster pro Segment und Journey-Phase.
    Inkl. Advisor Enablement und Trigger-Katalog.

  # =========================================================================
  # ADVISOR ENABLEMENT
  # =========================================================================
  advisor_enablement:
    description: |
      Berater sind der kritische Kanal für SEG-CRYPTO-BEZIEH (Phase 2).
      Sie brauchen Tools, Training und Confidence.

    advisor_barriers:
      - barrier: "Eigene Unsicherheit ('Ich kenne Crypto nicht')"
        parameter: "tau_advisor_crypto: 0.30"
        intervention: "Crypto-Crashkurs für Berater (2h + Cheat Sheet)"
      - barrier: "Compliance-Angst ('Darf ich das empfehlen?')"
        parameter: "regulatory_confidence: 0.40"
        intervention: "Compliance-FAQ + FINMA-Approved Stamp"
      - barrier: "Reputationsrisiko ('Was wenn Kunde verliert?')"
        parameter: "lambda_advisor_reputation: 2.8"
