# SECTION 8: COMPLEMENTARITY MATRIX
# =============================================================================

complementarity:
  description: |
    γ-Werte für Interaktionseffekte zwischen Interventionstypen.
    Basiert auf PAR-COMP-xxx Parameter aus Parameter-Registry.

  positive_synergies:
    - pair: "Advisor Training × Crypto Education"
      gamma: 0.25
      mechanism: "Berater vermittelt Wissen glaubwürdiger"
      ref: "PAR-COMP-001 (Identity × Social)"

    - pair: "Security Framing × Micro-Investment"
      gamma: 0.30
      mechanism: "Sicherheit + kleiner Einsatz = doppelte Barriere-Reduktion"

    - pair: "Social Proof × Education"
      gamma: 0.15
      mechanism: "Normalisierung + Verständnis verstärken sich"
      ref: "PAR-COMP-004 (Social × Warm Glow)"

    - pair: "App UX × Push-Notification"
      gamma: 0.20
      mechanism: "Trigger + einfacher Pfad = Conversion"

  negative_interactions:
    - pair: "Financial Incentive × Trust Narrative"
      gamma: -0.20
      mechanism: "Rabatte untergraben Vertrauenspositionierung"
      ref: "PAR-COMP-002 (Social × Financial Crowding-Out)"
      warning: "KEINE Crypto-Boni oder Cashback anbieten!"

    - pair: "Push Marketing × Traditionskunden"
