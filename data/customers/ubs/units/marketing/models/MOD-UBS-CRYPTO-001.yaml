# =============================================================================
# SECTION 7: UNIFIED ADOPTION SCORE
# =============================================================================

unified_model:

  adoption_score:
    formula: |
      Adoption(s) = CAS(s) × τ_final(s) × R(s) × (1 + Σⱼ γⱼ × Iⱼ)

      Wobei:
      - CAS(s) = Crypto Affinity Score
      - τ_final(s) = Trust Cascade Output
      - R(s) = Readiness (WAX)
      - γⱼ × Iⱼ = Complementarity-weighted Interventions
      - γ_ADVISOR_x_EDUCATION = +0.25 (Berater + Bildung verstärken sich)
      - γ_SECURITY_x_MICROENTRY = +0.30 (Sicherheit + kleiner Start)
      - γ_SOCIAL_x_FINANCIAL = -0.20 (Crowding-out! PAR-COMP-002)

  current_baseline:
    description: "Vor Interventionen — baseline Adoption Probability"
    by_segment:
      SEG-CRYPTO-SELBST:
        adoption_probability: 0.25   # Wollen, können, wissen
        revenue_potential: "Medium"   # Self-directed, low margin
      SEG-CRYPTO-BEZIEH:
        adoption_probability: 0.05   # Wollen nur mit Berater
        revenue_potential: "High"
      SEG-CRYPTO-ORIENT:
        adoption_probability: 0.02   # Kaum bereit
        revenue_potential: "Medium"
      SEG-CRYPTO-SCHWELL:
        adoption_probability: 0.005  # Fast null
        revenue_potential: "Low"
      SEG-CRYPTO-TRADIT:
        adoption_probability: 0.001
        revenue_potential: "Zero (don't target)"

  expected_with_interventions:
    description: "Nach Full-Rollout aller 4 Phasen (12 Monate)"
    by_segment:
      SEG-CRYPTO-SELBST:
        adoption_probability: 0.45
        lift: "+20pp"
        primary_driver: "App UX + Access simplification"
      SEG-CRYPTO-BEZIEH:
        adoption_probability: 0.15
        lift: "+10pp"
        primary_driver: "Advisor enablement + Trust transfer"
      SEG-CRYPTO-ORIENT:
        adoption_probability: 0.06
        lift: "+4pp"
        primary_driver: "Education + Social proof"
      SEG-CRYPTO-SCHWELL:
        adoption_probability: 0.02
        lift: "+1.5pp"
        primary_driver: "Micro-investment + Safety framing"
      SEG-CRYPTO-TRADIT:
        adoption_probability: 0.005
        lift: "+0.4pp"
        primary_driver: "Organic (Berater bei Nachfrage)"

