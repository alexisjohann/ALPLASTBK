  # ===========================================================================
  # D25: DO'S AND DON'TS COMMUNICATION GUIDE
  # Konkrete Beispiele für jeden Kanal und jedes Segment
  # ===========================================================================
  D25_dos_and_donts:
    description: |
      Strukturierter Guide mit konkreten Beispielen.
      Basiert auf Complementarity Matrix, Tonality Guidelines und
      Brand Extension Risk Analysis.

    universal_dos:
      - do: "Crypto als Portfolio-ERGÄNZUNG positionieren (1-5%)"
        reason: "Rahmt Risiko als kontrollierbar"
        example: "Bitcoin als Beimischung — so ergänzen Sie Ihr Portfolio."

      - do: "UBS-Verwahrung und FINMA-Regulierung IMMER erwähnen"
        reason: "Grösster Trust-Differentiator (τ_ubs)"
        example: "Verwahrt bei UBS. Reguliert durch die FINMA."

      - do: "Einfache Sprache verwenden (Flesch-Kincaid ≤ 10)"
        reason: "80% der Zielgruppe sind keine Crypto-Experten"
        example: "Bitcoin kaufen. In der UBS App. In 60 Sekunden."

      - do: "Immer einen konkreten nächsten Schritt anbieten"
        reason: "Reduziert Effort-Barriere (ε_effort)"
        example: "Mehr erfahren → Berater kontaktieren → Jetzt starten"

      - do: "Portfolio-Kontext zeigen (Crypto IN Portfolio, nicht isoliert)"
        reason: "Reduziert wahrgenommenes Risiko um ~30%"
        example: "[Grafik: Portfolio mit 97% traditionell + 3% Crypto]"

    universal_donts:
      - dont: "Crypto als 'Revolution' oder 'Zukunft des Geldes' framen"
        reason: "Widerspricht UBS-Positionierung, verunsichert konservative Kunden"
        bad_example: "Die Blockchain-Revolution — jetzt bei UBS!"

      - dont: "Rendite-Versprechen oder -Implikationen machen"
        reason: "Regulatorisch problematisch + Enttäuschungsrisiko"
        bad_example: "Bitcoin hat 2024 +150% gemacht — verpassen Sie nicht 2025!"

      - dont: "FOMO oder Zeitdruck erzeugen"
        reason: "Untergräbt Trust-Positionierung (γ = -0.15)"
        bad_example: "Nur noch diese Woche: 0% Gebühren auf Ihren ersten Crypto-Kauf!"

      - dont: "Traditionskunden aktiv mit Crypto ansprechen"
        reason: "ι_crypto = -0.20 → Cognitive Dissonance → Brand Damage"
        bad_example: "[Email an alle:] 'Crypto ist bei UBS angekommen!'"

      - dont: "Crypto-Jargon verwenden (HODL, Moon, Lambo, DeFi)"
        reason: "Untergräbt professionelles Image"
        bad_example: "Bitcoin HODLN — jetzt im UBS-Depot!"

      - dont: "Finanzielle Anreize für Crypto-Käufe bieten"
        reason: "Crowding-out (γ = -0.20, PAR-COMP-002)"
        bad_example: "CHF 50 Bonus auf Ihren ersten Bitcoin-Kauf!"

      - dont: "Crypto mit Innovation/Modernisierung der Bank gleichsetzen"
        reason: "Dilution Risk (0.20 für POS-MODERN)"
        bad_example: "UBS wird digital — entdecken Sie unsere Crypto-Welt!"

    channel_specific:
      app:
        dos:
          - "Crypto als Tab neben Aktien, Fonds, 3a einbetten (Normalisierung)"
          - "Volatilitäts-Anzeige prominent aber sachlich zeigen"
          - "One-Click-Buy mit klarer Bestätigungsseite"
        donts:
          - "KEIN Pop-up 'Neu: Crypto!' beim App-Start (Intrusiv)"
          - "KEINE Push-Notifications bei jedem Kurssprung"
          - "KEIN Gamification-Design (Konfetti, Badges für Käufe)"

      advisor:
        dos:
          - "Crypto nur ansprechen, wenn es zum Kundenprofil passt"
          - "Portfolio-Simulator zeigen ('Was wäre wenn 3% Crypto?')"
          - "Bei Ablehnung respektieren — nicht insistieren"
        donts:
          - "NICHT bei jedem Gespräch Crypto erwähnen (Ermüdung)"
          - "NICHT bei Traditionskunden proaktiv ansprechen"
          - "KEINE eigene Meinung zu Crypto-Kursen äussern"

      email:
        dos:
          - "Segment-spezifische Betreffzeile (nicht generisch)"
          - "Maximal 1 Crypto-Email pro Monat (kein Spam)"
          - "Immer Opt-out für Crypto-Kommunikation anbieten"
        donts:
          - "NICHT an Traditionskunden senden"
          - "KEINE täglichen Kurs-Updates"
          - "NICHT 'Letzte Chance' oder Urgency im Betreff"

      events:
        dos:
          - "Education-Format wählen (nicht Sales-Pitch)"
          - "Q&A-Möglichkeit einbauen"
          - "Experten einladen (UBS CIO, externer Akademiker)"
        donts:
          - "KEIN Crypto-Evangelismus"
          - "NICHT 'exklusiv' oder 'VIP' framen"
          - "NICHT nur Kurshistorie zeigen (Cherry-Picking)"

    segment_specific:
      SEG-CRYPTO-SELBST:
        dos:
          - "Technische Details bereitstellen (Custody-Lösung, Pricing-Modell)"
          - "Vergleich mit Crypto-Börsen ehrlich zeigen (Pro + Contra)"
          - "API/Export-Optionen für Steuer-Tools anbieten"
        donts:
          - "NICHT belehren — sie wissen mehr als der Durchschnitt"
          - "NICHT zu viel Sicherheits-Messaging (wirkt bevormundend)"

      SEG-CRYPTO-BEZIEH:
        dos:
          - "Berater-Empfehlung als Auslöser nutzen"
          - "Persönliche Erfolgsgeschichten teilen (Testimonials)"
          - "Gemeinsame Portfolio-Planung inkl. Crypto anbieten"
        donts:
          - "NICHT via App/Email ohne Berater-Kontakt aktivieren"
          - "NICHT suggerieren, dass der Berater Crypto 'verordnet'"

      SEG-CRYPTO-ORIENT:
        dos:
          - "Schritt-für-Schritt-Guides anbieten"
          - "Social Proof stark betonen"
          - "Webinar mit Q&A als Einstieg"
        donts:
          - "NICHT mit Fachbegriffen überfordern"
          - "NICHT sofort zum Kauf auffordern — erst educate"

      SEG-CRYPTO-SCHWELL:
        dos:
          - "Micro-Investment-Option prominent zeigen (ab CHF 100)"
          - "Sicherheitselemente visuell hervorheben"
          - "Exit-Möglichkeit betonen ('Sie können jederzeit verkaufen')"
        donts:
          - "NICHT mit grossen Beträgen argumentieren"
          - "NICHT Volatilität herunterspielen"

      SEG-CRYPTO-TRADIT:
        dos:
          - "Nur auf ANFRAGE des Kunden reagieren"
          - "Respektvolle Einordnung: 'Muss nicht für jeden passen'"
          - "Bei Interesse: Security Wrapper Positionierung nutzen"
        donts:
          - "NIEMALS proaktiv ansprechen"
          - "NICHT suggerieren, dass sie 'den Anschluss verpassen'"
          - "NICHT als 'altmodisch' oder 'risikoavers' labeln"

