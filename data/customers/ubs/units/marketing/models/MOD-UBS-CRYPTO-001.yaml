      - tool: "Risk Comparison Visual"
        format: "iPad-Präsentation"
        content: "Crypto-Volatilität im Vergleich zu Aktien, Rohstoffen"

  # =========================================================================
  # TRIGGER-MOMENT-KATALOG
  # =========================================================================
  trigger_catalogue:
    description: |
      Optimale Momente für Crypto-Kommunikation pro Segment.

    triggers:
      - trigger: "Bitcoin-Kurs durchbricht ATH"
        type: "market_event"
        channel: "Push-Notification + Email"
        message_selbst: "BTC neues ATH. Jetzt in der UBS App verfügbar."
        message_orient: "Bitcoin erreicht neues Hoch — was das für Sie bedeutet."
        timing: "Innerhalb 4h"
        risk: "FOMO — Disclaimer integrieren"

      - trigger: "Portfolio-Review-Termin"
        type: "scheduled"
        channel: "Beratungsgespräch"
        message: "Haben Sie schon über eine kleine Crypto-Beimischung nachgedacht?"
        timing: "Quartals-Review"
        primary_segments: [SEG-CRYPTO-BEZIEH, SEG-CRYPTO-ORIENT]

      - trigger: "Neuer Geldzufluss (Bonus, Erbschaft)"
        type: "transaction_event"
        channel: "App-Notification + Berater-Alert"
        message: "Neues Geld angelegt? Entdecken Sie Crypto als Ergänzung."
        timing: "3-7 Tage nach Eingang"
        primary_segments: [SEG-CRYPTO-SELBST, SEG-CRYPTO-BEZIEH]

      - trigger: "Kunde sucht 'Bitcoin' in App"
        type: "intent_signal"
        channel: "In-App Guidance"
        message: "Interessiert an Bitcoin? Hier erfahren Sie mehr."
        timing: "Sofort"
        primary_segments: [SEG-CRYPTO-SELBST, SEG-CRYPTO-ORIENT]

      - trigger: "6 Monate nach Launch (keine Aktion)"
        type: "time_based"
        channel: "Email + optional Berater"
        message: "Tausende UBS-Kunden investieren bereits in Crypto. Interesse?"
        timing: "6 Monate post-Launch"
        primary_segments: [SEG-CRYPTO-ORIENT]
        note: "Social Proof Nudge"

      - trigger: "Regulatorisches Positivereignis"
        type: "external_event"
        channel: "Newsletter"
        message: "Neue Regulierung stärkt Crypto-Sicherheit. Was das für Sie bedeutet."
        timing: "Innerhalb 1 Woche"
        primary_segments: [SEG-CRYPTO-SCHWELL, SEG-CRYPTO-ORIENT]

  # =========================================================================
  # CHANNEL-STRATEGIE PRO SEGMENT
  # =========================================================================
  channel_strategy:
    SEG-CRYPTO-SELBST:
      primary: "CH-APP"
      secondary: "CH-EBANKING"
      tone: "Direkt, informativ, keine Bevormundung"
      cta: "Jetzt Bitcoin kaufen"
      friction_target: "< 3 Klicks zum Kauf"
      content_type: "Product features, Pricing, Portfolio tools"

    SEG-CRYPTO-BEZIEH:
      primary: "CH-ADVISOR"
      secondary: "CH-EMAIL"
      tone: "Persönlich, vertrauensvoll, empfehlend"
      cta: "Sprechen Sie mit Ihrem Berater"
      friction_target: "Berater initiiert Gespräch"
      content_type: "Trust signals, Advisor recommendations, Testimonials"

    SEG-CRYPTO-ORIENT:
      primary: "CH-EVENT"
      secondary: ["CH-EMAIL", "CH-APP"]
      tone: "Erklärend, schrittweise, ermunternd"
      cta: "Mehr erfahren"
      friction_target: "Education → Interest → Small first step"
      content_type: "Webinars, Explainers, Social proof, Small-amount entry"

    SEG-CRYPTO-SCHWELL:
      primary: "CH-APP"
      secondary: "CH-ADVISOR"
      tone: "Beruhigend, sicherheitsbetont, barrierefrei"
      cta: "Ab CHF 100 starten"
      friction_target: "Micro-Investment, kein Mindestwert"
      content_type: "Safety guarantees, Micro-entry, Risk comparison"

# =============================================================================
# SECTION 6: TRUST-KASKADE CRYPTO LAYER
# =============================================================================
# Based on A2_trust_kaskade_mortgage_gpt.yaml, adapted for crypto

trust_cascade_crypto:

  description: |
    6-Layer Trust Cascade, adaptiert von Mortgage-Modell (A2).
    Zeigt Vertrauens-Erosion von UBS-Brand zu Crypto-Produkt.
    Formel: τ_final = τ_brand × δ_digital × δ_crypto_asset × δ_novelty × Ψ_combined

  layers:
    - layer: 1
      name: "Institutional Trust"
      description: "Vertrauen in Schweizer Bankensystem"
      value: 0.82
      source: "banking-ch_industry_context.yaml"

    - layer: 2
      name: "Brand Trust (τ_UBS)"
      description: "Vertrauen in UBS als Marke"
      by_segment:
        SEG-CRYPTO-SELBST: 0.75
        SEG-CRYPTO-BEZIEH: 0.85
        SEG-CRYPTO-ORIENT: 0.70
        SEG-CRYPTO-SCHWELL: 0.75
        SEG-CRYPTO-TRADIT: 0.85

    - layer: 3
      name: "Digital Trust (δ_digital)"
      description: "Vertrauen in digitalen Kanal"
      value: 0.82
      source: "GMA-001 Trust-Kaskade"
      note: "Identisch mit Mortgage-Modell"

    - layer: 4
      name: "Crypto Asset Trust (δ_crypto)"
      description: "Vertrauen in Crypto als Asset-Klasse"
      by_segment:
        SEG-CRYPTO-SELBST: 0.80
        SEG-CRYPTO-BEZIEH: 0.35
        SEG-CRYPTO-ORIENT: 0.25
        SEG-CRYPTO-SCHWELL: 0.15
        SEG-CRYPTO-TRADIT: 0.10
      note: "GRÖSSTER TRUST-DROP — hier passiert die Erosion"

    - layer: 5
      name: "Novelty Penalty (δ_novelty)"
      description: "Vertrauens-Abschlag für neues UBS-Angebot"
      value: 0.85
      note: "Neu = unsicher, reduziert sich über Zeit"

    - layer: 6
      name: "Context Modifier (Ψ_combined)"
      description: "Markt-Sentiment, Regulierung, Medien"
      value: 1.05
      components:
        psi_regulatory: 1.10   # FINMA-approved = boost
        psi_market: 1.05       # Bull market
        psi_media: 0.95        # Mixed media coverage
        psi_peers: 1.05        # Increasing crypto normalisation

  trust_calculation:
    formula: "τ_final(s) = τ_institutional × τ_brand(s) × δ_digital × δ_crypto(s) × δ_novelty × Ψ"

    results_by_segment:
      SEG-CRYPTO-SELBST:
        calculation: "0.82 × 0.75 × 0.82 × 0.80 × 0.85 × 1.05"
        tau_final: 0.362
        trust_erosion_pct: 0.52  # 52% Erosion von Brand Trust
        bottleneck: "δ_digital (will Wallet-Kontrolle)"

      SEG-CRYPTO-BEZIEH:
        calculation: "0.82 × 0.85 × 0.82 × 0.35 × 0.85 × 1.05"
        tau_final: 0.178
        trust_erosion_pct: 0.79  # 79% Erosion!
        bottleneck: "δ_crypto (Asset-Klasse unbekannt)"

      SEG-CRYPTO-ORIENT:
        calculation: "0.82 × 0.70 × 0.82 × 0.25 × 0.85 × 1.05"
        tau_final: 0.105
        trust_erosion_pct: 0.85
        bottleneck: "δ_crypto + knowledge gap"

      SEG-CRYPTO-SCHWELL:
        calculation: "0.82 × 0.75 × 0.82 × 0.15 × 0.85 × 1.05"
        tau_final: 0.064
        trust_erosion_pct: 0.91  # 91% Erosion!
        bottleneck: "δ_crypto + λ_crypto (Doppelbarriere)"

      SEG-CRYPTO-TRADIT:
        calculation: "0.82 × 0.85 × 0.82 × 0.10 × 0.85 × 1.05"
        tau_final: 0.051
        trust_erosion_pct: 0.94  # 94% Erosion
        bottleneck: "δ_crypto + ι_crypto (Anti-Identität)"

  sensitivity_analysis:
    biggest_lever: "δ_crypto (Layer 4)"
    lever_contribution_pct: 0.55  # 55% der Variation
    second_lever: "τ_brand (Layer 2)"
    second_contribution_pct: 0.20
    implication: |
      CRYPTO ASSET TRUST ist der grösste Hebel.
      Interventionen müssen hier ansetzen:
      1. Education (Crypto verstehen → δ_crypto ↑)
      2. UBS-Wrapper (Sicherheit → δ_crypto ↑)
      3. Social Proof (Andere tun es → δ_crypto ↑)
      4. Small Entry (Micro-Investment → Risiko erlebbar machen)

  trust_building_interventions:
    - intervention: "Crypto Education Series"
      target_layer: 4
      expected_delta_lift: "+0.10 to +0.15"
      primary_segments: [SEG-CRYPTO-ORIENT, SEG-CRYPTO-BEZIEH]

    - intervention: "UBS Crypto Safety Guarantee"
      target_layer: 4
      expected_delta_lift: "+0.10 to +0.20"
      description: "Explizite Sicherheitsversprechen (Custody, Insurance)"
      primary_segments: [SEG-CRYPTO-SCHWELL, SEG-CRYPTO-BEZIEH]

    - intervention: "Advisor Crypto Confidence"
      target_layer: 2
      expected_delta_lift: "+0.05 to +0.08"
      description: "Berater vermittelt Trust → τ_brand steigt"
      primary_segments: [SEG-CRYPTO-BEZIEH]

    - intervention: "Micro-Investment Option (ab CHF 100)"
      target_layer: 4
      expected_delta_lift: "+0.05 to +0.10"
      description: "Kleine Beträge → erlebbare Erfahrung → Trust durch Handlung"
      primary_segments: [SEG-CRYPTO-SCHWELL, SEG-CRYPTO-ORIENT]

# =============================================================================
# SECTION 7: UNIFIED ADOPTION SCORE
# =============================================================================

unified_model:

  adoption_score:
    formula: |
      Adoption(s) = CAS(s) × τ_final(s) × R(s) × (1 + Σⱼ γⱼ × Iⱼ)

      Wobei:
      - CAS(s) = Crypto Affinity Score
      - τ_final(s) = Trust Cascade Output
      - R(s) = Readiness (WAX)
      - γⱼ × Iⱼ = Complementarity-weighted Interventions
      - γ_ADVISOR_x_EDUCATION = +0.25 (Berater + Bildung verstärken sich)
      - γ_SECURITY_x_MICROENTRY = +0.30 (Sicherheit + kleiner Start)
      - γ_SOCIAL_x_FINANCIAL = -0.20 (Crowding-out! PAR-COMP-002)

  current_baseline:
    description: "Vor Interventionen — baseline Adoption Probability"
    by_segment:
      SEG-CRYPTO-SELBST:
        adoption_probability: 0.25   # Wollen, können, wissen
        revenue_potential: "Medium"   # Self-directed, low margin
      SEG-CRYPTO-BEZIEH:
        adoption_probability: 0.05   # Wollen nur mit Berater
        revenue_potential: "High"
      SEG-CRYPTO-ORIENT:
        adoption_probability: 0.02   # Kaum bereit
        revenue_potential: "Medium"
      SEG-CRYPTO-SCHWELL:
        adoption_probability: 0.005  # Fast null
        revenue_potential: "Low"
      SEG-CRYPTO-TRADIT:
        adoption_probability: 0.001
        revenue_potential: "Zero (don't target)"

  expected_with_interventions:
    description: "Nach Full-Rollout aller 4 Phasen (12 Monate)"
    by_segment:
      SEG-CRYPTO-SELBST:
        adoption_probability: 0.45
        lift: "+20pp"
        primary_driver: "App UX + Access simplification"
      SEG-CRYPTO-BEZIEH:
        adoption_probability: 0.15
        lift: "+10pp"
        primary_driver: "Advisor enablement + Trust transfer"
      SEG-CRYPTO-ORIENT:
        adoption_probability: 0.06
        lift: "+4pp"
        primary_driver: "Education + Social proof"
      SEG-CRYPTO-SCHWELL:
        adoption_probability: 0.02
        lift: "+1.5pp"
        primary_driver: "Micro-investment + Safety framing"
      SEG-CRYPTO-TRADIT:
        adoption_probability: 0.005
        lift: "+0.4pp"
        primary_driver: "Organic (Berater bei Nachfrage)"

