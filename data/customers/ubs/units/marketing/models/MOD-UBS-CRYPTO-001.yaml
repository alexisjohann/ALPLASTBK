operational_deliverables:

  # ===========================================================================
  # D4: BARRIER TAXONOMY
  # Explizite Klassifikation: kognitiv / emotional / sozial / strukturell
  # ===========================================================================
  D4_barrier_taxonomy:
    description: |
      Systematische Barrieren-Taxonomie für Crypto-Adoption pro Segment.
      4 Barrierentypen × 5 Segmente mit Intensität (0-1) und Hebel.

    barrier_types:
      cognitive:
        name: "Kognitive Barrieren"
        description: "Wissensdefizite, Komplexität, Informationsüberlastung"
        indicators: ["knowledge_crypto", "A_action", "A_benefit"]

      emotional:
        name: "Emotionale Barrieren"
        description: "Angst, Unsicherheit, Kontrollverlust, Regret-Aversion"
        indicators: ["lambda_crypto", "tau_crypto", "A_risk"]

      social:
        name: "Soziale Barrieren"
        description: "Peer-Druck, Stigma, Identitätskonflikt"
        indicators: ["iota_crypto", "sigma_crypto_peers"]

      structural:
        name: "Strukturelle Barrieren"
        description: "Aufwand, Prozess-Friction, Default-Effekte"
        indicators: ["epsilon_effort", "kappa_default"]

    barrier_matrix:
      SEG-CRYPTO-SELBST:
        cognitive: 0.15     # Weiss viel, kennt aber UBS-Prozess nicht
        emotional: 0.20     # Geringe Angst, aber will Kontrolle behalten
        social: 0.10        # Peers sind pro-Crypto
        structural: 0.30    # Will es SOFORT und EINFACH — UBS-Friction stört
        primary_barrier: "structural"
        primary_lever: "App UX: < 3 Klicks zum Kauf"

      SEG-CRYPTO-BEZIEH:
        cognitive: 0.55     # Weiss wenig über Crypto
        emotional: 0.65     # Angst vor Verlust — braucht Berater-Beruhigung
        social: 0.35        # Peers neutral, Berater ist Referenz
        structural: 0.40    # Moderate — nimmt sich Zeit wenn Berater empfiehlt
        primary_barrier: "emotional"
        primary_lever: "Advisor Trust Transfer: Berater empfiehlt aktiv"

      SEG-CRYPTO-ORIENT:
        cognitive: 0.80     # Versteht Crypto kaum
        emotional: 0.70     # Starke Unsicherheit
        social: 0.50        # Schaut auf Nachbarn — braucht Social Proof
        structural: 0.60    # Braucht extrem einfachen Einstieg
        primary_barrier: "cognitive"
        primary_lever: "Education + Social Proof: 'So einfach geht's'"

      SEG-CRYPTO-SCHWELL:
        cognitive: 0.85     # Fast kein Wissen
        emotional: 0.90     # Extreme Angst — dominante Barriere
        social: 0.45        # Peers investieren nicht → kein Pull
        structural: 0.80    # Jede Hürde stoppt den Prozess
        primary_barrier: "emotional"
        primary_lever: "Micro-Entry (CHF 100) + Safety Guarantee"

      SEG-CRYPTO-TRADIT:
        cognitive: 0.70     # Wenig Wissen, aber auch kein Interesse
        emotional: 0.75     # Misstraut Crypto
        social: 0.80        # Peers lehnen Crypto ab → sozialer Druck GEGEN
        structural: 0.50
        primary_barrier: "social"
        primary_lever: "KEINER — Anti-Identität. Nicht ansprechen."

    intervention_mapping:
      cognitive_barriers:
        - intervention: "Crypto Education Series (Webinar, 30 Min)"
          target: ["SEG-CRYPTO-ORIENT", "SEG-CRYPTO-BEZIEH"]
          expected_reduction: "-0.20"
        - intervention: "In-App Micro-Learning (60 Sek Nuggets)"
          target: ["SEG-CRYPTO-ORIENT", "SEG-CRYPTO-SCHWELL"]
          expected_reduction: "-0.10"
        - intervention: "Advisor Crypto Cheat Sheet"
          target: ["SEG-CRYPTO-BEZIEH"]
          expected_reduction: "-0.15"

      emotional_barriers:
        - intervention: "UBS Safety Guarantee Framing"
          target: ["SEG-CRYPTO-SCHWELL", "SEG-CRYPTO-BEZIEH"]
          expected_reduction: "-0.15"
        - intervention: "Portfolio Context (1-5% Beimischung)"
          target: ["SEG-CRYPTO-BEZIEH", "SEG-CRYPTO-ORIENT"]
          expected_reduction: "-0.20"
        - intervention: "Loss Limitation (Max-Loss-Anzeige)"
          target: ["SEG-CRYPTO-SCHWELL"]
          expected_reduction: "-0.10"

      social_barriers:
        - intervention: "Social Proof ('X% UBS-Kunden investieren bereits')"
          target: ["SEG-CRYPTO-ORIENT"]
          expected_reduction: "-0.15"
        - intervention: "Advisor Endorsement"
          target: ["SEG-CRYPTO-BEZIEH"]
          expected_reduction: "-0.20"

      structural_barriers:
        - intervention: "One-Click Crypto Buy (App)"
          target: ["SEG-CRYPTO-SELBST"]
          expected_reduction: "-0.20"
        - intervention: "Micro-Investment ab CHF 100"
          target: ["SEG-CRYPTO-SCHWELL", "SEG-CRYPTO-ORIENT"]
