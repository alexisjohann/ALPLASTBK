# =============================================================================
# EXECUTIVE SUMMARY
# =============================================================================

executive_summary:
  headline: |
    Erweiterung der BEATRIX-Zusammenarbeit von CoE Experience Design
    auf UBS Marketing - wissenschaftlich fundierte Kooperationsmodelle
    als Grundlage für verhaltensbasierte Kampagnen.

  opportunity: |
    Der laufende BEATRIX Pilot (Save & Invest) mit CoE Experience Design
    generiert Erkenntnisse, die direkt in Marketing-Kampagnen übersetzt
    werden können. Eine erweiterte Zusammenarbeit mit dem Marketing
    Department ermöglicht:

    1. Nahtlose Übersetzung von Journey-Design in Kampagnen-Messaging
    2. Wissenschaftlich fundierte Segmentierung auf Basis von Kooperationsmodellen
    3. Evidence-based Social Proof und Identity-basiertes Marketing
    4. Messbare ROI-Steigerung durch verhaltensbasierte Optimierung

  key_value_proposition: |
    Marketing-Chef Aydin Sahin erhält Zugang zu:
    - Verhaltensökonomischen Kooperationsmodellen (Fehr, Fischbacher, Akerlof)
    - BEATRIX-Simulationen für Kampagnen-Optimierung
    - Segment-spezifischen Messaging-Empfehlungen
    - Integration mit CoE XD für End-to-End Behavior Design

# =============================================================================
# WISSENSCHAFTLICHE BASIS: KOOPERATIONSMODELLE
# =============================================================================

scientific_foundation:
  title: "Kooperationsmodelle als Grundlage für Marketing"

  rationale: |
    Erfolgreiches Marketing basiert fundamental auf KOOPERATION:
    - Kunde kooperiert mit Marke (Vertrauen, Engagement)
    - Kunde kooperiert mit anderen Kunden (Social Proof, Referrals)
    - Kunde kooperiert mit zukünftigem Selbst (Sparen, Investieren)

    Die Verhaltensökonomie bietet rigorose Modelle, die diese
    Kooperationsdynamiken erklären und vorhersagen können.

  # ==========================================================================
  # PRIMÄRMODELL 1: Conditional Cooperation (Fischbacher et al. 2001)
  # ==========================================================================
  model_1:
    id: "MS-SP-008"
    name: "Conditional Cooperation"
    authors: "Fischbacher, Gächter, Fehr"
    year: 2001

    core_insight: |
      50% der Menschen sind "bedingte Kooperateure" - sie kooperieren,
      wenn sie glauben, dass andere auch kooperieren.

    ebf_restriction: "C_ij conditional on others"
    validity: "Public goods, team production, collective action"

    marketing_application:
      mechanism: "Social Proof Kampagnen"

      why_relevant: |
        UBS-Kunden investieren eher, wenn sie wissen, dass ähnliche
        Kunden bereits investieren. Dies ist kein "Herdentrieb",
        sondern rationale bedingte Kooperation.

      campaign_examples:
        - type: "Quantitative Social Proof"
          message: "83% der UBS-Kunden in Ihrer Altersgruppe haben bereits einen Sparplan"
          target_segment: "Cash-only, Cautious Savers"
          expected_lift: "+15-25% Conversion"

        - type: "Trend Social Proof"
          message: "Diesen Monat haben 12'000 UBS-Kunden einen Key4-Sparplan eröffnet"
          target_segment: "All segments"
          expected_lift: "+10-15% Engagement"

        - type: "Peer Social Proof"
          message: "Kunden wie Sie investieren durchschnittlich CHF 450/Monat"
          target_segment: "Invested elsewhere"
          expected_lift: "+20-30% with UBS"

      parameters:
        sigma_social_peer: 0.65  # Effect strength with peer reference
        sigma_social_generic: 0.35  # Effect strength with generic reference
        threshold_percentage: 0.50  # >50% for positive effect

      warnings:
        - warning: "Backfire Risk bei <50%"
          description: "Wenn <50% der Referenzgruppe das Verhalten zeigen, kann Social Proof negativ wirken"
          mitigation: "Nur Segmente/Regionen mit >50% verwenden"

        - warning: "Glaubwürdigkeit"
          description: "Übertriebene Zahlen werden als unglaubwürdig wahrgenommen"
          mitigation: "Verifizierbare, spezifische Zahlen verwenden"

  # ==========================================================================
  # PRIMÄRMODELL 2: Social Image (Bénabou & Tirole 2006)
  # ==========================================================================
  model_2:
    id: "MS-SP-007"
    name: "Social Image"
    authors: "Bénabou, Tirole"
    year: 2006

    core_insight: |
      Menschen handeln teilweise, um ein positives Bild bei anderen
      zu erzeugen - und bei sich selbst.

    ebf_restriction: "U_image > 0, Ψ_visibility matters"
    validity: "Prosocial behavior, conspicuous consumption"

    marketing_application:
      mechanism: "Image-basiertes Marketing"

      why_relevant: |
        Investieren kann als Ausdruck von Verantwortung, Klugheit
        und Weitsicht positioniert werden. Kunden wollen als
        "kluge Investoren" gesehen werden - von anderen und sich selbst.

      campaign_examples:
        - type: "Self-Image Activation"
          message: "Kluge Sparer investieren - wann starten Sie?"
          target_segment: "Ready but Confused"
          expected_lift: "+10-15% Conversion"

        - type: "Social Visibility"
          message: "Teilen Sie Ihren Investment-Meilenstein"
          target_segment: "Younger segments (25-40)"
          expected_lift: "Organic reach, brand advocacy"

        - type: "Legacy/Responsibility Frame"
          message: "Die nächste Generation wird es Ihnen danken"
          target_segment: "Parents, 35-55"
          expected_lift: "+15-20% Conversion"

        - type: "ESG/Values"
          message: "Investieren Sie nach Ihren Werten"
          target_segment: "Value-conscious"
          expected_lift: "+10-15% Premium willingness"

      parameters:
        iota_visibility_public: 0.75  # Effect with social visibility
        iota_visibility_private: 0.45  # Effect without (self-image only)

      warnings:
        - warning: "Schweizer Kultur"
          description: "CH-Kultur ist zurückhaltend - nicht 'prahlerisch' wirken"
          mitigation: "Subtile Messaging, 'Verantwortung' statt 'Erfolg'"

        - warning: "Crowding Out"
          description: "Extrinsische Image-Motive können intrinsische verdrängen"
          mitigation: "Balance mit informativen Elementen"

  # ==========================================================================
  # PRIMÄRMODELL 3: Identity Economics (Akerlof & Kranton 2000)
  # ==========================================================================
  model_3:
    id: "MS-IB-001"
    name: "Identity Economics"
    authors: "Akerlof, Kranton"
    year: 2000

    core_insight: |
      Menschen handeln konsistent mit ihrer Identität. Wenn "Investieren"
      nicht zu ihrer Identität passt, werden sie nicht investieren -
      unabhängig von rationalen Argumenten.

    ebf_restriction: "U_IDN > 0, psi_category salient"
    validity: "Education, labor, health, finance"

    marketing_application:
      mechanism: "Identitäts-basierte Segmentierung und Messaging"

      why_relevant: |
        Die Hauptbarriere vieler Nicht-Investoren ist nicht Wissen oder
        Angst, sondern: "Investieren ist nichts für Leute wie mich."
        Marketing muss die Identität erweitern, nicht nur informieren.

      campaign_examples:
        - type: "Identity Expansion"
          message: "Sie sind bereits ein Investor - Sie wissen es nur noch nicht"
          target_segment: "Cash-only, identity barrier"
          expected_lift: "+20-30% Consideration"

        - type: "In-Group Activation"
          message: "UBS-Kunden denken langfristig"
          target_segment: "Brand-loyal UBS clients"
          expected_lift: "+15-20% Cross-sell"

        - type: "Identity Quiz"
          message: "Welcher Anlegertyp sind Sie?"
          target_segment: "Engaged but undecided"
          expected_lift: "+25-35% Engagement"

        - type: "Role-based"
          message: "Als Eltern investieren Sie in die Zukunft"
          target_segment: "Parents"
          expected_lift: "+15-25% Conversion"

      identity_personas:
        - persona_id: "P1"
          name: "Der Sicherheitsbewusste"
          identity_core: "Verantwortungsvoll, vorsichtig, schützt Familie"
          messaging_angle: "Kapitalschutz, Absicherung, keine Experimente"
          products: ["Key4 Conservative", "3a ETF"]

        - persona_id: "P2"
          name: "Der Erfolgreiche"
          identity_core: "Leistungsorientiert, smart, zukunftsgerichtet"
          messaging_angle: "Performance, Wachstum, kluge Entscheidungen"
          products: ["Key4 Growth", "Individual mandates"]

        - persona_id: "P3"
          name: "Der Verantwortungsvolle"
          identity_core: "Werte-orientiert, nachhaltig, gesellschaftlich"
          messaging_angle: "ESG, Impact, Verantwortung"
          products: ["Sustainable Investing", "ESG ETFs"]

        - persona_id: "P4"
          name: "Der Moderne"
          identity_core: "Digital, effizient, unkompliziert"
          messaging_angle: "App, Automatisierung, Einfachheit"
          products: ["Key4 Smart", "Robo-Advisor"]

      parameters:
        identity_fit_high: 0.85  # Conversion probability when identity match
        identity_fit_low: 0.25  # Conversion probability when identity mismatch

      warnings:
        - warning: "Stereotyping"
          description: "Zu rigide Personas können ausschliessend wirken"
          mitigation: "Überlappende Identitäten erlauben"

# =============================================================================
# SYNERGIEN: CoE EXPERIENCE DESIGN <-> MARKETING
# =============================================================================

synergies:
  title: "Cross-Unit Synergien"

  strategic_value: |
    Die Kombination von CoE Experience Design und Marketing schafft
    einen End-to-End Behavioral Design Loop:

    1. CoE XD: Journey-Diagnose → Barrieren identifizieren
    2. Marketing: Kampagnen → Awareness und Consideration steigern
    3. CoE XD: Landing Page → Conversion optimieren
    4. Marketing: Retention → Engagement erhalten
    5. Beide: Learnings → Continuous Improvement

  workflow_integration:
    description: "BEATRIX als gemeinsame Sprache"

    phases:
      - phase: "1. Behavioral Diagnosis (CoE XD)"
        owner: "CoE Experience Design"
        beatrix_role: "Segment-spezifische Barrieren modellieren"
        output: "Barrieren-Profile, Segment-Priorisierung"
        handoff_to: "Marketing"

      - phase: "2. Campaign Design (Marketing)"
        owner: "Marketing"
        beatrix_role: "Messaging per Segment simulieren"
        output: "Kampagnen-Konzepte, Messaging-Matrix"
        handoff_to: "CoE XD"

      - phase: "3. Journey Design (CoE XD)"
        owner: "CoE Experience Design"
        beatrix_role: "Landing Page Varianten simulieren"
        output: "Design-Recommendations, A/B-Test-Plan"
        handoff_to: "Marketing"

      - phase: "4. Campaign Execution (Marketing)"
        owner: "Marketing"
        beatrix_role: "Performance-Monitoring, Real-time Optimization"
        output: "Kampagnen-KPIs, Learnings"
        handoff_to: "Both"

      - phase: "5. Learning Loop (Both)"
        owner: "Shared"
        beatrix_role: "Model-Update, Parameter-Refinement"
        output: "Updated behavioral models"
        handoff_to: "Next cycle"

  shared_resources:
    - resource: "Segment-Definitionen"
      owner: "Shared"
      description: "Einheitliche Verhaltenssegmente für Journey und Kampagnen"

    - resource: "Messaging-Library"
      owner: "Marketing (Lead)"
      description: "Getestete Messages per Segment und Barriere"

    - resource: "Barrieren-Katalog"
      owner: "CoE XD (Lead)"
      description: "Dokumentierte Verhaltensbarrieren mit Evidenz"

    - resource: "BEATRIX Parameter-Set"
      owner: "FehrAdvice"
      description: "UBS-spezifische Verhaltensparameter"

  kpi_alignment:
    shared_funnel:
      - stage: "Awareness"
        owner: "Marketing"
        kpi: "Reach, Impressions"

      - stage: "Consideration"
        owner: "Marketing"
        kpi: "Engagement Rate, Click-through"

      - stage: "Intent"
        owner: "CoE XD / Marketing"
        kpi: "Landing Page Visits, Time on Page"

      - stage: "Action"
        owner: "CoE XD"
        kpi: "Conversion Rate, Account Openings"

      - stage: "Retention"
        owner: "Marketing"
        kpi: "Active Users, AuM Growth"

# =============================================================================
# KONKRETER ANWENDUNGSFALL: SAVE & INVEST KAMPAGNE
# =============================================================================

application_save_invest:
  title: "Anwendungsfall: Save & Invest Kampagne"

  connection_to_pilot: |
    Der laufende BEATRIX Pilot (UBS_037) fokussiert auf die Save & Invest
    Landing Page. Die Marketing-Erweiterung nutzt dieselben Erkenntnisse
    für Awareness- und Consideration-Kampagnen.

  campaign_architecture:
    name: "Invest Like You - Kooperationsbasierte Kampagne"

    phases:
      - phase_id: "C1"
        name: "Social Proof Wave"
        model_basis: "MS-SP-008 Conditional Cooperation"
        duration: "4 Wochen"

        channels:
          - channel: "Push Notifications"
            message_example: "78% der UBS-Kunden Ihres Alters haben einen Sparplan"
            frequency: "2x/Woche"
            segment: "Cash-only, 30-50"

          - channel: "Email"
            message_example: "Diesen Monat: 12'000 neue Key4-Sparpläne"
            frequency: "1x/Woche"
            segment: "All non-investors"

          - channel: "In-App Banner"
            message_example: "Beliebteste Anlage bei Ihren Peers: 3a ETF"
            placement: "Home Screen"
            segment: "App-active users"

        kpis:
          - "Push Open Rate: +20% vs. Baseline"
          - "Email CTR: +30% vs. Baseline"
          - "Landing Page Visits: +25%"

      - phase_id: "C2"
        name: "Identity Activation"
        model_basis: "MS-IB-001 Identity Economics"
        duration: "4 Wochen"

        channels:
          - channel: "Personalized Email"
            message_example: "Welcher Anlegertyp sind Sie?"
            frequency: "1x Week 1"
            segment: "Engaged from C1"
            cta: "Quiz starten"

          - channel: "Push Notifications"
            message_example: "Als [Persona], haben Sie schon an [Product] gedacht?"
            frequency: "1x/Woche"
            segment: "Quiz completers"

          - channel: "Landing Page"
            variant: "Persona-spezifische Landing Pages"
            segment: "Quiz completers"

        kpis:
          - "Quiz Completion: 40%"
          - "Persona-specific Conversion: +35% vs. generic"

      - phase_id: "C3"
        name: "Image & Values"
        model_basis: "MS-SP-007 Social Image"
        duration: "Ongoing"

        channels:
          - channel: "Social Media"
            message_example: "Mein erster ETF-Sparplan #InvestLikeYou"
            frequency: "Content series"
            segment: "Younger (25-40)"

          - channel: "Email"
            message_example: "Die nächste Generation wird es Ihnen danken"
            frequency: "1x/Monat"
            segment: "Parents"

          - channel: "In-App"
            message_example: "Investment-Meilenstein erreicht! Teilen?"
            frequency: "Event-triggered"
            segment: "New investors"

        kpis:
          - "Share Rate: 15%"
          - "Referral Sign-ups: +10%"

