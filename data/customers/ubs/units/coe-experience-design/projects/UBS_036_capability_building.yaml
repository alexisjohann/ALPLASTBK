# =============================================================================
# SECTION 1: PROJECT CONTEXT AND STRATEGIC INTENT
# =============================================================================

context:
  background: |
    The Experience Design Center of Excellence (CoE) has been established to create
    systematic value for UBS by developing client-centric solutions and driving
    cross-functional impact. As a dedicated hub, it is designed to strengthen
    collaboration, ensure design quality, and accelerate the delivery of meaningful
    client and business outcomes.

    There is growing recognition of the potential for behavioral economics to reinforce
    the Center's role. By embedding behavioral insights into design practices, the CoE
    can further sharpen its strategic position as an enabler of organizational learning
    and value creation.

  what_has_been_achieved:
    - "Design maturity assessment conducted to evaluate current state and identify improvement areas"
    - "Continuous development of internal ideas and initiatives to advance organizational setup"
    - "Broadened impact through various initiatives"

  strategic_objectives:
    purpose: |
      This project is intended to strengthen the role of the Experience Design CoE
      as a strategic and integrative force by embedding behavioral economics into
      its culture and practices. In doing so, design excellence can be closely
      aligned with measurable business outcomes.

    objectives:
      - id: "OBJ-01"
        name: "Elevate Strategic Impact"
        description: "Position the Experience Design CoE as a trusted strategic partner beyond execution"

      - id: "OBJ-02"
        name: "Build Capabilities"
        description: |
          Develop essential skills in storytelling, stakeholder engagement, and experimentation,
          while rethinking the organization of roles and requirements where needed

      - id: "OBJ-03"
        name: "Embed Behavioral Economics"
        description: |
          Equip teams with tools and mindsets that encourage experimentation, strengthen
          decision-making, and align design practices with the demands of a dynamic business environment

# =============================================================================
# SECTION 2: METHODOLOGY AND APPROACH
# =============================================================================

methodology:
  foundation_of_insights:
    description: |
      Our work was guided by a consolidated foundation of insights drawn from both
      internal and external sources.

    sources:
      internal:
        - "Mini-workshops with key individuals from inside and outside the Experience Design CoE"
        - "Input from stakeholders across UBS"
        - "Existing CoE materials (e.g., Design Maturity Assessment for WMPC)"

      external:
        - "Consultancy best practices from FehrAdvice"
        - "Cross-industry client learnings"
        - "Behavioral strategy expertise"

  approach:
    problem_to_solution:
      description: |
        The process was designed to move quickly from a problem-oriented perspective
        to a solution-oriented one.

      steps:
        - step: 1
          name: "Define the What"
          description: "Clarify which areas hold the most potential for strengthening the CoE's role and impact"

        - step: 2
          name: "Develop Recommendations"
          description: |
            FehrAdvice developed tailored recommendations informed by industry best practices,
            behavioral economic tools, and proven use cases. An internal AI-based tool was used
            to fine-tune measures and generate early impact prognosis.

        - step: 3
          name: "Iterative Refinement"
          description: |
            Recommendations were prioritized and refined through short, iterative working sessions
            with CoE stakeholders. Over two weeks, 2-3 workshops of 60-90 minutes each adapted
            measures to the specific context and ensured strong ownership.

  stakeholder_conversations:
    period: "Late June to mid-July"
    participants: 12
    participant_types: "Various roles and functions, members and non-members of the CoE"

    topics_explored:
      - "How the CoE is currently perceived in terms of role, mandate, and visibility"
      - "Touchpoints where its contribution is most visible or valuable"
      - "Practical challenges in collaboration and integration into strategic and operational work"
      - "Cultural dynamics and behavioral patterns shaping engagement with the CoE"
      - "Individual reflections on the current and potential value of the CoE"

  key_observations:
    emerging_impressions:
      - "Strong willingness to engage across all conversations"
      - "Clear aspiration to expand the CoE's strategic role"
      - "Divergent views on why strategic impact has not fully materialized"

    themes:
      internal_factors:
        - "Setup and organizational structure"
        - "Skill base and methodology"
        - "Absence of a shared narrative"

      external_factors:
        - "Challenges typical for large organizations"
        - "Reduced urgency due to organizational complexity"
        - "Obscured opportunities for proactive change"

    responsibility_ambiguity: |
      A recurring theme was the ambiguity around responsibility: some felt that external
      stakeholders needed a better understanding of the CoE's work, while others emphasized
      that the CoE itself must evolve to demonstrate clearer value. In reality, both
      dimensions will be critical.

# =============================================================================
# SECTION 3: STRATEGIC PRIORITIES
# =============================================================================

strategic_priorities:
  overview: |
    The Experience Design Center of Excellence (CoE) is at a pivotal moment: it has
    already established strong delivery capabilities and a reputation for design quality,
    yet its full strategic potential for UBS remains untapped. To address this, we have
    identified three strategic priorities that directly connect organizational relevance
    with business impact.

    At the heart of this approach lies behavioral economics. It provides the analytical
    and practical tools to:
    - Develop people and skills internally (equipping teams with the ability to act
      credibly and strategically in business contexts)
    - Maximize the impact of measures externally (strengthening visibility, acceptance,
      and adoption of the CoE's contributions across UBS)

  priorities:
    # -------------------------------------------------------------------------
    # PRIORITY 1: CAPABILITY BUILDING
    # -------------------------------------------------------------------------
    - id: "P1"
      name: "Capability Building"
      priority_rank: 1

      guiding_question: |
        How can we equip CoE members with the cross-functional skills they need – and
        enable them to act more strategically in communication, experimentation, and
        business dialogue?

      description: |
        Building and strengthening cross-functional skills is the most critical enabler
        for the CoE's future. Storytelling, data fluency, and experimentation capabilities
        are essential for the team to communicate value effectively, engage stakeholders
        in strategic dialogue, and create visible business impact. Behavioral economics
        acts as both content and method: it shapes how skills are learned, applied, and
        made salient in everyday practice.

      behavioral_economics_perspective:
        cross_functional_skills_as_levers:
          - lever: "Storytelling"
            effect: "Counters attention biases and creates salience for design outcomes"

          - lever: "Experimentation mindset"
            effect: "Reframes 'failure' as learning, reducing loss aversion and increasing willingness to test again"

          - lever: "Data fluency"
            effect: "Builds credibility with evidence-driven stakeholders, anchoring design results in metrics and KPIs"

        training_principles:
          - "Applying reciprocity and framing in trainings ensures people see upskilling as investment in growth and influence"
          - "Embedding learning in peer norms (coaching, sharing, recognition) makes skills visible and contagious"

      stakeholder_voices:
        - "Stronger storytelling and presentation skills are needed to better communicate the value of design."
        - "Need support to speak the same language when it comes to experimentation – currently, there's no shared understanding."
        - "More innovation and quantitative data."
        - "More data skills are needed – many stakeholders are data-driven and expect evidence-based results."
        - "Mindset-shift needed to 'testing, failing, testing again ...' (and not categorizing a test without conversion uplift as a failed test)."

      interpretation: |
        These observations highlight both skill gaps and a required mindset shift. To be
        seen as a credible strategic partner, the CoE must go beyond design expertise and
        demonstrate business fluency.

      so_what_for_ubs:
        - outcome: "Storytelling"
          impact: "Clearer communication of design's business value, increasing acceptance at leadership level"

        - outcome: "Experimentation mindset"
          impact: "Faster learning cycles, fewer costly late-stage failures"

        - outcome: "Data literacy"
          impact: "Greater alignment with UBS's evidence-driven culture, stronger influence in decision-making"

      conclusion: |
        Capability building is therefore the single most important driver of the CoE's
        future impact. It is where behavioral economics can be applied most visibly and
        where UBS expects the fastest, most tangible results.

    # -------------------------------------------------------------------------
    # PRIORITY 2: ORGANIZATIONAL STRUCTURE & POSITIONING
    # -------------------------------------------------------------------------
    - id: "P2"
      name: "Organizational Structure & Positioning"
      priority_rank: 2

      guiding_question: |
        How can the Experience Design CoE be organized and positioned to earn credibility,
        attract talent, and stand as a trusted strategic partner within UBS?

      description: |
        The organizational setup and strategic positioning of the CoE must provide clarity,
        attract the right talent, and make the CoE a trusted partner at eye level with
        business stakeholders. This includes role definitions, career paths, and a unifying
        vision and identity, as well as stronger visibility of impact across UBS. Behavioral
        economics supports this by reducing uncertainty, framing changes constructively, and
        ensuring that the CoE's contributions are consistently seen as valuable and credible.

      behavioral_economics_perspective:
        key_insight: |
          Organizational structures are not neutral — they shape behavior, perceptions, and trust.
          To position the CoE at eye level with business, three elements matter.

        elements:
          - element: "People and roles"
            description: |
              The profiles hired and promoted set the tone. What is observed becomes the norm.
              Strategic thinkers in visible roles signal that the CoE is more than execution.

          - element: "Vision and identity"
            description: |
              A clear, inclusive narrative acts as a mental anchor, reduces ambiguity, and
              strengthens belonging across diverse profiles.

          - element: "Visibility of impact"
            description: |
              What is salient and socially endorsed is seen as valuable. Translating design
              outcomes into business language ensures recognition.

        be_tools_applied:
          - tool: "Loss aversion framing"
            application: "Reduce fears during structural changes ('what stays the same')"

          - tool: "Reciprocity"
            application: "Frame new structures as investments for employees and their mission"

          - tool: "Framing & salience"
            application: "Make value explicit in business terms"

          - tool: "Social proof"
            application: "Co-present outcomes with business stakeholders to boost credibility"

      stakeholder_voices:
        - "Should the focus be on hiring or developing generalists or specialists?"
        - "We need designers with strong soft skills to navigate complex stakeholder environments."
        - "The CoE should be more transparent about its vision and what it aims to become."
        - "Business dominates decision-making; design lacks equal standing in the organizational structure."
        - "50/50 perception: some stakeholders see and understand the value – others don't."

      interpretation: |
        For the CoE to become a credible strategic partner, structure, vision, and visibility
        must work together:
        - The right mix of skills and roles ensures talent credibility
        - A clear, inclusive vision anchors identity and belonging
        - Active visibility management closes the gap between real impact and perceived value

      so_what_for_ubs:
        - "Reduces uncertainty and builds trust during structural change"
        - "Strengthens talent attraction and retention"
        - "Provides clarity and identity across diverse profiles"
        - "Elevates design to equal standing with business, ensuring its value is recognized in strategic discussions"

    # -------------------------------------------------------------------------
    # PRIORITY 3: CULTURE & ENGAGEMENT
    # -------------------------------------------------------------------------
    - id: "P3"
      name: "Culture & Engagement"
      priority_rank: 3

      guiding_question: |
        How can the CoE foster the cultural conditions and engagement practices that sustain
        motivation and secure consistent involvement in business-relevant projects?

      description: |
        To sustain motivation and embed the CoE more firmly into UBS structures, cultural
        levers are essential. Early involvement in strategic projects prevents costly
        misalignments, while visible recognition of contributions fosters long-term engagement.
        Behavioral economics offers practical mechanisms such as defaults, social norms, and
        salience effects to anchor these practices effectively.

      behavioral_economics_perspective:
        key_insight: |
          Culture is shaped not only by structures but by what becomes visible, routine, and
          rewarded. Two levers are particularly important for the CoE.

        levers:
          - lever: "Early involvement"
            description: |
              Without clear defaults, stakeholders tend to involve design too late. Behavioral
              economics shows that the way problems are framed at the start strongly influences
              all downstream decisions. Formal or informal defaults for CoE involvement can
              prevent costly misalignment and ensure design is seen as a strategic partner from
              the outset.

          - lever: "Appreciation and recognition"
            description: |
              Motivation is sustained when effort is seen and valued. Salience and social norms
              play a role here: visible rituals of appreciation signal what matters, strengthen
              trust, and encourage continued contributions. In fast-paced environments, these
              signals are critical to avoid disengagement and frustration.

      stakeholder_voices:
        - "The Experience Design CoE is perceived to have limited business and strategic understanding."
        - "Whether and when design is involved depends on the stakeholder – there is no formal guideline."
        - "Appreciation is lacking – the team moves quickly from one project to the next."
        - "These successes and achievements are rarely acknowledged or celebrated."

      interpretation: |
        For the CoE to maintain engagement and strengthen its position, cultural levers must
        complement structural and capability measures:
        - Early involvement ensures design perspectives shape strategic questions, not just execution
        - Appreciation practices reinforce motivation and create visible connection between effort and value

      so_what_for_ubs:
        - "Fewer late-stage misalignments → reduced costs and faster delivery"
        - "Higher team motivation and retention → sustained performance in a demanding environment"
        - "Stronger perception of the CoE as a collaborative, trusted partner → improved working relationships across UBS"

  # ---------------------------------------------------------------------------
  # FURTHER TOPICS (Secondary)
  # ---------------------------------------------------------------------------
  further_topics:
    note: |
      During stakeholder conversations, several additional topics surfaced that are relevant
      for the Experience Design CoE. While important, they should be treated as secondary to
      the three main priorities. Many of these are already being addressed internally.

    topics:
      - id: "FT-01"
        name: "Planning and prioritization"
        observations:
          - "Teams are engaged across a wide range of activities, including some with limited strategic relevance"
          - "Opportunity to create more clarity on what truly matters, freeing up capacity for higher-value strategic work"

      - id: "FT-02"
        name: "Tool efficiency"
        observations:
          - "Several voices highlighted the need for more intuitive and efficient tools"
          - "Improving user experience and exploring AI applications could increase productivity"

      - id: "FT-03"
        name: "Career path transparency"
        observations:
          - "Employees expressed desire for greater clarity on development opportunities and progression timelines"
          - "Enhancing transparency could unlock internal growth potential and support talent retention"

      - id: "FT-04"
        name: "Physical work environment"
        observations:
          - "Pre-pandemic office was seen as vibrant space enabling spontaneous collaboration"
          - "Rebuilding such an environment could strengthen visibility and connections across business units"

    recommendation: |
      These topics are relevant and worth consideration, but they are not the primary focus
      of this project. The recommendation is to concentrate efforts on the three main
      priorities — capability building, organizational structure & positioning, and culture
      & engagement — as they offer the greatest potential for strategic impact.

# =============================================================================
# SECTION 4: STRATEGIC ACTION PORTFOLIO
# =============================================================================

action_portfolio:
  overview: |
    Capability Building is the nucleus of the Experience Design CoE's transformation. It is
    the area where investment in people most directly translates into greater credibility,
    higher visibility, and stronger strategic relevance within UBS.

    The CoE already delivers design excellence. What is needed now is to ensure that its
    members can act confidently as strategic partners — able to communicate value in business
    terms, apply behavioral economics tools in daily work, and design experiments that
    generate robust evidence.

  measures:
    # -------------------------------------------------------------------------
    # MEASURE 1: WORKSHOP SERIES (MASTER CLASS)
    # -------------------------------------------------------------------------
    - id: "M1"
      name: "Behavioral Economics Master Class"
      type: "Workshop Series"

      description: |
        FehrAdvice supports the CoE by building capabilities through practical, UBS-focused
        trainings on behavioral economics, storytelling, and experimentation, designed to
        change daily behavior and deliver tangible outputs.

      what_it_is: |
        The Behavioral Economics Master Class is a tailored development program for the
        Experience Design CoE. It is not a set of generic workshops but a coherent learning
        journey that combines interactive sessions, practical casework, and guided reflection.
        Its purpose is to bring participants to a baseline level in applied behavioral economics,
        enabling them to use BE principles and storytelling as part of their daily work.

      what_it_brings:
        - "Establishes a shared behavioral economics language within the CoE"
        - "Strengthens the ability to communicate design's value persuasively to business stakeholders"
        - "Builds confidence in applying BE tools to real UBS cases, creating visible business impact"
        - "Embeds BE as a signature capability of the CoE, differentiating it within UBS"

      sessions:
        # SESSION 1
        - session_id: "S1"
          name: "Introduction to Human Behavior & BE Principles"
          duration: "2.5-3 hours"

          purpose: |
            To establish a shared foundation in behavioral economics by letting participants
            experience behavioral effects themselves and build a common BE language for the CoE.
            The session is designed to be engaging, interactive, and practical — creating energy
            for the Master Class journey.

          what_happens: |
            Interactive, playful introduction to human decision-making and behavioral patterns.
            Participants experience biases and BE mechanisms firsthand through live experiments
            and cases.

          why_it_matters: |
            Builds curiosity and lowers barriers — participants understand that BE is not
            abstract theory but something they already experience daily.

          impact_for_coe: |
            Creates immediate engagement, provides a common language, and prepares the team
            for applying BE in practice.

          agenda:
            - item: "Welcome & Framing"
              duration: "15-20 min"
              content:
                - "Why BE matters for the CoE and UBS"
                - "Use BE in the framing itself (e.g., loss aversion: 'Here's what won't change, and here's what new opportunities open up')"

            - item: "Interactive Introduction to BE"
              duration: "60-75 min"
              content:
                - "Participants experience 4-5 core BE principles through short live exercises"
              exercises:
                - "Salience & attention bias: 'Which detail do you notice first?' decision game"
                - "Framing effect: same message in gain vs. loss frame"
                - "Default effect: simulated choice with/without preset"
                - "Loss aversion: 'sell vs. buy' willingness exercise"
                - "Short debriefs after each: what happened, which bias was at play, how does it matter for UBS?"

            - item: "BE Toolbox Overview"
              duration: "30-40 min"
              content:
                - "Presentation of the curated BE toolbox for UBS"
                - "Focus on 5-6 most relevant tools for design and business decisions"
                - "Mini case examples: where these tools changed outcomes in practice"

            - item: "Reflection & Closing"
              duration: "20-30 min"
              content:
                - "Guided reflection: what surprised participants?"
                - "Each participant notes 1-2 situations in their own work where BE could make a difference"
                - "Closing frame: 'This is the baseline we will now build on in the next session'"

          anticipated_impact:
            - "Creates excitement and buy-in ('this is different, this is practical')"
            - "Establishes a shared language of BE across the CoE"
            - "Lowers the barrier for applying BE by connecting tools to familiar work contexts"
            - "Sets the foundation for Session 2, where the real case application begins"

        # SESSION 2
        - session_id: "S2"
          name: "Applying BE to Real Cases"
          duration: "3-3.5 hours"

          purpose: |
            To move from 'understanding' to applying behavioral economics tools in practice.
            Participants work hands-on with real UBS cases (either current CoE projects or
            prepared examples) to see how BE can create concrete, better solutions.

          what_happens: |
            Participants work on live UBS projects or prepared cases by FehrAdvice. They learn
            a structured process: define target behavior → identify behavioral barriers → select
            suitable BE tools → design interventions.

          why_it_matters: |
            Moves from theory to practice, showing how BE can generate better solutions for
            concrete challenges.

          impact_for_coe: |
            Produces tangible outputs (intervention designs) and strengthens the CoE's credibility
            as a problem-solver using behavioral science.

          agenda:
            - item: "Welcome & Recap"
              duration: "15 min"
              content:
                - "Quick recap of Session 1: main BE principles"
                - "Framing: 'Now we take the next step — from experiencing BE to using it as a tool'"

            - item: "Introduction to the BE Application Process"
              duration: "20 min"
              content:
                - "Walk participants through a structured 4-step application model"
              application_model:
                - "Define the target behavior"
                - "Identify behavioral barriers"
                - "Select suitable BE tools from the toolbox"
                - "Draft intervention ideas"
                - "Mini example from another industry to illustrate"

            - item: "Case Work in Groups"
              duration: "90 min"
              content:
                - "Participants split into groups of 3-4"
                - "Each group receives a UBS-relevant case"
              example_cases:
                - "How can we ensure stakeholders adopt new design guidelines early?"
                - "How can the CoE secure a seat in projects before decisions are locked?"
              activities:
                - "Map barriers"
                - "Match tools"
                - "Draft intervention ideas"
                - "Coaches (FehrAdvice) circulate to support groups"

            - item: "Group Presentations & Feedback"
              duration: "45 min"
              content:
                - "Each group presents their intervention idea (5-7 minutes)"
                - "Feedback from peers and coaches focuses on: clarity, BE-fit, and business relevance"

            - item: "Reflection & Closing"
              duration: "20-30 min"
              content:
                - "Discussion: What worked well? What was challenging?"
                - "Each participant commits to one case in their own work where they will apply the process before Session 3"
                - "Closing: 'Next time, you'll learn how to tell these stories persuasively to stakeholders'"

          anticipated_impact:
            - "First tangible applications of BE to UBS challenges"
            - "Builds confidence: participants see that BE tools are directly usable in their daily projects"
            - "Creates intervention prototypes that can be refined and implemented"
            - "Strengthens the CoE's positioning as a problem-solver using behavioral science, not only design"

        # SESSION 3
        - session_id: "S3"
          name: "Storytelling Coaching"
          duration: "3 hours"

          purpose: |
            To enable participants to communicate their BE-based solutions persuasively and
            memorably. The session trains them to use storytelling techniques grounded in
            behavioral economics, ensuring design outcomes are understood, valued, and supported
            by decision-makers.

          what_happens: |
            Participants prepare a 10-minute story about their case before the coaching takes
            place, then refine and present it in a simulated senior stakeholder setting during
            a coaching session with FehrAdvice. Coaching focuses on narrative framing, salience,
            and persuasive communication.

          why_it_matters: |
            Good ideas only create impact if they are told in ways that resonate with
            decision-makers. Storytelling ensures design outcomes are visible and memorable.

          impact_for_coe: |
            Improves confidence in boardroom settings, strengthens visibility, and positions the
            CoE as a strategic partner, not just an execution unit.

          agenda:
            - item: "Welcome & Framing"
              duration: "15 min"
              content:
                - "Recap of Session 2 case work"
                - "Framing: 'Even the best solutions have no impact if they aren't communicated in a way that resonates'"

            - item: "Introduction to Storytelling Principles"
              duration: "30 min"
              content:
                - "Core behavioral economics principles in storytelling"
              be_principles:
                - principle: "Framing effect"
                  description: "How message presentation shapes decisions"
                - principle: "Peak-End Rule"
                  description: "Structure stories around a climax and memorable conclusion"
                - principle: "Identity priming"
                  description: "Connect narratives to UBS's mission and stakeholder values"
                - principle: "Salience"
                  description: "Highlight the one thing that matters most, not every detail"
              activities:
                - "Quick before/after examples (data slide vs. narrative pitch)"

            - item: "Case-Based Story Preparation"
              duration: "60 min"
              content:
                - "Participants work individually or in pairs on their case from Session 2"
              task: "Prepare a 10-minute 'boardroom story' using a guided template"
              template_elements:
                - "Define the audience"
                - "Clarify the message"
                - "Structure the arc (problem → BE insight → solution → impact)"
                - "Select BE tools for framing (gain/loss, social proof, etc.)"

            - item: "Story Pitches & Coaching"
              duration: "60 min"
              content:
                - "Participants present their 10-minute story in a simulated senior stakeholder setting"
                - "Peer and coach feedback on: clarity, persuasiveness, use of BE framing, emotional impact"
                - "Quick 're-pitch' opportunities to test improvements"

            - item: "Reflection & Closing"
              duration: "15 min"
              content:
                - "Group discussion: What made stories memorable? What resonated most?"
                - "Participants commit to using one storytelling technique in their next UBS meeting or presentation"
                - "Closing: 'Next session we reflect on the full journey and explore how experimentation anchors BE in daily work'"

          anticipated_impact:
            - "Stronger ability to win attention and buy-in from senior stakeholders"
            - "Makes design outcomes visible, memorable, and persuasive"
            - "Builds confidence in boardroom settings, strengthening the CoE's strategic credibility"
            - "Establishes storytelling as a shared practice across the CoE"

        # SESSION 4
        - session_id: "S4"
          name: "Reflection & Anchoring"
          duration: "2.5-3 hours"

          purpose: |
            To consolidate learning from the Master Class, ensure participants feel confident
            applying BE in daily work, and introduce a light experimentation mindset as a way
            to keep testing and improving interventions.

          what_happens: |
            The group reflects on their learning journey and refines their cases. The session
            also introduces BE-informed experimentation: how to test solutions, frame 'failures'
            as learning, and design evidence-based interventions.

          why_it_matters: |
            Reflection consolidates skills, while experimentation ensures participants leave
            with a mindset of testing, learning, and iterating.

          impact_for_coe: |
            Anchors BE into daily routines, reduces fear of failure, and strengthens the CoE's
            role as a source of behavioral evidence in strategic discussions.

          agenda:
            - item: "Welcome & Journey Recap"
              duration: "20 min"
              content:
                - "Review of the Master Class: Session 1 (experience BE) → Session 2 (apply BE) → Session 3 (communicate BE)"
                - "Reflection prompt: 'What has changed in how you look at your daily work since Session 1?'"

            - item: "Group Reflection & Sharing"
              duration: "60 min"
              content:
                - "Small groups discuss which BE tools they feel most confident applying"
                - "Examples of where they already tried BE in their projects since the last sessions"
                - "Remaining questions or barriers"
                - "Plenary sharing of 2-3 highlights per group"

            - item: "Light Introduction to Experimentation"
              duration: "45 min"
              content:
                - "Short input: Why experimentation matters (preventing costly missteps, framing tests as learning not failure)"
              be_anchors:
                - anchor: "Loss aversion reframing"
                  description: "'Failed tests = valuable insights'"
                - anchor: "Defaults & salience"
                  description: "Simple templates/checklists reduce friction in designing tests"
              activities:
                - "Short interactive exercise: redesign one test case (from Session 2) to be more BE-informed"

            - item: "Anchoring Next Steps"
              duration: "30-40 min"
              content:
                - "Each participant creates a personal 'BE action plan': 2-3 concrete ways they will apply BE, storytelling, or experimentation in their projects over the next month"
                - "Identify possible Ambassadors from the group (volunteers who want to keep coaching peers)"

            - item: "Closing"
              duration: "15 min"
              content:
                - "Summary of journey: 'From awareness → application → communication → anchoring'"
                - "Reinforce CoE identity as BE-enabled strategic partner"
                - "End with a positive reciprocity frame: 'This program is an investment in your growth — the more you apply it, the more value you create for UBS and your own career'"

          anticipated_impact:
            - "Ensures that the Master Class outcomes carry forward into daily routines"
            - "Creates a first wave of ambassadors and role models for BE inside UBS"
            - "Instills an experimentation mindset that reduces fear of failure and supports innovation"
            - "Reinforces the CoE's positioning as a learning, adaptive, and credible partner within UBS"

    # -------------------------------------------------------------------------
    # MEASURE 2: AMBASSADORS & PEER COACHING
    # -------------------------------------------------------------------------
    - id: "M2"
      name: "Ambassadors & Peer Coaching"
      type: "Internal Multipliers"

      description: |
        Internal multipliers who spread and anchor new practices, acting as role models
        and first points of contact for colleagues.

      purpose: |
        Ambassadors are selected CoE members who, after completing the workshop series,
        take on the role of internal multipliers. They act as role models, coaches, and
        first points of contact for colleagues who want to apply behavioral economics,
        storytelling, or experimentation in their work. Their function is to embed new
        practices into the CoE's daily routines and ensure they spread beyond the initial
        training cohort.

      how_it_works:
        selection:
          criteria:
            - "Chosen from participants of the workshop series"
            - "Show motivation, curiosity, and potential to guide others"
            - "Selection is not based on hierarchy, but on willingness to take ownership"

        coaching_and_certification:
          - "Ambassadors receive additional, targeted coaching sessions from FehrAdvice"
          - "Sessions deepen their understanding of the tools and prepare them for peer coaching"
          - "Certification ('Behavioral Economics Ambassador') signals credibility within UBS"

        role_in_coe:
          - "Act as first points of contact for colleagues with questions on BE, storytelling, or experimentation"
          - "Facilitate mini-coaching sessions (30-60 minutes) to help colleagues apply tools to specific cases"
          - "Share best practices in team meetings, highlight successes, and keep BE tools salient"
          - "Serve as a bridge between FehrAdvice and the wider CoE, providing feedback on adoption and needs"

      ambassador_tasks:
        - task: "Peer Coaching"
          description: "Support colleagues in applying BE tools to ongoing projects"

        - task: "Knowledge Sharing"
          description: "Present short inputs in team meetings, create easy-to-use templates or checklists"

        - task: "Role Modeling"
          description: "Show through their own behavior how BE, storytelling, and experimentation add value"

        - task: "Feedback & Learning Loop"
          description: "Collect experiences from colleagues and feed them back into CoE leadership and FehrAdvice"

        - task: "Anchoring Practices"
          description: "Ensure that new methods do not fade after the workshops, but become part of the CoE's 'default way of working'"

      why_important:
        - reason: "Scalability"
          description: "Workshops reach a limited group; Ambassadors spread the practices across the entire CoE without requiring constant external input"

        - reason: "Sustainability"
          description: "Keeps behavioral economics, storytelling, and experimentation visible after the initial training wave"

        - reason: "Social Norms"
          description: "People imitate what peers around them do; Ambassadors make the use of BE tools normal and expected"

        - reason: "Trust & Accessibility"
          description: "Colleagues are often more comfortable approaching a peer than an external consultant"

        - reason: "Credibility"
          description: "By embedding expertise inside the CoE, Ambassadors strengthen its standing as a strategic enabler within UBS"

      anticipated_impact:
        - "Establishes an internal coaching culture that keeps skills alive and evolving"
        - "Creates visible role models who embody the CoE's transformation"
        - "Reduces dependency on external support and strengthens UBS's internal ownership of the change"
        - "Builds long-term credibility and trust: the CoE is seen as not only acquiring new skills but also ensuring their sustained use"

    # -------------------------------------------------------------------------
    # MEASURE 3: LONG-TERM CURRICULUM
    # -------------------------------------------------------------------------
    - id: "M3"
      name: "Long-Term Curriculum"
      type: "Structured Development Program"

      description: |
        A structured development program with modules, credits, and certification,
        integrated into HR processes and career paths.

      purpose: |
        Establish a structured capability development program for the Experience Design CoE,
        embedding behavioral economics, storytelling, and experimentation as core skills.
        The curriculum ensures sustainability, makes capability development measurable, and
        integrates it into career progression.

      how_it_works:
        modular_structure:
          description: |
            The curriculum is organized into modules with defined learning outcomes and credits.
            Participants earn credits by completing modules, which accumulate towards different
            certification levels.

          core_modules:
            mandatory: true
            modules:
              - "Behavioral Economics Toolbox"
              - "Storytelling & Strategic Communication"
              - "Experimentation & Test Design"
              - "Data Fluency for Designers"

          advanced_elective_modules:
            mandatory: false
            modules:
              - "Applied Behavioral Economics in Change Communication"
              - "Facilitation & Moderation of Strategic Dialogues"
              - "Behavioral Design for Digital Journeys"
              - "Leadership & Influence with Behavioral Science"

        credit_system:
          description: "Each module = X credits (e.g., 2-3 for core, 1-2 for electives)"

          certification_levels:
            - level: "Level 1 – Practitioner"
              requirement: "All core modules completed"
              credits: "8-10 credits"

            - level: "Level 2 – Advanced"
              requirement: "Practitioner + 2 electives"
              credits: "12-14 credits"

            - level: "Level 3 – Ambassador"
              requirement: "Advanced + peer coaching assignments + ambassador certification"
              credits: "16-18 credits"

          note: "This system makes progress transparent and motivating for employees"

        delivery_formats:
          description: "Mix of formats to keep engagement high"
          formats:
            - "Live workshops (intensive, interactive)"
            - "Micro-learnings (short, digital modules)"
            - "Peer coaching (run by Ambassadors)"
            - "Applied project work (credits earned by applying skills to real UBS cases)"

          output_requirement: "Every module ends with a practical output (story, case intervention, experiment design)"

        hr_integration:
          description: "Integration with HR & Career Development"
          elements:
            - "Curriculum milestones linked to career steps and role expectations (e.g., Senior CoE Designer expected to be Advanced)"
            - "Certification visible in HR systems and included in performance reviews"
            - "Curriculum positions the CoE as a talent magnet, making growth pathways clear for employees"

      why_important:
        - reason: "Institutionalizes learning"
          description: "BE, storytelling, and experimentation become default skills for all CoE members"

        - reason: "Retains talent"
          description: "A transparent development path motivates employees and reduces attrition"

        - reason: "Differentiates the CoE"
          description: "Certification builds reputation as UBS's center of behavioral expertise"

        - reason: "Scales across UBS"
          description: "Once proven, the curriculum can be extended to other business units"

      behavioral_economics_anchors:
        - anchor: "Defaults"
          application: "The curriculum is the standard development path — opting out requires justification"

        - anchor: "Loss aversion framing"
          application: "Missing modules means losing credits, certification, and promotion opportunities"

        - anchor: "Social proof"
          application: "Certified CoE members are visible role models"

        - anchor: "Identity priming"
          application: "'BE-certified CoE professional' becomes a badge of pride and identity"

      anticipated_impact:
        - "Long-term sustainability: skills are not dependent on one-off trainings"
        - "Strategic credibility: the CoE becomes a recognized hub of behavioral economics inside UBS"
        - "Growth and retention: employees see a clear pathway for their development"
        - "Alignment: consistent standards across the CoE, ensuring high-quality impact in all projects"

  # ---------------------------------------------------------------------------
  # COMBINED IMPACT
  # ---------------------------------------------------------------------------
  combined_impact:
    summary: |
      Together, these measures establish Capability Building as a strategic asset of the CoE:

    outcomes:
      - "Employees gain confidence and credibility in engaging with business stakeholders"
      - "Design outcomes become visible, persuasive, and evidence-based"
      - "A culture of learning, sharing, and role modeling ensures sustainability"
      - "The CoE strengthens its position as a strategic enabler, with behavioral economics as its hallmark"

