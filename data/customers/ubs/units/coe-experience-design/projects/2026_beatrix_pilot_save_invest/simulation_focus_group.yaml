metadata:
  simulation_id: "SIM-UBS037-FG-001"
  type: "focus_group"
  participants: 7
  topic: "Save & Invest Landing Page - Reaktionen und Barrieren"
  methodology: "EBF Persona Generation + LLMMC Behavioral Simulation"

# =============================================================================
# SECTION 1: METHODOLOGIE - WIE ENTSTEHEN DIE PERSONAS?
# =============================================================================

methodology:

  overview: |
    Die 7 Fokusgruppen-Teilnehmer werden NICHT zufällig erfunden, sondern
    systematisch aus dem EBF-Modell abgeleitet. Jede Persona ist eine
    Instanziierung der Segment-Parameter mit individueller Variation.

  step_1_segment_distribution:
    description: "Verteilung der 7 Teilnehmer auf die 3 Segmente"
    rationale: |
      Die Verteilung folgt approximativ der Populationsverteilung,
      aber mit Überrepräsentation kleinerer Segmente für Diversität.

    population_distribution:
      SEG_01_cash_holder: 0.45
      SEG_02_invested_elsewhere: 0.25
      SEG_03_never_invested: 0.30

    focus_group_allocation:
      SEG_01_cash_holder: 3  # 43% (leicht unterrepräsentiert)
      SEG_02_invested_elsewhere: 2  # 29% (leicht überrepräsentiert)
      SEG_03_never_invested: 2  # 29% (approximativ)

  step_2_parameter_sampling:
    description: "Individuelle Parameter aus Segment-Verteilungen ziehen"

    approach: |
      Für jede Persona werden die Verhaltensparameter aus einer
      Normalverteilung um den Segment-Mittelwert gezogen:

      Parameter_i ~ N(μ_segment, σ_segment)

      wobei σ_segment typischerweise 10-15% des Mittelwerts beträgt.

    parameters_sampled:
      - symbol: "λ"
        name: "Loss Aversion"
        description: "Wie stark wiegen Verluste vs. Gewinne?"

      - symbol: "β"
        name: "Present Bias"
        description: "Wie stark ist Gegenwartspräferenz?"

      - symbol: "κ"
        name: "Default Sensitivity"
        description: "Wie stark folgt Person Defaults?"

      - symbol: "σ"
        name: "Social Proof Sensitivity"
        description: "Wie stark wirken soziale Normen?"

      - symbol: "τ"
        name: "Trust"
        description: "Vertrauen in UBS/Finanzprodukte"

      - symbol: "ε"
        name: "Effort Sensitivity"
        description: "Wie stark wirkt wahrgenommener Aufwand?"

  step_3_utility_function:
    description: "Die Nutzenfunktion jeder Persona"

    general_form: |
      U_i = Σ_d (w_d × u_d) - λ_i × L - ε_i × E + σ_i × S + τ_i × T

      wobei:
      - w_d = Gewicht der Utility-Dimension d
      - u_d = Wahrgenommener Nutzen in Dimension d
      - L = Wahrgenommenes Verlustrisiko
      - E = Wahrgenommener Effort
      - S = Social Proof Signal
      - T = Trust Signal

    utility_dimensions:
      u_F: "Financial Utility (erwartete Rendite)"
      u_E: "Emotional Utility (Sicherheitsgefühl)"
      u_P: "Psychological Utility (Komfort, Kontrolle)"
      u_S: "Social Utility (Status, Norm-Konformität)"
      u_X: "Identity Utility (Selbstbild-Konsistenz)"

  step_4_demographic_instantiation:
    description: "Demografische Merkmale zuweisen"

    approach: |
      Demografische Merkmale werden so gewählt, dass sie:
      1. Plausibel für das Segment sind
      2. Variation innerhalb des Segments zeigen
      3. Typische UBS-Kunden repräsentieren

    demographics_considered:
      - "Alter (25-65)"
      - "Geschlecht"
      - "Beruf/Einkommen"
      - "Lebenssituation"
      - "Finanzbildung"

  step_5_behavioral_tendencies:
    description: "Verhaltenstendenzen aus Parametern ableiten"

    mapping_rules:
      high_lambda: "Fokussiert auf Risiken, fragt nach Garantien"
      low_beta: "Denkt langfristig, interessiert an Altersvorsorge"
      high_kappa: "Folgt Empfehlungen, fragt 'Was empfehlen Sie?'"
      high_sigma: "Fragt 'Was machen andere?', Social Proof wichtig"
      low_tau: "Skeptisch, will Beweise, fragt nach Haken"
      high_epsilon: "Fragt sofort 'Wie viel Aufwand?', 'Wie lange dauert das?'"

