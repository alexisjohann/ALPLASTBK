# =============================================================================
# SECTION 3: FOKUSGRUPPEN-SIMULATION
# =============================================================================

focus_group_simulation:

  setup:
    date: "2026-01-27 (simuliert)"
    location: "UBS Konferenzraum, Zürich (simuliert)"
    duration: "90 Minuten"
    moderator: "FehrAdvice Researcher"
    observer: "CoE XD Team (hinter Spiegel)"

    stimulus_material:
      - "3 Landing Page Konzepte (Wireframes)"
      - "Concept A: Current UBS Design (Multiple Products)"
      - "Concept B: Single Default (Key4 Smart Focus)"
      - "Concept C: Fear-First Approach"

  # =========================================================================
  # TEIL 1: EINFÜHRUNG & WARM-UP (15 Min)
  # =========================================================================
  part_1_warmup:
    duration: "15 Minuten"

    moderator_intro: |
      "Guten Abend und herzlich willkommen. Ich freue mich, dass Sie heute
      dabei sind. Wir sprechen heute über das Thema Sparen und Investieren.
      Es gibt keine richtigen oder falschen Antworten - uns interessiert
      Ihre ehrliche Meinung.

      Zum Aufwärmen: Erzählen Sie uns kurz, was Sie beruflich machen und
      was Ihnen spontan zum Thema 'Geld anlegen' einfällt."

    participant_responses:

      P1_Sandra:
        verbal: |
          "Ich bin Sandra, arbeite im HR. Beim Thema Geld anlegen...
          ehrlich gesagt, ich habe da wenig Ahnung. Ich spare auf dem
          Sparkonto, das hat meine Mutter auch immer so gemacht."
        nonverbal: "Unsicher, schaut zu anderen"
        interpretation: |
          Typisch SEG-01: Niedrige Selbstwirksamkeit, tradierte Verhaltensweisen,
          sucht soziale Validierung.

      P2_Thomas:
        verbal: |
          "Thomas, Versicherung. Geld anlegen - ich habe mich lange davor
          gedrückt, aber mit der Pensionierung vor der Tür muss ich mich
          wohl damit beschäftigen. Allerdings: Sicherheit geht vor."
        nonverbal: "Selbstsicher, aber vorsichtig"
        interpretation: |
          SEG-01 mit Life Event Trigger. Hohe λ durch Nähe zur Pension.
          Offen, aber braucht Sicherheitsversprechen.

      P3_Leila:
        verbal: |
          "Leila, ich arbeite in der Pharma. Meine Freundin hat letztens
          angefangen mit ETFs, das hat mich neugierig gemacht. Aber ich
          spare gerade für eine Wohnung, da bin ich unsicher, ob das
          das Richtige ist."
        nonverbal: "Interessiert, aber nervös"
        interpretation: |
          SEG-01 mit Social Trigger. Hohe σ (Social Proof).
          Liquidity Concern ist dominant.

      P4_Marco:
        verbal: |
          "Marco, Software-Entwickler. Ich investiere seit etwa 8 Jahren,
          hauptsächlich ETFs und ein paar Einzelaktien. Bei Swissquote.
          Bin gespannt, was UBS so anbietet."
        nonverbal: "Entspannt, leicht skeptisch"
        interpretation: |
          SEG-02 mit hoher Finanzkompetenz. Wird kritische Fragen stellen.
          Niedrige τ für UBS als Investment-Plattform.

      P5_Nina:
        verbal: |
          "Nina, ich bin Ärztin. Ich habe ein Mandat bei UBS, aber auch
          selbst ein bisschen bei Postfinance angelegt. Ehrlich gesagt
          nervt mich, dass ich zwei verschiedene Logins brauche."
        nonverbal: "Pragmatisch, leicht ungeduldig"
        interpretation: |
          SEG-02 mit hohem ε (Effort Sensitivity). Convenience ist
          Hauptmotivator. Will Konsolidierung.

      P6_Peter:
        verbal: |
          "Peter, Elektriker. Geld anlegen... also, ich habe da meine
          Meinung zu. Mein Geld bleibt auf dem Konto, wo ich es sehen kann.
          Meine Frau hat mich hergeschickt." [lacht]
        nonverbal: "Verschränkte Arme, skeptisch"
        interpretation: |
          SEG-03 Prototyp. Sehr hohe λ, Identity Barrier ("nichts für mich").
          External Trigger (Frau), nicht intrinsisch motiviert.

      P7_Julia:
        verbal: |
          "Hi, ich bin Julia, Marketing. Investieren klingt irgendwie...
          erwachsen? Ich habe noch nicht so viel gespart, aber alle auf
          Social Media reden davon. Vielleicht sollte ich auch mal anfangen."
        nonverbal: "Offen, unsicher, sucht Orientierung"
        interpretation: |
          SEG-03 mit Social Media Trigger. Sehr hohe σ.
          Present Bias (β=0.60) limitiert langfristige Orientierung.

  # =========================================================================
  # TEIL 2: AKTUELLE EINSTELLUNG ZU INVESTIEREN (20 Min)
  # =========================================================================
  part_2_attitudes:
    duration: "20 Minuten"

    moderator_question_1: |
      "Wenn Sie an 'Investieren' denken - was sind die ersten drei Wörter,
      die Ihnen in den Sinn kommen?"

    responses_round_1:
      P1_Sandra: ["Risiko", "Kompliziert", "Reiche Leute"]
      P2_Thomas: ["Aktien", "Rendite", "Verlustgefahr"]
      P3_Leila: ["ETF", "Unsicher", "Zukunft"]
      P4_Marco: ["Diversifikation", "Langfristig", "Gebühren"]
      P5_Nina: ["Zeitaufwand", "Notwendig", "Kompliziert"]
      P6_Peter: ["Zockerei", "Casino", "Gefährlich"]
      P7_Julia: ["Finfluencer", "Verwirrend", "Cool?"]

    moderator_question_2: |
      "Interessant! Ich höre viel 'Risiko' und 'Kompliziert'.
      Sandra, Sie haben 'Risiko' gesagt - was genau meinen Sie damit?"

    discussion_excerpt:

      turn_1_Sandra: |
        "Naja, man hört doch immer, dass Leute ihr Geld verloren haben.
        2008, die Finanzkrise. Oder diese Crypto-Sachen. Ich will nicht
        aufwachen und mein Geld ist weg."

      turn_2_Thomas:
        response: |
          "Das sehe ich ähnlich. Aber man muss unterscheiden: Krypto ist
          Spekulation. Bei einem breit gestreuten Portfolio ist das Risiko
          anders. Aber ja, 2008 war heftig."
        moderator_note: "Thomas rationalisiert, aber die emotionale Angst bleibt."

      turn_3_Peter:
        response: |
          "Sehen Sie, genau das meine ich! [zu Sandra] Die Experten sagen
          das eine, und dann kommt eine Krise, und alles ist weg. Mein
          Nachbar hat damals die Hälfte verloren."
        moderator_note: "Anekdotische Evidenz verstärkt die Fear-Narrative."

      turn_4_Marco:
        response: |
          "Also, Moment. Wenn man langfristig dabei bleibt, hat man in der
          Geschichte noch nie Geld verloren. Nach 2008 kam 2009, und wer
          drin geblieben ist..."
        moderator_note: "Rationaler Einwand, aber erreicht die anderen nicht."

      turn_5_Sandra:
        response: |
          "[zu Marco] Ja, aber das ist ja das Problem - ich verstehe das
          nicht gut genug, um zu wissen, wann ich drin bleiben soll und
          wann nicht. Und ich habe nicht die Zeit, das alles zu lernen."
        moderator_note: |
          Kernbarrier: Complexity + Monitoring kombiniert.
          Auch bei gutem Wissen → Angst vor eigener Inkompetenz.

      turn_6_Julia:
        response: |
          "Ich glaube, das ist auch mein Problem. Auf Instagram sieht das
          alles so einfach aus, aber wenn ich dann die ganzen Begriffe
          sehe - ETF, TER, Thesaurierend... ich verstehe nur Bahnhof."
        moderator_note: "Knowledge Gap + Social Media Erwartungen = Frustration."

      turn_7_Nina:
        response: |
          "Ich finde, es müsste einfach jemanden geben, der sagt: 'Mach das,
          das ist gut für dich.' Ohne dass ich einen Doktor in Finanzen
          brauche. Und ohne dass ich jede Woche reinschauen muss."
        moderator_note: |
          Expliziter Wunsch nach Default/Empfehlung.
          Bestätigt κ-Hypothese für Landing Page Design.

    key_insights_part_2:
      - insight: "Fear of Loss ist universell, auch bei SEG-02"
        evidence: "Alle Teilnehmer, inkl. Marco, zeigen Risiko-Bewusstsein"

      - insight: "Complexity-Barrier ist mit Self-Efficacy verbunden"
        evidence: "Sandra: 'Ich verstehe nicht genug, um zu wissen...'"

      - insight: "Wunsch nach klarer Empfehlung ist stark"
        evidence: "Nina: 'Es müsste jemanden geben, der sagt: Mach das'"

      - insight: "Anekdoten schlagen Statistiken"
        evidence: "Peters 'Nachbar' hat mehr Wirkung als Marcos Fakten"

  # =========================================================================
  # TEIL 3: KONZEPT-TEST - LANDING PAGE DESIGNS (35 Min)
  # =========================================================================
  part_3_concept_test:
    duration: "35 Minuten"

    moderator_intro: |
      "Jetzt möchte ich Ihnen drei verschiedene Entwürfe für eine
      Einstiegsseite zum Thema Investieren zeigen. Diese würden Sie
      sehen, wenn Sie in der UBS App auf 'Sparen & Anlegen' tippen.

      Bitte sagen Sie mir Ihre erste, spontane Reaktion."

    # -------------------------------------------------------------------------
    # KONZEPT A: Current Design (Multiple Products)
    # -------------------------------------------------------------------------
    concept_a_current:
      description: |
        Headline: "Ihre Anlagemöglichkeiten"
        Zeigt 4 Produkte gleichwertig:
        - Key4 Smart Investing
        - Key4 Trading
        - Fondsparen
        - Wealth Management Mandate
        Jedes mit eigenem CTA "Mehr erfahren"

      responses:

        P1_Sandra:
          first_reaction: "Oh, das ist viel."
          elaboration: |
            "Ich weiss nicht, was der Unterschied zwischen den
            Dingen ist. Key4 Smart, Key4 Trading - ist das nicht
            das gleiche? Und was ist ein Mandat?"
          rating: 2  # von 5

        P4_Marco:
          first_reaction: "Okay, klassisches UBS."
          elaboration: |
            "Für mich ist das okay, ich kenne die Unterschiede.
            Aber für jemanden wie Sandra... das ist Overload."
          rating: 3  # von 5

        P6_Peter:
          first_reaction: "[stöhnt] Das ist genau, was ich meine."
          elaboration: |
            "Die wollen mir vier verschiedene Dinge verkaufen,
            und ich soll mich da durchwühlen? Nein danke."
          rating: 1  # von 5

        P7_Julia:
          first_reaction: "Welches ist das für mich?"
          elaboration: |
            "Ich will nicht recherchieren müssen. Sagt mir
            einfach, was für Anfänger das Richtige ist."
          rating: 2  # von 5

      aggregate_rating: 2.1
      key_feedback:
        - "Zu viele Optionen"
        - "Unterschiede unklar"
        - "Keine klare Empfehlung"

    # -------------------------------------------------------------------------
    # KONZEPT B: Single Default (Key4 Smart Focus)
    # -------------------------------------------------------------------------
    concept_b_single_default:
      description: |
        Headline: "Starten Sie in 5 Minuten"
        Subline: "Key4 Smart Investing - die einfache Art zu investieren"
        Fokus nur auf Key4 Smart
        CTAs: "Jetzt starten - ab CHF 500" (prominent)
              "Andere Optionen anzeigen" (klein, unten)
        Trust Badges: "UBS Sicherheit", "Jederzeit verfügbar"

      responses:

        P1_Sandra:
          first_reaction: "Oh, das ist viel klarer!"
          elaboration: |
            "Ich muss nicht entscheiden zwischen vier Dingen.
            Und ab CHF 500 - das ist ja fast nichts. Und 5 Minuten,
            das klingt machbar."
          rating: 4  # von 5

        P2_Thomas:
          first_reaction: "Besser, aber ich möchte schon wissen, was es sonst gibt."
          elaboration: |
            "'Andere Optionen anzeigen' ist gut - so kann ich selbst
            entscheiden, ob ich mehr wissen will. Aber ich frage mich,
            warum UBS dieses eine Produkt empfiehlt."
          rating: 4  # von 5

        P3_Leila:
          first_reaction: "'Jederzeit verfügbar' - das ist wichtig für mich."
          elaboration: |
            "Wegen der Wohnung. Wenn ich weiss, dass ich das Geld
            wieder rauskriege, bin ich eher bereit."
          rating: 4  # von 5

        P4_Marco:
          first_reaction: "Hmm, zu simpel für mich."
          elaboration: |
            "Ich will Informationen. Aber ich verstehe, warum ihr
            das so macht - für die meisten Leute hier ist das
            wahrscheinlich besser."
          rating: 3  # von 5

        P5_Nina:
          first_reaction: "Endlich! Genau so sollte das sein."
          elaboration: |
            "'5 Minuten' - das spricht mich an. Keine Entscheidungen,
            keine Komplexität. Einfach machen."
          rating: 5  # von 5

        P6_Peter:
          first_reaction: "[pausiert] Das ist... weniger schlimm."
          elaboration: |
            "Ich sage nicht, dass ich es machen würde. Aber wenn
            meine Frau das sieht, würde sie sagen: 'Schau, das ist
            einfach.' Ab CHF 500 ist auch nicht so viel Risiko."
          rating: 3  # von 5

        P7_Julia:
          first_reaction: "Ja! Das ist es!"
          elaboration: |
            "Eine Sache, klare Anweisung, schnell. Perfekt. Kann ich
            das in der App machen, ohne in die Filiale zu gehen?"
          rating: 5  # von 5

      aggregate_rating: 4.0
      key_feedback:
        - "Klare Empfehlung wird geschätzt"
        - "'5 Minuten' und 'ab CHF 500' sind starke Hooks"
        - "'Jederzeit verfügbar' adressiert Liquidity-Concern"
        - "Marco will mehr Details - Progressive Disclosure wichtig"

    # -------------------------------------------------------------------------
    # KONZEPT C: Fear-First Approach
    # -------------------------------------------------------------------------
    concept_c_fear_first:
      description: |
        Headline: "Ihr Geld verliert jeden Tag an Wert"
        Subline: "Inflation frisst Ihre Ersparnisse. Handeln Sie jetzt."
        Visualisierung: Kaufkraftverlust über 10 Jahre
        CTA: "Schützen Sie Ihr Geld"
        Sekundär: "So funktioniert Key4 Smart"

      responses:

        P1_Sandra:
          first_reaction: "[erschrickt] Oh Gott, wirklich?"
          elaboration: |
            "Das macht mir Angst... aber auf eine andere Art. Ich
            wusste, dass Inflation schlecht ist, aber so visualisiert...
            Das ist ein Weckruf."
          rating: 4  # von 5

        P2_Thomas:
          first_reaction: "Das ist ein valider Punkt."
          elaboration: |
            "Mathematisch stimmt das. Aber 'Handeln Sie jetzt' klingt
            ein bisschen... verkäuferisch? Ich mag die Grafik aber."
          rating: 3  # von 5

        P3_Leila:
          first_reaction: "Das ist heftig."
          elaboration: |
            "Ich habe nie so darüber nachgedacht, dass mein Geld auf
            dem Konto an Wert verliert. Aber 'Handeln Sie jetzt' ist
            mir zu pushy."
          rating: 3  # von 5

        P4_Marco:
          first_reaction: "Klassisches Fear-Marketing."
          elaboration: |
            "Funktioniert wahrscheinlich, aber ich finde es manipulativ.
            Für informierte Leute ist das eher abschreckend."
          rating: 2  # von 5

        P5_Nina:
          first_reaction: "Guter Punkt, schlechte Umsetzung."
          elaboration: |
            "Die Information ist wichtig. Aber der Ton... als Ärztin
            sage ich: Angst ist kein guter Motivator für langfristige
            Verhaltensänderung."
          rating: 3  # von 5

        P6_Peter:
          first_reaction: "Seht ihr? Die wollen mir Angst machen!"
          elaboration: |
            "Erst sagen sie, das Geld auf dem Konto ist nicht sicher,
            dann soll ich ihnen mein Geld geben? Ich traue dem nicht."
          rating: 1  # von 5

        P7_Julia:
          first_reaction: "Whoa, das ist krass."
          elaboration: |
            "Ich fühle mich schuldig, dass ich nicht investiere. Aber
            gleichzeitig... ist das wirklich so schlimm? Klingt übertrieben."
          rating: 3  # von 5

      aggregate_rating: 2.7
      key_feedback:
        - "Information (Inflation) wird als valide anerkannt"
        - "Ton wird als 'pushy' und 'manipulativ' wahrgenommen"
        - "SEG-03 (Peter) reagiert mit Misstrauen"
        - "Fear Reduction (Konzept B) > Fear Induction (Konzept C)"

    concept_comparison:
      ranking:
        1: "Konzept B: Single Default"
        2: "Konzept C: Fear-First (mit Vorbehalten)"
        3: "Konzept A: Current Design"

      winner_quote: |
        Nina: "Konzept B. Keine Frage. Es sagt mir, was ich tun soll,
        ohne mich zu überfordern oder mir Angst zu machen."

  # =========================================================================
  # TEIL 4: BARRIEREN-VERTIEFUNG (15 Min)
  # =========================================================================
  part_4_barriers:
    duration: "15 Minuten"

    moderator_question: |
      "Stellen Sie sich vor, Sie sehen Konzept B auf Ihrem Handy.
      Was müsste passieren, damit Sie tatsächlich auf 'Jetzt starten' tippen?"

    responses:

      P1_Sandra:
        needs: |
          "Ich müsste wissen, dass ich nichts falsch machen kann.
          Dass jemand aufpasst. Und dass ich jederzeit wieder rauskomme."
        barrier_addressed: "Fear of Loss, Control"

      P2_Thomas:
        needs: |
          "Ich bräuchte mehr Informationen über die Performance.
          Wie hat das in der Vergangenheit abgeschnitten? Und die Kosten -
          die müssen transparent sein."
        barrier_addressed: "Information Need, Trust"

      P3_Leila:
        needs: |
          "Mir ist wichtig zu wissen, dass das Geld nicht gesperrt ist.
          Und vielleicht... wenn ich sehe, dass andere in meiner
          Situation das auch machen."
        barrier_addressed: "Liquidity, Social Proof"

      P4_Marco:
        needs: |
          "Ich bräuchte einen Grund, von Swissquote zu wechseln.
          Was ist der Mehrwert? Convenience allein reicht nicht."
        barrier_addressed: "Value Proposition"

      P5_Nina:
        needs: |
          "Ich will das alles in derselben App wie mein Banking.
          Ein Login, eine Übersicht. Das wäre der Killer-Feature."
        barrier_addressed: "Convenience, Consolidation"

      P6_Peter:
        needs: |
          "Ehrlich? Ich müsste jemanden kennen, der das macht und dem
          ich vertraue. Nicht die Bank, nicht ein Berater. Ein normaler
          Mensch wie ich."
        barrier_addressed: "Trust, Social Proof (Personal)"

      P7_Julia:
        needs: |
          "Wenn es wirklich so einfach ist wie gesagt - also in der App,
          5 Minuten, ab CHF 500 - dann würde ich es wahrscheinlich einfach
          ausprobieren. Was habe ich zu verlieren bei 500 Franken?"
        barrier_addressed: "Effort, Entry Threshold"

    synthesis:
      segment_01_needs:
        - "Reassurance (nichts falsch machen)"
        - "Exit Option (jederzeit raus)"
        - "Social Proof (andere wie ich)"

      segment_02_needs:
        - "Clear Value Proposition"
        - "Convenience/Consolidation"
        - "Details available (but not required)"

      segment_03_needs:
        - "Extreme Simplicity"
        - "Personal Trust (not institutional)"
        - "Low Stakes Entry (CHF 500)"

  # =========================================================================
  # TEIL 5: ABSCHLUSS (5 Min)
  # =========================================================================
  part_5_closing:
    duration: "5 Minuten"

    moderator_question: |
      "Letzte Frage: Auf einer Skala von 1-10, wie wahrscheinlich ist es,
      dass Sie in den nächsten 3 Monaten mit dem Investieren beginnen?
      Und was müsste passieren, um diese Zahl um 2 Punkte zu erhöhen?"

    responses:
      P1_Sandra:
        score_before: 4
        increase_to_6: "Wenn ich eine Schritt-für-Schritt Anleitung hätte und jemand, den ich fragen kann"

      P2_Thomas:
        score_before: 6
        increase_to_8: "Wenn ich ein Gespräch mit einem Berater hätte, der mir das erklärt"

      P3_Leila:
        score_before: 5
        increase_to_7: "Wenn meine Freundin sagt, dass das auch für Wohnungssparer okay ist"

      P4_Marco:
        score_before: 3
        increase_to_5: "Wenn UBS wirklich gute Konditionen hätte und ich alles konsolidieren könnte"

      P5_Nina:
        score_before: 7
        increase_to_9: "Wenn das mit meinem bestehenden UBS Konto nahtlos verbunden wäre"

      P6_Peter:
        score_before: 2
        increase_to_4: "Wenn mein Schwager es machen würde und mir sagen würde, dass es okay ist"

      P7_Julia:
        score_before: 5
        increase_to_7: "Wenn ich in 5 Minuten fertig wäre und nur CHF 500 reinstecken müsste"

    avg_score: 4.6
    avg_score_after_addressing_needs: 6.6

# =============================================================================
# SECTION 4: ERKENNTNISSE UND EMPFEHLUNGEN
# =============================================================================

key_insights:

  insight_1:
    title: "Konzept B (Single Default) gewinnt klar"
    evidence: "Rating 4.0 vs. 2.7 (C) vs. 2.1 (A)"
    implication: "Landing Page sollte einen klaren Default haben"

  insight_2:
    title: "Fear-First backfires bei Skeptikern"
    evidence: "Peter: 'Die wollen mir Angst machen!'"
    implication: "Fear Reduction > Fear Induction"

  insight_3:
    title: "Social Proof muss personal sein für SEG-03"
    evidence: "Peter: 'Jemanden kennen, dem ich vertraue'"
    implication: "Segment-specific Social Proof Messaging"

  insight_4:
    title: "Entry Threshold (CHF 500) ist starker Enabler"
    evidence: "Julia: 'Was habe ich zu verlieren bei 500 Franken?'"
    implication: "Low Entry Amount prominent kommunizieren"

  insight_5:
    title: "Liquidity-Versprechen ist kritisch"
    evidence: "Leila, Sandra fordern 'jederzeit verfügbar'"
    implication: "Exit Option früh und prominent zeigen"

  insight_6:
    title: "SEG-02 braucht klaren Value Proposition vs. Konkurrenz"
    evidence: "Marco: 'Warum sollte ich wechseln?'"
    implication: "Convenience-Messaging für Invested-Elsewhere Segment"

recommendations_for_landing_page:

  must_have:
    - "Single Default: Key4 Smart als einzige prominente Option"
    - "Entry Threshold: 'Ab CHF 500' im CTA"
    - "Exit Option: 'Jederzeit verfügbar' als Trust Signal"
    - "Simplicity Promise: '5 Minuten' oder ähnlich"

  should_have:
    - "Social Proof: Segment-specific ('Kunden wie Sie')"
    - "Progressive Disclosure: Details auf Anfrage"
    - "Beratungs-Option: Für nicht-Ready als Safe Exit"

  avoid:
    - "Multiple gleichwertige Optionen"
    - "Fear-based Headlines"
    - "Zu viel Information above-the-fold"
    - "Jargon (ETF, TER, etc.) ohne Erklärung"
