# =============================================================================
# SECTION 1: STRATEGIC CONTEXT (Updated from Scoping Meeting)
# =============================================================================

context:
  coe_strategic_priority_2026:
    focus_area: "Basic Banking & Investment Topics"
    initiative: "New navigation in Mobile Banking App"
    specific_challenge: "Save & Invest Landing Page for existing clients"

  background: |
    Over the past months, the UBS Experience Design Center of Excellence (CoE)
    and FehrAdvice have worked closely together to strengthen the behavioral
    foundations of the CoE and elevate its strategic relevance across UBS.

    This collaboration—grounded in interviews, behavioral analyses, and practical
    recommendations—demonstrated that integrating Behavioral Economics (BE) and
    AI-enabled behavioral intelligence offers significant potential for the CoE's
    mandate to drive measurable business impact, client-centricity, and
    organizational transformation.

  ai_as_multiplier:
    description: |
      AI was identified not as a separate technology initiative, but as a
      strategic enabler embedded across all recommendation areas.
    roles:
      - role: "Learning Engine"
        function: "Transforms projects into reusable knowledge"
      - role: "Sparring Partner"
        function: "Offers contextual, role-specific guidance"
      - role: "Amplifier"
        function: "Increases visibility, storytelling quality, and internal influence"

  beatrix_introduction:
    description: |
      As part of the exploration of AI-enabled behavioral intelligence,
      FehrAdvice introduced BEATRIX, the firm's scientifically grounded
      behavioral modelling suite.
    demonstrated_capabilities:
      - "Uncover hidden behavioral barriers and blind spots"
      - "Simulate likely reactions of different user/stakeholder segments"
      - "Design interventions with higher acceptance and lower risk"
      - "Strengthen strategic decisions by grounding them in science"

    key_insight: |
      A model like BEATRIX can only be fully understood by using it
      on a real business challenge.

  pilot_rationale:
    benefits:
      - "Solve a concrete business problem the CoE is already tackling"
      - "Experience BEATRIX through practical, hands-on collaboration"
      - "See added value vs. traditional design or intuition-driven approaches"
      - "De-risk future investment decisions"
      - "Create foundation for scaling behavioral intelligence across UBS"

    approach: |
      This pragmatic, solution-oriented collaboration approach ensures that
      BEATRIX proves its value before any long-term commitments are made.

# =============================================================================
# SECTION 2: OBJECTIVES (Dual Ambition)
# =============================================================================

objectives:
  dual_ambition:
    - id: "OBJ-1"
      name: "Immediate Business Value"
      description: |
        Create immediate business value by solving a concrete UBS challenge.
        Apply BEATRIX to uncover behavioral barriers, identify hidden drivers,
        and design interventions that increase adoption with greater precision
        and lower risk.

    - id: "OBJ-2"
      name: "Decision Basis for Future Integration"
      description: |
        Generate a robust decision basis for future integration of BEATRIX
        within the CoE. Enable the team to experience how BEATRIX works in
        practice—how insights are generated, how simulations inform
        decision-making, and how behavioral intelligence complements
        existing design capabilities.

  success_criteria:
    - "Behavioral diagnosis completed with actionable insights"
    - "Design recommendations grounded in evidence, not assumptions"
    - "Team has hands-on experience with BEATRIX"
    - "Clear value assessment for potential scaling"

# =============================================================================
# SECTION 3: THE PILOT CASE - SAVE & INVEST
# =============================================================================

pilot_case:
  name: "Save & Invest Tab - Mobile Banking"
  status: "CONFIRMED"  # From Scoping Meeting 2026-01-27

  challenge:
    entry_point: "New 'Save & Invest' tab in UBS Mobile Banking"
    context: "New navigation being launched in Mobile Banking App"
    goal: |
      When users tap this entry point, the landing page must guide them
      toward taking meaningful action—ideally opening a UBS Key4 Smart
      Investing account or, alternatively, requesting an appointment
      if they are not yet ready to invest.

  # ==========================================================================
  # TARGET SEGMENTS (Refined in Scoping Meeting)
  # ==========================================================================
  target_segments:
    primary_focus: "Existing UBS clients NOT yet invested WITH UBS"

    segment_types:
      - id: "TS-01"
        name: "Cash-only with UBS"
        description: "Clients who only hold cash at UBS, not invested anywhere"
        behavioral_profile: "Never invested, multiple barriers"
        barriers: ["Fear of loss", "Complexity perception", "Monitoring myth"]

      - id: "TS-02"
        name: "Invested elsewhere"
        description: "Clients invested with OTHER banks (e.g. Swissquote) but not with UBS"
        behavioral_profile: "Already investors, but UBS not chosen for investing"
        barriers: ["UBS not seen as investment platform", "Product confusion"]

      - id: "TS-03"
        name: "Not invested at all"
        description: "Clients who are not invested anywhere"
        behavioral_profile: "Fundamental non-investors"
        barriers: ["All behavioral barriers apply"]

  strategic_importance:
    headline_stat: "95% of UBS mobile users currently do not invest and hold cash instead"
    available_solutions: "Simple retail investment solutions are available"

    product_landscape:
      - "Key4 Smart Investing"
      - "Key4 Trading"
      - "Fund Accounts"
      - "Multiple Wealth Management mandates"

    complexity_issue: |
      UBS's broad product offering can create confusion for
      inexperienced or hesitant investors.

  # ==========================================================================
  # UBS INTERNAL CHALLENGES (From Scoping Meeting)
  # ==========================================================================
  ubs_internal_challenges:
    - id: "IC-01"
      challenge: "Product Structure Clarity"
      description: |
        UBS not 100% clear internally about product structure
        concerning investment strategy (Key4).
      impact: "Confusion passed on to customers"

    - id: "IC-02"
      challenge: "Market Coverage Gaps"
      description: "Key4 does not cover every market and every instrument"
      impact: "Limitations not clearly communicated"

    - id: "IC-03"
      challenge: "Strategic Focus Issues"
      description: "UBS has issues in focusing - too many options"
      impact: "Decision paralysis for customers"

    - id: "IC-04"
      challenge: "Self-Execution Deprioritized"
      description: "The bank is not so interested in self-execution"
      impact: "Tension between advisory push and self-service offering"

  # ==========================================================================
  # BEHAVIORAL BARRIERS (Updated with Meeting Insights)
  # ==========================================================================
  behavioral_barriers:
    source: "Research from Swiss universities"
    academic_reference: "Prof. Andreas Dittli, Universität Luzern"
    note: "In-depth analysis starting"

    barriers:
      - id: "BB-01"
        name: "Fear of Loss"
        description: "Fear of losses - fundamental barrier"
        source: "Prof. Dittli research"
        ebf_parameter: "lambda"
        severity: "high"

      - id: "BB-02"
        name: "Complexity Perception"
        description: "Perception of investing being a complicated topic"
        source: "Scoping Meeting"
        ebf_dimension: "AWARE"
        severity: "high"

      - id: "BB-03"
        name: "Monitoring Myth (24/7)"
        description: "Belief that investments require constant 24/7 monitoring"
        source: "Prof. Dittli research"
        ebf_dimension: "READY"
        severity: "high"
        reality: "Key4 Smart requires minimal monitoring"

      - id: "BB-04"
        name: "Low Interest"
        description: "Low interest in financial topics"
        ebf_dimension: "WHAT"
        severity: "medium"

      - id: "BB-05"
        name: "Mistrust"
        description: "Mistrust in financial institutions/products"
        ebf_parameter: "tau"
        severity: "medium"

      - id: "BB-06"
        name: "Perceived Effort"
        description: "Perceived effort to start investing"
        ebf_parameter: "friction"
        severity: "medium"

      - id: "BB-07"
        name: "Financial Myths"
        description: "Misconceptions about investing"
        ebf_dimension: "AWARE"
        severity: "medium"

  core_insight: |
    The challenge is not simply one of interface design.
    It is fundamentally a BEHAVIORAL PROBLEM: how to structure the
    landing page in a way that reduces fear, increases trust,
    clarifies choices, lowers effort, and helps users take a
    first step toward investing.

    KEY FINDING (Scoping Meeting): Multiple target segments exist
    with different barrier profiles - from never-investors to
    already-investors-but-not-with-UBS.

  beatrix_application:
    description: |
      Applying BEATRIX to this case enables UBS to go beyond
      surface-level UX questions and gain a deeper understanding
      of the psychological, cognitive, and motivational patterns
      that drive (or block) investment decisions.

    capabilities_applied:
      - "Model different user segments (Cash-only, Invested elsewhere, Never invested)"
      - "Simulate their responses to different landing page designs"
      - "Identify hidden acceptance barriers per segment"
      - "Recommend targeted interventions to increase conversions"
      - "Account for UBS internal challenges (product clarity, focus)"

  suitability_factors:
    - "High strategic relevance (CoE Priority 2026)"
    - "Touches broad segment of UBS clients"
    - "Connects directly to measurable business outcomes"
    - "Concrete opportunity to see behavioral intelligence in action"
    - "Multiple segment types allow rich BEATRIX demonstration"

# =============================================================================
# SECTION 4: EXPECTED DELIVERABLES
# =============================================================================

deliverables:
  - id: "DEL-01"
    name: "Behavioral Diagnosis"
    description: "A modelled behavioral diagnosis of the 'Save & Invest' challenge"
    type: "Analysis"

  - id: "DEL-02"
    name: "Design Recommendations"
    description: |
      Actionable, evidence-based design recommendations grounded in
      behavioral modelling rather than assumptions or trial-and-error.
    type: "Recommendations"

  - id: "DEL-03"
    name: "BEATRIX Demonstration"
    description: |
      A practical demonstration of BEATRIX in action, providing the team
      with hands-on experience in interpreting simulations and applying
      insights to real work.
    type: "Capability Building"

  - id: "DEL-04"
    name: "Scaling Decision Basis"
    description: |
      A clear decision basis for potential BEATRIX scaling, including
      value assessment, workflow fit, and expected strategic impact.
    type: "Strategic Assessment"

  - id: "DEL-05"
    name: "Reusable Behavioral Logic"
    description: |
      Reusable behavioral logic that can inform future journeys,
      products, and internal initiatives beyond this single case.
    type: "Knowledge Asset"

# =============================================================================
# SECTION 5: 10C MODEL REFERENCE
# =============================================================================

ebf_model:
  model_file: "model_10c.yaml"

  primary_dimensions:
    WHO: "UBS Mobile Banking Users (95% non-investors)"
    WHAT: "Investment behavior (Cash → Key4 Smart Investing)"
    HOW: "Landing page design, choice architecture"
    WHEN: "App engagement moment (Save & Invest tab tap)"
    WHERE: "Mobile Banking App context"
    AWARE: "Financial literacy, product knowledge gaps"
    READY: "Willingness barriers (fear, effort, myths)"
    STAGE: "Pre-contemplation → Contemplation → Action"

  key_parameters:
    lambda: "Loss aversion (fear of losses)"
    tau: "Trust in UBS/products"
    friction: "Perceived effort"
    kappa_ARCH: "Choice architecture effectiveness"

