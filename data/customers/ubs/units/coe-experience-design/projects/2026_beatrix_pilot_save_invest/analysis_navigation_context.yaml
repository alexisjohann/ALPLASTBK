# =============================================================================
# EBF DEEP ANALYSIS: NAVIGATION CONTEXT - SAVE & INVEST LANDING PAGE
# =============================================================================
# Project: EBF-PRJ-UBS-2026-037
# Analysis Type: TIEF (Comprehensive)
# Created: 2026-01-27
# Purpose: Vollständige Kontextanalyse für Navigation-Entscheidung
# =============================================================================

metadata:
  analysis_id: "ANA-UBS037-001"
  analysis_type: "navigation_context"
  ebf_mode: "TIEF"
  created: "2026-01-27"

  core_question: |
    Welche Navigation soll dem Kunden auf der "Save & Invest" Landing Page
    gezeigt werden, um maximale Conversion bei minimaler Friction zu erreichen?

# =============================================================================
# SECTION 1: DECISION CONTEXT OVERVIEW
# =============================================================================

decision_context:
  what_is_being_decided: |
    Die Struktur und Inhalte der "Save & Invest" Landing Page in der
    UBS Mobile Banking App. Konkret:
    - Welche Produkte werden angezeigt?
    - In welcher Reihenfolge?
    - Mit welcher Informationstiefe?
    - Mit welchen CTAs (Call-to-Actions)?
    - Für welche Segmente welche Variante?

  decision_maker: "UBS CoE Experience Design + Digital Banking Team"

  decision_impact:
    reach: "95% der UBS Mobile Banking User (potenzielle Non-Investors)"
    business_impact: "AuM Growth, Product Adoption, Customer Engagement"
    strategic_relevance: "CoE Priority 2026"

  constraints:
    technical:
      - "Mobile App Screen Size (limited real estate)"
      - "Existing App Architecture"
      - "Backend Integration (Key4, WM Systems)"
    regulatory:
      - "FINMA Anforderungen"
      - "MiFID II Suitability Requirements"
      - "Risk Disclosure Obligations"
    organizational:
      - "Key4 Product Limitations (not all markets/instruments)"
      - "Strategic Focus Issues (too many options internally)"
      - "Self-Execution vs. Advisory Tension"

# =============================================================================
# SECTION 2: 10C SYSTEMATIC ANALYSIS
# =============================================================================

analysis_10c:

  # ==========================================================================
  # WHO: Wer soll handeln?
  # ==========================================================================
  WHO:
    core_question: "Wer sind die Nutzer und wie unterscheiden sie sich?"

    primary_population:
      description: "UBS Mobile Banking Kunden, die nicht mit UBS investiert sind"
      size: "~95% der Mobile Banking User"

    segments:
      - id: "SEG-01"
        name: "Cash Holder - Never Invested"
        description: "Haben nur Cash bei UBS, noch nie investiert"
        estimated_share: 0.45

        demographics:
          age_skew: "Breiter Altersbereich, aber jüngere überrepräsentiert"
          income: "Mittel bis hoch (sonst kein UBS-Kunde)"
          financial_literacy: "Niedrig bis mittel"

        psychographics:
          risk_attitude: "Risk-averse bis risk-neutral"
          financial_engagement: "Niedrig"
          self_efficacy_investing: "Niedrig"
          identity: "Sieht sich nicht als 'Investor'"

        behavioral_parameters:
          lambda_loss_aversion: 2.8  # Hoch - Fear of Loss dominant
          beta_present_bias: 0.75    # Mittel-hoch - kurzfristig orientiert
          kappa_default_sensitivity: 0.80  # Hoch - folgt Defaults
          sigma_social_proof: 0.55   # Mittel
          tau_trust: 0.50            # Mittel - vertraut UBS als Bank

        primary_barriers:
          - "BB-01: Fear of Loss (λ = 2.8)"
          - "BB-02: Complexity Perception"
          - "BB-03: Monitoring Myth"

        intervention_affinity:
          high: ["Defaults", "Simplification", "Loss Reframing"]
          medium: ["Social Proof", "Education"]
          low: ["Financial Incentives", "Urgency"]
          contraindicated: ["Complex Information", "Too Many Options"]

      - id: "SEG-02"
        name: "Invested Elsewhere"
        description: "Investiert bei anderen Banken (z.B. Swissquote), aber nicht bei UBS"
        estimated_share: 0.25

        demographics:
          age_skew: "25-50, digital-affin"
          income: "Mittel bis hoch"
          financial_literacy: "Mittel bis hoch"

        psychographics:
          risk_attitude: "Risk-neutral bis risk-seeking"
          financial_engagement: "Hoch"
          self_efficacy_investing: "Hoch"
          identity: "Sieht sich als Investor"
          ubs_perception: "UBS = Banking, nicht Investing"

        behavioral_parameters:
          lambda_loss_aversion: 1.8  # Niedriger - bereits Investor
          beta_present_bias: 0.85    # Weniger present-biased
          kappa_default_sensitivity: 0.50  # Niedriger - wählt aktiv
          sigma_social_proof: 0.40   # Niedriger - eigene Meinung
          tau_trust_ubs_investing: 0.35  # Niedrig für UBS als Investment-Plattform

        primary_barriers:
          - "UBS not seen as investment platform"
          - "Existing relationship with competitor"
          - "Key4 limitations vs. full market access"
          - "Switching costs (mental, not financial)"

        intervention_affinity:
          high: ["Unique Value Proposition", "Convenience (alles bei einer Bank)"]
          medium: ["Product Comparison", "Performance Data"]
          low: ["Basic Education", "Defaults"]
          contraindicated: ["Oversimplification", "Condescending Tone"]

      - id: "SEG-03"
        name: "Fundamental Non-Investor"
        description: "Nicht investiert - weder bei UBS noch anderswo"
        estimated_share: 0.30

        demographics:
          age_skew: "Bimodal: Junge (noch nicht) + Ältere (bewusst nicht)"
          income: "Variabel"
          financial_literacy: "Niedrig"

        psychographics:
          risk_attitude: "Risk-averse"
          financial_engagement: "Sehr niedrig"
          self_efficacy_investing: "Sehr niedrig"
          identity: "Investieren ist nichts für mich"
          core_belief: "Cash is safe, investing is gambling"

        behavioral_parameters:
          lambda_loss_aversion: 3.2  # Sehr hoch
          beta_present_bias: 0.65    # Stark present-biased
          kappa_default_sensitivity: 0.85  # Sehr hoch
          sigma_social_proof: 0.60   # Mittel-hoch
          tau_trust: 0.40            # Niedrig

        primary_barriers:
          - "All barriers apply with maximum severity"
          - "Identity barrier: 'Not an investor type'"
          - "Inflation blindness"

        intervention_affinity:
          high: ["Strong Defaults", "Minimal Effort", "Trust Building"]
          medium: ["Social Proof (similar people invest)"]
          low: ["Education", "Rational Arguments"]
          contraindicated: ["Complexity", "Choice", "Risk Information Overload"]

    welfare_hierarchy:
      L0_individual: "Bessere Rendite, Vermögensaufbau, finanzielle Sicherheit"
      L1_household: "Familiäre finanzielle Stabilität"
      L2_community: "Erhöhte Finanzbildung"
      L3_society: "Kapitalmarktpartizipation, Altersvorsorge"

  # ==========================================================================
  # WHAT: Was treibt das Verhalten?
  # ==========================================================================
  WHAT:
    core_question: "Welche Utility-Dimensionen sind relevant?"

    target_behavior:
      current: "Cash halten, nicht investieren"
      desired_primary: "Key4 Smart Investing Account eröffnen"
      desired_secondary: "Beratungstermin vereinbaren"
      desired_tertiary: "Sich weiter informieren (ohne Absprung)"

    utility_dimensions:

      u_F_financial:
        weight: 0.25
        current_perception:
          belief: "Cash ist sicher, keine Verluste"
          bias: "Inflation Blindness - realer Wertverlust ignoriert"
          framing: "Nominaler Kontostand = Wert"
        target_perception:
          belief: "Langfristig investieren = bessere Rendite"
          reframe: "Cash verliert real 2-3% pro Jahr"
        intervention_implication: |
          Nicht mit Rendite-Versprechen locken (skeptisch),
          sondern realen Wertverlust von Cash visualisieren.

      u_E_emotional:
        weight: 0.30  # Hoch - Fear of Loss dominant
        current_perception:
          dominant_emotion: "Angst (vor Verlust, Komplexität, Kontrollverlust)"
          secondary: "Überforderung"
        target_perception:
          dominant_emotion: "Sicherheit durch smarte Lösung"
          secondary: "Stolz auf gute Entscheidung"
        intervention_implication: |
          Fear Reduction ist wichtiger als Gain Framing.
          "Du kannst nichts falsch machen" > "Du kannst gewinnen"

      u_P_psychological:
        weight: 0.20
        current_perception:
          comfort: "Cash = Peace of Mind"
          control: "Ich weiss, was ich habe"
          effort: "Investieren = viel Arbeit"
        target_perception:
          comfort: "Key4 Smart = Set and Forget"
          control: "Automatisch diversifiziert"
          effort: "Weniger als 5 Minuten"
        intervention_implication: |
          Monitoring Myth direkt adressieren.
          "Kein tägliches Checken nötig" prominent kommunizieren.

      u_S_social:
        weight: 0.15
        current_perception:
          norm: "Investieren = für Reiche/Experten"
          peer_behavior: "Unbekannt"
        target_perception:
          norm: "Normale Menschen investieren auch"
          peer_behavior: "X% ähnlicher Kunden investieren bereits"
        intervention_implication: |
          Social Proof für SEG-01 und SEG-03 effektiv.
          Weniger effektiv für SEG-02 (bereits Investor).

      u_X_identity:
        weight: 0.10
        current_perception:
          self_image: "Ich bin kein Investor-Typ"
          competence: "Ich verstehe das nicht"
        target_perception:
          self_image: "Ich bin ein smarter Sparer"
          competence: "Ich muss nicht alles verstehen"
        intervention_implication: |
          Identity Shift: "Sparer" → "Smarter Sparer"
          Nicht: "Werde ein Investor" (zu grosser Sprung)

  # ==========================================================================
  # HOW: Wie interagieren die Faktoren?
  # ==========================================================================
  HOW:
    core_question: "Welche Interventionen kombinieren wir wie?"

    # Primäre Navigation-Elemente als Interventionen
    navigation_elements_as_interventions:

      - element: "Hero Section (Above the Fold)"
        intervention_type: "T2_Salience + T1_Information"
        target_dimensions: ["AWARE", "WHAT"]
        design_principles:
          - "Emotionale Ansprache vor rationaler"
          - "Fear Reduction vor Gain Promise"
          - "Einfachheit signalisieren"

      - element: "Product Display"
        intervention_type: "T3_ChoiceArchitecture"
        target_dimensions: ["WHERE", "HOW"]
        design_principles:
          - "Reduktion auf 1 Default (Key4 Smart)"
          - "Andere Optionen sekundär/versteckt"
          - "Entscheidungsparalyse vermeiden"

      - element: "Social Proof Section"
        intervention_type: "T6_Social"
        target_dimensions: ["WHO", "WHAT"]
        design_principles:
          - "Segment-spezifisch (ähnliche Kunden)"
          - "Konkrete Zahlen, keine vagen Claims"

      - element: "CTA (Call-to-Action)"
        intervention_type: "T3_ChoiceArchitecture + T4_Commitment"
        target_dimensions: ["READY", "STAGE"]
        design_principles:
          - "Primär: Account eröffnen"
          - "Sekundär: Beratung buchen"
          - "Tertiär: Mehr erfahren (nicht wegnavigieren)"

      - element: "Trust Signals"
        intervention_type: "T1_Information"
        target_dimensions: ["AWARE", "READY"]
        design_principles:
          - "UBS Sicherheit"
          - "Keine versteckten Kosten"
          - "Jederzeit Ausstieg möglich"

    complementarity_matrix:
      positive_interactions:
        - pair: ["Simplification", "Default"]
          gamma: 0.35
          rationale: "Weniger Optionen + klare Empfehlung = Synergy"

        - pair: ["Social Proof", "Fear Reduction"]
          gamma: 0.25
          rationale: "Andere machens auch + ist sicher = Verstärkung"

        - pair: ["Low Effort CTA", "Trust Signals"]
          gamma: 0.20
          rationale: "Einfach + sicher = Barriere reduziert"

      negative_interactions:
        - pair: ["Too Much Information", "Simplification"]
          gamma: -0.30
          rationale: "Konflikt: Einfach sagen, aber viel zeigen"

        - pair: ["Risk Disclosure", "Fear Reduction"]
          gamma: -0.25
          rationale: "Regulatorisch nötig, aber verstärkt Fear"
          mitigation: "Timing: Risk Disclosure spät im Funnel"

        - pair: ["Multiple Products", "Default"]
          gamma: -0.35
          rationale: "Zu viele Optionen untergraben Default"
          mitigation: "Progressive Disclosure: Erst Default, dann Optionen"

  # ==========================================================================
  # WHEN: Wann ist der optimale Moment?
  # ==========================================================================
  WHEN:
    core_question: "Wann erreichen wir den User und in welchem Zustand?"

    trigger_moment:
      event: "User tappt auf 'Save & Invest' Tab"
      interpretation: |
        User hat AKTIV den Tab gewählt → Signal von Interesse.
        Aber: Interesse ≠ Bereitschaft zu handeln.
        Möglicherweise nur Neugier oder versehentlicher Tap.

    user_state_hypotheses:

      - state: "Curious Explorer"
        estimated_share: 0.50
        mindset: "Was ist das? Mal schauen..."
        attention_level: "Niedrig-Mittel"
        commitment_level: "Sehr niedrig"
        optimal_response: "Hook with emotion, not information overload"

      - state: "Active Considerer"
        estimated_share: 0.30
        mindset: "Ich überlege, ob ich investieren soll"
        attention_level: "Mittel-Hoch"
        commitment_level: "Mittel"
        optimal_response: "Provide clear path, reduce friction"

      - state: "Ready to Act"
        estimated_share: 0.15
        mindset: "Ich will jetzt starten"
        attention_level: "Hoch"
        commitment_level: "Hoch"
        optimal_response: "Minimize steps to completion"

      - state: "Accidental Visitor"
        estimated_share: 0.05
        mindset: "Oops, falscher Tab"
        attention_level: "Sehr niedrig"
        commitment_level: "Null"
        optimal_response: "Nicht aufdringlich, easy exit"

    temporal_context_factors:

      - factor: "Session Context"
        description: "Was hat User vorher in der App gemacht?"
        relevance: "Hoch"
        data_available: "Ja (App Analytics)"
        implications:
          - "Nach Kontostand-Check: Cash-Realität salient machen"
          - "Nach Überweisung: Geld ist gerade Thema"

      - factor: "Calendar Timing"
        description: "Wann im Monat/Jahr?"
        relevance: "Mittel"
        implications:
          - "Monatsanfang nach Lohn: Mehr Disposable Income"
          - "Jahresende: Steueroptimierung salient"
          - "Bonus-Zeit: Grosse Summen verfügbar"

      - factor: "Market Context"
        description: "Wie ist die aktuelle Marktstimmung?"
        relevance: "Mittel (für SEG-02 hoch)"
        implications:
          - "Bull Market: FOMO kann helfen"
          - "Bear Market: Fear verstärkt, aber auch 'Buy Low'"
          - "Neutral: Am besten für rationale Entscheidung"

  # ==========================================================================
  # WHERE: In welchem Kontext findet die Entscheidung statt?
  # ==========================================================================
  WHERE:
    core_question: "Welche Choice Architecture liegt vor?"

    physical_context:
      device: "Smartphone (Mobile Banking App)"
      screen_size: "Limited - ca. 375x812 px (iPhone)"
      attention_context: "On-the-go, möglicherweise abgelenkt"
      session_duration: "Typisch 30-90 Sekunden"

    current_choice_architecture:
      default: "Kein Default - User muss aktiv wählen"
      friction: "Hoch - Multiple Schritte, Informationsflut"
      clarity: "Niedrig - Zu viele Optionen (Key4 Smart, Key4 Trading, Funds, WM)"

      problems:
        - "No clear recommendation"
        - "Paradox of Choice - zu viele Optionen"
        - "Information Overload möglich"
        - "Friction nicht minimiert"

    proposed_choice_architecture:
      default: "Key4 Smart Investing als klare Empfehlung"
      friction: "Minimal - 3 Taps bis Kontoeröffnung"
      clarity: "Hoch - Eine Empfehlung, Rest sekundär"

      key_principles:
        - principle: "Single Default"
          implementation: "Key4 Smart prominent, andere versteckt"
          rationale: "Entscheidungsparalyse vermeiden"

        - principle: "Progressive Disclosure"
          implementation: "Erst Headline, dann Details on-demand"
          rationale: "Nicht überfordern"

        - principle: "Friction Audit"
          implementation: "Jeden Schritt auf Notwendigkeit prüfen"
          rationale: "Jeder Klick = Absprung-Risiko"

        - principle: "Safe Exit"
          implementation: "Beratung als Alternative, nicht Sackgasse"
          rationale: "Wer nicht ready ist, soll nicht verloren gehen"

  # ==========================================================================
  # AWARE: Was wissen die User (nicht)?
  # ==========================================================================
  AWARE:
    core_question: "Welche Wissenslücken blockieren?"

    knowledge_gaps:

      - gap_id: "KG-01"
        gap: "Inflation Erosion"
        description: "User wissen nicht, dass Cash real an Wert verliert"
        current_awareness: 0.25
        target_awareness: 0.70
        intervention: "Kaufkraft-Visualisierung (CHF 10k heute vs. in 10 Jahren)"
        placement: "Hero Section oder Pre-Hero"

      - gap_id: "KG-02"
        gap: "Key4 Smart Simplicity"
        description: "User wissen nicht, wie einfach Key4 Smart ist"
        current_awareness: 0.15
        target_awareness: 0.80
        intervention: "3-Schritt-Visualisierung (Einzahlen - Automatisch anlegen - Fertig)"
        placement: "Zentral auf Landing Page"

      - gap_id: "KG-03"
        gap: "Monitoring Not Required"
        description: "User glauben, sie müssen täglich checken"
        current_awareness: 0.20
        target_awareness: 0.75
        intervention: "Explizit adressieren: 'Kein tägliches Monitoring nötig'"
        placement: "Trust Signals Section"

      - gap_id: "KG-04"
        gap: "Entry Threshold"
        description: "User glauben, man braucht viel Geld"
        current_awareness: 0.30
        target_awareness: 0.80
        intervention: "Ab CHF 500 starten möglich"
        placement: "Near CTA"

      - gap_id: "KG-05"
        gap: "Exit Flexibility"
        description: "User glauben, Geld ist 'eingesperrt'"
        current_awareness: 0.25
        target_awareness: 0.70
        intervention: "Jederzeit Zugriff auf Ihr Geld"
        placement: "Trust Signals Section"

    myths_to_address:
      - myth: "Man braucht viel Geld zum Investieren"
        reality: "Ab CHF 500 möglich"
        segment_relevance: "SEG-01, SEG-03"

      - myth: "Man muss ständig den Markt beobachten"
        reality: "Key4 Smart ist automatisiert"
        segment_relevance: "Alle, besonders SEG-03"

      - myth: "Investieren ist Glücksspiel"
        reality: "Diversifiziertes, langfristiges Anlegen ≠ Spekulation"
        segment_relevance: "SEG-03"

      - myth: "Man muss sich mit Aktien auskennen"
        reality: "Key4 Smart wählt automatisch"
        segment_relevance: "SEG-01, SEG-03"

  # ==========================================================================
  # READY: Wie handlungsbereit sind die User?
  # ==========================================================================
  READY:
    core_question: "Wie nah sind User an der Handlung?"

    willingness_model:
      W_base_by_segment:
        SEG_01_cash_holder: 0.15
        SEG_02_invested_elsewhere: 0.25
        SEG_03_never_invested: 0.08

      theta_activation_threshold: 0.60

      current_gap: |
        Selbst die "beste" Gruppe (SEG-02) liegt bei W=0.25,
        weit unter der Aktivierungsschwelle von 0.60.
        Interventionen müssen W um +0.35 bis +0.52 erhöhen.

    barriers_to_action:

      - barrier: "Fear of Loss"
        type: "emotional"
        severity: "high"
        delta_W_if_addressed: +0.15
        intervention: "Loss Reframing, Guarantees, Track Record"

      - barrier: "Complexity"
        type: "cognitive"
        severity: "high"
        delta_W_if_addressed: +0.12
        intervention: "Simplification, 3-Step Process"

      - barrier: "Effort Perception"
        type: "cognitive"
        severity: "medium"
        delta_W_if_addressed: +0.10
        intervention: "Friction Reduction, Time Estimation ('5 Minuten')"

      - barrier: "Monitoring Myth"
        type: "cognitive"
        severity: "high"
        delta_W_if_addressed: +0.08
        intervention: "Explicit Myth Busting"

      - barrier: "Trust Deficit"
        type: "emotional"
        severity: "medium"
        delta_W_if_addressed: +0.07
        intervention: "UBS Safety, Transparency, Exit Option"

    readiness_enablers:
      - "Clear Default (removes decision burden)"
      - "Low Entry (CHF 500)"
      - "Easy Exit (kein Lock-in)"
      - "Familiar Brand (UBS)"
      - "Mobile Convenience (schon in der App)"

  # ==========================================================================
  # STAGE: Wo in der Journey sind die User?
  # ==========================================================================
  STAGE:
    core_question: "Welche Journey-Phase dominiert?"

    bcj_distribution_estimate:
      # Unter den 95% Non-Investors
      unaware: 0.20      # Wissen nicht, dass sie investieren könnten/sollten
      aware: 0.45        # Wissen es, haben aber nie ernsthaft überlegt
      considering: 0.20  # Überlegen aktiv
      intending: 0.10    # Planen es zu tun
      acting: 0.04       # In Aktion (die 5% die investieren)
      maintaining: 0.01  # Regelmässige Investoren

    implications_for_landing_page:

      - phase: "Unaware"
        share: 0.20
        challenge: "Wissen nicht, warum sie hier sind"
        page_role: "Educate + Create Desire"
        key_content: "Warum investieren? (Inflation, Opportunity Cost)"

      - phase: "Aware"
        share: 0.45
        challenge: "Wissen es, aber 'irgendwann mal'"
        page_role: "Create Urgency + Reduce Barriers"
        key_content: "Warum jetzt? Warum einfach?"

      - phase: "Considering"
        share: 0.20
        challenge: "Vergleichen Optionen, unsicher"
        page_role: "Simplify Choice + Build Confidence"
        key_content: "Key4 Smart ist die richtige Wahl für dich"

      - phase: "Intending"
        share: 0.10
        challenge: "Wollen, aber Friction/Procrastination"
        page_role: "Remove All Friction + Immediate CTA"
        key_content: "Jetzt in 5 Minuten starten"

    page_must_serve_multiple_phases: |
      Die Landing Page muss ALLE Phasen bedienen können.
      Aber: Above-the-fold sollte auf AWARE + CONSIDERING fokussieren
      (zusammen 65% der Besucher).

  # ==========================================================================
  # HIERARCHY: Auf welcher Ebene wird entschieden?
  # ==========================================================================
  HIERARCHY:
    core_question: "Welche Entscheidungsebene ist dominant?"

    decision_levels:

      L0_automatic:
        description: "Automatische Reaktionen, Habits"
        relevance: "Mittel"
        current_state: "Default = Cash halten (Status Quo)"
        intervention: "Neuen Default setzen"

      L1_heuristic:
        description: "Schnelle Daumenregeln"
        relevance: "HOCH - Hauptblockade"
        current_heuristics:
          - "'Investieren ist riskant' → Nicht machen"
          - "'Investieren ist kompliziert' → Nicht machen"
          - "'Braucht viel Geld' → Nicht für mich"
          - "'UBS = Banking, nicht Investing' → Anderswo schauen"
        intervention: "Neue Heuristiken etablieren"
        target_heuristics:
          - "'Key4 Smart = Einfach und sicher'"
          - "'Ab CHF 500 = Auch für mich'"
          - "'UBS = Alles aus einer Hand'"

      L2_deliberate:
        description: "Bewusstes Abwägen"
        relevance: "Niedrig für SEG-01, Mittel für SEG-02"
        note: |
          Die meisten Non-Investors erreichen L2 gar nicht,
          weil L1-Heuristiken vorher blocken.
          Erst wenn L1-Barrieren adressiert sind, wird L2 relevant.

      L3_meta:
        description: "Übergeordnete Werte und Prinzipien"
        relevance: "Niedrig kurzfristig, Hoch langfristig"
        relevant_values:
          - "Finanzielle Sicherheit für Familie"
          - "Verantwortungsvoller Umgang mit Geld"
          - "Zukunftsvorsorge"
        note: |
          L3 ist für Landing Page weniger relevant (zu wenig Zeit),
          aber für Follow-up Kommunikation wichtig.

    primary_intervention_level: "L1_heuristic"
    rationale: |
      Die Blockade passiert auf L1 (schnelle Daumenregeln).
      Die Landing Page muss primär L1-Heuristiken adressieren:
      - "Ist sicher" (Fear of Loss)
      - "Ist einfach" (Complexity)
      - "Ist für mich" (Identity/Threshold)

# =============================================================================
# SECTION 3: Ψ-KONTEXT-DIMENSIONEN
# =============================================================================

psi_context_analysis:

  psi_I_institutional:
    value: 0.75
    label: "Regulatorischer Kontext"
    factors:
      - "FINMA Anforderungen für Investment Products"
      - "MiFID II Suitability (muss Risikoprofil erheben)"
      - "Risk Disclosure Pflichten"
    implications_for_navigation:
      - "Risk Disclosure MUSS vorhanden sein (aber Timing optimieren)"
      - "Suitability Check im Onboarding nötig"
      - "Transparenz zu Kosten Pflicht"
    design_tension: |
      Regulatorische Anforderungen (Risk Disclosure) können
      Fear verstärken. Balance nötig: Compliant aber nicht abschreckend.

  psi_S_social:
    value: 0.55
    label: "Sozialer Kontext"
    factors:
      - "Entscheidung wahrscheinlich alleine (Mobile, privat)"
      - "Keine direkte soziale Observation"
      - "Aber: Social Proof kann simuliert werden"
    implications_for_navigation:
      - "Social Proof Elemente einbauen ('X Kunden investieren bereits')"
      - "Peer Comparison ('Ähnliche Kunden wie Sie...')"
      - "Keine sociale Pressure (backfire bei Privacy-conscious)"

  psi_C_cognitive:
    value: 0.70
    label: "Kognitive Last"
    factors:
      - "Mobile Kontext = Begrenzte Aufmerksamkeit"
      - "Finanzthema = Intrinsisch komplex"
      - "Product Landscape = Viele Optionen"
    implications_for_navigation:
      - "Cognitive Load minimieren"
      - "Chunking: Eine Sache nach der anderen"
      - "Visual > Text"
      - "Progressive Disclosure"

  psi_K_cultural:
    value: 0.65
    label: "Schweizer Kultur"
    factors:
      - "Konservative Finanzmentalität"
      - "Hohes Sicherheitsbedürfnis"
      - "Skepsis gegenüber 'zu gut um wahr zu sein'"
      - "Qualität über Preis"
    implications_for_navigation:
      - "Keine aggressiven Sales-Tactics"
      - "Understatement > Overselling"
      - "Sicherheit und Solidität betonen"
      - "UBS Brand als Trust Anchor nutzen"

  psi_E_economic:
    value: 0.70
    label: "Wirtschaftlicher Kontext"
    factors:
      - "Negativzinsen Geschichte (Cash kostet)"
      - "Aktuelle Inflation (Cash verliert Wert)"
      - "Schweizer Wohlstand (Geld vorhanden)"
    implications_for_navigation:
      - "Inflation als Argument nutzen (subtil)"
      - "Keine Armuts-Narrative (nicht passend)"
      - "Opportunity Cost of Cash framen"

  psi_T_temporal:
    value: 0.50
    label: "Zeitlicher Kontext"
    factors:
      - "Kurzfristige Aufmerksamkeitsspanne (Mobile)"
      - "Langfristige Investitionsentscheidung"
      - "Tension: Schnelle Entscheidung für langfristiges Commitment"
    implications_for_navigation:
      - "Entscheidung muss schnell möglich sein"
      - "Aber: Kein Druck auf langfristiges Commitment"
      - "Lösung: 'Starte klein, wachse später'"

  psi_M_material:
    value: 0.80
    label: "Technischer Kontext"
    factors:
      - "Moderne UBS Mobile App"
      - "Gute UX Standards vorhanden"
      - "Key4 Backend Integration"
    implications_for_navigation:
      - "Native App Experience nutzen"
      - "Nahtlose Integration in Banking Flow"
      - "Keine technischen Hürden"

  psi_F_physical:
    value: 0.40
    label: "Physischer Kontext"
    factors:
      - "Mobile = On-the-go"
      - "Kleine Screen Size"
      - "Möglicherweise öffentlicher Raum"
    implications_for_navigation:
      - "Thumb-friendly Design"
      - "Lesefreundliche Schriftgrösse"
      - "Kein sensitiver Content above-the-fold"

# =============================================================================
# SECTION 4: NAVIGATION DESIGN RECOMMENDATIONS
# =============================================================================

navigation_recommendations:

  overall_strategy: |
    Die Navigation sollte einem "Inverted Funnel" Ansatz folgen:
    1. Emotional Hook (Above the Fold) - Aufmerksamkeit
    2. Barrier Reduction - Ängste adressieren
    3. Single Clear Path - Key4 Smart als Default
    4. Graduated Commitment - Klein starten möglich
    5. Safe Exit - Beratung als Alternative

  above_the_fold:
    priority: "KRITISCH - Entscheidet über Engagement"
    max_time: "3 Sekunden für ersten Eindruck"

    components:
      - component: "Headline"
        purpose: "Emotional Hook + Pain Point"
        recommendation: |
          NICHT: "Investieren mit UBS" (zu generisch)
          SONDERN: "Ihr Geld arbeitet nicht für Sie" oder
                   "Lassen Sie Ihr Erspartes nicht auf dem Konto liegen"
        segment_targeting: "Universal, aber SEG-01/03 optimiert"

      - component: "Subheadline"
        purpose: "Solution Promise"
        recommendation: |
          "Mit Key4 Smart Investing starten Sie in 5 Minuten -
          ohne Vorkenntnisse, ab CHF 500"

      - component: "Hero Visual"
        purpose: "Trust + Simplicity Signal"
        recommendation: |
          Visualisierung die Einfachheit zeigt.
          NICHT: Charts, Graphen (zu komplex, zu 'Investment-y')
          SONDERN: Simple Progress/Growth Visual

      - component: "Primary CTA"
        purpose: "Clear Next Step"
        recommendation: |
          "Jetzt starten" oder "Kostenloses Konto eröffnen"
          NICHT: "Mehr erfahren" (zu passiv)

  below_the_fold:

    section_1_fear_reduction:
      position: "Direkt nach Hero"
      purpose: "Adressiert Top 3 Barriers"
      content:
        - element: "Kein Risiko beim Start"
          detail: "Ab CHF 500, jederzeit Zugriff"
        - element: "Kein Monitoring nötig"
          detail: "Key4 Smart investiert automatisch für Sie"
        - element: "Kein Expertenwissen nötig"
          detail: "Wir machen die Arbeit, Sie entspannen"

    section_2_social_proof:
      position: "Nach Fear Reduction"
      purpose: "Social Validation"
      content:
        - element: "Kundenzahl"
          detail: "Bereits X Kunden investieren mit Key4 Smart"
        - element: "Segment-specific"
          detail: "Kunden wie Sie, die vorher auch nur Cash hatten..."

    section_3_how_it_works:
      position: "Mitte"
      purpose: "Demystify Process"
      content:
        - step: "1. Betrag wählen"
          detail: "Ab CHF 500, Sie entscheiden wieviel"
        - step: "2. Risikoprofil bestimmen"
          detail: "3 kurze Fragen, 1 Minute"
        - step: "3. Automatisch investiert"
          detail: "Key4 Smart erledigt den Rest"

    section_4_product_details:
      position: "Weiter unten (für Interested)"
      purpose: "Details für die, die mehr wollen"
      design_principle: "Progressive Disclosure - Collapsed by Default"
      content:
        - "Kosten transparent"
        - "Anlagestrategie erklärt"
        - "Performance Track Record"

    section_5_alternatives:
      position: "Unten"
      purpose: "Safe Exit für nicht-Ready"
      content:
        - element: "Beratung buchen"
          framing: "Noch Fragen? Sprechen Sie mit einem Experten"
        - element: "Mehr erfahren"
          framing: "Alle Details zu Key4 Smart"

  segment_personalization:
    approach: "Subtle, basierend auf verfügbaren Daten"

    for_seg_01_cash_holder:
      signals: ["Hoher Kontostand", "Kein Investment-Konto"]
      personalization:
        - "Inflation-Visualisierung prominent"
        - "Fear Reduction betont"
        - "'Ähnliche Kunden wie Sie' Social Proof"

    for_seg_02_invested_elsewhere:
      signals: ["Geringer Kontostand", "Inflows von Competitor Depots"]
      personalization:
        - "Convenience betonen ('Alles an einem Ort')"
        - "Weniger Basic Education"
        - "Feature Comparison vs. Konkurrenz (subtle)"

    for_seg_03_never_invested:
      signals: ["Kleiner Kontostand", "Junges Konto"]
      personalization:
        - "Maximale Simplification"
        - "'Jeder kann investieren' Framing"
        - "Minimal Entry Amount prominent"

# =============================================================================
# SECTION 5: TESTABLE HYPOTHESES FOR BEATRIX
# =============================================================================

testable_hypotheses:

  - id: "H-01"
    hypothesis: "Fear-First Headline > Gain-First Headline"
    test: |
      A: "Ihr Geld verliert täglich an Wert" (Fear/Loss Frame)
      B: "Lassen Sie Ihr Geld für sich arbeiten" (Gain Frame)
    expected_winner: "A (Fear-First)"
    rationale: "Loss Aversion (λ > 2) macht Verlust-Framing effektiver"
    segment_variation: "Stärker für SEG-01/03, schwächer für SEG-02"

  - id: "H-02"
    hypothesis: "Single Default > Multiple Options"
    test: |
      A: Nur Key4 Smart prominent, Rest versteckt
      B: Alle 4 Optionen gleichwertig präsentiert
    expected_winner: "A (Single Default)"
    rationale: "Paradox of Choice, Entscheidungsparalyse"
    risk: "SEG-02 könnte Options vermissen"

  - id: "H-03"
    hypothesis: "Explicit Myth Busting > Implicit Benefits"
    test: |
      A: "Kein tägliches Monitoring nötig" (adressiert Myth direkt)
      B: "Automatisierte Anlage" (impliziert no monitoring)
    expected_winner: "A (Explicit)"
    rationale: "Myths müssen direkt adressiert werden"

  - id: "H-04"
    hypothesis: "Segment-specific Social Proof > Generic Social Proof"
    test: |
      A: "100'000 Kunden investieren mit UBS"
      B: "40% der Kunden, die vorher nur Cash hatten, investieren jetzt"
    expected_winner: "B (Segment-specific)"
    rationale: "Similarity Heuristic - 'Leute wie ich'"

  - id: "H-05"
    hypothesis: "Low Entry Amount im CTA > versteckt"
    test: |
      A: "Jetzt starten - ab CHF 500"
      B: "Jetzt starten" (Betrag später im Flow)
    expected_winner: "A (Amount prominent)"
    rationale: "Adressiert 'Braucht viel Geld' Barrier früh"

# =============================================================================
# SECTION 6: RISK ASSESSMENT
# =============================================================================

risks_and_mitigations:

  - risk: "Over-Simplification für SEG-02"
    severity: "Medium"
    description: "Erfahrene Investoren fühlen sich unterfordert"
    mitigation: "Progressive Disclosure - Details verfügbar für die, die suchen"

  - risk: "Regulatory Pushback"
    severity: "Medium"
    description: "Compliance könnte Fear Reduction Messaging ablehnen"
    mitigation: "Frühe Einbindung Legal/Compliance in Design"

  - risk: "Brand Perception"
    severity: "Low-Medium"
    description: "'UBS wird zu retail/mass market'"
    mitigation: "Quality Positioning beibehalten, nicht discounter wirken"

  - risk: "Cannibalization"
    severity: "Low"
    description: "Key4 Smart kannibalisiert WM Mandates"
    mitigation: "Clear Segmentation - Key4 für Einsteiger, WM für Affluent+"

  - risk: "Backfire bei zu viel Urgency"
    severity: "Medium"
    description: "Schweizer Kultur mag keinen Hard Sell"
    mitigation: "Subtle Urgency, keine Countdown Timer oder Pressure Tactics"

