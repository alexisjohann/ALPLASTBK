  active:
    - superkey: "EBF-PRJ-UBS-2026-037"
      project_id: "UBS_037"
      name: "BEATRIX Pilot - Save & Invest"
      status: "active"
      phase: "discovery"  # Case CONFIRMED (Scoping Meeting 2026-01-27)
      start_date: "2026-01-27"
      folder: "projects/2026_beatrix_pilot_save_invest/"
      team:
        ubs: ["Markus", "Anna"]
        fehradvice: ["Gerhard", "Manuel"]
      description: |
        BEATRIX pilot on Mobile Banking 'Save & Invest' landing page.
        Dual objective: (1) solve concrete behavioral challenge,
        (2) create decision basis for BEATRIX scaling.
      challenge: |
        95% of UBS mobile users don't invest despite available solutions.
        Target: Existing UBS clients not yet invested WITH UBS
        (cash-only, invested elsewhere, or never invested).
      academic_reference: "Prof. Andreas Dittli, Universität Luzern"
      deliverables:
        - "Behavioral diagnosis"
        - "Evidence-based design recommendations"
        - "BEATRIX demonstration"
        - "Scaling decision basis"
        - "Reusable behavioral logic"

  planned: []

  completed:
    - superkey: "EBF-PRJ-UBS-2025-036"
      project_id: "UBS_036"
      name: "Capability Building"
      status: "completed"
      year: 2025
      description: "Behavioral Design Capability Building für CoE Experience Design"
      detail_file: "projects/UBS_036_capability_building.yaml"
      10c_focus: ["HOW", "AWARE", "READY"]
      strategic_priorities:
        - "P1: Capability Building (Storytelling, Data Fluency, Experimentation)"
        - "P2: Organizational Structure & Positioning"
        - "P3: Culture & Engagement"
      deliverables:
        - type: "Master Class"
          description: "4-Session Behavioral Economics Master Class (11-12.5h)"
        - type: "Ambassadors"
          description: "BE Ambassador Program with Peer Coaching"
        - type: "Curriculum"
          description: "Long-Term Curriculum with Credit System & Certification"
        - type: "Toolkits"
          description: "BE Toolbox, Storytelling Templates, Experimentation Checklists"
      outcomes:
        - "Shared behavioral economics language established within CoE"
        - "First wave of BE Ambassadors identified and trained"
        - "Tangible intervention designs created for UBS cases"
        - "Storytelling capabilities strengthened"
        - "Foundation for long-term curriculum laid"
      learnings: []  # TBD - Lessons Learned

