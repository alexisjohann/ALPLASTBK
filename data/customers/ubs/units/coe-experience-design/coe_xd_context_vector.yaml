    - "Prozess-Mapping der CoE Design-Workflows"
    - "Quantitative Daten zu Projekt-Outcomes"
  estimated_effort: "2-3 Tage"
  recommended_trigger: "Nach erfolgreichem BEATRIX Pilot (UBS_037)"

