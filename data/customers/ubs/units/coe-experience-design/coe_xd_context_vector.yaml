# =============================================================================
#
# HINWEIS: Dies ist ein Unit-Context-Vector (nicht Kunde/Firma).
# Das CoE XD ist eine interne UBS-Abteilung.
# Der Vektor dokumentiert den Kontext, in dem das CoE operiert.
#
# VERERBUNG: Erbt UBS Master-Kontext (EBF-CUS-UBS)
# =============================================================================

metadata:
  superkey: "EBF-UNT-UBS-COEXD-001"
  name: "UBS CoE Experience Design - Kontextvektor"
  code: "BCM2_UNIT_UBS_COEXD"
  layer: "unit"  # nicht "mikro" - interne Unit
  version: "1.0.0"
  last_updated: "2026-01-27"
  cva_stufe: "SCHNELL"
  total_factors: 32

  description: |
    Kontextvektor für das Center of Excellence for Experience Design bei UBS Schweiz.
    Dokumentiert den internen Kontext, in dem das CoE operiert, seine internen
    "Kunden" (Business Units), und die Ψ-Dimensionen der Organisation.

  hierarchy:
    parent_superkey: "EBF-CUS-UBS"
    parent: "UBS Group AG"
    inherits: "ubs_profile.yaml"
    grandparent: "BCM2_04_KON (MAKRO Schweiz)"

  ebf_mapping:
    primary_10c:
      - "WHO"      # Wer nutzt CoE Services?
      - "WHAT"     # Was treibt Design-Entscheidungen?
      - "HOW"      # Wie arbeitet das CoE?
      - "STAGE"    # Wo in der Journey?
    primary_psi:
      - "kappa_ORG"       # Organisationskontext UBS
      - "kappa_PROCESS"   # Design-Prozesse
      - "kappa_TECH"      # Technologie-Stack

# =============================================================================
# UNIT ORGANISATION (~8 Faktoren)
# =============================================================================

unit_organisation:
  name_full: "Center of Excellence for Experience Design"
  name_short: "CoE XD"
  abbreviation: "XD"

  # Einordnung in UBS
  parent_division: "Personal & Corporate Banking"  # oder Group-wide?
  location: "Zürich"
  scope: "UBS Schweiz"  # Primär CH, aber Group-wide Mandate möglich

  # Team
  team_size:
