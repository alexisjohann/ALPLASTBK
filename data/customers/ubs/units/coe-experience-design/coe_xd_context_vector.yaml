    contractors: null
  team_composition:
    - role: "Experience Designers"
      count: null
    - role: "UX Researchers"
      count: null
    - role: "Service Designers"
      count: null

  # Mandat
  mandate:
    primary: "Kundenerlebnis-Optimierung für UBS Schweiz"
    scope_areas:
      - "Customer Journey Design"
      - "Digital Experience (App, Online Banking)"
      - "Service Design"
      - "Touchpoint-Optimierung"

  # Interne Positionierung
  positioning:
    type: "Center of Excellence"
    role: "Zentrale Design-Expertise für Business Units"
    maturity: "Established"  # TBD

# =============================================================================
# Ψ-DIMENSIONEN (8 Faktoren)
# =============================================================================
# Kontext, in dem das CoE operiert - INTERNE UBS-Perspektive
# Skala: 0.0 (niedrig) bis 1.0 (hoch)
# =============================================================================

psi_dimensions:

  psi_I_institutional:
    value: 0.85
    label: "Institutionell (UBS-intern)"
    description: |
      Stark reguliertes Umfeld innerhalb einer G-SIB.
      Design-Entscheidungen müssen Compliance, Risiko und
      regulatorische Anforderungen berücksichtigen.
    key_factors:
      - "FINMA-Regulierung beeinflusst UX-Entscheidungen"
      - "Interne Governance-Prozesse für Design Changes"
      - "Brand Guidelines als institutioneller Rahmen"
    ebf_kappa: "kappa_INST"
    implication: "Design muss Compliance-by-Design integrieren"

  psi_S_social:
    value: 0.70
    label: "Sozial (Interne Stakeholder)"
    description: |
      Komplexes Stakeholder-Netzwerk innerhalb UBS.
      Multiple Business Units mit unterschiedlichen Prioritäten.
      Post-CS-Integration: Kulturelle Konsolidierung noch im Gange.
    key_factors:
      - "Multiple Business Units als 'Kunden'"
      - "CS-Integration: Zwei Design-Kulturen verschmelzen"
      - "Hierarchische Entscheidungswege"
    ebf_kappa: "kappa_SOCIAL"
    implication: "Stakeholder-Management ist kritisch"

  psi_C_cognitive:
    value: 0.65
    label: "Kognitiv (Design Complexity)"
    description: |
      Hohe Komplexität der Design-Challenges durch:
      - Breites Produktportfolio (Key4, WM Mandate, etc.)
      - Diverse Zielgruppen (Retail bis UHNW)
      - Multi-Channel Anforderungen
    key_factors:
      - "Produktkomplexität (zu viele Optionen)"
      - "Multi-Segment Design (Retail ↔ UHNW)"
      - "Omnichannel-Konsistenz erforderlich"
    ebf_kappa: "kappa_COG"
    implication: "Simplifikation ist Kernaufgabe"

  psi_K_cultural:
    value: 0.60
    label: "Kulturell (Design Culture)"
    description: |
      Design-Kultur bei UBS: Traditionell eher konservativ,
      aber zunehmend customer-centric. CoE soll BE-Mindset etablieren.
    key_factors:
      - "Traditionelle Bankkultur (risk-averse)"
      - "Wachsende Customer-Centricity Ambition"
      - "BE/Behavioral Design noch nicht mainstream"
    ebf_kappa: "kappa_CULT"
    implication: "Change Management für BE-Adoption nötig"

  psi_E_economic:
    value: 0.75
    label: "Ökonomisch (Ressourcen)"
    description: |
      Ausreichende Ressourcen durch UBS-Zugehörigkeit,
      aber Kostendruck durch CS-Integration.
    key_factors:
      - "Budget für Design-Projekte vorhanden"
      - "Kostendruck durch Integration (CHF 13 Mrd Savings-Ziel)"
      - "ROI-Nachweis für Design-Investitionen gefordert"
    ebf_kappa: "kappa_ECON"
    implication: "Messbare Impact-Nachweise erforderlich"

  psi_T_temporal:
    value: 0.55
    label: "Temporal (Zeithorizont)"
    description: |
      Spannungsfeld zwischen kurzfristigen Projekt-Deadlines
      und langfristiger Experience-Strategie.
    key_factors:
      - "Projekt-Zyklen oft kurz (Quartals-Releases)"
      - "Strategische XD-Roadmap langfristig (2-3 Jahre)"
      - "CS-Integration als dominanter Treiber (bis 2026)"
    ebf_kappa: "kappa_TEMP"
    implication: "Quick Wins UND strategische Arbeit balancieren"

  psi_M_material:
    value: 0.80
    label: "Materiell (Tools & Tech)"
    description: |
      Moderner Tech-Stack, aber Legacy-Systeme aus
      CS-Integration noch im Übergang.
    key_factors:
      - "UBS Mobile Banking App (modern)"
      - "Design Tools (Figma, etc.) verfügbar"
      - "Legacy-Systeme (CS) noch nicht vollständig migriert"
    ebf_kappa: "kappa_MAT"
    implication: "Tech-Constraints in Design berücksichtigen"

  psi_F_physical:
    value: 0.45
    label: "Physisch (Arbeitskontext)"
    description: |
      Hybrid Work Modell. Design-Arbeit primär digital,
      aber Workshops und Co-Creation Sessions physisch.
    key_factors:
      - "Hybrid Work (2-3 Tage Office)"
      - "Remote Collaboration Tools etabliert"
      - "Physische Workshops für Co-Creation"
    ebf_kappa: "kappa_PHYS"
    implication: "Hybrid Workshop-Formate nötig"

# =============================================================================
# INTERNE "KUNDEN" (Stakeholder-Segmente des CoE)
# =============================================================================
# Das CoE hat interne "Kunden" - Business Units und Projektteams
# die Design-Services nachfragen
# =============================================================================

internal_stakeholders:

  - id: "STK-01"
    name: "Digital Banking Teams"
    description: "Teams für Mobile & Online Banking (Key4, E-Banking)"
    priority: "high"
    share: 0.35  # Anteil der CoE-Kapazität

    needs:
      - "UX Research für neue Features"
      - "Journey Mapping für digitale Prozesse"
      - "A/B Testing Support"

    behavioral_characteristics:
      innovation_appetite: 0.75  # Hoch - digital-native
      time_pressure: 0.80       # Hoher Release-Druck
      be_awareness: 0.50        # Mittel - offen aber nicht tief

    collaboration_style: "Agile, Sprint-basiert"

  - id: "STK-02"
    name: "Wealth Management Units"
    description: "GWM und P&C Banking für Affluent/HNW Kunden"
    priority: "high"
    share: 0.30

    needs:
      - "Client Journey Optimierung"
      - "Advisory Experience Design"
      - "Hybrid Digital/Personal Service Design"

    behavioral_characteristics:
      innovation_appetite: 0.55  # Moderat - konservativer
      time_pressure: 0.50       # Weniger Druck
      be_awareness: 0.40        # Niedriger

    collaboration_style: "Waterfall-tendiert, längere Zyklen"

  - id: "STK-03"
    name: "Marketing & Communications"
    description: "Marketing-Teams inkl. Aydin Sahin"
    priority: "medium"
    share: 0.20

    needs:
      - "Campaign Landing Pages"
      - "Customer Communication Design"
      - "Behavioral Messaging Support"

    behavioral_characteristics:
      innovation_appetite: 0.70
      time_pressure: 0.85  # Kampagnen-Deadlines
      be_awareness: 0.60   # Höher - Marketing nutzt BE

    collaboration_style: "Projekt-basiert, deadline-driven"

  - id: "STK-04"
    name: "Strategic Projects"
    description: "Cross-funktionale Strategie-Initiativen"
    priority: "medium"
    share: 0.15

    needs:
      - "Service Blueprinting"
      - "Customer Experience Strategy"
      - "Experience Measurement Frameworks"

    behavioral_characteristics:
      innovation_appetite: 0.65
      time_pressure: 0.40  # Längerer Horizont
      be_awareness: 0.55

    collaboration_style: "Strategisch, Workshop-intensiv"

# =============================================================================
# COE CAPABILITIES & BEHAVIORAL DESIGN MATURITY
# =============================================================================

capabilities:

  core_capabilities:
    - name: "Customer Journey Mapping"
      maturity: 0.80
      description: "Gut etabliert"

    - name: "UX Research"
      maturity: 0.75
      description: "Gut etabliert"

    - name: "Service Design"
      maturity: 0.70
      description: "Vorhanden"

    - name: "Prototyping & Testing"
      maturity: 0.75
      description: "Gut etabliert"

    - name: "Behavioral Design"
      maturity: 0.40
      description: "Im Aufbau - daher FehrAdvice Partnership"

    - name: "Behavioral Measurement"
      maturity: 0.30
      description: "Nascent - BEATRIX als Lösung evaluiert"

  behavioral_design_maturity:
    overall_score: 0.40
    assessment: |
      Das CoE hat starke klassische Design-Capabilities,
      aber Behavioral Design/Economics ist noch nicht tief
      integriert. Capability Building (UBS_036) war erster
      Schritt. BEATRIX Pilot (UBS_037) soll BE operationalisieren.

    strengths:
      - "Offenheit für BE-Integration"
      - "Erkannte Notwendigkeit"
      - "Management Support"

    gaps:
      - "Keine systematische BE-Methodik"
      - "Keine Behavioral Measurement Tools"
      - "BE noch nicht in Standard-Prozessen"

# =============================================================================
# STRATEGISCHE IMPLIKATIONEN FÜR FEHRADVICE
# =============================================================================

strategic_implications:

  top_3_opportunities:
    - dimension: "HOW"
      opportunity: "BE in Standard-Design-Prozesse integrieren"
      intervention_type: "Methodology Integration"
      fehradvice_role: "Process Design + Training"

    - dimension: "AWARE"
      opportunity: "BEATRIX als Diagnostic Tool etablieren"
      intervention_type: "Tool Adoption"
      fehradvice_role: "Pilot + Capability Building"

    - dimension: "STAGE"
      opportunity: "Journey-Phasen-spezifische Interventionen"
      intervention_type: "Framework Provision"
      fehradvice_role: "10C Integration in Journey Maps"

  top_3_risks:
    - risk: "BE bleibt 'nice-to-have', nicht Kern-Methodik"
      mitigation: "Messbare Erfolge im Pilot (UBS_037) zeigen"

    - risk: "Zu viele Stakeholder, keine Priorisierung"
      mitigation: "Fokus auf 1-2 High-Impact Cases"

    - risk: "Tool-Fokus (BEATRIX) statt Mindset-Change"
      mitigation: "Capability Building parallel zu Tool-Rollout"

  recommended_approach: |
    1. BEATRIX Pilot auf konkretem Case (nach Scoping Meeting)
    2. Quick Win mit messbarem Impact
    3. Learnings in Capability Building transferieren
    4. Schrittweise Ausweitung auf weitere Stakeholder

# =============================================================================
# UPGRADE-PFAD
# =============================================================================

upgrade_path:
  current_level: "SCHNELL"
  next_level: "STANDARD"
  requirements_for_upgrade:
