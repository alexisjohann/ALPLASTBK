metadata:
  document_type: "value_proposition"
  target_unit: "EBF-UNT-UBS-COEXD-001"
  target_name: "UBS Center of Excellence for Experience Design"
  provider: "FehrAdvice & Partners AG"
  version: "1.0.0"
  created: "2026-01-27"
  last_updated: "2026-01-27"

# =============================================================================
# EXECUTIVE SUMMARY
# =============================================================================

executive_summary:
  headline: "Behavioral Intelligence für Experience Design"

  value_statement: |
    FehrAdvice ermöglicht dem CoE XD, Design-Entscheidungen auf
    wissenschaftlicher Verhaltensforschung zu fundieren - nicht auf
    Intuition oder Trial-and-Error. Mit dem Evidence-Based Framework (EBF)
    und BEATRIX wird Behavioral Economics operationalisierbar.

  key_differentiators:
    - "Wissenschaftlich fundiert: Prof. Ernst Fehr, 50+ Jahre BE-Forschung"
    - "Operationalisierbar: Keine Theorie, sondern anwendbare Tools"
    - "Messbar: Von Diagnose bis ROI-Nachweis"
    - "Skalierbar: Von Einzelprojekt bis Enterprise-Integration"

  current_be_maturity: 0.40
  target_be_maturity: 0.70
  maturity_gap: "Behavioral Design ist im CoE noch nicht systematisch integriert"

# =============================================================================
# 1. DIAGNOSTIK & ANALYSE
# =============================================================================

capability_1_diagnostik:
  name: "Diagnostik & Analyse"
  tagline: "Verstehen, warum Kunden (nicht) handeln"

  offerings:

    - id: "DIAG-01"
      name: "BEATRIX Behavioral Modeling"
      description: |
        KI-gestützte Verhaltensmodellierung zur Simulation von
        Kundenreaktionen auf Design-Entscheidungen.
      capabilities:
        - "Segmentierung nach Verhaltensmustern (nicht nur Demografie)"
        - "Simulation von Reaktionen auf Design-Varianten"
        - "Prediction von Conversion Rates"
        - "Identifikation versteckter Barrieren"
      use_cases:
        - "Save & Invest Landing Page: Welches Design für welches Segment?"
        - "Onboarding: Wo brechen Kunden ab und warum?"
        - "Cross-Selling: Wann ist der richtige Moment?"
      deliverables:
        - "Behavioral Segment Profiles"
        - "Simulation Results"
        - "Design Recommendations"

    - id: "DIAG-02"
      name: "10C Systematic Analysis"
      description: |
        Strukturierte Analyse entlang 10 Dimensionen:
        WHO → WHAT → HOW → WHEN → WHERE → AWARE → READY → STAGE → HIERARCHY → EIT
      capabilities:
        - "Vollständige Erfassung aller relevanten Faktoren"
        - "Keine blinden Flecken"
        - "Reproduzierbare Methodik"
      use_cases:
        - "Neue Feature-Entwicklung: Alle Dimensionen checken"
        - "Journey Redesign: Systematische Lückenanalyse"
      deliverables:
        - "10C Analysis Report"
        - "Dimension Scores"
        - "Priority Matrix"

    - id: "DIAG-03"
      name: "Barrier Mapping"
      description: |
        Identifikation und Kategorisierung der Gründe,
        warum Kunden nicht handeln.
      barrier_categories:
        - category: "Cognitive"
          examples: ["Komplexität", "Information Overload", "Confusion"]
        - category: "Emotional"
          examples: ["Fear", "Mistrust", "Anxiety"]
        - category: "Motivational"
          examples: ["Low Interest", "No Urgency", "Identity Mismatch"]
        - category: "Structural"
          examples: ["Friction", "Effort", "Time"]
        - category: "Social"
          examples: ["Norms", "Peer Pressure", "Stigma"]
        - category: "Economic"
          examples: ["Cost", "Perceived Value", "Budget"]
      deliverables:
        - "Barrier Inventory"
        - "Impact Assessment"
        - "Prioritized Intervention List"

# =============================================================================
# 2. DESIGN & INTERVENTION
# =============================================================================

capability_2_design:
  name: "Design & Intervention"
  tagline: "Wissenschaftlich fundierte Lösungen entwickeln"

  offerings:

    - id: "DES-01"
      name: "Choice Architecture Design"
      description: |
        Gestaltung der Entscheidungsumgebung nach
        verhaltensökonomischen Prinzipien.
      tools:
        - tool: "Defaults"
          description: "Optimale Voreinstellungen setzen"
          example: "Key4 Smart als empfohlene Option"
        - tool: "Framing"
          description: "Information optimal präsentieren"
          example: "Gewinn- vs. Verlust-Framing testen"
        - tool: "Friction"
          description: "Hürden reduzieren oder gezielt einsetzen"
          example: "One-Click Account Opening"
        - tool: "Salience"
          description: "Aufmerksamkeit lenken"
          example: "Key Information hervorheben"
        - tool: "Simplification"
          description: "Komplexität reduzieren"
          example: "3 statt 12 Produktoptionen"
      deliverables:
        - "Choice Architecture Blueprint"
        - "A/B Test Hypotheses"
        - "Implementation Specs"

    - id: "DES-02"
      name: "9D Intervention Design"
      description: |
        Systematisches Design von Interventionen entlang
        9 Dimensionen mit dem 20-Field Schema.
      dimensions:
        - "Information (AWARE)"
        - "Framing (AWARE)"
        - "Defaults (WHERE)"
        - "Friction (WHERE)"
        - "Social Proof (WHO)"
        - "Commitment (HOW)"
        - "Incentives (WHAT)"
        - "Timing (WHEN)"
        - "Identity (WHAT)"
      includes:
        - "Crowding-Out Check (keine kontraproduktiven Kombinationen)"
        - "Phase-Affinity Matching (richtige Intervention zur richtigen Zeit)"
        - "Segment-Multiplier (Wirkung pro Segment)"
      deliverables:
        - "Intervention Specification (20 Fields)"
        - "Complementarity Analysis"
        - "Expected Effect Sizes"

    - id: "DES-03"
      name: "Journey-Phase Intervention Matching"
      description: |
        Auswahl der richtigen Intervention für die
        richtige Phase der Customer Journey.
      journey_phases:
        - phase: "Unaware → Aware"
          effective_interventions: ["Information", "Salience", "Social Proof"]
          alpha_range: "0.7-0.9"
        - phase: "Aware → Considering"
          effective_interventions: ["Framing", "Trust Building", "Simplification"]
          alpha_range: "0.6-0.8"
        - phase: "Considering → Intending"
          effective_interventions: ["Social Proof", "Commitment", "Urgency"]
          alpha_range: "0.5-0.7"
        - phase: "Intending → Acting"
          effective_interventions: ["Defaults", "Friction Reduction", "Implementation Intentions"]
          alpha_range: "0.7-0.9"
      deliverables:
        - "Phase-Intervention Matrix"
        - "Journey-specific Recommendations"

# =============================================================================
# 3. MESSUNG & VALIDIERUNG
# =============================================================================

capability_3_messung:
  name: "Messung & Validierung"
  tagline: "Wirkung nachweisen und optimieren"

  offerings:

    - id: "MESS-01"
      name: "Behavioral KPI Framework"
      description: |
        Definition und Tracking von verhaltensbasierten
        Erfolgskennzahlen.
      kpi_categories:
        - category: "Conversion"
          kpis: ["Completion Rate", "Drop-off Points", "Funnel Conversion"]
        - category: "Engagement"
          kpis: ["Time on Page", "Interaction Depth", "Return Rate"]
        - category: "Friction"
          kpis: ["Error Rate", "Help Requests", "Abandonment Reasons"]
        - category: "Behavioral"
          kpis: ["Default Acceptance", "Social Proof Response", "Framing Sensitivity"]
      deliverables:
        - "KPI Dashboard Design"
        - "Measurement Framework"
        - "Baseline Assessment"

    - id: "MESS-02"
      name: "LLMMC Parameter Estimation"
      description: |
        LLM Monte Carlo Methode zur Schätzung von
        Verhaltensparametern ohne teure Primärforschung.
      parameters_estimated:
        - parameter: "λ (Loss Aversion)"
          description: "Wie stark wiegt Verlust vs. Gewinn?"
          typical_range: [1.5, 3.0]
        - parameter: "β (Present Bias)"
          description: "Wie stark ist Gegenwartspräferenz?"
          typical_range: [0.7, 1.0]
        - parameter: "κ (Default Sensitivity)"
          description: "Wie stark folgen Kunden Defaults?"
          typical_range: [0.4, 0.9]
        - parameter: "σ (Social Proof)"
          description: "Wie stark wirken soziale Normen?"
          typical_range: [0.3, 0.8]
      deliverables:
        - "Parameter Estimates with Confidence Intervals"
        - "Segment-specific Values"
        - "Sensitivity Analysis"

    - id: "MESS-03"
      name: "A/B Test Design & Analysis"
      description: |
        Wissenschaftlich fundiertes Experiment-Design
        für valide Erkenntnisse.
      includes:
        - "Hypothesen-Formulierung aus BEATRIX Predictions"
        - "Sample Size Calculation"
        - "Effect Size Prediction"
        - "Statistical Analysis Plan"
        - "Interpretation Support"
      deliverables:
        - "Test Protocol"
        - "Analysis Report"
        - "Learnings Documentation"

# =============================================================================
# 4. CAPABILITY BUILDING
# =============================================================================

capability_4_building:
  name: "Capability Building"
  tagline: "Behavioral Design im CoE verankern"

  offerings:

    - id: "CAP-01"
      name: "Behavioral Economics Training"
      description: |
        Schulungsprogramm für CoE-Mitarbeiter auf verschiedenen
        Tiefenstufen.
      modules:
        - module: "BE Foundations"
          duration: "1 Tag"
          audience: "Alle CoE-Mitarbeiter"
          content: ["Kernkonzepte", "Biases", "Heuristiken", "Anwendungsbeispiele"]
        - module: "Applied BE for Designers"
          duration: "2 Tage"
          audience: "Experience Designer, UX Researcher"
          content: ["Choice Architecture", "Barrier Mapping", "Intervention Design"]
        - module: "BEATRIX Practitioner"
          duration: "1 Tag"
          audience: "Power User"
          content: ["Tool-Nutzung", "Interpretation", "Integration in Workflow"]
      deliverables:
        - "Training Materials"
        - "Certification"
        - "Reference Cards"

    - id: "CAP-02"
      name: "Behavioral Design Playbooks"
      description: |
        Praxisorientierte Leitfäden für spezifische
        Design-Challenges.
      playbooks:
        - name: "Onboarding Optimization"
          pages: 20
          content: "Friction Reduction, Progress Indicators, Defaults"
        - name: "Conversion Boosting"
          pages: 25
          content: "CTA Design, Urgency, Social Proof"
        - name: "Trust Building"
          pages: 20
          content: "Transparency, Social Proof, Risk Communication"
        - name: "Decision Simplification"
          pages: 15
          content: "Choice Reduction, Categorization, Recommendations"
      deliverables:
        - "Digital Playbooks"
        - "Quick Reference Cards"
        - "Case Examples"

    - id: "CAP-03"
      name: "Process Integration"
      description: |
        Integration von Behavioral Design in bestehende
        CoE-Prozesse und Workflows.
      integration_points:
        - process: "Design Sprint"
          integration: "BE Checkpoint nach Discovery Phase"
        - process: "Journey Mapping"
          integration: "Barrier Mapping als Standard-Layer"
        - process: "Feature Specification"
          integration: "10C Checklist vor Sign-off"
        - process: "A/B Testing"
          integration: "Behavioral Hypothesen als Standard"
      deliverables:
        - "Updated Process Templates"
        - "Quality Gates Definition"
        - "Checklist Integration"

