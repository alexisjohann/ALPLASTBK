metadata:
  superkey: "EBF-SVC-UBS-SPEED-001"
  name: "Speed-Format Collaboration Model"
  name_de: "Zusammenarbeits-1-Pager (Speed-Format)"
  type: "service_model"
  version: "1.0.0"
  created: "2026-01-27"
  status: "active"

  applies_to:
    customer: "EBF-CUS-UBS"
    unit: "EBF-UNT-UBS-COEXD-001"

  note: "FehrAdvice Research - nicht Teil der offiziellen API"

# =============================================================================
# ZWECK
# =============================================================================

purpose:
  de: |
    ZГјgige und strukturierte Bearbeitung von Fragestellungen des UBS Center
    of Excellence durch FehrAdvice, mit klar definierten Lieferobjekten,
    begrenztem Scope und planbarer Bearbeitungsdauer.

  en: |
    Fast and structured processing of questions from UBS Center of Excellence
    by FehrAdvice, with clearly defined deliverables, limited scope, and
    predictable processing time.

# =============================================================================
# GESAMTSETUP AUF EINEN BLICK
# =============================================================================

overview:
  total_duration:
    min_days: 2
    max_days: 5
    unit: "Arbeitstage (AT)"
    note: "abhГӨngig von Anzahl und KomplexitГӨt der Fragestellungen"

  touchpoints:
    - type: "Briefing-Call"
      duration_min: 30
      count: 1

    - type: "Working Sessions"
      duration_min: 60
      count: 2

    - type: "Asynchrone Ausarbeitung"
      duration: "variabel"
      owner: "FehrAdvice"

# =============================================================================
# PHASEN
# =============================================================================

phases:

  # ---------------------------------------------------------------------------
  # PHASE 1: Briefing-Call
  # ---------------------------------------------------------------------------
  - phase: 1
    name: "Briefing-Call"
    name_de: "Briefing-Call"
    duration_min: 30
    mode: "synchron"
    day: 1

    goal:
      de:
        - "SchГӨrfung der Fragestellungen"
        - "KlГӨrung von Ziel, Verwendung und PrioritГӨt"

    output:
      de:
        - "BestГӨtigte Fragestellungen"
        - "Klarer Bearbeitungsauftrag an FehrAdvice"

    participants:
      ubs: ["CoE XD Team"]
      fehradvice: ["Project Lead"]

  # ---------------------------------------------------------------------------
  # PHASE 2: Vorstrukturierung
  # ---------------------------------------------------------------------------
  - phase: 2
    name: "Vorstrukturierung"
    name_de: "Vorstrukturierung"
    duration: "variabel"
    mode: "asynchron"
    owner: "FehrAdvice"
    day: "1-2"

    content:
      de:
        - "Fragestellung"
        - "Ziel"
        - "Scope"
        - "Out-of-Scope"
        - "Vorgehenslogik"
        - "Vorschlag Lieferobjekte"
        - "Grober Zeitplan (innerhalb 2-5 AT)"

    purpose:
      de:
        - "Vorbereitung der strukturierten Diskussion"
        - "Reduktion von Iterationen in den Sessions"

    output:
      format: "Strukturdokument"
      delivery: "vor Session 1"

  # ---------------------------------------------------------------------------
  # PHASE 3: Session 1
  # ---------------------------------------------------------------------------
  - phase: 3
    name: "Session 1"
    name_de: "Session 1 - Lieferobjekte & Struktur"
    duration_min: 60
    mode: "synchron"
    day: "2-3"

    goal:
      de:
        - "Festlegung von Art der Lieferobjekte"
        - "Festlegung von Tiefe und Format"
        - "Festlegung von verbindlichem Scope / Out-of-Scope"

    output:
      de:
        - "Abgenommene Lieferobjekte"
        - "Klarer Anpassungsauftrag an FehrAdvice"

    participants:
      ubs: ["CoE XD Team"]
      fehradvice: ["Project Lead", "Subject Matter Expert"]

  # ---------------------------------------------------------------------------
  # PHASE 4: Detailausarbeitung
  # ---------------------------------------------------------------------------
  - phase: 4
    name: "Detailausarbeitung"
    name_de: "Detailausarbeitung"
    duration_days:
      min: 1
      max: 3
      note: "Bestandteil der Gesamtdauer von 2-5 AT"
    mode: "asynchron"
    owner: "FehrAdvice"
    day: "3-4"

    content:
      de: "Ausarbeitung der vereinbarten Lieferobjekte"

    output:
      format: "GemГӨss Session 1 Vereinbarung"
      delivery: "vor Session 2"

  # ---------------------------------------------------------------------------
  # PHASE 5: Session 2
  # ---------------------------------------------------------------------------
  - phase: 5
    name: "Session 2"
    name_de: "Session 2 - Detailfragen & Finalisierung"
    duration_min: 60
    mode: "synchron"
    day: "4-5"

    goal:
      de:
        - "KlГӨrung offener Detailpunkte"
        - "Finaler Abgleich mit dem Bedarf des UBS CoE"

    output:
      de:
        - "Freigabe der Lieferobjekte"
        - "Abschluss des Bearbeitungspakets"

    participants:
      ubs: ["CoE XD Team"]
      fehradvice: ["Project Lead", "Subject Matter Expert"]

# =============================================================================
# ROLLENKLГ„RUNG
# =============================================================================

roles:

  ubs_coe:
    name: "UBS Center of Excellence"
    responsibilities:
      de:
        - "Formuliert Fragestellungen und Entscheidungskontext"
        - "Validiert Struktur und Ergebnisse"

  fehradvice:
    name: "FehrAdvice"
    responsibilities:
      de:
        - "Strukturiert Fragestellungen"
        - "Erarbeitet Inhalte"
        - "Liefert innerhalb des vereinbarten Zeitrahmens"

# =============================================================================
# LEITPLANKEN
# =============================================================================

guardrails:

  - rule: "Zeitrahmen"
    description_de: "2-5 AT = Standardrahmen, kein Open-End"
    enforcement: "strict"

  - rule: "Scope Freeze"
    description_de: "Keine neuen Fragestellungen nach dem Briefing-Call"
    enforcement: "strict"

  - rule: "Session Purpose"
    description_de: "Sessions dienen der PrГӨzisierung, nicht der Neuausrichtung"
    enforcement: "strict"

