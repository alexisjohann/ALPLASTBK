      description: "Ex-Präsident Rösti als Bundesrat UVEK = einzigartiger informeller Kanal"
      opportunity: "high"

  behavioral_implications: |
    Verbandsstruktur als Behavioral Constraint:
    - κ_INST = 0.92 (Verein-Regeln = rigide Entscheidungsstruktur)
    - Konsens-Orientierung = langsamer, aber robuster Output
    - Grünenfelder-Faktor: β_leadership > 0.8 (langfristiger, strategischer Horizont)
    - Interne Heterogenität (EU-Marken vs. Asien vs. China) erfordert Kompromisse

    → Entscheidungsarchitektur optimieren: Default-Positionen im Vorstand vorbereiten,
      damit GV schneller zu Beschlüssen kommt (Choice Architecture für Verbände)

