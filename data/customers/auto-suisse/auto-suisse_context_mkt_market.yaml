ebf_mapping:
  market_maturity: 0.65
  transformation_speed: 0.45
  note: "Markt in Transition: 33.9% Steckerfahrzeuge zeigt Fortschritt, aber tiefstes Zulassungsniveau seit 25 Jahren zeigt Belastung"

  behavioral_implications: |
    Marktdynamik als Behavioral Landscape:
    - Default-Analyse: Aktueller Default = Verbrenner/HEV (66% Markt)
    - Tipping Point: Bei ~40-45% Stecker → soziale Norm kippt (σ_social steigt stark)
    - Stadt-Land-Gap: Unterschiedliche Interventionen nötig (urban: Digital Nudges, rural: Probefahrt + In-Group Social Proof)
    - Premium-Markt CH: Höhere WTP als EU, aber auch höhere Erwartungen

    Segmentspezifische Hebel:
    - A2 (Pragmatische, 40%): TCO-Rechner + Probefahrt-Default + Leasing-Vergleich
    - A3 (Verbrenner-Loyale, 30%): Autonomie betonen, KEINE Moralisierung, Peer-Testimonials
    - A4 (Aufschieber, 15%): Zeitliche Begrenzung, Tauschprämie, Sicherheits-Framing

