      - "CO2-Flexibilisierung — EU-analoge Übergangsfristen fordern"
      - "Rahmenbedingungen — Standort CH wettbewerbsfähig halten"
      - "Elektrifizierung — marktgetrieben, nicht sanktionsgetrieben"
      - "Branchenvertretung — 220'000 Arbeitsplätze schützen"

  transformations:
    - type: "Regulatorische Anpassung"
      status: "kritisch"
      target: "CO2-Sanktionsregime flexibilisieren"

    - type: "Elektrifizierung"
