# =============================================================================
# AGGREGATED Ψ-DIMENSIONS (Schweiz-Fokus, Automobil)
# =============================================================================

psi_dimensions_aggregate:

  psi_I_institutional:
    value: 0.92
    label: "Institutionell (Extrem Hoch)"
    description: |
      Die regulatorische Dichte im Schweizer Automarkt ist die
      höchste in Europa. CO2-Sanktionen sind seit 1.1.2026 zwingende
      Voraussetzung für die Zulassung. Keine EU-Übergangsfrist.
      CHF 250 Mio.+ Gesamtkosten (Sanktionen + Vermeidung).
    key_drivers:
      - "CO2-Emissionsvorschriften (rigideste in Europa)"
      - "Sanktion als Zulassungsvoraussetzung (seit 1.1.2026)"
      - "Klimaschutzgesetz (Netto-Null 2050)"
      - "UREK-N: Flexibilisierung am 30.01.2026 abgelehnt"
    ebf_kappa: "kappa_INST = 0.92"

  psi_S_social:
    value: 0.65
    label: "Sozial (Mittel-Hoch)"
    description: |
      Auto als sozialer Marker: Status, Identität, Lebensstil.
      Peer Effects stark bei Marken- und Antriebswahl.
      Sozialer Druck Richtung E-Mobilität in urbanen Milieus.
      Gegenwind in ländlichen Gebieten.
    key_drivers:
      - "Auto als Statusobjekt (Marke, Grösse, Antrieb)"
      - "Peer Effects bei E-Auto-Adoption"
      - "Stadt-Land-Graben (urban: pro-E, rural: pro-ICE)"
      - "Generationeneffekt (Jüngere weniger auto-affin)"
    ebf_kappa: "kappa_SOCIAL = 0.65"

  psi_C_cognitive:
    value: 0.78
    label: "Kognitiv (Hoch)"
    description: |
      Autokauf ist eine der komplexesten Konsumentscheidungen:
      Antriebsart, TCO-Vergleich, Reichweite, Ladeinfrastruktur,
      Restwert-Unsicherheit, CO2-Regulierung, Subventionen.
    key_drivers:
      - "Antriebswahl-Komplexität (BEV vs. PHEV vs. HEV vs. ICE)"
      - "TCO-Berechnung (Anschaffung vs. Betrieb vs. Restwert)"
      - "Reichweiten-Angst (Range Anxiety)"
      - "Regulatorische Unsicherheit"
    ebf_kappa: "kappa_COG = 0.78"

  psi_K_cultural:
    value: 0.72
    label: "Kulturell (Hoch)"
    description: |
      Schweiz als Auto-Nation: 75% aller Personenkilometer per Auto.
      Gleichzeitig starkes Umweltbewusstsein. Kulturelle Spannung:
      Freiheit/Individualismus vs. Verantwortung/Nachhaltigkeit.
    key_drivers:
      - "Auto als Freiheitssymbol (Individualismus)"
      - "Schweizer Umweltbewusstsein (Klimaschutzgesetz JA)"
      - "Mobilitätskultur (75% PKW-Personenkilometer)"
      - "Sprachregionale Unterschiede (D-CH vs. Romandie)"
    ebf_kappa: "kappa_CULT = 0.72"

  psi_E_economic:
    value: 0.70
    label: "Ökonomisch (Hoch)"
    description: |
      Auto = grosse private Investition. Kaufkraft CH hoch, aber
      Konjunkturaussichten eingetrübt. China-Hersteller drücken Preise.
      E-Autos noch ~20-30% teurer als Verbrenner.
    key_drivers:
      - "Neuwagenpreis Ø CHF 50'000-55'000"
      - "Eingetrübte Konjunkturaussichten 2026"
      - "China-Effekt (BYD, Leapmotor drücken Preise)"
      - "CHF 250 Mio. CO2-Sanktionskosten belasten Branche"
    ebf_kappa: "kappa_ECON = 0.70"

  psi_T_temporal:
    value: 0.82
    label: "Temporal (Sehr Hoch)"
    description: |
      Massive zeitliche Verzerrungen: Dezember 2025 aufgebläht
      (Sanktions-Vermeidung), Januar 2026 eingebrochen (-66% BEV).
      Langfrist: Netto-Null 2050. Kurzfrist: jährliche CO2-Ziele.
    key_drivers:
      - "Sanktions-getriebene Marktverzerrung (Dez/Jan-Effekt)"
      - "Kaufaufschub durch Unsicherheit"
      - "Netto-Null 2050 vs. jährliche CO2-Ziele"
      - "Technologie-Wartehaltung"
    ebf_kappa: "kappa_TEMP = 0.82"

  psi_M_material:
    value: 0.58
    label: "Materiell (Mittel)"
    description: |
      Ladeinfrastruktur wächst, aber regionale Disparitäten.
      300+ E-Modelle verfügbar. Händlernetz (4'000) vollständig.
      Digitalisierung fortschreitend.
    key_drivers:
      - "Ladeinfrastruktur (20'000+ Ladepunkte Ziel)"
      - "300+ E-Modelle im Angebot"
      - "4'000 Markenhändler als physische Touchpoints"
      - "Digitale Zulassung (seit 1.1.2026)"
    ebf_kappa: "kappa_MAT = 0.58"

  psi_F_physical:
    value: 0.55
    label: "Physisch (Mittel)"
    description: |
      Kaufentscheidung zunehmend online (Recherche, Konfigurator),
      aber Probefahrt und Abschluss bleiben physisch.
      Kompakte Geografie = kurze Wege zu Händlern.
    key_drivers:
      - "Online-Recherche → Offline-Kauf (ROPO-Effekt)"
      - "Probefahrt als entscheidender Touchpoint"
      - "Showroom-Frequenz rückläufig"
      - "Kompakte Geografie CH"
    ebf_kappa: "kappa_PHYS = 0.55"

