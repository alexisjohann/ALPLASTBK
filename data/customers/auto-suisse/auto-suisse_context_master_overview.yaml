# RIS = BMW-spezifische Risks →  RIS = Branchen- & Regulierungsrisiken
# STK = Quandt, IG Metall     →  STK = Politik, Medien, EU, Konsumenten
# STR = Neue Klasse Strategie →  STR = Lobbying, Positionierung
# TEC = BMW Technologie       →  TEC = E-Mobilität Ökosystem CH
#
# =============================================================================

