# BESONDERHEIT: auto-suisse ist ein VERBAND (Verein ZGB Art. 60 ff.),
# kein Unternehmen. Das verändert die CVA-Architektur fundamental:
#
# BMW (Konzern)               →  auto-suisse (Verband)
