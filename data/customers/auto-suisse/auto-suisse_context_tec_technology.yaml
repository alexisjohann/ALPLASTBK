# =============================================================================
# AUTO-SUISSE — TEC: TECHNOLOGY & E-MOBILITY ECOSYSTEM
# =============================================================================
# Version: 1.0.0
# Framework: EBF Context Vector Architecture (CVA) — STANDARD
# Erstellt: 2026-02-11
# Kategorie: TEC (Technology)
# Faktoren: 40
# =============================================================================
#
# BESONDERHEIT: auto-suisse ist ein Verband, kein Technologiekonzern.
# TEC beschreibt nicht eigene F&E, sondern das technologische ÖKOSYSTEM,
# das den Schweizer Automarkt und die Kaufentscheidung beeinflusst.
#
# BMW (Konzern)               →  auto-suisse (Verband)
# ─────────────────────────── →  ────────────────────────────────────
# Eigene E-Plattform (Neue Klasse) →  Importierte Technologien (60 Marken)
# Software-Defined Vehicle    →  Digitale Kaufprozesse & Services
# iDrive, ConnectedDrive     →  Ladeinfrastruktur-Ökosystem CH
# Autonomes Fahren Level 2+  →  Regulatorischer Rahmen für Innovation
#
# =============================================================================

metadata:
  name: "auto-suisse Technology & E-Mobility Ecosystem"
  code: "AUTOSUISSE-TEC"
  category: "TEC"
  version: "1.0.0"
  last_updated: "2026-02-11"
  total_factors: 40
  parent_file: "auto-suisse_context_master_overview.yaml"

  description: |
    Technologisches Ökosystem der Schweizer Automobilbranche.
    Fokus auf E-Mobilität, Ladeinfrastruktur, Digitalisierung
    und Energiesystem — die technologischen Rahmenbedingungen,
    die Kauf- und Nutzungsverhalten massgeblich beeinflussen.

  primary_10c: ["HOW"]
  primary_psi: ["psi_M"]

# =============================================================================
# 1. ANTRIEBSTECHNOLOGIEN (10 Faktoren)
# =============================================================================

antriebstechnologien:

  section_metadata:
    factor_range: "TEC-ANT-001 bis TEC-ANT-010"
    total_factors: 10
    description: "Antriebsarten, Technologiereife, Marktdurchdringung CH"

  factors:

    - id: "TEC-ANT-001"
      name: "BEV Marktanteil"
      value: 0.228
      unit: "Anteil Neuzulassungen 2025"
      description: "22.8% rein batterieelektrisch (BEV). Rückgang vs. 2024 (21.0% → 22.8%, aber Dezember-Effekt bereinigt leicht rückläufig)"
      trend: "stagnierend"
      source: "auto.swiss Statistik 2025"

    - id: "TEC-ANT-002"
      name: "PHEV Marktanteil"
      value: 0.112
      unit: "Anteil Neuzulassungen 2025"
      description: "11.2% Plug-in-Hybrid. Wächst als Brückentechnologie für Unentschlossene."
      trend: "leicht steigend"
      source: "auto.swiss Statistik 2025"

    - id: "TEC-ANT-003"
      name: "HEV Marktanteil"
      value: 0.204
      unit: "Anteil Neuzulassungen 2025"
      description: "20.4% Voll-Hybrid (nicht extern ladbar). Tiefere Einstiegshürde als BEV."
      trend: "stabil"
      source: "auto.swiss Statistik 2025"

    - id: "TEC-ANT-004"
      name: "ICE Marktanteil"
      value: 0.307
      unit: "Anteil Neuzulassungen 2025"
      description: "30.7% reine Verbrenner (Benzin + Diesel). Rückläufig, aber noch grösster Einzelblock."
      trend: "fallend"
      source: "auto.swiss Statistik 2025"

    - id: "TEC-ANT-005"
      name: "Steckerfahrzeuge Gesamt"
      value: 0.339
      unit: "Anteil (BEV + PHEV)"
      description: "33.9% aller Neuzulassungen 2025 sind Steckerfahrzeuge. Ziel 50% bis 2030."
      trend: "steigend"
      source: "auto.swiss Statistik 2025"

    - id: "TEC-ANT-006"
      name: "E-Modell-Verfügbarkeit"
      value: 300
      unit: "Modelle"
      description: "Über 300 vollelektrische Modelle auf dem Schweizer Markt verfügbar. Angebot kein Engpass mehr."
      trend: "wachsend"
      source: "auto.swiss / LLMMC"

    - id: "TEC-ANT-007"
      name: "Durchschnittliche BEV-Reichweite"
      value: 420
      unit: "km WLTP"
      description: "Durchschnittliche Reichweite neuer BEVs 2025. 2020 waren es ~300 km. Range Anxiety sinkt objektiv."
      trend: "steigend"
      source: "LLMMC / Herstellerangaben"

    - id: "TEC-ANT-008"
      name: "BEV Preisparität"
      value: 0.75
      unit: "Index (1.0 = Preisparität mit ICE)"
      description: |
        E-Autos noch ~25% teurer als vergleichbare Verbrenner im Anschaffungspreis.
        TCO-Parität bei >30'000 km/Jahr aber bereits erreicht.
      trend: "steigend (Richtung Parität)"
      source: "TCS Vergleichstest 2025 / LLMMC"

    - id: "TEC-ANT-009"
      name: "Technologieoffenheit Positionierung"
      value: "hoch"
      unit: "qualitativ"
      description: |
        auto-suisse Position: Kein Technologieverbot. BEV, PHEV, HEV, H2,
        synthetische Fuels sollen alle zur CO2-Reduktion beitragen dürfen.
        Markt und Konsumenten entscheiden, nicht Regulierung.
      source: "auto-suisse Positionspapier"

    - id: "TEC-ANT-010"
      name: "Wasserstoff-Relevanz CH"
      value: 0.02
      unit: "Anteil (marginal)"
      description: |
        Wasserstoff-PKW in CH marginal (<200 Fahrzeuge).
        Relevant für LKW/Nutzfahrzeuge (Hyundai Xcient in CH im Einsatz).
        auto-suisse fordert Technologieoffenheit inkl. H2.
      trend: "Nische (LKW-Fokus)"
      source: "H2 Energy / LLMMC"

# =============================================================================
# 2. LADEINFRASTRUKTUR (10 Faktoren)
# =============================================================================

ladeinfrastruktur:

  section_metadata:
    factor_range: "TEC-LAD-001 bis TEC-LAD-010"
    total_factors: 10
    description: "Ladeinfrastruktur CH, Ausbau, Abdeckung, Nutzungsverhalten"

  factors:

    - id: "TEC-LAD-001"
      name: "Öffentliche Ladepunkte CH"
      value: 16000
      unit: "Ladepunkte (Stand Ende 2025)"
      description: "Ca. 16'000 öffentliche Ladepunkte. Ziel: 20'000+ bis Ende 2026. Starker Ausbau."
      trend: "stark steigend"
      source: "BFE / ich-tanke-strom.ch"

    - id: "TEC-LAD-002"
      name: "Schnellladestationen (DC)"
      value: 3500
      unit: "DC-Ladepunkte"
      description: "Ca. 3'500 Schnellladepunkte (>50 kW). An Autobahnen und Hauptverkehrsachsen."
      trend: "stark steigend"
      source: "BFE / LLMMC"

    - id: "TEC-LAD-003"
      name: "Ladepunkte pro BEV"
      value: 0.30
      unit: "Ratio"
      description: |
        Ca. 1 öffentlicher Ladepunkt pro 3.3 BEVs. EU-Durchschnitt schlechter.
        Schweiz relativ gut versorgt, aber regionale Disparitäten.
      trend: "stabil bis leicht fallend (mehr BEVs als Ladepunkte)"
      source: "LLMMC Schätzung"

    - id: "TEC-LAD-004"
      name: "Heimladen-Anteil"
      value: 0.70
      unit: "Anteil der Ladevorgänge"
      description: |
        Ca. 70% aller Ladevorgänge zu Hause oder am Arbeitsplatz.
        Problem: Mieter (ca. 60% der CH-Bevölkerung) haben oft keinen Zugang.
      trend: "stabil"
      source: "BFE Monitoring / LLMMC"

    - id: "TEC-LAD-005"
      name: "Mieter-Zugang zu Ladeinfrastruktur"
      value: 0.25
      unit: "Anteil der Mieter mit Lademöglichkeit"
      description: |
        Nur ca. 25% der Mieter:innen haben Zugang zu einer Lademöglichkeit
        am Wohnort. Grösste Barriere für BEV-Adoption in der Schweiz.
        Stockwerkeigentum erschwert Installation (Einstimmigkeit nötig).
      trend: "langsam steigend"
      source: "BFE / LLMMC"

    - id: "TEC-LAD-006"
      name: "Ladeinfrastruktur-Investitionen"
      value: 500
      unit: "CHF Mio. (geschätzt 2025-2030)"
      description: "Geplante öffentliche und private Investitionen in Ladeinfrastruktur CH."
      trend: "stark steigend"
      source: "BFE Roadmap / LLMMC"

    - id: "TEC-LAD-007"
      name: "Range Anxiety Index"
      value: 0.45
      unit: "Index [0-1]"
      description: |
        Subjektive Reichweiten-Angst. Objektiv unbegründet für >90% der
        Fahrten (Ø 30 km/Tag), aber psychologisch wirksam.
        Stärkste Barriere bei SEG-A2 (Pragmatische Abwäger).
      behavioral_implication: "Übergewichtung seltener Langstrecken-Szenarien (Availability Heuristic)"
      trend: "langsam sinkend"
      source: "LLMMC"

    - id: "TEC-LAD-008"
      name: "Autobahnabdeckung Schnelllader"
      value: 0.85
      unit: "Anteil Autobahnraststätten mit DC"
      description: "Ca. 85% der Autobahnraststätten mit Schnellladern ausgestattet."
      trend: "steigend (Ziel: 100%)"
      source: "ASTRA / LLMMC"

    - id: "TEC-LAD-009"
      name: "Ladezeit-Entwicklung"
      value: 25
      unit: "Minuten (10-80% bei 150 kW)"
      description: |
        Typische Schnellladezeit für aktuelle BEV-Modelle: 25 Min (10-80%).
        800V-Architektur (Hyundai, Kia, Porsche) ermöglicht unter 20 Min.
      trend: "sinkend (technologischer Fortschritt)"
      source: "LLMMC / Herstellerangaben"

    - id: "TEC-LAD-010"
      name: "Bidirektionales Laden (V2G/V2H)"
      value: "emerging"
      unit: "qualitativ"
      description: |
        Vehicle-to-Grid / Vehicle-to-Home als Zukunftstechnologie.
        Vereinzelt verfügbar (Honda e, VW ID). Potenzial für Netzstabilität
        und Wertschöpfung für BEV-Besitzer.
      trend: "emerging"
      source: "BFE / LLMMC"

# =============================================================================
# 3. DIGITALISIERUNG & SERVICES (10 Faktoren)
# =============================================================================

digitalisierung:

  section_metadata:
    factor_range: "TEC-DIG-001 bis TEC-DIG-010"
    total_factors: 10
    description: "Digitale Transformation des Autohandels, Kaufprozesse, Services"

  factors:

    - id: "TEC-DIG-001"
      name: "Online-Recherche vor Kauf"
      value: 0.92
      unit: "Anteil der Käufer"
      description: "92% der Neuwagenkäufer recherchieren online vor dem Showroom-Besuch."
      behavioral_implication: "Digital Anchoring — Online-Konfiguratorpreis wird zum Referenzpunkt"
      trend: "stabil (Plateau)"
      source: "LLMMC / Branchenerhebung"

    - id: "TEC-DIG-002"
      name: "Online-Konfigurationsrate"
      value: 0.65
      unit: "Anteil"
      description: "65% der Käufer nutzen den Online-Konfigurator der Marke."
      behavioral_implication: "Default-Effekt — Vorkonfiguration beeinflusst Kaufentscheidung massiv"
      trend: "steigend"
      source: "LLMMC"

    - id: "TEC-DIG-003"
      name: "Rein digitaler Kaufabschluss"
      value: 0.08
      unit: "Anteil"
      description: |
        Nur ca. 8% der Neuwagenkäufe in CH komplett online abgeschlossen.
        Probefahrt und persönliche Beratung bleiben entscheidend.
      trend: "langsam steigend"
      source: "LLMMC"

    - id: "TEC-DIG-004"
      name: "Digitale Zulassung"
      value: "aktiv seit 01.01.2026"
      unit: "qualitativ"
      description: |
        Seit 1.1.2026 können Neuwagen digital zugelassen werden.
        Reduktion Bürokratie, aber CO2-Sanktionszahlung als Voraussetzung
        für Zulassung integriert.
      trend: "neu eingeführt"
      source: "ASTRA / auto-suisse"

    - id: "TEC-DIG-005"
      name: "Abo-Modelle und Mobilitäts-as-a-Service"
      value: 0.05
      unit: "Anteil (Nische)"
      description: |
        Auto-Abos (CARVOLUTION, clyde, Herstellerangebote) wachsen, aber
        noch Nische (~5%). Attraktiv für jüngere Käufer und Unentschlossene
        (geringeres Commitment als Kauf).
      behavioral_implication: "Reduktion von Commitment Bias — Abo senkt wahrgenommenes Risiko"
      trend: "wachsend"
      source: "LLMMC"

    - id: "TEC-DIG-006"
      name: "Connected Car Services"
      value: 0.55
      unit: "Anteil Neuwagen mit aktiver Konnektivität"
      description: "Ca. 55% der Neuwagen 2025 mit aktiven Connected-Services ausgeliefert."
      trend: "steigend"
      source: "LLMMC"

    - id: "TEC-DIG-007"
      name: "OTA-Update-Fähigkeit"
      value: 0.40
      unit: "Anteil der Neuwagen-Flotte"
      description: |
        Ca. 40% der neuen Fahrzeuge können Over-the-Air Updates empfangen.
        Ermöglicht nachträgliche Feature-Freischaltung (Software-Defined Vehicle).
      trend: "stark steigend"
      source: "LLMMC"

    - id: "TEC-DIG-008"
      name: "Digitale Händler-Tools"
      value: 0.50
      unit: "Adoptionsrate unter Händlern"
      description: |
        Ca. 50% der Händler nutzen CRM-Systeme und digitale Verkaufstools.
        Grosse Spreizung: Grosshändler >80%, KMU-Garagen <30%.
      trend: "steigend, aber grosse Disparitäten"
      source: "LLMMC"

    - id: "TEC-DIG-009"
      name: "Vergleichsportale und Aggregatoren"
      value: "hoch"
      unit: "qualitativ"
      description: |
        TCS, comparis.ch, carforyou.ch als wichtige Informationsquellen.
        TCS Vergleichstest besonders vertrauenswürdig (σ_TCS = 0.78).
        Erhöhen Preistransparenz, aber vereinfachen auch Komplexität.
      behavioral_implication: "Trust Transfer — TCS-Empfehlung wirkt als heuristische Abkürzung"
      source: "LLMMC"

    - id: "TEC-DIG-010"
      name: "Social Media Einfluss auf Kaufentscheidung"
      value: 0.35
      unit: "Anteil der Käufer, die SM als Informationsquelle nennen"
      description: |
        35% der Neuwagenkäufer nutzen Social Media in der Recherchephase.
        YouTube-Reviews besonders einflussreich. Stärker bei <40-Jährigen.
      trend: "steigend"
      source: "LLMMC"

# =============================================================================
# 4. ENERGIESYSTEM & NETZINTEGRATION (10 Faktoren)
# =============================================================================

energiesystem:

  section_metadata:
    factor_range: "TEC-ENE-001 bis TEC-ENE-010"
    total_factors: 10
    description: "Energieversorgung, Stromnetz, CO2-Bilanz, Energiepolitik CH"

  factors:

    - id: "TEC-ENE-001"
      name: "Strommix CH"
      value: "62% Wasserkraft, 29% Kernenergie, 6% Solar/Wind, 3% Sonstige"
      unit: "qualitativ"
      description: |
        Schweizer Strommix ist einer der saubersten weltweit.
        E-Auto in CH = de facto CO2-frei im Betrieb.
        Starkes Argument für BEV in CH (besser als DE mit Kohlestrom).
      trend: "wird noch sauberer (Solarausbau)"
      source: "BFE Elektrizitätsstatistik 2025"

    - id: "TEC-ENE-002"
      name: "CO2-Intensität Strom CH"
      value: 24
      unit: "g CO2/kWh"
      description: "Schweiz: 24 g/kWh. Deutschland: 350 g/kWh. EU-Durchschnitt: 230 g/kWh."
      trend: "sinkend"
      source: "BFE"

    - id: "TEC-ENE-003"
      name: "Netzkapazität für E-Mobilität"
      value: "ausreichend bis 2030"
      unit: "qualitativ"
      description: |
        Schweizer Stromnetz kann bis 2030 ca. 1.5 Mio. BEVs verkraften
        (aktuell: ~200'000 BEV im Bestand). Lokale Engpässe möglich,
        aber Smart Charging löst Spitzenprobleme.
      trend: "Ausbau erforderlich ab 2030"
      source: "BFE / Swissgrid"

    - id: "TEC-ENE-004"
      name: "Smart Charging Adoption"
      value: 0.20
      unit: "Anteil der BEV-Besitzer mit Smart Charging"
      description: "Ca. 20% der BEV-Besitzer laden intelligent (zeitgesteuert, preisoptimiert)."
      trend: "steigend"
      source: "LLMMC"

    - id: "TEC-ENE-005"
      name: "Solarkoppelung (PV + BEV)"
      value: 0.15
      unit: "Anteil der BEV-Besitzer mit eigener PV-Anlage"
      description: |
        15% der BEV-Besitzer in CH haben eigene Solaranlage.
        Sektorenkoppelung als Argument: Eigenes Solar → eigener Strom → eigenes Auto.
      trend: "stark steigend"
      source: "LLMMC / Swissolar"

    - id: "TEC-ENE-006"
      name: "Strompreis CH (Haushalt)"
      value: 27
      unit: "Rp./kWh (Durchschnitt 2025)"
      description: |
        Schweizer Haushaltsstrompreis: ca. 27 Rp./kWh.
        BEV-Verbrauch ca. 18 kWh/100 km → 4.86 CHF/100 km.
        Benzin: ca. 8 L × 1.80 = 14.40 CHF/100 km.
        Kraftstoff-Kostenvorteil BEV: ~66%.
      source: "ElCom / BFE"

    - id: "TEC-ENE-007"
      name: "Energiestrategie 2050"
      value: "aktiv"
      unit: "qualitativ"
      description: |
        Schweizer Energiestrategie 2050: Ausstieg Kernenergie,
        Ausbau Erneuerbare, Effizienz. E-Mobilität als zentraler
        Baustein der Sektorenkoppelung anerkannt.
      source: "BFE"

    - id: "TEC-ENE-008"
      name: "Winterstrom-Problematik"
      value: "relevant"
      unit: "qualitativ"
      description: |
        Schweiz ist im Winter Netto-Importeur von Strom.
        Argument von E-Mobilität-Kritikern: «Woher kommt der Winterstrom?»
        Realität: BEV-Anteil am Stromverbrauch liegt bei <2% — kein Problem.
      behavioral_implication: "Availability Bias — Winterstrom-Narrativ überbewertet"
      source: "BFE / LLMMC"

    - id: "TEC-ENE-009"
      name: "Batterie-Recycling CH"
      value: "emerging"
      unit: "qualitativ"
      description: |
        Erste Recycling-Anlagen in CH im Aufbau (Librec/Kyburz in Freienstein).
        Regulierung: Hersteller sind rücknahmepflichtig (>95% Sammelquote Ziel).
        Second-Life-Nutzung (stationäre Speicher) als Wertschöpfungs-Chance.
      trend: "aufbauend"
      source: "BAFU / LLMMC"

    - id: "TEC-ENE-010"
      name: "Synthetische Kraftstoffe (E-Fuels)"
      value: "Pilot"
      unit: "qualitativ"
      description: |
        Synhelion (CH) als Pionier für solarthermische Kraftstoffe.
        auto-suisse unterstützt E-Fuels als Teil der Technologieoffenheit.
        Ökonomisch noch nicht wettbewerbsfähig (3-5× teurer als fossile Fuels).
      trend: "Forschung/Pilot"
      source: "Synhelion / auto-suisse Position"

# =============================================================================
# EBF MAPPING
# =============================================================================

ebf_mapping:

  primary_10c_dimensions:
    HOW:
      description: "Wie beeinflusst Technologie das Kaufverhalten?"
      key_factors:
        - "TEC-ANT-007: Reichweite reduziert Range Anxiety"
        - "TEC-ANT-008: Preisparität treibt Adoption"
        - "TEC-LAD-007: Range Anxiety als psychologische Barriere"
        - "TEC-DIG-002: Online-Konfigurator als Default-Architektur"

    WHERE:
      description: "Woher kommen die Parameter-Werte?"
      key_factors:
        - "TEC-ENE-006: Strompreis vs. Benzinpreis als TCO-Treiber"
        - "TEC-LAD-001: Ladepunktdichte als Enabler"

  primary_psi_dimensions:
    psi_M_material:
      value: 0.58
      key_drivers:
        - "Ladeinfrastruktur wächst, aber Mieter-Lücke"
        - "300+ E-Modelle = Angebots-Engpass gelöst"
        - "Digitale Tools zunehmend verfügbar"

  behavioral_implications:
    range_anxiety:
      description: "Objektiv unbegründet (Ø 30 km/Tag), aber psychologisch wirksam"
      affected_segments: ["SEG-A2 (Pragmatische Abwäger)", "SEG-A3 (Verbrenner-Loyale)"]
      intervention: "Probefahrt mit Langstrecke → Erfahrung > Information"

    default_in_configurator:
      description: "Online-Konfigurator setzt Default (Antrieb, Ausstattung)"
      behavioral_mechanism: "κ_default = 0.72 → Vorkonfiguration wirkt stark"
      intervention: "BEV als Default-Antrieb im Konfigurator (Opt-out)"

    tco_framing:
      description: "TCO-Vorteil BEV vorhanden, aber nicht salient"
      behavioral_mechanism: "Anschaffungspreis als Anker (Narrow Framing)"
      intervention: "TCO-Rechner als Pflichtschritt vor Preisanzeige"

    mieter_barriere:
      description: "60% der CH-Bevölkerung mietet — Heimladen oft unmöglich"
      behavioral_mechanism: "Hassle Factor → Kaufverzicht"
      intervention: "Arbeitgeber-Ladelösungen, Quartiers-Ladehubs"

