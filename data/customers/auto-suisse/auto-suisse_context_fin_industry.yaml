ebf_mapping:
  industry_health_score: 0.55
  note: "Branche unter Druck: Sanktionskosten, Margenerosion, Kaufaufschub. Aber: 90 Mrd Branche ist volkswirtschaftlich bedeutend."

  critical_financial_dynamics:
    - dynamic: "Sanktions-Paradoxon"
      description: "Regulierung soll E-Mobilität fördern, entzieht aber Investitionsmittel (CHF 250 Mio. Sanktionen statt Infrastruktur)"
      behavioral_implication: "λ_loss × ψ_E = doppelte Belastung für Importeure"
    - dynamic: "TCO-Awareness-Gap"
      description: "Konsumenten vergleichen Listenpreise (BEV teurer), nicht TCO (BEV günstiger ab 5.5 Jahren)"
      behavioral_implication: "A(TCO) niedrig → Framing-Intervention nötig"
    - dynamic: "China-Disruption"
      description: "BYD Atto 3 (CHF 38'990) unterbietet VW ID.3 (CHF 42'990) bei vergleichbarer Leistung"
      behavioral_implication: "Preisparität rückt näher → β↓ (weniger Aufschub)"

  behavioral_implications: |
    Finanzielle Parameter der Kaufentscheidung:
    - λ = 2.42 (hohe Verlustaversion bei Fehlkauf)
    - TCO-Verständnis = gering (nur ~20% der Käufer rechnen TCO)
    - Leasing als Behavioral Enabler: Monatliche Rate < Differenz → β↓
    - Firmenwagen (45% Markt): Default = Firmenflottenpolitik → κ_default maximal

    → Grösster Hebel: TCO-Transparenz + Flotten-Defaults + China-Preisdruck

