ebf_mapping:
  people_readiness: 0.50
  transformation_readiness: 0.45
  note: "Mitglieder und Händlernetz unter Transformationsdruck, aber Veränderungsbereitschaft unterdurchschnittlich"

  behavioral_implications: |
    People Dynamics als Behavioral Challenge:
    - Importeure: β_leadership = 0.85 (strategischer, durch OEM-Druck)
    - Händler: β_leadership = 0.55 (kurzfristiger, Überlebenskampf)
    - Verband: κ_consensus = 0.80 (Konsenskultur verlangsamt Reaktion)

    Transformationsbarrieren:
    - Identitäts-Lock-in: "Wir sind die Auto-Branche" → Widerstand gegen Redefinition
    - Service-Revenue-Verlust durch BEV (-40%) → λ_loss bei Händlern extrem hoch
    - Fachkräftemangel + Weiterbildungslücke → Kompetenz-Gap wächst

    → Intervention: Identitäts-Transformation begleiten ("von Auto zu Mobilität"),
      Service-Modelle für BEV entwickeln, Hochvolt-Ausbildung massiv skalieren

