# =============================================================================
# AUTO-SUISSE (auto-schweiz) - SCHNELL CONTEXT VECTOR
# =============================================================================
# Version: 1.0.0
# Framework: EBF Context Vector Architecture (CVA) - SCHNELL
# Erstellt: 2026-02-11
# Land: Schweiz + Fürstentum Liechtenstein
# Branche: Verband / Automobilimport
# Total Faktoren: 34
# =============================================================================
#
# BESONDERHEIT: auto-suisse ist kein Unternehmen, sondern ein VERBAND.
# Das verändert die CVA-Architektur fundamental:
# - «Kunden» = Mitglieder (39 Importeure) + Endkonsumenten + Politik
# - Wertschöpfung = Lobbying + Rahmenbedingungen + Branchenvertretung
# - Verhalten = Regulierungsakzeptanz, Kaufentscheidung, Politikgestaltung
#
# =============================================================================

metadata:
  name: "auto-suisse Schnellkontext"
  code: "BCM2_MIKRO_AUTOSUISSE"
  layer: "mikro"
  version: "1.0"
  last_updated: "2026-02-11"
  cva_stufe: "SCHNELL"
  total_factors: 34
  description: |
    Schneller Kontextvektor für auto-suisse (Vereinigung Schweizer
    Automobil-Importeure). Erfasst die Verbands-spezifische Stakeholder-
    Landschaft, regulatorisches Umfeld und verhaltensökonomische Treiber
    der Automobilkauf-Entscheidung in der Schweiz.

    Zweck: Interview-Support, Quick Assessment, Pitch-Vorbereitung

  hierarchy:
    parent: "BCM2_MESO_AUTOMOTIVE_CH"
    grandparent: "BCM2_04_KON (MAKRO Schweiz)"

  ebf_mapping:
    primary_10c:
      - "WHO"      # Stakeholder-Landschaft (Importeure, Händler, Endkunden, Politik)
      - "WHAT"     # Was treibt Kauf-/Regulierungsverhalten?
      - "WHEN"     # Regulatorischer Kontext als Verhaltenstreiber
      - "AWARE"    # Bewusstsein für CO2, Technologie-Wandel
    primary_psi:
      - "kappa_INST"     # CO2-Regulierung, Sanktionen
      - "kappa_ECON"     # Konjunktur, Kaufkraft
      - "kappa_IDENTITY" # Auto als Identitätsobjekt

# =============================================================================
# ORGANISATION (~10 Faktoren)
# =============================================================================

organisation:
  name_de: "auto-schweiz / auto-suisse — Vereinigung Schweizer Automobil-Importeure"
  name_short: "auto-suisse"
  name_legal: "auto-schweiz VEREINIGUNG SCHWEIZER AUTOMOBIL-IMPORTEURE"
  website: "https://www.auto.swiss"

  # Rechtsform
  type: "Branchenverband"
  legal_form: "Verein (ZGB Art. 60 ff.)"
  founded: 1941

  # Führung
  president: "Dr. Peter Grünenfelder"
  president_since: "2023-08-01"
  president_background: |
    Vorgänger: BR Albert Rösti. Grünenfelder (1967, Küsnacht ZH).
    Dr. oec. HSG. Ehem. Direktor Avenir Suisse (2016-2023),
    Staatsschreiber Kt. Aargau (2004-2016), Pol. Sekretär FDP.
    Verheiratet mit Christa Markwalder (ehem. FDP-NR).
    Profil: liberal, wirtschaftsnah, netzwerkstark.

  # Grösse
  members: 39  # Automobilimporteure
  dealer_network: 4000  # Markenhändler CH + FL
  brands_represented: 60
  employees_verband: ~20  # Geschäftsstelle

  # Geografie
  headquarters: "Bern"
  geographic_scope: "national"  # CH + FL
  scope_countries: ["CH", "LI"]

  # Marktbedeutung
  market_data_2025:
    new_registrations: 233737
    market_trend: "tiefstes Niveau seit 25 Jahren"
    bev_share: 0.228  # 22.8% rein elektrisch
    phev_share: 0.112  # 11.2% Plug-in-Hybrid
    stecker_total: 0.339  # 33.9% Steckerfahrzeuge
    ice_share: 0.307  # 30.7% reine Verbrenner
    yoy_change: -0.051  # -5.1% Jan 2026 vs. Jan 2025

  # Strategische Positionierung
  strategy_pillars:
    - "Technologieoffenheit — kein Technologieverbot, Markt entscheidet"
    - "CO2-Flexibilisierung — EU-analoge Übergangsfristen fordern"
    - "Rahmenbedingungen — Standort CH wettbewerbsfähig halten"
    - "Elektrifizierung — marktgetrieben, nicht sanktionsgetrieben"

  # Wichtige Mitglieder (Auswahl)
  key_members:
    - "AMAG (VW, Audi, Skoda, SEAT, Porsche, Bentley, Lamborghini)"
    - "Mercedes-Benz Schweiz AG"
    - "BMW (Schweiz) AG"
    - "Toyota AG"
    - "Ford Motor Company (Switzerland) SA"
    - "Stellantis (Peugeot, Citroën, Opel, Fiat, Alfa Romeo, Jeep)"
    - "Hyundai/Kia"
    - "BYD Europe (neu)"

# =============================================================================
# Ψ-DIMENSIONEN (8 Faktoren)
# =============================================================================
# Skala: 0.0 (niedrig) bis 1.0 (hoch)
# Perspektive: Auto-Kaufentscheidung der Schweizer Bevölkerung
# =============================================================================

psi_dimensions:

  psi_I_institutional:
    value: 0.92
    label: "Institutionell"
    description: |
      EXTREM HOCH. Die regulatorische Dichte im Schweizer Automarkt
      ist die höchste in Europa. CO2-Sanktionen sind seit 1.1.2026
      zwingende Voraussetzung für die Zulassung. Die Schweiz steht
      mit ihrer Sanktionspolitik europaweit isoliert da (keine EU-
      Übergangsfrist). CHF 250 Mio.+ Gesamtkosten (Sanktionen +
      Vermeidung). UREK-N hat Flexibilisierung am 30.01.2026 abgelehnt.
    key_factors:
      - "CO2-Emissionsvorschriften (rigideste in Europa)"
      - "Sanktion als Zulassungsvoraussetzung (seit 1.1.2026)"
      - "Klimaschutzgesetz (Netto-Null 2050)"
      - "Roadmap Elektromobilität (Ziel: 50% Stecker)"
      - "Neues Zollsystem Passar (Umstellung bis 1.4.2027)"
    ebf_kappa: "kappa_INST"

  psi_S_social:
    value: 0.65
    label: "Sozial"
    description: |
      MITTEL-HOCH. Auto als sozialer Marker: Status, Identität,
      Lebensstil. Peer Effects stark bei Marken- und Antriebswahl.
      Nachbarschaftseffekte bei Ladeinfrastruktur. Sozialer Druck
      Richtung E-Mobilität in urbanen, gebildeten Milieus.
      Gleichzeitig: sozialer Gegenwind in ländlichen Gebieten,
      wo E-Auto als «elitär» wahrgenommen wird.
    key_factors:
      - "Auto als Statusobjekt (Marke, Grösse, Antrieb)"
      - "Peer Effects bei E-Auto-Adoption (Nachbarschaft)"
      - "Stadt-Land-Graben (urban: pro-E, rural: pro-ICE)"
      - "Generationeneffekt (Jüngere weniger auto-affin)"
    ebf_kappa: "kappa_SOCIAL"

  psi_C_cognitive:
    value: 0.78
    label: "Kognitiv"
    description: |
      HOCH. Autokauf ist eine der komplexesten Konsumentscheidungen:
      Antriebsart (BEV/PHEV/HEV/ICE), TCO-Vergleich, Reichweite,
      Ladeinfrastruktur, Restwert-Unsicherheit, CO2-Regulierung,
      Subventionen. Kognitive Überlastung führt zu Status-Quo-Bias
      (beim bewährten Verbrenner bleiben) oder Kaufaufschub.
    key_factors:
      - "Antriebswahl-Komplexität (BEV vs. PHEV vs. HEV vs. ICE)"
      - "TCO-Berechnung (Anschaffung vs. Betrieb vs. Restwert)"
      - "Reichweiten-Angst (Range Anxiety)"
      - "Regulatorische Unsicherheit (was wird morgen verboten?)"
    ebf_kappa: "kappa_COG"

  psi_K_cultural:
    value: 0.72
    label: "Kulturell"
    description: |
      HOCH. Schweiz als Auto-Nation: 75% aller Personenkilometer
      per Auto. 3.5 Mio. Pendler (80% aller Erwerbstätigen).
      Gleichzeitig starkes Umweltbewusstsein (Klimaschutzgesetz
      angenommen). Kulturelle Spannung: Freiheit/Individualismus
      (Auto) vs. Verantwortung/Nachhaltigkeit (Klima).
      Sprachregionale Unterschiede (Romandie auto-affiner).
    key_factors:
      - "Auto als Freiheitssymbol (Individualismus)"
      - "Schweizer Umweltbewusstsein (Klimaschutzgesetz JA)"
      - "Mobilitätskultur (75% PKW-Personenkilometer)"
      - "Sprachregionale Unterschiede (D-CH vs. Romandie vs. Ticino)"
    ebf_kappa: "kappa_CULT"

  psi_E_economic:
    value: 0.70
    label: "Ökonomisch"
    description: |
      HOCH. Auto ist eine der grössten privaten Investitionen.
      Kaufkraft CH hoch, aber Konjunkturaussichten eingetrübt.
      Preise laut Grünenfelder «konkurrenzfähig» (kaufkraftbereinigt
      ähnlich wie DE). Chinesische Hersteller (BYD, Leapmotor)
      drücken Preise. E-Autos noch ~20-30% teurer als Verbrenner
      (TCO-Parität näher als Listenpreis suggeriert).
    key_factors:
      - "Neuwagenpreis Ø CHF 50'000-55'000"
      - "Eingetrübte Konjunkturaussichten 2026"
      - "China-Effekt (BYD, Leapmotor drücken Preise)"
      - "E-Auto TCO-Parität noch nicht erreicht (Listenpreis)"
      - "CHF 250 Mio. CO2-Sanktionskosten belasten Branche"
    ebf_kappa: "kappa_ECON"

  psi_T_temporal:
    value: 0.82
    label: "Temporal"
    description: |
      SEHR HOCH. Massive zeitliche Verzerrungen im Markt:
      Dezember 2025 künstlich aufgebläht (Sanktions-Vermeidung),
      Januar 2026 entsprechend eingebrochen (-66% BEV).
      Langfristiger Zeithorizont: Netto-Null 2050. Kurzfristiger
      Druck: jährliche CO2-Ziele. Kaufentscheidungen werden
      aufgeschoben («warte auf bessere Rahmenbedingungen»).
    key_factors:
      - "Sanktions-getriebene Marktverzerrung (Dez/Jan-Effekt)"
      - "Kaufaufschub durch Unsicherheit"
      - "Netto-Null 2050 vs. jährliche CO2-Ziele"
      - "Technologie-Wartehaltung (bessere E-Autos kommen)"
    ebf_kappa: "kappa_TEMP"

  psi_M_material:
    value: 0.58
    label: "Materiell/Technologisch"
    description: |
      MITTEL. Ladeinfrastruktur wächst (>20'000 Ladepunkte angestrebt),
      aber regionale Disparitäten. 300+ E-Modelle verfügbar.
      Händlernetz (4'000 Betriebe) vollständig. Digitalisierung
      des Kaufprozesses fortschreitend. Neues Zulassungssystem
      «Passar» in Einführung.
    key_factors:
      - "Ladeinfrastruktur (20'000+ Ladepunkte Ziel)"
      - "300+ E-Modelle im Angebot"
      - "4'000 Markenhändler als physische Touchpoints"
      - "Digitale Zulassung (seit 1.1.2026)"
    ebf_kappa: "kappa_MAT"

  psi_F_physical:
    value: 0.55
    label: "Physisch"
    description: |
      MITTEL. Kaufentscheidung findet zunehmend online statt
      (Recherche, Konfigurator), aber Probefahrt und Abschluss
      bleiben physisch. Showroom-Besuche rückläufig. Standort-
      vorteil Schweiz: kompakte Geografie, kurze Wege zu Händlern.
    key_factors:
      - "Online-Recherche → Offline-Kauf (ROPO-Effekt)"
      - "Probefahrt als entscheidender Touchpoint"
      - "Showroom-Frequenz rückläufig"
      - "Kompakte Geografie (kurze Wege zu Händlern)"
    ebf_kappa: "kappa_PHYS"

# =============================================================================
# STAKEHOLDER-SEGMENTE (statt Kundensegmente — Verbands-Logik)
# =============================================================================
# auto-suisse hat DREI Zielgruppen mit unterschiedlichem Verhalten:
# A) Endkonsumenten (Autokäufer)
# B) Mitglieder (Importeure + Händler)
# C) Politik & Regulatoren
# =============================================================================

stakeholder_segments:

  # =========================================================================
  # A) ENDKONSUMENTEN — Wer kauft (oder kauft nicht) Autos?
  # =========================================================================

  - id: "SEG-A1"
    name: "Elektro-Überzeugte"
    type: "endkonsument"
    description: |
      Urban, gebildet, mittleres bis hohes Einkommen, ökologisch motiviert.
      Haben bereits E-Auto oder planen Kauf in nächsten 12 Monaten.
      Brauchen keine Überzeugung, aber gute Rahmenbedingungen.
    share: 0.15  # ~15% der Neuwagenkäufer

    behavioral_parameters:
      lambda_loss_aversion: 1.80
      beta_present_bias: 0.90
      kappa_default_sensitivity: 0.55
      sigma_social_proof: 0.75  # Starker Peer-Effekt

    intervention_affinity:
      high: ["Ladeinfrastruktur-Ausbau", "TCO-Transparenz"]
      medium: ["Social Proof (Nachbarn fahren auch E)"]
      low: ["Preisanreize (brauchen sie weniger)"]

  - id: "SEG-A2"
    name: "Pragmatische Abwäger"
    type: "endkonsument"
    description: |
      Grösste Gruppe. Grundsätzlich offen für E-Auto, aber rational
      abwägend: Preis, Reichweite, Infrastruktur, Restwert. Hohe
      kognitive Last bei der Entscheidung. Stark von Defaults und
      Framing beeinflusst. Neigen zu Kaufaufschub bei Unsicherheit.
    share: 0.40  # ~40% der Neuwagenkäufer

    behavioral_parameters:
      lambda_loss_aversion: 2.40  # Hoch — Angst vor Fehlkauf
      beta_present_bias: 0.78    # Stark — «warte auf besseres Modell»
      kappa_default_sensitivity: 0.82  # Sehr hoch — Defaults entscheidend
      sigma_social_proof: 0.65   # Mittel-hoch

    intervention_affinity:
      high: ["Smart Defaults bei Konfiguration", "TCO-Rechner (nicht nur Listenpreis)", "Testfahrt-Nudges"]
      medium: ["Peer Effects", "Garantien gegen Wertverlust"]
      low: ["Ideologische Argumente (Klima)"]

  - id: "SEG-A3"
    name: "Verbrenner-Loyale"
    type: "endkonsument"
    description: |
      Ländlich, traditionell, Verbrenner-erfahren, skeptisch gegenüber
      E-Mobilität. Sehen E-Auto als Bevormundung. Hohe Reaktanz
      gegen regulatorischen Druck. Identität = «Autofahrer».
      Grünenfelder: «Sie können die Menschen nicht zwingen.»
    share: 0.30  # ~30% der Neuwagenkäufer

    behavioral_parameters:
      lambda_loss_aversion: 2.80  # Sehr hoch — Gewohntes aufgeben
      beta_present_bias: 0.72    # Hoch — Kurzfrist dominiert
      kappa_default_sensitivity: 0.45  # Niedrig — aktiv gegen Defaults
      sigma_social_proof: 0.40   # Peer-Effekt nur innerhalb eigener Gruppe

    intervention_affinity:
      high: ["Autonomie-betonende Kommunikation", "Praktische Erfahrung (Probefahrt)"]
      medium: ["In-Group Social Proof (Handwerker fährt E-Transporter)"]
      low: ["Regulierungsdruck (BACKFIRE!)", "Moralisierung (BACKFIRE!)"]

  - id: "SEG-A4"
    name: "Kaufverweigerer / Aufschieber"
    type: "endkonsument"
    description: |
      Warten ab. Unsichere Konjunktur, regulatorische Unsicherheit,
      Technologie-Wartehaltung. «Das alte Auto tut's noch.»
      Überalterung des Fahrzeugbestands als Konsequenz.
    share: 0.15  # ~15% — wachsend

    behavioral_parameters:
      lambda_loss_aversion: 2.60
      beta_present_bias: 0.65    # Sehr stark — «jetzt nicht»
      kappa_default_sensitivity: 0.90  # Extrem — Default = nicht kaufen
      sigma_social_proof: 0.50

    intervention_affinity:
      high: ["Zeitlich begrenzte Angebote", "Tauschprämien", "Vereinfachung"]
      medium: ["Social Proof", "Sicherheitsargumente (altes Auto = unsicher)"]
      low: ["Langfrist-Argumente (TCO über 8 Jahre)"]

  # =========================================================================
  # B) MITGLIEDER — Importeure und Händler
  # =========================================================================

  - id: "SEG-B1"
    name: "Grossimporteure"
    type: "mitglied"
    description: |
      AMAG, Mercedes, BMW, Stellantis etc. Tragen Hauptlast der
      CO2-Sanktionen. Haben Ressourcen für Transformation, aber
      Margen unter Druck. Finanzieren E-Mobilität quer über
      Verbrenner-Verkäufe.
    share: 0.20  # ~8 grosse Importeure, 80% des Volumens

    behavioral_parameters:
      lambda_loss_aversion: 2.20  # Mittel — institutionelle Rationalität
      beta_present_bias: 0.85    # Strategisch — längerer Horizont
      kappa_default_sensitivity: 0.70
      sigma_social_proof: 0.55

    key_concerns:
      - "CO2-Sanktionskosten (dreistellige Millionenbeträge)"
      - "Investitionsschutz (Transformation finanzierbar?)"
      - "Wettbewerbsfähigkeit gegenüber China-Importeuren"

  - id: "SEG-B2"
    name: "KMU-Händler und Garagisten"
    type: "mitglied"
    description: |
      ~4'000 Betriebe, oft Familienbetriebe, stark lokal verankert.
      Spüren Regulierungslast direkt. Lehrstellen, Arbeitsplätze
      in Gefahr. Wenig Ressourcen für Transformation. Fühlen sich
      von Politik nicht gehört.
    share: 0.80  # Grosse Masse der Händler

    behavioral_parameters:
      lambda_loss_aversion: 2.90  # Sehr hoch — Existenzangst
      beta_present_bias: 0.70    # Kurzfristig — Überleben zuerst
      kappa_default_sensitivity: 0.60
      sigma_social_proof: 0.70   # Hoch — Branchensolidarität

    key_concerns:
      - "Existenzbedrohung durch Margendruck"
      - "Lehrstellen und Arbeitsplätze"
      - "Regulierungskomplexität überfordert Kleinbetriebe"

  # =========================================================================
  # C) POLITIK & REGULATOREN
  # =========================================================================

  - id: "SEG-C1"
    name: "Politik und Regulatoren"
    type: "stakeholder"
    description: |
      Bundesrat, UREK-N, BAFU, BFE. Setzen Rahmenbedingungen.
      Aktuell: Mehrheit in UREK-N gegen Flexibilisierung.
      auto-suisse muss hier Überzeugungsarbeit leisten.
    share: null  # Nicht quantifizierbar

    behavioral_parameters:
      lambda_loss_aversion: 1.90  # Politische Verluste (Wähler)
      beta_present_bias: 0.75    # Legislaturperioden-Denken
      kappa_default_sensitivity: 0.85  # Stark — Status quo bevorzugt
      sigma_social_proof: 0.80   # Hoch — was machen andere Länder?

    key_concerns:
      - "Klimaziele einhalten (Netto-Null 2050)"
      - "Arbeitsplätze nicht gefährden"
      - "EU-Kompatibilität wahren"
      - "Wähler:innen-Erwartungen managen"

# =============================================================================
# AGGREGIERTE VERHALTENSPARAMETER
# =============================================================================
# Gewichtete Durchschnitte über Endkonsumenten-Segmente (A1-A4)
# =============================================================================

behavioral_parameters_aggregate:

  core_parameters:
    loss_aversion:
      symbol: "λ"
      value: 2.42
      range: [1.80, 2.80]
      source: "Segment-gewichteter Durchschnitt (A1-A4)"
      note: |
        Überdurchschnittlich hoch für CH (Basis λ_CH = 2.1).
        Autokauf = grosse Investition + Unsicherheit über Antriebswahl
        + regulatorische Unsicherheit → λ steigt.

    present_bias:
      symbol: "β"
      value: 0.77
      range: [0.65, 0.90]
      source: "Segment-gewichteter Durchschnitt"
      note: |
        Stark. «Warte auf bessere Technologie / bessere Preise /
        klarere Regulierung» — Kaufaufschub ist der Default.

    default_sensitivity:
      symbol: "κ_default"
      value: 0.72
      range: [0.45, 0.90]
      source: "Segment-gewichteter Durchschnitt"
      note: |
        Hoch. Der aktuelle Default = «nicht kaufen» oder
        «beim Verbrenner bleiben». Wer den Default ändert
        (z.B. E-Auto als Standardangebot bei Flotten),
        verändert Verhalten massiv.

    social_proof:
      symbol: "σ_social"
      value: 0.60
      range: [0.40, 0.75]
      source: "Segment-gewichteter Durchschnitt"
      note: |
        Mittel-hoch. Nachbarschaftseffekte bei E-Auto-Adoption
        sind gut dokumentiert. Aber: In-Group-Effekt —
        Verbrenner-Loyale werden durch E-Auto-Fahrer nicht
        überzeugt, eher durch Peers in eigener Gruppe.

  additional_parameters:
    reactance:
      symbol: "ρ"
      value: 0.68
      range: [0.40, 0.85]
      note: |
        HOCH. Reaktanz gegen wahrgenommene Bevormundung ist ein
        Schlüsselfaktor. Grünenfelder: «Sie können die Menschen
        nicht zwingen, ein E-Auto zu kaufen.» Regulierungsdruck
        kann BACKFIRE erzeugen — je stärker der Druck, desto
        stärker die Gegenwehr (besonders SEG-A3).

    complexity_aversion:
      symbol: "κ_complex"
      value: 0.75
      range: [0.60, 0.85]
      note: |
        HOCH. Antriebswahl + TCO + Infrastruktur + Regulierung
        = massive kognitive Überlastung. Führt zu Kaufaufschub
        und Status-Quo-Bias.

    trust_institutions:
      symbol: "τ_inst"
      value: 0.42
      range: [0.30, 0.55]
      note: |
        NIEDRIG. Vertrauen in die Regulierungspolitik gering.
        UREK-N Entscheidung als «realitätsfern» wahrgenommen.
        Branche fühlt sich «drangsaliert» (Grünenfelder).
        Endkonsumenten verunsichert durch widersprüchliche Signale.

# =============================================================================
# KERNKONFLIKTE (Verbands-spezifisch)
# =============================================================================

core_conflicts:

  - id: "CONF-01"
    name: "Klima vs. Markt"
    description: |
      Netto-Null 2050 erfordert E-Mobilität. Aber Markt adoptiert
      langsamer als Politik fordert. 33.9% Stecker vs. 50% Ziel.
      Sanktionen bestrafen die Lücke.
    psi_tension: "Ψ_I (Regulierung) ↔ Ψ_E (Ökonomie)"
    behavioral_driver: "λ (Verluste durch Sanktionen) vs. β (Kurzfrist-Kaufverhalten)"

  - id: "CONF-02"
    name: "Schweizer Sonderweg vs. EU-Kompatibilität"
    description: |
      EU hat 3-Jahres-Übergangsfrist. CH nicht.
      Schweiz isoliert. Importeure in CH stärker belastet
      als in EU-Märkten. Wettbewerbsnachteil.
    psi_tension: "Ψ_I (CH-Regulierung) ↔ Ψ_I (EU-Regulierung)"
    behavioral_driver: "σ (Social Proof: Was machen andere Länder?)"

  - id: "CONF-03"
    name: "Innovation vs. Existenz"
    description: |
      Transformation erfordert Investitionen. Aber CHF 250 Mio.
      Sanktionskosten entziehen genau diese Mittel. Paradox:
      Regulierung soll Transformation fördern, bremst sie aber.
    psi_tension: "Ψ_T (Langfrist-Transformation) ↔ Ψ_E (Kurzfrist-Überleben)"
    behavioral_driver: "β < 1 (Investitions-Aufschub bei Unsicherheit)"

  - id: "CONF-04"
    name: "Freiheit vs. Lenkung"
    description: |
      Auto = Freiheitssymbol. Regulierung = Bevormundung.
      Je stärker der Druck, desto stärker die Reaktanz.
      Besonders bei SEG-A3 (Verbrenner-Loyale, ~30%).
    psi_tension: "Ψ_K (Freiheit/Individualismus) ↔ Ψ_I (Regulierung)"
    behavioral_driver: "ρ (Reaktanz) × σ (In-Group-Verstärkung)"

# =============================================================================
# STRATEGISCHE IMPLIKATIONEN (Quick Assessment)
# =============================================================================

strategic_implications:

  top_3_opportunities:
    - dimension: "WHEN (Kontext)"
      opportunity: |
        Default-Architektur verändern: Wenn E-Auto bei Flotten
        zum Standard wird (Opt-out statt Opt-in), verschiebt sich
        Markt massiv. Flottenmanager haben κ_default = 0.90.
      intervention_type: "Choice Architecture / Smart Defaults"

    - dimension: "AWARE (Bewusstsein)"
      opportunity: |
        TCO-Transparenz: Die meisten Käufer vergleichen nur
        Listenpreise, nicht Gesamtkosten (Strom vs. Benzin,
        Wartung, Versicherung). TCO-Rechner als Default im
        Konfigurationsprozess = A↑.
      intervention_type: "Information Salience / Framing"

    - dimension: "WHO (Stakeholder)"
      opportunity: |
        Peer-Effekte nutzen: Pragmatische Abwäger (40%) werden
        durch In-Group-Vorbilder überzeugt. Handwerker-Testimonials
        für E-Transporter, Familien-Testimonials für E-SUV.
        NICHT: Moral-Framing, sondern Praktikabilität.
      intervention_type: "Social Proof (segmentspezifisch)"

  top_3_risks:
    - risk: |
        Reaktanz-Spirale: Weitere Regulierungsverschärfung
        ohne Flexibilisierung erzeugt Backfire bei SEG-A3
        und politische Radikalisierung (SVP-Narrativ).
      mitigation: |
        Anreize statt Sanktionen kommunizieren. Autonomie
        betonen. EU-Übergangsfrist als Referenzpunkt.

    - risk: |
        Überalterung des Fahrzeugbestands: Kaufaufschub
        (SEG-A4 wächst) → ältere, unsichere, schmutzigere
        Autos bleiben länger auf der Strasse.
      mitigation: |
        Tauschprämien mit zeitlicher Begrenzung. Sicherheits-
        Framing (alte Autos = gefährlich) statt Klima-Framing.

    - risk: |
        China-Disruption: BYD, Leapmotor, MG unterbieten
        europäische Hersteller bei Preis. Schweizer Händler-
        Netz nicht auf chinesische Marken vorbereitet.
      mitigation: |
        Service-Qualität als Differenzierungsmerkmal.
        Restwert-Garantien als Vertrauensanker.

  recommended_next_step: |
    Upgrade auf STANDARD (400 Faktoren) empfohlen wenn:
    - Konkretes Beratungsmandat entsteht
    - Interventions-Design für Endkonsumenten gewünscht
    - Politische Kommunikationsstrategie gefragt

    Sofort möglich: /design-intervention für spezifische
    Verhaltensänderung (z.B. «Kaufaufschub reduzieren»)

