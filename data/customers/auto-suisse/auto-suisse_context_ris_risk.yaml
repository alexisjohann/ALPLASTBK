# =============================================================================
# AUTO-SUISSE — RIS: RISK & VULNERABILITY ASSESSMENT
# =============================================================================
# Version: 1.0.0
# Framework: EBF Context Vector Architecture (CVA) — STANDARD
# Erstellt: 2026-02-11
# Kategorie: RIS (Risk)
# Faktoren: 30
# =============================================================================
#
# BESONDERHEIT: auto-suisse ist ein Verband, kein Unternehmen.
# RIS beschreibt nicht unternehmensspezifische Risiken, sondern
# BRANCHEN- und REGULIERUNGSRISIKEN, die den gesamten Schweizer
# Automobilmarkt und den Verband selbst betreffen.
#
# BMW (Konzern)               →  auto-suisse (Verband)
# ─────────────────────────── →  ────────────────────────────────────
# Operative Risiken (Supply)  →  Regulatorische Risiken (CO2, Sanktionen)
# Finanzrisiken (Cashflow)    →  Marktrisiken (Kaufaufschub, Überalterung)
# Technologierisiken (R&D)    →  Technologie/Geopolitische Risiken (China)
# Reputationsrisiken          →  Verbands-/Relevanzrisiken
#
# =============================================================================

metadata:
  name: "auto-suisse Risk & Vulnerability Assessment"
  code: "AUTOSUISSE-RIS"
  category: "RIS"
  version: "1.0.0"
  last_updated: "2026-02-11"
  total_factors: 30
  parent_file: "auto-suisse_context_master_overview.yaml"

  description: |
    Risiko- und Vulnerabilitätsanalyse der Schweizer Automobilbranche
    und des Verbands auto-suisse. Fokus auf regulatorische, marktbezogene,
    technologische und geopolitische Risiken — mit verhaltensökonomischer
    Bewertung der Risiko-Wahrnehmung und -Reaktion.

  primary_10c: ["WHEN"]
  primary_psi: ["psi_I", "psi_T"]

# =============================================================================
# 1. REGULATORISCHE RISIKEN (10 Faktoren)
# =============================================================================

regulatorische_risiken:

  section_metadata:
    factor_range: "RIS-REG-001 bis RIS-REG-010"
    total_factors: 10
    description: "Risiken aus CO2-Regulierung, Sanktionen, politischen Entscheidungen"

  factors:

    - id: "RIS-REG-001"
      name: "CO2-Sanktions-Eskalation"
      severity: "KRITISCH"
      probability: 0.70
      impact: "CHF 300-500 Mio. p.a."
      description: |
        Wenn Schweiz weiter keine Übergangsfrist gewährt und BEV-Anteil
        langsamer wächst als CO2-Zielwerte sinken, steigen Sanktionskosten
        exponentiell. 2026: CHF 250 Mio. 2027: möglicherweise CHF 350+ Mio.
      behavioral_driver: "λ = 2.42 — Verluste durch Sanktionen besonders schmerzhaft"
      mitigation:
        - "Lobbying für EU-analoge Übergangsfrist (Motion)"
        - "Pooling-Strategien zwischen Importeuren"
        - "Beschleunigung BEV-Verkauf (Marketing, Incentives)"
      trend: "steigend"

    - id: "RIS-REG-002"
      name: "Schweizer Sonderweg-Isolation"
      severity: "HOCH"
      probability: 0.60
      impact: "Wettbewerbsnachteil vs. EU-Märkte"
      description: |
        EU gewährt 3-Jahres-Übergangsfrist (2025-2027). Schweiz nicht.
        Importeure in CH stärker belastet. Könnte zu Preiserhöhungen,
        Modell-Rückzügen oder Markt-Vernachlässigung führen.
      behavioral_driver: "σ_social = 0.60 — «Was machen andere Länder?» als Argument"
      mitigation:
        - "Regulatorische Äquivalenz mit EU fordern"
        - "Transparente Vergleichszahlen kommunizieren"
      trend: "akut (UREK-N hat am 30.01.2026 Flexibilisierung abgelehnt)"

    - id: "RIS-REG-003"
      name: "Verschärfung CO2-Zielwerte 2030+"
      severity: "HOCH"
      probability: 0.80
      impact: "Technologie-Lock-in"
      description: |
        EU Zero-Emission-Vorgabe ab 2035 (nur noch BEV-Neuwagen).
        Wenn CH nachzieht, Ende der Technologieoffenheit.
        Investitionen in PHEV/HEV werden Stranded Assets.
      mitigation:
        - "Technologieoffenheit-Kampagne verstärken"
        - "E-Fuels-Anerkennung in CO2-Bilanzierung fordern"

    - id: "RIS-REG-004"
      name: "Fehlende Förderpolitik für E-Mobilität"
      severity: "MITTEL"
      probability: 0.65
      impact: "Verlangsamte BEV-Adoption"
      description: |
        CH hat im Gegensatz zu EU-Ländern (D: Umweltbonus bis 2023,
        F: Bonus écologique) keine nationale Kaufprämie für E-Autos.
        Nur indirekte Förderung (Motorfahrzeugsteuer-Reduktion kantonal).
        Branche trägt Transformationskosten allein.
      mitigation:
        - "Kantonsweise Steuervorteile verstärken"
        - "Nationale TCO-Kampagne statt Kaufprämie"

    - id: "RIS-REG-005"
      name: "Strassenfinanzierung-Debatte"
      severity: "MITTEL"
      probability: 0.55
      impact: "Neue Belastung für E-Auto-Besitzer"
      description: |
        E-Autos zahlen keine Mineralölsteuer (CHF 5 Mrd./Jahr für Strassenbau).
        Diskussion über Ersatzabgabe (Road Pricing, km-Abgabe) läuft.
        Könnte TCO-Vorteil der E-Autos reduzieren.
      behavioral_driver: "Loss Aversion — Neue Abgabe als Verlust vs. Wegfall von Benzinkosten"
      mitigation:
        - "Proaktive Lösung mitgestalten (Road Pricing)"
        - "Übergangsfristen für early adopters fordern"

    - id: "RIS-REG-006"
      name: "EU-Zölle auf China-Fahrzeuge"
      severity: "MITTEL"
      probability: 0.75
      impact: "Preissteigerung bei günstigen BEVs"
      description: |
        EU hat 2024 provisorische Zusatzzölle auf chinesische E-Autos
        eingeführt (17-38%). Schweiz als Nicht-EU-Staat nicht direkt
        betroffen, aber Umgehungseffekte möglich (China-Importe via CH).
      mitigation:
        - "Monitoring der Handelsströme"
        - "Neutralität CH als Vorteil positionieren"

    - id: "RIS-REG-007"
      name: "Datenschutz-Regulierung Connected Cars"
      severity: "NIEDRIG"
      probability: 0.40
      impact: "Einschränkung digitaler Services"
      description: |
        Connected Cars sammeln massive Datenmengen. DSGVO/nDSG könnten
        Geschäftsmodelle einschränken. Aktuell geringe Priorität,
        aber mittelfristig relevant.
      mitigation:
        - "Privacy-by-Design bei digitalen Services"
        - "Transparente Datenpolitik kommunizieren"

    - id: "RIS-REG-008"
      name: "Kantonale Regulierungs-Fragmentierung"
      severity: "MITTEL"
      probability: 0.70
      impact: "Komplexitätskosten für Händler"
      description: |
        26 Kantone, 26 Motorfahrzeugsteuer-Regime, unterschiedliche
        MFK-Praxis, verschiedene Fördermassnahmen. KMU-Händler überfordert.
      behavioral_driver: "κ_complex = 0.75 — Regulierungskomplexität als Handlungsbarriere"
      mitigation:
        - "Harmonisierung auf Bundesebene fordern"
        - "Digitale Plattform für kantonale Unterschiede"

    - id: "RIS-REG-009"
      name: "Volksinitiative/Referendum gegen Autoverkehr"
      severity: "NIEDRIG"
      probability: 0.25
      impact: "Reputationsschaden, strengere Regulierung"
      description: |
        Umweltorganisationen (VCS, Greenpeace, Klimastreik) könnten
        Initiative lancieren (z.B. Tempo 30, Autoverbots-Zonen).
        Aktuell keine konkreten Bestrebungen.
      mitigation:
        - "Proaktive Nachhaltigkeitskommunikation"
        - "Allianz mit TCS (3 Mio. Mitglieder)"

    - id: "RIS-REG-010"
      name: "Bilaterale Abkommen CH-EU"
      severity: "MITTEL"
      probability: 0.50
      impact: "Regulatorischer Rahmen für Fahrzeugzulassung"
      description: |
        Bilaterale III-Verhandlungen betreffen auch Fahrzeugzulassung.
        Erleichterung möglich (automatische Anerkennung EU-Zulassung),
        aber auch Verschärfung (vollständige CO2-Übernahme ohne Flexibilität).
      mitigation:
        - "Aktive Teilnahme an Vernehmlassung"
        - "Flexibilitätsklauseln einfordern"

# =============================================================================
# 2. MARKTRISIKEN (10 Faktoren)
# =============================================================================

marktrisiken:

  section_metadata:
    factor_range: "RIS-MKT-001 bis RIS-MKT-010"
    total_factors: 10
    description: "Risiken aus Marktentwicklung, Kaufverhalten, Wettbewerb"

  factors:

    - id: "RIS-MKT-001"
      name: "Kaufaufschub-Spirale"
      severity: "HOCH"
      probability: 0.70
      impact: "Marktschrumpfung, Überalterung Bestand"
      description: |
        SEG-A4 (Kaufverweigerer, 15%) wächst. «Warte auf bessere Preise,
        bessere Technologie, klarere Regulierung.» Jeder Aufschub
        verlängert Durchschnittsalter des Bestands (aktuell 9.4 Jahre).
      behavioral_driver: "β = 0.77 — Present Bias treibt Aufschub"
      mitigation:
        - "Zeitlich begrenzte Angebote (Urgency)"
        - "Tauschprämien mit Frist"
        - "Sicherheitsframing (alte Autos = unsicher)"

    - id: "RIS-MKT-002"
      name: "China-Preis-Disruption"
      severity: "HOCH"
      probability: 0.80
      impact: "Margendruck bei europäischen Herstellern"
      description: |
        BYD, MG, Leapmotor unterbieten europäische BEVs um 20-40%.
        BYD Atto 3 ab CHF 38'990 vs. VW ID.4 ab CHF 46'850.
        Europäische Hersteller müssen Margen reduzieren oder Marktanteile verlieren.
      behavioral_driver: "Anchoring — China-Preis wird zum neuen Referenzpunkt"
      mitigation:
        - "Service-Qualität differenzieren"
        - "Restwert-Garantien als Vertrauensanker"
        - "Schweizer Händlernetz als Vorteil kommunizieren"

    - id: "RIS-MKT-003"
      name: "Überalterung Fahrzeugbestand"
      severity: "HOCH"
      probability: 0.75
      impact: "Höhere Unfallzahlen, schlechtere CO2-Bilanz"
      description: |
        Durchschnittsalter CH-Bestand: 9.4 Jahre (steigend).
        Weniger Neukäufe = ältere, unsichere Fahrzeuge länger auf Strasse.
        Kontraproduktiv für Klimaziele UND Sicherheit.
      mitigation:
        - "Abwrack-/Tauschprämien (zeitlich begrenzt)"
        - "Sicherheits-Framing in Kommunikation"

    - id: "RIS-MKT-004"
      name: "Konzentrations-Risiko (AMAG)"
      severity: "MITTEL"
      probability: 0.30
      impact: "Marktverzerrung bei AMAG-Krise"
      description: |
        AMAG hat ~28% Marktanteil. Wenn AMAG in Krise gerät (z.B. VW-Probleme,
        Managementwechsel), betrifft das gesamten Markt.
        Klumpenrisiko für auto-suisse.
      mitigation:
        - "Diversifizierung der Mitgliederstruktur"
        - "Neue Mitglieder aktiv werben (China-Marken)"

    - id: "RIS-MKT-005"
      name: "Restwert-Unsicherheit BEV"
      severity: "MITTEL"
      probability: 0.65
      impact: "Kaufhemmnis"
      description: |
        Restwert von BEVs nach 3-5 Jahren unsicher (Batterie-Degradation,
        Technologie-Obsoleszenz, neue günstigere Modelle).
        Ø BEV-Restwert nach 3 Jahren: ~55% vs. ICE: ~60%.
      behavioral_driver: "Ambiguity Aversion — Unsicherheit über Restwert = Kaufverzicht"
      mitigation:
        - "Hersteller-Restwertgarantien"
        - "Zertifizierte Occasions-Programme"

    - id: "RIS-MKT-006"
      name: "Konjunkturrisiko 2026-2027"
      severity: "MITTEL"
      probability: 0.55
      impact: "Rückgang Konsumneigung"
      description: |
        Eingetrübte Konjunkturaussichten CH (SECO-Prognose: 1.5% BIP 2026).
        Auto als Luxusgut unter Druck bei Rezessionsängsten.
      mitigation:
        - "Finanzierungsmodelle prominenter kommunizieren"
        - "Abo-Modelle als Lower-Commitment-Alternative"

    - id: "RIS-MKT-007"
      name: "Generationenwandel Automobilität"
      severity: "MITTEL"
      probability: 0.85
      impact: "Langfristiger Marktrückgang"
      description: |
        Jüngere Generationen (Gen Z) haben geringere Auto-Affinität.
        Später Führerschein, Urban Living, ÖV-Affinität, Sharing Economy.
        Langfristige Bedrohung für gesamte Branche.
      behavioral_driver: "Identitäts-Shift — Auto verliert Status-Funktion bei Jüngeren"
      mitigation:
        - "Neue Mobilitätskonzepte integrieren"
        - "Auto-Abo als Einstieg für Jüngere"

    - id: "RIS-MKT-008"
      name: "Direktvertrieb durch Hersteller"
      severity: "MITTEL"
      probability: 0.60
      impact: "Umgehung des Händlernetzes"
      description: |
        Tesla, Polestar, BYD vertreiben direkt. Andere Hersteller
        (VW, Mercedes) experimentieren mit Agency-Modell.
        Bedroht klassisches Händlernetz (4'000 Betriebe).
      mitigation:
        - "Händler als Service-Hub positionieren"
        - "Mehrwert-Services (Beratung, Probefahrt, Wartung)"

    - id: "RIS-MKT-009"
      name: "Parallelimporte und Graumarkt"
      severity: "NIEDRIG"
      probability: 0.40
      impact: "Preisdruck und Garantie-Probleme"
      description: |
        Schweizer Hochpreisinsel motiviert Parallelimporte (EU-Fahrzeuge
        ohne offizielle CH-Spezifikation). Bislang limitiert, aber bei
        China-Zöllen in EU könnte CH als Umgehungsroute attraktiver werden.
      mitigation:
        - "Monitoring Handelsströme"
        - "Service-Paket als Differenzierung"

    - id: "RIS-MKT-010"
      name: "Disruption durch autonomes Fahren"
      severity: "NIEDRIG"
      probability: 0.20
      impact: "Fundamentale Veränderung Autobesitz"
      description: |
        Langfristig (2035+): Autonome Robotaxis könnten Autobesitz
        grundsätzlich in Frage stellen. In CH wegen topografischer
        Komplexität und regulatorischer Vorsicht verzögert.
      mitigation:
        - "Monitoring der Entwicklung"
        - "Regulatorischen Rahmen mitgestalten"

# =============================================================================
# 3. TECHNOLOGIE- & GEOPOLITISCHE RISIKEN (10 Faktoren)
# =============================================================================

technologie_geopolitische_risiken:

  section_metadata:
    factor_range: "RIS-TGP-001 bis RIS-TGP-010"
    total_factors: 10
    description: "Technologische Risiken, Lieferketten, geopolitische Abhängigkeiten"

  factors:

    - id: "RIS-TGP-001"
      name: "Batterie-Rohstoff-Abhängigkeit"
      severity: "HOCH"
      probability: 0.60
      impact: "Preis- und Verfügbarkeitsrisiko"
      description: |
        Lithium, Kobalt, Nickel: Konzentration auf wenige Länder
        (China: 70% Batteriezell-Produktion, DRC: 70% Kobalt).
        Supply Chain Shock = Preisspitzen bei BEVs.
      mitigation:
        - "Diversifizierung der Lieferketten (EU Battery Alliance)"
        - "Batterie-Recycling beschleunigen"
        - "Alternative Batteriechemie (Na-Ionen, Festkörper)"

    - id: "RIS-TGP-002"
      name: "China-Technologie-Dominanz"
      severity: "HOCH"
      probability: 0.75
      impact: "Strategische Abhängigkeit"
      description: |
        China dominiert: 70% Batteriezellen, 80% Seltene Erden,
        führend bei Digitalisierung (CATL, BYD). Europäische Hersteller
        zunehmend abhängig von chinesischer Technologie.
      mitigation:
        - "Europäische Batterie-Produktion unterstützen"
        - "Technologieoffenheit als Hedge"

    - id: "RIS-TGP-003"
      name: "Cybersecurity-Risiko Connected Cars"
      severity: "MITTEL"
      probability: 0.50
      impact: "Sicherheitsrisiko, Vertrauensverlust"
      description: |
        Vernetzte Fahrzeuge als Angriffsfläche. Hack-Szenarien:
        Remote-Steuerung, Datendiebstahl, Ransomware auf Flottenebene.
        Aktuell geringe Awareness bei Käufern.
      mitigation:
        - "UNECE R155/R156 Cybersecurity-Standards durchsetzen"
        - "Awareness-Kampagne für Käufer"

    - id: "RIS-TGP-004"
      name: "Technologie-Obsoleszenz-Risiko"
      severity: "MITTEL"
      probability: 0.55
      impact: "Wertvernichtung bei Fahrzeugbestand"
      description: |
        Schneller Technologiewandel (Batterie, Software) macht 2-3 Jahre
        alte BEVs «veraltet» im Vergleich zu Neuwagen. Treibt Restwert-
        Unsicherheit und Kaufaufschub.
      behavioral_driver: "Regret Aversion — Angst vor Fehlkauf bei schneller Innovation"
      mitigation:
        - "OTA-Updates als Lebensverlängerung"
        - "Batterie-Upgrade-Programme"

    - id: "RIS-TGP-005"
      name: "Halbleiter-Engpässe"
      severity: "MITTEL"
      probability: 0.35
      impact: "Lieferverzögerungen, Preiserhöhungen"
      description: |
        Post-COVID Chip-Krise weitgehend überwunden, aber strukturelle
        Abhängigkeit von TSMC (Taiwan) bleibt. Geopolitische Eskalation
        im Taiwan-Strait = sofortige Lieferkettenunterbrechung.
      mitigation:
        - "Diversifizierung (Intel, Samsung)"
        - "Bestandsmanagement verbessern"

    - id: "RIS-TGP-006"
      name: "Energiepreis-Volatilität"
      severity: "MITTEL"
      probability: 0.55
      impact: "TCO-Unsicherheit"
      description: |
        Strompreise CH könnten steigen (Winterstrom-Import, AKW-Ausstieg).
        Gleichzeitig: Ölpreise volatil (OPEC, Geopolitik).
        Macht TCO-Vergleich BEV vs. ICE instabil.
      behavioral_driver: "Ambiguity Aversion — Unsichere Energiekosten = Entscheidungs-Paralyse"
      mitigation:
        - "Fixe Stromtarife für BEV-Laden"
        - "Solarstrom-Eigenverbrauch als Hedge"

    - id: "RIS-TGP-007"
      name: "Festkörper-Batterie-Disruption"
      severity: "MITTEL"
      probability: 0.40
      impact: "Technologiesprung macht aktuelle BEVs obsolet"
      description: |
        Solid-State-Batterien (Toyota, Samsung SDI) versprechen 2×
        Energiedichte, schnelleres Laden, keine Brandgefahr.
        Wenn Marktreife 2028-2030: Aktuell gekaufte BEVs verlieren
        massiv an Restwert.
      behavioral_driver: "Anticipatory Regret — «Warte lieber auf Solid-State»"
      mitigation:
        - "Transparente Kommunikation über Zeitlinien"
        - "Upgrade-Programme und Rückkaufgarantien"

    - id: "RIS-TGP-008"
      name: "Handelskonflikt USA-China (Spill-over)"
      severity: "MITTEL"
      probability: 0.65
      impact: "Preis- und Lieferketten-Verwerfungen"
      description: |
        Trump-Administration 2025+: Hohe Zölle auf China-Importe.
        EU reagiert mit eigenen Zöllen. Schweiz als Nicht-EU-Staat
        in Sandwich-Position. Umleitung von Handelsströmen möglich.
      mitigation:
        - "Neutralität CH als Standortvorteil"
        - "Monitoring und Szenarioplanung"

    - id: "RIS-TGP-009"
      name: "Fachkräftemangel Transformation"
      severity: "MITTEL"
      probability: 0.70
      impact: "Verlangsamte Transformation"
      description: |
        Umstellung von ICE auf BEV erfordert neue Kompetenzen:
        Hochvolt-Technik, Software, Ladeinfrastruktur. Garagen und
        Händler finden nicht genügend qualifiziertes Personal.
      mitigation:
        - "Weiterbildungsoffensive (mit AGVS)"
        - "Neue Berufsbilder entwickeln"

    - id: "RIS-TGP-010"
      name: "Verbandsrelevanz-Risiko"
      severity: "MITTEL"
      probability: 0.35
      impact: "Marginalisierung in öffentlicher Debatte"
      description: |
        Wenn E-Mobilität als «selbstverständlich» wahrgenommen wird,
        sinkt Lobbying-Bedarf. Gleichzeitig: Wenn China-Marken dominieren,
        sind deren Interessen anders als die der europäischen Mitglieder.
        Verband muss sich transformieren.
      behavioral_driver: "Status Quo Bias — Verband bleibt in alter Logik"
      mitigation:
        - "Verbands-Strategie auf Mobilitätswende erweitern"
        - "China-Mitglieder aktiv integrieren"
        - "Datenhoheit als Alleinstellungsmerkmal stärken"

# =============================================================================
# EBF MAPPING
# =============================================================================

ebf_mapping:

  primary_10c_dimensions:
    WHEN:
      description: "Wann materialisieren sich Risiken? Zeitliche Dimension."
      key_factors:
        - "RIS-REG-001: CO2-Sanktionseskalation (2026-2028 kritisch)"
        - "RIS-MKT-001: Kaufaufschub-Spirale (jetzt aktiv)"
        - "RIS-TGP-007: Solid-State-Disruption (2028-2030)"

    WHERE:
      description: "Woher kommen die Risiko-Parameter?"
      key_factors:
        - "RIS-REG-002: EU-Vergleich als Benchmark"
        - "RIS-MKT-002: China-Preisvergleich"

  primary_psi_dimensions:
    psi_I_institutional:
      value: 0.92
      key_drivers:
        - "Regulatorische Unsicherheit als grösster Risikofaktor"
        - "CO2-Sanktionsregime als existenzielle Bedrohung"
    psi_T_temporal:
      value: 0.82
      key_drivers:
        - "Kurzfrist-Risiken (Sanktionen) vs. Langfrist-Risiken (Technologie)"
        - "Timing-Mismatch: Politik fordert schneller als Markt liefert"

  behavioral_implications:

    risk_perception_bias:
      description: |
        Importeure übergewichten kurzfristige Sanktionsrisiken (RIS-REG-001)
        und untergewichten langfristige Technologie-Risiken (RIS-TGP-007).
        Typischer Present Bias in der Risikowahrnehmung.
      affected_segments: ["Grossimporteure", "KMU-Händler"]
      parameter: "β = 0.77 → Kurzfrist-Risiken dominieren Entscheidungen"

    regulatory_uncertainty_paralysis:
      description: |
        Unklare Regulierung (CO2-Ziele, Übergangsfrist, Förderung) führt
        zu Entscheidungsparalyse bei Importeuren UND Endkonsumenten.
        Niemand investiert, wenn Regeln sich jährlich ändern können.
      affected_segments: ["Alle"]
      parameter: "τ_inst = 0.42 → Tiefes Vertrauen in Regulierungs-Stabilität"

    loss_framing_sanctions:
      description: |
        CO2-Sanktionen werden als Verlust wahrgenommen (nicht als Kosten).
        λ = 2.42 → CHF 250 Mio. Sanktionen «fühlen sich an» wie
        CHF 600 Mio. Verlust. Verstärkt Dringlichkeit, aber auch
        politische Radikalisierung (Reaktanz).
      parameter: "λ = 2.42, ρ = 0.68"

