  kernauftrag: |
    Strategische Kommunikationsberatung für die SPÖ unter Vizekanzler
    Andreas Babler. Entwicklung und Umsetzung des "Ordnen statt Spalten"-
    Frames als zentrale Positionierung der österreichischen Sozialdemokratie.

  ziele:
    - Differenzierung von FPÖ (nicht kopieren, nicht ignorieren)
    - Themenhoheit bei Migration zurückgewinnen (nicht vermeiden, sondern ordnen)
    - Regierungskommunikation als Vizekanzlerpartei
    - Verteidigung europäischer Grundwerte gegen Trump-Erosion

