# =============================================================================
# SPÖ MANDAT-PRÄAMBEL
# =============================================================================
# Dieses Dokument wird automatisch geladen bei: SPÖ, Babler, Vizekanzler,
# österreichische Sozialdemokratie, Migration Österreich
#
# Version: 2.7.0
# Erstellt: 2026-02-01
# Letzte Aktualisierung: 2026-02-03
# Status: AKTIV
#
# ARCHITEKTUR: 3-SSOT-PRINZIP + PRÄAMBEL LOADING PROTOCOL (PLP)
# ┌─────────────────────────────────────────────────────────────────────────┐
# │  Diese Präambel ist SSOT für: AKTUELLE LAGE                             │
# │  Strategiebriefing ist SSOT für: STRATEGIE                              │
# │  CVA-Profil ist SSOT für: KONTEXTFAKTOREN                               │
# │                                                                         │
# │  PLP: Bei jedem Laden → Auto-Research für top_5_themen (letzte 7 Tage) │
# └─────────────────────────────────────────────────────────────────────────┘
# =============================================================================

# =============================================================================
# TEIL 0: SUPERKEY & FRESHNESS (Präambel Loading Protocol)
# =============================================================================
# Der Superkey identifiziert diese Präambel eindeutig.
# Bei jedem Laden wird Auto-Research für die top_5_themen durchgeführt.
# =============================================================================

superkey: "PRE-SPO-2026-02-01-001"
# Format: PRE-{KUNDE}-{ERSTELLT}-{SEQ}

freshness:
  erstellt: "2026-02-01"
  letzte_aktualisierung: "2026-02-01"

  # ─────────────────────────────────────────────────────────────────────────
  # AUTO-RESEARCH PROTOKOLL
  # Bei jedem Laden der Präambel werden diese 5 Queries ausgeführt
  # ─────────────────────────────────────────────────────────────────────────

  auto_research:
    enabled: true
    trigger: "bei_jedem_laden"  # Alternativen: "wenn_aelter_als_7_tage"
    zeitraum: "letzte 7 Tage"
    max_results_per_query: 3

    # ─────────────────────────────────────────────────────────────────────────
    # QUELLEN-PFLICHT (NEU v2.3)
    # Bei jedem Auto-Research werden Quellen IMMER angefügt
    # ─────────────────────────────────────────────────────────────────────────
    quellen_pflicht: true  # IMMER Quellen anfügen
    quellen_format: "markdown_table"  # Alternativen: "bullet_list", "inline"

    top_5_themen:
      - id: "T1_PERSON"
        name: "Vizekanzler Babler"
        query: "Babler Vizekanzler"
        domains: ["orf.at", "derstandard.at", "diepresse.com", "kurier.at"]

      - id: "T2_KERNTHEMA"
        name: "SPÖ Migration"
        query: "SPÖ Migration Asyl Österreich"
        domains: ["orf.at", "derstandard.at", "diepresse.com"]

      - id: "T3_REGIERUNG"
        name: "Regierung Stocker"
        query: "Regierung Stocker ÖVP SPÖ NEOS"
        domains: ["orf.at", "derstandard.at", "wienerzeitung.at"]

      - id: "T4_OPPOSITION"
        name: "FPÖ Kickl"
        query: "FPÖ Kickl Umfrage"
        domains: ["orf.at", "derstandard.at", "profil.at"]

      - id: "T5_GEOPOLITIK"
        name: "Europa Menschenrechte"
        query: "Österreich EU Menschenrechte Trump"
        domains: ["orf.at", "derstandard.at", "euronews.com"]

    output_format: |
      ┌─────────────────────────────────────────────────────────────────┐
      │  🔄 AUTO-RESEARCH ({datum})                                     │
      │  Präambel: {superkey}                                          │
      ├─────────────────────────────────────────────────────────────────┤
      │  T1 PERSON:     {t1_summary}                                   │
      │  T2 KERNTHEMA:  {t2_summary}                                   │
      │  T3 REGIERUNG:  {t3_summary}                                   │
      │  T4 OPPOSITION: {t4_summary}                                   │
      │  T5 GEOPOLITIK: {t5_summary}                                   │
      └─────────────────────────────────────────────────────────────────┘

      **Quellen:**
      | Thema | Aussage | Quelle | Datum |
      |-------|---------|--------|-------|
      | T1 | {t1_key_claim} | [{t1_source_name}]({t1_source_url}) | {t1_pub_date} |
      | T2 | {t2_key_claim} | [{t2_source_name}]({t2_source_url}) | {t2_pub_date} |
      | T3 | {t3_key_claim} | [{t3_source_name}]({t3_source_url}) | {t3_pub_date} |
      | T4 | {t4_key_claim} | [{t4_source_name}]({t4_source_url}) | {t4_pub_date} |
      | T5 | {t5_key_claim} | [{t5_source_name}]({t5_source_url}) | {t5_pub_date} |

# =============================================================================
# AUTO-RESEARCH DATENBANKEN (mit Freshness-Check)
# =============================================================================
# Diese Datenbanken werden automatisch aktualisiert wenn:
# 1. Trigger-Wörter erkannt werden UND
# 2. Freshness-Check fehlschlägt (last_fetched + threshold < heute)
# =============================================================================

auto_research_databases:

  beliebtheit_politiker:
    ssot: "data/customers/spo/database/BELIEBTHEIT_POLITIKER_AT.yaml"
    beschreibung: "OGM Vertrauensindex - Historische Popularitätsdaten österreichischer Politiker"
    trigger_words:
      - "SPÖ"
      - "Babler"
      - "Vizekanzler"
      - "österreichische Sozialdemokratie"
    freshness_check:
      enabled: true
      threshold_days: 2
      # Wenn last_fetched + 2 Tage < heute → Auto-Research
    update_queries:
      - query: "OGM Vertrauensindex Österreich {MONTH} {YEAR}"
        priority: 1
      - query: "Politiker Beliebtheit Umfrage Österreich {MONTH} {YEAR}"
        priority: 2
      - query: "Babler Kickl Vertrauen Umfrage aktuell"
        priority: 3
    output_format: |
      ┌─────────────────────────────────────────────────────────────────┐
      │  🔄 AUTO-RESEARCH: Politiker-Beliebtheit ({DATE})               │
      │  Quelle: {SOURCE}                                               │
      ├─────────────────────────────────────────────────────────────────┤
      │                                                                 │
      │  AKTUELLER STAND:                                               │
      │  ├── Babler:  {BABLER_SALDO} (Rang {BABLER_RANK})  {BABLER_Δ}  │
      │  ├── Kickl:   {KICKL_SALDO} (Rang {KICKL_RANK})   {KICKL_Δ}   │
      │  └── Abstand: {GAP} Punkte                                      │
      │                                                                 │
      │  TREND (15 Monate):                                             │
      │  ├── Babler: {BABLER_TREND}                                     │
      │  └── Gap:    {GAP_TREND}                                        │
      │                                                                 │
      └─────────────────────────────────────────────────────────────────┘

  sonntagsfrage_parteien:
    ssot: "data/customers/spo/database/SONNTAGSFRAGE_PARTEIEN_AT.yaml"
    beschreibung: "Sonntagsfrage - Parteien-Umfragen 24 Monate (alle österreichischen Parteien)"
    trigger_words:
      - "SPÖ"
      - "Sonntagsfrage"
      - "Wahlumfrage"
      - "Parteien Österreich"
    freshness_check:
      enabled: true
      threshold_days: 2
    update_queries:
      - query: "Sonntagsfrage Österreich {MONTH} {YEAR}"
        priority: 1
      - query: "Austria polls FPÖ SPÖ ÖVP {MONTH} {YEAR}"
        priority: 2
      - query: "PolitPro Wahltrend Österreich aktuell"
        priority: 3
    output_format: |
      ┌─────────────────────────────────────────────────────────────────┐
      │  🔄 AUTO-RESEARCH: Sonntagsfrage ({DATE})                       │
      │  Quelle: {SOURCE}                                               │
      ├─────────────────────────────────────────────────────────────────┤
      │                                                                 │
      │  AKTUELLER STAND:                                               │
      │  ├── FPÖ:   {FPOE}% (Δ {FPOE_Δ})                               │
      │  ├── ÖVP:   {OEVP}% (Δ {OEVP_Δ})                               │
      │  ├── SPÖ:   {SPOE}% (Δ {SPOE_Δ})                               │
      │  ├── GRÜNE: {GRUENE}%                                          │
      │  └── NEOS:  {NEOS}%                                            │
      │                                                                 │
      │  REGIERUNG (Ampel): {AMPEL}%                                    │
      │  SPÖ-TREND (24M): {SPOE_TREND}                                  │
      │                                                                 │
      └─────────────────────────────────────────────────────────────────┘

