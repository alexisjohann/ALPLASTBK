# EBF-INTEGRATION
# =============================================================================
ebf_mapping:
  psi_dimension: "psi_E"
  behavioral_parameters:
    - "kappa_FIN"
    - "resource_constraint"
  10c_dimension: "WHERE"
  appendix_reference: "BBB"

summary:
  total_factors: 80
  critical_factors: 12
  trends:
    steigend: 8
    stabil: 35
    fallend: 37
  key_insight: |
    SPÖ hat strukturelles Finanzproblem: Sinkende Wählerstimmen → sinkende Förderung →
    weniger Ressourcen für Wahlkampf → schlechteres Ergebnis. Negativspirale.
    Digitalisierungsausgaben deutlich unter FPÖ-Niveau.
