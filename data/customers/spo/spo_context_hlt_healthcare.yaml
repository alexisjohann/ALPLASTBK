# =============================================================================
# 7. Ψ-DIMENSIONEN (8 Faktoren)
# =============================================================================
PSI:
  name: "Ψ-Dimensionen für Gesundheitsverhalten"
  description: "EBF-Kontextfaktoren für Gesundheitsentscheidungen"
  factor_count: 8

  dimensions:
    psi_I_institutional:
      value: 0.90
      label: "Institutionell"
      description: |
        Sehr starke institutionelle Einbettung im österreichischen
        Gesundheitssystem: Pflichtversicherung (99.9%), ELGA-System,
        E-Card, Hausarztsystem (teilweise), Rezeptpflicht.
      key_factors:
        - "Pflichtversicherung als Default"
        - "ELGA Opt-out (nur 3%)"
        - "Rezeptpflicht für viele Medikamente"
        - "Spitalszugang ohne Hausarzt-Gatekeeper"
      ebf_implications:
        - "Hohe κ_default bei Versicherung"
        - "Niedrige Eigenverantwortung (System übernimmt)"
        - "Opt-out-Defaults funktionieren gut"

    psi_S_social:
      value: 0.65
      label: "Sozial"
      description: |
        Mittlere bis hohe soziale Einbettung: Familie spielt
        wichtige Rolle bei Pflegeentscheidungen, aber zunehmende
        Individualisierung. Starke regionale Unterschiede.
      key_factors:
        - "Familiale Pflege als Norm (noch)"
        - "Stigma bei psychischen Erkrankungen"
        - "Soziale Kontrolle bei Impfentscheidungen"
        - "Regionale Arzt-Reputation"
      ebf_implications:
        - "Social Proof bei Impfkampagnen"
        - "Familienbasierte Pflegeentscheidungen"
        - "Scham als Barriere bei Mental Health"

    psi_C_cognitive:
      value: 0.45
      label: "Kognitiv"
      description: |
        Mittlere kognitive Last: System ist komplex (Kassen, Wahlärzte,
        Kostenbeteiligung), aber relativ gut strukturiert. Probleme bei
        Gesundheitskompetenz (Health Literacy 48-54%).
      key_factors:
        - "Niedrige Health Literacy (48%)"
        - "Komplexes Kassensystem"
        - "Unklare Kosten bei Wahlärzten"
        - "Überforderte Patienten bei Chronikern"
      ebf_implications:
        - "Vereinfachung als Schlüsselintervention"
        - "Defaults besonders wirksam"
        - "Risiko: Fehlentscheidungen bei Komplexität"

    psi_K_cultural:
      value: 0.60
      label: "Kulturell"
      description: |
        Moderater Konservatismus: Vertrauen in Schulmedizin hoch,
        aber auch Skepsis gegenüber Pharma/Impfungen. Wachsendes
        Gesundheitsbewusstsein, aber träge Verhaltensänderung.
      key_factors:
        - "Hohes Vertrauen in Ärzte (82%)"
        - "Skeptische Haltung zu 'Big Pharma'"
        - "Naturmedizin-Affinität (30%)"
        - "Genussorientierung (Rauchen, Alkohol)"
      ebf_implications:
        - "Arzt als vertrauenswürdiger Messenger"
        - "Framing: Natürlichkeit betonen"
        - "Risiko: Impfskepsis bei harten Botschaften"

    psi_E_economic:
      value: 0.70
      label: "Ökonomisch"
      description: |
        Relativ hohe Ressourcenverfügbarkeit: Universelle Grundversorgung,
        aber wachsender privater Anteil. Out-of-Pocket steigt (18-20%),
        Private Zusatzversicherung wächst (35-48%).
      key_factors:
        - "Grundversorgung gesichert (99.9%)"
        - "Out-of-Pocket steigend (18% → 20%)"
        - "Private Zusatzversicherung (35% → 48%)"
        - "Zwei-Klassen-Medizin wächst"
      ebf_implications:
        - "Zahlungsbereitschaft für 'Premium'"
        - "Loss Aversion bei Kostenbeteiligung"
        - "Fairness-Wahrnehmung kritisch"

    psi_T_temporal:
      value: 0.40
      label: "Temporal"
      description: |
        Niedriger bis mittlerer Zeithorizont: Prävention unterbewertet,
        kurzfristige Symptombehandlung bevorzugt. Present Bias stark
        ausgeprägt bei Lifestyle-Entscheidungen.
      key_factors:
        - "Prävention unterfinanziert (2.1%)"
        - "Vorsorgeuntersuchung nur 12-25%"
        - "Present Bias bei Ernährung/Sport"
        - "Zeitdruck in Ambulanzen"
      ebf_implications:
        - "β < 1 dominant (Present Bias)"
        - "Commitment Devices für Prävention"
        - "Sofortige Belohnungen nutzen"

    psi_M_material:
      value: 0.70
      label: "Materiell/Technologisch"
      description: |
        Gute technologische Infrastruktur: ELGA, E-Rezept, E-Card.
        Aber Digitalisierung noch nicht vollständig. Telemedizin
        wachsend, aber nicht flächendeckend.
      key_factors:
        - "ELGA-Durchdringung 65-92%"
        - "E-Rezept wachsend (5% → 95%)"
        - "Telemedizin im Aufbau (8% → 68%)"
        - "Smartphone-Penetration hoch"
      ebf_implications:
        - "Digital Nudges möglich"
        - "Reminder-Systeme implementierbar"
        - "Tracking für Prävention"

    psi_F_physical:
      value: 0.55
      label: "Physisch/Räumlich"
      description: |
        Mittlere räumliche Zugänglichkeit: Gute Versorgung in Städten,
        wachsende Lücken auf dem Land. Spitaldichte hoch, aber
        Primärversorgung fragmentiert.
      key_factors:
        - "Stadt-Land-Gefälle bei Ärzten"
        - "Hohe Spitaldichte (aber Konsolidierung)"
        - "Apothekennetz gut"
        - "Lange Wege in Peripherie"
      ebf_implications:
        - "Erreichbarkeit als Barriere"
        - "Telemedizin für ländliche Gebiete"
        - "Default: Nächstes Spital (nicht optimal)"

# =============================================================================
# 8. EBF-VERHALTENSPARAMETER (7 Faktoren)
# =============================================================================
BEH:
  name: "EBF-Verhaltensparameter für Gesundheit"
  description: "Verhaltensökonomische Parameter für Gesundheitsentscheidungen in AT"
  factor_count: 7

  parameters:
    - id: AT-HLT-BEH-01
      name: "Loss Aversion Gesundheit"
      symbol: "λ_health"
      definition: "Verlustaversion bei Gesundheitsentscheidungen"
      value: 2.8
      range: [2.4, 3.2]
      uncertainty: "mittel"
      source: "LLMMC Prior + Literatur"
      note: |
        Höher als Standard (2.25) wegen:
        - Irreversibilität vieler Gesundheitsentscheidungen
        - Emotionale Aufladung bei Krankheit
        - Risikoaversion im medizinischen Kontext
      ebf_implications:
        - "Loss Framing bei Prävention sehr effektiv"
        - "Angst-Appelle können backfiren"
        - "Versicherung gegen Verlust stark nachgefragt"

    - id: AT-HLT-BEH-02
      name: "Present Bias Gesundheit"
      symbol: "β_health"
      definition: "Gegenwartspräferenz bei Gesundheitsverhalten"
      value: 0.72
      range: [0.65, 0.80]
      uncertainty: "mittel"
      source: "LLMMC Prior + Literatur"
      note: |
        Niedriger (stärkerer Bias) als Standard (0.85) wegen:
        - Abstrakte zukünftige Gesundheitsgewinne
        - Konkrete heutige Kosten (Zeit, Aufwand, Schmerz)
        - Hyperbolic Discounting bei Prävention
      ebf_implications:
        - "Sofortige Belohnungen für Prävention"
        - "Commitment Devices (Termine, Erinnerungen)"
        - "Defaults für Vorsorge entscheidend"

    - id: AT-HLT-BEH-03
      name: "Default Sensitivity Gesundheit"
      symbol: "κ_default_health"
      definition: "Sensitivität gegenüber Defaults im Gesundheitssystem"
      value: 0.82
      range: [0.75, 0.88]
      uncertainty: "gering"
      source: "LLMMC Prior + ELGA Opt-out Daten"
      note: |
        Sehr hoch basierend auf:
        - ELGA Opt-out nur 3% (trotz Mediendebatten)
        - Organspende Opt-out Regelung funktioniert
        - Hohe Compliance bei System-Defaults
      ebf_implications:
        - "Opt-out Defaults extrem wirksam"
        - "Default-Impftermine erhöhen Uptake"
        - "Automatische Vorsorge-Einladungen"

    - id: AT-HLT-BEH-04
      name: "Social Proof Gesundheit"
      symbol: "σ_social_health"
      definition: "Einfluss sozialer Normen auf Gesundheitsverhalten"
      value: 0.58
      range: [0.48, 0.68]
      uncertainty: "mittel"
      source: "LLMMC Prior + Impfstudien"
      note: |
        Moderat, aber kontextabhängig:
        - Hoch bei Impfentscheidungen (Familie)
        - Niedrig bei privatem Verhalten (Ernährung)
        - Hoch bei stigmatisierten Themen (Mental Health)
      ebf_implications:
        - "Peer-Normen bei Impfkampagnen"
        - "Vorsicht bei Stigma-Themen"
        - "Ärzte als Meinungsführer nutzen"

    - id: AT-HLT-BEH-05
      name: "Trust in Medical System"
      symbol: "τ_medical"
      definition: "Vertrauen ins Gesundheitssystem"
      value: 0.78
      range: [0.72, 0.84]
      uncertainty: "gering"
      source: "Eurobarometer + ATHIS"
      note: |
        Hohes Systemvertrauen, aber:
        - Sinkend bei jüngeren Generationen
        - Niedriger bei Alternativmedizin-Affinen
        - Regional variierend
      ebf_implications:
        - "System als Absender funktioniert"
        - "Arzt-Empfehlung sehr wirksam"
        - "Aber: Skeptiker-Segment beachten"

    - id: AT-HLT-BEH-06
      name: "Health Literacy Effect"
      symbol: "η_literacy"
      definition: "Effekt von Gesundheitskompetenz auf Verhalten"
      value: 0.48
      range: [0.42, 0.54]
      uncertainty: "mittel"
      source: "HLS-EU / GÖG"
      note: |
        Nur 48% mit ausreichender Health Literacy.
        Niedriger Wert bedeutet:
        - Informationsinterventionen allein reichen nicht
        - Vereinfachung kritisch
        - Defaults kompensieren Wissenslücken
      ebf_implications:
        - "AWARE-Interventionen begrenzt wirksam"
        - "Stattdessen: Default-basierte Strategien"
        - "Visuelle statt textuelle Kommunikation"

    - id: AT-HLT-BEH-07
      name: "Pain/Fear Sensitivity"
      symbol: "φ_pain"
      definition: "Angst-/Schmerzsensitivität bei med. Entscheidungen"
      value: 0.65
      range: [0.55, 0.75]
      uncertainty: "hoch"
      source: "LLMMC Prior"
      note: |
        Moderater bis hoher Wert bedeutet:
        - Vermeidung von Vorsorgeuntersuchungen
        - Aufschub bei Symptomen
        - Angst vor Diagnosen
      ebf_implications:
        - "Angstreduktion vor Information"
        - "Niedrigschwellige Angebote"
        - "Positive Framing (nicht Angst)"

