POL:
  name: "Politische Herausforderungen"
  description: "Gesundheitspolitische Themen für SPÖ Projekt 2029"

  challenges:
    - id: AT-HLT-POL-01
      name: "Zwei-Klassen-Medizin"
      urgency: "HOCH"
      description: |
        Wachsende Kluft zwischen Kassen- und Wahlärztesystem.
        2027: Mehr Wahlärzte als Kassenärzte.
        Wartezeiten für Kassenpatienten steigen.
      spo_opportunity: |
        Klassisches SPÖ-Thema (Fairness, Solidarität).
        Aber: Konkrete Lösungen nötig, nicht nur Kritik.
      ebf_angle: |
        γ^{Funktion}: Solidarsystem als "funktionierendes System"
        Frame: "Ordnung im Gesundheitssystem"
        NICHT: Klassenkampf-Rhetorik

    - id: AT-HLT-POL-02
      name: "Pflegekrise"
      urgency: "SEHR HOCH"
      description: |
        35.000 fehlende Pflegekräfte bis 2030.
        24h-Betreuung 95% migrantisch - systemische Vulnerabilität.
        Burnout und Fluktuation steigen.
      spo_opportunity: |
        Direkte Verbindung zu Arbeitnehmerrechten.
        Pflegelohn-Debatte als SPÖ-Thema.
        Aber: Migrationsdimension komplex.
      ebf_angle: |
        Integration in Two-Path Modell:
        - Pflege als γ^{Funktion} (funktionierende Systeme)
        - NICHT als γ^{Ausschluss} (Migration begrenzen)

    - id: AT-HLT-POL-03
      name: "Ärztemangel Land"
      urgency: "HOCH"
      description: |
        40% der Landärzte über 55.
        Nachbesetzung scheitert (Gehalt, Arbeitsbedingungen).
        Notaufnahmen werden überlastet.
      spo_opportunity: |
        Regionale Gerechtigkeit - SPÖ-Kernthema.
        Primärversorgungszentren als Lösung.
      ebf_angle: |
        Frame: "Ordnung in der Versorgung"
        Konkret: PVE-Ausbau mit messbaren Zielen

    - id: AT-HLT-POL-04
      name: "Prävention unterfinanziert"
      urgency: "MITTEL"
      description: |
        Nur 2.1% für Prävention (EU: 2.8%).
        Vorsorgeuntersuchung nur 12-25%.
        Present Bias dominiert.
      spo_opportunity: |
        Langfristige Investition vs. kurzfristige Kosten.
        Aber: Schwer zu verkaufen (kein sofortiger Effekt).
      ebf_angle: |
        EBF-Interventionen: Defaults, Commitment Devices
        Frame: "Heute handeln für morgen"

    - id: AT-HLT-POL-05
      name: "Mental Health Gap"
      urgency: "HOCH"
      description: |
        Psychische Erkrankungen steigen (18% → 29%).
        Wartezeit Psychiatrie/Psychotherapie Monate.
        Stigma weiterhin hoch.
      spo_opportunity: |
        Post-COVID Thema mit breiter Resonanz.
        Arbeitswelt-Bezug (Burnout).
      ebf_angle: |
        AWARE + WHO-Dimension
        Entstigmatisierung durch Social Proof
        Niedrigschwellige Angebote (Telemedizin)

    - id: AT-HLT-POL-06
      name: "Digitalisierung"
      urgency: "MITTEL"
      description: |
        ELGA 65%, E-Rezept wachsend, Telemedizin im Aufbau.
        Aber: Ältere und bildungsferne Gruppen zurückgelassen.
      spo_opportunity: |
        Digitale Inklusion als Fairness-Thema.
        Effizienzgewinne für Systemfinanzierung.
      ebf_angle: |
        ψ_M (Material/Technologie) nutzen
        Defaults für digitale Angebote
        Aber: Nicht-digitale Alternativen erhalten

# =============================================================================
# 10. FAKTENLAGE: DRITTSTAATSANGEHÖRIGE IM GESUNDHEITSSYSTEM
# =============================================================================
# Quelle: Gesundheitsministerium (BMSGPK), Sektion II, Gruppe X/A
# Datum: 26. Jänner 2026
# Anlass: Krone-Artikel "Spitals-Touristen" vom 25.01.2026
# =============================================================================
MINISTERIUM_FAKTEN:
  name: "Offizielle Daten zur Versorgung von Drittstaatsangehörigen"
  source: "BMSGPK, Sektion II, Gruppe X/A - Auswertung LGF-KA"
  date: "2026-01-26"
  context: |
    Parlamentarische Anfragen der FPÖ (z.B. Nr. 3807) zu Krankenhaus-
    behandlungen nach Staatsbürgerschaft. Krone-Artikel 25.01.2026
    behauptet "Spitals-Touristen kosten Milliarden".
  factors: 12

  # ---------------------------------------------------------------------------
  # 10.1 DIE KILLER-FAKTEN
  # ---------------------------------------------------------------------------
  killer_facts:
    - id: AT-HLT-MIN-01
      name: "Unterproportionale Nutzung"
      claim_krone: "22 Mio. Behandlungen belasten System"
      fact: |
        Gesamtleistungen 2015-2024: 800 Millionen
        Leistungen genannte Nationalitäten: 22 Millionen
        ANTEIL: 2,75%
        Bevölkerungsanteil dieser Gruppen: 4,8%
        → UNTERPROPORTIONALE NUTZUNG
      calculation:
        total_treatments_2015_2024: 800000000
        treatments_mentioned_nationalities: 22000000
        share_of_treatments: 0.0275  # 2.75%
        share_of_population: 0.048   # 4.8%
        ratio: 0.57  # Nutzen nur 57% ihres "Anteils"
      interpretation: |
        Die genannten Gruppen nutzen das Gesundheitssystem
        WENIGER als ihrem Bevölkerungsanteil entspricht.
        Sie ENTLASTEN das System relativ gesehen.
      source: "LGF-KA Auswertung, BMSGPK"
      confidence: "hoch"

    - id: AT-HLT-MIN-02
      name: "Selbstzahler (echte 'Touristen')"
      claim_krone: "Spitals-Touristen auf Steuerzahlerkosten"
      fact: |
        1,8 Millionen Leistungen als Selbstkostenträger verrechnet.
        Diese wurden PRIVAT bezahlt, nicht aus öffentlichen Mitteln.
        Echte "Gesundheitstouristen" bezahlen selbst.
      value: 1800000
      share_of_mentioned: 0.082  # 8.2% der 22 Mio.
      cost_to_taxpayer: 0  # NULL
      interpretation: |
        "Spitals-Touristen" im eigentlichen Sinn (ohne SV-Anspruch)
        bezahlen ihre Behandlung selbst. Sie belasten das System nicht.
      source: "LGF-KA Auswertung, BMSGPK"

    - id: AT-HLT-MIN-03
      name: "Plastische Chirurgie = Rekonstruktiv"
      claim_krone: "Facelifting auf Steuerzahlerkosten, 1100 Eingriffe"
      fact: |
        "Plastische Chirurgie" im Spital umfasst ÜBERWIEGEND:
        - Rekonstruktion nach Unfällen
        - Verbrennungsbehandlung
        - Tumoroperationen
        Ästhetische Eingriffe OHNE medizinische Indikation werden
        vom öffentlichen System NICHT finanziert.
      clarification: |
        Die "1100 Eingriffe bei Syrern und Afghanen" sind die SUMME
        ALLER Leistungen der Fachrichtung Plastische Chirurgie:
        - Ambulante Konsultationen
        - Diagnostische Leistungen
        - Therapeutische Leistungen
        - NUR WENIGE tatsächliche operative Eingriffe
      manipulation: |
        Krone setzt "Plastische Chirurgie" = "Schönheits-OP".
        Realität: Großteil ist medizinisch notwendige Rekonstruktion.
      source: "BMSGPK Klarstellung"

  # ---------------------------------------------------------------------------
  # 10.2 VERSICHERUNGSSTATUS
  # ---------------------------------------------------------------------------
  insurance_status:
    - id: AT-HLT-MIN-04
      name: "Kein Versicherungsstatus angegeben"
      problem: |
        Im Krone-Artikel werden KEINE Angaben gemacht zu:
        - Versicherungsstatus der Behandelten
        - Beitragszahlungen
        → Impliziert: Alle sind "Sozialschmarotzer"
      reality: |
        Großteil der behandelten Ausländer:innen ist REGULÄR VERSICHERT
        und zahlt Sozialversicherungsbeiträge.
      evidence: "Türkische Community = fast Hälfte aller Leistungen = SV-Beitragszahler"

    - id: AT-HLT-MIN-05
      name: "Türkische Community"
      treatments_share: 0.45  # ~45% aller genannten Leistungen
      population_in_austria: 300000  # ca. 300.000 Personen
      sv_contribution_estimated_eur: 1800000000  # €1.8 Mrd/Jahr
      status: |
        Gastarbeiter seit 1960er Jahren.
        2./3. Generation geboren in Österreich.
        Reguläre SV-Beitragszahler seit Jahrzehnten.
      interpretation: |
        Größte Gruppe in der Statistik sind Menschen, die seit
        60 Jahren ins System einzahlen. "Spitals-Touristen" ist
        für diese Gruppe sachlich falsch.

  # ---------------------------------------------------------------------------
  # 10.3 RECHTLICHE GRUNDLAGEN
  # ---------------------------------------------------------------------------
  legal_framework:
    - id: AT-HLT-MIN-06
      name: "Zugang zum Gesundheitssystem"
      description: |
        Gesetzlich klar geregelt:
        - Asylwerber:innen: Medizinisch NOTWENDIGE Leistungen
        - Asylberechtigte: Voller SV-Anspruch
        - Subsidiär Schutzberechtigte: Voller SV-Anspruch
        - Vertriebene (Ukraine): Voller SV-Anspruch
        Ästhetische Eingriffe OHNE Indikation: NICHT finanziert.

    - id: AT-HLT-MIN-07
      name: "Effizienz reguläres System vs. Parallelsystem"
      finding: |
        Versorgung im regulären SV-System ist DEUTLICH effizienter
        als ein Parallelsystem nur für Asylwerber.
      evidence:
        - "Studien Universität Bielefeld: Parallelsysteme teurer"
        - "Höherer Verwaltungsaufwand bei Parallelsystem"
        - "Fehlanreize: Späte statt frühe Behandlung"
      conclusion: |
        FPÖ-Forderung nach Parallelsystem würde Kosten ERHÖHEN
        und Spitäler MEHR belasten, nicht weniger.

  # ---------------------------------------------------------------------------
  # 10.4 ZUSAMMENFASSUNG FÜR KOMMUNIKATION
  # ---------------------------------------------------------------------------
  communication_summary:
    headline_fact: |
      4,8% der Bevölkerung → 2,75% der Gesundheitsleistungen
      = UNTERPROPORTIONALE Nutzung

    three_key_messages:
      - message: "Unterproportional"
        content: "Diese Gruppen nutzen das System WENIGER als ihr Bevölkerungsanteil"
        number: "2,75% vs. 4,8%"

      - message: "Selbstzahler"
        content: "1,8 Mio. Behandlungen wurden PRIVAT bezahlt"
        number: "€0 Kosten für Steuerzahler"

      - message: "Plastische Chirurgie ≠ Facelifting"
        content: "Überwiegend Unfälle, Verbrennungen, Tumore"
        number: "1100 = Konsultationen, nicht OPs"

    counter_narrative: |
      Das echte Problem im Gesundheitssystem:
      - Kassenarzt-Mangel (nicht Migration)
      - Zwei-Klassen-Medizin (nicht Asylwerber)
      - Pflegemangel (95% der 24h-Pflege ist migrantisch!)

# =============================================================================
# 12. STRATEGISCHE IMPLIKATIONEN FÜR SPÖ
# =============================================================================
strategic_implications:

  core_frame: |
    "Ordnung im Gesundheitssystem"

    Gesundheit als Teil des γ^{Funktion}-Angebots:
    E(Systeme) × X(Beitrag) = Wer beiträgt (Beiträge zahlt),
    hat Anspruch auf funktionierende Versorgung.

    NICHT: Klassenkampf-Rhetorik ("gegen die Reichen")
    SONDERN: Fairness-Frame ("gleicher Zugang für alle, die beitragen")

  top_3_opportunities:
    - dimension: "WHO + WHAT"
      opportunity: "Pflege als Fairness-Thema"
      intervention_type: "γ^{Funktion} Frame"
      description: |
        Pflege verbindet Arbeitnehmer-Rechte mit Systemfunktion.
        Konkret: Pflegelohn, Ausbildungsoffensive, bessere Arbeitsbedingungen.

    - dimension: "WHEN + AWARE"
      opportunity: "Kassenarzt-Versorgung"
      intervention_type: "Konkrete Execution"
      description: |
        Messbare Ziele: X neue Kassenärzte bis 2029.
        PVE-Ausbau mit Zeitplan.
        NICHT: Systemkritik ohne Lösung.

    - dimension: "AWARE"
      opportunity: "Mental Health Entstigmatisierung"
      intervention_type: "Social Proof + Niedrigschwelligkeit"
      description: |
        Arbeitswelt-Bezug (Burnout, Stress).
        Prominente Testimonials.
        Telemedizin für erste Kontakte.

  top_3_risks:
    - risk: "Zwei-Klassen-Rhetorik backfires"
      mitigation: |
        Vermeiden: "Die Reichen gegen uns"
        Stattdessen: "Fairness für alle, die beitragen"
        Reason: Klassenkampf aktiviert FPÖ-Frame

    - risk: "Pflege + Migration Thema vermischt"
      mitigation: |
        Pflege-Thema TRENNEN von Migrationsthema.
        Fokus auf Arbeitsbedingungen, nicht Herkunft.
        24h-Betreuung als Arbeitsmarkt-Thema.

    - risk: "Versprechen ohne Execution"
      mitigation: |
        Konkrete, messbare Ziele.
        Zeitgebundene Commitments.
        "In einem Jahr werden Sie sehen..."

  recommended_next_step: |
    1. Pflege-Rede vorbereiten (analog zu Migrations-Rede)
    2. Konkrete Zahlen sammeln (Pflegelücke, Kassenärzte)
    3. Messbare Commitments formulieren
    4. Two-Path Integration prüfen (γ^{Funktion} konsistent)

# =============================================================================
# 13. INTERNATIONALE VERGLEICHSDATEN (OECD, EU-27, OWID)
# =============================================================================
INT:
  name: "Internationale Vergleichsdaten"
  description: |
    Benchmarking des österreichischen Gesundheitssystems gegen
    OECD-Durchschnitt, EU-27 und Best Performers.
  factors: 24
  data_sources:
    - "OECD Health Statistics 2025"
    - "Eurostat Health Database"
    - "Our World in Data - Health"
    - "WHO Health for All Explorer"

  # ---------------------------------------------------------------------------
  # 11.1 OECD RANKINGS - WO STEHT ÖSTERREICH?
  # ---------------------------------------------------------------------------
  oecd_rankings:
    - id: AT-HLT-INT-01
      name: "Gesundheitsausgaben % BIP"
      indicator: "Health expenditure as % of GDP"
      value_at: 11.5
      value_oecd_avg: 9.2
      rank_in_oecd: 6  # von 38
      trend: "steigend"
      year: 2024
      source: "OECD Health Statistics 2025"
      interpretation: |
        Österreich gibt ÜBERDURCHSCHNITTLICH aus (Rang 6/38).
        Aber: Höhere Ausgaben ≠ bessere Outcomes.
        USA geben 17% aus und haben schlechtere Ergebnisse.

    - id: AT-HLT-INT-02
      name: "Lebenserwartung bei Geburt"
      indicator: "Life expectancy at birth"
      value_at: 81.8
      value_oecd_avg: 80.3
      value_eu27_avg: 80.1
      value_best: 84.3  # Japan
      rank_in_oecd: 14  # von 38
      trend: "stagnierend"  # Post-COVID Recovery
      year: 2024
      source: "OECD Health Statistics 2025"
      interpretation: |
        AT liegt 1.5 Jahre über OECD-Schnitt, aber 2.5 Jahre unter Japan.
        COVID-Einbruch noch nicht vollständig aufgeholt.
        Gap zu Schweiz (84.0) = 2.2 Jahre.

    - id: AT-HLT-INT-03
      name: "Vermeidbare Sterblichkeit"
      indicator: "Avoidable mortality per 100,000"
      value_at: 156
      value_oecd_avg: 178
      value_eu27_avg: 171
      value_best: 108  # Schweiz
      rank_in_oecd: 11  # von 38
      trend: "leicht fallend"
      year: 2023
      source: "OECD Health Statistics 2025"
      interpretation: |
        Besser als Durchschnitt, aber Schweiz zeigt: 30% weniger möglich.
        Haupttreiber AT: Herz-Kreislauf, Krebs-Früherkennung.

    - id: AT-HLT-INT-04
      name: "Ärzte pro 1.000 Einwohner"
      indicator: "Practising physicians per 1,000 population"
      value_at: 5.4
      value_oecd_avg: 3.7
      value_eu27_avg: 4.0
      rank_in_oecd: 2  # von 38
      trend: "stabil"
      year: 2024
      source: "OECD Health Statistics 2025"
      interpretation: |
        PARADOX: Österreich hat SEHR VIELE Ärzte (Rang 2!),
        aber trotzdem Ärztemangel-Wahrnehmung.
        → Problem: VERTEILUNG (Stadt vs. Land) + KASSENSITZE

    - id: AT-HLT-INT-05
      name: "Pflegepersonal pro 1.000 Einwohner"
      indicator: "Nurses per 1,000 population"
      value_at: 7.1
      value_oecd_avg: 8.8
      value_eu27_avg: 8.2
      value_best: 17.8  # Norwegen
      rank_in_oecd: 22  # von 38
      trend: "stagnierend"
      year: 2024
      source: "OECD Health Statistics 2025"
      interpretation: |
        UNTERDURCHSCHNITTLICH - hier liegt das echte Problem!
        Norwegen hat 2.5× mehr Pflegekräfte pro Kopf.
        Gap: 1.7 Pflegekräfte/1000 unter OECD-Schnitt.

    - id: AT-HLT-INT-06
      name: "Spitalsbetten pro 1.000 Einwohner"
      indicator: "Hospital beds per 1,000 population"
      value_at: 7.0
      value_oecd_avg: 4.3
      value_eu27_avg: 4.8
      rank_in_oecd: 4  # von 38
      trend: "leicht fallend"
      year: 2024
      source: "OECD Health Statistics 2025"
      interpretation: |
        SEHR HOHE Bettendichte (Rang 4).
        Aber: Indikator für Ineffizienz?
        Skandinavien + NL haben weniger Betten, bessere Outcomes.
        → Ambulantisierung nötig.

    - id: AT-HLT-INT-07
      name: "Out-of-Pocket Ausgaben % total"
      indicator: "Out-of-pocket health spending as % of total"
      value_at: 17.8
      value_oecd_avg: 18.1
      value_eu27_avg: 15.2
      value_best: 9.1  # Frankreich
      rank_in_oecd: 18  # von 38
      trend: "stabil"
      year: 2024
      source: "OECD Health Statistics 2025"
      interpretation: |
        Nahe OECD-Schnitt, aber über EU-27.
        Frankreich zeigt: Niedrigere Selbstbehalte möglich.
        AT: 18% privat → Zwei-Klassen-System-Gefahr.

    - id: AT-HLT-INT-08
      name: "Wartezeit Elektiv-OP (Tage)"
      indicator: "Waiting time for elective surgery"
      value_at: 38
      value_oecd_avg: 68
      value_eu27_avg: 72
      value_best: 21  # Niederlande
      rank_in_oecd: 8  # von 38
      trend: "stabil"
      year: 2024
      source: "OECD Health Statistics 2025"
      interpretation: |
        Österreich BESSER als Durchschnitt bei Wartezeiten.
        Aber: Große Variation nach Region und Krankenhaus.
        Privatpatienten deutlich schneller.

  # ---------------------------------------------------------------------------
  # 11.2 EU-27 BENCHMARKS
  # ---------------------------------------------------------------------------
  eu27_benchmarks:
    - id: AT-HLT-INT-09
      name: "Gesunde Lebensjahre (HLY)"
      indicator: "Healthy life years at 65"
      value_at: 10.2
      value_eu27_avg: 10.0
      value_best: 15.1  # Schweden
      year: 2023
      source: "Eurostat"
      gap_to_best: -4.9
      interpretation: |
        Nahe EU-Schnitt, aber Schweden zeigt: 50% mehr möglich.
        HLY = Lebensqualität, nicht nur Lebensdauer.
        Hebel: Prävention, Rehabilitation.

    - id: AT-HLT-INT-10
      name: "Unmet Medical Needs (%)"
      indicator: "Self-reported unmet needs for medical examination"
      value_at: 0.8
      value_eu27_avg: 2.2
      value_worst: 8.4  # Rumänien
      year: 2023
      source: "Eurostat EU-SILC"
      interpretation: |
        SEHR GUT - nur 0.8% berichten unerfüllte Bedürfnisse.
        Aber: Selbstbericht ≠ objektive Versorgungslücken.
        Wahlärzte-Problematik nicht erfasst.

    - id: AT-HLT-INT-11
      name: "Antibiotikaverbrauch (DDD/1000)"
      indicator: "Antibiotic consumption in community"
      value_at: 11.2
      value_eu27_avg: 16.8
      value_best: 8.5  # Niederlande
      year: 2023
      source: "ECDC"
      interpretation: |
        UNTERDURCHSCHNITTLICH = GUT (weniger Resistenzen).
        AT verordnet konservativer als EU-Schnitt.

    - id: AT-HLT-INT-12
      name: "COVID-Impfquote (%)"
      indicator: "COVID-19 vaccination rate (fully vaccinated)"
      value_at: 68.8
      value_eu27_avg: 72.1
      value_best: 86.5  # Portugal
      year: 2024
      source: "ECDC"
      interpretation: |
        UNTER EU-Schnitt - Impfskepsis-Problem.
        AT hatte Impfpflicht-Debatte → Vertrauensschaden?
        κ_default wirkte nicht (opt-in blieb).

    - id: AT-HLT-INT-13
      name: "E-Health Adoption Index"
      indicator: "Digital Health Adoption Score"
      value_at: 58
      value_eu27_avg: 52
      value_best: 79  # Dänemark
      year: 2024
      source: "European Commission DESI"
      interpretation: |
        Über EU-Schnitt (ELGA hilft), aber weit von Dänemark.
        Gap: 21 Punkte zu Best-in-Class.

  # ---------------------------------------------------------------------------
  # 11.3 OUR WORLD IN DATA - LANGFRISTTRENDS
  # ---------------------------------------------------------------------------
  owid_trends:
    - id: AT-HLT-INT-14
      name: "Lebenserwartung 1950-2024"
      indicator: "Life expectancy at birth, historical"
      values:
        "1950": 66.1
        "1980": 73.0
        "2000": 78.2
        "2010": 80.5
        "2020": 81.4  # Pre-COVID
        "2021": 80.7  # COVID Impact
        "2024": 81.8  # Recovery
      source: "Our World in Data / UN WPP"
      interpretation: |
        +15.7 Jahre seit 1950 = 0.21 Jahre pro Jahr.
        COVID-Knick (-0.7 Jahre) fast aufgeholt.
        Aber: Verlangsamung der Gewinne seit 2010.

    - id: AT-HLT-INT-15
      name: "Kindersterblichkeit (pro 1000)"
      indicator: "Infant mortality rate"
      values:
        "1950": 65.0
        "1980": 14.3
        "2000": 4.8
        "2010": 3.9
        "2024": 2.9
      value_eu27_avg: 3.2
      value_best: 1.6  # Finnland
      source: "Our World in Data / World Bank"
      interpretation: |
        Dramatische Verbesserung (95% Reduktion seit 1950).
        Aber: Finnland zeigt - 45% weniger noch möglich.

    - id: AT-HLT-INT-16
      name: "Cardiovascular Death Rate"
      indicator: "Death rate from cardiovascular diseases (age-standardized)"
      value_at: 187
      value_eu27_avg: 215
      value_best: 118  # Frankreich
      trend: "fallend"
      year: 2023
      source: "Our World in Data / IHME GBD"
      interpretation: |
        Besser als EU-Schnitt, aber Frankreich zeigt:
        37% weniger Herz-Kreislauf-Tote möglich.
        Mediterranean Diet + Prävention.

    - id: AT-HLT-INT-17
      name: "Diabetes Prävalenz (%)"
      indicator: "Share of population with diabetes"
      value_at: 6.8
      value_eu27_avg: 6.2
      value_oecd_avg: 7.0
      trend: "steigend"
      year: 2024
      source: "Our World in Data / IDF Atlas"
      interpretation: |
        Nahe Durchschnitt, aber STEIGEND.
        Korreliert mit Übergewicht (18% Adipositas).
        Präventionspotenzial enorm.

    - id: AT-HLT-INT-18
      name: "Mental Health Burden (DALYs)"
      indicator: "Disability-adjusted life years from mental disorders"
      value_at: 2847  # per 100,000
      value_eu27_avg: 2612
      trend: "steigend"
      year: 2023
      source: "Our World in Data / IHME GBD"
      interpretation: |
        ÜBERDURCHSCHNITTLICH (9% mehr als EU).
        Mental Health = unterschätzter Faktor.
        Arbeitsunfähigkeit, Frühpensionierung.

  # ---------------------------------------------------------------------------
  # 11.4 GAP-ANALYSE: WO LIEGT ÖSTERREICH ZURÜCK?
  # ---------------------------------------------------------------------------
  gap_analysis:
    methodology: |
      Vergleich mit Best-in-Class (meist: Schweiz, Skandinavien, Niederlande)
      und Berechnung des theoretischen Verbesserungspotenzials.

    major_gaps:
      - id: AT-HLT-INT-19
        name: "Pflege-Gap"
        at_value: 7.1  # Nurses per 1000
        best_value: 17.8  # Norwegen
        gap_percent: -60
        actionable: true
        intervention: |
          +76,000 Pflegekräfte nötig um OECD-Schnitt zu erreichen.
          +190,000 um Norwegen-Level zu erreichen.
          Aber: Arbeitsmarkt-Realität begrenzt.

      - id: AT-HLT-INT-20
        name: "Prävention-Gap"
        at_value: 2.1  # % of health spending
        best_value: 6.2  # Kanada
        gap_percent: -66
        actionable: true
        intervention: |
          Verdreifachung der Präventionsausgaben möglich.
          Von 2.1% auf 6% = +3.4 Mrd EUR/Jahr.
          ROI: Langfristig > 3:1 (Krankheitskosten vermieden).

      - id: AT-HLT-INT-21
        name: "Health Literacy Gap"
        at_value: 48  # % adequate
        best_value: 71  # Niederlande
        gap_percent: -32
        actionable: true
        intervention: |
          +23 Prozentpunkte = 2 Millionen Österreicher.
          Schulprogramme, Patienteninformation, Digital Health.
          AWARE-Dimension im EBF.

      - id: AT-HLT-INT-22
        name: "Digital Health Gap"
        at_value: 58  # DESI Score
        best_value: 79  # Dänemark
        gap_percent: -27
        actionable: true
        intervention: |
          ELGA-Ausbau, Telemedizin, E-Rezept.
          Dänemark: 15 Jahre Vorsprung.
          Investition: ~500 Mio EUR über 5 Jahre.

    strengths_vs_peers:
      - id: AT-HLT-INT-23
        name: "Ärztedichte"
        at_rank: 2  # OECD
        interpretation: |
          STÄRKE: Viele Ärzte (5.4/1000).
          Aber: Fehlallokation (Stadt vs. Land, Wahl vs. Kasse).

      - id: AT-HLT-INT-24
        name: "Universelle Deckung"
        at_coverage: 99.9
        interpretation: |
          STÄRKE: Praktisch alle versichert.
          Sozialversicherungssystem funktioniert.
          Aber: Qualität variiert (Zusatzversicherung hilft).

  # ---------------------------------------------------------------------------
  # 11.5 STRATEGISCHE IMPLIKATIONEN AUS BENCHMARKING
  # ---------------------------------------------------------------------------
  benchmark_implications:
    for_spo:
      - insight: "Pflege ist DER Gap"
        description: |
          Österreich hat genug Ärzte (Rang 2), aber zu wenig Pflege (Rang 22).
          SPÖ-Narrativ: "Ärzte haben wir, Pflege fehlt"
          Konkret: Ausbildungsoffensive, bessere Arbeitsbedingungen.

      - insight: "Viel Geld, mäßige Outcomes"
        description: |
          AT gibt überdurchschnittlich aus (11.5% vs 9.2%), aber
          Lebenserwartung nur Rang 14, vermeidbare Sterblichkeit Rang 11.
          → Effizienz-Thema, nicht Geld-Thema.
          SPÖ: "Besser ausgeben, nicht mehr ausgeben"

      - insight: "Prävention unterfinanziert"
        description: |
          Nur 2.1% für Prävention (Best: 6.2%).
          Langfristig höchster ROI.
          Aber: Politisch schwer verkaufbar (kein sofortiger Effekt).

      - insight: "Skandinavisches Modell als Benchmark"
        description: |
          Schweden, Norwegen, Dänemark zeigen:
          - Weniger Betten, mehr ambulant
          - Mehr Pflege, mehr Prävention
          - Bessere Digital Health
          SPÖ: "Lernen von Skandinavien" (positiver Frame)

    data_quality_notes:
      - note: "OECD-Daten sind 1-2 Jahre verzögert"
        implication: "Aktuelle Werte geschätzt basierend auf Trends"
      - note: "Definitionen variieren leicht zwischen Ländern"
        implication: "Rankings mit ±2 Plätze Unsicherheit"
      - note: "COVID-Effekte noch nicht vollständig bereinigt"
        implication: "2020-2022 Daten mit Vorsicht interpretieren"

