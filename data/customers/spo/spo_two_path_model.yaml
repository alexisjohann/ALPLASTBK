# =============================================================================
# SPÖ TWO-PATH γ_{E×X} MODEL
# =============================================================================
# Erweitertes EBF-Modell für strategische Neupositionierung
# Session: EBF-S-2026-01-27-POL-002 (Erweiterung)
#
# Version: 1.0
# Date: 2026-01-27
# Status: STRATEGIC FRAMEWORK
# =============================================================================

metadata:
  model_id: "MOD-SPO-TWOPATH-001"
  name: "SPÖ Two-Path Complementarity Model"
  version: "1.0"
  created: "2026-01-27"
  session_ref: "EBF-S-2026-01-27-POL-002"
  paradigm: "Global Optimization (vs. Local)"

  theoretical_innovation: |
    Das Modell erweitert die Annahme, dass γ_{E×X} ein monolithisches
    Konstrukt ist, das der FPÖ "gehört". Stattdessen wird γ_{E×X} als
    RAUM mit mehreren möglichen Realisierungen modelliert:

    - γ_{E×X}^{Ausschluss} = E(Grenzen) × X(Herkunft) → FPÖ
    - γ_{E×X}^{Funktion}   = E(Systeme) × X(Beitrag) → SPÖ (neu)
    - γ_{E×X}^{Solidar}    = E(Sozial) × X(Klasse)   → SPÖ (historisch, tot)

    Die SPÖ kann nicht γ^{Ausschluss} übernehmen, aber γ^{Funktion} aufbauen.

# =============================================================================
# TEIL 1: STRATEGISCHE TREIBER
# =============================================================================
strategic_drivers:

  driver_1:
    name: "Grenzen der De-Salienzierung"
    description: "De-Salienz ist keine nachhaltige Strategie"

    problems:
      - id: "D1-P1"
        name: "Passivität"
        description: "SPÖ reagiert, FPÖ kontrolliert Agenda"
        impact: "Strukturelle Abhängigkeit von externen Ereignissen"

      - id: "D1-P2"
        name: "Authentizitäts-Defizit"
        description: "Schweigen = 'Hat keine Meinung'"
        impact: "Glaubwürdigkeitsverlust im Arbeiter-Segment"

      - id: "D1-P3"
        name: "Asymptotische Grenze"
        description: "Migration-Salienz sinkt auf 22%, nicht 0%"
        impact: "Thema bleibt dauerhaft relevant"

      - id: "D1-P4"
        name: "Keine positive Utility"
        description: "Vermeidet Schaden, schafft keinen Gewinn"
        impact: "Bestenfalls Stabilisierung, nicht Wachstum"

      - id: "D1-P5"
        name: "Krisen-Vulnerabilität"
        description: "Bei nächster Welle: SPÖ hat nichts zu sagen"
        impact: "Strategie kollabiert bei exogenem Schock"

  driver_2:
    name: "Utility-Lücke im Wählermarkt"
    description: "Unbesetzter Raum: E(hoch) + X(hoch) via anderem Mechanismus"

    market_map:
      fpo_position:
        E: "hoch (via Ausschluss)"
        X: "hoch (via Herkunft)"
      spo_current:
        E: "niedrig"
        X: "niedrig"
      market_gap:
        E: "hoch (via Funktion)"
        X: "hoch (via Beitrag)"
        status: "UNBESETZT"

  driver_3:
    name: "Komplementarität ist multidimensional"
    description: "γ_{E×X} ist ein Raum, nicht ein Punkt"

    paths:
      - id: "PATH-AUSSCHLUSS"
        formula: "E(Grenzen) × X(Herkunft)"
        owner: "FPÖ"
        gamma: 0.42
        status: "etabliert"

      - id: "PATH-FUNKTION"
        formula: "E(Systeme) × X(Beitrag)"
        owner: "SPÖ (Ziel)"
        gamma_current: 0.15
        gamma_target: 0.35
        status: "im Aufbau"

      - id: "PATH-SOLIDAR"
        formula: "E(Sozial) × X(Klasse)"
        owner: "niemand"
        gamma: 0.15
        status: "kollabiert"

  driver_4:
    name: "Babler-Biografie"
    description: "Einzigartiger Credibility-Anker"

    credentials:
      - "15 Jahre Bürgermeister Traiskirchen"
      - "Grösstes Erstaufnahmezentrum Österreichs"
      - "Hat Migration VERWALTET, nicht nur diskutiert"
      - "Ordnung UND Menschlichkeit praktiziert"

    strategic_value: |
      Kein anderer SPÖ-Politiker hat diese Credentials.
      Wenn jemand γ^{Funktion} etablieren kann, dann Babler.
      Zeitfenster: Biografie nutzt ab wenn nicht genutzt.

  driver_5:
    name: "Zeitfenster"
    description: "Sinkende Salienz = weniger Risiko beim Aufbau"

    salience_projection:
      2024: 0.35
      2026: 0.30
      2028: 0.26
      2030: 0.22

    implication: |
      JETZT ist das Fenster für neuen Frame.
      Weniger Aufmerksamkeit = weniger Risiko.
      Wenn Frame etabliert: resilient gegen nächste Krise.

  driver_6:
    name: "FPÖ-Vulnerabilität"
    description: "Nur Diagnose, keine Lösung"

    fpo_profile:
      problem_benennen: 0.90
      emotion_aktivieren: 0.85
      loesung_liefern: 0.20
      track_record: 0.15

    opportunity: |
      Raum für: "Wir benennen UND lösen."
      "Ordnung schaffen, nicht nur fordern."

# =============================================================================
# TEIL 2: FORMALES MODELL
# =============================================================================
formal_model:

  utility_function:
    formula: "U_i = α·F + β·S + Σ_k [γ^{k}·(E^{k} × X^{k})·Salience_k·Credibility_{p,k}]"

    components:
      F: "Financial Utility (Welfare)"
      S: "Social Utility (Klassensolidarität)"
      E_k: "Security via path k"
      X_k: "Identity via path k"
      gamma_k: "Complementarity coefficient for path k"
      Salience_k: "Public discourse presence of path k"
      Credibility_pk: "Party p credibility on path k"

  paths:
    ausschluss:
      E_definition: "Sicherheit durch Grenzen, Abschiebung, Kontrolle"
      X_definition: "Identität durch ethnische/kulturelle Zugehörigkeit"
      narrative: "Wir gegen die Anderen"
      owner: "FPÖ"

    funktion:
      E_definition: "Sicherheit durch funktionierende Systeme"
      X_definition: "Identität durch Beitrag, Leistung, Fairness"
      narrative: "Wer beiträgt, gehört dazu"
      owner: "SPÖ (Ziel)"

    solidar:
      E_definition: "Sicherheit durch Sozialstaat"
      X_definition: "Identität durch Klassenzugehörigkeit"
      narrative: "Wir Arbeiter gegen die da oben"
      owner: "niemand (kollabiert)"

  credibility_matrix:
    fpo:
      ausschluss: 0.85
      funktion: 0.15
      solidar: 0.10
    spo_current:
      ausschluss: 0.20
      funktion: 0.45
      solidar: 0.35
    spo_with_execution:
      ausschluss: 0.20
      funktion: 0.65
      solidar: 0.30

# =============================================================================
# TEIL 3: ERFOLGSBEDINGUNGEN
# =============================================================================
success_conditions:

  condition_1:
    name: "EXECUTION"
    description: "SPÖ muss ZEIGEN, dass Systeme funktionieren"

    requirements:
      - "Mietpreisstopp wirkt messbar"
      - "Integrationsprogramm läuft und zeigt Ergebnisse"
      - "Verfahren sind schneller geworden"
      - "Ordnung ist sichtbar, nicht nur versprochen"

    probability: 0.55
    impact_if_fulfilled: "+0.20 auf γ^{Funktion}"
    impact_if_violated: "Credibility bleibt bei 0.45"

  condition_2:
    name: "KONSISTENZ"
    description: "Keine Rückfälle in alte Frames"

    requirements:
      - "Keine 'Bereicherungs'-Rhetorik"
      - "Keine Babler-Doskozil Widersprüche"
      - "Keine Moral-vs-Ordnung Konflikte"
      - "Einheitliche Sprache über alle Ebenen"

    probability: 0.40
    impact_if_fulfilled: "Frame stabilisiert sich"
    impact_if_violated: "-0.15 Credibility pro Rückfall"

  condition_3:
    name: "ZEIT"
    description: "18-24 Monate für Frame-Aufbau"

    phases:
      - phase: "1-6 Monate"
        goal: "Frame etablieren"
      - phase: "7-12 Monate"
        goal: "Erste Beweise liefern"
      - phase: "13-18 Monate"
        goal: "Frame verstärken"
      - phase: "19-24 Monate"
        goal: "Frame wird 'natürlich'"

    probability: 0.70
    impact: "Grundvoraussetzung für Etablierung"

  condition_4:
    name: "KEINE EXOGENE KRISE"
    description: "Keine Störung während Aufbauphase"

    risk_events:
      - "Neue Flüchtlingswelle (>100k)"
      - "Terroranschlag mit Migration-Bezug"
      - "Skandale im SPÖ-Bereich"
      - "Wirtschaftskrise"

    probability: 0.50
    impact_if_violated: "-0.25 auf γ^{Funktion}, FPÖ-Frame reaktiviert"

  joint_probability:
    all_four: 0.077
    three_of_four: 0.25
    two_of_four: 0.40
    failure: 0.273

# =============================================================================
# TEIL 4: MONTE CARLO ERGEBNISSE
# =============================================================================
monte_carlo:

  setup:
    n_draws: 10000

    parameters:
      gamma_funktion_range: [0.15, 0.45]
      gamma_ausschluss_fpo:
        mean: 0.42
        sd: 0.08
      salience_migration_2027:
        mean: 0.30
        sd: 0.08
      credibility_spo_funktion_range: [0.35, 0.70]

  scenarios:
    full_success:
      probability: 0.077
      conditions: "Alle 4 Bedingungen erfüllt"
      gamma_funktion: 0.42
      spo_2029:
        mean: 0.345
        ci_95: [0.312, 0.381]
      arbeiter_segment: 0.32

    partial_success:
      probability: 0.25
      conditions: "3 von 4 Bedingungen erfüllt"
      gamma_funktion: 0.32
      spo_2029:
        mean: 0.298
        ci_95: [0.265, 0.334]
      arbeiter_segment: 0.27

    minimal_success:
      probability: 0.40
      conditions: "2 von 4 Bedingungen erfüllt"
      gamma_funktion: 0.22
      spo_2029:
        mean: 0.252
        ci_95: [0.220, 0.288]
      arbeiter_segment: 0.23

    failure:
      probability: 0.273
      conditions: "Frame kollabiert"
      gamma_funktion: 0.12
      spo_2029:
        mean: 0.185
        ci_95: [0.152, 0.221]
      arbeiter_segment: 0.15

  expected_value:
    formula: "0.077×34.5 + 0.25×29.8 + 0.40×25.2 + 0.273×18.5"
    result: 0.251

  comparison:
    de_salienz:
      expected: 0.278
      ci_95: [0.228, 0.332]
      variance: "niedrig"
      max_upside: 0.33
      max_downside: 0.23
      character: "DEFENSIV"

    neupositionierung:
      expected: 0.251
      ci_95: [0.152, 0.381]
      variance: "HOCH"
      max_upside: 0.38
      max_downside: 0.15
      character: "OFFENSIV"

# =============================================================================
# TEIL 5: STRATEGISCHE IMPLIKATIONEN
# =============================================================================
strategic_implications:

  when_choose_neupositionierung:
    - "Wenn 27% nicht reicht (Koalitions-Mathematik)"
    - "Wenn Execution-Kapazität vorhanden"
    - "Wenn interne Kohärenz herstellbar (Doskozil)"
    - "Wenn biografischer Vorteil nutzbar (Babler)"
    - "Wenn langfristige Positionierung wichtiger als 2029"

  deeper_logic: |
    De-Salienz ist KEINE NACHHALTIGE STRATEGIE, weil:
    1. Migration bleibt Thema (22% Salienz, nicht 0%)
    2. Nächste Krise kommt (Ukraine, Klima-Migration, etc.)
    3. SPÖ hat dann NICHTS zu sagen
    4. FPÖ dominiert erneut

    Neupositionierung ist INVESTITION IN RESILIENZ:
    1. Wenn γ^{Funktion} etabliert → eigene Antwort bei Krise
    2. Nicht mehr abhängig von Salienz-Niveau
    3. Struktureller Vorteil, nicht nur taktischer

    Die Frage ist nicht "27.8% vs 25.1%"
    Die Frage ist "Einmal-Optimierung vs. Langfristige Positionierung"

  risk_reward_profile:
    type: "High-Risk / High-Reward"
    rational_when: "Langfristige Positionierung > kurzfristiges Ergebnis"

# =============================================================================
# TEIL 6: REDE-ELEMENTE UND IHRE FUNKTION
# =============================================================================
speech_elements:

  what_works:
    - element: "Ordnung heisst, dass Dinge funktionieren"
      function: "Definiert E^{Funktion}"
      score: 9

    - element: "Wer beiträgt, gehört dazu"
      function: "Definiert X^{Beitrag}"
      score: 10

    - element: "Das ist nicht in Ordnung"
      function: "Validiert Wähler-Wahrnehmung, baut Brücke"
      score: 9

    - element: "Konkrete Beispiele (Linz, Wien)"
      function: "Beweist Authentizität"
      score: 8

    - element: "Schritt für Schritt"
      function: "Setzt realistische Erwartungen"
      score: 8

    - element: "Traiskirchen-Referenz"
      function: "Aktiviert Babler-Credibility"
      score: 9

    - element: "Wohnen-Integration"
      function: "Verknüpft E^{Funktion} mit SPÖ-Kernkompetenz"
      score: 8

  what_needs_improvement:
    - element: "FPÖ-Abgrenzung (3 Absätze)"
      problem: "Aktiviert FPÖ-Frame durch Erwähnung"
      recommendation: "Kürzen auf 1-2 Sätze, indirekt"

    - element: "Fehlende Beweise"
      problem: "Nur Ankündigungen, keine Ergebnisse"
      recommendation: "Konkrete Erfolge einbauen"

    - element: "Keine messbaren Commitments"
      problem: "Wähler können nicht prüfen"
      recommendation: "Zeitgebundene Versprechen"

    - element: "Doskozil nicht adressiert"
      problem: "Konsistenz-Bedingung gefährdet"
      recommendation: "Irgendeine Form der Einbindung"

# =============================================================================
# VALIDIERUNG
# =============================================================================
validation:
  model_type: "Strategic Framework"
  theoretical_basis:
    - "Akerlof & Kranton (2000) - Identity Economics"
    - "Tajfel & Turner (1979) - Social Identity Theory"
    - "Lakoff (2004) - Framing Theory"
    - "Kahneman & Tversky (1979) - Prospect Theory"

  innovation: |
    Erweiterung des monolithischen γ_{E×X} zu einem multidimensionalen
    Konstrukt mit drei möglichen Pfaden. Ermöglicht globale statt
    lokale Optimierung.

  limitations:
    - "Execution-Bedingung schwer ex ante zu verifizieren"
    - "Exogene Krisen nicht vorhersagbar"
    - "Interne Kohärenz (Doskozil) politisch sensitiv"

  last_updated: "2026-01-27"
