  # --------------------------------------------------------------------------
  # F) EMPFOHLENE GESAMTSTRATEGIE
  # --------------------------------------------------------------------------

  gesamtstrategie_gegen_angriffe:

    grundprinzip: |
      NICHT ALLES BEANTWORTEN!
      Unterscheide:
      - Sachkritik → Antworten
      - Persönliche Angriffe → Ignorieren oder kurz parieren
      - Desinformation → Faktencheck verbreiten
      - Rechtswidrige Beleidigung → Klagen (wie bei "Zecke")

    nach_angriffstyp:

      bodyshaming:
        reaktion: "IGNORIEREN"
        ausnahme: "Nur bei direkter Konfrontation kurz parieren"
        beispiel: "Meine Zähne sind kein Regierungsprogramm."

      politische_beleidigungen:
        reaktion: "RECHTLICH VERFOLGEN wenn möglich"
        beispiel: "'Zecke'-Urteil zeigt: Hetze hat Konsequenzen"

      bildungsangriffe:
        reaktion: "OFFENSIV NUTZEN"
        beispiel: |
          "Ich bin ohne Matura Vizekanzler geworden.
          Das zeigt: Jeder kann es schaffen."

      falschinformation:
        reaktion: "FAKTENCHECK VERBREITEN"
        beispiel: "APA hat es geprüft. Es ist erfunden."

      memes_spott:
        reaktion: "HUMOR ZEIGEN oder IGNORIEREN"
        beispiel: "Selbstironie entwaffnet - aber nur dosiert!"
