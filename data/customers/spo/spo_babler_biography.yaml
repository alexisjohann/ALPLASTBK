      quelle: "Telegram-Gruppe (bekannt für Falschinformationen)"
      beispiel: |
        Vizekanzler Babler angebliches Zitat:
        "Österreicher sind faul und schuld am Budgetloch"
      faktencheck:
        status: "KOMPLETT ERFUNDEN"
        bewertet_von: "APA Faktencheck"
        url: "https://apa.at/faktencheck/falschzitat-von-vizekanzler-andreas-babler-im-umlauf/"
      mechanismus: |
        Telegram-Gruppe erstellt Fake-Quote mit Babler-Bild.
        Wird auf Facebook/WhatsApp geteilt.
        Erreicht Hunderttausende bevor Faktencheck erscheint.

    wikipedia_falschinformation:
      kontext: "Jahrelang als 'gelernter Maschinenschlosser' geführt"
      aufgedeckt: "Die Presse, Juni 2023"
      details: "Siehe oben unter 'herkunft_der_falschmeldung'"

  # --------------------------------------------------------------------------
  # E) MEMES & SPOTT
  # --------------------------------------------------------------------------

  memes_spott:

    excel_chaos_2023:
      kontext: "Auszählungsfehler bei SPÖ-Vorsitzwahl"
      datum: "Juni 2023"
      art: "Virale Memes über Excel-Inkompetenz der SPÖ"
      beispiele:
        - "Babler gleich Jesus - Nach 3 Tagen ein komplett wildes Comeback hinlegen"
        - "Tagespresse musste Satire einstellen - Realität nicht mehr überbietbar"
