  bildungsnarrativ:
    realitaet: |
      Babler hat KEINEN klassischen Bildungsweg.
      Dreimal abgebrochen (AHS, HTL, Lehre).
      Schichtarbeiter, dann Gemeindebediensteter.
      MSc über Universitätslehrgang (nicht traditionelles Studium).
    staerke: |
      Das ist NOCH authentischer als "Aufstieg durch Bildung".
      Er ist wirklich "einer von euch" - kein Akademiker-Werdegang.
      Kann nicht als "abgehobener Intellektueller" framen.
    vorsicht: |
      MSc-Titel wurde medial hinterfragt (Exxpress, etc.).
      Bei Bedarf: "Berufsbegleitend, neben der Arbeit, ohne Matura -
      das zeigt, dass ich weiss, wie hart Bildung neben Arbeit ist."

