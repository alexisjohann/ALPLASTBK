    eltern_noch_am_leben: "UNBEKANNT - keine öffentlichen Informationen"
    wohnsituation_kindheit: "Semperit-Bauten (Arbeiterwohnungen), Möllersdorf"
    sogenannte_bettgeher_wohnung: true  # Babler erwähnt das selbst
    praegend: |
      Die Schließung von Semperit in den 90ern/2000ern.
      "In den 90er-Jahren haben wir hautnah erlebt, was passiert,
      wenn Konzerne in ihrem Profit- und Auslagerungswahn
      Jobs in Österreich einstampfen."
    kontext: |
      Arbeiterkind ohne Akademiker-Eltern.
      Kein Geld für langen Bildungsweg.
      "Arbeiten gehen" war die Realität, nicht Luxus-Bildung.

  education:
    # WICHTIG: Kein traditioneller Bildungsweg!
    # KORREKTUR nach Babler-Interview Ö3 "Frühstück bei mir" Juli 2024

    - type: "Gymnasium Baden"
      period: "bis 1983"
      status: "5. Klasse negativ abgeschlossen"
      babler_originalton: |
        "Ich habe keine Matura, sondern die fünfte Klasse negativ
        abgeschlossen. Ich habe nicht wiederholt, sondern bin direkt
        arbeiten gegangen. Abgebrochen habe ich die Schule aber nicht,
        also dass ich in der dritten oder vierten Klasse einfach
        aufgehört hätte."

    - type: "HTL Mödling (Maschinenbau)"
      period: "1983-1987"
      status: "fertig gemacht, NICHT maturiert"
      babler_originalton: |
        "Die HTL habe ich fertig gemacht sogar, aber nicht maturiert."
      wichtig: "Er hat die Schule BEENDET, nur ohne Abschluss!"

    - type: "Lehre Betriebsschlosser"
      status: "UMSTRITTEN - möglicherweise nie begonnen"
      babler_originalton: |
        "Eine Maschinenschlosser-Lehre habe ich ebenso wenig abgebrochen,
        weil ich auch eine solche nie gemacht habe."
      mediale_kontroverse: |
        Widersprüchliche Berichte:
        - Einige Quellen sagen "Lehre abgebrochen"
        - Babler selbst sagt "nie begonnen"
        - Unklar, ob kurz begonnen und sofort beendet

      herkunft_der_falschmeldung: |
        ⚠️ RECHERCHE: Woher kam "gelernter Maschinenschlosser"?

        CHRONOLOGIE:
        1. Wikipedia und Austria-Forum führten Babler JAHRELANG als
           "gelernter Maschinenschlosser" - ohne klare Quelle.

        2. Babler selbst hat das NIE in seinem offiziellen CV behauptet.
           Dort stand: Betriebsrat, Gemeindebediensteter, Bürgermeister.

        3. Juni 2023: Die Presse deckt die Diskrepanz auf als sie
           Bablers Biografie nach der Parteivorsitzwahl überprüfen.

        4. Bablers Sprecherin stellt klar:
           "Er ist kein gelernter Maschinenschlosser, hat allerdings
           in einer Fabrik als Schlosser gearbeitet."

        VERMUTLICHE URSACHE:
        • Verwechslung "arbeitete als Schlosser" ↔ "gelernter Schlosser"
        • Wikipedia-Eintrag wurde von Medien ungeprüft übernommen
        • Arbeiterbiografie wurde möglicherweise "aufgerundet"

        WER HAT ES ZUERST GESCHRIEBEN?
        → UNKLAR - Wikipedia-Historie nicht eindeutig
        → Babler selbst war es NICHT (laut offiziellem CV)

        LEHRE FÜR KOMMUNIKATION:
        Nicht defensiv werden! Offensive Antwort:
        "Ich habe ALS Schlosser gearbeitet. Ich habe nicht behauptet,
        dass ich eine Lehre abgeschlossen habe. Ich war Arbeiter -
        das sollte reichen, um zu verstehen, wie es ist, mit den
        Händen zu arbeiten."

    warum_keine_matura:
      explizite_gruende: |
        ⚠️ BABLER HAT NIE ÖFFENTLICH DETAILLIERT ERKLÄRT, WARUM.

        Was wir WISSEN:
        • 5. Klasse negativ → nicht wiederholt → direkt arbeiten
        • "Ich bin direkt arbeiten gegangen"
        • Kein "Abbruch" im klassischen Sinn (hat Schule beendet)

        Was wir VERMUTEN können (Kontext):
        • Arbeiterfamilie - Vater Semperit-Arbeiter
        • Kein finanzieller Spielraum für Wiederholung
        • "Arbeiten gehen" war in diesem Milieu normal
        • Semperit-Krise prägte die Region - Jobs wichtiger als Zeugnisse

      kommunikations_strategie: |
        WENN NACH GRÜNDEN GEFRAGT:

        OPTION A (Ehrlich-direkt):
        "Ich habe die fünfte Klasse nicht geschafft und bin arbeiten
        gegangen. Das war damals so. Viele meiner Freunde haben das
        genauso gemacht."

        OPTION B (Politisch-positiv):
        "Ich wollte mein eigenes Geld verdienen. Ich wollte nicht von
        meinen Eltern abhängig sein. Das war meine Entscheidung."

        OPTION C (Arbeiter-Narrativ):
        "In meiner Familie ging man arbeiten, wenn man konnte. Das war
        keine Frage. Bildung war ein Privileg, das wir uns nicht
        leisten konnten."

        ⚠️ NICHT EMPFOHLEN:
        • Ausreden ("Das System war schuld")
        • Übertreiben ("Ich musste die Familie ernähren")
        • Defensiv sein ("Das war ein Fehler")

        ✅ EMPFOHLEN:
        • Ehrlich sein ohne Schuldzuweisung
        • Als Stärke framen ("Ich kenne echte Arbeit")
        • Nicht rechtfertigen, sondern akzeptieren

    - type: "Universitätslehrgang (KEIN ordentliches Studium!)"
      field: "Politische Kommunikation"
      institution: "Donau-Universität Krems"
      period: "2007-2009"
      abschluss: "Master of Advanced Studies (MAS)"
      offiziell_gefuehrt_als: "MSc"  # So führt er den Titel
      thesis: "Medien, Strategien und Kommunikation in Arbeitskämpfen am Beispiel der Semperit Traiskirchen"
      wichtige_unterscheidung: |
        ⚠️ ACHTUNG: Das ist KEIN "Master of Science" im traditionellen Sinn!

        UNTERSCHIED:
        • Traditioneller MSc = Nach Bachelor, ordentliches Studium, Matura erforderlich
        • Bablers "MSc" = Universitätslehrgang, 4 Semester, KEINE Matura nötig

        Die Donau-Uni Krems vergibt bei Lehrgängen den Titel "MSc" -
        dieser ist formal nicht vom "echten" MSc unterscheidbar,
        aber akademisch NICHT gleichwertig.

        Babler wurde aufgenommen über "vergleichbare Qualifikation"
        (seine Erfahrung als Stadtrat), NICHT über Matura.

      warum_nicht_magister: |
        ⚠️ WARUM NICHT "HERR MAGISTER"?

        RECHTLICHE UNTERSCHEIDUNG (Österreich):
        • "Magister" (Mag.) = Akademischer GRAD von ordentlichem Studium
        • "MSc" von Universitätslehrgang = Akademische BEZEICHNUNG (kein Grad!)

        Babler hat:
        ✗ KEINEN akademischen Grad (Mag., Dr., etc.)
        ✓ Eine akademische Bezeichnung ("MSc" von Weiterbildungslehrgang)

        Daher:
        • FALSCH: "Herr Magister Babler" (hat keinen Magister-Abschluss)
        • RICHTIG: "Andreas Babler, MSc" (so führt er es selbst)
        • ALTERNATIV: Einfach "Herr Vizekanzler" oder "Herr Babler"

        WICHTIG FÜR KOMMUNIKATION:
        Wenn Gegner den MSc-Titel hinterfragen, nicht defensiv werden.
        Stattdessen: "Ich bin stolz darauf, dass ich es ohne Matura,
        neben der Schichtarbeit, geschafft habe."
      mediale_kontroverse: |
        - Exxpress titelte: "Ohne Matura zum Master"
        - Kritik: Titel erweckt falschen Eindruck akademischer Bildung
        - Verteidigung: Berufsbegleitend, neben Arbeit, ohne Privilegien

  beruflicher_werdegang:
    - period: "frühe Jahre"
      job: "Maschinenschlosser, Lagerarbeiter"
      note: "Echte Arbeiterbiografie"
    - period: "2001-2004"
