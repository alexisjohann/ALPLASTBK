# ═══════════════════════════════════════════════════════════════════════════
# EBENE 5: WORKFLOW-REGELN (AB SOFORT GÜLTIG)
# ═══════════════════════════════════════════════════════════════════════════

workflow_regeln:

  bei_strategie_aenderung:
    regel: |
      WENN eine Kernaussage geändert werden soll:

      1. ZUERST in ANFRAGEN_REGISTER.yaml → kernaussagen{} ändern
      2. DANN Deliverable aktualisieren
      3. DANN operative Dokumente aktualisieren
      4. DANN Review-Template aktualisieren
      5. ALTE Versionen als ARCHIV markieren

      NIEMALS: Änderung nur in einem Dokument machen!

  bei_review_start:
    regel: |
      VOR dem Start eines Reviews:

      1. PRÜFEN: Ist das Review-Template mit kernaussagen{} synchron?
      2. WENN NICHT: Erst synchronisieren, dann Review starten
      3. VALIDIERUNGSSTATUS im Review-Header anzeigen

  bei_neuem_dokument:
    regel: |
      WENN ein neues operatives Dokument erstellt wird:

      1. kernaussagen{} als Basis verwenden
      2. Axiom-Compliance prüfen (K1-K10)
      3. In SSOT_ARCHITEKTUR_spo_mandate.yaml eintragen
      4. Dokumenten-Klassifikation angeben (aktuell_gueltig / archiv)

