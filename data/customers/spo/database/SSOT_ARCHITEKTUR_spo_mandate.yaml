# SPÖ MANDAT - SINGLE SOURCE OF TRUTH ARCHITEKTUR
#
# Definiert welche Dateien MASTER sind und welche ABGELEITET.
# Bei Inkonsistenzen gilt IMMER der MASTER.
#
# Version: 1.0
# Erstellt: 2026-02-03
# Basiert auf: L-SPO-001 (Synchronisation-Fehler)

---

# ═══════════════════════════════════════════════════════════════════════════
# EBENE 1: GLOBALE MASTER (für ALLE Anfragen gültig)
# ═══════════════════════════════════════════════════════════════════════════

globale_master:

  # ─────────────────────────────────────────────────────────────────────────
  # M1: Axiom-System (K1-K10)
  # ─────────────────────────────────────────────────────────────────────────
  - id: "M1-AXIOME"
    name: "Axiom-System K1-K10"
    ssot_datei: "spo_mandate_preamble.yaml → axiom_system{}"
    backup_ssot: "deliverables/EMRK_STRATEGIE_KOMPLETT_*.md → Appendix A"
    beschreibung: |
      Die 10 Kommunikations-Axiome gelten für ALLE SPÖ-Kommunikation.
      Jede Kernaussage MUSS gegen alle 10 Axiome geprüft werden.

    axiome:
      K1: "Kickl-Differenzierung - Niemals FPÖ-Rhetorik kopieren"
      K2: "Zahlen als Beleg - Fakten vor Emotionen"
      K3: "Ordnung-Frame - 'Ordnung' statt 'Sicherheit'"
      K4: "USP herausarbeiten - Was kann NUR die SPÖ?"
      K5: "EMRK würdigen - Historische Bedeutung"
      K6: "Gegner-Motive aufdecken - Wahre Absichten benennen"
      K7: "Weiterentwicklung statt Rückschritt"
      K8: "Level-Komplementarität - L1+L2+L3 > Summe"
      K9: "Populär, nicht populistisch"
      K10: "Drei Nutzen - U_IND, U_COLL, U_IDN neutral"

    sync_pflicht:
      - "Alle kernaussagen{} in ANFRAGEN_REGISTER.yaml"
      - "Alle Deliverables"
      - "Alle Wordings, Taktiken, Briefings"

  # ─────────────────────────────────────────────────────────────────────────
  # M2: Drei-Level-Framework
  # ─────────────────────────────────────────────────────────────────────────
  - id: "M2-LEVELS"
    name: "Drei-Level-Framework (L1/L2/L3)"
    ssot_datei: "frameworks/FRAMEWORK_3_levels.md"
    beschreibung: |
      Jede Botschaft muss auf drei Ebenen funktionieren:
      L1 = THEMA ordnen (Beweisen)
      L2 = DEBATTE ordnen (Framen)
      L3 = LAND ordnen (Bedeuten)

    sync_pflicht:
      - "Alle kernaussagen{}.level_1, .level_2, .level_3"
      - "Alle Deliverables müssen L1/L2/L3 enthalten"

  # ─────────────────────────────────────────────────────────────────────────
  # M3: Aktuelle Lage (Auto-Research)
  # ─────────────────────────────────────────────────────────────────────────
  - id: "M3-LAGE"
    name: "Aktuelle politische Lage"
    ssot_dateien:
      - "database/BELIEBTHEIT_POLITIKER_AT.yaml"
      - "database/SONNTAGSFRAGE_PARTEIEN_AT.yaml"
      - "spo_mandate_preamble.yaml → aktuelle_lage{}"
    beschreibung: |
      Aktuelle Umfragewerte und politische Situation.
      Wird automatisch aktualisiert (Auto-Research).

    freshness: "2 Tage"
    auto_update: true

---

# ═══════════════════════════════════════════════════════════════════════════
# EBENE 2: ANFRAGE-SPEZIFISCHE MASTER (pro Thema)
# ═══════════════════════════════════════════════════════════════════════════

anfrage_master:

  beschreibung: |
    Für JEDE Anfrage (Spitalstouristen, SOG, EMRK, etc.) gilt:
    - kernaussagen{} in ANFRAGEN_REGISTER.yaml ist MASTER
    - Alle anderen Dokumente sind ABGELEITET

  hierarchie:
    1_master: "ANFRAGEN_REGISTER.yaml → anfragen[].kernaussagen{}"
    2_deliverable: "deliverables/*_STRATEGIE_KOMPLETT_*.md"
    3_operativ: "reports/REPORT_*.md, TAKTIK_*.md, WORDING_*.md, BRIEFING_*.md"
    4_review: "database/INTERAKTIVER_REVIEW_*.md"
    5_archiv: "Alle anderen Versionen (v1, v2, etc.)"

  sync_regel: |
    WENN kernaussagen{} geändert wird:
    1. Deliverable aktualisieren
    2. Operative Dokumente aktualisieren
    3. Review-Template aktualisieren
    4. Alte Versionen als "ARCHIV" markieren

---

