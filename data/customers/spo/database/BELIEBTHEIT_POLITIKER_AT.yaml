# SSOT für historische Popularitätsdaten
# Auto-Update bei SPÖ-Trigger wenn last_fetched + 2 Tage < heute
#
# Version: 2.0
# Erstellt: 2026-02-03
# Letzte Aktualisierung: 2026-02-03
