---

metadata:
  database_id: "DB-SPO-BELIEBT-001"
  description: "Historische Vertrauensdaten österreichischer Politiker"
  primary_source: "APA-OGM Vertrauensindex"
  secondary_sources:
    - "Unique Research"
    - "SORA"
    - "Politbarometer"
  update_frequency: "monatlich (OGM)"
  retention_period: "15 Monate"

  # AUTO-RESEARCH TRIGGER
  auto_research:
    enabled: true
    trigger_words:
      - "SPÖ"
      - "Babler"
      - "Vizekanzler"
      - "österreichische Sozialdemokratie"
    freshness_threshold_days: 2
    last_fetched: "2026-02-03"
    last_fetched_by: "Claude Session SIM-SPO-EMRK-2026-02-03"
    next_update_due: "2026-02-05"

    # Suchanfragen für WebSearch
    search_queries:
      - query: "OGM Vertrauensindex Österreich {MONTH} {YEAR}"
        priority: 1
      - query: "Politiker Beliebtheit Umfrage Österreich {MONTH} {YEAR}"
        priority: 2
      - query: "Babler Kickl Vertrauen Umfrage aktuell"
        priority: 3

