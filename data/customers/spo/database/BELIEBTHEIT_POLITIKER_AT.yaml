# AUTO-UPDATE PROTOKOLL
update_protocol:
  steps:
    - step: 1
      action: "Trigger-Check"
      description: "Prüfe ob SPÖ/Babler in Nachricht erwähnt"

    - step: 2
      action: "Freshness-Check"
      description: "Prüfe ob last_fetched + 2 Tage < heute"
      code: |
        if today > last_fetched + timedelta(days=2):
            trigger_update = True

    - step: 3
      action: "WebSearch"
      description: "Führe 3 Suchanfragen aus"
      queries:
        - "OGM Vertrauensindex Österreich {current_month} {current_year}"
        - "Politiker Beliebtheit Umfrage Österreich aktuell"
        - "Babler Kickl Vertrauen Umfrage {current_month}"

    - step: 4
      action: "Extract & Validate"
      description: "Extrahiere Saldo-Werte, validiere gegen Schema"

    - step: 5
      action: "Update Database"
      description: "Aktualisiere current und historical Sektionen"

    - step: 6
      action: "Update Metadata"
      description: "Setze last_fetched auf heute, next_update_due auf heute+2"

    - step: 7
      action: "Notify User"
      description: "Zeige Research-Summary Box"

