# =============================================================================
# SPÖ NEBENBEDINGUNGEN-REGISTER
# Single Source of Truth für alle Constraints und Roten Linien
# =============================================================================
#
# Dieses Register konsolidiert ALLE Nebenbedingungen aus verschiedenen Quellen.
# Bei strategischen Fragestellungen: Hier nachschlagen, was gilt.
#
# Version: 1.0
# Datum: 2026-02-03
# Superkey: NEB-SPO-2026-02-03-001
#
# =============================================================================

---

metadata:
  version: "1.0"
  created: "2026-02-03"
  last_updated: "2026-02-03"
  description: |
    Zentrales Register aller Nebenbedingungen für SPÖ-Kommunikation.
    Speist sich aus 6 Quellen: Koalitionsvertrag, Parteiprogramm, Babler-Erkenntnisse,
    Rechtliche Rahmenbedingungen, Interne Parteidynamik, Externe Stakeholder.

# =============================================================================
# QUELLEN-SCHEMA
# =============================================================================
#
# KV-xxx  = Koalitionsvertrag (rechtlich bindend)
# PP-xxx  = Parteiprogramm (parteiintern bindend)
# BA-xxx  = Babler-Erkenntnisse / Persönliche Rote Linien
# RE-xxx  = Rechtliche Rahmenbedingungen
# IP-xxx  = Interne Parteidynamik
# ES-xxx  = Externe Stakeholder
#
# =============================================================================

# =============================================================================
# 1. KOALITIONSVERTRAG (KV) - Rechtlich bindend
# =============================================================================
# Quelle: Koalitionsvertrag ÖVP-SPÖ 2024
# Status: HART (keine Abweichung möglich)

koalitionsvertrag:
  source: "Koalitionsvertrag ÖVP-SPÖ 2024"
  binding_level: "rechtlich"
  constraints:

    - id: KV-001
      name: "EMRK-Bekenntnis"
      constraint: "Österreich bekennt sich zur EMRK"
      typ: "hart"
      themen: ["migration", "emrk", "menschenrechte"]
      implikation: "Kein Austritt, keine Relativierung"
      quelle_detail: "Präambel Koalitionsvertrag"

    - id: KV-002
      name: "EU-Bekenntnis"
      constraint: "Österreich bekennt sich zur EU-Mitgliedschaft"
      typ: "hart"
      themen: ["eu", "geopolitik"]
      implikation: "Keine Exit-Rhetorik, keine Schwächung"
      quelle_detail: "Präambel Koalitionsvertrag"

    - id: KV-003
      name: "Rückführungen im Rechtsrahmen"
      constraint: "Rückführungen erfolgen im bestehenden Rechtsrahmen"
      typ: "hart"
      themen: ["migration", "abschiebungen"]
      implikation: "Keine Forderung nach Rechtsbruch"
      quelle_detail: "Kapitel Migration"

    - id: KV-004
      name: "Koalitionsdisziplin"
      constraint: "Keine öffentliche Kritik am Koalitionspartner"
      typ: "weich"
      prioritaet: "hoch"
      themen: ["kommunikation", "koalition"]
      implikation: "Sachliche Differenzen intern klären"
      quelle_detail: "Koalitionsabkommen"

# =============================================================================
# 2. PARTEIPROGRAMM (PP) - Parteiintern bindend
# =============================================================================
# Quelle: SPÖ Parteiprogramm 2024
# Status: HART für Grundwerte, WEICH für Detailpositionen

parteiprogramm:
  source: "SPÖ Parteiprogramm 2024"
  binding_level: "parteiintern"
  constraints:

    - id: PP-001
      name: "Soziale Gerechtigkeit"
      constraint: "Soziale Gerechtigkeit als Kernwert"
      typ: "hart"
      themen: ["grundwerte", "wirtschaft", "soziales"]
      implikation: "Keine neoliberale Rhetorik"
      quelle_detail: "Grundsatzprogramm"

    - id: PP-002
      name: "Menschenwürde"
      constraint: "Unantastbarkeit der Menschenwürde"
      typ: "hart"
      themen: ["grundwerte", "migration", "menschenrechte"]
      implikation: "Keine Entmenschlichung, auch nicht rhetorisch"
      quelle_detail: "Grundsatzprogramm"

    - id: PP-003
      name: "Internationale Solidarität"
      constraint: "Bekenntnis zu internationaler Solidarität"
      typ: "hart"
      themen: ["grundwerte", "geopolitik", "eu"]
      implikation: "Keine Abschottungs-Rhetorik"
      quelle_detail: "Grundsatzprogramm"

    - id: PP-004
      name: "Arbeitnehmerrechte"
      constraint: "Schutz und Stärkung der Arbeitnehmerrechte"
      typ: "hart"
      themen: ["arbeit", "wirtschaft", "gewerkschaft"]
      implikation: "Keine Schwächung von Arbeitnehmervertretungen"
      quelle_detail: "Grundsatzprogramm"

# =============================================================================
# 3. BABLER-ERKENNTNISSE (BA) - Persönliche Rote Linien
# =============================================================================
# Quelle: frameworks/BABLER_erkenntnisse.md
# Status: HART für authentische Kommunikation

babler_erkenntnisse:
  source: "frameworks/BABLER_erkenntnisse.md"
  binding_level: "authentizität"
  constraints:

    - id: BA-001
      name: "Kein Todesurteil"
      constraint: "Niemanden in den Tod schicken"
      typ: "hart"
      themen: ["migration", "abschiebungen", "emrk"]
      implikation: "Keine Abschiebung in Folterstaaten/Kriegsgebiete"
      wie_formulieren: "Das ist eine rote Linie. Das sind wir nicht."
      quelle_detail: "BABLER_erkenntnisse.md, Zeile 157ff"

    - id: BA-002
      name: "FPÖ nicht imitieren"
      constraint: "Nicht die FPÖ imitieren"
      typ: "hart"
      themen: ["kommunikation", "migration", "strategie"]
      implikation: "Eigene Sprache, eigener Frame"
      wie_formulieren: "Wir werden nicht 'härter' klingen, um dann nichts zu liefern."
      quelle_detail: "BABLER_erkenntnisse.md"

    - id: BA-003
      name: "Traiskirchen-Authentizität"
      constraint: "Immer auf Traiskirchen-Erfahrung verweisen können"
      typ: "weich"
      prioritaet: "hoch"
      themen: ["migration", "glaubwürdigkeit"]
      implikation: "Nur Positionen, die mit 15 Jahren Erfahrung vereinbar"
      wie_formulieren: "Ich war 15 Jahre Bürgermeister von Traiskirchen. Ich weiss, wovon ich rede."
      quelle_detail: "BABLER_erkenntnisse.md"

    - id: BA-004
      name: "Ergebnisse vor Prozess"
      constraint: "Ergebnisse zuerst, dann Erklärung"
      typ: "weich"
      prioritaet: "hoch"
      themen: ["kommunikation"]
      implikation: "Keine EMRK-Erklärungen am Anfang"
      wie_formulieren: "14.000 mussten letztes Jahr gehen. Das ist die Zahl."
      quelle_detail: "BABLER_erkenntnisse.md"

    - id: BA-005
      name: "Leadership-Ownership"
      constraint: "Regierungserfolge als eigene framen"
      typ: "weich"
      prioritaet: "mittel"
      themen: ["kommunikation", "regierung"]
      implikation: "Das haben WIR erreicht (nicht: das System)"
      wie_formulieren: "Das haben wir in der Regierung durchgesetzt."
      quelle_detail: "BABLER_erkenntnisse.md"

# =============================================================================
# 4. RECHTLICHE RAHMENBEDINGUNGEN (RE)
# =============================================================================
# Quelle: Verfassung, EU-Recht, Völkerrecht
# Status: HART (keine politische Disposition)

rechtlich:
  source: "Rechtlicher Rahmen"
  binding_level: "gesetzlich"
  constraints:

    - id: RE-001
      name: "EMRK ist Verfassungsrang"
      constraint: "EMRK hat in Österreich Verfassungsrang"
      typ: "hart"
      themen: ["emrk", "verfassung"]
      implikation: "Austritt = Verfassungsänderung + EU-Austritt"
      quelle_detail: "Art. 9 B-VG, Staatsvertrag"

    - id: RE-002
      name: "Genfer Flüchtlingskonvention"
      constraint: "Österreich ist an GFK gebunden"
      typ: "hart"
      themen: ["asyl", "flüchtlinge"]
      implikation: "Asylrecht besteht, kann nicht einseitig aufgehoben werden"
      quelle_detail: "GFK 1951"

    - id: RE-003
      name: "Dublin-Verordnung"
      constraint: "Zuständigkeit nach Dublin-III"
      typ: "hart"
      themen: ["asyl", "eu"]
      implikation: "Keine unilateralen Grenzschliessungen"
      quelle_detail: "Dublin-III-VO"

    - id: RE-004
      name: "Non-Refoulement"
      constraint: "Abschiebeverbot bei Folter/Todesstrafe"
      typ: "hart"
      themen: ["abschiebungen", "menschenrechte"]
      implikation: "Keine Abschiebung nach Afghanistan, Syrien (aktuell)"
      quelle_detail: "Art. 3 EMRK, Art. 33 GFK"

    - id: RE-005
      name: "ORF-Gesetz"
      constraint: "ORF unterliegt dem ORF-Gesetz"
      typ: "hart"
      themen: ["medien", "orf"]
      implikation: "Unabhängigkeit respektieren, keine politische Einflussnahme"
      quelle_detail: "ORF-Gesetz 2024"

# =============================================================================
# 5. INTERNE PARTEIDYNAMIK (IP)
# =============================================================================
# Quelle: Parteistrukturen, Flügel, Landesorganisationen
# Status: WEICH aber strategisch relevant

intern:
  source: "Interne Parteidynamik"
  binding_level: "strategisch"
  constraints:

    - id: IP-001
      name: "Doskozil-Konflikt vermeiden"
      constraint: "Doskozil nicht direkt kritisieren"
      typ: "weich"
      prioritaet: "hoch"
      themen: ["kommunikation", "partei"]
      implikation: "Indirekte Formulierungen: 'Unsere Linie ist klar'"
      risiko: "Öffentlicher Widerspruch innerhalb 48h"
      quelle_detail: "Einschätzung Strategieteam"

    - id: IP-002
      name: "Landesorganisationen einbinden"
      constraint: "Neue Linie mit Landesorganisationen abstimmen"
      typ: "weich"
      prioritaet: "hoch"
      themen: ["kommunikation", "partei", "strategie"]
      implikation: "Vorab-Briefing vor grossen Auftritten"
      quelle_detail: "Einschätzung Strategieteam"

    - id: IP-003
      name: "Linke Basis nicht verprellen"
      constraint: "Humanitäre Grundhaltung betonen"
      typ: "weich"
      prioritaet: "hoch"
      themen: ["migration", "kommunikation"]
      implikation: "Immer 'Das sind wir nicht' Versicherung"
      segment: "~30% der Delegierten"
      quelle_detail: "Einschätzung Strategieteam"

    - id: IP-004
      name: "Wien-Abhängigkeit beachten"
      constraint: "Wien nicht vergrämen (38% der Stimmen)"
      typ: "weich"
      prioritaet: "mittel"
      themen: ["wahlkampf", "strategie"]
      implikation: "Urbane Themen nicht vernachlässigen"
      quelle_detail: "spo_context_ris_risk.yaml RIS-STR-007"

    - id: IP-005
      name: "Gewerkschaftsnähe bewahren"
      constraint: "ÖGB/AK nicht entfremden"
      typ: "weich"
      prioritaet: "hoch"
      themen: ["arbeit", "gewerkschaft"]
      implikation: "Arbeitnehmer-Themen prominent halten"
      quelle_detail: "spo_context_ris_risk.yaml RIS-EXT-005"

# =============================================================================
# 6. EXTERNE STAKEHOLDER (ES)
# =============================================================================
# Quelle: Koalitionspartner, Medien, Zivilgesellschaft
# Status: WEICH aber reputationsrelevant

extern:
  source: "Externe Stakeholder"
  binding_level: "reputational"
  constraints:

    - id: ES-001
      name: "ÖVP-Koalitionsräson"
      constraint: "Koalitionsfähigkeit mit ÖVP erhalten"
      typ: "weich"
      prioritaet: "hoch"
      themen: ["koalition", "strategie"]
      implikation: "Keine fundamentale Konfrontation"
      quelle_detail: "Aktuelle Regierungskonstellation"

    - id: ES-002
      name: "Medien-Glaubwürdigkeit"
      constraint: "Bei Fakten bleiben (überprüfbar)"
      typ: "weich"
      prioritaet: "hoch"
      themen: ["kommunikation", "medien"]
      implikation: "Keine falschen Zahlen, keine Übertreibungen"
      risiko: "Fact-Check Desaster"
      quelle_detail: "Einschätzung Strategieteam"

    - id: ES-003
      name: "Zivilgesellschaft nicht verlieren"
      constraint: "NGOs, Caritas, Diakonie nicht als Gegner"
      typ: "weich"
      prioritaet: "mittel"
      themen: ["migration", "zivilgesellschaft"]
      implikation: "Differenzierte Position, keine Pauschalurteile"
      quelle_detail: "Einschätzung Strategieteam"

    - id: ES-004
      name: "Internationale Reputation"
      constraint: "In SI-Familie respektiert bleiben"
      typ: "weich"
      prioritaet: "mittel"
      themen: ["geopolitik", "partei"]
      implikation: "Kein Rechtsruck-Image international"
      quelle_detail: "Sozialistische Internationale"

# =============================================================================
# VERHALTENS-CONSTRAINTS (aus spo_migration_strategy.yaml)
# =============================================================================
# Diese Constraints beschreiben das Verhalten der Zielgruppen

verhaltens_constraints:
  source: "spo_migration_strategy.yaml"
  binding_level: "strategisch"
  description: "Constraints die das VERHALTEN der Zielgruppen beschreiben"
  constraints:

    - id: VC-001
      name: "Rahmen nicht änderbar"
      constraint: "SPÖ kann den medialen Rahmen nicht ändern"
      typ: "hart"
      implikation: "Migration bleibt salient = FPÖ profitiert"
      quelle_detail: "spo_migration_strategy.yaml:91"

    - id: VC-002
      name: "Identitätsfalle"
      constraint: "Jede Äusserung aktiviert Gruppenidentität"
      typ: "hart"
      implikation: "Vorsicht mit direkten Konfrontationen"
      quelle_detail: "spo_migration_strategy.yaml:96"

    - id: VC-003
      name: "Rationalität wirkungslos"
      constraint: "Rationale Argumente wirkungslos bei diesem Thema"
      typ: "hart"
      implikation: "Emotionale Frames, Zahlen nur als Verstärker"
      quelle_detail: "spo_migration_strategy.yaml:101"

    - id: VC-004
      name: "Konservative Grundhaltung"
      constraint: "Kulturelle Grundhaltung in Österreich konservativ"
      typ: "hart"
      implikation: "Keine progressiven Maximalpositionen"
      quelle_detail: "spo_migration_strategy.yaml:106"

    - id: VC-005
      name: "Lohndrück-Angst"
      constraint: "Arbeiter haben Angst vor Lohndruck durch Migration"
      typ: "weich"
      prioritaet: "hoch"
      implikation: "Arbeitsmarkt-Schutz betonen"
      quelle_detail: "spo_migration_strategy.yaml:111"

    - id: VC-006
      name: "Krisen-Ermüdung"
      constraint: "Kumulative Krisen-Ermüdung in Bevölkerung"
      typ: "weich"
      prioritaet: "mittel"
      implikation: "Nicht noch mehr Probleme aufmachen"
      quelle_detail: "spo_migration_strategy.yaml:116"

# =============================================================================
# ETHISCHE CONSTRAINTS (aus AXIOME)
# =============================================================================
# Referenz: strategie/AXIOME_ordnung_statt_spalten.yaml

ethische_constraints:
  source: "AXIOME_ordnung_statt_spalten.yaml"
  binding_level: "ethisch"
  description: "Ethische Grenzen der Strategie"
  constraints:

    - id: EC-K1
      name: "Nicht auf Identität konkurrieren"
      constraint: "Nicht auf U_IDN konkurrieren"
      typ: "hart"
      implikation: "Keine ethnische/religiöse Mobilisierung"
      quelle_detail: "AXIOME K1"

    - id: EC-K2
      name: "Keine Fake News"
      constraint: "Nur überprüfbare Fakten verwenden"
      typ: "hart"
      implikation: "Jede Zahl muss belegbar sein"
      quelle_detail: "AXIOME K2"

    - id: EC-K3
      name: "Keine Entmenschlichung"
      constraint: "Menschen nie als Masse/Problem framen"
      typ: "hart"
      implikation: "Individuelle Geschichten, differenzierte Sprache"
      quelle_detail: "AXIOME K3"

# =============================================================================
# AGGREGATION & NAVIGATION
# =============================================================================

aggregation:
  total_constraints: 35
  nach_typ:
    hart: 20
    weich: 15
  nach_quelle:
    koalitionsvertrag: 4
    parteiprogramm: 4
    babler_erkenntnisse: 5
    rechtlich: 5
    intern: 5
    extern: 4
    verhaltens: 6
    ethisch: 3

  # Schnellzugriff nach Thema
  themen_index:
    migration:
      - KV-001
      - KV-003
      - PP-002
      - BA-001
      - BA-002
      - BA-003
      - RE-004
      - IP-003
      - ES-003
      - VC-001
      - VC-002
      - VC-003
      - VC-004
      - VC-005
    emrk:
      - KV-001
      - BA-001
      - RE-001
      - RE-004
    kommunikation:
      - KV-004
      - BA-002
      - BA-004
      - BA-005
      - IP-001
      - IP-002
      - IP-003
      - ES-002
      - EC-K2
      - EC-K3
    koalition:
      - KV-004
      - ES-001
    medien:
      - RE-005
      - ES-002
    geopolitik:
      - KV-002
      - PP-003
      - ES-004

