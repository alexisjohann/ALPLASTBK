# =============================================================================
# AUTO-UPDATE PROTOKOLL
# =============================================================================

update_protocol:
  steps:
    - step: 1
      action: "Trigger-Check"
      description: "Prüfe ob SPÖ/Sonntagsfrage in Nachricht"
    - step: 2
      action: "Freshness-Check"
      description: "Prüfe ob last_fetched + 2 Tage < heute"
    - step: 3
      action: "WebSearch"
      queries:
        - "Sonntagsfrage Österreich {MONTH} {YEAR}"
        - "Austria polls FPÖ SPÖ ÖVP {MONTH} {YEAR}"
        - "PolitPro Wahltrend Österreich aktuell"
    - step: 4
      action: "Extract & Validate"
      description: "Parteiwerte extrahieren und validieren"
    - step: 5
      action: "Update Database"
      description: "current + historical aktualisieren"
    - step: 6
      action: "Update Metadata"
      description: "last_fetched setzen"
    - step: 7
      action: "Notify User"
      description: "Sonntagsfrage-Summary Box anzeigen"
