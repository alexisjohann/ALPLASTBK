# ============================================================================
# TEIL 4: SCHEMA-DOKUMENTATION
# ============================================================================

schema_dokumentation:

  medien_profile:
    beschreibung: "Statische Profile aller österreichischen Medien"
    aktualisierung: "Bei signifikanten Änderungen (Eigentümer, Chefredaktion, Linie)"

  themen_tracking:
    beschreibung: "Dynamisches Tracking von Prognosen vs. tatsächlichen Reaktionen"
    workflow:
      - schritt: 1
        aktion: "Prognose erstellen (VOR Ereignis)"
      - schritt: 2
        aktion: "Ereignis abwarten"
      - schritt: 3
        aktion: "Automatisiert: Artikel via URL/RSS fetchen"
      - schritt: 4
        aktion: "Automatisiert: Volltext extrahieren & speichern"
      - schritt: 5
        aktion: "Automatisiert: Tonalität & Framing analysieren"
      - schritt: 6
        aktion: "Auswertung: Prognose vs. Realität"
      - schritt: 7
        aktion: "Learnings aggregieren"

  # NEU: Automatisiertes Erfassungs-Schema
  tatsaechliche_reaktion_schema:
    beschreibung: "Vollständige Erfassung inkl. Volltext für automatisierte Analyse"
    felder:
      datum:
        typ: "datetime"
        beschreibung: "Publikationsdatum/-zeit des Artikels"
        beispiel: "2026-02-05T08:30:00"
      artikel_url:
        typ: "string"
        beschreibung: "Direkt-Link zum Artikel"
        beispiel: "https://www.krone.at/3312345"
      headline:
        typ: "string"
        beschreibung: "Exakter Titel des Artikels"
      lead:
        typ: "string"
        beschreibung: "Untertitel/Lead-Paragraph"
      volltext:
        typ: "text"
        beschreibung: "Kompletter Artikeltext (automatisch extrahiert)"
        speicherung: "Inline oder Referenz auf separate Datei bei >5000 Zeichen"
      word_count:
        typ: "integer"
        beschreibung: "Wortanzahl (automatisch berechnet)"
      autoren:
        typ: "list"
        beschreibung: "Autor(en) des Artikels"
      zitierte_personen:
        typ: "list"
        beschreibung: "Im Artikel zitierte Personen (automatisch extrahiert)"
      framing:
        typ: "string"
        beschreibung: "Identifizierter Haupt-Frame"
        optionen: ["Trotzdem", "Zu spät", "Nicht ihr Verdienst", "Ablenkung", "Elite vs Volk", "Positiv", "Neutral"]
      tonalitaet:
        typ: "enum"
        optionen: ["negativ", "neutral", "positiv"]
      sentiment_score:
        typ: "float"
        beschreibung: "Automatischer Sentiment-Score (-1.0 bis +1.0)"
      auto_fetch:
        timestamp: "Zeitpunkt der automatischen Erfassung"
        methode: "RSS/Scrape/API"
        erfolgreich: "boolean"

  # Automatisierungs-Konfiguration
  automatisierung:
    beschreibung: "Konfiguration für automatisches Artikel-Fetching"
    medien_urls:
      MED-AT-001:  # Krone
        rss: "https://www.krone.at/rss"
        scrape_pattern: "article.story-content"
      MED-AT-002:  # oe24
        rss: "https://www.oe24.at/rss"
        scrape_pattern: "div.article-body"
      MED-AT-003:  # Heute
        rss: "https://www.heute.at/rss"
        scrape_pattern: "div.article-content"
      MED-AT-004:  # Standard
        rss: "https://www.derstandard.at/rss"
        scrape_pattern: "div.article-body"
      MED-AT-005:  # Presse
        rss: "https://www.diepresse.com/rss"
        scrape_pattern: "div.article-body"
    trigger_keywords:
      - "Inflation"
      - "Teuerung"
      - "2 Prozent"
      - "Babler"
      - "SPÖ"
    fetch_intervall_minuten: 30
    speicher_volltext: true
    max_artikel_pro_medium: 5

  tonalitaet_skala:
    negativ: "Kritisch, ablehnend, relativierend, Angriff"
    neutral: "Faktisch, beide Seiten, ausgewogen"
    positiv: "Wohlwollend, Erfolg anerkennend, konstruktiv"

  konfidenz_skala:
    absolut: "100% sicher"
    sehr_hoch: "90%+ sicher"
    hoch: "75-90% sicher"
    mittel: "50-75% sicher"
    niedrig: "<50% sicher"


