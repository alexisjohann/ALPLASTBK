# TEIL 2: THEMEN-TRACKING (Dynamisch)
# ============================================================================

themen_tracking:

  # --------------------------------------------------------------------------
  # INFLATION 2% (Februar 2026)
  # --------------------------------------------------------------------------

  - id: TRK-2026-02-04-001
    thema: "Inflation sinkt auf 2%"
    datum_ereignis: "2026-02-04"
    datum_prognose: "2026-02-04"
    anfrage_referenz: "ANF-2026-02-04-001"

    kontext:
      anlass: "Statistik Austria meldet 2% Inflation für Jänner 2026"
      bedeutung: "Halbierung der Inflation, potenzieller Regierungserfolg"
      spoe_position: "Maßnahmen wirken, weiter arbeiten"
      fpoe_erwartete_position: "Zu spät, nicht ihr Verdienst"

    # =========================================================================
    # INTEGRIERTE ANALYSEN (5 Dokumente)
    # =========================================================================
    analysen:

      # -----------------------------------------------------------------------
      # ANALYSE 1: WORDING (Strategische Grundausrichtung)
      # -----------------------------------------------------------------------
      - id: ANA-INF-001
        typ: "Wording"
        titel: "Strategische Grundausrichtung im 'Ordnen statt Spalten'-Frame"
        datei: "WORDING_inflation_teuerung_2026-02-04.md"
        pfad: "data/customers/spo/reports/"
        status: "fertig"

        inhalt:
          kern_frame: "Wir ordnen die Preise, damit sich Arbeit wieder lohnt."
          meta_soundbite: "Populisten leben von der Krise. Wir lösen sie."

          drei_ebenen_argumentation:
            level_1_beweisen:
              zielgruppe: "Skeptiker, FPÖ-Affine, Medien"
              kernbotschaft: "2% – niedrigster Stand seit 14 Monaten. Statistik Austria, nicht SPÖ-Propaganda."
            level_2_ordnen:
              zielgruppe: "SPÖ-Kernwähler, Gewerkschaft, arbeitende Mitte"
              kernbotschaft: "Für jene, die jeden Euro umdrehen müssen. Nicht für Konzerne."
            level_3_bedeuten:
              zielgruppe: "Progressive, Medien, Intellektuelle"
              kernbotschaft: "Preise sind kein Naturgesetz. Man kann eingreifen. Das haben wir bewiesen."

          killer_zahlen:
            - "2% (niedrigster Stand seit 14 Monaten)"
            - "Halbiert (Dez 4% → Jän 2%)"
            - "Energie -4,9%"
            - "Ungarn OHNE Sanktionen: 4% | AT MIT: 2%"

