# ============================================================================
# SPÖ INTERVENTION PORTFOLIO - RISK/RETURN ANALYSIS
# ============================================================================
# Projekt-ID: PRJ-SPO-2026-STRATEGIE
# Erstellt: 2026-02-03
# Version: 1.0
#
# METHODIK: EBF Portfolio Optimization (Markowitz + Komplementarität)
# REFERENZ: Appendix B (CORE-HOW), Chapter 15 (Portfolio Theory)
# ============================================================================

metadata:
  version: "1.0"
  erstellt: "2026-02-03"
  methodik: "EBF-IPO (Intervention Portfolio Optimization)"

  # Grundannahmen
  assumptions:
    risk_free_rate: 0.0    # r_f = 0 (keine sichere Alternative)
    time_horizon: "6 Monate"  # Legislaturperiode-Segment
    rebalancing: "monatlich"

# ============================================================================
# EBENE 1: RISK-RETURN PROFILE PRO INTERVENTION
# ============================================================================
#
# μ (mu):     Expected Return = Durchschnittlicher Impact [0-1]
# σ (sigma):  Risk = Standardabweichung des Impacts [0-1]
# β (beta):   Backfire Risk = Wahrscheinlichkeit negativer Reaktion [0-1]
# ρ (rho):    Segment-Reichweite = Anteil Segmente mit positivem Impact [0-1]
#
# Sharpe Ratio = μ / σ (da r_f = 0)
# Adjusted Return = μ × ρ × (1 - β)
# ============================================================================

interventions:

  # --------------------------------------------------------------------------
  # CLUSTER: SPITALSTOURISTEN
  # --------------------------------------------------------------------------
  INT-SPIT-001:
    name: "Frame-Wettbewerb"
    cluster_origin: "ANF-2026-01-27-001"

    return_profile:
      mu: 0.52              # 52% Impact (höchster im Cluster)
      sigma: 0.15           # Moderate Unsicherheit
      beta: 0.05            # Sehr niedriges Backfire-Risiko
      rho: 0.85             # 85% der Segmente positiv

    derived_metrics:
      sharpe_ratio: 3.47    # μ/σ = 0.52/0.15
      adjusted_return: 0.42 # μ × ρ × (1-β) = 0.52 × 0.85 × 0.95
      risk_adjusted_rank: 1

    segment_sensitivity:
      wechselwaehler: { impact: 0.55, variance: 0.12 }
      oevp_enttaeuschte: { impact: 0.60, variance: 0.10 }
      fpoe_sympathisanten: { impact: 0.15, variance: 0.25 }
      spoe_basis: { impact: 0.65, variance: 0.08 }
      progressive: { impact: 0.45, variance: 0.15 }
      politikverdrossene: { impact: 0.40, variance: 0.20 }

  INT-SPIT-002:
    name: "Medienvertrauen nutzen"
    cluster_origin: "ANF-2026-01-27-001"

    return_profile:
      mu: 0.28
      sigma: 0.18           # Höhere Unsicherheit (medienabhängig)
      beta: 0.08
      rho: 0.70

    derived_metrics:
      sharpe_ratio: 1.56
      adjusted_return: 0.18
      risk_adjusted_rank: 8

  INT-SPIT-003:
    name: "Soziale Ansteckung"
    cluster_origin: "ANF-2026-01-27-001"

    return_profile:
      mu: 0.15
      sigma: 0.22           # Hohe Unsicherheit (netzwerkabhängig)
      beta: 0.03
      rho: 0.75

    derived_metrics:
      sharpe_ratio: 0.68
      adjusted_return: 0.11
      risk_adjusted_rank: 14

  INT-SPIT-004:
    name: "Zahlen-Offensive"
    cluster_origin: "ANF-2026-01-27-001"

    return_profile:
      mu: 0.05              # Fakten allein nur 5%!
      sigma: 0.08
      beta: 0.02
      rho: 0.90

    derived_metrics:
      sharpe_ratio: 0.63
      adjusted_return: 0.04
      risk_adjusted_rank: 16

    note: "NUR in Kombination mit Frame-Interventionen verwenden!"

  # --------------------------------------------------------------------------
  # CLUSTER: SOG (SOCIAL MEDIA)
  # --------------------------------------------------------------------------
  INT-SOG-001:
    name: "Kinderschutz-Norm"
    cluster_origin: "ANF-2026-01-30-001"

    return_profile:
      mu: 0.45
      sigma: 0.10           # Sehr stabil (universelle Norm)
      beta: 0.02
      rho: 0.95             # Fast alle Segmente positiv

    derived_metrics:
      sharpe_ratio: 4.50    # Höchster Sharpe Ratio!
      adjusted_return: 0.42
      risk_adjusted_rank: 2

  INT-SOG-002:
    name: "Plattform-Verantwortung"
    cluster_origin: "ANF-2026-01-30-001"

    return_profile:
      mu: 0.32
      sigma: 0.14
      beta: 0.10            # Leichtes Zensur-Frame-Risiko
      rho: 0.80

    derived_metrics:
      sharpe_ratio: 2.29
      adjusted_return: 0.23
      risk_adjusted_rank: 6

  INT-SOG-003:
    name: "Ordnung-Frame"
    cluster_origin: "ANF-2026-01-30-001"

    return_profile:
      mu: 0.15
      sigma: 0.12
      beta: 0.05
      rho: 0.85

    derived_metrics:
      sharpe_ratio: 1.25
      adjusted_return: 0.12
      risk_adjusted_rank: 11

    note: "Verstärkt andere INTs - Komplementarität beachten!"

  INT-SOG-004:
    name: "Autonomie-Frame für Jugend"
    cluster_origin: "ANF-2026-01-30-001"

    return_profile:
      mu: 0.08
      sigma: 0.25           # HOHE Unsicherheit bei Jugend
      beta: 0.35            # HOHES Reaktanz-Risiko wenn falsch eingesetzt
      rho: 0.30             # Nur für Jugendsegment

    derived_metrics:
      sharpe_ratio: 0.32
      adjusted_return: 0.02
      risk_adjusted_rank: 15

    warning: "⚠️ NUR bei 14-25-Jährigen UND ohne Kinderschutz-Elemente!"
    conditional_return:
      wenn_korrekt_eingesetzt:
        mu: 0.40
        beta: 0.05
        sharpe_ratio: 2.67

  # --------------------------------------------------------------------------
  # CLUSTER: EMRK
  # --------------------------------------------------------------------------
  INT-EMRK-001:
    name: "Killer-Zahlen Push"
    cluster_origin: "ANF-2026-02-02-001"

    return_profile:
      mu: 0.38
      sigma: 0.12
      beta: 0.03
      rho: 0.90

    derived_metrics:
      sharpe_ratio: 3.17
      adjusted_return: 0.33
      risk_adjusted_rank: 3

  INT-EMRK-002:
    name: "Ordnung-Frame"
    cluster_origin: "ANF-2026-02-02-001"

    return_profile:
      mu: 0.22
      sigma: 0.10
      beta: 0.05
      rho: 0.85

    derived_metrics:
      sharpe_ratio: 2.20
      adjusted_return: 0.18
      risk_adjusted_rank: 7

  INT-EMRK-003:
    name: "Rechtsstaat-Werte"
    cluster_origin: "ANF-2026-02-02-001"

    return_profile:
      mu: 0.20
      sigma: 0.15
      beta: 0.08
      rho: 0.60             # Polarisiert leicht

    derived_metrics:
      sharpe_ratio: 1.33
      adjusted_return: 0.11
      risk_adjusted_rank: 10

  INT-EMRK-004:
    name: "FPÖ-Seilschaft Entlarvung"
    cluster_origin: "ANF-2026-02-02-001"

    return_profile:
      mu: 0.12
      sigma: 0.30           # SEHR hohe Unsicherheit
      beta: 0.45            # HOHES Backfire-Risiko bei Wechselwählern!
      rho: 0.35             # Nur bei Basis positiv

    derived_metrics:
      sharpe_ratio: 0.40
      adjusted_return: 0.02
      risk_adjusted_rank: 13

    warning: "⚠️ POLARISIEREND! NUR Basis-Events!"
    conditional_return:
      bei_basis_events:
        mu: 0.35
        beta: 0.05
        rho: 0.90
        sharpe_ratio: 2.33

  # --------------------------------------------------------------------------
  # CLUSTER: GESUNDHEIT
  # --------------------------------------------------------------------------
  INT-GESUND-001:
    name: "Ökonomie-Push"
    cluster_origin: "ANF-2026-02-03-002"

    return_profile:
      mu: 0.21
      sigma: 0.08
      beta: 0.02
      rho: 0.92

    derived_metrics:
      sharpe_ratio: 2.63
      adjusted_return: 0.19
      risk_adjusted_rank: 4

  INT-GESUND-002:
    name: "Zahlen-Offensive"
    cluster_origin: "ANF-2026-02-03-002"

    return_profile:
      mu: 0.21
      sigma: 0.10
      beta: 0.03
      rho: 0.88

    derived_metrics:
      sharpe_ratio: 2.10
      adjusted_return: 0.18
      risk_adjusted_rank: 5

  INT-GESUND-003:
    name: "Public Health Frame"
    cluster_origin: "ANF-2026-02-03-002"

    return_profile:
      mu: 0.20
      sigma: 0.12
      beta: 0.02
      rho: 0.95             # Höchste Reichweite - funktioniert überall!

    derived_metrics:
      sharpe_ratio: 1.67
