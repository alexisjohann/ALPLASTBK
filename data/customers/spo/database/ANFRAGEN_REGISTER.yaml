      aktuelle_lage: true          # Schritt 0 - APA-Text + BMF-Argumentation
      stakeholder_analyse: true    # Schritt 1 - 6 Wähler-Segmente
      babler_position: true        # Schritt 2 - Ordnungs-Frame
      drei_levels: true            # Schritt 3 - L1/L2/L3 Argumentation
      template_ausgefuellt: true   # Schritt 4 - Vollständiges Briefing
      ergebnissicherung: true      # Schritt 5 - Im Register
      output_gewaehlt: true        # Schritt 6 - Markdown-Wording

    # EBF-Details
    ebf_details:
      session_id: "EBF-S-2026-02-04-POL-001"
      modus: "SCHNELL (Akut-Reaktion auf APA-Meldung)"
      workflow: "EBF Inflation-Frame"
      theorie_basis:
        - "MS-IB-001 (Identity Economics)"
        - "MS-RD-001 (Prospect Theory - Loss Aversion)"
        - "CAT-21 (Political Psychology)"
        - "CAT-05 (Reference Dependence)"

    # Kern-Frame
    kern_frame:
      headline: "Wir ordnen die Preise, damit sich Arbeit wieder lohnt."
      subframe: "Inflation = UNORDNUNG in der Wirtschaft | SPÖ = ORDNUNG durch gezielte Eingriffe"
      closer: "Ordnung in der Wirtschaft heißt: Preise, die sich Menschen leisten können. Daran arbeiten wir. Nicht mit Schlagzeilen, sondern mit Gesetzen."

    # 3-Ebenen-Argumentation
    drei_ebenen:
      level_1_fakten:
        zielgruppe: "Skeptiker, FPÖ-Affine"
        kernbotschaften:
          - "2 Prozent – niedrigster Stand seit 14 Monaten."
          - "Halbiert. Im Dezember noch 4 Prozent, jetzt 2."
          - "Energie minus 4,9 Prozent. Das spart echtes Geld."
          - "1,4 Milliarden Euro Entlastung bis Jahresende."
        soundbite: "Schauen Sie auf die Zahlen. Statistik Austria, nicht SPÖ-Propaganda. 2 Prozent Inflation im Jänner."

      level_2_werte:
        zielgruppe: "SPÖ-Kernwähler, Gewerkschaft"
        kernbotschaften:
          - "Für jene, die jeden Euro umdrehen müssen."
          - "Wer arbeiten geht, muss sich das Leben leisten können."
          - "Leistung muss sich wieder lohnen – und das beginnt bei Preisen, die man bezahlen kann."
        soundbite: "Diese Maßnahmen helfen genau jenen, die es am dringendsten brauchen: Familien, die einen Großteil ihres Einkommens für Lebensmittel, Energie und Miete ausgeben."

      level_3_grundsatz:
        zielgruppe: "Progressive, Medien"
        kernbotschaften:
          - "Der Staat hat eine Verantwortung, wenn Märkte versagen."
          - "Preise sind kein Naturgesetz. Man kann eingreifen."
          - "Das unterscheidet Sozialdemokratie: Wir glauben, dass Politik einen Unterschied macht."
        soundbite: "Wir haben gezeigt: Doch, man kann in Preise eingreifen. MwSt-Senkung, Mietpreisbremse, Günstiger-Strom-Gesetz. Das funktioniert."

    # Kernaussagen (für schnellen Zugriff)
    kernaussagen:
      headline: "Unsere Maßnahmen wirken. Die Teuerung ist halbiert."
      level_1: "2 Prozent Inflation – niedrigster Stand seit 14 Monaten. Energie minus 4,9 Prozent."
      level_2: "Für Familien, die einen Großteil für Miete, Strom und Lebensmittel ausgeben."
      level_3: "Politik kann Preise ordnen. MwSt-Senkung, Mietbremse, Günstiger-Strom-Gesetz beweisen es."
      closer: "Ordnung in der Wirtschaft heißt: Preise, die sich Menschen leisten können."

    # Killer-Fakten (6 Quick Reference)
    killer_fakten:
      - fakt: "2% Inflation"
        detail: "Niedrigster Stand seit Dezember 2024"
        quelle: "Statistik Austria, 04.02.2026"
      - fakt: "Halbiert in 1 Monat"
        detail: "Dezember 4%, Jänner 2%"
        quelle: "Statistik Austria"
      - fakt: "Energie -4,9%"
        detail: "Dämpft Inflation um 1,2 Prozentpunkte"
        quelle: "Statistik Austria"
      - fakt: "1,4 Mrd. € Entlastung"
        detail: "Durch SPÖ-Maßnahmen bis Ende 2026"
        quelle: "SPÖ-Finanzsprecher Krainer"
      - fakt: "MwSt-Halbierung kommt Juli"
        detail: "Auf Grundnahrungsmittel"
        quelle: "Regierungsprogramm"
      - fakt: "Österreichtarif Verbund"
        detail: "Ab März günstigerer Strom"
        quelle: "Verbund-Ankündigung"

    # SPÖ-Handschrift (Attribution)
    spoe_handschrift:
      massnahmen:
        - name: "MwSt-Halbierung auf Grundnahrungsmittel"
          status: "beschlossen, Start Juli 2026"
        - name: "Mietpreisbremsen"
          status: "umgesetzt, auch unregulierte Mieten"
        - name: "Günstiger-Strom-Gesetz"
          status: "umgesetzt, wirkt bereits"
        - name: "Österreichtarif Verbund"
          status: "ab März 2026"
      attribution_regel: "IMMER konkrete Maßnahmen nennen, nie nur 'WIR haben gesenkt'"

    # FPÖ-Abgrenzung
    fpoe_abgrenzung:
      kern_unterscheidung:
        fpoe: "SCHIMPFT über Teuerung, macht nichts"
        spoe: "SENKT die Teuerung durch konkrete Maßnahmen"
      track_record_konter: |
        Unter FPÖ-Regierungsbeteiligung 2017-2019:
        - Keine MwSt-Senkung
        - Keine Mietpreisbremse
        - Kein Eingriff in Energiepreise
        - Null Maßnahmen gegen Teuerung
        Die FPÖ redet über Teuerung. Wir bekämpfen sie.
      konter_sammlung:
        - angriff: "Inflation immer noch zu hoch!"
          konter: "Stimmt. Deshalb arbeiten wir weiter. Was ist euer Plan? Ach, ihr habt keinen."
        - angriff: "Höher als in Deutschland!"
          konter: "Wir vergleichen uns mit uns selbst. Halbiert in einem Monat. Das zählt."
        - angriff: "Das ist nur der Basiseffekt!"
          konter: "Das BMF sagt klar: Es geht ÜBER den Basiseffekt hinaus. Energie minus 5%. Das ist Politik."
        - angriff: "Die Menschen spüren nichts!"
          konter: "200 Euro weniger Stromrechnung. Miete nicht um 10% gestiegen. Das spürt man."

    # Verbotene Formulierungen
    verboten:
      - formulierung: "Wir haben die Inflation besiegt"
        grund: "Überheblich, zu früh"
        besser: "Wir sind auf dem richtigen Weg"
      - formulierung: "WIR haben sie gesenkt (allein)"
        grund: "Koalitionspartner, Faktencheck-Risiko"
        besser: "Unsere Maßnahmen wirken"
      - formulierung: "MASSIV gesenkt"
        grund: "Übertreibung"
        besser: "Halbiert (faktisch korrekt)"
      - formulierung: "Dank der SPÖ"
        grund: "Arrogant"
        besser: "Dank gezielter Politik"
      - formulierung: "Die ÖVP wollte das nicht"
        grund: "Koalition beschädigen"
        besser: "Nicht erwähnen"
      - formulierung: "Inflation ist kein Problem mehr"
        grund: "Dienstleistungen noch +3,8%"
        besser: "Wir arbeiten weiter"

    # Pflicht-Formulierungen
    pflicht:
      bei_jedem_statement:
        - "KONKRETE ZAHL nennen (2%, halbiert, 14-Monats-Tief)"
        - "KONKRETE MASSNAHME nennen (MwSt, Mieten, Strom)"
        - "FÜR WEN (Familien, arbeitende Mitte)"
        - "NICHT FERTIG (Wir arbeiten weiter, noch nicht am Ziel)"

    # Segment-Targeting
    segment_targeting:
      - segment: "SPÖ-Kernwähler"
        betonung: "Wir haben geliefert. MwSt, Mieten, Energie – unsere Themen."
        vermeiden: "Zu viel Koalitions-Lob"
      - segment: "Gewerkschaft"
        betonung: "Reallöhne steigen wieder"
        vermeiden: "Abstrakte Zahlen"
      - segment: "Progressive Mitte"
        betonung: "Staat kann eingreifen + Ordnungs-Frame"
        vermeiden: "FPÖ-Bashing"
      - segment: "Konservative Mitte"
        betonung: "Gezielte Eingriffe, keine Gießkanne"
        vermeiden: "Linke Rhetorik"
      - segment: "Verunsicherte"
        betonung: "Konkrete Zahlen, einfache Sprache"
        vermeiden: "Komplexe Erklärungen"
      - segment: "Ehemalige FPÖ"
        betonung: "FPÖ redet, wir handeln + Track Record"
        vermeiden: "Moral, Belehrung"

    # Sujet-Kritik (aus Session)
    sujet_kritik:
      bewertung: "RISKANT"
      probleme:
        - problem: "'WIR HABEN SIE MASSIV GESENKT'"
          risiko: "Faktisch falsch – Hauptgrund ist Basiseffekt"
          empfehlung: "'Unsere Maßnahmen wirken'"
        - problem: "Alleinattribution"
          risiko: "Koalitionsspannung mit ÖVP/NEOS"
          empfehlung: "'Politik handelt' statt 'WIR allein'"
        - problem: "'MASSIV'"
          risiko: "Übertreibung, Arroganz-Vorwurf"
          empfehlung: "'Halbiert' (faktisch korrekt)"
        - problem: "Kein Ordnungs-Frame"
          risiko: "Strategiebruch"
          empfehlung: "Ordnen statt Spalten integrieren"

