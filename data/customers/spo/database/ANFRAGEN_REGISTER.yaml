        inhalt: "Statistik Austria: Ende Basiseffekt + Energiepreisrückgänge"
      - typ: "BMF-Argumentation"
        datum: "2026-02-04"
        inhalt: "Gezielte Eingriffe zeigen Wirkung, MwSt-Senkung + Energiepreissenkungen erwartet"

    # ===================================================================
    # SEGMENT-TIEFENANALYSE (NEU 2026-02-04)
    # ===================================================================
    segment_tiefenanalyse:
      kernthese: "Inflation trifft jeden – aber ANDERS. Gleiche Botschaft für alle = Niemanden erreichen."

      segmente:
        - id: "SEG-INF-01"
          name: "Kernwähler"
          beschreibung: "Gewerkschaftsnah, Arbeiter:innen"
          wie_sie_inflation_erleben:
            - "Reallohnverlust trotz Lohnerhöhung ('Ich krieg mehr, hab weniger')"
            - "Fixkosten fressen Budget (Miete, Strom, Heizen)"
            - "Jede Preiserhöhung = konkrete Entscheidung"
          psychologischer_schmerzpunkt: "KONTROLLVERLUST + STATUSANGST: 'Ich arbeite Vollzeit und kann mir weniger leisten als meine Eltern'"
          was_sie_hoeren_wollen:
            - "Arbeit muss sich wieder lohnen"
            - "Wer arbeitet, darf nicht der Dumme sein"
            - "Konkrete Entlastung in Euro (nicht Prozent)"
          messaging: "Dank MwSt-Senkung: 80 Euro weniger beim Wocheneinkauf pro Monat. Das ist Geld, das bei euch bleibt – nicht bei Konzernen."
          risiko_richtung_fpoe: "HOCH – Wenn Inflation als 'Eliten-Versagen' geframt wird"

        - id: "SEG-INF-02"
          name: "Progressive Mitte"
          beschreibung: "Urbane Akademiker:innen"
          wie_sie_inflation_erleben:
            - "Können es sich leisten, ärgern sich über Ungerechtigkeit"
            - "Sorgen sich um Gesellschaft, nicht primär um sich selbst"
            - "Sehen Inflation als systemisches Problem"
          psychologischer_schmerzpunkt: "MORALISCHE EMPÖRUNG + ZUKUNFTSANGST: 'Die Schwächsten zahlen den Preis für die Krisen der Reichen'"
          was_sie_hoeren_wollen:
            - "Systemische Lösungen (nicht nur Symptombekämpfung)"
            - "Fairness-Argument (wer zahlt, wer profitiert)"
            - "Europäische/globale Einordnung"
          messaging: "Inflation ist kein Naturgesetz. Sie ist das Ergebnis von Entscheidungen – und kann durch Entscheidungen geordnet werden. Österreich: 2%. Eurozone: 2,4%. Das ist aktive Politik."
          risiko_richtung: "GRÜNE/NEOS – Wenn SPÖ zu populistisch wirkt"

        - id: "SEG-INF-03"
          name: "Enttäuschte Mitte"
          beschreibung: "Ehem. ÖVP, verunsichert"
          wie_sie_inflation_erleben:
            - "'Mein Erspartes wird weniger wert' (Realzins-Denken)"
            - "Angst vor Altersarmut trotz Lebensleistung"
            - "Misstrauen gegenüber ALLEN Parteien"
          psychologischer_schmerzpunkt: "VERTRAUENSVERLUST + ENTWERTUNGSANGST: 'Ich habe alles richtig gemacht – und werde trotzdem bestraft'"
          was_sie_hoeren_wollen:
            - "Stabilität und Verlässlichkeit"
            - "'Ordnung' (nicht Chaos, nicht Experiment)"
            - "Schutz des Ersparten, der Pension"
          messaging: "2% Inflation heisst: Ihr Erspartes verliert weniger an Wert. Das ist kein Zufall – das ist das Ergebnis von Ordnungspolitik. Wir stabilisieren, was andere destabilisiert haben."
          risiko_richtung_fpoe: "SEHR HOCH – Kickl bietet 'einfache Antworten' auf komplexe Ängste"

        - id: "SEG-INF-04"
          name: "Junge Erwachsene"
          beschreibung: "18-30, prekarisiert"
          wie_sie_inflation_erleben:
            - "Wohnung unleistbar ('WG mit 30 ist nicht cool, sondern traurig')"
            - "Studium/Ausbildung + Nebenjob reicht nicht"
            - "Lebensentwürfe werden verschoben (Familie, Eigentum)"
          psychologischer_schmerzpunkt: "ZUKUNFTSDIEBSTAHL + GENERATIONENUNGERECHTIGKEIT: 'Boomer hatten alles – wir kriegen die Rechnung'"
          was_sie_hoeren_wollen:
            - "Konkrete Perspektive (nicht 'irgendwann')"
            - "Wohnen muss leistbar werden"
            - "Anerkennung ihrer Situation (nicht Belehrung)"
          messaging: "Mietbremse heisst: Deine Miete steigt nicht ins Unendliche. 2% Inflation heisst: Dein Einstiegsgehalt ist nächstes Jahr mehr wert, nicht weniger. Das ist der Anfang – nicht das Ende."
          risiko: "NICHTWÄHLEN – Politikverdrossenheit, 'Alle gleich'"

        - id: "SEG-INF-05"
          name: "Ländlicher Raum"
          beschreibung: "Pendler:innen, Häuslbauer"
          wie_sie_inflation_erleben:
            - "Spritpreise = täglich spürbar (Pendeln zur Arbeit)"
            - "Heizkosten für grosses Haus (Gas/Öl-Abhängigkeit)"
            - "Kredit für Haus wird teurer (Zinsen + Inflation)"
          psychologischer_schmerzpunkt: "MOBILITÄTSABHÄNGIGKEIT + INFRASTRUKTUR-NEID: 'Ich MUSS Auto fahren – und werde dafür bestraft'"
          was_sie_hoeren_wollen:
            - "Energiekosten-Entlastung (nicht Verbote)"
            - "Respekt für ländliche Lebensweise"
            - "Konkrete Massnahmen für Pendler"
          messaging: "Energie -4,9%. Das spürst du an der Tankstelle und bei der Heizkostenabrechnung. Günstiger Strom heisst: Wer am Land lebt, wird nicht bestraft – sondern entlastet."
          risiko_richtung_fpoe: "EXTREM HOCH – Kickl inszeniert sich als 'Anwalt des kleinen Mannes'"

        - id: "SEG-INF-06"
          name: "Swing-Voters"
          beschreibung: "Wechselwähler, Unentschlossene"
          wie_sie_inflation_erleben:
            - "Pragmatisch: 'Wer löst das Problem?'"
            - "Vergleichen aktiv (vorher/nachher, Österreich/Ausland)"
            - "Wenig ideologisch, ergebnisorientiert"
          psychologischer_schmerzpunkt: "ENTSCHEIDUNGSUNSICHERHEIT + KOMPETENZ-SEHNSUCHT: 'Ich will einfach, dass es jemand KANN'"
          was_sie_hoeren_wollen:
            - "Nachweisbare Ergebnisse (Zahlen, Vergleiche)"
            - "Kompetenz-Signale ('wir wissen, was wir tun')"
            - "Keine ideologischen Grabenkämpfe"
          messaging: "Jänner 2024: 4,5% Inflation. Jänner 2025: 2%. Das ist kein Versprechen – das ist ein Ergebnis. Politik, die liefert statt streitet."
          risiko: "Gehen zu dem, der 'am kompetentesten wirkt' – Kickl inszeniert das"

    # ===================================================================
    # FPÖ-ANGRIFFSSZENARIEN (NEU 2026-02-04)
    # ===================================================================
    fpoe_angriffsszenarien:
      vorwort: "Inflation ist das Gift, das den Boden für Populisten bereitet. Hier die erwarteten Angriffe und Konter."

      angriffe:
        - id: "ATK-INF-01"
          name: "Die Regierung hat versagt"
          was_kickl_sagt: "4 Jahre Teuerung unter ÖVP-Grün, jetzt mit SPÖ-Beteiligung. Die Regierungsparteien haben das Volk ausbluten lassen."
          warum_es_wirkt:
            - "Einfache Kausalität (Regierung = schuld)"
            - "FPÖ als 'Opposition' erscheint unschuldig"
            - "Retrospektive Verzerrung"
          konter:
            fakten: "Inflation war ein globales Phänomen – Krieg, Lieferketten, Energie. Österreich: 2%. Deutschland: 2,3%. Wir liegen im europäischen Schnitt – TROTZ höherer Energieabhängigkeit."
            ordnung: "Die FPÖ hätte NICHTS getan – ausser Sündenböcke suchen. Wir haben gehandelt: MwSt-Senkung, Mietbremse, Strompreisdeckel. Das ist der Unterschied zwischen Ordnen und Hetzen."
            offensive: "Herr Kickl, Sie waren Innenminister 2017-2019. Was haben SIE gegen steigende Mieten getan? Nichts. Sie reden – wir handeln."

        - id: "ATK-INF-02"
          name: "Die EU-Sanktionen sind schuld"
          was_kickl_sagt: "Die Brüssel-hörigen Parteien haben Sanktionen mitgetragen, die UNS schaden. Russisches Gas war billig – jetzt zahlen WIR."
          warum_es_wirkt:
            - "Klarer Sündenbock (EU, 'die anderen')"
            - "Enthält Wahrheitskern (Energiepreise waren Treiber)"
            - "Bedient Souveränitäts-Sehnsucht"
          konter:
            fakten: "Die Energiepreise sind bereits um 4,9% GESUNKEN. Nicht weil wir zu Putin gekrochen sind – sondern weil wir Alternativen aufgebaut haben."
            werte: "Herr Kickl will Österreichs Sicherheit von einem Diktator abhängig machen, der einen Angriffskrieg führt. Das ist nicht Neutralität – das ist Unterwerfung."
            killer_fakt: "Ungarn hat keine Sanktionen mitgetragen. Inflation dort: 4,0%. Österreich MIT Sanktionen: 2,0%. Soviel zu Ihrer Theorie."

        - id: "ATK-INF-03"
          name: "Zuwanderung treibt die Inflation"
          gefaehrlichkeit: "HOCH"
          was_kickl_sagt: "Jeder Zuwanderer kostet. Wohnungen werden knapper, Mieten steigen. Der kleine Österreicher zahlt die Zeche."
          warum_es_wirkt:
            - "SCARCITY FRAMING: 'Es ist nicht genug für alle da'"
            - "ZERO-SUM THINKING: 'Was die kriegen, fehlt mir'"
            - "SICHTBARER SÜNDENBOCK: Menschen, nicht Systeme"
          falle: "NIEMALS in die 'Kosten von Migration'-Debatte einsteigen – das ist SEIN Framing, SEIN Spielfeld!"
          konter:
            reframing: "Herr Kickl, die Inflation kommt von Energiepreisen, Lieferketten und globalen Krisen – nicht von Menschen, die hier arbeiten. Sie wollen vom eigenen Versagen ablenken."
            ordnung: "Wir ordnen die Zuwanderung – mit klaren Regeln. Aber wir hetzen nicht Menschen gegeneinander. Ordnen heisst Lösungen schaffen – nicht Feindbilder."
            moral: "Wer Menschen gegeneinander ausspielt, will nicht ordnen – der will spalten."

        - id: "ATK-INF-04"
          name: "Unter uns war alles besser"
          was_kickl_sagt: "2017-2019 unter FPÖ: Inflation unter 2%. Stabiles Österreich. Dann kam Corona – aber die ANTWORT der Regierung war falsch."
          warum_es_wirkt:
            - "Nostalgie-Bias ('früher war alles besser')"
            - "Selective Memory"
            - "Kausalitätsillusion (FPÖ = niedrige Inflation)"
          konter:
            fakten_zerstoerung: "2017-2019 war die Inflation niedrig – IN GANZ EUROPA. Kein Krieg, keine Pandemie. Das war nicht Ihre Leistung – das war Glück. Und was haben Sie mit dem Glück gemacht? Nichts. Keine Investition in erneuerbare Energie, keine Mietbremsen, keine Vorsorge."
            zukunft: "Sie leben in der Vergangenheit. Wir gestalten die Zukunft. 2% Inflation ist der Beweis: Ordnung wirkt."

        - id: "ATK-INF-05"
          name: "Nur ich verstehe das Volk"
          gefaehrlichkeit: "HÖCHSTE"
          was_kickl_sagt: "Die Eliten in Wien feiern sich für 2% Inflation. Aber gehen Sie mal in einen Supermarkt! Die Menschen SPÜREN, dass alles teurer ist."
          warum_es_wirkt:
            - "AUTHENTIZITÄTS-CLAIM: 'Ich bin wie ihr'"
            - "ELITE VS. VOLK: Universelles populistisches Narrativ"
            - "ERFAHRUNGS-VALIDIERUNG: 'Was ihr fühlt, ist real'"
            - "STATISTIK-SKEPSIS: 'Zahlen lügen, Gefühl ist echt'"
          falle: "NIEMALS die Gefühle der Menschen delegitimieren! 'Die Inflation IST gesunken' klingt wie 'Stellt euch nicht so an'."
          konter:
            validierung_plus_erklaerung: "Natürlich spüren die Menschen noch die Teuerung der letzten Jahre. Preise, die 2022 gestiegen sind, sind ja nicht wieder gefallen. 2% Inflation heisst nicht, dass alles billig ist – es heisst, dass es AUFHÖRT, immer teurer zu werden. Deshalb arbeiten wir weiter."
            authentizitaets_counter: "Herr Kickl verdient 16.000 Euro im Monat als Abgeordneter. Er fährt Dienstwagen, hat Chauffeur. Er ist nicht 'einer von uns' – er spielt eine Rolle."
            umkehrung: "Wer versteht das Volk wirklich? Wer Sündenböcke sucht – oder wer Lösungen liefert? 2% Inflation ist keine Statistik – das sind 80 Euro mehr im Monat für eine Familie."

    # ===================================================================
    # POPULISMUS-INFLATION-NEXUS (NEU 2026-02-04)
    # ===================================================================
    populismus_inflation_nexus:
      kernthese: "Inflation ist das Gift, das den Boden für Populisten bereitet – empirisch belegt, nicht nur Metapher."

      wissenschaftliche_evidenz:
        - studie: "Funke et al. (2016) - 'Going to Extremes'"
          ergebnis: "Nach Finanzkrisen: +30% Stimmen für Extremparteien, Effekt hält 10+ Jahre"
        - studie: "Algan et al. (2017) - 'The European Trust Crisis'"
          ergebnis: "Vertrauensverlust in Institutionen korreliert mit wirtschaftlicher Unsicherheit (r = 0.67)"
        - studie: "Guiso et al. (2017) - 'Demand for Populism'"
          ergebnis: "Wirtschaftliche Unsicherheit erhöht Populismus-Nachfrage. ABER: Nicht Armut – ABSTIEGSANGST."

      kern_erkenntnis: "Nicht die Armen wählen Populisten – sondern die, die ANGST HABEN, arm zu werden."

      warum_inflation_katalysator:
        - "Trifft die Mitte (nicht nur die Armen)"
        - "Ist täglich SPÜRBAR (Supermarkt, Tankstelle)"
        - "Erscheint UNKONTROLLIERBAR"
        - "Erzeugt das Gefühl: 'Das System schützt mich nicht'"

      psychologische_kausalkette:
        stufe_1:
          name: "ÖKONOMISCHER SCHOCK"
          beschreibung: "'Mein Geld ist weniger wert' → Realer Kaufkraftverlust"
        stufe_2:
          name: "KONTROLLVERLUST"
          beschreibung: "'Ich kann nichts dagegen tun' → Preise steigen, egal was ich mache"
        stufe_3:
          name: "VERTRAUENSEROSION"
          beschreibung: "'Die da oben haben versagt' → Institutionen = schuld"
        stufe_4:
          name: "SÜNDENBOCK-SUCHE"
          beschreibung: "'Wer ist schuld?' → Einfache Ziele (Ausländer, Eliten, EU)"
        stufe_5:
          name: "AUTORITÄRE SEHNSUCHT"
          beschreibung: "'Jemand muss durchgreifen' → 'Starker Mann' verspricht einfache Lösungen"
        endpunkt: "Demokratie wird als 'Teil des Problems' gesehen"

      verhaltens_oekonomische_mechanismen:
        - mechanismus: "VERLUSTAVERSION (λ ≈ 2.25)"
          erklaerung: "Verluste wiegen 2x schwerer als Gewinne. 'Mein Geld ist weniger wert' = SCHMERZ"
          populisten_nutzen: "Versprechen 'Schutz vor Verlust'"
        - mechanismus: "ATTRIBUTION ERROR"
          erklaerung: "Menschen suchen SICHTBARE Schuldige (nicht komplexe Systeme)"
          populisten_nutzen: "Liefern Sündenböcke: EU, Ausländer, Eliten"
        - mechanismus: "UNSICHERHEITSAVERSION"
          erklaerung: "Inflation = Kontrollverlust über Zukunft"
          populisten_nutzen: "Bieten 'Gewissheit' (falsche, aber beruhigende)"
        - mechanismus: "STATUSBEDROHUNG"
          erklaerung: "Abstiegsangst aktiviert Identitätspolitik"
          populisten_nutzen: "Bieten Identität durch Abgrenzung ('Wir vs. Die')"

      existenzielles_argument:
        these: "Wer das Inflations-Narrativ verliert, verliert die Demokratie."
        gruende:
          - "Inflation ist das Thema der MITTE – wer die Mitte verliert, verliert Mehrheiten"
          - "Inflation ist EMOTIONAL, nicht rational – Populisten sprechen Gefühle an"
          - "Inflation öffnet die TÜR für alles andere – Vertrauen ist unteilbar"
          - "Historische Warnung: Weimarer Republik → NSDAP"
        schlussfolgerung: "Inflation ist nicht 'ein Thema unter vielen'. Es ist DAS Schlachtfeld, auf dem sich entscheidet, ob die Demokratie das Vertrauen der Mitte behält."

      immunisierungs_strategie:
        ebene_1:
          name: "KONTROLLE ZURÜCKGEBEN"
          problem: "Menschen fühlen sich ohnmächtig"
          loesung: "Zeigen, dass HANDELN möglich ist"
          kommunikation: "2% Inflation ist kein Zufall – es ist das Ergebnis von politischen Entscheidungen. MwSt-Senkung: Entscheidung. Mietbremse: Entscheidung. Politik KANN die Preise ordnen – wenn sie will."
          botschaft: "Du bist nicht ohnmächtig. WIR handeln für dich."
        ebene_2:
          name: "KOMPLEXITÄT EHRLICH ERKLÄREN"
          problem: "Populisten bieten einfache Erklärungen (falsche)"
          loesung: "Ehrliche Erklärungen, die trotzdem verständlich sind"
          kommunikation: "Die Teuerung hatte viele Ursachen: Krieg, Lieferketten, Energie. Wer Ihnen sagt, dass EIN Schuldiger reicht, lügt Sie an. Aber: Wir können die AUSWIRKUNGEN ordnen."
          botschaft: "Die Welt ist komplex – aber wir navigieren sie für dich."
        ebene_3:
          name: "ZUKUNFT STATT VERGANGENHEIT"
          problem: "Populisten verkaufen Nostalgie ('früher war alles besser')"
          loesung: "Positive Zukunftsvision"
          kommunikation: "Wir schauen nicht zurück – wir schauen nach vorn. 2% Inflation ist der Anfang. Das Ziel: Ein Österreich, in dem sich Arbeit wieder lohnt."
          botschaft: "Die beste Zeit kommt noch – wenn wir ordnen."
        ebene_4:
          name: "SPALTER BENENNEN"
          problem: "Populisten behaupten, 'für das Volk' zu sprechen"
          loesung: "Ihre METHODE entlarven, nicht nur ihre Inhalte"
          kommunikation: "Herr Kickl sucht keine Lösungen – er sucht Sündenböcke. Er will nicht ordnen – er will spalten. Spalten ist einfach. Ordnen ist schwer. Aber nur Ordnung bringt Ergebnisse."
          botschaft: "Populismus ist Teil des Problems, nicht die Lösung."

      meta_soundbite:
        kurz: "POPULISTEN LEBEN VON DER KRISE. WIR LÖSEN SIE."
        lang: |
          Herr Kickl braucht die Teuerung. Er braucht die Angst. Ohne Krise hat er nichts zu sagen.
          Wir brauchen keine Krise. Wir haben einen Plan. Und wir setzen ihn um.
          Das ist der Unterschied zwischen Reden und Handeln. Zwischen Spalten und Ordnen. Zwischen Populismus und Politik.

