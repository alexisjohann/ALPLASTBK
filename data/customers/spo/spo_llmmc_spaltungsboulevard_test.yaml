# =============================================================================
# LLMMC-TEST: "SPALTUNGSBOULEVARD" - WÄHLERGRUPPEN-REAKTION
# =============================================================================
# Methodik: LLM Monte Carlo Estimation
# Stimulus: Das Wort "Spaltungsboulevard" als Label für Krone/Heute/Oe24
# Session: EBF-S-2026-01-27-POL-002
# =============================================================================

metadata:
  test_id: "LLMMC-SPO-001"
  stimulus: "Spaltungsboulevard"
  context: |
    Babler verwendet das Wort "Spaltungsboulevard" um Boulevard-Medien
    zu charakterisieren, die Falschmeldungen verbreiten.
    Beispiel: "Was die Krone hier macht, ist Spaltungsboulevard."
  date: "2026-01-27"
  n_simulations: 1000  # Konzeptuell

# =============================================================================
# REAKTIONS-DIMENSIONEN
# =============================================================================
dimensions:
  - id: D1
    name: "Verständnis"
    question: "Versteht die Person, was gemeint ist?"
    scale: "0 = gar nicht, 1 = sofort klar"

  - id: D2
    name: "Zustimmung"
    question: "Stimmt die Person der Charakterisierung zu?"
    scale: "0 = lehnt ab, 1 = stimmt voll zu"

  - id: D3
    name: "Emotionale Resonanz"
    question: "Löst das Wort eine emotionale Reaktion aus?"
    scale: "0 = kalt, 1 = stark aktiviert"

  - id: D4
    name: "Frame-Verstärkung"
    question: "Verstärkt es den 'Ordnen statt Spalten'-Frame?"
    scale: "0 = schwächt, 1 = verstärkt stark"

  - id: D5
    name: "Wahlverhalten-Effekt"
    question: "Macht es SPÖ-Wahl wahrscheinlicher?"
    scale: "0 = unwahrscheinlicher, 0.5 = neutral, 1 = wahrscheinlicher"

# =============================================================================
# WÄHLER-SEGMENTE & ERGEBNISSE
# =============================================================================
segments:

  # ---------------------------------------------------------------------------
  # SEGMENT 1: SPÖ-KERNWÄHLER
  # ---------------------------------------------------------------------------
  - id: SEG-01
    name: "SPÖ-Kernwähler"
    description: "Traditionelle Arbeiter, Gewerkschaft, 45-65 Jahre"
    size_percent: 18
    current_spo_vote_intention: 0.85

    persona: |
      Franz, 58, Metallergewerkschaft, liest Krone aus Gewohnheit,
      aber traut ihr nicht mehr. Findet Babler "endlich einer der
      was sagt". Verärgert über Falschmeldungen.

    reactions:
      D1_verständnis:
        estimate: 0.85
        range: [0.75, 0.92]
        reasoning: "Versteht sofort: Die spalten, wir ordnen"

      D2_zustimmung:
        estimate: 0.88
        range: [0.80, 0.95]
        reasoning: "Starke Zustimmung - fühlt sich bestätigt"

      D3_emotionale_resonanz:
        estimate: 0.82
        range: [0.70, 0.90]
        reasoning: "Aktiviert - endlich sagt's einer"

      D4_frame_verstärkung:
        estimate: 0.90
        range: [0.82, 0.95]
        reasoning: "Passt perfekt zu seiner Weltsicht"

      D5_wahlverhalten:
        estimate: 0.72
        range: [0.65, 0.80]
        reasoning: "War eh SPÖ, aber jetzt motivierter"

    overall_score:
      mean: 0.83
      range: [0.75, 0.90]
      verdict: "SEHR POSITIV"

  # ---------------------------------------------------------------------------
  # SEGMENT 2: SPÖ-GRÜNE-SWING
  # ---------------------------------------------------------------------------
  - id: SEG-02
    name: "SPÖ-Grüne-Swing"
    description: "Urban, Akademiker, 25-45 Jahre, progressiv"
    size_percent: 12
    current_spo_vote_intention: 0.45

    persona: |
      Lisa, 34, Architektin, Wien, wählt zwischen SPÖ und Grünen.
      Liest Standard, verachtet Boulevard. Findet Medienkritik wichtig,
      aber mag keine "populistische Rhetorik".

    reactions:
      D1_verständnis:
        estimate: 0.95
        range: [0.90, 0.98]
        reasoning: "Versteht sofort und analysiert das Framing"

      D2_zustimmung:
        estimate: 0.75
        range: [0.65, 0.85]
        reasoning: "Inhaltlich ja, aber findet 'Boulevard-Bashing' etwas billig"

      D3_emotionale_resonanz:
        estimate: 0.55
        range: [0.40, 0.68]
        reasoning: "Eher rational als emotional"

      D4_frame_verstärkung:
        estimate: 0.70
        range: [0.58, 0.80]
        reasoning: "Mag den Kontrast, aber bevorzugt differenziertere Sprache"

      D5_wahlverhalten:
        estimate: 0.55
        range: [0.48, 0.62]
        reasoning: "Leicht positiv, aber nicht entscheidend"

    overall_score:
      mean: 0.70
      range: [0.60, 0.79]
      verdict: "POSITIV"

  # ---------------------------------------------------------------------------
  # SEGMENT 3: SPÖ-FPÖ-SWING (KRITISCHES SEGMENT!)
  # ---------------------------------------------------------------------------
  - id: SEG-03
    name: "SPÖ-FPÖ-Swing"
    description: "Arbeiter, verunsichert, migrations-skeptisch, 35-55 Jahre"
    size_percent: 15
    current_spo_vote_intention: 0.35

    persona: |
      Michael, 47, Lagerarbeiter, Linz, hat früher SPÖ gewählt,
      jetzt unsicher. Liest Krone und Heute täglich. Findet
      "die da oben" alle gleich. Migration ist sein Hauptthema.

    reactions:
      D1_verständnis:
        estimate: 0.72
        range: [0.60, 0.82]
        reasoning: "Versteht es, aber fragt sich: Gilt das auch für ORF?"

      D2_zustimmung:
        estimate: 0.48
        range: [0.35, 0.60]
        reasoning: "Ambivalent - liest ja selbst Krone, fühlt sich angegriffen?"

      D3_emotionale_resonanz:
        estimate: 0.60
        range: [0.45, 0.72]
        reasoning: "Reagiert, aber nicht eindeutig positiv"

      D4_frame_verstärkung:
        estimate: 0.45
        range: [0.32, 0.58]
        reasoning: "Kauft den Frame nur teilweise"

      D5_wahlverhalten:
        estimate: 0.48
        range: [0.40, 0.55]
        reasoning: "Neutral bis leicht negativ - fühlt sich bevormundet?"

    overall_score:
      mean: 0.55
      range: [0.42, 0.65]
      verdict: "NEUTRAL / RISKANT"

    warning: |
      ACHTUNG: Dieses Segment liest selbst Krone/Heute.
      "Spaltungsboulevard" könnte als Angriff auf IHRE Medien verstanden werden.
      Risiko: "Die SPÖ hält mich für dumm weil ich Krone lese"

  # ---------------------------------------------------------------------------
  # SEGMENT 4: ÖVP-WÄHLER
  # ---------------------------------------------------------------------------
  - id: SEG-04
    name: "ÖVP-Wähler"
    description: "Bürgerlich, konservativ, 45-70 Jahre"
    size_percent: 22
    current_spo_vote_intention: 0.08

    persona: |
      Elisabeth, 62, Unternehmerin, Salzburg, ÖVP-Stammwählerin.
      Liest Presse und SN. Findet Boulevard "unter ihrem Niveau",
      aber auch SPÖ-Medienkritik "heuchlerisch".

    reactions:
      D1_verständnis:
        estimate: 0.88
        range: [0.80, 0.94]
        reasoning: "Versteht es sofort"

      D2_zustimmung:
        estimate: 0.40
        range: [0.28, 0.52]
        reasoning: "Inhaltlich teilweise, aber traut SPÖ-Motiven nicht"

      D3_emotionale_resonanz:
        estimate: 0.35
        range: [0.22, 0.48]
        reasoning: "Kalt - nicht ihr Kampf"

      D4_frame_verstärkung:
        estimate: 0.30
        range: [0.18, 0.42]
        reasoning: "Sieht es als SPÖ-Taktik, nicht als Prinzip"

      D5_wahlverhalten:
        estimate: 0.12
        range: [0.08, 0.18]
        reasoning: "Ändert nichts an ihrer ÖVP-Präferenz"

    overall_score:
      mean: 0.41
      range: [0.31, 0.51]
      verdict: "NEUTRAL BIS NEGATIV"

  # ---------------------------------------------------------------------------
  # SEGMENT 5: FPÖ-WÄHLER
  # ---------------------------------------------------------------------------
  - id: SEG-05
    name: "FPÖ-Wähler"
    description: "Protest-orientiert, anti-establishment, alle Altersgruppen"
    size_percent: 28
    current_spo_vote_intention: 0.05

    persona: |
      Christian, 42, Handwerker, Kärnten, FPÖ-Wähler seit 2015.
      Liest Krone und Oe24, hasst "Mainstream-Medien" (= ORF, Standard).
      Findet FPÖ "sagt was Sache ist".

    reactions:
      D1_verständnis:
        estimate: 0.70
        range: [0.55, 0.82]
        reasoning: "Versteht es, aber interpretiert es anders"

      D2_zustimmung:
        estimate: 0.15
        range: [0.05, 0.28]
        reasoning: "Lehnt ab - Krone ist SEIN Medium, nicht 'Spaltung'"

      D3_emotionale_resonanz:
        estimate: 0.75
        range: [0.60, 0.88]
        reasoning: "Stark aktiviert - aber NEGATIV"

      D4_frame_verstärkung:
        estimate: 0.10
        range: [0.02, 0.20]
        reasoning: "Verstärkt seinen GEGEN-Frame: SPÖ = Elite"

      D5_wahlverhalten:
        estimate: 0.08
        range: [0.03, 0.15]
        reasoning: "Bestätigt seine FPÖ-Wahl"

    overall_score:
      mean: 0.36
      range: [0.25, 0.47]
      verdict: "NEGATIV"

    note: |
      Das Wort wird bei FPÖ-Wählern nicht funktionieren - aber das ist
      auch nicht das Ziel. Es geht um Mobilisierung der eigenen Basis
      und Swing-Voters, nicht um FPÖ-Rückholung.

  # ---------------------------------------------------------------------------
  # SEGMENT 6: NICHTWÄHLER / UNENTSCHLOSSENE
  # ---------------------------------------------------------------------------
  - id: SEG-06
    name: "Nichtwähler / Unentschlossene"
    description: "Politik-verdrossen, alle Altersgruppen"
    size_percent: 18
    current_spo_vote_intention: 0.20

    persona: |
      Sandra, 38, Verkäuferin, Wiener Neustadt, hat seit 2019 nicht
      gewählt. "Sind eh alle gleich." Liest Heute in der U-Bahn,
      interessiert sich nicht für Politik.

    reactions:
      D1_verständnis:
        estimate: 0.58
        range: [0.42, 0.72]
        reasoning: "Versteht grob, aber hinterfragt nicht"

      D2_zustimmung:
        estimate: 0.52
        range: [0.40, 0.65]
        reasoning: "Leichte Zustimmung - Boulevard nervt sie auch"

      D3_emotionale_resonanz:
        estimate: 0.40
        range: [0.28, 0.55]
        reasoning: "Schwache Resonanz - Politik-Müdigkeit"

      D4_frame_verstärkung:
        estimate: 0.48
        range: [0.35, 0.60]
        reasoning: "Nimmt den Frame teilweise auf"

      D5_wahlverhalten:
        estimate: 0.35
        range: [0.25, 0.48]
        reasoning: "Leicht mobilisierend, aber reicht nicht zum Wählen"

    overall_score:
      mean: 0.47
      range: [0.34, 0.60]
      verdict: "LEICHT POSITIV"

  # ---------------------------------------------------------------------------
  # SEGMENT 7: JUNGE WÄHLER (18-30)
  # ---------------------------------------------------------------------------
  - id: SEG-07
    name: "Junge Wähler"
    description: "18-30 Jahre, digital-nativ, Social Media"
    size_percent: 15
    current_spo_vote_intention: 0.28

    persona: |
      Lena, 24, Studentin, Graz, informiert sich über Instagram und
      TikTok. Liest keine Zeitung. Findet Klima wichtiger als Migration.
      Kennt Babler von Clips.

    reactions:
      D1_verständnis:
        estimate: 0.82
        range: [0.70, 0.92]
        reasoning: "Versteht Framing, kennt 'Clickbait'-Kritik"

      D2_zustimmung:
        estimate: 0.72
        range: [0.60, 0.82]
        reasoning: "Findet Medienkritik gut, aber Boulevard ist eh irrelevant für sie"

      D3_emotionale_resonanz:
        estimate: 0.55
        range: [0.40, 0.68]
        reasoning: "Mäßig - Boulevard ist 'Boomer-Medium'"

      D4_frame_verstärkung:
        estimate: 0.65
        range: [0.52, 0.78]
        reasoning: "Passt zu ihrer Medienkritik, aber andere Prioritäten"

      D5_wahlverhalten:
        estimate: 0.52
        range: [0.42, 0.62]
        reasoning: "Leicht positiv - macht SPÖ 'kämpferischer'"

    overall_score:
      mean: 0.65
      range: [0.53, 0.76]
      verdict: "POSITIV"

  # ---------------------------------------------------------------------------
  # SEGMENT 8: ÄLTERE WÄHLER (60+)
  # ---------------------------------------------------------------------------
  - id: SEG-08
    name: "Ältere Wähler"
    description: "60+ Jahre, traditionell, TV und Print"
    size_percent: 22
    current_spo_vote_intention: 0.32

    persona: |
      Gerhard, 71, Pensionist, ehemaliger ÖBB-Mitarbeiter, Steiermark.
      Liest Kleine Zeitung und schaut ZIB. Hat früher SPÖ gewählt,
      jetzt unentschlossen. "Die Jungen verstehen uns nicht mehr."

    reactions:
      D1_verständnis:
        estimate: 0.78
        range: [0.65, 0.88]
        reasoning: "Versteht es, braucht aber Erklärung"

      D2_zustimmung:
        estimate: 0.65
        range: [0.52, 0.78]
        reasoning: "Grundsätzlich ja - erinnert sich an seriöseren Journalismus"

      D3_emotionale_resonanz:
        estimate: 0.58
        range: [0.45, 0.72]
        reasoning: "Moderate Resonanz"

      D4_frame_verstärkung:
        estimate: 0.62
        range: [0.50, 0.75]
        reasoning: "Passt zu seinem Unbehagen mit Boulevard"

      D5_wahlverhalten:
        estimate: 0.55
        range: [0.45, 0.65]
        reasoning: "Leicht positiv - SPÖ zeigt Haltung"

    overall_score:
      mean: 0.64
      range: [0.51, 0.76]
      verdict: "POSITIV"

# =============================================================================
# AGGREGIERTE ERGEBNISSE
# =============================================================================
aggregated_results:

  by_segment_ranked:
    - rank: 1
      segment: "SPÖ-Kernwähler"
      score: 0.83
      verdict: "SEHR POSITIV"
      action: "Voll einsetzen - mobilisiert Basis"

    - rank: 2
      segment: "SPÖ-Grüne-Swing"
      score: 0.70
      verdict: "POSITIV"
      action: "Einsetzen - verstärkt mit Sachargumenten"

    - rank: 3
      segment: "Junge Wähler"
      score: 0.65
      verdict: "POSITIV"
      action: "Einsetzen - passt zu Social Media Kritik"

    - rank: 4
      segment: "Ältere Wähler"
      score: 0.64
      verdict: "POSITIV"
      action: "Einsetzen - mit Erklärung"

    - rank: 5
      segment: "SPÖ-FPÖ-Swing"
      score: 0.55
      verdict: "NEUTRAL / RISKANT"
      action: "⚠️ VORSICHT - kann als Angriff auf ihre Medien verstanden werden"

    - rank: 6
      segment: "Nichtwähler"
      score: 0.47
      verdict: "LEICHT POSITIV"
      action: "Einsetzen - aber nicht allein mobilisierend"

    - rank: 7
      segment: "ÖVP-Wähler"
      score: 0.41
      verdict: "NEUTRAL"
      action: "Kein Effekt - nicht Zielgruppe"

    - rank: 8
      segment: "FPÖ-Wähler"
      score: 0.36
      verdict: "NEGATIV"
      action: "Erwartbar - nicht Zielgruppe"

  weighted_average:
    # Gewichtet nach Segment-Größe und strategischer Relevanz
    method: "size × relevance"
    weights:
      SPÖ-Kernwähler: 0.25      # Wichtig: Mobilisierung
      SPÖ-Grüne-Swing: 0.15     # Wichtig: Koalition
      SPÖ-FPÖ-Swing: 0.20       # KRITISCH: Rückholung
      Junge-Wähler: 0.15        # Wichtig: Zukunft
      Ältere-Wähler: 0.10
      Nichtwähler: 0.10
      ÖVP-Wähler: 0.03
      FPÖ-Wähler: 0.02

    result:
      weighted_score: 0.62
      interpretation: "POSITIV mit Einschränkungen"

  dimension_summary:
    D1_verständnis:
      mean: 0.78
      verdict: "Wird verstanden"
    D2_zustimmung:
      mean: 0.57
      verdict: "Mehrheitliche Zustimmung"
    D3_emotionale_resonanz:
      mean: 0.58
      verdict: "Moderate Aktivierung"
    D4_frame_verstärkung:
      mean: 0.53
      verdict: "Frame funktioniert bei Zielgruppen"
    D5_wahlverhalten:
      mean: 0.42
      verdict: "Leicht positiver Effekt"

# =============================================================================
# EMPFEHLUNG
# =============================================================================
recommendation:

  verdict: "EINSETZEN MIT FLANKIERUNG"

  overall_assessment: |
    "Spaltungsboulevard" funktioniert gut bei:
    ✅ SPÖ-Kernwählern (mobilisierend)
    ✅ Grüne-Swing (verstärkend)
    ✅ Jungen Wählern (passt zu Medienkritik)
    ✅ Älteren Wählern (mit Erklärung)

    Riskant bei:
    ⚠️ SPÖ-FPÖ-Swing (könnten sich angegriffen fühlen)

    Irrelevant bei:
    ➖ ÖVP-Wählern (kein Effekt)
    ➖ FPÖ-Wählern (negativ, aber nicht Zielgruppe)

  risk_mitigation: |
    Für SPÖ-FPÖ-Swing IMMER kombinieren mit:
    1. "Ich verstehe, dass viele die Krone lesen"
    2. "Das Problem ist nicht, WER sie liest, sondern WAS sie schreibt"
    3. "2,7% werden zu 'Milliarden' - das ist das Problem"

    → Differenzieren zwischen LESERN (okay) und MACHERN (Spaltung)

  usage_guidelines:
    do:
      - "In Interviews verwenden wenn direkt nach Boulevard gefragt"
      - "Mit konkreten Fakten kombinieren (2,7% vs 4,8%)"
      - "Immer gefolgt von Lösung ('wir bringen Ordnung')"

    do_not:
      - "Nicht als Haupt-Botschaft, nur als Label"
      - "Nicht ohne Fakten-Backup verwenden"
      - "Nicht Krone-LESER angreifen, nur Krone-MACHER"

  final_score:
    value: 0.62
    confidence_interval: [0.54, 0.70]
    verdict: "POSITIV - Einsetzen empfohlen"
