summary:
  total_factors: 40
  critical_factors: 8
  trends:
    steigend: 3
    stabil: 22
    fallend: 15
  key_insight: |
    SPÖ hat kohärentes Programm (Welfare, Gerechtigkeit), aber FALSCHE Positionierung
    für 2024: Wähler priorisieren E×X (Sicherheit/Identität), nicht F+S (Wirtschaft/Soziales).
    Babler's "progressive Mobilisierung" aktiviert gegnerische Komplementarität.
    Themen-Agenda-Setting Erfolg nur 25%.
