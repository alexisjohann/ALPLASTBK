summary:
  total_factors: 80
  critical_factors: 12
  trends:
    steigend: 8
    stabil: 22
    fallend: 50
  key_insight: |
    Dramatische Überalterung (Durchschnitt 58 Jahre, 49% über 60). Mitgliederverlust
    von 720.000 (1980) auf 150.000 (2024) = -79%. Nur 8% unter 30 Jahre.
    Aktivierungsgrad nur 12%. Interne Spaltung Babler/Doskozil belastet.
