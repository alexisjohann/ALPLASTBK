# SCHRITT 3: STRATEGISCHE OPTIONEN (aus Appendix BT)
# =============================================================================
strategic_options:

  option_A:
    name: "FPÖ-Light (Restriktion)"
    description: "SPÖ wird migrationskritisch"

    mechanism:
      - "Signalisiert 'Wir haben verstanden'"
      - "Konkurriert auf E×X-Dimension"

    problems:
      - "FPÖ hat First-Mover-Advantage (γ_{E×X} = 0.42)"
      - "SPÖ wird NIEMALS glaubwürdiger als FPÖ"
      - "Verliert urbane Basis komplett"
      - "Doskozil-Babler Spaltung explodiert"

    ebf_prediction:
      delta_arbeiter: "+2pp"
      delta_urban: "-8pp"
      delta_total: "-3pp"
      confidence: 0.45

    recommendation: "NICHT EMPFOHLEN"

  option_B:
    name: "Progressive Verdopplung"
    description: "Babler-Strategie intensivieren"

    mechanism:
      - "Humanitäre Position klar kommunizieren"
      - "Migration als wirtschaftliche Chance framen"

    problems:
      - "Bereits 2024 gescheitert"
      - "Aktiviert γ_{E×X} für FPÖ"
      - "Funktioniert nur bei urbanen Progressiven"
      - "Arbeiter-Segment komplett verloren"

    ebf_prediction:
      delta_arbeiter: "-5pp"
      delta_urban: "+3pp"
      delta_total: "-4pp"
      confidence: 0.55

    recommendation: "NICHT EMPFOHLEN"

  option_C:
    name: "Strategische De-Salienzierung"
    description: "Migration NICHT thematisieren, Themenwechsel"

    mechanism:
      - "Kein aktives Ansprechen von Migration"
      - "Bei Fragen: Kurz, sachlich, dann Themenwechsel"
      - "Salienz auf Wohnen/Pflege/Klima lenken"

    problems:
      - "FPÖ setzt Agenda alleine"
      - "Wirkt wie 'Kopf in Sand'"
      - "Medien erzwingen Migration-Fragen"

    ebf_prediction:
      delta_arbeiter: "-2pp kurzfristig"
      delta_urban: "+1pp"
      delta_total: "-1pp kurzfristig"
      confidence: 0.50

    recommendation: "KURZFRISTIG EMPFOHLEN (mit Ergänzung)"

  option_D:
    name: "E-Dimension Substitution (NEU)"
    description: "Sicherheit (E) über ANDERE Themen liefern"

    mechanism:
      - "E-Bedürfnis anerkennen, aber nicht via Migration"
      - "Sicherheit = Wohnsicherheit, Jobsicherheit, Pflegesicherheit"
      - "Narrative: 'Echte Sicherheit ist soziale Sicherheit'"

    innovation:
      - "Konkurriert nicht auf γ_{E×X} (FPÖ-Terrain)"
      - "Baut eigene E-Kompetenz auf anderem Feld"
      - "Verbindet F (SPÖ-Stärke) mit E (Wähler-Bedarf)"

    ebf_prediction:
      delta_arbeiter: "+3pp (mittelfristig)"
      delta_urban: "+2pp"
      delta_total: "+2.5pp"
      confidence: 0.40
      time_to_effect: "12-24 Monate"

    recommendation: "EMPFOHLEN ALS KERNSTRATEGIE"

  recommended_strategy:
    name: "C+D Hybrid: De-Salienz + E-Substitution"
    phases:
      - phase: "kurzfristig"
        strategy: "Option C (De-Salienz)"
      - phase: "mittelfristig"
        strategy: "Option D (E-Substitution)"
      - phase: "langfristig"
        strategy: "Neue Salienz-Arena (Klima, Wohnen)"

# =============================================================================
# SCHRITT 4: INTERVENTIONS-MIX (Kurz/Mittel/Langfristig)
# =============================================================================
intervention_mix:

  # =========================================================================
  # KURZFRISTIG (0-12 Monate): Damage Control + De-Salienzierung
  # =========================================================================
  short_term:
    timeframe: "0-12 Monate"
    strategic_goal: "Blutung stoppen, Migration-Falle vermeiden"
    budget_share: 0.25

    interventions:
      - id: "K1"
        name: "Message Discipline Training"
        type: "organizational"
        target_10c: "AWARE"
        description: |
          Alle SPÖ-Sprecher:innen erhalten Medientraining:
          - Bei Migration-Fragen: Max. 15 Sekunden Antwort
          - Sofortiger Pivot auf "echte Sicherheit" (Wohnen, Pflege)
          - Keine Verteidigung, kein Angriff auf FPÖ
          - Standardsatz: "Die Menschen sorgen sich zu Recht um Sicherheit.
            Deshalb kämpfen wir für sichere Pensionen, leistbares Wohnen,
            und gute Pflege."
        mechanism: "Reduziert γ_{E×X} Aktivierung durch Themenwechsel"
        expected_effect:
          awareness_migration: "-0.05"
          awareness_wohnen: "+0.08"
          confidence: 0.55
        cost: "€50,000 (Training)"
        responsible: "Bundesgeschäftsführung"

      - id: "K2"
        name: "Rapid Response Digital Unit"
        type: "digital"
        target_10c: "AWARE"
        description: |
          24/7 Social Media Team für Migration-Krisen:
          - Monitoring aller FPÖ/Krone Kampagnen
          - NICHT reagieren, sondern ABLENKEN
          - Eigene Themen-Offensive starten
          - Schnelle Fact-Checks (aber keine Debatte)
        mechanism: "Verhindert Agenda-Übernahme durch FPÖ"
        expected_effect:
          fpoe_narrative_dominance: "-0.10"
          spo_theme_setting: "+0.05"
          confidence: 0.45
        cost: "€200,000/Jahr (5 FTEs)"
        responsible: "Kommunikationsabteilung"

      - id: "K3"
        name: "Doskozil-Babler Ceasefire Protocol"
        type: "internal"
        target_10c: "WHO"
        description: |
          Interne Vereinbarung Burgenland-Bund:
          - Keine öffentlichen Widersprüche zu Migration
          - Doskozil schweigt auf Bundesebene
          - Babler erwähnt Burgenland-Modell nicht negativ
          - Gemeinsame Sprache bei Landtagswahlen
        mechanism: "Beendet interne Signalwidersprüche"
        expected_effect:
          internal_coherence: "+0.25"
          media_attack_surface: "-0.15"
          confidence: 0.35
        cost: "€0 (politischer Preis hoch)"
        responsible: "Parteivorsitz"
        risk: "Doskozil verweigert sich"

      - id: "K4"
        name: "Sicherheits-Reframe Kampagne"
        type: "communication"
        target_10c: "WHAT(E)"
        description: |
          Kampagne "Echte Sicherheit":
          - Key Visual: Familie in sicherer Wohnung (nicht Grenze)
          - Message: "Sicherheit beginnt bei dir zuhause"
          - Testimonials: Pflegekräfte, Mieter:innen, Pensionist:innen
          - KEIN Migration-Bezug, aber E-Dimension bedient
        mechanism: "Repositioniert SPÖ-E von Migration→Soziale Sicherheit"
        expected_effect:
          spo_E_perception: "+0.10"
          utility_alignment: "+0.05"
          confidence: 0.50
        cost: "€500,000 (Kampagne)"
        responsible: "Wahlkampfleitung"

    complementarity_kurzfristig:
      - pair: ["K1", "K2"]
        gamma: 0.30
        mechanism: "Trainierte Sprecher + schnelle Reaktion = konsistente Botschaft"
      - pair: ["K1", "K4"]
        gamma: 0.40
        mechanism: "Message Discipline ermöglicht Sicherheits-Reframe"
      - pair: ["K3", "K1"]
        gamma: 0.50
        mechanism: "Interne Einigkeit macht externe Disziplin möglich"

    success_metrics_kurzfristig:
      - metric: "SPÖ Migration-Mentions in Medien"
        baseline: 100
        target: 60
        unit: "Index"
      - metric: "SPÖ Sicherheits-Kompetenz Umfrage"
        baseline: 0.12
        target: 0.18
        unit: "Anteil"
      - metric: "Interne Widersprüche pro Monat"
        baseline: 4.2
        target: 1.0
        unit: "Anzahl"

  # =========================================================================
  # MITTELFRISTIG (12-24 Monate): E-Substitution + Community Building
  # =========================================================================
  medium_term:
    timeframe: "12-24 Monate"
    strategic_goal: "Neue E-Kompetenz aufbauen, Arbeiter zurückgewinnen"
    budget_share: 0.40

    interventions:
      - id: "M1"
        name: "Wohn-Sicherheits-Offensive"
        type: "policy+campaign"
        target_10c: "WHAT(E)+WHAT(F)"
        description: |
          SPÖ als Partei der Wohnsicherheit:
          - Mietpreisbremse-Kampagne (konkreter Gesetzesvorschlag)
          - "Niemand verliert sein Zuhause" Garantie
          - Bündnis mit Mietervereinigung
          - Testimonials: Familien mit Delogierungs-Angst
        mechanism: "E-Bedürfnis (Sicherheit) via Wohnen statt Migration"
        expected_effect:
          spo_wohnen_kompetenz: "+0.20"
          spo_E_overall: "+0.12"
          arbeiter_segment: "+0.03"
          confidence: 0.50
        cost: "€1,500,000 (Kampagne + Organizing)"
        responsible: "Sozialpolitik + Kampagne"

      - id: "M2"
        name: "Pflege-Sicherheits-Kampagne"
        type: "policy+campaign"
        target_10c: "WHAT(E)+WHAT(X)"
        description: |
          SPÖ als Partei der Pflege-Sicherheit:
          - "Pflege-Garantie": Jeder bekommt Pflege, niemand wird allein gelassen
          - Fokus auf österreichische Pflegekräfte (nicht 24h-Import)
          - "Würdevolle Pflege für unsere Eltern"
          - Verbindet E (Sicherheit) mit X (Identität/Familie)
        mechanism: "E×X Komplementarität für SPÖ aktivieren (nicht Migration)"
        expected_effect:
          spo_pflege_kompetenz: "+0.25"
          spo_EX_nicht_migration: "+0.08"
          aeltere_waehler: "+0.05"
          confidence: 0.45
        cost: "€1,200,000"
        responsible: "Gesundheitspolitik"
        strategic_note: |
          KRITISCH: Pflege-Kampagne MUSS österreichische Pflegekräfte
          betonen, nicht 24h-Pflege-Import. Sonst → Migration-Frame aktiviert!

      - id: "M3"
        name: "Grassroots Community Organizing"
        type: "organizational"
        target_10c: "WHO(S)"
        description: |
          Aufbau in verlorenen Arbeiter-Bezirken:
          - 50 Bezirke mit höchstem FPÖ-Zuwachs identifizieren
          - Je 2 lokale Organizer (aus der Community)
          - Wöchentliche Treffen zu lokalen Themen (NICHT Migration)
          - SPÖ als "die, die zuhören" positionieren
        mechanism: "Soziale Bindung wiederherstellen (S-Dimension)"
        expected_effect:
          local_spo_trust: "+0.15"
          arbeiter_segment: "+0.04"
          membership_local: "+500"
          confidence: 0.40
        cost: "€2,000,000/Jahr (100 Organizer)"
        responsible: "Mitgliederorganisation"

      - id: "M4"
        name: "Arbeiter-Kandidaten-Pipeline"
        type: "structural"
        target_10c: "WHO(representation)"
        description: |
          Systematische Rekrutierung von Arbeiter-Kandidaten:
          - Mentoring-Programm für Betriebsräte ohne Matura
          - Garantierte Listenplätze für "Hands-on" Berufe
          - Ziel: 25% Arbeiter-Hintergrund auf Bundesliste 2029
          - "Einer von uns" Narrativ
        mechanism: "Authentizität durch Repräsentation"
        expected_effect:
          arbeiter_identification: "+0.10"
          class_authenticity: "+0.08"
          confidence: 0.35
        cost: "€500,000/Jahr (Programm)"
        responsible: "Personalentwicklung"

    complementarity_mittelfristig:
      - pair: ["M1", "M2"]
        gamma: 0.35
        mechanism: "Wohnen + Pflege = umfassende Sicherheits-Story"
      - pair: ["M1", "M3"]
        gamma: 0.45
        mechanism: "Policy + lokale Präsenz = Glaubwürdigkeit"
      - pair: ["M3", "M4"]
        gamma: 0.55
        mechanism: "Community Organizing identifiziert Kandidaten"
      - pair: ["M2", "M4"]
        gamma: 0.30
        mechanism: "Pflege-Thema + Arbeiter-Kandidaten = authentisch"

    success_metrics_mittelfristig:
      - metric: "SPÖ E-Kompetenz (nicht Migration)"
        baseline: 0.15
        target: 0.28
        unit: "Umfragewert"
      - metric: "Arbeiter-Segment SPÖ-Anteil"
        baseline: 0.18
        target: 0.24
        unit: "Anteil"
      - metric: "Aktive Community-Gruppen"
        baseline: 0
        target: 50
        unit: "Anzahl"
      - metric: "Arbeiter-Anteil Kandidaten"
        baseline: 0.03
        target: 0.15
        unit: "Anteil"

  # =========================================================================
  # LANGFRISTIG (24-36 Monate): Neue Salienz-Arena + Strukturwandel
  # =========================================================================
  long_term:
    timeframe: "24-36 Monate"
    strategic_goal: "Post-Migration-Salienz positionieren, 2029 Wahlkampf"
    budget_share: 0.35

    interventions:
      - id: "L1"
        name: "Klima-Sicherheits-Positionierung"
        type: "policy+campaign"
        target_10c: "WHAT(E)+WHEN"
        description: |
          SPÖ als Klima-Sicherheits-Partei (nicht Klima-Aktivismus):
          - "Klimaschutz ist Arbeitsplatz-Schutz"
          - Fokus auf Hitze-Schutz, Wasser-Sicherheit, Energie-Preise
          - NICHT Fridays for Future Rhetorik
          - E-Frame: "Schützt unsere Kinder vor Hitzetod"
        mechanism: "Nutzt prognostizierte Klima-Salienz (2030: 28%)"
        expected_effect:
          spo_klima_kompetenz: "+0.15"
          spo_E_klima: "+0.10"
          urban_progressive: "+0.05"
          arbeiter_klima: "+0.03"
          confidence: 0.40
        cost: "€2,000,000"
        responsible: "Umweltpolitik"
        timing: "Ab Monat 24"
        strategic_note: |
          KRITISCH: Klima-Sicherheit, nicht Klima-Aktivismus!
          Arbeiter wollen sichere Jobs, nicht Verzichts-Rhetorik.

      - id: "L2"
        name: "Generationswechsel-Management"
        type: "structural"
        target_10c: "WHO+STAGE"
        description: |
          Systematischer Übergang 2027-2029:
          - Babler-Nachfolge klären (vor NRW 2029)
          - Doskozil einbinden oder neutralisieren
          - Neue Generation (40-50) in Schlüsselpositionen
          - "Team SPÖ" statt Personenkult
        mechanism: "Interne Kohärenz vor Wahlkampf sichern"
        expected_effect:
          internal_stability: "+0.30"
          leadership_trust: "+0.15"
          confidence: 0.30
        cost: "€0 (politischer Preis sehr hoch)"
        responsible: "Parteivorsitz + Gremien"
        risk: "Machtkampf eskaliert"

      - id: "L3"
        name: "Digital Catch-Up 2.0"
        type: "digital"
        target_10c: "AWARE"
        description: |
          Vollständige Schliessung des Digital Gap:
          - TikTok-Team: 10 FTEs, native Content Creator
          - Telegram-Channel mit 100k+ Abonnenten
          - AI-gestützte Micro-Targeting (DSGVO-konform)
          - Influencer-Partnerschaften (nicht Politiker)
        mechanism: "Erreicht jüngere Wähler, wo FPÖ dominiert"
        expected_effect:
          digital_reach_ratio: 0.55  # von 0.32
