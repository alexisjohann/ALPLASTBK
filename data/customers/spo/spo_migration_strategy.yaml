appendix_communication_guideline:

  title: "SPÖ Migration Response Protocol"
  version: "1.0"

  golden_rules:
    - rule: "Maximal 15 Sekunden auf Migration antworten"
    - rule: "Sofortiger Pivot auf 'echte Sicherheit'"
    - rule: "Keine Verteidigung, kein Angriff auf FPÖ"
    - rule: "Nie Zahlen oder Details diskutieren"
    - rule: "Immer emotionale Brücke zu SPÖ-Thema"

  standard_responses:
    migration_allgemein:
      bad: "Die FPÖ schürt nur Ängste, Migration ist bereichernd..."
      good: |
        "Die Menschen sorgen sich um Sicherheit - zu Recht.
        Deshalb kämpfen wir für sichere Pensionen, leistbares Wohnen,
        und gute Pflege. Das ist echte Sicherheit."

    asyl_frage:
      bad: "Wir brauchen geordnete Verfahren und humane..."
      good: |
        "Ordnung ist wichtig, da sind sich alle einig.
        Aber Ordnung brauchen wir auch bei den Mieten -
        da explodieren gerade die Preise."

    integration:
      bad: "Integration gelingt, wenn wir investieren..."
      good: |
        "Investieren müssen wir - in Schulen, Pflege, Wohnungen.
        Da fehlt es an allen Ecken."

    fpoe_attack:
      bad: "Die FPÖ instrumentalisiert das Thema..."
      good: |
        "Wir reden lieber über Lösungen.
        Zum Beispiel unseren Plan für leistbares Wohnen."

  forbidden_phrases:
    - "Bereicherung"
    - "Vielfalt ist Stärke"
    - "Wir schaffen das"
    - "Humanitäre Verpflichtung"
    - "Gegen Rassismus"
    - "FPÖ-Hetze"

  recommended_bridges:
    - "Was die Menschen wirklich brauchen ist..."
    - "Echte Sicherheit bedeutet..."
    - "Deshalb kämpfen wir für..."
    - "Das grössere Problem ist..."
