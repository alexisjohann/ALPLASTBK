# =============================================================================
# SCHRITT 2: 10C-MODELL (Wählerverhalten Migration)
# =============================================================================
model_10c:

  model_id: "MOD-SPO-MIG-001"
  name: "SPÖ Migration Voting Model"
  version: "1.0"

  # WHO: Wer sind die relevanten Wähler?
  who:
    segments:
      - id: "SEG-01"
        name: "loyale_kernwähler"
        size: 0.35
        migration_relevanz: "niedrig"
        current_spo: 0.75
        persuadable: false
        strategy: "retain"

      - id: "SEG-02"
        name: "verlorene_arbeiter"
        size: 0.25
        migration_relevanz: "sehr hoch"
        current_spo: 0.18
        current_fpo: 0.45
        persuadable: true
        strategy: "reconquer"
        key_insight: "Migration = Proxy für Statusverlust-Angst"

      - id: "SEG-03"
        name: "urbane_progressive"
        size: 0.20
        migration_relevanz: "hoch (pro-humanitär)"
        current_spo: 0.35
        current_gruen: 0.40
        persuadable: true
        strategy: "expand"
        key_insight: "Wollen humanitäre Position, aber KEINE Naivität"

      - id: "SEG-04"
        name: "pragmatische_mitte"
        size: 0.20
        migration_relevanz: "mittel"
        current_spo: 0.22
        current_oevp: 0.35
        persuadable: true
        strategy: "compete"
        key_insight: "Wollen Ordnung + Menschlichkeit"

  # WHAT: Welche Utility-Dimensionen sind relevant?
  what:
    utility_dimensions:
      F:
        name: "Financial"
        spo_offer: 0.45  # Welfare, Mindestlohn
        voter_demand: 0.30
        gap: +0.15  # SPÖ überangebot

      E:
        name: "Emotional (Security)"
        spo_offer: 0.15  # Schwach
        voter_demand: 0.35  # Hoch
        gap: -0.20  # SPÖ Defizit!

      S:
        name: "Social (Class Identity)"
        spo_offer: 0.25
        voter_demand: 0.10  # Nicht mehr relevant
        gap: +0.15  # SPÖ überangebot

      X:
        name: "Existential (Identity)"
        spo_offer: 0.10  # Sehr schwach
        voter_demand: 0.30  # Hoch bei Arbeiter-Segment
        gap: -0.20  # SPÖ Defizit!

    utility_mismatch:
      spo_vector: "[F=0.45, E=0.15, S=0.25, X=0.10]"
      voter_vector: "[F=0.30, E=0.35, S=0.10, X=0.30]"
      cosine_similarity: 0.62
      diagnosis: "Strukturelles Mismatch - SPÖ bedient falsche Dimensionen"

  # HOW: Wie interagieren die Dimensionen?
  how:
    complementarity_analysis:
      gamma_class:
        value_1979: 0.50
        value_2024: 0.15
        owner: "SPÖ (historisch)"
        status: "kollabiert"

      gamma_EX:
        name: "Identity-Security Complementarity"
        formula: "γ_{E×X} = E_i × X_i × Interaction_Coefficient"
        fpo_value: 0.42
        spo_value: 0.15
        gap: -0.27
        owner: "FPÖ"
        status: "FPÖ-Hegemonie"

      critical_insight: |
        JEDE Erwähnung von Migration durch SPÖ aktiviert γ_{E×X} = 0.42
        zugunsten der FPÖ!

        Mechanismus:
        1. SPÖ sagt "Integration gelingt" (X-Frame)
        2. Wähler denkt "Aber ich fühle mich unsicher" (E aktiviert)
        3. E×X Komplementarität aktiviert → FPÖ profitiert

        Babler-Paradox: Je mehr SPÖ Migration positiv framt,
        desto mehr profitiert FPÖ von der aktivierten Salienz.

  # WHEN: Welcher Kontext dominiert?
  when:
    context_coefficients:
      psi_migration:
        value: -1.20
        interpretation: "Migration-Kontext MASSIV negativ für SPÖ"

      psi_identity:
        value: -0.80
        interpretation: "Identitäts-Bedrohungs-Kontext negativ"

      psi_welfare:
        value: +0.30
        interpretation: "Wohlfahrts-Kontext leicht positiv"

    time_dynamics:
      migration_salience_2024: 0.35
      migration_salience_2030: 0.28
      migration_salience_2040: 0.22
      strategic_implication: "Zeit arbeitet FÜR SPÖ - wenn sie überlebt"

  # AWARE: Wie bewusst ist das Thema?
  aware:
    salience:
      migration_top_of_mind: 0.35
      fpo_owned: true
      spo_ownership: 0.08  # Praktisch null

    awareness_trap: |
      SPÖ kann Migration-Awareness NICHT zu ihren Gunsten nutzen.
      Jede Erhöhung der Salienz = FPÖ-Vorteil.
      Strategie: Awareness auf ANDERE Themen lenken.

