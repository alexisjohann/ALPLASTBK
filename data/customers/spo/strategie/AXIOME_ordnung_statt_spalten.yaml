        ∂R/∂E > 0    (Emotion erhöht Reichweite)
        ∂R/∂S > 0    (Spaltung erhöht Reichweite)
        ∂²R/∂E∂S > 0 (Emotion × Spaltung = Superadditiv)

        FOLGERUNG:
        max π(c) ⟹ max E(c) · S(c)

        → Gewinnmaximierung ERZWINGT Spaltung
        → Das Geschäftsmodell IST die Spaltung

