        → Boulevard KONNTE moderate Inhalte bringen

        NACH Inseraten-Reduktion (2024+):
        π = R_Werbung(Reichweite) + R_Verkauf(Reichweite)
        → Boulevard ist NUR noch E·S-abhängig

        THEOREM: ∂S/∂I < 0
        "Je weniger Inserate, desto mehr Spaltung."

