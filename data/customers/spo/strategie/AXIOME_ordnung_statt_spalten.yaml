  # Ψ_M: MATERIAL/TOOLS DIMENSION (M3 - Hybrid)
  # ==========================================================================
  psi_material:
    id: "Ψ_M"
    type: "M3_HYBRID"
    description: "Level-spezifische Formate"

    level_format_matrix:
      L1_beweisen:
        formats: ["Pressekonferenz", "Langform-Interview", "Factsheets"]
        channels: ["ORF", "Qualitätsmedien", "Website"]
      L2_ordnen:
        formats: ["Kurze Clips", "Zitate/Soundbites", "Infografiken"]
        channels: ["Social Media (alle)", "TV", "Radio"]
      L3_bedeuten:
        formats: ["Emotionale Videos", "Persönliche Geschichten", "Babler direkt"]
        channels: ["TikTok", "Instagram", "YouTube"]

    anti_asymmetry_strategy:
      principle: "Qualität > Quantität"
      tactics:
        - "Virale Momente > konstante Präsenz"
        - "EINE gute Geschichte > 100 Posts"
        - "L3 emotional aber WAHR (K9)"

  # ==========================================================================
  # AWARE: MANIPULATIONS-AWARENESS (A3 - Medium-abhängig)
  # ==========================================================================
  aware:
    type: "A3_MEDIUM_DEPENDENT"
    formula: "A(p) = f(Medienkonsum(p))"

    values:
      - medium: "Qualitätsmedien"
        awareness: 0.70
        reason: "Kritische Berichterstattung, Faktencheck"
      - medium: "ORF"
        awareness: 0.50
        reason: "Ausgewogen aber oberflächlich"
      - medium: "Social Media (organisch)"
        awareness: 0.25
        reason: "Algorithmus-gefiltert, Echokammern"
      - medium: "Boulevard"
        awareness: 0.20
        reason: "E·S-optimiert, keine Einordnung"
      - medium: "FPÖ-Parallelmedien"
        awareness: 0.05
        reason: "Propaganda als Alternative"

    spoe_implication:
      reachable: "A ≥ 0.5 → ca. 40-50% der Wähler"
      unreachable: "A < 0.3 → nicht versuchen zu überzeugen (K1, K10)"

  # ==========================================================================
  # READY: WECHSELBEREITSCHAFT (R4 - Kombiniert)
  # ==========================================================================
  ready:
    type: "R4_COMBINED"
    formula: "R(s,t,m) = R_base(s) × Salience(t) × Exposure(m)"

    R_base:
      - segment: "SPÖ-Stamm"
        value: 0.15
      - segment: "FPÖ-Stamm"
        value: 0.10
      - segment: "ÖVP-Stamm"
        value: 0.25
      - segment: "Grüne-Stamm"
        value: 0.30
      - segment: "NEOS-Stamm"
        value: 0.35
      - segment: "Wechselwähler"
        value: 0.75
      - segment: "Nichtwähler"
        value: 0.50

    Salience:
      - topic: "Migration/Asyl"
        value: 1.5
        direction: "FPÖ"
      - topic: "Teuerung/Löhne"
        value: 1.4
        direction: "SPÖ"
      - topic: "Sicherheit"
        value: 1.3
        direction: "FPÖ"
      - topic: "Gesundheit"
        value: 1.2
        direction: "SPÖ"
      - topic: "Bildung"
        value: 1.1
        direction: "SPÖ"
      - topic: "EMRK/Rechtsstaat"
        value: 0.6
        direction: "neutral"

    Exposure:
      - medium: "Qualitätsmedien"
        value: 1.3
        spoe_effect: "Botschaft kommt an"
      - medium: "ORF"
        value: 1.0
        spoe_effect: "Neutral"
      - medium: "Social (organisch)"
        value: 0.7
        spoe_effect: "Algorithmus-Nachteil"
      - medium: "Boulevard"
        value: 0.5
        spoe_effect: "Botschaft verzerrt"
      - medium: "FPÖ-Parallelmedien"
        value: 0.1
        spoe_effect: "Kommt nicht vor"

    examples:
      - scenario: "ÖVP-Wähler + Teuerung + Standard"
        calculation: "0.25 × 1.4 × 1.3 = 0.455"
        interpretation: "45% Wechselwahrscheinlichkeit → SPÖ-Chance!"
      - scenario: "FPÖ-Stamm + Migration + FPÖ-TV"
        calculation: "0.10 × 1.5 × 0.1 = 0.015"
        interpretation: "1.5% → Nicht versuchen! (K1)"
      - scenario: "Nichtwähler + Teuerung + ORF"
        calculation: "0.50 × 1.4 × 1.0 = 0.70"
        interpretation: "70% Mobilisierbar → Kernzielgruppe!"

  # ==========================================================================
  # GEWICHTE-KALIBRIERUNG (Segment × Nutzen-Ebene)
  # ==========================================================================
  weights:
    description: "Kalibrierte Gewichte w₁, w₂, w₃ für U = w₁·U_IND + w₂·U_COLL + w₃·U_IDN"
    constraint: "w₁ + w₂ + w₃ = 1"

    by_segment:
      # Partei-Stammwähler
      - segment: "SPÖ-Stamm"
        w1_U_IND: 0.30
        w2_U_COLL: 0.55
        w3_U_IDN: 0.15
        dominant: "U_COLL"
        party_fit: "SPÖ ✓"
      - segment: "FPÖ-Stamm"
        w1_U_IND: 0.15
        w2_U_COLL: 0.10
        w3_U_IDN: 0.75
        dominant: "U_IDN"
        party_fit: "FPÖ ✓"
      - segment: "ÖVP-Stamm"
        w1_U_IND: 0.45
        w2_U_COLL: 0.35
        w3_U_IDN: 0.20
        dominant: "U_IND"
        party_fit: "ÖVP"
      - segment: "Grüne-Stamm"
        w1_U_IND: 0.20
        w2_U_COLL: 0.60
        w3_U_IDN: 0.20
        dominant: "U_COLL"
        party_fit: "Grüne"
      - segment: "NEOS-Stamm"
        w1_U_IND: 0.55
        w2_U_COLL: 0.30
        w3_U_IDN: 0.15
        dominant: "U_IND"
        party_fit: "NEOS"

      # Nicht-gebundene
      - segment: "Wechselwähler"
        w1_U_IND: 0.40
        w2_U_COLL: 0.35
        w3_U_IDN: 0.25
        dominant: "U_IND"
        party_fit: "OFFEN"
      - segment: "Nichtwähler"
        w1_U_IND: 0.35
        w2_U_COLL: 0.25
        w3_U_IDN: 0.40
        dominant: "U_IDN"
        party_fit: "FPÖ-Gefahr"

      # Psychographisch
      - segment: "Angst-Wähler"
        w1_U_IND: 0.25
        w2_U_COLL: 0.10
        w3_U_IDN: 0.65
        dominant: "U_IDN"
        party_fit: "FPÖ ✓"
      - segment: "Werte-Wähler"
        w1_U_IND: 0.20
        w2_U_COLL: 0.55
        w3_U_IDN: 0.25
        dominant: "U_COLL"
        party_fit: "SPÖ ✓"
      - segment: "Pragmatiker"
        w1_U_IND: 0.55
        w2_U_COLL: 0.30
        w3_U_IDN: 0.15
        dominant: "U_IND"
        party_fit: "SPÖ möglich"

    spoe_targeting:
      priority_1:
        criterion: "w₁+w₂ ≥ 0.75 UND R > 0.5"
        segments: ["Pragmatiker", "Wechselwähler", "ÖVP-Enttäuschte"]
        topics: ["Teuerung", "Gesundheit", "Wohnen"]
      priority_2:
        criterion: "w₁+w₂ ≥ 0.70 UND R 0.3-0.5"
        segments: ["Grüne-Enttäuschte", "NEOS-Wähler"]
        topics: ["Klima", "Wirtschaft"]
      avoid:
        criterion: "w₃ > 0.5 ODER R < 0.2"
        segments: ["FPÖ-Stamm", "Angst-Wähler"]
        reason: "K1, K10: Nicht auf U_IDN-Territorium"

# ============================================================================
# VALIDIERUNGS-CHECKLISTE
# ============================================================================

validation:
  name: "Axiom-Compliance-Check"
  description: "Vor JEDER Kommunikation durchführen"

  checklist:
    - id: "CHK-1"
      question: "Kann Kickl diese Botschaft besser/glaubwürdiger sagen?"
      if_yes: "STOPP - Axiom K1 verletzt"

    - id: "CHK-2"
      question: "Wird eine Zahl als Botschaft statt als Beleg verwendet?"
      if_yes: "STOPP - Axiom K2 verletzt"

    - id: "CHK-3"
      question: "Verwendet die Botschaft den Ordnung-Frame?"
      if_no: "STOPP - Axiom K3 verletzt"

    - id: "CHK-4"
      question: "Enthält die Botschaft mindestens ein USP?"
      if_no: "STOPP - Axiom K4 verletzt"

    - id: "CHK-5"
      question: "Δ(k) > 0 für alle verwendeten Strategien?"
      if_no: "STOPP - Kickl-Territorium betreten"

    - id: "CHK-6"
      question: "Wird die EMRK mit angemessener Würde behandelt?"
      if_no: "STOPP - Axiom K5 verletzt (Monument, nicht Hindernis)"

    - id: "CHK-7"
      question: "Wurden die wahren Motive der Gegner analysiert (nicht nur offizielle Begründung)?"
      if_no: "STOPP - Axiom K6 verletzt (Was wollen sie TUN?)"

    - id: "CHK-8"
      question: "Wird 'Reform' als Weiterentwicklung oder als Rückschritt entlarvt?"
      if_no: "STOPP - Axiom K7 verletzt (Allmachtsphantasien benennen)"

    - id: "CHK-9"
      question: "Sind alle 3 Levels (L1 Policy, L2 Kommunikation, L3 Werte) verbunden?"
      if_no: "STOPP - Axiom K8 verletzt (Levels stehen isoliert)"
      details: |
        Prüfe:
        - Hat L1 (Fakten) eine Verbindung zu L3 (Bedeutung)?
        - Wird L2 (Frame) durch L1 (Beleg) gestützt?
        - Endet der Closer mit L3+L1 (Bedeutung + Beweis)?

    - id: "CHK-10"
      question: "Ist die Botschaft POPULÄR (verständlich) ohne POPULISTISCH (wahrheitsverzerrend) zu sein?"
      if_no: "STOPP - Axiom K9 verletzt"
      details: |
        Prüfe:
        - Verständlichkeit ↑ UND Wahrheit ≥ konstant?      → OK (populär)
        - Verständlichkeit ↑ ABER Wahrheit ↓?              → STOPP (populistisch)
        - Emotion unterstützt Fakten (E ≤ F)?              → OK (populär)
        - Emotion ersetzt Fakten (E > F)?                  → STOPP (populistisch)
        - Kein Sündenbock, keine Angst-Rhetorik?           → OK
        - Sündenbock oder Angst ohne Lösung?               → STOPP (populistisch)

    - id: "CHK-11"
      question: "Adressiert die Botschaft die RICHTIGEN Nutzen-Ebenen (U_IND + U_COLL, NICHT U_IDN)?"
      if_no: "STOPP - Axiom K10 verletzt (falsches Territorium)"
      details: |
        Prüfe:
        - Spricht U_IND an ("DU", "DEINE Rechte")?         → OK
        - Spricht U_COLL an ("WIR ALLE", "Gemeinsam")?     → OK
        - Spricht U_IDN abgrenzend an ("Wir vs. Die")?     → STOPP (FPÖ-Territorium!)
        - Spricht U_IDN positiv an ("Österreich stolz")?   → OK (aber vorsichtig)

        VERBOTEN (U_IDN abgrenzend):
        - "Echte Österreicher"
        - "Wir gegen Die"
        - "Die da oben"
        - Jede Gruppe als Feind

# ============================================================================
# ANWENDUNGS-PROTOKOLL
# ============================================================================

application_protocol:
  name: "Axiom-Anwendung in der Praxis"

  steps:
    - step: 1
      action: "Strategie-Entwurf erstellen"

    - step: 2
      action: "Für jedes Element k: Δ(k) = f_B(k) - f_K(k) berechnen"

    - step: 3
      action: "Alle k mit Δ(k) < 0 entfernen"

    - step: 4
      action: "Validierungs-Checkliste durchgehen"

    - step: 5
      action: "Nur bei 7/7 ✓ freigeben"

