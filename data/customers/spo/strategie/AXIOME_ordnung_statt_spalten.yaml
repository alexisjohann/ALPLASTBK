# ============================================================================
# AXIOM K1: KICKL-DIFFERENZIERUNG (Kernaxiom)
# ============================================================================

axioms:

  - id: "AX-K1"
    name: "Kickl-Differenzierung"
    status: "FUNDAMENTAL"
    priority: 1
    created: "2026-02-02"

    # Formale Definition
    formal:
      notation: |
        Sei K = {k₁, k₂, ..., kₙ} die Menge aller Kommunikationsstrategien
        Sei f_K: K → [0,1] die Kompetenz-Funktion für Kickl
        Sei f_B: K → [0,1] die Kompetenz-Funktion für Babler

        AXIOM K1:
        ∀ k ∈ K: f_K(k) > f_B(k) ⟹ k ∉ S_B

        Wobei S_B ⊂ K die zulässige Strategiemenge für Babler ist.

      decision_function: |
        D(k) = {
          VERBOTEN,     wenn f_K(k) > f_B(k)
          ERLAUBT,      wenn f_K(k) < f_B(k)
          PRÜFEN,       wenn f_K(k) ≈ f_B(k)
        }

      differentiation_score: |
        Δ(k) = f_B(k) - f_K(k)

        Δ(k) > 0.3   →  STARK EMPFOHLEN (Alleinstellungsmerkmal)
        Δ(k) ∈ [0,0.3] →  MÖGLICH (mit Vorsicht)
        Δ(k) < 0     →  VERBOTEN (Kickl-Territorium)

    # Natürlichsprachliche Formulierung
    natural_language:
      kurz: "Was Kickl besser kann, machen wir nicht."
      lang: |
        Jede Kommunikationsstrategie, bei der Kickl höhere Glaubwürdigkeit,
        Kompetenz oder Authentizität hat als Babler, ist VERBOTEN.

        SPÖ muss ausschließlich Strategien verfolgen, die Kickl nicht
        replizieren kann - das sind die Alleinstellungsmerkmale.

    # Begründung
    rationale:
      behavioral_economics:
        - "Positioning Theory: Erste Marke in Kategorie gewinnt"
        - "Authenticity Premium: Originale schlagen Kopien"
        - "Cognitive Fluency: Erwartungskonforme Botschaften wirken stärker"
      political_science:
        - "Median Voter Theorem gilt NICHT bei Polarisierung"
        - "Issue Ownership: Themen 'gehören' bestimmten Parteien"
        - "Triangulation funktioniert nur mit eigener Basis"

    # Anwendungsbeispiele
    examples:
      verboten:
        - strategy: "Mit Abschiebungszahlen prahlen"
          f_kickl: 0.95
          f_babler: 0.40
          delta: -0.55
          reason: "Kickl 'besitzt' harte Migrationslinie"

        - strategy: "EMRK als Hindernis darstellen"
          f_kickl: 0.90
          f_babler: 0.20
          delta: -0.70
          reason: "Anti-EMRK ist Kickl-Kernposition"

        - strategy: "Emotionale Angst-Rhetorik"
          f_kickl: 0.95
          f_babler: 0.25
          delta: -0.70
          reason: "Angst ist Kickl-Instrument"

      erlaubt:
        - strategy: "Ordnung durch Rechtsstaat"
          f_kickl: 0.20
          f_babler: 0.85
          delta: +0.65
          reason: "Kickl KANN nicht pro-Rechtsstaat sein"

        - strategy: "Staatsmännische Gelassenheit"
          f_kickl: 0.15
          f_babler: 0.80
          delta: +0.65
          reason: "Kickl braucht Chaos, nicht Ruhe"

        - strategy: "EMRK schützt JEDEN Österreicher"
          f_kickl: 0.05
          f_babler: 0.90
          delta: +0.85
          reason: "Kickl kann Menschenrechte nicht verteidigen"

        - strategy: "Ergebnisse statt Parolen"
          f_kickl: 0.30
          f_babler: 0.85
          delta: +0.55
          reason: "Kickl liefert Rhetorik, nicht Ergebnisse"

        - strategy: "Gesetze machen nur Sinn, wenn umgesetzt"
          f_kickl: 0.25
          f_babler: 0.80
          delta: +0.55
          reason: "Frames Abschiebungen als Rechtsstaat-Erfolg"

# ============================================================================
# AXIOM K2: ZAHLEN-VERWENDUNG
# ============================================================================

  - id: "AX-K2"
    name: "Zahlen als Beleg, nicht als Botschaft"
    status: "FUNDAMENTAL"
    priority: 2
    created: "2026-02-02"
    parent: "AX-K1"

    formal:
      notation: |
        Sei Z eine Zahl (z.B. 14.156 Abschiebungen)
        Sei M die Botschaft
        Sei B der Beleg

        AXIOM K2:
        Z ∈ B, Z ∉ M

        Die Zahl darf nur als BELEG verwendet werden,
        niemals als KERN der Botschaft.

      structure: |
        RICHTIG:  M = "Das System funktioniert" + B(Z)
        FALSCH:   M = Z + "ist Rekord"

    natural_language:
      kurz: "Zahlen belegen, Zahlen prahlen nicht."
      lang: |
        Abschiebungszahlen werden NIEMALS als Erfolg gefeiert.
        Sie werden ausschließlich als Beleg verwendet, dass
        der Rechtsstaat funktioniert und Gesetze umgesetzt werden.

    examples:
      richtig:
        - "Das System funktioniert. Die Zahlen belegen das."
        - "Gesetze werden durchgesetzt. Punkt."
        - "Die Fakten sprechen für sich."
      falsch:
        - "Rekord! 14.156 Abschiebungen!"
        - "Wir haben mehr abgeschoben als je zuvor!"
        - "Höchststand bei Abschiebungen!"

# ============================================================================
# AXIOM K3: ORDNUNG-FRAME
# ============================================================================

  - id: "AX-K3"
    name: "Ordnung-Frame statt Härte-Frame"
    status: "FUNDAMENTAL"
    priority: 3
    created: "2026-02-02"
    parent: "AX-K1"

    formal:
      notation: |
        Frames F = {F_Ordnung, F_Härte, F_Angst, F_Chaos}

        AXIOM K3:
        S_B ⊆ {k ∈ K : Frame(k) = F_Ordnung}

        Alle Babler-Strategien müssen den Ordnung-Frame verwenden.

      frame_hierarchy: |
        F_Ordnung > F_Kompetenz > F_Ergebnisse > F_Rechtsstaat

        VERBOTEN: F_Härte, F_Angst, F_Rekord

    natural_language:
      kurz: "Wir bringen Ordnung, nicht Härte."
      lang: |
        Der zentrale Frame ist IMMER "Ordnung" - verstanden als:
        - Gesetze, die Sinn machen
        - Gesetze, die umgesetzt werden
        - Institutionen, die funktionieren
        - Rechtsstaat, der schützt

        NIEMALS wird der "Härte-Frame" verwendet (= Kickl-Territorium)

    vocabulary:
      erlaubt:
        - "Ordnung"
        - "Rechtsstaat"
        - "Gesetze umsetzen"
        - "System funktioniert"
        - "Ergebnisse liefern"
        - "Verantwortung übernehmen"
      verboten:
        - "Hart durchgreifen"
        - "Null Toleranz"
        - "Knallhart"
        - "Rekord-Abschiebungen"
        - "Mehr abschieben"

# ============================================================================
# AXIOM K4: ALLEINSTELLUNGSMERKMAL
# ============================================================================

  - id: "AX-K4"
    name: "Unique Selling Proposition (USP)"
    status: "FUNDAMENTAL"
    priority: 4
    created: "2026-02-02"
    parent: "AX-K1"

    formal:
      notation: |
        USP_B = {k ∈ K : Δ(k) > 0.5}

        Sei |USP_B| die Anzahl der Alleinstellungsmerkmale.

        AXIOM K4:
        Jede Kommunikation muss mindestens ein Element aus USP_B enthalten.

        ∀ Kommunikation c: ∃ k ∈ USP_B : k ∈ c

    natural_language:
      kurz: "Jede Botschaft braucht ein Alleinstellungsmerkmal."
      lang: |
        Jede öffentliche Kommunikation von Babler muss mindestens
        ein Element enthalten, das Kickl NICHT replizieren kann.

    usp_catalog:
      - id: "USP-1"
        name: "Staatsmännische Haltung"
        delta: 0.65
        kickl_barrier: "Braucht Polarisierung, kann nicht versöhnen"

      - id: "USP-2"
        name: "Pro-Rechtsstaat"
        delta: 0.70
        kickl_barrier: "Hat Rechtsstaat angegriffen, unglaubwürdig"

      - id: "USP-3"
        name: "Pro-Europa"
        delta: 0.75
        kickl_barrier: "Anti-EU Positionierung ist Kern-DNA"

      - id: "USP-4"
        name: "Menschenrechte als Schutz"
        delta: 0.85
        kickl_barrier: "Will EMRK verlassen"

      - id: "USP-5"
        name: "Rationale Argumentation"
        delta: 0.55
        kickl_barrier: "Emotional-populistischer Stil"

      - id: "USP-6"
        name: "Ordnung durch Kompetenz"
        delta: 0.60
        kickl_barrier: "Ordnung durch Härte ist sein Frame"

# ============================================================================
# AXIOM K5: EMRK-WÜRDIGUNG
# ============================================================================

  - id: "AX-K5"
    name: "EMRK-Würdigung"
    status: "FUNDAMENTAL"
    priority: 5
    created: "2026-02-02"

    formal:
      notation: |
        Sei E die EMRK und H(E) ihre historische Würde.

        H(E) = f(Holocaust, Nürnberg, Maxwell_Fyfe, Churchill, 700M_Menschen)

        AXIOM K5:
        ∀ Kommunikation c über E: Würde(c) ≥ H(E)

        Die kommunikative Behandlung der EMRK muss ihrer historischen
        Bedeutung als Monument der Zivilisation entsprechen.

      dignity_function: |
        Würde(c) = W_historisch + W_universal + W_schutz - W_bürokratisch

        W_historisch:   Entstehung aus Holocaust/Nürnberg betonen
        W_universal:    Schutz für JEDEN Menschen betonen
        W_schutz:       Schutzfunktion gegen Willkür betonen
        W_bürokratisch: Technische/juristische Sprache vermeiden

    natural_language:
      kurz: "Die EMRK ist ein Monument, kein Hindernis."
      lang: |
        Die EMRK wurde von den Anklägern der Nürnberger Prozesse geschrieben –
        Menschen, die mit eigenen Augen die Abgründe des Holocaust gesehen hatten.

        Sie ist keine bürokratische Hürde, sondern das «Nie wieder» in Gesetzesform.
        Sie schützt 700 Millionen Menschen vor staatlicher Willkür.

        Jede Kommunikation muss dieser Würde entsprechen.

    historical_context:
      architects:
        - name: "David Maxwell Fyfe"
          role: "Hauptautor der EMRK"
          background: "Britischer Chefankläger in Nürnberg, verhörte Göring"
        - name: "Pierre-Henri Teitgen"
          role: "Co-Autor"
          background: "Französischer Widerstandskämpfer, von Gestapo gefoltert"
        - name: "Winston Churchill"
          role: "Initiator"
          background: "Schirmherr Europa-Kongress 1948"

      timeline:
        - "1945-46: Nürnberger Prozesse"
        - "1948: Europa-Kongress Den Haag"
        - "1950: EMRK unterzeichnet in Rom"
        - "1953: EMRK tritt in Kraft"

      protected_people: "700+ Millionen in 46 Staaten"

    vocabulary:
      erlaubt:
        - "Monument der Zivilisation"
        - "Vermächtnis von Nürnberg"
        - "Nie wieder in Gesetzesform"
        - "Schutzschild für jeden Österreicher"
        - "Eine der wichtigsten kulturellen Leistungen"
        - "Errungenschaft der Menschheit"
      verboten:
        - "EMRK-Problem"
        - "EMRK als Hindernis"
        - "EMRK blockiert"
        - "Menschenrechte für Straftäter"
        - "EGMR-Bürokratie"

    comparison_frame:
      babler_position:
        - "Verteidigt Vermächtnis von Nürnberg"
        - "Steht für 700 Millionen Menschen"
        - "Schützt jeden Österreicher"
      kickl_position:
        - "Rüttelt am Grundkonsens der Zweiten Republik"
        - "Bewegt sich ausserhalb des Verfassungsbogens"
        - "Will Österreich in Liga mit Belarus und Russland"

    reference_document: "strategie/EMRK_wuerdigung_und_geschichte.md"

# ============================================================================
# AXIOM K6: GEGNER-MOTIVE VERSTEHEN
# ============================================================================

  - id: "AX-K6"
    name: "Gegner-Motive verstehen"
    status: "FUNDAMENTAL"
    priority: 6
    created: "2026-02-02"

    formal:
      notation: |
        Sei A ein Angriff auf die EMRK mit offizieller Begründung B_off
        und wahrem Motiv M_wahr.

        AXIOM K6:
        ∀ A: Analyse(A) = M_wahr, NICHT B_off

        Die strategische Analyse muss IMMER das wahre Motiv
        identifizieren, nicht die offizielle Begründung akzeptieren.

      motive_function: |
        M_wahr = f(Was_wollen_sie_TUN_wenn_EMRK_weg)

        Typische M_wahr:
        • Abschiebung ohne Einzelfallprüfung
        • Pressefreiheit einschränken
        • Richter kontrollieren
        • Minderheiten unterdrücken
        • Staatsräson über Individuum

    natural_language:
      kurz: "Frage: Was wollen sie TUN ohne EMRK? Antwort: ALLMACHTSPHANTASIEN."
      lang: |
        Bei JEDEM Angriff auf die EMRK muss das WAHRE MOTIV
        identifiziert werden – nicht die offizielle Begründung.

        Die Frage ist nicht "Was SAGEN sie?"
        Die Frage ist "Was wollen sie TUN?"

        Antwort: ALLMACHTSPHANTASIEN – Macht OHNE Kontrolle.

        Kickl, Weidel & Co. wissen ganz genau, warum die EMRK
        ihren Allmachtsphantasien im Weg steht:
        - Sie VERHINDERT Abschiebungen ohne Prüfung
        - Sie SCHÜTZT die Pressefreiheit
        - Sie GARANTIERT unabhängige Gerichte
        - Sie SICHERT Minderheitenrechte

        Das ist kein Zufall – das ist das Ziel des Angriffs.

    gegner_analyse:
      kickl:
        offiziell: "EGMR hat Mitschuld an Gewaltexzessen"
        wahr: "Abschiebungen ohne gerichtliche Kontrolle"
      weidel:
        offiziell: "EMRK verhindert effektive Migrationspolitik"
        wahr: "Massenabschiebungen ohne Einzelfallprüfung"
      orban:
        offiziell: "Brüsseler Bürokratie"
        wahr: "Keine externe Kontrolle seiner Justizreformen"
      putin:
        offiziell: "(ausgetreten)"
        wahr: "Kriegsverbrechen ohne EGMR-Verantwortung"

    verbindungen:
      gemeinsam:
        - "Anti-EMRK"
        - "Anti-EU"
        - "Anti-Pressefreiheit"
        - "Autoritäre Tendenzen"
        - "Pro-Putin (ausser Putin selbst)"
      fraktion: "Patrioten für Europa"
      mitglieder: ["FPÖ", "AfD", "RN", "Fidesz", "PVV", "FdI"]

    trennlinie:
      demokratie: ["Rechtsstaat", "EMRK", "Gewaltenteilung", "Pressefreiheit"]
      autoritarismus: ["Willkür", "Kontrolle", "Einheitsmedien", "Minderheitenfeindlich"]

    reference_document: "strategie/ANALYSE_warum_rechte_emrk_angreifen.md"

# ============================================================================
# AXIOM K7: WEITERENTWICKLUNG VS. RÜCKSCHRITT
# ============================================================================

  - id: "AX-K7"
    name: "Weiterentwicklung vs. Rückschritt"
    status: "FUNDAMENTAL"
    priority: 7
    created: "2026-02-02"

    formal:
      notation: |
        Sei R(x) eine Regel/Institution (z.B. EMRK)
        Sei Δ_Nutzen = Nutzen_Menschen(R_neu) - Nutzen_Menschen(R_alt)

        AXIOM K7:
        Δ_Nutzen > 0  →  WEITERENTWICKLUNG (erlaubt, erwünscht)
        Δ_Nutzen < 0  →  RÜCKSCHRITT (verboten)

        Anwendung auf EMRK-Debatte:
        Kickl_Vorschlag: EMRK verlassen / unterlaufen
        Δ_Nutzen(Kickl) << 0
        → RÜCKSCHRITT, kein Fortschritt

      allmacht_function: |
        M_Kickl = Allmachtsphantasie = Macht OHNE Kontrolle

        EMRK = Kontrolle(Staat)
        → EMRK stört Allmachtsphantasie
        → Deshalb Angriff

    natural_language:
      kurz: "Regeln können weiterentwickelt werden – aber zum Wohl der Menschen, nicht zum Wohl der Macht."
      lang: |
        Keine Regel ist «in Stein gemeisselt». Es ist richtig, immer zu
        überlegen, ob man etwas weiterentwickeln kann, damit es den
        Menschen BESSER dient.

        ABER: Was Kickl, Weidel & Co. wollen, ist KEINE Weiterentwicklung.
        Es ist ein RÜCKSCHRITT mit enormen Konsequenzen.

        Die EMRK steht ihren ALLMACHTSPHANTASIEN im Weg.
        Deshalb der Angriff.

    frame:
      weiterentwicklung:
        - "Besser für Menschen"
        - "Mehr Schutz"
        - "Mehr Klarheit"
        - "Effizienter"
      rueckschritt:
        - "Weniger Kontrolle für Macht"
        - "Weniger Schutz für Menschen"
        - "Willkür statt Rechtsstaat"
        - "Allmachtsphantasien"

    application_to_emrk:
      official_claim: "EMRK reformieren"
      actual_intent: "EMRK aushöhlen"
      true_motive: "Macht ohne Kontrolle = Allmachtsphantasie"
      consequence: "700 Millionen Menschen verlieren Schutz"

    vocabulary:
      erlaubt:
        - "Weiterentwicklung"
        - "Verbesserung im Sinne der Menschen"
        - "Das System verbessern"
        - "Effizienter umsetzen"
      verboten:
        - "Reform" (wenn eigentlich Aushöhlung gemeint)
        - "Anpassung" (wenn eigentlich Rückschritt gemeint)
        - "Modernisierung" (wenn eigentlich Abbau gemeint)

# ============================================================================
# AXIOM K8: LEVEL-KOMPLEMENTARITÄT (Architektur-Axiom)
# ============================================================================

  - id: "AX-K8"
    name: "Level-Komplementarität"
    status: "FUNDAMENTAL"
    priority: 0  # Architektur-Axiom = höchste Priorität
    created: "2026-02-02"

    formal:
      notation: |
        Sei L = {L1, L2, L3} das 3-Level-System:
          L1 = Policy     (WAS wir tun)
          L2 = Kommunikation (WIE wir's framen)
          L3 = Werte      (WARUM es wichtig ist)

        AXIOM K8 (Komplementarität):
        W(L1 + L2 + L3) > W(L1) + W(L2) + W(L3)

        Die KOMBINIERTE Wirkung ist grösser als die Summe der Teile.
        → Superadditivität durch Komplementarität

      isolation_failure: |
        L1 allein = technokratisch, kalt, "Beamtensprache"
        L2 allein = Spin, unglaubwürdig, "leere Rhetorik"
        L3 allein = Predigt, abgehoben, "Sonntagsrede"

        → Isolierte Levels SCHWÄCHEN die Botschaft

      integration_success: |
        L1 + L2 + L3 = Überzeugend, glaubwürdig, resonant

        Beispiel EMRK:
        L1: "Die Zahlen belegen: Das System funktioniert."
        L2: "Das ist keine Reform, das ist Rückschritt."
        L3: "Das 'Nie wieder' in Gesetzesform."

        → Zusammen: Fakten + Frame + Bedeutung = ÜBERZEUGEND

      level_functions: |
        L1 (Policy):       BEWEISEN    → "Die Zahlen belegen es."
        L2 (Kommunikation): ORDNEN      → "Wer die EMRK angreift, will..."
        L3 (Werte):        BEDEUTEN    → "Das ist das 'Nie wieder'."

        Jedes Level hat eine EIGENE Funktion.
        Kein Level kann ein anderes ERSETZEN.

    natural_language:
      kurz: "Die 3 Levels sind wie ein Dreibein – keins kann ohne die anderen stehen."
      lang: |
        Level 1, 2, 3 sind NICHT austauschbar. Sie sind KOMPLEMENTÄR:

        • Level 1 (Policy) beweist: "Das funktioniert."
        • Level 2 (Kommunikation) ordnet: "Das ist der wahre Grund."
        • Level 3 (Werte) gibt Bedeutung: "Das ist unser Erbe."

        Wie ein Dreibein: Nimm ein Bein weg, und alles fällt um.

        Die Kraft entsteht aus der VERBINDUNG:
        Fakten OHNE Bedeutung = kalt
        Bedeutung OHNE Fakten = leer
        Frame OHNE beides = Manipulation

    eskalation:
      description: "Wann welches Level?"
      path: |
        Standard-Frage     → L1 (Fakten/Beleg)
                             "Die Zahlen belegen: Das System funktioniert."
                ↓
        Nachfrage          → L1 + L2 (Fakten + Frame)
                             "Wer 'Reform' sagt, meint Aushöhlung."
                ↓
        Frame-Attacke      → L2 (Frame-Korrektur)
                             "Das ist keine Reform, das ist Rückschritt."
                ↓
        Werte-Attacke      → L3 (Kreisky-Ebene)
                             "Die EMRK ist das 'Nie wieder' in Gesetzesform."
                ↓
        Closer             → L3 + L1 (Bedeutung + Fakten)
                             "700 Millionen Menschen. Auf welcher Seite?"

      rule: |
        REGEL: Beginne bei L1, eskaliere nur wenn nötig.
        ABER: Der Closer verbindet IMMER L3 + L1 (Bedeutung + Beweis)

    integration_patterns:
      tv_interview_90s:
        structure: "L1 (20s) → L1 (30s) → L3 (25s) → L3+L1 (15s)"
        flow: "Ordnung → Beleg → Würdigung → Closer"

      radio_15s:
        structure: "L1 + L3"
        flow: "Ordnung + Bedeutung (komprimiert)"

      social_280:
        structure: "L3 + L2"
        flow: "Bedeutung + Frame (emotional)"

      pressefoyer_60s:
        structure: "L1 → L3 → Fragen"
        flow: "Fakten → Werte → offen"

    verbindungssaetze:
      L1_zu_L2:
        - "Aber die eigentliche Frage ist..."
        - "Was steckt dahinter?"
        - "Schauen wir genauer hin..."
      L2_zu_L3:
        - "Und deshalb ist das so wichtig..."
        - "Das berührt etwas Grundlegendes..."
        - "Das hat eine tiefere Bedeutung..."
      L3_zu_L1:
        - "Und die Fakten belegen das..."
        - "Das ist nicht nur Theorie..."
        - "Das zeigt sich konkret..."

    anti_patterns:
      verboten:
        - name: "L1-Only"
          description: "Nur Zahlen, keine Bedeutung"
          problem: "Kalt, technokratisch, vergessbar"
          beispiel: "14.156 Abschiebungen. Das war's."

        - name: "L3-Only"
          description: "Nur Werte, keine Fakten"
          problem: "Predigt, unglaubwürdig, abgehoben"
          beispiel: "Die EMRK ist ein Monument." (ohne Beleg)

        - name: "L2-Only"
          description: "Nur Frame, keine Substanz"
          problem: "Spin, manipulativ, durchschaubar"
          beispiel: "Das sind Allmachtsphantasien." (ohne L1 oder L3)

        - name: "Level-Sprung"
          description: "Von L1 direkt zu L3 ohne L2"
          problem: "Zusammenhang fehlt, wirkt konstruiert"

# ============================================================================
# AXIOM K9: POPULÄR STATT POPULISTISCH
# ============================================================================

  - id: "AX-K9"
    name: "Populär statt Populistisch"
    status: "FUNDAMENTAL"
    priority: 8
    created: "2026-02-02"

    formal:
      notation: |
        Sei V(c) = Verständlichkeit einer Kommunikation c
        Sei W(c) = Wahrheitsgehalt / Substanz von c
        Sei E(c) = Emotionaler Appell von c
        Sei F(c) = Fakten-Fundierung von c

        AXIOM K9 (Populär vs. Populistisch):

        POPULÄR:      ∂V/∂t > 0 ∧ ∂W/∂t ≥ 0
        POPULISTISCH: ∂V/∂t > 0 ∧ ∂W/∂t < 0

        Alternativ:
        P_populär(c)     = max V(c)  s.t.  W(c) ≥ W_min
        P_populistisch(c) = max V(c)  ohne Constraint auf W(c)

        In Worten:
        POPULÄR:      Verständlichkeit steigt, Wahrheit bleibt (mindestens)
        POPULISTISCH: Verständlichkeit steigt, Wahrheit sinkt

      emotion_constraint: |
        POPULÄR:      E(c) ≤ F(c)    Emotion unterstützt Fakten
        POPULISTISCH: E(c) > F(c)    Emotion ersetzt Fakten

      level_application: |
        L1 (Beweisen):   POPULÄR = Fakten vollständig, verständlich präsentiert
                         POPULISTISCH = Fakten cherry-picked, verzerrt

        L2 (Ordnen):     POPULÄR = Frame = Ordnung (ehrlich, konstruktiv)
                         POPULISTISCH = Frame = Angst (manipulativ, destruktiv)

        L3 (Bedeuten):   POPULÄR = Echte Werte, geteilte Geschichte
                         POPULISTISCH = Manufakturierte Bedrohung, Sündenbock

    natural_language:
      kurz: "Populär ja, populistisch nein. Der Unterschied: Wahrheit."
      lang: |
        POPULÄR bedeutet: Viele Menschen verstehen es, viele Menschen stimmen zu.
        Das ist GUT. Demokratie braucht populäre Politik.

        POPULISTISCH bedeutet: Verständlichkeit durch Vereinfachung der WAHRHEIT.
        Das ist SCHLECHT. Das ist Manipulation.

        Der UNTERSCHIED:
        • POPULÄR:      Verständlich UND wahr
        • POPULISTISCH: Verständlich ABER nicht wahr

        Kickl ist populistisch: Er vereinfacht die Wahrheit bis zur Lüge.
        Babler kann populär sein: Er macht Wahrheit verständlich.

        Die SPÖ hat das RECHT, populär zu sein.
        Die SPÖ hat die PFLICHT, nicht populistisch zu sein.

    examples:
      populaer:
        - topic: "EMRK"
          message: "Die EMRK schützt dich vor dem Staat. Das 'Nie wieder' in Gesetzesform."
          verstaendlichkeit: 0.9
          wahrheit: 1.0
          analyse: "Einfach, wahr, resonant"

        - topic: "Abschiebungen"
          message: "Gesetze werden umgesetzt. Das System funktioniert."
          verstaendlichkeit: 0.85
          wahrheit: 1.0
          analyse: "Fakten vereinfacht, aber nicht verzerrt"

        - topic: "Kickl-Kritik"
          message: "Wer die EMRK angreift, will Macht ohne Kontrolle."
          verstaendlichkeit: 0.9
          wahrheit: 0.95
          analyse: "Zuspitzung, aber faktisch belegbar"

      populistisch:
        - topic: "Migration"
          message: "Ausländer nehmen dir die Wohnung weg!"
          verstaendlichkeit: 0.95
          wahrheit: 0.2
          analyse: "Vereinfacht bis zur Verzerrung, Sündenbock"

        - topic: "EMRK"
          message: "EGMR hat Mitschuld an Gewaltexzessen!"
          verstaendlichkeit: 0.8
          wahrheit: 0.1
          analyse: "Kausalität erfunden, Angst-Frame"

        - topic: "Eliten"
          message: "Die da oben gegen uns!"
          verstaendlichkeit: 0.95
          wahrheit: 0.3
          analyse: "Manufakturierte Spaltung, kein Beleg"

    differentiation:
      table: |
        +---------------------+------------------------+------------------------+
        | Dimension           | POPULÄR (SPÖ)          | POPULISTISCH (Kickl)   |
        +---------------------+------------------------+------------------------+
        | Verständlichkeit    | Hoch ↑                 | Hoch ↑                 |
        | Wahrheit            | Konstant (≥ W_min)     | Sinkt ↓                |
        | Emotion             | Unterstützt Fakten     | Ersetzt Fakten         |
        | Frame               | Ordnung (konstruktiv)  | Angst (destruktiv)     |
        | Komplexität         | Reduziert, nicht       | Eliminiert             |
        |                     | eliminiert             |                        |
        | Sündenbock          | Nein                   | Ja (Ausländer, Elite)  |
        | Lösungsorientiert   | Ja                     | Nein (nur Schuld)      |
        +---------------------+------------------------+------------------------+

    vocabulary:
      erlaubt:
        - "Einfach erklärt"
        - "Auf den Punkt"
        - "Was das für dich bedeutet"
        - "Konkret heisst das"
        - "Verständliche Sprache"
      verboten:
        - "Vereinfachung der Wahrheit"
        - "Angst-Rhetorik"
        - "Sündenbock-Narrativ"
        - "Die da oben"
        - "Fake News, aber verständlich"

    strategic_implication: |
      SPÖ KANN UND SOLL populär sein:
      - Verständliche Sprache = GUT
      - Breite Resonanz = GUT
      - Emotionale Ansprache = GUT (wenn faktenbasiert)

      SPÖ DARF NICHT populistisch sein:
      - Wahrheit opfern = VERBOTEN
      - Sündenböcke schaffen = VERBOTEN
      - Angst schüren ohne Lösung = VERBOTEN

      DAS IST DER UNTERSCHIED ZU KICKL:
      - Kickl muss Wahrheit opfern für Verständlichkeit
      - Babler kann Wahrheit verständlich machen

# ============================================================================
# AXIOM K10: DREI NUTZEN-EBENEN (Meta-Axiom)
# ============================================================================

  - id: "AX-K10"
    name: "Drei Nutzen-Ebenen"
    status: "FUNDAMENTAL"
    priority: -1  # Meta-Axiom = höchste Priorität (erklärt K1)
    created: "2026-02-02"

    formal:
      notation: |
        Jeder Stakeholder hat eine Nutzenfunktion mit DREI Komponenten:

        U = w₁·U_IND + w₂·U_COLL + w₃·U_IDN

        Wobei:
          U_IND  = Individueller Nutzen  ("Was bringt es MIR?")
          U_COLL = Kollektiver Nutzen    ("Was bringt es UNS?")
          U_IDN  = Identitärer Nutzen    ("Wer bin ICH/WIR?")

        Gewichte: w₁ + w₂ + w₃ = 1, wᵢ ≥ 0

      dominance_theorem: |
        AXIOM K10 (Nutzen-Differenzierung):

        Wenn Partei A dominiert auf Nutzen-Ebene X,
        dann muss Partei B auf anderen Ebenen Y,Z dominieren.

        Anwendung:
          FPÖ dominiert U_IDN (Identitätspolitik)
          → SPÖ muss U_IND + U_COLL dominieren

        Dies ERKLÄRT Axiom K1:
          K1: "Was Kickl besser kann, machen wir nicht"
          = "Auf U_IDN-Territorium nicht konkurrieren"

      strategic_space: |
        Strategischer Raum (3D):

                    U_IDN (Identität)
                     ▲
                     │    ████ FPÖ-Dominanz
                     │    "Österreicher zuerst"
                     │    "Wir vs. Die"
                     │
                     │              ████ SPÖ-Dominanz
                     │              "Ordnung für ALLE"
                     │              "DEINE Rechte"
         ────────────┼──────────────────────▶ U_IND (Individuum)
                     │
                     │
         U_COLL ◀────┘
         (Kollektiv)

        SPÖ-Raum: Hohe U_IND + Hohe U_COLL, niedrige U_IDN
        FPÖ-Raum: Hohe U_IDN, fake U_IND, negative U_COLL

    natural_language:
      kurz: "FPÖ fischt im Identitäts-Teich. SPÖ muss im Individual- und Kollektiv-Teich fischen."
      lang: |
        Menschen haben DREI Arten von Nutzen:

        1. INDIVIDUELLER NUTZEN (U_IND)
           "Was bringt es MIR persönlich?"
           → Sicherheit, Wohlstand, Gesundheit, Rechte, Freiheit

        2. KOLLEKTIVER NUTZEN (U_COLL)
           "Was bringt es UNS ALLEN / der Gesellschaft?"
           → Gemeinwohl, Solidarität, Zusammenhalt, Zukunft

        3. IDENTITÄRER NUTZEN (U_IDN)
           "Wer bin ICH? Zu wem gehöre ICH?"
           → Zugehörigkeit, Stolz, Abgrenzung, "Meine Leute"

        FPÖ dominiert U_IDN: "Österreicher zuerst", "Wir gegen Die"
        → SPÖ kann hier NICHT gewinnen (K1!)

        SPÖ muss U_IND + U_COLL dominieren:
        → "Die EMRK schützt DICH" (U_IND)
        → "Ordnung für ALLE" (U_COLL)

    stakeholder_utilities:
      waehler:
        formula: "U = w₁·U_IND + w₂·U_COLL + w₃·U_IDN"
        components:
          U_IND:
            definition: "Individueller Nutzen"
            drivers: ["Sicherheit", "Wohlstand", "Gesundheit", "Rechte"]
          U_COLL:
            definition: "Kollektiver Nutzen"
            drivers: ["Gemeinwohl", "Solidarität", "Zukunft", "Zusammenhalt"]
          U_IDN:
            definition: "Identitärer Nutzen"
            drivers: ["Zugehörigkeit", "Stolz", "Abgrenzung", "In-Group"]
        segments:
          werte_waehler:
            weights: [0.2, 0.5, 0.3]
            dominant: "U_COLL"
            description: "Gemeinwohl-orientiert"
          angst_waehler:
            weights: [0.3, 0.1, 0.6]
            dominant: "U_IDN"
            description: "Identitäts-orientiert (FPÖ-affin)"
          pragmatiker:
            weights: [0.5, 0.3, 0.2]
            dominant: "U_IND"
            description: "Eigennutz-orientiert"

      spo:
        formula: "max Stimmen(U_IND + U_COLL)"
        constraints: ["K1: Nicht auf U_IDN konkurrieren"]
        instruments:
          U_IND_erhoehen:
            - "EMRK schützt DICH"
            - "DEINE Rechte"
            - "DU bist geschützt"
          U_COLL_erhoehen:
            - "Ordnung für ALLE"
            - "Gemeinsam"
            - "Nie wieder"
            - "700 Millionen Menschen"
          U_IDN_nur_positiv:
            - "Österreich auf der richtigen Seite"
            - "Unser Erbe"
            - "KEINE Abgrenzung gegen Gruppen"

      fpo:
        formula: "max Stimmen(U_IDN)"
        constraints: []  # Keine ethischen Constraints
        instruments:
          U_IDN_erhoehen:
            - "Österreicher zuerst"
            - "Wir gegen Die"
            - "Ausländer raus"
            - "Die da oben"
          U_COLL_zerstoeren:
            - "System kaputt"
            - "Vertrauen zerstören"
            - "Spaltung"
          U_IND_fake:
            - "Schützt dich vor Ausländern" (aber keine echte Lösung)

    application_to_levels:
      L1_beweisen:
        U_IND: "Die Zahlen belegen: DU bist geschützt"
        U_COLL: "Das System funktioniert für ALLE"
        U_IDN: "(vermeiden - FPÖ-Territorium)"

      L2_ordnen:
        U_IND: "Wer das angreift, greift DEINE Rechte an"
        U_COLL: "Das ist ein Angriff auf unsere Ordnung"
        U_IDN: "(vermeiden - FPÖ-Territorium)"

      L3_bedeuten:
        U_IND: "Die EMRK schützt JEDEN Österreicher - auch DICH"
        U_COLL: "Das 'Nie wieder' in Gesetzesform - für uns ALLE"
        U_IDN: "Österreich auf der richtigen Seite der Geschichte"
        note: "U_IDN nur POSITIV (Stolz), NICHT abgrenzend!"

    wording_examples:
      U_IND_fokus:
        - "Die EMRK schützt DICH vor staatlicher Willkür."
        - "DEINE Rechte sind nicht verhandelbar."
        - "DU hast ein Recht auf faire Behandlung."

      U_COLL_fokus:
        - "700 Millionen Menschen werden geschützt."
        - "Ordnung, die für ALLE gilt."
        - "Gemeinsam haben wir das aufgebaut."
        - "Das 'Nie wieder' für uns alle."

      U_IDN_positiv:
        - "Österreich steht auf der richtigen Seite."
        - "Wir sind Teil einer zivilisatorischen Errungenschaft."
        - "Das ist UNSER Erbe - und wir verteidigen es."

      U_IDN_verboten:
        - "❌ Echte Österreicher wissen das"
        - "❌ Wir gegen die Anderen"
        - "❌ Ausländer verstehen das nicht"

    meta_insight: |
      AX-K10 ist das META-AXIOM, das erklärt WARUM die anderen Axiome gelten:

      K1 (Kickl-Differenzierung) = Nicht auf U_IDN konkurrieren
      K3 (Ordnung-Frame) = U_COLL statt U_IDN
      K4 (USP-Pflicht) = USPs liegen bei U_IND + U_COLL
      K5 (EMRK-Würdigung) = U_COLL (Menschheit) + U_IND (schützt DICH)
      K9 (Populär statt Populistisch) = U_IND + U_COLL ehrlich ansprechen

      Das Axiom-System ist ein OPTIMIERUNGSPROBLEM:

      max U_SPÖ = Stimmen
      s.t. Strategie ∈ {U_IND, U_COLL} (nicht U_IDN)
      s.t. K1-K9 (ethische Constraints)

