  gamma_EX_gap:
    value: -0.27
    description: "Struktureller Nachteil vs. FPÖ (γ_SPÖ - γ_FPÖ)"
    implication: "SPÖ kann auf E×X-Dimension nicht gewinnen"

  # Utility-Struktur der SPÖ-Wähler 2024
  utility_weights:
    F_financial: 0.30      # Welfare-Expansion (SPÖ-Stärke)
    S_social: 0.08         # Klassensolidarität (tot)
    E_emotional: 0.20      # Sicherheit (SPÖ-Schwäche)
    X_existential: 0.30    # Identität (SPÖ-Schwäche)
    P_physical: 0.15       # Persönliche Sicherheit
    D_developmental: 0.05  # Selbstverwirklichung

  # Kontextfaktoren (Ψ)
  psi_dimensions:
    psi_I_institutional: 0.65   # Vertrauen in Institutionen (mittel)
    psi_S_social: 0.45          # Soziale Kohäsion (niedrig, Polarisierung)
    psi_C_cognitive: 0.40       # Kognitive Last (hoch, komplexe Themen)
    psi_K_cultural: 0.55        # Kulturelle Werte (gespalten)
    psi_E_economic: 0.50        # Wirtschaftliche Ressourcen (mittel)
    psi_T_temporal: 0.30        # Zeitdruck (hoch, Wahlen)
    psi_M_material: 0.60        # Technologie-Zugang (gut)
    psi_F_physical: 0.70        # Physische Infrastruktur (gut)

