# -----------------------------------------------------------------------------
# EXECUTIVE SUMMARY
# -----------------------------------------------------------------------------
executive_summary:
  current_status: "KRISE"
  headline: "Historisches Minimum 21.1% (NRW 2024) nach Komplementaritäts-Kollaps"

  key_metrics_2024:
    vote_share_nrw: 0.211          # 21.1% - historisch niedrigster Wert
    rank: 2                        # Erstmals hinter FPÖ
    seats_nationalrat: 41          # von 183
    members_approx: 150000         # geschätzt, fallend
    gamma_class: 0.15              # Klassenkomplementarität (kollabiert von 0.50)
    gamma_EX_disadvantage: -0.27   # Struktureller Nachteil vs. FPÖ

  core_problem: |
    Die SPÖ steht vor einem STRUKTURELLEN Dilemma:
    1. γ_class (Klassenkomplementarität) ist von 0.50 (1979) auf 0.15 (2024) kollabiert
    2. γ_{E×X} (Identitäts-Sicherheits-Komplementarität) = 0.42 begünstigt FPÖ
    3. Gap = 0.15 - 0.42 = -0.27 → SPÖ hat strukturellen Nachteil
    4. Bablers "progressive Reframing"-Strategie aktivierte FPÖ-vorteilhafte Dimension

  strategic_options:
    - code: "A"
      name: "Links-Nationalist"
      description: "Welfare + Migration-Restriktion"
      problem: "Ideologische Inkohärenz, verliert Grün-Wähler"
      prognosis: "20-23%"
    - code: "B"
      name: "Defokus"
      description: "Shift zu Gesundheit/Klima/Anti-Korruption"
      problem: "Dauert 5-10 Jahre, überlässt Migration der FPÖ"
      prognosis: "23-28% (langfristig)"
    - code: "C"
      name: "Opposition abwarten"
      description: "Auf externen Schock warten (Wirtschaftskrise)"
      problem: "Passiv, γ_class wird nicht zurückkehren"
      prognosis: "21-25%"

