# 8. ZUSAMMENFASSUNG: LOKALE VS. GLOBALE OPTIMIERUNG
# =============================================================================
summary:

  comparison_table:
    headers: ["Aspekt", "Lokale Optimierung", "Globale Optimierung"]
    rows:
      - aspect: "Paradigma"
        local: "De-Salienzierung"
