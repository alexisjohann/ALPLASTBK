  key_insight: |
    Die Bewertung des Slogans ist KEINE isolierte Frage.
    Sie ist die KONSEQUENZ einer strategischen Grundsatzentscheidung.

    Wer De-Salienz wählt, sollte den Slogan modifizieren.
    Wer Neupositionierung wählt, sollte den Slogan beibehalten.

    Die Slogan-Frage IST die Strategie-Frage.

