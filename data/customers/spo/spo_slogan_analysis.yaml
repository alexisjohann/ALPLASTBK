  strength_1_e_dimension:
    value: "HOCH"
    description: |
      "Ordnen" spricht E-Dimension (Sicherheit) an.
      Das ist genau, was Wähler wollen.
      Besser als "Gerechtigkeit" oder "Solidarität".
    paradigm_invariant: true

  strength_2_struktur:
    value: "MITTEL"
    description: |
