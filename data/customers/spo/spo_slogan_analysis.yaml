      Kann auf viele Themen angewendet werden.
      Besser als "Humane Asylpolitik".
    paradigm_invariant: true

  # NEU: Stärke im Two-Path Model
  strength_5_two_path_coherence:
    value: "HOCH"
    description: |
      Im Two-Path Model ist der Slogan STRATEGISCH KOHÄRENT:

      "Ordnen" = γ^{Funktion} = SPÖ-Produkt
      "statt Spalten" = Kontrast zu γ^{Ausschluss} = FPÖ-Produkt

      Der Slogan IST die Markt-Positionierung.
    only_in_global_optimization: true

