  # LOKALE OPTIMIERUNG: Ursprüngliche Bewertung
  local_optimization:
    score:
      raw: 0.52
      scale: "0-1 (1 = optimal)"
      verdict: "SUBOPTIMAL"

    scorecard:
      e_dimension_addressed: "✅ JA (0.70)"
      x_dimension_addressed: "⚠️ UNKLAR (0.35)"
      fpoe_frame_avoided: "❌ NEIN (Negation aktiviert)"
      alternative_salienz: "❌ NEIN (kein Thema)"
      arbeiter_segment_appeal: "⚠️ SCHWACH (0.35)"
      internal_consistency: "⚠️ UNKLAR (Doskozil?)"

    verdict: |
      "Ordnen statt Spalten" ist BESSER als Bablers bisherige Rhetorik,
      aber NICHT OPTIMAL.

      ✅ RICHTIG: E-Dimension ("Ordnen")
      ❌ FALSCH: FPÖ-Frame-Aktivierung ("statt Spalten")
      ❌ FALSCH: Keine alternative Salienz
      ⚠️ RISIKO: Moralisierende Tonalität

  # GLOBALE OPTIMIERUNG: Neue Bewertung
  global_optimization:
    score:
      raw: 0.78
      scale: "0-1 (1 = optimal)"
      verdict: "STRATEGISCH KOHÄRENT"

    scorecard:
      e_dimension_addressed: "✅ JA (0.70)"
      x_dimension_addressed: "✅ JA via Beitrag (0.65)"
      two_path_differentiation: "✅ JA (Markt-Segmentierung)"
      gamma_funktion_activation: "✅ JA (0.85)"
      arbeiter_segment_appeal: "⚠️ MITTEL (0.55)"
      internal_consistency: "⚠️ UNKLAR (Doskozil?)"

    verdict: |
      Im Two-Path Model ist "Ordnen statt Spalten" STRATEGISCH KOHÄRENT:

      ✅ RICHTIG: E-Dimension ("Ordnen")
      ✅ RICHTIG: X via Beitrag ("wer beiträgt, gehört dazu")
      ✅ RICHTIG: Markt-Differenzierung (zwei γ_{E×X} Pfade)
      ⚠️ VERBESSERBAR: Arbeiter-Segment-Appeal
      ⚠️ RISIKO: Interne Konsistenz (Doskozil)

  # META-BEWERTUNG: Welches Paradigma wählen?
  paradigm_choice:
    question: "Welches Paradigma ist angemessen?"

    local_optimization_when:
      - "Wenn SPÖ bei 27% stabil bleiben will"
      - "Wenn keine Execution-Kapazität für Neupositionierung"
      - "Wenn interne Kohärenz nicht herstellbar"
      - "Wenn kurzfristiges Ergebnis wichtiger als langfristige Position"
      expected_outcome: "27.8% [22.8%, 33.2%]"

    global_optimization_when:
      - "Wenn 27% nicht reicht (Koalitions-Mathematik)"
      - "Wenn Execution-Kapazität vorhanden"
      - "Wenn interne Kohärenz herstellbar (Doskozil)"
      - "Wenn langfristige Positionierung wichtiger als 2029"
      - "Wenn Babler-Biografie (Traiskirchen) genutzt werden soll"
      expected_outcome: "25.1% [15.2%, 38.1%] - HÖHERE VARIANZ"

    strategic_insight: |
      Die Frage ist NICHT: "Ist der Slogan gut?"
      Die Frage ist: "Welche Strategie verfolgen wir?"

      Der Slogan IST GUT, wenn man Neupositionierung verfolgt.
      Der Slogan IST SUBOPTIMAL, wenn man De-Salienz verfolgt.

      Die Entscheidung über den Slogan IST die Entscheidung
      über die strategische Richtung.

# =============================================================================
# 6. EMPFEHLUNG (PARADIGMEN-ABHÄNGIG)
# =============================================================================
recommendation:

  # BEI LOKALER OPTIMIERUNG (De-Salienz)
  if_local_optimization:
    primary_recommendation: "MODIFIZIEREN"

    rationale: |
      Der Slogan hat einen guten Kern ("Ordnen" → E-Dimension),
      aber "statt Spalten" aktiviert den FPÖ-Frame.

      EBF-PRINZIP: Eigenen Frame setzen, nicht Gegner negieren.

    modification_options:

      option_A:
        slogan: "Ordnen. Für alle."
        change: "Entfernt FPÖ-Referenz"
        e_score: 0.70
        x_score: 0.25
        frame_risk: "NIEDRIG"
        weakness: "Weniger kontrastreich"
        overall: 0.62

      option_B:
        slogan: "Ordnung. Sicherheit. Zusammenhalt."
        change: "Drei positive Begriffe statt Negation"
        e_score: 0.75
        x_score: 0.40
        frame_risk: "NIEDRIG"
        weakness: "Länger, weniger einprägsam"
        overall: 0.68

      option_C:
        slogan: "Ordnen, was zählt: Wohnen. Pflege. Jobs."
        change: "Verbindet E mit konkreten Themen"
        e_score: 0.70
        f_score: 0.60
        frame_risk: "SEHR NIEDRIG"
        strength: "Setzt alternative Salienz"
        overall: 0.72

    best_for_local: "Option C"

  # BEI GLOBALER OPTIMIERUNG (Two-Path)
  if_global_optimization:
    primary_recommendation: "BEIBEHALTEN"

    rationale: |
      Im Two-Path Model IST der Slogan die Markt-Positionierung.
      "Ordnen" = γ^{Funktion}, "statt Spalten" = Kontrast zu γ^{Ausschluss}.

      Modifizieren würde die Markt-Differenzierung aufweichen.

    enhancement_options:

      option_A:
        approach: "Kernframe beibehalten, mit Themen verknüpfen"
        execution: |
          Slogan: "Ordnen statt Spalten"

          Verknüpfung:
          - "Ordnung beim Wohnen, nicht Spaltung beim Wohnen"
          - "Ordnung bei der Integration, nicht Ausgrenzung"
          - "Ordnung, die funktioniert" (Kurzform)
        score: 0.78

      option_B:
        approach: "Expliziten Beitrags-Frame hinzufügen"
        execution: |
          Slogan: "Ordnen statt Spalten. Wer beiträgt, gehört dazu."

          → Macht X^{Beitrag} explizit
          → Definiert γ^{Funktion} vollständig
        score: 0.82

      option_C:
        approach: "Babler-Biografie integrieren"
        execution: |
          Slogan: "Ordnung, die funktioniert."
          Unterzeile: "Als Bürgermeister von Traiskirchen habe ich gelernt..."

          → Credibility für γ^{Funktion}
          → Authentizität
        score: 0.85

    best_for_global: "Option B oder C"

  # META-EMPFEHLUNG
  strategic_recommendation:
    if_paradigm_unclear: |
      ZUERST Paradigma klären:
      1. Ist Neupositionierung überhaupt möglich? (Execution, Kohärenz)
      2. Was ist das Ziel: Stabilität (27%) oder Wachstum (>30%)?
      3. Ist Babler-Biografie nutzbar?

      DANN Slogan bewerten.

    conditional_verdict: |
      WENN Neupositionierung → Slogan BEIBEHALTEN + Option B/C
      WENN De-Salienz → Slogan MODIFIZIEREN zu Option C

# =============================================================================
# 7. KOMMUNIKATIONS-GUIDELINE (ERWEITERT)
# =============================================================================
usage_guideline:

  wenn_slogan_verwendet_wird:

    do:
      - "Immer mit konkretem Thema verbinden"
      - "Fokus auf 'Ordnen', nicht auf 'Spalten'"
      - "'Ordnen' visuell und akustisch betonen"
      - "Konkrete Beispiele nennen: Was wird geordnet?"
      # NEU für Two-Path:
      - "'Wer beiträgt, gehört dazu' als Unterzeile verwenden"
      - "Babler-Traiskirchen-Erfahrung einbinden"
      - "Beweise für Execution liefern (Zahlen, Ergebnisse)"

    dont:
      - "Slogan isoliert verwenden"
      - "FPÖ namentlich erwähnen im selben Satz"
      - "Moralische Überlegenheit signalisieren"
      - "'Spalten' als Hauptbotschaft"
      # NEU für Two-Path:
      - "FPÖ-Wähler als 'Spalter' bezeichnen (nur FPÖ-Produkt!)"
      - "Ohne konkrete Beweise für 'Ordnung' reden"

    beispiel_gut_local:
      kontext: "TV-Interview (De-Salienz-Strategie)"
      frage: "Was ist Ihre Botschaft?"
      antwort: |
        "Ordnen, was wirklich zählt. Die Mieten explodieren,
        die Pflege bricht zusammen - das müssen wir ordnen.
        Dafür braucht es eine Regierung, die anpackt."

    beispiel_gut_global:
      kontext: "TV-Interview (Two-Path-Strategie)"
      frage: "Was ist Ihre Botschaft?"
      antwort: |
        "Ordnung, die funktioniert. Als Bürgermeister in Traiskirchen
        habe ich gelernt: Ordnung und Menschlichkeit gehören zusammen.
        Wir haben in sechs Monaten 12.000 Menschen in Arbeit gebracht.
        Das ist Ordnung. Wer beiträgt, gehört dazu."

    beispiel_schlecht:
      kontext: "TV-Interview"
      frage: "Was ist Ihre Botschaft?"
      antwort: |
        "Ordnen statt Spalten. Die FPÖ spaltet das Land,
        wir wollen Ordnung schaffen. Kickl ist ein Spalter."
      warum_schlecht: |
        - FPÖ 3x erwähnt
        - Kein konkretes Thema
        - Moralisierende Tonalität
        - Frame-Aktivierung für FPÖ (auch in Two-Path vermeiden!)

