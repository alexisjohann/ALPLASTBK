      Leicht zu merken, gut für Wahlkampf.
    paradigm_invariant: true

  strength_3_abgrenzung:
    local_optimization:
      value: "MITTEL"
      description: |
        Klare Abgrenzung von FPÖ.
        Positioniert SPÖ als konstruktiv vs. destruktiv.
    global_optimization:
      value: "HOCH"
      description: |
        Klare MARKT-SEGMENTIERUNG.
        Definiert zwei Produkte: γ^{Funktion} vs. γ^{Ausschluss}.
        Ermöglicht Wählern, bewusst zu wählen.

  strength_4_nicht_migration_explizit:
