# =============================================================================
# 0. PARADIGMEN-KONTRAST: LOKALE VS. GLOBALE OPTIMIERUNG
# =============================================================================
paradigm_contrast:

  fundamental_distinction: |
    Die Bewertung des Slogans "Ordnen statt Spalten" hängt FUNDAMENTAL
    vom gewählten strategischen Paradigma ab:

    PARADIGMA A: Lokale Optimierung (De-Salienzierung)
    → Ziel: Migration-Salienz reduzieren, FPÖ-Terrain meiden
    → Annahme: γ_{E×X} ist monolithisch und gehört der FPÖ
    → Bewertung: "statt Spalten" aktiviert FPÖ-Frame = SCHLECHT

    PARADIGMA B: Globale Optimierung (Two-Path Model)
    → Ziel: Eigenen γ_{E×X}^{Funktion} aufbauen
    → Annahme: γ_{E×X} ist multidimensional, SPÖ kann eigenen Pfad etablieren
    → Bewertung: "statt Spalten" definiert Kontrast zwischen Pfaden = GUT

  paradigm_A_local:
    name: "De-Salienzierung / Lokale Optimierung"
    assumption: "γ_{E×X} = 0.42 gehört FPÖ, ist nicht angreifbar"
    strategy: "Migration-Terrain meiden, alternative Salienz aufbauen"
    slogan_assessment:
      score: 0.52
      verdict: "SUBOPTIMAL"
      problem: "'statt Spalten' aktiviert FPÖ-Frame (Lakoff)"
      recommendation: "Modifizieren zu 'Ordnen, was zählt'"

  paradigm_B_global:
    name: "Neupositionierung / Globale Optimierung"
    assumption: "γ_{E×X} ist Raum mit zwei Pfaden: Ausschluss (FPÖ) vs. Funktion (SPÖ)"
    strategy: "Eigenen γ^{Funktion} etablieren, klaren Kontrast zu γ^{Ausschluss} setzen"
    slogan_assessment:
      score: 0.78
      verdict: "STRATEGISCH KOHÄRENT"
      strength: "'statt Spalten' = Marktsegmentierung, nicht Frame-Aktivierung"
      recommendation: "Beibehalten als Teil des Neupositionierungs-Frames"

  why_different_conclusions: |
    LOKALE OPTIMIERUNG sieht "statt Spalten" als FRAME-AKTIVIERUNG:
    - Lakoff: "Negation aktiviert Frame"
    - Jede Erwähnung von "Spalten" = FPÖ denken
    - Schlussfolgerung: Streichen, um FPÖ-Frame zu vermeiden

    GLOBALE OPTIMIERUNG sieht "statt Spalten" als MARKTSEGMENTIERUNG:
    - Nicht Negation eines bestehenden Frames
    - Sondern KONTRAST zwischen zwei Produkten im Markt
    - "Ordnen" = γ^{Funktion} (SPÖ-Produkt: Systeme funktionieren)
    - "Spalten" = γ^{Ausschluss} (FPÖ-Produkt: Grenzen schliessen)
    - Schlussfolgerung: Behalten, um Markt-Position zu definieren

  critical_insight: |
    Der Unterschied ist NICHT semantisch, sondern STRATEGISCH:

    Bei De-Salienz arbeitet man INNERHALB der bestehenden Marktstruktur.
    Bei Neupositionierung verändert man DIE MARKTSTRUKTUR SELBST.

    "statt Spalten" ist nur dann Frame-Aktivierung, wenn man annimmt,
    dass es nur EINEN γ_{E×X} gibt. Wenn man annimmt, dass es ZWEI gibt,
    ist es Definition des eigenen Produkts.

# =============================================================================
# 1. SEMANTISCHE ANALYSE
# =============================================================================
semantic_analysis:

  word_1_ordnen:
    denotation: "In Ordnung bringen, strukturieren, regeln"
    connotations:
      positive:
        - "Kontrolle"
        - "Struktur"
        - "Sicherheit"
        - "Kompetenz"
        - "Handlungsfähigkeit"
      negative:
        - "Autoritär" (bei manchen)
        - "Bürokratisch"
      neutral:
        - "Sachlich"
        - "Pragmatisch"

    semantic_field:
      primary: "Ordnung, Kontrolle, Struktur"
      associations:
        - "Ordnung schaffen"
        - "Ordnungspolitik"
        - "Geordnete Verhältnisse"
        - "Ordnungsgemäß"

    ebf_dimension_mapping:
      E_security: 0.75  # Stark - Ordnung = Sicherheit
      F_financial: 0.30  # Mittel - Ordnung in Finanzen
      X_identity: 0.40  # Mittel - "Unsere Ordnung"
      S_social: 0.20  # Schwach

    # NEU: Two-Path Mapping
    two_path_mapping:
      gamma_funktion: 0.85  # "Ordnen" = E(Systeme) × X(Beitrag)
      mechanism: "'Ordnen' codiert γ^{Funktion}: Dinge funktionieren lassen"

  word_2_statt:
    function: "Kontrastmarker"
    implies: "Alternative zu etwas Schlechtem"
    creates: "Binäre Opposition"

    # NEU: Paradigmen-abhängige Interpretation
    paradigm_interpretation:
      local_optimization: |
        "statt" = Negation
        → Aktiviert das Negierte (Lakoff)
        → PROBLEMATISCH
      global_optimization: |
        "statt" = Marktsegmentierung
        → Definiert zwei distinkte Produkte
        → STRATEGISCH KOHÄRENT

  word_3_spalten:
    denotation: "Trennen, entzweien, Zwietracht säen"
    connotations:
      negative:
        - "Zerstörung"
        - "Hass"
        - "Chaos"
        - "Populismus"
        - "Unverantwortlich"

    implicit_target: "FPÖ (und Kickl)"

    # NEU: Two-Path Mapping
    two_path_mapping:
      gamma_ausschluss: 0.90  # "Spalten" = E(Grenzen) × X(Herkunft)
      mechanism: "'Spalten' codiert γ^{Ausschluss}: Gesellschaft nach Herkunft teilen"

    # AKTUALISIERT: Paradigmen-abhängiges Risiko
    semantic_risk:
      local_optimization: |
        "Spalten" ist ein ANGRIFF auf jemanden.
        Wer fühlt sich angesprochen?
        - FPÖ-Wähler könnten sich angegriffen fühlen
        - Könnte als "Moralisieren" wahrgenommen werden
        → HOHES RISIKO
      global_optimization: |
        "Spalten" ist eine PRODUKTBESCHREIBUNG.
        - Beschreibt das FPÖ-Produkt (nicht FPÖ-Wähler)
        - Ermöglicht Wählern, Produkte zu vergleichen
        - Nicht moralisierend, sondern differenzierend
        → AKZEPTABLES RISIKO

  overall_structure:
    pattern: "X statt Y"
    examples_similar:
      - "Fakten statt Fake News"
      - "Handeln statt Reden"
      - "Miteinander statt Gegeneinander"
    pattern_strength: "Klar, einprägsam, kontrastreich"

    # NEU: Paradigmen-abhängige Bewertung
    paradigm_assessment:
      local: "Aktiviert Gegner-Frame"
      global: "Definiert Markt-Kontrast"

# =============================================================================
# 2. 10C-DIMENSIONEN-ANALYSE (ERWEITERT)
# =============================================================================
analysis_10c:

  # WHAT: Welche Utility-Dimensionen werden angesprochen?
  what_utility:
    E_emotional_security:
      addressed: true
      strength: 0.70
      mechanism: "'Ordnen' = Kontrolle = Sicherheit"
      alignment_with_voter_demand: "GUT - Wähler wollen E"

    F_financial:
      addressed: false
      strength: 0.10
      note: "Kein direkter Bezug zu materiellen Fragen"

    S_social_class:
      addressed: false
      strength: 0.05
      note: "Kein Klassenbezug"

    X_existential_identity:
      addressed: "ambivalent"

      # NEU: Paradigmen-abhängige Bewertung
      local_optimization:
        strength: 0.35
        mechanism: |
          "Ordnen" KÖNNTE X ansprechen ("unsere Ordnung verteidigen")
          ABER "statt Spalten" ist eher moralisch-universalistisch
        risk: "Widersprüchliche X-Signale"

      global_optimization:
        strength: 0.65
        mechanism: |
          "Ordnen" = X über BEITRAG definiert
          "Wer beiträgt, gehört dazu" (nicht "wer hier geboren ist")
          X^{Beitrag} ist konsistent mit SPÖ-Werten
        risk: "Gering - X wird via Funktion, nicht Herkunft, bedient"

    utility_assessment:
      local_optimization:
        positive: "Spricht E an (0.70) - das ist gut!"
        negative: "X-Signal unklar (0.35)"
        gap_to_optimal: |
          Optimal wäre: E stark + X moderat + F als Brücke
          Slogan: E stark + X unklar + F absent
      global_optimization:
        positive: "E stark (0.70), X via Beitrag (0.65)"
        negative: "F nicht direkt angesprochen"
        gap_to_optimal: |
          γ^{Funktion} = E(Systeme) × X(Beitrag) wird etabliert
          Nur F-Dimension separat zu bedienen (andere Kommunikation)

  # HOW: Aktiviert der Slogan γ_{E×X}?
  how_complementarity:

    # LOKALE OPTIMIERUNG: Alte Analyse
    local_optimization_view:
      gamma_EX_risk:
        activated: "TEILWEISE"
        direction: "UNKLAR"

        analysis: |
          "Ordnen" alleine → könnte eigene γ_{E×X} aufbauen (GUT)
          "statt Spalten" → aktiviert FPÖ-Frame durch Negation (SCHLECHT)

          PROBLEM: Negation aktiviert den negierten Frame!
          "Denke NICHT an einen rosa Elefanten" → rosa Elefant aktiviert

          Wenn Wähler "statt Spalten" hört:
          1. Wähler denkt an FPÖ
          2. Wähler denkt an Migration (FPÖ-Kernthema)
          3. γ_{E×X} = 0.42 aktiviert sich für FPÖ

      lakoff_frame_analysis:
        reference: "George Lakoff: Don't Think of an Elephant"
        application: |
          "statt Spalten" AKTIVIERT den FPÖ-Frame, auch wenn negativ.
          Besser wäre: Eigenen Frame setzen, FPÖ nicht erwähnen.

    # GLOBALE OPTIMIERUNG: Neue Analyse
    global_optimization_view:
      gamma_EX_assessment:
        gamma_funktion_activation: 0.85
        gamma_ausschluss_contrast: 0.80

        analysis: |
          Im Two-Path Model ist "Ordnen statt Spalten" KEIN Frame-Fehler,
          sondern MARKTSEGMENTIERUNG:

          "Ordnen" = γ^{Funktion} = E(Systeme funktionieren) × X(Beitrag zählt)
          "Spalten" = γ^{Ausschluss} = E(Grenzen schliessen) × X(Herkunft zählt)

          Der Slogan sagt: "Wir bieten Produkt A, nicht Produkt B."
          Das ist keine Negation, sondern Differenzierung.

      lakoff_reinterpretation:
        original_criticism: "Negation aktiviert Frame"
        two_path_response: |
          Lakoffs Regel gilt für EINZELNE Frames innerhalb eines Marktes.

          ABER: Wenn zwei VERSCHIEDENE Produkte existieren,
          ist der Vergleich keine Aktivierung, sondern Positionierung.

          "Butter statt Margarine" aktiviert nicht den Margarine-Frame,
          sondern definiert zwei Produkte.

          "Ordnen statt Spalten" = "γ^{Funktion} statt γ^{Ausschluss}"
          = Zwei Produkte, nicht Frame-Aktivierung.

  # AWARE: Wie wirkt der Slogan auf Awareness?
  aware_salience:
    migration_salience:
      local_optimization:
        increased: "JA (indirekt)"
        mechanism: "'Spalten' assoziiert mit Migrations-Debatte"
        risk: "Hält Migration salient - schlecht für SPÖ"
      global_optimization:
        increased: "JA, aber KONTROLLIERT"
        mechanism: |
          Migration wird angesprochen, aber NICHT als Problem,
          sondern als GELÖSTES Problem:
          "Wir ORDNEN" (impliziert: wir haben Lösung)
        risk: "Gering, weil SPÖ als Lösung positioniert wird"

    alternative_salience:
      wohnen: "NEIN - nicht im Slogan, aber in Rede verknüpft"
      pflege: "NEIN - nicht im Slogan, aber in Rede verknüpft"
      klima: "NEIN - nicht angesprochen"
      assessment:
        local: "Slogan setzt KEINE alternative Salienz"
        global: |
          Slogan ist FRAMEWORK, nicht Thema.
          Verknüpfung mit Wohnen/Pflege erfolgt in Rede:
          "Ordnung bei Wohnen, Ordnung bei Pflege, Ordnung bei Integration"

  # WHO: Wie reagieren verschiedene Segmente?
  who_segments:
    loyale_kernwaehler:
      reaction: "positiv"
      score: 0.70
      reason: "Anti-FPÖ Botschaft gefällt"
      paradigm_invariant: true  # Gleiches Ergebnis in beiden Paradigmen

    verlorene_arbeiter:
      local_optimization:
        reaction: "AMBIVALENT BIS NEGATIV"
        score: 0.35
        reason: |
          - Mögen "Ordnen" (E-Dimension)
          - ABER: Fühlen sich evtl. als "Spalter" angesprochen
          - Viele haben FPÖ gewählt - werden sie angegriffen?
          - Moralisierende Tonalität kann abstossen
      global_optimization:
        reaction: "NEUTRAL BIS POSITIV"
        score: 0.55
        reason: |
          - Mögen "Ordnen" (E-Dimension)
          - "Spalten" = FPÖ-Produkt, nicht FPÖ-Wähler
          - Wähler werden nicht angegriffen, nur informiert
          - "Wer beiträgt, gehört dazu" spricht Arbeitsethik an

    urbane_progressive:
      reaction: "positiv"
      score: 0.65
      reason: "Anti-Populismus-Botschaft gefällt"
      paradigm_invariant: true

    pragmatische_mitte:
      reaction: "neutral bis positiv"
      score: 0.55
      reason: "'Ordnen' spricht an, 'Spalten' ist richtig"
      paradigm_invariant: true

    segment_weighted_score:
      local_optimization:
        calculation: "0.35×0.70 + 0.25×0.35 + 0.20×0.65 + 0.20×0.55"
        result: 0.54
        benchmark: "Unter 0.60 = suboptimal"
      global_optimization:
        calculation: "0.35×0.70 + 0.25×0.55 + 0.20×0.65 + 0.20×0.55"
        result: 0.62
        benchmark: "Über 0.60 = akzeptabel"

# =============================================================================
# 3. RISIKO-ANALYSE (PARADIGMEN-ABHÄNGIG)
# =============================================================================
risk_analysis:

  risk_1_frame_activation:
    local_optimization:
      severity: "HOCH"
      probability: 0.70
      description: |
        "statt Spalten" aktiviert FPÖ-Frame durch Negation.
        Jede Verwendung des Slogans erinnert an FPÖ.
        FPÖ bekommt kostenlose Erwähnung in SPÖ-Werbung.

      lakoff_evidence: |
        Klassischer Fehler nach Lakoff (2004):
        "Don't Think of an Elephant" → Elefant wird gedacht
        "Ordnen statt Spalten" → "Spalten" (FPÖ) wird gedacht

    global_optimization:
      severity: "NIEDRIG"
      probability: 0.25
      description: |
        Im Two-Path Model ist "Spalten" keine Frame-Aktivierung,
        sondern Produkt-Differenzierung.

        Lakoff gilt für EINZELNE Frames, nicht für Markt-Segmentierung.
        "Butter statt Margarine" aktiviert nicht Margarine-Frame.

      lakoff_reinterpretation: |
        Lakoffs Regel gilt für:
        - "Denk nicht an X" → aktiviert X

        Lakoffs Regel gilt NICHT für:
        - "Produkt A statt Produkt B" → differenziert Markt

        "Ordnen statt Spalten" = Zwei-Produkt-Markt

  risk_2_moralisierung:
    local_optimization:
      severity: "MITTEL-HOCH"
      probability: 0.60
      description: |
        "Spalten" ist ein moralischer Vorwurf.
        Impliziert: "Die anderen sind böse, wir sind gut."

        PROBLEM für verlorene Arbeiter:
        - Sie haben FPÖ gewählt
        - Werden sie jetzt als "Spalter" beschimpft?
        - Moralisierung stösst ab, überzeugt nicht

    global_optimization:
      severity: "NIEDRIG-MITTEL"
      probability: 0.35
      description: |
        "Spalten" beschreibt ein PRODUKT (FPÖ-Angebot),
        nicht die KÄUFER (FPÖ-Wähler).

        Vergleich: "Dieser Autohersteller baut unsichere Autos"
        ist NICHT: "Sie sind dumm, diese Autos zu kaufen"

        Wähler werden nicht angegriffen, nur informiert.

  risk_3_keine_alternative_salienz:
    severity: "MITTEL"
    probability: 0.80
    description: |
      Slogan enthält KEIN alternatives Thema.
      Keine Erwähnung von: Wohnen, Pflege, Jobs, Klima

    mitigation: |
      In BEIDEN Paradigmen: Slogan mit Themen verknüpfen.
      "Ordnen" als Rahmen für Wohnen, Pflege, Integration verwenden.

  risk_4_ambivalentes_x_signal:
    local_optimization:
      severity: "MITTEL"
      probability: 0.55
      description: |
        "Ordnen" könnte X-Dimension ansprechen ("unsere Ordnung")
        ABER: Rest des Slogans ist universalistisch

        Inkonsistentes Signal:
        - Ist SPÖ für "unsere Ordnung" (X) oder für "alle" (Anti-X)?
        - Wähler spüren die Ambivalenz

    global_optimization:
      severity: "NIEDRIG"
      probability: 0.25
      description: |
        X wird über BEITRAG definiert (γ^{Funktion}), nicht Herkunft.
        "Wer beiträgt, gehört dazu" = X^{Beitrag}

        KEIN Widerspruch zu Universalismus:
        - Alle KÖNNEN beitragen
        - X wird nicht ausschliessend, sondern inklusiv definiert

  risk_5_doskozil_dissonanz:
    severity: "MITTEL-HOCH"
    probability: 0.65
    description: |
      Doskozil hat explizit restriktive Migrations-Position.
      "Ordnen statt Spalten" klingt nach Babler-Tonalität.

      FRAGE: Würde Doskozil diesen Slogan verwenden?
      Wenn nicht → Interne Inkonsistenz verstärkt

    mitigation_two_path: |
      Im Two-Path Model kann Doskozil "Ordnen" betonen,
      ohne "statt Spalten" zu verwenden.

      Babler: "Ordnen statt Spalten"
      Doskozil: "Ordnung schaffen" (ohne Kontrast)

      Beide bedienen γ^{Funktion}, unterschiedliche Tonalität.

