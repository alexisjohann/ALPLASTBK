        global: "Markt-Segmentierung"
      - aspect: "Empfehlung"
        local: "MODIFIZIEREN"
        global: "BEIBEHALTEN + VERSTÄRKEN"
      - aspect: "Risiko"
        local: "Niedrig (defensiv)"
        global: "Hoch (offensiv)"
      - aspect: "Max. Upside"
        local: "27.8%"
        global: "38.1%"
      - aspect: "Max. Downside"
        local: "22.8%"
