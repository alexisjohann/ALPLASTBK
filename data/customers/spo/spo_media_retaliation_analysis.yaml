    - point: "Gegenschlag ist Kosten, nicht Fehler"
      detail: "Im Two-Path Model eingeplanter Preis für Neupositionierung"

    - point: "Reaktion: Execution, nicht Verteidigung"
      detail: "Beweise für γ^{Funktion} liefern statt Opferrolle einnehmen"

    - point: "Zeitrahmen: 18-24 Monate"
