  expected_value:
    spo_2029_expected: 0.252  # Gewichteter Durchschnitt
    assessment: |
      Der Boulevard-Gegenschlag ist KEIN Killer für die Strategie.
      Er ist eingepreister Kostenfaktor der Neupositionierung.

      Entscheidend ist EXECUTION:
      - Beweise liefern
      - Alternative Kanäle aufbauen
      - Konsistent bleiben

