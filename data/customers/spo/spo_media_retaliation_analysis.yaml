  key_points:
    - point: "Anzeigenstop ist Paradigmenwechsel"
      detail: "€120M → €5M (96% Reduktion) nach 75 Jahren 'Kaufstrategie'"

    - point: "Boulevard-Gegenschlag war ERWARTET"
