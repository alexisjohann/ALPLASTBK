# =============================================================================
# 1. KONTEXT: DER ANZEIGENSTOP
# =============================================================================
context:

  babler_intervention:
    name: "Anzeigenstop 2025"
    description: |
      Andreas Babler kürzt als Vizekanzler/Kanzler die Regierungsinserate
      dramatisch - ein Bruch mit 75 Jahren SPÖ-Medien-Strategie.

    before:
      government_ads_total: 120000000  # €120M/Jahr
      distribution:
        krone: 35000000      # €35M (größter Empfänger)
        heute: 25000000      # €25M
        oe24: 20000000       # €20M
        andere_boulevard: 15000000
        qualitaet: 25000000  # Standard, Presse, Kurier

    after:
      government_ads_total: 5000000   # €5M/Jahr (96% Reduktion!)
      distribution:
        krone: 500000        # €0.5M (-99%)
        heute: 500000        # €0.5M (-98%)
        oe24: 500000         # €0.5M (-97.5%)
        orf_und_qualitaet: 3500000

    compensating_measures:
      meine_zeitung: 30000000         # €30M neue öffentliche Alternative
      orf_stärkung: 50000000          # €50M zusätzlich
      presseförderung: 80000000       # €80M für Qualitätspresse

    strategic_logic: |
      Alte SPÖ-Strategie (Faymann/Kern): "Kaufe Dir Ruhe durch Inserate"
      → FUNKTIONIERTE NICHT: Krone blieb anti-SPÖ trotz €35M/Jahr

      Neue Babler-Strategie: "Wenn Kauf nicht wirkt, dann kein Kauf"
      → Statt €120M an feindliche Medien → €160M für Alternativen

  historical_context:
    reference: "Appendix BH, Part 6"
    kurz_weaponization: |
      Sebastian Kurz (ÖVP) 2017-2021 zeigte, dass Inserate POLITISCH
      genutzt werden können: Selektive Vergabe an loyale Medien.
      Babler dreht die Logik um: KEINE Inserate statt selektive.

# =============================================================================
# 2. DER GEGENSCHLAG: BOULEVARD-REAKTION
# =============================================================================
retaliation:

  mechanism:
    name: "Economic Punishment via Editorial Coverage"
    description: |
      Boulevard-Medien (Krone, Heute, Oe24) verlieren €80M+/Jahr.
      Reaktion: Verstärkte negative Berichterstattung gegen Babler.

    economic_logic:
      revenue_loss_krone: -34500000    # €34.5M weniger
      revenue_loss_heute: -24500000    # €24.5M weniger
      revenue_loss_oe24: -19500000     # €19.5M weniger
      total_loss: -78500000            # €78.5M Boulevard-Verlust

    editorial_response: |
      Da wirtschaftlicher Druck (Inserate) wegfällt, bleibt nur
      POLITISCHER DRUCK: Negative Berichterstattung, um SPÖ-Wähler
      zu demobilisieren und Babler zu schwächen.

  observed_patterns:
    frequency_increase:
      babler_negative_articles_pre: 15    # pro Woche, vor Anzeigenstop
      babler_negative_articles_post: 45   # pro Woche, nach Anzeigenstop
      increase_factor: 3.0                 # 3× mehr negative Berichte

    content_patterns:
      - pattern: "Inkompetenz-Narrativ"
        example: "Babler versteht Wirtschaft nicht"
        frequency: "täglich"
        γ_ausschluss_activation: 0.3  # Aktiviert indirekt E×X

      - pattern: "Chaos-Narrativ"
        example: "SPÖ intern zerstritten"
        frequency: "wöchentlich"
        credibility_damage: 0.15

      - pattern: "Migration-Aktivierung"
        example: "Babler öffnet Grenzen für alle"
        frequency: "bei Ereignissen"
        γ_ausschluss_activation: 0.8  # Stark FPÖ-aktivierend

      - pattern: "Moralisches Framing"
        example: "Zensur durch Anzeigenstop"
        frequency: "regelmässig"
        meta_narrative: true

    tone_shift:
      pre_stop:
        neutral: 0.30
        negative: 0.45
        positive: 0.25
      post_stop:
        neutral: 0.15
        negative: 0.80
        positive: 0.05

  key_actors:
    krone:
      owner: "Dichand Familie + Funke Mediengruppe"
      political_leaning: "FPÖ-nah, anti-SPÖ"
      reach: 2000000  # Leser/Tag
      response_intensity: "SEHR HOCH"
      narrative: "Babler = Zensur, Inkompetenz, Öffnung"

    heute:
      owner: "Eva Dichand"
      political_leaning: "FPÖ-nah"
      reach: 800000   # Leser/Tag (Gratiszeitung)
      response_intensity: "HOCH"
      narrative: "SPÖ = teuer, Migration-freundlich"

    oe24:
      owner: "Wolfgang Fellner"
      political_leaning: "Opportunistisch, aktuell FPÖ-nah"
      reach: 600000   # Online + Print
      response_intensity: "SEHR HOCH"
      narrative: "Skandale, Inkompetenz, Chaos"

# =============================================================================
# 3. EBF-ANALYSE: WIE DER GEGENSCHLAG WIRKT
# =============================================================================
ebf_analysis:

  psi_media_impact:
    description: |
      Die Boulevard-Offensive verändert Ψ_media für alle Wähler.
      Aber: Der Effekt ist NICHT uniform - verschiedene Segmente
      reagieren unterschiedlich.

    segment_effects:
      loyale_kernwaehler:
        exposure_to_boulevard: 0.25  # Geringere Nutzung
        belief_in_negative_coverage: 0.15  # Skeptisch
        net_effect: -0.05  # Minimal negativ
        interpretation: "Sehen Gegenschlag als Beweis, dass Babler richtig handelt"

      verlorene_arbeiter:
        exposure_to_boulevard: 0.75  # Hauptzielgruppe Boulevard
        belief_in_negative_coverage: 0.65  # Eher glaubend
        net_effect: -0.25  # Deutlich negativ
        interpretation: "Bestätigung ihrer Skepsis gegenüber SPÖ"

      urbane_progressive:
        exposure_to_boulevard: 0.15  # Kaum Boulevard-Konsum
        belief_in_negative_coverage: 0.10  # Skeptisch
        net_effect: -0.02  # Marginal
        interpretation: "Ignorieren Boulevard, sehen Meta-Narrativ"

      pragmatische_mitte:
        exposure_to_boulevard: 0.45  # Gemischter Medienkonsum
        belief_in_negative_coverage: 0.40  # Teilweise glaubend
        net_effect: -0.15  # Moderat negativ
        interpretation: "Verunsichert, aber nicht überzeugt"

  gamma_activation:
    description: |
      Boulevard-Berichterstattung aktiviert γ_{E×X}^{Ausschluss}
      durch Migration-Framing und Sicherheits-Narrative.

    mechanism:
      trigger: "Negative Babler-Berichterstattung"
      frame: "Babler = Kontrollverlust"
      activated_dimension: "E (Sicherheit) und X (Identität)"
      beneficiary: "FPÖ (owns γ^{Ausschluss})"

    quantification:
      gamma_ausschluss_baseline: 0.42
      gamma_ausschluss_with_media_offensive: 0.48  # +0.06
      fpo_vote_boost_estimate: "+1.5pp"

  two_path_interpretation:
    local_optimization_view: |
      Im De-Salienz-Paradigma ist der Boulevard-Gegenschlag SCHLECHT:
      - Hält Migration salient
      - Aktiviert γ^{Ausschluss}
      - Schadet SPÖ kurzfristig

      → Babler hätte Inserate nicht stoppen sollen

    global_optimization_view: |
      Im Two-Path-Paradigma ist der Gegenschlag EINGEPREIST:
      - Babler wusste, dass Boulevard reagieren würde
      - Kurzfristiger Schaden war erwartet
      - ABER: Langfristig baut Babler γ^{Funktion} auf

      Kalkül:
      1. Kurzfristig: Boulevard-Offensive kostet ~2-3pp
      2. Mittelfristig: Alternative Medien (€160M) etablieren sich
      3. Langfristig: Ψ_media verändert sich strukturell

      → Gegenschlag ist Kosten der Neupositionierung, nicht Fehler

# =============================================================================
# 4. STRATEGISCHE OPTIONEN: WIE MIT GEGENSCHLAG UMGEHEN?
# =============================================================================
strategic_response:

  option_A_ignore:
    name: "Ignorieren und weitermachen"
    description: |
      Boulevard-Offensive nicht direkt kommentieren.
      Fokus auf eigene Agenda (Ordnung, Funktion, Execution).
    advantages:
      - "Keine Energie für Medien-Debatte"
      - "Kein Sauerstoff für Boulevard"
      - "Konsistent mit Two-Path (γ^{Funktion} aufbauen)"
    risks:
      - "Narrative etabliert sich unwidersprochen"
      - "Arbeiter-Segment glaubt Boulevard"
    score: 0.65

  option_B_meta_narrative:
    name: "Meta-Narrativ: 'Sie rächen sich'"
    description: |
      Aktiv kommunizieren: "Der Boulevard greift an, WEIL wir
      die Inserate gestrichen haben. Das beweist: Sie waren käuflich."
    advantages:
      - "Transformiert Angriff in Beweis für Korruption"
      - "Urbane Progressive mobilisiert"
      - "Aufklärung über Medien-Mechanismus"
    risks:
      - "Klingt wie Opferrolle"
      - "Arbeiter-Segment findet das elitär"
    score: 0.55

  option_C_execution_focus:
    name: "Beweise liefern statt reagieren"
    description: |
      Auf jeden negativen Artikel mit ERGEBNIS antworten.
      "Sie sagen Chaos? Hier sind die Zahlen: 12.000 in Arbeit."
    advantages:
      - "Baut Credibility für γ^{Funktion}"
      - "Fakten vs. Narrative"
      - "Konsistent mit Rede-Strategie"
    risks:
      - "Ressourcenintensiv"
      - "Boulevard ignoriert Fakten"
    score: 0.75

  option_D_alternative_media:
    name: "Alternative Kanäle aufbauen"
    description: |
      Intensivierung von Social Media, "Meine Zeitung", ORF-Kooperation.
      Boulevard umgehen statt bekämpfen.
    advantages:
      - "Langfristig Ψ_media verändern"
      - "Direkte Kommunikation mit Wählern"
      - "Konsistent mit €160M Investition"
    risks:
      - "Dauert 12-24 Monate"
      - "Kurzfristig Boulevard-Dominanz"
    score: 0.70

  recommended_combination:
    primary: "Option C (Execution Focus)"
    secondary: "Option D (Alternative Media)"
    tertiary: "Option A (Ignore direct attacks)"
    avoid: "Option B (Meta-Narrative) nur punktuell"

    rationale: |
      Im Two-Path Model ist die beste Reaktion auf den Gegenschlag:
      1. NICHT direkt auf Angriffe reagieren (kein Sauerstoff)
      2. STATTDESSEN: Beweise für γ^{Funktion} liefern
      3. PARALLEL: Alternative Kanäle aufbauen

      Der Boulevard-Gegenschlag ist EINGEPLANTER KOSTENFAKTOR
      der Neupositionierung, nicht Notfall.

# =============================================================================
# 5. INTEGRATION IN REDE-STRATEGIE
# =============================================================================
speech_integration:

  addressing_media_offensive:
    should_mention: "INDIREKT"
    should_NOT_mention: "DIREKT (keine Opferrolle)"

    good_framing: |
      "Manche fragen, warum die Kritik so laut ist.
      Ich sage: Weil wir endlich handeln.
      Wer nichts verändert, wird nicht kritisiert.
      Wir verändern - und liefern."

    bad_framing: |
      "Die Boulevardmedien greifen uns an, weil wir
      die Inserate gestrichen haben. Das ist Rache!"

    rationale: |
      Gutes Framing: Kritik = Beweis für Veränderung
      Schlechtes Framing: SPÖ = Opfer (schwächt γ^{Funktion})

  concrete_counter_examples:
    - attack: "Babler versteht Wirtschaft nicht"
      counter: "12.000 Menschen in Arbeit in 6 Monaten"
      frame: "Execution > Rhetorik"

    - attack: "SPÖ intern zerstritten"
      counter: "Wir haben den Mietpreisstopp durchgesetzt"
      frame: "Ergebnisse > Gerüchte"

    - attack: "Babler öffnet Grenzen"
      counter: "Verfahrensdauer um 40% reduziert. Ordnung."
      frame: "γ^{Funktion}: Systeme funktionieren"

