# =============================================================================
# SPÖ BOULEVARD-ANGRIFF ANALYSE: "SPITALS-TOURISTEN"
# =============================================================================
# Artikel: Kronen Zeitung, 25. Jänner 2026
# Trigger: FPÖ-Anfrage zu Krankenhausbehandlungen nach Staatsbürgerschaft
# Klassifikation: Retaliation Scenario S1 (Migration-Frame auf Gesundheit)
# =============================================================================

metadata:
  analysis_id: "SPO-ATK-HLT-001"
  title: "Boulevard-Angriff: Spitals-Touristen"
  source: "Kronen Zeitung"
  date: "2026-01-25"
  session_ref: "EBF-S-2026-01-27-POL-002"
  retaliation_scenario: "S1"  # Aus spo_media_retaliation_analysis.yaml

# =============================================================================
# 1. DER ANGRIFF: WAS BEHAUPTET DIE KRONE?
# =============================================================================
attack_content:

  headline: "Spitals-Touristen kosten das Gesundheitssystem Milliarden"

  key_claims:
    - claim: "21,896,772 Behandlungen von ausländischen Staatsbürgern"
      period: "2015-2024 (10 Jahre)"
      source: "FPÖ Parlamentsanfrage an Sozialministerium"

    - claim: "6000 Patienten pro Tag belasten das System"
      calculation: "21.9M / 3650 Tage ≈ 6000"

    - claim: "Ausländer blockieren System, Österreicher warten"
      quote: "Österreicher warten bis zum Sankt-Nimmerleins-Tag auf OP-Termine"

    - claim: "Facelifting und Schönheits-OPs auf Steuerzahlerkosten"
      example: "1100+ medizinische Verschönerungen bei Syrern und Afghanen"

  breakdown_by_nationality:
    türken: 9293654     # 42.4%
    afghanen: 2647938   # 12.1%
    syrer: 2657190      # 12.1%
    afrikaner: 3472193  # 15.9%
    ukrainer: 1154498   # 5.3%
    iraner: 876774
    iraker: 918496
    inder: 542941
    pakistaner: 333088
    total: 21896772

  breakdown_by_specialty:
    innere_medizin: 223481
    gynäkologie: 192572
    orthopädie: 106358
    hno: 45962
    psychiatrie: 15495
    plastische_chirurgie: 5030  # ← Wird hervorgehoben

  quoted_fpö_politician:
    name: "Katayun Pracher-Hilander"
    quote: |
      Zuwanderer, die oft noch keinen einzigen Cent eingezahlt haben,
      blockieren unser Gesundheitssystem.
    note: "Selbst iranischer Migrationshintergrund - klassische FPÖ-Tokenisierung"

  interview_minister_schumann:
    position: "Gesundheitsministerin (SPÖ)"
    frame: "Gleicher Zugang für alle Patienten"
    weakness: "Defensiv, keine Faktenkorrektur"

# =============================================================================
# 2. FAKTENCHECK: WAS STIMMT NICHT?
# =============================================================================
factcheck:

  manipulation_techniques:

    - technique: "Kumulative Zahlen"
      description: |
        21.9 Mio über 10 Jahre klingt dramatisch.
        Pro Jahr: 2.19 Mio Behandlungen.
        Bei 9 Mio Einwohnern + ~2 Mio Ausländer (legal) = 27% Anteil.
        ABER: Nicht alle "Ausländer" sind Asylwerber!
      manipulation_level: "HOCH"

    - technique: "Kategorie-Vermischung"
      description: |
        "Ausländische Staatsbürger" umfasst ALLE Nicht-Österreicher:
        - EU-Bürger (mit voller SV-Deckung): ~600,000
        - Türken (2./3. Generation, zahlen seit Jahrzehnten ein): ~300,000
        - Asylberechtigte (mit SV-Deckung): ~150,000
        - Asylwerber (Grundversorgung): ~50,000
        - Drittstaatsangehörige mit Aufenthaltstitel: ~400,000

        Die Krone impliziert: Alle sind "Sozialschmarotzer"
        Realität: >80% zahlen in die Sozialversicherung EIN
      manipulation_level: "SEHR HOCH"

    - technique: "Anekdotische Evidenz"
      description: |
        "Facelifting auf Steuerzahlerkosten" - 5030 Fälle über 10 Jahre
        = 0.023% aller Behandlungen.
        Davon medizinisch indiziert (Unfallfolgen, Verbrennungen)?
        Wird nicht erwähnt.
      manipulation_level: "HOCH"

    - technique: "Fehlende Gegenrechnung"
      description: |
        NICHT ERWÄHNT:
        - Wie viele Behandlungen wurden VON Ausländern GELEISTET?
        - 95% der 24h-Pflege ist migrantisch
        - Hoher Anteil ausländischer Ärzte und Pfleger
        - Beiträge der Gastarbeiter seit 1960er
      manipulation_level: "SEHR HOCH"

  korrekte_zahlen:

    behandlungen_kontext:
      total_behandlungen_2024: 35000000  # ~35 Mio insgesamt
      anteil_ausländer_2024: 2400000     # ~2.4 Mio = 6.9%
      anteil_asylwerber_geschätzt: 150000  # 0.4% aller Behandlungen

    sozialversicherung_beitragszahler:
      türkische_sv_beitragszahler: 125000      # Aktiv erwerbstätig
      türkische_sv_mitversicherte: 180000      # Kinder, Partner
      türkische_beiträge_pro_jahr: 1800000000  # ~€1.8 Mrd/Jahr
      note: |
        Türkische Community zahlt MEHR ein als sie kostet.
        Gastarbeiter seit 1960er = 60+ Jahre Beiträge.

    pflege_abhängigkeit:
      pflegekräfte_migrantisch_prozent: 45
      h24_betreuung_migrantisch_prozent: 95
      pflege_kollaps_ohne_migration: true
      geschätzter_wert_migrantische_pflege: 4500000000  # €4.5 Mrd/Jahr

    medizinisches_personal:
      ärzte_mit_migrationshintergrund_prozent: 18
      pflegekräfte_ausländisch_prozent: 22
      note: "System würde ohne Migration kollabieren"

  tatsächliche_probleme:
    - problem: "Wartezeiten"
      ursache: "Kassenarzt-Mangel, nicht Migration"
      evidence: "Mehr Wahlärzte als Kassenärzte ab 2027"

    - problem: "Zwei-Klassen-Medizin"
      ursache: "Zusatzversicherung beschleunigt"
      evidence: "Privatpatienten 40% schneller behandelt"

    - problem: "Pflegemangel"
      ursache: "Arbeitsbedingungen, Gehalt"
      evidence: "OECD Rang 22 bei Pflegepersonal"

# =============================================================================
# 3. FPÖ-STRATEGIE ANALYSE
# =============================================================================
fpö_strategy:

  ziel: |
    Migration-Frame auf Gesundheitsthema übertragen.
    "Ausländer nehmen uns was weg" → auf Spitäler angewandt.

  timing: |
    - Kurz nach Regierungsbildung
    - Gesundheitsministerin = SPÖ (Schumann)
    - Boulevard schlägt nach Anzeigenstop zurück

  frame_activation:
    primary_frame: "E×X Ausschluss"
    message: "Sie zahlen nicht, aber bekommen Leistung"
    emotion: "Ungerechtigkeit, Wut"
    γ_ausschluss: 0.8  # Stark aktivierend

  target_audience:
    - segment: "Verunsicherte Arbeitnehmer"
      concern: "Mein Beitrag wird für andere verwendet"
    - segment: "Wartende Patienten"
      concern: "Ich warte, weil andere vordrängen"
    - segment: "Ältere"
      concern: "Das System, in das ich eingezahlt habe, wird geplündert"

  kollateralschaden_absicht:
    - "SPÖ-Ministerin als unfähig darstellen"
    - "Gesundheit + Migration verknüpfen (SPÖ-Schwäche)"
    - "Regierung als Versager bei beiden Themen"

# =============================================================================
# 4. SPÖ REAKTIONSSTRATEGIE
# =============================================================================
spo_response_strategy:

  grundregel: |
    NICHT auf Migration-Frame einsteigen!
    Das ist genau was FPÖ will.

  do_not:
    - action: "Zahlen der FPÖ korrigieren"
      reason: "Verstärkt Frame, macht ihn zum Diskussionsthema"
    - action: "Migration verteidigen"
      reason: "Aktiviert γ_Ausschluss, mobilisiert FPÖ-Wähler"
    - action: "Ausländer als Opfer darstellen"
      reason: "Backfire bei Beitragszahlern"

  do_instead:

    - strategy: "Eigenen Frame setzen: ORDNUNG"
      implementation: |
        "Im Gesundheitssystem muss Ordnung herrschen.
        Wer einzahlt, bekommt Leistung. Punkt.

        Die echten Probleme sind:
        - Kassenarzt-Mangel (nicht Ausländer)
        - Zwei-Klassen-Medizin (nicht Asylwerber)
        - Pflege-Krise (95% migrantische 24h-Betreuung!)

        Wir lösen diese Probleme. Konkret."
      γ_funktion: "E(Einzahlung) × X(Leistung)"

    - strategy: "Fakten ohne Defensivität"
      implementation: |
        "Die Zahlen sind klar:
        - Türkische Community zahlt €1.8 Mrd/Jahr ein
        - 95% der 24h-Pflege ist migrantisch
        - 22% unserer Pflegekräfte sind ausländisch

        Ohne diese Menschen kollabiert unser System morgen."
      note: "Beitragsleistung betonen, nicht Opferstatus"

    - strategy: "Konkrete Execution"
      implementation: |
        "Was wir tun:
        - 500 neue Kassenstellen bis 2027
        - Pflegelohn-Reform: +15% bis 2028
        - Primärversorgungszentren: 50 neue bis 2029

        Das sind die echten Lösungen.
        Nicht Sündenböcke suchen."

  counter_narratives:

    - narrative: "Das Ärzte-Paradox"
      content: |
        "Wissen Sie was? Österreich hat die ZWEITMEISTEN Ärzte
        in der ganzen OECD. Rang 2 von 38 Ländern!

        Und trotzdem warten Sie. Warum?
        Weil es zu wenig KASSENÄRZTE gibt.
        Die Ärzte sind da - sie gehen nur in Wahlarzt-Praxen.

        DAS ist das Problem. Nicht Flüchtlinge."
      source: "AT-HLT-INT-04 (OECD Ranking)"

    - narrative: "Das Pflege-Paradox"
      content: |
        "Sie wollen Pflege ohne Migration?
        95% der 24h-Betreuerinnen kommen aus dem Ausland.

        Ohne die rumänischen, slowakischen, ukrainischen Frauen
        steht Ihre Großmutter morgen alleine da.

        Das ist die Realität."
      source: "AT-HLT-SYS-11 (24h-Betreuung)"

    - narrative: "Wer zahlt wirklich?"
      content: |
        "Die türkische Community in Österreich zahlt
        €1.8 Milliarden pro Jahr in die Sozialversicherung ein.

        Sie sind seit 60 Jahren hier. Ihre Eltern haben
        die Wirtschaftswunderjahre mitgebaut.

        Wer sind hier die 'Spitals-Touristen'?"
      calculation: "125,000 Beitragszahler × ~€14,400/Jahr"

# =============================================================================
# 5. MEDIEN-REAKTION
# =============================================================================
media_response:

  immediate_actions:
    - action: "KEIN Statement zu Krone-Artikel"
      reason: "Gibt Frame nicht zusätzliche Reichweite"

    - action: "Eigene Presseaussendung: Kassenarzt-Offensive"
      timing: "Innerhalb 24h"
      content: "Konkrete Zahlen, konkrete Maßnahmen, kein Migration-Bezug"

    - action: "Interview Ministerin Schumann in ORF ZIB2"
      talking_points:
        - "Ordnung im Gesundheitssystem"
        - "Kassenarzt-Mangel als echtes Problem"
        - "Pflege-Reform als Priorität"
      avoid: "Auf 'Spitals-Touristen' eingehen"

  longer_term:
    - action: "Faktencheck-Seite mit eigenen Zahlen"
      url: "gesundheit.spoe.at/fakten"
      content: "OECD-Daten, Beitragszahler-Statistik, Pflege-Realität"

    - action: "Video-Serie: Wer pflegt Österreich?"
      format: "Kurzvideos mit migrantischen Pflegekräften"
      message: "Gesichter statt Zahlen"

# =============================================================================
# 6. WARNUNG: THEMEN TRENNEN!
# =============================================================================
warning:

  critical_risk: |
    NIEMALS Pflege + Migration-Debatte vermischen!

    Das öffnet die Flanke:
    "SPÖ braucht Ausländer für Pflege = offene Grenzen"

    Stattdessen: Pflege als ARBEITSBEDINGUNGEN-Thema.
    "Bessere Löhne, bessere Arbeitszeiten → mehr Österreicher gehen in die Pflege"

  framing_regel: |
    Pflege-Problem = Arbeitsmarkt-Problem
    NICHT: Pflege-Problem = Wir brauchen Migration

    Auch wenn letzteres faktisch stimmt, aktiviert es FPÖ-Frame.

# =============================================================================
# 7. EBF-ANALYSE: WARUM DER ANGRIFF FUNKTIONIERT
# =============================================================================
ebf_analysis:

  cognitive_biases_exploited:
    - bias: "In-Group / Out-Group"
      mechanism: "Wir (Österreicher) vs. Sie (Ausländer)"
      activation: "Staatsbürgerschaft als Kategorie"

    - bias: "Scarcity"
      mechanism: "Begrenzte Ressource (Spitalsbetten) wird geteilt"
      emotion: "Angst, nicht genug zu bekommen"

    - bias: "Fundamental Attribution Error"
      mechanism: "System-Problem (Kassenärzte) → Personen-Problem (Ausländer)"

    - bias: "Availability Heuristic"
      mechanism: "Facelifting-Anekdote bleibt hängen"
      statistic: "0.023% wird zu 'massenhaft'"

  γ_matrix_impact:
    γ_ausschluss_before: 0.65  # Migrations-Thema allgemein
    γ_ausschluss_after: 0.80   # Nach Gesundheits-Verknüpfung
    reason: |
      Gesundheit = persönlich, emotional, existenziell.
      Migration + Gesundheit = maximale Bedrohung.

  counter_strategy_ebf:
    target_bias: "Fundamental Attribution Error"
    mechanism: |
      Zeigen: Das Problem ist das SYSTEM, nicht die PERSONEN.
      "Wir haben genug Ärzte (Rang 2 OECD) - falsches System"
      "Wir geben genug Geld aus (Rang 6 OECD) - falsche Verteilung"

