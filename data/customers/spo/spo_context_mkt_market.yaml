summary:
  total_factors: 60
  critical_factors: 14
  trends:
    steigend: 6
    stabil: 28
    fallend: 26
  key_insight: |
    SPÖ hat ihre Kernklientel (Arbeiter) verloren. Nur noch 18% der Wähler sind Arbeiter
    (1979: 55%). Überalterung (41% über 60). Wien-Abhängigkeit (38% aller Stimmen).
    Arbeiter wandern zu FPÖ, Junge zu Grüne/KPÖ.
