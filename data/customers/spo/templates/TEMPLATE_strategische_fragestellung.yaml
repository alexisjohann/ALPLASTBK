# TEMPLATE: Strategische Fragestellung
#
# Dieses Template wird für JEDE neue strategische Fragestellung verwendet.
# Es stellt sicher, dass alle wichtigen Aspekte BEVOR der Arbeit geklärt sind.
#
# WICHTIG: Die 3-Ebenen-Ableitungskette MUSS eingehalten werden:
#   Ebene 1: Grundlagen → Ebene 2: Strategie → Ebene 3: Fragestellung
#
# Version: 2.0
# Datum: 2026-02-03

---

# =============================================================================
# TEIL 0: STRATEGISCHE ABLEITUNG (Komplementarität)
# =============================================================================
#
# ⚠️  PFLICHT: Jede Fragestellung MUSS aus der Strategie abgeleitet werden!
#     Keine ad-hoc Positionierungen ohne Verankerung in der Gesamtstrategie.
#
# Die 3-Ebenen-Hierarchie:
#
#   EBENE 1: Grundlagen der strategischen Entscheidung
#            └── SSOT: strategie/GRUNDLAGEN_strategische_entscheidung.md
#                      ↓
#   EBENE 2: Strategie "Ordnen statt Spalten"
#            └── SSOT: spo_strategiebriefing_parteitag_2026.md
#                      ↓
#   EBENE 3: Diese strategische Fragestellung
#            └── Konkrete Anwendung der Strategie
#

ableitung:
  # ─────────────────────────────────────────────────────────────────────────
  # EBENE 1: Grundlagen der strategischen Entscheidung
  # ─────────────────────────────────────────────────────────────────────────
  # Die wissenschaftlichen und strategischen Fundamente, aus denen sich
  # die Gesamtstrategie "Ordnen statt Spalten" ableitet.

  grundlagen:
    ssot: "strategie/GRUNDLAGEN_strategische_entscheidung.md"

    # Die 5 Kernprinzipien der strategischen Entscheidung
    prinzipien:
      komplementaritaet:
        name: "Komplementarität statt Konkurrenz"
        beschreibung: |
          Wir konkurrieren NICHT auf FPÖ-Terrain (Ausschluss, Härte).
          Wir bauen EIGENES Terrain auf (Funktion, Ordnung).
          → γ^{Funktion} aufbauen, nicht γ^{Ausschluss} imitieren.

      two_path_modell:
        name: "Two-Path-Modell"
        beschreibung: |
          Es gibt ZWEI Pfade zu "Sicherheit x Identität":
          - Pfad Ausschluss (FPÖ): E(Grenzen) x X(Herkunft) → "Wir gegen die"
          - Pfad Funktion (SPÖ): E(Systeme) x X(Beitrag) → "Wer beiträgt, gehört dazu"
        referenz: "spo_strategiebriefing Appendix D"

      gamma_architektur:
        name: "γ-Architektur"
        beschreibung: |
          SPÖ kann γ^{Ausschluss} nicht gewinnen (FPÖ ist glaubwürdiger).
          SPÖ MUSS γ^{Funktion} aufbauen (eigenes Produkt).
          "Ordnen statt Spalten" ist MARKTSEGMENTIERUNG, nicht Frame-Negation.

      babler_credibility:
        name: "Babler-Credibility"
        beschreibung: |
          15 Jahre Bürgermeister von Traiskirchen (grösstes Erstaufnahmezentrum).
          → Einzigartige Credentials für "Ordnung UND Menschlichkeit".
          → Authentizität als strategischer Vorteil.

      nicht_verteidigen:
        name: "Nicht verteidigen – ordnen"
        beschreibung: |
          Verteidigung = Schwäche. Ordnung = Stärke.
          Keine Reaktion auf FPÖ-Frames.
          Eigene Agenda setzen.

  # ─────────────────────────────────────────────────────────────────────────
  # EBENE 2: Strategie "Ordnen statt Spalten"
  # ─────────────────────────────────────────────────────────────────────────
  # Die abgeleitete Gesamtstrategie mit ihren 4 Transformations-Prinzipien.

  strategie:
    name: "Ordnen statt Spalten"
    ssot: "spo_strategiebriefing_parteitag_2026.md"

    kernbotschaft: |
      Wir verteidigen nicht – wir ordnen.

    # Die 4 Transformations-Prinzipien (gelten für ALLE Fragestellungen)
    vier_prinzipien:
      - id: TP-1
        name: "Framing als 'Ordnung' statt 'Verbot'"
        beschreibung: "Nie 'wir verbieten' – immer 'wir schaffen Ordnung'"

      - id: TP-2
        name: "Staatstragende Tonalität"
        beschreibung: "Regierungspartei-Sprache, nicht Oppositions-Sprache"

      - id: TP-3
        name: "Fokus auf Ergebnisse und Verantwortung"
        beschreibung: "Erst Ergebnisse zeigen, dann (wenn nötig) erklären"

      - id: TP-4
        name: "Selbstbewusste Agenda"
        beschreibung: "Nicht reagieren, sondern Themen setzen"

    # Was die Strategie NICHT ist
    nicht:
      - "Härtere Rhetorik als FPÖ"
      - "Abschiebungszahlen als Hauptargument"
      - "Reaktion auf jeden FPÖ-Angriff"
      - "Verteidigung von Positionen"

  # ─────────────────────────────────────────────────────────────────────────
  # EBENE 3: Diese Fragestellung (spezifisch ausfüllen!)
  # ─────────────────────────────────────────────────────────────────────────
  # Wie wendet DIESE Fragestellung die Strategie konkret an?

  fragestellung:
    abgeleitet_aus: "Ordnen statt Spalten"

    # Welches Grundlagen-Prinzip ist hier besonders relevant?
    relevante_grundlagen:
      - prinzip: "[z.B. komplementaritaet]"
        anwendung: "[Wie wird es hier angewendet?]"

    # Welches der 4 Transformations-Prinzipien ist hier zentral?
    zentrale_prinzipien:
      - "[TP-1 / TP-2 / TP-3 / TP-4]"

    # Die spezifische Transformation für dieses Thema
    transformation:
      alt: "[Wie wurde bisher kommuniziert?]"
      neu: "[Wie kommunizieren wir jetzt?]"
      begruendung: "[Warum folgt das aus der Strategie?]"

# =============================================================================
# TEIL 1: IDENTIFIKATION
# =============================================================================

id: "ANF-YYYY-MM-DD-NNN"
datum: "YYYY-MM-DD"
thema: "[Thema in 3-5 Worten]"
typ: "[Strategische Positionierung / Akut-Reaktion / Interview-Vorbereitung / Themen-Aufbereitung]"
trigger: "[Was hat diese Fragestellung ausgelöst? Artikel, Ereignis, Anfrage?]"

# =============================================================================
# TEIL 2: ZIELSETZUNG (Was wollen wir erreichen?)
# =============================================================================

zielsetzung:
  # Primäres Ziel - WAS soll am Ende anders sein?
  primaer: |
    [Ein Satz: Was ist das Hauptziel?]
    Beispiel: "Babler hat eine klare, wiederholbare Position zum Thema X"

  # Sekundäre Ziele - Was soll nebenbei erreicht werden?
  sekundaer:
    - "[Ziel 2]"
    - "[Ziel 3]"

  # Erfolgskriterien - Woran messen wir Erfolg?
  erfolgskriterien:
    - messkriterium: "[Was genau?]"
      zielwert: "[Wie viel/wie gut?]"
      beispiel: "Interne Konsistenz: Kein öffentlicher Widerspruch aus Partei innerhalb 48h"

# =============================================================================
# TEIL 3: SCOPE (Was gehört dazu?)
# =============================================================================

scope:
  # In-Scope: Was ist Teil dieser Fragestellung?
  in_scope:
    personen:
      - "[Wer ist betroffen/angesprochen?]"
      - "Beispiel: Babler, Kommunikationsteam, Landesorganisationen"

    themen:
      - "[Welche Themenaspekte?]"
      - "Beispiel: EMRK-Kündigung, Rückführungen, Dänemark-Modell"

    formate:
      - "[Welche Kommunikationsformate?]"
      - "Beispiel: TV-Interview, Parlamentsrede, Social Media"

    zeitraum:
      von: "YYYY-MM-DD"
      bis: "YYYY-MM-DD oder 'bis auf Weiteres'"

    outputs:
      - "[Was soll produziert werden?]"
      - "Beispiel: Wording, Briefing, Talking Points, Social Media Posts"

# =============================================================================
# TEIL 4: OUT-OF-SCOPE (Was gehört NICHT dazu?)
# =============================================================================

out_of_scope:
  # Explizit ausgeschlossen - um Scope Creep zu vermeiden
  themen:
    - thema: "[Was nicht behandeln?]"
      begruendung: "[Warum nicht?]"
      beispiel: "Arbeitsmigration - separates Thema mit eigenem Wording"

  personen:
    - person: "[Wer nicht?]"
      begruendung: "[Warum nicht?]"
      beispiel: "Landeshauptleute - haben eigene Kommunikationsstrategie"

  formate:
    - format: "[Welche Formate nicht?]"
      begruendung: "[Warum nicht?]"
      beispiel: "Wahlkampf-Material - zu früh, eigene Strategie"

  entscheidungen:
    - entscheidung: "[Was wird hier NICHT entschieden?]"
      begruendung: "[Warum nicht?]"
      beispiel: "Policy-Details - Sache der Ministerien"

# =============================================================================
# TEIL 5: NEBENBEDINGUNGEN (Was muss beachtet werden?)
# =============================================================================
#
# ⚠️  SSOT: database/NEBENBEDINGUNGEN_REGISTER.yaml
#     Dort sind ALLE Constraints mit IDs dokumentiert.
#     Hier nur die für DIESE Fragestellung relevanten referenzieren!
#
# ID-SCHEMA:
#   KV-xxx = Koalitionsvertrag
#   PP-xxx = Parteiprogramm
#   BA-xxx = Babler-Erkenntnisse
#   RE-xxx = Rechtlich
#   IP-xxx = Interne Parteidynamik
#   ES-xxx = Externe Stakeholder
#   VC-xxx = Verhaltens-Constraints
#   EC-xxx = Ethische Constraints

nebenbedingungen:
  # Harte Constraints - MÜSSEN eingehalten werden
  # → Aus NEBENBEDINGUNGEN_REGISTER.yaml auswählen
  hart:
    - constraint_id: "[z.B. KV-001]"
      constraint: "[Aus Register kopieren]"
      relevant_weil: "[Warum für DIESE Fragestellung relevant?]"
      beispiel: "KV-001: EMRK-Bekenntnis - relevant bei Migration/EMRK"

    - constraint_id: "[z.B. BA-001]"
      constraint: "[Aus Register kopieren]"
      relevant_weil: "[Warum relevant?]"
      beispiel: "BA-001: Kein Todesurteil - rote Linie bei Abschiebungen"

  # Weiche Constraints - SOLLTEN eingehalten werden
  weich:
    - constraint_id: "[z.B. IP-001]"
      constraint: "[Aus Register kopieren]"
      prioritaet: "[Hoch / Mittel / Niedrig]"
      relevant_weil: "[Warum relevant?]"
      beispiel: "IP-001: Doskozil-Konflikt vermeiden"

    - constraint_id: "[z.B. ES-002]"
      constraint: "[Aus Register kopieren]"
      prioritaet: "[Priorität]"
      relevant_weil: "[Warum relevant?]"
      beispiel: "ES-002: Medien-Glaubwürdigkeit - Fakten überprüfbar"

  # Abhängigkeiten - Was muss vorher/parallel passieren?
  abhaengigkeiten:
    - von: "[Wovon abhängig?]"
      art: "[Vorher / Parallel / Nachher]"
      beispiel: "Abstimmung mit Ministerium vor TV-Auftritt"

  # Risiken - Was könnte schiefgehen?
  risiken:
    - risiko: "[Was könnte passieren?]"
      wahrscheinlichkeit: "[Hoch / Mittel / Niedrig]"
      impact: "[Hoch / Mittel / Niedrig]"
      mitigation: "[Wie begegnen?]"
      beispiel: "Doskozil widerspricht öffentlich → Vorab-Abstimmung, rote Linien"

# =============================================================================
# TEIL 6: STRATEGISCHE EINORDNUNG
# =============================================================================

einordnung:
  # Welche Ebene der Strategie-Hierarchie?
  ebene: "[Ebene 3: Massnahmenpaket / Ebene 4: Taktische Fragestellung]"

  # Welches strategische Thema wird bedient?
  strategie_thema: "[Migration / Chaos-Achse / Medienpolitik]"

  # Wie zahlt es in die Mission ein?
  mission_beitrag: |
    [Wie trägt diese Fragestellung zur Mission bei?]
    Beispiel: "Etabliert Babler als glaubwürdige Stimme auf Migration-Terrain"

  # Querverbindungen zu anderen Fragestellungen
  querverbindungen:
    - anfrage_id: "ANF-YYYY-MM-DD-NNN"
      art: "[Baut auf / Ergänzt / Widerspricht]"

# =============================================================================
# TEIL 7: WORKFLOW-DOKUMENTATION
# =============================================================================

workflow:
  # Standard-Workflow Schritte
  schritte:
    stakeholder_analyse: false
    babler_position: false
    drei_levels: false
    template_ausgefuellt: false
    ergebnissicherung: false
    output_gewaehlt: false

  # Generierte Outputs (3 Standard-Lieferobjekte)
  outputs:
    # 1. REPORT: Taktische und operative Beantwortung
    report:
      dateiname: "REPORT_[thema]_[datum].md"
      status: "ausstehend"  # ausstehend / in_arbeit / fertig / freigegeben
      version: null
      inhalt:
        - stakeholder_analyse
        - babler_position_drei_levels
        - taktische_empfehlungen
        - operative_massnahmen
        - risiko_assessment
      freigabe_von: null
      freigabe_am: null

    # 2. PRÄSENTATION: Kondensiert, visualisiert, managementfähig
    praesentation:
      dateiname: "PRAESENTATION_[thema]_[datum].pptx"
      status: "ausstehend"
      version: null
      folien_anzahl: null  # typisch: 10-15 Folien
      inhalt:
        - executive_summary
        - kernbotschaften_visualisiert
        - stakeholder_uebersicht
        - empfehlungen_priorisiert
        - naechste_schritte
      freigabe_von: null
      freigabe_am: null

    # 3. INFOGRAFIK: Visuelle Zusammenfassung
    infografik:
      dateiname: "INFOGRAFIK_[thema]_[datum].png"
      status: "ausstehend"
      version: null
      format: "1080x1920"  # oder "1200x630" für Social
      inhalt:
        - kernaussage_visualisiert
        - zahlen_fakten_highlights
        - call_to_action
      freigabe_von: null
      freigabe_am: null

  # Kernaussagen (werden während Bearbeitung gefüllt)
  kernaussagen: {}

# =============================================================================
# TEIL 8: METADATEN
# =============================================================================

metadaten:
  erstellt_von: "[Name/Team]"
  erstellt_am: "YYYY-MM-DD"
  geprueft_von: null
  geprueft_am: null
  freigabe: false
  freigabe_von: null
  freigabe_am: null

  revisionen: []
  # - datum: "YYYY-MM-DD"
  #   aenderung: "[Was wurde geändert?]"
  #   von: "[Wer?]"

---

# =============================================================================
# KURZANLEITUNG
# =============================================================================
#
# 1. BEVOR du anfängst:
#    - Teil 1-6 VOLLSTÄNDIG ausfüllen
#    - Mit Auftraggeber abstimmen
#    - Freigabe für Scope einholen
#
# 2. WÄHREND der Arbeit:
#    - Teil 7 (Workflow) aktualisieren
#    - Bei Scope-Änderungen: Teil 3-4 aktualisieren + dokumentieren
#
# 3. NACH Abschluss:
#    - Teil 8 (Metadaten) vervollständigen
#    - In ANFRAGEN_REGISTER.yaml eintragen
#
# =============================================================================
