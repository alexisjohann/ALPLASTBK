# =============================================================================
# RANDOMIZED CASE GENERATION - SOURCE CONFIGURATION
# =============================================================================
#
# Dieses File definiert die Strategien für Random Case Production.
# Validiertes Zufallssampling zur Entdeckung neuer 10C-Kombinationen.
#
# Version: 1.0
# Last Updated: 2026-01-14
# =============================================================================

generation_strategy:
  name: "Randomized Case Production with LLM Monte Carlo"
  version: "1.0"
  validation_acceptance_rate: 0.65  # 65% der generierten Cases sollen valide sein
  max_cases_per_run: 10

  # -------------------------------------------------------------------------
  # PHASE 1: RANDOM COORDINATE SAMPLING (LLMMC-basiert)
  # -------------------------------------------------------------------------

  sampling:
    method: "LLM Monte Carlo (Appendix AN)"
    iterations: 100  # Pro Nacht: 100 Iterationen → ~10 neue Cases

    # Domain-Sampling (mit Häufigkeitsgewichten)
    domains:
      - name: "health"
        weight: 0.25
        subdomain_pool: ["prevention", "mental_health", "digital_health", "chronic_disease"]
      - name: "finance"
        weight: 0.20
        subdomain_pool: ["savings", "investments", "pension", "lending"]
      - name: "energy"
        weight: 0.15
        subdomain_pool: ["household", "commercial", "renewable", "transportation"]
      - name: "nonprofit"
        weight: 0.15
        subdomain_pool: ["fundraising", "volunteering", "advocacy", "community"]
      - name: "government"
        weight: 0.15
        subdomain_pool: ["taxation", "compliance", "public_services", "policy"]
      - name: "workplace"
        weight: 0.10
        subdomain_pool: ["retention", "productivity", "training", "safety"]

    # Stage-Sampling (BCJ Phase Distribution)
    stages:
      precontemplation:
        weight: 0.10
        description: "Kein Bewusstsein für Problem"
      contemplation:
        weight: 0.25
        description: "Denkt über Handlung nach"
      preparation:
        weight: 0.20
        description: "Plant konkrete Maßnahmen"
      action:
        weight: 0.35
        description: "Führt Intervention durch"
      maintenance:
        weight: 0.10
        description: "Stabilisiert neues Verhalten"

    # HIERARCHY-Level Sampling
    hierarchy_levels:
      L0:
        weight: 0.05
        description: "System-Level (decades)"
      L1:
        weight: 0.15
        description: "Strategic (months-years)"
      L2:
        weight: 0.60
        description: "Tactical (weeks-months)"
      L3:
        weight: 0.20
        description: "Operative (hours-days)"

    # 10C Coordinate Distributions
    9c_distributions:

      WHO:
        # Levels: Individual, Dyad, Group, Organization, Society
        levels:
          - individual
          - group
          - organization
        heterogeneity: [low, medium, high]  # Uniform random

      WHAT:
        # Dimensions: Financial, Emotional, Physical, Social, Development, Existential
        dimensions:
          - F
          - E
          - P
          - S
          - D
          - X
        # Primary dimension: biased towards Financial, Social, Emotional
        primary_distribution:
          F: 0.25
          E: 0.20
          P: 0.15
          S: 0.25
          D: 0.10
          X: 0.05

      HOW:
        # Complementarity (γ) - normal distribution
        gamma_mean: 0.4
        gamma_std: 0.25
        gamma_min: -0.5
        gamma_max: 0.9

        interaction_types:
          - additive         # γ ≈ 0
          - complementary    # γ > 0.3
          - substitutive     # γ < 0

      WHEN:
        # Context dimensions
        psi_dimensions:
          - economic
          - social
          - temporal
          - spatial
          - institutional
          - cultural
          - technological
          - environmental

      WHERE:
        # Parameter sources
        sources:
          - literature
          - empirical
          - hybrid
          - estimated
        confidence_distribution:
          low: 0.20
          medium: 0.50
          high: 0.30

      AWARE:
        # Awareness level: uniform [0, 1]
        A_mean: 0.5
        A_std: 0.25
        A_min: 0
        A_max: 1

        awareness_types:
          - explicit
          - implicit
          - mixed

      READY:
        # Willingness level: uniform [0, 1]
        W_mean: 0.5
        W_std: 0.25
        W_min: 0
        W_max: 1

        # Action threshold
        theta_mean: 0.5
        theta_std: 0.20
        theta_min: 0
        theta_max: 1

  # -------------------------------------------------------------------------
  # PHASE 2: CONSTRAINT FILTERING (vor Generation)
  # -------------------------------------------------------------------------

  constraints:
    enabled: true
    description: "Filtern unmöglicher oder redundanter Kombinationen"

    rules:
      - name: "logical_exclusions"
        description: "Bestimmte Kombinationen sind logisch unmöglich"
        exclusions:
          - {stage: "precontemplation", W_level: "> 0.8"}  # Low action threshold nicht sinnvoll
          - {stage: "maintenance", gamma: "< -0.3"}       # Substitutive Effekte destabilisieren

      - name: "domain_stage_affinity"
        description: "Manche Domains + Stages sind wahrscheinlicher"
        affinities:
          health_action: 0.8      # Health interventions meist in Action phase
          finance_contemplation: 0.7  # Finance oft in Contemplation
          energy_action: 0.6      # Energy oft in Action/Maintenance

      - name: "hierarchy_scope"
        description: "L-Levels müssen zu Domain passen"
        scope_requirements:
          L0: [energy, government, nonprofit]  # System-level nur für diese
          L1: [finance, workplace]
          L2: [health, energy, nonprofit]
          L3: [workplace, health, nonprofit]

      - name: "superkey_uniqueness"
        description: "Keine Duplikate mit bestehenden Cases"
        existing_superkeys: "from_case_registry"

  # -------------------------------------------------------------------------
  # PHASE 3: CASE GENERATION
  # -------------------------------------------------------------------------

  generation:
    llm_model: "claude-opus-4-5-20251101"
    temperature: 0.7  # Balances consistency and creativity

    prompts:
      case_synthesis: |
        Du generierst einen wissenschaftlich plausiblen EBF Case aus 10C-Koordinaten.

        10C-Koordinaten:
        - Domain: {domain}
        - Stage: {stage}
        - HIERARCHY: {level}
        - γ (Komplementarität): {gamma}
        - Ψ (Kontext): {psi_dominant}
        - A (Awareness): {A_level}
        - W (Willingness): {W_level}

        Generiere:
        1. Plausible Case-Name
        2. 2-Satz-Beschreibung
        3. Kern-Insight (1 Satz)
        4. Praktische Implikation (1-2 Sätze)
        5. Relevante Appendices (mind. 2)
        6. Tags (5-7)

        Format: YAML-Block

      formula_generation: |
        Generiere eine relevante mathematische Formel für diesen Case basierend auf:
        - Domain: {domain}
        - Primäre Utility-Dimension: {primary_dimension}
        - Komplementarität: {gamma}

        Format: LaTeX-Mathematik mit Variablenerklärung

  # -------------------------------------------------------------------------
  # PHASE 4: VALIDATION RULES
  # -------------------------------------------------------------------------

  validation:
    enabled: true

    checks:
      - name: "superkey_uniqueness"
        type: "exact_match"
        severity: "critical"  # Duplikat → reject
        rule: "Superkey muss in case-registry.yaml eindeutig sein"

      - name: "9c_completeness"
        type: "structure"
        severity: "high"
        rule: "Alle 10 CORE-Dimensionen müssen vorliegen (außer optional null-Felder)"

      - name: "consistency_checks"
        type: "logical"
        severity: "high"
        checks:
          - "stage=precontemplation → A_level < 0.4"
          - "stage=action → W_level ≥ 0.5"
          - "gamma > 0.6 → Dimensionen sollten komplementär sein"

      - name: "formula_validity"
        type: "mathematical"
        severity: "high"
        rule: "Formeln müssen mathematisch valid sein (LLM check)"

      - name: "reference_existence"
        type: "cross_reference"
        severity: "medium"
        rule: "Mindestens 2 Appendices oder Literatur-References vorhanden"

      - name: "domain_consistency"
        type: "semantic"
        severity: "medium"
        rule: "Domain, Insight, Implication müssen zusammenpassen"

      - name: "insight_quality"
        type: "semantic"
        severity: "medium"
        rule: "Insight muss >10 und <150 Zeichen sein, nicht trivial"

  # -------------------------------------------------------------------------
  # PHASE 5: OUTPUT & REPORTING
  # -------------------------------------------------------------------------

  output:
    format: "YAML"
    location: "data/case-registry.yaml"
    auto_commit: true
    commit_pattern: "feat(case): Add {count} new random cases via LLMMC"

    daily_report:
      enabled: true
      format: "markdown"
      location: "outputs/case-generation-reports/{date}.md"
      includes:
        - generated_count
        - validation_pass_rate
        - validation_failures
        - new_superkeys
        - domains_covered
        - stages_covered
        - novel_9c_combinations
        - insights_summary

# =============================================================================
# QUALITY METRICS
# =============================================================================

quality_targets:
  acceptance_rate: 0.65        # 65% of generated cases pass validation
  insight_novelty: 0.40        # 40% should be "novel" (not similar to existing)
  formula_coverage: 0.70       # 70% of cases should have quantitative formulas
  reference_coverage: 0.80     # 80% should have Appendix references
  diversity_gini: 0.65         # Domain diversity index (higher = more diverse)

# =============================================================================
# SCHEDULE & AUTOMATION
# =============================================================================

schedule:
  enabled: true
  timezone: "UTC"
  run_time: "22:00"  # Nightly at 10 PM UTC
  frequency: "daily"

  github_action:
    name: "Random Case Generation"
    trigger: "schedule"
    cron: "0 22 * * *"  # Every day at 22:00 UTC
