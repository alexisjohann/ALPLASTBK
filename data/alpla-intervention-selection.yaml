    cluster_A:
      plants: [US-002, US-005, US-006, US-009, US-013, US-014]
      primary: "INT1 (Rotation)"
      secondary: "INT2 (Career) oder INT5 (Autonomy)"
      baseline: "INT6"
      budget: "low-medium"
      timeline: "8-12 weeks"
