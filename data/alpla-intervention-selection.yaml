# =============================================================================
# DOSIERUNG UND INTENSITÄT
# =============================================================================

dosage_guidelines:
  description: "Wie intensiv soll die Intervention sein?"

  factors:
    churn_severity:
      description: "Je höher der Churn, desto intensiver"
      thresholds:
        low: "P1 < 15% → Light Touch"
        medium: "P1 15-25% → Standard"
        high: "P1 > 25% → Intensive"

    management_capacity:
      description: "Anpassung an verfügbare Ressourcen"
      thresholds:
        low: "M5 < 3.5 → Reduzierte Intensität"
        medium: "M5 3.5-4.0 → Standard"
        high: "M5 > 4.0 → Volle Intensität möglich"

    change_readiness:
      description: "Anpassung an Veränderungsbereitschaft"
      thresholds:
        low: "K4 < 3.0 → Langsamer Start, mehr Kommunikation"
        medium: "K4 3.0-4.0 → Standard"
        high: "K4 > 4.0 → Schneller Rollout möglich"

  intensity_levels:
    light:
      description: "Minimale Intervention"
      scope: "1 Team oder Abteilung"
      frequency: "Monatliche Touchpoints"
      duration: "3 Monate"

    standard:
      description: "Reguläre Intervention"
      scope: "Gesamtes Werk"
      frequency: "Wöchentliche Touchpoints"
      duration: "6 Monate"

    intensive:
      description: "Maximale Intervention"
      scope: "Gesamtes Werk + individuelle Begleitung"
      frequency: "Mehrmals wöchentlich"
      duration: "9-12 Monate"
