      rationale: "Organizations in early BCJ phases (Unaware/Aware) require fundamentally different integration approaches than those already in Acting/Maintaining. Mismatched integration speed is a primary cause of talent flight (PAR-MA-008: pi_flight = 0.33)."

    F20_status:
      current: "planned"
      created: "2026-02-16"
      updated: "2026-02-16"
      author: "EBF Session EBF-S-2026-02-16-ORG-001"

  # =============================================================================
  # BDD-4: Complementarity Risk Map
  # =============================================================================
  - F1_title:
      id: INT-MA-BDD-004
      name: "Complementarity Risk Map (Behavioral Due Diligence Module 4)"

    F2_target_dimension:
      dimension_10c: "HOW"
      delta_target: "γ_ij→"
      intervention_vector: "I_HOW"
      ma_specific: "Identification and quantification of negative gamma values (value destruction risks)"

    F4_target_structure:
      level: "COL"
      aggregation: "composed"
      ma_unit: "Combined entity (Acquirer + Target post-merger)"

    F5_fepsde_dimension:
      primary: "F"   # Financial (synergy value)
      secondary: "D"  # Development (innovation capacity)
      weights:
        F: 0.40
        E: 0.05
        P: 0.05
        S: 0.15
        D: 0.30
        X: 0.05

    F6_journey_phase:
      optimal_phases: ["triggered", "action"]
      phase_affinity:
        awareness: 0.40
        triggered: 0.85
        action: 0.90
        maintenance: 0.60
        stable: 0.30

    F12_temporal_scope:
      scope: "strategic"
      duration_weeks: 4
      persistence: "high"
      decision_level: "L2"
      ma_timing: "During DD; gamma matrix becomes key input for integration planning"

    F7_framing:
      frame_type: "negative"
      loss_gain_frame: "loss"
      message_template: "Every announced synergy has a behavioral counter-risk. The gamma matrix quantifies where value creation turns into value destruction."

    F8_autonomy:
      level: "mandate"
      reactance_risk: "low"
      autonomy_cue_required: false

    F11_side_effects:
      risk_level: "high"
      positive_spillovers:
        - "Synergy realism check prevents overpayment"
        - "Gamma matrix guides sequencing of integration initiatives"
        - "Identifies innovation cannibalization risk before it materializes"
      negative_spillovers:
        - "May reduce deal enthusiasm if many negative gammas found"
        - "Complexity of gamma interactions may overwhelm non-behavioral audiences"
      crowding_out_risk:
        - "I_WHAT_F + I_WHO_o: Retention bonuses may crowd out team cohesion (gamma = -0.20)"

    F14_path_function:
      primary: "amplifier"
      ma_function: "Amplifies decision quality by revealing hidden interaction effects"

    F15_repetition:
      pattern: "cyclic"
      frequency: "semi-annually"
      decay_expected: false
      ma_note: "Initial gamma matrix in DD, updated semi-annually as integration progresses"

    F9_target_segment:
      optimal_segments: ["sophisticates", "loss_averse"]
      segment_multipliers:
        present_biased: 0.70
        social_oriented: 0.90
        autonomy_seeking: 1.10
        loss_averse: 1.50
        sophisticates: 1.60
        naifs: 0.50
      warnings:
        - "naifs may not understand gamma matrix complexity (σ=0.50)"
      ma_segments:
        - {name: "Investment Committee", sigma: 1.60, note: "Key audience — risk-calibrated"}
        - {name: "Strategy Team", sigma: 1.40, note: "Can translate into integration priorities"}
        - {name: "Operations", sigma: 0.70, note: "Needs simplified version"}

    F10_complementarity:
      synergies:
        - {type: "I_HOW", gamma: 0.45, with_module: "BDD-5", note: "Risk map directly feeds stakeholder impact severity"}
        - {type: "I_HOW", gamma: 0.30, with_module: "BDD-3", note: "Resilience determines which risks are manageable"}
      conflicts: []
      crowding_out_warnings:
        - "I_WHO_o + I_WHAT_F: γ=-0.20 (Social norms undermined by financial incentives — critical for retention programs)"
        - "strategy_ma + strategy_innovation: γ=-0.22 (Acquisition focus cannibalizes innovation — ALPLA calibrated)"

    F13_evaluation:
      metric: "Net Complementarity Score"
      baseline: null
      target: "Net gamma > 0 (positive synergies outweigh negative)"
      measurement_method: "SOCM-1.0 gamma-matrix computation"
      measurement_timing: "During DD, updated in PMI"
      sub_metrics:
        - {name: "Positive Gamma Count", note: "Number of synergistic pairs"}
        - {name: "Negative Gamma Count", note: "Number of destructive pairs"}
        - {name: "Net Synergy Multiplier", scale: "[-1, +1]", threshold: 0.00}
        - {name: "Innovation Cannibalization Risk", scale: "[0,1]", threshold: 0.30, ref: "PAR-MA-005"}
        - {name: "Crowding-Out Risk Score", scale: "[0,1]", threshold: 0.40}

    F16_responsibility:
      decision_maker: "Investment Committee Chair"
      implementer: "FehrAdvice SOCM Modeling Team"
      approval_required: ["CFO", "Strategy Director"]

    F17_evidence:
      literature_sources:
        - "fehr1999theory"
        - "frey2001motivation"
        - "malmendier2008whooverconfidence"
      effect_size_estimate: 0.50
      confidence: "medium"
      epistemic_status: "THR"
      llmmc_validated: false
      parameter_refs: [PAR-MA-005, PAR-MA-006, PAR-MA-007, PAR-COMP-002]

    F18_system:
      external_id: null
      integration_notes: "SOCM-1.0 calibrated on ALPLA strategic option data"

    F19_description:
      mechanism: "Systematic identification and quantification of all pairwise complementarity (gamma) values between acquirer and target strategic dimensions. Uses SOCM-1.0 gamma-matrix framework calibrated on ALPLA and PORR data. Distinguishes cost synergies (typically gamma > 0) from revenue synergies (often gamma < 0 due to cultural friction) and innovation effects (gamma = -0.22 from ALPLA)."
      rationale: "Standard DD assesses synergies additively. Behavioral DD reveals interaction effects: retention bonuses may destroy team cohesion (gamma = -0.20), M&A focus may cannibalize innovation (gamma = -0.22), and cultural friction amplifies non-linearly with Psi-distance (gamma = -0.45). Without complementarity analysis, synergy projections are systematically overestimated."

    F20_status:
      current: "planned"
      created: "2026-02-16"
      updated: "2026-02-16"
      author: "EBF Session EBF-S-2026-02-16-ORG-001"

  # =============================================================================
  # BDD-5: Stakeholder Impact Analysis
  # =============================================================================
  - F1_title:
      id: INT-MA-BDD-005
      name: "Stakeholder Impact Analysis (Behavioral Due Diligence Module 5)"

    F2_target_dimension:
