    F7_framing:
      frame_type: "positive"
      loss_gain_frame: "gain"
      message_template: "Understanding organizational resilience enables tailored integration that preserves value and accelerates synergies"

    F8_autonomy:
      level: "mandate"
      reactance_risk: "medium"
      autonomy_cue_required: true
