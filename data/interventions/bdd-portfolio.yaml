# =============================================================================
# BDD PORTFOLIO: Behavioral Due Diligence (5 Module)
# =============================================================================
# Model: MOD-MA-001 (M&A Behavioral Deal Journey Model)
# Phase: PH-3 (Due Diligence)
# Product: PROD-MA-03 (Behavioral Due Diligence)
# Session: EBF-S-2026-02-16-ORG-001
# Schema: templates/intervention-schema.yaml (20-Field, v1.0)
# =============================================================================

portfolio:
  id: PORT-BDD-001
  name: "Behavioral Due Diligence Portfolio"
  model_ref: MOD-MA-001
  product_ref: PROD-MA-03
  phase_ref: PH-3
  session_ref: EBF-S-2026-02-16-ORG-001
  created: "2026-02-16"
  version: "1.0"

  # Portfolio Coherence (Chapter 20)
  coherence:
    C1_non_interference: true   # No negative gamma within portfolio
    C2_journey_coverage: true   # All 5 BCJ phases covered by modules
    C3_segment_coverage: true   # All M&A stakeholder segments addressed
    C4_context_consistency: true # All modules share M&A DD context

  # Portfolio-level gamma matrix (between BDD modules)
  inter_module_complementarity:
    - pair: [BDD-1, BDD-2]
      gamma: 0.35
      mechanism: "Leadership assessment informs cultural fit interpretation"
    - pair: [BDD-2, BDD-3]
      gamma: 0.40
      mechanism: "Cultural distance predicts organizational resilience requirements"
    - pair: [BDD-3, BDD-4]
      gamma: 0.30
      mechanism: "Resilience capacity determines which complementarity risks are manageable"
    - pair: [BDD-4, BDD-5]
      gamma: 0.45
      mechanism: "Complementarity risks directly feed stakeholder impact severity"
    - pair: [BDD-1, BDD-5]
      gamma: 0.25
      mechanism: "Leadership profile shapes stakeholder reaction patterns"

  # Aggregated scoring
  scoring:
    method: "Weighted average with gamma adjustments"
    formula: |
      BDD_Score = (w1*S1 + w2*S2 + w3*S3 + w4*S4 + w5*S5) / sum(w)
                  + sum(gamma_ij * sqrt(Si * Sj))
    weights:
      BDD-1: 0.15  # Leadership
      BDD-2: 0.25  # Cultural Compatibility (highest - 70% failure driver)
      BDD-3: 0.20  # Organizational Resilience
      BDD-4: 0.25  # Complementarity Risk
      BDD-5: 0.15  # Stakeholder Impact
    thresholds:
      green: ">= 0.70"   # Proceed with standard PMI
      amber: "0.45 - 0.69" # Proceed with enhanced integration measures
      red: "< 0.45"       # Reconsider deal or require structural remedies

# =============================================================================
# BDD-1: Leadership Assessment
# =============================================================================
interventions:
  - F1_title:
      id: INT-MA-BDD-001
      name: "Leadership Assessment (Behavioral Due Diligence Module 1)"

    F2_target_dimension:
      dimension_10c: "AWARE"
      delta_target: "A(·)↑"
      intervention_vector: "I_AWARE"
      ma_specific: "Overconfidence-Screening und Risikoverhalten des Target-Managements"

    F4_target_structure:
      level: "COL"  # Collective (Management Team)
      aggregation: "composed"
      ma_unit: "Target Management Team (C-Level + Direct Reports)"

    F5_fepsde_dimension:
      primary: "D"   # Development (Leadership capability)
      secondary: "S"  # Social (Team dynamics)
      weights:
        F: 0.10
        E: 0.05
        P: 0.00
        S: 0.25
        D: 0.50
        X: 0.10

    F6_journey_phase:
      optimal_phases: ["awareness", "triggered"]
      phase_affinity:
        awareness: 0.90
        triggered: 0.75
        action: 0.40
        maintenance: 0.20
        stable: 0.10

    F12_temporal_scope:
      scope: "tactical"
      duration_weeks: 4
      persistence: "high"
      decision_level: "L1+"
      ma_timing: "During DD phase (Month -3 to -1)"

    # -- Tier 2: Operational --
    F7_framing:
      frame_type: "neutral"
      loss_gain_frame: "mixed"
      message_template: "Objective assessment of management behavioral patterns to ensure post-deal alignment"

    F8_autonomy:
      level: "mandate"  # Required as part of DD
      reactance_risk: "medium"
      autonomy_cue_required: true
      autonomy_cue: "Assessment is standard practice in best-in-class DD processes"

    F11_side_effects:
      risk_level: "medium"
      positive_spillovers:
        - "Early identification of retention-critical leaders"
        - "Calibrated negotiation strategy (knowing seller behavioral profile)"
      negative_spillovers:
        - "Target management may feel 'tested' and become defensive"
        - "Information asymmetry if assessment leaks pre-signing"
      crowding_out_risk: []

    F14_path_function:
      primary: "door_opener"
      ma_function: "Enables Phase PH-3→PH-4 transition with calibrated behavioral profiles"

    F15_repetition:
      pattern: "one_time"
      frequency: null
      decay_expected: false
      ma_note: "Single assessment per deal, results feed all subsequent phases"

    # -- Tier 3: Interface --
    F9_target_segment:
      optimal_segments: ["sophisticates"]
      segment_multipliers:
        present_biased: 0.80
        social_oriented: 1.10
        autonomy_seeking: 0.60
        loss_averse: 1.30
        sophisticates: 1.40
        naifs: 0.70
      warnings:
        - "autonomy_seeking leaders may resist assessment (reactance σ=0.60)"
      ma_segments:
        - {name: "CEO/Founder", sigma: 1.50, note: "Highest overconfidence risk"}
        - {name: "CFO/COO", sigma: 1.20, note: "More calibrated but anchoring risk"}
        - {name: "Middle Management", sigma: 0.90, note: "Key for integration execution"}

    F10_complementarity:
      synergies:
        - {type: "I_AWARE", gamma: 0.35, with_module: "BDD-2", note: "Leadership profiles inform cultural interpretation"}
        - {type: "I_AWARE_k", gamma: 0.25, with_module: "BDD-5", note: "Leadership assessment calibrates stakeholder reaction forecast"}
      conflicts: []
      crowding_out_warnings: []

    # -- Administrative --
    F13_evaluation:
      metric: "Overconfidence Score (0-1)"
      baseline: null
      target: "Score < 0.60 for green light"
      measurement_method: "SBDMS-1.0 calibration + structured interviews"
      measurement_timing: "Within DD phase"
      sub_metrics:
        - {name: "Overconfidence Index", scale: "[0,1]", threshold: 0.60, source: "SBDMS-1.0"}
        - {name: "Risk Appetite Score", scale: "[0,1]", threshold: 0.75, source: "Decision pattern analysis"}
        - {name: "Identity Congruence Score", scale: "[0,1]", threshold: 0.50, source: "CVA rapid match"}
        - {name: "Decision Quality Index", scale: "[0,1]", threshold: 0.65, source: "Historical decision audit"}

    F16_responsibility:
      decision_maker: "Deal Lead / M&A Director"
      implementer: "FehrAdvice Behavioral Due Diligence Team"
      approval_required: ["Investment Committee"]

    F17_evidence:
      literature_sources:
        - "malmendier2008whooverconfidence"
        - "malmendier2005doesoverconfidence"
        - "kahneman1979prospect"
      effect_size_estimate: 0.65
      confidence: "high"
      epistemic_status: "EMP"
      llmmc_validated: false
      parameter_refs: [PAR-MA-003, PAR-MA-001]

    F18_system:
      external_id: null
      integration_notes: "Feeds into BDD-2 (cultural), BDD-4 (complementarity), BDD-5 (stakeholder)"

    F19_description:
      mechanism: "Structured behavioral assessment of Target management using SBDMS-1.0 decision model calibration, historical decision audit, and CVA identity match. Detects overconfidence, hubris premium risk, and leadership-culture misalignment."
      rationale: "Overconfident CEOs drive +65% acquisition propensity and -90bp announcement returns (Malmendier & Tate 2008). Leadership assessment is the highest-leverage single module in BDD."

    F20_status:
      current: "planned"
      created: "2026-02-16"
      updated: "2026-02-16"
      author: "EBF Session EBF-S-2026-02-16-ORG-001"

  # =============================================================================
  # BDD-2: Cultural Compatibility
  # =============================================================================
  - F1_title:
      id: INT-MA-BDD-002
      name: "Cultural Compatibility Assessment (Behavioral Due Diligence Module 2)"

    F2_target_dimension:
      dimension_10c: "WHEN"
      delta_target: "κ_KON→"
      intervention_vector: "I_WHEN"
      ma_specific: "Psi-Distanz Acquirer vs. Target auf 8 Dimensionen"

    F4_target_structure:
      level: "COL"
      aggregation: "emergent"
      ma_unit: "Full organizational culture (Acquirer + Target)"

    F5_fepsde_dimension:
      primary: "S"   # Social (cultural norms)
      secondary: "X"  # Existential (organizational identity)
      weights:
        F: 0.05
        E: 0.10
        P: 0.05
        S: 0.45
        D: 0.15
        X: 0.20

    F6_journey_phase:
      optimal_phases: ["awareness", "triggered"]
      phase_affinity:
        awareness: 0.85
        triggered: 0.80
        action: 0.50
        maintenance: 0.60
        stable: 0.40

    F12_temporal_scope:
      scope: "strategic"
      duration_weeks: 6
      persistence: "high"
      decision_level: "L1+"
      ma_timing: "During DD phase, informs PH-6 integration planning"

    F7_framing:
      frame_type: "neutral"
      loss_gain_frame: "loss"
      message_template: "Cultural incompatibility is the #1 cause of M&A failure (70%). Quantified assessment prevents value destruction."

    F8_autonomy:
      level: "mandate"
      reactance_risk: "low"
      autonomy_cue_required: false

    F11_side_effects:
      risk_level: "low"
      positive_spillovers:
        - "Cultural map serves as integration blueprint"
        - "Psi-distance measurement enables convergence tracking in PH-6"
      negative_spillovers:
        - "May reveal deal-breaking incompatibility (feature, not bug)"
      crowding_out_risk: []

    F14_path_function:
      primary: "door_opener"
      ma_function: "Opens path to informed integration planning (PH-6)"

    F15_repetition:
      pattern: "cyclic"
      frequency: "quarterly"
      decay_expected: true
      ma_note: "Initial full assessment in DD, then quarterly Psi-distance tracking in PMI"

    F9_target_segment:
      optimal_segments: ["social_oriented"]
      segment_multipliers:
        present_biased: 0.90
        social_oriented: 1.50
        autonomy_seeking: 0.80
        loss_averse: 1.20
        sophisticates: 1.10
        naifs: 1.00
      warnings: []
      ma_segments:
        - {name: "Acquirer HQ Culture", sigma: 1.30}
        - {name: "Target HQ Culture", sigma: 1.30}
        - {name: "Regional Subsidiaries", sigma: 0.90, note: "May differ from HQ"}
        - {name: "SE Asia Operations", sigma: 1.60, note: "Maximum Psi-distance expected"}

    F10_complementarity:
      synergies:
        - {type: "I_WHEN", gamma: 0.40, with_module: "BDD-3", note: "Cultural distance predicts resilience requirements"}
        - {type: "I_WHEN", gamma: 0.35, with_module: "BDD-1", note: "Leadership informs cultural interpretation"}
      conflicts: []
      crowding_out_warnings: []

    F13_evaluation:
      metric: "Psi-Distance Score (0-1, 0=identical, 1=maximum distance)"
      baseline: null
      target: "Psi-distance < 0.50 for green, 0.50-0.75 amber, >0.75 red"
      measurement_method: "CVA 30-factor rapid profile + 8-dimensional Psi-distance calculation"
      measurement_timing: "During DD phase, repeated quarterly in PMI"
      sub_metrics:
        - {name: "Psi_I Distance (Institutional)", scale: "[0,1]", weight: 0.15}
        - {name: "Psi_S Distance (Social)", scale: "[0,1]", weight: 0.20}
        - {name: "Psi_K Distance (Cultural)", scale: "[0,1]", weight: 0.25}
        - {name: "Psi_C Distance (Cognitive)", scale: "[0,1]", weight: 0.10}
        - {name: "Psi_E Distance (Economic)", scale: "[0,1]", weight: 0.10}
        - {name: "Psi_T Distance (Temporal)", scale: "[0,1]", weight: 0.05}
        - {name: "Psi_M Distance (Mechanisms)", scale: "[0,1]", weight: 0.10}
        - {name: "Psi_F Distance (Physical)", scale: "[0,1]", weight: 0.05}

    F16_responsibility:
      decision_maker: "Deal Lead / Integration Director"
      implementer: "FehrAdvice CVA Team"
      approval_required: ["Deal Steering Committee"]

    F17_evidence:
      literature_sources:
        - "weber2003cultural"
        - "chatterjee1992cultural"
        - "hofstede2001cultures"
      effect_size_estimate: 0.45
      confidence: "high"
      epistemic_status: "EMP"
      llmmc_validated: false
      parameter_refs: [PAR-MA-004]

    F18_system:
      external_id: null
      integration_notes: "CVA SCHNELL (30 factors) for screening, CVA STANDARD (400 factors) for full DD"

    F19_description:
      mechanism: "Quantified 8-dimensional Psi-distance measurement between Acquirer and Target organizational cultures using CVA (Context Vector Architecture). Euclidean distance across Psi_I through Psi_F dimensions, weighted by M&A-specific relevance."
      rationale: "70% of M&A failures are attributable to cultural incompatibility (Weber & Camerer 2003). Psi-distance is the single strongest predictor of integration difficulty. Especially critical for growth market acquisitions (SE Asia) where Psi_K distance is maximized."

    F20_status:
      current: "planned"
      created: "2026-02-16"
      updated: "2026-02-16"
      author: "EBF Session EBF-S-2026-02-16-ORG-001"

