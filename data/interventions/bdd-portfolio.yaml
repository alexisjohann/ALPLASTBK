    F6_journey_phase:
      optimal_phases: ["triggered", "action"]
      phase_affinity:
        awareness: 0.50
        triggered: 0.85
        action: 0.80
        maintenance: 0.60
        stable: 0.30

    F12_temporal_scope:
      scope: "strategic"
      duration_weeks: 4
