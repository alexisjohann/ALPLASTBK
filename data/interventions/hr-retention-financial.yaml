# =============================================================================
# HR RETENTION PORTFOLIO - FINANCIAL TRACK
# =============================================================================
# Generated: 2026-01-19
# Domain: HR / Churn Reduction
# Track: Financial + Identity (T1 + T2 + T3 + T5a + T5b + T7a + T7b)
# Reference: EBF Chapters 17-20, templates/intervention-schema.yaml
# Documentation: README-hr-retention.md (strukturierte Übersicht)
# =============================================================================
#
# INHALTSVERZEICHNIS (Table of Contents)
# ======================================
#
# 1. PORTFOLIO HEADER                                          [Zeile 30-60]
#    - Meta-Daten, Coherence Check, Synergien
#
# 2. INTERVENTIONEN
#    - INT-HR-001: Career Path Visibility (T1)                 [Zeile 65-145]
#    - INT-HR-002: Development Dashboard (T2)                  [Zeile 150-235]
#    - INT-HR-003: Auto-Enrollment Training (T3)               [Zeile 240-325]
#    - INT-HR-004: Retention Bonus (T7a)                       [Zeile 330-430]
#    - INT-HR-005: Certification Program (T5a)                 [Zeile 435-530]
#    - INT-HR-006: Benefits Package (T7b)                      [Zeile 535-1110]
#      ├── benefits_examples                                   [Zeile 645-660]
#      ├── benefit_complementarities (γ-Werte)                 [Zeile 665-720]
#      ├── marginal_utility_analysis                           [Zeile 725-800]
#      ├── optimal_portfolio_design                            [Zeile 805-885]
#      └── choice_architecture                                 [Zeile 890-1110]
#    - INT-HR-007: Overtime Mental Budgets (T5b)               [Zeile 1115-1530]
#      ├── company_value_profiles                              [Zeile 1245-1305]
#      ├── exit_rules (Identity Lock-In)                       [Zeile 1310-1375]
#      └── mental_budgets (4 Konten)                           [Zeile 1445-1535]
#
# 3. VALIDATION CHECKLIST                                      [Zeile 1540-1555]
#
# QUICK NAVIGATION:
# - Suche "INT-HR-00X" für spezifische Intervention
# - Suche "benefit_complementarities" für γ-Werte
# - Suche "choice_architecture" für Box-Sizing
# - Suche "mental_budgets" für 4 Identity Budgets
# - Suche "exit_rules" für Identity Lock-In
#
# =============================================================================

portfolio:
  id: "PORT-HR-001"
  name: "HR Retention - Financial Track"
  domain: "hr"
  target_behavior: "Employee retention / churn reduction"
  created: "2026-01-19"

  # Portfolio Coherence Check
  coherence:
    crowding_out_conflicts: false  # T7 without T6/T8 ✅
    journey_coverage:
      awareness: true      # T1
      triggered: true      # T3
      action: true         # T2, T3, T7a
      maintenance: true    # T2, T5b, T7b
      stable: true         # T5a, T5b ✅
    synergies:
      - pair: ["T1", "T3"]
        gamma: 0.4
      - pair: ["T2", "T3"]
        gamma: 0.3
      - pair: ["T1", "T5a"]
        gamma: 0.2
      - pair: ["T1", "T5b"]
        gamma: 0.3
        note: "Awareness + Community Service verstärkt sich gegenseitig"
      - pair: ["T2", "T5b"]
        gamma: 0.2
        note: "Impact-Feedback verstärkt Identity-Wirkung"

interventions:

  # ===========================================================================
