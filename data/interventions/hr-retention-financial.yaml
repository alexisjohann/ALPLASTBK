    F20_status:
      current: "planned"
      created: "2026-01-19"
      updated: "2026-01-19"

    # Konkrete Benefits (Beispiele):
    benefits_examples:
      mobility:
        - "Firmenauto (nach Stufe)"
        - "ÖV-Jahresabo"
        - "Parkplatz"
      health:
        - "Zusatz-Krankenversicherung"
        - "Gym-Mitgliedschaft"
        - "Mental Health Support"
      financial:
        - "Pensionskassen-Zusatzbeiträge"
        - "Mitarbeiter-Rabatte"
        - "Essenszuschuss"
      family:
        - "Kinderbetreuung"
        - "Elternzeit-Aufstockung"
        - "Flexible Arbeitszeiten"
        - "Private Schulbildung für Kinder (nach Stufe)"

    # =========================================================================
    # KOMPLEMENTARITÄT ZWISCHEN BENEFITS (γ-Werte)
    # =========================================================================
    # Wie interagieren verschiedene Benefits miteinander?
    # γ > 0: Verstärken sich (Komplementäre)
    # γ < 0: Substituieren sich (Entweder-Oder)
    # γ ≈ 0: Unabhängig
    # =========================================================================
    benefit_complementarities:

      # STARKE KOMPLEMENTÄRE (γ > 0.3)
      strong_complements:
        - pair: ["Firmenauto", "Parkplatz"]
          gamma: 0.5
          reason: "Auto braucht Parkplatz - ohne Parkplatz sinkt Wert des Autos"

        - pair: ["Kinderbetreuung", "Flexible Arbeitszeiten"]
          gamma: 0.4
          reason: "Beide ermöglichen Work-Life-Balance - verstärken sich gegenseitig"

        - pair: ["Gym", "Mental Health Support"]
          gamma: 0.35
          reason: "Physische und mentale Gesundheit sind eng verknüpft"

        - pair: ["Pensionskasse+", "Essenszuschuss"]
          gamma: 0.3
          reason: "Beide signalisieren langfristige Fürsorge des AG"

      # MODERATE KOMPLEMENTÄRE (γ 0.1-0.3)
      moderate_complements:
        - pair: ["Private Schule", "Kinderbetreuung"]
          gamma: 0.2
          reason: "Beide family-oriented, aber unterschiedliche Lebensphasen"

        - pair: ["Zusatz-KV", "Gym"]
          gamma: 0.15
          reason: "Beide gesundheitsfokussiert, leicht komplementär"

        - pair: ["Elternzeit+", "Kinderbetreuung"]
          gamma: 0.25
          reason: "Sequenziell komplementär (erst Elternzeit, dann Betreuung)"

      # SUBSTITUTE (γ < 0)
      substitutes:
        - pair: ["Firmenauto", "ÖV-Abo"]
          gamma: -0.3
          reason: "Entweder fährt man Auto ODER ÖV - selten beides"
          optimization: "Nur eines anbieten, je nach Mitarbeiter-Präferenz"

        - pair: ["Essenszuschuss", "Kantine"]
          gamma: -0.2
          reason: "Substituieren sich teilweise"

        - pair: ["Gym-Mitgliedschaft", "Home-Office-Zuschuss"]
          gamma: -0.1
          reason: "HO reduziert Gym-Nutzung (weniger Anreiz, ins Büro zu kommen)"

      # UNABHÄNGIGE (γ ≈ 0)
      independent:
        - pair: ["Pensionskasse+", "Parkplatz"]
          gamma: 0.0
          reason: "Kein logischer Zusammenhang"

    # =========================================================================
    # GRENZNUTZEN VON ZUSÄTZLICHEN BENEFITS
    # =========================================================================
    # MU(n) = Marginal Utility des n-ten Benefits
    # Klassische abnehmende Grenznutzen-Kurve
    # =========================================================================
    marginal_utility_analysis:

      # Theoretisches Modell
      theory: |
        U_total = Σ u_i + Σ γ_ij · √(u_i · u_j)

        Wobei:
        - u_i = Standalone-Utility von Benefit i
        - γ_ij = Komplementarität zwischen i und j
        - Bei γ > 0: Synergien erhöhen Gesamtnutzen
        - Bei γ < 0: Substitution reduziert Grenznutzen

      # Empirische Grenznutzen-Stufen
      marginal_utility_by_tier:

        tier_1_essential:
          benefits: ["Gehalt", "Krankenversicherung", "Pensionskasse"]
          MU: "sehr hoch (0.8-1.0)"
          note: "Basis-Hygienefaktoren - Fehlen führt zu starker Unzufriedenheit"

        tier_2_expected:
          benefits: ["Flexible Arbeitszeiten", "Home-Office", "Weiterbildung"]
          MU: "hoch (0.5-0.8)"
          note: "Moderne Standards - fehlendes Angebot = Wettbewerbsnachteil"

        tier_3_differentiating:
          benefits: ["Kinderbetreuung", "Gym", "Essenszuschuss", "ÖV-Abo"]
          MU: "mittel (0.3-0.5)"
          note: "Differenzierung - nicht jeder bietet das"

        tier_4_premium:
          benefits: ["Firmenauto", "Private Schule", "Sabbatical", "Zusatz-KV"]
          MU: "niedrig-mittel (0.15-0.3)"
          note: "Premium-Segment - hohe Kosten, aber starkes Signal"

        tier_5_luxury:
          benefits: ["Concierge Service", "Privatjet-Nutzung", "Hauspersonal"]
          MU: "sehr niedrig (<0.1) oder negativ"
          note: |
            Ab hier kann MU sogar NEGATIV werden durch:
            - Decision Fatigue (zu viele Optionen)
            - Social Comparison (Neid unter Kollegen)
            - Guilt ("verdiene ich das?")

      # Grenznutzen-Formel
      diminishing_returns_formula: |
        MU(n) = MU_base × (1 - decay_rate)^(n-1)

        Typische Werte:
        - MU_base = 0.8 (erste Benefit-Kategorie)
        - decay_rate = 0.25 (25% Abnahme pro Stufe)

        Beispiel:
        - Benefit 1: MU = 0.80
        - Benefit 2: MU = 0.60
        - Benefit 3: MU = 0.45
        - Benefit 4: MU = 0.34
        - Benefit 5: MU = 0.25
        - Benefit 6: MU = 0.19

      # Wann stoppt man?
      stopping_rule: |
        Stoppe, wenn: MU(n) < Kosten(n) / Budget_per_MU

        Oder einfacher: Stoppe bei MU < 0.2 (pragmatische Schwelle)

        WICHTIG: Berücksichtige Komplementaritäten!
        - Firmenauto ohne Parkplatz: effektive MU sinkt um γ × 0.5
        - Gym + Mental Health zusammen: effektive MU steigt um γ × 0.35

    # =========================================================================
    # OPTIMALES BENEFITS-PORTFOLIO
    # =========================================================================
    optimal_portfolio_design:

      # Segment-spezifische Empfehlungen
      by_segment:

        young_professionals:
          recommended:
            - "Flexible Arbeitszeiten"
            - "Weiterbildungsbudget"
            - "Gym-Mitgliedschaft"
            - "ÖV-Abo"
          not_recommended:
            - "Private Schule (keine Kinder)"
            - "Pensionskasse+ (niedriger MU für junge)"
          total_MU_estimate: 2.1

        parents_with_kids:
          recommended:
            - "Kinderbetreuung"
            - "Flexible Arbeitszeiten"
            - "Private Schule (bei höherem Gehalt)"
            - "Elternzeit+"
          not_recommended:
            - "Gym (weniger Zeit)"
          total_MU_estimate: 2.4

        senior_executives:
          recommended:
            - "Firmenauto + Parkplatz (Komplementär!)"
            - "Private Schule"
            - "Zusatz-KV"
            - "Sabbatical-Option"
          not_recommended:
            - "ÖV-Abo (haben Auto)"
            - "Essenszuschuss (marginaler Wert)"
          total_MU_estimate: 2.0

        pre_retirement:
          recommended:
            - "Pensionskasse+ (hoher MU!)"
            - "Zusatz-KV"
            - "Flexible Arbeitszeit (Transition)"
            - "Care Budget (für eigene Eltern)"
          not_recommended:
            - "Kinderbetreuung (Kinder erwachsen)"
            - "Weiterbildung (niedrigerer ROI)"
          total_MU_estimate: 2.3

      # Portfolio-Optimierungs-Regeln
      optimization_rules:
        - rule: "Komplementäre zuerst"
          example: "Firmenauto → Parkplatz dazu (γ=0.5)"
          rationale: "Maximiert Synergien"

        - rule: "Substitute vermeiden"
          example: "NICHT Firmenauto UND ÖV-Abo"
          rationale: "Vermeidet negative γ, spart Kosten"

        - rule: "Tier 1-2 vor Tier 4-5"
          example: "Flexible Arbeitszeit VOR Private Schule"
          rationale: "Höherer Grenznutzen pro Euro"

        - rule: "Segment-Match prüfen"
          example: "Kinderbetreuung NUR für Mitarbeiter mit Kindern"
          rationale: "MU = 0 für falsche Zielgruppe"

        - rule: "Cafeteria-System bei Heterogenität"
          example: "Budget X, wähle selbst aus Katalog"
          rationale: "Jeder optimiert für eigene Präferenzen"

      # Kosten-Nutzen-Schwellen
      cost_effectiveness:
        high_roi:  # MU/Kosten > 0.5
          - "Flexible Arbeitszeiten (fast kostenlos)"
          - "Home-Office (spart Bürofläche)"
          - "Weiterbildungsbudget (ROI durch Produktivität)"
        medium_roi:  # MU/Kosten 0.2-0.5
          - "Gym-Mitgliedschaft"
          - "Essenszuschuss"
          - "ÖV-Abo"
        low_roi:  # MU/Kosten < 0.2
          - "Firmenauto (hohe Kosten)"
          - "Private Schule (sehr hohe Kosten)"
          - "Concierge Services"

    # =========================================================================
    # CHOICE BOX SIZE: OPTIMALE AUSWAHLARCHITEKTUR
    # =========================================================================
    # Wie gross sollte die Benefits-Auswahl sein?
    # Basierend auf: Iyengar & Lepper (2000), Schwartz (2004), Miller (1956)
    # =========================================================================
    choice_architecture:

      # Forschungsgrundlage
      research_basis:
        miller_1956:
          finding: "7 ± 2 Regel"
          implication: "Menschen können 5-9 Optionen gleichzeitig verarbeiten"
          application: "Maximal 9 Benefits auf einer Seite zeigen"

        iyengar_lepper_2000:
          finding: "Jam Study: 24 vs 6 Optionen"
          result: "30% Kauf bei 6 Optionen, nur 3% bei 24 Optionen"
          implication: "Weniger Optionen → mehr Entscheidungen → weniger Regret"

        schwartz_2004:
          finding: "Paradox of Choice"
          effects:
            - "Choice Paralysis: Keine Entscheidung treffen"
            - "Opportunity Cost: 'Was verpasse ich?'"
            - "Escalation of Expectations: Mehr erwartet"
            - "Self-Blame: Bei Enttäuschung eigene Schuld"
          implication: "Zu viel Auswahl → Unzufriedenheit trotz objektiv besserem Ergebnis"

        thaler_sunstein_2008:
          finding: "Choice Architecture matters"
          tools:
            - "Defaults: Vorauswahl setzen"
            - "Structuring: Kategorien bilden"
            - "Ordering: Wichtigstes zuerst"
            - "Feedback: Auswirkung zeigen"

      # Optimale Choice Box Größe
      optimal_choice_box:

        # Gesamtzahl sichtbarer Optionen
        total_visible_options:
          minimum: 5
          optimal: 7
          maximum: 12
          absolute_max: 15
          note: |
            > 15 Optionen = garantierte Choice Paralysis
            5-7 Optionen = "Sweet Spot" für Zufriedenheit
            < 5 Optionen = Zu wenig Differenzierung

        # Kategorien (Tier-Struktur)
        category_structure:
          recommended_categories: 4
          range: [3, 5]
          examples:
            - "Mobility (Auto, ÖV, Parkplatz)"
            - "Health (KV+, Gym, Mental)"
            - "Family (Kinderbetreuung, Schule, FlexTime)"
            - "Financial (Pension+, Rabatte, Essen)"
          note: "Kategorien reduzieren kognitive Last"

        # Optionen pro Kategorie
        options_per_category:
          minimum: 2
          optimal: 3
          maximum: 4
          note: "3 Optionen = Klassische 'Good-Better-Best' Struktur"

        # Wählbare Anzahl
        selectable_count:
          models:
            fixed_count:
              rule: "Wähle genau N Benefits"
              typical_N: [3, 4, 5]
              pros: "Einfach, fair, vergleichbar"
              cons: "Starr, ignoriert individuelle Bedürfnisse"

            budget_based:
              rule: "Jeder Benefit hat Punkte-Wert, Budget = X Punkte"
              typical_budget: [100, 500, 1000]
              pros: "Flexibel, Kosten-transparent"
              cons: "Komplexer, Rechenaufwand"
              example: |
                Budget: 100 Punkte
                - ÖV-Abo: 15 Punkte
                - Gym: 20 Punkte
                - Kinderbetreuung: 40 Punkte
                - Firmenauto: 60 Punkte
                → Wähle Kombination ≤ 100

            tier_based:
              rule: "Wähle 1 aus Tier A, 2 aus Tier B, beliebig aus Tier C"
              tiers:
                A_premium: "Wähle 1 (Firmenauto ODER Private Schule)"
                B_standard: "Wähle 2 (Gym, ÖV, Kinderbetreuung...)"
                C_basic: "Alle inkludiert (FlexTime, HO, Kantine)"
              pros: "Differenziert nach Wert, verhindert 'nur Premium'"
              cons: "Kann als unfair empfunden werden"

            unlimited_with_cap:
              rule: "Wähle beliebig, aber Gesamtwert ≤ X EUR/Jahr"
              pros: "Maximale Flexibilität"
              cons: "Administrativ komplex, Gaming möglich"

      # Empfehlung nach Unternehmensgröße
      recommendations_by_company_size:

        small_company:
          employees: "< 100"
          total_options: 5-7
          categories: 3
          selection_model: "fixed_count (3)"
          rationale: "Einfach, wenig Admin"

        medium_company:
          employees: "100-1000"
          total_options: 8-12
          categories: 4
          selection_model: "tier_based"
          rationale: "Balance Flexibilität/Komplexität"

        large_company:
          employees: "> 1000"
          total_options: 12-15
          categories: 5
          selection_model: "budget_based"
          rationale: "Maximale Personalisierung, HR-System trägt Komplexität"

      # Defaults setzen (KRITISCH!)
      default_settings:
        importance: "SEHR HOCH - 70%+ nehmen Default"
        strategies:

          smart_default:
            description: "Basierend auf Mitarbeiter-Profil vorauswählen"
            example: |
              Alter < 30, keine Kinder → Default: ÖV, Gym, Weiterbildung
              Alter 35-45, Kinder → Default: Kinderbetreuung, FlexTime
              Alter > 55 → Default: Pension+, Zusatz-KV
            effect: "Höhere Zufriedenheit, weniger Aufwand"

          popular_default:
            description: "Die 3 beliebtesten Benefits vorauswählen"
            source: "Aggregierte Daten aus Vorjahren"
            effect: "Social Proof: 'Die meisten nehmen das'"

          no_default:
            description: "Keine Vorauswahl, aktive Wahl erforderlich"
            when_to_use: "Wenn alle Optionen gleich wertvoll"
            warning: "Kann zu Nicht-Wahl führen!"

      # Choice Architecture Regeln
      design_rules:

        rule_1_structure:
          name: "Kategorisieren"
          action: "Benefits in 3-5 logische Kategorien gruppieren"
          effect: "Reduziert gefühlte Komplexität um ~40%"

        rule_2_highlight:
          name: "Empfehlungen markieren"
          action: "'Beliebteste Wahl' oder 'Für Sie empfohlen' labeln"
          effect: "Beschleunigt Entscheidung, erhöht Zufriedenheit"

        rule_3_compare:
          name: "Vergleichbar machen"
          action: "Alle Benefits in gleicher Einheit (EUR/Jahr)"
          effect: "Ermöglicht rationale Abwägung"

        rule_4_feedback:
          name: "Live-Feedback geben"
          action: "Zeige Restbudget / verbleibende Auswahl"
          effect: "Verhindert 'Überausgabe' und Frustration"

        rule_5_reversible:
          name: "Änderung ermöglichen"
          action: "Einmal jährlich Neuauswahl erlauben"
          effect: "Reduziert Commitment-Angst, experimentierfreudiger"

      # Warnsignale für schlechte Choice Architecture
      red_flags:
        - flag: "> 15 Optionen ohne Struktur"
          problem: "Garantierte Choice Paralysis"
          fix: "Kategorisieren oder reduzieren"

        - flag: "Kein Default"
          problem: "20-30% wählen gar nichts"
          fix: "Smart Default einführen"

        - flag: "Alle Optionen gleich teuer"
          problem: "Kein Signal, was wertvoll ist"
          fix: "Budget-System oder Tiers einführen"

        - flag: "Keine Vergleichbarkeit"
          problem: "Äpfel-Birnen-Vergleich"
          fix: "Alle in EUR/Jahr oder Punkte umrechnen"

        - flag: "Einmalige, unwiderrufliche Wahl"
          problem: "Angst vor Fehlentscheidung"
          fix: "Jährliche Anpassung ermöglichen"

      # Quick Reference
      quick_reference:
        optimal_setup: |
          ┌─────────────────────────────────────────────────┐
          │ OPTIMALE BENEFITS CHOICE BOX                    │
          ├─────────────────────────────────────────────────┤
          │ Kategorien:        4 (Mobility, Health,         │
          │                       Family, Financial)        │
          │ Optionen/Kategorie: 3 (Good-Better-Best)        │
          │ Total sichtbar:    12 (4 × 3)                   │
          │ Wählbar:           Budget-System (100 Punkte)   │
          │                    ODER Tier-System (1+2+all)   │
          │ Default:           Smart Default nach Profil    │
          │ Änderbar:          1x jährlich                  │
          └─────────────────────────────────────────────────┘

        formula: |
          Zufriedenheit = f(Optionen)

          Optimum bei ~7 Optionen
          Danach: Jede weitere Option senkt Zufriedenheit um ~3%

          Z(n) = Z_max × (1 - 0.03 × max(0, n-7))

  # ===========================================================================
  # INT-HR-007: Overtime Mental Budgets System (T5 - Identity / Mental Accounting)
  # ===========================================================================
  # KONZEPT: Überstunden verfallen NICHT, sondern werden in verschiedene
  # "Mental Budgets" umgewandelt. Jedes Budget aktiviert eine andere
  # Identitätsdimension und spricht unterschiedliche Segmente an.
  #
  # PSYCHOLOGISCHER MECHANISMUS (Mental Identity Budgeting):
  # - T7 (Financial) wird zu T5 (Identity) transformiert
  # - Überstunden = Geld → Identity Budgets = Purpose/Fürsorge/Entwicklung
  # - Vermeidet Crowding-Out, da T5 keine T7-Konflikte hat
  # - Multiple Konten erhöhen Autonomie (→ autonomy_seeking aktiviert)
  #
  # KONTEN:
  # 1. 🤝 Community Budget    - Purpose/Giving Back
  # 2. 👨‍👩‍👧 Care Budget         - Pflege Familie/Eltern
  # 3. 🌴 Sabbatical Budget   - Selbstentwicklung/Auszeit
  # 4. 📚 Learning Budget     - Weiterbildung/Expertise
  # ===========================================================================
  - F1_title:
      id: "INT-HR-007"
      name: "Overtime Mental Budgets System"

    F2_intervention_type:
      code: "T5"
      name: "Identity"
      target_component: "W_base"
      secondary_mechanism:
        code: "T7"
        note: "Ursprünglicher Wert ist monetär (Überstunden), wird in Identität umgewandelt"

    F4_target_structure:
      level: "IND"
      aggregation: "direct"

    F5_fepsde_dimension:
      primary: "S"  # Social/Community
      secondary: "D"  # Development (purpose)
      weights:
        F: 0.1  # Geringer finanzieller Fokus (bewusst!)
        E: 0.2
        P: 0.0
        S: 0.5  # Community = Social
        D: 0.2  # Purpose = Development
        X: 0.0

    F6_journey_phase:
      optimal_phases: ["maintenance", "stable"]
      phase_affinity:
        awareness: 0.3
        triggered: 0.4
        action: 0.5
        maintenance: 0.8  # ✅ Langfristige Identitätsbindung
        stable: 0.9       # ✅ Optimal für stable Phase

    F7_framing:
      frame_type: "positive"
      loss_gain_frame: "gain"
      message_template: "Ihre Überstunden werden nicht wertlos - investieren Sie sie in das, was Ihnen wichtig ist"
      reframing_narrative: |
        Statt: "Deine Überstunden verfallen nach 6 Monaten"
        Neu:   "Deine Überstunden werden zu Identity-Budgets.
                Wähle, worin du investieren möchtest:
                • Community: Hilf anderen auf Firmenzeit
                • Care: Zeit für Pflege von Eltern/Familie
                • Sabbatical: Sammle für eine Auszeit
                • Learning: Investiere in deine Expertise"

    F8_autonomy:
      level: "voluntary"
      reactance_risk: "very_low"  # Hohe Wahlfreiheit = geringe Reaktanz
      autonomy_cue_required: false
      choice_architecture: |
        Mitarbeiter wählen selbst:
        - In welches Budget sie Überstunden einzahlen
        - Wie sie die Stunden aus jedem Budget nutzen
        - Ob sie zwischen Budgets umschichten
        - Wann sie die Stunden einsetzen

        Beispiel: 50% Community, 30% Care, 20% Sabbatical

    F9_target_segment:
      optimal_segments: ["social_oriented", "autonomy_seeking", "loss_averse", "sophisticates"]
      segment_multipliers:
        present_biased: 0.9    # Sabbatical-Budget macht Zukunft greifbar
        social_oriented: 1.6   # ✅ Community-Budget
        autonomy_seeking: 1.5  # ✅ Wahlfreiheit zwischen 4 Budgets!
        loss_averse: 1.4       # ✅ Care-Budget + "Überstunden nicht verlieren"
        sophisticates: 1.3     # ✅ Learning-Budget
        naifs: 1.0             # Einfaches System mit klaren Optionen
      warnings: []
      # Jedes Segment findet "sein" Budget:
      segment_budget_affinity:
        social_oriented: "community"
        autonomy_seeking: "sabbatical"
        loss_averse: "care"
        sophisticates: "learning"
        present_biased: "community"  # Sofortige Nutzung möglich
        naifs: "care"                # Intuitiv verständlich

    F10_complementarity:
      synergies:
        - type: "T1"
          gamma: 0.3
          mechanism: "Awareness der Möglichkeit erhöht Nutzung"
        - type: "T2"
          gamma: 0.2
          mechanism: "Feedback über Impact verstärkt Identity-Wirkung"
      conflicts: []  # ✅ Kein T6/T8 Konflikt trotz urspr. T7-Wert!
      crowding_out_warnings: []
      design_note: |
        KRITISCH: Durch Transformation T7 → T5 vermeiden wir Crowding-Out!
        - Ursprünglich: Überstunden = T7 (Financial)
        - Transformiert: Community Hours = T5 (Identity)
        - Effekt: Social_oriented Segment wird AKTIVIERT statt gehemmt

    F11_side_effects:
      risk_level: "low"
      positive_spillovers:
        - "Stärkere Unternehmensidentifikation"
        - "Positives Employer Branding"
        - "Team-Building bei gemeinsamen Projekten"
        - "Mitarbeiter-Wellbeing (Purpose)"
        - "CSR-Beitrag ohne Zusatzkosten"
        - "Erhöhte Switching Costs durch Identity Lock-In"
      negative_spillovers:
        - "Administrative Komplexität bei Projektverwaltung"
        - "Rechtliche Prüfung bei Verfall-Regelung erforderlich"

    # =========================================================================
    # WERTE-BASIERTE BUDGET-KONFIGURATION
    # =========================================================================
    # Je nach Unternehmenswerten werden unterschiedliche Budgets angeboten.
    # Dies verstärkt die Identifikation mit der Unternehmenskultur.
    # =========================================================================
    company_value_profiles:

      # Beispiel: Sustainability-fokussiertes Unternehmen
      sustainability_company:
        primary_budgets: ["community", "sabbatical"]
        additional_budgets:
          green_budget:
            name: "Sustainability Budget"
            identity: "Umweltschützer / Planet Protector"
            uses:
              - "Baumpflanzaktionen"
              - "Nachhaltigkeitsprojekte"
              - "CO2-Kompensation (Reise → Aufforstung)"
              - "Urban Gardening"

      # Beispiel: Family-friendly Unternehmen
      family_company:
        primary_budgets: ["care", "sabbatical"]
        additional_budgets:
          family_plus_budget:
            name: "Family+ Budget"
            identity: "Familienmensch"
            uses:
              - "Erweiterte Elternzeit"
              - "Pflege über gesetzliches Minimum"
              - "Schulbegleitung"
              - "Family Emergency Days"

      # Beispiel: Innovation-fokussiertes Unternehmen
      innovation_company:
        primary_budgets: ["learning", "sabbatical"]
        additional_budgets:
          innovation_budget:
            name: "Innovation Budget"
            identity: "Innovator / Creator"
            uses:
              - "Hackathon-Zeit"
              - "Side Projects (Google 20%)"
              - "Patent-Entwicklung"
              - "Startup-Sabbatical"

      # Beispiel: Social Impact Unternehmen
      social_impact_company:
        primary_budgets: ["community", "care"]
        additional_budgets:
          impact_budget:
            name: "Impact Budget"
            identity: "Changemaker"
            uses:
              - "NGO-Einsätze"
              - "Katastrophenhilfe"
              - "Social Entrepreneurship"
              - "Policy Advocacy"

    # =========================================================================
    # EXIT-REGELUNG: IDENTITY LOCK-IN
    # =========================================================================
    # Bei Verlassen des Unternehmens: Budgets verfallen oder werden mit
    # Identity Discount ausgezahlt. Dies schafft Switching Costs.
    # =========================================================================
    exit_rules:

      # Option A: Vollständiger Verfall (wenn rechtlich möglich)
      forfeit_option:
        description: "Budgets verfallen bei Kündigung vollständig"
        legal_note: "Rechtliche Prüfung pro Jurisdiktion erforderlich"
        psychological_mechanism: |
          - Verstärkt Loss Aversion: "Ich verliere mein Investment"
          - Erhöht Commitment: "Ich habe hier so viel aufgebaut"
          - Schafft Sunk Cost: "Das kann ich nicht zurücklassen"
        recommended_for: ["care", "sabbatical"]
        not_recommended_for: ["learning"]  # Kann als unfair empfunden werden

      # Option B: Identity Discount (empfohlen)
      identity_discount_option:
        description: "Auszahlung mit Discount (z.B. 50% des Stundenwerts)"
        discount_rate: 0.5  # 50% Identity Premium verfällt
        rationale: |
          "Die Stunden hatten für dich einen Identitätswert HIER im Unternehmen.
          Dieser Wert ist an diese Gemeinschaft gebunden.
          Wenn du gehst, bleibt nur der monetäre Grundwert."
        psychological_mechanism: |
          - Macht Identitäts-Premium explizit sichtbar
          - Fairer als vollständiger Verfall
          - Verstärkt trotzdem Retention
        calculation_example: |
          100 Stunden im Community Budget
          Stundenwert: 50 EUR
          Ohne Discount: 5.000 EUR
          Mit Identity Discount (50%): 2.500 EUR
          → "Verlust" von 2.500 EUR = Identity Premium

      # Option C: Gestaffelter Verfall (differenziert)
      graduated_forfeit:
        description: "Unterschiedliche Regeln pro Budget-Typ"
        rules:
          community:
            exit_rule: "forfeit"
            reason: "Community-Identität ist ortsgebunden"
          care:
            exit_rule: "full_payout"
            reason: "Pflege-Stunden waren echter Verzicht"
          sabbatical:
            exit_rule: "identity_discount"
            discount_rate: 0.3
            reason: "Balance zwischen Fairness und Retention"
          learning:
            exit_rule: "full_payout"
            reason: "Expertise bleibt beim Mitarbeiter"

      # Retention-Wirkung der Exit-Regeln
      retention_impact:
        forfeit: "Sehr hoch, aber kann als unfair empfunden werden"
        identity_discount: "Hoch, wird als fair wahrgenommen"
        full_payout: "Niedrig, aber gut für Employer Branding"
        recommendation: |
          Identity Discount (50%) empfohlen als Balance zwischen:
          - Retention-Wirkung (Switching Costs)
          - Employer Branding (Fairness-Wahrnehmung)
          - Rechtlicher Sicherheit (weniger anfechtbar)

    F12_temporal_scope:
      scope: "strategic"
      duration_weeks: 520  # 10 Jahre (kulturelle Verankerung)
      persistence: "high"
      decision_level: "L1+"

    F13_implementation:
      resources_required:
        - "Community-Projekt-Datenbank"
        - "Tracking-System für Stunden"
        - "Partnerschaften mit NGOs/Schulen"
      rollout_phases:
        - phase: "pilot"
          duration_weeks: 12
          scope: "Eine Abteilung"
        - phase: "expansion"
          duration_weeks: 24
          scope: "Alle Standorte"

    F17_evidence:
      literature_sources:
        - "grant2008"
        - "ariely2008"
        - "deci1999"
      effect_size_estimate: 0.15
      confidence: "medium"
      epistemic_status: "THR"  # Theoretisch fundiert
      llmmc_validated: false

    F19_description:
      mechanism: |
        Mental Identity Budgeting: Transformation von monetärem Wert (Überstunden)
        in multiple Identitätswerte. Aktiviert W_base durch verschiedene Dimensionen:

        1. 🤝 Community Budget → Rollenidentität als "Contributor"
        2. 👨‍👩‍👧 Care Budget → Rollenidentität als "Fürsorgender"
        3. 🌴 Sabbatical Budget → Rollenidentität als "Selbst-Investor"
        4. 📚 Learning Budget → Rollenidentität als "Experte"

        Multiple Budgets erhöhen Autonomie drastisch → autonomy_seeking aktiviert.
        Jedes Segment findet mindestens ein Budget, das resoniert.
      rationale: |
        Überstunden verfallen normalerweise → wahrgenommen als Verlust.
        Transformation in Identity-Budgets → wahrgenommen als Investment.

        Kritischer Vorteil: JEDES Segment wird angesprochen:
        - social_oriented → Community Budget (σ=1.6)
        - loss_averse → Care Budget (σ=1.4)
        - autonomy_seeking → Sabbatical Budget (σ=1.5)
        - sophisticates → Learning Budget (σ=1.3)

        Vermeidet T7 Crowding-Out durch T5-Reframing.

        IDENTITY LOCK-IN EFFEKT:
        Bei Austritt verfällt Identity Premium (50% Discount) oder Budgets
        verfallen vollständig. Dies schafft:
        - Switching Costs durch Investment-Verlust
        - Sunk Cost Feeling ("Das kann ich nicht aufgeben")
        - Verstärkte Loss Aversion (loss_averse: σ noch höher)

        → "Golden Handcuffs", aber identitätsbasiert statt rein finanziell

    F20_status:
      current: "planned"
      created: "2026-01-19"
      updated: "2026-01-19"

    # Die 4 Mental Identity Budgets mit konkreten Nutzungsoptionen:
    mental_budgets:

      # =====================================================
      # 🤝 COMMUNITY BUDGET - Purpose/Giving Back
      # =====================================================
      community:
        identity_dimension: "Contributor / Giver"
        target_segment: "social_oriented"
        sigma: 1.6
        usage_options:
          education:
            - "Mentoring für Schüler/Studenten"
            - "IT-Kurse an lokalen Schulen"
            - "Berufsberatung"
          environment:
            - "Baumpflanzaktionen"
            - "Clean-Up Days"
          social:
            - "Essensausgabe bei Tafeln"
            - "Seniorenbetreuung"
            - "Flüchtlingshilfe"
          skills_based:
            - "Pro-bono Beratung für NGOs"
            - "Website-Entwicklung für gemeinnützige Orgs"

      # =====================================================
      # 👨‍👩‍👧 CARE BUDGET - Pflege Familie/Eltern
      # =====================================================
      care:
        identity_dimension: "Caregiver / Family Protector"
        target_segment: "loss_averse"
        sigma: 1.4
        usage_options:
          elder_care:
            - "Pflege von Eltern/Schwiegereltern"
            - "Arztbesuche begleiten"
            - "Administrative Unterstützung (Behörden, Versicherungen)"
          family_care:
            - "Kinderbetreuung in Notfällen"
            - "Schulveranstaltungen besuchen"
            - "Pflege kranker Familienangehöriger"
          bereavement:
            - "Trauerzeit für nahe Verwandte"
            - "Nachlass-Regelungen"
        policy_notes:
          - "Flexibel abrufbar ohne lange Vorlaufzeit"
          - "Kein Nachweis erforderlich (Vertrauensprinzip)"
          - "Kann auch stundenweise genutzt werden"

      # =====================================================
      # 🌴 SABBATICAL BUDGET - Selbstentwicklung/Auszeit
      # =====================================================
      sabbatical:
        identity_dimension: "Self-Investor / Explorer"
        target_segment: "autonomy_seeking"
        sigma: 1.5
        usage_options:
          extended_leave:
            - "Sabbatical (3-12 Monate)"
            - "Reise-Auszeit"
            - "Persönliches Projekt"
          life_transitions:
            - "Umzug / Hausbau"
            - "Hochzeit / große Lebensereignisse"
          personal_development:
            - "Retreat / Selbstfindung"
            - "Kreatives Projekt"
            - "Ehrenamtliches Jahr"
        accumulation_rules:
          - "Max. 500 Stunden sammelbar"
          - "Übertragbar ins nächste Jahr"
          - "Bei Austritt: Auszahlung zum Stundensatz"

      # =====================================================
      # 📚 LEARNING BUDGET - Weiterbildung/Expertise
      # =====================================================
      learning:
        identity_dimension: "Expert / Lifelong Learner"
        target_segment: "sophisticates"
        sigma: 1.3
        usage_options:
          formal_education:
            - "MBA / Masterstudium"
            - "Zertifizierungen (z.B. PMP, CFA)"
            - "Sprachkurse"
          conferences:
            - "Fachkonferenzen besuchen"
            - "Als Speaker auftreten"
          self_directed:
            - "Online-Kurse (Coursera, etc.)"
            - "Bücher / Fachzeitschriften"
            - "Lern-Sabbatical"
        conversion_note: |
          Learning Budget kann auch in monetäre Weiterbildungskosten
          umgewandelt werden (1 Stunde = X EUR Weiterbildungsbudget)

