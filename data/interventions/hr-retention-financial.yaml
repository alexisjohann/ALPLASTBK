      name: "Awareness"
      target_component: "A(·)"

    F4_target_structure:
      level: "IND"
      aggregation: "direct"

    F5_fepsde_dimension:
      primary: "D"
      secondary: "F"
      weights:
        F: 0.3
        E: 0.1
        P: 0.0
        S: 0.1
        D: 0.5
        X: 0.0

    F6_journey_phase:
      optimal_phases: ["awareness"]
      phase_affinity:
        awareness: 0.9
        triggered: 0.6
        action: 0.3
        maintenance: 0.2
        stable: 0.1

    F7_framing:
      frame_type: "positive"
      loss_gain_frame: "gain"
      message_template: "Entdecken Sie Ihre Karrieremöglichkeiten bei uns"

    F8_autonomy:
      level: "voluntary"
      reactance_risk: "low"
      autonomy_cue_required: false

    F9_target_segment:
      optimal_segments: ["sophisticates", "autonomy_seeking"]
      segment_multipliers:
        present_biased: 1.0
        social_oriented: 1.0
        autonomy_seeking: 1.2
        loss_averse: 1.0
        sophisticates: 1.3
        naifs: 0.8
      warnings: []

    F10_complementarity:
      synergies:
        - type: "T3"
          gamma: 0.4
          mechanism: "Awareness makes contextual nudges more effective"
      conflicts: []
      crowding_out_warnings: []

    F11_side_effects:
      risk_level: "low"
      positive_spillovers:
        - "Erhöhte Weiterbildungsbereitschaft"
        - "Besseres Verständnis der Unternehmensstruktur"
      negative_spillovers: []

    F12_temporal_scope:
      scope: "tactical"
      duration_weeks: 52
      persistence: "medium"
      decision_level: "L1"

    F19_description:
      mechanism: "Transparente Kommunikation von Karrierepfaden erhöht A(·) für Entwicklungsmöglichkeiten"
      rationale: "Mitarbeiter bleiben eher, wenn sie ihre Zukunft im Unternehmen sehen können"

