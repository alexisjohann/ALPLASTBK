F1_title:
  id: "INT-MUNI-001"
  name: "Wöchentliche Gratis-Sack-Lieferung ('Winterthur liefert')"
  domain: "municipal"
  context: "Illegale Müllentsorgung Winterthur"

F2_target_dimension:
  dimension_10c: "WHEN"
  delta_target: "κ_KON→"  # Kontextuelle Friction auf 0 reduzieren
  intervention_vector: "I_WHEN"
  secondary_vector: "I_AWARE"  # Wöchentliche Erinnerung
  mechanism_description: |
    Default Shift: Sack ist bereits da → Nutzung wird zum Default
    Friction Removal: Kaufhürde eliminiert
    Salience: Wöchentliche Lieferung = wöchentliche Erinnerung

F2_intervention_type:
  code: "I_WHEN"
  name: "Contextual/Choice Architecture"
  target: "κ_KON"
  secondary_code: "I_AWARE"

F4_target_structure:
  level: "IND"  # Individual households
  aggregation: "direct"
  unit: "Haushalt"
  population: "Alle Winterthurer Haushalte (~58,000)"

F5_fepsde_dimension:
  primary: "E"  # Effort
  secondary: "P"  # Physical
  weights:
    F: 0.1   # Financial (CHF 1 Ersparnis - marginal)
    E: 0.6   # Effort (Haupttreiber - Kaufhürde weg)
    P: 0.2   # Physical (Sack wird geliefert)
    S: 0.1   # Social (Stadt-Signal)
    D: 0.0
    X: 0.0

F6_journey_phase:
  optimal_phases: ["action", "triggered"]
  phase_affinity:
    awareness: 0.2
    triggered: 0.8
    action: 0.9
    maintenance: 0.5
    stable: 0.3
  interpretation: |
    Wirkt am stärksten bei Haushalten in 'triggered' (wissen, sollten korrekt
    entsorgen) und 'action' Phase (versuchen es aktiv).

F12_temporal_scope:
  scope: "systemic"
  duration_weeks: null  # Unbefristet
  persistence: "high"
  decision_level: "L2"  # Systemische Entscheidung auf Municipal Level
  habit_formation_weeks: 8

# =============================================================================
# TIER 2: OPERATIONAL FIELDS
# =============================================================================

F7_framing:
  frame_type: "positive"
  loss_gain_frame: "gain"
  message_template: "Winterthur liefert – Ihr wöchentlicher Abfallsack kommt direkt zu Ihnen"
  alternative_frames:
    reciprocity: "Winterthur investiert in saubere Quartiere. Mit Ihrem korrekten Entsorgen tragen Sie dazu bei."
    community: "Gemeinsam für ein sauberes Winterthur – Ihr Sack, unsere Stadt."

F8_autonomy:
  level: "default"
  reactance_risk: "low"
  autonomy_cue_required: false
  rationale: |
    Es ist ein Geschenk, keine Pflicht. Der Sack kann ignoriert werden.
    Keine restriktive Komponente → keine Reaktanz erwartet.

F11_side_effects:
  risk_level: "low"
  positive_spillovers:
    - "Reciprocity: Stadt gibt → Bürger kooperiert"
    - "Salience: Wöchentliche Erinnerung an korrektes Entsorgen"
    - "City branding: Winterthur als saubere, bürgerfreundliche Stadt"
    - "Mülltrennung wird salienter (Sack nur für Restmüll)"
  negative_spillovers:
    - "Logistikkosten für wöchentliche Lieferung"
    - "Marginale Umweltbelastung durch Lieferfahrzeuge"
  crowding_out_risk: []

F14_path_function:
  primary: "stabilizer"
  secondary: "amplifier"
  explanation: |
    Stabilizer: Verhindert Rückfall in illegales Entsorgen
    Amplifier: Verstärkt korrektes Verhalten in Action-Phase

F15_repetition:
  pattern: "continuous"
  frequency: "weekly"
  decay_expected: false
  rationale: "Wöchentliche Lieferung = konstante Intervention"

