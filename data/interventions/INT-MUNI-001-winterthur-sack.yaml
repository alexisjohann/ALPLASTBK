F18_system:
  external_id: null
  integration_notes: |
    Könnte mit bestehendem Abfuhrkalender-System verknüpft werden.
    Lieferung durch Post oder Stadtwerk-Fahrzeuge.

F19_description:
  mechanism: |
    Die wöchentliche Lieferung eines Gratis-Sacks eliminiert die Kaufhürde
    (Friction Removal) und macht korrektes Entsorgen zum Default.

    Der Sack ist bereits da – die Frage ist nicht mehr "soll ich einen kaufen?"
    sondern "soll ich ihn nutzen?".

    Zusätzlich wirkt die wöchentliche Lieferung als Erinnerung (Salience)
    und das Geschenk aktiviert Reciprocity-Normen.

  rationale: |
    Die Diagnose zeigt, dass der Haupttreiber illegaler Entsorgung NICHT
    Kosten (CHF 1/Sack), sondern Effort Aversion und Present Bias sind.

    Diese Intervention adressiert beide Treiber direkt:
    - Effort Aversion → Friction Removal (kein Kaufen mehr)
    - Present Bias → Default Shift (Sack ist schon da)

  behavioral_mechanisms:
    - name: "Endowment Effect"
      description: "'Mein Sack' → will ihn nutzen, nicht verschwenden"
    - name: "Salience"
      description: "Wöchentliche Lieferung = wöchentliche Erinnerung"
    - name: "Friction Removal"
      description: "Kaufhürde eliminiert"
    - name: "Default Shift"
      description: "Von Opt-in zu Opt-out"
    - name: "Reciprocity"
      description: "Stadt gibt → Bürger fühlt Verpflichtung"

F20_status:
  current: "planned"
  created: "2026-01-24"
  updated: "2026-01-24"
  author: "EBF Analysis"
  research_status: "Cost data validated via web research"
  next_steps:
    - "Detaillierte Logistik-Offerten einholen (Post, Stadtwerk)"
    - "Pilotprojekt in einem Quartier (z.B. Altstadt) für 6 Monate"
    - "Baseline-Erhebung: Hauskehricht-Anteil in Pilot-Kübeln messen"
    - "Vergleich mit aktuellen Massnahmen (Kampagne, Kontrollen)"

