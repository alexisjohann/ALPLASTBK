# PCT 10C Multiplier Tables
# =========================
#
# Implements the second term of the full PCT equation:
#
#   theta_B = theta_A * prod_i M(delta_psi_i) * prod_j N(delta_10C_j)
#
# The 10C multipliers capture context differences at the
# framework level (WHO, WHAT, HOW, WHEN, WHERE, AWARE, READY, STAGE, HIERARCHY).
#
# These are initial reference ranges; will be calibrated empirically
# as more data becomes available.
#
# SCALE:
#   N = 1.0 means: this 10C dimension has no effect on the parameter
#   N < 1.0 means: this context reduces the parameter value
#   N > 1.0 means: this context amplifies the parameter value
#
# Created: 2026-02-16
# Status: reference_ranges (initial)

version: "0.1"
calibration_status: "reference_ranges"
source: "docs/frameworks/core-framework-definition.yaml"

# N(delta_10C) = 1.0 + slope * delta
# where delta is the signed difference between target and anchor 10C scores

multipliers:

  WHO:
    description: "Who has utility? Population segment differences"
    slope: 0.15
    range: [0.85, 1.20]
    default: 1.0
    examples:
      - "students -> general_population: N = 0.90"
      - "WEIRD -> non-WEIRD: N = 0.85"

  WHAT:
    description: "What is utility? Outcome dimension differences"
    slope: 0.10
    range: [0.90, 1.15]
    default: 1.0
    examples:
      - "financial -> social: N = 1.10"
      - "health -> financial: N = 0.95"

  HOW:
    description: "How do factors interact? Complementarity differences"
    slope: 0.20
    range: [0.80, 1.25]
    default: 1.0
    examples:
      - "additive -> multiplicative: N = 1.15"
      - "complementary -> substitutive: N = 0.85"

  WHEN:
    description: "When does context matter? Temporal/contextual salience"
    slope: 0.10
    range: [0.90, 1.15]
    default: 1.0
    note: "Overlaps with psi_T; use when 10C framing is more appropriate"

  WHERE:
    description: "Where do parameters come from? Evidence quality"
    slope: 0.08
    range: [0.92, 1.10]
    default: 1.0
    examples:
      - "tier_1_meta -> tier_3_working: N = 0.92"
      - "tier_3_working -> tier_1_meta: N = 1.08"

  AWARE:
    description: "Awareness level differences"
    slope: 0.12
    range: [0.88, 1.15]
    default: 1.0
    examples:
      - "high_awareness -> low_awareness: N = 0.90"
      - "low_awareness -> high_awareness: N = 1.10"

  READY:
    description: "Readiness/willingness differences"
    slope: 0.15
    range: [0.85, 1.20]
    default: 1.0
    examples:
      - "ready -> resistant: N = 0.85"
      - "resistant -> ready: N = 1.15"

  STAGE:
    description: "Behavioral journey stage differences"
    slope: 0.10
    range: [0.90, 1.15]
    default: 1.0
    examples:
      - "pre_contemplation -> action: N = 1.10"
      - "maintenance -> relapse: N = 0.90"

  HIERARCHY:
    description: "Decision hierarchy level differences"
    slope: 0.08
    range: [0.92, 1.10]
    default: 1.0
    examples:
      - "individual -> institutional: N = 1.08"
      - "institutional -> individual: N = 0.92"
