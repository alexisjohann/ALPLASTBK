# ============================================================================
# SKILL TAXONOMY — KAUFLAND LEBENSMITTELEINZELHANDEL (LEH)
# ============================================================================
# Model:     MOD-ORG-SBO-001 v1.1
# Created:   2026-02-17
# Updated:   2026-02-17
# Superkey:  STAX-KAUF-001
# Scope:     ~170'000 MA, 1'500+ Filialen, 8 Laender
# Structure: 9 Domains → 28 Cluster → 120 Skills × 5 Proficiency Levels
# Autor-Mapping: Each skill tagged with Autor task type (R/M/I/A/L)
# Dreyfus-Levels: 1=Novize, 2=Fortgeschritten, 3=Kompetent, 4=Gewandt, 5=Expert
# ============================================================================

metadata:
  id: STAX-KAUF-001
  name: "Kaufland Skill Taxonomy LEH"
  version: "1.1"
  model_ref: MOD-ORG-SBO-001
  created: "2026-02-17"
  total_domains: 9
  total_clusters: 28
  total_skills: 120
  proficiency_levels: 5
  autor_types: [R, M, I, A, L]  # Routine, Manual, Interactive, Abstract, Leadership

proficiency_level_definitions:
  1:
    name: "Novize"
    name_en: "Novice"
    description: "Folgt Regeln und Checklisten, braucht Anleitung"
    behavioral_markers:
      - "Arbeitet nach Anweisung"
      - "Fragt bei Abweichungen nach"
      - "Erkennt einfache Standardsituationen"
    typical_training: "1-4 Wochen"
    supervision: "Direkte Anleitung erforderlich"
  2:
    name: "Fortgeschritten"
    name_en: "Advanced Beginner"
    description: "Erkennt wiederkehrende Muster, arbeitet bei Routine selbstaendig"
    behavioral_markers:
      - "Bewaeltigt Standardsituationen eigenstaendig"
      - "Erkennt Abweichungen vom Normalfall"
      - "Nutzt Erfahrung aus aehnlichen Situationen"
    typical_training: "1-3 Monate"
    supervision: "Gelegentliche Ruecksprache"
  3:
    name: "Kompetent"
    name_en: "Competent"
    description: "Priorisiert eigenstaendig, loest Standardprobleme, kann anleiten"
    behavioral_markers:
      - "Plant und priorisiert eigenstaendig"
      - "Loest auch ungewoehnliche Situationen"
      - "Kann Novizen anleiten"
      - "Uebernimmt Verantwortung fuer Ergebnisse"
    typical_training: "6-12 Monate"
    supervision: "Ergebnisorientierte Steuerung"
  4:
    name: "Gewandt"
    name_en: "Proficient"
    description: "Erkennt Situationen intuitiv, mentort andere, optimiert Prozesse"
    behavioral_markers:
      - "Erkennt Muster ohne bewusste Analyse"
      - "Antizipiert Probleme bevor sie auftreten"
      - "Mentort Kompetente systematisch"
      - "Verbessert bestehende Prozesse"
    typical_training: "1-3 Jahre"
    supervision: "Strategische Abstimmung"
  5:
    name: "Expert:in"
    name_en: "Expert"
    description: "Setzt Standards, innoviert, strategischer Beitrag, bildet Gewandte aus"
    behavioral_markers:
      - "Handelt intuitiv und reflektiert"
      - "Definiert Best Practices fuer die Organisation"
      - "Loest neuartige, komplexe Probleme"
      - "Traegt zur strategischen Entwicklung bei"
    typical_training: "3-10 Jahre"
    supervision: "Selbstgesteuert, strategische Ziele"

