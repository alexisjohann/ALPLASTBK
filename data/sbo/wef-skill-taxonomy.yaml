# ============================================================================
# WEF GLOBAL SKILLS TAXONOMY
# ============================================================================
# Source:    World Economic Forum — Future of Jobs Report 2025
# Paper:     PAP-wef2025futurejobs, PAP-wef2023futurejobs
# Created:   2026-02-22
# Structure: 2 Domains (L1) → 12 Categories (L2) → 33 Clusters (L3) → 73 Skills (L4)
# Total:     118 nodes across 4 levels
# ID Scheme: WEF-{L}-{SEQ} (e.g. WEF-1-01, WEF-2-01, WEF-3-01, WEF-4-01)
# Reference: https://www.weforum.org/publications/the-future-of-jobs-report-2025/
# Cross-ref: STAX-KAUF-001 (Kaufland skill taxonomy uses WEF as reference)
# ============================================================================

metadata:
  id: STAX-WEF-001
  name: "WEF Global Skills Taxonomy"
  version: "1.0"
  source: "World Economic Forum — Future of Jobs Report 2025"
  paper_refs:
    - PAP-wef2025futurejobs
    - PAP-wef2023futurejobs
  created: "2026-02-22"
  hierarchy:
    level_1: "Domain"
    level_2: "Category"
    level_3: "Cluster"
    level_4: "Skill"
  counts:
    level_1_domains: 2
    level_2_categories: 12
    level_3_clusters: 33
    level_4_skills: 73
    total_nodes: 118
  cross_references:
    kaufland_taxonomy: STAX-KAUF-001
    ebf_theory_support:
      - MS-IB-001   # Identity Economics (Akerlof & Kranton)
      - MS-SP-001   # Inequity Aversion (Fehr & Schmidt)
    ebf_use_for:
      - DOMAIN-ORG
      - CORE-WHO

# ============================================================================
# LEVEL DEFINITIONS
# ============================================================================

level_definitions:
  level_1:
    name: "Domain"
    description: >
      The broadest classification of human capabilities in the workplace.
      The WEF taxonomy distinguishes two fundamental domains: Skills/Knowledge/Abilities
      (developed proficiencies and innate capacities) and Attitudes (consistent behaviours,
      emotional-intelligence traits and beliefs).
    count: 2
  level_2:
    name: "Category"
    description: >
      Major groupings within each domain that represent distinct families of capabilities.
      Categories organize related clusters of skills by their functional nature
      (e.g. physical, cognitive, technological) or dispositional orientation
      (e.g. self-efficacy, working with others).
    count: 12
  level_3:
    name: "Cluster"
    description: >
      Thematic groupings of closely related skills that share a common functional
      purpose or cognitive basis. Clusters represent the intermediate granularity
      level used in workforce planning and skills-gap analysis.
    count: 33
  level_4:
    name: "Skill"
    description: >
      The most granular level of the taxonomy. Individual, assessable competencies
      that can be trained, measured and matched to job requirements. Each skill has
      a unique definition and can be mapped to Autor task types (R/M/I/A/L) and
      Dreyfus proficiency levels (1-5) when applied in a specific organizational context.
    count: 73

# ============================================================================
# TAXONOMY
# ============================================================================

taxonomy:

  # ========================================================================
  # LEVEL 1 — DOMAIN 1: SKILLS, KNOWLEDGE AND ABILITIES
  # ========================================================================
  - id: WEF-1-01
    level: 1
    label: "Skills, knowledge and abilities"
    description: >
      Whether gained through experiential learning or formal instruction, skills represent
      developed proficiencies in the performance of distinct cross-functional aspects of
      tasks. Though they may become increasingly automatic as they develop, skills are
      nevertheless often difficult to practically disentangle from familiarity in using a
      body of contextual or theoretical knowledge. Skills may also be dependent on physical,
      psychomotor, cognitive and sensory abilities which are to varying degrees innate.
    wef_report_share: "two-thirds of priority skills"
    children:

      # ====================================================================
      # LEVEL 2 — Physical abilities
      # ====================================================================
      - id: WEF-2-01
        level: 2
        label: "Physical abilities"
        description: >
          The range of physical, psychomotor, sensory and sensory-processing abilities
          that are required to perform a job role.
        parent: WEF-1-01
        wef_trend: "declining"
        children:

          # Level 3 — Manual dexterity, endurance and precision
          - id: WEF-3-01
            level: 3
            label: "Manual dexterity, endurance and precision"
            description: >
              Abilities related to the capacity to manipulate and control objects,
              strength, endurance, flexibility, balance and coordination.
            parent: WEF-2-01
            children:
              - id: WEF-4-01
                level: 4
                label: "Dexterity"
                description: >
                  The ability to steadily, precisely and responsively grasp, manipulate,
                  and assemble objects or adjust the controls of a machine.
                parent: WEF-3-01
                autor_type: M  # Manual
              - id: WEF-4-02
                level: 4
                label: "Strength and stamina"
                description: >
                  The ability to exert muscle force in short bursts or over long periods
                  with endurance to fatigue.
                parent: WEF-3-01
                autor_type: M
              - id: WEF-4-03
                level: 4
                label: "Flexibility and coordination"
                description: >
                  The ability to bend, stretch, twist, and reach, and coordinate these
                  movements when the whole body is in motion, while maintaining balance
                  and stability.
                parent: WEF-3-01
                autor_type: M

          # Level 3 — Sensory-processing abilities
          - id: WEF-3-02
            level: 3
            label: "Sensory-processing abilities"
            description: >
              Abilities that influence visual, auditory and spatial perception, and the
              acquisition and application of knowledge in problem-solving.
            parent: WEF-2-01
            children:
              - id: WEF-4-04
                level: 4
                label: "Visual abilities"
                description: >
                  Abilities relating to resolving details, perceiving depth, differentiating
                  colours and intensities, and seeing in low light, at oblique angles and
                  in bright lighting.
                parent: WEF-3-02
                autor_type: M
              - id: WEF-4-05
                level: 4
                label: "Auditory abilities"
                description: >
                  Abilities relating to distinguishing and isolating sounds, interpreting
                  speech and speaking clearly.
                parent: WEF-3-02
                autor_type: M

          # Level 3 — Information-processing abilities
          - id: WEF-3-03
            level: 3
            label: "Information-processing abilities"
            description: >
              The ability to remember and organise information, identify patterns and
              differences, concentrate, and shift attention between sources of information.
            parent: WEF-2-01
            children:
              - id: WEF-4-06
                level: 4
                label: "Spatial abilities"
                description: >
                  The ability to mentally manipulate objects and perceive locations
                  relative to an environment.
                parent: WEF-3-03
                autor_type: A  # Abstract

      # ====================================================================
      # LEVEL 2 — Cognitive skills
      # ====================================================================
      - id: WEF-2-02
        level: 2
        label: "Cognitive skills"
        description: >
          Cognitive functioning refers to multiple mental abilities, including learning,
          thinking, reasoning, remembering, problem solving, decision making, and attention.
        parent: WEF-1-01
        wef_trend: "growing"
        children:

          # Level 3 — Creativity and problem solving
          - id: WEF-3-04
            level: 3
            label: "Creativity and problem solving"
            description: "Qualitative reasoning and ideation."
            parent: WEF-2-02
            children:
              - id: WEF-4-07
                level: 4
                label: "Creative thinking"
                description: >
                  Capacity to bring a new idea or concept into existence through imagination
                  and to imagine something that does not exist.
                parent: WEF-3-04
                autor_type: A
                wef_priority_rank: 2
              - id: WEF-4-08
                level: 4
                label: "Analytical thinking"
                description: >
                  Capacity to break down concepts and complex ideas into basic or fundamental
                  principles. Includes critical thinking, whereby judgements are made by
                  analysing and interpreting facts and information.
                parent: WEF-3-04
                autor_type: A
                wef_priority_rank: 1
              - id: WEF-4-09
                level: 4
                label: "Systems thinking"
                description: >
                  Capacity to understand how concepts work together, embrace a multidisciplinary
                  approach, and identify patterns over time.
                parent: WEF-3-04
                autor_type: A

          # Level 3 — Mathematical and statistical thinking
          - id: WEF-3-05
            level: 3
            label: "Mathematical and statistical thinking"
            description: >
              Quantitative reasoning in order to calculate, estimate or model phenomena.
            parent: WEF-2-02
            children:
              - id: WEF-4-10
                level: 4
                label: "Number facility"
                description: >
                  The ability to rapidly and accurately add, subtract, multiply and divide.
                parent: WEF-3-05
                autor_type: R  # Routine
              - id: WEF-4-11
                level: 4
                label: "Calculating and estimating"
                description: >
                  The ability to synthesise quantitative information into pertinent calculations
                  or estimates given precise or approximate information.
                parent: WEF-3-05
                autor_type: A
              - id: WEF-4-12
                level: 4
                label: "Algebraic facility"
                description: >
                  Solving equations and using advanced mathematical techniques.
                parent: WEF-3-05
                autor_type: A
              - id: WEF-4-13
                level: 4
                label: "Data analysis and mathematical modelling"
                description: >
                  Making statistical inferences from data and using statistical techniques
                  to determine the properties of complex systems.
                parent: WEF-3-05
                autor_type: A

          # Level 3 — Speaking, writing and languages
          - id: WEF-3-06
            level: 3
            label: "Speaking, writing and languages"
            description: >
              Communicate through reading, writing, speaking and listening in a mother
              tongue or a foreign language.
            parent: WEF-2-02
            children:
              - id: WEF-4-14
                level: 4
                label: "Reading"
                description: >
                  Understanding written sentences and paragraphs in work-related documents.
                parent: WEF-3-06
                autor_type: A
              - id: WEF-4-15
                level: 4
                label: "Speaking"
                description: >
                  Talking to others to convey information effectively.
                parent: WEF-3-06
                autor_type: I  # Interactive
              - id: WEF-4-16
                level: 4
                label: "Writing"
                description: >
                  Communicating effectively in writing as appropriate for the needs
                  of the audience.
                parent: WEF-3-06
                autor_type: A
              - id: WEF-4-17
                level: 4
                label: "Editing"
                description: >
                  Synthesising text resources into a coherent narrative with a specified
                  style or for a target audience.
                parent: WEF-3-06
                autor_type: A
              - id: WEF-4-18
                level: 4
                label: "Multi-lingualism"
                description: >
                  Communicating through reading, writing, speaking and listening in
                  foreign languages.
                parent: WEF-3-06
                autor_type: I

      # ====================================================================
      # LEVEL 2 — Management skills
      # ====================================================================
      - id: WEF-2-03
        level: 2
        label: "Management skills"
        description: >
          Capacity to allocate resources efficiently and effectively, and manage activities
          that businesses engage in daily to gain value from physical or intangible assets.
        parent: WEF-1-01
        wef_trend: "stable"
        children:

          # Level 3 — Talent management
          - id: WEF-3-07
            level: 3
            label: "Talent management"
            description: >
              Capacity for evaluating skills and skills gaps, and gathering personnel
              resources to achieve tasks, including how human capital will be allocated
              to get the work done.
            parent: WEF-2-03
            children:
              - id: WEF-4-19
                level: 4
                label: "Skill evaluation"
                description: >
                  Accurately evaluating a candidate or colleagues proficiencies and
                  characteristics over their full profile of skills, knowledge, abilities
                  and attitudes.
                parent: WEF-3-07
                autor_type: A
              - id: WEF-4-20
                level: 4
                label: "Talent planning and development"
                description: >
                  Identifying developmental or hiring solutions to bridge a team's skills
                  gaps and ensuring knowledge transfer when team members transition to
                  new roles.
                parent: WEF-3-07
                autor_type: L  # Leadership

          # Level 3 — Operations and logistics
          - id: WEF-3-08
            level: 3
            label: "Operations and logistics"
            description: >
              Management of Material Resources. Obtaining and seeing to the appropriate
              use of equipment, facilities, and materials needed to do certain work.
            parent: WEF-2-03
            children:
              - id: WEF-4-21
                level: 4
                label: "Coordination and time management"
                description: >
                  Capacity to coordinate time-sensitive schedules in cooperation with others.
                parent: WEF-3-08
                autor_type: A
              - id: WEF-4-22
                level: 4
                label: "Project management"
                description: >
                  Capacity to lead the work of a team to identify, select and implement
                  the appropriate changes, tools, and improvements to achieve and deliver
                  a defined goal.
                parent: WEF-3-08
                autor_type: L
              - id: WEF-4-23
                level: 4
                label: "Supply-chain management"
                description: >
                  Optimising the flow of the goods and services which are required to
                  realise a product or goal.
                parent: WEF-3-08
                autor_type: A

          # Level 3 — Financial management
          - id: WEF-3-09
            level: 3
            label: "Financial management"
            description: >
              Capacity for gathering resources to achieve tasks, including how money will
              be spent to get the work done, obtaining equipment, facilities, and materials,
              and accounting for expenditures. Determining how money will be spent to get
              the work done, and accounting for these expenditures.
            parent: WEF-2-03
            children:
              - id: WEF-4-24
                level: 4
                label: "Accounting"
                description: >
                  Tracking the flow of money that has been spent.
                parent: WEF-3-09
                autor_type: R
              - id: WEF-4-25
                level: 4
                label: "Finance"
                description: >
                  Budgeting money that will be spent, managing financial portfolios, and
                  tracking economic trends which affect business performance.
                parent: WEF-3-09
                autor_type: A

          # Level 3 — Quality management
          - id: WEF-3-10
            level: 3
            label: "Quality management"
            description: >
              Pursuing excellence in workplace processes, products and activities.
            parent: WEF-2-03
            children:
              - id: WEF-4-26
                level: 4
                label: "Quality assurance"
                description: >
                  Setting quality objectives, specifying operational processes to achieve
                  them, providing confidence they will be effective, and improving them
                  based on experience.
                parent: WEF-3-10
                autor_type: A
              - id: WEF-4-27
                level: 4
                label: "Quality control"
                description: >
                  Inspecting products to ensure they fulfil quality requirements.
                parent: WEF-3-10
                autor_type: R
              - id: WEF-4-28
                level: 4
                label: "Risk management"
                description: >
                  Assessing, prioritising and mitigating the effect of uncertainty on
                  objectives, to enhance institutional resilience.
                parent: WEF-3-10
                autor_type: A

      # ====================================================================
      # LEVEL 2 — Engagement skills
      # ====================================================================
      - id: WEF-2-04
        level: 2
        label: "Engagement skills"
        description: >
          Capacity to engage customers either corporately or personally.
        parent: WEF-1-01
        wef_trend: "stable"
        children:

          # Level 3 — Marketing and media
          - id: WEF-3-11
            level: 3
            label: "Marketing and media"
            description: >
              Capacity to promote and sell products or services.
            parent: WEF-2-04
            children:
              - id: WEF-4-29
                level: 4
                label: "Sales, communication and marketing of products and services"
                description: >
                  Capacity to identify and shape effective value propositions for products
                  and services, as well as to sell products on that basis.
                parent: WEF-3-11
                autor_type: I
              - id: WEF-4-30
                level: 4
                label: "Digital marketing"
                description: >
                  Using the internet, mobile devices, social media, search engines and
                  other online channels to reach consumers.
                parent: WEF-3-11
                autor_type: A

          # Level 3 — Customer experience
          - id: WEF-3-12
            level: 3
            label: "Customer experience"
            description: >
              Capacity to manage positive interactions between an organization and
              its customers.
            parent: WEF-2-04
            children:
              - id: WEF-4-31
                level: 4
                label: "Customer service"
                description: >
                  Responding to customer enquiries in a manner that balances speed and
                  quality, and represents brand values.
                parent: WEF-3-12
                autor_type: I
              - id: WEF-4-32
                level: 4
                label: "Customer relationship management"
                description: >
                  Managing and developing a portfolio of client relationships over extended
                  periods to accomplish an operational strategy.
                parent: WEF-3-12
                autor_type: I

      # ====================================================================
      # LEVEL 2 — Technology skills
      # ====================================================================
      - id: WEF-2-05
        level: 2
        label: "Technology skills"
        description: >
          Effectively designing and using technology.
        parent: WEF-1-01
        wef_trend: "fastest-growing"
        children:

          # Level 3 — Technology literacy
          - id: WEF-3-13
            level: 3
            label: "Technology literacy"
            description: >
              Capacity to select the right tools needed to perform tasks, use those
              tools and set up and operate technology.
            parent: WEF-2-05
            children:
              - id: WEF-4-33
                level: 4
                label: "Collaboration and productivity software"
                description: >
                  Using software designed to help get work done faster and more efficiently.
                parent: WEF-3-13
                autor_type: R
              - id: WEF-4-34
                level: 4
                label: "Manufacturing technologies"
                description: >
                  Using technologies that assist in industrial production and manufacturing
                  processes.
                parent: WEF-3-13
                autor_type: M
              - id: WEF-4-35
                level: 4
                label: "Installation"
                description: >
                  Installing equipment, machines, wiring or programs to meet specifications.
                parent: WEF-3-13
                autor_type: M

          # Level 3 — Programming
          - id: WEF-3-14
            level: 3
            label: "Programming"
            description: >
              Using software and programming languages.
            parent: WEF-2-05
            children:
              - id: WEF-4-36
                level: 4
                label: "Functional programming"
                description: >
                  Writing simple programs using calls to subroutines.
                parent: WEF-3-14
                autor_type: A
              - id: WEF-4-37
                level: 4
                label: "Object-oriented programming"
                description: >
                  Using data encapsulation and inheritance to develop well designed
                  programming projects, often as part of a team.
                parent: WEF-3-14
                autor_type: A
              - id: WEF-4-38
                level: 4
                label: "Computational thinking"
                description: >
                  Looking at real-world scenarios and creating models that can be
                  processed by a computer.
                parent: WEF-3-14
                autor_type: A

          # Level 3 — Design and user experience
          - id: WEF-3-15
            level: 3
            label: "Design and user experience"
            description: >
              Developing and delivering effective and efficient physical and digital
              designs given a systematic understanding of how users will perceive their
              value, function, usability and aesthetic.
            parent: WEF-2-05
            children:
              - id: WEF-4-39
                level: 4
                label: "Human-technology interaction"
                description: >
                  Designing technology from a users perspective by balancing considerations
                  such as practical usability, ergonomics, perception, cognition, social
                  psychology, consumer behaviour and environmental impact.
                parent: WEF-3-15
                autor_type: A
              - id: WEF-4-40
                level: 4
                label: "Mobile development"
                description: >
                  Developing applications for mobile devices.
                parent: WEF-3-15
                autor_type: A
              - id: WEF-4-41
                level: 4
                label: "Web development"
                description: >
                  Building and maintaining websites.
                parent: WEF-3-15
                autor_type: A

          # Level 3 — Networks and cybersecurity
          - id: WEF-3-16
            level: 3
            label: "Networks and cybersecurity"
            description: >
              Securely and efficiently delivering information-technology solutions.
            parent: WEF-2-05
            children:
              - id: WEF-4-42
                level: 4
                label: "Computer hardware and networking"
                description: >
                  Setting up a connected network of computing devices, such as laptops,
                  desktops, servers, smartphones, tablets and internet-of-things devices
                  that communicate with one another.
                parent: WEF-3-16
                autor_type: A
              - id: WEF-4-43
                level: 4
                label: "Cybersecurity and application security"
                description: >
                  Using technologies, processes and practices to protect computers,
                  networks, programs and data from unauthorised access or attacks that
                  are aimed for exploitation.
                parent: WEF-3-16
                autor_type: A
              - id: WEF-4-44
                level: 4
                label: "Cloud computing"
                description: >
                  Delivering computing services over the internet.
                parent: WEF-3-16
                autor_type: A

          # Level 3 — Artificial intelligence and big data
          - id: WEF-3-17
            level: 3
            label: "Artificial intelligence and big data"
            description: >
              Building and developing machines capable of thinking autonomously and
              performing tasks that mimic human intelligence.
            parent: WEF-2-05
            wef_priority: "fastest-growing skill cluster"
            children:
              - id: WEF-4-45
                level: 4
                label: "Data mining"
                description: >
                  Accessing, cleaning and sorting large data sets, and using software
                  tools to visualise the results.
                parent: WEF-3-17
                autor_type: A
              - id: WEF-4-46
                level: 4
                label: "Supervised learning"
                description: >
                  Designing neural networks which can be trained to reliably make
                  decisions based on example data.
                parent: WEF-3-17
                autor_type: A
              - id: WEF-4-47
                level: 4
                label: "Unsupervised learning"
                description: >
                  Designing neural networks which can detect clusters and patterns in
                  large and complex data sets without human guidance.
                parent: WEF-3-17
                autor_type: A
              - id: WEF-4-48
                level: 4
                label: "Industry-specialized skills"
                description: >
                  Specialised industry skills are specific to the field of the
                  profession in question.
                parent: WEF-3-17
                autor_type: A

  # ========================================================================
  # LEVEL 1 — DOMAIN 2: ATTITUDES
  # ========================================================================
  - id: WEF-1-02
    level: 1
    label: "Attitudes"
    description: >
      Consistent behaviours, emotional-intelligence traits and beliefs that individuals
      exhibit that influence their interpersonal interactions and their approach to ideas,
      persons and situations. Attitudes are learned and often a big part of the driving
      force of learning and the approach to doing tasks.
    wef_report_share: "one-third of priority skills"
    children:

      # ====================================================================
      # LEVEL 2 — Self-efficacy
      # ====================================================================
      - id: WEF-2-06
        level: 2
        label: "Self-efficacy"
        description: >
          Controlling one's thoughts, feelings and actions.
        parent: WEF-1-02
        wef_trend: "growing"
        children:

          # Level 3 — Motivation and self-awareness
          - id: WEF-3-18
            level: 3
            label: "Motivation and self-awareness"
            description: >
              Seeing one's own values, passions, aspirations, fit with environment,
              reactions (including thoughts, feelings, behaviours, strengths, and
              weaknesses), and impact on others, as well as understanding how one is
              perceived by others, in terms of those same factors.
            parent: WEF-2-06
            children:
              - id: WEF-4-49
                level: 4
                label: "Internal self-awareness"
                description: >
                  Understanding one's own values, passions, aspirations and reactions.
                parent: WEF-3-18
                autor_type: I
              - id: WEF-4-50
                level: 4
                label: "External self-awareness"
                description: >
                  Awareness of how one is perceived by others.
                parent: WEF-3-18
                autor_type: I
              - id: WEF-4-51
                level: 4
                label: "Self-control"
                description: >
                  Doing what's best despite short-term temptations; strength of will.
                parent: WEF-3-18
                autor_type: I
              - id: WEF-4-52
                level: 4
                label: "Working independently"
                description: >
                  Developing one's own ways of doing things, motivating oneself with
                  little or no supervision and depending on oneself to get things done.
                parent: WEF-3-18
                autor_type: I
              - id: WEF-4-53
                level: 4
                label: "Initiative"
                description: >
                  Daring to explore and implement new ideas using active-learning strategies.
                parent: WEF-3-18
                autor_type: I

          # Level 3 — Curiosity and lifelong learning
          - id: WEF-3-19
            level: 3
            label: "Curiosity and lifelong learning"
            description: >
              Understanding the implications of new information for both current and
              future problem-solving and decision-making.
            parent: WEF-2-06
            children:
              - id: WEF-4-54
                level: 4
                label: "Curiosity"
                description: >
                  Showing a lively interest in novelty and an openness to experience,
                  finding subjects and topics fascinating and discovering new ideas.
                parent: WEF-3-19
                autor_type: I
              - id: WEF-4-55
                level: 4
                label: "Willingness to learn"
                description: >
                  Showing a positive attitude towards new and challenging demands that
                  can only be met via lifelong learning.
                parent: WEF-3-19
                autor_type: I

          # Level 3 — Dependability and attention to detail
          - id: WEF-3-20
            level: 3
            label: "Dependability and attention to detail"
            description: >
              Dependability, commitment to doing the job punctually, correctly and
              carefully, and paying attention to details.
            parent: WEF-2-06
            children:
              - id: WEF-4-56
                level: 4
                label: "Meeting commitments and deadlines"
                description: >
                  Performing one's tasks in a self-disciplined, reliable and goal-oriented
                  manner, and ensuring that operative processes are finished at a previously
                  agreed time.
                parent: WEF-3-20
                autor_type: R
              - id: WEF-4-57
                level: 4
                label: "Time management and prioritisation"
                description: >
                  Organising one's own time to be able to deliver on commitments
                  and responsibilities.
                parent: WEF-3-20
                autor_type: A
              - id: WEF-4-58
                level: 4
                label: "Attention to detail"
                description: >
                  Producing accurate and error-free work.
                parent: WEF-3-20
                autor_type: R
              - id: WEF-4-59
                level: 4
                label: "Assuming responsibility"
                description: >
                  Accepting responsibility and accountability for one's own professional
                  decisions and actions, or those delegated to others.
                parent: WEF-3-20
                autor_type: L

          # Level 3 — Resilience, flexibility and agility
          - id: WEF-3-21
            level: 3
            label: "Resilience, flexibility and agility"
            description: >
              Maturity, poise, flexibility, and restraint to cope with pressure, stress,
              criticism, setbacks, and personal and work-related problems.
            parent: WEF-2-06
            wef_priority: "self-efficacy skills rank highly"
            children:
              - id: WEF-4-60
                level: 4
                label: "Frustration management"
                description: >
                  Handling challenges, disruption and change, and recovering from
                  set-backs and adversity.
                parent: WEF-3-21
                autor_type: I
              - id: WEF-4-61
                level: 4
                label: "Stress management"
                description: >
                  Dealing with and managing stressful situations in the workplace by
                  following adequate procedures, communicating in a quiet and effective
                  manner, and remaining level-headed when taking decisions.
                parent: WEF-3-21
                autor_type: I
              - id: WEF-4-62
                level: 4
                label: "Adaptation to change"
                description: >
                  Altering one's attitude or behaviour to accommodate modifications
                  in the workplace.
                parent: WEF-3-21
                autor_type: I
              - id: WEF-4-63
                level: 4
                label: "Persistence"
                description: >
                  Sticking to one's tasks in spite of fatigue or frustration.
                parent: WEF-3-21
                autor_type: I

      # ====================================================================
      # LEVEL 2 — Working with others
      # ====================================================================
      - id: WEF-2-07
        level: 2
        label: "Working with others"
        description: >
          Emotionally intelligent behaviours which help a team to complete tasks
          effectively by promoting cooperation, communication, respect and mutual
          upbuilding.
        parent: WEF-1-02
        wef_trend: "stable"
        children:

          # Level 3 — Empathy and active listening
          - id: WEF-3-22
            level: 3
            label: "Empathy and active listening"
            description: >
              Paying attention to what others say and understanding points being made,
              establishing rapport, adjusting the register, and respecting the intervention
              of others.
            parent: WEF-2-07
            children:
              - id: WEF-4-64
                level: 4
                label: "Empathy"
                description: >
                  Understanding the feelings, points of view and needs of others, and
                  acting in an understanding, sensitive and supportive manner.
                parent: WEF-3-22
                autor_type: I
              - id: WEF-4-65
                level: 4
                label: "Asking questions"
                description: >
                  Listening carefully to what other people say and asking appropriate
                  questions to gain better understanding.
                parent: WEF-3-22
                autor_type: I
              - id: WEF-4-66
                level: 4
                label: "Giving and receiving feedback"
                description: >
                  Providing and reacting to professional opinions and directions in a
                  calm, reflective and constructive manner.
                parent: WEF-3-22
                autor_type: I
              - id: WEF-4-67
                level: 4
                label: "Service orientation"
                description: >
                  Actively looking for ways to help others as well as to make them feel
                  attended to and welcome.
                parent: WEF-3-22
                autor_type: I
              - id: WEF-4-68
                level: 4
                label: "Following instructions and procedures"
                description: >
                  Following instructions given verbally or in writing and following
                  standard or agreed procedures.
                parent: WEF-3-22
                autor_type: R
              - id: WEF-4-69
                level: 4
                label: "Assisting and supporting co-workers"
                description: >
                  Assisting and supporting colleagues, managers, volunteers and other
                  co-workers in the performance of their tasks or in the operations
                  of a business unit.
                parent: WEF-3-22
                autor_type: I

          # Level 3 — Teaching, mentoring and coaching
          - id: WEF-3-23
            level: 3
            label: "Teaching, mentoring and coaching"
            description: >
              Facilitating the acquisition of new knowledge and skills. Leading and
              guiding individuals and groups through a process in which they are taught
              the necessary skills and knowledge for life, future learning, or for a
              particular job or set of jobs.
            parent: WEF-2-07
            children:
              - id: WEF-4-70
                level: 4
                label: "Teaching"
                description: >
                  Inculcating knowledge and skills using techniques from cognitive
                  psychology such as helping learners construct meaning through active
                  engagement with the world and by building on the conceptual scaffolding
                  of prior experience.
                parent: WEF-3-23
                autor_type: I
              - id: WEF-4-71
                level: 4
                label: "Mentoring"
                description: >
                  Supporting the development of a mentee over an extended period by
                  sharing experiences and expertise, and setting growth targets.
                parent: WEF-3-23
                autor_type: L
              - id: WEF-4-72
                level: 4
                label: "Coaching"
                description: >
                  Using questioning and structured conversations to support reflection,
                  learning and the development of skills. Coaching does not require
                  expertise in the subject at hand.
                parent: WEF-3-23
                autor_type: L

      # ====================================================================
      # LEVEL 2 — Leadership and social influence
      # ====================================================================
      - id: WEF-2-08
        level: 2
        label: "Leadership and social influence"
        description: >
          Having an impact on others in the organisation, and displaying energy and
          leadership. Leadership is defined as a quality that can be possessed by anyone,
          regardless of their particular function within an organisation.
        parent: WEF-1-02
        wef_trend: "growing"
        children:

          # Level 3 — Persuasion and negotiation
          - id: WEF-3-24
            level: 3
            label: "Persuasion and negotiation"
            description: >
              Persuading others to change their minds or behaviour as well as bringing
              them together and trying to reconcile differences.
            parent: WEF-2-08
            children:
              - id: WEF-4-73
                level: 4
                label: "Liaising, networking and exchanging information"
                description: >
                  Developing alliances, contacts or partnerships, and exchanging
                  information with clarity and consistency.
                parent: WEF-3-24
                autor_type: I
              - id: WEF-4-74
                level: 4
                label: "Building trust"
                description: >
                  Creating a culture that encourages team members to rely on each other
                  and make decisions collaboratively.
                parent: WEF-3-24
                autor_type: L
              - id: WEF-4-75
                level: 4
                label: "Ethical leadership"
                description: >
                  Carrying out workplace activities according to accepted principles of
                  right and wrong, including fairness, transparency and impartiality in
                  work practices and conduct towards other people.
                parent: WEF-3-24
                autor_type: L

      # ====================================================================
      # LEVEL 2 — Ethics
      # ====================================================================
      - id: WEF-2-09
        level: 2
        label: "Ethics"
        description: >
          Ethical attitudes maintain awareness of the societal and environmental impacts
          or personal and organisational actions, and seek to actively mitigate, prevent
          and repair harmful impacts.
        parent: WEF-1-02
        wef_trend: "growing"
        children:

          # Level 3 — Civic responsibility
          - id: WEF-3-25
            level: 3
            label: "Civic responsibility"
            description: >
              Playing an active role in the global and local community and the application
              of civic values.
            parent: WEF-2-09
            children:
              - id: WEF-4-76
                level: 4
                label: "Social justice"
                description: >
                  Taking a conscious and active approach to building inclusivity and
                  fairness across wealth, privilege and opportunity while taking a
                  transformative approach to address and dismantle individual and cultural
                  biases toward marginalised groups in one's community and workplace.
                parent: WEF-3-25
                autor_type: I
              - id: WEF-4-77
                level: 4
                label: "Social-cultural awareness"
                description: >
                  Respecting and understanding the ideas, customs, and social behaviours
                  of others. Awareness of and sensitivity to the wider world, the historical
                  context of non-dominant cultural values, and systemic discrimination that
                  may be directed toward these cultures.
                parent: WEF-3-25
                autor_type: I
              - id: WEF-4-78
                level: 4
                label: "Technology ethics"
                description: >
                  Applying moral principles for the responsible use of technology while
                  being mindful of how technology is impacting societies.
                parent: WEF-3-25
                autor_type: A

      # ====================================================================
      # LEVEL 2 — Environmental stewardship
      # ====================================================================
      - id: WEF-2-10
        level: 2
        label: "Environmental stewardship"
        description: >
          Sustainably using natural resources and protecting the natural environment.
        parent: WEF-1-02
        wef_trend: "growing"
        children:

          # Level 3 — Environmental awareness
          - id: WEF-3-26
            level: 3
            label: "Environmental awareness"
            description: >
              Being mindful of the impact of humans and human activity on the planet.
            parent: WEF-2-10
            children:
              - id: WEF-4-79
                level: 4
                label: "Sustainable and efficient resource usage"
                description: >
                  Using natural resources sustainably and efficiently.
                parent: WEF-3-26
                autor_type: A
              - id: WEF-4-80
                level: 4
                label: "Adopting green technologies"
                description: >
                  Adopting clean and environmentally sound technologies and industrial
                  processes.
                parent: WEF-3-26
                autor_type: A

