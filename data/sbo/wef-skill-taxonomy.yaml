# ============================================================================
# CROSS-REFERENCE: WEF → KAUFLAND SKILL TAXONOMY (STAX-KAUF-001)
# ============================================================================

kaufland_mapping_notes: >
  The Kaufland taxonomy (STAX-KAUF-001) uses 9 industry-specific domains with 120 skills
  mapped to 5 Dreyfus proficiency levels. Each Kaufland skill can be mapped to one or more
  WEF Level 3/4 nodes. The mapping enables cross-organizational skill comparability and
  supports skills-based hiring as recommended by the WEF Future of Jobs Report 2025
  (81% of employers planning skills-based practices by 2030).
