# ============================================================================
# CAREER PATH MATRIX (Uebergangs-Wahrscheinlichkeiten)
# ============================================================================
career_transitions:
  description: |
    Typische Karrierepfade mit geschaetzter Uebergangsrate pro Jahr.
    Berechnet als: P(Transition) = Fit-Score × Vacancy Rate × Willingness

  common_paths:
    - from: JOB-KAS
      to: JOB-TLK
      typical_years: 2-4
      transition_rate: 0.08
      required_development: ["SKL-FM-001 → Level 2", "SKL-FM-002 → Level 2"]

    - from: JOB-REG
      to: JOB-FVO
      typical_years: 1-2
      transition_rate: 0.12
      required_development: ["SKL-WM-002 → Level 3", "SKL-KI-002 → Level 2"]

    - from: JOB-FVF
      to: JOB-ALF
      typical_years: 3-5
      transition_rate: 0.06
      required_development: ["SKL-FM-001 → Level 3", "SKL-AB-001 → Level 3"]

    - from: JOB-TLK
      to: JOB-SFL
      typical_years: 3-5
      transition_rate: 0.05
      required_development: ["SKL-FM-010 → Level 3", "SKL-FM-001 → Level 4"]

    - from: JOB-ALF
      to: JOB-SFL
      typical_years: 2-4
      transition_rate: 0.07
      required_development: ["SKL-FM-010 → Level 3", "SKL-FM-012 → Level 3"]

    - from: JOB-SFL
      to: JOB-FL
      typical_years: 2-3
      transition_rate: 0.15
      required_development: ["SKL-FM-010 → Level 4", "SKL-FM-013 → Level 4"]

    - from: JOB-FL
      to: JOB-BZL
      typical_years: 5-8
      transition_rate: 0.03
      required_development: ["SKL-FM-001 → Level 5", "SKL-AB-003 → Level 4"]

    # Lateral: Filiale → Zentrale
    - from: JOB-FL
      to: JOB-ZEN-HR
      typical_years: 5-10
      transition_rate: 0.02
      required_development: ["SKL-CS-010 → Level 4", "SKL-FM-006 → Level 4"]

    - from: JOB-ALT
      to: JOB-ZEN-CM
      typical_years: 3-6
      transition_rate: 0.03
      required_development: ["SKL-AB-010 → Level 4", "SKL-AB-004 → Level 3"]

# ============================================================================
# SKILL GAP HEATMAP (Typische Luecken bei Internem Aufstieg)
# ============================================================================
typical_skill_gaps:
  description: |
    Die haeufigsten Skill-Luecken bei typischen Karriereschritten.
    Basierend auf: Autor-Typ-Shift (z.B. M→L bei Aufstieg zur Fuehrung)

  critical_transitions:
    - name: "Fachkraft → Teamleitung"
      autor_shift: "R/M/I → L"
      typical_gaps:
        - skill: SKL-FM-001   # Fuehrung
          typical_delta: -2    # Meist Level 1, braucht Level 3
          training_weeks: 8
        - skill: SKL-FM-002   # Dienstplanung
          typical_delta: -2
          training_weeks: 4
        - skill: SKL-FM-003   # Feedback
          typical_delta: -2
          training_weeks: 4
      mitigation: "Fuehrungskraefteentwicklungs-Programm (16 Wochen)"

    - name: "Teamleitung → Filialleitung"
      autor_shift: "L+I → L+A"
      typical_gaps:
        - skill: SKL-FM-010   # P&L
          typical_delta: -2
          training_weeks: 8
        - skill: SKL-FM-013   # Strategie
          typical_delta: -3
          training_weeks: 12
        - skill: SKL-AB-003   # Marktanalyse
          typical_delta: -2
          training_weeks: 6
      mitigation: "Filialleiter:innen-Programm (26 Wochen)"

    - name: "Filiale → Zentrale"
      autor_shift: "L+I → A+L"
      typical_gaps:
        - skill: SKL-TS-021   # Datenanalyse
          typical_delta: -2
          training_weeks: 8
        - skill: SKL-FM-022   # Projektmanagement
          typical_delta: -2
          training_weeks: 6
        - skill: SKL-FM-023   # Agile Methoden
          typical_delta: -3
          training_weeks: 4
      mitigation: "Cross-Functional Rotation (12 Wochen)"
