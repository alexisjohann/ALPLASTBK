# ============================================================================
# JOB PROFILES — KAUFLAND LEBENSMITTELEINZELHANDEL (LEH)
# ============================================================================
# Model:     MOD-ORG-SBO-001 v1.1
# Taxonomy:  STAX-KAUF-001 (120 Skills, 9 Domains)
# Created:   2026-02-17
# Scope:     22 Rollenprofile × 120 Skills × 5 Levels
# Matching:  Fit-Score F(p,j) = weighted skill match
# ============================================================================

metadata:
  id: JPRF-KAUF-001
  name: "Kaufland Job Profiles LEH"
  version: "1.0"
  taxonomy_ref: STAX-KAUF-001
  model_ref: MOD-ORG-SBO-001
  created: "2026-02-17"
  total_profiles: 22
  matching_algorithm: "weighted_euclidean_with_mandatory_gate"

# ============================================================================
# MATCHING ALGORITHM
# ============================================================================
matching:
  description: |
    Der Fit-Score F(p,j) berechnet die Passung zwischen Person p und Job j.

    FORMEL:
    F(p,j) = Gate(p,j) × [ w_core × S_core(p,j) + w_dev × S_dev(p,j) + w_pot × S_pot(p,j) ]

    WO:
      Gate(p,j) = 1 wenn ALLE mandatory Skills >= min_level, sonst 0
      S_core(p,j) = 1 - sqrt( Σᵢ wᵢ × (max(0, req_i - actual_i))² / Σᵢ wᵢ )
      S_dev(p,j)  = Anteil der development_skills mit actual >= 1
      S_pot(p,j)  = Lerngeschwindigkeit × Motivationsfaktor

    GEWICHTE:
      w_core = 0.60  (Kernkompetenzen)
      w_dev  = 0.25  (Entwicklungspotenzial)
      w_pot  = 0.15  (Lernpotenzial)

    INTERPRETATION:
      F >= 0.85: Excellent Fit — sofort einsetzbar
      F >= 0.70: Good Fit — mit kurzem Onboarding (<4 Wochen)
      F >= 0.55: Development Fit — mit Entwicklungsplan (3-6 Monate)
      F >= 0.40: Stretch Fit — ambitioniert, braucht Foerderung (6-12 Monate)
      F <  0.40: Gap too large — andere Rolle empfehlen

    MANDATORY GATE:
      Wenn ein Skill als mandatory: true markiert ist UND min_level definiert,
      MUSS die Person dieses Level erreichen. Sonst: F(p,j) = 0.

      Beispiel: HACCP (SKL-HS-001) auf Level 2 ist mandatory fuer alle
      Rollen mit Lebensmittelkontakt. Ohne dieses Level: kein Match.

  weights:
    core: 0.60
    development: 0.25
    potential: 0.15

  fit_thresholds:
    excellent: 0.85
    good: 0.70
    development: 0.55
    stretch: 0.40

