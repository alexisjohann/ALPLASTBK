# === KEY INSIGHT (v1.15 → v1.16) ===
# v1.15 used files_affected=100 as single threshold.
# v1.16 discovered: pattern_known is the PRIMARY dimension.
#
# Evidence:
#   - 4 TRADITIONAL tasks had >100 files (max 2323!) — ALL successful
#     → Because pattern was KNOWN (batch script runs)
#   - EXPERIMENTAL tasks with pattern=False start at just 17 files
#     → Unknown patterns are risky even at small scale
#   - lines > 2000 is the "restructuring risk" signal
#     → TL-074: only 4 files but 2500 lines → EXPERIMENTAL was correct

