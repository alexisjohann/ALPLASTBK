# Coding Mode Decision Algorithm v1.16
# Recalibrated: 2026-02-12 (66 historical tasks — ALL data)
# Key insight: pattern_known is PRIMARY dimension, not files_affected alone
# Accuracy: 63/66 (95.5%) — 3 "too cautious" (EXPERIMENTAL when TRADITIONAL OK)

version: "1.16"
calibration_date: "2026-02-12"
data_points: 66
accuracy: 0.955
misclassifications: 3  # all "too cautious" (EXPERIMENTAL when TRADITIONAL OK), zero "too aggressive"

# === DECISION THRESHOLDS (v1.16 FULL RECALIBRATION) ===
thresholds:
  # PRIMARY: Pattern familiarity determines the regime
  pattern_known:
    # When pattern is known: very high tolerance
    files_threshold: null         # No file limit! TRADITIONAL works up to 2323 files
    lines_restructuring: 2000    # Lines > 2000 suggests restructuring → EXPERIMENTAL

  pattern_unknown:
    # When pattern is unknown: much lower tolerance
    files_threshold: 15           # >15 files + unknown pattern → EXPERIMENTAL
    lines_threshold: 500          # >500 lines + unknown pattern → EXPERIMENTAL

# === DECISION LOGIC (v1.16 — 2D: pattern × scale) ===
#
#                        pattern_known=True     pattern_known=False
# files ≤ 15             TRADITIONAL            TRADITIONAL
# files 16-500           TRADITIONAL            EXPERIMENTAL
# files > 500            TRADITIONAL*           EXPERIMENTAL
#
# * Exception: EXPERIMENTAL if lines > 2000 (restructuring risk)
#
decision_tree:
  traditional:
    condition: |
      (pattern_known == true AND lines_estimated <= 2000)
      OR
      (pattern_known == false AND files_affected <= 15 AND lines_estimated <= 500)
    meaning: "Safe to execute directly — known pattern or small unknown"
    example_tasks:
      - "TL-050: 2323 files, pattern known, script run → TRADITIONAL (10 min)"
      - "TL-057: 400 files, pattern known, batch processing → TRADITIONAL (20 min)"
      - "TL-013: 79 files, pattern known → TRADITIONAL (10 min)"
      - "TL-071: 5 files, pattern known → TRADITIONAL (30 min)"

  experimental:
    condition: |
      (pattern_known == false AND (files_affected > 15 OR lines_estimated > 500))
      OR
      (lines_estimated > 2000)
    meaning: "Execute with geometric scaling: 1→10→100→all"
    example_tasks:
      - "TL-001: 1558 files, pattern unknown → EXPERIMENTAL (62 min)"
      - "TL-067: 2347 files, pattern unknown → EXPERIMENTAL (90 min)"
      - "TL-042: 172 files, pattern unknown → EXPERIMENTAL (53 min)"
      - "TL-074: 4 files, pattern known, BUT lines=2500 → EXPERIMENTAL (30 min)"

