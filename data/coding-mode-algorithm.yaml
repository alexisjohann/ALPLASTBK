# Experiment-First Coding: Entscheidungsalgorithmus
# Dieser Algorithmus kalibriert sich selbst durch Evidenz aus coding-mode-log.yaml
# Bei Tilt: Schwellenwerte senken. Bei unnötig experimentell: Schwellenwerte erhöhen.

version: 0
created: "2026-02-08"
last_updated: "2026-02-08"

# Default wenn keine Regel greift
default: EXPERIMENTAL

# Aktuelle Schwellenwerte (initial geschätzt, werden durch Evidenz kalibriert)
thresholds:
  files: 5            # >5 Dateien → EXPERIMENTAL
  lines: 500          # >500 Zeilen Output → EXPERIMENTAL
  file_size_kb: 500   # Grösste Datei >500 KB → EXPERIMENTAL

# Aktuelle Regeln (emergieren durch Log-Evidenz, ≥3 Datenpunkte nötig)
rules: []
