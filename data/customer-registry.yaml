# =============================================================================
# SCHEMA VALIDATION
# =============================================================================

schema:
  customer:
    required:
      - id          # CUS-{CODE} superkey
      - code        # Short code (2-6 chars)
      - name        # Full legal name
      - short_name  # Display name
      - type        # strategic | context | prospect
      - industry    # Industry category
      - country     # ISO 2-letter code
      - status      # active | inactive | prospect
    optional:
      - profile_path   # Path to strategic profile YAML
      - context_path   # Path to BCM2 context data
      - projects       # List of CUS-{CODE}-PRJ-{NNN} references
      - created        # Creation date
      - notes          # Free text notes

# =============================================================================
# CROSS-REFERENCES
# =============================================================================

cross_references:
  to_projects: "Project superkeys embed customer: CUS-{CODE}-PRJ-{NNN}"
  to_interventions: "Intervention superkeys embed project: CUS-{CODE}-PRJ-{NNN}-INT-{NN}"
  to_sessions: "Sessions reference customer via customer_ref attribute"
  specification: "Appendix BN REF-SUPERKEY"

