# API REGISTRY - External Service Integrations
# =============================================================================
# SuperKey Format: API-{CATEGORY}-{SEQ}
# Categories:
#   BIB  - Bibliography (CrossRef, OpenAlex, Semantic Scholar)
#   CTX  - Context Data (BFS, ESS, WVS, etc.) - BCM2 integrations
#   VAL  - Validation (ORCID, DOI.org)
#
# This registry tracks all external API integrations in the EBF framework.
# =============================================================================

