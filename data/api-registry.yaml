# =============================================================================
# API REGISTRY - External Service Integrations
# =============================================================================
# SuperKey Format: API-{CATEGORY}-{SEQ}
# Categories:
#   BIB  - Bibliography (CrossRef, OpenAlex, Semantic Scholar)
#   CTX  - Context Data (BFS, ESS, WVS, etc.) - BCM2 integrations
#   VAL  - Validation (ORCID, DOI.org)
#
# This registry tracks all external API integrations in the EBF framework.
# =============================================================================

metadata:
  version: "2.0"
  last_updated: "2026-02-18"
  maintainer: "EBF Team"
  appendix_ref: "BM (METHOD-API)"

# =============================================================================
# SUMMARY STATISTICS
# =============================================================================
summary:
  total_apis: 90
  by_category:
    BIB: 5
    CTX: 84
    VAL: 1
  by_status:
    ACTIVE: 3       # CrossRef, OpenAlex, MPG PuRe
    DOCUMENTED: 84  # In BCM2, not yet GitHub Action
    PLANNED: 3      # Semantic Scholar, DOI.org, ORCID

# =============================================================================
# BIBLIOGRAPHY APIs (BIB)
# =============================================================================
bibliography_apis:
  - id: API-BIB-001
    name: CrossRef
    category: BIB
    description: "DOI metadata lookup for academic publications (primary source)"
    status: ACTIVE
    endpoint:
      base_url: "https://api.crossref.org"
      works_endpoint: "/works"
      docs_url: "https://api.crossref.org/swagger-ui/index.html"
    authentication:
      type: none
      polite_pool: true
      user_agent_required: true
      user_agent_format: "EBF-Research (mailto:research@fehradvice.com)"
    rate_limits:
      requests_per_second: 50
      our_delay_ms: 500
      polite_pool_bonus: "faster responses with User-Agent email"

    # Query Parameters
    query_params:
      search:
        - query           # Full-text search
        - query.title     # Title search
        - query.author    # Author search
        - query.affiliation
        - query.bibliographic
      filters:
        - type            # e.g., "journal-article", "posted-content"
        - from-pub-date   # YYYY-MM-DD
        - until-pub-date  # YYYY-MM-DD
        - prefix          # DOI prefix, e.g., "10.3386" for NBER
        - publisher-name
        - issn
        - container-title
      pagination:
        rows: 20           # Default, max 1000
        offset: 0          # For small sets
        cursor: "*"        # For large sets (preferred)
        cursor_note: "Use cursor=* for pagination, then use next-cursor from response"

    # DOI Patterns for specific publishers
    doi_patterns:
      NBER:
        prefix: "10.3386"
        format: "10.3386/wXXXXX"
        example: "10.3386/w12345"
        coverage: "Almost all NBER Working Papers have DOIs"
      SSRN:
        prefix: "10.2139"
        format: "10.2139/ssrn.XXXXXXX"
        example: "10.2139/ssrn.1234567"
        coverage: "Many but not all SSRN papers (Elsevier DOIs)"
        note: "If no DOI, paper cannot be found via Crossref"
      AER:
        prefix: "10.1257"
        format: "10.1257/aer.XXXXXXX"
      ECONOMETRICA:
        prefix: "10.3982"
        format: "10.3982/ECTA"

    # Usage examples
    usage_examples:
      - name: "Get paper by DOI"
        url: "https://api.crossref.org/works/10.3386/w12345"
        method: GET
      - name: "Search by title"
        url: "https://api.crossref.org/works?query.title=prospect+theory"
        method: GET
      - name: "All NBER papers from 2024"
        url: "https://api.crossref.org/works?filter=prefix:10.3386,from-pub-date:2024-01-01&cursor=*"
        method: GET
      - name: "Search by author"
        url: "https://api.crossref.org/works?query.author=Kahneman&rows=50"
        method: GET

    # Error handling
    error_handling:
      no_doi_found: "Explicitly state: 'Kein DOI → nicht über Crossref auffindbar'"
      fallback_apis:
        - OpenAlex
        - Semantic Scholar
        - Google Scholar (manual)
      no_hallucination: "NEVER invent DOIs. If not found, say so."

    # Integration
    github_action:
      workflow: ".github/workflows/doi-lookup-batch.yml"
    scripts:
      - "scripts/lookup_paper_dois.py"
      - "scripts/batch_doi_by_journal.py"

    metrics:
      first_used: "2026-01-27"
      papers_resolved: 0  # TODO: track

  - id: API-BIB-002
    name: OpenAlex
    category: BIB
    description: "Open catalog of scholarly papers, authors, institutions. Primary source for abstracts and author disambiguation."
    status: ACTIVE
    endpoint:
      base_url: "https://api.openalex.org"
      works_endpoint: "/works"
      authors_endpoint: "/authors"
      docs_url: "https://docs.openalex.org"
    authentication:
      type: none
      polite_pool: true
      user_agent_required: true
      user_agent_format: "EBF-Framework/1.0 (mailto:research@fehradvice.com)"
      note: "Polite pool gives ~10 req/sec. Without mailto: only ~1 req/sec."

    rate_limits:
      polite_pool_rps: 10          # With mailto: User-Agent header
      unpolite_rps: 1              # Without mailto: header (10x slower!)
      our_delay_ms: 120            # 0.12s = ~8 req/sec (safety margin)
      workflow_delay_ms: 150       # GitHub Actions uses 0.15s
      http_429_handling: "exponential_backoff"
      backoff_sequence_s: [2, 4, 8]
      max_retries: 2
      note: "No API key required. Polite pool = 10x faster with mailto: header."

    # Time estimation formula
    time_estimation:
      formula: "T = N_papers × delay_s + overhead_s"
      overhead_s: 60               # Setup, checkout, commit, push
      per_paper_s: 0.15            # Conservative (polite pool)
      examples:
        - papers: 100
          estimated_s: 75
          note: "100 × 0.15 + 60 = 75s ≈ 1.5 min"
        - papers: 500
          estimated_s: 135
          note: "500 × 0.15 + 60 = 135s ≈ 2.5 min"
        - papers: 2000
          estimated_s: 360
          note: "2000 × 0.15 + 60 = 360s ≈ 6 min"
        - papers: 10000
          estimated_s: 1560
          note: "10000 × 0.15 + 60 = 1560s ≈ 26 min (watch for 429s)"
      measured_runs:
        - date: "2026-02-18"
          papers: 531
          actual_s: 540
          note: "Sutter import: ~9 min total (fetch + dedup + abstract)"
        - date: "2026-02-18"
          papers: 334
          actual_s: 480
          note: "Abstract enrichment workflow: ~8 min for 334 abstracts"

    query_params:
      search:
        - search                   # Full-text search
        - filter                   # Structured filters
        - select                   # Field selection (reduces response size)
      filters:
        - authorships.author.id    # OpenAlex author ID
        - authorships.author.orcid # ORCID filter
        - doi                      # DOI lookup
        - publication_year         # Year filter
        - type                     # article, book-chapter, etc.
      pagination:
        per_page: 200              # Default 25, max 200
        cursor: "*"                # For large result sets
      special:
        - "select=abstract_inverted_index,title"  # Abstract-only query (fast)

    # Abstract format
    abstract_format:
      type: "inverted_index"
      description: "Abstracts stored as {word: [position1, position2, ...]}. Must be reconstructed."
      reconstruction: "Sort by position, join words with spaces"
      coverage: "~70% of papers have abstracts"

    error_handling:
      http_404: "Paper not found (DOI not in OpenAlex)"
      http_429: "Rate limited - exponential backoff (2s, 4s, 8s)"
      no_abstract: "Paper exists but abstract_inverted_index is null (~30% of papers)"
      fallback_apis:
        - Semantic Scholar
        - CrossRef (metadata only, no abstracts)

    github_action:
      workflow: ".github/workflows/abstract-enrichment.yml"
      workflow_new: ".github/workflows/enrich-paper-abstracts.yml"
    scripts:
      - "scripts/enrich_papers_abstracts.py"
      - "scripts/fetch_mpg_pure_papers.py"     # Uses OpenAlex for abstracts + dedup

    metrics:
      first_used: "2026-02-18"
      abstracts_fetched: 334       # Sutter import run
      papers_deduplicated: 205     # Via OpenAlex title matching

  - id: API-BIB-005
    name: MPG PuRe (Max Planck Publication Repository)
    category: BIB
    description: "Publication repository for Max Planck researchers. REST API for fetching complete publication lists by person ID or ORCID."
    status: ACTIVE
    endpoint:
      base_url: "https://pure.mpg.de/rest"
      search_endpoint: "/items/search"
      docs_url: "https://colab.mpdl.mpg.de/mediawiki/PubMan_REST_API_Documentation"
    authentication:
      type: none
      note: "Public API, no authentication required"

    rate_limits:
      documented_limit: null       # No documented rate limit
      our_delay_ms: 500            # 0.5s between paginated requests
      pagination_size: 25          # Items per page (API default)
      note: "Conservative delay. No documented limit but we respect the server."

    time_estimation:
      formula: "T = ceil(N_papers / 25) × 0.5s + N_doi × 0.12s + overhead"
      overhead_s: 60
      components:
        pagination_delay_s: 0.5    # Between pages
        abstract_delay_s: 0.12     # OpenAlex abstract fetch per paper
        items_per_page: 25
      examples:
        - papers: 100
          pages: 4
          with_abstract: true
          estimated_s: 74
          note: "4×0.5 + 70×0.12 + 60 = 70.4s ≈ 1 min"
        - papers: 500
          pages: 20
          with_abstract: true
          estimated_s: 112
          note: "20×0.5 + 350×0.12 + 60 = 112s ≈ 2 min"
        - papers: 2000
          pages: 80
          with_abstract: true
          estimated_s: 268
          note: "80×0.5 + 1400×0.12 + 60 = 268s ≈ 4.5 min"
      measured_runs:
        - date: "2026-02-18"
          researcher: "Matthias Sutter"
          person_id: "persons206813"
          papers_fetched: 531
          after_dedup: 367
          actual_s: 540
          note: "Full pipeline: fetch + self-dedup + abstract + BibTeX generation"

    query_params:
      search_by:
        - person_id: "e.g., persons206813 (PuRe internal ID)"
        - orcid: "e.g., 0000-0002-6143-8406"
        - author_name: "e.g., Sutter (last name search)"
      pagination:
        size: 25                   # Per page
        offset: 0                  # Starting position
      response_format: "json"

    error_handling:
      no_person_id: "Use ORCID or author name search as fallback"
      empty_results: "Verify person_id on pure.mpg.de website"
      timeout: "15s per request, 3 retries"

    github_action:
      workflow: ".github/workflows/fetch-mpg-papers.yml"
    scripts:
      - "scripts/fetch_mpg_pure_papers.py"

    metrics:
      first_used: "2026-02-18"
      researchers_fetched: 1       # Sutter
      papers_fetched: 531
      unique_after_dedup: 367

