# =============================================================================
# BIBLIOGRAPHY APIs (BIB)
# =============================================================================
bibliography_apis:
  - id: API-BIB-001
    name: CrossRef
    category: BIB
    description: "DOI metadata lookup for academic publications (primary source)"
    status: ACTIVE
    endpoint:
      base_url: "https://api.crossref.org"
      works_endpoint: "/works"
      docs_url: "https://api.crossref.org/swagger-ui/index.html"
    authentication:
      type: none
      polite_pool: true
      user_agent_required: true
      user_agent_format: "EBF-Research (mailto:research@fehradvice.com)"
    rate_limits:
      requests_per_second: 50
      our_delay_ms: 500
      polite_pool_bonus: "faster responses with User-Agent email"

    # Query Parameters
    query_params:
      search:
        - query           # Full-text search
        - query.title     # Title search
        - query.author    # Author search
        - query.affiliation
        - query.bibliographic
      filters:
        - type            # e.g., "journal-article", "posted-content"
        - from-pub-date   # YYYY-MM-DD
        - until-pub-date  # YYYY-MM-DD
        - prefix          # DOI prefix, e.g., "10.3386" for NBER
        - publisher-name
        - issn
        - container-title
      pagination:
        rows: 20           # Default, max 1000
        offset: 0          # For small sets
        cursor: "*"        # For large sets (preferred)
        cursor_note: "Use cursor=* for pagination, then use next-cursor from response"

    # DOI Patterns for specific publishers
    doi_patterns:
      NBER:
        prefix: "10.3386"
        format: "10.3386/wXXXXX"
        example: "10.3386/w12345"
        coverage: "Almost all NBER Working Papers have DOIs"
      SSRN:
        prefix: "10.2139"
        format: "10.2139/ssrn.XXXXXXX"
        example: "10.2139/ssrn.1234567"
        coverage: "Many but not all SSRN papers (Elsevier DOIs)"
        note: "If no DOI, paper cannot be found via Crossref"
      AER:
        prefix: "10.1257"
        format: "10.1257/aer.XXXXXXX"
      ECONOMETRICA:
        prefix: "10.3982"
        format: "10.3982/ECTA"

    # Usage examples
    usage_examples:
      - name: "Get paper by DOI"
        url: "https://api.crossref.org/works/10.3386/w12345"
        method: GET
      - name: "Search by title"
        url: "https://api.crossref.org/works?query.title=prospect+theory"
        method: GET
      - name: "All NBER papers from 2024"
        url: "https://api.crossref.org/works?filter=prefix:10.3386,from-pub-date:2024-01-01&cursor=*"
        method: GET
      - name: "Search by author"
        url: "https://api.crossref.org/works?query.author=Kahneman&rows=50"
        method: GET

    # Error handling
    error_handling:
      no_doi_found: "Explicitly state: 'Kein DOI → nicht über Crossref auffindbar'"
      fallback_apis:
        - OpenAlex
        - Semantic Scholar
        - Google Scholar (manual)
      no_hallucination: "NEVER invent DOIs. If not found, say so."

    # Integration
    github_action:
      workflow: ".github/workflows/doi-lookup-batch.yml"
    scripts:
      - "scripts/lookup_paper_dois.py"
      - "scripts/batch_doi_by_journal.py"

    metrics:
      first_used: "2026-01-27"
      papers_resolved: 0  # TODO: track

  - id: API-BIB-002
    name: OpenAlex
    category: BIB
    description: "Open catalog of scholarly papers, authors, institutions"
    status: PLANNED
    endpoint:
      base_url: "https://api.openalex.org"
      docs_url: "https://docs.openalex.org"

  - id: API-BIB-003
    name: Semantic Scholar
    category: BIB
    description: "AI-powered academic search with paper embeddings"
    status: PLANNED
    endpoint:
      base_url: "https://api.semanticscholar.org"

  - id: API-BIB-004
    name: DOI.org
    category: BIB
    description: "DOI resolution and validation"
    status: PLANNED
    endpoint:
      base_url: "https://doi.org"

