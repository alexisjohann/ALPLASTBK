# =============================================================================
# FILE STORAGE APIs (FST) - Cloud File Access
# =============================================================================
file_storage_apis:
  - id: API-FST-001
    name: Google Drive
    category: FST
    description: "Cloud file storage. Download PDFs, documents, spreadsheets via gdown. Used for journal volumes, shared papers, project documents."
    status: ACTIVE
    endpoint:
      base_url: "https://drive.google.com"
      download_url: "https://drive.google.com/uc?export=download&id={FILE_ID}"
      api_url: "https://www.googleapis.com/drive/v3"
      docs_url: "https://developers.google.com/drive/api/reference/rest/v3"
    authentication:
      type: none
      note: "Public sharing required ('Anyone with the link'). No OAuth needed for public files."
    rate_limits:
      documented_limit: null
      our_delay_ms: 0
      note: "Single file downloads, no rate limiting concern"

    github_action:
      workflow: ".github/workflows/fetch-google-drive.yml"
      trigger_file: "data/drive-fetch-trigger.yaml"
    scripts:
      - "scripts/fetch_google_drive.py"
    cli:
      download: "bash scripts/api.sh drive download <FILE_ID> [name]"
      split: "bash scripts/api.sh drive split <FILE_ID> [name]"

    capabilities:
      - "PDF download with large file handling (gdown)"
      - "PDF to text conversion (pdftotext)"
      - "Journal volume splitting into individual papers"
      - "Auto-commit results to repository"
      - "Push-trigger (token-free) via trigger YAML"

    metrics:
      first_used: "2026-02-19"
      files_fetched: 0

