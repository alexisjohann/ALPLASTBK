# =============================================================================
# LEARNED PATTERNS
# =============================================================================
patterns:
  # File type patterns discovered during migration
  file_patterns:
    - pattern: "\\citep{KEY}"
      file_type: ".tex"
      description: "LaTeX citation with parentheses"
      count: 0

    - pattern: "\\citet{KEY}"
      file_type: ".tex"
      description: "LaTeX citation with text"
      count: 0

    - pattern: "bib_keys: [KEY]"
      file_type: ".yaml"
      description: "YAML bibliography key list"
      count: 0

    - pattern: "- id: KEY"
      file_type: ".yaml"
      description: "YAML paper ID reference"
      count: 0

    - pattern: "theory_support: KEY"
      file_type: ".yaml"
      description: "Theory catalog support reference"
      count: 0

  # Edge cases discovered
  edge_cases: []

  # Files that commonly contain paper references
  hot_files:
    - path: "data/paper-sources.yaml"
      typical_refs: 50
    - path: "data/theory-catalog.yaml"
      typical_refs: 30
    - path: "appendices/*_LIT-*.tex"
      typical_refs: 100

