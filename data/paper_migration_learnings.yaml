# =============================================================================
# RULES DERIVED FROM LEARNINGS
# =============================================================================
derived_rules:
  # Rules automatically derived from successful migrations
  - rule: "VALIDATE_FIRST"
    description: "Always verify DOI/URL before migration"
    confidence: 1.0

  - rule: "CHECK_ORPHANS"
    description: "After migration, grep for old key to find orphans"
    confidence: 1.0

  - rule: "START_SIMPLE"
    description: "Migrate papers with 0 references first"
    confidence: 1.0

  - rule: "BATCH_ZERO_REFS"
    description: "Papers with 0 references and DOI can be batch-migrated"
    confidence: 1.0
    applied: "2026-01-26"
    result: "18 papers migrated successfully"

