    - context_framing
    - NK_landscape
    - Wason_task
    - situated_cognition
    - ecological_rationality
    - explore_exploit
    - STEM_skills
    - learning_rate

    insight: |
      The same strategic information presented in different frames (abstract vs
      contextual) yields different performance and learning trajectories. Context
      aids immediate comprehension via familiar schemas (Wason effect), while
      abstraction fosters transferable pattern recognition that develops through
      repeated exposure. STEM skills moderate which framing is optimal.

    implication: |
      Executive education should alternate between context-rich cases (for
      immediate comprehension) and abstraction exercises (for pattern transfer).
      Individual STEM backgrounds should inform pedagogical approach. The
      trade-off between immediate performance and learning rate is a key
      design consideration for training programs.

    formulas:
    - name: Performance by Framing
      formula: P(framing, STEM) = P_base + β_framing × I_context + β_STEM × STEM + γ × I_context × STEM
      variables:
        P_base: baseline performance
        β_framing: context advantage (positive)
        β_STEM: STEM main effect
        γ: framing × STEM interaction (negative - reversal)
        I_context: indicator for context condition

    - name: Learning Rate
      formula: ΔP_t = α × (1 - P_{t-1}) + λ_framing × I_abstract
      variables:
        ΔP_t: performance improvement at time t
        α: baseline learning rate
        λ_framing: additional learning in abstract condition
        I_abstract: indicator for abstract condition

    references:
