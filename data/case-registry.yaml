          │  └─────────────────────────────────────────────────────┘   │
          └─────────────────────────────────────────────────────────────┘

          UMKEHRUNG (by 1911):
          Slower In-Migration + Rising Local Population Growth
          → Working Class Distance ↓
          → Urban Areas become Labour Strongholds

      WHEN:
        psi_dominant: regional_cultural_heterogeneity
        temporal_scope: "Early 20th century Britain (1900-1911)"
