      Beschäftigungszunahme. Dies deutet auf technologischen Wandel hin, der
      kapitalintensive statt arbeitsintensive Skalierung ermöglicht.

    implication: |
      1. Antitrust-Politik: Konzentrationstrends sind strukturell, nicht
         konjunkturell - erfordert langfristige Perspektive.
      2. Arbeitsmarkt: "Scale without workers" verändert Lohnverhandlungsmacht
         und Arbeitsmarktdynamik fundamental.
      3. Produktivitätsmessung: Traditionelle Metriken unterschätzen möglicherweise
         die Marktmacht grosser Firmen.
      4. Cross-Country: Ähnliche Trends in verschiedenen institutionellen
         Kontexten deuten auf universelle Treiber hin.

    formulas:
      - name: "Konzentrationsmass (Top-N Anteil)"
        formula: "CR_n = Σᵢ₌₁ⁿ sᵢ"
        variables:
          CR_n: "Concentration Ratio der n grössten Firmen"
          s_i: "Marktanteil von Firma i"

      - name: "Herfindahl-Hirschman Index"
        formula: "HHI = Σᵢ sᵢ²"
        variables:
          HHI: "Konzentrationsindex (0-10000)"
          s_i: "Marktanteil in Prozent"

