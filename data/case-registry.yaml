  CAS-856:
    superkey: consulting:productivity:firm_performance:belgium:vat_data:did
    name: "Management Consulting und Produktivitätseffekte (Belgien 2002-2023)"

    10C:
      WHO:
        levels: [firm, industry]
        segments: [large_firms, high_productivity_firms, low_performers, high_performers]
        primary_level: firm
        description: "Belgische Firmen mit Consulting-Engagements (U-förmige Selektion: hohe UND niedrige Performer)"

      WHAT:
        utility_dimensions:
          productivity: "Labor productivity (+3.6% über 5 Jahre)"
          wages: "Durchschnittslöhne (+2.7%)"
          labor_share: "Stabil (kein Rent-Shifting)"
          revenue: "Stabil oder wachsend"
        C_ij:
          productivity_gains: "+3.6% (5yr)"
          wage_gains: "+2.7%"
          employment: "modest reduction"
          labor_share: "stable"

      HOW:
        gamma_avg: null
        interaction: "Consulting × Firm Performance"
        mechanism: "Productivity-enhancing (NOT rent-shifting)"
        heterogeneity: "Grössere Gains für weniger produktive Firmen"

      WHEN:
        psi_dominant: organizational_institutional
        temporal_scope: "2002-2023 (21 Jahre)"
        engagement_duration: "<1 Jahr (episodisch)"
        geographic_scope: "Belgien"
        T_constraint: "Sharp consulting events for DiD"

      WHERE:
        data_sources: "Universal VAT B2B transaction data"
        countries: ["Belgium"]
        parameter_source: "PAP-bijnens2025consulting"
        data_quality: "Administrative, universal coverage"

      AWARE:
        awareness_type: "Firm decision-makers"
        salience: "Episodic, deliberate consulting engagement"

      READY:
        applicability: "Organizational economics, Management practice"
        action_relevance: "Consulting as productivity intervention"
        W_level: "Firm-level decision to hire consultants"

      STAGE:
        phenomenon_stage: "Post-engagement outcomes (5yr horizon)"
        intervention_window: "Consulting engagement as intervention"

    domain: organizational_economics
    subdomain: management_consulting

    key_finding: |
      Erste umfassende empirische Studie zu Management Consulting:

      1. SELEKTION: U-förmig - sowohl High- als auch Low-Performer
         engagieren Consultants (konzentriert bei grossen Firmen)

      2. KOSTEN: 3% der Lohnsumme, episodisch (<1 Jahr)

      3. EFFEKTE (DiD über 5 Jahre):
         - Labor Productivity: +3.6%
         - Löhne: +2.7%
         - Labor Share: STABIL (kein Rent-Shifting!)
         - Beschäftigung: modest reduction
         - Umsatz: stabil/wachsend

      4. HETEROGENITÄT: Grössere Produktivitätsgewinne für
         initial weniger produktive Firmen → Allocative Efficiency

      5. VALIDIERUNG: Unterstützt "productivity-enhancing view",
         NICHT "rent-shifting view"

    ebf_relevance:
      - WHO: Firmen als Akteure mit heterogener Selektion (U-shaped)
      - HOW: Consulting als Mechanismus für Produktivitätssteigerung
      - WHEN: Episodische Interventionen mit langfristigen Effekten
      - implications_for_behavior: "Consulting = legitimate productivity tool, not rent extraction"

    domains:
      - organizational_economics
      - management_consulting
      - labor_economics
      - productivity
      - firm_dynamics

    tags:
      - management_consulting
      - productivity
      - wages
      - labor_share
      - difference_in_differences
      - Belgium
      - VAT_data
      - firm_performance
      - organizational_restructuring
      - allocative_efficiency

    insight: |
      Management Consulting ist ein PRODUKTIVITÄTS-INSTRUMENT, kein
      Rent-Shifting Mechanismus. Die Daten widerlegen die skeptische
      akademische Sicht: Produktivitätsgewinne kommen NICHT auf Kosten
      der Arbeiter (stabile Labor Share, steigende Löhne).

      Besonders interessant: Grössere Gewinne für weniger produktive
      Firmen suggeriert, dass Consulting zur ALLOCATIVEN EFFIZIENZ
      beiträgt - es hilft Firmen, zu "Best Practice" aufzuschliessen.

    implication: |
      1. POLICY: Consulting-Skeptizismus unter Ökonomen ist empirisch
         nicht gerechtfertigt - Produktivitätsgewinne sind real.

      2. LABOR: Keine Evidenz für Worker-Schädigung - Löhne steigen,
         Labor Share bleibt stabil.

      3. FIRM STRATEGY: Consulting besonders wertvoll für
         unterdurchschnittlich produktive Firmen (Catch-up Potential).

      4. EBF-MODELLIERUNG: Consulting als exogener Produktivitäts-Shock
         modellierbar (3.6% über 5 Jahre als Benchmark).

      5. INTERVENTION DESIGN: Episodische, kurze Interventionen (<1yr)
         können langfristige Effekte haben (5yr+).

    formulas:
      - name: "Consulting Spend Ratio"
        formula: "CSR = Consulting_Cost / Payroll ≈ 0.03"
        variables:
          CSR: "Consulting Spend Ratio"
          Consulting_Cost: "Jährliche Consulting-Ausgaben"
          Payroll: "Jährliche Lohnsumme"

      - name: "Productivity Effect (DiD)"
        formula: "Δln(Y/L) = β₁ × Post_Consulting + controls"
        variables:
          beta_1: "Treatment effect ≈ +0.036 (3.6%)"
          Post_Consulting: "Indikator für Post-Engagement Periode"
          Y_L: "Labor Productivity (Output/Worker)"

    parameters:
      - id: PAR-CON-001
        symbol: CSR
        value: 0.03
        unit: "ratio"
        source: "PAP-bijnens2025consulting"
        note: "Consulting = 3% der Lohnsumme"
      - id: PAR-CON-002
        symbol: Δ_productivity
        value: 0.036
        unit: "log points (5yr)"
        source: "PAP-bijnens2025consulting"
        note: "+3.6% Labor Productivity über 5 Jahre"
      - id: PAR-CON-003
        symbol: Δ_wages
        value: 0.027
        unit: "log points"
        source: "PAP-bijnens2025consulting"
        note: "+2.7% Durchschnittslöhne"
      - id: PAR-CON-004
        symbol: engagement_duration
        value: "<1"
        unit: "Jahre"
        source: "PAP-bijnens2025consulting"
        note: "Typische Engagement-Dauer"

    references:
      appendices:
        - AAA  # CORE-WHO (Firms as actors)
        - B    # CORE-HOW (Interaction mechanisms)
        - AH   # DOMAIN-CONSULTING
      chapters:
        - 14   # Market/Firm applications
        - 17   # Interventions
      cases:
