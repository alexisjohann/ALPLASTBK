  CAS-857:
    superkey: theory:cognitive_division:babbage:exploration_exploitation:ai_adoption
    name: "Babbage-Modell der kognitiven Arbeitsteilung (Gans 2025)"
    type: theoretical_model

    10C:
      WHO:
        levels: [individual, team, firm]
        segments: [routine_workers, experts, managers]
        primary_level: firm
        description: "Firmen mit kognitiver Arbeitsteilung: Routine-Arbeiter (Interpolation) vs Experten (Tacit Knowledge)"

      WHAT:
        utility_dimensions:
          knowledge_base: "Endogene Wissensbasis (Knowledge Points)"
          performance: "Organisational Performance (S-shaped oder konkav)"
          efficiency: "Interpolation Precision vs Expert Cost"
        C_ij:
          routine_expert_complementarity: "Routine interpoliert zwischen Expert-created Knowledge Points"
          exploration_exploitation: "Manager wählt zwischen Current Issues (Exploitation) und Research (Exploration)"

      HOW:
        gamma_avg: null
        interaction: "Routine × Expert × Knowledge Base"
        mechanism: |
          1. Routine Workers: Interpolieren zwischen gelösten Problemen (Codified Knowledge)
          2. Experts: Tacit Knowledge - können Current Issues lösen ODER Research betreiben
          3. Manager: Optimiert Exploration-Exploitation Tradeoff
          4. Knowledge Base: Wächst endogen durch Expert Research

      WHEN:
        psi_dominant: temporal_organizational
        temporal_scope: "Dynamisches Modell mit Phasen"
        phases:
          - phase_1: "Expansion - Distant Knowledge Points hinzufügen"
          - phase_2: "Refinement - Gaps zwischen Anchors füllen"
        trajectory: "S-shaped ODER konkav (je nach Parametern)"

      WHERE:
        data_sources: "Theoretisches Modell (keine Empirie)"
        applicability: "Knowledge-intensive Firmen, AI-adoptierende Organisationen"
        parameter_source: "PAP-gans2025babbage"

      AWARE:
        awareness_type: "Manager Decision-Making"
        salience: "Explizite Wahl zwischen Exploration und Exploitation"

      READY:
        applicability: "AI Adoption Decisions, Organizational Design"
        action_relevance: "Welche AI-Technologie adoptieren?"

      STAGE:
        phenomenon_stage: "Organizational Learning Trajectory"
        intervention_window: "AI Adoption als Regime-Shift"
        trajectory_types:
          - "S-shaped: Expansion → Inflection → Refinement → Maturity"
          - "Concave: Diminishing returns from start"

    domain: organizational_economics
    subdomain: knowledge_management
    type: theoretical_model

    key_finding: |
      THEORETISCHES MODELL der kognitiven Arbeitsteilung in Firmen:

      1. ZWEI ARBEITERTYPEN:
         - Routine Workers: Interpolieren zwischen codified knowledge points
         - Experts: Tacit knowledge, können Research oder Current Issues bearbeiten

      2. ORGANISATIONSDYNAMIK:
         - Phase 1 (Expansion): Distant knowledge points hinzufügen
         - Phase 2 (Refinement): Gaps zwischen bestehenden Anchors füllen
         - Trajectory: S-shaped ODER konkav (parametrisch bestimmt)

      3. AI-TYPOLOGIE MIT GEGENLÄUFIGEN EFFEKTEN:

         ┌─────────────────────────────────────────────────────────────┐
         │  INTERPOLATION AI          │  APPLICATION AI               │
         │  (bessere Routine)         │  (billigere Experten)         │
         ├─────────────────────────────────────────────────────────────┤
         │  → ↑ Value of Exploration  │  → ↓ Research Investment      │
         │  → ↑ Routinization Speed   │  → Crowding-out of Research   │
         │  → Hastens Knowledge       │  → Substitutes for Experts    │
         │    Codification            │                               │
         └─────────────────────────────────────────────────────────────┘

         OPPOSITE COMPARATIVE STATICS!

    ebf_relevance:
      - HOW: Complementarity zwischen Routine und Expert (γ > 0)
      - WHEN: Temporal dynamics (Expansion → Refinement)
      - STAGE: S-shaped organizational learning trajectory
      - AWARE: Manager's conscious exploration-exploitation choice
      - implications_for_behavior: "AI type determines organizational learning path"

    domains:
      - organizational_economics
      - knowledge_management
      - artificial_intelligence
      - labor_economics
      - theory_of_the_firm

    tags:
      - division_of_labour
      - babbage
      - knowledge_codification
      - tacit_knowledge
      - exploration_exploitation
      - organizational_dynamics
      - artificial_intelligence
      - interpolation
      - routine_workers
      - experts
      - S_shaped_growth
      - theoretical_model

    insight: |
      Gans' Babbage-Modell liefert eine KRITISCHE EINSICHT für AI-Adoption:

      Die zwei AI-Typen haben GEGENLÄUFIGE Effekte auf organisationales Lernen!

      - Interpolation AI (z.B. bessere Suche, Pattern Matching):
        → Macht Routine-Arbeit wertvoller
        → ERHÖHT den Wert von Expert Research (mehr zu interpolieren!)
        → Beschleunigt Routinisierung

      - Application AI (z.B. Expert Systems, Decision Support):
        → Macht Experten billiger
        → VERDRÄNGT Research Investment
        → Kann langfristig Wissensaufbau schaden

      Dies erklärt das "AI Productivity Paradox": Falsche AI-Typ-Wahl
      kann Exploration verdrängen und langfristige Innovation hemmen.

    implication: |
      1. AI ADOPTION STRATEGY: Firmen sollten AI-Typ basierend auf
         ihrer Exploration-Exploitation Balance wählen:
         - Knowledge-building Phase → Interpolation AI bevorzugen
         - Mature Phase → Application AI akzeptabler

      2. ORGANIZATIONAL DESIGN: Das Modell erklärt, warum manche
         Firmen trotz AI-Adoption nicht produktiver werden:
         Application AI kann Research verdrängen.

      3. EBF-MODELLIERUNG: Cognitive Division of Labor als neuer
         Mechanismus für HOW (Complementarity γ zwischen Worker Types).

      4. POLICY: AI-Förderung sollte zwischen AI-Typen differenzieren -
         nicht alle AI ist gleich für organisationales Lernen.

      5. PREDICTIONS (testbar):
         - Firmen mit Interpolation AI sollten MEHR in Expert Research investieren
         - Firmen mit Application AI sollten WENIGER Research zeigen

    formulas:
      - name: "Routine Worker Interpolation"
        formula: "q_routine = f(d(question, nearest_knowledge_points))"
        variables:
          q_routine: "Quality of routine answer"
          d: "Distance to nearest solved problems"
          knowledge_points: "Expert-created knowledge anchors"

      - name: "Exploration-Exploitation Tradeoff"
        formula: "max V = E[Σ δᵗ π(K_t)] s.t. K_{t+1} = K_t + research_t"
        variables:
          V: "Firm value"
          K_t: "Knowledge base at time t"
          delta: "Discount factor"
          pi: "Per-period profit"
          research_t: "Expert time allocated to research"

      - name: "AI Comparative Statics"
        formula: |
          ∂(Exploration)/∂(Interpolation_AI) > 0
          ∂(Exploration)/∂(Application_AI) < 0
        variables:
          Interpolation_AI: "Precision of routine interpolation"
          Application_AI: "Cost reduction for expert operations"

    parameters:
      - id: PAR-BAB-001
        symbol: interpolation_precision
        description: "How well routine workers interpolate between knowledge points"
        effect: "↑ precision → ↑ value of exploration"
        source: "PAP-gans2025babbage"
      - id: PAR-BAB-002
        symbol: expert_cost
        description: "Cost of expert operations"
        effect: "↓ cost → ↓ research investment (crowding out)"
        source: "PAP-gans2025babbage"
      - id: PAR-BAB-003
        symbol: trajectory_shape
        values: ["S-shaped", "concave"]
        description: "Shape of organizational performance trajectory"
        source: "PAP-gans2025babbage"

    references:
      appendices:
        - B     # CORE-HOW (Complementarity)
        - V     # CORE-WHEN (Temporal dynamics)
        - AW    # CORE-STAGE (Organizational trajectory)
        - AH    # DOMAIN-CONSULTING (related organizational interventions)
      chapters:
        - 6     # HOW: Complementarity
        - 9     # WHEN: Context and timing
        - 18    # Intervention timing and phases
      cases:
        - CAS-856  # Consulting effects (empirical complement)
      literature:
        - PAP-gans2025babbage
        - PAP-march1991exploration  # Foundational exploration-exploitation

    source_paper: "PAP-gans2025babbage"
    created_in_session: "EBF-S-2026-01-28-ORG-002"

