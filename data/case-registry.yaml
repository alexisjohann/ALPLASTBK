  # ===========================================================================
  # TIME ALLOCATION & PLATFORM ECONOMICS (CAT-17)
  # ===========================================================================
  
  CAS-853:
    superkey: digital:platform:time_allocation:substitution:facebook_instagram:antitrust
    name: Facebook-Instagram Zeit-Substitution
    description: |
      Field Experiment zur Messung der Substitution zwischen Facebook und Instagram
      basierend auf Becker's Time Allocation Theory. Nutzer substituieren stark
      zwischen Plattformen mit ähnlichen Zeit-Anteilen (s_T ≈ 1 bei beiden).
      Niedrige Ad-Load-Elastizität zeigt Marktmacht der Plattformen.
      
    10C:
      WHO:
        levels:
          - individual
          - market
        heterogeneity: medium
        segments:
          - social_media_users
          - young_adults
          - digital_natives
      WHAT:
        dimensions:
          - E  # Entertainment utility
          - S  # Social utility
        primary: attention_allocation
      HOW:
        gamma_avg: 0.65
        interaction: substitutes
        note: "Hohe Diversion Ratio zwischen FB und IG"
      WHEN:
        psi_dominant: time_constraint
        temporal: continuous
        T_constraint: binding
      WHERE:
        source: field_experiment
        confidence: high
        N: "> 10,000"
      AWARE:
        A_level: 0.4
        awareness_type: implicit
        note: "User nicht bewusst über Zeit-Opportunitätskosten"
      READY:
        W_level: 0.8
        theta: low
        note: "Geringe Wechselbarrieren zwischen Plattformen"
      STAGE:
        phase: habitual
        stability: medium
      HIERARCHY:
        primary_level: L1
        note: "Individuelle tägliche Nutzungsentscheidung"

    domain:
      - digital_platforms
      - antitrust
      - attention_economy
      - time_allocation

    tags:
      - Becker
      - time_allocation
      - diversion_ratio
      - Facebook
      - Instagram
      - Meta
      - FTC
      - field_experiment
      - platform_economics
      - attention

    insight: |
      Bei kostenlosen Plattformen (p_monetary ≈ 0) wird Zeit zum dominanten
      Kostenfaktor (s_T → 1). Plattformen mit ähnlichen Zeit-Anteilen haben
      hohe Diversion Ratios und sind daher enge Substitute im Sinne des
      Wettbewerbsrechts.
      
    implication: |
      1. FTC De-Merger: Hohe FB-IG Diversion (D ≈ 0.65) unterstützt Argument
         für Entflechtung.
      2. Marktabgrenzung: Traditionelle SSNIP-Tests versagen bei p=0;
         Zeit-basierte Tests erforderlich.
      3. Ad Load Pricing: Niedrige Elastizität (ε ≈ -0.15) zeigt erhebliche
         Marktmacht bei Werbung.
      4. Interventionsdesign: Aufmerksamkeits-Nudges sollten Zeit-Trade-offs
         salient machen.

    formulas:
      - name: "Time Share (Beckerian)"
        formula: "s_T = (W·t_i) / (p_i + W·t_i)"
        variables:
          W: "Shadow wage (Opportunitätskosten)"
          t_i: "Zeit pro Nutzung"
          p_i: "Monetärer Preis (≈0 für Social Media)"

      - name: "Diversion Ratio"
        formula: "D_ij = (∂q_j/∂p_i) / (-∂q_i/∂p_i)"
        variables:
          D_ij: "Substitutionsrate von i nach j"

      - name: "Beckerian Prediction"
        formula: "D_ij ↑ wenn |s_T^i - s_T^j| ↓"
        interpretation: "Ähnliche Zeit-Anteile → höhere Substitution"

    parameters:
      - id: PAR-TA-002
        symbol: s_T
        value: 0.99
        note: "Facebook und Instagram beide nahe 1"
      - id: PAR-TA-003
        symbol: D_ij
        value: 0.65
        note: "Facebook-Instagram Diversion"
      - id: PAR-TA-004
        symbol: ε_ad
        value: -0.15
        note: "Niedrige Ad-Load-Elastizität"

    references:
      appendices:
        - V   # CORE-WHEN (Context)
        - AAA # CORE-WHO
        - "CAT-17"  # Theory Catalog
      chapters:
        - 9   # Context chapter
        - 17  # Interventions
      cases:
        - CAS-002  # Opt-Out Defaults (methodisch verwandt)
      literature:
        - PAP-goodman2026timeintensive
        - PAP-becker1965theory
        - PAP-simon1971designing

    source_paper: "PAP-goodman2026timeintensive"
    source_model: "MOD-TA-001"
    created_in_session: "EBF-S-2026-01-28-MKT-001"

  # ═══════════════════════════════════════════════════════════════════════
  # CAS-TA-001: FOUNDATIONAL CASE - Becker Time Allocation Theory
  # ═══════════════════════════════════════════════════════════════════════
  CAS-TA-001:
    superkey: labor:female:time_allocation:historical:usa:1950_2000:foundational
    name: "Female Labor Supply Growth 1950-2000"
    description: |
      FOUNDATIONAL CASE für Becker's Time Allocation Theory (1965).
      Die dramatische Zunahme der weiblichen Erwerbsbeteiligung in den USA
      (von ~34% 1950 auf ~60% 2000) wird durch steigende Reallöhne erklärt,
      die den Opportunitätswert der Zeit erhöhen und damit den Trade-off
      zwischen Haushaltsproduktion und Marktarbeit verschieben.

    10C:
      WHO:
        levels:
          - individual
          - household
          - economy
        heterogeneity: high
        segments:
          - married_women
          - mothers
          - single_women
        primary_level: household
      WHAT:
        dimensions:
          - E  # Economic utility (market income)
          - D  # Domestic utility (household production)
        primary: time_allocation
        note: "Trade-off zwischen Z_market und Z_household"
      HOW:
        gamma_avg: 0.0
        interaction: substitutes
        note: "Marktarbeit und Haushaltsarbeit sind Substitute für Zeit"
      WHEN:
        psi_dominant: time_constraint
        psi_I: "rising_real_wages"
        psi_K: "changing_gender_norms"
        psi_M: "household_technology"
        temporal: secular_trend
        T_constraint: binding
      WHERE:
        source: theoretical_empirical
        confidence: very_high
        N: "US labor force data 1950-2000"
        countries: ["USA"]
      AWARE:
        A_level: 0.6
        awareness_type: implicit
        note: "Frauen reagieren auf Lohnänderungen ohne explizite Berechnung"
      READY:
        W_level: 0.7
        theta: medium
        note: "Soziale Barrieren sinken über Zeit"
      STAGE:
        phase: transition
        stability: low
        note: "50 Jahre kontinuierlicher Wandel"
      HIERARCHY:
        primary_level: L1
        note: "Individuelle Arbeitsangebotsentscheidung aggregiert zu Makrotrend"

    domain:
      - labor_economics
      - household_economics
      - gender_economics
      - time_allocation

    tags:
      - Becker
      - time_allocation
      - female_labor_supply
      - household_production
      - opportunity_cost
      - foundational
      - historical
      - secular_trend

    insight: |
      Die zentrale Einsicht von Becker (1965): Wenn Löhne steigen, steigt der
      Opportunitätswert der Zeit (w). Dies macht zeit-intensive Aktivitäten
      (wie Haushaltsproduktion) relativ teurer. Rationale Haushalte substituieren
      daher von Z_household zu Z_market, was die steigende weibliche
      Erwerbsbeteiligung erklärt.

    implication: |
      1. Politik: Lohnsubventionen für Frauen erhöhen Erwerbsbeteiligung
      2. Technologie: Haushaltsgeräte senken t_household und verstärken Effekt
      3. Kinderbetreuung: Externe Betreuung ermöglicht Substitution
      4. Prognose: Bei weiter steigenden Löhnen Konvergenz zu männlichen Raten
      5. EBF: Zeit-Kontext (Ψ_T) fundamental für Verhaltensvorhersagen

    formulas:
      - name: "Full Income"
        formula: "B = wT + V"
        variables:
          B: "Volles Einkommen (maximal erreichbar)"
          w: "Marktlohnsatz"
          T: "Zeitausstattung (24h/Tag)"
          V: "Nicht-Arbeitseinkommen"

      - name: "Time Allocation"
        formula: "T = T_market + T_household + T_leisure"
        variables:
          T_market: "Marktarbeitszeit"
          T_household: "Haushaltsproduktionszeit"
          T_leisure: "Freizeit"

      - name: "Commodity Price"
        formula: "π_i = p_i + w·t_i"
        variables:
          π_i: "Voller Preis der Commodity i"
          p_i: "Marktpreis der Güter-Inputs"
          t_i: "Zeit-Input pro Einheit"

    parameters:
      - id: PAR-TA-001
        symbol: w
        value: "wage_rate"
        note: "Opportunitätskosten der Zeit = Marktlohn"
      - id: PAR-TA-002
        symbol: s_T
        value: "variable"
        note: "Zeit-Anteil variiert nach Aktivität"

    references:
      appendices:
        - V     # CORE-WHEN (Context)
        - GB    # LIT-BECKER
        - AAA   # CORE-WHO
        - "CAT-17"  # Theory Catalog
      chapters:
        - 5    # Utility (WHAT)
        - 9    # Context (WHEN)
        - 14   # Domain Applications
      cases:
        - CAS-853  # Facebook-Instagram (moderne Anwendung)
      literature:
        - PAP-becker1965theory
        - PAP-mincer1962labor
        - PAP-gronau1977leisure

    source_paper: "PAP-becker1965theory"
    source_model: "MS-TA-001"
    classification: FOUNDATIONAL
    created_date: "2026-02-05"

