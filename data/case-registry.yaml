  CAS-855:
    superkey: labor:reskilling:identity_economics:italy:dce:information_intervention
    name: "Reskilling-Barrieren und Identity Fit bei italienischen Jobsuchenden"

    10C:
      WHO:
        levels: [individual, labor_market]
        segments: [jobseekers, unemployed, white_collar]
        primary_level: individual
        description: "Italienische Jobsuchende, die Reskilling in IT oder Bau erwägen"

      WHAT:
        utility_dimensions:
          financial: "Monetäre Erträge aus Reskilling"
          social: "Sozialer Status der Zielberufe"
          identity: "Perceived Identity Fit (DOMINANT!)"
        C_ij:
          WTP_IT: "positiv - Bereitschaft zu zahlen"
          WTP_construction: "negativ - Kompensation erforderlich"
          identity_fit: "stärkster individueller Faktor"

      HOW:
        gamma_avg: null
        interaction: "Identity × Occupation Choice"
        mechanism: "Identity fit dominiert monetäre/Status-Überlegungen"

      WHEN:
        psi_dominant: identity_social_norms
        temporal_scope: "2026 (Cross-sectional)"
        geographic_scope: "Italien"
        T_constraint: "Labor market transition period"

      WHERE:
        data_sources: "Discrete Choice Experiment + Real Training Data"
        countries: ["Italy"]
        parameter_source: "PAP-delfino2026reskilling"

      AWARE:
        awareness_type: "Individual beliefs + Information"
        salience: "Information intervention erhöht Awareness signifikant"
        A_intervention: "Light-touch information about occupational returns"

      READY:
        applicability: "Labor market policy, Active labor market programs"
        action_relevance: "Real engagement in training programs"
        W_level: "Stated interest → Actual training engagement"

      STAGE:
        phenomenon_stage: "Pre-decision (reskilling consideration)"
        intervention_window: "Information provision at decision point"

    domain: labor_economics
    subdomain: occupational_choice

    key_finding: |
      Drei zentrale Erkenntnisse:
      1. Identity Fit ist der WICHTIGSTE individuelle Faktor für Reskilling-Entscheidungen
         - Dominiert monetäre Erträge und sozialen Status
      2. WTP-Asymmetrie: Positiv für IT, Negativ für Bau
         - Jobsuchende ZAHLEN für IT-Reskilling
         - Jobsuchende VERLANGEN Kompensation für Bau-Reskilling
      3. Light-touch Information Intervention wirkt:
         - Erhöht Stated Interest UND
         - Erhöht REALES Training-Engagement

    ebf_relevance:
      - WHAT: Identity als U-Dimension (U_IDN aus Akerlof-Kranton)
      - AWARE: Information Intervention erhöht A(·)
      - theory_connection: "Erweitert MS-IB-001 (Identity Economics) auf Arbeitsmarkt"
      - implications_for_behavior: "Occupation Choice = Identity Choice, nicht nur Einkommensmaximierung"

    domains:
      - labor_economics
      - identity_economics
      - occupational_choice
      - active_labor_market_policy

    tags:
      - reskilling
      - identity_fit
      - discrete_choice_experiment
      - information_intervention
      - willingness_to_pay
      - occupational_choice
      - Italy
      - white_collar
      - IT_vs_construction

    insight: |
      Reskilling-Entscheidungen sind primär IDENTITÄTSENTSCHEIDUNGEN, nicht
      Einkommensmaximierung. Jobsuchende fragen nicht "Wo verdiene ich mehr?"
      sondern "Wer bin ich in diesem Beruf?" (perceived identity fit).

      Dies erklärt die WTP-Asymmetrie: IT hat höheren "Identity-Status" als Bau,
      unabhängig von tatsächlichen Erträgen. Light-touch Interventionen können
      jedoch Beliefs über Erträge korrigieren und reales Verhalten ändern.

    implication: |
      1. ALMP-Design: Aktivierungsmassnahmen müssen Identity Fit adressieren,
         nicht nur Information über Erträge liefern.
      2. Framing: Zielberufe in Reskilling-Programmen so framen, dass
         Identity Fit maximiert wird (z.B. "IT-Spezialist" vs "IT-Hilfsarbeiter").
      3. Intervention-Timing: Information Interventions WIRKEN auf reales
         Verhalten - low-cost, high-impact Policy-Tool.
      4. Segmentierung: Identity-basierte Segmente für Reskilling-Programme
         (z.B. "Tech-affin" vs "Handwerk-affin").

    formulas:
      - name: "Willingness to Pay (DCE)"
        formula: "WTP = -β_attribute / β_cost"
        variables:
          WTP: "Zahlungsbereitschaft für Attribut"
          beta_attribute: "Koeffizient des Attributs im Choice Model"
          beta_cost: "Koeffizient der Kosten"

      - name: "Identity Utility (Akerlof-Kranton)"
        formula: "U_IDN = I(c | identity_category)"
        variables:
          U_IDN: "Identitäts-Utility"
          c: "Konsumentscheidung (Berufswahl)"
          identity_category: "Perceived fit mit Zielberuf"

    parameters:
      - id: PAR-LAB-001
        symbol: WTP_IT
        value: "positiv"
        source: "PAP-delfino2026reskilling"
        note: "Jobsuchende zahlen für IT-Reskilling"
      - id: PAR-LAB-002
        symbol: WTP_construction
        value: "negativ"
        source: "PAP-delfino2026reskilling"
        note: "Jobsuchende verlangen Kompensation für Bau"
      - id: PAR-LAB-003
        symbol: identity_fit_importance
        value: "dominant"
        source: "PAP-delfino2026reskilling"
        note: "Wichtigster individueller Faktor"

    references:
      appendices:
        - C     # CORE-WHAT (Identity als U-Dimension)
        - AU    # CORE-AWARE (Information Intervention)
      chapters:
