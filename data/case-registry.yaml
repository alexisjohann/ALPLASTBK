    insight: |
      CRITICAL INSIGHT: Early childhood institutions serve as AWARENESS CATALYSTS
      for behavioral and developmental conditions. Preschool does NOT cause ADHD
      or speech disorders - it REVEALS them earlier by providing a structured
      environment where trained teachers can observe and refer. This is an
      AWARENESS (A(·)↑) mechanism, not an INCIDENCE mechanism. The quality gradient
      (higher quality = more detection) confirms: better institutions = better
      awareness systems. This extends Cunha/Heckman (2007) by adding an explicit
      DETECTION channel to the skill formation framework.

    implication: |
      1. Universal preschool access serves DUAL function: skill formation + health detection
      2. Teacher training in developmental observation amplifies detection effect
      3. Medicaid-school partnerships should be strengthened for early referral
      4. $104/year Medicaid cost increase is modest vs. early intervention benefits
      5. For EBF: Institutional context (Ψ_I) can systematically increase AWARE (A(·))
      6. BMW Compliance parallel: structured institutional environments detect problems earlier

    formulas:
    - name: Preschool Detection Effect (RD)
      formula: Y_i = α + β × 1(DOB_i < Cutoff_s) + f(DOB_i - Cutoff_s) + X_i'γ + δ_s + ε_i
      variables:
        beta_ADHD: "+16.9% (p<0.001)"
        beta_speech: "+9.3% (p<0.001)"
        beta_hearing_vision: "+14.8% (p<0.001)"
        DOB_cutoff: "Days from school-entry cutoff date"
        N: "~2,400,000"

    - name: Quality-Detection Gradient
      formula: Detection_effect = β_0 + β_quality × QualityIndex
      variables:
        low_quality_ADHD: "+8.2%"
        medium_quality_ADHD: "+16.5%"
        high_quality_ADHD: "+25.3%"
        quality_gradient: "positive and monotonic"

