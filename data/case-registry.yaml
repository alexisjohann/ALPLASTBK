  CAS-912:
    superkey: replication:method:power_analysis:winner_curse:ab_testing:rounded_corners
    name: Rounded Corners Replication Failure (Winner's Curse)
    description: |
      Classic example of Winner's Curse and power analysis failure in A/B testing.
      Original study (Biswas, Abell & Chacko 2023) claimed 55% CTR lift from rounded
      button corners with N=919. Four high-powered replications (total N=14.5M) found
      ZERO effect (~0% lift, all NS). Small Telescopes analysis shows original study
      had only 5-16% power to detect realistic 0.5% effect, meaning the 55% "finding"
      was almost certainly a Type M error (massively exaggerated effect estimate).

    10C:
      WHO:
        levels: [researcher, practitioner]
        heterogeneity: low
        segments: [underpowered_studies, replication_attempts]
        note: "Systematic pattern - underpowered studies find exaggerated effects"
      WHAT:
        dimensions: [F, E]
        primary: methodological_validity
        note: "What looks like behavioral insight is statistical artifact"
      HOW:
        gamma_avg: 0.0
        interaction: "rounded_corners × CTR = NULL (no true effect)"
        note: "55% → 0% collapse demonstrates Winner's Curse"
      WHEN:
        psi_I: "publication_incentives"
        psi_T: "pre_replication_era"
        note: "Original 2023 vs replications 2024-2025"
      WHERE:
        source: multi_platform_ab_tests
        confidence: very_high
        N: "14.5M users across 4 replications"
      AWARE:
        A_level: 0.2
        awareness_type: explicit_after_replication
        note: "Practitioners often unaware of power requirements"
      READY:
        W_level: 0.8
        theta: "high_readiness_for_false_positives"
        note: "Confirmation bias accepts dramatic findings uncritically"
      STAGE:
        phase: replication_crisis
        stability: high
        note: "Pattern repeats across behavioral science"
      HIERARCHY:
        primary_level: L2
        intervention_type: methodological_standard

    domain:
    - methodology
    - replication
    - ab_testing
    - ux_design
    - statistical_power

    tags:
    - winner_curse
    - power_analysis
    - small_telescopes
    - replication_failure
    - type_m_error
    - effect_size_inflation
    - publication_bias
    - pre_registration
    - rounded_corners
    - ctr

    insight: |
      CRITICAL METHODOLOGICAL INSIGHT: When underpowered studies report large effects,
      those effects are almost certainly exaggerated (Winner's Curse). The only way
      to "win" publication with low power is to get lucky with a massive overestimate.
      Small Telescopes analysis reveals that the original study COULD NOT have detected
      any realistic effect - it was fundamentally incapable of seeing the truth.

      Key formula: Power to detect d_original ≈ 5-16% when d_true ≈ 0.5%
      This means 84-95% of "significant" findings at this power level are false positives
      or massive overestimates.

    implication: |
      1. ALWAYS check statistical power BEFORE believing dramatic A/B test results
      2. Effect sizes from underpowered studies should be treated as upper bounds, not estimates
      3. Pre-registration and high-powered replications are essential for credible research
      4. "Spectacular" findings (55% lift!) should trigger skepticism, not excitement
      5. Small Telescopes: If original couldn't detect realistic effect, finding is likely false
      6. Winner's Curse is systematic - it's not random error but predictable inflation

    formulas:
    - name: Winner's Curse Effect Size Inflation
      formula: E[d_observed | significant] >> d_true when power < 0.5
      variables:
        d_observed: "55% (original claim)"
        d_true: "~0% (replication estimate)"
        power_original: "5-16%"
        inflation_ratio: ">100x"

    - name: Small Telescopes Criterion
      formula: P(detect d_realistic | N_original) < 0.20
      variables:
        N_original: "919"
        d_realistic: "0.5%"
        power_to_detect: "5-16%"
        conclusion: "FAIL - study incapable of detecting truth"

    - name: Replication Power Ratio
      formula: Power_ratio = N_replication / N_original
      variables:
        N_replication: "14,500,000"
        N_original: "919"
        ratio: "~15,000x more power"

    references:
      appendices:
      - BBB
      - AN
      chapters:
      - 20
      cases: []
      literature:
      - PAP-kohavi2026poweranalysis
      - PAP-rosenthal1979

    source_paper: PAP-kohavi2026poweranalysis
    theory_id: MS-ME-001

  CAS-913:
    superkey: complementarity:org_design:tight_coupling:bp_transformation:radical_change
    name: BP Organizational Transformation (Complementarity & Tight Coupling)
    description: |
      FOUNDATIONAL CASE from Roberts (2004) "The Modern Firm" demonstrating complementarity
      theory in organizational change. BP transformed from a bureaucratic hierarchy to a
      performance-based organization (1992-2000) through radical, system-wide changes.

      Key insight: Due to tight coupling (strong complementarities), incremental change was
      ineffective - all elements had to change together. Headquarters staff cut from 4,000
      to 350; business units became autonomous profit centers; management systems redesigned.

      CORE DEMONSTRATION: Complementarities create organizational inertia - changing only
      part of the system makes things WORSE because the synergies among unchanged elements
      fight against the new choices. Only radical, coordinated change succeeds.

    10C:
      WHO:
        levels: [organization, executive, employee]
        heterogeneity: high
        segments: [headquarters, business_units, field_operations]
        note: "Multi-level transformation affecting all organizational levels"
      WHAT:
        dimensions: [E, S, D]
        primary: efficiency_gain
        secondary: cooperation_initiative_balance
        note: "u = u_E(efficiency) + u_S(cooperation) + u_D(autonomy)"
      HOW:
        gamma_avg: 0.65
        interaction: "complementarity between all organizational choices"
        note: |
          CORE EBF INSIGHT - γ > 0 between strategy, structure, incentives, culture
          f(1,1) + f(0,0) ≥ f(1,0) + f(0,1) → changes must be coordinated
          Tight coupling: γ_ij high → changing x_i requires changing x_j
      WHEN:
        psi_I: "performance_crisis_1992"
        psi_T: "oil_price_volatility_era"
        note: "External shock triggered organizational redesign necessity"
      WHERE:
        source: organizational_economics_textbook
        confidence: high
        N: "single_company_longitudinal"
        context: "UK-based multinational oil company"
      AWARE:
        A_level: 0.8
        awareness_type: explicit_strategic
        note: "Leadership explicitly understood complementarity logic"
      READY:
        W_level: 0.9
        theta: "crisis_induced_high_readiness"
        note: "Performance crisis created willingness for radical change"
      STAGE:
        phase: organizational_transformation
        stability: achieved_after_transition
        note: "7-year transformation process (1992-1999)"
      HIERARCHY:
        primary_level: L2
        intervention_type: organizational_redesign

    domain:
    - organizational_economics
    - complementarity
    - strategy
    - corporate_transformation
    - oil_gas

    tags:
    - tight_coupling
    - loose_coupling
    - radical_change
    - incremental_failure
    - complementarity
    - supermodularity
    - organizational_inertia
    - performance_management
    - decentralization
    - bp
    - robert_horton
    - john_browne

    insight: |
      FOUNDATIONAL INSIGHT FOR EBF HOW DIMENSION:

      1. COMPLEMENTARITY CREATES CLUSTERING: Optimal organizational choices cluster together.
         BP couldn't just change incentives OR structure OR culture - all had to change.

      2. TIGHT COUPLING → INERTIA: Strong complementarities (γ >> 0) mean the current
         configuration is a local optimum. Changing one element while keeping others fixed
         often DECREASES performance because the synergies are broken.

      3. RADICAL CHANGE NECESSITY: When change is needed in a tightly coupled system,
         incremental adjustment fails. Only radical, system-wide transformation works.

      4. COOPERATION-INITIATIVE TRADEOFF: BP balanced autonomy (initiative) with
         coordination (cooperation) through asset ownership at business unit level
         combined with clear performance metrics and peer benchmarking.

      Mathematical formalization:
      - f(x∨y) + f(x∧y) ≥ f(x) + f(y) [supermodularity]
      - ∂²f/∂x₁∂x₂ ≥ 0 [positive cross-partial → complementarity]

    implication: |
      1. DIAGNOSIS: Before recommending changes, map complementarities (γ_ij matrix)
      2. TIGHT COUPLING TEST: If γ_ij > 0.4, expect resistance to partial changes
      3. CHANGE STRATEGY: Choose between incremental (low γ) vs radical (high γ)
      4. TRANSITION MANAGEMENT: Plan coordinated change across all complementary elements
      5. NEW EQUILIBRIUM: After radical change, new configuration must be internally consistent
      6. LEADERSHIP: Crisis or strong leadership needed to overcome organizational inertia

    formulas:
    - name: Supermodularity Condition (Complementarity)
      formula: f(x∨y) + f(x∧y) ≥ f(x) + f(y)
      variables:
        f: "organizational performance function"
        x_y: "vectors of organizational choices"
        join_meet: "element-wise max (∨) and min (∧)"

    - name: Cross-Partial Complementarity Test
      formula: ∂²f/∂x_i∂x_j ≥ 0
      variables:
        x_i: "organizational choice i (e.g., decentralization)"
        x_j: "organizational choice j (e.g., performance pay)"
        cross_partial: "positive → complementary; negative → substitutes"

    - name: Organizational Inertia from Complementarity
      formula: ΔPerformance = Σ_i(Δx_i × marginal_effect_i) + Σ_ij(γ_ij × Δx_i × Δx_j)
      variables:
        gamma_ij: "complementarity strength (0.4-0.8 for tight coupling)"
        partial_change: "changing only some x_i → interaction terms drag down total"

    references:
      appendices:
      - B
      - HI
      - AAA
      chapters:
      - 9
      - 10
      cases: []
      literature:
      - PAP-roberts2004modern
      - PAP-milgrom1990economics
      - PAP-milgrom1995complementarities

    source_paper: PAP-roberts2004modern
    theory_id: MS-CO-002

  CAS-914:
    superkey: strategy:framing:abstract_vs_context:NK_task:learning
    name: Abstract vs Context Framing in Strategic NK Task
    description: |
      Lab experiment comparing abstract (A, B, C factors) vs contextual
      (Lemonade Stand attributes) framing of identical NK strategic decision task.
      Key findings: Context improves immediate performance (Wason effect),
      but abstract framing fosters higher learning rates and benefits STEM-skilled
      individuals. Explore-exploit patterns develop through learning in abstract
      condition, approximating the intuitive patterns that context enables immediately.

    10C:
      WHO:
        levels: [individual, manager]
        heterogeneity: high
        segments: [high_STEM, low_STEM, executive_students]
        note: "STEM skills moderate optimal framing"
      WHAT:
        dimensions: [E, P]
        primary: strategic_decision_quality
        note: "Same information, different presentation"
      HOW:
        gamma_avg: 0.3
        interaction: "framing × STEM positive"
        note: "γ(context, low_STEM) > 0, γ(abstract, high_STEM) > 0"
      WHEN:
        psi_C: "cognitive_framing"
        psi_temporal: "learning_dynamics"
        note: "Learning rate steeper in abstract condition"
      WHERE:
