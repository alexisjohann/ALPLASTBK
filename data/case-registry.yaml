      WHERE:
        source: empirical
        confidence: very_high
      AWARE:
        A_level: 0.3
        awareness_type: implicit
      READY:
        W_level: 0.6
        theta: spatial_equilibrium
      STAGE:
        phase: action
        stability: medium
      HIERARCHY:
        primary_level: L2
        decision_type: relocation_decision

    domain:
    - labor_economics
    - migration
    - spatial_economics
    - methodology

    tags:
    - immigration
    - labor_market
    - spatial_equilibrium
    - identification
    - displacement
    - wage_effects
    - dustmann
    - methodology
    - places_vs_people

    insight: |
      Regional and worker-level studies measure DIFFERENT things. Regional effects
      include native relocation responses (displacement + crowding-out); worker-level
      effects isolate pure wage impacts on stayers. The difference is NOT a puzzle
      to resolve but different valid answers to different questions.

    implication: |
      Policy analysis must specify: Are we asking about effects on places (local
      communities, municipalities) or on people (individual workers)? Immigration
      can harm places (natives leave) while not harming individual workers who stay.
      Regional effect (-0.873) >> Worker-level wage effect (-0.188).

    formulas:
      - name: Regional Employment Effect Decomposition
        formula: ε_reg = δ_disp + ε_crowd + ε_wage
        variables:
          ε_reg: Total regional effect (-0.873)
          δ_disp: Displacement effect (0.139)
          ε_crowd: Crowding-out effect (0.546)
          ε_wage: Pure wage effect (0.188)

      - name: Places vs People Relationship
        formula: η̄_P = η̄_E + δ_relocation
        variables:
          η̄_P: Place-based labor supply elasticity (4.64)
          η̄_E: Worker-level supply elasticity (3.68)
          δ_relocation: Relocation response component

      - name: Inverse Labor Demand
        formula: φ = ∂log(w)/∂log(L)
        variables:
          φ: Inverse labor demand elasticity (-1.95)
          w: wages
          L: labor supply

    references:
      appendices: [WHERE, HOW]
      chapters: [labor_economics, spatial_economics]
      cases: []
      literature:
        - PAP-dustmann2025immigration
        - PAP-dustmann2017labor
        - PAP-dustmann2016impact
    source_paper: PAP-dustmann2025immigration

  CAS-878:
    superkey: info:advice:L0:demand:experimental:laboratory
    name: Advice Demand Independent of Quality Signals
    description: |
      Laboratory experiment testing reputational cheap-talk theory. Key finding:
      demand for advice does NOT depend on whether advice aligns with or contradicts
      prior beliefs. About 50% of participants fail to update beliefs about advisor
      quality based on observed performance. Hot-hand fallacy drives purchasing behavior.

    10C:
      WHO:
        levels:
        - individual
        heterogeneity: high
        segments:
        - belief_updaters
        - non_updaters
        - hot_hand_followers
      WHAT:
        dimensions:
        - F
        - E
        primary: information_value
      HOW:
        gamma_avg: 0.5
        interaction: complementary_conditional
      WHEN:
        psi_dominant: laboratory_controlled
        temporal: static
      WHERE:
        source: experimental
        confidence: high
      AWARE:
        A_level: 0.5
        awareness_type: explicit
      READY:
        W_level: 0.7
        theta: willingness_to_pay
      STAGE:
        phase: decision
        stability: medium
      HIERARCHY:
        primary_level: L0
        decision_type: deliberate

    domain:
    - information_economics
    - behavioral_economics
    - decision_making
    - advice

    tags:
    - advice
    - cheap_talk
    - bayesian_updating
    - hot_hand_fallacy
    - information_demand
    - laboratory_experiment
    - belief_updating
    - expertise

    insight: |
      Standard models predict people should value advice based on alignment with
      priors (prefer confirmatory) and update beliefs about quality over time.
      Neither prediction holds: demand is independent of alignment, and 50% are
      non-updaters. Instead, hot-hand fallacy dominates advice purchasing behavior.

    implication: |
      For advice architecture design: (1) Don't assume quality signals will be
      processed - 50% ignore them; (2) Track record displays may backfire by
      triggering hot-hand bias; (3) Consider debiasing interventions before
      advice presentation; (4) Expertise markets may not price quality correctly.

    formulas:
      - name: Bayesian Belief Update (Normative)
        formula: P(H|E) = P(E|H) × P(H) / P(E)
        variables:
          P(H|E): Posterior belief about advisor quality
          P(E|H): Likelihood of observed performance given quality
          P(H): Prior belief
          P(E): Marginal probability of evidence

      - name: Actual Update Rate
        formula: α_update = P(update_beliefs | observed_performance)
        variables:
          α_update: Probability of updating (empirically ≈ 0.50)
          note: Bimodal - either full update or none

      - name: Hot-Hand Demand Effect
        formula: D_advice = f(recent_streak) with ∂D/∂streak > 0
        variables:
          D_advice: Demand for advice
          recent_streak: Number of recent correct predictions
          note: Positive effect even when streaks uninformative

    references:
      appendices: [AWARE, READY, INFO]
      chapters: [information_economics, behavioral_biases]
      cases: []
      literature:
        - PAP-bregolin2026advice
        - crawford1982strategic
        - gilovich1985hot
        - rabin2002inference
    source_paper: PAP-bregolin2026advice

  CAS-879:
    superkey: cooperation:evolution:L2:super-additive:cross-cultural:field_experiment
    name: Super-Additive Cooperation in Papua New Guinea
    description: |
      Field experiment with Ngenikas and Perepkas in PNG Western Highlands.
      Tests evolutionary predictions about cooperation mechanisms. Key finding:
      Neither repeated interactions alone nor intergroup competition alone explains
      observed behavior. Only their COMBINATION (super-additive effect) predicts
      the pattern: escalating reciprocity with ingroup, de-escalating with outgroup.

    10C:
      WHO:
        levels:
        - individual
        - group
        heterogeneity: high
        segments:
        - ingroup_partners
        - outgroup_partners
        - ngenikas
        - perepkas
      WHAT:
        dimensions:
        - S
        - F
        primary: cooperation_reciprocity
      HOW:
        gamma_avg: 0.7
        interaction: super_additive
        note: "Joint effect > Sum(individual effects)"
      WHEN:
        psi_dominant: group_affiliation
        temporal: one_shot_sequential
      WHERE:
        source: field_experiment
        confidence: high
      AWARE:
        A_level: 0.9
        awareness_type: explicit
        note: "Players know partner's group affiliation"
      READY:
        W_level: 0.8
        theta: cooperation_willingness
      STAGE:
        phase: decision
        stability: high
      HIERARCHY:
        primary_level: L2
        decision_type: deliberate
        N_L2_note: "Escalation vs de-escalation strategies"

    domain:
    - evolutionary_economics
    - cooperation
    - social_preferences
    - cross_cultural
    - behavioral_economics

    tags:
    - super_additivity
    - cooperation
    - reciprocity
    - ingroup_outgroup
    - PNG
    - field_experiment
    - evolutionary_game_theory
    - repeated_interactions
    - intergroup_competition
    - escalation
    - de_escalation

    insight: |
      Mechanisms for cooperation are NOT mutually exclusive. Repeated interactions
      create a fragile cooperative attractor. Intergroup competition stabilizes it.
      Neither works alone - their INTERACTION produces super-additive cooperation.
      This directly supports EBF's γ-complementarity thesis.

    implication: |
      For intervention design: (1) Don't rely on single mechanisms - combine them;
      (2) Ingroup framing increases cooperative reciprocity; (3) Outgroup framing
      triggers de-escalating (uncooperative) reciprocity; (4) Context (ingroup vs
      outgroup) fundamentally changes behavioral strategy, not just magnitude.

    formulas:
      - name: Super-Additivity Condition
        formula: Effect(Joint) > Effect(Repeated) + Effect(Competition)
        variables:
          Effect_Joint: Cooperation level with both mechanisms
          Effect_Repeated: Cooperation level with repeated interactions only
          Effect_Competition: Cooperation level with intergroup competition only
          note: Super-additivity confirmed across wide parameter range

      - name: Escalating Reciprocity (Ingroup)
        formula: Transfer_t = Transfer_{t-1} + ε, where ε > 0
        variables:
          Transfer_t: Current period transfer
          ε: Escalation increment
          context: Ingroup partners only

      - name: De-Escalating Reciprocity (Outgroup)
        formula: Transfer_t = Transfer_{t-1} - δ, where δ > 0
        variables:
          Transfer_t: Current period transfer
          δ: De-escalation decrement
          context: Outgroup partners only

    references:
      appendices:
        - B
        - V
        - AAA
      chapters:
        - 11
        - 15
      cases: []
      literature:
        - efferson2022superadditive
        - fehr2002altruistic
        - fischbacher2001people
        - axelrod1981evolution
        - choi2007coevolution
    source_paper: PAP-efferson2022superadditive

  CAS-CON-021:
    name: "Meat Paradox - Cognitive Dissonance in Food Choices"
    title: "Consumer Segmentation Reveals Attitude-Behavior Gap in Sustainable Food Choices"
    short_description: |
      Latent class analysis of 8,261 households in 9 OECD countries reveals
      that 26% of consumers (Class 3) report high environmental concern but
      frequently consume red meat - demonstrating cognitive dissonance.
      Policy support varies dramatically by segment (meat tax: 16-36%).

    context:
      year: 2022
      location: 9 OECD countries (BEL, CAN, CHE, FRA, GBR, ISR, NLD, SWE, USA)
      population: 8,261 representative households
      intervention_type: Cross-sectional survey with latent class analysis
      sample_size: 8261
      data_source: OECD EPIC Survey Round 3

    ten_c_mapping:
      WHO:
        primary_agent: consumer_households
        secondary_agents: [policymakers, food_industry]
        utility_function: U(affordability, health, taste, environment)
        L_level: L0
      WHAT:
        primary_dimension: PSYCHOLOGICAL
        secondary_dimensions: [ECONOMIC, SOCIAL]
        C_components: [affordability, health, taste, environmental_concern]
        magnitude: moderate
      HOW:
        primary_mechanism: cognitive_dissonance
        secondary_mechanism: social_norms
        interaction: attitude_behavior_gap
      WHEN:
        psi_dominant: cultural_context_psi_K
        temporal: cross_sectional
      WHERE:
        source: OECD_survey
        confidence: high
      AWARE:
        A_level: 0.84
        awareness_type: explicit_concern_no_action
        note: Class 3 has 84% environmental concern but 90% frequent meat consumption
      READY:
        W_level: 0.26
        theta: low_willingness_to_change
      STAGE:
        phase: pre_contemplation_to_contemplation
        stability: high
      HIERARCHY:
        primary_level: L0
        decision_type: habitual

    domain:
    - consumer_behavior
    - environmental_psychology
    - food_policy
    - behavioral_economics

    tags:
    - cognitive_dissonance
    - meat_paradox
    - latent_class_analysis
    - attitude_behavior_gap
    - food_choices
    - policy_support
    - cross_country
    - OECD
    - environmental_concern

    insight: |
      Environmental concern is necessary but NOT sufficient for sustainable behavior.
      26% of consumers (Class 3) demonstrate a "meat paradox" - high environmental
      concern (84%) coexists with frequent meat consumption (90%). This cognitive
      dissonance is strongest among older, wealthier, more educated consumers.
      Cultural context (Ψ_K) strongly moderates: Switzerland has 32% consistent
      environmentalists, USA only 3%.

    implication: |
      For intervention design: (1) Segment-specific messaging needed - affordability
      for Class 1/2, responsibility activation for Class 3; (2) Meat taxes face low
      support (16-36%) even among environmentally concerned; (3) Cultural food habits
      may require gradual norm shifts rather than direct behavior targeting;
      (4) Health co-benefits messaging more effective than environmental framing
      in high-meat cultures (USA, France).

    formulas:
      - name: Consumer Segment Distribution
        formula: P(Class_i) = [0.41, 0.21, 0.26, 0.12] for i ∈ {1,2,3,4}
        variables:
          Class_1: High meat, occasional sustainable (41%)
          Class_2: Low meat, budget-driven (21%)
          Class_3: High meat + high concern = paradox (26%)
          Class_4: Low meat, high sustainable (12%)

      - name: Cognitive Dissonance Index (Class 3)
        formula: CDI = P(env_concern) × P(meat_frequent) = 0.84 × 0.90 = 0.76
        variables:
          CDI: Cognitive Dissonance Index
          P(env_concern): Probability of high environmental concern
          P(meat_frequent): Probability of frequent meat consumption
          note: High CDI indicates strong attitude-behavior gap

      - name: Policy Support by Segment
        formula: P(support_meat_tax | Class_i) = [0.16, 0.25, 0.26, 0.36]
        variables:
          Class_1: 16% support (lowest - high meat eaters)
          Class_4: 36% support (highest - consistent environmentalists)
          note: Even most sustainable segment shows only 36% support

      - name: Cross-Country Class 4 Prevalence
        formula: P(Class_4 | Country) varies from 0.03 (USA) to 0.32 (CHE)
        variables:
          CHE: 32% (Switzerland - highest)
          USA: 3% (lowest)
          FRA: 17% (moderate, but 47% in Class 3 - meat paradox)
          note: Cultural context Ψ_K strongly moderates

    references:
      appendices: [AWARE, WHEN, CONTEXT]
      chapters: [Ch.9, Ch.17]
      cases: []
      literature:
        - PAP-giner2025sustainable
        - PAP-dannenberg2024norms
        - PAP-edenbrandt2021cognitive
        - PAP-laffan2024meat

    source_paper: PAP-giner2025sustainable

  CAS-880:
    superkey: neuroscience:leadership:L2:group_decisions:experimental:organization
    name: Neural Basis of Leadership Decision-Making
    description: |
      Leaders show distinct neural patterns when making decisions for groups vs. self.
      fMRI evidence shows that leadership responsibility activates different value 
