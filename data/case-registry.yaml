  # ═══════════════════════════════════════════════════════════════════════════
  # CAS-871: Media Literacy vs Fact-Checking - German Misinformation Experiment
  # ═══════════════════════════════════════════════════════════════════════════
  - id: CAS-871
    title: "Media Literacy vs Fact-Checking: Debunking Fake News (Berger et al. 2025)"
    domain: [misinformation, media_literacy, public_health, behavioral_economics]

    description: |
      Randomized survey experiment (n=2953) with German adults comparing effectiveness
      of fact-checking vs. media literacy interventions against misinformation.
      KEY INSIGHT: Fact-checking only affects targeted fake news, while media literacy
      improves GENERAL truth discernment that persists for 2+ weeks.

      The mechanism difference: Fact-checking turns people into PASSIVE recipients
      of truth labels, while media literacy enables ACTIVE critical evaluation.
      This explains why literacy has broader and more persistent effects.

    context:
      geographic: "Germany - online panel (Bilendi)"
      temporal: "Survey experiment during Corona pandemic (2-wave, 2-week interval)"
      institutional: "Public health context - vaccine misinformation"
      cultural: "German media landscape, Corona pandemic misinformation"

    ten_c_mapping:
      WHO:
        agents: [German_adults, AfD_supporters, low_trust_individuals]
        welfare_hierarchy: "L1 (individual information processing)"
        heterogeneity: "AfD supporters show LARGER treatment effects"
      WHAT:
        utility_dimensions:
          information: "Credibility assessment changes"
          health: "Vaccination willingness as behavioral outcome"
        trade_offs: "Speed of fact-check vs breadth of literacy"
      HOW:
        mechanism_type: "ACTIVATION_OF_ATTENTION"
        complementarity:
          - "γ(literacy, attention) > 0: Tips raise attention → better evaluation"
          - "γ(fact-check, specific_item) > 0 but γ(fact-check, general) ≈ 0"
        interaction_strength: "strong for literacy, weak for fact-check"
        transmission: "Tips → Attention ↑ → Critical Evaluation → Better Discernment"
      WHEN:
        context_sensitivity: "MODERATE - effects persist 2 weeks"
        temporal_dynamics: |
          Wave 1: Treatment exposure + immediate measurement
          Wave 2: 2-week follow-up shows persistence
          Literacy effects do NOT decay significantly
      WHERE:
        sample_size: 2953
        country: "Germany"
        parameter_source: "PAP-berger2025debunking"
        data_quality: "HIGH - randomized experiment, multiple outcomes"
      AWARE:
        awareness_mechanism: "Media literacy RAISES attention to information quality"
        salience_triggers:
          - "6 simple tips activate critical evaluation"
          - "Tips are cheap, scalable, easy to understand"
        awareness_change: "Low attention → High attention (System 2 activation)"
      READY:
        willingness_pre: "Passive information consumption"
        willingness_post: "Active critical evaluation"
        action_threshold: "Simple tips sufficient to trigger change"
      STAGE:
        journey_position: "Information consumption moment"
        phase_transition: "Passive → Active processing"

    behavioral_insight:
      primary: |
        ACTIVE > PASSIVE FOR MISINFORMATION RESISTANCE:
        Fact-checking makes people passive recipients of truth labels.
        Media literacy activates System 2 thinking for self-evaluation.
        The attention mechanism (A(·) ↑) explains broader, persistent effects.
      secondary:
        - "Fact-check: β = -0.078 (SE 0.028) on SPECIFIC fake only"
        - "Literacy: β = -0.102 (SE 0.019) on ALL fakes"
        - "Literacy ALSO increases TRUE news credibility: β = +0.067"
        - "Behavioral outcome: +4.8pp vaccination willingness"

    ebf_implication: |
      This case demonstrates the AWARE dimension (A(·)) as intervention lever.
      Media literacy works by raising attention, not by providing information.
      γ(A, evaluation_skill) > 0 creates positive complementarity.

      Key for intervention design: "Teach to fish" > "Give fish"
      Activate System 2 rather than bypass it.

    parameters:
      - id: PAR-ML-001
        symbol: beta_factcheck_specific
        value: "-0.078"
        se: "0.028"
        unit: "credibility scale"
        source: "PAP-berger2025debunking"
        note: "Effect of fact-checking on targeted fake news (15.5% SD)"
      - id: PAR-ML-002
        symbol: beta_literacy_general
        value: "-0.102"
        se: "0.019"
        unit: "credibility scale"
        source: "PAP-berger2025debunking"
        note: "Effect of media literacy on ALL fake news (22.9% SD)"
      - id: PAR-ML-003
        symbol: beta_literacy_true
        value: "+0.067"
        se: "0.024"
        unit: "credibility scale"
        source: "PAP-berger2025debunking"
        note: "Media literacy also increases TRUE news credibility"
      - id: PAR-ML-004
        symbol: beta_vaccination
        value: "+0.048"
        se: "0.022"
        unit: "probability"
        source: "PAP-berger2025debunking"
        note: "Media literacy increases vaccination willingness by 4.8pp"
      - id: PAR-ML-005
        symbol: persistence_weeks
        value: "2"
        unit: "weeks"
        source: "PAP-berger2025debunking"
        note: "Effects remain significant after 2-week follow-up"

    references:
      appendices:
        - AU    # CORE-AWARE (Attention/Awareness mechanisms)
        - B     # CORE-HOW (Complementarity literacy-attention)
        - V     # CORE-WHEN (Context - pandemic misinformation)
        - C     # CORE-WHAT (Information utility)
      chapters:
        - 5     # AWARE: Attention
        - 11    # HOW: Complementarity
        - 17    # Intervention Design
      cases:
        - CAS-LIST-001  # List et al. 2024 - video intervention comparison
      literature:
        - PAP-berger2025debunking
        - PAP-list2024misinformation
        - PAP-pennycook2019lazy
        - PAP-roozenbeek2020prebunking

    source_paper: "PAP-berger2025debunking"
    created_in_session: "EBF-S-2026-01-30-SOC-001"
