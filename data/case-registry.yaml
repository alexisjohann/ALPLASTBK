  CAS-884:
    superkey: monetary:illusion:L2:strategic_complements:experimental:macro
    name: Nominal Illusion Under Strategic Complementarity
    description: |
      Lab experiment shows that bounded rationality effects depend critically on
      strategic environment. Nominal inertia persists under strategic complementarity
      but disappears under strategic substitutability.

    10C:
      WHO:
        levels: [individual, market]
        heterogeneity: moderate
        segments: [experimental_subjects]
      WHAT:
        dimensions: [F]
        primary_dimension: F
        utility_weight: nominal_weighted
      HOW:
        primary_mechanism: nominal_illusion
        secondary_mechanism: strategic_complementarity
        gamma_sign: context_dependent
      WHEN:
        psi_dominant: strategic_context_psi_I
        temporal: experimental
      WHERE:
        source: lab_experiment
        confidence: high

    domain: [monetary_economics, behavioral_macro, experimental]
    tags: [nominal_illusion, strategic_complementarity, money_illusion, macro]

    insight: |
      Nominal illusion effect (0.35) persists when others' choices are strategic
      complements (prices, wages) but vanishes under strategic substitutes.
      This explains why some markets show sticky prices while others don't.

    implication: |
      For monetary policy: (1) Nominal rigidities are endogenous to strategic
      structure; (2) Wage-setting (complements) will show more inertia than
      quantity competition (substitutes); (3) Central bank communication should
      account for strategic environment.

    formulas:
      - name: Nominal Illusion Effect
        formula: NI = (P_nominal - P_real) / P_real
        variables:
          nominal_illusion_effect: 0.35 (under strategic complementarity)
          note: Effect vanishes under strategic substitutability

    references:
