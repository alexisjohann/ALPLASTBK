        intervention_window: "Critical period (childhood/youth)"

    domain: political_economy
    subdomain: belief_formation

    key_finding: |
      BELIEFS KÖNNEN MASSIV VERÄNDERT WERDEN:

      1. HAUPTBEFUND:
         Deutsche, die in den 1920er-1930er Jahren geboren wurden
         (und damit Nazi-Schulbildung erhielten) zeigen:
         ┌─────────────────────────────────────────────────────────────┐
         │  → 2-3× HÖHERE Rate von "committed anti-Semites"           │
         │  → Deutlich negativere durchschnittliche Einstellungen     │
         │  → Effekt PERSISTIERT 50+ Jahre (gemessen 1996, 2006)      │
         └─────────────────────────────────────────────────────────────┘

      2. WAS WAR EFFEKTIV?
         SCHOOLING war am effektivsten - nicht Radio/Cinema!
         - Systematisch
         - Täglich über Jahre
         - Autoritätsbasiert
         - Interaktiv (nicht passiv)

      3. VERSTÄRKER: CONFIRMATION BIAS
         Indoktrination war BESONDERS effektiv in Distrikten,
         die bereits vor 1914 antisemitische Parteien unterstützten.
         → Pre-existing prejudice × Indoctrination Interaktion
         → Confirmation Bias als Mechanismus

      4. IMPLIKATION:
         "Beliefs can be modified massively through policy intervention"
         - Das ist eine zweischneidige Erkenntnis
         - Kann für Gutes oder Schlechtes genutzt werden
         - Kritische Periode in Kindheit/Jugend

    ebf_relevance:
      - AWARE: Indoktrination als Awareness/Belief-Intervention
      - WHEN: Kritische Periode (Kindheit) für Belief-Formation
      - HOW: Confirmation Bias als verstärkende Interaktion (γ > 0)
      - implications_for_behavior: "Beliefs sind formbar - systematische Exposition wirkt"

    domains:
      - political_economy
      - belief_formation
      - education
      - propaganda
      - historical_economics

    tags:
      - indoctrination
      - anti_Semitism
      - belief_modification
      - Nazi_Germany
      - schooling
      - propaganda
      - confirmation_bias
      - persistence
      - critical_period
      - cohort_effects
      - Voigtlaender
      - Voth
      - PNAS

    insight: |
      Dieses Paper ist ein Landmark für Belief-Formation:

      BELIEFS SIND NICHT FIX - SIE KÖNNEN MASSIV VERÄNDERT WERDEN!

      Die Befunde sind erschreckend klar:
      1. Systematische Indoktrination WIRKT
      2. Der Effekt hält JAHRZEHNTE
      3. Schooling ist effektiver als passive Medien

      Für EBF hat das fundamentale Implikationen:

      AWARE-Dimension:
      - Beliefs und Awareness können durch Interventionen verändert werden
      - Aber: Es braucht systematische, langfristige Exposition
      - Passive Propaganda (Radio/Cinema) ist weniger effektiv

      WHEN-Dimension:
      - Kritische Perioden existieren (Kindheit/Jugend)
      - In diesen Phasen sind Beliefs besonders formbar
      - Timing der Intervention ist entscheidend

      HOW-Dimension (Confirmation Bias):
      - Indoktrination ist NICHT gleichmässig effektiv
      - Sie wirkt stärker wo pre-existing attitudes konsistent sind
      - γ(Indoctrination, Pre-existing) > 0
      - Das ist Confirmation Bias in Aktion

      WARNUNG:
      Diese Erkenntnisse können für Gutes oder Schlechtes genutzt werden.
      Das Paper zeigt die Macht von systematischer Belief-Manipulation.

    implication: |
      1. BELIEF MODIFICATION IS POSSIBLE:
         - Keine "fixed preferences"
         - Systematische Intervention kann Beliefs fundamental ändern
         - Aber: Es braucht Zeit und Intensität

      2. CHANNEL MATTERS:
         - Schooling > Radio/Cinema
         - Aktiv > Passiv
         - Systematisch > Sporadisch
         - Autoritätsbasiert verstärkt

      3. CONFIRMATION BIAS ALS VERSTÄRKER:
         - Pre-existing attitudes bestimmen Effektivität
         - Konsistente Botschaften werden verstärkt aufgenommen
         - → Interventionen sollten an bestehende Beliefs anknüpfen
            (oder diese zuerst adressieren)

      4. CRITICAL PERIODS:
         - Kindheit/Jugend besonders formbar
         - Frühe Interventionen haben langfristige Effekte
         - Aber auch: Frühe Indoktrination ist besonders schädlich

      5. PERSISTENCE:
         - Einmal geformte Beliefs persistieren Jahrzehnte
         - Verbindet mit CAS-865 (Persistence Survey)
         - Breakdown-Bedingungen wichtig zu verstehen

      6. EBF PARAMETER:
         - Indoctrination Effect: 2-3× (committed extremists)
         - Persistence: 50+ Jahre
         - Schooling vs Media: Schooling deutlich effektiver
         - Confirmation Bias Amplification: Signifikant positiv

