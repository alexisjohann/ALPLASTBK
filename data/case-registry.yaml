  # ═══════════════════════════════════════════════════════════════════════════
  # CAS-870: Activated History - Turkish Sieges and FPÖ Voting
  # ═══════════════════════════════════════════════════════════════════════════
  - id: CAS-870
    title: "Activated History: Turkish Sieges of Vienna and Anti-Muslim Voting"
    domain: [political_economy, historical_persistence, cultural_identity]

    description: |
      Villages pillaged during Ottoman sieges of Vienna (1529/1683) show dramatically
      higher FPÖ voting and Turkish emigration after FPÖ's anti-Islam campaign (mid-2000s).
      KEY INSIGHT: Historical trauma can remain LATENT for centuries until ACTIVATED
      by political campaigns that make historical grievances salient again.

      The paper geocodes 690 Austrian municipalities in Burgenland and Niederösterreich,
      matching them to historical records of Ottoman pillage. Before FPÖ's Islam campaign,
      no difference in attitudes was detectable. After activation, pillaged villages
      become FPÖ strongholds and Turkish families leave these communities.

    context:
      geographic: "Austria - Burgenland, Niederösterreich (690 municipalities)"
      temporal: "Historical trauma: 1529/1683 → Dormant: 1683-2005 → Activated: 2005-2015"
      institutional: "Democratic elections, FPÖ political campaign"
      cultural: "Austrian identity, Ottoman collective memory, Islam as trigger"

    ten_c_mapping:
      WHO:
        agents: [Austrian_voters, Turkish_immigrants, FPÖ_politicians]
        welfare_hierarchy: "L2 (community-level identity activation)"
        identity_dimensions: [national, religious, historical]
      WHAT:
        utility_dimensions:
          identity: "U_IDN activated by political framing"
          social: "In-group cohesion against perceived out-group"
          psychological: "Collective memory of historical victimhood"
        trade_offs: "Identity reinforcement vs. cosmopolitan openness"
      HOW:
        mechanism_type: "ACTIVATION"
        complementarity:
          - "γ(AWARE, WHERE) > 0: Awareness of history × specific location → radicalization"
          - "γ(WHEN, AWARE) > 0: Political timing × historical salience → behavior change"
        interaction_strength: "strong"
        transmission: "Collective memory → Campaign activation → Behavioral response"
      WHEN:
        context_sensitivity: "EXTREME - centuries of latency, instant activation"
        temporal_dynamics: |
          1529/1683: Ottoman sieges create collective trauma
          1683-2005: Historical memory dormant (no behavioral expression)
          2005+: FPÖ anti-Islam campaign ACTIVATES latent grievances
          Result: Voting shifts + outmigration in pillaged villages only
      WHERE:
        geographic_specification: |
          690 municipalities geocoded in eastern Austria:
          - Burgenland: Former Habsburg-Ottoman frontier
          - Niederösterreich: Villages along 1683 siege route
          Historical records: Stein Chronik, contemporary accounts
        geographic_data_file: "data/geographic/ottoman-pillage-1683.yaml"
        key_pillaged_localities:
          wienerwald: [Perchtoldsdorf, Mödling, Baden, Brunn am Gebirge, Traiskirchen]
          marchfeld: [Bruck an der Leitha, Hainburg, Fischamend, Schwechat, Prellenkirchen]
          thermenregion: [Laxenburg, Pottendorf, Weißenbach]
          burgenland: [Eisenstadt, Rust, Donnerskirchen, Deutschkreutz]
          religious_sites: [Stift Heiligenkreuz, Klosterneuburg]
          vienna_suburbs: [Hietzing, Hernals, Penzing]
        parameter_source: "Historical archives + Austrian electoral data"
      AWARE:
        awareness_mechanism: "Political campaign makes historical trauma SALIENT"
        salience_triggers:
          - FPÖ anti-Islam rhetoric (mid-2000s)
          - Public discourse on Muslim immigration
          - Historical commemoration events
        awareness_change: "Dormant → Highly salient"
      READY:
        willingness_pre: "Latent (no expressed hostility before activation)"
        willingness_post: "Active (voting + social pressure on outmigration)"
        action_threshold: "Political campaign provides legitimacy for expression"
      STAGE:
        journey_position: "Activation point in historical persistence"
        phase_transition: "Dormant collective memory → Active political behavior"

    behavioral_insight:
      primary: |
        ACTIVATED PERSISTENCE: Historical trauma does not require continuous
        transmission. It can remain latent in collective memory for centuries,
        invisible in behavior, until a political entrepreneur ACTIVATES it by
        making historical grievances salient and politically relevant.
      secondary:
        - "Geographic encoding: Villages are 'marked' by history in collective memory"
        - "Selectivity: Only pillaged villages respond to activation"
        - "Dual response: Both voting shifts AND outmigration (social pressure)"
        - "Political supply: Activation requires campaign that frames history"

    ebf_implication: |
      This case fundamentally extends our understanding of historical persistence
      (CORE-WHEN). Unlike the Voth trilogy showing continuous transmission,
      Ochsner & Roesel show that persistence can be DISCONTINUOUS:

      STOCK MODEL (Voigtländer & Voth): Continuous cultural transmission
      ACTIVATION MODEL (Ochsner & Roesel): Latent → Activated by political cues

      For EBF: Context (Ψ) includes not just current factors but DORMANT
      historical factors that can be TRIGGERED. Political campaigns serve as
      Ψ-activation events that make historical Ψ-factors behaviorally relevant.

      γ(Ψ_historical, Ψ_political_campaign) >> 0

      This implies:
      1. Behavioral predictions must consider LATENT historical factors
      2. Political campaigns can WEAPONIZE dormant collective memories
      3. Geographic location encodes historical trauma beyond current attitudes

    formulas:
      activation_model: |
        FPÖ_vote_share_it = α + β₁ × Pillaged_i + β₂ × Post2005_t
                           + β₃ × (Pillaged_i × Post2005_t) + ε_it

        Where:
        - β₁ ≈ 0 before 2005 (no pre-existing difference)
        - β₃ > 0 (activation effect: pillaged × campaign)

      outmigration_model: |
        Turkish_emigration_it = γ₁ × Pillaged_i × Post2005_t + controls

        Mechanism: Social pressure in activated communities

