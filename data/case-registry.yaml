    insight: |
      Dieses Paper liefert eine wichtige Lektion für Policy-Analyse:

      POLICY-REGIME-SHIFTS KÖNNEN UNBEABSICHTIGTE FOLGEN HABEN!

      Der Paradigmenwechsel zu großzügigerer Opioid-Verschreibung Ende der 1990er
      war gut gemeint (Schmerz als "fünftes Vitalzeichen"). Aber:

      1. Er traf auf eine vulnerable Population (SSDI-Empfänger mit chronischen Schmerzen)
      2. Diese hatte bevorzugten Zugang (öffentliche Krankenversicherung)
      3. Die Interaktion (nicht jeder Faktor allein!) erzeugte die Krise

      Das EBF-Framework erfasst dies über:
      - WHEN (Ψ): Der Kontextfaktor "Verschreibungsregime" änderte sich
      - WHO: Nicht alle gleich betroffen - Segmentierung ist kritisch
      - HOW (γ): Die INTERAKTION erklärt mehr als die Haupteffekte

    implication: |
      1. POLICY DESIGN: Bei Regime-Änderungen vulnerable Gruppen identifizieren.
         Nicht nur Haupteffekte, sondern Interaktionen antizipieren.

      2. SSDI REFORM: Nicht nur Einkommensersatz, sondern Gesundheitsmanagement.
         SSDI-Empfänger sind eine Hochrisiko-Population für viele Interventionen.

      3. COUNTERFACTUAL THINKING: Das Paper zeigt, dass 43% der Todesfälle
         vermeidbar gewesen wären. Das ist eine enorme Zahl.

      4. EBF PARAMETER:
         - Counterfactual Reduktion: -43%
         - SSDI-Interaktionseffekt: 31pp (von 43pp)
         - Zeitfenster: Ende 1990er als kritischer Wendepunkt

      5. GENERALISIERUNG: Jeder Policy-Shift sollte auf solche
         "Superspreader-Populationen" geprüft werden.

    formulas:
      - name: "Counterfactual Drug Deaths"
        formula: "Deaths_counterfactual = Deaths_actual × (1 - 0.43)"
        variables:
          Deaths_counterfactual: "Drogenmortalität bei 1995er Verschreibungsniveau"
          Deaths_actual: "Tatsächliche Drogenmortalität 1999-2017"
          reduction: "43% Reduktion"

      - name: "Decomposition"
        formula: "Total Reduction = Prescribing Effect + SSDI × Prescribing Interaction"
        variables:
          Total_Reduction: "43%"
