        primary_level: L1
        intervention_type: home_visiting

    domain: [education, child_development, measurement]
    tags: [skill_emergence, fadeout, UHP_levels, ordinal_scales, China_REACH]
    insight: |
      Skills at different ages are qualitatively different, not more of the same.
      Common scale assumption is rejected for language and cognitive skills.
    implication: |
      Value-added measures rest on shaky ground. Fadeout may be comparing
      incomparable skills. Use within-level comparisons for scale-free testing.

