  CAS-904:
    superkey: methodology:econometric:L5:causality:foundational:heckman
    name: Econometric Causality - Thought Experiments Foundation
    description: |
      FOUNDATIONAL METHODOLOGY CASE. Establishes thought experiments as the basis
      for all econometric causal claims. Compares Frisch-Haavelmo tradition with
      Neyman-Rubin potential outcomes and Pearl's Do-Calculus. Shows why only
      structural econometric models can answer all four policy questions (P1-P4).

    10C:
      WHO:
        levels:
        - researchers
        - policymakers
        heterogeneity: low
        segments:
        - methodologists
      WHAT:
        dimensions:
        - methodology
        primary: causal_inference
      HOW:
        gamma_avg: null
        interaction: foundational
        note: "Defines HOW to establish causal claims"
      WHEN:
        psi_dominant: methodology
        temporal: universal
        note: "Defines WHEN causal claims are valid"
      WHERE:
        source: journal_econometrics
        confidence: high
        evidence_tier: 1
      AWARE:
        A_level: null
        awareness_type: methodological
      READY:
        W_level: null
        theta: null
      STAGE:
        phase: methodology
        stability: foundational
      HIERARCHY:
        primary_level: L3
        note: "Meta-level methodological framework"

    domain:
    - methodology
    - econometrics
    - causal_inference

    tags:
    - thought_experiment
    - fixing_vs_conditioning
    - P1_P4_framework
    - Frisch_Haavelmo
    - Neyman_Rubin
    - Pearl_DAG
    - structural_parameters
    - treatment_effects
    - Heckman
    - Pinto
    - FOUNDATIONAL

    insight: |
      The key distinction between FIXING (modifying a mechanism) and CONDITIONING
      (restricting the sample) is essential for valid causal inference. E[Y|fix(D=1)] ≠ E[Y|D=1].
      Only structural parameters (λ, β, γ) are policy-invariant. Treatment effects are
      context-dependent and instrument-specific. RCTs and DAGs are insufficient for
      answering P3 (policy forecast) and P4 (new policy effects) questions.

    implication: |
      For EBF methodology:
      1. Use structural parameters (λ, β, γ) NOT treatment effects
      2. Context (Ψ) = which mechanisms are fixed in the thought experiment
      3. P1-P4 framework essential for intervention evaluation
      4. Each 10C CORE dimension specifies a mechanism to fix or vary
      5. External validity requires mechanism invariance

    formulas:
    - name: Fixing vs Conditioning Inequality
      formula: E[Y | fix(D=1)] ≠ E[Y | D=1]
      variables:
        fix: fixing/modifying the mechanism
        condition: restricting sample to subpopulation

    - name: Generalized Roy Model
      formula: Y = D·Y₁ + (1-D)·Y₀, where D = 1[V > 0]
      variables:
        Y_1: potential outcome if treated
        Y_0: potential outcome if untreated
        V: net benefit of treatment

    - name: Treatment Effects Hierarchy
      formula: ATE, TT, TUT, MTE, LATE
      variables:
        ATE: Average Treatment Effect
        TT: Treatment on Treated
        TUT: Treatment on Untreated
        MTE: Marginal Treatment Effect
        LATE: Local Average Treatment Effect

    references:
      appendices:
      - HEC
      - DER
      - AN
      chapters:
      - 17
      cases: []
      literature:
      - PAP-heckman2024causality
      - PAP-heckman2022econometrics

    source_paper: PAP-heckman2024causality
    theory_id: MS-EC-001
    parameters:
      - PAR-EC-001

  CAS-905:
    superkey: education:early_childhood:L4:china_reach:skill_emergence:heckman
    name: China REACH - Scale-Free Skill Measurement
    description: |
      CHINA REACH RCT demonstrates that skills EMERGE at each developmental level---
      they are qualitatively different, not just "more of the same." The intervention
      cultivates multi-dimensional skill development through weekly home visits with
      trained home visitors. Children face structured schedules of repeated instruction
      and assessments of age-specific skills following UHP (Uzgiris-Hunt-Palmer) levels.

    10C:
      WHO:
        levels: [children, caregivers, home_visitors]
        note: "Rural China children ages 0-3, caregivers trained"
      WHAT:
        dimensions: [cognitive, language, fine_motor]
        primary: skill_development
        note: "Multi-dimensional skills with level-specific measurement"
      HOW:
        gamma_avg: null
        interaction: dynamic_complementarity
        note: "Early investment raises productivity of later investment"
      WHEN:
        psi_T: "Early childhood (0-3 years)"
        psi_I: "Weekly structured curriculum"
        note: "Timing matters: sensitive periods exist"
      WHERE:
        parameters: [PAR-SF-001, PAR-SF-002, PAR-SF-003, PAR-SF-004, PAR-SF-005]
        note: "Dynamic complementarity, common scale validity, catch-up effect"
      AWARE:
        A_base: "Caregiver awareness increased through training"
        note: "Home visitors teach caregivers to interact with children"
      READY:
        WAX: "Skill-specific readiness at each UHP level"
        note: "Children ready for level N only after mastering level N-1"
      STAGE:
        phase: "Skill acquisition across 11 UHP difficulty levels"
        note: "Skills emerge at each level - not cumulative on common scale"
      HIERARCHY:
        N_L2: "Within-level measurement vs cross-level comparison"
        note: "Valid comparisons only within developmental levels"
      EIT:
        intervention_type: "home_visiting"
        note: "Weekly one-hour sessions with trained visitors"

    insight: |
      CRITICAL METHODOLOGICAL INSIGHT: The study demonstrates that:
      1. Skills at different developmental levels are NOT commensurable
      2. Common psychometric scales distort measurement of growth
      3. Dynamic complementarity can be tested WITHOUT arbitrary scales
      4. Fadeout may be measurement artifact, not real decline
      5. Disadvantaged children benefit most (γ_low > γ_normal > γ_high)

    implication: |
      For EBF measurement methodology:
      1. Do not assume cardinal psychometric scales across developmental stages
      2. Use within-level measurement for valid growth assessment
      3. Scale-free tests (time to mastery) for dynamic complementarity
      4. Re-interpret fadeout as potential skill emergence phenomenon
      5. Target early intervention for maximum impact on disadvantaged

    formulas:
    - name: Technology of Skill Formation
      formula: K(a+1) = f^(a)(K(a), I(a))
      variables:
        K: vector of skills
        I: investment (parenting, schools)
        a: age
      note: "K(a+1) and K(a) need NOT be on same scale"

    - name: Dynamic Complementarity Definition
      formula: ∂²K(a+j+1) / ∂I(a)∂I'(a+j) > 0
      variables:
        I(a): investment at age a
        I(a+j): investment at age a+j
      note: "Does NOT require common scale assumption"

    - name: Time to First Mastery
      formula: d(s,ℓ) = number of trials until first success at level ℓ for skill s
      note: "Scale-free measure of learning speed"

    - name: Catch-Up Effect
      formula: γ_low > γ_normal > γ_high
      note: "Disadvantaged children benefit most from early investment"

    references:
      appendices:
      - HEC
      - BBB
      chapters:
      - 11
      - 18
      cases:
      - CAS-904
      literature:
      - PAP-heckman2026skills
      - cunha2007technology
      - PAP-heckman2025dynamic

    source_paper: PAP-heckman2026skills
    theory_id: MS-SF-002
    parameters:
      - PAR-SF-001
      - PAR-SF-002
      - PAR-SF-003
      - PAR-SF-004
      - PAR-SF-005

  CAS-906:
    superkey: character:virtue_ethics:L4:economic_approach:heckman
    name: Economic Virtue Ethics Framework
    description: |
      Unified economic framework for personality, character and virtue that bridges
      economics, psychology, and philosophy. KEY INSIGHT: Traits are actions (behaviors),
      not immutable genetic endowments---personality is malleable through investment
      and own effort. Formalizes Aristotelian virtue ethics in economic terms.

    10C:
      WHO:
        levels: [individuals, children, adults]
        note: "Person of character acts through choice on commitment to virtue"
      WHAT:
        dimensions: [preferences_psi, traits_theta, effort_e]
        primary: character_development
        note: "Utility U(a, ψ, θ, h) distinguishes preferences from traits"
      HOW:
        gamma_avg: null
        interaction: "effort_trait_complementarity"
        note: "Effort mediates trait-behavior relationship"
      WHEN:
        psi_T: "Life cycle, early childhood critical"
        psi_I: "Situations (h) moderate trait expression"
        note: "Strong situations constrain behavior, weak situations reveal traits"
      WHERE:
        parameters: [PAR-VE-001, PAR-VE-002, PAR-VE-003, PAR-VE-004, PAR-VE-005, PAR-VE-006]
        note: "Traits, preferences, effort, self-control, habituation, golden mean"
      AWARE:
        A_base: "Virtue requires conscious commitment to ideal"
        note: "Person of character actively chooses virtue"
      READY:
        WAX: "Self-control S_t enables overriding temptation"
        note: "S_t is depletable but developable resource"
      STAGE:
        phase: "Character formation through habituation K_t"
        note: "Converting effortful virtue into habitual virtue"
      HIERARCHY:
        N_L2: "Preference-trait-behavior distinction"
        note: "Operationally distinguish through stake/situation variation"
      EIT:
        intervention_type: "character_development"
        note: "Build S_t and K_t through early intervention"

    insight: |
      FOUNDATIONAL BRIDGE: Economics ↔ Psychology ↔ Philosophy

      KEY CONTRIBUTIONS:
      1. Traits are ACTIONS (behaviors), not fixed endowments
      2. Character = stable dispositions across situations
      3. Virtue = commitment to ideal point σ* (golden mean)
      4. Self-control S_t is depletable but trainable resource
      5. Habituation K_t: "We become just by doing just acts" (Aristotle)
      6. Preferences ψ (what you value) ≠ Traits θ (how you behave)

    implication: |
      For EBF framework:
      1. Personality measurement must distinguish traits from preferences
      2. Character skills can be built through intervention
      3. Self-control can be trained (not just trait)
      4. Habituation provides mechanism for character formation
      5. Early intervention has high returns on character development

    formulas:
    - name: Utility with Traits
      formula: U = U(a, ψ, θ, h)
      variables:
        a: action
        psi: preferences (what person values)
        theta: traits (stable dispositions)
        h: situation
      note: "Distinguishes preferences from traits"

    - name: Measured Behavior
      formula: B = f(θ, e, h)
      variables:
        B: observed behavior
        theta: traits
        e: effort
        h: situation
      note: "Effort mediates trait-behavior relationship"

    - name: Trait Evolution
      formula: θ_{t+1} = g(θ_t, e_t, h_t)
      note: "Traits are produced, not given---MALLEABLE"

    - name: Self-Control Dynamics
      formula: S_{t+1} = (1-δ_S)S_t + ι(rest) + investment
      variables:
        S_t: self-control stock
        delta_S: depreciation rate (0.10-0.20)
        iota: recovery from rest
      note: "Self-control depletes with use, recovers with rest"

    - name: Habituation Dynamics
      formula: K_{t+1} = (1-δ_K)K_t + h(a_t)
      variables:
        K_t: habituation stock
        delta_K: depreciation rate (0.02-0.05)
        a_t: action taken
      note: "Practice builds character (Aristotelian habituation)"

    - name: Ideal Point (Golden Mean)
      formula: U(θ) = -|θ - σ*|
      variables:
        sigma_star: ideal trait level
      note: "Virtue as mean between excess and deficiency"

    references:
      appendices:
      - HEC
      - BBB
      chapters:
      - 10
      - 11
      - 13
      cases:
      - CAS-905
      literature:
      - PAP-heckman2023virtue
      - PAP-heckman2026skills
      - aristotle_nicomachean_ethics

    source_paper: PAP-heckman2023virtue
    theory_id: MS-VE-001
    parameters:
      - PAR-VE-001
      - PAR-VE-002
      - PAR-VE-003
      - PAR-VE-004
      - PAR-VE-005
      - PAR-VE-006

  CAS-907:
    superkey: digital:crisis:firestorm:brand_community:social_media
    name: Online Firestorm Detection, Prevention, and Mitigation
    description: |
      3-Phasen-Framework für Krisenmanagement in Brand Communities basierend auf
      472,995 Posts von 89 Brands (2011-2016). Zeigt wie High-Arousal Emotionen
      Viralität treiben und welche Response-Strategien wann wirksam sind.

      ÜBERRASCHENDE BEFUNDE:
      - Explanation > Empathy für High-Arousal Krisen
      - Frühe Kompensation schadet (wirkt als Schuldeingeständnis)
      - Strukturelle Bindungsstärke (1.432) > Emotionsinhalt (0.186)

    10C:
      WHO:
        levels:
        - brand
        - customer
        - community
        heterogeneity: high
        segments:
        - complainers
        - bystanders
        - advocates
      WHAT:
        dimensions:
        - S
        - E
        primary: emotion_arousal
        note: "High vs Low arousal emotions drive different dynamics"
      HOW:
        gamma_avg: 0.5
        interaction: "Timing × Strategy interaction critical"
        complementarities:
          - "Empathy × Low-arousal → effective"
          - "Explanation × High-arousal → effective"
          - "Compensation × Late → effective"
          - "Compensation × Early → BACKFIRE"
      WHEN:
        psi_dominant: timing
        temporal: dynamic
        phases:
          - detecting
          - preventing
          - mitigating
        note: "Response timing changes strategy effectiveness"
      WHERE:
        source: field_data
        confidence: high
        n: 472995
        brands: 89
        years: "2011-2016"
      AWARE:
        A_level: "Variable - depends on arousal"
        awareness_type: emotional_salience
        high_arousal: 0.186
        low_arousal: 0.026
        tie_strength: 1.432
      READY:
        W_level: "Crisis requires immediate readiness"
        note: "Organizational preparedness critical"
      STAGE:
        phase: "3-phase: Detecting → Preventing → Mitigating"
        phase1_detecting: "Monitor high-arousal content, not just negative"
        phase2_preventing: "Choose empathy vs explanation by arousal level"
        phase3_mitigating: "Time responses strategically"
      HIERARCHY:
        N_L2: "Brand-community-customer hierarchy"
        note: "Multi-level response coordination"
      EIT:
        intervention_type: crisis_response
        detecting: "Sentiment + arousal monitoring"
        preventing: "Empathy OR Explanation (arousal-dependent)"
        mitigating: "Compensation (late), Apology (early), Channel (early)"

    domain:
    - digital
    - marketing
    - crisis_management
    - social_media
    - customer_service

    tags:
    - firestorm
    - virality
    - emotions
    - brand_community
    - crisis_response
    - timing
    - empathy
    - explanation
    - compensation

    insight: |
      3-PHASE CRISIS MANAGEMENT FRAMEWORK:

      PHASE 1 - DETECTING (H1-H2):
      - High-arousal emotions (anger, fear) → virality (β=0.186***)
      - Low-arousal emotions (sadness) → no effect (β=0.026, NS)
      - KEY: Monitor for HIGH-AROUSAL, not just negative sentiment
      - Structural ties (1.432) > emotional content (0.186)

      PHASE 2 - PREVENTING (H3-H4):
      - SURPRISING: Explanation > Empathy for high-arousal crises
      - Empathy reduces virality (β=-0.069***)
      - For HIGH-AROUSAL: Explanation addresses cognitive uncertainty
      - For LOW-AROUSAL: Empathy addresses emotional needs

      PHASE 3 - MITIGATING (H5-H6):
      TIMING IS CRITICAL:
      - Compensation: LATE = good (-0.058***), EARLY = bad (+0.098***)
      - Apology: EARLY = good (-0.058***), LATE = bad (+0.105***)
      - Channel Change: EARLY = good (-0.081***), LATE = bad (+0.096***)

      COUNTERINTUITIVE FINDINGS:
      1. Explanation beats empathy for high-arousal crises
      2. Early compensation signals guilt (backfires)
      3. Late apology seems insincere (backfires)
      4. Late channel change seems evasive (backfires)

    implication: |
      For Crisis Management Practice:
      1. Set up arousal-based monitoring (not just sentiment)
      2. Train teams to distinguish high/low arousal situations
      3. NEVER offer compensation immediately in crisis
      4. DO apologize early if warranted
      5. DO move to private channel early

      For EBF Framework:
      - CORE-AWARE: High-arousal = high salience
      - CORE-STAGE: Map firestorm phases to BCJ
      - CORE-EIT: Phase-specific intervention types
      - CORE-WHEN: Timing modifies all effects

    formulas:
    - name: Virality Model
      formula: V = f(E_high, E_low, T, LSM, R)
      variables:
        E_high: high-arousal emotions (β=0.186***)
        E_low: low-arousal emotions (β=0.026, NS)
        T: structural tie strength (β=1.432***)
        LSM: linguistic style matching (β=0.025, NS)
        R: response strategy
      note: "Negative binomial regression on viral spread"

    - name: Response Effectiveness (Prevention)
      formula: ΔV = β_emp × Empathy + β_exp × Explanation + β_int × (Arousal × Response)
      variables:
        beta_emp: -0.069*** (empathy effect)
        beta_exp: -0.011 (explanation direct, NS)
        beta_int: interaction term (arousal × response)
      note: "Interaction term shows arousal-dependent effectiveness"

    - name: Timing Effect (Mitigation)
      formula: ΔV(t) = β_early × I(early) + β_late × I(late)
      variables:
        compensation: {early: +0.098***, late: -0.058***}
        apology: {early: -0.058***, late: +0.105***}
        channel_change: {early: -0.081***, late: +0.096***}
      note: "Same strategy has OPPOSITE effects depending on timing"

    references:
      appendices:
      - IE
      - AW
      - AU
      chapters:
      - 17
      - 18
      cases: []
      literature:
      - PAP-herhausen2019firestorms
      - PAP-herhausen2019loyalty
      - PAP-schoegel2024cxnavigator

    source_paper: PAP-herhausen2019firestorms
    theory_id: MS-CM-001
    parameters:
      - PAR-CM-001
      - PAR-CM-002
      - PAR-CM-003
      - PAR-CM-004
      - PAR-CM-005
      - PAR-CM-006
      - PAR-CM-007

