        intervention_window: "Migration patterns as natural experiment"

    domain: political_economy
    subdomain: identity_economics

    key_finding: |
      MIGRATION FORMT KLASSENIDENTITÄT UND POLITISCHE CLEAVAGES:

      1. SOCIAL PSYCHOLOGY INSIGHT:
         Menschen identifizieren sich mit Gruppen, deren Mitglieder
         ihnen ÄHNLICH sind.

      2. ANWENDUNG AUF KLASSENIDENTITÄT:
         - Migration brachte kulturell distante Arbeiter
         - Dies erhöhte die kulturelle Distanz der Working Class
         - Einheimische Arbeiter identifizierten sich weniger mit der Klasse

      3. KONSEQUENZEN:
         ┌─────────────────────────────────────────────────────────────┐
         │  Wo Migration Cultural Distance erhöhte:                    │
         │  ├── Union Membership ↓                                     │
         │  ├── Labour Party Support ↓                                 │
         │  └── Parliamentary Candidates targeted Workers weniger      │
         └─────────────────────────────────────────────────────────────┘

      4. UMKEHRUNG (1911):
         - Langsamere In-Migration
         - Steigendes lokales Bevölkerungswachstum
         - → Working Class Distance ↓ in urbanen Gebieten
         - → Diese wurden Labour Strongholds

      5. METHODISCHE INNOVATION:
         - Naming Decisions als validiertes Identity-Mass
         - Within-Household Variation für Identifikation

    ebf_relevance:
      - WHO: Klassenidentität als Segmentierungsmerkmal
      - WHAT: Identity Utility (U_IDN) nach Akerlof-Kranton
      - HOW: Cultural Distance × Local Composition (γ < 0)
      - WHEN: Historischer Kontext, aber generalisierbarer Mechanismus
      - implications_for_behavior: "Gruppenidentität hängt von wahrgenommener Ähnlichkeit ab"

    domains:
