      ist heterogen: Pro-soziale Segmente reagieren stark, autonomie-orientierte können
      reaktant werden.

      '
    implication: 'Descriptive Norms ("So viel verbrauchen Ihre Nachbarn") + Injunctive
      Norms (Smiley/Frowney) kombinieren. Bei autonomie-orientierten Segmenten: Framing
      als eigene Wahl.

      '
    formulas:
