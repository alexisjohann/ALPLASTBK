  CAS-915:
    superkey: institution:detection:L2:preschool:ADHD:Medicaid:awareness_catalyst
    name: Preschool as Behavioral Health Detection Gateway (Medicaid RD)
    description: |
      Preschool entry facilitates early DIAGNOSIS of behavioral and developmental
      conditions in low-income children - NOT causing them. Using RD design with
      school-entry cutoff dates across 32 US states and 2.4M Medicaid children,
      preschool entry increases ADHD diagnoses by 16.9%, speech/language disorder
      diagnoses by 9.3%, and hearing/vision condition diagnoses by 14.8%. Effects
      are driven by children who also receive treatment, dissipate by age 10
      (timing not incidence), and are LARGER in areas with higher-quality preschool
      programs. Mechanism: institutional environment (trained teachers, structured
      setting, peer comparison) serves as an AWARENESS CATALYST for existing conditions.

    10C:
      WHO:
        levels: [individual, population]
        heterogeneity: medium
        segments: [Medicaid_children, low_income_families, boys_vs_girls]
        note: "2.4M children on Medicaid, 32 US states"
      WHAT:
        dimensions: [HLT, E, S]
        primary: behavioral_developmental_health
        note: "ADHD, speech/language, hearing/vision - diagnosis and treatment"
      HOW:
        gamma_avg: 0.0
        interaction: "additive - detection is independent across conditions"
        note: "No cross-condition complementarity detected"
      WHEN:
        psi_I: "school_entry_cutoff_RD"
        psi_S: "structured_classroom_with_trained_teachers"
        psi_T: "preschool_age_4-5"
        note: "Institutional context (Ψ_I) is the key detection enabler"
      WHERE:
        source: administrative_Medicaid_data
        confidence: high
        N: "~2,400,000 children, 32 states, 2008-2018"
      AWARE:
        A_level: 0.7
        awareness_type: institutional_detection
        note: "Preschool INCREASES awareness of existing conditions - A(·)↑"
      READY:
        W_level: 0.6
        theta: "treatment_follows_diagnosis"
        note: "12.2% increase in ADHD stimulant medication, 6.3% IDEA receipt"
      STAGE:
        phase: detection_early_childhood
        stability: medium
        note: "Effects at ages 4-6, dissipate by age 10 (timing shift)"
      HIERARCHY:
        primary_level: L2
        intervention_type: institutional_access

    domain:
    - health
    - education
    - policy
    - early_childhood
