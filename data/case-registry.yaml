cases:
  CAS-001:
    superkey: anthropology:structural:L2:complexity:cross-cultural:culture
    name: Internalisierte vs. Externalisierte Komplexität
    description: 'Vergleich der Entscheidungskomplexität zwischen westlichen Gesellschaften
      (externalisiert in Institutionen) und Stammesgesellschaften (internalisiert
      im Individuum).

      '
    10C:
      WHO:
        levels:
        - individual
        - society
        heterogeneity: high
        segments:
        - cross-cultural
      WHAT:
        dimensions:
        - S
        - E
        primary: cognitive_load
      HOW:
        gamma_avg: 0.6
        interaction: complementary
      WHEN:
        psi_dominant: culture
        temporal: stable
      WHERE:
        source: literature
        confidence: medium
      AWARE:
        A_level: 0.3
        awareness_type: implicit
      READY:
        W_level: null
        theta: null
      STAGE:
        phase: null
        stability: high
      HIERARCHY:
        primary_level: L2
        N_L2_western: 2.6
        N_L2_tribal: 4.9
        complexity_location:
        - internal
        - external
    domain:
    - anthropology
    - cross-cultural
    - complexity
    tags:
    - complexity
    - externalization
    - kinship
    - cognition
    - WEIRD
    - indigenous
    insight: 'Komplexität verschwindet nicht - sie verlagert sich zwischen System
      (Institutionen) und Individuum (kognitive Last).

      '
    implication: 'Interventionsdesign muss die Lokation der Komplexität berücksichtigen.
      In Stammesgesellschaften: weniger explizite Regeln, mehr Kontextarbeit. In westlichen
      Gesellschaften: mehr Systemdesign, weniger individuelle Schulung.

      '
    formulas:
    - name: L2-Formel (Westlich)
      formula: N_L2 = 1.0 × 0.4 × 100 × (1-0.7) / log(100) ≈ 2.6
      variables:
        alpha: 1.0
        gamma_avg: 0.4
        n: 100
        m: 0.7
    - name: L2-Formel (Tribal)
      formula: N_L2 = 1.5 × 0.6 × 25 × (1-0.3) / log(25) ≈ 4.9
      variables:
        alpha: 1.5
        gamma_avg: 0.6
        n: 25
        m: 0.3
    references:
      appendices:
      - V
      - AAA
      - HI
      chapters:
      - 15
      cases: []
      literature:
      - henrich2010weirdest
      - diamond1997guns
    source_paper: null
  CAS-002:
    superkey: finance:contemplation:L2:default:present-biased:choice_architecture
    name: Automatische Altersvorsorge (Opt-Out)
    description: 'Klassisches Nudge-Beispiel: Default-Enrollment in betriebliche Altersvorsorge
      erhöht Teilnahmequote von ~50% auf >90%.

      '
    10C:
      WHO:
        levels:
        - individual
        heterogeneity: medium
        segments:
        - present-biased
        - loss-averse
      WHAT:
        dimensions:
        - F
        - P
        primary: financial_security
      HOW:
        gamma_avg: 0.5
        interaction: complementary
      WHEN:
        psi_dominant: choice_architecture
        temporal: static
      WHERE:
        source: empirical
        confidence: high
      AWARE:
        A_level: 0.4
        awareness_type: mixed
      READY:
        W_level: 0.6
        theta: 0.3
      STAGE:
        phase: contemplation
        stability: medium
      HIERARCHY:
        primary_level: L2
        N_L2: 1
        intervention_type: default
    domain:
    - finance
    - retirement
    - workplace
    tags:
    - nudge
    - default
    - opt-out
    - savings
    - pension
    - thaler
    insight: 'Present Bias und Status Quo Bias können durch intelligente Defaults
      überwunden werden, ohne Wahlfreiheit einzuschränken.

      '
    implication: 'Opt-Out statt Opt-In als Default setzen. Funktioniert besonders
      gut bei present-biased Segmenten mit mittlerer Awareness.

      '
    formulas:
    - name: Teilnahme-Effekt
      formula: P(enroll|opt-out) - P(enroll|opt-in) ≈ 0.40
      variables:
        baseline_opt_in: 0.5
        with_opt_out: 0.9
    references:
      appendices:
      - S
      - W
      - AO
      chapters:
      - 17
      - 18
      cases:
      - CASE-003
      literature:
      - thaler2008nudge
      - madrian2001power
    source_paper: thaler1985mental
  CAS-003:
    superkey: health:precontemplation:L1:default:general:legal_framework
    name: 'Organspende: Opt-In vs. Opt-Out Länder'
    description: 'Länder mit Opt-Out (Widerspruchslösung) haben 90%+ Spenderquote,
      Opt-In Länder oft unter 20%. Zeigt Macht des Defaults.

      '
    10C:
      WHO:
        levels:
