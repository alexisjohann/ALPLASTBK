        countries: ["USA"]
        parameter_source: "PAP-ash2025interviews"
        methodology: "LLM narrative analysis + Field Experiment"

      AWARE:
        awareness_type: "Worker inference from interview experience"
        salience: "Interview difficulty is salient signal"
        A_mechanism: "Workers consciously interpret difficulty as quality signal"

      READY:
        applicability: "Hiring, HR, AI recruitment"
        action_relevance: "Candidates decide based on interview experience"
        W_level: "Accept/Reject offer based on perceived difficulty"

      STAGE:
        phenomenon_stage: "Hiring process (pre-employment)"
        intervention_window: "Interview design as intervention"

    domain: labor_economics
    subdomain: hiring_matching

    key_finding: |
      INTERVIEWS SIND BIDIREKTIONAL - nicht nur Firmen lernen über Worker,
      sondern Worker lernen auch über Firmen!

      EMPIRISCHE BEFUNDE (Glassdoor 500k):
      1. Kandidaten für hochbezahlte Jobs lehnen Angebote nach
         EINFACHEN Interviews häufiger ab

      2. Wer nach einfachem Interview annimmt:
         - 0.4 SD WENIGER zufrieden mit dem Job
         - 10% WENIGER wahrscheinlich nach 1 Jahr noch da

      3. LLM-Analyse der Interview-Narrative:
         - Schwierige Interviews → "colleague ability" Signal
         - Einfache Interviews → "nonselective process" Signal

      4. RCT: Exogene Erhöhung der Schwierigkeit →
         - Höhere wahrgenommene Schwierigkeit
         - MEHR Engagement der Bewerber mit der Stelle

    ebf_relevance:
      - AWARE: Interview als Informationskanal für Worker
      - HOW: Bidirektionale Signaling-Complementarity
      - theory_extension: "Erweitert Spence (1973) um Worker-Seite"
      - implications_for_behavior: "Interview experience shapes job acceptance and satisfaction"

    domains:
      - labor_economics
      - hiring
      - information_economics
      - signaling
      - job_matching

    tags:
      - interviews
      - signaling
      - bidirectional
      - job_satisfaction
      - retention
      - glassdoor
      - LLM_analysis
      - field_experiment
      - peer_effects
      - colleague_quality
      - AI_hiring

    insight: |
      Das klassische Signaling-Modell (Spence 1973) fokussiert darauf, wie
      WORKER an FIRMEN signalisieren (Bildung als Signal). Dieses Paper
      zeigt die UMKEHRUNG: Firmen signalisieren auch an Worker!

      Ein einfaches Interview signalisiert:
      "Wir sind nicht selektiv → Deine zukünftigen Kollegen sind
      wahrscheinlich nicht besonders gut"

      Dies erklärt, warum gute Kandidaten nach einfachen Interviews:
      1. Angebote ablehnen (sie inferieren schlechte Kollegen)
      2. Falls sie annehmen: weniger zufrieden sind (Erwartungen bestätigt)
      3. Schneller wieder gehen (Match war tatsächlich schlechter)

    implication: |
      1. HIRING DESIGN: Interviews sollten NICHT zu einfach sein!
         Schwierigkeit ist ein Signal für Qualität.

      2. AI AUTOMATION RISK: Wenn AI-Interviews "zu einfach" wirken,
         könnten Firmen GUTE Kandidaten verlieren. "Labor markets may
         become less efficient if firms automate hiring with AI."

      3. CANDIDATE EXPERIENCE: Die Interview-Erfahrung IST Teil des
         Job-Previews - nicht nur Assessment-Tool.

      4. EBF-MODELLIERUNG: Interview-Schwierigkeit als Ψ-Dimension
         (AWARE Channel für Worker Learning).

      5. PEER EFFECTS: Interview signalisiert zukünftige Kollegen-Qualität
         → Social Preferences (C.S) werden aktiviert.

    formulas:
      - name: "Satisfaction Gap (Easy vs Difficult)"
        formula: "ΔSatisfaction = E[S|easy] - E[S|difficult] ≈ -0.4 SD"
        variables:
          S: "Job Satisfaction"
          easy: "Easy interview indicator"
          difficult: "Difficult interview indicator"

      - name: "Retention Gap"
        formula: "ΔRetention = P(stay 1yr|easy) - P(stay 1yr|difficult) ≈ -0.10"
        variables:
