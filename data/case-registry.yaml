  CAS-891:
    superkey: moral:awareness:L2:narrative:prosocial:network
    name: Moral Narratives and Prosocial Behavior
    description: |
      Moral justifications (narratives) and categorical rules (imperatives) shape prosocial 
      behavior through distinct mechanisms. Negative narratives ("excuses") are strategic 
      substitutes - when one person adopts an excuse, others benefit less from the same excuse. 
      Positive narratives ("responsibilities") are strategic complements - they reinforce 
      each other through social networks. Network mixing (lower segregation) increases 
      prosocial behavior by exposing agents to moral exemplars.

    10C:
      WHO:
        levels:
        - individual
        - network
        heterogeneity: high
        segments:
        - prosocial
        - selfish
      WHAT:
        dimensions:
        - S
        - P
        primary: image_utility
      HOW:
        gamma_avg: null
        interaction: |
          Positive narratives: γ > 0 (complements)
          Negative narratives: γ < 0 (substitutes)
      WHEN:
        psi_dominant: network_structure
        temporal: persistent
      WHERE:
        source: theoretical
        confidence: high
      AWARE:
        A_level: 0.7
        awareness_type: explicit
      READY:
        W_level: 0.6
        theta: 0.5
      STAGE:
        phase: action
        stability: medium
      HIERARCHY:
        primary_level: L2
        network_effect: true

    domain:
    - moral_behavior
    - prosocial
    - social_networks
    - narratives

    tags:
    - narrative
    - imperative
    - moral_reasoning
    - network
    - image_concern
    - self_control
    - strategic_complementarity
    - Benabou
    - Falk
    - Tirole

    insight: |
      Moral behavior depends not just on preferences but on the "stories we tell ourselves." 
      Negative narratives (excuses) spread virally but face diminishing returns - the more 
      people use an excuse, the less convincing it becomes. Positive narratives (duties) 
      strengthen each other through social reinforcement.

    implication: |
      Intervention design implications:
      1. To increase prosocial behavior, promote positive narratives (duties, responsibilities)
         rather than trying to debunk excuses
      2. Reduce network segregation (echo chambers) to expose people to moral exemplars
      3. Leverage moral authority for imperatives when available
      4. Image concerns (μ) can be powerful motivators - make prosocial behavior visible
      5. Address self-control issues (β) separately from narrative interventions

    formulas:
    - name: Utility with Image Concern
      formula: U = (ve - c/β)a + μv̂(a)
      variables:
        v: true moral value
        e: externality (benefit to others)
        c: cost of moral action
        beta: self-control parameter (≤1)
        mu: image concern weight
        v_hat: inferred type based on action
        a: action (0 or 1)

    - name: Network Transmission of Negative Narratives
      formula: N⁻_A = π(1-x) / [1 - ρ(1-x)]
      variables:
        pi: share of type-A (selfish) in population
        x: share who have adopted narrative
        rho: network persistence (segregation)

    - name: Strategic Complementarity/Substitutability
      formula: |
        ∂²Π/∂nᵢ∂nⱼ < 0 for negative narratives (substitutes)
        ∂²Π/∂nᵢ∂nⱼ > 0 for positive narratives (complements)

    references:
      appendices:
      - RB
      - FAL
      - JT
      - AU
      - B
      chapters:
      - 10
      - 11
      cases: []
      literature:
      - benabou_2018_narratives

    source_paper: benabou_2018_narratives
    theory_id: MS-IB-013
    parameters:
      - PAR-BEH-014
      - PAR-BEH-015
      - PAR-BEH-003

  CAS-902:
    superkey: organizational:help_seeking:L2:fear_of_asking:workplace:social_image
    name: Fear of Asking in Workplace Help-Seeking
    description: |
      Employees hesitate to ask supervisors or colleagues for help due to fear of rejection.
      The discouragement effect shows that if potential helpers don't proactively offer,
      workers are even less likely to ask. This creates a "waiting trap" equilibrium where
      help goes unasked and unoffered despite mutual gains from trade.

    10C:
      WHO:
        levels:
        - individual
        - dyad
        heterogeneity: high
        segments:
        - employees
        - subordinates
        - new_hires
      WHAT:
        dimensions:
        - S
        - E
        - P
        primary: self_image
      HOW:
        gamma_avg: 0.4
        interaction: |
          Asking-Offering Complementarity (CMP-12):
          γ(offer, ask) > 0 when rejection costs low
          γ(offer, ask) < 0 when rejection costs high (waiting trap)
      WHEN:
        psi_dominant: organizational_hierarchy
        temporal: repeated
      WHERE:
        source: theoretical
        confidence: high
      AWARE:
        A_level: 0.6
        awareness_type: explicit
      READY:
        W_level: 0.5
        theta: 0.4
      STAGE:
        phase: contemplation
        stability: low
      HIERARCHY:
        primary_level: L2
        N_L2: 2
        power_distance: relevant

    domain:
    - organizational
    - workplace
    - help_seeking
    - social_interaction

    tags:
    - fear_of_rejection
    - discouragement_effect
    - waiting_trap
    - workplace_help
    - asking_threshold
    - offering_threshold
    - Benabou
    - Loewenstein

    insight: |
      Fear of rejection creates non-monotonic asking behavior: moderate-need individuals
      may ask LESS than low-need individuals because the information revealed by rejection
      is more painful when need is salient. The discouragement effect means that when
      potential helpers don't offer, it signals low generosity, making rejection more
      likely and thus asking more costly.

    implication: |
      Intervention design implications:
      1. Proactive offering: Managers should offer help before employees need to ask
      2. Reduce rejection visibility: Anonymous channels for help requests
      3. Default to help: Create norms where help is expected unless declined
      4. Separate asking from need revelation: Normalize help-seeking regardless of need
      5. Address power distance: Higher hierarchy increases fear of asking

    formulas:
    - name: Receiver Utility
      formula: U_R(h, F) = wh + ψ(F)
      variables:
        w: need level (private information)
        h: help received (0 or 1)
        F: outcome (Accept, Deny, No-interaction, Offer)
        psi: psychological payoff from outcome

    - name: Asking Threshold
      formula: w* = λα[M⁺_N(ĝ(w*)) - ḡ_N]
      variables:
        w_star: critical need level for asking
        lambda: rejection sensitivity (loss aversion in self-image)
        alpha: informational content scaling
        M_plus_N: conditional mean generosity given rejection
        g_bar_N: average generosity when no offer made

    - name: Discouragement Effect
      formula: w*_N > w*_O when π < 1
      variables:
        w_star_N: asking threshold after no offer
        w_star_O: asking threshold if offer possible
        pi: probability of offer

    - name: Fear of Rejection
      formula: ψ(reject) = -λα[g̃ - ḡ_N] < 0
      variables:
        psi_reject: psychological cost of rejection
        g_tilde: threshold below which Sender rejects
        g_bar_N: average generosity when no offer made

    references:
      appendices:
      - RB
      - AU
      - B
      - AAA
      chapters:
      - 5
      - 14
      cases: []
      literature:
      - benabou_2022_hurts_ask

    source_paper: benabou_2022_hurts_ask
    theory_id: MS-IB-018
    parameters:
      - PAR-BEH-016
      - PAR-BEH-017
      - PAR-BEH-014

  CAS-903:
    superkey: moral:ethics:L2:evm:kantian_utilitarian:no_stable_types
    name: Ends-versus-Means Games - No Stable Moral Types
    description: |
      Four novel Ends-versus-Means (EVM) games pit deontological ethics against consequentialist
      ethics. Results show 20-44% choose deontological options, but choices are essentially
      UNCORRELATED across contexts (r ≈ 0.035). This contradicts theories of stable "Kantian"
      or "Utilitarian" moral types. Additionally, EVM choices are orthogonal to prosocial
      behavior and unrelated to rule-following propensity.

    10C:
      WHO:
        levels:
        - individual
        heterogeneity: context_driven
        segments:
        - all_adults
        note: No stable Kantian vs Utilitarian types - heterogeneity is WITHIN-person across contexts
      WHAT:
        dimensions:
        - S
        - P
        primary: moral_utility
        formula: U_moral = θ·U_outcome + (1-θ)·U_rule
      HOW:
        gamma_avg: 0.035
        interaction: |
          CRITICAL NEGATIVE RESULT: γ(EVM_i, EVM_j) ≈ 0
          Moral reasoning shows NO cross-context complementarity.
          This contradicts typical behavioral parameter patterns.
      WHEN:
        psi_dominant: context_determines_theta
        temporal: varies_by_context
        note: θ = f(Ψ) - consequentialism weight depends on context
      WHERE:
        source: experimental
        confidence: high
        parameters:
        - PAR-MR-001
        - PAR-MR-002
        - PAR-MR-003
        - PAR-MR-004
      AWARE:
        A_level: 0.35
        awareness_type: explicit
        note: A_moral varies 20-44% across contexts
      READY:
        W_level: null
        theta: varies
      STAGE:
        phase: action
        stability: context_dependent
      HIERARCHY:
        primary_level: L2
        N_L2: 2
        note: Decision involves ends vs means tradeoff

    domain:
    - moral_psychology
    - ethics
    - behavioral_economics
    - experimental_economics

    tags:
    - deontology
    - consequentialism
    - kantian
    - utilitarian
    - EVM_games
    - trolley_problem
    - rule_following
    - moral_types
    - context_dependence
    - Benabou
    - Falk
    - Henkel

    insight: |
      There are NO stable moral "types". The same individual may be deontological in one
      context (e.g., lying game: 44%) and consequentialist in another (e.g., group donation: 80%).
      Cross-context correlations are effectively zero (r ≈ 0.035), meaning moral reasoning
      is fundamentally context-dependent, not trait-like. Furthermore, moral reasoning (EVM)
      is orthogonal to prosociality - a person can be highly altruistic but consequentialist,
      or selfish but deontological.

    implication: |
      Intervention design implications:
      1. Cannot design interventions assuming stable moral types (Kantian vs Utilitarian)
      2. Moral messaging must be context-specific, not person-specific
      3. Prosocial interventions ≠ moral reasoning interventions (orthogonal constructs)
      4. Rule-following compliance interventions ≠ moral rule interventions
      5. Frame deontological options differently across contexts
      6. γ ≈ 0 means moral interventions do NOT transfer across contexts

    formulas:
    - name: Moral Utility Decomposition
      formula: U_moral = θ·U_outcome + (1-θ)·U_rule
      variables:
        theta: consequentialism weight (context-dependent, ∈ [0,1])
        U_outcome: utility from consequences
        U_rule: utility from rule-adherence

    - name: Cross-Context Correlation
      formula: r_EVM = Corr(EVM_i, EVM_j) ≈ 0.035
      variables:
        r_EVM: average correlation across 4 EVM games
        interpretation: effectively zero - no stable types

    - name: EVM-Prosociality Independence
      formula: r(EVM, prosocial) ≈ 0.025
      variables:
        r: correlation between EVM and prosocial behavior
        interpretation: orthogonal constructs

    - name: Context-Dependent θ
      formula: θ = f(Ψ_S, Ψ_I, Ψ_E, Ψ_C)
      variables:
        Psi_S: social visibility context
        Psi_I: institutional/rule framing
        Psi_E: stakes magnitude
        Psi_C: cognitive framing

    references:
      appendices:
      - RB
      - AU
      - V
      - B
      - K
      chapters:
      - 5
      - 9
      cases:
      - CAS-902
      literature:
      - benabou_2024_ends_means

    source_paper: benabou_2024_ends_means
    theory_id: MS-MR-001
    parameters:
      - PAR-MR-001
