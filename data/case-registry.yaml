    insight: |
      Leaders process group-relevant decisions differently at the neural level.
      The responsibility for others activates distinct value computation circuits,
      suggesting that leadership is not simply scaled-up individual decision-making.

    implication: |
      For organizational design: (1) Leadership selection should consider 
      neural predisposition for group-oriented value computation; (2) Training
      programs should focus on activating responsibility circuits; (3) Decision
      contexts should emphasize group impact to improve leadership quality.

