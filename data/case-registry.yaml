    - name: Critical Period Effect
      formula: ∂Y/∂I_t ≠ ∂Y/∂I_{t'} für t ≠ t' (age-dependent returns)
      variables:
        Y: long_term_outcome
        I_t: investment_at_age_t
        critical_period: first_1000_days
    - name: Multidimensional Complementarity
      formula: γ_{cog,soc} > 0, γ_{cog,health} > 0, γ_{soc,nutrition} > 0
      variables:
