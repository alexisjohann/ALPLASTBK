  CAS-874:
    superkey: methodology:fixing_conditioning:simultaneity:structural_equations
    name: Fixing vs Conditioning - Econometric Causality
    description: |
      Comprehensive comparison of Econometric, Neyman-Rubin, and Pearl frameworks.
      Only econometric approach handles simultaneity (DAGs are acyclic).
      LATE is instrument-dependent and not policy-relevant for P3-P4.

    10C:
      WHO:
        levels: [researcher, policy_maker]
        heterogeneity: low
        segments: [quantitative]
      WHAT:
        dimensions: [E]
        primary: causal_inference
      HOW:
        gamma_avg: null
        interaction: structural
      WHEN:
        psi_dominant: methodology
        temporal: stable
      WHERE:
        source: theoretical
        confidence: high
      AWARE:
        A_level: 0.9
        awareness_type: explicit
      READY:
        W_level: null
        theta: null
      STAGE:
        phase: null
        stability: high
      HIERARCHY:
        primary_level: methodology
        intervention_type: framework

    domain: [methodology, econometrics, causality]
    tags: [fixing, conditioning, simultaneity, DAG, LATE, supply_demand]
    insight: |
      Fixing changes the DGP (intervention). Conditioning selects from distribution.
      DAGs cannot represent feedback loops (acyclic by definition).
    implication: |
      Use structural equations for systems with feedback. LATE identifies
      complier effects, not policy effects. Structural parameters for P3-P4.

    formulas:
      - name: Fixing vs Conditioning
        formula: P(Y | Fixing(A=a)) ≠ P(Y | A=a)
        variables:
          Y: outcome
          A: treatment variable

    references:
      appendices: [HOW, V, METHOD]
      chapters: [methodology]
      cases: [CAS-870]
      literature: [PAP-heckman2022econometrics, PAP-heckman2024causality]
    source_paper: PAP-heckman2022econometrics

  CAS-875:
    superkey: health:addiction:education:structural_model:bidirectional
    name: Cigarette Addiction and Education (Bidirectional Causality)
    description: |
      Structural life-cycle model combining Becker-Murphy addiction with
      Keane-Wolpin human capital. Key innovation: endogenous discount factor
      β(q,θ) where addiction increases myopia. +1 year education → -8pp smoking.

    10C:
      WHO:
        levels: [individual]
        heterogeneity: high
        segments: [smokers, non_smokers, high_noncog, low_noncog]
      WHAT:
        dimensions: [F, P, D]
        primary: addiction_education_tradeoff
      HOW:
        gamma_avg: -0.4
        interaction: bidirectional_negative
      WHEN:
        psi_dominant: life_cycle
        temporal: dynamic
      WHERE:
        source: structural_estimation
        confidence: high
      AWARE:
        A_level: 0.5
        awareness_type: mixed
      READY:
        W_level: 0.4
        theta: 0.3
      STAGE:
        phase: youth_adult_transition
        stability: dynamic
      HIERARCHY:
        primary_level: L1
        intervention_type: education_tax

    domain: [health, education, addiction, structural]
    tags: [rational_addiction, endogenous_beta, non_cognitive, cigarettes, NLSY97]
    insight: |
      Non-cognitive skills (self-control) are PRIMARY driver of quitting.
      Cognitive skills matter little directly. 40% excise tax ≈ eliminating smoking.
    implication: |
      Target medium-ability individuals for maximum impact. Non-cog more important
      for avoiding harm than for education itself.

    formulas:
      - name: Endogenous Discount Factor
        formula: β(q,e,t,θ) = exp(-φ_{e,t}) · exp(-κ_q · q) · exp(-κ_r + κ_c·θ_c + κ_n·θ_n)
        variables:
          q: addiction stock
          e: education
          θ_c: cognitive ability
          θ_n: non-cognitive ability
          κ_q: addiction effect on myopia

      - name: Addiction Stock Dynamics
        formula: q_t = (1 - δ_q) · q_{t-1} + d_{q,t-1}
        variables:
          δ_q: depreciation rate (0.433)
          d_q: smoking decision

    references:
      appendices: [HOW, WHEN, V, WHERE]
      chapters: [addiction, education]
      cases: []
      literature: [PAP-hai2025cigarette, beckermurphy1988addiction, keanewolpin1997]
    source_paper: PAP-hai2025cigarette

  CAS-876:
    superkey: social_preferences:fairness:L1:inequity_aversion:experimental:game_theory
    name: Fehr-Schmidt Inequity Aversion Model
    description: |
      The foundational model explaining why people reject unfair offers in ultimatum
      games, contribute to public goods, and punish free-riders - even at personal cost.
      People have preferences for fairness: they dislike being behind (α) AND being 
      ahead (β), but being behind hurts more.

    10C:
      WHO:
        levels:
        - individual
        heterogeneity: high
        segments:
        - selfish (30%)
        - moderate (30%)
        - fair (30%)
        - strong (10%)
      WHAT:
        dimensions:
        - S
        - F
        primary: social_utility
        U_function: "U_i = x_i - α·max(x_j-x_i,0) - β·max(x_i-x_j,0)"
      HOW:
        gamma_avg: 0.7
        interaction: complementary
        social_component: inequity_aversion
      WHEN:
        psi_dominant: social_context
        temporal: stable
      WHERE:
        source: experimental
        confidence: very_high
        replications: ">100"
      AWARE:
        A_level: 0.6
        awareness_type: implicit_fairness_norm
      READY:
        W_level: 0.7
        theta: context_dependent
      STAGE:
        phase: decision
        stability: high
      HIERARCHY:
        primary_level: L1
        decision_type: interpersonal

    domain:
    - social_preferences
    - behavioral_economics
    - game_theory
    - experimental_economics

    tags:
    - inequity_aversion
    - fairness
    - ultimatum_game
    - public_goods
    - gift_exchange
    - social_preferences
    - foundational

    insight: |
      People are not purely selfish. About 70% exhibit inequity aversion, disliking
      both disadvantageous (being behind) and advantageous (being ahead) inequality.
      The key insight: α > β means being behind hurts MORE than being ahead helps.

    implication: |
      Design mechanisms that account for fairness concerns. Unfair offers will be
      rejected even when acceptance is rational. In workplaces, perceived pay inequity
      reduces effort. In public goods, allow punishment of free-riders to sustain 
      cooperation.

    formulas:
      - name: Fehr-Schmidt Utility Function
        formula: U_i = x_i - α_i·max{x_j - x_i, 0} - β_i·max{x_i - x_j, 0}
        variables:
          x_i: own material payoff
          x_j: other's material payoff
          α_i: disadvantageous inequity aversion (mean ≈ 0.85)
          β_i: advantageous inequity aversion (mean ≈ 0.315)

      - name: Constraint
        formula: α_i ≥ β_i, 0 ≤ β_i < 1
        variables:
          note: Being behind always hurts more than being ahead

    references:
      appendices: [WHAT, HOW, WHERE]
      chapters: [social_preferences, fairness]
      cases: []
      literature:
        - PAP-fehr1999theory
        - PAP-bolton2000erc
        - PAP-charness2002understanding
    source_paper: PAP-fehr1999theory

