  CAS-862:
    superkey: development:technology_adoption:absorptive_capacity:institutions:frontier
    name: "Technologie-Adoption und Wirtschaftsentwicklung (Acemoglu, Akcigit & Johnson 2026)"
    type: theoretical_framework

    10C:
      WHO:
        levels: [country, firm]
        segments: [developing_countries, frontier_countries, firms_behind_frontier]
        primary_level: country
        description: "Länder hinter der Technologie-Frontier, Firmen in Entwicklungsländern"

      WHAT:
        utility_dimensions:
          productivity: "Technologieniveau, TFP"
          income: "BIP pro Kopf"
          growth: "Langfristiges Wachstum"
        C_ij:
          frontier_distance: "Distanz zur Technologie-Frontier"
          adoption_rate: "Geschwindigkeit der Technologie-Übernahme"
          income_gap: "BIP/Kopf relativ zur Frontier"

      HOW:
        gamma_avg: null
        interaction: "Barriers × Frontier Access"
        mechanism: |
          VIER BARRIEREN FÜR TECHNOLOGIE-ADOPTION:

          1. ABSORPTIVE CAPACITY ↓
             - Schwaches Bildungssystem
             - Schlechte Management-Praktiken
             - Barrieren zur Technologie-Übernahme

          2. INSTITUTIONAL DISTORTIONS
             - Regulierung
             - Property Rights
             - Korruption

          3. INAPPROPRIATE TECHNOLOGY
             - Mismatch: Frontier-Tech passt nicht zu lokalen Bedürfnissen
             - Skill-Mismatch
             - Infrastruktur-Mismatch

          4. CREDIT MARKET FRICTIONS
             - Finanzierungsbarrieren
             - Mangelnder Zugang zu Kapital

          ZENTRALE EINSICHT:
          ┌─────────────────────────────────────────────────────────────┐
          │  Barrieren → Grössere Distanz zur Frontier                 │
          │           → Niedrigeres BIP/Kopf                           │
          │  ABER: Langfristiges Wachstum = Frontier-Wachstum!        │
          │        (Catch-up ist möglich)                              │
          └─────────────────────────────────────────────────────────────┘

      WHEN:
        psi_dominant: distance_to_frontier
        temporal_scope: "Long-run growth dynamics"
        geographic_scope: "Global (developing vs. frontier)"
        T_constraint: "Steady-state convergence"

      WHERE:
        data_sources: "Cross-country data, Firm-level data"
        countries: ["developing_countries", "frontier_countries"]
        level: "Country and firm"
        parameter_source: "PAP-acemoglu2026technology"
        data_quality: "Correlational illustrations"

      AWARE:
        awareness_type: "Policy makers, development practitioners"
        salience: "Framework macht Barrieren explizit"
        A_intervention: "Diagnose-Tool für Entwicklungshindernisse"

      READY:
        applicability: "Entwicklungspolitik, Bildungsreform, Institutionenreform"
        action_relevance: "Identifiziert Policy-Hebel für Catch-up"
        W_level: "Framework zeigt: Catch-up ist möglich wenn Barrieren reduziert"

      STAGE:
        phenomenon_stage: "Framework für Analyse"
        intervention_window: "Kontinuierlich (jede Barriere adressierbar)"

    domain: development_economics
    subdomain: technology_adoption

    key_finding: |
      TRACTABLE FRAMEWORK FÜR TECHNOLOGIE-ADOPTION:

      1. AUSGANGSLAGE:
         - Firmen hinter der Frontier KÖNNEN Technologie übernehmen
         - Aber vier Barrieren verlangsamen den Prozess

      2. DIE VIER BARRIEREN:

         ABSORPTIVE CAPACITY:
         - Bildungssystem zu schwach
         - Management-Praktiken ineffizient
         - "Know-how" fehlt zur Übernahme

         INSTITUTIONAL DISTORTIONS:
         - Schwache Property Rights
         - Korruption, Regulierung
         - Falsche Anreize

         INAPPROPRIATE TECHNOLOGY:
         - Frontier-Tech passt nicht
         - Skill-Profile unterschiedlich
         - Infrastruktur fehlt

         CREDIT FRICTIONS:
         - Kein Zugang zu Kapital
         - Investment-Barrieren

      3. KONSEQUENZEN:
         - Grössere Distanz zur Frontier
         - Niedrigeres BIP/Kopf (Level-Effekt)
         - ABER: Langfristiges Wachstum = Frontier (Growth-Effekt)

      4. ERWEITERUNGEN:
         - Innovation vs. Imitation Choice
         - Selection: High-productivity Firmen überleben
         - Absorptive Capacity als Firm-Level Heterogenität

    ebf_relevance:
      - HOW: Barrieren interagieren (nicht einfach additiv)
      - WHEN: "Distance to Frontier" als kritischer Kontext
      - WHERE: Firm-level Heterogenität innerhalb von Ländern
      - implications_for_behavior: "Technologie-Adoption ist nicht automatisch - aktive Policy nötig"

    domains:
      - development_economics
      - technology_adoption
      - economic_growth
      - innovation
      - institutional_economics

    tags:
      - technology_adoption
      - absorptive_capacity
      - institutional_distortions
      - inappropriate_technology
      - credit_frictions
      - frontier
      - catch_up_growth
      - innovation
      - imitation
      - firm_selection
      - Acemoglu
      - Akcigit
      - Johnson
      - NBER

    insight: |
      Das Acemoglu-Akcigit-Johnson Framework liefert eine wichtige Strukturierung:

      WARUM BLEIBEN LÄNDER ZURÜCK?

      Die Antwort ist nicht "sie können nicht" sondern "vier Barrieren verlangsamen":
      1. Absorptive Capacity (Können sie lernen?)
      2. Institutions (Dürfen sie?)
      3. Appropriateness (Passt es?)
      4. Credit (Können sie finanzieren?)

      Für EBF bedeutet das:
      - WHEN (Ψ): "Distance to Frontier" ist ein kritischer Kontextfaktor
      - HOW (γ): Barrieren interagieren - eine allein reicht nicht
      - WHO: Firm-level Heterogenität (einige Firmen schaffen es trotzdem)

      Das optimistische Element:
      → Langfristiges Wachstum kann Frontier erreichen
      → Catch-up ist MÖGLICH wenn Barrieren reduziert werden
      → Keine "Poverty Traps" im engeren Sinne

    implication: |
      1. DIAGNOSE-TOOL: Für jedes Entwicklungsland die vier Barrieren
         systematisch analysieren. Welche bindet am meisten?

      2. POLICY-PRIORISIERUNG:
         - Absorptive Capacity: Bildungsinvestitionen, Management-Training
         - Institutions: Governance-Reform, Property Rights
         - Appropriateness: Angepasste Technologien fördern
         - Credit: Finanzsektor-Entwicklung

      3. FIRM-LEVEL PERSPECTIVE:
         - Nicht alle Firmen gleich betroffen
         - High-productivity Firmen können trotz Barrieren adoptieren
         - Selection-Mechanismus: Diese Firmen wachsen

      4. EBF INTEGRATION:
         - Framework integriert in DOMAIN-DEVELOPMENT
         - Verbindet mit Institutional Economics (MS-IE-xxx)
         - Verbindet mit Growth Theory (MS-GR-xxx)

      5. LANGFRIST-OPTIMISMUS:
         - Kein permanentes Zurückbleiben
         - Mit richtigen Policies ist Konvergenz möglich

    formulas:
      - name: "Distance to Frontier"
        formula: "A_t / A_t^F = steady-state ratio < 1"
        variables:
          A_t: "Technologieniveau des Landes"
          A_t_F: "Frontier-Technologieniveau"
          ratio: "Konstant im Steady State (Level-Effekt)"

      - name: "Long-run Growth"
        formula: "g_A = g_A^F (im Steady State)"
        variables:
          g_A: "Wachstumsrate des Landes"
          g_A_F: "Wachstumsrate der Frontier"
          implication: "Konvergenz der Wachstumsraten, nicht der Levels"

      - name: "Adoption with Barriers"
        formula: "A_t+1 = A_t + λ(θ, ι, μ, φ) × (A_t^F - A_t)"
        variables:
          lambda: "Adoptionsrate, abhängig von Barrieren"
          theta: "Absorptive Capacity"
          iota: "Institutional Quality"
          mu: "Technology Appropriateness"
          phi: "Credit Access"

