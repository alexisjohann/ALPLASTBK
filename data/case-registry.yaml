    - gans
    - goldfarb
    insight: 'O-Ring = MULTIPLIKATIVE Komplementarität (γ → 1). Dies ist die STÄRKSTE

      Form von Komplementarität im EBF. Wenn eine Task-Qualität auf 0 fällt,

      fällt der GESAMTE Output auf 0 (daher "O-Ring" - Challenger-Analogie).

      Implikation: Man kann nicht Task für Task analysieren. Automatisierung

      einer Task verändert den Wert ALLER anderen Tasks. Dies invalidiert

      lineare Aggregation (wie in Standard-Exposure-Indizes).

      '
    implication: 'Für EBF: O-Ring ist das Extrem von HOW (γ = 1). Zeigt, dass Komplementarität

      qualitativ andere Schlussfolgerungen erzeugt als Separabilität.

      Für AI-Policy: Exposure-Indizes (linear aggregiert) sind BIASED nach oben

      bei Komplementarität. Fokus sollte auf Bottleneck-Struktur liegen.

      Für Arbeitsmarkt: Partielle Automatisierung kann Arbeitseinkommen ERHÖHEN,

      weil Workers sich auf Bottleneck-Tasks fokussieren können.

      '
    formulas:
    - name: O-Ring Production
      formula: Y = ∏_{i=1}^{n} q_i (multiplicative, not additive)
      variables:
        Y: total_output
        q_i: quality_of_task_i
        implication: if any q_i → 0, then Y → 0
    - name: Focus Mechanism
      formula: ∂(Return to automate task j)/∂(Automate task i) ≠ 0
      variables:
        mechanism: cross_task_interdependence
        implication: bundled adoption optimal
    - name: Bottleneck Scaling
      formula: Labour Income ∝ q_bottleneck × (time freed by automation)
      variables:
        effect: can_be_positive
        condition: partial automation + focus on bottleneck
    - name: Exposure Index Bias
      formula: E[Displacement|linear] > E[Displacement|O-ring] when γ > 0
      variables:
        bias_direction: overestimation
        cause: ignores_complementarity
    references:
      appendices:
      - B
      - C
      - AA
      chapters: []
      cases:
      - CASE-849
      literature:
      - gans2026oring
    source_paper: gans2026oring
  CAS-851:
    superkey: markets:action:L2:llm-market:firm:differentiation
    name: 'LLM-Markt: Preisheterogenität und Produktdifferenzierung trotz Open-Source-Disruption'
    description: 'Der aufkommende Markt für Large Language Models (LLMs) zeigt sechs
      zentrale

      Strukturmerkmale: (1) SCHNELLES WACHSTUM bei Modellen, Anbietern und

      Inferenz-Providern, getrieben durch Open-Source-Akteure. (2) PREISVERFALL

      mit persistenter HETEROGENITÄT - Open-Source-Modelle sind 90% günstiger als

      Closed-Source bei gleicher Intelligenz. (3) HOHE DYNAMIK mit häufigem

      Wechsel der Marktführer. (4) HORIZONTALE UND VERTIKALE DIFFERENZIERUNG -

      kein einzelnes Modell dominiert über alle Use Cases. (5) PREISELASTIZITÄT

      knapp über 1, was LIMITIERTE JEVONS-PARADOX-EFFEKTE impliziert. (6) Firmen

      nutzen zunehmend MULTIPLE MODELLE, konzentrieren sich aber auf eines -

      konsistent mit EXPERIMENTIEREN statt persistenter Multi-Modell-Nutzung.

      '
    10C:
      WHO:
        levels:
        - firm
        - developer
        - market
        heterogeneity: high
        segments:
        - open-source-adopters
        - closed-source-users
        - multi-model-experimenters
        - single-model-concentrators
      WHAT:
        dimensions:
        - E
        - F
        primary: market_efficiency
      HOW:
        gamma_avg: 0.4
        interaction: complementary
      WHEN:
        psi_dominant: market-dynamics
        temporal: rapid-evolution
      WHERE:
        source: empirical
        confidence: high
      AWARE:
        A_level: 0.75
        awareness_type: explicit
      READY:
        W_level: 0.65
        theta: 0.6
      STAGE:
        phase: action
        stability: low
      HIERARCHY:
        primary_level: L2
        N_L2: 3
        complexity_location:
        - model-selection
        - pricing-strategy
        - multi-vs-single-model
    domain:
    - markets
    - technology
    - pricing
    - industrial-organization
    tags:
    - LLM
    - artificial-intelligence
    - market-structure
    - open-source
    - closed-source
    - price-elasticity
    - jevons-paradox
    - horizontal-differentiation
    - vertical-differentiation
    - platform-competition
    - API-markets
    - NBER
    - demirer
    - fradkin
    - tadelis
    - peng
    insight: 'Der LLM-Markt zeigt ein Paradox: Trotz massiver Open-Source-Disruption

      (90% Preisdifferenz!) persistiert Marktheterogenität. Weder Preis- noch

      Qualitätswettbewerb führt zu einem "Winner-takes-all"-Ergebnis. Dies

      liegt an der KOMBINATION aus horizontaler Differenzierung (verschiedene

      Use Cases → verschiedene optimale Modelle) und vertikaler Differenzierung

      (Nachfrage nach Intelligenz variiert stark). Die moderate Preiselastizität

      (~1) bedeutet: Preissenkungen führen NICHT zu überproportionalem

      Nachfragewachstum (limitierter Jevons-Effekt).

      '
    implication: 'Für EBF: LLM-Märkte demonstrieren, wie technologische Komplementarität

      (γ ≈ 0.4) GEGEN Monopolisierung wirkt - verschiedene Tasks erfordern

      verschiedene Modell-Stärken. Für Unternehmen: Multi-Modell-Strategien

      sind Experimentieren, nicht optimale Steady-State-Lösung - langfristig

      konzentrieren sich Firmen auf ein Modell. Für Policy: Open-Source-Förderung

      hat massive Preiseffekte (90% günstiger), aber der begrenzte Jevons-Effekt

      suggeriert, dass Preissenkungen allein nicht ausreichen, um AI-Adoption

      explosiv zu steigern.

      '
    formulas:
    - name: Price Gap Open vs Closed
      formula: P_{closed} / P_{open} ≈ 10 (bei gleicher Intelligenz)
      variables:
        P_closed: closed_source_price
        P_open: open_source_price
        ratio: 10x
    - name: Short-Run Price Elasticity
      formula: ε ≈ 1.0 (just above unitary)
      variables:
        epsilon: price_elasticity
        implication: limited_jevons_effect
    - name: Model Concentration Pattern
      formula: Pr(primary_model) >> Pr(secondary_model) despite multi-model adoption
      variables:
        pattern: experimentation_then_concentration
        mechanism: switching_costs_or_specialization
    references:
      appendices:
      - B
      - C
      - W
      chapters: []
      cases:
      - CASE-850
      literature:
      - demirer2025llmmarket
    source_paper: demirer2025llmmarket
  CAS-852:
    superkey: health:action:L1:habit-formation:learning:incentive-design
    name: 'Habit Formation via Experience-Good Learning: Health Screening RCT'
    description: 'Jones, Molitor & Reif (2025) study habit formation in annual biometric
      health

      screenings using a 3-year field experiment with 4,799 employees. They randomly

      assign financial incentives with RERANDOMIZATION at each period, enabling

      separation of first vs. second exposure effects. KEY FINDING: First screening

      raises subsequent rates by 32-36 pp (84-90% increase) with NO DECAY over 2 years.

      Second screening has MINIMAL effect on third-year participation. This asymmetry

      FALSIFIES addiction/reinforcement models (which predict recent > distant) and

      SUPPORTS experience-good learning (first exposure updates beliefs, subsequent

      adds little). Ignoring habit formation undervalues initial incentives by ~70%.

      '
    10C:
      WHO:
        levels:
        - individual
        - employee
        heterogeneity: medium
        segments:
        - first-time-screeners
        - experienced-screeners
        - incentive-responsive
      WHAT:
        dimensions:
        - P
        - F
        primary: health_behavior
      HOW:
        gamma_avg: 0.35
        interaction: complementary
      WHEN:
        psi_dominant: first-exposure
        temporal: persistent
      WHERE:
        source: experimental
        confidence: high
      AWARE:
        A_level: 0.4
        awareness_type: updating
      READY:
        W_level: 0.7
        theta: 0.5
      STAGE:
        phase: action
        stability: high
      HIERARCHY:
        primary_level: L1
        N_L2: 1
        complexity_location:
        - belief-updating
        - incentive-timing
    domain:
    - health
    - workplace
    - incentive-design
    - habit-formation
    tags:
    - habit-formation
    - experience-good
    - learning
    - health-screening
    - RCT
    - field-experiment
    - incentives
    - belief-updating
    - addiction-falsified
    - front-loading
    - jones
    - molitor
    - reif
    - wellness-program
    - biometric-screening
    insight: 'Habit formation in low-frequency behaviors with uncertain value operates

      through LEARNING, not ADDICTION. First exposure resolves belief uncertainty

      about costs/benefits; subsequent exposures add minimal new information.

      This creates ASYMMETRIC dynamics: the critical transition is Pre-Action →

      First Action, not maintaining established habits. The 3-period experimental

      design with rerandomization provides a CLEAN FALSIFICATION TEST between

      competing mechanisms.

      '
    implication: 'For intervention design: FRONT-LOAD incentives for learning-amenable
      behaviors.

      Initial uptake investment has 70%+ higher long-run ROI than sustained incentives.

      Do NOT expect compounding returns from repeated incentives (unlike addiction).

      Optimize FIRST-TIME EXPERIENCE QUALITY - it permanently shapes beliefs.

      Applies beyond health: vaccinations, preventive care, onboarding, ESG behaviors,

      retirement planning. For EBF: updates CORE-AWARE (AU) with discontinuous

      belief jump at first exposure; updates BBB with empirical parameters

      (beta_1 = 0.32-0.36, beta_2 ≈ 0.03, decay ≈ 0).

      '
    formulas:
    - name: First Exposure Effect
      formula: β₁ = P(screen_t | screen_{t-1}=1) - P(screen_t | screen_{t-1}=0) ≈
        0.32-0.36
      variables:
        beta_1: first_exposure_effect
        magnitude: 32-36_percentage_points
        relative_increase: 84-90_percent
    - name: Second Exposure Effect (Minimal)
      formula: β₂ = P(screen_3 | screen_2=1, screen_1) - P(screen_3 | screen_2=0,
        screen_1) ≈ 0.03 (n.s.)
      variables:
        beta_2: second_exposure_effect
        significance: not_statistically_significant
    - name: Mechanism Discriminant
      formula: 'LEARN: β₁ ≈ β₂ (first dominates) vs ADDICT: β₁ > β₂ (recent > distant)'
      variables:
        observed: first_dominates
        mechanism: experience_good_learning
    - name: Undervaluation Factor
      formula: ROI_naive / ROI_habit-aware ≈ 0.70 (70% undervaluation without habit
        adjustment)
      variables:
        undervaluation: 70_percent
        implication: front_load_incentives
    references:
      appendices:
      - AW
      - AU
      - BBB
      - HF
      chapters:
      - 13
      - 14
      cases:
      - CASE-002
      - CASE-003
      literature:
      - jonesmolitorreif2025
    source_paper: jonesmolitorreif2025
