  CAS-881:
    superkey: inequality:preferences:L1:inequity_aversion:survey:policy
    name: Inequity Aversion Explains Inequality Attitudes
    description: |
      Swiss representative survey (N>3000) shows that Fehr-Schmidt inequity aversion
      parameters explain attitudes toward economic inequality. Disadvantageous inequity
      aversion (α=0.85) dominates advantageous (β=0.45).

    10C:
      WHO:
        levels: [individual, society]
        heterogeneity: moderate
        segments: [Swiss_population]
      WHAT:
        dimensions: [S, F]
        primary_dimension: S
        utility_weight: inequity_weighted
      HOW:
        primary_mechanism: inequity_aversion
        secondary_mechanism: fairness_norms
        gamma_sign: positive
      WHEN:
        psi_dominant: economic_context_psi_E
        temporal: cross_sectional
      WHERE:
        source: representative_survey
        confidence: high
        N: 3000
      AWARE:
        A_level: 0.72
        awareness_type: explicit_fairness_concern
      READY:
        W_level: 0.55
        theta: moderate_redistribution_support

    domain: [political_economy, social_preferences, inequality]
    tags: [inequity_aversion, Fehr_Schmidt, Switzerland, redistribution, alpha_beta]

    insight: |
      Disadvantageous inequity aversion (α) is nearly twice as strong as advantageous (β),
      explaining why people care more about being worse off than others than about
      being better off. This asymmetry drives inequality attitudes.

    implication: |
      For policy design: (1) Frame redistribution in terms of reducing disadvantage
      rather than advantages; (2) α > β asymmetry suggests loss framing is more
      effective than gain framing for inequality interventions.

    formulas:
      - name: Fehr-Schmidt Inequity Aversion
        formula: U_i = x_i - α × max(x_j - x_i, 0) - β × max(x_i - x_j, 0)
        variables:
          alpha: 0.85 (disadvantageous inequity aversion)
          beta: 0.45 (advantageous inequity aversion)
          note: α > β confirms asymmetric fairness preferences

    references:
      appendices: [WHAT, HOW]
      chapters: [Ch.7, Ch.17]
      literature: [PAP-epper2024inequality, PAP-fehr1999theory]

    source_paper: PAP-epper2024inequality

