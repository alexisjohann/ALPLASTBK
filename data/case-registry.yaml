    insight: |
      Dieses Paper verbindet Social Identity Theory mit Klassenformation:

      IDENTITÄT IST KONTEXTABHÄNGIG!

      Der Mechanismus ist elegant:
      1. Menschen identifizieren sich mit Gruppen, die ihnen ÄHNLICH sind
      2. Migration ändert, wer "die Gruppe" ist
      3. Mehr kulturelle Distanz → weniger Identifikation
      4. Weniger Identifikation → weniger kollektives Handeln

      Für EBF ist das hochrelevant:
      - U_IDN (Identity Utility) ist nicht fix
      - Sie hängt von der ZUSAMMENSETZUNG der Gruppe ab
      - Ψ_composition ist ein kritischer Kontextfaktor

      Die Umkehrung 1911 ist besonders interessant:
      - Als Migration verlangsamte und lokales Wachstum stieg
      - Wurde die Working Class wieder homogener
      - → Stärkere Identifikation → Labour Erfolg

      LESSON: Migration ist nicht nur ökonomisch, sondern formt
      fundamentale soziale Identitäten und politische Cleavages.

    implication: |
      1. IDENTITY ECONOMICS VALIDATION:
         Paper validiert Akerlof-Kranton empirisch:
         - Gruppenidentität beeinflusst Verhalten
         - Ähnlichkeit ist zentral für Identifikation
         - Identität ist formbar, nicht fix

      2. MIGRATION POLICY:
         - Migration hat identitätspolitische Konsequenzen
         - Nicht nur Arbeitsmarkt, sondern soziale Kohäsion
         - Cultural Distance als relevante Variable

      3. POLITICAL ECONOMY:
         - Politische Cleavages sind nicht "natürlich"
         - Sie werden durch Demographie geformt
         - Migration kann existierende Cleavages auflösen oder neue schaffen

      4. METHODOLOGIE:
         - Naming als Identity-Proxy ist innovativ und validiert
         - Anwendbar auf andere Kontexte
         - Within-household Variation für clean identification

      5. EBF INTEGRATION:
         - Verbindet mit MS-IB-001 (Identity Economics)
         - Ψ_composition als neuer Kontextfaktor
         - γ(Cultural Distance, Identification) < 0

