  CAS-859:
    superkey: collective_action:self_organization:fire_brigades:baden:19th_century:shock_x_social
    name: "Self-Organization durch Schock × Soziale Struktur (Baden 1852-1889)"
    type: historical_empirical

    10C:
      WHO:
        levels: [individual, community, region]
        segments: [citizens, volunteer_members, communities_with_clubs, communities_without_clubs]
        primary_level: community
        description: "1577 Gemeinden im Grossherzogtum Baden (1852-1889)"

      WHAT:
        utility_dimensions:
          public_good: "Feuerschutz als lokales öffentliches Gut"
          membership_benefit: "Sozialer Nutzen der Vereinsmitgliedschaft"
          coordination: "Koordination zur Überwindung des Collective Action Problems"
        C_ij:
          fire_brigade_formation: "Wahrscheinlichkeit der Feuerwehr-Gründung"
          shock_effect: "Feuer im Ort oder Nachbar-Feuerwehr"
          social_structure_effect: "Existierende Gesangs-/Turnvereine"
          interaction_effect: "Schock × Soziale Struktur > 3× Wahrscheinlichkeit!"

      HOW:
        gamma_avg: null
        interaction: "Schock × Pre-existing Social Structure"
        mechanism: |
          COORDINATION GAME MIT ZWEI GLEICHGEWICHTEN:

          Equilibrium 1: Niemand kooperiert → Keine Feuerwehr
          Equilibrium 2: Genug high-benefit citizens → Feuerwehr entsteht

          WAS ERMÖGLICHT ÜBERGANG VON EQ1 → EQ2?

          ┌─────────────────────────────────────────────────────────┐
          │  Schock allein?           → KEIN Effekt                 │
          │  Soziale Vereine allein?  → KEIN Effekt                 │
          │  Schock × Vereine?        → >3× Wahrscheinlichkeit!     │
          └─────────────────────────────────────────────────────────┘

          → Schock verschiebt ERWARTUNGEN
          → Aber nur wenn soziale Infrastruktur existiert!

      WHEN:
        psi_dominant: social_institutional
        temporal_scope: "1852-1889 (37 Jahre Panel)"
        geographic_scope: "Grossherzogtum Baden (Südwest-Deutschland)"
        T_constraint: "Pre-existing social clubs as context moderator"
        psi_social_clubs: "Gesangsvereine, Turnvereine als Ψ-Dimension"

      WHERE:
        data_sources: "Hand-collected: Badische Feuerversicherung, Vereinsregister"
        countries: ["Germany (Baden)"]
        municipalities: 1577
        parameter_source: "PAP-friebel2025selforganization"
        data_quality: "Near-complete coverage of fire brigades, singing/gymnastics clubs"

      AWARE:
        awareness_type: "Citizen expectations about others' behavior"
        salience: "Fire shock makes coordination salient"
        A_mechanism: "Shock shifts beliefs about what others will do"

      READY:
        applicability: "Communities considering collective action"
        action_relevance: "Decision to form volunteer organization"
        W_level: "Depends on expected participation of others"

      STAGE:
        phenomenon_stage: "Institution formation (emergence)"
        intervention_window: "Post-shock window for coordination"
        trajectory: "One-time transition from no-organization to organization"

    domain: political_economy
    subdomain: collective_action

    key_finding: |
      SELF-ORGANIZATION = SCHOCK × PRE-EXISTING SOCIAL STRUCTURE

      Das Paper zeigt einen fundamentalen Mechanismus für die Entstehung
      von Selbstorganisation:

      1. COORDINATION GAME: Feuerwehr-Gründung ist ein Koordinationsspiel
         mit zwei Gleichgewichten (keine Kooperation vs. Kooperation)

      2. SCHOCK ALLEIN REICHT NICHT:
         - Feuer im eigenen Ort → Kein signifikanter Effekt (!)
         - Feuer im Nachbarort → Kein Effekt

      3. SOZIALE STRUKTUR ALLEIN REICHT NICHT:
         - Gesangsverein existiert → Kein direkter Effekt
         - Turnverein existiert → Kein direkter Effekt

      4. ABER: INTERAKTION VERDREIFACHT WAHRSCHEINLICHKEIT:
         - Feuer × Gesangs-/Turnverein → >3× Wahrscheinlichkeit!
         - Nachbar-Feuerwehr × Verein → >3× Wahrscheinlichkeit!

      INTERPRETATION:
      - Schock verschiebt Erwartungen über Verhalten anderer
      - Aber nur wenn soziale Infrastruktur für Koordination existiert
      - Vereine liefern "organizational template" und Vertrauensnetzwerk

    ebf_relevance:
      - HOW: Complementarity γ(Shock, Social Structure) ist POSITIV und STARK
      - WHEN: Pre-existing social clubs als Ψ-Moderator
      - WHO: Community-level collective action
      - AWARE: Shock shifts expectations/beliefs
      - implications_for_behavior: "Context (Ψ) moderates shock effects on collective action"

    domains:
      - political_economy
      - collective_action
      - public_goods
      - economic_history
      - social_capital

    tags:
      - self_organization
      - collective_action
      - public_goods
      - volunteer_fire_brigades
      - coordination_games
      - social_capital
      - 19th_century
      - Germany
      - Baden
      - singing_clubs
      - gymnastics_clubs
      - Ostrom
      - state_capacity
      - shock_interaction
      - historical_panel

    insight: |
      Dieses Paper liefert eine fundamentale Einsicht für das EBF:

      KONTEXT (Ψ) IST NICHT NUR ADDITIV - ER IST MULTIPLIKATIV!

      Die pre-existing social structure (Gesangs-/Turnvereine) wirkt nicht
      direkt auf Collective Action. Sie wirkt als MODERATOR, der bestimmt,
      ob ein Schock Koordination ermöglicht oder nicht.

      Dies entspricht der EBF-Architektur:
      - Ψ_S (Soziale Struktur) als Kontextdimension
      - γ(Shock, Ψ_S) > 0: Positive Complementarity
      - Ohne Ψ_S: Schock verpufft
      - Mit Ψ_S: Schock ermöglicht Equilibrium Transition

      Für Interventions-Design bedeutet das:
      → Schock-basierte Interventionen funktionieren NUR wenn
         soziale Infrastruktur vorhanden ist!

    implication: |
      1. INTERVENTION DESIGN: "Nudges" und "Shocks" wirken nicht universell.
         Sie brauchen den richtigen sozialen Kontext (Ψ_S).

      2. SEQUENCING: Erst soziale Infrastruktur aufbauen, DANN Schock/Intervention.
         Umgekehrt funktioniert es nicht.

      3. HETEROGENE EFFEKTE: Dieselbe Intervention hat unterschiedliche Effekte
         je nach pre-existing social capital der Community.

      4. STATE CAPACITY: Bottom-up Self-Organization kann langfristig State
         Capacity erhöhen. 94% der deutschen Feuerwehrleute sind heute noch
         Freiwillige - Erbe dieser 19th century Selbstorganisation.

      5. EBF FORMALISIERUNG:
         P(Institution) = f(Shock) × g(Ψ_S)
         → Multiplikative, nicht additive Struktur!

    formulas:
      - name: "Coordination Game Payoff"
        formula: "U_i = B(n) - c if participate, 0 if not"
        variables:
          U_i: "Utility of citizen i"
          B_n: "Benefit depending on number of participants n"
          c: "Cost of participation"

      - name: "Shock × Social Structure Interaction"
        formula: "P(Fire Brigade) = β₀ + β₁×Shock + β₂×SocialClub + β₃×(Shock×SocialClub)"
        variables:
          beta_1: "≈ 0 (Shock alone: no effect)"
          beta_2: "≈ 0 (Social club alone: no effect)"
          beta_3: "> 0 (Interaction: strong positive effect, >3× probability)"

      - name: "Equilibrium Selection via Shock"
        formula: "E[n|shock, social_club] > n* → Equilibrium 2 selected"
        variables:
          E_n: "Expected number of participants"
          n_star: "Threshold for successful coordination"

    parameters:
      - id: PAR-CA-001
        symbol: interaction_effect
        value: ">3×"
        unit: "probability multiplier"
        source: "PAP-friebel2025selforganization"
        note: "Shock × Social Club interaction more than triples probability"
      - id: PAR-CA-002
        symbol: shock_alone
        value: "≈0"
        unit: "effect size"
        source: "PAP-friebel2025selforganization"
        note: "Fire shock alone has no significant effect"
      - id: PAR-CA-003
        symbol: social_club_alone
        value: "≈0"
        unit: "effect size"
        source: "PAP-friebel2025selforganization"
        note: "Pre-existing social club alone has no effect"

    references:
      appendices:
        - B     # CORE-HOW (Complementarity)
        - V     # CORE-WHEN (Context as moderator)
        - AAA   # CORE-WHO (Community-level)
      chapters:
        - 6     # HOW: Complementarity
        - 9     # WHEN: Context
        - 17    # Interventions
      cases:
        - CAS-001  # Cross-cultural (context effects)
      literature:
        - PAP-friebel2025selforganization
        - PAP-ostrom1990governing  # Foundational collective action

    source_paper: "PAP-friebel2025selforganization"
    created_in_session: "EBF-S-2026-01-28-POL-001"

  CAS-860:
    superkey: forecasting:firm_biases:rct:incentives:data_use:over_optimism
    name: "Firm Forecasting Biases und RCT-Interventionen (Bloom et al. 2025)"
    type: rct_panel

    10C:
      WHO:
        levels: [firm, manager]
        segments: [US_firms, FinTech_clients, forecasters]
        primary_level: firm
        description: "6000+ US Firmen über 5 Jahre, 10 Wellen, incentivized forecasts"

      WHAT:
        utility_dimensions:
          accuracy: "Forecast-Genauigkeit (Win Rate)"
          optimism: "Over-Optimism Bias"
          precision: "Subjektive Unsicherheit vs. wahre Unsicherheit"
        C_ij:
          win_rate: "18% (nur 18% innerhalb ±10%)"
          over_optimism: "+16.3% über Realisierung"
          over_precision: "Subjektive Varianz = 50% der wahren Varianz"
          predictable_errors: "Korreliert mit lagged errors"

      HOW:
        gamma_avg: null
        interaction: "Intervention Type × Bias Type"
        mechanism: |
          VIER BIASES:
          1. Inaccuracy: 18% win rate (schlechter als naive Prognose!)
          2. Over-optimism: +16.3% systematisch
          3. Predictable errors: Autokorreliert
          4. Over-precision: Zu enge Konfidenzintervalle

          VIER RCTs - WAS WIRKT?
          ┌─────────────────────────────────────────────────────────┐
          │  Data Dashboard    → ✅ -15% Noise, +2pp Win Rate       │
          │  Higher Incentives → ✅ -70% Optimismus bei $400        │
          │  Forecast Training → ❌ Kein Effekt                     │
          │  Contingent Think  → ❌ Kein Effekt                     │
          └─────────────────────────────────────────────────────────┘

          → Biases sind MOTIVIERT, nicht kognitiv!

      WHEN:
        psi_dominant: incentive_information
        temporal_scope: "2019-2024 (5 Jahre, 10 Wellen)"
        geographic_scope: "USA"
        T_constraint: "Quarterly forecasts matched to actual revenue"

      WHERE:
        data_sources: "FinTech proprietary revenue data + Survey"
        countries: ["USA"]
        firms: "6000+"
        parameter_source: "PAP-bloom2025forecasts"
        data_quality: "Incentivized ($50 base + $400 accuracy), matched to transactions"

      AWARE:
        awareness_type: "Firm managers making forecasts"
        salience: "Data dashboard increases awareness of past performance"
        A_intervention: "Dashboard exposure: +45 sec survey time, -15% noise"

      READY:
        applicability: "Corporate forecasting, macro modeling"
        action_relevance: "Biases affect investment and hiring decisions"
        W_level: "Firms CAN reduce bias if incentivized (motivated reasoning)"

      STAGE:
        phenomenon_stage: "Ongoing forecasting behavior"
        intervention_window: "Each forecast wave as intervention opportunity"

    domain: behavioral_economics
    subdomain: firm_forecasting

    key_finding: |
      ERSTE GROSSE INCENTIVIZED PANEL-STUDIE ZU FIRM FORECASTS:

      1. VIER DOKUMENTIERTE BIASES:
         - Inaccuracy: Nur 18% win rate (innerhalb ±10%)
         - Over-optimism: +16.3% über Realisierung (ALLE Wellen!)
         - Predictable errors: Korreliert mit lagged outcomes
         - Over-precision: Subjektive Varianz = 50% wahre Varianz

      2. VIER RCTs - UNTERSCHIEDLICHE ERGEBNISSE:

         DATA DASHBOARD (funktioniert):
         - +45 Sekunden Survey-Zeit
         - -15% Forecast Noise
         - +2pp Win Rate
         - Reduziert Over-Precision
         - ABER: Kein Lerneffekt in späteren Wellen!

         INCENTIVES (funktioniert):
         - $400 Reward → -70% Optimismus-Bias
         - +0.9pp Win Rate pro $100 zusätzlich
         - Firmen KÖNNEN weniger optimistisch sein wenn bezahlt

         FORECAST TRAINING (funktioniert NICHT):
         - 10 Vignetten Training
         - Kein Effekt auf Accuracy oder Biases
         - Obwohl Training-Performance mit Accuracy korreliert!

         CONTINGENT THINKING (funktioniert NICHT):
         - "Superforecaster" Methode
         - Extreme Szenarien vor Forecast
         - Kein Effekt

      3. INTERPRETATION: MOTIVATED REASONING
         - Biases sind NICHT rein kognitiv
         - Manager WISSEN, dass sie optimistisch sind
         - Mit genug Incentives können sie realistischer sein
         - → Benabou-Tirole: Optimismus als Selbst-Motivation

    ebf_relevance:
      - AWARE: Data exposure erhöht Awareness → bessere Forecasts
      - HOW: Incentives moderieren Biases (γ > 0)
      - WHAT: Over-optimism als U-relevanter Bias
      - implications_for_behavior: "Biases sind motiviert, nicht kognitiv - änderbar mit Incentives"

    domains:
      - behavioral_economics
      - firm_forecasting
      - corporate_finance
      - macro_expectations
      - RCT_methodology

    tags:
      - firm_forecasting
      - over_optimism
      - over_precision
      - inaccuracy
      - predictable_errors
      - RCT
      - incentives
      - data_use
      - motivated_reasoning
      - rational_expectations
      - behavioral_biases
      - Bloom
      - panel_survey
      - FinTech

    insight: |
      Dieses Paper liefert eine fundamentale Einsicht über Behavioral Biases:

      BIASES SIND MOTIVIERT, NICHT (NUR) KOGNITIV!

      Evidenz:
      1. Training hilft NICHT → Bias ist nicht Wissensmangel
      2. "Superforecaster" Methoden helfen NICHT → Bias ist nicht Denkmangel
      3. Incentives HELFEN → Manager KÖNNEN realistischer sein
      4. Daten HELFEN → Aber kein Lerneffekt (over-confidence in own ability)

      Dies unterstützt Benabou-Tirole (2002) "Motivated Reasoning":
      - Over-Optimismus ist NÜTZLICH für Selbst-Motivation
      - Manager reduzieren ihn NUR wenn extern incentiviert
      - Es ist eine BEWUSSTE (wenn auch nicht explizite) Wahl

      Für EBF bedeutet das:
      - AWARE-Interventionen (Daten zeigen) wirken
      - WHAT-Interventionen (Incentives ändern) wirken
      - Kognitive Interventionen (Training) wirken NICHT

    implication: |
      1. INTERVENTION DESIGN: Information UND Incentives nötig.
         Training allein reicht nicht.

      2. CORPORATE GOVERNANCE: Wenn realistischere Forecasts gewünscht,
         müssen Incentives entsprechend gestaltet werden.

      3. MACRO MODELING: Firm biases haben Macro-Implikationen.
         Simulation zeigt geänderte Responsiveness zu Tax/Productivity Shocks.

      4. EBF PARAMETER:
         - Baseline Over-Optimism: +16.3%
         - Data Intervention Effect: +2pp accuracy
         - Incentive Effect: +0.9pp pro $100

      5. COST-EFFECTIVENESS:
         - Data Dashboard: Kostenlos, +2pp
         - $400 Incentive: -70% Optimismus, +3.6pp
         → Data Dashboard hat besseres Kosten-Nutzen-Verhältnis!

    formulas:
      - name: "Win Rate"
        formula: "Win Rate = P(|Forecast - Actual| / Actual < 0.10)"
        variables:
          Win_Rate: "Anteil der Forecasts innerhalb ±10%"
          Baseline: "18%"

      - name: "Over-Optimism Bias"
        formula: "Bias = E[Forecast - Actual] / Actual = +16.3%"
