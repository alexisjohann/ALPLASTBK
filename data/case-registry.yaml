          KAUSALKETTE:
          1. SSDI-Empfänger haben hohe Rate chronischer Schmerzen
          2. Ende 1990er: Shift zu aggressiverer Opioid-Verschreibung
          3. SSDI-Empfänger hatten bevorzugten Zugang (Medicare/Medicaid)
          4. Höhere Exposition → höhere Abhängigkeit → höhere Mortalität

          COUNTERFACTUAL ANALYSE:
          ┌─────────────────────────────────────────────────────────────┐
          │  Wenn Verschreibungsniveau bei 1995 geblieben wäre:        │
          │  → 43% WENIGER Drogenmortalität (1999-2017)                │
          │  → Aber: Ohne SSDI nur 12% Reduktion                       │
          │  → SSDI × Prescribing Interaktion erklärt 31pp!            │
          └─────────────────────────────────────────────────────────────┘

      WHEN:
        psi_dominant: policy_regime_shift
        temporal_scope: "1990-2017 (28 Jahre Panel)"
        geographic_scope: "USA (alle Countys)"
        T_constraint: "Strukturbruch Ende 1990er bei Opioid-Verschreibung"

      WHERE:
        data_sources: "CDC Wonder, SSDI administrative data, DEA ARCOS"
        countries: ["USA"]
        level: "County-level"
        parameter_source: "PAP-evans2025prescription"
        data_quality: "Administrative Daten + Mortalitätsregister"

      AWARE:
        awareness_type: "Policy makers, healthcare providers"
        salience: "Opioid-Krise war lange nicht als solche erkannt"
        A_intervention: "Retrospektive Analyse zeigt kausale Kette"

      READY:
        applicability: "Gesundheitspolitik, SSDI-Reform, Verschreibungsregulierung"
        action_relevance: "Präventive Verschreibungspolitik könnte ähnliche Krisen verhindern"
        W_level: "Counterfactual zeigt vermeidbares Leid"

      STAGE:
        phenomenon_stage: "Post-hoc Analyse einer Krise"
        intervention_window: "Präventiv: Bevor nächster Regime-Shift"

    domain: health_economics
    subdomain: opioid_crisis

    key_finding: |
      SSDI ALS TRANSMISSIONSKANAL DER OPIOID-KRISE:

      1. PRÄDIKTOR-BEFUND:
         - SSDI-Rate eines Countys in 1990
         - Sagt Wachstum der Drogenmortalität nach 2000 voraus
         - Stärker als andere sozioökonomische Faktoren

      2. MECHANISMUS:
         - SSDI-Empfänger haben hohe Rate chronischer Schmerzen
         - Haben bevorzugten Zugang zu Verschreibungen (Medicare/Medicaid)
         - Ende 1990er: Paradigmenwechsel zu "großzügiger" Opioid-Verschreibung
         - SSDI-Empfänger waren überproportional exponiert

      3. COUNTERFACTUAL (Hauptbeitrag):
         - Simulation: Was wenn Verschreibung bei 1995-Level geblieben?
         - Ergebnis: 43% WENIGER Drogenmortalität 1999-2017
         - Davon nur 12% durch allgemeine Verschreibungsreduktion
         - 31pp durch SSDI × Verschreibung Interaktion!

      4. IMPLIKATION:
         - Die Opioid-Krise war großteils vermeidbar
         - SSDI als "Superspreader" der Epidemie
         - Policy-Regime-Shifts können unbeabsichtigte Konsequenzen haben

    ebf_relevance:
      - WHEN: Policy regime shift als kritischer Kontextfaktor
      - WHO: Vulnerable Population (SSDI-Empfänger) überproportional betroffen
      - HOW: Interaktion SSDI × Prescribing (nicht additiv!)
      - implications_for_behavior: "Kontextuelle Veränderungen können vulnerable Gruppen überproportional treffen"

    domains:
