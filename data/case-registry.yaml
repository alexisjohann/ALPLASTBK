  CAS-910:
    superkey: retail:customer_journey:segmentation:loyalty_formation:heterogeneity
    name: Customer Journey Segmentation & Loyalty Formation
    description: |
      5 customer journey segments identified via LCA differ substantially in how
      loyalty is formed. Journey satisfaction drives loyalty for multiple touchpoint
      shoppers (β=0.58***), while product satisfaction matters for store-focused
      (β=0.40***). No showrooming segment; webrooming more prevalent.

    10C:
      WHO:
        levels: [customer, segment]
        heterogeneity: very_high
        segments: [store_focused, pragmatic_online, extensive_online, multiple_touchpoint, online_to_offline]
        segment_sizes: [0.22, 0.31, 0.16, 0.15, 0.16]
      WHAT:
        dimensions: [F, S]
        primary: loyalty_formation
        drivers: [journey_satisfaction, product_satisfaction, customer_inspiration]
      HOW:
        gamma_avg: segment_specific
        interaction: loyalty_pathway_varies_by_segment
        counterintuitive: "Product satisfaction has ZERO effect for MTP (β=0.01, NS)"
      WHEN:
        psi_dominant: touchpoint_timing
        temporal: journey_phases
        moments_of_truth: [ZMOT, FMOT, SMOT]
      WHERE:
        source: field_data
        confidence: high
        n: 5092
        region: DACH
        time_span: "2013-2016"
      AWARE:
        A_level: segment_specific
        awareness_type: touchpoint_awareness
        mobile_concentration: "47% of MTP segment uses mobile; doesn't create new segment"
      READY:
        W_level: segment_specific
        theta: purchase_readiness_varies
      STAGE:
        phase: customer_journey
        stability: time_consistent
        emphasis: "Store-focused→FMOT; Extensive→ZMOT; MTP→all; O2O→ZMOT+FMOT"
      HIERARCHY:
        primary_level: L1
        intervention_type: segment_specific_CX
        loyalty_hierarchy: "MTP: journey>product; SF: product>journey"

    domain: [retail, CX, loyalty, segmentation]
    tags: [latent_class_analysis, journey_satisfaction, product_satisfaction, customer_inspiration, webrooming, no_showrooming, mobile, touchpoints]
    insight: |
      The pathway to loyalty is fundamentally different across segments. For multiple
      touchpoint shoppers, the journey experience IS the product - product satisfaction
      has literally zero effect (β=0.01). For store-focused shoppers, it's the opposite:
      the product is everything, journey barely matters.
    implication: |
      Retailers must segment customers by journey type, not demographics. Invest in
      cross-channel experience for MTP segment (15%); focus on product quality for
      store-focused (22%) and pragmatic online (31%). No need to address showrooming -
      webrooming (O2O) is the actual behavior to support.

    formulas:
      - name: Journey Satisfaction Effect (Segment-Specific)
        formula: "Loyalty = β_JS × JourneySat + β_PS × ProductSat + β_INS × Inspiration"
        variables:
          beta_JS: "0.11* (SF), 0.13** (PO), 0.21*** (EO), 0.58*** (MTP), 0.24*** (O2O)"
          beta_PS: "0.40*** (SF), 0.43*** (PO), 0.28*** (EO), 0.01 NS (MTP), 0.17*** (O2O)"
          beta_INS: "0.15*** (SF), 0.03 NS (PO), 0.03 NS (EO), 0.12** (MTP), 0.20*** (O2O)"

    references:
      appendices: [STAGE, WHO, WHEN]
      chapters: [18, 19]
      cases: [CAS-907]
      literature: [PAP-herhausen2019loyalty, PAP-schoegel2024cxnavigator, PAP-herhausen2019firestorms]
    source_paper: PAP-herhausen2019loyalty

  CAS-872:
    superkey: education:dynamic_complementarity:decomposition:early_investment
    name: Dynamic Complementarity Decomposition
    description: |
      Dynamic complementarity decomposes into three components:
      P(a) × Q(a+j) × f₁,₂(a+j) = Productivity × Transmission × Static Complementarity.
      Low-ability children benefit MOST (γ_low > γ_normal > γ_high).

    10C:
      WHO:
        levels: [child]
        heterogeneity: high
        segments: [disadvantaged, low_ability]
      WHAT:
        dimensions: [P, S]
        primary: learning_rate
      HOW:
        gamma_avg: 0.7
        gamma_low: 0.8
        gamma_normal: 0.6
        gamma_high: 0.4
        interaction: multiplicative_decomposition
      WHEN:
        psi_dominant: early_childhood
        temporal: cumulative
      WHERE:
        source: empirical
        confidence: high
      AWARE:
        A_level: 0.2
        awareness_type: implicit
      READY:
        W_level: null
        theta: null
      STAGE:
        phase: skill_formation
        stability: dynamic
      HIERARCHY:
        primary_level: L1
        intervention_type: early_investment

    domain: [education, child_development, complementarity]
    tags: [dynamic_complementarity, catch_up, disadvantaged, language_skills, cognitive_skills]
    insight: |
      γ_low > γ_normal > γ_high: Disadvantaged children benefit most from
      early investment. Dynamic complementarity enables catch-up.
    implication: |
      Target low-ability children for maximum impact. Focus on skills with
      high complementarity (language, cognitive > fine motor).

    formulas:
      - name: Dynamic Complementarity Decomposition
        formula: DC = P(a) · Q(a+j) · f₁,₂(a+j)
        variables:
          DC: dynamic complementarity
          P: productivity of skills
          Q: transmission across stages
          f_12: static complementarity

    references:
      appendices: [HOW, WHERE, V]
      chapters: [complementarity]
      cases: [CAS-871]
      literature: [PAP-heckman2025dynamic, PAP-heckman2026measuring]
    source_paper: PAP-heckman2025dynamic

