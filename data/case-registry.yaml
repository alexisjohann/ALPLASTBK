  CAS-864:
    superkey: identity:class:migration:cultural_distance:political_cleavages
    name: "Migration und Klassenidentität im England der 1900er (Fouka & Serlin 2026)"
    type: historical_quasi_experiment

    10C:
      WHO:
        levels: [individual, household, community]
