  CAS-863:
    superkey: development:psychology:poverty_amplification:missing_markets:behavioral_biases
    name: "Psychologie und Entwicklung - Armut verstärkt Biases (Breza & Kaur 2026)"
    type: research_agenda

    10C:
      WHO:
        levels: [individual, household, community]
        segments: [poor_individuals, subsistence_households, developing_country_populations]
        primary_level: individual
        description: "Arme Individuen in Entwicklungsländern, Haushalte nahe der Subsistenzgrenze"

      WHAT:
        utility_dimensions:
          self_control: "Zeitpräferenzen, Versuchungswiderstand"
          cognitive: "Bandwidth, Attention, Memory"
          self_beliefs: "Confidence, Aspirationen, Identität"
          mental_health: "Stress, Depression, Angst"
          social: "Normen, Peer Effects, Reference Groups"
        C_ij:
          poverty_trap: "Biases verhindern Aufstieg aus Armut"
          market_organization: "Biases formen Produktionsorganisation"
          institutional_role: "Informelle Institutionen kompensieren"

      HOW:
        gamma_avg: "positive (verstärkend)"
        interaction: "Poverty Features × Psychological Biases"
        mechanism: |
          ZENTRALE THESE: ARMUT VERSTÄRKT PSYCHOLOGISCHE CONSTRAINTS!

          5 ARMUTS-FEATURES DIE VERSTÄRKEN (Ψ-Moderatoren):
          ┌─────────────────────────────────────────────────────────────┐
          │  1. Proximity to Subsistence                               │
          │     → Höhere Stakes, jeder Fehler ist teuer                │
          │                                                            │
          │  2. High Volatility                                        │
          │     → Mehr Stress, weniger Cognitive Bandwidth             │
          │                                                            │
          │  3. Market Failures                                        │
          │     → Keine Korrekturmechanismen für Biases                │
          │                                                            │
          │  4. Weak Formal Institutions                               │
          │     → Keine Schutznetze, keine Defaults                    │
          │                                                            │
          │  5. Reliance on Social Ties                                │
          │     → Soziale Normen dominieren, Peer Pressure             │
          └─────────────────────────────────────────────────────────────┘

          5 PSYCHOLOGISCHE KONSTRUKTE (betroffene U-Dimensionen):
          ├── Self-Control: β < 1, Versuchung, Procrastination
          ├── Cognitive Constraints: Limited attention, memory, bandwidth
          ├── Self-Beliefs: Low aspirations, confidence, identity threats
          ├── Mental Health: Stress, depression reduce decision quality
          └── Social Norms: Peer effects, conformity, reference dependence

          MISSING MARKETS LENS:
          → Tools gegen Biases werden UNTERVERSORGT (Marktversagen)
          → Daher: Biases haben LARGE STEADY-STATE IMPACTS
          → Selbst ERFAHRENE Agenten bleiben biased!

      WHEN:
        psi_dominant: poverty_context
        temporal_scope: "Persistent (steady-state effects)"
        geographic_scope: "Developing countries"
        T_constraint: "Poverty as chronic condition amplifying biases"

      WHERE:
        data_sources: "Review of field experiments and observational studies"
        countries: ["developing_countries"]
        level: "Individual, household, community"
        parameter_source: "PAP-breza2026psychology"
        data_quality: "Synthesis of empirical literature"

      AWARE:
        awareness_type: "Individuals often unaware of own biases"
        salience: "Poverty reduces salience of long-term consequences"
        A_intervention: "Self-beliefs and aspirations as intervention targets"

      READY:
        applicability: "Development policy, poverty alleviation, behavioral interventions"
        action_relevance: "Social capital can mitigate missing markets"
        W_level: "Framework shows where interventions can break poverty traps"

      STAGE:
        phenomenon_stage: "Research agenda / synthesis"
        intervention_window: "Multiple: self-control, cognitive aids, mental health, norms"

    domain: development_economics
    subdomain: behavioral_development

    key_finding: |
      FORSCHUNGSAGENDA FÜR BEHAVIORAL DEVELOPMENT ECONOMICS:

      1. ZENTRALE THESE:
         Psychologische Constraints spielen eine VERSTÄRKTE Rolle in
         Entwicklungsländern, weil Armuts-Features sie amplifizieren.

      2. DIE 5 × 5 MATRIX:

         5 PSYCHOLOGISCHE KONSTRUKTE:
         ┌────────────────────────────────────────────────────────────┐
         │ Self-Control      │ β < 1, present bias, temptation       │
         │ Cognitive         │ Bandwidth, attention, memory limits   │
         │ Self-Beliefs      │ Aspirations, confidence, identity     │
         │ Mental Health     │ Stress, depression, anxiety           │
         │ Social Norms      │ Peer effects, conformity, reference   │
         └────────────────────────────────────────────────────────────┘

         5 ARMUTS-FEATURES (VERSTÄRKER):
         ┌────────────────────────────────────────────────────────────┐
         │ Subsistence       │ High stakes → errors are costly       │
         │ Volatility        │ Stress → reduced bandwidth            │
         │ Market Failures   │ No correction mechanisms              │
         │ Weak Institutions │ No safety nets, no defaults           │
         │ Social Ties       │ Norms dominate, peer pressure         │
         └────────────────────────────────────────────────────────────┘

      3. MISSING MARKETS LENS:
         - Warum werden Tools gegen Biases unterversorgt?
         - → Positive Externalitäten, Credit Constraints, Information Asymmetries
         - → Markt liefert nicht genug "Debiasing Tools"
         - → Biases persistieren auch bei erfahrenen Agenten!

      4. IMPLIKATION: SOCIAL CAPITAL
         - Soziale Netzwerke können Missing Markets kompensieren
         - Peer Monitoring, Commitment Devices, Information Sharing
         - Aber: Können auch negative Normen verstärken!

    ebf_relevance:
      - WHEN: Armut als Ψ-Kontext der Biases VERSTÄRKT (nicht nur addiert!)
      - WHO: Vulnerable Populationen systematisch stärker betroffen
      - HOW: γ(Poverty, Bias) > 0 - Verstärkende Interaktion
      - AWARE: Self-beliefs und Aspirationen als Interventionsziele
      - implications_for_behavior: "Kontext ist nicht neutral - er amplifiziert"

    domains:
      - development_economics
      - behavioral_economics
      - psychology
      - poverty
      - missing_markets

    tags:
      - behavioral_development
      - poverty_amplification
      - self_control
      - cognitive_constraints
      - self_beliefs
      - mental_health
      - social_norms
      - missing_markets
      - social_capital
      - Breza
      - Kaur
      - research_agenda
      - psi_framework
      - context_amplification

    insight: |
      Dieses Paper ist ZENTRAL für das EBF Ψ-Framework:

      KONTEXT IST NICHT NEUTRAL - ER AMPLIFIZIERT!

      Das Standard-Modell behandelt Kontext als additiven Faktor.
      Breza & Kaur zeigen: Armut MULTIPLIZIERT die Wirkung von Biases.

      Warum?
      1. Höhere Stakes (Subsistenz) → Fehler sind teurer
      2. Weniger Bandwidth (Volatilität) → Mehr Fehler
      3. Keine Korrektur (Marktversagen) → Fehler persistieren
      4. Keine Schutznetze (Institutionen) → Keine zweite Chance
      5. Soziale Abhängigkeit (Ties) → Normen verstärken Verhalten

      Das ist GENAU das EBF Ψ-Modell:
      - Kontext Ψ ist nicht additiv sondern multiplikativ
      - γ(Context, Bias) > 0 bedeutet Verstärkung
      - "Same bias, different context = different impact"

      MISSING MARKETS als Erklärung für Persistenz:
      - Warum korrigiert der Markt Biases nicht?
      - → Tools gegen Biases sind unterversorgt
      - → Daher bleiben selbst erfahrene Agenten biased
      - → Dies erklärt Steady-State Armut trotz "Lernen"

    implication: |
      1. INTERVENTIONS-DESIGN:
         - Nicht nur den Bias targeten, sondern den KONTEXT
         - Armuts-Features reduzieren = Bias-Impact reduzieren
         - Social Capital als Kompensation für Missing Markets

      2. PRIORITÄTEN-REIHENFOLGE:
         Das Paper unterscheidet "Proof of Concept" vs "Meaningful Impact":
         - Self-Control: Gut dokumentiert, Commitment Devices wirken
         - Cognitive: Weniger klar, Bandwidth-Effekte real aber klein
         - Self-Beliefs: Vielversprechend, Aspirationen formbar
         - Mental Health: Untererforscht, aber hohe Prävalenz
