    domain:
    - health
    - policy
    - ethics
    tags:
    - nudge
    - default
    - organ_donation
    - cross-country
    - policy
    insight: 'Bei Entscheidungen mit hohem θ (Aktivierungsenergie) und niedriger Awareness
      dominiert der Default vollständig.

      '
    implication: 'Für gesellschaftlich erwünschtes Verhalten: Opt-Out wenn ethisch
      vertretbar. Die meisten Menschen haben positive Einstellung, aber hohe Handlungshürde.

      '
    formulas:
    - name: Default-Dominanz
      formula: P(donate) ≈ P(default=yes) wenn θ > 0.7 und A < 0.3
      variables:
