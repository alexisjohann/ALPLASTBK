  CAS-911:
    superkey: nudge:default:L2:crowdingout:organ_donation:optout
    name: Opt-Out Default Crowding-Out in Organ Donation
    description: |
      Opt-out defaults for organ donation have an unintended negative consequence:
      while they may increase deceased donations modestly (+7%, NS), they substantially
      REDUCE living donations (-29%, p=0.026). The mechanism is supply sufficiency
      perception - under opt-out, people believe organ supply is sufficient and
      therefore their living donation is not needed. Effect is driven by altruistic
      donations to strangers (β=-0.161**), while familial donations are unaffected.

    10C:
      WHO:
        levels: [individual, population]
        heterogeneity: high
        segments: [altruistic_donors, familial_donors, potential_donors]
        note: "Altruistic donors most affected, familial donors robust"
      WHAT:
        dimensions: [S, IDN]
        primary: prosocial_motivation
        note: "u_S + u_IDN conditional on perceived need"
      HOW:
        gamma_avg: -0.29
        interaction: "default × living_donation = NEGATIVE (crowding-out)"
        note: "γ(default, living_donation) ≈ -0.29"
      WHEN:
        psi_I: "optout_default_policy"
        psi_T: "policy_adoption_timing"
        note: "Effect persists over 23-year period"
      WHERE:
        source: field_data_and_experiments
        confidence: very_high
        N: "24 countries, 2000-2023, N>5000 experiments"
      AWARE:
        A_level: 0.4
        awareness_type: implicit
        note: "Supply sufficiency perception is implicit"
      READY:
        W_level: 0.5
        theta: "varies_by_donation_type"
        note: "Reduced readiness for living donation under opt-out"
      STAGE:
        phase: policy_adoption
        stability: high
        note: "Effect stable over time, no habituation"
      HIERARCHY:
        primary_level: L2
        intervention_type: default_architecture

    domain:
    - health
    - policy
    - nudge
    - organ_donation
    - defaults

    tags:
    - optout
    - crowdingout
    - unintended_consequences
    - supply_sufficiency
    - altruistic_motivation
    - living_donation
    - deceased_donation
    - presumed_consent

    insight: |
      CRITICAL INSIGHT: Default nudges can CROWD OUT related prosocial behaviors
      not targeted by the intervention. The mechanism is perception-based:
      opt-out defaults signal supply sufficiency, reducing perceived need for
      additional contributions. This is particularly damaging for altruistic
      motivation, which is most sensitive to perceived need.

    implication: |
      1. Policy designers must consider behavioral SPILLOVERS, not just direct effects
      2. Communicate ongoing need explicitly to counter supply sufficiency perception
      3. Evaluate NET effect across ALL related behaviors before adopting defaults
      4. Altruistic motivation requires special protection in default architecture
      5. Living donations (larger organ source) may be harmed more than deceased gains

    formulas:
    - name: Crowding-Out Effect on Living Donation
      formula: ΔLiving = β_living × OptOut + ε
      variables:
        beta_living: "-4.59 pmp (−29%, P=0.026)"
        OptOut: "1 if opt-out policy, 0 otherwise"

    - name: Donation Type Heterogeneity
      formula: ΔDonation_type = β_type × OptOut × (1 - familial_indicator)
      variables:
        beta_altruistic: "-0.161 (P<0.01)"
        beta_nondirected: "-0.130 (P<0.05)"
        beta_familial: "-0.092 (NS)"
        familial_indicator: "1 if donation to family/friend"

    - name: Supply Sufficiency Mediation
      formula: Living_WTP = α - γ × SupplySufficiency + X'β
      variables:
        gamma: "mediation coefficient (significant)"
        SupplySufficiency: "perception induced by opt-out"

    references:
