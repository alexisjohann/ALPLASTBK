  CAS-850:
    superkey: labor:action:L2:oring-automation:worker:complementarity
    name: 'O-Ring Automation: Komplementarität invalidiert lineare Exposure-Indizes'
    description: 'Wenn Tasks QUALITÄTS-KOMPLEMENTE sind (nicht separabel), funktioniert
      die

      Standard-Logik der task-by-task Substitution NICHT. In O-Ring-Technologien

      MULTIPLIZIEREN sich Task-Qualitäten (statt zu addieren). Der "Focus"-

      Mechanismus erzeugt drei Ergebnisse: (1) Task-by-task Logik ist unvollständig,

      weil Automatisierung einer Task die Returns zur Automatisierung anderer

      verändert. (2) Automatisierungsentscheidungen sind DISKRET und erfordern

      oft BUNDLED ADOPTION, selbst wenn Automatisierungsqualität smooth verbessert.

      (3) Arbeitseinkommen kann unter partieller Automatisierung STEIGEN, weil

      Automatisierung den Wert der verbleibenden Bottleneck-Tasks skaliert.

      Konsequenz: Lineare Exposure-Indizes ÜBERSCHÄTZEN Displacement unter

      Komplementarität. Relevant ist nicht average task exposure, sondern die

      STRUKTUR DER BOTTLENECKS.

      '
