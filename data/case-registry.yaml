    insight: 'Kindesentwicklung ist das PARADIGMA für dynamische Komplementarität:

      Dimensionen (kognitiv, sozioemotional, Gesundheit, Ernährung) verstärken

      sich gegenseitig über die Zeit. Kritische Perioden bedeuten, dass

      derselbe Input zu verschiedenen Zeitpunkten UNTERSCHIEDLICHE Effekte hat.

      Dies ist ein direktes Analogon zum EBF-Konzept von Ψ (Kontext) und γ

      (Komplementarität) - mit Zeit/Entwicklungsphase als zentraler Ψ-Dimension.

      '
    implication: 'Für EBF-Framework: Kindesentwicklung als Referenzmodell für dynamische

      Komplementarität verwenden. Die "ersten 1000 Tage" sind ein natürliches

      Beispiel für kritische Perioden (WHEN) mit hoher Komplementarität (HOW).

      Für Interventionen: Timing ist entscheidend - frühe Interventionen haben

      höhere Returns. Multidimensionalität bedeutet: Einzelinterventionen

      (nur Ernährung ODER nur Bildung) suboptimal vs. kombinierte Ansätze.

      '
    formulas:
    - name: Dynamic Skill Formation
      formula: θ_{t+1} = f(θ_t, I_t, h_t, ε_t) mit ∂²f/∂θ∂I > 0 (self-productivity
        + complementarity)
      variables:
        theta: skills_vector
        I: investment
        h: health_nutrition
