  CAS-908:
    superkey: methodology:causality:P1-P4:econometric:policy-relevant
    name: Econometric Causality P1-P4 Framework
    description: |
      Heckman & Pinto's framework for four fundamental policy questions:
      P1 (Treatment on Treated), P2 (Treatment on Untreated),
      P3 (Policy Forecast), P4 (New Policy Effects).
      Only econometric approach with structural equations can answer all four.

    10C:
      WHO:
        levels: [policy_maker, researcher]
        heterogeneity: low
        segments: [quantitative]
      WHAT:
        dimensions: [E]
        primary: causal_identification
      HOW:
        gamma_avg: null
        interaction: structural
      WHEN:
        psi_dominant: methodology
        temporal: stable
      WHERE:
        source: theoretical
        confidence: high
      AWARE:
        A_level: 0.9
        awareness_type: explicit
      READY:
        W_level: null
        theta: null
      STAGE:
        phase: null
        stability: high
      HIERARCHY:
        primary_level: methodology
        intervention_type: framework

    domain: [methodology, econometrics, causality]
    tags: [P1-P4, structural_equations, fixing_vs_conditioning, thought_experiments]
    insight: |
      Fixing ≠ Conditioning. Treatment effects are not policy effects.
      Structural parameters are policy-invariant and necessary for P3-P4.
    implication: |
      EBF parameters (λ, β, γ) should be structural, not reduced-form.
      Context (Ψ) corresponds to which mechanisms are held fixed.

    formulas:
      - name: ATE vs TT
        formula: TT = ATE + E[U₁ - U₀ | S > 0]
        variables:
          ATE: Average Treatment Effect
          TT: Treatment on Treated
          S: Selection surplus

    references:
      appendices: [V, HOW, WHERE]
      chapters: [methodology]
      cases: []
      literature: [PAP-heckman2024causality, PAP-heckman2022econometrics]
    source_paper: PAP-heckman2024causality

