  CAS-847:
    superkey: pricing:action:L2:state-dependence:uncertainty-driven:cost-shock
    name: State vs. Time-Dependent Pricing bei UK-Unternehmen
    description: 'Firmen setzen Preise entweder zustandsabhängig (state-dependent:
      Anpassung bei

      Kosten-/Marktschocks) oder zeitabhängig (time-dependent: fixe Intervalle).

      54% der UK-Firmen nutzen 2023 zustandsabhängige Preissetzung (vs. 44% in 2019).

      Zustandsabhängige Firmen reagieren schneller auf Kostenschocks, besonders bei

      großen Schocks. Kleinere Firmen, höhere Nicht-Arbeitskostenanteile und höhere

      subjektive Unsicherheit erhöhen die Wahrscheinlichkeit zustandsabhängiger Preissetzung.

      '
    10C:
      WHO:
        levels:
        - firm
        - market
        heterogeneity: high
        segments:
        - small-firms
        - high-uncertainty
        - high-non-labour-costs
      WHAT:
        dimensions:
        - F
        - E
        primary: pricing_flexibility
      HOW:
        gamma_avg: 0.65
        interaction: complementary
      WHEN:
        psi_dominant: state-dependence
        temporal: dynamic
      WHERE:
        source: empirical
        confidence: high
      AWARE:
        A_level: 0.7
        awareness_type: explicit
      READY:
        W_level: 0.75
        theta: 0.5
      STAGE:
        phase: action
        stability: medium
      HIERARCHY:
        primary_level: L2
        N_L2: 2
        complexity_location:
        - market-conditions
        - cost-structure
    domain:
    - pricing
    - firms
    - inflation
    - macroeconomics
    tags:
    - state-dependent
    - time-dependent
    - pricing
    - firm-heterogeneity
    - cost-shocks
    - uncertainty
    - inflation-dynamics
    - UK
    - NBER
    - bloom
    insight: 'Preissetzungsverhalten ist heterogen und kontextabhängig. Zustandsabhängige

      Firmen absorbieren und transmittieren Kostenschocks schneller - ein wichtiger

      Kanal für Inflationsdynamik. Die Differenz zwischen Verhaltenstypen verstärkt

      sich bei größeren Schocks (nicht-lineare Effekte).

      '
    implication: 'Für Policy: Inflationsvorhersagen müssen Firmen-Heterogenität berücksichtigen.

      Für Interventionen: Kleinere Firmen mit hoher Unsicherheit sind responsiver
      -

      Preissignale und Kostenveränderungen wirken dort schneller. Die Zunahme

      zustandsabhängiger Preissetzung (44%→54%) könnte Inflationsreaktionen beschleunigen.

      '
    formulas:
    - name: State-Dependent Share Shift
      formula: ΔSD = SD(2023) - SD(2019) = 0.54 - 0.44 = 0.10
      variables:
        SD_2023: 0.54
        SD_2019: 0.44
        delta: 0.1
    - name: Price Response Differential
      formula: dP/dCost|SD > dP/dCost|TD, mit größerer Differenz bei großen Schocks
      variables:
        response_SD: faster
        response_TD: slower
        shock_amplification: positive
    references:
      appendices:
      - V
      - BBB
      chapters: []
      cases: []
      literature:
      - bunn2026statedependent
    source_paper: bunn2026statedependent
  CAS-848:
    superkey: methodology:contemplation:L3:binning-bias:researcher:climate
    name: Binning Bias bei Temperatur-Extremeffekten
    description: 'Temperatur-Binning-Ansätze (Zählen von Tagen in Temperatur-"Bins")
      erzeugen

      häufig U-förmige Ergebnisse: Hohe UND niedrige Temperaturen haben die größten

      Effekte. Diese Nicht-Linearität kann jedoch SPURIOUS sein. Globale Erwärmung

      erzeugt Trends in Extremtemperatur-Exposition, die mechanisch mit der Baseline-

      Temperatur korrelieren. Wenn Outcome-Trends ebenfalls mit Baseline-Temperatur

      korrelieren (aus beliebigem Grund), entsteht erheblicher Bias. Das Paper

      demonstriert das Problem theoretisch, in Simulationen und mit echten Daten,

      und entwickelt Korrekturen. Einige Literaturergebnisse überleben die Korrektur,

      andere ändern sich substantiell.

      '
    10C:
      WHO:
        levels:
        - researcher
        - policymaker
        heterogeneity: low
        segments:
        - climate-economists
        - methodologists
      WHAT:
        dimensions:
        - E
        primary: causal_inference_validity
      HOW:
        gamma_avg: 0.0
        interaction: spurious
      WHEN:
        psi_dominant: statistical-artifact
        temporal: trend-confounding
      WHERE:
        source: theoretical+empirical
        confidence: high
      AWARE:
        A_level: 0.3
        awareness_type: implicit
      READY:
        W_level: 0.5
        theta: 0.7
      STAGE:
        phase: contemplation
        stability: low
      HIERARCHY:
        primary_level: L3
        N_L2: 0
        complexity_location:
        - methodology
        - statistical-inference
    domain:
    - methodology
    - climate
    - econometrics
    - causal-inference
    tags:
    - binning-bias
    - U-shaped
    - spurious-correlation
    - temperature
    - climate-economics
    - non-linear-effects
    - trend-confounding
    - NBER
    - olken
    insight: 'Nicht-lineare Schätzansätze (Binning) können FALSCHE U-förmige Effekte
      erzeugen,

      wenn Trends in der Exposure-Variable mechanisch mit Baseline-Charakteristiken

      korrelieren. Dies ist ein allgemeines methodisches Problem, nicht nur für

      Klimaforschung relevant. Jede Binning-Analyse mit trendbehafteten Variablen

      sollte auf diesen Bias geprüft werden.

      '
    implication: 'Für EBF-Methodik: Bei Verwendung von Binning-Ansätzen (z.B. für
      Alter, Einkommen,

      Zeit) prüfen, ob Trends in der binned Variable mit Baseline-Charakteristiken

      korrelieren. Falls ja: Korrekturen aus Jones et al. (2026) anwenden.

      Für Verhaltensökonomie: "U-förmige" Effekte (z.B. extremes Verhalten bei

      Extremwerten) könnten teilweise Artefakte sein.

      '
    formulas:
    - name: Binning Bias Mechanism
      formula: Bias = Cov(ΔExposure_bin, Baseline_T) × Cov(ΔOutcome, Baseline_T)
      variables:
        mechanism: trend_confounding
        condition: beide Kovarianzen ≠ 0
    - name: U-Shape Test
      formula: 'H0: β_extreme_bins = 0 nach Trend-Korrektur'
      variables:
        test_type: robustness_check
        interpretation: 'Wenn β → 0 nach Korrektur: spurious U-shape'
    references:
      appendices:
      - AN
      - E
      chapters: []
      cases: []
      literature:
      - jones2026binningbias
    source_paper: jones2026binningbias
  CAS-849:
    superkey: health:precontemplation:L1:first1000days:child:development
    name: 'Die ersten 1000 Tage: Multidimensionale Kindesentwicklung'
    description: 'Kindesentwicklung in den ersten 1000 Tagen (und darüber hinaus)
      ist

      inhärent MULTIDIMENSIONAL: Kognitive und sozioemotionale Fähigkeiten

