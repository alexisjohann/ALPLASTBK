  # ===========================================================================
  # Entrepreneurship & Innovation Cases (from Zellweger & Zenger 2023)
  # ===========================================================================

  CAS-931:
    superkey: entrepreneurship:pragmatist:L2:belief_formation_testing:usa:airbnb
    name: "Airbnb: Pragmatist Belief Formation, Testing, and Pivoting"
    description: >
      Brian Chesky and cofounders identified hotel shortage at design conference
      (problem identification), formed initial belief (airbed B&B for conference
      attendees), tested with limited prototype, received feedback (airbeds
      uncomfortable, why only conferences?), pivoted from airbeds to real beds
      and from conference-specific to general travel. Illustrates the full
      belief-formation → testing → response cycle with multiple iterations.
      Initially described as "the worst idea that ever worked."
    10C:
      WHO:
        levels: [individual_entrepreneurs, platform_users]
        heterogeneity: high
        segments: [hosts, guests, investors]
      WHAT:
        dimensions: [F, S]
        primary: accommodation_marketplace
      HOW:
        gamma_avg: 0.30
        interaction: platform_mediated_trust
      WHEN:
        psi_dominant: conference_hotel_shortage
        temporal: "2007-2015"
      WHERE:
        source: case_study
        confidence: high
      AWARE:
        A_level: 0.8
        awareness_type: problem_recognition
      READY:
        W_level: 0.9
        theta: entrepreneurial_conviction
      STAGE:
        phase: belief_testing_to_growth
        stability: evolving
      HIERARCHY:
        primary_level: L2
    domain: [entrepreneurship, platform_economics, innovation, sharing_economy]
    tags: [airbnb, chesky, belief_formation, pivot, lean_startup, pragmatism, product_market_fit]
    insight: >
      Chesky initially had wrong mental model (roommates problem vs housing problem).
      All investors passed - false negative feedback from 15+ VCs. Pivoting from
      airbeds to real beds and conferences to general travel was driven by customer
      feedback, not investor feedback. Illustrates that feedback validity depends
      on evaluator expertise and engagement.
    implication: >
      Entrepreneurs should not abandon beliefs solely based on investor feedback
      (potential false negatives). Direct customer testing provides more valid
      signals. Multiple pivots may be needed before product-market fit is achieved.
      Novel and contrarian beliefs are hard to evaluate by third parties.
    formulas:
      - "V(E) = Needs(E) x Features(E)"
      - "V proportional to correlation(V(E), V(M))"
    references:
      appendices: []
      chapters: []
      cases: [CAS-932]
      literature: [PAP-zellweger2023entrepreneurs]
    source_paper: PAP-zellweger2023entrepreneurs
    theory_id: MS-ENT-001

  CAS-932:
    superkey: entrepreneurship:pragmatist:L2:sequential_testing:usa:rent_the_runway
    name: "Rent the Runway: Sequential Cohort Testing and Sample Partitioning"
    description: >
      RTR founders borrowed designer dresses and invited undergraduates to
      trunk shows. First test: Would women rent previously worn dresses? Yes.
      Would they return them undamaged? Yes. Second test: Would women rent
      without trying on? Modified trunk show where women could view but not
      try on. Three-quarters rented. Sequential testing of discrete assumptions
      with comparison of unit economics across cohorts illustrates the response
      heuristic of sample partitioning to avoid over-fitting.
    10C:
      WHO:
        levels: [individual_consumers]
        heterogeneity: medium
        segments: [fashion_conscious_women, undergraduates]
      WHAT:
        dimensions: [F, E]
        primary: fashion_rental_marketplace
      HOW:
        gamma_avg: 0.25
        interaction: sequential_A_B_testing
      WHEN:
        psi_dominant: desire_for_designer_fashion
        temporal: "2009-2012"
      WHERE:
        source: case_study
        confidence: high
      AWARE:
        A_level: 0.7
        awareness_type: assumption_testing
      READY:
        W_level: 0.8
        theta: experimental_validation
      STAGE:
        phase: belief_testing
        stability: evolving
      HIERARCHY:
        primary_level: L2
    domain: [entrepreneurship, fashion, e_commerce, experimentation]
    tags: [rent_the_runway, A_B_testing, cohort_analysis, sample_partitioning, heuristics]
    insight: >
      RTR founders decomposed their belief into discrete testable assumptions
      and sequenced experiments to test each independently. First test validated
      willingness to rent worn dresses; second test validated online-only rental.
      Cross-cohort unit economics comparison (customer retention, acquisition
      costs, sales) allowed detection of improvement from modifications.
    implication: >
      Sequencing experiments by testing weakest assumptions first provides
      clearer feedback. Comparing unit economics across cohorts is a practical
      implementation of cross-validation to avoid over-fitting. Entrepreneurs
      should isolate variables in each test for interpretable results.
    formulas:
      - "V(E) = Needs(E) x Features(E)"
    references:
      appendices: []
      chapters: []
      cases: [CAS-931]
      literature: [PAP-zellweger2023entrepreneurs]
    source_paper: PAP-zellweger2023entrepreneurs
    theory_id: MS-ENT-003

  # ===========================================================================
  # CAS-933 to CAS-935: Acemoglu & Johnson (2023) "Power and Progress"
  # Integration Level: 5 FOUNDATIONAL | PIP-2026-02-07-001
  # ===========================================================================

  CAS-933:
    superkey: technology:bandwagon:L2:industrial_revolution:uk:factory_system
    name: "Industrial Revolution Factory System: Panopticon and Worker Displacement"
    description: >
      The British Industrial Revolution (1760-1860) exemplifies technology that
      increased average productivity while reducing worker welfare for nearly
      100 years. Textile factories replaced skilled artisans with unskilled
      labor (women, children) performing repetitive tasks 14+ hours/day.
      Bentham's panopticon principle (surveillance) was applied to factory
      management. Workers complained about conditions but lacked countervailing
      power. Real wages stagnated 1760-1840 despite massive productivity gains.
      Only after unions emerged (1850s+) did the productivity bandwagon begin
      to operate.
    10C:
      WHO:
        levels: [workers, factory_owners, artisans]
        heterogeneity: high
        segments: [skilled_artisans_displaced, unskilled_factory_workers, child_labor, factory_owners]
      WHAT:
        dimensions: [F, E, X]
        primary: technology_adoption_welfare_distribution
      HOW:
        gamma_avg: -0.3
        interaction: "technology × weak_institutions → elite_capture (negative complementarity)"
      WHEN:
        psi_dominant: "Ψ_I: no labor protections; Ψ_S: no organized labor; Ψ_K: techno-optimism (Smith, Burke)"
        temporal: "1760-1860"
      WHERE:
        source: historical_analysis
        confidence: high
      AWARE:
        A_level: 0.3
        awareness_type: "Workers aware of harm but narrative ('laws of God') suppressed alternatives"
      READY:
        W_level: 0.2
        theta: "Low readiness to act - no organizational infrastructure"
      STAGE:
        phase: pre_contemplation_to_action
        stability: "Unstable - 100 years before bandwagon activated"
      HIERARCHY:
        primary_level: L2
    domain: [economic_history, technology_adoption, labor_markets, industrial_revolution]
    tags: [industrial_revolution, factory_system, panopticon, bentham, textile, worker_displacement, bandwagon_failure]
    insight: >
      The Industrial Revolution demonstrates that technological progress can
      coexist with worker immiseration for generations. Average productivity
      soared but marginal worker productivity declined as skilled artisans
      were replaced by machine-tending. The productivity bandwagon was
      broken because (1) automation reduced marginal productivity and
      (2) workers lacked countervailing power to claim gains.
    implication: >
      For EBF: Context (Ψ_I, Ψ_S) determines whether technology creates
      complementarity or substitution. Without institutional context supporting
      worker power, γ(technology × welfare) < 0. This validates EBF Axiom 1
      (parameters are contextual) and the complementarity framework.
    formulas:
      - "β_bandwagon ≤ 0 when: marginal_productivity ↓ AND countervailing_power < threshold"
      - "Welfare_workers(t) = f(tech_direction, power_balance, institutional_context)"
    references:
      appendices: [B, V, AAA, L]
      chapters: [5, 9, 10]
      cases: [CAS-934, CAS-935]
      literature: [acemoglu2023power, PAP-acemoglu2019automation]
    source_paper: acemoglu2023power
    theory_id: MS-TP-001

  CAS-934:
    superkey: technology:automation:L2:so_so_technology:usa:digital_economy
    name: "AI and So-So Automation: Digital Economy Worker Displacement"
    description: >
      Since 1980, the US economy has experienced rapid automation (industrial
      robots, self-checkout, algorithmic management) without proportional
      wage growth. Acemoglu & Johnson identify this as "so-so automation" -
      technology that replaces workers without significant productivity gains.
      Self-checkout kiosks shift work to customers without making groceries
      cheaper. Call center chatbots reduce employment without improving service.
      Industrial robots in the Midwest caused mass layoffs and regional decline.
      Between 1980-2020, productivity grew 70% but median wages only 15%.
      The productivity bandwagon stalled because automation was not accompanied
      by sufficient new task creation.
    10C:
      WHO:
        levels: [workers_without_college, tech_entrepreneurs, platform_companies]
        heterogeneity: very_high
        segments: [non_college_workers_displaced, gig_workers, tech_billionaires, middle_class_squeezed]
      WHAT:
        dimensions: [F, E, X]
        primary: automation_inequality_divergence
      HOW:
        gamma_avg: -0.2
        interaction: "so_so_automation × weak_unions → inequality (weak negative complementarity)"
      WHEN:
        psi_dominant: "Ψ_I: deregulation, weak antitrust; Ψ_S: declining union density; Ψ_K: Silicon Valley techno-optimism"
        temporal: "1980-2023"
      WHERE:
        source: empirical_analysis
        confidence: high
      AWARE:
        A_level: 0.4
        awareness_type: "Growing awareness of inequality but techno-optimism narrative still dominant"
      READY:
        W_level: 0.3
        theta: "Some political readiness (populism) but no coherent alternative vision"
      STAGE:
        phase: contemplation
        stability: "Increasingly unstable - political polarization"
      HIERARCHY:
        primary_level: L2
    domain: [automation, technology, labor, digital_economy]
    tags: [so_so_automation, AI, robots, self_checkout, gig_economy, inequality, bandwagon_stalled]
    insight: >
      So-so automation is the key diagnostic: technology that automates
      without creating significant new productivity or new tasks. The
      productivity bandwagon stalls not because technology fails but because
      the WRONG KIND of technology dominates. Machine usefulness (augmenting
      workers) differs fundamentally from machine intelligence (replacing
      workers). Current AI development favors machine intelligence.
    implication: >
      For EBF interventions: the 10C dimension HOW (complementarity) must
      distinguish between technology that creates γ > 0 (new tasks, worker
      augmentation) and γ < 0 (pure automation, surveillance). Policy
      interventions should redirect technology direction, not just
      redistribute outcomes. Tax robots, subsidize new task creation.
    formulas:
      - "β_bandwagon(so-so) ≈ 0: ΔProductivity ≈ 0, ΔEmployment < 0"
      - "Inequality = f(automation_share / task_creation_share, union_density)"
    references:
      appendices: [B, V, AAA, L]
      chapters: [5, 9, 14]
      cases: [CAS-933, CAS-935]
      literature: [acemoglu2023power, PAP-acemoglu2020robots, PAP-acemoglu2022tasks]
    source_paper: acemoglu2023power
    theory_id: MS-TP-001

  CAS-935:
    superkey: technology:surveillance:L2:digital_platforms:global:social_media
    name: "Digital Surveillance and Platform Power: Social Media as Panopticon 2.0"
    description: >
      Digital platforms (Facebook, Google, Amazon) represent a modern
      manifestation of Bentham's panopticon principle. These platforms
      extract behavioral data from billions of users to sell targeted
      advertising, generating massive profits while creating minimal
      new jobs. Social media algorithms optimize for engagement (outrage,
      polarization) rather than user welfare. The attention economy
      monetizes surveillance without compensating the surveilled.
      Platform monopolies exercise power over information flows,
      political discourse, and market competition. This digital damage
      erodes democratic institutions (Chapter 10) while concentrating
      wealth in a handful of tech entrepreneurs.
    10C:
      WHO:
        levels: [platform_users, platform_companies, advertisers, democracies]
        heterogeneity: extreme
        segments: [2.5_billion_users_surveilled, tech_billionaires, small_businesses_dependent, democracies_undermined]
      WHAT:
        dimensions: [F, S, X, E]
        primary: surveillance_capitalism_welfare_extraction
      HOW:
        gamma_avg: -0.4
        interaction: "surveillance_technology × unregulated_platforms → democratic_erosion + inequality"
      WHEN:
        psi_dominant: "Ψ_I: Section 230, no data regulation; Ψ_S: network effects lock-in; Ψ_K: 'connecting the world' narrative"
        temporal: "2004-2023"
      WHERE:
        source: empirical_analysis
        confidence: high
      AWARE:
        A_level: 0.5
        awareness_type: "Post-Cambridge Analytica awareness rising, but behavioral lock-in persists"
      READY:
        W_level: 0.3
        theta: "GDPR in EU shows some readiness, US lags"
      STAGE:
        phase: contemplation_to_preparation
        stability: "Unstable - regulatory momentum building"
      HIERARCHY:
        primary_level: L2
    domain: [technology, digital_platforms, surveillance, democracy]
    tags: [surveillance_capitalism, social_media, facebook, google, attention_economy, platform_power, digital_panopticon]
    insight: >
      Digital platforms are the modern panopticon: they watch everyone
      without being watched themselves. Unlike the Industrial Revolution,
      digital surveillance extracts value not through labor but through
      attention and data. The "product" is behavioral prediction sold
      to advertisers. This creates negative complementarity:
      platform_profit × user_welfare < 0. No productivity bandwagon
      because surveillance is not about production but about extraction.
    implication: >
      For EBF: Digital context (Ψ_M: digital tools, Ψ_I: platform regulation)
      fundamentally changes the complementarity structure. Interventions
      must address platform power directly (antitrust, data regulation,
      algorithmic transparency) rather than individual behavior change.
      The WHEN dimension is critical: same technology in different
      regulatory contexts produces opposite welfare outcomes (EU vs US).
    formulas:
      - "Platform_Surplus = Data_Extracted × Ad_Revenue - User_Welfare_Loss"
      - "γ(platform_profit, user_welfare) < 0: negative complementarity"
    references:
      appendices: [B, V, AAA, AU, L]
      chapters: [5, 9, 10, 14]
      cases: [CAS-933, CAS-934]
      literature: [acemoglu2023power, PAP-acemoglu2018artificial]
    source_paper: acemoglu2023power
    theory_id: MS-TP-002
