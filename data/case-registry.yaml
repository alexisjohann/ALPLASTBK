      Funktioniert gut bei kompetitiven Segmenten, kontraproduktiv bei intrinsisch
      Motivierten.

      '
    implication: 'Segment-spezifisches Gamification-Design. Intrinsisch Motivierte:
      Tracking ohne Punkte. Kompetitive: Leaderboards. Soziale: Team-Challenges.

      '
    formulas:
    - name: Crowding Effect
      formula: ΔM_intrinsic = -γ_crowd × M_extrinsic
