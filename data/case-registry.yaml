  CAS-865:
    superkey: methodology:persistence:historical_economics:mechanisms:breakdown
    name: "Persistence in Economics - Mythos oder Realität? (Bisin & Federico 2021)"
    type: methodological_survey

    10C:
      WHO:
        levels: [researcher, discipline]
        segments: [historical_economists, persistence_researchers, methodologists]
        primary_level: discipline
        description: "Forschungsfeld Historical Economics, Persistence-Literatur"

      WHAT:
        utility_dimensions:
          validity: "Validität der Persistence-Befunde"
          methodology: "Methodische Standards"
          mechanisms: "Verständnis der Transmissionskanäle"
        C_ij:
          persistence_real: "Persistence ist real (validiert)"
          misattribution_risk: "Risiko falscher Kausalzuschreibung"
          p_hacking_challenge: "P-Hacking als methodisches Problem"

      HOW:
        gamma_avg: null
        interaction: "Historical Context × Current Outcomes"
        mechanism: |
          ZENTRALE FRAGE: Ist Persistence ein Mythos?

          ANTWORT: PERSISTENCE IS REAL

          ABER: Herausforderungen existieren
          ┌─────────────────────────────────────────────────────────────┐
          │  1. MISATTRIBUTION                                          │
          │     - Falsche Kausalzuschreibung                           │
          │     - Omitted Variables                                     │
          │     - Reverse Causality möglich                            │
          │                                                            │
          │  2. P-HACKING                                               │
          │     - Selektive Berichterstattung                          │
          │     - Publication Bias                                      │
          │     - Specification Searching                              │
          └─────────────────────────────────────────────────────────────┘

          FORSCHUNGSAGENDA:
          ├── MECHANISMEN: Wie genau persistiert etwas?
          │   - Kulturelle Transmission
          │   - Institutionelle Pfadabhängigkeit
          │   - Humankaptial-Akkumulation
          │
          └── BREAKDOWN: Wann bricht Persistence zusammen?
              - Welche Schocks beenden Persistence?
              - Welche Bedingungen sind notwendig?

      WHEN:
        psi_dominant: historical_context
        temporal_scope: "Long-run (decades to centuries)"
        geographic_scope: "Global (cross-country studies)"
        T_constraint: "Historical events shape current outcomes"

      WHERE:
        data_sources: "Literature survey across historical economics"
        countries: ["global"]
        level: "Cross-country, regional, individual"
        parameter_source: "PAP-bisin2021persistence"
        data_quality: "Meta-analysis of persistence studies"

      AWARE:
        awareness_type: "Researcher awareness of methodological challenges"
        salience: "Survey makes persistence debate salient"
        A_intervention: "Methodological guidelines for future research"

      READY:
        applicability: "All persistence research in economics"
        action_relevance: "Guidelines for robust persistence studies"
        W_level: "Validates persistence while acknowledging challenges"

      STAGE:
        phenomenon_stage: "Methodological synthesis"
        intervention_window: "Continuous - informs future research design"

    domain: methodology
    subdomain: historical_economics

    key_finding: |
      PERSISTENCE: MYTHOS ODER REALITÄT?

      1. ZENTRALE SCHLUSSFOLGERUNG:
         PERSISTENCE IS REAL - aber mit Caveats

      2. WAS IST PERSISTENCE?
         - Historische Ereignisse/Zustände beeinflussen aktuelle Outcomes
         - Über Jahrzehnte bis Jahrhunderte
         - Beispiele: Kolonialismus → Entwicklung, Sklaverei → Rassismus

      3. HERAUSFORDERUNGEN:
         ┌─────────────────────────────────────────────────────────────┐
         │  MISATTRIBUTION:                                            │
         │  - Wir sehen Korrelation, schliessen auf Kausalität        │
         │  - Omitted Variables können eigentlicher Treiber sein      │
         │  - Beispiel: Geographie vs. Institutionen Debatte          │
         │                                                            │
         │  P-HACKING:                                                 │
         │  - Nur signifikante Ergebnisse publiziert                  │
         │  - Specification Searching bis Signifikanz erreicht        │
         │  - File Drawer Problem                                      │
         └─────────────────────────────────────────────────────────────┘

      4. ABER: KRITIKEN WERDEN HINTERFRAGT
         - Kritiker übertreiben teilweise
         - Viele Persistence-Befunde sind robust
         - Meta-Evidenz unterstützt Persistence

      5. FORSCHUNGSAGENDA:
         - MECHANISMEN verstehen (nicht nur dokumentieren)
         - BREAKDOWN CONDITIONS identifizieren
         - Wann und warum endet Persistence?

    ebf_relevance:
      - WHEN: Persistence = Ψ_historical wirkt langfristig
      - HOW: Transmissionskanäle als Mechanismen
      - WHERE: Methodische Standards für historische Daten
      - implications_for_behavior: "Vergangene Kontexte prägen gegenwärtiges Verhalten"

    domains:
      - methodology
      - historical_economics
      - persistence
      - econometrics
      - causal_inference

    tags:
      - persistence
      - historical_economics
      - long_run_effects
      - mechanisms
      - breakdown
      - misattribution
      - p_hacking
      - methodology
      - survey
      - Bisin
      - Federico
      - handbook
      - causal_inference

    insight: |
      Dieses Paper ist methodologisch zentral für das EBF:

      VERGANGENE KONTEXTE PRÄGEN GEGENWÄRTIGES VERHALTEN!

      Das ist genau das Ψ-Framework: Kontext wirkt nicht nur im Moment,
      sondern kann über lange Zeiträume persistieren.

      Für EBF bedeutet das:
      1. Ψ_historical ist eine legitime Kontext-Dimension
      2. Aber: Vorsicht bei Kausalschlüssen (Misattribution)
      3. Fokus sollte auf MECHANISMEN liegen:
         - WIE wird etwas übertragen?
         - Kultur? Institutionen? Humankapital?
      4. Und auf BREAKDOWN:
         - WANN endet Persistence?
         - Welche Schocks durchbrechen sie?

      Die Debatte um Persistence ist auch eine Debatte um KONTEXT:
      - Ist Verhalten durch aktuelle Umstände erklärt?
      - Oder durch historisch geerbte Strukturen?
      - Antwort: BEIDES - und sie interagieren!

    implication: |
      1. METHODOLOGIE FÜR EBF:
         - Persistence-Befunde als Evidenz für Ψ_historical
         - Aber: Robust testen, Mechanismen identifizieren
         - Nicht nur "es gibt Persistence" sondern "wie funktioniert sie?"

      2. KONTEXT-HIERARCHIE:
         - Aktueller Kontext (Ψ_current)
         - Historischer Kontext (Ψ_historical)
         - Beide können Verhalten beeinflussen
         - Frage ist: Welcher dominiert wann?

      3. BREAKDOWN ALS FORSCHUNGSFRAGE:
         - Wann durchbricht eine Intervention historische Muster?
         - Welche Schocks sind stark genug?
         - → Relevant für Interventions-Design

      4. PRAKTISCHE ANWENDUNG:
         - Bei Verhaltensanalyse: Historischen Kontext berücksichtigen
         - Bei Interventions-Design: Persistence als Barriere einplanen
         - Manchmal muss man "gegen Geschichte" arbeiten

      5. EBF INTEGRATION:
         - Validiert Ψ_historical als Dimension
         - Warnt vor Misattribution
         - Fordert Mechanismus-Fokus

    formulas:
      - name: "Persistence Relationship"
        formula: "Y_t = α + β × X_t-k + ε"
        variables:
          Y_t: "Current outcome"
          X_t_minus_k: "Historical event/condition (k periods ago)"
          beta: "Persistence coefficient"
          k: "Time lag (can be decades/centuries)"

      - name: "Mechanism Decomposition"
        formula: "β = β_culture + β_institutions + β_human_capital + β_other"
        variables:
          beta_culture: "Cultural transmission channel"
          beta_institutions: "Institutional persistence channel"
