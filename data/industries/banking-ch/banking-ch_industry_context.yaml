industry_overview:
  description: "Der Schweizer Bankensektor umfasst rund 240 Banken und ist einer der bedeutendsten Finanzplätze weltweit."

  market_size:
    total_assets: 3500000000000  # CHF 3.5 Bio (geschätzt)
