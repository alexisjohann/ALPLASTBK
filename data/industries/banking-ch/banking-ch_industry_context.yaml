# =============================================================================

intervention_domains:
  - id: "IND-INT-01"
    name: "Digitalisierung beschleunigen"
    target: "Branchenweit"
    levers:
      - "Guided Digital Onboarding"
      - "Hybrid Touchpoint Design"
      - "Social Proof (Nutzerzahlen)"
    expected_adoption_increase: 0.15

  - id: "IND-INT-02"
    name: "Vertrauensaufbau Post-CS"
    target: "Alle Banken (Spillover)"
    levers:
      - "Transparenz-Kommunikation"
      - "Stabilität betonen"
      - "Differenzierung von UBS"
    expected_trust_recovery: 0.05

  - id: "IND-INT-03"
    name: "Nachhaltige Finanzprodukte"
    target: "Anleger"
    levers:
      - "Default auf ESG-Produkte"
      - "Impact Reporting"
      - "Green Framing"
    expected_esg_share_increase: 0.20

  - id: "IND-INT-04"
    name: "Vorsorge-Aktivierung"
    target: "18-45 Jährige"
    levers:
      - "Loss Framing (entgangene Steuervorteile)"
      - "Automatische Erhöhung"
      - "Peer Comparison"
    expected_3a_penetration_increase: 0.10

