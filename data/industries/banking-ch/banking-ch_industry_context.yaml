# =============================================================================
# SECTION 4: BRANCHENTRENDS
# =============================================================================

trends:
  structural:
    - id: "TREND-01"
      name: "Konsolidierung"
      description: "Fortschreitende Fusionen und Übernahmen"
      impact: "high"
      direction: "accelerating"
      evidence:
        - "CS-UBS Übernahme 2023"
        - "Filialschliessungen branchenweit"
        - "Sinkende Bankenzahl seit 2000"

    - id: "TREND-02"
      name: "Hybride Beratung"
      description: "Kombination digital + persönlich"
      impact: "high"
      direction: "growing"
      adoption_rate: 0.70

    - id: "TREND-03"
      name: "Open Banking"
      description: "API-basierte Ökosysteme"
      impact: "medium"
      direction: "emerging"
      adoption_rate: 0.25

  technological:
    - id: "TREND-04"
      name: "Generative AI"
      description: "KI in Kundenservice und Beratung"
      impact: "high"
      direction: "accelerating"
      early_adopters: ["UBS", "PostFinance", "Neon"]

    - id: "TREND-05"
      name: "Cloud Migration"
      description: "Verlagerung in Cloud-Infrastruktur"
      impact: "medium"
      direction: "growing"
      adoption_rate: 0.45

    - id: "TREND-06"
      name: "Crypto/DLT"
      description: "Blockchain und Krypto-Assets"
      impact: "medium"
      direction: "stabilizing"
      adopters: ["PostFinance", "Vontobel", "BEKB"]

  regulatory:
    - id: "TREND-07"
      name: "TBTF Regulierung"
      description: "Too-Big-To-Fail Verschärfung"
      impact: "high"
      direction: "intensifying"
      affected: ["UBS"]

    - id: "TREND-08"
      name: "ESG/Sustainable Finance"
      description: "Nachhaltigkeitsanforderungen"
      impact: "high"
      direction: "growing"
      adoption_rate: 0.60

    - id: "TREND-09"
      name: "Datenschutz"
      description: "Verschärfung DSG/DSGVO"
      impact: "medium"
      direction: "stable"

  customer:
    - id: "TREND-10"
      name: "Selbstbedienung"
      description: "Shift zu Self-Service"
      impact: "high"
      direction: "accelerating"
      preference_rate: 0.55

    - id: "TREND-11"
      name: "Preissensitivität"
      description: "Steigende Gebührentransparenz"
      impact: "medium"
      direction: "growing"
      switcher_rate: 0.08

    - id: "TREND-12"
      name: "Nachhaltigkeitserwartung"
      description: "Kunden fordern ESG"
      impact: "medium"
      direction: "growing"
      importance_score: 0.65

