# EBF Goal Decomposition Method - Zielarchitektur
# SSOT: data/ebf-gdm-goals.yaml
# Methodik: docs/frameworks/ebf-gdm-methodology.md
# Version: 1.0
# Datum: 2026-02-09
# Basis: KAOS (van Lamsweerde 2001) + E1-E7

---

mission:
  id: MISSION
  statement: |
    EBF soll die Grundlage, der Source Code sein, um Verhalten und die
    Konsequenzen von Entscheidungen auf das Verhalten so genau wie möglich
    prognostizieren zu können.
  prediction_types:
    - type: 1
      name: "Prognose"
      question: "Was wird passieren?"
      inputs: ["Kontext Ψ", "Menschen"]
    - type: 2
      name: "Intervention"
      question: "Was passiert, WENN wir intervenieren?"
      inputs: ["Kontext Ψ", "Menschen", "Intervention I"]

