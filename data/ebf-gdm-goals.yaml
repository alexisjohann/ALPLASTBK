# ============================================================================
# SYSTEMZIELE (SZ1-SZ7)
# ============================================================================

systemziele:

  - id: SZ-1
    name: "Modularität"
    description: "Jede Komponente (Appendix, Modell, Parameter) ist unabhängig testbar"
    pruefkriterium: "Kein Modul hat zirkuläre Abhängigkeiten; jedes Modul hat eigenen Test"
    applies_to: "alle AP"

  - id: SZ-2
    name: "Formale Konsistenz"
    description: "Keine Widersprüche zwischen Axiomen, Modellen und Parametern"
    pruefkriterium: "validate_referential_integrity.py: Score ≥ 95%"
    applies_to: "alle AP"

  - id: SZ-3
    name: "Empirische Verankerung"
    description: "Jeder Parameter hat PAR-*-* Referenz mit Tier 1/2 Quelle"
    pruefkriterium: "≥80% der Parameter mit Tier 1 oder 2 evidence_tier"
    applies_to: "alle AP mit Parametern"

  - id: SZ-4
    name: "Ausführbarkeit"
    description: "Jedes Modell ist als Python-Script lauffähig"
    pruefkriterium: "python scripts/run_model.py MOD-* → Ergebnis ohne Fehler"
    applies_to: "alle AP mit Modellen"

  - id: SZ-5
    name: "Lernfähigkeit"
    description: "3-Level-Feedback implementiert (L1 Parameter, L2 Modell, L3 Theorie)"
    pruefkriterium: "Feedback-Trigger definiert; ≥1 dokumentierter L2-Feedback-Fall"
    applies_to: "HZ-4, HZ-5, HZ-6"

  - id: SZ-6
    name: "Skalierbarkeit"
    description: "Neue Domänen, Kontexte und Menschentypen hinzufügbar ohne Refactoring"
    pruefkriterium: "Neuer Kontext in <1h hinzufügbar; Neue Domäne in <1 Tag"
    applies_to: "alle AP"

  - id: SZ-7
    name: "Nutzbarkeit"
    description: "Consultant kann Modell in <30 min anwenden"
    pruefkriterium: "Time-to-first-result ≤ 30 min für Standard-Modell"
    applies_to: "HZ-4, HZ-6"

# ============================================================================
# METHODIK-REFERENZ
# ============================================================================

methodik:
  basis: "KAOS (van Lamsweerde 2001)"
  erweiterungen:
    - id: E1
      name: "GQM/OKR-Metriken"
      quellen: ["basili1994gqm", "kaplan1992bsc", "doerr2018okr"]
    - id: E2
      name: "Ansoff-Gap-Analyse"
      quellen: ["ansoff1965strategy", "mintzberg1994planning"]
    - id: E3
      name: "PRINCE2-Lieferobjekte"
      quellen: ["ogc2017prince2", "haugan2002wbs", "pmi2021pmbok"]
    - id: E4
      name: "Argyris/Bateson 3-Level-Feedback"
      quellen: ["argyris1977doubleloop", "bateson1972ecology"]
    - id: E5
      name: "AOP-Querschnittsanforderungen"
      quellen: ["kiczales1997aop"]
    - id: E6
      name: "Meadows/Sterman Input-Rückkopplung"
      quellen: ["meadows2008systems", "sterman2000dynamics"]
    - id: E7
      name: "Tetlock/Brier Empirische Validierung"
      quellen: ["tetlock2015superforecasting", "brier1950verification"]
  regeln:
    - id: R1
      name: "Traceability"
      quellen: ["gotel1994traceability", "ramesh2001traceability"]
    - id: R2
      name: "Meilenstein-Regel"
      quelle: "PRINCE2"
    - id: R3
      name: "Gap-Regel"
      quelle: "E2 (Ansoff)"
    - id: R4
      name: "Arbeitspaket-Regel"
      quelle: "PMI/PRINCE2"
    - id: R5
      name: "Lieferobjekt-Regel"
      quelle: "E3 (PRINCE2)"
    - id: R6
      name: "Vollständigkeits-Regel"
      quellen: ["incose2015se", "nasa2017se"]
    - id: R7
      name: "Querschnitt-Regel"
      quelle: "E5 (AOP)"

