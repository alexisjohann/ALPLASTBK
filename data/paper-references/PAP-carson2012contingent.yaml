abstract: A person may be willing to make an economic tradeoff to assure that a wilderness area or scenic resource is protected
  even if neither that person nor (perhaps) anyone else will actually visit this area. This tradeoff is commonly labeled “passive
  use value.” Contingent valuation studies ask questions that help to reveal the monetary tradeoff each person would make
  concerning the value of goods or services. Such surveys are a practical alternative approach for eliciting the value of
  public goods, including those with passive use considerations. First I discuss the Exxon Valdez oil spill of March 1989,
  focusing on why it is important to measure monetary tradeoffs for goods where passive use considerations loom large. Although
  discussions of contingent valuation often focus on whether the method is sufficiently reliable for use in assessing natural
  resource damages in lawsuits, it is important to remember that most estimates from contingent valuation studies are used
  in benefit–cost assessments, not natural resource damage assessments. Those working on benefit–cost analysis have long recognized
  that goods and impacts that cannot be quantified are valued, implicitly, by giving them a limitless value when government
  regulations preclude certain activities, or giving them a value of zero by leaving certain consequences out of the analysis.
  Contingent valuation offers a practical alternative for reducing the use of either of these extreme choices. I put forward
  an affirmative case for contingent valuation and address a number of the concerns that have arisen.
