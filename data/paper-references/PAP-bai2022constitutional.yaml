summary:
  abstract: 'We experiment with methods for training a harmless AI assistant through
    a process we call Constitutional AI (CAI). The approach involves training the
    model with a set of principles (a "constitution") that guide its responses. We
    find that a model trained with CAI is both helpful and harmless without requiring
    human feedback labels for harmlessness. The formal constitution constraining LLM
    outputs outperforms pure RLHF approaches for alignment.

    '
