abstract: 'There are many products for which the utility that a user derives from consumption of the good increases with the
  number of other agents consuming the good. There are several possible sources of these positive con-sumption externalities.
  1 1) The consumption externalities may be generated through a direct physical effect of the number of purchasers on the
  quality of the product. The utility that a consumer derives from purchasing a telephone, for example, clearly depends on
  the number of other households or businesses that have joined the telephone network. These network externalities are present
  for other communications technologies as well, including Telex, data networks, and over-the-phone facsimilie equipment.

  2) There may be indirect effects that give rise to consumption externalities. For example, an agent purchasing a personal
  computer will be concerned with the number of other agents purchasing similar hardware because the amount and variety of
  software that will be supplied for use with a given computer will be an increasing function of the number of hardware units
  that have been sold. This hardware-software paradigm also applies to video games, video players and recorders, and phonograph
  equipment.'
