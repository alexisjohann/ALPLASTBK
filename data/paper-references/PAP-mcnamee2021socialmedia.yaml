abstract: 'UK longitudinal study using Understanding Society data to analyze social media

  effects on adolescent well-being. Uses individual fixed effects, propensity score

  matching, and IPWRA. Documents non-linear dose-response relationship supporting

  the Goldilocks Hypothesis: >4 hours/day is harmful, <3 hours/day has moderate

  benefits for peer relationships.

  '
methodology:
  design: longitudinal_panel
  identification:
  - Individual fixed effects
  - Propensity score matching
  - IPWRA treatment effects
  data_source: Understanding Society (UKHLS)
  country: United Kingdom
  age_exposure: 11-14 years
  age_outcome: 16-20 years
theoretical_frameworks:
  goldilocks_hypothesis:
    source: Przybylski and Weinstein (2017)
    prediction: Moderate use optimal, over/under-engagement problematic
  displacement_hypothesis:
    source: Lin (1993)
    prediction: Social media displaces health-promoting activities
  uses_gratifications:
    source: Quan-Haase and Young (2010)
    prediction: People use social media as coping strategy
dose_response:
  high_use:
    threshold: '>4 hours/day'
    direction: negative
  moderate_use:
    threshold: <3 hours/day
    direction: positive (moderate)
