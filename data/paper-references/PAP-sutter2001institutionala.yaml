abstract: This paper addresses the institutional concentration of authors in 15 top economics journals from 1977 to 1997.
  The concentration of authors' PhD affiliations is substantially higher than the concentration of authors' current affiliations.
  Relating input indicators, such as population, number of universities with economics departments, or manpower in economics,
  to publication output reduces the US dominance considerably, whereas Israel and the United Kingdom come out excellently.
  Exporters and importers of PhDs among universities are identified. Concentration ratios like the Herfindahl-Index lack a
  clear time trend. Nevertheless, the position of the United States has been weakening in recent years.
