abstract: In responding to a request for predictions about the future of economics, I predict that Homo Economicus will evolve
  into Homo Sapiens, or, more simply put, economics will become more related to human behavior. My specific predictions are
  that Homo Economicus will start to lose IQ, will become a slower learner, will start interacting with other species, and
  that economists will start to study human cognition, human emotion, and will distinguish more clearly between normative
  and descriptive theories.
