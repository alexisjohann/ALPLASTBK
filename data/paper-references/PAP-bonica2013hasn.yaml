abstract: During the past two generations, democratic forms have coexisted with massive increases in economic inequality in
  the United States and many other advanced democracies. Moreover, these new inequalities have primarily benefited the top
  1 percent and even the top .01 percent. These groups seem sufficiently small that economic inequality could be held in check
  by political equality in the form of “one person, one vote.” In this paper, we explore five possible reasons why the US
  political system has failed to counterbalance rising inequality. First, both Republicans and many Democrats have experienced
  an ideological shift toward acceptance of a form of free market capitalism that offers less support for government provision
  of transfers, lower marginal tax rates for those with high incomes, and deregulation of a number of industries. Second,
  immigration and low turnout of the poor have combined to make the distribution of voters more weighted to high incomes than
  is the distribution of households. Third, rising real income and wealth has made a larger fraction of the population less
  attracted to turning to government for social insurance. Fourth, the rich have been able to use their resources to influence
  electoral, legislative, and regulatory processes through campaign contributions, lobbying, and revolving door employment
  of politicians and bureaucrats. Fifth, the political process is distorted by institutions that reduce the accountability
  of elected officials to the majority and hampered by institutions that combine with political polarization to create policy
  gridlock.
