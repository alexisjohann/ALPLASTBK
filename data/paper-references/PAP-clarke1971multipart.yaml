abstract: 'MULTIPART PRICING 19 goods literature there are broadly two general approaches for attempting to cope with the
  problem through market exchange devices. Each has important flaws. Either prohibitive transactions costs are required to
  arrive at an output determination that will be mutually satisfactory to all participants and/or" free rider" behavior arises
  that leads to suboptimal output solutions.

  The" free rider" problem, as well as its resolution under the proposed system, is usefully considered with reference to
  alternative assumptions about individual behavior under a conventional marginal benefit taxation scheme, where government,
  lacking information about individual preferences, confronts each individual with a tax-price proportional to the intensity
  of his revealed demand at the margin. 3 Consider, first, a rather naive response of individuals to such a pricing system
  where each behaves independently. He treats the behavior of others as a state of nature.'
