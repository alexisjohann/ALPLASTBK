title: The Symbol Grounding Problem
author: Harnad
year: '1990'
publication_type: journal_article
doi: 10.1016/0167-2789(90)90087-6
abstract: "This seminal paper describes the symbol grounding problem: How can the semantic interpretation of a formal symbol system be made intrinsic to the system, rather than parasitic on meanings in our heads? The problem is analogous to trying to learn Chinese from a Chinese/Chinese dictionary alone. Harnad proposes that symbolic representations must be grounded bottom-up in nonsymbolic representations: iconic representations (sensory analogs) and categorical representations (learned feature-detectors). Connectionism is suggested as a mechanism for learning these grounded categorical representations."
