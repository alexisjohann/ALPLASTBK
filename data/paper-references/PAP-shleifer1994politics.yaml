abstract: The debate over market socialism has ignored the importance of the assumptions about the objectives of politicians
  in determining resource allocation. Theory and evidence suggest that totalitarian socialism does not lead to efficient resource
  allocation because dictators do not maximize social welfare. But democratic governments have political objectives different
  from social welfare as well. The authors argue that because these governments command greater resources (have more control
  rights) under socialism, democratic socialism (even if it could exist) is a less efficient system than democratic capitalism.
  Thus the political case against market socialism is even stronger than the economic case.
