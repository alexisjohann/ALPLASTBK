abstract: |
  European comparative study examining the relationship between propensity to believe
  in conspiracy myths and individual political attitudes, taking immigration (Great
  Replacement myth) and COVID-19 narratives as examples. Belief in Great Replacement
  associated with democratic alienation and far-right voting.
