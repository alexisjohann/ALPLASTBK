abstract: 'American teenagers perform considerably worse on international assessments of achievement than do teenagers in
  other high-income countries. This observation has been a source of great concern since the first international tests were
  administered in the 1960s. But does this skill gap persist into adulthood? We examine this question using the first international
  assessment of adult literacy, conducted in the 1990s. We find that, consistent with other assessments of the school-age
  population, U.S. teenagers perform relatively poorly, ranking behind teenagers in the twelve other rich countries surveyed.
  However, by their late twenties, Americans compare much more favorably to their counterparts abroad: U.S. adults aged 26–30
  assessed at the same time using the same test ranked seventh in the same group of countries, and the gap with countries
  still ahead was much diminished. The historical advantage that the United States has enjoyed in college graduation appears
  to be an important reason why, between the teen years and the late twenties, American literacy rates appear to catch up
  with those in other high-income countries. The educational systems of countries with high university graduation rates appear
  to share two features: comprehensive secondary schools—in which all students have the option of taking courses to prepare
  for university—and a highly accessible university sector. For most of the twentieth century, the United States led the developed
  world in participation and completion of higher education. In recent years, however, other high-income countries—many of
  which established comprehensive secondary schooling in decades prior—have substantially expanded access to university education.
  These changes should have striking consequences for the distribution of skill across countries in the years to come'
