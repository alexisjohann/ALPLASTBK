abstract: Credence goods, such as car repairs or medical services, are characterized by severe informational asymmetries between
  sellers and consumers. We address external validity by asking whether conclusions from standard student subject pools extend
  to professionals from the target field. Using car mechanics as participants in lab experiments on credence goods markets,
  we find that both subject pools react qualitatively the same to changes in the informational and institutional framework.
  Car mechanics overtreat more than students, probably due to professional decision heuristics learned in their training.
