abstract: >
  Comprehensive review of management research in economics. Examines management
  practices as complementary systems (building on Milgrom & Roberts 1990, 1995).
  Reviews evidence on manager effects (trained MBAs add ~10% to firm value),
  hiring practices, performance pay, teamwork, delegation, and hierarchy.
  Synthesizes World Management Survey (WMS) data covering 10,000+ firms across
  35 countries. Central finding: management practices form complementary clusters
  that must be adopted together for maximum effect. Individual practices in
  isolation yield limited returns. Reviews evidence on middle managers as crucial
  implementation layer between strategy and execution.
