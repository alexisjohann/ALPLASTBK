key_equations:
- name: Receiver Utility
  equation: U_R(h, F) = wh + ψ(F)
  context: h=help received, F=rejection/acceptance outcome
- name: Sender Utility
  equation: U_S(h; g, w) = (gw - c)h + μφ(F)
  context: g=generosity, w=need, c=cost, μ=image concern
- name: Asking Threshold (No Offer)
  equation: w* = λα[M⁺_N(ĝ(w*)) - ḡ_N]
  context: Indifference condition for asking after no offer
- name: Offering Threshold
  equation: g̃ = c / E[w | w < w*]
  context: Indifference condition for offering
- name: Discouragement Effect
  equation: w*_N > w*_O when π < 1
  context: Higher threshold to ask after non-offer vs after offer
- name: Fear of Rejection
  equation: ψ(reject) = -λα[g̃ - ḡ_N] < 0
  context: Negative utility from rejection revelation
