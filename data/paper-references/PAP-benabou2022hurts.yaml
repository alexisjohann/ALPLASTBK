paper: benabou2022hurts
title: It Hurts To Ask
author: Bénabou, Roland; Jaroszewicz, Ania; Loewenstein, George
year: '2022'
publication_type: working_paper
journal: NBER Working Paper
number: '30486'
doi: 10.3386/w30486
abstract: 'We analyze a three-stage game in which a Sender may offer help, a Receiver

  can accept or ask for help, and the Sender decides whether to grant the

  request. Bilateral private information—the Sender''s generosity (cost of

  helping) and the Receiver''s need—leads to: (1) Fear of rejection - asking

  for help reveals need and risks rejection, which is aversive when it

  reveals low valuation by the Sender. (2) Discouragement effect - not

  receiving an offer can discourage asking as it signals low generosity.

  (3) Waiting trap - both parties may inefficiently delay, each waiting

  for the other to move first. The model explains paradoxes in welfare

  take-up, workplace helping, healthcare seeking, and charitable giving.

  '
abstract_fetched: '2026-02-04'
abstract_source: full_paper
structural_characteristics:
  S1_research_question: 'How do fear of rejection and discouragement effects shape helping dynamics

    when both need and generosity are private information? When do Receivers

    ask vs wait for offers? When do Senders offer vs wait for requests?

    '
  S2_methodology: 'Three-stage game-theoretic model with bilateral private information.

    Sender has private generosity g ∈ [0, ḡ], Receiver has private need w ∈ [0, w̄].

    Sequential analysis: Offer → Ask → Grant stages with perfect Bayesian equilibrium.

    Extensions: costly offers, charitable giving, benefactor image concerns.

    '
  S3_sample_data: 'Theoretical paper - no primary empirical data. References extensive

    literature on welfare non-take-up (Currie 2006), asking in organizations

    (Flynn & Lake 2008), charitable giving experiments, healthcare seeking.

    '
  S4_findings: '(1) Fear of rejection creates non-monotonic asking: moderate-need types

    may ask less than low-need types due to rejection aversion.

    (2) Discouragement effect: P(ask|no offer) < P(ask|offer possible) because

    non-offer signals low generosity, making rejection more likely.

    (3) Waiting trap: Multiple equilibria exist where both parties wait,

    leading to Pareto-inferior outcomes.

    (4) Offering can be superior to asking when rejection sensitivity is high.

    (5) Image concerns can sustain helping but also create perverse dynamics.

    '
  S5_validity: 'Strong internal validity from formal mathematical derivations with complete

    proofs. Predictions consistent with empirical regularities: welfare non-take-up

    despite eligibility, reluctance to ask colleagues for help, avoiding medical

    diagnoses. External validity supported by citations to experimental evidence.

    '
  S6_reproducibility: 'All proofs provided in technical appendix. Model assumptions clearly stated.

    Key equilibrium conditions (w*, g̃) fully characterized. Comparative statics

    derived analytically. Extensions preserve qualitative results.

    '
