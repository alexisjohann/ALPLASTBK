abstract: This seminal work contends that the modern market economy and nation-state should be understood as a single human
  invention called Market Society. Polanyi argues that while pre-market economies were embedded within social relations, capitalism
  reverses this with social relations becoming defined by economic relations. He traces how the attempted transition to a
  self-regulating market resulted in the collapse of 19th century civilization, with the Great Depression, fascism, and WWII
  as logical culminations of laissez-faire taken to an extreme. The concept of the double movement explains how society responds
  to protect itself from market dislocations.
