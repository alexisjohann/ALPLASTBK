abstract: ABSTRACT We argue that managerial overconfidence can account for corporate investment distortions. Overconfident
  managers overestimate the returns to their investment projects and view external funds as unduly costly. Thus, they overinvest
  when they have abundant internal funds, but curtail investment when they require external financing. We test the overconfidence
  hypothesis, using panel data on personal portfolio and corporate investment decisions of Forbes 500 CEOs. We classify CEOs
  as overconfident if they persistently fail to reduce their personal exposure to company‐specific risk. We find that investment
  of overconfident CEOs is significantly more responsive to cash flow, particularly in equity‐dependent firms.
