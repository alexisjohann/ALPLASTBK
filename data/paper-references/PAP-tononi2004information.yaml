title: An Information Integration Theory of Consciousness
author: Tononi
year: '2004'
publication_type: journal_article
doi: 10.1186/1471-2202-5-42
abstract: This paper presents the Information Integration Theory (IIT) of consciousness,
  proposing that consciousness corresponds to the capacity of a system to integrate
  information. The theory addresses two main problems of consciousness - what determines
  the extent to which a system has conscious experience, and what determines what
  kind of consciousness a system has. The theory accounts for why certain neural systems
  like the thalamocortical system generate consciousness while others like the cerebellum
  do not, and why consciousness is reduced during dreamless sleep and generalized
  seizures. IIT proposes that the quantity of consciousness (phi) corresponds to the
  amount of integrated information a system generates above and beyond its parts.
