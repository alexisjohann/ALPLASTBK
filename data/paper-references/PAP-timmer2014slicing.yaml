abstract: In this paper, we “slice up the global value chain” using a decomposition technique that has recently become feasible
  due to the development of the World Input-Output Database. We trace the value added by all labor and capital that is directly
  and indirectly needed for the production of final manufacturing goods. The production systems of these goods are highly
  prone to international fragmentation as many stages can be undertaken in any country with little variation in quality. We
  seek to establish a series of facts concerning the global fragmentation of production that can serve as a starting point
  for future analysis. We describe four major trends. First, international fragmentation, as measured by the foreign value-added
  content of production, has rapidly increased since the early 1990s. Second, in most global value chains there is a strong
  shift towards value being added by capital and high-skilled labor, and away from less-skilled labor. Third, within global
  value chains, advanced nations increasingly specialize in activities carried out by high-skilled workers. Fourth, emerging
  economies surprisingly specialize in capital-intensive activities.
