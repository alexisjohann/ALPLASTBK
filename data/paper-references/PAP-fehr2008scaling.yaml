summary:
  abstract_extended: 'This Nature article examines how cooperation scales to large groups. We

    discuss the mechanisms that enable cooperation among strangers in large

    societies, including punishment, reputation, and institutions. Human

    cooperation at scale is a remarkable evolutionary achievement.'
  key_findings: "1. SCALING CHALLENGES\n   - Free-rider problem worse\n   - Monitoring harder\n   - Punishment costlier\n\n\
    2. MECHANISMS FOR SCALE\n   - Indirect reciprocity\n   - Reputation systems\n   - Third-party punishment\n\n3. INSTITUTIONAL\
    \ ROLE\n   - Formal enforcement\n   - Norm internalization\n   - Cultural evolution"
  ebf_relevance: '10C DIMENSIONS:

    - WHO (AAA): Group size effects

    - HOW (B): Scaling complementarities

    - WHEN (V): Large-group context


    THEORY SUPPORT:

    - MS-SR-001: Strong Reciprocity

    - Published in Nature

    - Large-scale cooperation theory


    KEY INSIGHT:

    Human cooperation at the scale of large societies requires special

    mechanisms including reputation, punishment, and institutions.'
