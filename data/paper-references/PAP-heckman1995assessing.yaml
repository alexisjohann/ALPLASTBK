abstract: This paper analyzes the method of social experiments. The assumptions that justify the experimental method are exposited.
  Parameters of interest in evaluating social programs are discussed. The authors show how experiments sometimes serve as
  instrumental variables to identify program impacts. The most favorable case for experiments ignores variability across persons
  in response to treatments received and assumes that mean impacts of a program are the main object of interest in conducting
  an evaluation. Experiments do not identify the distribution of program gains unless additional assumptions are maintained.
  Evidence on the validity of the assumptions used to justify social experiments is presented.
