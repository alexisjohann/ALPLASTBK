abstract: A large and growing share of retail prices all over the world are posted online on the websites of retailers. This
  is a massive and (until recently) untapped source of retail price information. Our objective with the Billion Prices Project,
  created at MIT in 2008, is to experiment with these new sources of information to improve the computation of traditional
  economic indicators, starting with the Consumer Price Index. We also seek to understand whether online prices have distinct
  dynamics, their advantages and disadvantages, and whether they can serve as reliable source of information for economic
  research. The word “billion” in Billion Prices Project was simply meant to express our desire to collect a massive amount
  of prices, though we in fact reached that number of observations in less than two years. By 2010, we were collecting 5 million
  prices every day from over 300 retailers in 50 countries. We describe the methodology used to compute online price indexes
  and show how they co-move with consumer price indexes in most countries. We also use our price data to study price stickiness,
  and to investigate the “law of one price” in international economics. Finally we describe how the Billion Prices Project
  data are publicly shared and discuss why data collection is an important endeavor that macro- and international economists
  should pursue more often.
