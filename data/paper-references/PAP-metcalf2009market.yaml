abstract: The United States is moving closer to enacting a policy to reduce domestic emissions of greenhouse gases. A key
  element in any plan to reduce emissions will be to place a price on greenhouse gas emissions. This paper discusses the different
  approaches that can be taken to price emissions and assesses their strengths and weaknesses.
