abstract: We study experimentally the relationship between distributional preferences and competitive behavior. We find that
  spiteful subjects react strongest to competitive pressure and win in a tournament significantly more often than efficiency-minded
  and inequality averse subjects. However, when given the choice between a tournament and a piece rate scheme, efficiency-minded
  subjects choose the tournament most often, while spiteful and inequality averse subjects avoid it. When controlling for
  distributional preferences, risk attitudes and past performance, the gender gap in the willingness to compete is no longer
  significant, indicating that gender-related variables explain why twice as many men as women self-select into competition.
