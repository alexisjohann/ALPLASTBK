abstract: 'One of the most notable, but least discussed, aspects of the halting attempts during the past six years to reform
  the economies of the Soviet Union, and now those of its successor states, has been the prominent role played by professional
  economists. Not since the mid-1920s has the Soviet political leadership felt so strongly the need to draw upon the expertise
  of the economics profession to help determine its course of action. In this paper, we attempt to characterize the current
  state of economics in the former Soviet Union, investigate the implications that the condition of Soviet economics has for
  reform, and suggest possible future directions for the discipline. Our information comes from four main sources: professional
  publications of Soviet and Western economists, published remarks by Soviet economists, personal interviews and discussions
  which we conducted with young Soviet economists in the summers of 1990 and 1991, and a questionnaire administered to Soviet
  economists and graduate students in the Soviet Union.'
