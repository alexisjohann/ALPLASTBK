abstract: This issue of puzzles can only be described as eclectic. The topics of the puzzles range from medical statistics
  to TV game shows to Las Vegas slot machines to squash to running around in squares. As usual, most puzzle answers are at
  the back. However, the first and last puzzles are unsolved. I offer a conjecture for one—the right answer could prove quite
  valuable.
