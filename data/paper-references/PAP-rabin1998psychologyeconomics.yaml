abstract: ': Because psychology systematically explores human judgment, behavior,
  and well-being, it can teach us important facts about how humans differ from traditional
  economic assumptions. In this essay I discuss a selection of psychological findings
  relevant to economics. Standard economics assumes that each person has stable, well-defined
  preferences, and that she rationally maximizes those preferences. Section 2 considers
  what psychological research teaches us about the true form of preferences, allowing
  us to make economics more realistic within the rationalchoice framework. Section
  3 reviews research on biases in judgment under uncertainty; because those biases
  lead people to make systematic errors in their attempts to maximize their preferences,
  this research poses a more radical challenge to the economics model. The array of
  psychological findings reviewed in Section 4 points to an even more radical critique
  of the economics model: Even if we are willing to modify our familia...'
