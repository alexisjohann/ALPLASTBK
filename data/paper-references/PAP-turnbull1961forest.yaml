abstract: The bestselling classic text on one anthropologist's incredible experience living among the African Mbuti Pygmies. Colin Turnbull details the Mbuti pygmy people and their love of the forest, and each other. Turnbull lived among the Mbuti people for three years as an observer, offering a charming and intimate firsthand account of the people and their culture. He contrasts his forest-living subjects' lifestyle with that of nearby town-dwelling Africans and evaluates the interactions of the two groups. A timeless work of academic and humanitarian significance.
