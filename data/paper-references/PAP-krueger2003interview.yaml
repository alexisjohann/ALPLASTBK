abstract: This article contains an interview with Edmond Malinvaud. Professor Malinvaud describes the origins of his interest
  in economics, teachers who had a major influence on his development as an economist, his visit to the Cowles Commission
  in 1950, the substance of his research, and the contributions he made as a policy maker. Among the interesting tidbits in
  the interview is that Professor Malinvaud's popular textbooks in microeconomic theory, macroeconomics and econometrics were
  a direct outgrowth of courses he taught at INSEE. “I am not good at speaking,” he said, “when not constrained by a written
  text.”
