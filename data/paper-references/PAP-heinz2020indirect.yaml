abstract: We conduct a field experiment to study how worker productivity is affected if employers act adversely towards their
  co-workers. Our employees work for two shifts in a call centre. In our main treatment, we lay off some workers before the
  second shift. Compared to two control treatments, we find that the lay-off reduces the productivity of unaffected workers
  by 12%. We find suggestive evidence that this result is not driven by altered beliefs about the job or the management’s
  competence, but caused by the workers’ perception of unfair employer behaviour. The latter interpretation is confirmed in
  a prediction experiment with professional HR managers. Our results suggest that the price for adverse employer behaviour
  goes well beyond the potential tit for tat of directly affected workers.
