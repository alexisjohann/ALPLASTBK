summary:
  abstract_extended: "Extrinsic incentives may come into CONFLICT with other motivations.\n\nKEY INSIGHT:\nMonetary incentives\
    \ from principals may CHANGE HOW TASKS ARE PERCEIVED\nby agents, with NEGATIVE effects on behavior.\n\nTWO PROBLEMATIC\
    \ PATTERNS:\n\n1. SHORT-TERM EFFECTIVENESS, LONG-TERM HARM\n   Incentives might have desired effects in short term, but\
    \ still\n   WEAKEN INTRINSIC MOTIVATIONS.\n\n2. CROWDING OUT\n   External incentives can crowd out internal motivation.\n\
    \nCONCRETE EXAMPLE:\nAn incentive for a child to learn to read might:\n- Achieve that goal in the SHORT TERM\n- BUT be\
    \ COUNTERPRODUCTIVE as an incentive for students to ENJOY\n  reading and seek it out over their lifetimes\n\nTHREE IMPORTANT\
    \ DOMAINS EXAMINED:\n\n1. EDUCATION\n   - Incentives for grades vs. love of learning\n\n2. CONTRIBUTIONS TO PUBLIC GOODS\n\
    \   - Extrinsic rewards vs. civic duty\n\n3. LIFESTYLE CHANGES (smoking, exercise)\n   - External motivation vs. internal\
    \ commitment"
  key_findings: '1. Incentives can CROWD OUT intrinsic motivation

    2. Short-term effectiveness ≠ long-term effectiveness

    3. How task is perceived changes with incentives

    4. Education: incentives may harm love of learning

    5. Public goods: rewards may reduce civic duty

    6. Health behaviors: external motivation fragile'
