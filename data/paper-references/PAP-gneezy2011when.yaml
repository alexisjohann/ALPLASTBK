title: When and Why Incentives (Dont) Work to Modify Behavior
author: Gneezy
year: '2011'
publication_type: journal_article
doi: 10.1257/jep.25.4.191
abstract: 'Extrinsic incentives may come into conflict with other motivations. Monetary incentives from principals may change
  how tasks are perceived by agents, with negative effects on behavior. In other cases, incentives might have the desired
  effects in the short term, but they still weaken intrinsic motivations. To put it in concrete terms, an incentive for a
  child to learn to read might achieve that goal in the short term, but then be counterproductive as an incentive for students
  to enjoy reading and seek it out over their lifetimes. This paper examines the research literature on three important examples
  in which monetary incentives have been used to foster the desired behavior: education, contributions to public goods, and
  lifestyle changes regarding smoking and exercise.'
