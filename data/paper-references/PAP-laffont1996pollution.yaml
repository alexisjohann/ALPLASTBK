abstract: This paper analyzes pollution permits and compliance strategies within the framework of environmental economics.
  It examines how firms make decisions about compliance with environmental regulations, including the choice between investing
  in pollution abatement technology versus purchasing emission permits. The analysis considers the interaction between regulatory
  design and firm behavior under uncertainty.
