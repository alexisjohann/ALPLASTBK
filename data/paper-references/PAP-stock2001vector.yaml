abstract: 'This paper critically reviews the use of vector autoregressions (VARs) for four tasks: data description, forecasting,
  structural inference, and policy analysis. The paper begins with a review of VAR analysis, highlighting the differences
  between reduced-form VARs, recursive VARs and structural VARs. A three variable VAR that includes the unemployment rate,
  price inflation and the short term interest rate is used to show how VAR methods are used for the four tasks. The paper
  concludes that VARs have proven to be powerful and reliable tools for data description and forecasting, but have been less
  useful for structural inference and policy analysis.'
