abstract: |
  What makes leadership and management theories practical? Theories are practical
  to the extent that practitioners can enact proposed cause (X)-effect (Y)
  relationships. Accordingly, I distinguish three types of practical theories.
  Manipulate(X) theories give practitioners levers for action. These theories have
  causal constructs, whose operationalizations' levels practitioners can set by
  themselves. In select(X) theories, practitioners cannot themselves vary a
  construct's levels but select the desired level. Lastly, in observe(X) theories,
  practitioners can only measure levels of a causal construct. I focus on
  manipulate(X) theories because they are actionable and rigorous. I discuss
  criteria for constructs in such theories (e.g., construct unity) and three flaws
  undermining the development of manipulate(X) theories: (1) the simplification
  fallacy, (2) the endogenous-cause problem, and (3) construct conflation.

key_findings_structured:
  S1_research_question: "What makes leadership and management theories actionable, and what role do causal constructs play in building such theories?"
  S2_methodology: "Conceptual analysis using terminological concept analysis (Nuopponen 2008/2010). Distinguishes producing causes (the 'what') from explanatory causes (the 'why'). Systematic review of construct criteria."
  S3_sample_data: "Examples drawn from leadership and management research: LMX, organizational culture, abusive supervision, authentic leadership, OCB, trust, charismatic signaling, goal-setting, nudges/defaults."
  S4_findings:
    - finding: "Three types of practical theories based on manipulability of causal constructs"
      source_section: "Setting the stage"
      formal_result: "manipulate(X) = practitioner sets levels; select(X) = practitioner selects levels; observe(X) = practitioner only measures"
    - finding: "Seven criteria for constructs in actionable theories"
      source_section: "Properties of constructs"
      formal_result: "distinctiveness, nomological embeddedness, operationalizability, definitional clarity, construct unity, manipulability, explicit mechanism"
    - finding: "Three conceptual flaws undermining actionable theory development"
      source_section: "Conceptual flaws"
      formal_result: "(1) simplification fallacy - complex phenomenon squeezed into single construct; (2) endogenous-cause problem - endogenous constructs treated as exogenous; (3) construct conflation - mixing cause and effect in one construct"
    - finding: "Actionability and scientific rigor go hand in hand"
      source_section: "Contribution"
      formal_result: "Manipulable causal constructs are antidote to endogenous theorizing and enable stronger causal tests"
  S5_validity: "Conceptual framework grounded in philosophy of science (causality conditions: temporal precedence, reliable association, no confounders). Multiple concrete examples from published research."
  S6_reproducibility: "Framework is taxonomic - can be applied to classify any theory. Criteria in Table 2 and flaw typology in Table 3 are reproducible."

