abstract: We offer an evaluation of the Social Security Administration demographic and financial forecasts used to assess
  the long-term solvency of the Social Security Trust Funds. This same forecasting methodology is also used in evaluating
  policy proposals put forward by Congress to modify the Social Security program. Ours is the first evaluation to compare
  the SSA forecasts with observed truth; for example, we compare forecasts made in the 1980s, 1990s, and 2000s with outcomes
  that are now available. We find that Social Security Administration forecasting errors—as evaluated by how accurate the
  forecasts turned out to be—were approximately unbiased until 2000 and then became systematically biased afterward, and increasingly
  so over time. Also, most of the forecasting errors since 2000 are in the same direction, consistently misleading users of
  the forecasts to conclude that the Social Security Trust Funds are in better financial shape than turns out to be the case.
  Finally, the Social Security Administration's informal uncertainty intervals appear to have become increasingly inaccurate
  since 2000. At present, the Office of the Chief Actuary, at the Social Security Administration, does not reveal in full
  how its forecasts are made. Every future Trustees Report, without exception, should include a routine evaluation of all
  prior forecasts, and a discussion of what forecasting mistakes were made, what was learned from the mistakes, and what actions
  might be taken to improve forecasts going forward. And the Social Security Administration and its Office of the Chief Actuary
  should follow best practices in academia and many other parts of government and make their forecasting procedures public
  and replicable, and should calculate and report calibrated uncertainty intervals for all forecasts.
