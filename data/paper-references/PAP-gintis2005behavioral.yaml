abstract: This edited volume brings together leading researchers to examine how moral sentiments and material interests interact
  in sustaining cooperation. The contributors use experimental economics, evolutionary biology, and cross-cultural research
  to demonstrate that human cooperation cannot be understood through self-interest alone. Key findings include strong reciprocity
  (the tendency to cooperate with cooperators and punish defectors even at personal cost), the importance of social norms,
  and the evolutionary foundations of prosocial behavior.
