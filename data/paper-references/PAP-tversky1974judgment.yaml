abstract: 'This article describes three heuristics that are employed in making judgments under uncertainty: representativeness,
  which is usually employed when people are asked to judge the probability that an object or event belongs to a class or process;
  availability of instances or scenarios, which is often employed when people are asked to assess the frequency of a class
  or the plausibility of a particular development; and adjustment from an anchor, which is usually employed in numerical prediction
  when'
