summary:
  abstract_extended: "This article describes THREE HEURISTICS that are employed in making\njudgments under uncertainty:\n\n\
    1. REPRESENTATIVENESS HEURISTIC\n   - Used when judging probability that object/event belongs to a class\n   - Leads to:\
    \ Base rate neglect, conjunction fallacy, insensitivity to\n     sample size, misconceptions of chance\n\n2. AVAILABILITY\
    \ HEURISTIC\n   - Used when assessing frequency or plausibility of events\n   - Leads to: Biases due to retrievability,\
    \ imaginability, illusory\n     correlation\n\n3. ANCHORING AND ADJUSTMENT\n   - Used in numerical prediction when a relevant\
    \ value is available\n   - Leads to: Insufficient adjustment from initial anchor, biased\n     estimates toward anchor\
    \ value\n\nKEY INSIGHT: These heuristics are HIGHLY ECONOMICAL and USUALLY EFFECTIVE,\nbut they lead to SYSTEMATIC AND\
    \ PREDICTABLE errors.\n\nA better understanding of these heuristics and the biases to which they\nlead could improve judgments\
    \ and decisions in situations of uncertainty."
  key_findings: '1. Three core heuristics: Representativeness, Availability, Anchoring

    2. Heuristics are cognitive shortcuts (System 1)

    3. Errors are systematic and predictable

    4. Base rate neglect is pervasive

    5. Anchoring effects are robust and large

    6. Foundation of "Heuristics and Biases" research program'
