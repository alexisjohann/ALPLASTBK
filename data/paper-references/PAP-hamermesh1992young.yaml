abstract: Nearly all advanced graduate students and new assistant professors demonstrate naivety in their nonsubstantive professional
  dealings. Graduate programs in economics offer courses that lead to written drafts of important research; they teach little
  about how to refine those drafts and, more generally, about the personal interactions that cut and polish intellectual diamonds
  in the rough. I provide here a short course aimed at removing that naivety and helping young economists to avoid faux pas
  that might reduce their success in the profession.
