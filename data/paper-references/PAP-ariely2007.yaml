abstract: This study demonstrates that the price of a medication influences its perceived efficacy. Participants who received
  a placebo described as expensive reported greater pain relief than those who received the same placebo described as discounted.
  This 'expensive placebo effect' suggests that price expectations shape subjective experience of treatment outcomes, with
  important implications for pharmaceutical pricing and patient expectations.
