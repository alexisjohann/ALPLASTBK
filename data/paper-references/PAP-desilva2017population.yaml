abstract: Rapid population growth in developing countries in the middle of the 20th century led to fears of a population explosion
  and motivated the inception of what effectively became a global population-control program. The initiative, propelled in
  its beginnings by intellectual elites in the United States, Sweden, and some developing countries, mobilized resources to
  enact policies aimed at reducing fertility by widening contraception provision and changing family-size norms. In the following
  five decades, fertility rates fell dramatically, with a majority of countries converging to a fertility rate just above
  two children per woman, despite large cross-country differences in economic variables such as GDP per capita, education
  levels, urbanization, and female labor force participation. The fast decline in fertility rates in developing economies
  stands in sharp contrast with the gradual decline experienced earlier by more mature economies. In this paper, we argue
  that population-control policies likely played a central role in the global decline in fertility rates in recent decades
  and can explain some patterns of that fertility decline that are not well accounted for by other socioeconomic factors.
