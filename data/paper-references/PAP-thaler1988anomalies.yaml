abstract: 'Next time that you find yourself a little short of cash for lunch, try the following experiment in your class.
  Take a jar and fill it with coins, noting the total value of the coins. Now auction off the jar to your class (offering
  to pay the winning bidder in bills to control for penny aversion). Chances are very high that the following results will
  be obtained: (1) the average bid will be significantly less than the value of the coins (bidders are risk averse); (2) the
  winning bid will exceed the value of the jar. Therefore, you will have money for lunch, and your students will have learned
  first-hand about the “winner''s curse.” The winner''s curse cannot occur if all the bidders are rational, so evidence of
  a winner''s curse in market settings would constitute an anomaly. However, acting rationally in a common value auction can
  be difficult. Solving for the optimal bid is not trivial. Thus, it is an empirical question whether bidders in various contexts
  get it right or are cursed. I will present some evidence, both from experimental and field studies, suggesting that the
  winner''s curse may be a common phenomenon.'
