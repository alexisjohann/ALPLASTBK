abstract: 'Empirical research on cities starts with a spatial equilibrium condition:
  workers and firms are assumed to be indifferent across space. This condition implies
  that research on cities is different from research on countries, and that work on
  places within countries needs to consider population, income, and housing prices
  simultaneously. Housing supply elasticity will determine whether urban success reveals
  itself in the form of more people or higher incomes. Urban economists generally
  accept the existence of agglomeration economies, which exist when productivity rises
  with density, but estimating the magnitude of those economies is difficult. Some
  manufacturing firms cluster to reduce the costs of moving goods, but this force
  no longer appears to be important in driving urban success. Instead, modern cities
  are far more dependent on the role that density can play in speeding the flow of
  ideas. Finally, urban economics has some insights to offer related topics such as
  growth theory, national income accounts, public economics, and housing prices. (JEL
  R11, R23, R31, R32)'
