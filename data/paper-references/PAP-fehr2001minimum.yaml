summary:
  abstract_extended: 'This paper uses a randomized experiment to test whether workers work more

    when wages are high. We find strong evidence for gift exchange: workers

    receiving unexpectedly high wages provide significantly more effort.

    This supports efficiency wage theory and demonstrates the importance of

    fairness in labor markets.'
  key_findings: "1. EXPERIMENTAL DESIGN\n   - Randomized wage variation\n   - Effort measured objectively\n   - Clean causal\
    \ identification\n\n2. GIFT EXCHANGE CONFIRMED\n   - High wages → high effort\n   - Reciprocal response\n   - Beyond strategic\
    \ considerations\n\n3. MAGNITUDE\n   - Economically significant effect\n   - Persists over time\n   - Robust across specifications\n\
    \n4. IMPLICATIONS\n   - Efficiency wages supported\n   - Fairness matters in practice\n   - HR policy implications"
