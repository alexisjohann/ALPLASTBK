abstract: The concept of a learning curve for individuals has been around since the beginning of the twentieth century. The
  idea that an analogous phenomenon might also apply at the level of the organization took longer to emerge, but it had begun
  to figure prominently in military procurement and scheduling at least a decade before Wright's (1936) classic paper providing
  evidence that the cost of producing an airframe declined as cumulative output increased. Wright (1936) was careful not to
  describe his empirical results as a learning curve. Of his three proposed three explanations for the relationships he observed
  between cost and cumulative quantity produced, only one is unambiguously a source of organizational learning; the others
  are consistent with organizational learning but also with standard static economies of scale. It quickly became apparent
  that the notion of organizational learning as a by-product of accumulated experience has important consequences for firm
  strategy. The Boston Consulting Group (BCG) built its consulting business around the concept of what it branded the experience
  curve, asserting that cost reductions associated with cumulative output applied to all costs, were “consistently around
  20—30% each time accumulated production is doubled, [and] this decline goes on in time without limit” (Henderson 1968).
  Today, the negative relationship between unit production costs and cumulative output is one of the best-documented empirical
  regularities in economics. Nonetheless, the thesis of this paper is that the conceptual transformation of the relationship
  between cost and cumulative production into an organizational learning curve with profound strategic implications has not
  been sufficiently supported with direct empirical evidence.
