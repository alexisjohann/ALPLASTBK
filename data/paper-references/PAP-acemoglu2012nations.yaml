summary:
  abstract_extended: 'Why are some nations rich and others poor? This book presents
    a new theory of

    political economy explaining the huge differences in incomes and standards of

    living that separate rich countries from poor ones. Based on fifteen years of

    original research, the authors marshal extraordinary historical evidence from

    the Roman Empire, Mayan city-states, medieval Venice, the Soviet Union, Latin

    America, England, Europe, the United States, and Africa.


    The central thesis: differences in economic prosperity are not primarily due

    to geography, culture, or ignorance, but rather to differences in political

    and economic institutions. Nations develop inclusive or extractive institutions,

    and this fundamental distinction explains divergent development paths. Inclusive

    institutions protect property rights, create a level playing field, and allow

    broad participation; extractive institutions concentrate power and wealth in

    the hands of elites at the expense of the majority.'
  key_findings: "1. INSTITUTIONS ARE DECISIVE: Political and economic institutions,\
    \ not geography\n   or culture, determine long-run economic prosperity\n\n2. INCLUSIVE\
    \ VS EXTRACTIVE: Two institutional archetypes - inclusive (broad-based\n   property\
    \ rights, participation) vs extractive (elite-dominated, rent-seeking)\n\n3. CRITICAL\
    \ JUNCTURES: Historical moments (Black Death, Industrial Revolution,\n   colonization)\
    \ create institutional divergence with persistent effects\n\n4. VICIOUS/VIRTUOUS\
    \ CYCLES: Extractive institutions perpetuate themselves;\n   inclusive institutions\
    \ create positive feedback loops\n\n5. CREATIVE DESTRUCTION: Inclusive institutions\
    \ allow creative destruction;\n   extractive institutions block innovation to\
    \ protect elite rents\n\n6. POLITICAL CENTRALIZATION: Successful development requires\
    \ both inclusive\n   institutions AND sufficient political centralization to enforce\
    \ them"
