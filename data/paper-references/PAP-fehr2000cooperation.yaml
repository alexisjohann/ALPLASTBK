summary:
  abstract_extended: 'This paper provides evidence that many people have a tendency
    to cooperate

    and to punish defectors, even at a personal cost. We show that cooperation

    flourishes in the presence of opportunities for costly punishment of free

    riders. Without punishment opportunities, however, cooperation breaks down.

    The results suggest that people have strong reciprocal preferences that are

    conditional on the behavior of others.'
  key_findings: "1. CONDITIONAL COOPERATION\n   - Many subjects are \"conditional\
    \ cooperators\"\n   - They cooperate if others cooperate, defect if others defect\n\
    \   - Without punishment, cooperation decays over time\n\n2. COSTLY PUNISHMENT\n\
    \   - When punishment opportunities exist, cooperation is stable\n   - People\
    \ punish free riders even at personal cost\n   - Punishment is targeted: defectors\
    \ receive more punishment\n   - Cost ratio: punisher pays c, target loses 3c (typical)\n\
    \n3. EMPIRICAL PATTERNS\n   - Without punishment: contributions decay from ~50%\
    \ to ~10%\n   - With punishment: contributions rise to ~90%+\n   - Most punishment\
    \ directed at below-average contributors\n\n4. STRONG RECIPROCITY\n   - People\
    \ reward cooperation (positive reciprocity)\n   - People punish defection (negative\
    \ reciprocity)\n   - Both occur even in one-shot anonymous interactions"
  ebf_relevance: '10C DIMENSIONS:

