title: Cooperation and Punishment in Public Goods Experiments
author: Fehr
year: '2000'
publication_type: journal_article
doi: 10.1006/game.1999.0765
abstract: This paper provides experimental evidence on the enforcement of social norms
  through punishment. In public goods experiments without punishment opportunities,
  cooperation typically breaks down. However, when subjects have the opportunity to
  punish free riders at a cost to themselves, cooperation is sustained at high levels.
  The threat of punishment deters free riding even though punishing is costly and
  does not provide material benefits to the punisher. These results demonstrate that
  humans have a strong propensity for altruistic punishment that supports cooperative
  outcomes.
