abstract: 'This chapter addresses the customer experience (CX) measurement from a
  customer journey perspective

  and its implications for customer loyalty. We cover main CX conceptual aspects and
  a nomenclature

  composed of touchpoints, context, and qualities (TCQ). We then explain methods to
  extract CX insights

  from structured data and then from unstructured data, including text and non-textual
  data.

  Furthermore, we describe the main aspects of customer loyalty as an outcome metric.
  We offer a

  four-step framework to bridge the CX measurement and loyalty, and provide detailed
  guidance for

  research and practice.

  '
