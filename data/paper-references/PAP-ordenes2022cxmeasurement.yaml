  10c_dimensions:
    WHO: 'Multiple stakeholders in CX measurement:

      1. Customers (experience providers) - whose journeys are measured

      2. Marketers/Analysts - who extract insights from data

      3. Data scientists - who apply text mining and ML methods

      Key insight: CX measurement requires understanding WHO provides the data

      '
    WHAT: 'TCQ Framework distinguishes three elements:

      - Touchpoints: Interaction points (retailer-owned, partner-owned, customer-owned,
      external)

      - Context: Situational factors (social, temporal, physical)

      - Qualities: Experience dimensions (cognitive, emotional, sensorial, behavioral,
      social)

      Utility: u_CX = f(Touchpoints, Context, Qualities)

      '
    HOW: 'Four-step framework bridges CX measurement to loyalty:

      Step 1: Define research questions (what CX aspects matter for loyalty?)

      Step 2: Identify data sources (structured vs unstructured, static vs dynamic)

      Step 3: Extract CX insights (surveys, text mining, ML, sentiment analysis)

      Step 4: Connect to loyalty metrics (attitudinal AND behavioral)

      '
    WHEN: 'Temporal dynamics in CX measurement:

      - Static data: Point-in-time snapshots (surveys, reviews)

      - Dynamic data: Continuous streams (clickstream, real-time feedback)

      Journey timing matters: Different touchpoints salient at different stages

      '
    WHERE: 'Conceptual framework with two illustrative examples:

      - Gaming industry (sticky journey): Recreational, hedonic, immersive

      - Banking industry (smooth journey): Instrumental, efficient, goal-directed

      Cross-industry applicability

      '
    AWARE: 'CX awareness captured through:

      - Explicit measures: Surveys, NPS, direct questions

      - Implicit measures: Text mining, sentiment analysis, behavioral signals

      Key insight: Unstructured data captures awareness that surveys miss

      '
    READY: 'Measurement readiness varies by data type:

      - Structured data: High readiness (standardized, quantifiable)

      - Unstructured data: Lower readiness (requires text mining expertise)

      Organizations need capabilities to extract insights from both

      '
    STAGE: 'Journey stages inform measurement:

      - Pre-purchase: Awareness, consideration touchpoints

      - Purchase: Transaction, conversion touchpoints

      - Post-purchase: Usage, loyalty touchpoints

      Different metrics appropriate for different stages

      '
    HIERARCHY: 'Two loyalty types with hierarchy:

      1. Attitudinal loyalty (higher order): NPS, satisfaction, commitment

      2. Behavioral loyalty (observable): Share of wallet, frequency, CLV

      Both required for comprehensive measurement

      '
    EIT: 'Intervention implications:

      1. Tailor CX measurement to journey type (smooth vs sticky)

      2. Combine structured AND unstructured data sources

      3. Connect CX insights to BOTH attitudinal and behavioral loyalty

      4. Use text mining for scalable CX monitoring

      '
