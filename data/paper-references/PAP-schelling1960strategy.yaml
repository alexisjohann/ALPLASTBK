abstract: This pioneering work studies bargaining and strategic behavior in conflict situations where common interest coexists
  with adversarial interests - negotiations, war, deterrence, extortion, and tacit bargaining. Schelling introduces the concept
  of focal points (Schelling points) - convergence points people tend toward without communication. He defines tacit bargaining
  as bargaining where communication is incomplete or impossible, relying on action-based rather than verbal communication.
  The book shows people can concert intentions with others when each knows the other is trying likewise.
