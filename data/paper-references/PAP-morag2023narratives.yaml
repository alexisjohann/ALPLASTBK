title: Narratives and Valuations
author: Dor Morag, George Loewenstein
year: '2023'
publication_type: working_paper
institution: CESifo
series: CESifo Working Paper
number: '10714'
month: October
url: https://ssrn.com/abstract=4610995
abstract: 'While the significance of narrative thinking has been increasingly recognized by social

  scientists, very little empirical research has documented its consequences for economically

  significant outcomes. The current paper addresses this gap in one important domain:

  valuations. In three experiments, participants were given the opportunity to sell an item

  they owned (mug in Study 1, hat in studies 2 and 3) using an incentive-compatible procedure

  (multiple price list). Prior to making selling decisions, participants were randomly assigned

  to either a narrative treatment, in which they were asked to tell the story of their item,

  or a list treatment, in which they were asked to list the characteristics of their item.

  The narrative treatment led to significantly higher selling prices and increased rates of

  participants refusing all offered prices.

  '
abstract_source: full_text
