structural_characteristics:
  S1_research_question:
    available: true
    questions:
    - Does narrative thinking affect valuations of everyday objects?
    - Does telling the story of an item increase willingness to accept (WTA)?
    - What mechanisms underlie narrative effects on valuations?
    - Does the narrative effect operate through mood, attention, or anticipated emotions?
    - Do different types of narratives have different effects on valuations?
    clarity: high
  S2_methodology:
    available: true
    approach: experimental
    methods:
    - Pre-registered randomized experiments
    - Multiple Price List (MPL) for WTA elicitation
    - Online experiments (Prolific, MTurk)
    - Lab-in-the-field experiment (campus recruitment)
    - Mediation analysis (Imai et al., 2010)
    - Natural Language Processing (Bag-of-Words, BERT)
    - Tobit regression for censored data
    key_definitions:
    - 'Narrative treatment: Participants tell the story of their item'
    - 'List treatment: Participants list characteristics of their item'
    - 'WTA: Minimal selling price via MPL'
    - 'UWS (Unwilling to Sell): Refusing all prices on MPL'
    - 'Extensive margin: Change in probability of refusing all prices'
    - 'Intensive margin: Change in WTA among sellers'
  S3_sample_data:
    available: true
    type: experimental
    empirical_data: true
    sample_characteristics:
    - 'Study 1: n = 469 (Prolific, US census representative)'
    - 'Study 2: n = 914 (MTurk, 2x2 design)'
    - 'Study 3: n = 146 (Field, campus recruitment)'
    - 'Total: n = 1,529 valid participants'
    - 'Items: mugs (Study 1), hats (Studies 2-3)'
    - Self-selected items with photo upload
    descriptive_statistics:
      total_n: 1529
      study1_n: 469
      study2_n: 914
      study3_n: 146
      pct_refusing_narrative: 0.238
      pct_refusing_list: 0.137
      mean_wta_narrative_sellers: 58.2
      mean_wta_list_sellers: 50.0
  S4_findings:
    available: true
    key_findings:
    - finding: Narrative treatment increases probability of refusing all prices
      narrative_rate: 0.238
      list_rate: 0.137
      effect: +75% relative increase
      p_value: <0.001
      interpretation: Strong extensive margin effect
    - finding: Narrative treatment increases WTA among sellers
      effect: +16%
      interpretation: Significant intensive margin effect
    - finding: Overall narrative effect on censored WTA
      effect: +36%
      narrative_wta: 93.4
      list_wta: 68.8
      interpretation: Combined extensive and intensive margin
    - finding: Study 1 (mug) Tobit effect
      estimate: 10.46
      se: 4.91
      p_value: <0.05
      interpretation: 17.1% increase
    - finding: Study 2 (misc. hat) Tobit effect
      estimate: 44.12
      se: 9.77
      p_value: <0.001
      interpretation: 86% increase
    - finding: 'Mechanism: Associative considerations mediate 42% of effect'
      mediators: people, memories, sentiment
      interpretation: Attention shift from analytical to associative
    - finding: 'Mechanism: Reduced profit consideration mediates 30%'
      interpretation: Narratives reduce focus on monetary gain
    - finding: Mood does NOT mediate narrative effect
      treatment_effect_on_mood: ns
      interpretation: Rules out mood-based mechanism
    - finding: Sadder narratives predict HIGHER WTA
      effect: +0.177 SD
      p_value: <0.10
      interpretation: Contradicts simple mood explanation
  S5_validity:
    available: true
    internal_validity:
    - Pre-registered experiments
    - Random assignment to conditions
    - Incentive-compatible elicitation (MPL)
    - Self-selected items before knowing purpose
    - Multiple studies with different samples
    - Mediation analysis for mechanism evidence
    - NLP analysis on pre-decision text
    external_validity:
    - Three different items tested (mug, misc. hat, sig. hat)
    - Multiple platforms (Prolific, MTurk, field)
    - Consistent effects across studies
    - Self-generated narratives (not provided)
    - Real items owned by participants
    limitations:
    - Self-selected items introduce variance
    - Self-generated narratives introduce noise
    - Effect magnitude may be item-specific
    - Unknown generalization to high-stakes items
    - Online studies involve shipping costs
    - Study 3 underpowered for some analyses
  S6_reproducibility:
    available: true
    proofs_available: true
    proof_location: Tables 1-6 with full regression specifications
    data_availability:
      source: Contact authors
      access: Upon request
    model_specification: Tobit for censored WTA, Logit for binary outcomes
    assumptions_documented: true
    preregistration:
    - 'AEA RCT Registry #7409'
    - 'AEA RCT Registry #8250'
    - 'AEA RCT Registry #9785'
    testable_predictions:
    - Narrative treatment increases WTA
    - Effect operates through attention shift
    - Associative considerations mediate effect
    - Mood does not mediate effect
