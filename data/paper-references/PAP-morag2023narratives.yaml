key_contributions:
- First experimental evidence for narrative effects on valuations
- Documents 36% overall narrative effect on WTA
- Identifies attention-based mechanism (analytical → associative)
- 42% mediated by people/memories/sentiment considerations
- Rules out mood-based mechanism
- Shows sadder narratives increase WTA (contradicts simple mood theory)
- NLP analysis links narrative content to valuations
- Pre-registered, incentive-compatible methodology
