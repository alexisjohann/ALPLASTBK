abstract: This landmark book explores the psychology of why people say 'yes' and how to apply these insights ethically. Based
  on 35 years of peer-reviewed research and a three-year field study, Cialdini identifies six universal principles of persuasion
  that drive human compliance - reciprocity (we repay what we receive), commitment and consistency (we align with past actions),
  social proof (we follow what others do), authority (we defer to experts), liking (we say yes to people we like), and scarcity
  (we want what's rare). The book explains 'fixed-action patterns' - automatic, instinctive behaviors triggered by specific
  stimuli - and shows how persuaders exploit these mental shortcuts.
