abstract: In the epidemiological literature, the fetal origins hypothesis associated with David J. Barker posits that chronic,
  degenerative conditions of adult health, including heart disease and type 2 diabetes, may be triggered by circumstances
  decades earlier, particularly, by in utero nutrition. Economists have expanded on this hypothesis, investigating a broader
  range of fetal shocks and circumstances and have found a wealth of later-life impacts on outcomes including test scores,
  educational attainment, and income, along with health. In the process, they have provided some of the most credible observational
  evidence in support of the hypothesis. The magnitude of the impacts is generally large. Thus, the fetal origins hypothesis
  has not only survived contact with economics, but has flourished.
