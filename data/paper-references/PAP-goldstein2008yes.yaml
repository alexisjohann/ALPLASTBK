abstract: Learn how small changes can make a big difference in your powers of persuasion with this New York Times bestselling
  introduction to fifty scientifically proven techniques for increasing your persuasive powers in business and life. Every
  day we face the challenge of persuading others to do what we want. But what makes people say yes to our requests? Persuasion
  is not only an art, it is also a science, and researchers who study it have uncovered a series of hidden rules for moving
  people in your direction. Based on more than sixty years of research into the psychology of persuasion, Yes! reveals fifty
  simple but remarkably effective strategies that will make you much more persuasive at work and in your personal life, too.
  Cowritten by the world’s most quoted expert on influence, Professor Robert Cialdini, Yes! presents dozens of surprising
  discoveries from the science of persuasion in short, enjoyable, and insightful chapters that you can apply immediately to
  become a more effective persuader. Often counterintuitive, the findings presented in Yes! will steer you away from common
  pitfalls while empowering you with little known but proven wisdom. Whether you are in advertising, marketing, management,
  on sales, or just curious about how to be more influential in everyday life, Yes! shows how making small, scientifically
  proven changes to your approach can have a dramatic effect on your persuasive powers.
