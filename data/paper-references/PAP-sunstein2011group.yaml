abstract: Going to Extremes addresses why people become extremists. When like-minded people talk to one another, they tend
  to become more extreme—a phenomenon called group polarization. Sunstein shows how this occurs in boardrooms, on the Internet,
  in religious groups, in politics, and in everyday life. He explains how group polarization can lead to unjustified confidence
  and potentially dangerous actions. The book examines enclaves and echo chambers, cascades of information and reputation,
  and the implications for deliberative democracy.
