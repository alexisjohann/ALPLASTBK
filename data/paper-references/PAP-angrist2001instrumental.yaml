abstract: Instrumental variables was first used in the 1920s to estimate supply and demand elasticities and later to correct
  for measurement error in single equation models. Recently, instrumental variables have been widely used to reduce bias from
  omitted variables in estimates of causal relationships. Intuitively, instrumental variables methods use only a portion of
  the variability in key variables to estimate the relationships of interest; if the instruments are valid, that portion is
  unrelated to the omitted variables. We discuss the mechanics of instrumental variables and the qualities that make for a
  good instrument, devoting particular attention to instruments derived from “natural experiments.”
