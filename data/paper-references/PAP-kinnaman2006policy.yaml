abstract: There are 8,875 municipalities in the United States that have initiated curbside recycling programs over the past
  two decades to help reduce residential solid waste. Four thousand of these municipalities encourage recycling by requiring
  households to pay a fee for each unit of garbage presented at the curb for collection. How beneficial have the various recycling
  policies been in practice? This article examines the empirical lessons gained from twenty years of solid waste policy in
  the United States and argues for the replacement of several state recycling mandates with a moderate landfill tax.
