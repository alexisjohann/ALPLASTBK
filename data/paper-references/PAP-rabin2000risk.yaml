title: 'Risk Aversion and Expected-Utility Theory: A Calibration Theorem'
author: Rabin
year: '2000'
publication_type: journal_article
doi: 10.1111/1468-0262.00158
abstract: Under expected-utility, observed risk aversion over modest stakes implies extremely high risk aversion over large
  stakes. An agent who turns down a 50/50 bet of losing $100 or gaining $110, at all initial wealth levels between $100 and
  $300,000, will also, at initial wealth of $290,000, turn down a 50/50 bet with possible loss of $2,000 even when the gain
  is as large as $12 million. This demonstrates fundamental limitations of expected utility theory in explaining observed
  patterns of risk aversion across different stake sizes.
