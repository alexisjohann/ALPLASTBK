abstract: Behavioral economics increases the explanatory power of economics by providing it with&#13;\nmore realistic psychological
  foundations. This book consists of representative recent articles in&#13;\nbehavioral economics. This chapter is intended
  to provide an introduction to the approach and&#13;\nmethods of behavioral economics, and to some of its major findings,
  applications, and promising&#13;\nnew directions. It also seeks to fill some unavoidable gaps in the chapters’ coverage
  of topics.
