abstract: 'Angrist and Pischke highlight one aspect of the research that has positively transformed econometric practice and
  teaching. They emphasize the rise of experiments and quasi-experiments as credible sources of identification in microeconometric
  studies, which they usefully term “design-based research.” But in so doing, they miss an important part of the story: a
  second research strand aimed at developing tools for inference that are robust to subsidiary modeling assumptions. My first
  aim in these remarks therefore is to highlight some key developments in this area. I then turn to Angrist and Pischke''s
  call for adopting experiments and quasi-experiments in macroeconometrics; while sympathetic, I suspect the scope for such
  studies is limited. I conclude with some observations on the current debate about whether experimental methods have gone
  too far in abandoning economic theory.'
