abstract: Without a doubt, there has been a “credibility revolution” in applied econometrics. One contributing development
  has been in the improvement and increased use in data analysis of “structural methods”; that is, the use of models based
  in economic theory. Structural modeling attempts to use data to identify the parameters of an underlying economic model,
  based on models of individual choice or aggregate relations derived from them. Structural estimation has a long tradition
  in economics, but better and larger data sets, more powerful computers, improved modeling methods, faster computational
  techniques, and new econometric methods such as those mentioned above have allowed researchers to make significant improvements.
  While Angrist and Pischke extol the successes of empirical work that estimates “treatment effects” based on actual or quasi-experiments,
  they are much less sanguine about structural analysis and hold industrial organization up as an example where “progress
  is less dramatic.” Indeed, reading their article one comes away with the impression that there is only a single way to conduct
  credible empirical analysis. This seems to us a very narrow and dogmatic approach to empirical work; credible analysis can
  come in many guises, both structural and nonstructural, and for some questions structural analysis offers important advantages.
  In this comment, we address the criticism of structural analysis and its use in industrial organization, and consider why
  empirical analysis in industrial organization differs in such striking ways from that in field such as labor, which have
  recently emphasized the methods favored by Angrist and Pischke.
