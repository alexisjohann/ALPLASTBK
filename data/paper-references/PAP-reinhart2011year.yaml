abstract: There are many reasons to regret the decision of U.S. financial authorities to insert the government into the resolution
  of the investment bank Bear Stearns in March 2008. The Federal Reserve's use of its discount window built up false hope
  of future rescues. Paying off the uninsured creditors of Bear Stearns overcompensated them at the time and invited speculative
  attacks on the equity of similarly situated firms. I will argue that the market seizure after Lehman Brothers' decision
  to seek the protection of bankruptcy was an echo of the prior official decision to protect Bear Stearns.
