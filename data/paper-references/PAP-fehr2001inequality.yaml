summary:
  abstract_extended: 'This paper examines how inequality affects cooperation in labor market

    experiments. We show that wage inequality can both help and hurt cooperation,

    depending on how it is perceived. When inequality is seen as fair (based on

    productivity), it does not harm cooperation. When seen as unfair, it

    undermines cooperation and efficiency.'
  key_findings: "1. INEQUALITY AND FAIRNESS\n   - Inequality per se not harmful\n   - Perceived unfairness matters\n   - Legitimacy\
    \ of inequality key\n\n2. LABOR MARKET EXPERIMENTS\n   - Wage inequality varied\n   - Effort responses measured\n   -\
    \ Gift exchange affected\n\n3. IMPLICATIONS\n   - Fair procedures important\n   - Transparency helps\n   - Equality not\
    \ always required"
  ebf_relevance: '10C DIMENSIONS:

    - WHAT (C): Inequality in utility

    - HOW (B): Inequality affects complementarities

    - WHEN (V): Context (fairness perceptions)


    THEORY SUPPORT:

    - MS-SP-001: Social Preferences (inequity aversion)

    - Links inequality research to cooperation

    - Policy-relevant findings


    KEY INSIGHT:

    It is not inequality itself but the perceived unfairness of inequality

    that undermines cooperation.'
