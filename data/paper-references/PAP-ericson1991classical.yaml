abstract: Below I will outline the traditional Soviet economic system, developing its logic of institutions and interactions,
  and pointing out their natural economic consequences. This will lead me to a list of defining characteristics of that system,
  characteristics that are mutually dependent and supporting and hence must be changed more or less simultaneously if effective
  reform is to take place. One implication is that step-by-step measures are likely to fail. Instead, complete replacement
  of the economic system, as apparently intended by many East European reformers, seems necessary for a market-based system
  to begin functioning. This will be a truly monumental task and nowhere more so than in the Soviet Union.
