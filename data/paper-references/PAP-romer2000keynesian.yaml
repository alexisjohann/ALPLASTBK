abstract: Changes in both the macroeconomy and in macroeconomics suggest that the IS-LM-AS model is no longer the best baseline
  model of short-run fluctuations for teaching and policy analysis. This paper presents an alternative model that replaces
  the assumption that the central bank targets the money supply with an assumption that it follows a simple interest rate
  rule. The resulting model is simpler, more realistic, and more coherent than IS-LM-AS, not just in its treatment of monetary
  policy but in many other ways. The paper also discusses other alternatives to IS-LMAS.
