abstract: 'Physicians and other medical providers are subject to a negligence rule of liability. In a simple model, with perfect
  information and homogeneous physicians, a negligence rule of liability with an appropriately defined due care standard should
  induce complete compliance: there should be no malpractice, no malpractice claims, and no demand for malpractice insurance.
  The malpractice experience is seriously at odds with this prediction. First, what goes wrong? Second, if the system does
  indeed operate imperfectly, does it yield benefits in terms of injuries deterred that outweigh the high overhead costs of
  operating a liability system?'
