summary:
  abstract_extended: "The authors revive, extend and improve the approach used in a series of\ninfluential\
    \ papers written in the 2000s to estimate how changes in the supply\nof immigrant workers affected\
    \ natives' wages in the US.\n\nEXTENSIONS & IMPROVEMENTS:\n1. Extended analysis to include more recent\
    \ years 2000-2022\n2. Introduced an IV using a new skill-based shift-share for immigrants and\n  \
    \ demographic evolution for natives (passes validity tests, strong power)\n3. Provided estimates of\
    \ impact on employment-population ratio of natives\n   to test for crowding out at the national level\n\
    4. Analyzed occupational upgrading of natives in response to immigrants\n\nKEY FINDINGS:\n\nImmigration,\
    \ thanks to NATIVE-IMMIGRANT COMPLEMENTARITY and college skill\ncontent of immigrants, had a POSITIVE\
    \ and significant effect:\n- +1.7% to +2.6% on wages of LESS EDUCATED native workers (2000-2019)\n\
    - No significant wage effect on college educated natives\n- Positive employment rate effect for most\
    \ native workers\n\nOver 2000-2022, immigration raised average US-born worker's wage by 0.8%.\nWorkers\
    \ with HS diploma or less saw increases of 2.8% to 3.2%."
  key_findings: '1. Immigration POSITIVE for low-skill native wages (+1.7% to +2.6%)

    2. No negative effects on college-educated natives

    3. Positive employment effects (no crowding out)

    4. Native-immigrant complementarity is key mechanism

    5. Occupational upgrading of natives documented

    6. New IV with skill-based shift-share'
