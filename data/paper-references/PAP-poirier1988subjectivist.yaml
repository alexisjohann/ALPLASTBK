abstract: '[This paper responds to comments on “Frequentist and Subjectivist Perspectives on the Problems of Model Building
  in Economics,” by Dale J. Poirier.] It is a rare opportunity to have one''s research discussed in print by as eminent and
  contemplative a group of researchers as my three discussants. To each I wish to express my gratitude for his thought-provoking
  comments. I will address the discussants'' comments in an order which I believe reflects a decreasing degree of common ground
  in our views.'
