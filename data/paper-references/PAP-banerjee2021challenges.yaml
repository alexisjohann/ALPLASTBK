abstract: To investigate barriers to universal health insurance in developing countries, we designed a randomized experiment
  involving about 6,000 households in Indonesia who are subject to a government health insurance program with a weakly enforced
  mandate. Time-limited subsidies increased enrollment and attracted lower-cost enrollees, in part by reducing the strategic
  timing of enrollment to correspond with health needs. Registration assistance also increased enrollment, but increased attempted
  enrollment much more, as over one-half of …
