abstract: This paper studies the population dynamics of preference traits in a model of intergenerational cultural transmission.
  Parents socialize and transmit their preferences to their offspring, motivated by a form of paternalistic altruism (“imperfect
  empathy”). In such a setting we study the long run stationary state pattern of preferences in the population, according
  to various socialization mechanisms and institutions, and identify sufficient conditions for the global stability of an
  heterogenous stationary distribution of the preference …
