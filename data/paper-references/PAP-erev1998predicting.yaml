abstract: 'The authors examine learning in experiments involving games with unique equilibrium in mixed strategies. Even a
  one-parameter reinforcement learning model robustly outperforms equilibrium predictions in these experiments. The model
  captures two robust properties of the data: sensitivity to payoff magnitudes and a strong tendency toward probability matching.
  Extensions explore fictitious play and experience-weighted attraction. The findings challenge the predictive power of Nash
  equilibrium in experimental settings and support adaptive learning models. Published in American Economic Review.'
