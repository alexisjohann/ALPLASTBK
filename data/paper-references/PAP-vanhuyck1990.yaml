abstract: This paper reports the results of experiments designed to study tacit coordination
  in games where equilibria can be Pareto ranked but actions leading to more efficient
  equilibria have higher costs of miscoordination. Strategic uncertainty about others'
  choices can generate coordination failure even when there is a unique payoff-dominant
  equilibrium. We find that groups of subjects frequently fail to coordinate on efficient
  equilibria, with coordination failure more likely in larger groups.
