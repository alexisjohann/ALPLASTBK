abstract: Exchange-traded funds (ETFs) represent one of the most important financial innovations in decades. An ETF is an
  investment vehicle, with a specific architecture that typically seeks to track the performance of a specific index. The
  first US-listed ETF, the SPDR, was launched by State Street in January 1993 and seeks to track the S&amp;P 500 index. It
  is still today the largest ETF by far, with assets of $178 billion. Following the introduction of the SPDR, new ETFs were
  launched tracking broad domestic and international indices, and more specialized sector, region, or country indexes. In
  recent years, ETFs have grown substantially in assets, diversity, and market significance, including substantial increases
  in assets in bond ETFs and so-called “smart beta” funds that track certain investment strategies often used by actively
  traded mutual funds and hedge funds. In this paper, we begin by describing the structure and organization of exchange-traded
  funds, contrasting them with mutual funds, which are close relatives of exchange-traded funds, describing the differences
  in how ETFs operate and their potential advantages in terms of liquidity, lower expenses, tax efficiency, and transparency.
  We then turn to concerns over whether the rise in ETFs may raise unexpected risks for investors or greater instability in
  financial markets. While concerns over financial fragility are worth serious consideration, some of the common concerns
  are overstated, and for others, a number of rules and practices are already in place that offer a substantial margin of
  safety.
