abstract: Young children are deeply immersed in digital technologies. Literature shows that screen-based media use in early
  childhood can have both positive and negative impacts on cognitive and socioemotional development. We describe findings
  around content-based, content-independent, form-based, and social-based theories, highlighting the role parents play. We
  provide recommendations for parents, medical practitioners, policymakers, and the media industry.
