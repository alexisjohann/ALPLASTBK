abstract: We consider the gender pay gap in the United States. Both gender-specific factors, including gender differences
  in qualifications and discrimination, and overall wage structure, the rewards for skills and employment in particular sectors,
  importantly influence the gender pay gap. Declining gender differentials in the U.S., and the more rapid closing of the
  gender pay gap in the U.S. than elsewhere, appear to be primarily due to gender-specific factors. However, the relatively
  large gender pay gap in the U.S. compared to a number of other advanced countries seems primarily attributable to the very
  high level of U.S. wage inequality.
