abstract: This groundbreaking work explores the theory that minds like ours are prediction machines - devices that have evolved
  to anticipate incoming sensory stimulation before it arrives. The mind is geared fundamentally toward prediction error minimization,
  bringing expected sensory input into alignment with actual input. Clark integrates work on embodiment, action, and the predictive
  mind, showing that action is not merely a response to input but a way of selecting the next input. As mobile embodied agents,
  we act to harvest streams of sensory information that our brains predict, enabling fast and frugal problem-solving that
  binds perception and action in a delicate dance.
