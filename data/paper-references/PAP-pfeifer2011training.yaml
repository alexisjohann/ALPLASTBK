abstract: |
  This paper evaluates the causal effects of employer-provided formal training on employee suggestions for productivity improvements and on promotions among male blue-collar workers. Using more than twenty years of personnel records from a German manufacturing firm tracking 415 workers across four entry cohorts, the authors address unobserved heterogeneity using fixed effects models and analyze the temporal dynamics of training effects through lagged variables. The main finding is that training significantly increases both suggestion and promotion probabilities, but the effects differ in duration: suggestion effects are short-term only (significant in year t+1, disappearing by t+2), while promotion effects persist in the long term (significant at t+1, t+3, and t+4).

research_question: "What are the causal effects of employer-provided formal training on employee productivity suggestions and promotions in internal labor markets, and how long do these effects persist?"

