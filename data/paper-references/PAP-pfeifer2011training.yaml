key_findings_structured:
  - finding: "Training increases suggestion probability by 2.6 percentage points (from 4% to 6.6%), a 65% relative increase, significant at p=0.011 — but only in the year directly after training (short-term effect)"
    domain: labor_economics
    effect_size: "+2.6pp (65% relative increase)"
  - finding: "Training increases promotion probability by 7.7 percentage points (from 5.5% to 13.2%), significant and persistent — effects remain significant at lags 3 and 4 (3-4pp), indicating long-term human capital effects on careers"
    domain: labor_economics
    effect_size: "+7.7pp promotion probability"
  - finding: "Differential temporal dynamics: training effects on suggestions (productivity proxy) depreciate within 1 year, while effects on promotions persist 3-4+ years — implying different mechanisms (skill depreciation vs career signaling)"
    domain: labor_economics
    effect_size: "1 year vs 3-4+ years"
  - finding: "Suggestion probability shows inverted U-shape with age (peak at 35-40), consistent with concave productivity-age profiles — combined with short-term training effects, this supports continuous training investment for aging workers"
    domain: labor_economics
    effect_size: "peak at age 35-40"

