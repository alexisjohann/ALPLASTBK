abstract: "We analyze how demand conditions faced by a firm in its export markets impact its innovation\r\ndecisions. To disentangle\
  \ the direction of causality between export demand and innovation, we\r\nconstruct a firm-level export demand shock which\
  \ responds to aggregate conditions in a firm's export\r\ndestinations but is exogenous to firm-level decisions. Using exhaustive\
  \ data covering the French\r\nmanufacturing sector, we show that French firms respond to exogenous growth shocks in their\
  \ export\r\ndestinations by patenting more; and that this response is entirely driven by the subset of initially more\r\n\
  productive firms. The patent response arises 2 to 5 years after a demand shock, highlighting the time\r\nrequired to innovate.\
  \ In contrast, the demand shock raises contemporaneous sales and employment for\r\nall firms, without any notable differences\
  \ between high and low productivity firms. We show that this\r\nfinding of a skewed innovation response to common demand\
  \ shocks arises naturally from a model of\r\nendogenous innovation and competition with firm heterogeneity. The market size\
  \ increase drives all\r\nfirms to innovate more by increasing the innovation rents; yet by inducing more entry and thus\
  \ more\r\ncompetition, it also discourages innovation by low productivity firms."
