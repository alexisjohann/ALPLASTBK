summary:
  abstract_extended: 'This paper shows that incentive schemes can backfire by undermining intrinsic

    motivation. When principals have the option to sanction agents but choose not

    to use it, cooperation increases. However, when sanctions are actually imposed,

    they crowd out intrinsic motivation and reduce cooperation. This demonstrates

    the importance of trust signals in economic relationships.'
  key_findings: "1. CROWDING OUT EFFECT\n   - Sanctions reduce intrinsic motivation\n   - Trust signals increase cooperation\n\
    \   - Incentives can backfire\n\n2. TRUST AND COOPERATION\n   - Not using punishment signals trust\n   - Trust increases\
    \ effort\n   - Self-fulfilling prophecy\n\n3. MECHANISM\n   - Sanctions signal distrust\n   - Workers reduce effort in\
    \ response\n   - Intrinsic motivation crowded out\n\n4. POLICY IMPLICATIONS\n   - Careful with incentive design\n   -\
    \ Trust may be more effective\n   - Sanctions as last resort"
  ebf_relevance: '10C DIMENSIONS:

    - WHAT (C): Intrinsic vs extrinsic motivation

    - HOW (B): Trust-cooperation complementarity

    - WHEN (V): Context determines effect of sanctions


    THEORY SUPPORT:

    - Motivation crowding theory

    - Published in Nature

    - Crucial for incentive design


    KEY INSIGHT:

    Sanctions can be detrimental to cooperation by crowding out intrinsic

    motivation; trust signals may be more effective than punishment threats.'
