# ============================================================================
# ABSTRACT & SOURCE
# ============================================================================
abstract: |
  This paper reviews the state of antitrust enforcement in labor markets. I summarize how
  economists' models relate to antitrust enforcement and discuss trends in antitrust cases
  and policy. First, I describe recent enforcement actions against no-poach agreements and
  wage-fixing. Second, I discuss antitrust review of mergers that may affect labor markets,
  including the landmark case US v. Bertelsmann (2022). The 2023 Merger Guidelines explicitly
  mention labor market effects for the first time in their 55-year history. Under Cournot
  competition, wage markdowns are proportional to HHI. The key distinction is between
  concentration-based labor market power (actionable via antitrust) and search friction-based
  power (not directly actionable).

