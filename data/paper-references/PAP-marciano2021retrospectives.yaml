abstract: James Buchanan wrote “An Economic Theory of Clubs” and invented clubs to support a form of welfare economics in
  which there is no social welfare function (SWF) and individual utility functions cannot be “read” by external observers.
  Clubs were a means to allow the implementation of individualized prices for public goods and services and to allow each
  individual to pay exactly the amount he wants to pay. He developed this project to answer and counter Paul Samuelson's analysis
  of public goods, in which social welfare functions play a crucial role. Buchanan and Samuelson disagreed over the allocation
  of the costs of the public good to each individual. To Buchanan, it was by relying on individual's preferences. To Samuelson,
  by using a SWF. Buchanan's clubs are thus foreign and incompatible with the traditional Samuelson-style public economics
  in which they are used.
