abstract: Last year marked the 200th anniversary of Ricardo’s famous “four numbers” paragraph on comparative advantage, which
  is one of the oldest analytical results in economics. Following the lead of James Mill (1821), these four numbers have been
  interpreted as unit labor coefficients. This interpretation has provided the basis for the development of the ‘Ricardian
  model’ from John Stuart Mill (1852) to Eaton and Kortum (2002). However, if we accept the labor unit interpretation of these
  numbers, Ricardo’s exposition in his 1817 Principles of Political Economy and Taxation makes little logical sense. Building
  on Sraffa’s (1930) interpretation of Ricardo’s numbers as labor embodied in trade, our discussion reveals the amazing simplicity
  and generality of Ricardo’s comparative advantage formulation and gains-from-trade logic.
