title: Institutional Investors and Stock Market Volatility
author: Gabaix
year: '2006'
publication_type: journal_article
doi: 10.1162/qjec.2006.121.2.461
abstract: This paper presents a theory of excess stock market volatility, in which market movements are due to trades by very
  large institutional investors in relatively illiquid markets. Such trades generate significant spikes in returns and volume,
  even in the absence of important news about fundamentals. The authors derive the optimal trading behavior of these investors,
  which allows them to provide a unified explanation for apparently disconnected empirical regularities in returns, trading
  volume and investor size. The trades of large institutional investors in illiquid markets explain many patterns in the extreme
  behavior of returns and trading volume.
