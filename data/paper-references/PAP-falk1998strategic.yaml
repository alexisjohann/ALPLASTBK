abstract: Social norms, such as treating others fairly regardless of kin relations, are essential for the functioning of human
  societies. Their existence may explain why humans, among all species, show unique patterns of prosocial behaviour. The maintenance
  of social norms often depends on external enforcement, as in the absence of credible sanctioning mechanisms prosocial behaviour
  deteriorates quickly. This sanction-dependent prosocial behaviour suggests that humans strategically adapt their behaviour
  and act selfishly if possible but control selfish impulses if necessary. Recent studies point at the role of the dorsolateral
  prefrontal cortex (DLPFC) in controlling selfish impulses. We test whether the DLPFC is indeed involved in the control of
  selfish impulses as well as the strategic acquisition of this control mechanism. Using repetitive transcranial magnetic
  stimulation, we provide evidence for the causal role of the right DLPFC in strategic fairness. Because the DLPFC is phylogenetically
  one of the latest developed neocortical regions, this could explain why complex norm systems exist in humans but not in
  other social animals.
