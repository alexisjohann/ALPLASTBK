abstract: "Marriage bars were policies adopted by firms and school boards that fired single women when they married and refused to hire married women. At their peak in 1930-1950, these bars affected about 75% of all local school boards and over 50% of office workers. Goldin analyzes the economic rationale behind these discriminatory policies, their rise during the 1920s and 1930s, and their decline after World War II. The paper documents how institutional discrimination against married women in the labor market was both widespread and systematically enforced."
