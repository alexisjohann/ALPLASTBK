abstract: 'The Paycheck Protection Program (PPP) provided small businesses with roughly $800 billion dollars in uncollateralized,
  low-interest loans during the pandemic, almost all of which will be forgiven. With 94 percent of small businesses ultimately
  receiving one or more loans, the PPP nearly saturated its market in just two months. We estimate that the program cumulatively
  preserved between 2 and 3 million job-years of employment over 14 months at a cost of $169K to $258K per job-year retained.
  These numbers imply that only 23 to 34 percent of PPP dollars went directly to workers who would otherwise have lost jobs;
  the balance flowed to business owners and shareholders, including creditors and suppliers of PPP-receiving firms. Program
  incidence was ultimately highly regressive, with about three-quarters of PPP funds accruing to the top quintile of households.
  PPP’s breakneck scale-up, its high cost per job saved, and its regressive incidence have a common origin: PPP was essentially
  untargeted because the United States lacked the administrative infrastructure to do otherwise. Harnessing modern administrative
  systems, other high-income countries were able to better target pandemic business aid to firms in financial distress. Building
  similar capacity in the U.S. would enable improved targeting when the next pandemic or other large-scale economic emergency
  inevitably arises.'
