abstract: 'Based on what economics students say and how they play games, economics students appear less cooperative than other
  students. But appearances can be deceiving: the evidence in this paper indicates that the actual behavior of economics students
  is more cooperative than that of other students. The authors carried out a ‘lost letter’ experiment, in which envelopes
  containing currency were dropped in classrooms and the return rate measured. In this test of actual behavior, the economics
  students returned a significantly larger percentage of lost letters, exhibiting more cooperative behavior than other students.'
