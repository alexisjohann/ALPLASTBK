  abstract_extended: "The paper investigates the wage, employment, and reallocation effects of the\nintroduction of a nationwide\
    \ minimum wage in Germany that affected 15% of all\nemployees.\n\nBased on identification designs that exploit variation\
    \ in exposure across\nindividuals and local areas, the authors find that the minimum wage:\n1. RAISED WAGES (as intended)\n\
    2. Did NOT lower employment (contrary to some predictions)\n3. Led to REALLOCATION of low-wage workers:\n   - From smaller\
    \ to larger establishments\n   - From lower- to higher-paying establishments\n   - From less to more productive establishments\n\
    \nThis worker upgrading accounts for up to 17% of the wage increase induced by\nthe minimum wage.\n\nMoreover, at the\
    \ regional level, average establishment quality increased in\nmore affected areas in the years following the introduction\
    \ of the minimum wage."
  key_findings: '1. Germany introduced minimum wage (€8.50) in January 2015 - affected 15% of workers

    2. Wages increased, employment did NOT fall

    3. Worker REALLOCATION is key mechanism (first paper to highlight this)

    4. Upgrading accounts for 17% of wage increase

    5. Workers moved to: larger, higher-paying, more productive firms

    6. Regional establishment quality improved in affected areas'
