abstract: Recently I have compared the instability and polarization around the recent presidential election to the 1968 election
  contest between Hubert Humphrey and Richard M. Nixon as the most intense in my lifetime. Yet William A. Darity Jr. and A.
  Kirsten Mullen in From Here to Equality remind us that in the first election in which Black Texans could vote in 1868 at
  least 227 freedmen and Union white men were killed outright and sixty-eight wounded. In Arkansas, Congressman James M. Hinds
  became the first U.S. congressman assassinated in office along with three members of the South Carolina legislature and
  several men who served in the constitutional convention. These examples illustrate the authors' central theme of the persistence
  of white supremacy. Darity and Mullen also point to several key points at which the nation could have chosen as different
  path. For example, in 1790, the same year as the passage of...
