abstract: Recent theories and narratives highlight the potential role of associative recall in driving overreaction in expectations
  and market behavior. Based on a simple model, we test this idea through a series of experiments in which news are communicated
  with memorable contexts. Because the experimental participants predominantly remember those past news that get cued by new
  information, their beliefs about fundamentals strongly overreact. In a betting market experiment, associative recall translates
  into overreaction in market prices …
