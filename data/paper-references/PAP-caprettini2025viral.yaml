abstract: Political polarization is a growing concern in many countries. Are mass protests merely a sign
  of increasing cleavages, or do they polarize societies? In this paper, we estimate the impact of Nazi
  marches in 1932 Hamburg, using granular data from 622 voting precincts during 6 elections. We show propaganda
  can persuade -- but it does by raising the share of areas with high levels of Nazi support. Importantly,
  marches can also backfire, repelling voters. Thus, protest marches lead to polarization. These effects
  diffused through social networks, measured as contagion patterns across neighborhoods from the 1918
  Spanish flu outbreak. The electoral effects of social spillovers are of similar importance as direct
  exposure, and grow over time.
