summary:
  abstract_extended: "Are mass protests merely a sign of increasing cleavages, or do they\nPOLARIZE societies?\n\
    \nDATA: 622 voting precincts in Hamburg during 6 elections (1932)\n\nKEY FINDINGS:\n\n1. PROPAGANDA\
    \ CAN PERSUADE\n   Nazi marches increased vote share by ~2 percentage points\n   (21% above average)\n\
    \n2. BUT IT CAN ALSO BACKFIRE\n   Marches repelled voters in some areas\n   → POLARIZING EFFECT: Persuasion\
    \ in upper tail, backlash in lower tail\n   → Same stimulus, OPPOSITE REACTIONS\n\n3. SOCIAL NETWORK\
    \ DIFFUSION\n   Effects diffused through social networks\n   Measured using Spanish flu outbreak patterns\
    \ as instrument\n   INDIRECT EFFECTS = 50% of total effect (persuasion multiplier)\n\n4. PERSISTENCE\n\
    \   Electoral effects persist 12+ months\n\nINNOVATION:\nUses 1918 Spanish flu mortality patterns\
    \ to measure social network\nconnectivity across neighborhoods.\n\nTRILOGY (with Voigtländer-Voth):\n\
    - 2012: STOCK (historical persistence of anti-Semitism)\n- 2015: FLOW (Nazi indoctrination mechanisms)\n\
    - 2025: MECHANISM (social network diffusion)"
  key_findings: '1. Marches increase Nazi vote share by 2pp (21% above average)

    2. POLARIZING: persuasion AND backlash from same stimulus

    3. Social network spillovers = 50% of total effect

    4. Spanish flu instrument for network connectivity

    5. Effects persist 12+ months

    6. Shows how propaganda goes "viral"'
