abstract: This book bridges the gap between game-theoretic models that dominated industrial organization literature and the
  traditional structure-conduct-performance paradigm of Bain and successors. Using current game-theoretic methods, the author
  reexamines the traditional agenda and argues that despite the delicate nature of many results, there are theoretical predictions
  that are extremely robust. The analysis distinguishes between exogenous and endogenous sunk costs, combining theory, econometric
  evidence, and detailed industry studies of twenty markets in the food and drink sector across six countries to evaluate
  the strengths and limitations of game-theoretic approaches in explaining industrial structure evolution.
