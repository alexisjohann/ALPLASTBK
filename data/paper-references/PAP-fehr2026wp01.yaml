abstract: 'This working paper introduces a metatheoretical framework for integrating diverse findings
  from behavioral economics. The Evidence-Based Framework (EBF) uses two core concepts: (1) context-dependence,
  captured through the context vector Psi, which modifies how behavioral parameters operate across situations;
  and (2) complementarity, captured through the gamma-matrix, which describes how different utility dimensions
  interact. The framework organizes 50+ years of behavioral research under a unified structure with 10
  Core questions (10C), enabling systematic intervention design based on empirical evidence rather than
  ad-hoc assumptions.'
