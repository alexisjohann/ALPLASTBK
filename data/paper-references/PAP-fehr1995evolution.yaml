summary:
  abstract_extended: 'This paper examines the evolutionary foundations of fairness preferences.

    Using evolutionary game theory, we show that fairness norms can evolve and

    persist in populations through cultural and genetic mechanisms. Strong

    reciprocity - the tendency to cooperate and punish defectors - plays a

    central role in this evolution.'
  key_findings: "1. EVOLUTIONARY STABILITY\n   - Fairness preferences can evolve\n   - Cultural transmission mechanisms\n\
    \   - Gene-culture coevolution\n\n2. STRONG RECIPROCITY\n   - Punishment of free-riders\n   - Costly enforcement\n   -\
    \ Group selection dynamics\n\n3. PERSISTENCE\n   - Fairness norms persist in equilibrium\n   - Invasion by selfish types\
    \ prevented\n   - Multiple equilibria possible"
  ebf_relevance: '10C DIMENSIONS:

    - WHAT (C): Fairness as evolved preference

    - WHO (AAA): Population-level evolution

    - WHEN (V): Evolutionary timescales


    THEORY SUPPORT:

