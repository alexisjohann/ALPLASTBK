abstract: Arad and Rubinstein (2012a) have designed a novel game to study level-k reasoning experimentally. Just like them,
  we find that the depth of reasoning is very limited and clearly different from that in equilibrium play. We show that such
  behavior is even robust to repetitions; hence there is, at best, little learning. However, under time pressure, behavior
  is, perhaps coincidentally, closer to that in equilibrium play. We argue that time pressure evokes intuitive reasoning and
  reduces the focal attraction of choosing higher (and per se more profitable) numbers in the game.
