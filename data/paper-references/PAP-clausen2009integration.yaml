abstract: The study analyses the effect of active labour-market programmes on the hazard rate into regular employment for
  newly arrived immigrants using the timing-of-events duration model. We take account of language course participation and
  progression in destination country language skills, using rich administrative data from Denmark. We find substantial lock-in
  effects of participation in active labour-market programmes. Post programme effects on the hazard rate to regular employment
  are significantly positive for wage subsidy programmes, but not for other types of programmes. For language course participants,
  improvement in language proficiency has significant and substantial positive effects on the hazard rate to employment.
