    \n3. INSTITUTIONAL DESIGN\n   - Harness reciprocity\n   - Avoid crowding out\n   - Build trust"
  ebf_relevance: '10C DIMENSIONS:

    - WHAT (C): Reciprocity preferences

    - HOW (B): Reciprocity-institution interaction

    - WHEN (V): Economic contexts


    THEORY SUPPORT:

    - MS-SR-001: Strong Reciprocity

