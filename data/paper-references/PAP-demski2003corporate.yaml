abstract: This paper surveys conflicts of interest in the corporate governance arena, with emphasis on auditors, boards of
  directors, analysts and investment bankers, regulators, management, attorneys and investors. Enron provides a host of examples
  as well. I stress the multifaceted nature of these conflicts, and the fact most research looks at some conflicts, such as
  auditor independence, absent the larger setting and potential interactions among various players. I further speculate herding
  behavior is an important explanatory device in understanding periodic failures.
