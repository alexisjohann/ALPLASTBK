abstract: In this chapter, we present econometric and statistical methods for analyzing randomized experiments. For basic
  experiments, we stress randomization-based inference as opposed to sampling-based inference. In randomization-based inference,
  uncertainty in estimates arises naturally from the random assignment of the treatments, rather than from hypothesized sampling
  from a large population. We show how this perspective relates to regression analyses for randomized experiments. We discuss
  the analyses of stratified …
