abstract: |
  Authority and power permeate political, social, and economic life, but empirical
  knowledge about the motivational origins and consequences of authority is limited.
  We study the motivation and incentive effects of authority experimentally in an
  authority-delegation game. Individuals often retain authority even when its delegation
  is in their material interest -- suggesting that authority has non-pecuniary consequences
  for utility. Authority also leads to over-provision of effort by the controlling parties,
  while a large percentage of subordinates under-provide effort despite pecuniary incentives
  to the contrary.

key_findings_structured:
  S1_research_question: "Does authority have intrinsic motivational value beyond material incentives? How does the allocation of authority affect effort and delegation decisions?"
  S2_methodology: "Laboratory experiment with authority-delegation game. 4 main treatments (LOW/HIGH/PLOW/PHIGH) varying conflict of interest. Within-subject lottery task for risk preferences. BDM mechanism."
  S3_sample_data: "N=504 subjects total across 6 treatments. University of Zurich and ETH Zurich. 12 periods per session (50 periods in PHIGH50)."
  S4_findings:
    - finding: "Under-delegation: 35-43% of principals retain authority in HIGH/PHIGH despite delegation being materially optimal"
      source_section: "Section IV, Result 1"
      formal_result: "Delegation rate = 57-65% vs 100% predicted by standard theory (p<0.01)"
    - finding: "Controlling party over-effort: principals provide 10-15 effort units above Nash Equilibrium"
      source_section: "Section IV, Result 2"
      formal_result: "Mean effort P_high = 95.5 vs NE of 80; P_low subjects also over-provide"
    - finding: "Subordinate zero-effort: 30-50% of agents provide zero effort despite positive marginal returns"
      source_section: "Section IV, Result 3"
      formal_result: "30% zero-effort in LOW, 50% in HIGH treatment (p<0.01)"
    - finding: "Overruling reduces subsequent delegation by 20-25 percentage points"
      source_section: "Section V, Result 5"
      formal_result: "Probit regression: overruled in t-1 reduces P(delegate) by 20-25pp (p<0.01)"
    - finding: "Regret aversion explains all three behavioral deviations"
      source_section: "Section III.C + Section V"
      formal_result: "Loser regret -> over-effort; Overrule regret -> underdelegation; Both from Loomes/Sugden (1982)"
    - finding: "Underdelegation is persistent over 50 periods"
      source_section: "Section V.C (PHIGH50)"
      formal_result: "35% underdelegation maintained even in period 50; 30% welfare loss"
    - finding: "Delegation increases with conflict of interest (counter-intuitive)"
      source_section: "Section IV, Result 4"
      formal_result: "Delegation rate: LOW 53% < HIGH 65% (p<0.05); agents provide more effort when conflict higher"
  S5_validity: "Strong internal validity: controlled treatments with random assignment. Within-subject risk elicitation. Multiple treatments to test comparative statics. PHIGH50 rules out learning. Consistent with regret aversion theory (Loomes/Sugden 1982)."
  S6_reproducibility: "Full experimental protocol in appendix. z-Tree implementation. University of Zurich ORSEE recruitment. All treatment parameters documented. Instructions reproduced in online appendix."

behavioral_mapping:
  10C_dimensions:
    WHO:
      relevance: high
      mapping: "Principal-agent hierarchy with authority allocation. Principal holds formal authority; can delegate to agent. Power asymmetry is central design feature."
    WHAT:
      relevance: high
      mapping: "Non-pecuniary utility from authority (intrinsic value of power). Regret disutility from losing/being overruled. Status and control as utility components."
    HOW:
      relevance: high
      mapping: "Interaction between authority allocation and effort provision. Authority motivates controlling party but demotivates subordinate. Complementarity between formal authority and effort."
    WHEN:
      relevance: high
      mapping: "Conflict of interest (LOW vs HIGH) as contextual moderator. Prior overruling experience as dynamic context. 50-period persistence demonstrates temporal stability."
    WHERE:
      relevance: high
      mapping: "Underdelegation rate = 35-43%; over-effort = +10-15 units; zero-effort = 30-50%; overruling effect = 20-25pp; welfare loss = 30%"
    AWARE:
      relevance: medium
      mapping: "Principals aware of delegation trade-off but exhibit systematic bias. Regret anticipation drives behavior (prospective awareness of potential regret)."
    HIERARCHY:
      relevance: high
      mapping: "Formal authority (Aghion-Tirole 1997) - principal has right to overrule agent. Delegation transfers real authority. Central theme of the paper."

  psi_dimensions:
    Psi_I:
      relevance: high
      description: "Institutional design of authority allocation; formal vs delegated authority; overruling rights"
    Psi_S:
      relevance: medium
      description: "Dyadic interaction between principal and agent; conflict of interest varies across treatments"
    Psi_C:
      relevance: high
      description: "Regret aversion as cognitive mechanism; anticipation of loser regret and overrule regret"

