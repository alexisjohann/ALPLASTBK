abstract: 'This paper reviews the actual situation of protection in developing countries, and then discusses the prospective
  gains from liberalization. Three experiences with liberalization, from three different parts of the world, are sketched:
  Turkey, Korea, and Mexico. Next the paper considers what can go wrong with trade reform. Finally, it focuses on two new
  directions in trade strategy: service trade liberalization and regional free trade agreements.'
