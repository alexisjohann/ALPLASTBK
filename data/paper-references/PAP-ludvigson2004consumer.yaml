abstract: Despite the widespread attention given to surveys of consumer confidence, the mechanisms by which household attitudes
  influence the real economy are less well understood. This paper begins with an overview of how consumer confidence is measured
  and reported. It then evaluates the relationship between consumer attitudes and the real economy. The evidence suggests
  that popular survey measures contain some information about future aggregate consumer expenditure growth. However, much
  of that information is found in other economic and financial indicators, and the independent information provided by consumer
  confidence predicts a relatively modest amount of additional variation in future consumer spending.
