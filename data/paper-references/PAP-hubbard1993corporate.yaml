abstract: “Integration” of the corporate and individual income taxes refers to any plan in which corporate income is taxed
  only once, rather than taxed both when earned and when distributed to shareholders as dividends. A consensus is emerging
  from the ongoing studies, both within the Treasury and outside, that such integration is desirable.
