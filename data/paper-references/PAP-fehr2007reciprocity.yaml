abstract: This infographic targets the debate on the dichotomy of trust and distrust, arguing in favor of trust and distrust
  being two seperate constructs, hence are not two opposite ends of the same continuum. Further, this infographic shows, that
  trust and distrust have different antecedents, distinct properties and disparate outcomes. &#13;\n&#13;\nGiven this, this
  infographic further summarizes the current state of (scientific / evidence-based) practices, dedicated to enable trust building
  in institutions, with a special emphasis on public institutions (NGOs, Public Sector Firms, INGOs), such as the International
  Red Cross /Red Crescent Society. &#13;\n&#13;\nAlso, this infographic gives practical advice for decision makers in order
  to effectively manage corporate trust building activities in an evidence-based manner.
