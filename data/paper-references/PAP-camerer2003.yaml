summary:
  abstract_extended: This chapter provides an introduction to the approach and methods of behavioral economics, and to some
    of its major findings, applications, and promising new directions. Behavioral economics increases the explanatory power
    of economics by providing it with more realistic psychological foundations.
  key_findings: '1. PSYCHOLOGICAL FOUNDATIONS: Behavioral economics incorporates psychological realism into economic models

    2. NOT ANTI-NEOCLASSICAL: Augments rather than replaces utility maximization

    3. THREE PILLARS: Bounded rationality, bounded willpower, bounded self-interest

    4. METHODOLOGY: Combines theoretical models with experimental and field evidence'
