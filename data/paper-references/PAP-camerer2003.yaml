abstract: This book is about what experimental evidence reveals about strategic behavior. Behavioral game theory extends standard
  game theory by taking seriously the idea that players are imperfect strategists who learn and adjust their behavior over
  time. The book synthesizes experimental evidence on strategic behavior into a behavioral game theory that is based on realistic
  psychological principles and that can explain many of the deviations from standard game theory that have been observed in
  experiments.
