title: A Theory of Reciprocity
author: Falk
year: '2000'
publication_type: journal_article
doi: 10.1016/j.geb.2004.06.010
abstract: This paper presents a formal theory of reciprocity where people reward kind actions and punish unkind ones. The
  theory accounts for evaluating kindness based not only on consequences but also on underlying intentions. It explains stylized
  facts across experimental games including the ultimatum game, gift-exchange game, reduced best-shot game, dictator game,
  prisoner's dilemma, and public goods games. The theory explains why identical consequences trigger different reciprocal
  responses in different environments, and why bilateral interactions tend toward fair outcomes while competitive markets
  may produce extremely unfair distributions.
