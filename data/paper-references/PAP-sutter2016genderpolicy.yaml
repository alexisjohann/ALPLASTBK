abstract: Abstract We study the willingness to compete of 588 children and teenagers aged ten to seventeen. We replicate the
  gender difference in tournament entry choices usually found in the literature for adults. We then show that policy interventions
  like quotas and preferential treatment help to close down the gender gap without leading to losses in efficiency, during
  or after a tournament. Given that differences in competitive behavior are prevalent from an early age, the application of
  interventions to promote females in competitions may be desirable already at early ages to promote equal chances for women
  on labor markets later on.
