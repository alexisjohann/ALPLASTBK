summary:
  abstract_extended: 'This paper develops a theory of prosocial behavior that combines
    altruism,

    material self-interest, and social or self-image concerns. The model explains

    how explicit incentives can be counterproductive by signaling distrust or

    crowding out intrinsic motivation.


    The authors analyze three channels through which rewards and punishments can

    backfire: they may overjustify the desired behavior (undermining intrinsic

    motivation), they may convey negative news about the principal''s trust or the

    task''s nature, and they may create reputational concerns that distort behavior.


    The framework accounts for puzzling real-world phenomena including the variable

    effectiveness of incentives across cultures and contexts, and the observation

    that extrinsic motivation sometimes enhances and sometimes diminishes

    prosociality.'
  key_findings: "1. CROWDING OUT: Extrinsic rewards can reduce intrinsic motivation\
    \ and\n   prosocial behavior by undermining self-image or social-image concerns\n\
    \n2. SIGNALING DISTRUST: Offering incentives may signal that the principal\n \
    \  doesn't trust the agent, which damages the relationship\n\n3. IMAGE CONCERNS:\
    \ People care about how their actions are perceived -\n   incentives muddle the\
    \ attribution of prosocial behavior\n\n4. OVERJUSTIFICATION: Rewards provide external\
    \ justification that crowds out\n   internal motivation for the activity\n\n5.\
    \ CONTEXT DEPENDENCE: The same incentive can enhance or reduce prosociality\n\
    \   depending on cultural norms and baseline expectations\n\n6. OPTIMAL INCENTIVES:\
    \ Sometimes no reward is better than a small reward;\n   large rewards can work\
    \ but may be costly"
