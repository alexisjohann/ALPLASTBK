abstract: This chapter from Social Responsibility and the Business Predicament examines the difficulties organizational leaders
  face when trying to command and control behavior within organizations. Schelling muses on the difficulty of enforcing behavioral
  change even for firm heads, using examples like making taxi passengers fasten seatbelts. The work considers how organizations
  accomplish behavioral goals and reflects on the inherent challenges of organizational command and control - not government
  regulation, but internal organizational dynamics.
