summary:
  abstract_extended: "This foundational paper introduces several key concepts that challenged\ntraditional economic theory's\
    \ assumptions about consumer behavior.\n\nKEY CONCEPTS INTRODUCED:\n\n1. THE ENDOWMENT EFFECT: People value goods more\
    \ highly when they own them\n   than when they don't. Selling prices (WTA) exceed buying prices (WTP)\n   beyond transaction\
    \ costs.\n\n2. SUNK COST FALLACY: Contrary to economic theory, people consider sunk\n   costs in their decisions. Resources\
    \ already spent influence future choices.\n\n3. MENTAL ACCOUNTING: People categorize money into different mental accounts\n\
    \   (entertainment, food, savings) and treat money differently depending on\n   which account it belongs to.\n\n4. LOSS\
    \ AVERSION IN RISKLESS CHOICE: The pain of losses exceeds the pleasure\n   of equivalent gains, even in certain outcomes.\n\
    \n5. ANOMALIES IN CONSUMER CHOICE: Systematic deviations from standard theory\n   including:\n   - Underweighting opportunity\
    \ costs\n   - Failure to ignore sunk costs\n   - Search behavior inconsistencies\n   - Framing effects in riskless choice\n\
    \nTHIS PAPER LAUNCHED \"Mental Accounting\" as a research program that Thaler\ndeveloped over the following decades."
  key_findings: '1. Endowment effect: WTA > WTP systematically

    2. Sunk cost fallacy contradicts normative theory

    3. Mental accounting introduces non-fungibility

    4. Loss aversion applies beyond risky choice

    5. Opportunity costs underweighted vs. out-of-pocket costs

    6. Foundation paper for behavioral economics anomalies'
  ebf_relevance: "Domain: CORE-THEORY (Foundational), LIT-THALER\n10C Dimensions: WHAT (utility anomalies), HOW (mental accounting),\n\
