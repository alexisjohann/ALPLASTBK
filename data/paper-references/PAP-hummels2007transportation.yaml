abstract: While the precise causes of postwar trade growth are not well understood, declines in transport costs top the lists
  of usual suspects. However, there is remarkably little systematic evidence documenting the decline. This paper brings to
  bear an eclectic mix of data in order to provide a detailed accounting of the time-series pattern of shipping costs. The
  ad-valorem impact of ocean shipping costs is not much lower today than in the 1950s, with technological advances largely
  trumped by adverse cost shocks. In contrast, air shipping costs have dropped an order of magnitude, and airborne trade has
  grown rapidly as a result. As a result, international trade has also experienced a significant rise in speed.
