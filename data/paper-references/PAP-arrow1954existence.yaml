abstract: A. Wald has presented a model of production and a model of exchange and
  proofs of the existence of an equilibrium for each of them. Here proofs of the existence
  of an equilibrium are given for an integrated model of production, exchange and
  consumption. In addition the assumptions made on the technologies of producers and
  the tastes of consumers are significantly weaker than Wald's. Finally a simplification
  of the structure of the proofs has been made possible through use of the concept
  of an abstract economy, a generalization of that of A game.
