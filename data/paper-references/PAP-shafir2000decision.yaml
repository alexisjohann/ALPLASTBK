abstract: A nonlinear (nonconvex) programming model provides a new definition of efficiency
  for use in evaluating activities of not-for-profit entities participating in public
  programs. A scalar measure of the efficiency of each participating unit is thereby
  provided, along with methods for objectively determining weights by reference to
  the observational data for the multiple outputs and multiple inputs that characterize
  such programs. Equivalences are established to ordinary linear programming models
  for effecting computations. The duals to these linear programming models provide
  a new way for estimating extremal relations from observational data. Connections
  between engineering and economic approaches to efficiency are delineated along with
  new interpretations and ways of using them in evaluating and controlling managerial
  behavior in public programs.
