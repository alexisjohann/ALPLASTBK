abstract: Over the last 30 years, China's economy has boomed. This trend has lifted hundreds of millions of Chinese out of
  poverty but it has also sharply increased local, regional, and global pollution levels. We look at the rise in air pollution
  over recent decades, and the perhaps surprising finding that in many of China's urban areas, levels of particulates (of
  less than 10 microns) have been decreasing during the last 10 to 15 years. We then turn to the costs and tradeoffs of air
  pollution, including costs to human health, reductions in worker productivity, and how people are seeking to reduce their
  exposure to pollution as shown by compensating differentials in real estate prices and purchases of masks and air filters.
  We discuss how rising incomes tend to raise the demand for environmental amenities and thus increase political pressure
  for environmental protection, and then we turn to the policy tools that China has used to reduce pollution. We conclude
  by arguing that as China's government is preparing for an additional 300 million people to move to urban areas over the
  next 30 years, it will have a number of opportunities for China to reduce pollution through a shift from manufacturing to
  services, along with various steps to improve energy efficiency and resource conservation. Overall, it seems that China
  is on track to improve its environmental performance in the years ahead.
