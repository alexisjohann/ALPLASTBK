abstract: A common observation in the informal literature of economics (and elsewhere) is that is multistage “games,” players
  may seek early in the game to acquire a reputation for being “tough” or “benevolent” or something else. But this phenomenon
  is not observed in some formal game-theoretic analyses of finite games, such as Selten's finitely repeated chain-store game
  or in the finitely repeated prisoners' dilemma. We reexamine Selten's model, adding to it a “small” amount of imperfect
  (or incomplete) information about players' payoffs …
