paper: oberholzergee2021strategy
superkey: PAP-oberholzergee2021strategy
title: 'Better, Simpler Strategy: A Value-Based Guide to Exceptional Performance'
author: Felix Oberholzer-Gee
year: '2021'
publication_type: book
publisher: Harvard Business Review Press
isbn: 978-1-63369-969-4
abstract: 'This book presents a value-based approach to strategy that focuses on creating value

  for all stakeholders. The central framework is the "value stick" - with willingness to

  pay (WTP) at the top and willingness to sell (WTS) at the bottom. Companies create

  value by raising WTP (what customers are willing to pay) or lowering WTS (the minimum

  employees and suppliers require). Value is split three ways: customer delight (WTP minus

  price), firm margin (price minus cost), and employee/supplier satisfaction (cost minus WTS).

  The book argues that strategy is fundamentally simple: focus on value creation first,

  and value capture will follow.

  '
abstract_source: full_text
abstract_fetched: '2026-02-04'
structural_characteristics:
  S1_research_question:
    available: true
    questions:
    - How can companies create value for customers, employees, suppliers, and shareholders?
    - What makes a strategy good vs. merely operational?
    - How do complements and network effects raise WTP?
    - How can companies achieve dual advantages (high WTP + low WTS)?
    - How should companies balance value creation with value capture?
    clarity: high
  S2_methodology:
    available: true
    approach: conceptual_framework
    methods:
    - Value stick framework development
    - Case study analysis (Amazon, IKEA, Southwest, Apple, etc.)
    - Integration of economics and strategy literature
    - Comparative advantage analysis
    - Network effects and complement analysis
    key_definitions:
    - 'WTP (Willingness to Pay): Maximum amount a customer will pay for a product'
    - 'WTS (Willingness to Sell): Minimum amount employees/suppliers require'
    - 'Customer Delight: WTP minus Price'
    - 'Firm Margin: Price minus Cost'
    - 'Employee/Supplier Satisfaction: Cost minus WTS'
    - 'Dual Advantage: Simultaneously high WTP and low WTS'
    - 'Value Creation: Increasing WTP or decreasing WTS'
    - 'Value Capture: Firm''s share of created value (margin)'
  S3_sample_data:
    available: true
    type: case_studies
    empirical_data: true
    sample_characteristics:
    - Multiple company case studies across industries
    - Amazon (retail, e-commerce)
    - IKEA (furniture, retail)
    - Southwest Airlines (aviation)
    - Apple (technology, platform)
    - Facebook/Google (platform, network effects)
    - Patagonia (apparel, mission-driven)
    - Toyota (automotive, supplier relationships)
    - Nike (apparel, customization)
    descriptive_statistics:
      n_chapters: 20
      n_parts: 6
      n_case_studies: 20+
      framework_components: 3
  S4_findings:
    available: true
    key_findings:
    - finding: Strategy is fundamentally about value creation (raising WTP or lowering WTS)
      evidence: Value stick framework with three-way value split
      interpretation: Focus on value creation first; value capture follows
    - finding: Dual advantages (high WTP + low WTS) create strongest competitive positions
      evidence: IKEA case - Scandinavian design (WTP) + flat-pack efficiency (WTS)
      interpretation: Best strategies work both ends of value stick
    - finding: Complements raise WTP for core products
      evidence: Apple App Store, PlayStation games, razor-blade models
      interpretation: Invest in complement ecosystems to increase customer value
    - finding: Network effects create increasing returns to scale
      evidence: Facebook, Google, platform dominance patterns
      interpretation: Markets with network effects tend toward winner-take-all
    - finding: Lowering employee WTS creates sustainable competitive advantage
      evidence: Patagonia, McKinsey - attract talent through mission/development not just pay
      interpretation: Employee value through meaning > employee value through compensation
    - finding: Operational effectiveness is necessary but not strategy
      evidence: Porter's distinction - best practices spread quickly
      interpretation: Strategy requires differentiation, not just efficiency
  S5_validity:
    available: true
    internal_validity:
    - Rigorous framework based on economic theory (WTP/WTS)
    - Consistent application across diverse industries
    - Integration with established strategy concepts (Porter, Ricardo)
    - Clear cause-and-effect logic in value stick
    external_validity:
    - Cases span multiple industries (retail, tech, airlines, automotive)
    - Global companies (US, European, Asian markets)
    - Both B2C and B2B contexts
    - Applicable to products and services
    - Framework validated by HBS teaching and executive education
    limitations:
    - Conceptual framework, not empirical hypothesis testing
    - Case selection may have survivorship bias
    - Limited quantitative validation of WTP/WTS measurements
    - Less attention to competitive dynamics and game theory
    - Focus on large companies; less on startups
  S6_reproducibility:
    available: true
    proofs_available: true
    proof_location: 'Figure 1-1: The Value Stick'
    framework_specification: WTP → Price → Cost → WTS with three value components
    assumptions_documented: true
    testable_predictions:
    - Companies that raise WTP will outperform competitors
    - Companies that lower WTS will attract better talent and suppliers
    - Dual advantage companies will have highest margins
    - Investment in complements will raise WTP for core products
    - Network effects lead to market concentration
