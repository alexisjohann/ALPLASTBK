key_contributions:
- 'Value stick framework: WTP at top, WTS at bottom, three-way value split'
- Customer delight = WTP - Price (not just WTP or price alone)
- Employee satisfaction = Cost - WTS (lower WTS = more value for employees)
- 'Dual advantage concept: simultaneous high WTP and low WTS'
- 'Complement strategy: invest in complements to raise core product WTP'
- Network effects analysis with critical mass and increasing returns
- Distinction between operational effectiveness (not strategy) and strategic differentiation
- Stakeholder value framework integrating customers, employees, suppliers, and firm
