parameter_contributions:
  - symbol: "V_total"
    name: "Total Value Created"
    description: "Total value created in a transaction, decomposed into three stakeholder shares"
    functional_form: "V_total = WTP - WTS = (WTP - P) + (P - C) + (C - WTS)"
    measurement_contexts:
      - context: "value_stick_general"
        value_estimate: "V = WTP - WTS (varies by firm and transaction)"
        psi_conditions:
          Psi_I: "market_competition_structure"
          Psi_S: "stakeholder_bargaining_power"
        source_in_paper: "Chapter 1, Figure 1-1"
        study_type: "conceptual_framework"
    ebf_relevance: "Core decomposition mapping to EBF WHAT (utility dimensions) - customer delight, firm margin, employee satisfaction as three value components"

  - symbol: "WTP"
    name: "Willingness to Pay"
    description: "Maximum amount a customer will pay for a product or service"
    measurement_contexts:
      - context: "customer_value_drivers"
        value_estimate: "varies by quality, convenience, brand, customization, network effects, complements"
        psi_conditions:
          Psi_C: "customer_needs_and_alternatives"
          Psi_M: "product_features_and_complements"
        source_in_paper: "Chapters 4-9"
        study_type: "conceptual_framework"
    ebf_relevance: "Maps to EBF utility function U - WTP captures total perceived value across FEPSDE dimensions"

  - symbol: "WTS"
    name: "Willingness to Sell"
    description: "Minimum compensation employees/suppliers require to provide their services"
    measurement_contexts:
      - context: "employee_wts_drivers"
        value_estimate: "lowered by mission/meaning, skills development, work environment, prestige"
        psi_conditions:
          Psi_S: "employer_brand_and_culture"
          Psi_K: "organizational_values_and_mission"
        source_in_paper: "Chapters 10-12"
        study_type: "conceptual_framework"
      - context: "patagonia_mission_wts"
        value_estimate: "lower salaries than competitors but attracts dedicated talent through environmental mission"
        psi_conditions:
          Psi_K: "environmental_mission_driven_culture"
        source_in_paper: "Chapter 11"
        study_type: "case_study"
        countries: ["USA"]
    ebf_relevance: "Maps to EBF reservation utility - WTS reduction through identity (U_IDN) and social meaning"

  - symbol: "dual_advantage"
    name: "Dual Advantage Condition"
    description: "Strategic position with simultaneously high WTP and low WTS"
    functional_form: "dual_advantage = (WTP_firm > WTP_avg) AND (WTS_firm < WTS_avg)"
    measurement_contexts:
      - context: "ikea_dual_advantage"
        value_estimate: "WTP raised by Scandinavian design + fun experience; WTS lowered by flat-pack + self-service"
        psi_conditions:
          Psi_M: "flat_pack_distribution_self_assembly"
        source_in_paper: "Chapter 15"
        study_type: "case_study"
        countries: ["Sweden", "Global"]
    ebf_relevance: "Dual advantage = complementarity between WTP-raising and WTS-lowering strategies (gamma > 0)"

  - symbol: "complement_wtp"
    name: "Complement Effect on WTP"
    description: "WTP increase for core product from availability/quality of complementary products"
    measurement_contexts:
      - context: "apple_app_store_complement"
        value_estimate: "millions of apps dramatically raise WTP for iPhone; third-party developers create value at no cost to Apple"
        psi_conditions:
          Psi_M: "digital_platform_ecosystem"
        source_in_paper: "Chapter 8"
        study_type: "case_study"
        countries: ["USA", "Global"]
    ebf_relevance: "Maps to EBF HOW - complementarity (gamma > 0) between core product and complement ecosystem"

  - symbol: "network_critical_mass"
    name: "Network Effect Critical Mass Threshold"
    description: "User count above which network effects become self-reinforcing"
    measurement_contexts:
      - context: "platform_network_effects"
        value_estimate: "below threshold: subsidy needed; above threshold: growth self-reinforcing"
        psi_conditions:
          Psi_S: "user_base_size_and_composition"
        source_in_paper: "Chapter 9"
        study_type: "case_study"
    ebf_relevance: "Maps to EBF threshold effects - network effects as extreme complementarity where gamma increases with N"

  - symbol: "comparative_advantage_gap"
    name: "Comparative Advantage Value Gap"
    description: "Difference in value creation (WTP-WTS) across activities that determines optimal specialization"
    functional_form: "specialize in activity where (WTP_i - WTS_i) is maximal relative to alternatives"
    measurement_contexts:
      - context: "ricardo_specialization"
        value_estimate: "Alfa should produce A (value=60) not B (value=30) even though it can produce both better than Beta"
        source_in_paper: "Chapter 3, table example"
        study_type: "conceptual_framework"
    ebf_relevance: "Maps to EBF resource allocation under complementarity constraints"

key_findings_structured:
  - finding_id: F1
    claim: "Strategy is fundamentally about creating value (raising WTP or lowering WTS), not about market share"
    evidence: "Value stick framework with three-way decomposition; 20+ case studies across industries"
    mechanism: "Value creation grows the pie; market share competition merely reallocates existing value"
    ebf_parameter: "V_total"

  - finding_id: F2
    claim: "Dual advantages (simultaneous high WTP and low WTS) create the strongest competitive positions"
    evidence: "IKEA case: Scandinavian design raises WTP while flat-pack lowers WTS"
    mechanism: "Business model innovation can overcome the apparent trade-off between WTP and WTS"
    ebf_parameter: "dual_advantage"

  - finding_id: F3
    claim: "Complements raise WTP for core products and create powerful strategic ecosystems"
    evidence: "Apple App Store, PlayStation games, razor-blade models, Amazon Marketplace"
    mechanism: "Investment in complement availability/quality increases perceived value of core offering"
    ebf_parameter: "complement_wtp"

  - finding_id: F4
    claim: "Network effects create increasing returns to scale and winner-take-all dynamics"
    evidence: "Facebook (3B users), Google (dominant search), Uber (ride-sharing)"
    mechanism: "Product value increases with user base; critical mass triggers self-reinforcing growth"
    ebf_parameter: "network_critical_mass"

  - finding_id: F5
    claim: "Lowering employee WTS through meaning and development creates more sustainable competitive advantage than raising compensation"
    evidence: "Patagonia (lower salaries, strong mission), McKinsey/BCG (talent development over pay)"
    mechanism: "Intrinsic motivation (identity, meaning) lowers reservation utility more durably than monetary incentives"
    ebf_parameter: "WTS"

  - finding_id: F6
    claim: "Operational effectiveness is necessary but not strategy - best practices spread quickly and lead to convergence"
    evidence: "Porter (1996) distinction; Southwest Airlines as counterexample doing different things, not same things better"
    mechanism: "Strategy requires performing different activities or same activities differently; efficiency gains are quickly copied"

  - finding_id: F7
    claim: "Value creation should precede value capture - excessive focus on capturing value (margin) often shrinks the total pie"
    evidence: "Supplier squeezing backfires (quality decline, supply instability); customer price increases drive defection"
    mechanism: "Stakeholder relationships are repeated games; excessive value extraction destroys long-term cooperation"
    ebf_parameter: "V_total"

  - finding_id: F8
    claim: "Comparative advantage determines optimal specialization even when a firm can do everything better"
    evidence: "Ricardo framework applied to corporate strategy; Alfa/Beta example (Ch. 3)"
    mechanism: "Opportunity cost of suboptimal allocation exceeds absolute advantage in less valuable activities"
    ebf_parameter: "comparative_advantage_gap"

  - finding_id: F9
    claim: "Employee satisfaction equals Cost minus WTS, not just salary level"
    evidence: "Company B pays less ($60k) but creates more employee value ($25k) than Company A ($70k, $20k) through lower WTS"
    mechanism: "The gap between compensation and reservation utility determines satisfaction, not compensation alone"
    ebf_parameter: "WTS"

behavioral_mapping:
  - domain: "corporate_strategy"
    behavior: "Value creation and capture decisions by firms"
    bias_sources:
    - "Zero-sum thinking about competition (market share focus instead of value creation)"
    - "Overemphasis on value capture at expense of value creation"
    - "Failure to recognize complement opportunities"
    intervention_channels:
    - "Value stick framework (reframing strategy as WTP/WTS)"
    - "Complement strategy (investing in adjacent products/services)"
    - "Network effect cultivation (reaching critical mass)"
    - "WTS reduction through meaning and development"
    complementarity_mechanism: "WTP-raising and WTS-lowering strategies are complements when combined through innovative business models (IKEA dual advantage)"
    gamma_estimate: "gamma > 0 for WTP x WTS strategies in dual advantage firms"
    ebf_link: "Maps to WHAT (value decomposition), HOW (complementarity between value dimensions), HIERARCHY (stakeholder utility aggregation)"

  - domain: "talent_management"
    behavior: "Employee retention and motivation"
    bias_sources:
    - "Compensation bias (assuming higher pay = more satisfied employees)"
    - "Neglect of non-monetary WTS drivers (mission, development, environment)"
    intervention_channels:
    - "Mission and purpose articulation (lowering WTS through identity)"
    - "Skills development investment (lowering WTS through career value)"
    - "Work environment design (lowering WTS through experience)"
    complementarity_mechanism: "Monetary compensation + non-monetary WTS reduction are complements when aligned"
    ebf_link: "Validates EBF WHO (employee utility) and WHAT (U_IDN identity component lowers WTS)"

  - domain: "platform_economics"
    behavior: "Platform adoption and network effect dynamics"
    bias_sources:
    - "Linear thinking about growth (ignoring threshold effects)"
    - "Underinvestment in complements"
    intervention_channels:
    - "User base subsidization to reach critical mass"
    - "Complement ecosystem development"
    - "Multi-sided market design"
    complementarity_mechanism: "Network effects create increasing gamma: each additional user raises value for all others"
    ebf_link: "Maps to CORE-HOW (complementarity increases with N) and AWARE (awareness of others' participation)"

