abstract: We identify the major public debt overhang episodes in the advanced economies since the early 1800s, characterized
  by public debt to GDP levels exceeding 90 percent for at least five years. Consistent with Reinhart and Rogoff (2010) and
  most of the more recent research, we find that public debt overhang episodes are associated with lower growth than during
  other periods. The duration of the average debt overhang episode is perhaps its most striking feature. Among the 26 episodes
  we identify, 20 lasted more than a decade. The long duration belies the view that the correlation is caused mainly by debt
  buildups during business cycle recessions. The long duration also implies that the cumulative shortfall in output from debt
  overhang is potentially massive. These growth-reducing effects of high public debt are apparently not transmitted exclusively
  through high real interest rates, as in eleven of the episodes, interest rates are not materially higher.
