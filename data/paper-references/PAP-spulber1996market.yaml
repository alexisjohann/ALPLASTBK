abstract: This paper emphasizes the important role played by intermediaries in the economy, including wholesalers, retailers,
  and financial firms. The paper defines an intermediary as an economic agent that purchases from suppliers for resale to
  buyers or that helps buyers and sellers meet and transact. Intermediaries coordinate transactions and provide the institutions
  of exchange that constitute market microstructure. Intermediaries set prices, manage inventories, coordinate exchange, and
  provide information through guarantees and delegated monitoring. These crucial activities help to explain how markets attain
  equilibrium prices and quantities. The paper suggests that the study of intermediation should be incorporated into mainstream
  economic analysis.
