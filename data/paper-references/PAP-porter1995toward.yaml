abstract: Accepting a fixed trade-off between environmental regulation and competitiveness unnecessarily raises costs and
  slows down environmental progress. Studies finding high environmental compliance costs have traditionally focused on static
  cost impacts, ignoring any offsetting productivity benefits from innovation. They typically overestimated compliance costs,
  neglected innovation offsets, and disregarded the affected industry's initial competitiveness. Rather than simply adding
  to cost, properly crafted environmental standards can trigger innovation offsets, allowing companies to improve their resource
  productivity. Shifting the debate from pollution control to pollution prevention was a step forward. It is now necessary
  to make the next step and focus on resource productivity.
