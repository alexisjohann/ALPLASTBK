abstract: In June 1997, Richard Thaler (1997b) and Bosch-Domenech and Nagel (1997b,
  c) independently designed and announced an experiment on the Beauty-contest game
  in two different daily business newspapers [the Financial Times (FT) in the United
  Kingdom and Expansión (E) in Spain], inviting the readers to participate. Five months
  later, Reinhard Selten and Nagel (1997) replicated the experiment in the monthly
  Spektrum der Wissenschaft (S), the German edition of Scientific American. Experimenting
  with newspaper …
