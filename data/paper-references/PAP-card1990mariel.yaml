abstract: Using data from the Current Population Survey, this paper describes the effect of the Mariel Boatlift of 1980 on
  the Miami labor market. The Mariel immigrants increased the Miami labor force by 7%, and the percentage increase in labor
  supply to less-skilled occupations and industries was even greater because most of the immigrants were relatively unskilled.
  Nevertheless, the Mariel influx appears to have had virtually no effect on the wages or unemployment rates of less-skilled
  workers, even among Cubans who had immigrated earlier. The author suggests that the ability of Miami's labor market to rapidly
  absorb the Mariel immigrants was largely owing to its adjustment to other large waves of immigrants in the two decades before
  the Mariel Boatlift.
