abstract: 'Welfare reform legislation was passed in the summer of 1996. Four key research questions that the new law presents
  to social scientists are as follows: (1) Can states design and operate better programs than AFDC? This includes questions
  about the ability of AFDC women to work a significant number of hours; the legislation''s effect in areas of concentrated
  urban poverty; and the extent to which women will be able to improve their families'' economic status under the legislation.
  (2) Will jobs be available? (3) How will the new block grant affect states'' fiscal situation? and (4) What new research
  methodology questions does this legislation introduce?'
