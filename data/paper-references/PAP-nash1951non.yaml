abstract: This paper defines equilibrium points as the basic ingredient for a theory of non-cooperative games, yielding a
  generalization of the solution concept for two-person zero-sum games. The theory assumes each participant acts independently
  without collaboration or communication with others. The main result proves that a finite non-cooperative game always has
  at least one equilibrium point - a stable solution where no player can improve their payoff by unilaterally changing strategies.
  This equilibrium concept later became known as the Nash equilibrium.
