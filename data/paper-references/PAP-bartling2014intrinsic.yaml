      relevance: medium
      mapping: "Interaction between principal's intrinsic value and agent's effort. Delegation decision depends on both instrumental and intrinsic components."
    WHEN:
      relevance: high
      mapping: "Conflict of interest as contextual moderator: low conflict → high intrinsic value; high conflict → lower intrinsic value."
