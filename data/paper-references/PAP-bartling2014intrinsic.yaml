abstract: |
  We use a revealed preference approach to disentangle the intrinsic and instrumental
  value of decision rights. Our experimental method exploits the fact that the intrinsic value
  affects choices only if an individual actually has decision rights, while the instrumental
  value can be measured when the individual has no decision rights. Our results show that
  the large majority of subjects intrinsically value decision rights. The intrinsic value of
  decision rights has important implications for corporate governance and organizational
  design because it suggests the existence of non-transferable private benefits of control.

key_findings_structured:
  S1_research_question: "Do individuals intrinsically value decision rights beyond their instrumental benefits? How large is this intrinsic value?"
  S2_methodology: "Revealed preference experiment with two-part design: delegation game (Part 1) elicits indifference point; lottery task (Part 2) measures certainty equivalents. BDM mechanism for incentive compatibility."
  S3_sample_data: "N=104 principals + 104 agents (main treatment) + N=68 subjects (control experiment). University of Zurich. 10 game parameterizations per subject."
  S4_findings:
    - finding: "83% of principals assign positive intrinsic value to decision rights"
      source_section: "Section 4.1, Result 1"
      formal_result: "Median control premium = 16.7% (p<0.01, Wilcoxon signed-rank)"
    - finding: "Average intrinsic value of decision rights is strictly positive"
      source_section: "Section 4.1, Result 2"
      formal_result: "CE_delegation - CE_control > 0 in 8/10 games at p<0.05"
    - finding: "Intrinsic value scales with stake size"
      source_section: "Section 4.2, Result 3"
      formal_result: "Doubling stakes roughly doubles intrinsic value; linear relationship"
    - finding: "Intrinsic value is LOWER when conflict of interest is HIGHER"
      source_section: "Section 4.3, Result 4"
      formal_result: "Counter-intuitive: decisions against others' interests reduce intrinsic value"
    - finding: "Intrinsic value is stable individual trait"
      source_section: "Section 4.4"
      formal_result: "Cronbach's alpha = 0.62-0.77 across parameterizations"
    - finding: "Loss aversion does NOT explain the result"
      source_section: "Section 5.1"
      formal_result: "Correlation between intrinsic value and loss aversion: r = -0.05"
    - finding: "Illusion of control does NOT explain the result"
      source_section: "Section 5.2"
      formal_result: "91% of principals have zero WTP for rolling dice themselves"
  S5_validity: "Strong internal validity: controlled for risk preferences, social preferences, ambiguity aversion by experimental design. Ruled out loss aversion, illusion of control, preference reversals, reciprocity as alternative explanations. Control experiment (N=68) confirms main result."
  S6_reproducibility: "Full experimental protocol available. Instructions in Online Appendix. z-Tree implementation. University of Zurich ORSEE recruitment. All parameterizations documented in Table 1."

