abstract: |
  This chapter from Design Rules, Volume 2 introduces two building blocks to the theory of how technology shapes organizations: business ecosystems and economic complementarity. Ecosystems are groups of autonomous firms whose actions create joint value, defined by complementarities among members. The chapter develops the theory of centripetal forces (pulling firms together via complementarities) and centrifugal forces (pushing them apart via transaction costs and autonomy). Using supermodular theory from Milgrom, Roberts, and Topkis, it identifies necessary mathematical conditions for an ecosystem to survive as a dynamic equilibrium — requiring a balance of centripetal and centrifugal forces so the system neither collapses into large firms nor dissipates into unrelated firms. The chapter also introduces the concept of bottleneck components that can claim disproportionate surplus.

research_question: "How do complementarities define and shape business ecosystems, and what mathematical conditions must hold for an ecosystem to survive as a dynamic equilibrium in the larger economy?"

