key_findings_structured:
  - finding: "Ecosystems are defined by supermodular complementarities among members — the value created acting together exceeds value created separately; this provides the mathematical foundation for ecosystem boundaries"
    domain: organizational_economics
    effect_size: null
  - finding: "Ecosystem survival requires balance between centripetal forces (complementarities pulling firms together) and centrifugal forces (transaction costs, modularity pushing them apart) — imbalance leads to collapse or dissipation"
    domain: organizational_economics
    effect_size: null
  - finding: "Bottleneck components in ecosystems can claim disproportionate surplus because other components depend on them — creating power asymmetries within complementary systems"
    domain: organizational_economics
    effect_size: null
  - finding: "Supermodular complementarity (Milgrom-Roberts-Topkis framework) provides necessary conditions for ecosystem dynamic equilibrium — the value function must be non-decreasing in all input variables"
    domain: organizational_economics
    effect_size: null
  - finding: "Modularization creates thin crossing points in task networks with low transaction costs, enabling ecosystem formation as specialist firms replace vertically integrated incumbents (e.g., computer industry vertical-to-horizontal transition)"
    domain: organizational_economics
    effect_size: null

