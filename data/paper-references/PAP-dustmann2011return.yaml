abstract: We present a model that explains migrations as decisions that respond to where human capital can be acquired more
  efficiently, and where the return to human capital is highest. The basic framework is a dynamic Roy model in which a worker
  possesses two distinct skills that can be augmented by learning by doing, with different implicit prices and rates of skill
  accumulation in different countries. Return migration can lead to a mitigation of the brain drain, or even the creation
  of a brain gain, where those who return bring augmented local skills to the home country.
