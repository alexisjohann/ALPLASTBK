abstract: This foundational work argues that we can know more than we can tell, establishing
  that tacit knowledge - tradition, inherited practices, implied values, and prejudgments
  - is a crucial part of scientific knowledge. Polanyi uses examples like face recognition
  (we can recognize faces among millions but cannot articulate how) to show that much
  human knowledge cannot be verbalized. This tacit knowledge can be defined as know-how
  distinguishing from know-that or facts. The paradox identified has deep implications
  for AI since our tacit knowledge of how the world works often exceeds explicit understanding.
