abstract: 'Of the 17 Sustainable Development Goals articulated by the United Nations, number one is the elimination of extreme
  poverty by 2030. While future economic growth should continue to reduce poverty, it will not solve the problem by itself;
  thus, there is a potentially important role for national-level transfer programs that assist poor families in developing
  countries. Such programs are often run by developing country governments. Many countries have implemented transfer programs
  that seek to target beneficiaries: that is, to identify who is poor and then to restrict transfers to those individuals.
  Some people have begun to advocate for “universal basic income” programs, which dispense with trying to identify the poor
  and instead provide transfers to everyone. We begin by considering the universal basic income as part of the solution to
  an optimal income-taxation problem, focusing on the case of developing countries, where there is limited income data and
  inclusion in the formal tax system is low. We examine how the targeting of transfer programs is conducted in these settings,
  and provide empirical evidence on the tradeoffs involved between universal basic income and targeted transfer schemes using
  data from Indonesia and Peru—two countries that run nationwide transfer programs that are targeted to the poor. We conclude
  by linking our findings back to the broader policy debate on what tools should be preferred for redistribution, as well
  as the practical challenges of administering them in developing countries.'
