abstract: This article describes the early phases of the development of the market for indexed government debt in the United
  States. The first such bonds were issued in 1997--one set with a maturity of ten years, the other with a maturity of five
  years. In the wake of the Treasury issuance, several non-Treasury borrowers have issued indexed debt and several new index-linked
  products for retail customers have been introduced. As expected, the new indexed notes have 'outperformed' conventional
  nominal notes in the secondary markets for Treasury debt when bad news has become available about inflation and conversely.
