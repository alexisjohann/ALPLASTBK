abstract: This is a paperback edition of a major contribution to the field, first published in hard covers in 1977. The book
  outlines a general theory of rational behaviour consisting of individual decision theory, ethics, and game theory as its
  main branches. Decision theory deals with a rational pursuit of individual utility; ethics with a rational pursuit of the
  common interests of society; and game theory with an interaction of two or more rational individuals, each pursuing his
  own interests in a rational manner.
