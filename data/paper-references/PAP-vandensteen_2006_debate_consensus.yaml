abstract: This paper shows why members of an organization often share similar beliefs.
  I argue that there are two mechanisms. First, when performance depends on making
  correct decisions, people prefer to work with others who share their beliefs and
  assumptions, since such others 'will do the right thing'. Second, beliefs will converge
  over time through shared learning. &#13;\n&#13;\nWhile such homogeneity reduces
  agency problems, it does so at a cost. I show that, from an outsider's perspective,
  firms invest on average too much in homogeneity. The theory further predicts that
  homogeneity will be strongest in successful and older firms where employees make
  important decisions. Within a firm, homogeneity will be stronger among more important
  employees. Homogeneity will also be path-dependent, making managers more selective
  on early hires. &#13;\n&#13;\nSince shared beliefs are an important aspect of corporate
  culture (Schein 1985, Kotter and Heskett 1992), I finally show that the model matches
  some observations on corporate culture, such as the influence of a manager on her
  firm's culture and the persistence of culture in the face of turnover. A fundamental
  difference from earlier economic theories of corporate culture is that I show that
  culture, instead of being created for its own good, can be a side-effect of other
  purposeful actions. As a consequence, there can be too much culture in firms.
