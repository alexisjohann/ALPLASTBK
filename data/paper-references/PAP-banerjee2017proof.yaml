abstract: The promise of randomized controlled trials is that evidence gathered through the evaluation of a specific program
  helps us—possibly after several rounds of fine-tuning and multiple replications in different contexts—to inform policy.
  However, critics have pointed out that a potential constraint in this agenda is that results from small “proof-of-concept”
  studies run by nongovernment organizations may not apply to policies that can be implemented by governments on a large scale.
  After discussing the potential issues, this paper describes the journey from the original concept to the design and evaluation
  of scalable policy. We do so by evaluating a series of strategies that aim to integrate the nongovernment organization Pratham’s
  “Teaching at the Right Level” methodology into elementary schools in India. The methodology consists of reorganizing instruction
  based on children’s actual learning levels, rather than on a prescribed syllabus, and has previously been shown to be very
  effective when properly implemented. We present evidence from randomized controlled trials involving some designs that failed
  to produce impacts within the regular schooling system but still helped shape subsequent versions of the program. As a result
  of this process, two versions of the programs were developed that successfully raised children’s learning levels using scalable
  models in government schools. We use this example to draw general lessons about using randomized control trials to design
  scalable policies.
