summary:
  abstract_extended: 'This landmark cross-cultural study documents antisocial punishment—the
    sanctioning of prosocial contributors—across 16 participant pools in 15 countries.
    The research demonstrates enormous cross-societal variation: in some pools (Athens,
    Muscat, Samara) high contributors were punished nearly as much as free riders,
    while in others (Copenhagen, Boston, Zurich) antisocial punishment was minimal.
    Critically, the study shows that weak norms of civic cooperation and weak rule
    of law predict antisocial punishment, explaining 65% of cross-societal variance.
    The key implication is that punishment opportunities are socially beneficial only
    when complemented by strong cooperative norms—a finding that challenges universal
    models of altruistic punishment.'
  key_findings: "1. ANTISOCIAL PUNISHMENT EXISTS: Documented in all 16 participant\
    \ pools but\n   varies enormously across societies\n\n2. COOPERATION UNDERMINED:\
    \ High antisocial punishment removes or reverses the\n   cooperation-enhancing\
    \ effect of punishment\n\n3. SOCIETAL PREDICTORS: Weak norms of civic cooperation\
    \ (NCC) and weak rule\n   of law (ROL) predict antisocial punishment (r = -0.75,\
    \ -0.70)\n\n4. 65% VARIANCE EXPLAINED: NCC + ROL jointly explain cross-societal\n\
    \   variation in antisocial punishment\n\n5. RETALIATION MOTIVE: Being punished\
    \ increases subsequent antisocial\n   punishment (revenge hypothesis supported)\n\
    \n6. INSTITUTIONS MATTER: Punishment opportunities are beneficial only with\n\
    \   strong social norms of cooperation"
