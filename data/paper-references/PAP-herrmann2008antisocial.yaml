abstract: |
  This paper documents the widespread existence of antisocial punishment — the sanctioning of people who behave prosocially — using public goods experiments conducted in 16 comparable participant pools around the world. The cross-societal variation is enormous: some pools punished high contributors as harshly as low contributors, while others punished only free riders. In some pools, antisocial punishment was strong enough to completely eliminate the cooperation-enhancing effect of punishment opportunities. Weak norms of civic cooperation and weak rule of law are significant predictors of antisocial punishment, demonstrating that punishment opportunities are socially beneficial only when complemented by strong social norms of cooperation.

research_question: "Does antisocial punishment (punishment of prosocial cooperators) exist across societies, how large is cross-societal variation, and what macro-societal factors predict its prevalence?"

