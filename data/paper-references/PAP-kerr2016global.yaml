abstract: Highly skilled workers play a central and starring role in today's knowledge economy. Talented individuals make
  exceptional direct contributions—including breakthrough innovations and scientific discoveries—and coordinate and guide
  the actions of many others, propelling the knowledge frontier and spurring economic growth. In this process, the mobility
  of skilled workers becomes critical to enhancing productivity. Substantial attention has been paid to understanding the
  worldwide distribution of talent and how global migration flows further tilt the deck. Using newly available data, we first
  review the landscape of global talent mobility. We next consider the determinants of global talent flows at the individual
  and firm levels and sketch some important implications. Third, we review the national gatekeepers for skilled migration
  and broad differences in approaches used to select migrants for admission. Looking forward, the capacity of people, firms,
  and countries to successfully navigate this tangled web of global talent will be critical to their success.
