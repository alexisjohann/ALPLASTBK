abstract: Health insurance and other in-kind forms of compensation and government benefits are typically not included in measures
  of income and analyses of inequality. This omission is important. Given the large and growing cost of health care in the
  United States and the presence of large government health insurance programs such as Medicaid and Medicare, it is crucial
  to understand how health insurance and related public policies contribute to measured economic well-being and inequality.
  Our paper assesses the effect on inequality of the primary government programs that affect health insurance.
