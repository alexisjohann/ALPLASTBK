abstract: The equity premium is the difference in returns between equities and fixed income securities, such as Treasury bills.
  The puzzle refers to the fact that the premium has historically been very large--about 6 percent per year--too large to
  be easily explained by risk aversion. The authors document the evidence for the puzzle and find that is exists in many countries,
  over long time periods, and does not seem to be explained by survivorship bias. They also summarize several theoretical
  explanations. The authors conclude that it is difficult to explain the equity premium without incorporating some kind of
  irrationality.
