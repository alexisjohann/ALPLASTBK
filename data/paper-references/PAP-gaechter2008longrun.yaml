abstract: Experiments have shown that punishment enhances socially beneficial cooperation but that the costs of punishment
  outweigh the gains from cooperation. This challenges evolutionary models of altruistic cooperation and punishment, which
  predict that punishment will be beneficial. We compared 10- and 50-period cooperation experiments. With the longer time
  horizon, punishment is unambiguously beneficial.
