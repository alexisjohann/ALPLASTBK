abstract: 'Early modern Europe in the late seventeenth and early eighteenth centuries witnessed an unprecedented increase
  in the rate of economic growth, and governments entertained a wide range of proposals aimed at developing and harnessing
  foreign trade and emerging financial markets. In his magisterial survey of foreign trade doctrine titled Studies in the
  Theory of International Trade (1936), Jacob Viner pointed out that enlightened authors of that time were often nonbullionist
  mercantilists: they favored export promotion and import reduction not on the grounds that it would lead to an accumulation
  of gold, but on the grounds that it would increase trade and employment. My focus here is on how some key economists of
  this time period—William Petty, John Law, and Richard Cantillon—adumbrated disputes between supply-side and demand-side
  macroeconomics that have continued to the present day.'
