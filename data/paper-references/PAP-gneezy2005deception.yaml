title: 'Deception: The Role of Consequences'
author: Gneezy
year: '2005'
publication_type: journal_article
doi: 10.1257/0002828053828662
abstract: Deception is part of many economic interactions. Business people, politicians, diplomats, lawyers, and students
  in experimental laboratories who make use of private information do not always do so honestly. This paper studies deception
  in a sender-receiver game where the sender can deceive the receiver about the state of the world. The willingness of subjects
  to lie is shown to be a matter of weighing costs and benefits. Subjects deceive others more often the higher the possible
  gains from deception and the lower the loss for the deceived. The results demonstrate that lying is costly for individuals
  from an emotional/psychological perspective, challenging both the Kantian moral approach against all deception and the homo
  economicus assumption of purely self-interested behavior.
