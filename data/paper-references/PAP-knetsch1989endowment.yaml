abstract: 'Indifference curves are normally taken to indicate corresponding tradeoffs of goods A for B or B for A over the
  same interval:" the rate of commodity substitution at a point on an indifference curve is the same for movements in either
  direction"(James Henderson and Richard Quandt, 1971, p. 12). However, recent empirical findings of asymmetric evaluations
  of gains and losses imply that the presumed reversibility may not accurately reflect preferences, and that people commonly
  make choices that differ depending on the direction of proposed trades.

  The evidence from a wide variety of tests is consistent with the suggestions of Daniel Kahneman and Amos Tversky (1979),
  and Richard Thaler (1980), that losses from a reference position are systematically valued far more than commensurate gains.
  The minimum compensation people demand to give up a good has been found to be several times larger than the maximum amount
  they are willing to pay for a commensurate entitlement. For example, when questioned about the possible destruction of a
  duck habitat, hunters responded that they would be willing to pay an average of $247 to prevent its loss but would demand
  $1044 to accept it (Judd Hammack and Gardner Brown, 1974). Respondents in another study demanded payments to accept various
  levels of visibility degradation that were from 5 to over 16 times higher than their valuations based on payment measures
