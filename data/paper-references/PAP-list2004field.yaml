abstract: Experimental economists are leaving the reservation by recruiting subjects in the field rather than in the classroom,
  using field goods rather than induced valuations, and using field context rather than abstract terminology in instructions.
  There is something methodologically fundamental behind this trend. Field experiments differ from laboratory experiments
  in many ways. Although it is tempting to view field experiments as simply less controlled variants of laboratory experiments,
  to do so would seriously mischaracterize them. What passes for control in laboratory experiments might in fact be precisely
  the opposite if it is artificial to the subject or context of the task. Field experiments serve as a useful bridge between
  data generated in the lab and empirical studies using naturally-occurring data.
