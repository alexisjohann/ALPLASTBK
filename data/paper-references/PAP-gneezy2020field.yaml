abstract: Two leading behavioural economists explore how incentives can be used to change the ways people act. Based on groundbreaking
  original research, The Why Axis is a colourful examination of why people do what they do - and how effective incentives
  can spur people to change their behaviour and achieve more. Uri Gneezy and John List are a little like the anthropologists
  who spend months in the field studying people in their native environments. But rather than acting as impartial observers,
  these two intrepid economists have set out to study the ways people act in order to try to solve major problems in society,
  such as the gap between rich and poor students and the violence plaguing inner city schools; the real reasons people discriminate;
  and the continuing pay disparity between men and women. Their field experiments in the factories, communities, and shops
  where real people live, work, and play show how incentives can change outcomes. Their results will change the way you think
  about and take action on both small and large problems, and force us as a society to stop making assumptions and to rely
  instead upon the evidence of what really works.
