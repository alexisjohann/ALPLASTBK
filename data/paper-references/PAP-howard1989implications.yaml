abstract: In 1988, the United States recorded a deficit of about $135 billion on the current account of its balance of payments
  with the rest of the world. This paper presents an analytical framework for thinking about the current account deficit,
  explores causes of the current account deficit, and discusses the United States as a debtor nation and the issue of sustainability.
