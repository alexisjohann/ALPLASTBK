abstract: As the gender gap in pay between women and men has been narrowing, the 'family gap' in pay between mothers and nonmothers
  has been widening. One reason may be the institutional structure in the United States, which has emphasized equal pay and
  opportunity policies but not family policies, in contrast to other countries that have implemented both. The authors now
  have evidence on the links between one such family policy and women's pay. Recent research suggests that maternity leave
  coverage, by raising women's retention after childbirth, also raises women's levels of work experience, job tenure, and
  pay.
