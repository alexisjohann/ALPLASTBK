abstract: 'In this article, we describe teachers'' views of the behavioral responses the No Child Left Behind legislation
  has elicited and the extent to which research reveals evidence of these responses and their effects on the distribution
  of student achievement. We focus on teachers'' reactions to three aspects of NCLB that are particularly relevant to them:
  1) the testing requirements and the rules determining “Adequate Yearly Progress” (AYP) under NCLB; 2) the sanctions imposed
  on schools that fail to meet AYP; and 3) the requirement that all teachers of core academic subjects be “highly qualified”
  in their areas of teaching assignment. Overall, we find that teachers overwhelmingly support the principles underlying the
  No Child Left Behind legislation, including that schools should be held accountable for educating all children well. However,
  teachers are concerned that the incentives created by some provisions of the law have elicited unintended responses that
  reduce the quality of education provided to at least some children.'
