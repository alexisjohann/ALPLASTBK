abstract: Abstract Combination therapies exploit the chances for better efficacy,
  decreased toxicity, and reduced development of drug resistance and owing to these
  advantages, have become a standard for the treatment of several diseases and continue
  to represent a promising approach in indications of unmet medical need. In this
  context, studying the effects of a combination of drugs in order to provide evidence
  of a significant superiority compared to the single agents is of particular interest.
  Research in this field has resulted in a large number of papers and revealed several
  issues. Here, we propose an overview of the current methodological landscape concerning
  the study of combination effects. First, we aim to provide the minimal set of mathematical
  and pharmacological concepts necessary to understand the most commonly used approaches,
  divided into effect‐based approaches and dose–effect‐based approaches, and introduced
  in light of their respective practical advantages and limitations. Then, we discuss
  six main common methodological issues that scientists have to face at each step
  of the development of new combination therapies. In particular, in the absence of
  a reference methodology suitable for all biomedical situations, the analysis of
  drug combinations should benefit from a collective, appropriate, and rigorous application
  of the concepts and methods reviewed here.
