abstract: This paper studies the major institutional changes at the root of the increase in the west European unemployment
  trade in the last quarter century from below 3 percent to 11 percent. The institutional characteristics of wage bargaining
  and the legal rules hamper the self-equilibrating function of the labor market. The reservation wage, raised by the welfare
  state's rise, has affected the bargaining process, the wage level and the wage structure. Econometric evidence is presented.
  Since the mid-1980s, differences emerge, and the Scandinavian, the French-Mediterranean, the German, and the British-Dutch
  approach to the labor market can be distinguished.
