abstract: For exiting products, statistical agencies often impute inflation from surviving products. This understates growth
  if creatively-destroyed products improve more than surviving ones. If so, then the market share of surviving products should
  systematically shrink. Using entering and exiting establishments to proxy for creative destruction, we estimate missing
  growth in US Census data on non-farm businesses from 1983 to 2013. We find missing growth (i) equaled about one-half a percentage
  point per year; (ii) arose mostly from hotels and restaurants rather than manufacturing; and (iii) did not accelerate much
  after 2005, and therefore does not explain the sharp slowdown in growth since then. (JEL E23, E31, L14, L15, O30, O41)
