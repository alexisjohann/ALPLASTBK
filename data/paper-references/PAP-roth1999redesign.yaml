abstract: We report on the design of the new clearinghouse adopted by the National Resident Matching Program, which annually
  fills approximately 20,000 jobs for new physicians. Because the market has complementarities between applicants and between
  positions, the theory of simple matching markets does not apply directly. However, computational experiments show the theory
  provides good approximations. Furthermore, the set of stable matchings, and the opportunities for strategic manipulation,
  are surprisingly small. A new kind of “core convergence” result explains this; that each applicant interviews only a small
  fraction of available positions is important. We also describe engineering aspects of the design process. (JEL C78, B41,
  J44)
