abstract: This landmark work in sociology introduces foundational concepts including manifest and latent functions, middle-range
  theory, self-fulfilling prophecy, reference groups, and anomie theory. The book examines the interplay between sociological
  theory and empirical research across four major parts - theoretical sociology (history, middle-range theories, manifest/latent
  functions), studies in social and cultural structure (anomie, bureaucratic structure, reference group behavior), sociology
  of knowledge and mass communications, and studies in the sociology of science. Listed as the third most important sociological
  book of the 20th century by the International Sociological Association.
