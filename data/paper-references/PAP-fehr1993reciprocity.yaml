summary:
  abstract_extended: 'This paper experimentally investigates whether fairness concerns prevent

    markets from clearing. We examine how fairness norms and reciprocity

    influence market outcomes, particularly in labor markets where workers

    may reject "unfair" wages even at the cost of unemployment.'
  key_findings: "1. FAIRNESS AND MARKET CLEARING\n   - Fairness concerns cause market inefficiencies\n   - Workers reject\
    \ unfair offers despite unemployment\n   - Wages remain above market-clearing levels\n\n2. RECIPROCITY IN MARKETS\n  \
    \ - Positive reciprocity rewards fair treatment\n   - Negative reciprocity punishes unfair offers\n   - Bilateral interactions\
    \ shape outcomes\n\n3. IMPLICATIONS FOR LABOR ECONOMICS\n   - Explains involuntary unemployment\n   - Fairness constraints\
    \ on wage setting\n   - Efficiency wage interpretation"
  ebf_relevance: '10C DIMENSIONS:

    - WHAT (C): Fairness preferences in market context

    - WHEN (V): Labor market context

    - HOW (B): Reciprocity-wage feedback


    THEORY SUPPORT:

    - MS-SP-001: Social Preferences

    - MS-SR-001: Strong Reciprocity

    - QJE experimental economics


    KEY INSIGHT:

    Fairness concerns and reciprocity prevent markets from clearing; workers

    reject unfair wages even at the cost of unemployment, supporting efficiency

    wage theories.'
