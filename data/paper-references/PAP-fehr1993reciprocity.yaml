abstract: 'This paper reports results from competitive experimental markets in which buyers can reward sellers who provide
  more than the required minimum quality. We find that reciprocal fairness considerations significantly impact market outcomes:
  many sellers voluntarily provide quality above the minimum, and buyers reciprocate by paying prices above market-clearing
  levels. These fairness norms prevent the market from clearing, demonstrating that social preferences can override pure self-interest
  in competitive settings.'
