abstract: This paper studies the supply of and demand for moral values in recent US presidential elections. Using a combination
  of large-scale survey data and text analyses, I find support for the hypothesis that both voters and politicians exhibit
  heterogeneity in their emphasis on universalist relative to communal moral values and that politicians’ vote shares partly
  reflect the extent to which their moral appeal matches the values of the electorate. Over the last decade, Americans’ values
  have become increasingly communal—especially in rural areas—which generated increased moral polarization and is associated
  with changes in voting patterns across space.
