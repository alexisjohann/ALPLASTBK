abstract: Despite a long tradition of effectiveness in laboratory tests, normative messages have had mixed success in changing
  behavior in field contexts, with some studies showing boomerang effects. To test a theoretical account of this inconsistency,
  we conducted a field experiment in which normative messages were used to promote household energy conservation. As predicted,
  a descriptive normative message detailing average neighborhood usage produced either desirable energy savings or the undesirable
  boomerang effect, depending on whether households were already consuming at a low or high rate. Also as predicted, adding
  an injunctive message (conveying social approval or disapproval) eliminated the boomerang effect. The results offer an explanation
  for the mixed success of persuasive appeals based on social norms and suggest how such appeals should be properly crafted.
