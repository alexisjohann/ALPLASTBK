abstract: In this paper we set out some methods that utilize the longitudinal structure of earnings of trainees and a comparison
  group to estimate the effectiveness of training for the 1976 cohort of CETA trainees. By fitting a components-of-variance
  model of earnings to the control group, and posing a simple model of program participation, we are able to predict the entire
  earnings histories of the trainees. The fit of these predictions to the pre-training earnings of the CETA participants provides
  a test of the model of earnings generation and program …
