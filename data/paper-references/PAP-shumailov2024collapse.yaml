summary:
  abstract: 'We find that use of model-generated content in training causes irreversible
    defects in the resulting models, in which tails of the original content distribution
    disappear. We refer to this effect as model collapse. Over time, models trained
    on recursively generated data progressively lose information about the true data
    distribution, with tails disappearing by approximately generation 9. This is demonstrated
    across multiple model architectures including language models and variational
    autoencoders.

    '
