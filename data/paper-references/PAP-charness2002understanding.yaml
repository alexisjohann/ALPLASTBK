summary:
  abstract_extended: 'Departures from self-interest in economic experiments have recently inspired

    models of "social preferences." The authors design a range of simple

    experimental games that test these theories more directly than existing

    experiments.


    The experiments show that subjects are more concerned with increasing social

    welfare—sacrificing to increase the payoffs for all recipients, especially

    low-payoff recipients—than with reducing differences in payoffs (as supposed

    in recent models like Fehr-Schmidt and Bolton-Ockenfels).


    Subjects are also motivated by reciprocity: They withdraw willingness to

    sacrifice to achieve a fair outcome when others are themselves unwilling to

    sacrifice, and sometimes punish unfair behavior.'
  key_findings: "1. SOCIAL WELFARE: People care about total welfare, not just equality\n\n2. MAXIMIN PREFERENCES: Special\
    \ concern for worst-off recipients\n\n3. RECIPROCITY: Willingness to sacrifice depends on others' behavior\n\n4. CONDITIONAL\
    \ COOPERATION: Withdraw help when others don't cooperate\n\n5. PUNISHMENT: Willing to punish unfair behavior at personal\
    \ cost\n\n6. BEYOND INEQUALITY AVERSION: Results challenge Fehr-Schmidt, Bolton-Ockenfels\n   focus on inequality alone"
