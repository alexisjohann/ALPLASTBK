abstract: This paper, written by the members of the American Economic Association (AEA) Ad Hoc Committee on the Job Market,
  provides an overview of the market for new Ph.D. economists. It describes the role of the AEA in the market and focuses
  in particular on two mechanisms adopted in recent years at the suggestion of our Committee. First, job market applicants
  now have a signaling service to send an expression of special interest to up to two employers prior to interviews at the
  January Allied Social Science Associations (ASSA) meetings. Second, the AEA now invites candidates who are still on the
  market, and employers whose positions are still vacant, to participate in a web-based “scramble” to reduce search costs
  and thicken the late part of the job market. We present statistics on the activity in these market mechanisms and present
  survey evidence that both mechanisms have facilitated matches. The paper concludes by discussing the emergence of platforms
  for transmitting job market information and other design issues that may arise in the market for new economists.
