abstract: This paper examines Marshall Sahlins's 'Original Affluent Society' in relation
  to recent developments in modern hunter-gatherer studies and reveals a theoretical
  confusion of ecological and cultural perspectives within it which has hitherto been
  overlooked. Drawing comparatively on three case studies—the Nayaka of South India,
  the Batek of Malaysia, and the Mbuti of Zaire—it then reformulates Sahlins's argument
  using a culturalist approach. The paper presents a 'cosmic economy of sharing' which
  it considers the basis of foraging societies. This theory implies that hunter-gatherers
  have full trust in nature, believing that nature will always be generous towards
  them and provide for their needs. Trust in nature underpins hunter-gatherers' economic
  actions, reflecting cultural interpretations rather than mere ecological conditions.
