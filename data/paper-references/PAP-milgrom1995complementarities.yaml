title: 'Complementarities and Fit: Strategy, Structure, and Organizational Change in Manufacturing'
year: '1995'
publication_type: journal_article
abstract: The theories of supermodular optimization and games provide a framework for the analysis of systems marked by complementarity.
  We summarize the principal results of these theories and indicate their usefulness by applying them to study the shift to
  ‘modern manufacturing’. We also use them to analyze the characteristic features of the Lincoln Electric Company's strategy
  and structure.
