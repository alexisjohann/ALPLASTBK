abstract: In social experiments, individuals, households, or organizations are randomly assigned to two or more policy interventions.
  Elsewhere, we have summarized 143 experiments completed by autumn 1996. Here, we use the information we have gathered on
  these experiments and findings from informal telephone interviews to investigate the social experiment market--the buyers
  and sellers in the market that governs the production of experiments. We discuss target populations, types of interventions
  tested, trends in design, funding sources, industry concentration, the role of economists in social experimentation, the
  reasons few social experiments have been conducted outside the United States, and the future of the social experiment market.
