abstract: What do recent advances in economic geography teach us about the spatial distribution of economic activity? We show
  that the equilibrium distribution of economic activity can be determined simply by the intersection of labor supply and
  demand curves. We discuss how to estimate these curves and highlight the importance of global geography—the connections
  between locations through the trading network—in determining how various policy relevant changes to geography shape the
  spatial economy.
