abstract: This paper discusses the Washington Consensus, its origins, and its insights in terms of subsequent development
  experience in a broad range of countries. I continue to find that when properly interpreted as a guide to the formulation
  of country-specific development strategies, the Washington Consensus has withstood the test of time quite well. In my view,
  subsequent experience, especially in Asia, reveals a number of places where a shift in emphasis would be warranted. Finally,
  I try to identify some misuses of the Washington Consensus and suggest that it was vulnerable to misuse due to the absence
  of an accompanying and explicit development model.
