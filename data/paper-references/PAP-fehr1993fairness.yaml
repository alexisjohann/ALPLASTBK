summary:
  abstract_extended: 'This paper provides experimental evidence that fairness considerations prevent

    labor markets from clearing. In competitive experimental markets, we observe

    that firms offer wages substantially above market-clearing levels and workers

    reciprocate with higher effort. This behavior is consistent with gift exchange

    and efficiency wage theory.'
  key_findings: "1. ABOVE-CLEARING WAGES\n   - Firms voluntarily pay premium wages\n   - Premium persists\
    \ despite competition\n   - Workers respond to perceived fairness\n\n2. EFFORT RECIPROCITY\n   - High\
    \ wages elicit high effort\n   - Low wages get minimum effort\n   - Clear gift exchange pattern\n\n\
    3. MARKET INEFFICIENCY\n   - Markets do not clear\n   - Voluntary unemployment\n   - Stable inefficient\
    \ equilibrium\n\n4. IMPLICATIONS\n   - Efficiency wages empirically supported\n   - Standard competitive\
    \ theory incomplete\n   - Fairness matters for market outcomes"
  ebf_relevance: '10C DIMENSIONS:

