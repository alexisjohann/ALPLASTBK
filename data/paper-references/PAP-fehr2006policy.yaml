summary:
  abstract_extended: 'This paper examines when behavioral policy interventions should take the form

    of nudges (changing choice architecture) versus boosts (improving decision-

    making competence). We argue that the choice between approaches depends on

    the decision context, target population, and policy goals.'
  key_findings: "1. NUDGES\n   - Change choice architecture\n   - Preserve freedom of choice\n   - Work through automatic\
    \ processes\n\n2. BOOSTS\n   - Improve competences\n   - Build skills\n   - Empower decision-makers\n\n3. WHEN TO USE\
    \ WHICH\n   - Nudge: automatic behaviors\n   - Boost: complex decisions\n   - Context determines optimum\n\n4. ETHICAL\
    \ CONSIDERATIONS\n   - Transparency important\n   - Autonomy considerations\n   - Manipulation concerns"
  ebf_relevance: '10C DIMENSIONS:

    - WHAT (C): Policy preferences

    - WHEN (V): Decision context

    - AWARE (AU): Competence vs architecture


    THEORY SUPPORT:

    - Behavioral policy design

    - Nudge vs boost debate

    - Policy-relevant synthesis


    KEY INSIGHT:

    Effective behavioral policy requires matching intervention type (nudge vs

    boost) to the decision context and policy goals.'
