abstract: This paper analyzes the effects of Denmarks Start Aid welfare reform that targets refugees. Implemented in 2002,
  it enables study of not only the reforms immediate effects but also its longer-term consequences and its repeal a decade
  later. The reform-induced large transfer cuts led to an increase in employment rates, but only in the short run. Overall,
  the reform increased poverty rates and led to a rise in subsistence crime. Moreover, local demand conditions generate substantial
  heterogeneity in the reforms effects on immediate and longer-term employment. Children exposed to the welfare cut during
  preschool and school-age obtained lower GPAs, experienced reduced well-being and overall education levels, and suffered
  lower employment and earnings as adults.
