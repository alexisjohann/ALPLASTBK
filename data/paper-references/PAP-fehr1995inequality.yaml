summary:
  abstract_extended: 'This paper argues that inequality aversion can explain much of human altruistic

    behavior observed in experiments. Building on the Fehr-Schmidt model, we show

    that aversion to disadvantageous and advantageous inequality provides a unified

    explanation for behavior in ultimatum, dictator, and public goods games.'
  key_findings: "1. INEQUALITY AVERSION\n   - Aversion to being behind (α)\n   - Aversion to being ahead (β)\n   - α > β typically\n\
    \n2. EXPLANATORY POWER\n   - Ultimatum game rejections\n   - Dictator game giving\n   - Public goods contributions\n\n\
    3. PREDICTIONS\n   - Context matters\n   - Distribution of types\n   - Strategic interactions"
  ebf_relevance: '10C DIMENSIONS:

    - WHAT (C): Inequality aversion parameters (α, β)

    - WHO (AAA): Type heterogeneity

    - HOW (B): Strategic implications


    THEORY SUPPORT:

    - MS-SP-001: Social Preferences (core)

    - Published in AER

    - Foundational theoretical paper


    KEY INSIGHT:

    Inequality aversion with α > β provides a parsimonious explanation for

    many forms of human altruism observed in experiments.'
