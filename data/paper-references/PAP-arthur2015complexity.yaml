abstract: After two centuries of studying equilibria—static patterns that call for no further behavioral adjustments—economists
  are beginning to study the general emergence of structures and the unfolding of patterns in the economy. When viewed in
  out-of-equilibrium formation, economic patterns sometimes simplify into the simple static equilibria of standard economics.
  More often they are ever changing, showing perpetually novel behavior and emergent phenomena. Complexity portrays the economy
  not as deterministic, predictable, and mechanistic, but as process dependent, organic, and always evolving.
