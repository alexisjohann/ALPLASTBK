abstract: We examine a number of situations in which people do not appear to discount money flows at the market rate of interest
  or any other single discount rate. Discount rates observed in both laboratory and field decision-making environments are
  shown to depend on the magnitude and sign of what is being discounted, on the time delay, on whether the choice is cast
  in terms of speed-up or delay, on the way in which a choice is framed, and on whether future benefits or costs induce savoring
  or dread.
