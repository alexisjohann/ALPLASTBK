abstract: In their critique of the Test of Economic Literacy (TEL), Nelson and Sheffrin draw the conclusion that the TEL is
  an ideological test. In making their case, however, they neglect to cite the TEL Examiner's Manual by John Soper and myself
  (1987). In the 67 pages of that achievement test manual are the multiple choice questions, written rationales for the correct
  answers, explanations of the test development and structure, psychometric data, item analysis, and instructions on test
  administration and use. This information is necessary for anyone making a careful assessment of the test or using it with
  high school students. A brief description of the development and major features of the TEL is also necessary for analyzing
  the critics' complaints about TEL questions. The TEL is not perfect, but the charge that the TEL is an ideological test,
  however, is an extreme one and without foundation.
