abstract: Every year, millions of young adults join the labor market in Africa. This paper harmonizes surveys and censuses
  from 68 low- and middle-income countries to compare their job prospects to those of their counterparts in other low-income
  regions. We show that employment rates are similar at similar levels of development but that young adults in Africa are
  less likely to have a salaried job, especially when the size of their cohort is large. Building on existing evidence on
  the impacts of interventions targeting both the demand and supply sides of the labor market, we discuss policy priorities
  for boosting the growth of salaried job creation in the region.
