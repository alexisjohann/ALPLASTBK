abstract: Various means of creating a private sector have been used in transition economies, including restitution, privatization
  of state firms through sales or voucher schemes, and start-ups of new private firms. The privatization of state-owned firms
  raises questions regarding the viability of future corporate governance but, in combination with economic liberalization,
  it has induced state-owned firms to react to their new environment. Differences in the extent of privatization among countries
  reflect largely differences in the privatization of state-owned firms. Qualitative differences reflect differences in who
  the new owners of these firms are.
