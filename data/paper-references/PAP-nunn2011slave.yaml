abstract: Deep origins of modern inequality Methodological innovations are enabling scientists to study how events in the
  distant past affect contemporary life. Nunn reviews recent research at the intersection of history, development, and culture
  that aims to understand the cultural evolution of economic development. The persistence of global inequality is used as
  a case study to demonstrate the interplay of these dynamics. Future areas of research and implications for policy are discussed.
  Science , this issue p. eaaz9986
