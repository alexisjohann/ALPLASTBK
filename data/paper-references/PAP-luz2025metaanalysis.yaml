abstract: Growing global migration flows highlight the importance of understanding their economic impact. While many studies
  have explored how immigration affects host countries’ macroeconomic indicators, the results are mixed. In this work, we
  develop a meta-analysis to investigate the effect of immigration on the economic performance of the host country, focusing
  on key indicators such as economic growth, productivity, unemployment, and innovation. The results indicate that, on average,
  immigration has a positive and statistically significant impact on economic performance. The effect varies based on immigrant
  and host country characteristics, including qualifications, age, and economic development level. Additionally, differences
  in methodological approaches across studies contribute to the observed heterogeneity in findings. These findings underscore
  the importance of further research on the economic effects of immigration and offer implications for both policy and future
  research.
