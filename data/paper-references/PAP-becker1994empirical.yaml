summary:
  abstract_extended: 'This paper provides an empirical analysis of cigarette addiction using the

    rational addiction framework developed by Becker and Murphy (1988). The

    authors test the key predictions of the rational addiction model using

    aggregate U.S. time-series data on cigarette consumption.


    The rational addiction model predicts that current consumption depends on

    both past consumption (habit formation) and future consumption (forward-

    looking behavior). The authors test these predictions by examining how

    cigarette consumption responds to past, current, and anticipated future

    prices.


    The empirical findings strongly support the rational addiction model:

    consumers respond to future price changes, indicating they are forward-looking

    rather than myopic in their addictive behavior.'
  key_findings: "1. FORWARD-LOOKING ADDICTS: Cigarette consumers respond to anticipated future\n   price changes, supporting\
    \ rational addiction\n\n2. ADJACENT COMPLEMENTARITY: Past consumption significantly affects current\n   consumption, confirming\
    \ habit formation\n\n3. PRICE ELASTICITY: Both short-run and long-run price elasticities are\n   significant; long-run\
    \ elasticity is larger\n\n4. NOT MYOPIC: Results reject the hypothesis that addicts are completely\n   myopic or ignore\
    \ future consequences\n\n5. ANTICIPATORY RESPONSE: Consumers begin reducing consumption before price\n   increases take\
    \ effect\n\n6. EMPIRICAL VALIDATION: Provides first large-scale empirical test of\n   Becker-Murphy rational addiction\
    \ theory"
