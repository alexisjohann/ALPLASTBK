title: The Effects of Cross-Border Commuting on Local Employment
author: Weiss
year: '2018'
publication_type: journal_article
doi: 10.1186/s41937-017-0016-3
content_level: L1
summary:
  abstract: 'This paper examines how cross-border commuting affects local employment in Swiss border regions following the
    2002 Agreement on Free Movement of Persons (AFMP). Using a difference-in-differences strategy exploiting the EU free movement
    shock, it finds that increased cross-border worker inflows did NOT decrease native employment or wages. The substitution
    effect is minimal, suggesting complementarity between cross-border and native workers.

    '
