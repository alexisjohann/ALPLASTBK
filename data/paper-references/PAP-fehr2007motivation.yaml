summary:
  abstract_extended: 'This handbook chapter examines the relationship between intrinsic motivation

    and extrinsic incentives. We review evidence that external rewards can

    crowd out intrinsic motivation, leading to lower performance or quality.

    Understanding this interaction is crucial for designing effective incentive

    systems.'
  key_findings: "1. CROWDING OUT EFFECT\n   - Extrinsic rewards reduce intrinsic motivation\n   - Hidden costs of rewards\n\
    \   - Context-dependent effect\n\n2. MECHANISMS\n   - Self-determination undermined\n   - Signals distrust\n   - Changes\
    \ self-perception\n\n3. WHEN CROWDING OCCURS\n   - Tasks with intrinsic interest\n   - Controlling incentives\n   - Signals\
    \ about ability\n\n4. DESIGN IMPLICATIONS\n   - Use incentives carefully\n   - Consider crowding effects\n   - Support\
    \ autonomy"
  ebf_relevance: '10C DIMENSIONS:

    - WHAT (C): Intrinsic vs extrinsic motivation

    - HOW (B): Motivation crowding interactions

    - WHEN (V): Context determines crowding


    THEORY SUPPORT:

    - Motivation crowding theory

    - Handbook chapter overview

    - Critical for incentive design


    KEY INSIGHT:

    Extrinsic incentives can backfire by crowding out intrinsic motivation;

    careful design is needed to preserve autonomous motivation.'
