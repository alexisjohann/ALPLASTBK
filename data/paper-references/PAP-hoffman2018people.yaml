evidence_tier: 2
evidence_justification: >
  NBER working paper (revised 2020) from Hoffman (Rotman/NBER) and Tadelis
  (Haas/NBER). Large-scale proprietary personnel data from a major US high-tech
  firm. Multiple causal identification strategies (IV, new joiners, manager moves).
  Top-tier author affiliations and NBER distribution. Not yet published in
  peer-reviewed journal but methodology and rigor meet Tier 1 standards.

key_findings_structured:
  - id: 1
    finding: >
      People management skills (MOR) strongly reduce employee attrition.
      IV estimate: 1 SD increase in MOR reduces monthly attrition by 0.475pp
      (35% reduction). Moving from 10th to 90th percentile MOR predicts ~60%
      reduction in turnover.
    evidence_type: "causal_IV"
    statistical_detail: "IV coefficient -0.475, OLS -0.156, reject equality p<0.01"
    ebf_relevance: "PAR-BEH, retention, people management ROI"

  - id: 2
    finding: >
      MOR particularly reduces 'regretted' (bad) attrition. Regretted quits
      show larger percentage reduction than non-regretted quits. IV coefficient
      for regretted quits: -0.230 (37% reduction per SD).
    evidence_type: "causal_IV"
    statistical_detail: "Regretted quit IV: -0.230; non-regretted quit IV: -0.048 (n.s.)"
    ebf_relevance: "Quality-differentiated retention, targeted intervention value"

  - id: 3
    finding: >
      MOR reduces both voluntary (quits) and involuntary (fires) attrition.
      Quit IV: -0.278pp/SD; Fire IV: -0.188pp/SD. Consistent with people
      management skill positively impacting worker motivation.
    evidence_type: "causal_IV"
    statistical_detail: "Quit IV: -0.278 (p<0.01); Fire IV: -0.188 (p<0.01)"
    ebf_relevance: "Motivation mechanism, dual-channel retention"

  - id: 4
    finding: >
      Causal identification via three designs: (1) New joiners — manager MOR
      measured before employee arrives; (2) Manager switchers with Rothstein
      (2010) test for non-random sorting — little evidence of systematic sorting;
      (3) Manager moves across locations/job functions — addresses persistent
      unobservables. All designs confirm strong causal MOR-attrition relationship.
    evidence_type: "causal_multiple_designs"
    statistical_detail: "Joiners IV: -0.550; Switchers regretted quit IV: -0.412 (p<0.05)"
    ebf_relevance: "Causal credibility, internal validity"

  - id: 5
    finding: >
      MOR does NOT consistently improve non-attrition outcomes. No significant
      IV effects on salary growth, promotion probability, or patents. Small
      positive effect on subjective performance (IV 0.09 SD, p<0.01) but not
      robust across designs. Suggests MOR reduces attrition by improving job
      satisfaction rather than making workers more productive.
    evidence_type: "null_finding"
    statistical_detail: "Performance IV: 0.090 (p<0.01); salary growth IV: 0.064 (n.s.); promotion IV: -0.020 (n.s.); patents IV: 0.011 (n.s.)"
    ebf_relevance: "Mechanism identification: satisfaction not productivity channel"

  - id: 6
    finding: >
      Better people managers ARE rewarded by the firm. Manager subjective
      performance: +0.40 SD per SD MOR. Manager promotion: +0.67pp monthly
      (3x likelihood at p90 vs p10 over time). Manager salary growth: +1.4%
      annually. Firm pays ~$0.27 in higher manager salaries per $1 benefit
      from lower turnover.
    evidence_type: "causal_IV"
    statistical_detail: "Performance IV: 0.397 (p<0.01); promotion IV: 0.673 (p<0.05); salary growth IV: 1.405 (p<0.05)"
    ebf_relevance: "Incentive alignment, manager reward system design"

  - id: 7
    finding: >
      Complementarity between manager people management skills and worker
      cognitive skills. MOR-attrition effect significantly larger for medium/high
      hierarchy workers (p=0.04 for overall attrition; p=0.02 for quits).
      Engineers have 0.22 SD lower MOR than non-engineers. Country, location,
      occupation explain only modest portion of MOR variation — 90% is
      within-country, 80% within-location.
    evidence_type: "heterogeneity_analysis"
    statistical_detail: "Hierarchy interaction p=0.04 (attrition), p=0.02 (quits)"
    ebf_relevance: "WHO-01 vs WHO-04 differential, skill complementarity"

  - id: 8
    finding: >
      MOR measured via 6 survey items with ~95% response rate. Items: clear
      expectations, coaching, career development, consultation in decisions,
      positive attitude, trust. Persistence across waves: 0.37 correlation.
      IV strategy addresses measurement error (OLS attenuated 3x). Quantitative
      impact: p90 vs p10 MOR saves ~5% of worker salaries per team member
      per year in hiring costs alone.
    evidence_type: "measurement_methodology"
    statistical_detail: "MOR persistence: 0.37; IV/OLS ratio ~3x; hiring cost savings ~0.5 annual salary per 9-person team"
    ebf_relevance: "PX-Survey design, measurement validation, cost-benefit framework"

behavioral_mapping:
  10c_dimensions:
    WHO:
      relevance: "high"
      detail: >
        Manager people management skills (MOR) as key differentiator.
        Hierarchy complementarity: higher-level workers benefit more from
        good people management. Manager selection (WHO-01) and worker
        retention (WHO-04) both affected.
    WHAT:
      relevance: "high"
      detail: >
        MOR reduces attrition through satisfaction/motivation channel
        (not productivity). Social utility dimension: trust, positive
        atmosphere, coaching create intrinsic value beyond compensation.
    HOW:
      relevance: "medium"
      detail: >
        Complementarity between manager social skills and worker cognitive
        skills. 6 MOR items represent operationalized people management
        competencies.
    AWARE:
      relevance: "medium"
      detail: >
        Survey-based upward feedback creates awareness for managers about
        their people management quality. 95% response rate ensures
        representative measurement.
    READY:
      relevance: "medium"
      detail: >
        Time path analysis: turnover benefit builds gradually over 7-12
        months. Managers and workers need time to develop relationship
        before retention effect materializes.

  theories:
    - theory_id: "MS-IB-001"
      connection: >
        Identity Economics framework. Manager-worker relationship affects
        worker identity utility. Good people management strengthens
        organizational identity attachment.
    - theory_id: "MS-SP-001"
      connection: >
        Social preferences affect manager behavior. Trust and positive
        atmosphere reflect prosocial manager orientation.

kaufland_relevance:
  overall_relevance: "very_high"
  key_implications:
    - dimension: "PX-Survey Design"
      detail: >
        Hoffman & Tadelis 6 MOR items are directly transferable to
        Kaufland PX-Survey. Items: (1) clear expectations, (2) coaching,
        (3) career development, (4) consultation in decisions, (5) positive
        attitude, (6) trust. 95% response rate benchmark. Aggregation
        method: share marking Agree or Strongly Agree.
    - dimension: "FK-Akademie ROI"
      detail: >
        Quantified attrition reduction: p10→p90 MOR = 60% turnover reduction.
        Hiring cost savings: ~5% of worker salary per team member per year.
        For typical 9-person team: ~0.5 annual salary saved. Can be used
        to justify FK-Akademie investment in people management training.
    - dimension: "Hierarchy Complementarity (WHO-01 vs WHO-04)"
      detail: >
        MOR effects significantly stronger for higher-hierarchy workers.
        For Kaufland: Filialleiter (WHO-01) benefit MORE from good people
        management by their Bezirksleitung. PX investment at WHO-01 level
        has higher marginal return than at WHO-04 level. But retention
        at WHO-04 level also improved, just less strongly.
    - dimension: "Causal Identification Template"
      detail: >
        Three identification strategies provide template for Kaufland:
        (1) Measure PX-Survey before pilot intervention to isolate effect;
        (2) Exploit Filialleiter rotation across Filialen as natural experiment;
        (3) New hires as clean identification group.
    - dimension: "Non-Attrition Null Finding"
      detail: >
        MOR does NOT improve productivity-like outcomes (salary, promotion,
        patents). For Kaufland: PX investment should be justified via
        retention and satisfaction, NOT via direct productivity claims.
        This aligns with Dur et al. (2020) channel — motivation, not skill
        transmission.
    - dimension: "Manager Reward System"
      detail: >
        Firm rewards good people managers with higher performance scores,
        promotions, salary. For Kaufland: ensure Bezirksleitung performance
        evaluation includes PX-Survey scores (INT-K-002). Managers who
        reduce turnover should be visibly rewarded.
    - dimension: "Time-to-Effect"
      detail: >
        MOR-attrition effect builds gradually over 7-12 months. FK-Akademie
        evaluation should NOT expect immediate turnover reduction. Plan
        measurement at 6-month and 12-month horizons.

  kibsm_integration:
    sections_affected:
