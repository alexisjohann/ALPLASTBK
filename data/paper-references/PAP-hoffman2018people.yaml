paper: hoffman2018people
superkey: PAP-hoffman2018people
title: "People Management Skills, Employee Attrition, and Manager Rewards: An Empirical Analysis"
author: "Hoffman, Mitchell and Tadelis, Steven"
year: "2018"
journal: "NBER Working Paper No. 24360"
volume: ""
issue: "24360"
pages: ""
doi: "10.3386/w24360"
publication_type: working_paper

abstract: >
  How much do a manager's interpersonal skills with subordinates, which we call
  people management skills, affect employee outcomes? Are managers rewarded for
  having such skills? Using personnel data from a large, high-tech firm, we show
  that survey-measured people management skills have a strong negative relation
  to employee turnover. A causal interpretation is reinforced by research designs
  exploiting new workers joining the firm and manager moves. However, people
  management skills do not consistently improve most observed non-attrition
  outcomes. Better people managers themselves receive higher subjective
  performance ratings, higher promotion rates, and larger salary increases.
