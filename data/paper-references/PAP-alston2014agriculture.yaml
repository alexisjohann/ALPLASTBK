abstract: The past 50–100 years have witnessed dramatic changes in agricultural production and productivity, driven to a great
  extent by public and private investments in agricultural research, with profound implications especially for the world's
  poor. In this article, we first discuss how the high-income countries like the United States represent a declining share
  of global agricultural output while middle-income countries like China, India, Brazil, and Indonesia represent a rising
  share. We then look at the differing patterns of agricultural inputs across countries and the divergent productivity paths
  taken by their agricultural sectors. Next we examine productivity more closely and the evidence that the global rate of
  agricultural productivity growth is declining—with potentially serious prospects for the price and availability of food
  for the poorest people in the world. Finally we consider patterns of agricultural research and development efforts.
