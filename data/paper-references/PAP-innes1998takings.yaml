abstract: Preserving endangered species on private land benefits the public, but may confer cost on landowners if property
  is 'taken.' Government compensation to landowners can offset costs, although the Endangered Species Act does not require
  compensation. The authors survey private economic incentives for species preservation created by alternative property rights
  and compensation regimes. Compensation will effect investments in land and the willingness of landowners to collect and
  impart information about their land's preservation value. The authors also address government incentives and how deadweight
  costs of compensation will influence design of property rights, and how government's susceptibility to interest group pressure
  may cause inefficient preservation.
