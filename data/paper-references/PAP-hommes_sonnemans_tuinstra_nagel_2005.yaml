abstract: We investigate expectation formation in a controlled experimental environment.
  Subjects are asked to predict the price in a standard asset pricing model. They
  do not have knowledge of the underlying market equilibrium equations, but they know
  all past realized prices and their own predictions. Aggregate demand for the risky
  asset depends upon the forecasts of the participants. The realized price is then
  obtained from market equilibrium with feedback from six individual expectations.
  Realized prices differ significantly from fundamental values and typically exhibit
  oscillations around, or slow convergence to, this fundamental. In all groups participants
  coordinate on a common prediction strategy. Copyright 2005, Oxford University Press.
