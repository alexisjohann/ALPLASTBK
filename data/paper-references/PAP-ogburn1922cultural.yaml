abstract: This foundational work introduces the concept of cultural lag - when unequal
  rates of change between material and non-material culture lead to maladjustment.
  As new technological inventions are introduced, society requires a period of adjustment.
  Ogburn argues that the source of most modern social change is material culture,
  and non-material culture struggles to adapt to new material conditions. The book
  details four factors of technical development - invention, accumulation, diffusion,
  and adjustment. A classic example is society's adaptation to automobile speed, which
  required time for road-building institutions and customs to adapt.
