abstract: Few issues in developing countries draw as much popular attention as child labor. This paper begins by quantifying
  the extent and main characteristics of child labor. It then considers the evidence on a range of issues about child labor.
  Fundamentally, child labor is a symptom of poverty. Low income and poor institutions are driving forces behind the prevalence
  of child labor worldwide. This study concludes by assessing the policy options to reduce worldwide child labor.
