abstract: This foundational work in English for Specific Purposes introduces the Create-a-Research-Space
  (CARS) model for analyzing research article introductions. The model identifies
  three moves in scholarly writing - establishing territory (demonstrating familiarity
  with existing knowledge), establishing a niche (identifying a gap or deficit), and
  occupying the niche (making an original contribution that fills the gap). The book
  examines genre as a class of communicative events with shared purposes, providing
  a framework that has become canonical for genre-based writing instruction and discourse
  analysis in academic settings.
