abstract: During the Progressive Era, eugenic approaches to social and economic reform were popular, respectable and widespread.
  This essay documents the influence of eugenic ideas upon American economic reform, especially in the areas of immigration
  and labor reform, and tries to illuminate something of its causes and consequences.
