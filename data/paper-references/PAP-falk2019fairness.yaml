abstract: Most research on justice in resource allocation has not paid attention to the various alternative ways in which
  a given ollocation principle may be formulated. This study examines the relationship among three  (or forms) of the equality
  and contribution principles, respectively. Subjects rated the fairness of a nonrecipient person's allocations to cooperating
  (teams) and competing individuals (nonteams) in the context of sport. The subrules were compared in terms of their perceived
  fairness when applied in distribution (i.e., money presented) and retribution (i.e., money withheld). The results showed
  that subjects make distinctions among the subrules, that these distinctions are more markedfor the equality than for the
  contribution rules, and that the equality subrules are more clearly differentiated in retribution than in distribution.
  These and other findings are discussed on the basis of their practical and theoretical implications.
