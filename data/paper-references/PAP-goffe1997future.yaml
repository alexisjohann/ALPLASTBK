abstract: 'This paper is a first look at how the information infrastructure for economists will change with the arrival of
  the Internet. While paper has long been used for the flow of information in the profession, computer networks are starting
  to supplement it and, in the not-to-distant future, will replace paper. The authors examine the myriad ways in which a networked
  world will benefit the profession. The most exciting is the easy access to the material that lies at the heart of their
  profession: journals, working papers, data, and teaching.'
