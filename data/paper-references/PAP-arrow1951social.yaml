abstract: 'Originally published in 1951, Social Choice and Individual Values introduced  Impossibility Theorem and founded
  the field of social choice theory in economics and political science. This new edition, including a new foreword by Nobel
  laureate Eric Maskin, reintroduces Arrow''s seminal book to a new generation of students and researchers. Far beyond a classic,
  this small book unleashed the ongoing explosion of interest in social choice and voting theory. A half-century later, the
  book remains full of profound insight: its central message, ''Arrow''s Theorem,'' has changed the way we think.-Donald G.
  Saari, author of Decisions and Elections: Explaining the Unexpected'
