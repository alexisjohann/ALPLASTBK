summary:
  abstract: >
    We present Program-Aided Language Models (PAL), a method that uses the LLM
    to read natural language problems and generate programs as intermediate
    reasoning steps, but offloads the solution step to a runtime such as a
    Python interpreter. PAL achieves state-of-the-art results on multiple
    mathematical reasoning benchmarks, with 40% absolute improvement on
    GSM-Hard compared to chain-of-thought prompting.
key_findings_structured:
- finding: Delegating computation to Python interpreter improves accuracy by 40%
    on GSM-Hard compared to chain-of-thought reasoning
