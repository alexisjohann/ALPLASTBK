abstract: 'In this essay, we evaluate the case for competition in news markets from the perspective of economics. First, we
  consider the simple proposition that when more points of view are heard and defended, beliefs will converge to the truth.
  This concept of “competition” is several steps removed from market competition among actual media firms, but it has played
  a prominent role in the legal arguments for a free press. We then explore three mechanisms by which increasing competition,
  or more precisely increasing the number of independently-owned firms, can limit bias or distortions that originate on the
  supply-side of the media market: First, when governments attempt to manipulate news, competition can increase the likelihood
  that the media remain independent. Second, when news providers have an interest in manipulating consumers'' beliefs, diversity
  in such incentives can reduce the risk of information being suppressed or distorted. Third, competition may drive firms
  to invest in providing timely and accurate coverage. Overall, we argue that there are robust reasons to expect competition
  to be effective in disciplining supply-side bias. Next, we ask how the effect of competition changes when distortions originate
  on the demand side of the market—when consumers themselves demand biased or less socially relevant news. We find that increased
  competition may or may not improve welfare in these cases, though we caution against using this as a justification for concentrating
  media power in the hands of state-controlled or regulated firms.'
