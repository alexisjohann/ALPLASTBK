title: 'Independent and Competing Agencies: An Effective Way to Control Government'
author: Eichenberger
year: '2007'
publication_type: journal_article
doi: 10.1007/s11127-006-9073-5
abstract: Controlling government is a primary focus of the politico-economic literature.
  Recently, various political institutions have been analyzed from this perspective,
  most importantly balanced budget rules, fiscal federalism, and direct democracy.
  However, one type of institution has been neglected - elected competitors to the
  government. This paper examines institutional competition between government and
  independent agencies found at the Swiss local level, where finance commissions compete
  with the government. In some parts of Switzerland, local finance commissions can
  ex ante criticize government projects and bring alternative policy proposals onto
  the political agenda, which are then voted on by citizens.
