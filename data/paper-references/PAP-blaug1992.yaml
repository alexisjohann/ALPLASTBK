abstract: This book is an examination of the nature of economic explanation and a
  revised and updated edition of a classic work on the methodology of economics. The
  opening chapters introduce current thinking in the philosophy of science and review
  the literature on methodology, covering Popper, Kuhn, Lakatos, and Feyerabend. Professor
  Blaug then turns to the troublesome question of the logical status of welfare economics,
  followed by case studies of leading economic controversies illuminated by attention
  to questions of methodology. Blaug advocates falsificationism, defined as a methodological
  standpoint that regards theories and hypotheses as scientific if and only if their
  predictions are at least in principle falsifiable. He argues that while economists
  subscribe to falsificationism, they fail consistently to practice what they preach,
  characterizing their working philosophy as 'innocuous falsificationism.'
