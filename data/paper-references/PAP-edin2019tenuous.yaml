abstract: In this essay, we explore how working-class men describe their attachments to work, family, and religion. We draw
  upon in-depth, life history interviews conducted in four metropolitan areas with racially and ethnically diverse groups
  of working-class men with a high school diploma but no four-year college degree. Between 2000 and 2013, we deployed heterogeneous
  sampling techniques in the black and white working-class neighborhoods of Boston, Massachusetts; Charleston, South Carolina;
  Chicago, Illinois; and the Philadelphia/Camden area of Pennsylvania and New Jersey. We screened to ensure that each respondent
  had at least one minor child, making sure to include a subset potentially subject to a child support order (because they
  were not married to, or living with, their child's mother). We interviewed roughly even numbers of black and white men in
  each site for a total of 107 respondents. Our approach allows us to explore complex questions in a rich and granular way
  that allows unanticipated results to emerge. These working-class men showed both a detachment from institutions and an engagement
  with more autonomous forms of work, childrearing, and spirituality, often with an emphasis on generativity, by which we
  mean a desire to guide and nurture the next generation. We also discuss the extent to which this autonomous and generative
  self is also a haphazard self, which may be aligned with counterproductive behaviors. And we look at racial and ethnic difference
  in perceptions of social standing.
