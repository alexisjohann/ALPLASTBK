abstract: As concern about workers’ skills has risen, so has interest in the role that government training programs might
  play in addressing ‘America's workforce crisis.’ One way to gauge whether increased reliance on these programs will substantially
  improve the skills of the workforce is to examine the impact of past programs. The evidence from these programs indicates
  that, although the gains were small, for the most part we got what we paid for. This outcome should not be surprising because
  investments in training were exceedingly modest compared to the skill deficiencies that policymakers have been trying to
  address.
