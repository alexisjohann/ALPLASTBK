abstract: '&amp;lt;p class="MsoNormal" style="text-align: justify; margin: 0cm 0cm 0pt; mso-line-height-alt: 1.1pt;"&amp;gt;&amp;lt;span
  style="font-family: &amp;amp;quot;Palatino Linotype&amp;amp;quot;,&amp;amp;quot;serif&amp;amp;quot;; font-size: 10pt;" lang="EN-GB"&amp;gt;Many
  experts now recognize that income is not a measure that alone captures the wellbeing of individuals, and governments around
  the world are starting to rethink the ways in which they measure the welfare of their citizens. Wellbeing is best understood
  as a multifaceted phenomenon that can be assessed by measuring a wide array of subjective and objective constructs. This
  review summarizes the state of research on the various domains of wellbeing measured by psychologists and social scientists,
  and provides an overview of the main theoretical perspectives that integrate these domains. Among these theoretical perspectives,
  we highlight Well-being Theory, which decomposes the wellbeing construct into five domains: Positive emotion, Engagement,
  Relationships, Meaning, and Accomplishment (PERMA). We conclude by formulating recommendations for future research on the
  measurement of wellbeing. These recommendations include the need to combine both objective and subjective indicators, and
  the use of a &amp;lt;em style="mso-bidi-font-style: normal;"&amp;gt;dashboard approach&amp;lt;/em&amp;gt; to measurement.
  This approach conveys the multifaceted nature of wellbeing and will help policy-makers and citizens understand which domains
  of wellbeing should constitute priorities for public policy. &amp;lt;/span&amp;gt;&amp;lt;/p&amp;gt;'
