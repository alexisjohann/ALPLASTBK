summary:
  abstract_extended: 'This paper examines support for progressive taxation and income redistribution

    through the lens of social preferences. We show that inequality aversion and

    fairness concerns help explain why people support redistributive policies

    even when they might not directly benefit.'
  key_findings: "1. FAIRNESS AND TAXATION\n   - Inequality aversion predicts support\n   - Beyond self-interest\n   - Perceived\
    \ fairness matters\n\n2. REDISTRIBUTION PREFERENCES\n   - Not purely self-interested\n   - Social preferences play role\n\
    \   - Heterogeneity in views\n\n3. POLICY IMPLICATIONS\n   - Design for fairness\n   - Legitimacy matters\n   - Communication\
    \ important"
  ebf_relevance: '10C DIMENSIONS:

    - WHAT (C): Redistribution preferences

    - WHEN (V): Policy context

    - WHO (AAA): Heterogeneity in support


    THEORY SUPPORT:

    - MS-SP-001: Social Preferences

    - Public economics application

    - Published in JPubE


    KEY INSIGHT:

    Support for progressive taxation reflects inequality aversion and fairness

    concerns, not just self-interest; policy design should account for this.'
