abstract: The question of what constitutes good economic theory is analyzed. Current good and bad aspects of its methodologies
  are discussed. Interdisciplinary work that goes beyond the social sciences is advocated. The future predictions are presented
  concerning research in game theory and the economics of information. Finally, the importance of technology and the need
  for microeconomists to understand it better are argued.
