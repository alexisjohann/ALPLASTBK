abstract: How will worldwide changes in population affect pressures for international migration in the future? We examine
  the past three decades, during which population pressures contributed to substantial labor flows from neighboring countries
  into the United States and Europe, and contrast them with the coming three decades, which will see sharp reductions in labor-supply
  growth in Latin America but not in Africa or much of the Middle East. Using a gravity-style empirical model, we examine
  the contribution of changes in relative labor-supply to bilateral migration in the 2000s and then apply this model to project
  future bilateral flows based on long-run UN forecasts of working-age populations in sending and receiving countries. Because
  the Americas are entering an era of uniformly low population growth, labor flows across the Rio Grande are projected to
  slow markedly. Europe, in contrast, will face substantial demographically driven migration pressures from across the Mediterranean
  for decades to come. Although these projected inflows would triple the first-generation immigrant stocks of larger European
  countries between 2010 and 2040, they would still absorb only a small fraction of the 800-million-person increase in the
  working-age population of Sub-Saharan Africa that is projected to occur over this period.
