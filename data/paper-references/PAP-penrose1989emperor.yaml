abstract: This work argues that human consciousness is non-algorithmic and cannot be modeled by conventional Turing machines
  including digital computers. Penrose hypothesizes that quantum mechanics plays an essential role in understanding human
  consciousness and that laws even deeper than quantum mechanics may be essential for mind operation. He attacks artificial
  intelligence claims using physics of computing, noting modern computers are deterministic systems executing algorithms in
  classical mechanics rather than quantum mechanics. The book argues against strong AI and speculates that modifying quantum
  mechanics may be needed to explain intelligence.
