abstract: This paper deals with the problem of estimating the probability of causation,
  that is, the probability that one event was the real cause of another, in a given
  scenario. Starting from structural‐semantical definitions of the probabilities of
  necessary or sufficient causation (or both), we show how to bound these quantities
  from data obtained in experimental and observational studies, under general assumptions
  concerning the data‐generating process. In particular, we strengthen the results
  of Pearl [39] by presenting sharp bounds based on …
