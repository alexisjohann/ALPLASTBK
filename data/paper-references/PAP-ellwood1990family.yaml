abstract: The changes in family structures of black American households over the past three decades have been remarkable.
  In 1960, 33 percent of black children were not living with two parents. By 1988, the figure had risen to 61 percent. During
  the same period, the fraction of all black children born to an unmarried mother rose from 23 percent to over 60 percent.
  This paper examines the patterns of family change, briefly discusses their economic implications, and explores what is known
  about the economic reasons for those changes.
