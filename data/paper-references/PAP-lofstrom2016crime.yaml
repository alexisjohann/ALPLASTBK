abstract: Crime rates in the United States have declined to historical lows since the early 1990s. Prison and jail incarceration
  rates as well as community correctional populations have increased greatly since the mid-1970s. Both of these developments
  have disproportionately impacted poor and minority communities. In this paper, we document these trends. We then assess
  whether the crime declines can be attributed to the massive expansion of the US criminal justice system. We argue that the
  crime rate is certainly lower as a result of this expansion and in the early 1990s was likely a third lower than what it
  would have been absent changes in sentencing practices in the 1980s. However, there is little evidence that further stiffening
  of sentences during the 1990s—a period when prison and other correctional populations expanded rapidly—have had an impact.
  Hence, the growth in criminal justice populations since 1990s has exacerbated socioeconomic inequality in the United States
  without generating much benefit in terms of lower crime rates.
