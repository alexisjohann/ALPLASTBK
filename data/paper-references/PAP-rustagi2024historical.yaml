abstract: |
  Does self-governance, a hallmark of democratic societies, foster norms of generalized
  cooperation? Does this effect persist, and if so, why? I investigate these questions
  using a natural experiment in Switzerland. In the Middle Ages, the absence of an heir
  resulted in the extinction of a prominent noble dynasty. As a result, some Swiss
  municipalities became self-governing, whereas the others remained under feudalism for
  centuries longer. Using a behavioral measure of cooperation from a common-pool resource
  game, I find that historical self-governance has a positive and significant effect on
  norms of cooperation today. I provide evidence for the intergenerational transmission
  of norms within families as a mechanism of persistence.

