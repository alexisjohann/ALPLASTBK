abstract: 'This paper argues that dealing with current concerns about the CPI within the framework of economic theory requires
  developing the theory of the cost-of-living index under more general assumptions than have thus far been standard. It examines
  three neglected but critical issues that should rank high on the research agenda because of their practical implications
  for index number construction: Whose cost-of-living index? Why shop? and What is a good? It concludes by discussing the
  intersection between the technical problems of constructing the CPI and the political problems of indexing taxes and transfers.'
