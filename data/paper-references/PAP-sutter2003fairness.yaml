abstract: 'Abstract On 11 May 2001, readers of the Berliner Zeitung were invited to participate in an ultimatum bargaining
  experiment played in the strategy vector mode: each participant chooses not only how much (s)he demands of the DM1,000 pie
  but also which of the nine possible offers of DM100, 200,y, 900 (s)he would accept or reject. In addition, participants
  were asked to predict the most frequent type of behavior. Three randomly selected proposer-responder pairs were rewarded
  according to the rules of ultimatum bargaining and three randomly chosen participants of those who predicted the most frequent
  type of behavior received a prize of DM500. Decisions could be submitted by mail, fax or via the internet. Behavior is described,
  statistically analyzed and compared to the usual laboratory ultimatum bargaining results.'
