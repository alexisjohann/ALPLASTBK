abstract: The next section reviews the evolution of the domestic airline industry since the late 1970s, when it was abruptly
  freed from most regulatory constraints on pricing, entry, and exit. (International air travel is considered here only as
  it relates to competition in the domestic industry.) The following sections will examine structure issues and strategic
  developments in airline competition and discuss public policy options in dealing with the airline industry.
