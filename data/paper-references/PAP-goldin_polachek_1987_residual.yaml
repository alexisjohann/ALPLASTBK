abstract: 'Relative to men, women receive lower wages and are employed in lower paid
  and more menial occupations. Because these unequal economic outcomes exist for a
  majority group, widely dispersed in society, the subject of gender differentials
  is central to understanding discrimination. Most measures of sex discrimination
  assess whether the market differentially rewards otherwise similar men and women.
  Differences in earnings generated by differences in" female" and" male" characteristics
  represent the" explained" portion of the gender gap, while differences in earnings
  generated by differences in"''rewards" per attribute are termed an"''unexplained
  residual." It is the unexplained portion that has been identified with market discrimination,
  despite many potential biases. If discriminatory market signals discourage investments,
  and if socialization, not individual choice, determines outcomes, the residual may
  be a lower bound to the true value of discrimination. Discrimination, however, would
  be overestimated if differential investments are motivated by individual choice
  based on optimal wealth-maximizing behavior, such as the division of labor within
  the home. The consensus figure for sex discrimination today is about 50 to 60 percent
  of the earnings gap for full-time male and female workers when actual experience
  is included but occupational categories are not (recent summaries include Janice
  Madden, 1985; Francine Blau and Marianne Ferber, 1987). Thus an initial gap of about
  40 percentage points is reduced to about 23 percentage points. Refinements to the
  data on college education and job characteristics suggest further reductions (TN
  Daymont and PJ Andrisani, 1984; Randall Filer, 1983). Because all readily available
  data sources are for the post-1960 period, concern has centered on the recent past.
  The earnings gap declined in the early 1950''s, stayed vir-tually constant from
  the mid-1950''s to 1980, and narrowed again after 1980 (Blau and Andrea Beller,
  1986, however, find evidence of a closing from 1971). Movements in the residual
  over the brief period since 1960 are difficult to distinguish given the wide range
  of results and data sets. Over a far longer period of time, however, considerably
  more can be discerned. Data spanning the last 165 years indicate that the ratio
  of female to male earnings, adjusted for time inputs, increased from about 0.35
  in 1820 for manufacturing workers, to 0.45 in 1890 for all workers, and to over
  0.65 in 1985 (Goldin, 1986), with most of the increase for all workers occurring
  from 1890 to 1930. Disaggregated data for various periods from 1890 to 1940 indicate
  that a far greater percentage of the log difference between male and female earnings
  can be explained in historical data than in current survey data, implying a secular
  increase in discrimination despite a narrowing in the wage gap. We contend that
  the apparent rise in discrimination is illusory, coming about because of biases
  in the traditional discrimination measure. We also illustrate related propositions
  using current cross-sectional data. tDiscussants: Francine D. Blau, University of
  Illinois;'
