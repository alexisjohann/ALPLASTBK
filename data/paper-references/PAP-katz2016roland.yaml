abstract: 'Roland Fryer is an extraordinary applied microeconomist whose research output related to racial inequality, the
  US racial achievement gap, and the design and evaluation of educational policies make him a worthy recipient of the 2015
  John Bates Clark Medal. I will divide this survey of Roland’s research into five categories: the racial achievement gap,
  education policies and reforms, economics of social interactions, the economics of discrimination and anti-discrimination
  policies, and further topics involving the black–white racial divide.'
