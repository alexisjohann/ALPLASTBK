abstract: This paper develops the empirical and theoretical case that differences
  in economic institutions are the fundamental cause of differences in economic development.
  We first document the empirical importance of institutions by focusing on two “quasi-natural
  experiments” in history, the division of Korea into two parts with very different
  economic institutions and the colonization of much of the world by European powers
  starting in the fifteenth century. We then develop the basic outline of a framework
  for thinking about why economic institutions differ across countries. Economic institutions
  determine the incentives of and the constraints on economic actors, and shape economic
  outcomes. As such, they are social decisions, chosen for their consequences. Because
  different groups and individuals typically benefit from different economic institutions,
  there is generally aconflict over these social choices, ultimately resolved in favor
  of groups with greater political power. The distribution of political power in society
  is in turn determined by political institutions and the distribution of resources.
