abstract: 'Following an acrimonious health care reform debate involving charges of “death panels,” in 2010, Congress explicitly
  forbade the use of cost-effectiveness analysis in government programs of the Patient Protection and Affordable Care Act.
  In this context, comparative effectiveness research emerged as an alternative strategy to understand better what works in
  health care. Put simply, comparative effectiveness research compares the efficacy of two or more diagnostic tests, treatments,
  or health care delivery methods without any explicit consideration of costs. To economists, the omission of costs from an
  assessment might seem nonsensical, but we argue that comparative effectiveness research still holds promise. First, it sidesteps
  one problem facing cost-effectiveness analysis—the widespread political resistance to the idea of using prices in health
  care. Second, there is little or no evidence on comparative effectiveness for a vast array of treatments: for example, we
  don''t know whether proton-beam therapy, a very expensive treatment for prostate cancer (which requires building a cyclotron
  and a facility the size of a football field) offers any advantage over conventional approaches. Most drug studies compare
  new drugs to placebos, rather than “head-to-head” with other drugs on the market, leaving a vacuum as to which drug works
  best. Finally, the comparative effectiveness research can prove a useful first step even in the absence of cost information
  if it provides key estimates of treatment effects. After all, such effects are typically expensive to determine and require
  years or even decades of data. Costs are much easier to measure, and can be appended at a later date as financial Armageddon
  draws closer.'
