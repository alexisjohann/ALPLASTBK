abstract: Abstract The Stability and Growth Pact (SGP) in the EU's economic and monetary union (EMU) aims to assure sound
  public finances in the EMU Member States by providing for sanctions against countries with excessive deficits. We experimentally
  examine the voting procedure of the SGP and find that the institutional rules are not at all satisfactory. As an institutional
  innovation, we test a procedure where fiscal sinners are excluded from voting, as suggested by Otmar Issing. It turns out
  that this modification is surprisingly successful. In addition, our study shows that the opportunity to communicate has
  a significant impact and tends to mitigate the Pact's shortcomings.
