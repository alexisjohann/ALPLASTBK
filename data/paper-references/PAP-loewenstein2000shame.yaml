abstract: Economists have not explicitly denied the existence and significance of visceral factors but have traditionally
  left them out of their analyses, whether because their influence is perceived as transient and hence unimportant, or because
  they are seen as too unpredictable and complex to be amenable to formal modeling. An attempt is made to show that both of
  these assumptions are false. Visceral factors have important, but often underappreciated, consequences for behavior. Moreover,
  both the determinants of visceral factors and their impact on behavior are not only systematic, but amenable to formal modeling.
