abstract: Game theory has been a huge success in economics. Many important questions have been answered, and game theoretic
  methods are now central to much economic investigation. We suggest areas where further advances are important, and argue
  that models of learning are a promising route for improving and widening game theory's predictive power while preserving
  the successes of game theory where it already works well. We emphasize in particular the need for better understanding of
  the speed with which learning takes place.
