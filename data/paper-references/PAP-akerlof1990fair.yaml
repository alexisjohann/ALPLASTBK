summary:
  abstract_extended: 'This paper proposes an alternative theory of unemployment based on the fair

    wage-effort hypothesis: workers proportionately withdraw effort as their actual

    wage falls short of their fair wage. This behavioral assumption, derived from

    equity theory in social psychology and social exchange theory in sociology,

    explains involuntary unemployment and observed cross-section wage differentials.


    The model shows that firms may find it profitable to pay wages above market-

    clearing levels because underpaying relative to the fair wage induces workers

    to shirk. When the fair wage exceeds the market-clearing wage, unemployment

    results. The theory explains wage compression, inter-industry wage differentials,

    and why unemployment is concentrated among the less skilled.'
  key_findings: "1. FAIR WAGE-EFFORT HYPOTHESIS: Workers withdraw effort proportionally to the\n   gap between actual wage\
    \ and their perceived fair wage (effort = min(w/w*, 1))\n\n2. EFFICIENCY WAGES: Firms pay above market-clearing wages\
    \ because paying below\n   the fair wage reduces worker productivity through effort withdrawal\n\n3. INVOLUNTARY UNEMPLOYMENT:\
    \ When fair wage exceeds market-clearing wage, firms\n   still pay the fair wage, creating excess labor supply and unemployment\n\
    \n4. WAGE COMPRESSION: The fair wage depends on comparison with similar workers,\n   leading to compressed wage distributions\
    \ within firms\n\n5. INTER-INDUSTRY DIFFERENTIALS: Higher-rent industries pay more because fair\n   wage depends partly\
    \ on firm profitability - explains persistent differentials\n\n6. SKILL-BASED UNEMPLOYMENT: Less skilled workers face\
    \ higher unemployment\n   because their fair wage exceeds their marginal product by a larger margin"
