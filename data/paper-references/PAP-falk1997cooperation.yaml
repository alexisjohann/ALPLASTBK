abstract: Graph-theoretic ideas are used to analyze cooperation structures in games. Allocation rules, selecting a payoff
  for every possible cooperation structure, are studied for games in characteristic function form. Fair allocation rules are
  defined, and these are proven to be unique, closely related to the Shapley value, and stable for a wide class of games.
