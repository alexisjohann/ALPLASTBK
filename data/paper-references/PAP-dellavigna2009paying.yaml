abstract: How do consumers choose from a menu of contracts? We analyze a novel dataset from three US health clubs with information
  on both the contractual choice and the day-to-day attendance decisions of 7,752 members over three years. The observed consumer
  behavior is difficult to reconcile with standard preferences and beliefs. First, members who choose a contract with a flat
