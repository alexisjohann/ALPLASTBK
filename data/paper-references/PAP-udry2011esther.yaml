abstract: 'Esther Duflo, winner of the 2010 John Bates Clark Medal, has made extraordinary contributions to development economics.
  She exemplifies and has played a vital role in the renaissance of development economics over the past decade. She has erected
  and inspired a research apparatus all over the developing world that integrates large-scale field experiments with economic
  theory to yield important insights for development policy and our understanding of behavior and institutions in developing
  countries. I''ll divide my discussion of Esther''s work into four categories: educational production, the economic lives
  of the poor, women as decisionmakers, and a broad category of market and policy failures. I will then offer some thoughts
  on Esther''s role as a scholar–activist.'
