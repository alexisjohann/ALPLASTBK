title: 'FOCJ: Competitive Governments for Europe'
author: Frey
year: '1996'
publication_type: journal_article
doi: 10.1016/0144-8188(96)00022-8
abstract: While European integration and the four freedoms (movement of goods, services, labor, capital) strengthened economic
  competition, competition among governments has been muted. This paper proposes that a future European constitution should
  unleash political competition by guaranteeing a fifth freedom allowing the evolution of functional, overlapping, and competing
  jurisdictions (FOCJ). These governmental units combine welfare-enhancing concepts from the economic theory of federalism.
  FOCJ are established by citizens from below, extend over task-specific areas, overlap, provide competitive governance via
  democratic institutions, and have independent taxation power. This model is more responsive to citizens' preferences and
  adjusts dynamically to provide public services efficiently. Historical examples include U.S. special districts and Swiss
  functional democratic communities.
