abstract: >
  McKinsey report with the Rework America Alliance on skills-based workforce approaches. Analysis of US
  labor market data reveals that more than 80% of workers' moves to new roles involve shifting from one
  employer to another, suggesting workers have skills to advance but lack internal opportunities. Employers
  cite skills validation and sourcing as main challenges when removing degree requirements. Recommends
  shifting from degrees and job titles to demonstrated skills for recruiting and talent management.
