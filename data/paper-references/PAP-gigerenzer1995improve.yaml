abstract: Is the mind, by design, predisposed against performing Bayesian inference?Previous research on base rate neglect
  suggests that the mind lacks the appropriate cognitive algorithms.However, any claim against the existence of an algorithm,
  Bayesian or otherwise, is impossible to evaluate unless one specifies the information format in which it is designed to
  operate.The authors show that Bayesian algorithms are computationally simpler in frequency formats than in the probability
  formats used in previous research.Frequency formats correspond to the sequential way information is acquired in natural
  sampling, from animal foraging to neural networks.By analyzing several thousand solutions to Bayesian problems, the authors
  found that when information was presented in frequency formats, statistically naive participants derived up to 50% of all
  inferences by Bayesian algorithms.Non-Bayesian algorithms included simple versions of Fisherian and Neyman-Pearsonian inference.Is
  the mind, by design, predisposed against performing Bayesian inference?The classical probabilists of the Enlightenment,
  including Condorcet, Poisson, and Laplace, equated probability theory with the common sense of educated people, who were
  known then as "hommes eclaires."Laplace (1814/ 1951) declared that "the theory of probability is at bottom nothing more
  than good sense reduced to a calculus which evaluates that which good minds know by a sort of instinct, without being able
  to explain how with precision" (p.196).The available mathematical tools, in particular the theorems of Bayes and Bernoulli,
  were seen as descriptions of actual human judgment (Daston, 1981(Daston, ,1988)).However, the years of political upheaval
  during the French Revolution prompted Laplace, unlike earlier writers such as Condorcet, to issue repeated disclaimers that
  probability theory, because of the interference of passion and desire, could not account for all relevant factors in human
  judgment.The Enlightenment view-that the laws of probability are the laws of the mind-moderated as it was through the French
  Revolution, had a profound influence on 19th-and 20th-century science.This view became the starting point for seminal contributions
