abstract: Much of what humans know we cannot say, and much of what we do we cannot describe. This book develops a common conceptual language to bridge the concept's disparate domains by explaining explicit knowledge and classifying tacit knowledge. Collins delineates three distinct forms of tacit knowledge - relational tacit knowledge (things we could describe in principle), somatic tacit knowledge (things our bodies can do but we cannot describe), and collective tacit knowledge (knowledge that is the property of society). Collective tacit knowledge is the only true tacit knowledge in that it can never be made explicit.
