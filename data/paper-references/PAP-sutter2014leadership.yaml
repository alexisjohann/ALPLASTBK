abstract: Abstract This chapter studies the effects of reward and punishment as instruments for leadership in sequential public
  goods games. In particular, it considers a broad research project that investigates the effects of leadership in the provision
  of public goods by examining (i) the relative importance of reward and punishment as leadership devices, (ii) whether endogenous
  leadership is more efficient than exogenously enforced leadership, and (iii) whether leaders contributing last, instead
  of first, also increase contributions. The results illuminate the relative benefits of reward and punishment as instruments
  for leaders. Yet, while these instruments seem to increase the hierarchical power of the leader, volunteering to be the
  leader of the group—thereby sacrificing own payoffs to achieve a common goal—seems to increase the leader's persuasive power
  to convince the followers to contribute to the public good. This happens due to a selection bias and to a stronger response
  of followers to a voluntary leader than to an externally imposed leader.
