abstract: 'This article discusses an economics approach to studying business strategy,
  with

  particular focus on the relationship between business strategy and economic policy.

  It begins with a definition of business strategy and a survey of how complementarities

  provide a mathematical framework for studying strategy. Complementarities describe

  interactions between strategic choice variables: raising one choice variable increases

  the returns of raising other choice variables—and so changes in the business environment,

  including economic policies, will provoke changes in several strategic choice variables

  simultaneously. Next, the article asks how strategic decisions are made and discusses

  measurement approaches. It then reviews the literature on key strategic interactions,

  with a focus on international business strategies and interactions with innovation

  policies. It concludes with discussions of potential implications for economic policy,

  including antitrust, industrial policy, and corporate social responsibility.

  '
