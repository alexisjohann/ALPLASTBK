summary:
  abstract_extended: 'This paper applies behavioral economics to health decision-making. We examine

    how cognitive biases, present bias, and social influences affect health

    behaviors. Understanding these factors is crucial for designing effective

    health policies and interventions.'
  key_findings: "1. COGNITIVE BIASES\n   - Optimism bias in health\n   - Availability heuristic\n   - Framing effects\n\n\
    2. PRESENT BIAS\n   - Immediate gratification valued\n   - Future health discounted\n   - Explains unhealthy behaviors\n\
    \n3. SOCIAL INFLUENCES\n   - Peer effects on health\n   - Social norms matter\n   - Network effects\n\n4. POLICY IMPLICATIONS\n\
    \   - Defaults for health choices\n   - Commitment devices\n   - Social norm interventions"
  ebf_relevance: '10C DIMENSIONS:

    - WHAT (C): Health utility

    - WHEN (V): Health decision context

    - AWARE (AU): Health information processing


    THEORY SUPPORT:

    - Applied behavioral economics

    - Health domain application

    - Policy-relevant


    KEY INSIGHT:

    Health decisions are affected by cognitive biases and present bias;

    behavioral interventions can improve health outcomes.'
