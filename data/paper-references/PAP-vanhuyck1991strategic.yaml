title: Strategic Uncertainty, Equilibrium Selection, and Coordination Failure in Average Opinion Games
author: Huyck
year: '1991'
publication_type: journal_article
doi: 10.2307/2937932
abstract: Deductive equilibrium analysis often fails to provide a unique equilibrium solution in many situations of strategic
  interdependence. Consequently, a theory of equilibrium selection would be a useful complement to the theory of equilibrium
  points. A salient equilibrium selection principle would allow decision makers to implement a mutual best response outcome.
  This paper uses the experimental method to examine the salience of payoff-dominance, security, and historical precedents
  in related average opinion games. The systematic and, hence, predictable behavior observed in the experiments suggests that
  it should be possible to construct an accurate theory of equilibrium selection.
