summary:
  abstract_extended: 'The authors show that current differences in trust levels within Africa can

    be traced back to the transatlantic and Indian Ocean slave trades.


    Combining contemporary individual-level survey data with historical data on

    slave shipments by ethnic group, they find that individuals whose ancestors

    were heavily raided during the slave trade are less trusting today.


    Evidence from a variety of identification strategies suggests that the

    relationship is causal. Examining causal mechanisms, they show that most of

    the impact of the slave trade is through factors that are internal to the

    individual, such as cultural norms, beliefs, and values.


    COMPANION TO: Nunn (2008) QJE "Long-term Effects of Africa''s Slave Trades"

    which shows slave trade → underdevelopment; this paper shows the MECHANISM

    is through trust.'
  key_findings: "1. SLAVE TRADE → MISTRUST: Historical slave raiding predicts lower trust today\n\n2. CAUSAL IDENTIFICATION:\
    \ Multiple strategies (IV, ethnic fixed effects)\n   support causal interpretation\n\n3. CULTURAL TRANSMISSION: Effect\
    \ works through cultural norms, beliefs, values\n   passed across generations\n\n4. ETHNIC-LEVEL DATA: Uses shipping records\
    \ and historical documents to\n   construct ethnic-group slave export estimates\n\n5. MECHANISM FOR UNDERDEVELOPMENT:\
    \ Trust is the channel through which\n   slave trade affects economic outcomes\n\n6. PERSISTENCE: 400+ year persistence\
    \ of cultural trait (mistrust)"
  ebf_relevance: "Domain: DOMAIN-HISTORICAL, DOMAIN-TRUST, DOMAIN-DEVELOPMENT\n10C Dimensions: WHEN (400-year persistence),\
