abstract: Economists have long puzzled over the astounding differences in productivity between firms and countries. In this
  paper, we present evidence on a possible explanation for persistent differences in productivity at the firm and the national
  level—namely, that such differences largely reflect variations in management practices. We have, over the last decade, undertaken
  a large survey research program to systematically measure management practices across firms, industries, and countries.
  Our survey approach focuses on aspects of management like systematic performance monitoring, setting appropriate targets,
  and providing incentives for good performance. We explain how we measure management; identify some basic patterns in our
  data; then turn to the question of why management practices vary so much across firms and nations. What we find is a combination
  of imperfectly competitive markets, family ownership of firms, regulations restricting management practices, and informational
  barriers allow bad management to persist.
