summary:
  abstract_extended: 'This paper examines how enforcement problems shape the evolution of economic

    institutions. We argue that strong reciprocity - the willingness to punish

    norm violators at personal cost - is crucial for understanding how informal

    institutions enforce cooperation. The presence of strong reciprocators

    enables self-enforcing contracts and sustains social norms.'
  key_findings: "1. ENFORCEMENT PROBLEMS\n   - Contracts are incomplete\n   - Formal enforcement costly\n   - Informal mechanisms\
    \ needed\n\n2. STRONG RECIPROCITY\n   - Punishment of violators\n   - Costly but effective\n   - Decentralized enforcement\n\
    \n3. INSTITUTIONAL EVOLUTION\n   - Institutions embed norms\n   - Cultural evolution shapes institutions\n   - Complementarity\
    \ between formal/informal\n\n4. POLICY IMPLICATIONS\n   - Work with existing norms\n   - Crowding effects of formal rules\n\
    \   - Design for self-enforcement"
  ebf_relevance: '10C DIMENSIONS:

    - WHAT (C): Enforcement as utility-relevant

    - HOW (B): Formal-informal complementarity

    - WHEN (V): Institutional context


    THEORY SUPPORT:

    - MS-SR-001: Strong Reciprocity

    - MS-SN-001: Social Norms

    - JEP overview - accessible introduction


    KEY INSIGHT:

    Strong reciprocity provides decentralized enforcement that complements

    formal institutions and shapes their evolution.'
