abstract: The economics profession includes disproportionately few women and members of historically underrepresented racial
  and ethnic minority groups, relative both to the overall population and to other academic disciplines. This underrepresentation
  within the field of economics is present at the undergraduate level, continues into the ranks of the academy, and is barely
  improving over time. It likely hampers the discipline, constraining the range of issues addressed and limiting our collective
  ability to understand familiar issues from new and innovative perspectives. In this paper, we first present data on the
  numbers of women and underrepresented minority groups in the profession. We then offer an overview of current research on
  the reasons for the underrepresentation, highlighting evidence that may be less familiar to economists. We argue that implicit
  attitudes and institutional practices may be contributing to the underrepresentation of women and minorities at all stages
  of the pipeline, calling for new types of research and initiatives to attack the problem. We then review evidence on how
  diversity affects productivity and propose remedial interventions as well as findings on effectiveness. We identify several
  promising practices, programs, and areas for future research.
