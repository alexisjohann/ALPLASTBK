# ============================================================================
# ABSTRACT & SOURCE
# ============================================================================
abstract: |
  The handbook provides an overview of an emerging field of research within
  economics that studies the causes, evolution, and consequences of culture,
  defined as "values, beliefs, and knowledge that affects human behavior and
  is transmitted between individuals."

  The handbook covers: (1) measuring cultural differences across societies
  using lab experiments and large-scale surveys; (2) mathematical theories
  of cultural transmission, evolution, and behavioral direction; (3) empirical
  literature on historical roots of contemporary cultural variation;
  (4) evidence on cultural change dynamics; (5) effects of culture on
  economic outcomes.

  Three volumes, 31 chapters, approximately 60 contributors from leading
  institutions worldwide.

