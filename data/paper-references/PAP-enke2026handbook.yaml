# ============================================================================
# SUMMARY
# ============================================================================
summary:
  abstract_extended: |
    The first comprehensive handbook dedicated to the economics of culture,
    edited by four leading scholars in the field. The handbook consolidates
    an emerging research program that studies culture - defined as "values,
    beliefs, and knowledge that affects human behavior and is transmitted
    between individuals" - and its economic causes, evolution, and consequences.

    The handbook is organized into six parts across three volumes:
    Part I (Measurement): How to measure cultural differences using psychology,
    ethnography, linguistics, experiments, and large-scale surveys (GPS).
    Part II (Theory): Mathematical models of cultural transmission, evolution,
    identity, norms, and parenting from economics and evolutionary anthropology.
    Part III (Empirical Evidence): Historical roots of contemporary cultural
    variation combining historical/ethnographic data with modern measures.
    Part IV (Consequences): How culture affects institutions, growth, gender,
    religion, finance, and health.
    Part V (Dynamics): Cultural change through immigration, markets, media,
    and development interventions.
    Part VI (Policy): Culture-politics interactions, field interventions for
    non-cognitive skills, and culture-policy-development nexus.

  key_findings: |
    1. DEFINITION: Culture = values, beliefs, knowledge affecting behavior,
       transmitted between individuals
    2. MEASUREMENT: GPS data across 76 countries documents global variation
       in risk, time, altruism, trust, reciprocity, negative reciprocity
    3. THEORY: Cultural transmission models (Bisin/Verdier) formalize how
       parents invest in transmitting cultural traits to children
    4. IDENTITY: Identity as a form of culture (Akerlof/Kranton) - cultural
       categories shape self-concept and economic behavior
    5. EVOLUTION: Cultural evolution for economists (Henrich/Boyd) - how
       cultural traits spread, persist, and change through selection
    6. INSTITUTIONS: Culture causally affects institutional development
       (Robinson) - Psi_K → Psi_I causal channel
    7. GROWTH: Cultural values (trust, individualism, work ethic) are
       significant predictors of economic growth (Voth)
    8. DYNAMICS: Culture changes through experience, policy, markets,
       immigration, and deliberate intervention

  ebf_relevance: |
    This handbook is FOUNDATIONAL for the EBF Psi_K (cultural context)
    dimension. It provides:

    1. THEORETICAL FOUNDATION: Formal models of cultural transmission
       (Bisin/Verdier, Ch10) and cultural evolution (Boyd, Ch6; Henrich, Ch13)
       directly underpin how Psi_K operates in the EBF.

    2. PARAMETER SOURCE: The GPS dataset (Ch5, Becker et al.) provides
       calibrated cross-cultural parameters for risk aversion, time
       discounting, altruism, trust, and reciprocity across 76 countries.
       These are direct inputs for EBF parameter registry.

    3. MEASUREMENT METHODOLOGY: Cross-cultural experiments (Ch4, Gaechter)
       provide the methodological foundation for how to measure behavioral
       parameters across cultural contexts - essential for PCT
       (Parameter Context Transformation).

    4. IDENTITY-CULTURE LINK: Akerlof/Kranton (Ch8) formalizes how cultural
       categories create identity-based utility, directly extending
       MS-IB-001 in the EBF theory catalog.

    5. POLICY CHANNEL: Culture shapes institutions (Ch17) and policies
       shape culture (Ch26, Ch27) - bidirectional Psi_K ↔ Psi_I channel
       is critical for intervention design.

    KEY EBF INSIGHT: The handbook establishes that cultural context (Psi_K)
    is not a "noise" variable but a SYSTEMATIC determinant of economic
    behavior. Parameters like risk aversion, trust, and time preferences
    are not universal constants but culturally shaped - directly supporting
    the EBF thesis that theta = f(Psi, 10C).

  sources:
    - "Handbook table of contents and contributor list"
    - "BibTeX: bibliography/bcm_master.bib (enke2026handbook)"

