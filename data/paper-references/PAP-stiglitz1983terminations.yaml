abstract: 'Firms often respond to low output of a worker not by lowering that worker''s wage, but by firing the worker; landlords
  at times react to poor crops by evicting the sharecropper rather than lowering his share of output; similarly, banks often
  deny future loans to defaulters rather than raising the interest rate that a defaulter would have to pay. These are all
  examples of contingency contracts in which bad outcomes lead to a firm-employee, landlord-tenant, or bank-borrower relationship
  being terminated. This paper addresses three questions: When is it desirable to employ contingency contracts? What does
  the structure of the equilibrium contingency contract look like? Under what conditions does the equilibrium contingency
  contract entail the termination of the relationship? We argue that contingency contracts have certain desirable incentive
  properties. In each of the cases cited where termination occurs, the threat of termination encourages behavior that the
  principal (employer, landlord, bank) finds desirable while avoiding some of the negative incentive and sorting effects that
  could result from penalizing agents (employee, tenant, borrower) through changes in the terms of the contract. For example,
  in the labor market, a lower wage could result either in a decrease in effort by workers, or an increase in quits (particularly
  by better workers). Similarly, banks might not penalize defaulters by raising the interest rate they are charged because
  if they did, their profits might decline. In our 1981 article, we showed two reasons for the inverse relationship between
  the interest rate charged borrowers and bank profits. First, raising the interest rate may increase the average riskiness
  of those applying for loans (the adverse selection effect). Bankruptcy bounds the downside risk of a borrower to his collateral:
  the nature of the loan contract bounds the upside return of a lender to the interest rate. Consequently, among projects
  with the same expected gross return, riskier projects (in the sense of mean preserving spreads) have higher returns to borrowers
  and lower returns to lenders. Among the set of borrowers whose projects had the same expected gross return, the borrowers
  deterred by higher interest rates will be those whose projects were safest; that is, the most desir-able customers for the
  bank. The second reason for bank profits to fall with increases in interest rates is that higher interest rates induce borrowers
  to switch from safe to risky projects (the incentive effect). This switch occurs because the probability of that interest
  being paid is lower for projects that are more likely to fail. Thus the cost of an in-crease in the interest rate is lower
  the higher is the probability of default. Since a model that was sufficiently general to explain all instances in which
  a principal responds to bad outcomes by terminating the principal-agent relationship would obscure the unique feature of
  each of these markets, we focus our attention on understanding why banks refuse to lend to defaulters. In Section VI, we
  apply the same method of analysis to explain why workers are fired. In both cases, the agents that are terminated are" superior"(in
  a sense defined below) to the new agents the principal is engaging.'
