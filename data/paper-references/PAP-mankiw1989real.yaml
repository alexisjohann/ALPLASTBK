abstract: Real business cycle theory is the latest incarnation of the classical view of economic fluctuations. It assumes
  that there are large random fluctuations in the rate of technological change. In response to these fluctuations, individuals
  rationally alter their levels of labor supply and consumption. The business cycle is, according to this theory, the natural
  and efficient response of the economy to changes in the available production technology. In this essay, I appraise this
  newly revived approach to the business cycle. In my view, real business cycle theory does not provide an empirically plausible
  explanation of economic fluctuations. Both its reliance on large technological disturbances as the primary source of economic
  fluctuations and its reliance on the intertemporal substitution of leisure to explain changes in employment are fundamental
  weaknesses. Moreover, to the extent that it trivializes the social cost of observed fluctuations, real business cycle theory
  is potentially dangerous. The danger is that those who advise policymakers might attempt to use it to evaluate the effects
  of alternative macroeconomic policies or to conclude that macroeconomic policies are unnecessary.
