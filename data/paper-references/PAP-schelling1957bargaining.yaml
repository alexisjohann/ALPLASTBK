title: Bargaining, Communication, and Limited War
author: Schelling
year: '1957'
publication_type: journal_article
doi: 10.1177/002200275700100104
abstract: This foundational article explores principles underlying negotiations and bargaining when verbal communication is
  impossible or limited. Schelling examines how focal points emerge in tacit coordination games, showing that bargaining often
  succeeds through nonverbal communication and mutual recognition of prominent alternatives. Through ingenious scenarios,
  Schelling demonstrates that negotiation is not limited to formal discussions and that war conduct can be viewed as tacit
  bargaining between opponents. Published in the first issue of the Journal of Conflict Resolution, this work laid groundwork
  for strategic analysis of conflict and coordination.
