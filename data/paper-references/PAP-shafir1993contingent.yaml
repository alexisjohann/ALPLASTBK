abstract: When thinking under uncertainty, people often do not consider appropriately each of the relevant branches of a decision
  tree, as required by consequentialism. As a result they sometimes violate Savage's sure-thing principle. In the Prisoner's
  Dilemma, many subjects compete when they know the opponent's choice but cooperate when uncertain. The paper interprets Newcomb's
  Problem and Wason's selection task as manifestations of nonconsequential reasoning and discusses quasi-magical thinking.
