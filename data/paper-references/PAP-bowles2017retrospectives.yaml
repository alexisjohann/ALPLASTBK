abstract: 'Friedrich A. Hayek (1899–1992) is known for his vision of the market economy as an information processing system
  characterized by spontaneous order: the emergence of coherence through the independent actions of large numbers of individuals,
  each with limited and local knowledge, coordinated by prices that arise from decentralized processes of competition. Hayek
  is also known for his advocacy of a broad range of free market policies and, indeed, considered the substantially unregulated
  market system to be superior to competing alternatives precisely because it made the best use of dispersed knowledge. Our
  purpose in writing this paper is twofold: First, we believe that Hayek''s economic vision and critique of equilibrium theory
  not only remain relevant, but apply with greater force as information has become ever more central to economic activity
  and the complexity of the information aggregation process has become increasingly apparent. Second, we wish to call into
  question Hayek''s belief that his advocacy of free market policies follows as a matter of logic from his economic vision.
  The very usefulness of prices (and other economic variables) as informative messages—which is the centerpiece of Hayek''s
  economics—creates incentives to extract information from signals in ways that can be destabilizing. Markets can promote
  prosperity but can also generate crises. We will argue, accordingly, that a Hayekian understanding of the economy as an
  information-processing system does not support the type of policy positions that he favored. Thus, we find considerable
  lasting value in Hayek''s economic analysis while nonetheless questioning the connection of this analysis to his political
  philosophy.'
