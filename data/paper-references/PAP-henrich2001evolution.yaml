abstract: Abstract In many societies, humans cooperate in large groups of unrelated individuals. Most evolutionary explanations
  for cooperation combine kinship (Hamilton, 1964) and reciprocity (“reciprocal altruism,” Trivers, 1971). These mechanisms
  seem to explain the evolution of cooperation in many species including ants, bees, naked mole rats, and vampire bats. However,
  because social interaction among humans often involves large groups of mostly unrelated individuals, explaining cooperation
  has proved a tricky problem for both evolutionary and rational choice theorists. Evolutionary models of cooperation using
  the repeated n-person prisoner’s dilemma predict that cooperation is not likely to be favored by natural selection if groups
  are larger than around 10, unless relatedness is very high (Boyd and Richerson, 1988). As group size rises above 10, to
  100 or 1000, cooperation is virtually impossible to evolve or maintain with only reciprocity and kinship.1
