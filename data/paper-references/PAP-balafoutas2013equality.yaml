summary:
  abstract_extended: 'This paper studies a fundamental conflict in economic decision-making: the

    trade-off between equality, equity and incentives, in a new experimental game

    that nests a voluntary contributions mechanism in a broader spectrum of

    incentive schemes.


    In a 2x2 design, subjects either vote on or exogenously encounter incentive

    settings while assigned unequal incomes that are either task-determined or

    random.


    The study examines tensions between egalitarianism, equity concerns, self-

    interest, and the need for incentives.'
  key_findings: "- Earned endowments lead to LESS support for redistribution\n- Earned endowments lead\
    \ to LESS cooperation\n- Voting behavior is mainly self-interested but also influenced by:\n  * Egalitarian\
    \ concerns\n  * Equity concerns (which sometimes cut in opposite directions)\n- Cooperation rates\
    \ respond continuously to incentive strength\n- Contributions determined by:\n  * Boundedly rational\
    \ responses to incentives\n  * Egalitarian considerations\n  * Equity considerations\n  * Strategic\
    \ considerations"
