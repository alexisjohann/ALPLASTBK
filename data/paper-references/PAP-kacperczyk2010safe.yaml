abstract: 'Commercial paper is a short-term debt instrument issued by large corporations. The commercial paper market has
  long been viewed as a bastion of high liquidity and low risk. But twice during the financial crisis of 2007–2009, the commercial
  paper market nearly dried up and ceased being perceived as a safe haven. Major interventions by the Federal Reserve, including
  large outright purchases of commercial paper, were eventually used to support both issuers of and investors in commercial
  paper. We will offer an analysis of the commercial paper market during the financial crisis. First, we describe the institutional
  background of the commercial paper market. Second, we analyze the supply and demand sides of the market. Third, we examine
  the most important developments during the crisis of 2007–2009. Last, we discuss three explanations of the decline in the
  commercial paper market: substitution to alternative sources of financing by commercial paper issuers, adverse selection,
  and institutional constraints among money market funds.'
