abstract: Elicitation is the process of extracting expert knowledge about some unknown quantity or quantities, and formulating
  that information as a probability distribution. Elicitation is important in situations, such as modelling the safety of
  nuclear installations or assessing the risk of terrorist attacks, where expert knowledge is essentially the only source
  of good information. It also plays a major role in other contexts by augmenting scarce observational data, through the use
  of Bayesian statistical methods. However, elicitation is not a simple task, and practitioners need to be aware of a wide
  range of research findings in order to elicit expert judgements accurately and reliably. Uncertain Judgements introduces
  the area, before guiding the reader through the study of appropriate elicitation methods, illustrated by a variety of multi-disciplinary
  examples.
