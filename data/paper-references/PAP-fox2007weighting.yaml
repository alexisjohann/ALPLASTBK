abstract: This chapter reviews the neural basis of prospect theory, examining how brain systems implement reference-dependent
  valuation, loss aversion, and probability weighting. Neuroimaging studies reveal that gains and losses are processed in
  distinct neural circuits, with loss aversion reflected in heightened amygdala activation for losses. The ventral striatum
  and orbitofrontal cortex encode subjective value according to prospect theory's value function.
