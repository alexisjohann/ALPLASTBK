abstract: The theory of monotone comparative statics and supermodular games is presented as the appropriate tool to model
  complementarities. The approach, which has not yet been fully incorporated into the standard toolbox of researchers, makes
  the analysis intuitive and simple, helps in deriving new results and in casting new light on old ones. The paper takes stock
  of recent contributions and develops applications to industrial organization (oligopoly, R&D, and dynamics), finance (currency
  and banking crisis) and macroeconomics (adjustment and menu costs). Particular attention is devoted to Markov games and
  to games of incomplete information (including global games).
