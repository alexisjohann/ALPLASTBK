summary:
  abstract_extended: 'This paper examines how leadership affects cooperation in public goods games.

    We show that leaders can significantly increase cooperation by leading by

    example and by communicating expectations. Leadership is particularly

    effective when leaders are perceived as legitimate and trustworthy.'
  key_findings: "1. LEADERSHIP EFFECTIVENESS\n   - Leaders increase cooperation\n   - Leading by example works\n   - Communication\
    \ amplifies effects\n\n2. MECHANISMS\n   - Social influence\n   - Norm setting\n   - Coordination device\n\n3. MODERATING\
    \ FACTORS\n   - Leader legitimacy matters\n   - Trustworthiness important\n   - Context affects impact"
  ebf_relevance: '10C DIMENSIONS:

    - WHO (AAA): Leader-follower hierarchy

    - WHAT (C): Leadership effects on cooperation

    - HOW (B): Social influence complementarities


    THEORY SUPPORT:

    - MS-SN-001: Social Norms (leadership)

    - Organizational behavior integration

    - Practical applications


    KEY INSIGHT:

    Leaders can enhance cooperation through example-setting and norm communication;

    leadership legitimacy is key to effectiveness.'
