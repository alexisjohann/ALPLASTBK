abstract: Economic inequality has become centre stage in the political debate, but what the political leaders have not said
  is what they would do about it. There are repeated calls for equitable growth but little clue as to how this is to be achieved.
  In this Working Paper, I seek to show what could be done to reduce the extent of inequality if we are serious about that
  objective. I draw on the lessons of history, and take a fresh look - through distributional eyes - at the underlying economics.
  I identify ambitious new policies in five areas - technology, employment, social security, the sharing of capital, and taxation
  – that could bring about a genuine shift in the distribution of income towards less inequality.
