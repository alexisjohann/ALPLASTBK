abstract: Recent surveys in the United States and the Muslim world show widespread misinformation about the events of September
  11, 2001. Using data from 9 predominantly Muslim countries, we study how such beliefs depend on exposure to news media and
  levels of education. Standard economic theory would predict that increased access to information should cause beliefs to
  converge. More recent models of biased belief formation suggest that this result might hinge critically on who is providing
  the information. Consistent with the latter, we find that overall intensity of media use and level of education have at
  best a weak correlation with beliefs, while particular information sources have strong and divergent effects. Compared to
  those with little media exposure or schooling, individuals watching Arab news channels or educated in schools with little
  Western influence are less likely to agree that the September 11 attacks were carried out by Arab terrorists. Those exposed
  to media or education from Western sources are more likely to agree. Belief that the attacks were morally justified and
  general attitudes toward the US are also strongly correlated with source of information. These findings survive controls
  for demographic characteristics and are robust to identifying media effects using cross-country variation in language.
