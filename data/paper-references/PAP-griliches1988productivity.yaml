abstract: Around 1974-75, output growth and associated productivity measures dropped sharply in the United States and in most
  other western industrialized nations and continued at rather low rates for most of the rest of the 1970s. During the late
  1960s, the growth in research and development (R&amp;D) investment slowed down markedly (in constant dollars) and did not
  really recover until the late 1970s. Basic research was especially hard hit, showing a substantial absolute decline during
  the same period. Whether this slowdown in the investment in new technologies can account for the observed productivity slowdown
  is a fascinating question. I shall argue below that it cannot, at least not yet, since its effects take a long time to work
  themselves through the innovation and diffusion processes. The oil price hikes of the early and late 1970s and their macro-consequences
  are, therefore, the most likely direct causes of these pervasive declines in the growth rate of productivity.
