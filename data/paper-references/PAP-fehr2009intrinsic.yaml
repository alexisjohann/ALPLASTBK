summary:
  abstract_extended: 'This paper examines what happens when monitoring systems are removed. We show

    that removing monitoring can actually increase cooperation if it signals trust.

    The long-run effects depend on how the removal is perceived - as trust or

    as reduced enforcement capacity.'
  key_findings: "1. MONITORING REMOVAL EFFECTS\n   - Can increase cooperation\n   - Trust signaling mechanism\n   - Context-dependent\n\
    \n2. LONG-RUN DYNAMICS\n   - Initial increase possible\n   - Sustainability varies\n   - Culture development\n\n3. DESIGN\
    \ IMPLICATIONS\n   - Signal trust clearly\n   - Transition matters\n   - Build cooperative culture"
  ebf_relevance: '10C DIMENSIONS:

    - WHAT (C): Trust and cooperation

    - WHEN (V): Monitoring context

    - HOW (B): Trust-cooperation dynamics


    THEORY SUPPORT:

    - Trust signaling

    - Intrinsic motivation

    - Long-run organizational design


    KEY INSIGHT:

    Removing monitoring can enhance cooperation if it clearly signals trust;

    the key is how the change is perceived.'
