abstract: This paper reports experimental tests of two alternative explanations of how players use focal points to select
  equilibria in one-shot coordination games. In the picking treatment, participants select any boy's name; in the coordination
  treatment, they must match a random partner's selection. The name 'John' was given in only 9% of picking responses but 50%
  of coordination responses, demonstrating that salience in coordination differs from individual preference. The findings
  show that focal points transcend the mathematical structure of games and emerge from sources of information known to both
  players.
