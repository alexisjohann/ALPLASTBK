abstract: 'This paper provides a guide to the burgeoning literature on the economics of social media.
  We first define social media platforms and highlight their unique features. We then synthesize the main
  lessons from the empirical economics literature, organized around three stages of the life cycle of
  content: (i) production, (ii) distribution, and (iii) consumption.'
