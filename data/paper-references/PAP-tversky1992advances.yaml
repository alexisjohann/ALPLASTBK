summary:
  abstract_extended: "This paper presents CUMULATIVE PROSPECT THEORY (CPT), an extension of\nProspect Theory (1979) that applies\
    \ to uncertain as well as risky prospects\nwith any number of outcomes.\n\nKEY INNOVATIONS:\n1. CUMULATIVE PROBABILITY\
    \ WEIGHTING: Weights are applied to cumulative\n   rather than individual probabilities, avoiding violations of stochastic\n\
    \   dominance that could occur in the original formulation.\n\n2. RANK-DEPENDENT WEIGHTING: Outcomes are ranked, and probability\
    \ weights\n   depend on the rank position—more extreme outcomes receive more weight.\n\n3. SEPARATE FUNCTIONS FOR GAINS\
    \ AND LOSSES: Different probability weighting\n   functions w⁺(p) for gains and w⁻(p) for losses.\n\nCANONICAL PARAMETERS\
    \ (Median estimates from experimental data):\n- Loss aversion: λ = 2.25\n- Value function curvature (gains): α = 0.88\n\
    - Value function curvature (losses): β = 0.88\n- Probability weighting (gains): γ = 0.61\n- Probability weighting (losses):\
    \ δ = 0.69\n\nVALUE FUNCTION: v(x) = x^α for gains, v(x) = -λ(-x)^β for losses\n\nPROBABILITY WEIGHTING: w(p) = p^γ /\
    \ [p^γ + (1-p)^γ]^(1/γ)\nThis function overweights small probabilities and underweights large ones."
  key_findings: '1. Cumulative weighting resolves stochastic dominance violations

    2. Canonical parameters: λ=2.25, α=β=0.88, γ=0.61, δ=0.69

    3. Probability weighting differs for gains vs. losses

    4. Model applies to continuous distributions, not just discrete

    5. Rank-dependence explains observed patterns in lottery choice

    6. Foundation for modern behavioral economics parameter estimation'
