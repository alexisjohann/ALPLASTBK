abstract: This paper focuses on the role of Medicaid, the public health insurance program for low income populations, as a
  means of reducing uninsurance among uninsured women and children. The author discusses the structure of the Medicaid program
  and recent findings of its effects on insurance status, medical utilization, and health. He concludes that public insurance
  can be a cost-effective tool for reducing uninsurance and improving health, but only if eligibility is targeted to populations
  in need of insurance; expansions up the income scale should be accompanied by other program features that minimize substitution
  of private insurance, such as cost-sharing.
