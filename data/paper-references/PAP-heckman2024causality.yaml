frameworks_comparison:
  econometric:
    basis: Thought experiments (hypothetical worlds)
    founders:
    - Frisch (1930s)
    - Haavelmo (1940s)
    - Cowles Commission
    key_operation: Fixing mechanisms
    policy_questions:
    - P1
    - P2
    - P3
    - P4
    strengths:
    - Can answer all four policy questions
    - Allows for general equilibrium effects
    - Handles selection on unobservables
    limitations:
    - Requires stronger structural assumptions
    - Models may be misspecified
  neyman_rubin:
    basis: Potential outcomes from randomized experiments
    founders:
    - Neyman (1923)
    - Rubin (1974)
    key_operation: Switching treatment assignment
    policy_questions:
    - P1
    - P2
    strengths:
    - Clear identification in RCTs
    - Minimal assumptions for internal validity
    limitations:
    - Cannot answer P3, P4 without additional structure
    - SUTVA assumption often violated
    - Limited external validity
  pearl_do_calculus:
    basis: Directed Acyclic Graphs (DAGs)
    founders:
    - Pearl (2000)
    key_operation: do() operator
    policy_questions:
    - P1
    - P2
    - Partial P3
    strengths:
    - Visual representation of causal structure
    - Algorithmic identification criteria
    limitations:
    - Nonparametric by design
    - Cannot handle simultaneity
    - Limited for policy forecasting
formulas:
  generalized_roy:
    outcome_equation: Y = D * Y_1 + (1-D) * Y_0
    selection_rule: D = 1[V > 0]
    potential_outcomes:
      treated: Y_1 = mu_1(X) + U_1
      untreated: Y_0 = mu_0(X) + U_0
    choice_index: V = mu_V(Z) - epsilon
  treatment_effects:
    ATE: E[Y_1 - Y_0]
    TT: E[Y_1 - Y_0 | D = 1]
    TUT: E[Y_1 - Y_0 | D = 0]
    MTE: E[Y_1 - Y_0 | V = v]
    LATE: E[Y_1 - Y_0 | Compliers]
  identification_strategies:
    IV: Cov(Z, Y) / Cov(Z, D) under exclusion restriction
    matching: E[Y | D=1, X] - E[Y | D=0, X] under selection on observables
    control_function: Include E[U | V] as regressor
    diff_in_diff: Parallel trends assumption
