foundational_justification: "This paper provides the epistemological foundation for the entire EBF\nmethodology. It justifies:\n\
  \n1. WHY EBF uses structural parameters (λ, β, γ) instead of treatment effects\n   → Only structural parameters are policy-invariant\
  \ (P4 requires this)\n\n2. WHY context (Ψ) matters for causal inference\n   → Context = which mechanisms are fixed in the\
  \ thought experiment\n\n3. WHY EBF can answer P3 (forecast) and P4 (new policy) questions\n   → Structural models required;\
  \ RCTs/DAGs insufficient\n\n4. WHY the 10C framework is organized around mechanisms\n   → Each CORE dimension specifies\
  \ a mechanism to fix or vary\n"
core_contribution: 'Establishes thought experiments as the foundation of econometric causality,

  distinguishing the Frisch-Haavelmo tradition from Neyman-Rubin potential outcomes

  and Pearl''s Do-Calculus. Argues that only structural econometric models can

  answer all four fundamental policy questions (P1-P4).

  '
