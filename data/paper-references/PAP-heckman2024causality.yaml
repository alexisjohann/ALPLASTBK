abstract: 'This paper examines the econometric causal model and the interpretation of empirical evidence based on thought
  experiments that was developed by Ragnar Frisch and Trygve Haavelmo. We compare the econometric causal model with two currently
  popular causal frameworks: the Neyman-Rubin causal model and the Do-Calculus. The Neyman-Rubin causal model is based on
  the language of potential outcomes and was largely developed by statisticians. The Do-Calculus, developed by Judea Pearl
  and co-authors, relies on Directed Acyclic Graphs (DAGs) and is a popular causal framework in computer science. We make
  the case that economists who uncritically use these frameworks often discard the substantial benefits of the econometric
  causal model to the detriment of more informative analyses.'
