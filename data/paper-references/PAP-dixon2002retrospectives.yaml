abstract: This paper traces the origin and use of the term “captains of industry.” Introduced by the Scottish historian and
  essayist Thomas Carlyle in the midnineteenth century, its meanings and associations were very different from today. For
  Carlyle, they were ferocious instruments of social control who would force the unemployed and idle to work and, if necessary,
  discipline them. The term, if not the meaning, rapidly entered the popular lexicon. It was brought into economics by Francis
  Walker, the first president of the AEA, who argued that the captain of industry was a fourth factor of production and the
  engine of industrial progress. While many other writers shared this view, Veblen did not.
