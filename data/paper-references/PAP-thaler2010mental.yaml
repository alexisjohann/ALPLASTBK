abstract: This work extends mental accounting theory to examine how individuals allocate effort across different tasks and
  domains. Building on the planner-doer framework, the analysis explores how mental budgets for effort - not just money -
  influence productivity and self-control. The research investigates how people categorize effort expenditures into separate
  mental accounts, leading to non-fungibility of effort across domains and potentially suboptimal effort allocation patterns
  that deviate from standard economic predictions.
