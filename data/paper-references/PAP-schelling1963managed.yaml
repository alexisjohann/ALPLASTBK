abstract: The internal political life of Turkey since the revolution of 1960 JL has been beset by military coups and conflicts
  between political parties and social groups far more frequent and intensive than might normally be expected in a post-revolutionary
  period. This unrest contrasts sharply with the political stability which prevailed before 1960, and comes after a series
  of constitutional changes intended to establish a better system for orderly change and control of government.
