abstract: We consider bargaining problems between one buyer and one seller for a single object. The seller's valuation and
  the buyer's valuation for the object are assumed to be independent random variables, and each individual's valuation is
  unknown to the other. We characterize the set of allocation mechanisms that are Bayesian incentive compatible and individually
  rational, and show the general impossibility of ex post efficient mechanisms without outside subsidies. For a wide class
  of problems we show how to compute mechanisms that …
