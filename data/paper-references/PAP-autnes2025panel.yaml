abstract: 'The AUTNES Online Panel Study 2017–2024 waves were scheduled around key elections

  to capture shifts in attitudes and behaviors. The study covers the 2017 parliamentary

  election (rightward shift, ÖVP-FPÖ coalition), the 2022 presidential election, and

  the 2024 European Parliament and parliamentary elections from which FPÖ emerged as

  leading party.

  '
