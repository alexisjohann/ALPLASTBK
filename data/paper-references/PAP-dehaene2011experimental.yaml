abstract: 'Recent experimental studies and theoretical models have begun to address the challenge of establishing a causal
  link between subjective conscious experience and measurable neuronal activity. This review focuses on how an external or
  internal piece of information goes beyond nonconscious processing and gains access to conscious processing, characterized
  by the existence of a reportable subjective experience. Converging neuroimaging and neurophysiological data point to objective
  neural measures of conscious access: late amplification of relevant sensory activity, long-distance cortico-cortical synchronization
  at beta and gamma frequencies, and ignition of a large-scale prefronto-parietal network. The paper compares these findings
  to the Global Neuronal Workspace model according to which conscious access occurs when incoming information is made globally
  available to multiple brain systems.'
