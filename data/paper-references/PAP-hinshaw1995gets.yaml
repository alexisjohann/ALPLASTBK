abstract: The dominance of the AEA program by leading research universities declined substantially over the past four decades,
  but they have maintained their share of papers published in the Papers and Proceedings issue of the Americn Economic Review.
  Their share of pages in three highly regarded refereed journals declined modestly over the same period. Sporadic contributors
  do not seem to be working their way much further into the Papers and Proceedings over time, although they have gained greater
  access to the AEA program. Sporadic contributors, however, also did not publish much more in leading refereed journals in
  the 1980s than in the 1950s.
