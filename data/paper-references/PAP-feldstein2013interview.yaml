abstract: 'Martin Feldstein interviewed Paul Volcker in Cambridge, Massachusetts, on July 10, 2013, as part of a conference
  at the National Bureau of Economic Research on “The First 100 Years of the Federal Reserve: The Policy Record, Lessons Learned,
  and Prospects for the Future.” Volcker was Chairman of the Board of Governors of the Federal Reserve System from 1979 through
  1987. Before that, he served stints as President of the Federal Reserve Bank of New York from 1975 to 1979, as Deputy Undersecretary
  for International Affairs in the US Department of the Treasury from 1969 to 1974, as Deputy Undersecretary for Monetary
  Affairs in the Treasury from 1963 to 1965, and as an economist at the Federal Reserve Bank of New York from 1952 to 1957.
  He has led and served on a wide array of commissions, including chairing the President''s Economic Recovery Advisory Board
  from its inception in 2009 through 2011.'
