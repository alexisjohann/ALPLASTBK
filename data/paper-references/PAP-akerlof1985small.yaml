abstract: 'This paper concerns the robustness of economic equilibria in familiar economic models. It addresses the question
  whether a small amount of nonmaximizing behavior by agents is capable of causing changes in the equilibrium of the system
  which are an order of magnitude larger than the losses due to nonmaximization by the individual agents them-selves.

  For some, it would be reassuring to find that the results of models based on maximizing behavior continue to hold as an
  approximation when the assumption of strict maximization is relaxed just slightly. It is, after all, difficult to believe
  that agents literally maximize all the time. People may suffer from inertia.(Or, alternatively stated, they may have some
  small transactions costs in changing their actions.) They may also rely on rules of thumb which produce acceptable results
  on the average. So most economic theory based on strict maximization is useful when accompanied with the folk theorem that
  the results of this theory are approximately correct if the deviations from optimality (or the transactions cost of decision
  making) are small.'
