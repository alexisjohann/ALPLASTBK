summary:
  abstract_extended: 'People are reciprocal if they reward kind actions and punish unkind ones. In

    this paper the authors present a formal theory of reciprocity. It takes into

    account that people evaluate the kindness of an action not only by its

    consequences but also by its underlying intention.


    The theory is in line with the relevant stylized facts of a wide range of

    experimental games, such as the ultimatum game, the gift-exchange game, a

    reduced best-shot game, the dictator game, the prisoner''s dilemma, and public

    goods games.


    Furthermore, it predicts that identical consequences trigger different

    reciprocal responses in different environments. Context matters for reciprocity -

    the same outcome may be perceived as kind or unkind depending on available

    alternatives and perceived intentions.'
  key_findings: "1. INTENTION MATTERS: Kindness evaluated by both consequences AND underlying\n   intentions\n\
    \n2. CONTEXT DEPENDENCE: Same consequence triggers different responses in\n   different environments\n\
    \n3. UNIFIED FRAMEWORK: Explains behavior across ultimatum, gift-exchange,\n   dictator, PD, and public\
    \ goods games\n\n4. FORMAL MODEL: Mathematical formalization of reciprocity with testable\n   predictions\n\
    \n5. PUNISHMENT AND REWARD: People both punish unkindness and reward kindness\n   at personal cost\n\
    \n6. ALTERNATIVE-BASED: Kindness perception depends on what other options were\n   available"
