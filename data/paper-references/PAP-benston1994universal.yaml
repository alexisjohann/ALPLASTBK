abstract: Universal banks can offer the entire range of financial services within the bank or through subsidiaries. Most countries
  permit universal banking. In contrast, the United States is served only by specialized banks. Universal banking, particularly
  in Germany, is contrasted with specialized banking with respect to their effect on financial stability, economic development,
  other financial institutions, concentration of political and economic power, consumer choice, and conflicts of interest.
  This examination, including a review of relevant empirical studies, leads to the conclusion that universal banking offers
  many benefits and few costs to U.S. consumers.
