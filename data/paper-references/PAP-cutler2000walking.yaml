abstract: 'A central controversy in the debate about Medicare is whether the program spends too much money or whether instead
  it should be expanded to cover more. I consider the value of increased Medicare spending. I argue that on average Medicare
  spending is worth it: the health gains brought by medicare have been greater than their cost. At the margin, however, services
  are overused and have low value. Medicare reforms need to promote the high average value of care while eliminating care
  of low value. Many of the proposed reforms fall short of this goal.'
