abstract: History is replete with examples of spectacular ascents of family businesses. Yet there are also numerous accounts
  of family businesses brought down by bitter feuds among family members, disappointed expectations between generations, and
  tragic sagas of later generations unable to manage their wealth. A large fraction of businesses throughout the world are
  organized around families. Why are family firms so prevalent? What are the implications of family control for the governance,
  financing and overall performance of these businesses?
