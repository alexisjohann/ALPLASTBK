summary:
  abstract: 'This paper estimates the causal effect of immigration on housing costs
    in Switzerland using the 2002 Agreement on Free Movement of Persons (AFMP) as
    a natural experiment in an instrumental variable framework. Across 106 Swiss labor
    markets from 1998-2016, a 1 percentage point increase in the foreign population
    share raises single-family home prices by 4.3%, apartment prices by 5.9%, and
    rents by 7.4%. These results quantify the housing market externalities of immigration
    and validate concerns about crowding costs.

    '
