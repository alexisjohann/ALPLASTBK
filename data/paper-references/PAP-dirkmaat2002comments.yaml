abstract: To be considered for publication in the Comments section, letters should be relatively short—generally fewer than
  1000 words—and should be sent to the journal offices at the address appearing inside the front cover. The editors will choose
  which letters will be published. All published letters will be subject to editing for style and length. In what follows,
  Joop Dirkmaat of Elsevier Science and Robert E. Kohn of Southern Illinois University at Edwardsville comment on Theodore
  C. Bergstrom's article, “Free Labor for Costly Journals,” from the Fall 2001 issue. Bergstrom then responds.
