abstract: 'The United States consumes more petroleum-based liquid fuel per capita than any other OECD high-income country—30
  percent more than the second-highest country (Canada) and 40 percent more than the third-highest (Luxembourg). The transportation
  sector accounts for 70 percent of U.S. oil consumption and 30 percent of U.S. greenhouse gas emissions. Taking the externalities
  associated with high U.S. gasoline consumption as largely given, I focus on understanding the policy tools that seek to
  reduce this consumption. I consider four main channels through which reductions in U.S. oil consumption might take place:
  1) increased fuel economy of existing vehicles, 2) increased use of non-petroleum-based, low-carbon fuels, 3) alternatives
  to the internal combustion engine, and 4) reduced vehicle miles traveled. I then discuss how these policies for reducing
  petroleum consumption compare with the standard economics prescription for using a Pigouvian tax to deal with externalities.
  Taking into account that energy taxes are a political hot button in the United States, and also considering some evidence
  that consumers may not “correctly” value fuel economy, I offer some thoughts about the margins on which policy aimed at
  reducing petroleum consumption might usefully proceed.'
