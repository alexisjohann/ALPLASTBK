abstract: Over the last three decades, macroeconomic theory and the practice of macroeconomics by economists have changed
  significantly—for the better. Macroeconomics is now firmly grounded in the principles of economic theory. We focus on the
  role of economic theory in shaping policy. Over the last several decades, the United States and other countries have undertaken
  a variety of policy changes that are precisely what macroeconomic theory of the last 30 years suggests. The evidence that
  theoretical advances have had a significant effect on the practice of policy is often hard to see for policymakers and advisers
  involved in the hurly-burly of day-to-day policymaking, but easy to see if one steps back and takes a longer-term perspective.
  Examples of the effects of theory on the practice of policy include increased central bank independence; adoption of inflation
  targeting and other rules to guide monetary policy; increased reliance on consumption and labor taxes instead of capital
  income taxes; and increased awareness of the costs of policies that distort labor markets.
