abstract: This note describes a numerical simulation of a model of economic growth, a simplified version of Robert Tamura's
  (1996) model of world income dynamics, based on technology diffusion. The model makes predictions for trends in average
  world income growth and about the evolution of the relative income distribution that accord well with observation. The model
  is used to forecast the course of world income growth and income inequality over the century to come.
