summary:
  abstract_extended: 'This paper examines whether market integration undermines reciprocal behavior.

    Contrary to concerns that markets erode social preferences, we show that

    market participation and reciprocity can coexist.'
  key_findings: "1. MARKET EFFECTS\n   - Markets don't eliminate reciprocity\n   - Some crowding out possible\n   - Context\
    \ matters\n\n2. EMPIRICAL EVIDENCE\n   - Cross-cultural studies\n   - Market exposure effects\n   - Selection vs. treatment\n\
    \n3. THEORETICAL RECONCILIATION\n   - Smith on sympathy\n   - Self-interest and cooperation\n   - Institutional design"
  ebf_relevance: '10C DIMENSIONS:

    - WHAT (C): Reciprocity under market exposure

    - WHEN (V): Market integration context

    - HOW (B): Market-reciprocity interaction


    THEORY SUPPORT:

    - MS-SR-001: Strong Reciprocity

    - Market sociology

    - JEP overview


    KEY INSIGHT:

    Market integration does not destroy reciprocity; Smithian self-interest

    and prosocial behavior coexist when institutions support both.'
