summary:
  abstract_extended: 'This paper examines how inequality and fairness perceptions affect economic

    behavior and rent-seeking. We show that perceived unfairness of inequality

    can lead to destructive rent-seeking behavior, reducing efficiency.

    Understanding these dynamics is crucial for institutional design.'
  key_findings: "1. INEQUALITY AND BEHAVIOR\n   - Unfair inequality triggers reactions\n   - Rent destruction possible\n \
