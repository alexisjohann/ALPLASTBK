abstract: The authors asked the world's leading economists to describe instances in which journals rejected their articles.
  More than sixty essays, by a broadly diverse group that includes fifteen Nobel Prize winners, indicate that most have suffered
  publication rejection, often frequently. Indeed, journals have rejected many papers that later became classics. The authors
  discuss the prize-winners’ experiences, other notable cases, and rejections by John Maynard Keynes when he edited the Economic
  Journal. Finally, they search in economists’ almost universal experience of rejection for patterns and lessons about the
  publication process.
