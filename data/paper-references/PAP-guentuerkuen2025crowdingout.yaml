  10c_dimensions:
    WHO: 'Multiple populations studied:

      1. Potential organ donors (general population)

      2. Living donors: Altruistic (to strangers) vs Familial (to family/friends)

      3. Policymakers (default architecture designers)

      Key finding: Effect heterogeneity - altruistic donors affected, familial donors
      not

      '
    WHAT: 'Two donation types with different utility structures:

      - Deceased donation: u_S (social norm) + u_IDN (identity) - relatively unaffected
      by supply perception

      - Living donation: u_S + u_IDN + CONDITIONAL on perceived need

      Crowding-out mechanism: Supply sufficiency perception reduces perceived marginal
      utility of living donation

      '
    HOW: 'Critical interaction effect (γ < 0):

      - Default (WHEN) × Living Donation (WHAT) = NEGATIVE interaction

      - γ(default, living_donation) ≈ -0.29 (crowding-out coefficient)

      Policy implication: Defaults designed for one behavior can negatively affect
      related behaviors

      '
    WHEN: 'Default architecture (Ψ_I) as key context factor:

      - Opt-in: Individual must actively register → signals organ shortage

      - Opt-out: Individual automatically registered → signals sufficient supply

      Timing matters: Effect persistent over 23-year period (2000-2023)

      '
    WHERE: 'Field data: 24 countries (2000-2023)

      - 14 opt-out countries (presumed consent)

      - 10 opt-in countries (explicit consent)

      Experimental data: 4 studies, N > 5,000 subjects

      Geographic coverage: Europe, Americas, Oceania

      '
    AWARE: 'Supply Sufficiency Perception (κ_AWX):

      - Under opt-out: People perceive "everyone donates by default" → supply sufficient

      - Under opt-in: People perceive active choice required → supply may be insufficient

      This perception MEDIATES the crowding-out effect

      '
    READY: 'Donation readiness varies by type:

      - Deceased: Decision made in abstract (future self)

      - Living: Decision requires active sacrifice now

      Opt-out reduces READINESS for living donation by reducing perceived urgency

      '
    STAGE: 'Policy adoption stage analysis:

      - Pre-adoption: Baseline donation rates

      - Post-adoption: Immediate effect + long-term adaptation

      No evidence of habituation - crowding-out persists over time

      '
    HIERARCHY: 'Donation hierarchy affected:

      - Familial donation (to family): HIGH baseline, UNAFFECTED by default

      - Nondirected donation (to stranger): MEDIUM baseline, REDUCED by default

      - Altruistic donation (actively altruistic): LOWER baseline, MOST REDUCED

      '
    EIT: 'CRITICAL INTERVENTION INSIGHT:

      1. Defaults can CROWD OUT related behaviors not targeted

      2. Supply sufficiency perception is the mechanism

      3. Mitigation: Communicate ongoing need despite opt-out

      4. Policy design must consider behavioral spillovers

      '
