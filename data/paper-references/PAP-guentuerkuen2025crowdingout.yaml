key_findings:
- Opt-out defaults INCREASE deceased donations (+1.21 pmp, +7%, NOT statistically
  significant)
- Opt-out defaults DECREASE living donations (-4.59 pmp, -29%, P=0.026)
- Crowding-out is driven by ALTRUISTIC donations (β=-0.161**), NOT familial donations
  (β=-0.092 NS)
- Supply Sufficiency Perception mediates the crowding-out effect
- Unintended negative effect is AT LEAST as large as intended positive effect
- Effect persists over 23-year period (2000-2023)
- Replicated across 4 experiments (N>5,000)
