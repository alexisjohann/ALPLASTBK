abstract: 'In many countries, organ donation policies include opt-out defaults (presumed
  consent),

  in which individuals are automatically registered as donors unless they explicitly
  opt out.

  Such policies substantially affect the supply of organs from deceased donors. However,

  default policies may have unintended consequences for related behaviors not targeted
  by

  the default. We investigate if opt-out defaults affect living organ donations, where

  individuals donate an organ while alive. Combining field data from 24 countries
  from

  2000 to 2023 with experimental data from more than 5,000 subjects, we find that
  opt-out

  defaults increase deceased donations but substantially reduce living donations,
  with the

  unintended negative effect on living donations being at least as large in absolute
  terms

  as the intended positive effect on deceased donations. The effect is driven by a
  reduction

  in donations from altruistic donors to strangers, while donations from family members
  and

  friends are unaffected. Mediation analysis supports the hypothesis that opt-out
  defaults

  reduce living donations by inducing the perception that the supply of organs is
  sufficient.

  '
