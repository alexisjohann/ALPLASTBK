notes: 'CRITICAL PAPER FOR INTERVENTION DESIGN


  KEY CONTRIBUTION TO EBF:

  1. First rigorous evidence of default CROWDING-OUT on related behaviors

  2. Identifies SUPPLY SUFFICIENCY PERCEPTION as mediating mechanism

  3. Distinguishes altruistic vs familial donation responses

  4. Policy-relevant: 24 countries, 23-year panel + 4 experiments


  COUNTERINTUITIVE FINDINGS:

  1. Opt-out defaults can HARM overall organ supply

  2. Effect is OPPOSITE for different donation types

  3. Altruistic motivation is MOST vulnerable to crowding-out

  4. Familial motivation is ROBUST to default architecture


  METHODOLOGICAL STRENGTH:

  - Difference-in-differences with 24 countries

  - Instrumental variable estimation

  - 4 pre-registered experiments (N>5,000)

  - Mediation analysis for mechanism


