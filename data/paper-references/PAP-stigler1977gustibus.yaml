structural_characteristics:
  S1_research_question:
    available: true
    questions:
    - Can economic behavior be explained without invoking taste changes?
    - How can addiction be explained with stable preferences?
    - How can custom and tradition be explained with stable preferences?
    - How can advertising effects be explained without taste manipulation?
    - How can fashion and fads be explained with stable preferences?
    clarity: high
  S2_methodology:
    available: true
    approach: theoretical_formal
    methods:
    - Household production function framework
    - Shadow price analysis
    - Consumption capital accumulation model
    - Information capital and search cost analysis
    - Social interaction model for fashion
    key_definitions:
    - 'Commodity: Object of choice produced by households from market goods, time,
      and human capital'
    - 'Shadow price: πi = marginal cost of producing commodity i'
    - 'Consumption capital: Accumulated skill/experience affecting production efficiency'
    - 'Beneficial addiction: ∂Smj/∂Mj-v > 0 (consumption capital grows with exposure)'
    - 'Harmful addiction: ∂Shj/∂Hj-v < 0 (consumption capital depletes with exposure)'
    - 'Social distinction: Ri = Di + hi (environment + own contribution)'
  S3_sample_data:
    available: true
