  S4_findings:
    available: true
    key_findings:
    - finding: Addiction explained by consumption capital, not taste change
      section: III
    - finding: Beneficial addiction lowers shadow price with exposure
      equation: πm = w/MPtm - Aj
    - finding: Harmful addiction raises shadow price with exposure
      equation: πh = w/MPth + Aj
    - finding: Heroin addiction is RESULT of inelastic demand, not cause
      section: III
    - finding: Custom explained by information capital and search costs
      section: IV
    - finding: Young respond more to change due to investment incentives, not flexibility
      section: IV
    - finding: Advertising changes shadow prices, not tastes
      section: V
    - finding: Fashion explained as social distinction production
      section: VI
    - finding: Marginal revenue from advertising positively related to demand elasticity
      section: V
