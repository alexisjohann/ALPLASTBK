title: De Gustibus Non Est Disputandum
author: George J. Stigler and Gary S. Becker
year: '1977'
publication_type: journal_article
journal: American Economic Review
volume: '67'
number: '2'
pages: 76-90
abstract: 'The venerable admonition not to quarrel over tastes is commonly interpreted
  as

  advice to terminate a dispute when it has been resolved into a difference of

  tastes. This paper proposes a different interpretation: that tastes neither

  change capriciously nor differ importantly between people. On this interpretation,

  one does not argue over tastes for the same reason that one does not argue over

  the Rocky Mountains—both are there, will be there next year, too, and are the

  same to all men. The paper demonstrates that this approach, combined with

  household production theory, can explain addiction (both beneficial and harmful),

  custom and tradition, advertising effects, and fashion without assuming that

  tastes change. The key insight is that apparent taste changes are actually

  changes in shadow prices driven by consumption capital, information capital,

  and social distinction production.

  '
