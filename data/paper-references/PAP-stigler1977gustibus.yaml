key_contributions:
- Stable preferences hypothesis as analytical principle
- 'Household production function approach: U = U(Z1,...,Zm)'
- Shadow prices determined by production costs
- Consumption capital explains addiction without taste change
- Beneficial vs harmful addiction distinguished by capital accumulation sign
- Inelastic demand CAUSES addiction appearance, not vice versa
- Information capital explains custom and tradition
- Search costs justify habitual behavior
- Age differences explained by investment incentives, not flexibility
- Advertising changes prices, not tastes
- Fashion explained as social distinction production
- 'Methodological principle: search for price/income effects, not taste changes'
