paper: gaechter2016honesty
superkey: PAP-gaechter2016honesty
title: Intrinsic Honesty and the Prevalence of Rule Violations Across Societies
author: Gächter
year: '2016'
publication_type: journal_article
doi: 10.1038/nature17457
abstract: Deception is common in nature and humans are no exception. Modern societies have created institutions to control
  cheating, but many situations remain where only intrinsic honesty keeps people from cheating and violating rules. We present
  cross-societal experiments from 23 countries around the world that demonstrate a robust link between the prevalence of rule
  violations and intrinsic honesty. We developed an index of the prevalence of rule violations based on country-level data
  including corruption, tax evasion and fraudulent politics. We measured intrinsic honesty using an anonymous die-rolling
  experiment with 2,568 young participants. Individual intrinsic honesty is stronger in subject pools of low PRV countries
  than those of high PRV countries.
