abstract: 'Venture capital is associated with some of the most high-growth and influential firms in the world. Academics and
  practitioners have effectively articulated the strengths of the venture model. At the same time, venture capital financing
  also has real limitations in its ability to advance substantial technological change. Three issues are particularly concerning
  to us: 1) the very narrow band of technological innovations that fit the requirements of institutional venture capital investors;
  2) the relatively small number of venture capital investors who hold and shape the direction of a substantial fraction of
  capital that is deployed into financing radical technological change; and 3) the relaxation in recent years of the intense
  emphasis on corporate governance by venture capital firms. While our ability to assess the social welfare impact of venture
  capital remains nascent, we hope that this article will stimulate discussion of and research into these questions.'
