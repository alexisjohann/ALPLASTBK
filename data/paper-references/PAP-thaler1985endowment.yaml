abstract: This seminal Marketing Science paper introduces the concept of mental accounting - how people cognitively organize
  and evaluate financial activities. Thaler shows how consumers code gains and losses into separate mental accounts, leading
  to behaviors that deviate from standard economic theory. The paper establishes foundational principles including how transaction
  utility affects purchase decisions and how people mentally frame economic outcomes.
