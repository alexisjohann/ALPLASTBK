      key_insight: >
        Leadership style is the primary driver of employee engagement, which in
        turn drives performance. The charismatic → engagement → performance
        pathway has the strongest effect (total b=0.43, indirect b=0.15).
        This provides empirical validation for the Dur et al. (2020) theoretical
        prediction that friendly/inspirational leadership is most effective.
        The surprising finding that autocratic leadership also positively affects
        engagement through structure aligns with Dur's self-enforcement model:
        clear expectations CAN be engaging when they provide predictability.

