  notes: >
    Paper provides standardized SEM path coefficients from Malawian SME context.
    Key quantitative findings (all p < 0.001):

    LEADERSHIP → ENGAGEMENT:
    - Charismatic: b = 0.37 [95% CI: 0.29, 0.45]
    - Autocratic:  b = 0.24 [95% CI: 0.15, 0.33]
    - Democratic:  b = 0.15 [95% CI: 0.07, 0.23]

    LEADERSHIP → PERFORMANCE:
    - Charismatic: b = 0.43 [95% CI: 0.34, 0.52]
    - Democratic:  b = 0.22 [95% CI: 0.14, 0.30]
    - Autocratic:  b = 0.21 [95% CI: 0.13, 0.29]

    MEDIATION (Leadership → Engagement → Performance):
    - Charismatic: b = 0.15, z = 4.61 [95% CI: 0.10, 0.22]
    - Autocratic:  b = 0.10, z = 5.05 [95% CI: 0.07, 0.14]
    - Democratic:  b = 0.06, z = 3.26 [95% CI: 0.03, 0.10]

    ENGAGEMENT → PERFORMANCE: b = 0.41, p < 0.001

    Model fit: KMO = 0.871, N = 231, R2(engagement) = 0.336
    Bootstrapping: 5000 resamples

    CAVEAT: SME context in developing economy (Malawi). Path coefficients
    provide directional validation for Kaufland but should NOT be used as
    precise parameter estimates for German retail context. Evidence tier 3.

