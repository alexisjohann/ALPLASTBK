dur_et_al_2020_connection:
  theoretical_alignment: >
    Dur et al. (2020) provide the THEORETICAL model of leadership styles under
    labor-market conditions. Mphaluwa et al. (2025) provide EMPIRICAL path
    coefficients for the leadership → engagement → performance chain.
    Together they form a theory-evidence pair for KIBSM Section 9.
  mapping:
    charismatic_leadership: "Maps to Dur's 'friendly conditional (F)' style — praise-based"
    autocratic_leadership: "Maps to Dur's 'unfriendly conditional (U)' style — directive/punitive"
    democratic_leadership: "No direct Dur equivalent — participative dimension not modeled"
  key_validation: >
    Mphaluwa confirms Dur's prediction: friendly/charismatic leadership is
    MOST effective for both engagement and performance. But also shows that
    autocratic/directive leadership is not purely negative — it provides
    structure that can engage employees (especially in resource-constrained
    environments). This nuances Dur's sharp friendly/unfriendly dichotomy.

kaufland_relevance:
  kibsm_link: MOD-013
  relevant_for:
    - "Empirical validation: Leadership style → Engagement → Performance pathway"
    - "Charismatic/friendly leadership coefficients for KIBSM effectiveness modeling"
    - "Autocratic leadership not purely negative — structure provides engagement value"
    - "Employee engagement as measurable mediator for INT-K-002 effectiveness"
    - "FK-Akademie ROI estimation: Leadership improvement → quantifiable engagement gains"

  key_insights_for_kaufland:
    - insight: >
        The charismatic → performance path (b=0.43) is DOUBLE the autocratic → performance
        path (b=0.21). For Kaufland, this means investing in charismatic/inspirational
        leadership development (FK-Akademie) yields roughly 2x the performance return
        compared to maintaining directive/autocratic approaches. This quantifies the
        ROI of INT-K-005 (FK-Akademie).
      kibsm_element: "INT-K-005 FK-Akademie ROI estimation"

    - insight: >
        Employee engagement mediates 35% of the charismatic → performance effect
        (indirect 0.15 / total 0.43 = 35%). This means the People Experience survey
        (INT-K-001) that measures engagement is NOT just a diagnostic — it captures
        a causal mediator. Improving engagement scores IS improving performance.
      kibsm_element: "INT-K-001 PX-Survey as causal mediator measurement"

    - insight: >
        Autocratic leadership's positive engagement effect (b=0.24) suggests that
        Kaufland should NOT eliminate directive elements entirely. Clear structure
        and expectations (TUEV standards, HACCP protocols) provide engagement value.
        The optimal approach is charismatic PLUS structured — not charismatic INSTEAD
        OF structured.
      kibsm_element: "Leadership style portfolio — charismatic + structured hybrid"

    - insight: >
        The engagement → performance coefficient (b=0.41) provides a quantitative
        benchmark: each standard deviation improvement in engagement scores predicts
        0.41 SD improvement in performance. For Kaufland's measurement framework,
        this enables conversion of engagement survey gains into expected performance gains.
      kibsm_element: "Measurement framework — engagement-to-performance conversion factor"

