abstract: >
  Cross-sectional SEM study of 231 employees in Malawian private SMEs examining
  how transformational, democratic, and autocratic leadership styles influence
  employee engagement and performance. Charismatic leadership had the strongest
  positive impact on both engagement (b=0.37) and performance (b=0.43), followed
  by democratic and autocratic styles. Employee engagement significantly mediates
  all three leadership-performance pathways. Surprisingly, autocratic leadership
  positively impacts both engagement (b=0.24) and performance (b=0.21) by
  providing structure and clarity. Bootstrapping with 5000 resamples confirms
  mediation effects. Study draws on Transformational Leadership Theory, LMX
  Theory, Self-Determination Theory, Goal-Setting Theory, and Social Exchange
  Theory.
