abstract: 'This paper develops a dynamic model of the cognitive division of labour within firms. A continuum of questions
  arrive over time, and each must be assigned either to an expert or to a routine worker. Routine workers exploit codified
  knowledge by interpolating between previously solved problems, while experts possess tacit knowledge and can either address
  the current question or conduct research to create new knowledge point. The manager chooses whether to use experts to handle
  current issues (exploitation) or to invest in knowledge creation (exploration), taking into account the endogeneity of the
  knowledge base and the evolving organisational structure. The analysis shows that organisations initially expand by adding
  distant knowledge points, then transition to a refinement phase in which they fill gaps between existing anchors. We derive
  conditions under which organisational performance exhibits an S-shaped trajectory versus concave growth. Finally, we consider
  the adoption of artificial intelligence, distinguishing interpolation AI, which improves routine workers'' precision, from
  application AI, which lowers the cost of expert operations. The two technologies have opposite comparative statics: improving
  interpolation raises the value of exploration and hastens routinisation, whereas lowering expert costs crowds out research.
  These results offer new predictions about the allocation of cognitive tasks and the impact of AI on organisational learning.'
