abstract: The United States has been experiencing a slowdown in measured labor productivity growth since 2004. A number of
  commentators and researchers have suggested that this slowdown is at least in part illusory because real output data have
  failed to capture the new and better products of the past decade. I conduct four disparate analyses, each of which offers
  empirical challenges to this “mismeasurement hypothesis.” First, the productivity slowdown has occurred in dozens of countries,
  and its size is unrelated to measures of the countries' consumption or production intensities of information and communication
  technologies (ICTs, the type of goods most often cited as sources of mismeasurement). Second, estimates from the existing
  research literature of the surplus created by internet-linked digital technologies fall far short of the $3 trillion or
  more of “missing output” resulting from the productivity growth slowdown. Third, if measurement problems were to account
  for even a modest share of this missing output, the properly measured output and productivity growth rates of industries
  that produce and service ICTs would have to have been multiples of their measured growth in the data. Fourth, while measured
  gross domestic income has been on average higher than measured gross domestic product since 2004—perhaps indicating workers
  are being paid to make products that are given away for free or at highly discounted prices—this trend actually began before
  the productivity slowdown and moreover reflects unusually high capital income rather than labor income (i.e., profits are
  unusually high). In combination, these complementary facets of evidence suggest that the reasonable prima facie case for
  the mismeasurement hypothesis faces real hurdles when confronted with the data.
