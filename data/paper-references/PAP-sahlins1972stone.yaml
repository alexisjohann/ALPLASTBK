abstract: Stone Age Economics is a classic of economic anthropology, ambitiously tackling
  the nature of economic life and how to study it comparatively. This collection of
  six influential essays is one of Marshall Sahlins' most important and enduring works,
  claiming that stone age economies formed the original affluent society. The book
  examines notions of production, distribution and exchange in early communities and
  examines the link between economics and cultural and social factors. This edition
  includes a new foreword by the author.
