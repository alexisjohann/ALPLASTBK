abstract: With a foreword by Richard Thaler, winner of the Nobel Prize in Economics!
  New Updated Edition, 2019. Dr David Halpern, behavioural scientist and head of the
  government's Behavioural Insights Team, or Nudge Unit, invites you inside the unconventional,
  multi-million pound saving initiative that makes a big difference through influencing
  small, simple changes in our behaviour. Using the application of psychology to the
  challenges we face in the world today, the Nudge Unit is pushing us in the right
  direction. This is their story.
