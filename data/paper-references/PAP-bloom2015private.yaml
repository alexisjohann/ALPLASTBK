abstract: Using an innovative survey measure of management practices on over 15,000 firms, we find private equity firms are
  better managed than government, family, and privately owned firms, and have similar management to publicly listed firms.
  This is true both in developed and developing countries. Looking at management practices in detail we find that private
  equity owned firms have strong people management practices (hiring, firing, pay, and promotions), but even stronger monitoring
  management practices (lean manufacturing, continuous improvement, and monitoring). Plant managers working in private equity
  owned firms also report greater autonomy from headquarters over sales, marketing, and new product introduction.
