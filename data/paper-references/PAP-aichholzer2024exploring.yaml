abstract: |
  This analysis explores how the main components of radical right-wing populism—populist,
  nativist, and authoritarian attitudes—relate to both a general conspiracy mentality and
  specific conspiracy theories prevalent in political discourse. Using data from an original
  2023 online survey conducted in Austria, the analyses reveal that all main components are
  positively associated with different conspiracy beliefs, albeit to varying degrees.
