abstract: This study examines the validity of the complex problem solving (CPS) test MicroDYN by investigating a) the relation
  between its dimensions–rule identification (exploration strategy), rule knowledge (acquired knowledge), rule application
  (control performance)–and working memory capacity (WMC), and b) whether CPS predicts school grades in different domains
  beyond WMC. A sample of n= 393 German high school students (age M= 17.07, SD= 1.12) completed the computer-based tests Memory
  Updating Numerical and the CPS scenario …
