abstract: This paper explores a judgmental heuristic in which a person evaluates the frequency of classes or the probability
  of events by availability—the ease with which relevant instances come to mind. In general, availability is correlated with
  ecological frequency, but it is also affected by other factors. Consequently, reliance on the availability heuristic leads
  to systematic biases. Such biases are demonstrated in judged frequency of classes of words, combinatorial outcomes, and
  repeated events. The phenomenon of illusory correlation is explained as an availability bias. Published in Cognitive Psychology.
