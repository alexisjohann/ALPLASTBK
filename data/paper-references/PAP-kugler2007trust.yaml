abstract: We compare the behavior of groups and individuals in a two-person trust game. The first mover in this game, the
  sender, receives an endowment and can send any part of it to the responder; the amount sent is tripled, and the responder
  can then return to the sender any portion of the tripled sum. In a 2× 2 design, the players in the roles of sender and responder
  are either individuals or groups of three players (who conduct face-to-face discussions to decide on a collective group
  strategy). We find that groups in the role of sender send smaller …
