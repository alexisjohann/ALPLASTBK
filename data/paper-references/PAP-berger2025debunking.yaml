comparison_to_list2024:
  differences:
  - List uses video, Berger uses text-based tips
  - 'List: Colombian election, Berger: German pandemic'
  - List tests intervention complementarity, Berger tests intervention comparison
  similarities:
  - Both test demand-side interventions
  - Both find critical thinking > passive intervention
  - Both find persistent effects
  synthesis: 'Together suggest that activating System 2 thinking (whether through video

    or tips) is more effective than providing correct information passively.

    Supports MS-CT-001 (Critical Thinking) and MS-DT-001 (Dual Process Theory).

    '
doi: 10.1016/j.jpubeco.2025.105345
ebf_relevance:
  core_dimensions:
  - CORE-AWARE
