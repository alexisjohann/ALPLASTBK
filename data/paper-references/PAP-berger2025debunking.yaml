  - CORE-WHAT
  - CORE-WHO
  key_insight: 'Critical mechanism difference: Media literacy raises ATTENTION and enables

    ACTIVE critical evaluation, while fact-checking turns participants into

    PASSIVE recipients of information. This explains why literacy has broader,

    more persistent effects.


    For EBF: γ(literacy, attention) > 0 because literacy enhances A(·) function.

    Complementarity between AWARE and HOW dimensions.


    Policy implication: Media literacy is cheap, scalable, easy-to-implement,

    and more effective than targeted fact-checking for general misinformation.

    '
