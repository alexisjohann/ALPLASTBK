abstract: The theory presented in this paper ties together profits, investment, credit, stock prices, inflation, and interest
  rates. The author discusses new estimates of profit and investment functions with important roles for growth and demand
  and productivity, price and cost levels, risk perception, credit volume, and credit difficulties. The relationships among
  these endogenous variables are viewed as constituting an enduring core of business cycles, the exogenous shocks and policy
  effects as more transitory and peripheral.
