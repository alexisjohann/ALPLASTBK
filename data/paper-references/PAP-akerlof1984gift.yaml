abstract: 'My earlier paper (1982) viewed the labor contract as a" partial gift exchange." According to this view some firms
  willingly pay workers in excess of the market-clearing wage; in return they expect workers to supply more effort than they
  would if equivalent jobs could be readily obtained (as is the case if wages are just at market clearing). This partial gift
  exchange hypothesis is one of several efficiency-wage theories which explain why wages exceed market clearing, or alternatively
  stated, why there is involuntary unemployment. This paper gives some further commentary on partial gift exchange. A complementary
  paper in this issue (Janet Yellen, 1984) reviews these efficiency-wage models in general.

  If there is involuntary unemployment in an equilibrium situation, it must be that firms, for some reason or other, wish
  to pay more than the market-clearing wage. And that is the heart of any efficiency-wage theory. Yet there is a natural reason
  why economists have hitherto resisted the application of efficiency-wage theories to unemployment in developed countries.
  A view that any buyer should willingly pay more than necessary to any seller seems highly counterintuitive in the paradigm
  of standard economics, which is that of supply and demand. The purpose of this paper is to show that in the context of four
  other paradigms of the labor market, such wage-setting behavior is in fact natural. Furthermore, the literature in each
  of these'
