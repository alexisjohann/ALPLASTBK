abstract: 'Has the U.S. liability system run amok? Many commentators feel it has, as do many executives who feel that the
  liability “tax” discourages innovation and ultimately fails to promote safety. On the other hand, economists have ceaselessly
  pointed out that when one party is made liable for injury caused to another, an externality has been internalized. This
  symposium is intended to clarify just what economists know about the U.S. liability system: its worth as well as its flaws.
  The resulting picture is not a pretty one. Often liability is imposed on injurers as a means of compensating and insuring
  victims, despite the fact that such compensation and insurance could be accomplished much more effectively using direct
  accident insurance. Liability is an expensive means of providing compensation, since the legal liability system involves
  large transaction costs, mainly in the form of litigation expenses. Overall, America''s institutions for assigning liability
  are poorly designed to promote economic efficiency.'
