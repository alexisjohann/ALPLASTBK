summary:
  abstract: 'This article examines how organizations can be designed to foster dynamic
    capabilities. Using Valve Corporation as a primary case study, the authors argue
    that traditional hierarchical organizations systematically suppress individual-level
    dynamic capabilities. They propose organizational design principles based on polyarchy
    (distributed authority), open allocation (self-selection into projects), and minimal
    hierarchy that enable individual initiative and organizational adaptability.

