abstract: The last decade has seen a strident public debate about the principle of “net neutrality.” The economic literature
  has focused on two definitions of net neutrality. The most basic definition of net neutrality is to prohibit payments from
  content providers to internet service providers; this situation we refer to as a one-sided pricing model, in contrast with
  a two-sided pricing model in which such payments are permitted. Net neutrality may also be defined as prohibiting prioritization
  of traffic, with or without compensation. The research program then is to explore how a net neutrality rule would alter
  the distribution of rents and the efficiency of outcomes. After describing the features of the modern internet and introducing
  the key players, (internet service providers, content providers, and customers), we summarize insights from some models
  of the treatment of internet traffic, framing issues in terms of the positive economic factors at work. Our survey provides
  little support for the bold and simplistic claims of the most vociferous supporters and detractors of net neutrality. The
  economic consequences of such policies depend crucially on the precise policy choice and how it is implemented. The consequences
  further depend on how long-run economic trade-offs play out; for some of them, there is relevant experience in other industries
  to draw upon, but for others there is no experience and no consensus forecast.
