abstract: This book examines how private individuals and public officials might best respond to low-probability risks of disaster,
  including nuclear bombs, anthrax attacks, tsunamis, meteors, avian flu, and extreme temperatures. Sunstein explores how
  to navigate between willful inaction and reckless overreaction, emphasizing the need to know what we will lose from precautions
  as well as from inaction. The analysis offers an understanding of the uses and limits of cost-benefit analysis, especially
  when current generations are imposing risks on future generations. When catastrophic outcomes are possible, it makes sense
  to take special precautions against worst-case scenarios, introducing the Catastrophic Harm Precautionary Principle to regulatory
  policy and risk assessment.
