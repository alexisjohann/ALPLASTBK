abstract: This chapter analyzes the way in which the earnings of the immigrant population may be expected to differ from the
  earnings of the native population because of the endogeneity of the decision to migrate. The empirical study shows that
  differences in the U.S. earnings of immigrants with the same measured skills, but from different home countries, are attributable
  to variations in political and economic conditions in the countries of origin at the time of migration.
