summary:
  abstract_extended: 'This handbook chapter examines patterns of punishment in community enforcement.

    We review experimental evidence on how communities punish norm violators and

    maintain cooperation. Understanding these patterns is crucial for designing

    effective enforcement mechanisms.'
  key_findings: "1. PUNISHMENT PATTERNS\n   - Proportional to violation\n   - Decentralized execution\n   - Emotional component\n\
    \n2. COMMUNITY DYNAMICS\n   - Reputation effects\n   - Observation matters\n   - Coordination on norms\n\n3. EFFECTIVENESS\n\
    \   - Deters violation\n   - Sustains cooperation\n   - Builds trust"
  ebf_relevance: '10C DIMENSIONS:

    - WHAT (C): Punishment preferences

    - HOW (B): Community enforcement dynamics

    - WHEN (V): Community context


    THEORY SUPPORT:

    - MS-SR-001: Strong Reciprocity

    - MS-SN-001: Social Norms

    - Handbook overview


    KEY INSIGHT:

    Community punishment follows regular patterns that effectively sustain

    cooperation; decentralized enforcement works through reputation and norms.'
