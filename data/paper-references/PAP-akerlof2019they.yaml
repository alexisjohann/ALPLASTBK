abstract: This article explores the development of Keynesian macroeconomics in its early years, and especially in the Big
  Bang period immediately after the publication of The General Theory. In this period, as standard macroeconomics evolved
  into the “Keynesian-neoclassical synthesis,” its promoters discarded many of the insights of The General Theory. The paradigm
  that was adopted had some advantages. But its simplifications have had serious consequences—including immense regulatory
  inertia in response to massive changes in the financial system and unnecessarily narrow application of accelerationist considerations
  (regarding inflation expectations).
