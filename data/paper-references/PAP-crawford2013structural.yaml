summary:
  key_findings: |
    1. Level-k models: Players do k steps of strategic thinking (L0=random, L1=best-responds to L0, etc.)
    2. Cognitive hierarchy: Distribution of thinking levels, typically Poisson with tau~1.5
    3. Level-k out-predicts Nash equilibrium in initial responses to many games
    4. Applications: auctions, cheap talk, market entry, coordination, beauty contests
    5. Even with learning, level-k models predict history-dependent limiting outcomes
    6. Structural estimation allows identification of thinking-level distributions
