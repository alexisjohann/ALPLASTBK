abstract: This article summarizes the provisions of the Family and Medical Leave Act, its possible effects on labor markets,
  and the resulting changes in the ability of workers to take leave. The author concludes that the actual provisions of the
  act are quite modest and have yielded neither large benefits to workers nor imposed significant costs on employers. One
  reason for this is that few workers gained significant new rights to time off work because the legislation contains many
  exemptions and employees often had other mechanisms for obtaining leave prior to its enactment.
