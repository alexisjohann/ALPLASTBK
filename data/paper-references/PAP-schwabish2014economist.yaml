abstract: Once upon a time, a picture was worth a thousand words. But with online news, blogs, and social media, a good picture
  can now be worth so much more. Economists who want to disseminate their research, both inside and outside the seminar room,
  should invest some time in thinking about how to construct compelling and effective graphics.
