abstract: In this paper, the authors summarize the nature of the changes in the structure of the health-care industry. They
  focus on the markets for health insurance, hospital services, and physician services. They discuss the potential implications
  of the restructuring of the health care industry for competition, efficiency, and public policy. As will become apparent,
  this area offers a number of intriguing questions.
