abstract: We investigate conditions sufficient for identification of average treatment effects using instrumental variables.
  First we show that the existence of valid instruments is not sufficient to identify any meaningful average treatment effect.
  We then establish that the combination of an instrument and a condition on the relation between the instrument and the participation
  status is sufficient for identification of a local average treatment effect for those who can be induced to change their
  participation status by changing the value of the instrument. Finally we derive the probability limit of the standard IV
  estimator under these conditions. It is seen to be a weighted average of local average treatment effects.
