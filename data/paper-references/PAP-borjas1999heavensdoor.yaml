abstract: The US took in more than a million immigrants per year in the late 1990s, more than at any other time in history.
  For humanitarian and many other reasons, this may be good news. But as George Borjas shows in this text, it's decidedly
  mixed news for the American economy - and positively bad news for the country's poorest citizens. Borjas reveals that the
  benefits of immigration have been greatly exaggerated and that, if we allow immigration to continue unabated and unmodified,
  we are supporting an astonishing transfer of wealth from the poorest people in the country, who are disproportionately minorities,
  to the richest. In the course of the book, Borjas carefully analyzes immigrants' skills, national origins, welfare use,
  economic mobility, and impact on the labour market, and he makes use of new data to trace current trends in ethnic segregation.
  He also evaluates the implications of the evidence for the type of immigration policy that the US should pursue.
