abstract: The US urban population increased by almost 50 percent between 1980 and 2020, with this growth heavily concentrated
  in the Sun Belt and at the fringes of metropolitan areas. This paper considers the role of housing supply in shaping the
  growth of cities and neighborhoods. Housing supply constraints have meant that demand growth has increasingly manifested
  as price growth rather than as increases in housing units or population in larger and denser metropolitan areas and neighborhoods.
  New housing is provided at increasingly higher cost in areas that have higher intensity of existing development and more
  restrictive regulatory environments. Both forces have strengthened over time, making quantity supplied less responsive to
  growing demand, driving housing price growth in many areas, and pushing housing quantity growth further out into urban fringes.
  As a result of such pressures on the cost of new construction, the US has recently experienced more rapid price growth and
  a declining influence of new construction on the housing stock.
