summary:
  abstract: >
    We evaluate the performance of large language model agents on clinical
    calculator tasks in medicine. When LLMs perform calculations internally,
    error rates are high. When calculations are delegated to purpose-built
    clinical calculator tools, we observe a 5.5-fold error reduction for LLaMA
    and a 13-fold error reduction for GPT models. This demonstrates that
    task-specific deterministic tools significantly outperform LLM internal
    reasoning for quantitative clinical tasks.
