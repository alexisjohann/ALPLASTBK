abstract: The growth of U.S. labor productivity rebounded in the second half of the 1990s, after nearly a quarter century
  of sluggish gains. We assess the contribution of information technology to this rebound, using the same neoclassical framework
  as in our earlier work. We find that a surge in the use of information technology capital and faster efficiency gains in
  the production of computers account for about two-thirds of the speed-up in productivity growth between the first and second
  halves of the 1990s. Thus, to answer the question posed in the title of the paper, information technology largely is the
  story.
