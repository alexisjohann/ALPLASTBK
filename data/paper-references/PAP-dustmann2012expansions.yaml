summary:
  abstract_extended: 'Sjaastad (1962) viewed migration in the same way as education: as an investment

    in the human agent. Migration and education are decisions that are indeed

    intertwined in many dimensions. Education and skill acquisition play an

    important role at many stages of an individual''s migration.


    Differential returns to skills in origin- and destination countries are a main

    driver of migration. The economic success of the immigrant in the destination

    country is largely determined by:

    1. Her educational background

    2. How transferable these skills are to the host country labour market

    3. How much she invests into further skills after arrival


    The desire to acquire skills in the host country that have a high return in

    the country of origin may also be an important reason for migration.'
