abstract: The authors advance a new perspective in the study of federalism. Their approach views federalism as a governance
  solution of the state to credibly preserving market incentives. Market incentives are preserved if the state is credibly
  prevented from compromising on future economic success and from bailing out future failures. The salient features of federalism--decentralization
  of information and authority and interjurisdictional competition--help provide credible commitment or these purposes. In
  addition, the authors suggest that some federalism are self-sustaining.
