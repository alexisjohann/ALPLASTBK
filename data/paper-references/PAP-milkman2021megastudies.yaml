structural_characteristics:
  S1_research_question:
    available: true
    questions:
    - Which behavioural interventions most effectively increase gym attendance?
    - Can experts and laypeople predict which interventions will be most effective?
    - Do intervention effects persist after the active intervention period ends?
    - Is the megastudy paradigm an efficient method for testing many interventions?
    - What categories of interventions are most effective for health behaviour change?
    clarity: high
  S2_methodology:
    available: true
    approach: experimental_megastudy
    methods:
    - Massive randomized field experiment (megastudy)
    - 54 interventions tested simultaneously
    - Stratified randomization by gym visit history
    - 'Pre-registered analysis plan (AsPredicted #14218)'
    - Intent-to-treat analysis
    - Benjamini-Hochberg multiple comparison correction
    - Forecasting study with 690 participants
    key_definitions:
    - 'Megastudy: Massive field experiment testing many interventions simultaneously'
    - 'Intervention categories: Planning, Reminders, Social, Incentives, Fresh Start,
      Mindset, Identity, Microrewards'
    - 'Persistence: Significant effects still detectable 10 weeks post-intervention'
    - 'Forecaster accuracy: Correlation between predicted and actual intervention
      rankings'
  S3_sample_data:
    available: true
    type: field_experiment
    empirical_data: true
    sample_characteristics:
    - N = 61,293 participants (gym members)
    - 'Setting: 24 Hour Fitness gyms across USA'
    - 'Period: September-December 2018'
    - ~1,135 participants per intervention arm
    - 'Control group baseline: 1.49 visits/week'
    - 'Forecaster sample: 690 (495 lay, 98 scientists, 97 practitioners)'
    descriptive_statistics:
      total_n: 61293
      n_interventions: 54
      n_significant: 24
      pct_significant: 0.45
      top_effect: 0.27
      median_effect: 0.09
      persistence_rate: 0.08
      forecaster_correlation: 0.02
  S4_findings:
    available: true
    key_findings:
    - finding: 45% of interventions significantly increased gym visits
      n_significant: 24
      n_total: 54
      interpretation: About half of behavioural interventions work in this domain
    - finding: 'Top intervention: Microreward for returning after missed workout (+27%)'
      effect_size: 0.27
      ci_95: '[0.18, 0.36]'
      interpretation: Recovery-focused interventions outperform prevention-focused
    - finding: Forecasters failed to predict intervention effectiveness
      correlation: 0.02
      groups: lay, expert, practitioner all r=0.02
      interpretation: Intuition is unreliable; empirical testing essential
    - finding: Only 8% of effective interventions persisted at 10 weeks
      n_persistent: 4
      n_effective: 24
      interpretation: Most behavioural interventions have temporary effects
    - finding: Microrewards category most effective
      top_category: Microrewards
      category_effect: +15-27%
      interpretation: Small rewards for specific behaviours outperform large rewards
    - finding: Loss framing did not enhance incentive effectiveness
      loss_frame_effect: +5%
      gain_frame_effect: +9%
      interpretation: Contradicts simple loss aversion predictions
  S5_validity:
    available: true
    internal_validity:
    - Pre-registered analysis plan
    - Stratified randomization by gym history
    - Large sample size (>1,100 per arm)
    - Objective outcome measure (gym check-ins)
    - Multiple comparison correction applied
    - Intent-to-treat analysis
    external_validity:
    - Large diverse sample across USA
    - Real-world setting (commercial gym)
    - Multiple intervention categories tested
    - Consistent with prior research on top performers
    - Replicates fresh start effect, social commitment findings
    limitations:
    - Single outcome domain (gym attendance)
    - Single setting (24 Hour Fitness)
    - Limited follow-up period (14 weeks)
    - Motivated sample (agreed to participate)
    - Cannot test multi-component interventions
    - US population only
  S6_reproducibility:
    available: true
    proofs_available: true
    proof_location: Extended Data Tables 1-6, Supplementary Information
    data_availability:
