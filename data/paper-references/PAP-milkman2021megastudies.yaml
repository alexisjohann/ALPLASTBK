      access: Upon request with IRB approval
    model_specification: Linear regression with clustered standard errors
    assumptions_documented: true
    preregistration:
    - 'AsPredicted #14218'
    testable_predictions:
    - Recovery-focused interventions will outperform prevention-focused
    - Expert forecasts will not predict intervention effectiveness
    - Most intervention effects will decay after ending
    - Flexible plans will outperform rigid commitments
