paper: milkman2021megastudies
superkey: PAP-milkman2021megastudies
title: Megastudies improve the impact of applied behavioural science
author: Katherine L. Milkman, Dena Gromet, Hung Ho, Joseph S. Kay, Timothy W. Lee,
  Pepi Pandiloski, Yeji Park, Aneesh Rai, Max Bazerman, John Beshears, Lauri Bonacorsi,
  Colin Camerer, Edward Chang, Gretchen Chapman, Robert Cialdini, Hengchen Dai, Lauren
  Eskreis-Winkler, Ayelet Fishbach, James J. Gross, Shlomo Kalish, Dean Karlan, Tim
  Kautz, Erika Kirgios, Joowon Klusowski, Ariella Kristal, Rahul Ladhania, George
  Loewenstein, John Ludwig, Barbara A. Mellers, Sendhil Mullainathan, Silvia Saccardo,
  Jann Spiess, Gaurav Suri, Joachim H. Talloen, Jamie Taxer, Yaacov Trope, Lyle Ungar,
  Kevin G. Volpp, Ashley Whillans, Jonathan Zinman, Angela L. Duckworth
year: '2021'
publication_type: journal_article
journal: Nature
volume: '600'
pages: 478-483
doi: 10.1038/s41586-021-04128-4
abstract: 'Massive field experiments, or megastudies, enable efficient comparisons
  of the impacts of different

  interventions on a common outcome. Here we report the results of a megastudy involving
  61,293 gym

  members of 24 Hour Fitness and testing 54 interventions designed to increase gym
  visits. We found

  that 45% of our tested interventions significantly increased gym visits over a 4-week
  period, with

  the top interventions producing a 9% to 27% increase in average weekly visits. The
  best-performing

  intervention offered small rewards for returning to the gym after a missed workout.
  Our trial was

  also designed to assess how well experts and lay people predicted intervention effectiveness,
  and

  we found that forecasters failed to anticipate the ranking of our top interventions.

  '
