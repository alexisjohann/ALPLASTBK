key_contributions:
- Introduces megastudy paradigm for efficient intervention testing
- Documents that 45% of behavioural interventions significantly work
- Identifies recovery-focused interventions as most effective (+27%)
- Demonstrates forecaster failure (r = 0.02 for all groups)
- Shows only 8% of effects persist after intervention ends
- Tests 54 interventions simultaneously with N = 61,293
- Provides ranking of intervention categories by effectiveness
- Challenges intuition-based intervention design
