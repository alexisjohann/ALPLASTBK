abstract: Many observers have argued that credit default swaps contributed significantly to the credit crisis. Of particular
  concern to these observers are that credit default swaps trade in the largely unregulated over-the-counter market as bilateral
  contracts involving counterparty risk and that they facilitate speculation involving negative views of a firm's financial
  strength. Some observers have suggested that credit default swaps would not have made the crisis worse had they traded on
  exchanges. I conclude that credit default swaps did not cause the dramatic events of the credit crisis, that the over-the-counter
  credit default swaps market worked well during much of the crisis, and that exchange trading has both advantages and costs
  compared to over-the-counter trading. Though I argue that eliminating over-the-counter trading of credit default swaps could
  reduce social welfare, I also recognize that much research is needed to understand better and to quantify the social gains
  and costs of derivatives in general and credit default swaps in particular.
