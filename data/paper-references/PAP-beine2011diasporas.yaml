title: Diasporas
author: Beine
year: '2011'
publication_type: journal_article
doi: 10.1016/j.jdeveco.2009.11.004
abstract: Migration flows are shaped by a complex combination of self-selection and
  out-selection mechanisms, both of which are affected by the presence of a diaspora
  abroad. In this paper, we analyze how existing diasporas (the stock of people born
  in a country and living in another one) affect the size and human-capital structure
  of current bilateral migration flows. The analysis exploits a bilateral data set
  on international migration by educational attainment from 195 countries to 30 OECD
  countries in 1990 and 2000. Based on simple micro-foundations and controlling for
  various determinants of migration, we find that diasporas increase migration flows
  and lower their average educational level. Interestingly, diasporas explain the
  majority of the variability of migration flows and selection. This suggests that,
  without changing the generosity of family reunion programs, education-based selection
  rules are likely to have moderate impact.
