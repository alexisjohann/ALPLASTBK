abstract: This study examines the relationship between the nature of the Chinese Family Business (CFB) and the business strategies
  adopted, in the setting of the Hong Kong watch industry. The nature of the CFB is conceptualized and measured as a set of
  sub-dimensions, represented by continuous variables. It is hypothesized that ‘ CFBness’ is positively associated with ‘traditional’
  business strategies, but inhibitive of ‘upgrading’. The results show that the hypotheses are partially supported. While
  the findings support the view that firms’ strategic choices are constrained by material and ideational influences in their
  environment, only a small proportion of the variation in business strategies is accounted for by ‘CFB-ness’, leaving ample
  room for human agency. Overall, the results support a ‘middle view’ between the deterministic and voluntaristic perspectives,
  whereby firms exercise strategic choice within an environment that predisposes, but does not fix, their behaviour.
