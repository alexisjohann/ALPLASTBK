abstract: Significance Cooperation among humans depends upon the willingness of others to take costly action to enforce the
  social norm to cooperate. Such behavior is often coined third-party punishment. Here we show that third-party punishment
  is already effective as means to increase cooperation in children. Most importantly, we identify why this is the case. First,
  children expect (mistakenly) third parties to punish quite often and therefore they become more cooperative. Second, the
  presence of third parties lets children become (rightfully) more optimistic about the cooperation levels of the interaction
  partner in a simple prisoner’s dilemma game. As a reaction to more optimistic expectations, children cooperate more themselves.
  The experiment has been run with about 1,100 children aged 7 to 11 y.
