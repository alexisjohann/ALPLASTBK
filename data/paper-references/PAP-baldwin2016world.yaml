abstract: When the General Agreement on Tariffs and Trade was signed by 23 nations in 1947, the goal was to establish a rules-based
  world trading system and to facilitate mutually advantageous trade liberalization. As the GATT evolved over time and morphed
  into the World Trade Organization in 1993, both goals have largely been achieved. The WTO presides over a rule-based trading
  system based on norms that are almost universally accepted and respected by its 163 members. Tariffs today are below 5 percent
  on most trade, and zero for a very large share of imports. Despite its manifest success, the WTO is widely regarded as suffering
  from a deep malaise. The main reason is that the latest WTO negotiation, the Doha Round, has staggered between failures,
  flops, and false dawns since it was launched in 2001. But the Doha logjam has not inhibited tariff liberalization—far from
  it. During the last 15 years, most WTO members have massively lowered barriers to trade, investment, and services bilaterally,
  regionally, and unilaterally—indeed, everywhere except through the WTO. For today's offshoring-linked international commerce,
  the trade rules that matter are less about tariffs and more about protection of investments and intellectual property, along
  with legal and regulatory steps to assure that the two-way flows of goods, services, investment, and people will not be
  impeded. It’s possible to imagine a hypothetical WTO that would incorporate these rules. But the most likely outcome for
  the future governance of international trade is a two-pillar structure in which the WTO continues to govern with its 1994-era
  rules while the new rules for international production networks are set by a decentralized process of sometimes overlapping
  and inconsistent mega-regional agreements.
