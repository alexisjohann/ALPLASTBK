summary:
  abstract_extended: 'The psychological consequences of poverty may impede escape from poverty.

    This paper reviews evidence that poverty affects cognitive function, time

    preferences, and risk attitudes. Scarcity consumes mental bandwidth, leading

    to poor decision-making. Understanding these psychological effects is crucial

    for designing effective poverty alleviation policies.'
  key_findings: "1. COGNITIVE EFFECTS OF POVERTY\n   - Scarcity reduces cognitive bandwidth\n   - Poor performance on fluid\
    \ intelligence tests\n   - Reduced executive control\n   - Effects are causal, not just correlational\n\n2. TIME PREFERENCES\n\
    \   - Poverty increases present bias\n   - Shorter planning horizons\n   - More hyperbolic discounting\n\n3. RISK ATTITUDES\n\
    \   - Poverty may increase risk aversion\n   - Or increase risk-seeking (desperation)\n   - Depends on context and framing\n\
    \n4. POLICY IMPLICATIONS\n   - Simplify decisions for the poor\n   - Reduce cognitive load in programs\n   - Account for\
    \ psychological constraints"
  ebf_relevance: '10C DIMENSIONS:

    - WHEN (V): Poverty as context affecting cognition

    - AWARE (AU): Bandwidth affects decision quality

    - READY (AV): Psychological barriers to action


    THEORY SUPPORT:

    - Published in Science - high impact

    - Links economics to psychology of scarcity


    KEY INSIGHT:

    Poverty is not just lack of money but also creates psychological constraints

    that make escape from poverty harder.'
