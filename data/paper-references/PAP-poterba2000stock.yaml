abstract: This paper explores the link between changes in the aggregate value of corporate stock and changes in consumer spending.
  It presents data on the distribution of corporate stock ownership based on the 1998 Survey of Consumer Finances. It also
  uses time-series evidence on the comovement of stock market wealth and various categories of consumer spending to calibrate
  “the wealth effect.” It concludes that in the year after a change in stock market values, consumer spending is likely to
  rise by between one and two cents for each dollar increase in the value of corporate stock.
