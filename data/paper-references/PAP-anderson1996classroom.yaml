abstract: This paper describes how to set up a classroom exercise in which students see private signals and make public decisions
  in sequence. A pattern of conforming decisions in this context is called an information cascade. Once a cascade starts,
  it is rational for students to ignore their private signals and follow the pattern of previous decisions. This exercise
  provides an interactive framework that facilitates discussions of Bayes's rule, information, and social conformity.
