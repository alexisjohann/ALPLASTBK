abstract: Mentalizing refers to our ability to read the mental states of other agents
  and engages many neural processes. The brain's mirror system allows us to share
  the emotions of others. Through perspective taking, we can infer what a person currently
  believes about the world given their point of view. Finally, the human brain has
  the unique ability to represent the mental states of the self and the other and
  the relationship between these mental states, making possible the communication
  of ideas.
