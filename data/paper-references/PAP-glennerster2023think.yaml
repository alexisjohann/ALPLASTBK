abstract: Reductions in greenhouse gas emissions are a global public good, which makes it efficient to act globally when addressing
  this challenge. We lay out several reasons that high-income countries seeking to mitigate climate change might have greater
  impact if they invest their resources in opportunities in low- and middle-income countries. Specifically, some of the easiest
  and cheapest options have already been tapped in high-income countries, land and labor costs are lower in low- and middle-income
  countries, it is cheaper to build green than to retrofit green, and global targeting matters in integrated economies. We
  also discuss economic counterarguments such as the challenge of monitoring emissions levels in low- and middle-income countries,
  ethical considerations, the importance of not double-counting mitigation funding as development aid, and policy steps that
  might help realize this opportunity.
