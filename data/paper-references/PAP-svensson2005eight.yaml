abstract: 'This paper will discuss eight frequently asked questions about public corruption: (1) What is corruption? (2) Which
  countries are the most corrupt? (3) What are the common characteristics of countries with high corruption? (4) What is the
  magnitude of corruption? (5) Do higher wages for bureaucrats reduce corruption? (6) Can competition reduce corruption?(
  7) Why have there been so few (recent) successful attempts to fight corruption? (8) Does corruption adversely affect growth?'
