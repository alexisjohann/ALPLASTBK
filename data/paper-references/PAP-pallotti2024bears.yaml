content_justification: Full research paper with formal methodology. S1 present (who
  bears inflation costs in Euro Area 2021-2023). S2 present (sufficient-statistics
  framework via envelope theorem, 4-channel welfare decomposition). S3 present (4
  Euro Area countries, HFCS/HBS/HICP data, 15 household groups, 2021-2023). S4 present
  (aggregate costs 3-9%, regressive by age, NNP key driver, government net winner).
  S5 present (robustness to alternative NNP definitions, discount rates, price indices).
  S6 partial (HFCS microdata confidential, methodology fully documented).
