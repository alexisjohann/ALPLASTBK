summary:
  abstract_extended: 'On April 1, 1992, New Jersey''s minimum wage rose from $4.25 to $5.05 per hour.

    To evaluate the impact of the law, the authors surveyed 410 fast-food

    restaurants in New Jersey and eastern Pennsylvania before and after the rise.


    Comparisons of employment growth at stores in New Jersey and Pennsylvania

    (where the minimum wage remained constant) provide estimates of the effect

    of the higher minimum wage. The authors also compare employment changes at

    stores in New Jersey that were initially paying high wages (above $5.00) to

    changes at lower-wage stores.


    Contrary to standard competitive labor market predictions, they find no

    indication that the rise in the minimum wage reduced employment. In fact,

    relative to stores in Pennsylvania, fast-food restaurants in New Jersey

    increased employment by 13 percent.'
  key_findings: "1. NO EMPLOYMENT REDUCTION: Minimum wage increase did not reduce employment -\n   contradicts standard competitive\
    \ model predictions\n\n2. EMPLOYMENT INCREASE: NJ fast-food employment rose 13% relative to PA after\n   minimum wage\
    \ increase - positive employment effect\n\n3. DIFFERENCE-IN-DIFFERENCES: PA provides natural control group for NJ,\n \
    \  enabling causal identification via diff-in-diff design\n\n4. WITHIN-STATE COMPARISON: High-wage vs low-wage stores\
    \ within NJ show same\n   pattern - low-wage stores had larger employment increases\n\n5. MONOPSONY INTERPRETATION: Results\
    \ consistent with monopsony power in labor\n   market where minimum wage increases employment\n\n6. METHODOLOGICAL INNOVATION:\
    \ Established difference-in-differences with\n   survey data as credible quasi-experimental approach"
