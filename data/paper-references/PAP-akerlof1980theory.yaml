abstract: This paper examines adherence to social customs. Models of social customs are found to be inherently multi-equilibrial.
  It is found that social customs which are disadvantageous to the individual may nevertheless persist without erosion, if
  individuals are sanctioned by loss of reputation for disobedience of the custom. One example of such a social custom is
  the persistence of a fair (rather than a market-clearing) wage. In this fashion, involuntary unemployment is explained.
