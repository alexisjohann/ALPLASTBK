abstract: 'Economists have long extolled the virtues of markets. Unfettered competition
  protects consumers from the political influence of lobbies and forces producers
  to deliver products and services at cost. However, competition is rarely perfect,
  markets fail, and market power - the firms ability to raise price substantially
  above cost or to offer low quality - must be kept in check. Industrial organization
  studies the exercise and control of market power. This lecture discusses the interaction
  between market failures and public policies comprising: the regulation of public
  utilities, competition policy, consumer protection measures, and industrial policies.'
