  key_findings: "1. SALIENCE-BASED ATTENTION: Decision makers focus on payoffs that \"stand out\"\n   (are salient) relative\
    \ to alternatives\n\n2. CONTEXT-DEPENDENT: Salience is determined by comparison - same payoff can\n   be salient or not\
    \ depending on context\n\n3. PROBABILITY DISTORTION: True probabilities replaced by decision weights\n   favoring salient\
    \ payoffs\n\n4. ALLAIS PARADOX: Salience theory explains the common consequence effect\n   without invoking probability\
    \ weighting\n\n5. PREFERENCE REVERSALS: Context-dependent salience explains why preferences\n   can reverse between equivalent\
    \ framings\n\n6. RISK-SEEKING: Explains when people seek risk (when upside is salient)\n   vs avoid risk (when downside\
    \ is salient)"
