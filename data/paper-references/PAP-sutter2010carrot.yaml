abstract: We analyse an experimental public goods game in which group members can &lt;it&gt;endogenously&lt;/it&gt; determine
  whether they want to supplement a standard voluntary contribution mechanism with the possibility of rewarding or punishing
  other group members. We find a significantly positive effect of endogenous institutional choice on the level of cooperation
  in comparison to the same exogenously implemented institutions. This suggests that participation rights enhance cooperation
  in groups. With endogenous choice, groups typically vote for the reward option, although punishment is even more effective
  in sustaining high levels of cooperation. Our results are evaluated against the predictions of social preference models.
