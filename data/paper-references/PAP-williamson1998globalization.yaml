abstract: The late nineteenth and twentieth centuries have many things in common. Both periods recorded fast growth, convergence,
  and labor-market integration between OECD members. Both periods witnessed intense debate about who gained and who lost from
  globalization. Furthermore, the earlier period saw a retreat from global liberalism long before the interwar deglobalization
  disaster. Did globalization of that time plant seeds of its own destruction? Are there lessons for the present?
