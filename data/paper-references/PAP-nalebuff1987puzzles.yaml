abstract: 'Each “Puzzles” will begin with a few speed problems. These puzzles have answers provided in the same issue. Puzzles
  1 and 2 will give you a chance to get up to speed. Then, we continue with longer puzzles taken from two very broadly defined
  categories: strategy puzzles and theory puzzles. Strategy puzzles will give the readers an opportunity to compete against
  each other in problems of coordination and competition. The third puzzle, a noisy prisoner''s dilemma tournament, falls
  dead center in this category. Theory puzzles are meant to offer mathematical problems that have an economic interpretation.
  The fourth puzzle, an optimal location problem, is in this category.'
