    description: "Individual cost of stepping up as leader"
    range: "[0, 1]"
    context: "Leader emergence game"
    type: "model_parameter"
  - symbol: "beta"
    description: "Cost of inaction when no leader emerges"
    range: "[0, 1], beta <= alpha"
    context: "Leader emergence game"
    type: "model_parameter"
  - symbol: "L"
    description: "Leadership bonus (private incentive)"
    condition: "L >= B*(alpha - beta) for emergence"
    context: "Leader emergence game"
    type: "model_parameter"
  - symbol: "b*"
    description: "Optimal incentive intensity"
    formula: "b* = 1 / (1 + r * sigma^2 * c''(a))"
    context: "Principal-agent incentive design"
    type: "model_parameter"

