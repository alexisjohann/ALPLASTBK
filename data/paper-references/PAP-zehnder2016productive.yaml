abstract: |
  Research on leadership in economics has developed in parallel to the literature in management
  and psychology and links between the fields have been sparse. Whereas modern leadership
  scholars mostly focus on transformational and related leadership styles, economists have mainly
  emphasized the role of contracts, control rights, and incentives. We argue that both fields could
  profit from enriching their approach with insights from the other field. We review and
  synthesize the economics literature on leadership in organizations and discuss how leadership
  scholars in management and psychology can benefit from the detailed understanding of
  transactional methods that economists have developed.

key_findings_structured:
  S1_research_question: "How can economics and leadership research be productively integrated? What does each field offer the other?"
  S2_methodology: "Comprehensive literature review and synthesis with game-theoretic formalization of leader emergence"
  S3_sample_data: "Review of experimental and field evidence from both economics and leadership literatures"
  S4_findings:
    - finding: "Market failure justifies hierarchical leadership (transaction costs, hold-up, free-riding, distorted incentives)"
      source_section: "Economic Foundations of Leadership"
    - finding: "Leader emergence has public good characteristics - stepping up is costly, benefits are shared"
      source_section: "Leader Emergence Problem"
      formal_result: "Emergence condition: L >= B*(alpha - beta), where alpha=individual cost, beta=inaction cost, L=bonus"
    - finding: "Environmental complexity determines optimal leadership style"
      source_section: "Leader Effectiveness"
      formal_result: "Simple environment -> transactional (incentives); Complex environment -> transformational (identity)"
    - finding: "Identity Economics (Akerlof/Kranton) bridges transactional and transformational leadership"
      source_section: "Leaders as Creators of Identity"
    - finding: "Multi-tasking limits incentive effectiveness when tasks differ in measurability"
      source_section: "Curse of Complexity"
      formal_result: "Equal compensation principle: b1=b2 required, else effort distortion"
    - finding: "Relational contracts require both credibility AND clarity"
      source_section: "Leader as Creator of Clarity"
  S5_validity: "Review paper - validity depends on reviewed studies. Strong theoretical foundations (Coase, Williamson, Holmstrom, Aghion/Tirole). Experimental evidence from coordination games well-established."
  S6_reproducibility: "Game-theoretic models fully specified and reproducible. Experimental results from cited studies independently replicated."

