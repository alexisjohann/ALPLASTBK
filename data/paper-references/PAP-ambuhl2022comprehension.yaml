abstract: Abstract We study the relationship between the presence of politicians on mobile service operators’ boards and the
  regulation of the mobile telecommunication sector. In countries in which mobile operators have deeper connections with local
  politicians, we find that rules promote competition less, even after we control for country fixed effects and a country’s
  level of corruption. Rules that promote competition are associated with lower concentration and lower prices. There is no
  evidence that procompetition rules are associated with worse quality, lower investments, less employment, or lower wages.
  Thus, all the evidence points to political connections being a form of rent-seeking.
