abstract: The Medicare system is facing a financial crisis brought on by the combination of rapidly rising consumption of
  health care services by beneficiaries and financing based on generation transfers. This paper simulates a transition to
  prepaid Medicare where each generation puts aside funds for the health care it will demand later in life. By prepaying Medicare
  we increase the nation's capital stock which in the long run will allow the nation to enjoy greater consumption for both
  working and retired generations and we achieve immunity from generation size shocks. By transferring the baby boomers and
  younger generations into a prepaid system we can complete the transition in less than fifty years and achieve an ultimate
  contribution rate of 1.26% of taxable payroll instead of the more than 12% of taxable payroll that will be required if we
  remain in the status quo.
