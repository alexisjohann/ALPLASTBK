abstract: This brief paper explores the likely effects of government-imposed global budget caps, such as those in the Clinton
  administration proposal, on health care spending. It argues that health reform proposals that guarantee universal access
  to a basic package of medical benefits create a substantial new constituency for higher health care outlays. Political and
  potential legal pressures to expand rather than limit the set of guaranteed benefits, coupled with an expansion of the number
  of individuals with health insurance coverage, make it unlikely that global budget targets will succeed in reducing the
  rate of health care spending growth.
