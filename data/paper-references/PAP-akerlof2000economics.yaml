summary:
  key_findings: "1. IDENTITY UTILITY FUNCTION: Identity enters utility as I_j = I_j(a_j, a_{-j};\n   c_j, ε_j, P) where c_j\
    \ = social categories, ε_j = own characteristics,\n   P = behavioral prescriptions. Utility U_j = U_j(a_j, a_{-j}, I_j)\n\
    \n2. FOUR CHANNELS OF IDENTITY EFFECTS:\n   - Own actions affect own identity (loss I_s from violating prescriptions)\n\
    \   - Others' actions affect own identity (externality I_o)\n   - Choice of identity (c_j may be partially chosen)\n \
    \  - Manipulation of categories and prescriptions (C and P can change)\n\n3. GENDER IN WORKPLACE: Jobs have \"auras of\
    \ gender\" - women lose identity I_s\n   in \"men's jobs,\" male coworkers lose I_o, leading to harassment and\n   productivity\
    \ losses. Explains occupational segregation beyond human capital\n\n4. GREEN-RED MODEL OF POVERTY: Excluded groups choose\
    \ between \"Green\" (conform\n   to dominant culture, suffer exclusion loss r) or \"Red\" (oppositional identity).\n \
    \  High r leads to equilibrium with self-destructive behavior that is RATIONAL\n   given identity costs\n\n5. HOUSEHOLD\
    \ DIVISION: Husbands lose identity from housework and from wives\n   earning more. Data shows men's share of housework\
    \ rises to only 37% even\n   when they do 0% of outside work - asymmetry unexplained by comparative\n   advantage\n\n\
    6. GAME-THEORETIC MODEL: Person One (taste Activity 1) vs Person Two (taste\n   Activity 2). With Green prescriptions\
    \ (Activity 1 = correct), four equilibria\n   depending on I_s, I_o, response cost c, and deterrence loss L"
