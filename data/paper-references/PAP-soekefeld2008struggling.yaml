abstract: As a religious and cultural minority in Turkey, the Alevis have suffered a long history of persecution and discrimination.
  In the late 1980s they started a movement for the recognition of Alevi identity in both Germany and Turkey. Today, they
  constitute a significant segment of Germany's Turkish immigrant population. In a departure from the current debate on identity
  and diaspora, Sökefeld offers a rich account of the emergence and institutionalization of the Alevi movement in Germany,
  giving particular attention to its politics of recognition within Germany and in a transnational context. The book deftly
  combines empirical findings with innovative theoretical arguments and addresses current questions of migration, diaspora,
  transnationalism, and identity
