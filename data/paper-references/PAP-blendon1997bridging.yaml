abstract: This paper reports the results of two parallel 1996 surveys, one of economists, one of the public. It finds that
  the public has a bleaker picture of what has happened economically to the average family and is more pessimistic than most
  economists about the intermediate future. The public cites different reasons than economists do for why the economy is not
  doing better. Also, individuals' perceptions of their own economic experiences yield a different set of beliefs about economic
  conditions than that described in official statistics. The authors offer possible explanations of the perception gap between
  the public and economists. Coauthors are John M. Benson, Mollyann Brodie, Richard Morin, Drew E. Altman, Daniel Gitterman,
  Mario Brossard, and Matt James.
