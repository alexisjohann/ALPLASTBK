abstract: This dissertation examines whether managers influence corporate boards of directors in their auditor selection,
  change, and compensation decisions. This topic is important because it addresses concerns that the Sarbanes-Oxley Act of
  2002 (SOX) is not effective in eliminating managerial influence over auditor engagement decisions and that it may provide
  a false sense of security to investors. These concerns are based on the implicit assumption that managers prefer weaker
  governance oversight and lower audit quality. However, empirical research testing associations between managerial influence
  and audit-related decisions post-SOX is scarce and generally guided by agency theory. Incorporating agency, stewardship,
  and resource dependence perspectives, I find that managerial preferences for auditor selection are not aligned. Specifically,
  CEOs positively influence the selection of higher quality auditors, whereas CFOs have the opposite effect. Further, CEOs
  who hold powerful roles as chairs of their companies' boards of directors appear to mitigate the negative influence of CFOs
  and inside directors on audit quality. CEOs serving in dual roles also oppose auditor turnover when lower earnings quality
  prompt higher demand for audit effort. Finally, my study provides some evidence that management exercises downward pressures
  on audit fees, suggesting that managers utilize their authority beyond the regulations established by SOX to negotiate auditor
  compensation.
