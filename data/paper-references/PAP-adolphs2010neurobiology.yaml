summary:
  abstract_extended: 'This primer addresses fundamental questions about emotion from a neuroscience

    perspective. When asked "what is an emotion?" most people answer by listing

    the most salient attributes of emotions.


    The psychologist and philosopher William James, in an 1884 essay, causally

    linked two commonsense attributes: certain stimuli can trigger emotional

    bodily reactions, and our perception of those changes constitutes our

    conscious experience of emotions (feelings).


    More recent accounts propose neurobiological substrates involved in causing

    emotional reactions and perceiving the feelings, laying the foundation for

    conceiving of emotions as neural states. The paper discusses the sensory and

    motor aspects of emotions - their sensory aspect deriving from being induced

    by stimuli, and their motor aspect residing in the fact that emotions motivate

    behavior. Emotions have been described as "decoupled reflexes."'
  key_findings: "1. NEURAL SUBSTRATES: Emotions involve specific brain regions including\n   amygdala, insula, prefrontal\
    \ cortex, and subcortical structures\n\n2. DECOUPLED REFLEXES: Like reflexes, emotional reactions are stereotyped,\n \
    \  but unlike reflexes, we have some control over emotional behavior\n\n3. SENSORY-MOTOR INTEGRATION: Emotions have both\
    \ sensory (stimulus-induced)\n   and motor (behavior-motivating) aspects\n\n4. CONSCIOUS EXPERIENCE: Feelings are the\
    \ conscious perception of emotional\n   bodily states (following James's theory)\n\n5. BIOLOGICAL SIGNIFICANCE: Amygdala's\
    \ primary role is coordinating cortical\n   network function during evaluation of biological significance\n\n6. EMOTION-COGNITION\
    \ INTERACTION: Emotions and cognition are deeply\n   intertwined in neural processing, not separate systems"
  ebf_relevance: "Domain: CORE-THEORY, DOMAIN-NEUROSCIENCE, DOMAIN-BEHAVIORAL\n10C Dimensions: AWARE (conscious emotion),\
    \ HOW (neural mechanisms),\n                WHAT (emotion as utility component), READY (emotional state)\nTheory Support:\
    \ MS-EM-001 (Emotion), MS-AM-001 (Amygdala), MS-AF-001\n               (Affect Heuristic), MS-SC-001 (Somatic Markers)\n\
    Parameters: Amygdala response magnitude, emotion-cognition coupling,\n            conscious access threshold"
