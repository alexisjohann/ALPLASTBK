summary:
  abstract: >
    The public release of Large Language Models has sparked tremendous interest
    in how humans will use AI to accomplish tasks. In this study conducted with
    Boston Consulting Group (758 consultants, ~7% of individual contributor-level),
    we examine the performance implications of AI on realistic, complex, and
    knowledge-intensive tasks through a pre-registered field experiment.

key_findings_structured:
  - finding: "Consultants using AI within the frontier completed 12.2% more tasks, worked 25.1% faster, and produced 40%+ higher quality results compared to control group"
    domain: organizational_productivity
    stage: action
    primary_dimension: F
    effect_size: 0.40
  - finding: "Below-average performers improved 43% with AI augmentation while above-average improved only 17% — AI levels the playing field (skill-leveling effect)"
    domain: skill_development
    stage: action
    primary_dimension: S
    effect_size: 0.43
  - finding: "For tasks outside the AI capability frontier, consultants using AI were 19 percentage points less likely to produce correct solutions — performance degradation"
    domain: technology_limitations
    stage: action
    primary_dimension: F
    effect_size: -0.19
  - finding: "Two distinctive human-AI integration patterns: Centaurs (divide tasks between human and AI) and Cyborgs (completely integrate workflow with AI)"
    domain: human_ai_interaction
    stage: maintenance
    primary_dimension: S

