abstract: 'Quining Qualia argues for eliminativism about qualia—the subjective, experiential properties of mental states.
  Dennett identifies four properties commonly ascribed to qualia: (1) ineffable—they cannot be communicated except through
  direct experience; (2) intrinsic—non-relational properties; (3) private—interpersonal comparisons are impossible; and (4)
  directly apprehensible by consciousness. Through a series of intuition pumps, Dennett argues that nothing satisfies this
  description. He concludes our conception of qualia is so confused that we should admit there simply are no qualia at all,
  rather than trying to salvage the notion. The paper has been highly influential in philosophy of mind and consciousness
  studies.'
