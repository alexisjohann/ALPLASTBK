abstract: 'Zusammenfassung „ECONtribute: Markets &amp; Public Policy“, gegründet 2019 als gemeinsamer Cluster der Universitäten
  Bonn und Köln, ist der einzige im Kern wirtschaftswissenschaftliche Exzellenzcluster in Deutschland. Seine Agenda zielt
  nicht ausschließlich auf Fortschritte in der akademischen Grundlagenforschung; diese sind conditio sine qua non. Der Beitrag
  von ECONtribute zeigt sich vielmehr auch in der Praxis von Unternehmen, in der Gestaltung von Märkten und im öffentlichen
  Diskurs über Fragen der Wirtschaftspolitik. Christian Bayer, Felix Bierbrauer, Axel Ockenfels und Matthias Sutter, die an
  diesem Cluster beteiligt sind, stellen in diesem Artikel zuerst die Agenda von ECONtribute vor. Danach skizzieren sie die
  Forschungsbereiche und deren zentrale Fragen. Anschließend gehen sie zu ausgewählten Themen in die Tiefe, um einige wesentliche
  Beiträge von ECONtribute in der wissenschaftlichen und wirtschaftspolitischen Diskussion exemplarisch zu illustrieren.'
