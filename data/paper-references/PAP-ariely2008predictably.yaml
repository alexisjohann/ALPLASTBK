summary:
  abstract_extended: "This bestselling book by behavioral economist Dan Ariely demonstrates through\nclever experiments that\
    \ human irrationality is not random but SYSTEMATIC and\nPREDICTABLE—hence \"predictably irrational.\"\n\nKEY PHENOMENA\
    \ DOCUMENTED:\n\n1. RELATIVITY: We evaluate options comparatively, not absolutely.\n   - Decoy effects: A clearly inferior\
    \ option makes another look better\n   - The Economist subscription experiment\n\n2. ARBITRARY COHERENCE: Initial anchors\
    \ become reference points.\n   - Social Security number → auction bids correlation\n   - First prices become anchors for\
    \ future valuations\n\n3. THE COST OF ZERO: \"Free\" is special, not just a low price.\n   - Amazon free shipping effect\n\
    \   - Lindt truffle vs. Hershey's Kiss experiment\n\n4. SOCIAL VS. MARKET NORMS: These operate by different rules.\n \
    \  - Asking for help vs. paying for help\n   - AARP lawyers example\n\n5. THE EFFECT OF EXPECTATIONS: What we expect shapes\
    \ what we get.\n   - Vinegar in beer experiment\n   - Placebo effects in pain medication\n\n6. THE PROBLEM OF PROCRASTINATION:\n\
    \   - Pre-commitment devices\n   - Self-control as limited resource\n\n7. OWNERSHIP AND THE ENDOWMENT EFFECT:\n   - Duke\
    \ basketball tickets experiment\n   - Virtual ownership creates attachment\n\n8. HONESTY AND DISHONESTY:\n   - People\
    \ cheat a little but not a lot\n   - Moral reminders reduce cheating"
  key_findings: '1. Irrationality is SYSTEMATIC, not random

    2. Relativity and decoy effects shape choices

    3. "Free" has disproportionate psychological power

    4. Social and market norms don''t mix well

    5. Expectations create self-fulfilling prophecies

    6. Pre-commitment can overcome procrastination

    7. 19+ citations in EBF framework'
  ebf_relevance: "Domain: CORE-THEORY (Accessible), LIT-ARIELY\n10C Dimensions: HOW (decision mechanisms), AWARE (expectation\
