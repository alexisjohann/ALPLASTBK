abstract: MIT behavioral economist Dan Ariely refutes the common assumption that we behave in fundamentally rational ways.
  Blending everyday experience with groundbreaking research, Ariely explains how expectations, emotions, social norms, and
  other invisible, seemingly illogical forces skew our reasoning abilities. Not only do we make astonishingly simple mistakes
  every day, but we make the same types of mistakes. These misguided behaviors are neither random nor senseless. They are
  systematic and predictable, making us predictably irrational. We adhere to a certain level of honesty when it comes to cash.
  But nonmonetary abstractions can make us dishonest cheats. We may not take one dollar sitting on top of someones desk, but
  many will take one of their cokes from the breakroom fridge with few qualms.
