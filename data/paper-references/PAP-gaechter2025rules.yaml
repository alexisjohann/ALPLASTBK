abstract: 'This paper introduces the CRISP framework to explain rule-following behavior. Through four experiment series involving
  14,034 participants, we demonstrate that a substantial majority (55-70%) of people follow arbitrary costly rules even when
  they are anonymous and face no enforcement. The CRISP framework identifies four key determinants: Conformity as a function
  of Respect for the rule-maker, Incentives, Social expectations, and intrinsic Preferences for rule-following. Approximately
  23% of participants are unconditional rule-followers. Peer effects are quantified: a 1 percentage point increase in peer
  violations leads to 0.19 percentage point increase in own violations.'
