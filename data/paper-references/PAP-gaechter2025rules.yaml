summary:
  abstract_extended: 'This landmark paper introduces the CRISP framework (Conformity = f(Respect, Incentives, Social expectations,
    Preferences)) to explain why people follow rules even when violations are anonymous, unenforced, and personally costly.
    Using four experiment series with 14,034 participants, the authors demonstrate that 55-70% of people comply with arbitrary
    costly rules. A key finding is that approximately 23% are unconditional rule-followers who comply regardless of context.
    Peer effects are precisely quantified: a 1 percentage point increase in observed peer violations leads to a 0.19 percentage
    point increase in own violations. The paper integrates with the Fehr-Gächter punishment literature and Herrmann et al.
    (2008) cross-cultural cooperation research.'
  key_findings: "1. BASELINE RULE-FOLLOWING: 55-70% comply with arbitrary costly rules\n   even when anonymous and unenforced\n\
    \n2. UNCONDITIONAL RULE-FOLLOWERS: ~23% follow rules regardless of\n   R, I, S conditions - a distinct behavioral type\n\
    \n3. PEER EFFECT COEFFICIENT: 1pp peer violations → 0.19pp own violations\n   Quantifies social contagion in norm violation\n\
    \n4. LEGITIMACY EFFECTS: 15-20 percentage point difference between\n   high/low legitimacy conditions (R component)\n\n\
    5. CRISP FRAMEWORK: C = f(R, I, S, P) provides unified theoretical\n   structure for rule-following determinants\n\n6.\
    \ SAMPLE SIZE: 14,034 participants across 4 experiment series\n\n7. POLICY IMPLICATIONS: Rule design (R), compliance information\
    \ (S),\n   and selection of rule-followers (P) all matter for compliance"
  ebf_relevance: "Domain: CORE-WHO, CORE-WHAT, METHOD-EXP\n10C Dimensions: WHO (~23% unconditional rule-followers), WHAT (U_norm\
