title: A Theory of Auctions and Competitive Bidding
author: Milgrom
year: '1982'
publication_type: journal_article
doi: 10.2307/1913516
abstract: This paper introduces a general auction model based on affiliated random variables and develops the properties of
  affiliation for auction analysis. The authors prove that the Dutch auction and first-price auction are strategically equivalent,
  and establish a revenue ordering showing that discriminatory auctions generally yield lower expected revenues than uniform-price
  auctions, which in turn yield lower expected revenues than English auctions. Section 2 reviews received auction theory and
  summarizes results; Section 3 presents the formal model; Sections 4-8 contain the main theorems; Section 9 discusses the
  state of auction theory.
