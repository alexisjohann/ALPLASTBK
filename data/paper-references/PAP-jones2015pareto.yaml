abstract: Since the early 2000s, research by Thomas Piketty, Emmanuel Saez, and their coauthors has revolutionized our understanding
  of income and wealth inequality. In this paper, I highlight some of the key empirical facts from this research and comment
  on how they relate to macroeconomics and to economic theory more generally. One of the key links between data and theory
  is the Pareto distribution. The paper describes simple mechanisms that give rise to Pareto distributions for income and
  wealth and considers the economic forces that influence top inequality over time and across countries. For example, it is
  in this context that the role of the famous r – g expression is best understood.
