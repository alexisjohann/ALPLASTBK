abstract: 'To make progress on the problem of consciousness, we have to confront it
  directly. In this paper, I first isolate the truly hard part of the problem, separating
  it from more tractable parts and giving an account of why it is so difficult to
  explain. I critique some recent work that uses reductive methods to address consciousness,
  and argue that such methods inevitably fail to come to grips with the hardest part
  of the problem. Once this failure is recognized, the door to further progress is
  opened. In the second half of the paper, I argue that if we move to a new kind of
  nonreductive explanation, a naturalistic account of consciousness can be given.
  I put forward my own candidate for such an account: a nonreductive theory based
  on principles of structural coherence and organizational invariance, and a double-aspect
  theory of information.'
