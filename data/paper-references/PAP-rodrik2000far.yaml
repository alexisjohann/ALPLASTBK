abstract: This article speculates about the future of the world economy 100 years from now. It argues that the spread of markets
  is restricted by the reach of jurisdictional boundaries, and that national sovereignty imposes serious constraints on international
  economic integration. The political trilemma of the world economy is that international economic integration, the nation-state,
  and mass politics cannot co-exist. We have to pick two out of three. The article predicts that it will be the nation-state
  system that disappears, with global federalism taking its place.
