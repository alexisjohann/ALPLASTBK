abstract: "This paper analyzes competition in two-sided markets where platforms must attract users on both sides to succeed. Building on Rochet and Tirole's foundational work, it examines how platforms set prices to 'get both sides on board.' The paper develops models showing that price structure across sides depends on network externalities, relative demand elasticities, and multi-homing behavior. Platform competition leads to prices that differ systematically from cost-based pricing."
