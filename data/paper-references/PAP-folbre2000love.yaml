abstract: This paper explores the implications for economic analysis, societal well-being, and public policy of the movement
  of care services (such as child and elder care) from home to market. A broad empirical overview sets the stage for the argument
  that this process cannot be properly evaluated using only a priori judgments about the suitability of marketization. The
  context in which markets operate is crucial, and while the growth of market provision poses some risks, it also offers some
  potential benefits.
