abstract: ABSTRACT&#x0D; Drawing on behavioral economics, nudges (policy interventions based on choice architecture) have
  the capacity to strategically shape policymaking, subtly guiding individual behavior by adjusting their decision environment.
  Applied to enhance vaccinations, boost retirement savings, or promote healthy habits, these interventions align with consensus-defined
  well-being. As governments adopt nudges, scholars have explored their role in fostering virtues. This paper argues that
  nudges have the potential to efficiently contribute to virtuous development by instilling and sustaining habits, respecting
  individual choice, and ensuring deliberation. It introduces the concept of virtue nudges, emphasizing the alignment of habits
  with virtues for targeted behavioral change and the formation of morally virtuous habits.
