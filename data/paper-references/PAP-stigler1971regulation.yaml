abstract: 'The state—the machinery and power of the state—is a potential resource or threat to every industry in the society.
  With its power to prohibit or compel, to take or give money, the state can and does selectively help or hurt a vast number
  of industries. Regulation may be actively sought by an industry, or it may be thrust upon it. A central thesis of this paper
  is that, as a rule, regulation is acquired by the industry and is designed and operated primarily for its benefit. The state
  has one basic resource which in pure principle is not shared with even the mightiest of its citizens: the power to coerce.
  The state can seize money by the only method which is permitted by the laws of a civilized society, by taxation. The state
  can ordain the physical movements of resources and the economic decisions of households and firms without their consent.'
