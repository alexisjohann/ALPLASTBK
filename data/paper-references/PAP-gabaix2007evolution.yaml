title: Why Has CEO Pay Increased So Much? A Talent-Based Explanation
author: Gabaix
year: '2007'
publication_type: working_paper
doi: 10.1162/qjec.2008.123.1.49
abstract: This paper develops a simple equilibrium model of CEO pay where CEOs have different talents and are matched to firms
  in a competitive assignment model. In market equilibrium, CEO pay depends on both the size of the firm and aggregate firm
  size. The model finds very small dispersion in CEO talent nonetheless justifies large pay differences. The sixfold increase
  in US CEO pay between 1980 and 2003 can be fully attributed to the sixfold increase in market capitalization of large companies.
  The rise in CEO compensation is an efficient equilibrium response to increased firm values rather than resulting from agency
  issues or entrenchment.
