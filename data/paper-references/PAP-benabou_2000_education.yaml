abstract: This paper develops a theory of inequality and the social contract aiming
  to explain how countries with similar economic and political “fundamentals” can
  sustain such different systems of social insurance, fiscal redistribution, and education
  finance as those of the United States and Western Europe. With imperfect credit
  and insurance markets some redistributive policies can improve ex ante welfare,
  and this implies that their political support tends to decrease with inequality.
  Conversely, with credit constraints, lower redistribution translates into more persistent
  inequality; hence the potential for multiple steady states, with mutually reinforcing
  high inequality and low redistribution, or vice versa. (JEL D31, E62, P16, O41,
  I22)
