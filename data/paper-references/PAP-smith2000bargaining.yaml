abstract: This collection of papers by Vernon L. Smith, a creator of experimental economics, includes his primary authored
  and coauthored contributions on bargaining and market behavior between 1990 and 1998. The essays explore the use of laboratory
  experiments to test propositions derived from economics and game theory. They investigate the relationship between experimental
  economics and evolutionary psychology. Specific themes include rational choice, fairness, game theory, institutions and
  market behavior, and laboratory stock markets.
