title: The Effects of Active Labour Market Policies for Immigrants Receiving Social
  Assistance in Denmark
author: Heinesen
year: '2013'
publication_type: journal_article
doi: 10.1186/2193-9039-2-15
abstract: This study estimates the effect of active labour-market programmes on the exit rate to regular employment for non-western immigrants in Denmark who receive social assistance, using the timing-of-events duration model and rich administrative data. We find large positive post-programme effects, and surprisingly, even most in-programme effects are positive. The effects are largest for subsidized employment programmes, but effects are also large and significant for direct employment programmes and other programmes. Effects are larger if programmes begin after six months of unemployment.
