abstract: Can the World Trade Organization (WTO) contribute to the attainment of sound labor and environmental policies? An
  answer requires an understanding of WTO rules. We argue that the purpose of WTO rules is to create a negotiating forum where
  governments can exchange secure market access commitments. From this perspective, we argue that supporters of sound trade,
  labor and environmental policies can benefit from a well-functioning WTO, because facilitating trade liberalization and
  preventing race-to-the-bottom/regulatory-chill problems go hand in hand, and each is accomplished by maintaining secure
  property rights over negotiated market access commitments.
