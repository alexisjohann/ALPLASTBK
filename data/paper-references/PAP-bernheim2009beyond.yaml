abstract: 'We propose a broad generalization of standard choice-theoretic welfare economics that encompasses a wide variety
  of nonstandard behavioral models. Our approach exploits the coherent aspects of choice that those positive models typically
  attempt to capture. It replaces the standard revealed preference relation with an unambiguous choice relation: roughly,
  x is (strictly) unambiguously chosen over y (written xP ∗ y) iff y is never chosen when x is available. Under weak assumptions,
  P ∗ is acyclic and therefore suitable for welfare analysis; it is also the most discerning welfare criterion that never
  overrules choice. The resulting framework generates natural counterparts for the standard tools of applied welfare economics
  and is easily applied in the context of specific behavioral theories, with novel implications. Though not universally discerning,
  it lends itself to principled refinements. I.'
