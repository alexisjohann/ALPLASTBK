abstract: The concept of" probability of causation" forms the basis of important legal
  standards, legislation, and compensation schemes, which in turn use epidemiologic
  data to estimate the probability of causation. This usage is a misapplication of
  epidemiology, because it has been shown that without imposing restrictive biologic
  assumptions, epidemiologic data cannot supply estimates of the probability of causation.
  Although the misapplication of the probability of causation concept responds to
  the need to resolve cases in a rational and consistent manner, this need does not
  justify continued misuse of epidemiologic data in compensation decisions. Compensation
  schemes and legal standards must recognize that an upper bound on the probability
  of causation cannot be determined from epidemiologic data alone; biologic models
  also are needed. Although equitable compensation schemes can be formulated without
  reference to the probability of causation, all schemes must deal with fundamental
  methodologic uncertainties in estimation.
