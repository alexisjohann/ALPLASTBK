abstract: 'In this essay, we discuss the importance of consumption inequality in the debate concerning the measurement of
  disparities in economic well-being. We summarize the advantages and disadvantages of using consumption as opposed to income
  for measuring trends in economic well-being. We critically evaluate the available evidence on these trends, and in particular
  discuss how the literature has evolved in its assessment of whether consumption inequality has grown as much as or less
  than income inequality. We provide some novel evidence on three relatively unexplored themes: inequality in different spending
  components, inequality in leisure time, and intergenerational consumption mobility.'
