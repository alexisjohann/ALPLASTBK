abstract: 'Thaler''s AEA Presidential Address argues that behavioral economics returns

  economic thinking to its roots with Adam Smith and other classical economists

  who discussed loss aversion, overconfidence, and self-control. The fundamental

  problem is that economics relies on one theory to accomplish two different

  goals: characterizing optimal behavior and predicting actual behavior. While

  optimization theories remain essential building blocks, they must be augmented

  with descriptive theories derived from data rather than axioms. The paper

  demonstrates that traditional arguments for ignoring psychology

  ("explainawaytions") have been rejected both theoretically and empirically.

  Supposedly Irrelevant Factors (SIFs) — variables the traditional model

  predicts should have no effect — in fact matter greatly.

  '
key_findings_structured:
- title: Two Goals Require Two Types of Theories
  finding: 'Economics attempts to use one theory (optimization) for two distinct goals: (i) characterizing optimal behavior
    (normative) and (ii) predicting actual behavior (descriptive). Optimization theories are essential but must be augmented
    with descriptive theories derived from empirical data.'
- title: Supposedly Irrelevant Factors (SIFs) Matter
  finding: Traditional theory predicts certain factors should have no effect on behavior. Contrary to these predictions, SIFs
    (framing effects, defaults, social norms, mental accounting) are often the single most important determinant of behavior.
- title: Explainawaytions Have Been Refuted
  finding: Traditional arguments for ignoring psychology — including the 'as if' defense, learning arguments, market discipline
    claims, and efficient market hypothesis — have been rejected both theoretically and empirically.
- title: Behavioral Economics Returns to Historical Roots
  finding: Adam Smith, Fisher, Keynes, and Pigou already discussed core behavioral concepts. Behavioral economics is not a
    revolution but a return to origins before the post-WWII mathematical formalization replaced realistic human behavior with
    Homo economicus.
