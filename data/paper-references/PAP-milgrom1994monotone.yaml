abstract: The authors derive a necessary and sufficient condition for the solution
  set of an optimization problem to be monotonic in the parameters of the problem.
  In addition, they develop practical methods for checking the condition and demonstrate
  its applications to the classical theories of the competitive firm, the monopolist,
  the Bertrand oligopolist, consumer and growth theory, game theory, and general equilibrium
  analysis. Copyright 1994 by The Econometric Society.
