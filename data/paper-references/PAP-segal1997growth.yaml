abstract: Temporary services employment grew rapidly over the past several decades and now accounts for a sizable fraction
  of aggregate employment. The authors use Current Population Survey data to examine the changing nature of temporary work
  and discuss explanations for its growth. Temps are no longer overwhelmingly female or limited to clerical occupations. They
  have less labor market security than permanent workers, being prone to more unemployment and more underemployment. Few,
  however, are in temp positions a year later and the majority transition to permanent employment. Temp wages are approximately
  20 percent below permanent workers, but individual and job characteristics explain approximately two-thirds of the gap.
