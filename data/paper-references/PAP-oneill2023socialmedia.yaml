abstract: This study examines the influence of social media on the development of children and young people, focusing on four
  categories of risk (content, contact, conduct, contract - the 4Cs framework). It reviews EU policy frameworks including
  BIK+, DSA, AVMSD, and GDPR, alongside international developments like Age Appropriate Design Codes. The study provides five
  policy recommendations for strengthening child protection in digital environments.
