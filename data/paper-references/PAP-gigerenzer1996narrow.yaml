abstract: This reply clarifies what G. Gigerenzers (e.g., 1991. 1994; Gigerenzer & Murray, 1987) critique of the heuristics-and-biases
  approach to statistical reasoning is and is not about. At issue is the imposition of unnecessarily narrow norms of sound
  reasoning that are used to diagnose so-called cognitive illusions and the continuing reliance on vague heuristics that explain
  everything and nothing. D. Kahneman and A. Tversky (1996) incorrectly asserted that Gigerenzer simply claimed that frequency
  formats make all cognitive illusions disappear. In contrast, Gigerenzer has proposed and tested models that actually predict
  when frequency judgments are valid and when they are not. The issue is not whether or not. or how often, cognitive illusions
  disappear. The focus should be rather the construction of detailed models of cognitive processes that explain when and why
  they disappear. A postscript responds to Kahneman and Tversky's (1996) postscript.
