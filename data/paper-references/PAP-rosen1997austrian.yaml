abstract: The systems aspects of Austrian economic thought pertaining to the process of competition deserve a prominent place
  in modern economic thinking. The paper develops the differences between the Austrian view of competition as an evolutionary
  process, and the neoclassical emphasis on determining market equilibrium under known or given conditions. These bear importantly
  on the fundamental way we think about decentralization of economic activities among highly specialized agents with incomplete
  knowledge and information. The role of competition as a selection device that often encourages survival of the fittest and
  solves some types of agency problems is well worth thinking about.
