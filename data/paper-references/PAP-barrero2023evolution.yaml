abstract: Full days worked at home account for 28 percent of paid workdays among Americans 20–64 years old, as of mid-2023.
  That’s about four times the 2019 rate and ten times the rate in the mid-1990s. We first explain why the big shift to work
  from home has endured rather than reverting to prepandemic levels. We then consider how work-from-home rates vary by worker
  age, sex, education, parental status, industry and local population density, and why it is higher in the United States than
  other countries. We also discuss some implications for pay, productivity, and the pace of innovation. Over the next five
  years, US business executives anticipate modest increases in work-from-home rates at their own companies. Other factors
  that portend an enduring shift to work from home include the ongoing adaptation of managerial practices and further advances
  in technologies, products, and tools that support remote work.
