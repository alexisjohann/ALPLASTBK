abstract: This section will offer a description of data sources that may be of interest to economists. The purpose is to describe
  what data are available from those sources, what questions can be addressed because of the unique features of the data,
  and how an interested reader can gain access to the data. Suggestions for data sources that might be discussed here (or
  comments on past columns) can be sent to William N. Evans, c/o Data Watch, University of Maryland, Department of Economics,
  College Park, Maryland 20742, or they can be e-mailed to 〈 evans@econ.umd.edu 〉.
