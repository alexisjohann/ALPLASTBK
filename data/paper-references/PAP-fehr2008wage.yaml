    \ IMPLICATIONS\n   - Wage policy affects effort\n   - Relationship investments\n   - Long-term perspective"
  ebf_relevance: '10C DIMENSIONS:

    - WHAT (C): Effort-wage reciprocity

    - WHEN (V): Employment relationship context

    - HOW (B): Gift exchange dynamics


    THEORY SUPPORT:

    - MS-SR-001: Strong Reciprocity

    - Gift exchange theory

    - JEBO labor economics


    KEY INSIGHT:

    Labor supply is behaviorally dependent on wages through reciprocity;

    fair treatment generates effort beyond what monetary incentives alone predict.'
