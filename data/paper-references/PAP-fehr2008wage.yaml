summary:
  abstract_extended: 'This paper examines how labor supply depends on behavioral factors, particularly

    reciprocity. We show that "you get what you pay for" - fair wages elicit

    higher effort through reciprocal motivation.'
  key_findings: "1. GIFT EXCHANGE\n   - Fair wages increase effort\n   - Reciprocal labor supply\n   - Beyond standard incentives\n\
