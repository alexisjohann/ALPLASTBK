abstract: 'The purpose of this symposium is to explore a number of controversial issues that divide economists and remain
  relevant to current debates on public policy. The central questions explored in these papers concern the economic progress
  of American blacks: Why did they progress economically when and to the degree that they did? What has been the relative
  importance of education, migration, family structure, job experience, shifts in aggregate demand, voluntary reductions in
  discrimination, and government anti-discrimination policies in the economic advance of blacks?'
