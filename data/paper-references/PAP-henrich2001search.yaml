abstract: 'We conducted ultimatum, public goods, and dictator game experiments in 15 small-scale societies across five continents.
  Our results show substantial cross-cultural variation in fairness behavior that cannot be explained by self-interest. Behavior
  in these games is correlated with local economic and social conditions: societies with more market integration and more
  anonymous interactions show behavior closer to standard predictions. These findings demonstrate that preferences for fairness
