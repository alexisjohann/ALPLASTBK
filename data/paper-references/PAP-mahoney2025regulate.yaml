abstract: This essay examines the growing prevalence of junk fees, including mandatory back-end fees and hidden add-on charges,
  which obscure the true cost of goods and services. Drawing on examples from event tickets, hotels, cable bills, restaurants,
  and financial services, I show how these pricing practices increase search costs and equilibrium prices, distort consumer
  choices, and divert innovation toward exploitative rather than value-enhancing strategies. Economic theory and evidence
  suggest that competition and disclosure alone are often insufficient to discipline junk fees. I review recent regulatory
  responses, including federal and state rules that require all-in-one upfront pricing, and discuss their implications for
  consumer welfare and market efficiency. The rapid evolution of junk fee policies provides economists with rich opportunities
  to study their intended and unintended consequences. At its core, the case for regulating junk fees rests not on paternalism
  but on enhancing market functioning.
