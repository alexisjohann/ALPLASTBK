abstract: 'A Course in Game Theory presents the main ideas of game theory at a level
  suitable for graduate students and advanced undergraduates, emphasizing the theory''s
  foundations and interpretations of its basic concepts. The authors provide precise
  definitions and full proofs of results, sacrificing generalities and limiting the
  scope of the material in order to do so. The text is organized in four parts: strategic
  games, extensive games with perfect information, extensive games with imperfect
  information, and coalitional games. It includes over 100 exercises.'
