summary:
  abstract_extended: 'Social norms are behavioral rules that are partly enforced through sanctions

    from other members of the community. We argue that understanding the nature

    of social norm enforcement is crucial for understanding human cooperation.

    Recent evidence from experimental economics and neuroscience suggests that

    humans have a strong predisposition to enforce social norms even at personal

    cost.'
  key_findings: "1. SOCIAL NORMS DEFINED\n   - Behavioral standards shared by a community\n   - Enforced through social sanctions\
    \ (approval/disapproval)\n   - Internalized as preferences/emotions\n\n2. NORM ENFORCEMENT MECHANISMS\n   - Direct punishment\
    \ of violators\n   - Third-party punishment\n   - Exclusion from future interactions\n   - Reputation damage\n\n3. COGNITIVE\
    \ BASIS\n   - Emotion systems (anger at violations)\n   - Theory of mind (intent attribution)\n   - Cultural learning\
    \ (norm acquisition)\n\n4. NEURAL CORRELATES\n   - Prefrontal cortex in norm compliance\n   - Striatum in reward from\
    \ punishment\n   - Insula in disgust at unfairness"
  ebf_relevance: '10C DIMENSIONS:

    - WHAT (C): Social norms as utility-relevant

    - WHEN (V): Context activates different norms

    - AWARE (AU): Norm salience affects compliance


    THEORY SUPPORT:

    - MS-SN-001: Social Norms

    - Links behavioral economics to cognitive neuroscience


    KEY INSIGHT:

    Social norms are enforced by decentralized punishment, making cooperation

    self-sustaining without external enforcement.'
