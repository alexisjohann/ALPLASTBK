abstract: 'There is increasing concern that most current published research findings

  are false. The probability that a research claim is true depends on study

  power and bias, the number of other studies on the same question, and the

  ratio of true to no relationships among the relationships probed in each

  scientific field. A research finding is less likely to be true when studies

  are smaller, effect sizes smaller, more relationships tested, greater design

  flexibility, greater financial interests, and more teams chasing statistical

  significance. Simulations show that for most study designs and settings, it

  is more likely for a research claim to be false than true. For many current

  scientific fields, claimed research findings may often be simply accurate

  measures of the prevailing bias.

  '
key_findings_structured:
- title: Positive Predictive Value (PPV) Framework
  finding: The probability that a research finding is true depends on pre-study probability (R), statistical power (1-beta),
    and bias (u). PPV = (1-beta)*R / ((1-beta)*R + alpha). Most fields have low R, making false positives likely.
- title: Six Corollaries Reducing Research Validity
  finding: 'Research findings are less likely true when: (1) studies are smaller, (2) effect sizes are smaller, (3) more relationships
    are tested, (4) greater design flexibility exists, (5) greater financial interests, (6) more teams chase significance.'
- title: Bias as Primary Signal
  finding: For many scientific fields, claimed research findings may simply be accurate measures of the prevailing bias rather
    than true effects. The research enterprise itself introduces systematic distortion.
- title: Implications for Replication
  finding: Very large studies, pre-registered designs, and independent replication are necessary to establish credible findings.
    The replication crisis is a predictable consequence of the PPV framework.
