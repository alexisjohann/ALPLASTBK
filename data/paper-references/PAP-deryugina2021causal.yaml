abstract: Life expectancy varies substantially across local regions within a country, raising conjectures that place of residence
  affects health. However, population sorting and other confounders make it difficult to disentangle the effects of place
  on health from other geographic differences in life expectancy. Recent studies have overcome such challenges to demonstrate
  that place of residence substantially influences health and mortality. Whether policies that encourage people to move to
  places that are better for their health or that improve areas that are detrimental to health are desirable depends on the
  mechanisms behind place effects, yet these mechanisms remain poorly understood.
