abstract: 'In this paper, we develop a theory of individual choice called melioration, which implies that choices distributed
  over a period of time may be reliably and predictably suboptimal, in terms of the person''s own preferences. Consider some
  typical examples of distributed choices: the expenditure rate on various non-durables; frequency of athletic exercise; rate
  of work in free-lance type occupations; allocation of leisure time; rate of savings (or dissavings); expenditures on lottery
  tickets, and other forms of gambling. When people express dissatisfaction about their choices, their discontent seems clustered
  around these sorts of distributed choices. For example, complaints that one is working too hard (or not hard enough), exercising
  too little (or too much), wasting time, overeating, overspending, and so on are commonplace. The next two sections of the
  paper spell out the basic theory we are proposing. The following section then applies the theory to “pathological” consumption
  patterns, and shows that one should find a general underinvestment in those activities that exhibit increasing average returns
  to rate of consumption, and an overinvestment in activities that have an addiction-like interaction between value and rate.
  The final section compares the theory with other approaches to suboptimal choice.'
