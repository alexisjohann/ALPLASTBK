abstract: 'Sandy Grossman, Professor of Economics at Princeton University, is the winner of the John Bates Clark Medal for
  1987, given to “that American economist under forty who is adjudged to have made a significant contribution to economic
  thought and knowledge.” I have been invited by the editors to review some of the contributions that Grossman has made to
  economics. My review will concentrate on two of the major themes in Grossman''s work: models of rational expectations equilibria
  in situations where there is privately held information; and models of the modern corporation, emphasizing incentives for
  managers. The concluding section briefly mentions some other themes and remarks on the broad impact Grossman has had on
  the community of economists.'
