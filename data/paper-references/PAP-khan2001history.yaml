abstract: The U.S. was a pioneer in establishing the world's first modern intellectual property system. That system was distinguished
  by the provision of broad access to, and strict enforcement of, property rights in new inventions, coupled with the requirement
  of public disclosure, and it was effective at stimulating the growth of a market for technology and technical change more
  generally. Far from being static, fundamental modifications were introduced over time in response to changing circumstances.
  That such adjustments so often proved to be constructive owes partly to a private market being a central feature of the
  system, and partly to the democratic structure of U.S. institutions.
