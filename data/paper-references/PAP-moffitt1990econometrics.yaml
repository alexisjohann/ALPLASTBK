abstract: In the last several years, a branch of applied econometrics has developed that is devoted to the development of
  techniques for the estimation of demand and other functions when the budget constraint is “piecewise-linear,” or “kinky”—that
  is, when the constraint consists of a number of segments joined together at kink points. Such constraints most frequently
  arise from government tax and transfer programs. But kinked constraints sometimes arise in nongovernment contexts, a well-known
  example being the block pricing schedule commonly set by utilities and volume discounting in general. Kinked budget constraints
  create two difficulties. First, changes in tax and transfer schedules can have unexpected effects that can be exactly the
  opposite in sign to those expected from economic theory. Examples of this phenomenon are given below. Second, kinked budget
  constraints make the estimation of demand functions quite difficult.
