abstract: 'In this paper, the author summarizes four new strands in agency theory that help him think about incentives in
  real organizations. As a point of departure, The author begins with a quick sketch of the classic agency model. He then
  discusses static models of objective performance measurement that sharpen Kerr''s argument; repeated-game models of subjective
  performance assessments; incentives for skill development rather than simply for effort; and incentive contracts between
  versus within organizations. The author concludes by suggesting two avenues for further progress in agency theory: better
  integration with organizational economics, as launched by Coase (1937) and reinvigorated by Williamson (1975, 1985), and
  cross-pollination with other fields that study organizations, including industrial relations, organizational sociology,
  and social psychology.'
