abstract: The widely publicized finding that “aid promotes growth in a good policy environment” is not robust to the inclusion
  of new data or alternative definitions of “aid,” “policy” or “growth.” The idea that “aid buys growth” is on shaky ground
  theoretically and empirically. It doesn’t help that aid agencies face poor incentives to deliver results and underinvest
  in enforcing aid conditions and performing scientific evaluations. Aid should set more modest goals, like helping some of
  the people some of the time, rather than trying to be the catalyst for societywide transformation.
