abstract: 'A “poverty trap” can be understood as a set of self-reinforcing mechanisms whereby countries start poor and remain
  poor: poverty begets poverty, so that current poverty is itself a direct cause of poverty in the future. The idea of a poverty
  trap has this striking implication for policy: much poverty is needless, in the sense that a different equilibrium is possible
  and one-time policy efforts to break the poverty trap may have lasting effects. But what does the modern evidence suggest
  about the extent to which poverty traps exist in practice and the underlying mechanisms that may be involved? The main mechanisms
  we examine include S-shaped savings functions at the country level; “big-push” theories of development based on coordination
  failures; hunger-based traps which rely on physical work capacity rising nonlinearly with food intake at low levels; and
  occupational poverty traps whereby poor individuals who start businesses that are too small will be trapped earning subsistence
  returns. We conclude that these types of poverty traps are rare and largely limited to remote or otherwise disadvantaged
  areas. We discuss behavioral poverty traps as a recent area of research, and geographic poverty traps as the most likely
  form of a trap. The resulting policy prescriptions are quite different from the calls for a big push in aid or an expansion
  of microfinance. The more-likely poverty traps call for action in less-traditional policy areas such as promoting more migration.'
