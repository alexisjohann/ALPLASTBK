case_examples:
- id: leila_facebook
  experience: data_capture
  description: Sex worker whose clients appeared in Facebook's 'People You May Know'
  insight: Privacy invasion can be life-threatening for vulnerable populations
- id: danielle_alexa
  experience: data_capture
  description: Consumer whose Alexa recorded private conversation and sent to contact
  insight: Reactance leads to product abandonment ('never plugging that device in
    again')
- id: spotify_recommendations
  experience: classification
  description: Consumer frustrated by recommendations based on outdated preferences
  insight: AI fails to capture multifaceted, evolving self
- id: apple_card_gender
  experience: classification
  description: David Heinemeier Hansson's wife received 20x lower credit limit despite
    joint finances
  insight: Algorithmic discrimination triggers moral outrage
- id: rekognition_congress
  experience: classification
  description: Amazon Rekognition incorrectly matched 28 Congress members with mugshots
  insight: Facial recognition disproportionately fails for people of color
- id: smart_compose
  experience: delegation
  description: Journalist John Seabrook accepting AI writing suggestion 'proud' instead
    of 'pleased'
  insight: Concerns about skill atrophy and authentic self-expression
- id: danny_universal_credit
  experience: social
  description: Man with learning disabilities struggling with automated benefit system
  insight: AI can exclude vulnerable populations from essential services
- id: siri_sexism
  experience: social
  description: Siri responding to 'you're a slut' with 'I'd blush if I could'
  insight: AI can reinforce gender stereotypes and normalize harassment
