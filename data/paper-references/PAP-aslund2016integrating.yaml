abstract: We examine the impact of restructuring active labor market programs for
  unemployed immigrants in Finland. Exploiting a discontinuity in the phase-in rules
  of the reform, we find that it increased compliers' cumulative earnings by 47% over
  a 10-year follow-up period. We attribute these improvements to a more efficient
  use of existing resources. The reform did not affect total days in training, but
  it did modify the content toward training specifically designed for immigrants.
