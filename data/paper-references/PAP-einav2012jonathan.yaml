abstract: 'Jonathan Levin, the 2011 recipient of the American Economic Association''s John Bates Clark Medal, has established
  himself as a leader in the fields of industrial organization and microeconomic theory. Jon has made important contributions
  in many areas: the economics of contracts and organizations; market design; markets with asymmetric information; and estimation
  methods for dynamic games. Jon''s combination of breadth and depth is remarkable, ranging from important papers in very
  distinct areas such as economic theory and econometric methods to applied work that seamlessly integrates theory with data.
  In what follows, we will attempt to do justice not only to Jon''s academic work, but also try to sketch a broader portrait
  of Jon''s other contributions to economics as a gifted teacher, dedicated advisor, and selfless provider of public goods.'
