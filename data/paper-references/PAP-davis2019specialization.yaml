title: Specialization, Fragmentation, and Pluralism in Economics
author: Davis
year: '2019'
publication_type: journal_article
doi: null
doi_missing_reason: not_found
abstract: "This paper investigates whether specialization in research is causing economics to become increasingly fragmented and diverse with rising niche-based programs and declining dominant cross-science programs. It frames the issue in terms of centrifugal and centripetal forces, distinguishes descriptive from normative pluralism, and reviews evidence regarding JEL codes and the Clark Award pointing toward rising specialization. Five arguments are examined: Smith's division of labor view, Kuhn's later thinking about specialization, Heiner's behavioral burden of knowledge argument, Ross's innovation-diffusion analysis and Arthur's theory of technological change, and effects of internationalization on innovation appropriation. The paper discusses what descriptive pluralism implies about normative pluralism and makes a case for multidisciplinarity over interdisciplinarity."
