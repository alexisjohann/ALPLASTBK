  abstract: '"We show that neither mechanism reliably supports the evolution of cooperation

    when actions vary continuously... Although repeated interactions and group

    competitions do not support cooperation by themselves, combining them often

    triggers powerful synergies because group competitions can stabilise cooperative

    strategies against the corrosive effect of ambiguous reciprocity."

    '
  key_insight: '"A mechanism with critical limitations on its own may be critically
    important

    in interaction with other mechanisms."

    '
  uniqueness: '"The combination of mechanisms responsible for human cooperation can
    also be

    special or even unique."

    '
