  external_validity:
    population: Ngenikas and Perepkas (Papua New Guinea)
    setting: Western Highlands, horticultural societies beyond state institutions
    generalizability: High theoretical, medium empirical
    why_PNG: Social preferences, local norms, reciprocity govern social life - similar
      to ancestral conditions
simulation:
  population_structure:
    n_groups: 40
    group_size: 24
    total_population: 960
  scenarios:
    repeated_interactions:
      description: No competition between groups, ingroup strategies only
      interactions_per_pair:
      - 100
      - 1000
    group_competition:
      description: Groups compete, games always one-shot
      ingroup_and_outgroup: true
    joint:
      description: Repeated interactions within groups + competition between groups
      ingroup: repeated
      outgroup: one-shot with competition
  model_characteristics:
    1_strategy_dimensionality:
      values:
      - 2
      - 3
      - 4
      2D: Initial transfer + slope (escalating/de-escalating only)
      3D: Initial transfer + left/right intercepts (allows ambiguous reciprocity)
      4D: Nonlinear response functions
      critical_finding: Cooperative strategies only persist with 2D; fail with 3D+
    2_cancellation_individual:
      description: Life cycle affects whether relatedness supports cooperation
      decoupled:
        sequence: birth → game play → migration → competition → selection
        effect: Reduces cancellation, enhances cooperation potential
      coupled:
        sequence: birth → migration → game play → competition → selection
        effect: Cancellation stronger, cooperation harder
    3_cancellation_group:
      parameter: Ξ (Xi)
      values:
      - 0
      - 20
      - 40
      Xi_0: No group mixing - cancellation effects strongest
      Xi_40: Full group mixing - cancellation effects minimized
    4_competition_sensitivity:
      parameter: λ (lambda)
      values:
      - 0
      - 10
      - 25
      - 100
      lambda_0: Competition outcomes unrelated to resources (no group selection)
      lambda_100: Group with more resources almost always wins
    5_migration_rate:
      parameter: mj
      values:
      - 8
      - 16
      mj_8: Low migration → higher relatedness within groups
      mj_16: High migration → lower relatedness within groups
    6_initial_conditions:
      values:
      - All perfect reciprocators (favorable)
      - All unconditionally selfish (unfavorable)
      - Random strategies (neutral)
  total_combinations: 896
strategy_types:
  perfect_reciprocity:
    formula: current_transfer = partner_last_transfer
    dimensions_required: 2
    figure: Fig 1 dashed line
  escalating_reciprocity:
    formula: current_transfer > partner_last_transfer (when possible)
    effect: Converges to full cooperation
    cooperative: true
    dimensions_required: 2
  de_escalating_reciprocity:
    formula: current_transfer < partner_last_transfer (when possible)
    effect: Converges to full defection
    cooperative: false
    dimensions_required: 2
  ambiguous_reciprocity:
    formula: Escalates low transfers, de-escalates high transfers
    effect: Converges to intermediate cooperation levels
    dimensions_required: 3
    critical_role: Undermines cooperation under repeated interactions alone
  nonlinear_reciprocity:
    description: Can punish low with lower AND reward high with higher
    dimensions_required: 4
figure_results:
  fig1:
    title: Example response functions
    content: Illustrates perfect, escalating, de-escalating, ambiguous, and nonlinear
      reciprocity
    panels:
      a: Perfect and escalating reciprocity (2D)
      b: Perfect and de-escalating reciprocity (2D)
      c: Perfect and ambiguous reciprocity (3D required)
      d: Perfect and nonlinear reciprocity (4D required)
  fig2:
    title: Strategic flexibility hinders cooperative reciprocity under repeated interactions
    metric: Mean surplus per individual per ingroup interaction
    key_finding: Cooperative strategies only evolve/persist with 2D strategy space
    panels:
      a: 'Decoupled, mj=8: 2D high surplus, 3D/4D near zero'
      b: 'Coupled, mj=8: 2D high surplus, 3D/4D near zero'
      c: 'Decoupled, mj=16: 2D moderate surplus, 3D/4D near zero'
      d: 'Coupled, mj=16: 2D moderate surplus, 3D/4D near zero'
    conditions:
      N: 100
      initial_conditions:
      - All perfect reciprocity
      - All selfish
  fig3:
    title: Super-additive cooperation (favorable initial conditions, Ξ=40)
    metric: Mean surplus decomposed into RI effect + GC effect + super-additive effect
    key_finding: Strong super-additivity in panels a, b, d
    conditions:
      initial: All perfect reciprocators
      Xi: 40
    panels:
      a: 'Decoupled, mj=8: Super-additive at λ≥10'
      b: 'Coupled, mj=8: Super-additive at λ≥10'
      c: 'Decoupled, mj=16: Sub-additive'
      d: 'Coupled, mj=16: Strong super-additivity'
  fig4:
    title: Super-additive cooperation (favorable IC, Ξ=0 - strong cancellation)
    metric: Mean surplus with group-level cancellation effects
    key_finding: Super-additivity persists even with Ξ=0
    conditions:
      initial: All perfect reciprocators
      Xi: 0
    panels:
      a: 'Decoupled, mj=8: Super-additive'
      b: 'Coupled, mj=8: Super-additive'
      c: 'Decoupled, mj=16: Sub-additive'
      d: 'Coupled, mj=16: Extremely strong super-additivity'
  fig5:
    title: Super-additive cooperation (unfavorable IC, Ξ=40)
    metric: Mean surplus when starting from all selfish
    key_finding: Cooperative strategies can invade and produce super-additivity
    conditions:
      initial: All selfish
      Xi: 40
    panels:
      a: 'Decoupled, mj=8: Large super-additive gains'
      b: 'Coupled, mj=8: Large super-additive gains'
      c: 'Decoupled, mj=16: Sub-additive'
      d: 'Coupled, mj=16: Super-additive'
  fig6:
    title: Super-additive cooperation (unfavorable IC, Ξ=0)
    metric: Mean surplus under worst conditions
    key_finding: Even with all unfavorable conditions, super-additivity emerges
    conditions:
      initial: All selfish
      Xi: 0
    panels:
      a: 'Decoupled, mj=8: Super-additive'
      b: 'Coupled, mj=8: Super-additive'
      c: 'Decoupled, mj=16: Sub-additive'
      d: 'Coupled, mj=16: Extremely strong super-additivity despite worst conditions'
  fig7:
    title: Evolution of strategies under three scenarios
    content: Strategy frequencies over 50,000 generations
    conditions:
      mj: 16
      lambda: 100
      Xi: 0
      lifecycle: coupled
    panels:
      a_b:
        scenario: Repeated interactions (RI)
        result: Evolves to low initial transfers, de-escalating reciprocity
        initial: Favorable
      c_d:
        scenario: Group competition (GC)
        result: Evolves to low initial transfers, de-escalating reciprocity
        initial: Favorable
      e_f:
        scenario: Joint
        result: Evolves to high initial transfers, escalating reciprocity
        initial: Unfavorable (all selfish)
        note: ONLY joint scenario produces cooperative reciprocity
  fig8:
    title: First mover transfers and second mover back transfers (PNG experiment)
    panels:
      a:
        content: First mover transfers by group condition
        ingroup_mean: ~3.5 Kina (n=36)
        outgroup_mean: ~1.5 Kina (n=37)
        test: ordinal logistic regression with ingroup dummy
        p_value: <0.001
      b:
        content: Second mover response functions
        ingroup: Escalating reciprocity (slope > 1)
        outgroup: De-escalating reciprocity (slope < 1)
        sample_ingroup: 36
        sample_outgroup: 34
        test: ordinal logistic regression, clustered on subject
        p_value: <0.001
        key_observation: Only joint scenario predicts this exact pattern
experiment:
  location:
    region: Western Highlands
    country: Papua New Guinea
    distance_between_groups: ~30 km
  groups:
  - name: Ngenikas
    type: horticultural group
  - name: Perepkas
    type: horticultural group
  relation: No memory of hostilities between groups
  context: Beyond reach of state institutions - social preferences and norms govern
    life
  game_design:
    type: Sequential social dilemma (trust game variant)
    endowment: 5
    endowment_context: ~half of high daily wage for informal labor
    transfer_range:
    - 0
    - 1
    - 2
    - 3
    - 4
    - 5
    multiplier: 2
    first_mover: Transfers 0-5 Kina to second mover
    second_mover: Strategy method - specifies back-transfer for each possible first-mover
      transfer
  treatments:
    design: between-subjects
    conditions:
      ingroup:
      - Ngenika/Ngenika
      - Perepka/Perepka
      outgroup:
      - Ngenika/Perepka
      - Perepka/Ngenika
    knowledge: Players know partner's group affiliation
    anonymity: Interactions anonymous except for group affiliation
  sample_sizes:
    first_movers:
      ingroup: 36
      outgroup: 37
    second_movers:
      ingroup: 36
      outgroup: 34
  results:
    first_movers:
      finding: High transfers with ingroup, low with outgroup
      test: ordinal logistic regression with ingroup dummy
      significance: p < 0.001
      figure: Fig 8a
    second_movers:
      finding_slope: Positively sloped response functions (both conditions)
      slope_test: ordinal logistic regression, clustered on subject
      slope_significance: p < 0.001
      finding_level: More cooperative with ingroup than outgroup
      level_test: ordinal logistic regression, clustered on subject
      level_significance: p < 0.001
      finding_reciprocity_type:
        ingroup: Escalating reciprocity
        outgroup: De-escalating reciprocity
      figure: Fig 8b
      note: Only joint scenario reliably predicts this exact pattern
key_findings:
  main_result: 'Neither repeated interactions alone nor intergroup competition alone

    reliably support the evolution of cooperation. However, COMBINING both

    mechanisms triggers powerful synergies: super-additive cooperation where

    the joint effect exceeds the sum of individual effects.

    '
  repeated_interactions_failure:
    finding: Cooperative strategies invade but never persist with 3D+ strategy space
    mechanism: '1. Escalating strategies become common

      2. Variation in escalation degree is selectively neutral (all high transfers)

      3. Drift makes population vulnerable to ambiguous reciprocity

      4. Ambiguous strategies invade

      5. De-escalating strategies displace ambiguous

      6. Result: uncooperative equilibrium

      '
    robustness: '- Holds for N=100 and N=1000 interactions

      - Holds for 2x and 4x transfer multipliers

      - Holds even with very low migration rates

      '
  intergroup_competition_failure:
    finding: Only works with delicate three-part mix
    requirements:
    - condition_1: Coupled life cycle (game play before migration)
    - condition_2: λ = 100 (high sensitivity to group differences)
    - condition_3: mj = 8 (low migration rate)
    why_failure: '- Groups must differ (high migration → similar groups)

      - Cooperative groups must win (low λ → random outcomes)

      - Gains must stay in group (decoupled → gains exported before competition)

      '
  joint_scenario_success:
    finding: Super-additive cooperation across wide range of conditions
    mechanism: 'Repeated interactions create a cooperative attractor (fragile).

      Intergroup competition stabilizes against drift and ambiguous reciprocity.

      Neither mechanism creates the attractor alone - but together they do.

      '
    robustness:
    - Works with 3D and 4D strategy spaces
    - Works with high migration rates (mj = 16)
    - Works with λ well below maximum
    - Works with decoupled life cycle
    - Works even with strong group-level cancellation (Ξ = 0)
  evolved_strategies:
    ingroup: High initial transfers + escalating reciprocity (cooperative)
    outgroup: Low initial transfers + de-escalating reciprocity (uncooperative)
    uniqueness: Only joint scenario reliably produces this pattern
