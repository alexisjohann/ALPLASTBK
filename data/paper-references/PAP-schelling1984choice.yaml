abstract: This book explores the ambiguous terrain where rationality meets real human behavior. Schelling examines how people
  try to govern their own behavior through anticipatory self-command - strategies to constrain future choices when facing
  temptations like food, cigarettes, or procrastination. The book ventures into topics from nuclear terrorism to blackmail,
  from daydreaming to euthanasia, unwrapping ethical issues embedded in economics. A major contribution is the analysis of
  the intimate contest for self-command in intertemporal choice, showing how individuals resort to commitment devices when
  anticipating future weakness of will.
