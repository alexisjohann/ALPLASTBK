structural_characteristics:
  S1_research_question:
    available: true
    questions:
    - Do consumers care about privacy and act to protect it?
    - What psychological factors limit consumers' ability to achieve desired privacy?
    - What economic factors affect the supply of privacy?
    - Is the 'privacy paradox' real, and what explains it?
    - What policy interventions are needed to protect privacy?
    clarity: high
  S2_methodology:
    available: true
    approach: theoretical_review
    methods:
    - Literature review across psychology and economics
    - Synthesis of survey evidence
    - Review of field studies
    - Analysis of experimental evidence
    - Integration of economic and psychological factors
    - Policy analysis
    key_definitions:
    - 'Privacy paradox: Gap between self-reported privacy attitudes and actual behaviors'
    - 'Desired privacy: The level of privacy individuals want (Altman''s framework)'
    - 'Achieved privacy: The level of privacy individuals actually attain'
    - 'Control paradox: Illusory control leads to increased disclosure'
    - 'Digital resignation: Giving up on privacy management due to helplessness'
    - 'Privacy dark matter: Non-economic ramifications difficult to quantify'
  S3_sample_data:
    available: true
    type: review
    empirical_data: true
    sample_characteristics:
    - Review synthesizes 100+ empirical studies
    - Survey evidence from Pew, CISCO, DuckDuckGo, Instamotor
    - Field studies from Facebook, Wikipedia, GDPR implementations
    - Laboratory experiments on privacy valuation
    - Cross-cultural evidence across history and geography
    key_statistics:
      privacy_protective_action_rate: 0.86
      social_network_restriction_rate: 0.58
      gift_card_privacy_premium_refusal: 0.5
      purchase_privacy_premium: 0.04
      gdpr_location_optin_rate: 0.055
      do_not_call_registration_rate: 0.72
      contact_tracing_unwilling: 0.53
  S4_findings:
    available: true
    key_findings:
    - finding: Consumers fundamentally care about privacy and take protective actions
      evidence: 86% of US adults took steps to mask digital footprints (Pew 2013)
      interpretation: Privacy is NOT dead; claims confuse wants with opportunities
    - finding: 9 psychological factors affect privacy decision making
      factors: information asymmetries, bounded rationality, present bias, intangibility, constructed preferences, illusory
        control, herding, adaptation, drive to share
      interpretation: These create gap between desired and achieved privacy
    - finding: 'Control paradox: Greater control leads to greater disclosure'
      evidence: Brandimarte et al. 2013 experiment
      interpretation: Illusory sense of control reduces privacy vigilance
    - finding: Economic factors drive privacy under-supply
      mechanisms: Network effects, lock-in, privacy externalities, surveillance business model
      interpretation: Marginal cost of protection increases rapidly
    - finding: Privacy paradox exists but is explained by psychological and economic factors
      evidence: Multiple studies show attitudes-behavior gaps
      interpretation: Misalignments exist and have real explanations
    - finding: Market-based approaches to privacy have failed
      evidence: Tracking remains ubiquitous despite GDPR
      interpretation: Comprehensive policy intervention needed
  S5_validity:
