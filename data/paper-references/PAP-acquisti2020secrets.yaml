paper: acquisti2020secrets
superkey: PAP-acquisti2020secrets
title: 'Secrets and Likes: The Drive for Privacy and the Difficulty of Achieving It in the Digital Age'
author: Alessandro Acquisti, Laura Brandimarte, George Loewenstein
year: '2020'
publication_type: journal_article
journal: Journal of Consumer Psychology
volume: '30'
number: '4'
pages: 736-758
doi: 10.1002/jcpy.1191
abstract: 'We review different streams of social science literature on privacy with the goal of

  understanding consumer privacy decision making and deriving implications for policy. We focus

  on psychological and economic factors influencing both consumers'' desire and consumers''

  ability to protect their privacy, either through individual action or through the implementation of

  regulations applying to firms. Contrary to depictions of online sharing behaviors as careless, we

  show how consumers fundamentally care about online privacy, and present evidence of numerous

  actions they take to protect it. However, we also document how prohibitively difficult it is to

  attain desired, or even desirable, levels of privacy through individual action alone.

  '
