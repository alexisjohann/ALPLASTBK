key_contributions:
- Demonstrates consumers DO care about privacy (counters 'privacy is dead' narrative)
- Identifies 9 psychological factors affecting privacy decision making
- 'Documents ''control paradox'': Greater control → greater disclosure'
- Explains the 'privacy paradox' as real phenomenon with real explanations
- Shows interaction of psychological and economic factors
- Concludes market approaches have failed; policy intervention needed
- Introduces concept of 'privacy dark matter' (non-economic ramifications)
- Provides Altman's boundary regulation as theoretical framework
