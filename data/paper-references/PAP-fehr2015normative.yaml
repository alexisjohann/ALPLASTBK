summary:
  abstract_extended: 'Human cooperation is unique in its scale and complexity. We argue that

    social norms, internalized through socialization, provide the normative

    foundations for human cooperation. These norms are enforced through

    decentralized punishment and reward, creating stable cooperative equilibria.

    Cultural evolution shapes which norms emerge and persist.'
  key_findings: "1. NORMATIVE FOUNDATIONS\n   - Norms as shared behavioral expectations\n   - Internalization through socialization\n\
    \   - Enforcement through social sanctions\n\n2. MECHANISMS OF ENFORCEMENT\n   - Punishment of violators\n   - Reward\
    \ of compliers\n   - Reputation effects\n   - Emotional responses (guilt, shame, anger)\n\n3. CULTURAL EVOLUTION\n   -\
    \ Norms evolve through cultural transmission\n   - Group selection of norm systems\n   - Gene-culture coevolution\n\n\
    4. IMPLICATIONS\n   - Institutions embed norms\n   - Policy must work with existing norms\n   - Norm change is possible\
    \ but slow"
  ebf_relevance: '10C DIMENSIONS:

    - WHAT (C): Norms as utility-relevant

    - WHEN (V): Cultural context determines norms

    - HOW (B): Norm enforcement creates complementarities


    THEORY SUPPORT:

    - MS-SN-001: Social Norms

    - Integration of economics and cultural evolution


    KEY INSIGHT:

    Human cooperation rests on internalized social norms that are enforced

    through decentralized mechanisms.'
