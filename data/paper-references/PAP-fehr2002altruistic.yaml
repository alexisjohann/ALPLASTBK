summary:
  abstract_extended: 'This paper demonstrates that humans engage in altruistic punishment - punishing

    norm violators at personal cost even when they cannot benefit from the

    punishment. Using public goods experiments, we show that altruistic punishment

    is widespread and dramatically increases cooperation. This behavior cannot be

    explained by self-interest but requires strong reciprocity.'
  key_findings: "1. ALTRUISTIC PUNISHMENT EXISTS\n   - Costly punishment of free-riders\n   - No material benefit to punisher\n\
    \   - Widespread across subjects\n\n2. EFFECTS ON COOPERATION\n   - Punishment dramatically increases cooperation\n  \
    \ - Near full cooperation with punishment option\n   - Stable over time\n\n3. EMOTIONS AND PUNISHMENT\n   - Anger drives\
    \ punishment\n   - Proportional to norm violation\n   - Not strategic but emotional\n\n4. EVOLUTIONARY IMPLICATIONS\n\
    \   - Strong reciprocity evolved\n   - Supports human cooperation\n   - Not explained by kin selection"
  ebf_relevance: '10C DIMENSIONS:

