abstract: Human cooperation is an evolutionary puzzle. Unlike other creatures, people frequently cooperate with genetically
  unrelated strangers, often in large groups, with people they will never meet again, and when reputation gains are small
  or absent. We show experimentally that the altruistic punishment of defectors is a key motive for the explanation of cooperation.
  Altruistic punishment means that individuals punish, although the punishment is costly for them and yields no material gain.
  We demonstrate that cooperation flourishes if altruistic punishment is possible, and breaks down if it is ruled out.
