abstract: This comprehensive handbook chapter reviews models of intertemporal choice, identifies empirical regularities, and
  poses new research questions. The authors introduce the term 'present-focused preferences' to describe models that prioritize
  present flows of experienced utility - noting this need not coincide with commitment preferences or dynamic inconsistency.
  Present-bias is a special case of present-focused preferences. The chapter covers discounting, present-focus, impatience,
  commitment, preference reversals, temptation, procrastination, dynamic inconsistency, savings, naiveté, and welfare. The
  authors identify 10 stylized facts in the intertemporal choice literature and 16 open questions, arguing that research focus
  has shifted from testing exponential discounted utility to understanding robust behavioral deviations.
