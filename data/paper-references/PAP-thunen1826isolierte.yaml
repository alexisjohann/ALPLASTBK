abstract: In dieser zweiten Auflage haben namentlich die Kapitel über Landrente, Statik des Landbaues¹, Viehzucht und Rapsbau
  beträchtliche Zusätze erhalten. Auch habe ich das Ganze nochmals einer sorgfältigen Prüfung unterworfen, einzelne Punkte
  schärfer bestimmt, und da, wo eine längere Erfahrung mein Urteil berichtigt hat, Änderungen getroffen. Vorzüglich ist mein
  Bemühen dahin gerichtet gewesen, Punkte, die teils durch, teils ohne meine Schuld mißverstanden sind, ausführlich zu erörtern
  und zu erläutern, und ich hoffe, daß dadurch das Verständnis dieser Schrift bedeutend erleichtert ist.
