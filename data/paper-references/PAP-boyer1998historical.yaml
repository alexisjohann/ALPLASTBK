abstract: This paper attempts to place the economic analysis of Karl Marx and Friedrich Engels's Communist Manifesto in historical
  perspective. The author begins by summarizing the analysis of capitalist economic development in the Manifesto, and showing
  how it was strongly influenced by developments in the cotton industry in Manchester, England. He then examines the economic,
  social, and political conditions in Manchester and the surrounding cotton towns during the 1830s and 1840s, drawing on the
  views of contemporary observers and recent research by economic historians. The paper concludes by discussing why Marx and
  Engels's predictions for the imminent collapse of capitalism were wrong.
