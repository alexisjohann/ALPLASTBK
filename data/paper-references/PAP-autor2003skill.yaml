abstract: We apply an understanding of what computers do to study how computerization alters job skill demands. We argue that
  computer capital (1) substitutes for workers in performing cognitive and manual tasks that can be accomplished by following
  explicit rules; and (2) complements workers in performing nonroutine problem-solving and complex communications tasks. Provided
  that these tasks are imperfect substitutes, our model implies measurable changes in the composition of job tasks, which
  we explore using representative …
