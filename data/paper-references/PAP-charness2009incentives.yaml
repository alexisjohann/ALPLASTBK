abstract: We present two experiments in which we paid subjects to attend a gym. Charness and Gneezy investigate whether paying
  people to go to the gym can lead to lasting changes in exercise habits. In two field experiments, financial incentives during
  a one-month intervention period led to significant and persistent increases in gym attendance even after incentives were
  removed, driven entirely by people who did not previously exercise regularly.
