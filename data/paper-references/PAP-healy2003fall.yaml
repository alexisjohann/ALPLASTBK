abstract: The financial reporting and disclosure problems at Enron, as well as the high market valuations for its stock raise
  troubling questions about the functioning of capital market intermediaries, regulators and governance experts whose are
  supposed to ensure the effective functioning of the stock market. This paper examines the functions of key capital market
  intermediaries and analyzes how their own governance and incentive problems may have contributed to Enron's rise and fall.
  We conclude by proposing system modifications to resolve the observed problems.
