summary:
  abstract_extended: 'This paper examines cross-cultural variation in cooperation norms using

    experimental methods. We show that while cooperation exists universally,

    its patterns and levels vary significantly across cultures. Understanding

    this variation is crucial for cross-cultural management and policy.'
  key_findings: "1. UNIVERSAL PATTERNS\n   - Cooperation everywhere\n   - Punishment exists universally\n   - Basic preferences\
    \ similar\n\n2. CULTURAL VARIATION\n   - Levels differ\n   - Norms vary\n   - Institutions shape behavior\n\n3. SOURCES\
    \ OF VARIATION\n   - Economic development\n   - Market integration\n   - Social organization"
  ebf_relevance: '10C DIMENSIONS:

    - WHAT (C): Cooperation across cultures

    - WHEN (V): Cultural context (Ψ_K)

    - WHO (AAA): Cross-cultural heterogeneity


    THEORY SUPPORT:

    - Cross-cultural psychology

    - Henrich et al. integration

    - WEIRD critique foundations


    KEY INSIGHT:

    Cooperation norms show both universal patterns and significant cultural

    variation; context matters for behavioral predictions.'
