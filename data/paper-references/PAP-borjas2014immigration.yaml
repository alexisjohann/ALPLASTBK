abstract: Nearly 3% of the world's population no longer live in the country where
  they were born. George Borjas synthesizes the theories, models, and econometric
  methods used to identify the causes and consequences of international labor flows,
  and lays out with clarity a full spectrum of topics with crucial implications for
  framing debates over immigration.
