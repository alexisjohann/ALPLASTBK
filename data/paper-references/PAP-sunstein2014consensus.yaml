abstract: "Policy-makers and the public who are not members of the relevant research community have had to form opinions about\
  \ the reality of global climate change on the basis of often conflicting descriptions provided by the media regarding the\
  \ level of scientific certainty attached to studies of climate. In this Essay,\n    Oreskes\n    analyzes the existing scientific\
  \ literature to show that there is a robust consensus that anthropogenic global climate change is occurring. Thus, despite\
  \ claims sometimes made by some groups that there is not good evidence that Earth9s climate is being affected by human activities,\
  \ the scientific community is in overwhelming agreement that such evidence is clear and persuasive."
