abstract: The optimal design of a tax system is a topic that has long fascinated economic theorists and flummoxed economic
  policymakers. This paper explores the interplay between tax theory and tax policy. It identifies key lessons policymakers
  might take from the academic literature on how taxes ought to be designed, and it discusses the extent to which these lessons
  are reflected in actual tax policy.
