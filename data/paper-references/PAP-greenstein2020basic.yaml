abstract: The internet’s structure and operations remain invisible to most economists. What determines the economic value
  of internet infrastructure and the incentives to improve it? What are the open research questions for the most salient policy
  issues? This article reviews the basic economics of internet infrastructure, focusing attention on the economic questions
  motivated by public aspirations for ubiquitous availability and widespread adoption of internet protocols.
