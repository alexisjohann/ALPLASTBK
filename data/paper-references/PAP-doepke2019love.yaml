abstract: Parents everywhere want their children to be happy and do well. Yet how
  parents seek to achieve this ambition varies enormously. For instance, American
  and Chinese parents are increasingly authoritative and authoritarian, whereas Scandinavian
  parents tend to be more permissive. Why? Love, Money, and Parenting investigates
  how economic forces and growing inequality shape how parents raise their children.
  From medieval times to the present, and from the United States, the United Kingdom,
  Germany, Italy, Spain, and …
