abstract: 'This paper discusses theoretical and empirical research on how two constitutional features, electoral rules and
  forms of government, affect economic policymaking. The authors begin by outlining some key objectives of democratic political
  constitutions and by pointing out the inertia and systematic selection that characterize real-world constitutions. They
  then introduce the main concepts used to categorize work on constitutions: different kinds of electoral rules and forms
  of government. They then discuss how these elements of constitutions affect the accountability of government and the size
  of political rents and corruption, as well as the representativeness of government and a variety of fiscal policy choices.'
