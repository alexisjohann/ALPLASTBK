abstract: … Malinowski has asked me to write a preface to his book, and I wil1ingly comply with his request, though J can
  hardly think that any words of mine will add to the value of the remarkable record of anthropological research which he
  has given us in this volume. My observations, such as they are, will deal partly with the writer's method and partly with
  the matter of his book. … Malinowski lived as a native among the natives for many months together, watching them daily at
  work and at play, conversing with them in their own tongue …
