abstract: Conflicts between animals of the same species usually are of “limited war” type, not causing serious injury. This
  is often explained as due to group or species selection for behaviour benefiting the species rather than individuals. Game
  theory and computer simulation analyses show, however, that a “limited war” strategy benefits individual animals as well
  as the species.
