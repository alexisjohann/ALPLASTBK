key_findings_structured:
  - finding: "Managerial cognitive capabilities (attention, perception, problem-solving, reasoning) constitute a distinct class of microfoundations for dynamic capabilities — extending Teece's framework beyond physical activities to mental activities"
    domain: strategic_management
    effect_size: null
  - finding: "CEO effects account for 12.7% of firm performance variance (1950-1969) rising to 25% (1990-2009), indicating increasing importance of managerial cognitive capabilities over time (Quigley and Hambrick 2011)"
    domain: strategic_management
    effect_size: "12.7-25% variance explained"
  - finding: "Cognitive capabilities map onto sensing (attention, perception), seizing (problem-solving, reasoning), and reconfiguring (language, communication, social cognition) — providing a structured taxonomy of managerial mental activities"
    domain: strategic_management
    effect_size: null
  - finding: "Heterogeneity of cognitive capabilities among managers is a primary source of heterogeneity in dynamic managerial capabilities — individual differences in attention allocation, mental models, and reasoning explain differential strategic change outcomes"
    domain: strategic_management
    effect_size: null

