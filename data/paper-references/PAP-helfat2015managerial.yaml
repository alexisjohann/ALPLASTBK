abstract: |
  This paper introduces the concept of managerial cognitive capability as a microfoundation of dynamic capabilities for strategic change. Building on Teece's (2007) sensing-seizing-reconfiguring framework and Adner and Helfat's (2003) dynamic managerial capabilities, the authors identify specific types of cognitive capabilities — attention, perception, problem-solving, and reasoning — that underpin each component of dynamic capabilities. They draw on cognitive psychology, cognitive science, and behavioral decision theory to explain how heterogeneity in these cognitive capabilities among top executives produces heterogeneity in dynamic managerial capabilities, contributing to differential organizational performance under conditions of change. Variance decomposition studies show CEO effects account for 12.7-25% of firm performance variance.

research_question: "What role do managerial cognitive capabilities play in the microfoundations of dynamic capabilities, and how does cognitive heterogeneity among managers contribute to differential organizational performance under strategic change?"

