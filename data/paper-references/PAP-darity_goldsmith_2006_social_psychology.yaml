abstract: In a conventional macroeconomic model, following a policy change, as nominal
  wages adjust the economy returns to its original real levels of employment, output,
  and unemployment. This description of events ignores the social psychological consequences
  of exposure to unemployment. On theoretical grounds, unemployment is expected to
  damage psychological health, which in turn harms personal productivity. Empirical
  work supports both of these propositions. This paper presents a ‘behavioral’ macroeconomic
  model that accounts for elements of simultaneity between employment outcomes and
  psychological well-being. Implications of this model for the ‘natural’ rate hypothesis,
  the concept of full employment, and unemployment hysteresis are explored.
