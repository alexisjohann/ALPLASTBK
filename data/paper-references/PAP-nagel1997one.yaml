title: 'One, Two, (Three), Infinity: Newspaper and Lab Beauty-Contest Experiments'
author: Nagel
year: '1997'
publication_type: journal_article
doi: 10.1257/aer.92.5.1687
abstract: This paper describes and analyzes 'beauty-contest' experiments run in newspapers in UK, Spain, and Germany, where
  participants choose a number from 0 to 100 with the winner being closest to a proportion (typically 2/3) of the average.
  The study finds stable patterns of behavior across experiments despite lack of control. Running field experiments reveals
  consistent decision-making patterns with participants clustering around iterated reasoning values like 33 and 22. Trained
  economists displayed higher frequencies of equilibrium choices than untrained undergraduates. The experiments engaged 7,900
  participants and demonstrate bounded rationality through the level-k model.
