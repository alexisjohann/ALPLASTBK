abstract: At its best, strategic thinking yields an advantage needed to beat an opponent.
  At the least, it protects the person from exploitation. In four studies, conducted
  in two countries, we used a simple number-guessing game, in which one respondent
  wins by guessing the number chosen by another. We show that people generate numbers
  nonrandomly, and, on the basis of this finding, we predict and find that nonrandom
  strategic choice is advantageous to the guesser if the chooser does not randomize
  either. As expected, respondents in the role of the guesser preferred to play a
  game in which they were to actively think of a number instead of randomizing if
  the chooser had to think of a number, too. Guessers did not prefer thinking if the
  chooser selected a number randomly. Having shown these limitations to strategic
  reasoning, we close with the observation that successful strategic reasoning may
  – at times – require the breaking of rules and being the first to do so.
