abstract: This chapter surveys work on dynamic heterogeneous agent models (HAMs) in economics and finance. Emphasis is given
  to simple models that, at least to some extent, are tractable by analytic methods in combination with computational tools.
  Most of these models are behavioral models with boundedly rational agents using different heuristics or rule of thumb strategies
  that may not be perfect, but perform reasonably well. Typically these models are highly nonlinear, eg due to evolutionary
  switching between strategies, and exhibit a wide …
