abstract: Tech clusters like Silicon Valley play a central role for modern innovation, business competitiveness, and economic
  performance. This paper reviews what constitutes a tech cluster, how they function internally, and the degree to which policy
  makers can purposefully foster them. We describe the growing influence of advanced technologies for businesses outside of
  traditional tech fields, the strains and backlash that tech clusters are experiencing, and emerging research questions for
  theory and empirical work.
