abstract: This paper introduces the Global Preference Survey (GPS), a globally representative dataset on risk preferences,
  time preferences, positive and negative reciprocity, altruism, and trust. The survey covers 80,000 people across 76 countries.
  The study finds substantial heterogeneity in preferences across countries and shows that these preference measures predict
  economic outcomes and behaviors at both individual and country levels.
