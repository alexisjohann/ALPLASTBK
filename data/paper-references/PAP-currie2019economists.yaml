abstract: Air quality in the United States has improved dramatically over the past 50 years in large part due to the introduction
  of the Clean Air Act and the creation of the Environmental Protection Agency to enforce it. This article is a reflection
  on the 50-year anniversary of the formation of the Environmental Protection Agency, describing what economic research says
  about the ways in which the Clean Air Act has shaped our society—in terms of costs, benefits, and important distributional
  concerns. We conclude with a discussion of how recent changes to both policy and technology present new opportunities for
  researchers in this area.
