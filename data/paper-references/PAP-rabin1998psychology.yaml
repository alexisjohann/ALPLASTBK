abstract: Because psychology systematically explores human judgment, behavior, and well-being, it can teach us important facts
  about how humans differ from traditional economic assumptions. Standard economics assumes that each person has stable, well-defined
  preferences, and that she rationally maximizes those preferences. Section 2 considers what psychological research teaches
  us about the true form of preferences, allowing us to make economics more realistic within the rational-choice framework.
  Section 3 reviews research on biases in judgment under uncertainty; because those biases lead people to make systematic
  errors in their attempts to maximize their preferences, this research poses a more radical challenge to the economics model.
