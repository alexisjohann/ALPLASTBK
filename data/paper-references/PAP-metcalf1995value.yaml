abstract: Value-added taxes (VATs) are used in a large number of developed countries and have been under consideration at
  the national level in the United States in recent years. This paper provides an introduction to the tax for those unfamiliar
  with it. The author begins by describing how VATs work and briefly surveys their use by other countries. The remainder of
  the paper considers the economic impact as well as design issues that are likely to arise if the United States were to implement
  a VAT.
