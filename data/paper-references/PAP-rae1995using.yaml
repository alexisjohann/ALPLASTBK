abstract: This is an essay about the use of districting systems to regulate electoral outcomes and the evolution of party
  systems. By changing the number of seats from each district, a balance can be struck between the often conflicting goals
  of minority representation and defractionalization. Defractionalization is the process of forming broad-based governing
  majorities. Special attention is given to the electoral systems of Italy, Spain, and the United States. In the case of the
  United States, the author recommends a proportional representation system that mixes high-magnitude districts that encourage
  minority representation and low-magnitude districts that promote defractionalization.
