title: The Economic Diplomacy of Geoengineering
author: Schelling
year: '1996'
publication_type: journal_article
doi: 10.1007/BF00140252
abstract: This paper argues that geoengineering may transform greenhouse policy from an exceedingly complicated regulatory
  regime to a simple problem in international cost sharing. Putting aerosols or objects in the stratosphere or orbit, or fertilizing
  oceans, are 'exo-national' programs that don't depend on population behavior, don't require national regulations or incentives,
  and don't need universal participation. They merely involve deciding what to do, how much, and who pays. Although geoengineering
  may be fifty years away, it immensely reduces the complexity of what nations must do internally and internationally to cope
  with greenhouse problems. An early and influential economic analysis of climate intervention strategies.
