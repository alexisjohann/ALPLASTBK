summary:
  abstract_extended: 'This paper examines whether people care about efficiency in addition to

    fairness. We analyze how time perspective and individual differences affect

    reciprocal behavior and efficiency concerns.'
  key_findings: "1. EFFICIENCY CONCERNS\n   - People do value efficiency\n   - Trade-off with fairness\n   - Individual heterogeneity\n\
    \n2. TIME PERSPECTIVE\n   - Long-term thinking matters\n   - Patience and cooperation\n   - Delay discounting effects\n\
    \n3. INDIVIDUAL DIFFERENCES\n   - Type heterogeneity\n   - Stable preferences\n   - Contextual activation"
  ebf_relevance: '10C DIMENSIONS:

