abstract: 'Economic models of decision making are consequentialist in nature; they assume that decision makers choose between
  alternative courses of action by assessing the desirability and likelihood of their consequences, and integrating this information
  through some type of expectation-based calculus. Economists refer to the desirability of an outcome as its “utility,” and
  decision making is depicted as a matter of maximizing utility.

  This does not, however, imply that consequentialist decision makers are devoid of emotion or immune to its influence. To
  see why, it is useful to draw a distinction between “expected” and“immediate” emotions (Loewenstein, Weber, Hsee, & Welch,
  2001; Loewenstein & Lerner, 2003). Expected emotions are those that are anticipated to occur as a result of the outcomes
  associated with different possible courses of action. For example, if Laura, a potential investor, were deciding'
