abstract: Much of the controversy about whether mortgage lenders discriminate against minorities can be explained in terms
  of the confusion about how to define discrimination. Based on the legal definition, careful studies of loan denial rates,
  such as that done by the Federal Reserve Bank of Boston, represent an appropriate method for testing for discrimination
  by lenders. Based on that study, it is quite clear that lenders discriminate. The fact that minorities have higher default
  rates on average than whites is irrelevant to the interpretation of the race coefficient in such models. Nonetheless, more
  research on and discussion about the relationship between the race of the applicant and delinquencies, defaults, and losses
  would be desirable.
