summary:
  abstract_extended: 'The researchers test the predictions of the rational addiction model,

    reconceptualized as rational habit formation, in the context of handwashing

    in rural India. To track handwashing, they design soap dispensers with timed

    sensors.


    They test for rational habit formation by informing some households about a

    future change in the returns to daily handwashing. Monitoring and incentives

    raise handwashing contemporaneously, and effects persist well after they end.


    In addition, people are rational about this habit formation: when they

    anticipate future monitoring, they increase their current handwashing.

    Average child weight and height increase for all study arms given soap

    dispensers. Frontloading both financial and social incentives facilitates

    habituation, and agents internalize this habitual nature.'
  key_findings: "1. RATIONAL ANTICIPATION: People increase current behavior when they know\n   future\
    \ monitoring or incentives are coming\n\n2. HABIT PERSISTENCE: Effects of monitoring and incentives\
    \ persist well\n   after intervention ends\n\n3. SENSOR TRACKING: Innovative soap dispensers with\
    \ timed sensors enable\n   precise measurement of handwashing\n\n4. FRONTLOADING WORKS: Frontloading\
    \ incentives (financial and social)\n   facilitates faster habit formation\n\n5. HEALTH OUTCOMES:\
    \ Average child weight and height increase with intervention\n\n6. INTERNALIZATION: Agents internalize\
    \ the habitual nature of the behavior\n   and respond rationally to it"
