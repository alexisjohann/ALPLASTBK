title: 'Circular and Repeat Migration: Counts of Exits and Years Away from the Host Country'
author: Dustmann
year: '2011'
publication_type: journal_article
doi: 10.1007/s00181-010-0445-y
abstract: This paper studies repeat and circular migration behavior by analyzing the number of exits and total years away
  from the host country using count data models and panel data. The findings challenge the myth of permanent migration, showing
  that a substantial share of migrants engage in circular patterns. Migrants from EU member countries, those not owning a
  dwelling in the host country, and both younger and older migrants (excluding middle-aged) are significantly more likely
  to engage in repeat migration and stay out longer. Males and those with host country passports exit more frequently, while
  those with higher education exit less. The study highlights the importance of understanding migration as a dynamic rather
  than permanent phenomenon.
