abstract: In 1995, Robert E. Lucas was awarded the Nobel Memorial Prize for Economic Science. This review places Lucas's work
  in a historical context and evaluates the effect of this work on the economics profession. Lucas's central contribution
  is that he developed and applied economic theory to answer substantive questions in macroeconomics. Economists today routinely
  analyze systems in which agents operate in complex probabilistic environments to understand interactions about which the
  great theorists of an earlier generation could only speculate. This sea change is due primarily to Lucas.
