abstract: 'Over the next 25 to 30 years, nearly all of the growth in energy demand, fossil fuel use, associated local pollution,
  and greenhouse gas emissions is forecast to come from the developing world. This paper argues that the world''s poor and
  near-poor will play a major role in driving medium-run growth in energy consumption. As the world economy expands and poor
  households'' incomes rise, they are likely to get connected to the electricity grid, gain access to good roads, and purchase
  energy-using assets like appliances and vehicles for the first time. We argue that the current forecasts for energy demand
  in the developing world may be understated because they do not accurately capture growth in demand along the extensive margin,
  as low-income households buy their first durable appliances and vehicles. Within a country, the adoption of energy-using
  assets typically follows an S-shaped pattern: among the very poor, we see little increase in the number of households owning
  refrigerators, vehicles, air conditioners, and other assets as incomes go up; above a first threshold income level, we see
  rapid increases of ownership with income; and above a second threshold, increases in ownership level off. A large share
  of the world''s population has yet to go through the first transition, suggesting there is likely to be a large increase
  in the demand for energy in the coming years.'
