abstract: 'We argue that the Cambridge capital theory controversies of the 1950s to 1970s were the latest in a series of still-unresolved
  controversies over three deep issues: explaining and justifying the return to capital; Joan Robinson''s complaint that,
  due to path dependence, equilibrium is not an outcome of an economic process and therefore an inadequate tool for analyzing
  accumulation and growth; and the role of ideology and vision in fuelling controversy when results of simple models are not
  robust. We predict these important and relevant issues, latent in endogenous growth and real business cycle theories, will
  erupt in future controversy.'
