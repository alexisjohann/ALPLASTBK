title: Do Cross-Border Workers Experience Wage Differentials? Evidence from France-Switzerland
author: Lalive
year: '2010'
publication_type: journal_article
doi: 10.1016/j.labeco.2009.12.002
content_level: L1
summary:
  abstract: 'Using matched employer-employee data from the France-Switzerland border region, this paper estimates wage differentials
    for cross-border workers (Grenzgaenger). Cross-border workers earn approximately 35% more than comparable workers staying
    in France, reflecting positive selection on skills. A commuting cost threshold of about 60 minutes determines the margin
    of participation in cross-border work. The findings show that Grenzgaenger are not average French workers but positively
    selected high-skilled individuals.

    '
