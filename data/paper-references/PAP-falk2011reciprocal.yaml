abstract: 'On the basis of a new model of motivation, we examined the effects of 3 dimensions of teacher (n = 14) behavior
  (involvement, structure, and autonomy support) on 144 children''s (Grades 3-5) behavioral and emotional engagement across
  a school year. Correlational and path analyses revealed that teacher involvement was central to children''s experiences
  in the classroom and that teacher provision of both autonomy support and optimal structure predicted children''s motivation
  across the school year. Reciprocal effects of student motivation on teacher behavior were also found. Students who showed
  higher initial behavioral engagement received subsequently more of all 3 teacher behaviors. These findings suggest that
  students who are behaviorally disengaged receive teacher responses that should further undermine their motivation. The importance
  of the student-teacher relationship, especially interpersonal involvement, in optimizing student motivation is highlighted.
  What are the factors that motivate children to learn? Educators and parents value motivation in school for its own sake
  as well as for its long-term contribution to children''s learning and self-esteem. Highly motivated children are easy to
  identify: They are enthusiastic, interested, involved, and curious; they try hard and persist; and they actively cope with
  challenges and setbacks. These are the children who should stay in school longer, learn more, feel better about themselves,
  and continue their education after high school. Recent research has borne this out (Ames & Ames, 1984, 1985; Pintrich, 1991;
  Stipek, 1988). Although motivated students are easy to recognize, they are difficult to find. Research shows that across
  the preschool to high school years, children''s intrinsic motivation decreases and they feel increasingly alienated from
  learning (Harter, 1981). Why is it so difficult to optimize student motivation? Decades of psychological and educational
  research'
