abstract: We present an overlapping generations model with two families who can guarantee old age support either by intra-family
  transfers from child to parent or via a tax-financed public pension system encompassing both families.We derive the individually
  and family-specific optimal decisions and present some more behavioristic hypotheses.Our experimental observations allow
  conclusions on (1) whether raising taxes crowds out voluntary transfers, (2) how income distributions influence family and
  public solidarity, and (3) whether participants prefer more to less public solidarity.
