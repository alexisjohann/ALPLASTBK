summary:
  abstract_extended: 'This chapter surveys the experimental evidence on social preferences and

    new theoretical developments that model fairness, reciprocity, and altruism.

    We review ultimatum games, public goods games, trust games, and gift exchange

    experiments. We discuss models of inequity aversion, reciprocity, and

    altruism, and how they can explain the observed behavioral patterns.'
  key_findings: "1. EXPERIMENTAL EVIDENCE\n   - Ultimatum games: fair offers, rejection of unfair offers\n   - Public goods:\
    \ conditional cooperation, punishment\n   - Trust games: trust and trustworthiness\n   - Gift exchange: effort responds\
    \ to wages\n\n2. THEORETICAL MODELS\n   - Fehr-Schmidt inequity aversion\n   - Bolton-Ockenfels ERC model\n   - Rabin's\
    \ reciprocity model\n   - Charness-Rabin model\n\n3. MODEL COMPARISON\n   - Inequity aversion: outcome-based\n   - Reciprocity:\
    \ intention-based\n   - Each captures different aspects\n\n4. OPEN QUESTIONS\n   - Role of intentions vs. outcomes\n \
    \  - Individual heterogeneity\n   - Context dependence"
  ebf_relevance: '10C DIMENSIONS:

    - WHAT (C): Comprehensive taxonomy of social preferences

    - HOW (B): Model comparison and integration

    - WHERE (BBB): Handbook chapter - authoritative overview


    THEORY SUPPORT:

    - MS-SP-001: Social Preferences (comprehensive)

    - Definitive survey of the field


    KEY INSIGHT:

    Multiple models capture different aspects of social preferences; no single

    model explains all evidence.'
