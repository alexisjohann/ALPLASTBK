abstract: This book studies n-person games where bargainers must reach unanimous agreement on feasible alternatives, with
  a disagreement outcome resulting if consensus fails. Each player has a veto over any alternative except disagreement. The
  models are studied axiomatically - each model characterized by properties that uniquely define it. Drawing on Nash's influential
  1950 axiomatic model, the work explores risk aversion in bargaining and how axioms relate to bargaining outcomes. The simplicity
  of bargaining games makes them excellent for studying assumptions in negotiation analysis.
