abstract: This influential collection includes the seminal essay 'The Methodology of Positive Economics,' which remains the
  most cited methodological writing in twentieth-century economics. Friedman argues that economics as science should be free
  of normative judgments, distinguishing positive (what is) from normative (what ought to be) economics. He posits the controversial
  principle that assumptions need not be 'realistic' to serve as scientific hypotheses - they merely need to make significant
  predictions. A theory should be judged by its simplicity in predicting as much as alternatives, and its fruitfulness in
  precision, scope, and generating research lines. The collection shaped economics' image as a scientific discipline and includes
  'The Case for Flexible Exchange Rates.'
