abstract: CULTURE, TRADITION, AND OVERT DISCRIMINATION tend to make restrictive the terms by which women may participate in
  the labor force. These influences combine to generate an unfavorable occupational distribution of female workers vis-a-vis
  male workers and to create pay differences between males and females within the same occupation. The result is a chronic
  earnings gap between male and female full-time, year-round workers. Unfortunately, explanations at this level of generality
  are mainly descriptive. It is the purpose of this paper to estimate the average extent of discrimination against female
  workers in the United States and to provide a quantitative assessment of the sources of male-female wage differentials.
