abstract: 'The limitations of equilibrium theory and of the stability analyses which justify it have led to considerable work
  on the development of a disequilibrium economic3. r Of the criticisms of stability theory, there are three which have motivated
  the approach taken in this paper. First, the fundamental question seemingly underlying most stability analyses seems inappropriate.
  Most papers seem to explore the question of developing an adjustment process which will converge to competitive equilibrium.
  A more appealing approach is the development of adjustment processes which are designed to reflect some realistic process
  and then consideration of the long-run position of the market if the process is stable. Second, the economic agents in a
  disequilibrium process should be aware, at least in part, of the disequilibrium in the economy, and adjust their behavior
  in response to the altered opportunities which are present. Third, in most markets, all the agents are in the market for
  their own gain and prices get set by a demander or supplier rather than a nonparticipating auctioneer.

  There are many models one might want to construct to reflect price adjustments in differently organized markets. In selecting
  the particular model presented here great weight has been given to mathematical tractability rather than trying to reflect
  some specific market (although many aspects are patterned after a retail consumer durable market). The purpose has been
  to develop a very simple model to permit straightforward analysis while hopefully having a framework which will lend itself
  to generalization. It is assumed that there are many identical firms and many consumers. Each period each firm sets a price
  and each consumer visits one firm. The consumer either purchases, according to an underlying demand curve, or concludes
  that the price is too high and leaves'
