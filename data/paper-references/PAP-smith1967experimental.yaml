abstract: This pioneering Journal of Business paper studies the effect of discriminative and competitive pricing rules on
  bidding behavior, patterned after procedures used in auctioning U.S. Treasury bills. Subjects bid for 18 units of a commodity
  whose resale price was determined by a drawing from a rectangular probability mass function with known parameters. The discriminative
  auction fills accepted bids at their respective bid prices, while the competitive (uniform-price) auction fills accepted
  bids at the lowest accepted bid price. The paper examines how institutional settings influence behavioral outcomes and learning
  in auction markets.
