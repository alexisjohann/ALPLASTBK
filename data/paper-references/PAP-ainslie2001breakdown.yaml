summary:
  abstract_extended: 'Behavioral science has long been puzzled by the experience of temptation, the

    resulting impulsiveness, and the variably successful control of this

    impulsiveness. This book presents evidence that contradicts rational models in

    which discounting the value of future events at a constant rate keeps

    preference consistent.


    Both people and nonhuman animals discount the value of expected events in a

    hyperbolic curve (where value is divided approximately by expected delay),

    which is more bowed than the rational, exponential curve. With hyperbolic

    discounting, options that pay off quickly will be temporarily preferred to

    richer but slower-paying alternatives.


    The "breakdown" in the title refers to breaking the will down like one breaks

    down a mechanical device into its constituent parts. The will is neither a

    mysterious organ nor an idle cog - it is a bargaining situation in which

    temporally distinct populations of partially cooperating interests compete for

    selection. Self-control is a matter of reasonable self-prediction.'
  key_findings: "1. PICOECONOMICS: Just as microeconomics describes negotiation among\n   individuals, picoeconomics describes\
    \ interactions among parts within the\n   individual for control of behavioral capacity\n\n2. HYPERBOLIC OVER EXPONENTIAL:\
    \ Empirical evidence shows hyperbolic, not\n   exponential, discount curves in both humans and animals\n\n3. WILL AS BARGAINING:\
    \ Will is not a faculty but a bargaining process among\n   temporally distinct motivational states\n\n4. SELF-PREDICTION:\
    \ Self-control depends on accurate prediction of one's\n   own future behavior and preferences\n\n5. INTERTEMPORAL COOPERATION:\
    \ Successive motivational states must cooperate\n   like members of a repeated game\n\n6. AKRASIA EXPLAINED: The ancient\
    \ puzzle of weakness of will (akrasia) is\n   resolved through hyperbolic discounting and intertemporal bargaining"
  ebf_relevance: "Domain: CORE-THEORY, DOMAIN-BEHAVIORAL, DOMAIN-DECISION\n10C Dimensions: WHEN (temporal preferences), HOW\
    \ (intertemporal bargaining),\n                READY (self-control mechanisms), WHO (multiple selves)\nTheory Support:\
    \ MS-HD-001 (Hyperbolic Discounting), MS-PC-001 (Picoeconomics),\n               MS-MS-001 (Multiple Selves), MS-SC-001\
    \ (Self-Control)\nParameters: Discount rate k, cooperation threshold, self-prediction accuracy,\n            bargaining\
    \ equilibrium conditions"
