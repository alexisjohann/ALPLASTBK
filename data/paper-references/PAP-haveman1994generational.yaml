abstract: The author assesses the concept of ‘generational accounts’ and the specific accounts constructed by Alan Auerbach,
  Jagadeesh Gokhale, and Laurence Kotlikoff (1991). Although these accounts support the assertion of present-orientation in
  fiscal policy, they rest on numerous assumptions based on judgments that are open to question. These involve the treatment
  of the public budget constraint, the benefits from public exhaustive expenditures, economic and population projections,
  the discount rate, and fiscal incidence. Alternative and equally reasonable assumptions could yield radically different
  conclusions. The author concludes that the Auerbach, Gokhale, and Kotlikoff accounts should not replace the annual public
  budget, as they argue.
