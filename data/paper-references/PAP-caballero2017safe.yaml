abstract: 'A safe asset is a simple debt instrument that is expected to preserve its value during adverse systemic events.
  The supply of safe assets, private and public, has historically been concentrated in a small number of advanced economies,
  most prominently the United States. Over the last few decades, with minor cyclical interruptions, the supply of safe assets
  has not kept up with global demand. The reason is straightforward: the collective growth rate of the advanced economies
  that produce safe assets has been lower than the world''s growth rate, which has been driven disproportionately by the high
  growth rate of high-saving emerging economies such as China. The signature of this growing shortage is a steady increase
  in the price of safe assets; equivalently, global safe interest rates must decline, as has been the case since the 1980s.
  The early literature, brought to light by Ben Bernanke''s famous “savings glut” speech of 2005, focused on a general shortage
  of assets without isolating its safe asset component. The distinction, however, has become increasingly important over time,
  particularly in the aftermath of the subprime mortgage crisis and its sequels. We begin by describing the main facts and
  macroeconomic implications of safe asset shortages. Faced with such a structural conundrum, what are the likely short- to
  medium-term escape valves? We analyze four of them, each with its own macroeconomic and financial trade-offs.'
