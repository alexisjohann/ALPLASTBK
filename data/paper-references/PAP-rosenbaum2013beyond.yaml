abstract: 'Postsecondary education mostly focuses on the four-year BA degree. Community colleges are often promoted as the
  first step toward the ultimate goal of a four-year degree. However, community colleges have extremely poor degree completion
  rates. There is evidence suggesting better results for their private, two-year counterparts—particularly for certificate
  completion. We will focus on occupational colleges—private accredited colleges that offer career preparation in occupational
  fields like health care, business, information technology, and others. These institutions challenge many of our preconceptions
  about college. They are less wedded to college traditions, which raises some interesting questions: Do private colleges
  offering certificates or AA degrees use different procedures? Should community colleges consider some of these procedures
  to reduce student difficulties and improve their completion rates? For many community college students, earning a more likely,
  quick sub-BA credential—perhaps followed by a four-year degree in the future—will be preferable to the relatively unlikely
  pathway from a community college program directly to a four-year BA. In sum, this paper suggests that nontraditional colleges
  and nontraditional credentials (certificates and AA degrees) deserve much closer attention from researchers, policymakers,
  and students.'
