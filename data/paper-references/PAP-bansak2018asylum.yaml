abstract: Data-driven refugee assignment The continuing refugee crisis has made it
  necessary for governments to find ways to resettle individuals and families in host
  communities. Bansak et al. used a machine learning approach to develop an algorithm
  for geographically placing refugees to optimize their overall employment rate. The
  authors developed and tested the algorithm on segments of registry data from the
  United States and Switzerland. The algorithm improved the employment prospects of
  refugees in the United States by ∼40% and in Switzerland by ∼75%. Science , this
  issue p. 325
