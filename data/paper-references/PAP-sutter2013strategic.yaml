abstract: This European Economic Review paper examines strategic sophistication of individuals and teams in one-shot normal-form
  games. The experiment finds that teams are strategically more sophisticated than individuals, choosing actions closer to
  game-theoretic predictions. Teams engage in more deliberation and reasoning about opponents' strategies. The findings contribute
  to understanding group decision-making and strategic behavior in economic settings.
