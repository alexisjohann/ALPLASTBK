abstract: The nomination of Irving Kravis as a Distinguished Fellow of the American Economic Association in 1991 crowned a
  long and distinguished career. He would go on to no further accomplishments, for it was on the trip to the ASSA meetings
  in New Orleans to receive the award that he passed away at Philadelphia Airport on January 2, 1992. In spite of a debilitating
  illness, he had continued working until the end on problems and issues that were his main concerns for more than 50 years;
  with fuller physical powers, he would undoubtedly have made additional contributions to our profession. This paper first
  discusses his administrative and pedagogical contributions at the University of Pennsylvania and then his notable research
  contributions.
