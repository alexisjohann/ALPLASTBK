abstract: Over the past 40 years, the age at which children enter first grade has slowly drifted upward. In the fall of 1968,
  96 percent of six-year-old children were enrolled in first grade or above. By 2005, the proportion had dropped to 84 percent,
  mainly because a substantial share of six-year-olds were still in kindergarten. About a third of the increase in age at
  school entry can be explained by legal changes. Almost every state has increased the age at which children are allowed to
  start primary school. The other two-thirds of the increase in the age at school entry reflects the individual decisions
  of parents and teachers who choose to keep children out of kindergarten or first grade even when they are legally eligible
  to attend. This practice is sometimes called “red-shirting,” a phrase originally used to describe the practice of holding
  college athletes out of play until they have grown larger and stronger. Red-shirting is referred to as “the gift of time”
  in education circles, reflecting a perception that children who have been allowed to mature for another year will benefit
  more from their schooling. As we will discuss, little evidence supports this perception. It is indeed true that in any grade,
  older children tend to perform better academically than the younger children. In the early grades there is a strong, positive
  relationship between a child's age in months and his performance relative to his peers. But there is little evidence that
  being older than your classmates has any long-term, positive effect on adult outcomes such as IQ, earnings, or educational
  attainment. By contrast, there is substantial evidence that entering school later reduces educational attainment (by increasing
  high school dropout rates) and depresses lifetime earnings (by delaying entry into the labor market).
