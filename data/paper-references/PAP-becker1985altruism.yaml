abstract: ECONOMISTS generally take tastes as" given" and work out the consequences of changes in prices, incomes, and other
  variables under the assumption that tastes do not change. When pressed, ei-ther they engage in ad hoc theorizing or they
  explicitly delegate the discussion of tastes to the sociologist, psychologist, or anthropologist. Unfortunately, these disci-plines
  have not developed much in the way of systematic usable knowledge about tastes. Although economists have been reluctant
