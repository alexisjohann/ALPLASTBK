abstract: The kamikaze crew of liberal reformers, picked by former President Boris Yeltsin in the early 1990s, succeeded in
  overturning the planned economy and the authoritarian political arrangements of seven decades of Soviet Communism. However,
  the resulting breakdown of political cohesion and the urgency of restoring stability prompted Yeltsin to select Vladimir
  Putin as his successor. The consolidating impetus under Putin, who was elected president in early 2000, has raised concerns
  about the continuation of economic and political reforms under his leadership. In this essay, nine Russian interviewees
  look back on the reform issues under Yeltsin and look ahead on the unfolding political economy scenario under Putin. They
  include three principle economic reformers under Yeltsin, three economic policy analysts, and three banking professionals.
