abstract: 'There is substantial racial and gender disparity in the American economy.
  As we will demonstrate, discriminatory treatment within the labor market is a major
  cause of this inequality. Yet, there appear to have been particular periods in which
  racial minorities, and then women, experienced substantial reductions in economic
  disparity and discrimination. Some questions remain: Why did the movement toward
  racial equality stagnate after the mid-1970s? What factors are most responsible
  for the remaining gender inequality? What is the role of the competitive process
  in elimination or reproduction of discrimination in employment? How successful has
  the passage of federal antidiscrimination legislation in the 1960s been in producing
  an equal opportunity environment where job applicants are now evaluated on their
  qualifications? To give away the answer at the outset, discrimination by race has
  diminished somewhat, and discrimination by gender has diminished substantially;
  neither employment discrimination by race or by gender is close to ending. The Civil
  Rights Act of 1964 and subsequent related legislation has purged American society
  of the most overt forms of discrimination, while discriminatory practices have continued
  in more covert and subtle forms. Furthermore, racial discrimination is masked and
  rationalized by widely-held presumptions of black inferiority.'
