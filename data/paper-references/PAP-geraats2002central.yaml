abstract: Central bank transparency has become one of the key features of monetary policy recently. This survey article provides
  a structured review of the theoretical literature on the consequences of transparency of monetary policy, proposing a distinction
  between uncertainty and incentive effects of transparency. The theoretical insights are compared to the various ways in
  which central banks have become transparent in practice. In addition, there is an assessment of the empirical evidence concerning
  the transparency of monetary policy.
