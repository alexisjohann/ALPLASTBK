title: What Active Labour Market Programmes Work for Immigrants in Europe? A Meta-Analysis
  of the Evaluation Literature
author: Butschek
year: '2014'
publication_type: journal_article
doi: 10.1186/s40176-014-0023-6
abstract: 'A growing body of programme evaluation literature recognises immigrants
  as a disadvantaged group in European labour markets and investigates the employment
  effects of Active Labour Market Programmes (ALMPs) on this subgroup. So far, however,
  there is no systematic review establishing which ALMPs are effective for immigrants.
  Using a meta-analysis, the authors condense 93 estimates from 33 empirical studies
  of the effectiveness of four types of ALMPs employed across Europe to combat immigrant
  unemployment: training, job search assistance, wage subsidies and subsidised public
  sector employment. The study finds that only wage subsidies can be confidently recommended
  to European policy-makers.'
