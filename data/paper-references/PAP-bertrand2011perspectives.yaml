abstract: Psychological and socio-psychological factors are now more commonly discussed
  as possible explanations for gender differences in labor market outcomes. We first
  describe the (mainly) laboratory-based evidence regarding gender differences in
  risk preferences, in attitudes towards competition, in the strength of other-regarding
  preferences, and in attitudes towards negotiation. We then review the research that
  has tried to quantify the relevance of these factors in explaining gender differences
  in labor market outcomes outside of the laboratory setting. We also describe recent
  research on the relationship between social and gender identity norms and women's
  labor market choices and outcomes, as well as on the role of child-rearing practices
  in explaining gender identity norms. Finally, we report on some recent work documenting
  puzzling trends in women's well-being and discuss possible explanations for these
  trends, including identity considerations. We conclude with suggestions for future
  research.
