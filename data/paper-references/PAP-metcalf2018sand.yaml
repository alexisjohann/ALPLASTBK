abstract: This article focuses on cities with unprecedented economic success and a seemingly permanent crisis of affordable
  housing. In the expensive cities, policymakers expend great amounts of energy trying to bring down housing costs with subsidies
  for affordable housing and sometimes with rent control. But these efforts are undermined by planning decisions that make
  housing for most people vastly more expensive than it has to be by restricting the supply of new units even in the face
  of growing demand. I begin by describing current housing policy in the expensive metro areas of the United States. I then
  show how this combination of policies affecting housing, despite internal contradictions, makes sense from the perspective
  of the political coalitions that can form in a setting of fragmented local jurisdictions, local control over land use policies,
  and homeowner control over local government. Finally, I propose some more effective approaches to housing policy. My view
  is that the effects of the formal affordable housing policies of expensive cities are quite small in their impact when compared
  to the size of the problem—like sand castles before the tide. I will argue that we can do more, potentially much more, to
  create subsidized affordable housing in high-cost American cities. But more fundamentally, we will need to rethink the broader
  set of exclusionary land use policies that are the primary reason that housing in these cities has become so expensive.
  We cannot solve the problem unless we fix the housing market itself.
