abstract: |
  Agreements are rarely fully enforceable, exposing trading parties to some risk of
  exploitation. This paper explores whether trust is a substitute for, or a complement to,
  the availability of contract enforcement opportunities. One intuition suggests that trust
  becomes more important when contract enforcement is weak, implying substitutes. We show,
  however, that trust can be a complement, mattering more when contract enforcement is
  stronger. Our evidence comes from experiments that exogenously vary both trust and contract
  enforcement. The mechanism is equilibrium selection: richer opportunities for contract
  enforcement can lead to a wider set of equilibria. Trust can then become more important
  because it helps select between efficient and inefficient equilibria.

key_findings_structured:
  S1_research_question: "Is trust a substitute for or complement to contract enforcement in facilitating gains from trade?"
  S2_methodology: "Laboratory experiments exogenously varying both (1) trust levels via screening/assignment mechanism and (2) contract enforcement opportunities. Theoretical model with equilibrium selection mechanism."
  S3_sample_data: "University of Zurich subjects. Multiple treatment conditions varying enforcement strength and trust levels."
  S4_findings:
    - finding: "Trust and contract enforcement are complements, not substitutes"
      source_section: "Main results"
      formal_result: "Trust matters MORE when enforcement is stronger, contrary to substitution intuition"
    - finding: "Mechanism is equilibrium selection"
      source_section: "Theoretical framework"
      formal_result: "Richer enforcement creates wider equilibrium set; trust selects between efficient and inefficient equilibria"
    - finding: "Strong policy implications for institutional design"
      source_section: "Discussion"
      formal_result: "Strengthening enforcement without trust may not improve outcomes; both are needed simultaneously"
  S5_validity: "Exogenous variation of both trust and enforcement via experimental design. Theoretical model provides clear mechanism. Multiple robustness checks."
  S6_reproducibility: "Full experimental instructions in appendix. z-Tree implementation. University of Zurich ethics approval."

