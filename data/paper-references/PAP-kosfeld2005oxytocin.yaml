summary:
  abstract_extended: 'Trust pervades human societies. Trust is indispensable in friendship, love,

    families and organizations, and plays a key role in economic exchange and

    politics. In the absence of trust among trading partners, market transactions

    break down. In the absence of trust in a country''s institutions and leaders,

    political legitimacy breaks down.


    Much recent evidence indicates that trust contributes to economic, political

    and social success. Little is known, however, about the biological basis of

    trust among humans.


    The authors show that intranasal administration of oxytocin, a neuropeptide

    that plays a key role in social attachment and affiliation in non-human

    mammals, causes a substantial increase in trust among humans, thereby greatly

    increasing the benefits from social interactions.


    They also show that the effect of oxytocin on trust is not due to a general

    increase in the readiness to bear risks. On the contrary, oxytocin specifically

    affects an individual''s willingness to accept social risks arising through

    interpersonal interactions.'
