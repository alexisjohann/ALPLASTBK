title: Oxytocin Increases Trust in Humans
author: Kosfeld
year: '2005'
publication_type: journal_article
doi: 10.1038/nature03701
abstract: 'Trust pervades human societies and is fundamental for social interactions, economic exchange, and political stability.
  We show that intranasal administration of oxytocin causes a substantial increase in trust among humans. Subjects who received
  oxytocin exhibited significantly higher trust in a trust game, transferring more money to anonymous trustees. This effect
  is specific to social risk: oxytocin does not increase risk-taking in general gambling tasks. Our findings indicate that
  oxytocin plays a key role in the neurobiology of prosocial approach behavior and trust.'
