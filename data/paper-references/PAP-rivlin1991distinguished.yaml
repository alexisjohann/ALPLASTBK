abstract: 'This lecture brings together two subjects that are not often discussed together: national economic policy and the
  structure of American federalism. My thesis is that the policies needed to improve the health of the U.S. economy over the
  next decade or two require a new look at the division of responsibilities between the federal government and the states.
  In particular, I will argue that the states should have much clearer responsibility for most kinds of public investment,
  especially for improving the skills of the labor force and upgrading public infrastructure. The federal government should
  concentrate on a different set of missions, including interaction with the rest of the world, strengthening social insurance,
  and contributing to national saving by running a surplus in the unified federal budget.'
