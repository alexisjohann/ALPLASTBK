abstract: 'This paper examines numerous examples of reward systems that are fouled up in that
  behaviors which are rewarded are those which the rewarder is trying to discourage, while
  the behaviors which the rewarder desires are not being rewarded. The author identifies
  four general factors that lead to this folly: fascination with an objective criterion,
  overemphasis on highly visible behaviors, hypocrisy, and emphasis on morality or equity
  rather than efficiency.'
