abstract: In the First Part (1) it is attempted to illustrate the possibility of Mathematical reasoning without numerical
  data (pp. 1-7); without more precise data than are afforded by estimates of quantity of pleasure (pp. 7–9).(2) An analogy
  is suggested between the Principles of Greatest Happiness, Utilitarian or Egoistic, which constitute the first principles
  of Ethics and Economics, and those Principles of Maximum Energy which are among the highest generalisations of Physics,
  and in virtue of which mathematical reasoning is applicable to physical phenomena quite as complex as human life (pp. 9-15).
  The Calculus of Pleasure (Part II.) may be divided into two species-the Economical and the Utilitarian; the principle of
