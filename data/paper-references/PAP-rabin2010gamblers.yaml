abstract: The authors develop a model of the gamblers fallacy the mistaken belief that random sequences should exhibit systematic
  reversals. They show that an individual who holds this belief and observes a sequence of signals can exaggerate the magnitude
  of changes in an underlying state but underestimate their duration. When the state is constant, and so signals are i.i.d.,
  the individual can predict that long streaks of similar signals will continue a hot-hand fallacy. When signals are serially
  correlated, the individual typically under-reacts to short streaks, over-reacts to longer ones, and under-reacts to very
  long ones. The model has implications for a number of puzzles in finance.
