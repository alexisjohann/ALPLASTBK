abstract: "From the Publisher:\r\nA New York Times bestseller when it appeared in 1989, Roger Penrose's The Emperor's New\
  \ Mind was universally hailed as a marvelous survey of modern physics as well as a brilliant reflection on the human mind,\
  \ offering a new perspective on the scientific landscape and a visionary glimpse of the possible future of science. Now,\
  \ in Shadows of the Mind, Penrose offers another exhilarating look at modern science as he mounts an even more powerful\
  \ attack on artificial intelligence. But perhaps more important, in this volume he points the way to a new science, one\
  \ that may eventually explain the physical basis of the human mind. Penrose contends that some aspects of the human mind\
  \ lie beyond computation. This is not a religious argument (that the mind is  other than physical) nor is it based on the\
  \ brain's vast complexity (the weather is immensely complex, says Penrose, but it is still a computable thing, at least\
  \ in theory). Instead, he provides powerful arguments to support his conclusion that there is  in the conscious activity\
  \ of the brain that transcends computation - and will find no explanation in terms of present-day science. To illuminate\
  \ what he believes this something might be, and to suggest where a new physics must proceed so that we may understand it,\
  \ Penrose cuts a wide swathe through modern science, providing penetrating looks at everything from Turing computability\
  \ and Godel's incompleteness, via Schrodinger's Cat and the Elitzur-Vaidman bomb-testing problem, to detailed microbiology.\
  \ Of particular interest is Penrose's extensive examination of quantum mechanics, which introduces some new ideas that differ\
  \ markedly from those advanced in The Emperor's New Mind, especially concerning the mysterious interface where classical\
  \ and quantum physics meet. But perhaps the most interesting wrinkle in Shadows of the Mind is Penrose's excursion into\
