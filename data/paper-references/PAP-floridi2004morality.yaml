title: On the Morality of Artificial Agents
author: Floridi
year: '2004'
publication_type: journal_article
doi: 10.1023/B:MIND.0000035461.63578.9d
abstract: 'This paper examines whether artificial agents can be considered moral agents. We argue that artificial agents can
  qualify as moral agents if they satisfy certain conditions: interactivity, autonomy, and adaptability. However, full moral
  agency requires additional properties including consciousness, intentionality, and understanding of moral concepts. The
  paper distinguishes between different levels of moral agency and discusses the implications for the design and deployment
  of artificial agents.'
