abstract: Increased excise taxes on cigarettes and alcohol have been suggested as a means to finance (at least partially)
  the Clinton administration's proposed program of health care reform. We consider the revenue potential of cigarette and
  alcohol tax hikes and explore the effects on consumption and related outcomes. We present estimates of the social costs
  and implied optimal tax rates on cigarettes and alcohol. The bulk of the evidence presented here does support higher taxes
  on cigarettes and alcohol.
