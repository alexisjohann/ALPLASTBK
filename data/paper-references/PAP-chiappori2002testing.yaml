abstract: 'We use a unique data set of penalty kicks in professional soccer to test the
  mixed-strategy Nash equilibrium when players are heterogeneous. Standard tests of mixed
  strategies typically assume identical players. We develop an econometric framework that
  accounts for player-specific differences in abilities and confirm that professional
  soccer players play consistent with the equilibrium predictions even with heterogeneity.'
