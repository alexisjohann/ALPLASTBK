paper: benabou2018narratives
title: Narratives, Imperatives, and Moral Reasoning
author: Bénabou, Roland; Falk, Armin; Tirole, Jean
year: '2018'
publication_type: working_paper
journal: NBER Working Paper
number: '24798'
doi: 10.3386/w24798
abstract: 'By downplaying externalities, magnifying the cost of moral behavior, or suggesting

  not being pivotal, exculpatory narratives can allow individuals to maintain a positive

  image when in fact acting in a morally questionable way. Conversely, responsibilizing

  narratives can help sustain better social norms. We investigate when narratives emerge

  from a principal or the actor himself, how they are interpreted and transmitted by

  others, and when they spread virally. We then turn to how narratives compete with

  imperatives (general moral rules or precepts) as alternative modes of communication

  to persuade agents to behave in desirable ways.

  '
abstract_fetched: '2026-02-04'
abstract_source: full_paper
structural_characteristics:
  S1_research_question: 'How do moral narratives (exculpatory vs responsibilizing) and imperatives

    (categorical rules) interact with image concerns and self-control to shape

    moral behavior and social norms?

    '
  S2_methodology: 'Theoretical model building. Game-theoretic analysis of signaling with moral

    types, network transmission dynamics, and principal-agent communication.

    '
  S3_sample_data: 'Theoretical paper - no empirical data. Extensive discussion of related

    experimental evidence from psychology and economics literature.

    '
  S4_findings: '(1) Negative narratives are strategic substitutes, positive narratives are

    strategic complements. (2) Network mixing reduces polarization and increases

    prosocial behavior. (3) Moral standards emerge endogenously from search for

    reasons. (4) Imperatives require moral authority but enable commitment.

    '
  S5_validity: 'Strong internal validity from formal mathematical derivations. External

    validity supported by extensive literature review (70+ references).

    Predictions align with experimental evidence on moral licensing,

    self-control, and visibility effects.

    '
  S6_reproducibility: 'All proofs provided in appendices. Model assumptions clearly stated.

    Equilibrium characterizations are complete.

    '
