paper: heckman2022econometrics
superkey: PAP-heckman2022econometrics
title: Causality and Econometrics
author: Heckman, James J. and Pinto, Rodrigo
year: '2022'
publication_type: working_paper
doi: 10.3386/w29787
abstract: 'We examine the econometric causal model as it was developed by Haavelmo
  and his co-workers at the Cowles Commission. We compare the econometric causal model
  with two currently popular causal frameworks: the Neyman-Rubin causal model and
  the Do-Calculus. The Neyman-Rubin causal model is based on the language of potential
  outcomes and was largely developed by statisticians. The Do-Calculus, developed
  by Judea Pearl and co-authors, relies on Directed Acyclic Graphs (DAGs) and is a
  popular causal framework in computer science. We show that only the econometric
  approach can handle simultaneous equations and answer all four fundamental policy
  questions (P1-P4). The key distinction between Fixing (intervention) and Conditioning
  (selection) is central to understanding causal inference.'
