core_contribution: 'Comprehensive comparison of three causal inference traditions:

  1. Econometric (Frisch-Haavelmo): Structural equations, thought experiments

  2. Neyman-Rubin: Potential outcomes, experimental design

  3. Pearl''s Do-Calculus: DAGs, graphical identification


  Demonstrates that only the econometric approach can handle simultaneous

  equations and answer all four policy questions (P1-P4). Clarifies the

  critical distinction between fixing (intervention) and conditioning

  (selection).

  '
key_concepts:
- id: KC-01
  name: Fixing vs Conditioning
  definition: Fixing modifies the DGP; conditioning selects a subpopulation
  ebf_relevance: Foundation for understanding intervention vs selection effects
- id: KC-02
  name: Three Causal Frameworks
  definition: Econometric, Neyman-Rubin, Pearl - each with distinct capabilities
  ebf_relevance: Justifies EBF's structural parameter approach
- id: KC-03
  name: Simultaneity Problem
  definition: Feedback loops cannot be represented in DAGs (acyclic by definition)
  ebf_relevance: Why EBF uses structural equations, not just DAGs
- id: KC-04
  name: LATE Critique
  definition: Local Average Treatment Effect is instrument-dependent and not policy-relevant
  ebf_relevance: Why EBF focuses on structural parameters over local effects
- id: KC-05
  name: Generalized Roy Model
  definition: Y = D*Y₁ + (1-D)*Y₀ with selection D = 1[μ_D(Z) - V > 0]
  ebf_relevance: Foundation for understanding intervention self-selection
- id: KC-06
  name: Policy-Invariant Parameters
  definition: Structural parameters that remain stable under policy changes
  ebf_relevance: Why λ, β, γ must be structural to answer P3, P4
fixing_conditioning:
  fixing:
    formal_definition: 'Fixing(A=a): Modify the mechanism M_A that generates A

      so that it produces constant value a regardless of inputs.

      '
    graphical: Remove all arrows into A, set A=a
    econometric: Set structural equation to A = a (constant)
    probabilistic: P(Y | Fixing(A=a)) ≠ P(Y | A=a) in general
  conditioning:
    formal_definition: 'Conditioning on A=a: Restrict analysis to the subpopulation

      where A happens to equal a.

      '
    graphical: No change to graph structure
    econometric: Subset data where A = a
    probabilistic: P(Y | A=a) = P(Y ∩ A=a) / P(A=a)
  key_distinction: 'Fixing changes the data generating process (intervention).

    Conditioning selects from the existing distribution (observation).

    Confounding arises when we condition but want fixing effects.

    '
frameworks:
  econometric_tradition:
    founders:
    - Frisch (1926, 1933)
    - Haavelmo (1943, 1944)
    - Cowles Commission
    key_concept: Hypothetical manipulations of mechanisms
    mathematical_basis: Structural equations with error terms
    identification: Exclusion restrictions, instruments
    policy_questions:
    - 'P1: TT'
    - 'P2: TUT'
    - 'P3: Forecast'
    - 'P4: New Policy'
    handles_simultaneity: true
    limitations:
    - Requires structural assumptions
  neyman_rubin:
    founders:
    - Neyman (1923)
    - Rubin (1974, 1978)
    - Holland (1986)
    key_concept: Potential outcomes Y(0), Y(1)
    mathematical_basis: Switching regime framework
    identification: Randomization, unconfoundedness
    policy_questions:
    - P1
    - P2
    handles_simultaneity: false
    limitations:
    - SUTVA may be violated
    - Cannot answer P3, P4 without structure
    - No simultaneous equations
  pearl_do_calculus:
    founders:
    - Pearl (1995, 2000, 2009)
    - Spirtes, Glymour, Scheines (1993)
    key_concept: Directed Acyclic Graphs with do-operator
    mathematical_basis: Graphical models, d-separation
    identification: Back-door, front-door criteria
    policy_questions:
    - P1
    - P2
    - Limited P3
    handles_simultaneity: false
    limitations:
    - Cannot represent feedback loops
    - Nonparametric (no functional forms)
    - Limited for policy forecasting (P4)
simultaneity:
  supply_demand:
    system:
      demand: Q = α_D + β_D * P + γ_D * Y + U_D
      supply: Q = α_S + β_S * P + U_S
    problem: 'P and Q are jointly determined in equilibrium.

      No causal ordering exists between them.

      '
    dag_limitation: Cannot draw arrow P→Q or Q→P; both are effects of equilibrium
    econometric_solution: 'Structural estimation with instruments:

      - Demand shifter (Y = income) identifies supply curve

      - Supply shifter (cost shocks) identifies demand curve

      '
roy_model:
  outcome_equation: Y = D * Y₁ + (1-D) * Y₀
  potential_outcomes:
    Y1: Y₁ = μ₁(X) + U₁
    Y0: Y₀ = μ₀(X) + U₀
  selection:
    rule: D = 1[S > 0]
    surplus: S = μ_D(Z) - V
    interpretation: Select treatment when net benefit exceeds cost
  treatment_parameters:
    ATE: E[Y₁ - Y₀] = E[μ₁(X) - μ₀(X)]
    TT: E[Y₁ - Y₀ | D=1] = ATE + E[U₁ - U₀ | S > 0]
    TUT: E[Y₁ - Y₀ | D=0] = ATE + E[U₁ - U₀ | S ≤ 0]
    MTE: E[Y₁ - Y₀ | V=v] = ATE + E[U₁ - U₀ | V=v]
  key_insight: 'When selection is on gains (Cov(U₁-U₀, V) ≠ 0):

    TT ≠ ATE ≠ TUT

    Selection sorting creates heterogeneous treatment effects.

    '
late_analysis:
  definition: LATE = E[Y₁ - Y₀ | Compliers]
  compliers: Those induced to take treatment by instrument
  problems:
    instrument_dependent: Different instruments identify different LATE
    non_comparable: LATE(Z₁) cannot be compared to LATE(Z₂)
    not_policy_relevant: Complier population changes with policy
    monotonicity_required: Requires no defiers assumption
  policy_implication: 'LATE answers: "What is effect for those induced by THIS instrument?"

    Does NOT answer: "What would effect be if we expanded treatment?"

    '
