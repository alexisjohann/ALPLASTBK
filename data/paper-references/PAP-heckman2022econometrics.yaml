  notes: '★★★★ LEVEL 4 THEORY INTEGRATION. COMPREHENSIVE COMPARISON of three causal
    frameworks: (1) Econometric (Frisch-Haavelmo) - handles simultaneity, answers
    P1-P4, (2) Neyman-Rubin - clear in RCTs but limited to P1-P2, (3) Pearl Do-Calculus
    - DAGs cannot handle feedback loops (acyclic by definition). KEY DISTINCTION:
    Fixing (intervention modifies DGP) vs Conditioning (selection from distribution).
    LATE CRITIQUE: instrument-dependent, not policy-relevant. SIMULTANEITY: Supply-demand
    cannot be represented in DAGs. ROY MODEL: Selection on gains means TT ≠ ATE ≠
    TUT. COMPLEMENTS PAP-heckman2024causality (thought experiments) with deeper framework
    comparison.'
