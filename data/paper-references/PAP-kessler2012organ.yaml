abstract: Organ donations from deceased donors provide the majority of transplanted organs in the United States, and one deceased
  donor can save numerous lives by providing multiple organs.Nevertheless, most Americans are not registered organ donors
  despite the relative ease of becoming one.We study in the laboratory an experimental game modeled on the decision to register
  as an organ donor, and investigate how changes in the management of organ waiting lists might impact donations.We find that
  an organ allocation policy giving priority on waiting lists to those who previously registered as donors has a significant
  positive impact on registration.
