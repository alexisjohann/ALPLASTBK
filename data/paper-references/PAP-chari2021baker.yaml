abstract: In 1985, James A. Baker III's “Program for Sustained Growth” proposed a set of economic policy reforms including,
  inflation stabilization, trade liberalization, greater openness to foreign investment, and privatization, that he believed
  would lead to faster growth in countries then known as the Third World, but now categorized as emerging and developing economies
  (EMDEs). A country-specific, time-series assessment of the reform process reveals three clear facts. First, in the ten-year
  period after stabilizing high inflation, the average growth rate of real GDP in EMDEs is 2.6 percentage points higher than
  in the prior ten-year period. Second, the corresponding growth increase for trade liberalization episodes is 2.66 percentage
  points. Third, in the decade after opening their capital markets to foreign equity investment, the spread between EMDEs
  average cost of equity capital and that of the US declines by 240 basis points. The impact of privatization is less straightforward
  to assess, but taken together, the three central facts of reform provide empirical support for the Baker Hypothesis and
  suggest a simple neoclassical interpretation of the unprecedented increase in growth that has taken place in EMDEs since
  the early 1990s.
