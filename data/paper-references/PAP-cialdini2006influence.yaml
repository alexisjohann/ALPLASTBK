abstract: Теперь я уже могу свободно в этом признаться. Всю свою жизнь я был простофилей. Сколько себя помню, я всегда становился
  легкой добычей для разного рода торговцев, сборщиков средств на различные нужды и всевозможных дельцов. Правда, лишь у немногих
  были нечестные мотивы. Например, у представителей некоторых благотворительных организаций намерения были самые благие. Но
  это неважно. То и дело я оказывался обладателем подписки на какой-нибудь ненужный журнал или вдруг …
