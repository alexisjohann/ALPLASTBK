abstract: The Black Lives Matter movement has operated alongside a growing recognition among social scientists that policing
  research has been limited in its scope and outmoded in its assumptions about the nature of public safety. This essay argues
  that social science research on policing should reorient its conception of the field of policing, along with how the study
  of crime rates and police departments fit into this field. New public safety research should broaden its outcomes of interest,
  its objects of inquiry, and its engagement with structural racism. In this way, next-generation research on policing and
  public safety can respond to the deficiencies of the past and remain relevant as debates over transforming American policing
  continue.
