abstract: A stock market liberalization is a decision by a country's government to allow foreigners to purchase shares in
  that country's stock market. On average, a country's aggregate equity price index experiences abnormal returns of 3.3 percent
  per month in real dollar terms during an eight‐month window leading up to the implementation of its initial stock market
  liberalization. This result is consistent with the prediction of standard international asset pricing models that stock
  market liberalization may reduce the liberalizing country's cost of equity capital by allowing for risk sharing between
  domestic and foreign agents.
