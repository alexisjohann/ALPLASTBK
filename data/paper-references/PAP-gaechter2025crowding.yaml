abstract: Explicit and implicit incentives and opportunities for mutually beneficial voluntary cooperation co-exist in many
  economic relationships. In a series of eight laboratory gift-exchange experiments, we show that incentive contracts can
  lead to crowding out of voluntary cooperation even after incentives have been abolished. This crowding out occurs also in
  repeated relationships. Crowding out is mostly due to reduced wages and not a change in reciprocal wage-effort relationships.
