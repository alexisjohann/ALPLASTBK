summary:
  abstract_extended: 'This paper examines the evolutionary origins of reciprocal preferences.

    We argue that strong reciprocity - cooperation and punishment in one-shot

    interactions - evolved through gene-culture coevolution and cultural group

    selection. This explains human cooperation beyond what kin selection or

    direct reciprocity can account for.'
  key_findings: "1. EVOLUTIONARY PUZZLE\n   - Standard theory predicts defection\n   - One-shot cooperation observed\n   -\
    \ Costly punishment widespread\n\n2. PROPOSED MECHANISMS\n   - Gene-culture coevolution\n   - Cultural group selection\n\
    \   - Norm internalization\n\n3. EVIDENCE\n   - Cross-cultural studies\n   - Developmental evidence\n   - Neural correlates"
  ebf_relevance: '10C DIMENSIONS:

    - WHO (AAA): Evolutionary basis of preferences

    - WHAT (C): Reciprocity as evolved trait

    - WHEN (V): Evolutionary timescales


    THEORY SUPPORT:

    - MS-SR-001: Strong Reciprocity (evolutionary)

    - Published in Evolution & Human Behavior

    - Interdisciplinary integration


    KEY INSIGHT:

    Reciprocal preferences evolved through gene-culture coevolution, enabling

    human cooperation at unprecedented scales.'
