abstract: A new model of consumer behavior is developed using a hybrid of cognitive psychology and microeconomics. The development
  of the model starts with the mental coding of combinations of gains and losses using the prospect theory value function.
  Then the evaluation of purchases is modeled using the new concept of “transaction utility.” The household budgeting process
  is also incorporated to complete the characterization of mental accounting. Several implications to marketing, particularly
  in the area of pricing, are developed.
