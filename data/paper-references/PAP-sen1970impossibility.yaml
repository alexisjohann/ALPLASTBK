abstract: 'The purpose of this paper is to present an impossibility result that seems to have some disturbing consequences
  for principles of social choice. A common objection to the method of majority decision is that it is illiberal. The argument
  akes the following form: Given other things in the society, if you prefer to have pink walls rather than white, then society
  should permit you to have this, even if a majority of the community would like to see your walls white. Similarly, whether
  you should sleep on your back or on your belly is a matter in which the society should permit you absolute freedom, even
  if a majority of the community is nosey enough to feel that you must sleep on your back. We formalize this concept of individual
  liberty in an extremely weak form and examine its consequences.

  II. The Theorem Let Ri be the ordering of the ith individual over the set X of all possible social states, each social state
  being a complete description of society including every individual''s position in it. There are n individuals. Let R be
  the social preference relation that is to be determined. DEFINITION 1: A collective choice rule is a functional relationship
  that specifies one and only one social preference relation R for any set of n individual orderings (one ordering for each
  individual). A special case of a collective choice rule is one that Arrow (1951) calls a social welfare function, namely,
  a rule such that R must be an ordering. DEFINITION 2: A social welfare function is a collective choice rule, the range of
  which is restricted to orderings. A weaker requirement is that each R should generate a" choice function,)" that is, in
  every subset of alternatives there must be a" best"'
