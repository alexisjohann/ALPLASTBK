abstract: The purpose of this review is to compare and contrast western and eastern
  conceptualizations of happiness and optimal functioning. Towards this end, accounts
  of happiness and optimal functioning provided in western philosophy and scientific
  psychology are compared with those in some eastern schools of thought (namely, Hinduism,
  Buddhism, Taoism, Confucianism, and Sufism). Six fundamental differences in western
  and eastern conceptualizations of the good life are identified and discussed in
  the context of broader psychological theory. It is hoped that this theoretical analysis
  will stimulate more culturally informed research among happiness researchers.
