# ============================================================================
# ABSTRACT & SOURCE
# ============================================================================
abstract: |
  Given a user with a well-defined utility function, this paper studies whether
  or not incentivized Machine Learners (MLs) will provide accurate probabilistic
  assessments of states of the world needed for good decision-making. We first
  identify a broadly applicable condition, the Aligned Learning Premise (ALP),
  under which they will: that the optimal action depends only on the most likely
  state. Yet the ALP fails in many real-world cases, including hiring decisions,
  medical screening, and loan approvals. We show that when the ALP fails, standard
  ML loss functions can systematically disincentivize the provision of accurate
  probabilistic assessments, producing ML systems that are misaligned with user
  utility. Additionally, we provide a new result in the theory of proper scoring
  rules by showing that, contrary to common belief, ex-post utility weighting is
  necessary for alignment when costs of wrong decisions are unequal.

abstract_source: original
