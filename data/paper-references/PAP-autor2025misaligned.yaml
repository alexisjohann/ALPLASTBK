# ============================================================================
# SUMMARY
# ============================================================================
summary:
  abstract_extended: |
    This paper introduces the Aligned Learning Premise (ALP), a condition under
    which standard Machine Learning (ML) training procedures produce probabilistic
    assessments that align with user utility. The ALP states that the optimal
    action must depend only on the MOST LIKELY state of the world, not on exact
    probabilities. When this holds, standard loss functions (cross-entropy, Brier
    score) incentivize ML systems to provide accurate probability estimates.

    The central contribution is showing that the ALP FAILS in many real-world
    settings where different types of errors have different costs: hiring (false
    positive vs false negative), medical screening (missing disease vs unnecessary
    treatment), loan approvals (default risk vs missed opportunity). In these
    cases, standard ML training systematically produces misaligned predictions.

    The paper provides several key formal results:
    1. THEOREM: Cross-entropy and Brier score are proper scoring rules, but
       properness alone does NOT ensure alignment with user utility
    2. THEOREM: When ALP fails, there exist ML outputs that are optimal under
       standard loss but suboptimal for user utility
    3. THEOREM: Ex-post utility weighting (not ex-ante) is NECESSARY for
       alignment when costs are asymmetric
    4. THEOREM: The Blackwell information ordering determines when one ML
       system is universally preferable to another

    The paper connects mechanism design (how to incentivize truthful reporting)
    to ML training (how to incentivize accurate prediction). This bridge between
    economics and computer science formalizes the "inner alignment" problem:
    ensuring that the ML system's training objective actually serves user goals.

  key_findings: |
    1. ALP DEFINITION: The Aligned Learning Premise holds when the optimal action
       depends only on the most likely state, not on exact probabilities
    2. ALP FAILURE: ALP fails in hiring, medical screening, loan approval -
       anywhere Type I and Type II errors have different costs
    3. MISALIGNMENT THEOREM: Standard loss functions (cross-entropy, Brier) can
       systematically incentivize inaccurate predictions when ALP fails
    4. UTILITY WEIGHTING: Ex-post (not ex-ante) utility weighting is necessary
       for alignment with asymmetric costs
    5. PROPER SCORING RULES: Properness is necessary but NOT sufficient for
       alignment - a new result in scoring rule theory
    6. BLACKWELL ORDERING: One ML system dominates another iff it provides
       more information in the Blackwell sense
    7. INNER ALIGNMENT: Training objective (loss function) may not align with
       deployment objective (user utility) - formalized rigorously
    8. CLASS-WEIGHTED CROSS ENTROPY: Cost-sensitive learning adjusts loss
       weights to reflect asymmetric error costs
    9. MECHANISM DESIGN CONNECTION: ML training as incentive design problem -
       how to elicit truthful probabilistic assessments from ML systems

  ebf_relevance: |
    Domain: CORE-HOW, CORE-WHAT, CORE-AWARE
    10C Dimensions:
      - HOW (B): Complementarity between error types creates alignment/misalignment.
        The interaction between Type I and Type II error costs (gamma != 0) determines
        whether standard ML training works. When gamma_error_costs = 0 (symmetric),
        ALP holds; when gamma != 0 (asymmetric), misalignment emerges.
      - WHAT (C): Formalizes divergence between user utility function (what the user
        ACTUALLY wants) and ML training objective (what the ML optimizes). This is
        precisely the EBF distinction between stated/revealed preferences and actual
        utility dimensions.
      - AWARE (AU): ALP violation = lack of awareness that ML system is misaligned.
        Users trust ML output without knowing the loss function doesn't match their
        utility. This is a meta-awareness problem: awareness about the system's
        (mis)alignment.
      - WHEN (V): Context (symmetric vs asymmetric costs) determines whether standard
        ML is aligned. This supports EBF's core thesis: theta = f(Psi, 10C).
    Theory Support:
      - Establishes MS-MD-002 (Aligned Learning Premise Framework)
      - Extends MS-MD-001 (Mechanism Design as Causal Learning)
      - Connects to proper scoring rules (Brier 1950, Good 1952)
    Key EBF Insight: The SAME ML training procedure (cross-entropy loss) can be
    aligned or misaligned depending entirely on the CONTEXT (cost structure of
    errors). This is not a bug in ML but a fundamental design feature that must be
    addressed through utility-weighted training. Directly parallels EBF's insight
    that the same intervention can help or harm depending on context.

  sources:
    - "NBER Working Paper 34504, November 2025"
    - "BibTeX: bibliography/bcm_master.bib (autor2025misaligned)"

