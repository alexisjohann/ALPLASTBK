abstract: 'In 2016, the Brazilian construction firm Odebrecht was fined $2.6 billion by the US Department of Justice. It was
  the largest corruption case ever prosecuted under the US Foreign Corrupt Practices Act. Our examination of judicial documents
  and media reports on this case provides new insights on the workings of corruption in the infrastructure sector. Odebrecht
  paid bribes for two reasons: to tailor the terms of the auction in its favor, as well as to obtain favorable terms in contract
  renegotiations. In projects where Odebrecht paid bribes, costs increased by 70.8 percent on average, compared with 5.6 percent
  for projects with no bribes. We also find that bribes and profits made from bribing were smaller than documented in most
  previous studies, in the range of one to two percent of the cost of a project.'
