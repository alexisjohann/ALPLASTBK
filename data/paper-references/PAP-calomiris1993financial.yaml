abstract: 'Macroeconomists have long argued that financial markets were important sources and propagators of decline during
  the Great Depression. Turning points during the Depression often coincided with or were preceded by dramatic events in financial
  markets: stock market collapse, waves of bankruptcy and bank failure, and contractions in the money stock. But the mechanism
  through which financial factors contributed to the Depression has been a source of controversy, as has been the relative
  importance of financial factors in explaining the origins and persistence of the Depression. This essay reviews the literature
  on the role of financial factors in the Depression and draws some lessons that have more general relevance for the study
  of the Depression and for macroeconomics.'
