abstract: Public choice theory explains and interprets politics as the interaction among constituents and agents seeking to
  advance or to express their own interests. Applied to an observed political event like the 1986 tax reform legislation,
  any such analysis must identify the effects on separate interests and make some presumption concerning the perception of
  these effects. The linkage between assigning gains and losses from the 1986 tax changes and explaining these changes depends
  critically on the model of political choice. Political reality presumably embodies some mix of models of consensus, conflict,
  and agents' discretion. These three models are examined separately, with features from each retaining some explanatory value.
