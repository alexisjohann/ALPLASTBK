abstract: Abstract This article studies the herding effect in the capital markets. Using data from the Italian Stock Exchange,
  the authors test for the presence of herding as described in Christie and Huang [1995], Chang, Cheng, and Khorana [2000],
  and Hwang and Salmon [2001]. The tests support Christie and Huang's conclusions that herding is present in extreme market
  conditions.
