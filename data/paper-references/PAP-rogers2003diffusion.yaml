abstract: "This classic 5th edition work explains how new ideas spread via communication channels over time among members of a social system. Diffusion has four elements: an innovation perceived as new, communication channels, time, and a social system. The Innovation Diffusion Framework explains how attributes of technological innovations—relative advantage, compatibility, complexity, trialability, and observability—affect consumers' intentions to adopt. The innovation-decision process involves knowledge, persuasion, decision, implementation, and confirmation stages. Initially perceived as uncertain and risky, innovations spread when early adopters spread the word among their acquaintances."
