abstract: 'The coalition cabinet in which Solidarity played a leading role, but which also included Communists and their allies,
  won Parliamentary approval on September 12, 1989. This coalition inherited from the Communists an economy in deep crisis:
  inflation was raging, shortages of virtually all goods were rampant, and the black market was all-pervasive. The new government
  pledged to restore the market economy. This paper discusses the economy under Solidarity rule, focusing on stabilization
  and the restoration of private enterprise.'
