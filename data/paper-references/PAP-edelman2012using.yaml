abstract: The data used by economists can be broadly divided into two categories. First, structured datasets arise when a
  government agency, trade association, or company can justify the expense of assembling records. The Internet has transformed
  how economists interact with these datasets by lowering the cost of storing, updating, distributing, finding, and retrieving
  this information. Second, some economic researchers affirmatively collect data of interest. For researcher-collected data,
  the Internet opens exceptional possibilities both by increasing the amount of information available for researchers to gather
  and by lowering researchers' costs of collecting information. In this paper, I explore the Internet's new datasets, present
  methods for harnessing their wealth, and survey a sampling of the research questions these data help to answer. The first
  section of this paper discusses “scraping” the Internet for data—that is, collecting data on prices, quantities, and key
  characteristics that are already available on websites but not yet organized in a form useful for economic research. A second
  part of the paper considers online experiments, including experiments that the economic researcher observes but does not
  control (for example, when Amazon or eBay alters site design or bidding rules); and experiments in which a researcher participates
  in design, including those conducted in partnership with a company or website, and online versions of laboratory experiments.
  Finally, I discuss certain limits to this type of data collection, including both “terms of use” restrictions on websites
  and concerns about privacy and confidentiality.
