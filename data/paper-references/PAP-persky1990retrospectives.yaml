abstract: 'In Webster''s Dictionary is an example of how to use “ceteris paribus “: [S]taple-growing states are, ceteris paribus,
  more favorable to slave labor than manufacturing states.” I suspect it would take a minor treatise to elucidate fully the
  ceteris paribus conditions here. And once this was done, it would be doubtful that holding all these cetera constant would
  have much analytical meaning. Unfortunately, this is always the potential problem with the expression. In too many cases
  one is unsure of exactly what restraints are being imposed and by what authority the exercise is legitimated. Fittingly,
  the history of ceteris paribus is a history of studied ambiguity.'
