abstract: The popular belief that immigrants have a large adverse impact on the wages and employment opportunities of the
  native-born population of the receiving country is not supported by the empirical evidence. A 10 percent increase in the
  fraction of immigrants in the population reduces native wages by 0-1 percent. Even those natives who are the closest substitutes
  with immigrant labor do not suffer significantly as a result of increased immigration. There is no evidence of economically
  significant reductions in native employment. The impact on natives’ per capita income growth depends crucially on the immigrants’
  human capital levels.
