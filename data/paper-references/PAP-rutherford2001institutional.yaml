abstract: This article gives a history of American institutionalism, and a brief comparison with the more recent “new” institutional
  economics. Institutionalism was a significant element in American economics between the Wars, but declined rapidly thereafter.
  The article outlines the movement's initial appeal, its contributions, and the reasons for its decline. Although the “new”
  institutionalism has few direct ties to the older tradition, some interesting commonalities are found and discussed. Links
  to the “new institutionalism” in sociology and political science, and to historical work on other “institutional” traditions
  are also mentioned.
