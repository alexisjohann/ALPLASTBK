abstract: Discusses the cognitive and the psychophysical determinants of choice in risky and riskless contexts. The psychophysics
  of value induce risk aversion in the domain of gains and risk seeking in the domain of losses. The psychophysics of chance
  induce overweighting of sure things and of improbable events, relative to events of moderate probability. Decision problems
  can be described or framed in multiple ways that give rise to different preferences, contrary to the invariance criterion
  of rational choice. The process of mental accounting, in …
