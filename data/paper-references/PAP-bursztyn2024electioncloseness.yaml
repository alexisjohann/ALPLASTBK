abstract: 'We provide evidence of a causal effect of anticipated election closeness
  on voter turnout, exploiting the precise day-level timing of the release of Swiss
  national poll results for high-stakes federal referenda, and a novel dataset on
  daily mail-in voting for the canton of Geneva.Using an event study design, we find
  that the release of a closer poll causes voter turnout to sharply rise immediately
  after poll release, with no differential pre-release turnout levels or trends.We
  provide evidence that polls affect turnout by providing information shaping beliefs
  about closeness: first, the introduction of Swiss polls had significantly larger
  effects in politically unrepresentative municipalities, where locally available
  signals of closeness are less correlated with national closeness.Second, the effects
  of close polls are largest where newspapers report on them most.Counterfactual exercises
  suggest the importance of polls and reporting on polls in shaping election outcomes.'
