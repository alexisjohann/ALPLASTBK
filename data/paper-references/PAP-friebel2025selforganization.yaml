summary:
  abstract_extended: "How does SELF-ORGANIZATION emerge?\n\nSETTING: 19th-century Baden (autonomous German\
    \ state)\n- Many but not all communities established VOLUNTEER FIRE BRIGADES\n- A form of bottom-up\
    \ collective action that persists to this day\n\nKEY FINDING:\nSelf-organization emerged where LOCAL\
    \ SHOCKS interacted with\nPRE-EXISTING SOCIAL STRUCTURES.\n\nTHE INTERACTION:\n- A major fire significantly\
    \ increased likelihood of establishing\n  a fire brigade\n- BUT ONLY in communities that already had\
    \ a SINGING or GYMNASTICS CLUB\n\nQUANTIFICATION:\nFire x Social Clubs → MORE THAN TRIPLES probability\
    \ of fire brigade\nformation\n\nMECHANISM (Coordination Game Framework):\n- Fire ALONE has no effect\n\
    - Social clubs ALONE have no effect\n- Shocks SHIFT EXPECTATIONS and enable equilibrium transition\
    \ from\n  non-cooperation to cooperation\n\nDATA: Historical panel of 1,577 Baden municipalities (1852-1889)\n\
    with hand-collected fire insurance data.\n\nTHEORETICAL CONTRIBUTION:\nExtends Ostrom (collective\
    \ action) and Putnam (social capital) theories."
  key_findings: '1. Self-organization = Shock × Pre-existing Social Structure

