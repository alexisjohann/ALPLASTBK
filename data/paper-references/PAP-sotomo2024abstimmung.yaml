abstract: "Das Wahlbarometer Extra 2024 von Sotomo zeigt die Wahlabsicht der Schweizer Stimmbevölkerung. Die Befragung identifiziert Krankenkassenprämien (40%) als grösste politische Herausforderung, gefolgt von Zuwanderung (27%) und EU-Beziehungen (27%). Die SVP erreicht mit 30.4% einen Höchstwert. Der Bericht analysiert regionale Unterschiede und den Einfluss verschiedener Bundesräte, wobei Albert Rösti (UVEK) mit 64% den höchsten zugeschriebenen Einfluss hat."
