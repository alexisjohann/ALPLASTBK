abstract: We study the influence of gender on economic decision making in a two-person bargaining game. By testing hypotheses
  derived from evolutionary psychology and social role theory, we find that (1) gender per se has no significant effect on
  behavior, whereas (2) gender pairing systematically affects behavior. In particular, we observe much more competition and
  retaliation and, thus, lower efficiency when the bargaining partners have the same gender than when they have the opposite
  gender. Implications for real-world organizations are discussed.
