summary:
  abstract_extended: "This study examines the DEMOGRAPHIC TRANSFORMATION of immigration to\nSwitzerland\
    \ over 53 years (1966-2019), focusing on the rise of high-skilled\nmigrants.\n\nKEY FINDINGS:\n\n\
    1. TERTIARY EDUCATION SHARE:\n   - 1966-1970: Only 18% of immigrants had tertiary education\n   -\
    \ 2010-2018: Rose to 56% tertiary educated\n\n2. GEOGRAPHIC SHIFT:\n   - Anglo-Saxon and Western European\
    \ immigrants: 87% tertiary educated\n   - Traditional source countries (Southern Europe): declining\
    \ share\n\n3. BRAIN GAIN CONFIRMED:\n   - Switzerland attracts POSITIVE SELECTION of migrants\n  \
    \ - Validates Borjas prediction: high-wage egalitarian destinations\n     attract the most skilled\
    \ workers from origin countries\n\nMETHODOLOGY: Longitudinal analysis using Swiss population registers,\n\
    1966-2019 (53 years of data).\n\nPOLICY RELEVANCE: Documents how bilateral agreements with EU and\n\
    selective immigration policies transformed Switzerland's immigrant\ncomposition toward high-skilled\
    \ workers."
  key_findings: '1. Tertiary educated immigrants: 18% (1970) → 56% (2018)

    2. Anglo-Saxon/Western European immigrants: 87% tertiary educated

    3. Brain gain confirmed for Switzerland

    4. Validates Borjas positive selection theory

    5. 53-year longitudinal analysis (1966-2019)

    6. Bilateral EU agreements transformed composition'
