abstract: In a recent article, Hugo Sonnenschein [4] has shown that in strictly convex environments, market excess demand
  functions can be approxi-mately decomposed into individual excess demand functions generated by a finite number of utility
  maximizing consumers. The only restrictions imposed on the aggregate excess demand functions are Walras' Law, zero-degree
  homogeneity in prices, and continuity. Such a decomposition can be found on any compact set of positive prices; all the
  coordinates of the approximate aggregate excess …
