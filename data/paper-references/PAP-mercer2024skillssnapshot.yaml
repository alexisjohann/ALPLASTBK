abstract: >
  Mercer's 2024/2025 Skills Snapshot Survey provides a comprehensive benchmark of organizational
  skills maturity based on responses from 1,827 HR leaders across 94 countries and 17 industries.
  The survey finds that while 91% of organizations consider skills-based talent management a
  strategic priority, only 21% rate their skills infrastructure as mature. Key findings include
  that organizations with mature skills frameworks report 34% higher employee engagement and 28%
  better internal mobility outcomes. The most common skills-based practices are skills-based
  learning (adopted by 52% of organizations), followed by skills-based hiring (38%) and skills-based
  career pathing (31%). Compensation redesign around skills remains the least adopted practice
  at 14%. The report identifies AI-powered skills inference as an emerging enabler, with 43% of
  organizations planning to implement AI-based skills taxonomies within 24 months. Regional
  differences are significant: Asia-Pacific leads adoption (27% mature), followed by North
  America (22%) and Europe (18%).
