abstract: Both transaction cost-economics and property-rights theories offer explanations of the boundaries of the firm based
  on ideas of ex post bargaining and holdup. These theories are quite distinct in their empirical predictions, but neither
  offers a satisfactory account of a large variety of observed practices. The authors discuss a number of such examples, where
  the boundaries of the firm seem to be determined by factors other than the need to protect investments, and where other
  mechanisms than the allocation of asset ownership are used to provide investment incentives. These examples indicate the
  need to enrich their theory of firm boundaries.
