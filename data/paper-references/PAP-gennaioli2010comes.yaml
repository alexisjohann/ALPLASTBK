abstract: We present a model of judgment under uncertainty, in which an agent combines data received from the external world
  with information retrieved from memory to evaluate a hypothesis. We focus on what comes to mind immediately, as the agent
  makes quick, intuitive evaluations. Because the automatic retrieval of data from memory is both limited and selected, the
  agent's evaluations may be severely biased. This framework can account for some of the evidence on heuristics and biases
  presented by Kahneman and Tversky, including conjunction and disjunction fallacies.
