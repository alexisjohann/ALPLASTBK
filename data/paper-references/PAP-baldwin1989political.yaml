abstract: International trade seems to be a subject where the advice of economists is routinely disregarded. Economists are
  nearly unanimous in their general opposition to protectionism, but the increase in U.S. protection in recent years in such
  sectors as automobiles, steel, textiles and apparel, machine tools, footwear and semiconductors demonstrates that economists
  lack political influence on trade policy. Two broad approaches have been developed to analyze the political economics of
  trade policy and the processes that generate protectionism. One approach emphasizes the economic self-interest of the political
  participants, while the other stresses the importance of the broad social concerns of voters and public officials. This
  paper outlines the nature of the two approaches, indicating how they can explain the above anomalies and other trade policy
  behavior, and concludes with observations about integrating the two frameworks, conducting further research, and making
  policy based on the analysis.
