abstract: Girl Power The potential of affirmative action policies to reduce overall outcomes because of lower individual performance
  has been discussed widely and at length. But do quotas or preferential treatment of applicants alter the pool of candidates?
  Balafoutas and Sutter (p. 579 ; see the Perspective by Villeval ) used an existing laboratory-based task to assess the change
  in composition of winning candidates and the overall outcome as a function of three affirmative action policies. Policies
  designed to encourage more women to enter a competitive environment served to recruit enough high-performing individuals
  to ensure that the efficiency in performing the task was preserved. Beaman et al. (p. 582 , published online 12 January)
  examined the effects of a constitutionally mandated reservation of village-council and council-leader positions for women
  in West Bengal after two election cycles (1998 and 2003). The program appeared to narrow the gender gap in aspirations of
  parents for their children and of children for themselves; in addition, teenage girls spent more time in school and less
  on household chores. Beliefs and attitudes changed only after the second set of elections—that is, after a longer exposure
  to female role models—complementing the more rapid policy changes instituted by women council leaders after the first round
  of elections.
