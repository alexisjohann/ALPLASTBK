abstract: 'Online firestorms - the sudden outrage expressed by large numbers of social
  media users

  in response to a company''s actions - have become a prevalent threat to brands.
  Yet

  research on how managers can detect, prevent, and mitigate firestorms remains scarce.

  This research develops a comprehensive framework for managing online firestorms
  in

  brand communities. Drawing on 472,995 posts across 89 brand communities over a

  six-year period, the authors find that (1) posts containing high-arousal emotions

  are more likely to go viral than posts containing low-arousal emotions, (2) the

  structural ties between users amplify this effect, (3) empathy-based responses

  reduce virality more than explanation-based responses in low-arousal situations

  (but not high-arousal), and (4) response timing moderates the effectiveness of

  mitigation strategies.

  '
