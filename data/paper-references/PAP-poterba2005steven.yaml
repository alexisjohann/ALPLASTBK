abstract: Steve's Clark Medal citation mentions his path-breaking contributions to the economics of crime and to the political
  economy of campaign finance. This paper describes Steve's research in each of these areas, as well as his contributions
  on a range of other topics. It identifies the substantive themes as well as the methodological patterns that run through
  Steve's research, and it describes the economic issues that have been informed by his analysis.
