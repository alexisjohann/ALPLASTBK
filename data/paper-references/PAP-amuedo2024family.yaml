title: 'Family Migration and Labor Market Outcomes: Evidence from OECD Countries'
author: Amuedo-Dorantes
year: '2024'
publication_type: journal_article
doi: 10.1086/728607
content_level: L1
summary:
  abstract: 'This paper examines labor market outcomes for family migrants across 20 OECD countries from 2000-2020. Tied movers
    (typically spouses who follow the principal applicant) earn approximately 15% less than principal applicants. Children
    delay spouse labor market entry by about 2 years. The findings demonstrate that family migration creates household-level
    utility trade-offs where the tied mover penalty must be weighed against the principal applicant''s gains when evaluating
    total family welfare from migration.

    '
