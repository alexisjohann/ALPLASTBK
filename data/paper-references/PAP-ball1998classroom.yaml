abstract: This paper describes a classroom exercise in which students trade assets of uncertain value in a sequence of market
  periods. Assets pay one-dollar dividends at the end of each period, but once the dividend is paid there is fixed probability
  that the asset will be destroyed. Dividends and probabilities are chosen so that the fundamental value is constant over
  time. Speculative bubbles can be caused by divergent expectations about other traders' valuations of the asset. This exercise
  provides an interactive framework that facilitates discussions of discounting, rational expectations, and backward induction.
