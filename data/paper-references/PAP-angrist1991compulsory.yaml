abstract: We establish that season of birth is related to educational attainment because
  of school start age policy and compulsory school attendance laws. Individuals born
  in the beginning of the year start school at an older age, and can therefore drop
  out after completing less schooling than individuals born near the end of the year.
  Roughly 25 percent of potential dropouts remain in school because of compulsory
  schooling laws. We estimate the impact of compulsory schooling on earnings by using
  quarter of birth as an instrument for education. The instrumental variables estimate
  of the return to education is close to the ordinary least squares estimate, suggesting
  that there is little bias in conventional estimates.
