abstract: |
  This paper develops and tests an endogenous, purpose-driven theory of organizational reference group selection. Using a panel dataset of 432 hotels across three US cities (2016-2019), it examines how organizations adapt their strategic reference groups in response to performance deviations. The key insight is that reference selection is not exogenous but driven by organizational purpose — organizations that deviate from their aspiration levels systematically adjust which peers they monitor. Loss framing (negative deviations) produces stronger reference group adaptation than gain framing (positive deviations), consistent with prospect theory predictions.

research_question: "Why do organizations select specific reference groups, how does purpose drive this selection, and does performance deviation trigger endogenous reference group adaptation?"

