abstract: The first objective of this paper has been to explain why it is that expected seller revenue is the same under very
  different auction rules. The second objective has been to explain why revenue equivalence no longer holds once the central
  assumptions of risk aversion and independence of beliefs are modified. The effect of risk aversion is to make a sealed high
  bid auction more attractive from a seller's viewpoint. The effect of correlated beliefs is to favor open bidding. Which
  of the two factors dominates under plausible assumptions about risk aversion parameters and about the degree to which beliefs
  are correlated remains an important open question.
