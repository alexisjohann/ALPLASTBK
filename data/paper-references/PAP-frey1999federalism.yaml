abstract: This book develops the FOCJ concept (Functional, Overlapping, Competing
  Jurisdictions) as a new model of federalism. FOCJ are governmental units that are
  Functional (extending over variable areas corresponding to tasks), Overlapping (covering
  different geographical areas), Competing (citizens choose which unit to join with
  political rights via initiatives and referenda), and Jurisdictions (with enforcement
  power and taxation authority). The authors argue that traditional federalism exhibits
  advantages over centralization but faces serious problems. FOCJ exploits decentralization
  benefits while avoiding inherent problems by letting jurisdictions emerge in response
  to the geography of problems rather than historical boundaries. This makes governance
  more responsive to citizen preferences and provides public services more efficiently.
