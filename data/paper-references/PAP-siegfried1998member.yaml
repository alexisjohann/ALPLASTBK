abstract: The appointment of a new Secretary of the American Economic Association provides an opportunity for assessing the
  Association's membership trends and 'market coverage.' Toward these ends, the author has assembled information about trends
  in both aggregate Association membership and the proportion of academic economists who are members of the Association, and
  a snapshot of 1996 academic membership rates classified by academic ranks, types of colleges and universities, and individual
  institutions at which assistant professors earned their Ph.D.
