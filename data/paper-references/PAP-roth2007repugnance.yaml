abstract: This essay examines how repugnance sometimes constrains what transactions and markets we see. When my colleagues
  and I have helped design markets and allocation procedures, we have often found that distaste for certain kinds of transactions
  is a real constraint, every bit as real as the constraints imposed by technology or by the requirements of incentives and
  efficiency. I'll first consider a range of examples, from slavery and indentured servitude (which are much more repugnant
  now than they once were) to lending money for interest (which used to be widely repugnant but no longer is), and from bans
  on eating horse meat in California to bans on dwarf tossing in France. An example of special interest will be the widespread
  laws against the buying and selling of organs for transplantation. The historical record suggests that while repugnance
  can change over time, it can persist for a very long time, although changes in institutions that reflect repugnance can
  occur relatively quickly when the underlying repugnance changes.
