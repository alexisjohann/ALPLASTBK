abstract: Spot asset trading is studied in an environment in which all investors receive the same dividend from a known probability
  distribution at the end of each of T = 15 or 30 trading periods. Fourteen of twenty-two experiments exhibit price bubbles
  followed by crashes relative to intrinsic dividend value. When traders are experienced this reduces, but does not eliminate,
  the probability of a bubble. The regression of changes in mean price on lagged excess bids supports the hypothesis that
  the intercept is minus the one-period expected dividend value, and the slope is positive, where excess bids measures excess
  demand attributable to homegrown capital gains expectations.
