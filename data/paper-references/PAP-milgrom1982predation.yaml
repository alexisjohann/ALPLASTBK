abstract: Economists often argue that predatory practices are irrational, since there
  exist cheaper or more certain means to gain or maintain a monopoly. Our gametheoretic,
  equilibrium analysis suggests that if a firm is threatened by several potential
  entrants, then predation may be rational against early entrants, even if it is costly
  when viewed in isolation, because it yields a reputation which deters other entrants.
