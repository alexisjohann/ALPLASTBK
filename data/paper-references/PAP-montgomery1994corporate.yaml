abstract: This paper documents the significant presence of diversified firms in the U.S. economy and presents three views
  on why firms diversify. The market power view argues that firms diversify to wield conglomerate power across markets. The
  agency view argues that diversification is undertaken by managers pursuing their own interests at the expense of the firm's
  owners. The resource view argues that firms diversify in response to excess capacity in productive factors. A review of
  recent empirical research finds little support for the market-power view and a substantial amount of evidence that is consistent
  with the agency and resource views.
