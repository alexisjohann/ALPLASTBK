abstract: My purpose here is to provide a non-technical introduction to the economics of climate change. I will sketch the
  scientific background and uncertainties, survey the results of existing studies of the impacts of climate change, present
  a summary of a study of efficient policies to slow global warming, and end with the uncertainties that haunt the entire
  field.
