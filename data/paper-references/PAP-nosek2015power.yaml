abstract: Transparency, openness, and reproducibility are readily recognized as vital
  features of science (, ). When asked, most scientists embrace these features as
  disciplinary norms and values . Therefore, one might expect that these valued features
  would be routine in daily practice. Yet, a growing body of evidence suggests that
  this is not the case (–).
