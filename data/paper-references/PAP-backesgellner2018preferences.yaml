abstract: |
  Evidence suggests that acquiring human capital is related to better life outcomes, yet young
  peoples' decisions to invest in or stop acquiring human capital are still poorly understood.
  We investigate the role of time and reference-dependent preferences in such decisions.
  Using a data set that is unique in its combination of real-world observations on student
  outcomes and experimental data on economic preferences, we find that a low degree of
  long-run patience is a key determinant of dropping out of upper-secondary education.
  Further, for students who finish education we show that one month before termination of
  their program, present-biased students are less likely to have concrete continuation plans
  while loss averse students are more likely to have a definite job offer already.

key_findings_structured:
  S1_research_question: "Do experimentally measured economic preferences (time discounting, present bias, loss aversion, risk aversion) predict real-world education and labor market outcomes?"
  S2_methodology: "Unique dataset combining: (1) incentivized lab experiments measuring delta (patience), beta (present bias), lambda (loss aversion), risk aversion; (2) administrative education data on dropout/completion; (3) survey data on labor market transition plans. Swiss vocational education setting."
  S3_sample_data: "N=327 students in Swiss upper-secondary vocational education (Berufsmaturitaet). 14 classes across multiple schools. Experiments conducted 2012-2014."
  S4_findings:
    - finding: "Low long-run patience (delta) is key determinant of dropout from upper-secondary education"
      source_section: "Section 4.1, Tables 3-4"
      formal_result: "Logit: marginal effect of delta on dropout probability is significant (p<0.05), robust to controls"
    - finding: "Present-biased students (beta<1) are less likely to have concrete continuation plans one month before graduation"
      source_section: "Section 4.2, Tables 5-7"
      formal_result: "Beta coefficient 0.28-0.33 (p<0.05) on active job search dummy"
    - finding: "Loss averse students are more likely to have a definite job offer"
      source_section: "Section 4.3, Tables 8-9"
      formal_result: "Lambda coefficient positive and significant for job offer probability"
    - finding: "Risk aversion does not significantly predict education or labor market outcomes"
      source_section: "Sections 4.1-4.3"
      formal_result: "Risk aversion coefficients generally insignificant across specifications"
  S5_validity: "Unique identification: experimental measures avoid self-report bias. Controls for demographics, grades, school characteristics. Wild cluster bootstrap for small number of clusters. Robustness with firm controls and class fixed effects."
  S6_reproducibility: "Experimental protocol based on Falk et al. (2011) preference measurement. z-Tree implementation. Data from Swiss vocational education administrative records."

