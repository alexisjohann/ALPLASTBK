abstract: At war's end, introductory economics textbooks were overdue for a revolutionary advance. Change conspired to tempt
  the author to bring to the beginning course the rudiments of Keynesian macroeconomics. The impact was explosive. In reaction
  to criticisms of the subsequent evolutionary revisions, the author here describes the transition beyond the 1936 Model T
  General Theory paradigm from the standpoint of advances on the frontier, at the same time correcting erroneous claims about
  the saving process. Finally, he tells the tales of rightist censorship of Lorie Tarshis's 1947 pioneering Keynesian textbook
  and of later thunder from the left.
