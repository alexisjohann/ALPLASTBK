abstract: This Tanner Lecture on Human Values examines the challenge of self-command - the struggle between present desires
  and future interests. Schelling analyzes how people attempt to bind their future selves through pre-commitment strategies,
  exploring the ethics and policy implications of self-control problems. The lecture addresses addiction, procrastination,
  and the fundamental question of which 'self' should be sovereign in choices over time.
