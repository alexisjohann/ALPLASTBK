abstract: A variety of researches are examined from the standpoint of information theory. It is shown
  that the unaided observer is severely limited in terms of the amount of information he can receive,
  process, and remember. However, it is shown that by the use of various techniques, eg, use of several
  stimulus dimensions, recoding, and various mnemonic devices, this informational bottleneck can be broken.
