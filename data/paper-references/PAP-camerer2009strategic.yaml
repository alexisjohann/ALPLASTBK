abstract: 'Abstract Developing a management framework to guide strategic thinking in changing markets is increasingly critical
  for researchers and executives in coping with the complex and rapidly changing global business environment. Conventional
  training and practices have too often led strategy researchers and executives to assume a stable competitive box around
  existing businesses, not recognising the effects of radical and increasingly disruptive change on markets and competitive
  space. New strategic thinking logic and initiatives require a conceptual framework to guide obtaining information, perceptive
  interpretation of strategic issues and trends, and choice of the right strategic initiatives. The conceptualisation begins
  by determining the market-based strategic capabilities needed to identify the nature and scope of determinants of market
  changes. These changes must be identified, driven by new competition, new business models, and creativity and innovation.
  Understanding fast changing markets requires identifying new market space, conducting strategic segmentation analysis, and
  determining customer value requirements. Finally, this knowledge guides strategic vision and formulation and implementation
  of market-driven strategies for changing markets. The framework is based on conceptual logic and empirical findings from
  multiple disciplines including marketing strategy and strategic management Keywords: MARKET DYNAMICSMARKET-BASED CAPABILITIESCUSTOMER
  VALUESTRATEGIC MARKET VISION'
