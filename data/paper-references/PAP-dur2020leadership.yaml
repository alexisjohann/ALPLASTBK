abstract: >
  Formal economic model analyzing how labor-market conditions shape the
  leadership styles that firms adopt. Distinguishes friendly leadership
  (praise conditional on good performance) from unfriendly leadership
  (social punishment conditional on bad performance). Under competitive
  wage-setting, unfriendly leadership is never optimal (Proposition 1).
  Under non-competitive wage-setting — binding wage floors from trade
  unions, minimum wage, or limited liability — unfriendly leadership
  emerges as profitable because it extracts worker rents (Proposition 2).
  Self-enforcement via social preferences: moderately altruistic leaders
  credibly commit to praise, moderately spiteful leaders to punishment.
  Selfish leaders cannot credibly commit. Income gap between leader and
  worker makes spiteful leaders cheaper, increasing unfriendly leadership
  prevalence (Proposition 4). Approximately 10% of employees suffer from
  abusive supervision (Tepper et al. 2017).
