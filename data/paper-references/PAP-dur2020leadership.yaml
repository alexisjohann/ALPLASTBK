        wage-setting is competitive or not. Tarifvertrag (collective bargaining)
        creates the structural conditions for unfriendly leadership by generating
        worker rents that can be extracted through social punishment.

leadership_style_model:
  description: >
    Formal economic model with principal (leader) and agent (worker). Worker
    chooses effort (high/low), leader chooses leadership style (friendly/unfriendly/
    none) with rewards and punishments conditional on observed performance.
  styles:
    - id: "F"
      name: "Conditional Friendly"
      mechanism: "Praise (reward r) after observing high output"
      condition: "k_F^h < r"
      social_preference_range: "theta in (theta_F, theta_FF)"
      welfare_efficient: true

    - id: "FF"
      name: "Unconditional Friendly"
      mechanism: "Praise (reward r) regardless of output"
      condition: "Always self-enforcing for sufficiently altruistic leaders"
      social_preference_range: "theta > theta_FF"
      welfare_efficient: false

    - id: "U"
      name: "Conditional Unfriendly"
      mechanism: "Social punishment (cost s) after observing low output"
      condition: "(1-rho)*k_U^l + max{s-(w_bar-u),0} < rho*s"
      social_preference_range: "theta in (theta_UU, theta_U)"
      welfare_efficient: false

    - id: "UU"
      name: "Unconditional Unfriendly"
      mechanism: "Social punishment (cost s) regardless of output"
      social_preference_range: "theta < theta_UU"
      welfare_efficient: false

    - id: "FU"
      name: "Carrot-and-Stick"
      mechanism: "Praise for high output AND punishment for low output"
      condition: "Both F and U conditions met simultaneously"
      welfare_efficient: "depends on parameter values"

  key_propositions:
    - id: "Prop1"
      statement: "Under competitive wage-setting, only friendly styles (F, FF) or no leadership are used"
      mechanism: "Worker rent = 0, so punishment cannot extract surplus"

    - id: "Prop2"
      statement: "Under non-competitive wage-setting with sufficient worker rent, unfriendly styles (U, UU, FU) emerge"
      mechanism: "Worker rent w_bar - u > 0 provides surplus extractable via punishment"
      condition: "w_bar - u sufficiently large relative to s and k_U"

    - id: "Prop3"
      statement: "Friendly leadership is adopted whenever socially efficient, independent of wage-setting"
      mechanism: "Condition F depends only on r and k_F, not on wage structure"

    - id: "Prop4"
      statement: "Income gap (u_l > u) reduces cost of hiring spiteful leaders, increasing unfriendly leadership"
      mechanism: "Leaders with poor alternatives accept lower wages; spiteful leaders are overrepresented in this pool"

kaufland_relevance:
  kibsm_link: MOD-013
  relevant_for:
    - "Tarifvertrag creates non-competitive wage-setting — Proposition 2 directly applies"
    - "Leader selection (WHO-01): screen for altruistic social preferences (theta > 0)"
    - "FK-Akademie: train praise-based leadership, build awareness of structural incentives"
    - "Risk: Large Kaufland filialen with binding Tarifvertrag create conditions for unfriendly leadership"
    - "Employment protection + Tarifvertrag reduce outside options, strengthening unfriendly incentives"
    - "Income gap between Filialleitung and Verkaufspersonal maps to Proposition 4"

  key_insights_for_kaufland:
    - insight: >
        Kaufland operates under Tarifvertrag (collective wage bargaining) which creates
        a binding wage floor w_bar above the competitive market wage u. Per Proposition 2,
        this is exactly the non-competitive wage-setting condition under which unfriendly
        leadership becomes profitable. The worker rent (w_bar - u) is extractable through
        social punishment — a structural risk Kaufland must actively manage.
      kibsm_element: "RISK model — institutional leadership risk"

    - insight: >
        Leader selection (WHO-01 Filialleitung, 1600 people) should explicitly screen for
        altruistic social preferences (theta > 0). The model shows that moderately altruistic
        leaders self-enforce friendly leadership through praise, while moderately spiteful
        leaders self-enforce unfriendly leadership through punishment. Assessment Center
        design should include social preference indicators.
      kibsm_element: "WHO-01 selection criteria + INT-K-002 Leadership Commitment"

    - insight: >
        FK-Akademie (INT-K-005/INT-K-006) curriculum should include explicit module on
        leadership economics: Why does Tarifvertrag create incentives for unfriendly
        leadership? How can managers recognize and resist these structural pressures?
        Awareness of the mechanism is the first line of defense.
      kibsm_element: "INT-K-005 FK-Akademie AWARE module"

    - insight: >
        Income gap between Filialleitung (WHO-01, higher salary) and Verkaufspersonal
        (WHO-04, Tarifvertrag minimum) maps to Proposition 4: when leaders have better
        outside options than workers, the pool of available leaders overrepresents
        those with spiteful preferences. Kaufland should monitor compensation ratios
        and consider reducing gaps to structurally discourage unfriendly leadership.
      kibsm_element: "WHO-01 vs WHO-04 compensation structure"

