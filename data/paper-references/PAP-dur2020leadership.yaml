parameter_registry:
  status: not_applicable
  entries: []
  coverage: 0.0
  extraction_date: ""
  notes: >
    Paper provides theoretical model with conditions rather than point estimates.
    Key structural parameters from the model:
    - r: worker's benefit from praise (friendly leadership reward)
    - s: worker's disutility from social punishment (unfriendly leadership cost)
    - k_F^h: leader's cost of praising a hard worker
    - k_U^l: leader's disutility from punishing a shirker
    - rho: probability worker is hard-working
    - w_bar: binding wage floor (from Tarifvertrag/union)
    - u: worker's outside option (market-clearing wage)
    - theta: leader's social preference parameter (>0 altruistic, <0 spiteful)
    - Condition F: k_F^h < r (friendly leadership profitable)
    - Condition U: (1-rho)*k_U^l + max{s-(w_bar-u),0} < rho*s (unfriendly profitable only under non-competitive)

