abstract: As economists endeavor to build better models of human behavior, they cannot ignore that humans are fundamentally
  a social species with interaction patterns that shape their behaviors. People's opinions, which products they buy, whether
  they invest in education, become criminals, and so forth, are all influenced by friends and acquaintances. Ultimately, the
  full network of relationships—how dense it is, whether some groups are segregated, who sits in central positions—affects
  how information spreads and how people behave. Increased availability of data coupled with increased computing power allows
  us to analyze networks in economic settings in ways not previously possible. In this paper, I describe some of the ways
  in which networks are helping economists to model and understand behavior. I begin with an example that demonstrates the
  sorts of things that researchers can miss if they do not account for network patterns of interaction. Next I discuss a taxonomy
  of network properties and how they impact behaviors. Finally, I discuss the problem of developing tractable models of network
  formation.
