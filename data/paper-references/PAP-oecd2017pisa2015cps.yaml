abstract: "This volume presents results from the PISA 2015 assessment of collaborative problem solving—the first large-scale international assessment of this skill. It measures students' capacity to effectively engage in a process whereby two or more agents attempt to solve a problem by sharing understanding and effort, pooling knowledge and skills. The framework incorporates communicating, managing conflict, organising teams, building consensus, and managing progress. Singapore topped rankings (561 points), followed by Japan, Hong Kong-China, Korea, and Canada. Girls scored significantly higher than boys in every country (29 points on average). Data from 52 countries with 100,000+ 15-year-old students."
