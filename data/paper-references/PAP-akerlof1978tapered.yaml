abstract: 'According to a modem view of the labor market, as reflected most prominently in papers by Martin Feldstein, Robert
  Hall, and George Perry, among others, unemployment in the United States is on average of quite short duration and, as a
  result, should be modeled not in terms of stocks of persons who are unemployed for fairly long periods of time, but rather
  in terms of flows of persons whose spells of unemployment are quite short.

  An important statistic which supports this view of unemployment is the large number of completed spells of unemployment
  in any one year. For example, in the year 1969, which is in no way atypical in this respect, 93,640,000 persons'' were in
  the labor force some fraction of the time, and there were a reported 32,100,000 spells of unemployment with an average duration
  of only 4.6 weeks. 2 This paper examines ways in which such statistics on the large number of spells and the correspondingly
  short durations are misleading in terms of the welfare implications of unemployment.'
