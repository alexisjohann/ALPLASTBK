abstract: 'This paper provides a detailed review of the economics of happiness literature, focusing on papers in economics
  journals since 1990 exploring subjective well-being (SWB) determinants. Poor health, separation, unemployment, and lack
  of social contact are strongly negatively associated with SWB. Potential influences on well-being fall under seven headings:
  income, personal characteristics, socially developed characteristics, how we spend time, attitudes/beliefs toward self/others/life,
  relationships, and the wider economic/social/political environment. The review highlights problems in drawing firm conclusions
  about SWB causes, including contradictory evidence, concerns over unobserved variables, and lack of certainty on causality
  direction. Highly cited with 2,893+ citations.'
