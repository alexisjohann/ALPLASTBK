summary:
  abstract_extended: 'This paper demonstrates that costly punishment can sustain cooperation in

    social dilemmas. In public goods experiments, we show that when participants

    can punish free-riders at personal cost, cooperation levels remain high.

    Without punishment opportunities, cooperation declines over time.'
  key_findings: "1. PUNISHMENT EFFECTIVENESS\n   - Costly punishment sustains cooperation\n   - Cooperation stable with punishment\n\
    \   - Declines without punishment option\n\n2. WHO PUNISHES\n   - Strong reciprocators punish\n   - Punishment proportional\
    \ to violation\n   - Emotional component involved\n\n3. IMPLICATIONS\n   - Decentralized enforcement possible\n   - No\
    \ central authority needed\n   - Self-organizing cooperation"
  ebf_relevance: '10C DIMENSIONS:

    - WHAT (C): Punishment utility

    - HOW (B): Punishment-cooperation complementarity

    - WHEN (V): Repeated interactions


    THEORY SUPPORT:

    - MS-SR-001: Strong Reciprocity

    - Early punishment experiments

    - Foundation for later work


    KEY INSIGHT:

    Costly punishment by strong reciprocators can sustain cooperation in

    repeated social dilemmas.'
