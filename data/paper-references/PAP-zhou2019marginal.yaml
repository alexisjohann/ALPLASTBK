abstract: We offer a propensity score perspective to interpret and analyze the marginal treatment effect (MTE). Specifically,
  we redefine MTE as the expected treatment effect conditional on the propensity score and a latent variable representing
  unobserved resistance to treatment. As with the original MTE, the redefined MTE can be used as a building block for constructing
  standard causal estimands. The weights associated with the new MTE, however, are simpler, more intuitive, and easier to
  compute. Moreover, the redefined MTE immediately reveals treatment effect heterogeneity among individuals at the margin
  of treatment, enabling us to evaluate a wide range of policy effects.
