abstract: The contingent valuation method, wherein sample surveys are used to elicit individuals’ willingness to pay for certain
  types of policies, is playing an important role in government decision-making. The most prominent applications are in the
  valuation of damages to natural resources from oil spills. But the contingent valuation method will be more important still
  if it is used to expand the range of impacts included in applied benefit-cost analyses. This paper explains the origins
  of the contingent valuation method and the route through which it came to be the center of both an academic and a legal
  debate.
