abstract: This paper analyzes the possibility and the consequences of rational bubbles in a dynamic&#13;\neconomy where financially
  constrained firms demand and supply liquidity. Bubbles&#13;\nare more likely to emerge, the scarcer the supply of outside
  liquidity and the more&#13;\nlimited the pledgeability of corporate income; they crowd investment in (out) when&#13;\nliquidity
  is abundant (scarce). We analyze extensions with firm heterogeneity and stochastic&#13;\nbubbles.
