abstract: Neuroeconomics is the study of the neurobiological and computational basis
  of value-based decision making. Its goal is to provide a biologically based account
  of human behaviour that can be applied in both the natural and the social sciences.
  This Review proposes a framework to investigate different aspects of the neurobiology
  of decision making. The framework allows us to bring together recent findings in
  the field, highlight some of the most important outstanding problems, define a common
  lexicon that bridges the different disciplines that inform neuroeconomics, and point
  the way to future applications.
