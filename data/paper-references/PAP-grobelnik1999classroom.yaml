abstract: Economics is often taught at a level of abstraction that can hinder some students from gaining basic intuition.
  However, lecture and textbook presentations can be complemented with classroom exercises in which students make decisions
  and interact. The approach can increase interest in, and decrease skepticism about, economic theory. This feature offers
  short descriptions of classroom exercises for a variety of economics courses, with something of an emphasis on the more
  popular undergraduate courses.
