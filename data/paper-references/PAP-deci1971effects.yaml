abstract: Two laboratory experiments were conducted to investigate the effects of external rewards on intrinsic motivation.
  When money was used as an external reward, intrinsic motivation tended to decrease, whereas when verbal reinforcement and
  positive feedback were used, intrinsic motivation tended to increase. This foundational study for Self-Determination Theory
  demonstrates the motivational crowding-out effect of extrinsic rewards.
