abstract: In this essay, we ask whether the distributions of life expectancy and mortality have become generally more unequal,
  as many seem to believe, and we report some good news. Focusing on groups of counties ranked by their poverty rates, we
  show that gains in life expectancy at birth have actually been relatively equally distributed between rich and poor areas.
  Analysts who have concluded that inequality in life expectancy is increasing have generally focused on life expectancy at
  age 40 to 50. This observation suggests that it is important to examine trends in mortality for younger and older ages separately.
  Turning to an analysis of age-specific mortality rates, we show that among adults age 50 and over, mortality has declined
  more quickly in richer areas than in poorer ones, resulting in increased inequality in mortality. This finding is consistent
  with previous research on the subject. However, among children, mortality has been falling more quickly in poorer areas
  with the result that inequality in mortality has fallen substantially over time. We also show that there have been stunning
  declines in mortality rates for African Americans between 1990 and 2010, especially for black men. Finally we offer some
  hypotheses about causes for the results we see, including a discussion of differential smoking patterns by age and socioeconomic
  status.
