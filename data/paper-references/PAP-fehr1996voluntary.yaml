summary:
  abstract_extended: 'This paper examines voluntary contributions to public goods in experimental

    settings. We show that initial contributions are substantial but decline

    over time unless communication or punishment opportunities are available.

    Understanding these dynamics is key for public goods provision mechanisms.'
  key_findings: "1. INITIAL CONTRIBUTIONS\n   - Substantial voluntary provision\n   - Above Nash equilibrium\n   - Conditional\
    \ cooperation\n\n2. CONTRIBUTION DECAY\n   - Decline over time\n   - Free-rider problem emerges\n   - End-game effects\n\
    \n3. SUSTAINING CONTRIBUTIONS\n   - Communication helps\n   - Punishment opportunities\n   - Institutional design matters"
  ebf_relevance: '10C DIMENSIONS:

    - WHAT (C): Public goods preferences

    - HOW (B): Conditional cooperation dynamics

    - WHEN (V): Repeated interactions


    THEORY SUPPORT:

    - MS-SR-001: Strong Reciprocity

    - Public goods experiments

    - Early experimental economics


    KEY INSIGHT:

    Voluntary public goods provision is possible but requires institutional

    support to sustain cooperation over time.'
