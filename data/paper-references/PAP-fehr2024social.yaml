# KEY FINDINGS STRUCTURED
# ============================================================================
key_findings_structured:
  - finding: "Majority (>60%) of individuals have social preferences; purely selfish are a minority"
    mechanism: "Distributional preferences, reciprocity, and guilt aversion are fundamental human traits"
    10C_dimension: WHO
    domain: preference_heterogeneity

  - finding: "Student samples overestimate selfishness (~33%) vs nationally representative (~20%)"
    mechanism: "Selection effects in university laboratories; general population is more other-regarding"
    10C_dimension: WHO
    domain: sample_selection

  - finding: "Three endogenous preference clusters: altruistic, inequality-averse, selfish"
    mechanism: "Distributional preferences are heterogeneous but cluster into identifiable types"
    10C_dimension: WHAT
    domain: preference_typology

  - finding: "Unilateral wage cut reduces effort by 34% (field experiment)"
    mechanism: "Fairness norms create reference-dependent effort; wage cuts violate reciprocity expectations"
    10C_dimension: HOW
    domain: labor_fairness

  - finding: "Merit considerations systematically shift distributional preferences"
    mechanism: "Meritocratic fairness: earned vs. lucky advantages receive different normative treatment"
    10C_dimension: WHAT
    domain: meritocracy

  - finding: "Belief-dependent preferences (reciprocity, guilt aversion) are distinct from distributional"
    mechanism: "Two-channel model: people care about distributions AND about intentions/expectations"
    10C_dimension: HOW
    domain: preference_channels

  - finding: "Social image and self-image concerns drive avoidance behavior"
    mechanism: "Moral wiggle room: people avoid information that would trigger costly prosocial action"
    10C_dimension: AWARE
    domain: moral_psychology

  - finding: "Social preferences have major consequences for contract design and employment relations"
    mechanism: "Incomplete contracts are sustained by reciprocity; explicit incentives can crowd out intrinsic motivation"
    10C_dimension: HOW
    domain: contract_theory

# ============================================================================
# BEHAVIORAL MAPPING
# ============================================================================
behavioral_mapping:
  source: "original paper analysis"
  dimensions:
    - domain: distributional_preferences
      stages:
        - evaluation
        - action
      primary_dimension: S
      psi_dominant: social_comparison
      gamma: 0.35
      A_level: 0.7
      W_level: 0.6
      awareness_type: explicit
      key_insight: |
        Distributional preferences operate through comparison with others' outcomes.
        Inequality aversion (Fehr-Schmidt), altruism, and spite are the main types.
        Student samples overestimate selfishness; representative samples show more
        inequality aversion. The gamma=0.35 reflects complementarity between
        identity (self-concept) and social context (PAR-COMP-001).

    - domain: reciprocity_and_fairness
      stages:
        - evaluation
        - action
        - maintenance
      primary_dimension: C
      psi_dominant: belief_dependent
      gamma: 0.0
      A_level: 0.6
      W_level: 0.7
      awareness_type: biased
      key_insight: |
        Reciprocity is belief-dependent: workers respond to perceived kindness/unkindness
        of employers. Wage cuts interpreted as unkind trigger strong negative reciprocity
        (-34% effort). This is asymmetric: wage increases generate smaller positive
        reciprocity (loss aversion in fairness domain). Critical for employment
        contracts and labor market outcomes.

    - domain: moral_wiggle_room
      stages:
        - pre_contemplation
        - evaluation
      primary_dimension: C
      psi_dominant: self_image
      gamma: 0.0
      A_level: 0.3
      W_level: 0.4
      awareness_type: absent
      key_insight: |
        People strategically avoid information that would trigger costly prosocial
        behavior (Dana et al. 2007). This "moral wiggle room" means that awareness
        (CORE-AWARE) is endogenous — people choose what to know. Interventions
        that make consequences visible reduce avoidance behavior.

