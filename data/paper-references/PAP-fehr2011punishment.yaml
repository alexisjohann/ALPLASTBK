summary:
  abstract_extended: 'This paper examines the evolutionary origins of costly punishment. We discuss

    how altruistic punishment could have evolved despite its costs, and review

    evidence from evolutionary biology, anthropology, and experimental economics.

    Costly punishment is a uniquely human capacity.'
  key_findings: "1. EVOLUTIONARY PUZZLE\n   - Punishment is costly\n   - No direct benefit\n   - How did it evolve?\n\n2.\
    \ PROPOSED MECHANISMS\n   - Cultural group selection\n   - Gene-culture coevolution\n   - Indirect benefits\n\n3. EVIDENCE\n\
    \   - Cross-cultural universality\n   - Developmental emergence\n   - Neural substrates"
  ebf_relevance: '10C DIMENSIONS:

    - WHO (AAA): Evolved human capacity

    - WHAT (C): Punishment preferences

    - HOW (B): Evolutionary mechanisms


    THEORY SUPPORT:

    - MS-SR-001: Strong Reciprocity (evolutionary)

    - Evolutionary psychology

    - Published in Evolution & Human Behavior


    KEY INSIGHT:

    Costly punishment evolved through cultural group selection and gene-culture

    coevolution; it enables uniquely human large-scale cooperation.'
