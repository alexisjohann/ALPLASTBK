abstract: The primary objective of this paper is to provide information about minorities (blacks, Hispanics and Native Americans)in
  economics, at various stages in the education pipeline, and in the labor market. Despite sustained increases in the numbers
  and percentages of minorities earning bachelors degrees and Ph.D.s, the absolute numbers remain very small--only about 36
  new Ph.D.s per year, including permanent residents. Minority economists are relatively underrepresented on four-year college
  faculties and in government employment. The paper also discusses activities by the AEA's committee on minority groups, aimed
  at increasing minority representation in the profession.
