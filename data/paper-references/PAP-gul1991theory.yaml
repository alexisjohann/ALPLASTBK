abstract: We analyze a two period model of temptation for a finite choice setting. We formalize the idea that temptation depends
  only on the most tempting alternatives and provide two representations of such preferences. The representation is an ordinal
  analogue of the self-control preferences in Gul and Pesendorfer (2001).
