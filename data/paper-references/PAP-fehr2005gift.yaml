summary:
  abstract_extended: 'This paper examines wage rigidities and their impact on job creation. We

    analyze how adjustment costs and fairness concerns contribute to wage

    stickiness and affect employment dynamics.'
  key_findings: "1. WAGE RIGIDITY SOURCES\n   - Fairness norms create downward rigidity\n   - Adjustment costs compound stickiness\n\
    \   - Worker reference points matter\n\n2. JOB CREATION DYNAMICS\n   - Rigid wages affect hiring decisions\n   - Labor\
    \ market clearing impaired\n   - Unemployment persistence\n\n3. POLICY IMPLICATIONS\n   - Labor market institutions matter\n\
    \   - Flexibility vs. fairness trade-off\n   - Adjustment cost reduction"
  ebf_relevance: '10C DIMENSIONS:

    - WHAT (C): Wage fairness preferences

    - WHEN (V): Labor market context

    - HOW (B): Rigidity-employment feedback


    THEORY SUPPORT:

    - MS-SP-001: Social Preferences

    - Efficiency wage theory

    - International Economic Review


    KEY INSIGHT:

    Wage rigidities arise from fairness concerns and adjustment costs; this

    impairs job creation and explains unemployment persistence.'
