abstract: This paper begins with a review of empirical evidence on multinational firms. Conceptual underpinnings of a theory
  are developed, relying in particular on the notion of knowledge capital as a mobile, joint input into geographically separated
  production facilities. This idea is embedded in a simple two-country general equilibrium model that supports multinational
  production in equilibrium under conditions consistent with the empirical evidence. The final section examines internalization
  and shows why certain properties of knowledge capital also imply a preference for transferring technologies internally within
  the firm, rather than through arm's-length markets.
