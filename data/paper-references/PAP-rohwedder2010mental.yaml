abstract: Early retirement appears to have a significant negative impact on the cognitive ability of people in their early
  60s that is both quantitatively important and causal. We obtain this finding using cross-nationally comparable survey data
  from the United States, England, and Europe that allow us to relate cognition and labor force status. We argue that the
  effect is causal by making use of a substantial body of research showing that variation in pension, tax, and disability
  policies explain most variation across countries in average retirement rates. (In an informal manner, we are arguing that
  public policies that affect the age of retirement may be used as instrumental variables to generate cross-country variation
  in retirement behavior in order to identify the causal effect of retirement on cognition.)
