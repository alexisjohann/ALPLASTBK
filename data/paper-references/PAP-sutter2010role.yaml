abstract: 'Abstract: Team success relies on assigning team members to the right tasks. We use controlled experiments to study
  how roles are assigned within teams and how this affects team performance. Subjects play the takeover game in pairs consisting
  of a buyer and a seller. Understanding optimal play is very demanding for buyers and trivial for sellers. Teams perform
  better when roles are assigned endogenously or teammates are allowed to chat about their decisions, but the interaction
  effect between endogenous role assignment and chat unexpectedly worsens team performance. We argue that ego depletion provides
  a likely explanation for this surprising result.'
