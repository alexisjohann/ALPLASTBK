abstract: This foundational paper in information economics introduces the distinction between search goods, whose quality
  can be assessed before purchase, and experience goods, whose quality can only be assessed after purchase or use. Nelson
  shows that how consumers acquire information about product quality has significant consequences for market behavior and
  advertising patterns.
