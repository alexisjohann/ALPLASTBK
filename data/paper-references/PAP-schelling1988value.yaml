abstract: Lassie died one night. Millions of viewers, not all of them children, grieved. At least, they shed tears. Except
  for the youngest, the mourners knew that Lassie did not really exist. Whatever that means. Perhaps with their left hemisphere
  they could articulate that they had been watching a trained dog and that that dog was still alive, healthy, and rich; mean
  while in their right hemispheres, or some such place (if these phenomena have a place), the real Lassie had died.
