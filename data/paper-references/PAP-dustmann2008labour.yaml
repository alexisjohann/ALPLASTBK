abstract: 'In the first part of this paper, we present a stylized model of the labour market impact of immigration. We then
  discuss mechanisms through which an economy can adjust to immigration: changes in factor prices, output mix, and production
  technology. In the second part, we explain the problems of empirically estimating how immigration affects labour market
  outcomes of the resident population and review some strategies to address these. We then summarize some recent empirical
  studies for the UK and other countries. We conclude with an outlook on what we believe are important avenues for future
  research.'
