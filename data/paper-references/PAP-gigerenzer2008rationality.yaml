title: 'Rationality for Mortals: How People Cope with Uncertainty'
author: Gigerenzer
year: '2008'
doi: 10.1093/acprof:oso/9780195321470.001.0001
abstract: 'This collection of essays examines human rationality not from logic or probability theory, but from adaptation
  to the real world. The book deals with two complementary modes of thinking: heuristic and statistical. Bounded rationality
  by heuristic thinking is key to understanding how real people make decisions when time and information are limited. Statistical
  thinking describes limits of human inference under uncertainty. Chapters cover fast and frugal heuristics, rules of thumb
  in animals and humans, cognitive errors, risk communication in healthcare, evolution of statistical thinking, mindless statistics,
  and how children can solve Bayesian problems. Seen from an adaptive perspective, human behavior is more rational than it
  otherwise appears.'
