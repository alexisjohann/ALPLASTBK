abstract: Diversity in the conceptualization and measurement of organizational commitment
  has made it difficult to interpret the results of an accumulating body of research.
  In this article, we go beyond the existing distinction between attitudinal and behavioral
  commitment and argue that commitment, as a psychological state, has at least three
  separable components reflecting (a) a desire (affective commitment),(b) a need (continuance
  commitment), and (c) an obligation (normative commitment) to maintain employment
  in an organization. Each …
