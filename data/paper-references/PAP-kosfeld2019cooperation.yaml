abstract: |
  I discuss recent findings from behavioral economic experiments in the lab and in
  the field on the role of leaders in human cooperation. Three implications for
  leadership are derived, which are summarized under the notion CC strategy.
  Firstly, leaders need to trust to not demotivate the motivated. Secondly, leaders
  need to punish to motivate the non-motivated. Finally, leaders shall (and can)
  attract motivated types. The discussion is embedded in a more general attempt to
  promote and stimulate interdisciplinary exchange of both methods and ideas in
  leadership research.

key_findings_structured:
  S1_research_question: "What role do leaders play in inducing and maintaining cooperation in groups and organizations? What strategies are effective?"
  S2_methodology: "Review and synthesis of behavioral economic experiments (lab and field). Develops the CC (Cooperation-Compliance) Strategy framework from accumulated evidence."
  S3_sample_data: "Review paper drawing on multiple experimental studies including commons management in Ethiopia, trust games, public goods experiments."
  S4_findings:
    - finding: "CC Strategy Principle 1: Leaders need to trust (don't demotivate the motivated)"
      source_section: "Section 2"
      formal_result: "Control aversion evidence shows that monitoring/restrictions can crowd out intrinsic cooperative motivation"
    - finding: "CC Strategy Principle 2: Leaders need to punish (motivate the non-motivated)"
      source_section: "Section 3"
      formal_result: "Third-party punishment sustains cooperation; leader punishment types predict group outcomes"
    - finding: "CC Strategy Principle 3: Leaders can attract cooperative types"
      source_section: "Section 4"
      formal_result: "Sorting mechanisms and mission-driven leadership can attract prosocial individuals to organizations"
    - finding: "Behavioral heterogeneity is key: cooperation depends on individual preferences, not just situations"
      source_section: "Introduction"
      formal_result: "Self-interested and cooperative types coexist; leadership strategies must account for both"
  S5_validity: "Synthesis paper grounded in rigorous experimental evidence. Draws on AER, Nature, and other top-journal publications."
  S6_reproducibility: "Individual experimental studies referenced with full citations. Framework is well-defined and testable."

