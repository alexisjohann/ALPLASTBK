abstract: Sample selection bias as a specification error This paper discusses the bias that results from using non-randomly
  selected samples to estimate behavioral relationships as an ordinary specification error or «omitted variables» bias. A
  simple consistent two stage estimator is considered that enables analysts to utilize simple regression methods to estimate
  behavioral functions by least squares methods. The asymptotic distribution of the estimator is derived.
