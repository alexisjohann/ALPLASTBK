abstract: This article reports on a series of experimental games designed to study some of the hypotheses of neoclassical
  competitive market theory. Laboratory markets with repeated centralized trading generate price sequences that converge to
  competitive equilibrium predictions. Vernon Smith demonstrated that experimental economics could be used as a rigorous methodology
  to test economic theories, establishing the foundation for experimental economics as a field.
