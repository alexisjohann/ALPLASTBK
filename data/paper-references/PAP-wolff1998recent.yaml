abstract: Based on the Survey of Consumer Finances, the distribution of wealth in the United States became much more unequal
  in the 1980s and that trend continued, albeit at a slower pace, in the 1990s. The only households that saw their mean net
  worth rise in absolute terms between 1983 and 1995 were those in the top 20 percent and the gains were particularly strong
  for the top one percent. All other groups were particularly strong for the top one percent. All other groups suffered real
  wealth losses, including the median household, and declines were particularly precipitous at the bottom. Racial disparities
  widened, and young households also lost out over this period.
