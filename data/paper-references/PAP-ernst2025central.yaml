abstract: 'In this paper we propose a new set of indicators of central bank''s communication to estimate speech intensity
  in five different fields: monetary conditions, financial stability, external competitiveness, labour and social conditions
  and economic activity. We develop an automated text-mining routine using the Bank of International Settlements (BIS) collection
  of speeches given by central bank senior executives. We use this set of indicators to compare goals and strategies across
  several central banks (the Federal Reserve, the European …'
