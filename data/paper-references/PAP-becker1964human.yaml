abstract: Human Capital is a classic study of how investment in an individual's education and training is similar to business
  investments in equipment. The work finds that investment in human capital in the form of education has paid a substantial
  rate of return through higher income to the individuals directly involved, and probably has also been a major factor in
  raising the productivity of the American people. Part One discusses specific kinds of human capital, such as education and
  on-the-job training, with emphasis on their effects on earnings, employment, and other economic variables. Part Two investigates
  empirically the effect of formal education on earnings and productivity, including estimates of private and social rates
  of return on investment in college and high-school education. The analysis produces a new and illuminating general theory
  with applications ranging from the personal distribution of earnings to unemployment differentials.
