abstract: >
  Joint federal guidelines establishing legal requirements for employee
  selection procedures. Mandated that all selection methods demonstrate
  content validity, criterion validity, or construct validity. Required
  job analysis as basis for selection. Effectively made KSA (later KSAO)
  the legal standard for personnel decisions in US federal employment
  and beyond.
