abstract: There are two themes in this paper. First, we argue that the conventional wisdom of an absence of any substantial
  labor market progress for women is mistaken. Instead, throughout this century, women's wages have been steadily rising relative
  to those of men, a progress likely to accelerate in the next few decades. Second, we contend that this labor market progress
  is not enough. Alongside their labor market advances, the relative economic plight of many women is worsening. The downside
  news is the increasing feminization of poverty, a reflection of the growing instability of the American family.
