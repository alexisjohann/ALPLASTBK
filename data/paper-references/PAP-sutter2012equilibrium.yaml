abstract: "We study behavior and equilibrium selection in experimental network games. We varytwo important factors: (a) actions\
  \ are either strategic substitutes or strategic complements, and(b) subjects have either complete or incomplete information\
  \ about the structure of a randomnetwork. Play conforms strongly to the theoretical predictions, providing an impressivebehavioral\
  \ confirmation of the Galeotti, Goyal, Jackson, Vega-Redondo, and Yariv (2010)model. The degree of equilibrium play is striking,\
  \ even with incomplete information. We findthat under complete information, subjects typically play the stochastically-stable\
  \ (inefficient)equilibrium when the game involves strategic substitutes, but play the efficient one with strategiccomplements.\
  \ Our results suggest that equilibrium multiplicity may not be a major concern.Subjectsâ\x80\x99 actions and realized outcomes\
  \ under incomplete information depend strongly on boththe degree and the connectivity. When there are multiple equilibria,\
  \ subjects begin by playing theefficient equilibrium, but eventually converge to the inefficient one."
