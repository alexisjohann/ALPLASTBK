abstract: Trygve Haavelmo was in the United States from 1939 to 1947, and in this period he published most of his path-breaking
  contributions to econometrics for which the Nobel committee awarded him the prize. His list of publications after 1947 contains
  more than 100 items. We review his contributions to econometrics only briefly in order to cover his other research, which
  has focused on the relationship between population, natural resources, and growth; investment and capital theory; the notion
  of equilibrium and disequilibrium; the nature and stability of preferences; and the nature and problems of democracy.
