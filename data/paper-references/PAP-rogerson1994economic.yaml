abstract: This paper describes some of the insights that the economic theory of incentives can contribute to defense procurement
  policy analysis. It describes the underlying incentive problems that shape the defense procurement problem, the nature of
  current institutions and how they affect actors’ behavior, and possible directions for improving the procurement process
  suggested by viewing it as a solution to a complex set of incentive problems. Incentive problems between government and
  defense firms and incentive problems within government are both considered.
