abstract: 'The World Bank was founded to address what we would today call imperfections in international capital markets.
  Its founders thought that countries would borrow from the Bank temporarily until they grew enough to borrow commercially.
  Some critiques and analyses of the Bank are based on the assumption that this continues to be its role. For example, some
  argue that the growth of private capital flows to the developing world has rendered the Bank irrelevant. However, we will
  argue that modern analyses should proceed from the premise that the World Bank’s central goal is and should be to reduce
  extreme poverty, and that addressing failures in global capital markets is now of subsidiary importance. In this paper,
  we discuss what the Bank does: how it spends money, how it influences policy, and how it presents its mission. We argue
  that the role of the Bank is now best understood as facilitating international agreements to reduce poverty, and we examine
  implications of this perspective.'
