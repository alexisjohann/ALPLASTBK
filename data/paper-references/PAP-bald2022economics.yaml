abstract: 'Foster care provides substitute living arrangements to protect maltreated children. The practice is remarkably
  common: it is estimated that 5 percent of children in the United States are placed in foster care at some point during childhood.
  This paper describes the main tradeoffs in child welfare policy and provides background on policy and practice most in need
  of rigorous evidence. Trends include efforts to prevent foster care on the demand side and to improve foster home recruitment
  on the supply side. With increasing data availability and a growing interest in evidence-based practices, there are opportunities
  for economic research to inform policies that protect vulnerable children.'
