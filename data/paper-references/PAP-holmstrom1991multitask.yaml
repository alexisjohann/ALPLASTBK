abstract: 'This paper extends the standard principal-agent model to the case where the agent
  allocates effort among multiple tasks. The results show that when tasks differ in their
  degree of measurability, performance incentives on the measurable tasks induce the agent
  to allocate too much effort to those tasks and too little to the less measurable ones.
  In some cases, providing no performance incentives at all (a fixed wage) is optimal.
  The analysis has implications for incentive contracts, asset ownership, and job design.'
