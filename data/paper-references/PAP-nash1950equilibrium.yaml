abstract: One may define a concept of an n -person game in which each player has a finite set of pure strategies and in which
  a definite set of payments to the n players corresponds to each n -tuple of pure strategies, one strategy being taken for
  each player. For mixed strategies, which are probability distributions over the pure strategies, the pay-off functions are
  the expectations of the players, thus becoming polylinear forms …
