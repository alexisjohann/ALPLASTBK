abstract: Students in some countries do far better on international achievement tests than students in other countries. Is
  this all due to differences in what students bring with them to school—socioeconomic background, cultural factors, and the
  like? Or do school systems make a difference? This essay argues that differences in features of countries' school systems,
  and in particular their institutional structures, account for a substantial part of the cross-country variation in student
  achievement. It first documents the size and cross-test consistency of international differences in student achievement.
  Next, it uses the framework of an education production function to provide descriptive analysis of the extent to which different
  factors of the school system, as well as factors beyond the school system, account for cross-country achievement differences.
  Finally, it covers research that goes beyond descriptive associations by addressing leading concerns of bias in cross-country
  analysis. The available evidence suggests that differences in expenditures and class size play a limited role in explaining
  cross-country achievement differences, but that differences in teacher quality and instruction time do matter. This suggests
  that what matters is not so much the amount of inputs that school systems are endowed with, but rather how they use them.
  Correspondingly, international differences in institutional structures of school systems such as external exams, school
  autonomy, private competition, and tracking have been found to be important sources of international differences in student
  achievement.
