abstract: Fair Trade is a labeling initiative aimed at improving the lives of the poor in developing countries by offering
  better terms to producers and helping them to organize. Although Fair Trade–certified products still comprise a small share
  of the market—for example, Fair Trade–certified coffee exports were 1.8 percent of global coffee exports in 2009— growth
  has been very rapid over the past decade. Whether Fair Trade can achieve its intended goals has been hotly debated in academic
  and policy circles. In particular, debates have been waged about whether Fair Trade makes “economic sense” and is sustainable
  in the long run. The aim of this article is to provide a critical overview of the economic theory behind Fair Trade, describing
  the potential benefits and potential pitfalls. We also provide an assessment of the empirical evidence of the impacts of
  Fair Trade to date. Because coffee is the largest single product in the Fair Trade market, our discussion here focuses on
  the specifics of this industry, although we will also point out some important differences with other commodities as they
  arise.
