abstract: >
  Organizations traditionally structured around jobs face challenges in a rapidly changing business
  environment. This report, based on a global survey of 1,021 workers and 225 business and HR executives
  in 10 countries, explores the shift toward skills-based organizations (SBOs) — where skills rather than
  jobs are used as the basis for decision making about work and the workforce. Key findings: SBOs are
  63% more likely to achieve results and 79% more likely to provide a positive workforce experience.
  However, fewer than 1 in 5 organizations are adopting skills-based approaches to a significant extent.
  The report documents adoption rates across 8 HR practices (hiring 28%, development 24%, rewards 21%,
  workforce planning 15%), primary drivers (talent shortages 70%, worker demands 68%, AI/automation 61%),
  and obstacles (legacy mindsets 46%, changing skills 32%, compensation restrictions 32%). Case studies
  from Unilever (700,000 hours unlocked, 41% productivity gain), Mastercard ($21M savings), TATA Steel
  (165,000 hours), Haier (75,000 employees fully fractionalized), and others illustrate implementation.
  The study defines SBOs through four principles: liberate work from job confines, develop a workforce of
  one, use skills for decisions, and build a skills hub.
