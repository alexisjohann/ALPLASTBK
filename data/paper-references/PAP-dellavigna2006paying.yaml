abstract: How do consumers choose from a menu of contracts? The authors analyze a novel dataset from three U.S. health clubs
  with information on both the contractual choice and the day-to-day attendance decisions of 7,752 members over three years.
  Members who choose a contract with a flat monthly fee of over $70 attend on average 4.3 times per month. They pay a price
  per expected visit of more than $17, even though they could pay $10 per visit using a 10-visit pass. On average, these users
  forgo savings of $600 during their membership. Consumers who choose a monthly contract are 17 percent more likely to stay
  enrolled beyond one year than users committing for a year.
