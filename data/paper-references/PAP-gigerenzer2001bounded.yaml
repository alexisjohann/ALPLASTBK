abstract: In a complex and uncertain world, humans and animals make decisions under the constraints of limited knowledge,
  resources, and time. Yet models of rational decision making in economics, cognitive science, biology, and other fields largely
  ignore these real constraints and instead assume agents with perfect information and unlimited time. About forty years ago,
  Herbert Simon challenged this view with his notion of 'bounded rationality.' This book promotes bounded rationality as the
  key to understanding how real people make decisions. Using the concept of an 'adaptive toolbox,' a repertoire of fast and
  frugal rules for decision making under uncertainty, it attempts to impose more order and coherence on the idea of bounded
  rationality. The strategies in the adaptive toolbox dispense with optimization and, for the most part, with calculations
  of probabilities and utilities. The book extends the concept of bounded rationality from cognitive tools to emotions; it
  analyzes social norms, imitation, and other cultural tools as rational strategies; and it shows how smart heuristics can
  exploit the structure of environments.
