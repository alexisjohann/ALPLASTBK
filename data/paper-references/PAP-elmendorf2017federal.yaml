abstract: 'Some observers have argued that the projections for high and rising debt pose a grave threat to the country''s
  economic future and give the government has less fiscal space to respond to recessions or other unexpected developments,
  so they urge significant changes in tax or spending policies to reduce federal borrowing. In stark contrast, others have
  noted that interest rates on long-term federal debt are extremely low and have argued that such persistently low interest
  rates justify additional federal borrowing and investment, at least for the short and medium term. We analyze this controversy
  focusing on two main issues: the aging of the US population and interest rates on US government debt. It is generally understood
  that these factors play an important role in the projected path of the US debt-to-GDP ratio. What is less recognized is
  that these changes also have implications for the appropriate level of US debt. We argue that many—though not all— of the
  factors that may be contributing to the historically low level of interest rates imply that both federal debt and federal
  investment should be substantially larger than they would be otherwise. In conclusion, although significant policy changes
  to reduce federal budget deficits ultimately will be needed, they do not have to be implemented right away. Instead, the
  focus of federal budget policy over the coming decade should be to increase federal investment while enacting changes in
  federal spending and taxes that will reduce deficits gradually over time.'
