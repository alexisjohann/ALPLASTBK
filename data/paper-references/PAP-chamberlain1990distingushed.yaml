abstract: 'In 1988, Arthur Goldberger was honored as a Distinguished Fellow of the American Economic Association. The citation
  notes that “his early applications and analysis of empirical models brought understanding to a whole generation of econometricians.”
  Goldberger''s later work on models with measurement error and latent variables led him into other fields, where he has had
  a profound influence: “His methodological and substantive findings, also in the area of behavioral genetics, stand as everlasting
  contributions of one who has successfully bridged the many gaps that separate the social disciplines.” This paper reviews
  one major element of Goldberger''s work—the role of latent variables in econometrics.'
