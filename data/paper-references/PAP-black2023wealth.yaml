abstract: In this paper, we use comprehensive administrative data on the population of Norway to create a measure of lifetime
  resources, which generates several stylized facts. First, lifetime resources are highly correlated with net wealth, but
  net wealth is more unequally distributed. Second, labor income is the most important component of lifetime resources, except
  among the top 1 percent where capital income and capital gains on financial assets become important. Lastly, lifetime resources
  are a better predictor of child human capital outcomes than net wealth, suggesting that, in some cases, inequality in lifetime
  resources may be more relevant than inequality in wealth.
