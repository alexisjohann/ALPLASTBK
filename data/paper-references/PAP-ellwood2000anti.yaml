abstract: This paper reveals that recent changes in social policy have included both sharp cutbacks in welfare for non-working
  families and dramatic increases in supports for low income working families. It explores the reasons for these changes,
  and documents how they have radically changed work incentives for some persons, notable single mothers. The result has been
  a large increase in work by low wage single parents. The paper concludes by examining several potential dangers of this
  new direction and explores the challenges that remain for the next century.
