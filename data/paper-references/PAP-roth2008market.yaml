abstract: This essay discusses some things we have learned about markets, in the process
  &#13;\nof designing marketplaces to fix market failures. To work well, marketplaces
  have to &#13;\nprovide thickness, i.e. they need to attract a large enough proportion
  of the potential &#13;\nparticipants in the market; they have to overcome the congestion
  that thickness can bring, by making it possible to consider enough alternative transactions
  to arrive at good ones; and they need to make it safe and sufficiently simple to
  participate in the market, as opposed to transacting outside of the market, or having
  to engage in costly and risky strategic behavior. I'll draw on recent examples of
  market design ranging from labor markets for doctors and new economists, to kidney
  exchange, and school choice in New York City and Boston.
