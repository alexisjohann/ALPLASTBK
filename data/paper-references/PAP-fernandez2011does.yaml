title: Does Culture Matter?
author: Fernandez
year: '2011'
publication_type: journal_article
doi: null
doi_missing_reason: handbook_chapter
abstract: This chapter in the Handbook of Social Economics reviews the literature on culture and economics, focusing primarily
  on the epidemiological approach. The epidemiological approach studies the variation in outcomes across different immigrant
  groups residing in the same country, allowing separation of cultural effects from the original economic and institutional
  environment. Immigrants presumably differ in their cultures but share a common institutional and economic setting. This
  approach has been used to study female labor force participation, fertility, labor market regulation, redistribution, growth,
  and financial development among others. The chapter also reviews some experimental and historical evidence on culture's
  economic effects.
