abstract: 'We exploit a randomized natural experiment—Loss in penalty shootouts in soccer—to
  study psychological pressure in competitive environments. Analyzing 129 shootouts, we
  find a 21-percentage-point advantage for first movers over second movers. The results
  suggest that lagging behind in a sequential competition creates psychological pressure
  that deteriorates performance. This finding was later challenged by Kocher et al. (2012)
  with a larger sample (N=540) finding no significant effect.'
