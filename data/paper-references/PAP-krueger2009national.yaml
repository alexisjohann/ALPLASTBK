summary:
  abstract_extended: 'This foundational methodological chapter introduces National Time Accounting (NTA) as a systematic framework
    for measuring population well-being through time use and affective experience. The authors develop the U-index—the proportion
    of time spent in an unpleasant state—as an ordinal, interpersonally comparable measure of experienced well-being. Using
    the Day Reconstruction Method (DRM) and the Princeton Affect and Time Survey (PATS, N=3,982), they document systematic
    patterns in how activities feel: work (U=24.8%) and commuting (U=27.1%) are most unpleasant, while intimate relations
    (U=4.7%) and socializing (U=9.0%) are most pleasant. The chapter validates DRM against Experience Sampling Method (ESM)
    with r>0.90 correlation, and shows life satisfaction correlates only moderately with net affect (r=0.35-0.44), supporting
    the distinction between experienced and evaluative well-being. International comparison shows US U-index (18.8%) exceeds
    France (16.0%), driven by time allocation (Americans do more unpleasant activities) not within-activity experience differences.
    Historical analysis shows women''s U-index declined from 21.7% (1965) to 18.8% (2005) as housework decreased.'
  key_findings: "1. U-INDEX DEFINITION: Proportion of time when most intense feeling\n   is negative (ordinal, interpersonally\
    \ comparable)\n\n2. ACTIVITY U-INDEX RANKINGS:\n   - Intimate relations: 4.7% (lowest/best)\n   - Socializing: 9.0%\n\
    \   - Work: 24.8%\n   - Commuting: 27.1% (highest/worst)\n\n3. VALIDATION: DRM correlates r>0.90 with ESM (gold standard)\n\
    \n4. TWO WELL-BEING CONSTRUCTS:\n   - Life satisfaction vs net affect: r = 0.35-0.44\n   - Distinct constructs requiring\
    \ separate measurement\n\n5. INTERNATIONAL COMPARISON:\n   - US U-index: 18.8%, France: 16.0%\n   - 90% of difference\
    \ due to time allocation, not experience\n\n6. HISTORICAL TRENDS (1965-2005):\n   - Women's U-index: 21.7% → 18.8% (improvement)\n\
    \   - Driven by less housework, more leisure\n\n7. SAMPLE SIZES: PATS N=3,982, Texas DRM N=909"
