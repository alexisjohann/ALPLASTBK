abstract: 'This chapter introduces National Time Accounting (NTA)—a systematic approach to measuring how people spend their
  time and how they experience the activities that fill their days. The U-index (proportion of time in unpleasant state) is
  proposed as the key measure for tracking population well-being. Using the Day Reconstruction Method (DRM) and Princeton
  Affect and Time Survey (PATS, N=3,982), extensive evidence is provided on time use and emotional experience across activities,
  demographic groups, and nations. Key findings: Work U-index=24.8%, Commuting=27.1%, Socializing=9.0%, Intimate relations=4.7%.
  Life satisfaction-net affect correlation r=0.35-0.44. US vs France U-index: 18.8% vs 16.0%. Women''s U-index declined 1965-2005
  (21.7%→18.8%).'
