abstract: Between 1974 and 1981, the RAND health insurance experiment provided health insurance to more than 5,800 individuals
  from about 2,000 households in six different locations across the United States, a sample designed to be representative
  of families with adults under the age of 62. More than three decades later, the RAND results are still widely held to be
  the “gold standard” of evidence for predicting the likely impact of health insurance reforms on medical spending, as well
  as for designing actual insurance policies. On cost grounds alone, we are unlikely to see something like the RAND experiment
  again. In this essay, we reexamine the core findings of the RAND health insurance experiment in light of the subsequent
  three decades of work on the analysis of randomized experiments and the economics of moral hazard. First, we re-present
  the main findings of the RAND experiment in a manner more similar to the way they would be presented today. Second, we reexamine
  the validity of the experimental treatment effects. Finally, we reconsider the famous RAND estimate that the elasticity
  of medical spending with respect to its out-of pocket price is – 0.2. We draw a contrast between how this elasticity was
  originally estimated and how it has been subsequently applied, and more generally we caution against trying to summarize
  the experimental treatment effects from nonlinear health insurance contracts using a single price elasticity.
