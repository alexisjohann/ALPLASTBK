summary:
  abstract_extended: "This paradigm-shifting book introduces LIBERTARIAN PATERNALISM and CHOICE\nARCHITECTURE as practical\
    \ frameworks for improving decision-making while\npreserving freedom of choice.\n\nCORE CONCEPTS:\n\n1. NUDGE: \"Any aspect\
    \ of the choice architecture that alters people's\n   behavior in a predictable way without forbidding any options or\n\
    \   significantly changing their economic incentives.\"\n\n2. LIBERTARIAN PATERNALISM: It is both possible and legitimate\
    \ for private\n   and public institutions to steer people's choices while respecting\n   freedom of choice.\n\n3. CHOICE\
    \ ARCHITECTURE: The design of different ways in which choices can\n   be presented to decision makers. Elements include:\n\
    \   - Defaults (most powerful tool)\n   - Feedback\n   - Mapping (translating choices to outcomes)\n   - Structure of\
    \ complex choices\n   - Error expectation\n\nKEY APPLICATIONS:\n- SAVE MORE TOMORROW: Automatic enrollment + escalation\
    \ in retirement savings\n- Organ donation: Opt-out vs. opt-in systems\n- Cafeteria design: Food placement affects healthy\
    \ eating\n- Energy conservation: Social comparison feedback\n- Medicare Part D: Simplifying prescription drug choices\n\
    \nTHE PHILOSOPHY: \"A choice architect has the responsibility for organizing\nthe context in which people make decisions.\""
