abstract: A nudge is any form of choice architecture that alters peoples behavior in a predictable way without restricting
  options or significantly changing their economic incentives. To count as a mere nudge, the intervention must require minimal
  intervention and must be cheap. The oxymoronic term libertarian paternalism captures much of the thinking behind Nudge.
  Its recommendations are paternalistic in that they try to steer people in the right direction. But it is libertarian in
  that people are free to resist nudges if they choose to do so.
