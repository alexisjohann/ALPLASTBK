abstract: Evidence from the Nixon tapes, now available to researchers, shows that President Richard Nixon pressured the chairman
  of the Federal Reserve, Arthur Burns, to engage in expansionary monetary policies in the run-up to the 1972 election. This
  paper quotes the relevant conversations from the Nixon tapes. Questions remain as to whether Burns followed an expansionary
  policy in an already-inflationary environment out of conviction or because of political pressure.
