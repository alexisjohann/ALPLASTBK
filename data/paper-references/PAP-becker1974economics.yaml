abstract: 'Before the theory of consumer demand began to be formalized by Jevons, Walras, Marshall, Menger, and others, economists
  frequently discussed what they considered to be the basic determinants of wants. For example, Bentham (1789, chap. 5) discusses
  about 15 basic kinds of pleasures and pains-all other pleasures and pains are presumed to be combinations of the basic set-and
  Marshall (1962, bk. 3, chap. 2) briefly discusses a few basic determinants of wants before moving on to his well-known presentation
  of marginal utility theory. What is relevant and important for present purposes is the prominence given to the interactions
  among individuals.

  Bentham mentions" the pleasures... of being on good terms with him or them,"" the pleasures of a good name,"" the pleasures
  resulting from the view of any pleasures supposed to be possessed by the beings who may be the objects of benevolence,"
  and" the pleasures resulting from the view of any pain supposed to be suffered by the beings who may become the objects
  of malevolence." Nassau Senior said that" the desire for dis-tinction... is a feeling which if we consider its universality,
  and its constancy, that it affects all men and at all times, that it comes with us from the cradle and never leaves us till
  we go into the grave, may be pronounced to be the most powerful of all human passions"(quoted by Marshall 1962, p. 87.)
  Marshall also stresses the desire for distinction and illustrates its influence by discussing food, clothing, housing, and
  productive activities. 1'
