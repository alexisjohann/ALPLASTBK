key_findings_structured:
- domain: labor_policy
  finding: Flexicurity alone does not guarantee low unemployment — same institutions
    existed during high unemployment in 1970s-1980s; critical change was 1990s reforms
    introducing workfare as third pillar
  primary_dimension: I
  stage: maintenance
- domain: behavioral_labor
  finding: 'Workfare operates through three mechanisms: threat/motivation effect (unemployed
    search harder to avoid activation), locking-in effect (negative during activation),
    and wage moderation effect (outside option less attractive)'
  primary_dimension: F
  stage: action
- domain: institutional_complementarity
  finding: Policy complementarities are critical — same flexibility and security elements
    performed poorly without active labor market policies, demonstrating context-dependence
    of institutional effects
  primary_dimension: S
  stage: maintenance
- domain: policy_evaluation
  finding: Cost-effectiveness questionable — costs exceed benefits by ~6,800 EUR per
    year per activated person, except private job training which has positive cost-benefit
    ratio
  primary_dimension: F
  stage: evaluation
