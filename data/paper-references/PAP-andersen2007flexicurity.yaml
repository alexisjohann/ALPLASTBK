summary:
  abstract: >
    Unemployment is at a low and stable level in Denmark. This achievement is
    often attributed to the so-called flexicurity model combining flexible hiring
    and firing rules for employers with income security for employees. Whatever
    virtues this model may have, a low and stable unemployment rate is not
    automatically among them since the basic flexicurity properties were also
    in place during the 1970s and 1980s where high and persistent unemployment
    was prevalent. The 1990s reforms shifting from passive to active labor market
    policies were critical.

key_findings_structured:
  - finding: "Flexicurity alone does not guarantee low unemployment — same institutions existed during high unemployment in 1970s-1980s; critical change was 1990s reforms introducing workfare as third pillar"
    domain: labor_policy
    stage: maintenance
    primary_dimension: I
  - finding: "Workfare operates through three mechanisms: threat/motivation effect (unemployed search harder to avoid activation), locking-in effect (negative during activation), and wage moderation effect (outside option less attractive)"
    domain: behavioral_labor
    stage: action
    primary_dimension: F
  - finding: "Policy complementarities are critical — same flexibility and security elements performed poorly without active labor market policies, demonstrating context-dependence of institutional effects"
    domain: institutional_complementarity
    stage: maintenance
    primary_dimension: S
  - finding: "Cost-effectiveness questionable — costs exceed benefits by ~6,800 EUR per year per activated person, except private job training which has positive cost-benefit ratio"
    domain: policy_evaluation
    stage: evaluation
    primary_dimension: F

