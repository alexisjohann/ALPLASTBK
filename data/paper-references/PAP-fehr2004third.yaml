summary:
  abstract_extended: 'This paper examines third-party punishment - punishment by individuals who

    are not directly affected by norm violations. Using experimental games, we

    show that uninvolved third parties willingly punish norm violators at

    personal cost. Third-party punishment is essential for understanding how

    social norms are enforced in large groups.'
  key_findings: "1. THIRD-PARTY PUNISHMENT\n   - Uninvolved observers punish\n   - Costly to the punisher\n   - Not explained\
    \ by self-interest\n\n2. NORM ENFORCEMENT\n   - Enables large-scale norms\n   - Decentralized monitoring\n   - Multiplier\
    \ effect on deterrence\n\n3. EXPERIMENTAL EVIDENCE\n   - Dictator game with punishment\n   - Third parties punish unfair\
    \ allocations\n   - Punishment proportional to violation\n\n4. EVOLUTIONARY IMPLICATIONS\n   - Extends beyond direct reciprocity\n\
    \   - Cultural group selection\n   - Uniquely human capacity"
  ebf_relevance: '10C DIMENSIONS:

    - WHAT (C): Third-party punishment utility

    - HOW (B): Norm-punishment complementarity

