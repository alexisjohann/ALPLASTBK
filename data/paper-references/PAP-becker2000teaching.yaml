abstract: The desire to reverse a downward trend in the number of undergraduates majoring in economics is an impetus to advance
  the scholarship of teaching economics as we enter the 21st century. This article offers suggestions for changing the concepts
  taught and the applications used in college and university economics courses within the United States. It provides practical
  methods to improve the way economics is taught. The assessment of students and the evaluation of pedagogical practices are
  also addressed.
