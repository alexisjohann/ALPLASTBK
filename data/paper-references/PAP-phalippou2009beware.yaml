abstract: 'As a step towards understanding whether a private equity governance structure reduces overall agency conflicts
  relative to a public equity governance structure (as is often argued), this paper describes the contracts between private
  equity funds and investors, and the returns earned by investors. The paper sets the stage with a puzzle: the average performance
  of private equity funds is above that of the Standard and Poor''s 500—the main public stock market index—before fees are
  charged, but below that benchmark after fees are charged. Why are the payments to private equity buyout funds so large?
  Why does the marginal investor invest in buyout funds? I explore one potential answer (and probably the most controversial):
  that some investors are fooled. I show that the fee contracts for these funds are opaque. Considering this and the way that
  compensation contracts bury, in details, costly provisions that are difficult to justify on the basis of proper incentive
  alignment, it would be premature to assert that the agency conflicts are lower in private equity than in public equity.'
