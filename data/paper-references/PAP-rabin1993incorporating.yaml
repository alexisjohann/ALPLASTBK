abstract: People like to help those who are helping them and hurt those who are hurting them. Outcomes reflecting such motivations
  are called fairness equilibria. The paper shows that every mutual-max or mutual-min Nash equilibrium is a fairness equilibrium.
  If payoffs are small, fairness equilibria are roughly mutual-max and mutual-min outcomes; if payoffs are large, fairness
  equilibria approximate Nash equilibria. A utility function incorporating kindness is developed where players want to be
  kind to kind players and unkind to unkind ones. When material payoffs are small, people care more about rewarding kindness
  than material payoffs.
