abstract: Quantile regression, as introduced by Koenker and Bassett (1978), may be viewed as an extension of classical least
  squares estimation of conditional mean models to the estimation of an ensemble of models for several conditional quantile
  functions. The central special case is the median regression estimator which minimizes a sum of absolute errors. Other conditional
  quantile functions are estimated by minimizing an asymmetrically weighted sum of absolute errors. Quantile regression methods
  are illustrated with applications to models for CEO pay, food expenditure, and infant birthweight.
