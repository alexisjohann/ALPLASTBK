abstract: 'This paper studies the problem of self-enforcing constitutions, addressing the question, how do some constitutions
  provide incentives for political officials to abide by the constraints announced in the constitution? To understand the
  mechanisms underlying successful constitutions, the paper begins by exploring a simple society facing the dilemma of policing
  the government: a sovereign, who controls the government, and two citizens. It then moves to a discussion of how constitutions
  are often formed out of crises, with some more detailed discussion of two main examples: England''s Glorious Revolution
  of 1688 and the U.S. Constitution.'
