abstract: The authors begin by offering an overview of the sources and amounts of campaign contributions in the U.S. In the
  light of these facts, they explore the assumption that the amount of money in U.S. campaigns mainly reflects political investment.
  They then offer their perspective that campaign contributions should be viewed primarily as a type of consumption good,
  rather than as a market for buying political benefits. Although this perspective helps to explain the levels of campaign
  contributions by individuals and organizations, it opens up new research questions of its own.
