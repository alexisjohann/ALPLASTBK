title: 'Materialism and Qualia: The Explanatory Gap'
author: Levine
year: '1983'
publication_type: journal_article
doi: 10.1111/j.1468-0114.1983.tb00207.x
abstract: This seminal paper coins the term 'explanatory gap' to describe the epistemic
  problem with psycho-physical identity statements. Engaging with Kripke's arguments
  against materialism, Levine transforms the metaphysical argument into an epistemological
  one. Rather than claiming mind-brain identity statements are false, Levine argues
  they leave something crucial unexplained - even if we know that pain is C-fiber
  firing, we cannot explain why C-fiber firing feels like pain rather than something
  else or nothing at all. This gap later became known as the 'hard problem' of consciousness.
