abstract: A usual criticism of the theory of infinitely repeated games is that it does not provide sharp predictions since
  there may be a multiplicity of equilibria. To address this issue, we present experimental evidence on the evolution of cooperation
  in infinitely repeated prisoner's dilemma games as subjects gain experience. We show that cooperation may prevail in infinitely
  repeated games, but the conditions under which this occurs are more stringent than the subgame perfect conditions usually
  considered or even a condition based on risk dominance. (JEL C71, C73)
