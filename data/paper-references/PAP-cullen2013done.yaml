abstract: In spite of decades of well-intentioned efforts targeted at struggling high schools, outcomes today are little improved.
  A handful of innovative programs have achieved great success on a small scale, but more generally, the economic futures
  of the students at the bottom of the human capital distribution remain dismal. In our view, expanding access to educational
  options that focus on life skills and work experience, as opposed to a focus on traditional definitions of academic success,
  represents the most cost-effective, broadly implementable source of improvements for this group.
