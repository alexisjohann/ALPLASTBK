abstract: Nobel Prize-winning economist Richard H. Thaler challenges traditional economic paradigms by revealing many paradoxes
  about human behavior. He presents examples of economic anomalies such as why winners at auctions often pay too much and
  suffer the winner's curse, why gamblers bet on long shots at the end of a losing day, and why shoppers will save on one
  appliance only to pass up identical savings on another. The book demonstrates that markets do not always operate with the
  efficiency economists traditionally assume.
