abstract: We characterize the contribution of immigrants to US innovation, both through their direct productivity as well
  as through their indirect spillover effects on their native collaborators. To do so, we link patent records to a database
  containing the first five digits of more than 230 million of Social Security Numbers (SSN). By combining this part of the
  SSN together with year of birth, we identify whether individuals are immigrants based on the age at which their Social Security
  Number is assigned. We find immigrants represent 16 percent of all US inventors, but produced 23 percent of total innovation
  output, as measured by number of patents, patent citations, and the economic value of these patents. Immigrant inventors
  are more likely to rely on foreign technologies, to collaborate with foreign inventors, and to be cited in foreign markets,
  thus contributing to the importation and diffusion of ideas across borders. Using an identification strategy that exploits
  premature inventor deaths, we find that immigrant inventors create especially strong positive externalities on the innovation
  production of their collaborators, while natives have a much weaker impact. A simple decomposition illustrates that immigrants
  are responsible for 36% of aggregate innovation, two-thirds of which is due to their innovation externalities on their native-born
  collaborators.Institutional subscribers to the NBER working paper series, and residents of developing countries may download
  this paper without additional charge at www.nber.org.
