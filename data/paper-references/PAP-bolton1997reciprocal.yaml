summary:
  abstract_extended: 'The authors demonstrate that a simple model, constructed on the premise that

    people are motivated by both their pecuniary payoff and their relative payoff

    standing, organizes a large and seemingly disparate set of laboratory

    observations as one consistent pattern.


    The model is incomplete information but nevertheless posed entirely in terms of

    directly observable variables. The model explains observations from games where

    equity is thought to be a factor, such as ultimatum and dictator, games where

    reciprocity is thought to play a role, such as the prisoner''s dilemma and gift

    exchange, and games where competitive behavior is observed, such as Bertrand

    markets.


    The ERC model posits that, along with pecuniary gain, people are motivated by

    their own relative payoff standing. Beyond this, ERC employs standard game

    theoretic concepts.'
  key_findings: "1. DUAL MOTIVATION: People care about both absolute payoff and relative\n   standing\n\n2. ERC MODEL: Equity,\
    \ Reciprocity, Competition framework unifies diverse\n   experimental findings\n\n3. ULTIMATUM/DICTATOR: Model explains\
    \ rejection of unfair offers and\n   voluntary giving\n\n4. PRISONER'S DILEMMA: Explains cooperation when relative payoffs\
    \ matter\n\n5. GIFT EXCHANGE: Explains why workers reciprocate high wages with high effort\n\n6. COMPETITIVE MARKETS:\
    \ Model consistent with competitive outcomes in market\n   settings (Bertrand)"
  ebf_relevance: "Domain: CORE-THEORY, DOMAIN-BEHAVIORAL, DOMAIN-SOCIAL\n10C Dimensions: WHAT (relative standing in utility),\
