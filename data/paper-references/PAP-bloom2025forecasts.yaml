  notes: 'First large-scale incentivized panel of US firm forecasts. Four biases documented: (1) Inaccuracy (18\% win rate),
    (2) Over-optimism (+16.3\%), (3) Predictable errors, (4) Over-precision (subjective var = 50\% true var). Four RCTs: Data
    dashboard WORKS (-15\% noise, +2pp), Incentives WORK (-70\% optimism at \$400), Training NO EFFECT, Contingent thinking
    NO EFFECT. Key insight: Biases are MOTIVATED (Benabou-Tirole), not cognitive - can be reduced with incentives but not
    eliminated with training.'
