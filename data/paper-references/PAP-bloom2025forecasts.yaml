summary:
  abstract_extended: "FIRST LARGE-SCALE INCENTIVIZED PANEL of US firm forecasts.\n\nDATA: Partnership with large US payment-processing\
    \ company\n- 5-year, 10-wave panel survey\n- Incentivized quarterly sales forecasts\n- Over 6,000 firms\n- Matched to\
    \ proprietary revenue data\n\nFOUR FORECASTING BIASES DOCUMENTED:\n\n1. INACCURACY: Win rate only 18%\n2. OVER-OPTIMISM:\
    \ +16.3% systematic positive bias\n3. PREDICTABLE ERRORS: Errors are forecastable\n4. OVER-PRECISION: Subjective variance\
    \ = 50% of true variance\n\nFOUR RANDOMIZED EXPERIMENTS:\n\n1. DATA USE (Dashboard) → WORKS\n   - Decreases noise by 15%\n\
    \   - Reduces over-precision\n   - +2 percentage points accuracy\n\n2. INCENTIVES → WORKS\n   - Higher incentives moderate\
    \ over-optimism\n   - $400 incentive → -70% optimism\n   - +0.9pp accuracy per $100\n\n3. FORECASTING SKILL TRAINING →\
    \ NO EFFECT\n\n4. CONTINGENT THINKING → NO EFFECT\n\nKEY INSIGHT:\nBiases are MOTIVATED (Bénabou-Tirole), not cognitive.\n\
    Can be reduced with incentives but NOT eliminated with training."
