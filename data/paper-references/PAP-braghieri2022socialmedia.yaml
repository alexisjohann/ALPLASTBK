abstract: 'Uses the staggered introduction of Facebook across US colleges (2004-2006)

  as a natural experiment to estimate causal effects on mental health.

  Finds Facebook introduction increased depression and anxiety, with effects

  concentrated among students more susceptible to social comparison.

  '
methodology:
  design: natural_experiment
  identification: Staggered Facebook rollout across colleges
  data_sources:
  - National College Health Assessment (NCHA)
  - Facebook expansion timeline
  sample: 430,000+ students at 775 colleges
  period: 2004-2006
key_findings:
- finding: Facebook increases poor mental health index
  parameter: beta_FB = -0.085 SD
  significance: p < 0.01
- finding: Increase in depression and anxiety
- finding: Effects stronger for students susceptible to social comparison
- finding: No effect on academic outcomes
parameters:
- name: Facebook Mental Health Effect
  symbol: beta_FB
  value: -0.085
  unit: SD
  context: Poor mental health index
- name: Depression Effect
  symbol: beta_depression
  direction: positive (worse)
- name: Anxiety Effect
  symbol: beta_anxiety
  direction: positive (worse)
mechanisms:
  social_comparison:
    finding: Effects concentrated among students more susceptible
    interpretation: Upward social comparison drives negative effects
  time_displacement:
    finding: Some evidence of reduced face-to-face interaction
