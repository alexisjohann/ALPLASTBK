abstract: 'The causes of incidence and the causes of cases are not necessarily the same. The
  population strategy of prevention seeks to shift the whole distribution of a risk factor,
  while the high-risk strategy seeks to identify and treat high-risk individuals. The
  Prevention Paradox states that a preventive measure which brings much benefit to the
  population offers little to each participating individual. This has profound implications
  for motivation and compliance in preventive medicine.'
