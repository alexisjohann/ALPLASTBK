abstract: This article examines the factors underlying the differential in earnings between black men and white men, with
  a focus on the role of human capital. Since 1940, successive generations of black men entering the labor force have been
  increasingly more educated relative to white men, both in terms of years of school completed and in the quality of schooling
  obtained. This convergence in educational differences combined with the migration of blacks out of the South contributed
  to the narrowing in the racial gap in earnings over the 1940–80 period, particularly in the first half of the period. The
  discussion focuses on men, rather than on all blacks. The blackwhite wage gap has remained considerably larger among men
  than among women, making racial differences among men an issue of particular concern.
