abstract: In the economic literature on federalism, centralization is frequently identified with overall homogeneous policies,
  reactions in the post-constitutional political process are often neglected, and comparative analysis is rarely carried out.
  This contribution presents a more comparative, process-oriented approach. The citizens incentives to make use of voice and
  exit options are analyzed. Federalism strengthens both exit and voice, allowing preference matching across jurisdictions.
