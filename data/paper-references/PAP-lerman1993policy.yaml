abstract: With more parents living apart, the societal problem of parents who fail to share with each other or with their
  children becomes more acute. Although governments have mainly relied on public transfers to address the resulting economic
  hardships among children, the emphasis has been shifting toward mandatory sharing through the rigorous enforcement of child
  support laws. This paper first describes the economic context for child support; the expanding federal role in regulating
  awards and collections; the complex array of incentive and equity effects associated with child support; the record of obtaining
  support payments from noncustodial parents; and the effects of new award-setting and enforcement policies. Finally, it considers
  the child support assurance system (CSAS) approach, recently proposed in Congress. Under this plan, the government would
  make up the difference between some minimum assured payment and the child support actually paid by the non-custodial parent.
