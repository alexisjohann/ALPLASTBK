abstract: A fortress Europe immigration policy is currently observed throughout the European Union. The European migration
  problem seems to be that, in the face of high and persistent unemployment rates, additional immigration implies further
  unemployment. This might not be true if immigration helps to erode institutional constraints and enhances labor market flexibility,
  a point that is seen of particular virtue in the European setting. The paper also argues that past European migration, although
  limited, has been positive for the labor markets, and there are only few alternative policy options in the future.
