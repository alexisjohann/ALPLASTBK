abstract: This paper presents a personal perspective on the field of public economics with emphasis on the interplay of theory
  and applications. In the early 1950s, theoretical developments grew out of practical applications. Yet, few economists succeed
  in creatively linking theory to real problems and our professional organization fails to promote adequately such contributions.
  The author also discusses briefly the success of public economics, its fragmentation into subfields, and its relation to
  macroeconomics. The writing of this paper was prompted by the author's participation in editing a volume of selected papers
  by William Vickrey, whose work is exemplary of the perspective presented here.
