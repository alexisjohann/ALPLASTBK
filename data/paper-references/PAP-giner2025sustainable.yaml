abstract: This analysis uses OECD survey data from over 8,000 households in nine countries.
  The paper analyses household profiles via latent class analysis on the basis of
  both diet composition, as well as purchasing habits for products that are generally
  perceived to be environmentally sustainable. Results reveal four main household
  profiles. Interestingly, results regarding the relationship between environmental
  attitudes and red meat consumption may suggest the existence of another meat paradox
  in the sense that one group of respondents reports high levels of environmental
  concern but also a high frequency of meat consumption.
