abstract: Research dealing with various aspects of the theory of planned behavior (Ajzen, 1985, Ajzen, 1987) is reviewed,
  and some unresolved issues are discussed. In broad terms, the theory is found to be well supported by empirical evidence.
  Intentions to perform behaviors of different kinds can be predicted with high accuracy from attitudes toward the behavior,
  subjective norms, and perceived behavioral control; and these intentions, together with perceptions of behavioral control,
  account for considerable variance in actual behavior …
