abstract: In a compelling defense of the speculative approach to the philosophy of mind, Jerry Fodor argues that, while our
  best current theories of cognitive psychology view many higher processes as computational, computation itself presupposes
  an internal medium of representation. Fodor's prime concerns are to buttress the notion of internal representation from
  a philosophical viewpoint, and to determine those characteristics of this conceptual construct using the empirical data
  available from linguistics and cognitive psychology.
