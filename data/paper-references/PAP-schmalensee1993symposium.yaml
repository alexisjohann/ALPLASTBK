abstract: Global climate change, and policies to slow it or adapt to it, may be among the primary forces shaping the world's
  economy throughout the next century and beyond. Nonetheless, popular treatments of this issue commonly ignore economics.
  This introductory essay sketches some of the uncertainties and research questions.
