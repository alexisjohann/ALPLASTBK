abstract: 'Ronald Coase wrote two great theoretical articles that earned him the Nobel Prize: “The Nature of the Firm” in
  1937 and “The Problem of Social Cost” in 1960. He also wrote many articles dealing with the methodology of economics, often
  in the setting of a discussion of a particular economist, such as Adam Smith or Alfred Marshall. The methodological articles
  will be my particular focus here.'
