abstract: In recent years, electrification has reemerged as a key priority in low-income countries, with a particular focus
  on electrifying households. Yet the microeconomic literature examining the impacts of electrifying households on economic
  development has produced a set of conflicting results. Does household electrification lead to measurable gains in living
  standards or not? Focusing on grid electrification, we discuss how the divergent conclusions across the literature can be
  explained by differences in methods, interventions, potential for spillovers, and populations. We then use experimental
  data from Lee, Miguel, and Wolfram (2019) — a field experiment that connected randomly selected households to the grid in
  rural Kenya — to show that impacts can vary even across individuals in neighboring villages. Specifically, we show that
  households that were willing to pay more for a grid electrification may gain more from electrification compared to households
  that would only connect for free. We conclude that access to household electrification alone is not enough to drive meaningful
  gains in development outcomes. Instead, future initiatives may work better if paired with complementary inputs that allow
  people to do more with power.
