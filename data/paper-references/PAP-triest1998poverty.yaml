abstract: The official U.S. government figures showed an increase in the poverty rate from 11.1 percent in 1973 to 13.8 percent
  in 1995. However, some maintain that this upward trend is due to defects in the official poverty measure. This paper analyzes
  alternative measures of poverty and concludes that nearly all reasonable alternatives show similar trends in poverty over
  the recent past. There has been an increase in the percentage of people in the United States who are poor, although one
  can argue that the official Census figures either understate or somewhat overstate the increase.
