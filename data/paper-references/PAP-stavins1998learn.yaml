abstract: The most ambitious application ever attempted of a market-based approach to environmental protection has been for
  the control of acid rain under the Clean Air Act amendments of 1990, which established a sulfur dioxide allowance trading
  program. This essay identifies lessons that can be learned from this grand experiment in economically oriented environmental
  policy. The author examines positive political economy lessons, asking why this system was adopted from acid-rain control
  in 1990, and he considers normative lessons that can be learned from the program's structure and performance, focusing on
  lessons for the design and implementation of future systems.
