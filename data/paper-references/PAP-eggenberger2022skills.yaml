key_findings_structured:
  - finding: "Generic IT skills significantly reduce earnings losses after involuntary separations for workers with specific skill bundles — one percentage point more generic IT skills in training is associated with 5.1pp higher post-separation earnings (beta_6 = 0.051)"
    domain: labor_economics
    effect_size: "beta = 0.051 per pp generic IT"
  - finding: "Expert IT skills do NOT reduce earnings losses after involuntary separations — no positive interaction with occupational specificity, and for older workers with specific skills, expert IT is associated with LARGER earnings losses"
    domain: labor_economics
    effect_size: null
  - finding: "Occupational specificity increases earnings vulnerability: one standard deviation increase in specificity is associated with ~5pp larger earnings losses after involuntary separation (beta_4 = -0.054)"
    domain: labor_economics
    effect_size: "beta = -0.054 per SD specificity"
  - finding: "Generic IT skills exhibit complementarity with other skills (multiplicative productivity enhancement), while expert IT skills are purely additive — this extends Lazear's skill-weights model with a complementarity dimension"
    domain: labor_economics
    effect_size: null

