abstract: |
  This paper examines how different types of IT skills affect workers' earnings after involuntary job separations, depending on the specificity of their occupational training. Extending Lazear's (2009) skill-weights model to account for skill complementarities, the authors distinguish between generic IT skills (e.g., online research, spreadsheets) that complement many other skills, and expert IT skills (e.g., CNC programming, specific software) that are additive like other specialized skills. Using Swiss apprenticeship training curricula analyzed with NLP methods and linked to administrative labor market data (1999-2010), they find opposing effects: generic IT skills reduce earnings losses for workers with specific skill bundles after involuntary separations, while expert IT skills do not — and for older workers with specific skills, expert IT may even amplify losses.

research_question: "How do generic versus expert IT skills interact with occupational skill specificity to affect workers' earnings after involuntary job separations?"

