abstract: 'Abstract This article documents the economic relevance of measuring cognitive uncertainty: people’s subjective
  uncertainty over their ex ante utility-maximizing decision. In a series of experiments on choice under risk, the formation
  of beliefs, and forecasts of economic variables, we show that cognitive uncertainty predicts various systematic biases in
  economic decisions. When people are cognitively uncertain—either endogenously or because the problem is designed to be complex—their
  decisions are heavily attenuated functions of objective probabilities, which gives rise to average behavior that is regressive
  to an intermediate option. This insight ties together a wide range of empirical regularities in behavioral economics that
  are typically viewed as distinct phenomena or even as reflecting preferences, including the probability weighting function
  in choice under risk; base rate insensitivity, conservatism, and sample size effects in belief updating; and predictable
  overoptimism and -pessimism in forecasts of economic variables. Our results offer a blueprint for how a simple measurement
  of cognitive uncertainty generates novel insights about what people find complex and how they respond to it.'
