abstract: The academic and policy debate about the crisis in Europe's single currency area is usually dominated by macroeconomic
  and public sector considerations. The microeconomic dimensions of the crisis and the private-sector issues typically get
  much less attention. However, it is the private sector hiring choices of domestic and foreign firms that will ultimately
  be decisive. This paper argues there are two main problems holding back private sector employment creation in the stressed
  eurozone countries. First, there is a persistent competitiveness problem in some of the eurozone countries due to high labor
  costs relative to underlying productivity. Second, widespread structural barriers make job creation in these countries far
  more arduous than in many other advanced economies, and even more arduous than in some key emerging economies and formerly
  planned economies. Structural barriers to private sector development are particularly widespread in the areas of labor market
  functioning, goods market functioning, and government regulation. Evidence from the World Economic Forum's Global Competitiveness
  Index and the World Bank's Doing Business dataset confirms the immense size and persistence of these barriers, despite improvements
  in some countries in recent years. The paper also presents a novel explanation for the difficulty of structural reforms
  in the eurozone, tracing the challenge to the current trend to “Europeanize” and “politicize” economic reform discussions
  in national policy fields where “Europe” is not a legitimate actor and the European political level is not effective.
