abstract: Significance It is believed that a lack of experimental evidence (typical in the social sciences) slows but does
  not prevent the adoption of true theories. We evaluate this belief using a model of scientific research and promotion in
  which tenured scientists are slightly biased toward tenure candidates with similar beliefs. We find that when a science
  lacks evidence to discriminate between theories, or when tenure decisions do not rely on available evidence, true theories
  may not be adopted. The nonadoption of heliocentric theory in the 16th century, the persistence of bloodletting in the 19th
  century, the nonadoption of underconsumption theory in the early 20th century, and the persistence of radical mastectomy
  in the 20th century illustrate such risk.
