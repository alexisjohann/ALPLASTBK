abstract: Significance Changing individuals’ behavior is key to tackling some of today’s
  most pressing societal challenges such as the COVID-19 pandemic or climate change.
  Choice architecture interventions aim to nudge people toward personally and socially
  desirable behavior through the design of choice environments. Although increasingly
  popular, little is known about the overall effectiveness of choice architecture
  interventions and the conditions under which they facilitate behavior change. Here
  we quantitatively review over a decade of research, showing that choice architecture
  interventions successfully promote behavior change across key behavioral domains,
  populations, and locations. Our findings offer insights into the effects of choice
  architecture and provide guidelines for behaviorally informed policy making.
