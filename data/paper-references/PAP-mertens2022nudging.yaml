summary:
  abstract: >
    Drawing on more than 200 studies reporting over 440 effect sizes
    (n = 2,148,439), we present a comprehensive analysis of the effectiveness
    of choice architecture interventions across techniques, behavioral domains,
    and contextual study characteristics. Choice architecture promotes behavior
    change with a small to medium effect size of Cohen's d = 0.43.

key_findings_structured:
  - finding: "Choice architecture interventions promote behavior change with overall effect size d = 0.43 (95% CI [0.38, 0.48]) across 200+ studies and 440 effect sizes"
    domain: meta_analysis
    stage: evaluation
    primary_dimension: S
    effect_size: 0.43
  - finding: "Decision structure interventions (organization of choice alternatives, including defaults) consistently outperform decision information and decision assistance interventions"
    domain: intervention_design
    stage: evaluation
    primary_dimension: I
  - finding: "Food choices are particularly responsive to choice architecture — effect sizes up to 2.5 times larger than other behavioral domains"
    domain: food_behavior
    stage: action
    primary_dimension: F
    effect_size: 1.075
  - finding: "Choice architecture effectiveness is relatively independent of contextual study characteristics (geography, target population) — robust cross-culturally"
    domain: external_validity
    stage: evaluation
    primary_dimension: S

