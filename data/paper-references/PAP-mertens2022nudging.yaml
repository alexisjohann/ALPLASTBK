summary:
  abstract: 'Drawing on more than 200 studies reporting over 440 effect sizes (n =
    2,148,439), we present a comprehensive analysis of the effectiveness of choice
    architecture interventions across techniques, behavioral domains, and contextual
    study characteristics. Choice architecture promotes behavior change with a small
    to medium effect size of Cohen''s d = 0.43.

