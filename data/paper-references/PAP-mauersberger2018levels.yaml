abstract: We introduce a generalization of the Beauty Contest (BC) game as a framework that incorporates different models
  from micro-and macroeconomics by formulating their reduced forms as special cases of the BC. Examples include public good
  games, ultimatum games, Bertrand, Cournot, some auctions, asset markets, New-Keynesian, and general equilibrium models with
  sentiments/animal spirits. This becomes feasible by considering BC specifications with a best response or optimal action
  as a function of other players' …
