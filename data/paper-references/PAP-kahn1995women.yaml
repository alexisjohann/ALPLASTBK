abstract: This article discusses evidence from recent literature on gender literature on gender differences among Ph.D. economists.
  It finds many gender similarities in accomplishments, including undergraduate grades, publication rates (ceteris paribus),
  and labor market commitment. It finds no evidence of disadvantages for women in admissions to Ph.D. programs or in nonacademic
  salaries. Yet gender differences remain, ceteris paribus, in GRE scores, attrition from Ph.D programs, non-tenure-track
  academic jobs, academic salaries, and academic promotion rates. The paper suggests that trends toward increasing percentage
  of females may be peaking, particularly given recent drops in female undergraduate economics majors.
