summary:
  abstract: 'This paper presents a comprehensive survey of hallucination in natural
    language generation (NLG). We analyze the phenomenon across multiple NLG tasks
    including abstractive summarization, dialogue generation, generative question
    answering, data-to-text generation, and machine translation. We provide a broad
    overview of metrics, mitigation methods, and future directions. LLMs systematically
    generate plausible but factually incorrect content across all examined domains.

    '
