abstract: In strategic management, a critical issue is the need for managers to understand
  how to effectively balance the conflicting demands of today’s operations and preparing
  for tomorrow’s opportunity that manifest themselves in the need to undertake exploratory
  and exploitative activities that lead to multiple types of innovation. Building
  on earlier work on ambidextrous management, this study focuses on the underexplored
  issues within ambidexterity research of the effects of bundling knowledge assets,
  specifically organizational, human and social capital, to achieve strategic ambidexterity
  and the mediating effect of strategic ambidexterity on business performance. Based
  on a sample of 127 SMEs in China, we found that organizational capital was positively
  related to the implementation of an exploitative strategy and an exploratory strategy.
  When organizational capital is bundled with human capital and social capital the
  result is heightened effectiveness in generating strategic ambidexterity. Moreover,
  the implementation of an ambidextrous strategy is associated with greater performance
  including increased market share growth, operating profits and growth, sales growth,
  and the like. Overall, our results suggest that firms that are able to bundle together
  their knowledge assets are able to effectively implement exploitative and exploratory
  strategies for fostering innovation and to achieve higher business performance.
