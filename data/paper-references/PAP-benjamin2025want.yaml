summary:
  abstract_extended: 'This landmark study provides the most comprehensive empirical
    evidence on what people want across 126 aspects of well-being. Using over 1 million
    stated preference tradeoffs from 3,358 MTurk respondents, the authors estimate
    relative log marginal utilities via hierarchical Bayesian models. The key finding
    challenges contemporary well-being research: family well-being, financial security,
    and health have marginal utilities 10-67x higher than average, while standard
    measures like life satisfaction are only ~2x average. The paper introduces a supply-demand
    framework showing that level-MU relationships depend on whether heterogeneity
    is driven by production constraints (negative slope) or taste differences (positive
    slope). Crucially, heterogeneity is much greater within demographic groups than
    between them, suggesting individual differences dominate demographic categories.'
  key_findings: "1. CHILDREN'S HEALTH DOMINATES: Top aspect with MU 67x average,\n\
    \   far exceeding any other dimension\n\n2. LIFE SATISFACTION IS LOW: Standard\
    \ SWB measures only ~2x average MU,\n   challenging their use as comprehensive\
    \ well-being proxies\n\n3. FAMILY-FINANCIAL-HEALTH HIERARCHY: Top 10 aspects cluster\n\
    \   around these three domains (MU 5-67x average)\n\n4. WITHIN > BETWEEN GROUP\
    \ HETEROGENEITY: Individual differences\n   far exceed demographic group differences\n\
    \n5. SUPPLY-DEMAND VALIDATED: Aspect flagging confirms framework\n   (correlation\
    \ 0.41 between judged supply-constraint and slope)\n\n6. SOCIAL DESIRABILITY LIMITED:\
    \ Only explains 15% of MU variation,\n   rank correlation 0.94 after correction\n\
    \n7. LOG-LINEAR RELATIONSHIP: Importance perceptions scale with log(MU),\n   analogous\
    \ to Weber-Fechner law"
