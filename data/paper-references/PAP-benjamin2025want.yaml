abstract: We elicited over a million stated preference choices over 126 dimensions
  or aspects of well-being from a sample of 3,358 respondents on Amazon Mechanical
  Turk. From the stated preference data, we estimate relative log marginal utilities
  per point on our 0-100 response scale for each aspect. Our findings provide empirical
  evidence that contemporary theories of well-being may overemphasize abstract concepts
  such as happiness and life satisfaction, while undervaluing concrete aspects such
  as family well-being, financial security, and health, that respondents place the
  highest marginal utilities on. We document substantial heterogeneity in preferences
  across respondents within (but not between) demographic groups.
