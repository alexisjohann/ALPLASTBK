title: Poverty Impedes Cognitive Function
author: Mullainathan
year: '2010'
publication_type: journal_article
doi: 10.1126/science.1183867
abstract: The poor often behave in less capable ways, which can further perpetuate poverty. This Science paper presents two
  studies testing whether poverty directly impedes cognitive function. First, experimentally induced thoughts about finances
  reduced cognitive performance among poor but not well-off participants. Second, the same farmers showed diminished cognitive
  performance before harvest (when poor) compared to after harvest (when rich). This could not be explained by time, nutrition,
  work effort, or stress. Instead, poverty itself reduces cognitive capacity because poverty-related concerns consume mental
  resources, leaving less for other tasks.
