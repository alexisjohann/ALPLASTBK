paper: hagmann2023costly
superkey: PAP-hagmann2023costly
title: 'Costly Distractions: Focusing on Individual Behavior Undermines Support for
  Systemic Reforms'
author: David Hagmann, Yi-tsen Liao, Nick Chater, George Loewenstein
year: '2023'
publication_type: working_paper
institution: SSRN
number: '4426034'
month: April
url: https://ssrn.com/abstract=4426034
abstract: 'Policy challenges can typically be addressed both through systemic changes
  (e.g., taxes

  and mandates) and by encouraging individual behavior change. In this paper, we propose

  that, while in principle complementary, systemic and individual perspectives can
  compete

  for the limited attention of people and policymakers. Thus, directing policies in
  one of

  these two ways can distract the public''s attention from the other—an "attentional

  opportunity cost." In two pre-registered experiments (n = 1,800) covering three

  high-stakes domains (climate change, retirement savings, and public health), we
  show

  that when people learn about policies targeting individual behavior (such as awareness

  campaigns), they are more likely to themselves propose policies that target individual

  behavior, and to hold individuals rather than organizational actors responsible
  for

  solving the problem, than are people who learned about systemic policies. This shift
  in

  attribution of responsibility has behavioral consequences: people exposed to individual

  interventions are more likely to donate to an organization that educates individuals

  rather than one seeking to effect systemic reforms.

  '
abstract_source: full_text
abstract_fetched: '2026-02-04'
structural_characteristics:
  S1_research_question:
    available: true
    questions:
    - Do policies targeting individual behavior redirect attention away from systemic
      reforms?
    - Does exposure to i-frame policies reduce support for s-frame policies (crowd-out)?
    - Does this attentional shift affect responsibility attributions?
    - Does this have real behavioral consequences (incentivized donations)?
    - Is the effect robust across multiple policy domains?
    clarity: high
  S2_methodology:
    available: true
    approach: experimental
    methods:
    - Pre-registered online experiments (Prolific Academic)
    - 3 × 2 between-subjects design (Study 1)
    - 2-condition design with incentivized behavior (Study 2)
    - Self-categorization of policy proposals
    - Responsibility attribution measures (7-point Likert)
    - Incentivized donation allocation
    key_definitions:
    - 'I-frame: Policies targeting individual behavior'
    - 'S-frame: Systemic policies (taxes, mandates, regulations)'
    - 'Attentional opportunity cost: Focus on one type crowds out the other'
    - 'Responsibility attribution: Who should solve the problem (gov vs individual)'
    - 'Systemic proposal: Includes taxes, mandates, or regulations'
  S3_sample_data:
    available: true
    type: experimental
    empirical_data: true
    sample_characteristics:
    - 'Study 1: n = 1,200 (Prolific Academic)'
    - 'Study 2: n = 600 (Prolific Academic)'
    - US participants
    - 46% Female (Study 1), 49% Female (Study 2)
    - 'Mean age: 40.43 (Study 1), 38.33 (Study 2)'
    descriptive_statistics:
      study1_n: 1200
      study2_n: 600
      domains_tested: 3
      preregistration: AsPredicted (YRC_74H, CGV_JS4)
  S4_findings:
    available: true
    key_findings:
    - finding: Individual treatment reduces systemic proposals by 18 pp
      estimate: -0.179
      se: 0.025
      p_value: <0.001
      interpretation: Exposure to i-frame crowds out s-frame proposals
    - finding: Individual treatment shifts responsibility attribution
      estimate: -0.786
      se: 0.165
      p_value: <0.001
      interpretation: Less government, more individual responsibility
    - finding: Individual treatment reduces importance of systemic policies
      estimate: -8.135
      se: 1.498
      p_value: <0.001
      interpretation: On -50 to +50 scale
    - finding: Finance domain shows strongest crowd-out
      finance_effect: -0.37
      interpretation: 79% vs 42% systemic proposals
    - finding: 'Behavioral consequence: 9 pp less likely to donate to systemic charity'
      systemic_condition: 0.44
      individual_condition: 0.35
      p_value: '0.021'
      interpretation: Real behavioral effect with incentivized donations
    - finding: Effect replicates across 3 domains
      domains: climate, finance, health
      interpretation: Robust cross-domain effect
  S5_validity:
    available: true
    internal_validity:
    - Pre-registered hypotheses and analyses
    - Random assignment to conditions
    - Blind coding by research assistant
    - Robustness checks across multiple specifications
    - Multiple outcome measures (proposals, attributions, importance, behavior)
    external_validity:
    - Three distinct policy domains tested
    - Replication across two studies
    - Incentivized behavioral measure (Study 2)
    - Real charity donation outcome
    - Results consistent with corporate behavior patterns
    limitations:
    - Online convenience sample (Prolific)
    - US participants only
    - Hypothetical policy evaluation (Study 1)
    - Short-term exposure effects
    - Cannot distinguish attention from other mechanisms definitively
  S6_reproducibility:
    available: true
    proofs_available: true
    proof_location: Tables 1, A2, A3 with full regression specifications
    data_availability:
      source: Open Science Framework
      access: https://osf.io/gwfyp/
    model_specification: OLS regression with domain fixed effects
    assumptions_documented: true
    preregistration:
    - 'Study 1: https://aspredicted.org/YRC_74H'
    - 'Study 2: https://aspredicted.org/CGV_JS4'
    testable_predictions:
    - I-frame exposure reduces s-frame proposals
    - I-frame exposure shifts responsibility to individuals
    - I-frame exposure reduces perceived importance of systemic policies
    - Effects translate to incentivized behavior
