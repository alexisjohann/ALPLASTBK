key_contributions:
- First experimental evidence for attentional opportunity cost of nudges
- Documents i-frame / s-frame crowd-out across 3 domains
- Shows responsibility attribution shifts with policy exposure
- Demonstrates real behavioral consequences (incentivized donations)
- Links to corporate strategy (distraction from regulation)
- Provides parameter estimates for crowd-out effects
- Pre-registered, replicable methodology
- Connects to Chater & Loewenstein (2022) theoretical framework
