abstract: There is increasing interest in the “economics of happiness”, reflected by the number of articles that are appearing
  in mainstream economics journals that consider subjective well-being (SWB) and its determinants. This paper provides a detailed
  review of this literature. It focuses on papers that have been published in economics journals since 1990, as well as some
  key reviews in psychology and important unpublished working papers. The evidence suggests that poor health, separation,
  unemployment and lack of social contact are all …
