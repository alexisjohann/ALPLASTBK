abstract: This paper argues that four sources of utility rarely incorporated into economics -- self-signaling, goal completion,
  mastery, and meaning -- are extremely important motives for human behavior. Using mountaineering as an extreme illustration,
  Loewenstein challenges conventional utility theory by showing that people systematically pursue activities that involve
  suffering and risk for reasons that standard models cannot explain.
