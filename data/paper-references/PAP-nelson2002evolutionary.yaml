abstract: This paper reviews the case for an evolutionary approach to problems of economic analysis, ranging from the details
  of individual firm behavior in the short run through industrial dynamics to the historical evolution of institutions and
  technologies. We draw upon a substantial body of recent research contributions. We characterize micro behavior as governed
  by skills and routines that are shaped by learning and selection. We then consider major areas of application of evolutionary
  thinking, including the analysis of competitive processes in technologically dynamic industries and the evolution of institutions
  and technologies.
