abstract: This paper discusses a fundamental problem in measuring the growth of knowledge
  and comparing the skills of people. New skills emerge that are not just more of
  the previously acquired skills. Psychometric convention forces these skills into
  arbitrarily constructed scales, which can severely distort measurement. To formally
  address this problem, we measure skills using a novel measurement scheme, estimate
  a stochastic learning process and reject the common scale assumption across levels
  for language and cognitive skills. Furthermore, we estimate dynamic complementarity
  without imposing arbitrary scales for skills.
abstract_source: paper
evidence_tier: 2
data_source: China REACH RCT
replication_data: https://doi.org/10.7910/DVN/GQBPPO
registry_entry: https://www.socialscienceregistry.org/trials/7119
core_contribution: 'Establishes that skills do not evolve as higher levels of a fixed
  set of abilities.

  New skills EMERGE with development - qualitatively different from earlier skills.

  Rejects common scale assumption across levels for language and cognitive skills.

  Provides scale-free test of dynamic complementarity.

  Explains fadeout phenomenon as measurement artifact of skill emergence.

  '
key_findings:
- id: KF-01
  finding: New skills emerge at each developmental level - not just more of the same
  implication: Common psychometric scales distort measurement of skill growth
- id: KF-02
  finding: Common scale assumption rejected for language and cognitive skills
  implication: Value-added measures on common scales are invalid
- id: KF-03
  finding: Common scale assumption NOT rejected for fine motor skills
  implication: Skill type matters for measurement validity
- id: KF-04
  finding: Dynamic complementarity exists for language and cognitive skills
  implication: Early investment raises productivity of later investment
- id: KF-05
  finding: Low-ability children can catch up at later stages through dynamic complementarity
  implication: Disadvantaged children benefit most from early intervention
- id: KF-06
  finding: Fadeout may reflect emergence of new skills, not loss of treatment effects
  implication: Re-interpretation of fadeout literature needed
key_concepts:
- id: KC-01
  name: Skill Emergence
  definition: New skills that are qualitatively different from earlier skills, not
    just more of the same
  ebf_relevance: Fundamental for understanding STAGE dimension in EBF
- id: KC-02
  name: Common Scale Assumption
  definition: Assumption that skills measured at different levels/ages are on same
    cardinal scale
  ebf_relevance: EBF rejects this - context Psi matters for measurement
- id: KC-03
  name: Dynamic Complementarity
  definition: Investment at age a raises productivity of investment at age a+j (j>0)
  ebf_relevance: Core mechanism in HOW dimension
- id: KC-04
  name: Scale-Free Testing
  definition: Testing hypotheses without imposing arbitrary psychometric scales
  ebf_relevance: Methodological foundation for EBF parameter estimation
- id: KC-05
  name: Level-Specific Measurement
  definition: Measuring skills within age/level-specific intervals with common content
  ebf_relevance: Operationalization strategy for EBF assessments
formulas:
  skill_formation_technology:
    equation: K(a+1) = f^(a)(K(a), I(a))
    description: Skills at age a+1 depend on previous skills and investment
    note: K(a+1) and K(a) need NOT be measured on same scale
  dynamic_complementarity:
    equation: ∂²K(a+j+1) / ∂I(a)∂I'(a+j) > 0
    description: Investment at age a raises productivity of later investment
    note: This parameter does NOT require common scale assumption
  learning_rate:
    measure: Time to first mastery within level
    description: Number of trials until first success at each difficulty level
    note: Scale-free measure of learning speed
