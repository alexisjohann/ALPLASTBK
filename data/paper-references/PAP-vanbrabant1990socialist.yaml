abstract: 'This article focuses on the debate between Richard Portes and János Kornai as the respective exponents of two interpretations
  of economic behavior in centrally planned economies: the disequilibrium school, and the theory of the shortage economy.
  My objective here is to elucidate for the nonspecialist the core features of the debate between the disequilibrium school
  and the shortage economy. Toward the end, I describe what might usefully be retained from this debate by economists who
  do not specialize in the study of centrally planned economies.'
