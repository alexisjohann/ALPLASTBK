abstract: While discrimination and its economic implications have been studied in many different societies and based on a
  multitude of attributes like ethnicity, religion, gender, or language, the development of such behavior in children is still
  poorly understood. Here we present experimental evidence from a bilingual city in Northern Italy on whether the language
  spoken by a partner in a prisoner s dilemma game affects behavior. We examine how discrimination based on language develops
  in practically all six- to eleven-year old primary school children in the city. We find that cooperation increases with
  age and that both in-group favoritism and out-group discrimination emerge as children get older.
