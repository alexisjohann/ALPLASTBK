abstract: 'Government intervention in insurance markets is ubiquitous and the theoretical basis for such intervention, based
  on classic work from the 1970s, has been the problem of adverse selection. Over the last decade, empirical work on selection
  in insurance markets has gained considerable momentum. This research finds that adverse selection exists in some insurance
  markets but not in others. And it has uncovered examples of markets that exhibit “advantageous selection”—a phenomenon not
  considered by the original theory, and one that has different consequences for equilibrium insurance allocation and optimal
  public policy than the classical case of adverse selection. Advantageous selection arises when the individuals who are willing
  to pay the most for insurance are those who are the most risk averse (and so have the lowest expected cost). Indeed, it
  is natural to think that in many instances individuals who value insurance more may also take action to lower their expected
  costs: drive more carefully, invest in preventive health care, and so on. Researchers have taken steps toward estimating
  the welfare consequences of detected selection and of potential public policy interventions. In this essay, we present a
  graphical framework for analyzing both theoretical and empirical work on selection in insurance markets. This graphical
  approach provides both a useful and intuitive depiction of the basic theory of selection and its implications for welfare
  and public policy, as well as a lens through which one can understand the ideas and limitations of existing empirical work
  on this topic.'
