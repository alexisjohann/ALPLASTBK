abstract: Successful Intelligence argues that the best predictors of success in life are creative and practical intelligence,
  not just IQ. Sternberg's triarchic theory contends that intelligent behavior arises from a balance between analytical, creative,
  and practical abilities. Analytical abilities enable evaluation and analysis; creative abilities generate invention and
  discovery; practical intelligence (or common sense) is based on tacit knowledge needed to succeed in particular environments.
  A successfully intelligent person identifies strengths and weaknesses, then capitalizes on strengths while compensating
  for weaknesses.
