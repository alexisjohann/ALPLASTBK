# ============================================================================
# BEHAVIORAL MAPPING
# ============================================================================
behavioral_mapping:
  source: "original paper analysis"
  dimensions:
    - domain: labor_market_outcomes
      stages:
        - observation
        - evaluation
      primary_dimension: F
      psi_dominant: technology
      gamma: 0.0
      A_level: 0.3
      W_level: 0.7
      awareness_type: retrospective
      key_insight: |
        Task automation reshapes occupational expertise demands, creating
        countervailing wage and employment effects. The SAME technology
        (automation) produces OPPOSITE outcomes in different occupations
        depending on which tasks it replaces. This is a pure context effect
        (Psi_M = technology available) modulating the relationship between
        human capital and labor market outcomes.

    - domain: human_capital_formation
      stages:
        - preparation
        - action
        - maintenance
      primary_dimension: X
      psi_dominant: occupational_structure
      gamma: 0.0
      A_level: 0.5
      W_level: 0.6
      awareness_type: implicit
      key_insight: |
        Occupational indivisibility (task bundling) means that automating
        SOME tasks changes the expertise required for ALL remaining tasks.
        Workers cannot cherry-pick tasks - they must perform the entire
        non-automated bundle. This creates expertise hierarchies where
        more expert workers can perform all lower-expertise tasks but not
        vice versa. Investment in human capital is thus shaped by the
        technology-determined task composition of occupations.

