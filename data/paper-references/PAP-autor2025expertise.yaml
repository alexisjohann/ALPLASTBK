# ============================================================================
# ABSTRACT & SOURCE
# ============================================================================
abstract: |
  We develop a framework for understanding how task-level automation shapes
  occupational expertise demands, wages, and employment. We introduce a
  content-agnostic measure of occupational task expertise using the Efficient
  Coding Hypothesis (ECH), which posits that the vocabulary used to describe
  tasks encodes the expertise needed to perform them. Using Dictionary of
  Occupational Titles (1977) and O*NET (2018) data matched via word embeddings,
  we show that changes in occupational expertise predict wage changes
  (beta = 0.175) and that expertise and employment move in opposite directions.
  The routine task automation of 1980-2010 bifurcated expertise demands, raising
  them in some occupations while lowering them in others.

abstract_source: original
