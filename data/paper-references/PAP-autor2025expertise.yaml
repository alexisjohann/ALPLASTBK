# ============================================================================
# SUMMARY
# ============================================================================
summary:
  abstract_extended: |
    This Schumpeter Lecture introduces a novel framework for understanding how
    task automation reshapes occupational expertise demands, wages, and employment.
    The central innovation is a content-agnostic measure of task expertise based
    on the Efficient Coding Hypothesis (ECH): the vocabulary used to describe
    tasks encodes the expertise required to perform them. Using the Standard
    Frequency Index (SFI) from the Educator's Word Frequency Guide, the authors
    measure word rarity in task descriptions as a proxy for expertise intensity.

    The paper matches 12,099 DOT (1977) tasks to 18,137 O*NET (2018) tasks using
    OpenAI word embeddings across 303 harmonized Census occupations. Key findings:
    (1) Changes in occupational expertise predict wage changes with beta = 0.175;
    (2) Expertise and employment move in opposite directions - automation that
    reduces expertise demands in an occupation tends to increase its employment
    (and vice versa); (3) Routine task automation bifurcated expertise demands,
    raising them in professional occupations while lowering them in production
    and clerical work.

    The paper develops a formal GE model demonstrating two countervailing forces:
    when automation replaces expert tasks in an occupation, it both reduces the
    expertise premium (lowering wages) and increases labor supply to that
    occupation (raising employment). The model resolves the puzzle of why the
    same technology (automation) can simultaneously raise wages in some
    occupations while lowering them in others.

    The framework has critical implications for AI: unlike routine task automation,
    AI may automate high-expertise tasks, potentially inverting the historical
    pattern where automation primarily displaced low-expertise routine work.

  key_findings: |
    1. ECH MEASUREMENT: Standard Frequency Index (SFI) of task vocabulary serves
       as content-agnostic measure of expertise (rarer words = more expertise)
    2. EXPERTISE-WAGE LINK: Changes in occupational expertise predict wage changes
       (beta = 0.175, p < 0.01)
    3. EXPERTISE-EMPLOYMENT INVERSE: Expertise and employment move in OPPOSITE
       directions (occupations gaining expertise lose employment, and vice versa)
    4. TASK MATCHING: 12,099 DOT tasks matched to 18,137 O*NET tasks via word
       embeddings across 303 occupations (cosine similarity > 0.60)
    5. ROUTINE BIFURCATION: Routine task automation raised expertise in professional
       occupations while lowering it in production/clerical work
    6. GE MODEL: Two countervailing forces - automation reduces expertise premium
       (wage effect) but increases labor supply (employment effect)
    7. HIERARCHICAL EXPERTISE: More expert workers can perform all tasks at or
       below their expertise level (occupational indivisibility)
    8. AI IMPLICATIONS: AI may automate HIGH-expertise tasks, inverting the
       historical pattern of low-expertise routine task displacement
    9. WORD EMBEDDINGS: OpenAI text-embedding-3-small achieves high-quality
       cross-era task matching despite 41-year vocabulary evolution
    10. TASK BUNDLING: Workers must perform ALL non-automated tasks in their
        occupation - partial automation changes the required expertise bundle

  ebf_relevance: |
    Domain: CORE-WHAT, CORE-WHERE, CORE-WHO
    10C Dimensions:
      - WHAT (expertise as utility dimension, task bundling affects labor supply)
      - WHERE (parameter calibration: expertise-wage slopes, employment effects)
      - WHO (occupational segmentation, hierarchical expertise levels)
      - WHEN (Psi_M: technology context determines which tasks are automated)
      - AWARE (ECH: vocabulary encodes expertise awareness)
    Theory Support:
      - Establishes MS-LM-005 (Expertise Framework)
      - Extends MS-SF-004 (task taxonomy for skill measurement)
      - Connects to MS-SF-001 (human capital formation dynamics)
    Key EBF Insight: The same automation technology creates OPPOSITE effects
    in different occupations depending on which tasks are automated. This is
    a context-dependent (Psi_M) phenomenon - the effect of technology on
    wages and employment is NOT a fixed parameter but varies by occupational
    task composition. This directly supports EBF's core thesis that
    theta = f(Psi, 10C), not theta = constant.

  sources:
    - "Schumpeter Lecture, European Economic Association Annual Congress, Rotterdam, August 29, 2024"
    - "BibTeX: bibliography/bcm_master.bib (autor2025expertise)"

