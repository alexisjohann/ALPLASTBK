abstract: The spreading use of indexes in the nineteenth century raised basic questions concerning the nature of absolute
  value in a neoclassical world of relative exchange values. Where Walsh held that the 'right' index for the general exchange
  value of money would identify true values, Jevons, Marshall, and especially Keynes were highly skeptical that such values
  could be defined without interpersonal comparisons of utility. Subsequent political debates over the use of indexation,
  especially those of World War II and the current period, have underlined the difficulty of identifying a true cost-of-living
  index applicable to all components of the population.
