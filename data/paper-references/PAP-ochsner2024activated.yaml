abstract: History stored in collective memories and activated by political campaigns can create xenophobia and radicalization.
  Turkish troops besieged Vienna in 1529 and 1683 and pillaged individual Austrian villages, killing and kidnapping in the
  process. Attacked places remember those events well but never expressed aversion to Muslims until far-right populists started
  to campaign against Turks and Muslims in the mid-2000s. We find anti-Muslim sentiments and far-right voting surge in previously
  attacked places after the populist campaigns were launched, and Turkish communities decrease in response. Historical narratives
  in political campaigns can mobilize both beliefs and actions.
