parameter_contributions:
  - symbol: "B"
    name: "Aggregate Bias Factor"
    description: "Multiplicative product of individual bias dimensions B = b1 * b2, where b1 = information bias and b2 = attention bias. B in [0,1) attenuates perceived marginal cost of resource use."
    functional_form: "B = b1 * b2 (generalizable to B = prod(bk) for K biases)"
    measurement_contexts:
      - context: "shower_resource_conservation"
        value_estimate: "B << 1 (baseline: CO2 underestimated by factor 8-9, attention bias from mind-wandering)"
        psi_conditions:
          Psi_I: "flat_rent_no_monetary_incentive"
          Psi_S: "individual_private_bathroom"
          Psi_C: "student_limited_attention"
          Psi_K: "german_pro_environmental_norms"
        source_in_paper: "Section 2.1, Eq. (2)"
        study_type: "field_experiment"
        countries: ["Germany"]
    ebf_relevance: "Formalizes EBF complementarity gamma as multiplicative bias interaction - the Anna Karenina principle for behavioral interventions"

  - symbol: "delta_RTF"
    name: "Real-Time Feedback Conservation Effect"
    description: "Causal effect of real-time water use display on energy conservation per shower"
    measurement_contexts:
      - context: "shower_real_time_feedback_isolation"
        value_estimate: "-0.4 kWh energy (-17-18%), -6.3 L water per shower"
        psi_conditions:
          Psi_I: "flat_rent_no_monetary_incentive"
          Psi_S: "individual_private_bathroom"
          Psi_C: "student_population"
          Psi_M: "amphiro_smart_meter"
        source_in_paper: "Section 6.1, Result 1, Table 3 (beta_1)"
        study_type: "RCT_field"
        sample_size: 318
        countries: ["Germany"]
        significance: "p < 0.01"
    ebf_relevance: "Salience intervention targeting b2 (attention bias) - effective in isolation"

  - symbol: "delta_SER"
    name: "Shower Energy Reports Effect (Isolation)"
    description: "Causal effect of information provision (energy reports with CO2 data) when administered alone"
    measurement_contexts:
      - context: "shower_energy_reports_isolation"
        value_estimate: "null effect (gamma_2 not significant, point estimate positive)"
        psi_conditions:
          Psi_I: "flat_rent_no_monetary_incentive"
          Psi_S: "individual_private_bathroom"
          Psi_C: "student_inattentive_while_showering"
        source_in_paper: "Section 6.1, Result 2, Table 3 (gamma_2)"
        study_type: "RCT_field"
        sample_size: 318
        countries: ["Germany"]
        significance: "not significant"
    ebf_relevance: "Information alone (targeting b1) insufficient when attention bias (b2) remains - demonstrates Anna Karenina principle"

  - symbol: "delta_DUAL"
    name: "Combined Intervention Complementarity Effect"
    description: "Additional conservation from adding energy reports to real-time feedback - the super-additive interaction term"
    measurement_contexts:
      - context: "shower_combined_intervention"
        value_estimate: "-0.23 kWh energy (-10%p additional), -3.8 L water per shower beyond RTF alone"
        psi_conditions:
          Psi_I: "flat_rent_no_monetary_incentive"
          Psi_S: "individual_private_bathroom_with_social_comparison_in_report"
          Psi_C: "attention_enhanced_by_smart_meter"
          Psi_M: "amphiro_smart_meter_plus_email_reports"
        source_in_paper: "Section 6.1, Result 3, Table 3 (gamma_3)"
        study_type: "RCT_field"
        sample_size: 318
        countries: ["Germany"]
        significance: "p < 0.05"
    ebf_relevance: "Direct empirical measurement of gamma > 0 for information x salience complementarity"

  - symbol: "Phi_XY"
    name: "Behavioral Complementarity Term"
    description: "Interaction effect Phi_XY = Delta_e_XY - Delta_e_X - Delta_e_Y, measures super-additivity in behavior change"
    functional_form: "Phi_XY approx (de/dB + d2e/dB2 * b1*b2) * delta_1 * delta_2"
    measurement_contexts:
      - context: "shower_complementarity_test"
        value_estimate: "Phi_XY < 0 (significant complementarity: gamma_3 - gamma_2 significant at p=0.033)"
        psi_conditions:
          Psi_I: "flat_rent_no_monetary_incentive"
          Psi_C: "multiple_biases_present"
        source_in_paper: "Section 2.2, Eq. (5), Section 6.1"
        study_type: "RCT_field"
        countries: ["Germany"]
        significance: "p = 0.033 (uploaders-only)"
    ebf_relevance: "Core EBF result - empirical proof that gamma != 0 for information x salience interventions"

  - symbol: "CO2_underestimation"
    name: "CO2 Belief Bias Factor"
    description: "Degree to which individuals underestimate carbon emissions from shower water heating"
    measurement_contexts:
      - context: "shower_co2_beliefs_supplementary_survey"
        value_estimate: "factor 8-9 underestimation (mean estimate 91.3g vs actual ~800g CO2 per shower)"
        psi_conditions:
          Psi_C: "student_population_no_prior_intervention"
          Psi_K: "german_urban"
        source_in_paper: "Section 4.6, supplementary survey (n=329)"
        study_type: "survey"
        sample_size: 329
        countries: ["Germany"]
    ebf_relevance: "Quantifies information bias b1 - large gap between beliefs and reality creates scope for information intervention"

key_findings_structured:
  - finding_id: F1
    claim: "Real-time feedback on water use reduces energy consumption by 17-18% per shower"
    evidence: "RCT with 318 participants, beta_1 = -0.37 kWh (LATE), stable over 3 months"
    mechanism: "Increases salience of resource use (raises b2 toward 1), enabling conservation motivation to translate into action"
    ebf_parameter: "delta_RTF"
    significance: "p < 0.01"

  - finding_id: F2
    claim: "Information provision alone (shower energy reports) has no detectable conservation effect"
    evidence: "gamma_2 not significant in any specification; point estimates near zero or positive"
    mechanism: "Information raises b1 but residual attention bias (b2 near 0) prevents behavior change - Anna Karenina effect"
    ebf_parameter: "delta_SER"
    significance: "not significant"

  - finding_id: F3
    claim: "Combining information with real-time feedback produces super-additive conservation effects"
    evidence: "gamma_3 = -0.23 kWh (p < 0.05), complementarity test gamma_3 != gamma_2 (p = 0.033)"
    mechanism: "When attention bias is mitigated (b2 raised by RTF), information provision (raising b1) becomes effective through the delta_1*delta_2 interaction term"
    ebf_parameter: "Phi_XY"
    significance: "p = 0.033"

  - finding_id: F4
    claim: "Complementarity effects unfold gradually over time rather than through immediate jumps"
    evidence: "Weekly appreciation rate ~0.08-0.09 kWh in DUAL group (Table 4), no discrete jump after reports"
    mechanism: "Consistent with learning and habit formation rather than Hawthorne or pure reminder effects"
    ebf_parameter: "delta_DUAL"

  - finding_id: F5
    claim: "Aggregate bias is multiplicative: B = b1 * b2, so single-bias interventions face diminishing returns"
    evidence: "Theoretical framework (Section 2) validated by empirical pattern: SER alone null, SER+RTF significant"
    mechanism: "Any single b_k = 0 independently prevents conservation; must address all relevant biases simultaneously"
    ebf_parameter: "B"

  - finding_id: F6
    claim: "Complementarity in behavior is necessary but not sufficient for complementarity in welfare"
    evidence: "Theoretical derivation in Section 2.3, Eq. (7): consumer surplus gains decrease as B increases"
    mechanism: "Policy makers face trade-off between population coverage and policy bundle richness"
    ebf_parameter: "Phi_XY"

  - finding_id: F7
    claim: "Students underestimate CO2 emissions from showering by factor 8-9"
    evidence: "Supplementary survey (n=329): mean estimate 91.3g vs actual ~800g CO2 per shower"
    mechanism: "Large information gap (b1 << 1) creates substantial scope for belief correction through energy reports"
    ebf_parameter: "CO2_underestimation"

  - finding_id: F8
    claim: "No extensive margin adjustment - interventions do not change shower frequency"
    evidence: "Panel B Table 2: treatment has no effect on number of showers (p = 0.669)"
    mechanism: "Conservation operates entirely through intensive margin (shorter showers, lower flow rate)"

behavioral_mapping:
  - domain: "environmental_conservation"
    behavior: "Energy and water consumption in daily showering"
    bias_sources:
    - "Imperfect information about CO2 emissions from water heating (b1)"
    - "Limited attention and self-control during shower (b2)"
    - "Status quo bias maintaining overconsumption default"
    intervention_channels:
    - "Information provision (shower energy reports) targeting b1"
    - "Salience enhancement (real-time smart meter feedback) targeting b2"
    - "Social comparison (peer benchmarking in second report)"
    complementarity_mechanism: "B = b1 * b2 implies super-additive interaction when interventions target different bias dimensions"
    gamma_estimate: "gamma > 0 (significant at p = 0.033)"

  - domain: "behavioral_policy_design"
    behavior: "Intervention bundling and policy portfolio optimization"
    key_insight: "An intervention that appears ineffective in isolation (SER: null effect) can be highly effective when combined with a complementary intervention (DUAL: -0.23 kWh additional)"
    design_implication: "Policy makers should evaluate interventions in combination, not only in isolation; null results for single interventions do not imply ineffectiveness in bundles"
    ebf_link: "Directly validates EBF CORE-HOW complementarity framework (gamma != 0)"

  - domain: "anna_karenina_principle"
    behavior: "Multiple-bias behavioral change"
    key_insight: "Like Tolstoy's principle - all unbiased agents are alike, but biased agents are biased in their own way. Failure in just one bias dimension prevents behavioral change."
    formal_statement: "B = prod(b_k) for K biases; the more biased an agent is in multiple ways, the more effective it is to target biases simultaneously"
    ebf_link: "Provides theoretical microfoundation for EBF multiplicative complementarity (EXC-5 Whitelist V1: b=0 implies Y=0)"

