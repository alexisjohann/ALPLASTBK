summary:
  key_findings:
  - "Field experiment (N=351, 2x2 design) on resource conservation in showering demonstrates striking complementarity between behavioral interventions."
  - "Real-time feedback alone reduces energy use by 17-18% per shower; information provision alone has no detectable effect."
  - "Combined intervention produces super-additive conservation: an additional 10%p reduction beyond real-time feedback alone."
  - "Theoretical framework: aggregate bias B = b1*b2 implies interventions targeting different bias dimensions become complements."
  - "Anna Karenina principle: when multiple biases are present, addressing only one is insufficient for behavioral change."
  - "Complementarity effects unfold gradually over time, consistent with learning rather than Hawthorne effects."
  - "Students underestimate CO2 emissions from showering by factor 8-9, creating large scope for information interventions."

