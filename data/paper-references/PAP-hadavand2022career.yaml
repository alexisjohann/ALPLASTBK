abstract: This paper documents and discusses implications of publication slowdowns
  on research productivity and careers of economics PhD recipients. Publishing proceeds
  more slowly in economics than in natural sciences, other social sciences, and finance.
  Much of the lag, especially at extremes, arises from authors' dilatory behavior
  in revising. The marginal product of additional re-submission rounds at top journals
  is productive of additional citations, but conditional on re-submission, journals
  taking more time is not productive. The long lags hurt the profession and have especially
  severe negative impacts on younger scholars facing tenure decisions. Publishing
  graduates of top 30 departments produce more than three times as many AER-equivalent
  pages as counterparts from non-top 30 departments.
