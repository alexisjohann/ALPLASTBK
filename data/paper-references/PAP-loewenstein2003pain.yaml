abstract: 'This article presents a comprehensive theory of consciousness that tries to answer the most fundamental questions
  of practical interest about the mechanisms of the human mind, self and consciousness, and also about the so-called ‘Artificial
  Intelligence’ technology in its current state: Will machines ever be able to surpass the human mind in every aspect? What
  is consciousness? Can a machine be conscious, in terms of self-awareness, pleasure or suffering? What animals can be considered
  to have consciousness, if any? And, of course, are we likely to live again after our death, and if so, in what form? The
  main conclusions, drawn on the basis of purely scientific arguments, are the following: A) Limits of artificial intelligence,
  with a high degree of likeliness: A.1 As it is already widely assumed, with today`s technology and in the foreseeable future,
  the practical use of these ‘AI’ tools has proved beyond doubt that they are not reliable and therefore must not be allowed
  to make important decisions without human supervision. In more technical terms, what has been developed so far is not real
  intelligence, but the machine equivalent of intuition or instinct. A.2 Because of the limitations of their human creators,
  that is, us, these technologies will never be able to match or even approach, let alone surpass, human intelligence, even
  if they ever develop real intelligence instead of mere intuition or instinct. Technologies imitating phenomena like learning
  processes or sensations of live beings, management of abstract concepts, or natural selection of minds will be useless as
  long as they are designed by humans. The article includes a variety of arguments and proofs about these limitations, mostly
  independent but convergent, and based on, among other related subjects, the neural, physiological and computational modelling
  of concepts, Gödel´s theorems, practical computer engineering and programming, and hypothetical artificial Darwinian selection,
  assisted or not, of machine computation models and simulation systems. B) Hypothesis about consciousness, compatible with
  today’s scientific knowledge and everyone’s subjective sensations: B.1 Consciousness, that is, awareness of one’s existence,
  with the ability to feel sensations and emotions, including pleasure and pain, apparently requires the full integration,
  not only the mere coexistence, of two factors: * The sentient part, which produces sensations, emotions, pleasure, suffering,
  will, subjective feeling of ‘I’. This part is generally considered, when accepted at all, either of divine or transcendental
  nature (the ‘soul’), or of purely physical nature, though not clearly identified so far, probably because today´s theoretical
  physics does not include any phenomenon that could play this role in a way fully coherent with our own subjective experience,
  let alone with objective experiments. This article shows that this sentience may have a precise physical nature, unknown
  to today’s theoretical physics, and inevitably impossible to measure by scientific procedures, but open to subjective analysis.
  In principle, this phenomenon can occur anywhere. Of course, its physical nature does not prevent us from believing that
  it has ultimately a divine origin, like all other physical phenomena. * The cognitive or computational part, which is required
  to remember and be aware of the sentient part. It includes the concepts of reasoning, understanding, calculation, and memory.
  It can be considered purely algorithmic, pure information, and therefore in principle it can be developed by computing machines.
  The computing power of this part represents the main evolutionary advantage of consciousness. Although this part can be
  considered algorithmic in a broad sense, just as humans can be considered animals, in fact it is much more than that, it
  is a super algorithm, a generator of algorithms. However, it cannot produce subjective sensations by itself. B.2 A consequence
  of the above is that, with today’s electronic technology, it could perhaps be possible to build intelligent machines, but,
  for purely physical reasons, they would not be conscious, that is, they would not be aware of sensations or feelings, because
  the information circulating inside today’s digital computers is not the integrated reflect of the physical phenomena representing
  it in these machines. B.3 Another consequence is thar consciousness is not an all-or-nothing phenomenon, but a quantitative
  one, depending on the power of the intelligent network and its degree of integration with the physical sentient part. Human-level
  consciousness can occur only when the cognitive part is fully integrated, bit by bit and in real time, with a compatible
  physical sentient part. A lesser degree of integration, or a less intense sentient part, or a less intelligent cognitive
  part, could result in a lower degree of consciousness. In consequence, we cannot be absolutely sure about when and to what
  degree a given physical dynamic system other than our human mind can develop consciousness. C) The following consequence
  of hypothesis B) has been extensively confirmed by practice: The physical properties of the sentient part imply by themselves
  strict limitations on the possible frequency and intensity of the sensations of pleasure that live creatures can experience.
  In humans, the possible strategies adequate to cope with these limitations have already been proclaimed by traditional wisdom,
  practically all major religions, and more or less directly even by modern medical science: moderation, self-control, empathy,
  reasonable diet and physical activity, etc. Failure to respect these rules implies not only the hypothetical typical punishments
  promised by religions, but also more immediate nefarious consequences in the form of a variety of health problems that have
  been repeatedly verified to be less frequent in people respecting the abovementioned rules, either because of religious
  beliefs or for whatever other reason. The second version of this article has been largely rewritten and analyses the compatibility
  of our theory with other famous or popular beliefs about the same subjects, including religions, scientific theories and
  their experimental findings, popular beliefs and traditional wisdom.'
