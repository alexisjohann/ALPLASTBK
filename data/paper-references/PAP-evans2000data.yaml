abstract: 'In this paper, we discuss some important data sets that can be used by economists interested in conducting research
  in health economics. We describe six types of data sets: health components of data sets traditionally used by economists;
  longitudinal surveys of health and economic behavior; data on employer-provided insurance; cross-sectional surveys of households
  that focus on health; data on health care providers; and vital statistics. We summarize some of the leading surveys, discuss
  the availability of the data, identify how researchers have utilized these data and when possible, include a web address
  that contains more detailed information about each survey.'
