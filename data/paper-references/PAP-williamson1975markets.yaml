abstract: 'Many materials used by industries are subject to fungal attack and the conditions to which they are subjected are
  frequently favourable to the growth of fungi. The result of fungal attack is usually that the material gradually loses its
  strength and eventually disintegrates; but it may actually become useless long before such an advanced stage is reached.
  On the other hand, due to slow decrease in strength the material may serve its purpose for a long time even though it is
  being attacked by fungi. Laboratory studies of the rate of decrease in strength under different conditions are, therefore,
  of considerable importance. Development of a mathematical model for the loss of strength due to fungal attack seems desirable
  for at least two reasons. They are:'
