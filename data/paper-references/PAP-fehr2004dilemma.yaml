summary:
  abstract_extended: 'This handbook chapter reviews experimental research on social dilemmas and

    cooperation. We examine prisoner''s dilemmas, public goods games, common pool

    resources, and other social dilemmas. Key findings on conditional cooperation,

    punishment, and institutional design are synthesized.'
  key_findings: "1. SOCIAL DILEMMA TYPES\n   - Prisoner's dilemma\n   - Public goods\n   - Commons problems\n\n2. COOPERATION\
    \ PATTERNS\n   - Conditional cooperation prevalent\n   - Heterogeneity in types\n   - Dynamics over time\n\n3. INSTITUTIONAL\
    \ SOLUTIONS\n   - Punishment helps\n   - Communication effective\n   - Endogenous institutions\n\n4. CROSS-CULTURAL EVIDENCE\n\
    \   - Universal patterns\n   - Cultural variation\n   - Context matters"
