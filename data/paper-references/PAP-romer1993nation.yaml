abstract: This paper examines the American Great Depression and the ways in which the U.S. experience during the 1930s resembled
  that of other countries in some regards and fundamentally differed in other aspects. I also evaluate the evidence on the
  causes of the Great Depression in the United States and the sources of the eventual recovery. The picture painted of the
  American Great Depression is one that stresses the importance of national, rather than international, aggregate demand shocks.
  The experience of the United States during the 1930s differed in important ways from that of other countries because the
  American experience had many uniquely American roots.
