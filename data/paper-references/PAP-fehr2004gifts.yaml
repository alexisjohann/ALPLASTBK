summary:
  abstract_extended: 'The authors provide experimental evidence indicating that incentive contracts

    may undermine voluntary cooperation. This suggests that explicit incentives may

    have costly side effects that have been largely neglected by economists.


    The reduction in voluntary cooperation is so strong that contracts providing

    explicit performance incentives are on average LESS efficient than fixed-price

    contracts that do not provide any performance incentives at all.


    This result contradicts the standard economic model predicting that the incentive

    contract will be more efficient than the contract without incentives. Despite

    the efficiency loss, the buyers (as principals) have a material advantage from

    the provision of incentives because the incentive contracts allow them to reap

    a much larger share of the smaller surplus.


    The paper references Bénabou and Tirole (1999), who developed a model that

    formalizes the crowding out effect.'
  key_findings: "1. CROWDING OUT: Explicit incentives undermine intrinsic motivation and\n   voluntary cooperation\n\n2. EFFICIENCY\
    \ LOSS: Incentive contracts less efficient than fixed-price\n   contracts on average\n\n3. STANDARD MODEL FAILS: Results\
    \ contradict prediction that incentive contracts\n   are more efficient\n\n4. DISTRIBUTIONAL EFFECTS: Principals gain\
    \ larger share of smaller pie\n\n5. HIDDEN COSTS: Incentive contracts have neglected side effects\n\n6. TRUST DESTRUCTION:\
    \ Incentives signal distrust, reducing cooperation"
