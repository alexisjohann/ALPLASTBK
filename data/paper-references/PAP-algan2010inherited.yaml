abstract: This paper develops a new method to uncover the causal effect of trust on economic growth by focusing on the inherited
  component of trust and its time variation. We show that inherited trust of descendants of US immigrants is significantly
  influenced by the country of origin and the timing of arrival of their forebears. We thus use the inherited trust of descendants
  of US immigrants as a time-varying measure of inherited trust in their country of origin. This strategy allows to identify
  the sizeable causal impact of inherited trust on worldwide growth during the twentieth century by controlling for country
  fixed effects. (JEL N11, N12, N31, N32, O47, Z13)
