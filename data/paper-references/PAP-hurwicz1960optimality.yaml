abstract: This paper is primarily devoted to a study of the (static) optimality properties (e.g., Pareto-optimality of the
  equilibria) of certain resource allocation mechanisms. It is shown that one such mechanism (the "greed process") is optimal
  in a class of economic environments much broader than the class for which perfect competition is optimal. More specifically,
  the greed process has the desired optimality properties for all environments from which so-called external economies or
  diseconomies are absent; unlike perfect competition, the greed process does not presuppose the absence of indivisible goods,
  of discontinuities, or of increasing returns. However, the greed process lacks the dynamic (stability) properties known
  to hold for perfect competition, at least in certain special cases.
