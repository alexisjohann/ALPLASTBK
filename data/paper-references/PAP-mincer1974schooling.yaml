abstract: The author, a pioneering researcher on investment in human capital, presents a seminal attempt at a systematic analysis
  of personal income distribution. The framework is a human capital model based upon the aggregate earnings distribution of
  white, male, urban workers and the net investments in human capital among these workers. Schooling and post-school investment
  are designated as the two principal elements of human capital; when specific measures of post-school investment are unavailable,
  experience (estimated from age and the length of schooling) is used. In the theoretical section, the author demonstrates
  that years of experience rather than age should be emphasized in interpreting earnings variations. Educational differences
  of the random group of white, male, urban workers accounted for only seven percent of the earnings differential. Mincer
  shows empirically that schooling has more explanatory power for groups with constant years of experience than for groups
  of the same
