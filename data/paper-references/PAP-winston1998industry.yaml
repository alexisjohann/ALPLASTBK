abstract: This paper develops a framework to analyze the long-run adjustment of U.S. industries to economic deregulation,
  highlighting the role of intensified competition, innovations in operations, marketing, and technology, and adjustments
  to external shocks. The author applies this framework to industries that have recently undergone substantial deregulation--airlines,
  motor carriers, railroads, banks, and natural gas--and concludes that these industries have become far more efficient because
  of deregulation and provided large benefits to consumers. He concludes that the same adjustment process and positive outcome
  for consumers will result from the forthcoming deregulation of communications and electricity.
