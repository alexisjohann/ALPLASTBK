abstract: 'In an effort to increase the stock of information available to sellers and buyers in the academic job market for
  beginning Ph.D. economists, this paper presents the findings of a survey of the 1985-86 hiring process by economics departments.
  The findings are based on a stratified random sample of all economics departments ranked in the top 20, and 380 other economics
  departments. Sellers in this job market, typically graduate students in the final stages of their doctoral dissertations,
  will find answers to questions like: Will a phone call from a candidate or faculty advisor increase the probability of securing
  a job interview? How many weeks before the AEA meetings are requests for interviews sent out? How long does a typical job
  interview last and what criteria are applied? How soon after the meetings interview is a candidate likely to be invited
  to give a seminar at a school? Are elements of the job offer such as salary, teaching load, and summer research money negotiable?
  How long does a candidate have to accept or reject an offer? The benefits of these survey results will not, however, be
  limited to sellers.'
