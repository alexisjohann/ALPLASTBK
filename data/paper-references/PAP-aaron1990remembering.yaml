abstract: Joe Pechman joined the staff of the Brookings Institution in 1960. He graduated from the City College of New York
  in 1937 and the University of Wisconsin in 1942. During World War II, he worked in the war time Office of Price Administration
  and later served in the U.S. Army. After the war he worked in the Treasury Department, the staff of the Council of Economic
  Advisers, and the Committee for Economic Development, a policy-oriented organization sponsored by major businesses. Before
  and after coming to Brookings he taught at M.I.T., Yale, Stanford (twice), Georgetown, Dartmouth, and Williams College.
  He was a fellow at the Center for Advanced Studies in the Behavioral Sciences and at the Hoover Institution, both at Stanford
  University.
