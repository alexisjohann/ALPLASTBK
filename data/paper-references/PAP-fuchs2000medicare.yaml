abstract: The “Medicare problem” is examined as part of the larger problem of providing for the overall financial needs of
  the elderly. Several myths about Medicare are discussed, and sources and uses of the elderly's “full income” are estimated.
  The paper explores policy options to deal with technology-induced increases in health care expenditures and excessive dependence
  of the elderly on transfers from the young. The paper concludes that if Americans wish to continue to enjoy the benefits
  of medical advances, they will have to work before and after age 65 and will have to increase their rate of saving substantially.
