summary:
  abstract_extended: 'This paper examines how price incentives affect trust-building in the long

    term. We show that while incentives can increase short-term compliance, they

    may undermine trust-building and have negative long-term effects. The

    signaling properties of incentives matter for relationship development.'
  key_findings: "1. SHORT-TERM EFFECTS\n   - Incentives increase compliance\n   - Immediate behavioral response\n   - Clear\
    \ effect on outcomes\n\n2. LONG-TERM EFFECTS\n   - Trust development affected\n   - Crowding out possible\n   - Relationship\
    \ quality suffers\n\n3. MECHANISM\n   - Incentives signal distrust\n   - Self-perception changes\n   - Intrinsic motivation\
    \ reduced"
  ebf_relevance: '10C DIMENSIONS:

    - WHAT (C): Trust and incentives

    - WHEN (V): Time horizon matters

    - HOW (B): Incentive-trust dynamics


    THEORY SUPPORT:

    - Motivation crowding

    - Trust economics

    - Temporal dynamics


    KEY INSIGHT:

    Price incentives may boost short-term compliance but undermine long-term

    trust development; relationship dynamics must be considered.'
