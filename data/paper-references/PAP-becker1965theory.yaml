superkey: PAP-becker1965theory
paper: becker1965theory
title: A Theory of the Allocation of Time
author: Becker, Gary S.
year: 1965
journal: Economic Journal
volume: 75
number: 299
pages: 493-517
doi: 10.2307/2228949
publication_type: journal_article
abstract: 'This paper presents an analytical framework for the study of household

  production and the allocation of time within the household. Households are

  modeled as producing outputs (commodities Z_i) that bundle goods and time.

  The household faces both time and budget constraints, which under the model''s

  assumptions collapse into a single "full income" constraint: B = wT + V.

  The shadow price of each commodity depends on both goods prices and the

  opportunity cost of time. This framework allows deeper understanding of

  consumer choice, income and substitution effects, and predicts substitution

  between time-intensive and goods-intensive commodities.

  '
core_contribution: 'Foundational paper for household economics. Established:

  1. Time as scarce resource with opportunity cost (shadow price = wage)

  2. Household production function: Z_i = f(X_i, T_i)

  3. Full income concept: B = wT + V (wage × time endowment + non-labor income)

  4. Commodity price: π_i = p_X + w·t_i (goods price + time cost)

  5. Two-stage budgeting under homogeneous separability

  '
