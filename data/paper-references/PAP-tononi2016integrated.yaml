title: 'Integrated Information Theory: From Consciousness to Its Physical Substrate'
author: Tononi
year: '2016'
publication_type: journal_article
doi: 10.1038/nrn.2016.44
abstract: Integrated information theory (IIT) accounts for several aspects of the relationship between consciousness and the
  brain. Starting from the essential properties of phenomenal experience, IIT derives requirements for the physical substrate
  of consciousness. It argues that this substrate must be a maximum of intrinsic cause-effect power and provides a means to
  determine, in principle, the quality and quantity of experience. The theory leads to counterintuitive predictions and can
  develop new tools for assessing consciousness in non-communicative patients. Published in Nature Reviews Neuroscience.
