abstract: What underlying long-term conditions set the stage for the Arab Spring? In recent decades, the Arab region has been
  characterized by an expansion in schooling coupled with weak labor market conditions. This pattern is especially pronounced
  in those countries that saw significant upheaval during the first year of the Arab Spring uprisings. We argue that the lack
  of adequate economic opportunities for an increasingly educated populace can help us understand episodes of regime instability
  such as the Arab Spring.
