abstract: 'This article will describe the enduring relationship between Thomas Malthus and David Ricardo initiated by a letter
  Malthus sent to Ricardo in June 1811. It was, very likely, the most remarkable and most fruitful collaboration in the history
  of economics. It appears that their long and intimate collaboration, and their friendship as well, thrived on their continual
  disputations. They were two men obsessed by a common enthusiasm, tirelessly pursuing a common goal: to understand the economy.
  But they did not share a common vision of the good society and thus were condemned to wrestle interminably, though remarkably
  fruitfully, over the roles of the social classes. Their struggles to convey to each other their views of the forces that
  drove their economy are an inspiring case study in both the difficulty and the possibility of human communication.'
