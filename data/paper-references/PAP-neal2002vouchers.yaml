abstract: As vouchers become a more significant part of education policy debates, the time is right to consider what we know
  and do not know about the likely effects of adopting various voucher schemes. In the balance of this paper, the author describes
  both empirical and theoretical work on education that speaks to this topic. He argues that we cannot confidently predict
  the outcomes that would result from various voucher schemes, and he also stresses that debates over vouchers per se are
  not informative. Details concerning funding, targeting and discretion in the use of vouchers should greatly affect the outcomes
