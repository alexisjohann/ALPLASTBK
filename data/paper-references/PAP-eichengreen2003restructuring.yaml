abstract: This paper provides new empirical evidence relevant to the debate over the desirability of reforms to the way that
  financial markets and the international community deal with sovereign debt crises. In particular, given the ongoing opposition
  of investors and some sovereigns to greater use of collective action clauses (CACs) in emerging market bonds, we present
  new evidence on the way that financial markets have priced the use or non-use of CACs.
