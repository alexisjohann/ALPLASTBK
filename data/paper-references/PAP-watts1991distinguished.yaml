abstract: 'Guy Henderson Orcutt, Distinguished Fellow of our Association. has now moved to a new phase of his career (retirement).
  Most of Guy''s career has been at four universities: Michigan, where he earned all three degrees, Harvard, Wisconsin, and
  Yale. In between, he spent periods at MIT, Cambridge University in England, the International Monetary Fund, the World Bank,
  and The Urban Institute. To me, Guy is several persons rolled into one: inventor, visionary, empiricist, mentor, and friend.'
