abstract: Autarky real per capita well being, does not deny that new technical Chinese progress in goods that America previously
  had competitive advantage in can, ceteris paribus, lower permanently measurable per capita U.S. real income. Nor does it
  deny that technical progress in China's export goods can, ceteris paribus, hurt permanently her own net measurable per capita
  real income itself when demand inelasticity prevails. Ergo, the winds of dynamic comparative advantage cannot be counted
  on to create in each region new net gains of the gainers assuredly greater than the new net losses of the losers. However,
  correct Ricardian theory does imply that worldwide real income per capita does gain net, so that winners' winnings will
  suffice worldwide to more than compensate losers' losings--some cold comfort in a scenario of many semi-autonomous nations.
