abstract: Abstract This study estimates the labor market effects of a work-first policy aimed at speeding up the labor market
  integration of refugees. The policy added new requirements for refugees to actively search for jobs and to participate in
  on-the-job training immediately upon arrival in the host country, Denmark. The requirements were added to an existing policy
  that emphasizes human capital investments in language training. The results show that the work-first policy speeded up entry
  into regular jobs for men, but they find work in precarious jobs with few hours. Long-run effects are uncertain since the
  policy crowds out language investments but raises enrollment in education. The policy had no or very small effects for women,
  which is partly explained by a lower treatment intensity for women.
