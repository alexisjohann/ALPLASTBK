abstract: Many observers regard the world oil market as a puzzle. Why are oil prices so volatile? Why did prices spike in
  the summer of 2008, and what role did speculators play? How important is OPEC? Where are oil prices headed in the long run?
  Is “peak oil” a genuine concern? Any attempt to answer these questions must be informed and disciplined by economics. We
  examine the evidence on each of these issues and provide an interpretation of developments in the world oil market from
  the perspective of economic theory.
