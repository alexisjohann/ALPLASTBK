abstract: This article describes the design features and topical coverage of the National Longitudinal Surveys (NLS). The
  NLS are perhaps the oldest and most widely used panel surveys of individuals in the United States. These surveys were started
  in the mid-1960s to exam employment issues faced by different cohorts of the U.S. population. Since then, the NLS surveys
  have expanded to include two new cohorts of youth. Survey topic areas include employment, education, training, family relationships,
  financial well-being, and health. Information on data access is also provided.
