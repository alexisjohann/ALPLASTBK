abstract: This paper considers fiscal policy during the pandemic through the lens of optimal social insurance. We develop
  a simple framework to analyze how government taxes and transfers could mimic the insurance that people would like to have
  had against pandemic income losses. Permutations of the framework provide insight into how unemployment insurance should
  be structured, when and how much hazard pay is called for, and whether fiscal policy should aim just to redistribute income
  or also to stimulate aggregate demand during a pandemic. When we use the insights from the model to evaluate unemployment
  insurance measures taken during the pandemic, we find that some, but far from all, of the implications of the social insurance
  framework were followed. In the case of hazard pay, we find that the proposal for a national program (the never-implemented
  HEROES Act) was both broader and more generous than a social insurance perspective would call for. We suggest that the social
  insurance perspective on fiscal policy is likely to become increasingly relevant as pandemics and climate-related natural
  disasters become more common causes of unemployment and recessions.
