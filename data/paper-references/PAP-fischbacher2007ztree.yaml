abstract: Abstract z-Tree (Zurich Toolbox for Ready-made Economic Experiments) is a software for developing and conducting
  economic experiments. The software is stable and allows programming almost any kind of experiments in a short time. In this
  article, I present the guiding principles behind the software design, its features, and its limitations.
