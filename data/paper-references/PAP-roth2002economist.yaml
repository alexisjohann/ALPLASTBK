abstract: Economists have lately been called upon not only to analyze markets, but to design them. Market design involves
  a responsibility for detail, a need to deal with all of a market’s complications, not just its principle features. Designers
  therefore cannot work only with the simple conceptual models used for theoretical insights into the general working of markets.
  Instead, market design calls for an engineering approach. Drawing primarily on the design of the entry level labor market
  for American doctors (the National Resident Matching Program), and of the auctions of radio spectrum conducted by the Federal
  Communications Commission, this paper makes the case that experimental and computational economics are natural complements
  to game theory in the work of design. The paper also argues that some of the challenges facing both markets involve dealing
  with related kinds of complementarities, and that this suggests an agenda for future theoretical research.
