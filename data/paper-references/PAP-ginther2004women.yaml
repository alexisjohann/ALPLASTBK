abstract: The percentage of economics doctorates awarded to women has increased over the past twenty years. This article considers
  whether women Ph.D. economists have increased their representation in academia, particularly at higher tenured ranks. Our
  study draws upon several empirical approaches and multiple data sets for the 1990s. We find that when compared with other
  academic disciplines, women in economics are less likely to get tenure and take longer to achieve it. Although gender differences
  in productivity and the effect of children on promotion partly explain women's lesser chances of receiving tenure in economics,
  a significant portion of the gender promotion gap remains unexplained by observable characteristics.
