abstract: The importance of a well-functioning legal and regulatory system in creating an effective market economy is now
  widely accepted. One flagship project that tries to measure the environment in which businesses operate in countries across
  the world is the World Bank's Doing Business project, which was launched in 2002. This project gathers quantitative data
  to compare regulations faced by small and medium-size enterprises across economies and over time. The centerpiece of the
  project is the annual Doing Business report. It was first published in 2003 with five sets of indicators for 133 economies,
  and currently includes 11 sets of indicators for 189 economies. The report includes a table that ranks each country in the
  world according to its scores across the indicators. The Doing Business project has become a major resource for academics,
  journalists, and policymakers. The project also enjoys a high public profile with close to ten million hits on its website
  each year. With such interest, it's no surprise that the Doing Business report has come under intense scrutiny. In 2012,
  following discussions by its board, the World Bank commissioned an independent review panel to evaluate the project, on
  which I served as a member. In this paper, I first describe how the Doing Business project works and illustrate with some
  of the key findings of the 2015 report. Next, I address what is valuable about the project, the criticisms of it, and some
  wider political economy issues illustrated by the report.
