title: 'Evolving Standards for Academic Publishing: A q-r Theory'
author: Ellison
year: '2002'
publication_type: journal_article
doi: 10.1086/341871
abstract: This paper develops models of quality standards to examine two trends in academic
  publishing - journals increasingly require extensive revisions, and articles are becoming
  longer. Papers are modeled as varying along two quality dimensions. The q dimension
  reflects the clarity and importance of main ideas, while r represents craftsmanship
  and polish. A dynamic learning model in which referees (who have a biased view of
  their own work's importance) try to learn social norms from observing how their papers
  are treated predicts that social norms will gradually evolve to increasingly emphasize
  r-quality over q-quality.
