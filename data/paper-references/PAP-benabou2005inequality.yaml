abstract: The distribution of human capital and income lies at the center of a nexus of forces that shape a country's economic,
  institutional and technological structure. I develop here a unified model to analyze these interactions and their growth
  consequences. Five main issues are addressed. First, I identify the key factors that make both European-style “welfare state”
  and US-style “laissez-faire” social contracts sustainable; I also compare the growth rates of these two politico-economic
  steady states, which are not Pareto-rankable. Second, I …
