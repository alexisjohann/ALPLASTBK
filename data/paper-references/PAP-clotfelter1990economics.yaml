abstract: This article examines several aspects of the economics of state lotteries, focusing primarily on the demand for
  lottery products. We begin by giving a descriptive overview. The succeeding sections examine the motivations for playing
  lottery games and evidence on the determinants of lottery demand. The final section considers the welfare economics of the
  apparent objective of lotteries—to maximize profits for the state.
