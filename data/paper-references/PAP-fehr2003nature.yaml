summary:
  abstract_extended: 'Some of the most fundamental questions concerning our evolutionary origins,

    our social relations, and the organization of society are centered on issues

    of altruism and selfishness. Experimental evidence indicates that human

    altruism is a powerful force and is unique in the animal world. However,

    there is much individual heterogeneity and the puzzle is why so many people

    cooperate when there is no obvious material benefit.'
  key_findings: "1. UNIQUENESS OF HUMAN ALTRUISM\n   - Large-scale cooperation among genetically unrelated strangers\n   -\
    \ Not explained by kin selection or direct reciprocity alone\n   - Humans unique in scope and scale of altruistic cooperation\n\
    \n2. TYPES OF ALTRUISM\n   - Strong reciprocity: conditional cooperation + costly punishment\n   - Altruistic punishment:\
    \ punish norm violators at personal cost\n   - Third-party punishment: punish even when not directly affected\n\n3. PROXIMATE\
    \ MECHANISMS\n   - Social emotions (anger, guilt, shame)\n   - Social preferences (fairness, reciprocity)\n   - Reputation\
    \ concerns (indirect reciprocity)\n\n4. ULTIMATE EXPLANATIONS\n   - Cultural group selection\n   - Gene-culture coevolution\n\
    \   - Interaction of genetic and cultural evolution"
