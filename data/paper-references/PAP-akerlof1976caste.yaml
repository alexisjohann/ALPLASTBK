summary:
  abstract_extended: 'This paper examines why economic outcomes deviate from the Arrow-Debreu

    Utopia where peoples'' lives would be as pleasurable as possible given their

    tastes and productive capabilities.


    The paper analyzes several "woeful tales" of inefficient equilibria:

    sharecropping arrangements, the "rat race" of excessive work effort, statistical

    discrimination, and the economics of caste systems.


    In each case, the author shows how social structures, information problems,

    and coordination failures can lead to stable but suboptimal equilibria that

    persist despite making participants worse off than necessary.'
  key_findings: "1. MULTIPLE EQUILIBRIA: Social and economic systems can have multiple\
    \ stable\n   equilibria, some significantly worse than others\n\n2. CASTE PERSISTENCE:\
    \ Caste systems can persist as stable equilibria even\n   when they reduce overall\
    \ welfare\n\n3. RAT RACE: Competition for relative position can lead to excessive\
    \ work\n   effort that leaves everyone worse off\n\n4. STATISTICAL DISCRIMINATION:\
    \ Group-based discrimination can be self-\n   reinforcing and stable as an equilibrium\n\
    \n5. SHARECROPPING: Inefficient contractual arrangements can persist due to\n\
    \   information and commitment problems\n\n6. PARETO SUBOPTIMALITY: Stable equilibria\
    \ need not be efficient - \"woeful\n   tales\" document persistent inefficiencies"
