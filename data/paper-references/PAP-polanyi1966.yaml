abstract: We can know more than we can tell. This famous opening statement introduces Polanyi's argument that tacit knowledge
  - tradition, inherited practices, implied values, and prejudgments - is a crucial part of scientific knowledge. The volume
  challenges the assumption that skepticism, rather than established belief, lies at the heart of scientific discovery. Polanyi
  shows how scientific advancement comes through identifying theories based on a holistic perception of the world that are
  not solely explicable in terms of particular factors. Through tacit knowledge, he also shows the importance tradition plays
  in science.
