abstract: In October 1993, the Royal Swedish Academy of Sciences awarded the Nobel Prize in Economics to Robert William Fogel
  and Douglass Cecil North ‘for having renewed research in economic history.’ The Academy noted that ‘they were pioneers in
  the branch of economic history that has been called the ‘new economic history,’ or ‘cliometrics." In this paper, the author
  addresses what this cliometrics is and how these two Nobel Prize winners furthered the discipline of economics.
