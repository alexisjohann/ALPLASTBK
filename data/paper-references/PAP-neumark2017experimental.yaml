abstract: Understanding whether labor market discrimination explains inferior labor market outcomes for many groups has drawn
  the attention of labor economists for decades— at least since the publication of Gary Becker’s The Economics of Discrimination
  in 1957. The decades of research on discrimination in labor markets began with a regression-based “decomposition” approach,
  asking whether raw wage or earnings differences between groups—which might constitute prima facie evidence of discrimination—were
  in fact attributable to other productivity-related factors. Subsequent research—responding in large part to limitations
  of the regression-based approach—moved on to other approaches, such as using firm-level data to estimate both marginal productivity
  and wage differentials. In recent years, however, there has been substantial growth in experimental research on labor market
  discrimination—although the earliest experiments were done decades ago. Some experimental research on labor market discrimination
  takes place in the lab. But far more of it is done in the field, which makes this particular area of experimental research
  unique relative to the explosion of experimental economic research more generally. This paper surveys the full range of
  experimental literature on labor market discrimination, places it in the context of the broader research literature on labor
  market discrimination, discusses the experimental literature from many different perspectives (empirical, theoretical, and
  policy), and reviews both what this literature has taught us thus far, and what remains to be done. (JEL C93, J14, J15,
  J16, J23, J41, J71)
