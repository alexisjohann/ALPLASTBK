summary:
  abstract_extended: 'Financial incentives have shown strong positive short-run effects for

    problematic health behaviors that likely stem from time inconsistency.

    However, the effects often disappear once incentive programs end.


    This paper analyzes the results of a large-scale workplace field experiment

    to examine whether self-funded commitment contracts can improve the long-run

    effects of an incentive program. A four-week incentive program targeting use

    of the company gym generated only small lasting effects on behavior.


    Those that also offered a commitment contract at the end of the program,

    however, showed demand for commitment and significant long-run changes,

    detectable even several years after the incentive ended.'
  key_findings: "1. INCENTIVES FADE: Four-week incentive program alone generates only small\n   lasting\
    \ effects on gym attendance\n\n2. COMMITMENT CONTRACTS WORK: Adding commitment contracts produces\
    \ long-run\n   behavioral changes persisting even 1 year later\n\n3. DEMAND FOR COMMITMENT: Workers\
    \ show genuine demand for self-binding\n   commitment mechanisms (12% uptake)\n\n4. HABIT FORMATION:\
    \ Combination of incentives + commitment facilitates\n   habit formation that pure incentives cannot\n\
    \n5. WORKPLACE SETTING: Fortune-500 company provides realistic field experiment\n   context with company\
    \ gym\n\n6. TIME INCONSISTENCY: Results consistent with model where workers have\n   present-biased\
    \ preferences"
  ebf_relevance: "Domain: CORE-THEORY, DOMAIN-HEALTH, DOMAIN-ORGANIZATIONAL\n10C Dimensions: WHEN (short\
    \ vs long run), HOW (commitment mechanisms),\n                READY (self-control capacity), WHAT\
    \ (intrinsic motivation)\nTheory Support: MS-CC-001 (Commitment Contracts), MS-HF-001 (Habit Formation),\n\
    \               MS-TI-001 (Time Inconsistency), MS-IN-001 (Incentive Design)\nParameters: Incentive\
    \ effect decay rate, commitment uptake rate (12%),\n            habit persistence, long-run effect\
    \ size"
