abstract: Traditionally econometrics and economics statistics have been taught in the theory and proof, chalk and talk mode
  commonly found in the teaching of mathematics. We advance the use of computer technology in the teaching of quantitative
  methods to get students actively engaged in the learning process. We also assert that the essential tasks for those who
  teach these courses are to identify important issues that lend themselves to quantitative analyses and then to help students
  develop an understanding of the appropriate key concepts for those analyses.
