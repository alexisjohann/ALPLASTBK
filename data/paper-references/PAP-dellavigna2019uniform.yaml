abstract: Abstract We show that most U.S. food, drugstore, and mass-merchandise chains charge nearly uniform prices across
  stores, despite wide variation in consumer demographics and competition. Demand estimates reveal substantial within-chain
  variation in price elasticities and suggest that the median chain sacrifices ${\$}$16 million of annual profit relative
  to a benchmark of optimal prices. In contrast, differences in average prices between chains are broadly consistent with
  the optimal benchmark. We discuss a range of explanations for nearly uniform pricing, highlighting managerial inertia and
  brand image concerns as mechanisms frequently mentioned by industry participants. Relative to our optimal benchmark, uniform
  pricing may significantly increase the prices paid by poorer households relative to the rich, dampen the response of prices
  to local economic shocks, alter the analysis of mergers in antitrust, and shift the incidence of intranational trade costs.
