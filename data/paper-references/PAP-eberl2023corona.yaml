abstract: |
  Analysis suggests the existence of both a Downsian effect, which causes voters to
  adapt their party preferences based on policy congruence, and a party identification
  effect, which causes partisans to realign their policy preferences based on their
  party's platform. Corona-skeptical voters who did not vote for the FPÖ in pre-COVID-19
  elections of 2019 were more likely to vote for the party after it embraced corona populism.
