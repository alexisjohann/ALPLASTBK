abstract: Abstract “Site selection bias” can occur when the probability that a program
  is adopted or evaluated is correlated with its impacts. I test for site selection
  bias in the context of the Opower energy conservation programs, using 111 randomized
  control trials involving 8.6 million households across the United States. Predictions
  based on rich microdata from the first 10 replications substantially overstate efficacy
  in the next 101 sites. Several mechanisms caused this positive selection. For example,
  utilities in more environmentalist …
