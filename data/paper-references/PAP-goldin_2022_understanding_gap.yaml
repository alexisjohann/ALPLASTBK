abstract: Compared with previous recessions, the recession induced by COVID-19 had
  a greater impact on women's employment and labor force participation relative to
  men. But the big divide was less between men and women than it was between the more
  and the less educated. Contrary to many accounts, women did not exit the labor force
  in large numbers, and they did not greatly decrease their hours of work. The aggregate
  female labor force participation rate did not plummet. That said, the ability to
  balance caregiving and work differed greatly by education, occupation, and race.
  The more educated could work from home. Those who began the period employed in various
  in-person service occupations and establishments experienced large reductions in
  employment. Black women experienced a more negative impact beyond other factors
  considered, and the health impact of COVID-19 is a probable reason. The estimation
  of the pandemic's impact depends on the counterfactual used. The real story of women
  during the pandemic is that employed women who were educating their children and
  working adult daughters who were caring for their parents were stressed because
  they were in the labor force, not because they left.
