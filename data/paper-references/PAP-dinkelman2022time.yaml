abstract: 'Many African countries are still in the early stages of structural transformation. Typically, as economies move
  through the structural transformation, activities once conducted within the household are outsourced to the market. This
  has particular implications for women’s time use. In this paper, we document that current patterns of female time use in
  home production in several African countries closely resemble historical time use patterns in the Untied States. We highlight
  two stylized facts about women’s time use in Africa. First, in North Africa, women spend very few hours in market work and
  female labor force participation overall is extremely low. Second, although extensive margin participation of women is high
  in sub-Saharan Africa, women tend to work in the market for only a few hours each week, with the rest of their work hours
  spent in home production. These two facts suggest two different types of constraints that could slow down the reallocation
  of female time from home to market as economies grow: social norms related to women’s market work, and a lack of infrastructure
  (e.g., household infrastructure and childcare facilities) to facilitate marketizing home production. We discuss recent empirical
  evidence related to each set of constraints and highlight new avenues for research.'
