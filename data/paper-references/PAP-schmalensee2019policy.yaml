abstract: The US Clean Air Act, passed in 1970 with strong bipartisan support, was the first environmental law to give the
  federal government a serious regulatory role, established the architecture of the US air pollution control system, and became
  a model for subsequent environmental laws in the United States and globally. We outline the act’s key provisions, as well
  as the main changes Congress has made to it over time. We assess the evolution of air pollution control policy under the
  Clean Air Act, with particular attention to the types of policy instruments used. We provide a generic assessment of the
  major types of policy instruments, and we trace and assess the historical evolution of the Environmental Protection Agency’s
  policy instrument use, with particular focus on the increased use of market-based policy instruments, beginning in the 1970s
  and culminating in the 1990s. Over the past 50 years, air pollution regulation has gradually become more complex, and over
  the past 20 years, policy debates have become increasingly partisan and polarized, to the point that it has become impossible
  to amend the act or pass other legislation to address the new threat of climate change.
