abstract: This paper discusses what actually happened during the October 1987 market break and the days immediately before.
  It attempts to lay out a set of stylized facts that describe differing categories of traders and how they behaved and reacted
  to each other during those days. We believe that this description of what actually happened provides a necessary starting
  point for financial economists interested in explaining the stock market break. Our discussion here will rely heavily on
  the report of the Presidential Task Force on Market Mechanisms, created by Ronald Reagan to investigate these events, as
  well as on the reports of the Securities and Exchange Commission and the Commodity Futures Trading Commission. [Both authors
  were staff members with the Presidential Task Force on Market Mechanisms.] We focus on trading activity on the New York
  Stock Exchange (NYSE) and on the S&amp;P 500 stock index futures contract traded on the Chicago Mercantile Exchange (CME).
