abstract: 'This Anomalies column examines the distinction between decision utility
  (the weight assigned to outcomes in decisions) and experienced utility (the hedonic
  quality of outcomes). A rational agent''s decisions should maximize experienced
  utility, but systematic errors in predicting future hedonic states—hedonic forecasting
  errors—cause decision utility to diverge from experienced utility. Four categories
  of errors are reviewed: (1) effects of current emotional state (projection bias,
  hot-cold empathy gaps), (2) effects of choice context (joint vs separate evaluation),
  (3) failures to learn from past experience (peak/end rule, duration neglect), and
  (4) misprediction of adaptation (focusing illusion). Key parameters: Peak/End r=0.67,
  projection bias 78% vs 42%, tenure misprediction 2-3×.'
