summary:
  abstract_extended: 'This JEP Anomalies column by Kahneman and Thaler provides a
    comprehensive review of the distinction between decision utility and experienced
    utility. The paper synthesizes research on hedonic forecasting errors—systematic
    mispredictions of future hedonic states—organized into four categories: (1) projection
    bias and hot-cold empathy gaps from current emotional states, (2) joint vs. separate
    evaluation effects from choice context, (3) peak/end rule and duration neglect
    from memory biases, and (4) focusing illusion from adaptation neglect. The paper
    argues that these errors are systematic, predictable, and have important implications
    for welfare economics and policy design. Key findings include Peak/End correlation
    r=0.67, projection bias effect (78% vs 42% unhealthy choices), and tenure decision
    misprediction by factor of 2-3×.'
  key_findings: "1. DECISION ≠ EXPERIENCED UTILITY: What people choose (decision utility)\n\
    \   may not maximize their well-being (experienced utility)\n\n2. FOUR ERROR CATEGORIES:\n\
    \   - Current state effects (projection bias, hot-cold empathy gaps)\n   - Context\
    \ effects (joint vs. separate evaluation)\n   - Memory biases (peak/end rule,\
    \ duration neglect)\n   - Adaptation neglect (focusing illusion)\n\n3. PROJECTION\
    \ BIAS: Hungry shoppers chose 78% unhealthy snacks\n   vs 42% when satiated (Read\
    \ & van Leeuwen 1998)\n\n4. PEAK/END RULE: r = 0.67 prediction of retrospective\n\
    \   evaluation from (Peak + End)/2\n\n5. DURATION NEGLECT: Subjects preferred\
    \ longer painful\n   experience due to better ending (cold-pressor)\n\n6. FOCUSING\
    \ ILLUSION: \"Nothing in life is as important as\n   you think it is while you\
    \ are thinking about it\"\n\n7. TENURE MISPREDICTION: Predicted effects 2-3× larger\n\
    \   than actual effects (Gilbert et al.)"
