abstract: The September 11 terrorist attacks ignited global interest in the Middle East. Observers in the region and abroad
  were quick to highlight the development “deficits” in Middle Eastern countries which have been linked to everything from
  structural economic imbalances to deficient political systems, the curse of natural resources, and even culture and religion.
  This paper reviews the development history of the Middle East and North Africa region in the post-World War II era, providing
  a framework for understanding past outcomes, current challenges and the potential for economic and political reform.
