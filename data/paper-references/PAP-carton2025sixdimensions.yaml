abstract: |
  One of the most important features on which to judge the merit of any academic
  paper is the strength of its theory. Although commentary about what constitutes
  strong theory is widespread, there is no holistic account of the full range of
  existing perspectives. To address this oversight, I construct a typology composed
  of six dimensions of strong theory: importance, interestingness, actionability,
  generality, simplicity, and accuracy. This typology provides a lens to examine a
  vexing problem: the effort to increase the strength of a theory on one dimension
  will usually compromise its strength on others. Despite this reality, authors
  experience pressure in the review process to optimize theories on all six
  dimensions. I explain how the expectation to build theories that cannot possibly
  be built (what I call the fruitless search for unicorn theories) is driven by
  historical forces. The study of organizations emerged not from one source but
  from a half-dozen distinct traditions. Review teams are often composed of
  referees who hail from different traditions and possess divergent views on
  theory. I recommend that authors, reviewers, and editors (1) prioritize fewer
  dimensions in any single theory and (2) emphasize distinct dimensions in
  different theories on the same topic.

key_findings_structured:
  S1_research_question: "What are the core dimensions on which to evaluate the strength of a theory, and how do these dimensions relate to each other?"
  S2_methodology: "Systematic synthesis of 284 commentaries on theory strength; Wordnet linguistic validation (Wu-Palmer similarity scores); Python computational test of 1,000 out of 63.4M possible 6-dimensional configurations; OSF-deposited code and data."
  S3_sample_data: "284 editorials and commentaries on theory from organizational science journals; 14 emergent themes distilled into 6 dimensions."
  S4_findings:
    - finding: "Six dimensions of strong theory identified and validated"
      source_section: "Section 2-3"
      formal_result: "importance, interestingness, actionability, generality, simplicity, accuracy — validated via between/within variation analysis (b=0.10, SE=0.033, t=2.99, p=0.003)"
    - finding: "Two groups of dimensions serve different functions"
      source_section: "Section 4"
      formal_result: "First three (importance, interestingness, actionability) = stages of consumption (input-process-output); last three (generality, simplicity, accuracy) = structure of logic"
    - finding: "Trade-offs among dimensions are inevitable"
      source_section: "Section 5"
      formal_result: "4 positive covariation links (generality→importance, simplicity→importance, simplicity→actionability, accuracy→actionability) and 9 negative covariation links (trade-offs), depicted in 'theory hexagon'"
    - finding: "Six intellectual traditions drive conflicting reviewer expectations"
      source_section: "Section 6"
      formal_result: "Applied scientists (actionability), disciplinary scholars (generality), empiricists (accuracy), humanists (importance), narrative scholars (interestingness), analytical modelers (simplicity)"
    - finding: "Unicorn theories are impossible — optimize subset per paper, all six across program"
      source_section: "Section 8-9"
      formal_result: "Each dimension should be unnecessary-and-potentially-sufficient per paper; all six necessary across research program. 12 guidelines for authors, reviewers, editors (Table 2)."
  S5_validity: "Computational validation via Wordnet similarity scores and 1,000-configuration Monte Carlo test. Top-ranked configuration matched original framework. OSF-deposited replication materials."
  S6_reproducibility: "Code and data deposited on Open Science Framework. Wordnet analysis and Python configuration test fully reproducible."

