summary:
  abstract_extended: 'This paper studies how social norms are enforced through decentralized

    sanctioning. We show that individuals willingly bear costs to punish norm

    violators, even when they cannot benefit from the punishment directly.

    This altruistic punishment is key to understanding norm enforcement in

    large groups.'
  key_findings: "1. DECENTRALIZED PUNISHMENT\n   - Individuals punish at personal cost\n   - No direct benefit to punisher\n\
    \   - Sustains cooperation in groups\n\n2. ALTRUISTIC PUNISHMENT\n   - Punishers are strong reciprocators\n   - Emotion-driven\
    \ responses\n   - Effective deterrence\n\n3. NORM STABILITY\n   - Norms persist with punishment\n   - Violation rates\
    \ decline\n   - Self-enforcing equilibrium"
  ebf_relevance: '10C DIMENSIONS:

    - WHAT (C): Punishment utility

    - HOW (B): Norm-behavior complementarity

    - WHEN (V): Decentralized vs centralized enforcement


    THEORY SUPPORT:

    - MS-SN-001: Social Norms

    - MS-SR-001: Strong Reciprocity (punishment)

    - Foundation for altruistic punishment research


    KEY INSIGHT:

    Decentralized punishment by strong reciprocators is sufficient to enforce

    social norms without central authority.'
