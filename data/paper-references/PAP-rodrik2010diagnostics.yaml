abstract: 'Development economists should stop acting as categorical advocates (or detractors) for specific approaches to development.
  They should instead be diagnosticians, helping decisionmakers choose the right model (and remedy) for their specific realities,
  among many contending models (and remedies). In this spirit, Ricardo Hausmann, Andres Velasco, and I have developed a “growth
  diagnostics” framework that sketches a systematic process for identifying binding constraints and prioritizing policy reforms
  in multilateral agencies and bilateral donors. Growth diagnostics is based on the idea that not all constraints bind equally
  and that a sensible and practical strategy consists of identifying the most serious constraint(s) at work. The practitioner
  works with a decision tree to do this. The second step in growth diagnostics is to identify remedies for relaxing the constraint
  that are appropriate to the context and take cognizance of potential second-best complications. Successful countries are
  those that have implemented these two steps in an ongoing manner: identify sequentially the most binding constraints and
  remove them with locally suited remedies. Diagnostics requires pragmatism and eclecticism, in the use of both theory and
  evidence. It has no room for dogmatism, imported blueprints, or empirical purism.'
