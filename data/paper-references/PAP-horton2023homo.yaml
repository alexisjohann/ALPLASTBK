abstract: 'Newly-developed large language models (LLM)-because of how they are trained and designed -are implicit computational
  models of humans-a homo silicus.LLMs can be used like economists use homo economicus: they can be given endowments, information,
  preferences, and so on, and then their behavior can be explored in scenarios via simulation.Experiments using this approach,
  derived from Charness and Rabin (2002), Kahneman, Knetsch andThaler (1986), andSamuelson andZeckhauser (1988) show qualitatively
  similar results to the original, but it is also easy to try variations for fresh insights.LLMs could allow researchers to
  pilot studies via simulation first, searching for novel social science insights to test in the real world.'
