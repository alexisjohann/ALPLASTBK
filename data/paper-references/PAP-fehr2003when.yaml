summary:
  abstract_extended: 'This paper examines conditions under which social norms overpower competitive

    pressures. We show that even in highly competitive markets, social norms of

    fairness can prevent market clearing and sustain non-competitive outcomes.

    The strength of norms depends on the social context and institutional design.'
  key_findings: "1. NORMS VS COMPETITION\n   - Norms can override competition\n   - Fairness persists under pressure\n   -\
    \ Not all markets clear\n\n2. CONDITIONS FOR NORM DOMINANCE\n   - Repeated interactions help\n   - Social proximity matters\n\
    \   - Punishment opportunities key\n\n3. INSTITUTIONAL FACTORS\n   - Transparency affects norms\n   - Communication helps\n\
    \   - Design can tip balance"
  ebf_relevance: '10C DIMENSIONS:

    - WHAT (C): Social norms

    - HOW (B): Norm-competition interaction

    - WHEN (V): Context determines outcome


    THEORY SUPPORT:

    - MS-SN-001: Social Norms

    - Market design implications

