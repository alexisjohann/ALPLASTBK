abstract: We provide a nontechnical review of recent nonparametric methods for estimating density and regression functions.
  The methods we describe make it possible for a researcher to estimate a regression function or density without having to
  specify in advance a particular--and hence potentially misspecified functional form. We compare these methods to more popular
  parametric alternatives (such as OLS), illustrate their use in several applications, and demonstrate their flexibility with
  actual data and generated-data experiments. We show that these methods are intuitive and easily implemented, and in the
  appropriate context may provide an attractive alternative to “simpler” parametric methods.
