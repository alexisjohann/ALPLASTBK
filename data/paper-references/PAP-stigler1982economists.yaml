abstract: 'Dans la microéconomie standard, les préférences du consommateur sont considérées comme des données (variable exogène).
  George Stigler et Gary Becker cherchent ici à endogénéiser ces préférences, ce qui les place alors sur un des terrains favoris
  des sociologues : l’analyse des goûts. Notre collègue Christophe Longuet nous offre une traduction inédite de cet article
  canonique précédée d’une présentation. Son travail, en tout point remarquable, vous sera certainement très utile.'
