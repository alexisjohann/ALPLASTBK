title: Do Stock Prices Move Too Much?
author: Shiller
year: '1981'
publication_type: journal_article
doi: 10.1257/aer.71.3.421
abstract: This paper examines whether stock prices move too much to be justified by subsequent changes in dividends. Using
  a model where the real stock price equals the present value of rationally expected future real dividends discounted by a
  constant real discount rate, the paper tests variance bounds implied by the model. The analysis finds that stock prices
  have historically been far more volatile than could be justified based on any rational forecast of future dividends. The
  model is restated in innovation form which allows better understanding of the limits on stock price volatility imposed by
  the model. This finding challenged the widely-accepted efficient markets hypothesis and became one of the foundational papers
  of modern behavioral finance.
