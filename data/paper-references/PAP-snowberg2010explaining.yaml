abstract: 'The favorite–long shot bias describes the long-standing empirical regularity&#13;\nthat betting odds provide biased
  estimates of the probability&#13;\nof a horse winning: long shots are overbet whereas favorites are underbet.&#13;\nNeoclassical
  explanations of this phenomenon focus on rational&#13;\ngamblers who overbet long shots because of risk-love. The competing&#13;\nbehavioral
  explanations emphasize the role of misperceptions&#13;\nof probabilities. We provide novel empirical tests that can discriminate&#13;\nbetween
  these competing theories by assessing whether the models&#13;\nthat explain gamblers’ choices in one part of their choice
  set (betting&#13;\nto win) can also rationalize decisions over a wider choice set, including&#13;\ncompound bets in the
  exacta, quinella, or trifecta pools. Using a new, large-scale data set ideally suited to implement these tests, we find
  evidence in favor of the view that misperceptions of probability drive the favorite–long shot bias, as suggested by prospect
  theory.'
