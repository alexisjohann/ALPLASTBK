abstract: 'This paper organizes a discussion of the costs and benefits of cities around the question: Are cities becoming
  obsolete? While minimizing transport costs for manufactured goods no longer justifies the existence of cities, they still
  facilitate the division of labor and the flow of ideas. Cities'' higher housing, commuting, and pollution costs seem stable
  over time. Only the costs associated with urban poverty may increase and these costs do not effect many newer cities. Although
  many older cities will continue their decline, the future of the urban form seems surprisingly bright.'
