abstract: This paper presents and develops a quantitative method of literature reviewing and evaluating empirical research,
  meta-regression analysis or MRA. Economics is theory-driven. Yet, we must learn empirically if economics is to advance.
  MRA offers a more objective statistical method to summarize our empirical knowledge and to explain the wide study-to-study
  variation in economic research. MRA is used to assess the evidence for Ricardian equivalence, and its findings are contrasted
  to those of conventional narrative review. Furthermore, MRA establishes a platform from which to distinguish genuine empirical
  effect from the exploitable specification error that infests applied econometrics.
