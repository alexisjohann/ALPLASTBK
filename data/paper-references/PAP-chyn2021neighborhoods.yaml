abstract: How does one's place of residence affect individual behavior and long-run outcomes? Understanding neighborhood and
  place effects has been a leading question for social scientists during the past half-century. Recent empirical studies using
  experimental and quasi-experimental research designs have generated new insights on the importance of residential neighborhoods
  in childhood and adulthood. This paper summarizes the recent neighborhood effects literature and interprets the findings.
  Childhood neighborhoods affect long-run economic and educational outcomes in a manner consistent with exposure models of
  neighborhood effects. For adults, neighborhood environments matter for their health and well-being but have more ambiguous
  impacts on labor market outcomes. We discuss the evidence on the mechanisms behind the observed patterns and conclude by
  highlighting directions for future research.
