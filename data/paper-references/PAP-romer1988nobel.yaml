abstract: The 1986 Nobel Prize in economic science was awarded to James Buchanan. What the Nobel committee recognized in making
  its award was Buchanan's central role in the gradual transformation of the way economists and political scientists study
  governments and their relationship to the governed. In this essay, I will focus on Buchanan's contributions to public economics,
  especially his linking of economic and political concerns. Table 1 lists the 21 works by James Buchanan cited in this essay.
