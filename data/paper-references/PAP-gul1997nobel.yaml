abstract: 'The purpose of this essay is to celebrate the contributions of John C. Harsanyi, John F. Nash, and Reinhard Selten
  to economics. The emphasis is on tracing the influence of their work on economic analysis rather than giving a detailed
  account of each of their contributions. The three researchers are identified with the three most important ideas in game
  theory: equilibrium, asymmetric information, and credibility. These three ideas have dominated not only theoretical research
  but also numerous other fields within economics since the 1950s.'
