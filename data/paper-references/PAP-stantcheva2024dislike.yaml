abstract: 'This paper provides new evidence on a long-standing question asked by Shiller
  (1997): Why do we dislike inflation?I conducted two surveys on representative samples
  of the US population to elicit people''s perceptions about the impacts of inflation
  and their reactions to it.The predominant reason for people''s aversion to inflation
  is the widespread belief that it diminishes their buying power, as neither personal
  nor general wage increases seem to match the pace of rising prices.As a result,
  respondents report having to make costly adjustments in their budgets and behaviors,
  especially among lower-income groups.Inflation also provokes stress, emotional responses,
  and a sense of inequity, as the wages of high-income individuals are perceived to
  grow more rapidly amidst inflation.Many respondents believe that firms have considerable
  discretion in setting wages, opting not to raise them in order to boost profits,
  rather than being compelled by market dynamics.The potential positive associations
  of inflation, such as with reduced unemployment or enhanced economic activity, are
  typically not recognized by respondents.Inflation ranks high in priority among various
  economic and social issues, with respondents blaming the government and businesses
  for it.I also highlight a substantial polarization in attitudes towards inflation
  along partisan lines, as well as across income groups.'
