abstract: This paper provides an overview of the monetary transmission mechanism describing the impact of changes in monetary
  policy on real GDP. Changes in financial market prices--including long-term interest rates and exchange rates--are the main
  vehicle for the transmission of policy. The framework incorporates rational expectations and policy rules. It is empirical
  and appears to fit the facts well.
