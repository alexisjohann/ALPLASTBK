abstract: Uncertainty appears to jump up after major shocks like the Cuban Missile
  crisis, the assassination of JFK, the OPEC I oil‐price shock, and the 9/11 terrorist
  attacks. This paper offers a structural framework to analyze the impact of these
  uncertainty shocks. I build a model with a time‐varying second moment, which is
  numerically solved and estimated using firm‐level data. The parameterized model
  is then used to simulate a macro uncertainty shock, which produces a rapid drop
  and rebound in aggregate output and employment. This …
