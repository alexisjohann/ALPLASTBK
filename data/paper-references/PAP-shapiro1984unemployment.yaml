summary:
  abstract_extended: 'This paper shows how the information structure of employer-employee

    relationships, in particular the inability of employers to costlessly observe

    workers'' on-the-job effort, can explain involuntary unemployment as an

    equilibrium phenomenon. Indeed, imperfect monitoring necessitates unemployment

    in equilibrium.


    The key insight is that with imperfect monitoring and full employment, workers

    would choose to shirk because the worst that could happen is being fired and

    immediately rehired elsewhere. Unemployment serves as a worker discipline

    device by making job loss costly. In equilibrium, all firms pay wages above

    market-clearing levels, creating unemployment that provides the penalty

    necessary to deter shirking.'
  key_findings: "1. UNEMPLOYMENT AS DISCIPLINE: Equilibrium unemployment makes job\
    \ loss costly,\n   providing incentive for workers not to shirk\n\n2. EFFICIENCY\
    \ WAGES: All firms pay above market-clearing wages to induce\n   effort; no firm\
    \ can profitably cut wages because workers would shirk\n\n3. IMPERFECT MONITORING:\
    \ The model requires that employers cannot costlessly\n   observe worker effort\
    \ - if monitoring were free, no unemployment needed\n\n4. NO-SHIRKING CONDITION\
    \ (NSC): Workers must be paid enough that the expected\n   utility of not shirking\
    \ exceeds the utility of shirking\n\n5. AGGREGATE DEMAND EFFECTS: Factors that\
    \ increase aggregate labor demand\n   (like government spending) can actually\
    \ increase unemployment\n\n6. POLICY IMPLICATIONS: Monitoring costs, unemployment\
    \ benefits, and labor\n   market structure all affect equilibrium unemployment\
    \ rate"
