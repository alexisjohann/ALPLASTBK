abstract: 'Involuntary unemployment appears to be a persistent feature of many modem
  labor markets. The presence of such unemploy-ment raises the question of why wages
  do not fall to clear labor markets. In this paper we show how the information structure
  of employer-employee relationships, in particular the inability of employers to
  costlessly observe workers'' on-the-job effort, can explain involuntary unemployment''as
  an equi-librium phenomenon. Indeed, we show that imperfect monitoring necessitates
  unemployment in equilibrium.

  The intuition behind our result is simple. Under the conventional competitive para-digm,
  in which all workers receive the market wage and there is no unemployment, the worst
  that can happen to a worker who shirks on the job is that he is fired. Since he
  can immediately be rehired, however, he pays no penalty for his misdemeanor. With
  imperfect monitoring and full employment, therefore, workers will choose to shirk.
  To induce its workers not to shirk, the firm attempts to pay more than the" going
  wage"; then, if a worker is caught shirking and is fired, he will pay a penalty.
  If it pays one firm to raise its wage, however, it will pay all firms to raise their
  wages. When they all raise their wages, the incentive not to shirk again disappears.
  But as all firms raise their wages, their demand for labor decreases, and unemployment
  results. With unemployment, even if all firms pay the same wages, a worker has an
  incentive not to shirk. For, if he is fired,'
