abstract: This paper reports experiments designed to study strategic sophistication,
  the extent to which behavior in games reflects attempts to predict others' decisions,
  taking their incentives into account. We study subjects' initial responses to normal‐form
  games with various patterns of iterated dominance and unique pure‐strategy equilibria
  without dominance, using a computer interface that allowed them to search for hidden
  payoff information, while recording their searches. Monitoring subjects' information
  searches along with their …
