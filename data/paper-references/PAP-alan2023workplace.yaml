title: 'Improving Workplace Climate in Large Corporations: A Clustered Randomized Intervention'
year: '2023'
doi: 10.1093/qje/qjac034
publication_type: journal_article
abstract: We evaluate the impact of a training program aimed at improving the relational atmosphere in the workplace. The
  program encourages prosocial behavior and the use of professional language, focusing primarily on leaders’ behavior and
  leader-subordinate interactions. We implement this program using a clustered randomized design involving over 3,000 headquarters
  employees of 20 large corporations in Turkey. We evaluate the program with respect to employee separation, pro- and antisocial
  behavior, the prevalence of support networks, and perceived workplace climate. We find that treated firms have a lower likelihood
  of employee separation at the leadership level, fewer employees lacking professional and personal help, and denser, less
  segregated support networks. We also find that employees in treated corporations are less inclined to engage in toxic competition,
  exhibit higher reciprocity toward each other, and report higher workplace satisfaction and a more collegial environment.
  The program’s success in improving leader-subordinate relationships emerges as a likely mechanism to explain these results.
  Treated subordinates report higher professionalism and empathy in their leaders and are more likely to consider their leaders
  as professional support providers.
