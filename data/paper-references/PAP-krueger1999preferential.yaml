abstract: Preferential trade arrangements, and especially free trade agreements, have mushroomed in importance in the 1990s.
  This has revived research on the effects of these arrangements, both on the welfare of the member countries and those excluded,
  and on the momentum for further liberalization of the open multilateral trading system. This paper reviews the analyses
  and evidence to date as to these effects, showing that analytically anything can happen and that, to date, there has been
  insufficient experience to draw conclusions from empirical evidence.
