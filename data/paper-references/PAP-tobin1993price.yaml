abstract: In this symposium I shall play the role in which I was cast, the unreconstructed old Keynesian. Considering the
  alternatives, I do not mind being billed as a Keynesian, an old Keynesian at that. But old Keynesians come in several varieties,
  and I speak for no one but myself. Nor do I defend the literal text of The General Theory. Several generations of economists
  have criticized, amended, and elaborated that seminal work. I shall argue for the validity of the major propositions that
  distinguish Keynesian macroeconomics from old or new classical macroeconomics.
