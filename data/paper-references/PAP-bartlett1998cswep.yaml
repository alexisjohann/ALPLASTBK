abstract: The history and achievements of the American Economic Association's (AEA) Committee on the Status of Women in the
  Economics Profession (CSWEP) over the past twenty-five years are reviewed. A picture of women's standing in the economics
  profession in 1972 is drawn with statistics on the number of women on economics faculties, on prestigious editorial boards,
  and on the AEA program at its national meeting. While 1997 statistics reveal considerable progress for women in the profession,
  several questions and challenges for the next twenty-five years are outlined with suggestions as to how CSWEP hopes to address
  them.
