abstract: 'One of the problems which has plagued those attempting to predict the behavior of capital markets is the absence
  of a body of positive microeconomic theory dealing with conditions of risk. Although many useful insights can be obtained
  from the traditional models of investment under conditions of certainty, the pervasive influence of risk in financial transactions
  has forced those working in this area to adopt models of price behavior which are little more than assertions. A typical
  classroom explanation of the determination of capital asset prices, for example, usually begins with a careful and relatively
  rigorous description of the process through which individual preferences and physical relationships interact to determine
  an equilibrium pure interest rate. This is generally followed by the assertion that somehow a market risk-premium is also
  determined, with the prices of assets adjusting accordingly to account for differences in their risk. A useful representation
  of the view of the capital market implied in such discussions is illustrated in Figure 1. In equilibrium, capital asset
  prices have adjusted so that the investor, if he follows rational procedures (primarily diversification), is able to attain
  any desired point along a capital market line.11 Although some discussions are also consistent with a non-linear (but monotonic)
  curve. He may obtain a higher expected rate of return on his holdings only by incurring additional risk. In effect, the
  market presents him with two prices: the price of time, or the pure interest rate (shown by the intersection of the line
  with the horizontal axis) and the price of risk, the additional expected return per unit of risk borne (the reciprocal of
  the slope of the line). At present there is no theory describing the manner in which the price of risk results from the
  basic influences of investor preferences, the physical attributes of capital assets, etc. Moreover, lacking such a theory,
  it is difficult to give any real meaning to the relationship between the price of a single asset and its risk. Through diversification,
  some of the risk inherent in an asset can be avoided so that its total risk is obviously not the relevant influence on its
  price; unfortunately little has been said concerning the particular risk component which is relevant. In the last ten years
  a number of economists have developed normative models dealing with asset choice under conditions of risk. Markowltz,22
  Harry M. Markowitz, Portfolio Selection, Efficient Diversification of Investments (New York: John Wiley and Sons, Inc.,
  1959). The major elements of the theory first appeared in his article “Portfolio Selection,” The Journal of Finance, XII
  (March 1952), 77–91. following Von Neumann and Morgenstern, developed an analysis based on the expected utility maxim and
  proposed a general solution for the portfolio selection problem. Tobin33 James Tobin, “Liquidity Preference as Behavior
  Towards Risk,” The Review of Economic Studies, XXV (February, 1958), 65–86. showed that under certain conditions Markowitz''s
  model implies that the process of investment choice can be broken down into two phases: first, the choice of a unique optimum
  combination of risky assets; and second, a separate choice concerning the allocation of funds between such a combination
  and a single riskless asset. Recently, Hicks44 John R. Hicks, “Liquidity,” The Economic Journal, LXXII (December, 1962),
  787–802. has used a model similar to that proposed by Tobin to derive corresponding conclusions about individual investor
  behavior, dealing somewhat more explicitly with the nature of the conditions under which the process of investment choice
  can be dichotomized. An even more detailed discussion of this process, including a rigorous proof in the context of a choice
  among lotteries has been presented by Gordon and Gangolli.55 M. J. Gordon and Ramesh Gangolli, “Choice Among and Scale of
  Play on Lottery Type Alternatives,” College of Business Administration, University of Rochester, 1962. For another discussion
  of this relationship see W. F. Sharpe, “A Simplified Model for Portfolio Analysis,” Management Science, Vol. 9, No. 2 (January
  1963), 277–293. A related discussion can be found in F. Modigliani and M. H. Miller, “The Cost of Capital, Corporation Finance,
  and the Theory of Investment,” The American Economic Review, XLVIII (June 1958), 261–297. Although all the authors cited
  use virtually the same model of investor behavior,66 Recently Hirshleifer has suggested that the mean-variance approach
  used in the articles cited is best regarded as a special case of a more general formulation due to Arrow. See Hirshleifer''s
  “Investment Decision Under Uncertainty,” Papers and Proceedings of the Seventy-Sixth Annual Meeting of the American Economic
  Association, Dec. 1963, or Arrow''s “Le Role des Valeurs Boursieres pour la Repartition la Meilleure des Risques,” International
  Colloquium on Econometrics, 1952. none has yet attempted to extend it to construct a market equilibrium theory of asset
  prices under conditions of risk.77 After preparing this paper the author learned that Mr. Jack L. Treynor, of Arthur D.
  Little, Inc., had independently developed a model similar in many respects to the one described here. Unfortunately Mr.
  Treynor''s excellent work on this subject is, at present, unpublished. We will show that such an extension provides a theory
  with implications consistent with the assertions of traditional financial theory described above. Moreover, it sheds considerable
  light on the relationship between the price of an asset and the various components of its overall risk. For these reasons
  it warrants consideration as a model of the determination of capital asset prices. Part II provides the model of individual
  investor behavior under conditions of risk. In Part III the equilibrium conditions for the capital market are considered
  and the capital market line derived. The implications for the relationship between the prices of individual capital assets
  and the various components of risk are described in Part IV. Investors are assumed to prefer a higher expected future wealth
  to a lower value, ceteris paribus ( dU/dE w > 0 ) . Moreover, they exhibit risk-aversion, choosing an investment offering
  a lower value of σw to one with a greater level, given the level of E w ( dU / d σ w < 0 ) . These assumptions imply that
  indifference curves relating Ew and σw will be upward-sloping.99 While only these characteristics are required for the analysis,
  it is generally assumed that the curves have the property of diminishing marginal rates of substitution between Ew and σw,
  as do those in our diagrams. Figure 2 summarizes the model of investor preferences in a family of indifference curves; successive
  curves indicate higher levels of utility as one moves down and/or to the right.1010 Such indifference curves can also be
  derived by assuming that the investor wishes to maximize expected utility and that his total utility can be represented
  by a quadratic function of R with decreasing marginal utility. Both Markowitz and Tobin present such a derivation. A similar
  approach is used by Donald E. Farrar in The Investment Decision Under Uncertainty (Prentice-Hall, 1962). Unfortunately Farrar
  makes an error in his derivation; he appeals to the Von-Neumann-Morgenstern cardinal utility axioms to transform a function
  of the form: E ( U ) = a + bE R − cE R 2 − c σ R 2 into one of the form: E ( U ) = k 1 E R − k 2 σ R 2 . That such a transformation
  is not consistent with the axioms can readily be seen in this form, since the first equation implies non-linear indifference
  curves in the ER, σ R 2 plane while the second implies a linear relationship. Obviously no three (different) points can
  lie on both a line and a non-linear curve (with a monotonic derivative). Thus the two functions must imply different orderings
  among alternative choices in at least some instance. The model of investor behavior considers the investor as choosing from
  a set of investment opportunities that one which maximizes his utility. Every investment plan available to him may be represented
  by a point in the ER, σR plane. If all such plans involve some risk, the area composed of such points will have an appearance
  similar to that shown in Figure 2. The investor will choose from among all possible plans the one placing him on the indifference
  curve representing the highest level of utility (point F). The decision can be made in two stages: first, find the set of
  efficient investment plans and, second choose one from among this set. A plan is said to be efficient if (and only if) there
  is no alternative with either (1) the same ER and a lower σR, (2) the same σR and a higher ER or (3) a higher ER and a lower
  σR. Thus investment Z is inefficient since investments B, C, and D (among others) dominate it. The only plans which would
  be chosen must lie along the lower right-hand boundary (AFBDCX)—the investment opportunity curve. Note that this relationship
  includes rab, the correlation coefficient between the predicted rates of return of the two investment plans. A value of
  +1 would indicate an investor''s belief that there is a precise positive relationship between the outcomes of the two investments.
  A zero value would indicate a belief that the outcomes of the two investments are completely independent and —1 that the
  investor feels that there is a precise inverse relationship between them. In the usual case rab will have a value between
  0 and +1. Figure 3 shows the possible values of ERc and σRc obtainable with different combinations of A and B under two
  different assumptions about the value of rab. If the two investments are perfectly correlated, the combinations will lie
  along a straight line between the two points, since in this case both ERc and σRc will be linearly related to the proportions
  invested in the two plans.1111 E Rc = α E Ra + ( 1 − α ) E R b = E Rb + ( E R a − E R b ) α σ R c = α 2 σ R a 2 + ( 1 −
  α ) 2 σ Rb 2 + 2 r ab α ( 1 − α ) σ Ra σ Rb but r ab = 1 , therefore the expression under the square root sign can be factored:
  σ Rc = [ α σ Ra + ( 1 − α ) σ R b ] 2 = α σ Ra + ( 1 − α ) σ Rb = σ Rb + ( σ Ra − σ Rb ) α If they are less than perfectly
  positively correlated, the standard deviation of any combination must be less than that obtained with perfect correlation
  (since rab will be less); thus the combinations must lie along a curve below the line AB.1212 This curvature is, in essence,
  the rationale for diversification. AZB shows such a curve for the case of complete independence ( r ab = 0 ) ; with negative
  correlation the locus is even more U-shaped.1313 When r ab = 0 , the slope of the curve at point A is − σ Ra E Rb − E Ra
  , at point B it is σ Rb E Rb − E Ra . When r ab = − 1 , the curve degenerates to two straight lines to a point on the horizontal
  axis. The manner in which the investment opportunity curve is formed is relatively simple conceptually, although exact solutions
  are usually quite difficult.1414 Markowitz has shown that this is a problem in parametric quadratic programming. An efficient
  solution technique is described in his article, “The Optimization of a Quadratic Function Subject to Linear Constraints,”
  Naval Research Logistics Quarterly, Vol. 3 (March and June, 1956), 111–133. A solution method for a special case is given
  in the author''s “A Simplified Model for Portfolio Analysis,” op. cit. One first traces curves indicating ER, σR values
  available with simple combinations of individual assets, then considers combinations of combinations of assets. The lower
  right-hand boundary must be either linear or increasing at an increasing rate ( d 2 σ R / dE 2 R > 0 ). As suggested earlier,
  the complexity of the relationship between the characteristics of individual assets and the location of the investment opportunity
  curve makes it difficult to provide a simple rule for assessing the desirability of individual assets, since the effect
  of an asset on an investor''s over-all investment opportunity curve depends not only on its expected rate of return (ERi)
  and risk σRi), but also on its correlations with the other available opportunities (ri1, ri2, …., rin). However, such a
  rule is implied by the equilibrium conditions for the model, as we will show in part IV. This implies that all combinations
  involving any risky asset or combination of assets plus the riskless asset must have values of ERc and σRc which lie along
  a straight line between the points representing the two components. Thus in Figure 4 all combinations of ER and σR lying
  along the line PA are attainable if some money is loaned at the pure rate and some placed in A. Similarly, by lending at
  the pure rate and investing in B, combinations along PB can be attained. Of all such possibilities, however, one will dominate:
  that investment plan lying at the point of the original investment opportunity curve where a ray from point P is tangent
  to the curve. In Figure 4 all investments lying along the original curve from X to ϕ are dominated by some combination of
  investment in ϕ and lending at the pure interest rate. Consider next the possibility of borrowing. If the investor can borrow
  at the pure rate of interest, this is equivalent to disinvesting in P. The effect of borrowing to purchase more of any given
  investment than is possible with the given amount of wealth can be found simply by letting a take on negative values in
  the equations derived for the case of lending. This will obviously give points lying along the extension of line PA if borrowing
  is used to purchase more of A; points lying along the extension of PB if the funds are used to purchase B, etc. As in the
  case of lending, however, one investment plan will dominate all others when borrowing is possible. When the rate at which
  funds can be borrowed equals the lending rate, this plan will be the same one which is dominant if lending is to take place.
