abstract: First, Ken Arrow was my teacher and Ph. D. advisor, and most likely I would not have become an economist at all,
  had it not been for him. I was a math major in college and intended to continue in that direction until I happened to take
  a course of Ken’s--not on social choice theory, but on “information economics.” The course was a hodgepodge--essentially,
  anything that Ken felt like talking about. And it often seemed as though he decided on what to talk about on his way to
  the classroom (if then); the lectures had an improvised quality. But they were mesmerizing, and, mainly because of that
  course, I switched to economics.
