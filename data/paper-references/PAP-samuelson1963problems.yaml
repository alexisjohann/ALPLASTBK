abstract: This discussion paper from the AEA's 75th annual meeting critiques Friedman's methodological position that economic
  theories should be evaluated only on predictions, not assumptions. Samuelson disparagingly terms this the F-Twist and takes
  a deductivist position, charging that Friedman's approach amounts to affirming the consequent. Samuelson argues that unrealistic
  assumptions can lead to unscientific cherry-picking of results and emphasizes the importance of evaluating assumptions for
  scientific validity.
