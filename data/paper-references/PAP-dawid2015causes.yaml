abstract: We welcome Professor Pearl’s comment on our original article, Dawid et al. Our focus there on the distinction between
  the “Effects of Causes” (EoC) and the “Causes of Effects” (CoE) concerned two fundamental problems, one a theoretical challenge
  in statistics and the other a practical challenge for trial courts. In this response, we seek to accomplish several things.
  First, using Pearl’s own notation, we attempt to clarify the similarities and differences between his technical approach
  and that in Dawid et al. Second, we consider the more practical challenges for CoE in the trial court setting, and explain
  why we believe Pearl’s analyses, as described via his example, fail to address these. Finally, we offer some concluding
  remarks.
