abstract: This book examines economic bubbles and is named after Federal Reserve Chairman Alan Greenspans famed comment about
  irrational exuberance warning of such a possible bubble. The term behavioral finance refers to research on financial markets
  that takes into account the details of human behavior, including human psychology and sociology. Psychologically driven
  volatility is an inherent characteristic of all asset markets. Home prices in some areas were six to nine times greater
  than median income, far above historical long-term averages. Home prices, when adjusted for inflation, have produced very
  modest returns of less than one percent per year when measured over long-term periods. The cyclically adjusted price earnings
  ratio, or the Shiller CAPE, has become a pillar of modern finance and grew out of research that earned the Nobel Prize in
  economics.
