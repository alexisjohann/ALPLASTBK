abstract: Neuroeconomics has investigated which regions of the brain are associated with the factors contributing to economic
  decision making, emphasizing the position in space of brain areas associated with the factors of decision making—cognitive
  or emotive, rational or irrational. An alternative view of the brain has given priority to time over space, investigating
  the temporal patterns of brain dynamics to determine the nature of the brain's intrinsic dynamics, how its various activities
  change over time. These two ways of approaching the brain are contrasted in this essay to gauge the contemporary status
  of neuroeconomics.
