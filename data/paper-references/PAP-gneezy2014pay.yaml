title: Pay What You Want, Identity, and Self-Signaling in Markets
author: Gneezy
year: '2014'
publication_type: journal_article
doi: 10.1073/pnas.1120893109
abstract: This paper investigates identity and self-image under pay-what-you-want pricing. Three field experiments show that
  when granted the opportunity to name the price, fewer consumers choose to buy than when the price is fixed and low. This
  opt-out behavior is driven by identity and self-image concerns - individuals feel bad paying less than the appropriate price,
  causing them to pass on the purchase altogether. The studies found diners paid more when anonymous than when observed, showing
  that self-signaling regarding being a good person loses power when others can observe the behavior.
