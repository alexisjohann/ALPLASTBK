abstract: German separation in 1949 into a communist East and a capitalist West and their reunification in 1990 are commonly
  described as a natural experiment to study the enduring effects of communism. We show in three steps that the populations
  in East and West Germany were far from being randomly selected treatment and control groups. First, the later border is
  already visible in many socio-economic characteristics in pre-World War II data. Second, World War II and the subsequent
  occupying forces affected East and West differently. Third, a selective fifth of the population fled from East to West Germany
  before the building of the Wall in 1961. In light of our findings, we propose a more cautious interpretation of the extensive
  literature on the enduring effects of communist systems on economic outcomes, political preferences, cultural traits, and
  gender roles.
