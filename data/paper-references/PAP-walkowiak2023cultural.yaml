abstract: |
  Self-estimation of one's own cognitive abilities is crucial for many everyday tasks
  and plays an important role in determining clinical outcomes. Yet, the accuracy
  of self-estimated cognitive abilities is moderated by a variety of both internal and
  external factors. Here, using data from over 387,000 participants from 46 countries
  who played Sea Hero Quest — a mobile game designed to test spatial navigation
  ability — we investigated the cultural determinants of the gap between self-estimated
  navigation ability and actual wayfinding performance. Gender equality, as measured
  by the Gender Gap Index, and individualism were found to be significant predictors
  of the self-estimation gap at the country level.

