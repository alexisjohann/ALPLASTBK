summary:
  abstract_extended: "Several studies, most of them employing straightforward regression analysis,\nhave concluded that immigrants'\
    \ proficiency in the language of their adopted\ncountry is correlated with their productivity, as measured by earnings.\n\
    \nTwo weaknesses of these studies are:\n1. Potential unobserved heterogeneity, which could result in over-estimated\n\
    \   effects if overall ability is linked with language acquisition\n2. Potential measurement error in the language proficiency\
    \ measures, which\n   would probably result in under-estimation of language effects\n\nThe present study, which uses panel\
    \ data for a 10-year period in Germany,\nyields evidence that the latter bias (measurement error) tends to be much\nlarger\
    \ than the former (unobserved heterogeneity), implying that language\nproficiency is FAR MORE IMPORTANT than suggested\
    \ by the existing literature."
  key_findings: '1. Measurement error in language proficiency causes DOWNWARD bias

    2. Corrected estimates: 2-3x larger than standard OLS estimates

    3. Language proficiency more important than previously thought

    4. Panel data approach (Germany 1984-94) addresses both biases

    5. Heterogeneity bias < Measurement error bias'
