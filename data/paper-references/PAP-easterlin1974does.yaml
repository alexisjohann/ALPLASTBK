abstract: Publisher Summary This chapter discusses the association of income and happiness. The basic data consist of statements
  by individuals on their subjective happiness, as reported in thirty surveys from 1946 through 1970, covering nineteen countries,
  including eleven in Asia, Africa, and Latin America. Within countries, there is a noticeable positive association between
