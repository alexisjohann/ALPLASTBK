abstract: The evolving federal budget process has placed increasing demands on, and given unique powers to, the economic forecasters
  at OMB, Treasury, CBO, and the Joint Tax Committee of Congress. On the whole, the forecasters have been highly professional
  in their work, but differences in estimating techniques and, especially, constraints imposed on their analysis by elected
  officials have limited their credibility. Both the Administration and Congress “game” the system and even ignore the budget
  rules when convenient. Thus, a sophisticated budget process can help, but cannot assure, sound fiscal policy in the absence
  of political will to make hard decisions.
