abstract: Given mounting evidence on the negative impact of early-life shocks for the wellbeing of people over the life course,
  a growing economics literature studies whether early-life policies have symmetric positive effects. This paper zooms in
  on research on this topic from the Nordic countries, where all families have access to a comprehensive set of early-life
  health programs, including prenatal, maternity, and well-infant care. I describe this Nordic model of universal early-life
  health policies and discuss the existing evidence on its causal effects from two categories of studies. First, studying
  the introduction of universal policies, research has documented important short- and long-run benefits for the health, education,
  and labor market trajectories of treated cohorts. Second, exploiting modern-day changes to policy design, research for now
  documents short- and medium-run impacts of universal care on primarily maternal and child health as well as parental investment
  behaviors. I conclude with directions for future research.
