title: 'Public Debts Capitalize into Housing Prices: Empirical Evidence for a New
  Perspective on Debt Incidence'
author: Stadelmann
year: '2014'
publication_type: journal_article
doi: 10.1007/s10797-013-9293-6
abstract: "This paper provides empirical evidence that public debts capitalize into property prices. Using panel data from Swiss cantons (1980-2009), we find that higher public debt levels lead to lower housing prices, with a debt capitalization elasticity of 0.15-0.25. The finding supports theories of fiscal federalism and Tiebout sorting, demonstrating that rational homebuyers anticipate future tax burdens from current debt levels."
