abstract: The authors tested for cross-cultural difference in predictors of life satisfaction.
  In Study 1 (39 nations, N = 54,446), they found that financial satisfaction was
  more strongly associated with life satisfaction in poorer nations, whereas home
  life satisfaction was more strongly related to life satisfaction in wealthy nations.
  In Study 2 (39 nations, N = 6,782), the authors found that satisfaction with esteem
  needs (e.g., the self and freedom) predicted global life satisfaction more strongly
  among people in individualist nations than people in collectivist nations. The present
  investigation provides support for the needs and values-as-moderators model of subjective
  well-being at the cultural level. The need for theories that account for culture-specific
  as well as universal predictors of life satisfaction will be discussed.
