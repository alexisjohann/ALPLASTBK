summary:
  abstract_extended: 'This paper examines how informal sanctions affect norm violations. We show

    that informal punishment by peers can effectively deter norm violations even

    without formal enforcement. The threat of social disapproval and ostracism

    provides a powerful enforcement mechanism.'
  key_findings: "1. INFORMAL SANCTIONS\n   - Social disapproval effective\n   - Ostracism powerful\n   - Reputation damage\n\
    \n2. DETERRENCE EFFECTS\n   - Violations decrease\n   - Anticipation matters\n   - Norm internalization\n\n3. COMPLEMENTARITY\n\
    \   - Formal and informal interact\n   - Can substitute or complement\n   - Context determines"
  ebf_relevance: '10C DIMENSIONS:

    - WHAT (C): Social sanction utility

    - HOW (B): Formal-informal complementarity

    - WHEN (V): Social context


    THEORY SUPPORT:

    - MS-SN-001: Social Norms

    - Informal enforcement mechanisms

    - Foundation for later work


    KEY INSIGHT:

    Informal sanctions by peers can effectively enforce norms without formal

    authority; social disapproval is a powerful motivator.'
