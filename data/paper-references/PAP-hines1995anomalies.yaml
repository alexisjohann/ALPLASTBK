abstract: What happens to a state's spending when it receives an unconditional grant from the federal government? The standard
  theoretical analysis predicts that the increase in spending will be the same as that generated by an equivalent increase
  in local incomes--or roughly 5-10 percent for most states. In contrast, numerous empirical analyses have found that spending
  increases by much more, with some estimates near 100 percent. This result is known as the ’flypaper effect,’ since the money
  appears to ‘stick where it hits.’ The authors review this evidence as well as other studies that find similar behavior in
  firms.
