abstract: 'If competitive equilibrium is defined as a situation in which prices are such that all arbitrage profits are eliminated,
  is it possible that a competitive economy always be in equilibrium? Clearly not, for then those who arbitrage make no (private)
  return from their (privately) costly activity. Hence the assumptions that all markets, including that for information, are
  always in equilibrium and always perfectly arbitraged are inconsistent when arbitrage is costly. We propose here a model
  in which there is an equilibrium degree of disequilibrium: prices …'
