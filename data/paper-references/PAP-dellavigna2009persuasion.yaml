abstract: We provide a selective survey of empirical evidence on the effects as well as the drivers of persuasive communication.
  We consider persuasion directed at consumers, voters, donors, and investors. We organize our review around four questions.
  First, to what extent does persuasion affect the behavior of each of these groups? Second, what models best capture the
  response to persuasive communication? Third, what are persuaders' incentives, and what limits their ability to distort communications?
  Finally, what evidence exists on the way persuasion affects equilibrium outcomes in economics and politics?
