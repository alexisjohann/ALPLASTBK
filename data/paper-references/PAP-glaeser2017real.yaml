abstract: Chinese housing prices rose by over 10 percent per year in real terms between 2003 and 2014 and are now between
  two and ten times higher than the construction cost of apartments. At the same time, Chinese developers built 100 billion
  square feet of residential real estate. This boom has been accompanied by a large increase in the number of vacant homes,
  held by both developers and households. This boom may turn out to be a housing bubble followed by a crash, yet that future
  is far from certain. The demand for real estate in China is so strong that current prices might be sustainable, especially
  given the sparse alternative investments for Chinese households, so long as the level of new supply is radically curtailed.
  Whether that happens depends on the policies of the Chinese government, which must weigh the benefits of price stability
  against the costs of restricting urban growth.
