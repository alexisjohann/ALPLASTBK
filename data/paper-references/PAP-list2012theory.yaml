abstract: This paper provides an introductory review of the theory of judgment aggregation. It introduces the paradoxes of
  majority voting that originally motivated the field, explains several key results on the impossibility of propositionwise
  judgment aggregation, presents a pedagogical proof of one of those results, discusses escape routes from the impossibility
  and relates judgment aggregation to some other salient aggregation problems, such as preference aggregation, abstract aggregation
  and probability aggregation. The present illustrative rather than exhaustive review is intended to give readers who are
  new to the field of judgment aggregation a sense of this rapidly growing research area.
