abstract: This philosophical essay addresses the frame problem in artificial intelligence and cognitive science. Fodor introduces
  the concept of a 'fridgeon' - a particle defined by whether his fridge is switched on - to demonstrate that simple acts
  can change countless properties in the universe, revealing deep problems with commonsense reasoning in AI. He likens the
  frame problem to 'Hamlet's problem' of when to stop thinking, arguing it 'goes as deep as the analysis of rationality.'
  The paper critiques the 'sleeping dogs' approach to AI reasoning and argues that the frame problem reveals fundamental differences
  between human and machine cognition. Fodor contends the problem is essentially about formalizing our intuitions about inductive
  relevance and distinguishing computationally relevant facts from irrelevant ones.
