abstract: 'This paper takes issue with the Porter-van der Linde claim that traditional benefit-cost analysis is a fundamental
  misrepresentation of the environmental problem. They contend that stringent environmental measures induce innovative efforts
  leading to improvements in abatement and production technologies that offset the costs of the regulations. Drawing both
  on basic economic theory and existing data on control costs, the authors argue that such offsets are special cases. The
  data indicate offsets are minuscule relative to control costs. There is no free lunch here: environmental programs must
  justify their costs by the benefits that improved environmental quality provides to society.'
