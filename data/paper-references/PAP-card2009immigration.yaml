abstract: "Immigration is often viewed as a proximate cause of the rising wage gap between highand\r\nlow-skilled workers.\
  \ Nevertheless, there is controversy over the appropriate\r\ntheoretical and empirical framework for measuring the presumed\
  \ effect, and over the\r\nprecise magnitudes involved. This paper offers an overview and synthesis of existing\r\nknowledge\
  \ on the relationship between immigration and inequality, focusing on evidence\r\nfrom cross-city comparisons in the U.S.\
  \ While some researchers have claimed that a\r\ncross-city research design is inherently flawed, I argue that the evidence\
  \ from cross-city\r\ncomparisons is remarkably consistent with recent findings based on aggregate time\r\nseries data. In\
  \ particular, cross-city and aggregate time series comparisons provide\r\nsupport for three key conclusions: (1) workers\
  \ with below high school education are\r\nperfect substitutes for those with a high school education; (2) “high school equivalent”\r\
  \nand “college equivalent” workers are imperfect substitutes, with an elasticity of\r\nsubstitution on the order of 2; (3)\
  \ within education groups, immigrants and natives are\r\nimperfect substitutes. Together these results imply that the average\
  \ impacts of recent\r\nimmigrant inflows on the relative wages of U.S. natives are small. The effects on overall\r\nwage\
  \ inequality (including natives and immigrants) are larger, reflecting the\r\nconcentration of immigrants in the tails of\
  \ the skill distribution and higher residual\r\ninequality among immigrants than natives. Even so, immigration accounts\
  \ for a small\r\nshare (5%) of the increase in U.S. wage inequality between 1980 and 2000."
