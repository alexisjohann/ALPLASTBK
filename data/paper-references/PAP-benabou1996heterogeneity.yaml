abstract: We examine how economic stratification affects inequality and growth over time. We study economies where heterogenous
  agents interact through local public goods or externalities (school funding, neighborhood effects) and economy-wide linkages
  (complementary skills. knowledge spillovers). We compare growth and welfare when families are stratified into homogeneous
  local communities and when they remain integrated. Segregation tends to minimize the losses from a given amount of heterogeneity,
  but integration reduces …
