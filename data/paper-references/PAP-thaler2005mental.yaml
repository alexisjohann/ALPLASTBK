abstract: This work integrates mental accounting with the economics of self-control, modeling the individual as an organization
  with two distinct psyches - a farsighted planner and a myopic doer. The planner maximizes lifetime utility while the doer
  cares only about current utility, creating a principal-agent problem within the individual. Mental accounts serve as a self-control
  device, with budgets and rules that constrain the doer's behavior. The framework explains phenomena like willpower depletion,
  the non-fungibility of money across mental accounts, and why budget violations are psychologically costly even when economically
  rational.
