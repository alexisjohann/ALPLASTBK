abstract: 'This article studies the role of political distortions in driving economic growth and development in Africa. We
  first discuss how existing theories based on long-run structural factors (e.g., pre-colonial and colonial institutions,
  or ethnic diversity) may not capture new data patterns in the region, including changes to political regimes, growth patterns,
  and their variation across regions with similar historical experiences. We then argue that a framework focused on political
  distortions (i.e., how political incentives impact resource allocation and economic outcomes) may have multiple benefits:
  it encapsulates many distortions observed in practice, including patronage, variations in contract enforcement and the role
  of political connections in firm outcomes; it unifies results in Africa and elsewhere; and it leaves a wide scope for policy
  analysis. We conclude by overviewing reforms that may curb such distortions, including changes to campaign financing rules,
  bureaucratic reform, free trade agreements, and technology.'
