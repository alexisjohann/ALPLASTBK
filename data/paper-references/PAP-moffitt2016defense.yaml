abstract: The NSF Economics program funds basic research in economics across all its disparate fields. Its budget has experienced
  a long period of stagnation and decline, with its real value in 2013 below that in 1980 and having declined by 50 percent
  as a percent of the total NSF budget. The number of grants made by the program has also declined over time, and its current
  budget is very small compared to that of many other funders of economic research. Over the years, NSF-supported research
  has supported many of the major intellectual developments in the discipline that have made important contributions to the
  study of public policy. The public goods argument for government support of basic economic research is strong. Neither private
  firms, foundations, nor private donors are likely to engage in the comprehensive support of all forms of economic research
  if NSF were not to exist. Select universities with large endowments are more likely to have the ability to support general
  economic research in the absence of NSF, but most universities do not have endowments sufficiently large to do so. Support
  for large-scale general purpose dataset collection is particularly unlikely to receive support from any nongovernment agency.
  On a priori grounds, it is likely that most NSF-funded research represents a net increase in research effort rather than
  displacing already-occurring effort by academic economists. Unfortunately, the empirical literature on the net aggregate
  impact of NSF economics funding is virtually nonexistent.
