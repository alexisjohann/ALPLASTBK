abstract: We show that Gul and Pesendorfer's [Econometrica 69 (2001) 1403] representation
  result for preferences with temptation and self-control can be reexpressed in terms
  of a costly intrapersonal conflict between a Planner and Doer, as in Thaler and
  Shefrin [J. Political Econ. 89 (1981) 392] and psychologists' standard view of self-control
  problems.
