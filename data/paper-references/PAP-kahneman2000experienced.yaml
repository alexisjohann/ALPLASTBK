summary:
  abstract_extended: 'This foundational chapter distinguishes experienced utility (Bentham''s pleasure/pain) from decision
    utility (revealed preferences). Using colonoscopy studies and other experiments, Kahneman demonstrates systematic biases
    in remembered utility: duration neglect (r=0.03 between duration and evaluation) and the Peak/End rule (r=0.67 prediction
    accuracy). The chapter proposes six conditions for valid moment-based measurement: inclusiveness, ordinal cross-situation
    measurement, distinctive zero point, interpersonal comparability, separability, and time neutrality. Crucially, it distinguishes
    the hedonic treadmill (adaptation level) from the satisfaction treadmill (aspiration level), arguing that only moment-based
    measures can resolve this ambiguity. The concept of objective happiness is introduced as a moment-based construct measurable
    via Experience Sampling Methodology and potentially validated through prefrontal asymmetry measures.'
  key_findings: "1. DECISION ≠ EXPERIENCED UTILITY: What people choose may not maximize\n   their experienced well-being\n\
    \n2. DURATION NEGLECT: Correlation between duration and remembered\n   evaluation r = 0.03 (colonoscopy 4-69 minutes)\n\
    \n3. PEAK/END RULE: Retrospective evaluation predicted by average of\n   peak and end pain (r = 0.67)\n\n4. DOMINANCE\
    \ VIOLATIONS: Extended (more painful) colonoscopy\n   rated BETTER due to improved ending (N=682)\n\n5. HEDONIC VS SATISFACTION\
    \ TREADMILL: Cannot distinguish without\n   moment-based measures - critical methodological insight\n\n6. SIX CONDITIONS:\
    \ Inclusiveness, ordinal measurement, zero point,\n   interpersonal comparability, separability, time neutrality\n\n7.\
    \ OBSERVER CORRELATION: External observers predict patient evaluation\n   r = 0.70 (supports interpersonal comparability)"
