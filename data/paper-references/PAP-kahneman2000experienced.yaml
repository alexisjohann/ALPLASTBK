abstract: This chapter develops a moment-based approach to experienced utility, distinguishing it from decision utility. Bentham's
  conception of utility as pleasure and pain (experienced utility) differs from modern economic usage based on revealed preferences
  (decision utility). The chapter argues that experienced utility can be measured through moment-based methods assessing present
  experience, and develops "objective happiness" as derived from temporal distributions of moment-utility. Key findings include
  duration neglect (r=0.03), the Peak/End rule (r=0.67), and violations of dominance in remembered utility. The chapter introduces
  the hedonic vs. satisfaction treadmill distinction.
