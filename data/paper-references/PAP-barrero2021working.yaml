abstract: Hybrid working from home (hybrid), whereby employees work a mix of days at home and at work each week, has become
  common for graduate employees.This paper evaluates a randomized control trial of hybrid on 1612 graduate engineers, marketing
  and finance employees of a large technology firm.There are four key results.First, hybrid was highly valued by employees
  on average, reducing attrition by 33% and improving job-satisfaction measures.Second, hybrid reduced working hours on home
  days and increased them on office days and the weekend, altering the structure of the working week.Third, hybrid increased
  messaging and video calls, even when all employees were in the office, reflecting a move towards more electronic communication.Finally,
  there were large differences in the valuations of hybrid between managers and non-managers.Non-managers were more likely
  to volunteer into the hybrid experiment, to work from home on eligible days, to predict positive impacts on productivity,
  and to reduce their attrition under hybrid.In contrast, managers were less likely to volunteer, less likely to work from
  home on eligible days, predicted a negative average impact of hybrid on productivity, and saw increased attrition rates
  under hybrid.
