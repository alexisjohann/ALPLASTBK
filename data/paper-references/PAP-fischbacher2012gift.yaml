title: The Behavioral Validity of the Strategy Method in Public Good Experiments
author: Fischbacher
year: '2012'
publication_type: journal_article
doi: 10.1016/j.joep.2012.01.008
abstract: This paper examines the behavioral validity of the strategy method in public good experiments. The authors elicited
  preferences in one game using the strategy method (P-experiment) and predicted behavior in ten standard public goods games
  with random matching using direct response (C-experiments). Results show that people identified as conditional cooperators
  by the strategy method also behave as conditional cooperators under direct response. Free-rider types contribute systematically
  less than others. Consistency between expressed cooperation preferences and actual contributions increases over time. The
  findings support the behavioral validity of the strategy method, showing it is relatively reliable compared to direct interaction
  of multiple players.
