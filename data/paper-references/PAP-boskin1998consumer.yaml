abstract: After presenting major findings and recommendations, the CPI Commission reiterates the estimate of a 1.1 percentage
  point per annum upward bias. It rejects the contention that the BLS already makes substantial corrections for quality change;
  that quality improvements and new products accrue only to the rich; and that procedures to make more extensive quality adjustments,
  valuations of new products, and adjustments for commodity and outlet substitution are impractical. The bias in the CPI can
  be sharply reduced, as the authors detail in this paper. Coauthors are Ellen R. Dulberger, Robert J. Gordon, Zvi Griliches,
  and Dale W. Jorgenson.
