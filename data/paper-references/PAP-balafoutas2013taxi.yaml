summary:
  abstract_extended: 'This paper presents results of a controlled field experiment on the extent and

    determinants of fraudulent behavior in the provision of taxi rides as a credence

    good. The contribution includes exact and separate measurement of two problems:

    overtreatment (taking longer routes) and overcharging (charging higher prices).


    Using portable GPS loggers, we tracked taxi drivers'' routes in Athens, Greece,

    meter by meter, to measure costly overtreatment.'
  key_findings: "- Taxi drivers exploit informational advantage over NON-LOCAL passengers:\n  * Non-Athenian\
    \ Greeks and foreigners taken on detours ~2x longer than locals\n  * Local passengers were hardly\
    \ ever taken on detours\n\n- Overcharging patterns:\n  * ~20% of foreigners were overcharged\n  *\
    \ ~5% of Greek non-locals were overcharged\n  * Foreigners exploited regarding tariff system knowledge\n\
    \n- Income signaling effect:\n  * High-income passengers taken on longer routes\n  * High-income passengers\
    \ overcharged slightly more than low-income\n\n- Two distinct fraud types measured separately:\n \
    \ * Overtreatment: unnecessary service (longer routes)\n  * Overcharging: higher prices for same service"
