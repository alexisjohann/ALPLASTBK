abstract: Credence goods are characterized by informational asymmetries between sellers and consumers that invite fraudulent
  behaviour by sellers. This article presents a natural field experiment on taxi rides in Athens, Greece, set up to measure
  different types of fraud and to examine the influence of passengers' presumed information and income on the extent of fraud.
  We find that passengers with inferior information about optimal routes are taken on significantly longer detours, while
  lack of information on the local tariff system increases the likelihood of manipulated bills by about fifteen percentage
  points. Passengers' perceived income seems to have no effect on fraud. Copyright 2013, Oxford University Press.
