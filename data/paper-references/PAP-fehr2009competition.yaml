summary:
  abstract_extended: 'This paper examines the interplay between competition and cooperation within

    firms. We show that internal competition can undermine cooperation while

    external competition can enhance it. Understanding this dynamic is crucial

    for organizational design and incentive systems.'
  key_findings: "1. INTERNAL COMPETITION\n   - Can undermine cooperation\n   - Tournament effects\n   - Sabotage risks\n\n\
    2. EXTERNAL COMPETITION\n   - Can enhance in-group cooperation\n   - Us vs them effects\n   - Performance pressure\n\n\
    3. DESIGN IMPLICATIONS\n   - Balance competition types\n   - Team vs individual incentives\n   - Culture matters"
  ebf_relevance: '10C DIMENSIONS:

    - WHAT (C): Competition and cooperation

    - HOW (B): Internal vs external competition

    - WHEN (V): Organizational context


    THEORY SUPPORT:

    - Organizational economics

    - Team production theory

    - Practical applications


    KEY INSIGHT:

    Internal and external competition have opposite effects on cooperation;

    organizational design must carefully balance these forces.'
