abstract: 'article appearing in this Journal in 199 1,1 Jerry Paquette gues that the private rates of return to schooling
  in Canada during the early to mid 1980s were small or negative, except for those completing a bachelor''s degree or higher.
  Paquette relies on Canadian Census data for his computations. The purpose of this paper is to: (1) show that his own data
  actually indicate quite different results, (2) survey a few recent studies on this topic, and (3) provide more recent rates
  of return to schooling in Canada that confirm the hypothesis that private returns to schooling in Canada have been substantial.'
