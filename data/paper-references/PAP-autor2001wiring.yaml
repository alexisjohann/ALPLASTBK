abstract: 'Workers and jobs are naturally heterogeneous and the quality of their interaction when paired is difficult to forecast.
  The Internet promises to open new channels for worker-firm communications. What are the consequences of this opening? I
  discuss three labor market features that may be altered: how worker-firm matches are made; how labor services are delivered;
  and how local markets shape labor demand. Theory predicts these developments will produce social benefits. But the gains
  are unlikely to be uniform and realizing them will generate novel problems. One result may be the formation of new institutions
  to address issues accompanying these opportunities.'
