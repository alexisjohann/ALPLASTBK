abstract: Abstract Who are “protest voters” and do they affect elections? We study
  this question using the introduction of a pure protest option (“None Of The Above”
  (NOTA)) on Indian ballots. Using structural estimation, we find that in elections
  without NOTA, most protest voters simply abstain. Protest voters who turn out scatter
  their votes among many candidates and consequently have little impact on election
  results. From a policy perspective, NOTA may be an effective tool to increase political
  participation, and can attenuate the electoral impact of compulsory voting.
