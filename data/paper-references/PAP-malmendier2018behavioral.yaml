title: Behavioral Corporate Finance
author: Ulrike Malmendier
year: '2018'
publication_type: incollection
booktitle: 'Handbook of Behavioral Economics: Applications and Foundations 1'
editor: B. Douglas Bernheim, Stefano DellaVigna, David Laibson
publisher: North-Holland/Elsevier
volume: '1'
chapter: '6'
pages: 277-379
doi: 10.1016/bs.hesbe.2018.07.001
abstract: 'Behavioral corporate finance studies the joint effect of (i) capital market participants''

  deviations from rationality and (ii) corporate managers'' deviations from rationality on

  corporate decisions and capital market outcomes. This chapter reviews research on three

  main themes: biased investors and how they affect managers'' financing and investment

  decisions, biased managers and how they affect managers'' financing and investment

  decisions when there are rational investors, and biased third parties (such as board

  members, auditors, analysts, or government officials) and how they affect corporate

  decisions.

  '
abstract_source: full_text
abstract_fetched: '2026-02-04'
structural_characteristics:
  S1_research_question:
    available: true
    questions:
    - How do irrational investors affect corporate decisions when managers are rational?
    - How do biased managers make corporate decisions when investors are rational?
    - How do biases of third parties (boards, analysts, auditors) affect outcomes?
    - How can we measure managerial overconfidence from revealed preferences?
    - What are the investment and acquisition effects of CEO overconfidence?
    - How do market timing and catering affect corporate financing decisions?
    clarity: high
  S2_methodology:
    available: true
    approach: comprehensive_review
    methods:
    - Literature review of 233 behavioral corporate papers
    - Three-perspective framework development
    - Overconfidence measurement (Longholder, Holder 67)
    - Panel regression analysis review
    - Event study methodology review
    - Natural experiment identification strategies
    key_definitions:
    - 'Longholder: CEO who holds options until expiration despite 67% moneyness'
    - 'Holder 67: CEO who fails to exercise options at 67% in-the-money'
    - 'Market timing: Exploiting investor irrationality in securities issuance'
    - 'Catering: Adjusting corporate policy to irrational investor preferences'
    - 'Overconfidence: Overestimation of project returns and own ability'
    - 'Miscalibration: Systematically narrow confidence intervals'
  S3_sample_data:
    available: true
    type: literature_review
    empirical_data: true
    sample_characteristics:
    - Review of 233 behavioral corporate finance papers
    - 45% papers on biased investors
    - 45% papers on biased managers
    - 10% papers on biased third parties
    - Primarily U.S. large-cap firms (SEC data)
    - Option exercise data for Longholder measure
    - Media coverage data for press-based measures
    - CFO survey data from Duke University
    key_statistics:
      papers_reviewed: 233
      investor_bias_share: 0.45
      manager_bias_share: 0.45
      third_party_share: 0.1
      investment_sensitivity_premium: 3-5 percentage points
      acquisition_propensity_increase: 0.65
      announcement_return_discount: -0.009
  S4_findings:
    available: true
    key_findings:
    - finding: Overconfident CEOs show 3-5pp higher investment-cash flow sensitivity
      evidence: Malmendier & Tate (2005) panel regression with Longholder measure
      interpretation: Overconfidence distorts investment toward internal financing
    - finding: Longholder CEOs are 65% more likely to make acquisitions
      evidence: Malmendier & Tate (2008) acquisition propensity analysis
      interpretation: Overconfidence leads to excessive M&A activity
    - finding: Acquisitions by overconfident CEOs earn -90bp lower announcement returns
      evidence: Event study of acquisition announcements
      interpretation: Market discounts deals by overconfident acquirers
    - finding: Market timing has persistent effects on capital structure
      evidence: Baker & Wurgler (2002) external finance weighted-average M/B
      interpretation: Firms successfully time equity issuance to high valuations
    - finding: Dividend policy responds to investor sentiment
      evidence: Baker & Wurgler (2004) dividend premium and initiation rates
      interpretation: Managers cater to investor preferences for dividends
    - finding: CEO experiences shape risk attitudes persistently
      evidence: Malmendier & Nagel (2011) Depression-era cohort effects
      interpretation: Formative experiences create lasting behavioral patterns
  S5_validity:
    available: true
    internal_validity:
    - Longholder measure based on revealed preferences, not surveys
    - Within-firm variation in CEO used for identification
    - Multiple measures cross-validated (option, media, survey)
    - Controls for information, risk tolerance, career concerns
    - Instrumental variable approaches for robustness
    external_validity:
    - Primarily large U.S. firms with SEC filings
    - Option data availability limits sample
    - International evidence beginning to accumulate
    - Private firm applicability uncertain
    - Cross-cultural variation unexplored
    limitations:
    - Binary classification of continuous trait
    - Longholder may capture risk tolerance or information
    - Survivorship bias in CEO samples
    - Limited small firm coverage
    - Welfare implications underexplored
  S6_reproducibility:
    available: true
    proofs_available: true
    proof_location: 'Section 3: Longholder methodology detailed'
    framework_specification: 'Three-perspective framework: investors, managers, third parties'
    assumptions_documented: true
    testable_predictions:
    - Overconfident CEOs will overinvest when internal funds available
    - Overconfident CEOs will make more acquisitions
    - Market will discount acquisitions by overconfident CEOs
    - Firms will time equity issuance to high valuations
    - Dividend policy will respond to investor sentiment
    - CEO experiences will persistently affect risk attitudes
