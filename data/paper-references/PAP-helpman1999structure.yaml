abstract: During the last two decades, new research has greatly advanced the understanding of the structure of world trade.
  While research in the 1960s and 1970s provided mostly theoretical insights, major empirical innovations concerning the study
  of factor content of net trade flows appeared in the 1980s. Important improvements in this line of research were added in
  the 1990s. The author also discusses the literature that emphasizes economies of scale and product differentiation. This
  work was done mostly in the 1980s and 1990s, yielding important theoretical and empirical findings. An emphasis on the interplay
  between theoretical and empirical research characterizes the entire presentation.
