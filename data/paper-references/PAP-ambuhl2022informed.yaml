abstract: How do individuals value noisy information that guides economic decisions? In our laboratory experiment, we find
  that individuals underreact to increasing the informativeness of a signal, thus undervalue high-quality information, and
  that they disproportionately prefer information that may yield certainty. Both biases appear to be mainly due to non-standard
  belief updating. We find that individuals differ consistently in their responsiveness to information–the extent that their
  beliefs move upon observing signals. Individual parameters …
