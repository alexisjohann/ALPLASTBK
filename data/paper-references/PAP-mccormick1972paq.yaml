abstract: >
  First standardized KSAO measurement instrument. Factor analysis of 194
  worker-oriented job elements across 536 jobs in 70 organizations.
  Demonstrated that aptitude requirements and pay rates can be predicted
  from quantified job-analysis data. The PAQ became the foundation for
  all subsequent structured job analysis methods and directly influenced
  the development of O*NET.
