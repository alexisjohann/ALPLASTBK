abstract: This paper considers the evolution of global transportation usage over the past half century and its implications
  for supply chains. Transportation usage has more than doubled as costs decreased by a third. Participation of emerging economies
  in world trade and longer-distance trade between countries contribute to this usage increase, thereby encouraging longer
  supply chains. We discuss technological advances over this period, and their interactions with endogenous responses from
  transportation costs and supply chain linkages. Supply chains involving more countries and longer distances are reflective
  of reliable and efficient transportat ion, but are also more exposed to disruptions, highlighting the importance of considering
  the interconnectedness of transportation and supply chains in policymaking and future work.
