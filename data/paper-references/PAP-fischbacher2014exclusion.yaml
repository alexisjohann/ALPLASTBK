title: Heterogeneous Reactions to Heterogeneity in Returns from Public Goods
author: Fischbacher
year: '2014'
publication_type: journal_article
doi: 10.1007/s00355-013-0763-x
abstract: 'This laboratory experiment studies how heterogeneity in returns and uncertainty affects contribution behavior in
  a linear public goods game. Using conditional contribution elicitation with a within-subject design, the study investigates
  belief-independent and type-specific reactions to heterogeneity. On average, heterogeneity decreases unconditional contributions
  but affects conditional contributions only weakly. Individual reactions differ systematically: selfish subjects and one-third
  of conditional cooperators don''t react to heterogeneity, while other conditional cooperators vary. A substantial part of
  heterogeneity in reactions can be explained by inequity aversion with different reference groups. Data from 228 participants
  at University of Konstanz.'
