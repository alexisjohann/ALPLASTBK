abstract: 'We document three remarkable features of the Opower program, in which social comparison-based
  home energy reports are repeatedly mailed to more than six million households nationwide. First, initial
  reports cause high-frequency “action and backsliding,” but these cycles attenuate over time. Second,
  if reports are discontinued after two years, effects are relatively persistent, decaying at 10–20 percent
  per year. Third, consumers are slow to habituate: they continue to respond to repeated treatment even
  after two years. We show that the previous conservative assumptions about post-intervention persistence
  had dramatically understated cost effectiveness and illustrate how empirical estimates can optimize
  program design.(JEL D12, D83, L94, Q41)'
