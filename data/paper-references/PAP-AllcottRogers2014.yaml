summary:
  abstract_extended: 'This paper documents three remarkable features of the Opower program, in which

    social comparison-based home energy reports are repeatedly mailed to more than

    six million households nationwide.


    First, initial reports cause high-frequency "action and backsliding," but these

    cycles attenuate over time. Second, if reports are discontinued after two

    years, effects are relatively persistent, decaying at 10-20 percent per year.

    Third, consumers are slow to habituate: they continue to respond to repeated

    treatment even after two years.


    The authors show that previous conservative assumptions about post-intervention

    persistence had dramatically understated cost effectiveness and illustrate how

    empirical estimates can optimize program design.'
  key_findings: "1. ACTION AND BACKSLIDING: Initial reports cause immediate conservation\n   followed\
    \ by decay until the next report arrives\n\n2. PERSISTENT EFFECTS: After discontinuation, treatment\
    \ effects decay at only\n   10-20% per year, not immediately\n\n3. SLOW HABITUATION: Consumers continue\
    \ responding to repeated treatment even\n   after two years of reports\n\n4. SOCIAL COMPARISON POWER:\
    \ Comparing household energy use to neighbors\n   reduces consumption by 1.4-3.3%\n\n5. FREQUENCY\
    \ MATTERS: Monthly reports reduce energy consumption by 0.5\n   percentage points more than quarterly\
    \ reports\n\n6. COST EFFECTIVENESS: Actual persistence is much higher than previously\n   assumed,\
    \ making interventions more cost-effective"
