abstract: 'The equity premium puzzle refers to the empirical fact that stocks have
  greatly outperformed bonds over the last century. The authors offer a new explanation
  based on prospect theory. The explanation has two components: First, investors are
  assumed to be loss averse, meaning that they are distinctly more sensitive to losses
  than to gains. Second, even long-term investors are assumed to evaluate their portfolios
  frequently. They dub this combination myopic loss aversion. Using simulations, they
  find that the size of the equity premium is consistent with prospect theory parameters
  if investors evaluate their portfolios annually.'
