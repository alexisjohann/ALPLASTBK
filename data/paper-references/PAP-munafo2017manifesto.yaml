abstract: Improving the reliability and efficiency of scientific research will increase the credibility of the published scientific
  literature and accelerate discovery. We argue for the adoption of measures to optimize key elements of the scientific process
  including methods, reporting and dissemination, reproducibility, evaluation and incentives. There is evidence from both
  simulations and empirical studies supporting the likely effectiveness of these measures, but their broad adoption by researchers,
  institutions, funders and journals will require iterative evaluation and improvement.
