title: Cultures of Corruption
author: Fisman
year: '2006'
publication_type: journal_article
doi: 10.1086/527495
abstract: This paper exploits a natural experiment to examine corruption norms - the stationing of thousands of diplomats
  from around the world in New York City. Diplomatic immunity meant there was zero legal enforcement of parking violations,
  allowing examination of cultural norms alone. Diplomats from high-corruption countries (based on existing indices) have
  significantly more parking violations, suggesting they bring corruption culture from their home country. Officials from
  countries with less favorable views of the United States also commit significantly more violations, providing evidence on
  sentiment in economic decision-making. The study disentangles the roles of legal enforcement versus cultural norms in controlling
  corruption.
