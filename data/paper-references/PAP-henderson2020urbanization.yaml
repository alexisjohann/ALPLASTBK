abstract: We describe patterns of urbanization in the developing world and the extent to which they differ from the developed
  world. We consider the extent to which urbanization in the developing world can be explained by conventional models of spatial
  equilibrium. Despite their relative poverty, developing world cities are relatively highly productive and often provide
  good access to safe water, improved sanitation, schooling, and inoculations. In some parts of the world, they are home to
  a surprisingly small number of factory workers and a surprisingly large number of farmers. Developing world cities seem
  to do less well at protecting their residents from lifestyle diseases and crime, their female residents from domestic violence,
  and their children from illness. In thinking about these facts, we note that one strand of the literature focused on structural
  transformation has suggested that urbanization in the developing is occurring “too early,” while another strand argues that
  urbanization is occurring “too slow” to be consistent with conventional models of spatial equilibrium. Despite many differences
  between developing and developed world cities, our new results combined with those in the literature suggest that models
  of spatial equilibrium can be adapted as a useful guide to understanding the urbanization process in the developing world.
