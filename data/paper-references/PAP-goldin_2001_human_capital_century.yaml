abstract: The modern concept of the wealth of nations emerged by the early twentieth
  century. Capital embodied in people—human capital—mattered. The United States led
  all nations in mass postelementary education during the "human-capital century."
  The American system of education was shaped by New World endowments and Republican
  ideology and was characterized by virtues including publicly funded mass education
  that was open and forgiving, academic yet practical, secular, gender neutral, and
  funded and controlled by small districts. The American educational template was
  a remarkable success, but recent educational concerns and policy have redefined
  some of its "virtues" as "vices."
