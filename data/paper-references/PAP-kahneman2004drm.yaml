abstract: 'The Day Reconstruction Method (DRM) assesses how people spend their time and how they experience the various activities
  and settings of their lives, combining features of time-budget measurement and experience sampling. Participants systematically
  reconstruct their activities and experiences of the preceding day with procedures designed to reduce recall biases. The
  DRM''s utility is shown by documenting close correspondences between DRM reports of 909 employed women and ESM results.
  Key findings: Activity rankings (intimate relations highest at 5.10, commuting lowest at 3.45), diurnal patterns match ESM,
  time pressure effect 52% of scale, sleep quality effect 56%. Focusing hypothesis supported: income correlates r=0.20 with
  satisfaction but only r=0.05 with net affect.'
