summary:
  abstract_extended: 'This foundational Science paper introduces the Day Reconstruction Method (DRM)—a validated survey technique
    for measuring how people spend their time and how they experience daily activities. The method combines time-budget measurement
    with affect recovery through systematic reconstruction of the previous day as a sequence of episodes. Using 909 employed
    women, the authors validate DRM against Experience Sampling Method (ESM), showing remarkably similar diurnal patterns
    for tiredness (V-shape) and negative affect. Activity affect rankings show intimate relations (5.10) highest and commuting
    (3.45) lowest. The paper tests the hedonic treadmill, finding support for the focusing hypothesis: life circumstances
    (income, marital status) affect satisfaction judgments more than actual momentary experience. Income correlates r=0.20
    with life satisfaction but only r=0.05 with net affect. Time pressure at work and sleep quality emerge as powerful determinants
    of enjoyment (52% and 56% of scale range respectively).'
  key_findings: "1. DRM METHOD: Reconstruct yesterday as episodes, rate affect per\n   episode—validates against ESM with\
    \ r>0.90 pattern similarity\n\n2. ACTIVITY RANKINGS (positive affect 0-6):\n   - Intimate relations: 5.10 (highest)\n\
    \   - Commuting: 3.45 (lowest)\n   - Working: 3.62\n\n3. DIURNAL PATTERNS: V-shape for tiredness matches ESM,\n   differs\
    \ from naive expectation of steady increase\n\n4. EFFECT SIZES (% of commuting→relaxing scale):\n   - Time pressure at\
    \ work: 52%\n   - Sleep quality: 56%\n   - Depression: 46%\n   - Income: 19%\n\n5. FOCUSING HYPOTHESIS SUPPORTED:\n  \
    \ - Income-satisfaction: r = 0.20\n   - Income-net affect: r = 0.05 (P < 0.001 difference)\n\n6. THREE INFLUENCE PATTERNS:\n\
    \   - Personal characteristics: Pervasive effect\n   - Local features: Powerful, situation-specific\n   - Life circumstances:\
    \ Small unless salient\n\n7. SAMPLE: N=909 employed women, 14.1 episodes/day (SD=4.8)"
