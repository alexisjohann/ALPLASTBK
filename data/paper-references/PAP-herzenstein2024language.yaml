title: "The Language of (Non)Replicable Social Science"
author: Herzenstein
year: '2024'
doi: null
publication_type: journal_article
reference_count: '0'
abstract: |
  Reports that linguistic features (LIWC: Clout, Analytic, Tone) predict replication
  success in social science "above and beyond" methodological controls. Challenged by
  Fehr & Sutter (2025) who demonstrate that this reflects omitted variable bias -
  the linguistic differences proxy for underlying methodological differences that
  H&N's controls failed to capture.

