abstract: We evaluate the introduction of monetary incentives in the market for live and cadaveric organ donations. We show
  that monetary incentives would increase the supply of organs for transplant sufficiently to eliminate the very large queues
  in organ markets, and the suffering and deaths of many of those waiting, without increasing the total cost of transplant
  surgery by more than about 12 percent. We build on the value-of-life literature and other parts of economic analysis to
  estimate the equilibrium cost of live transplants for kidneys and livers. We also show that market price for kidneys will
  be determined by the cost of live donations, even though most organs will come from cadavers.
