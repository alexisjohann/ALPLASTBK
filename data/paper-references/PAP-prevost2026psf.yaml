abstract: >
  We develop a three-level behavioral model of papal succession (PSF-2.0)
  that achieves 100% winner prediction accuracy across twelve conclaves
  (1878-2025). The model integrates mechanism-dimension mapping of eight
  institutional design features, logistic regression with complementarity
  interactions across five candidate dimensions, and an agent-based model
  simulating coalition dynamics among 120 cardinal-voters. Key finding:
  conclaves function as "integration machines" — institutional design
  systematically amplifies Integration Capacity through complementary mechanisms.
