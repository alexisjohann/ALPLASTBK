abstract: The routine production of U.S. economic statistics dates back to the early part of the twentieth century. But in
  recent decades, as services output has continued to expand a system of economic statistics that had been designed during
  the manufacturing era began to seem increasingly outdated. Over the past decade, the statistical agencies have done yeoman
  work to expand the availability and quality of service sector statistics, but the task is far from completed. Moreover,
  the traditional accounting framework for economic statistics has focused almost exclusively on market transactions. Looking
  ahead, more comprehensive measurement of productive activities, however they may be organized, must be a priority.
