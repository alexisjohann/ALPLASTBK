abstract: The problem of intransitivities in social choice has been the subject of much investigation since Arrow's pioneering
  work in this area. In the context of social choice over multidimensional policy spaces, Plott [lo] has shown the severity
  of the restrictions which are needed in order to generate an equilibrium policy outcome. Little attention has been paid,
  however, to the properties of the intransitivities when these strong equilibrium conditions are not met. One exception is
  Tullock [13], who has argued that Arrow's result is irrelevant in this …
