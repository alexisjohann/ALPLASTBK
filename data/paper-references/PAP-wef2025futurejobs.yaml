abstract: >
  The World Economic Forum's Future of Jobs Report 2025 represents the fifth edition of the
  flagship labor market analysis, surveying over 1,000 employers representing more than 14 million
  workers across 55 economies and 22 industry clusters. The report projects that 22% of the
  labor market will be disrupted by 2030, with 170 million new roles created and 92 million
  displaced — a net positive of 78 million jobs. Skills-based hiring is identified as the
  dominant workforce strategy, with 81% of employers planning to implement skills-based practices
  by 2030. The report finds that AI and big data skills are the fastest-growing skill categories,
  while manual dexterity and endurance are the fastest-declining. Notably, 63% of employers cite
  skill gaps as the biggest barrier to business transformation, up from 60% in 2023. The report
  introduces a new "Skills Stability Index" showing that 39% of existing worker skills will be
  transformed or become obsolete by 2030. Green skills, AI literacy, and creative thinking
  emerge as the three highest-priority skill clusters.
