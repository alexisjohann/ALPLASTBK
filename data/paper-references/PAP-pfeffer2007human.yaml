abstract: Workplaces in America and elsewhere show pervasive job dissatisfaction, distrust, and disengagement, with the evidence
  suggesting that these problems are getting worse and have a number of negative consequences for employers as well as employees.
  What follows is a necessarily selective exploration of human resource management in organizations, covering why it is often
  done so badly, what theory suggests about how to do it better, and why so little of what is known is actually implemented.
