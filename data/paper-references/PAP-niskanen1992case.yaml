abstract: 'For the first 140 years of U.S. history, the federal budget was effectively constrained by two fiscal rules: the
  formal limits within the Constitution on the enumerated spending powers and an informal rule that the government could borrow
  only during recessions and wars. At the end of the 1920s, federal expenditures were 2.6 percent of GNP. The federal debt
  was constrained to about equal to 16 percent of GNP. The general price level was roughly stable over this long period. Over
  the past six decades, however, federal expenditures have increased to nearly 25 percent of GNP. Larger and more frequent
  budget deficits have increased the federal debt held by the public to an amount equal to about 50 percent of GNP. And the
  general price level is now about nine times the level at the beginning of this period. This dramatic change in fiscal and
  monetary conditions occurred without one amendment to the Constitution to authorize a change in the fiscal rules. Our effective
  fiscal constitution has been transformed into one in which Congress and the President may authorize any type or amount of
  expenditures and taxes, subject only to the voting rules for routine legislation. How did this happen? Should economists
  be concerned about this change in the fiscal constitution? What, if anything, should be done about it?'
