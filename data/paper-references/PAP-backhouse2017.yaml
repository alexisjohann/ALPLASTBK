abstract: 'It is widely accepted that economics has changed significantly since the
  1970s with the development of new data sources, new methods of analysis and the
  computer. This paper argues that this transformation of the discipline involves
  more than just a rise of empirical work: it involves a new understanding of the
  relationship between theoretical and applied work, which raised the prestige of
  the latter. The meaning of economic theory and applied work and the boundaries between
  them changed as theory and empirical work alike became more applied in the sense
  that they were brought to bear on specific social issues, often with a policy orientation.
  Drawing on an analysis of John Bates Clark medal winners and on papers published
  in a special volume, the authors discuss reasons for this transformation, resulting
  from new modeling strategies, data sets and technologies as well as the changing
  influence of public and private patrons.'
