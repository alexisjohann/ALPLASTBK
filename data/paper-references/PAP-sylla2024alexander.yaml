abstract: Hamilton’s 1791 state paper on manufactures is a forward-looking argument for US industrialization supported by
  public policies designed to encourage it. Conventional wisdom circa 1790, along with static considerations of comparative
  advantage indicated that the United States should stick to farming, export its agricultural surpluses, and import European
  manufactures. Mercantilist trade policies of the major European empires, however, were barriers to US exports. Hamilton
  therefore contended that US manufacturing using the latest machine technologies would alleviate the effects of European
  trade restrictions by creating domestic demand for agricultural surpluses. His report specifies industries worthy of support,
  and policy measures to encourage their development. During the century that followed, US governments adopted nearly all
  of Hamilton’s recommendations. These measures contributed to an average annual rate of growth of industrial output of 5
  percent during that century, helping the United States to become the world’s leading manufacturing nation.
