abstract: 'In penalty kicks in soccer, goalkeepers choose their action before they can clearly
  observe the kick direction. An analysis of 286 penalty kicks shows that given the
  distribution of kicks, the optimal strategy for goalkeepers is to stay in the goal center.
  Exposed to penalty kicks, however, goalkeepers almost always jump right or left. We propose
  that this action bias stems from a norm theory perspective: because the norm is to jump,
  a goal scored following inaction (staying center) feels worse than a goal scored following
  action (jumping), even if the outcomes are identical. This is consistent with the notion
  of action/inaction effects in regret theory.'
