abstract: Recent advances in artificial intelligence are primarily driven by machine learning, a prediction technology. Prediction
  is useful because it is an input into decision-making. In order to appreciate the impact of artificial intelligence on jobs,
  it is important to understand the relative roles of prediction and decision tasks. We describe and provide examples of how
  artificial intelligence will affect labor, emphasizing differences between when the automation of prediction leads to automating
  decisions versus enhancing decision-making by humans.
