abstract: This seminal paper considers the question 'Can machines think?' and proposes to replace it with a more concrete
  test called the 'Imitation Game' (now known as the Turing Test). The game involves an interrogator who must determine which
  of two unseen participants is human through questions alone. Turing argues that if a machine can successfully imitate human
  responses to the point where the interrogator cannot reliably distinguish it from a human, we should consider it capable
  of thought. The paper addresses and refutes nine common objections to machine intelligence, including theological, mathematical,
  and consciousness-based arguments. Turing predicted that by the year 2000, computers would be able to play the imitation
  game well enough to fool an average interrogator 30% of the time after five minutes of questioning.
