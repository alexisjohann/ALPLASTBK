abstract: When Gary Becker asked me to introduce Franco Modigliani on this occasion celebrating Franco's Nobel Prize, he noted
  that, by tradition, the honoree does not speak. It is the introducer who speaks, devoting 30 minutes or so to the laureate's
  chief contributions to economics. Now, I know of no meeting of economists attended by Franco where he didn't speak. But
  this occasion is designed to do Franco Modigliani honor, rather than delegate him to perform still another feat of critical
  summary for the enduring benefit of his fellow economists. Where shall I begin? Franco Modigliani is a great macroeconomist.
  He is also a great microeconomist. Still, it is the composite of theoretical, empirical, applied, and policy-oriented work
  that provides the unmistakable Franco Modigliani stamp. In the parlance of corporate finance, he is a complete, horizontally
  and vertically integrated, economic-research system.
