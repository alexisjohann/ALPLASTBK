abstract: 'In all of tort law, there is no concept which has been as pervasive and
  yet elusive as the causation requirement, which relieves a defendant of liability
  if his tortious conduct was not a cause of the plaintiff''s injury.''Although described
  by no less an authority than William Prosser as one of the" simplest and most obvious"
  problems in determining tort liability, 2 the causation requirement has resisted
  all efforts to reduce it to a useful, comprehensive formula and has been the subject
  of widely divergent views concerning its nature, content, scope, and significance.
  Through the early part of this century, judges applied causal analysis very broadly.
  They used causal rhetoric to determine not only whether the defendant''s tortious
  conduct had contributed to an injury but also whether the defendant should be held
  legally responsible for the injury in the light of the other contributing factors.
  This broad use of causal language was sharply challenged during the second quarter
  of this century by the legal realists and their colleagues. They insisted that the
  only causal issue in a tort case is the simple factual issue of actual causation
  or causation-in-fact: whether the defendant''s conduct actually contributed to the
  plaintiff''s injury. They noted that most of the courts'' allegedly causal analysis
  had nothing to do with the issue of causation-infact, but rather, under the misleading
  label of" proximate cause" or" legal cause," served as a smokescreen for policy
  judgments on whether the defendant ought to be held liable for an injury to which
  his conduct had clearly contributed. The actual causation question was considered
  to be of little help on this issue of ultimate responsibility, since there are innumerable
  causes of each injury. Instead, the realists argued that, in t Associate Professor
  of Law, Chicago-Kent College of Law, Illinois Institute of Technology. BS 1968,
  California Institute of Technology; JD 1973, Loyola University, Los Angeles; LL.
  M. 1976, Harvard University. I would like to thank George Christie, Donald Marshall,
  Paul Shupack, Stewart Sterk, Richard Weisberg, and Elliott Wiss for their helpful
  comments on the initial draft of this article.

  1. Eg, OW HOLMES, THE COMMON LAW 64 (M. Howe ed. 1963); W. PROSSER, HANDBOOK OF
  THE LAW OF TORTS § 41, at 236-37, 241 (4th ed. 1971). This statement of the causation
  requirement is not meant to exclude injunctive relief against threatened injury.
  See id. § 1, at 2. The statement also is ambiguous with respect to whether the causation
  requirement applies to the defendant''s conduct as a whole or to the tortious aspect
  of the conduct. This ambiguity is addressed infra in Part I, Section B.'
