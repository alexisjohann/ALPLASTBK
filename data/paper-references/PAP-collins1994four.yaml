abstract: 'Professor Koopmans distinguishes four sociological traditions: the conflict tradition (derived from Marx and Weber
  emphasizing power, domination, and social stratification), the rational/utilitarian tradition (exchange theory and rational
  choice), the Durkheimian tradition (ritual solidarity, moral order, and collective consciousness), and the microinteractionist
  tradition (symbolic interaction and ethnomethodology). The book examines how these four traditions have shaped sociological
  theory and research.'
