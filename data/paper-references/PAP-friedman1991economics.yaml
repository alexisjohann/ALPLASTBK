abstract: Despite the practical importance of trade secrets to the business community, the law of trade secrets is a neglected
  orphan in economic analysis. This paper sketches an approach to the economics of trade secret law that connects it more
  closely both to other areas of intellectual property and to broader issues in the positive economic theory of the common
  law.
