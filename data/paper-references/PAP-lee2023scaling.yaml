summary:
  abstract: >
    This paper develops a formal model of organizational scaling that identifies
    conditions under which organizations can grow without proportionally increasing
    hierarchical layers. The model contrasts self-contained teams (minimizing
    between-team conflicts) with self-managed teams (minimizing within-team conflicts)
    and shows that self-contained designs are superior for scaling because
    between-team conflicts grow super-linearly with organizational size.

