summary:
  abstract_extended: 'This paper examines how inequality affects voting for redistribution.

    We show that inequality aversion and fairness concerns shape political

    preferences beyond narrow self-interest. This helps explain voting patterns

    that standard models cannot account for.'
  key_findings: "1. VOTING AND FAIRNESS\n   - Not purely self-interested\n   - Inequality aversion matters\n   - Perceived\
    \ fairness of inequality\n\n2. INEQUALITY EFFECTS\n   - High inequality → more support\n   - Perception of causes matters\n\
    \   - Mobility beliefs\n\n3. POLITICAL IMPLICATIONS\n   - Explains \"puzzle\" voting\n   - Social preferences in politics\n\
    \   - Policy feedback"
  ebf_relevance: '10C DIMENSIONS:

