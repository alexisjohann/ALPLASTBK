abstract: Algorithms (in some form) are already widely used in the criminal justice system. We draw lessons from this experience
  for what is to come for the rest of society as machine learning diffuses. We find economists and other social scientists
  have a key role to play in shaping the impact of algorithms, in part through improving the tools used to build them.
