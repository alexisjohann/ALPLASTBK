abstract: We examine the degree of trust and trustworthiness in an experimental trust game with 662 participants from six
  different age groups, ranging from 8-year-olds to retired persons. Although both trust and trustworthiness have been identified
  as fundamental pillars for efficient economic interactions, economic research has devoted little attention to measuring
  their strength in different age groups. In our experiment subjects interact with members of the same age group. We find
  that trust increases almost linearly from early childhood to early …
