summary:
  abstract_extended: 'This handbook chapter reviews theories of fairness and reciprocity and their

    empirical support. We discuss the Fehr-Schmidt model, Bolton-Ockenfels ERC,

    and intention-based reciprocity models. We examine new evidence and suggest

    future research directions for modeling social preferences.'
  key_findings: "1. OUTCOME-BASED MODELS\n   - Fehr-Schmidt inequity aversion\n   - Bolton-Ockenfels ERC\n   - Distribution\
    \ matters\n\n2. INTENTION-BASED MODELS\n   - Rabin fairness\n   - Kindness matters\n   - Beliefs about intentions\n\n\
    3. COMPARATIVE ASSESSMENT\n   - Each captures different aspects\n   - Complementary perspectives\n   - Integration needed\n\
    \n4. NEW DIRECTIONS\n   - Context dependence\n   - Heterogeneity\n   - Dynamic models"
