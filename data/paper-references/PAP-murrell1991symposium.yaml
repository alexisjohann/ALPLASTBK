abstract: This symposium examines the economic problems facing the reforming countries of the Soviet Union and Eastern Europe,
  the interrelationships between these problems, and current knowledge on how to deal with them. The word “reform” is surely
  a misnomer for what is occurring; “revolution” is more fitting.
