abstract: Raj Chetty is eminently deserving of being awarded the John Bates Clark Medal at the age of 33. His research has
  transformed the field of public economics. His work is motivated by important public policy issues in the fields of taxation,
  social insurance, and public spending for education. He approaches his subjects with a creative redefinition of the problems
  that he studies, and his empirical methods often draw on experimental evidence or unprecedentedly large sets of integrated
  data. While his work is founded on basic microeconomics, he modifies this framework to take into account behavioral and
  institutional considerations. Chetty is a prolific scholar. It is difficult to summarize all of Chetty's research or even
  to capture the details of his most significant papers. I have therefore chosen a selection of Chetty's important papers
  dealing with taxation, social insurance, and education that contributed to his selection as the winner of the John Bates
  Clark Medal.
