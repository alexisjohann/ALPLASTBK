abstract: We discuss the new American Time Use Survey (ATUS), an on-going household survey of roughly 1,200 Americans per
  month (1,800 per month in the first year, 2003) that collects time diaries as well as demographic interview information
  from respondents who had recently been in the Current Population Survey. The characteristics of the data are presented,
  as are caveats and concerns that one might have about them. A number of novel uses of the ATUS in economic research, including
  in the areas of macroeconomics, national income accounting, labor economics, and others, are proposed to illustrate the
  magnitude of this new survey's possible applications.
