summary:
  abstract_extended: 'This paper critiques the behavioral foundations of economic theory, questioning

    the assumption that every agent is actuated only by self-interest. Sen

    distinguishes between two departures from purely self-interested behavior:

    sympathy and commitment.


    Sympathy corresponds to concern for others that directly affects one''s own

    welfare. "If the knowledge of torture of others makes you sick, it is a case of

    sympathy." Commitment, by contrast, involves placing an ethical stance ahead of

    one''s own well-being - acting on moral principles even when it does not improve

    one''s welfare.


    Sen argues that behavior based on sympathy is in an important sense egoistic,

    while commitment represents a genuine departure from self-interest that standard

    economic models cannot accommodate.'
  key_findings: "1. SYMPATHY VS COMMITMENT: Two types of other-regarding behavior with\n   fundamentally different structures\n\
    \n2. SYMPATHY IS EGOISTIC: Helping others because their welfare affects your\n   welfare is still self-interested\n\n\
    3. COMMITMENT TRANSCENDS: Acting on moral principles regardless of welfare\n   effect represents true departure from self-interest\n\
    \n4. RATIONAL FOOLS: Economic agents modeled as purely self-interested are\n   \"rational fools\"\n\n5. ETHICS IN ECONOMICS:\
    \ Commitment-based behavior cannot be reduced to\n   preference satisfaction\n\n6. BEHAVIORAL FOUNDATIONS CRITIQUE: Standard\
    \ economic theory misses important\n   human motivations"
