abstract: 'En 1881, Edgeworth posait comme premier principe de l''economie le fait que chaque agent a comme motivation unique
  son interet propre. Cette conception egoiste de l''homme a penetre la theorie economique et y persiste. L''A. demontre l''inconsistance
  des concepts qui en sont les points nodaux: rationalite de la conduite qui consiste a choisir selon l''ordre de ses preferences
  ou selon le critere de l''engagement financier ou de l''utilite.'
