abstract: This paper offers some facts on trends in children's economic status in the United States as well as an economic
  perspective for thinking about public policy toward children. Throughout, we will attempt to make clear what is known and
  what is not known empirically about the relationships that are embodied in our perspective. We consider whether America
  is “underinvesting in children”; what type of investments in children would be best; to which children investments should
  be directed; and whether governments should provide the services directly or whether parents should be given the resources
  and incentives to better nurture their children. We examine the determinants of children's success and propose a course
  of action for investing in children.
