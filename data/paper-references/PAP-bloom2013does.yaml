abstract: A long-standing question is whether differences in management practices
  across firms can explain differences in productivity, especially in developing countries
  where these spreads appear particularly large. To investigate this, we ran a management
  field experiment on large Indian textile firms. We provided free consulting on management
  practices to randomly chosen treatment plants and compared their performance to
  a set of control plants. We find that adopting these management practices raised
  productivity by 17% in the first year …
