title: 'Immigrants from Eastern Europe: Employment and Short-run Fiscal Impacts'
author: Bratsberg
year: '2014'
publication_type: journal_article
doi: 10.1016/j.labeco.2014.03.006
abstract: Using longitudinal data from the date of arrival, we study long-term labour market and social insurance outcomes
  for all major immigrant cohorts to Norway since 1970. The study examines differences in social insurance institutions between
  the Nordic and Eastern European countries, documenting the labour market performance of post-EU accession Eastern European
  labour migrants during their first years in Norway using longitudinal administrative micro data. We examine migrants from
  Poland and the Baltic States between 2004 and 2007, following accession but prior to the financial crisis, and study how
  the negative labour demand shock affected subsequent employment and earnings patterns. From a public finance perspective,
  the interaction between labour market outcomes and duration of stay is particularly important.
