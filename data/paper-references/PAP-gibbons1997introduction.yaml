abstract: 'This paper offers an introduction to game theory for applied economists. The author gives simple definitions and
  intuitive examples of four kinds of games and their corresponding solution concepts: Nash equilibrium in static games of
  complete information; subgame-perfect Nash equilibrium in dynamic games of complete information; Bayesian Nash equilibrium
  in static games with incomplete (or ''private'') information; and perfect Bayesian (or sequential) equilibrium in dynamic
  games with incomplete information. The main theme of the paper is that there are important differences among the games but
  important similarities among the solution concepts.'
