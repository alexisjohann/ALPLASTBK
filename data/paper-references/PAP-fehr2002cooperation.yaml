summary:
  abstract_extended: 'This paper examines how cooperation can be sustained through enforcement of

    high efficiency standards. In experimental labor markets, we show that

    workers respond to fair wages with high effort, and employers anticipate

    this by paying above market-clearing wages. The threat of termination and

    reputation concerns help sustain this cooperative equilibrium.'
  key_findings: "1. HIGH EFFICIENCY EQUILIBRIUM\n   - Above market-clearing wages\n   - High effort in response\n   - Sustained\
    \ over time\n\n2. ENFORCEMENT MECHANISMS\n   - Termination threats\n   - Reputation concerns\n   - Gift exchange dynamics\n\
    \n3. IMPLICATIONS FOR LABOR MARKETS\n   - Explains wage rigidity\n   - Efficiency wage theory supported\n   - Fairness\
    \ matters empirically"
  ebf_relevance: '10C DIMENSIONS:

    - WHAT (C): Fairness and effort

    - HOW (B): Wage-effort complementarity

    - WHEN (V): Labor market context


    THEORY SUPPORT:

