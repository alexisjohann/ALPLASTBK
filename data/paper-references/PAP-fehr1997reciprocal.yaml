summary:
  abstract_extended: 'This paper develops the concept of Homo Reciprocans as an alternative to

    Homo Economicus. Reciprocal individuals reward kindness and punish unkindness,

    even at personal cost. We show that the presence of reciprocal individuals

    fundamentally changes economic predictions about contracts, public goods,

    and labor markets.'
  key_findings: "1. HOMO RECIPROCANS\n   - Rewards kind actions\n   - Punishes unkind actions\n   - Sacrifices material payoffs\n\
    \n2. CONTRACT IMPLICATIONS\n   - Self-enforcing contracts possible\n   - Incomplete contracts work better\n   - Trust\
    \ enables cooperation\n\n3. PUBLIC GOODS\n   - Reciprocators sustain provision\n   - Punishment of free-riders\n   - Conditional\
    \ cooperation\n\n4. LABOR MARKETS\n   - Gift exchange equilibrium\n   - Efficiency wages emerge\n   - Unemployment persists"
  ebf_relevance: '10C DIMENSIONS:

    - WHAT (C): Reciprocity as utility component

    - HOW (B): Reciprocity creates complementarities

    - WHO (AAA): Heterogeneous population


    THEORY SUPPORT:

    - MS-SR-001: Strong Reciprocity

    - MS-SP-001: Social Preferences

    - Foundational concept paper


    KEY INSIGHT:

    Even a minority of reciprocal individuals can fundamentally change market

    outcomes predicted by standard theory.'
