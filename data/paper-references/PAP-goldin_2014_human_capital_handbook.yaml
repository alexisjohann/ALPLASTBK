abstract: 'There are two broad intellectual streams in the description and explanation
  of social action. One, characteristic of the work of most sociologists, sees the
  actor as socialized and action as governed by social norms, rules, and obligations.
  The principal virtues of this intellectual stream lie in its ability to describe
  action in social context and to explain the way action is shaped, constrained, and
  redirected by the social context. The other intellectual stream, characteristic
  of the work of most economists, sees the actor as having goals independently arrived
  at, as acting independently, and as wholly self-interested. Its principal virtue
  lies in having a principle of action, that of maximizing utility. This principle
  of action, together with a single empirical generalization (declining marginal utility),
  has generated the extensive growth of neoclassical economic theory, as well as the
  growth of political philosophy of several varieties: utilitarianism, contractarianism,
  and natural rights. In earlier works (Coleman 1986a, 1986b), I have argued for and
  engaged in the development of a theoretical orientation in sociology that includes
  components from both these intellectual streams. It accepts the principle of rational
  or purposive action and attempts to show how that principle, in conjunction with
  particular social contexts, can account not only for the actions of individuals
  in particular contexts but also for the development of social organization. In the
  present paper, I introduce a conceptual tool for use in this theoretical enterprise:
  social capital. As background for introducing this concept, it is useful to see
  some of the criticisms of and attempts to modify the two intellectual streams. Both
  these intellectual streams have serious defects. The sociological stream has what
  may be a fatal flaw as a theoretical enterprise: the actor has no “engine of action.”
  The actor is shaped by the environment, but there are no internal springs of action
  that give the actor a purpose or direction. The very conception of action as wholly
  a product of the environment has led sociologists themselves to criticize this intellectual
  stream, as in Dennis Wrong’s (1961) “Oversocialized Conception of Man in Modern
  Sociology.”'
