abstract: 'This book analyzes tacit and explicit knowledge, expanding upon Michael Polanyi''s original concepts. Collins teases
  apart three very different meanings: relational tacit knowledge (things we could describe with effort), somatic tacit knowledge
  (things our bodies can do but we cannot describe, like balancing on a bike), and collective tacit knowledge (knowledge that
  is the property of society, such as language rules). Unlike Polanyi, Collins portrays the relationship between tacit and
  explicit knowledge as a continuum from readily explicable to ever-more-recondite forms. The work ''turns Polanyi on his
  head by showing that the deep mystery is how knowledge ever becomes explicit in the first place.'' Essential for understanding
  limits of AI and machine learning.'
