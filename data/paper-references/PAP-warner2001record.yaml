abstract: From the onset of World War II until July 1973, the draft was a fact of life for male youth in the United States.
  Since then, America's armed forces have been staffed by volunteers. Recent recruiting difficulties have precipitated calls
  from some quarters for a return to conscription. This paper reviews the economic issues involved in the choice over conscription
  versus volunteerism and it reviews the volunteer force record in the U. S. Despite recent recruiting difficulties, the case
  for the volunteer force is more compelling today than it was in 1973.
