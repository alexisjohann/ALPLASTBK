abstract: This article assesses the major systems of environmental liability in the United States—the toxic tort system and
  Superfund. The discussion of each of these areas first lays out the scientific background of the environmental problems
  and the applicable regulatory regime. It then analyzes the efficacy of these regimes for addressing environmental problems
  and suggests alternative institutional designs for better promoting the goals of equitable and cost-effective compensation
  of disease victims and efficient deterrence and remediation of environmental degradation.
