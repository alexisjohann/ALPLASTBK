abstract: Following half a century of fiscal activism and federal leadership, the call now is for downsizing the federal budget
  and a devolution of fiscal responsibilities to states and localities. The call for "federalism," meant to secure a stronger
  center in James Madison's time, now seeks to decentralize. This paper outlines the main features of fiscal federalism as
  I see them, sketching a vision which differs in major respects from that offered by the lead paper in this symposium. First
  I highlight the role of distribution, which I see as a central function. Then, I focus attention on grants-in-aid and their
  role in the federal system. Finally I consider competition, cooperation, and coordination between jurisdictions.
