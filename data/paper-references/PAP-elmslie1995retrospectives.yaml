abstract: One of the most interesting debates in modern economics centers around the question of whether integrating economies
  necessarily converge in terms of per capita income and technology. This debate is often believed to have been started by
  Thorstein Veblen in 1915. However, this paper demonstrates that the genesis of the convergence question goes back to the
  Scottish Enlightenment and the publication of an essay by David Hume in 1742. The ensuing ‘rich country-poor country’ debate--between
  David Hume on the convergence side and Josiah Tucker on the nonconvergence side--represents one of the first major doctrinal
  debates in economics.
