abstract: 'Six years after the passage of the 2008 Troubled Asset Relief Program, commonly known as TARP, it remains hard
  to measure the total social costs and benefits of the assistance to banks provided under TARP programs. TARP was not a single
  approach to assisting weak banks but rather a variety of changing solutions to a set of evolving problems. TARP''s passage
  was associated with significant improvements in financial markets and the health of financial intermediaries, as well as
  an increase in the supply of lending by recipients. However, a full evaluation must also take into account other factors,
  including the risks borne by taxpayers in the course of the bailouts; moral-hazard costs that could result in more risk-taking
  in the future; and social costs related to perceived unfairness. Our evaluation is organized in five parts: 1) What did
  policymakers do? 2) What are the proper objectives of interventions like TARP assistance to financial institutions? 3) Did
  TARP succeed in those economic objectives? 4) Were TARP funds allocated purely on an economic basis, or did political favoritism
  play a role? 5) Would alternative policies, either alongside or instead of TARP, and alternative design features of TARP,
  have worked better?'
