abstract: This paper makes the case that purposive, profit-seeking investments in knowledge play a critical role in the long-run
  growth process. First, the authors review the implications of neoclassical growth theory and the more recent theories of
  ‘endogenous growth.’ Then they discuss the empirical evidence that bears on the modeling of long-run growth. Finally, the
  authors describe in more detail a model of growth based on endogenous technological progress and discuss the lessons that
  such models can teach us.
