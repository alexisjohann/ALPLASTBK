abstract: “Bold and original.”—Daniel Kahneman, PhD, bestselling author of Thinking Fast and Slow There are a slew of books
  on the market dictating programs for achieving happiness, but Happiness by Design is the first to explain that happiness
  ultimately depends upon our experience of pleasure and purpose over time—and everyone has their own optimal balance. Combining
  the latest insights from economics and psychology, renowned behavior expert Paul Dolan, PhD, shows readers how to integrate
  his ground–breaking paradigm into a practical plan for deciding, designing, and doing the things that bring them true happiness.
