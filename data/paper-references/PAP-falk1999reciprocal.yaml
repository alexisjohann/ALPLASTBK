abstract: This paper develops a formal theory of reciprocity where people reward kind actions and punish unkind ones. The
  theory accounts for how individuals evaluate kindness based not only on the consequences of actions but also on the underlying
  intentions behind them. The model explains stylized facts across various experimental games and demonstrates that fairness
  intentions play an important role in economic relations, political struggles, and legal disputes. The paper provides experimental
  evidence for the behavioral relevance of fairness intentions, distinguishing reciprocal behavior from pure outcome-based
  preferences.
