summary:
  abstract: >
    This paper surveys the experimental evidence on reciprocal behavior and
    discusses its economic implications. Reciprocity means that people reward
    kind actions and punish unkind ones. We show that reciprocity has important
    implications for contract enforcement, public goods provision, and labor
    market outcomes. The presence of reciprocal individuals can fundamentally
    change the nature of equilibria.

key_findings_structured:
  - finding: "Homo Reciprocans as alternative to Homo Economicus — people care about intentions and fairness, willing to sacrifice material payoff to reward/punish"
    domain: behavior
    stage: action
    primary_dimension: S
    effect_size: 0.8
  - finding: "Reciprocity enables self-enforcing contracts — workers provide effort above minimum when treated fairly, employers pay efficiency wages anticipating reciprocity"
    domain: labor
    stage: action
    primary_dimension: F
  - finding: "Reciprocity sustains public goods cooperation — conditional cooperation depends on others' behavior, punishment of free riders by reciprocators"
    domain: nonprofit
    stage: action
    primary_dimension: S
  - finding: "Gift exchange in labor markets — fair wages elicit high effort, wage rigidity explained by reciprocity concerns"
    domain: labor
    stage: maintenance
    primary_dimension: F

