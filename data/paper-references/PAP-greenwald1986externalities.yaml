summary:
  abstract_extended: 'This paper presents a simple, general framework for analyzing
    externalities in

    economies with incomplete markets and imperfect information. By identifying

    the pecuniary effects of these externalities that net out, the paper simplifies

    the problem of determining when tax interventions are Pareto improving.


    The key insight is that in markets with imperfect information or incomplete

    risk markets, pecuniary externalities matter in ways fundamentally different

    from the standard model. In perfect markets, such price effects cancel, with

    gains of one individual offset by losses of others. But with imperfect

    information, this netting out fails, and seemingly innocuous price changes

    have real welfare effects.


    The approach indicates that tax interventions are almost always Pareto

    improving and that equilibria in situations of imperfect information are

    rarely constrained Pareto optima.'
  key_findings: "1. PECUNIARY EXTERNALITIES MATTER: Unlike in complete markets, pecuniary\n\
    \   externalities have real welfare effects under imperfect information\n\n2.\
    \ MARKET FAILURE IS PERVASIVE: Equilibria with imperfect information are\n   rarely\
    \ constrained Pareto efficient - intervention almost always helps\n\n3. INFORMATION\
    \ FAILURES: Adverse selection and moral hazard create pecuniary\n   externalities\
    \ that matter for aggregate welfare\n\n4. GENERAL FRAMEWORK: Provides unified\
    \ approach to analyzing market failures\n   from information asymmetries\n\n5.\
    \ TAX INTERVENTIONS: Identifies when corrective taxes can achieve Pareto\n   improvements\
    \ over laissez-faire outcomes\n\n6. INCOMPLETE MARKETS: Results extend to settings\
    \ with incomplete risk markets,\n   not just informational imperfections"
