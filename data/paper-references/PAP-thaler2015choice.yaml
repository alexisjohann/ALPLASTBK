abstract: |
  Decision makers do not make choices in a vacuum. They make them in an
  environment where many features, noticed and unnoticed, can influence their
  decisions. The person who creates that environment is, in our terminology,
  a choice architect. In this paper we analyze some of the tools that are
  available to choice architects. Our goal is to show how choice architecture
  can be used to help nudge people to make better choices (as judged by
  themselves) without forcing certain outcomes upon anyone, a philosophy we
  call libertarian paternalism. The tools we highlight are: defaults, expecting
  error, understanding mappings, giving feedback, structuring complex choices,
  and creating incentives.

key_findings_structured:
  - title: "Defaults as Path of Least Resistance"
    finding: "For reasons of laziness, fear, and distraction, many people will take whatever option requires the least effort. Defaults have enormous power because they represent the path of least resistance."
  - title: "Six Tools of Choice Architecture"
    finding: "Effective choice architecture uses six key tools: defaults, expecting error, understanding mappings, giving feedback, structuring complex choices, and creating incentives (iNcentives)."
  - title: "Stimulus-Response Compatibility"
    finding: "Performance suffers when signal and desired action are in opposition. Design should ensure that stimuli are consistent with desired actions — flat plates say push, handles say pull."
  - title: "System 1 vs System 2 Accommodation"
    finding: "Choice architecture must accommodate both the Automatic System (rapid, intuitive) and the Reflective System (deliberate, logical), as the Automatic System often triumphs in real decisions."

