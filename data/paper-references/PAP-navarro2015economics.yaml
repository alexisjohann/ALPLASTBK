abstract: The academy in which we toil is moving rapidly towards a greater role for online delivery of higher education, and
  both fans and skeptics offer strong reasons to believe this technological shock will have substantial disruptive effects
  on faculty. How can we as economic educators continue to provide sufficient value-added to justify our role in a world where
  much of what we now do is effectively being automated and commoditized? In this brave new online world, many successful
  and resilient faculty will add value (and differentiate their product) not by producing costly and elaborate multimedia
  lectures in which they become a superstar professor-celebrity, but rather through careful, clever, and innovative choices
  regarding both the adoption of the online content of other providers and the forms of online interactions they integrate
  into their course designs. Possible forms of faculty-to-student and student-to-student interactions run the digital gamut
  from discussion boards and electronic testing to peer assessments, games and simulations, and virtual office hours. This
  article explores basic descriptive and prescriptive questions economic educators and their administrators are likely to
  face as the online education tide rises. For example, how much does it cost to develop online content and how much time
  does it take? What are the key “ingredients” for a pedagogically sound online course? Throughout, I will draw on both the
  extant literature as well as my own experience at the University of California, Irvine, where the online evolution is advancing
  rapidly.
