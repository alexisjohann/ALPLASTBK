abstract: 'Jakob Hohwy explores a new theory in neuroscience: the idea that the brain is essentially a hypothesis-testing
  mechanism that attempts to minimise the error of its predictions about sensory input. He explains the rich and multifaceted
  character of our conscious perception, and argues that the mind has a fragile indirect relation to the world.'
