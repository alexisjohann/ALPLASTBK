abstract: 'This paper documents the potential and actual savings that consumers realize from four particular types of purchasing
  behavior: purchasing on sale; buying in bulk (at a lower per unit price); buying generic brands; and choosing outlets. How
  much can and do households save through each of these behaviors? How do these patterns vary with consumer demographics?
  We use data collected by a marketing firm on all food purchases brought into the home for a large, nationally representative
  sample of U.K. households in 2006. We are interested in how consumer choice affects the measurement of price changes. In
  particular, a standard price index based on a fixed basket of goods will overstate the rise in the true cost of living because
  it does not properly consider sales and bulk purchasing. According to our measures, the extent of this bias might be of
  the same or even greater magnitude than the better-known substitution and outlet biases.'
