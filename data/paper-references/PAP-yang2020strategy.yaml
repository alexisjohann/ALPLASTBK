strategy_practices_framework:
  description: >
    14-item scoring grid for measuring how structured a firm's strategy-making
    process is. Each item scored 1 (intuitive/reactive) to 5 (structured/proactive).
  dimensions:
    formalization:
      items:
        - "F1: Strategy Statement — can CEO articulate goals, scope, competitive advantage?"
        - "F2: Deliberate Scope — clear prioritization of markets and winning approach?"
        - "F3: Strategic Distinctiveness — how does firm differ from competitors?"
    development:
      items:
        - "D1: Proactive Scanning — actively search environment vs. react to threats?"
        - "D2: Evidence-Based Decisions — data-driven with explicit assumptions?"
        - "D3: Regular Strategy Meetings — routinized connection of strategy and implementation?"
        - "D4: Effective Strategy Meetings — well-prepared, discussion-based?"
        - "D5: Exploration of Alternatives — routinized generation and evaluation of options?"
        - "D6: Systematic Risk Evaluation — processes for voicing concerns?"
    implementation:
      items:
        - "I1: Implementation Planning — anticipate problems when making decisions?"
        - "I2: Effective Strategy Reviews — regular outcome reviews vs. initial assumptions?"
        - "I3: Learning from Outcomes — systematic validation and learning from surprises?"
        - "I4: Strategy Communication — regular communication beyond top management?"
        - "I5: Resistance Accommodation — anticipate and manage resistance to change?"
  correlations: >
    Development strongly correlated with both Formalization and Implementation.
    Formalization and Implementation are negatively and insignificantly correlated.
    This differs from WMS where operational practices are highly correlated —
    suggesting either less complementarity in strategy practices or unrealized
    complementarity potential.

kaufland_relevance:
  kibsm_link: MOD-013
  relevant_for:
    - "Measuring strategy capability at Filialleitung level (14-item grid adaptable)"
    - "Heterogeneity across store managers — some intuitive, some structured"
    - "Education/training as causal lever (Porter RDD validates FK-Akademie approach)"
    - "Formalization vs. Implementation trade-off (FK-training must cover BOTH)"
    - "Industry explains zero variance — management practices are the lever, not retail context"
    - "More decisions but slower — structured process is investment, not overhead"
  key_insights_for_kaufland:
    - insight: >
        Strategy Practices Grid (14 items) can be adapted for Kaufland Filialleiter
        assessment: How structured do store managers plan, execute, and learn from
        store-level strategic decisions (assortment changes, staff scheduling,
        cleanliness protocols)?
      kibsm_element: "SUB-F01-OPS + SUB-F05-HR assessment framework"
    - insight: >
        The Porter RDD proves that management EDUCATION causally changes strategy
        practices DECADES later. This validates Kaufland's FK-Akademie investment —
        but warns: if training focuses only on Formalization (goals, KPIs) without
        Implementation (execution, learning), the effect will be lopsided.
      kibsm_element: "INT-K-005 FK-Akademie curriculum design"
    - insight: >
        Development and Implementation are NOT naturally correlated (unlike WMS
        operational practices). This means Kaufland needs EXPLICIT complementarity
        design — linking strategy development training with implementation routines.
      kibsm_element: "complementarity_matrix — potential new gamma for strategy practices"
    - insight: >
        Experienced CEOs/managers rely MORE on intuition and LESS on structured
        processes. Kaufland's experienced Filialleitungen may resist structured
        approaches — intervention design must account for this.
      kibsm_element: "WHO-01 Filialleitung segment — experience-bias adjustment"

