abstract: >
  Survey of 262 CEO alumni of Harvard Business School measuring how executives
  make strategic decisions. Develops a novel 14-item Strategy Practices scoring
  grid across three dimensions: Formalization (F1-F3), Development (D1-D6), and
  Implementation (I1-I5). Scores range from 1 (informal, intuitive, reactive)
  to 5 (formalized, evidence-based, proactive). Key findings: (1) CEOs vary
  dramatically in how structured their strategy processes are, even within this
  highly selected sample. (2) More structured strategy processes correlate with
  1.92x larger firms and 4.7% faster annual employment growth. (3) Using a
  regression discontinuity around Michael Porter's 1983 HBS curriculum overhaul,
  the authors show that MBA education causally affects strategy practices decades
  later -- Porter's curriculum increased Formalization but decreased Implementation
  focus. (4) Industry explains almost zero variance in strategy practices.
