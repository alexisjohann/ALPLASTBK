abstract: Population heterogeneity is ubiquitous in social science. The very objective of social science research is not to
  discover abstract and universal laws but to understand population heterogeneity. Due to population heterogeneity, causal
  inference with observational data in social science is impossible without strong assumptions. Researchers have long been
  concerned with two potential sources of bias. The first is bias in unobserved pretreatment factors affecting the outcome
  even in the absence of treatment. The second is bias due to heterogeneity in treatment effects. In this article, I show
  how “composition bias” due to population heterogeneity evolves over time when treatment propensity is systematically associated
  with heterogeneous treatment effects. A form of selection bias, composition bias, arises dynamically at the aggregate level
  even when the classic assumption of ignorability holds true at the microlevel.
