summary:
  abstract_extended: 'Economists usually assume that monetary incentives improve performance,
    and

    psychologists claim that the opposite may happen. This paper presents a set of

    experiments designed to test these contrasting claims.


    The key finding is that the effect of monetary compensation on performance is

    not monotonic. In treatments where money was offered, larger amounts yielded

    higher performance. However, offering money did not always improve performance:

    subjects who were offered small monetary incentives performed more poorly than

    those offered no compensation at all.


    This demonstrates "motivation crowding out": small extrinsic rewards can

    undermine intrinsic motivation, while sufficiently large rewards can overcome

    this effect. The implication is stark: pay enough, or don''t pay at all.'
  key_findings: "1. NON-MONOTONIC EFFECT: Small payments reduce performance relative\
    \ to no\n   payment; large payments increase it - relationship is U-shaped\n\n\
    2. MOTIVATION CROWDING OUT: Small extrinsic incentives crowd out intrinsic\n \
    \  motivation, reducing total effort\n\n3. THRESHOLD EFFECT: Incentives must exceed\
    \ a threshold to improve performance;\n   below this, they backfire\n\n4. CHARITY\
    \ FUNDRAISING: High school students raised less money for charity\n   when paid\
    \ a commission than when unpaid\n\n5. NORM TRANSFORMATION: Small payments transform\
    \ social norms (do it because\n   it's right) into market norms (do it for money)\n\
    \n6. PAY ENOUGH: Policy implication is binary - either pay substantially more\n\
    \   than the threshold or pay nothing at all"
