abstract: This article examines competition in Japan and its link to postwar economic prosperity. While Japan's industrial
  structure and competition policy seem to indicate that competition in Japan has been less intense, the empirical evidence
  does not support this conclusion. The sectors in which competition was restricted prove to be those where Japan was not
  internationally successful. In the internationally successful sectors, internal competition in Japan was invariably fierce.
  While the level of competition in Japan is currently rising, economic recovery is still hindered by distortions in the competition
  in many industries.
