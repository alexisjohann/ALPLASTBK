abstract: This paper is concerned with accounting for the saving and capital formation taking place in different sectors of
  the U.S. economy. In brief, where does saving arise and where is it used? Do some sectors save more than they spend for
  capital formation and thus are net lenders? Do other sectors save less than is required for their capital formation and
  thus are net borrowers? The U.S. national income accounts contain the basic data relating to these questions. However, at
  several points, these data must be recast in order to yield analytically useful results. When such a reformulation is made,
  the conclusions that can be drawn differ strikingly from much of the currently received conventional wisdom.
