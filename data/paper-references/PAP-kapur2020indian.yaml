abstract: 'The Indian state’s performance spans the spectrum from woefully inadequate, especially in core public goods provision,
  to surprisingly impressive in successfully managing complex tasks and on a massive scale. It has delivered better on macroeconomic
  rather than microeconomic outcomes, where delivery is episodic with inbuilt exit than where delivery and accountability
  are quotidian and more reliant on state capacity at local levels, and on those goods and services where societal norms on
  hierarchy and status matter less than where they are resilient. The paper highlights three reasons for these outcomes: under-resourced
  local governments, the long-term effects of India’s “precocious” democracy, and the persistence of social cleavage. However,
  claims that India’s state is bloated in size and submerged in patronage have weak basis. The paper concludes by highlighting
  a reversal of past trends in that state capacity is improving at the micro level even as India’s macro performance has become
  more worrisome.'
