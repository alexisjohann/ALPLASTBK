abstract: This paper considers the empirical literature on the nature and sources
  of urban increasing returns, also known as agglomeration economies. An important
  aspect of these externalities that has not been previously emphasized is that the
  effects of agglomeration extend over at least three different dimensions. These
  are the industrial, geographic, and temporal scope of economic agglomeration economies.
  In each case, the literature suggests that agglomeration economies attenuate with
  distance. Recently, the literature has also begun to …
