summary:
  abstract_extended: 'This paper analyzes different sanctioning systems for norm violations.

    We compare formal and informal sanctions, peer punishment and third-party

    punishment, and examine when each is most effective. Understanding sanctioning

    systems is key for institutional design and norm maintenance.'
  key_findings: "1. SANCTIONING VARIETIES\n   - Formal vs informal\n   - Peer vs third-party\n   - Centralized vs decentralized\n\
    \n2. EFFECTIVENESS CONDITIONS\n   - Visibility matters\n   - Proportionality important\n   - Legitimacy affects compliance\n\
    \n3. EVOLUTIONARY PERSPECTIVE\n   - Sanctioning evolved\n   - Supports large-scale cooperation\n   - Cultural variation\n\
    \n4. DESIGN IMPLICATIONS\n   - Match system to context\n   - Consider crowding effects\n   - Institutional complementarities"
  ebf_relevance: '10C DIMENSIONS:

    - WHAT (C): Sanctioning preferences

    - HOW (B): Formal-informal complementarity

    - WHEN (V): Context affects effectiveness


    THEORY SUPPORT:

    - MS-SN-001: Social Norms (enforcement)

    - MS-SR-001: Strong Reciprocity

    - Institutional design focus


    KEY INSIGHT:

    Different sanctioning systems are effective in different contexts; optimal

    institutional design must match system to situation.'
