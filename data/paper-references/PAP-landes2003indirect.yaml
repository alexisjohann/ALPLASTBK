abstract: When individuals infringe copyright, they often use tools, services, and venues provided by other parties. An enduring
  legal question asks to what extent those other parties should be held liable for the resulting infringement. For example,
  should a firm that produces photocopiers be required to compensate authors for any unauthorized copies made on that firm's
  machines? What about firms that manufacture personal computers or offer Internet access; should they be held liable, at
  least in part, for online music piracy? In this essay, we examine how modern copyright law addresses these questions and
  we evaluate the resulting system on economic grounds.
