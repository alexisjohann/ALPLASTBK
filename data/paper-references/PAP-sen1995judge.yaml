abstract: This symposium on voting procedures presents many interesting findings and insights. This note scrutinizes them
  and discusses two general issues. First, the assumption that voters’ preferences are menu-independent (and based on one
  canonical ordering of the alternatives) underestimates the importance of the process of voting (voting for x, against y).
  Second, evaluation can be a two-way process, including the axiomatic method (of social choice theory), going from isolated
  properties to voting schemes, and the converse method of first identifying attractions and perversities of particular voting
  schemes (as in this symposium) and then using properties for later axiomatic use.
