abstract: The U.K. bank Northern Rock became the first high-profile casualty of the global financial crisis of 2007–2008 when
  it suffered its depositor run in September 2007. In spite of the television images of long lines of depositors outside its
  branch offices, the run on Northern Rock was unlike the textbook retail depositor run caused by coordination failure. Also,
  contrary to received wisdom, its reliance on securitization was not an immediate factor in its failure. Rather, its problems
  stemmed from its high leverage coupled with reliance on institutional investors for short-term funding. When the de-leveraging
  in the credit markets began in August 2007, Northern Rock was uniquely vulnerable to the shrinking of lender balance sheets
  arising from the tick-up in measured risks. Financial regulation that relies on risk-weighted capital requirements is powerless
  against such runs. The Northern Rock case also offers lessons concerning the economics of short-term debt.
