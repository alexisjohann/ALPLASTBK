abstract: The 2022 John Bates Clark Medal of the American Economic Association was awarded to Oleg Itskhoki, Professor of
  Economics at the University of California, Los Angeles for his path breaking contributions in international economics. This
  article summarizes Oleg Itskhoki’s work and places it in the context of the broader literature and emphasizes how it has
  shed new light on a number of long-standing puzzles regarding the behavior of exchange rates and international relative
  prices more generally and their connection to macroeconomic fluctuations and government’s choices of monetary and fiscal
  policies.
