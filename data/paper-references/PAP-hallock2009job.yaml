abstract: Most workers have one employment contract that is explicit and another one that is implicit. The explicit employment
  contract specifies working hours, compensation, and job tasks. The implicit contract involves expectations about the extent
  to which the employment relationship is likely to continue over time. Will the firms will seek to avoid mass layoffs unless
  or until absolutely necessary? Will firms cushion the wages and compensation of employees to some extent from broad swings
  in the economy? Will employees show some degree of loyalty to the firm? This paper will argue that, along a number of dimensions,
  the nature of the worker–firm employment relationship may have changed substantially in recent years—a group of changes
  that as a whole have negatively affected the lives of workers and produced modest, if any, benefits for firms. If employers
  have become less involved with cushioning the blow of unemployment and avoiding layoffs where possible, then public policy
  might have a role to play in spreading the burden of a down labor market so that the burden is not borne so heavily by those
  who lose their jobs entirely.
