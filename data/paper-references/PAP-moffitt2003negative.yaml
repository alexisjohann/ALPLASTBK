abstract: The negative income tax proposed by Milton Friedman represents one of the fundamental ideas of modern welfare policy.
  However, the academic literature has raised two difficulties with it, one challenging its purported work incentives and
  the other suggesting the possible superiority of work requirements. In addition, work requirement approaches have gained
  ground in actual U.S. welfare policy over the last 30 years and the number of different programs has proliferated, another
  development counter to the negative income tax. On the other hand, the Earned Income Tax Credit has produced a negative-income-tax-like
  program on a vast scale.
