abstract: Credence goods markets suffer from inefficiencies caused by superior information of sellers about the surplus-maximizing
  quality. While standard theory predicts that equal mark-up prices solve the credence goods problem if customers can verify
  the quality received, experimental evidence indicates the opposite. We identify a lack of robustness of institutional design
  with respect to heterogeneity in distributional preferences as a possible cause and design new experiments that allow for
  parsimonious identification of sellers’ distributional types. Our results indicate that less than a fourth of the subjects
  behave according to standard theory’s assumption, the rest behaving either in line with non-standard selfish or in accordance
  with non-trivial other-regarding preferences. We discuss consequences of our findings for institutional design and agent
  selection.
