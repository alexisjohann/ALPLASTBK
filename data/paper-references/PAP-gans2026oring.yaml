title: O-Ring Automation
author: Gans
year: '2026'
publication_type: working_paper
doi: 10.3386/w34639
abstract: We study automation when tasks are quality complements rather than separable. Production requires numerous tasks
  whose qualities multiply as in an O-ring technology. A worker allocates a fixed endowment of time across the tasks performed;
  machines can replace tasks with given quality, and time is allocated across the remaining manual tasks. This ``focus'' mechanism
  generates three results. First, task-by-task substitution logic is incomplete because automating one task changes the return
  to automating others. Second, automation decisions are discrete and can require bundled adoption even when automation quality
  improves smoothly. Third, labour income can rise under partial automation because automation scales the value of remaining
  bottleneck tasks. These results imply that widely-used exposure indices, which aggregate task-level automation risk using
  linear formulas, will overstate displacement when tasks are complements. The relevant object is not average task exposure
  but the structure of bottlenecks and how automation reshapes worker time around them.
