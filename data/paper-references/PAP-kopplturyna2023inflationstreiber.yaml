  use_cases:
  - 'ÖSTERREICH-SPEZIFISCH: Einzige umfassende Studie zu AT-spezifischen Inflationstreibern
    — direkte Policy-Grundlage'
  - 'TRANSFERS > LOHNERHÖHUNGEN: €1bn Transfers = GDP +0.2pp bei vernachlässigbarer
    Inflation; €1bn Löhne = Inflation +0.24pp bei negativem GDP-Effekt im Jahr 2 —
    stützt SPÖ-Argument für gezielte Transfers statt genereller Lohnkompensation'
  - 'NACHFRAGE-DOMINIERT: Inflation war zunächst nachfrageseitig (Post-COVID Erholung),
    nicht rein angebotsgetrieben — nuanciert das ''Gierflatation''-Narrativ'
  - 'RESTAURANTS/HOTELS: Tourismus-Gewichtung (+5pp) treibt AT-Differential — inländische
    Bevölkerung (VPI) weniger betroffen als HVPI suggeriert'
  - 'ZENTRALISIERTE LOHNVERHANDLUNG: Kollektivvertrag-Konzentration im Jänner erzeugt
    Q1-Inflationsschock — institutionelles Design relevant'
  - 'ENERGIEMARKT-SPEZIFIKA: AT Energiepreisschock kam später aber persistenter —
    Vertragsstrukturen und Marktdesign als Policy-Hebel'
  - 'LOHNSZENARIO: 10% Löhne → 4.7% Inflation; 6% → 2.7% — quantifiziert Trade-off
    für Gewerkschaftsstrategie'
  - 'Vergleich mit Dao et al. (2024): Bestätigt Energiepreise als Haupttreiber, ergänzt
    AT-spezifische institutionelle Faktoren'
