content_justification: Full policy study with formal methodology. S1 present (what
  drives Austrian inflation differential to Euro area). S2 present (Shapiro supply-demand
  decomposition, VAR with Cholesky identification, PCA). S3 present (Austria vs. Euro
  area/DE/FR/ES, HVPI/VPI data, 2001-2023). S4 present (Restaurants/Hotels + Energy
  dominant, demand-driven initially, centralized bargaining creates January shock,
  wage increase more inflationary than transfers). S5 present (two Shapiro variants
  cross-validated, Schiman-Vukan comparison, multiple robustness checks). S6 partial
  (data publicly available via Eurostat/Statistik Austria, methodology reproducible).
