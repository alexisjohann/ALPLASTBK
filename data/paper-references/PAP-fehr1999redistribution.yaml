summary:
  abstract_extended: 'This paper examines voting behavior on redistribution policies. We analyze

    how social preferences, particularly inequality aversion, affect support

    for redistributive taxation and transfer programs.'
  key_findings: "1. REDISTRIBUTIVE PREFERENCES\n   - Inequality aversion drives support\n   - Beyond self-interest voting\n\
    \   - Fairness concerns matter\n\n2. VOTING BEHAVIOR\n   - Rich may support redistribution\n   - Poor may oppose transfers\n\
    \   - Social mobility expectations\n\n3. POLICY DESIGN IMPLICATIONS\n   - Framing affects support\n   - Perceived fairness\
    \ crucial\n   - Targeting mechanisms matter"
  ebf_relevance: '10C DIMENSIONS:

    - WHAT (C): Redistribution preferences

    - WHEN (V): Political/voting context

    - WHO (AAA): Heterogeneity in support


    THEORY SUPPORT:

    - MS-SP-001: Social Preferences

    - Public choice theory

    - JPubE political economy


    KEY INSIGHT:

    Voting for redistribution is driven by social preferences and fairness

    concerns, not just narrow self-interest; this explains cross-income

    support patterns.'
