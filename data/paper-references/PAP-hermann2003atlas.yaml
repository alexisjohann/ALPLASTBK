abstract: 'Mit dem<< Atlas der politischen Landschaften>> knüpfen wir an die Tradition
  geografischer Atlanten an. Die Karten in diesem Buch sind jedoch keine gewöhnlichen
  Karten, sondern sie zeigen die Schweiz in einer neuen, ungewohnten Sichtweise: Oben
  ist nicht Norden, sondern «liberal», unten nicht Süden, sondern «konservativ», und
  anstatt nahtlos aneinander zu grenzen, liegen die Kantone als «Inseln» in einem
  «Ozean der Weltanschauungen». Die so dargestellten «Gebirgslandschaf-ten» sind nicht
  durch Faltung …'
