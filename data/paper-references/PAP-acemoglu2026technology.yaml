  notes: 'Tractable framework for technology adoption in development context. Four barriers slow adoption:
    (1) Low absorptive capacity (education, management), (2) Institutional distortions, (3) Inappropriate
    technology (mismatch with local needs), (4) Credit market frictions. Key insight: These barriers increase
    distance to frontier and lower GDP/capita, BUT long-run growth rate still equals frontier (catch-up
    possible). Extensions: Innovation vs imitation choice, selection for high-productivity firms. Illustrated
    with cross-country and firm-level correlations. Acemoglu-Akcigit-Johnson provide foundational framework
    for understanding technology gaps.'
