abstract: Abstract. We examine the publications of authors affiliated with an economics research institution in Canada in
  (1) the Top‐10 journals in economics according to journals' impact factors, and (2) the Canadian Journal of Economics .
  We consider all publications in the even years from 1980 to 2000. Canadian economists contributed about 5% of publications
  in the Top‐10 journals and about 55% of publications in the Canadian Journal of Economics over this period. We identify
  the most active research centres and identify trends in their relative outputs over time. Those research centres successful
  in publishing in the Top‐10 journals are found to also dominate the Canadian Journal of Economics . Additionally, we check
  the robustness of our findings with respect to journal selection, and we present data on authors' PhD origin, thereby indicating
  output and its concentration in graduate education.
