abstract: Public attitudes and policies toward LGBTQ individuals have improved substantially in recent decades. Economists
  are actively shaping the discourse around these policies and contributing to our understanding of the economic lives of
  LGBTQ individuals. In this paper, we present the most up-to-date estimates of the size, location, demographic characteristics,
  and family structures of LGBTQ individuals in the United States. We describe an emerging literature on the effects of legal
  access to same-sex marriage on family and socioeconomic outcomes. We also summarize what is known about the size, direction,
  and sources of wage differentials related to variation in sexual orientation and gender identity. We conclude by describing
  a range of open questions in LGBTQ economics.
