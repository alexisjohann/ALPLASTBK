abstract: This paper shows that reciprocity has powerful implications for many economic domains. It is an important determinant
  in the enforcement of contracts and social norms and enhances the possibilities of collective action greatly. Reciprocity
  may render the provision of explicit incentive inefficient because the incentives may crowd out voluntary co-operation.
  It strongly limits the effects of competition in markets with incomplete contracts and gives rise to noncompetitive wage
  differences. Finally, reciprocity it is also a strong force contributing to the existence of incomplete contracts.
