abstract: A central implication of life-cycle models is that agents smooth consumption. We review the empirical evidence on
  smoothing at frequencies from within the year up to across a lifetime. We find that life-cycle models--particular those
  which incorporate realistic features of markets and goods--have more empirical successes than failures. We also show that
  some apparent deviations from theoretical predictions imply very small welfare losses for agents. Finally, we emphasize
  that the coherence of life-cycle models imposes an important discipline when incorporating new features into models.
