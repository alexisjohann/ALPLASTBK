abstract: This comment argues that discrimination against blacks remains important, especially in labor markets, but that
  its extent is modest both by historical standards and in relation to supply-side racial disparities. It contends that the
  racial skills gap is endogenous, reflecting the effects of historical and ongoing discrimination; and that the moral obligation
  to reduce disparities in skills between the races is no less than the obligation to fight market discrimination. Finally,
  it suggests that imperfect information may be a more pervasive and intractable cause of racial discrimination today than
  is behavior based on agents' purported distaste for associating with blacks.
