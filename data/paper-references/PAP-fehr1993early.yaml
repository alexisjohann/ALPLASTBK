summary:
  abstract_extended: 'This paper examines whether fairness considerations prevent competitive markets

    from clearing. Using experimental labor markets, we show that workers who

    receive wages above market-clearing levels reciprocate with higher effort.

    This creates an efficiency wage equilibrium where wages remain above

    competitive levels and unemployment persists.'
  key_findings: "1. FAIRNESS AND MARKET CLEARING\n   - Wages systematically above market-clearing levels\n   - Workers reciprocate\
    \ fair wages with effort\n   - Unemployment emerges in equilibrium\n\n2. GIFT EXCHANGE IN LABOR MARKETS\n   - Fair wage\
    \ offers elicit higher effort\n   - Unfair wages lead to minimal effort\n   - Reciprocity creates efficiency wages\n\n\
    3. EXPERIMENTAL EVIDENCE\n   - Labor market experiments\n   - Gift exchange observed\n   - Persistent non-clearing"
  ebf_relevance: '10C DIMENSIONS:

    - WHAT (C): Fairness as utility component

    - HOW (B): Gift exchange complementarity

    - WHEN (V): Market context affects clearing


    THEORY SUPPORT:

    - MS-SP-001: Social Preferences

    - MS-SR-001: Strong Reciprocity

    - Early experimental evidence for efficiency wages


    KEY INSIGHT:

    Fairness concerns can prevent competitive markets from clearing, leading to

    persistent unemployment through gift exchange mechanisms.'
