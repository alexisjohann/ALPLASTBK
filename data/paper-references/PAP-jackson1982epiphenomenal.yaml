abstract: 'I am what is sometimes known as a qualia freak. I think that there are
  certain features of the bodily sensations especially, but also of certain perceptual
  experiences, which no amount of purely physical information includes. The paper
  presents Marys Room thought experiment: Mary is a brilliant scientist who is forced
  to investigate the world from a black and white room. She learns everything there
  is to know about the physical nature of the world but has no actual perceptual experience
  of color. The knowledge argument suggests that qualia, the phenomenal aspects of
  our mental states, are epiphenomenal - features of our mental states that make no
  causal difference with respect to physical reality.'
