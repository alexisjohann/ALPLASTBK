abstract: 'Emmanuel Saez, winner of the 2009 John Bates Clark Medal, has distinguished himself by making fundamental contributions
  concerning critical theoretical and empirical issues within the field of public economics. He is one of those exceptional
  scholars whose work reflects a broad and thoroughly integrated vision. In carefully and creatively implementing that vision,
  he has led a remarkable resurgence of interest in tax policy research over the last decade. Emmanuel''s work can be divided
  into five areas: the theory of optimal taxes and transfers; the measurement of income and wealth distributions; the measurement
  of behavioral responses to personal taxation; the taxation of corporate dividends; and retirement saving. A great deal of
  his work is closely interrelated across these topics, which makes the whole considerably greater than the sum of the parts.
  In effect, he has bridged the chasm between theory and practical policymaking by attacking the policy design problem from
  both sides at once. This article provides a survey of Emmanuel''s work.'
