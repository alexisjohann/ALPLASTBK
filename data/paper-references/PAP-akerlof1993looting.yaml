abstract: Акерлоф и Ромер показали, что возможность использования механизма банкротства для получения прибыли одними (собственниками
  и менеджерами, преследующими единые цели) в ущерб другим (обществу в целом, т.е. происходит снижение общественного благосостояния)
  при определенных условиях, и назвали такое поведение собственников предприятий мародерством (looting). Авторы используют
  термин мародерство, потому что собственники и менеджеры принимают решения, осознавая влияние своих действий на общественное
  благосостояние. Авторы построили трехпериодную модель, описывающую выбор собственника между стратегией мародерства и стратегией
  максимизации стоимости фирмы в долгосрочной перспективе (true value of the thrift) при отсутствии неопределенности.
