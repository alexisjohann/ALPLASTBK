abstract: This seminal book provides a theoretical and empirical analysis of investments in human capital - education, training,
  and knowledge that increase economic productivity. Becker argues that human capital investments explain many economic phenomena
  including wage differentials, unemployment patterns, and economic growth. The 3rd edition includes updated empirical evidence
  and new chapters on human capital and the family. The work established human capital theory as a major field in economics.
