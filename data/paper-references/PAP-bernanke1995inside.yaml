abstract: The ‘credit channel’ theory of monetary policy transmission holds that informational frictions in credit markets
  worsen during tight-money periods. The resulting increase in the external finance premium--the difference in cost between
  internal and external funds--enhances the effects of monetary policy on the real economy. The authors document the responses
  of GDP and its components to monetary policy shocks and describe how the credit channel helps explain the facts. They discuss
  two main components of this mechanism, the balance sheet and bank lending channels. The authors argue that forecasting exercises
  using credit aggregates are not valid tests of this theory.
