abstract: 'Recently in economics there has been discussion of how to increase diversity in the profession and how to improve
  the work life of diverse peoples. We conducted surveys and interviews with Black, Latinx and Native American people. These
  groups have long been underrepresented in the economics profession. Participants were at various stages along the economics
  career trajectory, or on the trajectory no longer, and used their lived experience to reflect on what helps and hurts underrepresented
  minorities in economics. We heard a few consistent themes: bias, hostile climate, and the lack of information and good mentoring
  among them. Respondents’ insights and experience point toward action steps that you can take today to increase the presence
  and improve the work life of underrepresented minorities in the economics profession.'
