abstract: This paper provides an overview of the long-term impacts of the Columbian Exchange—that is, the exchange of diseases,
  ideas, food crops, technologies, populations, and cultures between the New World and the Old World after Christopher Columbus'
  voyage to the Americas in 1492. We focus on the aspects of the exchange that have been most neglected by economic studies;
  namely the transfer of diseases, food crops, and knowledge between the two Worlds. We pay particular attention to the effects
  of the exchange on the Old World.
