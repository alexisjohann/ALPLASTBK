abstract: Many experiments have shown that human subjects do not nec) essarily behave in line with game theoretic assumptions
  and solution concepts. The reasons for this nonuconformity are multiple and some) times human decision makers can learn
  to make choices that are pre) dicted by theory. In this paper we study behavior in repeated 2u person guessing games in
  order to find out whether people can learn to make rational choices and what piece of information is necessary to observe
  convergence. We analyze behavior in 4 treatments that differ in the amount of information that is provided after each round.
  We observe that convergence toward equilibrium is driven by learning through the information about the other playerrs choice
  and adapta) tion rather than selfuinitiated rational reasoning.
