abstract: 'Business firms around the world are experimenting with new organizational
  designs,

  changing their formal architectures, their routines and processes, and their corporate

  cultures as they seek to improve their current performance and their growth prospects.

  This book develops an integrated framework for organizational design based on four
  key

  concepts: efficiency, property rights, complementarities, and the non-convexities
  of

  organizational choice. Drawing on transaction cost economics, agency theory, and
  the

  economics of complementarity, it addresses the fundamental questions of why firms
  exist,

  where their boundaries should be, how to motivate people within them, and how to

  organize for both performance and growth. Illustrated with detailed case studies

  including BP, Nokia, 3M, and Lincoln Electric.

  '
