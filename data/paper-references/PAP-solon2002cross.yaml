abstract: International studies of the extent to which economic status is passed from one generation to the next are important
  for at least two reasons.  First, each study of a particular country characterizes an important feature of that country's
  income inequality. Second, comparisons of intergenerational mobility across countries may yield valuable clues about how
  income status is transmitted across generations and why the strength of that intergenerational transmission varies across
  countries. The first section of this paper explains a benchmark measure of intergenerational mobility commonly used in U.S.
  studies. The second section summarizes comparable empirical findings that have accumulated so far for countries other than
  the United States. The third section sketches a theoretical framework for interpreting cross-country differences in intergenerational
  mobility.
