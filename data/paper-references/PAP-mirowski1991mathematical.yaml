abstract: In writings about the history of the use of mathematical expression in economics, there seems to be a conviction
  that the movement towards its current flowering was cumulative, inevitable, and indeed, natural. While, such notions are
  widely held among practicing economists, I want to argue that they are not historically valid. The deployment of mathematical
  expression in economic discourse enjoyed neither an inexorable nor unhindered progress, but rather was characterized by
  two primary ruptures in the history of economic thought, episodes marking the inflection points in the rise of mathematical
  discourse. The main reason for such a disjointed narrative is that, in the evolution of economic thought, most of the participants
  were not convinced that the subject matter intrinsically demanded mathematical expression, while those so enamored experienced
  great difficulty in creating a community which could agree upon a formalism which was thought to be well-suited to economic
  issues.
