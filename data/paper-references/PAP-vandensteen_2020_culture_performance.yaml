abstract: Bearing in mind the environmental corrosion primarily triggered by the service
  sector, as well as the lack of studies detecting the factors that enable an organization
  to deal with this concern, the aim of this study is to analyze the impact of total
  quality management (TQM) practices on corporate green performance (CGP) and to investigate
  the causal relationship between total quality management practices and corporate
  green performance. This research also explores the mediating role of organizational
  culture (OC) within the relationship between TQM practices and CGP. In particular,
  this study is based on the MBNQA model, institutional theory, and green theory.
  The researchers collected data from 369 participants across 123 large and medium-sized
  private firms in the health sector in Pakistan. The structural analyses revealed
  the significant and positive impact of TQM practices on CGP. This demonstrates that
  TQM practices substantially augment organizational competencies to achieve green
  performance objectives. TQM practices have also had a positive and significant impression
  on organizational culture; furthermore, a parallel impact is seen between OC and
  CGP. Finally, OC is shown to have positively and significantly mediated the relationship
  between TQM and CGP. This study’s contextual analysis suggests that TQM is an equally
  important factor in accomplishing CGP objectives for both large and medium-sized
  firms.
