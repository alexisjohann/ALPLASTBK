abstract: In Volume 1 of Game Theory and the Social Contract, Ken Binmore restated the problems of moral and political philosophy
  in the language of game theory. In Volume 2, Just Playing, he unveils his own controversial theory, which abandons the metaphysics
  of Immanuel Kant for the naturalistic approach to morality of David Hume. According to this viewpoint, a fairness norm is
  a convention that evolved to coordinate behavior on an equilibrium of a society's Game of Life. This approach allows Binmore
  to mount an evolutionary defense of Rawls's …
