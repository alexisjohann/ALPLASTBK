abstract: 'We examine editorial decision-making using anonymized submission data for four leading economics journals: the
  Journal of the European Economics Association, the Quarterly Journal of Economics, the Review of Economic Studies, and the
  Review of Economics and Statistics. We match papers to the publication records of authors at the time of submission and
  to subsequent Google Scholar citations. We develop a benchmark model in which editors maximize the expected quality of accepted
  papers and citations are unbiased measures of quality. We find that referee recommendations are strong predictors of citations
  and that editors follow these recommendations closely. Papers by highly published authors receive more citations, conditional
  on the referees recommendations and publication status.'
