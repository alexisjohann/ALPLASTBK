abstract: A person deciding on a career, a wife, or a place to live bases his choice on two factors:(1) How much do I like
  each of the available alternatives? and (2) What are the chances for a successful outcome of each alternative? These two
  factors comprise the utility of each outcome for the person making the choice. This notion of utility is fundamental to
  most current theories of decision behavior. According to the expected utility hypothesis, if we could know the utility function
  of a person, we could predict his choice from among any set of …
