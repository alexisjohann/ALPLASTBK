abstract: In a beauty contest experiment with over 6,000 chess players, ranked from amateur to world class, we found that
  Grandmasters act very similar to other humans. This even holds true when they play exclusively against players of approximately
  their own strength. In line with psychological research on chess players' thinking, we argue that they are not more rational
  in a game theoretic sense per se. Their skills are rather specific for their game.
