abstract: 'Why is credit rationed? Perhaps the most basic tenet of economics is that market equilibrium entails supply equalling
  demand; that if demand should exceed supply, prices will rise, decreasing demand and/or increasing supply until demand and
  supply are equated at the new equilibrium price. So if prices do their job, rationing should not exist. However, credit
  rationing and unemployment do in fact exist. They seem to imply an excess demand for loanable funds or an excess supply
  of workers.

  One method of" explaining" these conditions associates them with short-or long-term disequilibrium. In the short term they
  are viewed as temporary disequilibrium phenomena; that is, the economy has incurred an exogenous shock, and for reasons
  not fully explained, there is some stickiness in the prices of labor or capital (wages and interest rates) so that there
  is a transitional period during which rationing of jobs or credit occurs. On the other hand, long-term unemployment (above
  some" natural rate") or credit rationing is explained by governmental constraints such as usury laws or mini-mum wage legislation.''The
  object of this paper is to show that in equilibrium a loan market may be characterized by credit rationing. Banks making
  loans are concerned about the interest rate'
