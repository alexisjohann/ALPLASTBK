summary:
  abstract_extended: 'This paper demonstrates that even in equilibrium, credit rationing will exist

    in a loan market. The key mechanism is adverse selection: banks cannot directly

    observe borrower quality, and the interest rate affects which borrowers apply

    for loans.


    Credit rationing takes two forms: (a) among loan applicants who appear

    identical, some receive loans and some do not, even though rejected applicants

    would pay higher interest rates; or (b) entire groups cannot obtain loans at

    any rate, even though with larger credit supply they would.


    The counterintuitive result is that banks may refuse to raise interest rates

    even in the presence of excess demand, because higher rates attract riskier

    borrowers (adverse selection) and encourage riskier behavior (moral hazard).'
  key_findings: "1. EQUILIBRIUM RATIONING: Credit rationing persists in equilibrium - it is not\n   merely a temporary disequilibrium\
    \ phenomenon\n\n2. ADVERSE SELECTION: Higher interest rates attract riskier borrowers because\n   safer projects become\
    \ unprofitable at high rates\n\n3. MORAL HAZARD: Higher rates incentivize borrowers to shift toward riskier\n   projects,\
    \ increasing default probability\n\n4. BANKS WON'T CLEAR MARKETS: Profit-maximizing banks choose not to raise rates\n\
    \   to clear excess demand because higher rates reduce expected returns\n\n5. COLLATERAL INEFFECTIVE: Raising collateral\
    \ requirements may worsen adverse\n   selection, not solve it\n\n6. SUPPLY AND DEMAND FAILS: Law of supply and demand\
    \ is model-specific; it\n   fails in credit markets with asymmetric information"
