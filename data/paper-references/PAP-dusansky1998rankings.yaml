abstract: Economics departments in the United States are ranked using the criterion of publication in a set of eight leading
  journals. The publication period is 1990-94 inclusive, and faculty assignments to departments are for fall semester 1995.
  The ranking is compared with the publication-based rankings of Conroy-Dusansky, which it updates, and Scott-Mitias, as well
  as with the survey-based rankings of the National Research Council and of U.S. News and World Report. Important issues considered
  include current accuracy of software matching using electronic indexes, objectivity of criteria, contemporaneity of survey
  response, and correlations between rankings.
