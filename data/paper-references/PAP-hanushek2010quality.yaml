abstract: The main effects of No Child Left Behind on the quality of teaching are likely to come through two provisions of
  the act. First, NCLB establishes benchmarks based on test score pass rates that schools must meet in order to remain in
  good standing and avoid sanctions. Since teachers are central to student performance, this accountability component of NCLB
  is likely to have direct effects on both the demand for and supply of teachers and therefore on both the composition of
  the stock of public school teachers and the distribution of those teachers among schools. Second, NCLB explicitly requires
  districts to have “highly qualified” teachers, and the enunciation and enforcement of such a standard might have an additional
  effect on the composition of teachers. We will discuss three avenues by which these requirements might affect the quality
  of teachers. First, we will argue that the requirements for “highly qualified” teachers are unlikely to have had any perceptible
  effect on the performance of students. Second, the combination of quality requirements and the more-stringent testing environment
  could make teaching appear more costly and risky as a profession and thus alter the composition of new entrants, but at
  least so far, we find no evidence of such effects. Finally, the accountability provisions might change the dynamics of the
  labor market for teachers, including decisions about hiring and job separation. While not completely understood, this channel
  might be quite important, especially at low-performing schools where the stress of the accountability requirements is highest.
  We will provide new evidence from Texas on the relationship between school accountability ratings and teacher transitions
  both out of schools and out of grades three through eight, the grades subject to NCLB testing requirements. Finally, we
  offer some observations about potential policy implications and a future research agenda.
