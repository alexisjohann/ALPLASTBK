abstract: In this paper, we consider the sources and prospects for economic growth in China with a focus on human capital.
  First, we provide an overview of the role that labor has played in China's economic success. We then describe China's hukou
  policy, which divides China's labor force into two distinct segments, one composed of rural workers and the other of urban
  workers. For the rural labor force, we focus on the challenges of raising human capital by both increasing basic educational
  attainment rates as well as the quality of education. For the urban labor force, we focus on the issues of further expanding
  enrollment in college education as well as improving the quality of college education. We use a regression model to show
  the typical relationship between human capital and output in economies around the world and demonstrate how that relationship
  has evolved since 1980. We show that China has made substantial strides both in the education level of its population and
  in the way that education is being rewarded in its labor markets. However, as we look ahead, our results imply that China
  may find it impossible to maintain what appears to be its desired growth rate of 7 percent in the next 20 years; a growth
  rate of 3 percent over the next two decades seems more plausible. Finally, we present policy recommendations, which are
  rooted in the belief that China continues to have substantial room to improve the human capital of its labor force.
