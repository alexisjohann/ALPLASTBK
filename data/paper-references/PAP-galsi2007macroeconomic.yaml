abstract: 'We describe some of the main features of the recent vintage of macroeconomic models used for monetary policy evaluation.
  We point to some of the key differences with respect to the earlier generation of macro models and highlight the insights
  for policy that these new frameworks have to offer. Our discussion emphasizes two key aspects of the new models: 1) the
  significant role of expectations of future policy actions in the monetary transmission mechanism and 2) the importance for
  the central bank of tracking the flexible price equilibrium values of the natural levels of output and the real interest
  rate. We argue that both features have important implications for the conduct of monetary policy.'
