abstract: Historically Black colleges and universities are institutions that were established prior to 1964 with the principal
  mission of educating Black Americans. In this essay, we focus on two main issues. We start by examining how Black College
  students perform across HBCUs and non-HBCUs by looking at a relatively broad range of outcomes, including college and graduate
  school completion, job satisfaction, social mobility, civic engagement, and health. HBCUs punch significantly above their
  weight, especially considering their significant lack of resources. We then turn to the potential causes of these differences
  and provide a glimpse into the “secret sauce” of HBCUs. We conclude with potential implications for HBCU and non-HBCU policy.
