abstract: "Examines the use of Harsanyi and Selten's risk dominance measure in coordination games. The paper analyzes experimental data on how players coordinate when multiple equilibria exist, finding that risk dominance often predicts coordination outcomes better than payoff dominance. The study contributes to understanding coordination failures in static games and the role of strategic uncertainty in equilibrium selection."
