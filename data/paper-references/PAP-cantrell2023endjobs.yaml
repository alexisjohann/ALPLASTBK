abstract: >
  Deloitte 2023 Global Human Capital Trends chapter exploring how organizations can practically
  move beyond jobs as the sole organizing principle for work. Extends the 2022 SBO report by
  providing implementation guidance. Part of the evolution from SBO concept (2022) to end-of-jobs
  framing (2023) to outcomes-based work (2025). Authored by Cantrell and Weisz as part of the
  annual Global Human Capital Trends report.
