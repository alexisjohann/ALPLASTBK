abstract: 'As the financial crisis manifested itself and peaked in 2007 and 2008, the response of US policymakers and regulators
  was shaped in important ways by legal and political constraints. Policymakers lacked certain legal authorities that would
  have been useful for addressing the crisis, notably to use public capital to stabilize the banking sector or to deal with
  the failure of large financial firms such as insurance companies and investment banks that were outside the scope of bank
  regulators'' authority to resolve deposit-taking commercial banks. Legal constraints were keenly felt at the US Department
  of the Treasury, where I served as a senior official from December 2006 to January 2009. Treasury had virtually no emergency
  economic authority at the onset of the crisis in 2007, with the exception of the Treasury''s Exchange Stabilization Fund,
  which was intended for use in exchange rate interventions. As the systemic risks of the financial crisis became apparent,
  the initial policy response largely fell to the Federal Reserve, which had the authority to act under emergency circumstances.
  There will inevitably be another financial crisis, and the response will be shaped by both the lessons learned from recent
  history and the statutory and political changes in the wake of the crisis. The paper thus concludes by discussing changes
  in constraints since the crisis, with a focus on two developments: 1) the political reality that there will not in the near
  future be another wide-ranging grant of fiscal authority as was given with the Troubled Asset Relief Program, and 2) the
  new legal authorities provided in the Wall Street Reform and Consumer Protection Act of 2010, commonly known as the Dodd–Frank
  law.'
