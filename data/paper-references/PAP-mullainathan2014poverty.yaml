abstract: 'Scarcity: Why Having Too Little Means So Much (2013) presents a new theory of how scarcity affects decision-making.
  Mullainathan and Shafir argue that scarcity of any resource - money, time, food - captures the mind, creating a ''bandwidth
  tax'' that impairs cognitive function and self-control. The scarcity mindset leads to tunneling on immediate problems while
  neglecting important long-term considerations, explaining why poverty perpetuates poverty.'
