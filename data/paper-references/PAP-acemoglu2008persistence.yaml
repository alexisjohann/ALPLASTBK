summary:
  abstract_extended: 'The authors construct a model to study the implications of changes in political

    institutions for economic institutions. A change in political institutions

    alters the distribution of de jure political power, but creates incentives for

    investments in de facto political power to partially or even fully offset

    change in de jure power.


    The model can imply a pattern of captured democracy, whereby a democratic

    regime may survive but choose economic institutions favoring an elite. The

    model provides conditions under which economic or policy outcomes will be

    invariant to changes in political institutions, and economic institutions

    themselves will persist over time.


    The main ideas featuring in the model are illustrated using historical examples

    from the U.S. South, Latin America and Liberia.'
  key_findings: "1. DE JURE vs DE FACTO POWER: Political institutions determine de jure power,\n   but elites can invest in\
    \ de facto power to offset institutional changes\n\n2. CAPTURED DEMOCRACY: Democratic regimes can persist while still\
    \ producing\n   economic institutions that favor elites\n\n3. INSTITUTIONAL INVARIANCE: Under certain conditions, changes\
    \ in political\n   institutions have no effect on economic outcomes\n\n4. PERSISTENCE MECHANISM: Elites' comparative advantage\
    \ in collective action\n   (smaller numbers, established position) enables persistent influence\n\n5. HISTORICAL VALIDATION:\
    \ Model explains persistence patterns in U.S. South\n   (post-Civil War), Latin America, and Liberia\n\n6. ENDOGENOUS\
    \ DE FACTO POWER: The amount of elite political power is an\n   equilibrium outcome responding to incentives"
