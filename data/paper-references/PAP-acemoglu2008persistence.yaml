abstract: We construct a model to study the implications of changes in political institutions for economic institutions. A
  change in political institutions alters the distribution of de jure political power, but creates incentives for investments
  in de facto political power to partially or even fully offset change in de jure power. The model can imply a pattern of
  captured democracy, whereby a democratic regime may survive but choose economic institutions favoring an elite. The model
  provides conditions under which economic or policy outcomes will be invariant to changes in political institutions, and
  economic institutions themselves will persist over time. (JEL D02, D72) The domination of an organized minority … over the
  unorganized majority is inevitable. The power of any minority is irresistible as against each single individual in the majority,
  who stands alone before the totality of the organized minority. At the same time, the minority is organized for the very
  reason that it is a minority. —Gaetano Mosca (1939, 53).
