abstract: This paper demonstrates that poverty impedes cognitive function, creating a 'bandwidth tax' on mental resources.
  The poor must devote substantial cognitive capacity to managing scarcity, leaving fewer mental resources for other tasks.
  Experimental evidence shows that inducing thoughts about finances significantly reduces cognitive performance among lower-income
  individuals but not higher-income individuals. This suggests that poverty creates a self-reinforcing cycle where reduced
  cognitive bandwidth leads to poorer decisions.
