abstract: Estimates of democracy's effect on the public sector are obtained from comparisons of 142 countries over the years
  1960–90. Based on three tenets of voting theory – that voting mutes policy preference intensity, political power is equally
  distributed in democracies, and the form of voting processes is important—we expect democracy to affect policies that redistribute,
  or economically favor the political leadership, or enhance efficiency. We do not find such differences. Instead democracy
  is correlated with policies that limit competition for public office. Alternative modeling approaches emphasize the degree
  of competition, and deemphasize the form or even existence of voting processes.
