abstract: We analyze the effect of rising Chinese import competition between 1990 and 2007 on US local labor markets, exploiting
  cross-market variation in import exposure stemming from initial differences in industry specialization and instrumenting
  for US imports using changes in Chinese imports by other high-income countries. Rising imports cause higher unemployment,
  lower labor force participation, and reduced wages in local labor markets that house import-competing manufacturing industries.
