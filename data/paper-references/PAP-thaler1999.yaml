abstract: Mental accounting is the set of cognitive operations used by individuals and households to organize, evaluate, and
  keep track of financial activities. This paper discusses three components of mental accounting - how outcomes are perceived
  and experienced, and how decisions are made and subsequently evaluated; the assignment of activities to specific accounts;
  and the frequency with which accounts are evaluated and choice bracketing.
