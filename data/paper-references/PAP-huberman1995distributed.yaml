abstract: As computer networks grow and blanket the planet, they become a community of concurrent processes, which, in their
  interactions, strategies, and lack of perfect knowledge, become analogous to human market economies. Economics may thus
  offer new ways of designing and understanding the behavior of distributed computer systems.
