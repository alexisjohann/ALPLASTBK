abstract: 'Natural selection is conventionally assumed to favour the strong and selfish who maximize their own resources at
  the expense of others. But many biological systems, and especially human societies, are organized around altruistic, cooperative
  interactions. How can natural selection promote unselfish behaviour? Various mechanisms have been proposed, and a rich analysis
  of indirect reciprocity has recently emerged: I help you and somebody else helps me. The evolution of cooperation by indirect
  reciprocity leads to reputation building …'
