# ============================================================================
# SUMMARY
# ============================================================================
summary:
  abstract_extended: |
    This paper (Chapter 26 of the Handbook of Culture and Economic Behavior)
    provides a comprehensive review of interventions aimed at changing culture
    and norms in developing countries. The authors develop a simple utility
    framework: ua = f(va, ya, pa) where:
    - va = intrinsic values (preferences, beliefs, identity)
    - ya = material payoffs (economic incentives, opportunity costs)
    - pa = social interactions (peer effects, social sanctions, coordination)

    The paper organizes evidence around three broad intervention categories:

    1. CHANGING INTRINSIC DETERMINANTS (Section 3):
       - Schooling: Education affects values through curriculum content and
         socialization. Evidence from Zimbabwe (Friedman et al. 2016), India
         (Dhar et al. 2022), Pakistan (Andrabi et al. 2022).
       - Information campaigns: Correcting misperceptions about norms.
         Evidence from Saudi Arabia (Bursztyn et al. 2020), India (Dhar et al.
         2022), Rwanda (Blattman et al. 2023).
       - Media/Edutainment: TV and radio as vehicles for norm change.
         Evidence from Brazil (La Ferrara et al. 2012), India (Jensen and
         Oster 2009, Keefer and Khemani 2014).
       - Empowerment programs: Building capabilities and self-efficacy.
         Evidence from India (Duflo 2012, Beaman et al. 2012).

    2. CHANGING SOCIAL DETERMINANTS (Section 4):
       - Pluralistic ignorance: When individuals privately disagree with a
         norm but believe (incorrectly) that others support it. Correcting
         these misperceptions can shift behavior rapidly.
       - Coordination failures: When everyone would prefer a different norm
         but no individual can switch alone. Requires collective intervention.
       - Stepping stones: Gradual norm change through partial deviations
         that make further change more acceptable.

    3. CHANGING MATERIAL INCENTIVES (Section 5):
       - Labor market returns: Economic opportunities that change the
         cost-benefit calculus of cultural practices.
       - Conditional transfers: Cash transfers that incentivize behavior
         change (e.g., school attendance, health visits).
       - Laws and enforcement: Formal rules that shift focal points and
         create coordination devices for norm change.

    The paper emphasizes that these three channels often interact:
    intrinsic value changes may be necessary for sustained norm change,
    while material incentives can kickstart behavioral shifts that
    eventually become internalized as new norms.

  key_findings: |
    1. UTILITY FRAMEWORK: ua = f(va, ya, pa) decomposes cultural behavior
       into intrinsic values, material payoffs, and social interactions
    2. PLURALISTIC IGNORANCE: Individuals often misperceive others' support
       for harmful norms, creating self-reinforcing equilibria
    3. MEDIA EFFECTS: Edutainment (entertainment-education) shows significant
       effects on fertility (Brazil), gender attitudes (India), conflict
       resolution (Rwanda, DRC)
    4. COORDINATION FAILURES: Harmful norms (FGC, child marriage) persist
       as coordination equilibria even when most individuals privately oppose them
    5. STEPPING STONES: Partial norm deviations (e.g., alternative rites of
       passage) can catalyze broader norm change
    6. TIPPING POINTS: Norm change often exhibits threshold dynamics -
       once a critical fraction deviates, rapid cascade follows
    7. SCHOOL EFFECTS: Education affects norms through BOTH human capital
       (returns) and socialization (values formation)
    8. MATERIAL INCENTIVES: Cash transfers and labor market shifts can
       trigger norm change through the material channel (ya)
    9. LAW AS FOCAL POINT: Laws serve as coordination devices even when
       enforcement is weak
    10. SUSTAINABILITY: Interventions targeting intrinsic values (va) tend
        to produce more durable norm change than those targeting only
        material incentives (ya)

  ebf_relevance: |
    Domain: CORE-WHAT, CORE-WHEN, CORE-AWARE
    10C Dimensions:
      - WHAT (C): The utility decomposition ua = f(va, ya, pa) maps directly
        to EBF utility dimensions. va = identity/value utility (U_IDN),
        ya = financial utility (U_F), pa = social utility (U_S). This provides
        a clean three-factor decomposition for cultural behavior.
      - WHEN (V): Context (Psi_K = cultural setting, Psi_S = social environment,
        Psi_I = institutional rules) determines which channel dominates.
        Pluralistic ignorance = Psi_S misperception. Coordination failure =
        multiple Psi equilibria. Stepping stones = gradual Psi transition.
      - AWARE (AU): Pluralistic ignorance is PRECISELY an awareness failure:
        A_social(others' beliefs) is systematically biased. Correcting this
        awareness can shift behavior without changing preferences or incentives.
      - WHO (AAA): Different segments respond to different channels. The
        paper documents heterogeneous treatment effects by gender, age,
        education level, and social position.
      - HOW (B): Interaction effects between channels: material incentives
        can crowd out intrinsic motivation (gamma < 0) or complement it
        (gamma > 0) depending on context. This maps directly to EBF
        complementarity parameters.
    Theory Support:
      - Extends MS-IB-001 (Identity Economics) with cultural action framework
      - Connects to MS-SP-001 (Social Preferences) through pa term
      - Links to MS-SF-001 (Skill Formation) through education effects
    Key EBF Insight: The three-channel decomposition (va, ya, pa) provides
    a parsimonious framework for understanding WHY the same intervention
    can succeed or fail in different cultural contexts. The CONTEXT (Psi_K)
    determines the relative importance of intrinsic, material, and social
    channels. This directly supports EBF's core thesis: theta = f(Psi, 10C).

  sources:
    - "NBER Working Paper 34784, January 2026"
    - "Chapter 26 of Handbook of Culture and Economic Behavior (Enke, Giuliano, Nunn, Wantchekon eds.)"
    - "BibTeX: bibliography/bcm_master.bib (laferrara2026changing)"

