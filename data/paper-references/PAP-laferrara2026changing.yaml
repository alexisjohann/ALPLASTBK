# ============================================================================
# ABSTRACT & SOURCE
# ============================================================================
abstract: |
  This chapter reviews interventions targeted at changing culture and norms in
  developing countries. We employ a simple framework in which the utility from a
  cultural action depends on intrinsic values, material incentives, and social
  interactions. Using this framework, we organize existing evidence on changing
  culture around three broad types of interventions: those targeting intrinsic
  determinants (schooling, information campaigns, media, empowerment programs),
  social determinants (addressing pluralistic ignorance, coordination failures,
  and stepping stones to norm change), and material incentives (labor market
  returns, transfers, and laws). We discuss lessons learned and promising
  directions for future research.

