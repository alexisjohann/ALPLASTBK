# ============================================================================
# BEHAVIORAL MAPPING
# ============================================================================
behavioral_mapping:
  source: "original paper analysis"
  dimensions:
    - domain: cultural_norm_change
      stages:
        - preparation
        - action
        - maintenance
      primary_dimension: X
      psi_dominant: cultural_context
      gamma: 0.0
      A_level: 0.3
      W_level: 0.7
      awareness_type: social_awareness
      key_insight: |
        Cultural behavior is decomposed into three channels: intrinsic values
        (va), material payoffs (ya), and social interactions (pa). The relative
        weight of each channel depends on the cultural CONTEXT (Psi_K).
        Interventions must target the dominant channel for effectiveness.
        Pluralistic ignorance (awareness failure about pa) is a key mechanism
        maintaining harmful norms - correcting it can shift behavior rapidly.

    - domain: intervention_design
      stages:
        - preparation
        - action
      primary_dimension: S
      psi_dominant: institutional_context
      gamma: 0.0
      A_level: 0.5
      W_level: 0.6
      awareness_type: design_choice
      key_insight: |
        Effective norm change interventions must consider the interaction between
        channels. Material incentives (ya) can catalyze initial behavior change,
        but sustainable norm change requires intrinsic value shifts (va) or
        social equilibrium shifts (pa). The choice of intervention depends
        critically on whether the norm persists due to individual preferences
        (va-driven), coordination failures (pa-driven), or economic constraints
        (ya-driven). Misdiagnosing the mechanism leads to intervention failure.

    - domain: media_and_information
      stages:
        - action
        - evaluation
      primary_dimension: F
      psi_dominant: information_environment
      gamma: 0.0
      A_level: 0.6
      W_level: 0.5
      awareness_type: informational
      key_insight: |
        Media interventions (edutainment, information campaigns) operate through
        multiple channels simultaneously: they can change intrinsic values (va)
        through modeling and narrative transportation, correct social
        misperceptions (pa) by revealing others' true beliefs, and alter
        perceived material payoffs (ya) by providing information about
        returns to education or health behaviors.

