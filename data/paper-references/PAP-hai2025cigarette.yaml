core_contribution: 'First structural model estimating bidirectional causal effects
  between

  youth cigarette addiction and educational attainment. Combines rational

  addiction framework (Becker-Murphy) with human capital investment model

  (Keane-Wolpin). Key innovation: endogenous discount factor β(q,θ) where

  addiction stock reduces patience, creating feedback loop that reduces

  human capital investment.

  '
key_concepts:
- id: KC-01
  name: Endogenous Discount Factor
  definition: β(q,θ) = exp(-φ_e,t)·exp(-κ_q·q)·exp(-κ_r + κ_c·θ_c + κ_n·θ_n)
  ebf_relevance: Time preference depends on addiction stock and abilities
- id: KC-02
  name: Addiction Stock Dynamics
  definition: q_t = (1-δ_q)q_{t-1} + d_{q,t-1} with δ_q = 0.43
  ebf_relevance: Persistent state variable creating intertemporal non-separability
- id: KC-03
  name: 'Three Channels: Smoking → Education'
  definition: 1) Reduced β, 2) Flow utility anticipation, 3) Monetary cost
  ebf_relevance: Multiple mechanisms for negative complementarity
- id: KC-04
  name: Non-cognitive > Cognitive for Addiction
  definition: Non-cog skills reduce smoking utility; cognitive ≈ 0 effect
  ebf_relevance: Different ability dimensions affect different outcomes
- id: KC-05
  name: Education Offset Effect
  definition: 4 years education offsets flow utility of 1 year smoking
  ebf_relevance: Quantifies education-addiction substitution
- id: KC-06
  name: Excise Tax Equivalence
  definition: +40% tax achieves same college rate as eliminating smoking
  ebf_relevance: Policy instrument can substitute for impossible interventions
model:
  choice_set:
  - 'c_t: Composite good consumption'
  - 's_{t+1}: Savings (can be negative up to borrowing limit)'
  - 'd_{q,t}: Smoking decision {0,1}'
  - 'd_{e,t}: Schooling decision {0,1}'
  - 'd_{p,t}: Part-time work while in school {0,1}'
  state_variables:
  - 'q_t: Addiction stock'
  - 'e_t: Years of schooling'
  - 's_t: Savings'
  - 'θ = (θ_c, θ_n): Cognitive and non-cognitive abilities'
  - 'e_pr: Parental education'
  utility_function:
    consumption: c^(1-γ)/(1-γ)
    smoking: d_q·(ν_0 + ν_q·q + ν_e·e + ν_c·θ_c + ν_n·θ_n + ε_q) + ν_{q2}·q²
    education: d_e·(ξ_p·d_p + ξ_e·X + ξ_c·θ_c + ξ_n·θ_n + ε_e)
  discount_factor:
    formula: β(q,e,t,θ) = exp(-φ_{e,t})·exp(-κ_q·q)·exp(-κ_r + κ_c·θ_c + κ_n·θ_n)
    survival_rate: exp(-φ_{e,t}) from CDC mortality data by education
    addiction_effect: exp(-κ_q·q) captures myopia from addiction
    endowed_rate: exp(-κ_r + κ_c·θ_c + κ_n·θ_n)
  addiction_stock:
    law_of_motion: q_t = (1-δ_q)q_{t-1} + d_{q,t-1}
    initial_condition: q_{15} = 0
    depreciation: δ_q = 0.433
  budget_constraint: 's_{t+1} - s_t·(1+r) = Y_t + T_t + G_t - (c_t + p_t·d_{q,t} +
    m_{e+1}·d_{e,t})

    where:

    - Y_t = earnings (Mincer function)

    - T_t = parental transfers

    - G_t = government transfers (means-tested)

    - p_t = state-year cigarette price

    - m_{e+1} = tuition and fees

    '
