counterfactuals:
  education_on_smoking:
    intervention: +1 year schooling at age 20
    age_20_effect: -4 pp smoking rate (21% reduction)
    age_30_effect: -8 pp smoking rate (31% reduction)
    quitters_share: 32% of age-30 smokers quit
    heterogeneity:
    - Effect stronger for higher non-cognitive ability
    - 1 SD higher non-cog → +14 pp quitting probability
  smoking_on_education:
    intervention: Eliminate smoking as choice
    effect_on_smokers: +6 pp college attendance (30% → 36%)
    effect_on_population: +3 pp college attendance (59% → 62%)
    key_insight: 'Non-cognitive ability more important for avoiding harmful behavior.

      Once harmful behavior eliminated, cognitive skills have stronger

      effect on educational attainment.

      '
  excise_tax:
    tax_rate: +40%
    redistribution: Lump-sum tuition subsidy (revenue neutral)
    effect_on_smoking: -3 pp age-30 smoking (27% → 24%)
    effect_on_education: +4 pp college attendance (59% → 63%)
    implied_elasticity: -0.28
    equivalence: Achieves same college rate among smokers as eliminating smoking
