abstract: 'This paper surveys the recent literature on the causal relationship between education and earnings. I focus on
  four areas of work: theoretical and econometric advances in modelling the causal effect of education in the presence of
  heterogeneous returns to schooling; recent studies that use institutional aspects of the education system to form instrumental
  variables estimates of the return to schooling; recent studies of the earnings and schooling of twins; and recent attempts
  to explicitly model sources of heterogeneity in the returns to education …'
