abstract: This paper examines the effects of the financial crisis of the 1930s onthe
  path of aggregate output during that period. Our approach is complementary to that
  of Friedman and Schwartz, who emphasized the monetary impact of the bank failures;
  we focus on non-monetary (primarily credit-related) aspects of the financial sector--output
  link and consider the problems of debtors as well as those of the banking system.
