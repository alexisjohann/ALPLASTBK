abstract: This transformation did not arise from new developments in economic theory. On the contrary, as soon as Pbelps and
  others made the first serious attempts to rationalize the apparent trade-off in modern tlteoretical terms, the zero-degree
  homogeneity of delnand and supply functions was re-discovered in tltis new context (as Friedman predicted it would be) and
  re-named the" natural rate hypothesis". 1 It arose, instead, from the younger tradition of the econometric forecasting models,
  and from the commitment on the part of a large fraction of economists to the use of these models for quantitative policy
  evaluation. Titese models have implied the existence of long-run unemployment-inflation trade-offs ever since the" wage-price
  sectors" were first incorporated and they promise to do so in the future although the" terms" of the trade-off continue
  to shift. 2 Tltis clear-cut conflict between two rightly respected traditions-theoretical and econometriccaught those of
  us who viewed the two as Itarmoniously complementary quite by surprise. At first, it seemed that rite conflict might be
  resolved by somewlmt fancier econometric footwork. On rite theoretical level, one hears talk of a" disequilibrium dynamics"
  which will somehow make money illusion respectable while going beyond the sterility of~ t J= k (p-pe). Without underestimating
  the ingenuity of either econometricians or theorists, it seems to me appropriate to entertain the possibility that reconciliation
  along both of these lines will fail, and that one of these traditions is fnndamentally in error. The thesis of Ibis essay
  is tltat it is rite econometric tradition, or more pre-Isee Phelps et at.[31], Phelps' eaxlier [30] and Friedman [13 I.?'The
  eaxliest wage-price sector embodying the" trade-off" is (as fax as 1 know) in the 19.55 version of the Klein-Goldberger
  model [19]. It has persisted, vdth minimal conceptual change, into all current generation forecasting models. The subsequent
  shift of the" trade-off" relationship to center stage in policy discussions appears due primarily to Phillips [32 [and Samuelson
  and Solow [33].
