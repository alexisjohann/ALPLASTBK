abstract: Many temporary foreign worker programs issue “closed” visas that effectively
  tie workers to a single employer, restricting worker mobility and weakening bargaining
  power. We study the labor market return to temporary foreign workers (TFWs) gaining
  permanent residency (PR), which loosens this mobility restriction. Using administrative
  data linking matched employer-employee data in Canada to temporary and permanent
  visa records from 2004–2014 along with an event-study design, we find that gaining
  PR leads to a sharp, immediate, and persistent increase in the job switching rate
  of 21.7 percentage points and an increase in earnings of 5.7 percent three years
  after PR. Workers also sort into high-wage firms after gaining PR, and the increase
  in the firm pay premium is roughly 56 percent of the total earnings gain. We find
  larger earnings gains for job switchers across industries, low-skilled workers,
  and workers from low-income countries. To guide and interpret our reduced-form results,
  we develop a search-and-matching model featuring heterogeneous workers and firms.
  Permanent residents and native-born workers search for jobs in the same labor market
  and engage in on-the-job search, while TFWs search separately within a segmented
  labor market and do not receive outside wage offers. We calibrate the model to match
  our reduced-form results, and we use it to simulate the long-run effects of PR and
  consider two counterfactual policies:(1) increasing the cost to firms of posting
  a TFW vacancy and (2) allowing TFWs to switch employers freely under “open” visas.
  We evaluate how these policies affect output, wages, profits, and overall social
  welfare.
