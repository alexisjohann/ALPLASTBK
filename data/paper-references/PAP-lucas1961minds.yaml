abstract: 'Gödei''s Theorem seems to me to prove that Mechanism is false, that is, that minds cannot be explained as machines.
  So also has it seemed to many other people: almost every mathematical logician I have put the matter to has confessed to
  similar thoughts, but has felt reluctant to commit himself definitely until he could see the whole argument set out, with
  all objections fully stated and properly met. This I attempt to do.'
