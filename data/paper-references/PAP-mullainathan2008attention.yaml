abstract: Humans and other animals often violate economic principles when choosing between multiple alternatives, but the
  underlying neurocognitive mechanisms remain elusive. A robust finding is that adding a third option can alter the relative
  preference for the original alternatives, but studies disagree on whether the third option’s value decreases or increases
  accuracy. To shed light on this controversy, we used and extended the paradigm of one study reporting a positive effect.
  However, our four experiments with 147 human participants and a reanalysis of the original data revealed that the positive
  effect is neither replicable nor reproducible. In contrast, our behavioral and eye-tracking results are best explained by
  assuming that the third option’s value captures attention and thereby impedes accuracy. We propose a computational model
  that accounts for the complex interplay of value, attention, and choice. Our theory explains how choice sets and environments
  influence the neurocognitive processes of multi-alternative decision making.
