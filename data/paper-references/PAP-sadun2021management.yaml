abstract: The Healthy Business program examines the relationship between management practices and COVID-19 mortality in nursing
  homes. Using data on management quality and infection rates, the study finds that better-managed facilities had significantly
  lower mortality rates during the pandemic. The findings highlight the critical role of organizational practices in health
  outcomes during crisis situations.
