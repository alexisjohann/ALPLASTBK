abstract: Understanding of monetary transmission mechanisms is crucial to answering a broad range of questions. These transmission
  mechanisms include interest-rate effects, exchange-rate effects, other asset price effects, and the so-called credit channel.
  This introduction to the symposium provides an overview of the main types of monetary transmission mechanisms found in the
  literature and a perspective on how the papers in the symposium relate to the overall literature and to each other.
