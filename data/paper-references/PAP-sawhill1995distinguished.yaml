abstract: This lecture, given to the Society of Government Economists in January 1995, examines the influence of research
  on policy and vice versa using three widely believed propositions. The first is that government spending is wasteful or
  ineffective and can readily be cut back in order to reduce the deficit; the second is that welfare should be time limited
  and made conditional on people's behavior; the third is that education and training are (more than ever) the ticket to individual
  and national prosperity. The paper explores the interplay of facts of economic analysis with political and institutional
  constraints and public values.
