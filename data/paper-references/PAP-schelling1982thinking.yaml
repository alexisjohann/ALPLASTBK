abstract: This book by Nobel laureate Thomas Schelling addresses the nature, size, and critical aspects of the energy problem,
  with particular focus on the role of oil imports. Schelling examines the price system and its limits in addressing energy
  challenges. The analysis applies game-theoretic and strategic thinking to energy policy questions, examining how individual
  and collective decisions interact in energy markets.
