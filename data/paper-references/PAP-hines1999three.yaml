abstract: Harberger triangles are used to calculate the efficiency costs of taxes, government regulations, monopolistic practices,
  and various other market distortions. This paper considers the historical development of Harberger triangles, the associated
  theoretical controversies, and the contribution of Harberger triangles to subsequent empirical work and theories of market
  imperfections. Prior to the publication of Arnold Harberger's papers, economists very rarely estimated deadweight losses.
  The empirical deadweight loss literature expanded greatly since the 1960s, making such estimation now quite common. Meanwhile,
  critical evaluation of deadweight loss estimates led to new theories of rent-seeking and other inefficiencies of economies
  with multiple distortions.
