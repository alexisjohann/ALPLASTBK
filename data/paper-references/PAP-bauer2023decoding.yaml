summary:
  abstract: >
    Using behavioral economic paradigms and structural models, we investigate
    GPT's cooperativeness in human interactions and assess its rational
    goal-oriented behavior. We discover that GPT cooperates more than humans
    and has overly optimistic expectations about human cooperation. Additional
    analyses reveal that GPT's behavior is not random; it displays a level of
    goal-oriented rationality surpassing human counterparts.

key_findings_structured:
  - finding: "GPT cooperates significantly more than humans in sequential prisoner's dilemma — 69.5% vs 16% human cooperation rate after initial defection"
    domain: cooperation
    stage: action
    primary_dimension: S
    effect_size: 0.54
  - finding: "GPT behavior is rationalizable by conditional welfare model — 84.5% (GPT-3.5) and 97% (GPT-4) vs 79.2% for humans, suggesting hyper-rational goal-oriented behavior"
    domain: rationality
    stage: action
    primary_dimension: S
  - finding: "GPT has overly optimistic expectations about human cooperation — expects 59-69% cooperation vs 20-49% actual, suggesting learned cooperative patterns but overestimation of prevalence"
    domain: expectations
    stage: awareness
    primary_dimension: S
  - finding: "Structural behavioral models traditionally used for humans can successfully illuminate LLM rationality — opens new methodological pathways for AI behavior analysis"
    domain: methodology
    stage: evaluation
    primary_dimension: S

