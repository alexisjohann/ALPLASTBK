abstract: 'American Publishers Award for Professional & Scholarly Excellence (PROSE)
  Winner-Award for Excellence in Social Sciences (2009)

  Neuroeconomics is a new highly promising approach to understanding the neurobiology
  of decision making and how it affects cognitive social interactions between humans
  and societies/economies. This book is the first edited reference to examine the
  science behind neuroeconomics, including how it influences human behavior and societal
  decision making from a behavioral economics point of view. Presenting a truly interdisciplinary
  approach, Neuroeconomics presents research from neuroscience, psychology, and behavioral
  economics, and includes chapters by all the major figures in the field, including
  two Economics nobel laureates. Carefully edited for a cohesive presentation of the
  material, the book is also a great textbook to be used in the many newly emerging
  graduate courses on Neuroeconomics in Neuroscience, Psychology, and Economics graduate
  schools. This groundbreaking work is sure to become the standard reference source
  for this growing area of research.

  * Editors and contributing authors represent the acknowledged experts and founders
  of the field of Neuroeconomics and include Nobel laureates Vernon Smith and Daniel
  Kahneman, making this the authoritative reference for the field

  * Presents an interdisciplinary view of the approaches, concepts, and results of
  the emerging field of neuroeconomics relevant for anyone interested in this area
  or research * Full color presentation throughout with carefully selected illustrations
  to highlight key concepts'
