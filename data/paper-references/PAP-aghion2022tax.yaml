abstract: 'We study how strongly individuals respond to tax simplicity and how they learn about the complexities of the tax
  system.We focus on the self-employed, who can more easily adjust to tax incentives and whose responses directly stem from
  their own understanding of the tax system.We use new French tax returns data from 1994 to 2012.France serves as a good quasi-laboratory:
  it has three fiscal regimes -or modes of taxation -for the self-employed, which differ in their monetary tax incentives
  and in their tax simplicity.Two key features are that, first, these regimes are subject to eligibility thresholds; we find
  large excess masses (bunching) right below the latter.Second, the regimes impact different agents heterogeneously and have
  changed extensively over time.Taken together, these two key elements give us measures of tax responses (the bunching) as
  well as the variation needed to jointly estimate a value of tax simplicity and taxable income elasticities.They also give
  us an opportunity to study how individuals learn about and respond over time to changing policy parameters.We estimate a
  large value for tax simplicity of up to 650 euros per year per individual depending on the regime and activity.We also find
  sizable costs of tax complexity; agents are not immediately able to understand what the right regime choice is, leave significant
  money on the table, and learn over time.The cost of complexity is "regressive" in that it affects mostly the uneducated,
  low income, and low skill agents.Agents who can be viewed as more informed and knowledgeable (e.g., the more educated or
  high-skilled) are more likely to make the correct regime choice and to learn faster.'
