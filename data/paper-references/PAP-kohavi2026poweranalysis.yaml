abstract: 'A study by Biswas, Abell, and Chacko published in the Journal of Consumer Research (2023)

  reported that in an A/B test simply rounding the corners of square buttons increased the

  online click-through rate by 55% (p-value 0.037). Our four high-powered A/B tests each

  had over two thousand times as many users than the original study. All experiments yielded

  effect size estimates that were approximately two orders of magnitude smaller than

  initially reported, with 95% confidence intervals that include zero. Using the Small

  Telescopes approach, we showed that the original study''s design was too small to be

  informative: it was highly underpowered.

  '
