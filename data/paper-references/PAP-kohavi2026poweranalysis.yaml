key_findings_structured:
- Original BAC (2023) claimed 55% CTR lift from rounded corners (N=919)
- 4 high-powered replications (N=14.5M) show ~0% effect (all non-significant)
- Replications had 2000x more users than original
- Effect estimates 100x smaller than originally claimed
- 'Small Telescopes analysis: Original was too underpowered to be informative'
- Winner's curse explains inflated original effect
- Pre-registration (OSF) strengthens replication credibility
- Cross-site replication (USA, Norway, Russia) rules out locale-specific effects
