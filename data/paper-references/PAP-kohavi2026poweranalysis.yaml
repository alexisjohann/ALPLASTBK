  AUTHORS (Notable):

  - Ron Kohavi: Former VP of Engineering at Airbnb, Microsoft experimentation pioneer

  - Jakub Linowski: GoodUI.org, A/B testing patterns expert

  - Lukas Vermeer: Vista Experimentation Hub director

  - Andrew Gelman: Columbia statistician, Bayesian methods

  - Guido Imbens: Nobel laureate (2021), causal inference


  KEY CONTRIBUTION TO EBF:

  1. Demonstrates Winner''s Curse in action: Small N → inflated effects

  2. Provides Small Telescopes methodology for evaluating replications

  3. Shows importance of pre-registration for credibility

  4. Cross-cultural replication (3 countries) strengthens null finding

  5. 2000x power increase, 100x effect decrease


  METHODOLOGICAL STANDARDS DEMONSTRATED:

  - Pre-registration (OSF: https://doi.org/10.17605/OSF.IO/YK62M)

  - Pre-declared runtime (16 weeks)

  - Pre-declared OEC (Overall Evaluation Criterion)

  - SRM test (Sample Ratio Mismatch)

  - MDE calculation (Minimum Detectable Effect)


  ORIGINAL STUDY PROBLEMS:

  - N=919 for 55% claimed effect

  - No pre-registration

  - Multiple studies with varying Ns (suspicious)

  - Effect implausibly large for minor UI change


