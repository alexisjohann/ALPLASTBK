      '
    EIT: 'CRITICAL IMPLICATIONS FOR EBF:

      1. Power analysis is PREREQUISITE before claiming effects

      2. Small Telescopes: Check if original could detect true effect

      3. Winner''s curse inflates effects in underpowered studies

      4. Pre-registration protects against p-hacking

      5. Effect size exaggeration is systematic, not random

