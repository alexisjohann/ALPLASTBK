abstract: 'The process of selecting a portfolio may be divided into two stages. The first

  stage starts with observation and experience and ends with beliefs about the

  future performances of available securities. The second stage starts with the

  relevant beliefs about future performances and ends with the choice of portfolio.

  This paper is concerned with the second stage.

  '
key_contributions:
- Introduced mean-variance optimization framework
- Defined efficient frontier concept
- Proved diversification theorem mathematically
- Showed law of large numbers doesn't fully apply (positive correlations)
- Developed critical line algorithm for computing efficient portfolios
