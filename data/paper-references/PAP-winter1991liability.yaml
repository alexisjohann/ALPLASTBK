abstract: 'This paper offers an overview of the U.S. liability insurance market and the link between its performance and developments
  in tort law. Over the last few decades, the dominant feature of the insurance market has been the insurance cycle: intermittent
  periods of rapidly rising premiums and cutbacks on the availability of coverage. The insurance cycle appears to be increasing
  in amplitude and, since the 1960s, has been concentrated increasingly in liability lines. The dynamic behavior of the insurance
  market can be fully explained in a model that emphasizes uncertainty and informational asymmetries, as outlined in this
  paper. I conclude the paper with a discussion of some policy implications as well as the impact of liability insurance on
  the incentive role, as opposed to the insurance role, of the tort system.'
