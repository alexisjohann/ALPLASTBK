abstract: This paper experimentally examines image motivation—the desire to be liked and well regarded by others—as a driver
  in prosocial behavior (doing good), and asks whether extrinsic monetary incentives (doing well) have a detrimental effect
  on prosocial behavior due to crowding out of image motivation. Using the unique property of image motivation—its dependency
  on visibility—we show that image is indeed an important part of the motivation to behave prosocially, and that extrinsic
  incentives crowd out image motivation. Therefore, monetary incentives are more likely to be counterproductive for public
  prosocial activities than for private ones. (JEL D64, L31, Z13)
