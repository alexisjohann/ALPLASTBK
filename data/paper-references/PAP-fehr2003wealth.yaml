summary:
  abstract_extended: 'This paper examines how wealth affects distributional preferences. We show

    that wealth can affect both the intensity and direction of social preferences.

    Understanding this relationship is crucial for predicting how economic growth

    and inequality affect social cohesion and policy preferences.'
  key_findings: "1. WEALTH AND PREFERENCES\n   - Wealth affects social preferences\n   - Not just self-interest\n   - Complex\
    \ relationships\n\n2. MECHANISMS\n   - Security effects\n   - Reference group shifts\n   - Perspective-taking changes\n\
    \n3. IMPLICATIONS\n   - Growth affects norms\n   - Inequality has feedback effects\n   - Policy design considerations"
