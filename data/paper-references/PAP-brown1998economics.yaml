abstract: The Endangered Species Act of 1973 is one of our most far-reaching and controversial environmental laws. While the
  benefits of protecting endangered species accrue to the entire nation, a significant fraction of the costs are borne by
  the private landowners who shelter about 90 percent of the nearly 1,000 listed species. The pressure to know whether the
  social benefits of preservation exceed the private costs has thrust economics into ongoing reauthorization debate. This
  paper examines how economists can help better the odds that when society imposes and bears costs to protect endangered species,
  it will be more likely to succeed.
