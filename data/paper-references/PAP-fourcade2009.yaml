abstract: This book systematically compares the economics profession in the United
  States, Britain, and France from the 1890s to 1990s, explaining why economics differs
  in important ways among these countries. Drawing on in-depth interviews, institutional
  analysis, and scholarly evidence, the author traces how each political, cultural,
  and institutional context gave rise to distinct professional configurations. Because
  political life varied, people's understanding of the economy crystallized differently
  - through scientific and mercantile professionalism in the US, public-minded elitism
  in Britain, and statist divisions in France. Winner of the 2011 ASA Distinguished
  Scholarly Publication Award and the 2011 Ludwik Fleck Prize.
