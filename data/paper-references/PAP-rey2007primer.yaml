abstract: This chapter analyzes vertical and horizontal foreclosure, defined as restricting output in one market through market
  power in another. It examines access to essential facilities in unregulated environments, considering bypass possibilities
  and exclusionary activities like vertical integration and exclusive dealing. The chapter also analyzes anti-competitive
  bundling theories and discusses efficiency defenses for exclusionary behavior.
