abstract: Für den Erfolg in Studium und Beruf ist aktuelles und methodisches Wirtschaftswissen das A und O. Die Zeitschrift
  WiSt liefert dieses Wissen Monat für Monat. Hochaktuelle Wirtschaftsthemen werden vor dem Hintergrund der volks- und betriebswirtschaftlichen
  Modelle erörtert und diskutiert. So bleiben Sie up-to-date, kennen die brisanten Details und durchschauen schnell komplexe
  Wirtschaftsstrukturen.
