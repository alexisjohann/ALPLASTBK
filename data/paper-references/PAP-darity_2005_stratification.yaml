abstract: 'The conventional wisdom embodied in public policy discourse, popular media
  representations, and much social science research about intergroup disparity has
  it that group-based deficits in personal responsibility and cultural practices are
  explanatory. Indeed, the politically acceptable trope of cultural determinism progressively
  has displaced the impolite trope of biological determinism.

  This tendency is not just the purview of the political right. The substance of this
  explanation for racial inequality in the USA is present in former President Bill
  Clinton’s 1993 speech to an assemblage of black ministers and in comedian Bill Cosby’s
  recent, highly publicized remarks. Economists of all stripes have been far from
  immune from this tendency; they include an array as diverse as George Akerlof and
  Rachel Kranton, Glenn Loury, David Austen-Smith and Roland Fryer, Tom Sowell, Walter
  Williams, and Barry Chiswick. Incantations of group dysfunction now substitute for
  incantations of genetic inferiority (although I fear that the latter magic has not
  vanished altogether).'
