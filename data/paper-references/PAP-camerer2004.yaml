abstract: Abstract Neuroeconomics uses knowledge about brain mechanisms to inform economic theory. It opens up the “black
  box” of the brain, much as organizational economics opened up the theory of the firm. Neuroscientists use many tools—including
  brain imaging, behavior of patients with brain damage, animal behavior and recording single neuron activity. The key insight
  for economics is that the brain is composed of multiple systems which interact. Controlled systems (“executive function”)
  interrupt automatic ones. Brain evidence complicates standard assumptions about basic preference, to include homeostasis
  and other kinds of state‐dependence, and shows emotional activation in ambiguous choice and strategic interaction.
