key_findings_structured:
- ebf_relevance: T_base for Dreyfus Level 5 (Expert) — baseline anchor
  effect_size: 10,000 hours across violin, chess, sports domains
  finding: Expert performance requires approximately 10,000 hours of deliberate practice
  id: KF-01
- ebf_relevance: Upper bound for C(Ψ) context modifier — time constraints
  effect_size: ~4h/day (with rest, total practice including non-deliberate can be
    higher)
  finding: Maximum sustainable deliberate practice is approximately 4 hours per day
  id: KF-02
- ebf_relevance: 'Dreyfus level scaling: T(ℓ) = T_0 × k^(ℓ-1), geometric not linear'
  effect_size: 'Power law of practice: performance improves as T^(-α)'
  finding: Skill acquisition scales non-linearly with practice
  id: KF-03
- ebf_relevance: 'C(Ψ) modifier: Ψ_I (structured learning) and Ψ_S (mentor/feedback)
    critical'
  effect_size: Deliberate practice with feedback >> repetitive practice
  finding: Quality of practice (deliberate) matters more than quantity
  id: KF-04
- ebf_relevance: L(p) personality modifier matters most at early levels; at expert
    level, practice hours dominate
  effect_size: Practice explains majority of performance variance at expert level
  finding: Individual differences exist but practice dominates
  id: KF-05
