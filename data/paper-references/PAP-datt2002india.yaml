abstract: Has poverty continued to fall with growth in India in the 1990s, or has the nature of the growth process changed,
  such that the poor have been left behind? This paper tries to answer those questions. We do not attempt to assess the impact
  of India's macroeconomic reforms of the 1990s on poverty, since this would require identification of the counterfactual
  of what would have been experienced in the 1990s without the reforms. Rather, our aim is to describe what has happened to
  poverty in India in the 1990s. In the course of the discussion, we will learn about the proximate causes of changes in India's
  poverty rate. Moreover, although this discussion is India-specific, it illustrates themes that are often encountered in
  the analysis of poverty in low-income economies, including difficult issues of survey design and comparability and the proximate
  factors underlying the responsiveness of poverty to economic growth.
