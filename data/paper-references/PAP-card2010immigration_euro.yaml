summary:
  abstract_extended: "Immigration is often viewed as a proximate cause of the rising wage gap between\nhigh- and low-skilled\
    \ workers. Nevertheless, there is controversy over the\nappropriate framework for measuring the presumed effect, and over\
    \ the\nmagnitudes involved.\n\nThis paper offers an overview and synthesis of existing knowledge on the\nrelationship\
    \ between immigration and inequality, focusing on evidence from\nCROSS-CITY COMPARISONS in the U.S.\n\nAlthough some researchers\
    \ have argued that a cross-city research design is\ninherently flawed, the paper shows that evidence from cross-city comparisons\n\
    is remarkably CONSISTENT with recent findings from aggregate time series data.\n\nTHREE KEY CONCLUSIONS:\n(1) Workers\
    \ with below high school education are PERFECT SUBSTITUTES for those\n    with a high school education\n(2) \"High school\
    \ equivalent\" and \"college equivalent\" workers are IMPERFECT\n    SUBSTITUTES\n(3) Within education groups, immigrants\
    \ and natives are IMPERFECT SUBSTITUTES\n\nKEY FINDING: Immigration accounts for only a SMALL SHARE (5%) of the increase\n\
    in U.S. wage inequality between 1980 and 2000."
  key_findings: '1. Cross-city and time-series evidence are CONSISTENT

    2. Below-HS and HS workers: perfect substitutes

    3. HS-equivalent and college-equivalent: imperfect substitutes

    4. Immigrants and natives within groups: imperfect substitutes

    5. Immigration explains only ~5% of 1980-2000 inequality increase

    6. Effects on native wages are small'
