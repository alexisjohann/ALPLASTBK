abstract: The Oil-For-Food program was established by United Nations Security Council Resolution 986 in 1995 as a means of
  providing humanitarian relief to Iraq, which had been under U.N. economic sanctions since the Persian Gulf War in 1991.
  After the invasion of Iraq, considerable evidence emerged suggesting that Saddam Hussein was able to subvert the Oil-For-Food
  program to obtain hard currency as well as items on the United Nation's prohibited transfer list. In this paper, I use recently
  available data to examine how the Iraqi government used illicit contracts for underpriced oil to reward supporters. Although
  it may never be possible to prove conclusively that the Iraqi government used oil contracts as a mechanism to trade bribes
  for votes in the U.N. Security Council, I demonstrate that nations with seats on the Security Council received a greater
  number and a greater value of these contracts and that receipt of the contracts was positively associated with pro-Iraqi
  votes. I also find that Iraq was more likely to give contracts to countries on the Council that had exhibited prior support
  for the Iraqi regime.
