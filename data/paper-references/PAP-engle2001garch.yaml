abstract: ARCH and GARCH models have become important tools in the analysis of time series data, particularly in financial
  applications. These models are especially useful when the goal of the study is to analyze and forecast volatility. This
  paper gives the motivation behind the simplest GARCH model and illustrates its usefulness in examining portfolio risk. Extensions
  are briefly discussed.
