abstract: The paper introduces Homo Reciprocans, the concept that human beings are cooperative actors motivated by improving
  their environment through positive reciprocity (rewarding other individuals) or negative reciprocity (punishing other individuals),
  even in situations without foreseeable benefit for themselves. The fraction of subjects exhibiting reciprocal choices is
  never below 40% and sometimes above 60%. However, there is also a non-negligible fraction of subjects who does not reciprocate
  and behaves completely selfishly. The results lend support to the view that homo reciprocans is indeed a key factor in economic
  behavior.
