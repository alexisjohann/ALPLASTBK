abstract: 'This paper uses a unique data set from penalty kicks in professional soccer to test
  the minimax theorem. The minimax hypothesis has two empirical implications: (1) winning
  probabilities are equalized across strategies for each player, and (2) players choices
  are serially independent. Both implications are supported by the data from 1,417 penalty
  kicks from five years of European professional soccer. Professionals play consistently
  with the equilibrium predictions of the minimax theorem.'
