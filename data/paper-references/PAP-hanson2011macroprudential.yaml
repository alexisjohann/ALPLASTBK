abstract: 'Many observers have argued that the regulatory framework in place prior to the global financial crisis was deficient
  because it was largely “microprudential” in nature. A microprudential approach is one in which regulation is partial equilibrium
  in its conception and aimed at preventing the costly failure of individual financial institutions. By contrast, a “macroprudential”
  approach recognizes the importance of general equilibrium effects, and seeks to safeguard the financial system as a whole.
  In the aftermath of the crisis, there seems to be agreement among both academics and policymakers that financial regulation
  needs to move in a macroprudential direction. In this paper, we offer a detailed vision for how a macroprudential regime
  might be designed. Our prescriptions follow from a specific theory of how modern financial crises unfold and why both an
  unregulated financial system, as well as one based on capital rules that only apply to traditional banks, is likely to be
  fragile. We begin by identifying the key market failures at work: why individual financial firms, acting in their own interests,
  deviate from what a social planner would have them do. Next, we discuss a number of concrete steps to remedy these market
  failures. We conclude the paper by comparing our proposals to recent regulatory reforms in the United States and to proposed
  global banking reforms.'
