abstract: As originally conceived, the President's Council of Economic Advisers would have a unique relation with the president,
  using Keynesian analysis to advise him on maintaining full employment. After fifty years, the Council has evolved into being
  a useful cog in a large decision-making apparatus, dealing with the whole range of federal problems of economic policy and
  bringing to bear whatever economics has to say. The initial Keynesian predisposition has faded. The Council has participated
  in some mistakes but it has made a valuable contribution, primarily by persistent representation of the value of the free
  market.
