abstract: 'This article describes methods used in the field of spatial economics that combine insights from economic theory
  and evidence from data in order to answer counterfactual questions. I outline a general framework that emphasizes three
  elements: a specific question to be answered, a set of empirical relationships that can be identified from exogeneity assumptions,
  and a theoretical model that is used to extrapolate from such empirical relationships to the answer that is required. I
  then illustrate the application of these elements via a series of twelve examples drawn from the fields of international,
  regional, and urban economics. These applications are chosen to illustrate the various techniques that researchers use to
  minimize the theoretical assumptions that are needed to traverse the distance between identified empirical patterns and
  the questions that need to be answered.'
