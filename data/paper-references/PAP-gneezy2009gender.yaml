abstract: 'We use a controlled experiment to explore whether there are gender differences in selecting into competitive environments
  across two distinct societies: the Maasai in Tanzania and the Khasi in India. One unique aspect of these societies is that
  the Maasai represent a textbook example of a patriarchal society, whereas the Khasi are matrilineal. Similar to the extant
  evidence drawn from experiments executed in Western cultures, Maasai men opt to compete at roughly twice the rate as Maasai
  women. Interestingly, this result is reversed among the Khasi, where women choose the competitive environment more often
  than Khasi men, and even choose to compete weakly more often than Maasai men. These results provide insights into the underpinnings
  of the factors hypothesized to be determinants of the observed gender differences in selecting into competitive environments.
  Copyright 2009 The Econometric Society.'
