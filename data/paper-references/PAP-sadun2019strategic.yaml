abstract: 'Purpose This study aims to: identify organizational and environmental factors affecting strategic decision‐making
  speed; examine the relationship between those factors and innovation performance; and clarify the relationship between strategic
  decision‐making speed and innovation performance. Design/methodology/approach A survey was conducted on 73 large‐scale firms
  operating in the manufacturing industry in Turkey, in May 2006 and December 2006. Findings The research findings related
  to the linkage between participation and strategic decision‐making speed indicate that extensive participation accelerates
  the pace of decision making. Research limitations/implications This survey was conducted on CEOs and top managers of large‐scale
  manufacturing firms operating in Turkey. Cultural differences may become evident from those findings. Also, results might
  be different if only small and medium‐size firms, or firms in different industries were used. Originality/value This survey
  is one of the first to examine the strategic decision speed and innovation performance relationship, revealing the positive
  effect of strategic decision speed on innovation performance. It is the first one to be conducted in an Eastern country
  like Turkey, filling the gap in the literature.'
