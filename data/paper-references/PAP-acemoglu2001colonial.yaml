summary:
  abstract_extended: 'The authors exploit differences in European mortality rates to estimate the

    effect of institutions on economic performance. Europeans adopted very

    different colonization policies in different colonies, with different

    associated institutions.


    In places where Europeans faced high mortality rates, they could not settle

    and were more likely to set up extractive institutions. These institutions

    persisted to the present. Exploiting differences in European mortality rates

    as an instrument for current institutions, they estimate large effects of

    institutions on income per capita.


    Once the effect of institutions is controlled for, countries in Africa or

    those closer to the equator do not have lower incomes.'
  key_findings: "1. SETTLER MORTALITY INSTRUMENT: European settler mortality rates serve as\n   valid instrument for institutional\
    \ quality - exogenous variation\n\n2. INSTITUTIONAL PERSISTENCE: Colonial institutions (extractive vs inclusive)\n   persisted\
    \ from colonial era to present day\n\n3. LARGE INSTITUTIONAL EFFECTS: Institutions have very large effects on\n   income\
    \ per capita - 1 std dev improvement in institutions = 7x GDP\n\n4. GEOGRAPHY NOT CAUSAL: Once institutions are controlled\
    \ for, geography\n   (Africa, equator distance) has no independent effect on income\n\n5. REVERSAL OF FORTUNE: Previously\
    \ prosperous regions (dense populations)\n   became poorer under colonialism due to extractive institutions\n\n6. TWO\
    \ COLONIZATION STRATEGIES: Europeans either settled (inclusive\n   institutions) or extracted (extractive institutions)\
    \ depending on\n   disease environment"
