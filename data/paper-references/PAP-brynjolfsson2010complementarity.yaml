key_findings_structured:
  - finding: "Complementary practices cluster at optima — the set of optimal solutions is a sublattice, meaning complementary practices are adopted together or not at all (Theorem 2, Topkis 1978)"
    domain: organizational_economics
    effect_size: null
  - finding: "Comparative statics mirror demand theory — an exogenous change favoring one practice indirectly favors all complementary practices (Theorem 4)"
    domain: organizational_economics
    effect_size: null
  - finding: "Long-run organizational adaptations always exceed short-run responses in systems of complements (Theorem 7, Milgrom & Roberts 1996)"
    domain: organizational_economics
    effect_size: null
  - finding: "IT investment combined with complementary organizational practices yields 5x returns at 5-7 year horizons vs 1-year horizons (Brynjolfsson & Hitt 2003)"
    domain: information_technology
    effect_size: "5x return multiplier"
  - finding: "CompStat policing: departments implementing IT with complementary organizational practices achieved 2.2pp higher crime clearance rates; individual components had no independent effect (Garicano & Heaton 2010)"
    domain: public_sector
    effect_size: "+2.2pp clearance rate"

