abstract: |
  This handbook chapter provides a comprehensive formal and empirical treatment of complementarity as an organizing principle for understanding organizational practices and performance. The authors define complementarity mathematically using supermodular functions and sublattice constraints, derive ten key theorems about decision problems with complementarities, and review extensive empirical evidence from case studies and econometric research. The framework explains why organizational practices cluster, why organizational change is difficult, why imitation of successful competitors often fails, and why long-run adaptations exceed short-run responses.

research_question: "How can the formal theory of complementarity (supermodularity) explain the clustering of organizational practices, the difficulty of organizational change, and cross-firm differences in performance and strategy?"

