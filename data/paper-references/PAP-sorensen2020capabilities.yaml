abstract: |
  This teaching note discusses the central challenge in building organizations —
  balancing coordination and motivation — and introduces the PARC model for
  assessing alignment in organizational design. The PARC framework identifies
  key elements of organizational design: People, Architecture and Routines,
  and Culture. Organizational capabilities arise from and are sustained by
  well-aligned organizational designs where elements are internally consistent
  and aligned with the firm's critical tasks.

key_findings_structured:
  - title: "PARC Model Components"
    finding: "Organizational design consists of three elements: People (skills, motivations), Architecture & Routines (structure, hierarchy, compensation), and Culture (values, beliefs, norms)."
  - title: "Coordination-Motivation Tradeoff"
    finding: "Organizations face a dual challenge of coordinating activities while maintaining individual motivation, resolved through authority-based structures."
  - title: "Alignment Creates Capability"
    finding: "Organizational capabilities emerge when PARC elements are internally consistent AND aligned with the firm's critical tasks."
  - title: "Capability vs. Resource Advantages"
    finding: "Capability-based advantages (what you can DO) are distinct from resource-based advantages (what you CONTROL). Both require organizational design."

