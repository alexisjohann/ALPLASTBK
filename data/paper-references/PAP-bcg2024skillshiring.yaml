abstract: >
  BCG report finding that skills-based hires (without degrees) match credentialed hires in
  performance, with added benefits of longer tenure and greater engagement. Key finding: job holders
  without degrees perform as well as those with degrees but stay longer and are more engaged.
  Supports the DEI case for skills-based hiring by demonstrating that credentials-free hiring
  reduces bias without reducing performance.
