summary:
  abstract_extended: 'This paper introduces a formal notion of "favorableness" for information and

    develops representation theorems for characterizing when one piece of evidence

    is more favorable than another. An observation x is more favorable than y if,

    for all prior beliefs about the variable of interest, the posterior belief

    conditional on x first-order stochastically dominates the posterior conditional

    on y.


    The paper applies this framework to four models in information economics:

    (1) stock price movements in response to news, (2) principal-agent bonus

    payments based on performance evidence, (3) strategic disclosure by salesmen,

    and (4) persuasion games where senders choose what information to reveal.'
  key_findings: "1. FAVORABLENESS ORDERING: Defines when one observation is unambiguously\n   more favorable than another,\
    \ independent of prior beliefs\n\n2. STOCHASTIC DOMINANCE: Good news induces first-order stochastic dominance\n   of posteriors\
    \ over the posteriors from bad news\n\n3. SHARE PRICES: Good news about firm prospects always causes share prices\n  \
    \ to rise; the relationship is monotonic\n\n4. PRINCIPAL-AGENT BONUSES: More favorable evidence about agent effort leads\n\
    \   to higher bonus payments in optimal contracts\n\n5. STRATEGIC DISCLOSURE: Buyers rationally expect withheld information\
    \ to be\n   unfavorable - the \"unraveling\" result for voluntary disclosure\n\n6. MONOTONE LIKELIHOOD RATIO: News quality\
    \ can be ordered by the monotone\n   likelihood ratio property (MLRP)"
  ebf_relevance: "Domain: CORE-THEORY, DOMAIN-INFORMATION, DOMAIN-FINANCE\n10C Dimensions: AWARE (information processing),\
