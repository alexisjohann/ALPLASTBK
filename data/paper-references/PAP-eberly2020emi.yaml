abstract: Emi Nakamura is the 2019 recipient of the John Bates Clark Medal from the American Economic Association. Emi is
  an empirical macroeconomist whose work has studied the nature of price-setting and the effects of monetary and fiscal policies,
  among other issues, and has been notable for using less aggregated data, while addressing central questions about the macroeconomy.
  We describe Emi's key research contributions, with particular emphasis on those identified by the Honors and Awards Committee
  of the American Economic Association in her Clark Medal citation, as well as her broader contributions to the field of economics.
