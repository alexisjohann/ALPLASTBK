abstract: |
  We conduct a social dilemma experiment in which real-world leaders can punish
  group members as a third party. Despite facing an identical environment, leaders
  are found to take remarkably different punishment approaches. The different leader
  types revealed experimentally explain the relative success of groups in managing
  their forest commons. Leaders who emphasize equality and efficiency see positive
  forest outcomes. Antisocial leaders, who punish indiscriminately, see relatively
  negative forest outcomes. Our results highlight the importance of leaders in
  collective action, and more generally the idiosyncratic but powerful roles that
  leaders may play, leading to substantial variation in group cooperation outcomes.

key_findings_structured:
  S1_research_question: "Do leaders with the authority to enforce cooperation vary in their intrinsic motivation to punish, and does this variation explain group success in commons management?"
  S2_methodology: "Field experiment combining third-party punishment game (TPPG) with real-world leaders and actual forest commons performance data. Strategy method for robust punishment motivation measurement. Ethiopian forest user groups (56 groups)."
  S3_sample_data: "Real-world leaders from Ethiopian forest commons management program (GIZ). 56 forest user groups. Leaders face identical experimental environment."
  S4_findings:
    - finding: "Leaders differ widely in punishment motivation despite identical environments"
      source_section: "Section III"
      formal_result: "Four leader types: non-punishing (L_NP), equality-driven (L_EQ), equality-and-efficiency-driven (L_EQEF), antisocial (L_AS)"
    - finding: "Leader types predict real-world forest commons outcomes"
      source_section: "Section IV"
      formal_result: "Equality and efficiency-driven leaders see positive forest outcomes; antisocial leaders see negative outcomes"
    - finding: "Antisocial leaders punish even cooperators"
      source_section: "Section III"
      formal_result: "L_AS type punishes full contributors, not just free-riders"
    - finding: "Variation not driven by ethnicity, religion, or institutional environment"
      source_section: "Section III"
      formal_result: "These factors held constant across groups; variation is intrinsic to leaders"
  S5_validity: "Natural field experiment with real leaders. Actual commons outcomes (forest quality). Strategy method for robust preference measurement. Multiple controls for confounds."
  S6_reproducibility: "Third-party punishment game protocol described in detail. Ethiopian GIZ forest commons program provides institutional setting."

