abstract: In the debates over “economic calculation” launched by Ludwig von Mises in 1920 and extending well into the 1940s,
  the central issue concerned the ability of a socialist economy to achieve allocative efficiency. Von Mises emphasized that
  a collectivist state would have great difficulty in gathering and acting on relevant information; therefore, under socialism,
  even well-intentioned bureaucrats would lack a meaningful system of values on which to calculate. Defenders of socialism,
  such as Oskar Lange, countered that a market socialism could match demand to supply just as well as capitalism and meet
  the range of static conditions required for Pareto optimality. That debate is a rich and interesting story that has been
  told many times before. But in all that has been written, an important aspect of the original debate has been lost. Somewhat
  oddly, both the socialists like Oskar Lange and the advocates of private ownership like von Mises and Friedrich Hayek maintained
  that they were defending the progressive tendencies of competitive capitalism against the deadening hand of monopoly power.
  This historic paradox deserves consideration, if only because it serves to focus attention on our still incomplete theories
  of large-scale enterprises under socialism and capitalism.
