abstract: 'Premise of research. Polyploidy and hybridization are prevalent and widespread phenomena in plants. The genetic
  consequences of genome duplication are numerous, but we understand very little about the comparative ecology of polyploids.
  In particular, the ways in which hybrid and polyploid offspring differ in ecology relative to their parents and relatives
  are poorly known. Among angiosperms, the triploid bridge is hypothesized to accrue some marginal fitness benefit to parent
  species from mostly sterile hybrid offspring. Because of the complexities of the fern life cycle, involving two free-living
  life stages, the ability to backcross via a triploid bridge should be more limited. If the triploid sporophyte offspring
  provide no fitness benefit to parents via subsequent generations, this raises the question about whether triploids further
  compete with parents by occupying similar ecological niches. We investigated comparative ecophysiology across light and
  wetness gradients of five members of the hybrid wood fern complex, Dryopteris.Methodology. We selected two related triads.
  Each triad consisted of a triploid and its diploid and tetraploid progenitor species: the D. × triploidea (3n) triad, with
  the parents D. carthusiana (4n) and D. intermedia (2n), and the D. × bootii (3n) triad, with the parents D. cristata (4n)
  and D. intermedia (2n). We sampled the temperature and relative humidity, population abundance and relative frequency, photosynthetic
  parameters, and hydraulic conductivity of populations to examine the extent of shared ecological niche space.Pivotal results.
  We found that triploids varied in habitat space relative to their parents. In the case of the triploid D. × bootii, this
  taxon occupied habitats similar to those of its parents at similar abundances and frequencies. In the case of D. × triploidea,
  the hybrid occurred across a more diverse range of habitats, which was more similar to its diploid parent. In both triads,
  the triploid''s photosynthetic rate was intermediate between those of its parents, and the majority of the photosynthetic
  parameters were similar to those of the parents. There were some differences in hydraulic conductivity: xylem-specific hydraulic
  conductivity of the triploid D. × bootii was significantly higher than that of its diploid parent.Conclusions. Our results
  show that related triploids, diploids, and tetraploids substantially overlap in morphological and physiological niche space.
  The high relative frequency of triploids in habitats and the lack of clear niche partitioning within triads suggest that
  in addition to not contributing to parental reproductive fitness, the triploids could also negatively impact their progenitors
  by potentially competing for space and light resources in similar ways.'
