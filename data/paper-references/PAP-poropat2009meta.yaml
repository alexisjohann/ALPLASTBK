abstract: This article reports a meta-analysis of personality-academic performance
  relationships, based on the 5-factor model, in which cumulative sample sizes ranged
  to over 70,000. Most analyzed studies came from the tertiary level of education,
  but there were similar aggregate samples from secondary and tertiary education.
  There was a comparatively smaller sample derived from studies at the primary level.
  Academic performance was found to correlate significantly with Agreeableness, Conscientiousness,
  and Openness. Where tested, correlations between Conscientiousness and academic
  performance were largely independent of intelligence. When secondary academic performance
  was controlled for, Conscientiousness added as much to the prediction of tertiary
  academic performance as did intelligence. Strong evidence was found for moderators
  of correlations. Academic level (primary, secondary, or tertiary), average age of
  participant, and the interaction between academic level and age significantly moderated
  correlations with academic performance. Possible explanations for these moderator
  effects are discussed, and recommendations for future research are provided.
