abstract: How do exchange rate bands work compared to completely fixed rates (between realignments); or, more precisely, what
  are the dynamics of exchange rates, interest rates, and central bank interventions within exchange rate bands? Does the
  difference between bands and completely fixed exchange rates matter, and if so, which of the two arrangements is best; or,
  more precisely, what are the tradeoffs that determine the optimal bandwidth? This article will present an interpretation
  of some selected recent theoretical and empirical research on exchange rate target zones, with emphasis on main ideas and
  results and without technical detail.
