abstract: Recent advances in artificial intelligence and robotics have generated a robust debate about the future of work.
  An analogous debate occurred in the late nineteenth century when mechanization first transformed manufacturing. We analyze
  an extraordinary dataset from the late nineteenth century, the Hand and Machine Labor study carried out by the US Department
  of Labor in the mid-1890s. We focus on transitions at the task level from hand to machine production, and on the impact
  of inanimate power, especially of steam power, on labor productivity. Our analysis sheds light on the ability of modern
  task-based models to account for the effects of historical mechanization.
