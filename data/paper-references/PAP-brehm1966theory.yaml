abstract: THIS THEORY STATES THAT INDIVIDUALS HAVE CERTAIN FREEDOMS WITH REGARD TO THEIR BEHAVIOR. IF THESE BEHAVIORAL FREEDOMS
  ARE REDUCED OR THREATENED WITH REDUCTION, THE INDIVIDUAL WILL BE MOTIVATIONALLY AROUSED TO REGAIN THEM. THIS IS PSYCHOLOGICAL
  REACTANCE. THE THEORY IS EXAMINED IN A SERIES OF EXPERIMENTS WITH PERSONAL AND IMPERSONAL THREATS, AND ALSO IN THE LIGHT
  OF ATTITUDE CHANGE THEORIES.(PsycINFO Database Record (c) 2017 APA, all rights reserved)
