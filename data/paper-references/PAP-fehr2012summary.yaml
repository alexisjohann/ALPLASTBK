summary:
  abstract_extended: 'This handbook chapter summarizes major findings from behavioral and

    experimental economics. We review key results on social preferences,

    cooperation, and decision-making that have transformed economic thinking.'
  key_findings: "1. SOCIAL PREFERENCES\n   - Inequality aversion established\n   - Reciprocity documented\n   - Type heterogeneity\n\
    \n2. COOPERATION\n   - Public goods experiments\n   - Punishment sustains cooperation\n   - Institutions matter\n\n3.\
    \ DECISION MAKING\n   - Bounded rationality confirmed\n   - Framing effects robust\n   - Context sensitivity"
  ebf_relevance: '10C DIMENSIONS:

    - All 10C dimensions covered

    - Comprehensive review

    - Foundation for EBF


    THEORY SUPPORT:

    - MS-SP-001: Social Preferences

    - MS-SR-001: Strong Reciprocity

    - Handbook overview


    KEY INSIGHT:

    Major behavioral findings establish that social preferences, bounded

    rationality, and context effects are pervasive; this transforms

    economic theory and policy.'
