abstract: Publisher Summary This chapter focuses on the way in which the operation of the medical-care industry and the efficacy
  with which it satisfies the needs of society differ from a norm. The term norm that the economist usually uses for the purposes
  of such comparisons is the operation of a competitive model, that is, the flows of services that would be offered and purchased
  and the prices that would be paid for them. The interest in the competitive model stems partly from its presumed descriptive
  power and partly from its implications for …
