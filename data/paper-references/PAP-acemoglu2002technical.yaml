abstract: This essay discusses the effect of technical change on wage inequality. I argue that the behavior of wages and returns
  to schooling indicates that technical change has been skill-biased during the past sixty years. Furthermore, the recent
  increase in inequality is most likely due to an acceleration in skill bias. In contrast to twentieth-century developments,
  much of the technical change during the early nineteenth century appears to be skill-replacing. I suggest that this is because
  the increased supply of unskilled workers in the English cities made the introduction of these technologies profitable.
  On the other hand, the twentieth century has been characterized by skill-biased technical change because the rapid increase
  in the supply of skilled workers has induced the development of skillcomplementary technologies. The recent acceleration
  in skill bias is in turn likely to have been a response to the acceleration in the supply of skills during the past several
  decades.
