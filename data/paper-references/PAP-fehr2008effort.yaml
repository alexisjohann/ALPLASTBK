abstract: 'Recent discoveries in behavioral economics have led scholars to question the underpinnings of neoclassical economics.
  We use insights gained from one of the most influential lines of behavioral research-gift exchange-in an attempt to maximize
  worker effort in two quite distinct tasks: data entry for a university library and door-to-door fundraising for a research
  center. In support of the received literature, our field evidence suggests that worker effort in the first few hours on
  the job is considerably higher in the "gift" treatment than in the "nongift" treatment. After the initial few hours, however,
  no difference in outcomes is observed, and overall the gift treatment yielded inferior aggregate outcomes for the employer:
  with the same budget we would have logged more data for our library and raised more money for our research center by using
  the market-clearing wage rather than by trying to induce greater effort with a gift of higher wages. Copyright The Econometric
  Society 2006.'
