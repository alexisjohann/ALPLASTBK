abstract: Amy Finkelstein is the 2012 recipient of the John Bates Clark Medal from the American Economic Association. The
  core concerns of Amy's research program have been insurance markets and health care. She has addressed whether asymmetric
  information leads to inefficiencies in insurance markets, how large social insurance programs affect healthcare markets,
  and the determinants of innovation incentives in health care. We describe a number of Amy's key research contributions,
  with particular emphasis on those identified by the Honors and Awards Committee of the American Economic Association in
  her Clark Medal citation, as well as her broader contributions to the field of economics.
