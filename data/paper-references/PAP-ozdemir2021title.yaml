abstract: Imaging spectrometry has mainly been a research tool, employing laboratory
  spectrographs and scientific cameras. This paper describes an add-on imaging spectrography
  that provides a unique combination of high quality image in a small, rugged, industrial,
  easy-to-use component. The spectrograph is based on a prism/grating/prism dispersing
  element which provides straight optical axis, astigmatism free image and polarization
  independent throughput. A volume holographic transmission grating is used for high
  efficiency. The tubular optomechanical construction of the spectrography is stable
  and small, D30 X L110 mm with F/2.8 numerical aperture and 2/3 inch image size.
  Equipped with C-mounts, the spectrography plugs between lens and area camera, converting
  the camera to a spectral line imaging system. The spectrograph allows the utilization
  of rapidly developing monochrome camera techniques, like high speed digital cameras,
  smart cameras and CMOS sensors, in color and spectral analytical applications. It
  is the first component available for upgrading existing industrial monochrome vision
  systems with color/spectral capability without the need to change the basic platform
  hardware and software. The spectrograph brings the accuracy of spectral colorimetry
  to industrial vision and overcomes the complex calibration that is needed when an
  RGB color camera is applied to colorimetric applications. Other applications include
  NIR imaging, spectral microscopy, multichannel fiberoptics spectroscopy and remote
  sensing.
