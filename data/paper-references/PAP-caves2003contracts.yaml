abstract: Contract structures used in the arts and entertainment industries are central to understanding their economic organization.
  The structures spring from common bedrock traits of these industries—pervasive product differentiation, all costs sunk,
  consumers' valuations unpredictable, artists having tastes for how creative work is done. Joint-venture structures are commen,
  with revenue (not profit) shared. Advances to artists help bring incentive and distributive goals into consistency, as do
  long-term contracts covering successive cycles of the artist's output. Real option contracts allow the efficient allocation
  of decision rights in a project on which collaborators work successively.
