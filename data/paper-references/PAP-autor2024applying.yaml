abstract: Autor argues that AI, if used well, can help restore the middle-skill, middle-class heart of the US labor market
  by extending the reach and value of human expertise rather than simply replacing it. The paper proposes that AI could enable
  a broader set of workers to perform tasks currently requiring costly specialized training.
