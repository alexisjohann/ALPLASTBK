abstract: 'People like to think of themselves as honest. However, dishonesty pays—and
  it often pays well. How do people resolve this tension? This research shows that
  people behave dishonestly enough to profit but honestly enough to delude themselves
  of their own integrity. A little bit of dishonesty gives a taste of profit without
  spoiling a positive self-view. Two mechanisms allow for such self-concept maintenance:
  inattention to moral standards and categorization malleability. Six experiments
  support the authors’ theory of self-concept maintenance and offer practical applications
  for curbing dishonesty in everyday life.'
