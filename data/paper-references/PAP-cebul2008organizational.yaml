abstract: Many goods and services can be readily provided through a series of unconnected transactions, but in health care,
  close coordination over time and within care episodes improves both health outcomes and efficiency. Close coordination is
  problematic in the U.S. healthcare system because the financing and delivery of care is distributed across a variety of
  distinct and often competing entities, each with its own objectives, obligations, and capabilities. These fragmented organizational
  structures lead to disrupted relationships, poor information flows, and misaligned incentives that combine to degrade care
  quality and increase costs. We illustrate our argument with examples taken from the insurance and hospital industries, and
  discuss possible responses to the problems resulting from organizational fragmentation.
