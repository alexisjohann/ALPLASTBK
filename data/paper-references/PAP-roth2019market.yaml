abstract: We interview each other about how game theory and mechanism design evolved into practical market design. When we
  learned game theory, games were modeled either in terms of the strategies available to the players (“noncooperative games”)
  or the outcomes attainable by coalitions (“cooperative games”), and these were viewed as models for different kinds of games.
  The model itself was viewed as a mathematical object that could be examined in its entirety. Market design, however, has
  come to view these models as complementary approaches for examining different ways marketplaces operate within their economic
  environment. Because that environment can be complex, there will be unobservable aspects of the game. Mathematical models
  themselves play a less heroic, stand-alone role in market design than in the theoretical mechanism design literature. Other
  kinds of investigation, communication, and persuasion are important in crafting a workable design and helping it to be adopted,
  implemented, maintained, and adapted.
