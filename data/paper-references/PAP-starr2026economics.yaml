# ============================================================================
# ABSTRACT & SOURCE
# ============================================================================
abstract: |
  This paper reviews the economics of noncompete clauses. Noncompetes bind roughly 18%
  of US workers and are required by 30% of low-wage firms. Correlational evidence shows
  that workers with noncompetes earn less and are less mobile, but causal identification
  is challenging. Natural experiments from state-level bans (Oregon, Hawaii, Washington)
  show 3-4% wage increases. An RCT with 14,000 job offers found that noncompetes reduce
  the probability of working for a competitor by 57%. One-third of workers skip reading
  the noncompete buried on page 7 of the contract. The enforceability paradox: noncompete
  wage premia are larger in states where they are unenforceable (in terrorem effect).
  California's ban since 1872 is credited for Silicon Valley's innovation ecosystem.

abstract_source: fulltext_extraction
