# ============================================================================
# BEHAVIORAL MAPPING
# ============================================================================
behavioral_mapping:
  source: "original paper analysis"
  dimensions:
    - domain: contract_signing
      stages:
        - pre_contemplation
        - action
      primary_dimension: C
      psi_dominant: cognitive_overload
      gamma: 0.0
      A_level: 0.3
      W_level: 0.2
      awareness_type: absent
      key_insight: |
        Workers sign noncompetes at hiring when bargaining power is weakest and
        cognitive load is highest. One-third don't read the clause. The in terrorem
        effect means the contract operates through cognitive channels (Psi_C) even
        when legally unenforceable (Psi_I). This is a pure behavioral mechanism:
        the perception of constraint matters more than the legal reality.

    - domain: labor_mobility
      stages:
        - maintenance
        - evaluation
      primary_dimension: I
      psi_dominant: institutional_constraint
      gamma: 0.0
      A_level: 0.4
      W_level: 0.5
      awareness_type: biased
      key_insight: |
        Even in non-enforcing states, workers with noncompetes are significantly
        less mobile. The enforceability paradox shows that Psi_C (perceived
        constraint) dominates Psi_I (actual legal enforceability). Policy
        implications: banning noncompetes (changing Psi_I) works through both
        legal AND behavioral channels simultaneously.

