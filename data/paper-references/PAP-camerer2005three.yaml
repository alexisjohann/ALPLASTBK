summary:
  abstract_extended: 'Game theory, the formalized study of strategy, began in the 1940s by asking how

    emotionless geniuses should play games, but ignored until recently how average

    people with emotions and limited foresight actually play games. This book marks

    the first substantial and authoritative effort to close this gap.


    Colin Camerer, one of the field''s leading figures, uses psychological principles

    and hundreds of experiments to develop mathematical theories of reciprocity,

    limited strategizing, and learning, which help predict what real people and

    companies do in strategic situations.


    Behavioral game theory is about what players actually do. It expands analytical

    theory by adding emotion, mistakes, limited foresight, doubts about how smart

    others are, and learning to analytical game theory.


    Strategic interactions explained by behavioral game theory include bargaining,

    games of bluffing as in sports and poker, strikes, how conventions help

    coordinate joint activity, price competition and patent races, and building up

    reputations for trustworthiness or ruthlessness in business or life.'
  key_findings: '1. LIMITED STRATEGIZING: People don''t engage in infinite regress reasoning


    2. LEVEL-K THINKING: Hierarchy of strategic sophistication (L0, L1, L2, ...)


    3. QUANTAL RESPONSE: Players make errors proportional to payoff differences


    4. LEARNING: EWA (Experience-Weighted Attraction) learning model


    5. SOCIAL PREFERENCES: Fairness, reciprocity affect strategic behavior


    6. EMOTION IN GAMES: Anger, trust, regret influence strategic choices'
