abstract: Of Mice and Markets Some goods, such as widgets, are freely bought and sold in markets without protest, whereas
  others, such as indulgences, are not. Some mice that have been bred for use in laboratory experiments turn out to be surplus
  to requirements and are subsequently sacrificed. Falk and Szech (p. 707 ) studied the effect that marketplace negotiation
  has had on experimental subjects' willingness to pay for the upkeep of these surplus mice. Individuals were willing to pay
  much more to save the mice, but market-like exchanges lowered these prices.
