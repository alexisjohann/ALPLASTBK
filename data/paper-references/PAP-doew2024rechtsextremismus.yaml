methodology:
  design: Cross-sectional online survey (CAWI)
  sample:
    n: 2198
    population: Austrian residents aged 16-75
    sampling: Online access panel (marketagent.com)
    stratification:
    - age
    - gender
    - federal_state
    - education
    representativeness: Representative for Austrian population 16-75
  period: Late April to late May 2024
  instrument:
    type: Online questionnaire
    scales:
    - name: Rechtsextremismus-Skala
      description: Syndrome of antidemocratic attitudes of inequality
      items:
      - Unser Volk ist von Natur aus anderen Völkern überlegen
      - Ich wünsche mir einen starken Mann an der Spitze, der sich nicht um Parlament
        kümmern muss
      - Die österreichische Bevölkerung wird nach und nach durch Zuwanderer ersetzt
      - Gefährliche Menschen sollten eingesperrt werden können, bevor sie Verbrechen
        begangen haben
    - name: Verschwörungsmentalität
      items:
      - Die Bevölkerung wird von den Medien systematisch belogen
      - Geheime Organisationen haben großen Einfluss auf die Politik
    - name: Soziale Distanz
      items:
      - Ich würde nicht neben Muslimen leben wollen
      - Ich würde nicht neben Roma/Sinti leben wollen
      - Ich würde nicht neben Juden leben wollen
  comparability: Items derived from German Mitte-Studien and Leipzig Authoritarianism
    Studies
  advisory_board: High-caliber social science experts
  limitations:
  - Online panel may underrepresent digitally inactive populations
  - Self-reported attitudes may differ from actual behavior
  strengths:
  - Lower social desirability bias than face-to-face/telephone
  - First Austrian longitudinal study on right-wing extremist attitudes
  - Planned biannual repetition enables time comparisons
detailed_findings:
  rechtsextremismus:
    prevalence: 0.1
    description: 10% classified as having pronounced right-wing extremist attitudes
    voting_behavior:
      fpoe: 0.58
      spoe: 0.17
      oevp: 0.11
      note: If only rechtsextrem group voted, FPÖ would have absolute majority
  great_replacement:
    prevalence: 0.47
    item: Believe Austrian population is being replaced by immigrants
  remigration:
    prevalence: 0.5
    item: Support comprehensive remigration as necessary
  media_distrust:
    prevalence: 0.51
    item: Believe population is systematically lied to by media
  conspiracy_mentality:
    prevalence: 0.47
    item: Believe secret organizations have great influence on politics
  preventive_detention:
    prevalence: 0.5
    item: Support imprisoning dangerous people before crimes committed
  violence_readiness:
    prevalence: 0.1
    note: About one-tenth show readiness for violence
  social_distance:
    muslims: 0.36
    roma_sinti: 0.38
    jews: 0.1
    item: Would not want to live next to [group]
  antisemitism:
    prevalence_range: 0.15-0.23
    comparison: Higher than Leipzig Authoritarianism Study 2022 (~7%)
