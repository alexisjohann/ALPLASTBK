abstract: 'First Rechtsextremismus-Barometer commissioned by DÖW. Key findings: 47%
  believe

  Austrians are being replaced by migrants; 50% support comprehensive remigration;

  10% classified as extreme right (58% of these vote FPÖ); 38% reject Roma/Sinti

  neighbors; 36% reject Muslim neighbors; 10% reject Jewish neighbors.

  '
