abstract: We propose an integrated framework to discuss the empirical literature on the local determinants of agglomeration
  effects. We start by presenting the theoretical mechanisms that ground individual and aggregate empirical specifications.
  We gradually introduce static effects, dynamic effects, and workers' endogenous location choices. We emphasize the impact
  of local density on productivity, but we also consider many other local determinants supported by theory. Empirical issues
  are then addressed. The most important concerns are …
