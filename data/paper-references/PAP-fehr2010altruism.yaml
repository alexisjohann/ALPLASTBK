summary:
  abstract_extended: 'This paper examines gender differences in altruistic behavior. We analyze

    how men and women differ in their prosocial preferences and how context

    affects these gender gaps in altruism.'
  key_findings: "1. GENDER DIFFERENCES\n   - Women often more altruistic\n   - Context moderates differences\n   - Task-specific\
    \ patterns\n\n2. BEHAVIORAL MECHANISMS\n   - Social image concerns\n   - Risk preferences\n   - Empathy differences\n\n\
    3. IMPLICATIONS\n   - Policy targeting\n   - Experimental design\n   - Workplace dynamics"
