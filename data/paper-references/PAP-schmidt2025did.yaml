abstract: This paper examines the evolution of the safety net for low-income families since welfare reform in 1996 promised
  to “end welfare as we know it.” The total package of supports has become substantially more generous, but has changed in
  character. Support has shifted away from monthly cash transfers towards tax credits and in-kind benefits, and has expanded
  for working families while declining for those without earnings. Resources available to married-parent families have expanded,
  whereas those for adults without dependents remain scant. We also document that, despite expanded state flexibilities, variability
  in generosity across states did not grow due to simultaneous expansions of federal food assistance and tax credits. Overall,
  these changes reflect ongoing contention over two key policy issues. First, what is the appropriate trade-off between promoting
  work versus preventing material hardship? Second, what is the appropriate role for states versus the federal government
  in determining safety net generosity?
