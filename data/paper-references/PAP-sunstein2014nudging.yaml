abstract: This brief essay offers a general introduction to the idea of nudging, along with a list of 10 of the most important
  nudges. It also provides a short discussion of the question whether to create some kind of separate behavioral insights
  unit, capable of conducting its own research, or instead to rely on existing institutions. Nudges are liberty-preserving
  approaches that steer people in particular directions, but that also allow them to go their own way. Default rules may well
  be the most effective nudges. Any official nudging should be transparent and open rather than hidden and covert.
