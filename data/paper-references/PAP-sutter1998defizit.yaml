abstract: Auf dem Gipfel in Amsterdam im Juni 1997 haben sich die Staats- und Regierungschefs der EU-Staaten auf einen Stabilitäts-
  und Wachstumspakt für die Mitglieder in der Europäischen Wirtschafts- und Währungsunion geeinigt. Welche Auswirkungen und
  Probleme ergeben sich aus der gegenwärtigen Ausgestaltung des Stabilitätspaktes für die Teilnehmerstaaten der Währungsunion?
  Wie ist der empirische Zusammenhang zwischen realer BIP-Wachstumsrate und gesamtstaatlichem Nettodefizit gemäß volkswirtschaftlicher
  Gesamtrechnung?
