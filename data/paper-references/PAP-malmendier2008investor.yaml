abstract: In 2003, a new law required that 40% of Norwegian firms' directors be women--at the time only 9% of directors were
  women. We use the prequota cross-sectional variation in female board representation to instrument for exogenous changes
  to corporate boards following the quota. We find that the constraint imposed by the quota caused a significant drop in the
  stock price at the announcement of the law and a large decline in Tobin's Q over the following years, consistent with the
  idea that firms choose boards to maximize value. The quota led to younger and less experienced boards, increases in leverage
  and acquisitions, and deterioration in operating performance. Copyright 2012, Oxford University Press.
