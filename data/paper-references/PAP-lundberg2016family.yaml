abstract: 'Popular discussions of changes in American families over the past 60 years have revolved around the “retreat from
  marriage.” Concern has focused on increasing levels of nonmarital childbearing, as well as falling marriage rates that stem
  from both increases in the age at first marriage and greater marital instability. Often lost in these discussions is the
  fact that the decline of marriage has coincided with a rise in cohabitation. Many “single” Americans now live with a domestic
  partner and a substantial fraction of “single” mothers are cohabiting, often with the child''s father. The share of women
  who have ever cohabited has nearly doubled over the past 25 years, and the majority of nonmarital births now occur to cohabiting
  rather than to unpartnered mothers at all levels of education. The emergence of cohabitation as an alternative to marriage
  has been a key feature of the post–World War II transformation of the American family. These changes in the patterns and
  trajectories of family structure have a strong socioeconomic gradient. The important divide is between college graduates
  and others: individuals who have attended college but do not have a four-year degree have family patterns and trajectories
  that are very similar to those of high school graduates.'
