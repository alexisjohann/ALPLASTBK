abstract: This section will list readings that may be especially useful to teachers of undergraduate economics, as well as
  other articles that are of broader cultural interest. In general, the articles chosen will be expository or integrative
  and not focus on original research. If you write or read an appropriate article, please send a copy of the article (and
  possibly a few sentences describing it) to Timothy Taylor, either via e-mail at &lt;&gt;, or c/o Journal of Economic Perspectives,
  Macalester College, 1600 Grand Ave., Saint Paul, Minnesota, 55105.
