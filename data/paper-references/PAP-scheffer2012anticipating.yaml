abstract: All Change Research on early warning signals for critical transitions in
  complex systems such as ecosystems, climate, and global finance systems recently
  has been gathering pace. At the same time, studies on complex networks are starting
  to reveal which architecture may cause systems to be vulnerable to systemic collapse.
  Scheffer et al. (p. 344 ) review how previously isolated lines of work can be connected,
  conclude that many critical transitions (such as escape from the poverty trap) can
  have positive outcomes, and highlight how the new approaches to sensing fragility
  can help to detect both risks and opportunities for desired change.
