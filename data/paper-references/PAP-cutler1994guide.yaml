abstract: 'There are four rationales for health care reform: increasing the efficiency of health delivery; reforming the market
  for health insurance; providing universal coverage; and reducing the federal deficit. These goals are reflected in most
  reform proposals. Achieving these goals involves several problems, however. Paying for universal coverage may lead to labor
  supply or demand reductions. In addition, reform involves large federal risks that must be dealt with through deficit financing,
  reduced benefits, or lower subsidies.'
