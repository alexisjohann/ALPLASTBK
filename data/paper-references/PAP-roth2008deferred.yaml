title: 'Deferred Acceptance Algorithms: History, Theory, Practice'
author: Roth
year: '2008'
publication_type: journal_article
doi: 10.1007/s00182-008-0117-6
abstract: 'The deferred acceptance algorithm proposed by Gale and Shapley (1962) has had a profound influence on market design,
  both directly, by being adapted into practical matching mechanisms, and indirectly, by raising new theoretical questions.
  Deferred acceptance algorithms are at the basis of labor market clearinghouses around the world and have been implemented
  in school choice systems in Boston and New York City. The study of markets that failed in ways fixable with centralized
  mechanisms has led to deeper understanding of marketplace tasks: providing thickness, dealing with congestion, and making
  it safe for participants to act effectively on their preferences.'
