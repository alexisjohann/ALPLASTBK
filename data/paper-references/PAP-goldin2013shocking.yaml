abstract: The most prominent feature of the female labor force across the past hundred years is its enormous growth. But many
  believe that the increase was discontinuous. Our purpose is to identify the short- and long-run impacts of WWII on the labor
  supply of women who were currently married in 1950 and 1960. Using WWII mobilization rates by state, we find a wartime impact
  on weeks worked and the labor force participation of married white (non-farm) women in both 1950 and 1960. The impact, moreover,
  was experienced almost entirely by women in the top half of the education distribution.
