abstract: The choice overload hypothesis states that an increase in the number of options to choose from may lead to adverse
  consequences such as a decrease in the motivation to choose or the satisfaction with the finally chosen option. A number
  of studies found strong instances of choice overload in the lab and in the field, but others found no such effects or found
  that more choices may instead facilitate choice and increase satisfaction. In a meta-analysis of 63 conditions from 50 published
  and unpublished experiments (N p 5,036), we found a mean effect size of virtually zero but considerable variance between
  studies. While further analyses indicated several potentially important preconditions for choice overload, no sufficient
  conditions could be identified. However, some idiosyncratic moderators proposed in single studies may still explain when
  and why choice overload reliably occurs; we review these studies and identify possible directions for future research.
