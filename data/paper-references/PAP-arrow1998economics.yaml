abstract: Racial discrimination pervades every aspect of a society in which it is found. It is found above all in attitudes
  of both races, but also in social relations, in intermarriage, in residential location, and, frequently, in legal barriers.
  It is also found in levels of economic accomplishment; that is, income, wages, prices paid, and credit extended. It is natural
  to suppose that economic analysis can cast light on the economic effects of racial discrimination. But the pervasiveness
  of the phenomenon must give us pause. Can a phenomenon manifest everywhere in the social world really be understood, even
  in only one aspect, by the tools of a single discipline? I want to explore here the scope and limits of ordinary economic
  analysis for understanding racial discrimination even in markets.
