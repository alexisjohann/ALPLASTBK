abstract: A proposal for a 2 month, 10 man study of artificial intelligence at Dartmouth College in summer 1956. The study proceeds on the conjecture that every aspect of learning or any other feature of intelligence can in principle be so precisely described that a machine can be made to simulate it. An attempt will be made to find how to make machines use language, form abstractions and concepts, solve kinds of problems now reserved for humans, and improve themselves. This is considered the founding document of AI as a field.
