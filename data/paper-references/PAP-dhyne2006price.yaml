abstract: 'Prices of goods and services do not adjust immediately in response to changing demand and supply conditions. This
  paper characterizes the average frequency and size of price changes in the euro area and its member countries, investigates
  the determinants of the probability of price changes, and compares the evidence for the euro area with available U.S. results.
  The facts documented in this paper are based on evidence from individual price data recorded at the store level in all euro
  area countries except Ireland and Greece: that is in datasets covering Austria, Belgium, Finland, France, Germany, Italy,
  Luxembourg, the Netherlands, Portugal, and Spain, which together account for around 97 percent of euro area GDP. The data
  used are the monthly price records underlying the computation of national Consumer Price Indices and Harmonized Consumer
  Price Indices. These data cover a large number of products selected on the basis of extensive Household Budget Surveys.'
