abstract: The 2014 John Bates Clark Medal of the American Economic Association was awarded to Matthew Gentzkow of the University
  of Chicago Booth School of Business. The citation recognized Matt's “fundamental contributions to our understanding of the
  economic forces driving the creation of media products, the changing nature and role of media in the digital environment,
  and the effect of media on education and civic engagement.” In addition to his work on the media, Matt has made a number
  of significant contributions to empirical industrial organization more broadly, as well as to applied economic theory. In
  this essay, I highlight some of these contributions.
