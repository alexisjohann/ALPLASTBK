      interpretation: 1 SD increase → +15 pp acquisition probability
    - finding: Health domain avoidance rate
      estimate: 0.28
      interpretation: 28% prefer not knowing health information
    - finding: Financial domain avoidance rate
      estimate: 0.22
      interpretation: 22% prefer not knowing financial information
    - finding: Personal domain avoidance rate
      estimate: 0.41
      interpretation: 41% prefer not knowing personal information
    - finding: Scale reliability
      cronbach_alpha: 0.84
      mcdonald_omega: 0.86
      interpretation: Good internal consistency
  S5_validity:
    available: true
    internal_validity:
    - Exploratory factor analysis for item selection
    - Confirmatory factor analysis for structure validation
    - Test-retest reliability over 2 weeks
    - Multiple studies with different samples
    - Behavioral validation task (not just self-report)
    external_validity:
    - Three domains tested (health, finance, personal)
    - Convergent validity with related constructs (NFC, IU, neuroticism)
    - Discriminant validity from intelligence, SES
    - Behavioral prediction in laboratory task
    - Consistent results across MTurk and Prolific samples
    limitations:
    - Self-report measure (though behaviorally validated)
    - WEIRD samples (US participants)
    - Hypothetical scenarios in scale
    - Two-week retest interval (longer would strengthen)
    - Laboratory behavioral task (not real-world)
