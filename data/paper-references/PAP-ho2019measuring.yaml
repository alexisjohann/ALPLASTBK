- Documents 32% information avoidance prevalence
- Establishes four-factor structure (health, finance, personal, general)
- Shows test-retest reliability (r = 0.64)
- Demonstrates behavioral prediction (β = 0.44)
- Provides domain-specific measurements
- Links to anticipatory utility theory
- Applications for health, finance, and organizational contexts
