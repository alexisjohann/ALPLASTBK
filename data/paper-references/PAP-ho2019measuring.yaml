  S4_findings:
    available: true
    key_findings:
    - finding: 32% of responses indicate preference for NOT obtaining information
      estimate: 0.32
      interpretation: Information avoidance is common even for free, useful information
    - finding: Test-retest reliability acceptable
      estimate: 0.64
      se: 0.04
      ci_95: '[0.55, 0.72]'
      interpretation: Information preferences are relatively stable trait
    - finding: Four-factor structure confirmed
      factors: Health, Financial, Personal, General
      cfi: 0.94
      rmsea: 0.058
      interpretation: Domain-specific with general factor
    - finding: IPS predicts actual information acquisition
      estimate: 0.44
