title: Measuring Information Preferences
author: Emily H. Ho, David Hagmann, George Loewenstein
year: '2019'
publication_type: journal_article
journal: Management Science
volume: '67'
number: '1'
pages: 126-145
doi: 10.1287/mnsc.2019.3543
abstract: 'This paper develops the Information Preferences Scale (IPS), a measure of individual

  differences in preferences for obtaining information. Across three studies with over

  2,400 participants, we demonstrate that individuals differ systematically in their

  desire for information about health, personal finances, and personal characteristics.

  We find that approximately 32% of responses indicate a preference for not obtaining

  information, even when it is freely available and potentially useful. The IPS shows

  acceptable test-retest reliability (r = 0.64) and a four-factor structure. Information

  preferences measured by the IPS predict actual information acquisition decisions.

  '
abstract_source: full_text
abstract_fetched: '2026-02-04'
structural_characteristics:
  S1_research_question:
    available: true
    questions:
    - Can individual differences in information preferences be reliably measured?
    - How prevalent is information avoidance across different domains?
    - Do information preferences predict actual information acquisition behavior?
    - What is the factor structure of information preferences?
    - Are information preferences stable over time (trait-like)?
    clarity: high
  S2_methodology:
    available: true
    approach: experimental_psychometric
    methods:
    - Scale development (45 initial items → 13 final)
    - Exploratory Factor Analysis (Study 1)
    - Confirmatory Factor Analysis (Study 2)
    - Test-retest reliability (2-week interval)
    - Behavioral validation task (Study 3)
    - Convergent and discriminant validity testing
    key_definitions:
    - 'Information Preferences Scale (IPS): 13-item scale measuring desire for information'
    - 'Information avoidance: Preference for NOT obtaining free, relevant information'
    - 'Four domains: Health, Financial, Personal Characteristics, General'
    - 'Information acquisition: Binary choice to obtain or not obtain information'
  S3_sample_data:
    available: true
    type: experimental
    empirical_data: true
    sample_characteristics:
    - 'Study 1: n = 802 (Amazon MTurk)'
    - 'Study 2: n = 1,012 (Prolific Academic)'
    - 'Study 2 retest: n = 245 (2-week interval)'
    - 'Study 3: n = 604 (MTurk)'
    - 'Total: n > 2,400 participants'
    - US participants, diverse demographics
    - 'Mean age: 35-38 years across studies'
    - 'Gender: ~50% female'
    descriptive_statistics:
