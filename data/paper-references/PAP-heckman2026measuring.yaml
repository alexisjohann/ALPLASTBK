paper: heckman2026measuring
superkey: PAP-heckman2026measuring
title: Measuring the Growth of Skills
author: Heckman, James J. and Tian, Haihan and Zhang, Zijian and Zhou, Jin
year: '2026'
publication_type: working_paper
doi: 10.3386/w34737
abstract: This paper discusses a fundamental problem in measuring the growth of knowledge
  and comparing the skills of people. New skills emerge that are not just more of
  the previously acquired skills. Psychometric convention forces these skills into
  arbitrarily constructed scales, which can severely distort measurement. To formally
  address this problem, we measure skills using a novel measurement scheme, estimate
  a stochastic learning process and reject the common scale assumption across levels
  for language and cognitive skills. Furthermore, we estimate dynamic complementarity
  without imposing arbitrary scales for skills.},   % === EVIDENCE CLASSIFICATION
  (METHOD-EVIDENCE) ===   evidence_tier = {2
abstract_source: bibtex
url: https://www.nber.org/papers/w34737
analysis_status: complete
analysis_date: '2026-01-30'
analysis_depth: Level 4 - THEORY
full_text_available: true
full_text_path: papers/evaluated/integrated/PAP-heckman2026measuring.txt
theory_catalog_entry: MS-SF-002
theory_catalog_category: CAT-19
core_contribution: 'Demonstrates that skills do not evolve as higher levels of fixed
  abilities.

  New skills EMERGE with development - qualitatively different from earlier skills.

  Standard psychometric scales distort measurement of both levels and growth.

  Provides scale-free test of dynamic complementarity using time-to-mastery.

  '
key_concepts:
- id: KC-01
  name: Skill Emergence
  definition: New skills emerge at each developmental level; not just 'more of the
    same'
  ebf_relevance: Skills are not fixed dimensions - they are context/age-dependent
- id: KC-02
  name: Ordinal vs Cardinal
  definition: Test scores are at best ordinal; different normalizations yield different
    rankings
  ebf_relevance: EBF parameters should not assume cardinal psychometric scales
- id: KC-03
  name: Technology of Skill Formation
  definition: K(a+1) = f(a)(K(a), I(a)) - multistage production function
  ebf_relevance: Foundation for understanding complementarity in EBF
- id: KC-04
  name: Dynamic Complementarity (Scale-Free)
  definition: ∂²K(a+j+1)/∂I(a)∂I'(a+j) > 0 - testable without common scale
  ebf_relevance: γ (complementarity) can be estimated without psychometric fiat
- id: KC-05
  name: Fadeout Explanation
  definition: Apparent fadeout is artifact of measuring different skills over time
  ebf_relevance: Critical for intervention evaluation - fadeout may not be real
- id: KC-06
  name: Time to First Mastery
  definition: Scale-free measure of learning speed within difficulty levels
  ebf_relevance: Alternative to psychometric scales for parameter estimation
technology:
  equation: K(a+1) = f(a)(K(a), I(a))
  components:
    K_a_plus_1: Vector of skills at age a+1
    K_a: Vector of skills at age a
    I_a: Investment at age a (parenting, schools, etc.)
    f_a: Age-specific production function
  note: K at different ages need NOT be measured in same units
dynamic_complementarity:
  definition: Investment at age a raises productivity of later investment
  formula: ∂²K(a+j+1)/∂I(a)∂I'(a+j) > 0
  key_insight: Does NOT require assumption that K is measured in same units across
    ages
scale_free_test:
  method: Time to first mastery within UHP difficulty levels
  measure: d(s,ℓ) = number of trials to first success at level ℓ
  data_source: China REACH home-visiting program
  findings:
  - level: UHP Language Level 8
    full_exposure: 2.079
    late_enrollment: 2.367
    p_value: 0.024
  - level: UHP Language Level 9
    full_exposure: 1.496
    late_enrollment: 1.686
    p_value: 0.017
  - level: UHP Language Level 11
    full_exposure: 1.348
    late_enrollment: 1.698
    p_value: 0.0
  interpretation: Children with early investment learn faster at later levels
uhp_levels:
  source: Uzgiris-Hunt (1975), Palmer (1971)
  language_levels: 11
  cognitive_levels: multiple
  fine_motor_levels: multiple
  structure: 'Within levels: tasks are essentially identical (no hierarchy)

    Across levels: increasing difficulty, qualitatively different skills

    '
  language_level_content:
    level_1: Caregiver and child make sounds to interact
    level_2: Caregiver tells child about household activities
    level_3: Child recognizes people's names
    level_4: Child learns movements (clapping, bye-bye, thank you)
    level_5: Look at pictures together, child vocalizes
    level_6: Child recognizes at least one body part
    level_7: Child identifies/names ordinary objects
    level_8: Child points to named pictures, names 1+ pictures
    level_9: Child points to named pictures, names 2+ pictures
    level_10: Child points at 7+ pictures, talks about them
    level_11: Child learns descriptive words, names objects, tells usage
fadeout:
  traditional_view: Treatment effects decay over time
  new_explanation: 'Fadeout is artifact of comparing incomparable skills across ages.

    New skills emerge at each level - measuring "same skill" is impossible.

    Pattern: rise, decline, recovery within levels (stochastic process).

    '
  mechanism: Variance of shocks differs across levels
  implication: Long-term evaluations using common scale are problematic
data:
  program: China REACH
  organization: China Development Research Foundation (CDRF)
  intervention: Home-visiting for early childhood development
  frequency: Weekly visits, 1 hour each
  skills_measured:
  - Language
  - Cognitive
  - Fine Motor
  - Social-Emotional
  findings:
    language_cognitive: Dynamic complementarity confirmed
    fine_motor: No evidence of dynamic complementarity
    catch_up: Low-ability children can partially close gap with high-ability
ebf_integration:
  10c_mapping:
    CORE_HOW:
      relevance: high
      connection: Dynamic complementarity = γ in EBF
    CORE_WHAT:
      relevance: high
      connection: Skills as utility dimensions (emergence)
    CORE_WHEN:
      relevance: high
      connection: Age-specific skills = context-dependence
    CORE_WHERE:
      relevance: high
      connection: Parameter estimation methodology
  parameter_implications:
    complementarity_gamma:
      issue: Standard estimation assumes common scale
      solution: Use time-to-mastery or within-level comparisons
    loss_aversion_lambda:
      issue: May be affected by ordinal measurement issues
      solution: Consider scale-free tests where possible
    discount_factor_beta:
      issue: Less affected (typically ratio-based)
      solution: Validate against scale-free benchmarks
  llmmc_implications:
  - LLMMC priors should not assume cardinal test scores
  - Consider uncertainty about scale transformations
  - Use within-level comparisons where available
