abstract: 'The economics of organizations is replete with the pitfalls of monetary rewards and punishments to motivate workers.
  If economic incentives do not work, what does? This paper proposes that workers'' self-image as jobholders, coupled with
  their ideal as to how their job should be done, can be a major work incentive. It shows how such identities can flatten
  reward schedules, as they solve “principal agent” problem. The paper also identifies and explores a new tradeoff: supervisors
  may provide information to principals, but create rifts within the workforce and reduce employees'' intrinsic work incentives.
  We motivate the theory with examples from the classic sociology of military and civilian organizations.'
