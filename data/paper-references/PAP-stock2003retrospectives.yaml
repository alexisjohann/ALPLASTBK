abstract: The instrumental variables estimator first appeared explicitly in Appendix B of The Tariff on Animal and Vegetable
  Oils by Philip G. Wright (1928). It has been suggested that this appendix was written by Philip's son Sewall Wright, then
  already an important genetic statistician. To find out who wrote Appendix B, we use stylometric statistics to compare it
  to other texts known to have been written solely by the father and son. The sharp results are consistent with contextual
  and historical evidence on the authorship of Appendix B and on the origination of the idea of IV estimation.
