    - WHAT (C): Neural basis of social preferences

    - HOW (B): Brain-behavior mapping


    THEORY SUPPORT:

    - Foundational neuroeconomics review

    - Published in JEL

    - Links neuroscience to economics


    KEY INSIGHT:

    Social preferences have specific neural substrates; neuroeconomics provides

    biological microfoundations for behavioral economics.'
