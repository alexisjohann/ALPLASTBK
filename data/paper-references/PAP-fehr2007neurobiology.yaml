summary:
  abstract_extended: 'This paper reviews the emerging field of social neuroeconomics - the study

    of how neural processes underlie social and economic decision-making.

    We examine brain regions involved in trust, fairness, cooperation, and

    punishment. Understanding the neural basis of social behavior provides

    new foundations for economic theory.'
  key_findings: "1. NEURAL BASIS OF TRUST\n   - Prefrontal cortex involvement\n   - Oxytocin effects\n   - Betrayal responses\n\
    \n2. FAIRNESS AND THE BRAIN\n   - Anterior insula activated by unfairness\n   - Emotional responses automatic\n   - Cognitive\
    \ control modulates responses\n\n3. COOPERATION CIRCUITS\n   - Reward systems activated\n   - Social utility represented\n\
    \   - Strategic thinking regions\n\n4. PUNISHMENT PROCESSING\n   - Dorsal striatum activation\n   - Satisfying punishment\n\
    \   - Costly punishment rewarding"
  ebf_relevance: '10C DIMENSIONS:

