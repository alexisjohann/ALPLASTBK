abstract: Occasional widely publicized controversies have led to the perception that growth statistics from developing countries
  are not to be trusted. Based on the comparison of several data sources and analysis of novel IMF audit data, we find no
  support for the view that growth is on average measured less accurately or manipulated more in developing than in developed
  countries. While developing countries face many challenges in measuring growth, so do higher-income countries, especially
  those with complex and sometimes rapidly changing economic structures. However, we find consistently higher dispersion of
  growth estimates from developing countries, lending support to the view that classical measurement error is more problematic
  in poorer countries and that a few outliers may have had a disproportionate effect on (mis)measurement perceptions. We identify
  several measurement challenges that are specific to poorer countries, namely limited statistical capacity, the use of outdated
  data and methods, the large share of the agricultural sector, the informal economy, and limited price data. We show that
  growth measurement based on the System of National Accounts (SNA) can be improved if supplemented with information from
  other data sources (for example, satellite-based data on vegetation yields) that address some of the limitations of SNA.
