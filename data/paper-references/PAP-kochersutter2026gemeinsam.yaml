abstract: |
  Kooperation und Vertrauen sind die Grundlagen für den Erfolg in Wirtschaft, Politik
  und Arbeitsleben. Martin G. Kocher und Matthias Sutter fassen die wichtigsten
  Erkenntnisse der experimentellen Wirtschaftsforschung zu Kooperation und Vertrauen
  zusammen und leiten daraus praktische Empfehlungen ab. Das Buch behandelt:
  Grundlagen der Kooperation (Kap. 1), Vertrauen und Vertrauenswürdigkeit (Kap. 2),
  Führung und Kooperation (Kap. 3), Institutionen und Kooperation (Kap. 4), sowie
  zehn Thesen zur Kooperation (Kap. 5).

key_findings_structured:
  S1_research_question: "How do cooperation and trust function as keys to success in business, politics, and work? What does experimental evidence tell us?"
  S2_methodology: "Popular science synthesis of experimental economics research (lab and field experiments, trust games, public goods games)"
  S3_sample_data: "Synthesis drawing on hundreds of experimental studies by the authors and colleagues"
  S4_findings:
    - finding: "Cooperation is natural but conditional - most people cooperate if others do too"
      source_section: "Kapitel 1"
      formal_result: "Evidence from public goods experiments shows conditional cooperation as dominant type"
    - finding: "Trust and trustworthiness are distinct: trust can be built through institutions and repeated interaction"
      source_section: "Kapitel 2"
      formal_result: "Trust game evidence distinguishes trust from trustworthiness; both are trainable"
    - finding: "Leaders play a crucial role: trust first, then punish non-cooperators (CC Strategy)"
      source_section: "Kapitel 3"
      formal_result: "Evidence for Kosfeld's CC Strategy: trust + punish + attract cooperative types"
    - finding: "Institutions shape cooperation: well-designed rules can sustain cooperation even among self-interested individuals"
      source_section: "Kapitel 4"
      formal_result: "Institutional design (sanctions, monitoring, communication) sustains cooperation"
  S5_validity: "Synthesizes extensive experimental evidence from top journals. Authors are leading researchers in the field."
  S6_reproducibility: "References to original experimental studies provided in Literaturverzeichnis and Endnoten."

