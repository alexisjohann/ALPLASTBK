abstract: African states that came to independence by the late 1960s made a rapid transition to authoritarian rule during
  a period of reasonably robust growth. Growth then faltered badly from the mid-1970s to the mid-1990s as these regimes coped
  with external shocks and varying degrees of fiscal crisis. Leading critics embed Africa's slow growth in failures of governance
  associated with “weak” authoritarian rule. These provide important insights into policy patterns while suggesting the growth-promoting
  potential of Africa's recent Democratization.
