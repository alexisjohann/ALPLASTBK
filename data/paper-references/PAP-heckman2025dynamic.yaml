core_contribution: 'First rigorous decomposition of dynamic complementarity into three

  measurable components: Productivity P(a), Transmission Q(a+j), and

  Static Complementarity f₁,₂(a). Shows that:

  ∂²K(a+j+1)/∂I(a)∂I''(a+j) = P(a)·Q(a+j)·f₁,₂(a+j)


  Enables testing dynamic complementarity without imposing arbitrary

  psychometric scales. Demonstrates catch-up effects: low-ability

  children benefit MOST from early investment.

  '
key_concepts:
- id: KC-01
  name: Dynamic Complementarity Decomposition
  definition: ∂²K/∂I(a)∂I'(a+j) = P(a)·Q(a+j)·f₁,₂(a+j)
  ebf_relevance: Operationalizes γ into three estimable components
- id: KC-02
  name: Productivity P(a)
  definition: P(a) = f₁(a) = ∂K(a+1)/∂K(a) - marginal product of past skills
  ebf_relevance: How much do accumulated skills boost current production?
- id: KC-03
  name: Transmission Q(a+j)
  definition: Q(a+j) = Π_{m=0}^{j-1} f₁(a+m) - cumulative skill propagation
  ebf_relevance: 'Self-productivity: how skills transmit across developmental stages'
- id: KC-04
  name: Static Complementarity f₁,₂(a)
  definition: f₁,₂(a) = ∂²K(a+1)/∂K(a)∂I'(a) - cross-partial
  ebf_relevance: Skills × Investment interaction at single point in time
- id: KC-05
  name: Catch-Up Effect
  definition: Low-ability children show largest gains from early investment
  ebf_relevance: 'Heterogeneous γ: targeting disadvantaged maximizes returns'
- id: KC-06
  name: Domain-Specific Complementarity
  definition: Dynamic complementarity confirmed for language/cognitive, NOT fine motor
  ebf_relevance: γ varies by skill domain - not universal
