summary:
  abstract_extended: "This paper provides a rigorous decomposition of dynamic complementarity\
    \ in human\ncapital formation into three distinct components:\n\n1. PRODUCTIVITY\
    \ P(a) - The marginal product of accumulated skills\n2. TRANSMISSION Q(a+j) -\
    \ How skills propagate across developmental stages\n3. STATIC COMPLEMENTARITY\
    \ f₁,₂(a) - The interaction between skills and investment\n\nThe central result:\n\
    \n    ∂²K(a+j+1)\n    ────────────────── = P(a) · Q(a+j) · f₁,₂(a+j)\n    ∂I(a)\
    \ ∂I'(a+j)\n\nThis decomposition enables testing dynamic complementarity WITHOUT\
    \ imposing\narbitrary psychometric scales on skills measured at different ages.\n\
    \nUsing data from China REACH, a large-scale home-visiting program, we demonstrate\n\
    that dynamic complementarity is present in language and cognitive skills, but\n\
    NOT in fine motor skills. Most importantly, we find that LOW-ABILITY children\n\
    benefit MOST from early investment - their learning rates show the largest\nincreases\
    \ from prior skill accumulation."
