abstract: Abstract. We present new data on the regulation of entry of start-up firms
  in 75 countries. The data set contains information on the number of procedures,
  official time, and official cost that a start-up must bear before it can operate
  legally. The official costs of entry are extremely high in most countries. Countries
  with heavier regulation of entry have higher corruption and larger unofficial economies,
  but not better quality of public or private goods. Countries with more democratic
  and limited governments have fewer entry regulations. The evidence is inconsistent
  with Pigouvian (helping hand) theories of benevolent regulation, but support the
  (grabbing hand) view that entry regulation benefits politicians and bureaucrats.
  1
