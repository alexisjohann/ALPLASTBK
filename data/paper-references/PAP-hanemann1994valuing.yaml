abstract: Contingent valuation is now used around the world to value many types of public goods, including transportation,
  sanitation, health, and education, as well as the environment. The author describes how researchers go about making such
  surveys reliable, mentioning recent innovations in sampling, questionnaire design, and data analysis, including formulating
  the valuation as a closed-ended question about voting in a referendum to raise taxes for a particular purpose. He addresses
  various objections that contingent valuation results are incompatible with economic theory. Even without a market, there
  still exists a latent demand curve for nonmarket goods; contingent valuation represents a way to tease this out.
