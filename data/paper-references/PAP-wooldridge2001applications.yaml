abstract: I describe how the method of moments approach to estimation, including the more recent generalized method of moments
  (GMM) theory, can be applied to problems using cross section, time series, and panel data. Method of moments estimators
  can be attractive because in many circumstances they are robust to failures of auxiliary distributional assumptions that
  are not needed to identify key parameters. I conclude that while sophisticated GMM estimators are indispensable for complicated
  estimation problems, it seems unlikely that GMM will provide convincing improvements over ordinary least squares and two-stage
  least squares--by far the most common method of moments estimators used in econometrics--in settings faced most often by
  empirical researchers.
