abstract: 'Introduction d''une definition de consensus social base sur deux restrictions:
  une sur les preferences individuelles et l''autre sur la distribution des preferences.
  Dans ce cas de consensus, une regle de majorite a 64% presente de nombreuses proprietes
  interessantes par opposition aux regles de super-majorite possedant des proprietes
  paradoxales comme les regles electorales americaines'
