abstract: Wie tickt mein Gegenüber? Im Berufsleben ist es entscheidend, mit anderen Menschen "zu können" und ihre typischen
  Verhaltensweisen zu kennen. Das gilt auf allen Hierarchieebenen und in allen Bereichen der Zusammenarbeit und ist die Basis
  für persönlichen und unternehmerischen Erfolg. Dieses Buch präsentiert aktuelle verhaltensökonomische Erkenntnisse, um den
  "menschlichen Faktor" im Berufsleben besser zu verstehen und um ein erfolgreiches Miteinander zu ermöglichen. Es liefert
  eine umfassende Perspektive auf das "große Ganze", indem es analysiert, wie Menschen "ticken", wie sie auf Anreize (monetärer
  oder nicht-monetärer Natur) reagieren und was das für das Miteinander - oder auch Gegeneinander - im Beruf bedeutet. Die
  moderne verhaltensökonomische Forschung ist wie keine andere Forschungsrichtung geeignet, diesen Fragen nachzugehen und
  Antworten zu liefern. Der Autor, laut FAZ-Ranking einer der einflussreichsten Ökonomen Deutschlands, forscht seit 20 Jahren
  im Bereich der Verhaltensökonomie und nimmt Sie mit auf eine Reise, welche Faktoren vom Berufseinstieg bis zur Führungsposition
  für beruflichen Erfolg wichtig sind. - Überraschende Erkenntnisse mit Aha-Effekt - Das Gegenüber verstehen und Stolperfallen
  vermeiden - Wissenschaftlich fundiert, zugleich wohlproportioniert und leicht verständlich.
