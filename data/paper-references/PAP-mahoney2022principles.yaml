abstract: In this article, I offer guidance on how to combine descriptive and model-based empirical analysis within a paper.
  Drawing on examples from three recently published applied microeconomics papers, I argue that it is important to create
  a tight link between the descriptive analysis and the bottom-line deliverable of the model-based analysis, and I try to
  distill some lessons or principles for doing so. I also offer some thoughts on when a paper should start with descriptive
  analysis and then proceed to model-based analysis and when alternative structures may be desirable.
