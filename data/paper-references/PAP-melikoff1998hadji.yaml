abstract: This volume deals with the history of popular religion in Turkey from its origins in the 13th century; the formation
  of the heterodoxies known as Bektashism and Alevism which are characterised by their syncretism and their religious tolerance;
  and the bipartition of these currents, both of which refer to the popular saint Hadji Bektash. This fascinating book analyses
  their beliefs and practices, offers a summary of their rich literature, and treats of the present evolution of these currents,
  their further prospects, and their anthropocentric, inter-denominational and ecumenical character.
