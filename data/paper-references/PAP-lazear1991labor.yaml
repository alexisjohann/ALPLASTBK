abstract: This essay is a discussion of how economists are attempting to understand institutions within the organizations
  of the labor market. The institutions and issues discussed include mandatory retirement; discontinuous jumps in wages; pay
  compression; rights of tenure; up-or-out hierarchies; timing of raises, promotions and evaluations; the existence of partnerships;
  the use of bonuses vs. penalties; and pay as a motivator.
