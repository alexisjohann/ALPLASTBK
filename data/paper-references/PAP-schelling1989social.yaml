abstract: In the various chapters of this book, social mechanisms are contrasted with theories, laws, correlations, and black
  boxes. There is near consensus on a hierarchy that has "mere" correlations at the bottom, with laws higher up. Laws that
  are black boxes (i.e., opaque as to how they work) are, even if fully reliable like the law of gravity, less helpful than
  laws that work transparently. Theories have less status than laws if the laws are well established and the theories not;
  theories built on established laws, like the theory of planetary motion, are at the summit.
