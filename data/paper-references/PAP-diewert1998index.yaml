abstract: 'This paper addresses the following issues: what is an appropriate theoretical consumer price index that statistical
  agencies should attempt to measure; what are some of the possible sources of biases between the fixed base Laspeyres price
  index that statistical agencies produce and the theoretical cost-of-living index; and what factors will make the biases
  larger or smaller and how will the biases change as the general inflation rate changes? This paper addresses all of the
  issues mentioned above and discusses what statistical agencies can do to reduce the biases.'
