abstract: 'as a sum of intuitively measurable and comparable individual cardinal utilities has been found unable to withstand
  the methodological criticism of the Pareto school. Professor Bergson2 has therefore recommended its replacement by the more
  general concept of a social welfare function, defined as an arbitrary mathematical function of economic (and other social)
  variables, of a form freely chosen according to one''s personal ethical (or political) value judgments. Of course, in this
  terminology everybody will have a social welfare function of his own, different from that of everybody else, except to the
  extent to which different individuals'' value judgments happen to coincide with one another. Actually, owing to the prevalence
  of individualistic value judgments in our society, it has been generally agreed that a social welfare function should be
  an increasing function of the utilities of individuals: if a certain situation, X, is preferred by an individual to another
  situation, Y, and if none of the other individ-'
