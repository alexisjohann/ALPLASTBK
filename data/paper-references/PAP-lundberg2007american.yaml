abstract: 'Gary Becker''s path-breaking Treatise on the Family (1981) subjected individuals'' decisions about sex, marriage,
  childbearing, and childrearing to rational choice analysis. The American family has changed radically in recent decades;
  we survey these changes as well as the ongoing effort to understand partnering, parenting, and care of the elderly as results
  of maximizing choices made by individuals. First, we describe the recent changes in the American family: the separation
  of sex, marriage, and childbearing; fewer children and smaller households; converging work and education patterns for men
  and women; class divergence in partnering and parenting strategies; and the replacement of family functions and home production
  by government programs and market transactions. Second, we examine recent work in family economics that attempts to explain
  these changes. Third, we point out some challenging areas for further analysis and highlight issues of commitment in two
  primary family relationships: those between men and women, and those between parents and children. Finally, we consider
  the effectiveness of policies to target benefits to certain family members (for instance, children) or to promote marriage
  and fertility.'
