summary:
  abstract_extended: 'This paper examines how contracts serve as reference points that shape

    behavioral responses. Building on Köszegi-Rabin reference-dependent preferences,

    we show that contracts establish expectations that affect how people respond

    to outcomes. Competition affects contract design through its impact on

    reference points.'
  key_findings: "1. CONTRACTS AS REFERENCE POINTS\n   - Contracts establish expectations\n   - Deviations trigger loss aversion\n\
    \   - Aggrievement affects behavior\n\n2. COMPETITION EFFECTS\n   - Competition shapes outside options\n   - Affects perceived\
    \ fairness\n   - Changes optimal contract design\n\n3. EXPERIMENTAL EVIDENCE\n   - Lab experiments confirm theory\n  \
    \ - Reference effects significant\n   - Behavioral predictions validated"
  ebf_relevance: '10C DIMENSIONS:

    - WHAT (C): Reference-dependent utility

    - HOW (B): Contract-behavior complementarity

    - WHEN (V): Competitive context matters


    THEORY SUPPORT:

    - Reference dependence theory

    - Extends Fehr-Schmidt to contracts

    - Published in REStud


    KEY INSIGHT:

    Contracts serve as reference points that shape behavioral responses;

    competition affects contract design through reference point formation.'
