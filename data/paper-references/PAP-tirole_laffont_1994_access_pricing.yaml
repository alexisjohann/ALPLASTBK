abstract: "In many industries (electricity, telecommunications, railways), the network can be described as a natural monopoly. A central issue is how to combine regulation of the network with organization of competition in activities using the network as input. This paper derives access pricing formulas under optimal regulation with incomplete information, examining how access prices account for network fixed costs and incentive constraints of the natural monopoly."
