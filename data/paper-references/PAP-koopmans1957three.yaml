abstract: This influential book contains three essays on economic methodology and theory. The first essay 'Allocation of Resources
  and the Price System' examines decentralized decision-making and competitive equilibrium using linear algebra and topology.
  The second essay 'The Construction of Economic Knowledge' presents Koopmans' methodological views on theory building in
  economics. The third essay 'The Interaction of Tools and Problems in Economics' demonstrates the effectiveness of mathematical
  tools in formulating economic problems.
