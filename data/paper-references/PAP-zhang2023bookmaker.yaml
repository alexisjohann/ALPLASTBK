abstract: In sports betting markets, bookmakers may take speculative exposures to the game outcomes when they can assess the
  probabilities better than others. We propose a simple model of fixed-odds betting markets in which bookmakers tilt their
  odds to maximize their own speculative profits. They do so by accommodating bettors’ irrationality, thereby reinforcing
  systematic biases in betting markets. In European football betting markets, the Favorite-Longshot Bias and the Hot-Hand
  Bias persist despite the increased competition. This is difficult to explain only by bettors’ irrationality but consistent
  with the predicted odds-setting behavior of bookmakers. We discuss the implications for financial market anomalies.
