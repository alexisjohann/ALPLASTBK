abstract: A key economic indicator is real output. To get this right, we need to measure accurately both the value of nominal
  GDP (done by Bureau of Economic Analaysis) and key price indexes (done mostly by Bureau of Labor Statisticcs). All of us
  have worked on these measurements while at the BLS and the BEA. In this article, we explore some of the thorny statistical
  and conceptual issues related to measuring a dynamic economy. An often-stated concern is that the national economic accounts
  miss some of the value of some goods and services arising from the growing digital economy. We agree that measurement problems
  related to quality changes and new goods have likely caused growth of real output and productivity to be understated. Nevertheless,
  these measurement issues are far from new, and, based on the magnitude and timing of recent changes, we conclude that it
  is unlikely that they can account for the pattern of slower growth in recent years. First we discuss how the Bureau of Labor
  Statistics currently adjusts price indexes to reduce the bias from quality changes and the introduction of new goods, along
  with some alternative methods that have been proposed. We then present estimates of the extent of remaining bias in real
  GDP growth that stem from potential biases in growth of consumption and investment. And we take a look at potential biases
  that could result from challenges in measuring nominal GDP, including those involving the digital economy. Finally, we review
  ongoing work at BLS and BEA to reduce potential biases and further improve measurement.
