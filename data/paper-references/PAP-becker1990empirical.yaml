key_contributions:
- First comprehensive empirical test of rational addiction theory
- Establishes short-run vs long-run price elasticity distinction
- Provides IV strategy using past/future prices as instruments
- Empirically distinguishes rational from myopic addiction
- Estimates addiction reinforcement parameter θ ≈ 0.4-0.5
- Shows long-run elasticity ~2x short-run elasticity
- Confirms intertemporal complementarity (negative cross-price effects)
- Strongly rejects time-separable utility
- Provides framework for testing anticipation effects
- Links monopoly pricing to addictive goods
