paper: becker1990empirical
superkey: PAP-becker1990empirical
title: An Empirical Analysis of Cigarette Addiction
author: Gary S. Becker, Michael Grossman, Kevin M. Murphy
year: '1990'
publication_type: working_paper
institution: National Bureau of Economic Research
series: NBER Working Paper
number: '3322'
month: April
abstract: 'We use a framework suggested by a model of rational addiction to analyze

  empirically the demand for cigarettes. The data consist of per capita

  cigarettes sales (in packs) annually by state for the period 1955 through 1985.

  The empirical results provide support for the implications of a rational

  addiction model that cross price effects are negative (consumption in different

  periods are complements), that long-run price responses exceed short-run

  responses, and that permanent price effects exceed temporary price effects. A

  10 percent permanent increase in the price of cigarettes reduces current

  consumption by 4 percent in the short run and by 7.5 percent in the long run.

  In contrast, a 10 percent increase in the price for only one period decreases

  consumption by only 3 percent. These estimates illustrate the importance of

  the intertemporal linkages in cigarette demand implied by rational addictive

  behavior.

  '
abstract_source: full_text
abstract_fetched: '2026-02-04'
structural_characteristics:
  S1_research_question:
    available: true
    questions:
    - Do cigarette consumers behave rationally in their addictive behavior?
    - Are cross price effects negative (intertemporal complementarity)?
    - Do long-run price responses exceed short-run responses?
    - Do permanent price effects exceed temporary price effects?
    - Can we distinguish rational addiction from myopic addiction empirically?
    clarity: high
  S2_methodology:
    available: true
    approach: empirical_econometric
    methods:
    - State-level panel data analysis (50 states × 31 years)
    - Two-stage least squares (2SLS) with instrumental variables
    - Future and past prices as instruments for future and past consumption
    - Quadratic utility specification yielding linear difference equation
    - Comparison of myopic vs rational addiction models
    key_definitions:
    - 'Addiction: θ > 0 (past consumption increases current consumption)'
    - 'Reinforcement: consumption capital increases marginal utility'
    - 'Myopic addiction: ignores future consequences of current consumption'
    - 'Rational addiction: considers intertemporal effects'
    - 'Short-run elasticity: permanent price change, past consumption fixed'
    - 'Long-run elasticity: permanent price change, all consumption adjusts'
  S3_sample_data:
    available: true
    type: empirical_panel
    empirical_data: true
    sample_characteristics:
    - Per capita cigarette sales (packs) by state, 1955-1985
    - 1,516 observations (50 states + DC × 31 years, minus missing)
    - 'Source: Tobacco Tax Council (1986)'
    - Controls for smuggling (short-distance and long-distance)
    - State excise taxes provide identification
    descriptive_statistics:
      consumption_mean: 124.8
      consumption_sd: 31.96
      price_mean_cents: 29.6
      price_sd: 3.3
      tax_mean_cents: 6.4
      tax_sd: 2.9
      income_mean_hundreds: 29.3
  S4_findings:
    available: true
    key_findings:
    - finding: Short-run price elasticity of cigarette demand
      estimate: -0.4
      se: 0.04
      interpretation: 10% price increase reduces consumption 4% in short run
    - finding: Long-run price elasticity of cigarette demand
      estimate: -0.75
      se: 0.06
      interpretation: 10% price increase reduces consumption 7.5% in long run
    - finding: Long-run/short-run ratio
      estimate: 1.9
      interpretation: Addiction nearly doubles price responsiveness in long run
    - finding: Addiction reinforcement parameter (θ)
      estimate: 0.4-0.5
      interpretation: Past consumption significantly increases current consumption
    - finding: Future consumption coefficient positive and significant
      interpretation: Strongly rejects myopic addiction model
    - finding: Cross-price effect (future price on current consumption)
      estimate: -0.06 to -0.09
      interpretation: Confirms intertemporal complementarity
    - finding: Cross-price effect (past price on current consumption)
      estimate: -0.13 to -0.16
      interpretation: Confirms intertemporal complementarity
    - finding: F-test for myopia (future effects = 0)
      f_statistic: 18.6-21.3
      interpretation: Strongly reject myopic behavior
    - finding: F-test for time-separability
      f_statistic: 615.7-799.2
      interpretation: Strongly reject time-separable utility
  S5_validity:
    available: true
    internal_validity:
    - Instrumental variables strategy addresses endogeneity
    - State fixed effects control for unobserved heterogeneity
    - Time dummies capture health information diffusion
    - Smuggling variables control for cross-border purchases
    - Results robust across multiple instrument sets
    external_validity:
    - 31-year panel provides long-run variation
    - 50 states provide substantial cross-sectional variation
    - Tax variation provides exogenous price variation
    - Results consistent with Chaloupka (1989) micro data
    limitations:
    - Working paper, though later published in Journal of Political Economy
    - Discount factor estimates implausibly low (0.31-0.64)
    - Errors-in-variables bias from imperfect foresight of future prices
    - Sales data may differ from consumption (storage possible)
    - Cannot distinguish heterogeneity from unstable steady states
  S6_reproducibility:
    available: true
    proofs_available: true
    proof_location: Sections II-VII with complete derivations
    data_availability:
      source: Tobacco Tax Council (1986)
      access: Published data, replicable
    model_specification: Complete with functional forms
    assumptions_documented: true
    estimation_details:
    - 2SLS with specified instrument sets
    - State and year fixed effects
    - Standard errors reported for all coefficients
    testable_predictions:
    - Long-run elasticity exceeds short-run elasticity
    - Cross-price effects negative (complementarity)
    - Future consumption affects current consumption (rationality)
    - Anticipated price changes have larger effects than unanticipated
    - Permanent price changes have larger effects than temporary
