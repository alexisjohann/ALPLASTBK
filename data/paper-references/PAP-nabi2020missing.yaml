abstract: Missing data has the potential to affect analyses conducted in all fields
  of\nscientific study, including healthcare, economics, and the social sciences.\nSeveral
  approaches to unbiased inference in the presence of non-ignorable\nmissingness rely
  on the specification of the target distribution and its\nmissingness process as
  a probability distribution that factorizes with respect\nto a directed acyclic graph.
  In this paper, we address the longstanding\nquestion of the characterization of
  models that are identifiable within this\nclass of missing data distributions. We
  provide the first completeness result\nin this field of study -- necessary and sufficient
  graphical conditions under\nwhich, the full data distribution can be recovered from
  the observed data\ndistribution. We then simultaneously address issues that may
  arise due to the\npresence of both missing data and unmeasured confounding, by extending
  these\ngraphical conditions and proofs of completeness, to settings where some\nvariables
  are not just missing, but completely unobserved.\n
