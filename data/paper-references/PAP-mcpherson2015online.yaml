abstract: When two Silicon Valley start-ups, Coursera and Udacity, embarked in 2012 on a bold effort to supply college-level
  courses for free over the Internet to learners worldwide, the notion of the Massively Open Online Course (MOOC) captured
  the nation's attention. Although MOOCs are an interesting experiment with a role to play in the future of higher education,
  they are a surprisingly small part of the online higher education scene. We believe that online education, at least online
  education that begins to take full advantage of the interactivity offered by the web, is still in its infancy. We begin
  by sketching out the several faces of online learning—asynchronous, partially asynchronous, the flipped classroom, and others—as
  well as how the use of online education differs across the spectrum of higher education. We consider how the growth of online
  education will affect cost and convenience, student learning, and the role of faculty and administrators. We argue that
  spread of online education through higher education is likely to be slower than many commenters expect. We hope that online
  education will bring substantial benefits. But less-attractive outcomes are also possible if, for instance, legislators
  use the existence of online education as an excuse for sharp cuts in higher education budgets that lead to lower-quality
  education for many students, at the same time that richer, more-selective schools are using online education as one more
  weapon in the arms race dynamic that is driving costs higher.
