abstract: This paper analyzes how bounded rationality affects monetary and fiscal policy via an empirically relevant enrichment
  of the New Keynesian model. It models agents partial myopia toward distant atypical events using a new microfounded cognitive
  discounting parameter. Compared to the rational model, there is no forward guidance puzzle, the Taylor principle changes,
  the zero lower bound is much less costly, fiscal stimulus is effective, and the model is neo-Fisherian in the long run but
  Keynesian in the short run.
