abstract: Projecting the costs of reducing carbon emissions is extremely important, and exceedingly difficult. Such projections
  are an integral component of cost-benefit analyses of alternative policies in response to climate change. This paper first
  discusses the key dimensions of any projection of the cost of reducing carbon emissions. Then it discusses the projections
  that have been made, including long-, medium- and short-range time horizons. Finally, the conclusion summarizes what we
  know and don't know about the costs of controlling carbon emissions and recommends an agenda for future research.
