abstract: "Frontiers in Group Dynamics was the launch article for Human Relations journal in 1947. Lewin makes a strong case for treating social sciences on the same level with natural sciences. Using metaphors from physics, he explains social phenomena through constructs such as force fields, describing how individuals within a social space interact in measurable ways. The paper introduces the famous three phases of organizational change: unfreezing, moving, and freezing. Lewin's concepts of field theory and action research created new avenues for social and organizational psychology, profoundly impacting the development of work teams and change management."
