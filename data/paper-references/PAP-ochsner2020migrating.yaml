title: Migrating Extremists
author: Ochsner
year: '2020'
publication_type: journal_article
doi: 10.1093/ej/ueaa017
abstract: 'In 1946, nearly half a million Nazi Party members in Austria faced the denazification policy.
  The more punitive Soviet occupation made many of them migrate westwards to the US-occupied zone, where
  denazification was more lenient. Using historical surname analysis (geonomastics), we trace this Nazi
  migration to the present day: descendants of migrants vote disproportionately for the far-right FPÖ.
  This persistent effect is driven by the intergenerational transmission of values.'
