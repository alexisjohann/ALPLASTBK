summary:
  abstract_extended: The Global Preference Survey (GPS) is the first globally representative data set measuring six key economic
    preferences across 80,000 individuals in 76 countries. The six preferences are patience (time preference), risk taking,
    positive reciprocity, negative reciprocity, altruism, and trust. A critical finding is that within-country variation exceeds
    between-country variation for all preferences (88-94% within-country). Preferences vary systematically with age (patience
    decreases, prosociality increases), gender (men more risk-taking, women more altruistic), and cognitive ability. At the
    country level, preferences correlate with biogeographic factors (agricultural suitability), cultural variables (language,
    religion), and economic outcomes (GDP, savings, conflict). The survey measures were experimentally validated against incentivized
    experiments (R² = 0.21-0.52).
  key_findings: "1. WITHIN-COUNTRY DOMINATES: 88-94% of preference variation is within countries,\n   not between countries\n\
    \n2. SIX PREFERENCES MEASURED: Patience, risk, positive/negative reciprocity,\n   altruism, trust - all experimentally\
    \ validated\n\n3. GENDER DIFFERENCES: Largest for risk taking (0.23 SD) and altruism (0.18 SD)\n\n4. AGE EFFECTS: Patience\
    \ and risk decrease with age; prosociality increases\n\n5. DEVELOPMENT CORRELATIONS: Patience (r=0.62) and trust (r=0.54)\
    \ correlate\n   strongly with GDP per capita\n\n6. BIOGEOGRAPHIC ROOTS: Historical agricultural suitability predicts\n\
    \   current patience and trust levels\n\n7. BEHAVIOR PREDICTIONS: Patience predicts savings (+4.1pp), risk predicts\n\
    \   self-employment (+2.8pp)"
