abstract: 'Establishing which collective choices respond best to the values of concerned individuals is a central problem
  in economics, ethics and politics. In order to take these values into account, they must be known, either directly or indirectly.
  Some decision-making processes recognize this explicitly and require citizens to vote, as in political elections, or to
  express their preferences otherwise, as when applying for admission to public universities or internships in hospitals.
  In other cases, the reference to interested individuals is more indi-rect. It is not always clear whether and how decision
  makers integrate the preferences of their constituencies into their calculations, but they cannot be completely insensitive
  to them.

  Knowledge of individual preferences is a primary example of asymmetri-cally distributed private information. In an extreme
  version, we may claim that each individual knows her preferences perfectly, and that nobody else has any information about
  them. Less extremely, it is easy to accept that we all know about our own preferences better than anybody else. There is
  another sense in which information about preferences is private: agents are entitled to hold any opinion, and to sustain
  it as their own, even if others know it is not. Therefore, individual preferences must be the guide to good collective deci-sions,
  but knowledge about them is typically dispersed among individuals, and'
