abstract: The COVID-19 pandemic has catapulted scientific conversations and scientific divisions into the public consciousness.
  Epidemiology and economics have long operated in distinct silos, but the COVID-19 pandemic presents a complex and cross-disciplinary
  problem that impacts all facets of society. Many economists have recognized this and want to engage in efforts to mitigate
  and control the pandemic, but others seem more interested in attacking epidemiology than attacking the virus. As an epidemiologist,
  I call upon economists to join with us in combating COVID-19 and in preventing future pandemics. In this essay, I attempt
  to provide some insight for economists into how epidemiology works, where it doesn’t work, and the much-needed answers that
  economists can help us obtain. I hope this will spur economists towards an epidemic-related economics that can provide a
  blueprint for a healthy economy and population.
