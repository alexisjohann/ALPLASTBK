abstract: A theory of norms and normality is presented and applied to some phenomena of emotional responses, social judgment,
  and conversations about causes. Norms are assumed to be constructed ad hoc by recruiting specific representations. Category
  norms are derived by recruiting exemplars. Specific objects or events generate their own norms by retrieval of similar experiences
  stored in memory or by construction of counterfactual alternatives. The normality of a stimulus is evaluated by comparing
  it to the norms that it evokes after the fact, rather than to precomputed expectations. Norm theory is applied in analyses
  of the enhanced emotional response to events that have abnormal causes, of the generation of predictions and inferences
  from observations of behavior, and of the role of norms in causal questions and answers. This article is concerned with
  category norms that represent knowledge of concepts and with stimulus norms that govern comparative judgments and designate
  experiences as surprising. In the tradition of adaptation level theory (Appley, 1971; Helson, 1964), the concept of norm
  is applied to events that range in complexity from single visual displays to social interactions. We first propose a model
  of an activation process that produces norms, then explore the role of norms in social cognition. The central idea of the
  present treatment is that norms are computed after the event rather than in advance. We sketch a supplement to the generally
  accepted idea that events in the stream of experience are interpreted and evaluated by consulting precomputed schemas and
  frames of reference. The view developed here is that each stimulus selectively recruits its own alternatives (Garner, 1962,
  1970) and is interpreted in a rich context of remembered and constructed representations of what it could have been, might
  have been, or should have been. Thus, each event brings its own frame of reference into being. We also explore the idea
  that knowledge of categories (e.g., encounters with Jim) can be derived on-line by selectively evoking stored representations
  of discrete episodes and exemplars. The present model assumes that a number of representations can be recruited in parallel,
