abstract: 'Recent technological advances and a widening of the wage structure have led many to conclude that technology and
  human capital are relative complements. The possibility that such a relationship exists today has prompted a widely held
  conjecture that technology and skill have always been relative complements. According to this view, technological advance
  always serves to widen the wage structure, and only large injections of education slow its relentless course. A related
  literature demonstrates that capital and skill are relative complements today and in the recent past (Zvi Griliches, 1969).
  Thus capital deepening appears also to have increased the relative demand for the educated, serving further to stretch the
  wage structure. Physical capital and technology are now regarded as the relative complements of human capital, but have
  they been so for the past two centuries? Some answers have already been provided. A literature has emerged on the bias to
  technological change across history that challenges the view that physical capital and human capital have always been relative
  complements. Many of the major technological advances of the 19th century substituted physical capital, raw materials, and
  unskilled labor for highly skilled artisans (John A. James and Jonathan S. Skinner, 1985). But if physical capital and human
  skill were not always relative complements, when did they become so, and when did new technology become skilled labor''s
  complement?

  We argue that capital-skill complementarity was manifested in the aggregate economy as particular technologies spread, specifically
  batch and continuous-process methods of production. Across the past two centuries, manufacturing shifted first from artisanal
  to mechanized and nonmechanized factory production, then from simple factories to assembly lines, and finally from assembly
  lines to continuous and batch processes. Although few products were manufactured by more than two of the technologies mentioned,
  manufacturing, as a whole, progressed in the fashion described.'
