abstract: 'The way a choice is presented influences what a decision-maker chooses. This paper outlines the tools available
  to choice architects, that is anyone who present people with choices. We divide these tools into two categories: those used
  in structuring the choice task and those used in describing the choice options. Tools for structuring the choice task address
  the idea of what to present to decision-makers, and tools for describing the choice options address the idea of how to present
  it. We discuss implementation issues in using choice architecture tools, including individual differences and errors in
  evaluation of choice outcomes. Finally, this paper presents a few applications that illustrate the positive effect choice
  architecture can have on real-world decisions.'
