summary:
  abstract_extended: 'This paper provides strong evidence challenging the self-interest assumption

    that dominates the behavioral sciences and much evolutionary thinking.


    The evidence indicates that many people have a tendency to voluntarily

    cooperate, if treated fairly, and to punish noncooperators. The authors call

    this behavioral propensity "strong reciprocity" and show empirically that it

    can lead to almost universal cooperation in circumstances in which purely

    self-interested behavior would cause a complete breakdown of cooperation.


    In addition, they show that people are willing to punish those who behaved

    unfairly towards a third person or who defected in a Prisoner''s Dilemma game

    with a third person. This suggests that strong reciprocity is a powerful

    device for the enforcement of social norms involving food sharing or

    collective action.


    Strong reciprocity cannot be rationalized as an adaptive trait by the leading

    evolutionary theories of human cooperation (kin selection, reciprocal altruism,

    indirect reciprocity, and costly signaling theory). However, multilevel

    selection theories of cultural evolution are consistent with strong reciprocity.'
  key_findings: "1. STRONG RECIPROCITY DEFINED: Tendency to cooperate if treated fairly AND\n   punish non-cooperators - even\
    \ at personal cost\n\n2. COOPERATION EMERGENCE: Strong reciprocity can lead to near-universal\n   cooperation where pure\
    \ self-interest would cause breakdown\n\n3. THIRD-PARTY PUNISHMENT: People punish defectors even when they themselves\n\
    \   were not the victim\n\n4. SOCIAL NORM ENFORCEMENT: Strong reciprocity is a mechanism for enforcing\n   norms (food\
    \ sharing, collective action)\n\n5. EVOLUTIONARY PUZZLE: Cannot be explained by kin selection, reciprocal\n   altruism,\
    \ or costly signaling\n\n6. CULTURAL EVOLUTION: Consistent with multilevel selection theories"
