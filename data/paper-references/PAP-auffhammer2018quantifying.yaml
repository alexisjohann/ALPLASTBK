abstract: 'Climate scientists have spent billions of dollars and eons of supercomputer time studying how increased concentrations
  of greenhouse gases and changes in the reflectivity of the earth’s surface affect dimensions of the climate system relevant
  to human society: surface temperature, precipitation, humidity, and sea levels. Recent incarnations of physical climate
  models have become sophisticated enough to be able to simulate intensities and frequencies of some extreme events, like
  tropical storms, under different warming scenarios. In a stark juxtaposition, the efforts involved in and the public resources
  targeted at understanding how these physical changes translate into economic impacts are disproportionately smaller, with
  most of the major models being developed and maintained with little to no public funding support. The goal of this paper
  is first to shed light on how (mostly) economists have gone about calculating the “social cost of carbon” for regulatory
  purposes and to provide an overview of the past and currently used estimates. In the second part, I will focus on where
  empirical economists may have the highest value added in this enterprise: specifically, the calibration and estimation of
  economic damage functions, which map weather patterns transformed by climate change into economic benefits and damages.
  A broad variety of econometric methods have recently been used to parameterize the dose (climate) response (economic outcome)
  functions. The paper seeks to provide an accessible and comprehensive overview of how economists think about parameterizing
  damage functions and quantifying the economic damages of climate change.'
