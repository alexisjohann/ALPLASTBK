abstract: A reflection of the economics profession through Paul Samuelson's Economics. Samuelson offers an uneasy mix of laissez
  faire in micro and government interventionism in macro. In earlier editions, Keynesian thinking dominated, with an antisaving,
  progovernment bias and a need for an activist fiscal policy aimed at alleviating unpredictable chronic business cycles under
  private enterprise. Middle editions had chapters on the Soviet Union and China, rather than Japan and West Germany. Recently,
  Samuelson and coauthor William Nordhaus have gradually shifted from antithrift to prosavings policies, from deficit spending
  to fiscal restraint, and from fiscal policy to monetary policy as effective countercyclical tools.
