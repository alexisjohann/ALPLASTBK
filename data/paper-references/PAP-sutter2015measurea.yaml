abstract: 'Abstract We measure time preferences in a sample of 561 children aged 7–11 years. Using a within-subject design,
  we compare the behavior of our subjects using two distinct experimental measures of time preferences: a standard choice
  list with multiple decisions and a single choice time-investment-exercise requiring one decision only. We find that both
  measures yield very similar aggregate results, correlate significantly within subjects and can be explained by basically
  the same explanatory variables. Advantages and disadvantages of both measures are discussed. Our findings are relevant for
  the design of experiments to measure time preferences.'
