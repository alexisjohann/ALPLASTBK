abstract: 'This paper summarizes the research contributions of Lawrence Summers, who was awarded the 1993 John Bates Clark
  Medal by the American Economic Association. It focuses on research in four subfields of economics: public finance, labor
  economies, financial economies, and macroeconomics. The paper describes the substantive importance and impact of Summers''s
  research in each area, as well as the general research style and strategy that runs through his work.'
