summary:
  abstract_extended: 'This paper presents a comprehensive theory of strong reciprocity and its role

    in human cooperation. Strong reciprocators cooperate in one-shot interactions

    and punish norm violators at personal cost. We review experimental evidence

    showing that strong reciprocity is key to understanding the enforcement of

    social norms and the evolution of human cooperation.'
  key_findings: "1. STRONG RECIPROCITY DEFINED\n   - Cooperation in one-shot games\n   - Punishment of defectors\n   - Costly\
    \ to the punisher\n\n2. NORM ENFORCEMENT\n   - Decentralized punishment works\n   - No central authority needed\n   -\
    \ Self-sustaining equilibria\n\n3. EXPERIMENTAL EVIDENCE\n   - Public goods games\n   - Third-party punishment\n   - Cross-cultural\
    \ validity\n\n4. EVOLUTIONARY BASIS\n   - Not explained by self-interest\n   - Cultural group selection\n   - Gene-culture\
    \ coevolution"
  ebf_relevance: '10C DIMENSIONS:

    - WHAT (C): Strong reciprocity preferences

    - HOW (B): Cooperation-punishment complementarity

    - WHEN (V): One-shot vs repeated interactions


    THEORY SUPPORT:

    - MS-SR-001: Strong Reciprocity (comprehensive overview)

    - Integrates theory and evidence

    - Foundation for social norms research


    KEY INSIGHT:

    Strong reciprocity - costly cooperation and punishment - is a fundamental

    human motivation that enables large-scale cooperation.'
