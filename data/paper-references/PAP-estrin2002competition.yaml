abstract: This paper examines the elements of institutional development critical to the enhancement of company performance
  in transition economies. This includes initial conditions, forms of privatization, institutional frameworks and the competitiveness
  of markets. Comparing empirical evidence, the paper concludes that there is a clear distinction in effectiveness of policies
  followed and their impact between Central Europe and CIS countries. This divergence is attributed to fundamentally different
  political attitudes toward reform, the need of CIS governments to gain political support for reform and as a consequence
  of the desire of Central European countries to join European Union.
