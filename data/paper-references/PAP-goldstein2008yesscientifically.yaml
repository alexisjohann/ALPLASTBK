abstract: This book presents 50 strategies for persuasion and influence based on over sixty years of research into the psychology
  of persuasion. Co-authored by Noah Goldstein, Steve Martin, and Robert Cialdini, it explores six universal principles of
  social influence - reciprocation, authority, commitment/consistency, social proof, liking, and scarcity. Each chapter (3-4
  pages) provides a concise persuasion tip with practical applications. Examples include how a restaurant reduced no-shows
  from 30% to 10% by changing 'please call to cancel' to 'will you call if you need to cancel?' The book demonstrates that
  showing how similar people behave well is more effective than highlighting bad behavior.
