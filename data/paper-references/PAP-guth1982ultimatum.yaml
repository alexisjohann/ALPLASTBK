abstract: There are many experimental studies of bargaining behavior, but suprisingly
  enough nearly no attempt has been made to investigate the so-called ultimatum bargaining
  behavior experimentally. The special property of ultimatum bargaining games is that
  on every stage of the bargaining process only one player has to decide and that
  before the last stage the set of outcomes is already restricted to only two results.
  To make the ultimatum aspect obvious we concentrated on situations with two players
