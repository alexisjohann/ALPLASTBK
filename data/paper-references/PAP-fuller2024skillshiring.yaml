abstract: >
  Harvard Business School and Burning Glass Institute analysis of 11,000+ job postings at US firms
  from 2014 to 2023. Found that skills-based hiring rhetoric far exceeds reality: degree requirement
  removal led to only 3.5 percentage point increase in non-degree hires -- fewer than 1 in 700 new
  hires actually benefited. 45% of employers classified as "In Name Only" (changed words not actions).
  However, where it works, non-degree hires have 10 percentage point higher retention. Most rigorous
  study in the SBO literature using actual hiring data rather than self-reports.
