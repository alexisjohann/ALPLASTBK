abstract: We introduce a two-person beauty contest game with a unique Nash equilibrium
  that is identical to the game with many players. However, iterative reasoning is
  unnecessary in the two-person game as choosing zero is a weakly dominant strategy.
  Despite this “easier” solution concept, we find that a large majority of players
  do not choose zero. This is the case even with a sophisticated subject pool.
