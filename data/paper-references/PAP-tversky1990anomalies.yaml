abstract: The preference reversal phenomenon has been established in numerous studies during the last two decades, but its
  causes have only recently been uncovered. This phenomenon, or cluster of phenomena, challenges the traditional assumption
  that the decisionmaker has a fixed preference order that is captured accurately by any reliable elicitation procedure. If
  option A is priced higher than option B, we cannot always assume that A is preferred to B in a direct comparison. The evidence
  shows that different methods of elicitation could change the relative weighting of the attributes and give rise to different
  orderings.
