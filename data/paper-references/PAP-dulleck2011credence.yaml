summary:
  abstract_extended: 'Credence goods markets are characterized by asymmetric information between

    sellers and consumers that may give rise to inefficiencies, such as under- and

    overtreatment or market breakdown.


    We study in a large experiment with 936 participants the determinants for

    efficiency in credence goods markets. While theory predicts that liability or

    verifiability yield efficiency, we find that liability has a crucial, but

    verifiability at best a minor, effect.


    Allowing sellers to build up reputation has little influence, as predicted.

    Seller competition drives down prices and yields maximal trade, but does not

    lead to higher efficiency as long as liability is violated.'
  key_findings: '- Liability is CRUCIAL for efficiency in credence goods markets

    - Verifiability has only MINOR effects (contrary to some theoretical predictions)

    - Reputation building has LITTLE influence on market efficiency

    - Competition drives down prices and increases trade volume

    - Competition does NOT improve efficiency without liability

    - N = 936 participants (large-scale experiment)'
