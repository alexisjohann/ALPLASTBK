abstract: >
  World Economic Forum biennial survey on workforce skills and job transformation. 44% of worker
  skills expected to be disrupted in next 5 years (up from 35% in 2016). Analytical thinking is
  top core skill (9.1% of core skills), followed by creative thinking. Self-efficacy skills
  (resilience, flexibility, curiosity) rank highly. Two-thirds of priority skills are
  Skills/Knowledge/Abilities, one-third Attitudes. Uses WEF Global Skills Taxonomy with global
  employer survey across industries and countries.
