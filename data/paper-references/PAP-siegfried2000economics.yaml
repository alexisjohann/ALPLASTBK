abstract: Since the 1950s, taxpayers have been the primary investors in stadia built for the use of privately-owned professional
  sports teams. Team owners have argued that sports facilities boost local economic activity; however, economic reasoning
  and empirical evidence suggest the opposite. Public support for stadia is also driven by demand for community image, and
  owners of sports teams supply a scarce input into image enhancement--participation in the major league--for which they have
  been able to extract monopoly rents from dispersed taxpayers. We suggest reforms to dissipate the monopoly sports leagues
  exercise when negotiating with host communities for their teams.
