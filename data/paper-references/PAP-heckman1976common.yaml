  This paper presents a unified sunimary of statistical models for sample selection, truncation and limited dependent variables.
  The bias that arises from using least squares when such models apply is characterized as a simple specification error or
  omitted variable problem. A computationally simple estimator applicable to such models is proposed that amounts to estimating
  the omitted variable and using least squares including the estimated omitted variable as a regressor. The estimator discussed
  in this paper is not new. A grouped dataversion of it appears in papers on sample selection bias by Gronau (1974) and Lewis
  (1974). This paper extends the analysis in those papers by developing the statistical properties of the estimator and demonstrating
  that the method is applicable to a wider class of models, and a more varied class of empirical settings, than the original
  papers consider.'
