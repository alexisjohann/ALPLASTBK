abstract: This paper outlines resources for economists on the Internet, the large and very rapidly expanding computer network
  that is revolutionizing research in many fields. Even at this early stage, there are a number of very useful resources (such
  as large databases and mailing lists) for economists. Directions are given on how to retrieve the complete and current list
  of resources for economists, and the paper also contains a minimal set of directions on how to use the Internet. References
  are also given to more detailed general guides on the Internet.
