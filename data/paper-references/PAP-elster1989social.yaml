abstract: One of the most persistent cleavages in the social sciences is the opposition between two lines of thought conveniently
  associated with Adam Smith and Emile Durkheim, between homo economicus and homo sociologicus. Of these, the former is supposed
  to be guided by instrumental rationality, while the behavior of the latter is dictated by social norms. In this paper I
  characterize this contrast more fully, and discuss attempts by economists to reduce normoriented action to some type of
  optimizing behavior. Social norms, as I understand them here, are emotional and behavioral propensities of individuals.
  Are norms rationalizations of self-interest? Are norms followed out of self-interest? Do norms exist to promote self-interest?
  Do norms exist to promote common interests? Do norms exist to promote genetic fitness?
