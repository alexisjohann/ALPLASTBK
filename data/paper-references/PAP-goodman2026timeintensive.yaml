title: Consumer Demand and Market Competition with Time-Intensive Goods
author: Goodman
year: '2026'
publication_type: working_paper
doi: 10.3386/w34743
abstract: We leverage Beckers time allocation theory to examine consumer demand and market competition
  for time-intensive goods. The Beckerian model predicts higher diversion ratios for goods with substantial
  time shares and those with high time costs relative to monetary prices. Applying this model to data
  from two field experiments, we analyze demand for Facebook and Instagram, focusing on substitution patterns
  across online activities and offline time use. Our findings indicate that users exhibit low elasticity
  to ad load, the primary user cost, and that time shares and time costs significantly influence diversion
  ratios. We explore the implications for user costs and benefits on these platforms and assess the potential
  impact of a Federal Trade Commission-proposed de-merger of Facebook and Instagram.
