abstract: A symmetric distribution of information, although omnipresent in real markets, is rarely considered in experimental
  economics. We study whether information about imminent future dividends can abate bubbles in experimental asset markets.
  We find that markets with asymmetrically informed traders have significantly smaller bubbles than markets with symmetrically
  informed or uninformed traders. Hence, fundamental values are better reflected in market prices—implying higher market efficiency—when
  some traders know more than others about future dividends. This suggests that bubbles are abated when traders know that
  a subset of them have an edge (in information) over others. This paper was accepted by Brad Barber, Teck Ho, and Terrance
  Odean, special issue editors.
