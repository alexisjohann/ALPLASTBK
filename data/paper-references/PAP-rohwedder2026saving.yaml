        - evaluation
        - maintenance
      primary_dimension: F
      psi_dominant: institutional_design
      gamma: 0.0
      A_level: 0.5
      W_level: 0.4
      awareness_type: retrospective
      key_insight: |
        Under-saving is primarily driven by exposure to economic shocks, not
        by procrastination or present bias. Institutional mechanisms (mandatory
        saving via CPF) buffer against shock consequences. The variation in
        saving regret is an environmental/contextual phenomenon, not a
        behavioral/dispositional one.

    - domain: institutional_design
      stages:
        - preparation
        - action
        - maintenance
      primary_dimension: I
      psi_dominant: choice_architecture
      gamma: 0.0
      A_level: 0.3
      W_level: 0.8
      awareness_type: implicit
      key_insight: |
        Singapore CPF mandates 37% contribution rate across retirement, health,
        and housing accounts. This forced saving creates buffer stock that
        mitigates long-term consequences of shocks. Despite mandatory saving,
        45% still express regret, suggesting self-insurance is insufficient
        against large shocks without risk pooling.

