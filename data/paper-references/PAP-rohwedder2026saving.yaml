# ============================================================================
# SUMMARY
# ============================================================================
summary:
  abstract_extended: |
    This paper challenges the widely held view that procrastination is a primary
    driver of under-saving for retirement. Using comparable household survey data
    from the RAND American Life Panel (ALP, N=2,618) and the Singapore Life Panel
    (SLP, N=4,309), the authors find that psychometric measures of procrastination,
    present bias, and self-control have little to no explanatory power for saving
    regret among respondents aged 60-74.

    Instead, saving regret is strongly associated with the experience of adverse
    economic shocks (unemployment, health expenses, early retirement, divorce).
    69% of US respondents reported at least one negative shock vs 46% in Singapore.
    Critically, among those who experienced NO negative shock, saving regret is
    nearly identical across countries (42% US vs 40% Singapore).

    Singapore's Central Provident Fund (CPF), which mandates 37% of earnings be
    contributed to retirement, housing, and health accounts, appears to buffer
    households against the long-term financial consequences of shocks. The US
    reliance on voluntary saving leaves households more exposed.

    A design experiment showed that framing the regret question to remind
    respondents that saving more requires spending less reduced regret by ~7
    percentage points. Probability numeracy (but not financial literacy) was
    associated with significantly lower saving regret.

  key_findings: |
    1. PROCRASTINATION WEAK: 12 psychometric measures of procrastination and
       present bias show weak/no association with saving regret in both countries
    2. SHOCKS DOMINANT: Negative economic shocks are the primary driver of saving
       regret (17.9pp effect in US, 11.6pp in Singapore)
    3. SHOCK PREVALENCE: 69% of US vs 46% of Singapore respondents report
       negative shocks
    4. BASELINE EQUAL: Without shocks, regret is nearly identical (42% US vs 40% SG)
    5. DOSE-RESPONSE: Regret increases monotonically with number of shocks in US
       (42% at 0 shocks to 76% at 5+ shocks)
    6. INSTITUTIONAL BUFFER: Singapore CPF system mitigates shock impact on regret
    7. FRAMING EFFECT: Reminding about spending trade-off reduces regret by 7pp
    8. NUMERACY MATTERS: Probability numeracy (not financial literacy) associated
       with lower regret (14pp in US, 19pp in Singapore)
    9. HEALTH SHOCKS: Same prevalence (~10-11%) but much larger effect in US
       (24.4pp vs 9.6pp increase in regret)
    10. RESIDUAL REGRET: Even with mandatory saving, 45% of Singaporeans express regret

  ebf_relevance: |
    Domain: DOMAIN-SAVING, CORE-WHEN, CORE-WHERE
    10C Dimensions:
      - WHEN (Ψ_I: institutional defaults, CPF mandatory contribution)
      - WHERE (parameter calibration: saving regret rates, shock effects)
      - AWARE (probability numeracy → better risk comprehension)
      - WHO (cross-national comparison, age 60-74)
    Theory Support:
      - Challenges MS-TP-001/005/008 (procrastination explains under-saving)
      - Supports MS-NU-002 (institutional defaults/mandatory saving)
      - Supports MS-IN-001 (institutional design matters)
    Key EBF Insight: Under-saving is a risk management problem, not a
    self-control problem. Context (institutional design, shock exposure)
    explains variation better than individual behavioral traits.

  sources:
    - https://www.nber.org/papers/w34835
    - "BibTeX: bibliography/bcm_master.bib (rohwedder2026saving)"

