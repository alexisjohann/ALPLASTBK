# KEY FINDINGS STRUCTURED
# ============================================================================
key_findings_structured:
  - finding: "Procrastination measures have weak/no explanatory power for saving regret"
    domain: saving_behavior
    stage: evaluation
    effect_size: null
    significance: "Joint F-test not significant in ALP (p=0.052), significant in SLP but wrong signs"

  - finding: "Negative economic shocks increase saving regret by 17.9pp in US, 11.6pp in Singapore"
    domain: saving_behavior
    stage: evaluation
    effect_size_US: 0.179
    effect_size_SG: 0.116
    significance: "p < 0.01 in both countries"

  - finding: "69% of US respondents report negative shocks vs 46% in Singapore"
    domain: risk_exposure
    stage: observation
    effect_size: null

  - finding: "Without negative shocks, saving regret is nearly identical across countries"
    domain: saving_behavior
    stage: evaluation
    effect_size: 0.021
    significance: "42.1% US vs 39.9% SG, not statistically different"

  - finding: "Probability numeracy reduces saving regret by 14pp (US) and 19pp (Singapore)"
    domain: financial_literacy
    stage: evaluation
    effect_size_US: 0.14
    effect_size_SG: 0.19
    significance: "p < 0.01 in both countries"

  - finding: "Health spending shocks: same prevalence (~10-11%) but US effect 24.4pp vs SG 9.6pp"
    domain: health_insurance
    stage: evaluation
    effect_size_US: 0.244
    effect_size_SG: 0.096

  - finding: "Framing effect: reminding about spending trade-off reduces regret by ~7pp"
    domain: elicitation_methodology
    stage: measurement
    effect_size: 0.07

