abstract: I discuss available evidence about the evolution of top wealth shares in the United States over the course of the
  20th century. The three main approaches—the Survey of Consumer Finances, estate tax multiplier, and capitalization methods—generate
  generally consistent findings until mid-1980s but diverge since then, with the capitalization method showing a dramatic
  increase in wealth concentration and the other two methods showing at best a small increase. I discuss strengths and weaknesses
  of different approaches. The increase in capitalization estimates since 2000 is driven by a dramatic and puzzling increase
  in fixed income assets. There is evidence that estate tax estimates may not be sufficiently accounting for mortality improvements
  over time. The nonresponse and coverage issues in the SCF are a concern. I conclude that the changing nature of top incomes
  and the increased importance of self-made wealth may explain difficulties in implementing each of the methods and why the
  results diverge.
