summary:
  abstract_extended: 'This handbook chapter reviews how people make moral decisions from a

    behavioral economics perspective. We examine the psychological and neural

    mechanisms underlying moral judgment, the role of emotions in ethical

    decisions, and how context affects moral behavior. Understanding behavioral

    ethics is crucial for policy design.'
  key_findings: "1. MORAL DECISION-MAKING\n   - Not purely rational process\n   - Emotions play key role\n   - Context strongly\
    \ matters\n\n2. PSYCHOLOGICAL MECHANISMS\n   - Dual-process theories\n   - Intuition vs deliberation\n   - Moral disgust\
    \ and anger\n\n3. CONTEXT EFFECTS\n   - Framing affects moral choices\n   - Social pressure influences behavior\n   -\
    \ Anonymity changes decisions\n\n4. IMPLICATIONS\n   - Ethics cannot be assumed\n   - Design matters for moral behavior\n\
    \   - Institutions shape ethics"
  ebf_relevance: '10C DIMENSIONS:

    - WHAT (C): Moral preferences

    - WHEN (V): Context shapes moral behavior

    - AWARE (AU): Role of deliberation vs intuition


    THEORY SUPPORT:

    - Behavioral ethics literature

    - Handbook chapter overview

    - Links ethics to behavioral economics


    KEY INSIGHT:

    Moral behavior is influenced by context, emotions, and cognitive processes;

    ethical design must account for behavioral factors.'
