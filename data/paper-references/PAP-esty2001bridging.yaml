abstract: Perceived conflict between trade liberalization and environmental protection can be traced to a number of issues.
  Some tensions relate to the environmental Kuznets curve and whether economic growth yields environmental benefits. Other
  concerns arise from efforts to address transboundary externalities and disputes over the role of trade measures as an environmental
  enforcement tool. Another set of issues centers on the risk of a race-toward-the-bottom regulatory dynamic and the limits
  of legitimate comparative advantage. This paper argues that, in an ecologically and economically interdependent world, trade
  and environmental policies are inescapably linked as a matter of descriptive reality and normative necessity.
