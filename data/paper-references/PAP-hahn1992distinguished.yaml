abstract: Roy Radner has been elected a Distinguished Fellow of the American Economic Association. To illustrate the Radner
  style, I have chosen the example of his turnpike theorem, even though this is not quite illustrative of his central concerns.
  I shall follow this with a brief survey of his contributions to general equilibrium theory and the theory of rational expectations
  equilibrium. I shall then turn to his work on teams, and conclude with one of his more game-theoretic studies of organizations
  and private information.
