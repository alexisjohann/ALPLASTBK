abstract: This special issue addresses the question of how to understand the civic
  turn within immigrant integration in the West towards programs and instruments,
  public discourses and political intentions, which aim to condition, incentivize,
  and shape through socialization immigrants into 'citizens'. Empirically, it focuses
  on the less studied Scandinavian cases of Sweden, Norway, and Denmark. In this introduction,
  we situate the contributions to this special issue within the overall debate on
  civic integration and convergence. We introduce the three cases, critically discuss
  the (liberal) convergence thesis and its descriptive and explanatory claims, and
  explain why studying the Scandinavian welfare states can further our understanding
  of the nature of the civic turn and its driving forces. Before concluding, we discuss
  whether civic integration policies actually work.
