abstract: The evidence on discrimination produced from the audit method is examined. Audits survey the average firm and not
  the marginal firm which determines the level of market discrimination. Taken on its own terms, there is little evidence
  of labor market discrimination from audit methods. The validity of audit methods is critically dependent on unverified assumptions
  about equality across race/gender groups of the distributions of unobserved (by audit designers) productivity components
  acted on by firms and about the way labor markets work. Audits can find discrimination when none exists and can disguise
  it when it does.
