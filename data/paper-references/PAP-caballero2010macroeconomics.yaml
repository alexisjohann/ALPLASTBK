abstract: The recent financial crisis has damaged the reputation of macroeconomics, largely for its inability to predict the
  impending financial and economic crisis. To be honest, this inability to predict does not concern me much. It is almost
  tautological that severe crises are essentially unpredictable, for otherwise they would not cause such a high degree of
  distress. What does concern me about my discipline is that its current core —by which I mainly mean the so-called dynamic
  stochastic general equilibrium approach—has become so mesmerized with its own internal logic that it has begun to confuse
  the precision it has achieved about its own world with the precision that it has about the real one. This is dangerous for
  both methodological and policy reasons. To be fair to our field, an enormous amount of work at the intersection of macroeconomics
  and corporate finance has been chasing many of the issues that played a central role during the current crisis, including
  liquidity evaporation, collateral shortages, bubbles, crises, panics, fire sales, risk-shifting, contagion, and the like.
  However, much of this literature belongs to the periphery of macroeconomics rather than to its core. I will discuss the
  distinction between the core and the periphery of macroeconomics as well as the futile nature of the integrationist movement—that
  is, the process of gradually bringing the insights of the periphery into the dynamic stochastic general equilibrium structure.
  I argue that the complexity of macroeconomic interactions limits the knowledge we can ever attain, and that we need to place
  this fact at the center of our analysis. We should consider what this complexity does to the actions and reactions of the
  economic agent, and seek analytical tools and macroeconomic policies that are robust to the enormous uncertainty to which
  we are confined.
