abstract: In this introduction to the symposium, I first offer an overview of the spectrum of experimental methods in economics,
  from laboratory experiments to the field experiments that are the subject of this symposium. I then offer some thoughts
  about the potential gains from doing economic research using field experiments and my own mental checklist of 14 steps to
  improve the chances of carrying out an economics field experiment successfully.
