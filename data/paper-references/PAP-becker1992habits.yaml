abstract: Addresses how the past influences present preferences through habitual, addictive and traditional behavior and how
  people get committed to future decisions. When to consider habits as harmful and beneficial; Invidious comparisons on consumption;
  Proof that childhood experiences can greatly influence behavior over a person's entire life; Why the difficulty of obtaining
  binding commitments has been exaggerated; Conclusion.
