summary:
  abstract_extended: 'In this Nobel Prize lecture delivered December 9, 1992, Gary Becker discusses

    four topics emblematic of his innovative approach to the economic analysis of

    social issues: discrimination against minorities, crime and punishment, the

    development and accumulation of human capital, and the structure of families.


    The human capital approach considers how the productivity of people in market

    and non-market situations is changed by investments in education, skills, and

    knowledge. Becker''s foremost achievement is to have formulated and formalized

    the microeconomic foundations of human capital theory.


    The lecture demonstrates how economic reasoning - assuming that individuals

    maximize utility subject to constraints - can illuminate understanding of

    social phenomena previously thought to be outside the domain of economics.'
  key_findings: "1. HUMAN CAPITAL THEORY: Investments in education and training increase\n   productivity and explain wage\
    \ differentials\n\n2. DISCRIMINATION ECONOMICS: Market forces tend to reduce discrimination;\n   discrimination is costly\
    \ to those who practice it\n\n3. CRIME ECONOMICS: Criminals respond rationally to incentives; punishment\n   deters crime\
    \ by changing expected costs\n\n4. FAMILY ECONOMICS: Household decisions about marriage, fertility, and\n   time allocation\
    \ follow economic principles\n\n5. GENERAL APPROACH: The economic approach applies to all human behavior,\n   not just\
    \ market transactions\n\n6. UTILITY MAXIMIZATION: Individuals maximize utility subject to constraints\n   of time, income,\
    \ and knowledge"
