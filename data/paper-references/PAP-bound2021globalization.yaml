abstract: In the four decades since 1980, US colleges and universities have seen the number of students from abroad quadruple.
  This rise in enrollment and degree attainment affects the global supply of highly educated workers, the flow of talent to
  the US labor market, and the financing of US higher education. Yet, the impacts are far from uniform, with significant differences
  evident by level of study and type of institution. The determinants of foreign flows to US colleges and universities reflect
  both changes in student demand from abroad and the variation in market circumstances of colleges and universities, with
  visa policies serving a mediating role. The consequences of these market mechanisms impact global talent development, the
  resources of colleges and universities, and labor markets in the United States and countries sending students.
