abstract: For emerging markets, fiscal space is a very real constraint that can surface under a variety of circumstances,
  including rising world interest rates, falling commodity prices, or a global recession. Some emerging markets, and the majority
  of low-income developing economies, are already in debt distress or default. Near-term, making sure that troubled debtor
  countries are aware of the full menu of options, including heterodox strategies such as default, is important. Longer-term,
  a rethink of the Bretton Woods financial institutions to incorporate a greater emphasis on outright grants instead of loans,
  makes more sense than ever.
