abstract: Many if not most markets with network externalities are two-sided. To succeed,
  platforms in industries such as software, portals and media, payment systems and
  the Internet, must “get both sides of the market on board ”. Accordingly, platforms
  devote much attention to their business model, that is to how they court each side
  while making money overall. The paper builds a model of platform competition with
  two-sided markets. It unveils the determinants of price allocation and enduser surplus
  for different governance structures (profit-maximizing platforms and not-for-profit
  joint undertakings), and compares the outcomes with those under an integrated monopolist
  and a Ramsey planner. 1
