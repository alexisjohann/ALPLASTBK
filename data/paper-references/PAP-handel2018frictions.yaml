abstract: Consumers suffer significant losses from not acting on available information. These losses stem from frictions such
  as search costs, switching costs, and rational inattention, as well as what we call mental gaps resulting from wrong priors/worldviews,
  or relevant features of a problem not being top of mind. Most research studying such losses does not empirically distinguish
  between these mechanisms. Instead, we show that most highly cited papers in this area presume one mechanism underlies consumer
  choices and assume away other potential explanations, or collapse many mechanisms together. We discuss the empirical difficulties
  that arise in distinguishing between different mechanisms, and some promising approaches for making progress in doing so.
  We also assess when it is more or less important for researchers to distinguish between these mechanisms. Approaches that
  seek to identify true value from demand, without specifying mechanisms behind this wedge, are most useful when researchers
  are interested in evaluating allocation policies that strongly steer consumers towards better options with regulation, traditional
  policy instruments, and defaults. On the other hand, understanding the precise mechanisms underlying consumer losses is
  essential to predicting the impact of mechanism policies aimed primarily at reducing specific frictions or mental gaps without
  otherwise steering consumers. We make the case that papers engaging with these questions empirically should be clear about
  whether their analyses distinguish between mechanisms behind poorly informed choices, and what that implies for the questions
  they can answer. We present examples from several empirical contexts to highlight these distinctions.
