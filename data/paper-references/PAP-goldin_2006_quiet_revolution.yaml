title: The Quiet Revolution That Transformed Women's Employment, Education, and Family
author: Goldin
year: '2006'
publication_type: journal_article
doi: 10.1257/000282806777212350
abstract: The modern economic role of women emerged in four phases - three evolutionary
  (1890s-1920s, 1930-1950, 1950-late 1970s) and one revolutionary (late 1970s-ongoing).
  Three aspects distinguish evolutionary from revolutionary phases - horizon, identity,
  and decision-making. The revolutionary phase is discernible through women's more
  predictable attachment to the workplace, greater identity with career, and better
  ability to make joint decisions with spouses. Each series shows sharp breaks signifying
  social and economic change. The paper explores the relationship between modern labor
  economics development and women's changing economic role, concluding by assessing
  whether the revolution has stalled. Women who graduated college in the early 1980s
  did not 'opt-out,' but recent cohorts are too young to evaluate.
