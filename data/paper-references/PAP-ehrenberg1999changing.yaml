abstract: This essay addressed the changing demographic composition of new Ph.D.s in economics and the changing distribution
  of the jobs that they are obtaining. It discusses how future trends may interact to influence the types of training that
  economists may provide their graduate students and the types of faculty positions that academic institutions may provide
  for new Ph.D. economists in the future.
