summary:
  abstract_extended: 'LANDMARK QJE PAPER on cultural persistence.


    KEY FINDING:

    600 YEARS of local continuity in anti-Semitism in Germany.


    THE HISTORICAL SHOCK:

    Jews were blamed when the BLACK DEATH killed at least a third of Europe''s

    population (1348-1350). This triggered pogroms against Jews.


    BLACK DEATH POGROMS PREDICT:

    1. Violence against Jews in the 1920s

    2. Votes for the Nazi Party

    3. Deportations after 1933

    4. Attacks on synagogues

    5. Letters to Der Stürmer


    BREAKDOWN CONDITIONS:

    Persistence is LOWER in:

    - Cities with HIGH LEVELS OF TRADE

    - Cities with HIGH IMMIGRATION


    CONTROLS:

    Results NOT driven by:

    - Political extremism

    - Different attitudes toward violence


    COMPANION TO 2015 PNAS PAPER:

    - 2012 (this paper) = STOCK (historical accumulation)

    - 2015 = FLOW (indoctrination adding to stock)


    Extreme case of Ψ_historical (context persisting for 600 years).'
  key_findings: '1. 600-year persistence of anti-Semitism documented

    2. Black Death pogroms (1348-50) predict Nazi-era violence

    3. Trade and immigration REDUCE persistence

    4. Not driven by general extremism or violence attitudes

    5. Landmark paper in historical persistence literature

    6. STOCK model: historical accumulation of attitudes'
