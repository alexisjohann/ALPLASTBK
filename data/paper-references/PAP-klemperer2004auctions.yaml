abstract: 'February 2000 was a stressful month for me: the UK 3G auction was about to begin. For over two years I had been
  working with the UK government to design the world’s first auction of spectrum for ‘‘third generation’’(3G) mobile-phone
  services. A lot was at stake. If our auction worked well, it would allocate the spectrum efficiently and raise a lot of
  money, but many previous auctions had been embarrassing flops that had failed to generate the sums expected. This time the
  politicians were hoping for billions of dollars.

  We had written numerous papers, developed theories, and tested prototype auction designs in experiments. But would it all
  work on the day? What might go wrong? The bidders all had armies of consultants and lawyers. What loopholes in the rules
  might they find to exploit? Could they find a devious way to coordinate their bidding and so avoid competing against each
  other? Or might our rules actually have discouraged some potential bidders from entering the auction at all—so destroying
  competition for a different reason?'
