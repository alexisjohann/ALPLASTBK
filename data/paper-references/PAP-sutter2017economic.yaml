abstract: Economic preferences that relate to time (patience), risk taking and social interaction have been shown to play
  an important role in life success. In this video, MATTHIAS SUTTER explores how these economic preferences are formed in
  early life and adolescence. Carrying out economic experiments and collecting survey data among 500 families in rural Bangladesh,
  Sutter finds that children adopt almost entirely the economic preferences of their parents. Sutter also shows that factors
  like higher income and coming from a larger household can help to form these economic preferences in a more advantageous
  manner. Highlighting that genetics alone cannot explain differences in economic preferences, Sutter’s work provides important
  information for governments seeking to intervene to improve life chances.
