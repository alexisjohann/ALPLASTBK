summary:
  abstract_extended: 'This paper examines how reciprocal fairness affects group formation.

    We analyze how fairness considerations influence who people choose to

    interact with and how groups emerge based on shared fairness norms.'
  key_findings: "1. GROUP FORMATION\n   - Fairness preferences drive sorting\n   - Like attracts like\n   - Homogeneous groups\
    \ form\n\n2. RECIPROCITY IN GROUPS\n   - In-group reciprocity stronger\n   - Out-group treatment differs\n   - Identity\
    \ effects\n\n3. IMPLICATIONS\n   - Social segregation\n   - Cooperation patterns\n   - Institutional design"
  ebf_relevance: '10C DIMENSIONS:

