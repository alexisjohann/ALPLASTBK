abstract: 'We discuss poverty measurement, focusing on two alternatives to the current official measure: consumption poverty,
  and the Census Bureau''s new Supplemental Poverty Measure (SPM) that was released for the first time last year. The SPM
  has advantages over the official poverty measure, including a more defensible adjustment for family size and composition,
  an expanded definition of the family unit that includes cohabitors, and a definition of income that is conceptually closer
  to resources available for consumption. The SPM''s definition of income, though conceptually broader than pre-tax money
  income, is difficult to implement given available data and their accuracy. Furthermore, income data do not capture consumption
  out of savings and tangible assets such as houses and cars. A consumption-based measure has similar advantages but fewer
  disadvantages. We compare those added to and dropped from the poverty rolls by the alternative measures relative to the
  current official measure. We find that the SPM adds to poverty individuals who are more likely to be college graduates,
  own a home and a car, live in a larger housing unit, have air conditioning, health insurance, and substantial assets, and
  have other more favorable characteristics than those who are dropped from poverty. Meanwhile, we find that a consumption
  measure compared to the official measure or the SPM adds to the poverty rolls individuals who are more disadvantaged than
  those who are dropped. We decompose the differences between the SPM and official poverty and find that the most problematic
  aspect of the SPM is the subtraction of medical out-of-pocket expenses from SPM income. Also, because the SPM poverty thresholds
  change in an odd way over time, it will be hard to determine if changes in poverty are due to changes in income or changes
  in thresholds. Our results present strong evidence that a consumption-based poverty measure is preferable to both the official
  income-based poverty measure and to the Supplemental Poverty Measure for determining who are the most disadvantaged.'
