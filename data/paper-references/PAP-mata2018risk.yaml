abstract: Psychology offers conceptual and analytic tools that can advance the discussion on the nature of risk preference
  and its measurement in the behavioral sciences. We discuss the revealed and stated preference measurement traditions, which
  have coexisted in both psychology and economics in the study of risk preferences, and explore issues of temporal stability,
  convergent validity, and predictive validity with regard to measurement of risk preferences. As for temporal stability,
  do risk preference as a psychological trait show a degree of stability over time that approximates what has been established
  for other major traits, such as intelligence, or, alternatively, are they more similar in stability to transitory psychological
  states, such as emotional states? Convergent validity refers to the degree to which different measures of a psychological
  construct capture a common underlying characteristic or trait. Do measures of risk preference all capture a unitary psychological
  trait that is indicative of risky behavior across various domains, or do they capture various traits that independently
  contribute to risky behavior in specific areas of life, such as financial, health, and recreational domains? Predictive
  validity refers to the extent to which a psychological trait has power in forecasting behavior. Intelligence and major personality
  traits have been shown to predict important life outcomes, such as academic and professional achievement, which suggests
  there could be studies of the short- and long-term outcomes of risk preference— something lacking in current psychological
  (and economic) research. We discuss the current empirical knowledge on risk preferences in light of these considerations.
