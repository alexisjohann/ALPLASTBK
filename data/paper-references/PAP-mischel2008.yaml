abstract: "The Toothbrush Problem describes researchers' resistance to using theories other than their own. Mischel notes: 'Psychologists treat other peoples' theories like toothbrushes—no self-respecting person wants to use anyone else's.' The structure of disciplines, narrow sub-fields, and tenure pressures feed this problem. If achieving 'originality' requires not building on others' work, it undermines collective scientific progress. Mischel argues for developing common shared tools and language so that replication and building on solid work becomes valued practice. He emphasizes publishing failures to replicate. The paper addresses psychology's fragmentation and calls for cumulative science rather than proliferating pet models without integration."
