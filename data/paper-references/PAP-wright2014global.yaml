abstract: In the last half-decade, sharp jumps in the prices of wheat, rice, and corn, which furnish about two–thirds of the
  calorie requirements of mankind, have attracted worldwide attention. These price jumps in grains have also revealed the
  chaotic state of economic analysis of agricultural commodity markets. Economists and scientists have engaged in a blame
  game, apportioning percentages of responsibility for the price spikes to bewildering lists of factors, which include a surge
  in meat consumption, idiosyncratic regional droughts and fires, speculative bubbles, a new “financialization” of grain markets,
  the slowdown of global agricultural research spending, jumps in costs of energy, and more. Several observers have claimed
  to identify a “perfect storm” in the grain markets in 2007/2008, a confluence of some of the factors listed above. In fact,
  the price jumps since 2005 are best explained by the new policies causing a sustained surge in demand for biofuels. The
  rises in food prices since 2004 have generated huge wealth transfers to global landholders, agricultural input suppliers,
  and biofuels producers. The losers have been net consumers of food, including large numbers of the world's poorest peoples.
  The cause of this large global redistribution was no perfect storm. Far from being a natural catastrophe, it was the result
  of new policies to allow and require increased use of grain and oilseed for production of biofuels. Leading this trend were
  the wealthy countries, initially misinformed about the true global environmental and distributional implications.
