abstract: 'ResumenEl efecto de la ideología política en el poder sobre el crecimiento
  económico , la distribución de la renta factorial y la desigualdad: evidencia para
  20 países de América Latina, 1975-2017 Este trabajo de grado de maestría tiene como
  objetivo estimar el efecto de la ideología política en el poder sobre el nivel de
  ingreso, sus variaciones en el corto plazo, la distribución en la renta factorial
  y la desigualdad para 20 países de América Latina en el periodo de 1975-2017.Se
  realiza la revisión bibliográfica sobre la interacción de estas variables y se presentan
  los principales resultados de los artículos.La metodología econométrica usada es
  datos paneles dinámicos y se desarrollan tres modelos con múltiples variaciones
  que en términos generales son: El modelo sobre el nivel de ingreso del PIB per cápita
  real deflactado a precios del año 2010 usando como denominador la población en edad
  de trabajar, un modelo de la participación del trabajo en la renta factorial y,
  otro modelo para la desigualdad medida por el índice de Gini de los ingresos; cada
  modelo tiene tres grupos de variables: teoría económica, políticas y exógenas.Las
  fuentes de los datos utilizadas en el trabajo de grado son: Banco Mundial, Banco
  Interamericano de Desarrollo (BID), Reserva Federal de los Estados Unidos y Transparencia
  Internacional.Teniendo en cuenta lo anterior, las variables teóricas en el modelo
  de nivel de ingreso del PIB per cápita real son: la educación, la inversión y el
  crecimiento demográfico (Mankiw, Romer & Weil;1992); para el modelo de desigualdad
  las variables teóricas son: los impuestos a las ganancias y el capital, los impuestos
  a los bienes y servicios, el PIB per cápita, el nivel de desempleo, el gasto en
  educación, el gasto público en inversión y el índice de percepción de la democracia
  (Munduch, 2018).Las variables políticas son tomadas de la base de Cruz, Keefer &
  X significativas en los modelos de desigualdad.Finalmente, los términos de intercambio
  y los precios de los commodities son favorables para incrementar el nivel de ingreso
  y reducir la desigualdad, salvo en el modelo de participación del trabajo en la
  renta factorial donde el aumento de los precios de los commodities reduce la participación
  del trabajo en la renta.Todas estas conclusiones están basadas en las estimaciones
  de los modelos'
