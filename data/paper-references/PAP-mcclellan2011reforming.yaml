abstract: This paper focuses on a broad movement toward a fundamentally different way of paying healthcare providers. The
  approach reaches beyond the old dichotomies about whether healthcare providers are reimbursed on a fee-for-service or a
  “capitated” or per-person payment. Instead, these reforms seek to create direct linkages between payments to healthcare
  providers and measures of the quality and efficiency of care. After an overview of payment reforms for healthcare providers
  and their welfare implications, this paper discusses a range of empirical studies. These often small-scale studies suggest
  that provider payment reforms in conjunction with greater attention to improving measurements of care quality and outcomes
  can have a significant impact on quality of care and, in some cases, resource use and costs of care.
