abstract: There is a growing body of evidence that many entrepreneurs seem to enter and persist in entrepreneurship despite
  earning low risk-adjusted returns. This has lead to attempts to provide explanations—using both standard economic theory
  and behavioral economics— for why certain individuals may be attracted to such an apparently unprofitable activity. Drawing
  on research in behavioral economics, in the sections that follow, we review three sets of possible interpretations for understanding
  the empirical facts related to the entry into, and persistence in, entrepreneurship. Differences in risk aversion provide
  a plausible and intuitive interpretation of entrepreneurial activity. In addition, a growing literature has begun to highlight
  the potential importance of overconfidence in driving entrepreneurial outcomes. Such a mechanism may appear at face value
  to work like a lower level of risk aversion, but there are clear conceptual differences—in particular, overconfidence likely
  arises from behavioral biases and misperceptions of probability distributions. Finally, nonpecuniary taste-based factors
  may be important in motivating both the decisions to enter into and to persist in entrepreneurship.
