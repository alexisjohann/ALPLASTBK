summary:
  abstract_extended: 'This handbook chapter examines how group formation affects cooperation.

    We review evidence on how endogenous group formation, group identity, and

    group competition affect cooperative behavior. Understanding these dynamics

    is important for organizational design and team formation.'
  key_findings: "1. ENDOGENOUS GROUPS\n   - Self-selection matters\n   - Sorting by type occurs\n   - Better outcomes possible\n\
    \n2. GROUP IDENTITY\n   - In-group favoritism\n   - Cooperation with in-group\n   - Out-group discrimination\n\n3. INTER-GROUP\
    \ COMPETITION\n   - Increases in-group cooperation\n   - Can reduce overall welfare\n   - Design considerations"
  ebf_relevance: '10C DIMENSIONS:

    - WHO (AAA): Group membership

    - WHAT (C): Group preferences

    - HOW (B): Within/between group dynamics


    THEORY SUPPORT:

    - Social identity theory

    - Group formation experiments

    - Organizational applications


    KEY INSIGHT:

    Group formation affects cooperation through selection, identity, and

    competition effects; organizational design should account for these dynamics.'
