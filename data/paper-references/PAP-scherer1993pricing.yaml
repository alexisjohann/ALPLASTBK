abstract: The decades-old debate over pharmaceutical industry prices, profits, and innovation has again intensified. A number
  of events coalesced to refocus public interest on pharmaceuticals. Contributing to public concern were Bureau of Labor Statistics
  price index increases for pharmaceuticals far outpacing those for the products of other industries. Another prominent characteristic
  of the pharmaceutical industry has been its extraordinarily high reported profitability. This article examines the phenomena
  that precipitated the current pharmaceuticals debate, their historical antecedents, and the principal questions at issue.
  In the author's considered judgment, a pell-mell march toward regulation of pharmaceutical industry pricing could seriously
  impair the industry's incentives for investment in new products.
