abstract: The economies of modern industrialized society can more appropriately be labeled organizational economies than market
  economies. Thus, even market-driven capitalist economies need a theory of organizations as much as they need a theory of
  markets. The attempts of the new institutional economics to explain organizational behavior solely in terms of agency, asymmetric
  information, transaction costs, opportunism, and other concepts drawn from neoclassical economics ignore key organizational
  mechanisms like authority, identification, and coordination, and hence are seriously incomplete. The theory presented here
  is simple and coherent, resting on only a few mechanisms that are causally linked. Better yet, it agrees with empirical
  observations of organizational phenomena. Large organizations, especially governmental ones, are often caricatured as “bureaucracies,”
  but they are often highly effective systems, despite the fact that the profit motive can penetrate these vast structures
  only by indirect means.
