abstract: Much of the profession accepts that the CPI likely overstates the rate of increase of the cost-of-living. It is
  less clear that there are sound and feasible steps that the BLS can adopt to improve matters in the short run. There are
  unresolved conceptual and identification problems in the measurement of quality. Superlative price indexes are not feasible,
  and feasible approximations are not superlative, and may not even be better. The need for a single index that aggregates
  over heterogeneous consumers with different incomes, tastes, and needs casts serious doubt on the cost-of-living approach.
