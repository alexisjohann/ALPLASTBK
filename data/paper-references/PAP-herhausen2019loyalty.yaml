abstract: 'Retailers use a multitude of touchpoints to interact with their customers.
  Based on

  anticipated utility theory and using latent class analyses on large-scale data from
  two

  samples of 2,443 and 2,649 journeys, the researchers identified five time-consistent

  segments that differ considerably in their touchpoint and mobile device usage:

  (1) store-focused shoppers, (2) pragmatic online shoppers, (3) extensive online
  shoppers,

  (4) multiple touchpoint shoppers, and (5) online-to-offline shoppers. Importantly,
  these

  segments also differ substantially in how loyalty is formed. Journey satisfaction
  is most

  important for multiple touchpoint shoppers, while product satisfaction matters more
  for

  store-focused and pragmatic online shoppers. Customer inspiration additionally contributes

  to loyalty for store-focused shoppers, multiple touchpoint shoppers, and online-to-offline

  shoppers. The findings further indicate that mobile device users do not form a separate

  segment but are concentrated in the multiple touchpoint segment. We also find no
  separate

  showrooming segment, while online-to-offline behavior, also termed webrooming, is
  more

  common. The findings have direct implications for retailers'' touchpoint investment,

  communication, and relationship marketing strategies.

  '
