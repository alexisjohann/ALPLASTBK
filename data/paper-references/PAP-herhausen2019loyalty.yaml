notes: 'TOP-TIER RETAIL PAPER (Journal of Retailing)


  KEY CONTRIBUTION TO EBF:

  1. Formalizes 5-segment customer journey typology (MS-CJ-002)

  2. Provides segment-specific loyalty formation parameters (PAR-CJ-001 to PAR-CJ-004)

  3. Shows heterogeneity in journey vs product satisfaction effects (CORE-WHO)

  4. Demonstrates customer inspiration as additional loyalty driver

  5. Field data: 5,092 journeys across DACH region (2013, 2016)


  COUNTERINTUITIVE FINDINGS:

  1. No showrooming segment exists (contrary to popular belief)

  2. Mobile doesn''t create new segment (concentrated in multiple touchpoint)

  3. Product satisfaction has ZERO effect (β=0.01, NS) for multiple touchpoint shoppers

  4. Journey satisfaction has MINIMAL effect (β=0.11*) for store-focused shoppers


  THEORETICAL FOUNDATION:

  - Anticipated Utility Theory (Caplin & Leahy 2001)

  - Touchpoint-based segmentation

  - Latent Class Analysis methodology


