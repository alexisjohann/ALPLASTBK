key_findings:
- 5 time-consistent customer journey segments identified via LCA
- Journey satisfaction most important for multiple touchpoint shoppers (β=0.58***)
- Product satisfaction most important for store-focused (β=0.40***) and pragmatic
  online (β=0.43***)
- Customer inspiration contributes to loyalty for 3 of 5 segments
- Mobile users don't form separate segment; concentrated in multiple touchpoint
- No showrooming segment found; webrooming (O2O) is more prevalent
- Segments are time-consistent (2013 vs 2016 samples)
