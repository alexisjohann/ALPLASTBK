  10c_dimensions:
    WHO: '5 Customer Journey Segments differentiated by touchpoint usage:

      1. Store-focused shoppers (22%): Prefer physical stores

      2. Pragmatic online shoppers (31%): Efficient online behavior

      3. Extensive online shoppers (16%): Heavy online research

      4. Multiple touchpoint shoppers (15%): Use many channels

      5. Online-to-offline shoppers (16%): Research online, buy offline (webrooming)

      '
    WHAT: 'Loyalty formation varies by segment:

      - Journey satisfaction: Most important for multiple touchpoint shoppers

      - Product satisfaction: Most important for store-focused, pragmatic online

      - Customer inspiration: Additional effect for store-focused, multiple touchpoint,
      O2O

      '
    HOW: 'Segment-specific pathway to loyalty:

      - Multiple touchpoint: Journey experience drives loyalty (β=0.58***)

      - Store-focused: Product quality drives loyalty (β=0.40***)

      - Inspiration as differentiator for experiential segments

      '
    WHEN: 'Touchpoint timing matters:

      - ZMOT (Zero Moment of Truth): Online research phase

      - FMOT (First Moment of Truth): Purchase decision

      - SMOT (Second Moment of Truth): Post-purchase experience

      Segments differ in which MOT phase is most critical

      '
    WHERE: 'Field data from two DACH samples:

      - Sample 1 (2013): N=2,443 journeys

      - Sample 2 (2016): N=2,649 journeys

      - Total: 5,092 customer journeys

      - Product categories: 8 categories (clothing, electronics, etc.)

      '
    AWARE: 'Touchpoint awareness varies by segment:

      - Multiple touchpoint shoppers: High awareness across all channels

      - Store-focused: Low digital awareness, high physical

      - Mobile doesn''t create new segment; concentrated in multiple touchpoint

      '
    READY: 'Journey readiness indicators:

      - Extensive online shoppers: High information readiness before purchase

      - Pragmatic online: Ready to buy quickly, low research

      - Store-focused: Ready when entering store

      '
    STAGE: '5 segments map to different journey stage emphases:

      - Store-focused: Focus on FMOT (in-store decision)

      - Pragmatic online: Focus on efficiency (minimal pre-purchase)

      - Extensive online: Focus on ZMOT (extensive research)

      - Multiple touchpoint: All stages important

      - Online-to-offline: ZMOT online, FMOT offline (webrooming)

      '
    HIERARCHY: 'Loyalty formation hierarchy varies by segment:

      - For multiple touchpoint: Journey > Product > Inspiration

      - For store-focused: Product > Inspiration > Journey

      - For pragmatic online: Product > Journey > Inspiration

      '
    EIT: 'Segment-specific intervention implications:

      - Multiple touchpoint: Optimize cross-channel experience

      - Store-focused: Focus on product quality, in-store inspiration

      - Online-to-offline: Bridge online research to offline purchase

      - No separate showrooming segment found

      '
