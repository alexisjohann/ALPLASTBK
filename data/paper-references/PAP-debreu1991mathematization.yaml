abstract: This AER Presidential Address delivered at the 103rd meeting of the American Economic Association examines the mathematization
  of economic theory. Debreu reflects on how mathematics has become the dominant language of economic analysis, discussing
  both its benefits for rigor and precision and its potential limitations. The address provides a philosophical perspective
  on the role of formal methods in advancing economic understanding.
