abstract: Alain Ledoux, who was one of over 6,000 chess players taking part in Bühren
  and Frank´s (2012) online Beauty Contest experiment, turned out to be the forgotten
  inventor of that game. We reconstruct the birth of the Beauty Contest. In section
  1 of our note, its first two authors outline the history of the game that metamorphosed
  into the famous guessing game experiment which was first run in the lab by Rosemarie
  Nagel. In section 2, Rosemarie Nagel adds further remarks and thoughts about the
  development of the experimental Beauty Contest.
