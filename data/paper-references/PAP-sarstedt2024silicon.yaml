abstract: Should consumer researchers employ silicon samples and artificially generated data based on large language models
  such as GPT to mimic human respondents behavior? We review recent research comparing result patterns from silicon and human
  samples, finding that results vary considerably across different domains. Based on these results, we present specific recommendations
  for silicon sample use in consumer and marketing research. Silicon samples hold particular promise in upstream parts of
  the research process such as qualitative pretesting and pilot studies.
