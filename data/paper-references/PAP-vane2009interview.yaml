abstract: Edmund S. Phelps has been McVickar Professor of Political Economy at Columbia University in New York City, New York,
  since 1982 and director of the Center on Capitalism and Society at Columbia University's Earth Institute since 2001. In
  2006, he was awarded the Nobel Memorial Prize in Economic Science “for his analysis of intertemporal tradeoffs in macroeconomic
  policy.” We interviewed Professor Phelps at his hotel in San Francisco, on January 3, 2009, while attending the annual meeting
  of the Allied Social Science Associations.
