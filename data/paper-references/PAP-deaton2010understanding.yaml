abstract: 'In this paper, I advocate the investigation, testing, and modification of mechanisms as a progressive empirical
  research strategy for the field of economic development (and other areas of applied economics). I discuss three lines of
  work that have elucidated mechanisms that are relevant for development: 1) connections between saving and growth; 2) the
  determinants of commodity prices, which are a key source of income for many developing countries; and 3) some unexpected
  puzzles that arise in considering the linkages between income and food consumption. In each case, my discussion illustrates
  the positivist approach to the hypotheticodeductive method. In this approach, mechanisms are proposed, key predictions derived
  and tested, and if falsified, the mechanisms are rejected or modified. If the predictions of a mechanism are confirmed,
  if they are sufficiently specific, and if they are hard to explain in other ways, we attach additional credence to the mechanism,
  albeit provisionally since later evidence may undermine it. Sometimes the falsifications can be repaired by changing supplementary
  assumptions, and sometimes they involve long steps backwards where the model is abandoned; and often there is disagreement
  about which is the correct response. But the end result is an accumulation of useful knowledge and understanding.'
