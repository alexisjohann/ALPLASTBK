abstract: 'The Amethyst Initiative, signed by more than 100 college presidents and other higher education officials calls
  for a reexamination of the minimum legal drinking age in the United States. A central argument of the initiative is that
  the U.S. minimum legal drinking age policy results in more dangerous drinking than would occur if the legal drinking age
  were lower. A companion organization called Choose Responsibility explicitly proposes “a series of changes that will allow
  18–20 year-olds to purchase, possess and consume alcoholic beverages.” Does the age-21 drinking limit in the United States
  reduce alcohol consumption by young adults and its harms, or as the signatories of the Amethyst Initiative contend, is it
  “not working”? In this paper, we summarize a large and compelling body of empirical evidence which shows that one of the
  central claims of the signatories of the Amethyst Initiative is incorrect: setting the minimum legal drinking age at 21
  clearly reduces alcohol consumption and its major harms. We use a panel fixed effects approach and a regression discontinuity
  approach to estimate the effects of the minimum legal drinking age on mortality, and we also discuss what is known about
  the relationship between the minimum legal drinking age and other adverse outcomes such as nonfatal injury and crime. We
  document the effect of the minimum legal drinking age on alcohol consumption and estimate the costs of adverse alcohol-related
  events on a per-drink basis. Finally we consider implications for the correct choice of a minimum legal drinking age.'
