title: 'Computer Systems: Moral Entities but Not Moral Agents'
author: Johnson
year: '2006'
publication_type: journal_article
doi: 10.1007/s10676-006-9111-5
abstract: This paper examines whether computer systems can be considered moral agents. After discussing the distinction between
  artifacts and natural entities, the author identifies conditions for traditional moral agency. While computer system behavior
  meets four conditions, it cannot meet a key one - having mental states and intendings to act arising from freedom. However,
  computer systems have intentionality and should not be dismissed from morality like natural objects. Natural objects behave
  from necessity, but computer systems are intentionally created and deployed. When humans act with artifacts, their actions
  are constituted by the intentionality of the artifact and the designer. All three components - designer, artifact, and user
  - are at work and should be the focus of moral evaluation.
