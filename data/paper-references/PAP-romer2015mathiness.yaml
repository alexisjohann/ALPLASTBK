abstract: Mathiness lets academic politics masquerade as science. Like mathematical theory, mathiness uses a mixture of words
  and symbols, but instead of making tight links, it leaves ample room for slippage between statements in the languages of
  words as opposed to symbols, and between statements with theoretical as opposed to empirical content. Because it is difficult
  to distinguish mathiness from mathematical theory, the market for lemons tells us that the market for mathematical theory
  might collapse, leaving only mathiness as entertainment that is worth little but cheap to produce.
