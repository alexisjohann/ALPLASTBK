abstract: This book chapter examines whether mainstream economics remains monolithic
  and exclusionary or has become more pluralistic and internally divided. It discusses
  the International Confederation of Associations for Pluralism in Economics (ICAPE)
  and groups united by concerns about the theoretical and practical limitations of
  neoclassical economics, and the conviction that mainstream dominance threatens academic
  freedom. The analysis argues that various research programmes in economics - including
  game theory, information economics, and behavioral economics - do not fit properly
  in either mainstream or heterodox economics categories. These fields recognize Pareto
  efficiency as a benchmark but are primarily concerned with explaining inefficient
  outcomes through embedded individual analysis.
