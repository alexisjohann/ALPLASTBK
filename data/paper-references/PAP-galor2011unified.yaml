abstract: This paper develops the theoretical foundations and the testable implications of the various mechanisms that have
  been proposed as possible triggers for the demographic transition. Moreover, it examines the empirical validity of each
  of the theories and their signi…cance for the understanding of the transition from stagnation to growth. The analysis suggests
  that the rise in the demand for human capital in the process of development was the main trigger for the decline in fertility
  and the transition to modern growth
