abstract: The housing sector is the largest spot market in the world without a developed derivative contract to serve the
  risk management needs of market participants. This paper describes the evolution within a wider economic context of property
  derivatives in the United States and worldwide. We review various economic arguments presented in the literature to highlight
  the advantages of these financial instruments to society. The paper also provides a critical perspective on the principal
  obstacles hindering the development of property derivatives based on real estate prices—especially housing prices—and what
  can be done to overcome these difficulties. The issues discussed can serve as a guide for designing property derivatives
  capable of hedging real estate risk that has resurfaced time and time again in financial crises.
