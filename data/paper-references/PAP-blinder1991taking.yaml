abstract: 'Empirical and theoretical aspects of inventory behavior became hot topics in the 1950s and early 1960s. No one
  seemed to notice the tension that was developing between the emerging macroeconomic and microeconomic views of inventories.
  Macroeconomists routinely thought of inventories as a destabilizing factor, yet the prevailing micro theory viewed inventories
  as a stabilizing factor. It was a fascinating question that was barely explored. Instead somewhat inexplicably, interest
  in inventories dried up, as if inventories were of minor economic significance and little intrinsic interest. By the early
  1980s, then, economists once again knew something they had known in the 1950s: that inventory investment is of first-order
  importance in business cycles. But they were also beginning to realize that the standard production-smoothing/buffer-stock
  model of inventories was in deep trouble. This paper focuses on developments since that realization.'
