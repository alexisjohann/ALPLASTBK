abstract: |
  Do beliefs about inequality depend on distributive preferences? What is the joint role of
  preferences and beliefs about inequality for support for redistribution? We study these
  questions in a staggered experiment with a broadly representative sample of the Swiss
  population conducted in the context of a vote on a highly redistributive policy proposal.
  Our sample comprises a majority of inequality averse subjects, a sizeable group of altruistic
  subjects, and a minority of predominantly selfish subjects. Irrespective of preference types,
  individuals overestimate the extent of income inequality. An information intervention
  successfully corrects these large misperceptions for all types, but essentially does not affect
  aggregate support for redistribution. These results hide, however, important heterogeneity
  because the effects of beliefs about inequality for demand for redistribution are
  preference-dependent: only inequality averse individuals significantly reduce their support.

key_findings_structured:
  S1_research_question: "Are the effects of beliefs about inequality on redistribution demand preference-dependent? What is the joint role of preferences and beliefs?"
  S2_methodology: "Staggered experiment with broadly representative Swiss sample. Three phases: (1) measure social preferences via distribution task, (2) information intervention on income inequality, (3) elicit redistribution support. Conducted around the Swiss 99% initiative vote (September 2021)."
  S3_sample_data: "Broadly representative sample of Swiss population. Three preference types identified: inequality averse (majority), altruistic (sizeable), selfish (minority)."
  S4_findings:
    - finding: "All preference types overestimate income inequality"
      source_section: "Section 3"
      formal_result: "Large misperceptions across all types, corrected by information intervention"
    - finding: "Information intervention does not affect aggregate redistribution support"
      source_section: "Section 4"
      formal_result: "Null aggregate effect masks important heterogeneity"
    - finding: "Effects are preference-dependent: only inequality averse reduce support after correction"
      source_section: "Section 5"
      formal_result: "Inequality averse individuals significantly reduce redistribution support after learning true inequality is lower; selfish and altruistic show no effect"
    - finding: "Resolves puzzle: why large belief changes don't translate to aggregate policy changes"
      source_section: "Section 6"
      formal_result: "Preference heterogeneity causes offsetting effects in aggregate"
  S5_validity: "Representative sample, real political context (99% initiative), staggered design, clean information intervention. Rigorous preference measurement."
  S6_reproducibility: "Detailed methodology in paper and supplementary materials. Standard experimental protocols."

