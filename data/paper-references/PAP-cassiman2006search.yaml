abstract: 'Empirical research on complementarity between organizational design decisions
  has traditionally focused on the question of existence of complementarity. In this
  paper, we take a broader approach to the issue, combining a “productivity” and an
  “adoption” approach, while including a search for contextual variables in the firm’s
  strategy that affects complementarity. Analysis of contextual variables is not only
  interesting per se, but also improves the productivity test for the existence of
  complementarity. We use our empirical methodology to analyze complementarity between
  innovation activities: internal research and development (R&amp;D) and external
  knowledge acquisition. Our results suggest that internal R&amp;D and external knowledge
  acquisition are complementary innovation activities, but that the degree of complementarity
  is sensitive to other elements of the firm’s strategic environment. We identify
  reliance on basic R&amp;D—the importance of universities and research centers as
  an information source for the innovation process—as an important contextual variable
  affecting complementarity between internal and external innovation activities.'
