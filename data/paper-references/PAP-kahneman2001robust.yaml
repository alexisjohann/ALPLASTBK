abstract: Applying data mining techniques on a database of BIM models could provide valuable insights in key design patterns
  implicitly present in these BIM models. The architectural designer would then be able to use previous data from existing
  building projects as default values in building performance simulation software for the early phases of building design.
  The author has proposed the method to minimize the magnitude of the variation in these default values in subsequent design
  stages. This approach maintains the accuracy of the simulation results in the initial stages of building design. In this
  study, a more convincing argument is presented to demonstrate the significance of the new method. The variation in the ideal
  default values for different building design conditions is assessed first. Next, the influence of each condition on these
  variations is investigated. The space depth is found to have a large impact on the ideal default value of the window to
  wall ratio. In addition, the presence or absence of lighting control and natural ventilation has a significant influence
  on the ideal default value. These effects can be used to identify the types of building conditions that should be considered
  to determine the ideal default values.
