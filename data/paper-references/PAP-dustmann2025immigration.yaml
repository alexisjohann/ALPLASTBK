  notes: 'LANDMARK METHODOLOGICAL PAPER. Reconciles conflicting immigration literatures
    by distinguishing place-based vs worker-level effects. KEY INSIGHT: Regional approaches
    measure effects on PLACES (including relocation), worker-level approaches measure
    effects on PEOPLE (natives who stay). Both are valid but answer different questions.
    Introduces unified framework with displacement, crowding-out, and relocation effects.
    Essential for interpreting immigration research.'
