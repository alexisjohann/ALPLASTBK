title: The Effects of Immigration on Places and People -- Identification and Interpretation
author: Dustmann
year: '2025'
publication_type: journal_article
doi: null
doi_missing_reason: not_found
abstract: 'We discuss how regional and worker-level approaches to studying immigration
  address different but related questions. Regional approaches estimate the impact
  on natives who remain in a region, while worker-level studies track individuals
  regardless of location. The difference relates to native relocation responses. We
  develop a unified framework showing that regional effects combine displacement (natives
  leaving), crowding-out (reduced inflows), and pure wage effects. Using German data,
  we estimate key structural parameters: inverse labor demand elasticity phi=-1.95,
  place-based labor supply elasticity eta_P=4.64, and worker-level supply elasticity
  eta_E=3.68.'
