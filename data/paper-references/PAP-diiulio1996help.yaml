abstract: Beginning with Gary W. Becker's (1968) article on crime and punishment, economists have contributed important theoretical
  insights and empirical findings to the study of criminal behavior but the influence of economists on crime-relevant research
  and over policy debates remains negligible. This essay summarizes some basic data on the causes of crime, the social costs
  and benefits of incarceration, and replenishing social capital. Work on crime by economists should become influential in
  setting research agendas and shaping policy debates but economists will have to roll up their sleeves, complexify their
  models, and confront a real-world ‘prisoner's dilemma’ or two.
