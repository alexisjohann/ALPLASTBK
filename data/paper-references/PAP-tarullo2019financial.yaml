abstract: A decade after the darkest moments of the financial crisis, both the US financial system and the legal framework
  for its regulation are still in flux. The post-crisis regulatory framework has made systemically important banks much more
  resilient. They are substantially better capitalized and less dependent on runnable short-term funding. But the current
  regulatory framework does not deal effectively with threats to financial stability outside the perimeter of regulated banking
  organizations, notably from forms of shadow banking. Moreover, with the political tide having for the moment turned decisively
  toward deregulation, there is some question whether the resiliency improvements of the largest banks will be preserved.
  This article assesses the accomplishments, unfinished business, and outstanding issues in the post-crisis approach to prudential
  regulation.
