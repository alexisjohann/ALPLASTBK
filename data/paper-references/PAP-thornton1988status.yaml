abstract: It is the purpose of this article to report the results of a recent survey which we undertook concerning the content
  and structure of master's programs in economics. During the fall of 1985, questionnaires were sent to the 221 United States
  colleges and universities listed in Peterson's Graduate Programs in the Humanities and Social Sciences (1985) as having
  graduate programs in economics. One hundred sixty-nine responses were received from master's program directors, a response
  rate of 76 percent. We have attempted to judge the composite picture of the current master's degree in economics that emerges
  from our survey results. We discuss program numbers and admissions prerequisites; course requirements; comprehensive examinations;
  the master's thesis; time spent and post-masters's pursuits; and the master's degree as a “consolation degree.”
