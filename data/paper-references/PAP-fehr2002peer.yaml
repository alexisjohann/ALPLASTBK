summary:
  abstract_extended: 'This paper reports results from a field experiment on bicycle messengers.

    We test whether an exogenous increase in the piece rate leads to more effort.

    Standard economic theory predicts a positive effort response. However, we

    find that for those messengers who perceive the higher wage as a gift, effort

    increases significantly. This is consistent with gift exchange and reciprocity.'
  key_findings: "1. EXPERIMENTAL DESIGN\n   - Field experiment with bicycle messengers\n   - Random assignment to wage increase\n\
    \   - Natural work environment\n\n2. MAIN RESULTS\n   - Overall: small positive effort response\n   - Heterogeneity: response\
    \ depends on wage perception\n   - Gift perceivers: strong positive response\n\n3. RECIPROCITY IN ACTION\n   - Workers\
    \ who view wage increase as \"gift\" reciprocate\n   - Non-gift perceivers show income targeting\n   - Field evidence\
    \ for gift exchange theory\n\n4. IMPLICATIONS\n   - Laboratory findings replicate in field\n   - Wage increases can increase\
    \ productivity\n   - But: depends on how wages are framed"
  ebf_relevance: '10C DIMENSIONS:

    - WHAT (C): Reciprocity in labor supply

    - WHEN (V): Framing of wage change matters

    - WHERE (BBB): Field experiment validates lab findings


    KEY INSIGHT:

    Gift exchange and reciprocity operate in real labor markets, not just in

    laboratory experiments.'
