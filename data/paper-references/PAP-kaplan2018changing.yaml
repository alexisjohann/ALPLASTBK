abstract: We study how changes in the distribution of occupations have affected the aggregate non-pecuniary costs and benefits
  of working. The physical toll of work is less now than in 1950, with workers shifting away from occupations in which people
  report experiencing tiredness and pain. The emotional consequences of the changing occupation distribution vary substantially
  across demographic groups. Work has become happier and more meaningful for women, but more stressful and less meaningful
  for men. These changes appear to be concentrated at lower education levels.
