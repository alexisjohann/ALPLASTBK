abstract: 'This paper considers the prospects for constructing a neoclassical theory of growth and international trade that
  is consistent with some of the main features of economic development. Three models are considered and compared to evidence:
  a model emphasizing physical capital accumulation and technological change, a model emphasizing human capital accumulation
  through schooling, and a model emphasizing specialized human capital accumulation through learning-by-doing.'
