abstract: 'The goal of the ''“1992” program is to complete by January 1, 1993, what the European Community set out to do in
  1957: create a common market with a free flow of goods, services, labor, and capital. If the program is completed, the twelve
  member countries of the Community will form a common market larger than the United States, both in terms of population and
  gross domestic product (GDP). The renewed efforts have fuelled high expectations among the participants, and led to apprehension
  among many onlookers. Will “1992” bring the full integration and substantial benefits that are expected? Do countries outside
  the European Community have reason to fear “1992” or will they also benefit?'
