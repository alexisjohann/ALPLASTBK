summary:
  abstract_extended: "CRITICAL METHODOLOGICAL CONTRIBUTION to climate economics.\n\nTHE COMMON APPROACH:\nEstimates of climate\
    \ impacts count days in different temperature ranges\n(\"bins\") and consider how exposure affects outcomes. This often\
    \ produces\nNON-LINEAR, U-SHAPED RESULTS where high and low temperatures have\nlargest effects.\n\nTHE PROBLEM:\nNon-linear\
    \ approaches like these can generate SPURIOUS FINDINGS.\n\nMECHANISM:\n- Global warming induces TRENDS in extreme temperature\
    \ exposure\n- These trends correlate MECHANICALLY with a location's baseline temperature\n- SUBSTANTIAL BIAS emerges if\
    \ outcome trends also correlate with\n  baseline temperature (for any reason)\n\nDEMONSTRATION:\n- Theoretically\n- In\
    \ simulations\n- With real outcomes\n\nSOLUTIONS DEVELOPED:\nCorrections that account for this bias.\n\nAPPLICATION TO\
    \ US DATA:\n- Some results in literature are UNAFFECTED by corrections\n- Other results CHANGE SUBSTANTIALLY"
