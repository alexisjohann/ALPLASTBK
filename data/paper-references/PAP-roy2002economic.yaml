abstract: This paper argues that to restore the link between economic history and modern India, a different narrative of Indian
  economic history is needed.  An exclusive focus on colonialism as the driver of India's economic history misses those continuities
  that arise from economic structure or local conditions. In fact, market-oriented British imperial policies did initiate
  a process of economic growth based on the production of goods intensive in labor and natural resources. However, productive
  capacity per worker was constrained by low rates of private and public investment in infrastructure, excessively low rates
  of schooling, social inequalities based on caste and gender and a delayed demographic transition to lower birthrates and
  the resultant heavy demographic burden placed on physical capital and natural resources.
