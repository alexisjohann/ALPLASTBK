title: 'Impact of social media on cognitive development of children and young adults: a systematic review'
author: Naik
year: '2025'
publication_type: journal_article
doi: 10.1186/s12887-025-06041-5
abstract: 'This systematic review evaluates the impact of social media usage on cognitive development
  in children and young adults (ages 9-25), focusing on attention, memory, executive function, and language
  development. Following PRISMA 2020 guidelines, 23 studies (n=42,380) were included. Findings revealed
  mixed effects: excessive use was associated with impaired attention, reduced working memory, and diminished
  executive functioning, while certain platforms showed potential benefits for language skills through
  educational engagement.'
