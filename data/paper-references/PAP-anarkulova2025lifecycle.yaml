abstract: 'We challenge two tenets of lifecycle investing: (i) diversify across stocks and bonds and (ii)
  reduce equity allocations with age. We estimate optimal age-based weights in a lifecycle model that
  nonparametrically preserves time-series and cross-sectional dependencies in asset class returns. The
  optimal weights remain near one-third domestic stocks and two-thirds international stocks regardless
  of age---with no material fixed income allocation. This strategy dominates conventional stock-bond strategies
  in building wealth, preserving capital, and generating bequests. Our investors prefer diversifying with
  international stocks, not bonds. Target-date fund investors need 63 percent more preretirement savings
  to match the optimal strategy''s expected retirement utility.'
