abstract: The Employment Act of 1946 created the Council of Economic Advisers (CEA)--and served as a convenient marker of
  the government's acceptance of the burden of stabilizing the macroeconomy. The willingness of post-WWII governments to let
  automatic stabilizers function in recessions may well have moderated the post-WWII business cycle. The CEA has also served
  as an advocate of allocative efficiency in economic policy. Its relative success can be primarily ascribed to Chairman Arthur
  Burns, who hired a CEA staff composed of short-term appointees whose principal loyalty was to economic rationality.
