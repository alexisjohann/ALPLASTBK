abstract: This study examines individual behavior in two well-functioning marketplaces to investigate whether market experience
  eliminates the endowment effect. Field evidence from both markets suggests that individual behavior converges to the neoclassical
  prediction as market experience increases. In an experimental test of whether these observations are due to treatment (market
  experience) or selection (e.g., static preferences), I find that market experience plays a significant role in eliminating
  the endowment effect. I also find that these results are robust to institutional change and extend beyond the two marketplaces
  studied. Overall, this study provides strong evidence that market experience eliminates an important market anomaly.
