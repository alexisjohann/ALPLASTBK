title: The Folk Theorem in Repeated Games with Discounting or with Incomplete Information
author: Fudenberg
year: '1986'
publication_type: journal_article
doi: 10.2307/1911307
abstract: This paper establishes that when either there are only two players or a full
  dimensionality condition holds, any individually rational payoff vector of a one-shot
  game can arise in a perfect equilibrium of the infinitely-repeated game if players
  are sufficiently patient. Mixed strategies are allowed in determining individually
  rational payoffs even when only realized actions are observable. The paper also shows
  that individually rational payoffs can be approximated by sequential equilibrium
  payoffs of a long finite game with incomplete information. This foundational work
  formalizes the Folk Theorem for repeated games with discounting.
