abstract: Management fashion setters disseminate management fashions, transitory collective
  beliefs that certain management techniques are at the forefront of management progress.
  These fashion setters—consulting firms, management gurus, business mass-media publications,
  and business schools—do not simply force fashions onto gullible managers. To sustain
  their images as fashion setters, they must lead in a race (a) to sense the emergent
  collective preferences of managers for new management techniques, (b) to develop
  rhetorics that describe these techniques as the forefront of management progress,
  and (c) to disseminate these rhetorics back to managers and organizational stakeholders
  before other fashion setters. Fashion setters who fall behind in this race are condemned
  to be perceived as lagging rather than leading management progress, as peripheral
  to the business community, and as undeserving of societal support.
