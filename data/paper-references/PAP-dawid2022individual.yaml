abstract: 'This chapter is dedicated to the memories of Stephen and Joyce Fienberg.

  In this chapter, we address the problem of inference about individual causation on the basis of statistical data collected
  on groups. While such information typically cannot identify precisely the probability of causation, it can supply bounds
  on it. We show how these bounds can be improved by taking account of information on additional variables, specifically covariates
  and mediators.'
