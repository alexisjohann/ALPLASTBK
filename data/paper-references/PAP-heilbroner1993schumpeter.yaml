abstract: 'In Capitalism, Socialism, and Democracy (1947) Schumpeter asks “Can capitalism survive?” He answers: “No. I do
  not think it can.” In an essay I wrote in 1981 entitled “Was Schumpeter Right?” I began with the words: “No. I do not think
  he was.” Now, over a decade later, I wish to reconsider the question of whether Schumpeter was right, from a somewhat different
  point of view. To the question “Was Schumpeter Right?” I now give two answers. Was he right in his analysis of the prospects
  for capitalism? No, I still do not think he was. But was he right in his approach to the question of economic inquiry itself,
  an approach that recognized the presence of Vision as the precursor to Analysis? Yes, there I believe that he was not only
  right, but even more right than he himself realized'
