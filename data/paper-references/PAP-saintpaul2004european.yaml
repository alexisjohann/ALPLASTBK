abstract: During the nineties, unemployment fell in a number of European countries while it remained high in others. This
  Paper discusses potential causes for that evolution in light of recent economic research, emphasizing obstacles to reform
  due to political constraints, the prevalence of ideology, and agency issues within those bureaucracies concerned with the
  unemployment problem. Some speculative thoughts are offered as to why those factors might be more stringent in countries
  where unemployment remained high.
