abstract: Declining outlays for new weapons programs have triggered a process of consolidation that promises to shrink the
  U.S. defense industry drastically. Consolidation in the defense industry raises complex competition policy issues that are
  not amenable to conventional antitrust merger analysis. This paper presents a framework for identifying important contractor
  competencies, assessing rivalries in defense industry segments, and evaluating the competitive effects of mergers and other
  consolidation events. As applied to antitrust oversight and to Department of Defense funding, program, and acquisition strategy
  decisions, this framework can help preserve supply alternatives for developing state-of-the-art weapons needed to satisfy
  national security requirements.
