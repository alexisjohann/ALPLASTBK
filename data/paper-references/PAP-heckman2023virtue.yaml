abstract: This paper develops an economic approach to personality, character and virtue. We integrate personality psychology
  and virtue ethics into economics with a common framework. Psychological traits are actions, not immutable given endowments.
  Personality is shaped by evolution, social environment, and own choices. We examine the role of preferences and situations
  in generating measured behavior, and the efforts that people exert to meet situational demands. We formally develop the
  concept of character as the set of settled dispositions to reliably respond across a wide variety of situations. We model
  the emergence of a good person—the person of character—who acts through choice on commitment to virtue. We distinguish traits
  from preferences and compare and contrast psychological and economic perspectives on personality. Our analysis examines
  efforts and situations as factors shaping measured behaviors. It provides a foundation for empirically examining the distinction
  between traits and preferences. We enrich this framework with models of self-control and habituation. We survey empirical
  evidence supporting our analysis.
abstract_source: paper
evidence_tier: 2
data_source: Literature synthesis, Perry Preschool, Jamaica Study, ABC, China REACH
core_contribution: 'Develops unified economic framework for personality, character and virtue.

  KEY INSIGHTS:

  1. Traits are ACTIONS (not immutable endowments)

  2. Character = settled dispositions to respond reliably across situations

  3. Virtue emerges through choice and commitment to ideal

  4. Self-control and habituation as key mechanisms

  5. Bridges economics, psychology, and philosophy (Aristotle)


  FORMAL FRAMEWORK:

  - Utility: U(a, ψ, θ, h) where a=action, ψ=preferences, θ=traits, h=situation

  - Measured behavior: B = f(θ, e, h) where e=effort

  - Character: stable θ that produces reliable B across varied h

  - Virtue: commitment to ideal point with golden mean

  '
