formulas:
  utility_with_traits:
    equation: U(a, ψ, θ, h)
    description: Utility depends on action, preferences, traits, and situation
    note: ψ = preferences (what person values), θ = traits (stable dispositions)
  measured_behavior:
    equation: B = f(θ, e, h)
    description: Observed behavior depends on traits, effort, and situation
    note: Effort e mediates between traits and behavior
  trait_action:
    equation: θ_t+1 = g(θ_t, e_t, h_t)
    description: Traits evolve based on prior traits, effort, and situations
    note: 'Key insight: traits are actions, not endowments'
  self_control_model:
    equation: a* = argmax U(a) s.t. S_t ≥ c(a, a_temptation)
    description: Optimal action maximizes utility subject to self-control constraint
    note: S_t = self-control stock, c() = cost of resisting temptation
  habituation_model:
    equation: K_t+1 = (1-δ)K_t + h(a_t)
    description: Habituation stock accumulates from virtuous actions
    note: δ = depreciation, h() = habituation function
  ideal_point_model:
    equation: U(θ) = -|θ - σ*|
    description: Utility decreases with distance from ideal trait level
    note: σ* = golden mean (between excess and deficiency)
  golden_mean:
    equation: σ* = argmax U(σ) where U''(σ) < 0
    description: Optimal virtue level is interior solution (moderation)
    note: Aristotelian golden mean formalized
