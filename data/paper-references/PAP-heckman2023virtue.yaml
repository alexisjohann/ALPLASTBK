key_findings_structured:
- id: S1
  type: research_question
  finding: How can economic models formalize personality, character and virtue as choice-based concepts?
  secondary_questions:
  - Can traits be conceptualized as actions rather than fixed endowments?
  - How do preferences, traits, effort and situations jointly produce behavior?
  - What interventions effectively promote character development across the life cycle?
- id: S2
  type: methodology
  finding: Economic choice framework with utility maximization, ideal point model, skill formation technology
  key_models:
  - Production function P_j = phi_j(theta, e_j) (Eq. 1)
  - Ideal point utility U(X, X_bar) with golden mean (Eq. 14)
  - Skill formation technology (Q_{a+1}, Omega_{a+1}, K_{a+1}) = eta_a(...) (Eq. 22)
  - Adjustment model X_1 = (C_U/(C_U+C_A))X_bar + (C_A/(C_U+C_A))X_0 (Eq. 19)
- id: S3
  type: sample_data
  finding: Review of 8+ intervention programs across 5 countries with follow-ups up to 30+ years
  programs: Perry Preschool, Jamaica Reach Up, ABC/CARE, MLES, STYL, BAM, CHECC, Balu und Du
  countries: USA, Canada, Jamaica, China, Liberia, Germany
  populations: Predominantly low-SES, ages 0-27
- id: S4
  type: findings
  finding: Personality traits are malleable actions; character develops through habituation and self-control
  empirical_effects:
  - Personality improvements typically 0.15-0.30 SD
  - Labor market gains 20-43% in earnings
  - Crime reduction 7-11 percentage points
  - MLES prosocial effects persist 30+ years
  - STYL CBT effects persist 10 years
  - Dynamic complementarity in skill formation confirmed
- id: S5
  type: validity
  finding: HIGH internal validity (RCTs), MODERATE-HIGH external validity (cross-country replication)
  strengths:
  - Randomized controlled trials with control groups
  - Jamaica-to-China successful replication
  - Consistent across age groups and countries
  limitations:
  - Trait measurement relies on self-reports
  - Identification of theta separate from behavior is difficult
  - Long-term follow-ups have attrition
- id: S6
  type: reproducibility
  finding: MIXED data availability, strong replication evidence
  replication_status:
  - Jamaica to China REACH (successful)
  - BAM two independent studies (consistent)
  - Broad skill formation literature (consistent)
- id: KF-01
  finding: Traits are actions (behaviors), not immutable genetic endowments
  implication: Personality can be shaped by intervention and own effort
- id: KF-02
  finding: Character = settled dispositions to respond reliably across situations
  implication: Character requires consistency across varied contexts
- id: KF-03
  finding: Virtue emerges through commitment to ideal, not fixed trait
  implication: Virtuous behavior requires active choice and effort
- id: KF-04
  finding: 'Self-control model: person with character invokes S_t to override temptation'
  implication: Self-control is a resource that can be developed
- id: KF-05
  finding: 'Habituation model: K_t accumulates through practice'
  implication: Repeated virtuous action builds character (Aristotelian)
- id: KF-06
  finding: Ideal point model with golden mean (sigma* between extremes)
  implication: Virtue is moderation between excess and deficiency
- id: KF-07
  finding: Perry/Jamaica/ABC/China REACH show character skills are malleable
  implication: Early intervention can build character and virtue
key_formulas:
- equation_number: 1
  formula: "P_j = phi_j(theta, e_j)"
  description: Productivity on task j depends on traits and effort
  variables: P_j=productivity, theta=traits, e_j=effort on task j
- equation_number: 2
  formula: "U(X, P, e | I, psi)"
  description: Utility depends on outcomes, productivity, effort given information and preferences
  variables: X=outcomes, P=productivity, e=effort, I=information, psi=preferences
- equation_number: 3
  formula: "a_{i,j,h} = nu_{i,j}(theta, e_{i,j,h}, h)"
  description: Actions depend on traits, effort, and situation context
  variables: a=action, h=situation, theta=traits, e=effort
- equation_number: 14
  formula: "U(X, X_bar) = a'(X - X_bar) + (1/2)(X - X_bar)'B(X - X_bar)"
  description: Ideal point utility - departures from ideal reduce wellbeing (golden mean)
  variables: X_bar=ideal point, a=linear params, B=symmetric negative definite matrix
- equation_number: 19
  formula: "X_1 = (C_U/(C_U + C_A))X_bar + (C_A/(C_U + C_A))X_0"
  description: Adjustment model toward ideal point - practice reduces C_A
  variables: C_U=cost of shortfall, C_A=adjustment cost, X_0=initial state
- equation_number: 20
  formula: "X_a = phi_a(Q_a, Omega_a, K_a, e_{X_a})"
  description: Outcome depends on cognition, personality, skills, and effort
  variables: Q_a=cognition, Omega_a=personality, K_a=other skills, e=effort
- equation_number: 21
  formula: "e_{X_a} = psi_{X_a}(Q_a, Omega_a, K_a, mu_a, psi_a)"
  description: Effort allocation depends on skills, incentives, and preferences
  variables: mu_a=incentives, psi_a=preferences
- equation_number: 22
  formula: "(Q_{a+1}, Omega_{a+1}, K_{a+1}) = eta_a(Q_a, Omega_a, K_a, I_a)"
  description: Skill formation technology - dynamic complementarity
  variables: I_a=investment, eta_a=age-dependent technology
- equation_number: 23
  formula: "X_a = phi'_a(Q_a, Omega_a, P_a, K_a, e_{X_a}, X_{a-1})"
  description: Modified outcome with habituation (Aristotelian moral practice)
  variables: X_{a-1}=previous outcome (habit effect)
