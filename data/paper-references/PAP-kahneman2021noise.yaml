abstract: "This book explores noise—undesirable variability in judgments of the same problem—focusing on its statistical properties and psychological perspectives. While biases are systematic errors leading to consistent inaccuracies, noise is the variability in judgments even when the same decision is made repeatedly. The authors document noise in many fields including medicine, law, economic forecasting, forensic science, bail decisions, and personnel selection. Examples include insurance underwriters varying premiums by 55% for identical cases, and asylum judges admitting anywhere from 5% to 88% of applicants. A recurring statement: wherever there is judgment, there is noise, and more of it than you think."
