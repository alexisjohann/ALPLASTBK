abstract: A growing literature establishes that high quality early childhood interventions targeted toward disadvantaged children
  have substantial impacts on later life outcomes. Little is known about the mechanisms producing these impacts. This paper
  uses longitudinal data on cognitive and personality skills from an experimental evaluation of the influential Perry Preschool
  program to analyze the channels through which the program boosted both male and female participant outcomes. Experimentally
  induced changes in personality skills explain a sizable portion of adult treatment effects. (JEL I21, I24, I28, J13, J24)
