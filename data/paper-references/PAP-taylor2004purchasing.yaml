abstract: Originally propounded by the sixteenth-century scholars of the University of Salamanca, the concept of purchasing
  power parity (PPP) was revived in the interwar period in the context of the debate concerning the appropriate level at which
  to re-establish international exchange rate parities. Broadly accepted as a long-run equilibrium condition in the post-war
  period, it was first advocated as a short-run equilibrium by many international economists in the first few years following
  the breakdown of the Bretton Woods system in the early 1970s and then increasingly came under attack on both theoretical
  and empirical grounds from the late 1970s to the mid 1990s. Accordingly, over the last three decades, a large literature
  has built up that examines how much the data deviated from theory, and the fruits of this research have provided a deeper
  understanding of how well PPP applies in both the short run and the long run. Since the mid 1990s, larger datasets and nonlinear
  econometric methods, in particular, have improved estimation. As deviations narrowed between real exchange rates and PPP,
  so did the gap narrow between theory and data, and some degree of confidence in long-run PPP began to emerge again. In this
  respect, the idea of long-run PPP now enjoys perhaps its strongest support in more than thirty years, a distinct reversion
  in economic thought.  Our willingness to pay a certain price for foreign money must ultimately and essentially be due to
  the fact that this money possesses a purchasing power as against commodities and services in that country. On the other
  hand, when we offer so and so much of our own money, we are actually offering a purchasing power as against commodities
  and services in our own country. Our valuation of a foreign currency in terms of our own, therefore, mainly depends on the
  relative purchasing power of the two currencies in their respective countries.
