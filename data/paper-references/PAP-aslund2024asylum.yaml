title: Limbo or Leverage? Asylum Waiting and Refugee Integration
author: Åslund
year: '2024'
publication_type: journal_article
doi: 10.1016/j.jpubeco.2024.105075
abstract: The study examines labor market and health implications of asylum wait time, a policy margin with bearing on public
  finances. The analysis exploits a rapid and unexpected increase in pending applications, which extended processing times
  with several months for new asylum seekers to Sweden. Longer waiting slows down integration by delaying labor market entry
  and decreasing participation and performance in active policy measures. Accumulated earnings during the first four years
  after application are 2.6 percent lower per added month of waiting. The impact is due to delay, not to negative human capital
  effects of waiting per se. No evidence of deteriorating health due to longer waiting. Once asylum is approved, individuals
  who waited longer perform better on the labor market—the pace of economic integration is quicker. This suggests refugees
  may use wait time to accumulate skills valued in the labor market.
