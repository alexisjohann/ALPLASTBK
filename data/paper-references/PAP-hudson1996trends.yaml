abstract: This paper looks at the growth of multiple-authored papers in eight leading economics journals. In 1950, multiple
  authorship was a relative rarity. By the 1990s, it had become commonplace. An empirical analysis suggests that this growth
  has not been even over time but appears to have been greatest in the mid-1960s and again since the mid-1970s. Possible reasons
  for this growth include developments in computer technology. Its implications for the economics profession are briefly discussed.
