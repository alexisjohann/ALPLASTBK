abstract: Recent research on labor markets in the 1930s has shifted attention from aggregate to disaggregate time series and
  towards microeconomic evidence. The paper begins by reviewing the conventional statistics of the United States labor market
  during the Great Depression and the paradigms to explain them. It then turns to recent studies of employment and unemployment
  using disaggregated data of various types. The paper concludes with discussions of research on other aspects of labor markets
  in the 1930s and on a promising source of microdata for future work.
