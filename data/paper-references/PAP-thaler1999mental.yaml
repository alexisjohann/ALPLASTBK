summary:
  abstract_extended: 'Mental accounting is the set of cognitive operations used by individuals and

    households to organize, evaluate, and keep track of financial activities.

    This paper reviews the components of mental accounting theory and provides

    evidence for mental accounting behavior from various sources.


    The key components are: (1) how outcomes are perceived and experienced, and

    how decisions are made and subsequently evaluated; (2) the assignment of

    activities to specific mental accounts (categories for income and spending);

    (3) the frequency with which accounts are evaluated.


    Mental accounting violates the economic principle of fungibility - money in

    one mental account is not a perfect substitute for money in another. People

    treat windfalls differently from regular income, and losses more painfully

    than equivalent gains.'
  key_findings: "1. MENTAL ACCOUNTS: People categorize money into non-fungible mental accounts\n   (housing, food, entertainment,\
    \ etc.)\n\n2. FUNGIBILITY VIOLATION: Money is not treated as perfectly substitutable\n   across accounts\n\n3. HEDONIC\
    \ EDITING: People frame outcomes to maximize happiness (segregate\n   gains, integrate losses)\n\n4. SUNK COST EFFECTS:\
    \ Mental accounts create sunk cost fallacies (theater\n   tickets, gym memberships)\n\n5. PAYMENT DECOUPLING: Prepayment\
    \ decouples consumption from pain of paying\n\n6. NARROW BRACKETING: Evaluating outcomes separately vs. together affects\n\
    \   risk-taking and choices"
  ebf_relevance: "Domain: CORE-THEORY, DOMAIN-BEHAVIORAL, DOMAIN-FINANCE\n10C Dimensions: WHAT (mental account structure),\
    \ HOW (hedonic editing),\n                AWARE (cognitive organization), HIERARCHY (account nesting)\nTheory Support:\
    \ MS-MA-001 (Mental Accounting), MS-PT-001 (Prospect Theory),\n               MS-HE-001 (Hedonic Editing)\nParameters:\
    \ Account boundaries, fungibility violations, hedonic coefficients"
