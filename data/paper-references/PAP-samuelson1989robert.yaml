abstract: 'Solow is the consummate economist''s economist. He does everything well and with apparent ease. What Ty Cobb was
  to baseball, Solow has been to our generation of economists. But with this difference: Cobb had a will to win that never
  let up. Solow acts as if he has nothing to prove. As an anthropologist who has spent a long lifetime observing achieving
  scholars and scientists, I can report how rare this relaxed approach is and how great must be the natural abilities of anyone
  with it who nevertheless attains the highest rung of the ladder.'
