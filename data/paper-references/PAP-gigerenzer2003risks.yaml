abstract: Bad presentation of medical statistics such as the risks associated with a particular intervention can lead to patients
  making poor decisions on treatment. Particularly confusing are single event probabilities, conditional probabilities (such
  as sensitivity and specificity), and relative risks. How can doctors improve the presentation of statistical information
  so that patients can make well informed decisions?
