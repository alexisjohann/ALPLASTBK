abstract: The bipolar or two-corner solution view of exchange rates is that intermediate policy regimes between hard pegs
  and floating are not sustainable. This paper argues that the proponents of the bipolar view have probably exaggerated their
  point. The right statement is that for countries open to international capital flows, softly pegged exchange rates are crisis-prone
  and not sustainable over long periods. However, a wide variety of flexible rate arrangements remains possible. Monetary
  and exchange rate policy in most countries should not and will not be indifferent to exchange rate movements.
