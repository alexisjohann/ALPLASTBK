abstract: This paper contrasts the job market in economics with the job market in physics and mathematics, which attract students
  who are, by conventional measures, smarter than economists and where the base of knowledge is better established than ours.
  Despite this, economists earn more and have better career prospects than physicists or mathematicians. The paper offers
  several reasons for our better economic prospects, ranging from lack of glamour attracting bright young people to the dismal
  science to our inability to solve important problems, which puts us higher up on the marginal product curve for basic research
  than these fields.
