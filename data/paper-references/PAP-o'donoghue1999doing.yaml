abstract: 'We examine self-control problems—modeled as time-inconsistent, present-biased preferences—in a model where a person
  must do an activity exactly once. We emphasize two distinctions: Do activities involve immediate costs or immediate rewards,
  and are people sophisticated or naive about future self-control problems? Naive people procrastinate immediate-cost activities
  and preproperate—do too soon—immediate-reward activities. Sophistication mitigates procrastination, but exacerbates preproperation.
  Moreover, with immediate costs, a small present bias can severely harm only naive people, whereas with immediate rewards
  it can severely harm only sophisticated people. Lessons for savings, addiction, and elsewhere are discussed. (JEL A12, B49,
  C70, D11, D60, D74, D91, E21)'
