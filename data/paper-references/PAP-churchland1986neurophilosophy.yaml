abstract: Five chapters in the book's first part, Some Elementary Neuroscience, sketch the history of the science of nervous
  systems and provide a general introduction to neurophysiology, neuroanatomy, and neuropsychology. In the second part, Recent
  Developments in the Philosophy of Science, chapters place the mind-body problem within the wider context of the philosophy
  of science. Drawing on recent research in this area, a general account of intertheoretic reduction is explained, arguments
  for a reductionist strategy are developed, and traditional objections from dualists and other anti reductionists are answered
  in novel ways. The third part,  Neurophilosophical Perspective, concludes the book with a presentation and discussion of
  some of the most promising theoretical developments currently under exploration in functional neurobiology and in the connectionist
  models within artificial intelligence research. A Bradford Book.
