abstract: The standard economic model of the family is a ‘common preference’ model that assumes that a family maximizes a
  single utility function and implies that family behavior is independent of which individuals receive income or control resources.
  In recent years, this model has been challenged by game-theoretic models of marriage that do not impose ‘pooling’ and are,
  therefore, consistent with empirical evidence that income controlled by husbands and wives does have different effects on
  family behavior. In this paper, the authors review a number of simple bargaining models and relevant empirical evidence,
  and discuss their implications for distribution within marriage.
