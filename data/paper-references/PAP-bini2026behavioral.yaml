summary:
  abstract: 'This NBER working paper applies behavioral economics frameworks to analyze systematic biases in Large Language
    Models (LLMs). It documents how LLMs exhibit cognitive biases analogous to those found in human decision-making, including
    framing effects, anchoring, and loss aversion patterns. The paper proposes correction mechanisms drawing on debiasing
    techniques from behavioral economics to improve LLM output quality and reliability.

