summary:
  abstract_extended: 'The authors develop a theory of rational addiction in which rationality means

    a consistent plan to maximize utility over time. Strong addiction to a good

    requires a big effect of past consumption of the good on current consumption.


    Such powerful complementarities cause some steady states to be unstable. They

    are an important part of the authors'' analysis because even small deviations

    from the consumption at an unstable steady state can lead to large cumulative

    rises over time in addictive consumption or to rapid falls in consumption to

    abstention.


    Their theory also implies that "cold turkey" is used to end strong addictions,

    that addicts often go on binges, that addicts respond more to permanent than

    to temporary changes in prices of addictive goods, and that anxiety and

    tensions can precipitate an addiction.'
  key_findings: "1. RATIONAL FORWARD-LOOKING BEHAVIOR: Addiction can be modeled as rational,\n   forward-looking behavior\
    \ where current consumption is motivated by both\n   immediate payoff and future effects\n\n2. ADJACENT COMPLEMENTARITY:\
    \ Past consumption increases marginal utility of\n   current consumption - the defining feature of addictive goods\n\n\
    3. UNSTABLE STEADY STATES: Strong complementarities create unstable equilibria\n   where small deviations lead to addiction\
    \ spirals or abstention\n\n4. PRICE RESPONSIVENESS: Addicts respond MORE to permanent price changes than\n   temporary\
    \ ones (forward-looking behavior)\n\n5. COLD TURKEY PREDICTION: Strong addictions are ended abruptly rather than\n   gradually\
    \ due to the nature of unstable steady states\n\n6. BINGE BEHAVIOR: Model explains why addicts go on binges and why stress/\n\
    \   anxiety can trigger addiction"
  ebf_relevance: "Domain: DOMAIN-HEALTH, DOMAIN-BEHAVIORAL, CORE-THEORY\n10C Dimensions: HOW (adjacent complementarity γ),\
    \ WHEN (temporal dynamics),\n                WHAT (utility with habit formation)\nTheory Support: MS-RA-001 (Rational\
    \ Addiction), MS-TP-001 (Time Preferences)\nParameters: Adjacent complementarity drives addiction dynamics"
