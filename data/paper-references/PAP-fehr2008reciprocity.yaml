summary:
  abstract_extended: 'This paper examines who behaves selfishly and why, using evidence from workers

    under different compensation schemes. We compare salaried and piece-rate workers

    to understand how payment structure affects reciprocal behavior.'
  key_findings: "1. COMPENSATION EFFECTS\n   - Piece-rate reduces reciprocity\n   - Salaried workers more cooperative\n  \
    \ - Selection and treatment effects\n\n2. INDIVIDUAL DIFFERENCES\n   - Type heterogeneity\n   - Selfish vs. reciprocal\
    \ types\n   - Context-dependent behavior\n\n3. WORKPLACE IMPLICATIONS\n   - Compensation design matters\n   - Team production\
    \ considerations\n   - Organizational culture"
  ebf_relevance: '10C DIMENSIONS:

    - WHAT (C): Reciprocity preferences

    - WHEN (V): Compensation context

    - WHO (AAA): Worker type heterogeneity


    THEORY SUPPORT:

    - MS-SR-001: Strong Reciprocity

    - Econometrica methodology

    - Personnel economics


    KEY INSIGHT:

    Payment structure affects who behaves selfishly; piece-rate systems select

    for and induce more selfish behavior compared to salary systems.'
