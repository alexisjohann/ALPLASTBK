abstract: >
  This essay argues that understanding labor market power requires a macro perspective.
  Well-identified micro estimates are indispensable for documenting wage-setting power and
  pinning down key elasticities, but labor market power is concentrated among large employers
  in local markets that are themselves highly concentrated. Three mechanisms amplify aggregate
  consequences of monopsony: granularity (individual firm actions move market-wide averages),
  strategic interaction (dominant employers internalize outsized footprint), and misallocation
  (productive firms restrict hiring, pushing workers to less efficient employers). Across different
  approaches and data sources, the median firm pays its workers between 70 and 80 percent of
  their marginal product. Welfare losses total more than 7.6 percent of a typical household's
  lifetime consumption, and wage gains from eliminating labor market power can exceed 30 percent
  in the most concentrated markets. The macro approach reveals that targeted interventions
  (antitrust enforcement, noncompete bans) are more effective than broad-based minimum wages.
