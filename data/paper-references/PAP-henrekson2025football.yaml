abstract: |
  This paper analyzes why competitive balance in European football has deteriorated and proposes market design reforms. Two forces drive the dysfunction: (a) technological innovation that globalized broadcasting and magnified superstar returns via Rosen (1981) effects, and (b) legal rulings (Bosman 1995, Diarra 2024) that boosted player mobility and triggered bidding wars. Using the talent development oligopoly model of Norback, Olsson and Persson (2021), the authors show that superstar salaries have grown 73-88x relative to average workers since 1968 (Haaland at 736x average manufacturing wage vs Charlton at 10x). The paper evaluates reform options including revenue sharing, salary caps, draft mechanisms, cartel taxes, and governance codes — arguing these must be implemented as complementary bundles to preserve Europe's open-league tradition while restoring competitive balance.

research_question: "Why is competition in the European football market failing, how have technological change and legal rulings driven superstar salary inflation and competitive imbalance, and what complementary reform packages could restore competitive balance?"

