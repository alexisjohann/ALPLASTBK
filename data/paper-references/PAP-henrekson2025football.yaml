key_findings_structured:
  - finding: "Superstar salary inflation driven by two complementary forces: broadcasting technology (globalizing audiences per Rosen 1981 superstar theory) and legal rulings (Bosman 1995, Diarra 2024) boosting player mobility — Haaland earns 736x average manufacturing wage vs Charlton's 10x in 1968"
    domain: sports_economics
    effect_size: "73-88x real salary growth since 1968"
  - finding: "Competitive balance has deteriorated as talent concentrates at superclubs — network effects in supporter demand and preemptive bidding create positive feedback loop driving ever-higher superstar premiums relative to average players"
    domain: sports_economics
    effect_size: null
  - finding: "The Diarra ruling (2024 CJEU) further loosens transfer constraints and will likely intensify talent concentration — players can breach contracts more easily, shifting more rent from clubs to star players and agents"
    domain: sports_economics
    effect_size: "transfer record £130M (Isak 2025) vs £4.1M inflation-adjusted (Clarke 1969)"
  - finding: "Reform packages must be complementary bundles (revenue sharing + salary caps + governance + cartel tax) — individual measures are insufficient because they address only one side of the market failure"
    domain: sports_economics
    effect_size: null
  - finding: "Supporter welfare depends on competitive balance as public good — consumer surplus, competitive balance benefits, and identity-related utility are the three components of supporter welfare function"
    domain: sports_economics
    effect_size: null

