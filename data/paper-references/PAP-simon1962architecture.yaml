summary:
  abstract_extended: 'FOUNDATIONAL PAPER on complex systems and hierarchy.


    Simon argues with exceptional clarity for the unavoidability of hierarchies in

    complex systems. He shows how, from an evolutionary perspective, it is much

    more efficient for complex systems to be composed of sub-systems which are

    hierarchically organized.


    Hierarchy is not an accidental feature of complex systems, it is an essential

    one. Complex systems are not simply hierarchical systems. If they were simply

    hierarchical, they would be fully decomposable. Unfortunately they are not

    neatly nested like Russian dolls - there are cross-cutting connections.


    The paper interweaves notions of complexity, hierarchy, modularity, and

    near-decomposability in discussing the evolution and self-organization of

    complex systems.'
  key_findings: "1. NEAR-DECOMPOSABILITY: Complex systems have weak interactions between\n   subsystems, strong interactions\
    \ within subsystems\n\n2. HIERARCHY NECESSITY: Hierarchical structure is essential for complex\n   systems to evolve and\
    \ persist\n\n3. EVOLUTIONARY EFFICIENCY: Hierarchical systems can evolve much faster\n   than non-hierarchical ones (watchmaker\
    \ parable)\n\n4. MODULARITY: Subsystems can be understood and modified semi-independently\n\n5. CROSS-CUTTING CONNECTIONS:\
    \ Real systems not perfectly decomposable -\n   some connections cross hierarchical boundaries\n\n6. GENERAL SYSTEMS:\
    \ Provides framework applicable to physical, biological,\n   and social systems"
