abstract: This paper considers the market for long-term care services to treat and compensate for chronic health conditions
  and disabilities. This paper describes how the long-term care market has evolved and the resulting implications for expenditure
  control. It reviews recent developments in marketing private insurance for long-term care and questions the potential and
  desirability of such insurance. Finally, it discusses the argument for greater public financing within a universal social
  insurance program and alternative approaches to structuring such a program.
