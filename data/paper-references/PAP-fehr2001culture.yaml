summary:
  abstract_extended: 'This paper examines how cooperative norms evolve through cultural
    transmission.

    We develop a model where norms spread through social learning and are

    maintained by punishment of violators. Cultural group selection can favor

    groups with strong cooperative norms, even when such norms are costly to

    individuals.'
  ebf_relevance: '10C DIMENSIONS:

    - WHAT (C): Norms as evolved preferences

    - WHEN (V): Cultural context shapes norms

    - WHO (AAA): Group-level evolution


    THEORY SUPPORT:

    - MS-SN-001: Social Norms

    - MS-SR-001: Strong Reciprocity

    - Cultural evolution approach


    KEY INSIGHT:

    Cooperative norms evolve through cultural transmission and are maintained

    by punishment; cultural group selection favors cooperative societies.'
  key_findings: "1. CULTURAL TRANSMISSION\n   - Norms spread through social learning\n\
