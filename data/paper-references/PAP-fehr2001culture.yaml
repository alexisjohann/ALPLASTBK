abstract: Evolution of cooperative norms is studied in a population where individual-
  and group-level selection are both in operation. Individuals play indirect reciprocity
  game within their group. Individuals are well informed about the previous actions
  and reputations, and follow second-order norms. Individuals are norm-followers,
  and imitate their successful group mates. In contrast to previous models where norms
  classify actions deterministically, we assume that norms determine only the probabilities
  of actions, and mutants can differ in these probabilities. The central question
  is how a selective cooperative norm can emerge in a population where initially only
  non-cooperative norms were present. It is shown that evolution leads to a cooperative
  state if generous cooperative strategies are dominant, although the "always defecting"
  and the "always cooperating"-like strategies remain stably present. The characteristics
  of these generous cooperative strategies and the presence of always defecting and
  always cooperating strategies are in concordance with experimental observations.
