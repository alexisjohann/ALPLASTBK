abstract: … The peculiar character of the problem of a rational economic order is determined precisely by the fact that the
  knowledge of the circumstances of which we must make use never exists in concentrated or integrated form, but solely as
  the dispersed bits of incomplete and frequently contradictory knowledge which all the separate individuals possess. The
  economic problem of society is thus not merely a problem … And this, in turn, depends on whether we are more likely to succeed
  in putting at the disposal of a single …
