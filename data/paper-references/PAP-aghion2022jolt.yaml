abstract: By operationalizing the notion of creative destruction, Schumpeterian growth theory generates distinctive predictions
  on important microeconomic aspects of the growth process (competition, firm dynamics, firm size distribution, cross-firm
  and cross-sector reallocation) which can be confronted using rich micro data. In this process the theory helps reconcile
  growth with industrial organization and development economics.
