abstract: Summa Theologica (originally Summa Theologiae) is the principal work of Saint
  Thomas Aquinas, written between 1265 and 1273 as a comprehensive summation of all
  known theological learning. The work is organized into three Parts - the First Part
  addresses God and creation, the Second Part deals with man and morality (subdivided
  into general principles and particular virtues/vices), and the Third Part discusses
  Christ as mediator between God and man. The treatise employs the Scholastic method,
  synthesizing Aristotelian philosophy with Christian doctrine through systematic
  questions and articles. A key distinction is made between ratio (discursive reasoning)
  and intellectus (immediate insight), foundational for understanding intelligence
  as more than computation. The work represents a critical encounter between Hellenism
  and Christianity, drawing from Jewish, Islamic, and pagan Greek sources alongside
  Christian scripture.
