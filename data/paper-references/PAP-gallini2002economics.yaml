abstract: U.S. patent reform over the past two decades has strengthened the legal enforcement of patent rights and has extended
  protection to new subject matter, such as genetically engineered life forms and business methods. This paper highlights
  these and other policy changes and the debate that this apparent increase in protection has sparked. While the case for
  stronger patents as a spur to innovation is a weak one, as revealed by recent theoretical and empirical research, evidence
  that they encourage disclosure and technology transfer is persuasive. The paper discusses the social costs and benefits
  of these effects from the policy changes and proposals for alleviating the costs through further patent reform.
