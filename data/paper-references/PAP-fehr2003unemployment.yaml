summary:
  abstract_extended: 'This paper examines the relationship between unemployment and wage fairness.

    We argue that fairness concerns help explain wage rigidity and persistent

    unemployment. When workers perceive wages as unfair, they reduce effort,

    creating incentives for firms to pay above market-clearing wages.'
  key_findings: "1. FAIRNESS AND WAGES\n   - Fair wages elicit effort\n   - Unfair wages punished\n   - Gift exchange equilibrium\n\
    \n2. WAGE RIGIDITY\n   - Downward rigidity explained\n   - Efficiency wage mechanism\n   - Fairness-based\n\n3. UNEMPLOYMENT\n\
    \   - Persistent unemployment\n   - Not purely voluntary\n   - Efficiency implications"
