title: Are People Conditionally Cooperative? Evidence from a Public Goods Experiment
author: Fischbacher
year: '2001'
publication_type: journal_article
doi: 10.1016/S0165-1765(01)00394-0
abstract: This influential Economics Letters paper investigates whether people are conditionally cooperative in public goods
  games. Using a novel experimental design where subjects can condition their contribution on others' contributions, the authors
  find that about 50% of subjects are conditional cooperators who increase contributions when others contribute more. Only
  about 30% are free-riders. The findings have important implications for understanding cooperation and designing institutions.
