abstract: This paper shows that measurable managerial characteristics have significant explanatory power for corporate financing
  decisions beyond traditional capital-structure determinants. First, managers who believe their firm is undervalued view
  external financing as overpriced, especially equity, and such overconfident managers use less external finance and issue
  less equity than peers. Second, CEOs who grew up during the Great Depression are averse to debt and lean excessively on
  internal finance. Third, CEOs with military experience pursue more aggressive policies including heightened leverage. Complementary
  measures of CEO traits based on press portrayals confirm the results.
