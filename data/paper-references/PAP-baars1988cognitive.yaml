abstract: 'List of figures and tables Preface Part I. Introduction: 1. What is to be explained? some preliminaries Part II.
  The Basic Model: 2. Model 1: conscious representations are internally consistent and globally distributed 3. The neural
  basis of conscious experience Part III. The Fundamental Role of Context: 4. Model 2: unconscious contexts shape conscious
  experience 5. Model 3: conscious experience is informative - it always demands some degree of adaptation Part IV. Goals
  and Voluntary Control: 6. Model 4: Goal contexts, spontaneous problem solving, and the stream of consciousness 7. Model
  5: volition as ideomotor control of thought and action Part V. Attention, self, and conscious self-monitoring: 8. Model
  6: attention as control of access to consciousness 9. Model 7. Self as the dominant context of experience and action Part
  VI. Consciousness is Functional: 10. The functions of consciousness Part VII. Conclusion: 11. A summary and some future
  directions Glossary and guide to theoretical claims References Name index, Subject index.'
