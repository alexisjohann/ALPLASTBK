abstract: A central tenet of economics is that individuals respond to incentives.
  For psychologists and sociologists, in contrast, rewards and punishments are often
  counterproductive, because they undermine "intrinsic motivation". We reconcile these
  two views, showing how performance incentives offered by an informed principal (manager,
  teacher, parent) can adversely impact an agent's (worker, child) perception of the
  task, or of his own abilities. Incentives are then only weak reinforcers in the
  short run, and negative reinforcers in the long run. We also study the effects of
  empowerment, help and excuses on motivation, as well as situations of ego bashing
  reflecting a battle for dominance within a relationship. Copyright 2003, Wiley-Blackwell.
