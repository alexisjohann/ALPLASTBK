abstract: In this essay, I begin by identifying the reasons that automation has not wiped out a majority of jobs over the
  decades and centuries. Automation does indeed substitute for labor—as it is typically intended to do. However, automation
  also complements labor, raises output in ways that leads to higher demand for labor, and interacts with adjustments in labor
  supply. Journalists and even expert commentators tend to overstate the extent of machine substitution for human labor and
  ignore the strong complementarities between automation and labor that increase productivity, raise earnings, and augment
  demand for labor. Changes in technology do alter the types of jobs available and what those jobs pay. In the last few decades,
  one noticeable change has been a “polarization” of the labor market, in which wage gains went disproportionately to those
  at the top and at the bottom of the income and skill distribution, not to those in the middle; however, I also argue, this
  polarization and is unlikely to continue very far into future. The final section of this paper reflects on how recent and
  future advances in artificial intelligence and robotics should shape our thinking about the likely trajectory of occupational
  change and employment growth. I argue that the interplay between machine and human comparative advantage allows computers
  to substitute for workers in performing routine, codifiable tasks while amplifying the comparative advantage of workers
  in supplying problem-solving skills, adaptability, and creativity.
