abstract: This paper analyzes and explains the dynamics of corporate evolution in the context of anthropologist conception
  of culture. The multinational corporate characterizing the Galbraithian world, as The New Industrial State, dominates the
  current economic landscape. The conception of corporate culture and its dynamics lays bare the locus of corporate power
  which resides in the control of corporate technology. Granting this dynamic, the question then arises concerning the agency
  which controls the application and use of this cumulated corporate power. Corporate power and policy in the USA are currently
  directed by a social institution in the form of profits without social responsibility. This policy is manifest in a “low
  road” of cost reduction. Such a policy direction exacerbates rather than ameliorates the current economic malaise now characterizing
  the US economy.
