abstract: 'This paper develops a formal model of how corporate culture evolves over time and what drives its dynamics.
  Building on Van den Steen (2010) and Gibbons and Henderson (2012), the paper models culture as the set of shared
  expectations about "what is normal" (behavioral norms) and "what is valued" (organizational values) within a firm.
  Culture changes through selection (hiring and attrition), socialization (incumbent influence on newcomers), and
  external shocks. The model predicts that culture change is inherently slow (2-5 year horizons), that attempted rapid
  culture change often fails due to complementarities between cultural elements, and that culture depreciation rates
  vary systematically across organizational dimensions.'
