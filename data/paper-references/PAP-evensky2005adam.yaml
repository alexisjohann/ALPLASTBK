abstract: 'This essay describes Smith''s analysis of ethics in his Theory of Moral Sentiments: the interaction of our nature
  and our nurturing that makes common civic ethics possible and the dynamic interaction of individuals and extant societal
  constructions that can lead to ever more mature systems of civic ethics and thus toward those conditions necessary for a
  constructive, sustainable liberal system.'
