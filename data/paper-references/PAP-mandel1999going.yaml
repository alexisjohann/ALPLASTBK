abstract: The use of economists as expert witnesses and consultants has grown dramatically in recent years, driven by such
  factors as the explosion of mergers and acquisitions. On the plus side, the expert witness boom will likely lead to better
  regulatory and legal decisions, while infusing real-world examples into classroom teaching. Yet the growing importance of
  consulting income could divert time and energy away from academic research and teaching, while impeding intellectual debate.
  A new standard of behavior for academic economists who serve as expert witnesses and consultants may be needed, including
  full disclosure of clients.
