abstract: This article discusses the question of data and our perspective on the importance of public, accessible, and contemporaneous
  data in the face of public crisis. Then, we present data on the extent of school closures during the COVID-19 pandemic,
  both globally and within the United States. We describe the available data on the degree of these closures, which will provide
  a set of resources for studying longer-term consequences as they emerge. We also highlight what we know about the demographic
  patterns of school closures. We then discuss the emerging estimates of the short-term impacts of school closures. A central
  finding throughout our discussion is that school closures during the pandemic tended to increase inequality, both within
  and across countries, but that fully understanding the long-run impact of COVID-related school closures on students will
  take time and will surely be influenced by events and policies in the next few years.
