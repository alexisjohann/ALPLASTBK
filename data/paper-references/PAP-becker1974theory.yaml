abstract: I present in this paper the skeleton of a theory of marriage. The two basic assumptions are that each person tries
  to do as well as possible and that the" marriage market" is in equilibrium. With the aid of several additional simplifying
  assumptions, I derive a number of significant implications about behavior in this market. For example, the gain to a man
  and woman from marrying compared to remaining single is shown to depend positively on their incomes, human capital, and
  relative difference in wage rates. The theory also implies that …
