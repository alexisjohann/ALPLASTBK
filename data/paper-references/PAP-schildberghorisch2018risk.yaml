abstract: It is ultimately an empirical question whether risk preferences are stable over time. The evidence comes from diverse
  strands of literature, covering the stability of risk preferences in panel data over shorter periods of time, life-cycle
  dynamics in risk preferences, the possibly long-lasting effects of exogenous shocks on risk preferences as well as temporary
  variations in risk preferences. Individual risk preferences appear to be persistent and moderately stable over time, but
  their degree of stability is too low to be reconciled with the assumption of perfect stability in neoclassical economic
  theory. We offer an alternative conceptual framework for preference stability that builds on research regarding the stability
  of personality traits in psychology. The definition of stability used in psychology implies high levels of rank-order stability
  across individuals and not that the individual will maintain the same level of a trait over time. Preference parameters
  are considered as distributions with a mean that is significantly but less than perfectly stable, plus some systematic variance.
  This framework accommodates evidence on systematic changes in risk preferences over the life cycle, due to exogenous shocks
  such as economic crises or natural catastrophes, and due to temporary changes in self-control resources, emotions, or stress.
  We note that research on the stability of (risk) preferences is conceptually at the heart of microeconomics and systematic
  changes in risk preferences have vital real-world consequences.
