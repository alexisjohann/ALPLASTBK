abstract: As the U.S. economy works through a sluggish recovery several years after the Great Recession technically came to
  an end in June 2009, it can only look with horror toward Japan's experience of two decades of stagnant growth since the
  early 1990s. In contrast to Japan, U.S. policy authorities responded to the financial crisis since 2007 more quickly. Surely,
  they learned from Japan's experience. I will begin by describing how Japan's economic situation unfolded in the early 1990s
  and offering some comparisons with how the Great Recession unfolded in the U.S. economy. I then turn to the Bank of Japan's
  policy responses to the crisis and again offer some comparisons to the Federal Reserve. I will discuss the use of both the
  conventional interest rate tool—the federal funds rate in the United States, and the “call rate” in Japan—and nonconventional
  measures of monetary policy and consider their effectiveness in the context of the rest of the financial system.
