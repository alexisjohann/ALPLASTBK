abstract: Presents results from a survey of 450 new (1996-97) Ph.D. economists, providing information about employment, underemployment,
  employers, work activities, salaries, and job satisfaction. Comparisons are made across ranks of the graduates' Ph.D. programs,
  sectors of employment and subfields of economics, as well as over time. Labor market outcomes for economists also are compared
  with those of seven other disciplines. Results indicate that a growing proportion of new economics Ph.D.s start their careers
  in business or industry, that an international market for new economics Ph.D.s is evolving, and that job outcomes for economists
  compare favorably with new Ph.D.s in many other disciplines.
