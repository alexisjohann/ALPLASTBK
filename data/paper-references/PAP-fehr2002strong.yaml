summary:
  abstract_extended: 'Strong reciprocity is a behavioral disposition to cooperate conditionally on

    others'' cooperation and to punish non-cooperators, even if punishment is

    costly and yields no material benefit for the punisher. We present evidence

    from economic experiments showing that strong reciprocity is a powerful force

    for the enforcement of social norms and the maintenance of cooperation.'
  key_findings: "1. STRONG RECIPROCITY DEFINED\n   - Cooperate if others cooperate (positive reciprocity)\n   - Punish defectors\
    \ even at personal cost (negative reciprocity)\n   - Not explained by reputation or repeated game incentives\n   - Operates\
    \ even in anonymous one-shot interactions\n\n2. NORM ENFORCEMENT\n   - Strong reciprocators enforce social norms\n   -\
    \ Punishment deters free riding\n   - Creates cooperation even among selfish individuals\n   - Second-order free-rider\
    \ problem mitigated\n\n3. EVOLUTIONARY PERSPECTIVE\n   - Strong reciprocity may have evolved through group selection\n\
    \   - Culturally stable equilibrium\n   - Coevolution of cooperation and punishment norms\n\n4. EXPERIMENTAL EVIDENCE\n\
    \   - Public goods games with punishment\n   - Third-party punishment experiments\n   - Cross-cultural evidence of strong\
    \ reciprocity"
  ebf_relevance: '10C DIMENSIONS:

