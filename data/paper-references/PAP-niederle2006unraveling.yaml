title: The Effects of Centralized Clearinghouses on Market Design
author: Niederle
year: '2006'
publication_type: journal_article
doi: 10.1016/j.geb.2005.04.001
abstract: The entry-level market for American gastroenterologists was organized by a centralized clearinghouse from 1986 to
  1996, while before and after it operated via a decentralized market where appointment dates unraveled to over a year before
  employment start. Examining career paths shows that both before and after centralized clearinghouse years, gastroenterologists
  were less mobile and more likely to be employed at the same hospital where they were internal medicine residents. This suggests
  clearinghouses serve not only to coordinate timing but also increase market scope compared to decentralized markets with
  early appointments and exploding offers.
