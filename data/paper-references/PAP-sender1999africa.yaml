abstract: Historical and micro-survey evidence, as well as the standard data from international organizations, support less
  pessimistic conclusions on Africa's development performance than those reached by many social scientists. The changes that
  have benefited women over the last four decades are highlighted; a discussion of growth in agricultural production follows.
  However, the complexity and the brutality of processes of social and economic change in Sub-Saharan African economies are
  also stressed. The theoretical implications of these complexities have not been adequately analyzed by World Bank economists.
  The Bank's recent efforts to reassess its policies are, therefore, unlikely to achieve the results anticipated.
