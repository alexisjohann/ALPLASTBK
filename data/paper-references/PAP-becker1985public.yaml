abstract: This paper presents a model of competition among special interest groups for political influence. Each active group
  exerts pressure to affect its taxes and subsidies, where activities of different groups are related by the equality between
  total tax collections and total tax subsidies. The dead weight costs and benefits of taxes and subsidies play a major role
  in our model. An increase in the dead weight cost of taxation encourages pressure by taxpayers, while an increase in the
  dead weight costs of subsidies discourages pressure by recipients. Various applications of the analysis are discussed.
