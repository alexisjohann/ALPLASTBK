summary:
  abstract_extended: 'China''s emergence as a great economic power has induced an epochal shift in

    patterns of world trade. Simultaneously, it has challenged much of the received

    empirical wisdom about how labor markets adjust to trade shocks. Alongside the

    heralded consumer benefits of expanded trade are substantial adjustment costs

    and distributional consequences. These impacts are most visible in the local

    labor markets in which the industries exposed to foreign competition are

    concentrated.


    Adjustment in local labor markets is remarkably slow, with wages and labor-force

    participation rates remaining depressed and unemployment rates remaining elevated

    for at least a full decade after the China trade shock commences. Exposed workers

    experience greater job churning and reduced lifetime income.


    At the national level, employment has fallen in the US industries more exposed

    to import competition, as expected, but offsetting employment gains in other

    industries have yet to materialize. Better understanding when and where trade

    is costly, and how and why it may be beneficial, are key items on the research

    agenda for trade and labor economists.'
  key_findings: "1. SLOW ADJUSTMENT: Local labor markets take a decade+ to adjust to trade\n   shocks - much slower than standard\
    \ models predict\n\n2. PERSISTENT EFFECTS: Wages and labor force participation remain depressed\n   long after shock commences\n\
    \n3. LOCAL CONCENTRATION: Impacts most visible in communities with exposed\n   industries\n\n4. NO OFFSETTING GAINS: Expected\
    \ job gains in other industries have not\n   materialized\n\n5. DISTRIBUTIONAL: Trade produces both consumer benefits\
    \ and concentrated\n   worker losses\n\n6. JOB CHURNING: Affected workers experience more job turnover and reduced\n \
    \  lifetime earnings"
