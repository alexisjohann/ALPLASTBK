abstract: More than two decades ago the Brookings Institution first published a book with the title of this lecture. The idea
  behind the book was straightforward—rather than being led by events, or falling into the trap of incremental budgeting,
  budgetary planners should try to set priorities. They should figure out where the country and its government budget should
  be some years hence, and use this priority-setting exercise as a road map on how to get there. In this lecture, I revisit
  the topic of setting national priorities. The ultimate message is that both the peace dividend and the recession should
  be viewed as highly visible diversions from what should be the main economic priorities this year. This year, as in other
  years, economic policy should go beyond advocating simple shifts of resources and delve into deeper questions of structural
  reforms.
