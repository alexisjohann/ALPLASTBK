abstract: For more than three decades, critics and supporters of affirmative action have fought for the moral high ground
  through ballot initiatives and lawsuits, in state legislatures, and in varied courts of public opinion. The goal of this
  paper is to show the clarifying power of economic reasoning to dispel some myths and misconceptions in the racial affirmative
  action debates. We enumerate seven commonly held (but mistaken) views one often encounters in the folklore about affirmative
  action (affirmative action may involve goals and timelines, but definitely not quotas, e.g.). Simple economic arguments
  reveal these seven views to be more myth than fact.
