abstract: 'Survey questions are a key input into social science research. We develop
  a model of survey response behavior that studies how limited self-knowledge affects
  survey evidence. We derive a simple estimator for self-knowledge: the ratio of between-
  to within-person variance of repeated survey answers. We validate the estimator
  in an experiment and show how accounting for limited self-knowledge can improve
  the use of survey evidence.'
