summary:
  abstract_extended: This paper develops a model of survey response behavior under
    limited self-knowledge. The key innovation is a simple estimator τ = σ²_between
    / σ²_within that measures self-knowledge from repeated survey responses. The estimator
    is validated experimentally using a dot estimation task where true self-knowledge
    is controlled. Applied to Big Five personality data from SOEP, the paper shows
    substantial heterogeneity in self-knowledge (κ ranging from 0.30 at 10th percentile
    to 0.81 at 90th percentile). Critically, subsetting on high-τ respondents improves
    predictive R² by 2-3 times, demonstrating major practical implications for survey-based
    research.
  key_findings: "1. SELF-KNOWLEDGE ESTIMATOR: τ = σ²_B / σ²_W identifies self-knowledge\n\
    \   from repeated survey responses\n\n2. VALIDATION: Experimental validation shows\
    \ r = 0.94 correlation between\n   estimated and true self-knowledge\n\n3. HETEROGENEITY:\
    \ Large individual differences in self-knowledge\n   (κ = 0.30 to 0.81 across\
    \ population)\n\n4. PREDICTIVE VALIDITY: Subsetting on high-τ respondents improves\n\
    \   R² by 2-3 times for personality → outcomes\n\n5. RATIONAL INATTENTION: Self-knowledge\
    \ is endogenous,\n   depends on stakes and type variance\n\n6. QUESTION DESIGN:\
    \ Different formulations yield different τ,\n   enabling optimization of survey\
    \ instruments\n\n7. MINIMUM REPETITIONS: 3 repetitions needed for stable τ,\n\
    \   5 recommended for individual-level estimates"
  ebf_relevance: "Domain: CORE-AWARE, METHOD-SURVEY, CORE-WHO\n10C Dimensions: AWARE\
    \ (self-knowledge as awareness), WHO (heterogeneity in κ),\n              HOW\
