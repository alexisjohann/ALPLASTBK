abstract: This influential book offers a physicalist account of consciousness based
  on the 'Multiple Drafts Model' - a cognitivist theory viewing the mind in terms
  of information processing. Dennett argues there is no single central place (a 'Cartesian
  Theater') where conscious experience occurs; instead, various events of content-fixation
  occur at various places and times in the brain through parallel, multitrack processes
  of interpretation and elaboration. The conscious self exists as an abstraction -
  a 'center of narrative gravity' analogous to a body's center of mass. Controversially,
  Dennett argues that qualia cannot exist as traditionally described, claiming their
  attributed properties (incorrigible, ineffable, private, directly accessible) are
  mutually incompatible and thus incoherent.
