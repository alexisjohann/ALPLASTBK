title: Heterogeneous Social Preferences and the Dynamics of Free Riding in Public Goods
author: Fischbacher
year: '2006'
publication_type: working_paper
doi: null
doi_missing_reason: working_paper
abstract: This paper examines how heterogeneous social preferences shape the dynamics of free riding in public goods games.
  Using experimental data, the authors identify different types of contributors - conditional cooperators who match others'
  contributions, free riders who contribute nothing regardless of others, and triangle contributors who increase contributions
  up to a point then decrease. The analysis shows that the decline in contributions over repeated games results from the interaction
  between these types, as conditional cooperators reduce their contributions in response to free riders, leading to a downward
  spiral. The paper provides a theoretical framework explaining why cooperation decays in public goods settings and how heterogeneous
  preferences determine collective outcomes.
