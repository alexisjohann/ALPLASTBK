abstract: By many measures a revolution in living conditions is sweeping the world. Most people today are better fed, clothed,
  and house than their predecessors two centuries ago. They are healthier, live longer, and are better educated. Women's lives
  are less centered on reproduction, and political democracy has gained a foothold. Current international differences in a
  number of standard of living indicators are significantly correlated. Historically, however, these improvements often started
  at quite different times, suggesting that the determinants of change in different aspects of the standard of living are
  varied.
