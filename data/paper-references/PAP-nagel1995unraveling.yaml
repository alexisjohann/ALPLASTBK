abstract: |
  This paper studies a guessing game where players simultaneously choose
  numbers in [0,100], and the winner is closest to p times the mean (where
  p < 1). Nash equilibrium predicts all players choose zero. Experimentally,
  players engage in limited depth of reasoning (level-k thinking), with most
  at levels 1-2. Over four repeated rounds, choices gradually unravel toward
  equilibrium but rarely reach zero. The game provides strong evidence for
  bounded rationality and demonstrates how mental processes incorporate beliefs
  about others' behavior through finite depth of reasoning.

key_findings_structured:
  - title: "Limited Depth of Reasoning (Level-k)"
    finding: "Most players engage in level-1 or level-2 reasoning rather than full Nash equilibrium reasoning. The modal response corresponds to one or two steps of iterated best response from a naive starting point."
  - title: "Gradual Unraveling Toward Equilibrium"
    finding: "Over repeated rounds, choices move toward Nash equilibrium (zero) but rarely reach it fully, demonstrating path-dependent learning with incomplete convergence."
  - title: "Heterogeneous Reasoning Levels"
    finding: "The population exhibits a distribution of reasoning levels from L0 (random/naive) through L3+, not uniform strategic sophistication. This heterogeneity is a robust empirical regularity."
  - title: "Parameter p Affects Convergence Speed"
    finding: "Games with different p values show different rates of convergence toward equilibrium, with lower p leading to faster unraveling as the Nash equilibrium becomes more 'obvious'."

