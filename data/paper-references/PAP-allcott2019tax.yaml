abstract: Taxes on sugar-sweetened beverages are growing in popularity and have generated an active public debate. Are they
  a good idea? If so, how high should they be? Are such taxes regressive? People in the United States and some other countries
  consume remarkable quantities of sugar-sweetened beverages, and the evidence suggests that this generates significant health
  costs. Building on recent work, we review the basic economic principles that determine the socially optimal sugar-sweetened
  beverage tax. The optimal tax depends on (1) externalities, or uninternalized health system costs from diseases caused by
  sugary drink consumption; (2) internalities, or costs consumers impose on themselves by consuming too many sugary drinks
  due to poor nutrition knowledge and/or lack of self-control; and (3) regressivity, or how much the financial burden and
  the internality benefits from the tax fall on the poor. We summarize the empirical evidence about the key parameters that
  determine how large the tax should be. Our calculations suggest that sugar-sweetened beverage taxes are welfare enhancing
  and indeed that the optimal sugar-sweetened beverage tax rate may be higher than the 1 cent per ounce rate most commonly
  used in US cities. We end with seven concrete suggestions for policymakers considering a sugar-sweetened beverage tax.
