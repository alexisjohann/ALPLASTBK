abstract: Gender differences in voting patterns and political attitudes towards redistribution are well-documented. The experimental
  gender literature suggests several plausible behavioral explanations behind these differences, relating to gender differences
  in confidence concerning future relative income position, risk aversion, and social preferences. We use data from lab experiments
  on preferences for redistribution conducted in the US and several European countries to investigate gender differences and
  their causes. On aggregate, women’s demand for redistribution is higher than men’s, but the differences vary considerably
  across locations and countries. Moreover, the gender difference appears only when the source of inequality is based on relative
  abilities, but not when it is based on luck. Our most robust finding is that across all sampled locations, men’s relatively
  higher (over) confidence in their abilities, in comparison to women, leads them to specify lower redistribution levels.
  We discuss the role of confidence in accounting for gender differences in political and redistributive choices outside the
  lab.
