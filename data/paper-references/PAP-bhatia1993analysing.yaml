abstract: This book examines the theory of genre analysis, looks at genre analysis
  in action taking texts from a wide variety of genres, and discusses the use of genre
  analysis in language teaching and language reform. The main goal of genre analysis
  is not to find out how genres are written but why they are written the way they
  are. Bhatia presents a model for genre analysis consisting of seven steps which
  should be followed for a comprehensive investigation of any genre. The book offers
  a clear, authoritative guide to the analysis of genre, which relates work in sociolinguistics,
  text linguistics and discourse analysis to the study of specialist areas of language.
  Topics include cross-cultural variation in job application letters, legal discourse
  analysis, and comparison of abstracts and research introductions.
