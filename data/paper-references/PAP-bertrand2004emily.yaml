abstract: We study race in the labor market by sending fictitious resumes to help-wanted ads in Boston and Chicago newspapers.
  To manipulate perceived race, resumes are randomly assigned African-American- or White-sounding names. White names receive
  50 percent more callbacks for interviews. Callbacks are also more responsive to resume quality for White names than for
  African-American ones. The racial gap is uniform across occupation, industry, and employer size. We also find little evidence
  that employers are inferring social class from the names. Differential treatment by race still appears to still be prominent
  in the U.S. labor market.
