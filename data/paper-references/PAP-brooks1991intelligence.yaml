title: Intelligence Without Representation
author: Brooks
year: '1991'
publication_type: journal_article
doi: 10.1016/0004-3702(91)90053-M
abstract: When intelligence is approached in an incremental manner, with strict reliance on interfacing to the real world
  through perception and action, reliance on representation disappears. Rather than viewing intelligent systems as independent
  information processing units which must interface to each other via representations, intelligent systems should be decomposed
  into independent and parallel activity producers which all interface directly to the world through perception and action.
  This paper proposes the removal of explicit representations and engineered environments from robotic intelligence experimentation,
  in favour of an evolutionary-inspired approach using layers of reactive behaviour that operate independently of each other.
  Based on these principles, a successful series of mobile robots were built which operate without supervision as Creatures
  in standard office environments.
