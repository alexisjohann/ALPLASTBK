abstract: 'Using a sample of all academics who pass through top 50 economics and finance departments from 1996 through 2014,
  we study whether the granting of tenure leads faculty to pursue riskier ideas. We use the extreme tails of ex-post citations
  as our measure of risk and find that both the number of publications and the portion consisting of “home runs” peak at tenure
  and fall steadily for a decade thereafter. Similar patterns hold for faculty at elite (top 10) institutions and for faculty
  who take differing time to tenure. We find the opposite pattern among poorly cited publications: their numbers rise post-tenure.'
