key_equations:
- name: General Self-Image Utility
  equation: U = u(a, θ) + μ · v(σ) where σ = E[θ|I]
  context: Core utility with self-image component
  section: '2.1'
- name: Anticipatory Utility (Caplin-Leahy)
  equation: U = E[v(c)] + λ_A · E_0[E[v(c)|ξ]]
  context: Utility includes anticipated future consumption
  section: '2.2'
- name: Self-Signaling Utility
  equation: U_S = E[v(σ)|I] where σ updates via Bayes
  context: Actions as signals about type
  section: '3.1'
- name: Diagnostic Utility
  equation: v(σ) = σv(1) + (1-σ)v(0)
  context: Linear value of self-perceived type
  section: '3.2'
- name: Motivated Beliefs (Brunnermeier-Parker)
  equation: max_π [U(a*(π), π) + κ · D(π||π_0)]
  context: Optimal beliefs trading off utility and accuracy
  section: '4.1'
- name: Selective Memory
  equation: ρ(a) = P(recall|action a)
  context: Action-dependent recall probability
  section: '4.2'
- name: Dual-Self (Laibson)
  equation: W_0 = max[u(c_0) + β·δ·u(c_1)]
  context: Quasi-hyperbolic preferences
  section: '5.1'
- name: Information Value with Ego
  equation: V(info) = V_instrumental - V_ego_loss
  context: Trade-off driving information avoidance
  section: '4.3'
