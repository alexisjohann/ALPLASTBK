title: Identity as Self-Image
author: Bénabou, Roland; Henkel, Luca
year: '2025'
publication_type: handbook_chapter
booktitle: Handbook of the Economics of Identity
publisher: Elsevier
note: NBER Working Paper No. 34297
doi: 10.3386/w34297
abstract: 'This chapter surveys economic models of identity based on self-image concerns—the

  desire to see or present oneself as a certain type of person. We first present a

  general framework unifying past approaches: the value of any object, action, or

  belief, in terms of its implications for the agent''s perception (conscious or

  unconscious) of who they are. We then use this framework to organize the

  literature and highlight how different specifications within this paradigm can

  account for a wide variety of phenomena, while potentially leading to different

  predictions in other situations. Key areas covered include motivated beliefs,

  selective memory, self-signaling, information avoidance, anticipatory utility,

  and dual-self models.

  '
abstract_fetched: '2026-02-04'
abstract_source: full_paper
structural_characteristics:
  S1_research_question: 'How do self-image concerns—the desire to see or present oneself
    as a certain

    type of person—shape economic behavior, beliefs, memory, and information

    processing? What is the unified framework that captures diverse approaches

    to belief-based identity?

    '
  S2_methodology: 'Theoretical framework development. Comprehensive literature survey
    and synthesis.

    Formal mathematical models covering: (1) anticipatory utility and savoring,

    (2) self-signaling and diagnostic utility, (3) motivated beliefs and memory,

    (4) information avoidance, (5) dual-self models. Game-theoretic analysis of

    multiple-selves and intertemporal choice.

    '
  S3_sample_data: 'Handbook chapter - comprehensive literature review of 200+ papers
    spanning

    experimental economics, psychology, neuroscience, and behavioral economics.

    Covers evidence from lab experiments, field studies, and natural experiments.

    '
  S4_findings: '(1) Unified framework: all self-image models share core structure
    where

    utility depends on self-perceived type v̂(σ). (2) Three main approaches

    differ in timing: anticipatory (future consumption), contemporaneous

    (self-esteem), retrospective (past selves). (3) Self-signaling creates

    diagnostic utility from actions. (4) Motivated beliefs require imperfect

    recall or self-deception costs. (5) Information avoidance emerges from

    asymmetric updating or ego utility. (6) Dual-self models capture

    self-control via multiple agents with different preferences.

    '
  S5_validity: 'Strong theoretical validity from comprehensive synthesis of established

    models. External validity supported by extensive experimental and field

    evidence reviewed. Framework successfully unifies disparate approaches

    (Bénabou-Tirole, Köszegi, Caplin-Leahy, Brunnermeier-Parker).

    '
  S6_reproducibility: 'All models formally specified with clear assumptions. Mathematical

    derivations complete. Building blocks clearly defined. Notation table

    provided. Cross-references to original papers included.

    '
