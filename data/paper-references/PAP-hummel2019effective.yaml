abstract: Abstract Changes in the choice architecture, so-called nudges, have been employed in a variety of contexts to alter
  people's behavior. Although nudging has gained a widespread popularity, the effect sizes of its influences vary considerably
  across studies. In addition, nudges have proven to be ineffective or even backfire in selected studies which raises the
  question whether, and under which conditions, nudges are effective. Therefore, we conduct a quantitative review on nudging
  with 100 primary publications including 317 effect sizes …
