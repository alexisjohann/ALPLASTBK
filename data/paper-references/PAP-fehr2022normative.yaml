summary:
  abstract_extended: 'This review examines the relationship between social norms, cooperation,

    and inequality. We discuss how social norms shape economic behavior and

    how inequality affects norm compliance and enforcement. Understanding

    this interplay is crucial for designing policies that promote cooperation

    and reduce harmful inequality.'
  key_findings: "1. NORMS AND COOPERATION\n   - Cooperation norms vary across societies\n   - Norm strength predicts cooperation\
    \ levels\n   - Enforcement mechanisms differ culturally\n\n2. INEQUALITY AND NORMS\n   - High inequality weakens cooperation\
    \ norms\n   - Perceptions of unfairness reduce compliance\n   - Elite behavior affects norm credibility\n\n3. DYNAMIC\
    \ INTERACTIONS\n   - Norms affect inequality outcomes\n   - Inequality feeds back to norms\n   - Potential for vicious/virtuous\
    \ cycles\n\n4. POLICY IMPLICATIONS\n   - Design institutions that reinforce good norms\n   - Address inequality to sustain\
    \ cooperation\n   - Consider norm dynamics in policy evaluation"
  ebf_relevance: '10C DIMENSIONS:

    - WHAT (C): Interaction of norms and inequality

    - WHEN (V): Societal context affects cooperation

    - WHO (AAA): Heterogeneity in norm compliance


