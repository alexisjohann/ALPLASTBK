abstract: 'The authors argue that there is more to be learned from recent research on the effectiveness of targeted saving
  incentives than the wide variation in empirical estimates suggests. They conclude that characterizations of ‘all new saving’
  or ‘no new saving’ are extreme IRAs and 401(k) plans appear to stimulate moderate amounts of new saving. The authors suggest
  a cost-benefit approach to ask: What is the incremental gain in capital accumulation per dollar of foregone revenue? For
  quite conservative measures of the saving impacts of IRAs or 401(k)s, the incremental gains in capital accumulation per
  dollar of lost revenue are large.'
