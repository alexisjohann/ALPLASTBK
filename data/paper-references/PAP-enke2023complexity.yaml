abstract: Abstract Decisions under uncertainty are often made with information whose interpretation is uncertain because multiple
  interpretations are possible. Individuals may perceive and handle uncertainty about interpretation differently and in ways
  that are not directly observable to a modeler. This paper identifies and experimentally examines behavior that can be interpreted
  as reflecting an individual’s attitude toward such uncertainty.
