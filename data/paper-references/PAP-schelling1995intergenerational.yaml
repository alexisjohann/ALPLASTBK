title: Intergenerational Discounting
author: Schelling
year: '1995'
publication_type: journal_article
doi: 10.1016/0301-4215(95)90164-3
abstract: 'A ''discount rate'' for the consumption of future generations from current investments for their benefit is typically
  composed of two parts: ''time preference'' and an allowance for the lower marginal utility of consumption due to higher
  average levels of consumption in the future. Time preference would be involved if one were postponing one''s own consumption;
  it has little or nothing to do with income redistribution, which is what greenhouse abatement is about. Time may serve as
  a kind of measure of distance; we may prefer beneficiaries who are closer in time, in geographical distance, in culture,
  surely in kinship. Perhaps to keep our thinking straight we should use a term like ''depreciation'', rather than ''discounting''.'
