abstract: Instructors can begin the process of integrating race and gender issues into introductory economics by reexamining
  their courses with a new lens of diversity. The content of introductory economics can be expanded by ‘adding and stirring’
  race and gender data from standard statistical sources or from the students themselves. This paper offers some ‘add-and-stir’
  macro- and microeconomic examples. To discover the appropriate mix of these examples and how to present them, this paper
  also offers ways of getting to know who your students are and how better to teach them with their diverse interests and
  learning styles.
