abstract: Why does a worker's wage tend to grow with seniority in the firm, and what does this have to do with productivity?
  Two decades ago, neoclassical labor economists thought that the theory of human capital provided a good answer to this question.
  The last decade has, however, been one of puzzles and doubt. At this point few would give an unambiguous answer. This paper
  provides a tour of key points in the ongoing debate over the relationship between seniority, wages, and productivity.
