abstract: 'Preface xi Richard H. Thaler Acknowledgments xix List of Abbreviations xxiii Chapter 1: A Survey of Behavioral
  Finance by Nicholas Barberis and Richard H. Thaler 1 Part I: Limits to Arbitrage Chapter 2: The Limits of Arbitrage by Andrei
  Shleifer and Robert W. Vishny 79 Chapter 3: How Are Stock Prices Affected by the Location of Trade? by Kenneth A. Froot
  and Emil M. Dabora 102 Chapter 4: Can the Market Add and Subtract? Mispricing in Tech Stock Carve-outs by Owen A. Lamont
