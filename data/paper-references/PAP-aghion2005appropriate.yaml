summary:
  abstract_extended: 'This paper investigates the relationship between product market competition

    and innovation. The authors find strong evidence of an inverted-U relationship

    using panel data.


    They develop a model where competition discourages laggard firms from

    innovating but encourages neck-and-neck firms to innovate. Together with

    the effect of competition on the equilibrium industry structure, these

    generate an inverted-U.


    The predictions are confronted with data on UK firms'' patenting activity at

    the US patent office over the period 1968-1997. The predictions accord well

    with observed behavior.'
  key_findings: "1. INVERTED-U RELATIONSHIP: Product market competition (PMC) and innovation\n   have an inverted-U shaped\
    \ relationship - moderate competition optimal\n\n2. NECK-AND-NECK EFFECT: Competition encourages neck-and-neck firms to\n\
    \   innovate to escape competition and gain temporary lead\n\n3. DISCOURAGEMENT EFFECT: Competition discourages laggard\
    \ firms from\n   innovating because they cannot catch up to leaders\n\n4. INDUSTRY STRUCTURE: Equilibrium degree of technological\
    \ \"neck-and-neckness\"\n   decreases with product market competition\n\n5. STEEPER WITH NECK-AND-NECKNESS: Higher average\
    \ \"neck-and-neckness\" in an\n   industry makes the inverted-U relationship steeper\n\n6. DEBT PRESSURE: Firms may innovate\
    \ more if subject to higher debt-pressure,\n   especially at lower levels of PMC"
