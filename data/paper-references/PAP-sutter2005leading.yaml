abstract: We study the effects of leadership on the private provision of a public good when group members are heterogeneously
  endowed. Leadership is implemented as a sequential public goods game where one group member contributes first and all the
  others follow. Our results show that the presence of a leader increases average contribution levels but less so than in
  case of homogeneous endowments. Leadership is almost ineffective, though, if participants do not know the distribution of
  endowments. Granting the leaders exclusion power does not lead to significantly higher contributions.
