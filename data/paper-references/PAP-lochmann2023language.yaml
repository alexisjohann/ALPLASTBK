title: 'The Effect of Language Training on Immigrants'' Integration: Does the Duration
  of Training Matter?'
author: Lochmann
year: '2023'
publication_type: journal_article
doi: 10.1016/j.jebo.2023.02.014
abstract: "This paper studies the effect of language training duration on immigrants' labor market integration using a French reform that increased required training hours. Using difference-in-differences methodology, we find that longer language training significantly increases the probability of employment in the formal sector and obtaining permanent contracts. The mechanism operates through improved knowledge of labor market institutions and expanded professional networking opportunities."
