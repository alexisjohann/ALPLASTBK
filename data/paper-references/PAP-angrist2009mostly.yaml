abstract: "The core methods in today's econometric toolkit are linear regression for statistical control, instrumental variables\
  \ methods for the analysis of natural experiments, and differences-in-differences methods that exploit policy changes. In\
  \ the modern experimentalist paradigm, these techniques address clear causal questions such as: Do smaller classes increase\
  \ learning? Should wife batterers be arrested? How much does education raise wages? Mostly Harmless Econometrics shows how\
  \ the basic tools of applied econometrics allow the data to speak.In addition to econometric essentials, Mostly Harmless\
  \ Econometrics covers important new extensions--regression-discontinuity designs and quantile regression--as well as how\
  \ to get standard errors right. Joshua Angrist and Jorn-Steffen Pischke explain why fancier econometric techniques are typically\
  \ unnecessary and even dangerous. The applied econometric methods emphasized in this book are easy to use and relevant for\
  \ many areas of contemporary social science.\r\n\r\n      An irreverent review of econometric essentials\r\n        A focus\
  \ on tools that applied researchers use most\r\n        Chapters on regression-discontinuity designs, quantile regression,\
  \ and standard errors\r\n        Many empirical examples\r\n        A clear and concise resource with wide applications"
