summary:
  abstract_extended: 'This paper examines how social preferences are selected in large groups.

    We show that endogenous group formation allows cooperative types to sort

    together, improving group outcomes. Selection mechanisms play a crucial

    role in sustaining cooperation at scale.'
  key_findings: "1. ENDOGENOUS SORTING\n   - Types self-select\n   - Cooperators cluster\n   - Better outcomes\n\n2. SELECTION\
    \ MECHANISMS\n   - Entry/exit rules\n   - Signaling devices\n   - Reputation systems\n\n3. LARGE GROUP IMPLICATIONS\n\
    \   - Scaling cooperation\n   - Institutional design\n   - Organization theory"
  ebf_relevance: '10C DIMENSIONS:

    - WHO (AAA): Type heterogeneity

    - HOW (B): Selection-cooperation complementarity

    - WHEN (V): Group formation context


    THEORY SUPPORT:

    - Assortative matching

    - Group selection

    - Organizational design


    KEY INSIGHT:

    Endogenous selection allows cooperative types to sort together, enabling

    cooperation at scale through institutional design.'
