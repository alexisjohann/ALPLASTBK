abstract: 'The Journal asked three mainstream industrial organization economists to comment on both current merger enforcement
  and merger reform proposals: Lawrence White, Franklin Fisher, and Richard Schmalensee. The Journal of Economic Perspectives
  organized this symposium to provide economists who do not specialize in industrial organization and policymakers now considering
  reform proposals with a better sense of the type of competitive analysis carried out in evaluating mergers and the controversies
  involved in proposals to reform merger law.'
