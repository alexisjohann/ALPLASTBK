  notes: 'FOUNDATIONAL FRAMEWORK: Entrepreneur-as-scientist perspective based on classical
    pragmatism (Dewey, Peirce) and Bayesian rationality (cognitive psychology).

    THREE CATEGORIES OF ACTION: 1. BELIEF FORMATION - Compose causal theory about
    problem-solution fit 2. BELIEF TESTING - Test assumptions via experiments, gather
    feedback 3. RESPONDING - Update beliefs balancing over/under-fitting

    THREE COMPANION DOUBTS: 1. Product-market fit doubt (endogenous uncertainty from
    self-selected beliefs) 2. Feedback validity doubt (false positives/negatives in
    evaluator responses) 3. Response error doubt (bias-variance tradeoff in belief
    updating)

    HEURISTIC TAXONOMY: - Belief formation heuristics (novel belief elicitation, assumption
    specification) - Testing heuristics (A/B tests, staged investment, approval thresholds)
    - Response heuristics (sample partitioning, frugal heuristics)

    KEY CONTRIBUTIONS: - Bridges causation vs effectuation debate via pragmatist middle
    ground - Formalizes product-market fit as correlation(belief_model, market_model)
    - Maps heuristics to specific inferential problems they solve - Establishes "think,
    act, and learn" vs lean startup''s "act and learn"

    FOUNDATIONAL - No point estimates. Parameters are informed priors from related
    literature.

    '
