summary:
  abstract_extended: 'This article empirically analyzes different effects of advertising in a

    nondurable, experience good market. A dynamic learning model of consumer

    behavior is presented in which the author allows both "informative" effects

    of advertising and "prestige" or "image" effects of advertising.


    This learning model is estimated using consumer level panel data tracking

    grocery purchases and advertising exposures over time. Empirical results

    suggest that in this market, advertising''s primary effect was that of

    informing consumers.


    The estimates are used to quantify the value of this information to consumers

    and evaluate the welfare implications of an alternative advertising regulatory

    regime.'
  key_findings: "1. INFORMATIVE vs PRESTIGE: Distinguishes between informative effects\n   (providing product information)\
    \ and prestige/image effects (brand utility)\n\n2. LEARNING MODEL: Dynamic learning model where consumers update beliefs\n\
    \   about product quality through experience and advertising\n\n3. INFORMATION DOMINATES: In this market, advertising's\
    \ primary effect was\n   informative rather than image-based\n\n4. EXPERIENCE GOODS: Products whose quality can only be\
    \ assessed after\n   consumption require different information mechanisms\n\n5. CONSUMER WELFARE: Quantifies the value\
    \ of advertising information to\n   consumers\n\n6. REGULATORY IMPLICATIONS: Provides framework for evaluating advertising\n\
    \   regulation welfare effects"
