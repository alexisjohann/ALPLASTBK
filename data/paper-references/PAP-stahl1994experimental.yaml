abstract: We pose a hierarchial model of strategic thinking and conduct an experiment
  to test this theory as well as other solution concepts for symmetric (3 × 3) games.
  A level-0 type plays unpredictably, a level-1 type acts as if everyone else were
  level-0 types, and a level-2 type acts as if all other players were level-0 and
  level-1 types. In a model with level-0,…, level-2, and Nash types, we estimated
  that an insignificant portion of the participants were level-0 types, 24% were level-1
  types, 49% were level-2 types, and the remaining 27% were Nash types.
