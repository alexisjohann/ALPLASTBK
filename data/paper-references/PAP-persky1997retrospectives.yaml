abstract: Poor law reform in the early 1830s provides a key example of the deep conflicts between classical liberal principles
  of self-reliance and the realities of dependency. Eminent economists, such as Nassau Senior and Thomas Malthus, argued that
  the dependency of women and children calls forth and motivates its own support from the altruism of husbands and fathers.
  Like modern welfare reformers, the classical economists asserted the natural necessity and sufficiency of such dependency
  and ignored its powerful implications for the intergenerational perpetuation of a highly illiberal inequality of opportunity.
