abstract: We study the value of information in financial markets by asking whether having more information always leads to
  higher returns. We address this question in an experiment where single traders have different information levels about an
  asset's intrinsic value. In our treatments we vary the nature of the information and the trading mechanism. We find that
  only the very best informed traders (i.e. insiders) significantly outperform less informed traders. However, there is a
  wide range of information levels (from zero information to an average information level) where additional information does
  not yield higher returns. The latter result implies that the value of information is not strictly monotonic.
