abstract: 'This paper analyzes the joint dynamics of religious beliefs and scientific-economic development. It emphasizes
  in particular how this coevolution is shaped by (and feeds back on) political conflicts and coalition formation, along both
  religious and income lines. As part of our motivating evidence, we also uncover a new fact: in both international and cross-state
  US data, there is a significant negative relationship between religiosity and innovativeness (patents per capita), even
  after controlling for the standard empirical determinants of the …'
