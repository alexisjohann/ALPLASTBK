abstract: "From the Publisher:\r\nWhen it was first published in 1972, Hubert Dreyfus's\
  \ manifesto on the inherent inability of disembodied machines to mimic higher mental\
  \ functions caused an uproar in the artificial intelligence community. The world\
  \ has changed since then. Today it is clear that good old-fashioned AI, based on\
  \ the idea of using symbolic representations to produce general intelligence, is\
  \ in decline (although several believers still pursue its pot of gold), and the\
  \ focus of the Al community has shifted to more complex models of the mind. It has\
  \ also become more common for AI researchers to seek out and study philosophy. For\
  \ this edition of his now classic book, Dreyfus has added a lengthy new introduction\
  \ outlining these changes and assessing the paradigms of connectionism and neural\
  \ networks that have transformed the field. \r\nAt a time when researchers were\
  \ proposing grand plans for general problem solvers and automatic translation machines,\
  \ Dreyfus predicted that they would fail because their conception of mental functioning\
  \ was naive, and he suggested that they would do well to acquaint themselves with\
  \ modern philosophical approaches to human beings. What Computers Can't Do was widely\
  \ attacked but quietly studied. Dreyfus's arguments are still provocative and focus\
  \ our attention once again on what it is that makes human beings unique. \r\nHubert\
  \ L. Dreyfus, who is Professor of Philosophy at the University of California, Berkeley,\
  \ is also the author of Being-in-the-World. A Commentary on Heidegger's Being and\
  \ Time, Division I."
