summary:
  abstract_extended: 'This paper examines how workers respond to wage "gifts" from employers.

    We analyze the gift exchange hypothesis and evidence for reciprocal

    responses to generous wages.'
  key_findings: "1. GIFT EXCHANGE\n   - Fair wages elicit effort\n   - Reciprocal responses observed\n   - Beyond pure incentives\n\
    \n2. WAGE-EFFORT RELATIONSHIP\n   - Non-linear responses\n   - Reference point matters\n   - Fairness comparisons\n\n\
    3. LABOR MARKET IMPLICATIONS\n   - Efficiency wages explained\n   - Firm-worker relationships\n   - Contract design"
  ebf_relevance: '10C DIMENSIONS:

