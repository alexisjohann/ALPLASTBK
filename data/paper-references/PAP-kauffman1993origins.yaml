abstract: 62• 5. A. Kauffman more rugged and multipeaked. The" hill climbing" framework is hardly new, for I borrow it with
  minor modifications directly from Sewell Wright (1931, 1932), one of the three major founders of population genetics. Wright
  introduced the concept of a space of possible genotypes. In one version of his idea, each genotype has a" fitness", and
  the distribution of these fitness values over the space of genotypes constitutes a fitness landscape.(Often Wright thought
  of the fitness of a given gene or genotype as a function of its frequency in the population (Wright ibid., Provine 1986).
  I will use the simpler idea that each genotype itself can be assigned a fitness in this chapter.) Depending upon the distribution
  of the fitness values, the fitness land scape can be more or less mountainous. It may have many peaks of high fitness flanked
  by steep ridges and precipitous cliffs falling to profound val leys of very low fitness. Or the fitness landscape, like
  the gentle Normandy countryside, may be smoothly rolling with low hills and gentle valleys. In this framework, adaptive
  evolution in a population is a hill climb ing process. The population can be thought of as a tight or loose cluster of"
  individuals" located at different points in the landscape. Mutations" move" an individual, or its offspring, to neighboring
  points in the space representing neighboring genotypes. Selection is reflected in differential re production by individuals
  with different fitness. Therefore, over time the cluster of individuals representing the population will" flow" over the
  fit ness landscape. In the simplest cases, the population will climb to and cluster about one of perhaps a very large number
  of different fitness peaks (Ewens 1979, Crow and Kimura 1965, 1970, Gillespie 1983, 1984). In more complex cases, the cluster
  representing the population may spread widely across the landscape, passing via a rich web of ridges somewhat below the
  fitness peaks (Eigen 1985, Schuster 1986, 1987, Fontana and Schuster 1987, Kauffiman and Levin 1987, Kauffman et aL 1988,
  Kauffman 1989a, Eigen et al. 1989). In other cases the population may drift down from the peaks and wander within a band
  of modest fitness" altitudes" virtually anywhere across the fitness landscape (Fontana and Schuster 1988, Kauffman et al.
  1988, Kauffman 1989a, Eigen et al 1989). It is intuitive from this description that the behavior of an adapting population
  depends upon how mountainous the fitness landscape is, on how large the population is, and on the mutation rate which" moves"
  an indi vidual from one genotype to another genotype in the space. The flow of a population over a fitness landscapes also
