abstract: This article summarizes a conceptual framework and simple mathematical methods of estimating the probability that
  one event was a necessary cause of another, as interpreted by lawmakers. We show that the fusion of observational and experimental
  data can yield informative bounds that, under certain circumstances, meet legal criteria of causation. We further investigate
  the circumstances under which such bounds can emerge, and the philosophical dilemma associated with determining individual
  cases from statistical data.
