abstract: Abstract The idea of free exchange of child labor, human organs, reproductive
  services, weapons, life saving medicines, and addictive drugs, strike many as toxic
  to human values. What considerations ought to guide the debates about such markets?
  What is it about the nature of particular exchanges that concerns us to the point
  that some types of markets are problematic? How should our social policies respond
  to these more noxious markets? Categories previously used by philosophers and economists
  are of limited help, because they assumed markets to be homogenous and of limited
  scope. This book develops a broader and more nuanced view of markets whereby they
  not only allocate resources and incomes, but shape our culture, foster or thwart
  human development, and create and support structures of power.
