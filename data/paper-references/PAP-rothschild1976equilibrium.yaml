summary:
  abstract_extended: 'This paper characterizes competitive equilibrium in insurance markets under

    adverse selection. Unlike Akerlof''s single-contract, price-competition model,

    this framework allows firms to compete on multiple dimensions of the contract

    (price and coverage level).


    The central result is that equilibrium, if it exists, must be a separating

    equilibrium: different risk types purchase different contracts. Low-risk

    individuals receive less than full insurance because any contract attractive

    to them would also attract high-risk types, creating adverse selection.


    Remarkably, the paper demonstrates that equilibrium may fail to exist entirely.

    The existence of high-risk individuals imposes a negative externality on low-

    risk individuals, potentially preventing any stable market outcome.'
  key_findings: "1. SEPARATING EQUILIBRIUM: In equilibrium, high-risk and low-risk types must\n   purchase different contracts\
    \ - pooling equilibria are not stable\n\n2. PARTIAL COVERAGE FOR LOW-RISK: Low-risk types cannot get full insurance\n\
    \   because full coverage would attract high-risk types (cream-skimming problem)\n\n3. EQUILIBRIUM NON-EXISTENCE: Equilibrium\
    \ may not exist when the proportion\n   of low-risk types is sufficiently high\n\n4. SCREENING VIA SELF-SELECTION: Firms\
    \ design menus of contracts such that\n   each type self-selects into the contract designed for them\n\n5. NEGATIVE EXTERNALITY:\
    \ High-risk types impose externality on low-risk types,\n   degrading the contracts available to low-risk individuals\n\
    \n6. MULTI-DIMENSIONAL COMPETITION: Unlike price-only competition, firms compete\n   on both premium and coverage, enabling\
    \ screening"
