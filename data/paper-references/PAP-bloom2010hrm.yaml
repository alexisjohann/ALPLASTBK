title: Human Resource Management and Productivity
author: Nicholas Bloom, John Van Reenen
year: '2010'
publication_type: working_paper
institution: National Bureau of Economic Research
series: NBER Working Paper
number: '16019'
month: May
note: Handbook of Labor Economics, Volume 4, Part B, Chapter 19
abstract: 'In this chapter we examine the relationship between Human Resource Management

  (HRM) and productivity. HRM includes incentive pay (individual and group) as

  well as many non-pay aspects of the employment relationship such as matching

  (hiring and firing) and work organization (e.g. teams, autonomy). We place HRM

  more generally within the literature on management practices and productivity.

  We start with some facts on levels and trends of both HRM and productivity and

  the main patterns of dispersion across firms. We then discuss some of the

  potential causal mechanisms relating HRM to productivity focusing on five main

  economic channels. A key focus is complementarities between practices and the

  debate on High-Performance Work Systems vs. traditional approaches.

  '
abstract_source: full_text
abstract_fetched: '2026-02-04'
structural_characteristics:
  S1_research_question:
    available: true
    questions:
    - Does HRM contribute to productivity?
    - What explains the large dispersion of productivity across firms?
    - Are HRM practices complements (work together as systems)?
    - What determines HRM adoption across firms and countries?
    - How do performance pay, work organization, and management affect productivity?
    - What is the role of competition, ownership, and regulation in HRM adoption?
    clarity: high
  S2_methodology:
    available: true
    approach: survey_empirical
    methods:
    - Literature review and synthesis
    - Cross-country management surveys (World Management Survey)
    - Econometric analysis (OLS, fixed effects, IV)
    - Case studies (Safelite, steel mills)
    - Complementarity testing (supermodularity)
    key_definitions:
    - 'HRM: incentive pay (individual/group) + non-pay (matching, work organization)'
    - 'Performance pay: compensation tied to measured output/performance'
    - 'High-Performance Work Systems: teams, autonomy, involvement, training'
    - 'Management score: 1-5 scale across operations, monitoring, targets, incentives'
    - 'Complementarity: ∂²Π/∂x₁∂x₂ > 0'
    - 'Decentralization: allocation of decision authority to lower levels'
  S3_sample_data:
    available: true
    type: empirical_survey
    empirical_data: true
    sample_characteristics:
    - 'World Management Survey: 6,000+ firms, 17 countries'
    - 'Bloom & Van Reenen (2007): 732 medium-sized manufacturing firms'
    - 'Ichniowski et al. (1997): 36 US steel finishing lines'
    - 'Lazear (2000): Safelite Auto Glass windshield installers'
    - 'Cross-country coverage: US, UK, Germany, France, Italy, Japan, etc.'
    descriptive_statistics:
      us_performance_pay_coverage: 0.44
      uk_performance_pay_coverage: 0.33
      us_management_score_mean: 3.3
      productivity_90_10_ratio: 1.92
      management_explains_productivity: 0.25-0.30
  S4_findings:
    available: true
    key_findings:
    - finding: Performance pay increases productivity 20-44%
      source: Lazear (2000), Paarsch & Shearer (2000)
      interpretation: About half from incentives, half from selection
    - finding: HRM systems increase productivity 6.7%
      source: Ichniowski et al. (1997)
      interpretation: Individual practices alone have little effect
    - finding: Management score increases TFP 3.2% per point
      source: Bloom & Van Reenen (2007)
      interpretation: Cross-country evidence from WMS
    - finding: Management explains 25-30% of productivity dispersion
      source: Bloom et al. (2010)
      interpretation: Substantial portion of firm heterogeneity
    - finding: Family-managed firms have 0.3 lower management scores
      source: Bloom & Van Reenen (2007)
      interpretation: Primogeniture effect strongest
    - finding: Competition improves management practices
      mechanism: Selection of bad firms + incentive effects
    - finding: ICT and HRM are complements
      source: Bresnahan et al. (2002)
      interpretation: Skill-biased organizational change
    - finding: Trust increases decentralization
      source: Bloom et al. (2009)
      interpretation: Cultural factors affect organization
  S5_validity:
    available: true
    internal_validity:
    - Multiple identification strategies across studies
    - Natural experiments (Lazear productivity data)
    - Within-firm variation (Ichniowski steel lines)
    - Instrumental variables for competition
    - Panel data with firm fixed effects
    external_validity:
    - Cross-country evidence (17 countries)
    - Multiple industries (manufacturing, services)
    - Different HRM practices (pay, organization, teams)
    - Consistent findings across methodologies
    - Developed and developing country evidence
    limitations:
    - Selection into HRM practices may bias estimates
    - Measurement error in management surveys
    - Limited developing country coverage at time
    - Focus on manufacturing (less services evidence)
    - Complementarity identification challenging
  S6_reproducibility:
    available: true
    proofs_available: true
    proof_location: Mathematical framework in Section III
    data_availability:
      source: World Management Survey (publicly available)
      access: www.worldmanagementsurvey.org
    model_specification: Production function with management capital
    assumptions_documented: true
    testable_predictions:
    - Performance pay increases productivity through selection + incentives
    - HRM practices are complements (systems > individual)
    - Competition improves management
    - Family management reduces scores
    - Trust increases decentralization
    - ICT and HRM are complements
