abstract: 'A National Academy of Sciences Panel recently made a number of recommendations to the BLS for improving the Consumer
  Price Index, while also suggesting some cautions to be observed when considering the adoption of new concepts and techniques.
  This paper discusses the Panel''s analyses in four areas: Should a cost-ofliving index be the measurement objective of the
  CPI? Should the index attempt to capture the effect on living costs from changes in “environmental” conditions? How can
  hedonic techniques be best applied for measuring quality changes? Should the BLS attempt to measure the consumer surpluses
  accompanying the introduction of new goods?'
