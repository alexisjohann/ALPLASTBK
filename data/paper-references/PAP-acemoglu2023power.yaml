abstract: 'Power and Progress argues that technological progress does not automatically

  lead to shared prosperity. Across a thousand years of history, the authors

  demonstrate that the direction of technology - whether it creates new tasks

  for workers or merely automates and surveils - depends on power structures,

  dominant narratives (visions), and institutional arrangements. The

  "productivity bandwagon" that links technology to higher wages operates

  only conditionally: when countervailing powers (organized labor, democratic

  institutions, regulation) redirect technology toward broad-based prosperity.

  The book applies this framework to AI and digital technologies, arguing that

  current trends favor automation and surveillance over worker empowerment,

  and proposes institutional solutions.

  '
