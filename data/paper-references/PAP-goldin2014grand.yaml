abstract: The converging roles of men and women are among the grandest advances in society and the economy in the last century.
  These aspects of the grand gender convergence are figurative chapters in a history of gender roles. But what must the “last”
  chapter contain for there to be equality in the labor market? The answer may come as a surprise. The solution does not (necessarily)
  have to involve government intervention and it need not make men more responsible in the home (although that wouldn't hurt).
  But it must involve changes in the labor market, especially how jobs are structured and remunerated to enhance temporal
  flexibility. The gender gap in pay would be considerably reduced and might vanish altogether if firms did not have an incentive
  to disproportionately reward individuals who labored long hours and worked particular hours. Such change has taken off in
  various sectors, such as technology, science, and health, but is less apparent in the corporate, financial, and legal worlds.
  (JEL J3, J16, J22, J24, J31, J33, N3)
