abstract: 'Significance Honesty affects almost every aspect of social and economic life. We conducted experiments in which
  participants could earn considerable amounts of money by cheating on a die-rolling task. Cheating was substantial but decreased
  by more than one-half during transcranial direct current stimulation over the right dorsolateral prefrontal cortex. This
  stimulation-induced increase in honesty was functionally specific: It did not affect other types of behavioral control related
  to self-interest, risk-taking, and impulsivity. Moreover, cheating was only reduced when it benefited the participants themselves
  rather than another person. Thus, the human brain implements specialized processes that enable us to remain honest when
  faced with opportunities to cheat for personal material gain. Importantly, these processes can be strengthened by external
  interventions.'
