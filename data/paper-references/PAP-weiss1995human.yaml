abstract: The key difference between signalling and human capital models is that signalling models allow firms to draw inferences
  about unobserved characteristics of workers. Those inferences can be based on the schooling or work experience of workers,
  or on direct measures of some aspects of job performance. Many recent empirical findings can be better explained by signalling
  models than by human capital theory. Given the explanatory power of signalling models, standard estimates of the social
  return to secondary schooling are in large part capturing differences in affective traits, such as perseverance, which were
  acquired either in primary school or at home.
