abstract: In the standard economic account of consumer behavior the cost of a purchase takes the form of a reduction in future
  utility when expenditures that otherwise could have been made are forgone. The reality of consumer hedonics is different.
  When people make purchases, they often experience an immediate pain of paying, which can undermine the pleasure derived
  from consumption. The ticking of the taxi meter, for example, reduces one's pleasure from the ride. We propose a “double-entry”
  mental accounting theory that describes the nature of these reciprocal interactions between the pleasure of consumption
  and the pain of paying and draws out their implications for consumer behavior and hedonics. A central assumption of the
  model, which we call prospective accounting, is that consumption that has already been paid for can be enjoyed as if it
  were free and that the pain associated with payments made prior to consumption (but not after) is buffered by thoughts of
  the benefits that the payments will finance. Another important concept is coupling, which refers to the degree to which
  consumption calls to mind thoughts of payment, and vice versa. Some financing methods, such as credit cards, tend to weaken
  coupling, whereas others, such as cash payment, produce tight coupling. Our model makes a variety of predictions that are
  at variance with economic formulations. Contrary to the standard prediction that people will finance purchases to minimize
  the present value of payments, our model predicts strong debt aversion—that they should prefer to prepay for consumption
  or to get paid for work after it is performed. Such pay-before sequences confer hedonic benefits because consumption can
  be enjoyed without thinking about the need to pay for it in the future. Likewise, when paying beforehand, the pain of paying
  is mitigated by thoughts of future consumption benefits. Contrary to the economic prediction that consumers should prefer
  to pay, at the margin, for what they consume, our model predicts that consumers will find it less painful to pay for, and
  hence will prefer, flat-rate pricing schemes such as unlimited Internet access at a fixed monthly price, even if it involves
  paying more for the same usage. Other predictions concern spending patterns with cash, charge, or credit cards, and preferences
  for the earmarking of purchases. We test these predictions in a series of surveys and in a conjoint-like analysis that pitted
  our double-entry mental accounting model against a standard discounting formulation and another benchmark that did not incorporate
  hedonic interactions between consumption and payments. Our model provides a better fit of the data for 60% of the subjects;
  the discounting formulation provides a better fit for only 29% of the subjects (even when allowing for positive and negative
  discount rates). The pain of paying, we argue, plays an important role in consumer self-regulation, but is hedonically costly.
  From a hedonic perspective the ideal situation is one in which payments are tightly coupled to consumption (so that paying
  evokes thoughts about the benefits being financed) but consumption is decoupled from payments (so that consumption does
  not evoke thoughts about payment). From an efficiency perspective, however, it is important for consumers to be aware of
  what they are paying for consumption. This creates a tension between hedonic efficiency and what we call decision efficiency.
  Various institutional arrangements, such as financing of public parks through taxes or usage fees, play into this tradeoff.
  A producer developing a pricing structure for their product or service should be aware of these two conflicting objectives,
  and should try to devise a structure that reconciles them.
