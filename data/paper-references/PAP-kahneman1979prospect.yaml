summary:
  abstract_extended: "This paper presents a critique of expected utility theory as a descriptive\nmodel of decision making\
    \ under risk, and develops an alternative model,\ncalled PROSPECT THEORY.\n\nChoices among risky prospects exhibit several\
    \ pervasive effects that are\ninconsistent with the basic tenets of utility theory:\n\n1. CERTAINTY EFFECT: People underweight\
    \ outcomes that are merely probable\n   in comparison with outcomes obtained with certainty. This contributes to:\n  \
    \ - Risk AVERSION in choices involving sure gains\n   - Risk SEEKING in choices involving sure losses\n\n2. VALUE FUNCTION\
    \ with three key properties:\n   - Defined on DEVIATIONS from a reference point (not final wealth)\n   - Generally CONCAVE\
    \ for gains and CONVEX for losses\n   - STEEPER for losses than for gains (Loss Aversion)\n\n3. PROBABILITY WEIGHTING:\
    \ Non-linear transformation of probabilities\n   - Overweighting of small probabilities\n   - Underweighting of moderate/high\
    \ probabilities"
  key_findings: '1. Reference dependence: Value = f(change), not f(wealth)

    2. Loss aversion parameter: λ ≈ 2.25

    3. Diminishing sensitivity: α = β ≈ 0.88

    4. Certainty effect drives risk preferences

    5. Reflection effect: Risk attitudes reverse for gains vs losses

    6. Most replicated finding in behavioral economics (1000+ replications)'
  ebf_relevance: "Domain: CORE-THEORY (Foundational)\n10C Dimensions: WHAT (utility function), HOW (reference dependence),\n\
