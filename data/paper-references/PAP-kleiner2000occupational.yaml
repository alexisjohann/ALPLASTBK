abstract: The study of the regulation of occupations has a long and distinguished tradition in economics. In this paper, I
  present the central arguments and unresolved issues involving the costs and benefits of occupational licensing. The main
  benefits that are suggested for occupational licensing involve improving quality for those persons receiving the service.
  In contrast, the costs attributed to this labor market institution are that it restricts the supply of labor to the occupation
  and thereby drives up the price of labor as well as of services rendered. Alternative public policies for this institution
  are identified.
