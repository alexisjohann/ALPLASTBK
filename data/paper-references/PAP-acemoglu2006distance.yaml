abstract: We analyze an economy where firms undertake both innovation and adoption of technologies from the world technology
  frontier. The selection of high-skill managers and firms is more important for innovation than for adoption. As the economy
  approaches the frontier, selection becomes more important. Countries at early stages of development pursue an investment-based
  strategy, which relies on existing firms and managers to maximize investment but sacrifices selection. Closer to the world
  technology frontier, economies switch to an innovation-based strategy with short-term relationships, younger firms, less
  investment, and better selection of firms and managers. We show that relatively backward economies may switch out of the
  investment-based strategy too soon, so certain policies such as limits on product market competition or investment subsidies,
  which encourage the investment-based strategy, may be beneficial. However, these policies may have significant long-run
  costs because they make it more likely that a society will be trapped in the investment-based strategy and fail to converge
  to the world technology frontier.
