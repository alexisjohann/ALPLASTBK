summary:
  abstract_extended: 'Private information is at the heart of many economic activities.
    For decades,

    economists have assumed that individuals are willing to misreport private

    information if this maximizes their material payoff. This paper combines data

    from 90 experimental studies in economics, psychology, and sociology (429

    treatments, 44,000+ participants across 47 countries) to show that, in fact,

    people lie surprisingly little.


    The authors formalize a wide range of potential explanations for the observed

    behavior, identify testable predictions that can distinguish between models,

    and conduct new experiments to test them. The empirical evidence suggests that

    a preference for being seen as honest (reputation) and a preference for being

    honest (intrinsic honesty) are the main motivations for truth-telling.'
  key_findings: "1. PEOPLE LIE SURPRISINGLY LITTLE: Meta-analysis shows actual lying\
    \ rates far\n   below what pure self-interest would predict - only partial lying\
    \ observed\n\n2. INTRINSIC HONESTY PREFERENCE: People have direct utility cost\
    \ from lying,\n   independent of consequences or being caught\n\n3. REPUTATION\
    \ CONCERNS: Preference for being seen as honest motivates truth-\n   telling even\
    \ when lies cannot be detected at individual level\n\n4. LYING AVERSION DOMINATES:\
    \ Most explanations (altruism, guilt, self-image)\n   cannot fully explain the\
    \ observed patterns - lying costs are direct\n\n5. CROSS-CULTURAL CONSISTENCY:\
    \ Results replicate across 47 countries with\n   similar patterns of partial honesty\n\
    \n6. MAGNITUDE EFFECTS: Larger incentives to lie only marginally increase lying,\n\
    \   suggesting strong intrinsic preferences"
