abstract: This paper examines the earnings and employment effect of deregulation in the trucking, railroad, airlines, and
  telecommunications industries. Findings on nonmanagement workers suggest labor earnings fell sharply in trucking, somewhat
  in airlines, slightly in telecommunications, and barely in railroads. In contrast, the work force size dramatically increased
  in trucking and airlines, held steady in telecommunications, and fell dramatically in railroads. The earnings patterns of
  managers mirrors that of their highly unionized work force. These findings are interpreted as evidence that rent-sharing
  was not unique to union workers in these industries.
