abstract: The first part of this paper considers the interaction between productive and nonproductive savings in a growing
  economy. It employs an overlapping generations model with capital accumulation and various types of rents, and gives necessary
  and sufficient conditions for the existence of an aggregate bubble. The second part is a series of thoughts on the definition,
  nature, and consequences of asset bubbles. First, it derives some implications of bubbles for tests of asset pricing. Second,
