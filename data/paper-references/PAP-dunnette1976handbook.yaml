abstract: >
  Landmark handbook that defined the field of industrial-organizational
  psychology. Contains foundational chapters on job analysis (McCormick),
  aptitudes and abilities (Dunnette), personnel selection (Guion), and
  training (Campbell). Integrated the KSA framework into systematic
  personnel selection theory for the first time in a comprehensive reference.
