title: 'Deception: The Role of Consequences'
author: Gneezy
year: '2005'
publication_type: journal_article
doi: 10.1257/0002828053828662
abstract: This paper examines deception in economic interactions, contrasting the moral philosophical view against lying with
  the homo economicus assumption that lies are told whenever beneficial. Using sender-receiver games, the study shows that
  willingness to deceive depends on weighing costs and benefits - subjects deceive more when gains are higher and losses to
  the deceived party are lower. The results demonstrate that people are not purely self-interested in their deception decisions,
  as they consider consequences for others, but neither are they purely moral, as they do engage in costly deception when
  incentives align.
