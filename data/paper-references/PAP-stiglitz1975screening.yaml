abstract: 'This paper focuses on the labelling of individuals, on the economic costs and benefits of labelling, the institutions
  that provide it, and the determination of the equilibrium amount of screening under various institutional arrangements.
  Economists have traditionally argued that because of the problem of appropri-ability in a market context, too few re-sources
  will be allocated to obtaining" information." This is not the case with the information provided by screening processes:
  individuals who can be labelled as" more productive" are able thereby to obtain a higher wage, partly, however, at the expense
  of others. Thus, by its very nature, screening information has important effects on the distribution of in-come. The basic
  argument of this paper is that economies with imperfect information with respect to qualities of individuals differ in fundamental
  ways from economies with perfect information. There may be, for instance, multiple equilibria in which one of the equilibria
  is Pareto inferior to another; the Pareto inferior equilibrium may involve either too much or too little screening, or it
  may entail the wrong kind of screening. On the other hand, there may be situations where there exists no equi-librium.'
