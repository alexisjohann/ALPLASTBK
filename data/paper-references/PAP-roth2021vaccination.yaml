title: 'Fair Allocation of Vaccines, Ventilators and Antiviral Treatments: Leaving No Ethical Value Behind in Health Care'
author: Pathak
year: '2021'
publication_type: journal_article
doi: 10.1287/mnsc.2022.00930
abstract: A priority system has traditionally been the protocol for allocating scarce life-saving resources during public
  health emergencies. Covid-19 revealed limitations of this approach. Many argue that priority systems abandon ethical values
  such as equity by discriminating against disadvantaged communities. We show that a restrictive feature of the traditional
  priority system drives these limitations. Following minimalist market design, we formulate pandemic allocation as a market
  design application and propose a reserve system as a resolution, developing concepts such as cutoff equilibria and smart
  reserves.
