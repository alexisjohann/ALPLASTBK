summary:
  abstract_extended: 'This paper discusses the economics of reciprocity - the behavioral response to

    perceived kindness and unkindness. We survey experimental evidence showing

    that reciprocity is a powerful determinant of human behavior, and discuss

    the economic implications of reciprocal preferences for contract enforcement,

    public goods provision, and competitive markets.'
  key_findings: "1. POSITIVE RECIPROCITY\n   - People reward kind actions\n   - Gift exchange in labor markets\n   - Efficiency\
    \ wages as reciprocal response\n\n2. NEGATIVE RECIPROCITY\n   - People punish unkind actions\n   - Rejection in ultimatum\
    \ games\n   - Costly punishment in public goods\n\n3. DETERMINANTS\n   - Intentions matter, not just outcomes\n   - Reference\
    \ points affect perceptions\n   - Context frames what counts as kind/unkind\n\n4. ECONOMIC IMPLICATIONS\n   - Contract\
    \ enforcement without courts\n   - Wage rigidity and unemployment\n   - Tax compliance and public goods"
  ebf_relevance: '10C DIMENSIONS:

    - WHAT (C): Reciprocity preferences

    - HOW (B): Strategic implications of reciprocity

    - WHEN (V): Context shapes reciprocity


    JEP OVERVIEW:

    - Highly cited review article

    - Accessible introduction to reciprocity literature'
