abstract: The system of academic tenure has come under increasing scrutiny. The authors provide a brief review of the tenure
  literature, discuss some recent tenure controversies, and present basic data on the percentage of faculty subject to the
  tenure system. The issue of tenure is discussed in terms of how the authority necessary to run a college or university is
  delegated. The authors believe that this perspective sheds light on some underlying reasons for why tenure differs from
  other forms of labor contracting and on the reasons for the relative importance of the tenure system in different parts
  of higher education.
