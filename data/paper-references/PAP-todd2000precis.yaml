abstract: How can anyone be rational in a world where knowledge is limited, time is pressing, and deep thought is often an
  unattainable luxury? Traditional models of unbounded rationality and optimization in cognitive science, economics, and animal
  behavior have tended to view decision-makers as possessing supernatural powers of reason, limitless knowledge, and endless
  time. In Simple heuristics that make us smart, the authors explore fast and frugal heuristics—simple rules in the mind's
  adaptive toolbox for making decisions with realistic mental resources. These heuristics can enable both living organisms
  and artificial systems to make smart choices quickly and with a minimum of information by exploiting the way that information
  is structured in particular environments. The paper shows how simple building blocks that control information search, stop
  search, and make decisions can be put together to form classes of heuristics. These simple heuristics perform comparably
  to more complex algorithms, particularly when generalizing to new data—simplicity leads to robustness.
