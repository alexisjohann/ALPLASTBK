abstract: Hendrik Houthakker's contributions to economics defy capsule description. A better strategy than providing abstracts
  of the books and articles on his long and impressive vita is discussing one or two topics in detail, placing at least some
  of his contributions in perspective and discussing their relevance for current research. The first topic I have chosen,
  revealed preference, needs no justification. Houthakker made his professional reputation with his 1950 Economica article
  on revealed preference theory—the article that introduced the strong axiom of revealed preference. The second topic is the
  dynamics of demand, a more idiosyncratic choice which reflects both the importance of Houthakker's contributions and my
  own interests. The fact that such different topics could be chosen is, of course, testimony to the breadth and diversity
  of Houthakker's work. He is a fine and fitting choice as a Distinguished Fellow of the American Economic Association.
