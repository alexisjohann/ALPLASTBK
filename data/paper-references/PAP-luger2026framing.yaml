  10c_dimensions:
    WHO: 'Two samples studied:

      1. Prolific participants (general population, international)

      2. UZH Master students (Switzerland, STEM skills measured via exam grades)


      Key finding: STEM skills moderate optimal framing

      - High STEM → better in abstract condition

      - Low STEM → better in context condition

      '
    WHAT: 'Information framing manipulation (same content, different presentation):

      - Abstract: Factors A, B, C with levels A1, A2, B1, B2, etc.

      - Context: Lemonade Stand with carbonation, flavor, color attributes


      Same underlying NK landscape (2^3 = 8 configurations per product)

      '
    HOW: 'Key complementarities identified:

      - γ(context, low_STEM) > 0: Context helps those with weaker analytical skills

      - γ(abstract, high_STEM) > 0: Abstraction leverages analytical training

      - γ(abstraction, learning) > 0: Abstract framing fosters pattern transfer


      Interaction between framing and individual cognitive characteristics

      '
    WHEN: 'Temporal learning dynamics:

      - Section 1 → Section 2: Both conditions improve

      - Learning rate STEEPER in abstract condition (p=0.023 vs p=0.01)

      - Explore-exploit pattern converges: Abstract S2 approaches Context pattern


      Ψ_temporal: Abstraction fosters cumulative capability building

      '
    WHERE: 'Lab experiment settings:

      - Prolific: Online, international sample

      - UZH: In-person, Swiss Master students

      - NK task: Stylized but captures strategic complexity

      '
    AWARE: 'Framing affects attention and processing:

      - Context activates familiar schemas (Wason effect)

      - Context reduces cognitive load (meaningful anchors)

      - Abstract requires holding arbitrary symbols in working memory


      A(task) higher in context condition initially

      A(structure) higher in abstract condition over time

      '
    READY: 'Decision readiness varies by framing:

      - Context: Faster initial orientation, earlier exploitation

      - Abstract: More initial search, delayed but more effective exploitation

      '
    STAGE: 'Customer Journey analogy (learning phases):

      - Early rounds: Exploration dominant (especially in context)

      - Later rounds: Exploitation dominant

      - Section 2: Explore-exploit shift steeper in abstract

      '
key_findings:
- finding: Context framing improves immediate decision performance
  evidence: Statistical significance p=0.008 in Section 2
  mechanism: Wason effect - familiar schemas reduce cognitive load
- finding: STEM skills moderate framing effectiveness
  evidence: UZH grades × framing interaction
  mechanism: High STEM individuals adapted to abstract reasoning environments
- finding: Abstract framing fosters higher learning rates
  evidence: Steeper performance improvement Section 1 → Section 2 (p=0.023)
  mechanism: Abstraction highlights structural relationships, enables pattern transfer
- finding: Explore-exploit patterns differ by framing
  evidence: Search distance (Hamming) across rounds
  mechanism: Context enables intuitive explore-exploit; Abstract develops it through
    learning
