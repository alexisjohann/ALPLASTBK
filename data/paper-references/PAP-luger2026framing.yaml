abstract: "Strategic decision making balances uniqueness and generality: managers\
  \ must\ncraft context-specific actions while abstracting from past cases to identify\n\
  transferable patterns. Whether contextualizing or abstracting information\nimproves\
  \ decision performance remains an open question.\n\nWe investigate via a laboratory\
  \ NK task framed either abstractly (factors A, B, C)\nor contextually (adapted Lemonade\
  \ Stand). Pre-tests reveal:\n\n1. Context improves immediate performance (Wason\
  \ effect)\n2. Abstract framing benefits individuals with strong STEM skills\n3.\
  \ Learning rates are higher in abstract condition over repeated rounds\n4. Explore-exploit\
  \ patterns differ: more early exploration in context,\n   steeper shifts in abstraction\n\
  \nContributions to strategic decision making research and executive education design.\n"
