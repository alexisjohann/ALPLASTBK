abstract: 'Just as the industrial revolution mechanized the manufacturing functions of firms, the information revolution is
  automating their merchant functions. Four types of potential productivity gains are expected from business-to-business (B2B)
  electronic commerce: cost efficiencies from automation of transactions, potential advantages of new market intermediaries,
  consolidation of demand and supply through organized exchanges, and changes in the extent of vertical integration of firms.
  The article examines the characteristics of B2B online intermediaries, including categories of goods traded, market mechanisms
  employed, and ownership arrangements, and considers the market structure of B2B e-commerce.'
