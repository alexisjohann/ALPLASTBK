title: Closing the Gender Gap in Competitiveness Through Priming
author: Balafoutas
year: '2018'
publication_type: journal_article
doi: 10.1038/s41467-018-06896-6
abstract: Men have been observed to have a greater willingness to compete compared to women, and it is possible that this
  contributes to gender differences in wages and career advancement. The researchers present experimental evidence that a
  simple and practically costless tool—priming subjects with power—can close the gender gap in competitiveness. While in a
  neutral as well as in a low-power priming situation men are much more likely than women to choose competition, this gap
  vanishes when subjects are primed with a high-power situation. The study shows that priming with high power makes competition
  entry decisions more realistic and also reduces the level of risk tolerance among male participants, which helps explain
  why it leads to a closing of the gender gap in competitiveness.
