abstract: 'We introduce a method for measuring the quality of financial decisions built around a notion of financial competence,
  which gauges the alignment between consumers choices and those they would make if they properly understood their opportunities.
  We prove our measure admits a formal welfare interpretation even when consumers suffer from additional decision-making flaws,
  known and unknown, outside the scope of analysis. An application illuminates the pitfalls of the types of brief rhetoric-laden
  interventions commonly used for adult financial education: they affect behavior through unintended mechanisms, and hence
  may not improve decisions even when they perform well according to conventional metrics. JEL Codes: C91, D03, D04, D14,
  D60, D91, I21'
