abstract: This paper describes a classroom exercise that resembles trading in the ‘pit’ of some financial and futures markets.
  Playing cards are used to induce supply and demand functions. Instructions and helpful hints are provided. The exercise
  facilitates an understanding and appreciation of the robustness and efficiency of the textbook model of perfect competition.
