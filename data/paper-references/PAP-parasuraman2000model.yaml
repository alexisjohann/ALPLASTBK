title: A Model for Types and Levels of Human Interaction with Automation
author: Parasuraman
year: '2000'
publication_type: journal_article
doi: 10.1109/3468.844354
abstract: 'A model for types and levels of automation is proposed that can be used
  to decide which task functions should be automated and to what extent. Four broad
  classes of functions are described: 1) information acquisition, 2) information analysis,
  3) decision and action selection, and 4) action implementation. Within each of these
  types, automation can be applied across a continuum of levels, from the lowest level
  of fully manual performance to the highest level of full automation.'
