abstract: Gregory Bateson was a philosopher, anthropologist, photographer, naturalist,
  and poet, as well as the husband and collaborator of Margaret Mead. With a new foreword
  by his daughter Mary Katherine Bateson, this classic anthology of his major work
  will continue to delight and inform generations of readers. This collection amounts
  to a retrospective exhibition of a working life...Bateson has come to this position
  during a career that carried him not only into anthropology, for which he was first
  trained, but into psychiatry, genetics, and communication theory...He ...examines
  the nature of the mind, seeing it not as a nebulous something, somehow lodged somewhere
  in the body of each man, but as a network of interactions relating the individual
  with his society and his species and with the universe at large.--D. W. Harding,
  New York Review of Books [Bateson's] view of the world, of science, of culture,
  and of man is vast and challenging. His efforts at synthesis are tantalizingly and
  cryptically suggestive...This is a book we should all read and ponder.--Roger Keesing,
  American Anthropologist Gregory Bateson (1904-1980) was the author of Naven and
  Mind and Nature.
