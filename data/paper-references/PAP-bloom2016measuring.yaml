abstract: We develop a new index of economic policy uncertainty (EPU) based on newspaper
  coverage frequency. Several types of evidence—including human readings of 12,000
  newspaper articles—indicate that our index proxies for movements in policy-related
  economic uncertainty. Our US index spikes near tight presidential elections, Gulf
  Wars I and II, the 9/11 attacks, the failure of Lehman Brothers, the 2011 debt ceiling
