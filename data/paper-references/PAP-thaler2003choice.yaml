abstract: The idea of libertarian paternalism might seem to be an oxymoron, but it is both possible and desirable for private
  and public institutions to influence behavior while also respecting freedom of choice. Often people's preferences are unclear
  and ill-formed, and their choices will inevitably be influenced by default rules, framing effects, and starting points.
  In these circumstances, a form of paternalism cannot be avoided. Equipped with an understanding of behavioral findings of
  bounded rationality and bounded self-control, libertarian paternalists should attempt to steer people's choices in welfare-promoting
  directions without eliminating freedom of choice.
