abstract: 'Eliminative materialism is the thesis that our common-sense conception of psychological phenomena constitutes a
  radically false theory, a theory so fundamentally defective that both the principles and the ontology of that theory will
  eventually be displaced, rather than smoothly reduced, by completed neuroscience. Our mutual understanding and even our
  introspection may then be reconstituted within the conceptual framework of completed neuroscience, a theory we may expect
  to be more powerful by far than the common-sense psychology it displaces, and more substantially integrated within physical
  science generally. The paper explores these projections, especially as they bear on the principal elements of common-sense
  psychology: the propositional attitudes (beliefs, desires, etc.), and the conception of rationality in which these elements
  figure.'
