abstract: Numerous studies regress log earnings on schooling and report estimated coefficients as “Mincer rates of return”.
  A more recent literature uses instrumental variables. This chapter considers the economic interpretation of these analyses
  and how the availability of repeated cross section and panel data improves the ability of analysts to estimate the rate
  of return. We consider under what conditions the Mincer model estimates an ex post rate of return. We test and reject the
  model on six cross sections of US Census data. We present a general …
