# ============================================================================
# BEHAVIORAL MAPPING
# ============================================================================
behavioral_mapping:
  source: "original paper analysis"
  dimensions:
    - domain: occupational_entry
      stages:
        - preparation
        - action
      primary_dimension: I
      psi_dominant: institutional_barrier
      gamma: 0.0
      A_level: 0.6
      W_level: 0.4
      awareness_type: explicit
      key_insight: |
        Licensing functions as a formal institutional barrier (Psi_I) that restricts
        labor supply. Unlike noncompetes (behavioral mechanism), licensing operates
        through explicit legal requirements. The 5%→24% growth is driven by
        professional organizations (Psi_S) that reshape institutional context (Psi_I).
        This is a case where social actors systematically create institutional barriers
        for rent extraction, disguised as consumer protection.

    - domain: geographic_mobility
      stages:
        - evaluation
        - preparation
      primary_dimension: I
      psi_dominant: licensing_reciprocity
      gamma: 0.0
      A_level: 0.5
      W_level: 0.6
      awareness_type: explicit
      key_insight: |
        Licensing reduces geographic mobility because licenses are state-specific.
        Workers must re-qualify when moving across state lines, creating a mobility
        friction (Psi_I). This complements noncompete effects (Starr) and
        concentration effects (Berger/Prager) as a third mechanism reducing worker
        mobility and bargaining power.

