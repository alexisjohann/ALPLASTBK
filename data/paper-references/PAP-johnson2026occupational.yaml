# ============================================================================
# ABSTRACT & SOURCE
# ============================================================================
abstract: |
  This paper reviews occupational licensing in the United States. Roughly 24% of the
  US workforce requires an occupational license (up from 5% in 1950), covering over 800
  occupations. Licensing generates an approximately 15% wage premium. Analysis of
  late-adopter states shows a +4% wage effect 25 years after licensing adoption. The
  founding of a professional organization increases the probability of licensing by 20
  percentage points, suggesting incumbent rent-seeking as a primary driver. Teachers and
  nurses account for 20% of all licensed workers. Evidence that licensing improves service
  quality is mixed/weak, while evidence of entry restriction and reduced geographic
  mobility is strong.

