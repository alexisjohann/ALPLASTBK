summary:
  abstract_extended: |
    This working paper by Gerhard Fehr (FehrAdvice) and Matthias Sutter (MPI Bonn)
    systematically challenges Herzenstein & Netzer (2024), who claimed that linguistic
    features (LIWC: Clout, Analytic, Tone) predict replication success "above and beyond"
    methodological controls.

    THE M-SCORE: A 7-factor weighted composite capturing methodology quality:
    M = 0.25×TRI + 0.20×NOD + 0.15×THF + 0.15×APP + 0.10×INC + 0.10×STD + 0.05×REP

    THREE KEY RESULTS:
    1. Random sample (N=60): M-Score predicts replication r=.70, 88% accuracy
    2. Linguistic features: r ≈ 0, 59% accuracy (chance level)
    3. Critical cases (N=24): d=6.05 methodology gap, zero language discrimination

    PARTIAL CORRELATIONS (decisive):
    - r(M-Score, Replication | Language) = .696, p < .0001
    - r(Language, Replication | M-Score) = -.128, p = .43

    CONCLUSION: The "language of replicable science" is simply the language of good
    methodology. Confident writing reflects confidence in methods—whether warranted
    depends entirely on the methods themselves.

  key_findings: |
    1. M-Score predicts replication with r = .70 (88% classification accuracy)
    2. Linguistic features show r ≈ 0 (59% accuracy, approximately chance)
    3. Critical cases comparison: d = 6.05 (10x typical psychological effects)
    4. Partial correlations prove M-Score is the true predictor, not language
    5. Zurich School (Fehr, Falk, Gaechter, Fischbacher) achieves >95% replication rate
    6. Key methodological factors: no deception, real incentives, standardized software,
       triangulation, formal theory

  ebf_relevance: |
    Domain: METHOD (Methodology validation), CORE-WHERE (Parameter quality)
    10C Dimensions: WHERE (parameter provenance), HOW (methodology determines reliability)
    Theory Support: MS-RS-001 (M-Score Replication Framework)
    Parameters: PAR-REP-001 to PAR-REP-007 (7 M-Score weights)

    CRITICAL FOR EBF: This paper validates the methodological foundation that EBF is
    built upon. The 7 M-Score factors (triangulation, no-deception, formal theory,
    transparency, incentive compatibility, standardized tools, prior replications)
    are exactly the principles that the Zurich School and EBF Framework follow.
    The paper provides quantitative evidence that these practices produce replicable science.

  sources: |
    - Fehr, G. & Sutter, M. (2025). MPI Discussion Paper.
    - BibTeX: bibliography/bcm_master.bib (fehr2025methodology)

