title: "Methodology, Not Language, Predicts Replication Success: A Reanalysis of Herzenstein & Netzer (2024)"
author: Fehr
year: '2025'
doi: null
publication_type: working_paper
reference_count: '18'
abstract: |
  Herzenstein and Netzer (2024, Psychological Science) reported that linguistic features
  of scientific papers predict replication success "above and beyond" methodological controls.
  We conducted a systematic reanalysis using (a) a random sample from their dataset (N = 60
  studies) and (b) a comprehensive comparison of 24 famous studies—12 that failed to replicate
  and 12 that succeeded—all written with confident language. Our Methodology Score (M-Score)
  captures factors omitted from H&N's controls: triangulation, no-deception policies, formal
  theoretical foundations, incentive compatibility, and standardized software. Results:
  (a) M-Score predicts replication with r = .70, achieving 88% classification accuracy;
  (b) linguistic features show r approx 0 (59% accuracy); (c) in the critical cases comparison,
  the M-Score gap between failed and successful studies is d = 6.05—approximately ten times
  larger than typical psychological effects—while language style is indistinguishable.

