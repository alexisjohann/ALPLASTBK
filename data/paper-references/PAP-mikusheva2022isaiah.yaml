abstract: Isaiah Andrews is an exceptionally warm and caring person, a remarkable teacher, a collaborator and mentor, an exemplary
  contributor to his department and profession, and a brilliant econometrician. In this article, we review Isaiah’s contributions
  to econometric theory in the context of Isaiah’s receipt of the 2021 John Bates Clark Medal.
