abstract: 'This paper tests predictions from reputational cheap-talk theory through
  a laboratory experiment examining when and why people demand advice. Key findings:
  (1) Demand for advice does NOT depend on whether advice is confirmatory or contrarian;
  (2) Approximately 50% of participants do NOT update beliefs about advice quality;
  (3) Participants exhibit hot-hand fallacy when purchasing advice. Results challenge
  standard models of rational information acquisition.'
