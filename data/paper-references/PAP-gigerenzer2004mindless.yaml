title: Mindless Statistics
author: Gigerenzer
year: '2004'
publication_type: journal_article
doi: 10.1016/j.socec.2004.09.033
abstract: Statistical rituals largely eliminate statistical thinking in the social sciences. Rituals are indispensable for
  identification with social groups, but they should be the subject rather than the procedure of science. The null ritual
  consists of three steps - set up a null hypothesis, use the 5 percent significance level, and always perform this procedure.
  This paper reports evidence of the resulting collective confusion and fears about sanctions on the part of students and
  teachers, researchers and editors, as well as textbook writers. The author asks why intelligent people engage in statistical
  rituals rather than statistical thinking.
