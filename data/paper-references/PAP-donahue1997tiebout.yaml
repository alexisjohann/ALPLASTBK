abstract: The market metaphor of intergovernmental choice as a spur to efficiency (formalized by Charles M. Tiebout) is often
  invoked to support the shift away from Washington and toward the states. But the model translates badly to governments;
  governmental entry and exit is costly. Public-sector co11usion often serves citizens' interests. Heterogeneous mobility
  distorts the signals sent by interstate migration. And while Tiebout (and followers) condition efficiency predictions on
  optimal distribution, the U.S. devolution movement coincides with rising inequality and has gone furthest where distribution
  matters most. The metaphor is misapplied. Devolution will likely do more to enfeeble government than to improve it.
