abstract: The modern theory of international trade identifies several additional sources of the gains from international trade
  beyond the gains from traditional comparative advantage. These are the gains from importing new product varieties; the gains
  from “creative destruction” as the relatively most productive firms expand their output by exporting while the less-productive
  firms exit; and the gains from competition between firms in different countries, which can lead to reduced markups. Estimates
  of these various gains are provided for the United States and other countries.
