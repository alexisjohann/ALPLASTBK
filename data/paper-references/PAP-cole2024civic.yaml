title: The Effects of Civic Integration Requirements on Immigrant Integration
author: Cole
year: '2024'
publication_type: journal_article
doi: 10.1086/727716
content_level: L1
summary:
  abstract: 'Using a quasi-experimental design based on a Dutch civic integration reform, this paper evaluates whether adding
    practical skills components to integration requirements improves immigrant outcomes. The reform significantly improved
    employment rates, wages, and job-match quality for third-country nationals. The findings suggest that civic integration
    programs with practical skills components are not merely symbolic but have measurable positive effects on economic integration.

    '
