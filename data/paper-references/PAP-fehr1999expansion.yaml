summary:
  abstract_extended: 'This paper examines the evolutionary foundations of cooperation and punishment

    in human societies. We analyze how costly punishment can evolve and sustain

    cooperation even in large groups where reputation effects are limited.'
  key_findings: "1. EVOLUTIONARY DYNAMICS\n   - Punishment stabilizes cooperation\n   - Second-order free-rider problem\n\
    \   - Group selection mechanisms\n\n2. COOPERATION MECHANISMS\n   - Altruistic punishment\n   - Indirect reciprocity\n\
    \   - Reputation effects\n\n3. LARGE GROUP COOPERATION\n   - Punishment overcomes group size limits\n   - Institutional\
    \ enforcement evolves\n   - Cultural transmission matters"
  ebf_relevance: '10C DIMENSIONS:

    - WHAT (C): Evolved cooperation preferences

    - HOW (B): Punishment-cooperation dynamics

    - WHEN (V): Group size and anonymity


    THEORY SUPPORT:

    - MS-SR-001: Strong Reciprocity

    - Evolutionary game theory

    - Proc Roy Soc B (biology)


    KEY INSIGHT:

    Costly punishment can evolve and sustain cooperation in large groups,

    providing a solution to the collective action problem beyond reputation

    and reciprocity.'
