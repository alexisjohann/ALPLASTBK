core_contribution: 'Develops partial identification approach for making valid causal
  inferences

  when experimental randomization is imperfect. Exploits symmetries in the

  distribution of treatment status that persist despite post-randomization

  reassignment. Controls familywise error rate in finite samples using

  Romano-Wolf stepdown procedure.

  '
key_concepts:
- id: KC-01
  name: Imperfect Randomization
  definition: Treatment status reassigned after initial randomization based on observed/unobserved
    characteristics
  ebf_relevance: Real-world interventions rarely have perfect randomization
- id: KC-02
  name: Partial Identification
  definition: Bound treatment effects using information limiting extent of randomization
    imperfection
  ebf_relevance: Provides conservative but valid inference when point identification
    fails
- id: KC-03
  name: Symmetry-based Testing
  definition: Exploit G_{Z,U} (permutations) × H_{Z,U} (sign changes) that preserve
    null distribution
  ebf_relevance: Foundation for finite-sample valid randomization tests
- id: KC-04
  name: Familywise Error Rate (FWER)
  definition: Probability of at least one false rejection among multiple hypotheses
  ebf_relevance: Controls spurious discoveries in intervention evaluation
- id: KC-05
  name: Romano-Wolf Stepdown
  definition: Stepwise multiple testing procedure incorporating dependence structure
  ebf_relevance: More powerful than Bonferroni while controlling FWER
- id: KC-06
  name: Conservative Critical Value
  definition: c̄_L = max_{u∈U(D,MW)} c_L(u) - maximize over unobserved set
  ebf_relevance: Robust to uncertainty about unobserved characteristics
randomization_procedure:
  step_1:
    description: Sibling assignment
    rule: Younger siblings assigned same treatment status as elder siblings
    rationale: Avoid within-family spillovers
  step_2:
    description: Initial grouping
    rule: Rank by IQ, form odd/even groups
    rationale: Balance on key predictor
  step_3:
    description: Balance adjustment
    rule: Exchange participants to balance gender and SES
    rationale: Improve covariate balance
  step_4:
    description: Random assignment
    rule: Label groups treatment/control with equal probability
    rationale: Core randomization
  step_5:
    description: Post-randomization reassignment
    rule: Move participants with unavailable mothers to control
    rationale: Program requirement (weekly home visits)
    problem: Based on unobserved characteristic U
formal_framework:
  notation:
    Y_ijk_d: Potential outcome k for sibling i in family j under treatment d
    D_j: Treatment status of family j
    Z_j: Observed characteristics (Gender, SES, IQ, Wave)
    U_j: 'Unobserved: mother working and unavailable'
    MW_j: 'Observed: mother working'
  key_sets:
    G_zu: Permutations preserving (z,u) within families
    H_zu: '{uh: h∈H_z} - sign changes respecting u'
    U_D_MW: '{u: u_j=0 if D_j=1 or MW_j=0}'
  assumptions:
    A3_1: '(Y_k(d): d,k) ⊥ D | Z,U'
    A3_2: δ₁(gd,gz) = gδ₁(d,z) for g∈G
    A3_3: hδ₁(d,z) = δ₁(hd,z) for h∈H_z
    A3_4: δ₂(d,u)_j = 0 if d_j=1 and u_j=1; else d_j
    A3_5: U_j=0 if MW_j=0
  key_lemma:
    name: Lemma 4.1
    result: hgD|Z,U =ᵈ D|Z,U for g∈G_{Z,U}, h∈H_{Z,U}
    implication: Symmetries enable valid randomization tests
  theorems:
    theorem_4_1:
      name: Single Hypothesis Test
      result: P{T_L > c̄_L(1-α)} ≤ α for all P∈ω_L
      significance: Finite-sample Type I error control
    theorem_4_2:
      name: Multiple Hypothesis Test
      result: Algorithm 4.1 controls FWER at level α
      significance: Multiple testing correction
