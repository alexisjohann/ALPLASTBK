paper: heckman2023imperfect
superkey: PAP-heckman2023imperfect
title: 'Dealing with Imperfect Randomization: Inference for the HighScope Perry Preschool
  Program'
author: Heckman, James J. and Pinto, Rodrigo and Shaikh, Azeem M.
year: '2023'
publication_type: working_paper
doi: 10.3386/w31982
abstract: This paper considers the problem of making inferences about the effects
  of a program on multiple outcomes when the assignment of treatment status is imperfectly
  randomized. By imperfect randomization we mean that treatment status is reassigned
  after an initial randomization on the basis of characteristics that may be observed
  or unobserved by the analyst. We develop a partial identification approach to this
  problem that makes use of information limiting the extent to which randomization
  is imperfect to show that it is still possible to make nontrivial inferences about
  the effects of the program in such settings. We consider a family of null hypotheses
  in which each null hypothesis specifies that the program has no effect on one of
  many outcomes of interest. Under weak assumptions, we construct a procedure for
  testing this family of null hypotheses in a way that controls the familywise error
  rate--the probability of even one false rejection--in finite samples. We develop
  our methodology in the context of a reanalysis of the HighScope Perry Preschool
  program.
abstract_source: bibtex
