abstract: 'We present a replication of Bartling et al. (2014) who developed an experiment to measure the intrinsic value of
  decision rights. We can confirm their seminal results for individuals with remarkable accuracy, thus strongly confirming
  the prior of a robust result. Motivated by the observation that team decision making is ubiquitous, we then extend their
  design by studying how teams value decision rights. In the aggregate, we find no differences between individuals and teams.
  However, in our exploratory analysis, we uncover an important heterogeneity: teams with a smooth decision making process
  have much lower intrinsic values of decision rights than individuals, but teams with internal conflicts have much higher
  values, thus distorting decisions.'
