abstract: Pharmaceuticals have greatly improved health in developing countries, but many people in developing countries do
  not obtain even inexpensive pharmaceuticals and little pharmaceutical R&amp;D is oriented toward products needed by developing
  countries, such as a malaria vaccine. Access to existing products could be improved by facilitating differential pricing,
  for example by subsidizing donation programs, and reforming health care delivery. R&amp;D incentives could be improved if
  rich countries or international organization committed to purchase needed products when they are developed and make them
  available to the poor.
