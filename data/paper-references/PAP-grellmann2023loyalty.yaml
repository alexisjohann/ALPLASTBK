notes: "PRACTITIONER PAPER FROM ST. GALLEN (Marketing Delta 2023)\n\nAUTHORS:\n- Laura-Eve\
  \ Grellmann: Researcher, St. Gallen\n- Mauro Gotsch: FH Graubünden\n- Marcus Schögel:\
  \ Professor für Marketing, Universität St. Gallen\n  Director of the Institute for\
  \ Marketing (IfM-HSG)\n  Same author as PAP-schoegel2024cxnavigator and co-author\
  \ on PAP-herhausen2019firestorms\n\nKEY CONTRIBUTION TO EBF:\n1. 3-Benefit-Types\
  \ Framework operationalizes WHAT dimension for loyalty programs\n2. Journey phase\
  \ analysis connects to STAGE dimension\n3. Self-selection bias warning relevant\
  \ for causal identification\n4. Data strategy evolution informs METHOD considerations\n\
  5. Quantifies perception gap: Hard (84.74%) >> Soft (14.64%) >> Community (0.62%)\n\
  \nCOUNTERINTUITIVE FINDINGS:\n1. Community Benefits nearly absent (0.62%) despite\
  \ high potential\n2. Programs neglect phases where loyalty is actually built (After\
  \ Sales)\n3. Self-selection inflates apparent loyalty effect\n\nMETHODOLOGICAL LIMITATIONS:\n\
  - Descriptive survey design (no causal identification)\n- German market only (external\
  \ validity limited)\n- Cross-sectional (no longitudinal dynamics)\n- Self-reported\
  \ data (social desirability bias possible)\n\nEBF INTEGRATION LEVEL 2 (STANDARD):\n\
