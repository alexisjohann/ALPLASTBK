  10c_dimensions:
    WHO: 'Two populations studied:

      1. German consumers (N=1,047) - loyalty program members

      2. German marketers (N=60) - loyalty program managers

      Self-selection bias documented: Loyal customers self-select into programs

      '
    WHAT: '3 Benefit Types with distinct utility contributions:

      - Hard Benefits (u_F): Monetary rewards, discounts, points, cashback

      - Soft Benefits (u_S): Priority service, early access, experiences, events

      - Community Benefits (u_IDN): Exclusive events, insider forums, belonging

      Perception gap: u_F dominates perception (84.74%), u_S (14.64%), u_IDN (0.62%)

      '
    HOW: 'Benefit types interact with journey phases:

      - Hard Benefits effective in early phases (Purchase: 4.76)

      - Soft Benefits underutilized in later phases

      - Community Benefits nearly absent (0.62%)

      Complementarity opportunity: Soft+Community in later journey phases

      '
    WHEN: 'Customer Journey Phase Analysis:

      - Awareness (4.44), Consideration (4.46), Purchase (4.76): Strong

      - Delivery (3.75), After Sales (3.52): Weak

      Programs neglect post-purchase phases where loyalty is actually built

      '
    WHERE: 'German market study:

      - Consumer sample: N=1,047 German loyalty program members

      - Marketer sample: N=60 German marketing professionals

      - Context: German retail, service industries

      '
    AWARE: 'Awareness gap identified:

      - Consumers primarily aware of Hard Benefits

      - Soft and Community Benefits lack salience

      - Marketers aware of gap but struggle to address it

      '
    READY: 'Program readiness varies:

      - Transaction Data: Standard, all programs

      - Behavioral Data: Emerging, some programs

      - Context Data: Rare, advanced programs

      GDPR driving First Party Data importance

      '
    STAGE: 'Maps to CX Navigator 7-Step Process (Schögel 2024):

      1. Detect need → Awareness

      2. Search → Consideration

      3-4. Evaluate/Decide → Purchase

      5. Purchase → Delivery

      6-7. Use/Engage → After Sales

      Gap: Steps 5-7 underserved by loyalty programs

      '
    HIERARCHY: 'Benefit hierarchy proposed:

      1. Hard Benefits (hygiene factor, expected)

      2. Soft Benefits (satisfier, differentiator)

      3. Community Benefits (delighter, rare)

      Maps to Kano Model categories

      '
    EIT: 'Intervention implications:

      1. Rebalance benefit portfolio (reduce Hard, increase Soft/Community)

      2. Extend program touchpoints to Delivery and After Sales

      3. Combat self-selection through experimental design

      4. Evolve data strategy toward Context Data

      '
