abstract: Schumpeterian growth theory has operationalized Schumpeter's notion of creative destruction by developing models
  based on this concept. These models shed light on several aspects of the growth process that could not be properly addressed
  by alternative theories. In this survey, we focus on four important aspects, namely:(i) the role of competition and market
  structure;(ii) firm dynamics;(iii) the relationship between growth and development with the notion of appropriate growth
  institutions; and (iv) the emergence and …
