title: Simple Heuristics That Make Us Smart
author: Gigerenzer
year: '1999'
doi: 10.1093/acprof:oso/9780195143812.001.0001
abstract: This book develops the concept of 'fast and frugal heuristics' - simple decision rules that exploit the structure
  of the environment to make accurate judgments with minimal information. The authors argue that bounded rationality is not
  a deficiency but an adaptation, and that simple heuristics can outperform complex optimization strategies in uncertain environments.
  Key heuristics include recognition heuristic, take-the-best, and satisficing, which trade off accuracy for speed and robustness.
