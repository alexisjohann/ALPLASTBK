abstract: Do the political institutions of a majoritarian representative democracy, and in particular those of the United
  States, systematically produce either levels of public spending or budget deficits that are excessive? Should U.S. political
  institutions be altered by constitutional amendment to deal with these problems? I will start by examining the issue of
  public spending, and then turn to the question of budget deficits.
