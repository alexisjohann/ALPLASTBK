abstract: Ronald Coase based his 1959 call for spectrum markets on theoretical conjecture. Today abundant evidence supports
  his case. Targeted liberalization in cellular markets, as contrasted with regulatory planning of the digital TV transition
  and other traditional policies, suggest enormous efficiency gains are available from wider use of “the price system.” With
  exclusive frequency rights assigned to owners, markets widely reconfigure spectrum use, coordinating complex spectrum sharing.
  Resulting social gains include increased consumer surplus from enhanced technological innovation and wireless service competition.
  A social bonus arrives in the benefits associated with wider scope for free speech. Yet, the administrative allocation system
  continues to distribute rents and garner political support. Liberal reforms, in contrast, produce large but broadly dispersed
  efficiency gains and are undersupplied. This paper proposes an incremental extension of property rights in spectrum to move
  beyond the current rent-seeking equilibrium, eliminating the Federal Communications Commission's centralized spectrum allocation
  process and, with it, an “attractive nuisance” generating anticonsumer outcomes.
