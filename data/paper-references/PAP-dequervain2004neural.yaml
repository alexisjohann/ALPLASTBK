title: The Neural Basis of Altruistic Punishment
author: Quervain
year: '2004'
publication_type: journal_article
doi: 10.1126/science.1100735
abstract: Altruistic punishment is the costly punishment of norm violators even though
  the punisher derives no material benefit. Using positron emission tomography, we
  investigated the neural basis of altruistic punishment. We found that the dorsal
  striatum, which has been implicated in reward processing, is activated when punishing
  defectors. Activation in this region was positively correlated with the actual expenditure
  on punishment. Moreover, subjects with higher activation in the dorsal striatum
  punished more. These findings suggest that altruistic punishment is rewarding for
  the punisher and that the brain processes punishment as a form of reward.
