abstract: The fraction of U.S. college graduate women entering professional programs
  increased substantially just after 1970, and the age at first marriage among all
  U.S. college graduate women began to soar around the same year. We explore the relationship
  between these two changes and the diffusion of the birth control pill ("the pill")
  among young, unmarried college graduate women. Although the pill was approved in
  1960 by the Food and Drug Administration and spread rapidly among married women,
  it did not diffuse among young, single women until the late 1960s after state law
  changes reduced the age of majority and extended "mature minor" decisions. We present
  both descriptive time series and formal econometric evidence that exploit cross-state
  and cross-cohort variation in pill availability to young, unmarried women, establishing
  the "power of the pill" in lowering the costs of long-duration professional education
  for women and raising the age at first marriage.
