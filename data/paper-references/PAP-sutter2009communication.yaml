abstract: We study the effects of communication in an experimental tournament between teams. When teams, rather than individuals,
  compete for a prize there is a need for intra-team coordination in order to win the inter-team competition. Introducing
  communication in such situations may have ambiguous effects on effort choices. Communication within teams may promote higher
  efforts by mitigating the internal free-rider problem. Communication between competing teams may lead to collusion, thereby
  reducing efforts. In our experiment we control the …
