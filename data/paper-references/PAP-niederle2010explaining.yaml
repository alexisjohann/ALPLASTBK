abstract: The mean and standard deviation in performance on math test scores are only slightly larger for males than for females.
  Despite minor differences in mean performance, many more boys than girls perform at the right tail of the distribution.
  This gender gap has been documented for a series of math tests including the AP calculus test, the mathematics SAT, and
  the quantitative portion of the Graduate Record Exam (GRE). The objective of this paper is not to discuss whether the mathematical
  skills of males and females differ, be it a result of nurture or nature. Rather we argue that the reported test scores do
  not necessarily match the gender differences in math skills. We will present results that suggest that the evidence of a
  large gender gap in mathematics performance at high percentiles in part may be explained by the differential manner in which
  men and women respond to competitive test-taking environments. The effects in mixed-sex settings range from women failing
  to perform well in competitions, to women shying away from environments in which they have to compete. We find that the
  response to competition differs for men and women, and in the examined environment, gender difference in competitive performance
  does not reflect the difference in noncompetitive performance. We argue that the competitive pressures associated with test
  taking may result in performances that do not reflect those of less-competitive settings. Of particular concern is that
  the distortion is likely to vary by gender and that it may cause gender differences in performance to be particularly large
  in mathematics and for the right tail of the performance distribution. Thus the gender gap in math test scores may exaggerate
  the math advantage of males over females.
