abstract: The 2024 John Bates Clark Medal of the American Economic Association was awarded to Philipp Strack, Professor of
  Economics at Yale University, for his pathbreaking contributions to the study of individual decision making, which have
  introduced new techniques, improved our understanding of important economic phenomena, and helped spark a new wave of research
  on the economics of information while building bridges between modern economic theory and a wide range of adjacent disciplines.
  This article summarizes some of Philipp’s papers, and explains how they build on and improve previous work.

