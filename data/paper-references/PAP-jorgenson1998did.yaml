abstract: Official U.S. poverty statistics based on household income imply that the proportion of the U.S. population below
  the poverty level reached a minimum in 1973, giving rise to the widespread impression that the elimination of poverty is
  impossible. By contrast, poverty estimates based on household consumption have fallen through 1989 and imply that the war
  on poverty was a success. This paper recommends replacing income by consumption in official estimates of poverty in order
  to obtain a more accurate assessment of the impact of income support programs and economic growth on the level and distribution
  of economic well-being among households.
