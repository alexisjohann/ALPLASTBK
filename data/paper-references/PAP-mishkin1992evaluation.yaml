abstract: 'The Treasury plan for banking reform--Modernizing the Financial System: Recommendations for Safer More Competitive
  Banks--was released on February 5, 1991 (U.S. Treasury, 1991), and has a stated purpose of promoting a safe, sound, and
  competitive banking system. It contains recommendations for the most thorough overhaul of the banking regulatory system
  since the Great Depression. This paper provides a framework for understanding the U.S. banking regulatory system and how
  it has produced the current crisis in the banking industry, and uses this analysis to evaluate the Treasury plan.'
