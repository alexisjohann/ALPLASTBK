abstract: This paper analyzes a newly assembled data set consisting of subjective indices of corruption, the amount of red
  tape, the efficiency of the judicial system, and various categories of political stability for a cross section of countries.
  Corruption is found to lower investment, thereby lowering economic growth. The results are robust to controlling for endogeneity
  by using an index of ethnolinguistic fractionalization as an instrument.
