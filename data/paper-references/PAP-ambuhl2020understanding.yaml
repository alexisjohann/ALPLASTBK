abstract: 'A strategy is obviously dominant if, for any deviation, at any information set where both strategies first diverge,
  the best outcome under the deviation is no better than the worst outcome under the dominant strategy. A mechanism is obviously
  strategy-proof (OSP) if it has an equilibrium in obviously dominant strategies. This has a behavioral interpretation: a
  strategy is obviously dominant if and only if a cognitively limited agent can recognize it as weakly dominant. It also has
  a classical interpretation: a choice rule is OSP-implementable if and only if it can be carried out by a social planner
  under a particular regime of partial commitment. (JEL D11, D44, D82)'
