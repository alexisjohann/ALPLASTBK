abstract: This paper analyzes the divergence between stated preferences (what people say they want) and revealed preferences
  (what their behavior shows they want). Sunstein examines how people's explicit verbal statements about their values often
  conflict with their actual choices, with implications for policy design. The analysis considers when stated or revealed
  preferences should take precedence, exploring cases where behavioral data is more reliable than survey responses and vice
  versa. This work informs debates about paternalism, nudging, and the proper interpretation of welfare.
