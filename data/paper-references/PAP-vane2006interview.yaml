abstract: Robert A. Mundell has been Professor of Economics at Columbia University in New York City, New York, since 1974
  and University Professor since 2001. In 1999, he was awarded the Nobel Memorial Prize in Economic Science “for his analysis
  of monetary and fiscal policy under different exchange rate regimes and his analysis of optimum currency areas.” We interviewed
  Professor Mundell at his hotel in Boston, Massachusetts, on January 7, 2006, while attending the annual meeting of the Allied
  Social Science Associations.
