abstract: We begin by providing an overview of the auto insurance system and the structure of the auto insurance market. We
  then turn to an analysis of the factors underlying the auto insurance price increases experienced in recent years. We find
  that the auto insurance inflation of the 1980s was caused primarily by increases in cost factors, especially inflation in
  the severity of personal injury claims. There is no persuasive evidence that increasing profit rates or expense loadings
  contributed to inflation in premiums. The paper concludes with recommendations for bringing costs under control.
