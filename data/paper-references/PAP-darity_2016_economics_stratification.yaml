abstract: Abstract Research within cultural psychology and intergroup relations represent
  two, often separate and distinct, approaches to examining social groups—including
  outcomes and experiences that define and distinguish group membership and its consequences.
  Often, social group membership (e.g., race/ethnicity, gender, and social class)
  is tied to persistent and pervasive divides—separations that mark the difference
  in who attends college, stays in science, technology, engineering, and mathematics
  (STEM) fields, and even views personal and societal events (e.g., microaggressions,
  police‐involved shootings) as involving bias. Addressing such complex and often
  divisive issues, psychological science has contributed theoretical and applied insights
  to mitigate social differences and inequalities experienced by historically disadvantaged
  social groups. The present paper integrates research on cultural psychology and
  intergroup relations by (a) reviewing empirical findings on sociocultural selves
  and intergroup contact and (b) considering how merging approaches from these literatures,
  using a selves in contact framework, can inform and elaborate theoretical perspectives
  and applications aimed at reducing inequality.
