abstract: This paper considers Britain's failure to maintain its lead in economic growth in the face of overtaking by the
  United States. Recent cliometric research is reviewed and it is argued that early nineteenth century Britain had a low growth
  potential by twentieth century standards and that the American growth of the early twentieth century was of a quite different
  kind. Neither traditional nor new growth theories can encompass this experience and it is suggested that natural resource
  endowments, location-specific learning processes, and the international migration of factors of production were central
  aspects of American overtaking of Britain.
