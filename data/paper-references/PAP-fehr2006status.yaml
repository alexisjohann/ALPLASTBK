summary:
  abstract_extended: 'This paper examines the interaction between status quo bias and inequality

    aversion. We show that people''s aversion to inequality interacts with their

    preference for the status quo, creating complex behavioral patterns. This

    has implications for policy design and institutional change.'
  key_findings: "1. STATUS QUO EFFECTS\n   - Default matters\n   - Loss aversion component\n   - Change resistance\n\n2. INEQUALITY\
    \ INTERACTION\n   - Depends on position\n   - Status quo anchor\n   - Legitimacy effects\n\n3. POLICY IMPLICATIONS\n \
    \  - Design defaults carefully\n   - Consider inequality\n   - Transition matters"
