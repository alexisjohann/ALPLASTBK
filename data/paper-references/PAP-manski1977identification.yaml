abstract: 'This paper presents a formal analysis of the distributional structure of
  random utility models. Its essential conceptual contribution lies in its explicit
  treatment of the processes making perfect predictions of choice behavior unattainable.
  The paper''s technical contribution is its demonstration of the manner in which
  these processes induce the distributional properties of a model. In contrast to
  the approach adopted here, the existing literature on random utility models generally
  imposes distributional assumptions directly. Because it leaves so much implicit,
  this practice has often caused researchers to remain unaware of the restrictiveness
  of their models. Only a few authors, working with specific simple models, have chosen
  to lay the foundations of their research more deeply. Their efforts will be described
  shortly. Historically, random utility models, a subset of the class of probabilistic
  choice models, were first developed by psychologists in the attempt to characterize
  observed inconsistencies in patterns of individual behavior." A definition offered
  by Block and Marschak (1960) can be paraphrased for our purposes as follows:'
