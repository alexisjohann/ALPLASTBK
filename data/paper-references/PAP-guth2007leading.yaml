publication_type: journal_article
abstract: We examine the effects of leading by example in voluntary contribution experiments. Leadership is implemented by
  letting one group member contribute to the public good before followers do. Such leadership increases contributions in comparison
  to the standard voluntary contribution mechanism, especially so when it goes along with authority in the form of granting
  the leader exclusion power. Whether leadership is fixed or rotating among group members has no significant influence on
  contributions. Only a minority of groups succeeds in endogenously installing a leader, even though groups with leaders are
  much more efficient than groups without a leader.
