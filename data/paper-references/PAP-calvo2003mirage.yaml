abstract: This paper argues that much of the debate on choosing an exchange rate regime misses the boat. It begins by discussing
  the standard theory of choice between exchange rate regimes, and then explores the weaknesses in this theory, especially
  when it is applied to emerging market economies. It then discusses a range of institutional traits that might predispose
  a country to favor either fixed or floating rates, and then turns to the converse question of whether the choice of exchange
  rate regime may favor the development of certain desirable institutional traits. The conclusion from the analysis is that
  the choice of exchange rate regime is likely to be of second order importance to the development of good fiscal, financial,
  and monetary institutions in producing macroeconomic success in emerging market countries. This suggests that less attention
  should be focused on the general question whether a floating or a fixed exchange rate is preferable, and more on these deeper
  institutional arrangements. A focus on institutional reforms rather than on the exchange rate regime may encourage emerging
  market countries to be healthier and less prone to the crises that we have seen in recent years.
