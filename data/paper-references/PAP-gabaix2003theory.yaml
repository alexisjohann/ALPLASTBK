abstract: Insights into the dynamics of a complex system are often gained by focusing on large fluctuations. For the financial
  system, huge databases now exist that facilitate the analysis of large fluctuations and the characterization of their statistical
  behaviour. Power laws appear to describe histograms of relevant financial fluctuations, such as fluctuations in stock price,
  trading volume and the number of trades. Surprisingly, the exponents that characterize these power laws are similar for
  different types and sizes of markets, for different market trends and even for different countries suggesting that a generic
  theoretical basis may underlie these phenomena. The authors propose a model, based on a plausible set of assumptions, which
  provides an explanation for these empirical power laws.
