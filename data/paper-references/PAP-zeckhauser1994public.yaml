abstract: 'Public finance principles, though usually treated as a minor consideration, lie at the heart of effective national
  health care reform. Four principles are discussed: charge for a service where its cost is created; distinguish rents, resources,
  and transfers; know what services cost and pay accordingly; balance distributional and equity concerns. The principles’
  implications include: since employment does not much affect health costs, financing (particularly of incremental insureds)
  need not be employer-based; health resources being immobile, many cutbacks in expenditure will not reflect real resource
  savings; and health care financing should mesh with an overall program of taxation and expenditure.'
