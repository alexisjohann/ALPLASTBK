abstract: We analyze a sequential decision model in which each decision maker looks
  at the decisions made by previous decision makers in taking her own decision. This
  is rational for her because these other decision makers may have some information
  that is important for her. We then show that the decision rules that are chosen
  by optimizing individuals will be characterized by herd behavior; i.e., people will
  be doing what others are doing rather than using their information. We then show
  that the resulting equilibrium is inefficient.
