abstract: 'First major field experiment on the demand side of the misinformation market.

  Tests critical thinking interventions (videos, personality tests) during the

  2022 Colombian Presidential election. Videos reduce misinformation vulnerability

  by 30%, while video+test combination increases reporting willingness by 15%.

  '
methodology:
  design: field_experiment
  identification: randomization
  sample_size: 2235
  country: Colombia
  context: 2022 Presidential Election
  treatments:
  - Control (n=645)
  - Personality test only (n=750)
  - Video only (n=408)
  - Both video+test (n=432)
key_findings:
- finding: Videos reduce fake news vulnerability by 30%
  parameter: beta_video = -0.040
  se: 0.019
  significance: p < 0.05
- finding: Video+test increases reporting willingness by 15%
  parameter: beta_both = 0.085
  se: 0.03
  significance: p < 0.01
- finding: Personality test alone has no significant effect
- finding: Videos reduce dehumanization of political outgroups
  left: -0.101 (15% reduction)
  right: -0.061 (9% reduction)
parameters:
- name: Video Effect on Vulnerability
