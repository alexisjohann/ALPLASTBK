paper: list2024misinformation
superkey: PAP-list2024misinformation
title: 'Toward an Understanding of the Economics of Misinformation: Evidence from a Demand Side Field Experiment on Critical
  Thinking'
authors:
- List, John A.
- Ramírez, Lina M.
- Seither, Julia
- Unda, Jaime
