summary:
  abstract_extended: 'The study examines discrimination against immigrants using microlevel data

    from Switzerland, where, until recently, some municipalities used REFERENDUMS

    to decide on the citizenship applications of foreign residents.


    The authors show that naturalization decisions vary dramatically with

    immigrants'' attributes, which they collect from official applicant

    descriptions that voters received before each referendum.


    KEY FINDING: COUNTRY OF ORIGIN determines naturalization success more than

    any other applicant characteristic, including:

    - Language skills

    - Integration status

    - Economic credentials


    The average proportion of "no" votes is about 40% HIGHER for applicants from

    the (former) Yugoslavia and Turkey compared to observably similar applicants

    from richer northern and western European countries.


    Statistical and taste-based discrimination contribute to varying naturalization

    success; the rewards for economic credentials are HIGHER for applicants from

    disadvantaged origins.'
  key_findings: '1. Natural experiment: Municipal referendums on citizenship

    2. Country of origin is STRONGEST predictor of success

    3. 40% more "no" votes for Yugoslav/Turkish applicants

    4. Language skills, integration matter LESS than origin

    5. Both statistical and taste-based discrimination present

    6. Returns to credentials higher for disadvantaged origins'
