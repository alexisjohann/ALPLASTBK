abstract: >
  MIT Press book proposing a new work operating system that deconstructs jobs into component tasks and
  deploys workers based on skills rather than job descriptions. The framework deconstructs jobs, job
  holders, and formal degrees into components like tasks/projects, skills/capabilities, and qualifications,
  enabling fluid and agile work reinvention. Case studies include DHL (social robotics), Genentech (job
  deconstruction for flexibility), and internal talent marketplaces. Authors are Jesuthasan (Mercer Senior
  Partner, WEF steering committee) and Boudreau (USC Marshall emeritus professor). Wall Street Journal bestseller.
