title: 'Strategy and the Strategist: How It Matters Who Develops the Strategy'
author: Eric Van den Steen
year: '2018'
publication_type: journal_article
journal: Management Science
volume: '64'
number: '10'
doi: 10.1287/mnsc.2017.2857
working_paper_version: HBS Working Paper 17-002 (July 2016)
abstract: 'This paper addresses primarily two questions. First, when (and why) should

  a company''s strategy be developed by its CEO versus by some outside analyst or
  other

  insider? Second, how does strategy interact with vision (in the sense of a strong

  belief about the right course of action)? The paper studies these questions using

  a functional definition of strategy as "the smallest set of choices to optimally

  guide other choices." Among other things, the paper shows that strategy formulation

  by the CEO leads to both better strategy and better execution, and that a strategist''s

  vision may improve execution. In the process, the paper also identifies criteria

  that make a decision strategic and derives explanations why strategies often reflect

  the background of the strategist.

  '
