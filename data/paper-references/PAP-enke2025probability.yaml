abstract: This paper proposes that cognitive uncertainty - people's subjective uncertainty about what the optimal action or
  judgment is - provides a unified explanation for probability weighting. When facing choices involving probabilities, individuals
  who are uncertain about their own valuations compress their reported preferences toward a cognitive default of 50-50. This
  cognitive imprecision naturally generates the inverse-S shaped probability weighting function commonly observed in prospect
  theory.
