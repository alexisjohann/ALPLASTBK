paper: chater2022iframe
superkey: PAP-chater2022iframe
title: 'The i-frame and the s-frame: How focusing on individual-level solutions has led behavioral public policy astray'
author: Nick Chater, George Loewenstein
year: '2022'
publication_type: journal_article
journal: Behavioral and Brain Sciences
status: in_press
doi: 10.1017/S0140525X22002023
abstract: 'Much behavioral public policy has been directed at encouraging individuals to change their

  behaviors through "nudge" interventions, which attempt to influence the choices that individuals

  make (choice architecture), provide individuals with information or decision-aids, or seek to

  motivate behavioral change through financial or other incentives. While this "individual frame"

  (i-frame) perspective focuses on the individual, the "systemic frame" (s-frame) draws attention

  to systems that affect people''s behavior. These include institutions, markets, legal structures,

  physical environment, and social norms. Our thesis is that many of the problems behavioral policy

  attempts to address are systems problems that require s-frame solutions and, moreover, that

  i-frame interventions are rarely sufficient to solve such problems and can even be counterproductive.

  '
abstract_source: full_text
abstract_fetched: '2026-02-04'
structural_characteristics:
  S1_research_question:
    available: true
    questions:
    - Are behavioral policy problems primarily individual problems or systems problems?
    - Can i-frame (individual-level) interventions solve systems problems?
    - Do i-frame interventions crowd out support for s-frame (systemic) solutions?
    - Why has i-frame thinking dominated behavioral public policy?
    - How do corporate interests benefit from i-frame approaches?
    clarity: high
  S2_methodology:
    available: true
    approach: theoretical_review
    methods:
    - Conceptual framework development (i-frame vs s-frame)
    - Systematic review of 11 policy domains
    - Analysis of intervention effectiveness by frame
    - Political economy analysis of i-frame dominance
    - Review of empirical evidence on crowding out
    - Historical case study analysis
    key_definitions:
    - 'I-frame (individual frame): Approach focusing on changing individual behavior through nudges, information, incentives'
    - 'S-frame (systemic frame): Approach focusing on changing systems - institutions, markets, laws, environment'
    - 'Crowding out: I-frame interventions reducing support for or effectiveness of s-frame solutions'
    - 'Moral licensing: Small positive actions reducing motivation for larger actions'
    - 'Attention crowding: Focus on one type of solution diverting attention from another'
  S3_sample_data:
    available: true
    type: review
    empirical_data: true
    sample_characteristics:
    - 11 policy domains systematically reviewed
    - Climate change, obesity, retirement savings, plastic waste
    - Healthcare, education, discrimination, privacy
    - Misinformation, opioids, gun violence
    - Multiple empirical studies cited per domain
    - Cross-national comparisons where available
    domains_covered:
    - domain: climate_change
      i_frame: carbon footprint, offsets, conservation campaigns
      s_frame: carbon tax, renewable mandates, infrastructure
    - domain: obesity
      i_frame: diet advice, calorie labels, fitness apps
      s_frame: sugar tax, marketing regulations, urban planning
    - domain: retirement
      i_frame: financial literacy, auto-enrollment, commitment devices
      s_frame: mandatory savings, pension regulation, housing policy
    - domain: plastic
      i_frame: recycling campaigns, reusable bags
      s_frame: EPR, production taxes, single-use bans
    - domain: healthcare
      i_frame: patient education, price transparency
      s_frame: universal coverage, drug pricing, social determinants
    - domain: education
      i_frame: grit training, mindset, parental involvement
      s_frame: funding reform, teacher pay, early childhood
    - domain: discrimination
      i_frame: implicit bias training, diversity awareness
      s_frame: audit enforcement, affirmative action, blind review
    - domain: privacy
      i_frame: consent notices, privacy settings
      s_frame: GDPR, data minimization, platform accountability
    - domain: misinformation
      i_frame: media literacy, fact-checking labels
      s_frame: platform regulation, algorithmic transparency
    - domain: opioids
      i_frame: treatment, DARE, individual responsibility
      s_frame: pharma regulation, harm reduction
    - domain: guns
      i_frame: mental health services, safety training
      s_frame: background checks, assault weapons bans
  S4_findings:
    available: true
    key_findings:
    - finding: Most behavioral policy problems are systems problems
      interpretation: Problems created/enabled by systems, not individual failures
      evidence: 11 domain analyses demonstrate systemic causes
    - finding: I-frame solutions are insufficient for systems problems
      interpretation: Individual behavior change cannot solve coordination/structural problems
      evidence: Individual emissions negligible vs. corporate; recycling ineffective
    - finding: I-frame can crowd out s-frame support
      mechanisms:
      - 'Moral licensing: small actions reduce motivation'
      - 'Attention crowding: focus diverted from systemic solutions'
      - 'Responsibility shifting: individuals blamed instead of systems'
      evidence: 'Hagmann et al. 2019: -18 pp systemic proposals after i-frame exposure'
    - finding: Corporate interests benefit from i-frame dominance
      examples:
      - BP invented carbon footprint concept
      - Coca-Cola/Pepsi fund exercise research over diet
      - Beverage industry funded 'Keep America Beautiful' recycling
      interpretation: I-frame deflects responsibility from profitable status quo
    - finding: I-frame dominance has psychological and structural causes
      causes:
      - Fundamental attribution error
      - Just world beliefs
      - Corporate lobbying and funding
      - Academic incentive structures
      - Political feasibility constraints
  S5_validity:
    available: true
    internal_validity:
    - Systematic framework applied across 11 domains
    - Clear conceptual definitions (i-frame vs s-frame)
    - Multiple mechanisms identified for crowding out
    - Evidence cited from multiple empirical sources
    - Alternative explanations considered
    external_validity:
    - 11 diverse policy domains analyzed
    - Cross-national evidence where available
    - Historical and contemporary examples
    - Multiple types of evidence (experimental, observational, historical)
    - Corporate strategy evidence from multiple industries
    limitations:
    - Theoretical framework paper, not primary empirical research
    - Some evidence is indirect or correlational
    - Crowding out magnitude varies by domain
    - S-frame effectiveness evidence varies in quality
    - Political feasibility of s-frame not systematically assessed
  S6_reproducibility:
    available: true
    proofs_available: true
    proof_location: Tables 1-2, systematic domain analyses
    framework_specification: I-frame vs s-frame distinction clearly defined
    assumptions_documented: true
    testable_predictions:
    - I-frame interventions will have limited population-level effects for systems problems
    - I-frame exposure will reduce support for s-frame policies (crowding out)
    - S-frame interventions will be more effective for systems problems
    - Corporate-funded research will favor i-frame solutions
    - I-frame dominance will be greater in industries with strong lobbying
