paper: gaechter2022lossaversion
superkey: PAP-gaechter2022lossaversion
title: Individual-Level Loss Aversion in Riskless and Risky Choices
author: Gächter
year: '2022'
publication_type: journal_article
doi: 10.1007/s11238-021-09830-3
abstract: Loss aversion can occur in riskless and risky choices. Yet, there is no evidence whether people who are loss averse
  in riskless choices are also loss averse in risky choices. We measure individual-level loss aversion in riskless choices
  in an endowment effect experiment by eliciting both WTA and WTP from each of 360 subjects. All subjects also participate
  in a simple lottery choice task measuring loss aversion in risky choices. We find substantial heterogeneity in both measures,
  and they are strongly positively correlated. Median loss aversion in riskless choice is k=1.73; in risky choice it is between
  k=1.15 and 1.50.
