abstract: 'The past 15–20 years have seen substantial and visible changes in the way US retail business is conducted. Explanations
  about what is happening in the retail sector have been dominated by two powerful and not fully consistent narratives: a
  prediction that retail sales will migrate online and physical retail will be virtually extinguished, and a prediction that
  future shoppers will almost all be heading to giant physical stores like warehouse clubs and supercenters. Although online
  retail will surely continue to be a force shaping the sector going forward and may yet emerge as the dominant mode of commerce
  in the retail sector in the United States, its time for supremacy has not yet arrived. We discuss evidence indicating that
  the warehouse clubs/supercenter format has had a greater effect on the shape of retail over the past 15–20 years We begin
  with an overview of the retail sector as a whole, which over the long term has been shrinking as a share of total US economic
  activity and in terms of relative employment share. The retail sector has experienced stronger-than average productivity
  growth, but this has not been accompanied by commensurate wage growth. After discussing the important e-commerce and warehouse
  clubs/supercenters segments, we look more broadly at changes across the structure of the retail sector, including scale,
  concentration, dynamism, and degree of urbanization. Finally, we consider the likely future course of the retail sector.'
