abstract: The European migration crisis of 2015–2016 and the migrants from Central America gathering on the US border since
  2017 have created headlines and presented challenges for Western governments. In this paper, I examine the trends in, and
  determinants of, the number of asylum seekers applying for refugee status in the developed world. This must be understood
  against the background of an international policy regime that evolved in response to refugee crises and geopolitical imperatives.
  While policy has drawn a sharp distinction between refugees and other immigrants, that difference has become increasingly
  blurred among asylum migrants. In this light, I examine the interplay between migration pressures, public opinion, and asylum
  policies in recent decades.
