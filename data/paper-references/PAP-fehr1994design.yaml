summary:
  abstract_extended: 'This paper documents the decline of cooperation in repeated public goods games.

    We show that cooperation levels systematically decrease over time in finite

    horizon games, but the pattern depends on group composition and institutional

    design. Understanding this decay is crucial for designing institutions that

    sustain cooperation.'
  key_findings: "1. COOPERATION DECAY\n   - Cooperation declines over periods\n   - End-game effects observed\n   - Not purely\
    \ strategic unraveling\n\n2. CONDITIONAL COOPERATION\n   - Many subjects are conditional cooperators\n   - Decline driven\
    \ by free-riders\n   - Heterogeneity in types matters\n\n3. INSTITUTIONAL IMPLICATIONS\n   - Design can slow decay\n \
    \  - Communication helps\n   - Punishment opportunities stabilize"
  ebf_relevance: '10C DIMENSIONS:

    - WHAT (C): Cooperation as utility component

    - HOW (B): Strategic complementarity in groups

    - WHEN (V): Time horizon affects behavior


    THEORY SUPPORT:

    - MS-SR-001: Strong Reciprocity

    - Public goods game experiments

    - Early documentation of cooperation dynamics


    KEY INSIGHT:

    Cooperation decay in public goods games is driven by heterogeneous types;

    institutional design can counteract this decline.'
