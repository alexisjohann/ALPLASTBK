  those that were relatively rich in 1500 are now relatively poor. We document this
  reversal using data on urbanization patterns and population density, which, we argue,
  proxy for economic prosperity. This reversal weighs against a view that links economic
  development to geographic factors. Instead, we argue that the reversal reflects
