summary:
  abstract_extended: 'This JEP article examines how market experiences shape attitudes toward

    markets. We show that participation in markets affects social preferences

    and norms, with implications for understanding market institutions and

    their broader social effects.'
  key_findings: "1. MARKET EFFECTS ON PREFERENCES\n   - Participation shapes attitudes\n   - Selection and treatment effects\n\
    \   - Cultural evolution\n\n2. SOCIAL NORM CHANGES\n   - Market norms spread\n   - Fairness concepts evolve\n   - Trust\
    \ patterns change\n\n3. IMPLICATIONS\n   - Markets affect society\n   - Feedback effects\n   - Institutional design"
  ebf_relevance: '10C DIMENSIONS:

