key_findings_structured:
  S1_research_question: "How does limited attention shape economic behavior, and can a unified framework capture inattention to prices, taxes, news, and other economic variables?"
  S2_methodology: "Theoretical framework (sparse max operator) with cross-study calibration of attention parameter m from 11 empirical studies"
  S3_sample_data: "Cross-section of 11 studies spanning consumer demand, financial markets, and tax salience; meta-analytic calibration"
  S4_findings: "Mean attention m = 0.44 across studies; attention is endogenous (increases with stakes), sparse (m=0 below threshold), and context-dependent (m ranges 0.00-0.82); calibrated default attention cost kappa_bar = 3.0%, quality q = 22.4"
  S5_validity: "Framework unifies diverse phenomena (tax salience, left-digit bias, earnings announcements, projection bias, hyperbolic discounting) under single attention parameter"
  S6_reproducibility: "All derivations self-contained; calibration uses published estimates from independent studies"
behavioral_mapping:
  10C_dimensions:
    AWARE: "PRIMARY - Paper defines formal attention parameter m in [0,1] that maps directly to EBF AWARE dimension A(x)"
    WHAT: "Behavioral utility U^s uses perceived values x^s = mx + (1-m)x^d instead of true values"
    WHEN: "Attention is context-dependent: m = A_alpha(sigma^2 / kappa), varies with stakes and cognitive load"
    WHERE: "Calibrated parameters kappa_bar = 3.0%, q = 22.4 from cross-study meta-analysis"
    HOW: "Sparse max operator defines complementarity between attention dimensions"
