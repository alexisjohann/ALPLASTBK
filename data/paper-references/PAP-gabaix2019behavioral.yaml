abstract: 'Inattention is a central, unifying theme for much of behavioral economics. It permeates disparate fields including
  microeconomics, macroeconomics, finance, public economics, and industrial organization. This handbook chapter first discusses
  the most basic models of attention using a unified framework, then examines methods to measure attention and various theories
  of attention (both behavioral and Bayesian). The framework captures many behavioral phenomena: inattention to prices and
  taxes, base rate neglect, inattention to sample size, over- and underreaction to news, projection bias, and hyperbolic discounting.
  The chapter presents a behavioral version of basic microeconomics based on limited attention, covering consumer theory,
  producer theory, and Arrow-Debreu. A pedagogical guide to the attention literature with self-contained derivations.'
