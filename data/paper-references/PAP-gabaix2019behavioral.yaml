key_formulas:
  sparse_max: "smax_a u(a,x) subject to b(a,x) >= 0"
  perceived_value: "x^s_i = m_i * x_i + (1 - m_i) * x^d_i"
  attention_function_A1: "A_1(sigma^2) = max(1 - 1/sigma^2, 0)"
  calibrated_attention: "A_1(sigma^2) = max(sigma^2 / (sigma^2 + 2q), 0) with q = 22.4"
  optimal_attention: "m*_i = A_alpha(sigma^2_i * |a_xi * u_aa * a_xi| / kappa)"
  behavioral_slutsky: "S^B_ij = S^R_ij * m_j (NOT symmetric)"
  entropy_attention: "m = 1 - exp(-2K) where K = information capacity in nats"
