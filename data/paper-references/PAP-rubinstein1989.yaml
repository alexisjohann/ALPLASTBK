abstract: The paper addresses a paradoxical game-theoretic example which is closely
  related to the coordinated attack problem. Two players have to play one of two possible
  coordination games. Only one of them receives information about the coordination
  game to be played. It is shown that the situation with "almost common knowledge"
  is very different from when the coordination game played is common knowledge.
