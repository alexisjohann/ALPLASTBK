abstract: In this paper, the authors analyze the role of three institutional changes--the decline in the real value of the
  minimum wage, deunionization, and economic deregulation--on the rise in wage inequality in the United States during the
  1980s. They argue that about a third of the increase in male and female wage inequality can be traced to these institutional
  changes. Deunionization had a significant effect on the rise in inequality for men, while the minimum wage is what matters
  most for women. The authors find the direct impact of economic deregulation to be comparatively small.
