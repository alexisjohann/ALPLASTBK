abstract: This article argues that economics is currently undergoing a fundamental
  shift in its method, away from neoclassical economics and into something new. Although
  that something new has not been fully developed, it is beginning to take form and
  is centered on dynamics, recursive methods and complexity theory. The foundation
  of this change is coming from economists who are doing cutting edge work and influencing
  mainstream economics. These economists are defining and laying the theoretical groundwork
  for the fundamental shift that is occurring in the economics profession.
