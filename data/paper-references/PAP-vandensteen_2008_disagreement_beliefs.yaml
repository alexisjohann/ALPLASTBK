abstract: "This paper develops a theory explaining the persistent disagreement among individuals and organizations. When people have different prior beliefs and interpret new information through the lens of their existing beliefs, disagreement can persist even with shared information. The model shows how disagreement affects the allocation of control and decision-making authority within organizations, as parties prefer to allocate control to those with similar beliefs."
