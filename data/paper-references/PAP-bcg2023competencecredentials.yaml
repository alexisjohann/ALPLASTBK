abstract: >
  BCG report with the Burning Glass Institute/Lightcast examining the shift from credentials to
  competence in hiring. When rapid technological change requires employees to dynamically upskill
  and reskill, static college degrees become less relevant. Analyzes labor market data on job
  posting trends and degree requirement removal. Complements the Harvard/BGI 2024 study which
  later found the gap between rhetoric and reality remains large.
