abstract: The bootstrap and multiple imputations are two techniques that can enhance the accuracy of estimated confidence
  bands and critical values. Although they are computationally intensive, relying on repeated sampling from empirical data
  sets and associated estimates, modern computing power enables their application in a wide and growing number of econometric
  settings. We provide an intuitive overview of how to apply these techniques, referring to existing theoretical literature
  and various applied examples to illustrate both their possibilities and their pitfalls.
