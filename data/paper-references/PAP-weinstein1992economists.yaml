abstract: When my colleagues at The New York Times use the word “academic,” they intend no compliment; they mean irrelevant.
  And when my former colleagues in the academy describe someone's work as “journalistic,” they invariably mean shallow. One
  way to frame discussion for this symposium is to ask how well economists who deal with the media bridge the gap between
  thoughtful irrelevance and engrossing superficiality. From my vantage point, the answer is remarkably well…. As a journalist,
  I could stop here, having rendered a clear editorial opinion, … . but academics, even retired ones, yearn to criticize.
  So here goes.
