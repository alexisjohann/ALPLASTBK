abstract: US productivity growth accelerated after 1995 (unlike Europe's), particularly in sectors that intensively use information
  technologies (IT). Using two new micro panel datasets we show that US multinationals operating in Europe also experienced
  a “productivity miracle.” US multinationals obtained higher productivity from IT than non-US multinationals, particularly
  in the same sectors responsible for the US productivity acceleration. Furthermore, establishments taken over by US multinationals
  (but not by non-US multinationals) increased the productivity of their IT. Combining pan-European firm-level IT data with
  our management practices survey, we find that the US IT related productivity advantage is primarily due to its tougher “people
  management” practices. (JEL D24, E23, F23, M10, M16, O30)
