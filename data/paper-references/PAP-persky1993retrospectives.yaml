abstract: 'The term “consumer sovereignty” is usually traced to William Harold Hutt and his 1936 book Economists and the Public:
  A Study of Competition and Opinion. Hutt paid only passing attention to the maximization of consumer welfare or the achievement
  of market efficiency. He was stalking different game. For him, the basic issues revolved around the exercise of power in
  a free society and those issues concerned sovereignty. Why should consumers be given such great power in determining the
  allocation of resources and the course of production? Hutt''s major argument for consumer sovereignty centered on its role
  in promoting political and social stability. It is unlikely that Hutt''s defense of consumer sovereignty will be embraced
  by the economics profession in the near future. It received only passing attention when first propounded and has largely
  disappeared from active discussion. Yet I would argue that his approach has a most interesting message.'
