abstract: We measure inequities from the COVID-19 pandemic on mortality and hospitalizations in the United States during the
  early months of the outbreak. We discuss challenges in measuring health outcomes and health inequality, some of which are
  specific to COVID-19 and others that complicate attribution during most large health shocks. As in past epidemics, preexisting
  biological and social vulnerabilities profoundly influenced the distribution of disease. In addition to the elderly, Hispanic,
  Black and Native American communities were disproportionately affected by the virus, particularly when assessed using the
  years of potential life lost metric. We provide a conceptual framework and initial empirical analysis that seek to shed
  light on contributors to pandemic-related health inequality, and we suggest areas for future research.
