abstract: This chapter discusses the role of structural estimation in behavioral economics, covering advantages and limitations
  of work in Structural Behavioral Economics. It also covers common modeling choices and how to get started. Among the advantages,
  structural estimation builds on, and expands, a classical behavioral tool—simple calibrations—and benefits from the presence
  of a few parsimonious behavioral models which can be taken to the data. At a time where policy implications of behavioral
  work are increasingly discussed, it is important to ground these policy implications in estimated models.
