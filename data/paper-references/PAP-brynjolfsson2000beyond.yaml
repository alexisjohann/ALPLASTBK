abstract: 'To understand the economic value of computers, one must broaden the traditional definition of both the technology
  and its effects. Case studies and firm-level econometric evidence suggest that: 1) organizational “investments” have a large
  influence on the value of IT investments; and 2) the benefits of IT investment are often intangible and disproportionately
  difficult to measure. Our analysis suggests that the link between IT and increased productivity emerged well before the
  recent surge in the aggregate productivity statistics and that the current macroeconomic productivity revival may in part
  reflect the contributions of intangible capital accumulated in the past.'
