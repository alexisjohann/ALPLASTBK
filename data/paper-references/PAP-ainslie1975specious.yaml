abstract: 'This paper proposes that delay discounting follows a hyperbolic rather than exponential function, which explains
  common preference reversals and dynamic inconsistencies observed in behavior. By applying the matching relationship from
  experimental psychology to individual choices, Ainslie demonstrates that the resulting discount function is hyperbolic,
  explaining impulsive choices without abandoning rational choice theory entirely. The paper identifies commitment devices
  and bundling as rational self-control strategies against predictable preference reversals.'
