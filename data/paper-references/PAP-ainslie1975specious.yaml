summary:
  abstract_extended: 'This foundational paper proposes hyperbolic discounting as a model for

    understanding impulsive behavior. The paper argues that delay discounting

    follows a hyperbolic rather than exponential function, which explains common

    preference reversals and dynamic inconsistencies observed in behavior.


    The exponential discounting model of classical economics cannot predict

    preference reversals that are evident in daily behavior - for example, people

    may prefer $101 in one year and one day over $100 in one year, but a year

    later prefer $100 today over $101 tomorrow.


    By applying the "matching relationship" from experimental psychology to

    individual choices, Ainslie showed that the resulting discount function is

    hyperbolic, explaining impulsive choices without abandoning rational choice

    theory entirely.'
  key_findings: "1. HYPERBOLIC DISCOUNTING: The subjective value of rewards decreases\n   hyperbolically (not exponentially)\
    \ with delay to receipt\n\n2. PREFERENCE REVERSALS: Hyperbolic discounting explains why preferences\n   can reverse as\
    \ options approach in time\n\n3. IMPULSIVENESS MECHANISM: Impulsive choices result from steeper near-term\n   discounting\
    \ that can override long-term preferences\n\n4. MATCHING RELATIONSHIP: Applied matching law from experimental psychology\n\
    \   to human temporal choice\n\n5. SELF-CONTROL STRATEGIES: Identified commitment devices and bundling as\n   rational\
    \ responses to predictable preference reversals\n\n6. FOUNDATIONAL IMPACT: First systematic demonstration that common\
    \ behavior\n   patterns (impulsivity, addiction, procrastination) require non-exponential\n   discounting models"
