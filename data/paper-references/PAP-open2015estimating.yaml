abstract: Empirically analyzing empirical evidence One of the central goals in any
  scientific endeavor is to understand causality. Experiments that seek to demonstrate
  a cause/effect relation most often manipulate the postulated causal factor. Aarts
  et al. describe the replication of 100 experiments reported in papers published
  in 2008 in three high-ranking psychology journals. Assessing whether the replication
  and the original experiment yielded the same result according to several criteria,
  they find that about one-third to one-half of the original findings were also observed
  in the replication study. Science , this issue 10.1126/science.aac4716
