abstract: 'Abstract This paper experimentally investigates whether agents behave differently if their ownearnings are at stake
  (effort experiment) or a budget that is provided to them like a sort ofmanna from heaven (no-effort experiment) . We use
  the so-called power-to-take game,employed by Bosman & Van Winden (1999) to study the impact of emotions oneconomic behavior.
  Players are randomly divided into pairs consisting of a take authorityand responder. Both players in each pair have an endowment.
  The game consists of twostages. In the first stage, the take authority decides how much of the endowment of theresponder
  that is left after the second stage will be transferred to the take authority (theso-called take rate). In the second stage,
  the responder can punish the take authority bydestroying (part of) his or her endowment. Our main findings are the following:
  (1)responders destroy more often and a greater amount on aggregate in the no-effortexperiment; (2) responders more often
  choose an intermediate amount of destruction inthe no-effort experiment; (3) the behavior of take authorities does not depend
  on effort;(4) responders expect lower take rates in the no-effort experiment; (5) in addition to thetake rate, responders`
  expectations of the take rate have a significant effect on theprobability of punishment in both the effort and no-effort
  experiment. We explain theseresults with the help of emotion theory.'
