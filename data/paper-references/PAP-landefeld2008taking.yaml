abstract: This article provides a broad overview of the measurement techniques used in estimating GDP and the national accounts
  in the United States. In the United States, the GDP and the national accounts estimates are fundamentally based on detailed
  economic census data and other information that is available only once every five years. The challenge lies in developing
  a framework and methods that take these economic census data and combine them using a mosaic of monthly, quarterly, and
  annual economic indicators to produce quarterly and annual GDP estimates. One problem is that the other economic indicators
  that are used to extrapolate GDP in between the five-year economic census data—such as retail sales, housing starts, and
  manufacturers shipments of capital goods— are often collected for purposes other than estimating GDP and may embody definitions
  that differ from those used in the national accounts. Another problem is some data are simply not available for the earlier
  estimates in the reporting process. For the initial monthly estimates of GDP, data on about 25 percent of GDP—especially
  in the service sector—are not available, and so these sectors of the economy are estimated based on past trends and whatever
  related data are available. The initial monthly GDP estimates based on these extrapolations are revised as more complete
  data become available In producing the national accounts estimates, the Bureau of Economic Analysis attempts to strike a
  balance between accuracy and timeliness so that the estimates can be used to monitor real overall economic growth and inflation,
  as well as major sectors of interest.
