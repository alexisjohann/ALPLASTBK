summary:
  abstract_extended: 'This paper examines how poverty affects fairness preferences. We review

    evidence on whether the poor have different social preferences than the

    wealthy, and how economic circumstances shape cooperative behavior.

    Understanding these relationships is crucial for poverty alleviation.'
  key_findings: "1. POVERTY AND PREFERENCES\n   - Complex relationship\n   - Not simple deprivation effect\n   - Context mediates\n\
    \n2. EXPERIMENTAL EVIDENCE\n   - Poor can be cooperative\n   - Trust varies by context\n   - Resource constraints matter\n\
    \n3. DEVELOPMENT IMPLICATIONS\n   - Social capital important\n   - Trust enables cooperation\n   - Policy design matters"
  ebf_relevance: '10C DIMENSIONS:

