abstract: This essay examines the strong influence of the Social Gospel movement on the founding of the American Economic
  Association. Richard T. Ely, the driving force behind the Association's founding, was also the most popular figure in the
  Social Gospel movement. The essay discusses Ely's influence in the statement of principles that shaped the early AEA and
  how the founders conceived their original mission as a scientific enterprise to better the lives of the poor and the working
  class.
