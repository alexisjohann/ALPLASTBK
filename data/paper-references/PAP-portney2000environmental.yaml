abstract: The next 50 years will see more use of market-based tools for environmental protection. Regulatory authorities everywhere
  will require polluters to report emissions. Authority will leak away from national governments; some will be devolved to
  lower levels of government, but some will be lost to international bodies. Environmental conditions will continue to improve
  steadily in developed countries. The developing countries will be less fortunate; at least until rising incomes provide
  the impetus for stricter standards. Some losses will be irreversible, as with species that are extinguished.
