abstract: The eurozone currently confronts severe short-run macroeconomic adjustment problems and a deficient institutional
  architecture that has to be reformed in the longer run. Europe's efforts at economic and monetary union are historically
  unprecedented. However, the gold standard provides lessons regarding what will and won't work, macroeconomically and politically,
  in the short run, while US history provides long-run lessons regarding appropriate institutional structures. The latter
  also suggests that institutional reform only happens at times of great crisis, and that it cannot be taken for granted.
  The eurozone's leaders may therefore ultimately have to take heed of the lessons of history regarding currency union breakups.
