abstract: There is strong evidence that people exploit their bargaining power in competitive markets but not in bilateral
  bargaining situations. There is also strong evidence that people exploit free-riding opportunities in voluntary cooperation
  games. Yet, when they are given the opportunity to punish free riders, stable cooperation is maintained, although punishment
  is costly for those who punish. This paper asks whether there is a simple common principle that can explain this puzzling
  evidence. We show
