abstract: Labor is supplied because most of us must work to live. Indeed, it is called “work” in part because without compensation,
  the overwhelming majority of workers would not otherwise perform the tasks. The theme of this essay is that incentives affect
  behavior and that economics as a science has made good progress in specifying how compensation and its form influences worker
  effort. This is a broad topic, and the purpose here is not a comprehensive literature review on each of many topics. Instead,
  a sample of some of the most applicable papers are discussed with the goal of demonstrating that compensation, incentives,
  and productivity are inseparably linked.
