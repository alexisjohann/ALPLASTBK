abstract: This book examines how the discipline of economics came to be dominated
  by mathematically derived models and what happened to other approaches considered
  scientifically viable less than fifty years ago. Between the two world wars, there
  were two well-accepted schools of thought in economics - the neoclassical and the
  institutionalist (starting with Veblen and Commons). Using the actor-network approach
  of Bruno Latour and Michel Callon, the author analyzes the conflicts between neoclassicists
  and institutionalists, bringing to life a hidden chapter in the history of economics
  and illuminating broader issues concerning the nature of scientific practice.
