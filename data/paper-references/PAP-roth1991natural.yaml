abstract: The histories of seven regional markets for new physicians and surgeons in the UK are examined. Like American markets,
  these experienced failures leading to centralized market mechanisms. Different regions employ different centralized mechanisms,
  providing a test of whether the American market's success relates to producing stable matches where no two agents mutually
  prefer each other over assigned partners. Even in complex UK markets, stability plays an important role. Centralized markets
  producing unstable matches in environments where agents could act on instabilities fared no better than decentralized markets
  they replaced.
