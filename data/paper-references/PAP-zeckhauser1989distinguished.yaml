abstract: 'Thomas Crombie Schelling thinks about the essence of phenomena. He distills such essences and demonstrates their
  presence in many important social phenomena. We shall chronicle three stages of his life, designated by the titles of his
  books: The Strategy of Conflict (1960); Micromotives and Macrobehavior (1978); and Choice and Consequence (1984).'
