abstract: This study examined the influence of source credibility and message framing on promoting physical exercise in university
  students. Participants were randomly assigned to reading a positively or negatively framed communication that was attributed
  to either a credible or a noncredible source. Exercise intentions and attitudes were measured immediately following the
  delivery of the communication and following a 2‐week delay. Exercise behavior was also measured following the delay. There
  were Source Frame interactions for the exercise intentions, exercise behaviors, and cognitive response/elaboration measures
  such that participants receiving a positively framed communication from a credible source elaborated more and reported more
  positive exercise intentions and behaviors than participants in the other conditions. The results of the present investigation
  indicate that it might be beneficial for health professionals to provide exercise‐related information stressing the benefits
  of participating in exercise, rather than the traditional fear appeals, to motivate clients to engage in regular physical
  exercise. Implications for future research are discussed.
