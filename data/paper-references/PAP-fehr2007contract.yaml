summary:
  abstract_extended: 'This paper examines how contract design affects motivation and trust.

    We argue that contracts can signal trust or distrust, affecting intrinsic

    motivation and cooperation. The choice of contract structure should account

    for these behavioral effects beyond pure incentive alignment.'
  key_findings: "1. CONTRACTS SIGNAL TRUST\n   - Restrictive contracts signal distrust\n   - Flexible contracts signal trust\n\
    \   - Self-fulfilling prophecies\n\n2. MOTIVATION EFFECTS\n   - Trust enhances intrinsic motivation\n   - Distrust crowds\
    \ out motivation\n   - Control paradox\n\n3. OPTIMAL DESIGN\n   - Balance control and trust\n   - Context determines optimum\n\
    \   - Consider signaling effects"
  ebf_relevance: '10C DIMENSIONS:

    - WHAT (C): Trust and motivation

    - HOW (B): Contract-trust complementarity

    - WHEN (V): Relationship context


    THEORY SUPPORT:

    - Motivation crowding theory

    - Contract theory integration

    - Behavioral contract design


    KEY INSIGHT:

    Contracts should be designed considering their signaling effects on trust

    and motivation, not just incentive alignment.'
