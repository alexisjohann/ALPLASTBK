abstract: 'Some millennial movements have a strong communal com-ponent. This can be seen not only in the extent to which members
  may come to share property, resources, and a single household in order to carry out their commitment to the movement, but
  also in the thrust and promise of the movement itself: the existence of a new moral community. In fact, I argue that, in
  many instances, the &dquo; pursuit of the millennium&dquo; is primarily an attempt to build a radical community. There are
  many historical and contemporary examples of the conjunction of millennial thought and communal activity. Robert Owen’s
  supposedly secular, socialist, utopian community of New

  Harmony, Indiana (1825-1827) was overlaid with the decidedly millennial character of Owen’s attempt to hurry along the &dquo;
  new moral world&dquo;(Clouse, 1971). Brook Farm, another nineteenth-century American commune also considered secular by
  some writers, is seen by others as centrally located in American millennial traditions (Smith, 1965). The Shakers were unques-'
