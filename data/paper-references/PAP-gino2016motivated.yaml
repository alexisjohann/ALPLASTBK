abstract: Research yields ample evidence that individual's behavior often reflects an apparent concern for moral considerations.
  A natural way to interpret evidence of such motives using an economic framework is to add an argument to the utility function
  such that agents obtain utility both from outcomes that yield only personal benefits and from acting kindly, honestly, or
  according to some other notion of “right.” Indeed, such interpretations can account for much of the existing empirical evidence.
  However, a growing body of research at the intersection of psychology and economics produces findings inconsistent with
  such straightforward, preference-based interpretations for moral behavior. In particular, while people are often willing
  to take a moral act that imposes personal material costs when confronted with a clear-cut choice between “right” and “wrong,”
  such decisions often seem to be dramatically influenced by the specific contexts in which they occur. In particular, when
  the context provides sufficient flexibility to allow plausible justification that one can both act egoistically while remaining
  moral, people seize on such opportunities to prioritize self-interest at the expense of morality. In other words, people
  who appear to exhibit a preference for being moral may in fact be placing a value on feeling moral, often accomplishing
  this goal by manipulating the manner in which they process information to justify taking egoistic actions while maintaining
  this feeling of morality.
