abstract: 'After years of relative abstinence, the United States has experimented with persistent budget deficits on a rather
  massive scale in the 1980s. Economists have generally been quite critical of this fiscal policy, though there are respectable
  minority views arguing that federal deficits are not so bad and quite possibly better than likely corrective measures. In
  this paper, I examine the evidence that the great deficit experiment is generating. I first look at the deficits themselves
  to see how high they really are, dealing with a number of measurement criticisms that have been raised from various quarters.
  I then discuss two critical responses to the deficits—that of private saving and that of public spending—to determine the
  impact of the deficits on national saving. A key issue that recurs throughout the discussion is whether the political behavior
  that leads to the deficits can be taken as exogenous: Are private households better viewed as responding to exogenous public
  sector deficits, or is something in the air causing both public deficits and a decline in private saving?'
