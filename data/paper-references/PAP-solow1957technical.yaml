abstract: JN this day of rationally designed econometric studies and super-input-output
  tables, it takes something more than the usual" willing suspension of disbelief"
  to talk seriously of the aggregate production function. But the aggre-gate production
  function is only a little less legitimate a concept than, say, the aggregate consumption
  function, and for some kinds of long-run macro-models it is almost as indispensable
  as the latter is for the short-run. As long as we insist on practicing macro-economics
  we shall need aggregate relationships. Even so, there would hardly be any justification
  for returning to this old-fashioned topic if I had no novelty to suggest. The new
  wrinkle I want to describe is an elementary way of segregating variations in output
  per head due to technical change from those due to changes in the availability of
  capital per head. Naturally, every additional bit of information has its price.
  In this case the price consists of one new required time series, the share of labor
  or prop-erty in total income, and one new assumption, that factors are paid their
  marginal products. Since the former is probably more respectable than the other
  data I shall use, and since the latter is an assumption often made, the price may
  not be unreasonably high. Before going on, let me be explicit that I would not try
  to justify what follows by calling on fancy theorems on aggregation and index numbers.'Either
  this kind of aggregate economics appeals or it doesn't. Personally I belong to both
  schools. If it does, I think one can draw some crude but useful conclusions from
  the results.
