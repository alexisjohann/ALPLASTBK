abstract: This Nobel Memorial Lecture traces the development of general equilibrium
  theory from the discovery of existence conditions through n-replica economies and
  the Sonnenschein-Mantel-Debreu theorem. Debreu argues for the mathematical formalization
  of economics on two grounds. First, mathematics provides an efficient language for
  unambiguous communication among economists and other social scientists. Second,
  axiomatization provides secure bases from which exploration can start in new dimensions
  without requiring researchers to question every statement made by predecessors.
  The lecture reflects the influence of Hilbert and the Bourbaki school on Debreu's
  approach to mathematical economics.
