abstract: Objectives Universities often promote their diversity as a selling point, but are students of different races at
  these universities integrated socially? Using theories on social energy, I examine racial segregation among university students.
  Methods Quantitative data were collected on student residence patterns and social groupings formed at lunch tables at a
  case study university. In addition, interviews were conducted with 25 students. Results Students are substantially more
  segregated than chance predicts. Blacks and Hispanics are particularly segregated. Interviews reveal that these students
  spend large amounts of social energy coping with prejudice and discrimination as well as functioning in a student culture
  they find unwelcoming and foreign. Conclusions Social energy drains on minority students from discrimination and an unwelcoming
  campus culture reduce energy left for interracial interaction, making these racial groups more segregated. The study highlights
  the need for understanding segregation as a function of the interaction of out‐group preferences, in‐group preferences,
  and the larger social context.
