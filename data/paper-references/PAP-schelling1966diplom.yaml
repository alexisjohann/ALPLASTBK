abstract: This landmark book explores how military capabilities are used as bargaining power in international relations. Schelling
  argues that military strategy has become the diplomacy of violence—the art of coercion, intimidation, and deterrence. The
  power to hurt is bargaining power, and the threat of damage can be more important than the damage itself. The book analyzes
  limited war, nuclear deterrence, and the manipulation of risk, establishing foundational concepts for strategic thinking
  in conflict situations.
