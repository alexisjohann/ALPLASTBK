abstract: Under approval voting, a voter may cast single votes for each of any number of candidates. In this paper, the history
  of approval voting and some of its properties are reviewed. When voters vote sincerely, approval voting compares favorably
  with both the plurality rule and Borda's rule in yielding outcomes reflective of the electorate's will. When voters vote
  strategically, perverse outcomes possible under other rules cannot arise at equilibrium under approval voting. Well-known
  ‘median voter’ results in two-candidate positioning games generalize to multicandidate settings under approval voting but
  not under the plurality rule.
