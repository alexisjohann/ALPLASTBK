abstract: |
  Over the past 20 years, partial least squares (PLS) has become a popular method
  in marketing research. At the same time, several methodological studies have
  demonstrated problems with the technique but have had little impact on its use in
  marketing research practice. This study presents some of these criticisms in a
  reader-friendly way for non-methodologists. Key critiques of PLS are summarized
  and demonstrated using existing data sets in easily replicated ways. PLS is
  fundamentally just a way of constructing scale scores for regression. PLS provides
  no clear benefits for marketing researchers and has disadvantages that are features
  of the original design and cannot be solved within the PLS framework itself.
  Unweighted sums of item scores provide a more robust way of creating scale scores.
  The findings strongly suggest that researchers abandon the use of PLS in typical
  marketing studies.

key_findings_structured:
  S1_research_question: "Does PLS provide advantages over simpler alternatives (unit-weighted composites) for marketing and social science researchers?"
  S2_methodology: "Empirical demonstrations using three public data sets: European Customer Satisfaction Index (ECSI), corporate reputation (Hair et al. 2014), and Technology Acceptance Model (TAM). Comparison of PLS Mode A, PLS Mode B, canonical correlation weights, and unit weights."
  S3_sample_data: "Three public data sets commonly used in PLS tutorials and textbooks."
  S4_findings:
    - finding: "PLS does NOT maximize R-squared"
      source_section: "Fallacy 1"
      formal_result: "Canonical correlation produces R2=0.514 vs PLS Mode A R2=0.462 (ECSI data)"
    - finding: "PLS weights do NOT improve reliability over unit weights"
      source_section: "Fallacy 2"
      formal_result: "PLS and unit-weighted composites correlate 0.99+ in typical data; Henseler et al. (2014) showed only 0.6% improvement in favorable conditions but 16.8% loss in unfavorable conditions"
    - finding: "PLS capitalizes on chance in small samples"
      source_section: "Untold fact"
      formal_result: "PLS weights inflate correlations between weakly related scales and exacerbate cross-loading bias"
    - finding: "PLS AVE/CR statistics cannot detect model misspecification"
      source_section: "Fallacy 3"
      formal_result: "Even randomly assigned indicators pass PLS quality thresholds (AVE>0.5, CR>0.7)"
    - finding: "Composite Equivalence Index (CEI) proposed"
      source_section: "New methodological proposal"
      formal_result: "CEI = correlation between PLS and unit-weighted composites; cutoff 0.95 recommended"
  S5_validity: "Three independent data sets all confirm findings. Results consistent with decades of literature on unit vs differential weights (Cohen 1990, Nunnally 1978). Simulations by Rönkkö et al. (2016b) show inter-item r >= 0.4 eliminates PLS weight advantages."
  S6_reproducibility: "All demonstrations use publicly available data sets. R code available. SmartPLS screencasts in online supplement."

