abstract: A body of data and theory has been developing within psychology that should be of interest to economists. Taken
  at face value the data are simply inconsistent with preference theory and have broad implications about research priorities
  within economics. The inconsistency is deeper than the mere lack of transitivity or even stochastic transitivity. It suggests
  that no optimization principles of any sort lie behind even the simplest of human choices and that the uniformities in human
  choice behavior that lie behind market behavior may result from principles that are of a completely different sort from
  those generally accepted. This chapter reports the results of a series of experiments designed to discredit the psychologists'
  works as applied to economics.
