abstract: Consciousness is what makes the mind-body problem really intractable. Perhaps that is why current discussions of
  the problem give it little attention or get it obviously wrong. The recent wave of reductionist euphoria has produced several
  analyses of mental phenomena and mental concepts designed to explain the possibility of some variety of materialism, psychophysical
  identification, or reduction. But the problems dealt with are those common to this type of reduction and other types, and
  what makes the mind-body problem unique, and unlike the water-H2O problem or the Turing machine-IBM machine problem or the
  lightning-electrical discharge problem or the gene-DNA problem or the oak tree-hydrocarbon problem, is ignored.
