abstract: This paper proposes and explores the possibility that language models can be studied as effective proxies for specific
  human sub-populations in social science research. The authors show that the 'algorithmic bias' within GPT-3 is both fine-grained
  and demographically correlated, meaning that proper conditioning will cause it to accurately emulate response distributions
  from a wide variety of human subgroups. They term this property 'algorithmic fidelity' and create 'silicon samples' by conditioning
  the model on thousands of socio-demographic backstories from real human participants in multiple large surveys. The comparison
  demonstrates that the information contained in GPT-3 goes far beyond surface similarity—it is nuanced, multifaceted, and
  reflects the complex interplay between ideas, attitudes, and sociocultural context. Language models with sufficient algorithmic
  fidelity constitute a novel and powerful tool to advance understanding of humans and society.
