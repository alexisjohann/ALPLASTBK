abstract: A few months ago, Congress overruled the peer review process of the National Science Foundation. A congressional
  aide looked over the list of NSF grants, decided that 31 of them had titles unworthy of funding, and a conference committee
  voted on May 21 to cut off those grants. The cuts were made without hearings, without due process, and without public discussion.
  This note is to let the economics profession know what happened.
