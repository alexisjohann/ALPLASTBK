abstract: 'In this paper, we present our view of the recent evolution of European integration. We first briefly describe the
  main features of the institution and decision making process in the European Union, with particular attention to the debate
  between federalists and super nationalists. We then identify two key issues in the process of European integration: 1) an
  emphasis on “institutional balance” based on a complex web of institutions with overlapping jurisdiction; 2) A conflict
  between a dirigiste versus a more laissez faire approach to government. We argue that the first problem leads to a lack
  of clarity in the allocation of powers between European institutions, confusion in the allocation of prerogatives between
  national governments and EU institutions, and lack of transparency and accountability. The dirigiste culture also manifests
  itself in an abundant production of verbose rhetoric, which in our view is far from innocuous and direct set the European
  policy debate in the wrong direction. We then study how these problems play out in 4 important areas: employment policies,
  culture and scientific research, foreign and defense policies, and fiscal policy. Finally, we study the implications of
  the recently proposed European Constitution a potential solution of these two problems.'
