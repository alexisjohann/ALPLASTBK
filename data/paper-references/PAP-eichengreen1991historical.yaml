abstract: 'The parallels between debt crises past and present have attracted a large number of social scientists to the history
  of foreign lending and default. In this article, I describe the findings of the recent literature on the subject. The questions
  posed have obvious relevance to the current policy debate over the debt of less-developed countries. What features of international
  capital markets have long rendered them vulnerable to generalized crisis? What events tend to spawn debt-servicing difficulties
  and to provoke default? What have been the consequences of default for lenders and borrowers? What approaches historically
  have proven most effective at clearing away the residue of debt crises? I concentrate on 20th century experience: on the
  lending of the 1920s, on the debt crisis of the 1930s, and on the recovery of capital markets after World War II.'
