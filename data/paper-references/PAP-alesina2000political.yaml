abstract: Current surpluses in the U.S. have been achieved by a combination of a strong economy, low interest rates, and sharp
  cuts in defense spending. These surpluses follow a period (the 1980s) of rather exceptional budget deficit. This paper investigates
  the origin, size, and expected future patterns of the U.S. budget balance. It discusses how different political forces may
  generate alternative fiscal scenarios for the U.S. in the next decade.
