abstract: Scarcity steals mental capacity wherever it occurs, from the hungry, to the lonely, to the time-strapped, to the
  poor. If the mind is focused on one thing, other abilities and skills including attention, self-control, and long-term planning
  often suffer. Like a computer running multiple programs, our mental processors begin to slow down. What we focus on is how
  the human mind functions when it perceives scarcity. There are predictable cognitive changes. The term is scarcity trap,
  and the basic idea is that our brains so tightly focus on what is so desperately lacking that thinking about anything else
  becomes tremendously difficult. Bandwidth refers to the limited number of things that any human can focus on at one time.
  Limited bandwidth and tunneling depletes self control and leads to impulsive behavior.
