abstract: This article presents a meta-analysis of recent microeconometric evaluations of active labour market policies. We
  categorise 199 programme impacts from 97 studies conducted between 1995 and 2007. Job search assistance programmes yield
  relatively favourable programme impacts, whereas public sector employment programmes are less effective. Training programmes
  are associated with positive medium-term impacts, although in the short term they often appear ineffective. We also find
  that the outcome variable used to measure programme impact matters, but neither the publication status of a study nor the
  use of a randomised design is related to the sign or significance of the programme estimate. Copyright © 2010 TheAuthor(s).
  The Economic Journal © 2010 Royal Economic Society.
