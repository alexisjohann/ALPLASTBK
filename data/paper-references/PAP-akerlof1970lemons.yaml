title: 'The Market for ``Lemons'''': Quality Uncertainty and the Market Mechanism'
author: Akerlof
year: '1970'
publication_type: journal_article
doi: 10.1162/003355395555054
abstract: This paper illustrates how quality uncertainty leads to market failures, notably in the used car market. The model
  demonstrates that asymmetric information drives bad cars (lemons) out of the market, reducing overall quality. For most
  cars traded will be the lemons, and good cars may not be traded at all. The bad cars tend to drive out the good because
  they sell at the same price as good cars since it is impossible for a buyer to tell the difference between a good and a
  bad car; only the seller knows. Counteracting institutions like guarantees and brand names emerge to mitigate quality uncertainty
  in markets.
