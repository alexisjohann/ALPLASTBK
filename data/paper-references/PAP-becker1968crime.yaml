abstract: 'Since the turn of the century, legislation in Western countries has expanded rapidly to reverse the brief dominance
  of laissez faire during the nineteenth century. The state no longer merely protects against violations of person and property
  through murder, rape, or burglary but also restricts" discrimination" against certain minorities, collusive business arrangements,"
  jaywalking," travel, the materials used in construction, and thousands of other activities. The activities restricted not
  only are numerous but also range widely, affecting persons in very different pursuits and of diverse social backgrounds,
  education levels, ages, races, etc. Moreover, the likelihood that an offender will be discovered and convicted and the nature
  and extent of punishments differ greatly from person to person and activity to activity. Yet, in spite of such diversity,
  some common properties are shared by practically all legislation, and these properties form the subject matter of this essay.

  In the first place, obedience to law is not taken for granted, and public and private resources are generally spent in order
  both to prevent offenses and to apprehend offenders. In the second place, conviction is not generally considered sufficient
  punishment in itself; additional and sometimes severe punishments are meted out to those convicted. What determines the
  amount and type of resources and punishments used to enforce a piece of legislation? In particular, why does enforcement
  differ so greatly among different kinds of legislation?'
