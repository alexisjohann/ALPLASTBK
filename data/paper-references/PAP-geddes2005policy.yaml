abstract: The author first reviews the current structure and regulation of the U.S. Postal Service. He then discusses the
  changing size and composition of the U.S. mail stream. Many other countries have already undertaken comprehensive postal
  reform, including both privatization and demonopolization, and the author discusses what lessons their experience can provide.
  He concludes by evaluating current reform proposals in the United States.
