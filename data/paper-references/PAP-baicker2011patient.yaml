abstract: In this paper, we explore the role patient incentives play in slowing healthcare spending growth. Evidence suggests
  that while patients do indeed respond to financial incentives, cost-sharing does not uniformly improve value; rather, cost-sharing
  provisions must be deliberately structured and targeted to reduce care of low marginal value. Other mechanisms may be helpful
  in targeting particular populations or types of utilization. The spillover effects between privately insured and publicly
  insured populations as well as market imperfections suggest a potential role for public policy in promoting insurance design
  that slows spending growth while increasing the health that each dollar buys.
