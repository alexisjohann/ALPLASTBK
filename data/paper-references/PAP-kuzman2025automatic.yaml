summary:
  abstract_extended: "COMPREHENSIVE SURVEY of Automatic Genre Identification (AGI), a text\nclassification task focused on\
    \ genres.\n\nDEFINITION OF GENRE:\nText categories defined by:\n- Author's PURPOSE\n- Common FUNCTION of the text\n- Text's\
    \ CONVENTIONAL FORM\n\nSURVEY COVERAGE:\n\n1. GENRE DEFINITIONS AND TERMINOLOGY\n   - Genre vs. Register vs. Text Type\n\
    \   - Conceptual distinctions\n\n2. GENRE SCHEMATA COMPARISON\n   - 16 different schemata analyzed\n   - 280 genre labels\
    \ across systems\n\n3. DATASET ANALYSIS\n   - CORE: 48k documents\n   - Leeds: 5k documents\n   - GINCO: 1k documents\n\
    \   - FTD and others\n\n4. MACHINE LEARNING METHODS\n   - From SVM to Transformers\n   - Evolution of approaches\n\nKEY\
    \ FINDING (Performance):\n- XLM-RoBERTa achieves F1 0.72-0.84 on multilingual CORE\n- Zero-shot transfer: F1 0.61-0.69\n\
    \nRELEVANCE FOR EBF:\nHighly relevant for Scientific Writing Style Module (SWSM):\n- E7: 8D → Genre Mapper\n- E8: Move\
    \ Planner components"
