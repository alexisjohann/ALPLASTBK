abstract: Automatic genre identification (AGI) is a text classification task focused on genres, i.e., text categories defined
  by the author's purpose, common function of the text, and the text's conventional form. This paper presents a detailed overview
  of different approaches to each of the steps of the AGI task, from the definition of the genre concept and the genre schema,
  to the dataset collection and annotation methods, and, finally, to machine learning strategies.
