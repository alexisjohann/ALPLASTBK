abstract: Supply-side factors may contribute to rising wage inequality. First, certain changes in the supply of skills allegedly
  exacerbate wage inequality. Women's increased labor force participation and increased immigration are the leading candidates;
  both allegedly reduce the wages of less-skilled men. However, immigration's impact on wage inequality has been minor and
  the effects of women's participation is inconclusive. Second, in evaluating the likelihood that human capital investment
  will mitigate future inequality, evidence suggests that rising returns to education have increased the proportion of young
  people attending college, limiting the growth of inequality among high-wage workers.
