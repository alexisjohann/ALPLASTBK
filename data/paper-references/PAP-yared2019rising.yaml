abstract: Over the past four decades, government debt as a fraction of GDP has been on an upward trajectory in advanced economies,
  approaching levels not reached since World War II. While normative macroeconomic theories can explain the increase in the
  level of debt in certain periods as a response to macroeconomic shocks, they cannot explain the broad-based long-run trend
  in debt accumulation. In contrast, political economy theories can explain the long-run trend as resulting from an aging
  population, rising political polarization, and rising electoral uncertainty across advanced economies. These theories emphasize
  the time-inconsistency in government policymaking, and thus the need for fiscal rules that restrict policymakers. Fiscal
  rules trade off commitment to not overspend and flexibility to react to shocks. This tradeoff guides design features of
  optimal rules, such as information dependence, enforcement, cross-country coordination, escape clauses, and instrument versus
  target criteria.
