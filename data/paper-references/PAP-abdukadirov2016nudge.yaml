summary:
  abstract: 'This edited volume examines nudge theory and behavioral economics from multiple perspectives, comparing market-based
    nudges with government nudges. The book is divided into two parts: Theory (6 chapters covering behavioral economics foundations,
    behavioral paternalism, risk and uncertainty, consumer technology, and private-sector nudging) and Case Studies (5 chapters
    on weight-loss, marketplace evolution, energy efficiency, and healthcare nudges). Foreword by Tyler Cowen.

    '
key_findings_structured:
- finding: Private sector nudges can be highly effective but problematic in areas like healthcare, education, and charity
    where consumer guard is lowered
  domain: private_nudges
  stage: evaluation
  primary_dimension: S
- finding: Government nudges have limited marketing talent but significant coercive power, especially when piggybacking on
    private sector marketing efforts
  domain: public_policy
  stage: evaluation
  primary_dimension: I
- finding: Market-based nudges evolve through competitive winnowing, elevating those better at nudging, while government nudges
    rely on bureaucratic mechanisms
  domain: market_vs_government
  stage: evaluation
  primary_dimension: S
- finding: Effective nudge design requires understanding who designs the nudge, what incentives they face, and whether market
    competition or regulation is appropriate
  domain: nudge_design
  stage: evaluation
  primary_dimension: I
