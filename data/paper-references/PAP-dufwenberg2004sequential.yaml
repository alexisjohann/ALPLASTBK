abstract: Many experimental studies indicate that people are motivated by reciprocity.
  Rabin [Amer. Econ. Rev. 83 (1993) 1281] develops techniques for incorporating such
  concerns into game theory and economics. His theory is developed for normal form
  games, and he abstracts from information about the sequential structure of a strategic
  situation. We develop a theory of reciprocity for extensive games in which the sequential
  structure of a strategic situation is made explicit, and propose a new solution
  concept—sequential reciprocity equilibrium—for …
