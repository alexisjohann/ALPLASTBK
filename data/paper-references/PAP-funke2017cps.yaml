abstract: Computer-simulated scenarios have been part of psychological research on problem solving for more than 40 years.
  The shift in emphasis from simple toy problems to complex, more real-life oriented problems has been accompanied by discussions
  about the best ways to assess the process of solving complex problems. Psychometric issues such as reliable assessments
  and addressing correlations with other instruments have been in the foreground of these discussions and have left the content
  validity of complex problem solving in the background. In this paper, we return the focus to content issues and address
  the important features that define complex problems.
