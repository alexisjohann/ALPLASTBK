abstract: This paper reviews the theoretical functions, history, and policy problems raised by the international capital market.
  The goal is to offer a perspective on both the considerable advantages the market offers and on the genuine hazards it poses,
  as well as on avenues through which it constrains national policy choices. A duality of benefits and risks is inescapable
  in the real world of asymmetric information and imperfect contract enforcement. The author argues, however, that, in confronting
  the global capital market, the way to maximize net benefits is to encourage economic integration while attacking concomitant
  distortions and unwanted side effects at, or close to, their sources.
