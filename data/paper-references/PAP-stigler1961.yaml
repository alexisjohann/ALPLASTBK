abstract: This seminal paper establishes search theory in economics, analyzing how consumers
  discover prices across sellers when information is costly to obtain. Stigler demonstrates
  that optimal search intensity depends on the dispersion of prices, the cost of search,
  and the amount to be purchased. The paper shows that market equilibrium is characterized
  not by a single price but by a distribution of prices, whose variance depends on
  search costs. This foundational work explains price dispersion, consumer search behavior,
  and information asymmetries in markets.
