key_findings:
- finding: Preschool entry facilitates early DIAGNOSIS of behavioral/developmental
    conditions
  mechanism: Institutional environment enables teacher observation and referral
  10C_dimension: AWARE
- finding: Effects dissipate by age 10 - diagnosis TIMING not incidence
  mechanism: Earlier detection, not creation of conditions
  10C_dimension: STAGE
- finding: Higher quality preschools show LARGER detection effects
  mechanism: Better institutions = better awareness catalysts
  10C_dimension: WHEN
- finding: ADHD treatment (stimulant medication) increases 12.2% alongside diagnosis
  mechanism: Diagnosis leads to appropriate treatment
  10C_dimension: READY
- finding: Effects concentrated in areas with more pediatricians per capita
  mechanism: Healthcare infrastructure moderates detection
  10C_dimension: WHERE
