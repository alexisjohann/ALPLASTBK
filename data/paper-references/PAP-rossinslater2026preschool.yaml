title: The Impact of Preschool Entry Age on Children's Behavioral and Developmental
  Health in Medicaid
author: Rossin-Slater, Sabety, Wu
year: '2026'
doi: 10.3386/w34677
publication_type: working_paper
journal: NBER Working Paper Series
number: '34677'
abstract: 'We study the effects of preschool entry on children''s behavioral and developmental
  health. Using administrative Medicaid data on approximately 2.4 million children
  in 32 US states, we exploit variation in school-entry age cutoff dates to estimate
  regression discontinuity models. Preschool entry leads to increases in diagnoses
  of ADHD, speech and language disorders, and hearing and vision conditions. For ADHD
  and speech/language disorders, these effects are driven by children who also receive
  treatment (medication and IDEA-covered special education, respectively), dissipate
  by age 10, and are larger in areas with higher quality preschool programs. We estimate
  a $104 annual per-child increase in Medicaid spending.

  '
