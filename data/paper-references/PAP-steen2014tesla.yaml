abstract: 'O objetivo deste artigo é analisar a estratégia de modelo de negócio na Tesla Motors. Baseado na ideia de que esta
  empresa utiliza uma estratégia de inovação, primeiramente é apresentado uma contextualização sobre a empresa e o cenário
  em que a mesma atua. Como material teórico pertinente para compreender o assunto, são apresentados os conceitos de: Modelo
  de Negócio bem como a evolução e diferentes conceitos adotados, Inovação e as maneiras como uma companhia pode aplicar este
  conceito em seu produto/serviço ou no processo produtivo para adquirir uma vantagem competitiva no mercado e o conceito
  de Estratégia, teorizando as atividades que a empresa apresenta na prática. Além disso, é apresentado como esses conceitos
  conversam com as práticas de mercado e o modelo de negócio adotado pela empresa e qual a fundamentação teórica baseada no
  modelo CANVAS para determinadas ações da organização. Finalmente, são levantadas discussões sobre o ambiente interno e externo
  da organização. Pelos resultados encontrados fica claro como a Tesla criou um modelo de negócios que a diferencia dos concorrentes
  tradicionais, além de utilizar seu conhecimento em produção de energia para criar novas oportunidades de negócio e, assim,
  criar valor para a empresa e a posicioná-la entre as mais valiosas do setor automobilístico.'
