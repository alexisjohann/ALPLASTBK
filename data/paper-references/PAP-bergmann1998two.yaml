abstract: The achievements (or lack thereof) of the AEA's Committee on the Status of Women in the Economics Profession (CSWEP)
  are compared to those of analogous committees in three of our sister disciplines. In psychology, sociology, and history,
  committees of women professionals advocated and facilitated radical changes in the disciplines' treatment of issues involving
  gender. They also fought effectively for a far bigger role for women professionals in their disciplines. In the economics
  profession, the treatment of women's issues and the marginalization of women professionals remain problematic, despite the
  quarter century of CSWEP's existence.
