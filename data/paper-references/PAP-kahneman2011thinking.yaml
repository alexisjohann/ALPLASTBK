abstract: '* Major New York Times Bestseller* More than 2.6 million copies sold* One of The New York Times Book Review''s
  ten best books of the year* Selected by The Wall Street Journal as one of the best nonfiction books of the year* Presidential
  Medal of Freedom Recipient* Daniel Kahneman''s work with Amos Tversky is the subject of Michael Lewis''s best-selling The
  Undoing Project: A Friendship That Changed Our Minds In his mega bestseller, Thinking, Fast and Slow, Daniel Kahneman, world-famous
  psychologist and winner of the Nobel Prize in Economics, takes us on a groundbreaking tour of the mind and explains the
  two systems that drive the way we think. System 1 is fast, intuitive, and emotional; System 2 is slower, more deliberative,
  and more logical. The impact of overconfidence on corporate strategies, the difficulties of predicting what will make us
  happy in the future, the profound effect of cognitive biases on everything from playing the stock market to planning our
  next vacation—each of these can be understood only by knowing how the two systems shape our judgments and decisions. Engaging
  the reader in a lively conversation about how we think, Kahneman reveals where we can and cannot trust our intuitions and
  how we can tap into the benefits of slow thinking. He offers practical and enlightening insights into how choices are made
  in both our business and our personal lives—and how we can use different techniques to guard against the mental glitches
  that often get us into trouble. Topping bestseller lists for almost ten years, Thinking, Fast and Slow is a contemporary
  classic, an essential book that has changed the lives of millions of readers.'
