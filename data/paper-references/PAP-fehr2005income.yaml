summary:
  abstract_extended: 'This paper examines the relationship between income inequality and social

    norms. We argue that high inequality can undermine social norms of cooperation

    and fairness, while strong cooperative norms can help reduce inequality.

    This creates potential for both vicious and virtuous cycles.'
  key_findings: "1. INEQUALITY → NORMS\n   - High inequality weakens cooperation norms\n   - Perceived unfairness erodes trust\n\
    \   - Social cohesion declines\n\n2. NORMS → INEQUALITY\n   - Strong norms enable redistribution\n   - Cooperation reduces\
    \ inequality\n   - Social investment increases\n\n3. FEEDBACK DYNAMICS\n   - Vicious cycles possible\n   - Virtuous cycles\
    \ possible\n   - Tipping points matter\n\n4. POLICY IMPLICATIONS\n   - Address inequality early\n   - Invest in social\
    \ norms\n   - Design for virtuous cycles"
  ebf_relevance: '10C DIMENSIONS:

    - WHAT (C): Inequality and norms

    - HOW (B): Norm-inequality complementarity

    - WHEN (V): Societal context


    THEORY SUPPORT:

    - MS-SN-001: Social Norms

    - MS-SP-001: Social Preferences

    - Macro-social dynamics


    KEY INSIGHT:

    Inequality and social norms are dynamically linked; addressing one requires

    understanding the other.'
