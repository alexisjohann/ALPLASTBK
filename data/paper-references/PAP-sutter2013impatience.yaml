title: 'Impatience and Uncertainty: Experimental Decisions Predict Adolescents'' Field Behavior'
author: Sutter
year: '2013'
publication_type: journal_article
doi: 10.1257/aer.103.1.510
abstract: We study the relationship between experimental measures of time preferences and uncertainty attitudes on the one
  hand and field behavior of adolescents on the other hand. Using a sample of 661 children and teenagers, we find that experimental
  measures of impatience and risk-seeking predict field behavior such as saving, health behavior, and scholastic effort. Time
  preferences are particularly powerful predictors, explaining variation in smoking, drinking, BMI, and savings. Experimental
  risk attitudes are linked to smoking and drinking. Gender differences in field behavior can partly be traced back to differences
  in time and risk preferences.
