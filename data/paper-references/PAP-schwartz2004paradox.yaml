abstract: Whether we're buying a pair of jeans, ordering a cup of coffee, selecting a long-distance carrier, applying to college,
  choosing a doctor, or setting up a 401(k), everyday decisions - both big and small - have become increasingly complex due
  to the overwhelming abundance of choice with which we are presented. "In the Paradox of Choice, Barry Schwartz explains
  at what point choice - the hallmark of individual freedom and self-determination that we so cherish - becomes detrimental
  to our psychological and emotional well-being. In accessible, engaging, and anecdotal prose, Schwartz shows how the dramatic
  explosion in choice - from the mundane to the profound challenges of balancing career, family, and individual needs - has
  paradoxically become a problem instead of a solution. Schwartz also shows how our obsession with choice encourages us to
  seek that which makes us feel worse. By synthesizing current research in the social sciences, Schwartz makes the counterintuitive
  case that eliminating choices can greatly reduce the stress, anxiety, and busyness of our lives. He offers eleven practical
  steps on how to limit choices to a manageable number, have the discipline to focus on those that are important and ignore
  the rest, and ultimately derive greater satisfaction from the choices you have to make.
