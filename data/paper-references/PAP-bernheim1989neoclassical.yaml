abstract: 'Generally speaking, there are three schools of thought concerning the economic effects of budget deficits: Neoclassical,
  Keynesian, and Ricardian. It is remarkable that from among these three schools of thought, one can find support for every
  conceivable normative position. Whether one thinks of deficits as good, bad, or irrelevant therefore depends fundamentally
  on one''s choice of a paradigm. Certainly, no single paradigm corresponds exactly to reality. Nevertheless, it is my view
  that the Neoclassical framework offers the most relevant insights into the economic effects of deficits. The new Administration
  would do well to focus on the goals of stimulating saving and capital accumulation, and to formulate a policy for gradually
  reducing permanent deficits.'
