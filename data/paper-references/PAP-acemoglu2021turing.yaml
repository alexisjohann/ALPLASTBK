abstract: 'This essay discusses several potential economic, political and social costs of the current path of AI technologies.I
  argue that if AI continues to be deployed along its current trajectory and remains unregulated, it may produce various social,
  economic and political harms.These include: damaging competition, consumer privacy and consumer choice; excessively automating
  work, fueling inequality, inefficiently pushing down wages, and failing to improve worker productivity; and damaging political
  discourse, democracy''s most fundamental lifeblood.Although there is no conclusive evidence suggesting that these costs
  are imminent or substantial, it may be useful to understand them before they are fully realized and become harder or even
  impossible to reverse, precisely because of AI''s promising and wide-reaching potential.I also suggest that these costs
  are not inherent to the nature of AI technologies, but are related to how they are being used and developed at the moment
  -to empower corporations and governments against workers and citizens.As a result, efforts to limit and reverse these costs
  may need to rely on regulation and policies to redirect AI research.Attempts to contain them just by promoting competition
  may be insufficient.'
