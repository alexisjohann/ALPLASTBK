abstract: Adopting a cultural psychological approach, we believe that culture and SWB are most productively analyzed together
  as a dynamic of mutual constitution. We outline a cultural theory of SWB to systematically analyze conceptions of happiness
  as embedded in both Euro-American and Asian cultures. Our cultural theory posits that distinct and different characteristics
  of the conceptions of happiness are prevalent in Asian and Euro-American cultures. For Asians, socially oriented SWB emphasizes
  role obligation and dialectical balance; for Euro-Americans, individually oriented SWB emphasizes personal accountability
  and explicit pursuit. The present paper provides empirical data on American conceptions of happiness and contrasts these
  with previously collected Chinese data. Both similarities and differences were observed and were in general consonant with
  our theoretical propositions.
