summary:
  abstract_extended: 'This paper examines adherence to social customs. Models of social
    customs are

    found to be inherently multi-equilibrial. It is found that social customs

    which are disadvantageous to the individual may nevertheless persist without

    erosion, if individuals are sanctioned by loss of reputation for disobedience

    of the custom.


    One example of such a social custom is the persistence of a fair (rather than

    a market-clearing) wage. In this fashion, involuntary unemployment is

    explained as a consequence of wage rigidity maintained by social norms.


    The model shows how customs can persist and lead to phenomena like involuntary

    unemployment when sanctions for deviation affect reputation and social standing.'
  key_findings: "1. MULTI-EQUILIBRIA: Social custom models are inherently multi-equilibrial\n\
    \   with customs at various levels of adherence\n\n2. REPUTATION SANCTIONS: Customs\
    \ persist because violators lose reputation\n   and social standing\n\n3. FAIR\
    \ WAGE NORM: The \"fair wage\" (not market-clearing) can be a stable\n   social\
    \ custom that causes unemployment\n\n4. INVOLUNTARY UNEMPLOYMENT: Wage rigidity\
    \ from social norms explains\n   unemployment as equilibrium phenomenon\n\n5.\
    \ CUSTOM PERSISTENCE: Disadvantageous customs can persist without erosion\n  \
    \ due to reputational sanctions\n\n6. NORM ENFORCEMENT: Social norms are enforced\
    \ through decentralized\n   reputation-based punishment"
