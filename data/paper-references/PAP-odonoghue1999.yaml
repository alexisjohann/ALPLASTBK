abstract: The authors examine self-control problems, modeled as time-inconsistent, present-biased preferences, in a model
  where a person must do an activity exactly once. They emphasize two distinctions - do activities involve immediate costs
  or immediate rewards, and are people sophisticated or naive about future self-control problems? Naive people procrastinate
  immediate-cost activities and preproperate (do too soon) immediate-reward activities. Sophistication mitigates procrastination
  but exacerbates preproperation.
