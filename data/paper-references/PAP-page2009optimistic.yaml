abstract: '… Bettors are subject to an optimistic bias when betting on the team they
  support. This paper shows that this individual bias does not affect betting odds
  on British teams in association football (soccer), as it is often argued. … The
  present study extends this analysis to a real world sports betting market: the betting
  market on European clubs and international football matches. …'
