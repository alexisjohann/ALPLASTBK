abstract: We ask three questions about the connection between monetary policy and inequality. First, does monetary policy
  affect inequality? While different households respond to changes in monetary policy for different reasons, we argue that
  the overall consumption effects are relatively evenly distributed across households. Second, does household heterogeneity
  change our understanding of monetary policy transmission? A more careful account of microeconomic consumption behavior materially
  alters our understanding of transmission channels, but has rather limited effect on our general view of the aggregate effects
  of monetary policy. Third, does inequality affect the optimal conduct of monetary policy? Since monetary policy is a rather
  blunt distributional tool, we argue that even a central bank with an explicit distributional mandate would not deviate much
  from conventional policy prescriptions.
