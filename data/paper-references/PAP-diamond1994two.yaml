abstract: Under the Clinton proposal, states choose a single payer or large regional alliances, where individuals choose from
  all plans in the market. This should give the high administrative costs of individual choice, not those of group choice.
  States should have another option--small alliances offering limited, group-based choice. Clinton proposes comprehensive
  insurance for all, with courts enforcing coverage for all medically necessary services not explicitly excluded. Covered
  services are not coordinated with resources available. Eventually, rationing will be needed. Less comprehensive basic coverage
  is an additional tool for rationing and decreases the government's role in determining health spending.
