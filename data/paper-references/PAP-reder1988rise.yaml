abstract: 'This paper has a single purpose: to explain why unionism (interpreted as percentage of union adherents among eligible
  employees) has been declining in the private sector for the past 30 to 35 years, but, for most of this period, has been
  increasing in the public sector. To provide this explanation, I offer an ad hoc theory. For the private sector, the paper
  tries to account for differences in the trends of union adherence during five “epochs”: before 1917; 1917 to 1920; 1920
  to 1933; 1933 to the early 1950s; and since the early 1950s. In the public sector, two epochs are distinguished: before
  and after 1960. Finally, I distinguish between the public and private sectors since 1960.'
