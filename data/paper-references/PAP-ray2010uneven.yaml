abstract: 'The textbook paradigm of economywide development rests on the premise of “balanced growth”: that is, on the presumption
  that all sectors will grow in unison over time as a country gets richer. Of course, we would all agree that balanced growth
  is an abstraction. In many developing countries, economic growth has been fundamentally uneven. The question really is not
  whether growth is balanced—it isn''t—but whether the abstraction is a useful one. For many important development questions,
  I believe the answer is no. This is why I would like to take the reality of “uneven growth” seriously and use it as an organizing
  device for a research program. I divide my research agenda into roughly two parts: the sources and nature of uneven growth,
  and the reactions to uneven growth—how forces are set in motion to restore balance or perhaps even to thwart the growth
  process. To help us think about the effects of uneven growth, I present a version of Albert Hirschmann''s tunnel parable:
  You''re in a multi-lane tunnel, all lanes in the same direction, and you''re caught in a serious traffic jam. After a while,
  the cars in the other lane begin to move. Do you feel better or worse? At first, movement in the other lane may seem like
  a good sign: you hope that your turn to move will come soon, and indeed that might happen. However, if the other lane keeps
  whizzing by, with no gaps to enter and with no change on your lane, your reactions may well become quite negative. Unevenness
  without corresponding redistribution can be tolerated or even welcomed if it raises expectations everywhere, but it will
  be tolerated for only so long. Thus, uneven growth will set forces in motion to restore a greater degree of balance, even
  (in some cases) actions that may thwart the growth process itself.'
