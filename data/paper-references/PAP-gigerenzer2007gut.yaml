abstract: Gut Feelings explores the intelligence of the unconscious mind. Gigerenzer argues that reflection and reason are
  overrated, and that the cognitive, emotional, and social repertoire we call intuition is often better qualified for decision-making.
  Gut feelings arise through the unconscious use of heuristics or rules of thumb—the mind reading heuristic tells us what
  others desire, the recognition heuristic produces feelings of trust, and the gaze heuristic guides spatial navigation. These
  heuristics are largely genetically coded through evolutionary pressures and usually unconscious. Gigerenzer views the mind
  as an adaptive toolbox with rules that can be transferred culturally or genetically. The book challenges the view of human
  cognition as riddled with irrational biases, instead conceiving rationality as an adaptive tool.
