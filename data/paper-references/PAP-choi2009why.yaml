abstract: Abstract We evaluate why individuals invest in high-fee index funds. In our experiments, subjects each allocate
  $10,000 across four S&amp;P 500 index funds and are rewarded for their portfolio's subsequent return. Subjects overwhelmingly
  fail to minimize fees. We reject the hypothesis that subjects buy high-fee index funds because of bundled nonportfolio services.
  Search costs for fees matter, but even when we eliminate these costs, fees are not minimized. Instead, subjects place high
  weight on annualized returns since inception. Fees paid decrease with financial literacy. Interestingly, subjects who choose
  high-fee funds sense they are making a mistake.
