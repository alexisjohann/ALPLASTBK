abstract: Arjo Kalmer interviews Amayrtya Sen in December 1985. After some biographical and academic background, the discussion
  moves to welfare economics, rationality, and Adam Smith. In a postscript, Sen discusses the connection between his critique
  of the rationality assumption and his work on social choice theory.
