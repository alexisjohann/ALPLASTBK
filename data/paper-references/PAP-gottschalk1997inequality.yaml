abstract: This essay brings together the factual material on changes in the distribution of labor market income that any of
  the theories addressed in the other papers in this symposium must address. The broad stylized facts are that the rapid growth
  and stable level of inequality of both total family income and individual labor market that marked the postwar period came
  to an end during the 1970s. Real mean earnings grew very little but inequality of earnings rose substantially. This reflected
  increases both in inequality between education and experience groups and within groups. Mobility showed little change over
  this period.
