# === SECTION 8: KEY INSIGHTS ===
key_insights:
  main_contribution: |
    First rigorous decomposition of dynamic complementarity into three
    measurable components:
    1. Productivity P(a) - marginal product of past skills
    2. Transmission Q(a+j) - skill propagation across stages
    3. Static Complementarity f₁,₂(a) - skills × investment interaction

    This decomposition enables:
    - Testing complementarity without arbitrary psychometric scales
    - Understanding WHY early investment matters (mechanism)
    - Predicting which children benefit most (low-ability = highest gains)

  decomposition:
    formula: "∂²K(a+j+1)/∂I(a)∂I'(a+j) = P(a)·Q(a+j)·f₁,₂(a+j)"
    interpretation: |
      Dynamic complementarity = Productivity × Transmission × Static Complementarity
      - P(a): How productive are accumulated skills?
      - Q(a+j): How well do skills transmit to later stages?
      - f₁,₂(a+j): How much do skills and investment interact?

  technology_of_skill_formation:
    equation: "K(a+1) = f(a)(K(a), I(a))"
    components:
      K_a_plus_1: "Vector of skills at age a+1"
      K_a: "Vector of skills at age a"
      I_a: "Investment at age a"
      f_a: "Age-specific production function"

  empirical_evidence:
    data_source: "China REACH Program"
    method: "Staggered enrollment creates natural experiment"
    measure: "Time to first mastery at UHP levels"
    findings:
      language_skills:
        dynamic_complementarity: "Confirmed at levels 8, 9, 11"
        catch_up: "Low-ability children show largest gains"
      cognitive_skills:
        dynamic_complementarity: "Confirmed"
        catch_up: "Present but smaller than language"
      fine_motor_skills:
        dynamic_complementarity: "NOT confirmed"
        catch_up: "Minimal"

  ability_group_heterogeneity:
    high_ability: "Highest absolute levels, smallest marginal gains from early investment"
    normal_ability: "Intermediate levels, moderate catch-up"
    low_ability: "Lowest initial levels, LARGEST gains from early investment (γ highest)"
    implication: "Early investment is MOST effective for disadvantaged children"

  ebf_implications:
    - "Complementarity γ decomposes into three estimable components"
    - "Can test γ > 0 without imposing common scale across ages"
    - "Interventions targeting low-ability children have highest marginal returns"
    - "Fine motor skills may not exhibit dynamic complementarity (domain-specific γ)"
    - "Time-to-mastery provides scale-free outcome measure"
