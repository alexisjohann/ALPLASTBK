# === SECTION 8: KEY INSIGHTS ===
key_insights:
  main_contribution: |
    Comprehensive comparison of three causal inference traditions showing that
    only the econometric approach (Frisch-Haavelmo) can handle:
    - Simultaneous equations (feedback loops)
    - All four policy questions (P1-P4)
    - External validity through structural parameters

  fixing_vs_conditioning:
    fixing:
      definition: "Modifying the mechanism generating a variable to produce a constant value"
      notation: "Fixing(A=a) or do(A=a)"
      effect: "Changes the data generating process"
      use: "Causal interventions, policy analysis"
    conditioning:
      definition: "Restricting analysis to subpopulation where variable takes specific value"
      notation: "A=a or |A=a"
      effect: "Selects subset of existing distribution"
      use: "Descriptive analysis, prediction"
    key_insight: "Conflating these leads to confounding bias"

  three_frameworks:
    econometric:
      basis: "Thought experiments with hypothetical manipulations"
      founders: "Frisch (1930s), Haavelmo (1940s), Cowles Commission"
      key_feature: "Structural equations with error terms"
      can_handle: "Simultaneity, policy invariance, all P1-P4"
      cannot_handle: null

    neyman_rubin:
      basis: "Potential outcomes from switching treatment"
      founders: "Neyman (1923), Rubin (1974)"
      key_feature: "SUTVA, potential outcomes Y(0), Y(1)"
      can_handle: "P1, P2 in experimental settings"
      cannot_handle: "P3, P4 without additional structure; simultaneity"

    pearl_do_calculus:
      basis: "Directed Acyclic Graphs with do-operator"
      founders: "Pearl (1995, 2000)"
      key_feature: "Graphical representation of causal structure"
      can_handle: "Identification from observational data"
      cannot_handle: "Simultaneous equations (cyclic graphs); limited P3, P4"

  simultaneity_problem:
    example: "Supply and demand simultaneously determine price and quantity"
    equations:
      demand: "Q = α_D * P + U_D"
      supply: "Q = α_S * P + U_S"
    dag_limitation: "DAGs are acyclic by definition; cannot represent feedback"
    econometric_solution: "Structural estimation with exclusion restrictions"

  generalized_roy_model:
    outcome: "Y = D * Y₁ + (1-D) * Y₀"
    selection: "D = 1[μ_D(Z) - V > 0]"
    treatment_effects:
      ATE: "E[Y₁ - Y₀]"
      TT: "E[Y₁ - Y₀ | D = 1]"
      TUT: "E[Y₁ - Y₀ | D = 0]"
      MTE: "E[Y₁ - Y₀ | V = v]"
      LATE: "E[Y₁ - Y₀ | Compliers]"
    key_insight: "TT ≠ ATE ≠ TUT when selection on gains"

  late_critique:
    definition: "Local Average Treatment Effect = effect for compliers"
    limitation_1: "LATE population is instrument-dependent"
    limitation_2: "Cannot compare LATE across instruments"
    limitation_3: "Not informative for P2 (TUT) without monotonicity"
    implication: "LATE insufficient for policy evaluation"

  ebf_implications:
    - "EBF parameters (λ, β, γ) should be structural, not treatment effects"
    - "Context (Ψ) = which mechanisms are held fixed in thought experiment"
    - "Intervention design requires structural model for P3, P4"
    - "DAG-based identification may miss simultaneous mechanisms"
    - "Selection models (Roy) essential for understanding intervention uptake"
