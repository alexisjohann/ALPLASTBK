    - paper: "PAP-agersnap2020welfare"
      relationship: "complementary"
      notes: "Agersnap: Welfare as pull factor. Andersen: Welfare cuts backfire"
    - paper: "PAP-bratsberg2017refugees"
      relationship: "extends"
      notes: "Bratsberg: Trajectories. Andersen: Policy effects on trajectories"

  hmwm_integration:
    component: "Negative Incentives Module"
    equation: |
      ΔWelfare_Total = ΔWelfare_Savings - ΔCrime_Costs - ΔIntegration_Costs
      = 0.40 × Benefit - 0.12 × Crime_Cost - 0.08 × Integration_Loss
      = NEGATIVE (costs > savings)
    parameter_update: |
      β_welfare_cuts = NEGATIVE
      fiscal_ROI_welfare_cuts = -12000 USD
    insight: "Welfare cuts have negative fiscal ROI due to unintended consequences"
