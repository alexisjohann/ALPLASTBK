  journal_quality:
    field_ranking: "top_field"
    notes: "American Economic Journal: Economic Policy is premier policy economics outlet"

ebf_integration:
  core_dimensions:
    - dimension: "CORE-HOW"
      connection: |
        NEGATIVE ANREIZE BACKFIREN:
        40% Welfare-Kürzung führt zu:
        ✅ Kurzfristig: +5pp Beschäftigung
        ❌ Langfristig: +5-12pp Kriminalität
        ❌ Langfristig: -6 Monate Bildung
        ❌ Langfristig: Schlechtere Kinder-Outcomes
        ❌ Fiskalisch: -$12,000 ROI (NEGATIV!)
      strength: "high"

    - dimension: "CORE-WHAT"
      connection: |
        UNINTENDED CONSEQUENCES DOMINIEREN:
        Welfare-Kürzungen sparen kurzfristig Geld,
        aber Kosten durch Kriminalität und Integration
        übersteigen Einsparungen deutlich.
      strength: "high"

  theory_support:
    primary: "MS-NI-001"
    secondary:
      - "MS-CR-001"
      - "MS-HC-001"
    creates_new_theory: false

  use_for:
    - "LIT-DUSTMANN"
    - "DOMAIN-MIGRATION"
    - "DOMAIN-PUBLIC"
    - "DOMAIN-CRIME"
    - "CORE-HOW"
    - "CORE-WHAT"
    - "parameter"
    - "BEATRIX"

  parameters_extracted:
    - name: "welfare_cut_percent"
      value: "-40%"
      context: "Danish Start Aid Reform 2002"
      confidence: "high"
    - name: "employment_effect_shortterm"
      value: "+5pp"
      context: "Kurzfristiger Beschäftigungseffekt"
      confidence: "high"
    - name: "crime_increase"
      value: "+5 to +12pp"
      context: "Langfristiger Kriminalitätsanstieg (Diebstahl, Eigentum)"
      confidence: "high"
    - name: "education_reduction"
      value: "-6 months"
      context: "Reduktion der Bildungsdauer"
      confidence: "high"
    - name: "fiscal_ROI"
      value: "-$12,000 per refugee"
      context: "Negative Fiskalrendite (Kosten > Einsparungen)"
      confidence: "high"

decision:
  outcome: "accept"

  rationale: |
    1. TOP-JOURNAL + RDD: American Economic Journal: Economic Policy mit
       sauberem Regression Discontinuity Design um 2002 Reform.

    2. COUNTER-INTUITIVE FINDING: Welfare-Kürzungen haben NEGATIVEN ROI!
       Die Einsparungen werden durch Kriminalitätskosten überkompensiert.

    3. MECHANISMUS IDENTIFIZIERT:
       - Kurzfristig: Menschen nehmen schlechtere Jobs an (rational)
       - Langfristig: Stress → Kriminalität, weniger Bildung, schlechtere
         Kinder-Outcomes (unintended consequences)

    4. SWISS IMPLICATIONS (BEATRIX CRITICAL):
       - Vorschläge für Asylbewerber-Sozialhilfe-Kürzungen vermutlich kontraproduktiv
       - Kurzfristige Einsparungen werden durch langfristige Kosten überkompensiert
       - Evidence-based policy: GEGEN Welfare-Kürzungen

    5. HMWM v3.2: Negative Incentives Module
       - β_welfare_cut = NEGATIVE (backfire!)
       - Integration costs > Welfare savings

  conditions: null
  reviewer_confidence: "high"

cross_references:
  related_papers_in_ebf:
