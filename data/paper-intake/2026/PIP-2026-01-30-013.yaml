# === SECTION 8: KEY FINDINGS ===
key_findings:
  main_contribution: |
    First major field experiment on the demand side of the misinformation market.
    Tests critical thinking interventions (videos, personality tests) during the
    2022 Colombian Presidential election. Shows that videos reduce misinformation
    vulnerability by 30%, while the combination of video+personality test increases
    willingness to report fake news by 15%.

  experimental_design:
    setting: "Online framed field experiment"
    context: "2022 Colombian Presidential Election"
    sample: "2,235 Colombian adults"
    treatments:
      - name: "Control"
        n: 645
        description: "No intervention"
      - name: "Personality Test Only"
        n: 750
        description: "Test showing cognitive traits and biases"
      - name: "Video Only"
        n: 408
        description: "Thought-provoking video on behavioral biases"
      - name: "Both"
        n: 432
        description: "Video + Personality Test"
    outcomes:
      - "Misinformation vulnerability (19 news headlines rated)"
      - "Willingness to report fake tweets"
      - "Mediators: trust, dehumanization, discrimination, ambiguity aversion"

  main_results:
    video_effect_on_vulnerability:
      estimate: -0.040
      se: 0.019
      interpretation: "30.3% reduction in considering fake news reliable"
      significance: "p < 0.05"

    video_effect_neutral_fake_news:
      estimate: -0.074
      se: 0.024
      interpretation: "32.3% reduction for neutral fake headlines"
      significance: "p < 0.01"

    joint_intervention_on_reporting:
      estimate: 0.085
      se: 0.030
      interpretation: "15% increase in willingness to report fake tweet"
      significance: "p < 0.01"
      note: "Only for non-political tweet (Tweet A)"

    personality_test_alone:
      finding: "No significant effect"
      interpretation: "Knowing own biases is not as effective as relatable videos"

  mechanism_findings:
    dehumanization_left:
      estimate: -0.101
      se: 0.031
      interpretation: "15% reduction in negative characterization of political left"
      significance: "p < 0.01"

    dehumanization_right:
      estimate: -0.061
      se: 0.030
      interpretation: "9% reduction in negative characterization of political right"
      significance: "p < 0.05"

    discrimination_perception:
      estimate: 0.045
      se: 0.027
      interpretation: "19.5% increase in not feeling discriminated"
      significance: "p < 0.10"

    trust_and_ambiguity:
      finding: "No significant effects"

  heterogeneity:
    political_orientation:
      finding: "Effects strongest for fake news targeting political right"
      note: "But control group more likely to trust neutral than political news"

  key_insight: |
    "Videos that provoke viewers to slow down and reconsider their thinking are
    successful in increasing skepticism and reducing misinformation vulnerability.
    Yet, our assessment that aims at a similar result by providing individuals
    with evidence about their cognitive traits has limited effects."

  intervention_complementarity: |
    Video alone: Reduces misinformation vulnerability
    Personality test alone: No significant effect
    Video + Test: Reduces vulnerability AND increases reporting behavior

    This suggests complementarity (γ > 0) between interventions for the
    reporting outcome, where the combination achieves what neither achieves alone.

  policy_implications:
    - "Demand-side interventions can reduce misinformation vulnerability"
    - "Videos showing relatable people are more effective than cognitive assessments"
    - "Combined interventions may be necessary to change behavior (reporting)"
    - "Demand-side interventions can affect supply side (spillover to reporting)"

  ebf_implications:
    - "CORE-AWARE: Critical thinking can be enhanced via video interventions"
    - "CORE-HOW: Intervention complementarity documented (γ > 0)"
    - "System 2 activation: 'Slowing down' reduces vulnerability"
    - "Dehumanization as mechanism: Reducing outgroup negativity helps"
    - "Intervention design: Videos > personality tests for awareness"
    - "Heterogeneity: Political orientation affects treatment response"

  parameters_extracted:
    - name: "Video Effect on Fake News Vulnerability"
      symbol: "β_video"
      value: -0.040
      unit: "probability_points"
      se: 0.019
      context: "All fake headlines, relative to control"

    - name: "Joint Intervention Effect on Reporting"
      symbol: "β_both_report"
      value: 0.085
      unit: "probability_points"
      se: 0.030
      context: "Non-political fake tweet (Tweet A)"

    - name: "Video Effect on Dehumanization (Left)"
      symbol: "β_video_dehum_L"
      value: -0.101
      unit: "probability_points"
      se: 0.031
      context: "Negative characterization of political left"

    - name: "Video Effect on Dehumanization (Right)"
      symbol: "β_video_dehum_R"
      value: -0.061
      unit: "probability_points"
      se: 0.030
      context: "Negative characterization of political right"

