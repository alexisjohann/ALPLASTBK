  title: "Colombian Election Misinformation Field Experiment"
  domain: "media_misinformation"
  country: "Colombia"
  year: 2022

  ten_c_mapping:
    WHO: "Colombian adults (N=2,235)"
    WHAT: "Misinformation vulnerability, reporting behavior"
    HOW: "Intervention complementarity (video + test)"
    WHEN: "Presidential election (high misinformation context)"
    WHERE: "Online field experiment"
    AWARE: "Critical thinking enhancement via videos"

  formulas:
    vulnerability: "P(fake_reliable) = β₀ + β_video×Video + β_test×Test + β_both×Both + ε"
    reporting: "P(report_tweet) = α₀ + α_video×Video + α_test×Test + α_both×Both + ε"

  references:
    - "list2024misinformation"
    - "list2022critical"

  insight: |
    Videos that show relatable people reflecting on their biases reduce
    misinformation vulnerability by 30%. Combining videos with personality
    tests increases willingness to report fake news by 15%.

  implication: |
    Demand-side interventions are effective but require combination
    (video + personalized feedback) to change actual behavior.
