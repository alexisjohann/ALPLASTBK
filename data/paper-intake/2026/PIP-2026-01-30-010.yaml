integration_rationale: |
  Comprehensive economics literature review synthesizing research on social media:
  - First unified framework organizing social media economics literature
  - Covers Production, Distribution, Consumption of content
  - Integrates IO, behavioral economics, and information economics

  Critical for EBF because:
  - Provides theoretical framework for platform effects on behavior
  - Documents attention economics and engagement mechanisms
  - Synthesizes research on misinformation, polarization, mental health
  - Connects platform design to welfare outcomes
  - Complements Naik (cognitive), O'Neill (policy), Swider-Cios (children)

