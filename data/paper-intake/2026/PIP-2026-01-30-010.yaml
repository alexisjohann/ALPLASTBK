# === SECTION 4: EBF-INTEGRATION ★ PFLICHT ===
ebf_integration:
  # 10C Relevanz
  core_dimensions:
    - dimension: "CORE-HOW"
      connection: "Platform algorithms create complementarity between content and engagement"
      strength: "high"
    - dimension: "CORE-WHEN"
      connection: "Context effects of algorithmic curation and default feeds"
      strength: "high"
    - dimension: "CORE-WHAT"
      connection: "Utility from social media consumption (attention, social connection)"
      strength: "high"
    - dimension: "CORE-AWARE"
      connection: "Attention economics and awareness of manipulation"
      strength: "high"
    - dimension: "CORE-WHO"
      connection: "Platform users, content creators, advertisers as stakeholders"
      strength: "medium"

  # Theorie-Zuordnung
  theory_support:
    primary: "MS-AT-001"  # Attention Economics
    secondary:
      - "MS-NU-002"  # Default Effects / Choice Architecture
      - "MS-PL-001"  # Platform Economics
      - "MS-IE-001"  # Information Economics
    creates_new_theory: false

  # Klassifikation für use_for Feld
  use_for:
    - "LIT-ECONOMICS"
    - "DOMAIN-PLATFORM"
    - "DOMAIN-MEDIA"
    - "CORE-HOW"
    - "CORE-WHEN"
    - "CORE-AWARE"
    - "CONTEXT-PSI_M"

  # Key concepts
  key_concepts:
    # PRODUCTION
    - name: "Content Production Economics"
      definition: "Economic analysis of who creates content and why"
      ebf_relevance: "Supply side of attention markets"

    - name: "Creator Incentives"
      definition: "Monetary and non-monetary rewards for content creation"
      ebf_relevance: "Motivation and utility dimensions"

    - name: "User-Generated Content (UGC)"
      definition: "Content created by platform users rather than professionals"
      ebf_relevance: "Democratization of media production"

    # DISTRIBUTION
    - name: "Algorithmic Curation"
      definition: "Platform algorithms that select and rank content for users"
      ebf_relevance: "Choice architecture at scale (Ψ_I)"

    - name: "Feed Algorithm"
      definition: "Systems determining content ordering in user feeds"
      ebf_relevance: "Default effects and attention allocation"

    - name: "Engagement Optimization"
      definition: "Algorithms optimizing for user engagement metrics"
      ebf_relevance: "Platform incentives vs user welfare"

    - name: "Content Recommendation"
      definition: "Personalized content suggestions based on user behavior"
      ebf_relevance: "Behavioral targeting and preference shaping"

    # CONSUMPTION
    - name: "Attention Economics"
      definition: "Economic framework treating attention as scarce resource"
      ebf_relevance: "CORE-AWARE dimension"

    - name: "Social Media Addiction"
      definition: "Compulsive use patterns driven by platform design"
      ebf_relevance: "Self-control and β parameter"

    - name: "Misinformation Spread"
      definition: "False information propagation on social platforms"
      ebf_relevance: "Information quality and belief formation"

    - name: "Echo Chambers"
      definition: "Exposure only to information confirming existing beliefs"
      ebf_relevance: "Filter bubbles and polarization"

    - name: "Polarization"
      definition: "Increasing political and social division"
      ebf_relevance: "Social welfare implications"

    - name: "Mental Health Effects"
      definition: "Psychological impacts of social media use"
      ebf_relevance: "Welfare consequences of platform design"

  # Framework Structure
  framework_structure:
    production:
      topics:
        - "Who creates content"
        - "Creator incentives"
        - "Quality vs quantity tradeoffs"
        - "Monetization models"
      key_insight: "Economic incentives shape content ecosystem"

    distribution:
