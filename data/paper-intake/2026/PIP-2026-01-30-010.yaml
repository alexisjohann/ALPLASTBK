        - "Attention allocation"
        - "Welfare effects"
        - "Misinformation"
        - "Polarization"
        - "Mental health"
      key_insight: "Platform design affects individual and social welfare"

  # Konsistenz mit bestehendem EBF
  consistency:
    supports_ebf: true
    contradicts_ebf: false
    extends_ebf: true
    extension_details: |
      Major extensions to EBF understanding of digital platforms:
      1. Production-Distribution-Consumption framework for social media
      2. Algorithmic curation as large-scale choice architecture
      3. Attention as scarce resource (connects to CORE-AWARE)
      4. Platform incentives vs user welfare tradeoffs
      5. Misinformation and polarization mechanisms
      6. Mental health effects of engagement optimization

