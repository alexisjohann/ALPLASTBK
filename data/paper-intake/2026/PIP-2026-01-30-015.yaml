# === SECTION 8: KEY FINDINGS ===
key_findings:
  main_contribution: |
    Tests robustness of experimental forecast elicitation across four
    randomized features. Forecasts are generally robust to reference values,
    units (raw vs SD), and response format (text vs slider). However, wider
    slider bounds (±1.0 vs ±0.5 SD) shift the entire forecast distribution
    rightward. Recommends 15-30 forecasters for precise estimates.

  experimental_design:
    setting: "Online forecast survey"
    sample: "106 researchers and practitioners"
    predictions: "772 total predictions"
    forecast_studies:
      - "Yang et al.: HIV testing in Mozambique"
      - "Blimpo & Pugatch: Teacher training in Rwanda"
      - "Bouguen & Dillon: Cash transfers in Burkina Faso"

  main_results:
    average_forecast:
      value: 0.16
      unit: "SD"
      se: 0.01
      benchmark: "Comparable to 0.12 SD average from 635 dev interventions"

    reference_value_effect:
      finding: "No significant difference"
      p_value: 0.53
      interpretation: "Anchoring from examples is minimal"

    units_effect:
      finding: "No significant difference"
      p_value: 0.75
      interpretation: "Raw units and SDs yield similar forecasts"

    entry_format_effect:
      finding: "No significant difference"
      p_value: 0.93
      interpretation: "Text and slider yield similar averages"

    slider_bounds_effect:
      small_bounds: 0.12
      large_bounds: 0.21
      p_value: 0.00
      interpretation: "Wider bounds shift ENTIRE distribution rightward"
      mechanism: "Inference from bounds or anchoring"

  sample_size_recommendation:
    finding: "15-30 forecasters sufficient for precise estimates"
    precision: "SE = 0.02 with n=73"
    implication: "Feasible to collect forecasts for most studies"

  ebf_implications:
    - "LLMMC elicitation should use consistent slider bounds"
    - "15-30 expert estimates sufficient for parameter priors"
    - "Raw units vs SDs: both acceptable for elicitation"
    - "Anchoring from reference examples is minimal"
    - "Slider bounds ARE anchoring - use with caution"

  parameters_extracted:
    - name: "Average Forecast Effect Size"
      symbol: "E[τ̂]"
      value: 0.16
      unit: "SD"
      context: "Development economics interventions"

    - name: "Slider Bounds Anchoring Effect"
      symbol: "Δ_bounds"
      value: 0.09
      unit: "SD"
      context: "1.0 SD vs 0.5 SD bounds"

    - name: "Optimal Forecast Sample Size"
      symbol: "n*_forecast"
      value_range: [15, 30]
      unit: "forecasters"
      context: "For precise average estimates"

# === SECTION 9: CASE REGISTRY ENTRY ===
case_registry_entry:
  case_id: "CAS-MET-002"
  title: "Forecast Elicitation Methodology Experiment"
  domain: "methodology"
  country: "International"
  year: 2020

  ten_c_mapping:
    WHO: "Researchers and practitioners (N=106)"
    WHAT: "Experimental result forecasts"
    HOW: "Elicitation format affects distribution"
    WHEN: "Pre-results (before experiments complete)"
    WHERE: "Online survey platform"
    AWARE: "Expert judgment calibration"

  formulas:
    forecast_precision: "SE(τ̂) = σ / √n"
    bounds_effect: "Δ = E[τ̂|wide] - E[τ̂|narrow] = 0.09 SD"

  references:
    - "dellavigna2020forecasting"
    - "dellavigna2018predicting"

  insight: |
    Forecasts are robust to most elicitation features, but wider slider
    bounds shift the entire distribution rightward. 15-30 forecasters
    are sufficient for precise estimates.

  implication: |
    For EBF LLMMC methodology: use consistent slider bounds across
    studies, and collect 15-30 expert estimates for parameter priors.
