# === SECTION 8: KEY FINDINGS ===
key_findings:
  main_contribution: |
    First structural model estimating bidirectional causal effects between
    youth cigarette addiction and education. Key innovation: endogenous
    discount factor that depends on addiction stock, creating feedback loop
    where addiction increases myopia, reducing human capital investment.

  model_structure:
    utility_function: "U = c^(1-γ)/(1-γ) + u_q(smoking) + u_e(education)"
    addiction_stock: "q_t = (1-δ_q)q_{t-1} + d_{q,t-1}"
    discount_factor: "β(q,θ) = exp(-φ_e,t) · exp(-κ_q·q) · exp(-κ_r + κ_c·θ_c + κ_n·θ_n)"
    smoking_utility: "u_q = d_q·(ν_0 + ν_q·q + ν_e·e + ν_θ·θ + ε_q) + ν_{q2}·q²"

  three_channels_smoking_to_education:
    channel_1: "Addiction reduces discount factor → less investment in human capital"
    channel_2: "Education affects flow utility of smoking → anticipation effect"
    channel_3: "Monetary cost of smoking → reduces resources for tuition"

  three_channels_education_to_smoking:
    channel_1: "Education increases discount factor → different smoking decisions"
    channel_2: "Higher education reduces flow utility of smoking"
    channel_3: "Higher earnings from education → income effect on smoking"

  key_parameter_findings:
    depreciation_rate: "δ_q = 0.43 → addiction depletes in ~2 years"
    discount_factor: "β = 0.9754 for non-addicts (consistent with Keane-Wolpin)"
    myopia_effect: "κ_q = 0.038% per unit addiction → 0.95% lifetime utility loss"
    education_offset: "4 years education offsets 1 year smoking utility"
    non_cognitive_vs_cognitive: "1 SD non-cog = 1 year education for smoking reduction"

  counterfactual_results:
    education_on_smoking:
      intervention: "+1 year schooling at age 20"
      short_run: "-4 pp smoking rate at age 20 (21% reduction)"
      long_run: "-8 pp smoking rate at age 30 (31% reduction)"
      heterogeneity: "Stronger for high non-cognitive ability"

    smoking_on_education:
      intervention: "Eliminate smoking as choice"
      effect_smokers: "+6 pp college attendance (30% → 36%)"
      effect_population: "+3 pp college attendance (59% → 62%)"
      key_insight: "Non-cog more important for avoiding harm; cog for education"

    excise_tax:
      intervention: "+40% excise tax with tuition subsidy"
      effect_smoking: "-3 pp age-30 smoking (27% → 24%)"
      effect_education: "+4 pp college attendance (59% → 63%)"
      elasticity: "-0.28 daily smoking participation"

  ebf_implications:
    - "Discount factor β should be modeled as endogenous, depending on behaviors"
    - "Non-cognitive skills are primary driver of avoiding harmful behaviors"
    - "Cognitive skills become more important once harmful behaviors eliminated"
    - "Dynamic complementarity can be negative (addiction reduces education)"
    - "Excise taxes can achieve similar effects to eliminating harmful behaviors"
    - "Policy effects vary substantially by ability levels"
