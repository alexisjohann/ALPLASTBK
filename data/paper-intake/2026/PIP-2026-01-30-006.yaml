integration_rationale: |
  Groundbreaking structural model combining two major literatures:
  - Rational addiction (Becker-Murphy 1988)
  - Human capital investment with borrowing constraints (Keane-Wolpin 1997)

  Critical for EBF because:
  - Estimates endogenous discount factor depending on addiction stock
  - Quantifies bidirectional causality: education ↔ addiction
  - Shows non-cognitive skills are key driver of quitting behavior
  - Provides policy-relevant counterfactuals (excise tax effects)
  - Demonstrates dynamic complementarity in harmful behaviors

