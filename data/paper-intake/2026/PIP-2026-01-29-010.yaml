paper_id: "PAP-foged2016immigrants"
intake_id: "PIP-2026-01-29-010"
intake_date: "2026-01-29"
intake_session: "EBF-S-2026-01-29-MIG-001"

bibliographic:
  title: "Immigrants' Effect on Native Workers: New Analysis on Longitudinal Data"
  authors:
    - "Foged, Mette"
    - "Peri, Giovanni"
  year: 2016
  source_type: "journal"
  source: "American Economic Journal: Applied Economics"
  volume: 8
  issue: 2
  pages: "1-34"
  doi: "10.1257/app.20150114"
  peer_reviewed: true

quality:
  evidence_tier: 1
  methodology:
    design: "quasi_experimental"
    identification: "refugee_dispersal_policy_IV"
    sample_size: "Denmark 1991-2008"
    causal_claim: true
    natural_experiment: "Danish refugee dispersal policy (quasi-random placement)"

  journal_quality:
    field_ranking: "top_field"
    notes: "AEJ: Applied is top-tier field journal"

ebf_integration:
  core_dimensions:
    - dimension: "CORE-WHAT"
      connection: |
        REFUGEE-NATIVE KOMPLEMENTARITÄT: Flüchtlinge ERHÖHEN
        Löhne von Niedrigqualifizierten um +1.8%. Mechanismus:
        Natives upgraden zu komplexeren Berufen.
      strength: "high"

    - dimension: "CORE-HOW"
      connection: |
        OCCUPATIONAL UPGRADING: Wenn Refugees einfache Jobs
        übernehmen, wechseln Natives zu komplexeren Tätigkeiten.
        Keine Verdrängung, sondern Spezialisierung.
      strength: "high"

  theory_support:
    primary: "MS-LM-001"
    secondary:
      - "MS-LM-004"
      - "MS-MG-001"
    creates_new_theory: false

  use_for:
    - "LIT-PERI"
    - "DOMAIN-MIGRATION"
    - "DOMAIN-LABOR"
    - "CORE-WHAT"
    - "CORE-HOW"
    - "parameter"
    - "BEATRIX"

  parameters_extracted:
    - name: "refugee_native_wage_effect"
      value: "+1.8%"
      context: "Lohneffekt für niedrigqualifizierte Natives"
      confidence: "high"
    - name: "occupational_upgrade_coefficient"
      value: "+0.3"
      context: "Natives wechseln zu komplexeren Berufen"
      confidence: "high"
    - name: "complementarity_refugee"
      value: "positive"
      context: "Flüchtlinge sind komplementär zu Natives"
      confidence: "high"

decision:
  outcome: "accept"

  rationale: |
    1. KAUSALITÄT: Danish refugee dispersal policy liefert quasi-random
       Variation. Refugees werden Gemeinden ZUGEWIESEN, nicht selbst gewählt.

    2. HMWM-ERWEITERUNG: Fundamentales Paper für ASY-Typ Differenzierung.
       Zeigt dass Asylsuchende POSITIV für Natives sind (Komplementarität).

    3. CONTRA-NARRATIV: Widerlegt "Refugees nehmen Jobs weg" Narrativ
       empirisch. Effekt ist +1.8% Löhne, nicht negativ.

    4. BEATRIX: Direkt nutzbar zur Faktencheckung von SVP-Narrativen.

  conditions: null
  reviewer_confidence: "high"

cross_references:
  related_papers_in_ebf:
    - paper: "PAP-dustmann2013effect"
      relationship: "complementary"
      notes: "Dustmann: allgemeine Lohneffekte. Foged: Refugees spezifisch"
    - paper: "PAP-bratsberg2017refugees"
      relationship: "complementary"
      notes: "Bratsberg zeigt langfristige Dynamik, Foged Kurz-/Mittelfrist"
    - paper: "PAP-poutvaara2018immigration"
      relationship: "validates"
      notes: "Poutvaara bestätigt positive native welfare bei Komplementarität"

  hmwm_integration:
    component: "Migrant Type Differentiation (ASY)"
    equation: "ΔU_actual(m=ASY) = +0.018 × native_wage_base"
    parameter_update: "Add γ_ASY = +1.8% for low-skilled natives"
    insight: "Refugees are complements, not substitutes"
