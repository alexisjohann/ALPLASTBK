    supports_ebf: true
    contradicts_ebf: false
    extends_ebf: true
    extension_details: |
      Extends EBF understanding of early childhood:
      1. Documents age-dependent constraints on learning from screens (< 2 years)
      2. Shows parental mediation as key moderator (complementarity)
      3. Identifies multiple channels: content, time, form, social
      4. Connects screen media to executive function development

