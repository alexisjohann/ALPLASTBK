  # Key concepts (no parameters - review paper)
  key_concepts:
    - name: "Video Deficit Effect"
      definition: "Children < 2 years cannot form links between screen content and reality"
      ebf_relevance: "Age-dependent learning constraints"

    - name: "Content-Based Theories"
      definition: "Media effects depend primarily on content (educational vs violent)"
      ebf_relevance: "Quality dimension of inputs"

    - name: "Content-Independent Theories"
      definition: "Screen time displaces beneficial activities regardless of content"
      ebf_relevance: "Time allocation and opportunity cost"

    - name: "Form-Based Theories"
      definition: "Media pace, visual/auditory features affect cognition"
      ebf_relevance: "Attention and cognitive load"

    - name: "Social-Based Theories"
      definition: "Parental behavior and mediation moderate all effects"
      ebf_relevance: "Complementarity between inputs"

    - name: "Technoference"
      definition: "Parental device use disrupts parent-child interaction quality"
      ebf_relevance: "Negative spillover from technology"

    - name: "Parental Mediation Types"
      definition: "Restrictive (rules), Active (discussion), Co-viewing (joint engagement)"
      ebf_relevance: "Intervention channels for parents"

  # Konsistenz mit bestehendem EBF
