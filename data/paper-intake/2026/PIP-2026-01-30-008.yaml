# === SECTION 8: KEY FINDINGS ===
key_findings:
  main_contribution: |
    EU Parliament expert policy study providing comprehensive overview of social
    media's influence on child development, using the CO:RE 4Cs risk framework
    (Content, Contact, Conduct, Contract) and reviewing EU policy responses
    including BIK+, DSA, AVMSD, and GDPR. Offers five policy recommendations
    centered on safety by design, age verification, and digital literacy.

  four_cs_framework:
    content:
      definition: "Child as RECIPIENT of mass-produced content"
      risks: ["Violent content", "Hate speech", "Disinformation", "Self-harm promotion"]
      eu_response: "AVMSD, DSA content moderation requirements"

    contact:
      definition: "Child as PARTICIPANT in interactive situations"
      risks: ["Grooming", "Harassment", "Unwanted contact", "Privacy violations"]
      eu_response: "GDPR, parental consent requirements"

    conduct:
      definition: "Child as ACTOR in problematic behavior"
      risks: ["Cyberbullying", "Sexting", "Hate speech creation", "Gambling"]
      eu_response: "Digital literacy initiatives, BIK+"

    contract:
      definition: "Child as CONSUMER/COMMERCIAL TARGET"
      risks: ["Data exploitation", "Gambling", "In-app purchases", "Targeted advertising"]
      eu_response: "DSA, GDPR, unfair commercial practices"

  eu_policy_framework:
    BIK_plus:
      year: 2022
      focus: "Updated Better Internet for Kids strategy"
      pillars: ["Safe digital experiences", "Digital empowerment", "Active participation"]

    DSA:
      year: 2022
      focus: "Platform accountability and transparency"
      child_provisions: ["Risk assessment", "Algorithmic transparency", "Trusted flaggers"]

    AVMSD:
      year: 2018
      focus: "Audiovisual content regulation"
      child_provisions: ["Age verification", "Watershed rules", "Content ratings"]

    GDPR:
      year: 2016
      focus: "Data protection"
      child_provisions: ["Parental consent under 16", "Right to erasure", "Data minimization"]

  international_developments:
    AADC_UK:
      name: "Age Appropriate Design Code"
      year: 2021
      key_principle: "Best interests of child as primary consideration"
      features: ["Privacy by default", "Geolocation off by default", "No nudges for data sharing"]

    COPPA_US:
      name: "Children's Online Privacy Protection Act"
      status: "COPPA 2.0 proposed"
      features: ["Verifiable parental consent", "Data collection limits"]

  five_policy_recommendations:
    - number: 1
      title: "Strengthen safety by design requirements"
      details: "Risk assessments, algorithmic audits, transparency obligations"

    - number: 2
      title: "Effective age assurance"
      details: "Balance verification with privacy, avoid excessive data collection"

    - number: 3
      title: "Digital literacy for all"
      details: "Critical thinking, media literacy, technical skills, teacher training"

    - number: 4
      title: "Safe user experiences by default"
      details: "Privacy-protective defaults, limited profiling, no dark patterns"

    - number: 5
      title: "Child participation"
      details: "Include children's perspectives in policy development"

  ebf_implications:
    - "Ψ_I (Institutional Context) is critical for digital behavior outcomes"
    - "Safety by design = choice architecture at platform/system level"
    - "4Cs framework useful for categorizing intervention targets"
    - "Age-appropriate defaults exemplify CORE-WHEN interventions"
    - "Digital literacy connects to CORE-AWARE dimension"
    - "Policy must balance protection with children's agency and rights"
