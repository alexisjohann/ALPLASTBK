# === SECTION 4: EBF-INTEGRATION ★ PFLICHT ===
ebf_integration:
  core_dimensions:
    - dimension: "CORE-WHAT"
      connection: |
        WELFARE ALS PULL-FAKTOR: Sozialleistungen sind Teil der
        Utility-Funktion U_F. Höhere Benefits → höhere erwartete U_F
        → mehr Migration. Elastizität 1.3 sehr hoch.
      strength: "high"

    - dimension: "CORE-WHERE"
      connection: |
        ZIELLAND-ATTRAKTIVITÄT: Dänemark als Benchmark für CH.
        Beide kleine, reiche, egalitäre Wohlfahrtsstaaten.
        Policy-Experimente direkt übertragbar.
      strength: "high"

    - dimension: "CORE-HOW"
      connection: |
        FISKALISCHE EXTERNALITÄTEN: Wenn DK Benefits senkt,
        wandern Migranten in andere Länder → Kosten für diese.
        Race-to-bottom möglich ohne Koordination.
      strength: "medium"

  theory_support:
    primary: "MS-WM-001"
    secondary:
      - "MS-MG-007"
      - "MS-FI-001"
    creates_new_theory: false

  use_for:
