    - "BEATRIX"

  parameters_extracted:
    - name: "welfare_migration_elasticity"
      value: "1.3"
      context: "Elastizität der Migration bzgl. Welfare Benefits"
      confidence: "high"
    - name: "benefit_reduction_effect"
      value: "-5'000/Jahr"
      context: "-50% Benefits → -5'000 Netto-Migration pro Jahr"
      confidence: "high"
    - name: "policy_symmetry"
      value: "true"
      context: "Reversal 2012 kehrte Effekt exakt um"
      confidence: "high"

# === SECTION 5: ENTSCHEIDUNG ★ PFLICHT ===
decision:
  outcome: "accept"

  rationale: |
    1. KAUSALITÄT: Quasi-experimentelles Design mit drei Policy-Shifts
       (2002, 2012, 2015) liefert starke kausale Evidenz.

    2. DIREKT ÜBERTRAGBAR: Dänemark und Schweiz sind strukturell
       ähnlich (klein, reich, Wohlfahrtsstaat, restriktive Debatte).

    3. HMWM-ERWEITERUNG: Quantifiziert Pull-Faktor "Sozialleistungen"
       als Teil von ΔU_F. Elastizität 1.3 ist sehr hoch.

    4. POLICY-RELEVANZ: Warnt vor Race-to-bottom. Koordination nötig.

    5. BEATRIX: Erklärt Teil des Pull-Faktors CH. Schweizer Welfare
       ist attraktiv für Migranten.

  conditions: null
  reviewer_confidence: "high"

