# ============================================================================
# PAPER INTAKE PROTOCOL (PIP) - Naik et al. (2025)
# Impact of social media on cognitive development: A systematic review
# Version: 1.0 - Level 2 STANDARD Integration
# ============================================================================
#
# STATUS: ★★ SYSTEMATIC REVIEW (PRISMA 2020)
# Comprehensive systematic review of 23 studies (n=42,380) examining social
# media effects on cognitive development in children and young adults (9-25).
# Covers attention, memory, executive function, and language development.
#
# ============================================================================

# === SECTION 0: INTEGRATION LEVEL ★ ===
integration_level: 2
integration_level_name: "STANDARD"
integration_rationale: |
  PRISMA 2020 systematic review with PROSPERO registration providing
  comprehensive synthesis of social media effects on cognitive development.

  Valuable for EBF because:
  - Synthesizes 23 studies across 4 cognitive domains
  - Documents mixed effects (negative for attention/memory, positive for language)
  - Identifies platform-specific and usage-intensity moderators
  - Connects to skill formation literature (executive function development)
  - Complements Swider-Cios (younger children) and O'Neill (policy focus)

# === SECTION 1: IDENTIFIKATION ★ PFLICHT ===
paper_id: "PAP-naik2025socialmedia"
intake_id: "PIP-2026-01-30-009"
intake_date: "2026-01-30"
intake_session: "claude/analyze-skills-growth-paper-cZB7b"

bibliographic:
  title: "Impact of social media on cognitive development of children and young adults: a systematic review"
  authors: ["Naik, Vaishnavi Subhash", "Mathias, Edlin Glane", "Krishnan, Priyanka", "Jagannath, Vanitha"]
  year: 2025
  source_type: "journal_article"
