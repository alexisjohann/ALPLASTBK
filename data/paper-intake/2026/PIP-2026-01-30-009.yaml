# === SECTION 7: FOLLOW-UP ===
follow_up:
  actions_required: []

  update_triggers:
    - "If meta-analysis with pooled effect sizes is published"
    - "If longitudinal studies provide causal evidence"
    - "If RCTs on social media interventions are conducted"

# === SECTION 8: KEY FINDINGS ===
key_findings:
  main_contribution: |
    PRISMA 2020 systematic review synthesizing 23 studies (n=42,380) on social
    media effects on cognitive development in children and young adults (9-25 years).
    Reveals domain-specific effects: negative for attention and executive function,
    mixed for memory, positive for language development. Identifies platform type,
    usage intensity, and individual characteristics as key moderators.

  cognitive_domain_summary:
    attention:
      finding: "Social media use impairs attention, especially with multitasking"
      mechanism: "Constant switching between platforms reduces focus"
      severity: "Exacerbates existing ADHD symptoms"

    memory:
      finding: "Mixed effects - excessive use harms, educational use helps"
      mechanism: "Cognitive overload vs educational engagement"
      platform_effects: "Facebook/YouTube can enhance memory via educational content"

    executive_function:
      finding: "Addiction linked to impaired decision-making and impulse control"
      mechanism: "Disruption of prefrontal cortex development"
      mediators: "Emotional disturbance, sleep quality"

    language_development:
      finding: "Positive effects on communication skills and language learning"
      mechanism: "Peer interaction and practice opportunities"
      platform_effects: "Facebook particularly effective for English learning"

  platform_specific_findings:
    facebook:
      positive: ["Memory enhancement", "Language skills", "Communication"]
      negative: ["Addiction", "Impulsive decision-making"]

    tiktok:
      positive: []
      negative: ["Memory loss", "Depression/anxiety mediation"]

    whatsapp:
      positive: []
      negative: ["Working memory impairment"]

    youtube:
      positive: ["Memory enhancement via educational content"]
      negative: []

  research_gaps_identified:
    - "Lack of RCTs for causal inference"
    - "No studies on children under 9 years"
    - "Limited longitudinal data"
    - "Inconsistent measurement of usage duration"
    - "Need for platform-specific intervention studies"

  policy_recommendations:
    - "Researchers should focus on children below 9 years"
    - "Need for RCTs to establish causality"
    - "Policymakers should implement regulations on social media use"
    - "Educational strategies to mitigate negative effects"

  ebf_implications:
    - "Platform type is key moderator (Ψ_M material context dimension)"
    - "Usage intensity shows dose-response relationship"
    - "Individual differences (CORE-WHO) moderate all effects"
    - "Executive function impairment connects to self-control literature"
    - "Educational engagement shows positive complementarity"
    - "Attention dimension (CORE-AWARE) particularly vulnerable"
