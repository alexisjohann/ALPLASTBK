# === SECTION 2: ENTDECKUNGSKONTEXT ===
discovery:
  method: "user_request"
  search_terms: null
  recommended_by: null
  original_context: "User provided full paper text for detailed analysis and integration"

# === SECTION 3: QUALITÄTSBEWERTUNG ===
quality:
  evidence_tier: 2  # SILVER: Peer-reviewed systematic review

  methodology:
    design: "systematic_review"
    guidelines: "PRISMA 2020"
    registration: "PROSPERO CRD42024584402"
    databases_searched:
      - "PubMed (MEDLINE)"
      - "ProQuest"
      - "CINAHL (EBSCO)"
      - "Scopus (Elsevier)"
      - "Web of Science"
      - "EMBASE (Elsevier)"
      - "Cochrane Library"
    search_period: "January 2009 - November 2024"
    studies_included: 23
    total_participants: 42380
    age_range: "9-25 years"
    study_designs_included:
      - "Randomized Controlled Trials (2)"
      - "Non-randomized Controlled Trials (1)"
      - "Cross-sectional studies (18)"
      - "Longitudinal cohort (1)"
      - "Experience Sampling Method (1)"

  quality_assessment:
    tool: "JBI (Joanna Briggs Institute) checklist"
    risk_of_bias_tools:
      - "RoB 2 for RCTs"
      - "ROBINS-I for non-RCTs"
    quality_findings: "Most studies acceptable quality; some limitations in participant selection and data handling"

  geographic_coverage:
    - "China (4 studies)"
    - "India (2 studies)"
    - "United Kingdom (2 studies)"
    - "Netherlands (2 studies)"
    - "United States (6 studies)"
    - "Israel, Malaysia, Sri Lanka, Germany, Austria, Turkey, Saudi Arabia (1 each)"

  limitations:
    - "Heterogeneity in social media types across age groups"
    - "Limited data on usage duration"
    - "Lack of studies on children under 9 years"
    - "Insufficient RCTs for causal inference"
    - "Self-reported measures in most studies"

# === SECTION 4: EBF-INTEGRATION ★ PFLICHT ===
ebf_integration:
  # 10C Relevanz
  core_dimensions:
    - dimension: "CORE-HOW"
      connection: "Platform type and usage intensity moderate cognitive effects (complementarity)"
      strength: "high"
    - dimension: "CORE-WHEN"
      connection: "Age-dependent effects on cognitive development"
      strength: "high"
    - dimension: "CORE-AWARE"
      connection: "Attention as key cognitive domain affected"
      strength: "high"
    - dimension: "CORE-WHO"
      connection: "Individual differences (emotional state, pre-existing conditions) moderate effects"
      strength: "medium"

  # Theorie-Zuordnung
  theory_support:
    primary: "MS-SF-001"  # Technology of Skill Formation
    secondary:
      - "MS-SF-003"  # Dynamic Complementarity
      - "MS-AT-001"  # Attention Theory (if exists)
    creates_new_theory: false

  # Klassifikation für use_for Feld
  use_for:
    - "LIT-DEVELOPMENTAL"
    - "DOMAIN-EDUCATION"
    - "DOMAIN-HEALTH"
    - "CORE-HOW"
    - "CORE-WHEN"
    - "CORE-AWARE"

  # Key concepts
  key_concepts:
    - name: "Media Multitasking Effect"
      definition: "Simultaneous use of multiple social media platforms reduces attention span"
      ebf_relevance: "Cognitive load and attention allocation"

    - name: "Social Media Addiction"
      definition: "Excessive use linked to impaired executive function and decision-making"
      ebf_relevance: "Behavioral addiction and self-control"

    - name: "Platform-Specific Effects"
      definition: "Different platforms (Facebook, TikTok, YouTube) have varying cognitive impacts"
      ebf_relevance: "Context-dependent effects (Ψ_M material dimension)"

    - name: "Cognitive Overload"
      definition: "Continuous engagement with multiple platforms causes overstimulation"
      ebf_relevance: "Cognitive capacity constraints"

    - name: "Educational Engagement Benefits"
      definition: "Certain platforms can enhance memory and language through educational content"
      ebf_relevance: "Positive complementarity between technology and learning"

  # Cognitive Domain Findings
  cognitive_domain_findings:
    attention:
      direction: "negative"
      evidence: "Majority experienced distraction; multitasking impairs attention"
      moderators: ["ADHD symptoms exacerbated", "Platform switching frequency"]
      key_studies: ["Siebers 2023", "Sun & Chao 2024", "Xie 2021"]

    memory:
      direction: "mixed"
      evidence: "Excessive use → poorer short-term/working memory; some platforms enhance memory"
      moderators: ["Platform type", "Educational vs entertainment use"]
      key_studies: ["Frein 2013", "Sha & Dong 2021", "Alloway 2012"]

    executive_function:
      direction: "negative"
      evidence: "Addiction linked to impaired problem-solving, planning, inhibitory control"
      moderators: ["Addiction severity", "Emotional state", "Sleep quality"]
      key_studies: ["Zhang 2023", "Aydin 2020", "Meshi 2019"]

    language_development:
      direction: "positive"
      evidence: "Facebook improved communication skills, writing confidence, English learning"
      moderators: ["Educational purpose", "Peer interaction"]
      key_studies: ["Kabilan 2010"]

  # Platform Usage Statistics
  platform_statistics:
    most_studied: "Facebook (9 studies)"
    emerging_platforms: ["TikTok (1)", "WhatsApp (1)", "Instagram (multiple)"]
    usage_duration:
      - "15 min/hour (Netherlands adolescents)"
      - "60-120 min/day (Indian adolescents)"
      - "1.5 hours/day (US young adults)"

  # Konsistenz mit bestehendem EBF
  consistency:
    supports_ebf: true
    contradicts_ebf: false
    extends_ebf: true
    extension_details: |
      Extends EBF understanding of digital media effects:
      1. Documents domain-specific effects (attention vs language)
      2. Shows platform-specific moderators (Ψ_M dimension)
      3. Identifies individual difference moderators (CORE-WHO)
      4. Connects social media addiction to executive function impairment
      5. Provides evidence for educational technology benefits

# === SECTION 5: ENTSCHEIDUNG ★ PFLICHT ===
decision:
  outcome: "accept"

  rationale: |
    1. Rigorous PRISMA 2020 methodology with PROSPERO registration
    2. Large sample (n=42,380) across diverse geographic contexts
    3. Comprehensive coverage of 4 cognitive domains
    4. Documents both risks and benefits of social media
    5. Identifies key moderators relevant for intervention design
    6. Complements existing EBF papers on screen media (Swider-Cios, O'Neill)

  conditions: null
  reviewer_confidence: "high"  # Well-designed systematic review

