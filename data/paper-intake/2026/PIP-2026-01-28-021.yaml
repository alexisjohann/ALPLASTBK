    - name: "compositional_amenity_concern"
      value: "large"
      context: "Majority of opposition due to compositional preferences"

# === SECTION 5: ENTSCHEIDUNG ★ PFLICHT ===
decision:
  outcome: "accept"

  rationale: |
    1. CARD + DUSTMANN: Kombination von zwei Top-Forschern (beide
       bekommen eigenen LIT-Appendix).

    2. ATTITUDE RESEARCH: Nicht nur economic effects, sondern
       public attitudes. Kritisch für Policy-Kommunikation.

    3. AMENITIES > WAGES: Erklärt warum Lohn-Argumente nicht
       überzeugend sind - es geht nicht um Löhne.

    4. BEATRIX-RELEVANT: Für Migrations-Kommunikation muss man
       verstehen dass "Lohnkonkurrenz" nicht der Haupttreiber ist.

  conditions: null
  reviewer_confidence: "high"

