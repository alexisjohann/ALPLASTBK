# === SECTION 4: EBF-INTEGRATION ★ PFLICHT ===
ebf_integration:
  core_dimensions:
    - dimension: "CORE-WHAT"
      connection: |
        PREFERENCES nicht nur WAGES: Opposition to immigration nicht
        durch Lohnkonkurrenz erklärt. Compositional amenities matter.
        U_amenity distinct from U_wages.
      strength: "high"

    - dimension: "CORE-AWARE"
      connection: |
        Public attitudes vs. economic reality: Gap between perceived
        and actual effects. A(public) ≠ A(economics).
      strength: "high"

    - dimension: "CORE-HOW"
      connection: |
        Wages + Amenities: Both matter for attitudes.
        γ(wage_effect, attitude) < γ(amenity_effect, attitude).
      strength: "high"

  theory_support:
    primary: "MS-LM-001"
    secondary:
