    1. SCIENCE-PUBLIKATION: Höchste wissenschaftliche Autorität.
       Meta-Analyse nur kausaler Studien.

    2. PARADIGMENWECHSEL: Widerlegt "Brain Drain" Narrativ.
       High-skilled Migration ist WIN-WIN (Destination + Origin).

    3. HMWM-RELEVANZ FÜR DRT-TYP: Drittstaaten-Hochqualifizierte
       schaden ihren Herkunftsländern nicht. Schweiz profitiert UND
       Herkunftsland profitiert (Brain Gain Mechanismen).

    4. SWISS CONTEXT: Schweiz hat 56.7% foreign-born researchers.
       Diese kommen aus Ländern die vom Brain Gain profitieren.

    5. POLICY: Empfiehlt KEINE Emigrationsrestriktionen, sondern
       Investitionen in Training-Infrastruktur.

