# === SECTION 4: EBF-INTEGRATION ★ PFLICHT ===
ebf_integration:
  core_dimensions:
    - dimension: "CORE-STAGE"
      connection: |
        PARADIGMENWECHSEL: Migration ist oft TEMPORÄR, nicht permanent.
        Dies ändert alles - Spar-, Investitions-, Integrationsverhalten.
        BEATRIX muss Stage (temporär vs. permanent) als Kontext modellieren.
      strength: "high"

    - dimension: "CORE-WHAT"
      connection: |
        Temporary migrants have different utility functions:
        - Higher savings rate (für Rückkehr)
        - More remittances (Familie zuhause)
        - Different human capital investment (home vs. host country skills)
      strength: "high"

    - dimension: "CORE-READY"
      connection: |
        Return intentions affect behavior NOW. Willingness to integrate
        depends on expected duration. Ψ_return_plan moderiert alles.
      strength: "high"

  theory_support:
    primary: "MS-MG-001"  # Migration Theory
    secondary:
      - "MS-MG-002"
      - "MS-HC-001"  # Human Capital
    creates_new_theory: false

  use_for:
    - "LIT-DUSTMANN"
    - "DOMAIN-MIGRATION"
    - "METHOD-REVIEW"
    - "CORE-STAGE"

  parameters_extracted:
    - name: "return_rate"
      value: "20-50%"
      context: "Share of migrants who eventually return"
    - name: "savings_rate_differential"
      value: "temporary > permanent"
      context: "Temporary migrants save more than permanent migrants"
    - name: "remittance_motive"
      value: "strong_for_temporary"
      context: "Remittances higher when return planned"

  consistency:
    supports_ebf: true
    extends_ebf: true
    extension_details: |
      Fundamentale Erweiterung: Standard-Migration-Modelle nehmen
      permanente Migration an. Dustmann zeigt: Temporäre Migration
      ist die Norm, nicht die Ausnahme. EBF/BEATRIX muss STAGE
      (temporär/permanent) als zentrale Kontextvariable modellieren.

# === SECTION 5: ENTSCHEIDUNG ★ PFLICHT ===
decision:
  outcome: "accept"

  rationale: |
    1. JEL SURVEY: Authoritative review im wichtigsten Survey-Journal.

    2. PARADIGMENWECHSEL FÜR BEATRIX: Ändert wie wir Migration modellieren.
       Nicht "Migranten" als homogene Gruppe, sondern differenziert nach
       Rückkehrabsicht. Kritisch für Schweizer Kontext (Saisonniers, etc.).

    3. PARAMETER-REICH: Liefert Ranges für return rates, savings differentials,
       remittance patterns - direkt nutzbar.

    4. THEORETISCHER RAHMEN: Framework für dynamic optimization of migration
       decisions - integrierbar in EBF Utility-Maximierung.

  conditions: null
  reviewer_confidence: "high"

