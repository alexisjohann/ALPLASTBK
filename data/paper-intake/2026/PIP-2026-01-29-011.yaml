decision:
  outcome: "accept"

  rationale: |
    1. FUNDAMENTALES PAPER für Migranten-Typ-Differenzierung.
       Zeigt empirisch dass verschiedene m-Typen VERSCHIEDENE
       ΔU_fiscal(t) Trajektorien haben.

    2. 20-JAHRES-DATEN: Längste bekannte Panel-Studie zu
       Integrationstrajektorien. Volle Lebenszyklen erfasst.

    3. HMWM v3.0 ERWEITERUNG: Direkte Parameter für alle 6 m-Typen:
       - GRZ/EU_H: Labor migrant trajectory (high, stable)
       - EU_N: Labor migrant trajectory (medium, stable)
       - FAM: Family trajectory (lower, stable)
       - ASY: Refugee trajectory (hump, then reversal)
       - DRT: Varies by skill level

    4. POLICY-RELEVANZ: Erklärt warum kurzfristige vs. langfristige
       Fiskalbetrachtungen unterschiedliche Schlüsse ergeben.

  conditions: null
  reviewer_confidence: "high"

