decision:
  outcome: "accept"

  rationale: |
    1. TOP-JOURNAL + RDD: Review of Economics and Statistics mit
       sauberem Regression Discontinuity Design.

    2. KAUSALITÄT ETABLIERT: Danish 1999 Reform als exogener Schock.
       Flüchtlinge vor/nach 1.1.1999 vergleichbar, nur Policy unterschiedlich.

    3. PERMANENTER EFFEKT: Nicht nur kurzfristig, sondern dauerhaft.
       Wichtig für langfristige Fiskalberechnungen.

    4. MECHANISMUS KLAR: Sprache → komplexere Jobs → höhere Einkommen.
       Konsistent mit Humankapital-Theorie.

    5. HMWM-ERWEITERUNG: Zeigt dass ASY-Trajektorie policy-abhängig ist.
       Interventions-Komponente kann integriert werden.

  conditions: null
  reviewer_confidence: "high"

