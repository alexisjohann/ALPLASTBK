    - paper: "PAP-dustmann2014fiscal"
      relationship: "validates"
      notes: "Dustmann Fiskal UK. Luz: Meta-Analyse bestätigt positiven Trend"

  hmwm_integration:
    component: "Meta-Analytical Validation"
    equation: |
      HMWM_validated = TRUE if:
        1. Meta-effect positive ✓
        2. No publication bias ✓
        3. Heterogeneity explained by characteristics ✓
    parameter_update: |
      meta_confidence_HMWM = HIGH
      publication_bias_concern = NONE
    insight: "HMWM predictions are consistent with meta-analytical evidence"
