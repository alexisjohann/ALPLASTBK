bibliographic:
  title: "Meta-Analysis: The Impact of Immigration on the Economic Performance of the Host Country"
  authors:
    - "Luz, Alexandre"
    - "Neves, Pedro Cunha"
    - "Afonso, Oscar"
    - "Sochirca, Elena"
  year: 2025
  source_type: "journal"
  source: "Economies"
  volume: 13
  issue: 8
  pages: "213"
  doi: "10.3390/economies13080213"
  peer_reviewed: true

quality:
  evidence_tier: 1
  methodology:
    design: "meta_analysis"
    identification: "41 primary studies, 1459 estimates"
    sample_size: "Global, multiple countries"
    causal_claim: true
    meta_analysis: true

  journal_quality:
    field_ranking: "top_field"
    notes: "MDPI Economies - peer-reviewed, open access"

ebf_integration:
  core_dimensions:
    - dimension: "CORE-WHAT"
      connection: |
        POSITIVER GESAMTEFFEKT BESTÄTIGT:
        Meta-Analyse über 41 Studien und 1459 Schätzungen zeigt:
        Immigration hat signifikant POSITIVEN Effekt auf
        wirtschaftliche Performance (Wachstum, Produktivität, Innovation).
      strength: "high"

    - dimension: "CORE-WHO"
      connection: |
        HETEROGENITÄT NACH CHARAKTERISTIKEN:
        Effekt variiert nach:
        - Qualifikation der Immigranten
        - Alter der Immigranten
        - Entwicklungsstand des Gastlandes
        → Unterstützt HMWM Typ-Differenzierung
      strength: "high"

  theory_support:
    primary: "MS-MG-001"
    secondary:
      - "MS-LM-001"
      - "MS-FI-001"
    creates_new_theory: false

  use_for:
    - "LIT-O"
    - "DOMAIN-MIGRATION"
    - "DOMAIN-LABOR"
    - "CORE-WHAT"
    - "parameter"
    - "BEATRIX"

  parameters_extracted:
    - name: "meta_effect_immigration"
      value: "positive_significant"
      context: "Gesamteffekt über 41 Studien"
      confidence: "high"
    - name: "n_studies_meta"
      value: "41"
      context: "Anzahl inkludierter Primärstudien"
      confidence: "high"
    - name: "n_estimates_meta"
      value: "1459"
      context: "Anzahl individueller Schätzungen"
      confidence: "high"
    - name: "publication_bias"
      value: "none_detected"
      context: "Keine Evidenz für Publikationsbias"
      confidence: "high"

decision:
  outcome: "accept"

  rationale: |
    1. ERSTE UMFASSENDE META-ANALYSE: Erweitert frühere Meta-Analysen
       (Longhi et al. 2005, 2008) die nur Lohneffekte betrachteten.
       Diese Studie umfasst Wachstum, Produktivität, Innovation.

    2. ROBUSTHEIT: 41 Studien, 1459 Schätzungen = starke statistische
       Basis. Kein Publikationsbias detektiert.

    3. HMWM VALIDIERUNG:
       - Bestätigt positiven Gesamteffekt
       - Erklärt Heterogenität durch Charakteristiken (→ Typ-Differenzierung)
       - Unterstützt multi-dimensionalen Ansatz (nicht nur Löhne)

    4. BEATRIX: Meta-Evidenz ist stärker als Einzelstudien.
       Kann verwendet werden um skeptische Stakeholder zu überzeugen.

  conditions: null
  reviewer_confidence: "high"

cross_references:
  related_papers_in_ebf:
