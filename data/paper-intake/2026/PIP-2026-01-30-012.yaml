    - name: "Uses and Gratifications Theory"
      definition: "Individuals choose media to fulfill needs, including self-managing mental health"
      ebf_relevance: "Utility maximization perspective on media consumption"

    - name: "Dose-Response Threshold"
      definition: ">4 hours/day harmful; <3 hours/day may have moderate benefits"
      ebf_relevance: "Non-linear treatment effects"

