      source: "Lin (1993)"
      prediction: "Social media displaces health-promoting activities"
      mechanism: "Opportunity cost of time"

    uses_gratifications:
      source: "Quan-Haase and Young (2010)"
      prediction: "People with poor mental health may use social media as coping strategy"
      mechanism: "Utility maximization, self-management"

    goldilocks_hypothesis:
      source: "Przybylski and Weinstein (2017)"
      prediction: "Moderate use optimal, over/under-engagement problematic"
      mechanism: "Balance between social connection and displacement"

