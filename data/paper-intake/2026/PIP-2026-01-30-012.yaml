# === SECTION 0: INTEGRATION LEVEL ★ ===
integration_level: 2
integration_level_name: "STANDARD"
integration_rationale: |
  Peer-reviewed empirical study with rigorous methodology:
  - Individual fixed effects control for time-invariant unobserved heterogeneity
  - Propensity score matching for robustness
  - IPWRA treatment effects estimation
  - Large UK longitudinal sample (Understanding Society)

  Valuable for EBF because:
  - Documents non-linear dose-response (Goldilocks Hypothesis)
  - Identifies threshold effects (>4 hours detrimental, <3 hours moderate benefit)
  - Shows gender, age, SES heterogeneity
  - Uses rigorous causal inference methods
  - Complements Braghieri (US quasi-experiment) with UK longitudinal evidence

