# === SECTION 8: KEY FINDINGS ===
key_findings:
  main_contribution: |
    UK longitudinal study using Understanding Society data to analyze social media
    effects on adolescent well-being. Uses individual fixed effects, propensity score
    matching, and IPWRA. Documents non-linear dose-response relationship supporting
    the Goldilocks Hypothesis: >4 hours/day is harmful, <3 hours/day has moderate
    benefits for peer relationships.

  dose_response_findings:
    high_use:
      threshold: ">4 hours/day"
      effects:
        - "Decreased perception of self-value"
        - "Increased hyperactivity"
        - "Increased inattention"
        - "Increased conduct problems"
      direction: "negative"

    moderate_use:
      threshold: "<3 hours/day"
      effects:
        - "Moderate positive association with peer relationships"
      direction: "positive (moderate)"
      comparison: "vs no use"

  outcome_domains:
    emotional_health:
      finding: "Prolonged use significantly associated with poor emotional health"
      mechanism: "Self-esteem, perception of self-value"

    behavioural_difficulties:
      finding: "Increased hyperactivity, inattention, conduct problems"
      mechanism: "Attention displacement, peer pressure"

    peer_relationships:
      finding: "Limited use (<3h) has moderate positive association"
      mechanism: "Social connection maintenance"

  heterogeneity:
    gender: "Effects documented by gender"
    age: "Effects documented by age"
    ses: "Effects documented by socio-economic background"
    implication: "Identifies most vulnerable groups for policy targeting"

  methodology_strengths:
    - "Individual fixed effects control for time-invariant confounders"
    - "Propensity score matching for robustness"
    - "IPWRA treatment effects"
    - "Sensitivity analyses for unobserved variables"
    - "Longitudinal design (exposure 11-14, outcome 16-20)"

  policy_implications:
    - "Supports guidelines limiting prolonged social media use"
    - "Suggests moderate use may have some benefits"
    - "Identifies vulnerable groups for targeted interventions"
    - "Aligns with 'everything in moderation' principle"

  ebf_implications:
    - "Non-linear complementarity: positive below threshold, negative above"
    - "Goldilocks Hypothesis provides formal framework for optimal dosage"
    - "UK evidence confirms US findings (cross-cultural validation)"
    - "Heterogeneity analysis supports CORE-WHO dimension"
    - "Longitudinal design addresses CORE-WHEN (adolescent sensitive period)"
    - "Multiple outcome domains support CORE-WHAT differentiation"
