      Key extensions to EBF:
      1. Documents non-linear dose-response (Goldilocks threshold)
      2. Shows complementarity can be negative above threshold
      3. Demonstrates heterogeneity by gender, age, SES
      4. UK evidence complements US (Braghieri) findings
      5. Multiple outcome dimensions (emotional, behavioural, peer)

