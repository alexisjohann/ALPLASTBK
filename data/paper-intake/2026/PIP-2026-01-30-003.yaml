# === SECTION 8: KEY INSIGHTS ===
key_insights:
  main_contribution: |
    Develops partial identification approach for inference when experimental
    randomization is imperfect. Uses symmetries in distribution of treatment
    status that persist despite post-randomization reassignment. Controls
    familywise error rate in finite samples.

  imperfect_randomization:
    definition: "Treatment status reassigned after initial randomization based on observed/unobserved characteristics"
    example: |
      Perry Preschool: Families with working mothers unavailable for weekly
      home visits were moved from treatment to control group.
    implications:
      - "Differences in outcomes may be due to imperfections, not treatment"
      - "Need to bound extent of imperfection"
      - "Exploit remaining symmetries for valid inference"

  five_step_randomization:
    step_1: "Younger siblings assigned same status as elder siblings"
    step_2: "Remaining participants ranked by IQ, odd/even groups formed"
    step_3: "Some exchanges to balance gender and SES"
    step_4: "Groups labeled treatment/control with equal probability"
    step_5: "Some participants with working mothers moved to control"

  key_assumptions:
    assumption_3_1: "Potential outcomes ⊥ Treatment | Z, U"
    assumption_3_2: "Equivariance: δ₁(gd,gz) = gδ₁(d,z)"
    assumption_3_3: "Symmetry: hδ₁(d,z) = δ₁(hd,z)"
    assumption_3_4: "Step 5 rule: D_j=0 if originally treated and U_j=1"
    assumption_3_5: "Logic: U_j=0 whenever MW_j=0"

  lemma_4_1:
    description: "Symmetries in distribution of treatment status"
    part_i: "gδ(D̃,Z,U)|Z,U =ᵈ δ(D̃,Z,U)|Z,U for g∈G_{Z,U}"
    part_ii: "hδ(D̃,Z,U)|Z,U =ᵈ δ(D̃,Z,U)|Z,U for h∈H_{Z,U}"
    part_iii: "hgδ(D̃,Z,U)|Z,U =ᵈ δ(D̃,Z,U)|Z,U (combined)"

  testing_procedure:
    single_hypothesis: |
      Test H_L: P ∈ ω_L using critical value
      c̄_L(X_L, 1-α) = max_{u∈U(D,MW)} c_L(X_L, u, 1-α)
      Controls Type I error at level α in finite samples (Theorem 4.1)

    multiple_hypotheses: |
      Romano-Wolf stepdown procedure (Algorithm 4.1):
      - Step j: Test remaining hypotheses using max statistic
      - Reject if T_k > c̄_{L_j}(X_{L_j}, 1-α)
      - Controls FWER in finite samples (Theorem 4.2)

  perry_preschool_results:
    cognition:
      males: "Significant IQ effects at young ages, CAT scores at 14"
      females: "Significant IQ effects, weaker for CAT after Max-U correction"
    schooling:
      males: "No significant effects"
      females: "Significant effects on HS graduation and GPA (Max-U robust)"
    crime:
      males: "Significant effect on non-victimless charges (Max-U robust)"
      females: "Significant effect on total charges (Max-U robust)"
    employment:
      males: "Significant effect on jobless months at 27 (Max-U robust)"
      females: "Significant effects at age 19 (Max-U robust)"

  ebf_implications:
    - "Intervention evaluations should account for randomization imperfections"
    - "Multiple testing correction essential for credibility"
    - "Partial identification bounds treatment effects"
    - "Symmetry-based tests provide finite-sample validity"
    - "Perry Preschool effects robust to methodological scrutiny"
