# === SECTION 0: INTEGRATION LEVEL ★ ===
integration_level: 4
integration_level_name: "THEORY"
integration_rationale: |
  Methodological paper that solves a fundamental problem in causal inference:
  - How to make valid inferences when randomization is imperfect
  - Post-randomization reassignment based on observed AND unobserved characteristics
  - Finite-sample valid inference controlling familywise error rate (FWER)
  - Multiple hypothesis testing with Romano-Wolf stepdown procedure

  Critical for EBF because:
  - Real-world interventions rarely have perfect randomization
  - Connects to P1-P4 framework (treatment effects estimation)
  - Extends Heckman's econometric causality methodology
  - Provides template for Perry Preschool-style evaluations

