# === SECTION 8: KEY FINDINGS ===
key_findings:
  main_contribution: |
    First quasi-experimental causal evidence on social media's impact on mental
    health. Uses staggered Facebook rollout across 775 US colleges (2004-2006)
    with generalized difference-in-differences. Finds 0.085 SD negative effect
    on comprehensive mental health index, approximately 22% of job loss effect.
    Identifies unfavorable social comparisons as primary mechanism.

  identification_strategy:
    design: "Generalized difference-in-differences"
    variation: "College × survey-wave from staggered Facebook introduction"
    assumption: "Parallel trends (validated with event study)"
    robustness: "Four alternative heterogeneity-robust estimators"

  main_results:
    effect_size:
      value: 0.085
      unit: "standard_deviations"
      interpretation: "Increase in index of poor mental health"
      benchmark_job_loss: "22% of effect of losing job"
      benchmark_phq9: "2 pp increase in depression (9% over baseline)"

    heterogeneity:
      by_susceptibility: "Stronger for students with higher predicted susceptibility"
      by_gender: "Suggestive evidence of larger effects for women"
      by_living: "Stronger for off-campus students (social exclusion)"
      by_ses: "Stronger for students with credit card debt"
      by_greek_life: "Stronger for non-fraternity/sorority members"

    dynamics:
      finding: "Effects increase with length of exposure"
      max_exposure: "5 semesters shows ~0.15 SD effect"
      implication: "Not just initial shock; cumulative impact"

  mechanism_evidence:
    supported: "Unfavorable social comparisons"
    evidence:
      - "Larger effects for students likely to compare unfavorably"
      - "Facebook changed beliefs about peers' social lives (drinking)"
      - "Beliefs became more inaccurate (not more accurate)"
      - "No effect on actual drinking behavior"

    not_supported:
      - "Disruptive internet use (null effect)"
      - "Stigma reduction (null effect on missing responses)"
      - "Direct behavioral changes (null on drugs, alcohol, sex)"

  downstream_effects:
    academic_performance:
      finding: "Students reported mental health impaired academics"
      effect: "0.067 SD on index of downstream effects"
      depression_anxiety: "3 pp increase (over 13% baseline)"

  service_utilization:
    finding: "Marginal students took up depression services"
    depression_diagnosis: "+32% for 5-semester exposure"
    therapy: "+50% for 5-semester exposure"
    antidepressants: "+33% for 5-semester exposure"

  policy_implications:
    - "Social media has causal negative effect on mental health"
    - "Effects concentrated among most vulnerable"
    - "Unfavorable social comparisons are key mechanism"
    - "Platform design choices affect user welfare"
    - "Effects persist and grow over time"

  ebf_implications:
    - "Social comparison is powerful channel for utility effects"
    - "Reference group beliefs can be systematically biased"
    - "Platform context (Ψ_M) directly affects mental health"
    - "Heterogeneous effects require CORE-WHO segmentation"
    - "β_FB = 0.085 SD provides benchmark for EBF models"
    - "Complements Aridor (theory), Naik (cognitive), O'Neill (policy)"
