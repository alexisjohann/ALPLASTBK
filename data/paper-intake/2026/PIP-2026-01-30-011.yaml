# === SECTION 3: QUALITÄTSBEWERTUNG ===
quality:
  evidence_tier: 1  # GOLD: Top-5 Journal (AER), quasi-experimental design

  methodology:
    design: "quasi_experimental"
    identification: "generalized_difference_in_differences"
    natural_experiment: "staggered Facebook rollout across US colleges 2004-2006"
    sample_size: 374805  # NCHA survey respondents
    colleges: 775
    causal_claim: true
    estimation_method: "Two-way fixed effects (TWFE) with robust estimators"
    robustness_checks:
      - "Sun and Abraham (2021) estimator"
      - "Callaway and Sant'Anna (2021) estimator"
      - "De Chaisemartin and d'Haultfoeuille (2020) estimator"
      - "Borusyak, Jaravel, and Spiess (2021) estimator"
      - "Parallel trends validation"
      - "Event study figures"

  data_sources:
    - name: "National College Health Assessment (NCHA)"
      waves: 17
      period: "Spring 2000 - Spring 2008"
      provider: "American College Health Association"
    - name: "Facebook expansion dates"
      colleges: 775
      source: "Wayback Machine, prior studies"

  replication:
    status: "full_replication_package"
    data_source: "NCHA (restricted), Facebook dates (public)"
    code_available: true
    doi: "10.3886/E175582V1"

  journal_quality:
    journal: "American Economic Review"
    impact_factor: 12.5  # Approximate
    field_ranking: "top_5"

  limitations:
    - "College students only (ages 18-24)"
    - "Facebook features at 2004-2006 differ from today"
    - "Self-reported mental health outcomes"
    - "Cannot separate direct effects from spillovers"
    - "No individual-level Facebook usage data"

# === SECTION 4: EBF-INTEGRATION ★ PFLICHT ===
ebf_integration:
  # 10C Relevanz
  core_dimensions:
    - dimension: "CORE-WHAT"
      connection: "Social comparison utility - unfavorable comparisons reduce wellbeing"
      strength: "high"
    - dimension: "CORE-WHO"
      connection: "Heterogeneous effects by susceptibility to mental illness"
      strength: "high"
    - dimension: "CORE-WHEN"
      connection: "Context effects - off-campus students more affected (social exclusion)"
      strength: "high"
    - dimension: "CORE-AWARE"
      connection: "Attention to curated peer content creates biased beliefs"
      strength: "high"
    - dimension: "CORE-HOW"
      connection: "Social media exposure complements existing susceptibility"
      strength: "medium"

  # Theorie-Zuordnung
  theory_support:
    primary: "MS-SC-001"  # Social Comparison Theory
    secondary:
      - "MS-SP-001"  # Social Preferences
      - "MS-RD-001"  # Reference Dependence
      - "MS-IE-001"  # Information Economics (biased beliefs)
    creates_new_theory: false

  # Klassifikation für use_for Feld
  use_for:
    - "LIT-ECONOMICS"
    - "DOMAIN-HEALTH"
    - "DOMAIN-PLATFORM"
    - "METHOD-QUASI-EXPERIMENT"
    - "CORE-WHAT"
    - "CORE-WHO"
    - "CORE-WHEN"
    - "CORE-AWARE"

  # Parameter-Extraktion
  parameters_extracted:
    - name: "Facebook Effect on Mental Health Index"
      symbol: "β_FB"
      value: 0.085
      unit: "standard_deviations"
      se: 0.033
      context: "Preferred specification with college FE"
      interpretation: "Negative effect on mental health"

    - name: "Facebook Effect with Group Trends"
      symbol: "β_FB_trends"
      value: 0.077
      unit: "standard_deviations"
      se: 0.032
      context: "With expansion-group linear time trends"

    - name: "Effect as Share of Job Loss Effect"
      value: 0.22
      unit: "proportion"
      context: "Relative to meta-analysis by Paul and Moser (2009)"

    - name: "Effect on Depression (PHQ-9 equivalent)"
      value: 0.02
      unit: "percentage_points"
      context: "Increase in share with depression over 25% baseline"

    - name: "Share of Depression Increase Explained"
      value: 0.24
      unit: "proportion"
      context: "Fraction of 2000-2019 increase explained by Facebook"

    - name: "Facebook Penetration Rate"
      value: 0.85
      unit: "proportion"
      context: "Average across colleges with access"

  # Key concepts
  key_concepts:
    - name: "Unfavorable Social Comparisons"
      definition: "Comparing oneself unfavorably to curated peer content on social media"
      ebf_relevance: "Reference dependence and relative utility"

    - name: "Staggered Rollout Natural Experiment"
      definition: "Facebook's sequential expansion across colleges provides quasi-random variation"
      ebf_relevance: "Causal identification strategy"

    - name: "Index of Poor Mental Health"
      definition: "Standardized aggregate of depression symptoms, other conditions, and service use"
      ebf_relevance: "Comprehensive mental health measurement"

    - name: "Predicted Susceptibility to Mental Illness"
      definition: "LASSO-predicted probability based on immutable characteristics"
      ebf_relevance: "Heterogeneity analysis"

    - name: "General Equilibrium Effects"
      definition: "Effects capturing both direct use and peer spillovers"
      ebf_relevance: "Network externalities in social media"

  # Konsistenz mit bestehendem EBF
  consistency:
    supports_ebf: true
    contradicts_ebf: false
    extends_ebf: true
    extension_details: |
      Major extensions to EBF:
      1. Causal evidence on social comparison effects (not just correlational)
      2. Documents heterogeneous effects by baseline susceptibility
      3. Shows effects on both symptoms AND service utilization
      4. Identifies mechanism (unfavorable comparisons) vs alternatives
      5. Demonstrates downstream effects on academic performance
      6. Provides benchmark: 22% of job loss effect

# === SECTION 5: ENTSCHEIDUNG ★ PFLICHT ===
decision:
  outcome: "accept"

  rationale: |
    1. Top-5 journal (AER) with rigorous quasi-experimental design
    2. First credible causal evidence on social media and mental health
    3. Comprehensive robustness checks (4 alternative estimators)
    4. Clear mechanism identification (social comparisons)
    5. Highly relevant for EBF understanding of digital platform effects
    6. Authors include Ro'ee Levy (also on Aridor JEL paper)
    7. Full replication package available

  conditions: null
  reviewer_confidence: "very_high"

