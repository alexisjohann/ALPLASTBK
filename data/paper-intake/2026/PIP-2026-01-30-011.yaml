# ============================================================================
# PAPER INTAKE PROTOCOL (PIP) - Braghieri, Levy & Makarin (2022)
# Social Media and Mental Health
# Version: 1.0 - Level 4 THEORY Integration
# ============================================================================
#
# STATUS: ★★★★ QUASI-EXPERIMENTAL CAUSAL EVIDENCE
# First rigorous causal evidence on social media's impact on mental health using
# staggered rollout of Facebook across US colleges (2004-2006) as natural
# experiment. Generalized difference-in-differences design.
#
# ============================================================================

# === SECTION 0: INTEGRATION LEVEL ★ ===
integration_level: 4
integration_level_name: "THEORY"
integration_rationale: |
  Landmark quasi-experimental study providing causal evidence on social media
  and mental health. Published in AER (Top-5 journal).

  Critical for EBF because:
  - First credible causal estimates of social media on mental health
  - Identifies unfavorable social comparisons as key mechanism
  - Documents 0.085 SD negative effect on mental health index
  - Shows effects on depression diagnoses, therapy uptake, antidepressants
  - Demonstrates downstream effects on academic performance
  - Natural experiment design with parallel trends validation

