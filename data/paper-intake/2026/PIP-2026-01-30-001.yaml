# === SECTION 9: EBF FOUNDATIONAL MAPPING ===
ebf_foundational_mapping:
  structural_parameters:
    description: "EBF parameters are structural (policy-invariant), not treatment effects"
    examples:
      - "λ (loss aversion) - deep preference parameter"
      - "β (discount factor) - time preference parameter"
      - "γ (complementarity) - interaction parameter"
    justification: "Only structural parameters allow P3 (forecast) and P4 (new policy) analysis"

  context_as_mechanism_fixing:
    description: "EBF context dimensions Ψ correspond to which mechanisms are held fixed"
    mapping:
      Ψ_I: "Institutional mechanisms (rules, defaults)"
      Ψ_S: "Social mechanisms (norms, peer effects)"
      Ψ_C: "Cognitive mechanisms (attention, processing)"
      Ψ_K: "Cultural mechanisms (values, beliefs)"
      Ψ_E: "Economic mechanisms (resources, constraints)"
      Ψ_T: "Temporal mechanisms (timing, deadlines)"
      Ψ_M: "Material mechanisms (tools, infrastructure)"
      Ψ_F: "Physical mechanisms (location, environment)"

  intervention_evaluation:
    framework: "P1-P4 Policy Questions"
    application:
      P1: "Did the nudge work for participants? (TT)"
      P2: "Would it work for non-participants? (TUT)"
      P3: "Will it work in a different context? (External validity)"
      P4: "Can we design novel interventions? (Structural model required)"

  thought_experiment_basis:
    description: "EBF model-building is based on thought experiments"
    connection_to_10C:
      - "10C questions define the thought experiment space"
      - "Each 10C dimension specifies a mechanism to be fixed or varied"
      - "Model selection = choosing which mechanisms to fix"

# === SECTION 8: KEY INSIGHTS (EXTENDED) ===
key_insights:
  main_contribution: |
    The paper establishes thought experiments as the foundation of econometric causality,
    distinguishing it from purely statistical approaches (Neyman-Rubin, Pearl's Do-Calculus).

  three_frameworks_comparison:
    econometric:
      basis: "Thought experiments with hypothetical worlds"
      origin: "Frisch (1930s), Haavelmo (1940s)"
      key_operation: "Fixing mechanisms"
      strength: "Can answer all four policy questions (P1-P4)"
      weakness: "Requires stronger structural assumptions"

    neyman_rubin:
      basis: "Potential outcomes from randomized experiments"
      origin: "Neyman (1923), Rubin (1974)"
      key_operation: "Switching treatment status"
      strength: "Clear identification in experiments"
      weakness: "Cannot answer P3, P4 without additional structure"

    pearl_do_calculus:
      basis: "Directed Acyclic Graphs (DAGs)"
      origin: "Pearl (2000)"
      key_operation: "do() operator"
      strength: "Visual representation of causal structure"
      weakness: "Nonparametric; limited for forecasting new policies"

  four_policy_questions:
    P1:
      name: "Treatment on Treated (TT)"
      formula: "E[Y1 - Y0 | D = 1]"
      description: "Effect for those who actually received treatment"
    P2:
      name: "Treatment on Untreated (TUT)"
      formula: "E[Y1 - Y0 | D = 0]"
      description: "Effect for those who did not receive treatment"
    P3:
      name: "Policy Forecast"
      formula: "Effect of implementing existing policy in new environment"
      description: "Extrapolation to new contexts"
    P4:
      name: "New Policy Effects"
      formula: "Effect of policies never previously implemented"
      description: "Requires full structural model"

  three_tasks_table:
    task_1:
      name: "Defining Hypotheticals"
      description: "Precisely specify the thought experiment"
      requirement: "A priori theory"
    task_2:
      name: "Identifying from Data"
      description: "Map hypotheticals to observable data"
      requirement: "Identification assumptions"
    task_3:
      name: "Estimating"
      description: "Statistical estimation"
      requirement: "Estimation theory"

  generalized_roy_model:
    equations:
      outcome: "Y = D * Y_1 + (1-D) * Y_0"
      selection: "D = 1[V > 0]"
      potential_outcomes:
        Y_1: "mu_1(X) + U_1"
        Y_0: "mu_0(X) + U_0"
      choice_index: "V = mu_V(Z) - epsilon"
    identification_strategies:
      - "Instrumental Variables (Z affects D but not Y directly)"
      - "Matching on observables (selection on X)"
      - "Control functions (model selection process)"
      - "Panel data (fixed effects)"

  ebf_implications:
    - "EBF interventions should be evaluated using P1-P4 framework"
    - "Parameters like lambda (loss aversion) are structural, not treatment effects"
    - "Context-dependence (Psi) corresponds to fixing different mechanisms"
    - "External validity requires understanding which mechanisms are fixed"
