# === SECTION 4: EBF-INTEGRATION ★ PFLICHT ===
ebf_integration:
  integration_level: 5
  integration_score: 30

  core_dimensions:
    - dimension: "CORE-HOW"
      connection: "Complementarity between technology direction, power structures, and prosperity outcomes. Productivity bandwagon = conditional complementarity."
      strength: "high"

    - dimension: "CORE-WHEN"
      connection: "Context (Ψ) determines whether technology leads to shared prosperity or elite capture. Historical context as central explanans."
      strength: "high"

    - dimension: "CORE-WHO"
      connection: "Power asymmetries determine who benefits from technology. Countervailing powers framework."
      strength: "high"

    - dimension: "CORE-WHAT"
      connection: "Utility dimensions affected by technology: financial (wages), identity (worker dignity), social (collective action)."
      strength: "medium"

    - dimension: "CORE-AWARE"
      connection: "Vision/narrative framework: dominant narratives shape awareness of technology's potential directions."
      strength: "medium"

    - dimension: "CORE-HIERARCHY"
      connection: "Multi-level analysis: individual workers → firms → industries → nations → global order."
      strength: "medium"

    - dimension: "CORE-STAGE"
      connection: "Technology adoption follows stages: invention → direction choice → implementation → distributional outcome."
      strength: "medium"

  theory_support:
    primary: null  # Creates NEW theory category
    secondary:
      - "MS-IN-001"  # Institutional Economics (Acemoglu & Robinson)
      - "MS-GR-001"  # Endogenous Growth (Romer)
      - "MS-TE-001"  # Task-based model (Acemoglu & Restrepo)
    creates_new_theory: true
    new_category: "CAT-28"
    new_category_name: "Technology, Power & Institutional Direction"

  use_for:
    - "LIT-ACEMOGLU"
    - "CORE-HOW"
    - "CORE-WHEN"
    - "CORE-WHO"
    - "CORE-AWARE"
    - "DOMAIN-INNOVATION"
    - "DOMAIN-PLATFORM"
    - "DOMAIN-DEVELOPMENT"

  parameters_extracted:
    - name: "bandwagon_strength"
      value: "conditional on technology direction (0 for so-so automation, positive for task-creating tech)"
      context: "Framework only - no point estimate"
      estimation_status: "FRAMEWORK ONLY"

    - name: "countervailing_power_threshold"
      value: "qualitative - requires organized labor, democratic institutions, regulatory capacity"
      context: "Framework only"
      estimation_status: "FRAMEWORK ONLY"

    - name: "vision_persuasion_multiplier"
      value: "dominant narratives amplify or dampen technology direction effects"
      context: "Framework only - informed by Ch.3 historical analysis"
      estimation_status: "FRAMEWORK ONLY"

  consistency:
    supports_ebf: true
    contradicts_ebf: false
    extends_ebf: true
    contradiction_details: null
    extension_details: |
      Power and Progress directly supports EBF's core thesis:
      1. Context (Ψ) determines behavioral parameters - technology outcomes are
         NOT fixed but depend on institutional/power context
      2. Complementarity: technology × institutions × power → outcome
      3. Vision/narrative = awareness dimension in EBF
      4. "Productivity bandwagon" = conditional complementarity (γ ≠ 0 only
         when countervailing powers exist)

