decision:
  outcome: "accept"

  rationale: |
    1. GOLD-STANDARD RCT: Randomisierte Zuweisung zu Gemeinden.
       Höchste interne Validität möglich.

    2. MASSIVER EFFEKT: Verdoppelung der Beschäftigung (30% vs 15%).
       Sehr große, policy-relevante Effektgröße.

    3. INTENSITÄT MATTERS: 160 Stunden mehr Sprachtraining
       macht entscheidenden Unterschied.

    4. HMWM INTEGRATION:
       - ASY-Trajektorie ist nicht deterministisch
       - Frühe intensive Intervention kann Reversal verhindern
       - Cost-Benefit: Höhere initiale Kosten, aber bessere Outcomes

    5. BEATRIX: Direkte Policy-Empfehlung für Schweiz.
       Intensives frühes Integrationsprogramm nach schwedischem Vorbild.

  conditions: null
  reviewer_confidence: "high"

