# === SECTION 4: EBF-INTEGRATION ★ PFLICHT ===
ebf_integration:
  core_dimensions:
    - dimension: "CORE-HOW"
      connection: |
        ZENTRAL FÜR BEATRIX: Zeigt Komplementarität zwischen Migranten und Natives
        entlang der Lohnverteilung. γ(Migrant, Native_low) < 0, γ(Migrant, Native_high) > 0.
        Imperfekte Substituierbarkeit ist der Schlüssel.
      strength: "high"

    - dimension: "CORE-WHO"
      connection: |
        Differenziert Welfare-Effekte nach Lohnposition: Low-wage Natives leicht
        negativ betroffen, Middle/High earners profitieren. WHO matters für Policy.
      strength: "high"

    - dimension: "CORE-WHERE"
      connection: |
        Liefert Parameter für UK-Kontext: wage_effect_low_skill = -0.6%,
        wage_effect_median = +0.6%. Direkt nutzbar für BCM2.
      strength: "high"

    - dimension: "CORE-WHEN"
      connection: |
        Zeigt dass Kontext (Skill-Level, Position in Verteilung) den Effekt
        bestimmt. Ψ_economic moderiert Immigration-Impact.
      strength: "medium"

  theory_support:
    primary: "MS-LM-001"  # Labor Market Theory
    secondary:
      - "MS-LM-002"  # Skill Complementarity
    creates_new_theory: false

  use_for:
    - "LIT-DUSTMANN"
    - "DOMAIN-LABOR"
    - "CORE-HOW"
    - "parameter"

  parameters_extracted:
    - name: "wage_effect_low_skill"
      value: "-0.6%"
      context: "Immigration effect on low-skill native wages, UK 1997-2005"
    - name: "wage_effect_median"
      value: "+0.6%"
      context: "Immigration effect on median native wages, UK 1997-2005"
    - name: "complementarity_native_immigrant"
      value: "imperfect_substitutes"
      context: "Degree of substitutability varies by skill level"

  consistency:
    supports_ebf: true
    contradicts_ebf: false
    extends_ebf: true
    contradiction_details: null
    extension_details: |
      Erweitert EBF um distributional analysis: Nicht nur Durchschnittseffekte,
      sondern heterogene Effekte entlang der Verteilung. Wichtig für
      segmentierte Interventions-Empfehlungen.

# === SECTION 5: ENTSCHEIDUNG ★ PFLICHT ===
decision:
  outcome: "accept"

  rationale: |
    1. TOP-5 JOURNAL: Review of Economic Studies ist eines der fünf
       prestigeträchtigsten Journals in Economics.

    2. METHODISCHE QUALITÄT: IV-Ansatz mit spatial variation, robuste
       Identifikation der kausalen Effekte.

    3. BEATRIX-RELEVANZ HOCH: Zeigt wie Komplementarität (γ) zwischen
       Gruppen variiert. Direkt anwendbar auf Schweizer Migrationspolitik.

    4. PARAMETER-WERT: Liefert konkrete Schätzungen für wage effects,
       nutzbar in BCM2 und Policy-Simulationen.

    5. REPLIZIERT: Methodik wurde in zahlreichen Folgestudien angewendet,
       Ergebnisse sind robust.

