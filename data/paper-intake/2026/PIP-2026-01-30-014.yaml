# === SECTION 8: KEY FINDINGS ===
key_findings:
  main_contribution: |
    First rigorous causal estimation of media effects on voting behavior using
    the staggered introduction of Fox News across US cable markets (1996-2000).
    Introduces the "persuasion rate" methodology that becomes standard in media
    economics. Finds Fox News convinced 3-28% of its viewers to vote Republican,
    accounting for 0.4-0.7 percentage points in the 2000 presidential election.

  research_design:
    setting: "US cable television markets"
    natural_experiment: "Fox News channel introduced 1996, expanded to 20% of households by 2000"
    identification: |
      - Availability determined by cable system capacity and channel positioning
      - Channel position affects viewership (lower position = more viewers)
      - Towns without Fox News serve as control group
    sample: "9,256 towns in 28 states with Nielsen data"
    outcome: "Change in Republican vote share 1996-2000"

  main_results:
    fox_news_effect_on_vote:
      estimate: "0.4 to 0.7 percentage points"
      interpretation: "Fox News availability increases Republican presidential vote"
      significance: "p < 0.05"
      robustness: "Consistent across OLS and IV specifications"

    persuasion_rate:
      estimate_range: "0.03 to 0.28"
      preferred_estimate: "0.11 to 0.28 (IV)"
      interpretation: "3-28% of Fox News viewers persuaded to vote Republican"
      benchmark: "Within range of lab estimates (Gerber et al. 2004)"

    senate_elections:
      estimate: "0.6 percentage points"
      significance: "Statistically significant"

    turnout:
      estimate: "Not significant"
      interpretation: "Fox News persuades rather than mobilizes"

  heterogeneity:
    by_prior_beliefs:
      finding: "Effects strongest where Republicans initially weak"
      implication: "Persuasion of moderates/independents, not base mobilization"

    by_viewership:
      finding: "Effects scale with local viewership rates"
      implication: "Dose-response relationship confirmed"

  methodology_contribution:
    persuasion_rate_formula: |
      f = (y_T - y_C) / (e_T - e_C × c)

      where:
      - y_T, y_C = outcome in treatment/control
      - e_T, e_C = exposure rates
      - c = compliance rate (fraction who watch when available)

      Interpretation: Fraction of exposed audience whose behavior changed

    identification_assumptions:
      - "Fox News availability uncorrelated with unobserved voting trends"
      - "No spillover effects to non-Fox News towns"
      - "Parallel trends in absence of treatment"

  policy_implications:
    - "Media ownership regulation has electoral consequences"
    - "Biased media can shift aggregate voting outcomes"
    - "Information environment affects democratic outcomes"
    - "Persuasion effects are substantial and policy-relevant"

  ebf_implications:
    - "CORE-AWARE: Media exposure shapes political awareness"
    - "CORE-HOW: Persuasion rate captures media-behavior relationship"
    - "CORE-WHO: Heterogeneity by prior beliefs (confirmation vs persuasion)"
    - "METHOD-PARAM: Persuasion rate f is extractable parameter"
    - "Foundational for social media research methodology"

  parameters_extracted:
    - name: "Fox News Persuasion Rate"
      symbol: "f_FoxNews"
      value_range: [0.03, 0.28]
      preferred: 0.15
      unit: "fraction"
      context: "US 2000 presidential election"
      source: "Table VI"

    - name: "Fox News Vote Effect"
      symbol: "β_FoxNews"
      value: 0.004
      unit: "percentage_points"
      se: 0.002
      context: "Republican presidential vote share"
      source: "Table III"

    - name: "Fox News Viewership Compliance"
      symbol: "c_FoxNews"
      value: 0.15
      unit: "fraction"
      context: "Fraction of available audience watching"
      source: "Section III"

# === SECTION 9: CASE REGISTRY ENTRY ===
case_registry_entry:
  case_id: "CAS-MED-001"
  title: "Fox News Introduction and US Voting Behavior"
  domain: "media_political"
  country: "United States"
  year_start: 1996
  year_end: 2000

  ten_c_mapping:
    WHO: "US voters in cable markets (N~millions)"
    WHAT: "Voting behavior (Republican vs Democrat)"
    HOW: "Media persuasion via biased news exposure"
    WHEN: "1996-2000 (Fox News expansion period)"
    WHERE: "Natural experiment via staggered rollout"
    AWARE: "Political awareness shaped by news consumption"

  formulas:
    persuasion_rate: "f = (y_T - y_C) / (e_T - e_C)"
    vote_effect: "ΔRepVote = β × FoxAvailable + γX + ε"

  references:
    - "dellavigna2007fox"
    - "gentzkow2006media"
    - "mullainathan2005market"

  insight: |
    Fox News persuaded 3-28% of its viewers to vote Republican in 2000,
    contributing 0.4-0.7 percentage points to the Republican vote share.
    This demonstrates that media bias has causal effects on voting behavior.

  implication: |
    Media slant affects electoral outcomes through persuasion of marginal
    voters. The persuasion rate methodology provides a framework for
    quantifying these effects across different media contexts.
