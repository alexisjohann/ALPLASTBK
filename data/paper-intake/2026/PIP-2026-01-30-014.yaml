    supports_ebf: true
    contradicts_ebf: false
    extends_ebf: true
    extension_details: |
      Key extensions to EBF:
      1. Introduces persuasion rate parameter extraction methodology
      2. Shows media effects are causal (not just correlation)
      3. Quantifies heterogeneity by prior political affiliation
      4. Creates framework adopted for social media research
      5. Distinguishes availability, exposure, and persuasion

