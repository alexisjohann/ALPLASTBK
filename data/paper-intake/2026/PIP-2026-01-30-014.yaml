    - "METHOD-IV"
    - "METHOD-PARAM"

  # Key concepts
  key_concepts:
    - name: "Persuasion Rate"
      definition: "Fraction of audience persuaded by media exposure: f = (y_T - y_C) / (e_T - e_C)"
      ebf_relevance: "Standard methodology for media effect estimation"

    - name: "Fox News Effect"
      definition: "Causal impact of Fox News availability on Republican vote share"
      ebf_relevance: "Demonstrates media can shift political behavior"

    - name: "Compliance Rate"
      definition: "Fraction of available audience that actually watches Fox News"
      ebf_relevance: "Distinguishes availability from actual exposure"

    - name: "Slant"
      definition: "Ideological position of media outlet relative to alternatives"
      ebf_relevance: "Measures deviation from neutral benchmark"

  # Theoretical frameworks from paper
  theoretical_frameworks:
    bayesian_persuasion:
      source: "Becker (1965), Mullainathan & Shleifer (2005)"
      prediction: "Rational viewers update beliefs based on news slant"
      mechanism: "Information extraction from biased source"

    psychological_persuasion:
      source: "McGuire (1985)"
      prediction: "Exposure affects attitudes through peripheral processing"
      mechanism: "Repeated exposure, emotional appeals"

    selective_exposure:
      source: "Lazarsfeld (1948)"
      prediction: "Viewers self-select into like-minded media"
      mechanism: "Confirmation bias, identity-protective cognition"

  # Konsistenz mit bestehendem EBF
