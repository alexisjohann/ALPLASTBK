    secondary:
      - "MS-BA-001"  # Bayesian Updating
      - "MS-CF-001"  # Confirmation Bias
      - "MS-SC-001"  # Social Comparison
    creates_new_theory: true
    new_theory_details: |
      Creates "Persuasion Rate" methodology (f):
      f = (y_T - y_C) / (e_T - e_C)
      where y = outcome, e = exposure

      This becomes standard for media effects estimation,
      adopted by Enikolopov & Petrova (2015), Yanagizawa-Drott (2014),
      Martin & Yurukoglu (2017), and the social media literature.

