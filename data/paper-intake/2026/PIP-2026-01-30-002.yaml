# === SECTION 8: KEY INSIGHTS ===
key_insights:
  main_contribution: |
    Demonstrates that skills do not evolve as higher levels of fixed abilities.
    New skills EMERGE with development - they are qualitatively different.
    Standard psychometric scales distort measurement of both levels and growth.

  fundamental_problem:
    description: "No constant-unit measure of cognition/language valid across ages"
    implications:
      - "Test scores are ordinal, not cardinal"
      - "Different normalizations generate different rankings"
      - "Value-added measures are meaningless without common scale"
      - "Fadeout may be artifact of measurement, not real decline"

  technology_of_skill_formation:
    equation: "K(a+1) = f(a)(K(a), I(a))"
    components:
      K: "Vector of skills at age a"
      I: "Investment at age a (parenting, schools, etc.)"
      f: "Age-specific production function"

  dynamic_complementarity:
    definition: "Investment at age a raises productivity of later investment"
    formula: "∂²K(a+j+1)/∂I(a)∂I'(a+j) > 0"
    key_insight: "Does NOT require common scale assumption"

  scale_free_test:
    method: "Time to first mastery within difficulty levels"
    data: "China REACH home-visiting program"
    result: "Children with early investment learn faster at later levels"

  fadeout_explanation:
    mechanism: "New skills emerge at each level"
    implication: "Comparing different skills over time is not meaningful"
    pattern: "Rise, decline, recovery within levels"

  uhp_levels:
    description: "Uzgiris-Hunt-Palmer difficulty levels"
    language_levels: 11
    structure: "Skills within levels are essentially identical"
    key_insight: "No hierarchy within levels, only across levels"

  ebf_implications:
    - "EBF parameters (λ, β, γ) should not assume cardinal scales"
    - "LLMMC priors should account for ordinal nature"
    - "Complementarity can be estimated without psychometric fiat"
    - "Fadeout in intervention evaluation may be measurement artifact"
    - "Age-specific skill emergence supports context-dependence (Ψ)"
