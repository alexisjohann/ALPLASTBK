# ============================================================================
# PAPER INTAKE PROTOCOL (PIP) - TEMPLATE
# Standard-Aufnahmeprotokoll für wissenschaftliche Papers im EBF
# Version: 1.0
# ============================================================================
#
# ANLEITUNG:
# 1. Diese Datei kopieren nach: data/paper-intake/YYYY/PIP-YYYY-MM-DD-NNN.yaml
# 2. Alle PFLICHT-Sections ausfüllen (markiert mit ★)
# 3. Optionale Sections nach Bedarf ausfüllen
# 4. Paper zu bcm_master.bib hinzufügen
# 5. Validieren: python scripts/validate_pip.py <datei>
#
# ============================================================================

# === SECTION 1: IDENTIFIKATION ★ PFLICHT ===
paper_id: "PAP-"  # BibTeX key, Format: PAP-nachname_jahr_kurzwort
intake_id: "PIP-"  # Format: PIP-YYYY-MM-DD-NNN
intake_date: ""    # Format: YYYY-MM-DD
intake_session: "" # EBF Session ID falls vorhanden

bibliographic:
  title: ""
  authors: []      # Liste: ["Nachname, Vorname", "Nachname2, Vorname2"]
  year: null       # Integer
  source_type: ""  # journal | working_paper | book | chapter | thesis | report
  source: ""       # Journal-Name oder Working Paper Serie
  doi: ""          # Falls vorhanden
  peer_reviewed: null  # true | false

# === SECTION 2: ENTDECKUNGSKONTEXT (Optional) ===
discovery:
  method: ""       # search | citation_chase | recommendation | user_request | systematic_review
  search_terms: null
  recommended_by: null
  original_context: ""

# === SECTION 3: QUALITÄTSBEWERTUNG (Optional) ===
quality:
  evidence_tier: null  # 1 = Gold | 2 = Silver | 3 = Bronze

  methodology:
    design: ""         # experimental | observational | theoretical | meta_analysis | survey
    identification: "" # RCT | IV | DiD | RDD | matching | descriptive | theoretical
    sample_size: null
    causal_claim: null # true | false

  replication:
    status: ""         # replicated | partial | failed | not_applicable | unknown
    replications_count: null

  journal_quality:
    impact_factor: null
    field_ranking: ""  # top_5 | top_field | good | acceptable | predatory

  limitations: []      # Liste von Limitationen

# === SECTION 4: EBF-INTEGRATION ★ PFLICHT ===
ebf_integration:
  # 10C Relevanz (mindestens eine Dimension angeben)
  core_dimensions:
    - dimension: ""    # CORE-WHO | CORE-WHAT | CORE-HOW | CORE-WHEN | CORE-WHERE | CORE-AWARE | CORE-READY | CORE-STAGE | CORE-HIERARCHY | CORE-EIT
      connection: ""   # Wie verbindet sich das Paper mit dieser Dimension?
      strength: ""     # high | medium | low

  # Theorie-Zuordnung
  theory_support:
    primary: null      # MS-XX-NNN oder null
    secondary: []      # Liste von MS-XX-NNN
    creates_new_theory: false

  # Klassifikation für use_for Feld
  use_for: []          # z.B. ["LIT-O", "CORE-HOW", "DOMAIN-FINANCE"]

  # Parameter-Extraktion (falls Paper Parameter liefert)
  parameters_extracted: []
  # Format pro Parameter:
  # - name: ""
  #   value: ""
  #   context: ""

  # Konsistenz mit bestehendem EBF
  consistency:
    supports_ebf: null      # true | false
    contradicts_ebf: null   # true | false
    extends_ebf: null       # true | false
    contradiction_details: null
    extension_details: null

# === SECTION 5: ENTSCHEIDUNG ★ PFLICHT ===
decision:
  outcome: ""              # accept | reject | conditional | defer

  rationale: ""            # Begründung (1-5 Punkte)

  conditions: null         # Falls outcome = conditional

  reviewer_confidence: ""  # low | medium | high

# === SECTION 6: CROSS-REFERENCES (Optional) ===
cross_references:
  related_papers_in_ebf: []
  # Format:
  # - paper: "PAP-..."
  #   relationship: complementary | contradictory | extends | foundational

  appendices_affected: []
  # Format:
  # - code: "XX"
  #   action: update_required | reference_add | none_required

  chapters_relevant: []
  # Format:
  # - chapter: 5
  #   section: ""

  concept_registry:
    entry_created: false
    concept_id: null

# === SECTION 7: FOLLOW-UP (Optional) ===
follow_up:
  actions_required: []
  # Format:
  # - action: ""
  #   deadline: "YYYY-MM-DD"
  #   status: pending | completed | cancelled

  update_triggers: []
  # Liste von Bedingungen die ein Update auslösen
