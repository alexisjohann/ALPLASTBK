# ==============================================================================
# EBF TO JEL REVERSE MAPPING
# ==============================================================================
# Lookup: Given EBF dimension/domain, which JEL codes are relevant?

ebf_to_jel:
  # By 10C Dimension
  by_10C:
    WHO:
      primary: [D03, J15, Z13]
      secondary: [C91, C92, D10, J71, M50]
      description: "Who has utility? Identity, demographics, segments"

    WHAT:
      primary: [D01, D03, D11, I31]
      secondary: [D81, G41, I12, J22]
      description: "What is utility? Preferences, FEPSDE dimensions"

    HOW:
      primary: [D03, D85, C92]
      secondary: [D72, D74, G41, Z13]
      description: "How do factors interact? Complementarity, mechanisms"

    WHEN:
      primary: [N44, Z12, Z13]
      secondary: [D72, N34, O12]
      description: "When does context matter? Historical, cultural, situational"

    WHERE:
      primary: [C93, N44]
      secondary: [O12, R10]
      description: "Where do parameters come from? Data sources, geography"

    AWARE:
      primary: [D83, D84, G53]
      secondary: [D82, I21]
      description: "How aware? Information, beliefs, learning"

    READY:
      primary: [D14, D91, G51]
      secondary: [D84, I12]
      description: "How ready to act? Willingness, preparation"

    STAGE:
      primary: [D15, D91, I12]
      secondary: [D14, J22, O15]
      description: "Where in journey? Lifecycle, stages, transitions"

  # By Domain
  by_domain:
    behavioral_economics:
      primary: [D03, D81, D91]
      secondary: [D83, G41, I12]

    political_economy:
      primary: [D72, N44]
      secondary: [D74, H10, K00]

    social_preferences:
      primary: [C92, D03, Z13]
      secondary: [D64, D71]

    household_finance:
      primary: [D14, G51, G53]
      secondary: [D15, D91, E21]

    health_behavior:
      primary: [I12, D03]
      secondary: [D91, I10]

    historical_persistence:
      primary: [N44, N34, Z13]
      secondary: [N33, O15]

    cultural_economics:
      primary: [Z12, Z13]
      secondary: [N30, O15]

