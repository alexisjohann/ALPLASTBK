# ==============================================================================
# JEL CODE REGISTRY - Mapping to EBF Framework
# ==============================================================================
#
# Purpose: Maps JEL (Journal of Economic Literature) classification codes
#          to EBF 10C dimensions, theory catalog categories, and domains
#
# Usage:
#   - Add jel_codes field to BibTeX entries in bcm_master.bib
#   - Use for paper search and classification
#   - Enables JEL-based retrieval of EBF-relevant literature
#
# Structure:
#   - categories: Top-level JEL categories (A-Z)
#   - codes: Individual JEL codes with EBF mappings
#   - ebf_mappings: Reverse lookup from EBF to JEL
#
# Version: 1.0
# Created: 2026-01-28
# ==============================================================================

metadata:
  version: "1.0"
  created: "2026-01-28"
  description: "JEL Classification Code Registry with EBF Framework Mapping"
  source: "American Economic Association JEL Classification System"
  url: "https://www.aeaweb.org/jel/guide/jel.php"

# ==============================================================================
# TOP-LEVEL CATEGORIES
# ==============================================================================

categories:
  A:
    name: "General Economics and Teaching"
    ebf_relevance: low
    primary_10C: []

  B:
    name: "History of Economic Thought, Methodology, and Heterodox Approaches"
    ebf_relevance: medium
    primary_10C: [WHAT]
    notes: "Methodological foundations relevant for EBF epistemology"

  C:
    name: "Mathematical and Quantitative Methods"
    ebf_relevance: high
    primary_10C: [WHERE, HOW]
    notes: "Econometric methods, experimental economics, game theory"

  D:
    name: "Microeconomics"
    ebf_relevance: very_high
    primary_10C: [WHO, WHAT, HOW, AWARE, READY]
    notes: "CORE category for behavioral economics - decision theory, preferences, information"

  E:
    name: "Macroeconomics and Monetary Economics"
    ebf_relevance: medium
    primary_10C: [WHEN, WHERE]
    notes: "Macro context factors, business cycles"

  F:
    name: "International Economics"
    ebf_relevance: medium
    primary_10C: [WHEN, WHERE]
    notes: "Cross-country context differences"

  G:
    name: "Financial Economics"
    ebf_relevance: high
    primary_10C: [WHAT, HOW, AWARE, READY]
    notes: "Behavioral finance, household finance, financial decision-making"

  H:
    name: "Public Economics"
    ebf_relevance: high
    primary_10C: [WHEN, HOW]
    notes: "Tax behavior, public goods, nudges in public policy"

  I:
    name: "Health, Education, and Welfare"
    ebf_relevance: very_high
    primary_10C: [WHAT, AWARE, READY, STAGE]
    notes: "Health behavior, education decisions, welfare and wellbeing"

  J:
    name: "Labor and Demographic Economics"
    ebf_relevance: high
    primary_10C: [WHO, WHAT, STAGE]
    notes: "Labor supply, demographics, discrimination, family economics"

  K:
    name: "Law and Economics"
    ebf_relevance: medium
    primary_10C: [WHEN, HOW]
    notes: "Legal institutions, regulation, property rights"

  L:
    name: "Industrial Organization"
    ebf_relevance: medium
    primary_10C: [HOW, WHEN]
    notes: "Firm behavior, market structure, competition"

  M:
    name: "Business Administration and Business Economics"
    ebf_relevance: high
    primary_10C: [WHO, WHAT, HOW]
    notes: "Organizational behavior, marketing, personnel economics"

  N:
    name: "Economic History"
    ebf_relevance: high
    primary_10C: [WHEN, WHERE]
    notes: "Historical context (Ψ_historical), persistence studies"

  O:
    name: "Economic Development, Innovation, Technological Change, and Growth"
    ebf_relevance: medium
    primary_10C: [WHEN, WHERE, STAGE]
    notes: "Development economics, technology adoption"

  P:
    name: "Economic Systems"
    ebf_relevance: low
    primary_10C: [WHEN]
    notes: "Comparative systems"

  Q:
    name: "Agricultural and Natural Resource Economics"
    ebf_relevance: medium
    primary_10C: [WHAT, WHEN]
    notes: "Environmental behavior, sustainability decisions"

  R:
    name: "Urban, Rural, Regional, Real Estate, and Transportation Economics"
    ebf_relevance: medium
    primary_10C: [WHERE, WHEN]
    notes: "Spatial context factors"

  Y:
    name: "Miscellaneous Categories"
    ebf_relevance: low
    primary_10C: []

  Z:
    name: "Other Special Topics"
    ebf_relevance: high
    primary_10C: [WHAT, WHO, WHEN]
    notes: "Cultural economics, religion, social norms - highly EBF-relevant"

