# ==============================================================================
# USAGE EXAMPLES
# ==============================================================================

usage:
  bibtex_format: |
    @article{example,
      ...
      jel_codes = {D03, D91, I12},
      ...
    }

  search_by_jel: |
    # Find all papers with JEL code D03
    grep -l "D03" bibliography/bcm_master.bib

  python_lookup: |
    # Load registry and lookup
    import yaml
    with open('data/jel-code-registry.yaml') as f:
        jel = yaml.safe_load(f)

    # Get EBF mapping for code
    mapping = jel['codes']['D9']['subcodes']['D91']['ebf_mapping']
