# PCT Multiplier Tables (Reference Ranges)
# ==========================================
#
# Source: docs/workflows/level5-paper-integration-workflow.md Lines 510-522
# Status: reference_ranges (NOT calibrated from data yet)
# Version: 0.1
# Created: 2026-02-15
#
# These are reference ranges for the PCT multiplier M(delta_psi).
# The multiplier transforms a parameter theta from anchor context A
# to target context B:
#
#   theta_B = theta_A * prod_i M(delta_psi_i)
#
# where delta_psi_i = psi_B_i - psi_A_i (signed direction of change).
#
# CALIBRATION STATUS:
#   reference_ranges  = derived from literature review (current)
#   empirical         = calibrated from measurement_contexts triplets (future)

version: "0.1"
calibration_status: "reference_ranges"
source: "docs/workflows/level5-paper-integration-workflow.md"
source_lines: "510-522"

# Multiplier function:
#   M(delta_psi) = default + slope * delta_psi
#   where delta_psi in [-1, +1] (normalized Psi difference)
#
# For reference ranges, we provide:
#   range: [min, max] of M for typical delta_psi values
#   default: midpoint used when exact delta is unknown
#   slope: approximate dM/d(delta_psi) for interpolation

multipliers:

  psi_S:  # Social dimension
    description: "Social norms, stigma, peer effects"
    directions:
      stigma_decrease:
        description: "Moving to lower stigma context"
        delta_sign: "negative"
        range: [0.80, 0.90]
        default: 0.85
        example: "welfare -> workplace"
        example_delta: -0.3
      stigma_increase:
        description: "Moving to higher stigma context"
        delta_sign: "positive"
        range: [1.10, 1.25]
        default: 1.15
        example: "private -> public"
        example_delta: 0.3

  psi_I:  # Institutional dimension
    description: "Rules, regulations, defaults, formality"
    directions:
      formality_decrease:
        description: "Moving to less formal context"
        delta_sign: "negative"
        range: [0.90, 0.98]
        default: 0.95
        example: "bureaucratic -> informal"
        example_delta: -0.1
      formality_increase:
        description: "Moving to more formal context"
        delta_sign: "positive"
        range: [1.02, 1.15]
        default: 1.08
        example: "informal -> regulated"
        example_delta: 0.1

  psi_C:  # Cognitive dimension
    description: "Cognitive load, stress, attention, motivation"
    directions:
      load_increase:
        description: "Moving to higher cognitive load"
        delta_sign: "positive"
        range: [1.05, 1.20]
        default: 1.10
        example: "relaxed -> stressed"
        example_delta: 0.2
      load_decrease:
        description: "Moving to lower cognitive load"
        delta_sign: "negative"
        range: [0.85, 0.95]
        default: 0.90
        example: "stressed -> relaxed"
        example_delta: -0.2

  psi_K:  # Cultural dimension
    description: "Cultural values, traditions, norms"
    directions:
      norm_shift:
        description: "Cross-cultural norm shift (direction-dependent)"
        delta_sign: "variable"
        range: [0.70, 1.40]
        default: 1.00
        example: "culture-dependent"
        example_delta: 0.0
        note: "Requires domain-specific calibration"

  psi_E:  # Economic/Resource dimension
    description: "Budget, time, energy availability"
    directions:
      scarcity_increase:
        description: "Moving to scarcer resources"
        delta_sign: "negative"
        range: [1.05, 1.30]
        default: 1.15
        example: "affluent -> constrained"
        example_delta: -0.3
      scarcity_decrease:
        description: "Moving to more abundant resources"
        delta_sign: "positive"
        range: [0.80, 0.95]
        default: 0.90
        example: "constrained -> affluent"
        example_delta: 0.3

  psi_T:  # Temporal dimension
    description: "Time pressure, life phase, urgency"
    directions:
      urgency_increase:
        description: "Moving to higher time pressure"
        delta_sign: "positive"
        range: [1.05, 1.25]
        default: 1.12
        example: "no deadline -> urgent"
        example_delta: 0.3
      urgency_decrease:
        description: "Moving to lower time pressure"
        delta_sign: "negative"
        range: [0.85, 0.95]
        default: 0.90
        example: "urgent -> relaxed timeline"
        example_delta: -0.3

  psi_M:  # Material/Technology dimension
    description: "Technology, infrastructure, tools"
    directions:
      digital_to_physical:
        description: "Moving from digital to physical/F2F"
        delta_sign: "positive"
        range: [1.10, 1.30]
        default: 1.15
        example: "online -> face-to-face"
        example_delta: 0.3
      physical_to_digital:
        description: "Moving from physical to digital"
        delta_sign: "negative"
        range: [0.75, 0.90]
        default: 0.85
        example: "face-to-face -> online"
        example_delta: -0.3

  psi_F:  # Physical environment dimension
    description: "Location, setting, physical context"
    directions:
      public_to_private:
        description: "Moving from public to private setting"
        delta_sign: "negative"
        range: [0.85, 0.95]
        default: 0.90
        example: "office -> home"
        example_delta: -0.2
      private_to_public:
        description: "Moving from private to public setting"
        delta_sign: "positive"
        range: [1.05, 1.20]
        default: 1.10
        example: "home -> government office"
        example_delta: 0.2

# Worked Example (from documentation):
# =====================================
# lambda_R(welfare) = 2.5, anchor context:
#   psi_S = welfare_stigma (high), psi_I = bureaucratic, psi_K = self_reliance
#
# Target: workplace_help
#   psi_S = competence_signaling (moderate), psi_I = professional, psi_C = evaluation
#
# delta_psi_S = -0.3 (stigma decreases) -> M = 0.85
# delta_psi_I = -0.1 (less formal)      -> M = 0.95
# delta_psi_C = +0.2 (new: evaluation)  -> M = 1.10
#
# theta_B = 2.5 * 0.85 * 0.95 * 1.10 = 2.22
# Measured: 1.8 (23% deviation -> further factors needed)
