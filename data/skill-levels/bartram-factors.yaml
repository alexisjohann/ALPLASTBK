# =============================================================================
# BARTRAM "GREAT EIGHT" COMPETENCY FACTORS
# =============================================================================
#
# 8 higher-order latent competency factors from Bartram (2005)
# "The Great Eight Competencies: A Criterion-Centric Approach to Validation"
# Journal of Applied Psychology, 90(6), 1185-1203.
#
# These 8 factors AGGREGATE the 52 O*NET abilities into board-level categories.
# Used for: Executive reporting, high-level skill gap summaries.
#
# Hierarchy: Bartram 8 → O*NET 52 → WEF 73 → Kaufland 120
#
# SSOT for: Higher-order competency aggregation (Tier -1)
# Version: 1.0
# Created: 2026-02-22
# =============================================================================

taxonomy:
  name: "Bartram Great Eight Competency Factors"
  source: "Bartram, D. (2005). Journal of Applied Psychology, 90(6), 1185-1203."
  hierarchy: "8 factors → 20 dimensions → 112 behavioral components"
  validation: "Meta-analysis, N=4,861 across 29 studies, operational validity = 0.53"

factors:
  # ===========================================================================
  leading_deciding:
    id: "GE-1"
    name: "Leading & Deciding"
    definition: "Takes control, exercises leadership, initiates action, gives direction"
    big_five_predictor: "Extraversion (+), Agreeableness (-)"
    color: "#024079"  # FehrAdvice dark blue

    onet_abilities_primary:
      - oral_expression
      - oral_comprehension
      - problem_sensitivity
      - deductive_reasoning

    dimensions:
      - "1.1 Deciding & Initiating Action"
      - "1.2 Leading & Supervising"

    retail_interpretation: |
      Ability to take charge of teams and departments, make decisions under
      pressure, delegate effectively, and drive results. Critical for store
      managers and department heads.

    typical_level_by_role:
      shelf_stocker: 2
      cashier: 2
      sales_associate: 3
      department_head: 5
      store_manager: 6
      regional_manager: 7

  # ===========================================================================
  supporting_cooperating:
    id: "GE-2"
    name: "Supporting & Cooperating"
    definition: "Supports others, shows respect, puts people first, works cooperatively"
    big_five_predictor: "Agreeableness (+)"
    color: "#549EDE"  # FehrAdvice light blue

    onet_abilities_primary:
      - oral_comprehension
      - oral_expression
      - speech_recognition
      - speech_clarity

    dimensions:
      - "2.1 Working with People"
      - "2.2 Adhering to Principles & Values"

    retail_interpretation: |
      Ability to work collaboratively, support team members, show empathy
      to customers, and maintain ethical standards. Foundation for customer
      service excellence and team cohesion.

    typical_level_by_role:
      shelf_stocker: 3
      cashier: 4
      sales_associate: 5
      department_head: 5
      store_manager: 5
      regional_manager: 5

  # ===========================================================================
  interacting_presenting:
    id: "GE-3"
    name: "Interacting & Presenting"
    definition: "Communicates, makes contacts, presents self confidently, persuades"
    big_five_predictor: "Extraversion (+), Openness (+)"
    color: "#549EDE"

    onet_abilities_primary:
      - oral_expression
      - oral_comprehension
      - speech_clarity
      - speech_recognition
      - fluency_of_ideas

    dimensions:
      - "3.1 Relating & Networking"
      - "3.2 Persuading & Influencing"
      - "3.3 Presenting & Communicating Information"

    retail_interpretation: |
      Ability to engage customers, present products persuasively, build
      relationships, and communicate across organizational levels.
      Key differentiator for customer-facing roles.

    typical_level_by_role:
      shelf_stocker: 2
      cashier: 3
      sales_associate: 5
      department_head: 5
      store_manager: 6
      regional_manager: 6

  # ===========================================================================
  analyzing_interpreting:
    id: "GE-4"
    name: "Analyzing & Interpreting"
    definition: "Shows analytical thinking, gets to the heart of complex problems, applies expertise"
    big_five_predictor: "Openness (+), General Mental Ability (+)"
    color: "#25212A"  # FehrAdvice dark gray

    onet_abilities_primary:
      - deductive_reasoning
      - inductive_reasoning
      - mathematical_reasoning
      - number_facility
      - written_comprehension
      - information_ordering
      - problem_sensitivity
      - speed_of_closure
      - flexibility_of_closure

    dimensions:
      - "4.1 Writing & Reporting"
      - "4.2 Applying Expertise & Technology"
      - "4.3 Analyzing"

    retail_interpretation: |
      Ability to analyze sales data, interpret KPIs, understand financial
      reports, and apply analytical thinking to operational problems.
      Increasingly important with data-driven retail.

    typical_level_by_role:
      shelf_stocker: 2
      cashier: 2
      sales_associate: 3
      department_head: 4
      store_manager: 5
      regional_manager: 6

  # ===========================================================================
  creating_conceptualizing:
    id: "GE-5"
    name: "Creating & Conceptualizing"
    definition: "Open to new ideas, seeks learning, thinks strategically, innovates"
    big_five_predictor: "Openness (+)"
    color: "#9EA0C6"  # FehrAdvice lilac

    onet_abilities_primary:
      - originality
      - fluency_of_ideas
      - category_flexibility
      - visualization
      - inductive_reasoning

    dimensions:
      - "5.1 Learning & Researching"
      - "5.2 Creating & Innovating"
      - "5.3 Formulating Strategies & Concepts"

    retail_interpretation: |
      Ability to think strategically, generate innovative merchandising
      ideas, adapt to market changes, and envision future store concepts.
      Most important at leadership and HQ levels.

    typical_level_by_role:
      shelf_stocker: 1
      cashier: 2
      sales_associate: 3
      department_head: 4
      store_manager: 5
      regional_manager: 6

  # ===========================================================================
  organizing_executing:
    id: "GE-6"
    name: "Organizing & Executing"
    definition: "Plans ahead, works systematically, follows directions, delivers results"
    big_five_predictor: "Conscientiousness (+)"
    color: "#7EBD9C"  # FehrAdvice mint

    onet_abilities_primary:
      - information_ordering
      - perceptual_speed
      - selective_attention
      - time_sharing
      - memorization
      - spatial_orientation
      - manual_dexterity
      - stamina

    dimensions:
      - "6.1 Planning & Organizing"
      - "6.2 Delivering Results & Meeting Customer Expectations"
      - "6.3 Following Instructions & Procedures"

    retail_interpretation: |
      Ability to organize work efficiently, meet deadlines, follow SOPs,
      manage inventory, and deliver consistent operational results.
      The backbone of retail operations — required at ALL levels.

    typical_level_by_role:
      shelf_stocker: 4
      cashier: 4
      sales_associate: 4
      department_head: 5
      store_manager: 5
      regional_manager: 5

  # ===========================================================================
  adapting_coping:
    id: "GE-7"
    name: "Adapting & Coping"
    definition: "Adapts to change, copes with pressure, handles setbacks"
    big_five_predictor: "Emotional Stability (+) [= low Neuroticism]"
    color: "#DECB3F"  # FehrAdvice ocher

    onet_abilities_primary:
      - selective_attention
      - time_sharing
      - reaction_time
      - response_orientation

    dimensions:
      - "7.1 Adapting & Responding to Change"
      - "7.2 Coping with Pressures & Setbacks"

    retail_interpretation: |
      Ability to stay calm under pressure (rush hours, difficult customers),
      adapt to changing priorities, and bounce back from setbacks.
      Critical in fast-paced retail environments.

    typical_level_by_role:
      shelf_stocker: 3
      cashier: 4
      sales_associate: 4
      department_head: 5
      store_manager: 6
      regional_manager: 6

  # ===========================================================================
  enterprising_performing:
    id: "GE-8"
    name: "Enterprising & Performing"
    definition: "Focuses on results, works to targets, understands business, drives own career"
    big_five_predictor: "Extraversion (+), Conscientiousness (+), Agreeableness (-)"
    color: "#DE9D3E"  # FehrAdvice orange

    onet_abilities_primary:
      - deductive_reasoning
      - mathematical_reasoning
      - number_facility
      - problem_sensitivity
      - oral_expression

    dimensions:
      - "8.1 Achieving Personal Work Goals & Objectives"
      - "8.2 Entrepreneurial & Commercial Thinking"

    retail_interpretation: |
      Ability to focus on commercial outcomes, understand P&L drivers,
      set ambitious targets, and take ownership of business results.
      Differentiates high performers at management levels.

    typical_level_by_role:
      shelf_stocker: 2
      cashier: 2
      sales_associate: 3
      department_head: 5
      store_manager: 6
      regional_manager: 7

# =============================================================================
# RETAIL ROLE PROFILES (aggregated from factors above)
# =============================================================================
role_profiles:
  description: |
    Each role's Bartram profile shows WHERE the role's emphasis lies.
    These are archetypes — actual roles may vary.

  roles:
    shelf_stocker:
      name: "Regaleinraeumer / Shelf Stocker"
      dominant_factors: ["organizing_executing"]
      secondary_factors: ["adapting_coping", "supporting_cooperating"]
      profile_signature: "Execution-heavy, low cognitive/leadership demand"

    cashier:
      name: "Kassierer:in / Cashier"
      dominant_factors: ["organizing_executing", "supporting_cooperating"]
      secondary_factors: ["adapting_coping", "interacting_presenting"]
      profile_signature: "Operational + customer interaction"

    sales_associate:
      name: "Verkaufsberater:in / Sales Associate"
      dominant_factors: ["interacting_presenting", "supporting_cooperating"]
      secondary_factors: ["organizing_executing", "adapting_coping"]
      profile_signature: "Customer-facing, relationship-driven"

    department_head:
      name: "Abteilungsleiter:in / Department Head"
      dominant_factors: ["leading_deciding", "organizing_executing", "enterprising_performing"]
      secondary_factors: ["analyzing_interpreting", "adapting_coping"]
      profile_signature: "First leadership role, balanced across all factors"

    deputy_store_manager:
      name: "Stellv. Marktleiter:in / Deputy Store Manager"
      dominant_factors: ["leading_deciding", "organizing_executing", "enterprising_performing"]
      secondary_factors: ["analyzing_interpreting", "adapting_coping", "interacting_presenting"]
      profile_signature: "Bridge between department and store leadership, operational + analytics"

    store_manager:
      name: "Marktleiter:in / Store Manager"
      dominant_factors: ["leading_deciding", "enterprising_performing", "adapting_coping"]
      secondary_factors: ["analyzing_interpreting", "creating_conceptualizing"]
      profile_signature: "Full P&L responsibility, strategic + operational"

    regional_manager:
      name: "Bezirksleiter:in / Regional Manager"
      dominant_factors: ["leading_deciding", "enterprising_performing", "creating_conceptualizing"]
      secondary_factors: ["analyzing_interpreting", "interacting_presenting"]
      profile_signature: "Strategic leadership, multi-unit management"
