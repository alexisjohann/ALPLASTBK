# =============================================================================
# O*NET ABILITIES REFERENCE TAXONOMY
# =============================================================================
#
# 52 latent abilities from Fleishman & Reilly (1992)
# Used by U.S. Department of Labor O*NET system
#
# These are LATENT CAPACITIES — enduring attributes that influence performance.
# They are NOT directly observable. They manifest through concrete skills.
#
# Source: https://www.onetonline.org/find/descriptor/browse/1.A
# Reference: Fleishman, E.A. & Reilly, M.E. (1992). Handbook of Human Abilities.
#
# SSOT for: Meta-skill reference taxonomy (Tier 0)
# Version: 1.0
# Created: 2026-02-22
# =============================================================================

taxonomy:
  name: "O*NET Abilities"
  source: "Fleishman & Reilly (1992) / O*NET Content Model"
  version: "O*NET 29.0"
  total_abilities: 52
  description: |
    Abilities are relatively enduring attributes of the individual that
    influence performance. Unlike skills (which are developed through
    training), abilities represent stable latent capacities.

categories:
  # ===========================================================================
  # 1. COGNITIVE ABILITIES (21)
  # ===========================================================================
  cognitive:
    id: "1.A.1"
    name: "Cognitive Abilities"
    count: 21
    description: "Mental processes of knowing, including perceiving, reasoning, and judging"

    # --- Verbal ---
    abilities:
      oral_comprehension:
        id: "1.A.1.a.1"
        name: "Oral Comprehension"
        definition: "The ability to listen to and understand information and ideas presented through spoken words and sentences"
        anchor_low: "Understand a television commercial"
        anchor_high: "Understand a lecture on advanced physics"
        bartram_factor: "analyzing_interpreting"
        retail_relevance: "high"
        retail_example: "Understanding customer complaints, team briefings"

      written_comprehension:
        id: "1.A.1.a.2"
        name: "Written Comprehension"
        definition: "The ability to read and understand information and ideas presented in writing"
        anchor_low: "Read a step-by-step instruction manual"
        anchor_high: "Understand a complex legal document"
        bartram_factor: "analyzing_interpreting"
        retail_relevance: "medium"
        retail_example: "Reading policy documents, compliance materials"

      oral_expression:
        id: "1.A.1.a.3"
        name: "Oral Expression"
        definition: "The ability to communicate information and ideas in speaking so others will understand"
        anchor_low: "Greet a customer"
        anchor_high: "Explain a complex policy to a town hall meeting"
        bartram_factor: "interacting_presenting"
        retail_relevance: "high"
        retail_example: "Customer service, team leadership, conflict resolution"

      written_expression:
        id: "1.A.1.a.4"
        name: "Written Expression"
        definition: "The ability to communicate information and ideas in writing so others will understand"
        anchor_low: "Write a note to remind yourself to pick up groceries"
        anchor_high: "Write a comprehensive strategic report"
        bartram_factor: "interacting_presenting"
        retail_relevance: "medium"
        retail_example: "Writing reports, email communication, documentation"

      # --- Idea Generation & Reasoning ---
      fluency_of_ideas:
        id: "1.A.1.b.1"
        name: "Fluency of Ideas"
        definition: "The ability to come up with a number of ideas about a topic"
        anchor_low: "Name three different uses for a screwdriver"
        anchor_high: "Generate multiple marketing campaign concepts"
        bartram_factor: "creating_conceptualizing"
        retail_relevance: "medium"
        retail_example: "Merchandising ideas, promotional concepts"

      originality:
        id: "1.A.1.b.2"
        name: "Originality"
        definition: "The ability to come up with unusual or clever ideas about a given topic or situation"
        anchor_low: "Find a simple new way to organize files"
        anchor_high: "Invent a new product that meets a market need"
        bartram_factor: "creating_conceptualizing"
        retail_relevance: "low"
        retail_example: "Store layout innovation, novel customer experience ideas"

      problem_sensitivity:
        id: "1.A.1.b.3"
        name: "Problem Sensitivity"
        definition: "The ability to tell when something is wrong or is likely to go wrong"
        anchor_low: "Notice a flat tire on a car"
        anchor_high: "Detect early signs of organizational dysfunction"
        bartram_factor: "analyzing_interpreting"
        retail_relevance: "very_high"
        retail_example: "Spotting stock issues, sensing customer dissatisfaction, safety hazards"

      deductive_reasoning:
        id: "1.A.1.b.4"
        name: "Deductive Reasoning"
        definition: "The ability to apply general rules to specific problems to produce answers that make sense"
        anchor_low: "Follow a simple if-then rule"
        anchor_high: "Solve complex supply chain optimization problems"
        bartram_factor: "analyzing_interpreting"
        retail_relevance: "high"
        retail_example: "Applying company policies, troubleshooting processes"

      inductive_reasoning:
        id: "1.A.1.b.5"
        name: "Inductive Reasoning"
        definition: "The ability to combine pieces of information to form general rules or conclusions"
        anchor_low: "Notice a pattern in a series of numbers"
        anchor_high: "Identify market trends from sales data"
        bartram_factor: "analyzing_interpreting"
        retail_relevance: "high"
        retail_example: "Recognizing sales patterns, inferring customer preferences"

      information_ordering:
        id: "1.A.1.b.6"
        name: "Information Ordering"
        definition: "The ability to arrange things or actions in a certain order or pattern according to a specific rule"
        anchor_low: "Alphabetize a list of names"
        anchor_high: "Design an efficient warehouse layout"
        bartram_factor: "organizing_executing"
        retail_relevance: "high"
        retail_example: "Shelf organization, inventory management, shift scheduling"

      category_flexibility:
        id: "1.A.1.b.7"
        name: "Category Flexibility"
        definition: "The ability to generate or use different sets of rules for combining or grouping things"
        anchor_low: "Sort objects by color or shape"
        anchor_high: "Reclassify product categories for new market strategy"
        bartram_factor: "creating_conceptualizing"
        retail_relevance: "medium"
        retail_example: "Cross-merchandising, flexible product categorization"

      # --- Quantitative ---
      mathematical_reasoning:
        id: "1.A.1.c.1"
        name: "Mathematical Reasoning"
        definition: "The ability to choose the right mathematical methods or formulas to solve a problem"
        anchor_low: "Determine how much change to give a customer"
        anchor_high: "Develop a financial model for store profitability"
        bartram_factor: "analyzing_interpreting"
        retail_relevance: "medium"
        retail_example: "Margin calculations, budget planning, KPI analysis"

      number_facility:
        id: "1.A.1.c.2"
        name: "Number Facility"
        definition: "The ability to add, subtract, multiply, or divide quickly and correctly"
        anchor_low: "Count items in a small group"
        anchor_high: "Quickly verify inventory counts across departments"
        bartram_factor: "analyzing_interpreting"
        retail_relevance: "high"
        retail_example: "Cash handling, stock counts, quick calculations"

      # --- Memory ---
      memorization:
        id: "1.A.1.d.1"
        name: "Memorization"
        definition: "The ability to remember information such as words, numbers, pictures, and procedures"
        anchor_low: "Remember a phone number"
        anchor_high: "Memorize product codes for 500+ items"
        bartram_factor: "organizing_executing"
        retail_relevance: "high"
        retail_example: "Product knowledge, store layout, customer preferences"

      # --- Perceptual ---
      speed_of_closure:
        id: "1.A.1.e.1"
        name: "Speed of Closure"
        definition: "The ability to quickly make sense of, combine, and organize information into meaningful patterns"
        anchor_low: "Recognize a song after hearing a few notes"
        anchor_high: "Quickly assess a store situation from multiple inputs"
        bartram_factor: "analyzing_interpreting"
        retail_relevance: "medium"
        retail_example: "Quick assessment of store situations, rush-hour management"

      flexibility_of_closure:
        id: "1.A.1.e.2"
        name: "Flexibility of Closure"
        definition: "The ability to identify or detect a known pattern that is hidden in other distracting material"
        anchor_low: "Find a friend in a small group"
        anchor_high: "Detect theft patterns in security footage"
        bartram_factor: "analyzing_interpreting"
        retail_relevance: "medium"
        retail_example: "Loss prevention, pattern recognition in data"

      perceptual_speed:
        id: "1.A.1.e.3"
        name: "Perceptual Speed"
        definition: "The ability to quickly and accurately compare similarities and differences among letters, numbers, objects, or patterns"
        anchor_low: "Proofread a short note"
        anchor_high: "Quickly verify large inventory shipments against orders"
        bartram_factor: "organizing_executing"
        retail_relevance: "high"
        retail_example: "Checking deliveries, verifying stock, quality control"

      # --- Spatial ---
      spatial_orientation:
        id: "1.A.1.f.1"
        name: "Spatial Orientation"
        definition: "The ability to know your location in relation to the environment or know where objects are in relation to you"
        anchor_low: "Find your way around a familiar building"
        anchor_high: "Navigate complex warehouse layout efficiently"
        bartram_factor: "organizing_executing"
        retail_relevance: "medium"
        retail_example: "Store navigation, warehouse management"

      visualization:
        id: "1.A.1.f.2"
        name: "Visualization"
        definition: "The ability to imagine how something will look after it is moved around or when its parts are rearranged"
        anchor_low: "Imagine how a room looks after rearranging furniture"
        anchor_high: "Design optimal store layout from floor plans"
        bartram_factor: "creating_conceptualizing"
        retail_relevance: "medium"
        retail_example: "Visual merchandising, store redesign planning"

      # --- Attention ---
      selective_attention:
        id: "1.A.1.g.1"
        name: "Selective Attention"
        definition: "The ability to concentrate on a task over a period of time without being distracted"
        anchor_low: "Complete a simple form in a quiet room"
        anchor_high: "Monitor multiple processes during peak hours"
        bartram_factor: "organizing_executing"
        retail_relevance: "very_high"
        retail_example: "Checkout during rush, multitasking on the floor"

      time_sharing:
        id: "1.A.1.g.2"
        name: "Time Sharing"
        definition: "The ability to shift back and forth between two or more activities or sources of information"
        anchor_low: "Talk while driving on a familiar route"
        anchor_high: "Manage multiple customer requests simultaneously"
        bartram_factor: "organizing_executing"
        retail_relevance: "very_high"
        retail_example: "Handling customers while restocking, managing team while serving"

  # ===========================================================================
  # 2. PSYCHOMOTOR ABILITIES (10)
  # ===========================================================================
  psychomotor:
    id: "1.A.2"
    name: "Psychomotor Abilities"
    count: 10
    description: "Abilities related to the manipulation and control of physical objects"

    abilities:
      arm_hand_steadiness:
        id: "1.A.2.a.1"
        name: "Arm-Hand Steadiness"
        definition: "The ability to keep your hand and arm steady while moving your arm or holding your arm and hand in one position"
        bartram_factor: "organizing_executing"
        retail_relevance: "low"

      manual_dexterity:
        id: "1.A.2.a.2"
        name: "Manual Dexterity"
        definition: "The ability to quickly move your hand, your hand together with your arm, or your two hands to grasp, manipulate, or assemble objects"
        bartram_factor: "organizing_executing"
        retail_relevance: "high"
        retail_example: "Stocking shelves, handling products, operating equipment"

      finger_dexterity:
        id: "1.A.2.a.3"
        name: "Finger Dexterity"
        definition: "The ability to make precisely coordinated movements of the fingers of one or both hands"
        bartram_factor: "organizing_executing"
        retail_relevance: "medium"
        retail_example: "Cashier operations, tagging products, device operation"

      control_precision:
        id: "1.A.2.b.1"
        name: "Control Precision"
        definition: "The ability to quickly and repeatedly adjust the controls of a machine or vehicle to exact positions"
        bartram_factor: "organizing_executing"
        retail_relevance: "low"

      multilimb_coordination:
        id: "1.A.2.b.2"
        name: "Multilimb Coordination"
        definition: "The ability to coordinate two or more limbs while sitting, standing, or lying down"
        bartram_factor: "organizing_executing"
        retail_relevance: "medium"
        retail_example: "Forklift operation, pallet handling"

      response_orientation:
        id: "1.A.2.b.3"
        name: "Response Orientation"
        definition: "The ability to choose quickly between two or more movements in response to different signals"
        bartram_factor: "adapting_coping"
        retail_relevance: "medium"
        retail_example: "Reacting to safety situations, customer emergencies"

      rate_control:
        id: "1.A.2.b.4"
        name: "Rate Control"
        definition: "The ability to time your movements or adjust equipment movement in anticipation of changes in speed/direction"
        bartram_factor: "organizing_executing"
        retail_relevance: "low"

      reaction_time:
        id: "1.A.2.c.1"
        name: "Reaction Time"
        definition: "The ability to quickly respond to a signal when it appears"
        bartram_factor: "adapting_coping"
        retail_relevance: "medium"
        retail_example: "Emergency response, loss prevention, safety situations"

      wrist_finger_speed:
        id: "1.A.2.c.2"
        name: "Wrist-Finger Speed"
        definition: "The ability to make fast, simple, repeated movements of the fingers, hands, and wrists"
        bartram_factor: "organizing_executing"
        retail_relevance: "medium"
        retail_example: "Fast scanning at checkout, price tagging"

      speed_of_limb_movement:
        id: "1.A.2.c.3"
        name: "Speed of Limb Movement"
        definition: "The ability to quickly move the arms and legs"
        bartram_factor: "organizing_executing"
        retail_relevance: "medium"
        retail_example: "Restocking, order picking in warehouse"

  # ===========================================================================
  # 3. PHYSICAL ABILITIES (9)
  # ===========================================================================
  physical:
    id: "1.A.3"
    name: "Physical Abilities"
    count: 9
    description: "Abilities related to physical capacity and endurance"

    abilities:
      static_strength:
        id: "1.A.3.a.1"
        name: "Static Strength"
        definition: "The ability to exert maximum muscle force to lift, push, pull, or carry objects"
        bartram_factor: "organizing_executing"
        retail_relevance: "high"
        retail_example: "Moving heavy products, stocking upper shelves"

      explosive_strength:
        id: "1.A.3.a.2"
        name: "Explosive Strength"
        definition: "The ability to use short bursts of muscle force to propel oneself or an object"
        bartram_factor: "organizing_executing"
        retail_relevance: "low"

      dynamic_strength:
        id: "1.A.3.a.3"
        name: "Dynamic Strength"
        definition: "The ability to exert muscle force repeatedly or continuously over time"
        bartram_factor: "organizing_executing"
        retail_relevance: "high"
        retail_example: "Extended stocking shifts, warehouse work"

      trunk_strength:
        id: "1.A.3.a.4"
        name: "Trunk Strength"
        definition: "The ability to use your abdominal and lower back muscles to support part of the body repeatedly or continuously"
        bartram_factor: "organizing_executing"
        retail_relevance: "high"
        retail_example: "Bending, lifting, reaching during stocking"

      stamina:
        id: "1.A.3.b.1"
        name: "Stamina"
        definition: "The ability to exert yourself physically over long periods of time without getting winded or out of breath"
        bartram_factor: "organizing_executing"
        retail_relevance: "very_high"
        retail_example: "8+ hour shifts standing, walking the store floor"

      extent_flexibility:
        id: "1.A.3.b.2"
        name: "Extent Flexibility"
        definition: "The ability to bend, stretch, twist, or reach with your body, arms, and/or legs"
        bartram_factor: "organizing_executing"
        retail_relevance: "high"
        retail_example: "Reaching upper/lower shelves, product placement"

      dynamic_flexibility:
        id: "1.A.3.b.3"
        name: "Dynamic Flexibility"
        definition: "The ability to quickly and repeatedly bend, stretch, twist, or reach out"
        bartram_factor: "organizing_executing"
        retail_relevance: "medium"
        retail_example: "Fast restocking, product rotation"

      gross_body_coordination:
        id: "1.A.3.c.1"
        name: "Gross Body Coordination"
        definition: "The ability to coordinate the movement of your arms, legs, and torso together"
        bartram_factor: "organizing_executing"
        retail_relevance: "medium"
        retail_example: "Operating equipment, navigating busy store"

      gross_body_equilibrium:
        id: "1.A.3.c.2"
        name: "Gross Body Equilibrium"
        definition: "The ability to keep or regain your body balance or stay upright when in an unstable position"
        bartram_factor: "organizing_executing"
        retail_relevance: "medium"
        retail_example: "Ladder use, uneven surfaces in warehouse"

  # ===========================================================================
  # 4. SENSORY ABILITIES (12)
  # ===========================================================================
  sensory:
    id: "1.A.4"
    name: "Sensory Abilities"
    count: 12
    description: "Abilities related to sensory perception"

    abilities:
      near_vision:
        id: "1.A.4.a.1"
        name: "Near Vision"
        definition: "The ability to see details at close range"
        bartram_factor: "organizing_executing"
        retail_relevance: "high"
        retail_example: "Reading labels, checking expiry dates, screen work"

      far_vision:
        id: "1.A.4.a.2"
        name: "Far Vision"
        definition: "The ability to see details at a distance"
        bartram_factor: "organizing_executing"
        retail_relevance: "medium"
        retail_example: "Monitoring store floor, spotting customer needs"

      visual_color_discrimination:
        id: "1.A.4.a.3"
        name: "Visual Color Discrimination"
        definition: "The ability to match or detect differences between colors"
        bartram_factor: "organizing_executing"
        retail_relevance: "medium"
        retail_example: "Product quality checks, visual merchandising"

      night_vision:
        id: "1.A.4.a.4"
        name: "Night Vision"
        definition: "The ability to see under low light conditions"
        bartram_factor: "organizing_executing"
        retail_relevance: "low"

      peripheral_vision:
        id: "1.A.4.a.5"
        name: "Peripheral Vision"
        definition: "The ability to see objects or movement to the side when looking straight ahead"
        bartram_factor: "organizing_executing"
        retail_relevance: "medium"
        retail_example: "Loss prevention, customer awareness on floor"

      depth_perception:
        id: "1.A.4.a.6"
        name: "Depth Perception"
        definition: "The ability to judge which of several objects is closer or farther away"
        bartram_factor: "organizing_executing"
        retail_relevance: "medium"
        retail_example: "Forklift operation, stacking products"

      glare_sensitivity:
        id: "1.A.4.a.7"
        name: "Glare Sensitivity"
        definition: "The ability to see objects in the presence of glare or bright lighting"
        bartram_factor: "organizing_executing"
        retail_relevance: "low"

      hearing_sensitivity:
        id: "1.A.4.b.1"
        name: "Hearing Sensitivity"
        definition: "The ability to detect or tell the differences between sounds that vary in pitch and loudness"
        bartram_factor: "organizing_executing"
        retail_relevance: "medium"
        retail_example: "Hearing customer requests, equipment sounds"

      auditory_attention:
        id: "1.A.4.b.2"
        name: "Auditory Attention"
        definition: "The ability to focus on a single source of sound in the presence of other distracting sounds"
        bartram_factor: "organizing_executing"
        retail_relevance: "high"
        retail_example: "Listening to customers in noisy store, radio communication"

      sound_localization:
        id: "1.A.4.b.3"
        name: "Sound Localization"
        definition: "The ability to tell the direction from which a sound originated"
        bartram_factor: "organizing_executing"
        retail_relevance: "low"

      speech_recognition:
        id: "1.A.4.b.4"
        name: "Speech Recognition"
        definition: "The ability to identify and understand the speech of another person"
        bartram_factor: "interacting_presenting"
        retail_relevance: "very_high"
        retail_example: "Understanding customers (accents, masks, noise)"

      speech_clarity:
        id: "1.A.4.b.5"
        name: "Speech Clarity"
        definition: "The ability to speak clearly so others can understand you"
        bartram_factor: "interacting_presenting"
        retail_relevance: "very_high"
        retail_example: "Customer communication, announcements, team instructions"

# Summary statistics
summary:
  total: 52
  by_category:
    cognitive: 21
    psychomotor: 10
    physical: 9
    sensory: 12
  by_retail_relevance:
    very_high: 6  # selective_attention, time_sharing, stamina, problem_sensitivity, speech_recognition, speech_clarity
    high: 14
    medium: 20
    low: 8
    not_specified: 4
