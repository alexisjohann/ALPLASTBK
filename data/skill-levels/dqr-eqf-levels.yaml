# =============================================================================
# DQR / EQF — Deutscher Qualifikationsrahmen / European Qualifications Framework
# =============================================================================
# Version: 1.0.0
# Quellen: dqr.de, europass.europa.eu, bibb.de
# Erstellt: 2026-02-22
# Zweck: Qualifikations-Niveaus fuer Kaufland-Rollen + O*NET-Level-Mapping
# =============================================================================
#
# WARUM DQR/EQF?
#
# Unsere O*NET-Skala (1-7) misst Skill-ANFORDERUNGEN.
# Der DQR misst QUALIFIKATIONS-Niveaus (was jemand formal KANN).
#
# Das ist NICHT dasselbe:
#   - Ein Job kann O*NET Level 5 bei "Oral Expression" erfordern,
#     aber die Person hat DQR 4 (Kaufmann/frau Einzelhandel).
#   - Die DQR-Stufe sagt: "Diese Person kann selbstaendig planen."
#   - Die O*NET-Stufe sagt: "Dieser Job braucht Level 5 Ausdruck."
#
# BEIDES brauchen wir:
#   - DQR/EQF → Was bringt die Person MIT (formale Qualifikation)?
#   - O*NET → Was BRAUCHT der Job (Skill-Anforderung)?
#   - GAP = Differenz → Entwicklungsbedarf
#
# KAUFLAND-KONTEXT:
# Die Belegschaft hat reale deutsche Berufsabschluesse:
#   Verkaeufer/in = DQR 3 (2-jaehrige Ausbildung)
#   Kaufmann/-frau im Einzelhandel = DQR 4 (3-jaehrige Ausbildung)
#   Handelsfachwirt/in = DQR 6 (Bachelor-aequivalent!)
#
# Ohne DQR-Mapping reden wir an der HR-Realitaet vorbei.
# =============================================================================

metadata:
  version: "1.1.0"
  dqr_basis: "DQR-Handbuch (2013, aktualisiert 2022)"
  eqf_basis: "Recommendation 2017/C 189/03"
  bibb_basis: "BIBB Ausbildungsbausteine Einzelhandel (2017)"
  cross_references:
    nqr_ch_ref: "data/skill-levels/nqr-ch-levels.yaml"
    nqr_at_ref: "data/skill-levels/nqr-at-levels.yaml"
    dach_transferability_ref: "data/skill-levels/dach-transferability.yaml"
    kaufland_roles_ref: "data/skill-levels/kaufland-role-profiles.yaml"
  note: |
    DQR = Deutsche Implementierung des EQF.
    1:1-Mapping: DQR Level X = EQF Level X.
    Grundsatz: Gleichwertigkeit, NICHT Gleichartigkeit.
    Ein Meister (DQR 6) ist NICHT ein Bachelor — aber gleichwertig komplex.

# =============================================================================
# DIE 4-SAEULEN-ARCHITEKTUR DES DQR
# =============================================================================
#
#                     KOMPETENZ
#                         |
#           +-------------+-------------+
#           |                           |
#     FACHKOMPETENZ              PERSONALE KOMPETENZ
#           |                           |
#     +-----+-----+              +------+------+
#     |           |              |             |
#   WISSEN   FERTIGKEITEN   SOZIAL-      SELBST-
#                            KOMPETENZ    AENDIGKEIT
#
# Methodenkompetenz = Querschnitt (in allen 4 Saeulen integriert)
#
# UNTERSCHIED ZUM EQF:
#   EQF: 3 Saeulen (Knowledge, Skills, Responsibility & Autonomy)
#   DQR: 4 Saeulen (Sozialkompetenz und Selbstaendigkeit getrennt)
#   → DQR ist DETAILLIERTER bei personalen Kompetenzen
# =============================================================================

competence_structure:
  fachkompetenz:
    wissen:
      descriptors: ["Tiefe", "Breite"]
      description: "Bestand an Fakten, Grundsaetzen, Theorien und Praxis"
    fertigkeiten:
      descriptors: ["Instrumentale Fertigkeiten", "Systemische Fertigkeiten", "Beurteilungsfaehigkeit"]
      description: "Kognitive und praktische Faehigkeiten zur Aufgabenbearbeitung"
  personale_kompetenz:
    sozialkompetenz:
      descriptors: ["Team-/Fuehrungsfaehigkeit", "Mitgestaltung", "Kommunikation"]
      description: "Faehigkeit, mit anderen zusammenzuarbeiten und zu kommunizieren"
    selbstaendigkeit:
      descriptors: ["Eigenstaendigkeit", "Verantwortung", "Reflexivitaet", "Lernkompetenz"]
      description: "Faehigkeit, eigenstaendig und verantwortlich zu handeln"

# =============================================================================
# BERUFLICHE HANDLUNGSKOMPETENZ (BIBB/KMK-Konzept)
# =============================================================================
#
# Das deutsche Berufsbildungssystem definiert:
# "Handlungskompetenz = Bereitschaft und Befaehigung, sich in beruflichen,
#  gesellschaftlichen und privaten Situationen sachgerecht, durchdacht sowie
#  individuell und sozial verantwortlich zu verhalten."
#
# 3+3 Modell:
#   3 Dimensionen:    Fachkompetenz + Selbstkompetenz + Sozialkompetenz
#   3 Querschnitte:   Methodenkompetenz + Kommunikative K. + Lernkompetenz
# =============================================================================

berufliche_handlungskompetenz:
  note: "KMK-Modell (offiziell), BIBB-Referenz"
  dimensionen:
    fachkompetenz:
      definition: |
        Bereitschaft und Befaehigung, Aufgaben und Probleme zielorientiert,
        sachgerecht, methodengeleitet und selbstaendig zu loesen und das
        Ergebnis zu beurteilen.
    selbstkompetenz:
      definition: |
        Bereitschaft und Faehigkeit, die eigene Entwicklung zu reflektieren,
        Lebensplaene zu fassen, Begabungen zu entfalten. Umfasst Selbstaendigkeit,
        Kritikfaehigkeit, Selbstvertrauen, Zuverlaessigkeit, Verantwortungsbewusstsein.
    sozialkompetenz:
      definition: |
        Bereitschaft und Faehigkeit, soziale Beziehungen zu leben und zu gestalten,
        Zuwendungen und Spannungen zu erfassen und sich mit anderen rational und
        verantwortungsbewusst auseinanderzusetzen.
  querschnittskompetenzen:
    - methodenkompetenz
    - kommunikative_kompetenz
    - lernkompetenz

  # Praxis-Variante (4-Komponenten-Modell, verbreitet in HR)
  praxis_modell:
    - fachkompetenz
    - methodenkompetenz  # hier explizit als eigene Saeuele
    - sozialkompetenz
    - selbst_persoenlichkeitskompetenz

# =============================================================================
# 8 DQR/EQF NIVEAUS
# =============================================================================

levels:

  # ---------------------------------------------------------------------------
  # NIVEAU 1 — Einfache Anforderungen unter Anleitung
  # ---------------------------------------------------------------------------
  level_1:
    dqr: 1
    eqf: 1
    isced: "1-2"
    niveauindikator: |
      Kompetenzen zur Erfuellung einfacher Anforderungen in einem ueberschaubar
      und stabil strukturierten Lern- oder Arbeitsbereich. Aufgabenerfuellung
      unter Anleitung.

    wissen: "Elementares allgemeines Wissen. Erster Einblick in einen Arbeitsbereich."
    fertigkeiten: "Einfache Aufgaben nach vorgegebenen Regeln ausfuehren. Elementare Zusammenhaenge."
    sozialkompetenz: "Mit anderen zusammen arbeiten. Sich muendlich und schriftlich austauschen."
    selbstaendigkeit: "Unter Anleitung lernen oder arbeiten."

    typische_qualifikationen:
      - "Berufsausbildungsvorbereitung (BVJ, BEK)"

    kaufland_rollen:
      - rolle: "Regaleinraeumer/in (Aushilfe, Minijob)"
        status: "informell"
        note: "Keine formale Qualifikation erforderlich, aber faktisch DQR 1-2"

    onet_level_mapping:
      typical_range: [1, 2]
      note: |
        DQR 1 Taetigkeiten erfordern O*NET Ability-Level 1-2:
        Einfache motorische Aufgaben, Grundrechenarten, basale Kommunikation.

  # ---------------------------------------------------------------------------
  # NIVEAU 2 — Grundlegende Anforderungen, weitgehend unter Anleitung
  # ---------------------------------------------------------------------------
  level_2:
    dqr: 2
    eqf: 2
    isced: "2"
    niveauindikator: |
      Kompetenzen zur fachgerechten Erfuellung grundlegender Anforderungen.
      Weitgehend unter Anleitung.

    wissen: "Grundlegendes allgemeines Wissen und grundlegendes Fachwissen."
    fertigkeiten: "Grundlegende kognitive und praktische Fertigkeiten. Ergebnisse nach vorgegebenen Massstaeben beurteilen."
    sozialkompetenz: "In einer Gruppe mitwirken. Anregungen und Kritik aufnehmen und aeussern."
    selbstaendigkeit: "In bekannten, stabilen Kontexten weitgehend unter Anleitung arbeiten."

    typische_qualifikationen:
      - "Hauptschulabschluss / Erster allgemeinbildender Schulabschluss (ESA)"
      - "Berufsausbildungsvorbereitung"

    kaufland_rollen:
      - rolle: "Kassierer/in (ohne Ausbildung)"
        status: "typisch"
        note: "Angelernte Taetigkeiten mit Grundschulung am Kassensystem"
      - rolle: "Lagermitarbeiter/in (angelernt)"
        status: "typisch"

    onet_level_mapping:
      typical_range: [2, 3]
      note: "Regelbasierte Aufgaben, etwas Beurteilungsfaehigkeit."

  # ---------------------------------------------------------------------------
  # NIVEAU 3 — Selbstaendige Erfuellung fachlicher Anforderungen
  # ---------------------------------------------------------------------------
  level_3:
    dqr: 3
    eqf: 3
    isced: "3"
    niveauindikator: |
      Kompetenzen zur selbstaendigen Erfuellung fachlicher Anforderungen
      in einem noch ueberschaubaren, zum Teil offen strukturierten Taetigkeitsfeld.

    wissen: "Erweitertes allgemeines Wissen oder erweitertes Fachwissen."
    fertigkeiten: "Spektrum von kognitiven und praktischen Fertigkeiten zur Planung und Bearbeitung fachlicher Aufgaben. Einfache Transferleistungen."
    sozialkompetenz: "In einer Gruppe mitwirken und punktuell Unterstuetzung anbieten. Ergebnisse adressatenbezogen darstellen."
    selbstaendigkeit: "Auch in weniger bekannten Kontexten eigenstaendig arbeiten."

    typische_qualifikationen:
      - "Verkaeufer/in (2-jaehrige duale Berufsausbildung)"
      - "Mittlerer Schulabschluss (MSA / Realschulabschluss)"

    kaufland_rollen:
      - rolle: "Verkaeufer/in (ausgelernt, 2-jaehrige Ausbildung)"
        status: "offiziell_zugeordnet"
        dqr_zuordnung_quelle: "dqr.de Qualifikationssuche"
        note: "Verkaufsgespraeche, Warenpraesentation, einfache Bestellvorgaenge"
      - rolle: "Kassierer/in (mit Ausbildung)"
        status: "typisch"

    onet_level_mapping:
      typical_range: [3, 4]
      note: "Selbstaendige Aufgaben, etwas Planung, einfacher Transfer."

  # ---------------------------------------------------------------------------
  # NIVEAU 4 — Selbstaendige Planung in sich veraenderndem Taetigkeitsfeld
  # ---------------------------------------------------------------------------
  level_4:
    dqr: 4
    eqf: 4
    isced: "3-4"
    niveauindikator: |
      Kompetenzen zur selbstaendigen Planung und Bearbeitung fachlicher
      Aufgabenstellungen in einem umfassenden, sich veraendernden Taetigkeitsfeld.

    wissen: "Vertieftes allgemeines Wissen oder fachtheoretisches Wissen."
    fertigkeiten: "Breites Spektrum kognitiver und praktischer Fertigkeiten. Selbstaendige Aufgabenbearbeitung und Problemloesung unter Einbeziehung von Handlungsalternativen. Transferleistungen."
    sozialkompetenz: "Arbeit in Gruppe mitgestalten, kontinuierlich Unterstuetzung anbieten. Ablaeufe und Ergebnisse begruenden. Umfassend kommunizieren."
    selbstaendigkeit: "Lernziele setzen, reflektieren und verantworten."

    typische_qualifikationen:
      - "Kaufmann/Kauffrau im Einzelhandel (3-jaehrige duale Berufsausbildung)"
      - "Abitur (allgemeine Hochschulreife)"
      - "Fachhochschulreife"

    kaufland_rollen:
      - rolle: "Kaufmann/Kauffrau im Einzelhandel (ausgelernt)"
        status: "offiziell_zugeordnet"
        dqr_zuordnung_quelle: "dqr.de Qualifikationssuche"
        note: |
          Warenwirtschaft, Controlling-Grundlagen, selbstaendige Aufgabenbearbeitung.
          DIE zentrale Qualifikation im Kaufland-Verkauf.
      - rolle: "Fachkraft Verkauf"
        status: "typisch"
        note: "Kaufland-interne Bezeichnung nach Ausbildungsabschluss"

    onet_level_mapping:
      typical_range: [3, 5]
      note: |
        Breites Spektrum: Niedrigere O*NET-Levels bei physischen Abilities,
        hoehere bei kognitiven (Problemloesung, Kommunikation).

  # ---------------------------------------------------------------------------
  # NIVEAU 5 — Umfassende fachliche Aufgaben, komplex und spezialisiert
  # ---------------------------------------------------------------------------
  level_5:
    dqr: 5
    eqf: 5
    isced: "5"
    niveauindikator: |
      Kompetenzen zur selbstaendigen Planung und Bearbeitung umfassender
      fachlicher Aufgabenstellungen in einem komplexen, spezialisierten,
      sich veraendernden Taetigkeitsfeld.

    wissen: "Integriertes Fachwissen einschliesslich vertieftem fachtheoretischem Wissen. Umfang und Grenzen des Taetigkeitsfelds kennen."
    fertigkeiten: "Sehr breites Spektrum spezialisierter Fertigkeiten. Arbeitsprozesse uebergreifend planen. Umfassende Transferleistungen."
    sozialkompetenz: "Kooperativ planen, auch in heterogenen Gruppen. Andere anleiten. Komplexe Sachverhalte adressatenbezogen darstellen."
    selbstaendigkeit: "Eigene und fremd gesetzte Ziele reflektieren, bewerten, selbstgesteuert verfolgen."

    typische_qualifikationen:
      - "Gepr. Handelsassistent/in Einzelhandel (jetzt: Fachwirt/in fuer Vertrieb im Einzelhandel)"
      - "IT-Spezialist (Certified)"
      - "Berufsspezialist"
      - "1. Fortbildungsniveau (BBiG)"

    kaufland_rollen:
      - rolle: "Warenbereichsleiter/in (Abteilungsleiter)"
        status: "typisch"
        note: |
          Fuehrung kleiner Teams, Kennzahlensteuerung, Sortimentsverantwortung.
          Oft erreicht via Kaufland Abiturientenprogramm oder interne Entwicklung.
          Uebergangsbereich DQR 5-6.

    onet_level_mapping:
      typical_range: [4, 5]
      note: "Spezialisierte Aufgaben, heterogene Teams, uebergreifende Planung."

  # ---------------------------------------------------------------------------
  # NIVEAU 6 — Eigenverantwortliche Steuerung, Komplexitaet, Veraenderung
  # → BACHELOR-AEQUIVALENT (akademisch) / MEISTER / FACHWIRT (beruflich)
  # ---------------------------------------------------------------------------
  level_6:
    dqr: 6
    eqf: 6
    isced: "6"
    niveauindikator: |
      Kompetenzen zur Planung, Bearbeitung und Auswertung von umfassenden fachlichen
      Aufgaben und zur eigenverantwortlichen Steuerung von Prozessen in Teilbereichen.
      Komplexitaet und haeufige Veraenderungen.

    wissen: "Breites und integriertes Wissen einschliesslich wissenschaftlicher Grundlagen und kritischem Verstaendnis der wichtigsten Theorien und Methoden ODER breites und integriertes berufliches Wissen. Wissen an Schnittstellen."
    fertigkeiten: "Sehr breites Spektrum an Methoden fuer komplexe Probleme. Neue Loesungen erarbeiten, unter verschiedenen Massstaeben beurteilen."
    sozialkompetenz: "In Expertenteams verantwortlich arbeiten oder Gruppen/Organisationen verantwortlich leiten. Fachliche Entwicklung anderer anleiten."
    selbstaendigkeit: "Ziele fuer Lern- und Arbeitsprozesse definieren, reflektieren und eigenstaendig gestalten."

    typische_qualifikationen:
      - "Bachelor (akademisch)"
      - "Meister/in (Handwerk)"
      - "Gepr. Handelsfachwirt/in (IHK)"
      - "Gepr. Fachkaufmann/-frau"
      - "Staatl. gepr. Techniker/in"
      - "2. Fortbildungsniveau (BBiG)"

    kaufland_rollen:
      - rolle: "Marktleiter/in (Hausleiter)"
        status: "typisch"
        note: |
          Filialsteuerung, Personalfuehrung (20-200 MA), P&L-Verantwortung.
          Typisch via Handelsfachwirt, duales Studium, oder Traineeprogramm.
      - rolle: "Stellv. Marktleiter/in"
        status: "typisch"
        note: "Uebergang von DQR 5 zu DQR 6"

    onet_level_mapping:
      typical_range: [5, 6]
      note: |
        Fuehrung, komplexe Problemloesung, neue Loesungen entwickeln.
        Hohe O*NET-Levels bei: Oral Expression, Problem Sensitivity,
        Deductive Reasoning, Social Perceptiveness.

    gleichwertigkeit_hinweis: |
      WICHTIG: Handelsfachwirt/in (DQR 6) ≠ Bachelor.
      Gleichwertig in Komplexitaet, aber NICHT gleichartig.
      Kein automatischer Zugang zu Master-Programmen.

  # ---------------------------------------------------------------------------
  # NIVEAU 7 — Strategieorientiert, neue komplexe Problemstellungen
  # → MASTER-AEQUIVALENT (akademisch) / BETRIEBSWIRT (beruflich)
  # ---------------------------------------------------------------------------
  level_7:
    dqr: 7
    eqf: 7
    isced: "7"
    niveauindikator: |
      Kompetenzen zur Bearbeitung von neuen komplexen Aufgaben und zur
      eigenverantwortlichen Steuerung von Prozessen in einem strategieorientierten
      Taetigkeitsfeld. Haeufige und unvorhersehbare Veraenderungen.

    wissen: "Umfassendes, detailliertes und spezialisiertes Wissen auf neuestem Erkenntnisstand ODER umfassendes berufliches Wissen in strategieorientiertem Feld."
    fertigkeiten: "Spezialisierte fachliche oder konzeptionelle Fertigkeiten fuer strategische Probleme. Bei unvollstaendiger Information Alternativen abwaegen. Neue Ideen entwickeln."
    sozialkompetenz: "Gruppen oder Organisationen bei komplexen Aufgaben verantwortlich leiten. Fachliche Entwicklung anderer gezielt foerdern."
    selbstaendigkeit: "Neue Aufgaben unter Reflexion gesellschaftlicher, wirtschaftlicher und kultureller Auswirkungen. Wissen eigenstaendig erschliessen."

    typische_qualifikationen:
      - "Master (akademisch)"
      - "Gepr. Betriebswirt/in (IHK)"
      - "Strategische/r Professional (IT)"
      - "3. Fortbildungsniveau (BBiG)"

    kaufland_rollen:
      - rolle: "Verkaufsleiter/in (Bezirksleiter / Regionalleiter)"
        status: "typisch"
        note: |
          Strategische Steuerung mehrerer Filialen (5-15 Maerkte).
          Organisationsentwicklung, Budget 50-200 Mio. EUR.
          Typisch: Betriebswirt IHK, Master, oder exzellenter Handelsfachwirt.

    onet_level_mapping:
      typical_range: [5, 7]
      note: |
        Strategisch, konzeptionell, Fuehrung grosser Organisationseinheiten.
        Hoechste O*NET-Levels bei: Deductive/Inductive Reasoning,
        Written/Oral Expression, Problem Sensitivity, Social Perceptiveness.

  # ---------------------------------------------------------------------------
  # NIVEAU 8 — Forschung, Innovation, neuartige Problemlagen
  # → PROMOTION (akademisch)
  # ---------------------------------------------------------------------------
  level_8:
    dqr: 8
    eqf: 8
    isced: "8"
    niveauindikator: |
      Kompetenzen zur Gewinnung von Forschungserkenntnissen oder zur Entwicklung
      innovativer Loesungen. Neuartige und unklare Problemlagen.

    wissen: "Umfassendes, spezialisiertes und systematisches Wissen in einer Forschungsdisziplin. Beitrag zur Erweiterung des Fachwissens."
    fertigkeiten: "Identifizierung und Loesung neuartiger Problemstellungen in Forschung, Entwicklung oder Innovation. Innovative Prozesse konzipieren, durchfuehren, steuern."
    sozialkompetenz: "Organisationen mit zukunftsweisenden Aufgaben leiten. Fachuebergreifend diskutieren, international."
    selbstaendigkeit: "Umfassende Ziele unter Reflexion gesellschaftlicher Auswirkungen. Neue Wege erschliessen."

    typische_qualifikationen:
      - "Promotion / Doktorgrad (Dr.)"

    kaufland_rollen:
      - rolle: "(Nicht typisch im operativen Einzelhandel)"
        status: "selten"
        note: |
          Moeglich bei: Head of Consumer Research (Schwarz-Gruppe Konzern),
          Strategieabteilung, oder Wissenschaftskooperationen.

    onet_level_mapping:
      typical_range: [6, 7]
      note: "Forschung und Innovation — selten im Retail-Kontext."

# =============================================================================
# DQR → O*NET LEVEL CROSS-REFERENZ
# =============================================================================
#
# Diese Tabelle zeigt die TYPISCHE Ueberlappung zwischen DQR-Niveaus
# und O*NET Ability-Levels. KEIN 1:1-Mapping, weil:
#   - DQR misst QUALIFIKATION (was die Person kann)
#   - O*NET misst JOB-ANFORDERUNG (was der Job braucht)
#   - Ein DQR-4-Kaufmann kann in einem Job arbeiten, der O*NET 3 erfordert
#     (ueberqualifiziert) oder O*NET 5 (unterqualifiziert → Entwicklungsbedarf)
#
# =============================================================================

dqr_to_onet_crossref:
  summary_table:
    # DQR: [O*NET min, O*NET typical, O*NET max]
    dqr_1: { onet_min: 1, onet_typical: 1.5, onet_max: 2 }
    dqr_2: { onet_min: 1, onet_typical: 2.5, onet_max: 3 }
    dqr_3: { onet_min: 2, onet_typical: 3.0, onet_max: 4 }
    dqr_4: { onet_min: 3, onet_typical: 4.0, onet_max: 5 }
    dqr_5: { onet_min: 3, onet_typical: 4.5, onet_max: 5 }
    dqr_6: { onet_min: 4, onet_typical: 5.5, onet_max: 6 }
    dqr_7: { onet_min: 5, onet_typical: 6.0, onet_max: 7 }
    dqr_8: { onet_min: 5, onet_typical: 6.5, onet_max: 7 }

  interpretation: |
    Die Zuordnung ist NICHT linear weil:
    1. DQR 1-4 komprimiert (grosse Bevoelkerungsgruppe, enge O*NET-Range)
    2. DQR 5-8 spreizt (kleine Bevoelkerungsgruppe, breite O*NET-Range)
    3. Verschiedene O*NET-Abilities haben verschiedene Ranges pro DQR-Stufe:
       - Physical Abilities: Oft DQR-unabhaengig (Regaleinraeumer braucht
         aehnliche Kraft wie Marktleiter der selbst verraeumt)
       - Cognitive Abilities: Stark DQR-korreliert
       - Social Abilities: Ab DQR 5 sprunghaft steigend

