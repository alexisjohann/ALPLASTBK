    dauer: "~1 Jahr Fortbildung"
    aufstieg_zu: "Stellv. Marktleiter/in"
    note: "Uebergangsbereich — Fuehrungsnachwuchs"

  - position: "Stellv. Marktleiter/in"
    kaufland_code: "WHO-04/05"
    dqr: 6
    eqf: 6
    isced: "6"
    onet_typical: [4, 6]
    qualifikation: "Handelsfachwirt/in oder duales Studium"
    dauer: "~1.5 Jahre Fortbildung"
    aufstieg_zu: "Marktleiter/in"

  - position: "Marktleiter/in (Hausleiter)"
    kaufland_code: "WHO-05"
    dqr: 6
    eqf: 6
    isced: "6"
    onet_typical: [5, 6]
    qualifikation: "Gepr. Handelsfachwirt/in (IHK) = DQR 6 = Bachelor-aequivalent"
    dauer: "~1.5 Jahre Fortbildung"
    aufstieg_zu: "Verkaufsleiter/in (Bezirksleiter)"
    note: |
      P&L-Verantwortung, 20-200 Mitarbeitende.
      Handelsfachwirt ist die Schlussel-Qualifikation fuer diese Stufe.

  - position: "Verkaufsleiter/in (Bezirksleiter)"
    kaufland_code: "WHO-06"
    dqr: 7
    eqf: 7
    isced: "7"
    onet_typical: [5, 7]
    qualifikation: "Gepr. Betriebswirt/in (IHK) oder Master"
    dauer: "~1-2 Jahre Fortbildung"
    note: |
      Strategische Steuerung 5-15 Filialen.
      Budget 50-200 Mio. EUR.

# =============================================================================
# IHK-FORTBILDUNGSSTUFEN (BBiG 2020)
# =============================================================================
#
# Seit 2020 gibt es 3 offizielle Fortbildungsstufen:
#
# Stufe 1: "Berufsspezialist" (DQR 5)
#   → z.B. Fachwirt/in fuer Vertrieb im Einzelhandel
#   → Kaufland: Warenbereichsleiter-Niveau
#
# Stufe 2: "Bachelor Professional" (DQR 6)
#   → z.B. Gepr. Handelsfachwirt/in
#   → Kaufland: Marktleiter-Niveau
#   → ACHTUNG: "Bachelor Professional" ≠ akademischer Bachelor!
#
# Stufe 3: "Master Professional" (DQR 7)
#   → z.B. Gepr. Betriebswirt/in
#   → Kaufland: Bezirksleiter-Niveau
#   → ACHTUNG: "Master Professional" ≠ akademischer Master!
# =============================================================================

ihk_fortbildungsstufen:
  stufe_1:
    bezeichnung: "Berufsspezialist/in"
    dqr: 5
    retail_beispiel: "Fachwirt/in fuer Vertrieb im Einzelhandel"
    kaufland_aequivalent: "Warenbereichsleiter/in"
  stufe_2:
    bezeichnung: "Bachelor Professional"
    dqr: 6
    retail_beispiel: "Gepr. Handelsfachwirt/in"
    kaufland_aequivalent: "Marktleiter/in"
    warnung: "NICHT identisch mit akademischem Bachelor!"
  stufe_3:
    bezeichnung: "Master Professional"
    dqr: 7
    retail_beispiel: "Gepr. Betriebswirt/in (Handel)"
    kaufland_aequivalent: "Bezirksleiter/in"
    warnung: "NICHT identisch mit akademischem Master!"

# =============================================================================
# MAPPING ZU DQR 4-SAEULEN → ESCO TRANSVERSAL SKILLS
# =============================================================================
#
# Wie verhaelt sich die DQR-Kompetenzstruktur zu den ESCO Transversal Skills?
#
# DQR-Saeuele          → ESCO Transversal Kategorie
# -----------------------------------------------------------
# Wissen               → T1 (Core: Literacy, Numeracy, Digital)
# Fertigkeiten         → T2 (Thinking: Analyse, Planung, Problemloesung)
# Sozialkompetenz      → T4 (Social: Kommunikation, Fuehrung, Teamwork)
# Selbstaendigkeit     → T3 (Self-Management: Effizienz, Proaktivitaet, Lernen)
# (Querschnitt: Methodik) → T2.2 (Planning) + T1.3 (Digital) + T2.1 (Analyse)
#
# T5 (Physical) und T6 (Life) haben kein DQR-Aequivalent —
# der DQR fokussiert auf kognitive und personale Kompetenzen.
# =============================================================================

dqr_to_esco_mapping:
  wissen: ["T1.1", "T1.2", "T1.3"]
  fertigkeiten: ["T2.1", "T2.2", "T2.3", "T2.4"]
  sozialkompetenz: ["T4.1", "T4.2", "T4.3", "T4.4", "T4.5"]
  selbstaendigkeit: ["T3.1", "T3.2", "T3.3", "T3.4"]
  nicht_abgedeckt_durch_dqr: ["T5 (Physical)", "T6 (Life Skills)"]

# =============================================================================
# EQF-BRIDGE: DQR ↔ NQR-CH ↔ NQR-AT (DACH-Vergleich)
# =============================================================================
# Alle 3 Laender referenzieren auf EQF, aber mit Besonderheiten.
# Detail-Mappings: data/skill-levels/dach-transferability.yaml
# =============================================================================

eqf_dach_bridge:
  description: |
    Kurzuebersicht der DACH-Qualifikationsrahmen pro EQF-Level.
    Fuer vollstaendige Transferability-Analyse siehe dach-transferability.yaml.

  levels:
    eqf_1_2:
      de_dqr: "1-2: Keine / BVJ"
      ch_nqr: "1-2: Keine / Vorlehre"
      at_nqr: "1-2: Keine / Pflichtschule"
      dach_notes: "Frei transferierbar — keine formale Qualifikation"

    eqf_3:
      de_dqr: "3: Verkaeufer:in (2J duale Ausbildung)"
      ch_nqr: "3: EBA Detailhandelsassistent:in (2J)"
      at_nqr: "3: Lehrabschluss Einzelhandel (3J)"
      dach_notes: "Hoch vergleichbar. AT-Lehre 1 Jahr laenger bei gleichem EQF."

    eqf_4:
      de_dqr: "4: Kaufmann:frau EH (3J) / Abitur"
      ch_nqr: "4: EFZ Detailhandel (3J) — Option BM"
      at_nqr: "4: HAS / Lehre+Zusatz / AHS-Matura"
      dach_notes: "CH-BM als Alleinstellungsmerkmal (FH-Zugang). Keine DE/AT-Entsprechung."

    eqf_5:
      de_dqr: "5: Fachwirt:in Vertrieb EH (Berufsspezialist)"
      ch_nqr: "5: BP Detailhandelsspezialist:in (eidg. Fachausweis)"
      at_nqr: "5: HAK-Matura (5J Schule!) oder Meisterpruefung"
      dach_notes: |
        GROESSTE DACH-Unterschiede! CH/DE = Praxisspezialist (25-30J),
        AT-HAK = Generalist (19J). Gleicher EQF, voellig andere Profile.

    eqf_6:
      de_dqr: "6: Handelsfachwirt:in IHK (Bachelor Professional) / Bachelor"
      ch_nqr: "6: HFP (eidg. Diplom) / HF-Diplom / Bachelor FH"
      at_nqr: "6: Bachelor FH/Uni / Meisterpruefung / Ingenieur"
      dach_notes: "CH hat 3 Wege auf NQR 6. HF-Diplom in DE/AT wenig bekannt."

    eqf_7:
      de_dqr: "7: Betriebswirt:in IHK (Master Professional) / Master"
      ch_nqr: "7: Master FH/Uni / EMBA / MAS"
      at_nqr: "7: Master FH/Uni / MBA"
      dach_notes: "Geringste Unterschiede dank Bologna-Harmonisierung."

    eqf_8:
      de_dqr: "8: Promotion (Dr.)"
      ch_nqr: "8: Promotion (Dr.) — nicht im NQR-CH Berufsbildung"
      at_nqr: "8: Promotion (Dr.)"
      dach_notes: "Weitgehend harmonisiert. Im Retail nicht relevant."
