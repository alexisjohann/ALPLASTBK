        concepts:
          - "generate ideas"
          - "think unconventionally"
          - "explore possibilities"
          - "take initiative in innovation"
        retail_relevance: "medium"
        retail_example: "Warenpraesentation verbessern, neue Aktionsideen entwickeln"

  T3:
    code: "T3"
    name: "Self-management skills and competences"
    name_de: "Selbstmanagement"
    description: "Faehigkeiten zur Steuerung des eigenen Verhaltens und der eigenen Entwicklung"
    clusters:
      T3_1:
        code: "T3.1"
        name: "Working efficiently"
        name_de: "Effizient arbeiten"
        concepts:
          - "attend to detail"
