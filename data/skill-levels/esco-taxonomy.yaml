# =============================================================================
# WAS IST ESCO?
# =============================================================================
#
# ESCO ist die "gemeinsame Sprache" des europaeischen Arbeitsmarkts.
#
# Stell dir vor: Eine Kassiererin in Kaufland Deutschland heisst "Kassiererin".
# In Kaufland Polen heisst dieselbe Rolle "Kasjer/ka". In Kaufland Rumaenien
# "Casier/a". Aber welche SKILLS brauchen alle drei? Sind es dieselben?
# Kann die deutsche Kassiererin in Polen arbeiten?
#
# ESCO beantwortet genau diese Fragen:
# - 3'039 Berufe in 28 Sprachen (inkl. alle Kaufland-Laender)
# - 13'939 Skills/Kompetenzen/Wissen als gemeinsames Vokabular
# - Qualifikationen ueber EQF/DQR verknuepft
#
# WARUM BRAUCHEN WIR ESCO?
# Kaufland operiert in 8 EU-Laendern (DE, PL, CZ, SK, RO, BG, HR, MD).
# O*NET ist US-zentriert. WEF ist global aber abstrakt.
# ESCO ist der EU-Standard — seit 2021 PFLICHT fuer EURES (EU-Jobportal).
#
# WAS ESCO NICHT IST:
# - Kein Skill-LEVEL-Modell (ESCO sagt WAS, nicht WIE GUT)
# - Kein psychometrisches Konstrukt (keine latenten Faehigkeiten)
# - Kein Assessment-Tool (misst nichts, klassifiziert nur)
#
# DESHALB: ESCO = Vokabular, O*NET = Messskala, WEF = Meta-Skills
# =============================================================================

metadata:
  name: "ESCO — European Skills, Competences, Qualifications and Occupations"
  version_esco: "1.2.1"
  version_file: "1.0.0"
  maintainer: "EU-Kommission, DG Employment + Cedefop"
  release_date: "2024-05 (v1.2), late 2024 (v1.2.1)"
  languages: 28
  license: "EUPL 1.2"
  api: "https://esco.ec.europa.eu/en/use-esco/use-esco-services-api"
  download: "https://esco.ec.europa.eu/en/use-esco/download"
  formats: ["CSV", "JSON-LD", "ODS", "RDF", "TTL", "XML"]

# =============================================================================
# DREI SAEULEN
# =============================================================================

three_pillars:
  occupations:
    description: |
      3'039 Berufe, hierarchisch nach ISCO-08 (Level 1-4) + ESCO-Erweiterung (Level 5+).
      Jeder Beruf hat: Beschreibung, alternative Bezeichnungen, essentielle Skills,
      optionale Skills, essentielles Wissen, optionales Wissen.
    count: 3039
    hierarchy_basis: "ISCO-08 (ILO)"
    levels: "5+ (ISCO 4 Levels + ESCO Sub-Levels)"
    retail_relevant_isco_codes:
      - code: "522"
        name: "Shop Salespersons"
        esco_occupations:
          - "Shop sales assistant"
          - "Shopkeeper"
          - "Shop supervisor"
          - "Bakery shop assistant"
          - "Delicatessen seller"
      - code: "5230"
        name: "Checkout Operators"
        esco_occupations:
          - "Checkout operator"
      - code: "5222"
        name: "Shop Supervisors"
        esco_occupations:
          - "Shop supervisor"

  skills_and_competences:
    description: |
      13'939 Skill/Kompetenz/Wissens-Konzepte in 4 Sub-Klassifikationen.
      3-stufige Hierarchie (Level 1 = Kategorien, Level 2 = Cluster, Level 3 = Einzelkonzepte).
      Jedes Skill-Konzept hat ein "reusability level": transversal, cross-sectoral,
      sector-specific, oder occupation-specific.
    total_concepts: 13939
    sub_classifications:
      S: "Skills"
      K: "Knowledge"
      T: "Transversal skills and competences"
      L: "Language skills and knowledge"
    knowledge_concepts: 2903
    hierarchy_levels: 3
    hierarchy_origin: |
      Level 2 basiert auf O*NET's 332 Intermediate Work Activities (IWA).
      Level 1 und 2 zusaetzlich aus Canadian Skills Glossary.
      → ESCO und O*NET sind NICHT unabhaengig — sie teilen DNA.

  qualifications:
    description: |
      Qualifikationen aus nationalen Datenbanken, verknuepft mit EQF-Levels.
      Kein fester Katalog sondern wachsendes Repository.
    framework: "EQF (European Qualifications Framework)"
    levels: 8
    participating_countries: 41
    referenced_countries: 36

