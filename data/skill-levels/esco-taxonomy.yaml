# =============================================================================
# TRANSVERSAL SKILLS (T) — Das Herzstück fuer Kaufland
# =============================================================================
#
# Transversal Skills = hoechstes Reusability-Level in ESCO.
# Gelten ueber ALLE Sektoren und Berufe hinweg.
# Grundlegend ueberarbeitet in ESCO v1.1 (Januar 2022).
#
# Struktur: 6 Kategorien → 24 Cluster → ~97 Einzelkompetenzen
#
# Design-Logik: Konzentrische Kreise
# Kern (T1: Core) → Denken (T2) → Selbstmanagement (T3)
# → Soziale Interaktion (T4) → Physische Faehigkeiten (T5)
# → Lebenskompetenzen (T6: aeusserer Ring)
# =============================================================================

transversal_skills:
  summary:
    categories_L1: 6
    clusters_L2: 24
    concepts_L3: 97  # approximate

  T1:
    code: "T1"
    name: "Core skills and competences"
    name_de: "Kernkompetenzen"
    description: "Grundlegende Faehigkeiten die alle anderen ermoeglichen"
    clusters:
      T1_1:
        code: "T1.1"
        name: "Applying knowledge (literacy)"
        name_de: "Wissen anwenden (Lesen/Schreiben)"
        concepts:
          - "apply knowledge"
          - "gather information"
          - "use reference sources"
          - "read with understanding"
          - "write clearly"
        retail_relevance: "high"
        retail_example: "Produktinformationen lesen und verstehen, Bestellungen schriftlich erfassen"

      T1_2:
        code: "T1.2"
        name: "Applying numeracy and mathematical skills"
        name_de: "Rechnen und mathematische Faehigkeiten"
        concepts:
          - "apply numeracy skills"
          - "perform calculations"
          - "use measurement instruments"
          - "interpret data"
        retail_relevance: "high"
        retail_example: "Kassenabrechnungen, Bestandszaehlung, Preiskalkulation"

      T1_3:
        code: "T1.3"
        name: "Working with digital devices and applications"
        name_de: "Digitale Geraete und Anwendungen nutzen"
        concepts:
          - "use digital tools"
          - "manage digital information"
          - "use digital communication"
          - "collaborate through digital channels"
          - "manage digital identity and data"
        retail_relevance: "very_high"
        retail_example: "Warenwirtschaftssystem (SAP), Kassensystem, Tablets fuer Bestandsmanagement"

  T2:
    code: "T2"
    name: "Thinking skills and competences"
    name_de: "Denkfaehigkeiten und -kompetenzen"
    description: "Kognitive Faehigkeiten fuer Informationsverarbeitung und Problemloesung"
    clusters:
      T2_1:
        code: "T2.1"
        name: "Processing information, ideas, and concepts"
        name_de: "Information, Ideen und Konzepte verarbeiten"
        concepts:
          - "think analytically"
          - "think critically"
          - "identify patterns and connections"
          - "synthesise information"
          - "judge and evaluate"
        retail_relevance: "medium"
        retail_example: "Verkaufszahlen interpretieren, Kundenverhalten analysieren"

      T2_2:
        code: "T2.2"
        name: "Planning and organizing"
        name_de: "Planen und Organisieren"
        concepts:
          - "plan and schedule"
          - "organise tasks and resources"
          - "set priorities"
          - "coordinate actions"
        retail_relevance: "very_high"
        retail_example: "Personalplanung, Warenbestellung, Aktionsplanung"

      T2_3:
        code: "T2.3"
        name: "Dealing with problems"
        name_de: "Probleme loesen"
        concepts:
          - "identify problems"
          - "analyse problems"
          - "find solutions"
          - "implement solutions"
          - "evaluate outcomes"
        retail_relevance: "high"
        retail_example: "Reklamationen loesen, Lieferengpaesse managen, Kundenprobleme"

      T2_4:
        code: "T2.4"
        name: "Thinking creatively and innovatively"
