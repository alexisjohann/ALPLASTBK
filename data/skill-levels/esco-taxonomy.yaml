          - "manage quality"
          - "manage time"
          - "meet commitments"
          - "work efficiently"
          - "work independently"
        retail_relevance: "very_high"
        retail_example: "MHD-Kontrolle (Detail), Kassenschicht durchhalten (Konzentration), Zeitmanagement bei Veraeumung"

      T3_2:
        code: "T3.2"
