# =============================================================================
# ESCO-RELEVANTE RETAIL-BERUFE (Shop Sales Assistant Profil)
# =============================================================================

retail_occupation_profile:
  name: "Shop sales assistant"
  isco_code: "5223"
  description: |
    Assists in shopkeeping and other shop activities. Helps shopkeepers with
    ordering and refilling of goods. Provides customer advice, sells products,
    and maintains the shop.

  essential_knowledge:
    - "Product comprehension (functionalities, properties, legal/regulatory requirements)"
    - "Company policies"

  essential_skills:
    - "Operating a cash register"
    - "Directing customers to merchandise"
    - "Customer service fundamentals"

  optional_skills:
    - "Sales promotion techniques"
    - "Teamwork principles"
    - "Visual merchandising"
    - "Stock management"
    - "Digital tools for retail"

  career_pathways:
    - "Visual merchandiser"
    - "Shop manager"
    - "Merchandiser"
    - "Drugstore/garage manager"

