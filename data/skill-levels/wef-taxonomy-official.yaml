# =============================================================================
# WEF GLOBAL SKILLS TAXONOMY — OFFICIAL REFERENCE
# =============================================================================
#
# Source: WEF Global Skills Taxonomy (2021), Adoption Toolkit (2025)
# This is the AUTHORITATIVE REFERENCE — copied from official WEF source.
# Do NOT modify this file. Create mappings in separate files.
#
# Structure: 4 Levels
#   Level 1: 2 broad categories (Skills/Knowledge/Abilities + Attitudes)
#   Level 2: ~14 groups
#   Level 3: ~35 sub-groups
#   Level 4: ~120 specific skills/competences
#
# SSOT for: WEF taxonomy reference
# Version: 1.0
# Created: 2026-02-22
# =============================================================================

metadata:
  name: "WEF Global Skills Taxonomy"
  source: "World Economic Forum"
  source_documents:
    - "WEF Global Skills Taxonomy 2021"
    - "WEF Global Skills Taxonomy Adoption Toolkit 2025"
    - "WEF Future of Jobs Report 2025"
  version: "2025"
  total_items:
    level_1: 2
    level_2: 14
    level_3: 35
    level_4: 120  # approximate
  note: |
    This file contains the official WEF taxonomy structure with descriptions.
    Mappings to O*NET, Bartram, and Kaufland roles are in separate files.

# =============================================================================
# LEVEL 1: SKILLS, KNOWLEDGE & ABILITIES
# =============================================================================
level_1_skills_knowledge_abilities:
  id: "WEF-L1-SKA"
  description: |
    Whether gained through experiential learning or formal instruction, skills
    represent developed proficiencies in the performance of distinct cross-
    functional aspects of tasks. Though they may become increasingly automatic
    as they develop, skills are nevertheless often difficult to practically
    disentangle from familiarity in using a body of contextual or theoretical
    knowledge. Skills may also be dependent on physical, psychomotor, cognitive
    and sensory abilities which are to varying degrees innate.

  # ---------------------------------------------------------------------------
  # PHYSICAL ABILITIES (Level 2)
  # ---------------------------------------------------------------------------
  physical_abilities:
    id: "WEF-L2-PA"
    level: 2
    description: |
      The range of physical, psychomotor, sensory and sensory-processing
      abilities that are required to perform a job role.

    manual_dexterity_endurance_precision:
      id: "WEF-L3-PA-01"
      level: 3
      description: "Abilities related to the capacity to manipulate and control objects, strength, endurance, flexibility, balance and coordination."
      skills:
        dexterity:
          id: "WEF-L4-PA-01-01"
          level: 4
          description: "The ability to steadily, precisely and responsively grasp, manipulate, and assemble objects or adjust the controls of a machine."
        strength_stamina:
          id: "WEF-L4-PA-01-02"
          level: 4
          description: "The ability to exert muscle force in short bursts or over long periods with endurance to fatigue."
        flexibility_coordination:
          id: "WEF-L4-PA-01-03"
          level: 4
          description: "The ability to bend, stretch, twist, and reach, and coordinate these movements when the whole body is in motion, while maintaining balance and stability."

    sensory_processing_abilities:
      id: "WEF-L3-PA-02"
      level: 3
      description: "Abilities that influence visual, auditory and spatial perception, and the acquisition and application of knowledge in problem-solving."
      skills:
        visual_abilities:
          id: "WEF-L4-PA-02-01"
          level: 4
          description: "Abilities relating to resolving details, perceiving depth, differentiating colours and intensities, and seeing in low light, at oblique angles and in bright lighting."
        auditory_abilities:
          id: "WEF-L4-PA-02-02"
          level: 4
          description: "Abilities relating to distinguishing and isolating sounds, interpreting speech and speaking clearly."
        information_processing:
          id: "WEF-L4-PA-02-03"
          level: 4
          description: "The ability to remember and organise information, identify patterns and differences, concentrate, and shift attention between sources of information."
        spatial_abilities:
          id: "WEF-L4-PA-02-04"
          level: 4
          description: "The ability to mentally manipulate objects and perceive locations relative to an environment."

  # ---------------------------------------------------------------------------
  # COGNITIVE SKILLS (Level 2)
  # ---------------------------------------------------------------------------
  cognitive_skills:
    id: "WEF-L2-CS"
    level: 2
    description: |
      Cognitive functioning refers to multiple mental abilities, including
      learning, thinking, reasoning, remembering, problem solving, decision
      making, and attention. Qualitative reasoning and ideation.

    creativity_problem_solving:
      id: "WEF-L3-CS-01"
      level: 3
      skills:
        creative_thinking:
          id: "WEF-L4-CS-01-01"
          level: 4
          description: "Capacity to bring a new idea or concept into existence through imagination and to imagine something that does not exist."
        analytical_thinking:
          id: "WEF-L4-CS-01-02"
          level: 4
          description: "Capacity to break down concepts and complex ideas into basic or fundamental principles. Includes critical thinking, whereby judgements are made by analysing and interpreting facts and information."
        systems_thinking:
          id: "WEF-L4-CS-01-03"
          level: 4
          description: "Capacity to understand how concepts work together, embrace a multidisciplinary approach, and identify patterns over time."

    mathematical_statistical_thinking:
      id: "WEF-L3-CS-02"
      level: 3
      description: "Quantitative reasoning in order to calculate, estimate or model phenomena."
      skills:
        number_facility:
          id: "WEF-L4-CS-02-01"
          level: 4
          description: "The ability to rapidly and accurately add, subtract, multiply and divide."
        calculating_estimating:
          id: "WEF-L4-CS-02-02"
          level: 4
          description: "The ability to synthesise quantitative information into pertinent calculations or estimates given precise or approximate information."
        algebraic_facility:
          id: "WEF-L4-CS-02-03"
          level: 4
          description: "Solving equations and using advanced mathematical techniques."
        data_analysis_modelling:
          id: "WEF-L4-CS-02-04"
          level: 4
          description: "Making statistical inferences from data and using statistical techniques to determine the properties of complex systems."

    speaking_writing_languages:
      id: "WEF-L3-CS-03"
      level: 3
      description: "Communicate through reading, writing, speaking and listening in a mother tongue or a foreign language."
      skills:
        reading:
          id: "WEF-L4-CS-03-01"
          level: 4
          description: "Understanding written sentences and paragraphs in work-related documents."
        speaking:
          id: "WEF-L4-CS-03-02"
          level: 4
          description: "Talking to others to convey information effectively."
        writing:
          id: "WEF-L4-CS-03-03"
          level: 4
          description: "Communicating effectively in writing as appropriate for the needs of the audience."
        editing:
          id: "WEF-L4-CS-03-04"
          level: 4
          description: "Synthesising text resources into a coherent narrative with a specified style or for a target audience."
        multilingualism:
          id: "WEF-L4-CS-03-05"
          level: 4
          description: "Communicating through reading, writing, speaking and listening in foreign languages."

  # ---------------------------------------------------------------------------
  # MANAGEMENT SKILLS (Level 2)
  # ---------------------------------------------------------------------------
  management_skills:
    id: "WEF-L2-MS"
    level: 2
    description: "Capacity to allocate resources efficiently and effectively, and manage activities that businesses engage in daily to gain value from physical or intangible assets."

    talent_management:
      id: "WEF-L3-MS-01"
      level: 3
      skills:
        skill_evaluation:
          id: "WEF-L4-MS-01-01"
          level: 4
          description: "Capacity for evaluating skills and skills gaps, and gathering personnel resources to achieve tasks, including how human capital will be allocated to get the work done. Accurately evaluating a candidate or colleagues proficiencies and characteristics over their full profile of skills, knowledge, abilities and attitudes."
        talent_planning_development:
          id: "WEF-L4-MS-01-02"
          level: 4
          description: "Identifying developmental or hiring solutions to bridge a team's skills gaps and ensuring knowledge transfer when team members transition to new roles."

    operations_logistics:
      id: "WEF-L3-MS-02"
      level: 3
      skills:
        coordination_time_management:
          id: "WEF-L4-MS-02-01"
          level: 4
          description: "Management of Material Resources. Obtaining and seeing to the appropriate use of equipment, facilities, and materials needed to do certain work. Capacity to coordinate time-sensitive schedules in cooperation with others."
        project_management:
          id: "WEF-L4-MS-02-02"
          level: 4
          description: "Capacity to lead the work of a team to identify, select and implement the appropriate changes, tools, and improvements to achieve and deliver a defined goal."
        supply_chain_management:
          id: "WEF-L4-MS-02-03"
          level: 4
          description: "Optimising the flow of the goods and services which are required to realise a product or goal."

    financial_management:
      id: "WEF-L3-MS-03"
      level: 3
      skills:
        accounting:
          id: "WEF-L4-MS-03-01"
          level: 4
          description: "Capacity for gathering resources to achieve tasks, including how money will be spent to get the work done, obtaining equipment, facilities, and materials, and accounting for expenditures. Determining how money will be spent to get the work done, and accounting for these expenditures. Tracking the flow of money that has been spent."
        finance:
          id: "WEF-L4-MS-03-02"
          level: 4
          description: "Budgeting money that will be spent, managing financial portfolios, and tracking economic trends which affect business performance."

    quality_management:
      id: "WEF-L3-MS-04"
      level: 3
      description: "Pursuing excellence in workplace processes, products and activities."
      skills:
        quality_assurance:
          id: "WEF-L4-MS-04-01"
          level: 4
          description: "Setting quality objectives, specifying operational processes to achieve them, providing confidence they will be effective, and improving them based on experience."
        quality_control:
          id: "WEF-L4-MS-04-02"
          level: 4
          description: "Inspecting products to ensure they fulfil quality requirements."
        risk_management:
          id: "WEF-L4-MS-04-03"
          level: 4
          description: "Assessing, prioritising and mitigating the effect of uncertainty on objectives, to enhance institutional resilience."

    engagement_skills:
      id: "WEF-L3-MS-05"
      level: 3
      description: "Capacity to engage customers either corporately or personally."
      skills:
        marketing_media:
          id: "WEF-L4-MS-05-01"
          level: 4
          description: "Capacity to identify and shape effective value propositions for products and services, as well as to sell products on that basis."
          sub_skills:
            sales_communication:
              description: "Capacity to promote and sell products or services."
            digital_marketing:
              description: "Using the internet, mobile devices, social media, search engines and other online channels to reach consumers."
        customer_experience:
          id: "WEF-L4-MS-05-02"
          level: 4
          description: "Capacity to manage positive interactions between an organization and its customers."
          sub_skills:
            customer_service:
              description: "Responding to customer enquiries in a manner that balances speed and quality, and represents brand values."
            customer_relationship_management:
              description: "Managing and developing a portfolio of client relationships over extended periods to accomplish an operational strategy."

  # ---------------------------------------------------------------------------
  # TECHNOLOGY SKILLS (Level 2)
  # ---------------------------------------------------------------------------
  technology_skills:
    id: "WEF-L2-TS"
    level: 2
    description: "Effectively designing and using technology."

    technology_literacy:
      id: "WEF-L3-TS-01"
      level: 3
      description: "Capacity to select the right tools needed to perform tasks, use those tools and set up and operate technology."
      skills:
        collaboration_productivity_software:
          id: "WEF-L4-TS-01-01"
          level: 4
          description: "Using software designed to help get work done faster and more efficiently."
        manufacturing_technologies:
          id: "WEF-L4-TS-01-02"
          level: 4
          description: "Using technologies that assist in industrial production and manufacturing processes."
        installation:
          id: "WEF-L4-TS-01-03"
          level: 4
          description: "Installing equipment, machines, wiring or programs to meet specifications."

    programming:
      id: "WEF-L3-TS-02"
      level: 3
      description: "Using software and programming languages."
      skills:
        functional_programming:
          id: "WEF-L4-TS-02-01"
          level: 4
          description: "Writing simple programs using calls to subroutines."
        oop:
          id: "WEF-L4-TS-02-02"
          level: 4
          description: "Using data encapsulation and inheritance to develop well designed programming projects, often as part of a team."
        computational_thinking:
          id: "WEF-L4-TS-02-03"
          level: 4
          description: "Looking at real-world scenarios and creating models that can be processed by a computer."

    design_user_experience:
      id: "WEF-L3-TS-03"
      level: 3
      skills:
        human_technology_interaction:
          id: "WEF-L4-TS-03-01"
          level: 4
          description: "Developing and delivering effective and efficient physical and digital designs given a systematic understanding of how users will perceive their value, function, usability and aesthetic."
        ux_design:
          id: "WEF-L4-TS-03-02"
          level: 4
          description: "Designing technology from a users perspective by balancing considerations such as practical usability, ergonomics, perception, cognition, social psychology, consumer behaviour and environmental impact."
        mobile_development:
          id: "WEF-L4-TS-03-03"
          level: 4
          description: "Developing applications for mobile devices."
        web_development:
          id: "WEF-L4-TS-03-04"
          level: 4
          description: "Building and maintaining websites."

    networks_cybersecurity:
      id: "WEF-L3-TS-04"
      level: 3
      description: "Securely and efficiently delivering information-technology solutions."
      skills:
        computer_networking:
          id: "WEF-L4-TS-04-01"
          level: 4
          description: "Setting up a connected network of computing devices."
        cybersecurity:
          id: "WEF-L4-TS-04-02"
          level: 4
          description: "Using technologies, processes and practices to protect computers, networks, programs and data from unauthorised access or attacks."
        cloud_computing:
          id: "WEF-L4-TS-04-03"
          level: 4
          description: "Delivering computing services over the internet."

    ai_big_data:
      id: "WEF-L3-TS-05"
      level: 3
      description: "Building and developing machines capable of thinking autonomously and performing tasks that mimic human intelligence."
      skills:
        data_mining:
          id: "WEF-L4-TS-05-01"
          level: 4
          description: "Accessing, cleaning and sorting large data sets, and using software tools to visualise the results."
        supervised_learning:
          id: "WEF-L4-TS-05-02"
          level: 4
          description: "Designing neural networks which can be trained to reliably make decisions based on example data."
        unsupervised_learning:
          id: "WEF-L4-TS-05-03"
          level: 4
          description: "Designing neural networks which can detect clusters and patterns in large and complex data sets without human guidance."

  # ---------------------------------------------------------------------------
  # INDUSTRY-SPECIALIZED SKILLS (Level 2)
  # ---------------------------------------------------------------------------
  industry_specialized:
    id: "WEF-L2-IS"
    level: 2
    description: "Specialised industry skills are specific to the field of the profession in question."
    note: "Not further decomposed in generic taxonomy — domain-specific."

# =============================================================================
# LEVEL 1: ATTITUDES
# =============================================================================
level_1_attitudes:
  id: "WEF-L1-ATT"
  description: |
    Consistent behaviours, emotional-intelligence traits and beliefs that
    individuals exhibit that influence their interpersonal interactions and
    their approach to ideas, persons and situations. Attitudes are learned
    and often a big part of the driving force of learning and the approach
    to doing tasks.

  # ---------------------------------------------------------------------------
  # SELF-EFFICACY (Level 2)
  # ---------------------------------------------------------------------------
  self_efficacy:
    id: "WEF-L2-SE"
    level: 2
    description: "Controlling one's thoughts, feelings and actions."

    motivation_self_awareness:
      id: "WEF-L3-SE-01"
      level: 3
      skills:
        internal_self_awareness:
          id: "WEF-L4-SE-01-01"
          level: 4
          description: "Understanding one's own values, passions, aspirations and reactions."
        external_self_awareness:
          id: "WEF-L4-SE-01-02"
          level: 4
          description: "Awareness of how one is perceived by others."
        self_control:
          id: "WEF-L4-SE-01-03"
          level: 4
          description: "Doing what's best despite short-term temptations; strength of will."
        working_independently:
          id: "WEF-L4-SE-01-04"
          level: 4
          description: "Developing one's own ways of doing things, motivating oneself with little or no supervision."
        initiative:
          id: "WEF-L4-SE-01-05"
          level: 4
          description: "Daring to explore and implement new ideas using active-learning strategies."

    curiosity_lifelong_learning:
      id: "WEF-L3-SE-02"
      level: 3
      skills:
        curiosity:
          id: "WEF-L4-SE-02-01"
          level: 4
          description: "Showing a lively interest in novelty and an openness to experience, finding subjects and topics fascinating and discovering new ideas."
        willingness_to_learn:
          id: "WEF-L4-SE-02-02"
          level: 4
          description: "Showing a positive attitude towards new and challenging demands that can only be met via lifelong learning."

    dependability_attention_to_detail:
      id: "WEF-L3-SE-03"
      level: 3
      description: "Dependability, commitment to doing the job punctually, correctly and carefully, and paying attention to details."
      skills:
        meeting_commitments:
          id: "WEF-L4-SE-03-01"
          level: 4
          description: "Performing one's tasks in a self-disciplined, reliable and goal-oriented manner, and ensuring that operative processes are finished at a previously agreed time."
        time_management:
          id: "WEF-L4-SE-03-02"
          level: 4
          description: "Organising one's own time to be able to deliver on commitments and responsibilities."
        attention_to_detail:
          id: "WEF-L4-SE-03-03"
          level: 4
          description: "Producing accurate and error-free work."
        assuming_responsibility:
          id: "WEF-L4-SE-03-04"
          level: 4
          description: "Accepting responsibility and accountability for one's own professional decisions and actions, or those delegated to others."

    resilience_flexibility_agility:
      id: "WEF-L3-SE-04"
      level: 3
      description: "Maturity, poise, flexibility, and restraint to cope with pressure, stress, criticism, setbacks, and personal and work-related problems."
      skills:
        frustration_management:
          id: "WEF-L4-SE-04-01"
          level: 4
          description: "Handling challenges, disruption and change, and recovering from set-backs and adversity."
        stress_management:
          id: "WEF-L4-SE-04-02"
          level: 4
          description: "Dealing with and managing stressful situations in the workplace by following adequate procedures, communicating in a quiet and effective manner, and remaining level-headed when taking decisions."
        adaptation_to_change:
          id: "WEF-L4-SE-04-03"
          level: 4
          description: "Altering one's attitude or behaviour to accommodate modifications in the workplace."
        persistence:
          id: "WEF-L4-SE-04-04"
          level: 4
          description: "Sticking to one's tasks in spite of fatigue or frustration."

  # ---------------------------------------------------------------------------
  # WORKING WITH OTHERS (Level 2)
  # ---------------------------------------------------------------------------
  working_with_others:
    id: "WEF-L2-WO"
    level: 2
    description: "Emotionally intelligent behaviours which help a team to complete tasks effectively by promoting cooperation, communication, respect and mutual upbuilding."

    empathy_active_listening:
      id: "WEF-L3-WO-01"
      level: 3
      description: "Paying attention to what others say and understanding points being made, establishing rapport, adjusting the register, and respecting the intervention of others. Understanding the feelings, points of view and needs of others, and acting in an understanding, sensitive and supportive manner."
      skills:
        empathy:
          id: "WEF-L4-WO-01-01"
          level: 4
          description: "Listening carefully to what other people say and asking appropriate questions to gain better understanding."
        asking_questions:
          id: "WEF-L4-WO-01-02"
          level: 4
          description: "Formulating and asking relevant questions to deepen understanding, clarify information, and drive productive dialogue."
        giving_receiving_feedback:
          id: "WEF-L4-WO-01-03"
          level: 4
          description: "Providing and reacting to professional opinions and directions in a calm, reflective and constructive manner."
        service_orientation:
          id: "WEF-L4-WO-01-04"
          level: 4
          description: "Actively looking for ways to help others as well as to make them feel attended to and welcome."
        following_instructions:
          id: "WEF-L4-WO-01-05"
          level: 4
          description: "Following instructions given verbally or in writing and following standard or agreed procedures."
        assisting_coworkers:
          id: "WEF-L4-WO-01-06"
          level: 4
          description: "Assisting and supporting colleagues, managers, volunteers and other co-workers in the performance of their tasks or in the operations of a business unit."

    teaching_mentoring_coaching:
      id: "WEF-L3-WO-02"
      level: 3
      description: "Facilitating the acquisition of new knowledge and skills."
      skills:
        teaching:
          id: "WEF-L4-WO-02-01"
          level: 4
          description: "Leading and guiding individuals and groups through a process in which they are taught the necessary skills and knowledge for life, future learning, or for a particular job or set of jobs."
        mentoring:
          id: "WEF-L4-WO-02-02"
          level: 4
          description: "Supporting the development of a mentee over an extended period by sharing experiences and expertise, and setting growth targets."
        coaching:
          id: "WEF-L4-WO-02-03"
          level: 4
          description: "Using questioning and structured conversations to support reflection, learning and the development of skills."

    leadership_social_influence:
      id: "WEF-L3-WO-03"
      level: 3
      description: "Having an impact on others in the organisation, and displaying energy and leadership."
      skills:
        persuasion_negotiation:
          id: "WEF-L4-WO-03-01"
          level: 4
          description: "Persuading others to change their minds or behaviour as well as bringing them together and trying to reconcile differences."
        networking:
          id: "WEF-L4-WO-03-02"
          level: 4
          description: "Developing alliances, contacts or partnerships, and exchanging information with clarity and consistency."
        building_trust:
          id: "WEF-L4-WO-03-03"
          level: 4
          description: "Creating a culture that encourages team members to rely on each other and make decisions collaboratively."

  # ---------------------------------------------------------------------------
  # ETHICS (Level 2)
  # ---------------------------------------------------------------------------
  ethics:
    id: "WEF-L2-ET"
    level: 2
    description: "Carrying out workplace activities according to accepted principles of right and wrong, including fairness, transparency and impartiality in work practices and conduct towards other people."

    ethical_leadership:
      id: "WEF-L3-ET-01"
      level: 3
      description: "Ethical attitudes maintain awareness of the societal and environmental impacts of personal and organisational actions, and seek to actively mitigate, prevent and repair harmful impacts."
      skills:
        civic_responsibility:
          id: "WEF-L4-ET-01-01"
          level: 4
          description: "Playing an active role in the global and local community and the application of civic values."
        social_justice:
          id: "WEF-L4-ET-01-02"
          level: 4
          description: "Taking a conscious and active approach to building inclusivity and fairness across wealth, privilege and opportunity."
        socio_cultural_awareness:
          id: "WEF-L4-ET-01-03"
          level: 4
          description: "Respecting and understanding the ideas, customs, and social behaviours of others."
        technology_ethics:
          id: "WEF-L4-ET-01-04"
          level: 4
          description: "Applying moral principles for the responsible use of technology while being mindful of how technology is impacting societies."

    environmental_stewardship:
      id: "WEF-L3-ET-02"
      level: 3
      description: "Sustainably using natural resources and protecting the natural environment."
      skills:
        environmental_awareness:
          id: "WEF-L4-ET-02-01"
          level: 4
          description: "Being mindful of the impact of humans and human activity on the planet."
        sustainable_resource_use:
          id: "WEF-L4-ET-02-02"
          level: 4
          description: "Using natural resources sustainably and efficiently."
        green_technologies:
          id: "WEF-L4-ET-02-03"
          level: 4
          description: "Adopting clean and environmentally sound technologies and industrial processes."
