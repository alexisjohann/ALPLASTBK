    onet_loadings:
      inductive_reasoning: 0.9
      deductive_reasoning: 0.8
      problem_sensitivity: 0.7
      information_ordering: 0.6
      category_flexibility: 0.5
      visualization: 0.4
    retail_application: "Supply chain understanding, store ecosystem management"

