# =============================================================================
# MAPPING QUALITY NOTES
# =============================================================================
quality_notes:
  high_confidence_mappings:
    - "analytical_thinking → deductive/inductive reasoning (well-established)"
    - "leadership_social_influence → oral expression/comprehension (clear construct overlap)"
    - "dependability_attention_to_detail → selective attention/perceptual speed (direct match)"
    - "manual_dexterity_endurance → physical abilities (direct match)"

  medium_confidence_mappings:
    - "creative_thinking → originality/fluency (good but creativity is broader)"
    - "service_orientation → oral abilities (service is also attitudinal)"
    - "resource_management → information ordering (management is multi-faceted)"

  low_confidence_mappings:
    - "motivation_self_awareness → minimal O*NET loading (primarily attitudinal)"
    - "environmental_stewardship → minimal loading (primarily a value)"
    - "ethics → minimal loading (primarily a value)"
    - "curiosity_lifelong_learning → moderate loading (disposition vs. ability)"

  calibration_needed: |
    These mappings are expert-informed initial estimates. For Kaufland application,
    they should be calibrated using:
    1. Criterion validity data (FK assessment scores vs. store KPIs)
    2. Content validity review by Kaufland PX team (Joshua Oster / Susanne Karg)
    3. Factor analysis on actual assessment data (when available)
