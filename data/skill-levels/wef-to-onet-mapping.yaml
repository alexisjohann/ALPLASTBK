# =============================================================================
# WEF SKILL → O*NET ABILITY MAPPING
# =============================================================================
#
# Maps the ~26 WEF cross-functional skills (Level 3) to their primary and
# secondary O*NET ability loadings. This is the CORE MAPPING that enables
# the full hierarchy: Kaufland → WEF → O*NET → Bartram.
#
# Source: WEF Global Skills Taxonomy (2021/2025) + O*NET Content Model
# Mapping: Expert-informed based on construct definitions
#
# Loading interpretation:
#   1.0 = Primary/defining ability for this skill
#   0.7 = Strong secondary loading
#   0.4 = Moderate contribution
#   0.2 = Weak but present
#
# SSOT for: WEF-to-O*NET ability mapping
# Version: 1.0
# Created: 2026-02-22
# =============================================================================

metadata:
  name: "WEF to O*NET Ability Mapping"
  wef_source: "WEF Global Skills Taxonomy 2025 (Level 3: Cross-functional)"
  onet_source: "O*NET Abilities (52 items, Fleishman 1992)"
  mapping_method: "Expert-informed construct alignment"
  version: "1.0"
  created: "2026-02-22"
  note: |
    Loadings are NOT factor-analytic (would require empirical data).
    They represent expert judgment of how strongly each O*NET ability
    underlies each WEF skill. To be calibrated with Kaufland data.

