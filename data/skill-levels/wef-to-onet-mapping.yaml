    wef_id: "WEF-CS-01"
    wef_official_id: "WEF-L4-CS-01-02"
    wef_name: "Analytical Thinking"
    wef_cluster: "Cognitive Skills"
    definition: "Ability to analyze information, identify patterns, and draw logical conclusions"
    bartram_primary: "analyzing_interpreting"
    onet_loadings:
      deductive_reasoning: 1.0
      inductive_reasoning: 0.9
      problem_sensitivity: 0.7
      information_ordering: 0.6
      mathematical_reasoning: 0.5
      flexibility_of_closure: 0.4
      written_comprehension: 0.4
    retail_application: "KPI analysis, root cause analysis, process optimization"

  creative_thinking:
    wef_id: "WEF-CS-02"
    wef_official_id: "WEF-L4-CS-01-01"
    wef_name: "Creative Thinking"
    wef_cluster: "Cognitive Skills"
    definition: "Ability to generate novel ideas and approaches to problems"
    bartram_primary: "creating_conceptualizing"
    onet_loadings:
      originality: 1.0
      fluency_of_ideas: 0.9
      category_flexibility: 0.7
      visualization: 0.5
      inductive_reasoning: 0.4
    retail_application: "Visual merchandising, promotional concepts, customer experience innovation"

  systems_thinking:
    wef_id: "WEF-CS-03"
    wef_official_id: "WEF-L4-CS-01-03"
    wef_name: "Systems Thinking"
    wef_cluster: "Cognitive Skills"
    definition: "Ability to understand how complex systems interact and influence each other"
