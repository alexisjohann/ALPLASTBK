# =============================================================================
# TRANSITIVITAETS-KETTE: ESCO → WEF → O*NET
# =============================================================================
#
# Durch dieses Mapping + wef-to-onet-mapping.yaml entsteht:
#
#   ESCO T4.4 "Leading others"
#     → WEF "Leadership and Social Influence" (coverage 0.9)
#       → O*NET: Oral Expression (0.8), Social Perceptiveness (0.7),
#                Originality (0.5), Problem Sensitivity (0.6)
#
#   ESCO T3.3 "Maintaining a positive attitude"
#     → WEF "Resilience, Flexibility and Agility" (coverage 0.9)
#       → O*NET: Problem Sensitivity (0.6), Flexibility of Closure (0.5),
#                Selective Attention (0.5)
#
# VORSICHT: Transitive Mappings verlieren Praezision bei jedem Schritt.
# Coverage 0.9 × 0.8 = effektiv 0.72.
# Fuer operatives Kaufland-Skill-Management sind DIREKTE Zuordnungen besser.
# Die Kette ist nuetzlich fuer THEORETISCHE Vergleichbarkeit und Forschung.
# =============================================================================
