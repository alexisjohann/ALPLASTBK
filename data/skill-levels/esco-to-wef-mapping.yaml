# =============================================================================
# ESCO Transversal Skills → WEF Global Skills Taxonomy Mapping
# =============================================================================
# Version: 1.0.0
# Erstellt: 2026-02-22
# Zweck: Bruecke zwischen EU-Standard (ESCO) und globalem Standard (WEF)
# Methode: Konzeptuelles Mapping basierend auf Skill-Definitionen
# =============================================================================
#
# WARUM DIESES MAPPING?
#
# ESCO (97 Transversal Skills) und WEF (~35 Level-3 Skills) beschreiben
# DASSELBE KONZEPT mit unterschiedlichem Vokabular:
#
#   ESCO sagt: "T2.2 Planning and organizing"
#   WEF sagt:  "Resource Management" (unter Management Skills)
#
#   ESCO sagt: "T4.4 Leading others"
#   WEF sagt:  "Leadership and Social Influence" (unter Working with Others)
#
# Ohne Mapping koennen wir nicht:
# - EU-Daten (ESCO) mit globalen Benchmarks (WEF) vergleichen
# - Kaufland-Skills gleichzeitig in beiden Sprachen beschreiben
# - O*NET-Abilities (via wef-to-onet-mapping.yaml) indirekt an ESCO anbinden
#
# ARCHITEKTUR:
#   ESCO T-Skills → [dieses Mapping] → WEF L3 → [wef-to-onet] → O*NET Abilities
#                                                                      ↓
#                                                              Kaufland Rollen
# =============================================================================

metadata:
  version: "1.0.0"
  method: "expert_informed_conceptual"
  confidence: "medium"
  note: |
    Mapping basiert auf Skill-Definitionen und konzeptuellem Overlap.
    Kein empirisches Faktor-Analyse-Mapping. Zu validieren mit ESCO-O*NET
    Crosswalk-Daten (https://esco.ec.europa.eu/en/about-esco/data-science-and-esco).

# =============================================================================
# MAPPING-LEGENDE
# =============================================================================
#
# match_type:
#   primary   = Hauptzuordnung (1:1 oder nahe 1:1)
#   secondary = Teilueberlappung (Konzept traegt bei, ist aber breiter/enger)
#   partial   = Nur ein Aspekt ueberlappt
#
# coverage: 0.0-1.0
#   1.0 = ESCO-Cluster wird vollstaendig durch WEF-Skill abgedeckt
#   0.5 = Circa die Haelfte der ESCO-Konzepte findet sich im WEF-Skill
#   0.0 = Keine Ueberlappung
#
# =============================================================================

# =============================================================================
# NAME CROSSWALK: Names used in this file → Official WEF Taxonomy IDs
# =============================================================================
#
# This file uses WEF skill names from the Future of Jobs Report (2025) naming
# convention. The official WEF Global Skills Taxonomy (wef-taxonomy-official.yaml)
# uses different names and hierarchical IDs. This crosswalk resolves the gap.
#
# For programmatic joins, use wef_official_id (added to each mapping entry).
# =============================================================================
name_crosswalk:
  # Names that MATCH official taxonomy (no change needed)
  "Analytical Thinking": {official_id: "WEF-L4-CS-01-02", match: "exact_L4"}
  "Creative Thinking": {official_id: "WEF-L4-CS-01-01", match: "exact_L4"}
  "Systems Thinking": {official_id: "WEF-L4-CS-01-03", match: "exact_L4"}
  "Empathy and Active Listening": {official_id: "WEF-L3-WO-01", match: "exact_L3"}
  "Leadership and Social Influence": {official_id: "WEF-L3-WO-03", match: "exact_L3"}
  "Resilience, Flexibility and Agility": {official_id: "WEF-L3-SE-04", match: "exact_L3"}
  "Curiosity and Lifelong Learning": {official_id: "WEF-L3-SE-02", match: "exact_L3"}
  "Environmental Stewardship": {official_id: "WEF-L3-ET-02", match: "exact_L3"}
  "Dependability and Attention to Detail": {official_id: "WEF-L3-SE-03", match: "exact_L3"}
  "Motivation and Self-Awareness": {official_id: "WEF-L3-SE-01", match: "exact_L3"}
  "Manual Dexterity, Endurance, and Precision": {official_id: "WEF-L3-PA-01", match: "exact_L3"}

  # Names that DIFFER from official taxonomy (FoJ naming or composite)
  "Reading, Writing, and Mathematics":
    official_ids: ["WEF-L3-CS-03", "WEF-L3-CS-02"]
    match: "composite"
    note: "FoJ composite — maps to speaking_writing_languages (L3) + mathematical_statistical_thinking (L3)"
  "Active Learning and Learning Strategies":
    official_id: "WEF-L3-SE-02"
    match: "renamed"
    note: "FoJ name — official taxonomy uses 'curiosity_lifelong_learning'"
  "Complex Problem-Solving":
    official_id: "WEF-L3-CS-01"
    match: "renamed"
    note: "FoJ name — official taxonomy uses 'creativity_problem_solving'"
  "Digital Literacy and Technology Use":
    official_id: "WEF-L3-TS-01"
    match: "renamed"
    note: "FoJ name — official taxonomy uses 'technology_literacy'"
  "Technology Design, Engineering, and Maintenance":
    official_ids: ["WEF-L3-TS-02", "WEF-L3-TS-03"]
    match: "composite"
    note: "FoJ composite — maps to programming (L3) + design_user_experience (L3)"
  "Self-Awareness and Self-Management":
    official_id: "WEF-L3-SE-01"
    match: "renamed"
    note: "FoJ name — official taxonomy uses 'motivation_self_awareness'"
  "Multi-lingualism":
    official_id: "WEF-L4-CS-03-05"
    match: "exact_L4"
    note: "L4 skill within speaking_writing_languages"
  "Global Citizenship":
    official_id: "WEF-L4-ET-01-01"
    match: "renamed_L4"
    note: "FoJ name — official taxonomy uses 'civic_responsibility'"
  "Teaching and Mentoring":
    official_id: "WEF-L3-WO-02"
    match: "close"
    note: "Official name is 'teaching_mentoring_coaching' (includes coaching)"
  "Service Orientation and Customer Service":
    official_ids: ["WEF-L4-WO-01-04", "WEF-L4-MS-05-02"]
    match: "composite_L4"
    note: "Spans service_orientation (WO) + customer_experience (MS)"
  "Talent Management":
    official_id: "WEF-L3-MS-01"
    match: "exact_L3"
    note: "Officially under Management Skills (L2-MS), not Working with Others"
  "Resource Management":
    official_id: "WEF-L3-MS-02"
    match: "renamed"
    note: "Official name is 'operations_logistics'"
  "Operations Management":
    official_id: "WEF-L3-MS-02"
    match: "renamed"
    note: "Same as Resource Management — both map to operations_logistics"
  "Quality Control":
    official_id: "WEF-L3-MS-04"
    match: "close"
    note: "Official name is 'quality_management'"
  "Ethics and Social Responsibility":
    official_id: "WEF-L3-ET-01"
    match: "renamed"
    note: "Official name is 'ethical_leadership'"

mappings:

  # =========================================================================
  # T1: CORE SKILLS → WEF Cognitive + Technology
  # =========================================================================

  T1_1:
    esco_code: "T1.1"
    esco_name: "Applying knowledge (literacy)"
    wef_mappings:
      - wef_L3: "Reading, Writing, and Mathematics"
        wef_official_ids: ["WEF-L3-CS-03", "WEF-L3-CS-02"]
        wef_cluster: "Cognitive Skills"
        match_type: "primary"
        coverage: 0.85
        note: "ESCO literacy ≈ WEF speaking_writing_languages + mathematical_statistical_thinking"
      - wef_L3: "Active Learning and Learning Strategies"
        wef_official_id: "WEF-L3-SE-02"
        wef_cluster: "Cognitive Skills"
        match_type: "secondary"
        coverage: 0.3
        note: "FoJ name — official: curiosity_lifelong_learning (Self-Efficacy, not Cognitive)"

