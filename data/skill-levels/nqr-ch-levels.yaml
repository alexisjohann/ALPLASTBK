# =============================================================================
# SCHWEIZER BESONDERHEITEN (NICHT in DE/AT vorhanden)
# =============================================================================

schweizer_besonderheiten:

  berufsmaturitaet:
    description: |
      Die Berufsmaturitaet (BM) ist ein einzigartig schweizerisches Instrument.
      Sie kombiniert die berufliche Grundbildung (EFZ) mit erweiterter
      Allgemeinbildung und oeffnet den Zugang zu Fachhochschulen.
    typen:
      bm_i: "Waehrend der Lehre (lehrbegleitend)"
      bm_ii: "Nach der Lehre"
    zugang: "FH ohne Aufnahmepruefung (fachgebunden)"
    passerelle: "BM + Ergaenzungspruefung → Zugang zu Universitaeten"
    statistik: "Ca. 15% aller EFZ-Absolventen erwerben BM"

  hoehere_fachschulen:
    description: |
      Hoehere Fachschulen (HF) sind in der Schweiz ein eigenstaendiger,
      etablierter Bildungsweg auf Tertiaerstufe. In Deutschland gibt es
      kaum ein Aequivalent (die deutsche "Fachschule" ist weniger prestigetraechtig).
    retail_relevanz: |
      Dipl. Betriebswirtschafter/in HF ist einer der haeufigsten
      Abschluesse fuer Filialleiter/innen im Schweizer Retail.
    dauer: "2-3 Jahre Vollzeit oder 3-4 Jahre berufsbegleitend"

  gav_detailhandel:
    description: |
      Gesamtarbeitsvertrag (GAV) fuer den Detailhandel — regelt
      Mindestloehne, Arbeitszeiten, Ferien fuer die Branche.
    geltungsbereich: "Landesmantelvertrag Detailhandel"
    mindestloehne_2025:
      ungelernt: "CHF 3'600/Monat (13 Monatsloehnne)"
      eba: "CHF 3'900/Monat"
      efz: "CHF 4'200/Monat"
      note: "Regional und firmenspezifisch unterschiedlich"

  mehrsprachigkeit:
    description: |
      Schweizer Berufsbildungsabschluesse existieren in 3 Sprachen.
      Die Berufsbezeichnungen variieren:
    beispiel_detailhandelsfachmann:
      de: "Detailhandelsfachmann/-frau EFZ"
      fr: "Gestionnaire du commerce de detail CFC"
      it: "Impiegato/a del commercio al dettaglio AFC"
    relevanz: |
      Fuer internationale Retail-Unternehmen wichtig:
      Migros, Coop, Denner, Manor operieren in allen Sprachregionen.
