# =============================================================================
# KAUFLAND ROLE → WEF SKILL PROFILES
# =============================================================================
#
# Maps Kaufland job roles to WEF cross-functional skills with required levels.
# Each role specifies: which WEF skills are needed, at what level (1-7),
# and with what importance (0-5).
#
# This file enables:
# 1. Skill gap analysis per role (demand vs. supply)
# 2. Transferability computation between roles (cosine similarity)
# 3. Development path planning (which skills to build for next role)
# 4. Context-dependent weighting (via Psi-modifiers from KIBSM)
#
# Source: Expert-informed based on Kaufland project context (KIBSM MOD-013)
# Calibration: To be validated with Kaufland PX team (Phase 2)
#
# SSOT for: Kaufland role-skill requirements
# Version: 1.0
# Created: 2026-02-22
# =============================================================================

metadata:
  name: "Kaufland Role-Skill Profiles"
  customer_id: "CUS-KAUF"
  model_ref: "MOD-013 (KIBSM)"
  scale_ref: "data/skill-levels/level-scale.yaml"
  wef_ref: "data/skill-levels/wef-to-onet-mapping.yaml"
  dqr_ref: "data/skill-levels/dqr-eqf-levels.yaml"
  nqr_ch_ref: "data/skill-levels/nqr-ch-levels.yaml"
  nqr_at_ref: "data/skill-levels/nqr-at-levels.yaml"
  dach_transferability_ref: "data/skill-levels/dach-transferability.yaml"
  version: "1.1"
  created: "2026-02-22"
  updated: "2026-02-22"
  calibration_status: "expert_informed"
  note: |
    Level = Required level for the role (1-7 scale)
    Importance = How critical this skill is for role success (0-5)
    These are JOB REQUIREMENTS, not person assessments.
    DACH qualification mappings reference DQR (DE), NQR-CH (CH), NQR-AT (AT).

