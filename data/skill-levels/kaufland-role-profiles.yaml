# =============================================================================
# TRANSFERABILITY MATRIX (pre-computed cosine similarities)
# =============================================================================

transferability:
  description: |
    Cosine similarity between role profiles based on their WEF skill vectors.
    Higher values indicate easier transitions with less retraining needed.

  matrix:
    #                    REGAL  KASSE  VERKAUF  ABT.L  ST.ML  ML    BZL
    regaleinraeumer:   [1.00,  0.72,  0.58,    0.45,  0.38,  0.32, 0.25]
    kassierer:         [0.72,  1.00,  0.78,    0.55,  0.48,  0.42, 0.30]
    verkaufsberater:   [0.58,  0.78,  1.00,    0.70,  0.62,  0.55, 0.40]
    abteilungsleiter:  [0.45,  0.55,  0.70,    1.00,  0.88,  0.78, 0.62]
    stellv_marktleiter: [0.38,  0.48,  0.62,    0.88,  1.00,  0.92, 0.75]
    marktleiter:       [0.32,  0.42,  0.55,    0.78,  0.92,  1.00, 0.85]
    bezirksleiter:     [0.25,  0.30,  0.40,    0.62,  0.75,  0.85, 1.00]

  interpretation:
    highest_transfer: "Stellv. ML → ML (0.92) — natuerlicher Karriereschritt"
    critical_gap: "Verkauf → Abt.Leitung (0.70) — erster Fuehrungssprung, groesster Skill-Shift"
    surprising: "Regal → Kasse (0.72) — hoeher als erwartet, gemeinsame Basis in Dependability + Physical"

# =============================================================================
# DEVELOPMENT GAPS: KEY TRANSITIONS
# =============================================================================

development_paths:
  verkauf_to_abteilungsleitung:
    name: "Erster Fuehrungsschritt"
    skill_gaps:
      leadership_social_influence: {current: 0, needed: 4, gap: 4, priority: "critical"}
      resource_management_operations: {current: 0, needed: 4, gap: 4, priority: "critical"}
      analytical_thinking: {current: 3, needed: 4, gap: 1, priority: "medium"}
      talent_management: {current: 0, needed: 3, gap: 3, priority: "high"}
    development_time: "6-12 Monate"
    kaufland_programme: "FK-Entwicklungsprogramm (PX)"
    ebf_insight: |
      Der Sprung von Fachkraft zu Fuehrung ist der GROESSTE Skill-Shift
      in der Kaufland-Karriereleiter. Leadership und Resource Management
      sind KOMPLETT neu (Gap = 4). Das ist der Punkt, an dem Kauflands
      PX-Abteilung den groessten Hebel hat.

  marktleitung_to_bezirksleitung:
    name: "Multi-Store-Leadership"
    skill_gaps:
      leadership_social_influence: {current: 6, needed: 7, gap: 1, priority: "high"}
      systems_thinking: {current: 4, needed: 5, gap: 1, priority: "high"}
      analytical_thinking: {current: 5, needed: 6, gap: 1, priority: "high"}
      talent_management: {current: 5, needed: 6, gap: 1, priority: "medium"}
      creative_thinking: {current: 3, needed: 5, gap: 2, priority: "medium"}
      ai_big_data: {current: 3, needed: 4, gap: 1, priority: "medium"}
    development_time: "12-24 Monate"
    kaufland_programme: "Senior Leadership Development"
    ebf_insight: |
      Die Gaps sind kleiner (max 2) aber BREITER (6 Skills gleichzeitig).
      Der Shift ist von "eine Filiale optimieren" zu "ein System steuern".
      Creative Thinking (Gap 2) ist ueberraschend wichtig — BZL muessen
      Innovationen ueber Maerkte skalieren.
