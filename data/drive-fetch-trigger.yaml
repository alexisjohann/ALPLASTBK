# =============================================================================
# GOOGLE DRIVE FETCH TRIGGER
# =============================================================================
# Push this file to trigger the fetch-google-drive.yml workflow.
# Works from Claude Code sandbox WITHOUT needing GH_TOKEN.
#
# Usage:
#   1. Edit this file with the file_id you want to download
#   2. git add data/drive-fetch-trigger.yaml && git commit && git push
#   3. GitHub Actions will download the file and commit results
#   4. git pull to get the downloaded file
#
# Alternative: bash scripts/api.sh drive download <FILE_ID>
# =============================================================================

# Google Drive File ID (from share URL)
# URL: https://drive.google.com/file/d/<FILE_ID>/view
file_id: '1YlqZ8PRbis5_uyPxBuVLQQ4DQBClVzIg'

# Output filename (optional - gdown auto-detects if empty)
output_name: 'jep_vol40_winter2026.pdf'

# Convert PDF to text (true/false)
convert_pdf: true

# Split journal volume into individual papers (true/false)
split_papers: true

# Triggered at (auto-updated)
triggered_at: '2026-02-19'
