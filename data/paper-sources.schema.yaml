# ============================================================================
# EBF PAPER-SOURCES REGISTRY SCHEMA
# ============================================================================
#
# ACHTUNG: Diese Datei ist die EINZIGE autoritative Quelle für die Struktur
# der Paper-Sources Registry Datenbank. Alle YAML Einträge in
# data/paper-sources.yaml MÜSSEN mit dieser Definition konsistent sein.
#
# Version: 1.0
# Erstellt: 2026-01-18
# ============================================================================

version: "1.0"
created: "2026-01-18"
description: "Authoritative schema for EBF Paper-Sources Registry database (1,784+ papers)"

# ============================================================================
# CORE ENTITIES
# ============================================================================

entities:

  # =========================================================================
  # PAPER ENTITY: Master record for each scientific paper/source
  # =========================================================================
  Paper:
    description: "A scientific paper or source with full bibliographic metadata, 10C indexing, and validation"
    required_fields:
      id:
        type: string
        pattern: "^[a-z0-9]+[a-z0-9]{4,20}$"
        example: "PAP-kahneman1979prospectprospect"
        immutable: true
        description: "Unique identifier: lowercase lastname + year + key word"

      authors:
        type: array
        items:
          type: string
          pattern: "^[A-Z][a-z]+, [A-Z][a-z]*$"
        min_items: 1
        max_items: 20
        example: ["Kahneman, Daniel", "Tversky, Amos"]

      year:
        type: integer
        min: 1972  # EBF coverage starts 1972
        max: 2026
        description: "Publication year"

      title:
        type: string
        min_length: 10
        max_length: 500

      journal:
        type: string
        min_length: 3
        max_length: 200
        description: "Journal name (e.g., Econometrica, AER, Nature)"

      type:
        type: enum
        allowed: ["journal_article", "book_chapter", "conference_paper", "working_paper", "book", "dissertation", "report"]

      status:
        type: enum
        allowed: ["seminal", "published", "draft", "in_review", "deprecated"]
        description: "Publication/verification status"

      relevance:
        type: enum
        allowed: ["high", "medium", "low"]
        description: "Relevance to EBF (high = foundational to EBF)"

    optional_fields:
      volume:
        type: integer
        min: 1

      issue:
        type: integer
        min: 1

      pages:
        type: object
        fields:
          start: integer
          end: integer

      doi:
        type: string
        pattern: "^10\\.[0-9]+/[a-zA-Z0-9.\\-/\\(\\)]+$"
        example: "10.2307/1914185"

      url:
        type: url

      citations:
        type: integer
        min: 0
        description: "Citation count from Google Scholar or similar"

      abstract:
        type: string
        max_length: 1000

      keywords:
        type: array
        items:
          type: string
        max_items: 10

  # =========================================================================
  # KEY_FINDINGS ENTITY: Empirical findings from the paper
  # =========================================================================
  KeyFinding:
    description: "An individual empirical finding or effect from the paper"
    required_fields:
      finding:
        type: string
        min_length: 20
        max_length: 500
        description: "Concise statement of the finding"

      domain:
        type: enum
        allowed: ["finance", "health", "sustainability", "hr", "social_policy", "education", "behavior", "general"]
        description: "Primary application domain"

      stage:
        type: enum
        allowed: ["awareness", "contemplation", "preparation", "action", "maintenance", "termination"]
        description: "Behavior change journey phase where finding applies"

      primary_dimension:
        type: enum
        allowed: ["F", "E", "P", "S", "D", "E2"]
        description: "FEPSDE dimension (Financial, Emotional, Psychological, Social, Development, Environment)"

    optional_fields:
      effect_size:
        type: number
        min: 0.0
        max: 100.0
        description: "Effect size (λ, γ, σ, etc.) from the paper"

      confidence_interval:
        type: object
        fields:
          lower: number
          upper: number
          confidence_level: number  # 0.95, 0.90, etc.

      secondary_dimensions:
        type: array
        items:
          type: enum
          allowed: ["F", "E", "P", "S", "D", "E2"]

  # =========================================================================
  # NINE_C_COORDINATES ENTITY: 10C indexing for the paper
  # =========================================================================
  NineC_Coordinates:
    description: "Mapping of paper findings to 10C Framework dimensions"
    required_fields:
      domain:
        type: enum
        allowed: ["finance", "health", "sustainability", "hr", "social_policy", "education", "behavior", "general"]

      primary_dimension:
        type: enum
        allowed: ["F", "E", "P", "S", "D", "E2"]
        description: "WHAT dimension"

    optional_fields:
      stages:
        type: array
        items:
          type: enum
          allowed: ["awareness", "contemplation", "preparation", "action", "maintenance", "termination"]
        description: "WHEN - behavior change stages covered"

      psi_dominant:
        type: string
        enum: ["framing", "social_context", "scarcity", "cultural", "institutional", "temporal", "other"]
        description: "WHEN - dominant context dimension (Ψ)"

      gamma:
        type: number
        min: -1.0
        max: 1.0
        description: "HOW - estimated complementarity coefficient"

      A_level:
        type: number
        min: 0.0
        max: 1.0
        description: "AWARE - awareness level affected by this paper"

      W_level:
        type: number
        min: 0.0
        max: 1.0
        description: "READY - willingness/readiness level"

      awareness_type:
        type: enum
        allowed: ["explicit", "implicit", "visceral"]
        description: "Type of awareness described"

      key_insight:
        type: string
        max_length: 300
        description: "High-level insight from this paper's 10C mapping"

      welfare_level:
        type: enum
        allowed: ["L0", "L1", "L2", "L3"]
        description: "WHO - welfare hierarchy level (Individual to Society)"

  # =========================================================================
  # LITERATURE_APPENDIX MAPPING ENTITY
  # =========================================================================
  LitAppendixMapping:
    description: "Links paper to its corresponding LIT- or REF- Appendix"
    required_fields:
      lit_appendix:
        type: string
        pattern: "^[A-Z]$"
        example: "U"
        description: "Code of LIT- or REF- Appendix (A-Z)"

    optional_fields:
      appendix_section:
        type: string
        example: "Foundation Authors"

  # =========================================================================
  # LINKED_CASES ENTITY: Links to relevant Case Registry entries
  # =========================================================================
  LinkedCase:
    description: "Reference to a Case Registry entry that uses this paper"
    required_fields:
      case_id:
        type: string
        pattern: "^CASE-[0-9]{3,4}$"
        example: "CASE-010"

  # =========================================================================
  # VALIDATION ENTITY: Verification and confidence levels
  # =========================================================================
  Validation:
    description: "Verification status and quality assurance"
    required_fields:
      verification_status:
        type: enum
        allowed: ["verified", "in_review", "flagged", "deprecated"]
        description: "Has paper been verified/checked for EBF consistency?"

    optional_fields:
      last_verified:
        type: date
        format: "YYYY-MM-DD"

      verifier:
        type: string

      verification_notes:
        type: string
        max_length: 500

      evidence_tier:
        type: integer
        min: 1
        max: 5
        description: "1=Seminal foundational, 5=Tertiary confirmatory"

      quality_score:
        type: number
        min: 0.0
        max: 1.0
        description: "Overall quality/relevance to EBF (0.0-1.0)"

  # =========================================================================
  # USAGE_STATISTICS ENTITY: Tracks how often paper is referenced
  # =========================================================================
  UsageStatistics:
    description: "Internal usage statistics within EBF"
    optional_fields:
      case_count:
        type: integer
        min: 0
        description: "Number of Case Registry entries linked to this paper"

      intervention_count:
        type: integer
        min: 0
        description: "Number of Intervention Registry entries using this paper"

      model_count:
        type: integer
        min: 0
        description: "Number of seed models in Model Registry using this paper"

      citation_frequency:
        type: integer
        min: 0
        description: "How many times referenced in EBF appendices/chapters"

# ============================================================================
# RELATIONSHIPS (Foreign Keys & Constraints)
# ============================================================================

relationships:
  Paper_KeyFindings:
    from: Paper
    to: KeyFinding
    cardinality: "1:N"
    description: "A paper contains multiple key findings"

  Paper_NineC:
    from: Paper
    to: NineC_Coordinates
    cardinality: "1:N"
    description: "A paper can be mapped to multiple 10C domains"

  Paper_LitAppendix:
    from: Paper
    to: LitAppendixMapping
    cardinality: "1:1"
    description: "Each paper maps to one primary LIT- or REF- Appendix"

  Paper_LinkedCases:
    from: Paper
    to: LinkedCase
    cardinality: "1:N"
    description: "A paper can be linked to many cases"

  Paper_Validation:
    from: Paper
    to: Validation
    cardinality: "1:1"
    description: "Each paper has validation metadata"

# ============================================================================
# CONSTRAINTS & VALIDATION RULES
# ============================================================================

constraints:
  author_format:
    rule: "Author names must follow 'FirstName, LastName' pattern"
    validation: "^[A-Z][a-z]+, [A-Z][a-z]*$"

  year_coverage:
    rule: "Papers must be from 1972 onwards (EBF coverage start)"
    range: [1972, 2026]

  domain_required:
    rule: "All papers must have at least one domain classification"
    check: "NOT NULL domain in all 9C_Coordinates"

  dimension_coding:
    rule: "primary_dimension must be single FEPSDE code"
    allowed: ["F", "E", "P", "S", "D", "E2"]

  case_linking:
    rule: "High-relevance papers should have case_count > 0"
    condition: "IF relevance = 'high' THEN case_count > 0"

  lit_appendix_validity:
    rule: "lit_appendix must reference existing LIT- or REF- Appendix"
    check: "Appendix code must exist in appendices/00_appendix_index.tex"

  unique_id:
    rule: "Paper IDs must be globally unique"
    check: "UNIQUE constraint on id"

  verification_status_transition:
    rule: "Can only transition: in_review → verified/flagged, never backwards from verified"
    allowed_transitions:
      in_review: ["verified", "flagged"]
      verified: []
      flagged: ["verified"]
      deprecated: []

  evidence_tier_distribution:
    rule: "Tier distribution should reflect paper importance"
    expected: "Tier 1-2: 10-15% (seminal), Tier 3: 30% (foundational), Tier 4-5: 55% (confirmatory)"

# ============================================================================
# DATABASE OPERATIONS
# ============================================================================

operations:
  CREATE:
    required_fields: ["id", "authors", "year", "title", "journal", "type", "status", "relevance"]
    validation: "All required fields must be present and valid"

  UPDATE:
    immutable_fields: ["id", "authors", "year", "title"]
    mutable_fields: ["status", "relevance", "verification_status", "case_count", "last_verified"]
    note: "Changing core metadata requires archival of old version"

  DELETE:
    rule: "Soft-delete only: set status to 'deprecated'"
    rationale: "Maintain historical references and case linking"

  QUERY:
    supported_queries:
      - "SELECT * FROM papers WHERE domain = 'finance' AND relevance = 'high'"
      - "SELECT * FROM papers WHERE evidence_tier <= 2"
      - "SELECT * FROM papers WHERE primary_dimension = 'F' AND stage = 'action'"
      - "SELECT * FROM papers WHERE verification_status = 'flagged'"
      - "SELECT * FROM papers ORDER BY case_count DESC"

  BULK_OPERATIONS:
    update_statistics: "Recalculate case_count, intervention_count annually"
    verification_review: "Review all papers with verification_status != 'verified' quarterly"

# ============================================================================
# SCHEMA VALIDATION RULES
# ============================================================================

validation_rules:
  rule_1:
    description: "All required fields must be present and non-null"
    check: "NOT NULL constraint"

  rule_2:
    description: "Paper IDs must be unique globally"
    check: "UNIQUE constraint on id"

  rule_3:
    description: "Author names must follow standardized format"
    check: "Pattern: ^[A-Z][a-z]+, [A-Z][a-z]*$"

  rule_4:
    description: "Year must be within EBF coverage (1972-2026)"
    check: "1972 <= year <= 2026"

  rule_5:
    description: "At least one 10C coordinate must exist"
    check: "COUNT(9C_Coordinates) >= 1"

  rule_6:
    description: "Gamma coefficient must be between -1.0 and 1.0"
    check: "-1.0 <= gamma <= 1.0"

  rule_7:
    description: "Awareness and willingness levels must be [0,1]"
    check: "0.0 <= A_level <= 1.0 AND 0.0 <= W_level <= 1.0"

  rule_8:
    description: "Foreign key constraints for linked cases"
    check: "All CASE-* IDs must exist in case-registry.yaml"

  rule_9:
    description: "LitAppendix must exist in appendix index"
    check: "Appendix code (single letter) must be valid"

  rule_10:
    description: "High-relevance papers should have multiple cases"
    check: "IF relevance = 'high' THEN case_count >= 2"

# ============================================================================
# MIGRATION & VERSIONING
# ============================================================================

versioning:
  current_version: "1.0"
  backward_compatible: true
  migration_notes: |
    No previous version.
    Initial schema created January 18, 2026 to standardize 1,784 papers.

# ============================================================================
# QUALITY ASSURANCE CHECKLIST
# ============================================================================

qa_checklist:
  - "All 1,784 papers have valid IDs"
  - "All authors follow 'FirstName, LastName' format"
  - "All papers have domain classification"
  - "All papers have 10C coordinates"
  - "Verification status is assigned to all papers"
  - "High-relevance papers have case links"
  - "LitAppendix mappings are valid"
  - "No duplicate papers"

---

