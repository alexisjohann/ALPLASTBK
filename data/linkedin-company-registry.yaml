# =============================================================================
# LINKEDIN COMPANY REGISTRY
# =============================================================================
# Tracks LinkedIn company profiles for competitive intelligence.
#
# Structure:
#   companies:
#     COMP-{NAME}:
#       name: "Company Name"
#       linkedin_url: "https://linkedin.com/company/..."
#       category: client | competitor | target | research
#       current: {...}     # Latest snapshot
#       snapshots: [...]   # Historical data (weekly)
#
# Usage:
#   - Add companies to monitor
#   - GitHub Action runs weekly (Friday 15:00 CH)
#   - Alerts generated for significant changes (>10% employee, >20% followers)
#
# API: Proxycurl ($10/month for 300 credits)
# =============================================================================

