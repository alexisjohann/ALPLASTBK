# ═══════════════════════════════════════════════════════════════════════════
# GENRE OPERATIONS
# ═══════════════════════════════════════════════════════════════════════════

operations:

  # Combine genre constraints with author style
  combine:
    formula: "θ_final = θ_genre ⊕ θ_author"
    description: "Genre provides structure, author provides style"
    priority: "genre_constraints > author_preferences"

  # Adapt genre for different audience
  adapt:
    formula: "θ_adapted = θ_genre + Δθ(audience)"
    description: "Modify genre for specific audience"

  # Validate against genre constraints
  validate:
    formula: "valid = ∀c ∈ constraints(genre): c(text)"
    description: "Check if text satisfies all genre constraints"

