# ═══════════════════════════════════════════════════════════════════════════
# SWSM GENRE PROFILES
# ═══════════════════════════════════════════════════════════════════════════
#
# Genre-spezifische θ-Parameter für verschiedene Dokumenttypen.
# Diese Profile definieren die STRUKTUR und CONSTRAINTS eines Genres,
# unabhängig vom persönlichen Schreibstil des Autors.
#
# Verwendung:
#   generate_text(content, genre="ebf_appendix")
#   generate_text(content, genre="policy_brief", author="fehr")
#
# Unterschied zu Author Profiles:
#   - GENRE = WAS geschrieben wird (Struktur, Moves, Constraints)
#   - AUTHOR = WIE geschrieben wird (Stil, Vokabular, Satzlänge)
#
# Kombination:
#   θ_final = θ_genre ⊕ θ_author
#   (Genre-Constraints + persönlicher Stil)
#
# Referenz: Appendix SW (METHOD-SWSM), Section 6 Example 5
# ═══════════════════════════════════════════════════════════════════════════

metadata:
  version: "1.0.0"
  created: "2026-01-29"
  description: "SWSM Genre Profiles - Document Type Specifications"
  ssot: "appendices/SW_METHOD-SWSM_scientific_writing_structure_model.tex"

# ═══════════════════════════════════════════════════════════════════════════
# GENRE PROFILE SCHEMA
# ═══════════════════════════════════════════════════════════════════════════

schema:
  description: "Schema für Genre-Profile"

  required_fields:
    - metadata.name
    - metadata.8d_coordinates
    - theta_move
    - generation_constraints

  optional_fields:
    - theta_cohesion
    - theta_rst
    - theta_lexicogrammar
    - theta_info
    - theta_vocab

# ═══════════════════════════════════════════════════════════════════════════
# EBF DOCUMENTATION GENRES
# ═══════════════════════════════════════════════════════════════════════════

genres:

  # ─────────────────────────────────────────────────────────────────────────
  # EBF APPENDIX: Scientific Technical Documentation
  # ─────────────────────────────────────────────────────────────────────────
  #
  # Das EBF Appendix ist ein technisches Dokumentationsformat mit:
  # - 4-Part Struktur (Front Matter, Core Content, Application, Back Matter)
  # - Formale Axiomensysteme
  # - Bidirektionale Cross-References
  # - Worked Examples als Pflicht
  #
  # 8D-Koordinaten (aus Appendix DTE):
  #   D₁ (Wissen):     0.85  (Expert audience)
  #   D₂ (Nähe):       0.75  (Close to field)
  #   D₃ (Reichweite): 0.60  (Societal relevance)
  #   D₄ (Zeit):       0.70  (Detailed reading)
  #   D₅ (Ziel):       G₁    (Inform)
  #   D₆ (Kontext):    1.00  (Public/External)
  #   D₇ (Emotion):    0.15  (Highly objective)
  #   D₈ (Persistenz): 0.90  (Archival)
  # ─────────────────────────────────────────────────────────────────────────

  ebf_appendix:
    metadata:
      name: "EBF Appendix"
      description: "Evidence-Based Framework Technical Appendix"
      version: "1.0.0"
      template: "appendices/00_appendix_template.tex"
      category: "EBF_INTERNAL"
      8d_coordinates:
        D1_knowledge: 0.85
        D2_proximity: 0.75
        D3_scope: 0.60
        D4_time: 0.70
        D5_goal: "G1_inform"
        D6_context: 1.00
        D7_emotion: 0.15
        D8_persistence: 0.90

    # ─────────────────────────────────────────────────────────────────────
    # θ_MOVE: Rhetorische Move-Sequenz für EBF Appendices
    # ─────────────────────────────────────────────────────────────────────
    theta_move:
      structure: "4-Part"
      parts:
        - name: "Front Matter"
          moves: ["Abstract", "Quick Reference", "Scope Box"]
        - name: "Core Content"
          moves: ["Fundamental Question", "Theory", "Axioms"]
        - name: "Application"
          moves: ["Worked Examples", "Integration"]
        - name: "Back Matter"
          moves: ["Summary", "Critical Foundations", "References"]

      territory:
        length_sentences: 8.0
        strategy_distribution:
          centrality_claiming: 0.35
          topic_generalization: 0.25
          literature_review: 0.40

      niche:
        marker_distribution:
          however: 0.15
          yet: 0.10
          but: 0.20
          nevertheless: 0.10
          although: 0.15
          other: 0.30
        strategy_distribution:
          counter_claiming: 0.20
          gap_indication: 0.50
          question_raising: 0.30

      occupy:
        strategy_distribution:
          purpose_statement: 0.30
          findings_preview: 0.35
          structure_indication: 0.35
        hypothesis_explicit: 0.85

      axiom_presentation:
        avg_axioms_per_section: 4.0
        formality_level: 0.90
        interpretation_required: true

      integration:
        bidirectional_required: true
        connection_types:
          - provides
          - requires
          - consistent_with

      worked_example:
        required: true
        structure:
          - setup
          - application
          - result
          - discussion
        avg_length_words: 500

    theta_cohesion:
      lexical_density: 0.72
      reference_chain_length: 12.0
      conjunction_frequency: 0.35
      symbol_consistency: 1.00
      cross_reference_density: 0.25
      tcolorbox_frequency: 0.15

    theta_rst:
      relation_distribution:
        elaboration: 0.30
        evidence: 0.20
        cause: 0.10
        result: 0.08
        contrast: 0.10
        concession: 0.05
        condition: 0.07
        purpose: 0.05
        background: 0.03
        temporal: 0.02
      tree_depth_mean: 4.5
      nucleus_satellite_ratio: 1.2

    theta_lexicogrammar:
      nominalization_rate: 0.65
      passive_rate: 0.35
      hedging_density: 0.08
      sentence_length:
        mean: 24.0
        std: 8.0
      mood_distribution:
        declarative: 0.92
        interrogative: 0.05
        imperative: 0.03
      latex_density: 0.40
      equation_frequency: 0.12

    theta_info:
      given_new_ratio: 0.45
      theme_type_distribution:
        topical: 0.70
        textual: 0.25
        interpersonal: 0.05

    theta_vocab:
      type_token_ratio: 0.58
      first_person_usage: 0.02
      technical_term_density: 0.35
      symbol_density: 0.15
      required_terms:
        - appendix
        - axiom
        - proposition
        - definition
        - theorem
        - corollary
        - proof
        - worked_example
        - cross_reference
        - integration
      avoid_patterns:
        - "I think"
        - "In my opinion"
        - "It seems"
        - "Maybe"
        - "Probably"

    generation_constraints:
      required_sections:
        - "Header Block"
        - "Cross-Reference Map"
        - "Quick Reference Box"
        - "Appendix Scope Box"
        - "The Fundamental Question"
        - "Core Theory"
        - "Worked Example"
        - "Summary"
        - "Glossary of Symbols"
        - "References"
      required_boxes:
        - "Quick Reference"
        - "Scope Box"
        - "Fundamental Question"
        - "Summary"
      symbol_consistency:
        check_against: "Appendix GLS"
        require_definition: true
      bibliography:
        master_bib: "bcm_master.bib"
        require_nocite: true

  # ─────────────────────────────────────────────────────────────────────────
  # EBF CHAPTER: Conceptual Narrative with Intuition
  # ─────────────────────────────────────────────────────────────────────────
  #
  # EBF Chapters sind das Gegenstück zu Appendices:
  # - Konzeptionelle Narrative, Intuition, Motivation
  # - Zugänglicher Prosa-Stil, minimaler Formalismus
  # - Zielgruppe: Ökonomen, Policy Maker, PhD-Studenten
  # - Derivationen → Appendices delegiert
  #
  # 8D-Koordinaten:
  #   D₁ (Wissen):     0.70  (Educated but not specialist)
  #   D₂ (Nähe):       0.60  (Accessible to economists)
  #   D₃ (Reichweite): 0.70  (Policy-relevant)
  #   D₄ (Zeit):       0.60  (Moderate reading time)
  #   D₅ (Ziel):       G₁    (Inform + some G₃ Persuade)
  #   D₆ (Kontext):    1.00  (Public/External)
  #   D₇ (Emotion):    0.35  (More engaging than appendix)
  #   D₈ (Persistenz): 0.85  (Archival but evolving)
  # ─────────────────────────────────────────────────────────────────────────

  ebf_chapter:
    metadata:
      name: "EBF Chapter"
      description: "Evidence-Based Framework Main Document Chapter"
      version: "1.0.0"
      template: "chapters/00_chapter_template.tex"
      category: "EBF_INTERNAL"
      chapter_types:
        - code: "A"
          name: "CORE Chapter"
          chapters: [5, 9, 10, 11, 12, 13]
          features: ["CORE Connection Box", "10C Integration Table"]
        - code: "B"
          name: "Foundation Chapter"
          chapters: [1, 2, 3, 4, 6, 7, 8]
          features: ["Standard structure"]
        - code: "C"
          name: "Application Chapter"
          chapters: [14, 15, 16, 17, 18, 19]
          features: ["Multiple worked examples", "Policy implications"]
      8d_coordinates:
        D1_knowledge: 0.70
        D2_proximity: 0.60
        D3_scope: 0.70
        D4_time: 0.60
        D5_goal: "G1_inform"
        D6_context: 1.00
        D7_emotion: 0.35
        D8_persistence: 0.85

    theta_move:
      structure: "6-Part"
      parts:
        - name: "Header"
          moves: ["Metadata", "Prerequisites"]
        - name: "Opening"
          moves: ["Intuition Box", "Central Question"]
        - name: "Content"
          moves: ["Overview", "Main Sections"]
        - name: "Formal"
          moves: ["Formal Framework"]
          condition: "TYPE A only"
        - name: "Examples"
          moves: ["Worked Examples"]
          condition: "TYPE C: ≥2"
        - name: "Closing"
          moves: ["Reading Path", "Cross-References"]

      territory:
        length_sentences: 12.0
        strategy_distribution:
          centrality_claiming: 0.45
          topic_generalization: 0.35
          literature_review: 0.20

      niche:
        marker_distribution:
          however: 0.20
          yet: 0.15
          but: 0.25
          nevertheless: 0.10
          although: 0.10
          other: 0.20
        strategy_distribution:
          counter_claiming: 0.25
          gap_indication: 0.40
          question_raising: 0.35

      occupy:
        strategy_distribution:
          purpose_statement: 0.35
          findings_preview: 0.30
          structure_indication: 0.35
        hypothesis_explicit: 0.60

      intuition_box:
        required: true
        position: "after_opening"
        uses_named_characters: true
        avg_length_sentences: 6

      central_question_box:
        required: true
        format: "fcolorbox"
        references_9_bcm_questions: true

      chapter_overview:
        required: true
        uses_section_refs: true
        avg_items: 5

      worked_examples:
        required: true
        min_count: 1
        uses_named_characters: true
        structure:
          - baseline
          - intervention
          - after_intervention
        before_after_comparison: true

      reading_path:
        required: true
        position: "end"
        references_appendices: true
        references_next_chapter: true

    theta_cohesion:
      lexical_density: 0.58
      reference_chain_length: 6.0
      conjunction_frequency: 0.40
      appendix_reference_density: 0.15
      intuition_box_density: 0.08
      cross_reference_density: 0.20

    theta_rst:
      relation_distribution:
        elaboration: 0.28
        evidence: 0.12
        cause: 0.08
        result: 0.08
        contrast: 0.12
        concession: 0.06
        condition: 0.05
        purpose: 0.10
        background: 0.08
        temporal: 0.03
      tree_depth_mean: 3.5
      nucleus_satellite_ratio: 1.4

    theta_lexicogrammar:
      nominalization_rate: 0.45
      passive_rate: 0.25
      hedging_density: 0.06
      sentence_length:
        mean: 18.0
        std: 6.0
      mood_distribution:
        declarative: 0.88
        interrogative: 0.08
        imperative: 0.04
      latex_density: 0.20
      equation_frequency: 0.06

    theta_info:
      given_new_ratio: 0.55
      theme_type_distribution:
        topical: 0.60
        textual: 0.30
        interpersonal: 0.10

    theta_vocab:
      type_token_ratio: 0.52
      first_person_usage: 0.08
      technical_term_density: 0.20
      symbol_density: 0.08
      named_characters:
        - "Anna"
        - "Thomas"
        - "Maria"
        - "Peter"
        - "Lisa"
      required_terms:
        - chapter
        - section
        - intuition
        - definition
        - example
        - appendix
        - framework
      prefer_patterns:
        - "This chapter"
        - "We can see"
        - "Consider"
        - "In other words"
        - "The key insight"
      avoid_patterns:
        - "Obviously"
        - "Clearly"
        - "Trivially"

    generation_constraints:
      required_sections:
        - "Header Block"
        - "Navigation Box"
        - "Appendix References Box"
        - "Chapter Scope Box"
        - "Introduction"
        - "Intuition Box"
        - "Central Question Box"
        - "Chapter Overview"
        - "Worked Examples"
        - "Summary"
        - "Reading Path"
      required_boxes:
        - "Navigation Box"
        - "Appendix References"
        - "Chapter Scope"
        - "Intuition"
        - "Central Question"
        - "Reading Path"
      type_a_additional:
        - "CORE Connection Box"
        - "10C Integration Table"
      type_c_additional:
        - "Multiple Worked Examples"
        - "Policy Implications"
      chapter_appendix_relationship:
        delegate_to_appendix:
          - "Complete axiom systems"
          - "Full proofs and derivations"
          - "Comprehensive literature review"
          - "Detailed worked examples"
          - "Symbol glossaries"
          - "Critical foundations"
      length_guidelines:
        header_pages: [1, 2]
        opening_pages: [1, 2]
        content_section_pages: [3, 8]
        examples_pages: [2, 4]
        summary_pages: [1, 2]
        total_pages: [15, 50]

  # ─────────────────────────────────────────────────────────────────────────
  # SCIENTIFIC PAPER (Journal Article)
  # ─────────────────────────────────────────────────────────────────────────

  scientific_paper:
    metadata:
      name: "Scientific Paper"
      description: "Peer-reviewed journal article"
      category: "ACADEMIC"
      8d_coordinates:
        D1_knowledge: 0.90
        D2_proximity: 0.90
        D3_scope: 0.70
        D4_time: 0.80
        D5_goal: "G1_inform"
        D6_context: 1.00
        D7_emotion: 0.10
        D8_persistence: 0.95

    theta_move:
      structure: "IMRAD"
      parts:
        - name: "Introduction"
          moves: ["Territory", "Niche", "Occupy"]
        - name: "Methods"
          moves: ["Data", "Identification", "Estimation"]
        - name: "Results"
          moves: ["Main Findings", "Robustness"]
        - name: "Discussion"
          moves: ["Implications", "Limitations", "Conclusion"]

    generation_constraints:
      required_sections:
        - "Abstract"
        - "Introduction"
        - "Literature Review"
        - "Methods/Model"
        - "Results"
        - "Discussion"
        - "Conclusion"
        - "References"

  # ─────────────────────────────────────────────────────────────────────────
  # POLICY BRIEF
  # ─────────────────────────────────────────────────────────────────────────

  policy_brief:
    metadata:
      name: "Policy Brief"
      description: "Executive policy recommendation"
      category: "POLICY"
      8d_coordinates:
        D1_knowledge: 0.60
        D2_proximity: 0.40
        D3_scope: 0.85
        D4_time: 0.30
        D5_goal: "G2_action"
        D6_context: 1.00
        D7_emotion: 0.25
        D8_persistence: 0.70

    theta_move:
      structure: "Problem-Solution"
      parts:
        - name: "Problem"
          moves: ["Context", "Challenge", "Urgency"]
        - name: "Evidence"
          moves: ["Data", "Analysis", "Comparison"]
        - name: "Recommendation"
          moves: ["Options", "Preferred Solution", "Rationale"]
        - name: "Call-to-Action"
          moves: ["Next Steps", "Timeline", "Resources"]

    theta_lexicogrammar:
      sentence_length:
        mean: 16.0
        std: 5.0
      passive_rate: 0.15
      hedging_density: 0.10

    generation_constraints:
      required_sections:
        - "Executive Summary"
        - "Problem Statement"
        - "Evidence"
        - "Recommendations"
        - "Call to Action"
      max_pages: 4

  # ─────────────────────────────────────────────────────────────────────────
  # EXECUTIVE SUMMARY
  # ─────────────────────────────────────────────────────────────────────────

  executive_summary:
    metadata:
      name: "Executive Summary"
      description: "Board-level summary"
      category: "BUSINESS"
      8d_coordinates:
        D1_knowledge: 0.50
        D2_proximity: 0.30
        D3_scope: 0.80
        D4_time: 0.20
        D5_goal: "G1_inform"
        D6_context: 0.80
        D7_emotion: 0.20
        D8_persistence: 0.60

    theta_move:
      structure: "Pyramid"
      parts:
        - name: "Key Message"
          moves: ["Main Conclusion", "Recommendation"]
        - name: "Supporting Points"
          moves: ["Evidence 1", "Evidence 2", "Evidence 3"]
        - name: "Details"
          moves: ["Background", "Method", "Next Steps"]

    theta_lexicogrammar:
      sentence_length:
        mean: 14.0
        std: 4.0
      passive_rate: 0.10
      hedging_density: 0.05

    generation_constraints:
      required_sections:
        - "Key Findings"
        - "Implications"
        - "Recommendations"
      max_pages: 2

  # ─────────────────────────────────────────────────────────────────────────
  # BLOG POST
  # ─────────────────────────────────────────────────────────────────────────

  blog_post:
    metadata:
      name: "Blog Post"
      description: "Public-facing online article"
      category: "PUBLIC"
      8d_coordinates:
        D1_knowledge: 0.40
        D2_proximity: 0.20
        D3_scope: 0.50
        D4_time: 0.30
        D5_goal: "G1_inform"
        D6_context: 1.00
        D7_emotion: 0.50
        D8_persistence: 0.30

    theta_move:
      structure: "Hook-Problem-Solution"
      parts:
        - name: "Hook"
          moves: ["Attention Grabber", "Promise"]
        - name: "Problem"
          moves: ["Relatable Situation", "Pain Point"]
        - name: "Solution"
          moves: ["Key Insight", "Practical Advice"]
        - name: "Takeaway"
          moves: ["Summary", "Call to Action"]

    theta_lexicogrammar:
      sentence_length:
        mean: 12.0
        std: 4.0
      passive_rate: 0.05
      hedging_density: 0.03
      first_person_usage: 0.15

    theta_vocab:
      avoid_patterns:
        - "Furthermore"
        - "Nevertheless"
        - "Notwithstanding"

    generation_constraints:
      max_words: 1500
      required_elements:
        - "Compelling headline"
        - "Hook in first paragraph"
        - "Subheadings every 300 words"
        - "Call to action"

  # ─────────────────────────────────────────────────────────────────────────
  # CONSULTING MEMO
  # ─────────────────────────────────────────────────────────────────────────

  consulting_memo:
    metadata:
      name: "Consulting Memo"
      description: "Internal client advisory"
      category: "BUSINESS"
      8d_coordinates:
        D1_knowledge: 0.60
        D2_proximity: 0.80
        D3_scope: 0.30
        D4_time: 0.40
        D5_goal: "G2_action"
        D6_context: 0.00
        D7_emotion: 0.15
        D8_persistence: 0.40

    theta_move:
      structure: "Situation-Complication-Resolution"
      parts:
        - name: "Situation"
          moves: ["Context", "Current State"]
        - name: "Analysis"
          moves: ["Findings", "Root Cause"]
        - name: "Recommendation"
          moves: ["Options", "Preferred Path"]
        - name: "Implementation"
          moves: ["Next Steps", "Timeline", "Resources"]

    generation_constraints:
      required_sections:
        - "Situation"
        - "Analysis"
        - "Recommendation"
        - "Next Steps"

# ═══════════════════════════════════════════════════════════════════════════
# JOURNALISM / MEDIA GENRES
# ═══════════════════════════════════════════════════════════════════════════
#
# Stilprofile für Medienorganisationen.
# Unterscheidung: Quality Press (Qualitätsjournalismus) vs. Tabloid (Boulevard)
#
# Verwendung:
#   generate_text(content, genre="nzz")
#   generate_text(content, genre="bild")
#
# Merkmale:
#   - Quality Press: Längere Sätze, komplexe Syntax, Fachvokabular, Hedging
#   - Tabloid: Kurze Sätze, emotionale Sprache, Superlative, Ausrufe
#
# ═══════════════════════════════════════════════════════════════════════════

  # ─────────────────────────────────────────────────────────────────────────
  # THE ECONOMIST (UK) - International Quality Weekly
  # ─────────────────────────────────────────────────────────────────────────
  #
  # Charakteristik: Analytisch, trocken-witzig, keine Autorennamen,
  # klare Meinungen, globale Perspektive, klassisch-liberale Haltung.
  # Bekannt für: "House style", distinctive Stimme, Anonymität der Autoren
  #
  # ─────────────────────────────────────────────────────────────────────────

  economist:
    metadata:
      name: "The Economist"
      description: "British weekly news and international affairs publication"
      category: "QUALITY_PRESS"
      country: "UK"
      founded: 1843
      political_leaning: "classical_liberal"
      8d_coordinates:
        D1_knowledge: 0.80
        D2_proximity: 0.60
        D3_scope: 0.90
        D4_time: 0.50
        D5_goal: "G1_inform"
        D6_context: 1.00
        D7_emotion: 0.20
        D8_persistence: 0.70

    theta_move:
      structure: "Analysis-Argument"
      parts:
        - name: "Lead"
          moves: ["News Hook", "Significance Statement"]
        - name: "Context"
          moves: ["Background", "Historical Comparison"]
        - name: "Analysis"
          moves: ["Evidence", "Expert View", "Counter-Argument"]
        - name: "Conclusion"
          moves: ["Prediction", "Editorial View"]

    theta_lexicogrammar:
      sentence_length:
        mean: 22.0
        std: 6.0
      passive_rate: 0.18
      hedging_density: 0.12
      first_person_usage: 0.00  # No bylines, institutional voice
      subordinate_clause_rate: 0.35

    theta_vocab:
      reading_level: 14.0  # College level
      preferred_patterns:
        - "suggests that"
        - "it seems"
        - "this newspaper believes"
        - "one might argue"
      avoid_patterns:
        - "I think"
        - "amazing"
        - "incredible"
      dry_humor: true
      pun_frequency: 0.02

    theta_style:
      anonymity: true  # No author bylines
      institutional_we: true  # "This newspaper"
      opinion_explicitness: 0.70
      sarcasm_level: 0.25

    generation_constraints:
      max_words: 1500
      required_elements:
        - "Strong analytical lead"
        - "Global context"
        - "Clear editorial position"

  # ─────────────────────────────────────────────────────────────────────────
  # NEW YORK TIMES (US) - American Paper of Record
  # ─────────────────────────────────────────────────────────────────────────
  #
  # Charakteristik: "All the news that's fit to print", investigativer
  # Journalismus, literarischer Stil, ausführliche Berichterstattung,
  # strikte Trennung News/Opinion.
  #
  # ─────────────────────────────────────────────────────────────────────────

  nyt:
    metadata:
      name: "New York Times"
      description: "American newspaper of record"
      category: "QUALITY_PRESS"
      country: "US"
      founded: 1851
      political_leaning: "center_left"
      8d_coordinates:
        D1_knowledge: 0.75
        D2_proximity: 0.50
        D3_scope: 0.85
        D4_time: 0.60
        D5_goal: "G1_inform"
        D6_context: 1.00
        D7_emotion: 0.30
        D8_persistence: 0.80

    theta_move:
      structure: "Inverted-Pyramid-Extended"
      parts:
