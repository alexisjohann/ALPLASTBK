            - "Regelmässige Check-ins, strukturierte Interviews"
            - "Retention als Führungsaufgabe sichtbar gemacht"
          quote: "Structured onboarding, leadership engagement, and cultural reinforcement proved critical for retention success."
    barriers_observed:
      - id: "B1"
        category: "responsibility"
        finding: "Unklare Verantwortlichkeiten"
        quote: "Einige Supervisor wussten gar nicht, dass das Programm gestartet war."
        implication: "Rollen und Zuständigkeiten müssen klar definiert sein"
      - id: "B2"
        category: "time"
        finding: "Zeitmangel im Alltag"
        quote: "Wir haben kaum Kapazitäten für tägliche Check-ins."
        implication: "Retention-Massnahmen benötigen Zeitfenster im operativen Tagesgeschäft"
      - id: "B3"
