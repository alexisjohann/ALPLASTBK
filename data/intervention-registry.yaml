          Kandidaten können informierte Entscheidung treffen.
        observed_effect: "Reduzierte Frühfluktuation (<90 Tage)"
      - id: "INT2"
        type: "communication"
        subtype: "nudges"
        name: "Personalisierte Onboarding-Nudges"
        description: "Personalisierte Nachrichten vor und während des Onboardings"
        target_10c: "AWARE (Salienz) + WHEN (Timing)"
        timing: "Q4/2024"
        status: "implemented"
        target_segment: "all_new_hires"
        behavioral_mechanism: |
          Timely reminders und personalisierte Nachrichten erhöhen
          Engagement und Zugehörigkeitsgefühl in kritischer Phase.
        observed_effect: "Verbesserte Willkommenskultur"
      - id: "INT3"
        type: "social"
        subtype: "symbolic_recognition"
        name: "Welcome Gift"
        description: "Symbolische Willkommensgeschenke zur Wertschätzung"
        target_10c: "WHAT(S) (Social) + WHO (Identity)"
        timing: "Q4/2024"
        status: "implemented"
        target_segment: "all_new_hires"
        behavioral_mechanism: |
          Reziprozität und symbolische Wertschätzung stärken
          emotionale Bindung ab Tag 1.
        observed_effect: "MA fühlen sich früher eingebunden"
      - id: "INT4"
        type: "culture"
        subtype: "team_norms"
        name: "Shift Commitment"
        description: "Gemeinsame Werte und Verhaltensstandards je Schicht"
        target_10c: "WHO (Team Identity) + HOW (Normen)"
        timing: "Q4/2024"
        status: "implemented"
        target_segment: "all_shifts"
        behavioral_mechanism: |
          Explizite Normen und Commitments stärken Teamkohäsion
          und schaffen klare Verhaltenserwartungen.
        observed_effect: "Stärkere Teamkohäsion durch symbolische Rituale"
      - id: "INT5"
        type: "financial"
        subtype: "supervisor_incentive"
        name: "Supervisor Bonus"
        description: "Anreize für Vorgesetzte bei niedriger Fluktuation"
        target_10c: "WHAT(F) (Financial) + HIERARCHY (Leadership)"
        timing: "Q4/2024"
        status: "implemented"
        target_segment: "all_supervisors"
        behavioral_mechanism: |
          Finanzielle Anreize alignieren Supervisor-Ziele mit
          Retention-Zielen. Retention wird zur Führungsaufgabe.
        observed_effect: "Führungskräfte motiviert zur aktiven Begleitung"
        warning: "Ohne Begleitung/Training verliert Programm Zugkraft"
    complementarity_matrix:
      - pair: ["INT1", "INT2"]
        gamma_ij: 0.35
        interaction: "synergy"
        mechanism: "Extended Interview + Nudges = konsistente Erwartungssteuerung"
