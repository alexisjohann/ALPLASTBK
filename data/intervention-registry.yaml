projects:
  CUS-UNKNOWN-CUS-UNKNOWN-PRJ-001:
    meta:
      name: Betriebliche Altersvorsorge Opt-Out Implementation
      client: Mittelständisches Unternehmen (500 MA)
      domain: finance
      start_date: '2025-03-01'
      end_date: '2025-09-30'
      status: completed
    context:
      target_behavior: Teilnahme an betrieblicher Altersvorsorge
      target_population: Alle Mitarbeiter ohne bestehende bAV
      sample_size: 312
      baseline_behavior: 0.34
      journey_phase: contemplation
      segments:
      - name: present-biased
        proportion: 0.45
        sigma: 1.8
      - name: loss-averse
        proportion: 0.3
        sigma: 1.5
      - name: rational-calculative
        proportion: 0.25
        sigma: 0.8
    intervention_mix:
    - id: I1
      type: nudge
      subtype: default
      description: Automatische Anmeldung mit Opt-Out Option
      timing: onboarding + bestehendes Personal
      target_segment: all
      parameters:
        intensity: 1.0
        duration: permanent
        frequency: einmalig bei Einstellung
      expected_contribution:
        E_i: 0.35
        confidence: 0.85
        source: literature
    - id: I2
      type: information
      subtype: personalized_projection
      description: Individueller Rentenrechner mit Visualisierung
      timing: vor Opt-Out Frist
      target_segment: all
      parameters:
        intensity: 0.7
        duration: 30 Tage vor Frist
        frequency: 2 Reminder
      expected_contribution:
        E_i: 0.08
        confidence: 0.6
        source: pilot
    - id: I3
      type: social
      subtype: descriptive_norm
      description: 'Info: 78% der Kollegen nehmen teil'
      timing: in Kommunikation
      target_segment: all
      parameters:
        intensity: 0.6
        duration: in allen Materialien
        frequency: 3x erwähnt
      expected_contribution:
        E_i: 0.05
        confidence: 0.5
        source: literature
    complementarity_matrix:
    - pair:
      - I1
      - I2
      gamma_ij: 0.3
      interaction: synergy
      mechanism: Default + Information verstärkt informierte Akzeptanz
    - pair:
      - I1
      - I3
      gamma_ij: 0.2
      interaction: synergy
      mechanism: Default legitimiert durch soziale Norm
    - pair:
      - I2
      - I3
      gamma_ij: 0.1
      interaction: synergy
      mechanism: Schwache Verstärkung
    predictions:
      portfolio_effect:
        E_P: 0.52
        CI_lower: 0.42
        CI_upper: 0.62
        formula_used: E(P) = Σ E_i + Σ γ_ij · √(E_i · E_j)
      kpis:
      - name: Teilnahmequote bAV
        baseline: 0.34
        predicted_value: 0.86
        predicted_delta: 0.52
        predicted_delta_pct: 153
        confidence: 0.75
      - name: Durchschnittlicher Beitragssatz
        baseline: 0.025
        predicted_value: 0.035
        predicted_delta: 0.01
        predicted_delta_pct: 40
        confidence: 0.5
      - name: Opt-Out Rate nach 6 Monaten
        baseline: null
        predicted_value: 0.08
        predicted_delta: null
        predicted_delta_pct: null
        confidence: 0.6
    results:
      measurement_date: '2025-09-30'
      kpis:
      - name: Teilnahmequote bAV
        actual_value: 0.91
        actual_delta: 0.57
        actual_delta_pct: 168
      - name: Durchschnittlicher Beitragssatz
        actual_value: 0.032
        actual_delta: 0.007
        actual_delta_pct: 28
      - name: Opt-Out Rate nach 6 Monaten
        actual_value: 0.05
        actual_delta: null
        actual_delta_pct: null
      intervention_effects:
      - id: I1
        observed_E_i: 0.42
        attribution_confidence: 0.9
      - id: I2
        observed_E_i: 0.06
        attribution_confidence: 0.4
      - id: I3
        observed_E_i: 0.04
        attribution_confidence: 0.3
    deviation_analysis:
      overall:
        predicted_E_P: 0.52
        actual_E_P: 0.57
        delta: 0.05
        delta_pct: 9.6
        direction: underestimate
      by_intervention:
      - id: I1
        predicted: 0.35
        actual: 0.42
        delta: 0.07
        likely_causes:
        - Baseline niedriger als in US-Studien → mehr Potenzial
        - Starke HR-Kommunikation verstärkte Legitimität
      - id: I2
        predicted: 0.08
        actual: 0.06
        delta: -0.02
        likely_causes:
        - Nur 40% haben Rechner genutzt
        - Komplexität der Projektion zu hoch
      - id: I3
        predicted: 0.05
        actual: 0.04
        delta: -0.01
        likely_causes:
        - 78% wurde als 'normale Erwartung' wahrgenommen
      by_segment:
      - segment: present-biased
        predicted_response: 0.65
        actual_response: 0.72
        delta: 0.07
      - segment: loss-averse
        predicted_response: 0.55
        actual_response: 0.58
        delta: 0.03
      - segment: rational-calculative
        predicted_response: 0.4
        actual_response: 0.35
        delta: -0.05
      root_causes:
      - cause: Default-Effekt in DACH stärker als US-Literatur
        evidence: Kulturelle Autorität von Arbeitgeber-Empfehlungen höher
        confidence: medium
      - cause: Rational-calculative Segment reagiert skeptisch auf Defaults
        evidence: Höhere Opt-Out Rate in diesem Segment (12% vs. 3%)
        confidence: high
    learnings:
      what_worked:
      - intervention: I1 - Default
        insight: Opt-Out Default übertrifft Erwartungen in DACH-Kontext
        generalizable: true
      - intervention: HR-Endorsement
        insight: Explizite Empfehlung durch Geschäftsführung verstärkt Wirkung
        generalizable: true
      what_didnt:
      - intervention: I2 - Rentenrechner
        insight: Zu komplex, geringe Nutzung trotz Reminder
        avoidable: true
      - intervention: Timing I3
        insight: Soziale Norm zu spät kommuniziert (nach Default-Aktivierung)
        avoidable: true
      parameter_updates:
      - parameter: E_i für Default (DACH Kontext)
        old_value: 0.35
        new_value: 0.42
        basis: Beobachtung CUS-UNKNOWN-PRJ-001, n=312
      - parameter: σ für rational-calculative bei Defaults
        old_value: 0.8
        new_value: 0.6
        basis: Höhere Reaktanz als erwartet
      recommendations:
      - category: design
        recommendation: 'Rentenrechner vereinfachen: 3 Szenarien statt Freitext'
        priority: high
      - category: timing
        recommendation: Soziale Norm VOR Default-Aktivierung kommunizieren
        priority: medium
      - category: targeting
        recommendation: 'Rational-calculative Segment: Opt-In mit Argumentation statt
          Default'
        priority: medium
      - category: measurement
        recommendation: Segment-Zuordnung durch kurzes Assessment verbessern
        priority: low
  CUS-UNKNOWN-CUS-UNKNOWN-PRJ-002:
