          - plant: "HOU"
            month: "2023-08"
            value: 0.25
          - plant: "BET"
            month: "2022-09"
            value: 0.22
      impact_dimensions:
        - dimension: "KPI-Wirkung"
          description: "Rückgang der Fluktuation"
          evidence: "Alle drei Pilotwerke zeigten deutlichen Rückgang der Turnover-Raten nach Go-live"
          quote: "The observed trend reflects progress in building more stable and engaged teams."
        - dimension: "Kulturelle Wirkung"
          description: "Stärkere Bindung & Teamintegration"
          evidence:
            - "Neue MA fühlen sich früher eingebunden und unterstützt"
            - "Verbesserte Feedback- und Willkommenskultur"
            - "Teamkohäsion durch Shift Commitment und symbolische Rituale gestärkt"
