      - id: I1
        observed_E_i: 0.1
        attribution_confidence: 0.7
      - id: I2
        observed_E_i: 0.06
        attribution_confidence: 0.5
      - id: I3
        observed_E_i: 0.03
        attribution_confidence: 0.4
      - id: I4
        observed_E_i: 0.02
        attribution_confidence: 0.3
      - id: I5
        observed_E_i: 0.03
        attribution_confidence: 0.35
    deviation_analysis:
      overall:
        predicted_E_P: 0.38
        actual_E_P: 0.24
        delta: -0.14
        delta_pct: -37
        direction: overestimate
      by_intervention:
      - id: I1
        predicted: 0.12
        actual: 0.1
        delta: -0.02
        likely_causes:
        - Gewohnheiten stärker als erwartet
        - Rush-Hour reduziert Aufmerksamkeit
      - id: I2
        predicted: 0.08
        actual: 0.06
        delta: -0.02
        likely_causes:
        - Nachschlag-Option kompensiert kleinere Portionen
      - id: I3
        predicted: 0.05
        actual: 0.03
        delta: -0.02
        likely_causes:
        - Label-Müdigkeit nach 2 Monaten
      - id: I4
        predicted: 0.04
        actual: 0.02
        delta: -0.02
        likely_causes:
        - Technische Probleme mit Live-Display
        - Skeptische Reaktion auf 'Manipulation'
      - id: I5
        predicted: 0.06
        actual: 0.03
        delta: -0.03
        likely_causes:
        - Crowding-Out bei intrinsisch Motivierten
        - Teilnahme an Challenges nur 35%
      by_segment:
      - segment: health-conscious
        predicted_response: 0.05
        actual_response: 0.02
        delta: -0.03
      - segment: impulsive
        predicted_response: 0.5
        actual_response: 0.32
        delta: -0.18
      - segment: indifferent
        predicted_response: 0.35
        actual_response: 0.25
        delta: -0.1
      root_causes:
      - cause: Gewohnheitsstärke unterschätzt
        evidence: 'Tracking zeigt: 60% wählen jeden Tag dasselbe'
        confidence: high
      - cause: Gamification-Crowding-Out
        evidence: Health-conscious Segment reduzierte Engagement nach Gamification-Start
        confidence: high
      - cause: Kumulierte Interventionen als 'Bevormundung' wahrgenommen
        evidence: 'Feedback-Umfrage: 23% fühlten sich manipuliert'
        confidence: medium
    learnings:
      what_worked:
      - intervention: I1 - Positioning
        insight: Robuster Effekt, aber kleiner als Literatur in Schulkantinen
        generalizable: true
      - intervention: Zufriedenheit gestiegen
        insight: 'Trotz geringerem Effekt: positive Wahrnehmung der Bemühungen'
        generalizable: true
      what_didnt:
      - intervention: I5 - Gamification
        insight: Crowding-Out bei Erwachsenen stärker als bei Jugendlichen
        avoidable: true
      - intervention: I4 - Live-Norm
        insight: Technische Komplexität unterschätzt, reaktante Reaktionen
        avoidable: true
      - intervention: Portfolio-Dichte
        insight: 5 Interventionen gleichzeitig = wahrgenommene Manipulation
        avoidable: true
      parameter_updates:
      - parameter: E_i für Positioning (Erwachsene Kantine)
        old_value: 0.12
        new_value: 0.1
        basis: Beobachtung CUS-UNKNOWN-PRJ-002
      - parameter: γ_ij für Gamification + andere Nudges
        old_value: 0.1
        new_value: -0.15
        basis: Crowding-Out beobachtet
      - parameter: Max Interventionen ohne Reaktanz
        old_value: 5
        new_value: 3
        basis: Feedback-Umfrage
      recommendations:
      - category: design
        recommendation: Gamification nur für Segmente ohne intrinsische Motivation
        priority: high
      - category: design
        recommendation: Max 3 sichtbare Interventionen gleichzeitig
        priority: high
      - category: timing
        recommendation: Interventionen sequenziell einführen (nicht simultan)
        priority: medium
      - category: measurement
        recommendation: Reaktanz-Messung in Feedback-Loop einbauen
        priority: high
