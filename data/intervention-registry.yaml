  CUS-BMW-PRJ-001:
    meta:
      name: "BMW Produkt-Compliance: Choice Architecture FK-Transformation"
      client: BMW AG, Abteilung AF4
      domain: automotive
      start_date: '2026-02-05'
      end_date: '2026-03-31'
      status: planning
      session_reference: EBF-S-2026-02-05-ORG-001
      model_reference: MOD-ORG-BMW-001
      project_reference: PRJ-BMW-001
    context:
      target_behavior: "Vollständige Compliance bei Führungskräften in Produkt-Compliance-Prozessen"
      target_population: "Führungskräfte (Abteilungsleiter, Teamleiter) in compliance-relevanten Rollen"
      sample_size: null
      baseline_behavior: 0.021
      baseline_note: "P(full_compliance) FK = 2.1% vs. 5.8% MA (MOD-ORG-BMW-001)"
      journey_phase: action
      problem_diagnosis: |
        FK sind ~2.8× weniger compliant als MA aufgrund von 5 Mechanismen:
        1. Zeitdruck × Identitäts-Erosion (W_base × Ψ_Tp = -0.45) — 45%
        2. Fehlendes Vorgesetzten-Signal (Ψ_Sv existiert nicht für FK) — 25%
        3. Effort × Hierarchie-Verstärker (u_E × Ψ_H = +0.30) — 15%
        4. Finanzieller Crowding-Out (u_F × u_S = -0.25) — 10%
        5. P3-Bottleneck Konzentration — 5%
      segments:
        - name: "FK unter hohem Projektdruck"
          proportion: 0.55
          characteristics: "Ψ_Tp > 0.85, multiple Deadlines, P3 Bottleneck"
          sigma: 1.6
        - name: "FK mit stabilen Projekten"
          proportion: 0.30
          characteristics: "Ψ_Tp < 0.70, klare Timelines"
          sigma: 1.0
        - name: "FK in Sandwich-Position"
          proportion: 0.15
          characteristics: "Hohe Ψ_H, Druck von oben UND unten"
          sigma: 0.7
    # ═══════════════════════════════════════════════════════════════════
    # CHOICE ARCHITECTURE: 4 Pfade von EVOLUTION bis REVOLUTION
    # ═══════════════════════════════════════════════════════════════════
    #
    # 3 HEBEL (aus MOD-ORG-BMW-001 Diagnose):
    #   HEBEL A: PEER-ACCOUNTABILITY   → Ψ_Sv schaffen (fehlt bei FK)
    #   HEBEL B: ZEITPUFFER            → Ψ_Tp senken (Identitäts-Erosion brechen)
    #   HEBEL C: EFFORT-REDUKTION      → u_E × Ψ_H entkoppeln
    #
    # 4 PFADE (unterschiedliche Geschwindigkeit + Interventionsmix):
    #   PATH 1: EVOLUTION    (24+ Monate)  — minimal disruptiv
    #   PATH 2: REFORM       (12-18 Monate) — balanciert
    #   PATH 3: TRANSFORMATION (6-12 Monate) — aggressiv
    #   PATH 4: REVOLUTION   (3-6 Monate)  — maximal schnell
    #
    # CROWDING-OUT VERBOT (gilt für ALLE Pfade):
    #   ⛔ KEINE monetären Compliance-Boni (u_F × u_S = -0.25)
    #
    # ═══════════════════════════════════════════════════════════════════

    # ─────────────────────────────────────────────────────────────────
    # INTERVENTIONS-KATALOG (alle 12 Interventionen)
    # ─────────────────────────────────────────────────────────────────
    intervention_catalog:

      # ═══════════════════════════════════════════════════════════════
      # HEBEL A: PEER-ACCOUNTABILITY (Ψ_Sv schaffen)
      # Kernproblem: FK haben kein Vorgesetzten-Signal
      # ═══════════════════════════════════════════════════════════════
      - id: INT-BMW-A1
        type: social
        subtype: peer_accountability
        name: "Compliance-Buddy (1:1)"
        hebel: A
        intensity_level: low
        description: |
          Cross-Ressort Peer-Pairing: Jede FK hat eine Buddy-FK die vor P3-Entscheidungen
          informiert wird. Kein Veto, nur Sichtbarkeit. Framing: «Sparring-Partner».
        mechanism: "Ψ_Sv-Substitut via Beobachtbarkeit (Bateson et al. 2006: Watching Eyes)"
        target_10c: "WHO (Soziale Beobachtbarkeit)"
        delta_target: "Ψ_Sv: 0.0 → 0.35"
        intervention_vector: I_WHO_o
        parameters:
          intensity: 0.50
          duration: permanent
          frequency: "bei jeder P3-Entscheidung"
        expected_contribution:
          E_i: 0.12
          confidence: 0.72
          delta_P_compliance: "+1.2pp"
        implementation:
          effort: low
          cost: negligible
          time_to_deploy: "1 Woche"
          prerequisites: "FK-Pairing-Liste (HR, 1 Tag)"
          reversibility: high
        warnings:
          - "Framing entscheidend — «Sparring» nicht «Kontrolle»"

      - id: INT-BMW-A2
        type: social
        subtype: structured_peer_review
        name: "Compliance-Peer-Review Runden"
        hebel: A
        intensity_level: medium
        description: |
          Monatliche 90-min Sessions: 4-5 FK gleicher Stufe reviewen gegenseitig ihre
          kritischsten Compliance-Entscheidungen. Strukturiert: (1) Fall, (2) Fragen,
          (3) Feedback. Keine Dokumentation, keine Eskalation.
        mechanism: |
          Deskriptive Norm (MS-IB-008) + Antizipierte Rechtfertigung (Lerner & Tetlock 1999):
          FK sehen Peer-Verhalten UND wissen, dass sie nächsten Monat berichten.
        target_10c: "WHO (Norm) + AWARE (Accountability)"
        delta_target: "Ψ_Sp: 0.62 → 0.78"
        intervention_vector: I_WHO_o
        parameters:
          intensity: 0.70
          duration: permanent
          frequency: "1× Monat, 90 min"
        expected_contribution:
          E_i: 0.20
          confidence: 0.65
          delta_P_compliance: "+2.0pp"
        implementation:
          effort: medium
          cost: "~2h FK-Zeit/Monat + Moderator-Schulung"
          time_to_deploy: "4-6 Wochen"
          prerequisites: "Moderatoren-Training, Raum-/Zeitslot"
          reversibility: high
        warnings:
          - "NICHT mit Vorgesetzten kombinieren"
          - "Erfordert psychologische Sicherheit"

      - id: INT-BMW-A3
        type: process
        subtype: structural_accountability
        name: "Compliance-Gate mit Peer-Sign-Off"
        hebel: A
        intensity_level: high
        description: |
          Formales Gate im Produktentwicklungsprozess: Vor jedem Meilenstein zeichnet
          eine Peer-FK aus anderem Ressort die Compliance-Dokumentation gegen. Dokumentierte
          Stellungnahme, kein Veto.
        mechanism: |
          Strukturelle Ψ_Sv (prozess-eingebettet, nicht personenabhängig) +
          Effort-Reduktion durch standardisiertes Template +
          Compliance-PAUSE bricht W_base × Ψ_Tp Interaktion
        target_10c: "WHEN (Prozess-Default) + WHO (Peer-Accountability)"
        delta_target: "P3: 0.43 → 0.58"
        intervention_vector: I_WHEN
        parameters:
          intensity: 0.85
          duration: permanent
          frequency: "bei jedem Meilenstein"
        expected_contribution:
          E_i: 0.28
          confidence: 0.60
          delta_P_compliance: "+3.0pp"
        implementation:
          effort: high
          cost: "Prozess-Redesign + SAP/PLM Anpassung"
          time_to_deploy: "3-6 Monate"
          prerequisites: "Prozess-Mapping, Template, IT, Pilot"
          reversibility: medium
        warnings:
          - "48h-Reaktionsfrist für Peer → kein Flaschenhals"
          - "Checkliste, nicht Gutachten"

      - id: INT-BMW-A4
        type: identity
        subtype: cultural_transformation
        name: "Compliance-Leadership-Identität"
        hebel: A
        intensity_level: transformative
        description: |
          Identitätstransformation: «Compliance-Champion» wird Teil der FK-Rolle.
          (1) Compliance-KPI im Zielsystem (neben Termin + Budget)
          (2) Jährlicher Peer-Award «Compliance Leadership»
          (3) Compliance-Mentoring (erfahrene FK coachen neue FK)
        mechanism: |
          Identity Economics (MS-IB-001): W_base Redefinition so dass Compliance ⊂ Identität.
          Status-Kanal nutzen (σ_status = 0.75) für Compliance statt nur Projekt-Erfolg.
          Langfristig: γ(W_base, Ψ_Tp) von -0.45 → -0.20
        target_10c: "WHAT (Identität) + WHO (Status)"
        delta_target: "W_base neu: Compliance ⊂ Ingenieur-Identität"
        intervention_vector: I_WHO_o
        parameters:
          intensity: 0.90
          duration: permanent
          frequency: "kontinuierlich + jährlich"
        expected_contribution:
          E_i: 0.35
          confidence: 0.45
          delta_P_compliance: "+4-6pp"
        implementation:
          effort: very_high
          cost: "Zielsystem-Redesign + Award + Mentoring"
          time_to_deploy: "12-18 Monate"
          prerequisites: "Vorstand, HR, Betriebsrat"
          reversibility: low
        warnings:
          - "Award von PEERS, nicht Compliance-Abteilung"
          - "Erfordert CEO-Commitment"

      # ═══════════════════════════════════════════════════════════════
      # HEBEL B: ZEITPUFFER (Ψ_Tp senken)
      # Kernproblem: W_base × Ψ_Tp = -0.45 (Identitäts-Erosion unter Druck)
      # ═══════════════════════════════════════════════════════════════
      - id: INT-BMW-B1
        type: nudge
        subtype: temporal_buffer
        name: "Compliance-Zeitfenster in Projekt-Meetings"
        hebel: B
        intensity_level: low
        description: |
          In jedem Projekt-Meeting werden die letzten 10 Minuten als «Compliance-Check»
          reserviert. Default-Agendapunkt, nicht optional. Einfache Frage: «Gibt es
          offene Compliance-Themen die wir ansprechen müssen?»
        mechanism: |
          Temporal Nudge: Erzwingt Compliance-Salienz im Moment des höchsten Zeitdrucks.
          Bricht den automatischen «Zeitdruck → Compliance überspringen» Loop.
          AWARE-Dimension aktivieren in P1 (ERKENNEN) → Downstream-Effekt auf P3.
        target_10c: "AWARE (Salienz) + WHEN (Temporal Anchor)"
        delta_target: "Ψ_Tp-Effekt auf P1: von -0.30 → -0.15"
        intervention_vector: I_AWARE
        parameters:
          intensity: 0.40
          duration: permanent
          frequency: "jedes Projekt-Meeting"
        expected_contribution:
          E_i: 0.10
          confidence: 0.75
          delta_P_compliance: "+1.0pp"
        implementation:
          effort: very_low
          cost: "0 (nur Agenda-Änderung)"
          time_to_deploy: "sofort"
          prerequisites: "Kommunikation an Projektleiter"
          reversibility: high
        warnings:
          - "Darf nicht zum «Compliance-Theater» werden (kurzes Abhaken)"

      - id: INT-BMW-B2
        type: process
        subtype: deadline_buffer
        name: "Compliance-Puffer in Projekt-Gates"
        hebel: B
        intensity_level: medium
        description: |
          Jeder Projekt-Meilenstein bekommt einen eingebauten 48h-Compliance-Puffer:
          Das offizielle Gate-Datum liegt 48h VOR der tatsächlichen Deadline.
          FK haben strukturell Zeit für Compliance-Prüfung ohne Terminverschiebung.
        mechanism: |
          Ψ_Tp direkt senken: Puffer bricht die Wahrnehmung «keine Zeit für Compliance».
          Entscheidend: Puffer ist im PLAN, nicht Ausnahme → Default-Effekt (MS-NU-002).
          Ziel: Ψ_Tp von 0.88 (FK) → 0.70 → γ(W_base, Ψ_Tp) Effekt halbiert.
        target_10c: "WHEN (Temporal Buffer) + HOW (Prozess-Default)"
        delta_target: "Ψ_Tp FK: 0.88 → 0.70"
        intervention_vector: I_WHEN
        parameters:
          intensity: 0.65
          duration: permanent
          frequency: "bei jedem Gate"
        expected_contribution:
          E_i: 0.22
          confidence: 0.60
          delta_P_compliance: "+2.5pp"
        implementation:
          effort: medium
          cost: "~2-3% längere Projekt-Timelines"
          time_to_deploy: "2-3 Monate"
          prerequisites: "PMO-Alignment, Template-Anpassung"
          reversibility: medium
        warnings:
          - "Puffer darf NICHT für andere Aufgaben «aufgefressen» werden"
          - "Erfordert PMO + Management Buy-In"

      - id: INT-BMW-B3
        type: process
        subtype: workload_cap
        name: "FK-Projekt-Cap (max. parallele Projekte)"
        hebel: B
        intensity_level: high
        description: |
          Harte Obergrenze für parallele Projekte pro FK: Max. 3 gleichzeitige
          compliance-relevante Projekte. Bei Überschreitung: automatische Eskalation
          an nächsthöhere Ebene zur Priorisierung. Keine Ausnahmen.
        mechanism: |
          Kapazitäts-Schutz: Ψ_Tp steigt exponentiell mit Parallelität.
          Bei 5+ Projekten ist Ψ_Tp > 0.90 → Compliance kollabiert.
          Cap bei 3 hält Ψ_Tp ≤ 0.75 → W_base bleibt intakt.
          Kognitive Belastung (Ψ_C = 0.70) wird ebenfalls gesenkt.
        target_10c: "WHEN (Kapazität) + HOW (Strukturelle Begrenzung)"
        delta_target: "Ψ_Tp: 0.88 → 0.65 + Ψ_C: 0.70 → 0.55"
        intervention_vector: I_WHEN
        parameters:
          intensity: 0.90
          duration: permanent
          frequency: "kontinuierliches Monitoring"
        expected_contribution:
          E_i: 0.30
          confidence: 0.55
          delta_P_compliance: "+3.5pp"
        implementation:
          effort: high
          cost: "Möglicherweise mehr FK nötig → Personalkosten"
          time_to_deploy: "3-6 Monate"
          prerequisites: "Vorstand-Beschluss, PMO-Redesign, Eskalations-Workflow"
          reversibility: low
        warnings:
          - "Grösster Widerstand von Vorgesetzten die «Flexibilität» wollen"
          - "Erfordert Portfolio-Management-Reife"
          - "Kann kurzfristig Projektdurchsatz senken"

      - id: INT-BMW-B4
        type: process
        subtype: compliance_first_scheduling
        name: "Compliance-First Projekt-Scheduling"
        hebel: B
        intensity_level: transformative
        description: |
          Fundamentaler Scheduling-Umbau: Compliance-Meilensteine werden ZUERST geplant,
          Entwicklungs-Meilensteine DANACH. Inversion des Status Quo. Compliance ist nicht
          «was noch dazukommt», sondern «was zuerst steht». Automotive SPICE / ISO 26262
          Compliance-Gates als Primär-Skelett des Projektplans.
        mechanism: |
          Default-Inversion: Im Status Quo ist Compliance optional/nachgelagert (Low Default).
          Nach Inversion: Compliance ist Default, Abweichung erfordert Begründung.
          Prospect Theory (MS-RD-001): Non-Compliance wird zum «Verlust» (Abweichung vom Plan)
          statt zum «Gewinn» (Zeitersparnis).
        target_10c: "WHEN (Default-Inversion) + WHAT (Reframing)"
        delta_target: "Compliance als Reference Point → λ × Compliance-Kosten bei Abweichung"
        intervention_vector: I_WHEN
        parameters:
          intensity: 0.95
          duration: permanent
          frequency: "bei jeder Projektplanung"
        expected_contribution:
          E_i: 0.35
          confidence: 0.45
          delta_P_compliance: "+4-5pp"
        implementation:
          effort: very_high
          cost: "PMO-Transformation, IT-Anpassung, Schulung"
          time_to_deploy: "12-18 Monate"
          prerequisites: "Vorstand + PMO + IT + Betriebsrat"
          reversibility: low
        warnings:
          - "Grösster kultureller Widerstand aller Interventionen"
          - "Erfordert «Compliance ist kein Bremser»-Narrativ"
          - "Pilotprojekt zwingend vor Rollout"

      # ═══════════════════════════════════════════════════════════════
      # HEBEL C: EFFORT-REDUKTION (u_E × Ψ_H entkoppeln)
      # Kernproblem: Compliance-Aufwand wird durch Hierarchie multipliziert
      # ═══════════════════════════════════════════════════════════════
      - id: INT-BMW-C1
        type: nudge
        subtype: simplification
        name: "One-Click Compliance-Report"
        hebel: C
        intensity_level: low
        description: |
          Compliance-Dokumentation auf EIN Formular reduzieren: 5 Felder, davon 3
          vorausgefüllt aus dem Projektsystem. FK klickt «Bestätigen» oder ergänzt
          1-2 Felder. Maximaler Zeitaufwand: 3 Minuten pro Meilenstein.
        mechanism: |
          Effort-Minimierung: u_E von -0.75 (FK) → -0.30. Direkt auf P5 (MELDEN = 0.31).
          Wenn Reporting trivial wird, steigt P5 massiv (Hypothese H1: +17pp).
          Ψ_H wird irrelevant weil keine Abstimmungsschleifen nötig.
        target_10c: "HOW (Effort-Reduktion)"
        delta_target: "u_E FK: -0.75 → -0.30 | P5: 0.31 → 0.48"
        intervention_vector: I_HOW
        parameters:
          intensity: 0.60
          duration: permanent
          frequency: "bei jedem Gate"
        expected_contribution:
          E_i: 0.18
          confidence: 0.75
          delta_P_compliance: "+2.0pp"
        implementation:
          effort: medium
          cost: "IT-Entwicklung (SAP-Formular, ~2 Sprints)"
          time_to_deploy: "4-8 Wochen"
          prerequisites: "UX-Design, SAP-Anpassung, Test"
          reversibility: high
        warnings:
          - "Formular muss WIRKLICH einfach sein (UX-Test!)"
          - "Vorausfüllung erfordert Datenschnittstelle"

      - id: INT-BMW-C2
        type: process
        subtype: hierarchy_bypass
        name: "Compliance-Direct-Line"
        hebel: C
        intensity_level: medium
        description: |
          FK können Compliance-Themen DIREKT an Compliance-Beauftragten melden —
          ohne Dienstweg über Hierarchie. Anonyme Option verfügbar.
          Bricht u_E × Ψ_H = +0.30 Interaktion, weil Ψ_H umgangen wird.
        mechanism: |
          Hierarchie-Bypass: Ψ_H wird für Compliance-Meldungen auf ~0.20 reduziert.
          u_E × Ψ_H Interaktion von 0.30 → ~0.08 (fast neutral).
          Zusätzlich: Anonymität senkt u_R (Risiko-Aversion) in P5 (MELDEN).
        target_10c: "HOW (Hierarchie-Bypass) + WHAT (Risiko-Reduktion)"
        delta_target: "Ψ_H für Compliance: 0.80 → 0.20 | u_R: -0.35 → -0.15"
        intervention_vector: I_HOW
        parameters:
          intensity: 0.70
          duration: permanent
          frequency: "bei Bedarf"
        expected_contribution:
          E_i: 0.20
          confidence: 0.60
          delta_P_compliance: "+2.0pp"
        implementation:
          effort: medium
          cost: "Hotline/Portal + Compliance-Beauftragter Kapazität"
          time_to_deploy: "2-3 Monate"
          prerequisites: "Compliance-Team Kapazität, IT-Portal, Anonymisierung"
          reversibility: high
        warnings:
          - "Darf nicht als «Denunziations-Kanal» wahrgenommen werden"
          - "Compliance-Team muss Kapazität für Anfragen haben"

      - id: INT-BMW-C3
        type: process
        subtype: automated_compliance
        name: "Automatische Compliance-Checks im PLM"
        hebel: C
        intensity_level: high
        description: |
          PLM-System (Product Lifecycle Management) prüft automatisch: Sind alle
          Compliance-relevanten Dokumente vorhanden? Sind Prüfschritte erledigt?
          Rote Ampel bei Lücken, automatische Erinnerung. FK muss nicht selbst
          prüfen, System zeigt Handlungsbedarf.
        mechanism: |
          Effort → ~0: Wenn System automatisch prüft, entfällt manueller Aufwand.
          u_E wird nahezu neutral für P1 (ERKENNEN) und P5 (MELDEN).
          AWARE-Dimension wird automatisch bedient (System erinnert).
          Ψ_M (Material/Tools) wird von 0.73 → 0.90 gehoben.
        target_10c: "AWARE (Auto-Check) + HOW (Automatisierung)"
        delta_target: "u_E (P1, P5): → ~0 | Ψ_M: 0.73 → 0.90"
        intervention_vector: I_AWARE
        parameters:
          intensity: 0.85
          duration: permanent
          frequency: "automatisch, kontinuierlich"
        expected_contribution:
          E_i: 0.30
          confidence: 0.55
          delta_P_compliance: "+3.5pp"
        implementation:
          effort: very_high
          cost: "PLM-Customization (~500k-1M EUR)"
          time_to_deploy: "6-12 Monate"
          prerequisites: "IT-Architektur-Entscheidung, Budget, PLM-Team"
          reversibility: low
        warnings:
          - "Grösste Investition im Portfolio"
          - "Risiko: «System macht es ja» → moralisches Disengagement"
          - "Muss mit Identitäts-Intervention (A4) kombiniert werden"

      - id: INT-BMW-C4
        type: process
        subtype: compliance_by_design
        name: "Compliance-by-Design in Prozessarchitektur"
        hebel: C
        intensity_level: transformative
        description: |
          Fundamentaler Umbau: Compliance wird in den Entwicklungsprozess so eingebettet,
          dass Non-Compliance AKTIVEN Aufwand erfordert (statt Compliance). Inversion:
          Der Default-Pfad IST compliant. Abweichung erfordert dokumentierte Begründung
          mit Vier-Augen-Prinzip.
        mechanism: |
          Default-Inversion auf Prozessebene: Aktuell ist Non-Compliance der pfadabhängige
          Default (weniger Aufwand). Nach Inversion ist Compliance der Default.
          u_E kippt: Compliance u_E ≈ 0, Non-Compliance u_E < 0 (Aufwand für Begründung).
          Prospect Theory: Non-Compliance wird zur «Verlustaktion» (λ = 2.35 bei BMW).
        target_10c: "WHEN (Default-Inversion) + HOW (Process Architecture)"
        delta_target: "u_E Compliance → 0 | u_E Non-Compliance → negativ"
        intervention_vector: I_WHEN
        parameters:
          intensity: 0.95
          duration: permanent
          frequency: "systemisch"
        expected_contribution:
          E_i: 0.40
          confidence: 0.40
          delta_P_compliance: "+5-7pp"
        implementation:
          effort: very_high
          cost: "Mehrjähriges Transformationsprojekt"
          time_to_deploy: "18-24 Monate"
          prerequisites: "Vorstand, alle Prozesseigner, IT-Architektur, Change Management"
          reversibility: very_low
        warnings:
          - "Grösste strukturelle Veränderung — erfordert organisationale Reife"
          - "Scheitert ohne parallele Kultur-Transformation (A4)"
          - "Pilotlinie zwingend (6 Monate Vorlauf)"

    # ─────────────────────────────────────────────────────────────────
    # CHOICE ARCHITECTURE: 4 Pfade
    # ─────────────────────────────────────────────────────────────────
    choice_architecture:
      description: |
        BMW wählt EINEN der 4 Pfade. Jeder Pfad kombiniert Interventionen aus
        allen 3 Hebeln (A, B, C) mit unterschiedlicher Intensität und Geschwindigkeit.
        Die Pfade sind aufeinander aufbauend: Pfad 2 enthält alles aus Pfad 1 plus mehr.

      # ─────────────────────────────────────────────────────────────
      path_1_evolution:
        name: "EVOLUTION — Sanfte Veränderung"
        speed: "Langsam (24+ Monate)"
        philosophy: "Vertrauen aufbauen, organisch wachsen, minimaler Widerstand"
        risk_level: low
        disruption_level: minimal
        interventions:
          hebel_a: [INT-BMW-A1, INT-BMW-A2]
          hebel_b: [INT-BMW-B1]
          hebel_c: [INT-BMW-C1]
        total_interventions: 4
        implementation_sequence:
          - phase: "Monat 0-1"
            actions: ["INT-BMW-A1 (Buddy)", "INT-BMW-B1 (Meeting-Zeitfenster)"]
            theme: "Sichtbarkeit schaffen"
          - phase: "Monat 2-6"
            actions: ["INT-BMW-A2 (Peer-Review)"]
            theme: "Soziale Normen etablieren"
          - phase: "Monat 6-12"
            actions: ["INT-BMW-C1 (One-Click Report)"]
            theme: "Effort senken"
          - phase: "Monat 12-24"
            actions: ["Konsolidierung, Messung, Optimierung"]
            theme: "Lernen und anpassen"
        predicted_effect:
          delta_P_compliance: "+6.2pp"
          target_P: "8.3%"
          CI_95: [0.05, 0.12]
          time_to_effect: "12-18 Monate für Vollwirkung"
        complementarity_bonus: "+1.0pp (γ A1×A2 = 0.30)"
        cost_estimate: "Gering (~50k EUR + FK-Zeit)"
        organizational_prerequisites:
          - "HR erstellt Buddy-Pairing"
          - "Projektleiter akzeptieren 10-min Compliance-Slot"
          - "IT baut One-Click Formular"
        ideal_for: |
          Organisationen die noch KEINE Erfahrung mit Verhaltensinterventionen haben.
          Wenn Vertrauen erst aufgebaut werden muss. Wenn Betriebsrat skeptisch ist.
        limitations: |
          Erreicht nicht Aviation Benchmark (15%). Strukturelle Probleme (Ψ_Tp, Ψ_H)
          bleiben bestehen. Ohne Prozess-Änderung ist Decke bei ~10%.

      # ─────────────────────────────────────────────────────────────
      path_2_reform:
        name: "REFORM — Gezielte Veränderung"
        speed: "Moderat (12-18 Monate)"
        philosophy: "Strukturelle Hebel aktivieren, aber mit Puffern und Pilotphasen"
        risk_level: medium
        disruption_level: moderate
        interventions:
          hebel_a: [INT-BMW-A1, INT-BMW-A2, INT-BMW-A3]
          hebel_b: [INT-BMW-B1, INT-BMW-B2]
          hebel_c: [INT-BMW-C1, INT-BMW-C2]
        total_interventions: 7
        implementation_sequence:
          - phase: "Monat 0-1"
            actions: ["INT-BMW-A1 (Buddy)", "INT-BMW-B1 (Meeting-Slot)"]
            theme: "Quick Wins"
          - phase: "Monat 1-3"
            actions: ["INT-BMW-A2 (Peer-Review)", "INT-BMW-C1 (One-Click)"]
            theme: "Normen + Effort"
          - phase: "Monat 3-6"
            actions: ["INT-BMW-B2 (Zeitpuffer)", "INT-BMW-C2 (Direct-Line)"]
            theme: "Prozess-Anpassungen"
          - phase: "Monat 6-12"
            actions: ["INT-BMW-A3 (Compliance-Gate) — Pilot 1 Abteilung"]
            theme: "Strukturelle Accountability"
          - phase: "Monat 12-18"
            actions: ["INT-BMW-A3 Rollout + Konsolidierung"]
            theme: "Skalierung"
        predicted_effect:
          delta_P_compliance: "+12.2pp"
          target_P: "14.3%"
          CI_95: [0.09, 0.20]
          time_to_effect: "12 Monate für Vollwirkung"
        complementarity_bonus: "+2.5pp (multiple γ > 0)"
        cost_estimate: "Moderat (~200-300k EUR + Prozess-Redesign)"
        organizational_prerequisites:
          - "Alles aus Pfad 1"
          - "PMO-Alignment für Zeitpuffer"
          - "Compliance-Team für Direct-Line"
          - "IT für Gate + PLM-Anpassung"
          - "1 Pilot-Abteilung identifiziert"
        ideal_for: |
          BMW's aktuelle Situation: Projekt PRJ-BMW-001 läuft, Management ist sensibilisiert
          (VW Dieselgate Awareness), aber organisationale Reife für Transformation fehlt noch.
          EMPFOHLENER PFAD für Phase 1 (Q1-Q3 2026).
        limitations: |
          Erreicht Aviation Benchmark knapp (14%). Identitäts-Transformation (langfristig)
          fehlt noch. Ohne Pfad 3/4 stagniert Effekt bei ~14%.

      # ─────────────────────────────────────────────────────────────
      path_3_transformation:
        name: "TRANSFORMATION — Tiefgreifende Veränderung"
        speed: "Schnell (6-12 Monate)"
        philosophy: "Alle drei Hebel gleichzeitig, parallele Implementierung, ambitioniert"
        risk_level: high
        disruption_level: significant
        interventions:
          hebel_a: [INT-BMW-A1, INT-BMW-A2, INT-BMW-A3, INT-BMW-A4]
          hebel_b: [INT-BMW-B1, INT-BMW-B2, INT-BMW-B3]
          hebel_c: [INT-BMW-C1, INT-BMW-C2, INT-BMW-C3]
        total_interventions: 10
        implementation_sequence:
          - phase: "Monat 0-1"
            actions: ["INT-BMW-A1", "INT-BMW-B1", "INT-BMW-C1"]
            theme: "Sofort-Massnahmen (alle 3 Hebel)"
          - phase: "Monat 1-3"
            actions: ["INT-BMW-A2", "INT-BMW-B2", "INT-BMW-C2"]
            theme: "Mittlere Intensität (alle 3 Hebel)"
          - phase: "Monat 3-6"
            actions: ["INT-BMW-A3", "INT-BMW-B3", "INT-BMW-C3 Start"]
            theme: "Strukturelle Veränderungen"
          - phase: "Monat 6-12"
            actions: ["INT-BMW-A4 Start", "INT-BMW-C3 Rollout"]
            theme: "Kulturelle Transformation beginnt"
        predicted_effect:
          delta_P_compliance: "+18.7pp"
          target_P: "20.8%"
          CI_95: [0.13, 0.29]
          time_to_effect: "9 Monate für Hauptwirkung"
        complementarity_bonus: "+4.5pp (γ-Netzwerk über alle Hebel)"
        cost_estimate: "Hoch (~800k-1.2M EUR + Organisationsumbau)"
        organizational_prerequisites:
          - "Alles aus Pfad 1 + 2"
          - "Vorstand-Beschluss für FK-Projekt-Cap"
          - "Budget für PLM-Automatisierung (~500k-1M)"
          - "Dediziertes Transformations-Team (3-5 FTE)"
          - "Change Management Begleitung"
        ideal_for: |
          Wenn ein konkreter Compliance-Vorfall (z.B. Rückruf, Audit-Finding) den
          Handlungsdruck erhöht hat. Wenn Vorstand explizit «Best in Class» will.
          Wenn Budget und Organisationsreife vorhanden sind.
        limitations: |
          Hoher Widerstand wahrscheinlich (besonders B3: Projekt-Cap).
          Parallele Implementierung erfordert starkes Programm-Management.
          Risiko der Überforderung bei zu vielen gleichzeitigen Veränderungen.

      # ─────────────────────────────────────────────────────────────
      path_4_revolution:
        name: "REVOLUTION — Maximale Geschwindigkeit"
        speed: "Sehr schnell (3-6 Monate)"
        philosophy: "Alles gleichzeitig, maximale Intensität, akzeptierter Widerstand"
        risk_level: very_high
        disruption_level: maximal
        interventions:
          hebel_a: [INT-BMW-A1, INT-BMW-A2, INT-BMW-A3, INT-BMW-A4]
          hebel_b: [INT-BMW-B1, INT-BMW-B2, INT-BMW-B3, INT-BMW-B4]
          hebel_c: [INT-BMW-C1, INT-BMW-C2, INT-BMW-C3, INT-BMW-C4]
        total_interventions: 12
        implementation_sequence:
          - phase: "Monat 0-1"
            actions: ["ALLE Low-Intensity: A1, B1, C1, C2"]
            theme: "Sofort-Paket"
          - phase: "Monat 1-2"
            actions: ["ALLE Medium: A2, B2"]
            theme: "Soziale + Temporale Hebel"
          - phase: "Monat 2-4"
            actions: ["ALLE High: A3, B3, C3"]
            theme: "Struktureller Umbau (parallel)"
          - phase: "Monat 4-6"
            actions: ["ALLE Transformative: A4, B4, C4 — Kickoff"]
            theme: "Kulturelle Revolution starten"
          - phase: "Monat 6-12"
            actions: ["Rollout + Stabilisierung aller 12 Interventionen"]
            theme: "Verankerung"
        predicted_effect:
          delta_P_compliance: "+23pp"
          target_P: "25.1%"
          CI_95: [0.14, 0.36]
          time_to_effect: "6 Monate für Hauptwirkung"
        complementarity_bonus: "+6pp (maximales γ-Netzwerk)"
        cost_estimate: "Sehr hoch (~2-3M EUR + Organisations-Transformation)"
        organizational_prerequisites:
          - "Alles aus Pfad 1 + 2 + 3"
          - "CEO-Mandat mit Board-Backing"
          - "Dediziertes Compliance-Transformation-Office (5-8 FTE)"
          - "Budget für IT (PLM + Process), HR (Zielsysteme), Change (Kommunikation)"
          - "Externe Begleitung (FehrAdvice + Management Consulting)"
          - "Betriebsrat frühzeitig einbinden"
        ideal_for: |
          NUR wenn existenzielle Bedrohung vorliegt (z.B. behördliche Auflage,
          drohender Lizenzentzug, schwerer Compliance-Verstoss mit Strafverfahren).
          Wenn «Business as Usual» keine Option mehr ist.
        limitations: |
          Höchstes Widerstandsrisiko. Breites CI [14%, 36%] zeigt Unsicherheit.
          Kann Organisation überfordern → Implementierungs-Ermüdung.
          Transformative Interventionen (A4, B4, C4) brauchen TROTZDEM 12+ Monate
          für volle Wirkung — Revolution beschleunigt den START, nicht das Ergebnis.
        critical_warning: |
          ⛔ Pfad 4 ist NICHT «Pfad 3 nur schneller». Die Parallelisierung aller
          12 Interventionen erzeugt Interaktionseffekte die schwer vorhersagbar sind.
          Empfehlung: Nur mit dediziertem Transformations-Office und externer Begleitung.

    # ─────────────────────────────────────────────────────────────────
    # PFAD-VERGLEICH (Zusammenfassung)
    # ─────────────────────────────────────────────────────────────────
    path_comparison:
      summary_table:
        - path: "1 EVOLUTION"
          interventions: 4
          hebel: "A:2 B:1 C:1"
          speed: "24+ Mo"
          target_P: "8.3%"
          cost: "~50k"
          risk: "Low"
          benchmark: "< ISO 26262"
        - path: "2 REFORM"
          interventions: 7
          hebel: "A:3 B:2 C:2"
          speed: "12-18 Mo"
          target_P: "14.3%"
          cost: "~250k"
          risk: "Medium"
          benchmark: "≈ Aviation"
        - path: "3 TRANSFORMATION"
          interventions: 10
          hebel: "A:4 B:3 C:3"
          speed: "6-12 Mo"
          target_P: "20.8%"
          cost: "~1M"
          risk: "High"
          benchmark: "> Aviation"
        - path: "4 REVOLUTION"
          interventions: 12
          hebel: "A:4 B:4 C:4"
          speed: "3-6 Mo"
          target_P: "25.1%"
          cost: "~2.5M"
          risk: "Very High"
          benchmark: ">> Aviation"
      recommendation: |
        EMPFEHLUNG: Pfad 2 (REFORM) als Startpunkt für PRJ-BMW-001.
        Nach 12 Monaten evaluieren und ggf. auf Pfad 3 eskalieren.
        Pfad 4 nur bei existenzieller Bedrohung.

    # ─────────────────────────────────────────────────────────────────
    # CROWDING-OUT REGELN (für ALLE Pfade)
    # ─────────────────────────────────────────────────────────────────
    crowding_out_rules:
      absolute_prohibition:
        - intervention: "Monetäre Compliance-Boni"
          reason: "u_F × u_S = -0.25 — zerstört soziale Normen die ALLE Pfade tragen"
        - intervention: "Compliance-Rankings mit Bestrafung"
          reason: "Erzeugt Vertuschung statt Meldung → P5 kollabiert"
      conditional_warnings:
        - combination: "B3 (Projekt-Cap) + hohe Parallelisierung"
          risk: "FK-Frustration → passive Resistance"
          mitigation: "Priorisierungs-Workshops, nicht einfach «weniger machen»"
        - combination: "C3 (PLM-Automatisierung) + ohne A4 (Identität)"
          risk: "Moralisches Disengagement: «System macht es ja»"
          mitigation: "IMMER C3 mit A4 kombinieren"

    complementarity_matrix:
      cross_hebel_synergies:
        - pair: [A3, B2]
          gamma_ij: 0.35
          mechanism: "Gate (A3) profitiert von Zeitpuffer (B2) — FK hat Zeit für Sign-Off"
        - pair: [A2, C2]
          gamma_ij: 0.30
          mechanism: "Peer-Review (A2) nutzt Direct-Line (C2) als Eskalationskanal"
        - pair: [A4, C4]
          gamma_ij: 0.50
          mechanism: "Identität (A4) + Compliance-by-Design (C4) = stärkstes Cross-Hebel-Paar"
        - pair: [B3, C3]
          gamma_ij: 0.40
          mechanism: "Weniger Projekte (B3) + Automatisierung (C3) = dramatisch weniger Effort"
        - pair: [A1, B1]
          gamma_ij: 0.20
          mechanism: "Buddy (A1) und Meeting-Slot (B1) verstärken sich gegenseitig bei niedrigem Aufwand"
      within_hebel_synergies:
        - pair: [A1, A2]
          gamma_ij: 0.30
          mechanism: "Buddy baut Vertrauen für Peer-Review"
        - pair: [A3, A4]
          gamma_ij: 0.45
          mechanism: "Gate (Struktur) + Identität (Kultur) = nachhaltigstes Paar"
        - pair: [B2, B3]
          gamma_ij: 0.35
          mechanism: "Zeitpuffer + Projekt-Cap = Ψ_Tp massiv gesenkt"
        - pair: [C1, C3]
          gamma_ij: 0.40
          mechanism: "One-Click (manuell) → Automatisierung (systemisch): gleitender Übergang"

    predictions:
      portfolio_effect:
        path_1: "+6.2pp → 8.3%"
        path_2: "+12.2pp → 14.3%"
        path_3: "+18.7pp → 20.8%"
        path_4: "+23pp → 25.1%"
        baseline: "2.1% (FK Full Compliance)"
        aviation_benchmark: "15-25%"
      recommendation: "Pfad 2 (REFORM) → nach Evaluation Pfad 3"

    learnings: []

