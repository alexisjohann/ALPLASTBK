# ALPLA PCI Parameter Priors
# LLMMC-Schätzungsgrundlagen für Plant Comparability Index
#
# ANLEITUNG FÜR ALPLA:
# - Dieses File enthält unsere Annahmen (Priors) für die Schätzungen
# - Sie können jeden Wert anpassen basierend auf Ihrem Wissen
# - Nach Anpassung: python scripts/estimate_plant_parameters.py
#
# Version: 1.0
# Datum: 2026-01-19
# Methodik: LLMMC (LLM Monte Carlo) - Appendix AN

---
metadata:
  version: "1.0"
  date: "2026-01-19"
  methodology: "LLMMC"
  reference: "docs/methods/ALPLA_Plant_Comparability_Index_PCI.md"
  simulations: 1000
  confidence_level: 0.80  # 80% CI = [P10, P90]

# =============================================================================
# GLOBALE CONSTRAINTS
# Diese Werte MÜSSEN erfüllt sein (harte Constraints)
# =============================================================================
global_constraints:
  alpla_global:
    total_employees: 25500
    total_plants: 206
    avg_employees_per_plant: 124  # = 25500/206

  north_america_region:
    revenue_share_pct: 15
    estimated_employees: 3825  # = 25500 * 0.15
    usa_plants: 17
    canada_mexico_plants_est: 8  # Schätzung
    usa_employee_share_pct: 75  # USA hat ~75% der NA-Mitarbeiter
    usa_employees_target: 2870  # = 3825 * 0.75
    usa_employees_tolerance_pct: 15  # ±15% = 2440-3300

# =============================================================================
# PRIOR-VERTEILUNGEN NACH WERKSTYP
# Distribution: lognormal(mu, sigma) mit hard bounds [min, max]
# mu = ln(median), sigma = Streuung
# =============================================================================
plant_type_priors:
  in_house:
    description: "Werk auf Kundengelände, dediziert für einen Kunden"
    distribution: "lognormal"
    median: 75
    sigma: 0.4
    min: 30
    max: 150
    rationale: "Schlanke Struktur, keine eigene Admin, Fokus auf Produktion"

  near_customer:
    description: "Werk in Kundennähe, primär ein Hauptkunde"
    distribution: "lognormal"
    median: 135
    sigma: 0.35
    min: 80
    max: 250
    rationale: "Etwas mehr Flexibilität als In-House, aber kundenorientiert"

  standalone:
    description: "Eigenständiges Werk, multiple Kunden"
    distribution: "lognormal"
    median: 180
    sigma: 0.45
    min: 100
    max: 400
    rationale: "Volle Infrastruktur, eigene Admin, Qualität, Logistik"

  regional_hq:
    description: "Standalone + regionale Admin/Tech-Funktionen"
    distribution: "lognormal"
    median: 330
    sigma: 0.4
    min: 200
    max: 600
    rationale: "McDonough ist US-HQ mit Tech Center Atlanta"

# =============================================================================
# BLUE COLLAR / WHITE COLLAR SPLIT
# Anteil Blue Collar (Produktion) vs. White Collar (Admin/Management)
# =============================================================================
workforce_composition:
  by_plant_type:
    in_house:
      blue_collar_pct: 88
      white_collar_pct: 12
      rationale: "Minimal Admin - vom Kunden übernommen"
    near_customer:
      blue_collar_pct: 85
      white_collar_pct: 15
      rationale: "Etwas mehr Koordination als In-House"
    standalone:
      blue_collar_pct: 80
      white_collar_pct: 20
      rationale: "Volle Admin-Struktur (HR, Finance, QM, Engineering)"
    regional_hq:
      blue_collar_pct: 70
      white_collar_pct: 30
      rationale: "McDonough: Tech Center + Regional Admin"

  blue_collar_roles:
    - "Maschinenführer (Machine Operators)"
    - "Produktionsmitarbeiter (Production Workers)"
    - "Lagermitarbeiter (Warehouse Workers)"
    - "Wartungstechniker (Maintenance Technicians)"
    - "Qualitätsprüfer (Quality Inspectors - Floor)"
    - "Schichtführer (Shift Supervisors)"

  white_collar_roles:
    - "Plant Manager"
    - "HR Manager / Coordinator"
    - "Finance / Accounting"
    - "Quality Manager"
    - "Process Engineers"
    - "Supply Chain / Logistics Coordinator"
    - "Customer Service"
    - "Administrative Staff"

  churn_rates_prior:
    blue_collar:
      us_manufacturing_avg: 28
      alpla_estimated_median: 22
      alpla_estimated_sigma: 6
      min: 10
      max: 45
      rationale: "ALPLA besser als Branche durch Benefits, aber Schichtarbeit bleibt Faktor"
    white_collar:
      us_manufacturing_avg: 12
      alpla_estimated_median: 10
      alpla_estimated_sigma: 3
      min: 4
      max: 20
      rationale: "Stabilere Karrierepfade, bessere Work-Life-Balance"

# =============================================================================
# WERK-SPEZIFISCHE PRIORS
# Hier können Sie werkspezifische Informationen eintragen
# =============================================================================
plants:
  US-001:
    name: "McDonough GA"
    type: "regional_hq"
    known_facts:
      - "US Headquarters"
      - "Tech Center Atlanta nearby"
