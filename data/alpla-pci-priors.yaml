# =============================================================================
# ANDERE PARAMETER-PRIORS (S3-S6, O1-O5, P1-P4)
# =============================================================================
other_parameters:
  S3_plant_age:
    description: "Jahre seit Eröffnung"
    source: "Bekannte Eröffnungsjahre"
    estimation_needed: false

  S4_technology_complexity:
    description: "Tech-Mix Index (1-3)"
    prior:
      standalone: { median: 2.0, sigma: 0.3 }
      in_house: { median: 1.5, sigma: 0.2 }
      near_customer: { median: 1.8, sigma: 0.25 }
    rationale: "In-House meist EBM-fokussiert (einfacher)"

  S5_automation_pct:
    description: "Automatisierungsgrad (%)"
    prior:
      new_plants_2018_plus: { median: 65, sigma: 10 }
      established_pre_2015: { median: 45, sigma: 15 }
    rationale: "Neuere Werke höher automatisiert"

  S6_shift_model:
    description: "Schichtmodell (1-4)"
    prior:
      in_house: { mode: 3, rationale: "Meist 3-Schicht für Kundenbedarf" }
      standalone_large: { mode: 4, rationale: "Konti bei >200 MA" }
      standalone_small: { mode: 2, rationale: "2-Schicht bei <150 MA" }

  O1_customer_concentration:
    description: "% Revenue vom Top-Kunden"
    prior:
      in_house: { median: 95, min: 85, max: 100 }
      near_customer: { median: 70, min: 50, max: 90 }
      standalone: { median: 35, min: 15, max: 60 }

  O2_plant_manager_tenure:
    description: "Jahre im Amt"
    prior:
      distribution: "exponential"
      mean: 4.5
      rationale: "ALPLA hat stabile Führung, aber Rotation alle 4-6 Jahre"

  O3_hr_onsite:
    description: "Dedizierter HR vor Ort (0/1)"
    prior:
      threshold_employees: 150
      rationale: "Ab 150 MA meist dedizierter HR"

  O4_union_status:
    description: "Union/Non-Union"
    prior:
      kentucky: { prob_union: 0.1 }
      ohio: { prob_union: 0.25 }
      missouri: { prob_union: 0.15 }
      pennsylvania: { prob_union: 0.20 }
      other_states: { prob_union: 0.10 }
    rationale: "Rust Belt Staaten höhere Gewerkschaftsdichte"

  O5_training_hours:
    description: "Trainingsstunden/MA/Jahr"
    prior:
      alpla_global_avg: 24
      sigma: 8
      rationale: "ALPLA Academy Standard"

  P1_baseline_churn:
    description: "12M Turnover Rate (%)"
    prior:
      manufacturing_us_avg: 25
      alpla_estimated: { median: 18, sigma: 6 }
    rationale: "ALPLA besser als Branche durch Benefits/Kultur"

  P2_absence_rate:
    description: "Unplanned Absence (%)"
    prior:
      us_manufacturing_avg: 3.5
      sigma: 1.2

  P3_trir:
    description: "Total Recordable Incident Rate"
    prior:
      plastics_industry_avg: 3.8
      alpla_estimated: { median: 2.5, sigma: 0.8 }
    rationale: "ALPLA Fokus auf Sicherheit"

  P4_productivity:
    description: "Output/FTE Index (100=avg)"
    prior:
      median: 100
      sigma: 15
      correlation_with_automation: 0.4

# =============================================================================
# VALIDIERUNGS-REGELN
# =============================================================================
validation_rules:
  - name: "US Total Employee Check"
    formula: "sum(S2) within usa_employees_target ± tolerance"

  - name: "In-House Size Check"
    formula: "all(in_house.S2 < 150)"

  - name: "Regional HQ Size Check"
    formula: "regional_hq.S2 > 250"

  - name: "Type Consistency"
    formula: "in_house.O1 > 80%"
