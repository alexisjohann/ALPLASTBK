answer: |
  ## Kontext (Ψ) im EBF

  **Kontext ist keine Kontrollvariable — Kontext ist das Explanans.** Das ist der zentrale theoretische Beitrag des EBF: Dieselbe Person trifft in unterschiedlichen Kontexten **systematisch unterschiedliche** Entscheidungen, und diese Variation ist kein Rauschen, sondern ein erklärbares Signal.

  ### Die zentrale Erkenntnis

  ```
  DIESELBE FRAGE + ANDERER KONTEXT = KOMPLETT ANDERE ANTWORT
  ```

  Beispiel: «Soll ich mehr sparen?»
  - 25-jährige Berufseinsteigerin in Zürich → «Ja, 3. Säule nutzen»
  - 58-jähriger Arbeitsloser in Berlin → «Nein, Liquidität sichern»

  **Ohne Kontext ist jede Antwort falsch.**

  ### Die 8 Ψ-Dimensionen

  Jede Situation wird durch 8 Dimensionen charakterisiert:

  | Symbol | Dimension | Frage |
  |--------|-----------|-------|
  | **Ψ_I** | Institutional | Welche Regeln, Gesetze, Defaults gelten? |
  | **Ψ_S** | Social | Wer ist dabei? Welche sozialen Normen? |
  | **Ψ_C** | Cognitive | Müde? Gestresst? Aufmerksam? Motiviert? |
  | **Ψ_K** | Cultural | Welche Werte, Traditionen, Religion? |
  | **Ψ_E** | Economic | Wieviel Budget, Zeit, Energie verfügbar? |
  | **Ψ_T** | Temporal | Wann? Zeitdruck? Welche Lebensphase? |
  | **Ψ_M** | Material | Welche Technologie, Infrastruktur, Objekte? |
  | **Ψ_F** | Physical | Wo physisch? Zuhause, Büro, öffentlich, online? |

  ### Parameter Context Transformation (PCT)

  Die revolutionäre Idee: Verhaltensparameter sind **keine Konstanten**, sondern Funktionen des Kontexts.

  ```
  Traditionell:  λ = 2.25  (Loss Aversion ist eine Konstante)
  EBF:           λ(Ψ, 10C) = variabel
                 λ_welfare_stigma = 2.5
                 λ_workplace_peers = 1.8
  ```

  Die Transformation:
  ```
  θ_B = θ_A × ∏ᵢ M(ΔΨᵢ)

  Wobei:
    θ_A = Parameter im Anchor-Kontext (aus Paper)
    θ_B = Parameter im Target-Kontext (Vorhersage)
    ΔΨᵢ = Ψ_i(Target) − Ψ_i(Anchor)
    M(·) = Ψ-Multiplikator
  ```

  ### Die 5-Ebenen Kontext-Hierarchie

  Bei jeder Analyse werden 5 Ebenen in strenger Reihenfolge durchlaufen:

  | Ebene | Was? | Faktoren | Datenbank |
  |-------|------|----------|-----------|
  | 1. MACRO | Land/Markt | 404 | `context/ch/BCM2_04_KON_*.yaml` |
  | 2. MESO | Branche/Kunde | variabel | `customers/*/` |
  | 3. MICRO | Situation | 5 | `context-dimensions.yaml` |
  | 4. INDIVIDUAL | Person | 48 | `BCM2_05_IND_individual.yaml` |
  | 5. META | Entscheidung | 42 | `BCM2_06_META_decision.yaml` |

  **PFLICHT-Reihenfolge:** MACRO → MESO → MICRO → INDIVIDUAL → META

  ### Die BCM2 Kontextdatenbank

  Die Kontextdimensionen werden durch die BCM2-Datenbank operationalisiert:

  | Achse | Code | Faktoren | Quellen |
  |-------|------|----------|---------|
  | Demografisch | DEM | 60 | BFS, SECO, BSV |
  | Ökonomisch | ECO | 54 | SECO, SNB, BFS, KOF |
  | Institutionell-Politisch | POL | 59 | Bundeskanzlei, World Bank |
  | Technologisch-Ökologisch | TEC | 65 | BFS, BFE, BAFU |
  | Sozio-Kulturell | SOC | 166 | BFS, ESS, WVS, gfs.bern, Sotomo |

  **Datenpfad:** `data/dr-datareq/sources/context/`

  ### Warum Menschen Kontext nicht selbst liefern

  | Grund | Erklärung |
  |-------|-----------|
  | Fisch im Wasser | Kontext ist unsichtbar für den Handelnden |
  | Fundamental Attribution Error | Menschen erklären Verhalten durch Persönlichkeit, nicht Situation |
  | Curse of Knowledge | Offensichtliches wird nicht erwähnt |
  | System 1 | Schnelles Denken = keine Kontext-Reflexion |

  → Deshalb analysiert das EBF den Kontext **aktiv und systematisch**.

  ### Context Vector Architecture (CVA) für Kunden

