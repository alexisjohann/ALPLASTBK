answer: |
  ## Complementarity (γ) im EBF

  **Complementarity** ist das mathematische Konzept im Evidence-Based Framework (EBF), das beschreibt, **wie verschiedene Nutzendimensionen miteinander interagieren** — ob sie sich gegenseitig verstärken oder untergraben.

  ### Die Kernidee

  ```
  ADDITIV (γ = 0):         Gesamtnutzen = U_F + U_S + U_E
  KOMPLEMENTÄR (γ > 0):    Gesamtnutzen = U_F + U_S + γ·U_F·U_S  (verstärkend)
  SUBSTITUTIV (γ < 0):     Gesamtnutzen = U_F + U_S + γ·U_F·U_S  (unterminierend)
  ```

  ### Die formale Gleichung

  ```
  Q = Σᵢ ωᵢ · Uⁱ + Σᵢ≠ⱼ γᵢⱼ · Uⁱ · Uⱼ
  ```

  Wobei:
  - **Q** = Gesamtnutzen (Total Welfare)
  - **ωᵢ** = Gewicht der Dimension i
  - **Uⁱ** = Nutzen in Dimension i
  - **γᵢⱼ** = Komplementaritätsparameter zwischen Dimension i und j

  ### Die 3 Fälle

  | γ-Wert | Bedeutung | Beispiel |
  |--------|-----------|----------|
  | **γ = 0** | Additiv (Default) | Einkommen und Gesundheit unabhängig |
  | **γ > 0** | Komplementär | Soziale Anerkennung verstärkt intrinsische Motivation |
  | **γ < 0** | Substitutiv (Crowding-Out) | Finanzielle Anreize untergraben soziale Normen |

  ### Die EXC-Regeln (Exclusion Principle)

  **Additivität ist DEFAULT** — Komplementarität (γ ≠ 0) muss begründet werden:

  - **EXC-1**: Additiv braucht keine Begründung
  - **EXC-2**: Multiplikativ erfordert Veto-Analyse
  - **EXC-5**: Nur Whitelist V1-T1 akzeptiert

  ### Empirisch validierte γ-Werte (PAR-COMP)

  | Parameter | γ-Wert | Interaktion | Quelle |
  |-----------|--------|-------------|--------|
  | PAR-COMP-001 | +0.35 | Identity × Social | Akerlof & Kranton |
  | PAR-COMP-002 | −0.68 | Social × Financial (Crowding-Out) | Fehr & Falk |
  | PAR-COMP-004 | +0.28 | Social × Warm Glow | Andreoni |

  Diese Werte sind **NICHT willkürlich** — sie stammen aus der wissenschaftlichen Literatur und Projektvalidierungen.

  ### Der wichtigste Crowding-Out-Effekt

  ```
  Finanzielle Anreize + Soziale Normen = GEFÄHRLICH (γ = −0.68)
  ```

  Wenn man für freiwilliges Verhalten bezahlt, zerstört das die soziale Motivation. Klassisches Beispiel: Blutspende-Paradox (Titmuss 1970, Frey & Jegen 2001).

  ### Warum Complementarity wichtig ist

  1. **Erklärt Interventionsversagen**: Warum gut gemeinte Massnahmen manchmal schaden
  2. **Warnt vor Crowding-Out**: Nicht jede Kombination von Anreizen funktioniert
  3. **Ermöglicht synergetisches Design**: Dimensionen gezielt verstärkend kombinieren
  4. **Ist empirisch fundiert**: Jeder γ-Wert hat Paper-Referenzen (PAR-COMP-xxx)

