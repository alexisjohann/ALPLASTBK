      output: "Kontext Ψ"
    - code: "WHERE"
      appendix: "BBB"
      question: "Woher die Zahlen?"
      output: "Parameter Θ"
    - code: "AWARE"
      appendix: "AU"
      question: "Wie bewusst?"
      output: "Awareness A(·)"
    - code: "READY"
      appendix: "AV"
