# ═══════════════════════════════════════════════════════════════════════════════
# CORE DEFINITION
# ═══════════════════════════════════════════════════════════════════════════════

definition:
  description: |
    Das Behavioral Change Model (BCM) ist ein BERATUNGS-TOOL mit wissenschaftlichem
    Fundament. Es wurde ab 2010 von FehrAdvice & Partners AG in der Beratungspraxis
    eingesetzt und über jedes Kunden-Mandat verfeinert und professionalisiert.

    Das BCM ist KEIN akademisches Framework, das in einem Elfenbeinturm entwickelt
    wurde. Es entstand in der Praxis — aus der täglichen Arbeit mit Kunden, aus
    realen Verhaltensänderungsprojekten, aus Experimenten die funktioniert haben
    und solchen die gescheitert sind.

    Das BCM IST das 10C Framework. Die 10 CORE-Dimensionen zusammen ergeben das
    vollständige Bild einer Verhaltensänderungssituation.

  nature: "Beratungs-Tool mit wissenschaftlichem Fundament"
  origin: "Beratungspraxis (nicht Akademie)"
  in_use_since: 2010
  refined_through: "Jedes Kunden-Mandat (iteratives Lernen)"
  structure: "BCM = 10C Framework"

  identity: |
    BCM = Beratungs-Tool
    - Entstanden in der Praxis (ab 2010)
    - Wissenschaftlich fundiert (nicht akademisch entwickelt)
    - Iterativ verfeinert über Kunden-Mandate
    - Manuell angewendet (Workshops, Grids, Interviews)
    - Bewährt in 20+ Kunden, hunderten Projekten

  note: |
    Das BCM ist KEIN einfaches Produkt von drei Faktoren. Es gibt KEINE Formel
    'Willingness × Ability × Context'. Diese Vereinfachung ist eine Halluzination.
    'Ability' ist kein BCM-Konzept. Das BCM operiert über die 10C-Dimensionen.

# ═══════════════════════════════════════════════════════════════════════════════
# BCM DIAGNOSE — Der operative Kern
# ═══════════════════════════════════════════════════════════════════════════════

diagnostic:
  description: |
    Der Diagnose-Bereich ist der operative Kern des BCM. Er reduziert das
    10C Framework auf eine konkrete diagnostische Fragestellung:

    GEGEBEN:
      - Der Kontext (Ψ — 8 Dimensionen, WHEN)
      - Das Zielsegment (WHO)
      - Das Verhaltensänderungsziel (WHAT)

    SCHÄTZE:
      - Die Awareness des Zielsegments für das Ziel (AWARE)
      - Die Willingness des Zielsegments für das Ziel (READY)

    POSITIONIERE:
      - Awareness und Willingness auf einer 2D-Matrix

    OUTPUT:
      - Wie wahrscheinlich ist eine Verhaltensänderung?
      - In welcher Fristigkeit ist sie möglich?

    BEDINGUNG: Ceteris paribus — ohne neue Interventionen.
    Alle bisherigen Interventionen bleiben erhalten.

  inputs:
    - dimension: "WHEN"
      role: "Kontext (Ψ)"
      description: "Die 8 Kontextdimensionen der Situation"
    - dimension: "WHO"
      role: "Zielsegment"
      description: "Die Zielpopulation für die Verhaltensänderung"
    - dimension: "WHAT"
      role: "Verhaltensänderungsziel"
      description: "Das konkrete Verhaltensziel (FEPSDE-Dimensionen)"

  estimation:
    - dimension: "AWARE"
      role: "Awareness-Schätzung"
      description: "Wie bewusst ist das Zielsegment bezüglich des Ziels?"
    - dimension: "READY"
      role: "Willingness-Schätzung"
      description: "Wie handlungsbereit ist das Zielsegment bezüglich des Ziels?"

  visualization: "2D-Matrix (Awareness × Willingness)"

  outputs:
    - name: "Wahrscheinlichkeit"
      description: "Wie wahrscheinlich ist die Verhaltensänderung?"
    - name: "Fristigkeit"
      description: "In welchem Zeithorizont ist sie möglich?"

  condition: "Ceteris paribus — ohne neue Interventionen, bisherige bleiben erhalten"

  # ─────────────────────────────────────────────────────────────────────────
  # 4-Level Schätz-Methodik für Awareness & Willingness
  # ─────────────────────────────────────────────────────────────────────────

  estimation_levels:
    description: |
      Die Schätzung der BCM-Parameter (Awareness, Willingness) erfolgt über
      einen 4-stufigen Bayesian-Update-Prozess durch die Berater:innen.

      WICHTIG: Dieser gesamte Prozess war MANUELL — ohne digitale Plattform.
      Manuelle Schätzung und manuelle Erarbeitung in Workshops, Interviews
      und Beratungsgesprächen. Es gab keine Software-Unterstützung.

    levels:
      - level: 1
        name: "Grid-basierte Einschätzung (Prior)"
        description: |
          Erste Einschätzung aufgrund eines strukturierten Grids und
          beraterischer Erfahrung. Ergibt den initialen Prior für
          Awareness und Willingness des Zielsegments.
        method: "Beraterische Erfahrung + strukturiertes Grid"
        output: "Prior θ₀"

      - level: 2
        name: "Management-Beliefs (Prior Update)"
        description: |
          Korrektur des Priors durch die Beliefs des Managements
          der Kundenorganisation. Das Management kennt das Zielsegment
          und seinen Kontext — diese Information aktualisiert den Prior.
        method: "Bayesian Update durch Management-Einschätzungen"
        output: "Updated Prior θ₁"

      - level: 3
        name: "Empirische Schätzung (Experiment)"
        description: |
          Empirische Schätzung durch ein Experiment, das die Beratung
          durchführt. Liefert datenbasierte Evidenz für die tatsächliche
          Awareness und Willingness im Zielsegment.
        method: "Experiment / empirische Erhebung"
        output: "Empirischer Posterior θ₂"

      - level: 4
        name: "Iteration & beraterisches Lernen"
        description: |
          Iterative Verfeinerung durch beraterisches Lernen im Rahmen
          des Beratungsmandates. Beobachtete Verhaltensänderungen
          (oder deren Ausbleiben) aktualisieren die Schätzungen.
        method: "Iteratives Lernen aus Mandatserfahrung"
        output: "Kalibrierter Posterior θ_final"

    execution: "MANUELL — Workshops, Grids, Interviews, Beratungsgespräche. Keine Software."

    bayesian_interpretation: |
      Die 4 Levels entsprechen einem Bayesian-Update-Prozess:
      θ₀ (Prior aus Grid) → θ₁ (Update durch Management) →
      θ₂ (Update durch Experiment) → θ_final (Update durch Lernen)

    beatrix_evolution: |
      BEATRIX digitalisiert und formalisiert diesen manuellen Prozess:
      - Level 1: Grid → BCM2 Kontextdatenbank (404+ Faktoren) + LLMMC Priors
      - Level 2: Management-Beliefs → strukturierte Eingabe + Bayesian Update
      - Level 3: Experiment → empirische Kalibrierung mit Datenintegration
      - Level 4: Lernen → automatisches Tracking + Parameter-Update
      Die kognitive Kapazitätsgrenze der manuellen Schätzung wird überwunden.

  note: |
    Die Diagnose ist der ERSTE Schritt, aber das BCM war mehr als nur Diagnose —
    es war auch eine Prediction Engine: Aus der Position in der Awareness/Willingness-
    Matrix wurde ein High-Level Interventions-Mix abgeleitet, der dann experimentell
    getestet wurde (siehe prediction_engine Sektion).

# ═══════════════════════════════════════════════════════════════════════════════
# BCM ALS PREDICTION ENGINE — Interventions-Mix aus A/W-Positionierung
# ═══════════════════════════════════════════════════════════════════════════════

prediction_engine:
  description: |
    Das BCM war nicht nur ein Diagnose-Tool, sondern eine PREDICTION ENGINE:
    - Mit welchen Massnahmen kann die Wahrscheinlichkeit der Verhaltensänderung
      über welchen Zeithorizont erhöht werden?
    - Welche Komplementaritäten bestehen zwischen einzelnen Interventionen?
    - Welcher Interventions-Mix ist für welche A/W-Position optimal?

    Der abgeleitete Massnahmen-Mix wurde anschliessend im Rahmen eines
    experimentellen Online-Experiments abgetestet.

  process: |
    MANUELL — Workshops, Beratungsgespräche, manuelle Ableitung.
    Kein Software-Tool, keine automatische Berechnung.

  awareness_willingness_matrix:
    description: |
      Aufgrund der Positionierung auf der Willingness/Awareness-Matrix
      wurde ein High-Level Interventionsmix abgeleitet:

    quadrants:
      - position: "Hohe Awareness + Hohe Willingness"
        diagnosis: "Person weiss und will — aber tut es (noch) nicht"
        intervention_logic: |
          Komplementärer Nudge-Mix zum bisherigen Massnahmenset.
          Die bestehenden Massnahmen sind nicht falsch, aber unvollständig.
          Nudges ergänzen, was fehlt (Defaults, Framing, Salienz).
        primary_target: "WHEN (Kontext), HOW (Komplementarität)"
        key_question: "Was hindert den letzten Schritt?"

      - position: "Niedrige Awareness + Hohe Willingness"
        diagnosis: "Person würde wollen, weiss aber nicht genug"
        intervention_logic: |
          Komplementärer Awareness-Mix + komplementärer Nudge-Mix.
          Zuerst Awareness erhöhen (Information, Salienz, Feedback),
          dann Nudges die den Übergang zur Handlung erleichtern.
        primary_target: "AWARE (Awareness), dann WHEN (Kontext)"
        key_question: "Wie machen wir das Problem sichtbar?"

      - position: "Hohe Awareness + Niedrige Willingness"
        diagnosis: "Person weiss, will aber nicht"
        intervention_logic: |
          Komplementärer Motivations-Mix (intrinsisch + extrinsisch).
          ACHTUNG: Crowding-Out-Risiko bei falschem Mix.
          Motivation über Identität (WHO), Nutzen (WHAT), Normen (WHAT.S).
        primary_target: "WHAT (Utility-Dimensionen), READY (Willingness)"
        key_question: "Warum will die Person nicht?"

      - position: "Niedrige Awareness + Niedrige Willingness"
        diagnosis: "Person weiss nicht und will nicht"
        intervention_logic: |
          Sequenzieller Ansatz: ZUERST Awareness aufbauen,
          DANN Willingness adressieren. Nicht beides gleichzeitig.
          Schwerster Fall — erfordert Langzeit-Strategie.
        primary_target: "AWARE zuerst, dann WHAT/READY"
        key_question: "Wo anfangen? (Awareness hat Priorität)"

  complementarity_between_interventions: |
    Das BCM erkannte, dass Interventionen nicht isoliert wirken:
    - Nudge A + Nudge B kann mehr (oder weniger!) als A + B ergeben
    - Diese Komplementaritäten (γ ≠ 0) sind der Kern des HOW
    - Im manuellen BCM wurde dies durch Berater-Erfahrung eingeschätzt
    - Im EBF ist es formalisiert: γ-Matrix mit 8 empirischen PAR-COMP-Werten

  experimental_validation: |
    Der aus der A/W-Matrix abgeleitete Massnahmen-Mix wurde NICHT nur
    empfohlen, sondern im Rahmen eines experimentellen Online-Experiments
    abgetestet. Dies schloss den Loop:
    1. Diagnose (A/W-Position) → manuell
    2. Interventions-Mix ableiten → manuell, aus Matrix
    3. Experimentell testen → Online-Experiment
    4. Lernen → zurück in Level 4 (iteratives Lernen)

  beatrix_evolution: |
    BEATRIX formalisiert und digitalisiert die Prediction Engine:
    - A/W-Matrix → kontinuierlicher A/W-Raum mit Wahrscheinlichkeiten
    - High-Level-Mix → 9D-Interventionsvektor I⃗ ∈ [0,1]⁹
    - Manuelle Komplementaritäts-Einschätzung → γ-Matrix aus Literatur
    - Online-Experiment → kann integriert oder simuliert werden
    - Berater-Erfahrung → systematisches Bayesian Learning

