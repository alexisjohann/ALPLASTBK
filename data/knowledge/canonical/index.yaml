# Canonical Knowledge Base Index
# SSOT for all canonical entries that the frontend MUST prioritize.
#
# RETRIEVAL RULE: When a user question matches a canonical entry (by slug
# or alias), the canonical answer MUST be returned instead of any
# chat-insight answer. Canonical entries are the Single Source of Truth.
#
# VALIDATION: python scripts/validate_knowledge_consistency.py
# Last updated: 2026-02-13

version: "1.2"
last_updated: "2026-02-15"

# ── Retrieval Priority ───────────────────────────────────────────────────
# Priority 1: Canonical entries (this index)  — ALWAYS wins
# Priority 2: Chat-insights with matching tags — fallback
# Priority 3: LLM generation from CLAUDE.md   — last resort

retrieval_rules:
  - rule: "CANONICAL_FIRST"
    description: >
      If a user question matches a canonical entry by slug or alias,
      return the canonical answer. Do NOT use chat-insights for this topic.
  - rule: "SSOT_OVERRIDE"
    description: >
      If a chat-insight contradicts a canonical entry, the canonical
      entry is authoritative. The chat-insight should be flagged for correction.
  - rule: "ALIAS_MATCHING"
    description: >
      Match user questions against all aliases (case-insensitive, substring).
      A match on any alias triggers the canonical entry.

