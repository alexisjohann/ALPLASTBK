answer: |
  ## Die Drei-Schichten-Architektur (TLA) des EBF

  **Das EBF ist ein mathematisch-formales Framework. Code kann rechnen. Das LLM muss nur UEBERSETZEN.**

  Das ist keine Designentscheidung — das ist eine wissenschaftlich fundierte Architektur-Notwendigkeit, validiert durch 32+ Forschungsarbeiten aus 7 Disziplinen.

  ### Wissenschaftliche Fundierung

  Die TLA basiert auf drei empirischen Evidenzketten:

  1. **Calculator Problem:** Wenn LLMs Berechnungen an Python delegieren statt selbst zu rechnen, steigt die Genauigkeit um 40% (Gao et al., ICML 2023). Bei klinischen Berechnungen sinkt die Fehlerrate um das 5.5-13-fache (Goodell et al., Nature 2025).

  2. **Model Collapse:** Wenn AI-generierte Inhalte rekursiv in neue AI-Trainings fliessen, kollabieren die Modelle unweigerlich — Verteilungsenden verschwinden, Text degeneriert (Shumailov et al., Nature 2024). Falsche Information verbreitet sich 6× schneller als wahre (Vosoughi et al., Science 2018).

  3. **Separation of Concerns:** Die Trennung deterministischer Berechnung von probabilistischer Generierung ist ein fundamentales Informatik-Prinzip (Dijkstra 1974, Parnas 1972) mit beweisbaren Konvergenzgarantien fuer Generator-Verifier-Systeme.

  Etablierte Praezedenzen: PAL, Toolformer, RAG, AlphaGeometry, Constitutional AI und die gesamte Neuro-Symbolic AI Tradition (167-Paper Survey) bestaetigen das Prinzip.

  ### Die drei Schichten

  | Layer | Name | Virus-Susceptibility | Funktion | Evidenz |
  |-------|------|---------------------|----------|---------|
  | **1** | Formale Berechnung (Python) | **0.0** (immun) | Gleichungen deterministisch ausfuehren | PAL: +40%, Tools: 5.5-13× |
  | **2** | Parameter-Store (YAML) | **0.3** (validierbar) | Werte mit Schema, Quellen, Bereichen | RAG: +35% Faktuaritaet |
  | **3** | LLM-Uebersetzung | **0.8** (anfaellig) | Formale Ergebnisse in natuerliche Sprache | Shumailov: Model Collapse |

  ### Layer 1: Formale Berechnung (Python)

  **Susceptibility: 0.0** — Deterministische Berechnung kann nicht halluzinieren.

  ```
  sqrt(sum((p_i - q_i)^2)) gibt IMMER dasselbe Ergebnis.
  Egal wie oft man fragt. Egal welches LLM "denkt".
  ```

  **Existierende Implementierungen:**
  - `models/psf-2.0/` — Papal Selection Framework (liest YAML → berechnet → gibt Ergebnis)
  - `scripts/r_score.py` — Religious Distance Metric
  - `scripts/emerge_algorithm.py` — Interventions-Emergence
  - `scripts/llmmc_calibration.py` — LLM Monte Carlo Kalibrierung
  - `scripts/check_formula_compliance.py` — Formel-Validierung

  **Was Layer 1 NICHT tun darf:** Werte selbst bestimmen. Layer 1 BERECHNET — die Werte kommen aus Layer 2.

  ### Layer 2: Parameter-Store (YAML)

  **Susceptibility: 0.3** — Schema-validierbar, Quellen-nachvollziehbar, Bereiche-pruefbar.

  **Existierende SSOTs:**
  - `data/parameter-registry.yaml` — 140+ Parameter mit CI, Quellen, Bereichen
  - `data/model-registry.yaml` — 10C-Modelle
  - `data/theory-catalog.yaml` — 153 Theorien mit Validitaet
  - `data/dr-datareq/sources/context/` — BCM2 (404 Faktoren)
  - `bibliography/bcm_master.bib` — 2,347 Papers

  **BBB 4-Tier Hierarchie:**
  | Tier | Quelle | Unsicherheit |
  |------|--------|--------------|
  | 1 | Literature (Meta-analysis) | Low |
  | 2 | LLMMC Prior | Medium |
  | 3 | Empirical Calibration | Variable |
  | 4 | Expert Elicitation | High |

  ### Layer 3: LLM-Uebersetzung

  **Susceptibility: 0.8** — Probabilistisch, anfaellig fuer Halluzination.

  **Was das LLM DARF:**
  - Fragen interpretieren und in formale Queries uebersetzen
  - Formale Ergebnisse in natuerliche Sprache erklaeren
  - Kontext-Dimensionen identifizieren (welche Ψ-Dimensionen relevant sind)
  - Sprache an Zielgruppe anpassen (Laie vs. Expert)

  **Was das LLM NICHT DARF:**
  - Zahlen aus dem Training "erinnern" statt aus Layer 2 lesen
  - Formale Ergebnisse "verbessern" oder "abrunden"
  - Parameter-Werte generieren statt nachschlagen
  - Berechnungen im Kopf machen statt an Layer 1 delegieren

  ### Die 4 Architektur-Prinzipien

  | # | Prinzip | Bedeutung |
  |---|---------|-----------|
  | **P1** | Compute, Don't Hallucinate | Jede EBF-Zahl kommt aus formaler Berechnung (Layer 1) |
  | **P2** | Parameters from Registry, Not from Memory | YAML lesen (Layer 2), nicht aus Training erinnern |
  | **P3** | Translate, Don't Generate | Erklaeren was berechnet wurde, nicht neu erfinden |
  | **P4** | Formal Layer is the Immune System | Determinismus = virenfreie Zone |

  ### Zusammenhang mit dem Virus-Framework

  Die TLA ist die **Verteidigungsarchitektur** gegen EBF Information Viruses (→ KB-VIR-001):

  ```
  EIV (Externer Virus)     → Greift Layer 3 an (Halluzination)
                            → Verteidigung: Layer 1 verifiziert
                            → Analogie: Virus befaellt gesunden Organismus

  EGD (Endogener Gendefekt) → Greift Layer 1 DNA an (unsaubere Definitionen)
                            → Verteidigung: ATOMIC SYMBOL RULE + PCT + BBB
                            → Analogie: DNA-Mutation im Organismus selbst
  ```

  **Formel:** `Immunity(Formal_Layer) = f(Definition_Cleanliness) × Determinism`

  ### CONTRA-Evidenz und Grenzen

  Die TLA hat dokumentierte Grenzen (ehrliche Wissenschaft ignoriert CONTRA nicht):

  1. **Reasoning Models verbessern sich:** DeepSeek-R1 zeigt dass reine RL Reasoning induzieren kann. Die Grenze zwischen Layer 1 und Layer 3 ist dynamisch, nicht statisch.
  2. **Structured Output Degradation:** Zu strikte Constraints auf Layer 3 koennen Reasoning um 10-15% verschlechtern (Tam et al. 2024).
  3. **Monitoring-Trigger:** Die TLA muss revidiert werden wenn Reasoning-Modelle konsistent 95%+ auf formalen Benchmarks erreichen.

  ### IST vs. SOLL (ehrliche Analyse)

  | Aspekt | IST | SOLL |
  |--------|-----|------|
  | Layer 1 Scripts | 5+ existieren (PSF, R-Score, EMERGE) | Universelle Parameter-Lookup API |
  | Layer 2 Registries | 140+ Parameter, 404 Faktoren | PCT als Python-Berechnung |
  | Layer 3 Trennung | LLM macht BEIDES (denken + uebersetzen) | LLM NUR als Uebersetzer |
  | Orchestrator | Keiner (manuell via CLAUDE.md) | Formaler Orchestrator |

  **80% der Organe existieren — das Kreislaufsystem fehlt.**

  ### Altes Modell vs. Neues Modell: Konkretes Beispiel

  **Frage:** "Was ist Loss Aversion im Kontext Heizungsersatz Schweiz?"

  ```
  ALTES MODELL (LLM denkt):
  ──────────────────────────
  User → LLM erinnert "λ ≈ 2.25" aus Training → Antwortet direkt
  Problem: Wert ist kontextfrei, möglicherweise halluziniert

  NEUES MODELL (TLA):
  ────────────────────
  User → Layer 3 interpretiert Frage
       → Layer 2 liest: parameter-registry.yaml → PAR-BEH-016 (λ_R)
       → Layer 2 liest: BCM2_04_KON → Schweiz-Kontext
       → Layer 1 berechnet: PCT θ_B = 2.5 × M(ΔΨ_I) × M(ΔΨ_E) = 4.58
       → Layer 3 uebersetzt: "In diesem Kontext ist Loss Aversion
         sehr hoch (λ = 4.58) weil..."
  ```

