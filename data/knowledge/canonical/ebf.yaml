# ═══════════════════════════════════════════════════════════════════════════════
# CORE DEFINITION
# ═══════════════════════════════════════════════════════════════════════════════

definition:
  full_name: "Evidence-Based Framework for Social and Economic Behavior and Decision Making"

  identity: |
    Das EBF ist ZWEI Dinge gleichzeitig:

    1. Eine WISSENSDATENBANK — eine systematische, kuratierte Sammlung und
       Ordnung wissenschaftlicher Erkenntnisse zu menschlichem Verhalten
       (2'000+ Studien, 191 Theorien, 852 Cases, 404+ Kontextfaktoren)

    2. Ein META-FRAMEWORK — eine Methodik, mit der JEDE wissenschaftliche
       Theorie eingeordnet und für die Praxis anwendbar gemacht werden kann

    Das EBF konkurriert NICHT mit Prospect Theory, Inequity Aversion oder
    anderen Theorien. Es ORDNET sie ein und macht sie ANWENDBAR.

  nature: "Wissensdatenbank + Meta-Framework für Praxisanwendung"
  since: 2010
  developed_by: "FehrAdvice & Partners AG in Zusammenarbeit mit der Universität Zürich"

  what_it_does: |
    Das EBF ermöglicht:
    - Neue wissenschaftliche Forschung EINZUORDNEN
    - Bestehende Theorien für die Praxis ANWENDBAR zu machen
    - Praxisrelevante Erkenntnisse SYSTEMATISCH zu integrieren
    - Die Weiterentwicklung des BCM (Beratungs-Tool) zu fundieren

  what_it_is_not: |
    Das EBF ist KEINE eigene wissenschaftliche Theorie die mit Kahneman,
    Thaler oder Fehr konkurriert. Es ist das Framework, das diese Theorien
    einordnet, zueinander in Beziehung setzt und für die Beratungspraxis
    nutzbar macht.

  epistemological_position: |
    Ob eine Theorie wissenschaftlich anwendbar ist oder nicht, wird durch
    die WISSENSCHAFTLICHE FORSCHUNG entschieden — nicht durch das EBF.

    Das EBF NIMMT was die Wissenschaft liefert und validiert hat, und
    macht es für die Praxis nutzbar. Es kann nicht sagen, ob Prospect
    Theory richtig oder falsch ist. Was es KANN: eine von der Wissenschaft
    validierte Theorie für einen spezifischen Kontext einordnen und in
    eine praxis- und theoriefähige Modellsprache bringen.

    Die Rollenverteilung:
    - WISSENSCHAFT entscheidet: "Ist die Theorie valide?" (Falsifikation, Replikation)
    - EBF kontextualisiert:    "Wann und wo ist sie anwendbar?" (Einordnung, Praxis)
    - BCM wendet an:           "Wie nutzen wir sie für diesen Kunden?" (Beratung)

    Das EBF sagt nicht: "Prospect Theory ist wahr"
    Das EBF sagt:       "Die Wissenschaft hat Prospect Theory validiert.
                          In DIESEM Kontext (Ψ) gilt sie mit DIESEN
                          Parametern (λ, β, ...) und interagiert SO
                          mit anderen Theorien (γ)"

  relationship_to_bcm: |
    EBF = wissenschaftliche Grundlage für die Weiterentwicklung des BCM.
    Neues Paper erscheint → EBF ordnet es ein → BCM wird besser.
    Das EBF ist die systematische Auslegeordnung, das BCM ist das
    operative Beratungs-Tool das daraus entsteht.

  methodology: |
    Die EBF-Methodik macht Theorien praxistauglich durch:
    - 10C-Einordnung: Welche der 10 Dimensionen adressiert die Theorie?
    - Ψ-Kontextualisierung: Unter welchen Kontextbedingungen gilt sie?
    - Parameter-Extraktion: Welche messbaren Werte liefert sie?
    - Komplementaritäts-Analyse: Wie interagiert sie mit anderen Theorien?
    - Case-Zuordnung: In welchen Praxisfällen wurde sie angewendet?

  example: |
    Neue Studie: "Loss Aversion λ = 2.5 bei Welfare-Takeup"
    → EBF ordnet ein:
      - 10C: AWARE (Awareness) + READY (Willingness) + WHEN (Kontext)
      - Ψ: Ψ_I = bureaucratic, Ψ_S = stigma_high
      - Parameter: PAR-BEH-016, λ_R = 2.5, Tier 1 (RCT)
      - Komplementarität: γ(AWARE, WHEN) dokumentiert
      - Case: CAS-xxx (Welfare Non-Takeup)
    → BCM wird besser: Berater:innen wissen jetzt, dass λ bei Stigma höher ist

# ═══════════════════════════════════════════════════════════════════════════════
# CENTRAL INNOVATION
# ═══════════════════════════════════════════════════════════════════════════════

innovation:
  paradigm_shift:
    traditional:
      formula: "θ = Konstante"
      example: "λ = 2.25 (immer)"
      interpretation: "Loss Aversion IST 2.25"
      
    ebf:
      formula: "θ = f(Ψ, 10C)"
      example: "λ(Ψ, 10C) = variabel"
      interpretation: |
        Loss Aversion in welfare mit stigma = 2.5, 
        aber in workplace mit peers = 1.8
        
  key_insight: "DIE VARIATION IST NICHT NOISE — SIE IST DAS SIGNAL!"

# ═══════════════════════════════════════════════════════════════════════════════
# PARAMETER CONTEXT TRANSFORMATION (PCT)
# ═══════════════════════════════════════════════════════════════════════════════

pct:
  name: "Parameter Context Transformation"
  formula: "θ_B = θ_A × ∏ᵢ M(ΔΨᵢ) × ∏ⱼ N(Δ10Cⱼ)"
  
  variables:
    θ_A: "Parameter im Anchor-Kontext (aus Paper)"
    θ_B: "Parameter im Target-Kontext (Vorhersage)"
    ΔΨᵢ: "Kontext-Differenz"
    "M(·)": "Ψ-Multiplikator"

