# =============================================================================
# EBF INFORMATION VIRUS DEFINITION — Single Source of Truth
# =============================================================================
#
# PURPOSE: Formale Definition eines "Information Virus" im EBF-Kontext.
#   Ein EBF Information Virus (EIV) ist eine atomare Einheit falscher
#   Information, die sich selbst repliziert und der Erkennung entgeht.
#
# SSOT: Diese Datei ist die EINZIGE autoritative Definition.
# CREATED: 2026-02-15
# VERSION: 1.0
#
# THEORETICAL FOUNDATION:
#   Die Definition synthetisiert 6 Forschungsfelder:
#   1. Memetics (Dawkins 1976, Blackmore 1999, Sperber 1996)
#   2. AI Hallucination (Ji et al. 2023, Huang et al. 2023)
#   3. Misinformation Cascades (Vosoughi et al. 2018, Bikhchandani et al. 1992)
#   4. Epistemic Contamination (Data Poisoning Surveys 2022-2025)
#   5. Epidemiological Models (Daley & Kendall 1964, Zanette 2001/2002)
#   6. AI Model Collapse (Shumailov et al. 2024, Nature)
#
# ENFORCEMENT: HARD_BLOCK — Confirmed viruses must be eradicated
# VALIDATION: python scripts/validate_knowledge_consistency.py
# =============================================================================

