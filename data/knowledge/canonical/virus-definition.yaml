        heilt: "EGD-CTX (Kontextlosigkeit)"
        mechanism: >
          Tier 1 (Meta-Analyse) bis Tier 4 (Expert Elicitation) —
          erzwingt Transparenz ueber die Evidenz-Qualitaet.
        status: "AKTIV — in CLAUDE.md Axiom 2 definiert"

    # ─────────────────────────────────────────────────────────────────────────
    # IMPLIKATION FUER DIE FORMALE IMMUNITAET
    # ─────────────────────────────────────────────────────────────────────────
    implication_for_formal_immunity: >
      Die formale Schicht (Python-Scripts) ist virenimmun — ABER NUR WENN:

      1. Jede Variable eineindeutig definiert ist (ATOMIC SYMBOL RULE)
      2. Jeder Parameter-Wert einen Measurement Context hat (PCT)
      3. Jede Variable Einheit und Wertebereich hat (Schema)
      4. Jedes Modell seinen Gueltigkeitsbereich spezifiziert (Validity)

      OHNE diese Voraussetzungen ist die formale Schicht nicht
      "virenimmun" — sie hat einen Gendefekt. Die Berechnung ist
      deterministisch korrekt, aber deterministisch BEDEUTUNGSLOS.

      Formal:
        Virenimmunitaet(Formale_Schicht) =
          f(Definitions_Sauberkeit) × Determinismus

        Wenn Definitions_Sauberkeit = 0: Immunitaet = 0
        (egal wie deterministisch die Berechnung ist)

        Wenn Definitions_Sauberkeit = 1: Immunitaet = 1
        (Determinismus garantiert korrekte Ergebnisse)

