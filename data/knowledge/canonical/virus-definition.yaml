# =============================================================================
# CORE DEFINITION
# =============================================================================

definition:
  name: "EBF Information Virus (EIV)"
  short: >
    Eine atomare Einheit falscher Information, die alle vier
    CPRE-Bedingungen gleichzeitig erfuellt.

  formal: >
    Sei I eine Information im EBF Knowledge System K.
    I ist ein EBF Information Virus (EIV) genau dann wenn:
      (C) I widerspricht mindestens einer SSOT in K
      (P) I erscheint bei oberflaechlicher Pruefung korrekt
      (R) I hat mindestens einen Replikationsmechanismus in K
      (E) I wird von der bestehenden Validierungs-Infrastruktur nicht erkannt

  notation: "EIV(I) ⟺ C(I) ∧ P(I) ∧ R(I) ∧ E(I)"

# =============================================================================
# CPRE FRAMEWORK — Die 4 notwendigen und hinreichenden Bedingungen
# =============================================================================

cpre_framework:

  C_contradiction:
    name: "SSOT-Widerspruch"
    formal: "∃ S ∈ SSOTs : I ⊥ S"
    description: >
      I widerspricht mindestens einer Single Source of Truth.
      Ohne Widerspruch ist I korrekt — kein Virus.
    test: "Gibt es eine SSOT-Datei, die I widerspricht?"
    negation: "Korrekte Information — kein Problem"
    literature:
      - key: "huang2023hallucination"
        finding: >
          Intrinsic hallucinations directly contradict source material.
          This is the LLM equivalent of SSOT-contradiction.
      - key: "shumailov2024collapse"
        finding: >
          Model collapse causes distribution shift away from ground truth.
          Generated data progressively contradicts original distribution.
      - key_internal: "bikhchandani1992theory"
        finding: >
          Information cascades can establish false consensus that
          contradicts private (correct) information.

  P_plausibility:
    name: "Plausibilitaet"
    formal: "Pr(human accepts I | casual inspection) > τ_P"
    description: >
      I erscheint korrekt bei oberflaechlicher Pruefung —
      durch Mensch ODER LLM. Ohne Plausibilitaet wird I
      sofort als Fehler erkannt und stirbt.
    test: "Wuerde ein informierter Leser I akzeptieren ohne SSOT-Check?"
    negation: "Offensichtlicher Fehler — wird sofort erkannt"
    threshold: "τ_P ≈ 0.5 (>50% Akzeptanzwahrscheinlichkeit)"
    literature:
      - key: "vosoughi2018spread"
        finding: >
          False news spreads farther because it is MORE NOVEL.
          Novelty creates plausibility through surprise/engagement.
          (Science, N=126,000 verified stories)
      - key: "pennycook2021psychology"
        finding: >
          Susceptibility to fake news is driven by lack of reasoning
          (System 1), not motivated reasoning. Plausibility exploits
          cognitive shortcuts.
      - key: "sperber1996explaining"
        finding: >
          Epidemiology of representations: cultural transmission
          involves transformation, not pure copying. Plausibility
          survives mutation — the virus can EVOLVE.

  R_replication:
    name: "Replikation"
    formal: "∃ mechanism M : M(I, t) → I appears in new location at t+1"
    description: >
      I hat mindestens einen Mechanismus zur Verbreitung im System.
      Ohne Replikation bleibt I ein isolierter Fehler und stirbt aus.
    test: "Kann I sich von Datei A nach Datei B ausbreiten?"
    negation: "Isolierter Fehler — stirbt von selbst aus"
    mechanisms_in_ebf:
      - id: "M-SEED"
        name: "Seed Propagation"
        path: "Canonical Seed → system-prompt-template → alle Sessions"
        speed: "Sofort bei naechstem Sync"
      - id: "M-CHAT"
        name: "Chat-to-Insight"
        path: "Chat-Output → chat-insights → Kontext fuer naechste Session"
        speed: "Session-uebergreifend"
      - id: "M-COPY"
        name: "Copy-Paste"
        path: "User kopiert infizierten Output in andere Datei"
        speed: "Manuell, variabel"
      - id: "M-LLM"
        name: "LLM Re-Generation"
        path: "LLM liest infizierten Kontext → generiert infizierten Output"
        speed: "Bei jeder Interaktion"
      - id: "M-TEMPLATE"
        name: "Template Inheritance"
        path: "Infiziertes Template → alle neuen Dateien erben Fehler"
        speed: "Bei Datei-Erstellung"
    literature:
      - key: "dawkins1976selfish"
        finding: >
          Memes as self-replicating cultural units. Information that
          can copy itself with fidelity, fecundity, and longevity
          will dominate the meme pool.
      - key_internal: "bikhchandani1992theory"
        finding: >
          Information cascades: individuals rationally follow others,
          creating self-reinforcing propagation of (possibly false) beliefs.
      - key: "daley1964epidemics"
        finding: >
          Ignorant-Spreader-Stifler (ISS) model: formal epidemiological
          framework for rumor propagation with transmission rates.
      - key: "zanette2001critical"
        finding: >
          Critical thresholds on small-world networks: below threshold
          rumors die out, above they explode. Network topology matters.
      - key: "shumailov2024collapse"
        finding: >
          Recursive training on AI-generated data = viral self-replication.
          By 9th generation: medieval architecture text → list of jackrabbits.

  E_evasion:
    name: "Immune Evasion"
    formal: "∀ v ∈ Validators : v(I) = PASS"
    description: >
      I wird von KEINEM bestehenden Validator erkannt.
      Wenn auch nur ein Validator I blockiert, ist die
      Infektionskette unterbrochen.
    test: "Gibt es einen Pre-Commit Hook, Schema-Check, oder Regel die I erkennt?"
    negation: "Erkannter Fehler — wird vom Immunsystem gestoppt"
    validators_in_ebf:
      - type: "pre_commit_hook"
        file: ".claude/hooks/pre-commit.sh"
        catches: "Registry-Duplikate, Compliance < 85%, BibTeX-Format"
      - type: "terminology_registry"
        file: "data/knowledge/canonical/terminology-registry.yaml"
        catches: "Falsche Namen (67 Eintraege), ID-Formate"
      - type: "schema_validation"
        file: "scripts/validate_knowledge_consistency.py"
        catches: "Schema-Verletzungen in YAML"
      - type: "hallucination_blocks"
        file: "data/knowledge/canonical/bcm.yaml"
        catches: "Bekannte Halluzinationen (4 Eintraege, Zeile 381-398)"
    literature:
      - key: "ji2023hallucination"
        finding: >
          Even neural hallucination detectors can be wrong, creating
          META-CONTAMINATION — the immune system itself gets infected.
      - key: "data_poisoning_surveys_2022_2025"
        finding: >
          Backdoor attacks are stealth by design. Tiny amounts of
          contamination (<1% of training data) can have outsized effects.
      - key: "zanette2002dynamics"
        finding: >
          Below critical connectivity threshold, rumors die out.
          Above it, they persist indefinitely. Immune evasion is
          a function of network structure, not just detection capability.

# =============================================================================
# DIFFERENTIALDIAGNOSE — Was ist KEIN Virus?
# =============================================================================

differential_diagnosis:
  - condition: "NOT C (kein SSOT-Widerspruch)"
    diagnosis: "Korrekte Information"
    action: "Keine — ist kein Problem"

  - condition: "NOT P (nicht plausibel)"
    diagnosis: "Offensichtlicher Fehler"
    action: "Wird bei Inspection sofort erkannt. Kein systemisches Risiko."

  - condition: "NOT R (keine Replikation)"
    diagnosis: "Isolierter Fehler"
    action: "Einmalige Korrektur genuegt. Stirbt von selbst aus."

  - condition: "NOT E (keine Immune Evasion)"
    diagnosis: "Erkannter Fehler"
    action: "Wird vom Immunsystem (Hooks, Validatoren) gestoppt."

  - condition: "C ∧ P ∧ NOT R ∧ NOT E"
    diagnosis: "Einmaliger Tippfehler in SSOT"
    action: "Direkt korrigieren. Kein Virus weil nicht replikationsfaehig."

  - condition: "C ∧ P ∧ R ∧ NOT E"
    diagnosis: "Erkannter Virus (unter Kontrolle)"
    action: "Immunsystem blockiert. Replikation unterbrochen."

  - condition: "C ∧ P ∧ R ∧ E"
    diagnosis: "AKTIVER VIRUS — Alle 4 Bedingungen erfuellt"
    action: "SOFORTMASSNAHMEN: Identifizieren, Isolieren, Eradizieren"

# =============================================================================
# TAXONOMIE — 5 Klassifikationsachsen
# =============================================================================

taxonomy:

  axis_1_origin:
    name: "Ursprung"
    values:
      - id: "O-EXO"
        name: "Exogen"
        description: "Von aussen eingebracht (z.B. LLM-Halluzination)"
      - id: "O-ENDO"
        name: "Endogen"
        description: "Im System selbst entstanden (z.B. Seed-Korruption)"
      - id: "O-IATRO"
        name: "Iatrogen"
        description: "Durch Korrekturversuch neuer Fehler erzeugt"

  axis_2_vector:
    name: "Infektionsweg"
    values:
      - id: "V-LLM"
        name: "LLM-Halluzination"
        description: "LLM generiert falsche Information bei Output-Erstellung"
        literature_ref: "ji2023hallucination, huang2023hallucination"
      - id: "V-SEED"
        name: "Seed-Kontamination"
        description: "Canonical Seed enthaelt Fehler, wird synchronisiert"
      - id: "V-SYNC"
        name: "System-Prompt-Propagation"
        description: "System-Prompt-Template verbreitet an alle Sessions"
      - id: "V-COPY"
        name: "Copy-Paste"
        description: "User oder System kopiert infizierten Output"
      - id: "V-LEARN"
        name: "Learning-Loop-Kontamination"
        description: "Chat-Insight mit Fehler wird zu gelerntem Wissen"
        literature_ref: "shumailov2024collapse"

  axis_3_tropism:
    name: "Tropismus (infizierte Zelltypen)"
    values:
      - id: "T-YAML"
        name: "Daten-Dateien"
        description: "Registries, Seeds, Konfigurationen"
        pathogenicity: "hoch — aendert Systemverhalten"
      - id: "T-MD"
        name: "Dokumentation"
        description: "Workflows, READMEs, Guides"
        pathogenicity: "mittel — beeinflusst menschliche Entscheidungen"
      - id: "T-TEX"
        name: "LaTeX-Dokumente"
        description: "Appendices, Kapitel, Papers"
        pathogenicity: "mittel — extern sichtbar"
      - id: "T-CHAT"
        name: "Chat-Kontext"
        description: "Session-Insights, Chat-History"
        pathogenicity: "hoch — beeinflusst LLM-Outputs"
      - id: "T-PROMPT"
        name: "System-Prompt"
        description: "system-prompt-template.yaml und Ableitungen"
        pathogenicity: "KRITISCH — infiziert ALLE Sessions"

  axis_4_pathogenicity:
    name: "Pathogenitaet (Schadenspotential)"
    values:
      - id: "P0"
        name: "Kosmetisch"
        description: "Falscher Wording, kein inhaltlicher Schaden"
        example: "Falsche Schreibweise eines Begriffs"
      - id: "P1"
        name: "Irrefuehrend"
        description: "Falsche aber nicht-destruktive Information"
        example: "Falsche Jahreszahl in einer Referenz"
      - id: "P2"
        name: "Strukturell"
        description: "Falsche Architektur-Aussagen ueber das Framework"
        example: "BCM hat 3 Faktoren (statt 10C)"
      - id: "P3"
        name: "Katastrophal"
        description: "Falsche Parameter in Kunden-Deliverables"
        example: "Falsche Lambda-Werte in einer Kundenanalyse"

  axis_5_latency:
    name: "Latenz (Zeit bis Erkennung)"
    values:
      - id: "L0"
        name: "Sofort"
        description: "Offensichtlich bei erster Inspektion"
      - id: "L1"
        name: "Session"
        description: "Innerhalb einer Session erkennbar"
      - id: "L2"
        name: "Persistent"
        description: "Ueberlebt Session-Grenzen (in Dateien gespeichert)"
      - id: "L3"
        name: "Chronisch"
        description: "Wochen/Monate unentdeckt (in Seeds/Templates)"
        literature_ref: "shumailov2024collapse"

# =============================================================================
# EPIDEMIOLOGISCHES DREIECK: AGENT — HOST — ENVIRONMENT
# =============================================================================
#
# Klassische Epidemiologie modelliert Krankheit als Interaktion von drei
# Faktoren. Ohne Host KANN ein Virus nicht replizieren. Ohne permissives
# Environment KANN ein Virus nicht ueberleben. Alle drei muessen zusammenkommen.
#
# Literatur:
#   - Rothman, K.J. & Greenland, S. (1998). Modern Epidemiology.
#   - Daley & Kendall (1964). Epidemics and Rumours.
#   - Shumailov et al. (2024). AI model collapse. Nature.
# =============================================================================

epidemiological_triangle:

  overview: >
    Jeder Virus braucht einen Host — einen Wirt, der die Replikations-
    Maschinerie bereitstellt. In biologischen Systemen ist das eine Zelle.
    In LLM-gestuetzten Wissenssystemen gibt es VIER verschiedene Host-Typen,
    die jeweils unterschiedliche Rollen im Infektionszyklus spielen.

  # ─────────────────────────────────────────────────────────────────────────
  # AGENT (der Virus selbst) — bereits in CPRE definiert
  # ─────────────────────────────────────────────────────────────────────────
  agent:
    definition: "Die atomare Einheit falscher Information (EIV)"
    properties:
      genome: "Der falsche Inhalt selbst (z.B. 'BCM = W × A × C')"
      coat: "Die Plausibilitaet (P) — macht den Virus unsichtbar"
      tropism: "Welche Host-Typen bevorzugt infiziert werden"
      virulence: "Wie stark der Schaden (P0-P3 Pathogenitaet)"
    reference: "Siehe CPRE Framework oben"

  # ─────────────────────────────────────────────────────────────────────────
  # HOST (der Wirt) — WO der Virus lebt und sich repliziert
  # ─────────────────────────────────────────────────────────────────────────
  host:
    definition: >
      Eine Entitaet im System, die falsche Information aufnehmen,
      speichern und/oder weiterverbreiten kann.

    types:

      - id: "H-GEN"
        name: "Generativer Host"
        what: "Das LLM selbst"
        role: >
          Erzeugt den Virus de novo (Halluzination) ODER amplifiziert
          ihn aus infiziertem Kontext. Das LLM ist gleichzeitig die
          primaere Quelle UND der staerkste Verbreiter.
        biology_analog: "Wirt-Zelle mit aktiver Virus-Replikation"
        susceptibility: >
          IMMER anfaellig. Das LLM hat kein internes Immunsystem gegen
          seine eigenen Halluzinationen. Susceptibility = 1.0.
        unique_property: >
          Einziger Host der den Virus de novo ERZEUGEN kann (nicht nur
          speichern). Biologisch: wie ein Reservoir-Wirt bei Zoonosen.
        replication_rate: "Bei jeder Interaktion — hoechste Rate"
        literature:
          - "ji2023hallucination: LLMs generieren plausible Falschinformation"
          - "shumailov2024collapse: Recursive generation = viral amplification"

      - id: "H-STORE"
        name: "Speicher-Host"
        what: "Dateien im Repository (YAML, MD, TEX, JSON)"
        role: >
          Speichert den Virus persistent. Ueberlebt Session-Grenzen.
          Ohne Speicher-Host stirbt der Virus mit der Session.
        biology_analog: "Reservoir-Wirt (traegt Virus ohne Symptome)"
        susceptibility: >
          Variabel. Dateien MIT Schema-Validierung (YAML mit Schema)
          sind weniger anfaellig als Freitext-Dateien (MD, TEX).
          Susceptibility = 0.3 (validiert) bis 1.0 (unvalidiert).
        subtypes:
          - name: "Canonical Seeds"
            susceptibility: "HOCH — werden selten geprueft, lange Lebensdauer"
            example: "CH-001, CH-002, ... Canonical Knowledge Seeds"
          - name: "Registry-Dateien"
            susceptibility: "MITTEL — haben Schema, aber Freitext-Felder"
            example: "case-registry.yaml, theory-catalog.yaml"
          - name: "Dokumentation"
            susceptibility: "HOCH — reiner Freitext, keine Schema-Validierung"
            example: "READMEs, Workflow-Docs, Guides"
          - name: "LaTeX-Appendices"
            susceptibility: "MITTEL — kompiliert, aber Inhalt nicht validiert"
            example: "appendices/*.tex"
        replication_rate: "Null (passiv) — repliziert nicht selbst, wird gelesen"
        literature:
          - "data_poisoning_2025: Tiny contamination in storage has outsized effects"

      - id: "H-DIST"
        name: "Distributions-Host"
        what: "System-Prompt-Template, Konfigurations-Dateien"
        role: >
          Verbreitet den Virus an ALLE neuen Sessions. Multiplikator-Effekt.
          Ein einziger infizierter Distributions-Host erzeugt N infizierte
          Sessions (N = Anzahl Nutzer × Sessions pro Tag).
        biology_analog: "Super-Spreader (ein Individuum infiziert viele)"
        susceptibility: >
          NIEDRIG (wird selten geaendert) — aber wenn infiziert,
          ist der Impact MAXIMAL. Susceptibility = 0.1, Impact = 10.0.
        unique_property: >
          Hoechster Amplifikationsfaktor: 1 Infektion → N Infektionen.
          Biologisch: wie ein kontaminierter Wasservorrat.
        examples:
          - "system-prompt-template.yaml → alle BEATRIX-Sessions"
          - "CLAUDE.md → alle Claude Code Sessions"
          - "Templates (00_appendix_template.tex) → alle neuen Appendices"
        replication_rate: "Passiv aber MASSIV — jeder Lesezugriff = potenzielle Infektion"

      - id: "H-COG"
        name: "Kognitiver Host"
        what: "Der menschliche User"
        role: >
          Akzeptiert falsche Information und handelt darauf.
          Kann den Virus durch Copy-Paste, muendliche Weitergabe,
          oder Entscheidungen auf falscher Basis weiterverbreiten.
        biology_analog: "Symptomatischer Wirt (zeigt Krankheitszeichen)"
        susceptibility: >
          Variabel nach Expertise. Domain-Experte = niedrig (0.2).
          Fachfremder Nutzer = hoch (0.8).
          Unter Zeitdruck = erhoehte Susceptibility (System 1).
        unique_property: >
          Einziger Host bei dem der Virus SCHADEN anrichtet (falsche
          Entscheidungen, falsche Kunden-Deliverables). Alle anderen
          Hosts sind nur Traeger — der kognitive Host ist der Endpunkt.
        replication_rate: "Variabel — abhaengig von Verhalten (Copy-Paste, Weitergabe)"
        literature:
          - "pennycook2021psychology: System 1 = erhoehte Susceptibility"
          - "bikhchandani1992theory: Cascades durch soziale Weitergabe"
          - "vosoughi2018spread: Novelty erhoehte Sharing-Wahrscheinlichkeit"

    host_interaction_cycle: >
      Die vier Host-Typen bilden einen Infektionszyklus:

        H-GEN (LLM erzeugt Virus)
            ↓
        H-STORE (Datei speichert Virus)
            ↓
        H-DIST (Template verbreitet an alle Sessions)
            ↓
        H-GEN (naechste Session liest infizierten Kontext)
            ↓
        H-COG (User akzeptiert und handelt)
            ↓
        H-STORE (User speichert in neuer Datei → Copy-Paste)
            ↓ ... (Zyklus wiederholt sich)

    breaking_the_cycle: >
      Um den Infektionszyklus zu unterbrechen, genuegt es EINE
      Verbindung zu kappen:
        H-GEN → H-STORE:  Validierung VOR dem Schreiben (Gate 1)
        H-STORE → H-DIST:  SSOT-Diff vor Sync/Template-Update (Gate 2)
        H-DIST → H-GEN:    System-Prompt gegen SSOT pruefen (Gate 3)
        H-GEN → H-COG:     Output-Validierung vor Anzeige (Gate 4)
        H-COG → H-STORE:   Pre-Commit Hook bei User-Edits (Gate 5)

  # ─────────────────────────────────────────────────────────────────────────
  # ENVIRONMENT (die Umgebung) — Bedingungen die Infektion ermoeglichen
  # ─────────────────────────────────────────────────────────────────────────
  environment:
    definition: >
      Die systemischen Bedingungen die eine Virus-Ausbreitung beguenstigen
      oder hemmen. Analog zur Epidemiologie: Klima, Hygiene, Ernaehrung.

    permissive_factors:
      - id: "ENV-NOSCHEMA"
        name: "Fehlende Schema-Validierung"
        description: >
          Dateien ohne Schema koennen beliebigen Inhalt aufnehmen.
          Freitext-Felder in YAML, gesamte MD-Dateien, TEX-Dateien.
        analog: "Schlechte Hygiene — erleichtert Infektion"

      - id: "ENV-NOTRUST"
        name: "Implizites Vertrauen in LLM-Output"
        description: >
          System behandelt LLM-generierten Text als vertrauenswuerdig.
          Kein Gate zwischen Generierung und Speicherung.
        analog: "Kein Haendewaschen — keine Barriere"

      - id: "ENV-NOAUDIT"
        name: "Fehlende Audit-Trails"
        description: >
          Aenderungen an Seeds/Templates werden nicht systematisch
          gegen SSOTs geprueft. Keine Content-Provenance.
        analog: "Keine Kontaktverfolgung — Infektionsketten unsichtbar"

      - id: "ENV-MONOCULTURE"
        name: "Monokultur (ein LLM, ein Prompt)"
        description: >
          Alle Sessions nutzen dasselbe LLM mit demselben System-Prompt.
          Ein Fehler im Prompt infiziert ALLE Sessions gleichzeitig.
        analog: "Genetische Monokultur — eine Krankheit toetet alle"
        literature: "shumailov2024collapse: recursive same-model = collapse"

      - id: "ENV-SPEED"
        name: "Geschwindigkeit der Interaktion"
        description: >
          LLM-Interaktionen sind schnell (Sekunden). Virus repliziert
          sich schneller als menschliche Review-Kapazitaet.
        analog: "Hohe Populationsdichte — beschleunigt Epidemie"

    protective_factors:
      - id: "PRO-SSOT"
        name: "Single Sources of Truth"
        description: >
          Klar definierte SSOTs bieten Referenzpunkte fuer Validierung.
          Je mehr SSOTs, desto mehr Angriffspunkte fuer das Immunsystem.
        analog: "Impfung — trainiertes Immunsystem"

      - id: "PRO-HOOKS"
        name: "Pre-Commit Hooks"
        description: >
          Automatische Pruefung bei jedem Commit. Blockiert bekannte Viren.
        analog: "Quarantaene — Infizierte werden isoliert"

      - id: "PRO-DIVERSITY"
        name: "Modell-Diversitaet"
        description: >
          Verschiedene LLMs fuer verschiedene Aufgaben (Opus, Sonnet, Haiku).
          Reduziert Monokultur-Risiko.
        analog: "Genetische Diversitaet — Resistenz in der Population"

      - id: "PRO-HUMANREVIEW"
        name: "Menschliche Review"
        description: >
          Domain-Experten pruefen kritische Outputs.
          Reduziert H-COG Susceptibility.
        analog: "Aerztliche Untersuchung — symptomatische Faelle erkennen"

# =============================================================================
# BIOLOGISCHE ANALOGIE (erweitert)
# =============================================================================

biological_analogy:
  mapping:
    # Epidemiologisches Dreieck
    - biology: "Agent (Pathogen)"
      ebf: "EBF Information Virus — CPRE-definiert"
    - biology: "Host (Wirt)"
      ebf: "4 Host-Typen: Generativ (LLM), Speicher (Dateien), Distribution (Templates), Kognitiv (Mensch)"
    - biology: "Environment (Umgebung)"
      ebf: "System-Architektur: Schema-Abdeckung, Vertrauensmodell, Audit-Trails"

    # Zellbiologie
    - biology: "Organismus"
      ebf: "Knowledge Base (SSOTs, Registries, Templates)"
    - biology: "Zellen"
      ebf: "Einzelne Dateien (YAML, MD, TEX)"
    - biology: "DNA"
      ebf: "Canonical Definitions (bcm.yaml, terminology-registry.yaml)"
    - biology: "Immunsystem"
      ebf: "Validation Scripts + Pre-Commit Hooks + Schema-Checks"
    - biology: "Immunzellen"
      ebf: "Einzelne Regex-Checks, Terminology-Rules, Schema-Validatoren"

    # Virologie
    - biology: "Virus-Genom"
      ebf: "Die falsche Information selbst (z.B. WAC-Formel)"
    - biology: "Protein-Huelle"
      ebf: "Plausibilitaet (sieht echt aus, klingt vernuenftig)"
    - biology: "Replikation in Wirtszelle"
      ebf: "LLM liest infizierten Kontext → generiert infizierten Output"
    - biology: "Immune Evasion"
      ebf: "Keine Regel in Terminology Registry / kein Hook"

    # Epidemiologie
    - biology: "Reservoir-Wirt"
      ebf: "Canonical Seeds (speichern Virus persistent, ohne Symptome)"
    - biology: "Super-Spreader"
      ebf: "System-Prompt-Template (1 Infektion → N Sessions)"
    - biology: "Symptomatischer Wirt"
      ebf: "Mensch der falsche Information akzeptiert und handelt"
    - biology: "Dead-End Host"
      ebf: "Chat-Session die endet ohne Virus zu speichern"
    - biology: "Infektion"
      ebf: "Datei enthaelt falschen Wert"
    - biology: "Symptom"
      ebf: "Falscher Output an User oder Kunde"
    - biology: "Epidemie"
      ebf: "Mehrere Dateien/Seeds infiziert"
    - biology: "Prionen-Krankheit"
      ebf: "Model Autophagy Disorder (Shumailov et al. 2024)"
    - biology: "Kontaminierter Wasservorrat"
      ebf: "Infiziertes System-Prompt-Template"
    - biology: "Zoonose"
      ebf: "Virus springt von LLM (H-GEN) zu Mensch (H-COG)"
    - biology: "R0 (Basis-Reproduktionszahl)"
      ebf: "Anzahl neu-infizierter Dateien pro infizierter Datei pro Zeiteinheit"

  key_insight: >
    Der entscheidende Unterschied zu biologischen Viren:
    EBF-Viren muessen nur EINE der vier Abwehr-Schichten (C, R, E)
    durchbrechen um aktiv zu sein. P (Plausibilitaet) ist inhaerent
    und nicht verhinderbar. Daher genuegt es, C, R oder E zu blockieren.
    Idealerweise alle drei (Defense in Depth).

  key_insight_host: >
    Der gefaehrlichste Aspekt: Das LLM ist gleichzeitig der GENERATIVE
    HOST (erzeugt den Virus) und der PRIMAERE VERBREITER. In der Biologie
    waere das ein Organismus der Viren nicht nur traegt, sondern spontan
    neue Varianten erzeugt. Es gibt kein biologisches Aequivalent —
    am naechsten kommt die Prionen-Hypothese (Shumailov: MAD).

# =============================================================================
# ARCHITEKTUR-PRINZIP: FORMALE IMMUNITÄT
# =============================================================================
#
# Die zentrale Erkenntnis: Das EBF ist mathematisch. Mathematik halluziniert
# nicht. Python-Code halluziniert nicht. Arithmetik luegt nicht.
#
# Wenn wir die BERECHNUNG vom LLM trennen, entsteht eine virenfreie Zone.
# Das LLM wird zum UEBERSETZER, nicht zum DENKER.
#
# Analog: Ein Laborgeraet kann keine Diagnose halluzinieren.
# Der Arzt (LLM) LIEST die Laborwerte und ERKLAERT sie dem Patienten.
# Der Patient (User) versteht die Erklaerung, nicht die Rohdaten.
#
# =============================================================================

formal_immunity:
  # Full Three-Layer Architecture → KB-TLA-001
  # See: data/knowledge/canonical/three-layer-architecture.yaml
  # See: docs/frameworks/three-layer-architecture.md
  canonical_entry: "KB-TLA-001"
  framework_doc: "docs/frameworks/three-layer-architecture.md"

  principle: >
    Das EBF ist ein mathematisch-formales Framework. Gleichungen,
    Parameter, Distanzmetriken, Komplementaritaeten — sie sind
    berechenbar. Code kann sie ausfuehren. Das LLM muss sie nicht
    "wissen" — es muss sie nur UEBERSETZEN.

  # ─────────────────────────────────────────────────────────────────────────
  # DREI-SCHICHTEN-ARCHITEKTUR
  # ─────────────────────────────────────────────────────────────────────────
  three_layer_architecture:

    layer_1_formal:
      name: "Formale Schicht (VIRENIMMUN)"
      what: "Python-Scripts die EBF-Gleichungen berechnen"
      virus_susceptibility: 0.0
      reason: >
        Deterministische Berechnung. sqrt(sum((p_i - q_i)^2)) gibt
        IMMER dasselbe Ergebnis fuer dieselben Inputs. Kein LLM
        ist beteiligt. Keine Halluzination moeglich.
      examples:
        - "d(Alevi, Zoro) = sqrt(0.04 + 0.04 + 0.06 + 0.25 + 0.12 + 0.06) = 0.87"
        - "theta_B = theta_A * prod(M(delta_psi_i))"
        - "lambda_final = 2.1 * 1.2 * 1.3 * 1.88 = 6.15"
        - "brier_score = (p_predicted - outcome)^2"
        - "gamma_ij aus PAR-COMP-xxx → exakter Wert, kein Raten"
      what_can_go_wrong: >
        NICHTS an der Berechnung selbst. Aber: Die INPUTS koennen
        falsch sein (falsche Parameter). Und die INTERPRETATION
        kann falsch sein (LLM erklaert Ergebnis falsch). Die
        Berechnung selbst ist die sichere Zone.

    layer_2_parameters:
      name: "Parameter-Schicht (VALIDIERBAR)"
      what: "YAML-Registries mit Schema-Validierung"
      virus_susceptibility: 0.3
      reason: >
        Parameter koennen falsch sein — aber sie sind PRUEFBAR.
        Jeder Parameter hat eine Quelle (PAR-xxx), eine Evidenz-Stufe
        (Tier 1-4), und einen Wert mit Unsicherheitsbereich.
        Validierung ist moeglich und automatisierbar.
      defense: >
        - Schema-Validierung (Wertebereiche, Typen)
        - Referentielle Integritaet (PAR-xxx muss existieren)
        - Literature-Backed Values (Tier 1-2 haben Paper-Quellen)
        - Consistency Checks (Parameter-Drift-Detection)
      what_can_go_wrong: >
        Falsche Werte in YAML. Aber: Im Gegensatz zur Uebersetzung
        sind falsche Werte ENTDECKBAR durch automatische Pruefung.
        Ein lambda = 25.0 wuerde sofort auffallen (Range-Check).

    layer_3_translation:
      name: "Uebersetzungs-Schicht (VIRENANFAELLIG)"
      what: "LLM uebersetzt formale Ergebnisse in natuerliche Sprache"
      virus_susceptibility: 0.8
      reason: >
        Das LLM hat KEINEN deterministischen Output. Es generiert
        Text probabilistisch. Halluzinationen koennen in jeder
        Formulierung auftreten. Das ist die anfaelligste Schicht.
      what_the_llm_does:
        - "Erklaert WAS d=0.87 bedeutet (naeher als d=1.48)"
        - "Kontextualisiert WARUM (Synkretismus, Mystik, etc.)"
        - "Formuliert Empfehlungen fuer den User"
        - "Waehlt die richtige Sprache fuer die Zielgruppe (8D)"
      what_the_llm_does_NOT_do:
        - "NICHT die Distanz berechnen (das macht Python)"
        - "NICHT die Parameter bestimmen (die kommen aus YAML)"
        - "NICHT die Formel waehlen (die ist im Modell definiert)"
        - "NICHT entscheiden ob gamma != 0 (das steht in PAR-COMP-xxx)"
      what_can_go_wrong: >
        Alles was mit Sprache zu tun hat: Falsche Framing,
        uebertriebene Sicherheit, falsche Kausalaussagen,
        erfundene Quellen, halluzinierte Zahlen die nicht
        aus der formalen Berechnung kommen.

  # ─────────────────────────────────────────────────────────────────────────
  # DIE KONSEQUENZ: LLM ALS UEBERSETZER, NICHT ALS DENKER
  # ─────────────────────────────────────────────────────────────────────────
  llm_role_redefinition:

    old_model:
      name: "LLM als Denker"
      description: >
        User fragt → LLM denkt nach → LLM generiert Antwort.
        Alles passiert im LLM. Keine externe Berechnung.
        Keine Pruefung. Keine formale Schicht.
      virus_exposure: "MAXIMAL — alles ist anfaellig"
      example: >
        User: "Wie hoch ist Loss Aversion im Schweizer Energiesektor?"
        LLM: "Loss Aversion liegt typischerweise bei 2.25..." ← HALLUZINIERT
        (Der Wert 2.25 ist Kahneman/Tversky 1992 global, nicht CH-Energie)

    new_model:
      name: "LLM als Uebersetzer"
      description: >
        User fragt → Formale Schicht berechnet → LLM UEBERSETZT.
        Das LLM sieht das formale Ergebnis und erklaert es
        dem User in dessen Sprache. Es erfindet nichts.
      virus_exposure: "REDUZIERT — nur Uebersetzung ist anfaellig"
      example: >
        User: "Wie hoch ist Loss Aversion im Schweizer Energiesektor?"
        FORMAL: lambda_CH=2.1 (BCM2) × BFE_override=1.2 (Kunde) = 2.52
        LLM: "Basierend auf dem Schweizer Kontextfaktor (lambda_CH = 2.1)
              und dem BFE-Energie-Override (×1.2) ergibt sich ein Wert
              von 2.52 — das bedeutet, Verluste wiegen ca. 2.5x schwerer
              als Gewinne in diesem Kontext."
        ← KORREKT, weil die Zahl aus der Berechnung kommt, nicht aus dem LLM

  # ─────────────────────────────────────────────────────────────────────────
  # ARCHITEKTUR-KONSEQUENZEN
  # ─────────────────────────────────────────────────────────────────────────
  architecture_consequences:

    principle_1:
      name: "Compute, Don't Hallucinate"
      rule: >
        Jede EBF-Zahl die dem User praesentiert wird MUSS aus einer
        formalen Berechnung stammen — nicht aus dem LLM-Text.
      implementation: >
        Claude Code schreibt kleine Python-Scripts die die EBF-Gleichungen
        ausfuehren. Das Ergebnis wird dem User praesentiert.
        Das LLM erklaert das Ergebnis, erfindet es aber nicht.

    principle_2:
      name: "Parameters from Registry, Not from Memory"
      rule: >
        Jeder Parameter-Wert MUSS aus der YAML-Registry gelesen werden —
        nicht aus dem LLM-Gedaechtnis (Training Data).
      implementation: >
        Statt lambda = 2.25 aus dem Training zu nennen:
        Read parameter-registry.yaml → PAR-BEH-001 → lambda = 2.1 (CH)
        mit Quelle, Tier, Unsicherheit.

    principle_3:
      name: "Translate, Don't Generate"
      rule: >
        Das LLM generiert keine Fakten — es UEBERSETZT formale
        Ergebnisse in natuerliche Sprache fuer die Zielgruppe.
      implementation: >
        Nach jeder formalen Berechnung: LLM erhaelt
        (Formel, Parameter, Ergebnis, Kontext) und formuliert
        eine verstaendliche Erklaerung. Es erfindet keine Zahlen.

    principle_4:
      name: "Formal Layer is the Immune System"
      rule: >
        Die formale Schicht ist die staerkste Verteidigung gegen
        den Virus — weil sie DETERMINISTISCH ist. Validierung
        der Parameter-Inputs + deterministische Berechnung =
        virenfreies Ergebnis.
      implementation: >
        Jeder EBF-Workflow sollte einen formalen Kern haben:
        - Distanz-Berechnung: Python-Script
        - Parameter-Transformation: Python-Script
        - Komplementaritaets-Pruefung: Python-Script
        - Brier Score: Python-Script
        Das LLM orchestriert und uebersetzt, rechnet aber nicht.

  # ─────────────────────────────────────────────────────────────────────────
  # VIRUS-ANGRIFFSFLAECHE PRO SCHICHT
  # ─────────────────────────────────────────────────────────────────────────
  attack_surface_by_layer:

    - layer: "Formal (Python)"
      susceptibility: 0.0
      attack_vector: "Keiner — deterministisch"
      defense: "Code Review, Unit Tests"
      virus_type: "Keiner"

    - layer: "Parameter (YAML)"
      susceptibility: 0.3
      attack_vector: "Falsche Werte eingespeist"
      defense: "Schema-Validation, Range-Checks, Referentielle Integritaet"
      virus_type: "Kontamination (falscher Input → falscher Output)"

    - layer: "Uebersetzung (LLM)"
      susceptibility: 0.8
      attack_vector: "Halluzination, Konfabulation, falsches Framing"
      defense: "Ergebnis muss formale Berechnung referenzieren, Template-Constraints"
      virus_type: "Klassischer EIV — Plausibilitaet ohne Substanz"

    - layer: "Interface (Formal → LLM)"
      susceptibility: 0.4
      attack_vector: "LLM ignoriert formales Ergebnis und 'verbessert' es"
      defense: >
        Structured Output: LLM erhaelt Ergebnis in festem Format.
        Post-Pruefung: Zahlen im Output muessen mit formaler
        Berechnung uebereinstimmen (Zahlen-Extraktion + Vergleich).
      virus_type: "Override-Virus — LLM ueberschreibt formale Wahrheit"

  # ─────────────────────────────────────────────────────────────────────────
  # ANALOGIE
  # ─────────────────────────────────────────────────────────────────────────
  analogy: >
    Laborgeraet (Python)    →  misst objektiv    →  Blutwerte
    Arzt (LLM)              →  liest Ergebnisse  →  erklaert dem Patienten
    Patient (User)           →  versteht          →  handelt

    Das Laborgeraet kann nicht halluzinieren.
    Der Arzt kann die Werte falsch erklaeren — aber er erfindet keine.
    Wenn der Arzt sagt "Ihr Cholesterin ist 240" und das Labor sagt 180,
    dann ist das PRUEFBAR.

    In der alten Architektur (LLM als Denker):
    Es gibt kein Labor. Der Arzt schaetzt die Werte aus Erfahrung.
    Manchmal stimmt es, manchmal nicht. Nicht pruefbar.

# =============================================================================
# TAXONOMIE DER FEHLERQUELLEN: VIRUS vs. GENDEFEKT
# Full Three-Layer Architecture → KB-TLA-001
# The formal_immunity section above remains for the virus-immunity narrative.
# =============================================================================
#
# ENTSCHEIDENDE UNTERSCHEIDUNG:
#
# Ein Virus (EIV) ist ein EXTERNER Erreger der einen gesunden Organismus
# befaellt. Er kann bekaempft werden — Immunsystem, Quarantaene, Impfung.
#
# Ein Gendefekt (EGD) ist ein INTERNER Fehler in der DNA des Organismus
# selbst. Der Organismus IST das Problem. Das Immunsystem kann ihn nicht
# bekaempfen — er ist Teil des Koerpers.
#
# Fuer das EBF: Wenn die formalen Variablen-Definitionen SELBST unsauber
# sind, dann ist die formale Schicht nicht "infiziert" — sie ist von
# Geburt an krank. Determinismus auf falschen Definitionen gibt
# DETERMINISTISCH FALSCHE Ergebnisse.
#
# =============================================================================

error_taxonomy:

  overview: >
    Die formale Schicht ist nur dann virenimmun, wenn ihre DNA —
    die Variablen-Definitionen — sauber ist. Ohne saubere Definitionen
    produziert Python deterministisch falsche Ergebnisse. Das ist kein
    Virus. Das ist ein Gendefekt.

  # ─────────────────────────────────────────────────────────────────────────
  # EIV: Externer Information Virus (bereits definiert oben)
  # ─────────────────────────────────────────────────────────────────────────
  eiv:
    name: "EBF Information Virus (EIV)"
    nature: "Extern — befaellt gesunden Organismus"
    origin: "LLM-Halluzination, Daten-Kontamination, Copy-Paste-Fehler"
    defense: "Immunsystem (Validation, Hooks, Schema-Checks, CPRE)"
    prognosis: >
      HEILBAR. Der Organismus ist gesund, der Erreger ist identifizierbar
      und entfernbar. Nach Entfernung funktioniert alles korrekt.
    biology: "Grippe, COVID — behandelbar, Immunsystem kann lernen"
    example: >
      LLM halluziniert "BCM = W × A × C". Die formale Definition
      des BCM ist korrekt (10C Framework). Der Virus ist die
      falsche Formel, nicht die Definition.

  # ─────────────────────────────────────────────────────────────────────────
  # EGD: Endogener Genetischer Defekt (NEU)
  # ─────────────────────────────────────────────────────────────────────────
  egd:
    name: "EBF Genetic Defect (EGD)"
    nature: "Intern — die DNA selbst ist fehlerhaft"
    origin: "Unsaubere Variablen-Definitionen, fehlende Spezifikation, Ambiguitaet"
    defense: >
      NICHT durch Immunsystem heilbar! Erfordert "Gentherapie" —
      die Definitionen selbst muessen repariert werden.
    prognosis: >
      Chronisch bis repariert. Jede Berechnung auf Basis einer
      fehlerhaften Definition ist deterministisch falsch. Das System
      FUNKTIONIERT (Code laeuft, Zahlen kommen raus) aber die Zahlen
      sind BEDEUTUNGSLOS.
    biology: "Sichelzellananaemie, Trisomie — der Bauplan selbst ist fehlerhaft"

    subtypes:

      - id: "EGD-AMB"
        name: "Ambiguitaet"
        description: >
          Variable ist mehrdeutig definiert. Dasselbe Symbol hat
          verschiedene Bedeutungen je nach Kontext.
        severity: "HOCH — unsichtbar, weil Code trotzdem laeuft"
        example: >
          "lambda" ohne Spezifikation: Loss Aversion (λ_R)?
          Exponential Decay (λ_decay)? Lagrange-Multiplikator (λ_L)?
          Poisson-Parameter (λ_P)? Arrival Rate (λ_arr)?
          Python rechnet froelich mit lambda = 2.25 — aber WAS ist 2.25?
        defense: >
          ATOMIC SYMBOL RULE: Jedes EBF-Symbol ist eineindeutig.
          Nicht λ sondern λ_R (Reference-Dependent Loss Aversion).
          Nicht γ sondern γ_ij (Complementarity zwischen i und j).
        existing_ebf_rule: "CLAUDE.md: ATOMIC SYMBOL RULE"

      - id: "EGD-CTX"
        name: "Kontextlosigkeit"
        description: >
          Parameter hat einen Wert aber KEINEN Kontext. Der Wert ist
          nur unter bestimmten Bedingungen gueltig, aber die Bedingungen
          sind nicht spezifiziert.
        severity: "HOCH — der Wert SCHEINT korrekt, ist es aber nicht"
        example: >
          lambda_R = 2.25 (Kahneman & Tversky 1992). Korrekt?
          Ja — fuer westliche Studenten, bei hypothetischen Lotterien,
          in Laborexperimenten, 1992. NEIN fuer: Schweizer Rentner,
          bei echten Entscheidungen, am Bankschalter, 2026.
          Der Wert 2.25 ohne measurement_context ist ein Gendefekt.
        defense: >
          MEASUREMENT CONTEXT PFLICHT: Jeder Parameter-Wert MUSS
          seinen Kontext spezifizieren (Population, Setting, Jahr,
          Methode). Ohne Kontext ist der Wert NICHT verwendbar.
        existing_ebf_rule: >
          CLAUDE.md: Parameter Context Transformation (PCT).
          paper-references YAML: measurement_contexts PFLICHT bei Level 5.

      - id: "EGD-UNT"
        name: "Fehlende Einheiten"
        description: >
          Variable hat einen Wert aber keine Einheit. Oder die Einheit
          ist implizit und wird unterschiedlich interpretiert.
        severity: "MITTEL — fuehrt zu Groessenordnungsfehler"
        example: >
          "sigma_s = 0.35" — ist das ein Anteil (0 bis 1)?
          Ein Prozentsatz (0 bis 100)? Ein Skalenwert?
          Ein standardisierter Koeffizient? Ein monetaerer Wert?
        defense: >
          Jede Variable in parameter-registry.yaml MUSS ein
          'unit' und 'scale' Feld haben.
        biology_analog: "Mars Climate Orbiter 1999 — Einheiten-Verwechslung"

      - id: "EGD-RNG"
        name: "Fehlende Wertebereiche"
        description: >
          Kein definierter Wertebereich. Unmoeglich zu erkennen
          ob ein Wert plausibel ist.
        severity: "MITTEL — keine automatische Erkennung moeglich"
        example: >
          gamma_ij = 3.5 — ist das plausibel?
          Wenn der Bereich [-1, 1] ist: NEIN. Offensichtlich falsch.
          Wenn der Bereich [-10, 10] ist: Vielleicht.
          Ohne definierten Bereich: keine Aussage moeglich.
        defense: >
          Jeder PAR-xxx Eintrag MUSS min_value und max_value haben.
          Range-Check im Validierungsscript.

      - id: "EGD-OVL"
        name: "Symbol-Kollision"
        description: >
          Zwei verschiedene Konzepte teilen sich dasselbe Symbol.
          Code funktioniert, aber die Semantik ist inkonsistent.
        severity: "KRITISCH — fuehrt zu stillen logischen Fehlern"
        example: >
          gamma wird fuer Komplementaritaet (γ_ij in HOW/B) UND fuer
          Gender-Egalitaet (γ_gender in Alevitentum-Distanz) verwendet.
          Wenn ein Script gamma aus der Registry liest, WELCHES gamma?
        defense: >
          ATOMIC SYMBOL RULE + Namespace-Prefixe:
          γ_COMP_ij (Komplementaritaet), γ_param_gender (Parameter).
          Keine Symbol-Wiederverwendung ueber Domains.

      - id: "EGD-DOM"
        name: "Fehlende Domaenen-Gueltigkeit"
        description: >
          Formel oder Modell wird ausserhalb seines Gueltigkeitsbereichs
          angewendet. Die Formel ist korrekt — fuer einen anderen Kontext.
        severity: "HOCH — die Anwendung ist das Problem, nicht die Formel"
        example: >
          Prospect Theory (lambda_R = 2.25) auf Unternehmens-M&A anwenden.
          Die Theorie ist fuer individuelle Entscheidungen validiert.
          Ob sie fuer Vorstands-Entscheidungen gilt: nicht gesichert.
          Die Formel "funktioniert" — aber die Anwendung ist ungueltig.
        defense: >
          Jedes Modell in model-registry.yaml MUSS ein 'validity' Feld
          haben mit: population, setting, decision_type, evidence_tier.

    # ─────────────────────────────────────────────────────────────────────────
    # VERGLEICH: EIV vs EGD
    # ─────────────────────────────────────────────────────────────────────────
    comparison:
      - aspect: "Ursprung"
        eiv: "Extern (LLM-Halluzination, Kontamination)"
        egd: "Intern (unsaubere Definition, fehlende Spezifikation)"

      - aspect: "Erkennung"
        eiv: "Durch Immunsystem erkennbar (Validation, Hooks)"
        egd: "Durch Immunsystem NICHT erkennbar — es IST die DNA"

      - aspect: "Symptome"
        eiv: "Falsche Werte die nicht zum SSOT passen"
        egd: "KORREKTE Berechnung auf FALSCHER Grundlage"

      - aspect: "Gefaehrlichkeit"
        eiv: "Sichtbar — Widerspruch zu SSOT ist erkennbar"
        egd: "UNSICHTBAR — Code laeuft, Zahlen kommen, alles sieht gut aus"

      - aspect: "Therapie"
        eiv: "Immunsystem (Hooks, Schemas, Terminology Registry)"
        egd: "Gentherapie (Definition reparieren, Variable praezisieren)"

      - aspect: "Prognose"
        eiv: "Heilbar nach Erkennung"
        egd: "Chronisch bis zur Reparatur der Definitionen"

      - aspect: "Biologie"
        eiv: "Grippe — kommt, wird bekaempft, geht"
        egd: "Sichelzellen — der Bauplan selbst ist fehlerhaft"

      - aspect: "Das Tueckische"
        eiv: "Sieht falsch aus wenn man genau hinschaut"
        egd: "Sieht RICHTIG aus — weil die Berechnung korrekt ist"

    # ─────────────────────────────────────────────────────────────────────────
    # WARUM EGD GEFAEHRLICHER IST ALS EIV
    # ─────────────────────────────────────────────────────────────────────────
    why_egd_is_worse: >
      Ein Virus (EIV) produziert INKONSISTENTE Ergebnisse. Er widerspricht
      dem SSOT. Das ist erkennbar. Ein Validation-Script findet ihn.

      Ein Gendefekt (EGD) produziert KONSISTENTE aber FALSCHE Ergebnisse.
      Lambda = 2.25 wird ueberall konsistent verwendet — aber ohne
      Measurement Context ist 2.25 bedeutungslos. Das System ist in sich
      konsistent, aber die Konsistenz bezieht sich auf eine falsche
      Definition.

      Das ist wie ein perfekt kalibriertes Messgeraet das die FALSCHE
      GROESSE misst. Die Messung ist praezise. Sie ist reproduzierbar.
      Sie ist nur nicht das, was man messen wollte.

    # ─────────────────────────────────────────────────────────────────────────
    # EBF's BESTEHENDE GENTHERAPIE-WERKZEUGE
    # ─────────────────────────────────────────────────────────────────────────
    existing_gene_therapy:

      - tool: "ATOMIC SYMBOL RULE"
        heilt: "EGD-AMB (Ambiguitaet), EGD-OVL (Symbol-Kollision)"
        mechanism: "Jedes Symbol ist eineindeutig: lambda_R, nicht lambda"
        status: "AKTIV — in CLAUDE.md definiert"

      - tool: "Parameter Context Transformation (PCT)"
        heilt: "EGD-CTX (Kontextlosigkeit)"
        mechanism: >
          theta_B = theta_A × prod(M(delta_psi_i)) — erzwingt
          Kontext-Spezifikation bei jeder Parameter-Verwendung.
        status: "AKTIV — in CLAUDE.md und Level 5 Workflow definiert"

      - tool: "measurement_contexts in Paper-YAML"
        heilt: "EGD-CTX (Kontextlosigkeit)"
        mechanism: >
          Jeder Parameter-Wert aus einem Paper MUSS seinen
          Mess-Kontext spezifizieren (Population, Setting, Methode).
        status: "AKTIV — PFLICHT bei Level 5 Integration"

      - tool: "parameter-registry.yaml Schema"
        heilt: "EGD-UNT (Einheiten), EGD-RNG (Wertebereiche)"
        mechanism: "Pflicht-Felder: unit, scale, min_value, max_value"
