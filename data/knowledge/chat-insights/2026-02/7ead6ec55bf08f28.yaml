question: das ist der Vertrag eines wekrstudenetn, er hat jetzt gekündigt, wo finde
  ich die Kündigungsfrist?
answer: "# KÜNDIGUNGSFRISTEN FÜR WERKSTUDENT VINCENT MEBES\n\n## \U0001F50D **VERTRAGSANALYSE**\n\
  \nBasierend auf dem vorliegenden Arbeitsvertrag und der Tatsache, dass Vincent gekündigt\
  \ hat:\n\n## ⏰ **KÜNDIGUNGSFRISTEN**\n\n### **1. PROBEZEIT (erste 3 Monate)**\n\
  - **Dauer:** Bis 5. Dezember 2022\n- **Kündigungsfrist:** **1 Woche**\n- **Kündigung\
  \ durch:** Beide Seiten möglich\n\n### **2. NACH DER PROBEZEIT**\nDa der Vertrag\
  \ nur die Probezeit spezifiziert, gelten die **gesetzlichen Bestimmungen gemäß OR**:\n\
  \n**Für Arbeitnehmer (Vincent kündigt):**\n- **1. Dienstjahr:** 1 Monat auf Ende\
  \ eines Monats\n- **Ab 2. Dienstjahr:** 2 Monate auf Ende eines Monats  \n- **Ab\
  \ 9. Dienstjahr:** 3 Monate auf Ende eines Monats\n\n## \U0001F4C5 **KONKRETE ANWENDUNG**\n\
  \n**Vincent's Anstellung:** Ab 5. September 2022\n**Wenn er JETZT (Februar 2025)\
  \ kündigt:**\n- **Kündigungsfrist:** **2 Monate auf Monatsende**\n- **Beispiel:**\
  \ Kündigung am 15. Februar → Letzter Arbeitstag: 30. April 2025\n\n## ⚖️ **RECHTLICHE\
  \ GRUNDLAGE**\n\n```\nArt. 335c OR - Kündigungsfristen während des Arbeitsverhältnisses:\n\
  1. Im ersten Dienstjahr einen Monat auf das Ende eines Monats\n2. Ab dem zweiten\
  \ bis und mit dem neunten Dienstjahr zwei Monate\n3. Nachher drei Monate auf das\
  \ Ende eines Monats\n```\n\n## \U0001F4CB **ZUSAMMENFASSUNG**\n\n**Kündigungsfrist\
  \ für Vincent:** **2 Monate auf Monatsende**\n\n*Da im Vertrag steht \"Alle weiteren\
  \ Bestimmungen gemäss Schweizerischem Obligationenrecht (OR)\", gelten automatisch\
  \ die gesetzlichen Kündigungsfristen.*"
