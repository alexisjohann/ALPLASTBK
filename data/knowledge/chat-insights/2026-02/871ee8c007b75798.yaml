question: was ist das BCM
answer: "# Das Behavioral Change Model (BCM)\n\nDas **Behavioral Change Model (BCM)**\
  \ ist ein **wissenschaftlich fundiertes Beratungs-Tool** zur systematischen Analyse\
  \ und Gestaltung von Verhaltensänderungen. Es wurde seit 2010 in der Praxis von\
  \ FehrAdvice entwickelt und ist das Herzstück des Evidence-Based Framework (EBF).\n\
  \n---\n\n## Die 10 CORE-Dimensionen (10C Framework)\n\nDas BCM ist **KEIN** \"Willingness\
  \ × Ability × Context\"-Modell, sondern ein **10C Framework** mit zehn komplementären\
  \ Dimensionen:\n\n1. **WHO** – Wer hat Utility? (Zielpopulation)\n2. **WHAT** –\
  \ Was ist Utility? (→ FEPSDE Matrix)\n3. **HOW** – Wie interagieren die Dimensionen?\
  \ (Komplementarität γ)\n4. **WHEN** – Wann zählt Kontext? (8 Ψ-Dimensionen)\n5.\
  \ **WHERE** – Woher die Zahlen? (Parameter Θ)\n6. **AWARE** – Wie bewusst? (Awareness)\n\
  7. **READY** – Handlungsbereit? (Willingness)\n8. **STAGE** – Wo in der Journey?\
  \ (Behavioral Change Journey)\n9. **HIERARCHY** – Wie stratifizieren Entscheidungen?\
  \ (L0-L3)\n10. **EIT** – Wie emergieren Interventionen?\n\n---\n\n## BCM-Diagnose:\
  \ Awareness × Willingness Matrix\n\nDas BCM nutzt eine **2D-Matrix** zur Diagnose:\n\
  - **Awareness** (Bewusstsein für das Problem/die Lösung)\n- **Willingness** (Bereitschaft\
  \ zur Veränderung)\n\nDiese beiden Dimensionen ermöglichen eine **segmentspezifische\
  \ Intervention**.\n\n---\n\n## FEPSDE Matrix – Die 6 Nutzendimensionen\n\n**WHAT**\
  \ (Core #2) wird durch die FEPSDE Matrix konkretisiert:\n\n- **F**inancial – Kosten/Nutzen,\
  \ ökonomische Sicherheit\n- **E**motional – Wohlbefinden, Zufriedenheit, Sinn\n\
  - **P**hysical – Gesundheit, Energie, Langlebigkeit\n- **S**ocial – Beziehungen,\
  \ Zugehörigkeit, Status, Normen\n- **D**igital – Konnektivität, Zugang, Datenrechte\n\
  - **E**cological – Umwelt, Nachhaltigkeit\n\n---\n\n## Wissenschaftliche Fundierung\
  \ (EBF)\n\nDas BCM ist eingebettet in das **Evidence-Based Framework (EBF)**, entwickelt\
  \ mit Prof. Ernst Fehr (Uni Zürich).\n\n**Zentrale Innovation**: \n```\nθ = f(Ψ,\
  \ 10C)\n```\nParameter sind **kontextabhängig** – die Variation ist das Signal,\
  \ nicht Noise.\n\n---\n\n## BEATRIX – Die digitale Plattform\n\n**BEATRIX** ist\
  \ die Software-Suite, die BCM + EBF digitalisiert und skaliert. Sie überwindet die\
  \ kognitive Kapazitätsgrenze manueller BCM-Anwendung.\n\n---\n\n## Was macht das\
  \ BCM besonders?\n\n1. **Praxiserprobt**: Seit 2010 in Beratungsprojekten entwickelt\n\
  2. **10C-Framework**: Ganzheitliche Erfassung aller relevanten Dimensionen\n3. **Kontextsensitiv**:\
  \ 8 Ψ-Dimensionen modulieren alle Parameter\n4. **Evidenzbasiert**: Wissenschaftliche\
  \ Fundierung durch EBF\n5. **Skalierbar**: Durch BEATRIX digital implementiert\n\
  \n---\n\n**Möchtest du eine spezifische CORE-Dimension vertiefen oder das BCM auf\
  \ ein konkretes Projekt anwenden?**"
