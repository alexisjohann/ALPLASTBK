question: Was ist der <unterschied zwisxhen Beatrix, EBF und BCM
answer: "# Der Unterschied zwischen BEATRIX, EBF und BCM\n\nGute Frage – diese drei\
  \ Begriffe werden oft verwechselt, sind aber **drei verschiedene Dinge**:\n\n---\n\
  \n## \U0001F4CA Die Schnellübersicht\n\n| Konzept | Typ | Beschreibung |\n|---------|-----|--------------|\n\
  | **EBF** | **Framework** (Theorie) | Das übergeordnete wissenschaftliche Framework\
  \ für Verhaltensverständnis |\n| **BCM** | **Modell** (Teil von EBF) | Behavioral\
  \ **Change** Model – erklärt Verhaltenswandel |\n| **BEATRIX** | **Produkt** (Software)\
  \ | Web-Plattform, die EBF + BCM implementiert und zugänglich macht |\n\n---\n\n\
  ## \U0001F3AF Im Detail\n\n### **EBF = Evidence-Based Framework**\n- **Was ist es?**\
  \ Das wissenschaftliche Gesamtframework von FehrAdvice\n- **Zentrale Formel:** `θ\
  \ = f(Ψ, 10C)` – Verhalten ist eine Funktion von Kontext (Ψ) und 10 Kernparametern\
  \ (10C)\n- **Umfang:** 25 Kapitel, 153 Theorien, 64+ Parameter, 852 Cases, 2.347\
  \ Papers\n- **Komponenten:**\n  - BCM (Behavioral Change Model)\n  - 10C CORE Framework\n\
  \  - 8 Ψ-Dimensionen (Kontext)\n  - FEPSDE (6 Utility-Dimensionen)\n  - Parameter\
  \ Registry, Theory Catalog, Case Registry\n\n---\n\n### **BCM = Behavioral Change\
  \ Model**\n- **Was ist es?** Ein **Teil** von EBF – erklärt speziell Verhaltenswandel\n\
  - **Zentrale Formel:** `BCM = 10C Framework`\n- **Bedeutung:** \n\
  \  - **Willingness (W):** Motivation zur Veränderung\n  - **AWARE (Awareness):** Fähigkeit\
  \ zur Veränderung\n  - **Context (C):** Externe Rahmenbedingungen\n- **⚠️ NICHT:**\
  \ \"Behavioral Competence Model\" oder \"Behavioral Context Model\"\n\n---\n\n###\
  \ **BEATRIX = Behavioral Economics AI Technology for Research and Implementation\
  \ eXcellence**\n- **Was ist es?** Eine KI-gestützte Web-Plattform (Software)\n-\
  \ **Zweck:** Macht EBF + BCM **praktisch anwendbar** durch Chat-Interface\n- **Was\
  \ sie kann:**\n  - EBF-Wissen abrufen\n  - BCM-Parameter schätzen\n  - 10C-Analysen\
  \ durchführen\n  - Cases & Papers durchsuchen\n  - Verhaltensinterventionen designen\n\
  \n---\n\n## \U0001F504 Wie sie zusammenspielen\n\n```\nNutzer stellt Frage\n   \
  \   ↓\nBEATRIX (Chat-Interface)\n      ↓\nGreift auf EBF-Wissen zu\n      ↓\nWendet\
  \ BCM + 10C + Ψ an\n      ↓\nLiefert strukturierte Antwort\n```\n\n**Analogie:**\n\
  - **EBF** = Das Medizin-Lehrbuch\n- **BCM** = Ein Kapitel über Heilungsprozesse\n\
  - **BEATRIX** = Der KI-Arzt, der das Lehrbuch beherrscht\n\n---\n\n## ❌ Häufige\
  \ Fehler\n\n| Falsch | Richtig |\n|--------|---------|\n| \"BEATRIX ist ein Framework\"\
  \ | BEATRIX ist eine **Software-Plattform** |\n| \"BCM ist das gesamte Framework\"\
  \ | BCM ist **Teil von EBF** |\n| \"EBF ist ein Chatbot\" | EBF ist die **wissenschaftliche\
  \ Grundlage** |\n| \"beatrix\" (Kleinschreibung) | **BEATRIX** (immer Großbuchstaben)\
  \ |\n\n---\n\n**Kurz gesagt:**\n- **EBF** = Die Theorie\n- **BCM** = Ein Modell\
  \ innerhalb der Theorie\n- **BEATRIX** = Das Tool, das beides nutzbar macht\n\n\
  Hast du eine spezifische Frage zu einem der drei Konzepte? \U0001F60A"
