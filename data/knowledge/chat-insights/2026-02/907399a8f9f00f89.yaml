question: wenn du auf gitgub nachfrägst, was kommt dann heraus
answer: "Wenn ich auf GitHub nachfrage, passiert folgendes:\n\n## Der Deep Path Workflow\n\
  \n**1. Issue Creation**\n```\nDeine Frage → GitHub Issue #[nummer] im EBF Repository\n\
  ```\n\n**2. GitHub Actions Trigger**\n```\nanthropics/claude-code-action@v1 wird\
  \ automatisch gestartet\n```\n\n**3. Claude Code Analyse**\n```\n- Vollzugriff auf\
  \ das komplette EBF Repository\n- 151+ Python Scripts für Verhaltensanalyse  \n\
  - 41 Slash Commands für spezielle EBF-Tasks\n- Alle Papers, Modelle, Case Studies\n\
  - Live-Analyse mit aktuellem Code-Stand\n```\n\n**4. Deep Analysis Output**\n```\n\
  - Wissenschaftlich präzise Antworten\n- Vollständiger Kontext aus dem Framework\n\
  - Code-Beispiele und mathematische Modelle\n- Referenzen zu konkreten Implementierungen\n\
  ```\n\n**5. Antwort-Integration**\n```\nGitHub Issue Kommentar → Extrahiert → Dir\
  \ präsentiert\n```\n\n## Konkrete Unterschiede\n\n**Fast Path (Normal-Chat, ~12\
  \ Sekunden):**\n- Knowledge Base Suche\n- Vorhandene Chat-Insights\n- Schnelle Antworten\n\
  \n**Deep Path (GitHub, ~4-5 Minuten):**\n- **Live Repository-Analyse**\n- **Aktueller\
  \ Code-Stand** \n- **Vollständige EBF-Methodik**\n- **Mathematische Modellierung**\n\
  - **Konkrete Implementierungen**\n\n## Beispiel: BCM-Frage auf GitHub\n\nWenn deine\
  \ BCM-Frage über GitHub gelaufen wäre:\n- Analyse der BCM2-Implementierung in den\
  \ Python Scripts\n- Konkrete Code-Beispiele für Kontext-Kalibrierung\n- Mathematische\
  \ Formeln aus den Algorithmus-Files\n- Live-Parameter aus der aktuellen Schweizer\
  \ Datenlage\n\n**Der Unterschied:** Statt Dokumentation kriegst du **Live-Code-Analyse**\
  \ mit der neuesten EBF-Implementierung.\n\nWillst du deine BCM-Frage nochmal über\
  \ den Deep Path laufen lassen? Dann kriegen wir die **technische Implementierung**\
  \ mit allen Details! \U0001F680"
