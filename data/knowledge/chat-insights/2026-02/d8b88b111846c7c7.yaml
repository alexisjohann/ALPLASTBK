question: nein stopp, als für dein Verständnis. das Addendum zum Arbeitsvertragm vom
  01.06.2026  ergänzt, dass der Einstieg ins PEP späteins anganf 2027 evaluiert wird.
  mit der Zielsetzung das PEP auch start 2027 zu starten. die tägliche ausbodungspauschel
