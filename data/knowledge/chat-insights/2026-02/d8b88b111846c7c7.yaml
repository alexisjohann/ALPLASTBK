answer: "Verstanden! Danke für die Klarstellung. Hier ist das Addendum basierend auf\
  \ Ihren Angaben:\n\n**Addendum zum Arbeitsvertrag**\n\nzwischen\t**FehrAdvice &\
  \ Partners AG**, Binzmühlestrasse 170D, 8050 Zürich  \nund\t\t**Florian Kollmar**,\
  \ c/o Oscar Kömpel, Max-Bill-Platz 15, 8050 Zürich\n\n---\n\nDieses Addendum ergänzt\
  \ den Arbeitsvertrag vom 1. Juni 2026.\n\n**§ 1 Partnership Enhancement Program\
  \ (PEP)**\nDie Vertragsparteien vereinbaren, dass der Einstieg von Herrn Kollmar\
  \ in das Partnership Enhancement Program (PEP) spätestens Anfang 2027 evaluiert\
  \ wird, mit der Zielsetzung, das PEP im Jahr 2027 zu starten.\n\n**§ 2 Ausbildungspauschale**\
  \  \nDie jährliche Ausbildungspauschale beträgt CHF 10'000 brutto und ist im separaten\
  \ Ausbildungsvertrag festgehalten.\n\n**§ 3 Inkrafttreten**\nDieses Addendum tritt\
  \ mit Unterzeichnung in Kraft.\n\n---\n\nZürich, den _________________\n\n**FehrAdvice\
  \ & Partners AG**\t\t**Florian Kollmar**\n\n_________________________\t\t_________________________\n\
  \nIst das so korrekt und entspricht Ihren Vorstellungen?"
