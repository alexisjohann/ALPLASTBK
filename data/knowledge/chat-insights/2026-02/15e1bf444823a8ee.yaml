question: aber du kannst informationen aus github holen?
answer: "Nein, ich kann **keine Informationen direkt aus GitHub holen**. \n\n**Zur\
  \ Klarstellung:**\n- Ich habe **keinen direkten Zugang** zu GitHub-Repositories\n\
  - Ich kann **keine Live-Daten** von GitHub abrufen\n- Ich kann **keine Dateien**\
  \ von GitHub herunterladen\n\n**Was in der Knowledge Base steht:**\nDie vorherigen\
  \ Gespräche zeigen, dass bereits nach GitHub-Informationen gefragt wurde (z.B. zu\
  \ Ausschreibungen), aber ich habe dort auch erklärt, dass ich keinen direkten Zugang\
  \ habe.\n\n**Was ich stattdessen kann:**\n✅ **Du gibst mir GitHub-Inhalte:** Copy-paste\
  \ Code, Dokumente, Issues etc.\n✅ **Ich analysiere sie:** Code-Review, Dokumentation,\
  \ Strukturierung\n✅ **Ich erstelle Vorlagen:** Die ihr dann auf GitHub ablegen könnt\n\
  \n**Praktisches Vorgehen:**\n- Teile GitHub-URLs → Ich kann sie nicht öffnen\n-\
  \ Kopiere Inhalte hierhin → Ich kann sie analysieren\n- Lade Screenshots hoch →\
  \ Ich kann sie auslesen\n\nWelche spezifischen GitHub-Inhalte brauchst du Hilfe\
  \ dabei? Dann können wir einen praktischen Weg finden!"
