question: Was siehst du auf diesem Bild?
answer: "Hallo! Ich muss dir ehrlich sagen, dass ich **kein Bild sehen kann**.\n\n\
  Wie aus den Chat-Insights in meiner Knowledge Base hervorgeht, haben wir bereits\
  \ ähnliche Situationen gehabt - ich kann Bilder nicht auslesen oder analysieren.\n\
  \n## Was ich brauche\n\nKönntest du mir bitte **beschreiben**, was auf dem Bild\
  \ zu sehen ist? Oder wenn es sich um einen Text/Dokument handelt, kannst du mir\
  \ die relevanten Informationen **textlich mitteilen**?\n\n## Meine Fähigkeiten\n\
  \nIch kann sehr gut mit **textuellen Informationen** arbeiten und diese analysieren:\n\
  - Strategische Einschätzungen\n- Behavioral Economics Analysen  \n- Lead-Management\n\
  - Decision Architecture\n\n**Was genau möchtest du analysieren oder besprechen?**\
  \ Dann kann ich dir trotz der Bild-Limitation optimal weiterhelfen!"
