question: das ist unser aktuelles CH Reglement, was gehört hier angosst`
answer: "## \U0001F504 **CH-REGLEMENT: HARMONISIERUNG MIT AT-REGLEMENT**\n\nBasierend\
  \ auf dem CH-Reglement und dem AT-Reglement aus meiner Knowledge Base - hier die\
  \ **Unterschiede und Anpassungsvorschläge**:\n\n### **\U0001F50D HAUPTUNTERSCHIEDE\
  \ ZWISCHEN CH UND AT**\n\n| Bereich | **CH aktuell** | **AT-Reglement** | **Harmonisierungsvorschlag**\
  \ |\n|---------|---------------|------------------|--------------------------|\n\
  | **Treuebonus** | CHF 20'000 (3J) + CHF 40'000 (7J) | EUR 15'000 (3J) + EUR 30'000\
  \ (7J) | ✅ Proportional ähnlich |\n| **Projektausgleichstage** | Max. 5 Tage/Jahr\
  \ | 2→3→5 Tage je nach Betriebsjahr | **❌ FEHLT: Staffelung** |\n| **Kündigungsfristen**\
  \ | 3-6 Monate | 1 Monat | **❌ UNGLEICH** |\n| **E-Mail-Kündigung** | Nur schriftlich\
  \ | Explizit erlaubt | **❌ FEHLT** |\n| **Handy-Regelung** | ✅ Vorhanden | ❌ Fehlt\
  \ in AT | **CH hat Mehrwert** |\n\n---\n\n### **\U0001F3AF WAS IM CH-REGLEMENT ANGEPASST\
  \ WERDEN SOLLTE:**\n\n### **1. PROJEKTAUSGLEICHSTAGE - STAFFELUNG EINFÜHREN**\n\n\
  **❌ Aktuell (Punkt 5.3):**\n```\n\"bis zu maximal 5 zusätzliche Projektausgleichstage\"\
  \n```\n\n**✅ Harmonisierung mit AT:**\n```\nProjektausgleichstage nach zeitintensiven\
  \ Projektphasen:\n- 1. Betriebsjahr: bis zu 2 zusätzliche Tage\n- 2. Betriebsjahr:\
  \ bis zu 3 zusätzliche Tage  \n- Ab 3. Betriebsjahr: bis zu 5 zusätzliche Tage\n\
  \nVoraussetzung: Mindestens 6 Monate Betriebszugehörigkeit\n```\n\n### **2. KÜNDIGUNGSFRISTEN\
  \ ANGLEICHEN**\n\n**❌ Problem:** CH hat 3-6 Monate, AT nur 1 Monat\n\n**✅ Harmonisierungsoptionen:**\n\
  \n**Option A - CH an AT angleichen:**\n```\nNach Ablauf der Probezeit: \n- Alle\
  \ Stufen: 1 Monat auf Monatsende\n- (Vereinfachung der Verwaltung)\n```\n\n**Option\
  \ B - AT an CH angleichen:**\n```\nNach Ablauf der Probezeit:\n- Junior bis Consultant:\
  \ 3 Monate\n- Senior und Partner: 6 Monate\n```\n\n### **3. E-MAIL-KÜNDIGUNG ERGÄNZEN**\n\
  \n**✅ Ergänzung in Punkt 2.3:**\n```\nDie Kündigung muss in schriftlicher Form erfolgen.\
  \ \nEine Kündigung per E-Mail ist zulässig, wenn sie \nvon der registrierten Firmen-E-Mail-Adresse\
  \ versendet wird.\n```\n\n---\n\n### **\U0001F7E2 WAS BEREITS GUT HARMONISIERT IST:**\n\
  \n**✅ Treuebonus-System:**\n- CH: CHF 20'000 (3J) + CHF 40'000 (7J) = CHF 60'000\
  \ total\n- AT: EUR 15'000 (3J) + EUR 30'000 (7J) = EUR 45'000 total\n- **Währungsbereinigt\
  \ praktisch identisch** (CHF/EUR ≈ 1.0-1.1)\n\n**✅ Probezeit:**\n- Beide: 3 Monate\
  \ (Standard)\n\n**✅ Geheimhaltung/IP:**\n- Beide: Umfassende Regelungen vorhanden\n\
  \n---\n\n### **\U0001F4CB KONKRETE ÄNDERUNGSVORSCHLÄGE FÜR CH-REGLEMENT:**\n\n###\
  \ **Punkt 2.3 - Kündigung (erweitern):**\n```diff\nDie Kündigung muss in schriftlicher\
  \ Form erfolgen und \nspätestens am letzten Arbeitstag des Kündigungsmonats \ndem\
  \ Vertragspartner zugehen.\n+ Eine Kündigung per E-Mail ist zulässig, wenn sie von\
  \ \n+ der registrierten Firmen-E-Mail-Adresse versendet wird.\n```\n\n### **Punkt\
  \ 5.3 - Projektausgleichstage (ersetzen):**\n```diff\n- Nach zeitintensiven Projektphasen\
  \ können Mitarbeitende, \n- die mindestens sechs Monate bei FehrAdvice & Partners\
  \ \n- angestellt sind, jährlich bis zu maximal 5 zusätzliche \n- Projektausgleichstage\
  \ beziehen.\n\n+ Nach zeitintensiven Projektphasen können Mitarbeitende \n+ zusätzliche\
  \ Projektausgleichstage beziehen:\n+ • 1. Betriebsjahr: bis zu 2 Tage\n+ • 2. Betriebsjahr:\
  \ bis zu 3 Tage  \n+ • Ab 3. Betriebsjahr: bis zu 5 Tage\n+ Voraussetzung: Mindestens\
  \ 6 Monate Betriebszugehörigkeit.\n```\n\n### **Punkt 2.3 - Kündigungsfristen (Option):**\n\
  ```diff\n- Nach Ablauf der Probezeit: generell 3 Monate, \n- für Seniors und Partner:\
  \ 6 Monate\n\n+ Nach Ablauf der Probezeit: 1 Monat auf Monatsende\n+ (Harmonisierung\
  \ mit österreichischer Niederlassung)\n```\n\n---\n\n### **\U0001F3AF ERGEBNIS DER\
  \ HARMONISIERUNG:**\n\nNach diesen Anpassungen hätten beide Reglemente:\n- ✅ **Gleiche\
  \ Projektausgleichstage-Staffelung**\n- ✅ **Gleiche Kündigungsmodalitäten** (inkl.\
  \ E-Mail)\n- ✅ **Proportional gleiche Treueboni**\n- ✅ **Einheitliche Geheimhaltungs-Standards**\n\
  \n**CH behält:** Handy-Regelung, längere Ferienzeiten (Schweizer Standard)\n**AT\
  \ behält:** Kollektivvertragsbezug, 14 Gehaltszahlungen\n\n**Soll ich die konkreten\
  \ Textänderungen für das CH-Reglement ausformulieren?** \U0001F4DD"
