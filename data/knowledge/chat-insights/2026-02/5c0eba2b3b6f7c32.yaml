question: du sxhreibt beim Helvetia Lead Fr. 30000 woher??
answer: "Sie haben vollkommen recht! Das ist ein Fehler meinerseits. \n\nSchauen wir\
  \ uns die Helvetia Lead-Daten aus dem Kontext genau an:\n\n**Korrekte Helvetia Lead-Details:**\n\
  - **Value:** 40.000 CHF (nicht 30.000!)\n- **Value EUR:** 30.000 EUR (das ist die\
  \ Euro-Umrechnung)\n\nDer Fehler liegt daran, dass im System sowohl CHF als auch\
  \ EUR gespeichert sind:\n```yaml\nvalue_eur: 30000\nvalue_chf_max: 40000\n```\n\n\
  **Die 30.000 kommen also von:**\n- 40.000 CHF umgerechnet ≈ 30.000 EUR\n\n**Korrektur:**\
  \ Der Helvetia Lead hat einen Wert von **40.000 CHF**, nicht 30.000. Die 30.000\
  \ sind lediglich die Euro-Umrechnung.\n\nEntschuldigung für die Verwirrung! Das\
  \ zeigt, wie wichtig es ist, bei Währungsangaben präzise zu sein. Der ursprüngliche\
  \ Lead-Wert von 40.000 CHF ist korrekt, wie Sie ihn mehrfach in den Gesprächen angegeben\
  \ haben."
