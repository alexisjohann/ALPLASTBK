  An: clara.mebs@gmx.de\nBetreff: Vielen Dank für deine Bewerbung und deine Zeit!\n\
  \t\nHallo Clara,\n\n \n\nvielen Dank nochmals für deine Bewerbung, die vielen Tests,\
  \ die du ausgefüllt hast und das Video-Interview, in dem du in einer neuen, virtuellen\
  \ Umgebung sechs Fragen wirklich professionell und gut beantwortet hast.\n\n \n\n\
  Für dein Engagement in diesem Bewerbungsprozess hast du viel Zeit und Energie investiert.\
  \ Wir sind uns bewusst, dass du hier eine wertvolle Vorleistung erbracht hast und\
  \ schätzen dies sehr.\n\n \n\nNach dem Studium deiner Unterlagen, deines Video-Interviews\
  \ und deiner Erfahrungen und Fähigkeiten haben wir in einem ersten Schritt realistisch\
  \ einzuschätzen versucht, wie sich eine gemeinsame Zusammenarbeit bei uns gestalten\
  \ könnte.\n\n \n\nLeider müssen wir dir mitteilen, dass wir derzeit davon absehen,\
  \ mit dir die letzten Stufen im Kennenlernprozess zu gehen.\n\n \n\nGrundsätzlich\
  \ machst du auf uns einen sehr sympathischen und kompetenten Eindruck. Wir haben\
  \ jedoch sehr viele Menschen, die daran interessiert sind, bei uns als Junior Behavioral\
  \ Designer (w/m/d) zu arbeiten. Aus diesem Grund sind wir gezwungen, auch einen\
  \ relativen Vergleich mit anderen Bewerbern anzustellen. Hier sind wir mit den uns\
  \ zur Verfügung stehenden Informationen zum Schluss gekommen, dass es leider andere\
  \ Bewerber gibt, die mit grösserer Leichtigkeit als Junior Behavioral Designer (w/m/d)\
  \ bei uns erfolgreich sein können.\n\n \n\nFalls wir jedoch ein vorschnelles Urteil\
  \ über deine Fähigkeiten und Interessen getroffen haben, freu"
answer: "## \U0001F4E7 **ANTWORT AN CLARA - PROFESSIONELLER FOLLOW-UP**\n\nLiebe Clara,\n\
  \nvielen Dank für dein konstruktives und professionelles Feedback zu unserem Bewerbungsprozess.\
  \ Es zeigt deine Reflexionsfähigkeit und dein Interesse an kontinuierlicher Verbesserung\
  \ - Eigenschaften, die wir sehr schätzen.\n\n### **\U0001F50D SPEZIFISCHES FEEDBACK\
  \ ZU DEINER BEWERBUNG**\n\n**Deine Stärken, die uns aufgefallen sind:**\n- **Internationale\
  \ Erfahrung:** Deine Praktika in Stockholm (Antler) und Strasbourg zeigen Mobilität\
  \ und Anpassungsfähigkeit\n- **Relevante Praxis:** Human Factors Consulting bei\
  \ IABG und Venture Capital Erfahrung passen gut zu unserem Ansatz\n- **Akademische\
  \ Exzellenz:** Master Psychology (UZH) + Master Thesis (ETH) ist eine starke Kombination\n\
  - **Mehrsprachigkeit:** Deutsch/Englisch/Französisch ist in unserem internationalen\
  \ Umfeld wertvoll\n\n**Bereiche für weitere Entwicklung:**\n- **Behavioral Economics\
  \ Tiefe:** Während deine Psychologie-Basis stark ist, könntest du spezifische BE-Projekte/Kurse\
  \ ergänzen\n- **Beratungserfahrung:** Mehr direkte Kunden-/Projektberatung würde\
  \ dein Profil stärken\n- **EBF-Framework Verständnis:** Vertiefung in unser spezifisches\
  \ Methodology-Portfolio\n\n### **\U0001F3AF KONKRETE EMPFEHLUNGEN FÜR DIE NÄCHSTEN\
  \ 6 MONATE**\n\n**1. Behavioral Economics vertiefen:**\n- Folge unserem **#Experimentability-Newsletter**\
  \ von Gerhard Fehr\n- Lies 2-3 Schlüsselwerke: Kahneman, Thaler, Ariely\n- Absolviere\
  \ einen Online-Kurs in Behavioral Economics\n\n**2. Praktische Erfahrung sammeln:**\n\
  - Suche ein BE-relevantes Praktikum/Projekt\n- Dokumentiere deine Arbeit für Portfolio-Aufbau\n\
  \n**3. Netzwerk aufbauen:**\n- Kommentiere aktiv auf unserem **LinkedIn** und **Blog**\n\
  - Besuche BE-relevante Events in Zürich\n- Engagiere dich in unserem **Podcast \"\
  Uncovering Blindspot\"**\n\n### **\U0001F4C5 NEXT STEPS**\n\n**Für deine erneute\
  \ Bewerbung in 6 Monaten (ca. August 2026):**\n- Teile konkrete BE-Projekte/Erfahrungen\
  \ mit uns\n- Zeige, wie du unser EBF-Framework verstehst/anwendest\n- Bringe eigene\
  \ Ideen für FehrAdvice-Projekte mit\n\n### **\U0001F91D BLEIB IN KONTAKT**\n\nWir\
  \ laden dich herzlich ein:\n- **LinkedIn:** Folge und kommentiere unsere Posts\n\
  - **Blog:** Teile deine Gedanken zu unseren Artikeln\n- **Events:** Wir informieren\
  \ über BE-Veranstaltungen in Zürich\n\n**Clara, du hast definitiv das Potenzial\
  \ für eine erfolgreiche Karriere in Behavioral Economics.** Die Zeit bis August\
  \ 2026 ist eine Investition in deine Zukunft - und möglicherweise in eine gemeinsame\
  \ Zukunft mit FehrAdvice.\n\nHerzliche Grüsse,\n\n**Maria Neumann**  \nPeople-Team,\
  \ FehrAdvice & Partners AG\n\n---\n\n**P.S.:** Falls du spezifische Fragen zu BE-Themen\
  \ hast oder Feedback zu unseren Inhalten wünschst, zögere nicht, dich zu melden.\
  \ Wir unterstützen gerne talentierte Nachwuchskräfte auf ihrem Weg! \U0001F680\n\
