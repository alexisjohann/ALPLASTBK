question: ErklГӨre mir die Begriffe BCM, EBF und BEATRIX - was bedeuten sie und wie
  hГӨngen sie zusammen?
answer: "## BCM, EBF und BEATRIX: Die drei SГӨulen des Systems\n\n### Die Begriffe\
  \ im Гңberblick\n\n---\n\n## \U0001F3D7пёҸ **EBF - Evidence-Based Framework**\n**Das\
  \ Fundament: Die wissenschaftliche Methodik**\n\n**EBF** ist das **Гјbergeordnete\
  \ Framework** - eine wissenschaftlich fundierte Methodik zur systematischen Anwendung\
  \ der VerhaltensГ¶konomie in der Praxis.\n\n**Was EBF umfasst:**\n- **10C CORE Framework**\
  \ (WHO, WHAT, HOW, WHEN, WHERE, AWARE, READY, STAGE, HIERARCHY, EIT)\n- **Mathematische\
  \ Modellierung** von Verhaltensparametern (О», ОІ, Оҙ)\n- **Systematische Intervention\
  \ Design** basierend auf empirischer Evidenz\n- **Kontext-Transformation** statt\
  \ einfacher Гңbertragung von Studienergebnissen\n\n---\n\n## \U0001F4CA **BCM - Behavioral\
  \ Context Model** \n**Die Wissensbasis: Strukturierte Kontextdaten**\n\n**BCM**\
  \ ist die **Datenbank des EBF** - eine systematische Sammlung von Гјber 400 Kontextfaktoren,\
  \ die verhaltensГ¶konomische Parameter kalibrieren.\n\n**BCM-Struktur:**\n```\nBCM2_04_KON\
  \ вҶ’ MAKRO-KONTEXT (404 Schweizer Faktoren)\nв”ңв”Җв”Җ Demografie, Wirtschaft, Politik,\
  \ Technologie, Sozio-Kultur\nв”ңв”Җв”Җ Quellen: BFS, SECO, SNB, ESS, WVS, gfs.bern\n\n\
  BCM2_05_IND вҶ’ INDIVIDUAL (48 Faktoren)  \nв”ңв”Җв”Җ Alter, Geschlecht, Bildung, PersГ¶nlichkeit\n\
  \nBCM2_06_META вҶ’ ENTSCHEIDUNGSARCHITEKTUR (42 Faktoren)\nв”ңв”Җв”Җ Framing, Defaults,\
  \ Timing, KanГӨle\n```\n\n**Beispiel:** Wie sich Loss Aversion (О») verГӨndert:\n-\
  \ Basis: О» = 2.25\n- Schweizer Kontext: О» Г— 1.1 = 2.47\n- 65+ Jahre: О» Г— 1.20 =\
  \ 2.97\n- Loss-Framing: О» Г— 1.3 = 3.86\n\n---\n\n## \U0001F916 **BEATRIX - Behavioral\
  \ Economics AI Technology**\n**Die KI-Engine: Intelligente Automatisierung**\n\n\
  **BEATRIX** ist die **KI-gestГјtzte Umsetzung** von EBF+BCM - sie macht das Framework\
  \ praktisch anwendbar und skalierbar.\n\n**Die Kernformel:**\n```\nBEATRIX = BCM\
  \ Framework (FehrAdvice IP) + KI-Engineering (UZH Gall/Luger)\n```\n\n**Was BEATRIX\
  \ leistet:**\n- **Automatische Kontextanalyse** aus BCM-Daten\n- **Parameterberechnung**\
  \ fГјr spezifische Situationen  \n- **Interventionsempfehlungen** basierend auf EBF-Methodik\n\
  - **Prognoseverbesserung** um +45% gegenГјber traditionellen Methoden\n\n---\n\n\
  ## \U0001F504 **Das Zusammenspiel: Wie sie funktionieren**\n\n### Der integrierte\
  \ Workflow:\n\n```\nв”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\n\
  в”Ӯ  EBF (Framework)                                            в”Ӯ\nв”Ӯ  \"WIE denken\
  \ wir Гјber VerhaltensГӨnderung?\"                  в”Ӯ\nв”Ӯ  в”ңв”Җ 10C CORE Struktur   \
  \                                    в”Ӯ\nв”Ӯ  в”ңв”Җ Mathematische Verhaltensmodellierung\
  \                    в”Ӯ\nв”Ӯ  в””в”Җ Systematische Interventions-Design-Prinzipien    \
  \       в”Ӯ\nв””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\n   \
  \                         вҶ“ liefert Methodik\nв”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\n\
  в”Ӯ  BCM (Datenbank)                                            в”Ӯ\nв”Ӯ  \"WAS sind die\
  \ spezifischen Kontextdaten?\"                  в”Ӯ\nв”Ӯ  в”ңв”Җ 404 Schweizer Makro-Faktoren\
  \                            в”Ӯ\nв”Ӯ  в”ңв”Җ 48 Individual-Faktoren                   \
  \               в”Ӯ\nв”Ӯ  в””в”Җ 42 Meta-Entscheidungsarchitektur-Faktoren             \
  \  в”Ӯ\nв””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\n        \
  \                    вҶ“ liefert Daten\nв”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\n\
  в”Ӯ  BEATRIX (KI-Engine)                                        в”Ӯ\nв”Ӯ  \"WIE setzen\
  \ wir das intelligent um?\"                       в”Ӯ\nв”Ӯ  в”ңв”Җ Automatische EBF-Anwendung\
  \                              в”Ӯ\nв”Ӯ  в”ңв”Җ BCM-Datenprocessing                    \
  \                 в”Ӯ\nв”Ӯ  в””в”Җ Skalierbare EntscheidungsunterstГјtzung              \
  \    в”Ӯ\nв””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\n```\n\n\
  ---\n\n## \U0001F3AF **Praktisches Beispiel: Heizungsersatz in der Schweiz**\n\n\
  **Problem:** Schweizer Hausbesitzer zГ¶gern beim Heizungsersatz\n\n### EBF-Analyse:\n\
  - **WHO:** Schweizer Hausbesitzer 50+\n- **WHAT:** Heizungsersatz (hohe Investition)\n\
  - **Verhaltensbarrieren:** Loss Aversion, Status Quo Bias, Zeit-Diskontierung\n\n\
  ### BCM-Kalibrierung:\n```\nО»_CH = 2.25 Г— 1.1 (Vertrauen) Г— 1.2 (Alter 50+) Г— 1.2\
  \ (Energiekontext) = 3.6\nОІ_CH = 0.85 Г— 0.9 (konservativ) = 0.77\n```\n\n### BEATRIX-Empfehlung:\n\
  1. **Starke Defaults:** \"Heizungsersatz ist Standard bei Defekt\"\n2. **Loss-Framing:**\
  \ \"Stoppen Sie die Energieverschwendung\"  \n3. **Soziale Normen:** \"75% Ihrer\
  \ Nachbarn haben bereits gewechselt\"\n4. **Timing:** Intervention im Winter (Salience)\n\
  \n---\n\n## \U0001F3C6 **Die Innovation zusammengefasst**\n\n| Aspekt | Traditionell\
  \ | EBF + BCM + BEATRIX |\n|--------|-------------|-------------------|\n| **Methodik**\
  \ | Erfahrungsbasiert | EBF: Systematisch evidenzbasiert |\n| **Daten** | Ad-hoc\
  \ Studien | BCM: 400+ strukturierte Kontextfaktoren |\n| **Umsetzung** | Manuell\
  \ | BEATRIX: KI-gestГјtzt automatisiert |\n| **Skalierung** | Projekt fГјr Projekt\
  \ | Systematisch wiederverwendbar |\n| **Genauigkeit** | Вұ20-30% | Вұ2% (validiert)\
  \ |\n\n---\n\n**Kurz gesagt:** \n- **EBF** = Die Methode (das \"Wie\")\n- **BCM**\
  \ = Die Daten (das \"Was\") \n- **BEATRIX** = Die Automatisierung (das \"Womit\"\
  )\n\nZusammen bilden sie das weltweit erste **General Decision Support System (GDS"
