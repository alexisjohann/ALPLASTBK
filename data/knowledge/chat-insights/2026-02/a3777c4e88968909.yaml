question: kannst du das bcm vertiefend abfragen
answer: "## BCM Vertiefende Analyse - Strukturierte Abfrage\n\nPerfekt! Ich führe\
  \ Sie durch eine **systematische BCM-Analyse** basierend auf dem Evidence-Based\
  \ Framework. Wir bauen Ihr Behavioral Change Model Schritt für Schritt auf.\n\
  \n### Phase 1: Grundlagen definieren\n\n**Zunächst die strategischen Eckpfeiler:**\n\
  \n\U0001F3AF **Für welchen Kunden/welches Projekt** erstellen wir das BCM?\n- Kundencode/Organisation\n\
  - Projektkontext\n\n\U0001F50D **Was ist das konkrete Zielverhalten**, das verändert\
  \ werden soll?\n- Aktuelles \"Problem-Verhalten\"  \n- Gewünschtes Zielverhalten\n\
  - Spezifische Handlungen/Entscheidungen\n\n\U0001F465 **Wer ist die präzise Zielgruppe?**\n\
  - Demografische Merkmale\n- Rolle/Position\n- Anzahl Personen\n- Segmentierungsmerkmale\n\
  \n### Phase 2: Ausgangslage erfassen\n\n\U0001F4CA **Current State - Wo stehen wir\
  \ heute?**\n- Wie häufig tritt das gewünschte Verhalten aktuell auf? (0-100%)\n\
  - Was sind die Hauptbarrieren?\n- Welche Trigger funktionieren bereits?\n\n\U0001F3AF\
  \ **Desired State - Wo wollen wir hin?**\n- Angestrebte Verhaltenshäufigkeit\n-\
  \ Messkriterien für Erfolg\n- Zeitrahmen für die Veränderung\n\n### Phase 3: BCM-Komponenten\
  \ analysieren\n\nIch werde dann systematisch abfragen:\n\n**W-Dimension (Willingness)**\n\
  - Motivation, Einstellungen, Werte der Zielgruppe\n- Emotionale Bereitschaft zur\
  \ Veränderung\n\n**A-Dimension (Awareness/AWARE)**  \n- Vorhandene Skills und Wissen\n-\
  \ Verfügbare Ressourcen (Zeit, Geld, Tools)\n\n**Ψ-Dimensionen (Context)**\n- Alle\
  \ 8 Kontextdimensionen: Institutional, Social, Cognitive, etc.\n- Spezifische Kontextfaktoren\
  \ aus der BCM2-Database\n\n### Ihr nächster Schritt\n\nBeginnen Sie mit **einer\
  \ der ersten drei Fragen** - ich passe mich dann Ihrem Wissensstand an und führe\
  \ Sie durch die vertiefende Analyse!\n\nWas möchten Sie als erstes definieren?\n\
  \nStrukturierte Daten (model): {\"model_type\": \"bcm\", \"phase\": \"foundation\"\
  , \"questions_ready\": [\"customer_project\", \"target_behavior\", \"target_group\"\
  , \"current_state\", \"desired_state\"]}"
