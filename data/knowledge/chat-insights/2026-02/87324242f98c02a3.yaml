question: 🔬 BCM-Modell bauen
answer: "# \U0001F52C BCM-Modell entwickeln\n\nPerfekt! Lass uns ein **Behavioral\
  \ Competence Model (BCM)** nach dem Evidence-Based Framework entwickeln.\n\n## Was\
  \ ich von dir brauche:\n\n### 1️⃣ **Kundenkontext**\n- Für welchen Kunden erstellen\
  \ wir das Modell?\n- Welches Projekt oder welche Initiative steht dahinter?\n\n\
  ### 2️⃣ **Zielverhalten** \n- Welches konkrete Verhalten soll entwickelt/verändert\
  \ werden?\n- Beispiele: \"Kundenberatung bei Versicherungsprodukten\", \"Agile Führung\
  \ in Transformation\", \"Verkaufsverhalten im Retail Banking\"\n\n### 3️⃣ **Zielgruppe**\n\
  - Wer ist die Zielgruppe? (z.B. Führungskräfte, Berater, Fachspezialisten)\n- Organisationsebene?\
  \ Funktion?\n\n### 4️⃣ **Kontext** (soweit bekannt)\n- Ausgangslage: Was ist die\
  \ aktuelle Herausforderung?\n- Organisatorischer Kontext: Transformation? Neue Strategie?\
  \ Kulturwandel?\n\n---\n\n**Ich führe dich dann durch:**\n- ✅ Analyse der relevanten\
  \ **Ψ-Dimensionen** (8 psychologische Kontextfaktoren)\n- ✅ Definition des **Kontext-Vektors**\n\
  - ✅ Formulierung von **Behavioral Objectives**\n- ✅ Ableitung konkreter **Kompetenzen\
  \ & Interventionen**\n\n\U0001F4CB **Starte mit dem Kunden und dem Zielverhalten**\
  \ – ich baue dann das Modell Schritt für Schritt mit dir auf!\n\nStrukturierte Daten\
  \ (model): {\"model_type\": \"bcm\", \"session_mode\": \"interactive_build\"}"
