question: 🧠 Ausgangslage erfassen
answer: 'Perfekt! Ich unterstütze dich beim systematischen Erfassen der Ausgangslage
  für einen Kunden oder ein Projekt. Lass uns die Situation strukturiert analysieren.


  **Was möchtest du erfassen?**

  - Für welchen Kunden geht es? (Kundencode oder Name)

  - Handelt es sich um ein bestehendes Projekt oder eine neue Anfrage?

  - Welche Aspekte der Ausgangslage stehen im Fokus?


  Ich sammle dann systematisch Informationen zu:

  - Branchenkontext und Marktumfeld

  - Organisationskultur und aktuelle Herausforderungen

  - Stakeholder-Landschaft

  - Bestehende Initiativen

  - Regulatorisches Umfeld


  **Starte einfach mit dem Kunden und der groben Situation - ich führe dich dann durch
  die weitere Analyse!**'
