question: was ist nudging
answer: 'Nudging ist ein zentrales Konzept der Verhaltensökonomie und bezeichnet subtile
  Interventionen, die Menschen dazu bewegen, bessere Entscheidungen zu treffen, ohne
  ihre Wahlfreiheit einzuschränken.


  ## Was ist ein Nudge?


  Ein Nudge ist ein "Schubs" in die richtige Richtung - eine kleine Veränderung in
  der Entscheidungsarchitektur, die das Verhalten lenkt, ohne Optionen zu verbieten
  oder wirtschaftliche Anreize stark zu verändern.


  ## Kernprinzipien des Nudging:


  **1. Libertärer Paternalismus**

  - Erhalt der Wahlfreiheit

  - Gleichzeitig Lenkung zu besseren Entscheidungen

  - Keine Verbote oder starken finanziellen Anreize


  **2. Ausnutzung systematischer Verhaltenstendenzen**

  - Menschen sind nicht vollständig rational

  - Vorhersagbare Entscheidungsmuster

  - Kognitive Verzerrungen und Heuristiken


  ## Typische Nudge-Techniken:


  - **Default-Optionen**: Z.B. automatische Anmeldung zur Pensionskasse

  - **Soziale Normen**: "Die meisten Ihrer Nachbarn zahlen pünktlich"

  - **Vereinfachung**: Komplexe Informationen verständlich aufbereiten

  - **Timing**: Der richtige Moment für Entscheidungen

  - **Framing**: Wie Optionen präsentiert werden


  ## Anwendungsbereiche:


  - Gesundheitsförderung

  - Altersvorsorge

  - Umweltschutz

  - Steuerehrlichkeit

  - Finanzentscheidungen


  Bei FehrAdvice nutzen wir Nudging-Prinzipien systematisch in der Decision Architecture,
  um Entscheidungsumgebungen so zu gestalten, dass Menschen intuitive und vorteilhafte
  Entscheidungen treffen können.'
