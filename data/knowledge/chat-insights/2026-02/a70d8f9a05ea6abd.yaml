question: die 25% sind eine erfindung von dir
answer: 'Du hast absolut recht - **die 25% waren meine Erfindung**. Entschuldigung
  für diese Verwirrung!


  Ich habe fälschlicherweise aus den Session-Entitäten und dem "aktuellen Entwurf"
  abgeleitet, dass bereits 25% diskutiert wurden. Das war ein Fehler meinerseits.


  ## ZURÜCK ZU DEN FAKTEN:


  **Tatsächliche Situation:**

  - Corinna arbeitet derzeit **100%** (CHF 60.000)

  - Du überlegst, wie sie sich im Back Office System positionieren soll

  - Es gibt offenbar eine Diskussion über eine **Reduktion**, aber der konkrete Prozentsatz
  steht noch zur Debatte


  ## MEINE FRAGE AN DICH:


  **Welche Optionen stehen tatsächlich zur Diskussion?**

  - 50% Anstellung?

  - Andere Prozentsätze?

  - Vollständiger Wechsel zu Mandatsbasis?

  - Oder ist das genau das, was du von mir analysiert haben möchtest?


  Lass mich die Analyse **ohne erfundene Zahlen** neu machen, basierend auf dem, was
  du mir tatsächlich mitgeteilt hast.


  **Was ist dein konkreter Entscheidungsbedarf?**'
