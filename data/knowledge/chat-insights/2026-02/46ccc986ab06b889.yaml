question: Was ist das BCM Modell?
answer: "## Das Behavioral Change Model (BCM)\n\nDas **Behavioral Change Model\
  \ (BCM)** ist das Kernstück des Evidence-Based Framework (EBF) von FehrAdvice &\
  \ Partners AG. Es handelt sich um ein wissenschaftlich fundiertes, probabilistisches\
  \ Modell zur Vorhersage und Gestaltung von Verhaltensänderungen.\n\n### Grundarchitektur\n\
  \nDas BCM basiert auf **10 Core Axiomen** (siehe Knowledge Base), die eine mathematische\
  \ Formalisierung von Verhaltensänderung ermöglichen:\n\n```\nP(Verhaltensänderung)\
  \ = f(10C: WHO, WHAT, HOW, WHEN, WHERE, AWARE, READY, STAGE, HIERARCHY, EIT)\n```\n\n### Die 10C Dimensionen des BCM\n\
  \n**1. Willingness (W) - \"Wollen\"**\n- Intrinsische Motivation und Bereitschaft\
  \ zur Veränderung\n- Fungiert als **Gate Condition**: Ohne Willingness findet keine\
  \ Verhaltensänderung statt\n- Basiert auf der CORE-READY Dimension (AV - Attitudes\
  \ & Values)\n\n**2. AWARE (Awareness) - \"Können\"** \n- Fähigkeiten, Wissen und Ressourcen\
  \ zur Umsetzung\n- Umfasst Skills, Knowledge und verfügbare Mittel\n- Aus der CORE-AWARE\
  \ Dimension (AU - Awareness & Understanding)\n\n**3. Context (Ψ) - \"Dürfen/Rahmenbedingungen\"\
  **\n- 8 Kontextdimensionen: Institutional (Ψ_I), Social (Ψ_S), Cognitive (Ψ_C),\
  \ Cultural (Ψ_K), Economic (Ψ_E), Temporal (Ψ_T), Material (Ψ_M), Physical (Ψ_F)\n\
  - Moduliert alle Übergangswahrscheinlichkeiten\n\n### Das\
  \ 10C Framework\n\nDas BCM integriert **10 komplementäre Dimensionen** (WHO, WHAT,\
  \ HOW, WHEN, WHERE, AWARE, READY, STAGE, HIERARCHY, EIT), die gemeinsam das vollständige\
  \ Bild einer Verhaltensänderungssituation erfassen.\n\n### FEPSDE Matrix\n\nZusätzlich\
  \ werden **6 Nutzendimensionen** analysiert:\n- **F**inancial (Einkommen, Vermögen, ökonomische Sicherheit)\n\
  - **E**motional (Wohlbefinden, Zufriedenheit, Sinn)  \n- **P**hysical (Gesundheit, Energie, Langlebigkeit)\n\
  - **S**ocial (Beziehungen, Zugehörigkeit, Vertrauen)\n- **D**igital (Konnektivität, Zugang, Datenrechte)\n\
  - **E**cological (Umwelt, Nachhaltigkeit)\n\n### Besonderheiten des BCM\n\n1. **Probabilistisch**:\
  \ Liefert Wahrscheinlichkeiten, nicht deterministische Vorhersagen\n2. **Evidenzbasiert**:\
  \ Jede Komponente ist empirisch messbar und validierbar\n3. **Kontextsensitiv**:\
  \ Berücksichtigt situative und kulturelle Faktoren\n4. **Segmentspezifisch**: Verschiedene\
  \ Zielgruppen haben unterschiedliche Parameter\n5. **Zeitdynamisch**: Berücksichtigt\
  \ Lerneffekte und Feedback-Schleifen\n\n### Anwendungsbereiche\n\n- **Decision Architecture**:\
  \ Gestaltung von Entscheidungssituationen\n- **Intervention Design**: Entwicklung\
  \ verhaltensbasierter Massnahmen\n- **Policy Design**: Evidenzbasierte Politikgestaltung\n\
  - **Change Management**: Organisationale Transformation\n\nDas BCM ermöglicht es,\
  \ komplexe Verhaltensänderungen wissenschaftlich zu analysieren und gezielte, wirksame\
  \ Interventionen zu entwickeln."
