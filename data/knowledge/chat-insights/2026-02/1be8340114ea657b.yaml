question: was ist das BCM?
answer: '# Das Behavioral Competence Model (BCM)


  Das **Behavioral Competence Model (BCM)** ist das zentrale Verhaltensänderungs-Modell
  innerhalb des Evidence-Based Framework (EBF) von FehrAdvice & Partners AG. Es handelt
  sich um ein wissenschaftlich fundiertes, probabilistisches Modell zur **Vorhersage
  und Gestaltung von Verhaltensänderungen**.


  ---


  ## Die Kernformel


  ```

  P(Verhaltensänderung) = Willingness × Ability × Context

  ```


  Das BCM formalisiert mathematisch, mit welcher Wahrscheinlichkeit eine Verhaltensänderung
  eintritt.


  ---


  ## Die drei Kernkomponenten


  ### 1. **Willingness (W) — "Wollen"**

  - Die intrinsische Motivation und Bereitschaft zur Veränderung

  - Fungiert als **Gate Condition**: Ohne ausreichende Willingness findet keine Verhaltensänderung
  statt

  - Umfasst Einstellungen, Werte und emotionale Bereitschaft


  ### 2. **Ability (A) — "Können"**

  - Die verfügbaren Fähigkeiten, Wissen und Ressourcen zur Umsetzung

  - Beinhaltet Skills, Knowledge und materielle/zeitliche Mittel

  - Bestimmt die praktische Umsetzbarkeit


  ### 3. **Context (Ψ) — "Dürfen/Rahmenbedingungen"**

  - **8 Kontextdimensionen**: Institutional, Social, Cognitive, Temporal, Physical,
  Economic, Cultural, Communication

  - Moduliert alle Übergangswahrscheinlichkeiten und kann Verhalten ermöglichen oder
  verhindern


  ---


  ## Wissenschaftliche Fundierung


  ### 10 Core Axiome

  Das BCM basiert auf 10 fundamentalen Axiomen, die eine mathematische Formalisierung
  von Verhaltensänderung ermöglichen.


  ### 10C Framework

  Zehn komplementäre Dimensionen (WHO, WHAT, HOW, WHEN, WHERE, AWARE, READY, STAGE,
  HIERARCHY, EIT), die gemeinsam das vollständige Bild einer Verhaltensänderungssituation
  erfassen.


  ### FEPSDE Matrix

  Sechs Nutzendimensionen zur Bewertung von Interventionen:

  - **F**inancial (Kosten/Nutzen)

  - **E**motional (Gefühle/Emotionen)

  - **P**sychological (Selbstwirksamkeit/Kontrolle)

  - **S**ocial (Status/Normen)

  - **D**evelopmental (Lernen/Wachstum)

  - **E**nvironmental (Nachhaltigkeit/Impact)


  ---


  ## Was macht das BCM besonders?


  1. **Probabilistisch**: Liefert Wahrscheinlichkeiten statt deterministischer Vorhersagen

  2. **Evidenzbasiert**: Jede Komponente ist empirisch messbar und validierbar

  3. **Kontextsensitiv**: Berücksichtigt situative und kulturelle Faktoren

  4. **Segmentspezifisch**: Parameter variieren je nach Zielgruppe

  5. **Zeitdynamisch**: Berücksichtigt Lerneffekte und Feedback-Schleifen


  ---


  ## Anwendungsbereiche


  - **Decision Architecture**: Gestaltung von Entscheidungssituationen

  - **Intervention Design**: Entwicklung verhaltensbasierter Maßnahmen

  - **Policy Design**: Evidenzbasierte Politikgestaltung

  - **Change Management**: Organisationale Transformation


  ---


