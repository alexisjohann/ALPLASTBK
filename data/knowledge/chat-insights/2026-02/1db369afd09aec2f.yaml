question: Haben wir auf GITHUB Informationen über Ausschreibungen
answer: 'Basierend auf meiner BEATRIX Knowledge Base kann ich dir sagen, dass wir
  hauptsächlich **Lead- und Projektdaten** verwalten, aber keine spezifischen GitHub-Repositories
  für Ausschreibungsinformationen.


  **Was ich in der Knowledge Base sehe:**

  - Lead-Management (Concordia, UBS, Swisscom)

  - Projektdaten (Workshops, Trainings, Beratung)

  - Kundendaten und Kontakte

  - Opportunity-Tracking


  **Für Tender-/Ausschreibungsinformationen könnte hilfreich sein:**


  📋 **Mögliche GitHub-Integration:**

  - Tender-Templates und Vorlagen

  - Standardisierte Proposal-Strukturen

  - Best-Practice Dokumente

  - Preismodelle und Kalkulationen


  🔍 **Was suchst du konkret?**

  - Vergangene Tender-Responses als Referenz?

  - Templates für neue Ausschreibungen?

  - Pricing-Guidelines?

  - Proposal-Strukturen?


  Soll ich dir helfen, eine **strukturierte Tender-Datenbank** aufzubauen oder brauchst
  du Unterstützung bei einem konkreten laufenden Tender?


  Ich kann auch schauen, ob wir aus den vorhandenen Lead-Daten Tender-relevante Informationen
  extrahieren können.'
