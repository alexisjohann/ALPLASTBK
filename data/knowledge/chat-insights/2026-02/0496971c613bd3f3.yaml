question: was ist das BCM
answer: "# Das Behavioral Competence Model (BCM)\n\nDas **Behavioral Competence Model\
  \ (BCM)** ist das zentrale Verhaltensänderungs-Modell innerhalb des Evidence-Based\
  \ Framework (EBF) von FehrAdvice & Partners AG. Es handelt sich um ein wissenschaftlich\
  \ fundiertes, probabilistisches Modell zur **Vorhersage und Gestaltung von Verhaltensänderungen**.\n\
  \n## Die Kernformel\n\n```\nP(Verhaltensänderung) = Willingness × Ability × Context\n\
  ```\n\nDas BCM formalisiert mathematisch, mit welcher Wahrscheinlichkeit eine Verhaltensänderung\
  \ eintritt. Alle drei Faktoren müssen vorhanden sein — fehlt einer, findet keine\
  \ Verhaltensänderung statt.\n\n## Die drei Kernkomponenten\n\n### 1. **Willingness\
  \ (W) — «Wollen»**\n- Die intrinsische Motivation und Bereitschaft zur Veränderung\n\
  - Fungiert als **Gate Condition**: Ohne ausreichende Willingness findet keine Verhaltensänderung\
  \ statt\n- Umfasst Einstellungen, Werte und emotionale Bereitschaft\n- Basiert auf\
  \ der CORE-READY Dimension des 10C Framework\n\n### 2. **Ability (A) — «Können»**\n\
  - Fähigkeiten, Wissen und Ressourcen zur Umsetzung\n- Beinhaltet Skills (Fähigkeiten),\
  \ Knowledge (Wissen) und verfügbare Mittel (Zeit, Geld)\n- Bestimmt die praktische\
  \ Umsetzbarkeit\n- Basiert auf der CORE-AWARE Dimension des 10C Framework\n\n###\
  \ 3. **Context (Ψ) — «Dürfen/Rahmenbedingungen»**\n\nDer Kontext moduliert alle\
  \ Übergangswahrscheinlichkeiten durch 8 Dimensionen:\n\n| Dimension | Symbol | Frage\
  \ |\n|-----------|--------|-------|\n| **Institutional** | Ψ_I | Welche Regeln,\
  \ Gesetze, Defaults gelten? |\n| **Social** | Ψ_S | Wer ist dabei? Welche sozialen\
  \ Normen? |\n| **Cognitive** | Ψ_C | Müde? Gestresst? Aufmerksam? Motiviert? |\n\
  | **Cultural** | Ψ_K | Welche Werte, Traditionen, Religion? |\n| **Economic** |\
  \ Ψ_E | Wieviel Budget, Zeit, Energie verfügbar? |\n| **Temporal** | Ψ_T | Wann?\
  \ Zeitdruck? Welche Lebensphase? |\n| **Material** | Ψ_M | Welche Technologie, Infrastruktur,\
  \ Objekte? |\n| **Physical** | Ψ_F | Wo physisch? Zuhause, Büro, öffentlich? |\n\
  \n## Was macht das BCM besonders?\n\n### Kontextabhängige Parameter\nIm Gegensatz\
  \ zu traditionellen Modellen (z.B. Kahneman) verwendet das BCM **variable, kontextabhängige\
  \ Parameter**:\n\n```\nTraditionell: λ = 2.25 (konstant)\nBCM: λ(Ψ, 10C) = variabel\
  \ je nach Kontext\n```\n\n### Probabilistische Vorhersagen\nDas BCM liefert keine\
  \ deterministischen Aussagen, sondern **Wahrscheinlichkeiten mit Konfidenzintervallen**.\n\
  \n### Systematische Kontextmodellierung\nWährend andere Modelle Kontext ignorieren\
  \ oder kontrollieren, modelliert das BCM ihn systematisch durch die 8 Ψ-Dimensionen.\n\
  \n## Praktisches Beispiel\n\n**Energiesparen im Haushalt:**\n- **Willingness (W):**\
  \ Person möchte Umwelt schützen und Geld sparen\n- **Ability (A):** Weiß wie man\
  \ LED-Lampen kauft, hat Budget dafür\n- **Context (Ψ):** \n  - Ψ_M: LED-Lampen verfügbar\
  \ im Handel\n  - Ψ_E: Ausreichend Budget vorhanden\n  - Ψ_S: Nachbarn sparen auch\
  \ Energie (soziale Norm)\n\nNur wenn alle drei Faktoren ausreichend hoch sind, erfolgt\
  \ die Verhaltensänderung.\n\n---\n\n*[Quelle: BEATRIX Knowledge Base - EBF Framework\
  \ Dokumentation]*"
