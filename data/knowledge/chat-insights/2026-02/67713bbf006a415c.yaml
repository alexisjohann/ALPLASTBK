question: was ist das ebf
answer: "# Das Evidence-Based Framework (EBF)\n\nDas **Evidence-Based Framework (EBF)**\
  \ ist das **wissenschaftliche Fundament** von FehrAdvice – entwickelt seit 2010\
  \ in Zusammenarbeit mit der Universität Zürich (Prof. Ernst Fehr).\n\n---\n\n##\
  \ Das EBF ist zwei Dinge gleichzeitig\n\n### 1️⃣ **Eine Wissensdatenbank**\nEine\
  \ systematische, kuratierte Sammlung wissenschaftlicher Erkenntnisse zu menschlichem\
  \ Verhalten:\n\n| Ressource | Anzahl |\n|-----------|--------|\n| **Papers (BibTeX)**\
  \ | 2.347+ |\n| **Theorien** | 191 |\n| **Cases** | 852 |\n| **Kontextfaktoren (Schweiz)**\
  \ | 404+ |\n| **Parameter** | 64+ |\n\n### 2️⃣ **Ein Meta-Framework**\nEine Methodik,\
  \ mit der **jede wissenschaftliche Theorie** eingeordnet und **für die Praxis anwendbar**\
  \ gemacht werden kann.\n\n```\nDas EBF konkurriert NICHT mit Prospect Theory, Inequity\
  \ Aversion\noder anderen Theorien — es ORDNET sie ein und macht sie ANWENDBAR.\n\
  \nDas EBF ist kein Konkurrent — es ist der Ordnungsrahmen.\n```\n\n---\n\n## Die\
  \ zentrale Innovation: Kontextualisierung\n\n### Traditionelle Sicht:\n```\nθ =\
  \ Konstante\nλ = 2.25 (immer gleich)\n\n\"Loss Aversion IST 2.25\"\n```\n\n### EBF-Sicht:\n\
  ```\nθ = f(Ψ, 10C)\nλ(Ψ, 10C) = variabel\n\n\"Loss Aversion bei welfare + stigma\
  \ = 2.5,\n aber bei workplace + peers = 1.8\"\n\nDIE VARIATION IST NICHT NOISE —\
  \ SIE IST DAS SIGNAL!\n```\n\n---\n\n## Die zentrale Gleichung\n\n```\nθ = f(Ψ,\
  \ 10C)\n```\n\n**Verhalten (θ) ist eine Funktion von:**\n- **Ψ** = Kontext (8 Dimensionen)\n\
  - **10C** = 10 CORE-Dimensionen des BCM\n\n---\n\n## Die 8 Kontext-Dimensionen (Ψ-Framework)\n\
  \n| Symbol | Dimension | Frage |\n|--------|-----------|-------|\n| **Ψ_I** | Institutional\
  \ | Welche Regeln, Gesetze, Defaults gelten? |\n| **Ψ_S** | Social | Wer ist dabei?\
  \ Welche sozialen Normen? |\n| **Ψ_C** | Cognitive | Müde? Gestresst? Aufmerksam?\
  \ Motiviert? |\n| **Ψ_K** | Cultural | Welche Werte, Traditionen, Religion? |\n\
  | **Ψ_E** | Economic | Budget? Zeit? Energie verfügbar? |\n| **Ψ_T** | Temporal\
  \ | Wann? Zeitdruck? Lebensphase? |\n| **Ψ_M** | Material | Technologie, Infrastruktur,\
  \ Objekte? |\n| **Ψ_F** | Physical | Wo physisch? Temperatur? Lärm? |\n\n---\n\n\
  ## Epistemologische Klarheit: Rollenverteilung\n\nDas EBF **validiert keine Theorien**\
  \ – das tut die Wissenschaft. Das EBF **kontextualisiert** sie.\n\n| Rolle | Wer\
  \ | Was |\n|-------|-----|-----|\n| **Validieren** | Wissenschaft | \"Ist die Theorie\
  \ valide?\" (Falsifikation, Replikation) |\n| **Kontextualisieren** | EBF | \"Wann\
  \ und wo gilt sie?\" (Ψ + 10C Einordnung) |\n| **Anwenden** | BCM | \"Wie nutzen\
  \ wir sie für diesen Kunden?\" |\n\n```\nEBF sagt NICHT:  \"Prospect Theory ist\
  \ wahr\"\n\nEBF sagt:        \"Die Wissenschaft hat Prospect Theory validiert.\n\
  \                  In DIESEM Kontext (Ψ) gilt sie mit DIESEN\n                 \
  \ Parametern (λ, β) und interagiert SO\n                  mit anderen Theorien (γ)\"\
  \n```\n\n---\n\n## Die Beziehung zum BCM\n\n```\nEBF = wissenschaftliche Grundlage\
  \ für die Weiterentwicklung des BCM\n\nNeues Paper erscheint \n  → EBF ordnet es\
  \ ein (Ψ + 10C + Parameter)\n  → BCM wird besser\n```\n\nDas **BCM** ist das **Beratungs-Tool**\
  \ (seit 2010) – das **EBF** liefert die **wissenschaftliche Tiefe**.\n\n---\n\n\
  ## Wie macht das EBF Theorien praxistauglich?\n\n```\nNeue Studie erscheint\n  \
  \  ↓\n1. 10C-Einordnung         → Welche CORE-Dimensionen adressiert sie?\n    ↓\n\
  2. Ψ-Kontextualisierung   → Unter welchen Bedingungen gilt sie?\n    ↓\n3. Parameter-Extraktion\
  \    → Welche messbaren Werte liefert sie?\n    ↓\n4. Komplementaritäts-Analyse\
  \ → Wie interagiert sie mit anderen Theorien?\n    ↓\n5. Case-Zuordnung        \
  \ → In welchen Praxisfällen wurde sie angewendet?\n    ↓\n→ Theorie ist jetzt im\
  \ BCM nutzbar\n```\n\n**Konkretes Beispiel:**\n```\nStudie: \"Loss Aversion λ =\
  \ 2.5 bei Welfare-Takeup\"\n\n→ EBF ordnet ein:\n  10C:             AWARE + READY\
  \ + WHEN\n  Ψ:               Ψ_I = bureaucratic, Ψ_S = stigma_high\n  Parameter:\
  \       PAR-BEH-016, λ_R = 2.5, Tier 1 (RCT)\n  Komplementarität: γ(AWARE, WHEN)\
  \ dokumentiert\n  Case:            Welfare Non-Takeup Schweiz\n\n→ BCM-Berater:innen\
  \ wissen jetzt:\n  λ ist bei Stigma-Kontexten höher!\n```\n\n---\n\n## Parameter\
  \ Context Transformation (PCT)\n\nDie zentrale Gleichung zur **Übertragung von Parametern**\
  \ zwischen Kontexten:\n\n```\nθ_B = θ_A × ∏ᵢ M(ΔΨᵢ) × ∏ⱼ N(Δ10Cⱼ)\n```\n\n| Variable\
  \ | Bedeutung |\n|----------|-----------|\n| **θ_A** | Parameter im Anchor-Kontext\
  \ (aus Paper) |\n| **θ_B** | Parameter im Target-Kontext (Vorhersage für neues Projekt)\
  \ |\n| **ΔΨᵢ** | Kontext-Differenz |\n| **M(·)** | Ψ-Multiplikator |\n\n**Beispiel:**\n\
  ```\nPaper: λ = 2.25 im Labor (Ψ_I = neutral, Ψ_S = anonymous)\nProjekt: Welfare\
  \ (Ψ_I = bureaucratic, Ψ_S = stigma)\n\n→ λ_Welfare = 2.25 × 1.15 (bureaucratic)\
  \ × 1.08 (stigma) = 2.79\n```\n\n---\n\n## EBF Grundaxiome\n\n| # | Axiom | Regel\
  \ |\n|---|-------|-------|\n| 1 | **Empirische Fundierung** | Parameter basieren\
  \ auf 2.347+ Papers, nicht auf Annahmen |\n| 2 | **Parameter-Hierarchie (BBB 4-Tier)**\
  \ | Literature → LLMMC → Empirical → Expert |\n| 3 | **Referentielle Integrität**\
  \ | Jeder Parameter verweist auf die Parameter-Registry |\n| 4 | **Komplementarität\
  \ ist begründet** | γ ≠ 0 Werte"
