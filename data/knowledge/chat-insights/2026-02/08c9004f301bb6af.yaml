question: wo legt du die neuen leads ab im github
answer: "Ich lege die Leads **nicht direkt in GitHub** ab - das ist ein Missverständnis!\
  \ \n\n**Mein Workflow:**\n1. Ich erstelle die Lead-Daten strukturiert (JSON)\n2.\
  \ Diese werden an das **Backend-System** übertragen\n3. Das Backend speichert sie\
  \ in der **Datenbank**\n4. Periodisch wird die Datenbank mit GitHub synchronisiert\n\
  \n**GitHub-Struktur** (nur zur Info):\n```\n/data/leads/\n  ├── leads_2026.json\n\
  \  ├── pipeline_status.json\n  └── lead_history/\n```\n\n**Was passiert jetzt:**\n\
  - Die beiden Leads (AbbVie & P&C) sind im System erfasst\n- Sie werden automatisch\
  \ in die Sales-Pipeline integriert\n- GitHub-Sync erfolgt im Hintergrund\n\nDu musst\
  \ nichts manuell in GitHub machen - das System übernimmt das!\n\nBrauchst du noch\
  \ Anpassungen an den erfassten Leads?"
