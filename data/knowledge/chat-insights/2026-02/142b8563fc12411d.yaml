question: "Neu eintretenden Mitarbeitenden auf Ebene Junior Consultant und Consultant\
  \ wird ein Betrag von EURO 15.000- brutto zugeteilt, welcher nach dreijähriger Betriebszugehörigkeit\
  \ ausbezahlt wird, sofern nicht einvernehmlich vereinbart wird, dass die Auszahlung\
  \ erst nach 7 Jahren erfolgen soll. \n\n\nGeir muss noch das angepasst weden: 6\
  \ Monate behöatefrist"
answer: 'Basierend auf Ihrem Text sehe ich, dass Sie eine Regelung für neue Mitarbeitende
  haben, die noch angepasst werden muss.


  **Aktuelle Regelung:**

  - Zuteilung: EUR 15.000 brutto für Junior Consultants und Consultants

  - Auszahlung: Nach 3 Jahren Betriebszugehörigkeit

  - Alternative: Einvernehmliche Vereinbarung für Auszahlung nach 7 Jahren


  **Anpassungsbedarf:**

  Sie erwähnen "6 Monate Behaltefrist" - dies könnte bedeuten:


  1. **Mindestbehaltefrist**: 6 Monate Betriebszugehörigkeit bevor Anspruch entsteht?

  2. **Kündigungsfrist-Regelung**: Bei Kündigung 6 Monate vor Auszahlungstermin verfällt
  der Anspruch?

  3. **Wartefrist**: 6 Monate nach Eintritt bis zur Zuteilung?


  **Meine Empfehlung für die Klarstellung:**

  Könnten Sie präzisieren, wie die "6 Monate Behaltefrist" genau wirken soll? So kann
  ich Ihnen einen korrekten Regelungstext vorschlagen.


  **Mögliche Formulierung** (je nach Intention):

  "Der Betrag wird nur ausbezahlt, wenn das Arbeitsverhältnis zum Auszahlungszeitpunkt
  mindestens 6 Monate über den dreijährigen Mindestzeitraum hinaus bestanden hat."


  Ist das die richtige Richtung oder haben Sie eine andere Regelung im Sinn?'
