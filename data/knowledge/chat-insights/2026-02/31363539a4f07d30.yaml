question: ich würde gerne ein Modell für Torhüter-Leistungen während eines Spiels
  entwickeln
answer: "Spannender Ansatz! Basierend auf der LinkedIn-Konversation sehe ich hier\
  \ eine ideale Gelegenheit, ein verhaltensökonomisches Modell für Torwart-Entscheidungen\
  \ zu entwickeln, das über klassische xG/xGA-Metriken hinausgeht.\n\n## Verhaltensökonomische\
  \ Torwart-Modellierung: Strategischer Ansatz\n\n### Kernproblem aus BCM-Perspektive\n\
  Wie Julian richtig erkannte: **Taktische Torwart-Entscheidungen gehen in klassischen\
  \ Metriken völlig verloren**, obwohl sie den Spielverlauf massiv beeinflussen können.\n\
  \n### Modell-Framework Vorschlag\n\n**BCM-Dimensionen für Torwart-Verhalten:**\n\
  - **WILLINGNESS**: Risikobereitschaft bei Herauslaufen, 1-vs-1 Situationen\n- **ABILITY**:\
  \ Technische Skills + Situational Awareness \n- **CAPACITY**: Physische/mentale\
  \ Belastung im Spielverlauf\n\n### Messbare Verhaltensindikatoren\n1. **Räumliche\
  \ Positionierung** (Distanz zur Torlinie bei verschiedenen Spielsituationen)\n2.\
  \ **Timing-Entscheidungen** (Wann verlässt er die Linie? Wie früh?)\n3. **Kommunikation/Führung**\
  \ (Dirigieren der Abwehr)\n4. **Risiko-Profil** (Konservativ vs. aggressiv über\
  \ Spielzeit)\n\n### Praktische Umsetzung\nMit modernen Tracking-Daten ließe sich\
  \ ein **Dynamic Goalkeeper Decision Model** entwickeln, das:\n- Wahrscheinlichkeiten\
  \ für verschiedene Aktionstypen vorhersagt\n- Situative Anpassungen des Risikoverhaltens\
  \ modelliert\n- Einfluss auf Teamverhalten quantifiziert\n\nMöchtest du mit einem\
  \ spezifischen Aspekt starten? Zum Beispiel ein 10C-Modell für \"Herauslaufen-Entscheidungen\"\
  \ oder ein kontinuierliches Modell für \"Risikoverhalten über Spielzeit\"?"
