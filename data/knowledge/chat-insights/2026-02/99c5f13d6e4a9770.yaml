question: 'es geht nicht darum corinna zu behalten. es geht dasrum

  FAP kommt aus der krise und arbeitet normal weiter oder hat seinne plan B

  corinna darf arbeiten in der pension - bei FAP oder woanders - es geht um erwerbstätoigkeit'
answer: "# FAP KRISENSTRATEGIE: Klare Trennung der Interessen\n\n## PRÄZISIERTE SITUATION\n\
  \n### FAP's Prioritäten:\n1. **Überleben der Krise** - Kosten radikal senken\n2.\
  \ **Plan A:** Normal weitermachen (wenn Krise überstanden)  \n3. **Plan B:** Minimalbetrieb\
  \ nur mit Gerhard\n\n### Corinnas Situation:\n- **Erwerbstätigkeit in der Pension**\
  \ (ab 2027) - bei wem auch immer\n- **Nicht FAP's Problem** - sie regelt das selbst\n\
  \n---\n\n## STRATEGISCHE OPTIONEN FÜR FAP (OHNE RÜCKSICHT AUF CORINNA)\n\n### \U0001F3AF\
  \ **OPTION 1: Sofortige Kündigung**\n**Einsparung: CHF 60.000 + Sozialabgaben**\n\
  \n**Für FAP:**\n- ✅ **Maximum Kostenreduktion** sofort\n- ✅ Klare Verhältnisse\n\
  - ❌ Kündigungsfristen/Sozialplan-Kosten\n- ❌ Know-how weg (falls Plan A funktioniert)\n\
  \n---\n\n### \U0001F3AF **OPTION 2: Befristete Freistellung ohne Lohn**\n**Einsparung:\
  \ CHF 60.000 (bei Einverständnis)**\n\n**Für FAP:**\n- ✅ Sofortige Kosteneinsparung\n\
  - ✅ Rechtlich sauberer\n- ✅ Option auf Rückkehr bei Plan A\n- ❌ Corinna muss zustimmen\n\
  \n---\n\n### \U0001F3AF **OPTION 3: Kurzarbeit/Teilzeitsuspension**\n**Variable\
  \ Einsparung je nach Modell**\n\n**Für FAP:**\n- ✅ Flexible Kostenreduktion\n- ✅\
  \ Staatliche Unterstützung möglich\n- ❌ Administrative Komplexität\n\n---\n\n##\
  \ \U0001F4A1 **STRATEGISCHE EMPFEHLUNG FÜR FAP**\n\n### **SOFORT-MASSNAHME: Ehrliches\
  \ Krisengespräch**\n\n**Klartext mit Corinna:**\n1. \"FAP steht vor existenzieller\
  \ Krise\"\n2. \"Wir müssen alle Fixkosten eliminieren\"\n3. \"Entweder Kündigung\
  \ oder unbezahlte Freistellung\"\n4. \"Du regelst deine Erwerbstätigkeit selbst\"\
  \n\n### **Wenn Plan A funktioniert:**\n- Corinna kann zurückkommen (falls sie will)\n\
  - Oder FAP sucht neue Leute\n\n### **Wenn Plan B (Minimalbetrieb):**\n- Corinna\
  \ ist sowieso raus\n- Ihre Pension ist ihr Problem\n\n---\n\n## \U0001F3AF **KONKRETE\
  \ EMPFEHLUNG**\n\n**BESTE LÖSUNG FÜR FAP: Unbezahlte Freistellung**\n- Corinnas\
  \ Zustimmung holen\n- Sofortige CHF 60k Einsparung\n- Flexibilität für später\n\
  - Saubere rechtliche Abwicklung\n\n**Corinnas Erwerbstätigkeit = nicht FAP's Baustelle**\n\
  \n**Soll ich dir den Gesprächsleitfaden für die Krisenkommunikation erstellen?**"
