question: was ist das BCM
answer: "# Das Behavioral Change Model (BCM)\n\nDas **Behavioral Change Model (BCM)**\
  \ ist das zentrale Verhaltensänderungs-Modell des Evidence-Based Framework (EBF)\
  \ von FehrAdvice & Partners AG. Es handelt sich um ein wissenschaftlich fundiertes,\
  \ probabilistisches Modell zur **Vorhersage und Gestaltung von Verhaltensänderungen**.\n\
  \n## Die Kernformel\n\n```\nP(Verhaltensänderung) = Willingness × Ability × Context\n\
  ```\n\nAlle drei Faktoren müssen vorhanden sein — fehlt einer, findet keine Verhaltensänderung\
  \ statt.\n\n## Die drei Kernkomponenten\n\n### 1. **Willingness (W) — «Wollen»**\n\
  - Die intrinsische Motivation und Bereitschaft zur Veränderung\n- Fungiert als **Gate\
  \ Condition**: Ohne ausreichende Willingness findet keine Verhaltensänderung statt\n\
  - Umfasst Einstellungen, Werte und emotionale Bereitschaft\n- Basiert auf der CORE-READY\
  \ Dimension des 10C Framework\n\n**Beispiel:** Eine Person muss *wollen*, dass sie\
  \ weniger Energie verbraucht, bevor irgendeine Intervention wirken kann.\n\n###\
  \ 2. **Ability (A) — «Können»**\n- Fähigkeiten, Wissen und Ressourcen zur Umsetzung\n\
  - Beinhaltet Skills (Fähigkeiten), Knowledge (Wissen) und verfügbare Mittel (Zeit,\
  \ Geld)\n- Basiert auf der CORE-AWARE Dimension des 10C Framework\n\n**Beispiel:**\
  \ Die Person muss *wissen*, wie sie Energie spart (z.B. LED-Lampen kaufen) und die\
  \ *Ressourcen* haben (Budget für den Kauf).\n\n### 3. **Context (Ψ) — «Dürfen/Rahmenbedingungen»**\n\
  \nDer Kontext moduliert alle Übergangswahrscheinlichkeiten durch 8 Dimensionen:\n\
  \n| Symbol | Dimension | Frage |\n|--------|-----------|-------|\n| Ψ_I | **Institutional**\
  \ | Welche Regeln, Gesetze, Defaults gelten? |\n| Ψ_S | **Social** | Wer ist dabei?\
  \ Welche sozialen Normen? |\n| Ψ_C | **Cognitive** | Müde? Gestresst? Aufmerksam?\
  \ Motiviert? |\n| Ψ_K | **Cultural** | Welche Werte, Traditionen, Religion? |\n\
  | Ψ_E | **Economic** | Wieviel Budget, Zeit, Energie verfügbar? |\n| Ψ_T | **Temporal**\
  \ | Wann? Zeitdruck? Welche Lebensphase? |\n| Ψ_M | **Material** | Welche Technologie,\
  \ Infrastruktur, Objekte? |\n| Ψ_F | **Physical** | Wo physisch? Zuhause, Büro,\
  \ öffentlich? |\n\n## Was macht das BCM besonders?\n\n### 1. **Kontextabhängige\
  \ Parameter**\nTraditionelle Modelle verwenden fixe Parameter (z.B. λ = 2.25 für\
  \ Loss Aversion). Das BCM verwendet **kontextabhängige Parameter**:\n\n```\nTraditionell:\
  \ λ = 2.25 (immer konstant)\nBCM: λ(Ψ, 10C) = variabel\n\nBeispiel:\n- Welfare mit\
  \ Stigma: λ = 2.5 (höher)\n- Workplace mit Peers: λ = 1.8 (niedriger)\n```\n\n###\
  \ 2. **BCM2 Kontextdatenbank**\nDas BCM wird durch eine kuratierte Sammlung von\
  \ Kontextfaktoren operationalisiert:\n\n| Ebene | Faktoren | Beschreibung |\n|-------|----------|--------------|\n\
  | **MACRO** | 404 | Landesspezifische Kontextvektoren (CH/AT/DE) |\n| **INDIVIDUAL**\
  \ | 48 | Alter, Geschlecht, Bildung, Persönlichkeit |\n| **META** | 42 | Framing,\
  \ Defaults, Timing, Kanäle |\n\n### 3. **FEPSDE Matrix — 6 Nutzendimensionen**\n\
  Das BCM berücksichtigt, dass Menschen nicht nur finanziell motiviert sind:\n\n|\
  \ Dimension | Inhalt |\n|-----------|--------|\n| **F**inancial | Einkommen, Vermögen,\
  \ ökonomische Sicherheit |\n| **E**motional | Wohlbefinden, Zufriedenheit, Sinn\
  \ |\n| **P**hysical | Gesundheit, Energie, Langlebigkeit |\n| **S**ocial | Beziehungen,\
  \ Zugehörigkeit, Vertrauen |\n| **D**igital | Konnektivität, Zugang, Datenrechte\
  \ |\n| **E**cological | Umwelt, Nachhaltigkeit |\n\n## Einordnung im EBF\n\n```\n\
  EBF (Evidence-Based Framework)\n │\n ├── BCM (Behavioral Change Model) ← Hier\n\
  \ ├── 10C CORE Framework\n ├── 8 Ψ-Dimensionen (Kontext)\n ├── FEPSDE (6 Utility-Dimensionen)\n\
  \ ├── Parameter Registry (64+ Parameter)\n └── Theory Catalog (153 Theorien)\n```\n\
  \n| Konzept | Typ | Beschreibung |\n|---------|-----|--------------|\n| **EBF**\
  \ | Framework | Das übergeordnete wissenschaftliche Framework |\n| **BCM** | Modell\
  \ | Behavioral Change Model — erklärt Verhaltenswandel |\n| **BEATRIX** | Software\
  \ | Web-Plattform die EBF + BCM implementiert |\n\n## Anwendungsbereiche\n\nDas\
  \ BCM wird eingesetzt für:\n- **Decision Architecture** — Gestaltung von Entscheidungssituationen\n\
  - **Intervention Design** — Entwicklung verhaltensbasierter Massnahmen\n- **Policy\
  \ Design** — Evidenzbasierte Politikgestaltung\n- **Change Management** — Organisationale\
  \ Transformation\n\n**Kernprinzip:** Die Variation der Parameter ist nicht Noise\
  \ — sie ist das Signal! Kontext macht den Unterschied."
