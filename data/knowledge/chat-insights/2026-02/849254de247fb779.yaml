question: Erkläre Complementarity
answer: "# Complementarity im BCM Framework\n\n**Complementarity** ist ein Kernkonzept\
  \ des BCM (Behavioral Change Model), das mathematisch erklärt, warum Verhaltensinterventionen\
  \ nur dann erfolgreich sind, wenn **alle relevanten Dimensionen optimal aufeinander\
  \ abgestimmt** sind.\n\n## Das Complementarity-Prinzip\n\nComplementarity besagt:\
  \ **Der Erfolg einer Intervention ist nicht die Summe ihrer Einzelkomponenten, sondern\
  \ das Produkt ihrer Wechselwirkungen.**\n\n### Mathematische Darstellung\n\n```\n\
  Erfolg ≠ Σ(Einzelkomponenten)    [Additive Logik - FALSCH]\nErfolg = ∏(Komplementäre\
  \ Faktoren)    [Multiplikative Logik - RICHTIG]\n```\n\n**Kritische Implikation:**\
  \ Wenn auch nur **eine** Komplementärdimension den Wert 0 hat, wird das Gesamtergebnis\
  \ 0 - unabhängig davon, wie gut alle anderen Dimensionen sind.\n\n## Die 10C Complementarity\
  \ Dimensions\n\nDas BCM operationalisiert Complementarity über **10 Kerndimensionen**:\n\
  \n| Dimension | Bedeutung | Beispiel |\n|-----------|-----------|----------|\n|\
  \ **WHO** | Zielgruppe, Stakeholder | Falsche Zielgruppe = Intervention scheitert\
  \ |\n| **WHAT** | Inhalt, Botschaft | Unklare Botschaft = keine Verhaltensänderung\
  \ |\n| **HOW** | Methode, Mechanismus | Falscher Kanal = Message kommt nicht an\
  \ |\n| **WHEN** | Timing, Sequenzierung | Schlechtes Timing = Widerstand |\n| **WHERE**\
  \ | Ort, Kontext | Falscher Kontext = reduzierte Wirkung |\n| **AWARE** | Bewusstsein,\
  \ Aufmerksamkeit | Keine Aufmerksamkeit = keine Wirkung |\n| **READY** | Bereitschaft,\
  \ Motivation | Fehlende Bereitschaft = Ablehnung |\n| **STAGE** | Entwicklungsphase\
  \ | Falsche Entwicklungsphase = Überforderung |\n| **HIERARCHY** | Machtstrukturen,\
  \ Einfluss | Fehlende Autorität = Umsetzungsprobleme |\n| **EIT** | Entry/Exit Costs\
  \ | Zu hohe Barrieren = keine Adoption |\n\n## Praktisches Beispiel: Mobilitätswende\n\
  \n### Fehlgeschlagene Intervention (Complementarity verletzt)\n```\nWHO: ✓ Richtige\
  \ Zielgruppe (Pendler)\nWHAT: ✓ Klare ÖV-Botschaft  \nHOW: ✓ Multi-Kanal Kommunikation\n\
  WHEN: ✗ Launch während Bahnstreik (0.1)\nWHERE: ✓ Städtischer Kontext\n...\n\nErgebnis\
  \ = 0.9 × 0.8 × 0.9 × 0.1 × 0.9 × ... ≈ 0.07 (7% Erfolg)\n```\n\n### Erfolgreiche\
  \ Intervention (Complementarity optimiert)\n```\nWHO: ✓ Segmentierte Ansprache nach\
  \ Mobilitätstypen (0.9)\nWHAT: ✓ Konkreter Nutzen kommuniziert (0.8)\nHOW: ✓ Mehrkanalstrategie\
  \ mit Testangeboten (0.8)\nWHEN: ✓ Launch nach Benzinpreisanstieg (0.9)\nWHERE:\
  \ ✓ Gut erschlossene Gebiete priorisiert (0.8)\n...\n\nErgebnis = 0.9 × 0.8 × 0.8\
  \ × 0.9 × 0.8 × ... ≈ 0.37 (37% Erfolg)\n```\n\n## Complementarity vs. Kompensation\n\
  \n**Klassisches Denken:** \"Schwächen können durch Stärken kompensiert werden\"\n\
  ```\nSchlechtes Timing (-20%) + Excellente Kampagne (+40%) = +20% Nettoeffekt\n\
  ```\n\n**BCM Complementarity:** \"Schwächen multiplizieren sich zu Systemversagen\"\
  \n```\nSchlechtes Timing (0.3) × Excellente Kampagne (0.9) = 0.27 (73% Verlust)\n\
  ```\n\n## Warum Complementarity revolutionär ist\n\n**Traditionelle Intervention\
  \ Design:**\n- Fokus auf einzelne \"Best Practices\"\n- Additive Optimierungslogik\
  \  \n- Isolierte Komponentenbetrachtung\n\n**BCM Complementarity Approach:**\n-\
  \ Systemische Wechselwirkungsanalyse\n- Multiplikative Erfolgsdeterminanten\n- Holistische\
  \ Intervention Architecture\n\n**Resultat:** Drastisch höhere Erfolgswahrscheinlichkeiten\
  \ bei verhaltensbasierten Interventionen, weil systematische Schwachstellen verhindert\
  \ werden, bevor sie das Gesamtsystem zum Scheitern bringen.\n\nComplementarity ist\
  \ damit das mathematische Fundament für **\"warum manche Interventionen funktionieren\
  \ und andere nicht\"** - und wie man systematisch dafür sorgt, dass sie funktionieren."
