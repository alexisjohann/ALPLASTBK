question: 🧠 Ausgangslage erfassen
answer: 'Hallo! Ich bin BEATRIX und helfe dir dabei, die Ausgangslage systematisch
  zu erfassen.


  Um eine fundierte Analyse erstellen zu können, benötige ich folgende Informationen:


  **GRUNDLAGEN:**

  - Welcher Kunde steht im Fokus?

  - Worum geht es konkret? (Projekt, Initiative, Herausforderung)

  - In welchem Kontext bewegen wir uns? (Markt, Organisation, Stakeholder)


  **SITUATION:**

  - Was ist die aktuelle Lage/Problemstellung?

  - Welche Herausforderungen bestehen?

  - Was soll erreicht werden?


  **KONTEXT:**

  - Relevante Stakeholder und deren Positionen?

  - Marktumfeld und regulatorische Faktoren?

  - Bisherige Maßnahmen oder Initiativen?


  Mit welchem Kunden und welcher Situation soll ich beginnen?'
