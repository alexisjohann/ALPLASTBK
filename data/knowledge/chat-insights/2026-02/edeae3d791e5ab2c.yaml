question: "Nach weiteren 4 Jahren Betriebszugehörigkeit kommen zusätzlich EURO 30.000.-\
  \ brutto zur Auszahlung, unter der Voraussetzung, dass die Auszahlung der ersten\
  \ EURO 15.000 aufgeschoben worden ist.\nWird das Arbeitsverhältnis vor Ablauf der\
  \ drei Jahre aufgelöst, besteht kein Anspruch auf die ersten EUR 15.000 (insbesondere\
  \ auch kein zeitaliquoter Anspruch). \n\n\n\n\nhier noch Wird das Arbeitsverhältnis\
  \ nach Ablauf von 3 Jahren, jedoch vor Ablauf von der 7 Jahren aufgelöst, besteht\
  \ Anspruch auf die ersten EUR 15.000, aber nicht auf die weiteren EUR 30.000. einlfleissen\
  \ lassen"
answer: "Hier ist die überarbeitete und komplette Regelung für die Mitarbeitendenbindung:\n\
  \n## **VOLLSTÄNDIGE REGELUNG - MITARBEITENDENBINDUNG**\n\n**Neu eintretenden Mitarbeitenden\
  \ auf Ebene Junior Consultant und Consultant wird ein Betrag von EUR 15.000 brutto\
  \ zugeteilt, welcher nach dreijähriger Betriebszugehörigkeit ausbezahlt wird, sofern\
  \ nicht einvernehmlich vereinbart wird, dass die Auszahlung erst nach 7 Jahren erfolgen\
  \ soll.**\n\n**Nach weiteren 4 Jahren Betriebszugehörigkeit (insgesamt 7 Jahre)\
  \ kommen zusätzlich EUR 30.000 brutto zur Auszahlung, unter der Voraussetzung, dass\
  \ die Auszahlung der ersten EUR 15.000 aufgeschoben worden ist.**\n\n## **\U0001F50D\
  \ AUSZAHLUNGSLOGIK:**\n\n### **Variante A: Standard (3 Jahre)**\n- **Nach 3 Jahren:**\
  \ EUR 15.000 ausbezahlt\n- **Nach 7 Jahren:** Kein weiterer Anspruch\n\n### **Variante\
  \ B: Aufschub (7 Jahre)**\n- **Nach 3 Jahren:** Keine Auszahlung (aufgeschoben)\n\
  - **Nach 7 Jahren:** EUR 45.000 total (15.000 + 30.000)\n\n## **⚖️ KÜNDIGUNGSREGELUNGEN:**\n\
  \n1. **Kündigung vor 3 Jahren:**\n   - **Kein Anspruch** auf EUR 15.000 (auch nicht\
  \ anteilig)\n\n2. **Kündigung nach 3 Jahren, vor 7 Jahren:**\n   - **Anspruch auf\
  \ EUR 15.000** (auch bei Aufschub-Variante)\n   - **Kein Anspruch** auf die weiteren\
  \ EUR 30.000\n\n3. **Nach 7 Jahren:**\n   - Voller Anspruch je nach gewählter Variante\n\
  \n## **\U0001F4DD ERGÄNZUNG BEHALTEFRIST:**\nDie \"6 Monate Behaltefrist\" sollte\
  \ noch präzisiert werden. Mögliche Integration:\n*\"Die Auszahlung erfolgt nur,\
  \ wenn das Arbeitsverhältnis zum Auszahlungszeitpunkt noch mindestens 6 Monate bestehen\
  \ wird.\"*\n\nIst diese Struktur so korrekt? Soll ich die Behaltefrist-Formulierung\
  \ noch anpassen?"
