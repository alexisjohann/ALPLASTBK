  \ oder Kundencode)\n- Falls es ein neuer Kunde ist, brauche ich auch den Ansprechpartner\
  \ und Kontaktdaten\n\n**Um welche Opportunity geht es?** \n- Was für ein Projekt/Auftrag\
  \ steht an?\n- Beratung, Workshop, Studie, Training, etc.?\n\n**Geschätztes Projektvolumen?**\n\
  - Ungefährer Wert in der entsprechenden Währung\n\nLeg einfach los - ich erkenne\
  \ automatisch bekannte Kunden und fülle die Daten entsprechend vor!"
