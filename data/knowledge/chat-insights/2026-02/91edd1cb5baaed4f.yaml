question: erklär mir mal das BCM
answer: "Das **Behavioral Change Model (BCM)** ist das operative Herzstück von FehrAdvice\
  \ & Partners. Lass mich es dir strukturiert erklären:\n\n## Was ist das BCM?\n\n\
  Das BCM ist ein **Beratungs-Tool mit wissenschaftlichem Fundament** - kein akademisches\
  \ Framework aus dem Elfenbeinturm, sondern ein pragmatisches Werkzeug, das seit\
  \ 2010 in der echten Beratungspraxis entstanden und über hunderte Mandate verfeinert\
  \ wurde.\n\n## Die Grundidee: Das 10C Framework\n\nDas BCM **IST** das 10C Framework\
  \ - zehn Kern-Dimensionen, die zusammen das vollständige Bild einer Verhaltensänderungssituation\
  \ ergeben:\n\n**Die 10 C's:**\n- **WHEN**: Kontext (8 Dimensionen der Situation)\n\
  - **WHO**: Zielsegment \n- **WHAT**: Verhaltensänderungsziel\n- **AWARE**: Awareness\
  \ des Segments\n- **READY**: Willingness/Handlungsbereitschaft\n- Plus 5 weitere\
  \ Dimensionen\n\n## Der operative Kern: BCM Diagnose\n\nDas Herzstück ist eine konkrete\
  \ diagnostische Methode:\n\n**INPUT:**\n- Kontext der Situation (WHEN)\n- Zielsegment\
  \ (WHO) \n- Verhaltensänderungsziel (WHAT)\n\n**SCHÄTZUNG:**\n- Wie bewusst ist\
  \ das Problem? (AWARE)\n- Wie handlungsbereit sind die Leute? (READY)\n\n**OUTPUT:**\n\
  - 2D-Matrix: Awareness × Willingness\n- Daraus: Wahrscheinlichkeit und Fristigkeit\
  \ der Verhaltensänderung\n\n## Die 4-Level Schätzmethodik\n\nBesonders raffiniert:\
  \ Das BCM nutzt einen 4-stufigen Bayesian-Update-Prozess:\n\n1. **Grid-basierte\
  \ Einschätzung**: Beraterische Erfahrung + strukturiertes Raster\n2. **Management-Beliefs**:\
  \ Korrektur durch interne Einschätzungen\n3. **Empirische Schätzung**: Experimente\
  \ liefern Daten\n4. **Iteration & Lernen**: Kontinuierliche Verfeinerung\n\n## BCM\
  \ als Prediction Engine\n\nDas BCM war mehr als nur Diagnose - es war eine **Interventions-Maschine**:\
  \ Aus der Position in der Awareness/Willingness-Matrix wurde abgeleitet, welcher\
  \ Mix aus Nudges, Kommunikation und strukturellen Massnahmen optimal ist.\n\n##\
  \ Die Grenzen des manuellen BCM\n\nDas Problem: **Kognitive Kapazitätsgrenze**.\
  \ Auch die besten Berater können nicht gleichzeitig alle Kontexte, Verhaltensneigungen\
  \ und Wechselwirkungen überblicken.\n\n**Hier kommt BEATRIX ins Spiel** - die digitale\
  \ Plattform, die das manuelle BCM skaliert und die Kapazitätsgrenzen überwindet.\n\
  \nDas BCM ist also der bewährte \"Motorblock\" der Verhaltensberatung - und BEATRIX\
  \ macht ihn digital verfügbar."
