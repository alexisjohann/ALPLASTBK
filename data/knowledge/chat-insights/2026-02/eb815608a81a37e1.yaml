question: und wie siehst die situation - wenn corinna für fap 50#% arbeitet und die  ausschreibungen
  macht
answer: "# CORINNA 50% + AUSSCHREIBUNGEN: Game Changer Analyse\n\n## NEUE VARIANTE:\
  \ CORINNA ALS BUSINESS DEVELOPMENT\n\n### Szenario:\n- **Corinna 50%** (CHF 30.000\
  \ statt 60.000)\n- **Neue Rolle:** Ausschreibungen akquirieren\n- **Strategischer\
  \ Pivot:** Von Kosten zu Umsatz\n\n---\n\n## AUS FAP's SICHT\n\n### \U0001F3AF **POTENTIAL:\
  \ Business Development Boost**\n\n**Vorteile:**\n- ✅ **50% Kosteneinsparung** sofort\
  \ (CHF 30k)\n- ✅ **Umsatz-Hebel:** Corinna generiert neue Projekte\n- ✅ **Spezialisierung:**\
  \ Sie kann sich voll auf Akquise fokussieren\n- ✅ **ROI-Potential:** 1-2 gewonnene\
  \ Projekte = ihre Kosten mehr als gedeckt\n\n**Risiken:**\n- ❌ **Ausschreibungen\
  \ brauchen Zeit** - keine sofortige Wirkung\n- ❌ **Erfolg nicht garantiert** - was\
  \ wenn sie nichts gewinnt?\n- ❌ **Noch immer CHF 30k Fixkosten** in der Krise\n\n\
  ### **Erfolgsfaktor:** Corinnas Akquise-Fähigkeiten\n- Ist sie gut im Netzwerken?\n\
  - Kennt sie den Markt?\n- Hat sie Erfahrung mit Ausschreibungen?\n\n---\n\n## AUS\
  \ CORINNAS SICHT\n\n### \U0001F3AF **ATTRAKTIVE NEUAUSRICHTUNG**\n\n**Vorteile:**\n\
  - ✅ **Neue Kompetenz:** Business Development erweitert ihr Profil\n- ✅ **Erfolgsbeteiligung\
  \ möglich:** Bonus bei gewonnenen Projekten\n- ✅ **50% Zeit für eigene Projekte**\
  \ - perfekt für Pension-Vorbereitung\n- ✅ **Weniger Stress:** 50% ist entspannter\
  \ als 100%\n- ✅ **Impact:** Sie rettet FAP durch neue Aufträge\n\n**Risiken:**\n\
  - ❌ **Hälfte Gehalt** - CHF 30k ist wenig\n- ❌ **Erfolgsdruck:** Was wenn sie keine\
  \ Projekte gewinnt?\n- ❌ **Neues Terrain:** Akquise ist anders als fachliche Arbeit\n\
  \n---\n\n## \U0001F4A1 **STRATEGISCHE BEWERTUNG**\n\n### **WANN MACHT DAS SINN?**\n\
  \n**JA, wenn:**\n1. **Corinna hat Akquise-Talent** oder Lust darauf\n2. **FAP hat\
  \ 6-12 Monate Überlebenszeit** (Ausschreibungen brauchen Zeit)\n3. **Erfolgsbeteiligung\
  \ vereinbart** (z.B. 5-10% der gewonnenen Projekte)\n4. **Klare KPIs:** X Ausschreibungen\
  \ pro Monat, Y Meetings, Z Angebote\n\n**NEIN, wenn:**\n1. **Akute Liquiditätskrise**\
  \ - keine Zeit für langsame Akquise\n2. **Corinna ist keine Verkäuferin** \n3. **Markt\
  \ ist tot** - auch beste Akquise hilft nicht\n\n---\n\n## \U0001F3AF **EMPFEHLUNG:\
  \ HYBRID-MODELL**\n\n### **\"CORINNA 50% + ERFOLGSBETEILIGUNG + PROBEPHASE\"**\n\
  \n**Struktur:**\n- **Grundgehalt:** CHF 30.000 (50%)\n- **Bonus:** 5-10% aller gewonnenen\
  \ Projekte\n- **Probephase:** 6 Monate - dann Evaluation\n- **Plan B Klausel:**\
  \ Bei Misserfolg einvernehmliche Trennung\n\n**Ziele definieren:**\n- **Monat 1-2:**\
  \ 10 Ausschreibungen identifiziert\n- **Monat 3-4:** 5 Angebote eingereicht  \n\
  - **Monat 5-6:** 1-2 Projekte gewonnen\n\n### **WIN-WIN Potential:**\n- **FAP:**\
  \ Kostenreduktion + Umsatz-Chance\n- **Corinna:** Neue Skills + variable Vergütung\
  \ + flexible Arbeitszeit\n\n**Das könnte tatsächlich der Weg aus der Krise sein\
  \ - aber nur wenn Corinna Sales-Talent hat!**\n\n**Kennst du ihre Stärken in Richtung\
  \ Akquise/Verkauf?**"
