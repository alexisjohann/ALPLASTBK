question: 'Fasse das Paper "Prospect Theory: An Analysis of Decision under Risk" zusammen:
  Was sind die Kernaussagen, Methodik und wichtigsten Erkenntnisse?'
answer: "# Prospect Theory: Das wegweisende Paper von Kahneman & Tversky (1979)\n\n\
  ## **Kernaussagen**\n\nDas Paper revolutioniert unser Verständnis von Entscheidungen\
  \ unter Risiko durch drei zentrale Aussagen:\n\n1. **Expected Utility Theory ist\
  \ unzureichend**: Die traditionelle Erwartungsnutzentheorie versagt als deskriptives\
  \ Modell menschlichen Entscheidungsverhaltens\n2. **Menschen verhalten sich systematisch\
  \ \"irrational\"**: Entscheidungen folgen vorhersagbaren Mustern, die den Axiomen\
  \ der klassischen Theorie widersprechen\n3. **Prospect Theory als Alternative**:\
  \ Ein neues Modell, das diese systematischen \"Abweichungen\" als normale menschliche\
  \ Entscheidungsmuster erklärt\n\n## **Methodik**\n\n**Experimenteller Ansatz:**\n\
  - Hypothetische Wahlprobleme mit israelischen Studenten und Universitätsmitarbeitern\n\
  - Vergleichsstudien in Stockholm und Michigan mit identischen Ergebnissen\n- Systematische\
  \ Variation von Wahrscheinlichkeiten und Auszahlungen\n- Anonyme Befragung mit verschiedenen\
  \ Fragebögen-Versionen\n\n**Beispiel eines typischen Problems:**\n- Option A: 50%\
  \ Chance auf 1.000 Schekel, 50% Chance auf nichts\n- Option B: 450 Schekel sicher\n\
  \n## **Wichtigste Erkenntnisse**\n\n### **1. Der Certainty Effect (Sicherheitseffekt)**\n\
  Menschen gewichten sichere Ergebnisse überproportional stark gegenüber wahrscheinlichen\
  \ Ergebnissen - sie \"underweight outcomes that are merely probable in comparison\
  \ with outcomes that are obtained with certainty.\"\n\n### **2. Der Isolation Effect**\n\
  Menschen ignorieren gemeinsame Komponenten von Alternativen und fokussieren nur\
  \ auf die Unterschiede - sie \"generally discard components that are shared by all\
  \ prospects under consideration.\"\n\n### **3. Die Wertfunktion (Value Function)**\n\
  **Revolutionäre Eigenschaften:**\n- **Referenzpunkt-abhängig**: Bewertet Gewinne\
  \ und Verluste, nicht absolute Vermögensstände\n- **Konkav bei Gewinnen**: Abnehmender\
  \ Grenznutzen (risikoavers)\n- **Konvex bei Verlusten**: Zunehmende Risikobereitschaft\n\
  - **Loss Aversion**: \"Generally steeper for losses than for gains\" - Verluste\
  \ schmerzen mehr als gleich große Gewinne erfreuen\n\n### **4. Decision Weights\
  \ statt Wahrscheinlichkeiten**\n- **Niedrige Wahrscheinlichkeiten werden übergewichtet**\
  \ - erklärt sowohl Glücksspiel als auch Versicherungsverhalten\n- **Hohe Wahrscheinlichkeiten\
  \ werden untergewichtet**\n- \"Decision weights are generally lower than the corresponding\
  \ probabilities, except in the range of low probabilities\"\n\n## **Praktische Implikationen**\n\
  \nDas Paper legte den Grundstein für:\n- **Behavioral Economics** als eigenständige\
  \ Disziplin\n- **Nudging und Choice Architecture** - das Verständnis systematischer\
  \ Entscheidungsmuster\n- **Verhaltensbasierte Finanztheorie** - Erklärung \"irrationaler\"\
  \ Marktphänomene\n\n## **Fazit für die Praxis**\n\nDie Prospect Theory zeigt, dass\
  \ menschliche Entscheidungen nicht \"irrational\" sind, sondern systematischen,\
  \ vorhersagbaren Mustern folgen. Diese Erkenntnisse sind fundamental für:\n\n- **Decision\
  \ Architecture** bei FehrAdvice\n- **Evidence-Based Framework** Anwendungen  \n\
  - **Behavioral Interventions** in der Praxis\n\n*Das Paper ist heute eine der meistzitierten\
  \ Arbeiten in den Wirtschafts- und Sozialwissenschaften und bildet die wissenschaftliche\
  \ Basis für moderne verhaltensökonomische Ansätze.*"
