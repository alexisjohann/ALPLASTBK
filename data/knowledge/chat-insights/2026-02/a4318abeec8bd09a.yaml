answer: "# BCM-Parameter Schätzung: RBI CEO-Transition Erwartungsmanagement\n\n##\
  \ Willingness (W)\n\n- **Aktueller Wert:** 0.85\n- **Gate Condition:** W ≥ θ_W (0.6)?\
  \ **Ja**\n\n**Begründung:** Die Mitarbeiterschaft zeigt außergewöhnlich hohe Motivation\
  \ durch die \"ALLES wird sich ändern\"-Erwartung aus den Discovery Interviews. Der\
  \ CEO-Wechsel erzeugt starke intrinsische Motivation für Veränderung. Gleichzeitig\
  \ besteht bei Aleksandra und dem Change Management hohe Willingness, das kritische\
  \ Momentum strategisch zu nutzen und realistische Erwartungen zu setzen.\n\n## Awareness (AWARE)\
  \ (A_mod)\n\n- **Aktueller Wert:** 0.45\n- **Subkomponenten:**\n  - Skills: 0.6\
  \ (Change Management Skills bei Aleksandra vorhanden)\n  - Knowledge: 0.4 (Erwartungsmanagement-Expertise\
  \ begrenzt)\n  - Resources: 0.35 (Zeitdruck bis 1. Juli, komplexe Stakeholder-Konstellation)\n\
  \n**Begründung:** Moderate Handlungsfähigkeit durch begrenzte Zeit bis zum CEO-Start\
  \ und die Komplexität des Erwartungsmanagements auf Multi-Stakeholder-Ebene. Aleksandra\
  \ verfügt über grundlegende Change-Skills, aber spezifisches Erwartungsmanagement-Know-how\
  \ ist limitiert. Ressourcenknappheit durch enge Zeitfenster und parallele Onboarding-Prozesse.\n\
  \n## Context (Ψ)\n\n- **Aktueller Wert:** 0.60\n- **Externe Constraints:** Moderate\
  \ (Bankregulierung, bestehende Strukturen, CEO-Onboarding-Parallel-Prozesse)\n-\
  \ **Facilitating Conditions:** Gemischt (CEO-Honeymoon-Effekt positiv, aber organisationale\
  \ Trägheit als Hindernis)\n\n**Begründung:** Gemischte strukturelle Bedingungen\
  \ in der RBI-Transition. Der neue CEO bietet ein zeitlich begrenztes Window of Opportunity,\
  \ aber etablierte Bankstrukturen und regulatorische Anforderungen schaffen Constraints.\
  \ Die \"ALLES ändern\"-Erwartung kann sowohl als Facilitator (Momentum) als auch\
  \ als Constraint (unrealistische Erwartungen) wirken.\n\n## BCM Gesamtschätzung\n\
  \n| Parameter | Wert | Gate | Interpretation |\n|-----------|------|------|----------------|\n\
  | **W** | 0.85 | ✓ | Sehr hohe Veränderungsmotivation |\n| **A_mod** | 0.45 | ✗\
  \ | Begrenzte Handlungsfähigkeit (kritisch) |\n| **C** | 0.60 | ✓ | Moderate strukturelle\
  \ Unterstützung |\n| **P(B)** | 0.23 | — | Niedrige Verhaltenswahrscheinlichkeit\
  \ |\n\n**BCM-Formel:** P(B) = W × A_mod × C = 0.85 × 0.45 × 0.60 = 0.23\n\n**Interpretation:**\
  \ Mit nur 23% Verhaltenswahrscheinlichkeit besteht trotz sehr hoher Motivation ein\
  \ erhebliches Umsetzungsrisiko. Der kritische Engpass liegt bei der Awareness (0.45\
  \ < θ_A), insbesondere bei spezifischem Erwartungsmanagement-Know-how und Ressourcen.\
  \ **Handlungsempfehlung:** Sofortige Intervention zur Stärkung der Awareness-Komponente\
  \ durch externes Erwartungsmanagement-Consulting und/oder intensive Skill-Building\
  \ für Aleksandra vor dem 1. Juli, um das hohe Willingness-Momentum nicht zu verschwenden."
