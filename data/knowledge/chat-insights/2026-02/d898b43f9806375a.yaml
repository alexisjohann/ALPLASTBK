question: bitte eröffne eine Lead
answer: 'Gerne eröffne ich einen neuen Lead für Sie! Ich benötige folgende Informationen:


  ## **Mindest-Angaben für Lead-Erfassung:**


  • **Kunde**: Name des Unternehmens (z.B. Helvetia, UBS, etc.)

  • **Kontaktperson**: Name und Rolle der Ansprechpartner

  • **Opportunity**: Was ist das konkrete Projekt/die Anfrage?

  • **Geschätztes Volumen**: Budget in CHF/EUR

  • **Wahrscheinlichkeit**: Ihre Einschätzung der Abschlusswahrscheinlichkeit in %


  ## **Zusätzliche Details (optional):**

  - E-Mail-Adresse des Kontakts

  - Nächste geplante Schritte

  - Timing/Deadlines

  - Projektart (Workshop, Beratung, Training)


  **Beispiel-Format:**

  "Neuer Lead: [Kundenname], Budget [Betrag] CHF, [X]% Abschlusswahrscheinlichkeit.
  Kontakt [Name], [Rolle]. Opportunity: [Projektbeschreibung]"


  Teilen Sie mir einfach die verfügbaren Informationen mit - ich strukturiere alles
  automatisch und generiere das passende Lead-Kürzel! 🎯'
