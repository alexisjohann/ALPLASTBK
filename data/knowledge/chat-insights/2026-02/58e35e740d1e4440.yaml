question: Was ist das BCM?
answer: "## Das Behavioral Change Model (BCM)\n\nDas **Behavioral Change Model\
  \ (BCM)** ist das Herzstück des Evidence-Based Framework (EBF) von FehrAdvice &\
  \ Partners AG. Es handelt sich um ein wissenschaftlich fundiertes, probabilistisches\
  \ Modell zur **Vorhersage und Gestaltung von Verhaltensänderungen**.\n\n### Die\
  \ Kernformel\n\nDas BCM basiert auf einer mathematischen Formalisierung:\n\n```\n\
  BCM = 10C Framework (Willingness, Awareness, Kontext, Zielpopulation, Verhaltensänderungsziel)\n```\n\n### Die 10C Dimensionen des BCM\
  \ im Detail\n\n**1. Willingness (W) - \"Wollen\"**\n- Die intrinsische Motivation\
  \ und Bereitschaft zur Veränderung\n- Fungiert als **Gate Condition**: Ohne ausreichende\
  \ Willingness findet keine Verhaltensänderung statt\n- Umfasst Einstellungen, Werte\
  \ und emotionale Bereitschaft\n\n**2. AWARE (Awareness) - \"Können\"** \n- Die verfügbaren\
  \ Fähigkeiten, Wissen und Ressourcen zur Umsetzung\n- Beinhaltet Skills, Knowledge\
  \ und materielle/zeitliche Mittel\n- Bestimmt die praktische Umsetzbarkeit\n\n**3.\
  \ Context (Ψ) - \"Dürfen/Rahmenbedingungen\"**\n- 8 Kontextdimensionen: Institutional (Ψ_I),\
  \ Social (Ψ_S), Cognitive (Ψ_C), Cultural (Ψ_K), Economic (Ψ_E), Temporal (Ψ_T),\
  \ Material (Ψ_M), Physical (Ψ_F)\n- Moduliert\
  \ alle Übergangswahrscheinlichkeiten und kann Verhalten ermöglichen oder verhindern\n\
  \n### Wissenschaftliche Fundierung\n\nDas BCM basiert auf **10 Core Axiomen** und\
  \ integriert das **10C Framework** - zehn komplementäre Dimensionen (WHO, WHAT,\
  \ HOW, WHEN, WHERE, AWARE, READY, STAGE, HIERARCHY, EIT), die gemeinsam das vollständige\
  \ Bild einer Verhaltensänderungssituation erfassen.\n\nZusätzlich werden **6 Nutzendimensionen**\
  \ (FEPSDE Matrix) analysiert:\n- **F**inancial (Einkommen, Vermögen, ökonomische Sicherheit),\
  \ **E**motional (Wohlbefinden, Zufriedenheit, Sinn),\
  \ **P**hysical (Gesundheit, Energie, Langlebigkeit),\
  \ **S**ocial (Beziehungen, Zugehörigkeit, Vertrauen),\
  \ **D**igital (Konnektivität, Zugang, Datenrechte),\
  \ **E**cological (Umwelt, Nachhaltigkeit)\n\n### Was macht das BCM besonders?\n\
  \n1. **Probabilistisch**: Liefert Wahrscheinlichkeiten statt deterministischer Vorhersagen\n\
  2. **Evidenzbasiert**: Jede Komponente ist empirisch messbar und validierbar  \n\
  3. **Kontextsensitiv**: Berücksichtigt situative und kulturelle Faktoren\n4. **Segmentspezifisch**:\
  \ Parameter variieren je nach Zielgruppe\n5. **Zeitdynamisch**: Berücksichtigt Lerneffekte\
  \ und Feedback-Schleifen\n\n### Praktische Anwendung\n\nDas BCM ermöglicht es, komplexe\
  \ Verhaltensänderungen systematisch zu analysieren und **gezielte, wirksame Interventionen**\
  \ zu entwickeln - sei es in der Decision Architecture, im Change Management oder\
  \ in der evidenzbasierten Politikgestaltung.\n\nHaben Sie eine spezifische Anwendung\
  \ oder Situation, für die Sie das BCM einsetzen möchten?"
