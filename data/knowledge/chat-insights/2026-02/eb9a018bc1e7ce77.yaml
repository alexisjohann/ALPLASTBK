question: was ist das BCM
answer: "## Das Behavioral Change Model (BCM)\n\nDas **Behavioral Change Model (BCM)**\
  \ ist das Herzstück des Evidence-Based Framework (EBF) von FehrAdvice & Partners\
  \ AG. Es handelt sich um ein wissenschaftlich fundiertes, probabilistisches Modell\
  \ zur **Vorhersage und Gestaltung von Verhaltensänderungen**.\n\n### Die Kernformel\n\
  \nDas BCM basiert auf einer mathematischen Formalisierung:\n\n```\nP(Verhaltensänderung)\
  \ = Willingness × Ability × Context\n```\n\nAlle drei Faktoren müssen vorhanden\
  \ sein — fehlt einer, findet keine Verhaltensänderung statt.\n\n### Die drei Kernkomponenten\n\
  \n**1. Willingness (W) — \"Wollen\"**\n- Die intrinsische Motivation und Bereitschaft\
  \ zur Veränderung\n- Fungiert als **Gate Condition**: Ohne ausreichende Willingness\
  \ findet keine Verhaltensänderung statt\n- Umfasst Einstellungen, Werte und emotionale\
  \ Bereitschaft\n- Basiert auf der CORE-READY Dimension des 10C Framework\n\n**2.\
  \ Ability (A) — \"Können\"**\n- Fähigkeiten, Wissen und Ressourcen zur Umsetzung\n\
  - Beinhaltet Skills (Fähigkeiten), Knowledge (Wissen) und verfügbare Mittel (Zeit,\
  \ Geld)\n- Basiert auf der CORE-AWARE Dimension des 10C Framework\n\n**3. Context\
  \ (Ψ) — \"Dürfen/Rahmenbedingungen\"**\n\nDer Kontext moduliert alle Übergangswahrscheinlichkeiten\
  \ durch 8 Dimensionen:\n\n| Symbol | Dimension | Beschreibung |\n|--------|-----------|-------------|\n\
  | Ψ_I | **Institutional** | Regeln, Gesetze, Defaults |\n| Ψ_S | **Social** | Soziale\
  \ Normen, wer ist dabei |\n| Ψ_C | **Cognitive** | Müdigkeit, Stress, Aufmerksamkeit\
  \ |\n| Ψ_K | **Cultural** | Werte, Traditionen, Religion |\n| Ψ_E | **Economic**\
  \ | Budget, Zeit, verfügbare Energie |\n| Ψ_T | **Temporal** | Zeitpunkt, Zeitdruck,\
  \ Lebensphase |\n| Ψ_M | **Material** | Technologie, Infrastruktur, Objekte |\n\
  | Ψ_F | **Physical** | Physischer Ort (Zuhause, Büro, öffentlich) |\n\n### Was macht\
  \ das BCM besonders?\n\n**Kontextabhängige Parameter:** Im Gegensatz zu traditionellen\
  \ Modellen (z.B. Kahneman) mit fixen Parametern verwendet das BCM variable Parameter\
  \ je nach Kontext:\n\n```\nTraditionell: λ = 2.25 (Loss Aversion ist immer konstant)\n\
  BCM: λ(Ψ, 10C) = variabel je nach Situation\n```\n\n**Die BCM2 Kontextdatenbank**\
  \ operationalisiert das Modell mit über 400 Kontextfaktoren auf drei Ebenen:\n-\
  \ **MACRO** (404 Faktoren): Landesspezifische Kontexte\n- **INDIVIDUAL** (48 Faktoren):\
  \ Persönliche Merkmale  \n- **META** (42 Faktoren): Framing, Defaults, Timing\n\n\
  ### Praktische Anwendung\n\nDas BCM wird eingesetzt in:\n- **Decision Architecture**\
  \ — Gestaltung von Entscheidungssituationen\n- **Intervention Design** — Entwicklung\
  \ verhaltensbasierter Massnahmen\n- **Policy Design** — Evidenzbasierte Politikgestaltung\n\
  - **Change Management** — Organisationale Transformation\n\n**Wichtig:** Das BCM\
  \ ist das *Behavioral Change Model*, nicht \"Competence Model\" — es geht um Verhaltensänderung,\
  \ nicht um Kompetenzen."
