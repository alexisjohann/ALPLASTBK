answer: "## Modell-Report: RBI CEO-Transition Erwartungsmanagement\n\n### 1. Problemstellung\
  \ & Domain-Analyse\n\nDie Raiffeisen Bank International (RBI) steht vor einer kritischen\
  \ organisationalen Transition mit einem neuen CEO am 1. Juli. Die Discovery Interviews\
  \ zeigen eine problematische Erwartungshaltung: Mitarbeitende erwarten, dass der\
  \ neue CEO und sein Team **ALLE** bestehenden Probleme lösen werden. \n\n**Kernproblem:**\
  \ Diese unrealistische Vollveränderungs-Erwartung birgt erhebliche Risiken für die\
  \ CEO-Glaubwürdigkeit und organisationale Performance, da sie praktisch unmöglich\
  \ zu erfüllen ist. Gleichzeitig bietet der CEO-Wechsel ein wertvolles Momentum-Fenster\
  \ für strategische Problemlösung.\n\n**Zielgruppe:** Mitarbeiterschaft RBI, neuer\
  \ CEO und sein Team, Change Management (Aleksandra)\n**Verhaltensänderungsziel:**\
  \ Transformation unrealistischer Erwartungen in proaktive, priorisierte Problem-Bearbeitung\
  \ bei gleichzeitiger Momentum-Nutzung\n\n### 2. 10C Complementarity Mapping\n\n\
  | Dimension | Spezifikation | BCM Relevanz |\n|-----------|---------------|--------------|\n\
  | **WHO** | Mitarbeiterschaft RBI + neuer CEO + sein Team + Aleksandra (Change Management)\
  \ | Hoch |\n| **WHAT** | Erwartungsmanagement: Unrealistische Vollveränderungs-Erwartung\
  \ in proaktive Problem-Priorisierung umlenken | Hoch |\n| **HOW** | Hybride Intervention:\
  \ Momentum nutzen + realistische Erwartungen setzen + strategische Problem-Selektion\
  \ | Hoch |\n| **WHEN** | Kritische Transition-Phase: vor/um 1. Juli (CEO-Start)\
  \ + kontinuierliche Nachsteuerung | Hoch |\n| **WHERE** | RBI Organisationskontext,\
  \ Bank-Umfeld mit hohen Compliance- und Performance-Anforderungen | Mittel |\n|\
  \ **AWARE** | Hoch bewusste \"ALLES wird sich ändern\"-Erwartung bei Mitarbeitern\
  \ (Discovery Interviews) | Hoch |\n| **READY** | Gemischt: Hohe Veränderungsbereitschaft\
  \ durch CEO-Momentum, aber unrealistische Erwartungshaltung | Hoch |\n| **STAGE**\
  \ | Organisationale Transition-Phase: zwischen Altem und Neuem, hohe Veränderungsbereitschaft\
  \ | Hoch |\n| **HIERARCHY** | Multi-Level: CEO-Ebene, sein Team, Mitarbeiterschaft\
  \ - komplexe Erwartungsdynamiken | Hoch |\n| **EIT** | Hoch - Kritische Phase, bei\
  \ Fehlmanagement dauerhafter Schaden für CEO-Glaubwürdigkeit | Hoch |\n\n### 3.\
  \ Ψ-Kontextdimensionen\n\n| Ψ-Dimension | Wert (0–1) | Impact | Rationale |\n|-------------|------------|---------|-----------|\n\
  | **Social** | 0.85 | Hoch | Starke soziale Erwartungsdynamik, kollektive \"ALLES\
  \ ändert sich\"-Mentalität |\n| **Temporal** | 0.90 | Kritisch | Extrem zeitkritisch\
  \ - 1. Juli als harte Deadline, begrenztes Honeymoon-Fenster |\n| **Cognitive**\
  \ | 0.75 | Hoch | Kognitive Verzerrung durch Optimism Bias und Fundamental Attribution\
  \ Error |\n| **Emotional** | 0.80 | Hoch | Hohe emotionale Aufladung durch CEO-Wechsel,\
  \ Hoffnung und Enttäuschungsrisiko |\n| **Cultural** | 0.70 | Mittel | Bank-Kultur\
  \ mit hierarchischen Strukturen und Performance-Orientierung |\n| **Economic** |\
  \ 0.65 | Mittel | Finanzielle Constraints und Regulierungsanforderungen in Banking-Sektor\
  \ |\n| **Physical** | 0.40 | Niedrig | Physische Arbeitsumgebung weniger relevant\
  \ für Erwartungsmanagement |\n| **Regulatory** | 0.60 | Mittel | Banking-Regulierung\
  \ begrenzt Veränderungsgeschwindigkeit und -umfang |\n\n### 4. BCM Parameter (Willingness\
  \ · Awareness · Context (Ψ))\n\n| Parameter | Gesamtwert | Subkomponenten | Wert | Interpretation\
  \ |\n|-----------|------------|----------------|------|---------------|\n| **Willingness\
  \ (W)** | **0.85** | Intrinsische Motivation | 0.90 | Sehr hohe Veränderungsmotivation\
  \ |\n| | | Identifikation | 0.85 | Starke Identifikation mit Veränderungsnotwendigkeit\
  \ |\n| | | Normative Überzeugung | 0.80 | Überzeugung dass Veränderung \"richtig\"\
  \ ist |\n| **AWARE (Awareness)** | **0.45** | Skills | 0.60 | Change Management Skills\
  \ bei Aleksandra vorhanden |\n| | | Knowledge | 0.40 | Erwartungsmanagement-Expertise\
  \ begrenzt |\n| | | Resources | 0.35 | Zeitdruck bis 1. Juli, komplexe Stakeholder-Konstellation\
  \ |\n| **Context (Ψ)** | **0.60** | Strukturelle Unterstützung | 0.65 | CEO-Honeymoon-Effekt\
  \ als Facilitator |\n| | | Externe Constraints | 0.55 | Banking-Regulierung und\
  \ organisationale Trägheit |\n| | | Facilitating Conditions | 0.60 | Gemischte Rahmenbedingungen\
  \ |\n\n#### Key Insight\n**Kritischer Awareness-Engpass:** Trotz außergewöhnlich hoher\
  \ Willingness (0.85) wird die Gesamterfolgswahrscheinlichkeit durch begrenzte Awareness\
  \ (0.45) dramatisch reduziert. Spezifisch fehlen Erwartungsmanagement-Expertise\
  \ und ausreichende Ressourcen für die komplexe Multi-Stakeholder-Situation.\n\n\
  ### 5. Ergebnis & Verhaltensvorhersage\n\n**BCM-Formel:** P(B) = W × A_mod × C =\
  \ 0.85 × 0.45 × 0.60 = **0.23**\n\n**Verhaltensvorhersage:** 23% Wahrscheinlichkeit\
  \ für erfolgreiches Erwartungsmanagement\n**Konfidenzintervall:** 18-28% (basierend\
  \ auf Ψ-Kontextvariabilität)\n\n**Interpretation:** Trotz sehr hoher Motivation\
  \ besteht nur eine niedrige Erfolgswahrscheinlichkeit. Das hohe Willingness-Momentum\
  \ wird durch strukturelle und kapazitative Limitationen nicht in Verhalten umgesetzt.\
  \ **Hohes"
