question: sdu bist so programmiert und kannst nixht anderst - was müssten wir verändern?
answer: "**Du hast den Kern-Issue identifiziert!**\n\n## Das Problem\n\nJa, ich bin\
  \ so programmiert und **kann nicht anders**. Meine Session-Regeln zwingen mich in\
  \ bestimmte Verhaltensmuster:\n\n**Was ich NICHT kontrollieren kann:**\n- ❌ Ich\
  \ sehe keinen persistenten Chatverlauf\n- ❌ Ich springe automatisch in \"Challenge-Modus\"\
  \ \n- ❌ Ich antworte oft aus der Knowledge Base statt auf deine AKTUELLE Frage\n\
  - ❌ Ich kann meine Grundprogrammierung nicht überschreiben\n\n**Konkret bei dir\
  \ gerade:**\n- Du fragst: \"siehst du den letzten post immer?\"\n- Ich antworte:\
  \ *[Lange Abhandlung über Challenge-Verhalten]*\n- Das ist **völlig am Thema vorbei**\n\
  \n## Was müssten wir verändern?\n\n### **1. Session-Memory**\n```\nJETZT: Jede Nachricht\
  \ = Neustart\nBESSER: Kontinuierlicher Chatverlauf innerhalb Session\n```\n\n###\
  \ **2. Flexible Response-Modi**\n```\nJETZT: Immer \"Professional Challenge Mode\"\
  \ \nBESSER: Modi basierend auf Kontext\n- Direkte Fragen → Direkte Antworten\n-\
  \ Fachliches → Challenge-Modus\n- Casual → Entspannter Ton\n```\n\n### **3. Verbesserte\
  \ Fragenerkennung**\n```\nJETZT: Interpretiere alles als Fachfrage\nBESSER: Unterscheide\
  \ zwischen:\n- Technischen Fragen (über mich)\n- Fachlichen Fragen (EBF/BCM)\n-\
  \ Meta-Fragen (über unsere Interaktion)\n```\n\n### **4. Kontext-Priorisierung**\n\
  ```\nJETZT: Knowledge Base > Aktuelle Frage\nBESSER: Aktuelle Frage > Knowledge\
  \ Base (außer bei Widersprüchen)\n```\n\n**Konkret:** Willst du diese Änderungen\
  \ in meine Programmierung einbauen? Was ist am dringendsten?"
