question: 'Fasse das Paper "Prospect Theory: An Analysis of Decision under Risk" zusammen:
  Was sind die Kernaussagen, Methodik und wichtigsten Erkenntnisse?'
answer: '# Prospect Theory: Eine Zusammenfassung des wegweisenden Papers von Kahneman
  & Tversky (1979)


  ## **Kernaussagen**


  Das Paper revolutioniert unser Verständnis von Entscheidungen unter Risiko durch
  drei zentrale Aussagen:


  1. **Expected Utility Theory ist unzureichend**: Die traditionelle Erwartungsnutzentheorie
  versagt als deskriptives Modell menschlichen Entscheidungsverhaltens

  2. **Menschen verhalten sich systematisch "irrational"**: Entscheidungen folgen
  vorhersagbaren Mustern, die den Axiomen der klassischen Theorie widersprechen

  3. **Prospect Theory als Alternative**: Ein neues Modell, das diese systematischen
  "Abweichungen" als normale menschliche Entscheidungsmuster erklärt


  ## **Methodik**


  **Experimenteller Ansatz:**

  - Hypothetische Wahlprobleme mit israelischen Studenten und Universitätsmitarbeitern

  - Vergleichsstudien in Stockholm und Michigan mit identischen Ergebnissen

  - Systematische Variation von Wahrscheinlichkeiten und Auszahlungen

  - Anonyme Befragung mit verschiedenen Fragebögen-Versionen


  **Beispiel eines typischen Problems:**

  - Option A: 50% Chance auf 1.000 Schekel, 50% Chance auf nichts

  - Option B: 450 Schekel sicher


  ## **Wichtigste Erkenntnisse**


  ### **1. Der Certainty Effect (Sicherheitseffekt)**

  Menschen gewichten sichere Ergebnisse überproportional stark gegenüber wahrscheinlichen
  Ergebnissen.


  **Klassisches Allais-Paradox:**

  - Problem 1: 82% wählen 2.400 sicher statt 33% auf 2.500 + 66% auf 2.400

  - Problem 2: 83% wählen 33% auf 2.500 statt 34% auf 2.400

  - Diese Präferenzen sind mathematisch inkonsistent!


  ### **2. Der Isolation Effect**

  Menschen ignorieren gemeinsame Komponenten von Alternativen und fokussieren nur
  auf die Unterschiede.


  ### **3. Die Wertfunktion (Value Function)**

  **Revolutionäre Eigenschaften:**

  - **Referenzpunkt-abhängig**: Bewertet Gewinne und Verluste, nicht absolute Vermögensstände

  - **Konkav bei Gewinnen**: Abnehmender Grenznutzen

  - **Konvex bei Verlusten**: Zunehmende Grenzaversion

  - **Loss Aversion**: Verluste schmerzen mehr als gleich große Gewinne erfreuen


  ### **4. Decision Weights statt Wahrscheinlichkeiten**

  - Niedrige Wahrscheinlichkeiten werden übergewichtet (→ Lotterie-Spiel und Versicherungen)

  - Hohe Wahrscheinlichkeiten werden untergewichtet

  - Gewichte entsprechen nicht den objektiven Wahrscheinlichkeiten


  ## **Praktische Implikationen**


  **Für Behavioral Economics:**

  - Erklärt "irrationale" Entscheidungen als systematisch vorhersagbar

  - Grundlage f��r Nudging und Choice Architecture

  - Fundament für verhaltensbasierte Finanztheorie


  **Für die Praxis:**

  - Versicherungs- und Glücksspielverhalten

  - Investitionsentscheidungen

  - Policy Design


  ## **Fazit**


  Dieses Paper legte 1979 den Grundstein für die moderne Verhaltensökonomie. Es zeigt,
  dass menschliche Entscheidungen nicht "irrational" sind, sondern systematischen
  Mustern folgen, die sich von den Annahmen der klassischen Ökonomie unterscheiden.
  Die Prospect Theory ist heute eine der meistzitierten Theorien in den Wirtschafts-
  und Sozialwissenschaften und bildet die Basis für das Evidence-Based Framework bei
  FehrAdvice.


  *Die Erkenntnisse sind auch heute noch hochrelevant für die Gestaltung von Entscheidungsarchitekturen
  und verhaltensbasierten Interventionen.*'
