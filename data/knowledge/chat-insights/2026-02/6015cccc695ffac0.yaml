question: Was ist das BCM
answer: '# Das Behavioral Competence Model (BCM)


  Das **Behavioral Competence Model (BCM)** ist das zentrale Herzstück des Evidence-Based
  Framework (EBF) von FehrAdvice & Partners AG. Es ist ein wissenschaftlich fundiertes,
  probabilistisches Modell zur systematischen **Analyse, Vorhersage und Gestaltung
  von Verhaltensänderungen**.


  ---


  ## 🎯 Die Kernformel


  Das BCM basiert auf der mathematischen Formalisierung:


  ```

  BCM = 10C Framework (Willingness, Awareness, Kontext, Zielpopulation, Verhaltensänderungsziel)

  ```


  ---


  ## 📊 Die 10C Dimensionen des BCM


  ### **1. Willingness (W) - "Wollen"**

  - Die intrinsische Motivation und Bereitschaft zur Veränderung

  - Fungiert als **Gate Condition**: Ohne ausreichende Willingness findet keine Verhaltensänderung
  statt

  - Umfasst Einstellungen, Werte, emotionale Bereitschaft und Intention


  ### **2. AWARE (Awareness) - "Können"**

  - Die verfügbaren Fähigkeiten, Wissen und Ressourcen zur Umsetzung

  - Beinhaltet Skills, Knowledge und materielle/zeitliche/kognitive Mittel

  - Bestimmt die praktische Umsetzbarkeit der gewünschten Verhaltensänderung


  ### **3. Context (Ψ) - "Dürfen/Rahmenbedingungen"**

  - **8 Kontextdimensionen**: Institutional, Social, Cognitive, Temporal, Physical,
  Economic, Cultural, Communication

  - Moduliert alle Übergangswahrscheinlichkeiten und kann Verhalten ermöglichen oder
  verhindern


  ---


  ## 🗄️ Die BCM2 Kontextdatenbank


  Das BCM umfasst eine **strukturierte Datenbank mit 400+ Kontextfaktoren** (BCM2),
  die verhaltensökonomische Parameter (λ, β, δ) für spezifische Situationen kalibrieren:


  ### **Die drei BCM-Ebenen:**


  ```

  ┌─────────────────────────────────────────────────────────────────┐

  │  BCM2_04_KON  →  MAKRO-KONTEXT (Land/Markt)                     │

  │  ├── 404 Faktoren für Schweiz (CH)                              │

  │  ├── 5 Hauptachsen: Demografie, Wirtschaft, Politik,            │

  │  │   Technologie, Sozio-Kultur                                  │

  │  └── Quellen: BFS, SECO, SNB, ESS, WVS, gfs.bern, Sotomo        │

  │                                                                 │

  │  BCM2_05_IND  →  INDIVIDUAL (Person)                            │

  │  ├── 48 Faktoren                                                │

  │  └── Alter, Geschlecht, Bildung, Persönlichkeit                 │

  │                                                                 │

  │  BCM2_06_META →  ENTSCHEIDUNGSARCHITEKTUR                       │

  │  ├── 42 Faktoren                                                │

  │  └── Framing, Defaults, Timing, Kanäle                          │

  └─────────────────────────────────────────────────────────────────┘

  ```


  ---


  ## ���� Wie funktioniert BCM? Ein Beispiel


  **Beispiel: Loss Aversion (λ) im Schweizer Kontext**


  ```

  SCHRITT 1: Basis-Parameter (aus Literatur)

  λ_baseline = 2.25  (Kahneman & Tversky)


  SCHRITT 2: MAKRO-Modifikatoren (BCM2_04_KON)

  λ_CH = λ × 1.1  (hohes Vertrauen in Institutionen)


  SCHRITT 3: INDIVIDUAL-Modifikatoren (BCM2_05_IND)

  λ_person = λ_CH × (1 + 0.008 × max(0, age - 40))

  → 65-jährig: λ × 1.20


  SCHRITT 4: META-Modifikatoren (BCM2_06_META)

  λ_final = λ_person × 1.3  (Loss-Framing aktiv)


  ERGEBNIS: λ = 2.25 × 1.1 × 1.20 × 1.3 = 3.86

  ```


  ---


  ## 🔬 Wissenschaftliche Fundierung


  Das BCM basiert auf:

  - **10 Core Axiomen** der Verhaltensökonomie

  - **10C Framework** (WHO, WHAT, HOW, WHEN, WHERE, AWARE, READY, STAGE, HIERARCHY,
  EIT)

  - **FEPSDE Matrix** (Financial, Emotional, Psychological, Social, Developmental,
  Environmental)

  - **12 Primärquellen**: BFS, SECO, SNB, BSV, BFE, BAFU, OECD, World Bank, ESS, WVS,
  KOF ETH, gfs.bern

  - **384 API-Endpoints** mit automatischen Updates

  - **35+ wissenschaftliche Papers**


  ---


  ## ⚡ Was macht das BCM einzigartig?


  | Aspekt | Standard-Modelle | BCM2 |

  |--------|-----------------|------|

  | **Parameter** | λ = 2.25 (konstant) | λ(Ψ, 10C) = variabel |

  | **Kontext** | Ignoriert oder kontrolliert | Systematisch modelliert |

  | **Übertragbarkeit** | Mittelwert aus Meta-Analysen | Parameter Context Transformation
  |

  | **Datenquellen** | Einzelstudien | 12 offizielle Quellen + APIs |

  | **Update** | Statisch | Jährlich automatisch |


  ### Kernmerkmale:

  1. **Probabilistisch**: Liefert Wahrscheinlichkeiten statt deterministischer Vorhersagen

  2. **Evidenzbasiert**: Jede Komponente ist empirisch messbar und validierbar

  3. **Kontextsensitiv**: Systematische Berücksichtigung situativer und kultureller
  Faktoren

  4. **Segmentspezifisch**: Parameter variieren je nach Zielgruppe und Situation

  5. **Zeitdynamisch**: Berücksichtigt Lerneffekte und Feedback-Schleifen

  6. **Parameteradaptiv**: Verhaltensparameter werden situationsspezifisch kalibriert


  ---


  ## 💼 Praktische Anwendung


  Das BCM ermöglicht es, komplexe Verhaltensänderungen systematisch zu analysieren
  und **gezielte, wirksame Interventionen** zu entwickeln:


  - **Decision Architecture** (Nudging, Choice Architecture)

  - **Change Management** (Organisationsentwicklung)

  - **Policy Design** (Evidenzbasierte Politikgestaltung)

  - **Marketing & Communication** (Verhaltensorientierte Kampagnen)


