question: so und nun aus Corinnas Sicht bewerten und analystieren
answer: '# AUS CORINNAS SICHT: Kritische Analyse des Angebots


  ## CORINNAS INNERER MONOLOG 💭


  *"Moment mal... sie wollen mir 58% meines Gehalts streichen und ich soll dankbar
  sein? Und dann soll ICH auch noch FAP retten? Das ist schon ziemlich dreist..."*


  ---


  ## CORINNAS REALITÄTSCHECK


  ### 🚨 **DIE HARTEN FAKTEN**


  **Finanzielle Realität:**

  - **Minus CHF 35.000** im Jahr - das ist existenzbedrohend

  - **CHF 2.083 pro Monat** brutto - davon kann man nicht leben

  - **Hypothetische Boni** - was wenn ich keine Projekte gewinne?

  - **2 Jahre bis Pension** - kann ich mir das leisten?


  **Risiko-Assessment:**

  - ❌ **Ich trage das ganze Risiko** - bei Misserfolg bin ich der Sündenbock

  - ❌ **Neue Fähigkeiten unter Druck** - Sales lernen in Existenzkrise

  - ❌ **FAP könnte trotzdem pleite gehen** - dann bin ich mit weniger Geld da


  ---


  ## CORINNAS ALTERNATIVEN-VERGLEICH


  ### **OPTION A: Angebot annehmen**

  ```

  Jahr 1: CHF 25k + ??? Bonus

  Risiko: Hoch

  Upside: Theoretisch CHF 50k+

  Kontrolle: Gering (abhängig von FAP)

  ```


  ### **OPTION B: Kündigung akzeptieren + Neustart**

  ```

  Jahr 1: Arbeitslosengeld + eigene Projekte

  Risiko: Mittel

  Upside: Unbegrenzt

  Kontrolle: Hoch (eigene Entscheidungen)

  ```


  ### **OPTION C: Kämpfen um bessere Bedingungen**

  ```

  Höheres Grundgehalt fordern

  Bessere Bonus-Struktur

  Ausstiegsklauseln

  ```


  ---


  ## 🤔 **CORINNAS BEDENKEN**


  ### **"Warum soll ICH das Unternehmen retten?"**


  *"Gerhard hat FAP in die Krise geführt, nicht ich. Jetzt soll ich für weniger Geld
  das Problem lösen? Das fühlt sich unfair an."*


  ### **"Bin ich überhaupt eine Verkäuferin?"**


  *"Ich bin Behavioral Designer, keine Sales-Person. Was wenn ich das gar nicht kann?
  Dann stehe ich als Versagerin da."*


  ### **"Was ist mit meiner Pension?"**


  *"Mit CHF 25k kann ich nichts sparen. Meine Altersvorsorge leidet massiv. Ist das
  das wert?"*


  ---


  ## 💡 **CORINNAS STRATEGISCHE ÜBERLEGUNGEN**


  ### **PRO-Argumente (ehrlich betrachtet):**


  1. **Besser als Kündigung** - CHF 25k > CHF 0

  2. **Neue Skills** - Akquise könnte nützlich sein

  3. **Upside-Potential** - bei Erfolg wirklich mehr Geld

  4. **Flexible Arbeitszeit** - 50% lässt Raum für eigene Projekte

  5. **Heldenrolle** - wenn es funktioniert, bin ich die Retterin


  ### **CONTRA-Argumente (die schwer wiegen):**


  1. **Existenzielle Einbuße** - CHF 35k weniger ist brutal

  2. **Ungewisse Zukunft** - FAP könnte trotzdem sterben

  3. **Erfolgsdruck** - ich werde zum Sündenbock bei Misserfolg

  4. **Unfaire Risikoverteilung** - ich trage alles, FAP wenig

  5. **Spätkarriere-Stress** - mit 63 nochmal neu anfangen?


  ---


  ## 🎯 **CORINNAS VERHANDLUNGSPOSITION**


  ### **"Wenn schon, dann richtig!"**


  **Corinnas Mindset:**

  *"Wenn ihr mich wirklich als Business Development Managerin wollt, dann behandelt
  mich auch so. Ich bin nicht eure Notlösung, ich bin eure Chance!"*


  **Corinnas Gegenforderungen:**

  - **Höheres Grundgehalt:** CHF 35.000 (nicht 25k)

  - **Bessere Erfolgsbeteiligung:** 20% statt 15%

  - **Ausstiegsklausel:** Nach 6 Monaten kündbar ohne Fristen

  - **Spesen/Equipment:** Akquise kostet Geld

  - **Klare Zieldefinition:** Was genau wird von mir erwartet?


  ---


  ## 🔥 **CORINNAS FINALE BEWERTUNG**


  ### **"Das Angebot ist eine Frechheit - aber die Alternative ist schlimmer"**


  **Emotionale Realität:**

  - ✋ **Verletzt:** "Nach all den Jahren so behandelt zu werden..."

  - 😤 **Wütend:** "Ich soll euer Chaos ausbügeln?"

  - 😰 **Ängstlich:** "Was wenn ich versage?"

  - 🤔 **Pragmatisch:** "Aber was sind meine Alternativen wirklich?"


  **Corinnas wahrscheinliche Reaktion:**

  *"Gerhard, ich schätze dass du ehrlich bist. Aber dein Angebot ist inakzeptabel.
  Wenn du wirklich willst dass ich FAP rette, dann lass uns über faire Bedingungen
  reden. Sonst nehme ich lieber die Kündigung und starte neu."*


  **Bottom Line:** Corinna wird hart verhandeln oder ablehnen. Das Angebot ist zu
  schlecht für jemanden, der das Unternehmen retten soll.'
