question: kannst du das mal ein wenig in den fussballer chargon vertonen
answer: "Alter, das ist ja mal ein geiles Projekt! **Live-Bewertung vom Keeper während\
  \ dem Spiel** - das ist exactly was die Trainer brauchen!\n\n## Real-Time Keeper-Assessment:\
  \ Wie die Profis ticken\n\n### Das Problem auf dem Platz\nDie üblichen Stats sind\
  \ für'n Arsch:\n- **Gehaltene Bälle**: Bringt nix, wenn er schlecht steht\n- **Rausgelaufene\
  \ Bälle**: Sagt nix über's Timing\n- **Passquote**: Juckt keinen, wenn er die entscheidenden\
  \ Saves verpatzt\n\n### Was die Trainer WIRKLICH wissen wollen\n\n**WÄHREND dem\
  \ Spiel:**\n\n1. **\"Steht der richtig?\"** \n   - Position bei Flanken/Ecken\n\
  \   - Winkelspiel bei 1vs1\n   - Bereitschaft zum Rauslaufen\n\n2. **\"Kriegt der\
  \ den Kasten im Griff?\"**\n   - Dirigiert er die Abwehr ordentlich?\n   - Bringt\
  \ Ruhe rein oder macht Hektik?\n   - Antizipiert er Situationen?\n\n3. **\"Ist der\
  \ noch frisch oder hängt er schon?\"**\n   - Reaktionszeit bei schnellen Schüssen\n\
  \   - Sprungkraft bei hohen Bällen\n   - Konzentration in ruhigen Phasen\n\n###\
  \ Praxis-Taugliches System\n\n**Was der Trainer zur Halbzeit wissen muss:**\n- \"\
  Keeper steht heute 15cm zu weit vorne\" \n- \"Hat schon 3 Mal zu spät reagiert\"\
  \n- \"Abwehr ist unruhig - liegt am Keeper\"\n\n**Einfaches Ampelsystem:**\n- \U0001F7E2\
  \ \"Läuft sauber\"\n- \U0001F7E1 \"Aufpassen, kleine Schwächen\"  \n- \U0001F534\
  \ \"Problem - eventuell wechseln\"\n\n**Bottom Line:** Das System muss so simpel\
  \ sein, dass der Co-Trainer es dem Chef in 10 Sekunden erklären kann, während das\
  \ Spiel läuft.\n\nWelche Liga/Level schwebt dir vor? Profi-Bereich oder auch Amateur-Fußball?"
