question: wie kan man einen Lead eröffnen?
answer: "Basierend auf der BEATRIX Knowledge Base gibt es mehrere Wege, wie Sie einen\
  \ Lead eröffnen können:\n\n## **Direkter Chat-Ansatz**\nSie können mir einfach die\
  \ Lead-Informationen direkt mitteilen. Ich erkenne automatisch, wenn es sich um\
  \ einen Lead handelt und erfasse die strukturierten Daten. \n\n**Beispiele aus der\
  \ Praxis:**\n- \"Neuer Lead: Raiffeisen, Budget 120.000 CHF, 35% Abschlusswahrscheinlichkeit...\"\
  \n- \"Neuer Lead für die Erste Bank: Behavioral Design Workshop...\"\n\n## **Mindest-Informationen\
  \ für Lead-Erfassung:**\n- **Kunde**: Name des Unternehmens\n- **Kontaktperson**:\
  \ Name und Rolle\n- **Opportunity**: Was ist das konkrete Projekt/die Anfrage?\n\
  - **Geschätztes Volumen**: Budget in CHF/EUR\n- **Wahrscheinlichkeit**: Ihre Einschätzung\
  \ in %\n\n## **Was ich automatisch strukturiere:**\n```json\n{\n  \"customer_code\"\
  : \"kunde-code\",\n  \"customer_name\": \"Kundenname\", \n  \"contact_person\":\
  \ \"Ansprechpartner\",\n  \"contact_role\": \"Position\",\n  \"opportunity\": \"\
  Projektbeschreibung\",\n  \"estimated_value_chf\": 120000,\n  \"probability\": 35,\n\
  \  \"stage\": \"initial_contact\",\n  \"fa_owner\": \"GF\"\n}\n```\n\n## **Zusätzliche\
  \ Details die ich nachfrage:**\n- E-Mail-Adresse des Kontakts\n- Nächste geplante\
  \ Schritte\n- Timing/Deadlines\n- Projektart (Workshop, Beratung, Training)\n\n\
  **Möchten Sie jetzt einen neuen Lead erfassen?** Teilen Sie mir einfach die Informationen\
  \ mit - ich kümmere mich um die strukturierte Erfassung! \U0001F3AF"
