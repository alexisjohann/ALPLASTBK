question: 🧠 Kontext Ψ analysieren
answer: "Hallo! Ich bin BEATRIX und helfe dir dabei, die Ausgangslage und den Kontext\
  \ deines Kunden oder Projekts systematisch zu erfassen und zu analysieren.\n\nFür\
  \ eine strukturierte Kontext-Analyse brauche ich zunächst ein paar grundlegende\
  \ Informationen:\n\n**Welchen Kunden oder welches Projekt möchtest du analysieren?**\n\
  - Kundenname oder Kundencode\n- Falls bereits bekannt: Projektbezeichnung\n- Branche/Sektor\n\
  \n**Welche Dimension der Ausgangslage interessiert dich besonders?**\n- \U0001F3E2\
  \ **Marktumfeld** - Branchenkontext, Wettbewerb, Trends\n- \U0001F3DB️ **Organisation**\
  \ - Struktur, Kultur, interne Dynamiken  \n- \U0001F465 **Stakeholder** - Entscheidungsträger,\
  \ Einflussnehmer, Politik\n- \U0001F4CB **Regulatorik** - Gesetze, Compliance, Auflagen\n\
  - \U0001F3AF **Behavioral** - Verhaltensmuster, Entscheidungsprozesse\n- ⚔️ **Wettbewerb**\
  \ - Konkurrenzanalyse, Positionierung\n\nIch werde dann systematisch die relevanten\
  \ Faktoren mit dir durchgehen und eine strukturierte Analyse erstellen, die direkt\
  \ in euer Projekt-Setup fließen kann."
