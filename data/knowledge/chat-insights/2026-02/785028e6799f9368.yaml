question: kannst du mir das EBF beschreiben?
answer: 'Das **Evidence-Based Framework (EBF)** ist ein einzigartiges System, das
  FehrAdvice & Partners AG seit 2010 in Zusammenarbeit mit der Universität Zürich
  entwickelt hat. Lass mich es dir strukturiert erklären:


  ## Was ist das EBF?


  Das EBF ist **zwei Dinge gleichzeitig**:


  1. **Eine wissenschaftliche Wissensdatenbank** — eine systematische Sammlung von
  über 2.000 Studien, 191 Theorien, 852 Cases und 404+ Kontextfaktoren zu menschlichem
  Verhalten


  2. **Ein Meta-Framework** — eine Methodik, mit der jede wissenschaftliche Theorie
  eingeordnet und für die Praxis anwendbar gemacht werden kann


  ## Die zentrale Innovation


  **Traditionell:** Parameter galten als konstant (z.B. "Loss Aversion λ = 2,25")


  **EBF:** Parameter sind kontextabhängig — die Formel lautet: **θ = f(Ψ, 10C)**


  Das bedeutet: Loss Aversion kann bei Welfare mit Stigma 2,5 betragen, aber am Arbeitsplatz
  nur 1,8. **Die Variation ist nicht Rauschen — sie ist das Signal!**


  ## Die zwei Kernkomponenten


  ### 1. Die 8 Ψ-Dimensionen (Kontext)

  - **Ψ_I** (Institutional): Welche Regeln gelten?

  - **Ψ_S** (Social): Wer ist dabei? Welche Normen?

  - **Ψ_C** (Cognitive): Müde? Gestresst? Aufmerksam?

  - **Ψ_K** (Cultural): Welche Werte, Traditionen?

  - **Ψ_E** (Economic): Budget, Zeit, Energie?

  - **Ψ_T** (Temporal): Wann? Zeitdruck?

  - **Ψ_M** (Material): Technologie, Infrastruktur?

  - **Ψ_F** (Physical): Wo physisch? Büro, zuhause?


  ### 2. Das 10C CORE Framework

  Zehn komplementäre Dimensionen: WHO, WHAT, HOW, WHEN, WHERE, AWARE, READY, STAGE,
  HIERARCHY, EIT


  ## Was das EBF NICHT ist


  Das EBF konkurriert **nicht** mit Kahneman, Thaler oder anderen Theorien. Es **ordnet**
  sie ein und macht sie anwendbar. Es ist keine eigene wissenschaftliche Theorie,
  sondern das Framework, das bestehende Theorien systematisiert und für die Beratungspraxis
  nutzbar macht.


  ## Praktisches Beispiel


  Neue Studie zeigt: "Loss Aversion λ = 2,5 bei Welfare-Takeup"

  → EBF ordnet ein: Kontext = bürokratisch + Stigma hoch

  → BCM wird besser: Berater wissen jetzt, dass λ bei Stigma höher ist


  **Das EBF ist die wissenschaftliche Grundlage, auf der unser Behavioral Change Model
  (BCM) und BEATRIX aufbauen.**'
