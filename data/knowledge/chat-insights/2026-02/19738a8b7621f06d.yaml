answer: "# BCM-Parameter Schätzung: Kanton Zürich Mobilitäts-Workshop\n\n## Willingness\
  \ (W)\n\n- **Aktueller Wert:** 0.65\n- **Gate Condition:** W ≥ θ_W (0.6)? **Ja**\n\
  \n**Begründung:** Die Aussage \"Ihr Ansatz erscheint uns im Grundsatz vielversprechend\"\
  \ zeigt klare intrinsische Motivation. Allerdings dämpft die Unsicherheit \"ob durch\
  \ die Modellanwendung für uns konkret etwas Neues entsteht\" die Willingness. Das\
  \ stufenweise Vorgehen demonstriert vorsichtige, aber genuine Bereitschaft zur Exploration.\n\
  \n## AWARE (Awareness)\n\n- **Aktueller Wert:** 0.75\n- **Subkomponenten:**\n  - Skills:\
  \ 0.8 (Fachpersonen Mobilität)\n  - Knowledge: 0.7 (bestehende Massnahmenkenntnisse)\n\
  \  - Resources: 0.75 (3h Workshop-Zeit, Personalkapazität)\n\n**Begründung:** Hohe\
  \ fachliche Kompetenz durch spezialisierte Mobilitätsteams beider Ämter. Vorhandenes\
  \ Wissen über bestehende Massnahmen bildet solide Basis. Ressourcenallokation für\
  \ 3h Workshop plus Nachbereitung zeigt ausreichende organisationaler Context.\n\n\
  ## Context (Ψ)\n\n- **Aktueller Wert:** 0.8\n- **Externe Constraints:** Minimal\
  \ (Verwaltungsstrukturen unterstützen Innovation)\n- **Facilitating Conditions:**\
  \ Stark (institutioneller Rahmen, Prozessbeobachterinnen)\n\n**Begründung:** Sehr\
  \ günstige strukturelle Bedingungen im Kanton Zürich. Einbindung von Prozessbeobachterinnen\
  \ (Fr. Böttinger, Fr. Hutter) schafft zusätzliche Facilitating Conditions. Geringe\
  \ externe Barrieren durch etablierte Innovations- und Workshop-Kultur.\n\n## BCM\
  \ Gesamtschätzung\n\n| Parameter | Wert | Gate | Interpretation |\n|-----------|------|------|----------------|\n\
  | **W** | 0.65 | ✓ | Vorsichtig-positive Motivation |\n| **A_mod** | 0.75 | ✓ |\
  \ Hohe fachliche Handlungsfähigkeit |\n| **C** | 0.80 | ✓ | Sehr günstige strukturelle\
  \ Bedingungen |\n| **P(B)** | 0.39 | — | Moderate Verhaltenswahrscheinlichkeit |\n\
  \n**BCM-Formel:** P(B) = W × A_mod × C = 0.65 × 0.75 × 0.80 = 0.39\n\n**Interpretation:**\
  \ Mit 39% Verhaltenswahrscheinlichkeit liegt das Projekt im mittleren Erfolgsbereich.\
  \ Die hohen A_mod- und C-Werte werden durch moderate Willingness limitiert. Der\
  \ Pilot-Charakter ist angemessen - erfolgreiche Demonstration wird W signifikant\
  \ steigern und nachfolgende Vertiefungsphasen wahrscheinlicher machen."
