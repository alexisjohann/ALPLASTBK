question: hast du zugang auf github?
answer: "Nein, ich habe **keinen direkten Zugang zu GitHub**. \n\nBasierend auf der\
  \ BEATRIX Knowledge Base sehe ich, dass ähnliche Fragen bereits gestellt wurden\
  \ bezüglich GitHub-Informationen zu Ausschreibungen.\n\n**Was ich kann:**\n- Mit\
  \ Informationen aus der BEATRIX Knowledge Base arbeiten\n- Lead- und Projektdaten\
  \ verwalten\n- Auf hochgeladene Dokumente und Bilder zugreifen\n- Strukturierte\
  \ Daten erstellen und analysieren\n\n**Was ich nicht kann:**\n- Direkt auf GitHub-Repositories\
  \ zugreifen\n- Live-Daten aus externen Systemen abrufen\n- Dateien von GitHub herunterladen\
  \ oder hochladen\n\n**Alternative Lösungen:**\n- Du kannst GitHub-Inhalte hier hochladen/einfügen,\
  \ dann kann ich sie analysieren\n- Ich kann Templates und Strukturen vorschlagen,\
  \ die ihr auf GitHub verwalten könntet\n- Bei spezifischen Fragen zu Code oder Dokumenten:\
  \ einfach den Inhalt hier teilen\n\nBrauchst du Hilfe mit bestimmten GitHub-Inhalten\
  \ oder soll ich bei einer anderen Aufgabe unterstützen?"
