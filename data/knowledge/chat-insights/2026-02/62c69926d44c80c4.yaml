question: 'Test Fast Mode: Was ist Loss Aversion?'
answer: "## Loss Aversion\n\n**Loss Aversion** ist ein zentrales Konzept der Behavioral\
  \ Economics, das beschreibt, dass **Verluste psychologisch stärker wirken als gleichgroße\
  \ Gewinne**.\n\n### Kernprinzip\nMenschen empfinden den Schmerz eines Verlustes\
  \ etwa 2-3 mal intensiver als die Freude eines entsprechenden Gewinns. Ein Verlust\
  \ von 100€ schmerzt mehr, als ein Gewinn von 100€ erfreut.\n\n### Formale Darstellung\n\
  Basierend auf dem Kőszegi & Rabin Modell (2006) aus der Knowledge Base:\n\n```\n\
  Gesamtnutzen = Konsumnutzen + Gewinn-Verlust-Nutzen\nu(c|r) = m(c) + η(c|r)\n```\n\
  \nWobei:\n- **m(c)** = klassischer Konsumnutzen  \n- **η(c|r)** = Gewinn-Verlust-Nutzen\
  \ relativ zum Referenzpunkt r\n- **Referenzpunkt r** = rationale Erwartungen aus\
  \ der jüngsten Vergangenheit\n\n### Praktische Auswirkungen\n- **Endowment Effect**:\
  \ Überbewertung des Besitzes\n- **Status Quo Bias**: Widerstand gegen Veränderungen\n\
  - **Verkaufspsychologie**: \"Sie sparen 50€\" wirkt stärker als \"Kostet nur 150€\"\
  \n\n### BCM-Integration\nIm Behavioral Change Model manifestiert sich Loss Aversion\
  \ besonders in:\n- **Willingness-Dimension**: Verlustängste blockieren Handlungsbereitschaft\n\
  - **Axiom P9**: Risiko und Unsicherheit verringern Übergangswahrscheinlichkeiten\n\
  \n**Quellen**: Kőszegi & Rabin (2006), EBF Axiom P9\n\nLoss Aversion erklärt, warum\
  \ Menschen oft bei suboptimalen Entscheidungen bleiben - der potenzielle Verlust\
  \ wiegt schwerer als der mögliche Gewinn."
