question: was ist das bcm
answer: "## Das Behavioral Change Model (BCM)\n\nDas **Behavioral Change Model\
  \ (BCM)** ist das Herzstück des Evidence-Based Framework (EBF) von FehrAdvice &\
  \ Partners AG. Es handelt sich um ein wissenschaftlich fundiertes, probabilistisches\
  \ Modell zur **Vorhersage und Gestaltung von Verhaltensänderungen**.\n\n### Die\
  \ Kernformel\n\nDas BCM basiert auf einer mathematischen Formalisierung:\n\n```\n\
  BCM = 10C Framework (Willingness, Awareness, Kontext, Zielpopulation, Verhaltensänderungsziel)\n```\n\n### Die 10C Dimensionen des BCM\
  \ im Detail\n\n**1. Willingness (W) - \"Wollen\"**\n- Die intrinsische Motivation\
  \ und Bereitschaft zur Veränderung\n- Fungiert als **Gate Condition**: Ohne ausreichende\
  \ Willingness findet keine Verhaltensänderung statt\n- Umfasst Einstellungen, Werte\
  \ und emotionale Bereitschaft\n\n**2. AWARE (Awareness) - \"Können\"** \n- Die verfügbaren\
  \ Fähigkeiten, Wissen und Ressourcen zur Umsetzung\n- Beinhaltet Skills, Knowledge\
  \ und materielle/zeitliche Mittel\n- Bestimmt die praktische Umsetzbarkeit\n\n**3.\
  \ Context (Ψ) - \"Dürfen/Rahmenbedingungen\"**\n- 8 Kontextdimensionen: Institutional,\
  \ Social, Cognitive, Temporal, Physical, Economic, Cultural, Material\n- Moduliert\
  \ alle Übergangswahrscheinlichkeiten und kann Verhalten ermöglichen oder verhindern\n\
  \n### Zusätzlich: Die Behavioral Context Database (BCM2)\n\nDas BCM umfasst auch\
  \ eine **strukturierte Datenbank mit 400+ Kontextfaktoren**, die verhaltensökonomische\
  \ Parameter für spezifische Situationen kalibrieren:\n\n- **BCM2_04_KON**: MAKRO-Kontext\
  \ (404 Faktoren für die Schweiz)\n- **BCM2_05_IND**: INDIVIDUAL-Faktoren (48 Faktoren)\
  \ \n- **BCM2_06_META**: Entscheidungsarchitektur (42 Faktoren)\n\n### Wissenschaftliche\
  \ Fundierung\n\nDas BCM basiert auf **10 Core Axiomen** und integriert:\n- **10C\
  \ Framework**: Zehn komplementäre Dimensionen (WHO, WHAT, HOW, WHEN, WHERE, AWARE,\
  \ READY, STAGE, HIERARCHY, EIT)\n- **FEPSDE Matrix**: 6 Nutzendimensionen (Financial,\
  \ Emotional, Psychological, Social, Developmental, Environmental)\n- **12 Primärquellen**\
  \ mit automatischen Updates (BFS, SECO, SNB, etc.)\n\n### Was macht das BCM besonders?\n\
  \n1. **Probabilistisch**: Liefert Wahrscheinlichkeiten statt deterministischer Vorhersagen\n\
  2. **Evidenzbasiert**: Jede Komponente ist empirisch messbar und validierbar  \n\
  3. **Kontextsensitiv**: Berücksichtigt situative und kulturelle Faktoren systematisch\n\
  4. **Segmentspezifisch**: Parameter variieren je nach Zielgruppe\n5. **Zeitdynamisch**:\
  \ Berücksichtigt Lerneffekte und Feedback-Schleifen\n\n### Praktische Anwendung\n\
  \nDas BCM ermöglicht es, komplexe Verhaltensänderungen systematisch zu analysieren\
  \ und **gezielte, wirksame Interventionen** zu entwickeln - sei es in der Decision\
  \ Architecture, im Change Management oder in der evidenzbasierten Politikgestaltung.\n\
  \nHaben Sie eine spezifische Anwendung oder Situation, für die Sie das BCM einsetzen\
  \ möchten?"
