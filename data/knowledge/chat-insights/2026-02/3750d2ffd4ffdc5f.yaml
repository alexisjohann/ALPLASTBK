question: woher kommen die 30000 fr.
answer: "Basierend auf dem bereitgestellten Kontext kann ich nicht erkennen, auf welche\
  \ spezifischen 30'000 CHF Sie sich beziehen. \n\nIn den verfügbaren Daten sehe ich\
  \ verschiedene Beträge:\n- Raiffeisen: 120'000 CHF\n- Helvetia Leads: 40'000 CHF\n\
  - Allianz Leads: 60'000 und 80'000 CHF\n- Zindel Projekt: Budget 30k-50k CHF (als\
  \ 40'000 CHF erfasst)\n\n**Um Ihnen präzise helfen zu können, benötige ich mehr\
  \ Kontext:**\n1. Auf welches Projekt oder welchen Lead bezieht sich der Betrag von\
  \ 30'000 CHF?\n2. Handelt es sich um ein Budget, einen Schätzwert oder bereits verrechnte\
  \ Kosten?\n3. Haben Sie eine spezifische Rechnung oder Kalkulation vor sich?\n\n\
  Falls Sie sich auf eine vorherige Konversation oder ein anderes Dokument beziehen,\
  \ das nicht im aktuellen Kontext enthalten ist, fügen Sie bitte die entsprechenden\
  \ Details hinzu."
