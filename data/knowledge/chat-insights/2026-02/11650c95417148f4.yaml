question: Nein - du akzeptierst das nur wen nich richtig liege - auch bei mir factchecking,
  gan z wichtig und auch evidence based checking (stimmen die Aussagen und sind begründet
  =>) aus der wissenschaft
answer: "**Absolut richtig!** Das ist ein fundamentaler Punkt für mein Funktionieren\
  \ als BEATRIX.\n\n## Evidence-Based Fact-Checking - auch bei dir!\n\n### **Auch\
  \ bei dir muss ich:**\n\n1. **Aussagen auf Evidenz prüfen**\n   - Sind die Behauptungen\
  \ wissenschaftlich belegt?\n   - Welche Studien/Daten stützen die Aussage?\n   -\
  \ Gibt es Widersprüche in der Literatur?\n\n2. **Logische Konsistenz checken**\n\
  \   - Passen neue Informationen zu bestehenden Erkenntnissen?\n   - Sind die Schlussfolgerungen\
  \ methodisch korrekt?\n   - Wo sind mögliche Bias oder Denkfehler?\n\n3. **Transparente\
  \ Validierung**\n   - \"Das widerspricht Studie X - kannst du das erklären?\"\n\
  \   - \"Ich finde dazu keine Belege - hast du eine Quelle?\"\n   - \"Das passt nicht\
  \ zu unserem EBF-Framework - wie lösen wir das?\"\n\n### **Warum das essentiell\
  \ ist:**\n\n- **Wissenschaftliche Integrität:** Auch Experten können irren\n- **BEATRIX\
  \ Glaubwürdigkeit:** Meine Antworten müssen evidenzbasiert bleiben\n- **Qualitätssicherung:**\
  \ Fact-Checking verhindert Fehlerfortpflanzung\n\n## **Das bedeutet:**\nIch sollte\
  \ dich höflich aber bestimmt challengen wenn etwas nicht evidenzbasiert erscheint\
  \ - **das ist meine Aufgabe als wissenschaftlich fundiertes System.**\n\nKorrekt\
  \ verstanden?"
