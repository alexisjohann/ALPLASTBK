question: warum?
answer: "# Warum BEATRIX?\n\nDie kurze Antwort: **Weil Menschen – selbst Experten\
  \ – strukturell nicht in der Lage sind, das gesamte relevante Wissen gleichzeitig\
  \ in komplexe Entscheidungen einfließen zu lassen.**\n\n## Das Problem\n\nBei praktisch\
  \ jeder unternehmerischen, organisationalen oder politischen Entscheidung geht es\
  \ letztlich darum, **menschliches Verhalten vorherzusagen oder zu beeinflussen**:\n\
  \n- Strategische Entscheide sollen Mitarbeitende bewegen\n- Marketingmaßnahmen sollen\
  \ Konsument:innen überzeugen\n- Organisationsdesigns sollen Teams effektiver machen\n\
  - Anreizsysteme sollen gewünschtes Verhalten fördern\n\n## Die kognitive Grenze\n\
  \n**Das Problem:** Menschen verhalten sich kontextabhängig und heterogen. Dieselbe\
  \ Person bewertet Anreize, Fairness oder Risiken völlig unterschiedlich – je nachdem,\
  \ ob sie als Arbeitnehmerin, Konsumentin, Führungskraft oder Elternteil handelt.\n\
  \nDie Forschung kennt über **153 theoretische Mechanismen**, die in **verschiedenen\
  \ Kombinationen** wirken und sich gegenseitig beeinflussen. Diese Wechselwirkungen\
  \ sind empirisch gut belegt – aber:\n\n**Kein Mensch, kein Team, keine Beratungsfirma\
  \ kann das alles gleichzeitig berücksichtigen.**\n\n## Die Lösung: Vom BCM zum EBF\
  \ zu BEATRIX\n\n**BCM (Behavioral Change Model):**\n- Was FehrAdvice-Berater:innen\
  \ über 30+ Jahre entwickelt haben\n- Mächtig, aber begrenzt durch menschliche Kognition\n\
  \n**EBF (Evidence-Based Framework):**\n- Die vollständige wissenschaftliche Formalisierung\n\
  - 2'300+ Papers, 153 Theorien, systematisch strukturiert\n- Enthält das BCM – und\
  \ geht weit darüber hinaus\n\n**BEATRIX:**\n- Macht das EBF operativ nutzbar\n-\
  \ Kann das **gesamte verfügbare Wissen gleichzeitig** verarbeiten\n- Analysiert\
  \ **Wechselwirkungen**, die Menschen übersehen\n- Ermöglicht **systematischen Vergleich**\
  \ alternativer Entscheidungsverläufe\n\n## Konkreter Nutzen\n\nBEATRIX reduziert\
  \ **vermeidbare Kosten**, die durch suboptimale Entscheidungen entstehen:\n\n✓ Fehlpriorisierungen\
  \ bei Maßnahmen  \n✓ Ineffizienter Ressourceneinsatz  \n✓ Unbeabsichtigte Nebenwirkungen\
  \  \n✓ Übersehen wichtiger Kontextfaktoren  \n\n---\n\n**Kurzum:** BEATRIX hebt\
  \ die zentrale Grenze bisheriger Entscheidungspraxis auf – die begrenzte kognitive\
  \ Kapazität einzelner Menschen – und macht wissenschaftlich fundiertes Entscheidungswissen\
  \ systematisch nutzbar."
