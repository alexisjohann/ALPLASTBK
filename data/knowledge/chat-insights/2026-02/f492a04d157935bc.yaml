question: ok, das schon gut aber bitte nicht so hochgestochen und der bodenständig
answer: '## 📧 **ANTWORT AN CLARA - DIREKT UND EHRLICH**


  Liebe Clara,


  gerne gebe ich dir konkreteres Feedback - das ist fair nach dem Aufwand, den du
  investiert hast.


  ### **🔍 WAS BEI DIR GUT ANGEKOMMEN IST**


  - Du wirkst sympathisch und kompetent

  - Deine Psychologie-Ausbildung (UZH/ETH) ist solid

  - Die internationalen Praktika zeigen, dass du dich traust

  - Dein Video-Interview war professionell


  ### **🤔 WARUM WIR GEZÖGERT HABEN**


  **Ehrlich gesagt:** Es war knapp. Wir hatten einfach Bewerber, die noch etwas näher
  an dem waren, was wir suchen.


  **Konkret:**

  - **Behavioral Economics:** Du kommst aus der Psychologie, aber BE ist nochmal was
  anderes. Da fehlt uns der Nachweis, dass du wirklich brennst für Nudging, Verhaltensökonomie
  etc.

  - **Beratungserfahrung:** Du warst eher in Forschung/Venture unterwegs. Kundenberatung
  ist anders - man muss auch mal unbequeme Wahrheiten verkaufen können

  - **Unser Stil:** Wir sind sehr direkt und pragmatisch. Das konnten wir im Video-Interview
  noch nicht ganz einschätzen


  ### **🎯 WAS DU IN DEN NÄCHSTEN 6 MONATEN MACHEN KÖNNTEST**


  **Keine fancy Liste, sondern konkret:**


  1. **Lies unseren Blog** - und zwar richtig. Nicht nur überfliegen, sondern verstehen,
  wie wir ticken

  2. **Mach was Praktisches:** Ein kleines BE-Projekt, auch als Freelance oder in
  deinem jetzigen Job

  3. **Zeig, dass du uns kennst:** Kommentiere auf LinkedIn, aber bitte mit Substanz,
  nicht nur "Great post!"


  ### **📅 AUGUST 2026**


  Wenn du in 6 Monaten wiederkommst, erzähl uns:

  - Was du gemacht hast (konkret, mit Beispielen)

  - Warum du FehrAdvice willst (nicht nur "ihr seid cool")

  - Eine Idee für ein Projekt, das wir machen könnten


  ### **💭 EHRLICHE EINSCHÄTZUNG**


  Du hast das Zeug dazu. Wir waren nicht sicher, ob du bei uns **glücklich** wirst
  - und das ist genauso wichtig wie fähig zu sein.


  Falls du merkst, dass BE doch nicht deins ist - ist auch okay. Besser jetzt als
  nach 6 Monaten.


  Liebe Grüsse,

  **Maria**


  P.S.: Und bitte keine 5-seitigen Antworten zurück. Ein "Danke, mache ich" reicht
  völlig 😊'
