question: "Nach zeitintensiven Projektphasen können Mitarbeitende in der Beratung,\
  \ die mindestens sechs Monate bei FehrAdvice & Partners angestellt sind, jährlich\
  \ bis zu maximal 5 zusätzliche Projektausgleichstage beziehen.\n\n\nStaffelung für\
  \ neue Mitarbeitende \n1. Jahr: 2 Projektausgleichstage\n2. Jahr: 3 Projektausgleichstage\n\
  ab dem 3. Jahr: 5 Projektausgleichstage"
answer: '## **PROJEKTAUSGLEICHSTAGE - REGELUNG**


  Hier ist die strukturierte Regelung für Projektausgleichstage bei FehrAdvice & Partners:


  ### **📋 GRUNDPRINZIP**

  Nach zeitintensiven Projektphasen können Mitarbeitende in der Beratung zusätzliche
  Projektausgleichstage beziehen.


  ### **⏱️ VORAUSSETZUNGEN**

  - **Mindestbetriebszugehörigkeit:** 6 Monate bei FehrAdvice & Partners

  - **Zielgruppe:** Mitarbeitende in der Beratung

  - **Anlass:** Nach zeitintensiven Projektphasen


  ### **📊 STAFFELUNG NACH BETRIEBSZUGEHÖRIGKEIT**


  | **Betriebsjahr** | **Anzahl Projektausgleichstage** |

  |------------------|----------------------------------|

  | **1. Jahr**      | 2 Tage                          |

  | **2. Jahr**      | 3 Tage                          |

  | **ab 3. Jahr**   | 5 Tage (Maximum)                |


  ### **🔍 KLARSTELLUNGEN NOCH OFFEN**

  1. **Zeitraum:** Sind die Tage pro Kalenderjahr oder pro Betriebsjahr zu verstehen?

  2. **Definition "zeitintensive Projektphasen":** Welche Kriterien gelten (z.B. Überstunden,
  Projektdauer, Arbeitsbelastung)?

  3. **Übertragbarkeit:** Können nicht bezogene Tage ins Folgejahr übertragen werden?

  4. **Genehmigungsverfahren:** Wer entscheidet über die Gewährung?


  ### **💡 EMPFEHLUNG**

  Diese Regelung ist eine ausgezeichnete Maßnahme für:

  - **Work-Life-Balance** nach intensiven Projektphasen

  - **Mitarbeitendenbindung** durch gestaffelte Vorteile

  - **Burnout-Prävention** in der Beratungsbranche


  Soll ich bei den offenen Punkten Formulierungsvorschläge machen?'
