question: Was ist ein Kontext
answer: '## Was ist ein Kontext im EBF Framework?


  ### Definition aus BEATRIX Knowledge Base


  **Kontext (Ψ)** im EBF ist die **Gesamtheit aller situativen Faktoren**, die Verhaltensänderungen
  beeinflussen, ohne direkt Teil der individuellen BCM-Komponenten (Utility, Willingness,
  Awareness, Segment) zu sein.


  ---


  ## **Die 8 Kontext-Dimensionen (Ψ-System)**


  Laut EBF Framework gibt es **8 fundamentale Kontextdimensionen**:


  | **Dimension** | **Symbol** | **Beschreibung** | **Beispiele** |

  |---------------|------------|------------------|---------------|

  | **Institutional** | Ψ_I | Regeln, Gesetze, Governance | Gesetze, Unternehmensrichtlinien,
  Standards |

  | **Social** | Ψ_S | Soziale Normen, Peer-Einflüsse | Gruppendruck, soziale Erwartungen,
  Netzwerkeffekte |

  | **Cognitive** | Ψ_C | Informationsverarbeitung, mentale Belastung | Komplexität,
  Cognitive Load, Entscheidungsmüdigkeit |

  | **Cultural** | Ψ_K | Werte, Überzeugungen, Traditionen | Organisationskultur,
  nationale Kultur, Subkulturen |

  | **Economic** | Ψ_E | Ressourcen, Anreize, Kosten | Verfügbare Budgets, Subventionen,
  Opportunitätskosten |

  | **Temporal** | Ψ_T | Zeit, Timing, Sequenz | Deadlines, saisonale Effekte, Lebenszyklus-Phasen
  |

  | **Material** | Ψ_M | Physische Umgebung, Tools | Infrastruktur, Technologie, räumliche
  Gegebenheiten |

  | **Locational** | Ψ_F | Geografische, räumliche Faktoren | Standort, Erreichbarkeit,
  physische Nähe |


  ---


  ## **Mathematische Integration in BCM**


  Gemäß **Axiom P5** modulieren Kontextfaktoren alle Übergangswahrscheinlichkeiten:


  ```

  P(i → j, t) = f(N(t), W(t), A_mod(t), S(t), Ψ(t))

  ```


  Wo: **Ψ(t) = [Ψ_I, Ψ_S, Ψ_C, Ψ_K, Ψ_E, Ψ_T, Ψ_M, Ψ_F]**


  ---


  ## **Praktische Bedeutung**


  ### **1. Kontext als Hebel**

  - **Starker Kontext** (hohe Ψ-Werte) kann schwache individuelle Motivation kompensieren

  - **Schwacher Kontext** kann starke individuelle Motivation blockieren


  ### **2. Interventions-Design**

  - Kontext-Optimierung oft effizienter als individuelle Überzeugungsarbeit

  - "Choice Architecture" designt optimale Kontextbedingungen


  ### **3. Messbarkeit**

  - Jede Ψ-Dimension wird auf 0-1 Skala quantifiziert

  - Ermöglicht systematische Kontext-Optimierung


  ---


  ## **Beispiel: Innovation in Organisationen**


  Ihre ursprüngliche Frage zu Innovationskontext zeigt das Problem:


  **Standard-Ψ-Profile** (alle = 0.5) sind zu oberflächlich für spezifische Verhaltensweisen
  wie Innovation.


  **Innovations-spezifisches Ψ-Profil** müsste präzise messen:

  - Ψ_K: Failure tolerance, experimentation norms

  - Ψ_S: Cross-functional connectivity, external networks

  - Ψ_E: Resource allocation flexibility, time horizons


  ---


  ## **Key Takeaway**


  Kontext ist nicht "Hintergrund" sondern **aktiver Gestaltungsparameter**. Das EBF
  Framework macht Kontext systematisch mess- und optimierbar.


  **Quelle:** EBF Framework Axiom P5 (Context Modulation) und CORE-WHEN (V) Spezifikationen.'
