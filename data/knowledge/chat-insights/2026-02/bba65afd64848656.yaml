question: 📋 Neues Projekt eröffnen
answer: "Gerne unterstütze ich dich beim Eröffnen eines neuen Projekts! \n\nUm das\
  \ passende Projekt anzulegen, benötige ich zunächst folgende Informationen:\n\n\
  **1. Kunde:** Für welchen Kunden soll das Projekt eröffnet werden?\n\n**2. Projektart:**\
  \ Was für ein Projekt ist geplant?\n- Beratung\n- Workshop  \n- Studie\n- Intervention\n\
  - Keynote\n- Training\n- Retainer\n\n**3. Kategorie:** \n- Mandat (bezahltes Projekt)\n\
  - Lead (Akquise-Projekt)\n- Pro Bono (unentgeltliches Projekt)\n\nSobald du mir\
  \ den Kunden nennst, kann ich die verfügbaren Kundendaten abrufen und prüfen, ob\
  \ bereits ähnliche Projekte existieren."
