question: was ist das BCM?
answer: "## Das Behavioral Competence Model (BCM)\n\nDas **Behavioral Competence Model\
  \ (BCM)** ist das zentrale Herzstück des Evidence-Based Framework (EBF) von FehrAdvice\
  \ & Partners AG. Es ist ein wissenschaftlich fundiertes, probabilistisches Modell\
  \ zur systematischen **Analyse, Vorhersage und Gestaltung von Verhaltensänderungen**.\n\
  \n### \U0001F3AF Die Kernformel\n\nDas BCM basiert auf der mathematischen Formalisierung:\n\
  \n```\nBCM = 10C Framework (Willingness, Awareness, Kontext, Zielpopulation, Verhaltensänderungsziel)\n```\n\n### \U0001F4CA\
  \ Die 10C Dimensionen des BCM\n\n**1. Willingness (W) - \"Wollen\"**\n- Die intrinsische\
  \ Motivation und Bereitschaft zur Veränderung\n- Fungiert als **Gate Condition**:\
  \ Ohne ausreichende Willingness findet keine Verhaltensänderung statt\n- Umfasst\
  \ Einstellungen, Werte, emotionale Bereitschaft und Intention\n\n**2. AWARE (Awareness)\
  \ - \"Können\"** \n- Die verfügbaren Fähigkeiten, Wissen und Ressourcen zur Umsetzung\n\
  - Beinhaltet Skills, Knowledge und materielle/zeitliche/kognitive Mittel\n- Bestimmt\
  \ die praktische Umsetzbarkeit der gewünschten Verhaltensänderung\n\n**3. Context\
  \ (Ψ) - \"Dürfen/Rahmenbedingungen\"**\n- **8 Kontextdimensionen**: Institutional,\
  \ Social, Cognitive, Temporal, Physical, Economic, Cultural, Communication\n- Moduliert\
  \ alle Übergangswahrscheinlichkeiten und kann Verhalten ermöglichen oder verhindern\n\
  \n### \U0001F5C4️ Die BCM2 Kontextdatenbank\n\nDas BCM umfasst eine **strukturierte\
  \ Datenbank mit 400+ Kontextfaktoren** (BCM2), die verhaltensökonomische Parameter\
  \ (λ, β, δ) für spezifische Situationen kalibrieren:\n\n**Die drei BCM-Ebenen:**\n\
  - **BCM2_04_KON**: MAKRO-Kontext (404 Faktoren für die Schweiz) - Land/Markt-Ebene\n\
  - **BCM2_05_IND**: INDIVIDUAL-Faktoren (48 Faktoren) - Personenebene  \n- **BCM2_06_META**:\
  \ Entscheidungsarchitektur (42 Faktoren) - Intervention-Design\n\n### \U0001F52C\
  \ Wissenschaftliche Fundierung\n\nDas BCM basiert auf:\n- **10 Core Axiomen** der\
  \ Verhaltensökonomie\n- **10C Framework** (WHO, WHAT, HOW, WHEN, WHERE, AWARE, READY,\
  \ STAGE, HIERARCHY, EIT)\n- **FEPSDE Matrix** (Financial, Emotional, Psychological,\
  \ Social, Developmental, Environmental)\n- **12 Primärquellen**: BFS, SECO, SNB,\
  \ ESS, WVS, gfs.bern, Sotomo u.a.\n- **384 API-Endpoints** mit automatischen Updates\n\
  \n### ⚡ Was macht das BCM einzigartig?\n\n1. **Probabilistisch**: Liefert Wahrscheinlichkeiten\
  \ statt deterministischer Vorhersagen\n2. **Evidenzbasiert**: Jede Komponente ist\
  \ empirisch messbar und validierbar\n3. **Kontextsensitiv**: Systematische Berücksichtigung\
  \ situativer und kultureller Faktoren\n4. **Segmentspezifisch**: Parameter variieren\
  \ je nach Zielgruppe und Situation\n5. **Zeitdynamisch**: Berücksichtigt Lerneffekte\
  \ und Feedback-Schleifen\n6. **Parameteradaptiv**: Verhaltensparameter werden situationsspezifisch\
  \ kalibriert\n\n### \U0001F4BC Praktische Anwendung\n\nDas BCM ermöglicht es, komplexe\
  \ Verhaltensänderungen systematisch zu analysieren und **gezielte, wirksame Interventionen**\
  \ zu entwickeln - sei es in:\n\n- **Decision Architecture** (Nudging, Choice Architecture)\n\
  - **Change Management** (Organisationsentwicklung)\n- **Policy Design** (Evidenzbasierte\
  \ Politikgestaltung)\n- **Marketing & Communication** (Verhaltensorientierte Kampagnen)\n\
  \n**Beispiel:** Anstatt pauschal λ = 2.25 (Loss Aversion) zu verwenden, kalibriert\
  \ BCM2 für einen 65-jährigen Schweizer Hausbesitzer beim Heizungsersatz: λ_final\
  \ = 4.58 - und empfiehlt entsprechend angepasste Interventionen.\n\nHaben Sie eine\
  \ spezifische Anwendung oder Situation, für die Sie das BCM einsetzen möchten?"
