question: erklär mir den unterschied zwischen BCM und Bestri
answer: "## Der Unterschied zwischen BCM und BESTRI\n\nDas sind zwei verschiedene,\
  \ aber komplementäre Werkzeuge im Evidence-Based Framework von FehrAdvice:\n\n###\
  \ BCM (Behavioral Change Model)\n**Was es ist:** Das **Herzstück des EBF** -\
  \ ein probabilistisches Modell zur Vorhersage und Gestaltung von Verhaltensänderungen.\n\
  \n**Kernformel:**\n```\nBCM = 10C Framework (Willingness, Awareness, Kontext, Zielpopulation, Verhaltensänderungsziel)\n\
  ```\n\n**Fokus:** \n- **Verhaltensanalyse** und -vorhersage\n- Systematische Bewertung\
  \ der drei Komponenten W-A-C\n- 8 Kontextdimensionen (Ψ-Dimensionen)\n- 400+ Kontextfaktoren\
  \ in der BCM2-Datenbank\n\n---\n\n### BESTRI (leider nicht in der Knowledge Base\
  \ verfügbar)\nBasierend auf dem Namen könnte BESTRI ein **strukturiertes Intervention-Framework**\
  \ sein, aber ich habe keine spezifischen Informationen dazu in der BEATRIX Knowledge\
  \ Base.\n\n---\n\n### Der wahrscheinliche Unterschied\n\n**BCM** = **Analyse-Tool**\
  \ (\"Was passiert und warum?\")\n- Diagnostiziert Verhalten\n- Identifiziert Hebel\
  \ für Veränderung  \n- Kalibriert verhaltensökonomische Parameter\n\n**BESTRI**\
  \ = **Interventions-Tool** (\"Wie gestalten wir die Lösung?\")\n- Strukturiert vermutlich\
  \ die Entwicklung von Interventionen\n- Möglicherweise ein Akronym für Interventionsschritte\n\
  \n---\n\n### Zusammenspiel\nDas BCM würde die **Diagnose** liefern (\"Niedrige Awareness\
  \ bei hoher Willingness\"), während BESTRI vermutlich die **Intervention** strukturieren\
  \ würde (\"Wie erhöhen wir die Awareness?\").\n\nKönntest du mir mehr über BESTRI\
  \ erzählen oder zeigen, wo du es gesehen hast? Dann kann ich dir den exakten Unterschied\
  \ erklären und wie die beiden Tools zusammenspielen."
