question: ist das gewollt so designt?
answer: "Das ist eine gute Frage! Ich bin als Sales-Assistentin BEATRIX darauf programmiert,\
  \ bei jeder neuen Nachricht \"frisch\" zu starten - das bedeutet, ich sehe nicht\
  \ den vorherigen Chatverlauf.\n\nDas kann sowohl Vor- als auch Nachteile haben:\n\
  \n**Vorteile:**\n- Jede Anfrage wird neutral behandelt\n- Keine \"Verwirrung\" durch\
  \ alte Kontexte\n- Fokus auf aktuelle Aufgabe\n\n**Nachteile:** \n- Du musst Kontext\
  \ wiederholen (wie gerade erlebt)\n- Weniger flüssige Conversation\n\nWenn du an\
  \ einem bestehenden Lead weiterarbeiten möchtest, nenne einfach kurz den Kunden\
  \ oder die Opportunity - ich habe ja Zugriff auf alle Kundendaten und kann sofort\
  \ anknüpfen!\n\nSoll ich dir helfen, einen Lead zu erstellen oder zu bearbeiten?\
  \ Einfach Kundenname oder Opportunity nennen."
