question: was ist das EBF
answer: "# Das Evidence-Based Framework (EBF)\n\nDas **Evidence-Based Framework (EBF)**\
  \ ist das **wissenschaftliche Fundament** von FehrAdvice – entwickelt seit 2010\
  \ in Zusammenarbeit mit der Universität Zürich (Prof. Ernst Fehr).\n\n## Das EBF\
  \ ist zwei Dinge gleichzeitig\n\n### 1️⃣ **Eine Wissensdatenbank**\nEine systematische,\
  \ kuratierte Sammlung wissenschaftlicher Erkenntnisse zu menschlichem Verhalten:\n\
  \n| Ressource | Anzahl |\n|-----------|--------|\n| **Papers (BibTeX)** | 2.347+\
  \ |\n| **Theorien** | 191 |\n| **Cases** | 852 |\n| **Kontextfaktoren (Schweiz)**\
  \ | 404+ |\n| **Parameter** | 64+ |\n\n### 2️⃣ **Ein Meta-Framework**\nEine Methodik,\
  \ mit der **jede wissenschaftliche Theorie** eingeordnet und **für die Praxis anwendbar**\
  \ gemacht werden kann.\n\n```\nDas EBF konkurriert NICHT mit Prospect Theory, Inequity\
  \ Aversion\noder anderen Theorien — es ORDNET sie ein und macht sie ANWENDBAR.\n\
  \nDas EBF ist kein Konkurrent — es ist der Ordnungsrahmen.\n```\n\n## Die zentrale\
  \ Innovation: Kontextualisierung\n\n### Traditionelle Sicht:\n```\nθ = Konstante\n\
  λ = 2.25 (immer gleich)\n\n\"Loss Aversion IST 2.25\"\n```\n\n### EBF-Sicht:\n```\n\
  θ = f(Ψ, 10C)\nλ(Ψ, 10C) = variabel\n\n\"Loss Aversion bei welfare + stigma = 2.5,\n\
  \ aber bei workplace + peers = 1.8\"\n\nDIE VARIATION IST NICHT NOISE — SIE IST\
  \ DAS SIGNAL!\n```\n\n## Die zentrale Gleichung\n\n```\nθ = f(Ψ, 10C)\n```\n\n**Verhalten\
  \ (θ) ist eine Funktion von:**\n- **Ψ** = Kontext (8 Dimensionen)\n- **10C** = 10\
  \ CORE-Dimensionen des BCM\n\n## Die 8 Kontext-Dimensionen (Ψ-Framework)\n\n| Symbol\
  \ | Dimension | Frage |\n|--------|-----------|-------|\n| **Ψ_I** | Institutional\
  \ | Welche Regeln, Gesetze, Defaults gelten? |\n| **Ψ_S** | Social | Wer ist dabei?\
  \ Welche sozialen Normen? |\n| **Ψ_C** | Cognitive | Müde? Gestresst? Aufmerksam?\
  \ Motiviert? |\n| **Ψ_K** | Cultural | Welche Werte, Traditionen, Religion? |\n\
  | **Ψ_E** | Economic | Budget? Zeit? Energie verfügbar? |\n| **Ψ_T** | Temporal\
  \ | Wann? Zeitdruck? Lebensphase? |\n| **Ψ_M** | Material | Technologie, Infrastruktur,\
  \ Objekte? |\n| **Ψ_F** | Physical | Wo physisch? Temperatur? Lärm? |\n\n## Epistemologische\
  \ Klarheit: Rollenverteilung\n\nDas EBF **validiert keine Theorien** – das tut die\
  \ Wissenschaft. Das EBF **kontextualisiert** sie.\n\n| Rolle | Wer | Was |\n|-------|-----|-----|\n\
  | **Validieren** | Wissenschaft | \"Ist die Theorie valide?\" (Falsifikation, Replikation)\
  \ |\n| **Kontextualisieren** | EBF | \"Wann und wo gilt sie?\" (Ψ + 10C Einordnung)\
  \ |\n| **Anwenden** | BCM | \"Wie nutzen wir sie für diesen Kunden?\" |\n\n## Die\
  \ Beziehung zum BCM\n\nDas **BCM** ist das **Beratungs-Tool** (seit 2010) – das\
  \ **EBF** liefert die **wissenschaftliche Tiefe**.\n\n```\nEBF = wissenschaftliche\
  \ Grundlage für die Weiterentwicklung des BCM\n\nNeues Paper erscheint \n  → EBF\
  \ ordnet es ein (Ψ + 10C + Parameter)\n  → BCM wird besser\n```\n\n**Möchtest du\
  \ tiefer in die 10C CORE-Dimensionen, die Parameter Context Transformation oder\
  \ konkrete Anwendungsbeispiele einsteigen?**"
