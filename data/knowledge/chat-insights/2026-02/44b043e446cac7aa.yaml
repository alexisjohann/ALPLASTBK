answer: '# FAP KRISENSTRATEGIE: Optimale Positionierung von Corinna


  ## KRISENSITUATION ANALYSE


  ### FAP''s Dilemma:

  - **Akute Kostenkrise** - jeder Franken zählt

  - **Plan A:** Zurück in Gewinnzone → alle Ressourcen behalten

  - **Plan B:** Minimalbetrieb mit nur Gerhard → drastische Cuts


  ### Corinnas Position:

  - **CHF 60.000 Fixkosten** (aktuell 100%)

  - **Hohe Expertise** in Behavioral Design

  - **2 Jahre bis AHV-Pension** (strategischer Faktor!)


  ---


  ## STRATEGISCHE OPTIONEN FÜR FAP


  ### 🎯 **OPTION 1: Sofortige Kostensenkung (50% Reduktion)**

  **Einsparung: CHF 30.000/Jahr**


  **Für FAP Krisenbewältigung:**

  - ✅ Sofortige Kostenentlastung

  - ✅ Expertise bleibt verfügbar

  - ❌ Noch immer CHF 30k Fixkosten


  ---


  ### 🎯 **OPTION 2: Variable Kostenstruktur (Mandatsbasis)**

  **Einsparung: CHF 60.000 Fixkosten + nur bei Bedarf**


  **Für FAP Krisenbewältigung:**

  - ✅ **Null Fixkosten** - maximale Flexibilität

  - ✅ Expertise nur bei bezahlten Projekten aktivieren

  - ✅ Bei Plan B: keine Kündigungskosten/Sozialplan

  - ❌ Risiko: Corinna macht andere Projekte


  ---


  ### 🎯 **OPTION 3: Hybrid-Überbrückung**

  **Kombination: Minimale Fixkosten + Projektbasis**


  **Für FAP Krisenbewältigung:**

  - ✅ Drastische Kostensenkung

  - ✅ Flexibilität je nach Auftragslage

  - ✅ Know-how-Sicherung für Aufschwung


  ---


  ## 💡 **STRATEGISCHE EMPFEHLUNG FÜR FAP**


  ### **SOFORT-MASSNAHME: Variable Kostenstruktur**


  **Warum das für FAP optimal ist:**


  1. **Liquiditäts-Rettung:** CHF 60k Fixkosten weg = mehr Überlebenszeit

  2. **Skalierbarkeit:** Bei Aufschwung sofort wieder aktivierbar

  3. **Plan B Flexibilität:** Keine Kündigungsprobleme

  4. **Risk Management:** Kosten nur wenn Umsatz da ist


  ### **Umsetzung:**

  - **Corinna-Gespräch:** "Wir brauchen dich, aber können Fixkosten nicht stemmen"

  - **Win-Win positionieren:** Mehr Stundenlohn, sie kann andere Kunden bedienen

  - **Retainer-Option:** Kleine monatliche Pauschale für Verfügbarkeit


  ### **Verhaltensökonomischer Rahmen:**

  - **Loss Aversion:** "Zusammenarbeit retten statt verlieren"

  - **Fairness:** Höhere Stundensätze als Kompensation

  - **Future Self:** Vorbereitung auf ihre AHV-Pension


  **FAZIT: Mandatsbasis = FAP''s beste Chance, die Krise zu überstehen UND Corinna
