question: 🔬 BCM-Modell bauen
answer: 'Perfekt! Lass uns ein Behavioral Change Model (BCM) entwickeln. Das BCM
  ist das Herzstück des Evidence-Based Frameworks und hilft uns, komplexe Verhaltensänderungen
  systematisch zu analysieren und zu gestalten.


  Für ein fundiertes BCM benötige ich zunächst einige Grundinformationen:


  **Kunde & Kontext:**

  - Für welchen Kunden entwickeln wir das Modell?

  - Welches spezifische Verhalten soll verändert werden?

  - Wer ist die Zielgruppe?


  **Verhaltensanalyse:**

  - Was ist der aktuelle Ist-Zustand?

  - Welcher Soll-Zustand wird angestrebt?

  - Welche Kontextfaktoren spielen eine Rolle?


  Sobald wir diese Basis haben, können wir die 8 Ψ-Dimensionen (Institutional, Social,
  Cognitive, Cultural, Economic, Temporal, Material, Physical) systematisch bewerten und
  daraus den Kontextvektor ableiten.


  Erzähl mir mehr über dein Projekt - dann können wir direkt loslegen!


