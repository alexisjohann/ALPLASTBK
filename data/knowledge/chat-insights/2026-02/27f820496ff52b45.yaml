question: darf ich rechtlich in dem Vertrag die stunden streichen?
answer: "## **RECHTLICHE ANALYSE: STREICHUNG DER ARBEITSSTUNDEN**\n\nBasierend auf\
  \ dem Schweizer Arbeitsvertrag für Florian Kollmar analysiere ich die rechtliche\
  \ Situation:\n\n## ✅ **JA, STREICHUNG IST GRUNDSÄTZLICH MÖGLICH**\n\n### **Rechtliche\
  \ Grundlage:**\n- **Art. 319 OR:** Arbeitszeit kann vertraglich vereinbart werden\n\
  - **Keine gesetzliche Mindestarbeitszeit** im Schweizer Arbeitsrecht\n- **Vertragsfreiheit**\
  \ erlaubt flexible Gestaltung\n\n### **Praktische Überlegungen:**\n\n#### **OPTION\
  \ 1: Vollständige Streichung**\n```\n\"Der AN nimmt mit Wirkung ab 01.06.2026 ihre\
  \ Tätigkeit mit einem \nBeschäftigungsgrad von 100% auf.\"\n```\n\n#### **OPTION\
  \ 2: Flexible Formulierung**\n```\n\"Der AN nimmt mit Wirkung ab 01.06.2026 ihre\
  \ Tätigkeit mit einem \nBeschäftigungsgrad von 100% auf. Die Arbeitszeit richtet\
  \ sich nach \nden betrieblichen Erfordernissen.\"\n```\n\n## ⚠️ **WICHTIGE RECHTLICHE\
  \ ASPEKTE**\n\n### **1. Arbeitsgesetz (ArG) bleibt anwendbar:**\n- **Höchstarbeitszeit:**\
  \ 45 Std/Woche (Büroarbeit)\n- **Überstundenzuschlag:** 25% (ab 45 Std/Woche)\n\
  - **Ruhezeiten** müssen eingehalten werden\n\n### **2. Lohnfortzahlung bei Krankheit:**\n\
  - Basiert auf **durchschnittlicher Arbeitszeit**\n- Bei flexibler Arbeitszeit: Durchschnitt\
  \ der letzten 12 Monate\n\n### **3. Überstundenregelung:**\n- Im Vertrag fehlt eine\
  \ **Überstundenklausel**\n- **Empfehlung:** Ergänzung hinzufügen\n\n## \U0001F4A1\
  \ **EMPFOHLENE ERGÄNZUNG**\n\nWenn Sie die Stunden streichen, sollten Sie ergänzen:\n\
  \n```\n\"Überstunden\nÜberstunden werden durch das Jahresgehalt abgegolten, sofern\
  \ sie \nim Rahmen der gesetzlichen Bestimmungen (ArG) liegen. Mehrarbeit \ndarüber\
  \ hinaus wird separat vergütet oder als Freizeit kompensiert.\"\n```\n\n## \U0001F4CB\
  \ **FAZIT**\n\n**Ja, Sie dürfen die Stundenangabe rechtlich streichen.** \n\n**Empfehlung:**\
  \ Behalten Sie den 100%-Beschäftigungsgrad bei und ergänzen Sie eine klare Überstundenregelung,\
  \ um spätere Unklarheiten zu vermeiden.\n\nSoll ich einen konkreten Formulierungsvorschlag\
  \ für die gesamte Klausel machen?"
