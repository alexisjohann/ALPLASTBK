  ### **Nächste Schritte für erste-bank Projekt:**\n\nDa wir uns in einer Projekt-Session\
  \ befinden, benötige ich noch:\n- **Projektbeschreibung/Ziele** - worum geht es\
  \ konkret?\n- **Projektteam** - wer soll zugeordnet werden?\n- **Zeitrahmen** -\
  \ geplante Start- und Endtermine?\n- **Projekttyp** - Beratung, Workshop, oder andere\
  \ Kategorie?\n\nSoll ich ein **Projektkürzel** für erste-bank vorschlagen (z.B.\
  \ EB001) und die fehlenden Projektdetails erfassen?"
