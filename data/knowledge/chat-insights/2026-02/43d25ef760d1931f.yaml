question: was ist EBF
answer: "# Was ist das EBF?\n\nDas **Evidence-Based Framework (EBF)** ist das wissenschaftliche\
  \ Fundament von FehrAdvice – eine systematische Ordnung von **30+ Jahren verhaltensökonomischer\
  \ Forschung** in ein praktisch anwendbares System.\n\n## Das EBF ist zwei Dinge\
  \ gleichzeitig\n\n### 1. **Eine Wissensdatenbank**\nEine kuratierte Sammlung wissenschaftlicher\
  \ Erkenntnisse zu menschlichem Verhalten:\n- **2.347 Papers** (systematisch eingeordnet)\n\
  - **153 Theorien** (von Prospect Theory bis Social Norms)\n- **852 Cases** (dokumentierte\
  \ Praxisanwendungen)\n- **404+ Kontextfaktoren** (Schweiz-spezifisch)\n- **64+ Parameter**\
  \ (messbare Verhaltensgrößen)\n\n### 2. **Ein Meta-Framework**\nEine Methodik, um\
  \ **jede wissenschaftliche Theorie** einzuordnen und **für die Praxis nutzbar**\
  \ zu machen.\n\n```\nDas EBF konkurriert NICHT mit Prospect Theory oder anderen\
  \ Theorien.\nEs ORDNET sie ein und macht sie ANWENDBAR.\n```\n\n## Die zentrale\
  \ Innovation: Kontextualisierung\n\n**Traditionelle Sicht:**\n```\nθ = Konstante\n\
  λ = 2.25 (immer gleich)\n\n\"Loss Aversion IST 2.25\"\n```\n\n**EBF-Sicht:**\n```\n\
  θ = f(Ψ, 10C)\nλ(Ψ, 10C) = variabel\n\n\"Loss Aversion bei welfare + stigma = 2.5\n\
  \ aber bei workplace + peers = 1.8\"\n\nDIE VARIATION IST NICHT NOISE — SIE IST\
  \ DAS SIGNAL!\n```\n\n## Die zentrale Formel\n\n```\nθ = f(Ψ, 10C)\n```\n\n**Verhalten\
  \ (θ) ist eine Funktion von:**\n- **Ψ** = Kontext (8 Dimensionen)\n- **10C** = 10\
  \ Kernparameter menschlicher Entscheidungen\n\n## Die 8 Kontext-Dimensionen (Ψ)\n\
  \n| Symbol | Dimension | Frage |\n|--------|-----------|-------|\n| **Ψ_I** | Institutional\
  \ | Welche Regeln, Gesetze, Defaults gelten? |\n| **Ψ_S** | Social | Wer ist dabei?\
  \ Welche sozialen Normen? |\n| **Ψ_C** | Cognitive | Müde? Gestresst? Aufmerksam?\
  \ |\n| **Ψ_K** | Cultural | Welche Werte, Traditionen, Religion? |\n| **Ψ_E** |\
  \ Economic | Budget? Zeit? Energie verfügbar? |\n| **Ψ_T** | Temporal | Wann? Zeitdruck?\
  \ Lebensphase? |\n| **Ψ_M** | Material | Technologie, Infrastruktur, Objekte? |\n\
  | **Ψ_F** | Physical | Wo physisch? Temperatur? Lärm? |\n\n## Die 10C CORE Framework\n\
  \nDie **10 Kernparameter**, die jede menschliche Entscheidung beschreiben:\n\n|\
  \ Parameter | Bedeutung | Frage |\n|-----------|-----------|-------|\n| **WHO**\
  \ | Akteur | Wer entscheidet? |\n| **WHAT** | Objekt | Worum geht es? |\n| **HOW**\
  \ | Prozess | Wie wird entschieden? |\n| **WHEN** | Timing | Wann muss entschieden\
  \ werden? |\n| **WHERE** | Ort | Wo findet die Entscheidung statt? |\n| **AWARE**\
  \ | Bewusstsein | Ist der Person das Problem bewusst? |\n| **READY** | Bereitschaft\
  \ | Will die Person etwas ändern? |\n| **STAGE** | Phase | In welcher Veränderungsphase?\
  \ |\n| **HIERARCHY** | Ebene | Individuum, Gruppe, Organisation? |\n| **EIT** |\
  \ Anreize | Economic, Informational, Temporal? |\n\n## Wie macht das EBF Theorien\
  \ praxistauglich?\n\n```\nNeue Studie erscheint\n    ↓\n1. 10C-Einordnung      \
  \   → Welche Dimensionen adressiert sie?\n    ↓\n2. Ψ-Kontextualisierung   → Unter\
  \ welchen Bedingungen gilt sie?\n    ���\n3. Parameter-Extraktion    → Welche messbaren\
  \ Werte liefert sie?\n    ↓\n4. Komplementaritäts-Analyse → Wie interagiert sie\
  \ mit anderen Theorien?\n    ↓\n5. Case-Zuordnung         → In welchen Praxisfällen\
  \ wurde sie angewendet?\n    ↓\n→ Theorie ist jetzt im BCM nutzbar\n```\n\n**Konkretes\
  \ Beispiel:**\n```\nStudie: \"Loss Aversion λ = 2.5 bei Welfare-Takeup\"\n\n→ EBF\
  \ ordnet ein:\n  10C:             AWARE + READY + WHEN\n  Ψ:               Ψ_I =\
  \ bureaucratic, Ψ_S = stigma_high\n  Parameter:       λ_R = 2.5 (RCT-validiert)\n\
  \  Komplementarität: γ(AWARE, WHEN) dokumentiert\n  Case:            Welfare Non-Takeup\
  \ Schweiz\n\n→ BCM-Berater wissen jetzt:\n  λ ist bei Stigma-Kontexten höher!\n\
  ```\n\n## Die Struktur des EBF\n\nDas EBF ist in **25 Kapitel** organisiert:\n\n\
  1. **Grundlagen** (Rational Choice, Bounded Rationality)\n2. **Entscheidungsarchitektur**\
  \ (Defaults, Framing, Nudging)\n3. **Soziale Präferenzen** (Fairness, Reciprocity)\n\
  4. **Zeitpräferenzen** (Hyperbolic Discounting)\n5. **Risikoeinstellungen** (Prospect\
  \ Theory)\n6. **Informationsverarbeitung** (Heuristics & Biases)\n7. **Soziale Normen**\
  \ (Conformity, Social Proof)\n8. ... bis 25\n\nJedes Kapitel enthält:\n- ✅ **Theorien**\
  \ mit formalen Modellen\n- ✅ **Parameter** mit Evidenz-Tier\n- ✅ **Cases** mit Anwendungsbeispielen\n\
  - ✅ **Papers** mit Ψ + 10C Einordnung\n\n## Was das EBF NICHT ist\n\n❌ **Nicht**\
  \ eine neue Verhaltenstheorie  \n❌ **Nicht** ein Konkurrent zu Prospect Theory etc.\
  \  \n❌ **Nicht** \"besser wissen\" als die Wissenschaft  \n\n✅ **Sondern:** Der\
  \ **Ordnungsrahmen**, der existierende Wissenschaft **kontextualisiert** und **nutzbar**\
  \ macht\n\n## Epistemologische Klarheit: Rollenverteilung\n\n| Rolle | Wer | Was\
  \ |\n|-------|-----|-----|\n| **Validieren** | Wissenschaft | \"Ist die Theorie\
  \ valide?\" (Falsifikation, Replikation) |\n| **Kontextualisieren** | EBF | \"Wann\
  \ und wo gilt sie?\" (Ψ + 10C Einordnung) |\n| **Anwenden** | BCM | \"Wie nutzen\
  \ wir sie für diesen Kunden?\" |\n\n```\nEBF sagt NICHT:  \"Prospect Theory ist\
  \ wahr\"\n\nEBF sagt:        \"Die Wissenschaft hat Prospect Theory validiert.\n\
  \                  In DIESEM Kontext (Ψ) gilt sie mit DIE"
