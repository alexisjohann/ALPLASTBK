question: was genau ist das BCM
answer: "## Das Behavioral Change Model (BCM)\n\nDas **Behavioral Change Model\
  \ (BCM)** ist ein vielschichtiges Konzept im Evidence-Based Framework, das sich\
  \ in zwei Hauptvarianten manifestiert:\n\n### 1. BCM als Behavioral Change Model\
  \ (Kontextdatenbank)\n\n**BCM2** ist die **zentrale Kontextdatenbank** des EBF mit\
  \ **400+ Kontextfaktoren** (Ψ-Dimensionen), die verhaltensökonomische Parameter\
  \ für spezifische Situationen kalibrieren.\n\n**Die drei BCM-Ebenen:**\n```\nBCM2_04_KON\
  \  →  MAKRO-KONTEXT (Land/Markt)\n├── 404 Faktoren für die Schweiz (CH)\n├── 5 Hauptachsen:\
  \ Demografie, Wirtschaft, Politik, Technologie, Sozio-Kultur\n└── Quellen: BFS,\
  \ SECO, SNB, ESS, WVS, gfs.bern, Sotomo\n\nBCM2_05_IND  →  INDIVIDUAL (Person)\n\
  ├── 48 Faktoren\n└── Alter, Geschlecht, Bildung, Persönlichkeit\n\nBCM2_06_META\
  \ →  ENTSCHEIDUNGSARCHITEKTUR\n├── 42 Faktoren\n└── Framing, Defaults, Timing, Kanäle\n\
  ```\n\n### 2. BCM als Behavioral Change Model (Verhaltensmodell)\n\nDas **probabilistische\
  \ Modell** zur Vorhersage von Verhaltensänderungen:\n\n```\nP(Verhaltensänderung)\
  \ = 10C Framework (BCM ist das 10C Framework, nicht W×A×C)\n```\n\n**Die 10C Dimensionen des BCM:**\n- **Willingness\
  \ (W)**: Intrinsische Motivation und Bereitschaft (\"Wollen\")\n- **AWARE (Awareness)**:\
  \ Verfügbare Fähigkeiten und Ressourcen (\"Können\")  \n- **Context (Ψ)**: 8 Kontextdimensionen\
  \ als Rahmenbedingungen (\"Dürfen\")\n\n### Praktisches Funktionsprinzip\n\n**Beispiel:\
  \ Loss Aversion (λ) im Schweizer Kontext**\n```\n1. Basis-Parameter: λ = 2.25 (Kahneman\
  \ & Tversky)\n2. MAKRO-Modifikator: λ_CH = λ × 1.1 (hohes Institutionenvertrauen)\n\
  3. INDIVIDUAL-Modifikator: 65-jährig → λ × 1.20\n4. META-Modifikator: Loss-Framing\
  \ → λ × 1.3\n→ Ergebnis: λ_final = 3.86\n```\n\n### Wissenschaftliche Fundierung\n\
  \n- **12 Primärquellen** mit 384 API-Endpoints\n- **Zeitreihen 2020-2040** für Prognosen\n\
  - **10C Framework** und **FEPSDE Matrix**\n- Basiert auf **10 Core Axiomen** des\
  \ EBF\n\n### Der entscheidende Unterschied\n\n**Standard-Modelle:** λ = 2.25 (konstant)\
  \  \n**BCM:** λ(Ψ, 10C) = variabel je nach Kontext\n\nDas BCM transformiert verhaltensökonomische\
  \ Theorie in ein **anwendbares Decision Support System**, das situationsspezifische,\
  \ evidenzbasierte Interventionen ermöglicht.\n\nHaben Sie eine spezifische Anwendung\
  \ im Blick, für die Sie das BCM einsetzen möchten?"
