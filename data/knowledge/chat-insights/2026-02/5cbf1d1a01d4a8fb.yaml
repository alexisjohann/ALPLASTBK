question: Erkläre Complementarity
answer: "**Complementarity** ist ein zentrales Konzept in der Behavioral Economics\
  \ und bezieht sich auf die wechselseitige Verstärkung verschiedener Elemente in\
  \ einem System oder einer Intervention.\n\n## Definition\nComplementarity beschreibt\
  \ das Phänomen, dass der Gesamteffekt zweier oder mehrerer Maßnahmen größer ist\
  \ als die Summe ihrer Einzeleffekte. Anders ausgedrückt: Die Kombination verschiedener\
  \ Ansätze kann synergistische Wirkungen erzeugen.\n\n## Anwendung in der Praxis\n\
  \n### 1. **Nudging und Policy Design**\n- Verschiedene Nudges verstärken sich gegenseitig\n\
  - Beispiel: Default-Setting + soziale Normen + Timing können zusammen stärkere Verhaltensänderungen\
  \ bewirken als einzeln\n\n### 2. **Decision Architecture**\n- Strukturelle und psychologische\
  \ Interventionen ergänzen sich\n- Systemische Veränderungen werden durch verhaltenswissenschaftliche\
  \ Erkenntnisse optimiert\n\n### 3. **Organisationsentwicklung**\n- Komplementäre\
  \ Maßnahmen in verschiedenen Unternehmensbereichen\n- HR-Policies + Incentive-Strukturen\
  \ + Kultur-Initiativen\n\n## Relevanz für das Evidence-Based Framework\nComplementarity\
  \ ist wichtig für:\n- **Design** effektiver Interventionen\n- **Evaluation** von\
  \ Multi-Component-Programmen  \n- **Skalierung** erfolgreicher Ansätze\n\nDie Berücksichtigung\
  \ von Complementarity ermöglicht es, robustere und wirksamere Lösungen zu entwickeln,\
  \ die über einfache Einzelmaßnahmen hinausgehen."
