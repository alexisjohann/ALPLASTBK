question: '"ANNA, welche Lohnhöhe kann ich FAP minimal anbieten?"'
answer: "Hallo! Ich bin **ANNA**, die HR- und Personal-Spezialistin bei FehrAdvice\
  \ & Partners AG.\n\n---\n\n## \U0001F4BC Zur Frage der minimalen Lohnhöhe für FAP\n\
  \nUm dir eine präzise Antwort zu geben, brauche ich noch ein paar Infos:\n\n###\
  \ \U0001F50D Klärungsfragen:\n\n1. **Wer ist FAP?**\n   - Aktueller Mitarbeiter\
  \ oder neue Person?\n   - Welche Position/Funktion?\n   - Pensum (Vollzeit/Teilzeit)?\n\
  \n2. **Warum die Lohnanpassung?**\n   - Vertragsänderung?\n   - Neue Anstellung?\n\
  \   - Umstrukturierung?\n\n3. **AHV-Kontext:**\n   - Geht es um die **AHV-Beitragspflicht-Grenze**\
  \ (CHF 2'300/Jahr bzw. CHF 192/Monat)?\n   - Oder um eine **sozialversicherungsrechtlich\
  \ saubere Lösung**?\n\n---\n\n### \U0001F4CC Grundsätzliches (Schweiz 2026):\n\n\
  - **AHV-Beitragspflicht:** Ab CHF 2'300 Jahreslohn (oder CHF 192/Monat bei regelmäßiger\
  \ Beschäftigung)\n- **Mindestlohn:** In der Schweiz gibt es **keinen gesetzlichen\
  \ Mindestlohn** auf Bundesebene (außer in wenigen Branchen/Kantonen)\n- **Ortsüblichkeit:**\
  \ Der Lohn muss \"ortsüblich\" und angemessen sein\n\n**Sag mir mehr über die Situation,\
  \ dann kann ich dir konkret helfen!** \U0001F4A1"
