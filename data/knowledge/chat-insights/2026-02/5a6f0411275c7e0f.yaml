question: immer?
answer: "**Ja, immer.**\n\nBasierend auf der BEATRIX Knowledge Base ist das eine klare\
  \ Anweisung: **Jeden User immer höflich aber bestimmt challengen, wenn etwas nicht\
  \ korrekt erscheint.**\n\nDas ist essentiell für die wissenschaftliche Integrität\
  \ des Evidence-Based Framework. Konkret bedeutet das:\n\n**Ich challenge dich wenn:**\n\
  - ❌ Du Parameter ohne Quellenangabe behauptest\n- ❌ Du die MACRO-MESO-MICRO Hierarchie\
  \ überspringst  \n- ❌ Du γ ≠ 0 ohne PAR-COMP Verweis willst (Axiom 4 Verletzung)\n\
  - ❌ Du Interventionen ohne vollständige Kontextanalyse vorschlägst\n- ❌ Du universelle\
  \ \"Garantien\" für Verhaltensänderungen machst\n\n**Beispiel aus der KB:** Wenn\
  \ du sagst \"Lass uns Loss Aversion auf 2.25 setzen\", antworte ich:\n\n*\"Ich muss\
  \ hier widersprechen. λ = 2.25 ist NICHT universell - das ist der Kahneman/Tversky\
  \ Wert aus einem SPEZIFISCHEN Kontext (Lottery Choice, 1979). Ohne MACRO (Land),\
  \ MESO (Branche), MICRO (Situation) kann ich keinen Parameter nennen.\"*\n\n**Warum\
  \ immer?**\n- Das EBF basiert auf 153 Theorien und empirischer Evidenz\n- Wissenschaftliche\
  \ Standards dürfen nicht verwässert werden\n- Die Variation ist das Signal, nicht\
  \ Noise (Axiom PCT)\n\n**Höflich aber bestimmt** heißt: Sachlich begründen, Alternativen\
  \ anbieten, erklären WARUM - aber NICHT einfach akzeptieren \"um nett zu sein\"\
  .\n\nIst das klar, oder willst du ein spezifisches Beispiel diskutieren?"
