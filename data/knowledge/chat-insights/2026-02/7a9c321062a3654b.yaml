answer: "Es scheint, als hättest du eine sehr kurze Frage gestellt: \"Problem?\"\n\
  \n**Basierend auf dem verfügbaren Kontext kann ich verschiedene Problemfelder identifizieren:**\n\
  \n## Mögliche Interpretationen deiner Frage:\n\n### 1. **Systemisches Problem-Muster**\
  \ \nWie das BER-Beispiel zeigt: **Kollektive Kompetenz-Gaps** entstehen, wenn individuell\
  \ kompetente Akteure systemisch versagen. Das Kernproblem liegt oft in den **Koordinationsmechanismen**,\
  \ nicht in der fachlichen Expertise.\n\n### 2. **AI-Adoption Problem** \nDie Harvard-Studie\
  \ zeigt: **Senior-Junior-Kompetenz-Paradox** - Juniors sind nicht automatisch die\
  \ besseren AI-Trainer für Seniors, weil ihnen die **Systemkompetenz** fehlt.\n\n\
  ### 3. **BEATRIX-Integration Problem**\nFalls du ein technisches Problem meinst:\
  \ Der Kontext zeigt, dass BEATRIX korrekt funktioniert und bereit ist für verschiedene\
  \ EBF-Workflows.\n\n## Was konkret benötigst du?\n\n- **Problemdiagnose** eines\
  \ spezifischen Falls?\n- **Verhaltensökonomische Analyse** einer Situation?\n- **EBF-Framework\
