question: das ist unser AT Reglement, kannst du dir das merken? WI möchten das CH
  Regiment auch anpassen, natürlich alles nach Vorschrift aber es soll in beiden Reglementen
  dasselbe enthalten sein.
answer: "## \U0001F4CB **ÖSTERREICHISCHES AT-REGLEMENT ERFASST UND GESPEICHERT**\n\
  \nVielen Dank! Ich habe das österreichische Reglement erfasst und kann nun bei der\
  \ Harmonisierung mit dem Schweizer CH-Reglement helfen.\n\n### **\U0001F50D KERNUNTERSCHIEDE\
  \ ZWISCHEN AT UND CH ERFASST:**\n\n**Arbeitsrechtliche Basis:**\n- **AT:** 40h-Woche,\
  \ 14 Gehaltszahlungen, 25 Urlaubstage\n- **CH:** Flexiblere Arbeitszeit, 13. Monatslohn,\
  \ 20+ Ferientage\n\n**Besonderheiten AT-Reglement:**\n- **\"Dankeschön für die Treue\"\
  :** EUR 15.000 nach 3 Jahren + EUR 30.000 nach 7 Jahren\n- **Projektausgleichstage:**\
  \ Staffelung 2→3→5 Tage je nach Betriebsjahr\n- **E-Mail-Kündigung:** Explizit erlaubt\
  \ (in CH oft nur schriftlich)\n\n### **\U0001F3AF NÄCHSTE SCHRITTE FÜR CH-HARMONISIERUNG:**\n\
  \n**Wenn Sie das CH-Reglement teilen, kann ich:**\n\n1. **Strukturelle Angleichung**\
  \ vorschlagen\n2. **Schweizer Arbeitsrecht** berücksichtigen (OR, ArG)\n3. **Inhaltliche\
  \ Harmonisierung** bei:\n   - Treuebonus-System (CHF-Äquivalent)\n   - Projektausgleichstage\n\
  \   - Kündigungsbestimmungen\n   - Geheimhaltung/IP-Regelungen\n\n4. **Beide Reglemente**\
  \ auf denselben **inhaltlichen Stand** bringen\n\n**Haben Sie bereits ein CH-Reglement,\
  \ oder soll ich beim Erstellen helfen basierend auf der AT-Vorlage?**\n\n---\n\n\
  **Strukturierte Daten (reglement):** {\"country\": \"AT\", \"company\": \"FehrAdvice\
  \ & Partners Austria GmbH\", \"weekly_hours\": 40, \"salary_payments\": 14, \"vacation_days\"\
  : 25, \"probation_months\": 3, \"loyalty_bonus_1\": 15000, \"loyalty_bonus_2\":\
  \ 30000, \"project_compensation_days\": \"2-3-5\", \"termination_notice\": \"1 month\"\
  , \"effective_date\": \"2026-02-17\"}"
