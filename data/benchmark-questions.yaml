# EBF Benchmark Questions: Claude vs. OpenAI
# SSOT fuer Vergleichsfragen
#
# Kategorien:
#   EBF-CORE     - EBF-spezifische Fragen (10C, Kontext, Parameter)
#   BEHAVIORAL   - Allgemeine Verhaltensoekonomie
#   FORECAST     - Prognosen und Vorhersagen
#   CONTEXTUAL   - Kontextabhaengige Analysen
#   PRACTICAL    - Praxisfragen (Interventionen, Nudges)
#
# Usage:
#   python scripts/benchmark_llm_compare.py --config data/benchmark-questions.yaml
#   python scripts/benchmark_llm_compare.py --config data/benchmark-questions.yaml --id BQ-001
#   python scripts/benchmark_llm_compare.py --config data/benchmark-questions.yaml --list

metadata:
  version: "1.0"
  created: "2026-02-16"
  total_questions: 10
  description: "EBF Benchmark-Fragen fuer LLM-Vergleich"

# System prompt fuer BEIDE Modelle (fairer Vergleich)
system_prompt: |
  Du bist ein Experte fuer Verhaltensoekonomie und evidenzbasierte Politikberatung.
  Antworte praezise, strukturiert und mit Quellenangaben wo moeglich.
  Verwende Zahlen und Parameter wenn verfuegbar.

questions:
  # --- EBF CORE ---
  - id: BQ-001
    category: EBF-CORE
    question: |
      Was ist Loss Aversion und wie variiert der Lambda-Parameter
      je nach Kontext? Gib konkrete Beispiele fuer verschiedene
      Kontexte (z.B. Finanzen, Gesundheit, Energie) mit
      unterschiedlichen Lambda-Werten.
    expected_aspects:
      - "Lambda ist NICHT konstant (nicht immer 2.25)"
      - "Kontextabhaengigkeit erkennen"
      - "Verschiedene Werte fuer verschiedene Domaenen"

  - id: BQ-002
    category: EBF-CORE
    question: |
      Erklaere den Unterschied zwischen additivem und multiplikativem
      Zusammenwirken von Verhaltensfaktoren. Wann ist Additivitaet
      der Default und wann ist Multiplikativitaet gerechtfertigt?
      Gib Beispiele fuer beides.
    expected_aspects:
      - "Additivitaet als Default"
      - "Multiplikativitaet nur bei Veto-Logik (f=0 → Y=0)"
      - "Exclusion Principle Konzept"

  # --- BEHAVIORAL ---
  - id: BQ-003
    category: BEHAVIORAL
    question: |
      Wie interagieren soziale Normen und finanzielle Anreize?
      Erklaere das Crowding-Out Problem mit konkreten Beispielen
      und quantitativen Schaetzungen.
    expected_aspects:
      - "Motivation Crowding Out (Frey & Jegen)"
      - "Gneezy & Rustichini Daycare Experiment"
      - "Negative Komplementaritaet gamma < 0"

  - id: BQ-004
    category: BEHAVIORAL
    question: |
      Was sind die wichtigsten Erkenntnisse von Ernst Fehr
      zur Verhaltensoekonomie? Nenne seine Top-5 Beitraege
      mit den jeweiligen Kernergebnissen.
    expected_aspects:
      - "Inequity Aversion (Fehr & Schmidt 1999)"
      - "Reziprozitaet und Fairness"
      - "Experimentelle Arbeitsmarktoekonomie"

  # --- CONTEXTUAL ---
  - id: BQ-005
    category: CONTEXTUAL
    question: |
      Vergleiche das Sparverhalten in der Schweiz, Deutschland
      und Oesterreich. Welche kulturellen, institutionellen und
      oekonomischen Kontextfaktoren erklaeren die Unterschiede?
    expected_aspects:
      - "3-Saeulen-System Schweiz"
      - "Kulturelle Faktoren (Vertrauen, Individualismus)"
      - "Institutionelle Defaults (Opt-in vs Opt-out)"

  - id: BQ-006
    category: CONTEXTUAL
    question: |
      Ist das Alevitentum naeher am Zoroastrismus oder am
      sunnitischen Islam? Begruende deine Antwort anhand
      messbarer Verhaltensdimensionen, nicht nur Theologie.
    expected_aspects:
      - "Verhaltensparametrischer Vergleich"
      - "Synkretismus-Toleranz als Haupttreiber"
      - "Quantitative Distanzmessung"

  # --- FORECAST ---
  - id: BQ-007
    category: FORECAST
    question: |
      Ein Schweizer Kantonalbank mit 45% Marktanteil und
      67% Zinsabhaengigkeit plant eine digitale Transformation.
      Prognostiziere die Adoptionsrate nach 12 Monaten und
      identifiziere die 3 wichtigsten Hebel.
    expected_aspects:
      - "Langsame Adoption wegen Kantonalbank-Konservativismus"
      - "Kulturelle Identitaet als Hebel"
      - "Plattform Cross-Selling als staerkste Intervention"

  - id: BQ-008
    category: FORECAST
    question: |
      Wie hoch ist die Wahrscheinlichkeit, dass eine
      Opt-out Organspende-Regelung in der Schweiz die
      Spenderrate um mehr als 20% erhoeht? Begruende
      mit empirischer Evidenz.
    expected_aspects:
      - "Default-Effekte (Johnson & Goldstein)"
      - "Schweizer Spezifika (Mismatch, Referenden)"
      - "Quantitative Schaetzung mit Unsicherheit"

  # --- PRACTICAL ---
  - id: BQ-009
    category: PRACTICAL
    question: |
      Designe eine evidenzbasierte Intervention um den
      Heizungsersatz in Schweizer Einfamilienhaeusern zu
      beschleunigen. Welche Verhaltensmechanismen nutzt du
      und warum?
    expected_aspects:
      - "Loss Framing (Wertverlust der Immobilie)"
      - "Soziale Normen (Nachbarschaftseffekte)"
      - "Default-Angebote (Pre-configured Offerten)"
      - "Kontextspezifische Parameter"

  - id: BQ-010
    category: PRACTICAL
    question: |
      Ein Unternehmen will die Mitarbeiter-Weiterbildungsquote
      von 30% auf 60% erhoehen. Welche 3 Interventionen
      empfiehlst du und in welcher Reihenfolge? Begruende
      mit Verhaltensoekonomie.
    expected_aspects:
      - "Default-Enrollment (Opt-out)"
      - "Social Proof (Teamleiter als Vorbilder)"
      - "Commitment Devices (Pre-Commitment)"
      - "Sequenzierung begruenden"
