# DR-DATAREQ: Quellenregister
# Version: 1.0
# Letzte Aktualisierung: 2026-01-23

sources:
  # =============================================================================
  # DACH - Statistische Ämter
  # =============================================================================

  bfs:
    name: "Bundesamt für Statistik (Schweiz)"
    country: CH
    type: sdmx
    base_url: "https://www.pxweb.bfs.admin.ch/api/v1/de/px-x-0602010000_101"
    api_docs: "https://www.bfs.admin.ch/bfs/de/home/dienstleistungen/forschung/api.html"
    update_frequency: monthly
    data_format: json
    indicators:
      - id: unemployment
        name: "Arbeitslosenquote"
        unit: percent
      - id: gdp
        name: "BIP"
        unit: chf_millions
      - id: population
        name: "Bevölkerung"
        unit: persons

  statistik_austria:
    name: "Statistik Austria"
    country: AT
    type: rest
    base_url: "https://data.statistik.gv.at/web/meta.jsp"
    api_docs: "https://www.statistik.at/web_de/services/statistische_datenbank/index.html"
    update_frequency: monthly
    data_format: json
    indicators:
      - id: unemployment
        name: "Arbeitslosenquote"
        unit: percent
      - id: gdp
        name: "BIP"
        unit: eur_millions

  destatis:
    name: "Statistisches Bundesamt (Deutschland)"
    country: DE
    type: genesis
    base_url: "https://www-genesis.destatis.de/genesisWS/rest/2020/"
    api_docs: "https://www-genesis.destatis.de/genesis/online"
    update_frequency: monthly
    data_format: json
    credentials_required: true
    indicators:
      - id: unemployment
        name: "Arbeitslosenquote"
        unit: percent
      - id: gdp
        name: "BIP"
        unit: eur_millions

  # =============================================================================
  # DACH - Zentralbanken
  # =============================================================================

  snb:
    name: "Schweizerische Nationalbank"
    country: CH
    type: rest
    base_url: "https://data.snb.ch/api/cube"
    api_docs: "https://data.snb.ch/de/help"
    update_frequency: monthly
    data_format: json
    indicators:
      - id: interest_rate
        name: "Leitzins"
        unit: percent
      - id: inflation
        name: "Inflation"
        unit: percent
      - id: exchange_rate_eur
        name: "Wechselkurs EUR/CHF"
        unit: ratio

  oenb:
    name: "Oesterreichische Nationalbank"
    country: AT
    type: rest
    base_url: "https://www.oenb.at/isadataservice/api/"
    update_frequency: monthly
    data_format: json
    indicators:
      - id: interest_rate
        name: "Leitzins (ECB)"
        unit: percent

  bundesbank:
    name: "Deutsche Bundesbank"
    country: DE
    type: rest
    base_url: "https://api.statistiken.bundesbank.de/rest/data/"
    api_docs: "https://www.bundesbank.de/de/statistiken/zeitreihen-datenbanken"
    update_frequency: monthly
    data_format: sdmx
    indicators:
      - id: interest_rate
        name: "Leitzins (ECB)"
        unit: percent

  # =============================================================================
  # International
  # =============================================================================

  oecd:
    name: "OECD"
    type: sdmx
    base_url: "https://sdmx.oecd.org/public/rest/data/"
    api_docs: "https://data.oecd.org/api/"
    update_frequency: quarterly
    data_format: sdmx
    indicators:
      - id: trust_government
        name: "Trust in Government"
        dataset: "GOV"
      - id: well_being
        name: "Well-Being Indicators"
        dataset: "BLI"

  owid:
    name: "Our World in Data"
    type: github
    base_url: "https://raw.githubusercontent.com/owid/owid-datasets/master/"
    update_frequency: daily
    data_format: csv
    indicators:
      - id: co2_emissions
        name: "CO2 Emissions"
      - id: life_expectancy
        name: "Life Expectancy"

  eurostat:
    name: "Eurostat"
    type: rest
    base_url: "https://ec.europa.eu/eurostat/api/dissemination/statistics/1.0/data/"
    api_docs: "https://ec.europa.eu/eurostat/web/main/data/web-services"
    update_frequency: monthly
    data_format: json
    indicators:
      - id: unemployment
        name: "Arbeitslosenquote EU"
        unit: percent

  ecb:
    name: "European Central Bank"
    type: sdmx
    base_url: "https://sdw-wsrest.ecb.europa.eu/service/data/"
    update_frequency: monthly
    data_format: sdmx
    indicators:
      - id: interest_rate
        name: "ECB Leitzins"
        unit: percent

  # =============================================================================
  # Akademische Datenbanken
  # =============================================================================

  ess:
    name: "European Social Survey"
    type: download
    base_url: "https://www.europeansocialsurvey.org/data/"
    update_frequency: biennial
    data_format: spss
    notes: "Manuelle Registrierung erforderlich"

  wvs:
    name: "World Values Survey"
    type: download
    base_url: "https://www.worldvaluessurvey.org/WVSDocumentationWV7.jsp"
    update_frequency: "5-yearly"
    data_format: spss

  # =============================================================================
  # Kontextdaten (Ψ-Dimensionen)
  # =============================================================================

  hofstede:
    name: "Hofstede Insights"
    type: static
    base_url: "https://www.hofstede-insights.com/country-comparison/"
    update_frequency: irregular
    data_format: manual
    psi_dimension: kappa_social
    notes: "Cultural dimensions - manuell extrahieren"

  wgi:
    name: "World Governance Indicators"
    type: download
    base_url: "https://info.worldbank.org/governance/wgi/"
    update_frequency: annual
    data_format: excel
    psi_dimension: kappa_inst
