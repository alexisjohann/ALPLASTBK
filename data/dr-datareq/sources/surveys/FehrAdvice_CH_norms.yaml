# FehrAdvice Swiss Social Norms Research
# Version: 1.0
# Quelle: FehrAdvice & Partners AG - Proprietary Research
# Letzte Aktualisierung: 2026-01-23
# EBF-Relevanz: κ_SOCIAL (Sozialer Kontext), BCM2_03_IDN (Identitätsnutzen)

metadata:
  name: "FehrAdvice Schweizer Soziale Normen"
  code: "FA_CH_NORM"
  version: "1.0"
  last_updated: "2026-01-23"
  source: "FehrAdvice & Partners AG"
  source_type: "Proprietary Research"
  url: "https://www.fehradvice.com"
  country: "Switzerland"
  methodology: "Empirische Normenforschung, Verhaltensökonomische Analyse"
  time_horizon: "2025"
  description: "Systematische Erfassung sozialer Normen in der Schweiz nach Lebensbereichen"

  # Datenstruktur
  clusters:
    - id: "Alltag"
      description: "Alltagsnormen im öffentlichen und privaten Raum"
      n_norms: 10
    - id: "Arbeit"
      description: "Berufliche und geschäftliche Verhaltensnormen"
      n_norms: 11
    - id: "Politik"
      description: "Politische Partizipation und demokratische Normen"
      n_norms: 3

  total_norms: 24

  # Messkonzept
  measurement:
    belief_scale: "0-5 (0=niemand hält sich daran, 5=alle halten sich daran)"
    enforcement_probability: "0-100% (Wahrscheinlichkeit der Sanktionierung)"
    eigen_effekt: "0-5 (persönliche Wichtigkeit der Norm)"

  # Norm-Typen nach spieltheoretischer Klassifikation
  norm_types:
    - type: "Kooperation"
      description: "Normen, die kollektives Handeln koordinieren"
    - type: "Koordination"
      description: "Normen, die Erwartungen abstimmen"
    - type: "Hybrid"
      description: "Normen mit Kooperations- und Koordinationselementen"

  # BCM-Kopplung
  bcm_coupling:
    primary: "BCM2_03_IDN"      # Identitätsnutzen (Normkonformität als Identität)
    secondary: "BCM2_04_KON"    # Kontextvektor (SOC-Achse)
    tertiary: "BCM2_02_KNU"     # Kollektiver Nutzen

  # EBF-Integration
  ebf_mapping:
    psi_dimension: "κ_SOCIAL"
    utility_dimension: "u_S (Social Utility)"
    gamma_relevance: "γ(Identity, Social) - Normen verstärken Identitätsnutzen"

