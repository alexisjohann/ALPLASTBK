    definition: "Föderale Aufgabenteilung zwischen Bund, Kantonen, Gemeinden bei der Umsetzung der Nachhaltigkeitsziele"
    kontext_ch: "Schweiz: stark föderale Struktur, über 2000 Gemeinden; Koordination anspruchsvoll, aber legitimationsstark"
    salienz: 0.85
    operationalisierung: "Existenz & Aktivität intergouvernementaler Gremien (Tripartite Agenda 2030, kantonale Nachhaltigkeitsstellen)"
    gruende_datenpunkt:
      - "Hohe Legitimation durch Einbezug aller Ebenen"
      - "Fragmentierungsrisiko bei kleinen Gemeinden"
      - "Verfassungsauftrag in Art. 73 BV"
    datenpunkt: "Verfassungsgrundlage vorhanden, aber operative Koordination heterogen"
    trend: "steigend"
    unsicherheit: "niedrig"
    risiko_chance: "beides"
    staerke_schwaeche: "beides"
