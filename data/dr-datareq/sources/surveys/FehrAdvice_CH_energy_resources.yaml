    datenpunkt: "11 TWh Nettoimport (2025)"
    trend: "volatil"
    unsicherheit: "mittel"
    risiko_chance: "Risiko"
    staerke_schwaeche: "Schwäche"
    beeinflussbarkeit: "niedrig"

