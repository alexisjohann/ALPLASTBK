    datenpunkt: "62% Strom aus Wasserkraft (2025)"
    trend: "steigend"
    unsicherheit: "mittel"
    risiko_chance: "Chance & Risiko"
    staerke_schwaeche: "Stärke"
    beeinflussbarkeit: "hoch"

  - id: CH1-F03
    faktor: "Elektrizitätsnetz-Integration & Systemstabilität (CH-EU)"
    definition: "Regulatorische & physische Anbindung ans EU-Stromnetz"
    kontext_ch: "Schweiz technisch integriert, aber ohne Stromabkommen"
    salienz: 0.95
    operationalisierung: "Stromimport-/Exportvolumen & Engpasskosten"
    gruende_datenpunkt:
