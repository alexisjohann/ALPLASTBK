metadata:
  name: "FehrAdvice Energie- & Ressourcenorientierung Schweiz"
  code: "FA_CH_ENR"
  version: "1.0"
  last_updated: "2026-01-23"
  source: "FehrAdvice & Partners AG"
  source_type: "Proprietary Research"
  url: "https://www.fehradvice.com"
  country: "Switzerland"
  methodology: "Energie-Policy-Analyse, Ressourcen-Mapping, Risiko-Assessment"
  time_horizon: "2025-2050"
  description: "Systematische Erfassung der Energie- und Ressourcenabhängigkeiten der Schweiz"

  # Messkonzept
  measurement:
    salienz_scale: "0-1 (0=irrelevant, 1=höchste Relevanz)"
    trend: ["steigend", "stabil", "fallend"]
    unsicherheit: ["niedrig", "mittel", "hoch"]
    risiko_chance: ["Risiko", "Chance", "Chance & Risiko"]
    staerke_schwaeche: ["Stärke", "Schwäche"]
    beeinflussbarkeit: ["niedrig", "mittel", "hoch"]

  # BCM-Kopplung
  bcm_coupling:
    primary: "BCM2_04_KON"      # Kontextvektor (TECH-Achse)
    secondary: "BCM2_02_KNU"    # Kollektiver Nutzen
    tertiary: "BCM2_01_INU"     # Individueller Nutzen

  # EBF-Integration
  ebf_mapping:
    psi_dimension: "κ_INST, κ_ARCH"
    utility_dimension: "u_E (Environmental), u_F (Financial)"
    context_layer: "tech_ecological"

  total_factors: 10

# =============================================================================
# ENERGIE- & RESSOURCENORIENTIERUNG FAKTOREN (10 Faktoren)
# =============================================================================
factors:

  - id: CH1-F01
    faktor: "Energieimportabhängigkeit & Versorgungsdiversifikation"
    definition: "Anteil importierter Energie und Herkunftsverteilung"
    kontext_ch: "Schweiz importiert >75% ihrer Energie (v.a. Öl & Gas); hohe Importkonzentration auf EU"
    salienz: 1.0
    operationalisierung: "Importanteil & Herkunftsverteilung nach Energieträgern"
    gruende_datenpunkt:
      - "Fehlende fossile Eigenproduktion"
      - "EU-Integration im Stromhandel"
      - "Politisch stabile, aber dichte Abhängigkeit"
    datenpunkt: "76% Energieimportquote (2025)"
    trend: "stabil"
    unsicherheit: "niedrig"
    risiko_chance: "Risiko"
    staerke_schwaeche: "Schwäche"
    beeinflussbarkeit: "mittel"

  - id: CH1-F02
    faktor: "Inländische Erzeugungsstruktur & Selbstversorgungsgrad"
    definition: "Anteil erneuerbarer, inländischer Energieproduktion"
    kontext_ch: "60% Strom aus Wasserkraft, aber Defizite bei Winterstrom & Speicher"
    salienz: 0.9
    operationalisierung: "Anteil erneuerbarer Energieproduktion"
    gruende_datenpunkt:
