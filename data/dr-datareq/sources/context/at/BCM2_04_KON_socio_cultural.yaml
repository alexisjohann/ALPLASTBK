# ═══════════════════════════════════════════════════════════════════════════════
# HIST: Historical Trauma & Collective Memory
# ═══════════════════════════════════════════════════════════════════════════════
# Source: Ochsner & Roesel (2024) "Activated History"
# Related Case: CAS-870
# Geographic Data: data/geographic/ottoman-pillage-1683.yaml
# ═══════════════════════════════════════════════════════════════════════════════
HIST:
  name: Historical Trauma & Collective Memory
  description: Latent historical factors that can be activated by political campaigns
  factor_count: 6
  factors:
  - id: AT-HIST-01
    name: Ottoman Pillage Memory
    definition: Collective memory of Ottoman sieges (1529/1683) in eastern Austria
    trend: aktivierbar
    uncertainty: mittel
    geographic_scope: "Burgenland, Niederösterreich (690 Gemeinden)"
    activation_status:
      pre_2005: dormant
      post_2005: activated
      trigger: "FPÖ anti-Islam campaign"
    values:
      dormant_period: "1683-2005 (322 years)"
      activation_year: 2005
      fpoe_effect_pp: "+1.6 to +3.05"
      explained_vote_share: "~10% in pillaged municipalities"
    source: "Ochsner & Roesel (2024), AEJ: Applied Economics"
    geographic_data: "data/geographic/ottoman-pillage-1683.yaml"
    related_case: "CAS-870"
  - id: AT-HIST-02
    name: Habsburg Imperial Identity
    definition: Residual identification with Habsburg multicultural empire
    trend: fallend
    uncertainty: hoch
    values:
      2020: 15.0
      2024: 12.0
      2025: 11.0
      2030: 8.0
      2035: 6.0
      2040: 5.0
    unit: '%'
    source: ESS / Historische Studien
    note: "Generational decline, strongest in Vienna and former imperial cities"
  - id: AT-HIST-03
    name: Anschluss Memory
    definition: Awareness and framing of 1938 annexation by Nazi Germany
    trend: stabil
    uncertainty: mittel
    values:
      victim_narrative: 65.0
      perpetrator_acknowledgment: 72.0
      year: 2024
    unit: '%'
    source: SORA / Zeitgeschichte-Studien
    note: "Shift from pure victim narrative since Waldheim affair (1986)"
  - id: AT-HIST-04
    name: Neutrality Identity
    definition: Identification with Austrian neutrality (since 1955)
    trend: stabil
    uncertainty: gering
    values:
      2020: 78.0
      2024: 75.0
      2025: 74.0
      2030: 70.0
      2035: 68.0
      2040: 65.0
    unit: '%'
    source: SORA / Eurobarometer
    note: "Core element of post-war Austrian identity"
  - id: AT-HIST-05
    name: Geographic Trauma Encoding
    definition: Villages 'marked' by historical events in collective memory
    trend: latent
    uncertainty: hoch
    mechanism: |
      Historical trauma encoded in place names, local commemorations,
      oral history. Invisible in behavior until activated by political
      campaigns that make historical grievances salient.
    source: "Ochsner & Roesel (2024)"
    related_case: "CAS-870"
    ebf_implication: |
      Ψ_historical can remain dormant for centuries.
      γ(Ψ_historical, Ψ_political_campaign) >> 0 when activated.
  - id: AT-HIST-06
    name: Regional Identity Strength
    definition: Strength of regional vs. national identity
    trend: stabil
    uncertainty: gering
    values:
      bundesland_identity: 68.0
      national_identity: 72.0
      european_identity: 45.0
      year: 2024
    unit: '%'
    source: ESS / Eurobarometer
    regions_with_strong_historical_memory:
      - "Burgenland (Ottoman frontier)"
      - "Kärnten (Slovene minority)"
      - "Tirol (South Tyrol separation)"
      - "Vorarlberg (Alemannic identity)"

trend_clusters:
  steigend:
  - Postmaterialismus, Langzeitorientierung
  - Tertiärbildung, Digitale Kompetenz
  - Work-Life-Balance Präferenz
  - Gleichstellung, LGBTQ+ Akzeptanz
  - Online-Shopping, Streaming
  - Vegetarisch/Vegan, Bio-Konsum
  - Väterkarenz
  - Kinderlose Frauen
  fallend:
  - Religiosität, Kirchenbesuch
  - Traditionelles Familienbild
  - Print-Medien, TV-Nutzung
  - Vereinsmitgliedschaft
  - Raucherquote, Alkoholkonsum
  - Nachbarschaftskontakt
  stabil:
  - Lebenszufriedenheit (~7.5)
  - Interpersonelles Vertrauen (~42%)
  - Nationalstolz (~70%)
  - Freiwilligenarbeit (~45%)
  - Einwanderungs-Toleranz
  latent_aktivierbar:
  - Ottoman Pillage Memory (aktiviert 2005 durch FPÖ)
  - Geographic Trauma Encoding (Burgenland, NÖ)
  - Regional Historical Memory (Kärnten, Tirol)
