      - code: ENE
        name: "Energie"
        description: "Energiemix, Erneuerbare, Energiewende"
        factors: 13

      - code: MOB
        name: "Mobilität"
        description: "Verkehr, ÖV, E-Mobilität"
        factors: 13

      - code: KLI
        name: "Klima & Umwelt"
        description: "Emissionen, Klimaschutz, Biodiversität"
        factors: 13

      - code: INN
        name: "Innovation"
        description: "F&E, Patente, Start-ups"
        factors: 13

  # ---------------------------------------------------------------------------
  # SOZIO-KULTURELL (SOC) - 166 Faktoren (41%)
