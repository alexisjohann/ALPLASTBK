        description: "Gesundheitssystem, Prävention, Mental Health"
        factors: 14

      - code: MED
        name: "Medien & Information"
        description: "Mediennutzung, Vertrauen, Social Media"
        factors: 14

      - code: REL
        name: "Religion & Spiritualität"
