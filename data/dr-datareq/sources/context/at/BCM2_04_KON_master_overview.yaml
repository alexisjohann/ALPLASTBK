# =============================================================================
# Detailstruktur nach Hauptachse
# =============================================================================
structure:
  # ---------------------------------------------------------------------------
  # DEMOGRAFISCH (DEM) - 60 Faktoren
  # ---------------------------------------------------------------------------
  DEM:
    name: "Demografisch"
    total_factors: 60
    function: "Grundstruktur der Gesellschaft, Verstärkerachse für alle anderen Dimensionen"
    data_sources: ["Statistik Austria", "BMSGPK", "OeNB"]
    api_coverage: "100%"
    sub_axes:
      - code: DEM
        name: "Demografie"
        description: "Bevölkerung, Alter, Geburten, Sterblichkeit"
        factors: 10

      - code: MIG
        name: "Migration"
        description: "Zu-/Abwanderung, Integration, Diversität"
        factors: 10

      - code: PEN
        name: "Pensionierung"
        description: "Altersvorsorge, Pensionssystem, Umlageverfahren"
        factors: 10

      - code: SOZ
        name: "Soziale Sicherung"
        description: "Sozialversicherung, Transferleistungen"
        factors: 10

      - code: VER
        name: "Verteilung"
        description: "Regionale Verteilung, Stadt-Land, Bundesländer"
        factors: 10

      - code: EIG
        name: "Wohneigentum"
        description: "Eigentümerquote, Wohnformen, Genossenschaftswesen"
        factors: 10

  # ---------------------------------------------------------------------------
  # ÖKONOMISCH (ECO) - 54 Faktoren
  # ---------------------------------------------------------------------------
  ECO:
    name: "Ökonomisch"
    total_factors: 54
    function: "Materielle Grundlage, steuert Handlungsspielräume"
    data_sources: ["BMAW", "BMF", "OeNB", "WIFO", "IHS"]
    api_coverage: "100%"
    sub_axes:
      - code: ECO
        name: "Wirtschaft"
        description: "BIP, Wachstum, Konjunktur, Export"
        factors: 12

      - code: ARB
        name: "Arbeitsmarkt"
        description: "Beschäftigung, Arbeitslosigkeit, Kurzarbeit"
        factors: 12

      - code: EIN
        name: "Einkommen"
        description: "Löhne, Vermögen, Ungleichheit"
        factors: 10

      - code: WOH
        name: "Wohnen"
        description: "Immobilien, Mieten, Genossenschaftswesen"
        factors: 10

      - code: FIN
        name: "Finanzen"
        description: "Sparverhalten, Schulden, Finanzbildung"
        factors: 10

  # ---------------------------------------------------------------------------
  # INSTITUTIONELL-POLITISCH (POL) - 59 Faktoren
  # ---------------------------------------------------------------------------
  POL:
    name: "Institutionell-Politisch"
    total_factors: 59
    function: "Rahmenordnung, definiert Spielregeln und Vertrauen in Institutionen"
