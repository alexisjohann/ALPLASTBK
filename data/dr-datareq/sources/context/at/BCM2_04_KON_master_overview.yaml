    api_coverage: "100%"
    sub_axes:
      - code: VER
        name: "Vertrauen"
        description: "Institutionenvertrauen, Soziales Vertrauen"
        factors: 12

      - code: REG
        name: "Regierung"
        description: "Regierungseffektivität, Verwaltung, Föderalismus"
        factors: 12

      - code: POL
        name: "Politik"
        description: "Parteien, Wahlen, Ideologien"
        factors: 12

      - code: SOZ
        name: "Sozialpartnerschaft"
        description: "Korporatismus, Interessenverbände"
        factors: 11

      - code: INT
        name: "EU-Integration"
        description: "EU-Mitgliedschaft, Europapolitik"
        factors: 12

  # ---------------------------------------------------------------------------
  # TECHNOLOGISCH-ÖKOLOGISCH (TEC) - 65 Faktoren
  # ---------------------------------------------------------------------------
  TEC:
    name: "Technologisch-Ökologisch"
    total_factors: 65
