        description: "Generationenunterschiede, Altersgruppen"
        factors: 12

      - code: DIV
        name: "Diversität"
        description: "Pluralismus, Integration, Minderheiten"
        factors: 14

# =============================================================================
# Systemische Kopplung
# =============================================================================
systemic_coupling:
  diagram: |
    DEM --> ECO --> POL
     |       |       |
     +-------+-------+
             |
             v
           SOC <-- TEC

  description: |
    - Demografische Shifts multiplizieren ökonomische und soziale Effekte
    - Technologische Transformation beschleunigt alle Veränderungen
    - Sozio-kulturelle Achse bestimmt Vertrauenslogik
    - Sozialpartnerschaft (AT-spezifisch) als Puffer und Verstärker

