# BCM2_04_KON - Italienischer Kontextvektor: Master-Übersicht
# Version: 1.0
# Quelle: FehrAdvice Kontextvektor Italien 2026
# Letzte Aktualisierung: 2026-02-05
# EBF-Relevanz: Alle Ψ-Dimensionen

metadata:
  name: "Italienischer Kontextvektor Master-Übersicht"
  code: "BCM2_04_KON_IT"
  country: "IT"
  country_name: "Italien"
  version: "1.0 SCHNELL"
  total_factors: 50
  sub_axes: 15
  main_axes: 5
  description: "Grundstruktur für italienischen Verhaltenskontext 2025-2040"
  quantitative_coverage: "SCHNELL - 50 Kernfaktoren mit Zeitreihen"
  upgrade_path: "Erweiterbar auf STANDARD (400 Faktoren) oder VERTIEFT (400+)"

# =============================================================================
# DATENQUELLEN-ÜBERSICHT
# =============================================================================
data_sources:
  summary:
    primary_sources: 6
    secondary_sources: 4
    time_horizon: "2020-2040"
    update_frequency: "jährlich"

  primary_official:
    - name: "ISTAT (Istituto Nazionale di Statistica)"
      url: "https://www.istat.it"
      api: "https://esploradati.istat.it/SDMXWS/rest"
      coverage: "Demografie, Wirtschaft, Gesellschaft"
      factors_covered: 25

    - name: "Banca d'Italia"
      url: "https://www.bancaditalia.it"
      api: "https://www.bancaditalia.it/statistiche"
      coverage: "Finanzmarkt, Zinsen, Kredite, Wirtschaft"
      factors_covered: 8

    - name: "INPS (Istituto Nazionale Previdenza Sociale)"
      url: "https://www.inps.it"
      coverage: "Renten, Arbeitsmarkt, Sozialversicherung"
      factors_covered: 5

    - name: "MEF (Ministero dell'Economia e delle Finanze)"
      url: "https://www.mef.gov.it"
      coverage: "Staatshaushalt, Steuern, Schulden"
      factors_covered: 4

    - name: "MISE (Ministero delle Imprese e del Made in Italy)"
      url: "https://www.mise.gov.it"
      coverage: "Industrie, Handel, KMU"
      factors_covered: 3

    - name: "ISPRA (Istituto Superiore Protezione Ambiente)"
      url: "https://www.isprambiente.gov.it"
      coverage: "Umwelt, Klima, Energie"
      factors_covered: 5

  international:
    - name: "European Social Survey (ESS)"
      url: "https://www.europeansocialsurvey.org"
      coverage: "Werte, Vertrauen, soziale Einstellungen"
      factors_covered: 8

    - name: "World Values Survey (WVS)"
      url: "https://www.worldvaluessurvey.org"
      coverage: "Kulturelle Werte, Traditionen"
      factors_covered: 6

    - name: "Eurostat"
      url: "https://ec.europa.eu/eurostat"
      coverage: "EU-Vergleichsdaten"
      factors_covered: 10

    - name: "OECD"
      url: "https://data.oecd.org"
      coverage: "Wirtschaft, Bildung, Gesundheit"
      factors_covered: 8

# =============================================================================
# FAKTORENSTRUKTUR ÜBERSICHT
# =============================================================================
structure:
  main_axes:
    - code: "DEM"
      name: "Demografische Faktoren"
      file: "BCM2_04_KON_demographic.yaml"
      factors: 10

    - code: "ECO"
      name: "Wirtschaftliche Faktoren"
      file: "BCM2_04_KON_economic.yaml"
      factors: 10

    - code: "POL"
      name: "Institutionelle & Politische Faktoren"
      file: "BCM2_04_KON_institutional_political.yaml"
      factors: 10

    - code: "SOC"
      name: "Sozio-kulturelle Faktoren"
      file: "BCM2_04_KON_socio_cultural.yaml"
      factors: 12

    - code: "TEC"
      name: "Technologische & Ökologische Faktoren"
      file: "BCM2_04_KON_tech_ecological.yaml"
      factors: 8

# =============================================================================
# ITALIEN-SPEZIFISCHE CHARAKTERISTIKA (EBF-RELEVANT)
# =============================================================================
italy_specific:
  regional_divide:
    description: "Starkes Nord-Süd-Gefälle (Mezzogiorno)"
    north:
      gdp_per_capita: 38000
      unemployment: 5.2
      trust_institutions: 0.42
    south:
      gdp_per_capita: 19000
      unemployment: 14.8
      trust_institutions: 0.28
    ebf_implication: "Kontext-Multiplikatoren müssen regional differenziert werden"

  family_centrality:
    description: "Familie als primäre soziale Einheit"
    family_business_share: 0.85  # 85% aller Unternehmen
    multi_generational_housing: 0.33  # 33% leben mit Eltern
    ebf_implication: "WHO-Dimension stark auf Familie erweitert (U_FAM)"

  institutional_distrust:
    description: "Historisch niedriges Vertrauen in Institutionen"
    trust_government: 0.28
    trust_parliament: 0.22
    trust_eu: 0.38
    ebf_implication: "Default-Interventionen weniger effektiv, Social Proof wichtiger"

  shadow_economy:
    description: "Bedeutende Schattenwirtschaft"
    share_gdp: 0.12  # 12% des BIP
    cash_preference: 0.65  # 65% bevorzugen Bargeld
    ebf_implication: "Financial Incentives können Crowding-Out verstärken"

  bureaucracy_complexity:
    description: "Komplexe Bürokratie"
    business_start_days: 11
    tax_compliance_hours: 238
    ebf_implication: "Ψ_I (Institutional) als starker Modifier"

# =============================================================================
# EBF PARAMETER-ANPASSUNGEN FÜR ITALIEN
# =============================================================================
ebf_parameter_adjustments:
  loss_aversion:
    base_value: 2.25
    italy_modifier: 1.15  # Höher wegen Unsicherheit
    italy_value: 2.59
    source: "ESS Trust Data + Economic Uncertainty"

  discount_rate:
    base_value: 0.90
    italy_modifier: 0.95  # Höher (mehr Gegenwartspräferenz)
    italy_value: 0.855
    source: "WVS Time Preference Questions"

  social_norm_sensitivity:
    base_value: 1.0
    italy_modifier: 1.25  # Höher wegen Familienorientierung
    italy_value: 1.25
    source: "ESS Social Norms Module"

  default_effect:
    base_value: 1.0
    italy_modifier: 0.75  # Niedriger wegen Misstrauen
    italy_value: 0.75
    source: "Institutional Trust Correlation"
