    - id: IT-VAL-02
      name: "Uncertainty Avoidance"
      definition: "Hofstede Unsicherheitsvermeidung"
      trend: "stabil"
      uncertainty: "gering"
      values:
        current: 75
        ch_comparison: 58
        de_comparison: 65
      unit: "Index 0-100"
      source: "Hofstede Insights"
      note: "Hoch - erklärt Bürokratie-Toleranz"
