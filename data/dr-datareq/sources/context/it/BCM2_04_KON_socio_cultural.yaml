    - id: IT-VAL-03
      name: "Masculinity"
      definition: "Hofstede Maskulinität Index"
      trend: "fallend"
      uncertainty: "mittel"
      values:
        current: 70
        ch_comparison: 70
        de_comparison: 66
      unit: "Index 0-100"
