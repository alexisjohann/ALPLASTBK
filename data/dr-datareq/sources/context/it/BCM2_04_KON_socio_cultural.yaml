      name: "Individualismus"
      definition: "Hofstede Individualismus Index"
      trend: "stabil"
      uncertainty: "gering"
      values:
        current: 76
        ch_comparison: 68
        de_comparison: 67
      unit: "Index 0-100"
      source: "Hofstede Insights"
      note: "Hoch, aber Familie bleibt zentral"
