# =============================================================================
# TRU - Vertrauen (4 Faktoren)
# =============================================================================
TRU:
  name: "Vertrauen"
  description: "Institutionelles und soziales Vertrauen"
  factor_count: 4
  factors:
    - id: IT-TRU-01
      name: "Vertrauen Regierung"
      definition: "Anteil mit Vertrauen in nationale Regierung"
      trend: "volatil"
      uncertainty: "hoch"
      values:
        2020: 0.32
        2024: 0.28
        2025: 0.30
        2030: 0.32
        2035: 0.34
        2040: 0.35
      unit: "Anteil 0-1"
      source: "ESS/Eurobarometer"
      note: "Stark abhängig von aktueller Regierung"
      ebf_relevance: "KRITISCH - Niedriges Vertrauen reduziert Default-Effektivität"

    - id: IT-TRU-02
      name: "Vertrauen Parlament"
      definition: "Anteil mit Vertrauen in Parlament"
      trend: "stabil"
      uncertainty: "mittel"
      values:
        2020: 0.24
        2024: 0.22
        2025: 0.23
        2030: 0.25
        2035: 0.27
        2040: 0.28
      unit: "Anteil 0-1"
      source: "ESS"
      note: "Historisch sehr niedrig"

    - id: IT-TRU-03
      name: "Vertrauen EU"
      definition: "Anteil mit Vertrauen in EU-Institutionen"
      trend: "steigend"
      uncertainty: "hoch"
      values:
        2020: 0.34
        2024: 0.38
        2025: 0.40
        2030: 0.42
        2035: 0.44
        2040: 0.45
      unit: "Anteil 0-1"
      source: "Eurobarometer"
      note: "Höher als nationales Vertrauen"

    - id: IT-TRU-04
      name: "Interpersonelles Vertrauen"
      definition: "Allgemeines Vertrauen in andere Menschen"
      trend: "stabil"
      uncertainty: "mittel"
      values:
        2020: 0.29
        2024: 0.30
        2025: 0.30
        2030: 0.32
        2035: 0.33
        2040: 0.34
      unit: "Anteil 0-1"
      source: "ESS"
      note: "Niedriger als Nordeuropa (dort ~0.6)"
      ebf_relevance: "Beeinflusst Social Proof Interventionen"

# =============================================================================
# GOV - Governance (3 Faktoren)
# =============================================================================
GOV:
  name: "Governance"
  description: "Regierungsqualität und Bürokratie"
  factor_count: 3
  factors:
    - id: IT-GOV-01
      name: "Corruption Perception Index"
      definition: "Wahrgenommene Korruption (0=hoch, 100=niedrig)"
      trend: "steigend"
      uncertainty: "mittel"
      values:
        2020: 53
        2024: 56
        2025: 57
        2030: 60
        2035: 63
        2040: 65
      unit: "Index 0-100"
      source: "Transparency International"
      note: "Unter EU-Durchschnitt (~64)"

    - id: IT-GOV-02
      name: "Government Effectiveness"
      definition: "World Bank Governance Indicator"
      trend: "steigend"
      uncertainty: "mittel"
      values:
        2020: 0.45
        2024: 0.52
        2025: 0.55
        2030: 0.60
        2035: 0.65
        2040: 0.68
      unit: "Index -2.5 bis +2.5"
      source: "World Bank WGI"

    - id: IT-GOV-03
      name: "Bürokratische Belastung"
      definition: "Stunden für Steuererfüllung pro Jahr"
      trend: "fallend"
      uncertainty: "mittel"
      values:
        2020: 238
        2024: 210
        2025: 200
        2030: 170
        2035: 150
        2040: 130
      unit: "Stunden/Jahr"
      source: "World Bank Doing Business"
      note: "EU-Durchschnitt ~160 Stunden"
      ebf_relevance: "Hohe Bürokratie erhöht Ψ_I Friction"

