# BCM2_04_KON – Deutscher Kontextvektor: Master Overview
# Version: 1.0
# Quelle: FehrAdvice Kontextvektor Deutschland 2026
# Letzte Aktualisierung: 2026-01-26
# Status: API-INFRASTRUKTUR DEFINIERT - DATENERHEBUNG PENDING

metadata:
  name: "Kontextvektor Deutschland"
  code: "BCM2_04_KON"
  country: "DE"
  version: "1.0"
  last_updated: "2026-01-26"
  status: "API_READY"

  # Zielstruktur (analog CH/AT)
  target:
    total_factors: 400
    api_coverage: ">90%"
    layers: 5
    sub_axes_per_layer: "5-15"

# =============================================================================
# PRIMÄRE DATENQUELLEN (KRITISCH)
# =============================================================================
primary_data_sources:

  official_statistics:
    - name: "Statistisches Bundesamt (Destatis)"
      url: "https://www.destatis.de"
      api: "https://www-genesis.destatis.de/genesis/online"
      api_type: "REST/SOAP"
      api_docs: "https://www-genesis.destatis.de/genesis/misc/GENESIS-Webservices.pdf"
      coverage: ["demographic", "economic", "tech_ecological"]
      priority: "KRITISCH"

    - name: "Bundesagentur für Arbeit"
      url: "https://statistik.arbeitsagentur.de"
      api: "https://statistik.arbeitsagentur.de/DE/Navigation/Statistiken/Statistiken-Nav.html"
      coverage: ["economic", "demographic"]
      priority: "KRITISCH"

    - name: "Deutsche Bundesbank"
      url: "https://www.bundesbank.de"
      api: "https://api.statistiken.bundesbank.de/rest/data"
      api_type: "REST"
      coverage: ["economic"]
      priority: "KRITISCH"

  research_panels:
    - name: "SOEP (Sozio-oekonomisches Panel)"
      url: "https://www.diw.de/soep"
      api: "https://www.diw.de/de/diw_01.c.619052.de/soep.html"
      coverage: ["socio_cultural", "economic"]
      priority: "KRITISCH"
      note: "Deutschlands wichtigstes Haushaltspanel seit 1984"

    - name: "ALLBUS (GESIS)"
      url: "https://www.gesis.org/allbus"
      api: "https://www.gesis.org/allbus/inhalte-suche/studienprofile"
      coverage: ["socio_cultural", "institutional_political"]
      priority: "KRITISCH"
      note: "Allgemeine Bevölkerungsumfrage seit 1980"

  eu_international:
    - name: "Eurostat"
      url: "https://ec.europa.eu/eurostat"
      api: "https://ec.europa.eu/eurostat/api"
      coverage: ["ALL"]
      priority: "KRITISCH"

    - name: "European Social Survey (ESS)"
      url: "https://www.europeansocialsurvey.org"
      api: "https://www.europeansocialsurvey.org/data/"
      coverage: ["socio_cultural"]
      priority: "KRITISCH"

# =============================================================================
# SEKUNDÄRE DATENQUELLEN
# =============================================================================
secondary_data_sources:

  economic_research:
    - name: "ifo Institut"
      url: "https://www.ifo.de"
      api: "https://www.ifo.de/ifo-zeitreihen"
      coverage: ["economic"]
      key_indicators: ["Geschäftsklimaindex", "Konjunkturprognosen"]

    - name: "ZEW Mannheim"
      url: "https://www.zew.de"
      api: "https://www.zew.de/publikationen/zew-konjunkturerwartungen"
      coverage: ["economic"]
      key_indicators: ["ZEW-Konjunkturerwartungen"]

    - name: "GfK"
      url: "https://www.gfk.com/de"
      api: "https://www.gfk.com/de/insights"
      coverage: ["economic", "socio_cultural"]
      key_indicators: ["Konsumklima", "Kaufkraft"]

  government_agencies:
    - name: "Umweltbundesamt (UBA)"
      url: "https://www.umweltbundesamt.de"
      api: "https://www.umweltbundesamt.de/daten"
      coverage: ["tech_ecological"]

    - name: "Bundesnetzagentur"
      url: "https://www.bundesnetzagentur.de"
      api: "https://www.smard.de/home/downloadcenter"
      coverage: ["tech_ecological"]

    - name: "Kraftfahrt-Bundesamt"
      url: "https://www.kba.de"
      api: "https://www.kba.de/DE/Statistik/statistik_node.html"
      coverage: ["tech_ecological"]

  polling_institutes:
    - name: "Infratest dimap"
      url: "https://www.infratest-dimap.de"
      coverage: ["institutional_political"]
      note: "Keine öffentliche API - manuelle Erhebung"

    - name: "Forsa"
      url: "https://www.forsa.de"
      coverage: ["institutional_political", "socio_cultural"]

    - name: "Forschungsgruppe Wahlen"
      url: "https://www.forschungsgruppe.de"
      coverage: ["institutional_political"]

