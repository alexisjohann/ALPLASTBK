      - BIL: "Bildung & Kompetenz"
      - GES: "Gesundheit & Wohlbefinden"
      - MED: "Medien & Information"
      - KON: "Konsum & Lifestyle"
      - SOZ: "Soziale Beziehungen"
      - CUL: "Kultur & Freizeit"
      - GLO: "Globalisierung & Offenheit"
      - SMI: "Soziale Medien"
      - GEN: "Gender & Diversität"
    primary_sources:
      - "SOEP"
      - "ALLBUS"
      - "ESS"
      - "WVS"
      - "Eurobarometer"

  tech_ecological:
    name: "Technologische & Ökologische Ebene"
    file: "BCM2_04_KON_tech_ecological.yaml"
    status: "PENDING"
    target_factors: 65
    sub_axes:
      - DIG: "Digitalisierung"
      - KI: "Künstliche Intelligenz"
      - ENE: "Energie & Klima"
