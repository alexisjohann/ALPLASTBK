# =============================================================================
# ZUSAMMENFASSUNG
# =============================================================================
summary:
  total_sources: 35
  with_api: 28
  api_coverage: "80%"
  critical_sources:
    - "Destatis (GENESIS)"
    - "Eurostat"
    - "SOEP (DIW)"
    - "GESIS/ALLBUS"
    - "ifo Institut"
    - "ESS/WVS"
    - "Umweltbundesamt"
    - "Eurobarometer"
  
  coverage_by_layer:
    demographic: ["Destatis", "BiB", "BAMF", "RKI"]
    economic: ["Destatis", "Bundesbank", "BA", "ifo", "DIW", "GfK", "DIHK"]
    institutional_political: ["GESIS", "Infratest", "Forsa", "Transparency"]
    socio_cultural: ["SOEP", "ESS", "WVS", "ALLBUS", "Eurobarometer"]
    tech_ecological: ["UBA", "BNetzA", "KBA", "BSI", "Bitkom", "ARD/ZDF"]

