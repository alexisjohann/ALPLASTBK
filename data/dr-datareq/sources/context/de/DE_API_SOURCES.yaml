# Deutsche Datenquellen für BCM2 Kontextvektoren
# Version: 1.0
# Erstellt: 2026-01-26
# Zweck: API-First Approach - Quellen vor Datenerhebung definieren

metadata:
  description: "Kuratierte Liste deutscher Datenquellen für Verhaltensparameter"
  approach: "API-first: Quellen identifizieren → APIs testen → Faktoren ableiten"
  target_factors: 400
  target_api_coverage: ">90%"

# =============================================================================
# OFFIZIELLE STATISTIK
# =============================================================================
official_statistics:
  
  - name: "Statistisches Bundesamt (Destatis)"
    url: "https://www.destatis.de"
    api: "https://www-genesis.destatis.de/genesis/online"
    api_docs: "https://www-genesis.destatis.de/genesis/misc/GENESIS-Webservices.pdf"
    data_types:
      - "Bevölkerung, Demografie"
      - "Wirtschaft, BIP, Preise"
      - "Arbeitsmarkt"
      - "Einkommen, Konsum"
      - "Bildung"
      - "Gesundheit"
      - "Umwelt, Energie"
    format: "JSON, CSV, XLSX"
    update_frequency: "monatlich bis jährlich"
    priority: "KRITISCH"
    coverage:
      - demographic
      - economic
      - tech_ecological

  - name: "Bundesagentur für Arbeit (BA)"
    url: "https://www.arbeitsagentur.de"
    api: "https://statistik.arbeitsagentur.de"
    data_types:
      - "Arbeitslosigkeit"
      - "Beschäftigung"
      - "Ausbildungsmarkt"
      - "Fachkräfte"
    format: "CSV, XLSX"
    update_frequency: "monatlich"
    priority: "HOCH"
    coverage:
      - economic
      - demographic

  - name: "Bundesbank"
    url: "https://www.bundesbank.de"
    api: "https://api.statistiken.bundesbank.de/rest/data"
    api_docs: "https://www.bundesbank.de/dynamic/action/de/statistiken/zeitreihen-datenbanken/zeitreihen-datenbank/759778/759778"
    data_types:
      - "Zinsen, Geldpolitik"
      - "Wechselkurse"
      - "Bankstatistiken"
      - "Zahlungsverkehr"
    format: "JSON, CSV, SDMX"
    update_frequency: "täglich bis monatlich"
    priority: "HOCH"
    coverage:
      - economic

