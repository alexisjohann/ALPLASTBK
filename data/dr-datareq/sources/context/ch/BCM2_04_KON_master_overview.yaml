# =============================================================================
# Detailstruktur nach Hauptachse
# =============================================================================
structure:
  # ---------------------------------------------------------------------------
  # DEMOGRAFISCH (DEM) – 60 Faktoren (v1.2)
  # ---------------------------------------------------------------------------
  DEM:
    name: "Demografisch"
    total_factors: 60
    function: "Grundstruktur der Gesellschaft, Verstärkerachse für alle anderen Dimensionen"
    data_sources: ["BFS", "SECO", "BSV", "KOF"]
    api_coverage: "100%"
    sub_axes:
      - code: DEM
        name: "Demografie"
        description: "Bevölkerung, Alter, Geburten, Sterblichkeit"

      - code: MIG
        name: "Migration"
        description: "Zu-/Abwanderung, Integration, Diversität"

      - code: PEN
        name: "Pensionierung"
        description: "Altersvorsorge, Rentensysteme, AHV"

      - code: AHV
        name: "AHV-Prognoseunsicherheit"
        description: "BSV-Szenarien, Modellabhängigkeit, epistemische Unsicherheit"
        note: "NEU Januar 2026 - 4 Faktoren"
        factors:
          - "CH-DEM-AHV-01: AHV-Ausgabenwachstum (+45% bis 2040)"
          - "CH-DEM-AHV-02: Pensionierungsverhalten (Babyboomer Peak 2028–2034)"
          - "CH-DEM-AHV-03: Umlageergebnis (negativ ab 2026)"
          - "CH-DEM-AHV-04: Modellabhängigkeit (±15-20% Bandbreite)"

      - code: VER
        name: "Verteilung"
        description: "Regionale Verteilung, Stadt-Land"

      - code: EIG
        name: "Wohneigentum & Gebäudebesitz"
        description: "Eigentümerstrukturen, STWE, Trigger-Momente"
        note: "NEU v1.2 für BFE - 7 Faktoren"
        factors:
          - "CH-EIG-01: Wohneigentumsquote (36-38%)"
          - "CH-EIG-02: Eigentümer EFH (~1.1 Mio)"
          - "CH-EIG-03: Eigentümer MFH (~200k)"
          - "CH-EIG-04: Stockwerkeigentümer (~500k, steigend)"
          - "CH-EIG-05: STWE-Entscheidungskomplexität"
          - "CH-EIG-06: Immobilien-Erbschaften (WHEN-Trigger)"
          - "CH-EIG-07: Immobilien-Transaktionen (WHEN-Trigger)"

  # ---------------------------------------------------------------------------
  # ÖKONOMISCH (ECO) – 54 Faktoren
  # ---------------------------------------------------------------------------
  ECO:
    name: "Ökonomisch"
    total_factors: 54
    function: "Materielle Grundlage, steuert Handlungsspielräume"
    data_sources: ["SECO", "SNB", "BFS", "KOF", "BAK Economics"]
    api_coverage: "100%"
    sub_axes:
      - code: ECO
        name: "Wirtschaft allgemein"
        description: "BIP, Wachstum, Konjunktur"

      - code: ECO2
        name: "Finanzwirtschaft"
        description: "Bankensektor, Kapitalmarkt, Zinsen"

      - code: MAN
        name: "Unternehmensführung"
        description: "Management, Governance, Strategie"

      - code: RES
        name: "Ressourcen"
        description: "Kapital, Vermögen, Erbschaften"

      - code: ARB
        name: "Arbeit"
        description: "Arbeitsmarkt, Erwerbsformen, Löhne"

  # ---------------------------------------------------------------------------
  # INSTITUTIONELL-POLITISCH (POL) – 59 Faktoren
  # ---------------------------------------------------------------------------
  POL:
    name: "Institutionell-Politisch"
    total_factors: 59
    function: "Rahmenordnung, definiert Spielregeln und Vertrauen in Institutionen"
    data_sources: ["Bundeskanzlei", "BFS", "BJ", "World Bank WGI", "Transparency International", "FINMA"]
    api_coverage: "100%"
    sub_axes:
      - code: POL
        name: "Politik"
        description: "Parteien, Wahlen, Ideologien"

      - code: GOV
        name: "Regierung"
        description: "Staat, Verwaltung, Föderalismus"

      - code: JUS
        name: "Justiz"
        description: "Rechtssystem, Regulierung, Compliance"

      - code: ORG
        name: "Organisationen"
        description: "NGOs, Verbände, Institutionen"

      - code: MIL
        name: "Sicherheit"
        description: "Verteidigung, Polizei, Zivilschutz"

  # ---------------------------------------------------------------------------
  # TECHNOLOGISCH-ÖKOLOGISCH (TEC) – 65 Faktoren (v1.2)
  # ---------------------------------------------------------------------------
  TEC:
    name: "Technologisch-Ökologisch"
    total_factors: 65
    function: "Transformationstreiber, höchste Dynamik"
    data_sources: ["BFS", "BFE", "BAFU", "WIPO", "GII", "IMD", "Suissetec", "FWS"]
    api_coverage: "100%"
    sub_axes:
      - code: TEC
        name: "Technologie"
        description: "Digitalisierung, Automatisierung"

      - code: INF
        name: "Infrastruktur"
        description: "Netzwerke, Mobilität, Smart Cities"

      - code: KI
        name: "Künstliche Intelligenz"
        description: "AI, Machine Learning, Algorithmen"

      - code: CYB
        name: "Cybersicherheit"
        description: "Datenschutz, IT-Security, Risiken"

      - code: CLI
        name: "Klima/Umwelt"
        description: "Nachhaltigkeit, Energie, ESG"

      - code: BLD
        name: "Gebäudebestand & Sanierung"
        description: "Gebäudealter, Sanierungsraten, Handwerkerkapazität"
        note: "NEU v1.2 für BFE - 8 Faktoren"
        factors:
          - "CH-BLD-01: Gebäudealtersstruktur (58% vor 1980)"
          - "CH-BLD-02: Energetische Sanierungsrate (1-3% p.a.)"
          - "CH-BLD-03: Heizungstypen-Verteilung fossil"
          - "CH-BLD-04: Wärmepumpen-Marktanteil"
          - "CH-BLD-05: Installateur-/Handwerkerkapazität"
          - "CH-BLD-06: Wärmepumpen-Installationswartezeit"
          - "CH-BLD-07: GEAK-Durchdringung"
          - "CH-BLD-08: Impulsberatungen durchgeführt"

      - code: HZG
        name: "Heizungsersatz-Dynamik"
        description: "Trigger-Momente, Ersatzzyklen, Wechselraten"
        note: "NEU v1.2 für BFE M2 - 5 Faktoren"
        factors:
          - "CH-HZG-01: Heizungs-Ersatzzyklen (21-22 Jahre)"
          - "CH-HZG-02: Notfall-Ersatz-Quote (ungeplant)"
          - "CH-HZG-03: Fossile Heizungen Bestand absolut"
          - "CH-HZG-04: Jährlicher Heizungsersatz-Bedarf"
          - "CH-HZG-05: Fossil-zu-Erneuerbar Wechselrate"

  # ---------------------------------------------------------------------------
  # SOZIO-KULTURELL (SOC) – 166 Faktoren (43%)
  # ---------------------------------------------------------------------------
  SOC:
    name: "Sozio-Kulturell"
    total_factors: 166
    percentage: 43
    function: "Grösste Achse – Werte, Identität und Zugehörigkeit. Bestimmt 'weiche' Vertrauensfaktoren"
    data_sources: ["BFS", "ESS", "WVS", "gfs.bern", "Sotomo", "ZHAW", "OBSAN"]
    api_coverage: "100%"
    sub_axes:
      - code: SOC
        name: "Gesellschaftsstruktur & Zusammenhalt"
        description: "Kohäsion, Solidarität, Ehrenamt"
        factors: 12

      - code: SOZ
        name: "Sozialstruktur & Diversität"
        description: "Ungleichheit, Gerechtigkeit, Inklusion"
        factors: 10

      - code: CUL
        name: "Kultur, Freizeit & Werte"
        description: "Kulturkonsum, Kreativwirtschaft"
        factors: 10

      - code: REL
        name: "Religion & Spiritualität"
        description: "Konfessionen, Glaube, Säkularisierung"
        factors: 10

      - code: MED
        name: "Medien & Kommunikation"
        description: "Vertrauen, Fake News, Social Media"
        factors: 10

      - code: SPR
        name: "Sprache & Kommunikation"
        description: "Mehrsprachigkeit, Dialekte"
        factors: 10

      - code: HUM
        name: "Humanismus & Menschenbild"
        description: "Empathie, Hilfsbereitschaft"
        factors: 12

      - code: ETH
        name: "Ethik & Verantwortung"
        description: "Moral, Integrität, Fairness"
        factors: 12

      - code: GEO
        name: "Regionalität & Raumbezug"
        description: "Heimat, Lokalstolz"
        factors: 12

      - code: GLO
        name: "Globalisierung & Offenheit"
        description: "Kosmopolitismus, Auslandsbezug"
        factors: 12

      - code: SMI
        name: "Soziale Medien & Identität"
        description: "Selbstdarstellung, Vergleichsdruck"
        factors: 12

      - code: SHA
        name: "Gesundheit & Selbstwahrnehmung"
        description: "Wellbeing, Mental Health"
        factors: 14

      - code: CRE
        name: "Kreativität & Sinnstiftung"
        description: "Selbstverwirklichung"
        factors: 10

      - code: WEL
        name: "Werteorientierung & Lebenssinn"
        description: "Gutes Leben, Arbeit & Familie"
        factors: 10

