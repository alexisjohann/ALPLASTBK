# =============================================================================
# SIMILARITY-SCORING FÜR "10 MILLIONEN SCHWEIZ"
# =============================================================================
similarity_analysis:

  target_abstimmung:
    name: "10 Millionen Schweiz Initiative"
    typ: "VI"
    thema: "MIG"

    profile:
      emotionalitaet: 0.80
      komplexitaet: 0.40
      lager: "OFFEN_VS_KONSERV"
      wirtschaft_position: "STARK_DAGEGEN"
      kampagnen_intensitaet: 0.75  # erwartet

  similarity_scores:

    - referenz: "ABS-2020-09-27-BEGRENZ"
      score: 0.92
      gewicht_fuer_baseline: 0.40
      gruende:
        - "Gleiches Thema (Migration/PFZ)"
        - "Gleiche Initianten-Nähe (SVP)"
        - "Ähnliche Kampagnen-Konstellation"
        - "Aber: Corona-Kontext fehlt 2025"

    - referenz: "ABS-2014-02-09-MEI"
      score: 0.85
      gewicht_fuer_baseline: 0.30
      gruende:
        - "Migrations-Thema"
        - "Ähnliche Emotionalisierung"
        - "Aber: 10 Jahre her, Kontext anders"
        - "Warnung: MEI gewann trotz Wirtschafts-Nein"

    - referenz: "ABS-2014-11-30-ECOPOP"
      score: 0.70
      gewicht_fuer_baseline: 0.15
      gruende:
        - "Bevölkerungs-Thema"
        - "Quantitatives Ziel (wie 10 Mio)"
        - "Aber: Ecopop war extremer"

    - referenz: "ABS-2024-02-09-13AHV"
      score: 0.55
      gewicht_fuer_baseline: 0.15
      gruende:
        - "Anderes Thema, aber ähnliche Dynamik"
        - "Warnung für emotionale Mobilisierung"
        - "Wirtschaftsargumente wirkungslos"

  baseline_berechnung:
    formel: |
      V₀(Nein) = Σ [gewicht_i × nein_prozent_i × adjustment_i]

    berechnung:
      - referenz: "Begrenzung"
        gewicht: 0.40
        nein: 61.7
        adjustment: 0.95  # Ohne Corona-Effekt etwas tiefer
        beitrag: 23.4

      - referenz: "MEI"
        gewicht: 0.30
        nein: 49.7
        adjustment: 1.05  # Heute mehr Bilaterale-Bewusstsein
        beitrag: 15.7

      - referenz: "Ecopop"
        gewicht: 0.15
        nein: 74.1
        adjustment: 0.85  # 10-Mio weniger extrem als Ecopop
        beitrag: 9.4

      - referenz: "13. AHV (invers)"
        gewicht: 0.15
        nein: 41.8
        adjustment: 1.10  # Warnung für Emotionalisierung
        beitrag: 6.9

    resultat:
      V0_nein: 55.4
      konfidenzintervall: [48, 62]
      interpretation: |
        Baseline 55% Nein - leichter Vorteil für economiesuisse,
        aber MEI-Warnung (50.3% Ja trotz Wirtschafts-Nein) zeigt Risiko.
        Bei starker Emotionalisierung kann Ja gewinnen.

# =============================================================================
# PARAMETER-KALIBRIERUNG AUS HISTORISCHEN DATEN
# =============================================================================
parameter_calibration:

  kampagnen_effektivitaet:
    description: "α = Prozentpunkt-Änderung pro Mio CHF Kampagnenbudget"

    historische_schaetzungen:
      - abstimmung: "Begrenzung 2020"
        delta_nein: +8
        budget_nein_mio: 12
        alpha: 0.0067

      - abstimmung: "MEI 2014"
        delta_nein: -3
        budget_nein_mio: 10
        alpha: -0.003  # Negativ - Kampagne half nicht

      - abstimmung: "AHV21 2022"
        delta_nein: +4
        budget_nein_mio: 8
        alpha: 0.005

      - abstimmung: "13. AHV 2024"
        delta_nein: -6
        budget_nein_mio: 6
        alpha: -0.01  # Negativ - Kampagne half nicht

    aggregiert:
      alpha_nein_erfolg: 0.012  # Bei erfolgreichen Kampagnen
      alpha_nein_misserfolg: -0.005  # Bei Misserfolgen (emotional)

      fazit: |
        Kampagnen-Effektivität stark abhängig von Thema.
        Bei rationalen Themen: α ≈ 0.010-0.015
        Bei emotionalen Themen: α kann negativ sein!

  segment_persuadability:
    description: "π = Anteil des Segments, der Meinung ändern kann"

    historische_schaetzungen:
      mitte:
        MEI_2014: 0.65
        Begrenzung_2020: 0.75
        AHV_2024: 0.70
        durchschnitt: 0.70

      wirtschaftsnah:
        MEI_2014: 0.10
        Begrenzung_2020: 0.08
        AHV_2024: 0.05
        durchschnitt: 0.08

      besorgt:
        MEI_2014: 0.45
        Begrenzung_2020: 0.40
        AHV_2024: 0.35
        durchschnitt: 0.40

      svp_nah:
        MEI_2014: 0.05
        Begrenzung_2020: 0.05
        AHV_2024: 0.08
        durchschnitt: 0.06

  regionale_faktoren:
    description: "Regionale Abweichung vom Durchschnitt"

    muster:
      tessin:
        migrations_themen: +15  # 15pp mehr Ja als Durchschnitt
        wirtschafts_themen: +5
        sozial_themen: +3

      romandie:
        migrations_themen: -8  # 8pp weniger Ja als Durchschnitt
        wirtschafts_themen: -3
        sozial_themen: +5

      de_ch_rural:
        migrations_themen: +8
        wirtschafts_themen: -2
        sozial_themen: +3

      de_ch_urban:
        migrations_themen: -5
        wirtschafts_themen: -5
        sozial_themen: -2

# =============================================================================
# FRÜHWARNINDIKATOREN
# =============================================================================
early_warning_indicators:

  description: |
    Signale, die auf ungünstigen Ausgang hindeuten

  indikatoren:

    - id: "EW-001"
      name: "Tessin-Signal"
      description: "Wenn Tessin >60% Ja in Umfragen → Warnung"
      threshold: 0.60
      historische_validitaet: 0.85

    - id: "EW-002"
      name: "Emotionalisierungs-Spirale"
      description: "Wenn Medien-Sentiment stark negativ für Nein"
      threshold: -0.3
      historische_validitaet: 0.70

    - id: "EW-003"
      name: "Mitte-Drift"
      description: "Wenn Mitte-Segment in Umfragen Richtung Ja driftet"
      threshold: -5  # 5pp Verschlechterung
      historische_validitaet: 0.80

    - id: "EW-004"
      name: "Wirtschafts-Irrelevanz"
      description: "Wenn Wirtschaftsargumente in Umfragen nicht verfangen"
      threshold: 0.30  # <30% finden Wirtschaftsargumente relevant
      historische_validitaet: 0.75

# =============================================================================
# METADATEN
# =============================================================================
_validation:
  min_abstimmungen: 10
  min_detail_coverage: 0.80

_changelog:
  - version: "1.0.0"
    date: "2026-01-30"
    author: "Claude/EBF"
    changes: "Initial creation mit 8 Referenz-Abstimmungen"

_next_updates:
  - "Weitere historische Abstimmungen hinzufügen"
  - "VOX-Daten für Segment-Analyse integrieren"
  - "Gemeinde-Ebene Daten (BFS opendata)"
