# =============================================================================
# BCM2 KONTEXTVEKTOR: Schweizer Volksabstimmungen
# =============================================================================
# Version: 1.0.0
# Typ: MACRO-Ebene Kontextdatenbank
# Verwendung: Baseline & Parameter für Abstimmungs-Prognosemodelle
# Last Updated: 2026-01-30
# =============================================================================

metadata:
  name: "BCM2 Schweizer Volksabstimmungen Kontextvektor"
  code: "BCM2_07_ABS"
  layer: "macro"
  version: "1.0.0"
  last_updated: "2026-01-30"

  description: |
    Umfassende Datenbank historischer Schweizer Volksabstimmungen
    mit Vergleichbarkeits-Dimensionen für Prognosemodelle.

    Ermöglicht:
    - Baseline-Berechnung für neue Abstimmungen
    - Parameter-Kalibrierung (α, π, θ, δ)
    - Vergleichbarkeits-Scoring
    - Regionale Muster-Analyse

  data_sources:
    primary:
      - name: "BFS Abstimmungsstatistik"
        url: "https://www.bfs.admin.ch/bfs/de/home/statistiken/politik/abstimmungen.html"
        coverage: "1848-heute, alle eidg. Abstimmungen"
      - name: "Swissvotes"
        url: "https://swissvotes.ch"
        coverage: "Detailanalysen, Kampagnendaten"
    secondary:
      - name: "gfs.bern VOX-Analysen"
        coverage: "Nachbefragungen, Segment-Analyse"
      - name: "Sotomo"
        coverage: "Umfragen, Panel-Daten"

  total_abstimmungen: 700  # ca. seit 1848
  detailliert_erfasst: 50  # mit vollständiger Analyse

  ebf_mapping:
    primary_10c: ["WHO", "WHAT", "WHEN", "AWARE"]
    primary_psi: ["Ψ_I", "Ψ_K", "Ψ_S", "Ψ_T"]

# =============================================================================
# VERGLEICHBARKEITS-DIMENSIONEN (für Similarity-Scoring)
# =============================================================================
comparability_dimensions:

  description: |
    8 Dimensionen zur Berechnung der Ähnlichkeit zwischen Abstimmungen.
    Similarity Score = Σ (weight_i × similarity_i) für alle Dimensionen.

  dimensions:

    D1_thema:
      name: "Thematische Kategorie"
      weight: 0.25
      categories:
        - id: "MIG"
          name: "Migration & Personenfreizügigkeit"
          keywords: ["Zuwanderung", "Ausländer", "Asyl", "Personenfreizügigkeit"]
        - id: "EU"
          name: "EU & Bilaterale"
          keywords: ["Bilaterale", "EU", "EWR", "Rahmenabkommen"]
        - id: "SOZ"
          name: "Sozialwerke & Renten"
          keywords: ["AHV", "IV", "Renten", "Sozialversicherung"]
        - id: "STEU"
          name: "Steuern & Finanzen"
          keywords: ["Steuer", "Budget", "Schulden"]
        - id: "UMW"
          name: "Umwelt & Energie"
          keywords: ["Klima", "Energie", "Atomkraft", "Biodiversität"]
        - id: "GES"
          name: "Gesundheit"
          keywords: ["Krankenkasse", "Prämien", "Gesundheit"]
        - id: "WIRT"
          name: "Wirtschaft & Arbeit"
          keywords: ["Arbeitsmarkt", "Mindestlohn", "Unternehmen"]
        - id: "SICH"
          name: "Sicherheit & Armee"
          keywords: ["Armee", "Sicherheit", "Neutralität"]
        - id: "SONST"
          name: "Andere"
          keywords: []

    D2_emotionalitaet:
      name: "Emotionalisierungsgrad"
      weight: 0.15
      scale: "[0, 1]"
      description: "Wie stark emotional aufgeladen ist das Thema?"
      indicators:
        - "Medien-Intensität"
        - "Persönliche Betroffenheit"
        - "Identitäts-Relevanz"
        - "Polarisierung"
      examples:
        high: ["Migration", "Renten", "Tierschutz"]
        medium: ["Steuern", "EU-Beziehungen"]
        low: ["Technische Vorlagen", "Verwaltungsreformen"]

    D3_komplexitaet:
      name: "Vorlagen-Komplexität"
      weight: 0.10
      scale: "[0, 1]"
      description: "Wie komplex ist die Vorlage zu verstehen?"
      indicators:
        - "Abstimmungsbüchlein-Länge"
        - "Juristische Komplexität"
        - "Anzahl betroffener Gesetze"
      effect: "Hohe Komplexität → höherer Status-Quo-Bias"

    D4_initiator:
      name: "Initiator-Typ"
      weight: 0.10
      categories:
        - id: "VI"
          name: "Volksinitiative"
          base_nein_tendency: 0.65  # Initiativen werden häufiger abgelehnt
        - id: "REF"
          name: "Referendum"
          base_nein_tendency: 0.55
        - id: "OBL"
          name: "Obligatorisches Referendum"
          base_nein_tendency: 0.45
        - id: "GEG"
          name: "Gegenentwurf"
          base_nein_tendency: 0.50

    D5_lager:
      name: "Politische Lager-Konstellation"
      weight: 0.15
      constellations:
        - id: "LINKS_VS_RECHTS"
          name: "Klassisch Links vs. Rechts"
          predictability: 0.70
        - id: "OFFEN_VS_KONSERV"
          name: "Offen vs. Konservativ"
          predictability: 0.65
        - id: "VOLK_VS_ELITE"
          name: "Volk vs. Elite/Establishment"
          predictability: 0.55  # Schwerer vorherzusagen
        - id: "REGIONAL"
          name: "Regionale Spaltung"
          predictability: 0.60
        - id: "UEBERPARTEILICH"
          name: "Überparteilicher Konsens"
          predictability: 0.80

    D6_wirtschaft_position:
      name: "Wirtschafts-Position"
      weight: 0.10
      description: "Wo steht die Wirtschaft (economiesuisse)?"
      positions:
        - id: "STARK_DAGEGEN"
          name: "Stark dagegen"
          mobilization: 0.90
        - id: "DAGEGEN"
          name: "Dagegen"
          mobilization: 0.70
        - id: "NEUTRAL"
          name: "Neutral/Stimmfreigabe"
          mobilization: 0.20
        - id: "DAFUER"
          name: "Dafür"
          mobilization: 0.70
        - id: "STARK_DAFUER"
          name: "Stark dafür"
          mobilization: 0.90

    D7_kampagnen_intensitaet:
      name: "Kampagnen-Intensität"
      weight: 0.10
      scale: "[0, 1]"
      indicators:
        - "Gesamtbudget (geschätzt)"
        - "Medien-Präsenz"
        - "Plakatierung"
        - "TV-Spots"
      thresholds:
        low: "< 5 Mio CHF"
        medium: "5-15 Mio CHF"
        high: "> 15 Mio CHF"

    D8_timing:
      name: "Timing & Kontext"
      weight: 0.05
      factors:
        - "Wirtschaftslage"
        - "Internationale Ereignisse"
        - "Innenpolitische Stimmung"
        - "Jahreszeit/Ferienzeit"

