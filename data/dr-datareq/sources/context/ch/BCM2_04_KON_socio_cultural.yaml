      trend: "steigend"
      uncertainty: "hoch"
      values:
        2020: 0.35
        2024: 0.42
        2025: 0.45
        2030: 0.52
        2035: 0.58
        2040: 0.62
      unit: "Polarisierungsindex [0,1]"
      source: "Bénabou/Falk/Tirole 2018; Medienpolarisierungsstudien"
      api: null
      ebf_parameter: "N_E vs N_R prevalence"
      ebf_mechanism: |
        Exculpatory narratives (N_E): "Andere sind verantwortlich" → γ < 0 (Substitut)
        Responsibilizing narratives (N_R): "Wir alle sind verantwortlich" → γ > 0 (Komplement)
        Höhere Polarisierung = stärkere Divergenz zwischen Gruppen
      ebf_reference: "Appendix B (CMP-11), Appendix RB (LIT-BENABOU)"

    - id: CH-ETH-14
      name: "Attributionstendenz"
      definition: "Tendenz zur externen (Situation/andere) vs internen (Selbst) Verantwortungszuschreibung"
      trend: "steigend"
      uncertainty: "mittel"
      values:
        2020: 0.52
        2024: 0.55
        2025: 0.56
        2030: 0.60
        2035: 0.63
        2040: 0.65
      unit: "Externalisierungsindex [0,1]"
      source: "Bénabou/Falk/Tirole 2018; Sozialpsychologie"
      api: null
      ebf_parameter: "μ (image concern) × narrative"
      ebf_mechanism: |
        Höhere Externalisierung = mehr Akzeptanz für exculpatory narratives
        Image concern μ verstärkt Suche nach Rechtfertigungen
        Beeinflusst A_moral (moralische Awareness)
      ebf_reference: "Appendix AU (CORE-AWARE), Appendix RB (LIT-BENABOU)"

