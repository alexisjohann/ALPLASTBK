      api: "https://www.europeansocialsurvey.org/data"

    - id: CH-SOC-12
      name: "Gemeinwohlorientierung"
      definition: "Wichtigkeit sozialer Fairness (Skala 1-10)"
      trend: "steigend"
      uncertainty: "gering"
      values:
        2020: 6.8
        2024: 7.2
        2025: 7.4
        2030: 7.8
        2035: 8.1
        2040: 8.4
      unit: "Skala 1-10"
      source: "World Values Survey"
      api: "https://www.worldvaluessurvey.org/WVSContents.jsp"

    - id: CH-SOC-13
      name: "Netzwerk-Segregation (ρ)"
      definition: "Grad der Homophilie/Segregation in sozialen Netzwerken (0=vollständig gemischt, 1=vollständig segregiert)"
      trend: "steigend"
      uncertainty: "mittel"
      values:
        2020: 0.45
        2024: 0.52
        2025: 0.55
        2030: 0.62
        2035: 0.68
        2040: 0.72
      unit: "ρ ∈ [0,1]"
      source: "Bénabou/Falk/Tirole 2018; Social Media Research"
      api: null
      ebf_parameter: "ρ"
      ebf_mechanism: |
        Hohe Segregation (ρ→1) verstärkt Narrative-Polarisierung:
        Exculpatory narratives bleiben in segregierten Gruppen stabil.
        Niedrige Segregation (ρ→0) ermöglicht Narrative-Diffusion und
        erhöht Wahrscheinlichkeit responsibilizing equilibria.
      ebf_reference: "Appendix V (CORE-WHEN), Appendix RB (LIT-BENABOU)"

    - id: CH-SOC-14
      name: "Hilfe-Kultur (Offering vs. Asking Norm)"
      definition: "Gesellschaftliche Erwartung: Soll Hilfe proaktiv angeboten oder aktiv nachgefragt werden? (0=Fragen erwartet, 1=Anbieten erwartet)"
      trend: "steigend"
      uncertainty: "mittel"
      values:
        2020: 0.55
        2024: 0.58
        2025: 0.60
        2030: 0.65
        2035: 0.68
        2040: 0.70
      unit: "Skala 0-1"
      source: "Bénabou/Jaroszewicz/Loewenstein 2022; FehrAdvice Workplace Studies"
      api: null
      ebf_parameter: "π_offer"
      ebf_mechanism: |
        Höhere Offering-Norm (→1) reduziert Fear of Asking:
        - Wenn Anbieten Norm ist, wird Nicht-Angebot als Signal für niedrige Generosität interpretiert
        - Discouragement Effect: w*_N > w*_O (höhere Schwelle zu fragen nach Nicht-Angebot)
        - Kulturelle Variation: CH hat relativ hohe Offering-Norm (Nachbarschaftshilfe, Vereine)
      ebf_reference: "Appendix RB (LIT-BENABOU), Case CAS-902"

    - id: CH-SOC-15
      name: "Ablehnung-Sensitivität (λ_R)"
      definition: "Kulturelle Verlustaversion bei sozialer Ablehnung - wie schmerzhaft ist ein 'Nein' auf eine Bitte? (1=neutral, >2=hohe Sensitivität)"
      trend: "steigend"
      uncertainty: "hoch"
      values:
        2020: 1.8
        2024: 2.0
        2025: 2.1
        2030: 2.3
        2035: 2.4
        2040: 2.5
      unit: "λ ∈ [1, 3]"
      source: "Bénabou/Jaroszewicz/Loewenstein 2022; Cross-cultural rejection sensitivity studies"
      api: null
      ebf_parameter: "λ_R"
      ebf_mechanism: |
        Höhere Ablehnung-Sensitivität (λ→3) führt zu:
        - Höherer Schwelle zu fragen: w* = λα[M⁺_N - ḡ_N]
        - Mehr "Waiting Trap" Equilibria: Beide Parteien warten ineffizient
        - CH-spezifisch: Mittlere Sensitivität (höher als Skandinavien, niedriger als Deutschland)
        - Steigender Trend durch Social Media (öffentliche Ablehnung sichtbarer)
      ebf_reference: "Appendix RB (LIT-BENABOU), Parameter PAR-BEH-016, Case CAS-902"

