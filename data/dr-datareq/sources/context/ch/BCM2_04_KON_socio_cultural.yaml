# REG – Regionale Unterschiede / Röstigraben (12 Faktoren)
# Quelle: Hermann, M. & Leuthold, H. (2003) "Atlas der politischen Landschaften"
#         Universität Zürich, SNF-finanziert
# Updates: SRF, NZZ, Tagesanzeiger, BFS Abstimmungsstatistik
REG:
  name: "Regionale Unterschiede (Röstigraben)"
  description: "Verhaltensökonomische Parameter-Unterschiede zwischen Sprachregionen"
  factor_count: 12
  academic_source:
    primary: "Hermann, M. & Leuthold, H. (2003). Atlas der politischen Landschaften. Zürich: vdf."
    methodology: "Analyse aller eidgenössischen Abstimmungen über 20 Jahre, 3000 Gemeinden"
    funding: "Schweizerischer Nationalfonds (SNF)"
  factors:
    - id: CH-REG-01
      name: "Staatserwartung"
      definition: "Erwartung an staatliche Leistungen und Eingriffe"
      trend: "steigend_romandie"
      uncertainty: "gering"
      values:
        romandie:
          2020: 0.72
          2025: 0.75
          2040: 0.78
        deutschschweiz:
          2020: 0.52
          2025: 0.55
          2040: 0.58
        differenz:
          2020: 0.20
          2025: 0.20
          2040: 0.20
      unit: "Index (0-1)"
      source: "Hermann/Leuthold, VOX-Analysen"
      behavioral_implication: "Staatliche Interventionen wirken in Romandie stärker"

    - id: CH-REG-02
      name: "Marktvertrauen"
      definition: "Vertrauen in freie Marktkräfte vs. Regulierung"
      trend: "divergierend"
      uncertainty: "gering"
      values:
        romandie:
          2020: 0.48
          2025: 0.50
          2040: 0.52
        deutschschweiz:
          2020: 0.68
          2025: 0.70
          2040: 0.72
        differenz:
          2020: 0.20
          2025: 0.20
          2040: 0.20
      unit: "Index (0-1)"
      source: "Hermann/Leuthold, ESS"
      behavioral_implication: "Finanzielle Anreize in DE-CH effektiver als in FR-CH"

    - id: CH-REG-03
      name: "Stadt-Land-Polarisierung"
      definition: "Abstimmungsdifferenz zwischen Stadt und Land"
      trend: "steigend"
      uncertainty: "gering"
      values:
        romandie:
          2020: 0.06
          2024: 0.07
          2025: 0.08
        deutschschweiz:
          2020: 0.18
          2024: 0.19
          2025: 0.20
      unit: "Differenz (0-1)"
      source: "Tagesanzeiger, SRF Analyse 2024"
      api: "https://www.bfs.admin.ch/bfs/de/home/statistiken/politik/abstimmungen.html"
