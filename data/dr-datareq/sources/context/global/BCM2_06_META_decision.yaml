# BCM2_06_META: Meta Decision Context
# Evidence-Based Framework - Behavioral Change Model
# Version: 1.0 | Created: 2026-01-25

metadata:
  name: "Meta Decision Context"
  code: "BCM2_06_META"
  version: "1.0"
  last_updated: "2026-01-25"
  total_factors: 42
  sub_axes: 6
  scope: "global"
  description: >
    Meta-Kontextfaktoren für die Entscheidungsarchitektur selbst.
    Wie wird die Entscheidung präsentiert, geframt und strukturiert?

  hierarchy_position: 5
  hierarchy:
    1: "MACRO (Land/Markt)"
    2: "MESO (Branche/Kunde)"
    3: "MICRO (Situation)"
    4: "INDIVIDUAL (Person)"
    5: "META (Entscheidung)"  # ← Diese Ebene

  bcm_coupling:
    primary: "BCM2_05_IND"  # Individual
    secondary: "BCM2_04_KON"  # Kontext

  ebf_integration:
    modifies:
      - parameter: "choice_effectiveness"
        description: "Effektivität der Entscheidungsarchitektur"
      - parameter: "default_power"
        description: "Wirksamkeit von Defaults"
      - parameter: "framing_effect"
        description: "Stärke des Framing-Effekts"
      - parameter: "channel_fit"
        description: "Passung des Kommunikationskanals"

# =============================================================================
# SUB-AXIS: FRM - Framing & Präsentation
# =============================================================================
FRM:
  name: "Framing & Präsentation"
  description: "Wie wird die Information/Entscheidung präsentiert?"

  factors:
    - id: META-FRM-01
      name: "Gain vs. Loss Frame"
      definition: "Wird in Gewinnen oder Verlusten geframt?"
      effect:
        gain_frame: "Effektiver bei Promotion Focus, niedriger λ"
        loss_frame: "Effektiver bei Prevention Focus, hoher λ"
      interaction: "λ × frame_match → effectiveness"
      reference: "PAP-tversky1981framing"
      uncertainty: "gering"

    - id: META-FRM-02
      name: "Absolute vs. Relative Numbers"
      definition: "Werden absolute oder relative Zahlen verwendet?"
      effect:
        absolute: "Konkret, einfacher zu verstehen"
        relative_percent: "Vergleichbar, aber oft missverstanden"
        relative_ratio: "Intuitiv bei kleinen Zahlen (1 in 10)"
      recommendation: "Beides zeigen wenn möglich"
      reference: "gigerenzer2003simple"
      uncertainty: "gering"

    - id: META-FRM-03
      name: "Frequency vs. Probability"
      definition: "Frequenz (1 von 100) vs. Wahrscheinlichkeit (1%)"
      effect:
        frequency: "Natürlicher, leichter verständlich"
        probability: "Abstrakter, oft unterschätzt bei kleinen Werten"
      recommendation: "Natural frequencies für Laien"
      reference: "PAP-gigerenzer1995improve"
      uncertainty: "gering"

    - id: META-FRM-04
      name: "Visual vs. Numeric"
      definition: "Visuelle vs. numerische Darstellung"
      effect:
        numeric_only: "Präzise, aber kognitive Belastung"
        visual_only: "Intuitiv, aber ungenau"
        combined: "Optimal für Verständnis und Retention"
      reference: "lipkus2007numeric"
      uncertainty: "mittel"

    - id: META-FRM-05
      name: "Temporal Framing"
      definition: "Zeitrahmen der Darstellung"
      effect:
        per_day: "Klein, unterschätzt akkumulierte Effekte"
        per_month: "Mittlere Salienz"
        per_year: "Gross, erhöht wahrgenommene Wichtigkeit"
        lifetime: "Maximal salient, aber abstrakt"
      example: "€2/Tag vs €730/Jahr vs €36,500/50 Jahre"
      reference: "gourville1998pennies"
      uncertainty: "gering"

    - id: META-FRM-06
      name: "Social Proof Framing"
      definition: "Wird soziale Norm kommuniziert?"
      effect:
        no_norm: "Baseline"
        descriptive_norm: "Was andere TUN (σ × 1.3)"
        injunctive_norm: "Was andere ERWARTEN (σ × 1.5)"
        combined: "Stärkster Effekt (σ × 1.7)"
      warning: "Kann backfiren wenn Norm unerwünscht"
      reference: "cialdini2003crafting"
      uncertainty: "gering"

    - id: META-FRM-07
      name: "Personalization"
      definition: "Ist die Nachricht personalisiert?"
      effect:
        generic: "attention × 1.0"
        segment_based: "attention × 1.2"
        individual_name: "attention × 1.4"
        individual_data: "attention × 1.6"
      reference: "dijkstra2008psychology"
      uncertainty: "gering"

# =============================================================================
# SUB-AXIS: DEF - Default & Choice Architecture
# =============================================================================
DEF:
  name: "Default & Choice Architecture"
  description: "Wie ist die Entscheidungsstruktur gestaltet?"

  factors:
    - id: META-DEF-01
      name: "Default Option"
      definition: "Gibt es eine vorausgewählte Option?"
      effect:
        no_default: "Active choice required"
        opt_in: "Default = keine Teilnahme"
        opt_out: "Default = Teilnahme"
        enhanced_active: "Muss aktiv wählen, kein Default"
      power: "opt_out vs opt_in: +30-50pp Teilnahme"
      reference: "johnson2003defaults"
      uncertainty: "gering"

    - id: META-DEF-02
      name: "Default Stickiness"
      definition: "Wie schwer ist es, vom Default abzuweichen?"
      effect:
        one_click: "Leicht zu ändern, moderate Stickiness"
        multi_step: "Höhere Stickiness"
        friction_heavy: "Sehr hohe Stickiness (kann unethisch sein)"
      reference: "PAP-sunstein2014nudge"
      uncertainty: "gering"

    - id: META-DEF-03
      name: "Number of Options"
      definition: "Anzahl der präsentierten Optionen"
      effect:
        two: "Einfach, aber binär limitiert"
        three_to_five: "Optimal für die meisten Entscheidungen"
        six_to_ten: "Erhöhte Komplexität"
        more_than_ten: "Choice Overload Risiko"
      reference: "iyengar2000choice"
      uncertainty: "gering"

    - id: META-DEF-04
      name: "Option Order"
      definition: "Reihenfolge der Optionen"
      effect:
        random: "Neutral"
        best_first: "Primacy effect nutzen"
        best_last: "Recency effect nutzen"
        recommended_highlighted: "Stärkster Effekt"
      reference: "dayan2011nudge"
      uncertainty: "mittel"

    - id: META-DEF-05
      name: "Simplification Level"
      definition: "Wie stark wurde vereinfacht?"
      effect:
        full_complexity: "Überforderung, schlechte Entscheidungen"
        moderate_simplification: "Balance Information/Verständnis"
        extreme_simplification: "Einfach, aber evtl. wichtige Infos fehlen"
      reference: "bettinger2012role"
      uncertainty: "mittel"

    - id: META-DEF-06
      name: "Commitment Device"
      definition: "Gibt es einen Commitment-Mechanismus?"
      effect:
        none: "Baseline"
        soft_commitment: "Verbale Zusage (+15% follow-through)"
        written_commitment: "Schriftlich (+25% follow-through)"
        public_commitment: "Öffentlich (+40% follow-through)"
        financial_commitment: "Monetär (+50% follow-through)"
      reference: "bryan2010commitment"
      uncertainty: "gering"

    - id: META-DEF-07
      name: "Cooling-Off Period"
      definition: "Zeit zum Überdenken vor Finalisierung"
      effect:
        immediate: "Impulsive Entscheidungen möglich"
        short_delay: "Moderate Reflexion"
        long_delay: "Hohe Reflexion, aber auch Procrastination"
      reference: "reisch2017behavioural"
      uncertainty: "mittel"

# =============================================================================
# SUB-AXIS: CHN - Channel & Medium
# =============================================================================
CHN:
  name: "Channel & Medium"
  description: "Über welchen Kanal wird kommuniziert?"

  factors:
    - id: META-CHN-01
      name: "Communication Channel"
      definition: "Primärer Kommunikationskanal"
      effectiveness:
        face_to_face: "Höchste Wirkung, aber teuer"
        video_call: "Hoch, persönlich aber skalierbar"
        phone: "Mittel-hoch, synchron"
        email: "Mittel, asynchron, dokumentiert"
        sms: "Kurz, hohe Öffnungsrate"
        app_notification: "Kontextabhängig, leicht ignorierbar"
        letter: "Formell, hohe Aufmerksamkeit"
        social_media: "Breit, aber geringe Tiefe"
      uncertainty: "mittel"

    - id: META-CHN-02
      name: "Channel Fit with Audience"
      definition: "Passung Kanal-Zielgruppe"
      modifier:
        poor_fit: "effectiveness × 0.50"
        moderate_fit: "effectiveness × 1.00"
        good_fit: "effectiveness × 1.30"
      example: "SMS für Junge, Brief für Ältere"
      uncertainty: "gering"

    - id: META-CHN-03
      name: "Channel Fit with Message"
      definition: "Passung Kanal-Inhalt"
      recommendations:
        complex_info: "Face-to-face, Video, Long-form"
        simple_reminder: "SMS, Push, Email"
        emotional_appeal: "Video, Face-to-face"
        documentation: "Email, Letter, Portal"
      uncertainty: "mittel"

    - id: META-CHN-04
      name: "Multi-Channel Reinforcement"
      definition: "Mehrere Kanäle für gleiche Botschaft"
      effect:
        single_channel: "effectiveness × 1.0"
        two_channels: "effectiveness × 1.4"
        three_plus: "effectiveness × 1.6 (diminishing returns)"
      warning: "Zu viel kann als Spam wahrgenommen werden"
      reference: "keller2006research"
      uncertainty: "mittel"

    - id: META-CHN-05
      name: "Messenger Effect"
      definition: "Wer überbringt die Botschaft?"
      effect:
        unknown_sender: "trust × 0.70"
        known_institution: "trust × 1.00"
        trusted_expert: "trust × 1.25"
        peer: "trust × 1.15"
        celebrity: "trust × 1.10 (variabel)"
        personal_doctor: "trust × 1.40"
      reference: "cialdini2001science"
      uncertainty: "mittel"

    - id: META-CHN-06
      name: "Interactive vs. Static"
      definition: "Interaktive oder statische Kommunikation"
      effect:
        static: "Einfach, passiv"
        interactive_simple: "Engagement +30%"
        interactive_complex: "Engagement +50%, aber Abbruchrisiko"
        gamified: "Hohe Engagement, aber nicht für alle Zielgruppen"
      uncertainty: "mittel"

# =============================================================================
# SUB-AXIS: TIM - Timing & Frequency
# =============================================================================
TIM:
  name: "Timing & Frequency"
  description: "Wann und wie oft wird kommuniziert?"

  factors:
    - id: META-TIM-01
      name: "Fresh Start Effect"
      definition: "Timing an temporalen Landmarks"
      effect:
        random_day: "effectiveness × 1.0"
        monday: "effectiveness × 1.15"
        first_of_month: "effectiveness × 1.20"
        new_year: "effectiveness × 1.35"
        birthday: "effectiveness × 1.25"
        life_event: "effectiveness × 1.50"
      reference: "dai2014fresh"
      uncertainty: "gering"

    - id: META-TIM-02
      name: "Teachable Moment"
      definition: "Relevanter Kontext-Zeitpunkt"
      effect:
        irrelevant_context: "effectiveness × 0.70"
        neutral_context: "effectiveness × 1.00"
        relevant_context: "effectiveness × 1.50"
        immediate_relevance: "effectiveness × 2.00"
      example: "Versicherung nach Unfall, Rente nach Gehaltserhöhung"
      reference: "PAP-sunstein2014nudge"
      uncertainty: "gering"

    - id: META-TIM-03
      name: "Time of Day"
      definition: "Tageszeit der Kommunikation"
      effect:
        early_morning: "Hohe Aufmerksamkeit, aber gestresst"
        mid_morning: "Optimal für komplexe Entscheidungen"
        lunch: "Niedrig (Hunger-Effekt)"
        afternoon: "Gut, aber Müdigkeit steigt"
        evening: "Entspannt, aber System 1 dominant"
      reference: "danziger2011extraneous"
      uncertainty: "mittel"

    - id: META-TIM-04
      name: "Reminder Frequency"
      definition: "Wie oft wird erinnert?"
      effect:
        none: "Baseline"
        single_reminder: "action_probability × 1.25"
        multiple_spaced: "action_probability × 1.50"
        daily_nagging: "Backfire-Risiko, reactance"
      optimal: "2-3 Erinnerungen mit Spacing"
      reference: "milkman2011using"
      uncertainty: "gering"

    - id: META-TIM-05
      name: "Deadline Proximity"
      definition: "Nähe zu einer Deadline"
      effect:
        no_deadline: "Procrastination-Risiko"
        distant_deadline: "Geringe Urgency"
        approaching_deadline: "Steigende Action"
        imminent_deadline: "Höchste Action, aber auch Stress"
        passed_deadline: "Demotivation möglich"
      reference: "ariely2002procrastination"
      uncertainty: "gering"

    - id: META-TIM-06
      name: "Action Window"
      definition: "Zeitfenster für Handlung"
      effect:
        unlimited: "Procrastination-Risiko"
        long_window: "Flexibel, moderate Urgency"
        short_window: "Hohe Urgency, aber Stress"
        single_opportunity: "Maximale Urgency, aber Reactance-Risiko"
      uncertainty: "mittel"

# =============================================================================
# SUB-AXIS: INC - Incentives & Consequences
# =============================================================================
INC:
  name: "Incentives & Consequences"
  description: "Welche Anreize und Konsequenzen sind involviert?"

  factors:
    - id: META-INC-01
      name: "Incentive Type"
      definition: "Art des Anreizes"
      types:
        none: "Nur intrinsische Motivation"
        financial_positive: "Belohnung für Aktion"
        financial_negative: "Strafe für Nicht-Aktion"
        non_financial: "Anerkennung, Status, Feedback"
        lottery: "Probabilistische Belohnung"
      crowding_warning: "Finanzielle Anreize können intrinsische Motivation untergraben"
      reference: "gneezy2011pays"
      uncertainty: "mittel"

    - id: META-INC-02
      name: "Incentive Size"
      definition: "Grösse des Anreizes relativ zum Aufwand"
      effect:
        too_small: "Signaling-Effekt negativ ('so wenig?')"
        proportional: "Erwarteter Effekt"
        generous: "Hohe Motivation, aber teuer"
        very_large: "Kann Verdacht wecken"
      reference: "gneezy2000pay"
      uncertainty: "mittel"

    - id: META-INC-03
      name: "Incentive Timing"
      definition: "Wann wird der Anreiz ausgezahlt?"
      effect:
        immediate: "Stärkste Verhaltensänderung"
        short_delay: "Moderate Wirkung"
        long_delay: "Schwache Wirkung (Diskontierung)"
        uncertain_timing: "Reduzierte Wirkung"
      reference: "odonoghuie1999doing"
      uncertainty: "gering"

    - id: META-INC-04
      name: "Loss vs. Gain Incentive"
      definition: "Framing des Anreizes als Gewinn oder Vermeidung von Verlust"
      effect:
        gain_framed: "Standard-Effekt"
        loss_framed: "1.5-2x stärker (λ-Effekt)"
      example:
        gain: "'Erhalte €50 wenn du X tust'"
        loss: "'Verliere €50 aus deinem Konto wenn du X nicht tust'"
      reference: "hossain2012crowding"
      uncertainty: "gering"

    - id: META-INC-05
      name: "Transparency of Consequences"
      definition: "Wie klar sind die Konsequenzen?"
      effect:
        hidden: "Geringe Verhaltenssteuerung"
        vague: "Moderate Steuerung"
        clear: "Hohe Steuerung"
        vivid: "Maximale Steuerung"
      example: "Abstrakte Statistik vs. konkretes Fallbeispiel"
      uncertainty: "gering"

    - id: META-INC-06
      name: "Regret Anticipation"
      definition: "Wird antizipiertes Bedauern aktiviert?"
      effect:
        not_activated: "Baseline"
        mild_activation: "effectiveness × 1.15"
        strong_activation: "effectiveness × 1.35"
      example: "'Stell dir vor, wie du dich fühlen wirst wenn...'"
      reference: "richard1996anticipated"
      uncertainty: "mittel"

# =============================================================================
# SUB-AXIS: FDB - Feedback & Learning
# =============================================================================
FDB:
  name: "Feedback & Learning"
  description: "Welches Feedback wird gegeben?"

  factors:
    - id: META-FDB-01
      name: "Feedback Availability"
      definition: "Ist Feedback verfügbar?"
      effect:
        no_feedback: "Keine Lernmöglichkeit"
        delayed_feedback: "Schwache Verbindung Aktion-Outcome"
        periodic_feedback: "Moderate Lerneffekte"
        real_time_feedback: "Maximale Lerneffekte"
      reference: "hattie2007power"
      uncertainty: "gering"

    - id: META-FDB-02
      name: "Feedback Type"
      definition: "Art des Feedbacks"
      types:
        outcome_only: "Was ist passiert?"
        process: "Wie gut war der Entscheidungsprozess?"
        comparative: "Vergleich mit anderen"
        normative: "Vergleich mit Soll-Zustand"
        progress: "Fortschritt zum Ziel"
      uncertainty: "mittel"

    - id: META-FDB-03
      name: "Feedback Valence"
      definition: "Positives oder negatives Feedback"
      effect:
        only_negative: "Demotivierend, aber informativ"
        balanced: "Informativ und motivierend"
        only_positive: "Motivierend, aber unrealistisch"
      optimal: "Konstruktiv mit konkreten Verbesserungsvorschlägen"
      uncertainty: "mittel"

    - id: META-FDB-04
      name: "Social Comparison Feedback"
      definition: "Vergleich mit Peer-Gruppe"
      effect:
        no_comparison: "Baseline"
        average_comparison: "σ × 1.20"
        top_performers: "Kann demotivieren wenn zu weit entfernt"
        similar_others: "Optimal (σ × 1.40)"
      reference: "PAP-allcott2011social"
      uncertainty: "gering"

    - id: META-FDB-05
      name: "Goal Progress Feedback"
      definition: "Feedback zu Zielfortschritt"
      effect:
        no_goal: "Baseline"
        goal_without_feedback: "Moderate Motivation"
        goal_with_feedback: "Hohe Motivation"
        goal_with_visual_progress: "Maximale Motivation"
      reference: "locke2002building"
      uncertainty: "gering"

    - id: META-FDB-06
      name: "Feedback Personalization"
      definition: "Wie personalisiert ist das Feedback?"
      effect:
        generic: "effectiveness × 1.0"
        segment_based: "effectiveness × 1.2"
        individual_data: "effectiveness × 1.5"
        AI_personalized: "effectiveness × 1.7"
      uncertainty: "mittel"

# =============================================================================
# EBF Integration
# =============================================================================
ebf_integration:
  calculation_order:
    1: "Determine base effectiveness for intervention type"
    2: "Apply MACRO context modifiers"
    3: "Apply MESO context modifiers"
    4: "Apply MICRO context modifiers"
    5: "Apply INDIVIDUAL modifiers"
    6: "Apply META modifiers (framing, channel, timing)"
    7: "Calculate final predicted effectiveness"

  interaction_effects:
    - name: "Frame × Loss Aversion"
      description: "Loss frame more effective when λ high"
      formula: "loss_frame_boost = 0.5 × (λ - 2.0)"

    - name: "Channel × Age"
      description: "Digital channels less effective for older"
      formula: "digital_effectiveness × (1 - 0.01 × max(0, age - 50))"

    - name: "Default × Cognitive Load"
      description: "Defaults more powerful under high load"
      formula: "default_power × (1 + 0.3 × cognitive_load_level)"

  example_full_calculation:
    scenario: "Opt-out Pension, Loss-Framed Email, Monday Morning"
    factors:
      - "META-DEF-01 (Opt-out): +40pp vs opt-in"
      - "META-FRM-01 (Loss frame): × 1.3 for high λ person"
      - "META-CHN-01 (Email): effectiveness × 1.0"
      - "META-TIM-01 (Monday): effectiveness × 1.15"
    combined: "High expected enrollment rate"

# =============================================================================
# Data Quality
# =============================================================================
data_quality:
  evidence_base: "RCTs, field experiments, meta-analyses"
  update_frequency: "Annual review"
  known_limitations:
    - "Effect sizes vary widely by context"
    - "Lab vs. field differences"
    - "Publication bias in nudge literature"
    - "WEIRD sample bias in many studies"
