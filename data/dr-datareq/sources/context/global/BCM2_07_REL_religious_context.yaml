  total_parameters: 42
  description: "Religion als Ψ-Kontext: Wie religiöse Traditionen Verhaltensparameter modulieren"

  rationale: |
    Religion ist KONTEXT, nicht Thema. Religiöse Traditionen modulieren:
    - Autoritätssensitivität (σ_authority)
    - Zeitpräferenzen (δ_afterlife → Diskontierung)
    - Norm-Compliance (κ_ritual)
    - Geschlechter-Interaktion (γ_gender)
    - In-Group/Out-Group Dynamiken (τ_boundary)
    - Synkretismus-Toleranz (τ_syncretism)

  bcm_coupling:
    primary: "BCM2_03_IDN"      # Identitätsnutzen
    secondary: "BCM2_05_AWX"    # Awareness (religiöse Salience)
    tertiary: "BCM2_06_WAX"     # Wahrnehmungsarchitektur
    quaternary: "BCM2_04_KON"   # Länder-Kontext

  data_sources:
    primary:
      - name: "World Values Survey (WVS)"
        url: "https://www.worldvaluessurvey.org"
        coverage: "Religiöse Werte, Praktiken, Einstellungen"
      - name: "Pew Research Center - Religion"
        url: "https://www.pewresearch.org/religion/"
        coverage: "Globale religiöse Demografie, Einstellungen"
      - name: "European Social Survey (ESS)"
        url: "https://www.europeansocialsurvey.org"
        coverage: "Religiosität in Europa"
    secondary:
      - name: "ARDA (Association of Religion Data Archives)"
        url: "https://www.thearda.com"
        coverage: "Religiöse Statistiken, Surveys"
    academic:
      - name: "Bénabou & Tirole (2016)"
        key: "PAP-benabou_2016_economics_religion"
        finding: "Religion ↔ Innovation: negativer Zusammenhang"
      - name: "Haidt (2012)"
        key: "PAP-haidt2012righteous"
        finding: "Religion strukturiert moralische Intuitionen"

# ═══════════════════════════════════════════════════════════════════════════
# PARAMETER-DEFINITIONEN
# ═══════════════════════════════════════════════════════════════════════════

parameters:
  - id: σ_authority
    name: "Autoritätssensitivität"
    definition: "Gewicht religiöser Autorität bei Entscheidungen"
    scale: "0-1 (0=keine, 1=absolut)"
    ebf_mapping: "HIERARCHY (10C)"
    behavioral_effect: "Höhere Compliance mit Top-Down Interventionen"

  - id: δ_afterlife
    name: "Jenseits-Diskontierung"
    definition: "Stärke der Jenseits-Orientierung (reduziert Gegenwarts-Bias)"
    scale: "0-1 (0=rein diesseitig, 1=stark jenseitig)"
    ebf_mapping: "WHAT (Utility über ∞ Horizont)"
    behavioral_effect: "Niedrigerer β (weniger hyperbolisch) bei hohem δ_afterlife"
    formula: "β_eff = β_base × (1 - 0.3 × δ_afterlife)"

  - id: κ_ritual
    name: "Rituelle Rigidität"
    definition: "Verbindlichkeit religiöser Praktiken"
    scale: "0-1 (0=flexibel, 1=strikt)"
    ebf_mapping: "WHEN (Zeitstruktur), READY (Commitment)"
    behavioral_effect: "Höhere Selbstkontrolle, aber geringere Adaptivität"

  - id: γ_gender
    name: "Geschlechter-Egalität"
    definition: "Grad der Geschlechtergleichheit in religiöser Praxis"
    scale: "0-1 (0=strikt getrennt, 1=vollständig egalitär)"
    ebf_mapping: "WHO (Identität), HOW (Komplementarität)"
    behavioral_effect: "Moderiert soziale Norm-Interventionen"

  - id: τ_boundary
    name: "Gruppen-Permeabilität"
    definition: "Durchlässigkeit der religiösen Gruppengrenze"
    scale: "0-1 (0=geschlossen, 1=offen)"
    ebf_mapping: "WHO (In-Group/Out-Group)"
    behavioral_effect: "Beeinflusst Wirkung von Social Proof"

  - id: τ_syncretism
    name: "Synkretismus-Toleranz"
    definition: "Akzeptanz von Elementen anderer Traditionen"
    scale: "0-1 (0=Bid'a verboten, 1=absorptiv)"
    ebf_mapping: "HOW (Komplementarität zwischen Traditionen)"
    behavioral_effect: "Moderiert Cross-Cultural Interventionen"

  - id: ω_mysticism
    name: "Mystik-Orientierung"
    definition: "Gewicht mystischer vs. legalistischer Interpretation"
    scale: "0-1 (0=legalistisch, 1=mystisch)"
    ebf_mapping: "AWARE (innere vs. äußere Aufmerksamkeit)"
    behavioral_effect: "Mystisch → intrinsische Motivation; Legalistisch → extrinsische"

# ═══════════════════════════════════════════════════════════════════════════
# RELIGIÖSE TRADITIONEN: PARAMETER-PROFILE
# ═══════════════════════════════════════════════════════════════════════════

traditions:

  # ─────────────────────────────────────────────────────────────────────────
  # ISLAM: Sunnitisch
  # ─────────────────────────────────────────────────────────────────────────
  - id: REL-SUNNI
    name: "Sunnitischer Islam"
    description: "Orthodoxer Mainstream-Islam, 5 Säulen, Scharia"
    adherents_global: "1.5 Milliarden"
    adherents_percent: 87  # % der Muslime

    parameters:
      σ_authority: 0.85
      δ_afterlife: 0.90
      κ_ritual: 0.90
      γ_gender: 0.25
      τ_boundary: 0.30
      τ_syncretism: 0.15
      ω_mysticism: 0.20

    behavioral_implications:
      - "Hohe Compliance mit autoritären Interventionen"
      - "5 Säulen = starke Default-Struktur"
      - "Ramadan = natürliches Commitment-Device"
      - "Scharia-Compliance → hohe Norm-Internalisierung"
      - "Geschlechtertrennung → separate Interventionskanäle nötig"

    intervention_modifiers:
      default_effectiveness: 1.3  # Defaults sehr effektiv (Pflicht-Struktur)
      social_norm_same_gender: 1.4
      social_norm_mixed_gender: 0.6  # Backfire-Risiko
      authority_endorsement: 1.5
      financial_incentive: 0.8  # Crowding-Out Risiko (Riba-Sensitivität)

    sources:
      - "Pew Research 2017: The Changing Global Religious Landscape"
      - "WVS Wave 7: Islamic Countries Module"

  # ─────────────────────────────────────────────────────────────────────────
  # ISLAM: Alevitisch
  # ─────────────────────────────────────────────────────────────────────────
  - id: REL-ALEVI
    name: "Alevitentum"
    description: "Synkretistische Tradition, mystisch, heterodox, keine Scharia"
    adherents_global: "15-25 Millionen"
    geographic_concentration: "Türkei, Syrien, Deutschland"

    parameters:
      σ_authority: 0.35
      δ_afterlife: 0.45
      κ_ritual: 0.30
      γ_gender: 0.85
      τ_boundary: 0.50
      τ_syncretism: 0.90
      ω_mysticism: 0.85

    behavioral_implications:
      - "Niedrige Autoritätssensitivität → Bottom-Up Interventionen bevorzugen"
      - "Hohe Geschlechter-Egalität → gemischte Gruppen effektiv"
      - "Synkretismus → offener für Cross-Cultural Elemente"
      - "Mystik → intrinsische Motivation ansprechen"
      - "Cem-Gemeinschaft → Community-basierte Interventionen"

    intervention_modifiers:
      default_effectiveness: 0.7  # Defaults weniger effektiv (Autonomie-Wert)
      social_norm_community: 1.4  # Cem-Gemeinschaft wichtig
      authority_endorsement: 0.6  # Autoritäts-Skepsis
      participatory_design: 1.5  # Hohe Wirkung
      meaning_framing: 1.4  # Mystische Sinnstiftung

    comparison_to_sunni:
      ritual_compliance: "-60%"
      authority_sensitivity: "-50%"
      gender_egalitarianism: "+60%"
      syncretism_tolerance: "+75%"

    zoroastrian_elements:
      shared:
        - "Ethisches Grundprinzip (Dreiheit: Denken-Sprechen-Handeln)"
        - "Vier Elemente (Feuer, Wasser, Erde, Luft)"
        - "Licht-Symbolik (Çerağ ≈ Atar)"
        - "Mystisches Religionsverständnis"
        - "Seelen-Konzept (Unsterblichkeit, Perfektionsstreben)"
      different:
        - "Feuer: Symbol (Alevi) vs. Heilig an sich (Zoroaster)"
        - "Ali-Verehrung: Ja (Alevi) vs. Nein (Zoroaster)"
        - "Organisationsstruktur: Dezentral vs. Mobeds"

    sources:
      - "Sökefeld 2008: Struggling for Recognition"
      - "Dressler 2013: Writing Religion"
      - "Wikipedia: Aleviten"

  # ─────────────────────────────────────────────────────────────────────────
  # ZOROASTRISMUS
  # ─────────────────────────────────────────────────────────────────────────
  - id: REL-ZORO
    name: "Zoroastrismus"
    description: "Altpersische Religion, Dualismus, Feuer-Verehrung"
    adherents_global: "120.000-200.000"
    geographic_concentration: "Indien (Parsen), Iran"
    historical_influence: "Beeinflusste Judentum, Christentum, Islam"

    parameters:
      σ_authority: 0.55
      δ_afterlife: 0.70
      κ_ritual: 0.65
      γ_gender: 0.60
      τ_boundary: 0.20  # Sehr geschlossen (keine Konversion)
      τ_syncretism: 0.40
      ω_mysticism: 0.50

    core_ethics: "Humata, Hukhta, Hvarshta (Gute Gedanken, Worte, Taten)"

    behavioral_implications:
      - "Starke ethische Grundstruktur → Moral Framing effektiv"
      - "Feuer-Rituale = Commitment-Devices"
      - "Geschlossene Gemeinschaft → starker In-Group Bias"
      - "Diesseitig-aktive Ethik (nicht passiv-weltflüchtig)"

    intervention_modifiers:
      moral_framing: 1.5
      community_commitment: 1.3
      purity_framing: 1.4  # Reinheitskonzept wichtig
      out_group_appeal: 0.5  # Wenig effektiv

    sources:
      - "Boyce 2001: Zoroastrians: Their Religious Beliefs and Practices"
      - "Heritage Institute: Fire in Zoroastrianism"

  # ─────────────────────────────────────────────────────────────────────────
  # CHRISTENTUM: Protestantisch
  # ─────────────────────────────────────────────────────────────────────────
  - id: REL-PROT
    name: "Protestantismus"
    description: "Reformatorisches Christentum, Sola Scriptura, individuelle Verantwortung"
    adherents_global: "800 Millionen"

    parameters:
      σ_authority: 0.45
      δ_afterlife: 0.65
      κ_ritual: 0.40
      γ_gender: 0.70
      τ_boundary: 0.70
      τ_syncretism: 0.55
      ω_mysticism: 0.35

    behavioral_implications:
      - "Protestantische Arbeitsethik → intrinsische Leistungsmotivation"
      - "Individuelle Verantwortung → Self-Efficacy Framing effektiv"
      - "Weniger Ritual-Struktur → mehr Eigeninitiative nötig"

    intervention_modifiers:
      self_efficacy_framing: 1.4
      work_ethic_appeal: 1.3
      authority_endorsement: 0.9

    sources:
      - "Weber 1905: Die protestantische Ethik und der Geist des Kapitalismus"
      - "Becker & Woessmann 2009: Was Weber Wrong?"

  # ─────────────────────────────────────────────────────────────────────────
  # CHRISTENTUM: Katholisch
  # ─────────────────────────────────────────────────────────────────────────
  - id: REL-CATH
    name: "Katholizismus"
    description: "Hierarchisches Christentum, Sakramente, Papst"
    adherents_global: "1.3 Milliarden"

    parameters:
      σ_authority: 0.75
      δ_afterlife: 0.75
      κ_ritual: 0.70
      γ_gender: 0.40
      τ_boundary: 0.60
      τ_syncretism: 0.45
      ω_mysticism: 0.55

    behavioral_implications:
      - "Hierarchie → Autoritäts-Endorsement effektiv"
      - "Sakramente = Commitment-Punkte im Lebenszyklus"
      - "Beichte = Feedback-Mechanismus"
      - "Heiligenverehrung → Role-Model Interventionen"

    intervention_modifiers:
      authority_endorsement: 1.3
      ritual_commitment: 1.4
      confession_feedback: 1.2

    sources:
      - "Pew Research 2013: The Global Catholic Population"

  # ─────────────────────────────────────────────────────────────────────────
  # JUDENTUM: Orthodox
  # ─────────────────────────────────────────────────────────────────────────
  - id: REL-JORTH
    name: "Orthodoxes Judentum"
    description: "Halacha-observant, 613 Mizwot, strikte Tradition"
    adherents_global: "2 Millionen"

    parameters:
      σ_authority: 0.80
      δ_afterlife: 0.50
      κ_ritual: 0.95
      γ_gender: 0.20
      τ_boundary: 0.15
      τ_syncretism: 0.10
      ω_mysticism: 0.40

    behavioral_implications:
      - "613 Gebote = extrem strukturierter Default-Rahmen"
      - "Sabbat = wöchentliches Commitment-Reset"
      - "Kaschrut = alltägliche Entscheidungsarchitektur"
      - "Starke Community-Kontrolle → Social Proof sehr effektiv"

    intervention_modifiers:
      default_structure: 1.6
      community_social_proof: 1.5
      sabbath_commitment: 1.4
      out_group_messaging: 0.3

    sources:
      - "Heilman 1992: Defenders of the Faith"

  # ─────────────────────────────────────────────────────────────────────────
  # BUDDHISMUS
  # ─────────────────────────────────────────────────────────────────────────
  - id: REL-BUDD
    name: "Buddhismus"
    description: "Achtfacher Pfad, Karma, Wiedergeburt, Achtsamkeit"
    adherents_global: "500 Millionen"

    parameters:
      σ_authority: 0.40
      δ_afterlife: 0.60  # Karma/Wiedergeburt
      κ_ritual: 0.50
      γ_gender: 0.65
      τ_boundary: 0.80
      τ_syncretism: 0.75
      ω_mysticism: 0.80

    behavioral_implications:
      - "Achtsamkeit → Gegenwarts-Fokus (aber Karma = Langfrist)"
      - "Mittlerer Weg → Balance-Framing effektiv"
      - "Meditation = Selbstkontroll-Training"
      - "Karma = natürliche Konsequenz-Logik"

    intervention_modifiers:
      mindfulness_framing: 1.5
      karma_consequence: 1.3
      middle_way_balance: 1.3
      authority_endorsement: 0.8

    sources:
      - "Dalai Lama & Cutler 1998: The Art of Happiness"

  # ─────────────────────────────────────────────────────────────────────────
  # SÄKULAR / AGNOSTISCH
  # ─────────────────────────────────────────────────────────────────────────
  - id: REL-SEC
    name: "Säkular / Agnostisch"
    description: "Nicht-religiös, evidenzbasiert, diesseitig"
    adherents_global: "1.2 Milliarden"
    trend: "steigend"

    parameters:
      σ_authority: 0.30
      δ_afterlife: 0.10
      κ_ritual: 0.20
      γ_gender: 0.85
      τ_boundary: 0.90
      τ_syncretism: 0.95
      ω_mysticism: 0.25

    behavioral_implications:
      - "Rein diesseitige Utility → Standard-Ökonomie anwendbar"
      - "Keine religiösen Defaults → State-Defaults wichtiger"
      - "Evidenz-Orientierung → Informations-Interventionen effektiv"
      - "Höherer Gegenwarts-Bias (kein Jenseits-Korrektiv)"

    intervention_modifiers:
      evidence_framing: 1.4
      scientific_authority: 1.3
      religious_framing: 0.5  # Backfire-Risiko
      present_bias_correction: 1.3  # Wichtiger als bei Religiösen

    sources:
      - "Pew Research 2018: The Age Gap in Religion Around the World"

# ═══════════════════════════════════════════════════════════════════════════
# VERGLEICHSMATRIX: ALEVITENTUM - ZOROASTRISMUS - SUNNITENTUM
# ═══════════════════════════════════════════════════════════════════════════

comparison_matrix:
  title: "Alevitentum: Näher zu Zoroastrismus oder Sunnitentum?"

  parameters:
    #                    ALEVI   ZORO   SUNNI   |Δ Alevi-Zoro| |Δ Alevi-Sunni|
    σ_authority:         [0.35,  0.55,  0.85]   # 0.20          0.50
    δ_afterlife:         [0.45,  0.70,  0.90]   # 0.25          0.45
    κ_ritual:            [0.30,  0.65,  0.90]   # 0.35          0.60
    γ_gender:            [0.85,  0.60,  0.25]   # 0.25          0.60
    τ_boundary:          [0.50,  0.20,  0.30]   # 0.30          0.20
    τ_syncretism:        [0.90,  0.40,  0.15]   # 0.50          0.75
    ω_mysticism:         [0.85,  0.50,  0.20]   # 0.35          0.65

  euclidean_distance:
    alevi_to_zoroastrian: 0.71  # √(0.20² + 0.25² + 0.35² + 0.25² + 0.30² + 0.50² + 0.35²)
    alevi_to_sunni: 1.47        # √(0.50² + 0.45² + 0.60² + 0.60² + 0.20² + 0.75² + 0.65²)

  conclusion: |
    Das Alevitentum ist PARAMETRISCH deutlich näher am Zoroastrismus (d=0.71)
    als am sunnitischen Islam (d=1.47).

    Größte Distanzen zum Sunnismus:
    1. Synkretismus-Toleranz: Δ = 0.75 (Aleviten absorbieren, Sunniten lehnen ab)
    2. Mystik-Orientierung: Δ = 0.65 (Aleviten mystisch, Sunniten legalistisch)
    3. Rituelle Rigidität: Δ = 0.60 (Aleviten flexibel, Sunniten strikt)
    4. Geschlechter-Egalität: Δ = 0.60 (Aleviten egalitär, Sunniten trennend)

    Größte Nähe zum Zoroastrismus:
    1. Mystik-Orientierung (beide: mittel-hoch)
    2. Ethische Dreiheit (Denken-Sprechen-Handeln)
    3. Vier-Elemente-Lehre
    4. Licht-Symbolik

# ═══════════════════════════════════════════════════════════════════════════
# ANWENDUNG: INTERVENTIONS-DESIGN NACH RELIGIÖSEM KONTEXT
# ═══════════════════════════════════════════════════════════────────────────

intervention_guidelines:

  - context: "Sunnitisch-muslimische Zielgruppe"
    recommended:
      - "Autoritäts-Endorsement (Imam, Ulema)"
      - "Ramadan als Commitment-Fenster"
      - "Geschlechtergetrennte Kanäle"
      - "Halal-Framing für Finanzprodukte"
    avoid:
      - "Finanzielle Anreize mit Zins-Konnotation (Riba)"
      - "Gemischtgeschlechtliche Settings ohne Kontext"
      - "Säkulare Autoritäten allein"

  - context: "Alevitische Zielgruppe"
    recommended:
      - "Community-basierte Interventionen (Cem-Gemeinschaft)"
      - "Partizipatives Design"
      - "Meaning-Framing (Sinnstiftung)"
      - "Gemischtgeschlechtliche Gruppen OK"
    avoid:
      - "Top-Down Autoritäts-Ansagen"
      - "Strikte Regel-Frameworks"
      - "Sunnitisch-islamische Rahmung"

  - context: "Säkulare Zielgruppe"
    recommended:
      - "Evidenz-basierte Argumentation"
      - "Wissenschaftliche Autoritäten"
      - "Rationale Kosten-Nutzen-Analyse"
      - "Present-Bias Korrekturen (Commitment-Devices)"
    avoid:
      - "Religiöses Framing (Backfire)"
      - "Moralisierende Sprache"
      - "Traditions-Appelle"

