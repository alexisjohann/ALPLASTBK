# =============================================================================
# INTERVENTION DOMAINS
# =============================================================================

intervention_domains:
  - id: "INT-DOM-01"
    name: "Vorsorge 3a"
    description: "Digitale Vorsorgelösungen (BEKB Vorsorge 3a App)"
    target_groups: ["TG-01", "TG-06"]
    10c_dimensions:
      WHAT: "Finanzielle Sicherheit im Alter"
      WHEN: "Lebensphasen-Trigger (Berufseinstieg, Heirat, Geburt)"
      AWARE: "Steuervorteile-Kommunikation"
    behavioral_levers:
      - lever: "Loss Framing"
        description: "Entgangene Steuervorteile betonen"
        expected_effect: 0.25
      - lever: "Social Proof"
        description: "X% der Berner:innen sparen bereits 3a"
        expected_effect: 0.18
      - lever: "Simplification"
        description: "App-basiertes Onboarding"
        expected_effect: 0.22

  - id: "INT-DOM-02"
    name: "Hypotheken"
    description: "Eigenheimfinanzierung (Marktführer Bern)"
    target_groups: ["TG-01", "TG-04", "TG-07"]
    10c_dimensions:
      WHAT: "Wohneigentum, Berner Heimat"
      WHO: "Familien, etablierte Paare"
      HOW: "Persönliche Beratung + Online-Rechner"
    behavioral_levers:
      - lever: "Anchoring"
        description: "BEKB-Richtzins als Referenz"
        expected_effect: 0.12
      - lever: "Default Setting"
        description: "Empfohlene Amortisationsrate"
        expected_effect: 0.18
      - lever: "Trust Transfer"
        description: "Staatsgarantie + AA Rating"
        expected_effect: 0.25
      - lever: "Regional Identity"
        description: "Bärn - Die Berner Bank"
        expected_effect: 0.15

  - id: "INT-DOM-03"
    name: "KMU-Finanzierung"
    description: "Geschäftskredite und Betriebsmittel"
    target_groups: ["TG-02", "TG-03"]
    10c_dimensions:
      WHAT: "Liquidität, Wachstum, Stabilität"
      WHEN: "Investitionszyklen, Expansion"
      WHERE: "Lokale Betreuung (70 Standorte)"
    behavioral_levers:
      - lever: "Relationship Banking"
        description: "Persönlicher Firmenkundenberater"
        expected_effect: 0.28
      - lever: "Timing"
        description: "Proaktive Kontaktaufnahme bei Wachstum"
        expected_effect: 0.15
      - lever: "Commitment Device"
        description: "Zielvereinbarungen mit Flexibilität"
        expected_effect: 0.12

  - id: "INT-DOM-04"
    name: "Digital Banking Adoption"
    description: "Migration zu Mobile Banking / e-Banking"
    target_groups: ["TG-01", "TG-06", "TG-07"]
    10c_dimensions:
      WHAT: "Convenience, Zeitersparnis"
      HOW: "Schrittweise Einführung, Support"
      AWARE: "Funktions-Demonstrationen"
    behavioral_levers:
      - lever: "Guided Onboarding"
        description: "In-Filiale Demo + Follow-up"
        expected_effect: 0.32
      - lever: "Social Norm"
        description: "68% nutzen bereits e-Banking"
        expected_effect: 0.15
      - lever: "Feature Highlighting"
        description: "QR-Rechnung scannen als Einstieg"
        expected_effect: 0.22
      - lever: "Safety Messaging"
        description: "Sicherheit betonen für Senioren"
        expected_effect: 0.18

  - id: "INT-DOM-05"
    name: "BEKB Invest"
    description: "Digitale Anlagelösung (Robo-Advisory)"
    target_groups: ["TG-04", "TG-06"]
    10c_dimensions:
      WHAT: "Rendite, Vermögensaufbau"
      WHO: "Digital-affine Anleger"
      HOW: "App-basiert mit persönlicher Option"
    behavioral_levers:
      - lever: "Simplification"
        description: "Risikoprofil in 5 Minuten"
        expected_effect: 0.20
      - lever: "Goal Setting"
        description: "Anlageziele definieren und tracken"
        expected_effect: 0.22
      - lever: "Low Entry Barrier"
        description: "Ab CHF 1'000 investieren"
        expected_effect: 0.15

  - id: "INT-DOM-06"
    name: "Generationenberatung"
    description: "Vermögensübergabe und Erbschaftsplanung"
    target_groups: ["TG-04", "TG-07"]
    10c_dimensions:
      WHAT: "Vermögenserhalt, Familienwohl"
      WHO: "Vermögende Senioren, Erben"
      WHEN: "Lebensphase 60+"
    behavioral_levers:
      - lever: "Legacy Framing"
        description: "Vermächtnis für Familie"
        expected_effect: 0.25
      - lever: "Expert Framing"
        description: "Spezialisierte Berater"
        expected_effect: 0.18
      - lever: "Complexity Reduction"
        description: "Klare Schritte zur Planung"
        expected_effect: 0.20

# =============================================================================
# CONTEXT MODIFIERS
# =============================================================================

context_modifiers:
  # Regionale Modifikatoren
  regional:
    - id: "REG-01"
      name: "Berner Identität"
      factor: 1.25
      applies_to: ["TG-01", "TG-02", "TG-07"]
      description: "Verstärkte Wirkung bei 'Bärn'-Messaging"

    - id: "REG-02"
      name: "Oberland-Spezifika"
      factor_tourism: 1.20
      factor_agriculture: 1.15
      applies_to: ["TG-03"]
      description: "Regionale Anpassung für Berner Oberland"

    - id: "REG-03"
      name: "Stadt-Land Differenzierung"
      bern_city_factor: 1.00
      emmental_factor: 1.10
      seeland_factor: 1.05
      oberaargau_factor: 1.08
      applies_to: "all"
      description: "Regionale Unterschiede innerhalb Kanton Bern"

    - id: "REG-04"
      name: "Bundesstadt-Effekt"
      factor: 1.15
      applies_to: ["TG-04", "TG-05"]
      description: "Bundesangestellte und institutionelle Kunden"

  # Institutionelle Modifikatoren
  institutional:
    - id: "INST-01"
      name: "Staatsgarantie-Effekt"
      trust_boost: 0.28
      loss_aversion_reduction: 0.15
      applies_to: "all"
      description: "Kantonale Garantie als Vertrauensanker"

    - id: "INST-02"
      name: "AA Rating Signal"
      quality_signal: 0.22
      institutional_trust: 0.25
      applies_to: "all"
      description: "S&P AA Rating als Qualitätssignal"

    - id: "INST-03"
      name: "Marktführer Hypotheken"
      market_leader_trust: 0.18
      social_proof: 0.20
      applies_to: ["TG-01", "TG-04"]
      description: "38% Marktanteil bei Hypotheken"

  # Digitale Modifikatoren
  digital:
    - id: "DIG-01"
      name: "Hybrid Präferenz"
      digital_only_penalty: -0.12
      hybrid_bonus: 0.12
      applies_to: ["TG-01", "TG-02", "TG-07"]
      description: "Präferenz für Kombination digital/persönlich"

    - id: "DIG-02"
      name: "Digital Native Bonus"
      digital_only_bonus: 0.18
      applies_to: ["TG-06"]
      description: "Junge Kunden bevorzugen digitale Lösungen"

    - id: "DIG-03"
      name: "Senior Digital Skepticism"
      digital_penalty: -0.25
      personal_bonus: 0.30
      applies_to: ["TG-07"]
      description: "Senioren bevorzugen persönliche Beratung"

# =============================================================================
# STRATEGIC IMPLICATIONS
# =============================================================================

strategic_implications:
  opportunities:
    - id: "OPP-01"
      name: "Vorsorge-Digitalisierung"
      description: "Vorsorge 3a App als Einstiegsprodukt für Junge"
      priority: "high"
      estimated_impact: "CHF 80 Mio Neugelder p.a."

    - id: "OPP-02"
      name: "Generationenübergabe"
      description: "Begleitung Vermögenstransfer Baby Boomer"
      priority: "high"
      estimated_impact: "CHF 500 Mio AuM Retention"

    - id: "OPP-03"
      name: "BEKB Invest Skalierung"
      description: "Robo-Advisory für breite Bevölkerung"
      priority: "medium"
      estimated_impact: "20'000 neue Anleger"

    - id: "OPP-04"
      name: "Bundesverwaltung-Segment"
      description: "Systematische Betreuung Bundesangestellte"
      priority: "medium"
      estimated_impact: "5'000 neue Kunden"

  risks:
    - id: "RISK-01"
      name: "Überalterung Kundenstamm"
      description: "Durchschnittsalter 50 Jahre"
      mitigation: "Vorsorge 3a App, BEKB Invest für Junge"
      probability: 0.65

    - id: "RISK-02"
      name: "Zinsmargen-Druck"
      description: "Hohe Hypotheken-Abhängigkeit"
      mitigation: "Kommissionsgeschäft ausbauen (Ziel 30%)"
      probability: 0.70

    - id: "RISK-03"
      name: "Digital Disruption"
      description: "Neobanken und Vergleichsplattformen"
      mitigation: "Hybrid-Ansatz, Bärn-Identität betonen"
      probability: 0.45

    - id: "RISK-04"
      name: "Filialnetz-Kosten"
      description: "70 Standorte als Fixkostenblock"
      mitigation: "Beratungszentren statt Transaktionsfilialen"
      probability: 0.55

