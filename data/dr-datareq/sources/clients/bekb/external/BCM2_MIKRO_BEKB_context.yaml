metadata:
  module_id: "BCM2_MIKRO_BEKB"
  customer: "Berner Kantonalbank"
  version: "1.0.0"
  last_updated: "2026-01-27"
  ebf_compatibility: "10C-v2.0"

# =============================================================================
# CUSTOMER CHARACTERISTICS
# =============================================================================

customer_profile:
  sector: "Financial Services"
  sub_sector: "Kantonalbanken"
  ownership: "Öffentlich-rechtlich (Kanton Bern 51.5%)"
  staatsgarantie: true
  ranking: "Zweitgrösste Kantonalbank der Schweiz"

  key_differentiators:
    - id: "DIFF-01"
      name: "Staatsgarantie"
      behavioral_impact: "Erhöhtes Sicherheitsgefühl, reduzierte Loss Aversion"
      lambda_modifier: 0.85  # Reduziert λ um 15%

    - id: "DIFF-02"
      name: "Regionale Verankerung (191 Jahre)"
      behavioral_impact: "Hohe Trust-Baseline, In-Group-Effekt"
      tau_modifier: 1.25  # Erhöht τ um 25%

    - id: "DIFF-03"
      name: "Bärn Identität"
      behavioral_impact: "Starke emotionale Bindung, Berner Stolz"
      iota_modifier: 1.20  # Erhöht ι um 20%

    - id: "DIFF-04"
      name: "S&P AA Rating"
      behavioral_impact: "Quality Signal, Vertrauensanker"
      sigma_modifier: 1.15  # Erhöht σ um 15%

    - id: "DIFF-05"
      name: "Flächendeckende Präsenz (70 Standorte)"
      behavioral_impact: "Accessibility, Convenience, Lokale Präsenz"
      accessibility_score: 0.92

    - id: "DIFF-06"
      name: "Hybrider Beratungsansatz"
      behavioral_impact: "Wahlfreiheit, Autonomie-Wahrung"
      autonomy_score: 0.82

    - id: "DIFF-07"
      name: "Marktführer Hypotheken Bern"
      behavioral_impact: "Social Proof, Market Leader Trust"
      market_leader_bonus: 0.18

