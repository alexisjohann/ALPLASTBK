      relationship: "peer"
      similarity: 0.80
      note: "Beide Kantonalbanken, ähnliche Struktur"

    - module: "BCM2_MIKRO_LUKB"
      relationship: "peer"
      similarity: 0.75

    - module: "CH-REG-01"
      relationship: "macro"
      description: "Schweizer Staatserwartung"

    - module: "CH-SOC-12"
      relationship: "macro"
      description: "Schweizer Vertrauen in Banken"

  data_flow:
    inputs:
      - "CH macro context parameters"
      - "Kanton Bern regional statistics"
      - "BEKB annual report data"
      - "BFS demographic data"
    outputs:
      - "BEKB-specific behavioral parameters"
      - "Intervention recommendations"
      - "Segment-specific modifiers"
      - "Regional campaign parameters"
