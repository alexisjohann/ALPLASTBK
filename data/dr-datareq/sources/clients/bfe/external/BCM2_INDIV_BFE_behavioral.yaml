# BCM2_INDIV_BFE – Individual-Level Behavioral Parameters
# Version: 1.0
# Quelle: FehrAdvice Kontextvektor-Architektur 2026
# Letzte Aktualisierung: 2026-01-23
# Ebene: INDIVIDUAL (Segment-spezifisch)

metadata:
  name: "BFE Individual Behavioral Parameters"
  code: "BCM2_INDIV_BFE"
  layer: "individual"
  version: "1.0"
  last_updated: "2026-01-23"
  description: |
    Segment-spezifische Verhaltensparameter für BFE-Zielgruppen.
    Enthält: Zeitdiskontierung (β), Verlustaversion (λ), Aktivierungsschwellen (θ),
    Baseline-Willingness (W_base), und psychologische Profile.

  hierarchy:
    parent: "BCM2_MIKRO_BFE"
    grandparent: "BCM2_MESO_ENERGY_CH"

  sources:
    - "BFE Studien 2020-2025"
    - "FehrAdvice Projekte (anonymisiert)"
    - "Thaler & Sunstein (2008)"
    - "Kahneman & Tversky (1979)"
    - "Fehr & Schmidt (1999)"

# =============================================================================
# BEHAVIORAL PARAMETERS BY SEGMENT
# =============================================================================
behavioral_parameters:

  # -------------------------------------------------------------------------
  # SEGMENT 1: Eigentümer EFH (Einfamilienhaus)
  # -------------------------------------------------------------------------
  SEG_EFH:
    segment_id: "SEG-EFH"
    name: "Eigentümer Einfamilienhaus"
    size: "~1.09 Mio Haushalte"

    # Zeitdiskontierung (Beta)
    # β < 1 = Present Bias (kurzfristige Präferenzen übergewichtet)
    # Quelle: Frederick et al. (2002), O'Donoghue & Rabin (1999)
    beta:
      value: 0.82
      confidence_interval: [0.75, 0.89]
      interpretation: |
        Moderater Present Bias. EFH-Eigentümer haben längeren Planungshorizont
        als Durchschnitt, aber Upfront-Kosten werden dennoch übergewichtet.
      source: "FehrAdvice Energy Study 2024 (N=1,200)"
      implication: |
        Förderungen müssen Upfront-Barriere senken.
        Langfristiger ROI alleine nicht überzeugend.

    # Verlustaversion (Lambda)
    # λ > 1 = Verluste wiegen schwerer als Gewinne
    # Quelle: Kahneman & Tversky (1979), Gächter et al. (2022)
    lambda:
      value: 2.1
      confidence_interval: [1.8, 2.4]
      interpretation: |
        Hohe Verlustaversion. Verlust der "funktionierenden" Heizung wiegt
        schwerer als Gewinn durch effizientere Anlage.
      source: "Meta-Analyse Gächter et al. (2022)"
      implication: |
        Framing als "Vermeidung von Verlusten" (steigende Energiekosten)
        statt "Gewinn" (Einsparungen).

    # Aktivierungsschwelle (Theta)
    # θ = Willingness-Threshold für Handlung
    theta:
      value: 0.65
      confidence_interval: [0.58, 0.72]
      interpretation: |
        Mittlere Schwelle. EFH-Eigentümer brauchen moderate Überzeugung
        für große Investitionen.
      implication: |
        Kombinierte Interventionen (T1+T6+T7) nötig um θ zu erreichen.

    # Baseline Willingness
    W_base:
      value: 0.35
      confidence_interval: [0.28, 0.42]
      interpretation: |
        Etwa 35% grundsätzlich offen für energetische Sanierung,
        aber noch nicht aktiviert.
      bcj_phase: "aware_considering"

    # Psychologisches Profil
    psychological_profile:
      status_quo_bias:
        severity: "high"
        value: 0.72
        description: "Starke Präferenz für aktuelle Situation"

      decision_fatigue:
        severity: "medium"
        value: 0.55
        description: "Moderierte Entscheidungsmüdigkeit bei Komplexität"

      identity_relevance:
        value: 0.48
        description: |
          Heizung moderat identitätsrelevant ("mein Haus, meine Heizung").
          Aber auch: Klima-Identität bei ~30% aktivierbar.

      risk_attitude:
        value: 0.42
        type: "risk_averse"
        description: "Leicht risikoavers bei grossen Investitionen"

      social_influence:
        value: 0.68
        description: "Hoch sensitiv für Nachbarschafts-Normen (Solar-Cluster)"

    # Psi-Dimensionen (Individual Level)
    psi_individual:
      kappa_IDN:
        value: 0.48
        factors: ["Hausbesitzer-Identität", "Klima-Identität (latent)"]

      kappa_KOG:
        value: 0.55
        factors: ["Komplexitätsaversion", "Planungskompetenz"]

      kappa_FRM:
        value: 0.62
        factors: ["Investment vs. Kosten Framing sensitiv"]

      kappa_SOCIAL:
        value: 0.68
        factors: ["Nachbarschafts-Norm", "Handwerker-Empfehlung"]

  # -------------------------------------------------------------------------
  # SEGMENT 2: Eigentümer MFH (Mehrfamilienhaus)
  # -------------------------------------------------------------------------
  SEG_MFH:
    segment_id: "SEG-MFH"
    name: "Eigentümer Mehrfamilienhaus"
    size: "~202k Eigentümer"

    beta:
      value: 0.78
      confidence_interval: [0.70, 0.86]
      interpretation: |
        Stärkerer Present Bias als EFH. Rendite-Orientierung führt
        zu kurzfristigem Fokus.
      implication: "ROI-Kommunikation mit kurzem Payback wichtig."

    lambda:
      value: 2.3
      confidence_interval: [2.0, 2.6]
      interpretation: |
        Höhere Verlustaversion. Mieteinnahmen-Sicherheit priorisiert.
      implication: "Vermietbarkeit und Wertsteigerung betonen."

    theta:
      value: 0.72
      confidence_interval: [0.65, 0.79]
      interpretation: |
        Höhere Schwelle als EFH. Mehr Überzeugungsarbeit nötig.
      implication: "Professionelle Beratung via Verwaltung wichtig."

    W_base:
      value: 0.28
      confidence_interval: [0.22, 0.35]
      interpretation: "Geringere Baseline-Willingness, stark renditegetrieben."

    psychological_profile:
      status_quo_bias:
        severity: "high"
        value: 0.78
        description: "Sehr starke Status-Quo-Präferenz (funktionierendes Asset)"

      decision_fatigue:
        severity: "low"
        value: 0.35
        description: "Professionellerer Umgang mit Entscheidungen"

      identity_relevance:
        value: 0.25
        description: "Heizung nicht identitätsrelevant - reines Investment"

      risk_attitude:
        value: 0.55
        type: "risk_neutral_to_seeking"
        description: "Kalkuliertes Risiko bei guter Rendite"

      social_influence:
        value: 0.42
        description: "Geringere soziale Einfluss-Sensitivität"

    psi_individual:
      kappa_IDN:
        value: 0.25
        factors: ["Investor-Identität", "Rendite-Fokus"]

      kappa_KOG:
        value: 0.35
        factors: ["Professionelle Analyse", "Cashflow-Orientierung"]

      kappa_FRM:
        value: 0.75
        factors: ["Stark ROI-sensitiv", "TCO-fokussiert"]

      kappa_SOCIAL:
        value: 0.42
        factors: ["Mieter-Zufriedenheit relevant", "Markt-Benchmark"]

  # -------------------------------------------------------------------------
  # SEGMENT 3: Stockwerkeigentümer (STWE)
  # -------------------------------------------------------------------------
  SEG_STWE:
    segment_id: "SEG-STWE"
    name: "Stockwerkeigentümer"
    size: "~495k Eigentümer"

    # STWE-spezifisch: Individuelle + Kollektive Parameter

    beta:
      value: 0.75
      confidence_interval: [0.68, 0.82]
      interpretation: |
        Stärkster Present Bias der Eigentümer-Segmente.
        Kollektive Entscheide verstärken kurzfristigen Fokus.
      implication: "Upfront-Kosten-Sharing und Finanzierungsmodelle kritisch."

    lambda:
      value: 2.5
      confidence_interval: [2.2, 2.8]
      interpretation: |
        Höchste Verlustaversion. Angst vor Kostenüberschreitungen
        und Nachbarschaftskonflikten.
      implication: "Garantien und professionelle Prozessbegleitung wichtig."

    theta:
      value: 0.78
      confidence_interval: [0.72, 0.85]
      interpretation: |
        Höchste Schwelle. Doppelte Hürde: Individuelle + kollektive Überzeugung.
      implication: "Facilitierte Versammlungsprozesse essenziell."

    W_base:
      value: 0.22
      confidence_interval: [0.16, 0.28]
      interpretation: |
        Niedrigste Baseline-Willingness.
        Koordinationsproblem = Hauptbarriere.

    # STWE-SPEZIFISCHE FAKTOREN
    stwe_specific:
      collective_decision_threshold:
        quorum_required: 0.67  # 2/3 Mehrheit typisch
        description: "Qualifizierte Mehrheit für größere Investitionen"

      coordination_cost:
        value: 0.45
        description: |
          Hohe Koordinationskosten. Durchschnittlich 9.5 Einheiten
          pro Gemeinschaft = 9.5 Stakeholder.

      free_rider_risk:
        value: 0.35
        description: "Gefahr dass einzelne Eigentümer blockieren"

      heterogeneity_index:
        value: 0.62
        description: |
          Heterogene Präferenzen: Alter, Einkommen, Zeithorizont
          der Eigentümer unterschiedlich.

    psychological_profile:
      status_quo_bias:
        severity: "very_high"
        value: 0.85
        description: "Extremer Status-Quo-Bias durch kollektive Dynamik"

      decision_fatigue:
        severity: "high"
        value: 0.72
        description: "Versammlungen = hohe kognitive Belastung"

      identity_relevance:
        value: 0.32
        description: "Gemeinschafts-Identität teilweise relevant"

      risk_attitude:
        value: 0.30
        type: "highly_risk_averse"
        description: "Kollektive Entscheide = maximale Risikoaversion"

      social_influence:
        value: 0.78
        description: "Sehr hohe Sensitivität für Meinungsführer in der Gemeinschaft"

    psi_individual:
      kappa_IDN:
        value: 0.32
        factors: ["Gemeinschafts-Identität", "Nachbarschaftsbeziehungen"]

      kappa_KOG:
        value: 0.72
        factors: ["Entscheidungsmüdigkeit hoch", "Informationsüberlastung"]

      kappa_KOL:  # Kollektiv-spezifisch
        value: 0.85
        factors: ["Koordinationsproblem", "Free-Rider", "Heterogenität"]

      kappa_SOCIAL:
        value: 0.78
        factors: ["Meinungsführer kritisch", "Nachbarschaftsdynamik"]

  # -------------------------------------------------------------------------
  # SEGMENT 4: Mieter (für Vergleich/Suffizienz-Interventionen)
  # -------------------------------------------------------------------------
  SEG_MIETER:
    segment_id: "SEG-MIETER"
    name: "Mieter"
    size: "~2.5 Mio Haushalte"

    beta:
      value: 0.70
      confidence_interval: [0.63, 0.77]
      interpretation: |
        Stärkster Present Bias. Kein langfristiges Engagement
        mit Gebäude da keine Ownership.
      implication: "Nur kurzfristige Verhaltensinterventionen sinnvoll."

    lambda:
      value: 1.9
      confidence_interval: [1.6, 2.2]
      interpretation: |
        Geringere Verlustaversion als Eigentümer.
        Kein Asset zu "verlieren".
      implication: "Framing weniger verlust-orientiert."

    theta:
      value: 0.45
      confidence_interval: [0.38, 0.52]
      interpretation: |
        Niedrigere Schwelle für Verhaltensänderungen
        (da geringere Investitionen).
      implication: "T1+T2 Interventionen effektiv."

    W_base:
      value: 0.42
      confidence_interval: [0.35, 0.49]
      interpretation: |
        Höhere Basis-Willingness für Suffizienz
        (geringere Barrieren).

    psychological_profile:
      status_quo_bias:
        severity: "medium"
        value: 0.55
        description: "Moderater Status-Quo-Bias bei Verhaltensgewohnheiten"

      decision_fatigue:
        severity: "low"
        value: 0.38
        description: "Geringere Entscheidungskomplexität"

      identity_relevance:
        value: 0.15
        description: "Wohnung nicht identitätsrelevant (temporär)"

      risk_attitude:
        value: 0.50
        type: "risk_neutral"
        description: "Neutral - kein Asset-Risiko"

      social_influence:
        value: 0.58
        description: "Moderate soziale Einfluss-Sensitivität"

    # Mieter-spezifische Limitationen
    mieter_specific:
      investment_power: 0.05
      description: "Praktisch keine Investitionsmacht für Gebäude"

      split_incentive:
        severity: "high"
        description: |
          Klassisches Vermieter-Mieter-Dilemma:
          Vermieter investiert, Mieter profitiert.

      intervention_scope:
        allowed: ["Verbrauchsverhalten", "Gerätewahl", "Tarifwahl"]
        not_allowed: ["Gebäudehülle", "Heizung", "Solar"]

    psi_individual:
      kappa_IDN:
        value: 0.15
        factors: ["Gering - temporäre Wohnsituation"]

      kappa_KOG:
        value: 0.38
        factors: ["Niedrige Komplexität bei Verhaltensänderung"]

      kappa_FRM:
        value: 0.55
        factors: ["Kosteneinsparung direkt relevant"]

      kappa_SOCIAL:
        value: 0.58
        factors: ["Nachbarschaftsvergleiche wirksam"]

# =============================================================================
# BCJ PHASE DISTRIBUTION BY SEGMENT
# =============================================================================
bcj_phase_distribution:
  description: |
    Verteilung der Segmente über die Behavioral Customer Journey Phasen.
    Basis für phasen-spezifische Interventionen.

  SEG_EFH:
    unaware: 0.15
    aware: 0.25
    considering: 0.30
    intending: 0.18
    acting: 0.08
    maintaining: 0.04
    dominant_phase: "considering"
    phase_specific_barriers:
      unaware_to_aware: "Keine Trigger, Komfort-Zone"
      aware_to_considering: "Komplexität, Informationsmangel"
      considering_to_intending: "Upfront-Kosten, Unsicherheit"
      intending_to_acting: "Handwerker-Verfügbarkeit, Förder-Prozess"

  SEG_MFH:
    unaware: 0.20
    aware: 0.30
    considering: 0.28
    intending: 0.14
    acting: 0.05
    maintaining: 0.03
    dominant_phase: "aware"
    phase_specific_barriers:
      unaware_to_aware: "Rendite-Fokus überdeckt Thema"
      aware_to_considering: "ROI-Unsicherheit"
      considering_to_intending: "Mieter-Koordination"
      intending_to_acting: "Leerstandsrisiko bei Sanierung"

  SEG_STWE:
    unaware: 0.25
    aware: 0.35
    considering: 0.22
    intending: 0.12
    acting: 0.04
    maintaining: 0.02
    dominant_phase: "aware"
    phase_specific_barriers:
      unaware_to_aware: "Kollektive Passivität"
      aware_to_considering: "Keine Initiator in Gemeinschaft"
      considering_to_intending: "Mehrheitsfindung"
      intending_to_acting: "Finanzierung + 2/3-Quorum"

  SEG_MIETER:
    unaware: 0.35
    aware: 0.30
    considering: 0.20
    intending: 0.10
    acting: 0.03
    maintaining: 0.02
    dominant_phase: "unaware"
    phase_specific_barriers:
      unaware_to_aware: "Keine Relevanz (kein Einfluss)"
      aware_to_considering: "Split Incentive"
      considering_to_intending: "Vermieter-Abhängigkeit"
      intending_to_acting: "Keine Handlungsmacht"

# =============================================================================
# INTERVENTION EFFECTIVENESS BY SEGMENT
# =============================================================================
intervention_effectiveness:
  description: |
    Erwartete Wirksamkeit der Interventionstypen pro Segment.
    Skala: 0 = keine Wirkung, 1 = maximale Wirkung.

  SEG_EFH:
    T1_Information: 0.55
    T2_Feedback: 0.42
    T3_ChoiceArchitecture: 0.72
    T4_Commitment: 0.48
    T5_Identity: 0.52
    T6_Social: 0.75
    T7_Financial: 0.82
    T8_Goal: 0.45
    recommended_combination: "T3 + T6 + T7"
    synergy_note: "Timing (T3) + Norm (T6) + Förderung (T7) maximal wirksam"

  SEG_MFH:
    T1_Information: 0.65
    T2_Feedback: 0.38
    T3_ChoiceArchitecture: 0.52
    T4_Commitment: 0.35
    T5_Identity: 0.25
    T6_Social: 0.42
    T7_Financial: 0.85
    T8_Goal: 0.55
    recommended_combination: "T1 + T7 + T8"
    synergy_note: "ROI-Information (T1) + Förderung (T7) + Zielvorgabe (T8)"

  SEG_STWE:
    T1_Information: 0.48
    T2_Feedback: 0.35
    T3_ChoiceArchitecture: 0.68
    T4_Commitment: 0.55
    T5_Identity: 0.42
    T6_Social: 0.82
    T7_Financial: 0.72
    T8_Goal: 0.58
    recommended_combination: "T6 + T3 + T7"
    synergy_note: |
      Meinungsführer aktivieren (T6) + Facilitierter Prozess (T3) +
      Finanzierungsmodell (T7)

  SEG_MIETER:
    T1_Information: 0.72
    T2_Feedback: 0.78
    T3_ChoiceArchitecture: 0.55
    T4_Commitment: 0.42
    T5_Identity: 0.25
    T6_Social: 0.62
    T7_Financial: 0.35
    T8_Goal: 0.48
    recommended_combination: "T2 + T1 + T6"
    synergy_note: "Feedback (T2) + Information (T1) + Vergleich (T6)"

# =============================================================================
# WHEN-TRIGGER SENSITIVITY BY SEGMENT
# =============================================================================
when_trigger_sensitivity:
  description: |
    Sensitivität der Segmente für verschiedene WHEN-Trigger.
    Skala: 0 = kein Trigger, 1 = maximaler Trigger.

  triggers:
    - trigger_id: "TRG-DEF"
      name: "Heizungsdefekt"
      SEG_EFH: 0.92
      SEG_MFH: 0.85
      SEG_STWE: 0.78
      SEG_MIETER: 0.15
      opportunity_window: "2-4 Wochen"

    - trigger_id: "TRG-REN"
      name: "Geplante Renovation"
      SEG_EFH: 0.85
      SEG_MFH: 0.75
      SEG_STWE: 0.72
      SEG_MIETER: 0.10
      opportunity_window: "3-6 Monate"

    - trigger_id: "TRG-BUY"
      name: "Hauskauf"
      SEG_EFH: 0.88
      SEG_MFH: 0.82
      SEG_STWE: 0.55
      SEG_MIETER: 0.05
      opportunity_window: "3-6 Monate"

    - trigger_id: "TRG-ERB"
      name: "Erbschaft"
      SEG_EFH: 0.78
      SEG_MFH: 0.72
      SEG_STWE: 0.45
      SEG_MIETER: 0.02
      opportunity_window: "3-6 Monate"

    - trigger_id: "TRG-NBR"
      name: "Nachbar installiert"
      SEG_EFH: 0.72
      SEG_MFH: 0.35
      SEG_STWE: 0.58
      SEG_MIETER: 0.05
      opportunity_window: "ongoing"

    - trigger_id: "TRG-VER"
      name: "Mietvertrag-Erneuerung"
      SEG_EFH: 0.00
      SEG_MFH: 0.55
      SEG_STWE: 0.00
      SEG_MIETER: 0.65
      opportunity_window: "1-3 Monate"

# =============================================================================
# CROWDING-OUT RISK MATRIX BY SEGMENT
# =============================================================================
crowding_out_risk:
  description: |
    Risiko von Crowding-Out bei bestimmten Interventionskombinationen.
    Nach Segment differenziert.

  high_risk_combinations:
    - combination: "T6+T7"
      description: "Social Norm + Financial Incentive"
      SEG_EFH:
        risk: 0.55
        mitigation: "Sequenziell: erst T6, dann T7 als Enabler"
      SEG_MFH:
        risk: 0.25
        mitigation: "Weniger kritisch bei rendite-orientierten"
      SEG_STWE:
        risk: 0.45
        mitigation: "T6 auf Gemeinschaft, T7 auf Individuum"
      SEG_MIETER:
        risk: 0.35
        mitigation: "Moderat - weniger intrinsische Motivation"

    - combination: "T7+T8"
      description: "Financial + Intrinsic Goal"
      SEG_EFH:
        risk: 0.48
        mitigation: "Autonomie-Cue: 'Sie entscheiden'"
      SEG_MFH:
        risk: 0.20
        mitigation: "Minimal - Goal = ROI-Ziel akzeptiert"
      SEG_STWE:
        risk: 0.38
        mitigation: "Gemeinschafts-Ziel framen"
      SEG_MIETER:
        risk: 0.30
        mitigation: "Moderat"

