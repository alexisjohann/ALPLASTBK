# =============================================================================
# FAZIT
# =============================================================================
conclusion:
  insight: |
    Das BFE operiert in einem Kontext mit starker Default-Macht (gebundene
    Haushalte, Vermieter-Mieter-Dilemma) und hoher Komplexität (Föderalismus,
    heterogene Zielgruppen). Erfolgreiche Interventionen nutzen kritische
    Momente, reduzieren Komplexität und machen soziale Normen sichtbar.

  bfe_principle: |
    "Verhaltensänderung im Energiebereich =
     Kontext gestalten + Momente nutzen + Normen sichtbar machen"
