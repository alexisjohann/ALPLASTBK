# BCM2_MIKRO_BFE – Kontextvektor Bundesamt für Energie
# Version: 1.1
# Quelle: FehrAdvice Kontextvektor-Architektur 2026
# Letzte Aktualisierung: 2026-01-23
# Ebene: MIKRO (Organisationsspezifisch)
# v1.1: Added STWE dynamics, Installateure/Energieberater as targets

metadata:
  name: "BFE Kontextvektor"
  code: "BCM2_MIKRO_BFE"
  layer: "mikro"
  version: "1.0"
  last_updated: "2026-01-23"
  description: |
    Organisationsspezifischer Kontextvektor für das Bundesamt für Energie (BFE).
    Definiert Mandat, Zielgruppen, Interventionsfelder und mappt relevante
    Kontextfaktoren aus MESO (Energie-Sektor) und MAKRO (Schweiz).

  hierarchy:
    parent: "BCM2_MESO_ENERGY_CH"
    grandparent: "BCM2_04_KON (MAKRO Schweiz)"
    children: ["Projekt-Instanzen"]
    sibling: "BCM2_INDIV_BFE (Individual Behavioral Parameters)"

  bcm_coupling:
    primary: "BCM2_MESO_ENERGY_CH"
    secondary: "BCM2_04_KON"
    tertiary: "BCM2_02_KNU"

  ebf_mapping:
    primary_psi:
      - "kappa_INST"    # Regulierung, Förderung, Gesetze
      - "kappa_ARCH"    # Defaults, Opt-outs, Choice Architecture
    secondary_psi:
      - "kappa_SOCIAL"  # Normen, Social Proof
      - "kappa_AWX"     # Awareness, Information
    utility_focus:
      - "u_E"           # Ökologischer Nutzen (primär)
      - "u_F"           # Finanzieller Nutzen (Förderungen)
      - "u_S"           # Sozialer Nutzen (Normen)

# =============================================================================
# ORGANISATION
# =============================================================================
organisation:
  name_de: "Bundesamt für Energie"
  name_fr: "Office fédéral de l'énergie"
  name_it: "Ufficio federale dell'energia"
  acronym: "BFE / OFEN / UFE"
  department: "UVEK (Departement für Umwelt, Verkehr, Energie und Kommunikation)"

  mandate: |
    Das BFE ist das Kompetenzzentrum für Fragen der Energieversorgung und
    Energienutzung im Eidgenössischen Departement für Umwelt, Verkehr,
    Energie und Kommunikation (UVEK). Es ist verantwortlich für die
    Umsetzung der Energiestrategie 2050.

  core_responsibilities:
    - "Energieversorgungssicherheit"
    - "Energieeffizienz fördern"
    - "Erneuerbare Energien ausbauen"
    - "Energieforschung koordinieren"
    - "Internationale Energiepolitik"
    - "Kernenergieaufsicht (bis Ausstieg)"

  strategic_priorities_2024_2028:
    - priority: "Beschleunigung Erneuerbare"
      weight: 0.30
    - priority: "Gebäudeeffizienz / Heizungsersatz"
      weight: 0.25
    - priority: "Elektromobilität"
      weight: 0.15
    - priority: "Stromversorgungssicherheit"
      weight: 0.20
    - priority: "Verhaltensänderung / Suffizienz"
      weight: 0.10

# =============================================================================
# ZIELGRUPPEN (WHO - Welfare Hierarchy)
# =============================================================================
target_groups:
  description: |
    Die Zielgruppen des BFE, segmentiert nach Interventionsrelevanz
    und Verhaltensänderungspotenzial.

  primary_targets:
    - id: "TG-HH"
      name: "Haushalte"
      sub_segments:
        - name: "Eigentümer EFH"
          size_ch: "~1.1 Mio Haushalte"
          relevance: "Heizungsersatz, Solar, Effizienz"
          decision_autonomy: "hoch"
          key_barriers:
            - "Upfront-Kosten"
            - "Komplexität"
            - "Status Quo Bias"
          key_enablers:
            - "Förderung"
            - "Nachbarschafts-Norm"
            - "Wertsteigerung"

        - name: "Eigentümer MFH/Stockwerk"
          size_ch: "~0.5 Mio Haushalte"
          relevance: "Kollektive Sanierungsentscheide"
          decision_autonomy: "mittel (Stockwerkeigentümer-Versammlung)"
          key_barriers:
            - "Koordinationsproblem"
            - "Heterogene Präferenzen"
            - "Free-Rider"
          key_enablers:
            - "Facilitierte Prozesse"
            - "Mehrheitsentscheid"

        - name: "Mieter"
          size_ch: "~2.5 Mio Haushalte"
          relevance: "Stromverbrauch, Verhalten, Suffizienz"
          decision_autonomy: "niedrig (kein Einfluss auf Gebäude)"
          key_barriers:
            - "Split Incentives"
            - "Keine Investitionsmacht"
          key_enablers:
            - "Verbrauchs-Feedback"
            - "Smart Home"
            - "Tarifwahl"

    - id: "TG-KMU"
      name: "KMU"
      size_ch: "~600'000 Unternehmen"
      relevance: "Prozesseffizienz, Gebäude, Mobilität"
      decision_autonomy: "mittel bis hoch"
      key_barriers:
        - "Kerngeschäft-Fokus"
        - "Liquidität"
        - "Know-how"
      key_enablers:
        - "Beratung"
        - "Förderung"
        - "Branchenlösungen"

    - id: "TG-GI"
      name: "Grossindustrie"
      size_ch: "~1'500 Unternehmen"
      relevance: "Grosse Hebel, Zielvereinbarungen"
      decision_autonomy: "hoch"
      key_barriers:
        - "Internationale Wettbewerbsfähigkeit"
        - "Investitionszyklen"
      key_enablers:
        - "Zielvereinbarungen (EnAW)"
        - "CO2-Abgabe Rückerstattung"

  secondary_targets:
    - id: "TG-KAN"
      name: "Kantone"
      relevance: "Vollzug Gebäudevorschriften, eigene Förderprogramme"
      role: "Implementierungspartner"

    - id: "TG-GEM"
      name: "Gemeinden"
      relevance: "Lokale Energieplanung, Vorbildfunktion"
      role: "Multiplikator"

    - id: "TG-EVU"
      name: "Energieversorgungsunternehmen"
      relevance: "Kundeninterface, Produkte, Tarife"
      role: "Delivery Channel"

    - id: "TG-INST"
      name: "Installateure/Heizungsbauer"
      size_ch: "~8'500 Betriebe / ~45'000 Fachkräfte"
      relevance: "Kritischer Multiplikator bei Heizungsersatz"
      role: "Gatekeeper & Advisor"
      decision_influence:
        description: |
          Bei 55% aller Heizungsersatz-Entscheide (Notfall) ist der Installateur
          der primäre Entscheidungsträger. Kunden folgen meist der Empfehlung.
        influence_strength: 0.78
      key_barriers:
        - "Zeitdruck bei Notfällen"
        - "Gewohnheit (fossile Systeme bekannt)"
        - "Lieferanten-Beziehungen"
        - "Komplexität Wärmepumpe"
      key_enablers:
        - "Schulung & Zertifizierung"
        - "Marge bei erneuerbaren Systemen"
        - "Kundennachfrage"
        - "Förderprogramme vereinfacht"
      intervention_approach:
        primary: "T1 (Information) + T7 (Financial Incentive für Beratung)"
        secondary: "T5 (Professionelle Identität als 'Energie-Experte')"

    - id: "TG-EBER"
      name: "Energieberater/GEAK-Experten"
      size_ch: "~2'500 Fachpersonen"
      relevance: "Professionelle Beratung, GEAK-Erstellung"
      role: "Trusted Advisor"
      decision_influence:
        description: |
          Energieberater haben hohe Glaubwürdigkeit und können
          komplexe Entscheide vereinfachen.
        influence_strength: 0.85
      key_barriers:
        - "Kapazitätsengpass (21'000 Beratungen p.a.)"
        - "Geografische Verteilung ungleich"
      key_enablers:
        - "BFE Impulsberatung skalieren"
        - "Digitale Tools"
        - "Kantonsförderung"

  # =========================================================================
  # STWE DYNAMICS (Stockwerkeigentum-spezifisch)
  # =========================================================================
  stwe_dynamics:
    description: |
      Spezifische Dynamiken bei Stockwerkeigentümer-Gemeinschaften,
      die besondere Interventionsstrategien erfordern.

    structural_context:
      average_units_per_community: 9.5
      source: "BFS / HEV Schweiz"
      implication: |
        9.5 Entscheidungsträger pro Gemeinschaft = hohe Koordinationskosten.
        Grössere Gemeinschaften (>15 Einheiten) noch schwieriger.

    decision_mechanisms:
      ordinary_maintenance:
        quorum: "einfache Mehrheit"
        examples: ["Kleinreparaturen", "laufender Unterhalt"]

      substantial_renovation:
        quorum: "qualifizierte Mehrheit (2/3)"
        examples: ["Heizungsersatz", "Fassadendämmung", "Solar"]
        difficulty: "hoch"

      luxury_improvements:
        quorum: "Einstimmigkeit"
        examples: ["Komfort-Upgrades ohne energetischen Nutzen"]
        difficulty: "sehr hoch"

    behavioral_barriers:
      heterogeneous_preferences:
        description: |
          Eigentümer unterscheiden sich in Alter, Einkommen, Zeithorizont,
          Umweltbewusstsein. Ältere Eigentümer oft weniger investitionsbereit.
        severity: 0.72

      free_rider_problem:
        description: |
          Einzelne Eigentümer profitieren von Investitionen anderer,
          ohne selbst beizutragen. Führt zu Unterinvestition.
        severity: 0.55

      status_quo_coalition:
        description: |
          Minderheit kann Veränderung blockieren.
          "Funktioniert doch" als Totschlag-Argument.
        severity: 0.68

      information_asymmetry:
        description: |
          Verwaltung und einzelne informierte Eigentümer vs.
          Mehrheit ohne Energie-Know-how.
        severity: 0.58

      timeline_mismatch:
        description: |
          Jüngere wollen langfristig investieren,
          Ältere (Verkauf/Lebensende) nicht mehr.
        severity: 0.65

    intervention_strategies:
      champion_strategy:
        description: |
          Einen "Champion" in der Gemeinschaft identifizieren und
          befähigen, der den Prozess intern vorantreibt.
        implementation:
          - "Impulsberatung an Champion-Haushalt"
          - "Argumentations-Toolkit bereitstellen"
          - "Erfolgsbeispiele aus ähnlichen Gemeinschaften"
        effectiveness: 0.72

      facilitated_process:
        description: |
          Externe Moderation der Entscheidungsfindung durch
          neutralen Experten (Energieberater, Verwaltung).
        implementation:
          - "Facilitierter Workshop vor Versammlung"
          - "Anonyme Präferenz-Erhebung vorab"
          - "Finanzierungsmodelle vorbereiten"
        effectiveness: 0.78

      default_renovation_fund:
        description: |
          Erneuerungsfonds als Default erhöhen, um Kapital
          für grössere Projekte zu akkumulieren.
        implementation:
          - "Verwaltung empfiehlt höheren Beitrag"
          - "Zielbetrag für Sanierung kommunizieren"
        effectiveness: 0.62

      staged_approach:
        description: |
          Grossprojekt in kleinere, weniger kontroverse
          Schritte aufteilen.
        implementation:
          - "Erst GEAK, dann Heizung, dann Hülle"
          - "Kleine Wins schaffen Momentum"
        effectiveness: 0.68

# =============================================================================
# INTERVENTIONSFELDER (WHAT - Utility Dimensions)
# =============================================================================
intervention_domains:
  description: |
    Die Hauptinterventionsfelder des BFE, gemappt auf EBF Utility-Dimensionen
    und typische Interventionstypen.

  domains:
    - id: "DOM-HEAT"
      name: "Heizungsersatz"
      description: "Umstieg von fossil auf erneuerbar (Wärmepumpe, Fernwärme, etc.)"
      utility_mapping:
        u_F: "Kosteneinsparung langfristig, Wertsteigerung"
        u_E: "CO2-Reduktion, Klimaschutz"
        u_P: "Komforterhalt/-verbesserung"
        u_S: "Norm-Konformität, Zukunftsfähigkeit"
      typical_interventions:
        - type: "T1_Information"
          examples: ["Heizkostenvergleich", "GEAK-Beratung"]
        - type: "T3_ChoiceArchitecture"
          examples: ["Impulsberatung bei Heizungsdefekt", "Vereinfachte Förderanträge"]
        - type: "T6_Social"
          examples: ["Nachbarschafts-Kampagnen", "Testimonials"]
        - type: "T7_Financial"
          examples: ["Förderbeiträge", "Zinsgünstige Kredite"]
      key_context_factors:
        from_meso: ["ENE-REG-06", "ENE-PSY-02", "ENE-SOC-04", "ENE-ECO-02"]
        from_makro: ["CH-DEM-01", "CH-ECO-03"]

    - id: "DOM-SOLAR"
      name: "Solar-Adoption"
      description: "Installation von PV-Anlagen auf Gebäuden"
      utility_mapping:
        u_F: "Stromkostenreduktion, Einspeisevergütung"
        u_E: "Erneuerbare Produktion"
        u_S: "Sichtbares Commitment, Status"
        u_X: "Selbstversorgung, Autonomie"
      typical_interventions:
        - type: "T1_Information"
          examples: ["Solarkataster", "Potenzialanalyse"]
        - type: "T3_ChoiceArchitecture"
          examples: ["Solar-Check bei Baubewilligung", "Opt-out Solarofferten"]
        - type: "T6_Social"
          examples: ["Solargenossenschaften", "Gemeinde-Challenges"]
        - type: "T7_Financial"
          examples: ["Einmalvergütung", "Steuerabzüge"]
      key_context_factors:
        from_meso: ["ENE-REG-02", "ENE-SOC-01", "ENE-ECO-03", "ENE-PSY-03"]
        from_makro: ["CH-DEM-01", "CH-SOC-12"]

    - id: "DOM-MOBILITY"
      name: "Elektromobilität"
      description: "Umstieg auf Elektrofahrzeuge"
      utility_mapping:
        u_F: "Tiefere Betriebskosten"
        u_E: "Emissionsreduktion"
        u_P: "Fahrerlebnis, Technologie"
        u_S: "Innovator-Image, Norm"
      typical_interventions:
        - type: "T1_Information"
          examples: ["TCO-Rechner", "Reichweiten-Information"]
        - type: "T3_ChoiceArchitecture"
          examples: ["Ladeinfrastruktur-Pflicht Neubauten"]
        - type: "T6_Social"
          examples: ["E-Auto-Testangebote", "Flottenumstellung öffentlich"]
      key_context_factors:
        from_meso: ["ENE-SOC-02", "ENE-PSY-05", "ENE-REG-07"]
        from_makro: ["CH-TEC-05"]

    - id: "DOM-EFFICIENCY"
      name: "Energieeffizienz / Suffizienz"
      description: "Reduktion des Energieverbrauchs durch Effizienz und Verhalten"
      utility_mapping:
        u_F: "Kosteneinsparung"
        u_E: "Ressourcenschonung"
        u_P: "Komforterhalt bei weniger Verbrauch"
      typical_interventions:
        - type: "T1_Information"
          examples: ["Stromverbrauchsvergleich", "Smart Meter Feedback"]
        - type: "T2_Feedback"
          examples: ["Echtzeit-Verbrauchsanzeige", "Monatsreports"]
        - type: "T3_ChoiceArchitecture"
          examples: ["Effiziente Geräte als Default", "Eco-Programme voreingestellt"]
        - type: "T6_Social"
          examples: ["Nachbarschaftsvergleiche", "Stromspar-Challenges"]
      key_context_factors:
        from_meso: ["ENE-PSY-01", "ENE-PSY-07", "ENE-PSY-08", "ENE-SOC-03"]
        from_makro: ["CH-SOC-12", "CH-TEC-03"]

