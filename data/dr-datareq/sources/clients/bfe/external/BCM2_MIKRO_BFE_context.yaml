# =============================================================================
# STRATEGISCHE IMPLIKATIONEN
# =============================================================================
strategic_implications:
  intervention_principles:
    - principle: "Default-Macht nutzen"
      description: |
        Bei Stromprodukt-Wahl, Tarifoptionen, Förderprogrammen:
        Klimafreundliche Option als Default setzen.
      relevant_factors: ["ENE-REG-08", "ENE-PSY-10"]

    - principle: "Kritische Momente nutzen"
      description: |
        Heizungsdefekt, Hauskauf, Renovation = Entscheidungsfenster.
        Proaktive Ansprache in diesen Momenten.
      relevant_factors: ["ENE-PSY-02", "ENE-REG-06"]

    - principle: "Soziale Normen sichtbar machen"
      description: |
        Solar-Clustering, E-Auto-Verbreitung kommunizieren.
        Nachbarschaftsvergleiche nutzen.
      relevant_factors: ["ENE-SOC-01", "ENE-SOC-02", "ENE-SOC-03"]

    - principle: "Komplexität reduzieren"
      description: |
        One-Stop-Shop für Förderung, vereinfachte Prozesse,
        Entscheidungsmüdigkeit adressieren.
      relevant_factors: ["ENE-PSY-10", "ENE-REG-04"]

    - principle: "Present Bias adressieren"
      description: |
        Upfront-Kosten senken (Förderung), langfristigen Nutzen
        konkret und salient machen, Finanzierungsmodelle anbieten.
      relevant_factors: ["ENE-PSY-04", "ENE-ECO-03", "ENE-ECO-04"]

  segment_specific:
    eigentümer_efh:
      primary_approach: "Kombinierte T3+T6+T7 Intervention"
      messaging: "Wertsteigerung + Norm + Förderung"
      timing: "Heizungsdefekt, Renovation, Nachbar installiert"

    mieter:
      primary_approach: "T1+T2 Intervention (Information + Feedback)"
      messaging: "Kosteneinsparung + einfache Tipps"
      limitation: "Keine Gebäude-Investitionen möglich"

    kmu:
      primary_approach: "T1+T7 Intervention (Beratung + Förderung)"
      messaging: "Effizienz = Wettbewerbsvorteil"
      channel: "Branchenverbände, EnAW"

# =============================================================================
# BCM-MODUL-KOPPLUNG
# =============================================================================
bcm_module_coupling:
  BCM2_01_INU:
    bfe_relevance: "Individuelle Kosten-Nutzen bei Energieentscheidungen"
    key_insight: "u_F kurzfristig oft negativ (Investment), langfristig positiv"

  BCM2_02_KNU:
    bfe_relevance: "Klimaschutz als kollektiver Nutzen"
    key_insight: "Tragedy of the Commons - braucht Norm-Interventionen"

  BCM2_03_IDN:
    bfe_relevance: "Energie als Identitätsthema"
    key_insight: "Heizungs-Identität als Barriere, Klima-Identität als Enabler"

  BCM2_04_KON:
    bfe_relevance: "Regulatorischer Kontext + Choice Architecture"
    key_insight: "Defaults haben enorme Wirkung im Energiebereich"

  BCM2_19_LCP:
    bfe_relevance: "Lebensphasen und Energie-Entscheidungen"
    key_insight: "Hauskauf, Familiengründung = kritische Momente"

