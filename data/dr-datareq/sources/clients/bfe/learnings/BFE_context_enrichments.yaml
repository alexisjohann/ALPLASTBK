# =============================================================================
# NOTES
# =============================================================================
notes: |
  Dieses File dient als zentrale Sammelstelle für alle BFE-Projekt-Learnings.

  Workflow:
  1. Projekt abgeschlossen → learnings.yaml im Projekt-Ordner ausgefüllt
  2. Relevante Learnings werden hier aggregiert (copy from project learnings)
  3. Review durch Senior Consultant / BFE Lead
  4. Propagation in MESO/MAKRO Kontextvektoren
  5. Propagation wird hier und in Ziel-Datei dokumentiert

  Qualitätskriterien für Propagation:
  - N ≥ 200 für Parameter-Updates
  - p < 0.05 für neue Faktoren
  - Replikation durch 2+ Projekte für MAKRO-Updates
