# BFE Projekt Kontext-Subset Template
# Version: 1.0
# Verwendung: Dokumentiert die für dieses Projekt relevanten Kontextfaktoren

# =============================================================================
# METADATEN
# =============================================================================
metadata:
  project_id: "BFE-YYYY-NNN"
  project_name: "[Projektname]"
  created: "YYYY-MM-DD"
  last_updated: "YYYY-MM-DD"

  source_vectors:
    makro: "BCM2_04_KON"
    meso: "BCM2_MESO_ENERGY_CH"
    mikro: "BCM2_MIKRO_BFE"

# =============================================================================
# SELEKTIERTE MAKRO-FAKTOREN (aus BCM2_04_KON)
# =============================================================================
makro_factors:
  description: |
    Schweiz-weite Kontextfaktoren, die für dieses Projekt relevant sind.
    Kopiert aus den BCM2_04_KON_*.yaml Dateien.

  demographic:
    # Beispiel - anpassen für Projekt
    - factor_id: "CH-DEM-01"
      name: "Wohneigentumsquote"
      value: "36.3%"
      source: "BFS 2023"
      project_relevance: "[Warum relevant für dieses Projekt?]"
      psi_mapping: "kappa_INST"

  economic:
    - factor_id: "CH-ECO-03"
      name: "Zinsniveau"
      value: "[aktueller Wert]"
      source: "[Quelle]"
      project_relevance: "[...]"
      psi_mapping: "kappa_INST"

  institutional:
    - factor_id: "CH-POL-04"
      name: "Föderalismus"
      value: "26 Kantone, unterschiedliche Regelungen"
      project_relevance: "[...]"
      psi_mapping: "kappa_INST"

  socio_cultural:
    - factor_id: "CH-SOC-12"
      name: "Umweltbewusstsein"
      value: "[...]"
      source: "[...]"
      project_relevance: "[...]"
      psi_mapping: "kappa_SOCIAL"

# =============================================================================
# SELEKTIERTE MESO-FAKTOREN (aus BCM2_MESO_ENERGY_CH)
# =============================================================================
meso_factors:
  description: |
    Energie-Sektor-spezifische Faktoren für dieses Projekt.
    Kopiert aus BCM2_MESO_energy_ch.yaml.

  regulatory:
    - factor_id: "ENE-REG-06"
      name: "Heizungsersatz-Pflichten"
      current_state: "[...]"
      project_relevance: "[...]"
      psi_mapping: "kappa_INST"

  psychological:
    - factor_id: "ENE-PSY-02"
      name: "Heizungs-Identität"
      salienz: 0.68
      project_relevance: "[...]"
      psi_mapping: "kappa_IDN"

    - factor_id: "ENE-PSY-04"
      name: "Zeitliche Diskontierung"
      beta_estimate: 0.65
      project_relevance: "[...]"
      psi_mapping: "kappa_TEMP"

  social:
    - factor_id: "ENE-SOC-01"
      name: "Nachbarschafts-Norm Solar"
      salienz: 0.72
      project_relevance: "[...]"
      psi_mapping: "kappa_SOCIAL"

    - factor_id: "ENE-SOC-04"
      name: "Vermieter-Mieter-Dilemma"
      salienz: 0.82
      project_relevance: "[...]"
      psi_mapping: "kappa_INST"

  economic:
    - factor_id: "ENE-ECO-02"
      name: "Heizöl-Strom-Preisrelation"
      current_state: "[...]"
      project_relevance: "[...]"
      psi_mapping: "kappa_INST"

# =============================================================================
# SELEKTIERTE MIKRO-FAKTOREN (aus BCM2_MIKRO_BFE)
# =============================================================================
mikro_factors:
  description: |
    BFE-spezifische Faktoren und strategische Implikationen.

  strategic_principles:
    - principle: "[z.B. Default-Macht nutzen]"
      application_in_project: "[Wie wird es angewendet?]"

  intervention_domain:
    domain_id: "[z.B. DOM-HEAT]"
    typical_interventions_used:
      - type: "[T1/T3/T6/T7]"
        from_mikro_template: true

# =============================================================================
# PSI-DIMENSIONEN ZUSAMMENFASSUNG
# =============================================================================
psi_summary:
  description: |
    Zusammenfassung aller Psi-Dimensionen, die in diesem Projekt adressiert werden.

  primary_dimensions:
    - dimension: "kappa_INST"
      factors_count: "[Anzahl]"
      intervention_approach: "[Wie adressieren wir diese Dimension?]"

    - dimension: "kappa_ARCH"
      factors_count: "[Anzahl]"
      intervention_approach: "[...]"

  secondary_dimensions:
    - dimension: "kappa_SOCIAL"
      factors_count: "[Anzahl]"
      intervention_approach: "[...]"

# =============================================================================
# KONTEXT-HYPOTHESEN
# =============================================================================
context_hypotheses:
  description: |
    Hypothesen über Kontextfaktoren, die im Projekt getestet werden.
    Diese werden nach Abschluss in learnings.yaml dokumentiert.

  hypotheses:
    - id: "H1"
      factor: "[z.B. ENE-PSY-02]"
      hypothesis: "[z.B. Heizungs-Identität ist stärker bei >60-Jährigen]"
      measurement: "[Wie messen wir das?]"
      status: "untested"  # untested | confirmed | rejected | modified

    - id: "H2"
      factor: "[...]"
      hypothesis: "[...]"
      measurement: "[...]"
      status: "untested"

# =============================================================================
# FAKTOREN-INTERAKTIONEN
# =============================================================================
factor_interactions:
  description: |
    Erwartete Interaktionen zwischen Kontextfaktoren.

  interactions:
    - factors: ["ENE-PSY-02", "ENE-SOC-01"]
      interaction_type: "moderating"
      hypothesis: "Heizungs-Identität schwächt Nachbarschafts-Norm-Effekt"
      expected_direction: "negative"

    - factors: ["ENE-REG-06", "ENE-PSY-04"]
      interaction_type: "mediating"
      hypothesis: "Pflichten reduzieren Wirkung von Present Bias"
      expected_direction: "positive"

# =============================================================================
# DATEN-LÜCKEN
# =============================================================================
data_gaps:
  description: |
    Identifizierte Lücken in den Kontextdaten, die durch dieses Projekt
    geschlossen werden könnten.

  gaps:
    - factor_id: "[z.B. NEU - noch nicht in MESO]"
      description: "[Beschreibung des fehlenden Faktors]"
      importance: "high | medium | low"
      data_collection_plan: "[Wie erheben wir die Daten?]"

# =============================================================================
# UPDATE-LOG
# =============================================================================
update_log:
  - date: "YYYY-MM-DD"
    change: "Initial version created"
    author: "[Name]"
