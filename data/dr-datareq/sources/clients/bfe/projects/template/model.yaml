# BFE Projekt-Modell Template
# Version: 1.0
# Verwendung: Kopiere diesen Ordner für ein neues Projekt
# Benennung: projects/YYYY_projektname/

# =============================================================================
# PROJEKT-METADATEN
# =============================================================================
metadata:
  project_id: "BFE-YYYY-NNN"  # z.B. BFE-2026-001
  name: "[Projektname]"
  description: "[Kurzbeschreibung der Intervention]"

  status: "planning"  # planning | active | completed | cancelled
  created: "YYYY-MM-DD"
  last_updated: "YYYY-MM-DD"

  timeline:
    planning_start: "YYYY-MM-DD"
    implementation_start: "YYYY-MM-DD"
    implementation_end: "YYYY-MM-DD"
    evaluation_end: "YYYY-MM-DD"

  team:
    bfe_lead: "[Name]"
    fehradvice_lead: "[Name]"

  context_sources:
    makro: "BCM2_04_KON"
    meso: "BCM2_MESO_ENERGY_CH"
    mikro: "BCM2_MIKRO_BFE"

# =============================================================================
# 10C MODELL (WHO, WHAT, HOW, WHEN, WHERE, AWARE, READY, STAGE, HIERARCHY)
# =============================================================================

# -----------------------------------------------------------------------------
# WHO: Zielgruppe (Welfare Hierarchy)
# -----------------------------------------------------------------------------
who:
  core_question: "Wer soll das Verhalten ändern?"

  primary_target:
    segment: "[z.B. Eigentümer EFH]"
    size_estimate: "[z.B. 50'000 Haushalte in Kanton X]"
    selection_criteria:
      - "[Kriterium 1]"
      - "[Kriterium 2]"

  secondary_targets:
    - segment: "[z.B. Installateure]"
      role: "Multiplikator"

  welfare_levels:
    L0_individual: "[Wie profitiert das Individuum?]"
    L1_household: "[Wie profitiert der Haushalt?]"
    L2_community: "[Wie profitiert die Gemeinde/Region?]"
    L3_society: "[Wie profitiert die Gesellschaft?]"

# -----------------------------------------------------------------------------
# WHAT: Zielverhalten und Utility-Dimensionen
# -----------------------------------------------------------------------------
what:
  core_question: "Welches Verhalten soll erreicht werden?"

  target_behavior:
    current: "[Aktuelles Verhalten, z.B. 'Ölheizung weiter betreiben']"
    desired: "[Gewünschtes Verhalten, z.B. 'Wärmepumpe installieren']"
    behavioral_gap: "[Beschreibung der Lücke]"

  utility_dimensions:
    u_F:
      description: "Finanzieller Nutzen"
      current_perception: "[Wie wird u_F aktuell wahrgenommen?]"
      target_perception: "[Wie soll u_F wahrgenommen werden?]"
      delta_intervention: "[Wie verändert die Intervention u_F?]"

    u_E:
      description: "Ökologischer Nutzen"
      current_perception: "[...]"
      target_perception: "[...]"
      delta_intervention: "[...]"

    u_P:
      description: "Psychologischer Nutzen (Komfort, Sicherheit)"
      current_perception: "[...]"
      target_perception: "[...]"
      delta_intervention: "[...]"

    u_S:
      description: "Sozialer Nutzen (Status, Normen)"
      current_perception: "[...]"
      target_perception: "[...]"
      delta_intervention: "[...]"

    u_X:
      description: "Identitäts-Nutzen (Selbstbild)"
      current_perception: "[...]"
      target_perception: "[...]"
      delta_intervention: "[...]"

# -----------------------------------------------------------------------------
# HOW: Komplementarität und Interaktionen
# -----------------------------------------------------------------------------
how:
  core_question: "Wie interagieren die Interventionen?"

  intervention_mix:
    primary_intervention:
      type: "[T1-T8, z.B. T3_ChoiceArchitecture]"
      description: "[Beschreibung]"
      target_dimension: "[z.B. kappa_ARCH]"

    secondary_interventions:
      - type: "[z.B. T6_Social]"
        description: "[...]"
        target_dimension: "[z.B. kappa_SOCIAL]"

      - type: "[z.B. T7_Financial]"
        description: "[...]"
        target_dimension: "[z.B. u_F]"

  complementarity_assessment:
    positive_interactions:
      - pair: "[T3, T6]"
        gamma: "+0.2"
        rationale: "[Warum verstärken sie sich?]"

    negative_interactions:
      - pair: "[T6, T7]"
        gamma: "-0.2"
        rationale: "Crowding-Out: Finanzielle Anreize können soziale Motivation untergraben"
        mitigation: "[Wie wird das adressiert?]"

# -----------------------------------------------------------------------------
# WHEN: Timing und temporaler Kontext
# -----------------------------------------------------------------------------
when:
  core_question: "Wann ist der optimale Interventionszeitpunkt?"

  critical_moments:
    - moment: "[z.B. Heizungsdefekt]"
      opportunity_window: "[z.B. 2-4 Wochen]"
      detection_mechanism: "[Wie erkennen wir den Moment?]"

  temporal_context:
    seasonality: "[z.B. Herbst = Heizthema salient]"
    policy_windows: "[z.B. neue Förderperiode ab 2027]"
    life_events: "[z.B. Pensionierung, Erbschaft]"

  psi_temporal:
    kappa_TEMP: "[Beschreibung des temporalen Kontexts]"

# -----------------------------------------------------------------------------
# WHERE: Kontext und Choice Architecture
# -----------------------------------------------------------------------------
where:
  core_question: "In welchem Kontext findet die Entscheidung statt?"

  decision_context:
    physical: "[z.B. Zuhause, Beratungsgespräch, Online]"
    social: "[z.B. alleine, mit Partner, mit Berater]"
    informational: "[z.B. welche Infos liegen vor?]"

  choice_architecture:
    current_default: "[Was passiert, wenn nichts getan wird?]"
    proposed_default: "[Wie ändern wir den Default?]"
    friction_reduction: "[Welche Hürden werden entfernt?]"
    salience_increase: "[Was wird sichtbarer gemacht?]"

  psi_context:
    kappa_INST: "[Institutioneller Kontext]"
    kappa_ARCH: "[Choice Architecture]"
    kappa_SOCIAL: "[Sozialer Kontext]"

# -----------------------------------------------------------------------------
# AWARE: Awareness und Wissen
# -----------------------------------------------------------------------------
aware:
  core_question: "Was wissen die Zielgruppen (nicht)?"

  awareness_gaps:
    - gap: "[z.B. Unkenntnis über Förderhöhe]"
      current_level: "[0-1 Skala]"
      target_level: "[0-1 Skala]"
      intervention: "[Wie schliessen wir die Lücke?]"

  knowledge_barriers:
    - barrier: "[z.B. Komplexität Antragsprozess]"
      impact: "[Wie beeinflusst es Verhalten?]"
      intervention: "[Wie adressieren wir es?]"

  psi_awareness:
    kappa_AWX: "[Awareness-Kontext]"
    kappa_KOG: "[Kognitiver Kontext]"

# -----------------------------------------------------------------------------
# READY: Handlungsbereitschaft
# -----------------------------------------------------------------------------
ready:
  core_question: "Wie handlungsbereit ist die Zielgruppe?"

  willingness_assessment:
    W_base: "[Basis-Handlungsbereitschaft, 0-1]"
    theta: "[Aktivierungsschwelle]"

  barriers_to_action:
    - barrier: "[z.B. Upfront-Kosten]"
      type: "financial | cognitive | emotional | social"
      severity: "high | medium | low"
      intervention: "[Wie adressieren?]"

  enablers:
    - enabler: "[z.B. Förderung deckt 40%]"
      impact: "[Wie erhöht es Handlungsbereitschaft?]"

# -----------------------------------------------------------------------------
# STAGE: Position in der Behavioral Change Journey
# -----------------------------------------------------------------------------
stage:
  core_question: "Wo steht die Zielgruppe in der Journey?"

  bcj_phase_distribution:
    unaware: "[% der Zielgruppe]"
    aware: "[%]"
    considering: "[%]"
    intending: "[%]"
    acting: "[%]"
    maintaining: "[%]"

  phase_specific_interventions:
    unaware_to_aware:
      intervention: "[...]"
      kpi: "[...]"

    aware_to_considering:
      intervention: "[...]"
      kpi: "[...]"

    considering_to_intending:
      intervention: "[...]"
      kpi: "[...]"

    intending_to_acting:
      intervention: "[...]"
      kpi: "[...]"

# -----------------------------------------------------------------------------
# HIERARCHY: Entscheidungshierarchie
# -----------------------------------------------------------------------------
hierarchy:
  core_question: "Auf welcher Ebene wird entschieden?"

  decision_levels:
    L0_automatic: "[Automatische/habituelle Komponenten]"
    L1_heuristic: "[Daumenregeln, die genutzt werden]"
    L2_deliberate: "[Bewusste Abwägungen]"
    L3_meta: "[Übergeordnete Werte/Prinzipien]"

  intervention_targeting:
    primary_level: "[z.B. L2_deliberate]"
    secondary_level: "[z.B. L1_heuristic]"
    rationale: "[Warum diese Ebenen?]"

# =============================================================================
# PREDICTIONS (Vorhersagen)
# =============================================================================
predictions:
  primary_outcome:
    metric: "[z.B. Anzahl Heizungsersatz fossil→erneuerbar]"
    baseline: "[Aktueller Wert]"
    target: "[Zielwert]"
    confidence_interval: "[z.B. 95% CI: 150-250]"

  secondary_outcomes:
    - metric: "[z.B. Anfragen Impulsberatung]"
      baseline: "[...]"
      target: "[...]"

  behavioral_kpis:
    - kpi: "[z.B. Conversion Rate Beratung → Umsetzung]"
      target: "[...]"

# =============================================================================
# REFERENZEN
# =============================================================================
references:
  context_factors_used:
    file: "context_subset.yaml"

  similar_projects:
    - project_id: "[z.B. BFE-2024-003]"
      relevance: "[Was können wir lernen?]"

  literature:
    - citation: "[...]"
      relevance: "[...]"
