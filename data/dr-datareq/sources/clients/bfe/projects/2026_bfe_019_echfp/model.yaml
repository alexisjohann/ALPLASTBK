    target: 0.50
    rationale: "Verbesserung durch Follow-up und Vereinfachung"

  - kpi: "Anteil geplanter vs. Notfall-Ersatz"
    baseline: "45:55"
    target: "55:45"
    rationale: "Proaktive WHEN-Trigger-Ansprache"

  - kpi: "W_base Erhöhung (Aggregiert)"
    baseline: 0.30
    target: 0.45
    method: "Panel-Befragung"

  segment_specific_predictions:
    SEG_EFH:
      W_base_increase: "+0.18"
      bcj_shift: "considering → intending (+12 pp)"
      effective_vector: [0.0, 0.25, 0.1, 0.4, 0.05, 0.1, 0.1, 0.0, 0.0]
      dominant_effect: "I_WHEN (Choice Architecture) + I_WHAT (Social)"
      mechanism: "Vereinfachung + Nachbarschafts-Norm"

    SEG_MFH:
      W_base_increase: "+0.12"
      bcj_shift: "aware → considering (+10 pp)"
      effective_vector: [0.0, 0.2, 0.15, 0.1, 0.05, 0.35, 0.1, 0.05, 0.0]
      dominant_effect: "I_AWARE (Information) + I_WHAT (Financial)"
      mechanism: "ROI-Kommunikation + Pre-Commitment"

    SEG_STWE:
      W_base_increase: "+0.08"
      bcj_shift: "aware → considering (+5 pp)"
      effective_vector: [0.1, 0.35, 0.05, 0.2, 0.05, 0.1, 0.1, 0.05, 0.0]
      dominant_effect: "I_WHAT (Social) + I_WHEN (Facilitierung)"
      mechanism: "Champion-Strategie + koordinierter Prozess"
      note: "Schwerstes Segment - niedrigste Wirkung wegen Koordinationsproblem"
# =============================================================================
# PORTFOLIO-OPTIMIERUNG (Constraint-basiert, Multi-Level, Multi-Temporal)
# =============================================================================
# Optimales Interventionsportfolio emergiert aus:
# - Schätzfunktion →I = f(Θ, Ψ, φ, L)
# - Nebenbedingungen (Budget, Crowding, Timing, Kapazität, Ethik)
# - Strategische/Taktische/Operative Ebene
# - Temporale Horizonte (instant, kurz, mittel, langfristig)

portfolio_optimization:
  description: |
    Hierarchische Portfolio-Optimierung: Aus den geschätzten Interventionsvektoren
    →I_segment werden unter Nebenbedingungen optimale Portfolios bestimmt.

    Optimierungsproblem:
    max Σ_s Σ_m w_sm × E[ΔW_sm(→I_sm)]  # Erwartete Wirkung maximieren
    s.t. Nebenbedingungen C1-C6

  # ===========================================================================
  # NEBENBEDINGUNGEN (Constraints)
  # ===========================================================================
  constraints:
    C1_budget:
      name: "Budgetrestriktion"
      type: "inequality"
      formula: "Σ_i cost(I_i) ≤ B_total"
      parameters:
        B_total: "[CHF Budget p.a.]"
        B_strategic: "[% strategisch]"
        B_tactical: "[% taktisch]"
        B_operative: "[% operativ]"
      note: "Verteilung auf Ebenen vorab definiert"

    C2_crowding:
      name: "Crowding-Out Vermeidung"
      type: "equality/inequality"
      formula: "γ(I_i, I_j) ≥ γ_min für alle i,j im Portfolio"
      parameters:
        gamma_min: 0.0
      conflicts:
        - pair: ["I_WHAT(u_S)", "I_WHAT(u_F)"]
          gamma: -0.2
          mitigation: "Temporal sequencing oder Separation"
        - pair: ["I_WHAT(u_F)", "I_HOW(γ_intrinsic)"]
          gamma: -0.3
          mitigation: "Finanzielle Anreize NACH intrinsischer Motivation"
      note: "Konfligierende Interventionen nicht simultan"

    C3_timing:
      name: "Timing-Abhängigkeiten"
      type: "ordering"
      formula: "t(I_i) < t(I_j) wenn I_i → I_j"
      dependencies:
        - sequence: ["I_AWARE", "I_WHAT"]
          rationale: "Erst Awareness, dann Motivation"
        - sequence: ["I_WHAT", "I_WHEN"]
          rationale: "Erst Motivation, dann Choice Architecture"
        - sequence: ["I_AWARE", "I_READY"]
          rationale: "Wissen vor Handlungsbereitschaft"

    C4_capacity:
      name: "Kapazitätsrestriktion"
      type: "inequality"
      formula: "Σ_interventions capacity_required ≤ capacity_available"
      parameters:
        installer_capacity: "Ratio 1.02 (knapp)"
        consultation_capacity: "21'000 p.a. (skalierbar)"
        processing_capacity: "[Anzahl Anträge]"
      bottlenecks:
        - resource: "Wärmepumpen-Installation"
          wait_time: "18 Wochen"
          constraint: "M2 max scale limited"

    C5_ethical:
      name: "Ethik-Grenzen"
      type: "boundary"
      formula: "autonomy_score(I_i) ≥ η_min"
      parameters:
        eta_min: 0.3
      prohibited:
        - "Mandate ohne Option"
        - "Deception-basierte Interventionen"
        - "Exploitative Framing"
      required:
        - "Transparenz über Intervention"
        - "Opt-out Möglichkeit bei Defaults"

    C6_segment_specific:
      name: "Segment-Eignung"
      type: "conditional"
      formula: "σ(I_i, S_j) ≥ σ_min für Segment S_j"
      parameters:
        sigma_min: 0.5
      exclusions:
        - segment: "SEG_STWE"
          exclude: ["mandate_individual"]
          reason: "Keine individuelle Entscheidungsautonomie"
        - segment: "autonomy_seeking"
          exclude: ["strong_defaults"]
          reason: "Reaktanzrisiko"

  # ===========================================================================
  # HIERARCHISCHE EBENEN
  # ===========================================================================
  hierarchy:
    # -------------------------------------------------------------------------
    # STRATEGISCHE EBENE (Gesamtstrategie)
    # -------------------------------------------------------------------------
    strategic:
      description: |
        Gesamtstrategie: Welche 10C-Dimensionen priorisieren?
        Welche Segmente zuerst? Welche Module kombinieren?

      time_horizon: "3-12 Jahre (Gesamtprogramm)"
      decision_frequency: "jährlich / bei Major Review"

      optimization_target: "Maximiere langfristigen Impact auf Wechselrate"

      outputs:
        - portfolio_weights: "Gewichtung →I_weighted über Segmente"
        - segment_priority: "Reihenfolge der Segment-Bearbeitung"
        - module_sequence: "M1-M5 Aktivierungsreihenfolge"
        - resource_allocation: "Budget-Split strategisch/taktisch/operativ"

      # Strategische Entscheidungen für BFE_019
      decisions:
        dimension_priority:
          rank_1: "AWARE"
          rank_1_weight: 0.30
          rationale: "Niedrige Baseline-Awareness (0.45 → 0.75)"

          rank_2: "WHAT"
          rank_2_weight: 0.25
          rationale: "Social + Financial Utility aktivieren"

          rank_3: "WHEN"
          rank_3_weight: 0.20
          rationale: "Choice Architecture bei Trigger-Events"

          rank_4: "READY"
          rank_4_weight: 0.15
          rationale: "Willingness über Schwelle heben"

          other: 0.10

        segment_sequence:
          phase_1:
            segments: ["SEG_EFH"]
            rationale: "Höchste Autonomie, schnellste Wirkung"
            duration: "Jahr 1-2"
          phase_2:
            segments: ["SEG_MFH", "SEG_EFH"]
            rationale: "MFH parallel zu EFH-Fortsetzung"
            duration: "Jahr 2-4"
          phase_3:
            segments: ["SEG_STWE", "SEG_MFH", "SEG_EFH"]
            rationale: "STWE braucht längste Vorlaufzeit (Koordination)"
            duration: "Jahr 3-12"

        module_integration:
          core_module: "M2"
          rationale: "Heizungsersatz = höchste Wirkung (45k p.a.)"
          supporting_modules: ["M1", "M3"]
          optional_modules: ["M4", "M5"]

    # -------------------------------------------------------------------------
    # TAKTISCHE EBENE (Kampagnen-Design)
    # -------------------------------------------------------------------------
    tactical:
      description: |
        Taktik: Welche konkreten Kampagnen/Programme?
        Welche Kanäle? Welche Botschaften pro Segment?

      time_horizon: "3-24 Monate"
      decision_frequency: "quartalsweise"

      optimization_target: "Maximiere Conversion innerhalb Budget"

      outputs:
        - campaign_portfolio: "Konkrete Kampagnen mit Ziel-→I"
        - channel_allocation: "Budget pro Kanal"
        - message_variants: "Segment-spezifische Botschaften"
        - kpi_targets: "Quartals-Ziele"

      # Taktische Interventionsportfolios pro Segment
      segment_portfolios:
        SEG_EFH:
          target_vector: [0.0, 0.25, 0.1, 0.4, 0.05, 0.1, 0.1, 0.0, 0.0]
          campaigns:
            - name: "Heizungs-Check Kampagne"
              vector_emphasis: {I_AWARE: 0.3, I_STAGE: 0.2}
              channel: "Direct Mail + Digital"
              timing: "Herbst (vor Heizsaison)"

            - name: "Nachbarschafts-Challenge"
              vector_emphasis: {I_WHAT: 0.4, I_WHEN: 0.2}
              channel: "Gemeinde-Partnerschaften"
              timing: "Frühling (Solar-Saison)"

            - name: "One-Click Förderantrag"
              vector_emphasis: {I_WHEN: 0.5, I_READY: 0.2}
              channel: "Digital Platform"
              timing: "Kontinuierlich"

        SEG_MFH:
          target_vector: [0.0, 0.2, 0.15, 0.1, 0.05, 0.35, 0.1, 0.05, 0.0]
          campaigns:
            - name: "Verwaltungs-Toolkit"
              vector_emphasis: {I_AWARE: 0.4, I_HOW: 0.2}
              channel: "B2B (Verwaltungen)"
              timing: "Q1 (Budget-Planung)"

            - name: "ROI-Kalkulator"
              vector_emphasis: {I_WHAT: 0.3, I_AWARE: 0.2}
              channel: "Digital Tool"
              timing: "Kontinuierlich"

        SEG_STWE:
          target_vector: [0.1, 0.35, 0.05, 0.2, 0.05, 0.1, 0.1, 0.05, 0.0]
          campaigns:
            - name: "STWE Champion Programm"
              vector_emphasis: {I_WHO: 0.2, I_WHAT: 0.4}
              channel: "HEV Partnerschaften"
              timing: "Vor Versammlungssaison (Q1)"

            - name: "Facilitierter Sanierungsprozess"
              vector_emphasis: {I_WHEN: 0.3, I_READY: 0.3}
              channel: "Beratungsangebot"
              timing: "Auf Anfrage"

    # -------------------------------------------------------------------------
    # OPERATIVE EBENE (Ausführung)
    # -------------------------------------------------------------------------
    operative:
      description: |
        Operativ: Konkrete Touchpoints, Materialien, Interaktionen.
        Tägliche/wöchentliche Ausführung.

      time_horizon: "1 Tag - 3 Monate"
      decision_frequency: "wöchentlich / bei Trigger-Events"

      optimization_target: "Maximiere Response Rate pro Touchpoint"

      outputs:
        - touchpoint_scripts: "Konkrete Gesprächsleitfäden"
        - content_assets: "Flyer, Webseiten, E-Mails"
        - response_protocols: "Was tun bei Trigger-Event?"
        - ab_tests: "Varianten für Optimierung"

      # Operative Interventionen
      touchpoints:
        trigger_response:
          event: "Heizungsdefekt gemeldet"
          response_time: "< 24h"
          intervention:
            vector: [0.0, 0.25, 0.0, 0.35, 0.1, 0.2, 0.1, 0.0, 0.0]
            actions:
              - "Installateur-Toolkit aktivieren"
              - "Sofort-Beratung anbieten"
              - "Förder-Quick-Check"

        consultation:
          event: "Impulsberatung durchgeführt"
          follow_up: "< 48h"
          intervention:
            vector: [0.0, 0.2, 0.15, 0.25, 0.0, 0.25, 0.15, 0.0, 0.0]
            actions:
              - "Personalisierter Sanierungsfahrplan"
              - "Offerten-Vermittlung"
              - "Finanzierungsrechner"

        nudge_moments:
          - moment: "Stromrechnung erhalten"
            channel: "Beileger / E-Mail"
            vector: [0.0, 0.15, 0.0, 0.15, 0.0, 0.5, 0.2, 0.0, 0.0]
            message: "Feedback über eigenen Verbrauch"

          - moment: "Nachbar hat saniert"
            channel: "Gemeinde-Newsletter"
            vector: [0.0, 0.4, 0.0, 0.1, 0.0, 0.3, 0.2, 0.0, 0.0]
            message: "Social Proof + Erfahrungsbericht"

  # ===========================================================================
  # TEMPORALE DIMENSIONEN (pro Ebene)
  # ===========================================================================
  temporal_horizons:
    instant:
      description: "Sofort-Reaktion (< 24h)"
      applicable_levels: ["operative"]
      use_cases:
        - "Trigger-Event Response (Heizungsdefekt)"
        - "Anfrage-Beantwortung"
        - "Notfall-Beratung"
      optimization: "Minimize response time, maximize conversion"

    short_term:
      description: "Kurzfristig (1 Woche - 3 Monate)"
      applicable_levels: ["operative", "tactical"]
      use_cases:
        - "Kampagnen-Wellen"
        - "Saisonale Aktionen"
        - "AB-Tests"
      optimization: "Maximize immediate response rate"

    medium_term:
      description: "Mittelfristig (3-12 Monate)"
      applicable_levels: ["tactical", "strategic"]
      use_cases:
        - "Jahres-Kampagnenplan"
        - "Segment-Entwicklung"
        - "Kanal-Optimierung"
      optimization: "Maximize annual conversion volume"

    long_term:
      description: "Langfristig (1-12 Jahre)"
      applicable_levels: ["strategic"]
      use_cases:
        - "Gesamtprogramm-Strategie"
        - "Verhaltens-Shift (W_base Erhöhung)"
        - "Norm-Veränderung (kappa_SOCIAL)"
      optimization: "Maximize sustainable behavior change"

  # ===========================================================================
  # OPTIMIERUNGS-MATRIX (Ebene × Temporal)
  # ===========================================================================
  optimization_matrix:
    description: |
      Kreuzung von Hierarchie-Ebenen und Zeithorizonten.
      Jede Zelle hat spezifische Optimierungsziele und KPIs.

    # Zeilen: Ebenen, Spalten: Zeithorizonte
    matrix:
      strategic:
        instant: null  # Nicht anwendbar
        short_term:
          focus: "Quick Wins identifizieren"
          kpi: "First Response Rate"
        medium_term:
          focus: "Segment-Penetration"
          kpi: "Marktdurchdringung pro Segment"
        long_term:
          focus: "Systemische Verhaltensänderung"
          kpi: "Fossil→Erneuerbar Quote (+10pp)"

      tactical:
        instant:
          focus: "Trigger-Response-Protokolle"
          kpi: "Response Time < 24h"
        short_term:
          focus: "Kampagnen-Performance"
          kpi: "CPL (Cost per Lead)"
        medium_term:
          focus: "Segment-spezifische Conversion"
          kpi: "Conversion Rate pro Segment"
        long_term: null  # Nicht anwendbar

      operative:
        instant:
          focus: "Touchpoint-Exzellenz"
          kpi: "CSAT, Response Quality"
        short_term:
          focus: "Content-Optimierung"
          kpi: "CTR, Open Rate, Engagement"
        medium_term: null  # Nicht anwendbar
        long_term: null    # Nicht anwendbar

  # ===========================================================================
  # BEISPIEL: OPTIMALES PORTFOLIO Q1/2027
  # ===========================================================================
  example_portfolio_q1_2027:
    description: "Illustratives optimales Portfolio für Q1/2027"

    inputs:
      budget: "CHF 500k"
      focus_segment: "SEG_EFH"
      focus_module: "M2 (Heizungsersatz)"
      season: "Winter → Frühling Transition"

    optimized_allocation:
      strategic:
        decision: "EFH + Heizung priorisieren"
        budget_share: 0.10
        actions: ["Strategie-Review", "Partner-Alignment"]

      tactical:
        decision: "3 koordinierte Kampagnen"
        budget_share: 0.40
        campaigns:
          - name: "Heizungs-Check Februar"
            budget: "CHF 80k"
            target_vector: [0.0, 0.2, 0.0, 0.3, 0.1, 0.3, 0.1, 0.0, 0.0]
            expected_leads: 2500

          - name: "Förder-Offensive März"
            budget: "CHF 70k"
            target_vector: [0.0, 0.35, 0.0, 0.25, 0.0, 0.25, 0.15, 0.0, 0.0]
            expected_leads: 1800

          - name: "Solar-Frühlingsstart April"
            budget: "CHF 50k"
            target_vector: [0.0, 0.4, 0.0, 0.1, 0.0, 0.3, 0.2, 0.0, 0.0]
            expected_leads: 1200

      operative:
        decision: "Kontinuierliche Touchpoints"
        budget_share: 0.50
        activities:
          - "Installateur-Schulungen (CHF 50k)"
          - "Beratungsnetzwerk (CHF 80k)"
          - "Digital Platform Maintenance (CHF 40k)"
          - "Content Production (CHF 30k)"
          - "Trigger-Response-Team (CHF 50k)"

    constraints_satisfied:
      C1_budget: "✓ CHF 500k = 500k"
      C2_crowding: "✓ Keine konfligierenden Interventionen simultan"
      C3_timing: "✓ AWARE → WHAT → WHEN Sequenz"
      C4_capacity: "✓ Beratungskapazität ausreichend"
      C5_ethical: "✓ Alle Interventionen transparent"
      C6_segment: "✓ EFH-optimierte Interventionen"

    expected_outcomes:
      leads_total: 5500
      conversion_rate: 0.35
      conversions: 1925
      cost_per_conversion: "CHF 260"
      W_base_impact: "+0.05 (kumulativ)"

