# Öffentlich zugängliche Quellen zu erneuerbarheizen.ch Messungen
# Web-Recherche durchgeführt: 2026-01-28

metadata:
  recherche_datum: "2026-01-28"
  recherche_durch: "Claude/EBF Session"
  fazit: "Detaillierte Website-Metriken sind NICHT öffentlich. Nur aggregierte Programmstatistiken verfügbar."

# ============================================================================
# ÖFFENTLICH VERFÜGBARE QUELLEN
# ============================================================================

oeffentliche_quellen:

  - id: "PUB-001"
    name: "EnergieSchweiz Geschäftsbericht 2024"
    url: "https://www.energieschweiz.ch/geschaeftsbericht-2024/"
    verfuegbare_daten:
      - "30'000+ Impulsberatungen (Meilenstein seit Programmstart)"
      - "400 Organisationen im Netzwerk"
      - "~600 Projekte in 2024"
      - "186 neue Lehrlinge Solarinstallateur (August 2024)"
    nicht_verfuegbar:
      - "Conversion Rates"
      - "Traffic-Analyse"
      - "Kampagnen-Performance"

  - id: "PUB-002"
    name: "Gebäudeprogramm Jahresstatistik"
    url: "https://opendata.swiss/de/dataset/gebaudeprogramm-jahresbericht-und-jahresstatistik"
    verfuegbare_daten:
      - "CHF 607 Mio. Förderbudget 2024"
      - "26'560 Heizungsersätze 2023"
      - "87% davon Wärmepumpen"
      - "CHF 528 Mio. ausbezahlt 2023 (Rekord)"
      - "3'000 Vollzeitäquivalente Beschäftigungseffekt"
    nicht_verfuegbar:
      - "Kampagnenspezifische Attribution"
      - "erneuerbarheizen.ch Traffic"

  - id: "PUB-003"
    name: "BFE Publikationsdatenbank"
    url: "https://pubdb.bfe.admin.ch/"
    verfuegbare_daten:
      - "Leitfaden Wirkungsorientierung EnergieSchweiz"
      - "PEIK Evaluation (KMU-Beratung)"
      - "Energiestadt Label Evaluation"
      - "Topten Evaluation"
    nicht_verfuegbar:
      - "Spezifische erneuerbarheizen.ch Evaluation"
      - "Impulsberatung Wirkungsmessung"

  - id: "PUB-004"
    name: "Das Gebäudeprogramm Website"
    url: "https://www.dasgebaeudeprogramm.ch/"
    verfuegbare_daten:
      - "Förderkriterien und -beträge"
      - "Impulsprogramm Integration (seit 2025)"
      - "Allgemeine Programmstatistiken"

# ============================================================================
# VERGLEICH: ÖFFENTLICH VS. INTERN
# ============================================================================

vergleich_datenverfuegbarkeit:

  metriken:
    - metrik: "Impulsberatungen gesamt"
      oeffentlich: true
      oeffentlich_wert: "30'000+"
      intern_detail: "Detailliert nach Kanal, Segment, Region"

    - metrik: "Heizungsersätze CH"
      oeffentlich: true
      oeffentlich_wert: "26'560 (2023)"
      intern_detail: "Nicht kampagnenspezifisch zuordenbar"

    - metrik: "Conversion Rate Impulsberatung"
      oeffentlich: false
      intern_wert: "9.84% (+2.77 Pp.)"

    - metrik: "Traffic nach Kanal"
      oeffentlich: false
      intern_wert: "52% Kampagnen, 26% Organic"

    - metrik: "Heizkostenrechner-Nutzung"
      oeffentlich: false
      intern_wert: "-6% YoY"

    - metrik: "SEO-Rankings"
      oeffentlich: false
      intern_wert: "Vollständig dokumentiert (Top Keywords DE/FR/IT)"

    - metrik: "Segment-Performance"
      oeffentlich: false
      intern_wert: "EFH +23%, MFH -43%, KMU +100%"

    - metrik: "Verweisende Webseiten"
      oeffentlich: false
      intern_wert: "Top 10 mit Sessions"

# ============================================================================
# SCHLUSSFOLGERUNG
# ============================================================================

schlussfolgerung:
  haupterkenntnis: |
    Keine öffentliche Evaluation der erneuerbarheizen.ch Kampagne gefunden.
    Die BFE-Publikationsdatenbank enthält Evaluationen für andere Programme
    (PEIK, Energiestadt, Topten), aber keine spezifische Wirkungsmessung
    für erneuerbarheizen.ch.

  implikation_fuer_ebf: |
    Die internen WorkUnit-Daten sind die einzige Quelle für detaillierte
    Verhaltensmetriken. Für das EBF-Modell (MOD-ECHfP-001) müssen wir
    uns auf diese internen Daten stützen.

  empfehlung: |
    Bei Veröffentlichung von EBF-Analysen auf aggregierte öffentliche
    Zahlen (Gebäudeprogramm, EnergieSchweiz) referenzieren, nicht auf
    interne WorkUnit-Metriken.
