# Messkonzept erneuerbarheizen.ch
# Version: 1.0
# Erstellt: 2026-01-28
# Quelle: WorkUnit Jahresreports 2021-2025

metadata:
  name: "Messkonzept erneuerbarheizen.ch"
  version: "1.0"
  zeitraum:
    start: "2021-01"
    ende: "2025-12"
  status: "abgeschlossen"
  nachfolger: "cockpit_2026"

  verantwortlich:
    organisation: "WorkUnit"
    kontakt: "Philipp Bühler"
    adresse: "Ausstellungsstrasse 105, 8005 Zürich"
    email: "philipp@workunit.org"

  auftraggeber:
    organisation: "BFE - Bundesamt für Energie"
    programm: "EnergieSchweiz"
    kampagne: "Erneuerbar Heizen (ECHfP)"

# =============================================================================
# DATENQUELLEN
# =============================================================================
datenquellen:
  primaer:
    - id: "DS-001"
      name: "Matomo"
      typ: "web_analytics"
      url: "https://data.energieschweiz.ch"
      beschreibung: "Primäre Web-Analytics Plattform"
      metriken:
        - "Besuche"
        - "Seitenaufrufe"
        - "Aufenthaltszeit"
        - "Interaktionen"
        - "Konversionen"
        - "Bounce Rate"
      einschraenkungen:
        - "Juli 2024: 2-3 Wochen Messausfall"
        - "Cookieless Tracking kann zu Ungenauigkeiten führen"

    - id: "DS-002"
      name: "Google Search Console"
      typ: "seo_analytics"
      beschreibung: "SEO-Performance und Keyword-Daten"
      metriken:
        - "Impressionen"
        - "Klicks"
        - "CTR (Click-Through-Rate)"
        - "Durchschnittliche Position"
        - "Suchanfragen"
      sprachen:
        - "DE (Deutsch)"
        - "FR (Französisch)"
        - "IT (Italienisch)"

    - id: "DS-003"
      name: "Google Ads"
      typ: "kampagnen_analytics"
      beschreibung: "Bezahlte Kampagnen-Performance"
      metriken:
        - "Impressionen"
        - "Klicks"
        - "Kosten"
        - "CPC"
        - "Konversionen"

  sekundaer:
    - id: "DS-004"
      name: "Looker Studio Dashboard"
      typ: "visualisierung"
      url: "https://lookerstudio.google.com/s/o1j_yfmyk40"
      beschreibung: "Aggregiertes Reporting-Dashboard"

# =============================================================================
# KPI-HIERARCHIE
# =============================================================================
kpi_hierarchie:

  # Level 1: Reichweite
  reichweite:
    beschreibung: "Wie viele Menschen erreichen wir?"
    kpis:
      - id: "KPI-R-001"
        name: "Gesamtbesuche"
        einheit: "Anzahl"
        quelle: "Matomo"
        aggregation: "Summe pro Periode"

      - id: "KPI-R-002"
        name: "Unique Visitors"
        einheit: "Anzahl"
        quelle: "Matomo"

      - id: "KPI-R-003"
        name: "SEO Impressionen"
        einheit: "Anzahl"
        quelle: "Search Console"

      - id: "KPI-R-004"
        name: "Kampagnen-Reichweite"
        einheit: "Anzahl"
        quelle: "Google Ads"

  # Level 2: Engagement
  engagement:
    beschreibung: "Wie intensiv interagieren Besucher?"
    kpis:
      - id: "KPI-E-001"
        name: "Aufenthaltszeit"
        einheit: "Sekunden"
        quelle: "Matomo"
        benchmark: "> 60 Sekunden"

      - id: "KPI-E-002"
        name: "Interaktionen pro Besuch"
        einheit: "Anzahl"
        quelle: "Matomo"
        benchmark: "> 2.0"

      - id: "KPI-E-003"
        name: "Heizkostenrechner Nutzung"
        einheit: "Anzahl"
        quelle: "Matomo (Event)"
        beschreibung: "Abschluss des Heizkostenrechners"

      - id: "KPI-E-004"
        name: "Bounce Rate"
        einheit: "Prozent"
        quelle: "Matomo"
        benchmark: "< 50%"

  # Level 3: Konversion
  konversion:
    beschreibung: "Wie viele führen Zielaktionen aus?"
    kpis:
      - id: "KPI-K-001"
        name: "Impulsberatung Anfragen"
        einheit: "Anzahl"
        quelle: "Matomo (Goal)"
        typ: "Lead"
        wert: "Hoch"
        segmente:
          - "EFH (Einfamilienhaus)"
          - "MFH (Mehrfamilienhaus)"
          - "KMU"

      - id: "KPI-K-002"
        name: "Kontaktformular"
        einheit: "Anzahl"
        quelle: "Matomo (Goal)"
        typ: "Lead"
        wert: "Mittel"

      - id: "KPI-K-003"
        name: "Heizkostenrechner Abschluss"
        einheit: "Anzahl"
        quelle: "Matomo (Goal)"
        typ: "Engagement"
        wert: "Mittel"

  # Level 4: Conversion Rates
  conversion_rates:
    beschreibung: "Effizienz der Konversionen"
    kpis:
      - id: "KPI-CR-001"
        name: "Impulsberatung Conversion Rate"
        formel: "Impulsberatung Anfragen / Besuche * 100"
        einheit: "Prozent"
        benchmark_2024: "9.84%"

      - id: "KPI-CR-002"
        name: "Heizkostenrechner Conversion Rate"
        formel: "Heizkostenrechner Abschluss / Besuche * 100"
        einheit: "Prozent"
        benchmark_suchmaschinen: "26%"

      - id: "KPI-CR-003"
        name: "Kontakt Conversion Rate"
        formel: "Kontaktformular / Besuche * 100"
        einheit: "Prozent"

# =============================================================================
# KANAL-DEFINITION
# =============================================================================
kanaele:
  - id: "CH-001"
    name: "Kampagnen"
    typ: "paid"
    beschreibung: "Bezahlte Werbung (Google Ads, Native, Paid Content)"
    untertypen:
      - name: "cpc"
        beschreibung: "Google Ads Cost-per-Click"
      - name: "native"
        beschreibung: "Native Advertising"
      - name: "paidcontent"
        beschreibung: "Paid Content Platzierungen"
      - name: "qr"
        beschreibung: "QR-Code Kampagnen"
    anteil_2024: 0.52
    qualitaet: "unterdurchschnittlich"
    staerke: "Volumen"

  - id: "CH-002"
    name: "Suchmaschinen"
    typ: "organic"
    beschreibung: "Organischer Traffic von Google, Bing etc."
    anteil_2024: 0.20
    qualitaet: "sehr hoch"
    staerke: "Höchste Conversion Rate (26% Heizkostenrechner)"

  - id: "CH-003"
    name: "Direkte Zugriffe"
    typ: "direct"
    beschreibung: "Direkteingabe URL, Bookmarks"
    anteil_2024: 0.15
    qualitaet: "hoch"
    staerke: "Höchste Kontakt-Conversion"

  - id: "CH-004"
    name: "Verweisende Webseiten"
    typ: "referral"
    beschreibung: "Links von anderen Webseiten"
    anteil_2024: 0.10
    qualitaet: "sehr hoch"
    staerke: "Längste Aufenthaltszeit"

  - id: "CH-005"
    name: "Soziale Netzwerke"
    typ: "social"
    beschreibung: "Facebook, LinkedIn, etc."
    anteil_2024: 0.03
    qualitaet: "gering"
    schwaeche: "Geringste Aufenthaltszeit"

# =============================================================================
# SEGMENTIERUNG
# =============================================================================
segmentierung:

  nach_sprache:
    - id: "SEG-LANG-DE"
      name: "Deutsch"
      anteil: 0.60

    - id: "SEG-LANG-FR"
      name: "Französisch"
      anteil: 0.35
      besonderheit: "Überdurchschnittlicher kantonaler Traffic"

    - id: "SEG-LANG-IT"
      name: "Italienisch"
      anteil: 0.05
      besonderheit: "Sehr geringe CTR, Optimierungspotential"

  nach_gebaeudetyp:
    - id: "SEG-GEB-EFH"
      name: "Einfamilienhaus"
      impulsberatung_trend_2024: "+23%"

    - id: "SEG-GEB-MFH"
      name: "Mehrfamilienhaus"
      impulsberatung_trend_2024: "-43%"

    - id: "SEG-GEB-KMU"
      name: "KMU/Gewerbe"
      impulsberatung_trend_2024: "+100%"
      einstiegsseite: "https://erneuerbarheizen.ch/unternehmen-verwaltung/"

  nach_intent:
    - id: "SEG-INT-INFO"
      name: "Information"
      keywords: ["wie teuer", "was kostet", "wie funktioniert"]

    - id: "SEG-INT-VERBOT"
      name: "Verbot/Regulierung"
      keywords: ["verbot elektroheizung", "wie lange noch erlaubt"]
      trend_2024: "stark steigend"

    - id: "SEG-INT-BERATUNG"
      name: "Beratung"
      keywords: ["impulsberatung", "impulsberater"]

# =============================================================================
# REPORTING-ZYKLUS
# =============================================================================
reporting:
  frequenz: "monatlich"
  format: "PDF Report + Dashboard"

  jahresreport:
    inhalt:
      - "Top Kanäle"
      - "Top verweisende Webseiten"
      - "Kampagnen-Performance"
      - "SEO Traffic"
      - "Top Einstiegsseiten"
      - "Top Beiträge (Blog)"
      - "Konkurrenzvergleich"
      - "Empfohlene Massnahmen"

  dashboard:
    url: "https://lookerstudio.google.com/s/o1j_yfmyk40"
    aktualisierung: "täglich"

# =============================================================================
# BEKANNTE LIMITATIONEN
# =============================================================================
limitationen:
  - id: "LIM-001"
    beschreibung: "Messausfall Juli 2024 (2-3 Wochen)"
    auswirkung: "2024-Zahlen leicht unterschätzt"

  - id: "LIM-002"
    beschreibung: "Keine direkte Attribution zu Heizungsersatz"
    auswirkung: "Kausaler Zusammenhang nicht messbar"

  - id: "LIM-003"
    beschreibung: "Offline-Konversionen nicht erfasst"
    auswirkung: "Telefonische Beratungen nicht inkludiert"

  - id: "LIM-004"
    beschreibung: "Cross-Device Tracking limitiert"
    auswirkung: "Nutzer auf mehreren Geräten können doppelt gezählt werden"

# =============================================================================
# VERBINDUNG ZU EBF-MODELL
# =============================================================================
ebf_integration:

  messkonzept_zu_10c:
    AWARE:
      gemessen_durch: ["KPI-R-001", "KPI-R-003", "KPI-E-003"]
      beschreibung: "Reichweite und Heizkostenrechner-Nutzung"

    READY:
      gemessen_durch: ["KPI-K-001", "KPI-CR-001"]
      beschreibung: "Impulsberatungs-Anfragen"

    STAGE:
      gemessen_durch: ["Kanal-Verteilung"]
      beschreibung: "Kampagnen = frühe Phasen, SEO = spätere Phasen"

  nicht_gemessen:
    - "WHO: Installateur-Interaktionen"
    - "WHAT: Utility-Änderungen"
    - "HOW: Intervention-Interaktionen"
    - "Tatsächlicher Heizungsersatz (Outcome)"

  empfehlung:
    beschreibung: "Neues Cockpit-Konzept 2026 sollte diese Lücken schliessen"
    verweis: "../cockpit/"
