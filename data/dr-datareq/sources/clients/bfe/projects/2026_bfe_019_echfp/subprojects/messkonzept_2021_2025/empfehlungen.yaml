# Empfehlungen aus WorkUnit Jahresreport 2024
# Quelle: WorkUnit Jahresreport 2024 (06. Januar 2025)

metadata:
  quelle: "WorkUnit Jahresreport 2024"
  datum: "2025-01-06"
  ersteller: "Philipp Bühler"

# =============================================================================
# CONTENT & SEO EMPFEHLUNGEN
# =============================================================================
content_seo:

  - id: "EMP-CS-001"
    titel: "Content-Ausbau für steigende Keywords"
    prioritaet: "hoch"
    beschreibung: |
      Der Ausbau des Contents ist weiterhin eine effiziente Methode, um relevanten
      organischen Traffic auf die Webseite zu bringen.
    massnahmen:
      - "Keywords mit steigender Sichtbarkeit priorisieren"
      - "Zielseiten prüfen und optimieren"
      - "Implizite und explizite Nutzerfragen beantworten"
    beispiel:
      url: "https://erneuerbarheizen.ch/wie-teuer-ist-eine-waermepumpe-2/"
      problem: "Niedrige Rankings, wenig Klicks"
      ursache: "Zentrale Information fehlt: Kosten der Wärmepumpe"
      loesung: "Kostentabelle hinzufügen (vgl. energieheld.ch)"
    ebf_dimension: "AWARE"

  - id: "EMP-CS-002"
    titel: "Blog-Publikationsfrequenz erhöhen"
    prioritaet: "mittel"
    beschreibung: |
      Erhöhen Sie die Frequenz der Blog-Publikationen und richten Sie die Beiträge
      systematisch auf Ziel-Keywords mit vielversprechenden Suchvolumen aus.
    massnahmen:
      - "Ziel-Keywords mit Suchvolumen identifizieren"
      - "Nutzerfragen aus Search Console berücksichtigen"
      - "Redaktionsplan erstellen"
    ebf_dimension: "AWARE"

  - id: "EMP-CS-003"
    titel: "Heizsystem-Seiten optimieren"
    prioritaet: "hoch"
    beschreibung: |
      Mehr Traffic als die Blogbeiträge geht zu den Heizsystem-Seiten.
      Diese sollten kontinuierlich aktualisiert und für Conversions optimiert werden.
    massnahmen:
      - "Regelmässige Aktualisierung"
      - "Nutzerfragen via Search Console beantworten"
      - "Conversion-Elemente optimieren"
    ebf_dimension: "AWARE, READY"

  - id: "EMP-CS-004"
    titel: "Blog-URL-Struktur verbessern"
    prioritaet: "niedrig"
    beschreibung: |
      Für ein einfacheres Tracking der Blogbeiträge wird empfohlen, diese in einem
      Ordner /blog/ unterzubringen.
    massnahmen:
      - "Neue URL-Struktur: /blog/[beitrag]"
      - "301-Redirects für alte URLs"
      - "Tracking-Segmente anpassen"
    ebf_dimension: "Measurement"

# =============================================================================
# REGIONALISIERUNG
# =============================================================================
regional:

  - id: "EMP-REG-001"
    titel: "Westschweizer Kantone als Vorbild"
    prioritaet: "hoch"
    beschreibung: |
      Da der Kanton Fribourg von fr.ch bereits die drittwichtigste verweisende
      Webseite war, wird empfohlen, diese Verweise näher zu untersuchen.
    massnahmen:
      - "Analyse der FR-Verweise (was genau verlinkt?)"
      - "Best Practices auf andere Kantone übertragen"
      - "Kantonale Partnerschaften ausbauen"
    kantone_vorbild: ["FR", "VS", "NE"]
    ebf_dimension: "WHAT (u_S Normen)"

  - id: "EMP-REG-002"
    titel: "Tessin On-Page Optimierung"
    prioritaet: "mittel"
    beschreibung: |
      Der Tessiner Traffic ist zwar demographisch bedingt geringer.
      Da die Klickraten von Suchmaschinen sehr gering sind, wird empfohlen,
      die bei den wichtigsten 2-5 Zielseiten eine On-Page Optimierung vorzunehmen.
    massnahmen:
      - "Top 2-5 IT-Zielseiten identifizieren"
      - "Keywords mit Impressionen aber ohne Klicks optimieren"
      - "Meta-Titles und Descriptions anpassen"
    problem: "Hohe Impressionen, fast keine Klicks"
    ebf_dimension: "AWARE"

# =============================================================================
# CONVERSION-OPTIMIERUNG
# =============================================================================
conversion:

  - id: "EMP-CON-001"
    titel: "Erneuerbare Heizsysteme Landing Pages"
    prioritaet: "mittel"
    beschreibung: |
      Die Konversionsraten der Landing Pages im Bereich "Erneuerbare Heizsysteme"
      sind relativ niedrig.
    massnahmen:
      - "Inhaltsseiten erweitern"
      - "Konkrete Nutzerfragen beantworten"
      - "Verlinkung zu Heizungsrechner und Impulsberatung sicherstellen"
      - "Heizungsrechner stärker gewichten als Impulsberatung"
    ebf_dimension: "READY"

# =============================================================================
# EBF-ERGÄNZENDE EMPFEHLUNGEN (aus Kontextanalyse)
# =============================================================================
ebf_ergaenzend:

  - id: "EMP-EBF-001"
    titel: "Installateur-Tracking einführen"
    prioritaet: "kritisch"
    quelle: "EBF Kontextanalyse 2026-01-28"
    beschreibung: |
      Das aktuelle Messkonzept erfasst keine Installateur-Interaktionen.
      Bei 55% Notfall-Ersetzungen ist der Installateur aber der Haupthebel.
    massnahmen:
      - "Installateur-Portal Traffic messen"
      - "B2B-Conversions separat tracken"
      - "Installateur-Schulungen als KPI"
    ebf_dimension: "WHO (Gatekeeper)"
    gap_im_messkonzept: true

  - id: "EMP-EBF-002"
    titel: "MFH-Segment analysieren"
    prioritaet: "hoch"
    quelle: "EBF Kontextanalyse + WorkUnit Report"
    beschreibung: |
      MFH-Impulsberatungen sanken um -43%, während EFH +23% und KMU +100% stiegen.
      Dies deutet auf ungelöste Barrieren im MFH-Segment hin.
    massnahmen:
      - "MFH-spezifische Journey analysieren"
      - "Barrieren identifizieren (ROI-Unsicherheit, Mieterkommunikation)"
      - "Dedizierte MFH-Landing-Page optimieren"
    ebf_dimension: "READY, STAGE"

  - id: "EMP-EBF-003"
    titel: "STWE-Metriken einführen"
    prioritaet: "hoch"
    quelle: "EBF Kontextanalyse 2026-01-28"
    beschreibung: |
      Das Messkonzept unterscheidet nicht zwischen EFH/MFH/STWE.
      STWE hat die höchsten Barrieren (kollektive Entscheidung).
    massnahmen:
      - "STWE-spezifische Einstiegsseite erstellen"
      - "STWE-Conversions separat tracken"
      - "Facilitierungs-Angebote messen"
    ebf_dimension: "HOW (γ Coordination)"
    gap_im_messkonzept: true

  - id: "EMP-EBF-004"
    titel: "Elektroheizungs-Content priorisieren"
    prioritaet: "hoch"
    quelle: "WorkUnit Report + Search Console"
    beschreibung: |
      Starkes Interesse an Elektroheizungs-Verboten ("wie lange noch erlaubt?").
      Content-Lücke: Diese Fragen werden nicht ausreichend beantwortet.
    massnahmen:
      - "Dedizierte FAQ-Seite: Elektroheizungs-Verbote nach Kanton"
      - "Fristen und Übergangsregelungen klar darstellen"
      - "Alternativen prominent verlinken"
    ebf_dimension: "WHEN (Trigger), AWARE"
    nutzerfragen:
      - "wie lange dürfen elektroheizungen noch betrieben werden?"
      - "wann werden elektroheizungen verboten"
      - "wie lange sind elektroboiler noch erlaubt?"

# =============================================================================
# PRIORISIERTE MASSNAHMEN-MATRIX
# =============================================================================
priorisierung:
  kritisch:
    - "EMP-EBF-001"  # Installateur-Tracking
  hoch:
    - "EMP-CS-001"   # Content für steigende Keywords
    - "EMP-CS-003"   # Heizsystem-Seiten
    - "EMP-REG-001"  # Westschweizer Kantone
    - "EMP-EBF-002"  # MFH-Segment
    - "EMP-EBF-003"  # STWE-Metriken
    - "EMP-EBF-004"  # Elektroheizungs-Content
  mittel:
    - "EMP-CS-002"   # Blog-Frequenz
    - "EMP-REG-002"  # Tessin
    - "EMP-CON-001"  # Conversion Landing Pages
  niedrig:
    - "EMP-CS-004"   # Blog-URL-Struktur
