        - code: 4
          label: "Zwischen 6'001 und 7'500 CHF"
        - code: 5
          label: "Zwischen 7'501 und 9'000 CHF"
        - code: 6
          label: "Zwischen 9'001 und 12'000 CHF"
        - code: 7
          label: "Mehr als 12'000 CHF"
        - code: 99
          label: "Dazu möchte ich keine Angabe machen"

