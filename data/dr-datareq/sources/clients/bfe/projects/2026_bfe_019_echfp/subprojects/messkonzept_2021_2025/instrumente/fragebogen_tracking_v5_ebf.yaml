sektion_10_panel:
  name: "Panel-Einwilligung"
  zweck: "Follow-up für Intention-Behavior Gap Messung"
  neu_in_v5: true
  filter: "F2.1 < 3"

  fragen:

    - id: "F10.1"
      neu_in_v5: true
      text: |
        Sie haben angegeben, dass Sie planen, Ihre Heizung in den nächsten Jahren zu ersetzen.

        Dürfen wir Sie in etwa 12 Monaten nochmals kontaktieren, um zu erfahren,
        wie sich Ihre Situation entwickelt hat?

        Dies würde uns helfen, besser zu verstehen, wie Hausbesitzer:innen
        bei der Entscheidung für eine neue Heizung vorgehen.
      typ: "m"
      optionen:
        - code: 1
          label: "Ja, ich bin einverstanden"
          panel: true
        - code: 2
          label: "Nein, bitte nicht kontaktieren"
          panel: false
      ebf_mapping:
        kpi: "Panel Recruitment Rate"

