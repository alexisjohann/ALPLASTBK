generell:

  weiss_welche_moeglichkeiten:
    item: "Ich weiss genau, welche Möglichkeiten ich bei der energetischen Modernisierung habe."
    dimension: "Generelle Awareness / Subjektives Wissen"
    scale: "1-5 Likert"
    papers:
      - key: falk2025limited
        authors: "Falk, Armin et al."
        year: 2025
        title: "Limited Self-knowledge and Survey Response Behavior"
        rationale: >
          Selbsteinschätzung von Wissen ist systematisch verzerrt.
          Dunning-Kruger-Effekt: Personen mit wenig Wissen
          überschätzen sich am stärksten.
      - key: gabaix2019behavioral
        authors: "Gabaix, Xavier"
        year: 2019
        title: "Behavioral Inattention"
        rationale: >
          «Genaues Wissen» erfordert Aufmerksamkeit für Details.
          Die Diskrepanz zwischen subjektivem und objektivem Wissen
          reflektiert den Grad der Inattention.

  richtige_entscheidung_zutrauen:
    item: "Ich traue mir zu, die richtige Entscheidung für mein Haus zu treffen."
    dimension: "Generelle Self-Efficacy"
    scale: "1-5 Likert"
    papers:
      - key: benabou2002self
        authors: "Bénabou, Roland & Tirole, Jean"
        year: 2002
        title: "Self-Confidence and Personal Motivation"
        rationale: >
          Selbstvertrauen als «Vermögenswert»: Beeinflusst ob und wie
          entschieden wird. Zu hohes Selbstvertrauen → unzureichende
          Beratungssuche. Zu niedriges → Entscheidungsvermeidung.
      - key: bandura1977self
        authors: "Bandura, Albert"
        year: 1977
        title: "Self-Efficacy: Toward a Unifying Theory of Behavioral Change"
        rationale: >
          Generalisierte Selbstwirksamkeitserwartung als Prädiktor
          für Handlungsinitiierung und Persistenz.

  erst_wenn_kosten_kenne:
    item: "Ich entscheide erst, wenn ich die Kosten genau kenne und weiss ab wann sich die Investition rechnet."
    dimension: "Entscheidungsstil / Deliberation"
    scale: "1-5 Likert"
    papers:
      - key: frederick2002time
        authors: "Frederick, Shane, Loewenstein, George & O'Donoghue, Ted"
        year: 2002
        title: "Time Discounting and Time Preference"
        rationale: >
          Die Frage nach «ab wann es sich rechnet» reflektiert den
          individuellen Diskontierungsfaktor. Hohe Zustimmung = hoher
          Discount Rate = stärkerer Present Bias.
      - key: benartzi1995myopic
        authors: "Benartzi, Shlomo & Thaler, Richard H."
        year: 1995
        title: "Myopic Loss Aversion and the Equity Premium Puzzle"
        rationale: >
          Myopische Verlustaversion: Fokus auf kurzfristige Kosten
          statt langfristige Rendite. Die Frage identifiziert
          «myopische» Entscheider:innen.

  nur_mit_foerdergeldern:
    item: "Ich würde nur investieren, wenn ich Fördergelder erhalte."
    dimension: "Förder-Abhängigkeit / Crowding"
    scale: "1-5 Likert"
    papers:
      - key: benabou2006incentives
        authors: "Bénabou, Roland & Tirole, Jean"
        year: 2006
        title: "Incentives and Prosocial Behavior"
        rationale: >
          Zentrales Paper zum Crowding-Out-Risiko: Extrinsische
          Anreize (Fördergelder) können intrinsische Motivation
          verdrängen. Hohe Zustimmung = Abhängigkeit von externen
          Anreizen, was auf Crowding-Out hindeutet.
      - key: gneezy2011and
        authors: "Gneezy, Uri, Meier, Stephan & Rey-Biel, Pedro"
        year: 2011
        title: "When and Why Incentives (Don't) Work to Modify Behavior"
        rationale: >
          Meta-Perspektive auf Anreizwirkung: Zeigt, wann finanzielle
          Anreize wirken und wann sie kontraproduktiv sind.
          Fördergeld-Abhängigkeit ist ein Warnsignal.
      - key: frey1997cost
        authors: "Frey, Bruno S. & Oberholzer-Gee, Felix"
        year: 1997
        title: "The Cost of Price Incentives"
        rationale: >
          Schweizer Studie zum Crowding-Out: Finanzielle Kompensation
          für NIMBY-Projekte reduzierte die Akzeptanz. Direkt relevant
          für die Frage, ob Fördergelder notwendige Bedingung sind.

  langfristig_sinnvoll:
    item: "Ich vertraue darauf, dass Investitionen in erneuerbare Energie langfristig sinnvoll sind."
    dimension: "Generelles Vertrauen / Zukunftserwartung"
    scale: "1-5 Likert"
    papers:
      - key: laibson1997golden
        authors: "Laibson, David"
        year: 1997
        title: "Golden Eggs and Hyperbolic Discounting"
        rationale: >
          Hyperbolisches Diskontieren erklärt, warum «langfristig
          sinnvoll» nicht zu sofortigem Handeln führt. Die Frage
          misst, ob die Person den langfristigen Nutzen überhaupt
          anerkennt (Voraussetzung, nicht hinreichend).
      - key: bloom2007uncertainty
        authors: "Bloom, Nick, Bond, Stephen & Van Reenen, John"
        year: 2007
        title: "Uncertainty and Investment Dynamics"
        rationale: >
          Unsicherheit über zukünftige Rahmenbedingungen (Strompreis,
          Regulierung) hemmt Investitionen. Das Item misst das
          Vertrauen in die Zukunftssicherheit der Technologie.

  beitrag_klimaschutz:
    item: "Es ist mir wichtig, mit meinen Entscheidungen einen Beitrag zum Klimaschutz zu leisten."
    dimension: "Klimamotivation / Environmental Values"
    scale: "1-5 Likert"
    papers:
      - key: aghion2023climate
        authors: "Aghion, Philippe, Bénabou, Roland, Martin, Ralf & Roulet, Alexandra"
        year: 2023
        title: "Environmental Preferences and Technological Choices"
        rationale: >
          Untersucht direkt, wie Umweltpräferenzen Technologie-
          Adoptionsentscheidungen beeinflussen. Klimamotivation
          als Treiber für «Clean Technology» Adoption.
      - key: hagmann2023costly
        authors: "Hagmann, David et al."
        year: 2023
        title: "Costly Distractions: Focusing on Individual Behavior Undermines Support for Systemic Reforms"
        rationale: >
          Kritische Gegenperspektive: Individuelle Klimaschutz-
          Motivation kann den Blick auf systemische Lösungen
          verstellen. Hohe Zustimmung ≠ effektives Handeln.

  schwarz_auf_weiss:
    item: "Ich glaube erst an Vorteile, wenn ich sie Schwarz auf Weiss sehe."
    dimension: "Evidenz-Orientierung / Skeptizismus"
    scale: "1-5 Likert"
    papers:
      - key: ambuhl2021belief
        authors: "Ambühl, Sandro"
        year: 2021
        title: "Belief Updating and the Demand for Information about Risks"
        rationale: >
          Zeigt, wie unterschiedlich Menschen Evidenz gewichten.
          «Schwarz auf Weiss» = Bedürfnis nach konkreter,
          quantifizierbarer Evidenz statt vager Versprechen.
      - key: enke2023complexity
        authors: "Enke, Benjamin, Graeber, Thomas & Oprea, Ryan"
        year: 2024
        title: "Complexity and Time"
        rationale: >
          Unter Komplexität greifen Menschen auf einfache Heuristiken
          zurück. «Schwarz auf Weiss sehen» = Simplifikations-
          Heuristik (nur Konkretes zählt).
      - key: falk2025limited
        authors: "Falk, Armin et al."
        year: 2025
        title: "Limited Self-knowledge and Survey Response Behavior"
        rationale: >
          Selbstbericht über Evidenz-Orientierung kann selbst
          verzerrt sein. Relevant als methodische Einordnung.

# =============================================================================
# DEMOGRAFIE
