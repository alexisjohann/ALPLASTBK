demografie:

  einkommen:
    item: "Bruttoeinkommen des Haushalts (7 Kategorien)"
    dimension: "Segmentierung (WHERE / Ressourcen)"
    papers:
      - key: mullainathan2013scarcity
        authors: "Mullainathan, Sendhil & Shafir, Eldar"
        year: 2013
        title: "Scarcity: Why Having Too Little Means So Much"
        rationale: >
          Einkommen als Proxy für finanzielle Knappheit. Scarcity
          verändert die Entscheidungsarchitektur fundamental:
          Tiefere Einkommen → höhere Verlustaversion, kürzerer
          Zeithorizont, stärkerer Present Bias.
      - key: laibson1997golden
        authors: "Laibson, David"
        year: 1997
        title: "Golden Eggs and Hyperbolic Discounting"
        rationale: >
          Einkommensabhängige Diskontierung: Höhere Einkommen
          ermöglichen es, kurzfristige Kosten zu tragen.
          Die Segmentierung nach Einkommen ist für die
          Parameter-Kalibrierung (β, λ) essenziell.

  plz:
