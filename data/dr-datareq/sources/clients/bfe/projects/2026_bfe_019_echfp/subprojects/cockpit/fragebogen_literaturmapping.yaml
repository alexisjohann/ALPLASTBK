# =============================================================================
# SCREENING-FRAGEN
# =============================================================================
screening:

  eigentum_status:
    item: "Sind Sie Mieter:in, Stockwerkeigentümer:in oder Hauseigentümer:in?"
    dimension: "Segmentierung (WHO)"
    papers:
      - key: ostrom1990governing
        authors: "Ostrom, Elinor"
        year: 1990
        title: "Governing the Commons"
        rationale: >
          Unterschiedliche Eigentumsstrukturen (EFH vs. MFH vs. STWE) erzeugen
          fundamental verschiedene Entscheidungsdynamiken. Ostrom zeigt, dass
          kollektive Eigentumsformen (analog STWE) spezifische Koordinationsprobleme
          und Free-Rider-Risiken mit sich bringen.
      - key: olson1965logic
        authors: "Olson, Mancur"
        year: 1965
        title: "The Logic of Collective Action"
        rationale: >
          Klassische Erklärung, warum Gruppenentscheidungen (STWE-Versammlungen)
          systematisch anders funktionieren als individuelle (EFH). Die
          Segmentierung nach Eigentumsform ist daher verhaltensökonomisch
          zwingend notwendig.

  baujahr:
    item: "Welches Baujahr hat Ihr Haus oder Ihre Wohnung?"
    dimension: "Kontextfaktor (WHERE)"
    papers:
      - key: allcott2014short
        authors: "Allcott, Hunt & Rogers, Todd"
        year: 2014
        title: "The Short-Run and Long-Run Effects of Behavioral Interventions"
        rationale: >
          Baujahr korreliert mit Energieeffizienz und beeinflusst die
          Kosten-Nutzen-Kalkulation einer Sanierung. Allcott & Rogers zeigen,
          dass objektive Gebäudedaten die Wirksamkeit von Interventionen
          moderieren.
      - key: fowlie2018energy
        authors: "Fowlie, Meredith, Greenstone, Michael & Wolfram, Catherine"
        year: 2018
        title: "Do Energy Efficiency Investments Deliver?"
        rationale: >
          Zeigt, dass der tatsächliche Energiespar-Effekt stark vom
          Gebäudezustand abhängt. Baujahr ist ein wichtiger Proxy für
          den erwarteten Return on Investment.

  kuerzlich_modernisiert:
    item: "Wurde Ihr Gebäude in den letzten 10 Jahren umfassend energetisch modernisiert?"
    dimension: "Impact / STAGE (BCJ-Phase)"
    papers:
      - key: odonoghue2001choice
        authors: "O'Donoghue, Ted & Rabin, Matthew"
        year: 2001
        title: "Choice and Procrastination"
        rationale: >
          Unterscheidet zwischen Personen, die bereits gehandelt haben
          (overcame procrastination) und solchen, die aufschieben. Zentral
          für die BCJ-Phasen-Zuordnung.
      - key: madrian2001power
        authors: "Madrian, Brigitte C. & Shea, Dennis F."
        year: 2001
        title: "The Power of Suggestion"
        rationale: >
          Status-Quo-Bias erklärt, warum die Mehrheit NICHT modernisiert hat.
          Die Frage identifiziert die Minderheit, die den Default überwunden hat.

  planung_naechste_2_jahre:
    item: "Planen Sie, in den nächsten 2 Jahren [Massnahme X] umzusetzen?"
    dimension: "Impact I2 / STAGE (Intention)"
    papers:
      - key: ajzen1991theory
        authors: "Ajzen, Icek"
        year: 1991
        title: "The Theory of Planned Behavior"
        rationale: >
          Verhaltensintention ist der stärkste Einzelprädiktor für
          tatsächliches Verhalten (TPB). Der 2-Jahres-Horizont erfasst
          konkrete Planung vs. vage Absicht.
      - key: sheeran2002intention
        authors: "Sheeran, Paschal"
        year: 2002
        title: "Intention-Behavior Relations: A Conceptual and Empirical Review"
        rationale: >
          Meta-Analyse zeigt, dass Intentionen nur 28% der Verhaltensvarianz
          erklären. Die Intention-Behavior-Gap ist besonders gross bei
          kostspieligen, komplexen Entscheidungen wie Gebäudesanierung.

# =============================================================================
# AWARENESS (A)
# =============================================================================
awareness:

  werbung_gesehen:
    item: "Haben Sie in den letzten 12 Monaten Informationen oder Werbung zu [Thema] gesehen oder gehört?"
    dimension: "A1 - Kampagnen-Bekanntheit"
    scale: "Ja / Nein"
    papers:
      - key: gabaix2019behavioral
        authors: "Gabaix, Xavier"
        year: 2019
        title: "Behavioral Inattention"
        rationale: >
          Theoretisches Framework für Aufmerksamkeit und Inattention.
          Erklärt, warum Menschen Informationen übersehen (rational
          inattention) und wann Kampagnen die Aufmerksamkeitsschwelle
          überschreiten.
      - key: bordalo2013salience
        authors: "Bordalo, Pedro, Gennaioli, Nicola & Shleifer, Andrei"
        year: 2013
        title: "Salience and Consumer Choice"
        rationale: >
          Salience Theory erklärt, welche Informationen im Gedächtnis
          haften bleiben. Kampagnen-Recall hängt von der Salienz der
          Botschaft ab, nicht nur von der Häufigkeit.
      - key: dellavigna2022rcts
        authors: "DellaVigna, Stefano & Linos, Elizabeth"
        year: 2022
        title: "RCTs to Scale: Comprehensive Evidence from Two Nudge Units"
        rationale: >
          Grösste Meta-Evidenz zu Nudge-Kampagnen zeigt, dass
          Awareness-Messung (aided/unaided recall) ein zentraler
          Wirkungsindikator für Informationskampagnen ist.

  thema_beschaeftigt_mich:
    item: "Das Thema [X] beschäftigt mich."
    dimension: "A - Topic Salience / Involvement"
    scale: "1-5 Likert"
    papers:
      - key: bordalo2012salience
        authors: "Bordalo, Pedro, Gennaioli, Nicola & Shleifer, Andrei"
        year: 2012
        title: "Salience Theory of Choice Under Risk"
        rationale: >
          Salience als psychologisches Konstrukt: Was «beschäftigt»,
          beeinflusst Entscheidungen überproportional. Die Frage misst,
          ob das Thema die Aufmerksamkeitsschwelle überschritten hat.
      - key: bordalo2020memory
        authors: "Bordalo, Pedro, Gennaioli, Nicola & Shleifer, Andrei"
        year: 2020
        title: "Memory, Attention, and Choice"
        rationale: >
          Zeigt, wie saliente Themen im Gedächtnis bleiben und
          Entscheidungen beeinflussen - selbst wenn objektiv andere
          Faktoren wichtiger wären.

  betrifft_mich_persoenlich:
    item: "Das Thema [X] betrifft mich persönlich."
    dimension: "A - Personal Relevance"
    scale: "1-5 Likert"
    papers:
      - key: loewenstein2003projection
        authors: "Loewenstein, George, O'Donoghue, Ted & Rabin, Matthew"
        year: 2003
        title: "Projection Bias in Predicting Future Utility"
        rationale: >
          Persönliche Betroffenheit wird durch Projection Bias verzerrt:
          Menschen projizieren ihren aktuellen Zustand (z.B. «Heizung
          funktioniert noch») auf die Zukunft und unterschätzen Relevanz.
      - key: mullainathan2013scarcity
        authors: "Mullainathan, Sendhil & Shafir, Eldar"
        year: 2013
        title: "Scarcity: Why Having Too Little Means So Much"
        rationale: >
          Persönliche Betroffenheit steigt bei Knappheitserleben
          (steigende Energiekosten). Das Item misst, ob die Person
          den «Scarcity Tunnel» betreten hat.

  weiss_um_was_es_geht:
    item: "Beim Thema [X] weiss ich, um was es geht."
    dimension: "A3 - Selbsteingeschätztes Wissen"
    scale: "1-5 Likert"
    papers:
      - key: falk2025limited
        authors: "Falk, Armin, Henkel, Luca, Neuber, Thomas & Strack, Philipp"
        year: 2025
        title: "Limited Self-knowledge and Survey Response Behavior"
        rationale: >
          Zeigt systematische Verzerrungen bei Selbsteinschätzung von
          Wissen in Befragungen. Overconfidence bei subjektivem Wissen
          ist empirisch dokumentiert - das Item misst wahrgenommenes,
          nicht tatsächliches Wissen.
      - key: ho2019measuring
        authors: "Ho, Emily H., Hagmann, David & Loewenstein, George"
        year: 2019
        title: "Measuring Information Preferences"
        rationale: >
          Methodik zur Messung von Informationspräferenzen und
          selbsteingeschätztem Wissensstand. Zeigt, dass Menschen
          systematisch über- oder unterschätzen, was sie wissen.
      - key: golman2017information
        authors: "Golman, Russell, Hagmann, David & Loewenstein, George"
        year: 2017
        title: "Information Avoidance"
        rationale: >
          Komplementäre Perspektive: Wer glaubt, Bescheid zu wissen,
          vermeidet oft weitere Information (Information Avoidance).
          Das Item identifiziert potenzielle Informationsvermeider.

  verhalten_bedeutung_gesellschaft:
    item: "Mein eigenes Verhalten ist von Bedeutung für die Gesellschaft und die Umwelt."
    dimension: "Perceived Behavioral Significance (aktuell unter A, empfohlen: W)"
    scale: "1-5 Likert"
    note: "Dieses Item misst eher Willingness/Werte als Awareness"
    papers:
      - key: hagmann2023costly
        authors: "Hagmann, David, Liao, Yi-tsen, Chater, Nick & Loewenstein, George"
        year: 2023
        title: "Costly Distractions: Focusing on Individual Behavior Undermines Support for Systemic Reforms"
        rationale: >
          Direkt relevant: Untersucht, ob der Glaube an individuelle
          Verhaltenswirksamkeit systemische Massnahmen verdrängt.
          Die Frage erfasst diese «Individual Action Illusion».
      - key: allcott2011social
        authors: "Allcott, Hunt"
        year: 2011
        title: "Social Norms and Energy Conservation"
        rationale: >
          Zeigt, wie Soziale Normen den Glauben an die Bedeutung des
          eigenen Verhaltens beeinflussen. Feedback über den eigenen
          Verbrauch relativ zu Nachbarn verändert diese Wahrnehmung.
      - key: fehr2009environmental
        authors: "Fehr, Ernst & Gächter, Simon"
        year: 2009
        title: "Behavioral Approaches to Environmental Protection"
        rationale: >
          Untersucht, wann Menschen glauben, dass ihr individuelles
          Umweltverhalten einen Unterschied macht - und wann nicht
          (Diffusion of Responsibility).

# =============================================================================
# WILLINGNESS (W)
# =============================================================================
willingness:

  grosse_persoenliche_vorteile:
    item: "Ich habe grosse persönliche Vorteile bei einer [Massnahme]."
    dimension: "W2 - Private Utility (u_F, u_P)"
    scale: "1-5 Likert"
    papers:
      - key: kahneman2000experienced
        authors: "Kahneman, Daniel"
        year: 2000
        title: "Experienced Utility and Objective Happiness"
        rationale: >
          Unterscheidet Decision Utility (erwarteter Nutzen bei Entscheidung)
          von Experienced Utility (tatsächlich erlebter Nutzen). Das Item
          misst Decision Utility - die subjektive Nutzenerwartung.
      - key: loewenstein2003projection
        authors: "Loewenstein, George, O'Donoghue, Ted & Rabin, Matthew"
        year: 2003
        title: "Projection Bias in Predicting Future Utility"
        rationale: >
          Erklärt systematische Fehleinschätzung zukünftiger Vorteile.
          Hausbesitzer:innen unterschätzen typischerweise langfristige
          Energiekosteneinsparungen (Projection Bias).
      - key: fowlie2018energy
        authors: "Fowlie, Meredith, Greenstone, Michael & Wolfram, Catherine"
        year: 2018
        title: "Do Energy Efficiency Investments Deliver?"
        rationale: >
          Empirische Evidenz, dass der wahrgenommene Nutzen von
          Energieeffizienzmassnahmen oft vom tatsächlichen abweicht.
          Das Item erfasst die Nutzenerwartung, nicht die Realität.

  positives_fuer_gemeinwohl:
    item: "Mit meiner Entscheidung möchte ich etwas Positives für das Gemeinwohl, z.B. für die Umwelt, tun."
    dimension: "W2 - Prosoziale Motivation / Warm Glow (u_S, u_E)"
    scale: "1-5 Likert"
    papers:
      - key: benabou2006incentives
        authors: "Bénabou, Roland & Tirole, Jean"
        year: 2006
        title: "Incentives and Prosocial Behavior"
        rationale: >
          Fundiertes Modell prosozialer Motivation mit drei Komponenten:
          intrinsische Motivation, Image-Motivation und extrinsische
          Anreize. Das Item erfasst primär die intrinsische Komponente.
      - key: ariely2009doing
        authors: "Ariely, Dan, Bracha, Anat & Meier, Stephan"
        year: 2009
        title: "Doing Good or Doing Well? Image Motivation and Monetary Incentives"
        rationale: >
          Zeigt, dass prosoziales Verhalten von Image-Motiven und
          Sichtbarkeit abhängt. In Befragungen überberichten Menschen
          prosoziale Motive (Social Desirability Bias).
      - key: andreoni1990impure
        authors: "Andreoni, James"
        year: 1990
        title: "Impure Altruism and Donations to Public Goods"
        rationale: >
          Klassisches «Warm Glow» Modell: Menschen spenden/investieren
          nicht nur wegen des Gemeinwohls, sondern auch wegen des
          guten Gefühls. Das Item misst die selbstberichtete
          Warm-Glow-Komponente.

  einklang_mit_werten:
    item: "Es ist mir wichtig, bei Energiefragen im Einklang mit meinen Werten zu handeln."
    dimension: "W2 - Werte-Kongruenz / Identity Utility (u_X)"
    scale: "1-5 Likert"
    papers:
      - key: akerlof2000economics
        authors: "Akerlof, George A. & Kranton, Rachel E."
        year: 2000
        title: "Economics and Identity"
        rationale: >
          Identitätsökonomie: Menschen erleiden Disutility, wenn ihre
          Handlungen nicht mit ihrer Identitätskategorie übereinstimmen.
          «Im Einklang mit Werten» = Identitätskongruenz.
      - key: enke2020moral
        authors: "Enke, Benjamin"
        year: 2020
        title: "Moral Values and Voting"
        rationale: >
          Zeigt, dass moralische Werte Entscheidungsverhalten
          systematisch beeinflussen. Die Frage erfasst die
          Werte-Handlungs-Kongruenz als Motivator.
      - key: benabou2011identity
        authors: "Bénabou, Roland & Tirole, Jean"
        year: 2011
        title: "Identity, Morals, and Taboos: Beliefs as Assets"
        rationale: >
          Modell, in dem Menschen Überzeugungen als «Vermögenswerte»
          halten. Wertekonsistenz schützt die Identitätsinvestition.

  traue_mir_zu:
    item: "Ich traue mir zu, eine [Massnahme] erfolgreich umzusetzen."
    dimension: "W - Self-Efficacy / Perceived Behavioral Control"
    scale: "1-5 Likert"
    papers:
      - key: ajzen1991theory
        authors: "Ajzen, Icek"
        year: 1991
        title: "The Theory of Planned Behavior"
        rationale: >
          Perceived Behavioral Control (PBC) ist neben Einstellung und
          subjektiver Norm der dritte Kernprädiktor im TPB. «Sich
          zutrauen» = PBC-Operationalisierung.
      - key: benabou2002self
        authors: "Bénabou, Roland & Tirole, Jean"
        year: 2002
        title: "Self-Confidence and Personal Motivation"
        rationale: >
          Ökonomisches Modell: Selbstvertrauen ist ein wertvolles
          «Gut», das Motivation und Handlungsbereitschaft steigert.
          Niedrige Self-Efficacy → höhere Aktivierungsschwelle θ.
      - key: bandura1977self
        authors: "Bandura, Albert"
        year: 1977
        title: "Self-Efficacy: Toward a Unifying Theory of Behavioral Change"
        rationale: >
          Originaltheorie der Selbstwirksamkeit. Self-Efficacy
          Expectations bestimmen, ob eine Person überhaupt versucht,
          ein Verhalten auszuführen.

  prozess_erscheint_kompliziert:
    item: "Der Prozess erscheint mir kompliziert / komplex. (invertiert)"
    dimension: "W3 - Perceived Complexity / Barriere"
    scale: "1-5 Likert (invertiert)"
    papers:
      - key: enke2023complexity
        authors: "Enke, Benjamin, Graeber, Thomas & Oprea, Ryan"
        year: 2024
        title: "Complexity and Time"
        rationale: >
          Zeigt, dass Komplexität kognitive Verzerrungen verstärkt:
          Unter Komplexität steigt der Present Bias. Wahrgenommene
          Komplexität einer Sanierung verstärkt also Aufschiebe-Verhalten.
      - key: shafir2008complexity
        authors: "Shafir, Eldar"
        year: 2008
        title: "Managing Complexity in Consumer Choice"
        rationale: >
          Komplexitätsmanagement als zentrale Konsumenten-Herausforderung.
          Wenn Prozesse als «zu komplex» wahrgenommen werden, führt dies
          zu Entscheidungsvermeidung (Choice Overload → Status Quo).
      - key: gabaix2006shrouded
        authors: "Gabaix, Xavier & Laibson, David"
        year: 2006
        title: "Shrouded Attributes, Consumer Myopia, and Information Suppression"
        rationale: >
          Shrouded Attributes (versteckte Kosten/Nutzen) erhöhen
          die wahrgenommene Komplexität. Bei Sanierungen sind viele
          relevante Attribute «shrouded» (Förderhöhe, Amortisation).

  viele_andere_haben_modernisiert:
    item: "Ich glaube, dass viele andere Hausbesitzende [Massnahme] umgesetzt haben oder dies planen."
    dimension: "W - Deskriptive Sozialnorm"
    scale: "1-5 Likert"
    papers:
      - key: allcott2011social
        authors: "Allcott, Hunt"
        year: 2011
        title: "Social Norms and Energy Conservation"
        rationale: >
          Direkte Evidenz aus dem Energiebereich: Deskriptive Normen
          («Ihre Nachbarn verbrauchen X% weniger») sind ein wirksamer
          Hebel für Energieverhalten. Das Item misst die wahrgenommene
          deskriptive Norm.
      - key: schultz2007normative
        authors: "Schultz, P. Wesley et al."
        year: 2007
        title: "The Constructive, Destructive, and Reconstructive Power of Social Norms"
        rationale: >
          Zeigt den Boomerang-Effekt: Wer glaubt, MEHR zu tun als
          andere, reduziert sein Engagement. Die Frage identifiziert
          Personen mit hoher vs. niedriger Normwahrnehmung.
      - key: fehr2004social
        authors: "Fehr, Ernst & Fischbacher, Urs"
        year: 2004
        title: "Social Norms and Human Cooperation"
        rationale: >
          Grundlagenarbeit zu sozialen Normen und Kooperation. Zeigt,
          wie die Wahrnehmung des Verhaltens anderer die eigene
          Kooperationsbereitschaft beeinflusst.

# =============================================================================
# IMPACT (I)
# =============================================================================
impact:

  ueber_foerderprogramme_informiert:
    item: "Haben Sie sich in den letzten 12 Monaten über Förderprogramme oder Beratungen informiert?"
    dimension: "I3 - Information Seeking"
    scale: "Ja / Nein / Kann ich nicht sicher sagen"
    papers:
      - key: ambuhl2021belief
        authors: "Ambühl, Sandro"
        year: 2021
        title: "Belief Updating and the Demand for Information about Risks"
        rationale: >
          Untersucht aktives Informationssuchverhalten: Wann suchen
          Menschen Information zu Risiken und Chancen? Die Frage
          erfasst, ob die Person die Informationsschwelle überschritten hat.
      - key: golman2017information
        authors: "Golman, Russell, Hagmann, David & Loewenstein, George"
        year: 2017
        title: "Information Avoidance"
        rationale: >
          Komplementäre Perspektive: Wer sich NICHT informiert hat,
          betreibt möglicherweise aktive Informationsvermeidung
          (z.B. weil die Information unangenehme Handlungspflichten
          auslösen könnte).
      - key: ho2019measuring
        authors: "Ho, Emily H., Hagmann, David & Loewenstein, George"
        year: 2019
        title: "Measuring Information Preferences"
        rationale: >
          Methodik zur Messung von Informationspräferenzen. Zeigt,
          dass Information Seeking ein verhaltensrelevantes Konstrukt
          ist, das über blosse Absichten hinausgeht.

  mit_fachleuten_gesprochen:
    item: "Haben Sie in den letzten 12 Monaten bereits mit Fachleuten über eine [Massnahme] gesprochen?"
    dimension: "I3 - Expert Consultation"
    scale: "Ja / Nein / Kann ich nicht sicher sagen"
    papers:
      - key: beck2014carmechanics
        authors: "Beck, Adrian et al."
        year: 2014
        title: "Car Mechanics in the Lab: Investigating the Behavior of Real Experts on Experimental Markets for Credence Goods"
        rationale: >
          Energieberatung ist ein «Credence Good» - die Qualität ist
          für Laien schwer beurteilbar. Das Item misst, ob die Person
          trotz dieser Unsicherheit Expert:innen konsultiert hat.
      - key: dupas2014short
        authors: "Dupas, Pascaline"
        year: 2014
        title: "Short-Run Subsidies and Long-Run Adoption of New Health Products"
        rationale: >
          Zeigt, dass der erste Kontakt mit Expert:innen ein kritischer
          Schritt in der Adoption Pipeline ist. Expertenkonsultation
          ist ein starker Prädiktor für spätere Umsetzung.
      - key: dellavigna2018motivates
        authors: "DellaVigna, Stefano & Pope, Devin"
        year: 2018
        title: "What Motivates Effort? Evidence and Expert Forecasts"
        rationale: >
          Untersucht, wann Menschen Expert:innen-Rat suchen und wann
          nicht. Relevanz für die Frage, was den Schritt zur
          Fachberatung auslöst.

# =============================================================================
# TRUST (T)
# =============================================================================
trust:

  von_energieschweiz_gehoert:
    item: "Haben Sie schon einmal von EnergieSchweiz gehört?"
    dimension: "T - Voraussetzung (Awareness des Absenders)"
    scale: "Ja / Nein"
    papers:
      - key: aghion2010regulation
        authors: "Aghion, Philippe et al."
        year: 2010
        title: "Regulation and Distrust"
        rationale: >
          Zeigt den Zusammenhang zwischen Bekanntheit staatlicher
          Programme und Vertrauen. Unbekannte Institutionen können
          weder Vertrauen noch Misstrauen erzeugen.
      - key: dellavigna2022rcts
        authors: "DellaVigna, Stefano & Linos, Elizabeth"
        year: 2022
        title: "RCTs to Scale: Comprehensive Evidence from Two Nudge Units"
        rationale: >
          Evidenz, dass die Bekanntheit des Absenders ein zentraler
          Moderator für die Wirksamkeit von Nudge-Kampagnen ist.

  vertraue_energieschweiz:
    item: "Ich vertraue EnergieSchweiz als Informationsquelle zum Thema [X]."
    dimension: "T1 - Absender-Vertrauen"
    scale: "1-5 Likert"
    papers:
      - key: fehr2009neuroeconomics
        authors: "Fehr, Ernst"
        year: 2009
        title: "On the Economics and Biology of Trust"
        rationale: >
          Umfassendes Framework für Vertrauensmechanismen. Vertrauen
          in Institutionen basiert auf Erfahrung, Reputation und
          wahrgenommener Kompetenz.
      - key: aghion2010regulation
        authors: "Aghion, Philippe et al."
        year: 2010
        title: "Regulation and Distrust"
        rationale: >
          Zeigt, dass Vertrauen in staatliche Institutionen kulturell
          variiert und Regulierungspräferenzen beeinflusst. Schweizer
          Kontext: hohes Basisvertrauen in Bundesinstitutionen.
      - key: falk2017trust
        authors: "Falk, Armin"
        year: 2017
        title: "Trust and Reciprocity"
        rationale: >
          Vertrauen als Ergebnis wiederholter positiver Interaktionen.
          Die Frage erfasst generalisiertes institutionelles Vertrauen
          vs. erfahrungsbasiertes Vertrauen.

  glaubwuerdig_und_verlaesslich:
    item: "Die Informationen und Beratungsangebote von EnergieSchweiz sind glaubwürdig und verlässlich."
    dimension: "T1 - Glaubwürdigkeit"
    scale: "1-5 Likert"
    papers:
      - key: charness2023communication
        authors: "Charness, Gary et al."
        year: 2023
        title: "An Experimental Study on the Effects of Communication, Credibility, and Clustering in Network Games"
        rationale: >
          Misst direkt den Effekt von Glaubwürdigkeit auf
          Informationsverarbeitung und Verhalten. Glaubwürdigkeit
          ist ein eigenständiges Konstrukt, das über «Vertrauen»
          hinausgeht.
      - key: beck2014carmechanics
        authors: "Beck, Adrian et al."
        year: 2014
        title: "Car Mechanics in the Lab: Expert Markets for Credence Goods"
        rationale: >
          Energieberatung als Credence Good: Konsumenten können
          Qualität nicht selbst beurteilen und müssen auf
          Glaubwürdigkeitssignale vertrauen.

  transparent:
    item: "Die Informationen und Beratungsangebote von EnergieSchweiz sind transparent."
    dimension: "T1 - Transparenz"
    scale: "1-5 Likert"
    papers:
      - key: ambuhl2021belief
        authors: "Ambühl, Sandro"
        year: 2021
        title: "Belief Updating and the Demand for Information about Risks"
        rationale: >
          Transparenz beeinflusst, wie Menschen Informationen
          verarbeiten und ihre Überzeugungen aktualisieren.
          Intransparente Quellen werden weniger in Beliefs integriert.
      - key: geraats2002central
        authors: "Geraats, Petra M."
        year: 2002
        title: "Central Bank Transparency"
        rationale: >
          Umfassendes Transparenz-Framework für öffentliche
          Institutionen. Die Dimensionen (politische, ökonomische,
          prozedurale Transparenz) sind auf EnergieSchweiz übertragbar.

  freiheit_eigene_entscheidung:
    item: "Die Informationen lassen mir die Freiheit, meine Entscheidung selbst zu treffen."
    dimension: "T - Perceived Autonomy / Reaktanz"
    scale: "1-5 Likert"
    papers:
      - key: thaler2003libertarian
        authors: "Thaler, Richard H. & Sunstein, Cass R."
        year: 2003
        title: "Libertarian Paternalism"
        rationale: >
          Grundlagenarbeit: Interventionen müssen Wahlfreiheit
          bewahren. Das Item prüft, ob EnergieSchweiz als
          «libertär paternalistisch» oder als bevormundend
          wahrgenommen wird.
      - key: brehm1966theory
        authors: "Brehm, Jack W."
        year: 1966
        title: "A Theory of Psychological Reactance"
        rationale: >
          Reaktanz-Theorie: Wenn Menschen Freiheitseinschränkung
          wahrnehmen, reagieren sie mit Widerstand. Niedrige Werte
          auf diesem Item signalisieren Reaktanzrisiko.
      - key: sunstein2014nudging
        authors: "Sunstein, Cass R."
        year: 2014
        title: "Nudging: A Very Short Guide"
        rationale: >
          Betont, dass erfolgreiche Nudges die wahrgenommene
          Autonomie nicht einschränken dürfen. Das Item ist ein
          direkter Indikator für die «Libertarian Paternalism»-
          Kompatibilität der Kommunikation.

  umfeld_findet_sinnvoll:
    item: "Mein Umfeld findet [Massnahme] sinnvoll."
    dimension: "Injunktive Sozialnorm (aktuell unter T, empfohlen: W)"
    scale: "1-5 Likert"
    note: "Methodische Anmerkung: Misst Sozialnorm, nicht Trust in EnergieSchweiz"
    papers:
      - key: cialdini2003crafting
        authors: "Cialdini, Robert B."
        year: 2003
        title: "Crafting Normative Messages to Protect the Environment"
        rationale: >
          Unterscheidet injunktive Normen (was andere billigen) von
          deskriptiven Normen (was andere tun). Das Item erfasst die
          injunktive Norm - was das Umfeld für «richtig» hält.
      - key: schultz2007normative
        authors: "Schultz, P. Wesley et al."
        year: 2007
        title: "The Constructive, Destructive, and Reconstructive Power of Social Norms"
        rationale: >
          Zeigt, dass injunktive Normen den Boomerang-Effekt
          deskriptiver Normen abpuffern können. Das Item sollte
          daher zusammen mit der deskriptiven Norm-Frage analysiert
          werden.

  wuerde_empfehlen:
    item: "Ich würde anderen empfehlen, sich über [X] bei EnergieSchweiz zu informieren."
    dimension: "T3 - Empfehlungsbereitschaft (Advocacy)"
    scale: "1-5 Likert"
    papers:
      - key: charness2023communication
        authors: "Charness, Gary et al."
        year: 2023
        title: "Communication, Credibility, and Clustering in Network Games"
        rationale: >
          Empfehlungsverhalten als Funktion von Glaubwürdigkeit und
          Netzwerkstruktur. Wer empfiehlt, setzt eigene Reputation ein.
      - key: falk2019information
        authors: "Falk, Armin"
        year: 2019
        title: "Information Revelation and Cooperation"
        rationale: >
          Informationsweitergabe als kooperatives Verhalten. Die
          Bereitschaft, EnergieSchweiz zu empfehlen, ist ein Proxy
          für die Stärke des Vertrauenssignals.

  unsicher_ob_informationen_stimmen:
    item: "Ich bin unsicher, ob die Informationen von EnergieSchweiz stimmen. (invertiert)"
    dimension: "T1 - Misstrauen (invertiert)"
    scale: "1-5 Likert (invertiert)"
    papers:
      - key: aghion2010regulation
        authors: "Aghion, Philippe et al."
        year: 2010
        title: "Regulation and Distrust"
        rationale: >
          Misstrauen als eigenständiges Konstrukt (nicht einfach
          inverses Vertrauen). Menschen, die der Regierung misstrauen,
          fordern gleichzeitig mehr Regulierung - ein Paradox.
      - key: fehr2009neuroeconomics
        authors: "Fehr, Ernst"
        year: 2009
        title: "On the Economics and Biology of Trust"
        rationale: >
          Zeigt, dass Vertrauen und Misstrauen neurobiologisch
          unterschiedlich verarbeitet werden. Das invertierte Item
          erfasst aktives Misstrauen, nicht bloss fehlendes Vertrauen.

# =============================================================================
# ZUSATZFRAGEN
# =============================================================================
zusatzfragen:

  investitions_ranking:
    item: "Welchen Stellenwert haben die folgenden Investitionen? (Ranking 10 Items)"
    dimension: "Revealed Preferences / Prioritäten"
    papers:
      - key: tversky1981framing
        authors: "Tversky, Amos & Kahneman, Daniel"
        year: 1981
        title: "The Framing of Decisions and the Psychology of Choice"
        rationale: >
          Framing-Effekte beeinflussen Ranking-Entscheidungen. Die
          Reihenfolge, in der Optionen präsentiert werden, verzerrt
          Rankings systematisch (Primacy/Recency).
      - key: benartzi1995myopic
        authors: "Benartzi, Shlomo & Thaler, Richard H."
        year: 1995
        title: "Myopic Loss Aversion and the Equity Premium Puzzle"
        rationale: >
          Myopische Verlustaversion erklärt, warum kurzfristig sichtbare
          Investitionen (Küche, Bad) gegenüber langfristig rentablen
          (Heizung, Dämmung) bevorzugt werden.
      - key: kahneman1991loss
        authors: "Kahneman, Daniel, Knetsch, Jack L. & Thaler, Richard H."
        year: 1991
        title: "Anomalies: The Endowment Effect, Loss Aversion, and Status Quo Bias"
        rationale: >
          Verlustaversion führt dazu, dass Renovierungs-Investitionen
          (hohe Upfront-Kosten) systematisch unterpriorisiert werden
          gegenüber «sichtbaren» Verbesserungen (Küche, Bad).

  maxdiff_aspekte:
    item: "Welche Aspekte sind am wichtigsten? (Best-Worst Scaling, je 4 aus 11)"
    dimension: "Nutzendimensionen (WHAT: FEPSDE)"
    papers:
      - key: list2001willingness
        authors: "List, John A."
        year: 2001
        title: "Do Explicit Warnings Eliminate the Hypothetical Bias?"
        rationale: >
          WTP-WTA Gap und Hypothetical Bias: Menschen bewerten
          Attribute in Umfragen anders als bei realen Entscheidungen.
          Best-Worst Scaling reduziert diesen Bias gegenüber Ratings.
      - key: gabaix2006shrouded
        authors: "Gabaix, Xavier & Laibson, David"
        year: 2006
        title: "Shrouded Attributes"
        rationale: >
          Nicht alle Attribute sind gleich «sichtbar». Anschaffungskosten
          sind salient, Unterhaltskosten und CO2 sind «shrouded».
          MaxDiff macht implizite Trade-offs explizit.
      - key: bordalo2013salience
        authors: "Bordalo, Pedro, Gennaioli, Nicola & Shleifer, Andrei"
        year: 2013
        title: "Salience and Consumer Choice"
        rationale: >
          Salience Theory erklärt, warum bestimmte Attribute (Kosten)
          systematisch übergewichtet werden und andere (Nachhaltigkeit)
          untergewichtet.

  informationsquellen:
    item: "Wo informieren Sie sich über [Massnahme]? (Mehrfachauswahl)"
    dimension: "Information Channel Choice"
    papers:
      - key: allcott2014short
        authors: "Allcott, Hunt & Rogers, Todd"
        year: 2014
        title: "The Short-Run and Long-Run Effects of Behavioral Interventions"
        rationale: >
          Zeigt, dass der Informationskanal die Wirksamkeit der
          Botschaft moderiert. Persönliche Kanäle (Berater) wirken
          anders als unpersönliche (Internet).
      - key: golman2017information
        authors: "Golman, Russell, Hagmann, David & Loewenstein, George"
        year: 2017
        title: "Information Avoidance"
        rationale: >
          Die Kanalwahl reflektiert auch Informationsvermeidung:
          Wer keine Fachberatung sucht, vermeidet möglicherweise
          unangenehme Information über den eigenen Gebäudezustand.
      - key: ho2019measuring
        authors: "Ho, Emily H., Hagmann, David & Loewenstein, George"
        year: 2019
        title: "Measuring Information Preferences"
        rationale: >
          Framework zur systematischen Erfassung von Informations-
          kanal-Präferenzen und deren Determinanten.

  hindernisse:
    item: "Wo sehen Sie aktuell die grössten Hindernisse? (Mehrfachauswahl)"
    dimension: "W3 - Barrier Perception"
    papers:
      - key: enke2023complexity
        authors: "Enke, Benjamin, Graeber, Thomas & Oprea, Ryan"
        year: 2024
        title: "Complexity and Time"
        rationale: >
          Komplexität als fundamentale kognitive Barriere:
          Verstärkt Present Bias und führt zu suboptimalen
          Entscheidungen. Prozess-Komplexität ist eine kognitive,
          nicht nur eine praktische Barriere.
      - key: laibson1997golden
        authors: "Laibson, David"
        year: 1997
        title: "Golden Eggs and Hyperbolic Discounting"
        rationale: >
          Present Bias (β < 1) erklärt, warum Upfront-Kosten als
          grösstes Hindernis wahrgenommen werden, obwohl der
          langfristige Nutzen die Kosten übersteigt.
      - key: kahneman1991loss
        authors: "Kahneman, Daniel, Knetsch, Jack L. & Thaler, Richard H."
        year: 1991
        title: "The Endowment Effect, Loss Aversion, and Status Quo Bias"
        rationale: >
          Verlustaversion (λ ≈ 2.1-2.5) erklärt, warum Investitions-
          kosten als unverhältnismässig «gross» empfunden werden.
          Status Quo Bias verstärkt die Trägheit.

# =============================================================================
# MODULSPEZIFISCHE FRAGEN
# =============================================================================
modulspezifisch:

  heizung_impulsberatung:
    item: "Haben Sie von der Impulsberatung «erneuerbar heizen» gehört? / Planen Sie, Impulsberater:in beizuziehen?"
    dimension: "A2 + I3 (Heizungsmodul)"
    papers:
      - key: thaler2008nudge
        authors: "Thaler, Richard H. & Sunstein, Cass R."
        year: 2008
        title: "Nudge: Improving Decisions About Health, Wealth, and Happiness"
        rationale: >
          Impulsberatung als «Nudge»: Niedrigschwellige Beratung senkt
          die Entscheidungskomplexität. Die Fragen messen Bekanntheit
          und Adoptionsbereitschaft dieses Nudge-Instruments.
      - key: johnson2003thepower
        authors: "Johnson, Eric J. & Goldstein, Daniel"
        year: 2003
        title: "Do Defaults Save Lives?"
        rationale: >
          Default-Theorie: Die Impulsberatung könnte als «Default
          nächster Schritt» positioniert werden. Die Frage erfasst,
          ob dieser Default bereits als solcher wahrgenommen wird.

  heizung_gruende_kein_impulsberater:
    item: "Aus welchen Gründen möchten Sie keine:n Impulsberater:in beiziehen?"
    dimension: "Barrieren-Diagnostik"
    papers:
      - key: shafir2008complexity
        authors: "Shafir, Eldar"
        year: 2008
        title: "Managing Complexity in Consumer Choice"
        rationale: >
          Erfasst spezifische Substitutions- und Vermeidungsmotive.
          «Bevorzuge Installateur» = Vertrautheits-Heuristik.
          «Kenne mich selbst aus» = Overconfidence.
      - key: golman2017information
        authors: "Golman, Russell, Hagmann, David & Loewenstein, George"
        year: 2017
        title: "Information Avoidance"
        rationale: >
          «Weiss nicht genau, was eine Impulsberatung ist» =
          Information Avoidance (Vermeidung, weil Konsequenzen
          unangenehm sein könnten).

  pv_foerdermoeglichkeiten:
    item: "Welche Fördermöglichkeiten für Solaranlagen kennen Sie? (EIV, Einspeisevergütung, etc.)"
    dimension: "A2 - Förder-Bekanntheit (PV-Modul)"
    papers:
      - key: chetty2013salience
        authors: "Chetty, Raj, Looney, Adam & Kroft, Kory"
        year: 2009
        title: "Salience and Taxation: Theory and Evidence"
        rationale: >
          Zeigt, dass die Salienz von Anreizen (Steuern/Subventionen)
          deren Wirkung bestimmt - nicht die Höhe. Nicht bekannte
          Fördermittel haben Wirksamkeit = 0.
      - key: gabaix2019behavioral
        authors: "Gabaix, Xavier"
        year: 2019
        title: "Behavioral Inattention"
        rationale: >
          Rational Inattention: Wenn Förderprogramme zu komplex oder
          zu wenig salient sind, werden sie rational ignoriert. Die
          Frage diagnostiziert den Inattention-Level.

  pv_solarrechner:
    item: "Kennen Sie den Solarrechner von EnergieSchweiz?"
    dimension: "A2 - Tool-Bekanntheit (PV-Modul)"
    papers:
      - key: johnson2003thepower
        authors: "Johnson, Eric J. & Goldstein, Daniel"
        year: 2003
        title: "Do Defaults Save Lives?"
        rationale: >
          Tools wie der Solarrechner senken die Entscheidungs-
          komplexität durch Personalisierung. Die Frage misst,
          ob dieses Vereinfachungsinstrument die Zielgruppe
          überhaupt erreicht hat.
      - key: dellavigna2022rcts
        authors: "DellaVigna, Stefano & Linos, Elizabeth"
        year: 2022
        title: "RCTs to Scale"
        rationale: >
          Evidenz, dass digitale Entscheidungshilfen (Rechner,
          Kalkulatoren) die Conversion Rate erhöhen - aber nur
          wenn sie bekannt und genutzt werden.

  emob_wallbox:
    item: "Ist es möglich, in Ihrem Haus eine Lademöglichkeit (Wallbox) zu installieren?"
    dimension: "WHERE - Choice Architecture / Feasibility"
    papers:
      - key: madrian2001power
        authors: "Madrian, Brigitte C. & Shea, Dennis F."
        year: 2001
        title: "The Power of Suggestion"
        rationale: >
          Physische Infrastruktur als «Architektur»: Ob eine Wallbox
          installierbar ist, bestimmt den Default (E-Auto möglich
          oder nicht). Infrastruktur-Verfügbarkeit ist ein harter
          Constraint, der weiche Interventionen begrenzt.
      - key: thaler2003libertarian
        authors: "Thaler, Richard H. & Sunstein, Cass R."
        year: 2003
        title: "Libertarian Paternalism"
        rationale: >
          Die physische Möglichkeit bestimmt die Architektur der
          Wahlmöglichkeiten. «Nicht möglich» = keine Entscheidungs-
          architektur kann hier helfen.

