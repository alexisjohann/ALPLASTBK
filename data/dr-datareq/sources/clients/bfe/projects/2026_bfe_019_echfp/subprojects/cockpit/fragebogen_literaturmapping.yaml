        year: 2011
        title: "Social Norms and Energy Conservation"
        rationale: >
          Nachbarschaftseffekte sind geographisch begrenzt. Die PLZ
          ermöglicht die Identifikation von «Solar-Clustern» und
          regionalen Norm-Unterschieden.
      - key: hofstede2001cultures
        authors: "Hofstede, Geert"
        year: 2001
        title: "Culture's Consequences"
