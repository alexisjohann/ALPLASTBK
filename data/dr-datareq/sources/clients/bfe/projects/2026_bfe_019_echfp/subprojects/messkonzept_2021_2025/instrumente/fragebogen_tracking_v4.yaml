# Tracking Kampagne Erneuerbar Heizen - Fragebogen
# Quelle: 2504_BFE_Erneuerbar_Heizen_Fragebogen.pdf
# Version: 4.0
# Datum: 06.04.2025

metadata:
  dokument_id: "2504_BFE_Erneuerbar_Heizen_Fragebogen"
  version: "4.0"
  datum: "2025-04-06"
  auftraggeber_kontakt: "Abinaya Sivarajah"
  institut: "intervista"
  institut_kontakt: "Kim Buchmüller"
  methode: "Online-Panel Befragung"

# ============================================================================
# FRAGEBOGEN-STRUKTUR
# ============================================================================

sektionen:

  # --------------------------------------------------------------------------
  # SEKTION 1: SCREENING
  # --------------------------------------------------------------------------
  - id: "S1"
    name: "Screening"
    zweck: "Zielgruppen-Qualifikation"
    fragen:

      - id: "F1.1"
        text: "Wie alt sind Sie?"
        typ: "numerisch"
        einheit: "Jahre"
        screening:
          screenout: "< 25 oder > 79 Jahre"

      - id: "F1.2"
        text: "Bitte geben Sie Ihr Geschlecht an"
        typ: "single_choice"
        optionen:
          - code: 1
            label: "männlich"
          - code: 2
            label: "weiblich"
          - code: 3
            label: "divers"

      - id: "F1.3"
        text: "Wie lautet die Postleitzahl Ihres Hauptwohnsitzes?"
        typ: "numerisch"
        format: "PLZ (4-stellig)"
        recodierung: "PLZ → Siedlungstyp (Stadt/Agglo, Land)"

      - id: "F1.4"
        text: "Sind Sie oder ein anderes Haushaltsmitglied…"
        typ: "single_choice"
        optionen:
          - code: 1
            label: "Mieter oder Untermieter"
            screening: "SCREENOUT"
          - code: 2
            label: "Eigentümer Wohnung (Stockwerkeigentum)"
          - code: 3
            label: "Eigentümer Haus"

      - id: "F1.5"
        text: "Wie alt ist Ihr Haus oder Ihre Wohnung?"
        typ: "single_choice"
        optionen:
          - code: 1
            label: "Neubau / weniger als 5 Jahre"
            screening: "SCREENOUT"
          - code: 2
            label: "5-24 Jahre"
          - code: 3
            label: "25-40 Jahre"
          - code: 4
            label: "Älter als 40 Jahre"
          - code: 99
            label: "Weiss nicht"
            screening: "SCREENOUT"

      - id: "F1.6"
        text: "Wie viele Wohnungen gibt es in Ihrem Haus?"
        typ: "single_choice"
        optionen:
          - code: 1
            label: "Einfamilienhaus (eine Wohneinheit)"
          - code: 2
            label: "Mehrfamilienhaus mit 2-6 Wohnungen"
          - code: 3
            label: "Mehrfamilienhaus mit 7+ Wohnungen"
        ebf_mapping:
          segment: "EFH vs. MFH"

      - id: "F1.7"
        text: "Welcher Heizungstyp ist bei Ihnen zu Hause installiert?"
        typ: "single_choice"
        hinweis: "Wichtigste Heizung, System für Heizung (nicht Warmwasser)"
        randomisierung: true
        gruppierung: "2+3, 4+5, 6-8"
        optionen:
          - code: 1
            label: "Ölheizung"
            kategorie: "fossil"
          - code: 2
            label: "Erdgasheizung"
            kategorie: "fossil"
          - code: 3
            label: "Biogasheizung (ausschliesslich Biogas)"
            kategorie: "erneuerbar"
          - code: 4
            label: "Wärmepumpe mit Erdsonde"
            kategorie: "erneuerbar"
          - code: 5
            label: "Luft/Wasser-Wärmepumpe"
            kategorie: "erneuerbar"
          - code: 6
            label: "Pelletheizung"
            kategorie: "erneuerbar"
          - code: 7
            label: "Holzschnitzelheizung"
            kategorie: "erneuerbar"
          - code: 8
            label: "Stückholzheizung"
            kategorie: "erneuerbar"
          - code: 9
            label: "Elektroheizung"
            kategorie: "elektrisch"
          - code: 10
            label: "Fernwärme"
            kategorie: "erneuerbar"
          - code: 11
            label: "Thermische Solarheizung"
            kategorie: "erneuerbar"
          - code: 98
            label: "Anderes"
          - code: 99
            label: "Weiss nicht"

      - id: "F1.8"
        text: "Welches Alter hat Ihre Heizung?"
        typ: "single_choice"
        optionen:
          - code: 1
            label: "Neu / weniger als 5 Jahre"
          - code: 2
            label: "5-10 Jahre"
          - code: 3
            label: "Älter als 10 Jahre"
          - code: 99
            label: "Weiss nicht"

  # --------------------------------------------------------------------------
  # SEKTION 2: RENOVATIONSABSICHTEN UND INFORMATIONSQUELLEN
  # --------------------------------------------------------------------------
  - id: "S2"
    name: "Aktuelle Renovationsabsichten und Beweggründe, Informationsquellen"
    zweck: "Ersatzabsicht, Gründe, Informationsverhalten"
    fragen:

      - id: "F2.1"
        text: "Planen Sie, Ihre Heizung zu erneuern?"
        typ: "single_choice"
        optionen:
          - code: 1
            label: "Ja, in den nächsten 2 Jahren"
          - code: 2
            label: "Ja, in den nächsten 5 Jahren"
          - code: 3
            label: "Nein"
          - code: 99
            label: "Weiss nicht"
        ebf_mapping:
          dimension: "READY (AV)"
          parameter: "τ (Handlungsbereitschaft)"

      - id: "F2.2"
        text: "Aus welchen Gründen planen Sie aktuell keinen Ersatz Ihrer Heizung?"
        typ: "multiple_choice"
        filter: "F1.8>1 AND F2.1=3"
        optionen:
          - code: 1
            label: "Aktuelle Heizung funktioniert gut"
            ebf_barrier: "Status Quo Bias"
          - code: 2
            label: "Aktuelle Heizung ist noch nicht so alt"
            ebf_barrier: "Temporal Discounting"
          - code: 3
            label: "Ersatz ist zu teuer"
            ebf_barrier: "Loss Aversion (Kosten)"
          - code: 4
            label: "Ersatz ist sehr kompliziert"
            ebf_barrier: "Complexity Aversion"
          - code: 5
            label: "Plane Haus/Wohnung bald zu verkaufen"
          - code: 6
            label: "Andere Sanierungsarbeiten dringender"
            ebf_barrier: "Mental Accounting"
          - code: 7
            label: "Lieferschwierigkeiten"
            ebf_barrier: "External Constraint"
          - code: 8
            label: "Mangelnde Verfügbarkeit Installateure"
            ebf_barrier: "External Constraint"
          - code: 98
            label: "Anderes"
          - code: 99
            label: "Weiss nicht"

      - id: "F2.3"
        text: "Aus welchen Gründen planen Sie einen Ersatz Ihrer Heizung?"
        typ: "multiple_choice"
        filter: "F2.1<3"
        optionen:
          - code: 1
            label: "Ende Lebensdauer"
          - code: 2
            label: "Defekt/Störungen"
          - code: 3
            label: "Kostengründe"
          - code: 4
            label: "Ökologische Nachhaltigkeit"
          - code: 5
            label: "Versorgungsunsicherheit bisheriger Heizstoff"
          - code: 6
            label: "Staatliche Subventionen"
          - code: 7
            label: "Wirtschaftliche Nachhaltigkeit"
          - code: 98
            label: "Anderes"
          - code: 99
            label: "Weiss nicht"

      - id: "F2.4"
        text: "Welchen Heizungstyp ziehen Sie aktuell für die Erneuerung in Betracht?"
        typ: "multiple_choice"
        filter: "F2.1<3"
        optionen: "Liste Heizsysteme (wie F1.7)"
        randomisierung: true

      - id: "F2.5"
        text: "Welchen Heizungstyp bevorzugen Sie aktuell?"
        typ: "single_choice"
        filter: "F2.1<3 AND F2.4>1"
        optionen: "Aus F2.4 übernommen"

      - id: "F2.6"
        text: "Weshalb ziehen Sie eine Elektroheizung in Erwägung?"
        typ: "open_text"
        filter: "F2.4=9"

      - id: "F2.7"
        text: "Wo informieren Sie sich über die Installation einer Heizung mit erneuerbaren Energien?"
        typ: "multiple_choice"
        filter: "F2.1<3"
        optionen:
          - code: 1
            label: "Energieberater:in"
          - code: 2
            label: "Impulsberater:in"
            ebf_relevanz: "Kampagnen-KPI"
          - code: 3
            label: "Heizungsinstallateur:in"
            ebf_relevanz: "Installateur-Kanal"
          - code: 4
            label: "Hauseigentümer-Verband"
          - code: 5
            label: "Architekt:in"
          - code: 6
            label: "Allgemeine Medien (TV, Zeitungen)"
          - code: 7
            label: "Fachzeitschriften"
          - code: 8
            label: "Internet (Google-Suche)"
          - code: 9
            label: "Förderprogramme Bund/Kanton"
          - code: 10
            label: "Fachmesse"
          - code: 97
            label: "Anderes"
          - code: 98
            label: "Heizung mit erneuerbaren Energien steht nicht zur Diskussion"
          - code: 99
            label: "Weiss nicht"

      - id: "F2.8"
        text: "Wo würden Sie sich informieren (hypothetisch)?"
        typ: "multiple_choice"
        filter: "F2.1>2"
        optionen: "Wie F2.7"

      - id: "F2.9"
        text: "Was ist Ihre wichtigste Informationsquelle?"
        typ: "single_choice"
        filter: "F2.7>1"
        optionen: "Aus F2.7"

  # --------------------------------------------------------------------------
  # SEKTION 3: AKTUELLE ENTWICKLUNG
  # --------------------------------------------------------------------------
  - id: "S3"
    name: "Aktuelle Entwicklung"
    zweck: "Externe Faktoren, Marktentwicklung"
    fragen:

      - id: "F3.1"
        text: "Wird es beim Ersatz Verzögerungen wegen Lieferengpässen/Installateurmangel geben?"
        typ: "single_choice"
        filter: "F2.1<3"
        optionen:
          - code: 1
            label: "Nicht erkundigt"
          - code: 2
            label: "Keine Verzögerungen erwartet"
          - code: 3
            label: "Verzögerungen ohne Einfluss auf Planung"
          - code: 4
            label: "Verzögerungen mit Einfluss auf Planung"

      - id: "F3.2"
        text: "Besorgt Sie der Preisanstieg von Erdöl und Erdgas?"
        typ: "single_choice"
        optionen:
          - code: 1
            label: "Ja"
          - code: 2
            label: "Nein"

      - id: "F3.3"
        text: "Hat dies einen Einfluss auf Ihre Entscheidung zum Heizungsersatz?"
        typ: "single_choice"
        filter: "F3.2=1"
        optionen:
          - code: 1
            label: "Ja, konkrete Pläne"
          - code: 2
            label: "Ja, überlege mir Ersatz"
          - code: 3
            label: "Nein"

      - id: "F3.4"
        text: "Besorgen Sie Versorgungsengpässe von Erdöl und Erdgas?"
        typ: "single_choice"
        optionen:
          - code: 1
            label: "Ja"
          - code: 2
            label: "Nein"

      - id: "F3.5"
        text: "Hat dies einen Einfluss auf Ihre Entscheidung?"
        typ: "single_choice"
        filter: "F3.4=1"
        optionen: "Wie F3.3"

      - id: "F3.6"
        text: "Wie gut fühlen Sie sich über die Möglichkeit einer Umstellung informiert?"
        typ: "single_choice"
        filter: "F2.1<3"
        skala: "5-Punkt"
        optionen:
          - code: 1
            label: "Sehr gut"
          - code: 2
            label: "Eher gut"
          - code: 3
            label: "Mittelmässig"
          - code: 4
            label: "Eher schlecht"
          - code: 5
            label: "Sehr schlecht"
        ebf_mapping:
          dimension: "AWARE (AU)"
          parameter: "A(·) Awareness Level"

      - id: "F3.7"
        text: "Welche Art von Heizung käme grundsätzlich in Frage (hypothetisch)?"
        typ: "multiple_choice"
        filter: "F2.1>2"
        optionen: "Liste Heizsysteme"

      - id: "F3.8"
        text: "Was wäre aktuell Ihr bevorzugter Heizungstyp?"
        typ: "single_choice"
        filter: "F2.1>2 AND F3.7>1"
        optionen: "Aus F3.7"

      - id: "F3.9"
        text: "Warum bevorzugen Sie nicht ein System mit erneuerbaren Energien?"
        typ: "open_text"
        filter: "(F2.5=1,2,9) OR (F3.8=1,2,9)"
        ebf_relevanz: "Barrieren-Analyse"

  # --------------------------------------------------------------------------
  # SEKTION 4: WISSEN ZU KOSTEN
  # --------------------------------------------------------------------------
  - id: "S4"
    name: "Wissen zu Kosten"
    zweck: "Kostenwahrnehmung, Einstellungen"
    fragen:

      - id: "F4.1"
        text: "Finden Sie den Einbau einer erneuerbaren Heizung im Vergleich…"
        typ: "single_choice"
        optionen:
          - code: 1
            label: "Eher günstig"
          - code: 2
            label: "Angemessen"
          - code: 3
            label: "Eher teuer"
          - code: 99
            label: "Weiss nicht"

      - id: "F4.2"
        text: "Welchen Stellenwert haben folgende grössere Investitionen für Sie?"
        typ: "click_ranking"
        randomisierung: true
        optionen:
          - code: 1
            label: "Küchenersatz"
          - code: 2
            label: "Fassaden-/Dachrenovation"
          - code: 3
            label: "Installation Photovoltaik-Anlage"
          - code: 4
            label: "Heizungsersatz"
          - code: 5
            label: "Badersatz"
          - code: 6
            label: "Neuanlegen Garten"
          - code: 7
            label: "Keller-/Dachstockausbau"
          - code: 8
            label: "Erweiterung Gebäude"
        ebf_mapping:
          dimension: "WHAT (C)"
          messung: "Mental Accounting / Investitionspriorität"

      - id: "F4.3"
        text: "Einstellungen zu erneuerbaren Heizungen"
        typ: "matrix_likert"
        skala: "4-Punkt + Weiss nicht"
        randomisierung: true
        items:
          - code: 1
            text: "Investitionskosten sind viel zu hoch"
            ebf_barrier: "Loss Aversion"
          - code: 2
            text: "Langfristig spart man Kosten"
            ebf_benefit: "Total Cost of Ownership"
          - code: 3
            text: "Umsetzung zu kompliziert"
            ebf_barrier: "Complexity Aversion"
          - code: 4
            text: "Spürbarer Beitrag zur CO2-Senkung"
            ebf_benefit: "Warm Glow"
          - code: 5
            text: "Etwas Gutes für Natur und Umwelt"
            ebf_benefit: "Warm Glow"
          - code: 6
            text: "Öl/Gas-Heizung ebenso umweltfreundlich"
            ebf_barrier: "Misinformation"
          - code: 7
            text: "Wiederverkaufswert steigt"
            ebf_benefit: "Investment Value"
          - code: 8
            text: "Gut über Kosten informiert"
            ebf_mapping: "AWARE"
          - code: 9
            text: "Heizung darf mehr kosten wenn umweltfreundlicher"
            ebf_mapping: "Willingness to Pay"
          - code: 10
            text: "Heizung darf mehr kosten bei Unabhängigkeit"
            ebf_mapping: "Energy Security Premium"
          - code: 11
            text: "Holz teuer und schwierig zu bekommen"
            ebf_barrier: "Perceived Availability"

      - id: "F4.4"
        text: "Grösste Versorgungssicherheit?"
        typ: "single_choice"
        randomisierung: true
        optionen:
          - code: 1
            label: "Ölheizung"
          - code: 2
            label: "Wärmepumpe mit Erdsonde"
          - code: 3
            label: "Fernwärme"
          - code: 4
            label: "Holzheizung"
          - code: 5
            label: "Erdgasheizung"
          - code: 6
            label: "Solarthermie"
          - code: 99
            label: "Weiss nicht"

      - id: "F4.5"
        text: "Heizkosten am wenigsten steigend?"
        typ: "single_choice"
        optionen: "Wie F4.4"

      - id: "F4.6"
        text: "Anschaffungskosten am tiefsten?"
        typ: "single_choice"
        optionen: "Wie F4.4"

      - id: "F4.7"
        text: "Energiekosten am tiefsten?"
        typ: "single_choice"
        optionen: "Wie F4.4"

      - id: "F4.8"
        text: "Betriebskosten am tiefsten?"
        typ: "single_choice"
        optionen: "Wie F4.4"

  # --------------------------------------------------------------------------
  # SEKTION 5: MOTIVATION ZUR HEIZUNGSERNEUERUNG
  # --------------------------------------------------------------------------
  - id: "S5"
    name: "Motivation zur Heizungserneuerung"
    zweck: "MaxDiff / Conjoint für Präferenzen"
    fragen:

      - id: "F5.1"
        text: "MaxDiff: Wichtigste Aspekte bei Heizungserneuerung"
        typ: "maxdiff"
        sets: 14
        items_per_set: 4
        attribute:
          - "Anschaffungskosten"
          - "Unterhaltskosten"
          - "Energiekosten"
          - "CO2-Emissionen"
          - "Werterhalt des Hauses"
          - "Heizleistung"
          - "Versorgungssicherheit"
          - "Nachhaltigkeit"
          - "Politische Unabhängigkeit"
          - "Regionaler Heizstoff"
        ebf_mapping:
          dimension: "WHAT (C)"
          messung: "Utility-Gewichte u_F, u_S, u_E, u_P, u_D, u_X"

      - id: "F5.2"
        text: "Haben Sie Rentabilitätsberechnungen gemacht?"
        typ: "single_choice"
        filter: "F2.1<3"
        optionen:
          - code: 1
            label: "Ja"
          - code: 2
            label: "Nein, aber habe es vor"
          - code: 3
            label: "Nein, nicht geplant"

  # --------------------------------------------------------------------------
  # SEKTION 6: KAMPAGNE UND IMPULSBERATUNG
  # --------------------------------------------------------------------------
  - id: "S6"
    name: "Kampagne und Impulsberatung"
    zweck: "Kampagnen-Awareness, Impulsberatung-KPIs"
    fragen:

      - id: "F6.1"
        text: "Von welchen Informationskampagnen haben Sie etwas gesehen/gelesen/gehört? (unaided)"
        typ: "open_text"
        fallback:
          code: 99
          label: "Keine Kampagne"
        ebf_mapping:
          dimension: "AWARE (AU)"
          kpi: "Unaided Recall"

      - id: "F6.2"
        text: "Kampagnen-Awareness (aided)"
        typ: "matrix_yes_no"
        randomisierung: true
        items:
          - code: 1
            text: "erneuerbar heizen"
            kampagne: "TARGET"
          - code: 2
            text: "MakeHeatSimple"
          - code: 3
            text: "Heizen mit Öl"
            kampagne: "COMPETITOR"
          - code: 4
            text: "Energiezukunft / gazenergie"
            kampagne: "COMPETITOR"
        ebf_mapping:
          dimension: "AWARE (AU)"
          kpi: "Aided Recall"

      - id: "F6.3"
        text: "Auf welchen Kanälen haben Sie 'erneuerbar heizen' wahrgenommen?"
        typ: "multiple_choice"
        filter: "F6.2.1=1"
        optionen:
          - code: 1
            label: "TV-Spot"
          - code: 2
            label: "Kino-Spot"
          - code: 3
            label: "Radio-Spot"
          - code: 4
            label: "Plakat"
          - code: 5
            label: "Inserat Zeitungen/Zeitschriften"
          - code: 6
            label: "Werbebanner Internet"
          - code: 7
            label: "Webseite erneuerbar heizen"
          - code: 9
            label: "Social Media"
          - code: 10
            label: "Vorgeschalteter Werbespot (YouTube, Web-TV)"
          - code: 11
            label: "Beitrag TV-Sendung"
          - code: 12
            label: "Artikel Zeitung/Zeitschrift"
          - code: 13
            label: "Beitrag Radio-Sendung"
          - code: 14
            label: "Broschüre/Flyer"
          - code: 15
            label: "Werbung ÖV"
          - code: 16
            label: "Stand Fachmesse"
          - code: 98
            label: "Anderes"
          - code: 99
            label: "Weiss nicht"
        ebf_mapping:
          kpi: "Channel Attribution"

      - id: "F6.4"
        text: "Artikel gelesen? (Stimulus)"
        typ: "single_choice"
        stimulus: "Diesjährige Artikel einblenden"
        optionen:
          - code: 1
            label: "Ja"
          - code: 2
            label: "Nein"
          - code: 99
            label: "Weiss nicht"

      - id: "F6.5"
        text: "Werbung gesehen? (Stimulus)"
        typ: "single_choice"
        stimulus: "Diesjährige Kampagne einblenden"
        optionen:
          - code: 1
            label: "Ja"
          - code: 2
            label: "Nein"
          - code: 99
            label: "Weiss nicht"

      - id: "F6.6"
        text: "Haben Sie vor dieser Befragung von der Impulsberatung 'erneuerbar heizen' gehört?"
        typ: "single_choice"
        optionen:
          - code: 1
            label: "Ja"
          - code: 2
            label: "Nein"
          - code: 99
            label: "Weiss nicht"
        ebf_mapping:
          kpi: "Impulsberatung Awareness"

      - id: "F6.7"
        text: "Haben Sie bereits einmal eine/n Impulsberater/in beigezogen?"
        typ: "single_choice"
        filter: "F6.6=1"
        optionen:
          - code: 1
            label: "Ja"
          - code: 2
            label: "Nein"
          - code: 99
            label: "Weiss nicht"
        ebf_mapping:
          kpi: "Impulsberatung Trial"

      - id: "F6.8"
        text: "Planen Sie bei Ihrem nächsten Heizungsersatz, eine/n Impulsberater/in beizuziehen?"
        typ: "single_choice"
        filter: "F6.6=1"
        optionen:
          - code: 1
            label: "Ja"
          - code: 2
            label: "Nein"
          - code: 99
            label: "Weiss nicht"
        ebf_mapping:
          dimension: "READY (AV)"
          kpi: "Impulsberatung Intent"

      - id: "F6.9"
        text: "Gründe gegen Impulsberater:in"
        typ: "single_choice"
        filter: "F6.8=2"
        optionen:
          - code: 1
            label: "Bevorzuge Beratung durch Installateur"
          - code: 2
            label: "Bevorzuge Energieberater:in"
          - code: 3
            label: "Impulsberatung zu teuer"
            ebf_barrier: "Cost Perception (falsch)"
          - code: 4
            label: "Kenne mich selber gut aus"
          - code: 5
            label: "Weiss nicht genau was Impulsberatung ist"
            ebf_barrier: "Awareness Gap"
          - code: 99
            label: "Andere Gründe"

      - id: "F6.10"
        text: "Was denken Sie, was kostet eine Impulsberatung?"
        typ: "single_choice"
        optionen:
          - code: 1
            label: "Gratis"
            korrekt: true
          - code: 2
            label: "1-100 CHF"
          - code: 3
            label: "101-500 CHF"
          - code: 4
            label: "Mehr als 500 CHF"
          - code: 99
            label: "Weiss nicht"
        ebf_mapping:
          kpi: "Price Knowledge (Gratis = korrekt)"

  # --------------------------------------------------------------------------
  # SEKTION 7: MAKE HEAT SIMPLE (Zweitwohnung)
  # --------------------------------------------------------------------------
  - id: "S7"
    name: "Make Heat Simple"
    zweck: "Nebenkampagne Zweitwohnungen"
    fragen:

      - id: "F7.1"
        text: "Besitzen Sie eine Zweitwohnung/-haus?"
        typ: "single_choice"
        optionen:
          - code: 1
            label: "Ja"
          - code: 2
            label: "Nein"

      - id: "F7.2"
        text: "Wie bedeutsam sind Heizkosten als Kostenfaktor?"
        typ: "single_choice"
        filter: "F7.1=1"
        skala: "5-Punkt (Sehr klein - Sehr gross)"

      - id: "F7.3"
        text: "Massnahmen zur Heizkostenreduktion ergriffen?"
        typ: "single_choice"
        filter: "F7.1=1"
        optionen:
          - code: 1
            label: "Ja"
          - code: 2
            label: "Nein"
          - code: 99
            label: "Weiss nicht"

      - id: "F7.4"
        text: "Kennen Sie Systeme zur Fernsteuerung von Heizungen?"
        typ: "single_choice"
        filter: "F7.1=1"
        optionen:
          - code: 1
            label: "Ja, installiert"
          - code: 2
            label: "Ja, informiert"
          - code: 3
            label: "Ja, gehört"
          - code: 4
            label: "Nein"

      - id: "F7.5"
        text: "Erfahrungen mit Fernsteuerung"
        typ: "matrix_satisfaction"
        filter: "F7.4=1"
        items:
          - "Installation des Systems"
          - "System im Einsatz"

      - id: "F7.6"
        text: "Ziehen Sie ein solches System in Zukunft in Betracht?"
        typ: "single_choice"
        filter: "F7.4=2,3"
        optionen:
          - code: 1
            label: "Ja"
          - code: 2
            label: "Nein"
          - code: 3
            label: "Weiss nicht"

  # --------------------------------------------------------------------------
  # SEKTION 8: CO2-ABGABE
  # --------------------------------------------------------------------------
  - id: "S8"
    name: "Eidgenössische Finanzkommission / CO2-Abgabe"
    zweck: "Wissen zu CO2-Abgabe"
    fragen:

      - id: "F8.1"
        text: "Wissen Sie, ob eine CO2-Abgabe auf Heizöl/Erdgas erhoben wird?"
        typ: "single_choice"
        optionen:
          - code: 1
            label: "Ja, wird erhoben"
            korrekt: true
          - code: 2
            label: "Nein, wird nicht erhoben"
          - code: 3
            label: "Weiss nicht"
        ebf_mapping:
          dimension: "AWARE (AU)"
          kpi: "Policy Knowledge"

      - id: "F8.2"
        text: "Wieviel beträgt die CO2-Abgabe?"
        typ: "single_choice"
        filter: "F8.1=1"
        optionen:
          - code: 1
            label: "1-10%"
          - code: 2
            label: "11-30%"
            korrekt: "ca. 25-30%"
          - code: 3
            label: "31-50%"
          - code: 4
            label: "Mehr als 50%"
          - code: 99
            label: "Weiss nicht"

      - id: "F8.3"
        text: "Welche Rolle spielt die CO2-Abgabe bei Ihren Überlegungen zum Heizungsersatz?"
        typ: "single_choice"
        skala: "5-Punkt (Geringe Rolle - Grosse Rolle)"

  # --------------------------------------------------------------------------
  # SEKTION 9: SOZIODEMOGRAPHIE
  # --------------------------------------------------------------------------
  - id: "S9"
    name: "Soziodemographie"
    zweck: "Segmentierung"
    fragen:

      - id: "F9.1"
        text: "Höchste abgeschlossene Ausbildung"
        typ: "single_choice"
        optionen:
          - code: 1
            label: "Kein Schulabschluss"
            bildung: "niedrig"
          - code: 2
            label: "Obligatorische Schule (Primar)"
            bildung: "niedrig"
          - code: 3
            label: "Real-/Sekundar-/Bezirksschule"
            bildung: "niedrig"
          - code: 4
            label: "10. Schuljahr, Vorlehre"
            bildung: "niedrig"
          - code: 5
            label: "Diplommittelschule, Fachmittelschule"
            bildung: "niedrig"
          - code: 6
            label: "Berufslehre, Berufsmaturität"
            bildung: "mittel"
          - code: 7
            label: "Gymnasium, Maturität"
            bildung: "hoch"
          - code: 8
            label: "Höhere Fachschule"
            bildung: "hoch"
          - code: 9
            label: "Universität, FH, ETH, PH"
            bildung: "hoch"
        codierung: "1-6 = niedrig-mittel, 7-9 = hoch"

      - id: "F9.2"
        text: "Haushaltseinkommen brutto pro Monat"
        typ: "single_choice"
        optionen:
          - code: 1
            label: "< 3'000 CHF"
          - code: 2
            label: "3'000 - 4'500 CHF"
          - code: 3
            label: "4'501 - 6'000 CHF"
          - code: 4
            label: "6'001 - 7'500 CHF"
          - code: 5
            label: "7'501 - 9'000 CHF"
          - code: 6
            label: "9'001 - 12'000 CHF"
          - code: 7
            label: "> 12'000 CHF"
          - code: 99
            label: "Keine Angabe"

# ============================================================================
# EBF-MAPPING ZUSAMMENFASSUNG
# ============================================================================

ebf_integration:

  dimensionen_abgedeckt:
    - dimension: "AWARE (AU)"
      fragen: ["F3.6", "F6.1", "F6.2", "F6.6", "F8.1"]
      kpis: ["Aided Recall", "Unaided Recall", "Impulsberatung Awareness", "Policy Knowledge"]

    - dimension: "READY (AV)"
      fragen: ["F2.1", "F6.8"]
      kpis: ["Ersatzabsicht", "Impulsberatung Intent"]

    - dimension: "WHAT (C)"
      fragen: ["F4.2", "F4.3", "F5.1"]
      kpis: ["Investitionspriorität", "Einstellungen", "MaxDiff Utility-Gewichte"]

    - dimension: "WHO (AAA)"
      fragen: ["F1.4", "F1.6"]
      segmente: ["EFH", "MFH (klein)", "MFH (gross)", "STWE"]

  barrieren_gemessen:
    - "Status Quo Bias (F2.2.1, F2.2.2)"
    - "Loss Aversion / Kosten (F2.2.3, F4.3.1)"
    - "Complexity Aversion (F2.2.4, F4.3.3)"
    - "External Constraints (F2.2.7, F2.2.8)"
    - "Awareness Gap (F6.9.5)"
    - "Cost Misperception (F6.10)"

  fehlende_dimensionen:
    - dimension: "WHEN (V)"
      gap: "Kontext-Faktoren nicht direkt gemessen"

    - dimension: "HOW (B)"
      gap: "Komplementaritäten γ nicht gemessen"

    - dimension: "STAGE (AW)"
      gap: "BCJ-Phase nur implizit (über F2.1)"

# ============================================================================
# METHODISCHE ANMERKUNGEN
# ============================================================================

methodik:

  screening_kriterien:
    - "Alter: 25-79 Jahre"
    - "Eigentümer (Haus oder STWE)"
    - "Gebäude: mindestens 5 Jahre alt"

  quotierung:
    hinweis: "Vermutlich nach Alter, Geschlecht, Region (nicht im Dokument spezifiziert)"

  randomisierung:
    - "Heizsysteme (F1.7, F2.4, F3.7)"
    - "Einstellungs-Items (F4.3)"
    - "MaxDiff (F5.1)"
    - "Kampagnen (F6.2)"
    - "Kostenwahrnehmung (F4.4-F4.8)"

  stimuli:
    - "Artikel (F6.4)"
    - "Kampagnenwerbung (F6.5)"

  besonderheiten:
    - "MaxDiff für Präferenzmessung (14 Sets à 4 Items)"
    - "Click-Ranking für Investitionspriorität"
    - "Filterlogik basierend auf Ersatzabsicht (F2.1)"
