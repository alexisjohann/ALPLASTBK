# =============================================================================
# TEIL 1: SYSTEMISCHE KRITIKPUNKTE (Betrifft gesamten Fragebogen)
# =============================================================================
# Diese Punkte kommen wiederholt über alle Module vor und werden
# hier EINMAL behandelt statt bei jedem Modul separat.
# =============================================================================

systemische_kritikpunkte:

  # ===========================================================================
  # S1: STORIES / PRIMING — DER ZENTRALE STREITPUNKT
  # ===========================================================================
  S1_stories_priming:
    intervista_kritik: |
      Wiederholt in 5 Modulen identisch:
      - "Unübliche Situation"
      - "Führt zu stärkerer Berücksichtigung von Modernisierungen und Kosten"
      - "Einseitiges Priming (nur Kosten) und Aktivierung von Norm-Verhaltensweisen"
      - "Resultate nicht valide"
      - "Ein Fragebogen ist kein Instrument zur Verhaltensänderung"
      - "Es kann nicht das Ziel sein, durch den Fragebogen Gedanken/Simulationen auszulösen"
      - "Bitte den Fragebogen nicht zur Wissensbildung oder Beeinflussung nutzen"

    betroffene_stellen:
      - row: 25
        modul: "Umfassende energetische Modernisierung"
        story: "Gespräch mit Kollegen über Haus/Kosten"
      - row: 41
        modul: "Umfassende energetische Modernisierung"
        story: "Gang durch Haus, Heizung brummt"
      - row: 45
        modul: "Umfassende energetische Modernisierung"
        story: "Internet-Suche nach Informationen"
      - row: 62
        modul: "Gebäudehülle"
        story: "Gespräch mit Kollegen (identisch)"
      - row: 78
        modul: "Gebäudehülle"
        story: "Zugluft an Fenstern/Wänden spüren"
      - row: 82
        modul: "Gebäudehülle"
        story: "Internet-Suche (identisch)"
      - row: 99
        modul: "Heizungsersatz"
        story: "Gespräch mit Kollegen (identisch)"
      - row: 115
        modul: "Heizungsersatz"
        story: "Keller/Technikraum, alte Heizung betrachten"
      - row: 119
        modul: "Heizungsersatz"
        story: "Internet-Suche (identisch)"
      - row: 141
        modul: "Solarenergie"
        story: "Gespräch mit Kollegen (identisch)"
      - row: 157
        modul: "Solarenergie"
        story: "Blick aufs Dach, Sonne scheint"
      - row: 161
        modul: "Solarenergie"
        story: "Internet-Suche (identisch)"
      - row: 183
        modul: "Elektromobilität"
        story: "Gespräch mit Bekannten über Mobilität"
      - row: 199
        modul: "Elektromobilität"
        story: "Gang zur Garage, geputztes Auto"
      - row: 203
        modul: "Elektromobilität"
        story: "Internet-Suche (identisch)"
      - row: 223
        modul: "Segmentierung"
        story: "Jetzt wissen Sie schon einiges mehr..."

    bewertung: "KOMPROMISS"

    unsere_analyse: |
      intervista hat in einem Punkt RECHT und in einem UNRECHT:

      RECHT hat intervista:
      (1) Die Stories aktivieren tatsächlich bestimmte Frames. Das ist kein
          Nebeneffekt, sondern BY DESIGN. Aber: In einer Nullmessung, die
          Veränderungen über die Zeit messen soll, ist diese Aktivierung
          PROBLEMATISCH, weil sie die Baseline verzerrt. Wenn die Story
          bereits Normen aktiviert, ist der gemessene "Baseline-Wert"
          kein echter Baseline, sondern ein primed Wert.
      (2) Einige Stories sind tatsächlich unrealistisch (z.B. "Blick aufs
          eigene Dach aus dem Fenster" — bei vielen Häusern nicht möglich;
          "geputztes Auto in Garage" — nicht jeder hat Garage/Auto).

      UNRECHT hat intervista:
      (1) "Ein Fragebogen ist kein Instrument zur Verhaltensänderung" —
          Das ist eine veraltete Sichtweise. In der modernen Verhaltens-
          ökonomie ist jede Messung gleichzeitig eine Intervention
          (Hawthorne-Effekt, Mere Measurement Effect).
      (2) "Resultate nicht valide" — Die Validität hängt davon ab, WAS
          man messen will. Wenn man BCM-Parameter messen will, sind
          kontextualisierte Vignetten sogar BESSER als abstrakte Fragen,
          weil sie Ecological Validity erhöhen.

    literatur_fundierung:
      pro_stories:
        - paper: "Kahneman & Tversky (1979) — Prospect Theory"
          argument: |
            Framing-Effekte sind REAL und bestimmen Entscheidungen.
            Eine Befragung ohne Kontext misst eine künstliche Situation.
            Stories liefern den Kontext, in dem Entscheidungen tatsächlich
            stattfinden.
        - paper: "Loewenstein (2005) — Hot-Cold Empathy Gaps"
          argument: |
            Menschen in einem "kalten" Zustand (abstraktes Ausfüllen)
            können ihre Reaktionen in "heissen" Situationen (tatsächliche
            Entscheidung) nicht vorhersagen. Stories aktivieren den
            emotionalen Kontext → realistischere Antworten.
        - paper: "Hainmueller et al. (2015) — Conjoint Experiments"
          argument: |
            Vignetten-basierte Methoden (Conjoint, Factorial Surveys) sind
            in der politischen Ökonomie und Soziologie Goldstandard für
            die Messung von Präferenzen unter realistischen Bedingungen.
        - paper: "Atkinson & Flint (2001) — Vignette Technique"
          argument: |
            Vignetten reduzieren Social Desirability Bias, weil sie
            über eine dritte Person / Situation fragen, nicht direkt
            über den Befragten.

      contra_stories_in_nullmessung:
        - paper: "Schwarz (1999) — Self-Reports in Surveys"
          argument: |
            Kontexteffekte in Befragungen sind gut dokumentiert.
            Die Reihenfolge und der Kontext beeinflussen Antworten.
            Für eine NULLMESSUNG, die als Vergleichsbasis dient, ist
            ein neutraler Kontext methodisch sauberer.
        - paper: "Tourangeau et al. (2000) — Psychology of Survey Response"
          argument: |
            Survey-Methodologie-Standardwerk: Priming in Befragungen
            verändert die kognitive Verfügbarkeit von Informationen
            und damit die Antworten. Für Längsschnitt-Messungen
            muss der Stimulus konstant gehalten werden.

    empfehlung: |
      KOMPROMISS-LÖSUNG: Stories KÜRZEN und NEUTRALISIEREN, nicht entfernen.

      BEGRÜNDUNG: Wir brauchen einen Kontext-Stimulus, um BCM-Parameter
      valide zu messen (abstrakte Fragen messen abstrakte Einstellungen,
      nicht Verhalten). Aber der Stimulus muss NEUTRAL sein, damit die
      Nullmessung nicht verzerrt wird.

      KONKRET — 3 Story-Typen, 3 Lösungen:

      STORY-TYP 1: "Gespräch mit Kollegen" (vor Awareness-Block)
      ├── Problem: Aktiviert soziale Norm ("andere denken darüber nach")
      ├── Lösung: ERSETZEN durch neutrale Kontextualisierung
      │   VORHER: "Sie haben kürzlich mit einem Kollegen über Ihr Haus
      │            gesprochen. Er hat erzählt, dass die Heizkosten..."
      │   NACHHER: "Im folgenden Abschnitt geht es um Ihre Wahrnehmung
      │            zum Thema [Modul]. Bitte beantworten Sie die Fragen
      │            aus Ihrer persönlichen Erfahrung."
      └── BCM-Impact: KEINER — Awareness-Items (A1-A5) brauchen keinen
          narrativen Kontext, sie messen Exposition und Salienz direkt.

      STORY-TYP 2: "Gang durchs Haus / Keller / Dach" (vor Impact-Block)
      ├── Problem: Erzeugt "falsche" physische Erfahrung
      ├── Lösung: KÜRZEN auf Situationsbeschreibung ohne Wertung
      │   VORHER: "Ein paar Tage später gehen Sie in den Keller und
      │            sehen Ihre alte Heizung brummen..."
      │   NACHHER: "Denken Sie nun an den aktuellen Zustand Ihres
      │            Gebäudes und die bestehende [Heizung/Gebäudehülle/etc.]."
      └── BCM-Impact: MINIMAL — Impact-Items (I1-I2) sind Faktenfragen
          (Ja/Nein: informiert? Fachleute kontaktiert?). Der Stimulus
          beeinflusst binäre Fakten-Antworten kaum.

      STORY-TYP 3: "Internet-Suche nach Informationen" (vor Trust-Block)
      ├── Problem: Unterstellt Informationssuche + EnergieSchweiz-Kontakt
      ├── Lösung: ERSETZEN durch direkte Überleitung
      │   VORHER: "Jetzt sitzen Sie am Schreibtisch und suchen im
      │            Internet nach weiteren Informationen..."
      │   NACHHER: "Im folgenden Abschnitt geht es um Ihre Einschätzung
      │            von Informationsquellen zum Thema [Modul]."
      └── BCM-Impact: KEINER — Trust-Items (T0-T7) messen Vertrauen in
          EnergieSchweiz unabhängig vom Anlass der Informationssuche.

      SEGMENTIERUNGS-STORY (Row 223): "Jetzt wissen Sie schon einiges mehr..."
      ├── Problem: Suggeriert Lerneffekt durch Fragebogen
      ├── Lösung: KOMPLETT ENTFERNEN
      │   NACHHER: "Zum Abschluss möchten wir Ihre allgemeine Einstellung
      │            zum Thema energetische Modernisierung erfahren."
      └── BCM-Impact: POSITIV — Die Segmentierung misst Baseline-Einstellungen.
          Ohne Priming sind die 4 Segmente "sauberer" identifizierbar.

    kommunikation_an_intervista: |
      "Wir teilen die methodische Kritik an den narrativen Einleitungen
      und haben diese grundlegend überarbeitet. Die Stories wurden durch
      neutrale Kontextualisierungen ersetzt, die den thematischen Rahmen
      setzen ohne spezifische Normen oder Situationen zu aktivieren.
      Die Segmentierungs-Story wurde vollständig entfernt."

  # ===========================================================================
  # S2: INTRO-BLOCK SUGGESTIVITÄT
  # ===========================================================================
  S2_intro_suggestivitaet:
    intervista_kritik: |
      "Der ganze Fragenblock [INTRO4-INTRO13] kann suggestiv wirken
      (verstärkend oder Reaktanz-auslösend); er vermittelt, was man
      alles tun sollte."

    bewertung: "VERTEIDIGEN"

    unsere_analyse: |
      intervista hat UNRECHT. Der Intro-Block ist keine suggestive
      Beeinflussung, sondern ein BCJ-PHASEN-SCREENING (Behavioral
      Customer Journey). Ohne diese Fragen können wir nicht bestimmen,
      in welcher Phase (φ) sich eine Person befindet:

      INTRO4 = "Bereits modernisiert?" → φ = acting/maintaining
      INTRO5 = "E-Auto vorhanden?" → φ = acting (Modul Elektromobilität)
      INTRO6 = "Gebäudehülle erneuert?" → φ = acting (Modul Gebäudehülle)
      INTRO7 = "Heizung erneuerbar?" → φ = acting (Modul Heizung)
      INTRO8 = "PV-Anlage vorhanden?" → φ = acting (Modul Solar)
      INTRO9-13 = "In 2 Jahren geplant?" → φ = intending

      Die BCJ-Phase ist der ZENTRALE Router für das Verhaltensmodell:
      - φ = unaware → I_AWARE Intervention
      - φ = considering → I_WHAT + I_HOW Intervention
      - φ = intending → I_WHEN Intervention (Trigger)
      - φ = acting → I_STAGE Intervention (Maintenance)

      OHNE den Intro-Block ist keine segment-spezifische Interventions-
      planung möglich. Das ist der Kern unserer Methodik.

    literatur_fundierung:
      - paper: "Prochaska & DiClemente (1983) — Transtheoretical Model"
        argument: |
          Stage-Modelle erfordern Stage-Assessment zu Beginn.
          Die Fragen INTRO4-13 sind die direkte Operationalisierung
          der Stages of Change für energetische Modernisierung.
      - paper: "Sheeran (2002) — Intention-Behavior Gap"
        argument: |
          Die Kombination von "bereits getan" (INTRO4-8) und "geplant"
          (INTRO9-13) ist methodisch notwendig, um die Intention-
          Behavior Gap pro Modul zu quantifizieren.

    empfehlung: |
      KEINE ÄNDERUNG am Inhalt. Der Intro-Block bleibt vollständig.
      Die Fragen sind 1:1 aus dem abgenommenen "erneuerbar heizen"
      Fragebogen übernommen und vom BFE bereits genehmigt.

      OPTIONAL: Die Reihenfolge so anpassen, dass Quota-Fragen
      (Alter, Geschlecht, Sprachregion) VOR INTRO3 kommen (s. S6).

    kommunikation_an_intervista: |
      "Der INTRO-Block dient der Phasen-Zuordnung im Verhaltensmodell
      (BCJ-Phase), nicht der Beeinflussung. Jede Frage erfasst den
      IST-Zustand (bereits getan vs. geplant vs. nicht geplant) und
      ist direkt aus dem bereits vom BFE abgenommenen Fragebogen
      'erneuerbar heizen' übernommen. Die Zuordnung zu Verhaltens-
      phasen basiert auf dem Transtheoretical Model (Prochaska &
      DiClemente, 1983) und der Intention-Behavior Gap Forschung
      (Sheeran, 2002)."

  # ===========================================================================
  # S3: INVERSE ITEMS (W5, T7)
  # ===========================================================================
  S3_inverse_items:
    intervista_kritik: |
      "Inverse Items führen in der Regel zu einem relativ hohen Anteil
      an Falschantworten, da sie Befragte gerade bei einer so langen
      Befragung überfordern."
      Betrifft: W5 ("Prozess erscheint kompliziert") und T7 ("unsicher
      ob Informationen stimmen").

    bewertung: "KOMPROMISS"

    unsere_analyse: |
      intervista hat TEILWEISE RECHT.

      RECHT bei T7: "Ich bin unsicher, ob die Informationen stimmen"
      ist ein inverses Item im Trust-Block (alle anderen Items sind
      positiv formuliert). In einer langen Befragung führt dies
      nachweislich zu Acquiescence Bias (Krosnick 1999).

      ABER bei W5: "Der Prozess erscheint mir kompliziert" ist KEIN
      klassisches inverses Item. Es misst Perceived Complexity (τ) —
      einen eigenständigen BCM-Parameter. Die "Invertierung" ist hier
      INHALTLICH, nicht methodisch: Komplexität IST eine negative
      Eigenschaft. Das Item fragt DIREKT, was es messen will.

      Im BCM: τ = (Likert - 1) / 4 (DIREKT, nicht invertiert!).
      Die Invertierung existiert nur im KPI-Score-System, wo
      "hohe Komplexität = niedriger Willingness-Score" gilt.

    literatur_fundierung:
      - paper: "Krosnick (1999) — Survey Satisficing"
        argument: |
          Acquiescence Bias: Befragte tendieren dazu, zuzustimmen
          (egal ob Item positiv oder negativ formuliert). Bei langen
          Befragungen steigt der Effekt. T7 ist anfällig dafür.
      - paper: "Enke et al. (2024) — Complexity and Time"
        argument: |
          Perceived Complexity (τ) ist ein eigenständiger Verhaltens-
          parameter, der DIREKT gemessen werden sollte. W5 misst τ
          korrekt und braucht keine Umformulierung.

    empfehlung: |
      T7: AKZEPTIEREN → Positiv umformulieren.
        VORHER: "Ich bin unsicher, ob die Informationen von
                 EnergieSchweiz stimmen."
        NACHHER: "Ich kann mich auf die Informationen von
                  EnergieSchweiz verlassen."
        BCM-Impact: Ψ_trust_uncertainty wird dann invertiert
        berechnet: Ψ_trust_uncertainty = 1 - (Likert-1)/4.

      W5: VERTEIDIGEN → Keine Änderung.
        Das Item misst τ (Perceived Complexity) direkt.
        Es ist nicht "invers", sondern fragt nach einem
        inherent negativen Konstrukt. Das ist methodisch korrekt.

    kommunikation_an_intervista: |
      "Bei T7 teilen wir Ihre Einschätzung und formulieren das Item
      positiv um ('Ich kann mich verlassen' statt 'Ich bin unsicher').
      Bei W5 handelt es sich allerdings nicht um ein inverses Item im
      klassischen Sinne, sondern um die direkte Messung der wahrgenommenen
      Komplexität — ein zentraler Verhaltensparameter (Enke et al., 2024).
      'Der Prozess erscheint komplex' ist keine Negation, sondern eine
      direkte Eigenschaftszuschreibung."

  # ===========================================================================
  # S4: MATRIX-DARSTELLUNG (A2-A5, W1-W6, T1-T7)
  # ===========================================================================
  S4_matrix_darstellung:
    intervista_kritik: |
      "A2 bis A5 sollte als Matrix mit einer Einleitung dargestellt werden
      ('Inwiefern treffen die folgenden Aussagen auf Sie zu?')"
      "W1 bis W6 als Matrix mit Einleitungsfrage darstellen."
      "T1 bis T7 sollte als Matrix mit einer Einleitungsfrage dargestellt
      werden."

    bewertung: "AKZEPTIEREN"

    unsere_analyse: |
      intervista hat RECHT. Matrix-Darstellung ist Standard in der
      Befragungsmethodik und reduziert Survey Fatigue. Für den BCM
      ändert sich dadurch NICHTS — die Items bleiben identisch,
      nur die Darstellungsform ändert sich.

      EINZIGE Einschränkung: A1 sollte NICHT in die A-Matrix,
      weil A1 eine Ja/Nein-Frage ist (Exposition), während
      A2-A5 Likert-Skalen haben.

    empfehlung: |
      VOLLSTÄNDIG UMSETZEN:
      - A2-A5 als Matrix mit Einleitung "Inwiefern treffen die
        folgenden Aussagen auf Sie zu?" (A1 bleibt separat)
      - W1-W6 als Matrix mit Einleitung
      - T1-T7 als Matrix mit Einleitung
      BCM-Impact: KEINER. Reine Darstellungsänderung.

  # ===========================================================================
  # S5: RANDOMISIERUNG
  # ===========================================================================
  S5_randomisierung:
    intervista_kritik: |
      BFE fordert bereits: "Randomisierung der Fragen (A1-A5)",
      "Randomisierung der Fragen (W1-W6)", "Randomisierung (T1-T7)"
      intervista fordert zusätzlich: Items in Z3, Z4 randomisieren.

    bewertung: "AKZEPTIEREN"

    unsere_analyse: |
      Randomisierung ist methodischer Standard und verhindert
      Order Effects (Schwarz & Strack 1991). Für den BCM ist
      die Reihenfolge der Items INNERHALB eines Blocks irrelevant,
      da jedes Item einem eigenständigen Parameter zugeordnet ist.

    empfehlung: |
      VOLLSTÄNDIG UMSETZEN:
      - A1-A5 randomisieren (innerhalb Awareness-Block)
      - W1-W6 randomisieren (innerhalb Willingness-Block)
      - T1-T7 randomisieren (innerhalb Trust-Block)
      - Z3, Z4 Items randomisieren
      - Segmentierungs-Items A1-D1 randomisieren
      BCM-Impact: KEINER. Verbessert sogar die Datenqualität.

  # ===========================================================================
  # S6: QUOTA-FRAGEN AN DEN ANFANG
  # ===========================================================================
  S6_quota_fragen:
    intervista_kritik: |
      "Vor dieser Frage [INTRO3] müssen zwingend alle Fragen zur
      Quotensteuerung eingefügt werden (Gewährleistung der
      Repräsentativität). Empfehlung: Alter x Geschlecht x Sprachregion"
      "Wenn [Alter/Geschlecht/PLZ] zur Quotensteuerung genutzt werden
      soll, muss sie zwingend zu Beginn der Befragung gestellt werden."

    bewertung: "AKZEPTIEREN"

    unsere_analyse: |
      intervista hat RECHT. Quota-Steuerung erfordert, dass die
      Steuerungsvariablen VOR dem Screening erhoben werden.
      Andernfalls können Screenouts die Quotenfüllung verzerren.

      Für den BCM ist die Position der Demografie-Fragen irrelevant —
      sie sind Moderatorvariablen (Ψ_K via Sprachregion, WHO_Level
      via Alter), deren Wert unabhängig von der Position im
      Fragebogen ist.

    empfehlung: |
      UMSETZEN: Alter, Geschlecht und PLZ/Sprachregion VOR INTRO1
      positionieren. Die bestehenden Demografie-Fragen am Ende
      können bleiben (für zusätzliche Variablen wie Einkommen,
      Bildung, Haushaltsgrösse), aber die Quota-Variablen
      werden dupliziert an den Anfang gestellt.

  # ===========================================================================
  # S7: SEGMENTIERUNGS-BASIS / FORSCHUNGSGRUNDLAGEN
  # ===========================================================================
  S7_segmentierungs_basis:
    intervista_kritik: |
      "Auf welchen Forschungsgrundlagen basieren diese Aussagen?
      Handelt es sich um ein ausserhalb von FehrAdvice bereits
      etabliertes, in der akademischen Forschung untersuchtes Modell?
      Quellenangaben?"

    bewertung: "VERTEIDIGEN"

    unsere_analyse: |
      Die 4-Gruppen-Segmentierung (Überzeugte, Ratlose, Skeptiker,
      Verhinderer) basiert auf der Kombination von 4 Dimensionen, die
      jeweils in der verhaltensökonomischen Literatur fundiert sind:

      DIMENSION A (Orientierung) = Self-Efficacy × Subjektives Wissen
      → Bandura (1977), Falk et al. (2025)

      DIMENSION B (Rationalität) = Kosten-Fokus × Förder-Abhängigkeit
      → Kahneman & Tversky (1979), Benartzi & Thaler (1995)

      DIMENSION C (Werte) = Erneuerbare sinnvoll × Klimaschutz
      → Akerlof & Kranton (2000), Enke (2020)

      DIMENSION D (Misstrauen) = Evidenz-Anforderung
      → Fehr (2009), Aghion et al. (2010)

      Die 2×2×2-Kreuzklassifikation aus diesen Dimensionen ergibt
      die 4 Gruppen als Cluster-Zentroide. Das ist KEIN proprietäres
      FehrAdvice-Modell, sondern eine Standard-Anwendung der
      Psychographic Segmentation (Wedel & Kamakura, 2000).

    literatur_fundierung:
      - "Bandura (1977) — Self-Efficacy"
      - "Ajzen (1991) — Theory of Planned Behavior"
      - "Akerlof & Kranton (2000) — Identity Economics"
      - "Kahneman & Tversky (1979) — Prospect Theory"
      - "Fehr (2009) — Trust"
      - "Wedel & Kamakura (2000) — Market Segmentation"

    empfehlung: |
      VERTEIDIGEN mit vollständiger Quellenangabe. Wir liefern
      intervista ein 1-Seiten-Dokument mit:
      (1) Die 4 Dimensionen und ihre Paper-Quellen
      (2) Die Cluster-Logik (hohe vs. niedrige Ausprägung)
      (3) Verweis auf Psychographic Segmentation Literatur
      Action Item: Quellenangaben als Annex zum Fragebogen liefern.

    kommunikation_an_intervista: |
      "Die Segmentierung basiert auf vier wissenschaftlich fundierten
      Dimensionen: Self-Efficacy (Bandura, 1977), Kosten-Rationalität
      (Kahneman & Tversky, 1979), Werte-Kongruenz (Akerlof & Kranton,
      2000) und institutionelles Vertrauen (Fehr, 2009). Die Kreuz-
      klassifikation folgt dem Standard der Psychographic Segmentation
      (Wedel & Kamakura, 2000). Wir liefern eine vollständige Quellen-
      dokumentation als Annex."

# =============================================================================
# TEIL 2: ITEM-SPEZIFISCHE KOMMENTARE
# =============================================================================

item_spezifische_kommentare:

  # ---------------------------------------------------------------------------
  # INTRO-BLOCK
  # ---------------------------------------------------------------------------
  INTRO0_sprache:
    intervista: "Sprache ist bekannt, direkt auf richtigen Fragebogen leiten."
    bewertung: "AKZEPTIEREN"
    empfehlung: "Technische Umsetzung durch intervista. Kein inhaltliches Thema."

  willkommen_text:
    intervista: |
      "Bitte möglichst neutrale Einleitung, Standardeinleitung.
      Selbstselektion vermeiden."
    bewertung: "KOMPROMISS"
    empfehlung: |
      Einleitung neutraler formulieren, aber Thema nennen (Befragte
      müssen wissen, worum es geht, für Informed Consent).
      VORHER: "Willkommen zur Umfrage rund um energetische Modernisierung"
      NACHHER: "Willkommen zur Umfrage zum Thema Wohnen und Gebäude.
      Wir möchten Ihre persönliche Einschätzung zu verschiedenen Aspekten
      rund um Ihr Zuhause erfahren."
      BCM-Impact: Minimal. Reduziert aber Selbstselektions-Bias.

  INTRO2_baujahr:
    intervista: |
      "Plausicheck tiefer ansetzen. Genaues Jahr nicht nötig →
      Antwortmöglichkeiten in Kategorien prüfen."
    bewertung: "KOMPROMISS"
    empfehlung: |
      Kategorien statt exaktes Jahr anbieten:
      "Vor 1960 / 1960-1979 / 1980-1999 / 2000-2015 / 2016-2021 / Nach 2021"
      BCM-Impact: KEINER — für den BCM brauchen wir nur den Gebäudezustand-
      Proxy (Ψ_physical), der aus Kategorien genauso gut ableitbar ist.

  INTRO5_eauto_ladestation:
    intervista: |
      "In zwei Fragen umformulieren: 'Besitzen Sie aktuell ein
      Elektroauto?' Dann Filter für 'Laden Sie Ihr Elektroauto
      zu Hause?'"
    bewertung: "AKZEPTIEREN"
    empfehlung: |
      Aufteilung in zwei Fragen ist methodisch sauberer.
      BCM-Impact: POSITIV — erlaubt genauere Phasen-Zuordnung
      (E-Auto ohne Heimladestation ≠ E-Auto mit Heimladestation).

  INTRO6_gebaeudehulle:
    intervista: |
      "Teilweise Wiederholung zu INTRO04. Auch nicht-energetische
      Sanierungen werden miterfasst."
    bewertung: "VERTEIDIGEN"
    empfehlung: |
      INTRO4 fragt nach UMFASSENDER energetischer Modernisierung.
      INTRO6 fragt nach GEBÄUDEHÜLLE spezifisch. Das ist keine
      Wiederholung, sondern eine Modul-spezifische Verfeinerung.
      Für den BCM brauchen wir die Phasen-Zuordnung PRO MODUL.
      Formulierung ggf. schärfen: "energetisch erneuert" statt
      nur "erneuert".

  INTRO7_heizung_erneuerbar:
    intervista: |
      "Was erneuerbare Energien sind, muss definiert werden."
    bewertung: "AKZEPTIEREN"
    empfehlung: |
      Kurze Klärung hinzufügen: "z.B. Wärmepumpe, Holzheizung,
      Fernwärme, Solarthermie" — analog zum bestehenden "erneuerbar
      heizen" Fragebogen, wo dies bereits definiert ist.

  INTRO9_to_13_planung:
    intervista: |
      "Auf gleicher Seite wie INTRO04 anzeigen. Zusätzliche Option
      der schrittweisen/teilweisen Erneuerung zwingend nötig.
      Entsprechen 2 Jahre dem Planungszeitraum?"
    bewertung: "KOMPROMISS"
    empfehlung: |
      (1) Gleiche Seite: AKZEPTIEREN — reduziert Klickaufwand.
      (2) Schrittweise Erneuerung: AKZEPTIEREN — eine zusätzliche
          Option "Teilweise / schrittweise geplant" hinzufügen.
          BCM-Impact: POSITIV — erlaubt feinere Phasen-Zuordnung
          (φ = considering_partial vs. φ = intending_full).
      (3) 2-Jahres-Horizont: VERTEIDIGEN — ist aus "erneuerbar heizen"
          übernommen und vom BFE abgenommen. Der Horizont muss
          über die Messwellen KONSTANT bleiben.

  # ---------------------------------------------------------------------------
  # AWARENESS-BLOCK
  # ---------------------------------------------------------------------------
  A1_werbung:
    intervista: |
      "Skalierte Frage für bessere Differenzierung (regelmässig
      gesehen). Könnte in Matrix A2-A5 aufgenommen werden."
    bewertung: "VERTEIDIGEN"
    empfehlung: |
      A1 als Ja/Nein-Frage BEIBEHALTEN. Im BCM ist A_exposure
      ein binärer Gate-Parameter: Hat die Person Kampagnen-Kontakt
      gehabt oder nicht? Die Häufigkeit ist sekundär (DellaVigna &
      Linos 2022: Recall ≠ Frequency). A1 bleibt separat von der
      Matrix, da anderes Antwortformat (Ja/Nein vs. Likert).

  A5_gesellschaft_umwelt:
    intervista: |
      "Trennung der Aspekte Gesellschaft und Umwelt zwingend nötig."
      "Inhaltlich inkonsequent: Einleitung thematisiert Kosten,
      hier nun Gesellschaft und Umwelt."
    bewertung: "KOMPROMISS"
    empfehlung: |
      intervista hat einen VALIDEN Punkt: Gesellschaft und Umwelt
      SIND unterschiedliche Konstrukte (u_S vs. u_E im FEPSDE-Modell).

      ABER: Das Item hat ANDERE Fehlklassifizierung als wichtigeres
      Problem (s. fragebogen_parameter_analyse.yaml: A5 misst u_E,
      nicht Awareness). Die Auftrennung wäre ein Level-C-Change
      (neues Item), was wir vermeiden wollen.

      LÖSUNG: Im ANALYSE-LAYER A5 als u_E (Environmental) kodieren.
      Die u_S-Komponente wird bereits durch W2 und T5 abgedeckt.
      Falls BFE eine Auftrennung erlaubt: Zwei separate Items:
      (a) "Mein Verhalten ist von Bedeutung für die Umwelt."
      (b) "Mein Verhalten ist von Bedeutung für die Gesellschaft."

  # ---------------------------------------------------------------------------
  # WILLINGNESS-BLOCK
  # ---------------------------------------------------------------------------
  W1_vorteile:
    intervista: |
      "Die Art der persönlichen Vorteile muss definiert werden.
      Emotionale und wirtschaftliche Vorteile sind unterschiedliche
      Dimensionen."
    bewertung: "VERTEIDIGEN"
    empfehlung: |
      Die ABSICHTLICHE Unschärfe ist methodisch gewollt: W1 misst
      die GESAMTE Decision Utility (Kahneman 2000), nicht eine
      spezifische Dimension. Die Differenzierung in u_F, u_P, u_E etc.
      erfolgt über Z2 (MaxDiff). W1 ist der aggregierte "Nutzen-Indikator",
      Z2 liefert die FEPSDE-Zerlegung. Beide zusammen ergeben das
      vollständige Bild.

  W2_gemeinwohl:
    intervista: |
      "Vermischung von kollektiven und ökologischen Motiven.
      Muss zur Ermöglichung eines Erkenntnisgewinns getrennt werden."
    bewertung: "KOMPROMISS"
    empfehlung: |
      Wie bei A5: Gesellschaft und Umwelt sind im FEPSDE-Modell
      unterschiedliche Dimensionen (u_S vs. u_E).

      PRAGMATISCHE LÖSUNG: Item W2 beibehalten, aber im Analyse-Layer
      als KOMBINATIONS-Item u_S+u_E kodieren. Die Trennung erfolgt
      über das MaxDiff (Z2), das separate Attribute für ökologischen
      und sozialen Nutzen enthält.

      Falls BFE erlaubt: Formulierung leicht anpassen:
      VORHER: "...etwas Positives für das Gemeinwohl, z.B. für die Umwelt"
      NACHHER: "...etwas Positives für die Umwelt und das Klima"
      → Fokussiert auf u_E, während u_S durch T5 (σ_i) abgedeckt ist.

  W3_werte:
    intervista: |
      "Es wird nicht erhoben, was die Werte der Befragten sind →
      je nach politischer Ausrichtung kann dies bedeuten, bewusst
      auf Modernisierungen zu verzichten."
    bewertung: "VERTEIDIGEN"
    empfehlung: |
      Korrekte Beobachtung, aber KEIN Problem für den BCM:
      Im Identity Economics Modell (Akerlof & Kranton 2000) misst
      W3 die KONGRUENZ zwischen Handlung und Identität — UNABHÄNGIG
      davon, was die spezifischen Werte sind. Hohe Kongruenz (egal
      ob pro- oder anti-Modernisierung) bedeutet stabiles Verhalten.
      Die politische Ausrichtung ist ein MODERATOR (Ψ_K), keine
      separate Messung. Sie könnte optional über eine Zusatzfrage
      erhoben werden, ist aber für das BCM nicht zwingend.

  W4_zutrauen:
    intervista: |
      "Unklar, was mit 'Umsetzen' gemeint ist: Organisieren oder
      selber umsetzen? Ergebnisse nicht interpretierbar."
    bewertung: "KOMPROMISS"
    empfehlung: |
      VALIDER Punkt. "Umsetzen" ist ambig. Für den BCM messen wir
      θ (Aktivierungsschwelle) / PBC (Perceived Behavioral Control),
      was primär "Organisieren" meint (nicht physisch selber machen).

      ANPASSUNG:
      VORHER: "Ich traue mir zu, eine [Massnahme] erfolgreich umzusetzen."
      NACHHER: "Ich traue mir zu, eine [Massnahme] erfolgreich zu
      organisieren und in die Wege zu leiten."
      BCM-Impact: POSITIV — präzisere Messung von θ_inv.

  # ---------------------------------------------------------------------------
  # TRUST-BLOCK
  # ---------------------------------------------------------------------------
  T0_bekanntheit:
    intervista: |
      "Abstufung für Personen, die von EnergieSchweiz gehört haben,
      aber keine vertiefte Kenntnis haben, zwingend nötig."
    bewertung: "KOMPROMISS"
    empfehlung: |
      SINNVOLLER Vorschlag. Statt binärem Ja/Nein eine 3er-Abstufung:
      (1) "Noch nie davon gehört"
      (2) "Schon mal gehört, aber weiss nicht genau, was es ist"
      (3) "Kenne EnergieSchweiz und weiss, was sie anbieten"
      BCM-Impact: POSITIV — erlaubt feinere Ψ_trust_gate Kodierung
      (0 / 0.5 / 1 statt nur 0 / 1).

  T2_T3_T4_information_beratung:
    intervista: |
      "Bitte Informations- und Beratungsangebote von ECH einzeln erheben."
      (Wiederholt bei T2, T3, T4)
    bewertung: "VERTEIDIGEN"
    empfehlung: |
      Die Zusammenfassung ist im BCM GEWOLLT: T2-T4 messen verschiedene
      Dimensionen des institutionellen Vertrauens (Credibility, Transparency,
      Autonomy), nicht verschiedene KANÄLE. Die Information-Beratung-
      Differenzierung ist für das BCM sekundär — sie wäre eine
      Kanal-Frage (Ψ_channel), die bereits durch Z3 abgedeckt ist.

      Bei Auftrennung würde der Trust-Block von 8 auf 11 Items
      anwachsen, was die Befragungslänge unangemessen erhöht.

  T5_sozialnorm:
    intervista: |
      "Alle anderen Items behandeln EnergieSchweiz, dieses behandelt
      [Modul]. Bitte immer dasselbe Item erheben."
    bewertung: "VERTEIDIGEN"
    empfehlung: |
      intervista hat die FUNKTION des Items nicht erkannt. T5 misst
      NICHT Trust in EnergieSchweiz, sondern die INJUNKTIVE SOZIALNORM
      (σ_i nach Cialdini 2003). Das Item ist ABSICHTLICH anders als
      T1-T4, weil es einen ANDEREN Parameter misst.

      Unsere Lösung (aus fragebogen_parameter_analyse.yaml):
      - T5 bleibt im Trust-Block (keine Fragebogen-Änderung)
      - Im Analyse-Layer wird T5 als σ_i kodiert, NICHT als Trust
      - T5 fliesst NICHT in den T-Score, sondern in W_base via u_S

      ALTERNATIV (falls intervista insistiert): T5 in den W-Block
      verschieben als W7. Das wäre inhaltlich konsistenter, aber
      eine grössere Fragebogen-Änderung.

    kommunikation_an_intervista: |
      "T5 erfasst bewusst ein anderes Konstrukt als T1-T4: die
      injunktive Sozialnorm (Cialdini, 2003) — was das Umfeld für
      sinnvoll hält. Dies ist ein zentraler Parameter des Verhaltens-
      modells (σ_i), der zusammen mit W6 (deskriptive Norm: was andere
      TUN) das vollständige Normen-Profil abbildet. In der Auswertung
      wird T5 daher separat von den Trust-Items analysiert."

  # ---------------------------------------------------------------------------
  # ZUSATZFRAGEN
  # ---------------------------------------------------------------------------
  Z1_investitions_ranking:
    intervista: |
      "Wenn man diese Frage in die Intro aufnehmen würde, hätte man
      ein weniger einseitiges Priming. Bedenken: gewisse Items nicht
      relevant (Keller, Garten). Skaliert erheben oder zweistufig."
    bewertung: "KOMPROMISS"
    empfehlung: |
      (1) Position: VERTEIDIGEN — Z1 gehört in den Z-Block, nicht ins
          Intro. Im Intro würde sie das BCJ-Phasen-Screening stören.
      (2) Nicht-relevante Items: AKZEPTIEREN — Filter hinzufügen:
          "Nicht zutreffend" als Option bei allen Items (z.B. Garten,
          Keller). Oder Vorfilter: "Welche dieser Bereiche hat Ihr
          Haus?" → nur relevante Items im Ranking.
      (3) Skaliert: VERTEIDIGEN — Ranking (Drag & Drop) ist methodisch
          BESSER als Likert-Skalen für relative Präferenzen (Marley &
          Louviere 2005). Das Ranking liefert den λ_proxy (relative
          Position Energiemassnahmen vs. sichtbare Investitionen).

  Z2_maxdiff:
    intervista: |
      "Allgemeines Item (Energieeffizienz) nicht für MaxDiff geeignet.
      MaxDiff muss eingeleitet werden."
    bewertung: "KOMPROMISS"
    empfehlung: |
      (1) Einleitung: AKZEPTIEREN — MaxDiff braucht eine Erklärung,
          da das Format ungewohnt ist. Standardtext hinzufügen.
      (2) Allgemeines Item: PRÜFEN — ob "gesamte Energieeffizienz"
          redundant ist oder ob es als Validierungs-Anker dient.
          Für den BCM brauchen wir Items, die die 6 FEPSDE-
          Dimensionen abdecken: u_F, u_E, u_P, u_S, u_D, u_X.

  Z3_informationsquellen:
    intervista: |
      "Nicht alle informieren sich. Frage im Konjunktiv stellen.
      Items randomisieren, zu Medien gruppieren."
    bewertung: "KOMPROMISS"
    empfehlung: |
      (1) Konjunktiv: AKZEPTIEREN — "Wo WÜRDEN Sie sich informieren"
          statt "Wo informieren Sie sich". BCM-Impact: Minimal.
      (2) Randomisierung: AKZEPTIEREN — s. S5.
      (3) Medien gruppieren: AKZEPTIEREN — sinnvolle UX-Verbesserung.

  Z4_hindernisse:
    intervista: |
      "Item ergänzen: 'Es wurde kürzlich bereits modernisiert.'
      Items randomisieren."
    bewertung: "AKZEPTIEREN"
    empfehlung: |
      Beide Punkte umsetzen. "Bereits modernisiert" ist ein
      LOGISCHER Filter und liefert zusätzlich eine Validierung
      der BCJ-Phase (φ = maintaining).

  # ---------------------------------------------------------------------------
  # MODUL-SPEZIFISCH
  # ---------------------------------------------------------------------------
  M4_elektromobilitaet_begriffe:
    intervista: |
      "Elektromobilität und Ladeinfrastruktur müssen getrennt werden."
      "Alle Items messen Elektromobilität und nicht Ladeinfrastruktur."
    bewertung: "AKZEPTIEREN"
    empfehlung: |
      VALIDER Punkt. E-Auto-Besitz und Ladeinfrastruktur sind
      unterschiedliche Entscheidungen mit unterschiedlichen BCM-
      Parametern. Die Items sollten entweder klar auf Ladeinfrastruktur
      fokussiert sein (da dies der Gebäude-relevante Aspekt ist) oder
      beide Aspekte separat abfragen.

  # ---------------------------------------------------------------------------
  # DEMOGRAFIE / OUTRO
  # ---------------------------------------------------------------------------
  demografie_haushalt:
    intervista: |
      "Option mehr als 10 Personen anbieten" (Haushaltsgrösse)
      "Option mehr als 5 Personen anbieten" (Kinder)
      "Definieren ob nur Kinder oder auch Geschwister"
    bewertung: "AKZEPTIEREN"
    empfehlung: |
      Technische Anpassungen umsetzen. BCM-Impact: KEINER.

  outro_abschluss:
    intervista: |
      "Formulierung führt zu Abbrüchen, bevor die Befragung beendet
      wird. Auf Formulierungen die einen Abschluss suggerieren
      verzichten, bevor die Befragung tatsächlich beendet ist."
      "'Geschätzte Teilnehmer' — Panelbefragung, Abschluss muss
      nach Institutsstandards erfolgen (Incentivierung, Rückleitung)."
      "Zwingend ohne DAC programmieren." (bei offener Frage)
    bewertung: "AKZEPTIEREN"
    empfehlung: |
      Alle drei Punkte umsetzen. Standard-Panel-Abschluss verwenden.
      BCM-Impact: KEINER.

  outro_story_ende:
    intervista: |
      (Row 237) "Bitte die Befragung ausschliesslich zu den
      beauftragten Forschungszwecken nutzen, nicht zur Einflussnahme.
      Die hier vorgeschlagene inhaltliche Beeinflussung ist methodisch
      falsch. Solche Einflussnahmen widersprechen den Grundprinzipien
      von Markt-, Meinungs- und Sozialforschung."
    bewertung: "AKZEPTIEREN"
    empfehlung: |
      Die Abschluss-Story ("Wenn Sie an die nächsten Jahre denken,
      wünschen Sie sich ein Zuhause, das gut funktioniert...") ist
      klar eine Interventions-Botschaft und hat in einer Nullmessung
      NICHTS verloren. KOMPLETT ENTFERNEN.

      BCM-Impact: POSITIV — die letzte Impression vor der
      Segmentierung sollte NEUTRAL sein.

# =============================================================================
# TEIL 3: BFE-KOMMENTARE (Abinaya)
# =============================================================================
# BFE-Kommentare sind primär technisch (Filter, Screenouts)
# =============================================================================

bfe_kommentare:
  screenout_regeln:
    - item: "INTRO1"
      bfe: "Screenout [1]"
      bewertung: "AKZEPTIEREN — Standard-Screenout für Eigentumsstatus"

    - item: "INTRO2"
      bfe: "Screenout weniger als 5 Jahre alt oder Weiss nicht"
      bewertung: "AKZEPTIEREN — Neubauten brauchen keine Modernisierung"

  filter_regeln:
    - item: "INTRO4 → INTRO9"
      bfe: "Filter: INTRO4=Nein"
      bewertung: "AKZEPTIEREN — logischer Filter (wer modernisiert hat, plant nicht)"

    - item: "T0 → Trust-Block"
      bfe: "Überspringe Trust Block bei Nein"
      bewertung: "AKZEPTIEREN — wer ECH nicht kennt, kann kein Trust-Urteil abgeben"

    - item: "Z5 → Z6"
      bfe: "Filter: Z5=Ja (Kampagne bekannt)"
      bewertung: "AKZEPTIEREN"

    - item: "Z7 → Z8"
      bfe: "Filter: Z7=Nein (keine Impulsberatung genutzt)"
      bewertung: |
        ANPASSEN — intervista hat recht, dass Filter wenig sinnvoll:
        Auch wer bereits Impulsberatung hatte, könnte bei nächstem
        Heizungsersatz wieder eine nutzen. Filter ENTFERNEN.

  randomisierung:
    bfe: "Randomisierung bei A1-A5, W1-W6, I1-I5, T1-T7"
    bewertung: "AKZEPTIEREN — s. S5"

  segmentierung:
    bfe: |
      "4 Gruppen bilden (Überzeugte, Ratlose, Skeptische, Verhinderer).
      Segmentierung aufgrund der Antworten. tief: 1-2, moderat: 3, hoch: 4-5"
    bewertung: "AKZEPTIEREN — Kodierung liefern (s. S7)"

  codierung:
    - item: "Bildung"
      bfe: "Codierung: 1-6 niedrig bis mittel / 7-9 hoch"
      bewertung: "AKZEPTIEREN"

    - item: "PLZ"
      bfe: "Recodierung PLZ → Siedlungstyp: Stadt/Agglo, Land"
      bewertung: "AKZEPTIEREN — wichtig für Ψ_F (Physical Context)"

# =============================================================================
# TEIL 4: ZUSAMMENFASSUNG UND PRIORISIERUNG
# =============================================================================

zusammenfassung:

  uebersicht: |
    Von 82 analysierten Kommentaren:
    - 19 AKZEPTIEREN (intervista hat recht, Anpassung nötig)
    - 14 VERTEIDIGEN (BCM/Literatur begründet unseren Ansatz)
    - 11 KOMPROMISS (Kern beibehalten, Teilanpassung)
    - 16 BFE-Filter (technisch, alle akzeptiert)
    - 22 Redaktionelle Kleinigkeiten (alle akzeptiert)

  prioritaet_1_sofort:
    titel: "Quick Fixes — keine inhaltliche Diskussion nötig"
    items:
      - "S4: Matrix-Darstellung für A2-A5, W1-W6, T1-T7"
      - "S5: Randomisierung aller Item-Blöcke"
      - "S6: Quota-Variablen an den Anfang"
      - "INTRO5: E-Auto und Ladestation trennen"
      - "INTRO7: 'Erneuerbare Energien' definieren"
      - "T7: Positiv umformulieren"
      - "W4: 'organisieren' statt 'umsetzen'"
      - "Demografie: Antwortoptionen erweitern"
      - "Outro: Standard-Panel-Abschluss"

  prioritaet_2_stories:
    titel: "Story-Überarbeitung — zentrale Diskussion mit BFE"
    items:
      - "S1: Alle 15 Stories neutralisieren (3 Typen, 3 Lösungen)"
      - "Story-Typ 1 (Gespräch): Durch neutrale Kontextualisierung ersetzen"
      - "Story-Typ 2 (Haus-Gang): Auf Situationsbeschreibung kürzen"
      - "Story-Typ 3 (Internet-Suche): Durch direkte Überleitung ersetzen"
      - "Segmentierungs-Story: Komplett entfernen"
      - "Outro-Story (Row 237): Komplett entfernen"

  prioritaet_3_verteidigen:
    titel: "Gegenüber intervista VERTEIDIGEN — mit Quellenangaben"
    items:
      - "S2: INTRO-Block ist BCJ-Screening, keine Beeinflussung"
      - "S7: Segmentierung hat wissenschaftliche Grundlagen — Quellen liefern"
      - "A1: Binäre Exposure-Messung (nicht skaliert)"
      - "W1: Absichtlich unspezifisch (Decision Utility, nicht spezifische Dimension)"
      - "W3: Werte-Kongruenz ist identitätsunabhängig"
      - "W5: Kein inverses Item, sondern direkte Komplexitätsmessung"
      - "T2-T4: Information und Beratung zusammen (verschiedene Trust-Dimensionen)"
      - "T5: Misst Sozialnorm (σ_i), nicht Trust — absichtlich anders"
      - "Z1: Ranking-Format besser als Skala für relative Präferenzen"

  action_items:
    - id: "AI-01"
      was: "Quellenangaben-Dokument für Segmentierung erstellen"
      wer: "FehrAdvice"
      prioritaet: "HOCH"
      frist: "Vor nächstem Call mit BFE/intervista"

    - id: "AI-02"
      was: "Neutralisierte Story-Texte entwerfen (3 Typen)"
      wer: "FehrAdvice"
      prioritaet: "HOCH"
      frist: "Vor nächstem Call mit BFE/intervista"

    - id: "AI-03"
      was: "BCM-Parameter-Mapping-Dokument für BFE aufbereiten"
      wer: "FehrAdvice"
      prioritaet: "MITTEL"
      frist: "1 Woche"
      beschreibung: |
        Ein 3-Seiten-Dokument, das erklärt WARUM bestimmte Items
        so formuliert sind (mit Paper-Referenzen) und WARUM die
        Auswertungsmethodik sich von reinem KPI-Scoring unterscheidet.

    - id: "AI-04"
      was: "T7 neu formulieren (positiv)"
      wer: "FehrAdvice → intervista"
      prioritaet: "MITTEL"

    - id: "AI-05"
      was: "W4 Formulierung anpassen ('organisieren')"
      wer: "FehrAdvice → intervista"
      prioritaet: "MITTEL"

    - id: "AI-06"
      was: "T0 auf 3-stufige Skala umstellen"
      wer: "FehrAdvice → intervista"
      prioritaet: "NIEDRIG"

    - id: "AI-07"
      was: "MaxDiff-Attribute auf FEPSDE-Vollständigkeit prüfen"
      wer: "FehrAdvice"
      prioritaet: "HOCH"

    - id: "AI-08"
      was: "Syntax für 4-Gruppen-Segmentierung liefern"
      wer: "FehrAdvice → intervista"
      prioritaet: "HOCH"
      frist: "Vor Programmierung"
