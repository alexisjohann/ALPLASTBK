# EBF-Analyse: Tracking-Fragebogen "Erneuerbar Heizen"
# Analysedatum: 2026-01-28
# Analysiert: fragebogen_tracking_v4.yaml (intervista v4.0)

metadata:
  analyse_datum: "2026-01-28"
  analysiert_durch: "EBF Framework / Claude"
  fragebogen_version: "4.0"
  fragebogen_datum: "2025-04-06"
  institut: "intervista"

# ============================================================================
# STÄRKEN
# ============================================================================

staerken:

  methodologie:
    - id: "S-01"
      bereich: "Präferenzmessung"
      beschreibung: "MaxDiff (F5.1) mit 14 Sets à 4 Items"
      bewertung: "Gold-Standard für Utility-Gewichte"
      ebf_nutzen: "Liefert direkt u_F, u_S, u_E, u_P Schätzungen"

    - id: "S-02"
      bereich: "Kampagnen-Awareness"
      beschreibung: "Unaided (F6.1) + Aided Recall (F6.2)"
      bewertung: "Best Practice"
      ebf_nutzen: "Unterscheidet echte Erinnerung von Wiedererkennung"

    - id: "S-03"
      bereich: "Wettbewerbsanalyse"
      beschreibung: "Competitor-Kampagnen inkludiert (Öl, Gas)"
      bewertung: "Gut"
      ebf_nutzen: "Share-of-Voice messbar"

  inhalt:
    - id: "S-04"
      bereich: "Barrieren-Erfassung"
      beschreibung: "Offene Frage F3.9 zu Gründen gegen Erneuerbare"
      bewertung: "Gut"
      ebf_nutzen: "Unerwartete Barrieren können emergieren"

    - id: "S-05"
      bereich: "Channel Attribution"
      beschreibung: "Detaillierte Kanal-Liste (F6.3) mit 16 Optionen"
      bewertung: "Umfassend"
      ebf_nutzen: "Media-Mix-Optimierung möglich"

    - id: "S-06"
      bereich: "Preiswahrnehmung"
      beschreibung: "Impulsberatung-Kostenkenntnis (F6.10)"
      bewertung: "Clever"
      ebf_nutzen: "Prüft ob 'Gratis'-Botschaft ankommt"

  design:
    - id: "S-07"
      bereich: "Screening"
      beschreibung: "Klare Zielgruppen-Definition (Eigentümer, >5J Gebäude)"
      bewertung: "Präzise"
      ebf_nutzen: "Nur relevante Respondenten"

    - id: "S-08"
      bereich: "Längsschnitt"
      beschreibung: "Tracking über mehrere Jahre (seit 2021)"
      bewertung: "Wertvoll"
      ebf_nutzen: "Trends und Kampagnen-Effekte messbar"

# ============================================================================
# SCHWÄCHEN
# ============================================================================

schwaechen:

  fehlende_10c_dimensionen:
    - dimension: "AWARE (AU)"
      status: "teilweise"
      gap: "Nur Kampagnen-Awareness, nicht Wissenstiefe über Technologien"
      fragen_vorhanden: ["F3.6", "F6.1", "F6.2", "F6.6"]
      fragen_fehlend:
        - "Detailliertes Wissen über Förderprogramme"
        - "Verständnis TCO (Total Cost of Ownership)"
        - "Kenntnis kantonaler Regelungen"

    - dimension: "READY (AV)"
      status: "teilweise"
      gap: "Nur Absicht (2/5 Jahre), keine Handlungsbereitschaft-Intensität"
      fragen_vorhanden: ["F2.1"]
      fragen_fehlend:
        - "Aktivierungsschwelle θ"
        - "Commitment-Stärke"
        - "Konkrete nächste Schritte"

    - dimension: "WHAT (C)"
      status: "gut"
      gap: "MaxDiff vorhanden, aber keine FEPSDE-Zuordnung"
      fragen_vorhanden: ["F5.1", "F4.2", "F4.3"]

    - dimension: "WHO (AAA)"
      status: "teilweise"
      gap: "EFH/MFH erfasst, aber keine Entscheider-Rolle"
      fragen_vorhanden: ["F1.4", "F1.6"]
      fragen_fehlend:
        - "Wer entscheidet final? (Allein/Partner/Familie)"
        - "Rolle in STWE-Versammlung"
        - "Generationenkonstellation"

    - dimension: "HOW (B)"
      status: "fehlt"
      gap: "Keine Komplementaritäten (γ) gemessen"
      fragen_fehlend:
        - "Welche Massnahmen verstärken sich?"
        - "Bundling-Präferenzen (Heizung + PV + Dämmung)"

    - dimension: "WHEN (V)"
      status: "fehlt"
      gap: "Kontext-Faktoren nicht systematisch erfasst"
      fragen_fehlend:
        - "Lebensereignisse (Pensionierung, Erbschaft)"
        - "Heizungsausfall als Trigger"
        - "Saisonale Effekte"

    - dimension: "WHERE (BBB)"
      status: "fehlt"
      gap: "Keine Parameter-Validierung möglich"

    - dimension: "STAGE (AW)"
      status: "fehlt"
      gap: "BCJ-Phase nur implizit über F2.1"
      fragen_fehlend:
        - "Explizite Journey-Stage Frage"
        - "Touchpoint-History"

    - dimension: "HIERARCHY (HI)"
      status: "fehlt"
      gap: "Entscheidungsebenen nicht erfasst"
      fragen_fehlend:
        - "L0 (automatisch) vs L2 (deliberativ)"
        - "Entscheidungskomplexität"

  fehlende_behavioral_constructs:
    - construct: "Loss Aversion (λ)"
      status: "fehlt"
      problem: "Nicht direkt gemessen"
      konsequenz: "λ kann nicht geschätzt werden"
      loesung: "Framing-Experiment oder Trade-off Frage"

    - construct: "Present Bias (β)"
      status: "fehlt"
      problem: "Temporal Discounting nicht gemessen"
      konsequenz: "Zeitpräferenzen unbekannt"
      loesung: "Intertemporal Choice Frage"

    - construct: "Social Norms"
      status: "fehlt"
      problem: "Keine Fragen zu Nachbarn/Bekannten"
      konsequenz: "Peer Effects nicht messbar"
      loesung: "Descriptive + Injunctive Norms Fragen"

    - construct: "Status Quo Bias"
      status: "indirekt"
      problem: "Nur über F2.2.1, F2.2.2 ableitbar"
      konsequenz: "Keine Stärke-Messung"
      loesung: "Direkte Skala-Frage"

    - construct: "Default Effects"
      status: "fehlt"
      problem: "Nicht gemessen"
      konsequenz: "Opt-in/Opt-out Potenzial unbekannt"
      loesung: "Hypothetisches Default-Szenario"

    - construct: "Mental Accounting"
      status: "grob"
      problem: "Ranking (F4.2) zu oberflächlich"
      konsequenz: "Budget-Kategorien unbekannt"
      loesung: "Budget-Allocation Frage"

  segment_luecken:
    - segment: "STWE"
      problem: "Keine Fragen zur Entscheidungskomplexität"
      fehlend:
        - "Abstimmungsregeln (Mehrheit/Einstimmigkeit)"
        - "Koordinationsprobleme"
        - "Verwaltungs-Rolle"

    - segment: "MFH-Vermieter"
      problem: "Prinzipal-Agent Problem nicht adressiert"
      fehlend:
        - "Mieter-Nutzen vs. Eigentümer-Kosten"
        - "Überwälzbarkeit"

    - segment: "Installateure"
      problem: "Komplett ausgeblendet"
      fehlend:
        - "Installateur als KEY Influencer"
        - "Empfehlungsverhalten"
        - "Kapazitäten/Präferenzen"

    - segment: "Ältere Eigentümer (65+)"
      problem: "Generationenwechsel nicht berücksichtigt"
      fehlend:
        - "Vererbungsplanung"
        - "Investitionshorizont"

  methodische_schwaechen:
    - issue: "Social Desirability Bias"
      betroffene_fragen: ["F4.3.4", "F4.3.5", "F4.3.9"]
      problem: "Umwelt-Fragen anfällig für sozial erwünschte Antworten"
      loesung: "Indirect Questioning oder List Experiment"

    - issue: "Hypothetische Fragen"
      betroffene_fragen: ["F3.7", "F3.8"]
      problem: "Messen Absicht, nicht Verhalten"
      loesung: "Revealed Preference wo möglich"

    - issue: "Keine Verhaltens-Validierung"
      problem: "Kein Follow-up ob Heizung tatsächlich ersetzt"
      loesung: "Panel-Design mit Re-Kontakt nach 12 Monaten"

    - issue: "Kein echtes Panel"
      problem: "Keine individuellen Veränderungen messbar"
      loesung: "Panel-Kohorte aufbauen"

    - issue: "Framing nicht getestet"
      problem: "Fragen nicht auf Framing-Sensitivität geprüft"
      loesung: "Split-Ballot Experiment"

# ============================================================================
# VERBESSERUNGSVORSCHLÄGE
# ============================================================================

verbesserungsvorschlaege:

  prioritaet_hoch:

    - id: "V-01"
      name: "Social Norms Frage"
      neue_frage_id: "F2.10"
      text: |
        Wie viele Ihrer Nachbarn oder Bekannten haben in den letzten
        3 Jahren ihre Heizung durch ein erneuerbares System ersetzt?
      optionen:
        - code: 1
          label: "Keine"
        - code: 2
          label: "1-2"
        - code: 3
          label: "3-5"
        - code: 4
          label: "Mehr als 5"
        - code: 99
          label: "Weiss nicht"
      ebf_mapping:
        dimension: "WHO (AAA)"
        construct: "Descriptive Social Norm"
        parameter: "σ_peer"

    - id: "V-02"
      name: "Installateur-Einfluss"
      neue_frage_id: "F2.11"
      text: |
        Hat Ihnen ein Heizungsinstallateur jemals aktiv eine
        erneuerbare Heizung empfohlen?
      optionen:
        - code: 1
          label: "Ja, hat Wärmepumpe empfohlen"
        - code: 2
          label: "Ja, hat Holz/Pellet empfohlen"
        - code: 3
          label: "Nein, hat fossile Heizung empfohlen"
        - code: 4
          label: "Nein, hatte noch keinen Kontakt"
        - code: 99
          label: "Weiss nicht"
      ebf_mapping:
        dimension: "WHO (AAA)"
        construct: "Intermediary Influence"
        parameter: "ι_installer"

    - id: "V-03"
      name: "Present Bias Messung"
      neue_frage_id: "F3.10"
      text: |
        Stellen Sie sich vor, Sie können CHF 5'000 Förderung erhalten:
        Option A: CHF 5'000 sofort bei Vertragsabschluss
        Option B: CHF 6'000 nach Installation (in 6 Monaten)
        Was würden Sie wählen?
      optionen:
        - code: 1
          label: "Option A (sofort weniger)"
          interpretation: "β < 0.83"
        - code: 2
          label: "Option B (später mehr)"
          interpretation: "β ≥ 0.83"
      ebf_mapping:
        dimension: "WHEN (V)"
        construct: "Present Bias"
        parameter: "β"

    - id: "V-04"
      name: "Loss Aversion Proxy"
      neue_frage_id: "F4.9"
      text: |
        Was wiegt für Sie persönlich schwerer?
      optionen:
        - code: 1
          label: "CHF 500 pro Jahr sparen mit neuer Heizung"
          interpretation: "Gain Frame"
        - code: 2
          label: "CHF 500 pro Jahr NICHT verlieren durch steigende Ölpreise"
          interpretation: "Loss Frame"
        - code: 3
          label: "Beides gleich wichtig"
          interpretation: "λ ≈ 1"
      ebf_mapping:
        dimension: "WHAT (C)"
        construct: "Loss Aversion"
        parameter: "λ"

    - id: "V-05"
      name: "Status Quo Stärke"
      neue_frage_id: "F5.3"
      text: |
        Wie stark stimmen Sie zu: "Solange meine Heizung funktioniert,
        sehe ich keinen Grund, etwas zu ändern."
      skala: "0-10 (0 = stimme gar nicht zu, 10 = stimme voll zu)"
      ebf_mapping:
        dimension: "READY (AV)"
        construct: "Status Quo Bias"
        parameter: "SQ_strength"

    - id: "V-06"
      name: "BCJ Journey Stage"
      neue_frage_id: "F2.12"
      text: |
        Wo stehen Sie aktuell beim Thema Heizungsersatz?
      optionen:
        - code: 1
          label: "Habe mir noch nie Gedanken gemacht"
          stage: "UNAWARE"
        - code: 2
          label: "Weiss dass ich irgendwann ersetzen muss"
          stage: "AWARE"
        - code: 3
          label: "Informiere mich aktiv über Optionen"
          stage: "CONSIDERATION"
        - code: 4
          label: "Habe konkreten Plan/Offerten eingeholt"
          stage: "PLANNING"
        - code: 5
          label: "Habe bereits beauftragt/installiert"
          stage: "ACTION"
        - code: 6
          label: "Empfehle anderen den Wechsel"
          stage: "ADVOCACY"
      ebf_mapping:
        dimension: "STAGE (AW)"
        construct: "BCJ Phase"
        parameter: "φ"

  prioritaet_mittel:

    - id: "V-07"
      name: "STWE Entscheidungskomplexität"
      filter: "F1.4=2"
      neue_frage_id: "F_STWE.1"
      text: |
        Wer entscheidet in Ihrer Stockwerkeigentümergemeinschaft
        über den Heizungsersatz?
      optionen:
        - code: 1
          label: "Einzelne Eigentümer können selbst entscheiden"
        - code: 2
          label: "Einfache Mehrheit der Versammlung"
        - code: 3
          label: "Qualifizierte Mehrheit (2/3)"
        - code: 4
          label: "Einstimmigkeit erforderlich"
        - code: 99
          label: "Weiss nicht"
      ebf_mapping:
        dimension: "HIERARCHY (HI)"
        construct: "Collective Decision Complexity"

    - id: "V-08"
      name: "STWE Koordinationserfahrung"
      filter: "F1.4=2"
      neue_frage_id: "F_STWE.2"
      text: |
        Haben Sie schon einmal versucht, einen Heizungsersatz
        in Ihrer STWE anzustossen?
      optionen:
        - code: 1
          label: "Ja, erfolgreich"
        - code: 2
          label: "Ja, aber gescheitert"
        - code: 3
          label: "Nein, zu kompliziert"
        - code: 4
          label: "Nein, kein Interesse"
      ebf_mapping:
        construct: "Coordination Experience"

    - id: "V-09"
      name: "Trigger Events"
      neue_frage_id: "F3.11"
      text: |
        Welches Ereignis würde Sie am ehesten zum Handeln bewegen?
      optionen:
        - code: 1
          label: "Heizung fällt komplett aus"
        - code: 2
          label: "Ölpreis verdoppelt sich"
        - code: 3
          label: "Nachbar installiert Wärmepumpe"
        - code: 4
          label: "Kanton verbietet fossile Heizungen"
        - code: 5
          label: "Förderung wird massiv erhöht"
        - code: 6
          label: "Kinder/Enkel bitten darum"
        - code: 98
          label: "Anderes"
      ebf_mapping:
        dimension: "WHEN (V)"
        construct: "Activation Threshold"
        parameter: "θ"

  prioritaet_niedrig:

    - id: "V-10"
      name: "Bundling-Präferenz"
      neue_frage_id: "F5.4"
      text: |
        Wenn Sie Ihre Heizung ersetzen würden, welche zusätzlichen
        Massnahmen würden Sie gleichzeitig in Betracht ziehen?
      optionen:
        - code: 1
          label: "Photovoltaik-Anlage"
        - code: 2
          label: "Fassadendämmung"
        - code: 3
          label: "Fenstererneuerung"
        - code: 4
          label: "Batteriespeicher"
        - code: 5
          label: "Keine weiteren Massnahmen"
      ebf_mapping:
        dimension: "HOW (B)"
        construct: "Complementarity"
        parameter: "γ"

# ============================================================================
# PANEL-DESIGN EMPFEHLUNG
# ============================================================================

panel_design:
  beschreibung: |
    Aktuell ist der Fragebogen ein wiederholter Querschnitt (repeated cross-section).
    Für echte Verhaltens-Validierung wird ein Panel-Design empfohlen.

  vorschlag:
    name: "Heating Decision Panel"

    welle_1:
      zeitpunkt: "Baseline (wie bisher)"
      sample: "Alle mit Ersatzabsicht (F2.1=1,2)"
      zusatz: "Einwilligung für Re-Kontakt einholen"

    welle_2:
      zeitpunkt: "12 Monate nach Welle 1"
      fragen:
        - "Wurde Heizung tatsächlich ersetzt? (Ja/Nein)"
        - "Wenn ja: Welches System?"
        - "Wenn ja: Wer hat beraten?"
        - "Wenn ja: War Impulsberatung involviert?"
        - "Wenn nein: Was hat sich geändert?"
        - "Wenn nein: Neue Ersatzabsicht?"

    metriken:
      - name: "Intention-Behavior Gap"
        formel: "% mit Absicht in W1 aber ohne Ersatz in W2"
      - name: "Impulsberatung Conversion"
        formel: "% mit Impulsberatung die tatsächlich ersetzt haben"
      - name: "Predictor Analysis"
        formel: "Welche W1-Variablen predicten W2-Verhalten?"

# ============================================================================
# ZUSAMMENFASSUNG
# ============================================================================

zusammenfassung:

  bewertung_aktuell:
    10c_abdeckung: "3/10"
    behavioral_constructs: "2/6"
    segment_abdeckung: "2/4"
    verhaltens_validierung: "0%"
    gesamturteil: "Solide für Kampagnen-Tracking, nicht optimiert für Behavioral Insights"

  bewertung_mit_verbesserungen:
    10c_abdeckung: "8/10"
    behavioral_constructs: "6/6"
    segment_abdeckung: "4/4"
    verhaltens_validierung: "Panel möglich"
    gesamturteil: "Vollwertiges EBF-Instrument"

  aufwand_verbesserungen:
    zusaetzliche_fragen: "10-15"
    zusaetzliche_minuten: "3-5"
    panel_setup: "Einmalig + jährliche Re-Kontaktierung"

  empfehlung: |
    Der bestehende Fragebogen sollte um die Priorität-HOCH Fragen (V-01 bis V-06)
    ergänzt werden. Dies ermöglicht die Schätzung der wichtigsten Behavioral
    Parameters (β, λ, σ, θ) und die explizite BCJ-Stage Messung.

    Für STWE-Segment sind V-07 und V-08 kritisch, da dieses Segment
    spezifische Koordinationsprobleme hat.

    Das Panel-Design sollte als Pilot mit einer Teilstichprobe gestartet werden,
    um den Intention-Behavior Gap zu quantifizieren.
