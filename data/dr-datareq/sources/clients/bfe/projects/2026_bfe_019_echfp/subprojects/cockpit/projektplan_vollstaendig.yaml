      4:
        name: "Kommunikation"
        aktion: "Entscheidung an alle Stakeholder kommunizieren"
        verantwortlich: "Projektleiter"
      5:
        name: "Umsetzung"
        aktion: "Projektplan aktualisieren, Änderung umsetzen"
        verantwortlich: "Projektteam"
