lessons_learned:

  prozess:
    erfassung:
      wann: "Nach jedem Meilenstein + bei Projektabschluss"
      wie: "Retrospektive Meeting (30 Minuten)"
      wer: "Gesamtes Projektteam"

    fragen:
      - "Was lief gut? (Keep)"
      - "Was lief nicht gut? (Stop)"
      - "Was sollten wir nächstes Mal anders machen? (Start)"
      - "Welche Risiken haben sich materialisiert?"
      - "Welche neuen Risiken sind aufgetreten?"

    dokumentation:
      speicherort: "SharePoint/.../06_Reports/Lessons_Learned/"
      format: "YAML + Excel Summary"

  template:
    beispiel:
      id: "LL-001"
      datum: "2025-12-19"
      meilenstein: "MS1"
      kategorie: "Prozess"
      beobachtung: "KPI-Definition dauerte länger als geplant wegen unklarer Anforderungen"
      ursache: "Keine schriftlichen Requirements von BFE zu Beginn"
      empfehlung: "Requirements-Workshop zu Projektbeginn durchführen"
      umsetzung: "Für AP2 gemacht"
      verantwortlich: "Alexis"

  archivierung:
    intern: "FAP Knowledge Base (Confluence)"
    weitergabe: "Quarterly FAP Knowledge Sharing Session"

# =============================================================================
# EBF INTEGRATION
# =============================================================================
ebf_integration:
  description: |
    Das Cockpit misst die Wirkung der ECHfP-Kampagne entlang der
    Behavioral Customer Journey und der 10C-Dimensionen.

  kpi_to_10c_mapping:
    A_Awareness:
      10c_dimension: "AWARE"
      ebf_variable: "A(·)"
      messung: "Bekanntheit Kampagne, Förderprogramme, Massnahmen"
      fragebogen_items: ["F6.1", "F6.2", "F6.3"]

    W_Willingness:
      10c_dimension: "READY"
      ebf_variable: "W_base, θ"
      messung: "Handlungsbereitschaft, Aktivierungsschwelle"
      fragebogen_items: ["F2.1", "F2.2", "F2.3", "F2.4", "F2.5", "F2.6", "F2.7", "F2.8", "F2.9"]

    I_Impact:
      10c_dimension: "STAGE"
      ebf_variable: "BCJ Phase φ"
      messung: "Tatsächliche Verhaltensänderung (considering → acting)"
      fragebogen_items: ["F3.1", "F3.2", "F3.3", "F3.4", "F3.5", "F3.6", "F3.7", "F3.8", "F3.9"]

    T_Trust:
      10c_dimension: "WHAT"
      ebf_variable: "u_S (Social Utility)"
      messung: "Vertrauen in BFE, Glaubwürdigkeit"
      fragebogen_items: ["F6.4", "F6.5", "F6.6", "F6.7", "F6.8"]

  bcj_integration:
    description: "KPIs bilden BCJ-Progression ab"
    mapping:
      - bcj_phase: "unaware"
        primary_kpi: ["A"]
        intervention_focus: "Reichweite erhöhen"

      - bcj_phase: "aware"
