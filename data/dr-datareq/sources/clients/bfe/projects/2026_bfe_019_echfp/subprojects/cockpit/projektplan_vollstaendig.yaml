# =============================================================================
# RISIKOMANAGEMENT (NEU)
# =============================================================================
risiken:

  R1:
    name: "Verzögerung BFE-Freigabe"
    beschreibung: "BFE benötigt mehr Zeit für Fragebogen-Review"
    wahrscheinlichkeit: "hoch"
    wahrscheinlichkeit_prozent: 60
    auswirkung: "hoch"
    auswirkung_beschreibung: "Verzögert Feldstart um 1-2 Wochen"
    risiko_score: 9
    massnahmen:
      praeventiv:
        - "Vorab-Abstimmung mit BFE zu kritischen Fragen"
        - "Fragebogen-Entwurf früh teilen (ab 10.01)"
        - "Entscheidungstermine verbindlich vereinbaren"
      reaktiv:
        - "Parallele Arbeit an Dashboard fortsetzen"
        - "Feldzeit verkürzen, Reminder verstärken"
    verantwortlich: "Andrea"
    fruehwarnung: "Keine Rückmeldung bis 20.01"
    eskalation_bei: "Keine Freigabe bis 25.01"

  R2:
    name: "Niedrige Rücklaufquote Befragung"
    beschreibung: "Weniger als 1'000 Respondenten trotz Feldzeit"
    wahrscheinlichkeit: "mittel"
    wahrscheinlichkeit_prozent: 40
    auswirkung: "hoch"
    auswirkung_beschreibung: "Daten nicht repräsentativ, KPIs nicht belastbar"
    risiko_score: 7
    massnahmen:
      praeventiv:
        - "Incentives mit Intervista klären (Verlosung)"
        - "Reminder-Wellen einplanen (3 Wellen)"
        - "Mobiloptimierung sicherstellen"
      reaktiv:
        - "Verlängerung Feldzeit um 1 Woche"
        - "Aufstockung Sample durch Intervista"
        - "Notfalls: Quotenlockerung dokumentieren"
    verantwortlich: "Andrea"
    fruehwarnung: "< 500 Respondenten nach 1. Woche"
    eskalation_bei: "< 800 nach 2 Wochen"

  R3:
    name: "Technische Probleme Dashboard"
    beschreibung: "Datenschnittstelle oder Visualisierung funktioniert nicht"
    wahrscheinlichkeit: "niedrig"
    wahrscheinlichkeit_prozent: 20
    auswirkung: "mittel"
    auswirkung_beschreibung: "Dashboard nicht nutzbar für Erstpräsentation"
    risiko_score: 4
    massnahmen:
      praeventiv:
        - "Frühzeitige Tests mit Testdaten"
        - "Backup-Lösung vorbereiten (Excel-Dashboard)"
        - "Technische Dokumentation erstellen"
      reaktiv:
        - "Manueller Datenimport als Workaround"
        - "Excel-Version für erste Präsentation nutzen"
    verantwortlich: "Manuel"
    fruehwarnung: "Test-Upload scheitert am 10.01"
    eskalation_bei: "Keine funktionierende Version bis 12.01"

  R4:
    name: "Scope Creep durch BFE"
    beschreibung: "Zusätzliche Anforderungen während Projekt ohne CR"
    wahrscheinlichkeit: "hoch"
    wahrscheinlichkeit_prozent: 70
    auswirkung: "mittel"
    auswirkung_beschreibung: "Mehraufwand, Verzögerungen, Budgetüberschreitung"
    risiko_score: 6
    massnahmen:
      praeventiv:
        - "Klarer Scope-Definition im Kick-off dokumentieren"
        - "Change Request Prozess etablieren"
        - "Regelmässige Scope-Reviews in Status-Meetings"
      reaktiv:
        - "Priorisierung mit BFE (Must/Should/Could)"
        - "Phase 2 definieren für Zusatzwünsche"
        - "Budgetanpassung beantragen"
    verantwortlich: "Alexis"
    fruehwarnung: "Neue Anforderung ohne CR-Formular"
    eskalation_bei: "Scope-Erweiterung > 20% Aufwand"

  R5:
    name: "Key Person Ausfall"
    beschreibung: "Lucas oder Manuel fallen krankheitsbedingt aus"
    wahrscheinlichkeit: "niedrig"
    wahrscheinlichkeit_prozent: 15
    auswirkung: "hoch"
    auswirkung_beschreibung: "Kritisches Know-how nicht verfügbar"
    risiko_score: 5
    massnahmen:
      praeventiv:
        - "Wissenstransfer zwischen Lucas/Manuel"
        - "Dokumentation aller Entscheidungen"
        - "Backup-Personen identifizieren"
      reaktiv:
        - "Backup-Person einarbeiten (2 Tage)"
        - "Externe Unterstützung prüfen"
    verantwortlich: "Alexis"
    fruehwarnung: "Ausfall > 3 Tage"
    eskalation_bei: "Ausfall > 1 Woche ohne Backup"

  risiko_matrix:
    legende: |
      Score 8-10: Kritisch   → Sofortmassnahmen, Steering Committee informieren
      Score 5-7:  Erhöht     → Aktives Monitoring, wöchentlicher Review
      Score 1-4:  Akzeptabel → Review alle 2 Wochen
    aktuelle_bewertung:
      kritisch: ["R1"]
      erhoeht: ["R2", "R4"]
      akzeptabel: ["R3", "R5"]

