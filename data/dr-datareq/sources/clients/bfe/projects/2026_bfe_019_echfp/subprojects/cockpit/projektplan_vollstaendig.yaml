# =============================================================================
# QUALITÄTSSICHERUNG (NEU)
# =============================================================================
qualitaet:

  fragebogen:
    kriterien:
      - name: "Verständlichkeit"
        test: "Pretest mit 10 Personen aus Zielgruppe"
        akzeptanz: "< 5% Verständnisprobleme pro Frage"
        verantwortlich: "Andrea"
        zeitpunkt: "Vor BFE-Review"

      - name: "Bearbeitungszeit"
        test: "Durchschnittliche Bearbeitungszeit messen"
        akzeptanz: "≤ 15 Minuten (Median)"
        verantwortlich: "Intervista"
        zeitpunkt: "Nach Pretest"

      - name: "KPI-Abdeckung"
        test: "Mapping-Matrix Frage → KPI"
        akzeptanz: "Jede Frage ist mindestens einem KPI zugeordnet"
        verantwortlich: "Lucas"
        zeitpunkt: "Vor Finalisierung"

      - name: "EBF-Integration"
        test: "10C-Dimensionen-Mapping"
        akzeptanz: "≥ 8 von 10 Dimensionen abgedeckt"
        verantwortlich: "Lucas"
        zeitpunkt: "Vor Finalisierung"

      - name: "Sprachversionen"
        test: "Übersetzungsqualität DE/FR/IT"
        akzeptanz: "Native Speaker Review bestanden"
        verantwortlich: "Intervista"
        zeitpunkt: "Vor Feldstart"

  dashboard:
    kriterien:
      - name: "Funktionalität"
        test: "Feature-Checkliste durchgehen"
        akzeptanz: "100% der Features funktional"
        checkliste:
          - "KPI A angezeigt"
          - "KPI W angezeigt"
          - "KPI I angezeigt"
          - "KPI T angezeigt"
          - "Gesamt-Score berechnet"
          - "Filter Zeit funktional"
          - "Filter Zielgruppe funktional"
          - "Filter Region funktional"
          - "Export PDF funktional"
          - "Export PowerPoint funktional"
          - "Export CSV funktional"
        verantwortlich: "Manuel"
        zeitpunkt: "MS2"

      - name: "Performance"
        test: "Ladezeit messen (3 Browser)"
        akzeptanz: "< 3 Sekunden für Hauptansicht"
        verantwortlich: "Isabella"
        zeitpunkt: "MS2"

      - name: "Usability"
        test: "3 BFE-Nutzer testen ohne Anleitung"
        akzeptanz: "Alle 3 können KPIs finden und filtern"
        verantwortlich: "Alexis"
        zeitpunkt: "Vor MS6"

      - name: "Datenqualität"
        test: "Berechnungen gegen Excel-Referenz validieren"
        akzeptanz: "0% Abweichung bei KPI-Berechnung"
        verantwortlich: "Lucas"
        zeitpunkt: "Nach Datenimport"

  daten:
    kriterien:
      - name: "Stichprobengrösse"
        akzeptanz: "n ≥ 1'500 vollständige Interviews"
        verantwortlich: "Andrea"

      - name: "Repräsentativität"
        akzeptanz: "Quotiert nach: Region (DE/FR/IT), Alter (3 Gruppen), Gebäudetyp (EFH/MFH)"
        verantwortlich: "Intervista"

      - name: "Datenqualität"
        test: "Speeders (<1/3 Median-Zeit), Straightliners (>80% gleiche Antwort)"
        akzeptanz: "< 5% Ausschluss wegen Qualität"
        verantwortlich: "Manuel"

      - name: "Vollständigkeit"
        test: "Prüfung auf fehlende Werte"
        akzeptanz: "< 3% Missing Values bei Pflichtfragen"
        verantwortlich: "Lucas"

  review_gates:
    gate_1:
      name: "Fragebogen-Freigabe"
      id: "GATE-01"
      datum: "2026-01-23"
      kriterien:
        - "BFE-Freigabe schriftlich vorliegend"
        - "Pretest erfolgreich (< 5% Probleme)"
        - "Alle Übersetzungen geprüft"
      entscheider: "Steering Committee"
      go_nogo: "Go = alle Kriterien erfüllt"

    gate_2:
      name: "Dashboard Go-Live"
      id: "GATE-02"
      datum: "2026-01-15"
      kriterien:
        - "Alle Features funktional (Checkliste)"
        - "Testdaten korrekt berechnet"
        - "Performance < 3 Sekunden"
      entscheider: "Projektleiter"
      go_nogo: "Go = alle Kriterien erfüllt"

    gate_3:
      name: "Datenfreigabe"
      id: "GATE-03"
      datum: "2026-02-08"
      kriterien:
        - "n ≥ 1'500"
        - "Qualitäts-Checks bestanden"
        - "Daten validiert"
      entscheider: "Projektleiter"
      go_nogo: "Go = alle Kriterien erfüllt"

    gate_4:
      name: "Projektabnahme"
      id: "GATE-04"
      datum: "2026-03-01"
      kriterien:
        - "Alle Deliverables geliefert"
        - "Dokumentation vollständig"
        - "BFE-Feedback eingearbeitet"
        - "Übergabepräsentation erfolgt"
      entscheider: "BFE (Steering Committee)"
      go_nogo: "Go = Abnahmeprotokoll unterschrieben"

