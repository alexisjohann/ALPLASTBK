        - "Was mache ich bis zum nächsten Mal?"
        - "Welche Blocker habe ich?"
      medium: "Microsoft Teams (Kanal: BFE Cockpit)"
      moderator: "Rotierend"

    weekly_review:
      name: "Wöchentlicher Projekt-Review"
      wann: "Freitag 14:00"
      dauer: "30 Minuten"
      wer: ["Alexis", "Andrea", "Lucas", "Manuel", "Isabella"]
