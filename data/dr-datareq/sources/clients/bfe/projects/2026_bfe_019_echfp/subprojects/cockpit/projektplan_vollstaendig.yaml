# =============================================================================
# BEHAVIORAL IMPACT COCKPIT - VOLLSTÄNDIGER PROJEKTPLAN
# =============================================================================
# Sub-Projekt von BFE_019_ECHfP (Energie Schweiz für Private)
# Version: 2.0 (erweitert)
# Erstellt: 2026-01-26
# Aktualisiert: 2026-02-01
# Änderungen: Budget, Risiken, Abhängigkeiten, Governance, Kommunikation, QS
# =============================================================================

metadata:
  subproject_id: "BFE-2026-001-COCKPIT"
  name: "Behavioral Impact Cockpit"
  parent_project: "BFE-2026-001"
  parent_name: "BFE_019_ECHfP"
  version: "2.0"
  description: |
    Dashboard zur Messung der Kampagnenwirkung über die KPIs
    Awareness (A), Willingness (W), Impact (I), Trust (T) + Gesamt-Score.
  status: "in_progress"
  created: "2026-01-26"
  last_updated: "2026-02-01"

  timeline:
    start: "2025-12-19"
    end: "2026-03-01"
    dauer_wochen: 11

  kpi_framework:
    description: "A-W-I-T + Gesamt-Score"
    dimensions:
      - code: "A"
        name: "Awareness"
        description: "Bekanntheit der Kampagne/Massnahmen"
        gewicht: 0.25
      - code: "W"
        name: "Willingness"
        description: "Handlungsbereitschaft der Zielgruppe"
        gewicht: 0.30
      - code: "I"
        name: "Impact"
        description: "Tatsächliche Verhaltensänderung"
        gewicht: 0.30
      - code: "T"
        name: "Trust"
        description: "Vertrauen in Absender/Massnahmen"
        gewicht: 0.15
      - code: "G"
        name: "Gesamt-Score"
        description: "Aggregierter Index über alle Dimensionen"
        formel: "0.25*A + 0.30*W + 0.30*I + 0.15*T"

# =============================================================================
# ERFOLGSKRITERIEN (NEU)
# =============================================================================
erfolgskriterien:

  # Primäre KPI-Ziele (messbar!)
  kpi_targets:
    A_Awareness:
      baseline_2025: 0.45        # Annahme: 45% kennen Kampagne
      target_2026: 0.60          # Ziel: 60%
      stretch_goal: 0.70         # Ambitioniert: 70%
      messzeitpunkt: "2026-02-15"
      messmethode: "Befragung Frage F6.1-F6.3"

    W_Willingness:
      baseline_2025: 0.25
      target_2026: 0.40
      stretch_goal: 0.50
      messzeitpunkt: "2026-02-15"
      messmethode: "Befragung Frage F2.1-F2.9"

    I_Impact:
      baseline_2025: 0.08        # 8% haben Heizung ersetzt
      target_2026: 0.15          # Ziel: 15%
      stretch_goal: 0.20
      messzeitpunkt: "2026-02-15"
      messmethode: "Befragung Frage F3.1-F3.9"

    T_Trust:
      baseline_2025: 0.55
      target_2026: 0.70
      stretch_goal: 0.80
      messzeitpunkt: "2026-02-15"
      messmethode: "Befragung Frage F6.4-F6.8"

    G_Gesamt:
      formel: "0.25*A + 0.30*W + 0.30*I + 0.15*T"
      target: 0.45
      stretch_goal: 0.55

  # Projekt-Deliverables mit Akzeptanzkriterien
  deliverables:
    - id: "DEL-01"
      name: "KPI-Architektur dokumentiert"
      akzeptanzkriterium: "Formel-Set, Gewichtungen, Datenmodell finalisiert"
      deadline: "2025-12-19"
      status: "completed"

    - id: "DEL-02"
      name: "Dashboard MVP live"
      akzeptanzkriterium: "Alle 4 KPIs visualisiert, Filter funktional, Export möglich"
      deadline: "2026-01-15"
      status: "in_progress"

    - id: "DEL-03"
      name: "Fragebogen feldreif"
      akzeptanzkriterium: "BFE-Freigabe schriftlich, Intervista bestätigt Programmierung"
      deadline: "2026-01-23"
      status: "pending"

    - id: "DEL-04"
      name: "Erstmessung abgeschlossen"
      akzeptanzkriterium: "n ≥ 1'500 Respondenten, Daten validiert, < 5% Ausschluss"
      deadline: "2026-02-08"
      status: "pending"

    - id: "DEL-05"
      name: "Cockpit übergeben"
      akzeptanzkriterium: "BFE-Abnahmeprotokoll unterschrieben, Dokumentation vollständig"
      deadline: "2026-03-01"
      status: "pending"

