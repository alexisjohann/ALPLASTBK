  projekt_id: "BFE-2026-001-COCKPIT"
  laufzeit: "2025-12-19 bis 2026-03-01"
  status: "abgeschlossen"

  abgeschlossene_meilensteine:
    - id: "MS1"
      name: "KPI-Architektur finalisiert"
      datum: "2025-12-19"
    - id: "MS2"
      name: "Fragebogen abgenommen"
      datum: "2026-01-15"
    - id: "MS3"
      name: "Dashboard-Prototyp fertig"
      datum: "2026-01-31"
    - id: "MS4"
      name: "Erstmessung durchgeführt"
      datum: "2026-02-07"
    - id: "MS5"
      name: "Erste Auswertung geliefert"
      datum: "2026-02-15"
    - id: "MS6"
      name: "Cockpit übergeben"
      datum: "2026-03-01"

  ergebnisse_phase1:
    - "Validiertes KPI-Framework (A-W-I-T + Gesamt-Score)"
    - "Getesteter Fragebogen (n=1'500 Befragte)"
    - "Funktionales Dashboard mit Echtzeit-Daten"
    - "Baseline-Messung aller KPIs"
    - "Dokumentierte Berechnungslogik"
    - "Geschultes BFE-Team"

  baseline_werte_phase1:
    awareness:
