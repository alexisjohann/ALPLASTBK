# =============================================================================
# PHASE 2 - METADATEN
# =============================================================================
metadata:
  subproject_id: "BFE-2026-002-COCKPIT-P2"
  name: "Behavioral Impact Cockpit - Phase 2: Skalierung & Optimierung"
  parent_project: "BFE-2026-001"
  parent_name: "BFE_019_ECHfP"
  vorgaenger_projekt: "BFE-2026-001-COCKPIT"

  description: |
    Phase 2 baut auf dem in Phase 1 entwickelten Behavioral Impact Cockpit auf.
    Ziele sind:
    1. Longitudinale Messungen zur Trendanalyse
    2. Erweiterung auf zusätzliche Kampagnen-Module
    3. Automatisierung der Datenerfassung
    4. Integration verhaltensökonomischer Interventionen
    5. Skalierung auf weitere BFE-Programme

  status: "geplant"
  created: "2026-02-02"
  last_updated: "2026-02-02"

  timeline:
    start: "2026-03-01"
    end: "2026-09-30"
    dauer_monate: 7

  budget:
    total_chf: 145000
    aufschluesselung:
      personal_intern:
        betrag: 65000
        details: "Projektleitung, Analysten (ca. 800 Stunden)"
      personal_extern:
        betrag: 45000
        details: "FehrAdvice Beratung, EBF-Integration"
      infrastruktur:
        betrag: 15000
        details: "Dashboard-Hosting, API-Erweiterungen"
      erhebung:
        betrag: 18000
        details: "3 Tracking-Wellen à 1'500 Befragte"
      reserve:
        betrag: 2000
        details: "Unvorhergesehenes (ca. 1.4%)"

# =============================================================================
# ZIELSETZUNG PHASE 2
# =============================================================================
ziele:
  hauptziel: |
    Transformation des Behavioral Impact Cockpits von einem Pilot-Dashboard
    zu einem skalierbaren, automatisierten Wirkungsmessungssystem für alle
    BFE-Kampagnen im Bereich Energie Schweiz.

  teilziele:
    - id: "Z1"
      name: "Longitudinale Trendanalyse"
      beschreibung: "Durchführung von 3 Tracking-Wellen zur Messung der KPI-Entwicklung"
      messbar: "3 vollständige Messzyklen mit je n≥1'500"

    - id: "Z2"
      name: "Kampagnen-Erweiterung"
      beschreibung: "Integration von 2 weiteren BFE-Kampagnen ins Cockpit"
      messbar: "2 neue Kampagnen-Module live geschaltet"

    - id: "Z3"
      name: "Automatisierung"
      beschreibung: "Automatische Datenerfassung und Report-Generierung"
      messbar: "Manuelle Aufwände um 70% reduziert"

    - id: "Z4"
      name: "Interventions-Integration"
      beschreibung: "Verknüpfung von Interventionen mit KPI-Entwicklung"
      messbar: "Mindestens 3 Interventionen mit messbarem Impact"

    - id: "Z5"
      name: "Wissenstransfer"
      beschreibung: "Vollständige Befähigung des BFE-Teams zur eigenständigen Nutzung"
      messbar: "BFE kann eigenständig Auswertungen durchführen"

# =============================================================================
# ERFOLGSKRITERIEN (SMART)
# =============================================================================
erfolgskriterien:
  primaer:
    - id: "E1"
      kriterium: "KPI-Verbesserung"
      zielwert: "Gesamt-Score +10 Prozentpunkte vs. Baseline"
      messmethode: "Vergleich Welle 1 (Phase 1) mit Welle 4 (Ende Phase 2)"

    - id: "E2"
      kriterium: "Skalierung erreicht"
      zielwert: "3 Kampagnen im Cockpit integriert"
      messmethode: "Anzahl aktiver Kampagnen-Module"

    - id: "E3"
      kriterium: "Automatisierungsgrad"
      zielwert: "≥70% automatisierte Prozesse"
      messmethode: "Zeitaufwand pro Report-Zyklus"

  sekundaer:
    - id: "E4"
      kriterium: "Nutzerzufriedenheit BFE"
      zielwert: "≥4.0 auf 5-Punkte-Skala"
      messmethode: "Feedback-Befragung Projektende"

    - id: "E5"
      kriterium: "Budget-Einhaltung"
      zielwert: "≤105% des geplanten Budgets"
      messmethode: "Kostencontrolling"

