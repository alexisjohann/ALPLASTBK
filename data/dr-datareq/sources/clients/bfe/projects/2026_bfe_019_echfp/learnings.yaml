# BFE Projekt Learnings Template
# Version: 1.0
# Verwendung: Nach Projektabschluss ausfüllen
# Diese Learnings fließen zurück in MESO und MAKRO Kontextvektoren

# =============================================================================
# METADATEN
# =============================================================================
metadata:
  project_id: "BFE-2026-019"
  project_name: "ECHfP - EnergieSchweiz für Private"
  predecessor_program: "erneuerbar heizen (2021-2025)"
  start_date: "2025-06-01"  # Phase 0 Pilot
  completion_date: "YYYY-MM-DD"  # Noch nicht abgeschlossen
  evaluation_date: "YYYY-MM-DD"  # Erste Evaluation H2/2026

  status: "active"  # active | completed | cancelled_with_learnings

  evaluation_schedule:
    - period: "H1 2026"
      type: "Baseline"
    - period: "H2 2026"
      type: "Wirkungsmessung 1"
    - period: "H1 2027"
      type: "Wirkungsmessung 2"
    - period: "2028+"
      type: "Jährlich"

  team:
    bfe_lead: "[BFE Projektleitung]"
    fehradvice_lead: "[FehrAdvice Energy Team]"
    agency: "CRK (Lead-Agentur)"
    evaluator: "FehrAdvice & Partners AG (mit BEATRIX KI-Tool)"

# =============================================================================
# ERGEBNISSE VS. VORHERSAGEN
# =============================================================================
results_vs_predictions:
  primary_outcome:
    metric: "[z.B. Anzahl Heizungsersatz]"
    predicted: "[Vorhersage aus model.yaml]"
    actual: "[Tatsächlicher Wert]"
    deviation: "[+/- X%]"
    deviation_explanation: "[Warum die Abweichung?]"

  secondary_outcomes:
    - metric: "[...]"
      predicted: "[...]"
      actual: "[...]"
      deviation: "[...]"

  behavioral_kpis:
    - kpi: "[z.B. Conversion Rate]"
      predicted: "[...]"
      actual: "[...]"
      insight: "[Was lernen wir daraus?]"

# =============================================================================
# HYPOTHESEN-TESTS
# =============================================================================
hypothesis_tests:
  description: |
    Ergebnisse der in context_subset.yaml definierten Hypothesen.

  results:
    - hypothesis_id: "H1"
      factor: "[z.B. ENE-PSY-02]"
      hypothesis: "[Ursprüngliche Hypothese]"
      result: "confirmed | rejected | modified"
      evidence:
        sample_size: "[N]"
        effect_size: "[...]"
        p_value: "[...]"
        confidence_interval: "[...]"
      insight: "[Was bedeutet das für zukünftige Projekte?]"

    - hypothesis_id: "H2"
      factor: "[...]"
      hypothesis: "[...]"
      result: "[...]"
      evidence: "[...]"
      insight: "[...]"

# =============================================================================
# NEUE ERKENNTNISSE
# =============================================================================
new_discoveries:
  description: |
    Unerwartete Erkenntnisse, die nicht in den ursprünglichen Hypothesen waren.

  discoveries:
    - id: "D1"
      type: "new_factor | parameter_update | interaction | segment"
      description: "[Beschreibung der Entdeckung]"
      evidence:
        sample_size: "[N]"
        method: "[Wie entdeckt?]"
        strength: "[Wie stark ist die Evidenz?]"
      implication: "[Was bedeutet das für EBF/Kontextvektoren?]"

# =============================================================================
# KONTEXT-UPDATES (für MESO/MAKRO)
# =============================================================================
context_updates:
  description: |
    Konkrete Updates für die Kontextvektoren basierend auf Projekt-Learnings.
    Diese werden in die learning_logs der jeweiligen Dateien propagiert.

  # Neue Faktoren für MESO
  new_factors_meso:
    - factor:
        id: "ENE-PSY-XX"  # Nächste verfügbare ID
        name: "[Neuer Faktor Name]"
        definition: "[Definition]"
        salienz: "[Gemessener Wert]"
        trend: "steigend | stabil | fallend"
        uncertainty: "niedrig | mittel | hoch"
        behavioral_impact: "[Beschreibung]"
        psi_dimension: "[kappa_*]"
        ebf_link: "[10C Dimension]"
      evidence:
        source: "BFE-YYYY-NNN"
        sample: "[N]"
        method: "[Methode]"
      propagation_status: "pending"  # pending | propagated

  # Parameter-Updates für existierende Faktoren
  parameter_updates_meso:
    - factor_id: "ENE-PSY-02"
      field: "salienz"
      old_value: 0.68
      new_value: "[Neuer Wert]"
      evidence:
        source: "BFE-YYYY-NNN"
        sample: "[N]"
        confidence: "[95% CI]"
      propagation_status: "pending"

  # Updates für MAKRO (seltener, nur bei starker Evidenz)
  updates_makro:
    - factor_id: "[...]"
      source_file: "BCM2_04_KON_[domain].yaml"
      update_type: "parameter | new_factor"
      details: "[...]"
      evidence_strength: "strong | moderate | weak"
      propagation_status: "pending"

# =============================================================================
# INTERVENTION-LEARNINGS
# =============================================================================
intervention_learnings:
  what_worked:
    - intervention_type: "[T1-T8]"
      specific_element: "[Welches Element genau?]"
      effect_size: "[...]"
      context_dependency: "[Unter welchen Bedingungen?]"
      recommendation: "[Empfehlung für zukünftige Projekte]"

  what_did_not_work:
    - intervention_type: "[T1-T8]"
      specific_element: "[...]"
      expected_effect: "[Was war erwartet?]"
      actual_effect: "[Was ist passiert?]"
      explanation: "[Warum hat es nicht funktioniert?]"
      recommendation: "[Was stattdessen tun?]"

  unexpected_effects:
    - description: "[Unerwarteter Effekt]"
      direction: "positive | negative"
      magnitude: "[...]"
      explanation: "[Mögliche Erklärung]"

# =============================================================================
# SEGMENT-LEARNINGS
# =============================================================================
segment_learnings:
  description: |
    Erkenntnisse über unterschiedliche Wirkung in verschiedenen Segmenten.

  segment_differences:
    - segment_a: "[z.B. Eigentümer 40-55]"
      segment_b: "[z.B. Eigentümer 55+]"
      dimension: "[Worin unterscheiden sie sich?]"
      finding: "[Was haben wir gefunden?]"
      implication: "[Was bedeutet das für Targeting?]"

  new_segment_insights:
    - segment: "[...]"
      insight: "[...]"
      recommended_approach: "[...]"

# =============================================================================
# KONTEXT-INTERAKTIONEN
# =============================================================================
context_interaction_learnings:
  confirmed_interactions:
    - factors: ["[Factor A]", "[Factor B]"]
      interaction_type: "moderating | mediating | additive"
      direction: "positive | negative"
      strength: "[...]"
      evidence: "[...]"

  new_interactions_discovered:
    - factors: ["[Factor A]", "[Factor B]"]
      interaction_type: "[...]"
      description: "[Beschreibung der Interaktion]"
      evidence: "[...]"
      implication: "[Bedeutung für Modellierung]"

# =============================================================================
# METHODISCHE LEARNINGS
# =============================================================================
methodological_learnings:
  measurement_insights:
    - measure: "[Was wurde gemessen?]"
      insight: "[Was haben wir über die Messung gelernt?]"
      recommendation: "[Empfehlung für zukünftige Messungen]"

  design_insights:
    - aspect: "[Aspekt des Studiendesigns]"
      insight: "[...]"
      recommendation: "[...]"

# =============================================================================
# EMPFEHLUNGEN
# =============================================================================
recommendations:
  for_bfe:
    - area: "[Bereich]"
      recommendation: "[Konkrete Empfehlung]"
      priority: "high | medium | low"
      evidence_basis: "[Worauf basiert die Empfehlung?]"

  for_future_projects:
    - topic: "[Thema]"
      recommendation: "[...]"
      rationale: "[...]"

  for_context_vectors:
    - vector: "MESO | MAKRO | MIKRO"
      recommendation: "[Was sollte aktualisiert werden?]"
      priority: "high | medium | low"

# =============================================================================
# PROPAGATION TRACKING
# =============================================================================
propagation_tracking:
  description: |
    Tracking der Propagation von Learnings in die Kontextvektoren.

  propagation_log:
    - date: "YYYY-MM-DD"
      target: "BCM2_MESO_ENERGY_CH"
      update_type: "new_factor | parameter_update"
      details: "[...]"
      propagated_by: "[Name]"
      verified_by: "[Name]"

# =============================================================================
# ZUSAMMENFASSUNG
# =============================================================================
summary:
  key_learnings:
    - "[Learning 1 in einem Satz]"
    - "[Learning 2 in einem Satz]"
    - "[Learning 3 in einem Satz]"

  impact_on_ebf:
    - "[Wie beeinflusst dieses Projekt das EBF Framework?]"

  next_steps:
    - "[Was sollte als nächstes getan werden?]"

# =============================================================================
# REVIEW & SIGN-OFF
# =============================================================================
review:
  internal_review:
    reviewer: "[Name]"
    date: "YYYY-MM-DD"
    comments: "[...]"

  bfe_sign_off:
    reviewer: "[Name]"
    date: "YYYY-MM-DD"
    approved: true | false
    comments: "[...]"
