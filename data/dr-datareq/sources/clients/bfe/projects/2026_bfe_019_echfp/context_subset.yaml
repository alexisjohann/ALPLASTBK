# =============================================================================
# MAKRO-Faktoren (aus BCM2_04_KON v1.2)
# =============================================================================
makro_factors:
  description: |
    Schweiz-weite Kontextfaktoren für BFE_019_ECHfP.
    v1.2: Inkl. neuer BFE-spezifischer Faktoren (EIG, BLD, HZG).

  # WHO-relevant: Eigentümerstruktur
  eigentum:
    - factor_id: CH-EIG-01
      name: "Wohneigentumsquote"
      value_2025: 37.0%
      source: "BFS GWS"
      project_relevance: "Grundlage für WHO-Segmentierung (36-38% Eigentümer)"
      psi_mapping: kappa_INST

    - factor_id: CH-EIG-02
      name: "Eigentümer EFH"
      value_2025: "1.09 Mio"
      source: "BFS GWS"
      project_relevance: "WHO Segment 1: hohe Entscheidungsautonomie, direkte Ansprache"
      psi_mapping: kappa_INST

    - factor_id: CH-EIG-03
      name: "Eigentümer MFH"
      value_2025: "202k"
      source: "BFS GWS"
      project_relevance: "WHO Segment 2: mittlere Autonomie, Verwaltungs-Gatekeeper"
      psi_mapping: kappa_INST

    - factor_id: CH-EIG-04
      name: "Stockwerkeigentümer"
      value_2025: "495k"
      source: "BFS GWS"
      project_relevance: "WHO Segment 3: niedrige Autonomie, STWE-Versammlung als Hürde"
      psi_mapping: kappa_INST

    - factor_id: CH-EIG-05
      name: "STWE-Entscheidungskomplexität"
      value_2025: "9.5 Einheiten/Gemeinschaft"
      source: "BFS / HEV"
      project_relevance: "Koordinationsproblem bei M1 (Gesamtmodernisierung)"
      psi_mapping: kappa_KOL

  # WHEN-Trigger: Entscheidungsmomente
  trigger:
    - factor_id: CH-EIG-06
      name: "Immobilien-Erbschaften"
      value_2025: "34'000 p.a."
      source: "ESTV"
      project_relevance: "WHEN-Trigger: Erbschaft = Opportunity Window 3-6 Monate"
      psi_mapping: kappa_TEMP

    - factor_id: CH-EIG-07
      name: "Immobilien-Transaktionen"
      value_2025: "90'000 p.a."
      source: "BFS"
      project_relevance: "WHEN-Trigger: Hauskauf = Opportunity Window 3-6 Monate"
      psi_mapping: kappa_TEMP

    - factor_id: CH-HZG-01
      name: "Heizungs-Ersatzzyklen"
      value_2025: "21.5 Jahre"
      source: "Suissetec"
      project_relevance: "WHEN-Berechnung: Wann wird Heizung ersetzt?"
      psi_mapping: kappa_TEMP

    - factor_id: CH-HZG-02
      name: "Notfall-Ersatz-Quote"
      value_2025: "55%"
      source: "BFE"
      project_relevance: "WHEN: 55% ungeplant = nur 2-4 Wochen Opportunity Window"
      psi_mapping: kappa_TEMP

  # WHAT: Gebäudebestand (Ausgangslage)
  gebaeudebestand:
    - factor_id: CH-BLD-01
      name: "Gebäudealtersstruktur"
      value_2025: "55.5% vor 1980"
      source: "BFS GWS"
      project_relevance: "WHAT: Sanierungspotenzial für M1-M3"
      psi_mapping: kappa_AWX

    - factor_id: CH-BLD-02
      name: "Energetische Sanierungsrate"
      value_2025: "1.2% p.a."
      source: "BFE / Wüest Partner"
      project_relevance: "WHAT: Baseline - Ziel ist Erhöhung auf 2-3%"
      psi_mapping: kappa_AWX

    - factor_id: CH-BLD-03
      name: "Heizungstypen-Verteilung fossil"
      value_2025: "52.5%"
      source: "BFE / BFS"
      project_relevance: "WHAT M2: Fossile Heizungen = Zielpopulation"
      psi_mapping: kappa_AWX

    - factor_id: CH-HZG-03
      name: "Fossile Heizungen Bestand"
      value_2025: "845'000 Anlagen"
      source: "BFE"
      project_relevance: "WHAT M2: Absolute Zielgrösse"
      psi_mapping: kappa_AWX

    - factor_id: CH-HZG-04
      name: "Jährlicher Heizungsersatz-Bedarf"
      value_2025: "44'000 p.a."
      source: "BFE / Suissetec"
      project_relevance: "WHAT M2: Jährliches Zielpublikum"
      psi_mapping: kappa_AWX

  # HOW: Umsetzungskapazität
  kapazitaet:
    - factor_id: CH-BLD-04
      name: "Wärmepumpen-Marktanteil"
      value_2025: "68%"
      source: "FWS"
      project_relevance: "HOW M2: Aktuelle Wechselquote zu erneuerbar"
      psi_mapping: kappa_ARCH

    - factor_id: CH-BLD-05
      name: "Installateur-/Handwerkerkapazität"
      value_2025: "Ratio 1.02"
      source: "Suissetec"
      project_relevance: "HOW: Bottleneck für alle Module"
      psi_mapping: kappa_INST

    - factor_id: CH-BLD-06
      name: "Wärmepumpen-Installationswartezeit"
      value_2025: "18 Wochen"
      source: "FWS"
      project_relevance: "HOW M2: Umsetzungshindernis, Frustrationspotenzial"
      psi_mapping: kappa_TEMP

  # AWARE: Information & Beratung
  awareness:
    - factor_id: CH-BLD-07
      name: "GEAK-Durchdringung"
      value_2025: "16.5%"
      source: "GEAK / Kantone"
      project_relevance: "AWARE: Wie viele kennen ihren Gebäudezustand?"
      psi_mapping: kappa_AWX

    - factor_id: CH-BLD-08
      name: "Impulsberatungen durchgeführt"
      value_2025: "21'000 p.a."
      source: "BFE"
      project_relevance: "AWARE: Direkter BFE-Kanal - zu skalieren"
      psi_mapping: kappa_AWX

  # KPI: Zielerreichung
  kpi:
    - factor_id: CH-HZG-05
      name: "Fossil-zu-Erneuerbar Wechselrate"
      value_2025: "65%"
      source: "BFE / Kantone"
      project_relevance: "Primary KPI: Hauptziel der Kampagne"
      psi_mapping: kappa_AWX

# =============================================================================
# MESO-Faktoren (aus BCM2_MESO_ENERGY_CH)
# =============================================================================
meso_factors:
  description: "Auto-selektiert für 5 Module (M1-M5)"

  # M1: Energetische Gesamtmodernisierung
  M1_gesamtmodernisierung:
    - factor_id: ENE-REG-04
      name: "Gebäudeprogramm (Förderbeiträge)"
      project_relevance: "M1: Förderlandschaft kommunizieren"
      psi_mapping: kappa_ARCH

    - factor_id: ENE-REG-05
      name: "Minergie-/GEAK-Standards"
      project_relevance: "M1: Zielstandards definieren"
      psi_mapping: kappa_SOCIAL

    - factor_id: ENE-PSY-10
      name: "Entscheidungsmüdigkeit Energie"
      salienz: 0.64
      project_relevance: "M1: Vereinfachung als Strategie"
      psi_mapping: kappa_KOG

  # M2: Heizungsersatz und Warmwasser
  M2_heizung:
    - factor_id: ENE-REG-06
      name: "Heizungsersatz-Pflichten"
      project_relevance: "M2: Kantonale Vorschriften kommunizieren"
      psi_mapping: kappa_INST

    - factor_id: ENE-PSY-02
      name: "Heizungs-Identität"
      salienz: 0.68
      project_relevance: "M2: Endowment Effect adressieren"
      psi_mapping: kappa_IDN

    - factor_id: ENE-ECO-02
      name: "Heizöl-Strom-Preisrelation"
      project_relevance: "M2: Wirtschaftlichkeit kommunizieren"
      psi_mapping: kappa_INST

    - factor_id: ENE-PSY-05
      name: "Technologie-Vertrautheit"
      salienz: 0.58
      project_relevance: "M2: Wärmepumpe 'normalisieren'"
      psi_mapping: kappa_KOG

  # M3: Gebäudehülle und Dämmung
  M3_daemmung:
    - factor_id: ENE-ECO-06
      name: "Immobilienwert Energie-Premium"
      current_value: "5-15%"
      project_relevance: "M3: Wertsteigerung als Argument"
      psi_mapping: kappa_FRM

    - factor_id: ENE-PSY-03
      name: "Mental Accounting Energie"
      salienz: 0.55
      project_relevance: "M3: Investment vs. Kosten Framing"
      psi_mapping: kappa_FRM

  # M4: Solarenergie
  M4_solar:
    - factor_id: ENE-REG-02
      name: "Einspeisevergütung (KEV/EIV)"
      project_relevance: "M4: Förderung kommunizieren"
      psi_mapping: kappa_INST

    - factor_id: ENE-SOC-01
      name: "Nachbarschafts-Norm Solar"
      salienz: 0.72
      project_relevance: "M4: Social Proof als Haupthebel"
      psi_mapping: kappa_SOCIAL

    - factor_id: ENE-ECO-03
      name: "Solar-Investitions-Payback"
      current_value: "10-12 Jahre"
      project_relevance: "M4: ROI kommunizieren"
      psi_mapping: kappa_FRM

  # M5: Elektromobilität
  M5_emobility:
    - factor_id: ENE-SOC-02
      name: "E-Auto-Norm"
      salienz: 0.65
      project_relevance: "M5: Social Proof nutzen"
      psi_mapping: kappa_SOCIAL

    - factor_id: ENE-PSY-05
      name: "Technologie-Vertrautheit"
      salienz: 0.58
      project_relevance: "M5: E-Auto als 'normal' positionieren"
      psi_mapping: kappa_KOG

# =============================================================================
# PSI-Summary
# =============================================================================
psi_summary:
  description: "Übersicht der Ψ-Dimensionen nach Modul"

  primary_dimensions:
    - dimension: kappa_INST
      factors_count: 8
      modules: [M1, M2, M3]
      intervention_approach: "Regulatorische Rahmenbedingungen und Förderung kommunizieren"

    - dimension: kappa_AWX
      factors_count: 7
      modules: [M1, M2, M3, M4, M5]
      intervention_vector_emphasis: {I_AWARE: 0.35}
      intervention_approach: "Hohe I_AWARE Komponente - Information und Awareness erhöhen"

  secondary_dimensions:
    - dimension: kappa_SOCIAL
      factors_count: 4
      modules: [M1, M4, M5]
      intervention_vector_emphasis: {I_WHAT: 0.30}  # u_S Gewichtung innerhalb WHAT
      intervention_approach: "Hohe I_WHAT Komponente (u_S) - Social Proof und Normen aktivieren"

    - dimension: kappa_TEMP
      factors_count: 5
      modules: [M2]
      intervention_approach: "Timing optimieren, Trigger-Momente nutzen"

    - dimension: kappa_FRM
      factors_count: 3
      modules: [M3, M4]
      intervention_approach: "Investment-Framing statt Kosten-Framing"

