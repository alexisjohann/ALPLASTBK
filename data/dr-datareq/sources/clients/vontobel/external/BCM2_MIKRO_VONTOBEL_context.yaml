    name: "Wealth Transfer / Succession"
    description: "Vermoegensuebertragung und Nachfolgeplanung"
    target_groups: ["TG-01", "TG-02", "TG-06"]
    10c_dimensions:
      WHAT: "Vermögenserhalt, Familienwerte, Steueroptimierung"
      WHEN: "Lebensphasen-Trigger (65+, Gesundheit, Familienereignisse)"
      WHO: "Mehrere Generationen, Family Governance"
    behavioral_levers:
      - lever: "Loss Framing"
        description: "Potenzielle Verluste durch fehlende Planung"
        expected_effect: 0.25
      - lever: "Legacy Motivation"
        description: "Bedeutung fuer naechste Generation"
        expected_effect: 0.30
      - lever: "Expert Authority"
        description: "Familienkompetenz Vontobel"
        expected_effect: 0.20

  - id: "INT-DOM-02"
    name: "Quality Growth Investing"
    description: "Aktives Investment in Qualitaetsunternehmen"
    target_groups: ["TG-02", "TG-03"]
    10c_dimensions:
      WHAT: "Langfristige Rendite, Risikoreduktion"
      HOW: "Aktives Management, Research-basiert"
      AWARE: "Track Record, Performance Attribution"
    behavioral_levers:
      - lever: "Expert Social Proof"
        description: "Langjaehriger Track Record"
        expected_effect: 0.25
      - lever: "Complexity Reduction"
        description: "Quality-Faktor vereinfacht Entscheidung"
        expected_effect: 0.20
      - lever: "Long-term Framing"
        description: "Zeitliche Perspektive betonen"
        expected_effect: 0.15

  - id: "INT-DOM-03"
    name: "Strukturierte Produkte"
    description: "Massgeschneiderte Anlageloesungen"
    target_groups: ["TG-04", "TG-05"]
    10c_dimensions:
      WHAT: "Renditeoptimierung, Risikomanagement"
      HOW: "deritrade Plattform, Custom Products"
      WHERE: "Digital Self-Service + Beratung"
    behavioral_levers:
      - lever: "Customization Appeal"
        description: "Massgeschneiderte Loesungen"
        expected_effect: 0.20
      - lever: "Platform Convenience"
        description: "Einfacher Zugang via deritrade"
        expected_effect: 0.25
      - lever: "Risk Visualization"
        description: "Klare Risiko-Rendite Darstellung"
        expected_effect: 0.15

  - id: "INT-DOM-04"
    name: "Digital Wealth (Volt)"
    description: "Digitale Vermoegensverwaltung"
    target_groups: ["TG-02", "TG-06"]
    10c_dimensions:
      WHAT: "Goal-based Investing, ESG-Integration"
      HOW: "Robo + Hybrid Advisory"
      WHEN: "Einstieg, Zielsparen"
    behavioral_levers:
      - lever: "Goal Setting"
        description: "Konkrete Ziele definieren"
        expected_effect: 0.30
      - lever: "Progress Feedback"
        description: "Regelmaessige Fortschritts-Updates"
        expected_effect: 0.25
      - lever: "Simplification"
        description: "Reduzierte Entscheidungskomplexitaet"
        expected_effect: 0.20

  - id: "INT-DOM-05"
    name: "ESG / Sustainable Investing"
    description: "Nachhaltige Anlagestrategien"
    target_groups: ["TG-01", "TG-02", "TG-03", "TG-06"]
    10c_dimensions:
