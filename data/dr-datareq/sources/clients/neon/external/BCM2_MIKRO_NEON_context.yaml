# =============================================================================
# FAZIT
# =============================================================================
conclusion:
  insight: |
    Neon hat eine starke Position im Schweizer Neobank-Markt:
    Als fuehrende Schweizer Neobank kombiniert sie lokales Vertrauen
    mit exzellenter User Experience und transparentem Pricing.

    Die Hauptchance liegt in der Aktivierung der Schweizer Bevoelkerung
    fuer digitales Banking - viele potenzielle Nutzer sind noch
    bei traditionellen Banken oder nutzen Neon nur als Zweitkonto.

    Verhaltensorientierte Interventionen sollten auf drei Hebel setzen:
    1. Vereinfachung (noch weniger Friction)
    2. Trust-Building (Swiss + Partner + Track Record)
    3. Identitaet (Digital Native + Sustainability)

  neon_principle: |
    "Banking. But simple." - In allem, was wir tun.
