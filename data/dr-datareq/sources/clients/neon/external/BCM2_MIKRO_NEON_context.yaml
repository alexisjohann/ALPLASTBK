# =============================================================================
# KONTEXT-RELEVANZ-MAPPING (aus MAKRO Schweiz)
# =============================================================================
context_relevance:
  description: |
    Mapping der relevantesten Kontextfaktoren aus MAKRO (Schweiz)
    fuer Neon-spezifische Interventionen.

  high_relevance_makro:
    - factor_id: "CH-TEC-01"
      name: "Smartphone-Penetration"
      value: 0.92
      neon_relevance: |
        Hohe Smartphone-Durchdringung = Basis fuer Mobile-only Modell.
        CH als idealer Markt fuer Neobanking.

    - factor_id: "CH-TEC-03"
      name: "Mobile Payment Adoption"
      value: 0.58
      neon_relevance: |
        Wachsende Mobile Payment Nutzung = Neon-Wachstumstreiber.
        Apple Pay, Google Pay Integration ist Hygienefaktor.

    - factor_id: "CH-SOC-01"
      name: "Institutionenvertrauen"
      value: 0.72
      neon_relevance: |
        Hohes Vertrauen braucht Zeit aufzubauen.
        Swiss-Label hilft, aber keine Staatsgarantie.

    - factor_id: "CH-SOC-09"
      name: "Digitalisierungsoffenheit"
      value: 0.65
      neon_relevance: |
        Offenheit fuer digitale Dienste = Grundvoraussetzung.
        Generationenunterschiede beachten.

    - factor_id: "CH-ECO-07"
      name: "Preisbewusstsein"
      value: 0.70
      neon_relevance: |
        Schweizer vergleichen Preise = Vorteil fuer Neon (kostenlos).
        Transparenz ist Differenzierungsmerkmal.

    - factor_id: "CH-TEC-05"
      name: "Fintech-Akzeptanz"
      value: 0.55
      neon_relevance: |
        Wachsende Akzeptanz von Fintechs, aber noch Potenzial.
        Vertrauen muss aktiv aufgebaut werden.

    - factor_id: "CH-SOC-12"
      name: "Nachhaltigkeitsbewusstsein"
      value: 0.68
      neon_relevance: |
        Steigendes Nachhaltigkeitsbewusstsein = Neon Green Potenzial.
        Besonders bei juengeren Zielgruppen relevant.

# =============================================================================
# INTERVENTION DOMAINS
# =============================================================================
intervention_domains:
  description: |
    Hauptinterventionsfelder fuer Neon,
    gemappt auf EBF-Dimensionen.

  domains:
    - id: "INT-ONBOARDING"
      name: "Onboarding Optimization"
      description: "Konversion und Aktivierung neuer Nutzer maximieren"

      target_10c: "AWARE + READY"
      delta_target: "Onboarding Completion Rate steigern"

      key_message: |
        "In 10 Minuten zum kostenlosen Konto - einfacher geht's nicht."

      intervention_types:
        - type: "T3_ChoiceArchitecture"
          examples:
            - "Vereinfachter Onboarding-Flow"
            - "Progressive Disclosure"
            - "Smart Defaults"

        - type: "T1_Information"
          examples:
            - "Klare Fortschrittsanzeige"
            - "Benefit-Kommunikation"
            - "Swiss Trust Messaging"

    - id: "INT-ENGAGEMENT"
      name: "User Engagement"
      description: "Nutzungsfrequenz und -tiefe erhoehen"

      target_10c: "HOW + WHEN"
      delta_target: "DAU/MAU Ratio steigern"

      key_message: |
        "Dein Banking-Alltag, nur einfacher."

      intervention_types:
        - type: "T3_ChoiceArchitecture"
          examples:
            - "Push-Notifications (smart)"
            - "Spaces fuer Sparziele"
            - "Spending Insights"

        - type: "T6_Social"
          examples:
            - "Split Bill Feature"
            - "Referral Program"

    - id: "INT-MONETIZATION"
      name: "Premium Conversion"
      description: "Free-to-Premium Konversion steigern"

      target_10c: "WHAT + AWARE"
      delta_target: "Premium Subscription Rate erhoehen"

      key_message: |
        "Neon Green: Banking mit Gewissen. Neon Metal: Banking mit Stil."

      intervention_types:
        - type: "T1_Information"
          examples:
            - "Feature-Vergleich"
            - "CO2-Impact zeigen (Green)"
            - "Trial-Angebote"

        - type: "T5_Identity"
          examples:
            - "Nachhaltigkeit als Identitaet (Green)"
            - "Premium-Identitaet (Metal)"

    - id: "INT-REFERRAL"
      name: "Viral Growth"
      description: "Weiterempfehlung und organisches Wachstum"

      target_10c: "WHO + HOW"
      delta_target: "Referral Rate und Viral Coefficient steigern"

      key_message: |
        "Banking weiterempfehlen? Bei Neon macht das Spass."

      intervention_types:
        - type: "T2_Incentive"
          examples:
            - "Referral Bonus"
            - "Gamification"

        - type: "T6_Social"
          examples:
            - "Social Sharing"
            - "Community Building"

