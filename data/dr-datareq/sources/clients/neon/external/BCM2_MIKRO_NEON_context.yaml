# =============================================================================
# STRATEGIE
# =============================================================================
strategy:
  name: "Simplicity First"
  positioning: "Die beste Smartphone-Bank der Schweiz"

  vision: |
    Banking so einfach wie es sein sollte.
    Transparente, kostenlose und intuitive Bankloesungen
    fuer die digital-affine Schweizer Bevoelkerung.

  unique_value_proposition: |
    Neon bietet kostenloses Banking mit der besten User Experience.
    Als Schweizer Neobank kombinieren wir lokales Vertrauen mit
    globaler Fintech-Innovation. Keine versteckten Gebuehren,
    keine Komplexitaet – nur Banking, aber einfach.

  financial_targets:
    growth_strategy: "Product-led Growth + Viral/Referral"
    path_to_profitability: "2026-2027"
    customer_target_2027: 500000

  strategic_pillars:
    - id: "S1-GROWTH"
      name: "Kundenwachstum"
      description: "Kundenbasis in der Schweiz signifikant ausbauen"
      weight: 0.35
      initiatives:
        - "Referral-Programm optimieren"
        - "Brand Awareness steigern"
        - "Conversion-Rate verbessern"

    - id: "S2-MONETIZATION"
      name: "Monetarisierung"
      description: "Break-Even durch Premium-Features und FX erreichen"
      weight: 0.25
      initiatives:
        - "Premium-Conversion steigern (Green, Metal)"
        - "FX-Volumen erhoehen"
        - "Partner-Revenue ausbauen"

    - id: "S3-PRODUCT"
      name: "Produkterweiterung"
      description: "Neue Features und Produkte lancieren"
      weight: 0.25
      initiatives:
        - "Investment-Features (ETF-Sparplaene)"
        - "Kredit-Produkte evaluieren"
        - "Versicherungs-Integration"

    - id: "S4-SUSTAINABILITY"
      name: "Nachhaltigkeit"
      description: "Neon Green als Differenzierungsmerkmal ausbauen"
      weight: 0.15
      initiatives:
        - "CO2-Tracking verbessern"
        - "Nachhaltige Investments erweitern"
        - "Community-Building"

  competitive_position:
    current_rank: "Fuehrende Schweizer Neobank"
    unique_differentiator: "100% kostenlos + Beste UX + Schweizer Herkunft"
    benchmark_peers:
