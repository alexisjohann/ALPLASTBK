    - "Regionale Identität bleibt stark → Identitätsnutzen differenzieren"

# =============================================================================
# FAZIT
# =============================================================================
conclusion:
  insight: |
    Die Schweiz 2040 ist älter, vielfältiger und stärker kontextabhängig
    in ihren Entscheidungslogiken. Vertrauen entsteht weniger über Produkte,
    sondern über die Anschlussfähigkeit zu Lebensrealitäten.

  ubs_principle: |
    "Vertrauen ≙ Anschlussfähigkeit an pluralistische Lebenswelten"
