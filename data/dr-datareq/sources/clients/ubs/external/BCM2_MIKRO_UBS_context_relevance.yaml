strategic_implications:
  demographic:
    - "Wachstum konzentriert auf urbane Kantone (ZH, VD, GE, BE, AG, SG)"
    - "Höhere Dichte, mehr Wettbewerb, steigende Vermögensdiversität"
    - "Nachfrage nach stabilitäts- und sicherheitsorientierten Angeboten"
    - "Liquiditätsverschiebung von Konsum zu Kapitalbewahrung"

  migration:
    - "Mehrkulturelle Entscheidungslogiken"
    - "Vertrauensbildung über kollektiven Nutzen (Fairness, Verantwortung)"
    - "Kommunikationsarchitekturen kontextadaptiv (sprachlich, kulturell)"

  household:
    - "Finanzplanung von 'Familieneinheit' zu 'individuelle Lebenspfade'"
    - "Lebensphasenbanking gewinnt strategisch an Bedeutung"

  regional:
