metadata:
  module_id: "BCM2_MIKRO_VALIANT"
  customer: "Valiant Bank AG"
  version: "1.0.0"
  last_updated: "2026-01-27"
  ebf_compatibility: "10C-v2.0"

# =============================================================================
# CUSTOMER CHARACTERISTICS
# =============================================================================

customer_profile:
  sector: "Financial Services"
  sub_sector: "Retailbanken"
  ownership: "Publikumsgesellschaft (SIX: VATN)"
  staatsgarantie: false

  key_differentiators:
    - id: "DIFF-01"
      name: "Keine Staatsgarantie"
      behavioral_impact: "Hoheres Risikobewusstsein, Marktdisziplin"
      lambda_modifier: 1.10  # Erhoht lambda um 10%

    - id: "DIFF-02"
      name: "Naher dran Positionierung"
      behavioral_impact: "Personliche Beziehung, Vertrauensaufbau"
      tau_modifier: 1.15  # Erhoht tau um 15%

    - id: "DIFF-03"
      name: "Grosste reine Retailbank"
      behavioral_impact: "Social Proof, Marktfuhrer-Signal"
      sigma_modifier: 1.10  # Erhoht sigma um 10%

    - id: "DIFF-04"
      name: "Flachendeckende Prasenz (100 Standorte)"
      behavioral_impact: "Accessibility, Convenience"
      accessibility_score: 0.85

    - id: "DIFF-05"
      name: "Eigenheimfinanzierung Spezialisierung"
      behavioral_impact: "Kompetenz-Signal, Vertrauen"
      expertise_score: 0.90

    - id: "DIFF-06"
      name: "Regionale Verankerung (9 Kantone)"
      behavioral_impact: "Lokale Identifikation, In-Group-Effekt"
      regional_trust: 0.80

# =============================================================================
# TARGET GROUPS
# =============================================================================

target_groups:
  - id: "TG-01"
    name: "Eigenheimbesitzer Mittelland"
    size_estimate: 120000
    characteristics:
      - "Hypothekarkunden"
      - "Sicherheitsorientiert"
      - "Langfristige Beziehung"
    behavioral_profile:
      loss_aversion: 2.35
      present_bias: 0.88
      social_norm_sensitivity: 0.70
      trust_in_bank: 0.82
    priority: "high"

  - id: "TG-02"
    name: "Mittelstand Privatkunden"
    size_estimate: 280000
    share_of_region: 0.10
    characteristics:
      - "Spareinlagen-orientiert"
      - "Vorsorge-interessiert"
      - "Lokal verbunden"
    behavioral_profile:
      loss_aversion: 2.25
      present_bias: 0.85
      social_norm_sensitivity: 0.72
      trust_in_bank: 0.80
    priority: "high"

  - id: "TG-03"
    name: "Mittelstand KMU"
    size_estimate: 35000
    characteristics:
      - "Lokale Unternehmen"
      - "Beziehungsorientiert"
      - "Kreditbedarf"
    behavioral_profile:
      loss_aversion: 2.50
      present_bias: 0.82
      relationship_preference: 0.85
      digital_affinity: 0.55
    priority: "high"

  - id: "TG-04"
    name: "Vorsorgekunden"
    size_estimate: 60000
    characteristics:
      - "3a/3b Sparer"
      - "Steueroptimierung"
      - "Langfristig orientiert"
    behavioral_profile:
      loss_aversion: 2.0
      present_bias: 0.78
      tax_sensitivity: 0.85
      advice_seeking: 0.75
    priority: "high"

  - id: "TG-05"
    name: "Junge Erwachsene (18-35)"
    size_estimate: 88000
    characteristics:
      - "Digital affin"
      - "Mobile Banking Nutzer"
      - "Erstes Eigenheim als Ziel"
    behavioral_profile:
      loss_aversion: 1.7
      present_bias: 0.75
      digital_preference: 0.85
      homeownership_aspiration: 0.70
    priority: "high"

  - id: "TG-06"
    name: "Senioren (65+)"
    size_estimate: 96000
    characteristics:
      - "Beratungsintensiv"
      - "Filialpraferenz"
      - "Nachfolgeplanung"
    behavioral_profile:
      loss_aversion: 2.8
      present_bias: 0.92
      digital_affinity: 0.35
      personal_advice_preference: 0.90
    priority: "medium"

# =============================================================================
# INTERVENTION DOMAINS
# =============================================================================

intervention_domains:
  - id: "INT-DOM-01"
    name: "Eigenheimfinanzierung"
    description: "Hypotheken und Wohneigentum"
    target_groups: ["TG-01", "TG-05"]
    10c_dimensions:
      WHAT: "Wohneigentum, Sicherheit, Lebensqualitat"
      WHEN: "Lebensphasen (Familiengründung, Umzug)"
      WHERE: "Filiale + Online-Rechner"
    behavioral_levers:
      - lever: "Trust Through Proximity"
        description: "Naher dran - Personliche Beratung vor Ort"
        expected_effect: 0.25
      - lever: "Anchoring"
        description: "Regionale Vergleichszinsen zeigen"
        expected_effect: 0.12
      - lever: "Default Setting"
        description: "Empfohlene Amortisationsrate als Standard"
        expected_effect: 0.18
      - lever: "Simplification"
        description: "Online Hypothekenrechner"
        expected_effect: 0.15

  - id: "INT-DOM-02"
    name: "Vorsorge 3a/3b"
    description: "Private Altersvorsorge"
    target_groups: ["TG-02", "TG-04", "TG-05"]
    10c_dimensions:
      WHAT: "Finanzielle Sicherheit im Alter"
      WHEN: "Jahresende (Steueroptimierung)"
      AWARE: "Steuervorteil-Kommunikation"
    behavioral_levers:
      - lever: "Loss Framing"
        description: "Entgangene Steuervorteile betonen"
        expected_effect: 0.28
      - lever: "Deadline Salience"
        description: "31.12. als Einzahlungsfrist betonen"
        expected_effect: 0.20
      - lever: "Social Proof"
        description: "X% der Schweizer:innen nutzen 3a"
        expected_effect: 0.12
      - lever: "Simplification"
        description: "Einfache Einrichtung, automatische Einzahlung"
        expected_effect: 0.18

  - id: "INT-DOM-03"
    name: "KMU-Finanzierung"
    description: "Geschaftskredite und Betriebsmittel"
    target_groups: ["TG-03"]
    10c_dimensions:
      WHAT: "Liquiditat, Wachstum, Stabilitat"
      WHEN: "Investitionszyklen, Saisonbedarf"
      WHERE: "Personlicher Firmenkundenberater"
    behavioral_levers:
      - lever: "Relationship Banking"
        description: "Fester Ansprechpartner, langfristige Beziehung"
        expected_effect: 0.28
      - lever: "Expert Framing"
        description: "Branchenkenntnis der Berater"
        expected_effect: 0.15
      - lever: "Flexibility Signaling"
        description: "Massgeschneiderte Losungen betonen"
        expected_effect: 0.12

  - id: "INT-DOM-04"
    name: "Digital Banking Adoption"
    description: "Migration zu Mobile Banking / e-Banking"
    target_groups: ["TG-01", "TG-02", "TG-05", "TG-06"]
    10c_dimensions:
      WHAT: "Convenience, Zeitersparnis"
      HOW: "Schrittweise Einfuhrung, Support"
      AWARE: "Funktions-Demonstrationen"
    behavioral_levers:
      - lever: "Guided Onboarding"
        description: "In-Filiale Demo + Follow-up durch Berater"
        expected_effect: 0.30
      - lever: "Social Norm"
        description: "X% nutzen bereits Mobile Banking"
        expected_effect: 0.15
      - lever: "Feature Highlighting"
        description: "QR-Rechnung scannen als Einstieg"
        expected_effect: 0.20
      - lever: "Hybrid Approach"
        description: "Digital + personlich kombiniert (Naher dran)"
        expected_effect: 0.18

  - id: "INT-DOM-05"
    name: "Cross-Selling Vorsorge"
    description: "Vorsorgepenetration bei Hypothekarkunden"
    target_groups: ["TG-01", "TG-04"]
    10c_dimensions:
      WHAT: "Ganzheitliche Finanzplanung"
      WHEN: "Hypotheken-Review, Lebensereignisse"
      WHO: "Bestehende Hypothekarkunden"
    behavioral_levers:
      - lever: "Bundling"
        description: "Hypothek + 3a + Versicherung als Paket"
        expected_effect: 0.22
      - lever: "Expert Advice"
        description: "Personliche Finanzplanung anbieten"
        expected_effect: 0.18
      - lever: "Loss Framing"
        description: "Lucken in der Vorsorge aufzeigen"
        expected_effect: 0.15

# =============================================================================
# CONTEXT MODIFIERS
# =============================================================================

context_modifiers:
  # Regionale Modifikatoren
  regional:
    - id: "REG-01"
      name: "Berner Identitat"
      factor: 1.15
      applies_to: ["TG-01", "TG-02"]
      description: "Starkere Wirkung lokaler Social Proof in Bern"

    - id: "REG-02"
      name: "Expansionsgebiete (ZH, VD)"
      factor: 0.90
      applies_to: "all"
      description: "Schwachere Markenbekanntheit in neuen Kantonen"

    - id: "REG-03"
      name: "Mittelland-Differenzierung"
      bern_factor: 1.10
      solothurn_factor: 1.05
      aargau_factor: 1.00
      fribourg_factor: 0.95
      applies_to: "all"
      description: "Regionale Unterschiede im Mittelland"

  # Institutionelle Modifikatoren
  institutional:
    - id: "INST-01"
      name: "Publikumsgesellschaft-Effekt"
      transparency_boost: 0.15
      trust_baseline: 0.80
      applies_to: "all"
      description: "Borsennotierung als Qualitatssignal"

    - id: "INST-02"
      name: "Moodys A1 Rating"
      quality_signal: 0.18
      security_perception: 0.20
      applies_to: "all"
      description: "Rating als Stabilitatssignal"

    - id: "INST-03"
      name: "Keine Staatsgarantie"
      loss_aversion_increase: 0.10
      market_discipline: 0.15
      applies_to: "all"
      description: "Erhohte Sensitivitat fur Stabilitat"

  # Digitale Modifikatoren
  digital:
    - id: "DIG-01"
      name: "Hybrid Praferenz"
      digital_only_penalty: -0.12
      hybrid_bonus: 0.15
      applies_to: ["TG-01", "TG-02", "TG-06"]
      description: "Naher dran = Kombination digital/personlich"

    - id: "DIG-02"
      name: "Digital Native Bonus"
      digital_only_bonus: 0.18
      applies_to: ["TG-05"]
      description: "Junge Kunden bevorzugen digitale Losungen"

# =============================================================================
# STRATEGIC IMPLICATIONS
# =============================================================================

strategic_implications:
  opportunities:
    - id: "OPP-01"
      name: "Naher dran Monetarisierung"
      description: "Personliche Beratung als Differenzierungsmerkmal"
      priority: "high"
      estimated_impact: "Kundenbindung +15%"

    - id: "OPP-02"
      name: "Vorsorge-Penetration"
      description: "3a/3b Cross-Selling bei Hypothekarkunden"
      priority: "high"
      estimated_impact: "CHF 200 Mio Neugelder p.a."

    - id: "OPP-03"
      name: "Digital-Filial Integration"
      description: "Seamless Omnichannel-Erlebnis"
      priority: "high"
      estimated_impact: "C/I Ratio -2pp"

    - id: "OPP-04"
      name: "Expansionsgebiete"
      description: "Wachstum in ZH, VD, LU"
      priority: "medium"
      estimated_impact: "Marktanteil +1% in neuen Kantonen"

  risks:
    - id: "RISK-01"
      name: "Kantonalbank-Konkurrenz"
      description: "BEKB, LUKB mit Staatsgarantie im gleichen Markt"
      mitigation: "Beratungsqualitat und Proximitat betonen"
      probability: 0.70

    - id: "RISK-02"
      name: "Zinsmargen-Druck"
      description: "Hypothekengeschaft unter Druck"
      mitigation: "Provisionsgeschaft starken, Vorsorge ausbauen"
      probability: 0.80

    - id: "RISK-03"
      name: "Digital Disruption"
      description: "Neobanken gewinnen junge Kunden"
      mitigation: "Hybrid-Ansatz, Naher dran als Differenzierung"
      probability: 0.50

    - id: "RISK-04"
      name: "Demografischer Wandel"
      description: "Alterung der Kundenbasis"
      mitigation: "Junge Kunden gezielt ansprechen"
      probability: 0.60

# =============================================================================
# BCM2 MODULE COUPLING
# =============================================================================

bcm2_coupling:
  parent_modules:
    - "BCM2_04_KON_institutional_political"
    - "BCM2_04_KON_socio_cultural"
    - "BCM2_05_IND_individual"
    - "BCM2_04_KON_demographic"

  related_contexts:
    - module: "BCM2_MIKRO_BEKB"
      relationship: "peer"
      similarity: 0.80

    - module: "BCM2_MIKRO_LUKB"
      relationship: "peer"
      similarity: 0.70

    - module: "CH-REG-01"
      relationship: "macro"
      description: "Schweizer Staatserwartung"

    - module: "CH-SOC-01"
      relationship: "macro"
      description: "Schweizer Vertrauenskultur"

  data_flow:
    inputs:
      - "CH macro context parameters"
      - "Mittelland regional statistics"
      - "Valiant annual report data"
    outputs:
      - "Valiant-specific behavioral parameters"
      - "Intervention recommendations"
      - "Segment-specific modifiers"
