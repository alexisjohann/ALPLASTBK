  psi_dimensions:
    psi_I_institutional:
      value: 0.45
      description: |
        Off-Site = "andere Regeln" als Büroalltag.
        Hierarchie präsent (GL dabei), aber bewusst gelockert.
        Raum für offene Diskussion und Commitment.

    psi_S_social:
