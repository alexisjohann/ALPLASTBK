# =============================================================================
# FAZIT
# =============================================================================
conclusion:
  insight: |
    Die LUKB steht vor einer klassischen Change-Herausforderung:
    Eine erfolgreiche regionale Identität muss erweitert werden,
    ohne sie zu zerstören. Der Schlüssel liegt in "Sowohl-Als-Auch"
    statt "Entweder-Oder".

    Die 40 Kader sind Multiplikatoren für 1'181 Mitarbeitende.
    Ihre Überzeugung am Off-Site Day bestimmt die Umsetzungsenergie.

  lukb_principle: |
    "Luzerner Wurzeln + Schweizer Flügel = LUKB30"
