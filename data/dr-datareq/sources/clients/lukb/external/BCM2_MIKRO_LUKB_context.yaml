      value: 0.52
      description: |
        Kader haben Skin-in-the-Game durch Aktienprogramm.
        Bei Erfolg von LUKB30: persönlicher Vermögensgewinn.

    psi_F_physical:
      value: 0.70
      description: |
        Off-Site = physisch "raus" aus dem Alltag.
        Neutraler Boden = leichter neue Perspektiven anzunehmen.

# =============================================================================
# VERHALTENSÖKONOMISCHE PARAMETER
# =============================================================================
behavioral_parameters:
  description: |
    Verhaltensökonomische Parameter für Change-Interventionen bei Kadern.
    Basierend auf Literatur + LLMMC-Schätzung für Kontext.

  identity_parameters:
    identity_threat_sensitivity:
      symbol: "sigma_IDN"
      value: 0.68
      range: [0.55, 0.80]
      description: "Wie stark reagieren Kader auf wahrgenommene Identitätsbedrohung"
      source: "LLMMC + Akerlof/Kranton 2000"

    identity_extension_openness:
      symbol: "tau_EXT"
      value: 0.55
      range: [0.40, 0.70]
      description: "Bereitschaft, Identität zu ERWEITERN (nicht ersetzen)"
      source: "LLMMC + Organisationspsychologie"

  social_parameters:
    peer_influence_kader:
      symbol: "gamma_PEER"
      value: 0.72
      range: [0.60, 0.85]
      description: "Einfluss von Peer-Meinungen unter Kadern"
      source: "LLMMC + Social Identity Theory"

    gl_signaling_weight:
      symbol: "omega_GL"
      value: 0.78
      range: [0.65, 0.90]
      description: "Gewicht der GL-Signale für Kader-Verhalten"
      source: "LLMMC + Leadership Literature"

  commitment_parameters:
    public_commitment_binding:
      symbol: "kappa_COMMIT"
      value: 0.75
      range: [0.65, 0.85]
      description: "Bindungswirkung von öffentlichem Commitment"
      source: "Cialdini 2001, Commitment & Consistency"

    implementation_intention_effect:
      symbol: "delta_IMPL"
      value: 0.62
      range: [0.50, 0.75]
      description: "Effekt von konkreten Wenn-Dann-Plänen"
      source: "Gollwitzer 1999"

  ambition_parameters:
    self_efficacy_belief:
      symbol: "epsilon_EFF"
      value: 0.58
      range: [0.45, 0.70]
      description: "Glaube der Kader an eigene Wirksamkeit für LUKB30"
      source: "LLMMC + Bandura 1977"

    collective_efficacy_belief:
      symbol: "epsilon_COLL"
      value: 0.62
      range: [0.50, 0.75]
      description: "Glaube an kollektive Fähigkeit, Top 5 zu erreichen"
      source: "LLMMC + Bandura 2000"

# =============================================================================
# KONTEXT-RELEVANZ-MAPPING (aus MAKRO Schweiz)
# =============================================================================
context_relevance:
  description: |
    Mapping der relevantesten Kontextfaktoren aus MAKRO (Schweiz)
    für LUKB-spezifische Change-Interventionen.

  high_relevance_makro:
    - factor_id: "CH-SOC-01"
      name: "Institutionenvertrauen"
      value: 0.72
      lukb_relevance: |
        Hohes Vertrauen in Kantonalbanken = Asset.
        "Sichere Bank" Narrativ = Stabilität kommunizieren.

    - factor_id: "CH-REG-01"
      name: "Staatserwartung"
      value: 0.65
      lukb_relevance: |
        Staatsgarantie = Vertrauensvorschuss.
        Aber auch: Erwartung an öffentlichen Auftrag.

    - factor_id: "CH-SOC-12"
      name: "Regionalismus / Kantönligeist"
      value: 0.68
      lukb_relevance: |
        Luzerner Identität = stark verankert.
        "Wir sind Luzern" ≠ Problem, sondern Asset.
        Nationale Expansion = Ergänzung, nicht Ersatz.

    - factor_id: "CH-ECO-05"
      name: "Digitalisierungsbereitschaft Banking"
      value: 0.62
      lukb_relevance: |
        KI-Strategie (S3-DATA) = zeitgemäss.
        Kader müssen Digital Mindset mittragen.

    - factor_id: "CH-ARB-03"
      name: "Fachkräftemangel Finanzsektor"
      value: 0.58
      lukb_relevance: |
        "Top 5" Ambition = Arbeitgeberattraktivität.
        Kader als Employer Branding Botschafter.

# =============================================================================
# INTERVENTION DOMAINS FÜR OFF-SITE
# =============================================================================
intervention_domains:
  description: |
    Die drei Hauptinterventionsfelder für den Off-Site Day,
    gemappt auf EBF-Dimensionen.

  domains:
    - id: "INT-IDENTITY"
      name: "Identitäts-Integration"
      description: "Luzerner DNA + Nationale Ambition = Sowohl-Als-Auch"

      target_10c: "WHAT (C.X)"
      delta_target: "Identität ERWEITERN, nicht ersetzen"

      key_message: |
        "Wir bleiben Luzerner – und werden von hier aus die Schweiz erobern."

      intervention_types:
        - type: "T5_Identity"
          examples:
            - "Storytelling: Von Luzern in die Welt"
            - "Identitäts-Mapping: Was bleibt, was kommt dazu"
            - "Symbolische Verankerung der Doppel-Identität"

    - id: "INT-AMBITION"
      name: "Ambitions-Glaubwürdigkeit"
      description: "Top 5 = realistisch UND motivierend"

      target_10c: "AWARE + READY"
      delta_target: "Selbstwirksamkeit + Kollektive Efficacy steigern"

      key_message: |
        "Wir haben alles, was es braucht – und hier ist der Beweis."

      intervention_types:
        - type: "T1_Information"
          examples:
            - "Evidenz: Was hat LUKB bereits geschafft (Wachstum)"
            - "Benchmarks: Wo stehen vergleichbare Banken"
            - "Ressourcen-Check: Was haben wir, was brauchen wir"

        - type: "T6_Social"
          examples:
            - "Peer-Testimonials: Champions sprechen lassen"
            - "Kollektive Zielvisualisierung"

    - id: "INT-COMMITMENT"
      name: "Ownership & Commitment"
      description: "Von CEO-Strategie zu UNSERER Strategie"

      target_10c: "HOW (B) + STAGE"
      delta_target: "Intention → öffentliches Commitment → Implementation Intention"

      key_message: |
        "Was ist DEIN Beitrag zu LUKB30?"

      intervention_types:
        - type: "T4_Commitment"
          examples:
            - "Öffentliches Commitment vor Peers"
            - "Persönlicher LUKB30-Beitrag formulieren"
            - "Wenn-Dann-Pläne für den ersten Monat"

        - type: "T3_ChoiceArchitecture"
          examples:
            - "Commitment Cards / Pledge Wall"
            - "Follow-up Mechanismus ankündigen"

# =============================================================================
# STRATEGISCHE IMPLIKATIONEN FÜR OFF-SITE
# =============================================================================
strategic_implications:
  intervention_principles:
    - principle: "Identität sichern, dann erweitern"
      description: |
        ERST die Luzerner Identität validieren und wertschätzen.
        DANN die Erweiterung als Addition, nicht Ersetzung framen.
      relevant_factors: ["CH-SOC-12", "sigma_IDN", "tau_EXT"]

    - principle: "Evidenz vor Appell"
      description: |
        Nicht "Ihr müsst daran glauben" sondern "Hier sind die Fakten".
        Pragmatiker gewinnt man mit Daten, nicht mit Pathos.
      relevant_factors: ["epsilon_EFF", "epsilon_COLL"]

    - principle: "GL muss zuerst committen"
      description: |
        GL-Signaling hat höchstes Gewicht. GL muss sichtbar und
        authentisch committen, bevor Kader folgen.
      relevant_factors: ["omega_GL", "gamma_PEER"]

    - principle: "Öffentliches Peer-Commitment nutzen"
      description: |
        Commitment vor Gleichrangigen bindet stärker als
        Commitment vor Vorgesetzten (weniger Reaktanz).
      relevant_factors: ["kappa_COMMIT", "psi_S_social"]

    - principle: "Konkret werden: Implementation Intentions"
      description: |
        Nicht "Ich unterstütze LUKB30" sondern
        "Am Montag werde ich X tun, wenn Y passiert".
      relevant_factors: ["delta_IMPL"]

  segment_specific:
    champions:
      approach: "Als Testimonials nutzen, früh sprechen lassen"
      risk: "Nicht übertreiben lassen (Pragmatiker-Abschreckung)"

    pragmatiker:
      approach: "Mit Evidenz und Quick Wins überzeugen"
      risk: "Skeptiker-Beeinflussung wenn frühe Zweifel"
      key_message: "Hier sind die Zahlen. So machen wir das."

    skeptiker:
      approach: "Verlustangst adressieren, Identität sichern"
      risk: "Lauter Widerstand wenn ignoriert"
      key_message: "Luzern bleibt. Wir verlieren nichts."

    widerstaendler:
      approach: "Nicht bekämpfen, nicht ignorieren, neutralisieren"
      risk: "Vergiftung der Stimmung wenn Bühne gegeben"
      key_message: "Wir verstehen die Bedenken. Hier ist unser Plan."

