metadata:
  name: "LUKB Kontextvektor"
  code: "BCM2_MIKRO_LUKB"
  layer: "mikro"
  version: "1.0"
  last_updated: "2026-01-26"
  description: |
    Organisationsspezifischer Kontextvektor für die Luzerner Kantonalbank (LUKB).
    Definiert Organisation, Strategie, Zielgruppen für Change-Interventionen
    und mappt relevante Kontextfaktoren aus MESO (Banking) und MAKRO (Schweiz).

    Anlass: Off-Site Day 6. März 2026 mit 40 Kader + GL
    Thema: Strategie LUKB30 + Rebranding (Jung von Matt)

  hierarchy:
    parent: "BCM2_MESO_BANKING_CH"
    grandparent: "BCM2_04_KON (MAKRO Schweiz)"
    children: ["Projekt-Instanzen"]
    sibling: "BCM2_INDIV_LUKB (Individual Behavioral Parameters)"

  bcm_coupling:
    primary: "BCM2_MESO_BANKING_CH"
    secondary: "BCM2_04_KON"
    tertiary: "BCM2_03_IDN"  # Identität zentral für Change

  ebf_mapping:
    primary_psi:
      - "kappa_IDENTITY"    # Luzerner DNA vs. Nationale Ambition
      - "kappa_SOCIAL"      # Peer Effects unter Kadern
    secondary_psi:
      - "kappa_INST"        # Hierarchie, GL-Signaling
      - "kappa_AWX"         # Awareness der Strategie
      - "kappa_TEMP"        # Timing: Strategiestart
    utility_focus:
      - "u_X"               # Identitätsnutzen (primär bei Change)
      - "u_S"               # Sozialer Nutzen (Status, Anerkennung)
      - "u_F"               # Finanzieller Nutzen (Aktienbeteiligung)

# =============================================================================
# ORGANISATION
# =============================================================================
organisation:
  name_de: "Luzerner Kantonalbank"
  name_short: "LUKB"
  legal_form: "Aktiengesellschaft (seit 1991)"
  founded: 1850
  headquarters: "Luzern"

  ownership:
    canton_luzern: 0.615  # 61.5%
    free_float: 0.385     # 38.5%
    staatsgarantie: true

  size:
    employees: 1181
    branches: 25
    bilanzsumme_chf_mrd: 52.7  # 2024
    konzerngewinn_chf_mio: 289  # 2024

  ceo:
    name: "Daniel Salzmann"
    since: "2014-07"
    background: "Executive MBA, HSLU; seit 2004 in GL"

  hr_leadership:
    name: "Silvana"  # Nachname ergänzen wenn bekannt
    role: "HR-Chefin"
    tenure_years: 2.5
    standing: "Hohe Reputation aufgebaut"

  core_business:
    - "Privatkundengeschäft"
    - "Private Banking"
    - "Firmen- und Gewerbekundengeschäft"
    - "Spezialgeschäfte (Krypto seit 2016/2020)"

  geographic_focus:
    primary: "Wirtschaftsraum Luzern"
    expansion: "Schweizweit in Spezialgeschäften"

# =============================================================================
# STRATEGIE LUKB30 (2026-2030)
# =============================================================================
strategy:
  name: "LUKB30"
  period: "2026-2030"
  launch_date: "2026-01"

  vision: |
    Bis 2030 zählt die LUKB zu den fünf führenden Universalbanken der Schweiz.

  positioning:
    tagline: "Expertise einer grossen Bank mit Zugänglichkeit einer Kantonalbank"
    identity_tension: "Luzerner DNA bewahren UND national wachsen"

  financial_targets:
    konzerngewinn_2030_chf_mio: 340  # vs. 289 in 2024
    zinsunabhaengige_ertraege_2030_chf_mio: 310  # vs. 207 in 2024
    kreditwachstum_pa_percent: [2.5, 4.0]  # Range
    cost_income_ratio_max: 0.50  # aktuell 46.1%

  strategic_pillars:
    - id: "S1-DEFEND"
      name: "Luzern verteidigen"
      description: "Marktführerschaft im Wirtschafts- und Lebensraum Luzern"
      weight: 0.35

    - id: "S2-EXPAND"
      name: "Schweiz erobern"
      description: "Profitables Wachstum in Spezialgeschäften national"
      weight: 0.25

    - id: "S3-DATA"
      name: "KI & Daten"
      description: "Kundenbindung durch daten- und KI-gestütztes Banking"
      weight: 0.20

    - id: "S4-DIVERSIFY"
      name: "Zinsunabhängig wachsen"
      description: "Diversifikation der Erträge"
      weight: 0.15

    - id: "S5-EFFICIENT"
      name: "Kosteneffizienz halten"
      description: "CIR unter 50% trotz Wachstumsinvestitionen"
      weight: 0.05

  competitive_position:
    current_rank: "~8 unter Schweizer Universalbanken"
    target_rank: "Top 5"
    benchmark_peers:
      - name: "Zürcher Kantonalbank (ZKB)"
        position: "4"
        comparison: "4x grösser, aber weniger Wachstumsdruck"
      - name: "St.Galler Kantonalbank (SGKB)"
        position: "~7"
        comparison: "Ähnliche Grösse, direkter Wettbewerber"
      - name: "Waadtländer Kantonalbank (BCV)"
        position: "5"
        comparison: "Romandie-Pendant, interessanter Benchmark"

# =============================================================================
# REBRANDING (Jung von Matt / BrandEvolution)
# =============================================================================
rebranding:
  agency: "Jung von Matt"
  project_name: "BrandEvolution"
  launch_context: "Off-Site Day 6. März 2026"

  purpose: |
    Visuelle Neupositionierung passend zur Strategie LUKB30.
    Von "Regionale Kantonalbank" zu "Führende Universalbank mit Luzerner Wurzeln".

  key_challenge: |
    Die neue Marke muss SOWOHL die Luzerner Identität bewahren
    ALS AUCH die nationale Ambition glaubwürdig transportieren.

  employee_relevance: |
    Kader müssen die neue Marke nicht nur verstehen, sondern LEBEN.
    Sie sind Markenbotschafter gegenüber 1'181 Mitarbeitenden und Kunden.

# =============================================================================
# ZIELGRUPPEN FÜR CHANGE (WHO - Welfare Hierarchy)
# =============================================================================
target_groups:
  description: |
    Zielgruppen für die Strategie-Kommunikation und Change-Intervention,
    beginnend beim Off-Site mit den Kadern.

  primary_targets:
    - id: "TG-KADER"
      name: "Kader (Off-Site Teilnehmer)"
      size: 40
      plus_gl: true
      relevance: "Multiplikatoren für gesamte Organisation"
      decision_autonomy: "mittel-hoch (in Bereichsverantwortung)"

      segmentation:
        by_function:
          - segment: "Privatkundengeschäft"
            size_estimate: 12
            strategic_alignment: "S1-DEFEND (Luzern)"
            change_exposure: "mittel"

          - segment: "Private Banking"
            size_estimate: 8
            strategic_alignment: "S2-EXPAND (Schweiz)"
            change_exposure: "hoch"

          - segment: "Firmenkundengeschäft"
            size_estimate: 8
            strategic_alignment: "S1-DEFEND + S2-EXPAND"
            change_exposure: "mittel"

          - segment: "Spezialgeschäfte (Krypto, Digital)"
            size_estimate: 4
            strategic_alignment: "S3-DATA"
            change_exposure: "niedrig (bereits innovativ)"

          - segment: "Stab/Support (HR, IT, Finance)"
            size_estimate: 8
            strategic_alignment: "S5-EFFICIENT"
            change_exposure: "mittel"

        by_attitude:  # Hypothetische Verteilung - zu validieren
          - segment: "Champions"
            share: 0.20
            description: "Top 5 – endlich! Begeistert dabei."
            approach: "Als Testimonials nutzen"

          - segment: "Pragmatiker"
            share: 0.50
            description: "Schauen wir mal, ob das klappt."
            approach: "Mit Evidenz und Quick Wins überzeugen"

          - segment: "Skeptiker"
            share: 0.20
            description: "Wir sind doch gut so wie wir sind."
            approach: "Verlustangst adressieren, Identität sichern"

          - segment: "Widerständler"
            share: 0.10
            description: "Das ist nicht unsere DNA."
            approach: "Nicht bekämpfen, neutralisieren"

      key_barriers:
        - barrier: "Identitäts-Konflikt"
          description: "Luzerner DNA vs. nationale Ambition"
          severity: 0.72

        - barrier: "Ambitions-Glaubwürdigkeit"
          description: "Top 5 – ist das realistisch oder Hybris?"
          severity: 0.58

        - barrier: "Ownership-Mangel"
          description: "CEO-Strategie vs. UNSERE Strategie"
          severity: 0.65

        - barrier: "Knowing-Doing Gap"
          description: "Verstehen ≠ Montag anders handeln"
          severity: 0.70

      key_enablers:
        - enabler: "Aktienbeteiligung"
          description: "Skin in the Game durch MA-Aktienprogramm"
          strength: 0.55

        - enabler: "HR-Standing"
          description: "2.5 Jahre Vertrauensaufbau durch Silvana"
          strength: 0.68

        - enabler: "Strategiestart-Momentum"
          description: "Neue Periode = Aufbruchstimmung"
          strength: 0.72

        - enabler: "Peer Commitment"
          description: "Öffentliches Commitment unter Gleichrangigen"
          strength: 0.78

  secondary_targets:
    - id: "TG-GL"
      name: "Geschäftsleitung"
      size: 6  # typisch
      role: "Signaling, Vorbildfunktion, Enabler"

    - id: "TG-MA"
      name: "Alle Mitarbeitenden"
      size: 1181
      role: "Empfänger der Kader-Multiplikation"

    - id: "TG-KUNDEN"
      name: "Kunden"
      role: "Langfristig: Markenerlebnis"

