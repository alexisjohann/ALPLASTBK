# =============================================================================
# VERHALTENSÖKONOMISCHE PARAMETER (AGGREGIERT)
# =============================================================================
behavioral_parameters:
  description: |
    Aggregierte verhaltensökonomische Parameter für ZKB-Kundschaft.
    Gewichteter Durchschnitt über Segmente + Literaturwerte.

  core_parameters:
    loss_aversion:
      symbol: "lambda"
      value: 2.25
      range: [1.8, 3.0]
      source: "Kahneman & Tversky 1979, angepasst für CH-Kontext"
      zkb_adjustment: "+0.1 (konservativer als Durchschnitt)"

    present_bias:
      symbol: "beta"
      value: 0.82
      range: [0.70, 0.90]
      source: "Laibson 1997, angepasst für Vorsorge-Kontext"
      zkb_adjustment: "-0.03 (langfristiger orientiert)"

    risk_aversion:
      symbol: "rho"
      value: 0.65
      range: [0.50, 0.80]
      source: "Holt & Laury 2002"
      zkb_adjustment: "+0.05 (Schweizer Vorsicht)"

    social_preference:
      symbol: "alpha"
      value: 0.35
      range: [0.20, 0.50]
      source: "Fehr & Schmidt 1999"
      zkb_adjustment: "neutral"

  context_parameters:
    default_effect:
      symbol: "kappa_default"
      value: 0.70
      range: [0.55, 0.85]
      description: "Starke Default-Wirkung, typisch für Banking"
      source: "Madrian & Shea 2001"

    framing_sensitivity:
      symbol: "kappa_frame"
      value: 0.58
      range: [0.45, 0.70]
      description: "Moderate Framing-Sensitivität"
      source: "Tversky & Kahneman 1981"

    social_proof_effect:
      symbol: "sigma_social"
      value: 0.55
      range: [0.40, 0.70]
      description: "Moderate Social Proof Wirkung"
      source: "Cialdini 2001"

    scarcity_effect:
      symbol: "sigma_scarcity"
      value: 0.45
      range: [0.30, 0.60]
      description: "Niedrig-moderat (skeptisch gegenüber künstlicher Knappheit)"
      source: "Cialdini 2001"

  identity_parameters:
    zurich_identity_weight:
      symbol: "omega_ZH"
      value: 0.72
      description: "Gewicht der Zürcher Identität in Entscheidungen"

    sustainability_identity_weight:
      symbol: "omega_ESG"
      value: 0.58
      description: "Gewicht der Nachhaltigkeits-Identität"

    bank_loyalty_inertia:
      symbol: "kappa_loyalty"
      value: 0.75
      description: "Trägheit bei Bankwechsel (hoch)"

# =============================================================================
# KONTEXT-RELEVANZ-MAPPING (aus MAKRO Schweiz)
# =============================================================================
context_relevance:
  description: |
    Mapping der relevantesten Kontextfaktoren aus MAKRO (Schweiz)
    für ZKB-spezifische Interventionen.

  high_relevance_makro:
    # Institutionell
    - factor_id: "CH-SOC-01"
      name: "Institutionenvertrauen"
      value: 0.72
      zkb_relevance: |
        Vertrauen in Kantonalbanken überdurchschnittlich.
        ZKB profitiert von Staatsgarantie und 150+ Jahren Geschichte.
        → Vertrauen ist Asset, nicht zu erkämpfen.

    - factor_id: "CH-REG-08"
      name: "Default-Compliance"
      value: 0.78
      zkb_relevance: |
        Schweizer akzeptieren institutionelle Defaults.
        → Opt-out statt Opt-in bei Produkten.
        → Vorausgewählte ESG-Optionen haben hohe Bleiberate.

    # Sozio-kulturell
    - factor_id: "CH-SOC-12"
      name: "Regionalismus / Kantönligeist"
      value: 0.68
      zkb_relevance: |
        Zürcher Identität stark (stärker als andere Kantone).
        → "Bank der Zürcher" als Positionierung.
        → Lokale Verankerung kommunizieren.

    - factor_id: "CH-SOC-15"
      name: "Nachhaltigkeitsorientierung"
      value: 0.72
      zkb_relevance: |
        Zürich überdurchschnittlich nachhaltigkeitsorientiert.
        → ESG ist kein Nischenthema, sondern Erwartung.
        → First-Mover-Vorteil der ZKB nutzen.

    # Ökonomisch
    - factor_id: "CH-ECO-01"
      name: "Vermögenskonzentration"
      value: 0.80
      zkb_relevance: |
        Höchste Vermögensdichte der Schweiz in Zürich.
        → Private Banking Potenzial.
        → Premium-Positionierung möglich.

    - factor_id: "CH-ECO-07"
      name: "Wohneigentumsquote"
      value: 0.38
      zkb_relevance: |
        Niedrig (Mietermarkt) → Hypotheken = Wachstumsfeld.
        Aber: Hohe Preise → Tragbarkeit als Thema.

    # Technologisch
    - factor_id: "CH-TEC-03"
      name: "Digital Banking Adoption"
      value: 0.75
      zkb_relevance: |
        Zürich digital-affiner als CH-Durchschnitt.
        → Digital-First ist Erwartung, nicht Innovation.
        → Mobile Banking als Hygienefaktor.

    - factor_id: "CH-TEC-08"
      name: "Fintech-Akzeptanz"
      value: 0.62
      zkb_relevance: |
        Moderat – Offenheit, aber Vertrauen in Etablierte.
        → ZKB-Innovation wird akzeptiert.
        → Neobanken = Bedrohung für Digital-Segment.

  medium_relevance_makro:
    - factor_id: "CH-DEM-05"
      name: "Urbanisierung"
      value: 0.85
      zkb_relevance: "Hochurban = Filialnetz-Optimierung möglich"

    - factor_id: "CH-ARB-03"
      name: "Fachkräftemangel"
      value: 0.65
      zkb_relevance: "Talent-Wettbewerb in Zürich intensiv"

    - factor_id: "CH-MIG-02"
      name: "Expat-Population"
      value: 0.72
      zkb_relevance: "Expat-Banking als Wachstumsfeld"

# =============================================================================
# BCM-MODUL-KOPPLUNG
# =============================================================================
bcm_module_coupling:
  BCM2_01_INU:
    description: "Instrumenteller Nutzen"
    zkb_relevance: |
      Konditionsvergleich ist Standard (Check24-Mentalität bei Jungen).
      → Faire Konditionen als Hygienefaktor.
      → Aber: Nicht einziger Entscheidungstreiber.

  BCM2_02_KNU:
    description: "Konsumativer Nutzen"
    zkb_relevance: |
      Banking-Erlebnis zunehmend wichtig (App-UX, Beratungserlebnis).
      → Investment in Customer Experience.

  BCM2_03_IDN:
    description: "Identitätsnutzen"
    zkb_relevance: |
      "Ich bin ZKB-Kunde" = Identitätsstatement.
      → Zürcher Identität aktivieren.
      → Nachhaltigkeit als Identitäts-Feature.

  BCM2_04_KON:
    description: "Kontext"
    zkb_relevance: |
      Kontextsensitive Kommunikation entscheidend.
      → Lebensphasen-Banking.
      → Situative Ansprache (Steuer-Deadline, Hypothek-Auslauf).

  BCM2_05_IND:
    description: "Individual Parameters"
    zkb_relevance: |
      Segment-spezifische Parameter nutzen.
      → Nicht One-Size-Fits-All.

  BCM2_06_META:
    description: "Decision Architecture"
    zkb_relevance: |
      Defaults, Framing, Channel = entscheidend.
      → Smart Defaults bei Produkten.
      → Loss-Frame bei Vorsorge-Lücken.

  BCM2_19_LCP:
    description: "Life Course Perspective"
    zkb_relevance: |
      Banking-Bedürfnisse ändern sich über Lebensphasen.
      → Trigger-Momente identifizieren (Heirat, Kind, Haus, Pension).
      → Proaktive Ansprache bei Lebensübergängen.

# =============================================================================
# STRATEGISCHE IMPLIKATIONEN FÜR INTERVENTIONEN
# =============================================================================
strategic_implications:
  intervention_principles:
    - principle: "Zürcher Identität aktivieren"
      description: |
        ZKB als "Bank der Zürcher" positionieren.
        Lokale Verankerung als Differenzierung.
      relevant_factors: ["CH-SOC-12", "omega_ZH"]
      examples:
        - "Nahe bei Ihnen – seit 1870"
        - "Für Zürich. Für Sie."
        - "Ihre Zürcher Kantonalbank"

    - principle: "Nachhaltigkeit als Erwartung, nicht USP"
      description: |
        ESG ist in Zürich Hygienefaktor, nicht Differenzierung.
        Greenwashing-Gefahr bei Übertreibung.
      relevant_factors: ["CH-SOC-15", "omega_ESG"]
      examples:
        - "Selbstverständlich nachhaltig"
        - "Nachhaltig anlegen – ohne Kompromisse"
        - "Transparentes Impact-Reporting"

    - principle: "Defaults strategisch setzen"
      description: |
        Schweizer akzeptieren gute Defaults.
        Nachhaltige Optionen als Standard.
      relevant_factors: ["CH-REG-08", "kappa_default"]
      examples:
        - "Vorausgewählt: Nachhaltiger Fonds"
        - "Automatisch: CO2-Kompensation"
        - "Opt-out statt Opt-in bei ESG"

    - principle: "Segment-spezifische Ansprache"
      description: |
        Nicht One-Size-Fits-All.
        Digital für Digitale, Beratung für Beratungsorientierte.
      relevant_factors: ["Segment-Parameters"]
      examples:
        - "Digitale Pragmatiker: App-Nudges"
        - "Beratungsorientierte: Persönliche Ansprache"
        - "Traditionelle: Filial-Einladungen"

    - principle: "Vertrauen ist Asset, nicht zu erkämpfen"
      description: |
        Staatsgarantie + 150 Jahre = Vertrauensvorschuss.
        Nicht überverkaufen, sondern bestätigen.
      relevant_factors: ["CH-SOC-01"]
      examples:
        - "Sicher. Seit 1870."
        - "Die Bank, der Zürich vertraut"

  product_specific_implications:
    hypotheken:
      key_insight: "Grösste Finanzentscheidung – Sicherheit betonen"
      psi_dominant: ["psi_E_economic", "psi_C_cognitive"]
      intervention_focus:
        - "Komplexität reduzieren (Rechner, Simulation)"
        - "Sicherheit kommunizieren (Fixzins-Optionen)"
        - "Persönliche Beratung anbieten"
        - "Green Hypothek als Option (nicht Default)"

    vorsorge:
      key_insight: "Langfrist + Deadlines = Framing-Chance"
      psi_dominant: ["psi_T_temporal", "psi_I_institutional"]
      intervention_focus:
        - "Deadline-Nudges (Säule 3a bis 31.12.)"
        - "Vorsorgelücken-Visualisierung (Loss Frame)"
        - "Automatisierung (Dauerauftrag)"
        - "Nachhaltige 3a als Default"

    anlegen:
      key_insight: "Segment-abhängig – Digital vs. Beratung"
      psi_dominant: ["psi_S_social", "psi_K_cultural"]
      intervention_focus:
        - "Robo-Advisor für Digitale Pragmatiker"
        - "Anlagemandate für Beratungsorientierte"
        - "ESG-Impact für Nachhaltigkeits-Bewusste"
        - "Social Proof ('Beliebteste Fonds')"

    zahlungsverkehr:
      key_insight: "Commodity – UX entscheidet"
      psi_dominant: ["psi_M_material", "psi_C_cognitive"]
      intervention_focus:
        - "Seamless Mobile Experience"
        - "Instant Payments"
        - "Kontaktlos als Standard"
        - "Automatische Kategorisierung"

