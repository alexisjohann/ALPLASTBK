  code: "BCM2_MIKRO_ZKB"
  layer: "mikro"
  version: "1.0"
  last_updated: "2026-01-27"
  description: |
    Vollständiger organisationsspezifischer Kontextvektor für die Zürcher Kantonalbank (ZKB).
    Grösste Kantonalbank der Schweiz, systemrelevante Bank, Nachhaltigkeitspionier.

    Enthält:
    - Organisationsprofil und Strategie
    - Alle 8 Ψ-Dimensionen (vollständig parametrisiert)
    - Kundensegmente und Verhaltensparameter
    - Kontext-Relevanz-Mapping aus MAKRO Schweiz
    - BCM-Modul-Kopplungen
    - Strategische Implikationen für Interventionen

  hierarchy:
    parent: "BCM2_MESO_BANKING_CH"
    grandparent: "BCM2_04_KON (MAKRO Schweiz)"
    children: ["Projekt-Instanzen"]
    sibling: "BCM2_INDIV_ZKB (Individual Behavioral Parameters)"

  bcm_coupling:
    primary: "BCM2_MESO_BANKING_CH"
