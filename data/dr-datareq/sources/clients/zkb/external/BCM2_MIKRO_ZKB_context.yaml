# =============================================================================
# FAZIT
# =============================================================================
conclusion:
  insight: |
    Die ZKB operiert in einem privilegierten Kontext:
    - Höchste Vermögensdichte der Schweiz
    - Starkes Institutionenvertrauen
    - Staatsgarantie als Sicherheitsnetz
    - First-Mover bei Nachhaltigkeit

    Die Herausforderung liegt nicht im Vertrauensaufbau,
    sondern in der Aktivierung: Wie bringen wir Kunden dazu,
    die richtigen Produkte zur richtigen Zeit zu wählen?

    Die Antwort: Kontextsensitive Interventionen,
    die Ψ-Dimensionen und Segment-Parameter nutzen.

  zkb_principle: |
    "Vertrauen ist da. Aktivierung ist die Kunst."
