# =============================================================================
# STRATEGIE
# =============================================================================
strategy:
  name: "ZKB 2030"
  period: "2024-2030"

  vision: |
    Die führende Universalbank für Zürich und die nachhaltigste Bank der Schweiz.

  mission: |
    Wir schaffen Mehrwert für unsere Kundinnen und Kunden, für den Wirtschaftsraum
    Zürich und für die Gesellschaft – heute und für kommende Generationen.

  positioning:
    tagline: "Nahe. Verantwortungsvoll. Leistungsstark."
    identity_core: "Bank der Zürcher – seit über 150 Jahren"
    differentiator: "Grösse einer Grossbank + Nähe einer Kantonalbank + Nachhaltigkeit"

  strategic_pillars:
    - id: "S1-MARKT"
      name: "Marktführerschaft Zürich"
      description: "Ausbau der führenden Position im Heimmarkt"
      weight: 0.30
      kpis:
        - "Marktanteil Hypotheken: 35% → 38%"
        - "Kundenzufriedenheit NPS: 45 → 55"

    - id: "S2-NACHHALTIGKEIT"
      name: "Nachhaltigkeitspionier"
      description: "Führende ESG-Bank der Schweiz"
      weight: 0.25
      kpis:
        - "Nachhaltige Anlagen: CHF 80 Mrd. → 150 Mrd."
        - "CO2-Reduktion Portfolio: -50% bis 2030"
        - "Green Bonds emittiert: CHF 10 Mrd."

    - id: "S3-DIGITAL"
      name: "Digitale Exzellenz"
      description: "Best-in-Class Digital Banking Experience"
      weight: 0.20
      kpis:
        - "Digital Active Users: 70% → 85%"
        - "Mobile Transactions: 60% → 80%"
        - "Prozessautomatisierung: +40%"

    - id: "S4-WACHSTUM"
      name: "Profitables Wachstum"
      description: "Wachstum in Spezialgeschäften (Private Banking, Institutionell)"
      weight: 0.15
      kpis:
        - "Kundenvermögen: +5% p.a."
        - "Gewinnwachstum: +3% p.a."

    - id: "S5-EFFIZIENZ"
      name: "Operative Exzellenz"
      description: "Effizienz bei Qualitätsführerschaft"
      weight: 0.10
      kpis:
        - "Cost-Income-Ratio: 52% → 50%"
        - "Straight-Through-Processing: 70% → 85%"

  competitive_position:
    strengths:
      - "Grösste Kantonalbank = Skalenvorteile"
      - "Staatsgarantie = AAA-Rating, günstige Refinanzierung"
      - "Verankerung in Zürich = loyale Kundenbasis"
      - "Nachhaltigkeits-First-Mover = Reputationsvorteil"
      - "Finanzielle Stärke = Investitionskapazität"

    weaknesses:
      - "Regionale Fokussierung = Wachstumsgrenzen"
      - "Öffentlich-rechtlich = weniger Agilität"
      - "Legacy IT-Systeme in Teilbereichen"

    opportunities:
      - "Nachhaltigkeits-Megatrend"
      - "Digital Banking Adoption"
      - "Private Banking Onshoring (Post-CS)"

    threats:
      - "Neobanken (Neon, Yuh, Revolut)"
      - "Zinsumfeld-Volatilität"
      - "Regulatorischer Druck (FINMA, ESG)"

  benchmark_peers:
    - name: "Raiffeisen Schweiz"
      position: "Genossenschaftlich, dezentral"
      comparison: "Ähnliche Kundennähe, aber dezentrale Struktur"

    - name: "PostFinance"
      position: "Digital-First, Retail"
      comparison: "Starke Digital-Kompetenz, aber kein Full-Service"

    - name: "UBS Switzerland"
      position: "Grösste Bank, Premium-Positionierung"
      comparison: "Grösser, aber weniger regional verankert"

# =============================================================================
# Ψ-DIMENSIONEN (VOLLSTÄNDIG)
# =============================================================================
psi_dimensions:
  description: |
    Vollständige Parametrisierung aller 8 Ψ-Dimensionen für ZKB-Kontext.
    Werte basieren auf LLMMC-Schätzung + Literatur + ZKB-Spezifika.

    Skala: 0.0 (niedrig/schwach) bis 1.0 (hoch/stark)

  # -------------------------------------------------------------------------
  # Ψ_I: INSTITUTIONAL (Regeln, Defaults, Vorschriften)
  # -------------------------------------------------------------------------
  psi_I_institutional:
    value: 0.78
    range: [0.70, 0.85]
    description: |
      Hoher institutioneller Kontext aufgrund:
      - Staatsgarantie Kanton Zürich
      - FINMA-Regulierung (systemrelevant)
      - Öffentlich-rechtlicher Auftrag
      - Starke Compliance-Kultur

    sub_dimensions:
      regulatory_intensity:
        value: 0.85
        description: "FINMA-Aufsicht, systemrelevant, strenge Compliance"

      default_power:
        value: 0.72
        description: "Starke Defaults in Produkten (Vorsorge, Hypotheken)"

      process_formalization:
        value: 0.75
        description: "Standardisierte Prozesse, aber Spielräume vorhanden"

      public_mandate:
        value: 0.80
        description: "Leistungsauftrag: Wirtschaftsförderung, Nachhaltigkeit"

    implications:
      - "Hohe Glaubwürdigkeit von institutionellen Commitments"
      - "Defaults haben starke Wirkung (Opt-out statt Opt-in)"
      - "Regulatorische Argumente sind überzeugend"
      - "Compliance als Hygienefaktor, nicht Differenzierung"

  # -------------------------------------------------------------------------
  # Ψ_S: SOCIAL (Wer ist dabei? Soziale Normen?)
  # -------------------------------------------------------------------------
  psi_S_social:
    value: 0.72
    range: [0.65, 0.80]
    description: |
      Starker sozialer Kontext in Zürich:
      - Hohe soziale Vernetzung im Wirtschaftsraum
      - "Man kennt sich" – Reputation matters
      - Peer Effects bei Finanzentscheidungen
      - Soziale Normen um Nachhaltigkeit

    sub_dimensions:
      peer_influence:
        value: 0.68
        description: "Moderate Peer Effects bei Finanzprodukten"

      social_norm_strength:
        value: 0.75
        description: "Starke Normen: Nachhaltigkeit, Seriosität, Diskretion"

      network_density:
        value: 0.78
        description: "Dichtes Netzwerk im Zürcher Wirtschaftsraum"

      observability:
        value: 0.52
        description: "Finanzentscheidungen meist privat, aber Bankwahl sichtbar"

    implications:
      - "Social Proof wirkt bei nachhaltigen Produkten"
      - "Referral-Programme haben Potenzial"
      - "Reputation der Bank = persönliche Reputation"
      - "Diskretion als Kernwert respektieren"

  # -------------------------------------------------------------------------
  # Ψ_C: COGNITIVE (Mentaler Zustand)
  # -------------------------------------------------------------------------
  psi_C_cognitive:
    value: 0.62
    range: [0.55, 0.70]
    description: |
      Typischer kognitiver Kontext der ZKB-Kundschaft:
      - Überdurchschnittliche Financial Literacy (Zürich)
      - Aber: Zeitmangel bei Berufstätigen
      - Informationsüberflutung im Digital-Kontext
      - Emotionale Belastung bei grossen Entscheidungen (Hypothek)

    sub_dimensions:
      financial_literacy:
        value: 0.72
        description: "Überdurchschnittlich für Schweiz (urban, gebildet)"

      attention_availability:
        value: 0.55
        description: "Beschränkt – Berufstätige, Zeitmangel"

      decision_fatigue:
        value: 0.58
        description: "Moderate Decision Fatigue bei Produktvergleichen"

      emotional_state:
        value: 0.60
        description: "Variiert: Entspannt bei Routine, angespannt bei Hypothek"

    implications:
      - "Einfache Entscheidungsarchitektur wichtig"
      - "Komplexität reduzieren, nicht erhöhen"
      - "Timing: Nicht am Feierabend für komplexe Entscheidungen"
      - "Chunking: Grosse Entscheidungen in Schritte teilen"

  # -------------------------------------------------------------------------
  # Ψ_K: CULTURAL (Werte, Traditionen)
  # -------------------------------------------------------------------------
  psi_K_cultural:
    value: 0.75
    range: [0.68, 0.82]
    description: |
      Zürcher Kultur mit spezifischen Werten:
      - Leistungsorientierung + Pragmatismus
      - Wohlstand, aber diskret
      - Innovationsfreude + Stabilität
      - Nachhaltigkeit als wachsender Wert

    sub_dimensions:
      regional_identity:
        value: 0.72
        description: "Starke Zürcher Identität ('Züri'-Stolz)"

      tradition_modernity:
        value: 0.65
        description: "Balance: Tradition schätzen, aber offen für Neues"

      sustainability_values:
        value: 0.78
        description: "Hohe Nachhaltigkeitsorientierung (urban, gebildet)"

      wealth_attitude:
        value: 0.70
        description: "Wohlstand ja, aber Understatement"

      trust_culture:
        value: 0.75
        description: "Hohes Vertrauen in Institutionen (typisch CH)"

    implications:
      - "Zürcher Identität aktivieren ('Ihre Zürcher Bank')"
      - "Nachhaltigkeit ist kein Nischenthema, sondern Erwartung"
      - "Keine protzerische Kommunikation (Understatement)"
      - "Tradition + Innovation als Sowohl-Als-Auch framen"

  # -------------------------------------------------------------------------
  # Ψ_E: ECONOMIC (Ressourcen, Budget, Zeit)
  # -------------------------------------------------------------------------
  psi_E_economic:
    value: 0.78
    range: [0.70, 0.85]
    description: |
      Wirtschaftlich starker Kontext:
      - Zürich = höchstes Vermögen pro Kopf in CH
      - Hohe Einkommen, hohe Lebenskosten
      - Vermögensbildung als Normalität
      - Aber: Wohnkosten als Constraint

    sub_dimensions:
      income_level:
        value: 0.82
        description: "Überdurchschnittliches Einkommen (Zürich-Effekt)"

      wealth_level:
        value: 0.80
        description: "Hohe Vermögenskonzentration"

      liquidity_constraint:
        value: 0.55
        description: "Moderat: Hohe Fixkosten (Wohnen) binden Mittel"

      investment_capacity:
        value: 0.75
        description: "Hohe Spar- und Investitionskapazität"

    implications:
      - "Preis ist nicht primärer Treiber (Qualität > Kosten)"
      - "Aber: Fairness-Erwartung bei Pricing"
      - "Hypothekenkonditionen sind wichtig (hohe Beträge)"
      - "Potenzial für Premium-Produkte"

  # -------------------------------------------------------------------------
  # Ψ_T: TEMPORAL (Wann? Zeitdruck? Lebensphase?)
  # -------------------------------------------------------------------------
  psi_T_temporal:
    value: 0.65
    range: [0.58, 0.72]
    description: |
      Zeitlicher Kontext der ZKB-Kunden:
      - Lebensphase: Breite Altersmischung
      - Zeitdruck: Hoch bei Berufstätigen
      - Saisonalität: Steueroptimierung (Säule 3a), Hypotheken
      - Langfristigkeit: Vorsorge, Vermögensaufbau

    sub_dimensions:
      time_pressure:
        value: 0.68
        description: "Hoher Zeitdruck bei urbaner Zielgruppe"

      planning_horizon:
        value: 0.72
        description: "Langfristig orientiert (Vorsorge, Hypotheken)"

      life_phase_diversity:
        value: 0.75
        description: "Alle Lebensphasen vertreten"

      urgency_sensitivity:
        value: 0.58
        description: "Reagiert auf Deadlines (Säule 3a, Steuern)"

    implications:
      - "Zeiteffiziente Prozesse sind Hygienefaktor"
      - "Deadlines nutzen (Säule 3a bis 31.12.)"
      - "Lebensphasen-Banking: Trigger-Momente identifizieren"
      - "Langfrist-Narrative für Vorsorge/Anlage"

  # -------------------------------------------------------------------------
  # Ψ_M: MATERIAL (Technologie, Tools, Infrastruktur)
  # -------------------------------------------------------------------------
  psi_M_material:
    value: 0.75
    range: [0.68, 0.82]
    description: |
      Technologischer Kontext:
      - Hohe Smartphone-Penetration
      - Digital-Affinität überdurchschnittlich
      - Multi-Channel-Erwartung
      - ZKB-App als etablierter Touchpoint

    sub_dimensions:
      digital_infrastructure:
        value: 0.85
        description: "Exzellente digitale Infrastruktur (Zürich)"

      digital_literacy:
        value: 0.75
        description: "Hohe Digital-Kompetenz der Zielgruppe"

      channel_preference:
        value: 0.70
        description: "Digital-First, aber Filiale für komplexe Themen"

      technology_trust:
        value: 0.72
        description: "Hohes Vertrauen in digitale Banking-Lösungen"

    implications:
      - "Mobile-First als Standard"
      - "Aber: Filiale bleibt relevant für Beratung"
      - "Nahtlose Omnichannel-Experience erwartet"
      - "Self-Service für Standard, Beratung für Komplex"

  # -------------------------------------------------------------------------
  # Ψ_F: PHYSICAL (Ort, Umgebung)
  # -------------------------------------------------------------------------
  psi_F_physical:
    value: 0.68
    range: [0.60, 0.75]
    description: |
      Physischer Kontext:
      - Urban (Zürich, Winterthur, Agglomeration)
      - Dichte Filialabdeckung
      - Home-Office-Anteil hoch (Post-COVID)
      - Pendler-Kultur (S-Bahn-Netz)

    sub_dimensions:
      urban_density:
        value: 0.82
        description: "Hochurban, dichte Besiedlung"

      branch_accessibility:
        value: 0.78
        description: "Gute Filialabdeckung im Kanton"

      location_flexibility:
        value: 0.70
        description: "Flexibel: Wohnung, Büro, unterwegs"

      physical_touchpoint_value:
        value: 0.55
        description: "Moderat: Digital bevorzugt, physisch für Trust"

    implications:
      - "Filialen als Trust-Touchpoints, nicht Transaktions-Orte"
      - "Mobile Banking für unterwegs (Pendler)"
      - "Video-Beratung als Hybrid-Option"
      - "Flagship-Filialen als Markenerlebnis"

# =============================================================================
# KUNDENSEGMENTE
# =============================================================================
customer_segments:
  description: |
    Verhaltensbasierte Segmentierung der ZKB-Kundschaft.
    Basierend auf Entscheidungsstil, nicht nur Demografie.

  segments:
    # -------------------------------------------------------------------------
    # Segment 1: Digitale Pragmatiker
    # -------------------------------------------------------------------------
    - id: "SEG-DIGITAL"
      name: "Digitale Pragmatiker"
      share: 0.35

      profile:
        description: "Effizient, digital-first, preisbewusst aber qualitätsorientiert"
        age_range: [25, 45]
        income: "mittel-hoch"
        digital_affinity: 0.90
        advice_need: 0.30

      behavioral_parameters:
        loss_aversion:
          symbol: "lambda"
          value: 2.0
          description: "Leicht unter Durchschnitt (selbstsicher)"

        present_bias:
          symbol: "beta"
          value: 0.85
          description: "Moderate Gegenwartspräferenz"

        default_sensitivity:
          symbol: "kappa_default"
          value: 0.55
          description: "Prüft Defaults, aber akzeptiert gute"

        social_proof_sensitivity:
          symbol: "sigma_social"
          value: 0.45
          description: "Niedrig – entscheidet selbst"

      channel_preferences:
        primary: "Mobile App"
        secondary: "E-Banking"
        tertiary: "Chatbot"
        branch_usage: "selten (nur bei komplexen Anliegen)"

      key_products:
        - "Digital-Konto"
        - "Robo-Advisor / Anlage-App"
        - "Hypothek (Self-Service-Rechner)"
        - "Säule 3a digital"

      intervention_approaches:
        effective:
          - "Digitale Nudges (App-Notifications)"
          - "Smart Defaults"
          - "Gamification (Spar-Challenges)"
        ineffective:
          - "Telefonanrufe"
          - "Physische Mailings"
          - "Lange Beratungsgespräche"

    # -------------------------------------------------------------------------
    # Segment 2: Beratungsorientierte
    # -------------------------------------------------------------------------
    - id: "SEG-ADVICE"
      name: "Beratungsorientierte"
      share: 0.30

      profile:
        description: "Schätzt persönliche Beziehung, delegiert gerne, loyal"
        age_range: [40, 65]
        income: "hoch"
        digital_affinity: 0.55
        advice_need: 0.85

      behavioral_parameters:
        loss_aversion:
          symbol: "lambda"
          value: 2.5
          description: "Über Durchschnitt – Sicherheit wichtig"

        present_bias:
          symbol: "beta"
          value: 0.80
          description: "Langfristig orientiert"

        default_sensitivity:
          symbol: "kappa_default"
          value: 0.75
          description: "Folgt Berater-Empfehlungen"

        social_proof_sensitivity:
          symbol: "sigma_social"
          value: 0.70
          description: "Hoch – 'Was machen andere?'"

      channel_preferences:
        primary: "Persönlicher Berater"
        secondary: "Telefon"
        tertiary: "E-Banking"
        branch_usage: "regelmässig"

      key_products:
        - "Anlagemandat"
        - "Persönliche Vermögensberatung"
        - "Hypothek mit Beratung"
        - "Vorsorgeplanung"

      intervention_approaches:
        effective:
          - "Persönliche Ansprache"
          - "Berater-Empfehlung"
          - "Social Proof ('Kunden wie Sie...')"
          - "Testimonials"
        ineffective:
