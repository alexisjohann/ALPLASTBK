    source: "Client surveys"

  beta_WEALTH:
    name: "Present Bias - Wealth Clients"
    value: 0.92
    range: [0.85, 0.98]
    description: "Low present bias, long-term orientation"
    source: "Wealth client behavior analysis"

  iota_ELITE:
    name: "Identity - Elite Positioning"
    value: 0.85
    range: [0.75, 0.95]
    description: "Identity alignment with exclusive brand"
    source: "Segmentation research"

  sigma_PEER:
    name: "Social Norm - Peer Wealth"
    value: 0.70
    range: [0.55, 0.85]
