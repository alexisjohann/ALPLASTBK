      - "Seeking advisory"
      - "Digital-enabled"
    behavioral_profile:
      loss_aversion: 2.2
      present_bias: 0.88
      advice_seeking: 0.80
      digital_affinity: 0.70
      performance_orientation: 0.85
    priority: "high"

  - id: "TG-03"
    name: "Affluent Digital (CHF 250k-1M)"
    size_estimate: 15000
    share_of_aum: 0.08
    characteristics:
      - "Digital natives"
      - "Self-directed but advice-open"
      - "Cost-conscious"
      - "Growth-oriented"
    behavioral_profile:
      loss_aversion: 1.8
      present_bias: 0.78
      digital_preference: 0.90
      fee_sensitivity: 0.75
    priority: "medium"

  - id: "TG-04"
    name: "Next-Gen Wealth (<40 years)"
    size_estimate: 12000
    share_of_aum: 0.10
    characteristics:
      - "Inheritors or early entrepreneurs"
      - "Values-driven (ESG)"
      - "Tech-savvy"
      - "Experience-seeking"
    behavioral_profile:
      loss_aversion: 1.6
      present_bias: 0.72
      esg_orientation: 0.85
      digital_native: 0.95
      relationship_need: 0.65
    priority: "high"

  - id: "TG-05"
    name: "External Asset Managers"
    size_estimate: 500
    share_of_aum: 0.04
    characteristics:
      - "Professional intermediaries"
      - "Platform-seeking"
      - "Execution-focused"
      - "Regulatory-aware"
    behavioral_profile:
      loss_aversion: 2.0
      operational_efficiency: 0.90
      platform_quality: 0.88
      cost_sensitivity: 0.80
    priority: "medium"

  - id: "TG-06"
    name: "Family Offices"
    size_estimate: 300
    share_of_aum: 0.03
    characteristics:
      - "Multi-family and single-family"
      - "Governance-focused"
      - "Long-term horizon"
      - "Complex structures"
    behavioral_profile:
      loss_aversion: 2.2
      governance_priority: 0.92
      relationship_depth: 0.90
      generational_focus: 0.88
    priority: "medium"

# =============================================================================
# INTERVENTION DOMAINS
# =============================================================================

intervention_domains:
  - id: "INT-DOM-01"
    name: "Wealth Transfer & Succession"
    description: "Intergenerational wealth planning"
    target_groups: ["TG-01", "TG-02", "TG-06"]
    10c_dimensions:
      WHAT: "Legacy preservation, family harmony, tax efficiency"
      WHEN: "Life stage triggers (60+, family events, business exit)"
      WHO: "Multi-generational stakeholders"
    behavioral_levers:
      - lever: "Future Self Continuity"
        description: "Visualize family legacy across generations"
        expected_effect: 0.30
      - lever: "Loss Framing"
        description: "Cost of no planning (taxes, conflict)"
        expected_effect: 0.25
      - lever: "Social Proof"
        description: "Peer family planning stories"
        expected_effect: 0.15

  - id: "INT-DOM-02"
    name: "Next-Gen Engagement"
    description: "Acquiring and retaining younger clients"
    target_groups: ["TG-03", "TG-04"]
    10c_dimensions:
      WHAT: "Financial empowerment, values alignment"
      HOW: "Digital-first, hybrid advisory"
      AWARE: "Brand relevance, modern positioning"
    behavioral_levers:
      - lever: "Identity Alignment"
        description: "Connect wealth to personal values (ESG)"
        expected_effect: 0.25
      - lever: "Simplification"
        description: "Digital onboarding, goal-based investing"
        expected_effect: 0.30
      - lever: "Social Proof"
        description: "Next-gen peer testimonials"
        expected_effect: 0.15

  - id: "INT-DOM-03"
    name: "Mandate Penetration"
    description: "Converting execution-only to mandates"
    target_groups: ["TG-01", "TG-02"]
    10c_dimensions:
      WHAT: "Peace of mind, professional management"
      WHEN: "Market volatility, life complexity increase"
      HOW: "Gradual transition, hybrid models"
    behavioral_levers:
      - lever: "Loss Aversion"
        description: "Opportunity cost of DIY mistakes"
        expected_effect: 0.20
      - lever: "Default Progression"
        description: "Easy path from advisory to discretionary"
        expected_effect: 0.25
      - lever: "Expert Authority"
        description: "Research excellence, track record"
        expected_effect: 0.20

  - id: "INT-DOM-04"
    name: "Sustainable Investment Adoption"
    description: "ESG product penetration"
    target_groups: ["TG-01", "TG-02", "TG-04"]
    10c_dimensions:
      WHAT: "Values alignment, impact"
      AWARE: "ESG education, impact reporting"
      WHEN: "Major life events, wealth transfer"
    behavioral_levers:
      - lever: "Identity Alignment"
        description: "Values-driven wealth management"
        expected_effect: 0.25
      - lever: "Social Proof"
        description: "Peer ESG adoption rates"
        expected_effect: 0.15
      - lever: "Tangible Impact"
        description: "Concrete impact metrics"
        expected_effect: 0.20

  - id: "INT-DOM-05"
    name: "Digital Engagement"
    description: "Increase digital channel usage"
    target_groups: ["TG-02", "TG-03", "TG-04"]
    10c_dimensions:
      WHAT: "Convenience, control, information"
      HOW: "Hybrid human + digital"
      AWARE: "Feature discovery, value communication"
    behavioral_levers:
      - lever: "Guided Onboarding"
        description: "RM-assisted digital activation"
        expected_effect: 0.30
      - lever: "Feature Highlighting"
        description: "One feature at a time introduction"
        expected_effect: 0.20
      - lever: "Social Proof"
        description: "Usage statistics among peers"
        expected_effect: 0.12

  - id: "INT-DOM-06"
    name: "Client Retention Post-Signa"
    description: "Rebuild trust after reputational event"
    target_groups: ["TG-01", "TG-02", "TG-05", "TG-06"]
    10c_dimensions:
      WHAT: "Trust restoration, transparency"
      AWARE: "Enhanced communication, proactive outreach"
      WHEN: "Immediate (crisis mode) + ongoing"
    behavioral_levers:
      - lever: "Transparency"
        description: "Proactive, honest communication"
        expected_effect: 0.25
      - lever: "Commitment Devices"
        description: "Enhanced risk framework, public commitments"
        expected_effect: 0.20
      - lever: "Relationship Reinforcement"
        description: "RM proactive outreach, personal touch"
        expected_effect: 0.30

# =============================================================================
# CONTEXT MODIFIERS
# =============================================================================

context_modifiers:
  # Geographic Modifiers
  geographic:
    - id: "GEO-01"
      name: "Swiss Client Premium"
      factor: 1.15
      applies_to: ["TG-01", "TG-02"]
      description: "Higher trust baseline for Swiss-domiciled clients"

    - id: "GEO-02"
      name: "Asia Growth Orientation"
      factor: 1.25
      applies_to: ["TG-01", "TG-02", "TG-04"]
      description: "Higher growth expectations in Asia market"

    - id: "GEO-03"
      name: "Middle East Relationship Depth"
      factor: 1.30
      applies_to: ["TG-01", "TG-06"]
      description: "Stronger relationship orientation in ME"

    - id: "GEO-04"
      name: "European Regulatory Awareness"
      factor: 1.10
      applies_to: "all"
      description: "Higher regulatory consciousness in EU markets"

  # Segment Modifiers
  segment:
    - id: "SEG-01"
      name: "UHNW Exclusivity Premium"
      factor: 1.25
      applies_to: ["TG-01"]
      description: "Strong exclusivity effect on UHNW segment"

    - id: "SEG-02"
      name: "Next-Gen Digital Bonus"
      digital_only_bonus: 0.25
      applies_to: ["TG-03", "TG-04"]
      description: "Higher effectiveness of digital interventions"

    - id: "SEG-03"
      name: "Family Office Complexity"
      personalization_requirement: 1.35
      applies_to: ["TG-06"]
      description: "Higher need for customized solutions"

  # Channel Modifiers
  channel:
    - id: "CHN-01"
      name: "RM Relationship Effect"
      personal_touch_bonus: 0.30
      applies_to: ["TG-01", "TG-02", "TG-06"]
      description: "Strong RM relationship amplifies interventions"

    - id: "CHN-02"
      name: "Hybrid Preference"
      hybrid_bonus: 0.20
      digital_only_penalty: -0.10
      applies_to: ["TG-02"]
      description: "HNW prefer combination of digital and human"

    - id: "CHN-03"
      name: "Digital Native Effect"
      digital_only_bonus: 0.20
      applies_to: ["TG-03", "TG-04"]
      description: "Younger segments prefer digital channels"

  # Event Modifiers
  event:
    - id: "EVT-01"
      name: "Signa Aftermath"
      trust_penalty: -0.10
      transparency_premium: 0.15
      applies_to: "all"
      description: "Post-Signa trust recovery dynamics"
      duration: "2024-2025"

    - id: "EVT-02"
      name: "Market Volatility"
      advice_seeking_boost: 0.20
      applies_to: ["TG-01", "TG-02"]
      description: "Increased advisory value during uncertainty"

