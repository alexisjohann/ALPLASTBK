  last_updated: "2026-01-27"
  ebf_compatibility: "10C-v2.0"

# =============================================================================
# CUSTOMER CHARACTERISTICS
# =============================================================================

customer_profile:
  sector: "Financial Services"
  sub_sector: "Pure-Play Private Banking"
  ownership: "Public Company (SIX: BAER)"
  staatsgarantie: false
  pure_play: true

  key_differentiators:
    - id: "DIFF-01"
      name: "Pure-Play Wealth Management"
      behavioral_impact: "No conflict of interest perception, trust premium"
      tau_modifier: 1.15  # Erhöht τ um 15%

    - id: "DIFF-02"
      name: "Swiss Heritage (130+ years)"
      behavioral_impact: "Quality perception, stability, discretion"
      tau_modifier: 1.20  # Erhöht τ um 20%

    - id: "DIFF-03"
      name: "Global Presence (25 countries)"
      behavioral_impact: "Accessibility, international capability"
      accessibility_score: 0.85

    - id: "DIFF-04"
      name: "Exclusive Positioning"
      behavioral_impact: "Identity alignment, status signaling"
      iota_modifier: 1.25  # Erhöht Identity-Alignment um 25%

    - id: "DIFF-05"
      name: "Personal RM Relationship"
      behavioral_impact: "Trust, personalization, commitment"
      relationship_score: 0.92

    - id: "DIFF-06"
      name: "Bahnhofstrasse Zürich HQ"
      behavioral_impact: "Premium location, Swiss finance symbol"
      prestige_modifier: 1.10

# =============================================================================
# TARGET GROUPS
# =============================================================================

target_groups:
  - id: "TG-01"
    name: "UHNW Clients (>CHF 30M)"
    size_estimate: 8000
    share_of_aum: 0.45
    characteristics:
      - "Entrepreneurs, business owners"
      - "Multi-generational wealth"
      - "Complex needs (succession, philanthropy)"
      - "Global asset allocation"
    behavioral_profile:
      loss_aversion: 2.4
      present_bias: 0.95  # Low present bias, long-term oriented
      social_norm_sensitivity: 0.65  # Peer comparison on wealth
      trust_in_bank: 0.90
      exclusivity_value: 0.92
    priority: "highest"

  - id: "TG-02"
    name: "HNW Clients (CHF 1-30M)"
    size_estimate: 60000
    share_of_aum: 0.40
    characteristics:
      - "Executives, professionals"
