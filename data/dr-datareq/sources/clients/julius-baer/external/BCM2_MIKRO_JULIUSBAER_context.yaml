      relationship: "competitor"
      similarity: 0.70

    - module: "BCM2_MIKRO_PICTET"
      relationship: "peer"
      similarity: 0.80

    - module: "BCM2_MIKRO_RAIFFEISEN"
      relationship: "complementary"
      similarity: 0.30
      description: "Different segment (retail vs. private)"

