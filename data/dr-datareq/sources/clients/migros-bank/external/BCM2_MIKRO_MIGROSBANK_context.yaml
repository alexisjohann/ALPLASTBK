metadata:
  name: "Migros Bank Kontextvektor"
  code: "BCM2_MIKRO_MIGROSBANK"
  layer: "mikro"
  version: "1.0"
  last_updated: "2026-01-27"
  description: |
    Organisationsspezifischer Kontextvektor für die Migros Bank AG.
    Definiert Organisation, Strategie, Zielgruppen für Interventionen
    und mappt relevante Kontextfaktoren aus MESO (Banking) und MAKRO (Schweiz).

    Besonderheit: 100%-Tochter des Migros-Genossenschafts-Bundes.
    Fokus: Kundennutzen statt Aktienwert. Digitalste Schweizer Retailbank.

  hierarchy:
    parent: "BCM2_MESO_BANKING_CH"
    grandparent: "BCM2_04_KON (MAKRO Schweiz)"
    children: ["Projekt-Instanzen"]
    sibling: "BCM2_INDIV_MIGROSBANK (Individual Behavioral Parameters)"
    ecosystem: "Migros-Genossenschafts-Bund (MGB)"

  bcm_coupling:
    primary: "BCM2_MESO_BANKING_CH"
    secondary: "BCM2_04_KON"
    tertiary: "BCM2_03_IDN"  # Genossenschafts-Identität zentral

  ebf_mapping:
    primary_psi:
      - "kappa_IDENTITY"    # Migros-DNA, Genossenschafts-Werte
      - "kappa_KUNDENNUTZEN"  # Einzigartiger Fokus: Kein Aktionärsdruck
    secondary_psi:
      - "kappa_DIGITAL"     # Digitalste Retailbank
      - "kappa_OEKOSYSTEM"  # Migros-Ökosystem Integration
      - "kappa_SOCIAL"      # Diversität, 50% Frauenanteil
    utility_focus:
      - "u_KUNDE"           # Kundennutzen (primär, nicht Profit)
      - "u_X"               # Identitätsnutzen (Migros-Werte)
      - "u_S"               # Sozialer Nutzen (Diversität, Fairness)

