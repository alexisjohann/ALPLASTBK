# =============================================================================
# STRATEGIE
# =============================================================================
strategy:
  name: "Kundennutzen-First"
  positioning: "Digitalste Retailbank mit Genossenschafts-DNA"

  vision: |
    Die bevorzugte Bank für Schweizer Privatkunden durch überlegene
    digitale Erlebnisse und faire Konditionen.

  unique_value_proposition: |
    Als 100%-Tochter des MGB haben wir KEINE Aktionärsinteressen zu bedienen.
    Jeder Franken Gewinn fliesst in Kundennutzen: bessere Konditionen,
    bessere Services, bessere Digitalisierung.

  financial_targets:
    cost_income_ratio_target: "<50%"  # Aktuell 50.7%
    growth_strategy: "Organisches Wachstum Schweizer Retailmarkt"
    profit_purpose: "Reinvestition in Kundennutzen"

  strategic_pillars:
    - id: "S1-DIGITAL"
      name: "Digital Leadership"
      description: "Führende Position als digitalste Schweizer Retailbank ausbauen"
      weight: 0.35
      initiatives:
        - "Gen-AI im Kundendienst erweitern"
        - "Mobile-First Strategie"
        - "Digitales Onboarding optimieren"

    - id: "S2-KUNDENNUTZEN"
      name: "Kundennutzen maximieren"
      description: "Faire Konditionen und Produkte ohne Aktionärsdruck"
      weight: 0.30
      initiatives:
        - "Attraktive Sparkonditionen"
        - "Transparente Gebührenstruktur"
        - "Einfache Produkte"

    - id: "S3-OEKOSYSTEM"
      name: "Migros-Ökosystem nutzen"
      description: "Synergien innerhalb der Migros-Gruppe aktivieren"
      weight: 0.20
      initiatives:
        - "Integration mit Cumulus"
        - "Migros Pay Erweiterung"
        - "Cross-Selling über Migros-Kanäle"

    - id: "S4-EFFIZIENZ"
      name: "Operative Exzellenz"
      description: "Kosteneffizienz durch Digitalisierung verbessern"
      weight: 0.15
      target: "CIR < 50%"

  competitive_position:
    current_rank: "6. grösste Bank der Schweiz"
    unique_differentiator: "Einzige grosse Bank mit 100% Genossenschafts-Eigentum"
    benchmark_peers:
      - name: "Raiffeisen Gruppe"
        position: "2"
        comparison: "Ebenfalls Genossenschaft, dezentral organisiert"
      - name: "PostFinance"
        position: "4"
        comparison: "Keine Hypotheken (Einschränkung)"
      - name: "Zürcher Kantonalbank (ZKB)"
        position: "3"
        comparison: "Staatsgarantie, AAA"

# =============================================================================
# MIGROS-ÖKOSYSTEM
# =============================================================================
ecosystem:
  parent_organization:
    name: "Migros-Genossenschafts-Bund (MGB)"
    description: "Dachorganisation der Migros-Gruppe"
    structure: "Genossenschaft mit 10 regionalen Genossenschaften"

  strategic_business_fields_2026:
    - "Food Retail"
    - "Non-Food Retail"
    - "Gesundheit"
    - "Finanzdienstleistungen"  # Migros Bank

  note: |
    2026 ist das erste vollständige Jahr mit konsequentem Fokus
    auf diese vier strategischen Geschäftsfelder der Migros-Gruppe.

  synergies:
    distribution:
      type: "Physical"
      description: "Bargeld an 1700+ Migros-Standorten"
      benefit: "Höchste physische Reichweite unter Schweizer Banken"

    loyalty:
      type: "Data"
      description: "Cumulus-Programm Integration"
      benefit: "Cross-Selling, Kundenbindung"

    brand:
      type: "Trust"
      description: "Markenvertrauen von Migros-Supermarkt transferiert"
      benefit: "Vertrauensvorschuss ohne Staatsgarantie"

    values:
      type: "Cultural"
      description: "Genossenschafts-DNA = Kundennutzen vor Gewinn"
      benefit: "Authentische Positionierung als 'faire Bank'"

# =============================================================================
# ZIELGRUPPEN FÜR INTERVENTIONEN (WHO - Welfare Hierarchy)
# =============================================================================
target_groups:
  description: |
    Zielgruppen für verhaltensökonomische Interventionen,
    priorisiert nach Hebel und Erreichbarkeit.

  primary_targets:
    - id: "TG-RETAIL"
      name: "Retail-Kunden (Privatkunden)"
      size: ">1 Million"
      relevance: "Kerngeschäft, höchster Volumenbeitrag"
      decision_autonomy: "hoch (freie Bankwahl)"

      segmentation:
        by_lifecycle:
          - segment: "Young Professionals (25-35)"
            size_estimate: 0.25
            strategic_alignment: "S1-DIGITAL"
            key_need: "Mobile Banking, einfache Produkte"

          - segment: "Familien (35-50)"
            size_estimate: 0.35
            strategic_alignment: "S2-KUNDENNUTZEN"
            key_need: "Hypotheken, Vorsorge, faire Konditionen"

          - segment: "Best Ager (50-65)"
            size_estimate: 0.25
            strategic_alignment: "S2-KUNDENNUTZEN + S3-OEKOSYSTEM"
            key_need: "Vermögensaufbau, Pensionsplanung"

          - segment: "Senioren (65+)"
            size_estimate: 0.15
            strategic_alignment: "S3-OEKOSYSTEM"
            key_need: "Persönliche Betreuung, Einfachheit"

        by_digital_affinity:
          - segment: "Digital Natives"
            share: 0.30
            description: "Mobile-only, Tech-affin"
            approach: "App-First, Self-Service"

          - segment: "Digital Immigrants"
            share: 0.45
            description: "Nutzen Digital, brauchen manchmal Hilfe"
            approach: "Omnichannel, hybride Betreuung"

          - segment: "Digital Hesitants"
            share: 0.25
            description: "Bevorzugen Filiale/Telefon"
            approach: "Persönliche Betreuung, sanfte Digitalisierung"

      key_barriers:
        - barrier: "Wechselträgheit"
          description: "Bankwechsel = Aufwand (Daueraufträge, etc.)"
          severity: 0.75

        - barrier: "Vergleichbarkeit"
          description: "Schwierigkeit, Konditionen zu vergleichen"
          severity: 0.60

        - barrier: "Vertrauen in Digitalbanken"
          description: "Skeptis gegenüber reinen Digitalangeboten"
          severity: 0.45

      key_enablers:
        - enabler: "Migros-Vertrauen"
          description: "Transfer vom Supermarkt zur Bank"
          strength: 0.72

        - enabler: "Faire Konditionen"
          description: "Wahrnehmung als 'günstige Bank'"
          strength: 0.68

        - enabler: "Cumulus-Integration"
          description: "Bereits im Migros-Ökosystem"
          strength: 0.55

    - id: "TG-MITARBEITENDE"
      name: "Mitarbeitende"
      size: 1900
      relevance: "Markenbotschafter, Service-Qualität"
      decision_autonomy: "mittel (in Rollenverantwortung)"

      segmentation:
        by_function:
          - segment: "Kundenberatung Retail"
            size_estimate: 600
            strategic_alignment: "S1-DIGITAL + S2-KUNDENNUTZEN"

          - segment: "KMU-Beratung"
            size_estimate: 200
            strategic_alignment: "S2-KUNDENNUTZEN"

          - segment: "IT & Digital"
            size_estimate: 400
            strategic_alignment: "S1-DIGITAL"

          - segment: "Operations"
            size_estimate: 400
            strategic_alignment: "S4-EFFIZIENZ"

          - segment: "Stab (HR, Finance, etc.)"
            size_estimate: 300
            strategic_alignment: "S4-EFFIZIENZ"

      key_barriers:
        - barrier: "Change-Müdigkeit"
          description: "Kontinuierliche Digitalisierung = Anpassungsdruck"
          severity: 0.55

        - barrier: "Skill-Gap Digital"
          description: "Gen-AI erfordert neue Kompetenzen"
          severity: 0.50

      key_enablers:
        - enabler: "Genossenschafts-Stolz"
          description: "Identifikation mit Migros-Werten"
          strength: 0.75

        - enabler: "Diversität"
          description: "50% Frauenanteil = Wertschätzung"
          strength: 0.68

        - enabler: "Innovation-Leader"
          description: "Stolz auf 'digitalste Retailbank'"
          strength: 0.70

  secondary_targets:
    - id: "TG-KMU"
      name: "KMU-Kunden"
      role: "Wachstumssegment, Cross-Selling Potential"

    - id: "TG-CUMULUS"
      name: "Cumulus-Mitglieder (ohne Bankbeziehung)"
      role: "Akquisitionspotential über Ökosystem"

# =============================================================================
# VERHALTENSÖKONOMISCHE PARAMETER
# =============================================================================
behavioral_parameters:
  description: |
    Verhaltensökonomische Parameter für Interventionen bei Migros Bank.
    Basierend auf Literatur + LLMMC-Schätzung für Kontext.

  customer_parameters:
    loss_aversion_banking:
      symbol: "lambda_BANK"
      value: 2.25
      range: [1.8, 2.7]
      description: "Verlustaversion bei Finanzentscheidungen"
      source: "LLMMC + Kahneman/Tversky 1979"
      context_modifier: "Höher bei Senioren, tiefer bei Digital Natives"

    default_bias_banking:
      symbol: "delta_DEFAULT"
      value: 0.72
      range: [0.60, 0.85]
      description: "Tendenz, bei bestehender Bank zu bleiben"
      source: "LLMMC + Samuelson/Zeckhauser 1988"

    trust_transfer_migros:
      symbol: "tau_MIGROS"
      value: 0.68
      range: [0.55, 0.80]
      description: "Transfer von Migros-Vertrauen auf Migros Bank"
      source: "LLMMC + Brand Extension Literature"
      unique_factor: "Einzigartig für Migros Bank im CH Markt"

    digital_adoption_propensity:
      symbol: "alpha_DIG"
      value: 0.62
      range: [0.45, 0.78]
      description: "Bereitschaft für Digital Banking Adoption"
      source: "LLMMC + Technology Acceptance Model"
      segment_variance: "Stark altersabhängig (0.85 für <35, 0.40 für 65+)"

  employee_parameters:
    identity_alignment_migros:
      symbol: "iota_MIG"
      value: 0.75
      range: [0.65, 0.85]
      description: "Identifikation mit Migros-Genossenschafts-Werten"
      source: "LLMMC + Organizational Identity Literature"

    innovation_pride:
      symbol: "pi_INN"
      value: 0.70
      range: [0.58, 0.82]
      description: "Stolz auf 'digitalste Retailbank' Positionierung"
      source: "LLMMC + Org Behavior Literature"

    customer_orientation:
      symbol: "omega_KUND"
      value: 0.78
      range: [0.68, 0.88]
      description: "Intrinsische Kundenorientierung (vs. Verkaufsdruck)"
      source: "LLMMC + Service Literature"
      unique_factor: "Verstärkt durch fehlenenden Aktionärsdruck"

# =============================================================================
# KONTEXT-RELEVANZ-MAPPING (aus MAKRO Schweiz)
# =============================================================================
context_relevance:
  description: |
    Mapping der relevantesten Kontextfaktoren aus MAKRO (Schweiz)
    für Migros Bank-spezifische Interventionen.

  high_relevance_makro:
    - factor_id: "CH-SOC-01"
      name: "Institutionenvertrauen"
      value: 0.72
      migros_bank_relevance: |
        Hohes Vertrauen in etablierte Institutionen = Asset.
        Migros-Marke profitiert von "Schweizer Institution" Image.

    - factor_id: "CH-ECO-05"
      name: "Digitalisierungsbereitschaft Banking"
      value: 0.62
      migros_bank_relevance: |
        "Digitalste Retailbank" Positionierung = zeitgemäss.
        Gen-AI Akzeptanz steigt (aber mit Privacy-Bedenken).

    - factor_id: "CH-SOC-08"
      name: "Preis-Leistungs-Sensitivität"
      value: 0.68
      migros_bank_relevance: |
        Schweizer sind preisbewusst (Migros-DNA passt).
        "Faire Konditionen" Narrativ = hohe Resonanz.

    - factor_id: "CH-SOC-15"
      name: "Genossenschafts-Tradition"
      value: 0.55
      migros_bank_relevance: |
        Genossenschaftsmodell = positiv konnotiert in CH.
        Migros + Raiffeisen + Coop = bekannte Genossenschaften.

    - factor_id: "CH-TEC-03"
      name: "Mobile Payment Adoption"
      value: 0.58
      migros_bank_relevance: |
        Twint-Dominanz, aber Migros Pay als Alternative.
        Integration in Cumulus-Ökosystem = Chance.

    - factor_id: "CH-ARB-03"
      name: "Fachkräftemangel Finanzsektor"
      value: 0.58
      migros_bank_relevance: |
        Diversität (50% Frauen) = Arbeitgeberattraktivität.
        Gen-AI kann Fachkräftemangel teilweise kompensieren.

# =============================================================================
# INTERVENTION DOMAINS
# =============================================================================
intervention_domains:
  description: |
    Hauptinterventionsfelder für Migros Bank,
    gemappt auf EBF-Dimensionen.

  domains:
    - id: "INT-DIGITAL"
      name: "Digital Banking Adoption"
      description: "Kunden zur Nutzung digitaler Kanäle bewegen"

      target_10c: "AWARE + HOW"
      delta_target: "Digital Adoption Rate steigern"

      key_message: |
        "Banking so einfach wie Migros-Einkaufen – jetzt auch digital."

      intervention_types:
        - type: "T1_Information"
          examples:
            - "Tutorials in App"
            - "Onboarding-Videos"
            - "Digital-Coaches in Filialen"

        - type: "T3_ChoiceArchitecture"
          examples:
            - "Digital-First Defaults"
            - "App als Einstiegspunkt"
            - "Vereinfachte digitale Prozesse"

        - type: "T6_Social"
          examples:
            - "Peer-Empfehlungen"
            - "Familien-Onboarding"

    - id: "INT-OEKOSYSTEM"
      name: "Migros-Ökosystem Aktivierung"
      description: "Cumulus-Kunden zu Migros Bank Kunden konvertieren"

      target_10c: "WHAT + HOW"
      delta_target: "Cross-Selling Quote erhöhen"

      key_message: |
        "Schon Cumulus-Kunde? Dann kennen Sie unsere Werte bereits."

      intervention_types:
        - type: "T2_Incentive"
          examples:
            - "Cumulus-Punkte für Kontoeröffnung"
            - "Exklusive Konditionen für Cumulus-Members"

        - type: "T5_Identity"
          examples:
            - "Migros-Familie Narrativ"
            - "Gemeinsame Werte betonen"

    - id: "INT-KUNDENNUTZEN"
      name: "Kundennutzen-Wahrnehmung"
      description: "Faire Konditionen sichtbar machen"

      target_10c: "AWARE + WHAT"
      delta_target: "Wahrnehmung 'faire Bank' stärken"

      key_message: |
        "Wir haben keine Aktionäre, die Rendite wollen. Nur Sie."

      intervention_types:
        - type: "T1_Information"
          examples:
            - "Transparente Konditionenvergleiche"
            - "Erklärung Genossenschaftsmodell"
            - "'Was passiert mit unserem Gewinn?' Kommunikation"

        - type: "T5_Identity"
          examples:
            - "Genossenschafts-Werte als Differenzierung"
            - "Authentizität statt Marketing"

    - id: "INT-EMPLOYEE"
      name: "Mitarbeitenden-Engagement"
      description: "Mitarbeitende als Markenbotschafter aktivieren"

      target_10c: "WHO + WHAT"
      delta_target: "Employee Engagement und Advocacy steigern"

      key_message: |
        "Bei uns zählt der Kunde, nicht der Aktionär. Deshalb arbeite ich hier."

      intervention_types:
        - type: "T5_Identity"
          examples:
            - "Migros-DNA Workshops"
            - "Stolz auf Digitalführerschaft"

        - type: "T6_Social"
          examples:
            - "Peer Recognition"
            - "Diversitäts-Initiativen"

# =============================================================================
# STRATEGISCHE IMPLIKATIONEN
# =============================================================================
strategic_implications:
  intervention_principles:
    - principle: "Kundennutzen immer zuerst"
      description: |
        Jede Massnahme über "Kundennutzen" framen, nie über Profit.
        Authentizität ist das Asset – nicht verspielen.
      relevant_factors: ["tau_MIGROS", "omega_KUND"]

    - principle: "Digital sanft einführen"
      description: |
        Digitalführerschaft ja, aber niemanden zurücklassen.
        Omnichannel = 76 Filialen + App sind kein Widerspruch.
      relevant_factors: ["alpha_DIG", "delta_DEFAULT"]

    - principle: "Migros-Ökosystem nutzen"
      description: |
        1700 Bargeldstandorte, Cumulus, Markenvertrauen = einzigartig.
        Cross-Selling über Ökosystem, nicht aggressive Werbung.
      relevant_factors: ["tau_MIGROS"]

    - principle: "Diversität als Wert leben"
      description: |
        50% Frauenanteil ist kein Compliance-Thema, sondern Identität.
        Authentische Diversität = Arbeitgeberattraktivität.
      relevant_factors: ["iota_MIG"]

  unique_competitive_advantages:
    - advantage: "Keine Aktionärsinteressen"
      description: "Einzige grosse Schweizer Bank ohne Shareholder-Value Druck"
      behavioral_implication: "Echte Kundenorientierung möglich, intrinsische Motivation"

    - advantage: "Migros-Ökosystem"
      description: "Teil des grössten privaten Arbeitgebers der Schweiz"
      behavioral_implication: "Trust Transfer, Cross-Selling, physische Präsenz"

    - advantage: "Digital Leadership"
      description: "Digitalste Schweizer Retailbank mit Gen-AI"
      behavioral_implication: "Innovation-Pride bei Mitarbeitenden, Attraction für Digital Natives"

