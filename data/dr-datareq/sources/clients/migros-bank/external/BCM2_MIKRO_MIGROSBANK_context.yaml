# =============================================================================
# FAZIT
# =============================================================================
conclusion:
  insight: |
    Die Migros Bank hat eine einzigartige Positionierung im Schweizer Markt:
    Als 100%-Tochter des MGB kann sie sich voll auf Kundennutzen fokussieren
    ohne Aktionärsinteressen bedienen zu müssen.

    Diese Authentizität ist das grösste Asset. Verhaltensökonomische
    Interventionen sollten diese Einzigartigkeit verstärken, nicht verwässern.

    Die Kombination aus Digitalführerschaft + Genossenschafts-Werte +
    Migros-Ökosystem ergibt eine starke und differenzierte Position.

  migros_bank_principle: |
    "Kundennutzen vor Gewinn – weil wir es können."
