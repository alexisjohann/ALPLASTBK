metadata:
  module_id: "BCM2_MIKRO_GKB"
  customer: "Graubündner Kantonalbank"
  version: "1.0.0"
  last_updated: "2026-01-27"
  ebf_compatibility: "10C-v2.0"

# =============================================================================
# CUSTOMER CHARACTERISTICS
# =============================================================================

customer_profile:
  sector: "Financial Services"
  sub_sector: "Kantonalbanken"
  ownership: "Öffentlich-rechtlich (Kanton GR 84.6%)"
  staatsgarantie: true

  key_differentiators:
    - id: "DIFF-01"
      name: "Staatsgarantie"
      behavioral_impact: "Erhöhtes Sicherheitsgefühl, reduzierte Loss Aversion"
      lambda_modifier: 0.85  # Reduziert λ um 15%

    - id: "DIFF-02"
      name: "Regionale Verankerung (156 Jahre)"
      behavioral_impact: "Hohe Trust-Baseline, In-Group-Effekt"
      tau_modifier: 1.20  # Erhöht τ um 20%

    - id: "DIFF-03"
      name: "Beste Bank Auszeichnung (5x)"
      behavioral_impact: "Social Proof, Quality Signal"
      sigma_modifier: 1.15  # Erhöht σ um 15%

    - id: "DIFF-04"
      name: "Flächendeckende Präsenz"
      behavioral_impact: "Accessibility, Convenience"
      accessibility_score: 0.90

    - id: "DIFF-05"
      name: "Hybrider Beratungsansatz"
      behavioral_impact: "Wahlfreiheit, Autonomie-Wahrung"
      autonomy_score: 0.85

# =============================================================================
# TARGET GROUPS
# =============================================================================

target_groups:
  - id: "TG-01"
    name: "Bündner Privatkunden"
    size_estimate: 80000
    share_of_canton: 0.40
    characteristics:
      - "Stark regional verwurzelt"
      - "Sicherheitsorientiert"
      - "Traditionsbewusst"
    behavioral_profile:
      loss_aversion: 2.2
      present_bias: 0.88
      social_norm_sensitivity: 0.75
      trust_in_bank: 0.90
    priority: "high"

  - id: "TG-02"
    name: "Bündner KMU"
    size_estimate: 12000
    characteristics:
      - "Tourismus-abhängig (40%)"
      - "Saisonale Liquiditätsbedürfnisse"
      - "Lokale Netzwerke wichtig"
    behavioral_profile:
      loss_aversion: 2.5
      present_bias: 0.82
      relationship_preference: 0.85
      digital_affinity: 0.60
    priority: "high"

  - id: "TG-03"
    name: "Tourismus-Branche"
    size_estimate: 3000
    characteristics:
      - "Hotels, Bergbahnen, Gastronomie"
      - "Hohe Saisonalität"
      - "Investitionsintensiv"
    behavioral_profile:
      loss_aversion: 2.8
      risk_tolerance: 0.55
      long_term_orientation: 0.70
      subsidy_dependency: 0.45
    priority: "medium"

  - id: "TG-04"
    name: "Private Banking Kunden"
    size_estimate: 5000
    characteristics:
      - "Vermögende Privatkunden"
      - "Oft Zweitwohnungsbesitzer"
      - "Anspruchsvoll bei Beratung"
    behavioral_profile:
      loss_aversion: 1.8
      present_bias: 0.92
      advice_seeking: 0.85
      digital_affinity: 0.70
    priority: "high"

  - id: "TG-05"
    name: "Institutionelle Kunden"
    size_estimate: 200
    characteristics:
      - "Pensionskassen, Gemeinden, Stiftungen"
      - "Governance-getrieben"
      - "Langfristig orientiert"
    behavioral_profile:
      loss_aversion: 2.0
      regulatory_sensitivity: 0.95
      reputation_concern: 0.90
      cost_sensitivity: 0.75
    priority: "medium"

  - id: "TG-06"
    name: "Junge Erwachsene (18-35)"
    size_estimate: 25000
    characteristics:
      - "Digital Natives"
      - "Hohe Mobilität (Abwanderung)"
      - "Vorsorge-Nachholbedarf"
    behavioral_profile:
      loss_aversion: 1.6
      present_bias: 0.75
      digital_preference: 0.90
      gioia_3a_affinity: 0.80
    priority: "high"

# =============================================================================
# INTERVENTION DOMAINS
# =============================================================================

intervention_domains:
  - id: "INT-DOM-01"
    name: "Vorsorge 3a"
    description: "Digitale Vorsorgelösungen (Gioia 3a)"
    target_groups: ["TG-01", "TG-06"]
    10c_dimensions:
      WHAT: "Finanzielle Sicherheit im Alter"
      WHEN: "Lebensphasen-Trigger (Berufseinstieg, Heirat, Geburt)"
      AWARE: "Steuervorteile-Kommunikation"
    behavioral_levers:
      - lever: "Loss Framing"
        description: "Entgangene Steuervorteile betonen"
        expected_effect: 0.25
      - lever: "Social Proof"
        description: "X% der Bündner:innen sparen bereits"
        expected_effect: 0.15
      - lever: "Simplification"
        description: "Digitales Onboarding ohne e-Banking"
        expected_effect: 0.20

  - id: "INT-DOM-02"
    name: "Hypotheken"
    description: "Eigenheimfinanzierung"
    target_groups: ["TG-01", "TG-04"]
    10c_dimensions:
      WHAT: "Wohneigentum, Sicherheit"
      WHO: "Familien, etablierte Paare"
      HOW: "Persönliche Beratung + Online-Rechner"
    behavioral_levers:
      - lever: "Anchoring"
        description: "Regionale Vergleichszinsen zeigen"
        expected_effect: 0.10
      - lever: "Default Setting"
        description: "Empfohlene Amortisationsrate"
        expected_effect: 0.15
      - lever: "Trust Transfer"
        description: "Staatsgarantie als Sicherheitssignal"
        expected_effect: 0.20

  - id: "INT-DOM-03"
    name: "KMU-Finanzierung"
    description: "Geschäftskredite und Betriebsmittel"
    target_groups: ["TG-02", "TG-03"]
    10c_dimensions:
      WHAT: "Liquidität, Wachstum"
      WHEN: "Saisonvorbereitung, Investitionszyklen"
      WHERE: "Lokale Betreuung (45 Standorte)"
    behavioral_levers:
      - lever: "Relationship Banking"
        description: "Persönlicher Firmenkundenberater"
        expected_effect: 0.25
      - lever: "Timing"
        description: "Proaktive Kontaktaufnahme vor Saison"
        expected_effect: 0.15
      - lever: "Commitment Device"
        description: "Zielvereinbarungen mit Flexibilität"
        expected_effect: 0.10

  - id: "INT-DOM-04"
    name: "Digital Banking Adoption"
    description: "Migration zu Mobile Banking / e-Banking"
    target_groups: ["TG-01", "TG-02", "TG-06"]
    10c_dimensions:
      WHAT: "Convenience, Zeitersparnis"
      HOW: "Schrittweise Einführung, Support"
      AWARE: "Funktions-Demonstrations"
    behavioral_levers:
      - lever: "Guided Onboarding"
        description: "In-Filiale Demo + Follow-up"
        expected_effect: 0.30
      - lever: "Social Norm"
        description: "X% nutzen bereits Mobile Banking"
        expected_effect: 0.15
      - lever: "Feature Highlighting"
        description: "QR-Rechnung scannen als Einstieg"
        expected_effect: 0.20

  - id: "INT-DOM-05"
    name: "Anlageberatung"
    description: "Vermögensverwaltung und Anlageprodukte"
    target_groups: ["TG-04", "TG-05"]
    10c_dimensions:
      WHAT: "Rendite, Vermögenserhalt"
      WHO: "Vermögende Kunden, Institutionelle"
      HOW: "Persönliche Beratung, Albin Kistler"
    behavioral_levers:
      - lever: "Expert Framing"
        description: "Albin Kistler als Qualitätssignal"
        expected_effect: 0.15
      - lever: "Goal Setting"
        description: "Anlageziele definieren und tracken"
        expected_effect: 0.20
      - lever: "Loss Aversion Mitigation"
        description: "Langfrist-Perspektive betonen"
        expected_effect: 0.15

# =============================================================================
# CONTEXT MODIFIERS
# =============================================================================

context_modifiers:
  # Regionale Modifikatoren
  regional:
    - id: "REG-01"
      name: "Bündner Identität"
      factor: 1.20
      applies_to: ["TG-01", "TG-02", "TG-03"]
      description: "Verstärkte Wirkung lokaler Social Proof"

    - id: "REG-02"
      name: "Tourismus-Saisonalität"
      factor_winter: 1.30
      factor_summer: 1.15
      factor_offseason: 0.85
      applies_to: ["TG-03"]
      description: "Saisonale Anpassung der Interventions-Intensität"

    - id: "REG-03"
      name: "Tal-Differenzierung"
      engadin_factor: 1.10
      surselva_factor: 1.05
      chur_factor: 1.00
      applies_to: "all"
      description: "Regionale Unterschiede innerhalb GR"

  # Institutionelle Modifikatoren
  institutional:
    - id: "INST-01"
      name: "Staatsgarantie-Effekt"
      trust_boost: 0.25
      loss_aversion_reduction: 0.15
      applies_to: "all"
      description: "Kantonale Garantie als Vertrauensanker"

    - id: "INST-02"
      name: "Best Bank Award"
      quality_signal: 0.20
      social_proof: 0.15
      applies_to: "all"
      description: "5x Beste Bank Auszeichnung"

  # Digitale Modifikatoren
  digital:
    - id: "DIG-01"
      name: "Hybrid Präferenz"
      digital_only_penalty: -0.15
      hybrid_bonus: 0.10
      applies_to: ["TG-01", "TG-02"]
      description: "Präferenz für Kombination digital/persönlich"

    - id: "DIG-02"
      name: "Digital Native Bonus"
      digital_only_bonus: 0.20
      applies_to: ["TG-06"]
      description: "Junge Kunden bevorzugen digitale Lösungen"

# =============================================================================
# STRATEGIC IMPLICATIONS
# =============================================================================

strategic_implications:
  opportunities:
    - id: "OPP-01"
      name: "Vorsorge-Digitalisierung"
      description: "Gioia 3a als Einstiegsprodukt für junge Kunden"
      priority: "high"
      estimated_impact: "CHF 50 Mio Neugelder p.a."

    - id: "OPP-02"
      name: "Tourismus-Paket"
      description: "Integrierte Finanzlösung für Tourismusbetriebe"
      priority: "medium"
      estimated_impact: "20% Marktanteilsgewinn"

    - id: "OPP-03"
      name: "Zweitwohnungsbesitzer"
      description: "Cross-Selling an nicht-Bündner Private Banking"
      priority: "medium"
      estimated_impact: "CHF 100 Mio AuM"

  risks:
    - id: "RISK-01"
      name: "Abwanderung Junge"
      description: "Brain Drain aus Graubünden"
      mitigation: "Digitale Bindung, Gioia Kids für Familien"
      probability: 0.60

    - id: "RISK-02"
      name: "Zinsmargen-Druck"
      description: "Sinkende Zinserfolge"
      mitigation: "Kommissionsgeschäft stärken"
      probability: 0.70

    - id: "RISK-03"
      name: "Digital Disruption"
      description: "Neobanken in Tourismusregionen"
      mitigation: "Hybrid-Ansatz, lokale Präsenz betonen"
      probability: 0.40

# =============================================================================
# BCM2 MODULE COUPLING
# =============================================================================

bcm2_coupling:
  parent_modules:
    - "BCM2_04_KON_institutional_political"
    - "BCM2_04_KON_socio_cultural"
    - "BCM2_05_IND_individual"

  related_contexts:
    - module: "BCM2_MIKRO_LUKB"
      relationship: "peer"
      similarity: 0.75

    - module: "CH-REG-01"
      relationship: "macro"
      description: "Schweizer Staatserwartung"

  data_flow:
    inputs:
      - "CH macro context parameters"
      - "Graubünden regional statistics"
      - "GKB annual report data"
    outputs:
      - "GKB-specific behavioral parameters"
      - "Intervention recommendations"
      - "Segment-specific modifiers"
