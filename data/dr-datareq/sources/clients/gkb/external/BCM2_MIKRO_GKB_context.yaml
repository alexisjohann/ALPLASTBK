# =============================================================================
# BCM2 MICRO-CONTEXT: GRAUBÜNDNER KANTONALBANK (GKB)
# =============================================================================
# Version: 1.0.0
# Created: 2026-01-27
# Updated: 2026-01-27
# Module: BCM2_MIKRO_GKB
# Purpose: Micro-level behavioral context for GKB interventions
