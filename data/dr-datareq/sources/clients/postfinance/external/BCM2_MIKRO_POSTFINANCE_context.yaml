# BCM2_MIKRO_POSTFINANCE – Kontextvektor PostFinance
# Version: 1.0
# Quelle: FehrAdvice Kontextvektor-Architektur 2026
# Letzte Aktualisierung: 2026-01-27
# Ebene: MIKRO (Organisationsspezifisch)

metadata:
  name: "PostFinance Kontextvektor"
  code: "BCM2_MIKRO_POSTFINANCE"
  layer: "mikro"
  version: "1.0"
  last_updated: "2026-01-27"
  description: |
    Organisationsspezifischer Kontextvektor für PostFinance AG.
    Definiert Organisation, Strategie, Zielgruppen für Interventionen
    und mappt relevante Kontextfaktoren aus MESO (Banking) und MAKRO (Schweiz).

    Besonderheit: 100%-Tochter der Schweizerischen Post AG.
    Fokus: Zahlungsverkehrs-Leader, Digital-Pionier, kein Kreditgeschäft (POA-Einschränkung).

  hierarchy:
    parent: "BCM2_MESO_BANKING_CH"
    grandparent: "BCM2_04_KON (MAKRO Schweiz)"
    children: ["Projekt-Instanzen"]
    sibling: "BCM2_INDIV_POSTFINANCE (Individual Behavioral Parameters)"
    ecosystem: "Schweizerische Post AG"

  bcm_coupling:
    primary: "BCM2_MESO_BANKING_CH"
    secondary: "BCM2_04_KON"
    tertiary: "BCM2_03_IDN"  # Post-Identität zentral

  ebf_mapping:
    primary_psi:
      - "kappa_IDENTITY"    # Post-DNA, Gelbe Marke
      - "kappa_PAYMENT"     # Zahlungsverkehrs-Leader
    secondary_psi:
      - "kappa_DIGITAL"     # Digital Pioneer (E-Finance, TWINT)
      - "kappa_ACCESSIBILITY"  # Zugänglich für alle Schweizer
      - "kappa_REGULATORY"  # POA-Einschränkungen (kein Kreditgeschäft)
    utility_focus:
      - "u_CONVENIENCE"     # Einfachheit (primär)
      - "u_X"               # Identitätsnutzen (Post-Vertrauen)
      - "u_S"               # Sozialer Nutzen (Zugänglichkeit)

# =============================================================================
# ORGANISATION
# =============================================================================
organisation:
  name_de: "PostFinance"
  name_full: "PostFinance AG"
  legal_form: "Aktiengesellschaft"
  founded: 1906
  independence: 2013  # AG-Status
  headquarters: "Bern"

  ownership:
    schweizerische_post_ag: 1.00  # 100%
    stock_listed: false
    staatsgarantie: false  # Keine formelle, aber implizite Bundes-Stützung
    systemically_important: true  # SNB-Klassifikation seit 2015
    public_ownership_chain: "Bund → Swiss Post → PostFinance"

  size:
    employees: 3013
    employees_note: "Stand Ende 2024, Reduktion angekündigt"
    branches: 16
    branches_note: "Alle bis 2025 neu gestaltet"
    post_office_integration: 800
    kunden_private_million: 2.5
    kunden_business: 300000
    bilanzsumme_chf_mrd: 118
    kundeneinlagen_chf_mrd: 97.6
    operating_profit_chf_mio: 203  # 2024, down 61M
    net_profit_chf_mio: 120  # 2024, down 44M

  ceo:
    name: "Beat Röthlisberger"
    since: "2024-07-01"
    background: "Digital transformation, efficiency focus"
    predecessor: "Hansruedi Köng"
    topics:
      - "Strategy Pulse 2025"
      - "Non-interest revenue growth"
      - "Cost optimization"
      - "Digital innovation"

  rating:
    agency: "S&P Global Ratings"
    long_term: "AA"
    short_term: "A-1+"
    outlook: "stable"

  core_business:
    - "Zahlungsverkehr (Payment traffic leader)"
    - "Einlagengeschäft (Deposits)"
    - "E-Finance (Online Banking)"
    - "TWINT (Mobile Payment)"
    - "Anlegen (Investment services)"
    - "Kreditvermittlung (via partners, no direct lending)"

  regulatory_constraints:
    - constraint: "Postal Organization Act (POA)"
      description: "Prohibits direct lending business"
      status: "2022 revision rejected by Parliament"
      impact: "Cannot offer mortgages or loans directly"
      workaround: "Partnership model (Bob Finance, CredEx, Valiant)"

  geographic_focus:
    primary: "Schweiz (alle Landesteile)"
    distribution: "16 Filialen + 800 Poststellen + Digital"

  unique_positioning:
    - "Switzerland's largest payment traffic provider"
    - "TWINT co-founder and market leader"
    - "Digital pioneer (E-Finance since 2000s)"
    - "Accessible banking for all Swiss (universal access mandate)"
    - "No direct lending (regulatory constraint)"

# =============================================================================
# STRATEGIE
# =============================================================================
strategy:
  name: "Pulse"
  period: "2025+"
  positioning: "Digital-first payment and savings bank"

  vision: |
    Die bevorzugte Bank für den Schweizer Zahlungsverkehr und digitales
    Banking, zugänglich für alle.

  unique_value_proposition: |
    Als Teil der Schweizerischen Post bieten wir jedem Schweizer einfachen
    Zugang zu modernen Finanzdienstleistungen – digital, sicher, vertraut.

  financial_targets:
    non_interest_revenue_growth: "Critical priority"
    cost_optimization: "Ongoing (workforce reduction)"
    interest_rate_adaptation: "Offset SNB rate cut impact"

  strategic_pillars:
    - id: "S1-PAYMENT"
      name: "Payment Traffic Leadership"
      description: "Führungsposition im Schweizer Zahlungsverkehr halten und ausbauen"
      weight: 0.35
      initiatives:
        - "TWINT ecosystem expansion"
        - "QR-bill leadership"
        - "Real-time payments"

    - id: "S2-DIGITAL"
      name: "Digital Innovation"
      description: "Digitalste Schweizer Bank für Privatkunden bleiben"
      weight: 0.30
      initiatives:
        - "E-Finance enhancement"
        - "PostFinance App excellence"
        - "Crypto trading services (launched 2024)"
        - "AI-driven personalization"

    - id: "S3-NONINTEREST"
      name: "Non-Interest Revenue"
      description: "Zinsunabhängige Erträge steigern (kritisch nach SNB-Zinssenkungen)"
      weight: 0.25
      initiatives:
        - "Fee-based services"
        - "Investment products"
        - "Partnership commissions (lending)"

    - id: "S4-EFFICIENCY"
      name: "Cost Optimization"
      description: "Effizienz steigern, Kosten senken"
      weight: 0.10
      initiatives:
        - "Workforce optimization"
        - "Process automation"
        - "Branch redesign (16 new concepts by 2025)"

  competitive_position:
    current_rank: "4. grösste Bank der Schweiz (nach Bilanzsumme)"
    unique_differentiator: "Zahlungsverkehrs-Dominanz + Post-Netzwerk"
    benchmark_peers:
      - name: "Migros Bank"
        position: "6"
        comparison: "Ebenfalls keine Staatsgarantie, Genossenschafts-DNA"
      - name: "Raiffeisen Gruppe"
        position: "2"
        comparison: "Genossenschaft, dezentral, Hypotheken-stark"
      - name: "Zürcher Kantonalbank (ZKB)"
        position: "3"
        comparison: "Staatsgarantie, AAA, Vollbank"

  key_challenges:
    - challenge: "Interest Rate Sensitivity"
      description: "SNB rate cuts directly impact profit (-59M CHF in 2024)"
      mitigation: "Non-interest revenue growth"

    - challenge: "Lending Prohibition"
      description: "POA prevents direct mortgage/loan business"
      mitigation: "Partnership model (limited success)"

    - challenge: "Competition"
      description: "Neobanks, traditional banks, payment fintechs"
      mitigation: "Digital leadership, TWINT dominance, Post trust"

