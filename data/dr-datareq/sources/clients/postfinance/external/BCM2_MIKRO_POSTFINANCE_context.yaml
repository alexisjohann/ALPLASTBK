      description: "Post brand trust transferred to PostFinance"
      benefit: "Instant credibility, yellow brand recognition"

    logistics:
      type: "Operational"
      description: "Integration with Post logistics for cash transport, documents"
      benefit: "Cost synergies, operational efficiency"

    customer_base:
