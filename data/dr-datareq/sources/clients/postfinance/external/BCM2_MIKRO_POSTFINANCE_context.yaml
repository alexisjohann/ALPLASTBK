          description: "Workforce reduction announced"
          severity: 0.70

        - barrier: "Rate Cut Impact on Business"
          description: "Profit decline affects morale"
          severity: 0.55

      key_enablers:
        - enabler: "Post Identity"
          description: "Pride in Post heritage"
          strength: 0.70

        - enabler: "Digital Pioneer Status"
          description: "Pride in innovation leadership"
          strength: 0.72

        - enabler: "Swiss Institution"
          description: "Part of critical infrastructure"
          strength: 0.68

  secondary_targets:
    - id: "TG-TWINT"
      name: "TWINT Users (non-PostFinance customers)"
      role: "Acquisition potential via TWINT ecosystem"

    - id: "TG-POST"
      name: "Post customers (without PostFinance)"
      role: "Cross-selling via Post network"

# =============================================================================
# VERHALTENSÖKONOMISCHE PARAMETER
# =============================================================================
behavioral_parameters:
  description: |
    Verhaltensökonomische Parameter für Interventionen bei PostFinance.
    Basierend auf Literatur + LLMMC-Schätzung für Kontext.

  customer_parameters:
    loss_aversion_banking:
      symbol: "lambda_BANK"
      value: 2.30
      range: [1.9, 2.8]
      description: "Verlustaversion bei Finanzentscheidungen"
      source: "LLMMC + Kahneman/Tversky 1979"
      context_modifier: "Höher bei Seniors, tiefer bei Young Digital"

    default_bias_banking:
      symbol: "delta_DEFAULT"
      value: 0.78
      range: [0.65, 0.88]
      description: "Tendenz, bei bestehender Bank zu bleiben"
      source: "LLMMC + Samuelson/Zeckhauser 1988"
      context_modifier: "PostFinance customers very sticky"

    trust_transfer_post:
      symbol: "tau_POST"
      value: 0.75
      range: [0.60, 0.85]
      description: "Transfer von Post-Vertrauen auf PostFinance"
      source: "LLMMC + Brand Extension Literature"
      unique_factor: "Strong Post brand heritage in Switzerland"

    digital_adoption_propensity:
      symbol: "alpha_DIG"
      value: 0.70
      range: [0.55, 0.82]
      description: "Bereitschaft für Digital Banking Adoption"
      source: "LLMMC + Technology Acceptance Model"
      segment_variance: "High variance: 0.90 for Young Digital, 0.45 for Seniors"

    twint_engagement:
      symbol: "eta_TWINT"
      value: 0.82
      range: [0.70, 0.92]
      description: "TWINT usage propensity among customers"
      source: "PostFinance TWINT data"
      unique_factor: "PostFinance is TWINT market leader"

    accessibility_value:
      symbol: "alpha_ACC"
      value: 0.68
      range: [0.55, 0.78]
      description: "Value placed on universal banking access"
      source: "LLMMC + Public Service Literature"
      unique_factor: "PostFinance serves all, including underbanked"

  employee_parameters:
    identity_alignment_post:
      symbol: "iota_POST"
      value: 0.70
      range: [0.58, 0.82]
      description: "Identifikation mit Post-Werten"
      source: "LLMMC + Organizational Identity Literature"
      context_modifier: "Currently challenged by restructuring"

    innovation_pride:
      symbol: "pi_INN"
      value: 0.72
      range: [0.60, 0.84]
      description: "Stolz auf Digital-Pioneer Status"
      source: "LLMMC + Org Behavior Literature"

    customer_orientation:
      symbol: "omega_KUND"
      value: 0.70
      range: [0.60, 0.80]
      description: "Intrinsische Kundenorientierung"
      source: "LLMMC + Service Literature"

    restructuring_anxiety:
      symbol: "xi_RESTR"
      value: 0.55
      range: [0.40, 0.70]
      description: "Anxiety level due to announced workforce reduction"
      source: "LLMMC + Change Management Literature"
      note: "Elevated due to 2024 announcements"

# =============================================================================
# KONTEXT-RELEVANZ-MAPPING (aus MAKRO Schweiz)
# =============================================================================
context_relevance:
  description: |
    Mapping der relevantesten Kontextfaktoren aus MAKRO (Schweiz)
    für PostFinance-spezifische Interventionen.

  high_relevance_makro:
    - factor_id: "CH-SOC-01"
      name: "Institutionenvertrauen"
      value: 0.72
      postfinance_relevance: |
        Hohes Vertrauen in etablierte Institutionen = Asset.
        Post als "Schweizer Institution" profitiert massiv.

    - factor_id: "CH-ECO-05"
      name: "Digitalisierungsbereitschaft Banking"
      value: 0.62
      postfinance_relevance: |
        "Digital-Pionier" Positionierung = zeitgemäss.
        E-Finance und TWINT sind etabliert.

    - factor_id: "CH-SOC-08"
      name: "Preis-Leistungs-Sensitivität"
      value: 0.68
      postfinance_relevance: |
        Schweizer sind preisbewusst.
        "Zugänglich und fair" Narrativ = Resonanz.

    - factor_id: "CH-REG-08"
      name: "Default-Konformität"
      value: 0.73
      postfinance_relevance: |
        Schweizer folgen etablierten Strukturen.
        PostFinance als "Default für Zahlungsverkehr" = stark.

    - factor_id: "CH-TEC-03"
      name: "Mobile Payment Adoption"
      value: 0.58
      postfinance_relevance: |
        TWINT-Dominanz ist PostFinance Asset.
        Über 1.1 Mio PostFinance TWINT Nutzer.

    - factor_id: "CH-REG-01"
      name: "Staatserwartung"
      value: 0.70
      postfinance_relevance: |
        Bund → Post → PostFinance Kette = implizite Sicherheit.
        "Too big to fail" Wahrnehmung (auch ohne formelle Garantie).

# =============================================================================
# INTERVENTION DOMAINS
# =============================================================================
intervention_domains:
  description: |
    Hauptinterventionsfelder für PostFinance,
    gemappt auf EBF-Dimensionen.

  domains:
    - id: "INT-DIGITAL-ADOPTION"
      name: "Digital Banking Adoption"
      description: "Kunden zur Nutzung digitaler Kanäle bewegen"

      target_10c: "AWARE + HOW"
      delta_target: "E-Finance/App active usage rate steigern"

      key_message: |
        "Banking so einfach wie eine Postsendung verfolgen – digital, sicher, schnell."

      intervention_types:
        - type: "T1_Information"
          examples:
            - "E-Finance tutorials"
            - "Digital onboarding assistance"
            - "Branch staff as digital coaches"

        - type: "T3_ChoiceArchitecture"
          examples:
            - "Digital-first defaults"
            - "App push notifications"
            - "Simplified digital processes"

        - type: "T6_Social"
          examples:
            - "Family onboarding (young help old)"
            - "Peer recommendations"

    - id: "INT-TWINT-ECOSYSTEM"
      name: "TWINT Ecosystem Expansion"
      description: "TWINT-Nutzung ausbauen, mehr Use Cases aktivieren"

      target_10c: "HOW + WHAT"
      delta_target: "TWINT transactions and use cases increase"

      key_message: |
        "TWINT – mehr als nur bezahlen. Parken, Tickets, Teilen."

      intervention_types:
        - type: "T1_Information"
          examples:
            - "Feature awareness campaigns"
            - "In-app feature discovery"

        - type: "T3_ChoiceArchitecture"
          examples:
            - "TWINT as default payment option"
            - "Simplified TWINT linking"

        - type: "T2_Incentive"
          examples:
            - "TWINT cashback campaigns"
            - "First-use bonuses"

    - id: "INT-NONINTEREST-REVENUE"
      name: "Non-Interest Product Adoption"
      description: "Investment, insurance, partnership products fördern"

      target_10c: "AWARE + WHAT"
      delta_target: "Non-interest revenue per customer increase"

      key_message: |
        "Mehr aus Ihrem Geld machen – mit PostFinance Anlageberatung."

      intervention_types:
        - type: "T1_Information"
          examples:
            - "Investment education content"
            - "Personalized recommendations"

        - type: "T3_ChoiceArchitecture"
          examples:
            - "Savings to investment nudges"
            - "Round-up investing"

        - type: "T5_Identity"
          examples:
            - "Future self" framing
            - "Swiss security" positioning

    - id: "INT-LENDING-PARTNERS"
      name: "Partner Lending Products"
      description: "Kreditprodukte über Partner (Bob Finance, CredEx, Valiant) vermitteln"

      target_10c: "WHAT + HOW"
      delta_target: "Partner lending conversion rate"

      key_message: |
        "Finanzierung leicht gemacht – PostFinance verbindet Sie mit den besten Partnern."

      intervention_types:
        - type: "T1_Information"
          examples:
            - "Partner product education"
            - "Comparison tools"

        - type: "T3_ChoiceArchitecture"
          examples:
            - "Integrated application process"
            - "Pre-qualified offers"

    - id: "INT-EMPLOYEE-ENGAGEMENT"
      name: "Mitarbeitenden-Engagement"
      description: "Mitarbeitende trotz Restructuring engagiert halten"

      target_10c: "WHO + WHAT"
      delta_target: "Employee engagement and retention"

      key_message: |
        "Gemeinsam gestalten wir die Zukunft der Post-Finanzdienstleistungen."

      intervention_types:
        - type: "T5_Identity"
          examples:
            - "Post heritage pride"
            - "Digital pioneer narrative"

        - type: "T6_Social"
          examples:
            - "Team recognition"
            - "Change ambassador programs"

        - type: "T1_Information"
          examples:
            - "Transparent restructuring communication"
            - "Career development paths"

# =============================================================================
# STRATEGISCHE IMPLIKATIONEN
# =============================================================================
strategic_implications:
  intervention_principles:
    - principle: "Post-Vertrauen nutzen"
      description: |
        Jede Massnahme über "Post-Sicherheit" framen.
        Gelbe Marke = Vertrauensvorsprung nicht verspielen.
      relevant_factors: ["tau_POST", "CH-SOC-01"]

    - principle: "Digital-First, niemanden zurücklassen"
      description: |
        Digitalführerschaft ja, aber Senioren und Traditionelle mitnehmen.
        Post-Netzwerk (800 Standorte) als Brücke nutzen.
      relevant_factors: ["alpha_DIG", "alpha_ACC"]

    - principle: "TWINT-Ökosystem zentral"
      description: |
        TWINT ist unique asset – weiter ausbauen.
        Jeder TWINT-Use-Case stärkt PostFinance.
      relevant_factors: ["eta_TWINT"]

    - principle: "Lending-Lücke kreativ schliessen"
      description: |
        POA-Einschränkung akzeptieren, Partnership-Modell optimieren.
        Nahtlose Integration von Partner-Produkten.
      relevant_factors: ["delta_DEFAULT"]

    - principle: "Zinsabhängigkeit kommunizieren"
      description: |
        Transparenz über Geschäftsmodell-Herausforderung.
        Non-interest revenue als gemeinsames Ziel.
      relevant_factors: ["lambda_BANK"]

  unique_competitive_advantages:
    - advantage: "Payment Traffic Leadership"
      description: "Grösster Zahlungsverkehrsanbieter der Schweiz"
      behavioral_implication: "Status Quo Bias arbeitet für PostFinance"

    - advantage: "TWINT Dominance"
      description: "Co-Founder und grösster TWINT-Partner"
      behavioral_implication: "Network effects, habit formation"

    - advantage: "Post Network"
      description: "800 Poststellen + 16 Filialen"
      behavioral_implication: "Physical touchpoints für Trust Building"

    - advantage: "Universal Access"
      description: "Jeder Schweizer kann Konto haben"
      behavioral_implication: "Inclusion narrative, Brand Trust"

    - advantage: "Digital Pioneer"
      description: "E-Finance Leader seit 20+ Jahren"
      behavioral_implication: "First-mover advantage, established habits"

