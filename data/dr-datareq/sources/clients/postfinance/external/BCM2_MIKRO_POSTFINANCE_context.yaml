      benefit: "2.5 million private customers already"

# =============================================================================
# ZIELGRUPPEN FÜR INTERVENTIONEN (WHO - Welfare Hierarchy)
# =============================================================================
target_groups:
  description: |
    Zielgruppen für verhaltensökonomische Interventionen,
    priorisiert nach Hebel und Erreichbarkeit.

  primary_targets:
    - id: "TG-RETAIL"
      name: "Privatkunden"
      size: "2.5 Million"
      relevance: "Kerngeschäft, Einlagenvolumen, Payment Traffic"
      decision_autonomy: "hoch (freie Bankwahl)"

      segmentation:
        by_lifecycle:
          - segment: "Young Digital (18-30)"
            size_estimate: 0.20
            strategic_alignment: "S2-DIGITAL"
            key_need: "Mobile-first, simple, TWINT"

          - segment: "Young Families (30-45)"
            size_estimate: 0.30
            strategic_alignment: "S3-NONINTEREST"
            key_need: "Mortgages (via partners), savings, convenience"

          - segment: "Established (45-60)"
            size_estimate: 0.25
            strategic_alignment: "S3-NONINTEREST"
            key_need: "Investment, retirement planning, security"

          - segment: "Seniors (60+)"
            size_estimate: 0.25
            strategic_alignment: "S1-PAYMENT"
            key_need: "Accessibility, personal service, trust"

        by_digital_affinity:
          - segment: "E-Finance Power Users"
            share: 0.40
            description: "Heavy users of online/mobile banking"
            approach: "Feature-rich, self-service"

          - segment: "Occasional Digital"
            share: 0.35
            description: "Use digital for basics, branch for complex"
            approach: "Omnichannel, guided digital"

          - segment: "Traditional"
            share: 0.25
            description: "Prefer branch/Post office"
            approach: "Personal service, gentle digital introduction"

      key_barriers:
        - barrier: "Switching Costs"
          description: "Bank change = effort (standing orders, etc.)"
          severity: 0.75

        - barrier: "Lending Gap"
          description: "Cannot offer mortgages directly"
          severity: 0.70

        - barrier: "Interest Rate Expectations"
          description: "Low rates on savings = unhappy customers"
          severity: 0.55

      key_enablers:
        - enabler: "Post Trust"
          description: "Transfer from Post brand"
          strength: 0.80

        - enabler: "TWINT Leadership"
          description: "1.1M users, market leader"
          strength: 0.85

        - enabler: "E-Finance Excellence"
          description: "Established digital banking leader"
          strength: 0.78

        - enabler: "Accessibility"
          description: "Everyone can have a PostFinance account"
          strength: 0.75

    - id: "TG-BUSINESS"
      name: "Geschäftskunden"
      size: "300'000"
      relevance: "Payment traffic volume, cross-selling"
      decision_autonomy: "mittel (company decisions)"

      segmentation:
        by_size:
          - segment: "Micro (1-9 employees)"
            size_estimate: 0.70
            key_need: "Simple payment processing"

          - segment: "Small (10-49 employees)"
            size_estimate: 0.20
            key_need: "Cash management, financing (via partners)"

          - segment: "Medium (50-249 employees)"
            size_estimate: 0.08
            key_need: "Treasury services, payment automation"

          - segment: "Large (250+)"
            size_estimate: 0.02
            key_need: "Complex payment solutions"

    - id: "TG-MITARBEITENDE"
      name: "Mitarbeitende"
      size: 3013
      relevance: "Service quality, brand ambassadors"
      decision_autonomy: "mittel (in Rollenverantwortung)"

      segmentation:
        by_function:
          - segment: "Kundenberatung Retail"
            size_estimate: 800
            strategic_alignment: "S1-PAYMENT + S2-DIGITAL"

          - segment: "Business Banking"
            size_estimate: 400
            strategic_alignment: "S3-NONINTEREST"

          - segment: "IT & Digital"
            size_estimate: 600
            strategic_alignment: "S2-DIGITAL"

          - segment: "Operations"
            size_estimate: 700
            strategic_alignment: "S4-EFFICIENCY"

          - segment: "Staff Functions"
            size_estimate: 513
            strategic_alignment: "S4-EFFICIENCY"

      key_barriers:
