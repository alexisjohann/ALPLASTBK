    - factor_id: "CH-DEM-05"
      name: "Altersstruktur Gebäudebesitzer"
      energy_relevance: "Investitionshorizont für Sanierung"
    - factor_id: "CH-DEM-12"
      name: "Stadt-Land-Verteilung"
      energy_relevance: "Heizungstypen, Mobilitätsmuster"

  from_economic:
    - factor_id: "CH-ECO-03"
      name: "Zinsniveau"
      energy_relevance: "Finanzierungskosten für Investitionen"
    - factor_id: "CH-ECO-07"
      name: "Inflation"
      energy_relevance: "Reale Energiekosten-Entwicklung"
    - factor_id: "CH-ECO-15"
      name: "Vermögensverteilung"
      energy_relevance: "Investitionsfähigkeit Haushalte"

  from_institutional:
    - factor_id: "CH-POL-04"
      name: "Föderalismus"
      energy_relevance: "26 unterschiedliche Förderregimes"
    - factor_id: "CH-POL-08"
      name: "Direkte Demokratie"
      energy_relevance: "Volksabstimmungen zu Energiegesetzen"

  from_socio_cultural:
    - factor_id: "CH-SOC-12"
      name: "Umweltbewusstsein"
      energy_relevance: "Basisniveau für Klimamotivation"
    - factor_id: "CH-SOC-18"
      name: "Technologieaffinität"
      energy_relevance: "Adoption neuer Energietechnologien"

# =============================================================================
# BCM-MODUL-KOPPLUNG
# =============================================================================
bcm_module_coupling:
  BCM2_01_INU:
    sector_relevance: "Individuelle Kosten-Nutzen-Abwägung bei Energieentscheidungen"
    key_factors: ["ENE-ECO-01", "ENE-ECO-03", "ENE-PSY-04"]

  BCM2_02_KNU:
    sector_relevance: "Klimaschutz als kollektiver Nutzen vs. individuelle Kosten"
    key_factors: ["ENE-PSY-09", "ENE-SOC-05", "ENE-ECO-07"]

  BCM2_03_IDN:
    sector_relevance: "Energie als Teil der Identität (Swissness, Nachhaltigkeit)"
    key_factors: ["ENE-PSY-02", "ENE-SOC-08"]

  BCM2_04_KON:
    sector_relevance: "Regulatorische und Choice Architecture Kontextfaktoren"
    key_factors: ["ENE-REG-*", "ENE-PSY-01"]

