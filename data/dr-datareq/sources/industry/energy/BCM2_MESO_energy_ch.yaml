# =============================================================================
# LEARNING LOG
# =============================================================================
learning_log:
  description: |
    Dieser Abschnitt wird durch Projekt-Learnings angereichert.
    Jeder Eintrag referenziert das Quell-Projekt.
  entries: []
  # Beispiel-Eintrag:
  # - date: "2026-06-15"
  #   project: "BFE-2026-001"
  #   type: "new_factor"
  #   content:
  #     id: "ENE-PSY-11"
  #     name: "Discovered Factor"
  #     ...
