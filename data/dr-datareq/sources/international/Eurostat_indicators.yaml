# Eurostat - EU Statistical Office Indicators
# Version: 1.0
# Quelle: Eurostat Database
# Letzte Aktualisierung: 2026-01-23
# EBF-Relevanz: κ_INST (EU-Kontext), alle κ-Dimensionen

metadata:
  name: "Eurostat - EU Statistiken"
  code: "EUROSTAT"
  version: "1.0"
  last_updated: "2026-01-23"
  source: "European Commission - Eurostat"
  source_type: "Official Statistics"
  url: "https://ec.europa.eu/eurostat"
  database: "https://ec.europa.eu/eurostat/databrowser"
  description: "Offizielle EU-Statistiken mit Schweiz-Daten (EFTA-Abkommen)"

  # API-Zugang
  api:
    type: "JSON-stat / SDMX"
    base_url: "https://ec.europa.eu/eurostat/api/dissemination"
    documentation: "https://wikis.ec.europa.eu/display/EUROSTATHELP/API"
    format: "JSON-stat, SDMX, TSV"
    example: "https://ec.europa.eu/eurostat/api/dissemination/sdmx/2.1/data/nama_10_gdp/A.CLV10_MEUR.B1GQ.CH"
    auth: "None required"

  # Relevanz für Schweiz
  swiss_relevance:
    - "Schweiz in vielen Eurostat-Datensätzen enthalten (EFTA)"
    - "EU-Vergleichsdaten für Policy-Benchmarking"
    - "Harmonisierte Definitionen (NACE, NUTS, etc.)"
    - "Bilaterale Abkommen → Datenharmonisierung"

  # BCM-Kopplung
  bcm_coupling:
    primary: "BCM2_04_KON"      # Kontextvektor
    secondary: "BCM2_02_KNU"    # Kollektiver Nutzen

# =============================================================================
# VERFÜGBARE INDIKATOREN (SCHWEIZ ENTHALTEN)
# =============================================================================
indicators:

  # ---------------------------------------------------------------------------
  # WIRTSCHAFT
  # ---------------------------------------------------------------------------
  economy:
    - id: ESTAT-GDP
      name: "GDP and Main Components"
      dataset: "nama_10_gdp"
      unit: "EUR million / % change"
      frequency: "annual, quarterly"
      swiss_data: true
      kon_mapping: "economic"
      api_url: "https://ec.europa.eu/eurostat/api/dissemination/sdmx/2.1/data/nama_10_gdp"

    - id: ESTAT-HICP
      name: "HICP - Harmonised Consumer Price Index"
      dataset: "prc_hicp_manr"
      unit: "% annual change"
      frequency: "monthly"
      swiss_data: true
      kon_mapping: "economic"

    - id: ESTAT-UNEMP
      name: "Unemployment Rate"
      dataset: "une_rt_m"
      unit: "% of labor force"
      frequency: "monthly"
      swiss_data: true
      kon_mapping: "economic"

    - id: ESTAT-GOV-DEBT
      name: "Government Debt"
      dataset: "gov_10dd_edpt1"
      unit: "% of GDP"
      frequency: "annual"
      swiss_data: true
      kon_mapping: "economic"

  # ---------------------------------------------------------------------------
  # ARBEITSMARKT
  # ---------------------------------------------------------------------------
  labor:
    - id: ESTAT-EMPLOY
      name: "Employment Rate (20-64)"
      dataset: "lfsi_emp_a"
      unit: "% of population"
      frequency: "annual"
      swiss_data: true
      kon_mapping: "economic"

    - id: ESTAT-HOURS
      name: "Average Working Hours"
      dataset: "lfsa_ewhun2"
      unit: "hours/week"
      frequency: "annual"
      swiss_data: true
      kon_mapping: "economic"

    - id: ESTAT-WAGE
      name: "Labour Cost Index"
      dataset: "lc_lci_r2_a"
      unit: "Index (2016=100)"
      frequency: "annual"
      swiss_data: true
      kon_mapping: "economic"

  # ---------------------------------------------------------------------------
  # DEMOGRAFIE
  # ---------------------------------------------------------------------------
  demographics:
    - id: ESTAT-POP
      name: "Population"
      dataset: "demo_pjan"
      unit: "persons"
      frequency: "annual"
      swiss_data: true
      kon_mapping: "demographic"

    - id: ESTAT-LIFEEXP
      name: "Life Expectancy at Birth"
      dataset: "demo_mlexpec"
      unit: "years"
      frequency: "annual"
      swiss_data: true
      kon_mapping: "demographic"

    - id: ESTAT-FERTILITY
      name: "Total Fertility Rate"
      dataset: "demo_frate"
      unit: "births per woman"
      frequency: "annual"
      swiss_data: true
      kon_mapping: "demographic"

    - id: ESTAT-MIGRATION
      name: "Immigration by Citizenship"
      dataset: "migr_imm1ctz"
      unit: "persons"
      frequency: "annual"
      swiss_data: true
      kon_mapping: "demographic"

  # ---------------------------------------------------------------------------
  # ENERGIE & UMWELT
  # ---------------------------------------------------------------------------
  environment:
    - id: ESTAT-ENERGY
      name: "Energy Consumption"
      dataset: "nrg_bal_c"
      unit: "TJ"
      frequency: "annual"
      swiss_data: true
      kon_mapping: "tech_ecological"

    - id: ESTAT-RENEW
      name: "Renewable Energy Share"
      dataset: "nrg_ind_ren"
      unit: "% of gross final"
      frequency: "annual"
      swiss_data: true
      kon_mapping: "tech_ecological"

    - id: ESTAT-GHG
      name: "Greenhouse Gas Emissions"
      dataset: "env_air_gge"
      unit: "tonnes CO2 equivalent"
      frequency: "annual"
      swiss_data: true
      kon_mapping: "tech_ecological"

  # ---------------------------------------------------------------------------
  # BILDUNG
  # ---------------------------------------------------------------------------
  education:
    - id: ESTAT-EDU-TERTIARY
      name: "Tertiary Education Attainment"
      dataset: "edat_lfse_03"
      unit: "% of 25-34"
      frequency: "annual"
      swiss_data: true
      kon_mapping: "socio_cultural"

    - id: ESTAT-EDU-SPENDING
      name: "Education Expenditure"
      dataset: "educ_uoe_fine06"
      unit: "% of GDP"
      frequency: "annual"
      swiss_data: true
      kon_mapping: "socio_cultural"

  # ---------------------------------------------------------------------------
  # DIGITALISIERUNG
  # ---------------------------------------------------------------------------
  digital:
    - id: ESTAT-DESI
      name: "Digital Economy and Society Index"
      dataset: "isoc_sk_dskl_i"
      unit: "Index / %"
      frequency: "annual"
      swiss_data: false
      note: "CH nicht in DESI, aber Einzelindikatoren verfügbar"
      kon_mapping: "tech_ecological"

    - id: ESTAT-INTERNET
      name: "Internet Use by Individuals"
      dataset: "isoc_ci_ifp_iu"
      unit: "% of individuals"
      frequency: "annual"
      swiss_data: true
      kon_mapping: "tech_ecological"

    - id: ESTAT-ECOMMERCE
      name: "E-commerce by Individuals"
      dataset: "isoc_ec_ibuy"
      unit: "% of individuals"
      frequency: "annual"
      swiss_data: true
      kon_mapping: "tech_ecological"

  # ---------------------------------------------------------------------------
  # INNOVATION
  # ---------------------------------------------------------------------------
  innovation:
    - id: ESTAT-RD
      name: "R&D Expenditure"
      dataset: "rd_e_gerdtot"
      unit: "% of GDP"
      frequency: "annual"
      swiss_data: true
      kon_mapping: "tech_ecological"

    - id: ESTAT-PATENTS
      name: "Patent Applications to EPO"
      dataset: "pat_ep_ntot"
      unit: "per million inhabitants"
      frequency: "annual"
      swiss_data: true
      kon_mapping: "tech_ecological"

# =============================================================================
# PYTHON FETCH EXAMPLE
# =============================================================================
fetch_example: |
  import requests
  import pandas as pd

  # Eurostat API - GDP for Switzerland
  url = "https://ec.europa.eu/eurostat/api/dissemination/sdmx/2.1/data/nama_10_gdp/A.CLV10_MEUR.B1GQ.CH"
  params = {"format": "JSON"}

  response = requests.get(url, params=params)
  if response.status_code == 200:
      data = response.json()
      print(data)

  # Using eurostat Python package
  # pip install eurostat
  import eurostat
  df = eurostat.get_data_df('nama_10_gdp', filter_pars={'geo': 'CH'})
  print(df.head())

# =============================================================================
# STATISTIKEN
# =============================================================================
statistics:
  total_indicators: 22
  by_category:
    economy: 4
    labor: 3
    demographics: 4
    environment: 3
    education: 2
    digital: 3
    innovation: 2
  swiss_data_available: 20
  update_frequency: "monthly to annual"
