# OECD - Swiss Indicators
# Version: 1.0
# Quelle: OECD.Stat / OECD Data Explorer
# Letzte Aktualisierung: 2026-01-23
# EBF-Relevanz: κ_INST, κ_ARCH (Policy-Indikatoren)

metadata:
  name: "OECD Indikatoren - Schweiz"
  code: "OECD_CH"
  version: "1.0"
  last_updated: "2026-01-23"
  source: "Organisation for Economic Co-operation and Development"
  source_type: "Official Statistics"
  url: "https://data.oecd.org"
  api_portal: "https://data-explorer.oecd.org"
  country_code: "CHE"
  membership: "Gründungsmitglied (1961)"
  description: "Offizielle OECD-Statistiken für die Schweiz"

  # API-Zugang
  api:
    type: "SDMX REST API"
    base_url: "https://sdmx.oecd.org/public/rest"
    documentation: "https://data.oecd.org/api/"
    format: "JSON, XML, CSV"
    example: "https://sdmx.oecd.org/public/rest/data/OECD.SDD.NAD,DSD_NAMAIN1@DF_QNA_EXPENDITURE_CAPITA/Q.CHE...."
    rate_limit: "No strict limit, but fair use expected"

  # BCM-Kopplung
  bcm_coupling:
    primary: "BCM2_04_KON"      # Kontextvektor
    secondary: "BCM2_02_KNU"    # Kollektiver Nutzen
    tertiary: "BCM2_03_IDN"     # Identitätsnutzen

# =============================================================================
# VERFÜGBARE INDIKATOREN FÜR DIE SCHWEIZ
# =============================================================================
indicators:

  # ---------------------------------------------------------------------------
  # WIRTSCHAFT & FINANZEN
  # ---------------------------------------------------------------------------
  economy:
    - id: OECD-CH-GDP
      name: "GDP Growth Rate"
      dataset: "QNA"
      sdmx_code: "NAEXKP01"
      unit: "% annual"
      time_range: "1960-2025"
      update_frequency: "quarterly"
      kon_mapping: "economic"
      api_endpoint: "https://data.oecd.org/gdp/quarterly-gdp.htm"

    - id: OECD-CH-GDPCAP
      name: "GDP per Capita"
      dataset: "SNA_TABLE1"
      sdmx_code: "B1_GE"
      unit: "USD (PPP)"
      time_range: "1970-2024"
      update_frequency: "yearly"
      kon_mapping: "economic"

    - id: OECD-CH-INFL
      name: "Inflation (CPI)"
      dataset: "PRICES_CPI"
      sdmx_code: "CPALTT01"
      unit: "% annual"
      time_range: "1956-2025"
      update_frequency: "monthly"
      kon_mapping: "economic"

    - id: OECD-CH-UNEMP
      name: "Unemployment Rate"
      dataset: "LFS_SEXAGE_I_R"
      sdmx_code: "LR"
      unit: "% of labor force"
      time_range: "1991-2025"
      update_frequency: "monthly"
      kon_mapping: "economic"

    - id: OECD-CH-DEBT
      name: "Government Debt"
      dataset: "GOV_DEBT"
      sdmx_code: "GGDEBT"
      unit: "% of GDP"
      time_range: "1995-2024"
      update_frequency: "yearly"
      kon_mapping: "economic"

    - id: OECD-CH-TAX
      name: "Tax Revenue"
      dataset: "REV"
      sdmx_code: "TAXGDP"
      unit: "% of GDP"
      time_range: "1965-2023"
      update_frequency: "yearly"
      kon_mapping: "economic"

  # ---------------------------------------------------------------------------
  # ARBEITSMARKT
  # ---------------------------------------------------------------------------
  labor:
    - id: OECD-CH-EMPLOY
      name: "Employment Rate"
      dataset: "LFS_SEXAGE_I_R"
      sdmx_code: "ER"
      unit: "% of working age"
      time_range: "1991-2025"
      update_frequency: "quarterly"
      kon_mapping: "economic"

    - id: OECD-CH-HOURS
      name: "Average Hours Worked"
      dataset: "ANHRS"
      sdmx_code: "HRWKD"
      unit: "hours/year"
      time_range: "1970-2023"
      update_frequency: "yearly"
      kon_mapping: "economic"

    - id: OECD-CH-WAGE
      name: "Average Wages"
      dataset: "AV_AN_WAGE"
      sdmx_code: "USDPPP"
      unit: "USD (PPP)"
      time_range: "1990-2023"
      update_frequency: "yearly"
      kon_mapping: "economic"

    - id: OECD-CH-PROD
      name: "Labour Productivity"
      dataset: "PDB_LV"
      sdmx_code: "T_GDPHRS"
      unit: "USD per hour"
      time_range: "1970-2023"
      update_frequency: "yearly"
      kon_mapping: "economic"

  # ---------------------------------------------------------------------------
  # BILDUNG
  # ---------------------------------------------------------------------------
  education:
    - id: OECD-CH-EDUEXP
      name: "Education Expenditure"
      dataset: "EAG_FIN_RATIO"
      sdmx_code: "EXP_GDP"
      unit: "% of GDP"
      time_range: "1995-2022"
      update_frequency: "yearly"
      kon_mapping: "socio_cultural"

    - id: OECD-CH-PISA
      name: "PISA Scores"
      dataset: "PISA"
      sdmx_code: "MEAN"
      unit: "Score (0-600)"
      time_range: "2000-2022"
      update_frequency: "3-yearly"
      kon_mapping: "socio_cultural"

    - id: OECD-CH-TERTIARY
      name: "Tertiary Education Rate"
      dataset: "EAG_NEAC"
      sdmx_code: "ISCED5T8"
      unit: "% of 25-64"
      time_range: "2000-2023"
      update_frequency: "yearly"
      kon_mapping: "socio_cultural"

  # ---------------------------------------------------------------------------
  # GESUNDHEIT
  # ---------------------------------------------------------------------------
  health:
    - id: OECD-CH-HEALTHEXP
      name: "Health Expenditure"
      dataset: "SHA"
      sdmx_code: "HFGDP"
      unit: "% of GDP"
      time_range: "1970-2023"
      update_frequency: "yearly"
      kon_mapping: "economic"

    - id: OECD-CH-LIFEEXP
      name: "Life Expectancy at Birth"
      dataset: "HEALTH_STAT"
      sdmx_code: "LIFEEXP"
      unit: "Jahre"
      time_range: "1960-2023"
      update_frequency: "yearly"
      kon_mapping: "demographic"

    - id: OECD-CH-DOCTORS
      name: "Doctors per 1000"
      dataset: "HEALTH_REAC"
      sdmx_code: "PHYS1000"
      unit: "per 1000 population"
      time_range: "1990-2022"
      update_frequency: "yearly"
      kon_mapping: "socio_cultural"

  # ---------------------------------------------------------------------------
  # UMWELT
  # ---------------------------------------------------------------------------
  environment:
    - id: OECD-CH-CO2
      name: "CO2 Emissions"
      dataset: "AIR_GHG"
      sdmx_code: "GHG"
      unit: "kg per capita"
      time_range: "1990-2022"
      update_frequency: "yearly"
      kon_mapping: "tech_ecological"

    - id: OECD-CH-RENEWABLE
      name: "Renewable Energy"
      dataset: "GREEN_GROWTH"
      sdmx_code: "RENEW_TPES"
      unit: "% of TPES"
      time_range: "1990-2022"
      update_frequency: "yearly"
      kon_mapping: "tech_ecological"

    - id: OECD-CH-WASTE
      name: "Municipal Waste"
      dataset: "MUNW"
      sdmx_code: "WASTE_CAP"
      unit: "kg per capita"
      time_range: "1995-2022"
      update_frequency: "yearly"
      kon_mapping: "tech_ecological"

  # ---------------------------------------------------------------------------
  # LEBENSQUALITÄT (Better Life Index)
  # ---------------------------------------------------------------------------
  wellbeing:
    - id: OECD-CH-BLI
      name: "Better Life Index"
      dataset: "BLI"
      sdmx_code: "COMPOSITE"
      unit: "Index (0-10)"
      time_range: "2011-2023"
      update_frequency: "yearly"
      kon_mapping: "socio_cultural"
      note: "CH consistently ranks top 5"

    - id: OECD-CH-LIFESATIS
      name: "Life Satisfaction"
      dataset: "BLI"
      sdmx_code: "SW_LIFS"
      unit: "Score (0-10)"
      time_range: "2011-2023"
      update_frequency: "yearly"
      kon_mapping: "socio_cultural"

    - id: OECD-CH-TRUST
      name: "Trust in Government"
      dataset: "GOV"
      sdmx_code: "TRUSTGOV"
      unit: "% of population"
      time_range: "2006-2023"
      update_frequency: "yearly"
      kon_mapping: "institutional_political"

  # ---------------------------------------------------------------------------
  # INNOVATION & TECHNOLOGIE
  # ---------------------------------------------------------------------------
  innovation:
    - id: OECD-CH-RD
      name: "R&D Expenditure"
      dataset: "MSTI_PUB"
      sdmx_code: "GERD_GDP"
      unit: "% of GDP"
      time_range: "1981-2022"
      update_frequency: "yearly"
      kon_mapping: "tech_ecological"

    - id: OECD-CH-PATENTS
      name: "Patent Applications"
      dataset: "PATS_IPC"
      sdmx_code: "TOTAL"
      unit: "per million inhabitants"
      time_range: "1978-2022"
      update_frequency: "yearly"
      kon_mapping: "tech_ecological"

    - id: OECD-CH-BROADBAND
      name: "Broadband Penetration"
      dataset: "BROADBAND"
      sdmx_code: "WBBPEN"
      unit: "subscriptions per 100"
      time_range: "2002-2023"
      update_frequency: "biannual"
      kon_mapping: "tech_ecological"

# =============================================================================
# PYTHON FETCH EXAMPLE
# =============================================================================
fetch_example: |
  import requests
  import pandas as pd

  # OECD SDMX API - GDP Growth for Switzerland
  url = "https://sdmx.oecd.org/public/rest/data/OECD.SDD.NAD,DSD_NAMAIN1@DF_QNA_EXPENDITURE_CAPITA/Q.CHE.S1.S1.B1GQ.G1._T.XDC.V.GY"

  headers = {"Accept": "application/vnd.sdmx.data+json"}
  response = requests.get(url, headers=headers)

  if response.status_code == 200:
      data = response.json()
      # Parse SDMX JSON response
      print(data)

# =============================================================================
# STATISTIKEN
# =============================================================================
statistics:
  total_indicators: 25
  by_category:
    economy: 6
    labor: 4
    education: 3
    health: 3
    environment: 3
    wellbeing: 3
    innovation: 3
  time_coverage: "1956-2025"
  update_frequency: "monthly to yearly"
  swiss_rankings:
    better_life_index: "Top 5"
    innovation: "Top 3"
    competitiveness: "Top 5"
