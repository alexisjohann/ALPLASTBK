# Our World in Data (OWID) - Swiss Indicators
# Version: 1.0
# Quelle: Our World in Data (GitHub / ourworldindata.org)
# Letzte Aktualisierung: 2026-01-23
# EBF-Relevanz: Alle κ-Dimensionen (breite Abdeckung)

metadata:
  name: "Our World in Data - Schweiz Indikatoren"
  code: "OWID_CH"
  version: "1.0"
  last_updated: "2026-01-23"
  source: "Our World in Data"
  source_type: "Open Data"
  url: "https://ourworldindata.org"
  github: "https://github.com/owid/owid-datasets"
  api_base: "https://github.com/owid/owid-datasets/tree/master/datasets"
  country_code: "CHE"
  license: "CC BY 4.0"
  description: "Kuratierte globale Datensätze mit Schweiz-spezifischen Zeitreihen"

  # API-Zugang
  api:
    type: "GitHub Raw / REST"
    base_url: "https://raw.githubusercontent.com/owid/owid-datasets/master/datasets"
    format: "CSV"
    example: "https://raw.githubusercontent.com/owid/owid-datasets/master/datasets/CO2%20emissions/CO2%20emissions.csv"

  # BCM-Kopplung
  bcm_coupling:
    primary: "BCM2_04_KON"      # Kontextvektor
    secondary: "BCM2_02_KNU"    # Kollektiver Nutzen

# =============================================================================
# VERFÜGBARE INDIKATOREN FÜR DIE SCHWEIZ
# =============================================================================
indicators:

  # ---------------------------------------------------------------------------
  # DEMOGRAFIE & GESUNDHEIT
  # ---------------------------------------------------------------------------
  demographics:
    - id: OWID-CH-POP
      name: "Population"
      dataset: "Population"
      unit: "Personen"
      time_range: "1800-2023"
      update_frequency: "yearly"
      kon_mapping: "demographic"

    - id: OWID-CH-LE
      name: "Life Expectancy"
      dataset: "Life expectancy"
      unit: "Jahre"
      time_range: "1950-2023"
      update_frequency: "yearly"
      kon_mapping: "demographic"

    - id: OWID-CH-FERT
      name: "Fertility Rate"
      dataset: "Fertility rate"
      unit: "Geburten pro Frau"
      time_range: "1950-2023"
      update_frequency: "yearly"
      kon_mapping: "demographic"

  # ---------------------------------------------------------------------------
  # WIRTSCHAFT
  # ---------------------------------------------------------------------------
  economy:
    - id: OWID-CH-GDP
      name: "GDP per Capita"
      dataset: "GDP per capita"
      unit: "USD (PPP, 2017)"
      time_range: "1990-2023"
      update_frequency: "yearly"
      kon_mapping: "economic"

    - id: OWID-CH-GINI
      name: "Gini Coefficient"
      dataset: "Economic inequality"
      unit: "Index (0-1)"
      time_range: "1990-2023"
      update_frequency: "yearly"
      kon_mapping: "economic"

    - id: OWID-CH-TRADE
      name: "Trade Openness"
      dataset: "Trade"
      unit: "% of GDP"
      time_range: "1970-2023"
      update_frequency: "yearly"
      kon_mapping: "economic"

  # ---------------------------------------------------------------------------
  # ENERGIE & UMWELT
  # ---------------------------------------------------------------------------
  environment:
    - id: OWID-CH-CO2
      name: "CO2 Emissions"
      dataset: "CO2 emissions"
      unit: "Tonnen pro Kopf"
      time_range: "1900-2023"
      update_frequency: "yearly"
      kon_mapping: "tech_ecological"

    - id: OWID-CH-RENEW
      name: "Renewable Energy Share"
      dataset: "Renewable energy"
      unit: "% of total"
      time_range: "1965-2023"
      update_frequency: "yearly"
      kon_mapping: "tech_ecological"

    - id: OWID-CH-ENERGY
      name: "Energy Consumption per Capita"
      dataset: "Energy"
      unit: "kWh pro Kopf"
      time_range: "1965-2023"
      update_frequency: "yearly"
      kon_mapping: "tech_ecological"

    - id: OWID-CH-FOREST
      name: "Forest Coverage"
      dataset: "Forest area"
      unit: "% of land"
      time_range: "1990-2023"
      update_frequency: "yearly"
      kon_mapping: "tech_ecological"

  # ---------------------------------------------------------------------------
  # TECHNOLOGIE & BILDUNG
  # ---------------------------------------------------------------------------
  technology:
    - id: OWID-CH-INTERNET
      name: "Internet Users"
      dataset: "Internet"
      unit: "% of population"
      time_range: "1990-2023"
      update_frequency: "yearly"
      kon_mapping: "tech_ecological"

    - id: OWID-CH-MOBILE
      name: "Mobile Subscriptions"
      dataset: "Mobile phone subscriptions"
      unit: "per 100 people"
      time_range: "1990-2023"
      update_frequency: "yearly"
      kon_mapping: "tech_ecological"

  education:
    - id: OWID-CH-EDU
      name: "Years of Schooling"
      dataset: "Global Education"
      unit: "Jahre"
      time_range: "1970-2023"
      update_frequency: "yearly"
      kon_mapping: "socio_cultural"

    - id: OWID-CH-LITERACY
      name: "Literacy Rate"
      dataset: "Literacy"
      unit: "% of population"
      time_range: "1970-2023"
      update_frequency: "yearly"
      kon_mapping: "socio_cultural"

  # ---------------------------------------------------------------------------
  # GESUNDHEIT
  # ---------------------------------------------------------------------------
  health:
    - id: OWID-CH-HEALTH
      name: "Healthcare Expenditure"
      dataset: "Healthcare Spending"
      unit: "% of GDP"
      time_range: "1995-2023"
      update_frequency: "yearly"
      kon_mapping: "economic"

    - id: OWID-CH-VACCINE
      name: "Vaccination Rates"
      dataset: "Vaccinations"
      unit: "% of population"
      time_range: "1980-2023"
      update_frequency: "yearly"
      kon_mapping: "socio_cultural"

  # ---------------------------------------------------------------------------
  # GOVERNANCE & POLITIK
  # ---------------------------------------------------------------------------
  governance:
    - id: OWID-CH-DEM
      name: "Democracy Index"
      dataset: "Democracy"
      unit: "Index (0-10)"
      time_range: "1900-2023"
      update_frequency: "yearly"
      kon_mapping: "institutional_political"

    - id: OWID-CH-CORRUPT
      name: "Corruption Perception Index"
      dataset: "Corruption"
      unit: "Index (0-100)"
      time_range: "1995-2023"
      update_frequency: "yearly"
      kon_mapping: "institutional_political"

# =============================================================================
# PYTHON FETCH EXAMPLE
# =============================================================================
fetch_example: |
  import pandas as pd

  # OWID CO2 data for Switzerland
  url = "https://raw.githubusercontent.com/owid/co2-data/master/owid-co2-data.csv"
  df = pd.read_csv(url)
  ch_data = df[df['iso_code'] == 'CHE']

  # Latest value
  print(ch_data[['year', 'co2_per_capita']].tail(10))

# =============================================================================
# STATISTIKEN
# =============================================================================
statistics:
  total_indicators: 18
  by_category:
    demographics: 3
    economy: 3
    environment: 4
    technology: 2
    education: 2
    health: 2
    governance: 2
  time_coverage: "1800-2023"
  update_frequency: "yearly (GitHub updates)"
