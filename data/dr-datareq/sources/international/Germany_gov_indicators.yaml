# German Federal Ministry of Finance (BMF) & Ministry of Economics (BMWK)
# Version: 1.0
# Quelle: Bundesministerium der Finanzen, Bundesministerium für Wirtschaft und Klimaschutz
# Letzte Aktualisierung: 2026-01-23
# EBF-Relevanz: κ_INST (DACH-Kontext), κ_ARCH (Wirtschaftspolitik)

metadata:
  name: "Deutsche Bundesministerien - Wirtschaftsdaten"
  code: "DE_GOV"
  version: "1.0"
  last_updated: "2026-01-23"
  sources:
    - name: "Bundesministerium der Finanzen (BMF)"
      url: "https://www.bundesfinanzministerium.de"
    - name: "Bundesministerium für Wirtschaft und Klimaschutz (BMWK)"
      url: "https://www.bmwk.de"
    - name: "Statistisches Bundesamt (Destatis)"
      url: "https://www.destatis.de"
      api: "https://www-genesis.destatis.de/genesis/online"
  source_type: "Official Statistics"
  description: "Deutsche Wirtschafts- und Finanzdaten (DACH-Kontext für Schweiz)"

  # API-Zugang
  api:
    destatis:
      type: "GENESIS REST API"
      base_url: "https://www-genesis.destatis.de/genesisWS/rest/2020"
      documentation: "https://www-genesis.destatis.de/genesis/misc/GENESIS-Webservices_Einfuehrung.pdf"
      format: "JSON, CSV"
      auth: "Registration required (free)"
    bmwk:
      type: "Open Data Portal"
      base_url: "https://www.bmwk.de/Redaktion/DE/Dossier/konjunktur.html"
      format: "PDF, Excel"

  # Relevanz für Schweiz
  swiss_relevance:
    - "Deutschland = grösster Handelspartner der Schweiz (~20% Exporte)"
    - "DACH-Wirtschaftsraum eng verflochten"
    - "Deutsche Konjunktur → Schweizer Industrie"
    - "Grenzgänger, Finanzströme, Tourismus"
    - "Policy-Benchmarking (Energiewende, Digitalisierung)"

  # BCM-Kopplung
  bcm_coupling:
    primary: "BCM2_04_KON"      # Kontextvektor
    secondary: "BCM2_02_KNU"    # Kollektiver Nutzen

# =============================================================================
# BMF - BUNDESMINISTERIUM DER FINANZEN
# =============================================================================
bmf_indicators:

  fiscal:
    - id: DE-BMF-BUDGET
      name: "Bundeshaushalt Deutschland"
      source: "BMF Monatsbericht"
      unit: "EUR billion"
      frequency: "monthly"
      time_range: "2000-present"
      kon_mapping: "economic"

    - id: DE-BMF-DEBT
      name: "Staatsverschuldung Deutschland"
      source: "BMF / Destatis"
      unit: "% of GDP"
      frequency: "quarterly"
      time_range: "1991-present"
      kon_mapping: "economic"

    - id: DE-BMF-TAX
      name: "Steuereinnahmen Deutschland"
      source: "BMF Monatsbericht"
      unit: "EUR billion"
      frequency: "monthly"
      time_range: "1990-present"
      kon_mapping: "economic"

    - id: DE-BMF-DEFICIT
      name: "Haushaltsdefizit/-überschuss"
      source: "BMF"
      unit: "% of GDP"
      frequency: "annual"
      time_range: "1991-present"
      kon_mapping: "economic"
      note: "Schuldenbremse seit 2009"

  stability:
    - id: DE-BMF-STABRAT
      name: "Stabilitätsrat Berichte"
      source: "Stabilitätsrat"
      unit: "Qualitative Reports"
      frequency: "biannual"
      kon_mapping: "institutional_political"
      note: "Fiskalische Überwachung Bund/Länder"

# =============================================================================
# BMWK - BUNDESMINISTERIUM FÜR WIRTSCHAFT UND KLIMASCHUTZ
# =============================================================================
bmwk_indicators:

  economic:
