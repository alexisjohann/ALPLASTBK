# =============================================================================
# DACH-VERGLEICH INDIKATOREN
# =============================================================================
dach_comparison:
  - id: DACH-GDP-COMPARE
    name: "BIP-Wachstum DACH"
    countries: ["DE", "AT", "CH"]
    sources: ["Destatis", "OeNB", "SECO"]
    unit: "% annual"
    use_case: "Benchmarking, Konjunkturvergleich"

  - id: DACH-INFL-COMPARE
    name: "Inflation DACH"
    countries: ["DE", "AT", "CH"]
    sources: ["Destatis", "Statistik Austria", "BFS"]
    unit: "% annual"
    use_case: "Preisentwicklung Vergleich"

  - id: DACH-TRADE-CH
    name: "Schweizer Handel mit DACH"
    partners: ["DE", "AT"]
    source: "BFS / Destatis"
    unit: "CHF/EUR billion"
    use_case: "Handelsströme Analyse"

# =============================================================================
# PYTHON FETCH EXAMPLE
# =============================================================================
fetch_example: |
  import requests

  # Destatis GENESIS API
  # Requires registration at https://www-genesis.destatis.de
  username = "YOUR_USERNAME"
  password = "YOUR_PASSWORD"

  # Get CPI data
  url = "https://www-genesis.destatis.de/genesisWS/rest/2020/data/table/61111-0001"
  params = {
      "username": username,
      "password": password,
      "language": "de",
      "format": "json"
  }

  response = requests.get(url, params=params)
  if response.status_code == 200:
      data = response.json()
      print(data)

  # Alternative: pandas-datareader for some series
  # Or direct Excel download from BMWK/BMF websites

# =============================================================================
# STATISTIKEN
# =============================================================================
statistics:
  total_indicators: 20
  by_source:
    bmf: 5
    bmwk: 10
    destatis: 3
    dach_comparison: 3
  update_frequency: "monthly to annual"
  swiss_bilateral: 2
