    - id: DE-BMWK-ORDERS
      name: "Auftragseingang Industrie"
      source: "BMWK / Destatis"
      unit: "Index / % change"
      frequency: "monthly"
      time_range: "1991-present"
      kon_mapping: "economic"

    - id: DE-BMWK-PROD
      name: "Industrieproduktion"
      source: "BMWK / Destatis"
      unit: "Index (2015=100)"
      frequency: "monthly"
      time_range: "1991-present"
      kon_mapping: "economic"

    - id: DE-BMWK-EXPORT
      name: "Exporte Deutschland"
      source: "BMWK / Destatis"
      unit: "EUR billion"
      frequency: "monthly"
      time_range: "1991-present"
      kon_mapping: "economic"

  labor:
    - id: DE-BMWK-EMPLOY
      name: "Erwerbstätige Deutschland"
      source: "BMWK / Destatis"
      unit: "million persons"
      frequency: "monthly"
      time_range: "1991-present"
      kon_mapping: "economic"

    - id: DE-BMWK-UNEMP
      name: "Arbeitslosenquote Deutschland"
      source: "Bundesagentur für Arbeit"
      unit: "% of labor force"
      frequency: "monthly"
      time_range: "1991-present"
      kon_mapping: "economic"

  energy:
    - id: DE-BMWK-ENERGY
      name: "Energieverbrauch Deutschland"
      source: "BMWK / AGEB"
      unit: "PJ"
      frequency: "annual"
      time_range: "1990-present"
      kon_mapping: "tech_ecological"

    - id: DE-BMWK-RENEW
      name: "Erneuerbare Energien Anteil"
      source: "BMWK"
      unit: "% of gross electricity"
      frequency: "annual"
      time_range: "1990-present"
      kon_mapping: "tech_ecological"
      note: "Energiewende-Monitoring"

    - id: DE-BMWK-COAL
      name: "Kohleausstieg Fortschritt"
      source: "BMWK"
      unit: "GW capacity / timeline"
      frequency: "annual"
      time_range: "2020-2038"
      kon_mapping: "tech_ecological"

# =============================================================================
# DESTATIS - STATISTISCHES BUNDESAMT
# =============================================================================
