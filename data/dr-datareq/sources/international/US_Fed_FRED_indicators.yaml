# US Federal Reserve / FRED - Economic Data
# Version: 1.0
# Quelle: Federal Reserve Economic Data (FRED)
# Letzte Aktualisierung: 2026-01-23
# EBF-Relevanz: κ_INST (Globaler Kontext), κ_ARCH (USD-Dominanz)

metadata:
  name: "US Federal Reserve / FRED - Wirtschaftsdaten"
  code: "FRED"
  version: "1.0"
  last_updated: "2026-01-23"
  source: "Federal Reserve Bank of St. Louis"
  source_type: "Official Statistics"
  url: "https://fred.stlouisfed.org"
  description: "US-Wirtschaftsdaten und globale Indikatoren (FRED Database)"

  # API-Zugang
  api:
    type: "REST API"
    base_url: "https://api.stlouisfed.org/fred"
    documentation: "https://fred.stlouisfed.org/docs/api/fred/"
    format: "JSON, XML"
    auth: "API Key required (free registration)"
    example: "https://api.stlouisfed.org/fred/series/observations?series_id=GDP&api_key=YOUR_KEY&file_type=json"

  # Relevanz für Schweiz
  swiss_relevance:
    - "USD als globale Reservewährung (CHF-Korrelation)"
    - "Fed-Zinspolitik → globale Kapitalströme"
    - "US-Wirtschaft als Frühindikator"
    - "Schweizer Exporte in USA (~15% der Exporte)"

  # BCM-Kopplung
  bcm_coupling:
    primary: "BCM2_04_KON"      # Kontextvektor
    secondary: "BCM2_01_INU"    # Individueller Nutzen

# =============================================================================
# VERFÜGBARE INDIKATOREN
# =============================================================================
indicators:

  # ---------------------------------------------------------------------------
  # US WIRTSCHAFT
  # ---------------------------------------------------------------------------
  us_economy:
    - id: FRED-GDP
      name: "US Real GDP"
      series_id: "GDPC1"
      unit: "Billions of 2017 USD"
      frequency: "quarterly"
      time_range: "1947-present"
      kon_mapping: "economic"

    - id: FRED-GDPGROW
      name: "US GDP Growth Rate"
      series_id: "A191RL1Q225SBEA"
      unit: "% change"
      frequency: "quarterly"
      time_range: "1947-present"
      kon_mapping: "economic"

    - id: FRED-UNEMP
      name: "US Unemployment Rate"
      series_id: "UNRATE"
      unit: "% of labor force"
      frequency: "monthly"
      time_range: "1948-present"
      kon_mapping: "economic"

    - id: FRED-CPI
      name: "US Consumer Price Index"
      series_id: "CPIAUCSL"
      unit: "Index (1982-84=100)"
      frequency: "monthly"
      time_range: "1947-present"
      kon_mapping: "economic"

    - id: FRED-INFL
      name: "US Inflation Rate"
      series_id: "T10YIE"
      unit: "% annual"
      frequency: "daily"
      time_range: "2003-present"
      kon_mapping: "economic"
      note: "10-Year Breakeven Inflation"

  # ---------------------------------------------------------------------------
  # FED ZINSEN
  # ---------------------------------------------------------------------------
  fed_rates:
    - id: FRED-FEDFUNDS
      name: "Federal Funds Rate"
      series_id: "FEDFUNDS"
      unit: "% p.a."
      frequency: "monthly"
      time_range: "1954-present"
      kon_mapping: "economic"
      note: "US-Leitzins"

    - id: FRED-EFFR
      name: "Effective Federal Funds Rate"
      series_id: "DFF"
      unit: "% p.a."
      frequency: "daily"
      time_range: "1954-present"
      kon_mapping: "economic"

    - id: FRED-PRIME
      name: "Bank Prime Loan Rate"
      series_id: "DPRIME"
      unit: "% p.a."
      frequency: "daily"
      time_range: "1955-present"
      kon_mapping: "economic"

  # ---------------------------------------------------------------------------
  # TREASURY YIELDS
  # ---------------------------------------------------------------------------
  treasury:
    - id: FRED-T10Y
      name: "10-Year Treasury Yield"
      series_id: "DGS10"
      unit: "% p.a."
      frequency: "daily"
      time_range: "1962-present"
      kon_mapping: "economic"

    - id: FRED-T2Y
      name: "2-Year Treasury Yield"
      series_id: "DGS2"
      unit: "% p.a."
      frequency: "daily"
      time_range: "1976-present"
      kon_mapping: "economic"

    - id: FRED-SPREAD
      name: "10Y-2Y Treasury Spread"
      series_id: "T10Y2Y"
      unit: "% points"
      frequency: "daily"
      time_range: "1976-present"
      kon_mapping: "economic"
      note: "Rezessionsindikator (Inversion)"

  # ---------------------------------------------------------------------------
  # WECHSELKURSE
  # ---------------------------------------------------------------------------
  exchange_rates:
    - id: FRED-USDCHF
      name: "USD/CHF Exchange Rate"
      series_id: "DEXSZUS"
      unit: "CHF per USD"
      frequency: "daily"
      time_range: "1971-present"
      kon_mapping: "economic"

    - id: FRED-DXY
      name: "US Dollar Index (DXY)"
      series_id: "DTWEXBGS"
      unit: "Index"
      frequency: "daily"
      time_range: "2006-present"
      kon_mapping: "economic"

  # ---------------------------------------------------------------------------
  # FINANZSTABILITÄT
  # ---------------------------------------------------------------------------
  financial:
    - id: FRED-VIX
      name: "CBOE Volatility Index (VIX)"
      series_id: "VIXCLS"
      unit: "Index"
      frequency: "daily"
      time_range: "1990-present"
      kon_mapping: "economic"
      note: "Fear Index"

    - id: FRED-SP500
      name: "S&P 500 Index"
      series_id: "SP500"
      unit: "Index"
      frequency: "daily"
      time_range: "1957-present"
      kon_mapping: "economic"

    - id: FRED-STLFSI
      name: "St. Louis Fed Financial Stress Index"
      series_id: "STLFSI4"
      unit: "Index"
      frequency: "weekly"
      time_range: "1993-present"
      kon_mapping: "economic"

  # ---------------------------------------------------------------------------
  # GLOBALE INDIKATOREN (in FRED)
  # ---------------------------------------------------------------------------
  global:
    - id: FRED-OILWTI
      name: "Crude Oil Price (WTI)"
      series_id: "DCOILWTICO"
      unit: "USD per barrel"
      frequency: "daily"
      time_range: "1986-present"
      kon_mapping: "economic"

    - id: FRED-GOLD
      name: "Gold Price"
      series_id: "GOLDPMGBD228NLBM"
      unit: "USD per troy ounce"
      frequency: "daily"
      time_range: "1968-present"
      kon_mapping: "economic"

# =============================================================================
# PYTHON FETCH EXAMPLE
# =============================================================================
fetch_example: |
  import requests
  import pandas as pd

  # FRED API - requires API key
  api_key = "YOUR_API_KEY"  # Get free at https://fred.stlouisfed.org/docs/api/api_key.html
  series_id = "FEDFUNDS"

  url = f"https://api.stlouisfed.org/fred/series/observations"
  params = {
      "series_id": series_id,
      "api_key": api_key,
      "file_type": "json",
      "observation_start": "2020-01-01"
  }

  response = requests.get(url, params=params)
  if response.status_code == 200:
      data = response.json()
      df = pd.DataFrame(data['observations'])
      print(df.tail())

  # Alternative: fredapi package
  # pip install fredapi
  from fredapi import Fred
  fred = Fred(api_key=api_key)
  data = fred.get_series('FEDFUNDS')
  print(data.tail())

# =============================================================================
# STATISTIKEN
# =============================================================================
statistics:
  total_indicators: 19
  by_category:
    us_economy: 5
    fed_rates: 3
    treasury: 3
    exchange_rates: 2
    financial: 3
    global: 2
  update_frequency: "daily to quarterly"
  swiss_direct: 1  # USD/CHF
