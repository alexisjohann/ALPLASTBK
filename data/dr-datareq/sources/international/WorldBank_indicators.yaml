# World Bank - Swiss Indicators
# Version: 1.0
# Quelle: World Bank Open Data / World Development Indicators
# Letzte Aktualisierung: 2026-01-23
# EBF-Relevanz: Alle κ-Dimensionen (breite Abdeckung)

metadata:
  name: "World Bank Indikatoren - Schweiz"
  code: "WB_CH"
  version: "1.0"
  last_updated: "2026-01-23"
  source: "World Bank Group"
  source_type: "Open Data"
  url: "https://data.worldbank.org"
  api_portal: "https://datahelpdesk.worldbank.org/knowledgebase/topics/125589-developer-information"
  country_code: "CHE"
  iso3: "CHE"
  iso2: "CH"
  income_group: "High income"
  region: "Europe & Central Asia"
  description: "World Development Indicators und Governance-Daten für die Schweiz"

  # API-Zugang
  api:
    type: "REST API v2"
    base_url: "https://api.worldbank.org/v2"
    documentation: "https://datahelpdesk.worldbank.org/knowledgebase/articles/889392"
    format: "JSON, XML"
    example: "https://api.worldbank.org/v2/country/CHE/indicator/NY.GDP.PCAP.CD?format=json"
    rate_limit: "No strict limit"
    auth: "None required"

  # BCM-Kopplung
  bcm_coupling:
    primary: "BCM2_04_KON"      # Kontextvektor
    secondary: "BCM2_02_KNU"    # Kollektiver Nutzen

# =============================================================================
# WORLD DEVELOPMENT INDICATORS (WDI) FÜR DIE SCHWEIZ
# =============================================================================
indicators:

  # ---------------------------------------------------------------------------
  # WIRTSCHAFT
  # ---------------------------------------------------------------------------
  economy:
    - id: WB-CH-GDPCAP
      name: "GDP per Capita (current USD)"
      indicator_code: "NY.GDP.PCAP.CD"
      unit: "USD"
      time_range: "1960-2023"
      update_frequency: "yearly"
      kon_mapping: "economic"
      api_url: "https://api.worldbank.org/v2/country/CHE/indicator/NY.GDP.PCAP.CD?format=json"

    - id: WB-CH-GDPPPP
      name: "GDP per Capita (PPP)"
      indicator_code: "NY.GDP.PCAP.PP.CD"
      unit: "USD (PPP)"
      time_range: "1990-2023"
      update_frequency: "yearly"
      kon_mapping: "economic"

    - id: WB-CH-GDPGROW
      name: "GDP Growth (annual %)"
      indicator_code: "NY.GDP.MKTP.KD.ZG"
      unit: "% annual"
      time_range: "1961-2023"
      update_frequency: "yearly"
      kon_mapping: "economic"

    - id: WB-CH-INFL
      name: "Inflation (consumer prices)"
      indicator_code: "FP.CPI.TOTL.ZG"
      unit: "% annual"
      time_range: "1960-2023"
      update_frequency: "yearly"
      kon_mapping: "economic"

    - id: WB-CH-TRADE
      name: "Trade (% of GDP)"
      indicator_code: "NE.TRD.GNFS.ZS"
      unit: "% of GDP"
      time_range: "1960-2023"
      update_frequency: "yearly"
      kon_mapping: "economic"

    - id: WB-CH-FDI
      name: "Foreign Direct Investment (net inflows)"
      indicator_code: "BX.KLT.DINV.WD.GD.ZS"
      unit: "% of GDP"
      time_range: "1970-2023"
      update_frequency: "yearly"
      kon_mapping: "economic"

  # ---------------------------------------------------------------------------
  # DEMOGRAFIE
  # ---------------------------------------------------------------------------
  demographics:
    - id: WB-CH-POP
      name: "Population"
      indicator_code: "SP.POP.TOTL"
      unit: "Personen"
      time_range: "1960-2023"
      update_frequency: "yearly"
      kon_mapping: "demographic"

    - id: WB-CH-POPGROW
      name: "Population Growth"
      indicator_code: "SP.POP.GROW"
      unit: "% annual"
      time_range: "1960-2023"
      update_frequency: "yearly"
      kon_mapping: "demographic"

    - id: WB-CH-URBAN
      name: "Urban Population (%)"
      indicator_code: "SP.URB.TOTL.IN.ZS"
      unit: "% of total"
      time_range: "1960-2023"
      update_frequency: "yearly"
      kon_mapping: "demographic"

    - id: WB-CH-LIFEEXP
      name: "Life Expectancy at Birth"
      indicator_code: "SP.DYN.LE00.IN"
      unit: "Jahre"
      time_range: "1960-2023"
      update_frequency: "yearly"
      kon_mapping: "demographic"

    - id: WB-CH-FERTILITY
      name: "Fertility Rate"
      indicator_code: "SP.DYN.TFRT.IN"
      unit: "births per woman"
      time_range: "1960-2023"
      update_frequency: "yearly"
      kon_mapping: "demographic"

    - id: WB-CH-AGEDEP
      name: "Age Dependency Ratio"
      indicator_code: "SP.POP.DPND"
      unit: "% of working-age"
      time_range: "1960-2023"
      update_frequency: "yearly"
      kon_mapping: "demographic"

  # ---------------------------------------------------------------------------
  # BILDUNG
  # ---------------------------------------------------------------------------
  education:
    - id: WB-CH-SCHOOL
