# =============================================================================
# PYTHON FETCH EXAMPLE
# =============================================================================
fetch_example: |
  import requests
  import pandas as pd

  # World Bank API - GDP per capita for Switzerland
  url = "https://api.worldbank.org/v2/country/CHE/indicator/NY.GDP.PCAP.CD"
  params = {
      "format": "json",
      "per_page": 100,
      "date": "2000:2023"
  }

  response = requests.get(url, params=params)
  if response.status_code == 200:
      data = response.json()
      # data[1] contains the actual records
      records = data[1]
      df = pd.DataFrame(records)
      print(df[['date', 'value']].head(10))

  # Fetch multiple indicators
  indicators = ["NY.GDP.PCAP.CD", "SP.POP.TOTL", "SP.DYN.LE00.IN"]
  for ind in indicators:
      url = f"https://api.worldbank.org/v2/country/CHE/indicator/{ind}?format=json&per_page=1"
      resp = requests.get(url).json()
      if resp[1]:
          print(f"{ind}: {resp[1][0]['value']} ({resp[1][0]['date']})")

