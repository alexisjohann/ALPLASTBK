# Österreichische Nationalbank (OeNB) - Indicators
# Version: 1.0
# Quelle: OeNB Statistik
# Letzte Aktualisierung: 2026-01-23
# EBF-Relevanz: κ_INST (DACH-Region), κ_ARCH (Monetärer Kontext)

metadata:
  name: "Österreichische Nationalbank (OeNB) - Indikatoren"
  code: "OENB"
  version: "1.0"
  last_updated: "2026-01-23"
  source: "Oesterreichische Nationalbank"
  source_type: "Official Statistics"
  url: "https://www.oenb.at"
  statistics_portal: "https://www.oenb.at/Statistik.html"
  description: "Österreichische Wirtschafts- und Finanzstatistiken (DACH-Kontext)"

  # API-Zugang
  api:
    type: "REST API / SDMX"
    base_url: "https://www.oenb.at/isaweb/api"
    documentation: "https://www.oenb.at/isaweb/doku"
    format: "JSON, CSV, XML"
    auth: "None required"

  # Relevanz für Schweiz
  swiss_relevance:
    - "Österreich als DACH-Partner"
    - "Ähnliche Wirtschaftsstruktur (KMU, Tourismus, Finanzsektor)"
    - "Grenzüberschreitende Finanzströme"
    - "Vergleichsland für Policy-Benchmarking"

  # BCM-Kopplung
  bcm_coupling:
    primary: "BCM2_04_KON"      # Kontextvektor
    secondary: "BCM2_02_KNU"    # Kollektiver Nutzen

# =============================================================================
# VERFÜGBARE INDIKATOREN
# =============================================================================
indicators:

  # ---------------------------------------------------------------------------
  # WIRTSCHAFT ÖSTERREICH
  # ---------------------------------------------------------------------------
  economy:
    - id: OENB-GDP
      name: "BIP Österreich (real)"
      unit: "% change"
      frequency: "quarterly"
      time_range: "1995-present"
      kon_mapping: "economic"

    - id: OENB-INFL
      name: "VPI Inflation Österreich"
      unit: "% annual"
      frequency: "monthly"
      time_range: "1990-present"
      kon_mapping: "economic"

    - id: OENB-UNEMP
      name: "Arbeitslosenquote Österreich"
      unit: "% of labor force"
      frequency: "monthly"
      time_range: "1990-present"
      kon_mapping: "economic"

  # ---------------------------------------------------------------------------
  # FINANZSEKTOR
  # ---------------------------------------------------------------------------
  financial:
    - id: OENB-BANK-ASSETS
      name: "Banken Bilanzsumme Österreich"
      unit: "EUR billion"
      frequency: "quarterly"
      time_range: "2000-present"
      kon_mapping: "economic"

    - id: OENB-CREDIT
      name: "Kreditvergabe an Unternehmen"
      unit: "EUR billion"
      frequency: "monthly"
      time_range: "2000-present"
      kon_mapping: "economic"

    - id: OENB-INTEREST
      name: "Kreditzinsen Unternehmen"
      unit: "% p.a."
      frequency: "monthly"
      time_range: "2003-present"
      kon_mapping: "economic"

  # ---------------------------------------------------------------------------
  # ZAHLUNGSBILANZ
  # ---------------------------------------------------------------------------
  balance_of_payments:
    - id: OENB-CA
      name: "Leistungsbilanz Österreich"
      unit: "EUR million"
      frequency: "quarterly"
      time_range: "1995-present"
      kon_mapping: "economic"

    - id: OENB-FDI
      name: "Direktinvestitionen (FDI)"
      unit: "EUR million"
      frequency: "quarterly"
      time_range: "1995-present"
      kon_mapping: "economic"

  # ---------------------------------------------------------------------------
  # DACH-VERGLEICH
  # ---------------------------------------------------------------------------
  dach_comparison:
    - id: OENB-DACH-GDP
      name: "BIP-Wachstum DACH-Vergleich"
      countries: ["AT", "DE", "CH"]
      unit: "% annual"
      frequency: "quarterly"
      note: "Für Benchmarking"

    - id: OENB-DACH-INFL
      name: "Inflation DACH-Vergleich"
      countries: ["AT", "DE", "CH"]
      unit: "% annual"
      frequency: "monthly"
      note: "Für Benchmarking"

# =============================================================================
# STATISTIKEN
# =============================================================================
statistics:
  total_indicators: 10
  by_category:
    economy: 3
    financial: 3
    balance_of_payments: 2
    dach_comparison: 2
  update_frequency: "monthly to quarterly"
