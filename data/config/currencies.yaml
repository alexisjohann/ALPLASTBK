rules:
  auto_detect: Currency is auto-detected from customer country. If customer has no
    country, default to CHF.
  manual_override: User can always override the auto-detected currency.
  storage: 'Amounts stored as: amount (original currency), currency (ISO code), amount_chf
    (converted to CHF at daily rate), fx_rate (rate used), fx_date (rate date).'
  display: Show original amount + currency, and CHF equivalent in parentheses if different.
  rounding: Round to currency's decimal places (e.g. JPY/HUF = 0, most others = 2).
