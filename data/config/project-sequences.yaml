lead_keys:
  format: L-{KUNDE}-{TYP}-{JJ}-{NNN}
  description: 'Lead Superkey: L=Lead, KUNDE=Kundenkürzel, TYP=B(Bestandskunde)/N(Neukunde),
    JJ=Jahr, NNN=Laufnummer'
  examples:
  - L-UBS-B-26-003  → Lead Nr. 3, UBS, Bestandskunde, 2026
  - L-GEB-N-26-001  → Lead Nr. 1, Geberit, Neukunde, 2026
  - L-SBB-N-26-002  → Lead Nr. 2, SBB, Neukunde, 2026
  types:
    B: Bestandskunde
    N: Neukunde
  conversion: Lead gewonnen → L-UBS-B-26-003 wird Projekt UBS041
