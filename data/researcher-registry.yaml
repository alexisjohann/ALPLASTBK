    # -------------------------------------------------------------------------
    contribution_economics:
      summary: |
        Benjamin Enke ist ein führender Verhaltens- und Kulturökonom, der
        bahnbrechende Forschung zu kognitiver Unsicherheit, moralischem
        Universalismus und der Psychologie politischer Präferenzen leistet.
        Er verbindet experimentelle Methoden mit kultureller Ökonomik und
        hat neue Paradigmen für das Verständnis von Entscheidungsfehlern
        etabliert.

      key_contributions:
        - id: ECON-01
          name: "Cognitive Uncertainty"
          description: "Formale Theorie der subjektiven Unsicherheit über optimale Aktionen - erklärt Anomalien in Risiko, Ambiguität, Updating und Erwartungen"
          papers: ["PAP-enke2020cognitive", "PAP-enke2023complexity"]
          impact: "QJE Lead Article 2023"

        - id: ECON-02
          name: "Moral Universalism"
          description: "Slope of altruism over social distance - erklärt politische Ideologie-Struktur"
          papers: ["PAP-enke2022universalism", "PAP-enke2019moral"]
          impact: "REStud 2023, AER 2025"

        - id: ECON-03
          name: "Complexity and Time Preferences"
          description: "Hyperbolisches Diskontieren als Komplexitäts-Artefakt, nicht als echte Präferenz"
          papers: ["PAP-enke2023complexity"]
          impact: "JEEA 2023, 2025"

        - id: ECON-04
          name: "Cultural Economics of Kinship"
          description: "Historische Familienstrukturen prägen heutige ökonomische Präferenzen"
          papers: ["PAP-enke2017ancestral", "PAP-enke2022preferences"]
          impact: "AER, JPE"

      research_themes:
        primary:
          - "Cognitive Uncertainty & Behavioral Attenuation"
          - "Moral Psychology & Political Economy"
          - "Cultural Economics"
          - "Complexity in Economic Decisions"
        secondary:
          - "Global Preferences"
          - "Belief Formation"
          - "Market Efficiency"

    # -------------------------------------------------------------------------
    # CONTRIBUTION TO EBF
    # -------------------------------------------------------------------------
    contribution_ebf:
      summary: |
        Enkes Forschung ist ZENTRAL für EBF:
        - AWARE (Kognitive Unsicherheit): Wie Unsicherheit über eigene Präferenzen Verhalten verzerrt
        - WHEN (Kontext): Wie Komplexität Time-Preferences moduliert
        - WHAT (Utility-Dimensionen): Moralischer Universalismus als neue Utility-Dimension
        - WHO (Heterogenität): Kulturelle Ursprünge von Präferenz-Unterschieden

      framework_contributions:
        - id: EBF-01
          core_dimension: "AWARE"
          name: "Cognitive Uncertainty (κ_CU)"
          description: "Subjektive Unsicherheit über optimale Aktion → Attenuation zu Fundamentals"
          parameter_impact: "Neuer Parameter κ_CU ∈ [0,1] für Decision Noise"

        - id: EBF-02
          core_dimension: "WHEN"
          name: "Complexity-Driven Discounting"
          description: "Hyperbolisches Diskontieren ist Ψ_complexity Effekt, nicht β"
          parameter_impact: "β-Schätzungen sind kontextabhängig (Ψ_complexity)"

        - id: EBF-03
          core_dimension: "WHAT"
          name: "Moral Universalism (U_MU)"
          description: "Slope of altruism ∂U_S/∂distance als Utility-Dimension"
          parameter_impact: "Neuer Parameter MU ∈ [0,1] für universalist vs. particularist"

        - id: EBF-04
          core_dimension: "WHO"
          name: "Ancestral Heterogeneity"
          description: "Kinship structures → heutige Präferenz-Unterschiede"
          parameter_impact: "Kulturelle Priors für λ, β, γ nach Region"

