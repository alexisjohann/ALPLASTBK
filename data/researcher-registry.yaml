    # -------------------------------------------------------------------------
    # CONTRIBUTION TO ECONOMICS (Wissenschaftlicher Beitrag)
    # -------------------------------------------------------------------------
    contribution_economics:
      summary: |
        Ernst Fehr ist einer der einflussreichsten Ökonomen der Welt und ein
        Pionier der Verhaltensökonomie. Seine Forschung hat fundamentale
        Annahmen der Standardökonomie in Frage gestellt und empirisch widerlegt.
        Er ist Mitbegründer der experimentellen Wirtschaftsforschung und hat
        das Feld der sozialen Präferenzen wissenschaftlich etabliert.

      key_contributions:
        - id: ECON-01
          name: "Inequity Aversion Model (Fehr-Schmidt)"
          year: 1999
          description: |
            Entwicklung des Fehr-Schmidt Modells mit Klaus Schmidt, das zeigt
            dass Menschen Ungleichheit ablehnen - sowohl wenn sie benachteiligt
            sind (α > 0) als auch wenn sie bevorzugt sind (β > 0).
          impact: "19,000+ Zitationen, Standardmodell in der Verhaltensökonomie"
          papers: ["PAP-fehr1999theory"]

        - id: ECON-02
          name: "Strong Reciprocity"
          year: 2002
          description: |
            Nachweis dass Menschen bereit sind, auf eigene Kosten Kooperation
            zu belohnen und Defektion zu bestrafen - auch gegenüber Fremden
            in anonymen Einmal-Interaktionen.
          impact: "Erklärt Kooperation in grossen Gruppen ohne Verwandtschaft"
          papers: ["PAP-gaechter2002strongreciprocity", "PAP-gaechter2002altruistic"]

        - id: ECON-03
          name: "Gift Exchange / Efficiency Wages"
          year: 1993-1998
          description: |
            Experimentelle Demonstration dass Arbeiter auf höhere Löhne mit
            höherer Leistung reagieren - entgegen der Standardtheorie dass
            nur Mindestleistung erbracht wird.
          impact: "Empirische Grundlage für Effizienzlohntheorie"
          papers: ["PAP-fehr1993reciprocity", "PAP-gaechter1998reciprocity"]

        - id: ECON-04
          name: "Experimental Economics Methods"
          year: 1990-2010
          description: |
            Entwicklung und Standardisierung experimenteller Methoden:
            Ultimatum Game, Public Goods Game mit Bestrafung, Trust Game.
          impact: "Methodischer Standard für verhaltensökonomische Forschung"
          papers: ["PAP-fehr1999theory", "PAP-fehr2000cooperation"]

        - id: ECON-05
          name: "Behavioral Contract Theory"
          year: 2007-2021
          description: |
            Integration von Verhaltensannahmen in Vertragstheorie und
            Mechanismendesign. Nachweis dass optimale Mechanismen
            behaviorale Typen berücksichtigen müssen.
          impact: "Brücke zwischen Theorie und empirischer Evidenz"
          papers: ["PAP-fehr2007competition"]

      research_themes:
        primary:
          - "Social Preferences"
          - "Fairness and Reciprocity"
          - "Experimental Economics"
          - "Cooperation and Punishment"
        secondary:
          - "Neuroeconomics"
