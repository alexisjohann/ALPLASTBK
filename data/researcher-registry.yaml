# =============================================================================
# RESEARCHER REGISTRY - Evidence-Based Framework (EBF)
# =============================================================================
# Comprehensive database of researchers with COMPLETE publication tracking,
# EBF integration assessment, and contribution documentation.
#
# PURPOSE: Track ALL papers by a researcher, document which are integrated
# into EBF and WHY, and for non-integrated papers provide clear qualitative
# and quantitative justification.
#
# SUPERKEY FORMAT: RES-{LASTNAME}-{INITIAL}
#   Example: RES-FEHR-E (Ernst Fehr)
#
# CROSS-REFERENCES:
#   - LIT-Appendix: appendices/{CODE}_LIT-{NAME}_*.tex
#   - BibTeX: bibliography/bcm_master.bib (integrated papers)
#   - Person Registry: data/person-registry.yaml (if internal/contact)
#   - Theory Catalog: data/theory-catalog.yaml (founded theories)
#
# SSOT: This file is the Single Source of Truth for researcher metadata
#       and paper integration decisions.
#
# Version: 1.0.0
# Created: 2026-01-31
# =============================================================================

metadata:
  version: "1.0.0"
  last_updated: "2026-01-31"
  last_paper_check: "2026-01-31"  # Updated by GitHub Action
  superkey_prefix: "RES-"
  description: "Comprehensive researcher database with paper integration tracking"
  owner: "FehrAdvice & Partners AG"

  # Paper monitoring configuration
  monitoring:
    enabled: true
    frequency: "weekly"  # GitHub Action runs every Monday
    sources:
      - name: "SerpAPI"
        type: "api"
        priority: 1
        cost: "$0 (free tier: 100/month)"
        setup: "Add SERPAPI_KEY to GitHub Secrets"
        url: "https://serpapi.com/google-scholar-api"
        note: "Most reliable, uses google_scholar_id field"

      - name: "Google Scholar (scholarly)"
        type: "scraping"
        priority: 2
        cost: "Free"
        note: "Fallback if no API key, can be blocked"

      - name: "ORCID"
        type: "atom_feed"
        priority: 3
        cost: "Free"
        note: "Reliable backup, uses orcid field"

      - name: "CrossRef"
        type: "api"
        priority: 4
        cost: "Free"
        note: "Recent papers only (from_year: 2024)"

    notification:
      method: "github_issue"
      labels: ["paper-integration", "auto-generated"]

  # Statistics (auto-updated)
  stats:
    total_researchers: 3  # Full entries (RES-*)
    total_scraping_targets: 35  # Lightweight entries for paper discovery
    total_papers_tracked: 593  # Fehr: 343 + Sutter: ~200 + Enke: ~50
    total_papers_integrated: 164  # Fehr: 144 + Enke: 20
    integration_rate: 0.28

  # Evaluation schema for non-integrated papers
  evaluation_schema:
    version: "1.0"
    criteria:
      - name: relevance_score
        weight: 0.25
        scale: "0-1"
        description: "Relevance to EBF domains (behavioral economics, social preferences, context)"

      - name: methodology_fit
        weight: 0.20
        scale: "0-1"
        description: "Does methodology align with EBF empirical standards?"

      - name: parameter_extractable
        weight: 0.15
        scale: "boolean"
        description: "Can behavioral parameters (λ, α, β, γ) be extracted?"

      - name: theory_support
        weight: 0.15
        scale: "boolean"
        description: "Does paper support/extend existing EBF theory?"

      - name: replication_status
        weight: 0.10
        scale: "enum"
        values: ["replicated", "partial", "failed", "none", "not_applicable"]
        description: "Has the finding been replicated?"

      - name: citation_impact
        weight: 0.10
        scale: "0-1"
        description: "Normalized citation impact (citations / field median)"

      - name: external_validity
        weight: 0.05
        scale: "0-1"
        description: "Generalizability to real-world contexts"

    integration_threshold: 0.50
    decision_rules:
      - "score >= 0.50 → INTEGRATE"
      - "score < 0.50 AND parameter_extractable → CONDITIONAL (extract params only)"
      - "score < 0.30 → REJECT with justification"

