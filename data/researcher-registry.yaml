        - name: "Honorary Doctorate, University of St. Gallen"
          year: 2014

    # -------------------------------------------------------------------------
    # CONTRIBUTION TO EBF (Beitrag zum Framework)
    # -------------------------------------------------------------------------
    contribution_ebf:
      summary: |
        Ernst Fehr ist der wissenschaftliche Gründer und Direktor des EBF.
        Seine Forschung bildet das empirische Fundament des Frameworks,
        insbesondere für die Parameter α, β (Inequity Aversion), γ (Complementarity),
        und die Rolle von Kontext (Ψ) bei sozialen Präferenzen.

      framework_contributions:
        - id: EBF-01
          core_dimension: "WHAT"
          name: "Social Utility Component (U^S)"
          description: |
            Fehrs Forschung etabliert dass Utility nicht nur aus eigenen
            materiellen Auszahlungen besteht, sondern eine soziale Komponente
            hat: U = U^F + U^S + U^P + ...
          key_insight: "Menschen haben Präferenzen über Verteilungen, nicht nur Payoffs"
          parameters:
            - "α = 0.85 [0.5, 4.0] (disadvantageous inequity aversion)"
            - "β = 0.315 [0.0, 0.6] (advantageous inequity aversion)"
          appendix_integration:
            - "C (CORE-WHAT): Utility dimensions"
            - "BBB (CORE-WHERE): Parameter repository"

        - id: EBF-02
          core_dimension: "HOW"
          name: "Complementarity in Social Mechanisms"
          description: |
            Nachweis dass Kooperationsmechanismen Komplemente sind:
            - Trust × Contract Enforcement > einzeln
            - Repetition × Group Competition > einzeln (super-additive cooperation)
          key_insight: "γ > 0 für viele soziale Mechanismus-Paare"
          parameters:
            - "γ(trust, contract) > 0"
            - "γ(repetition, competition) > 0 (super-additive)"
          appendix_integration:
            - "B (CORE-HOW): Complementarity structure"

        - id: EBF-03
          core_dimension: "WHEN"
          name: "Context Effects (Ψ)"
          description: |
            Systematische Dokumentation wie Kontext Verhalten beeinflusst:
            - Ψ_norm: Soziale Normen
            - Ψ_culture: Unternehmens/Banken-Kultur
            - Ψ_inst: Institutionelle Regeln
          key_insight: "Selbe Präferenzen + anderer Kontext = anderes Verhalten"
          papers: ["cohn2014business", "cohn2015evidence"]
          appendix_integration:
            - "V (CORE-WHEN): Context framework"

        - id: EBF-04
          core_dimension: "WHO"
          name: "Preference Type Heterogeneity"
          description: |
            Population ist keine repräsentative Agentur sondern Mischung:
            - 30% selfish (α=0, β=0)
            - 30% moderate (α=0.5, β=0.25)
            - 30% fair (α=1.0, β=0.5)
            - 10% strongly fair (α>1, β>0.5)
          key_insight: "Heterogenität erklärt scheinbar widersprüchliche Befunde"
          appendix_integration:
            - "AAA (CORE-WHO): Welfare hierarchy"

        - id: EBF-05
          core_dimension: "METHOD"
          name: "Exclusion Principle for Integration"
          description: |
            Fehrs methodologische Position: Wissenschaftliche Integration
            darf nur erfolgen wenn sie falsifizierbar ist. Complementarity (γ)
            ist legitim als Exclusion Principle, nicht als Integration Principle.
          key_insight: "Nur falsifizierbare Modelle sind wissenschaftlich"
          appendix_integration:
            - "FRM (LIT-FEHR-METHOD): Integration vs Falsifiability"

      theories_founded:
        - theory_id: "MS-SP-001"
          name: "Inequity Aversion (Fehr-Schmidt)"
          status: "active"

        - theory_id: "MS-SP-002"
          name: "Strong Reciprocity"
          status: "active"

        - theory_id: "MS-GE-001"
          name: "Gift Exchange"
          status: "active"

