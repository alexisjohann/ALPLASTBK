# =============================================================================
# INTERVENTION CATALOG: Dimension → Concrete Mechanisms
# =============================================================================
#
# Maps the 80D intervention space to CONCRETE, IMPLEMENTABLE actions.
# This is the missing link between EMERGE output and real-world execution.
#
# Structure:
#   dimension → mechanisms[] → {name, description, examples, cost, evidence}
#
# Version: 1.0 (Januar 2026)
# =============================================================================

metadata:
  version: "1.0"
  date: "2026-01-24"
  purpose: "Map abstract dimensions to concrete intervention mechanisms"
  total_dimensions: 80
  total_mechanisms: 200+

# =============================================================================
# BLOCK A: 10C DIMENSIONS (8)
# =============================================================================

block_a_10c:

  WHO:
    description: "Interventionen die auf Welfare-Level und Identität zielen"
    mechanisms:
      - name: "Identity Priming"
        description: "Aktiviere relevante Identität vor Entscheidung"
        examples:
          - "Frage 'Sind Sie ein Sparer?' vor Anlageentscheidung"
          - "Erinnere an Eltern-Rolle vor Versicherungsentscheidung"
          - "Betone Bürger-Identität vor Steuerentscheidung"
        cost: 0.3
        evidence: "Bryan et al. 2011 (Voter Identity)"

      - name: "Role Assignment"
        description: "Weise explizite Rolle zu"
        examples:
          - "'Als Familienoberhaupt sind Sie verantwortlich für...'"
          - "'Als Mitglied unserer Community...'"
        cost: 0.2
        evidence: "Akerlof & Kranton 2000"

      - name: "Level Shifting"
        description: "Verschiebe Perspektive zwischen L0-L3"
        examples:
          - "Von Individual (L0) zu Familie (L1)"
          - "Von Familie zu Community (L2)"
        cost: 0.4
        evidence: "EBF AAA Appendix"

  WHAT:
    description: "Interventionen die auf Utility-Dimensionen zielen"
    mechanisms:
      - name: "Domain Reframing"
        description: "Reframe Entscheidung in anderer FEPSDE-Dimension"
        examples:
          - "Gesundheit als finanzielles Investment framen"
          - "Sparen als emotionale Sicherheit framen"
        cost: 0.3
        evidence: "Tversky & Kahneman 1981"

      - name: "Multi-Domain Bundling"
        description: "Verknüpfe mehrere Utility-Dimensionen"
        examples:
          - "Fitness-App: Gesundheit + Sozial + Finanziell"
        cost: 0.5
        evidence: "Thaler & Benartzi 2004"

  HOW:
    description: "Interventionen die auf Komplementarität zielen"
    mechanisms:
      - name: "Pre-Commitment Device"
        description: "Bindung an zukünftiges Verhalten"
        examples:
          - "Commitment Contract unterschreiben"
          - "Automatische Eskalation vereinbaren"
          - "Öffentliches Versprechen"
        cost: 0.4
        evidence: "Karlan et al. 2016"

      - name: "Goal Setting"
        description: "Explizite Zielsetzung mit Feedback"
        examples:
          - "SMART-Ziele definieren"
          - "Meilensteine setzen"
        cost: 0.3
        evidence: "Locke & Latham 2002"

      - name: "Implementation Intentions"
        description: "Wenn-Dann Pläne"
        examples:
          - "'Wenn ich mein Gehalt bekomme, dann überweise ich 10% auf Sparkonto'"
        cost: 0.2
        evidence: "Gollwitzer 1999"

  WHEN:
    description: "Interventionen die auf Timing und Kontext zielen"
    mechanisms:
      - name: "Default Setting"
        description: "Setze vorteilhafte Standardoption"
        examples:
          - "Opt-out statt Opt-in für Pensionskasse"
          - "Grüner Strom als Default"
          - "Organspende als Default"
        cost: 0.2
        evidence: "Johnson & Goldstein 2003, Madrian & Shea 2001"

      - name: "Choice Architecture"
        description: "Strukturiere Entscheidungsumgebung"
        examples:
          - "Gesunde Optionen auf Augenhöhe"
          - "Limitiere Anzahl Optionen"
          - "Ordne Optionen strategisch"
        cost: 0.3
        evidence: "Thaler & Sunstein 2008"

      - name: "Timing Optimization"
        description: "Wähle optimalen Zeitpunkt"
        examples:
          - "Fresh Start Effect (Neujahr, Geburtstag)"
          - "Nach Gehaltserhöhung ansprechen"
          - "Montag morgens vs. Freitag nachmittags"
        cost: 0.2
        evidence: "Dai et al. 2014"

      - name: "Deadline/Urgency"
        description: "Setze zeitliche Begrenzung"
        examples:
          - "'Angebot gilt nur bis...'"
          - "Countdown-Timer"
        cost: 0.2
        evidence: "Ariely & Wertenbroch 2002"

  WHERE:
    description: "Interventionen die auf Entscheidungsort zielen"
    mechanisms:
      - name: "Point-of-Decision Prompt"
        description: "Erinnerung am Entscheidungsort"
        examples:
          - "Treppe vs. Lift Hinweis"
          - "Kalorienanzeige am Regal"
        cost: 0.2
        evidence: "Noar et al. 2007"

      - name: "Environmental Restructuring"
        description: "Physische Umgebung ändern"
        examples:
          - "Kantine Layout ändern"
          - "Büro-Design für Bewegung"
        cost: 0.7
        evidence: "Hollands et al. 2013"

  READY:
    description: "Interventionen die auf Handlungsbereitschaft zielen"
    mechanisms:
      - name: "Self-Efficacy Building"
        description: "Stärke Überzeugung, es schaffen zu können"
        examples:
          - "Zeige ähnliche erfolgreiche Personen"
          - "Teile in kleine machbare Schritte"
          - "Feiere kleine Erfolge"
        cost: 0.4
        evidence: "Bandura 1977"

      - name: "Barrier Reduction"
        description: "Reduziere wahrgenommene Hürden"
        examples:
          - "Vereinfache Prozess"
          - "Biete Hilfe an"
          - "Reduziere Formulare"
        cost: 0.3
        evidence: "Behavioural Insights Team"

  STAGE:
    description: "Interventionen die auf Journey-Position zielen"
    mechanisms:
      - name: "Stage-Matched Messaging"
        description: "Botschaft an BCJ-Phase anpassen"
        examples:
          - "Pre-Contemplation: Nur Awareness, kein Call-to-Action"
          - "Contemplation: Pro-Contra Information"
          - "Action: Konkrete nächste Schritte"
        cost: 0.3
        evidence: "Prochaska & DiClemente 1983"

      - name: "Journey Acceleration"
        description: "Beschleunige Fortschritt zur nächsten Phase"
        examples:
          - "Motivational Interviewing"
          - "Trigger Events nutzen"
        cost: 0.5
        evidence: "Miller & Rollnick 2012"

  HIER:
    description: "Interventionen die auf Entscheidungshierarchie zielen"
    mechanisms:
      - name: "Simplification"
        description: "Reduziere kognitive Komplexität"
        examples:
          - "Weniger Optionen anbieten"
          - "Empfehlung geben"
          - "Komplexität verstecken"
        cost: 0.3
        evidence: "Iyengar & Lepper 2000"

# =============================================================================
# BLOCK B: AWARE-DETAIL DIMENSIONS (72)
# Organized by: Referent × Utility × Domain × Valence
# =============================================================================

block_b_aware:

  # ---------------------------------------------------------------------------
  # SELF × INU (Information Not Used - Unbekannte Information)
  # ---------------------------------------------------------------------------

  Self_INU_F_pos:
    description: "Mache POSITIVE FINANZIELLE Effekte für SELBST bekannt (bisher unbekannt)"
    mechanisms:
      - name: "Hidden Benefits Revelation"
        description: "Zeige versteckte finanzielle Vorteile"
        examples:
          - "Zinseszins-Rechner für Altersvorsorge"
          - "TCO-Kalkulator (Total Cost of Ownership)"
          - "'Sie sparen CHF X pro Jahr wenn...'"
        cost: 0.3
        evidence: "Benartzi & Thaler 2007"

      - name: "Personalized Projection"
        description: "Individualisierte finanzielle Prognose"
        examples:
          - "Rentenlücken-Rechner mit eigenem Namen"
          - "Personalisierter Sparplan"
        cost: 0.4
        evidence: "Goldstein et al. 2008"

  Self_INU_F_neg:
    description: "Mache NEGATIVE FINANZIELLE Effekte für SELBST bekannt"
    mechanisms:
      - name: "Cost Revelation"
        description: "Zeige versteckte Kosten"
        examples:
          - "Zigarettenkosten pro Jahr berechnen"
          - "Versteckte Gebühren offenlegen"
          - "Opportunitätskosten zeigen"
        cost: 0.3
        evidence: "Thaler 1985"

      - name: "Loss Preview"
        description: "Simuliere potenzielle Verluste"
        examples:
          - "'Ohne Versicherung verlieren Sie im Schadensfall CHF X'"
          - "Worst-Case Szenario durchrechnen"
        cost: 0.4
        evidence: "Kahneman & Tversky 1979"

  Self_INU_E_pos:
    description: "Mache POSITIVE EMOTIONALE Effekte für SELBST bekannt"
    mechanisms:
      - name: "Emotional Benefit Framing"
        description: "Betone emotionale Vorteile"
        examples:
          - "Ruhe und Sicherheit durch Vorsorge"
          - "Stolz auf Erreichtes"
          - "Freude am Fortschritt"
        cost: 0.2
        evidence: "Loewenstein 2000"

      - name: "Testimonial Stories"
        description: "Erfahrungsberichte über emotionale Gewinne"
        examples:
          - "'Seit ich spare, schlafe ich besser'"
          - "Video-Testimonials"
        cost: 0.3
        evidence: "Green & Brock 2000"

  Self_INU_E_neg:
    description: "Mache NEGATIVE EMOTIONALE Effekte für SELBST bekannt"
    mechanisms:
      - name: "Anticipated Regret"
        description: "Aktiviere erwartete Reue"
        examples:
          - "'Wie werden Sie sich fühlen, wenn...'"
          - "Regret-Szenario durchspielen"
        cost: 0.3
        evidence: "Zeelenberg 1999"

      - name: "Stress/Anxiety Preview"
        description: "Zeige emotionale Kosten auf"
        examples:
          - "Stress durch Schulden"
          - "Angst bei Jobverlust ohne Rücklagen"
        cost: 0.4
        evidence: "Mani et al. 2013"

  Self_INU_P_pos:
    description: "Mache POSITIVE PHYSISCHE Effekte für SELBST bekannt"
    mechanisms:
      - name: "Health Benefit Information"
        description: "Informiere über Gesundheitsvorteile"
        examples:
          - "Lebenserwartung +X Jahre"
          - "Risikoreduktion um Y%"
        cost: 0.2
        evidence: "Webb & Sheeran 2006"

  Self_INU_P_neg:
    description: "Mache NEGATIVE PHYSISCHE Effekte für SELBST bekannt"
    mechanisms:
      - name: "Health Risk Communication"
        description: "Kommuniziere Gesundheitsrisiken"
        examples:
          - "Warnhinweise auf Verpackungen"
          - "Persönliches Risikoprofil"
        cost: 0.3
        evidence: "Slovic 1987"

  Self_INU_S_pos:
    description: "Mache POSITIVE SOZIALE Effekte für SELBST bekannt"
    mechanisms:
      - name: "Social Recognition Preview"
        description: "Zeige soziale Anerkennung"
        examples:
          - "'Andere werden Sie als verantwortungsvoll sehen'"
          - "Status-Gewinn durch Verhalten"
        cost: 0.2
        evidence: "Ariely et al. 2009"

  Self_INU_S_neg:
    description: "Mache NEGATIVE SOZIALE Effekte für SELBST bekannt"
    mechanisms:
      - name: "Social Disapproval Warning"
        description: "Weise auf soziale Missbilligung hin"
        examples:
          - "Stigma bei Schulden"
          - "Reputation bei Nichteinhaltung"
        cost: 0.3
        evidence: "Bursztyn & Jensen 2017"

  Self_INU_D_pos:
    description: "Mache POSITIVE ENTWICKLUNGS-Effekte für SELBST bekannt"
    mechanisms:
      - name: "Growth Opportunity Framing"
        description: "Zeige Entwicklungspotenzial"
        examples:
          - "Skill-Aufbau durch Aktivität"
          - "Persönliches Wachstum"
        cost: 0.3
        evidence: "Dweck 2006"

  Self_INU_D_neg:
    description: "Mache NEGATIVE ENTWICKLUNGS-Effekte für SELBST bekannt"
    mechanisms:
      - name: "Stagnation Warning"
        description: "Weise auf verpasste Entwicklung hin"
        examples:
          - "Opportunity Cost für Lernen"
          - "Skill-Obsoleszenz"
        cost: 0.3
        evidence: "Heckman 2006"

  Self_INU_Ex_pos:
    description: "Mache POSITIVE ERFAHRUNGS-Effekte für SELBST bekannt"
    mechanisms:
      - name: "Experience Preview"
        description: "Ermögliche Vorgeschmack auf positive Erfahrung"
        examples:
          - "VR-Simulation des Ruhestand-Lebens"
          - "Probemitgliedschaft"
          - "Testfahrt"
        cost: 0.5
        evidence: "Hershfield et al. 2011"

  Self_INU_Ex_neg:
    description: "Mache NEGATIVE ERFAHRUNGS-Effekte für SELBST bekannt"
    mechanisms:
      - name: "Negative Experience Simulation"
        description: "Simuliere negative Erfahrung"
        examples:
          - "Alterssimulation (wie fühlt sich 80 an?)"
          - "Armuts-Simulation"
        cost: 0.6
        evidence: "Hershfield et al. 2011"

  # ---------------------------------------------------------------------------
  # SELF × KNU (Known Not Used - Bekannt aber nicht genutzt)
  # ---------------------------------------------------------------------------

  Self_KNU_F_pos:
    description: "Aktiviere BEKANNTES WISSEN über POSITIVE FINANZIELLE Effekte"
    mechanisms:
      - name: "Reminder/Salience"
        description: "Erinnere an bekannte Vorteile"
        examples:
          - "Push-Notification: 'Ihr Sparziel wartet'"
          - "Visueller Fortschrittsbalken"
          - "Regelmäßige Zusammenfassung"
        cost: 0.2
        evidence: "Karlan et al. 2016"

      - name: "Future Self Visualization"
        description: "Visualisiere zukünftiges Selbst"
        examples:
          - "Gealterte Foto-App"
          - "Brief an zukünftiges Selbst"
          - "Retirement Vision Board"
        cost: 0.4
        evidence: "Hershfield et al. 2011"

      - name: "Compound Interest Demonstration"
        description: "Zeige Zinseszins-Effekt"
        examples:
          - "Animierter Wachstumsgraph"
          - "'CHF 100/Monat = CHF 50'000 in 20 Jahren'"
        cost: 0.3
        evidence: "Benartzi & Thaler 2007"

  Self_KNU_F_neg:
    description: "Aktiviere BEKANNTES WISSEN über NEGATIVE FINANZIELLE Effekte"
    mechanisms:
      - name: "Loss Salience"
        description: "Mache bekannte Verluste salient"
        examples:
          - "Tägliche Kosten statt jährliche zeigen"
          - "'Sie verlieren CHF X pro Tag'"
        cost: 0.2
        evidence: "Thaler 1999"

      - name: "Regret Anticipation"
        description: "Aktiviere Wissen über zukünftige Reue"
        examples:
          - "'Erinnern Sie sich, wie Sie sich letztes Mal gefühlt haben?'"
        cost: 0.3
        evidence: "Zeelenberg 1999"

  Self_KNU_E_pos:
    description: "Aktiviere BEKANNTES WISSEN über POSITIVE EMOTIONALE Effekte"
    mechanisms:
      - name: "Emotional Memory Activation"
        description: "Aktiviere positive emotionale Erinnerungen"
        examples:
          - "'Erinnern Sie sich an das Gefühl, als Sie X erreicht haben?'"
          - "Fotos von vergangenen Erfolgen"
        cost: 0.2
        evidence: "Loewenstein 1996"

  Self_KNU_E_neg:
    description: "Aktiviere BEKANNTES WISSEN über NEGATIVE EMOTIONALE Effekte"
    mechanisms:
      - name: "Pain Point Reminder"
        description: "Erinnere an vergangene negative Emotionen"
        examples:
          - "'Wie haben Sie sich gefühlt, als...'"
          - "Stress-Tagebuch Review"
        cost: 0.3
        evidence: "Baumeister et al. 2001"

  Self_KNU_S_pos:
    description: "Aktiviere BEKANNTES WISSEN über POSITIVE SOZIALE Effekte"
    mechanisms:
      - name: "Social Proof Reminder"
        description: "Erinnere an soziale Normen"
        examples:
          - "'73% Ihrer Nachbarn sparen bereits'"
          - "Peer Comparison"
          - "Leaderboard"
        cost: 0.2
        evidence: "Cialdini 2007"

      - name: "Recognition Reminder"
        description: "Erinnere an soziale Anerkennung"
        examples:
          - "Badge/Achievement System"
          - "Öffentliche Anerkennung"
        cost: 0.2
        evidence: "Ashraf et al. 2014"

  Self_KNU_Ex_pos:
    description: "Aktiviere BEKANNTES WISSEN über POSITIVE ERFAHRUNGS-Effekte"
    mechanisms:
      - name: "Experience Reminder"
        description: "Erinnere an positive Erfahrungen"
        examples:
          - "Fotos von Erlebnissen"
          - "'Letztes Mal hatten Sie so viel Freude'"
        cost: 0.2
        evidence: "Wirtz et al. 2003"

  # ---------------------------------------------------------------------------
  # SELF × IDN (Identified - Bereits identifiziert/bekannt)
  # ---------------------------------------------------------------------------

  Self_IDN_F_pos:
    description: "Verstärke IDENTIFIZIERTE POSITIVE FINANZIELLE Effekte"
    mechanisms:
      - name: "Progress Tracking"
        description: "Zeige Fortschritt zu bekanntem Ziel"
        examples:
          - "Spar-Fortschrittsbalken"
          - "Zielerreichungs-Prozent"
          - "Milestone Celebrations"
        cost: 0.3
        evidence: "Harkin et al. 2016"

      - name: "Goal Proximity"
        description: "Zeige Nähe zum Ziel"
        examples:
          - "'Nur noch CHF 500 bis Ziel'"
          - "Endowed Progress Effect"
        cost: 0.2
        evidence: "Nunes & Dreze 2006"

  Self_IDN_S_pos:
    description: "Verstärke IDENTIFIZIERTE POSITIVE SOZIALE Effekte"
    mechanisms:
      - name: "Commitment Publicization"
        description: "Mache Commitment öffentlich"
        examples:
          - "Ziel in sozialen Medien teilen"
          - "Accountability Partner"
        cost: 0.2
        evidence: "Rogers et al. 2014"

  # ---------------------------------------------------------------------------
  # COMMUNITY DIMENSIONS (Comm_*)
  # ---------------------------------------------------------------------------

  Comm_INU_F_pos:
    description: "Mache POSITIVE FINANZIELLE Effekte für GEMEINSCHAFT bekannt"
    mechanisms:
      - name: "Collective Benefit Information"
        description: "Zeige Nutzen für die Gemeinschaft"
        examples:
          - "'Wenn alle X tun, spart die Stadt CHF Y'"
          - "Aggregierte Ersparnisse zeigen"
        cost: 0.3
        evidence: "Allcott & Rogers 2014"

  Comm_INU_S_pos:
    description: "Mache POSITIVE SOZIALE Effekte für GEMEINSCHAFT bekannt"
    mechanisms:
      - name: "Community Norms Building"
        description: "Baue Gemeinschaftsnormen auf"
        examples:
          - "Zeige was andere tun"
          - "Community Challenges"
        cost: 0.3
        evidence: "Cialdini 2003"

  Comm_KNU_F_pos:
    description: "Aktiviere BEKANNTES WISSEN über POSITIVE FINANZIELLE Effekte für GEMEINSCHAFT"
    mechanisms:
      - name: "Collective Action Reminder"
        description: "Erinnere an kollektiven Nutzen"
        examples:
          - "'Zusammen haben wir bereits CHF X gespart'"
          - "Community Dashboard"
        cost: 0.2
        evidence: "Ostrom 1990"

  Comm_KNU_S_pos:
    description: "Aktiviere BEKANNTES WISSEN über POSITIVE SOZIALE Effekte für GEMEINSCHAFT"
    mechanisms:
      - name: "Social Capital Reminder"
        description: "Erinnere an soziales Kapital"
        examples:
          - "Netzwerk-Visualisierung"
          - "Gegenseitige Hilfe betonen"
        cost: 0.2
        evidence: "Putnam 2000"

  Comm_KNU_Ex_pos:
    description: "Aktiviere BEKANNTES WISSEN über POSITIVE ERFAHRUNGS-Effekte für GEMEINSCHAFT"
    mechanisms:
      - name: "Shared Experience Reminder"
        description: "Erinnere an gemeinsame Erlebnisse"
        examples:
          - "Community Event Rückblick"
          - "Geteilte Erfolgsgeschichten"
        cost: 0.2
        evidence: "Baumeister & Leary 1995"

# =============================================================================
# MECHANISM CATEGORIES SUMMARY
# =============================================================================

mechanism_categories:
  information:
    description: "Bereitstellung von Information"
    cost_range: [0.2, 0.4]
    examples:
      - "Hidden Benefits Revelation"
      - "Cost Revelation"
      - "Health Risk Communication"

  salience:
    description: "Erhöhung der Sichtbarkeit/Aufmerksamkeit"
    cost_range: [0.2, 0.3]
    examples:
      - "Reminder/Notification"
      - "Progress Tracking"
      - "Loss Salience"

  framing:
    description: "Änderung der Darstellung"
    cost_range: [0.2, 0.4]
    examples:
      - "Domain Reframing"
      - "Emotional Benefit Framing"
      - "Future Self Visualization"

  social:
    description: "Nutzung sozialer Mechanismen"
    cost_range: [0.2, 0.4]
    examples:
      - "Social Proof"
      - "Peer Comparison"
      - "Public Commitment"

  experience:
    description: "Erfahrungsbasierte Interventionen"
    cost_range: [0.4, 0.7]
    examples:
      - "VR Simulation"
      - "Trial/Probemitgliedschaft"
      - "Gamification"

  structural:
    description: "Änderung der Entscheidungsstruktur"
    cost_range: [0.2, 0.5]
    examples:
      - "Default Setting"
      - "Choice Architecture"
      - "Simplification"

  commitment:
    description: "Bindungsmechanismen"
    cost_range: [0.3, 0.5]
    examples:
      - "Pre-Commitment"
      - "Goal Setting"
      - "Implementation Intentions"

# =============================================================================
# MAPPING: EMERGE OUTPUT → CONCRETE INTERVENTIONS
# =============================================================================

emerge_to_interventions:
  description: |
    This section shows how to translate EMERGE algorithm output
    to concrete intervention recommendations.

  example_retirement_savings:
    emerge_output:
      Self_KNU_F_pos: 1.00
      Self_KNU_F_neg: 0.94
      WHEN: 0.78
      STAGE: 0.56

    concrete_interventions:
      primary:
        dimension: Self_KNU_F_pos
        mechanisms:
          - "Future Self Visualization (gealterte Foto-App)"
          - "Compound Interest Demonstration (animierter Graph)"
          - "Progress Tracking (Spar-Fortschrittsbalken)"

      secondary:
        dimension: Self_KNU_F_neg
        mechanisms:
          - "Loss Salience ('Sie verlieren CHF X pro Tag ohne Sparen')"
          - "Regret Anticipation ('Wie werden Sie sich mit 65 fühlen?')"

      contextual:
        dimension: WHEN
        mechanisms:
          - "Default Enrollment (Opt-out für Pensionskasse)"
          - "Timing Optimization (Fresh Start: Neujahr, nach Lohnerhöhung)"

      journey:
        dimension: STAGE
        mechanisms:
          - "Stage-Matched Messaging (Contemplation: Pro-Contra Info)"

    implementation_package:
      name: "Retirement Awareness Boost"
      components:
        - "Personalisierter Renten-Rechner mit gealtertem Foto"
        - "Wöchentliche SMS-Erinnerung mit Fortschritt"
        - "Automatische Eskalation nach Lohnerhöhung (Default)"
        - "Jährlicher 'Future Self' Brief"
      estimated_cost: "CHF 15 pro Person"
      expected_lift: "+12-18% Sparquote"
