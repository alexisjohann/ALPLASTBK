# =============================================================================
# DEPENDENCY RULES
# =============================================================================
dependency_rules:

  # CVA ist Voraussetzung für viele Skills
  cva_required_for:
    - "SKL-PRJ-001"  # /project-setup
    - "SKL-PRJ-002"  # /intervention-manage
    - "SKL-PRJ-003"  # /phase6-manage
    - "SKL-FRM-001"  # /design-model
    - "SKL-FRM-002"  # /design-intervention
    - "SKL-CUS-002"  # /apply-models
    - "SKL-CUS-003"  # /sensitivity-analysis
    - "SKL-CUS-004"  # /board-presentation

  # Projekt-Scope ist Voraussetzung
  project_scope_required_for:
    - "SKL-PRJ-002"  # /intervention-manage
    - "SKL-PRJ-003"  # /phase6-manage

  # Modell ist Voraussetzung
  model_required_for:
    - "SKL-FRM-002"  # /design-intervention

# =============================================================================
# WORKFLOW CHAINS
# =============================================================================
workflow_chains:

  # Standard Projekt-Workflow
  standard_project:
    name: "Standard Projekt-Workflow"
    description: "Kompletter Flow von Lead bis Outcome"
    steps:
      - skill: "SKL-SAL-001"
        action: "/new-lead"
        output: "LEAD-{NNN}"
      - skill: "SKL-CUS-001"
        action: "/new-customer"
        output: "CVA Profile"
        condition: "if CVA not exists"
      - skill: "SKL-PRJ-001"
        action: "/project-setup"
        output: "PRJ-{KUNDE}-{NNN}"
      - skill: "SKL-FRM-001"
        action: "/design-model"
        output: "10C Model"
      - skill: "SKL-FRM-002"
        action: "/design-intervention"
        output: "Intervention Design"
      - skill: "SKL-PRJ-002"
        action: "/intervention-manage new"
        output: "Project in Registry"
      - skill: "SKL-PRJ-003"
        action: "/phase6-manage schedule"
        output: "Measurement Schedule"

# =============================================================================
# CROSS-REFERENCES
# =============================================================================
cross_references:
  to_appendices: "ebf_integration.appendices[].code → Appendix {CODE}"
  to_chapters: "ebf_integration.chapters[] → Chapter {N}"
  to_templates: "templates/ directory"
  specification: "Appendix BN REF-SUPERKEY"
