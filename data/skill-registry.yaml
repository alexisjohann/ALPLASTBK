  - id: "SKL-DOC-006"
    command: "/generate-paper"
    name: "Paper generieren"
    description: "Wissenschaftliches Paper schreiben mit SWSM Move-Sequencing, 8D Style-Profilen und COMPOSE Mode"
    category: "DOC"
    file: ".claude/commands/generate-paper.md"
    version: "2.0.0"
    created: "2026-01-01"
    updated: "2026-02-14"

    modes:
      - name: "COMPOSE"
        description: "Vollständiges Paper mit SWSM Moves M1-M8, 8D Style-Profil, Quality Gates"
        template: "templates/paper-compose-template.yaml"
        helper: "scripts/paper_compose_helper.py"
      - name: "EXTRACT"
        description: "Paper aus bestehendem Appendix/Kapitel extrahieren"
      - name: "TRANSLATE"
        description: "Paper zwischen Styles übersetzen (z.B. fehr → thaler)"

    ebf_integration:
      appendices:
        - code: "CCC"
          name: "METHOD-DOCTYPE"
          relationship: "8D Document Algorithm"
        - code: "DDD"
          name: "REF-DOCTYPE"
          relationship: "Document Type Theory"
        - code: "BP"
          name: "METHOD-VOTING"
          relationship: "First COMPOSE mode paper (WP-2026-001)"
      chapters: []
      10c_dimensions: []

    styles:
      - "fehr"
      - "thaler"
      - "kahneman"
      - "sunstein"

    style_profiles:
      - id: "nber_working_paper"
        D1: 0.85
        D4: 0.8
        D8: 0.9
      - id: "aer_article"
        D1: 0.9
        D4: 0.7
        D8: 0.95
      - id: "policy_brief"
        D1: 0.5
        D4: 0.3
        D8: 0.6
      - id: "science_letter"
        D1: 0.8
        D4: 0.4
        D8: 0.85

    swsm_moves: ["M1_territory", "M2_niche", "M3_occupy", "M4_model", "M5_data", "M6_results", "M7_discussion", "M8_conclusion"]

    tags: [paper, generate, style, swsm, compose, 8d]

  - id: "SKL-DOC-007"
    command: "/swsm"
    name: "Scientific Writing Structure Model"
    description: "Text-Analyse und -Generierung mit SWSM (SFL + RST + CARS)"
    category: "DOC"
    file: ".claude/commands/swsm.md"
    version: "2.0.0"
    created: "2026-01-29"

    ebf_integration:
      appendices:
        - code: "SW"
          name: "METHOD-SWSM"
          relationship: "Primary specification (9 components, 21 axioms, θ schema)"
        - code: "AN"
          name: "METHOD-LLMMC"
          relationship: "LLMMC for θ estimation (SWSM-21)"
        - code: "DTE"
          name: "REF-DOCTYPE"
          relationship: "8D → θ mapping for legacy compatibility"
        - code: "MS"
          name: "REF-MODELSPACE"
          relationship: "Theory catalog (MOD-013)"
      chapters: []
      10c_dimensions:
        - "WHAT"   # Style content (θ parameters)
        - "HOW"    # Style form (components E1-E9)

    model_registry: "MOD-013"

    components:
      analysis:
        - "E1: Cohesion Analyzer → θ_cohesion"
        - "E2: RST Discourse Parser → θ_rst"
        - "E3: CARS Move Tagger → θ_move"
        - "E4: Theme-Rheme Analyzer → θ_info"
        - "E5: SFL Clause Annotator → clause annotations"
        - "E6: Lexicogrammar Profiler → θ_lexicogrammar, θ_vocab"
        - "E7: Genre Classifier → genre classification"
      generation:
        - "E7: Genre constraints"
        - "E8: Move Planner → document plan"
        - "E9: Text Generator → generated text"

    theta_schema:
      - "θ_move"
      - "θ_cohesion"
      - "θ_rst"
      - "θ_lexicogrammar"
      - "θ_info"
      - "θ_vocab"

    genres:
      - scientific_paper
      - policy_brief
      - executive_summary
      - ebf_appendix
      - blog_post
      - consulting_memo

    scripts:
      - "scripts/swsm_cohesion_analyzer.py"
      - "scripts/swsm_rst_parser.py"
      - "scripts/swsm_cars_tagger.py"
      - "scripts/swsm_theme_analyzer.py"
      - "scripts/swsm_sfl_annotator.py"
      - "scripts/swsm_lexicogrammar_profiler.py"
      - "scripts/swsm_genre_mapper.py"
      - "scripts/swsm_move_planner.py"
      - "scripts/swsm_text_generator.py"
      - "scripts/swsm_extract_author_profile.py"

    theory_support:
      - "SFL: Halliday (1985) - Systemic Functional Linguistics"
      - "RST: Mann & Thompson (1988) - Rhetorical Structure Theory"
      - "CARS: Swales (1990) - Create A Research Space"

    tags: [swsm, text, analysis, generation, sfl, rst, cars, theta]

