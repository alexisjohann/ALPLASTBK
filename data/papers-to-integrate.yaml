# =============================================================================
# PAPERS TO INTEGRATE - Staging Queue for EIP Processing
# =============================================================================
#
# Staging area for papers awaiting full integration into bcm_master.bib.
# Primary identifier is the planned bibtex_key (no separate SuperKey needed).
#
# Workflow:
#   1. DISCOVERY  → Paper gefunden (Crossref, Literaturreview, Empfehlung)
#   2. STAGING    → Hier erfasst mit bibtex_key als ID
#   3. EIP        → Evidence Integration Pipeline durchlaufen
#   4. INTEGRATION → In bcm_master.bib mit allen 6 EBF-Feldern
#   5. REMOVAL    → Aus dieser Liste entfernt
#
# =============================================================================

metadata:
  version: "1.1"
  created: "2026-01-28"
  last_updated: "2026-01-28"
  maintainer: "EBF Team"
  primary_key: "bibtex_key"  # No separate SuperKey - bibtex_key IS the ID

  statistics:
    total: 0
    by_status:
      PENDING: 0
      IN_PROGRESS: 0
      BLOCKED: 0

# =============================================================================
# PAPER ENTRIES
# =============================================================================
#
# Template:
#
# - bibtex_key: "author2024title"      # Primary ID = future bcm_master key
#   doi: "10.xxxx/xxxxx"               # For Crossref lookup (if available)
#   status: PENDING                    # PENDING | IN_PROGRESS | BLOCKED
#   priority: MEDIUM                   # HIGH | MEDIUM | LOW
#   added: "2026-01-28"
#
#   # Metadata
#   title: "Paper Title"
#   authors: ["First Author", "Second Author"]
#   year: 2024
#   source: JOURNAL | NBER | SSRN | WORKING_PAPER | BOOK
#   journal: "Journal Name"
#   url: "https://..."
#
#   # EBF Integration
#   target: "CP"                       # Target appendix
#   use_for: ["DOMAIN-CPS"]            # Planned use_for tags
#   theory_support: ["MS-XX-001"]      # Planned theory links
#
#   # EIP Tracking
#   eip:
#     pro: []                          # PRO evidence (min 3)
#     contra: []                       # CONTRA evidence (actively search!)
#     decision: null                   # INTEGRATE | REJECT | MODIFY
#     rationale: ""
#
#   notes: "Why relevant..."
#
# =============================================================================

papers: []

