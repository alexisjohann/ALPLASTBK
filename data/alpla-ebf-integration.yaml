# TEIL 4: FIELD EXPERIMENT DESIGN MIT EBF
# =============================================================================

field_experiment_design:
  treatment_control:
    description: "Matched Pairs Design basierend auf Plant Deltas"

    matching_criteria:
      primary:
        - "IFI Cluster (A, B, C, D, E)"
        - "Plant Size (±20%)"
        - "Churn Rate (±5pp)"
      secondary:
        - "Unemployment Rate (±1pp)"
        - "Plant Type"

    treatment_arms:
      arm_T:
        n_plants: 6
        intervention: "Full Bundle (Primary + Secondary + Baseline)"
        expected_effect: "Churn -6-10%"

      arm_C:
        n_plants: 6
        intervention: "Baseline only (INT6 Recognition)"
        expected_effect: "Churn -1-2%"

  measurement_protocol:
    baseline:
      timing: "T-0 (vor Intervention)"
      variables:
        - "P1_churn (Ist-Daten von ALPLA)"
        - "K1-K5 (Survey)"
        - "M4-M5 (Survey)"

    midpoint:
      timing: "T+6 months"
      variables:
        - "P1_churn (6M rolling)"
        - "K5_satisfaction (Survey)"
        - "Implementation Fidelity"

    endpoint:
      timing: "T+12 months"
      variables:
        - "P1_churn (12M rolling)"
        - "Full Survey Battery"
        - "Cost-Benefit Analysis"

  analysis_plan:
    primary_outcome:
      variable: "Δ Churn Rate (T vs C)"
      method: "Difference-in-Differences"

    secondary_outcomes:
      - "Δ Job Satisfaction (K5)"
      - "Δ Tenure Distribution"
      - "ROI per Intervention"

    heterogeneity_analysis:
      - "By IFI Cluster"
      - "By Plant Type"
      - "By Job Category (BC1-BC5)"

