sales_phases:
  description: Standard Sales-Phasen 0-5 für Opportunity-Tracking
  phases:
  - phase: 0
    name: Identifiziert
    short: IDENT
    description: Lead identifiziert, aber noch kein Kontakt hergestellt
    mapped_stages:
    - SUSPECT
    probability_range: 0-10%
    typical_actions:
    - Recherche zur Firma
    - Ansprechpartner identifizieren
    - Erstkontakt planen
  - phase: 1
    name: Kontakt
    short: KONTAKT
    description: Erster Kontakt hergestellt, Interesse bekundet
    mapped_stages:
    - PROSPECT
    probability_range: 10-25%
    typical_actions:
    - Discovery Call durchführen
    - Bedarf ermitteln
    - Budget und Timeline klären
  - phase: 2
    name: Qualifiziert
    short: QUAL
    description: Bedarf, Budget und Entscheidungskompetenz qualifiziert
    mapped_stages:
    - QUALIFIED
    probability_range: 25-50%
    typical_actions:
    - Angebot vorbereiten
    - Stakeholder-Mapping
    - Präsentationstermin vereinbaren
  - phase: 3
    name: Angebot
    short: ANGEBOT
    description: Angebot erstellt und beim Kunden präsentiert
    mapped_stages:
    - PROPOSAL
    probability_range: 50-75%
    typical_actions:
    - Angebot präsentieren
    - Fragen klären
    - Einwände behandeln
  - phase: 4
    name: Verhandlung
    short: VERH
    description: Vertragsverhandlung läuft, Konditionen werden abgestimmt
    mapped_stages:
    - NEGOTIATION
    probability_range: 75-90%
    typical_actions:
    - Vertragsbedingungen verhandeln
    - Scope finalisieren
    - Unterschrift einholen
  - phase: 5
    name: Gewonnen
    short: WON
    description: Deal abgeschlossen, Kunde gewonnen
    mapped_stages:
    - WON
    - ACTIVE
    probability_range: 100%
    typical_actions:
    - Kick-off planen
    - Onboarding starten
    - Projektteam zusammenstellen
  extended_phases:
  - phase: -1
    name: Verloren
    short: LOST
    description: Deal verloren oder Kunde abgesprungen
    mapped_stages:
    - LOST
    - CHURNED
    probability_range: 0%
  - phase: 6
    name: Aktiv
    short: ACTIVE
    description: Laufende Kundenbeziehung mit aktiven Projekten
    mapped_stages:
    - ACTIVE
    probability_range: n/a
  - phase: 7
    name: Ruhend
    short: DORMANT
    description: Kunde ohne aktive Projekte
    mapped_stages:
    - DORMANT
    probability_range: n/a
  stage_to_phase_mapping:
    SUSPECT: 0
    PROSPECT: 1
    QUALIFIED: 2
    PROPOSAL: 3
    NEGOTIATION: 4
    WON: 5
    ACTIVE: 6
    DORMANT: 7
    CHURNED: -1
    LOST: -1
    REACTIVATION: 1
pipeline_stages:
  SUSPECT:
    order: 1
    phase: acquisition
    description: Identifiziert, aber noch kein Kontakt
    color: '#CCCCCC'
    next_stages:
    - PROSPECT
  PROSPECT:
    order: 2
    phase: acquisition
    description: Erster Kontakt hergestellt
    color: '#549EDE'
    next_stages:
    - QUALIFIED
    - LOST
  QUALIFIED:
    order: 3
    phase: acquisition
    description: Bedarf und Budget qualifiziert (SQL)
    color: '#024079'
    next_stages:
    - PROPOSAL
    - LOST
  PROPOSAL:
    order: 4
    phase: acquisition
    description: Angebot erstellt und präsentiert
    color: '#A1A0C6'
    next_stages:
    - NEGOTIATION
    - LOST
  NEGOTIATION:
    order: 5
    phase: acquisition
    description: Vertragsverhandlung
    color: '#7EBDAC'
    next_stages:
    - WON
    - LOST
  WON:
    order: 6
    phase: customer
    description: Deal gewonnen, Onboarding
    color: '#7EBDAC'
    next_stages:
    - ACTIVE
  ACTIVE:
    order: 7
    phase: customer
    description: Aktiver Kunde mit laufenden Projekten
    color: '#2E7D32'
    next_stages:
    - DORMANT
    - CHURNED
  DORMANT:
    order: 8
    phase: customer
    description: Kunde ohne aktive Projekte (ruhend)
    color: '#DEA03E'
    next_stages:
    - ACTIVE
    - REACTIVATION
    - CHURNED
  CHURNED:
    order: 9
    phase: former
    description: Ehemaliger Kunde (Beziehung beendet)
    color: '#C62828'
    next_stages:
    - REACTIVATION
  LOST:
    order: 10
    phase: former
    description: Deal verloren (nie Kunde geworden)
    color: '#757575'
    next_stages:
    - REACTIVATION
  REACTIVATION:
    order: 11
    phase: reactivation
    description: Reaktivierungsversuch läuft
    color: '#FF9800'
    next_stages:
    - PROSPECT
    - QUALIFIED
    - ACTIVE
    - LOST
project_phases:
  0:
    name: Erstgespräch / Kennenlernen
    description: Unverbindliches Kennenlern- oder Orientierungsgespräch ohne klar
      definiertes Themenfeld oder konkreten Bedarf.
    typical_stages:
    - SUSPECT
    - PROSPECT
    - REACTIVATION
    color: '#CCCCCC'
  1:
    name: Themen- & Rahmenprüfung
    description: Prüfung eines konkreten Themenfelds sowie erster Rahmenbedingungen
      (z.B. Relevanz, grobes Budget, Timing).
    typical_stages:
    - QUALIFIED
    color: '#549EDE'
  2:
    name: Erwartungsklärung & Vorgehen
    description: Klärung der gegenseitigen Erwartungshaltung und Diskussion eines
      möglichen Vorgehens für eine Zusammenarbeit.
    typical_stages:
    - QUALIFIED
    color: '#024079'
  3:
    name: Angebotsphase
    description: Ausarbeitung und Übermittlung einer Offerte / eines konkreten Angebots.
    typical_stages:
    - PROPOSAL
    color: '#A1A0C6'
  4:
    name: Abschluss & Commitment
    description: Entscheidung für die Zusammenarbeit und formales Commitment.
    typical_stages:
    - NEGOTIATION
    - WON
    color: '#7EBDAC'
  5:
    name: Umsetzung & laufendes Projekt
    description: Projektstart, Umsetzung und operative Zusammenarbeit.
    typical_stages:
    - ACTIVE
    - DORMANT
    color: '#2E7D32'
