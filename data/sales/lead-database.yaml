  to_customer_registry: ebf_integration.customer_registry_ref → CUS-{CODE}
  to_projects: projects[].id → CUS-{CODE}-PRJ-{NNN}
  to_interventions: Via project → CUS-{CODE}-PRJ-{NNN}-INT-{NN}
  to_funders: ebf_integration.funder_path → data/funders/{code}/
  specification: Appendix BN REF-SUPERKEY
