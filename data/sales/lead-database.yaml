phase_auto_suggest:
  description: 'Automatischer Vorschlag der Projekt-Phase basierend auf Pipeline-Stage

    und optionalen Zusatzinformationen (next_action, projects).

    '
  algorithm:
    primary_rules:
    - stage: SUSPECT
      default_phase: 0
      reason: Noch kein Kontakt hergestellt
    - stage: PROSPECT
      default_phase: 0
      reason: Erster Kontakt / Kennenlernen
    - stage: QUALIFIED
      default_phase: 1
      reason: Thema & Rahmen geprüft (SQL)
      override:
        condition: next_action.type IN ['meeting', 'workshop'] AND next_action.description
          CONTAINS 'Erwartung' OR 'Vorgehen' OR 'Scope'
        then_phase: 2
        reason: Erwartungsklärung läuft
    - stage: PROPOSAL
      default_phase: 3
      reason: Angebot in Arbeit oder versendet
    - stage: NEGOTIATION
      default_phase: 4
      reason: Vertragsverhandlung / Abschluss
    - stage: WON
      default_phase: 4
      reason: Deal gewonnen, Commitment erfolgt
      override:
        condition: projects[].status = 'active'
        then_phase: 5
        reason: Projekt bereits gestartet
    - stage: ACTIVE
      default_phase: 5
      reason: Aktives Projekt in Umsetzung
    - stage: DORMANT
      default_phase: 5
      reason: Letztes Projekt abgeschlossen
      note: Für neues Projekt → Phase 0
    - stage: REACTIVATION
      default_phase: 0
      reason: Neustart der Beziehung
    - stage: CHURNED
      default_phase: null
      reason: Beziehung beendet
    - stage: LOST
      default_phase: null
      reason: Nie Kunde geworden
  secondary_rules:
  - condition: stage = QUALIFIED AND next_action.type = 'proposal'
    suggest_phase: 2
    reason: Übergang zu Angebotsphase → Phase 2 (Erwartungsklärung) fast abgeschlossen
  - condition: stage = QUALIFIED AND next_action.type = 'meeting'
    suggest_phase: 1
    reason: Weiteres Meeting → noch in Themenprüfung
  - condition: stage = DORMANT AND next_action.type IS NOT NULL
    suggest_phase: 0
    reason: Reaktivierung geplant → neues Projekt beginnt
  pseudocode: "function suggest_phase(lead):\n  stage = lead.stage\n\n  # Primär-Regel\
    \ anwenden\n  rule = primary_rules.find(stage)\n  suggested_phase = rule.default_phase\n\
    \n  # Override prüfen (falls vorhanden)\n  if rule.override and evaluate(rule.override.condition,\
    \ lead):\n    suggested_phase = rule.override.then_phase\n\n  # Sekundär-Regeln\
    \ prüfen\n  for secondary_rule in secondary_rules:\n    if evaluate(secondary_rule.condition,\
    \ lead):\n      suggested_phase = secondary_rule.suggest_phase\n      break\n\n\
    \  return {\n    phase: suggested_phase,\n    reason: rule.reason,\n    is_auto_suggested:\
    \ true\n  }\n"
