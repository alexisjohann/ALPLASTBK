    # --- Opportunity ---
    opportunity:
      name: "HR Strategy / People Development 2025-2035"
      description: |
        Begleitung bei der Ausarbeitung einer HR-/People Development Strategie
        auf Basis der ALPLA Gesamtstrategie (Wachstum 24.350 → 38.500 MA).

      # Choice Architecture - 3 Optionen
      options:
        - id: "OPTION_A"
          name: "Strategy Framework"
          scope: "Strategischer Rahmen"
          description: |
            Entwicklung des strategischen Rahmens für People Development:
            - Analyse der ALPLA Gesamtstrategie (2025-2035)
            - Identifikation HR-relevanter strategischer Implikationen
            - Talent-Gap-Analyse (High-Level)
            - People Development Framework (Struktur)
            - Executive Summary für Board
          deliverables:
            - "Strategic Alignment Report (20-30 Seiten)"
            - "Talent Gap Matrix (High-Level)"
            - "People Development Framework (Struktur)"
            - "Board Presentation (10 Slides)"
          duration_weeks: 6
          effort_days_fa: 8
          budget_range_eur: "15.000 - 20.000"
          out_of_scope:
            - "Detaillierte Kompetenzmodelle"
            - "Implementierungs-Roadmap"
            - "Regionale Anpassungen"
            - "Change Management"

        - id: "OPTION_B"
          name: "Strategy + Roadmap"
          scope: "Strategie mit Umsetzungsplanung"
          description: |
            Option A PLUS detaillierte Umsetzungsplanung:
            - Alle Inhalte aus Option A
            - Detailliertes Kompetenzmodell (BC + WC)
            - Karrierepfad-Design (5 Levels)
            - Leadership Pipeline Framework
            - 3-Jahres Implementation Roadmap
            - KPI-Framework mit Messkriterien
          deliverables:
            - "Alle Deliverables aus Option A"
            - "Kompetenzmodell (BC1-BC5 + WC)"
            - "Karrierepfad-Dokumentation"
            - "Leadership Pipeline Framework"
            - "Implementation Roadmap (36 Monate)"
            - "KPI Dashboard Design"
          duration_weeks: 12
          effort_days_fa: 25
          budget_range_eur: "80.000 - 120.000"
          out_of_scope:
            - "Implementierungs-Begleitung"
            - "Regionale Roll-out Unterstützung"
            - "Training Design/Delivery"

        - id: "OPTION_C"
          name: "Full Partnership"
          scope: "Strategie + Roadmap + Begleitung"
          description: |
            Option B PLUS Implementierungs-Begleitung:
            - Alle Inhalte aus Option A + B
            - Pilotierung in 1-2 Regionen (z.B. WEEU, NA)
            - Change Management Begleitung
            - Quarterly Review & Adjustment
            - Stakeholder Alignment Workshops
            - Train-the-Trainer für HR Business Partner
          deliverables:
            - "Alle Deliverables aus Option A + B"
            - "Pilot Implementation (1-2 Regionen)"
            - "Change Management Playbook"
            - "4x Quarterly Reviews"
            - "HR BP Training Materials"
            - "Lessons Learned Documentation"
          duration_weeks: 36
          effort_days_fa: 50
          budget_range_eur: "150.000 - 200.000"
          out_of_scope:
            - "Globaler Roll-out (alle 5 Regionen)"
            - "HRIS System Selection/Implementation"
            - "Arbeitsrechtliche Beratung"

      # Recommendation
      recommended_option: "OPTION_B"
      recommendation_rationale: |
        Option B bietet das beste Verhältnis von Tiefe und Umsetzbarkeit:
        - Genug Detail für eigenständige Implementierung durch ALPLA HR
        - Konkrete Roadmap als Orientierung
        - Kompetenzmodell als Fundament für alle weiteren HR-Initiativen
        - Anschlussfähig an Option C falls Begleitung gewünscht

      value_eur_low: 15000
      value_eur_medium: 100000
      value_eur_high: 200000
      probability: 60
      expected_close_date: "2026-03-15"

