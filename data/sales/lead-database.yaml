      Vertriebs:


      COMMODITY/GROßKUNDEN:

      - In anderen ALPLA-Sparten eine Stärke, im Industrial-Bereich bisher weniger
      erfolgreich

      - Gründe: kaum Differenzierung, preislich nicht attraktiv, Vertrieb nicht auf
      lange Buying Cycles eingestellt

