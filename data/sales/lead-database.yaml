        - medium
        - high
      strengths:
        type: string
        description: Stärken des Wettbewerbers
      weaknesses:
        type: string
        description: Schwächen des Wettbewerbers
      our_differentiator:
        type: string
        description: Unser USP vs. dieser Wettbewerber
  buying_committee:
    type: array
