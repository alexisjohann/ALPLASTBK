# =============================================================================
# LEAD DATABASE - FehrAdvice & Partners AG
# =============================================================================
# Zentrale Datenbank für alle Kundenbeziehungen:
# - Ehemalige Kunden (CHURNED)
# - Aktuelle Kunden (ACTIVE)
# - Potenzielle Neukunden (PROSPECT, QUALIFIED, PROPOSAL, NEGOTIATION)
#
# Superkey Format: LEAD-{NNN}
# Reference: Appendix BN REF-SUPERKEY
#
# ⚠️ LEAD-ID VERGABE: NUR via Script! (Duplikat-Prävention)
#    python scripts/get_next_lead_id.py  → Gibt ID zurück + incrementiert
#    NIEMALS manuell IDs vergeben oder next_lead_id direkt ändern!
#
# Version: 1.1.0
# Created: 2026-01-27
# Updated: 2026-02-04 - Added atomic ID generation via script
# =============================================================================

metadata:
  version: "2.0.1"
  last_updated: "2026-02-04"
  superkey_prefix: "LEAD-"
  next_lead_id: 61  # ← NÄCHSTE FREIE ID (automatisch incrementieren!)
  description: "Zentrale Lead-Datenbank für alle Kundenbeziehungen"
  owner: "FehrAdvice & Partners AG"
  schema_extensions:
    - version: "2.0.0"
      date: "2026-02-04"
      description: |
        Erweiterung um 6 neue Schema-Bereiche:
        - behavioral_profile_schema (EBF-spezifisch)
        - meeting_integration_schema
        - deal_dynamics_schema
        - communication_preferences_schema
        - win_loss_schema
        - relationship_depth_schema
      reference_implementation: "LEAD-048 (prio.swiss)"

