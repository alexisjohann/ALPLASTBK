# =============================================================================
# NOTIFICATIONS (E-Mail-Benachrichtigungen)
# =============================================================================
# Automatische Benachrichtigungen bei Lead-Ereignissen
# =============================================================================

notifications:
  # Benachrichtigung bei neuen Leads
  lead_created:
    enabled: true
    description: "E-Mail bei Erstellung eines neuen Leads"

    # Feste Empfänger (Sales Operations)
    recipients:
      - email: "nora.gavazajsusuri@fehradvice.com"
        name: "Nora Gavazaj Susuri"
        role: "Sales Operations"

      - email: "maria.neumann@fehradvice.com"
        name: "Maria Neumann"
        role: "Sales Operations"

    # Owner immer benachrichtigen
    notify_owner: true
    owner_notification:
      subject_template: "Neuer Lead zugewiesen: {company_name}"
      include_deadline: true

    template: "new_lead_notification"
    include_fields:
      - company_name
      - industry
      - stage
      - owner
      - source
      - fit_score
      - deadline

  # Weitere Benachrichtigungstypen (optional erweiterbar)
  stage_changed:
    enabled: false
    description: "E-Mail bei Stage-Änderung"
    recipients: []
    notify_owner: true
    trigger_stages: [QUALIFIED, WON, LOST, CHURNED]

  deal_won:
    enabled: false
    description: "E-Mail bei gewonnenem Deal"
    recipients: []

# =============================================================================
# DEADLINE CONFIGURATION (Follow-up-Fristen)
# =============================================================================
# Automatische Deadlines basierend auf Stage
# =============================================================================

deadline_config:
  enabled: true
  description: "Automatische Follow-up-Deadline bei Lead-Erstellung"

  # Default-Fristen pro Stage (in Tagen)
  default_deadlines:
    SUSPECT: 14       # 2 Wochen für Erstkontakt
    PROSPECT: 7       # 1 Woche für Qualifikation
    QUALIFIED: 14     # 2 Wochen für Angebotserstellung
    PROPOSAL: 7       # 1 Woche für Follow-up
    NEGOTIATION: 3    # 3 Tage während Verhandlung
    WON: 2            # 2 Tage für Onboarding-Start
    ACTIVE: 30        # 1 Monat für Check-in
    DORMANT: 90       # 3 Monate für Reaktivierung
    REACTIVATION: 14  # 2 Wochen für Reaktivierungsversuch

  # Deadline-Berechnung
  calculation:
    start_from: "stage_entry_date"  # Datum des Stage-Eintritts
    business_days_only: false       # Kalendertage (nicht nur Werktage)

  # Erinnerungen
  reminders:
    enabled: true
    days_before: [1]  # 1 Tag vor Deadline
    notify_owner: true
    notify_sales_ops: true  # Auch Sales Operations benachrichtigen

# =============================================================================
# SALES PHASES (Verkaufsphasen 0-5)
# =============================================================================
# Vereinfachte Phasenlogik für Sales-Tracking
# Mapping zu detaillierten Pipeline Stages
# =============================================================================

sales_phases:
  description: "Standard Sales-Phasen 0-5 für Opportunity-Tracking"

  phases:
    - phase: 0
      name: "Identifiziert"
      short: "IDENT"
      description: "Lead identifiziert, aber noch kein Kontakt hergestellt"
      mapped_stages: [SUSPECT]
      probability_range: "0-10%"
      typical_actions:
        - "Recherche zur Firma"
        - "Ansprechpartner identifizieren"
        - "Erstkontakt planen"

    - phase: 1
      name: "Kontakt"
      short: "KONTAKT"
      description: "Erster Kontakt hergestellt, Interesse bekundet"
      mapped_stages: [PROSPECT]
      probability_range: "10-25%"
      typical_actions:
        - "Discovery Call durchführen"
        - "Bedarf ermitteln"
        - "Budget und Timeline klären"

    - phase: 2
      name: "Qualifiziert"
      short: "QUAL"
      description: "Bedarf, Budget und Entscheidungskompetenz qualifiziert"
      mapped_stages: [QUALIFIED]
      probability_range: "25-50%"
      typical_actions:
        - "Angebot vorbereiten"
        - "Stakeholder-Mapping"
        - "Präsentationstermin vereinbaren"

    - phase: 3
      name: "Angebot"
      short: "ANGEBOT"
      description: "Angebot erstellt und beim Kunden präsentiert"
      mapped_stages: [PROPOSAL]
      probability_range: "50-75%"
      typical_actions:
        - "Angebot präsentieren"
        - "Fragen klären"
        - "Einwände behandeln"

    - phase: 4
      name: "Verhandlung"
      short: "VERH"
      description: "Vertragsverhandlung läuft, Konditionen werden abgestimmt"
      mapped_stages: [NEGOTIATION]
      probability_range: "75-90%"
      typical_actions:
        - "Vertragsbedingungen verhandeln"
        - "Scope finalisieren"
        - "Unterschrift einholen"

    - phase: 5
      name: "Gewonnen"
      short: "WON"
      description: "Deal abgeschlossen, Kunde gewonnen"
      mapped_stages: [WON, ACTIVE]
      probability_range: "100%"
      typical_actions:
        - "Kick-off planen"
        - "Onboarding starten"
        - "Projektteam zusammenstellen"

  # Zusätzliche Phasen für Ex-Kunden (optional)
  extended_phases:
    - phase: -1
      name: "Verloren"
      short: "LOST"
      description: "Deal verloren oder Kunde abgesprungen"
      mapped_stages: [LOST, CHURNED]
      probability_range: "0%"

    - phase: 6
      name: "Aktiv"
      short: "ACTIVE"
      description: "Laufende Kundenbeziehung mit aktiven Projekten"
      mapped_stages: [ACTIVE]
      probability_range: "n/a"

    - phase: 7
      name: "Ruhend"
      short: "DORMANT"
      description: "Kunde ohne aktive Projekte"
      mapped_stages: [DORMANT]
      probability_range: "n/a"

  # Phase-zu-Stage Mapping für Reports
  stage_to_phase_mapping:
    SUSPECT: 0
    PROSPECT: 1
    QUALIFIED: 2
    PROPOSAL: 3
    NEGOTIATION: 4
    WON: 5
    ACTIVE: 6
    DORMANT: 7
    CHURNED: -1
    LOST: -1
    REACTIVATION: 1  # Reaktivierung startet wieder bei Kontaktphase

# =============================================================================
# PIPELINE STAGES (Kundenlebenszyklus)
# =============================================================================

pipeline_stages:
  # --- Akquise-Phase ---
  SUSPECT:
    order: 1
    phase: acquisition
    description: "Identifiziert, aber noch kein Kontakt"
    color: "#CCCCCC"
    next_stages: [PROSPECT]

  PROSPECT:
    order: 2
    phase: acquisition
    description: "Erster Kontakt hergestellt"
    color: "#549EDE"
    next_stages: [QUALIFIED, LOST]

  QUALIFIED:
    order: 3
    phase: acquisition
    description: "Bedarf und Budget qualifiziert (SQL)"
    color: "#024079"
    next_stages: [PROPOSAL, LOST]

  PROPOSAL:
    order: 4
    phase: acquisition
    description: "Angebot erstellt und präsentiert"
    color: "#A1A0C6"
    next_stages: [NEGOTIATION, LOST]

  NEGOTIATION:
    order: 5
    phase: acquisition
    description: "Vertragsverhandlung"
    color: "#7EBDAC"
    next_stages: [WON, LOST]

  # --- Kunden-Phase ---
  WON:
    order: 6
    phase: customer
    description: "Deal gewonnen, Onboarding"
    color: "#7EBDAC"
    next_stages: [ACTIVE]

  ACTIVE:
    order: 7
    phase: customer
    description: "Aktiver Kunde mit laufenden Projekten"
    color: "#2E7D32"
    next_stages: [DORMANT, CHURNED]

  DORMANT:
    order: 8
    phase: customer
    description: "Kunde ohne aktive Projekte (ruhend)"
    color: "#DEA03E"
    next_stages: [ACTIVE, REACTIVATION, CHURNED]

  # --- Ehemalige/Verlorene ---
  CHURNED:
    order: 9
    phase: former
    description: "Ehemaliger Kunde (Beziehung beendet)"
    color: "#C62828"
    next_stages: [REACTIVATION]

  LOST:
    order: 10
    phase: former
    description: "Deal verloren (nie Kunde geworden)"
    color: "#757575"
    next_stages: [REACTIVATION]

  REACTIVATION:
    order: 11
    phase: reactivation
    description: "Reaktivierungsversuch läuft"
    color: "#FF9800"
    next_stages: [PROSPECT, QUALIFIED, ACTIVE, LOST]

# =============================================================================
# PROJECT PHASES (Projekt- & Sales-Phasen)
# =============================================================================
# Mapping zwischen internen Pipeline-Stages und kundenorientierten Projekt-Phasen
#
# Algorithmus: stage_to_phase(lead)
#   SUSPECT      → Phase 0 (vor Erstgespräch)
#   PROSPECT     → Phase 0 (Erstgespräch läuft)
#   QUALIFIED    → Phase 1 oder 2 (je nach next_action)
#   PROPOSAL     → Phase 3 (Angebot in Arbeit/versendet)
#   NEGOTIATION  → Phase 4 (Abschluss in Verhandlung)
#   WON          → Phase 4 (Commitment erfolgt)
#   ACTIVE       → Phase 5 (Projekt läuft)
#   DORMANT      → Phase 5 (abgeschlossen) / Phase 0 (für neues Projekt)
#   REACTIVATION → Phase 0 (Neustart)
#   CHURNED/LOST → null (keine aktive Phase)

project_phases:
  0:
    name: "Erstgespräch / Kennenlernen"
    description: "Unverbindliches Kennenlern- oder Orientierungsgespräch ohne klar definiertes Themenfeld oder konkreten Bedarf."
    typical_stages: [SUSPECT, PROSPECT, REACTIVATION]
    color: "#CCCCCC"

  1:
    name: "Themen- & Rahmenprüfung"
    description: "Prüfung eines konkreten Themenfelds sowie erster Rahmenbedingungen (z.B. Relevanz, grobes Budget, Timing)."
    typical_stages: [QUALIFIED]
    color: "#549EDE"

  2:
    name: "Erwartungsklärung & Vorgehen"
    description: "Klärung der gegenseitigen Erwartungshaltung und Diskussion eines möglichen Vorgehens für eine Zusammenarbeit."
    typical_stages: [QUALIFIED]
    color: "#024079"

  3:
    name: "Angebotsphase"
    description: "Ausarbeitung und Übermittlung einer Offerte / eines konkreten Angebots."
    typical_stages: [PROPOSAL]
    color: "#A1A0C6"

  4:
    name: "Abschluss & Commitment"
    description: "Entscheidung für die Zusammenarbeit und formales Commitment."
    typical_stages: [NEGOTIATION, WON]
    color: "#7EBDAC"

  5:
    name: "Umsetzung & laufendes Projekt"
    description: "Projektstart, Umsetzung und operative Zusammenarbeit."
    typical_stages: [ACTIVE, DORMANT]
    color: "#2E7D32"

