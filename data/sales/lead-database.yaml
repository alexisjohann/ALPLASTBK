      - Aufbau einer werksübergreifenden Vertriebsorganisation
      - Einführung von Key Account Management (für Commodity/Großkunden)
      - Customer Success Management für KMU (Technologie & Automatisierung)
      - Klare Governance, Schnittstellen und Verantwortlichkeiten
    - direction: Taktisch / verhaltensökonomisch
