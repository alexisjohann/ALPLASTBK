      - 'Neue Incentives: Fokus auf Neukundenakquise & Großkundenentwicklung'
      - Relative Boni (Team + Individuum) für Balance Kooperation & Wettbewerb
      - 'Transparenz & Social Proof: Dashboards & Erfolgsstories'
