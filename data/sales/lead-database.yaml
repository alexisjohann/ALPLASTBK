        format: MTG-YYYY-MM-DD-NNN
        reference: meeting-registry.yaml
      date:
        type: date
      participants:
        type: array
        description: FA-Teilnehmer (Owner-Codes)
      outcome:
        type: enum
        values:
        - positive
        - neutral
        - negative
        description: Gesamteindruck des Meetings
      follow_up_status:
        type: enum
        values:
        - pending
        - completed
        - overdue
  last_meeting:
    type: object
    description: Quick Access zum letzten Meeting
    fields:
      meeting_id: string
      date: date
      outcome: enum
      days_ago: integer
deal_dynamics_schema:
