# =============================================================================
# CONTACT MANAGEMENT SCHEMA
# =============================================================================
# Felder für aktives Nachfassen und Kontaktsteuerung
# Diese Felder können bei jedem Lead verwendet werden
# =============================================================================

contact_management:
  description: "Schema für Kontaktsteuerung und Follow-up-Tracking"
  version: "1.0.0"
  created: "2026-01-28"

  # --- Nächste Aktion (pro Lead) ---
  next_action_schema:
    next_action:
      type: string
      description: "Beschreibung der nächsten geplanten Aktion"
      example: "Anruf zur Terminvereinbarung"
    next_action_date:
      type: date
      format: "YYYY-MM-DD"
      description: "Datum für die nächste Aktion"
    next_action_owner:
      type: string
      description: "Owner-Code (z.B. GF, EB, MR)"
      reference: "team_registry.owners[].code"
    next_action_type:
      type: enum
      values: [call, email, meeting, proposal, linkedin, other]
      description: "Art der nächsten Aktion"
    next_action_priority:
      type: enum
      values: [critical, high, medium, low]
      default: medium
      description: "Priorität der Aktion"

  # --- Kontakt-Log (Chronologie) ---
  contact_log_schema:
    date:
      type: datetime
      format: "YYYY-MM-DD HH:MM"
      description: "Zeitpunkt des Kontakts"
    type:
      type: enum
      values: [call, email, meeting, linkedin, video_call, event, other]
    direction:
      type: enum
      values: [outbound, inbound]
      description: "Wir haben kontaktiert vs. Kunde hat kontaktiert"
    contact_person:
      type: string
      description: "Name der kontaktierten Person"
    outcome:
      type: enum
      values:
        - reached           # Erreicht und gesprochen
        - voicemail         # Mailbox besprochen
        - no_answer         # Nicht erreicht
        - callback_requested # Rückruf erbeten
        - meeting_set       # Termin vereinbart
        - proposal_sent     # Angebot versendet
        - declined          # Abgesagt/kein Interesse
        - follow_up_needed  # Weiteres Follow-up nötig
    notes:
      type: string
      description: "Gesprächsnotizen"
    follow_up_date:
      type: date
      description: "Datum für nächstes Follow-up"
    logged_by:
      type: string
      description: "Wer hat den Kontakt geloggt (Owner-Code)"

  # --- Prioritäts-System ---
  priority_schema:
    priority:
      type: enum
      values: [critical, high, medium, low]
      description: "Gesamtpriorität des Leads"
    priority_reason:
      type: string
      description: "Begründung für die Priorität"
    hot_lead:
      type: boolean
      default: false
      description: "Markierung für besonders heisse Leads"
    hot_lead_reason:
      type: string
      description: "Warum ist das ein Hot Lead?"
    days_since_contact:
      type: integer
      computed: true
      description: "Tage seit letztem Kontakt (berechnet)"
    follow_up_overdue:
      type: boolean
      computed: true
      description: "Ist das Follow-up überfällig? (berechnet)"

  # --- Kontakt-Frequenz Einstellungen ---
  contact_frequency:
    description: "Empfohlene Kontaktfrequenz pro Stage"
    SUSPECT: 14        # Alle 2 Wochen
    PROSPECT: 7        # Wöchentlich
    QUALIFIED: 5       # Alle 5 Tage
    PROPOSAL: 3        # Alle 3 Tage
    NEGOTIATION: 2     # Alle 2 Tage
    ACTIVE: 30         # Monatlich
    DORMANT: 60        # Alle 2 Monate
    REACTIVATION: 7    # Wöchentlich

# =============================================================================
# BEHAVIORAL PROFILE SCHEMA (EBF-spezifisch)
# =============================================================================
# Verhaltensökonomische Einschätzung des Kunden/Leads
# Basis für personalisierte EBF-Interventionen und Kommunikation
# =============================================================================

behavioral_profile_schema:
  description: "Verhaltensökonomisches Profil für EBF-Integration"
  version: "1.0.0"
  created: "2026-02-04"

  # --- Entscheidungsstil ---
  decision_style:
    type: enum
    values: [analytical, intuitive, consensus, top_down]
    description: |
      analytical = Daten-getrieben, braucht Evidenz
      intuitive = Bauchgefühl, schnelle Entscheidungen
      consensus = Braucht Zustimmung aller Stakeholder
      top_down = CEO/VR entscheidet allein

  risk_appetite:
    type: enum
    values: [low, medium, high]
    description: "Risikobereitschaft bei Investitionen/Projekten"

  change_readiness:
    type: integer
    min: 0
    max: 100
    description: "Veränderungsbereitschaft (0=resistent, 100=Change-Leader)"

  evidence_affinity:
    type: integer
    min: 0
    max: 100
    description: "Affinität zu evidenz-basierter Entscheidungsfindung"

  time_horizon:
    type: enum
    values: [short, medium, long]
    description: |
      short = <6 Monate Planungshorizont
      medium = 6-24 Monate
      long = >24 Monate

  # --- Organisationskontext ---
  organizational_context:
    culture_type:
      type: enum
      values: [hierarchical, clan, adhocracy, market]
      description: "Competing Values Framework (Cameron & Quinn)"
    transformation_stage:
      type: enum
      values: [stable, transition, crisis]
      description: "Aktuelle Organisationsphase"
    ai_readiness:
      type: enum
      values: [none, exploring, experimenting, adopted]
      description: "AI/Digital Maturity Level"

# =============================================================================
# MEETING INTEGRATION SCHEMA
# =============================================================================
# Verknüpfung mit meeting-registry.yaml
# =============================================================================

meeting_integration_schema:
  description: "Schema für Meeting-Integration mit Lead-Tracking"
  version: "1.0.0"
  created: "2026-02-04"

  meetings:
    type: array
    description: "Liste aller Meetings mit diesem Lead"
    item_schema:
      meeting_id:
        type: string
        format: "MTG-YYYY-MM-DD-NNN"
        reference: "meeting-registry.yaml"
      date:
        type: date
