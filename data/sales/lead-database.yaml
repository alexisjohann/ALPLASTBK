      Aktuell ist der Strom gratis, was zu Blockierung führt (Tragedy of the Commons).
      Ziel: Akzeptiertestes Pricing-Modell finden via Befragung.

      VERHALTENSÖKONOMISCHE ANALYSE:
      - Endowment Effect: Mitarbeitende empfinden Gratisladen als Besitzstand
      - Loss Aversion: Übergang von gratis zu kostenpflichtig = empfundener Verlust
      - Fairness-Wahrnehmung: Pricing muss als fair empfunden werden
      - Tragedy of the Commons: 4:1 Nutzer-Stations-Verhältnis → Übernutzung
      - Status Quo Bias: Jede Änderung wird als Verschlechterung wahrgenommen

      KONKRETE OPTIONEN (vom Kunden genannt):
      - Pay per Use: 15 Rp/kWh (nutzungsbasiert)
      - Flat Rate: 5 CHF/Tag (pauschalisiert)
      - Weitere Optionen möglich (z.B. Zeitfenster, Prioritätssystem)

