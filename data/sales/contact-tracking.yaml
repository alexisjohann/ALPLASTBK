# =============================================================================
# QUICK ACTIONS (Vorlagen für häufige Aktionen)
# =============================================================================

quick_actions:

  - id: QA-CALL
    name: "Anruf planen"
    action_type: call
    default_notes: "Telefonisches Follow-up"
    typical_duration: 15

  - id: QA-EMAIL
    name: "Follow-up Email"
    action_type: email
    default_notes: "Email-Nachfass"
    template: |
      Betreff: Follow-up zu unserem Gespräch

      Sehr geehrte/r [Name],

      vielen Dank für unser Gespräch am [Datum].

      [Inhalt]

      Freundliche Grüsse
      [Absender]

  - id: QA-MEETING
    name: "Termin vereinbaren"
    action_type: meeting
    default_notes: "Persönlicher Termin / Video-Call"
    typical_duration: 60

  - id: QA-LINKEDIN
    name: "LinkedIn Nachricht"
    action_type: linkedin
    default_notes: "LinkedIn Kontaktaufnahme"
    template: |
      Hallo [Name],

      [Nachricht]

      Beste Grüsse
      [Absender]

# =============================================================================
# REMINDER SETTINGS
# =============================================================================

reminders:
  enabled: true

  # Tägliche Zusammenfassung
  daily_summary:
    enabled: true
    time: "08:00"
    recipients: ["sales_ops"]

  # Überfällige Kontakte
  overdue_alerts:
    enabled: true
    threshold_days: 1  # Nach 1 Tag überfällig
    escalation_days: 3  # Nach 3 Tagen an Owner + Backup

  # Hot Lead Alerts
  hot_lead_alerts:
    enabled: true
    immediate: true  # Sofortige Benachrichtigung
