# PCT Psi-Scales: Categorical Labels to Numeric Values
# =====================================================
#
# Maps categorical psi_conditions (from paper-references/PAP-*.yaml)
# to numeric values on [0, 1] for PCT delta computation.
#
# Source: 95 unique labels from 16 papers with measurement_contexts
# Method: LLMMC-informed priors (Tier-2) — NOT empirically calibrated
# Created: 2026-02-15
#
# USAGE IN PCT:
#   delta_psi = scale[target_label] - scale[anchor_label]
#   M(delta_psi) = multiplier from pct-multiplier-tables.yaml
#
# SCALE INTERPRETATION:
#   0.0 = low end of dimension (minimal pressure/presence)
#   0.5 = moderate / neutral
#   1.0 = high end of dimension (maximal pressure/presence)
#
# UPDATE PROTOCOL:
#   When new measurement_contexts are added to paper-references,
#   run: python scripts/extract_measurement_contexts.py --update-scales
#   to check for unmapped labels.

version: "0.3"
calibration_status: "llmmc_prior"
n_labels: 128
n_papers: 16
last_updated: "2026-02-16"
changelog:
  - version: "0.3"
    date: "2026-02-16"
    change: "psi_T MECE redesign: removed 6 STAGE labels, 1 Ψ_C label; added 24 clean temporal-situation labels with 5 sub-facettes (T1-T5)"

