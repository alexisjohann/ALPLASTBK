  # =========================================================================
  # Psi_T: Temporal Dimension (20 labels)
  # Scale: 0 = no urgency, open horizon → 1 = extreme urgency, immediate
  #
  # DEFINITION: Temporal structure of the decision SITUATION
  #   - Deadline proximity, consequence latency, reversibility window,
  #     repetition structure, cyclical position
  #
  # ABGRENZUNG (MECE):
  #   - NOT temporal preferences (β, δ) — those are PARAMETERS modulated BY Ψ_T
  #   - NOT life phase / developmental stage — that is STAGE (10C #8, Ch. 13/24)
  #   - NOT cognitive effects of time pressure — that is Ψ_C
  #   - IS: the objective temporal features of the choice environment
  #
  # LITERATURE BASIS:
  #   PRO separation: Frederick et al. (2002), Trope & Liberman (2003/2010),
  #     Ariely & Wertenbroch (2002), Kahneman & Tversky (1979)
  #   CONTRA (but accept analytical separation): Haushofer & Fehr (2014),
  #     Mullainathan & Shafir (2013) — note Ψ_T → Ψ_C feedback channel
  #
  # PREVIOUS LABELS MIGRATED:
  #   → early_childhood_investment → STAGE (ages 0-5 sensitive period)
  #   → ages_0_5_sensitive_period  → STAGE
  #   → ages_13_27                 → STAGE
  #   → customer_journey_phase     → STAGE (BCJ phase)
  #   → long_term_habit_accumulation → STAGE (repeated behavior over life)
  #   → repeated_practice_over_time  → STAGE
  #   → friday_reduced_processing  → Ψ_C (cognitive effect, not temporal situation)
  #     (kept as end_of_week_friday for the temporal POSITION here)
  # =========================================================================
  psi_T:
    description: "Temporal structure of the decision situation: deadline proximity, consequence latency, reversibility, repetition, cyclical position"
    anchor_low: "no deadline, open horizon, fully reversible"
    anchor_high: "immediate deadline, instant consequences, irreversible"

    sub_facettes:
      T1_deadline_proximity: "How soon must the decision be made?"
      T2_consequence_latency: "How soon do consequences materialize?"
      T3_reversibility_window: "How long can the decision be undone?"
      T4_repetition_structure: "One-shot vs. repeated decision?"
      T5_cyclical_position: "Time of day, day of week, season"

    values:
      # --- Low urgency (0.00 - 0.20): Open horizon ---
      no_deadline_open_horizon: 0.05         # T1: no deadline at all
      annual_planning_cycle: 0.10            # T1+T5: yearly decision
      consequence_delayed_years: 0.10        # T2: outcome in years (pension, education)
      fully_reversible_anytime: 0.08         # T3: can be undone at any point
      quarterly_review_cycle: 0.15           # T1+T5: quarterly deadline
      repeated_daily_routine: 0.18           # T4: daily habit, no urgency

      # --- Low-moderate urgency (0.20 - 0.40): Structured, manageable ---
      monthly_recurring_deadline: 0.22       # T1: monthly bills, subscriptions
      consequence_delayed_months: 0.25       # T2: outcome materializes in months
      reversible_within_weeks: 0.28          # T3: cooling-off period, return window
      multi_day_consideration: 0.30          # T1: several days to decide
      weekly_routine_decision: 0.35          # T4+T1: weekly pattern
      seasonal_cyclical: 0.32               # T5: seasonal effect (winter heating, tax season)

      # --- Moderate urgency (0.40 - 0.60): Noticeable pressure ---
      one_week_deadline: 0.42                # T1: ~7 days remaining
      consequence_delayed_days: 0.48         # T2: outcome in days
      reversible_within_days: 0.45           # T3: short return window
      end_of_week_friday: 0.55               # T5: Friday = temporal position (cognitive effect → Ψ_C)
      repeated_but_infrequent: 0.50          # T4: happens few times per year

      # --- High urgency (0.60 - 0.80): Significant pressure ---
      same_day_deadline: 0.65                # T1: must decide today
      consequence_within_hours: 0.68         # T2: fast feedback
      irreversible_commitment: 0.72          # T3: no undo (contract, surgery)
      one_shot_unique_decision: 0.75         # T4: once-only opportunity
      countdown_timer_visible: 0.78          # T1: explicit countdown (auction, offer)

      # --- Extreme urgency (0.80 - 1.00): Maximum pressure ---
      minutes_remaining: 0.85                # T1: very short window
      real_time_auction_bidding: 0.88        # T1+T4: live auction pressure
      immediate_consequence: 0.90            # T2: instant outcome
      emergency_triage: 0.95                 # T1+T2+T3: immediate, irreversible, critical

  # =========================================================================
  # Psi_M: Material/Technology Dimension (8 labels)
