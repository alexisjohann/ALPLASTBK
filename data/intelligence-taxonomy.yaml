# INTELLIGENCE TAXONOMY - Mensch vs. Algorithmus
# =============================================================================
# Single Source of Truth für die Unterscheidung menschlicher Fähigkeiten
# von algorithmischen Operationen
#
# Kernthese: "Die Maschine weiss gar nichts."
# Grundlage: Appendix HI (CORE-INTELLIGENCE)
#
# Version: 1.0.0
