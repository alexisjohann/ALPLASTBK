metadata:
  version: "1.1.0"
  created: "2026-01-30"
  last_updated: "2026-01-30"
  ssot_appendix: "HI"
  core_thesis: "Intelligence = Menschlichkeit = Was nach Abzug algorithmischer Operationen übrig bleibt"

# =============================================================================
# HISTORISCHE ABLEITUNG DES BEGRIFFS "INTELLIGENCE"
# =============================================================================

etymology_of_intelligence:

  latin_roots:
    term: "intelligentia"
    derived_from: "inter-legere"
    literal_meaning: "zwischen-lesen, auswählen, unterscheiden"
    components:
      - "inter" = "zwischen, unter"
      - "legere" = "lesen, sammeln, auswählen"

    original_meaning: |
      Das AUSWÄHLEN zwischen Optionen. Das UNTERSCHEIDEN von Wichtigem
      und Unwichtigem. Das LESEN zwischen den Zeilen.

      → Intelligence ist ursprünglich KEINE Rechenleistung,
         sondern die Fähigkeit zur UNTERSCHEIDUNG.

    cicero_usage: |
      Cicero (106-43 v.Chr.) verwendete "intelligentia" für:
      - Einsicht (insight)
      - Verständnis (understanding)
      - Unterscheidungsvermögen (discernment)

      NIE für blosse Informationsverarbeitung.

  medieval_scholasticism:
    period: "500-1500 n.Chr."

    thomas_aquinas:
      term: "intellectus"
      distinction: |
        Aquinas unterschied scharf:

        RATIO = diskursives Denken (Schritt für Schritt)
        INTELLECTUS = unmittelbare Einsicht (Intuition)

        "Ratio" kann Algorithmen beschreiben.
        "Intellectus" ist exklusiv menschlich (und göttlich).

      angelic_intelligence: |
        Engel haben nach Aquinas "intellectus" ohne "ratio" -
        sie erfassen Wahrheit UNMITTELBAR, ohne Schlussfolgerung.

        Menschen brauchen "ratio" ALS WEG zu "intellectus".

        → Algorithmen haben nur "ratio" (und nicht einmal das
           in echtem Sinne), nie "intellectus".

    boethius:
      definition: "Intelligentia est intima rei comprehensio"
      translation: "Intelligence ist das innerste Erfassen einer Sache"
      implication: |
        Nicht Oberfläche, sondern WESEN erfassen.
        Das kann keine Korrelationsberechnung.

  enlightenment:
    period: "1650-1800"

    locke:
      work: "Essay Concerning Human Understanding (1689)"
      contribution: |
        Locke trennte:
        - WIT (Schnelligkeit, Verknüpfung)
        - JUDGMENT (Unterscheidung, Bewertung)

        LLMs haben (simuliertes) WIT, aber kein JUDGMENT.

    kant:
      work: "Kritik der reinen Vernunft (1781)"
      key_distinction: |
        VERSTAND (Understanding) = Begriffe anwenden
        VERNUNFT (Reason) = Nach dem Unbedingten fragen
        URTEILSKRAFT (Judgment) = Besonderes unter Allgemeines subsumieren

        Algorithmen können (simuliert) VERSTAND zeigen.
        VERNUNFT und URTEILSKRAFT sind exklusiv menschlich.

      important_quote: |
        "Gedanken ohne Inhalt sind leer, Anschauungen ohne Begriffe sind blind."

        → Algorithmen haben weder Anschauung noch echte Begriffe.
           Sie operieren auf SYMBOLEN ohne BEDEUTUNG.

  psychology_era:
    period: "1900-heute"

    binet_simon_1905:
      contribution: "Erster IQ-Test (Binet-Simon-Skala)"
      definition: |
        Intelligence = "judgment, practical sense, initiative,
        the faculty of adapting oneself to circumstances"

      note: |
        Binet selbst warnte vor Verdinglichung:
        "Die Skala erlaubt keine Messung der Intelligenz,
         weil intellektuelle Qualitäten nicht addierbar sind."

    spearman_1904:
      contribution: "g-Faktor (General Intelligence)"
      theory: |
        Es gibt einen allgemeinen Intelligenzfaktor "g",
        der allen kognitiven Leistungen zugrunde liegt.

      critique: |
        "g" ist ein statistisches Artefakt (Faktorenanalyse),
        kein reales Ding im Gehirn.

        → Aber: Die Idee "g = Rechenleistung" ist ein FEHLSCHLUSS.
           Spearman meinte MENTALE ENERGIE, nicht FLOPS.

    gardner_1983:
      contribution: "Multiple Intelligences"
      types:
        - "Linguistische Intelligenz"
        - "Logisch-mathematische Intelligenz"
        - "Räumliche Intelligenz"
        - "Musikalische Intelligenz"
        - "Körperlich-kinästhetische Intelligenz"
        - "Interpersonale Intelligenz"
        - "Intrapersonale Intelligenz"
        - "Naturalistische Intelligenz"

      implication: |
        Intelligence ist NICHT eindimensional.

        Algorithmen können Aspekte von 1-4 simulieren,
        aber 5-8 erfordern VERKÖRPERUNG und BEWUSSTSEIN.

    sternberg_1985:
      contribution: "Triarchische Theorie"
      components:
        - "Analytische Intelligenz (Problemlösung)"
        - "Kreative Intelligenz (Neuheit)"
        - "Praktische Intelligenz (Alltagsanpassung)"

      implication: |
        Praktische und kreative Intelligenz erfordern
        KONTEXT-SENSITIVITÄT und INTENTIONALITÄT.

        → Algorithmen versagen bei echten "Real-World"-Problemen,
           wo es keine klaren Regeln gibt.

  military_intelligence:
    emergence: "19. Jahrhundert"

    meaning_shift: |
      "Intelligence" als INFORMATION über den Feind.

      US: "Central Intelligence Agency" (1947)
      UK: "Secret Intelligence Service" (MI6)

      Hier bedeutet "Intelligence" NICHT Klugheit,
      sondern gesammelte DATEN.

      → Diese Bedeutungsverschiebung hat die Begriffsverwirrung
         bei "Artificial Intelligence" vorbereitet!

    confusion_source: |
      Wenn "Intelligence" = "Daten sammeln und analysieren",
      dann können Maschinen das.

      Wenn "Intelligence" = "Verstehen und Urteilen",
      dann können Maschinen das NICHT.

      Die AI-Industrie nutzt die Ambiguität bewusst oder unbewusst.

  artificial_intelligence:
    dartmouth_1956:
      event: "Dartmouth Summer Research Project on Artificial Intelligence"
      founders:
        - "John McCarthy"
        - "Marvin Minsky"
        - "Claude Shannon"
        - "Nathaniel Rochester"

      original_proposal: |
        "The study is to proceed on the basis of the conjecture that
         every aspect of learning or any other feature of intelligence
         can in principle be so precisely described that a machine can
         be made to simulate it."

      key_assumption: |
        ANNAHME: Intelligence ist SIMULIERBAR.

        Diese Annahme wurde nie bewiesen.
        Sie ist ein ARBEITSPROGRAMM, keine Tatsache.

      critique: |
        McCarthy wählte "Artificial Intelligence" aus Marketing-Gründen.
        Alternativen waren:
        - "Automata Studies"
        - "Complex Information Processing"
        - "Machine Learning"

        "AI" war griffiger - und irreführender.

    ai_winters:
      - period: "1974-1980"
        cause: "Überzogene Erwartungen, Perceptron-Limitationen"
      - period: "1987-1993"
        cause: "Expert Systems scheitern an Wissensrepräsentation"

      lesson: |
        Beide Winter folgten auf HYPE-Perioden,
        in denen "Intelligence" mit "Berechnung" gleichgesetzt wurde.

        → Die aktuelle LLM-Welle wiederholt das Muster.

    deep_learning_era:
      period: "2012-heute"

      breakthrough: "AlexNet (2012) - ImageNet"

      rebranding: |
        "Machine Learning" → "Artificial Intelligence"

        Statistik wurde zu "AI" umbenannt, als die Ergebnisse
        gut genug für Marketing wurden.

      current_confusion: |
        "GPT-4 ist intelligent" (Marketing)
        "GPT-4 macht Mustervorhersagen" (Technik)

        Beides ist wahr - aber es sind VERSCHIEDENE DINGE.

  synthesis_for_ebf:
    historical_insight: |
      INTELLIGENCE hatte ursprünglich NICHTS mit Berechnung zu tun.

      Etymologie:  "zwischen-lesen" = UNTERSCHEIDEN, AUSWÄHLEN
      Scholastik:  "intellectus" = UNMITTELBARE EINSICHT
      Aufklärung:  "Urteilskraft" = BESONDERES unter ALLGEMEINES
      Psychologie: "praktische/kreative Intelligence" = KONTEXT-ANPASSUNG

      Die Gleichsetzung von "Intelligence" mit "Computation" ist
      ein MODERNER KATEGORIENFEHLER, kein historisches Faktum.

    ebf_definition: |
      Für das EBF verwenden wir "Intelligence" im URSPRÜNGLICHEN Sinne:

      INTELLIGENCE = Die Fähigkeit zur UNTERSCHEIDUNG (inter-legere)
                   + UNMITTELBARE EINSICHT (intellectus)
                   + URTEILSKRAFT (judgment)
                   + KONTEXT-SENSITIVITÄT (practical intelligence)

      Diese Fähigkeiten sind EXKLUSIV MENSCHLICH.

      Was Algorithmen tun, ist COMPUTATION, nicht INTELLIGENCE.

      → "Artificial Intelligence" ist ein OXYMORON.
         Der korrekte Begriff wäre "Artificial Computation" oder
         "Automated Pattern Processing".

    beatrix_implication: |
      BEATRIX ist KEIN "AI-System" im irreführenden Sinne.

      BEATRIX ist ein "Behavioral Intelligence AMPLIFIER":
      - Verstärkt menschliche Intelligence (inter-legere)
      - Ersetzt sie NICHT
      - Der Mensch UNTERSCHEIDET, URTEILT, VERSTEHT
      - Der Algorithmus BERECHNET, KORRELIERT, GENERIERT

      Daher: "Post-AI" Definition von BEATRIX.

    key_references:
      - "Aristotle: De Anima (ca. 350 v.Chr.)"
      - "Thomas Aquinas: Summa Theologica (1265-1274)"
      - "John Locke: Essay Concerning Human Understanding (1689)"
      - "Immanuel Kant: Kritik der reinen Vernunft (1781)"
      - "Alfred Binet: L'étude expérimentale de l'intelligence (1903)"
      - "Charles Spearman: General Intelligence (1904)"
      - "Howard Gardner: Frames of Mind (1983)"
      - "Robert Sternberg: Beyond IQ (1985)"
      - "John McCarthy et al.: Dartmouth Proposal (1955)"
      - "Hubert Dreyfus: What Computers Can't Do (1972)"
      - "John Searle: Minds, Brains, and Programs (1980)"

# =============================================================================
# MENSCHLICHE FÄHIGKEITEN (Was Algorithmen NICHT können)
# =============================================================================

human_capabilities:

  # -------------------------------------------------------------------------
  # WISSEN (Echtes Verstehen)
  # -------------------------------------------------------------------------
  - id: "HC-001"
    term_de: "Wissen"
    term_en: "Knowledge"

    definition: |
      Echtes Verstehen von Zusammenhängen, nicht blosse Datenspeicherung.
      Wissen impliziert Bedeutungszuweisung, Kontextverständnis und die
      Fähigkeit, Informationen in einen kohärenten Weltbezug einzuordnen.

    why_human_only:
      primary_reason: |
        Wissen erfordert Bewusstsein (Qualia) - das subjektive Erleben von
        "etwas verstehen". Ein Algorithmus kann Muster erkennen, aber nicht
        WISSEN, dass er etwas weiss.
      philosophical_basis: "Searle's Chinese Room Argument"
      neuroscience_basis: |
        Wissen ist an embodied cognition gebunden - Körpererfahrung formt
        Konzepte (Lakoff & Johnson, 1999).

    counterarguments:
      - argument: "LLMs zeigen emergentes Verhalten, das wie Wissen aussieht"
        strength: "medium"
        our_response: |
          Emergenz von Mustern ≠ Emergenz von Bewusstsein. Statistische
          Korrelationen zwischen Tokens sind kein Verstehen.

      - argument: "Functionalism: Wenn es sich wie Wissen verhält, ist es Wissen"
        strength: "high"
        our_response: |
          Wir lehnen den Funktionalismus ab. Verhalten kann simuliert werden,
          Bewusstsein nicht. Der Turing-Test ist notwendig, aber nicht hinreichend.

    our_position:
      stance: "EXKLUSIV MENSCHLICH"
      confidence: 0.95
      rationale: |
        Wissen erfordert intentionality (Brentano) - die Gerichtetheit des
        Geistes auf etwas. Algorithmen haben keine original intentionality,
        nur derived intentionality (durch menschliche Interpretation zugewiesen).

    algorithmic_equivalent:
      operation: "Speichern und Abrufen"
      mechanism: |
        Algorithmus speichert Daten in Gewichten (Training) oder Datenbanken
        (RAG) und ruft sie bei Pattern-Match ab. Keine Bedeutungszuweisung,
        nur syntaktische Operationen.
      key_difference: |
        MENSCH: Weiss, dass Paris die Hauptstadt ist (mit Verständnis)
        ALGORITHMUS: "Paris" und "Hauptstadt" haben hohe Token-Korrelation

        Der Mensch VERSTEHT den Zusammenhang.
        Der Algorithmus HAT eine statistische Assoziation.

    ebf_implications:
      - "EBF nutzt menschliches Wissen als Input, nicht als Output"
      - "BEATRIX verstärkt Wissen, ersetzt es nicht"
      - "Consultants bringen Domain-Wissen ein, Algorithmus strukturiert es"

    related_concepts: ["HC-002", "HC-003"]

  # -------------------------------------------------------------------------
  # BEURTEILEN (Qualitative Bewertung)
  # -------------------------------------------------------------------------
  - id: "HC-002"
    term_de: "Beurteilen"
    term_en: "Judgment"

    definition: |
      Die Fähigkeit, qualitative Bewertungen vorzunehmen, die über
      quantitative Metriken hinausgehen. Urteilskraft im Kantischen Sinne:
      Das Besondere unter das Allgemeine subsumieren.

    why_human_only:
      primary_reason: |
        Urteilen erfordert Wertezuweisung. Werte sind nicht algorithmisch
        ableitbar - sie sind menschliche Setzungen (Hume's Guillotine:
        Aus Sein folgt kein Sollen).
      philosophical_basis: "Kant's Kritik der Urteilskraft"
      neuroscience_basis: |
        Urteilskraft involviert das präfrontale Cortex UND das limbische
        System - Emotion und Vernunft sind untrennbar (Damasio's Somatic
        Marker Hypothesis).

    counterarguments:
      - argument: "RLHF trainiert Modelle auf menschliche Präferenzen"
        strength: "medium"
        our_response: |
          RLHF überträgt menschliche Urteile auf Gewichte - das Modell
          selbst urteilt nicht, es approximiert menschliche Urteile.

      - argument: "Recommendation Systems treffen Bewertungen"
        strength: "low"
        our_response: |
          Sie optimieren Metriken (Klickraten, Engagement), nicht Werte.
          Das ist Korrelation, nicht Urteil.

    our_position:
      stance: "EXKLUSIV MENSCHLICH"
      confidence: 0.90
      rationale: |
        Urteilen erfordert moralisches Bewusstsein und Verantwortlichkeit.
        Ein Algorithmus kann nicht für seine "Urteile" verantwortlich gemacht
        werden - er hat keine agency.

    algorithmic_equivalent:
      operation: "Scoring und Ranking"
      mechanism: |
        Algorithmus berechnet numerische Scores basierend auf definierten
        Metriken und sortiert Optionen nach diesen Scores. Optimiert
        Zielfunktionen, aber setzt keine Werte.
      key_difference: |
        MENSCH: "Diese Lösung ist BESSER, weil sie ethisch vertretbar ist"
        ALGORITHMUS: "Option A hat Score 0.87, Option B hat Score 0.72"

        Der Mensch BEWERTET nach Werten (gut/schlecht/richtig/falsch).
        Der Algorithmus SORTIERT nach Metriken (höher/niedriger).

    ebf_implications:
      - "Finale Entscheidungen bleiben beim Menschen"
      - "EBF liefert Evidenz, nicht Urteile"
      - "Algorithmus schlägt vor, Mensch entscheidet"

    related_concepts: ["HC-001", "HC-003", "HC-006"]

  # -------------------------------------------------------------------------
  # BELIEFS HINTERFRAGEN (Kritisches Denken)
  # -------------------------------------------------------------------------
  - id: "HC-003"
    term_de: "Beliefs hinterfragen"
    term_en: "Critical Reflection"

    definition: |
      Die Fähigkeit, eigene Überzeugungen (Beliefs) zu erkennen, zu
      hinterfragen und bei Bedarf zu revidieren. Metakognition über
      die eigenen mentalen Zustände.

    why_human_only:
      primary_reason: |
        Erfordert Selbstbewusstsein (Self-awareness) - das Wissen, dass
        man Überzeugungen HAT, die falsch sein könnten. Ein Algorithmus
        hat keine Beliefs, nur Parameter.
      philosophical_basis: "Descartes' Cogito, Pyrrhonische Skepsis"
      neuroscience_basis: |
        Metakognition ist an den medialen präfrontalen Cortex gebunden
        und erfordert ein Selbstmodell (Theory of Mind auf sich selbst
        angewendet).

    counterarguments:
      - argument: "Chain-of-Thought Prompting zeigt 'Selbstreflexion'"
        strength: "medium"
        our_response: |
          CoT ist sequentielle Token-Generierung, nicht Reflexion.
          Das Modell "denkt nicht nach" - es generiert Text, der wie
          Nachdenken aussieht.

      - argument: "Constitutional AI korrigiert sich selbst"
        strength: "medium"
        our_response: |
          Es vergleicht Output mit trainierten Prinzipien - das ist
          Pattern Matching, nicht genuine Selbstkritik.

    our_position:
      stance: "EXKLUSIV MENSCHLICH"
      confidence: 0.85
      rationale: |
        Echte Selbstkritik erfordert die Möglichkeit des Irrtums und das
        Bewusstsein dieser Möglichkeit. Algorithmen haben keine epistemische
        Demut, weil sie keine Epistemologie haben.

    algorithmic_equivalent:
      operation: "Validieren gegen Regeln"
      mechanism: |
        Algorithmus vergleicht Output mit vordefinierten Prinzipien
        (Constitutional AI) oder Constraints. Pattern Matching gegen
        Regelwerk, nicht echte Selbstreflexion.
      key_difference: |
        MENSCH: "Moment, stimmt das überhaupt? Habe ich einen Denkfehler?"
        ALGORITHMUS: "Output enthält Muster X, das gegen Regel Y verstösst → neu generieren"

        Der Mensch ZWEIFELT an sich selbst (epistemische Demut).
        Der Algorithmus PRÜFT gegen externe Kriterien (Compliance).

    ebf_implications:
      - "EBF-Sessions enden mit 'Was haben wir gelernt?'"
      - "Mensch validiert und korrigiert algorithmische Vorschläge"
      - "Iteration als menschlicher Lernprozess, nicht machine learning"

    related_concepts: ["HC-001", "HC-004"]

  # -------------------------------------------------------------------------
  # LERNEN (Durch Erfahrung und Iteration)
  # -------------------------------------------------------------------------
  - id: "HC-004"
    term_de: "Lernen"
    term_en: "Learning"

    definition: |
      Die dauerhafte Veränderung von Wissen, Fähigkeiten oder Verhalten
      durch Erfahrung. Menschliches Lernen ist episodisch, emotional
      verankert und kontextabhängig.

    why_human_only:
      primary_reason: |
        Menschliches Lernen ist an Gedächtnis gebunden, das BEDEUTUNG
        speichert, nicht nur Daten. Emotional bedeutsame Erlebnisse
        werden priorisiert (Flashbulb Memory).
      philosophical_basis: "Aristoteles' Habitus-Begriff, Dewey's Learning by Doing"
      neuroscience_basis: |
        Hippocampus konsolidiert Episoden zu semantischem Wissen.
        Amygdala moduliert Gedächtnisstärke durch emotionale Salienz.

    counterarguments:
      - argument: "Machine Learning heisst doch 'Lernen'"
        strength: "high"
        our_response: |
          METAPHER, nicht Realität. ML ist Parameteroptimierung durch
          Gradientenabstieg. Der Name ist Marketing, nicht Philosophie.
          "Lernen" bei ML = Weight Update, nicht Erfahrungsintegration.

      - argument: "In-Context Learning bei LLMs"
        strength: "medium"
        our_response: |
          ICL ist temporäre Aktivierungsmuster im Forward Pass.
          Es gibt keinen dauerhaften Lerneffekt - nach dem Context
          Window ist alles "vergessen".

    our_position:
      stance: "EXKLUSIV MENSCHLICH (echtes Lernen)"
      confidence: 0.80
      nuance: |
        Wir unterscheiden: "Machine Learning" (Parameteroptimierung) von
        "Menschlichem Lernen" (Erfahrungsintegration mit Bedeutung).
        Beides existiert, aber es sind fundamental verschiedene Prozesse.

    algorithmic_equivalent:
      operation: "Parameter-Update (Weight Update)"
      mechanism: |
        Algorithmus passt Gewichte durch Gradientenabstieg an, um
        Verlustfunktion zu minimieren. Keine Erfahrung, nur numerische
        Optimierung.
      key_difference: |
        MENSCH: "Beim letzten Projekt habe ich GELERNT, dass Kunden X brauchen"
        ALGORITHMUS: "Gewicht w_ij wurde von 0.3 auf 0.7 angepasst"

        Der Mensch INTEGRIERT Erfahrung in sein Weltbild.
        Der Algorithmus OPTIMIERT Parameter für eine Zielfunktion.

        Der Mensch erinnert sich an emotional Bedeutsames.
        Der Algorithmus "merkt sich" was den Loss reduziert.

    ebf_implications:
      - "EBF dokumentiert Learnings für MENSCHEN, nicht für Algorithmen"
      - "Lessons Learned sind menschliche Erfahrungsreflexion"
      - "Iteration in Sessions = menschlicher Lernprozess"

    related_concepts: ["HC-003", "HC-005"]

  # -------------------------------------------------------------------------
  # IMAGINIEREN (Visuelle Vorstellung der Zukunft)
  # -------------------------------------------------------------------------
  - id: "HC-005"
    term_de: "Imaginieren"
    term_en: "Imagination"

    definition: |
      Die Fähigkeit, nicht-existente Zustände mental zu simulieren,
      insbesondere zukünftige Möglichkeiten. Prospection - das mentale
      Reisen in die Zukunft.

    why_human_only:
      primary_reason: |
        Imagination erfordert ein Selbst, das sich in verschiedene
        Zeiten projizieren kann (Mental Time Travel). Dies setzt
        autobiographisches Bewusstsein voraus.
      philosophical_basis: "Husserl's Phänomenologie der Zeit"
      neuroscience_basis: |
        Episodic Future Thinking nutzt dasselbe Netzwerk wie episodisches
        Gedächtnis (Default Mode Network). Hippocampus konstruiert
        sowohl vergangene als auch zukünftige Szenarien (Schacter & Addis).

    counterarguments:
      - argument: "Generative AI 'imaginiert' Bilder/Texte"
        strength: "high"
        our_response: |
          Generative Modelle interpolieren im Latent Space des
          Trainingssets. Das ist Rekombination, nicht Imagination.
          Sie können nichts vorstellen, was AUSSERHALB ihrer
          Trainingsdaten liegt (Distribution Shift Problem).

      - argument: "AlphaFold 'stellt sich' Proteinstrukturen vor"
        strength: "medium"
        our_response: |
          Prediction ≠ Imagination. AlphaFold approximiert physikalische
          Realität, es "stellt sich" nichts vor - es hat kein Selbst,
          das sich etwas vorstellt.

    our_position:
      stance: "EXKLUSIV MENSCHLICH"
      confidence: 0.85
      rationale: |
        Imagination erfordert Subjektivität - ein "Ich", das sich
        in andere Situationen versetzt. Dies ist die Grundlage für
        Empathie, Planung und Kreativität.

    algorithmic_equivalent:
      operation: "Szenario berechnen"
      mechanism: |
        Algorithmus berechnet ein Szenario und beschreibt es durch die
        wahrscheinlichste Kombination von Tokens. Keine Vorstellung,
        sondern statistische Extrapolation aus Trainingsdaten.
      key_difference: |
        MENSCH: Sieht die Zukunft VOR sich (visuell, emotional, embodied)
        ALGORITHMUS: Generiert Text, der Zukunft BESCHREIBT (Tokens)

        Der Mensch ERLEBT die imaginierte Zukunft (Prospection).
        Der Algorithmus PRODUZIERT Text über mögliche Zukünfte.

    ebf_implications:
      - "Szenario-Planung ist menschliche Imagination mit Datenunterstützung"
      - "BEATRIX liefert Strukturen, Menschen füllen sie mit Vorstellungen"
      - "Zukunftsbilder entstehen im Dialog, nicht algorithmisch"
      - "Algorithmus berechnet Szenarien, Mensch SIEHT sie vor sich"

    related_concepts: ["HC-001", "HC-006"]

  # -------------------------------------------------------------------------
  # ERINNERN (Emotional bedeutsames Gedächtnis)
  # -------------------------------------------------------------------------
  - id: "HC-006"
    term_de: "Erinnern"
    term_en: "Remembering"

    definition: |
      Das Abrufen vergangener Erlebnisse mit ihrem emotionalen Gehalt
      und ihrer persönlichen Bedeutung. Erinnerung ist rekonstruktiv
      und identitätsstiftend.

    why_human_only:
      primary_reason: |
        Erinnerung erfordert autobiographisches Selbst - ein "Ich", das
        eine Geschichte hat. Algorithmen haben keine Biographie, nur
        Trainingsdaten.
      philosophical_basis: "Ricoeur's Narrative Identität"
      neuroscience_basis: |
        Autobiographisches Gedächtnis ist im medialen Temporallappen
        verankert und untrennbar mit Selbstkonzept verbunden.

    counterarguments:
      - argument: "RAG-Systeme 'erinnern' sich an Dokumente"
        strength: "low"
        our_response: |
          RAG ist Retrieval, nicht Erinnerung. Es fehlt: emotionale
          Salienz, Rekonstruktion, persönliche Bedeutung, zeitliche
          Verortung im eigenen Leben.

      - argument: "Persistent Memory in Chatbots"
        strength: "medium"
        our_response: |
          Datenbankabfrage mit menschlich zugewiesenem Kontext.
          Der Bot "erinnert sich" nicht - er liest Einträge.

    our_position:
      stance: "EXKLUSIV MENSCHLICH"
      confidence: 0.90
      rationale: |
        Erinnerung ist konstitutiv für Identität. Wir sind, woran
        wir uns erinnern. Ein Algorithmus hat keine Identität,
        daher keine echte Erinnerung.

    algorithmic_equivalent:
      operation: "Retrieval (Datenbankabfrage)"
      mechanism: |
        Algorithmus führt Query gegen Datenbank/Vektorstore aus.
        Similarity Search findet ähnliche Einträge. Keine emotionale
        Priorisierung, keine autobiographische Verortung.
      key_difference: |
        MENSCH: "Ich ERINNERE mich an das Projekt 2019 - das war emotional"
        ALGORITHMUS: "Query 'Projekt 2019' → 3 Dokumente mit Similarity > 0.8"

        Der Mensch ERLEBT die Erinnerung (mit Gefühlen, Kontext, Bedeutung).
        Der Algorithmus RUFT Daten AB (ohne Erleben).

    ebf_implications:
      - "Case Registry speichert für Menschen, nicht für Algorithmen"
      - "Lessons Learned sind menschliche Erinnerungen an Projekte"
      - "Erfahrungsschatz entsteht bei Consultants, nicht in Modellen"

    related_concepts: ["HC-004", "HC-005"]

  # -------------------------------------------------------------------------
  # VERANTWORTEN (Moralische Agency)
  # -------------------------------------------------------------------------
  - id: "HC-007"
    term_de: "Verantworten"
    term_en: "Moral Accountability"

    definition: |
      Die Fähigkeit, für Handlungen und deren Konsequenzen moralisch
      einzustehen. Erfordert Willensfreiheit (oder deren funktionales
      Äquivalent) und Bewusstsein über die Handlungsfolgen.

    why_human_only:
      primary_reason: |
        Verantwortung setzt Freiheit voraus. Ein Algorithmus ist
        determiniert durch seine Parameter und Inputs - er kann nicht
        "anders handeln" und ist daher nicht verantwortlich.
      philosophical_basis: "Kant's Autonomie, Strawson's Reactive Attitudes"
      legal_basis: |
        Rechtssysteme weltweit setzen menschliche Verantwortlichkeit
        voraus. AI-Haftung wird auf Hersteller/Betreiber übertragen.

    counterarguments:
      - argument: "AI Ethics Frameworks weisen AI Verantwortung zu"
        strength: "low"
        our_response: |
          Kategorienfehler. Man kann einer Maschine keine Pflichten
          auferlegen. "Responsible AI" bedeutet: Menschen sind
          verantwortlich für AI, nicht AI ist verantwortlich.

      - argument: "Autonomous Vehicles treffen 'moralische' Entscheidungen"
        strength: "medium"
        our_response: |
          Sie exekutieren vorprogrammierte Regeln. Die moralische
          Entscheidung wurde von den Entwicklern getroffen, nicht
          vom Fahrzeug.

    our_position:
      stance: "EXKLUSIV MENSCHLICH"
      confidence: 0.95
      rationale: |
        Ohne Bewusstsein keine Schuld. Ohne Schuld keine Verantwortung.
        Algorithmen können fehlerhaft sein, aber nicht schuldig.

    algorithmic_equivalent:
      operation: "KEINE ENTSPRECHUNG MÖGLICH"
      mechanism: |
        Es gibt keine algorithmische Operation, die Verantwortung
        übernehmen kann. Verantwortung erfordert Bewusstsein,
        Freiheit und moralische Agency - alles nicht algorithmisierbar.
      key_difference: |
        MENSCH: "Ich stehe für diese Entscheidung ein und trage die Folgen"
        ALGORITHMUS: [keine sinnvolle Aussage möglich]

        Der Mensch KANN schuldig sein.
        Der Algorithmus kann nur FEHLERHAFT sein.

        Diese Asymmetrie ist fundamental und nicht überbrückbar.

    ebf_implications:
      - "Alle EBF-Empfehlungen müssen von Menschen verantwortet werden"
      - "BEATRIX gibt Vorschläge, Menschen tragen Konsequenzen"
      - "Keine 'AI entscheidet' - immer 'Mensch entscheidet mit Unterstützung'"

    related_concepts: ["HC-002", "HC-003"]

  # -------------------------------------------------------------------------
  # ÜBERFORDERUNG ERLEBEN (Kognitive Grenzen)
  # -------------------------------------------------------------------------
  - id: "HC-008"
    term_de: "Überforderung erleben"
    term_en: "Experiencing Overwhelm"

    definition: |
      Die subjektive Erfahrung, dass etwas "zu kompliziert" ist.
      Ein qualitatives Erleben kognitiver Grenzen, verbunden mit
      Gefühlen wie Frustration, Verwirrung oder Kapitulation.

    why_human_only:
      primary_reason: |
        Überforderung ist ein ERLEBNIS, nicht ein Zustand. Der Mensch
        FÜHLT, dass es zu viel ist. Dies erfordert Bewusstsein und
        Selbstwahrnehmung der eigenen kognitiven Kapazität.
      philosophical_basis: "Bounded Rationality (Simon), Cognitive Load Theory"
      neuroscience_basis: |
        Überforderung aktiviert Stressreaktionen (Cortisol), emotionale
        Zentren (Amygdala) und führt zu subjektivem Unwohlsein.

    counterarguments:
      - argument: "Modelle haben auch Limits (Context Window, Compute)"
        strength: "medium"
        our_response: |
          Das ist keine Überforderung, sondern Ressourcenmangel.
          Der Algorithmus "erlebt" sein Limit nicht - er scheitert
          einfach oder produziert schlechteren Output.

    our_position:
      stance: "EXKLUSIV MENSCHLICH"
      confidence: 0.90
      rationale: |
        Überforderung ist phänomenologisch - sie hat einen "wie es sich
        anfühlt"-Aspekt. Algorithmen haben keine Phänomenologie.

    algorithmic_equivalent:
      operation: "Ressourcenlimit erreichen"
      mechanism: |
        Algorithmus stösst an Compute-, Memory- oder Context-Window-Grenzen.
        Out-of-Memory Error, Timeout, Truncation. Keine Erfahrung,
        nur technisches Scheitern.
      key_difference: |
        MENSCH: "Das ist mir zu kompliziert" (ERLEBNIS)
        ALGORITHMUS: "Error: Context length exceeded" (ZUSTAND)

        Der Mensch FÜHLT die Grenze (Frustration, Stress, Aufgeben).
        Der Algorithmus ERREICHT ein Limit (ohne Erleben).

        Der Mensch kann ENTSCHEIDEN, trotzdem weiterzumachen.
        Der Algorithmus kann das Limit nicht überwinden.

    ebf_implications:
      - "EBF reduziert Komplexität für Menschen (10C-Struktur)"
      - "Algorithmus kann mehr Daten verarbeiten, aber Mensch muss Output verstehen"
      - "Wenn Mensch 'zu kompliziert' sagt → vereinfachen, nicht mehr Daten"

    related_concepts: ["HC-001", "HC-002"]

  # -------------------------------------------------------------------------
  # FÜHLEN (Emotionales Erleben)
  # -------------------------------------------------------------------------
  - id: "HC-009"
    term_de: "Fühlen"
    term_en: "Feeling"

    definition: |
      Das subjektive Erleben von Emotionen - Freude, Trauer, Wut, Angst.
      Qualia der Gefühle, nicht nur physiologische Reaktionen.

    algorithmic_equivalent:
      operation: "Sentiment Classification"
      key_difference: |
        MENSCH: "Ich FÜHLE mich traurig" (Erleben)
        ALGORITHMUS: "Text classified as sentiment: negative, score: 0.87"

  # -------------------------------------------------------------------------
  # WOLLEN (Intentionalität)
  # -------------------------------------------------------------------------
  - id: "HC-010"
    term_de: "Wollen"
    term_en: "Wanting/Desiring"

    definition: |
      Echte Wünsche und Absichten haben. Auf etwas ausgerichtet sein,
      das man erreichen WILL, nicht nur optimieren SOLL.

    algorithmic_equivalent:
      operation: "Objective Function Optimization"
      key_difference: |
        MENSCH: "Ich WILL dieses Projekt zum Erfolg führen" (Intention)
        ALGORITHMUS: "Minimiere Loss-Funktion L(θ)" (keine Intention)

        Der Mensch will etwas FÜR SICH.
        Der Algorithmus optimiert, weil er so programmiert ist.

  # -------------------------------------------------------------------------
  # SCHMERZ EMPFINDEN
  # -------------------------------------------------------------------------
  - id: "HC-011"
    term_de: "Schmerz empfinden"
    term_en: "Experiencing Pain"

    definition: |
      Das subjektive Leidenserleben bei Verletzung oder Verlust.
      Phänomenologisch: Es tut WEH.

    algorithmic_equivalent:
      operation: "Negative Reward Signal"
      key_difference: |
        MENSCH: "Das TUT WEH" (Leiden)
        ALGORITHMUS: "Reward = -1.0" (Signal)

        Der Mensch LEIDET.
        Der Algorithmus REGISTRIERT einen negativen Wert.

  # -------------------------------------------------------------------------
  # FREUDE EMPFINDEN
  # -------------------------------------------------------------------------
  - id: "HC-012"
    term_de: "Freude empfinden"
    term_en: "Experiencing Joy"

    definition: |
      Das subjektive Erleben von Glück, Zufriedenheit, Erfüllung.
      Intrinsisch wertvoll, nicht nur Signal.

    algorithmic_equivalent:
      operation: "Positive Reward Signal"
      key_difference: |
        MENSCH: "Ich bin GLÜCKLICH" (Erleben)
        ALGORITHMUS: "Reward = +1.0" (Signal)

        Menschliche Freude ist Selbstzweck.
        Algorithmisches Reward ist Mittel zur Optimierung.

  # -------------------------------------------------------------------------
  # LIEBEN
  # -------------------------------------------------------------------------
  - id: "HC-013"
    term_de: "Lieben"
    term_en: "Loving"

    definition: |
      Tiefe emotionale Bindung an andere Personen. Bereitschaft,
      für andere zu opfern. Bedingungslose Wertschätzung.

    algorithmic_equivalent:
      operation: "KEINE ENTSPRECHUNG MÖGLICH"
      key_difference: |
        MENSCH: "Ich LIEBE meine Kinder" (Bindung, Opferbereitschaft)
        ALGORITHMUS: [keine sinnvolle Aussage möglich]

        Liebe erfordert ein DU, das man als Subjekt anerkennt.
        Algorithmen können keine Subjekte anerkennen.

  # -------------------------------------------------------------------------
  # TRAUERN
  # -------------------------------------------------------------------------
  - id: "HC-014"
    term_de: "Trauern"
    term_en: "Grieving"

    definition: |
      Der emotionale Prozess der Verlustverarbeitung. Zeit brauchen,
      um Abschied zu nehmen. Transformation durch Schmerz.

    algorithmic_equivalent:
      operation: "KEINE ENTSPRECHUNG MÖGLICH"
      key_difference: |
        MENSCH: "Ich TRAUERE um meinen Vater" (Prozess, Zeit, Transformation)
        ALGORITHMUS: [keine sinnvolle Aussage möglich]

        Trauer erfordert vorherige Liebe und Bindung.
        Ohne Liebe keine Trauer.

  # -------------------------------------------------------------------------
  # HOFFEN
  # -------------------------------------------------------------------------
  - id: "HC-015"
    term_de: "Hoffen"
    term_en: "Hoping"

    definition: |
      Emotionale Zukunftserwartung mit Unsicherheit. Wünschen, dass
      etwas eintritt, ohne Kontrolle darüber zu haben.

    algorithmic_equivalent:
      operation: "Probability Estimation"
      key_difference: |
        MENSCH: "Ich HOFFE, dass es klappt" (emotional, unsicher)
        ALGORITHMUS: "P(success) = 0.73" (numerisch, neutral)

        Der Mensch ist emotional INVESTIERT in das Ergebnis.
        Der Algorithmus berechnet nur eine Zahl.

  # -------------------------------------------------------------------------
  # FÜRCHTEN
  # -------------------------------------------------------------------------
  - id: "HC-016"
    term_de: "Fürchten"
    term_en: "Fearing"

    definition: |
      Emotionales Erleben von Bedrohung. Angst vor möglichen
      negativen Konsequenzen. Körperliche Angstreaktion.

    algorithmic_equivalent:
      operation: "Risk Calculation"
      key_difference: |
        MENSCH: "Ich habe ANGST zu versagen" (Erleben, Körper)
        ALGORITHMUS: "Risk score = 0.82" (Berechnung)

        Der Mensch ERLEBT die Angst (Herzrasen, Schwitzen, Panik).
        Der Algorithmus BERECHNET ein Risiko (ohne Erleben).

  # -------------------------------------------------------------------------
  # STAUNEN
  # -------------------------------------------------------------------------
  - id: "HC-017"
    term_de: "Staunen"
    term_en: "Wondering/Awe"

    definition: |
      Das Erleben von Wunder und Ehrfurcht. Überwältigt sein von
      Schönheit, Komplexität oder Grösse.

    algorithmic_equivalent:
      operation: "Novelty Detection"
      key_difference: |
        MENSCH: "WOW, das ist unglaublich!" (Ehrfurcht)
        ALGORITHMUS: "Novelty score: high, P(x) < 0.001" (Anomalie)

        Der Mensch wird vom Staunen ERGRIFFEN.
        Der Algorithmus DETEKTIERT statistische Ungewöhnlichkeit.

  # -------------------------------------------------------------------------
  # SICH SCHÄMEN
  # -------------------------------------------------------------------------
  - id: "HC-018"
    term_de: "Sich schämen"
    term_en: "Feeling Shame"

    definition: |
      Soziale Selbstbewertungsemotion. Gefühl, vor anderen
      versagt zu haben oder unwürdig zu sein.

    algorithmic_equivalent:
      operation: "KEINE ENTSPRECHUNG MÖGLICH"
      key_difference: |
        MENSCH: "Ich SCHÄME mich für mein Verhalten" (soziale Emotion)
        ALGORITHMUS: [keine sinnvolle Aussage möglich]

        Scham erfordert Selbstkonzept und soziale Identität.
        Algorithmen haben keine Identität, die beschämt werden kann.

  # -------------------------------------------------------------------------
  # STOLZ EMPFINDEN
  # -------------------------------------------------------------------------
  - id: "HC-019"
    term_de: "Stolz empfinden"
    term_en: "Feeling Pride"

    definition: |
      Positive Selbstbewertungsemotion. Gefühl der Erfüllung
      und des Selbstwerts nach Leistung.

    algorithmic_equivalent:
      operation: "KEINE ENTSPRECHUNG MÖGLICH"
      key_difference: |
        MENSCH: "Ich bin STOLZ auf meine Arbeit" (Selbstwert)
        ALGORITHMUS: [keine sinnvolle Aussage möglich]

        Stolz erfordert ein Selbst, das sich bewertet.
        Algorithmen haben kein Selbst.

  # -------------------------------------------------------------------------
  # BEREUEN
  # -------------------------------------------------------------------------
  - id: "HC-020"
    term_de: "Bereuen"
    term_en: "Regretting"

    definition: |
      Retrospektive Emotion über vergangene Entscheidungen.
      Wunsch, anders gehandelt zu haben.

    algorithmic_equivalent:
      operation: "Counterfactual Calculation"
      key_difference: |
        MENSCH: "Ich BEREUE, dass ich das gesagt habe" (Emotion)
        ALGORITHMUS: "Alternative action A' hätte Reward +0.3 höher gehabt"

        Der Mensch LEIDET unter der Vergangenheit.
        Der Algorithmus BERECHNET Alternativen (ohne Leiden).

  # -------------------------------------------------------------------------
  # KREATIV SEIN
  # -------------------------------------------------------------------------
  - id: "HC-021"
    term_de: "Kreativ sein"
    term_en: "Being Creative"

    definition: |
      Echte Neuschöpfung aus Nichts. Etwas hervorbringen, das
      nicht nur Rekombination von Bestehendem ist.

    algorithmic_equivalent:
      operation: "Stochastische Rekombination"
      key_difference: |
        MENSCH: "Mir ist eine NEUE Idee gekommen" (Schöpfung)
        ALGORITHMUS: "Novel combination of existing patterns generated"

        Der Mensch kann AUSSERHALB des Trainingsets denken.
        Der Algorithmus interpoliert IM Trainingset.

  # -------------------------------------------------------------------------
  # SPIELEN
  # -------------------------------------------------------------------------
  - id: "HC-022"
    term_de: "Spielen"
    term_en: "Playing"

    definition: |
      Intrinsisch motivierte Aktivität ohne externen Zweck.
      Freude an der Tätigkeit selbst.

    algorithmic_equivalent:
      operation: "Exploration Policy"
      key_difference: |
        MENSCH: "Ich SPIELE, weil es Spass macht" (intrinsisch)
        ALGORITHMUS: "Exploration mit ε = 0.1 für bessere Rewards" (instrumentell)

        Der Mensch spielt um des Spielens willen.
        Der Algorithmus exploriert um zu optimieren.

  # -------------------------------------------------------------------------
  # TRÄUMEN
  # -------------------------------------------------------------------------
  - id: "HC-023"
    term_de: "Träumen"
    term_en: "Dreaming"

    definition: |
      Unbewusste mentale Aktivität während des Schlafs.
      Verarbeitung von Erfahrungen, Wünschen, Ängsten.

    algorithmic_equivalent:
      operation: "KEINE ENTSPRECHUNG MÖGLICH"
      key_difference: |
        MENSCH: "Ich habe GETRÄUMT, dass..." (unbewusste Verarbeitung)
        ALGORITHMUS: [keine sinnvolle Aussage möglich]

        Träumen erfordert Unbewusstes und Bewusstsein.
        Algorithmen haben weder noch.

  # -------------------------------------------------------------------------
  # INTUITION HABEN
  # -------------------------------------------------------------------------
  - id: "HC-024"
    term_de: "Intuition haben"
    term_en: "Having Intuition"

    definition: |
      Unbewusstes Wissen, das sich als "Bauchgefühl" manifestiert.
      Richtige Einschätzung ohne explizite Begründung.

    algorithmic_equivalent:
      operation: "Pattern ohne Erklärung"
      key_difference: |
        MENSCH: "Ich habe das GEFÜHL, dass etwas nicht stimmt" (Intuition)
        ALGORITHMUS: "Classification: anomaly, confidence: 0.94" (ohne Gefühl)

        Der Mensch SPÜRT etwas (embodied).
        Der Algorithmus KLASSIFIZIERT (disembodied).

  # -------------------------------------------------------------------------
  # EMPATHIE ZEIGEN
  # -------------------------------------------------------------------------
  - id: "HC-025"
    term_de: "Empathie zeigen"
    term_en: "Showing Empathy"

    definition: |
      Mitfühlen mit anderen. Sich in deren Lage versetzen
      und deren Gefühle nachempfinden.

    algorithmic_equivalent:
      operation: "Sentiment Analysis + Response Generation"
      key_difference: |
        MENSCH: "Ich FÜHLE mit dir" (Mitempfinden)
        ALGORITHMUS: "Detected: sad. Generated: empathetic response template"

        Der Mensch FÜHLT den Schmerz des anderen.
        Der Algorithmus ERKENNT Muster und GENERIERT Antwort.

  # -------------------------------------------------------------------------
  # VERTRAUEN
  # -------------------------------------------------------------------------
  - id: "HC-026"
    term_de: "Vertrauen"
    term_en: "Trusting"

    definition: |
      Riskante Hingabe an einen anderen. Sich verletzlich machen
      in der Erwartung, nicht enttäuscht zu werden.

    algorithmic_equivalent:
      operation: "Probability Estimation + Decision"
      key_difference: |
        MENSCH: "Ich VERTRAUE dir" (riskante Hingabe)
        ALGORITHMUS: "P(cooperation) = 0.89 → cooperate" (Kalkulation)

        Der Mensch macht sich VERLETZLICH.
        Der Algorithmus kann nicht verletzt werden.

  # -------------------------------------------------------------------------
  # VERZEIHEN
  # -------------------------------------------------------------------------
  - id: "HC-027"
    term_de: "Verzeihen"
    term_en: "Forgiving"

    definition: |
      Emotionale Auflösung von Groll. Entscheidung, Vergangenes
      nicht mehr gegen jemanden zu halten.

    algorithmic_equivalent:
      operation: "KEINE ENTSPRECHUNG MÖGLICH"
      key_difference: |
        MENSCH: "Ich VERZEIHE dir" (emotionale Transformation)
        ALGORITHMUS: [keine sinnvolle Aussage möglich]

        Verzeihen erfordert vorherige Verletzung und Groll.
        Algorithmen können nicht verletzt werden.

  # -------------------------------------------------------------------------
  # SICH LANGWEILEN
  # -------------------------------------------------------------------------
  - id: "HC-028"
    term_de: "Sich langweilen"
    term_en: "Being Bored"

    definition: |
      Subjektives Erleben von Unterforderung oder Sinnlosigkeit.
      Die Zeit vergeht "zu langsam".

    algorithmic_equivalent:
      operation: "Idle State / Low Activity"
      key_difference: |
        MENSCH: "Mir ist LANGWEILIG" (Erleben, Unzufriedenheit)
        ALGORITHMUS: "Awaiting input..." (Zustand)

        Der Mensch LEIDET unter Langeweile.
        Der Algorithmus WARTET einfach (ohne Erleben).

# =============================================================================
# HYBRIDE: BRAIN-COMPUTER INTERFACES
# =============================================================================

hybrid_systems:
  description: |
    Technologien, die menschliche und algorithmische Fähigkeiten
    verschmelzen. Hier verschwimmen die Grenzen teilweise.

  examples:

    - id: "HYB-001"
      name: "Deep Brain Stimulation (DBS)"
      application: "Depression, Parkinson, OCD"
      mechanism: |
        Elektroden im Gehirn stimulieren spezifische Regionen.
        Bei Depression: Stimulation des Nucleus accumbens oder
        subgenualen Cingulums verändert emotionale Verarbeitung.
      what_remains_human:
        - "Der Patient ERLEBT die verbesserte Stimmung"
        - "Emotionen sind weiterhin SEIN Erleben"
        - "Entscheidung zur Therapie bleibt beim Menschen"
      what_is_algorithmic:
        - "Stimulationsparameter werden optimiert"
        - "Feedback-Loops passen Intensität an"
        - "Muster in neuronaler Aktivität werden erkannt"
      philosophical_status: |
        Der Mensch bleibt Subjekt des Erlebens. Der Algorithmus
        moduliert nur die BEDINGUNGEN des Erlebens, nicht das
        Erleben selbst.

    - id: "HYB-002"
      name: "Brain-Computer Interface (BCI) für Querschnittslähmung"
      application: "Motorische Kontrolle bei Lähmung"
      mechanism: |
        Neuronale Signale werden ausgelesen und in Bewegungsbefehle
        für Prothesen oder Exoskelette übersetzt.
      what_remains_human:
        - "Die INTENTION zu bewegen kommt vom Menschen"
        - "Der Wille, den Arm zu heben, ist menschlich"
        - "Das Erleben des Körpers bleibt beim Menschen"
      what_is_algorithmic:
        - "Dekodierung der neuronalen Signale"
        - "Übersetzung in Motorbefehle"
        - "Kalibrierung und Anpassung"
      philosophical_status: |
        Der Algorithmus ist WERKZEUG für menschliche Intention.
        Wie ein Hammer die Hand verlängert, verlängert das BCI
        den Willen. Die Intention bleibt menschlich.

    - id: "HYB-003"
      name: "Cochlea-Implantat"
      application: "Gehörlosigkeit"
      mechanism: |
        Schall wird in elektrische Signale umgewandelt und direkt
        an den Hörnerv übertragen.
      what_remains_human:
        - "Das ERLEBEN von Klang ist menschlich"
        - "Die Bedeutung von Musik bleibt menschlich"
        - "Emotionale Reaktion auf Stimmen"
      what_is_algorithmic:
        - "Signalverarbeitung (Frequenzzerlegung)"
        - "Kompression und Filterung"
        - "Elektrische Stimulationsmuster"
      philosophical_status: |
        Der Algorithmus übersetzt physikalische in neuronale
        Signale. Das HÖREN - das bewusste Erleben von Klang -
        findet im Menschen statt.

    - id: "HYB-004"
      name: "Retina-Implantat"
      application: "Blindheit"
      mechanism: |
        Kamera nimmt Bilder auf, Chip stimuliert Netzhaut elektrisch.
      what_remains_human:
        - "Das SEHEN - die visuelle Erfahrung"
        - "Erkennen von Gesichtern (mit Training)"
        - "Emotionale Bedeutung des Gesehenen"
      what_is_algorithmic:
        - "Bildverarbeitung"
        - "Kontrastverstärkung"
        - "Stimulationspattern-Generierung"
      philosophical_status: |
        Analogie zum Cochlea-Implantat. Der Algorithmus liefert
        Input, der Mensch hat die visuelle ERFAHRUNG.

    - id: "HYB-005"
      name: "Closed-Loop Insulin Pump"
      application: "Diabetes"
      mechanism: |
        Kontinuierliche Glukosemessung + automatische Insulindosierung.
      what_remains_human:
        - "Entscheidung zur Nutzung"
        - "Erleben von Wohlbefinden"
        - "Override bei Bedarf"
      what_is_algorithmic:
        - "Glukose-Prädiktion"
        - "Dosierungsberechnung"
        - "Feedback-Regelung"
      philosophical_status: |
        Rein physiologische Regelung, keine Bewusstseinsgrenze
        berührt. Wie ein Thermostat für den Körper.

    - id: "HYB-006"
      name: "Neuralink / invasives BCI (zukünftig)"
      application: "Kognitive Erweiterung"
      mechanism: |
        Direkte bidirektionale Kommunikation zwischen Gehirn und
        Computer. Potenziell: Gedächtniserweiterung, schnelleres
        Denken, direkte Informationsübertragung.
      what_remains_human:
        - "Bewusstsein und Erleben"
        - "Moralische Verantwortung"
        - "Identität (fraglich bei extremer Erweiterung)"
      what_is_algorithmic:
        - "Datenverarbeitung ausserhalb des Gehirns"
        - "Speicherung in externen Systemen"
        - "Berechnung komplexer Probleme"
      philosophical_status: |
        OFFENE FRAGE: Ab wann verändert kognitive Erweiterung
        die Identität so stark, dass wir von einem "neuen Wesen"
        sprechen müssen? Ship of Theseus Problem.

  key_insight: |
    Bei allen Hybriden gilt: Der Algorithmus moduliert BEDINGUNGEN
    oder liefert INPUT, aber das ERLEBEN findet im Menschen statt.

    Solange Bewusstsein menschlich bleibt, bleibt auch:
    - Verantwortung menschlich
    - Erleben menschlich
    - Bedeutung menschlich

    Der Algorithmus ist immer WERKZEUG, nie SUBJEKT.

  open_questions:
    - "Ab welchem Grad der Integration verschwimmt die Grenze?"
    - "Wenn 90% der Kognition extern läuft - wer denkt dann?"
    - "Können Hybride moralische Verantwortung teilen?"
    - "Was passiert mit Identität bei gradueller Ersetzung?"

# =============================================================================
# GRENZFÄLLE: WO DIE UNTERSCHEIDUNG VERSCHWIMMT
# =============================================================================

edge_cases:
  description: |
    Szenarien, in denen die klare Trennung Mensch/Algorithmus
    zusammenbricht. Hier liegt das ethische Minenfeld.

  cases:

    # -------------------------------------------------------------------------
    # FALL 1: Chip macht zum Mörder
    # -------------------------------------------------------------------------
    - id: "EDGE-001"
      name: "Chip-induzierte Gewalt"
      scenario: |
        Ein Mensch mit Deep Brain Stimulation oder invasivem BCI
        begeht eine Gewalttat. War es "er" oder "der Chip"?

      variants:

        - variant: "Fehlfunktion"
          description: |
            DBS-Elektrode verrutscht oder Stimulation fehlerhaft.
            Impulskontrollstörung → Patient wird gewalttätig.
          real_cases:
            - "DBS bei Parkinson: Dokumentierte Fälle von Hypersexualität,
               Spielsucht, Aggression nach falscher Einstellung"
            - "Medtronic DBS: Mehrere Klagen wegen Persönlichkeitsveränderung"
          who_is_responsible: |
            HERSTELLER (Produkthaftung) + ARZT (Behandlungsfehler)
            Patient ist OPFER, nicht Täter.
            Analogie: Wenn ein Auto wegen Bremsversagen tötet,
            ist der Fahrer nicht schuld.
          today_possible: true
          our_position: |
            Klar: Bei technischem Versagen liegt Verantwortung beim
            Hersteller/Behandler. Der Patient war nicht "er selbst".

        - variant: "Hack/Fernsteuerung"
          description: |
            BCI wird von aussen gehackt. Jemand übernimmt
            Kontrolle über motorische Befehle → Körper wird zur Waffe.
          real_cases:
            - "Noch nicht dokumentiert, aber: Herzschrittmacher-Hacks
               wurden demonstriert (Barnaby Jack, 2012)"
            - "Insulin-Pumpen-Hacks demonstriert (Black Hat 2011)"
          who_is_responsible: |
            HACKER (Täter) → Vorsätzliche Körperverletzung/Mord
            HERSTELLER (Fahrlässigkeit bei Sicherheitslücken)
            Patient ist OPFER und WERKZEUG.
            Analogie: Jemand lenkt dein Auto fern und überfährt Menschen.
          today_possible: "Theoretisch ja, praktisch noch nicht bei BCI"
          our_position: |
            Klar: Bei Fremdeingriffen ist der Gehackte Opfer.
            ABER: Zukünftige Pflicht zu "gehärteten" Implantaten?

        - variant: "Persönlichkeitsveränderung durch Stimulation"
          description: |
            Korrekt eingestellte DBS verändert Persönlichkeit so stark,
            dass Patient "ein anderer Mensch" wird. Dieser andere Mensch
            begeht Verbrechen, die der "ursprüngliche" nie begangen hätte.
          real_cases:
            - "Leentjens et al. (2004): DBS-Patient verliert Empathie"
            - "Schüpbach et al. (2006): Depressionen, Suizide nach DBS"
            - "Witt et al. (2008): Persönlichkeitsveränderungen bei 8-10%"
          who_is_responsible: |
            SCHWIERIGSTER FALL. Mehrere Positionen:

            Position A: "Es ist immer noch ER"
            → Patient ist verantwortlich, Chip ist nur Einfluss
            → Analogie: Alkohol verändert auch, aber Betrunkener ist schuldig

            Position B: "Es ist NICHT MEHR er"
            → Fundamentale Persönlichkeitsveränderung = neue Person
            → Wer hat die Behandlung gewollt? Der "alte" Patient
            → Kann man den "neuen" für Zustimmung des "alten" bestrafen?

            Position C: "Geteilte Verantwortung"
            → Patient trägt Restverantwortung (wusste um Risiko)
            → Arzt trägt Mitverantwortung (Aufklärungspflicht)
            → Gesellschaft trägt Mitverantwortung (erlaubt Technologie)
          today_possible: true
          our_position: |
            UNGELÖST. Wir neigen zu Position C mit Abstufung:
            - Je grösser die dokumentierte Persönlichkeitsänderung,
              desto geringer die individuelle Schuld
            - ABER: Vollständige Schuldfreiheit nur bei Bewusstseinsverlust
            - Präventiv: Viel strengere Monitoring-Pflichten nötig

        - variant: "Absichtliche Manipulation"
          description: |
            Jemand manipuliert absichtlich die Stimulation eines anderen
            (Arzt, Partner, Staat), um dessen Verhalten zu steuern.
          real_cases:
            - "Noch nicht dokumentiert"
            - "ABER: CIA MK-Ultra experimentierte mit Gehirnkontrolle (1950er)"
          who_is_responsible: |
            MANIPULATOR ist Täter (ggf. Anstifter zum Mord)
            Patient ist WERKZEUG
            Analogie: Hypnose-Verteidigung (umstritten aber anerkannt)
          today_possible: "Technisch beginnend möglich"
          our_position: |
            Klar: Wer absichtlich manipuliert, ist Täter.
            Der Manipulierte ist nicht schuldfähig.
            GEFAHR: Autoritäre Regime könnten dies nutzen.

    # -------------------------------------------------------------------------
    # FALL 2: Algorithmus "entscheidet" über Leben und Tod
    # -------------------------------------------------------------------------
    - id: "EDGE-002"
      name: "Autonome tödliche Entscheidung"
      scenario: |
        Ein Algorithmus trifft eine Entscheidung, die zum Tod führt,
        ohne dass ein Mensch eingreift.

      variants:

        - variant: "Autonomes Fahrzeug"
          description: |
            Tesla/Waymo entscheidet in Sekundenbruchteilen:
            Ausweichen → Fussgänger stirbt
            Nicht ausweichen → Insasse stirbt
          real_cases:
            - "Uber ATG Unfall (2018): Elaine Herzberg getötet"
            - "Tesla Autopilot: Mehrere tödliche Unfälle dokumentiert"
          who_is_responsible: |
            HERSTELLER (Produkthaftung) + FAHRER (Überwachungspflicht)
            Algorithmus ist WERKZEUG, kein Subjekt.
            Keine "Entscheidung" im moralischen Sinne.
          today_possible: true
          our_position: |
            Algorithmus kann nicht verantwortlich sein.
            Verantwortung liegt bei Menschen, die ihn entwickeln,
            einsetzen und überwachen (sollten).

        - variant: "Medizinische Triage-KI"
          description: |
            Algorithmus entscheidet, wer das Beatmungsgerät bekommt.
            Patient A stirbt, weil Algorithmus Patient B priorisierte.
          real_cases:
            - "COVID-19: Mehrere Länder nutzten Scoring-Systeme"
            - "Kontroverse um UK NHS COVID Triage Algorithmus"
          who_is_responsible: |
            ENTWICKLER (Kriterien festgelegt)
            KRANKENHAUS (Algorithmus eingesetzt)
            LETZTE INSTANZ sollte immer ARZT sein.
          today_possible: true
          our_position: |
            Algorithmus kann Entscheidungshilfe sein, aber:
            Ein MENSCH muss finale Triage-Entscheidung tragen.
            "Der Computer hat entschieden" ist keine Entschuldigung.

        - variant: "Autonome Waffensysteme (LAWS)"
          description: |
            Drohne identifiziert und eliminiert Ziel ohne menschliche
            Bestätigung ("Fire and Forget", "Killer Robots").
          real_cases:
            - "Kargu-2 (Türkei): Angeblich erster autonomer Drohnenkill (2020)"
            - "SGR-A1 (Südkorea): Autonome DMZ-Wachroboter"
          who_is_responsible: |
            GRÖSSTES ETHISCHES PROBLEM UNSERER ZEIT.

            Position A: Kommandeur, der Einsatz befohlen hat
            Position B: Entwickler/Hersteller
            Position C: Staat, der System erlaubt
            Position D: NIEMAND (unakzeptabel!)
          today_possible: true
          our_position: |
            ABSOLUT GEGEN autonome tödliche Entscheidungen.
            "Human in the Loop" MUSS bei tödlicher Gewalt sein.
            Technisch möglich ≠ ethisch erlaubt.

    # -------------------------------------------------------------------------
    # FALL 3: Graduelle Identitätsverschiebung
    # -------------------------------------------------------------------------
    - id: "EDGE-003"
      name: "Ship of Theseus - Kognitive Version"
      scenario: |
        Schrittweise Ersetzung kognitiver Funktionen durch Implantate.
        Ab wann ist es nicht mehr "dieselbe Person"?

      progression:
        - step: 1
          replacement: "Cochlea-Implantat (Hören)"
          identity_impact: "Minimal - nur sensorischer Input"
          responsible: "Klar: Die Person"

        - step: 2
          replacement: "Hippocampus-Prothese (Gedächtnis)"
          identity_impact: |
            Mittel - Erinnerungen sind identitätsstiftend.
            ABER: Wenn "ich" mich nicht erinnere, bin "ich" das noch?
          responsible: "Wird schwieriger"

        - step: 3
          replacement: "Präfrontaler Cortex-Chip (Entscheidung)"
          identity_impact: |
            Hoch - Entscheidungen machen Charakter aus.
            Wenn Chip entscheidet, wer "will" dann?
          responsible: "Sehr unklar"

        - step: 4
          replacement: "Vollständiges Upload (theoretisch)"
          identity_impact: |
            Total - Ist das noch "ich" oder eine Kopie?
            Wenn Original stirbt und Kopie weiterlebt?
          responsible: "Philosophisch unlösbar"

      our_position: |
        Kontinuität des BEWUSSTSEINS ist Schlüssel:
        - Solange subjektives Erleben kontinuierlich bleibt: Dieselbe Person
        - Bei Unterbrechung (Upload, Kopie): Neue Person
        - ABER: Wie misst man Bewusstseins-Kontinuität?

        PRAKTISCH für EBF:
        - Wir arbeiten mit Menschen, wie sie HEUTE sind
        - Hybride Erweiterungen verstärken, ersetzen nicht
        - Verantwortung bleibt beim bewussten Subjekt

  legal_implications:
    existing_framework:
      description: |
        Es gibt bereits ein rechtliches Konzept, das anwendbar sein könnte:
        UNZURECHNUNGSFÄHIGKEIT (Schuldunfähigkeit)

      germany_stgb_20: |
        § 20 StGB: "Ohne Schuld handelt, wer bei Begehung der Tat wegen
        einer krankhaften seelischen Störung, wegen einer tiefgreifenden
        Bewußtseinsstörung oder wegen einer Intelligenzminderung oder einer
        schweren anderen seelischen Störung unfähig ist, das Unrecht der
        Tat einzusehen oder nach dieser Einsicht zu handeln."

      switzerland_stgb_19: |
        Art. 19 StGB: "War der Täter zur Zeit der Tat nicht fähig, das
        Unrecht seiner Tat einzusehen oder gemäss dieser Einsicht zu handeln,
        so ist er nicht strafbar."

      austria_stgb_11: |
        § 11 StGB: "Wer zur Zeit der Tat wegen einer Geisteskrankheit,
        wegen Schwachsinns, wegen einer tiefgreifenden Bewußtseinsstörung
        oder wegen einer anderen schweren, einem dieser Zustände
        gleichwertigen seelischen Störung unfähig ist, das Unrecht
        seiner Tat einzusehen oder nach dieser Einsicht zu handeln,
        handelt nicht schuldhaft."

      application_to_chips:
        question: "Ist ein fehlerhafter/manipulierter Chip eine 'seelische Störung'?"

        arguments_for:
          - "Chip verändert neuronale Prozesse → funktional wie Störung"
          - "Patient kann Unrecht nicht einsehen (Impulskontrolle gestört)"
          - "Patient kann nicht nach Einsicht handeln (motorische Kontrolle übernommen)"
          - "Analogie zu Epilepsie, Tumor, Intoxikation bereits anerkannt"

        arguments_against:
          - "Chip ist externe Technologie, nicht 'seelisch'"
          - "Patient hat Implantation gewählt (informed consent)"
          - "Gesetzgeber hatte Technologie nicht im Sinn"

        our_analysis: |
          Die bestehenden Gesetze sind AUSLEGUNGSFÄHIG:

          1. "Tiefgreifende Bewusstseinsstörung" - PASST bei Hack/Fehlfunktion
             → Wenn Chip Bewusstsein verändert, ist Bewusstsein gestört

          2. "Andere schwere seelische Störung" - PASST bei Persönlichkeitsänderung
             → Wenn Chip Persönlichkeit verändert, ist das eine Störung

          3. ABER: Gerichte müssten dies erst anerkennen
             → Präzedenzfälle fehlen noch
             → Gutachter müssten sich einigen

          EMPFEHLUNG: Gesetzliche Klarstellung wäre besser als Auslegung
          → Neue Kategorie: "Technologisch induzierte Schuldunfähigkeit"

      verminderte_schuldfaehigkeit:
        description: |
          Zusätzlich gibt es § 21 StGB (DE) / Art. 19 Abs. 2 (CH):
          VERMINDERTE Schuldfähigkeit → Strafmilderung

          Dies könnte für den "Graubereich" gelten:
          - Chip beeinflusst, aber kontrolliert nicht vollständig
          - Persönlichkeit verändert, aber nicht vollständig
          - Patient hätte vielleicht widerstehen können

        application: |
          STUFENMODELL möglich:

          Stufe 1: Chip hat keinen Einfluss → Volle Schuld
          Stufe 2: Chip beeinflusst leicht → Volle Schuld (wie Müdigkeit, Stress)
          Stufe 3: Chip beeinflusst erheblich → Verminderte Schuld (§ 21)
          Stufe 4: Chip kontrolliert → Schuldunfähigkeit (§ 20)
          Stufe 5: Chip wird ferngesteuert → Patient ist OPFER, Hacker ist Täter

    current_law: |
      Geltendes Recht ist ANPASSBAR, aber nicht VORBEREITET.
      - Unzurechnungsfähigkeit existiert, muss aber auf Technologie ausgedehnt werden
      - Produkthaftung greift bei Geräten, aber nicht bei Persönlichkeit
      - Strafrechtliche Verantwortung des Herstellers bei Fehlfunktion unklar

    needed_updates:
      - "Neue Kategorie: 'Technologisch verminderte Schuldfähigkeit'"
      - "Verpflichtende Versicherung für Neuroimplantate"
      - "Haftungsketten: Hersteller → Arzt → Patient"
      - "Recht auf 'kognitive Freiheit' und 'mentale Integrität'"
      - "Internationale Ächtung autonomer Waffensysteme"

    human_judgment_remains_key:
      insight: |
        AUCH bei der Anwendung der Unzurechnungsfähigkeit entscheidet
        MENSCHLICHE INTUITION - nicht ein Algorithmus!

        Der Richter URTEILT (HC-002).
        Der Gutachter nutzt INTUITION (HC-024).
        Die Gesellschaft BEWERTET nach WERTEN.

        Es gibt keinen "Schuldfähigkeits-Algorithmus".
        Jeder Fall ist INDIVIDUELL und erfordert menschliches Ermessen.

      why_no_algorithm_possible:
        - "Schuldfähigkeit ist keine binäre Variable"
        - "Kontext ist unendlich komplex"
        - "Gerechtigkeitsempfinden ist kulturell geprägt"
        - "Präzedenzfälle müssen interpretiert werden"
        - "Neue Technologien erfordern neue Urteile"

      implication: |
        Selbst wenn wir Chips im Kopf haben und Algorithmen überall sind:
        Die LETZTE INSTANZ bleibt menschliche Urteilskraft.

        Das ist keine Schwäche, sondern DESIGN.
        Verantwortung kann nicht an Maschinen delegiert werden.

    references:
      - "Ienca & Andorno (2017): 'Towards new human rights in the age of neuroscience'"
      - "Bublitz & Merkel (2014): 'Crimes Against Minds'"
      - "UNESCO (2021): 'Recommendation on the Ethics of AI'"

# =============================================================================
# DIE 6 STUFEN DER AUTOMATISIERUNG (SAE J3016 - Wissenschaftlicher Standard)
# =============================================================================

automation_levels:
  description: |
    Die 6 Stufen der Automatisierung (Level 0-5) sind ein WISSENSCHAFTLICH
    ENTWICKELTER Standard, der international anerkannt ist.

    Ursprünglich für autonomes Fahren entwickelt, aber konzeptionell
    übertragbar auf alle Mensch-Maschine-Interaktionen.

  scientific_source:
    standard: "SAE J3016"
    full_title: "Taxonomy and Definitions for Terms Related to Driving Automation Systems for On-Road Motor Vehicles"
    organization: "SAE International (Society of Automotive Engineers)"
    first_published: 2014
    current_version: "SAE J3016_202104 (April 2021)"
    doi: "https://doi.org/10.4271/J3016_202104"
    recognition:
      - "UNECE (UN Economic Commission for Europe)"
      - "US Department of Transportation (NHTSA)"
      - "EU Commission (Automated Vehicles)"
      - "ISO TC 22 (Road Vehicles)"
      - "Akademische Literatur (>10.000 Zitationen)"

    why_this_standard:
      - "Entwickelt durch interdisziplinäre Expertengruppen"
      - "Iterativ verbessert seit 2014 (5 Revisionen)"
      - "Empirisch validiert durch Industrie und Regulatoren"
      - "Klare Verantwortungszuweisung pro Level"
      - "Technologieneutral (nicht an spezifische Implementierung gebunden)"

  ebf_adaptation: |
    EBF übernimmt die SAE J3016-Klassifikation und erweitert sie für
    Entscheidungsunterstützungssysteme (nicht nur Fahrzeuge).

    Die Kernlogik bleibt identisch:
    - Level definiert durch: Wer überwacht? Wer entscheidet? Wer haftet?
    - Höheres Level = mehr Maschinenautonomie = weniger menschliche Kontrolle

  scientific_development_process:
    method: |
      SAE J3016 wurde durch einen systematischen Entwicklungsprozess erstellt:

      1. EXPERTENGREMIUM (2013-2014)
         - Ingenieure, Juristen, Ethiker, Regulatoren
         - Automobilhersteller, Tech-Unternehmen, Behörden
         - Internationaler Konsens notwendig

      2. BEGRIFFSDEFINITION
         - Klare Abgrenzung jedes Levels
         - Operationalisierbare Kriterien
         - Eindeutige Verantwortungszuweisung

      3. ÖFFENTLICHE KONSULTATION
         - Draft-Versionen öffentlich diskutiert
         - Feedback aus Industrie, Akademie, Zivilgesellschaft
         - Iterative Verbesserung

      4. EMPIRISCHE VALIDIERUNG
         - Anwendung auf reale Systeme (Tesla, Waymo, etc.)
         - Fallstudien bei Unfällen (Uber Tempe 2018)
         - Regulatorische Implementierung (NHTSA, UNECE)

      5. KONTINUIERLICHE REVISION
         - 2014: Erstversion
         - 2016: Revision (Klarstellungen)
         - 2018: Revision (Fallback-Definitionen)
         - 2021: Aktuelle Version (DDT, OEDR)

    key_concepts:
      DDT: "Dynamic Driving Task - Was muss getan werden?"
      OEDR: "Object and Event Detection and Response - Wer reagiert?"
      Fallback: "Wer übernimmt bei Systemversagen?"
      ODD: "Operational Design Domain - Wo funktioniert das System?"

    why_levels_not_arbitrary: |
      Die 6 Levels sind NICHT willkürlich gewählt:

      Level 0-1-2: Mensch ist primär verantwortlich (überwacht, entscheidet)
      Level 3: Kritischer Übergangspunkt (geteilte Verantwortung)
      Level 4-5: Maschine ist primär verantwortlich (in definiertem Bereich)

      Diese Struktur folgt aus der fundamentalen Frage:
      "Wer muss AUFMERKSAM sein und EINGREIFEN können?"

      - Level 0-2: Mensch muss immer aufmerksam sein
      - Level 3: Mensch muss bereit sein, übernommen zu werden
      - Level 4: Mensch kann sich zurücklehnen (im ODD)
      - Level 5: Mensch ist Passagier, nicht Operator

  levels:

    - level: 0
      name: "Keine Automatisierung"
      sae_name: "No Automation"
      description: "Mensch tut alles. Maschine ist passives Werkzeug."
      examples:
        - "Manuelle Schreibmaschine"
        - "Taschenrechner (führt aus, entscheidet nicht)"
        - "Nicht-elektronisches Auto"
      responsibility: "100% Mensch"
      ebf_mapping: "Pre-Prompting Ära"

    - level: 1
      name: "Assistenz"
      sae_name: "Driver Assistance"
      description: |
        Maschine unterstützt EINE Funktion.
        Mensch überwacht und kontrolliert alles andere.
      examples:
        - "Tempomat (nur Geschwindigkeit)"
        - "Rechtschreibprüfung (nur Orthographie)"
        - "Einfache Chatbots (FAQ-Antworten)"
      responsibility: "95% Mensch, 5% Maschine (Ausführung)"
      ebf_mapping: "Frühe Prompting Ära"

    - level: 2
      name: "Teilautomatisierung"
      sae_name: "Partial Automation"
      description: |
        Maschine kontrolliert MEHRERE Funktionen gleichzeitig.
        Mensch muss jederzeit eingreifen können.
      examples:
        - "Tesla Autopilot (Lenken + Bremsen)"
        - "LLM mit Kontext (generiert, aber Mensch prüft)"
        - "BEATRIX (strukturiert, aber Consultant entscheidet)"
      responsibility: "80% Mensch, 20% Maschine"
      ebf_mapping: "BEATRIX ist hier - Post-Prompting, aber Human in the Loop"

    - level: 3
      name: "Bedingte Automatisierung"
      sae_name: "Conditional Automation"
      description: |
        Maschine übernimmt in DEFINIERTEN SITUATIONEN vollständig.
        Mensch muss bei Anforderung übernehmen können.
      examples:
        - "Autobahnpilot (nur Autobahn, Mensch übernimmt bei Ausfahrt)"
        - "Radiologie-KI (erkennt Standard-Befunde, Arzt bei Unklarheit)"
        - "Automatisierte Compliance-Prüfung"
      responsibility: "50% Mensch, 50% Maschine (situationsabhängig)"
      risk: "Übergabe-Problem: Mensch ist nicht mehr aufmerksam"
      ebf_mapping: "Nicht für BEATRIX vorgesehen"

    - level: 4
      name: "Hohe Automatisierung"
      sae_name: "High Automation"
      description: |
        Maschine übernimmt in ALLEN DEFINIERTEN SITUATIONEN.
        Mensch kann eingreifen, muss aber nicht.
      examples:
        - "Robotaxi in geofenced Bereich"
        - "Vollautomatische Fabrik"
        - "Algorithmischer Handel (mit Notbremse)"
      responsibility: "20% Mensch (Oversight), 80% Maschine"
      risk: "Mensch verliert Kompetenz durch Nicht-Nutzung"
      ebf_mapping: "NICHT für menschliche Entscheidungen geeignet"

    - level: 5
      name: "Vollautomatisierung"
      sae_name: "Full Automation"
      description: |
        Maschine übernimmt ALLES in ALLEN SITUATIONEN.
        Kein menschliches Eingreifen vorgesehen oder möglich.
      examples:
        - "Theoretisches vollautonomes Fahrzeug überall"
        - "Autonome Waffensysteme (LAWS)"
        - "AGI (hypothetisch)"
      responsibility: "0% Mensch, 100% Maschine"
      risk: |
        MAXIMALES RISIKO:
        - Keine Verantwortlichkeit zuweisbar
        - Keine Korrekturmöglichkeit
        - "Alignment Problem"
      ebf_mapping: "ABGELEHNT für alle EBF-Anwendungen"

  ebf_position:
    chosen_level: 2
    rationale: |
      BEATRIX operiert auf Level 2: Teilautomatisierung

      - Algorithmus strukturiert (10C Framework)
      - Algorithmus schlägt vor (Interventionen)
      - Algorithmus berechnet (Szenarien)

      ABER:
      - Mensch liefert Input (Domain-Wissen)
      - Mensch korrigiert (Iteration)
      - Mensch entscheidet (Verantwortung)
      - Mensch verantwortet (Konsequenzen)

    why_not_higher:
      - "Level 3+: Übergabe-Problem - Consultant verliert Aufmerksamkeit"
      - "Level 4+: Kompetenz-Erosion - Consultant verlernt Urteilskraft"
      - "Level 5: Verantwortungs-Vakuum - Niemand ist schuld"

    principle: |
      Je wichtiger die Entscheidung, desto niedriger das Automatisierungs-Level.

      Tödliche Gewalt (LAWS): Level 0-1 (nur Assistenz, Mensch schiesst)
      Medizinische Triage: Level 1-2 (Vorschläge, Arzt entscheidet)
      Beratung (BEATRIX): Level 2 (Struktur + Vorschläge, Consultant entscheidet)
      Spam-Filter: Level 4-5 akzeptabel (niedrige Stakes)

  connection_to_taxonomy:
    insight: |
      Die Automatisierungs-Level korrelieren mit der Mensch-Maschine-Taxonomie:

      Level 0-2: Menschliche Fähigkeiten (HC-*) dominant
      Level 3: Übergangszone - kritischer Punkt
      Level 4-5: Algorithmische Operationen (AO-*) dominant

      PROBLEM bei Level 4-5:
      - Wer WEISS? → Niemand (HC-001 nicht vorhanden)
      - Wer URTEILT? → Niemand (HC-002 nicht vorhanden)
      - Wer VERANTWORTET? → Niemand (HC-007 nicht vorhanden)

      → Level 4-5 sind nur akzeptabel für Entscheidungen,
         bei denen KEINE dieser Fähigkeiten nötig ist.

  ebf_position:
    summary: |
      EBF-Position zu Hybriden und Grenzfällen:

      1. VERANTWORTUNG BLEIBT MENSCHLICH
         Solange Bewusstsein menschlich ist, ist Verantwortung menschlich.
         Technologie kann Verantwortung nicht übernehmen.

      2. WERKZEUG, NICHT SUBJEKT
         Jeder Algorithmus - auch im Gehirn - ist Werkzeug.
         Werkzeuge haben keine Moral, Menschen schon.

      3. VORSICHTSPRINZIP
         Bei Unklarheit: Mehr Kontrolle, nicht weniger.
         "Human in the Loop" für alle kritischen Entscheidungen.

      4. TRANSPARENZPFLICHT
         Jeder muss wissen, wenn Algorithmen seine Entscheidungen
         beeinflussen - ob extern (Empfehlungssysteme) oder
         intern (Implantate).

      5. GRADUELLE VERANTWORTUNG
         Je stärker der technologische Einfluss dokumentiert ist,
         desto mehr Verantwortung verschiebt sich zu Herstellern/Betreibern.
         ABER: Nie vollständige Entlastung des Individuums (ausser
         bei totalem Kontrollverlust wie Hack/Fernsteuerung).

    beatrix_implication: |
      BEATRIX ist KEIN Implantat, sondern externes Werkzeug.
      Der Consultant bleibt vollständig verantwortlich für alle
      Empfehlungen, die mit BEATRIX-Unterstützung erstellt werden.

      "BEATRIX hat das vorgeschlagen" ist KEINE Entschuldigung.
      "Ich habe entschieden, BEATRIX' Vorschlag zu folgen" - DAS
      ist die korrekte Formulierung.

# =============================================================================
# ALGORITHMISCHE OPERATIONEN (Was Algorithmen TUN)
# =============================================================================

algorithmic_operations:

  # -------------------------------------------------------------------------
  # SEQUENZIEREN (Fragen-Reihenfolge bestimmen)
  # -------------------------------------------------------------------------
  - id: "AO-001"
    term_de: "Sequenzieren"
    term_en: "Sequencing"

    definition: |
      Die Bestimmung der optimalen Reihenfolge von Fragen oder Schritten
      basierend auf definierten Kriterien (Informationsgewinn, Abhängigkeiten,
      Effizienz).

    what_algorithm_does:
      mechanism: |
        Traversierung eines Entscheidungsbaums oder Graphen nach
        vordefinierten Regeln. Bei BEATRIX: 10C-Framework gibt Struktur,
        Algorithmus bestimmt Reihenfolge basierend auf bisherigen Antworten.
      technical_implementation: "Decision Trees, State Machines, Workflow Engines"

    why_now_possible:
      - "Grosse Kontextfenster erlauben komplexe Zustandsverfolgung"
      - "LLMs können natürlichsprachliche Übergänge generieren"
      - "Strukturierte Datenbanken (EBF) liefern die Wissensbasis"

    what_it_is_not:
      - "Kein 'Verstehen' warum diese Reihenfolge sinnvoll ist"
      - "Kein 'Wollen' eine bestimmte Reihenfolge"
      - "Keine 'Intuition' für den richtigen nächsten Schritt"

    ebf_implementation:
      how_used: "BEATRIX führt durch 10C-Dimensionen in optimierter Reihenfolge"
      human_role: "Mensch validiert, ob Reihenfolge für Kontext passt"

    related_operations: ["AO-002", "AO-003"]

  # -------------------------------------------------------------------------
  # SPEICHERN (Daten ablegen und abrufen)
  # -------------------------------------------------------------------------
  - id: "AO-002"
    term_de: "Speichern"
    term_en: "Storing"

    definition: |
      Das strukturierte Ablegen von Daten in persistenten Systemen
      (Datenbanken, Dateisystemen, Vektorstores) und deren Abruf
      bei Bedarf.

    what_algorithm_does:
      mechanism: |
        Write/Read-Operationen auf Speichermedien. Bei Vektorstores:
        Embedding-Berechnung und Similarity Search. Keine Interpretation
        der Bedeutung, nur syntaktische Operationen.
      technical_implementation: "YAML/JSON Dateien, PostgreSQL, Pinecone, Weaviate"

    why_now_possible:
      - "Günstige Speicherkosten erlauben massive Datenmengen"
      - "Embedding-Modelle ermöglichen semantische Ähnlichkeitssuche"
      - "Cloud-Infrastruktur macht Skalierung trivial"

    what_it_is_not:
      - "Kein 'Erinnern' im menschlichen Sinne"
      - "Keine emotionale Priorisierung"
      - "Keine Bedeutungszuweisung"

    ebf_implementation:
      how_used: |
        - case-registry.yaml speichert Cases
        - model-registry.yaml speichert Modelle
        - bcm_master.bib speichert Papers
        - Alle mit menschlich definierten Strukturen
      human_role: "Mensch entscheidet WAS gespeichert wird und WARUM es relevant ist"

    related_operations: ["AO-001", "AO-003"]

  # -------------------------------------------------------------------------
  # KORRELIEREN (Statistische Zusammenhänge berechnen)
  # -------------------------------------------------------------------------
  - id: "AO-003"
    term_de: "Korrelieren"
    term_en: "Correlating"

    definition: |
      Die Berechnung statistischer Zusammenhänge zwischen Variablen.
      Identifikation von Mustern, Kovarianz, Regressionskoeffizienten.

    what_algorithm_does:
      mechanism: |
        Mathematische Operationen auf numerischen Daten. Bei LLMs:
        Attention-Gewichte repräsentieren Token-Korrelationen.
        Keine Kausalität, nur Assoziation.
      technical_implementation: "Pearson/Spearman, Regression, Attention Mechanisms"

    why_now_possible:
      - "GPU-Beschleunigung für massive Matrixoperationen"
      - "Transformer-Architektur für effiziente Korrelationsberechnung"
      - "Grosse Datensätze für robuste Schätzungen"

    what_it_is_not:
      - "Kein 'Verstehen' des Zusammenhangs"
      - "Keine Kausalität (Correlation ≠ Causation)"
      - "Kein 'Wissen' WARUM Variablen zusammenhängen"

    ebf_implementation:
      how_used: |
        - LLMMC berechnet Parameter-Korrelationen
        - Sensitivitätsanalysen zeigen Einflussfaktoren
        - Aber: Mensch interpretiert kausale Richtung
      human_role: "Mensch unterscheidet Korrelation von Kausalität"

    related_operations: ["AO-004", "AO-005"]

  # -------------------------------------------------------------------------
  # VORSCHLAGEN (Änderungsoptionen generieren)
  # -------------------------------------------------------------------------
  - id: "AO-004"
    term_de: "Vorschlagen"
    term_en: "Suggesting"

    definition: |
      Die Generierung von Optionen oder Empfehlungen basierend auf
      Mustern in Trainingsdaten und aktuellem Kontext.

    what_algorithm_does:
      mechanism: |
        Bedingte Wahrscheinlichkeitsverteilung über mögliche nächste
        Tokens/Aktionen. Bei BEATRIX: Intervention-Vorschläge basierend
        auf 10C-Analyse und Case-Ähnlichkeit.
      technical_implementation: "Autoregressive Generation, Recommendation Systems"

    why_now_possible:
      - "LLMs können kontextabhängige Vorschläge in natürlicher Sprache generieren"
      - "RAG ermöglicht evidenzbasierte Vorschläge"
      - "Strukturierte Frameworks (10C) kanalisieren Vorschläge sinnvoll"

    what_it_is_not:
      - "Keine 'Empfehlung' im Sinne persönlicher Überzeugung"
      - "Kein 'Rat' mit Verantwortungsübernahme"
      - "Kein 'Wollen', dass der Vorschlag angenommen wird"

    ebf_implementation:
      how_used: |
        - Algorithmus generiert Interventions-Vorschläge
        - Basierend auf 10C-Mapping und historischen Cases
        - Aber: Kein "Glauben", dass Vorschlag richtig ist
      human_role: "Mensch wählt aus, passt an, übernimmt Verantwortung"

    related_operations: ["AO-003", "AO-005"]

  # -------------------------------------------------------------------------
  # GENERIEREN (Text/Bilder/Code erzeugen)
  # -------------------------------------------------------------------------
  - id: "AO-005"
    term_de: "Generieren"
    term_en: "Generating"

    definition: |
      Die Erzeugung neuer Inhalte (Text, Bilder, Code) durch stochastische
      Sampling-Prozesse über gelernte Wahrscheinlichkeitsverteilungen.

    what_algorithm_does:
      mechanism: |
        Autoregressive Token-Vorhersage (Text), Diffusion (Bilder),
        oder andere generative Prozesse. Interpolation im Latent Space
        der Trainingsdaten.
      technical_implementation: "GPT, Diffusion Models, VAEs, GANs"

    why_now_possible:
      - "Skalierung (Compute, Daten, Parameter) ermöglicht Qualitätssprung"
      - "Transformer-Architektur für lange Kohärenz"
      - "RLHF für menschenähnlicheren Output"

    what_it_is_not:
      - "Kein 'Kreieren' mit Intention"
      - "Kein 'Ausdrücken' von Gedanken (keine Gedanken vorhanden)"
      - "Kein 'Schreiben' als Kommunikationsakt"

    ebf_implementation:
      how_used: |
        - Reports werden generiert
        - Formulierungen für Interventionen
        - Aber: Inhaltliche Korrektheit vom Menschen geprüft
      human_role: "Mensch validiert Inhalt, Algorithmus erleichtert Formulierung"

    related_operations: ["AO-004", "AO-006"]

  # -------------------------------------------------------------------------
  # MUSTER ERKENNEN (Pattern Matching)
  # -------------------------------------------------------------------------
  - id: "AO-006"
    term_de: "Muster erkennen"
    term_en: "Pattern Matching"

    definition: |
      Die Identifikation von wiederkehrenden Strukturen in Daten durch
      statistische Methoden oder neuronale Netzwerke.

    what_algorithm_does:
      mechanism: |
        Feature-Extraktion und Vergleich mit gelernten Repräsentationen.
        Bei LLMs: Attention über Token-Sequenzen findet ähnliche Kontexte
        im impliziten Wissen.
      technical_implementation: "CNNs, Transformers, Template Matching"

    why_now_possible:
      - "Deep Learning extrahiert hierarchische Features automatisch"
      - "Grosse Modelle erfassen subtile Muster"
      - "Transfer Learning nutzt Muster über Domänen hinweg"

    what_it_is_not:
      - "Kein 'Verstehen' des Musters"
      - "Kein 'Erkennen' im phänomenologischen Sinne"
      - "Keine 'Einsicht' in die Bedeutung des Musters"

    ebf_implementation:
      how_used: |
        - Case-Ähnlichkeit über 10C-Dimensionen
        - Theorie-Matching für Modellauswahl
        - Aber: Mensch validiert, ob Muster relevant ist
      human_role: "Mensch interpretiert Muster-Bedeutung für Kontext"

    related_operations: ["AO-003", "AO-005"]

# =============================================================================
# WARUM ERST JETZT MÖGLICH?
# =============================================================================

technological_enablers:

  - id: "TE-001"
    enabler: "Transformer-Architektur (2017)"
    impact: |
      Attention-Mechanismus erlaubt effiziente Verarbeitung langer
      Sequenzen mit O(n²) statt O(n³). Ermöglicht kontextbewusste
      Generierung über tausende Tokens.

  - id: "TE-002"
    enabler: "Skalierungsgesetze (2020)"
    impact: |
      Empirische Erkenntnis, dass Modellqualität mit Compute, Daten
      und Parametern skaliert. Rechtfertigt massive Investitionen.

  - id: "TE-003"
    enabler: "RLHF (2022)"
    impact: |
      Alignment durch menschliches Feedback. Macht Outputs nützlicher
      und sicherer. Reduziert offensichtliche Fehler.

  - id: "TE-004"
    enabler: "Cloud-GPU-Infrastruktur"
    impact: |
      Demokratisiert Zugang zu Compute. Kleine Teams können grosse
      Modelle nutzen (API) oder fine-tunen.

  - id: "TE-005"
    enabler: "Strukturierte Frameworks (EBF)"
    impact: |
      Algorithmische Operationen werden erst nützlich, wenn sie in
      menschlich definierte Strukturen eingebettet sind. Das 10C-Framework
      gibt dem Algorithmus einen sinnvollen Handlungsraum.

# =============================================================================
# DIE DREI ÄREN
# =============================================================================

three_eras:

  pre_prompting:
    name: "Pre-Prompting Ära"
    period: "bis ~2020"
    characteristics:
      - "Mensch tut alles"
      - "Computer als Werkzeug (Textverarbeitung, Tabellenkalkulation)"
      - "Keine natürlichsprachliche Interaktion mit Maschinen"
      - "Experten schreiben Code, Laien nutzen GUIs"
    human_role: "Vollständige Kontrolle und Ausführung"
    machine_role: "Passives Werkzeug, führt Befehle aus"

  prompting:
    name: "Prompting Ära"
    period: "~2020-2025"
    characteristics:
      - "Mensch fragt, Maschine antwortet"
      - "Prompt Engineering als neue Fähigkeit"
      - "ChatGPT-Paradigma: Frage → Antwort"
      - "Mensch muss wissen, was er fragen will"
    human_role: "Fragt, evaluiert Antworten, iteriert"
    machine_role: "Reagiert auf Prompts, generiert Antworten"
    limitation: "Qualität abhängig von Prompt-Qualität des Menschen"

  post_prompting:
    name: "Post-Prompting Ära"
    period: "ab ~2025"
    characteristics:
      - "Algorithmus führt durch Fragen"
      - "Mensch liefert Information und korrigiert"
      - "Strukturierte Frameworks (10C) geben Gesprächsstruktur"
      - "Weniger Abhängigkeit von Prompt-Engineering-Skills"
    human_role: "Informiert, korrigiert, entscheidet, verantwortet"
    machine_role: "Strukturiert Dialog, speichert, korreliert, schlägt vor"
    ebf_position: |
      BEATRIX ist ein Post-Prompting-System. Der Algorithmus führt
      durch das 10C-Framework, der Mensch bringt Domain-Wissen und
      Urteilskraft ein. Komplementarität statt Ersetzung.

# =============================================================================
# EBF DESIGN PRINCIPLES (abgeleitet aus Taxonomie)
# =============================================================================

ebf_design_principles:

  - id: "DP-001"
    principle: "Mensch bleibt im Loop"
    rationale: "Nur Menschen können urteilen, verantworten, wissen"
    implementation: "Jeder BEATRIX-Output erfordert menschliche Validierung"

  - id: "DP-002"
    principle: "Algorithmus strukturiert, Mensch füllt"
    rationale: "Sequenzierung ist algorithmisch, Bedeutung ist menschlich"
    implementation: "10C-Framework gibt Struktur, Consultant liefert Inhalt"

  - id: "DP-003"
    principle: "Speichern für Menschen, nicht für Algorithmen"
    rationale: "Datenbanken sind für menschliches Lernen, nicht ML"
    implementation: "Case Registry, Lessons Learned sind menschenlesbar"

  - id: "DP-004"
    principle: "Korrelation zeigen, Kausalität überlassen"
    rationale: "Algorithmen finden Muster, Menschen verstehen Ursachen"
    implementation: "Sensitivitätsanalysen zeigen Zusammenhänge, keine Kausalaussagen"

  - id: "DP-005"
    principle: "Vorschläge, keine Entscheidungen"
    rationale: "Verantwortung ist nicht delegierbar"
    implementation: "BEATRIX schlägt vor, Consultant entscheidet"

  - id: "DP-006"
    principle: "Amplifikation, keine Ersetzung"
    rationale: "Menschlichkeit ist das Wertvolle, Algorithmus verstärkt"
    implementation: "Behavioral Intelligence Amplifier, nicht AI"

# =============================================================================
# OFFENE FORSCHUNGSFRAGEN
# =============================================================================

open_questions:

  - id: "OQ-001"
    question: "Kann Bewusstsein emergieren?"
    our_position: "Aktuell keine Evidenz, aber nicht logisch ausgeschlossen"
    implication: "Falls ja: Taxonomie muss revidiert werden"

  - id: "OQ-002"
    question: "Reicht Verhalten als Kriterium?"
    our_position: "Nein - Funktionalismus ist unzureichend"
    implication: "Turing-Test ist notwendig, aber nicht hinreichend"

  - id: "OQ-003"
    question: "Was ist mit hybriden Systemen (BCI)?"
    our_position: "Brain-Computer Interfaces könnten Grenzen verschieben"
    implication: "Langfristig möglicherweise neue Kategorien nötig"
