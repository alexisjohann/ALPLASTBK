            fixing: "cognitively move from uncertainty to ambiguity"
            radical_empiricism: "data and belief are intertwined"
          bayesian_rationality:
            prior: "opportunity belief V(E)"
            likelihood: "feedback from testing V(F)"
            posterior: "updated belief after response"
            prediction_error: "minimized through iterative updating"
          distinctiveness:
            from_causation: "Not discovery-exploitation; belief-driven"
            from_effectuation: "Not resource-driven; problem-driven"
            from_lean_startup: "Think-act-learn vs act-learn"
        validity: "Theoretical framework grounded in classical pragmatism (Dewey, Peirce, James) and cognitive psychology (Bayesian inference, lens models)"
        bib_keys: ["PAP-zellweger2023entrepreneurs"]
        der_proof: null
        notes: |
          FOUNDATIONAL FRAMEWORK: Entrepreneur-as-scientist perspective.

          THREE CATEGORIES OF ACTION + THREE DOUBTS:
          1. Belief Formation → Doubt about product-market fit
             - Endogenous uncertainty from self-selected beliefs
             - V(E) = Needs(E) × Features(E)

          2. Belief Testing → Doubt about feedback validity
             - False positives (type 1: market says yes, reality is no)
             - False negatives (type 2: market says no, reality is yes)
             - Positive test strategy as default heuristic

          3. Responding → Doubt about total error
             - Bias-variance tradeoff in belief revision
             - Over-fitting: too responsive to noisy feedback
             - Under-fitting: ignoring valid feedback signals

          PRAGMATIST FOUNDATIONS:
          - Ontology: Emergent, shaped by problems and investigation
          - Epistemology: Beliefs as "instruments" for inquiry
          - Method: No distinction between common and scientific inquiry
          - Knight (1921): "pragmatic view" of knowledge under uncertainty

          KEY INSIGHT: Entrepreneurs are MANAGERS of uncertainty,
          not just uncertainty mitigators. They exploit uncertainty
          first (via novel beliefs), then reduce it (via testing/updating).

          AIRBNB CASE: Brian Chesky exemplifies the cycle - identified
          hotel shortage problem, formed belief (airbed B&B), tested
          with conference attendees, pivoted from airbeds to real beds,
          from conferences to general travel.

          EBF INTEGRATION:
          - READY: Entrepreneurs act based on belief conviction
          - AWARE: Sensitivity to feedback signals vs noise
          - WHERE: Bayesian updating of parameters from priors
          - HOW: Complementarity between belief formation and testing

      - id: MS-ENT-002
        name: "Product-Market Fit as Inferential Problem"
        authors: "Zellweger, Zenger"
        year: 2023
        ebf_restrictions:
          core_equation: "V ∝ correlation(V(E), V(M))"
          belief_model:
            formula: "V(E) = Needs(E) × Features(E)"
            components:
              needs_E: "Entrepreneur's assumptions about unmet market needs"
              features_E: "Product features entrepreneur deems feasible"
          market_model:
            formula: "V(M) = Needs(M) × Features(M)"
            components:
              needs_M: "Actual market needs (revealed through testing)"
              features_M: "Market's valuation of product features"
          fit_definition: "Correlation between V(E) and V(M)"
          ecological_rationality: "Aligned with Todd & Gigerenzer (2012) - fit between cognitive tool and environment"
          lens_model: "Consistent with Brunswik (1956) - mental representation matching environment"
          endogeneity_sources:
            - "Self-selection of beliefs from indefinite range"
            - "Idiosyncratic background, experience, and biases"
            - "Novel and contrarian nature of valuable beliefs"
          under_fitting_causes:
            demand_side: "Implausible assumptions about market needs"
            supply_side: "Poor assessment of feature feasibility"
        validity: "Theoretical construct aligned with lens model tradition (Brunswik, 1956) and ecological rationality"
        bib_keys: ["PAP-zellweger2023entrepreneurs"]
        der_proof: null
        notes: |
          FORMALIZES product-market fit as an inferential correlation problem.

          KEY INSIGHT: Value is NOT inherent in beliefs or markets alone,
          but in the FIT between them. A brilliant belief can fail if
          it doesn't match market reality, and a real market need can
          remain unserved if no belief targets it accurately.

          ENDOGENOUS UNCERTAINTY: The belief is self-selected, so the
          entrepreneur's own biases shape what they "see" as valuable.
          This is fundamentally different from exogenous market uncertainty.

          PRACTICAL IMPLICATION: Entrepreneurs should explicitly specify:
          1. Assumptions about needs (what problem exists?)
          2. Assumptions about features (what solution works?)
          3. Test the FIT between these two, not just each separately

      - id: MS-ENT-003
        name: "Entrepreneurial Heuristic Taxonomy"
        authors: "Zellweger, Zenger"
        year: 2023
        ebf_restrictions:
          heuristic_categories:
            belief_formation_heuristics:
              purpose: "Streamline forming valuable opportunity beliefs"
              examples:
                - "Contrarian question: What truth do few agree with?"
                - "Make assumptions explicit: What must be true?"
                - "Empathetic customer interviews on pain points"
                - "Business model canvas for consistency check"
                - "Value proposition specification"
              target_doubt: "product_market_fit"
            testing_heuristics:
              purpose: "Detect and reduce type 1 and type 2 errors"
              examples:
                - "A/B tests mapping features to demand"
                - "Start with least costly experiments"
                - "Create artifacts (prototype, MVP, pitch deck)"
                - "Staged investment to minimize losses"
                - "Approval threshold: 60-80% positive"
                - "Rejection threshold: max 40% positive"
              target_doubt: "feedback_validity"
            response_heuristics:
              purpose: "Avoid over/under-fitting to feedback data"
              examples:
                - "Partition sample into cohorts for cross-validation"
                - "Take the best (dominating option)"
                - "Satisfice (good enough)"
                - "Affordable loss (don't throw good money after bad)"
                - "Non-compensatory features focus"
              target_doubt: "response_error"
          mapping_principle: "Each heuristic category maps to specific inferential problem"
          ecological_rationality: "Heuristics matched to information structure of each action phase"
        validity: "Builds on Gigerenzer & Brighton (2009) ecological rationality and Bingham & Eisenhardt (2011) rational heuristics"
        bib_keys: ["PAP-zellweger2023entrepreneurs"]
        der_proof: null
        notes: |
          NOVEL CONTRIBUTION: Maps heuristics to specific entrepreneurial
          action phases and their companion doubts.

          KEY INSIGHT: Heuristics are not cognitive shortcuts from
          bounded rationality - they are ecologically rational tools
          matched to the information structure of each action phase.

          PRACTICAL VALUE: Entrepreneurs can select heuristics based on
          which doubt they're currently facing:
          - Uncertain about belief? → Use formation heuristics
          - Uncertain about feedback? → Use testing heuristics
          - Uncertain about response? → Use response heuristics

          THRESHOLDS (Informed Priors from related literature):
          - Approval: 60-80% positive evaluations (Camuffo et al., 2020)
          - Rejection: <40% positive evaluations (Csaszar et al., 2006)

  # =========================================================================
  # CAT-28: Technology, Power & Institutional Direction
  # Source: Acemoglu & Johnson (2023) "Power and Progress"
  # Integration: Level 5 FOUNDATIONAL | PIP-2026-02-07-001
  # =========================================================================
  - id: CAT-28
    name: "Technology, Power & Institutional Direction"
    restriction: "technology_direction × power_structure × institutional_context → prosperity_distribution"
    validity_domain: "Technology adoption, automation, AI, industrial revolution, digital economy, labor markets, institutional economics"
    theories:
      - id: MS-TP-001
        name: "Productivity Bandwagon Theory"
        authors: "Acemoglu, Johnson"
        year: 2023
        ebf_restrictions:
          bandwagon_condition: "Technology must create new tasks for workers (not just automate)"
          marginal_productivity: "Average productivity ≠ marginal productivity; automation raises average but may reduce marginal"
          two_step_chain:
            step_1: "Productivity growth → labor demand increase (CONDITIONAL on technology direction)"
            step_2: "Labor demand → wage increase (CONDITIONAL on worker power)"
          so_so_automation: "Automation with small productivity gains destroys jobs without creating new ones"
          task_creation: "New tasks that use human labor are essential for bandwagon to operate"
          counterfactual: "Without task creation, automation ↑ → wages ↓"
        validity: "Historical analysis across 1000 years (medieval agriculture, Industrial Revolution, 20th century manufacturing, digital economy). Supported by formal task-based model in Acemoglu & Restrepo (2019, 2022)."
        bib_keys: ["acemoglu2023power", "PAP-acemoglu2019automation", "PAP-acemoglu2022tasks", "PAP-acemoglu2020robots"]
        der_proof: null
        notes: |
          FOUNDATIONAL FRAMEWORK: The productivity bandwagon - the idea that
          technology automatically raises wages - is conditional, not automatic.

          TWO CONDITIONS for bandwagon to operate:
          1. Technology must increase worker MARGINAL productivity (not just
             average productivity). Automation raises average but reduces marginal.
          2. Workers must have sufficient POWER to translate higher marginal
             productivity into higher wages (not just profits).

          SO-SO AUTOMATION: Self-checkout kiosks, basic chatbots, simple
          industrial robots - these automate without significant productivity
          gains. No bandwagon from so-so automation.

          FRAMEWORK ONLY: No point estimates. Empirical foundation in
          Acemoglu & Restrepo (2019, 2022) task-based model.

      - id: MS-TP-002
        name: "Technology Direction Framework (Vision & Narrative)"
        authors: "Acemoglu, Johnson"
        year: 2023
        ebf_restrictions:
          vision_determines_direction: "Dominant narratives (visions) shape which technologies get developed and deployed"
          techno_optimism_bias: "Default vision favors automation and surveillance over worker empowerment"
          persuasion_technology: "Elites use persuasion to establish vision as self-evident truth"
          historical_visions:
            bentham_panopticon: "Surveillance as efficiency (1791)"
            adam_smith_invisible_hand: "Markets automatically share gains"
            silicon_valley_disruption: "Innovation is always beneficial"
          countervision: "Alternative visions require organized countervailing forces"
          ebf_mapping:
            awareness: "Vision = A(·) in AWARE dimension - what people believe about technology"
            context: "Vision operates through Ψ_K (cultural) and Ψ_S (social) dimensions"
        validity: "Historical analysis across 1000 years. Supported by narrative economics (Shiller 2019) and institutional theory."
        bib_keys: ["acemoglu2023power", "PAP-acemoglu2012nations"]
        der_proof: null
        notes: |
          KEY INSIGHT: Technology direction is not determined by technical
          possibilities alone but by VISIONS - shared narratives about what
          technology should do.

          EBF MAPPING: Vision maps directly to the AWARE dimension:
          - A(technology) = awareness function shaped by dominant narrative
          - When techno-optimism dominates: A(automation_benefit) HIGH,
            A(worker_displacement) LOW
          - When counter-narrative exists: both risks and benefits visible

          PRACTICAL: For EBF interventions, changing the VISION (narrative)
          is itself an intervention on the AWARE dimension.

      - id: MS-TP-003
        name: "Countervailing Powers Theory"
        authors: "Acemoglu, Johnson"
        year: 2023
        ebf_restrictions:
          power_asymmetry: "Without countervailing powers, technology benefits accrue to elites"
          three_pillars:
            organized_labor: "Unions and worker organizations"
            democratic_institutions: "Responsive government, regulation"
            civil_society: "Independent media, advocacy groups"
          historical_pattern:
            medieval: "No countervailing powers → peasant immiseration despite tech"
            industrial_revolution: "Gradual emergence of unions → shared prosperity after 100 years"
            progressive_era: "Strong countervailing powers → broad-based growth 1945-1975"
            digital_era: "Weakened countervailing powers → rising inequality since 1980"
          threshold_effect: "Countervailing powers must reach critical mass to redirect technology"
          ebf_mapping:
            who: "Power distribution = WHO dimension welfare hierarchy"
            how: "Complementarity γ(technology × institutions) depends on countervailing power strength"
        validity: "Historical analysis across multiple epochs and countries. Institutional foundations in Acemoglu & Robinson (2012) Why Nations Fail."
        bib_keys: ["acemoglu2023power", "PAP-acemoglu2012nations", "PAP-acemoglu2001colonial", "PAP-acemoglu2019democracy"]
        der_proof: null
        notes: |
          FOUNDATIONAL: Technology does NOT automatically benefit everyone.
          Shared prosperity requires COUNTERVAILING POWERS strong enough
          to redirect technology away from pure elite capture.

          HISTORICAL EVIDENCE:
          - Medieval agriculture: improved plows, crop rotation → zero
            benefit for peasants (90% of population)
          - Cotton gin: revolutionary productivity → intensified slavery
          - Industrial Revolution: 100 years before workers benefited
          - Progressive Era: unions + regulation → shared prosperity
          - Digital Era: weakened unions + deregulation → inequality

          EBF INTEGRATION:
          - WHO dimension: countervailing powers determine welfare hierarchy
          - HOW dimension: γ(tech × institutions) > 0 ONLY when powers balanced
          - WHEN dimension: Ψ_I (institutional context) is key moderator
