          context_dependence: "θ = f(Ψ_I, Ψ_S, Ψ_E)"
        validity: "Laboratory experiments with real-stakes trolley dilemmas (Saving-a-Life)"
        bib_keys: ["benabou_2024_ends_means"]
        der_proof: null
        notes: |
          KEY FINDING: No stable moral types. Same individual may be deontological in one
          context but consequentialist in another. Cross-context correlations near zero.

          CRITICAL NEGATIVE RESULT: Unlike many behavioral parameters, moral reasoning
          does NOT show cross-context complementarity: γ(EVM_i, EVM_j) ≈ 0 for i ≠ j.

          ORTHOGONAL CONSTRUCTS:
          - EVM (ends-vs-means) is SEPARATE from prosociality (self-vs-other)
          - Rule-following propensity (κ) does NOT predict deontological choices

          IMPLICATIONS FOR INTERVENTIONS:
          - Cannot assume stable moral "types" when designing interventions
          - Context-specific framing required for different moral domains
          - Prosocial interventions ≠ moral reasoning interventions

          FOUR EVM GAMES: Lying, Bribe, Statement Choice, Group Donation
          SAVING-A-LIFE: Real-stakes trolley using actual charitable donations

# =============================================================================
# CATEGORY 23: VIRTUE ETHICS & CHARACTER DEVELOPMENT
# Defining Restriction: Traits are actions, character is stable disposition
# =============================================================================
  - id: CAT-23
    name: "Virtue Ethics & Character Development"
    restriction: "θ = g(θ_{t-1}, e_t, h_t), character = stable θ across h, virtue = commitment to σ*"
    validity_domain: "Personality development, character formation, self-control, habituation, virtue"
    theories:
      - id: MS-VE-001
        name: "Economic Virtue Ethics"
        authors: "Heckman, Galaty, Tian"
        year: 2023
        ebf_restrictions:
          traits_as_actions: "θ are produced behaviors, not fixed endowments"
          trait_evolution: "θ_{t+1} = g(θ_t, e_t, h_t)"
          character_definition: "Character = stable dispositions across situations"
          character_variance: "Var(B|h) is small for all h in H"
          virtue_commitment: "Virtue = choice commitment to ideal point σ*"
          ideal_point: "U(θ) = -|θ - σ*| (golden mean)"
          utility_structure: "U = U(a, ψ, θ, h) where ψ=preferences, θ=traits, h=situation"
          measured_behavior: "B = f(θ, e, h) where e=effort"
        validity: "Literature synthesis, Perry/Jamaica/ABC/China REACH longitudinal evidence"
        bib_keys: ["PAP-heckman2023virtue"]
        der_proof: null
        notes: |
          FOUNDATIONAL BRIDGE: Economics ↔ Psychology ↔ Philosophy.

          KEY INSIGHT: Traits are actions (behaviors), not immutable genetic endowments.
          This means personality is MALLEABLE through investment and own effort.

          ARISTOTELIAN FORMALIZATION:
          - Golden mean: σ* = optimal trait level between excess and deficiency
          - Character: stable dispositions producing consistent behavior across contexts
          - Virtue: active commitment to ideal through choice, not passive trait

          DISTINCTION: Preferences (ψ) vs Traits (θ)
          - ψ = what person values (very stable)
          - θ = behavioral dispositions (stable but malleable)

          EMPIRICAL EVIDENCE: Perry, Jamaica, ABC, China REACH all show character
          skills can be developed through early intervention.

      - id: MS-VE-002
        name: "Self-Control Model"
        authors: "Heckman, Galaty, Tian"
        year: 2023
        ebf_restrictions:
          self_control_stock: "S_t = depletable self-control resource"
          self_control_dynamics: "S_{t+1} = (1-δ_S)S_t + ι(rest_t) + investment_t"
          temptation_constraint: "a* = argmax U(a) s.t. S_t ≥ c(a, a_temptation)"
          cost_function: "c(a, a_temptation) = cost of resisting temptation"
          depreciation: "δ_S ∈ [0.1, 0.2] per period (self-control depletes)"
          recovery: "ι() = restoration from rest"
          development: "S_t can be built through training/practice"
        validity: "Ego depletion literature, willpower studies, longitudinal evidence"
        bib_keys: ["PAP-heckman2023virtue", "baumeister1998ego"]
        der_proof: null
        notes: |
          Self-control is a depletable resource, like a muscle:
          - Gets fatigued with use
          - Recovers with rest
          - Grows stronger with training

          Person with character invokes S_t to override temptation when
          tempted action differs from virtuous action: a_temptation ≠ a_virtuous.

          LINK TO AKRASIA: Classical weakness of will occurs when S_t < c(a*, a_temptation).
          Even with commitment to virtue, insufficient self-control leads to deviation.

      - id: MS-VE-003
        name: "Habituation Model"
        authors: "Heckman, Galaty, Tian"
        year: 2023
        ebf_restrictions:
          habituation_stock: "K_t = accumulated practice/habit stock"
          habituation_dynamics: "K_{t+1} = (1-δ_K)K_t + h(a_t)"
          depreciation_rate: "δ_K ∈ [0.02, 0.05] per period (use it or lose it)"
          habituation_function: "h(a_t) = contribution from action a_t"
          cost_reduction: "Cost(virtuous action) = c(a) / (1 + K_t)"
          automaticity: "High K_t → virtuous action becomes automatic/effortless"
        validity: "Habit formation literature, skill acquisition, intervention follow-ups"
        bib_keys: ["PAP-heckman2023virtue", "duckworth2007grit"]
        der_proof: null
        notes: |
          ARISTOTLE: "We become just by doing just acts, temperate by doing
          temperate acts, brave by doing brave acts." (Nicomachean Ethics II.1)

          HABIT FORMATION PROCESS:
          1. Early stage: Virtuous action requires effort, self-control
          2. Practice: Repeated action builds habituation stock K_t
          3. Late stage: Virtuous action becomes natural, effortless

          This is CHARACTER FORMATION: Converting effortful virtue into habitual virtue.

          Higher K_t → lower cost of virtuous action → more likely to act virtuously
          without needing self-control resources.

          CRITICAL: δ_K > 0 means habits decay without practice ("use it or lose it").

# =============================================================================
# CATEGORY 24: CRISIS MANAGEMENT & ONLINE COMMUNICATION
# Defining Restriction: Virality = f(emotion_arousal, tie_strength, LSM), response timing matters
# =============================================================================
  - id: CAT-24
    name: "Crisis Management & Online Communication"
    restriction: "V = f(E_high, E_low, T, LSM), Response_effect = g(timing, strategy)"
    validity_domain: "Social media crises, brand communities, customer complaints, online firestorms"
    theories:
      - id: MS-CM-001
        name: "Firestorm Detection-Prevention-Mitigation Model"
        authors: "Herhausen, Ludwig, Grewal, Wulf, Schoegel"
        year: 2019
        ebf_restrictions:
          # Phase 1: Detecting - What drives virality
          arousal_high_virality: "β = 0.186*** (high-arousal emotions increase virality)"
          arousal_low_virality: "β = 0.026 (low-arousal emotions: NS)"
          tie_strength_virality: "β = 1.432*** (strong ties amplify spread)"
          lsm_virality: "β = 0.025 (linguistic style matching: NS for virality)"
          # Phase 2: Preventing - Empathy vs Explanation
          empathy_virality: "β = -0.069*** (empathy reduces virality)"
          explanation_virality: "β = -0.011 (explanation: NS for virality)"
          # Phase 3: Mitigating - Response strategies over time
          compensation_early: "β = 0.098*** (early compensation INCREASES virality)"
          compensation_late: "β = -0.058*** (late compensation DECREASES virality)"
          apology_early: "β = -0.058*** (early apology DECREASES virality)"
          apology_late: "β = 0.105*** (late apology INCREASES virality - too late!)"
          channel_change_early: "β = -0.081*** (early channel change DECREASES virality)"
          channel_change_late: "β = 0.096*** (late channel change INCREASES virality)"
        validity: "Field data from 472,995 brand community posts across 89 brands (2011-2016)"
        bib_keys: ["PAP-herhausen2019firestorms"]
        der_proof: null
        notes: |
          3-PHASE CRISIS MANAGEMENT FRAMEWORK:

          PHASE 1 - DETECTING (H1-H2):
          - High-arousal emotions (anger, fear, excitement) → virality
          - Low-arousal emotions (sadness, contentment) → no effect on virality
          - Key: Monitor for HIGH-AROUSAL content, not just negative sentiment

          PHASE 2 - PREVENTING (H3-H4):
          - SURPRISING FINDING: Explanation > Empathy for containing virality
          - Empathy reduces virality but NOT as much as expected
          - For HIGH-AROUSAL: Explanation is more effective (addresses cognitive needs)
          - For LOW-AROUSAL: Empathy is more effective (addresses emotional needs)

          PHASE 3 - MITIGATING (H5-H6):
          - TIMING IS CRITICAL:
            * Compensation: LATE = good, EARLY = bad (signals guilt)
            * Apology: EARLY = good, LATE = bad (seems insincere)
            * Channel Change: EARLY = good, LATE = bad (seems evasive)

          COUNTERINTUITIVE FINDINGS:
          1. Explanation beats empathy for high-arousal crises
          2. Early compensation backfires (perceived as admission of guilt)
          3. Structural tie strength (1.432) > emotion content (0.186) for virality

          EBF MAPPINGS:
          - CORE-AWARE: High-arousal emotions = high salience (A↑)
          - CORE-STAGE: Firestorm phases map to BCJ phases
          - CORE-EIT: Different interventions for different phases

      - id: MS-CM-002
        name: "Customer Journey Segments"
        authors: "Herhausen, Kleinlercher, Verhoef, Emrich, Rudolph"
        year: 2019
        ebf_restrictions:
          segment_count: "n = 5 distinct journey segments"
          segment_1: "Store-focused: Traditional brick-and-mortar preference"
          segment_2: "Pragmatic online: Efficient digital-first"
          segment_3: "Extensive online: Research-heavy digital"
          segment_4: "Multiple touchpoint: Omnichannel users"
          segment_5: "Online-to-offline: ROPO (Research Online, Purchase Offline)"
          loyalty_varies: "Loyalty formation differs by segment"
        validity: "Multi-channel retail customer data"
        bib_keys: ["PAP-herhausen2019loyalty"]
        der_proof: null
        notes: |
          BASIC n CONCEPT (from CX Navigator):
          - n = number of critical Interaction Hubs / Moments of Truth
          - n is NOT fixed (not "Basic 7") - varies by industry and company
          - Each company must identify their own "Basic n"

          5 CUSTOMER JOURNEY SEGMENTS:
          1. Store-focused: Prefer physical stores
          2. Pragmatic online: Efficient, goal-oriented digital
          3. Extensive online: Research extensively online
          4. Multiple touchpoint: Use all channels
          5. Online-to-offline: Research online, buy in store

          LOYALTY FORMATION:
          - Different segments form loyalty through different mechanisms
          - Cannot use one-size-fits-all approach
          - Must tailor touchpoint strategy to segment

          3C FRAMEWORK (from CX Navigator book):
          - Collecting the dots: Gather all touchpoint data
          - Connecting the dots: Map customer journeys
          - Correcting the dots: Optimize problem touchpoints

          EBF MAPPING:
          - CORE-WHO: Segments define different utility levels L
          - CORE-STAGE: Journey segments reflect BCJ phases
          - CORE-WHEN: Context Ψ varies by channel/touchpoint

