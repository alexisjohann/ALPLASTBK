  # =============================================================================
  # CATEGORY 18: ECONOMETRIC CAUSALITY FOUNDATIONS (3 Models)
  # Defining Restriction: Thought experiments define causal claims
  # =============================================================================
  # STATUS: ★★★★★ FOUNDATIONAL FOR EBF METHODOLOGY
  # This category contains the epistemological foundations for structural
  # econometric modeling - the basis for WHY EBF uses structural parameters
  # instead of treatment effects, and WHY context matters for causal inference.
  # =============================================================================
  - id: CAT-18
    name: "Econometric Causality Foundations"
    restriction: "Thought experiments define counterfactuals; structural parameters are policy-invariant"
    validity_domain: "All EBF models; provides epistemological foundation"
    ebf_foundational: true
    theories:
      - id: MS-EC-001
        name: "Econometric Causality Framework"
        authors: "Heckman, Pinto"
        year: 2023
        ebf_restrictions:
          causal_basis: "Thought experiments (hypothetical worlds)"
          key_operation: "Fixing mechanisms (not conditioning)"
          policy_questions: "P1 (TT), P2 (TUT), P3 (Forecast), P4 (New Policy)"
          structural_parameters: "Policy-invariant (λ, β, γ)"
          external_validity: "Requires mechanism invariance"
          fixing_vs_conditioning: "Fixing ≠ Conditioning"
        validity: "Foundation for all structural econometric models"
        bib_keys: ["PAP-heckman2024causality", "PAP-heckman2022econometrics"]  # 2024 published + 2022 comprehensive
        der_proof: "DER §1 (Epistemological Foundations)"
        evidence_tier: 1  # Gold: Journal of Econometrics (2024 paper)
        notes: |
          FOUNDATIONAL PAPERS FOR EBF METHODOLOGY.
          PAP-heckman2024causality: Published in Journal of Econometrics 243(1), 2024.
          Establishes thought experiments as basis for causal claims.
          PAP-heckman2022econometrics: NBER WP 29787. Comprehensive framework comparison:
          (1) Econometric (Frisch-Haavelmo) can answer P1-P4 and handle simultaneity,
          (2) Neyman-Rubin limited to P1-P2, (3) Pearl DAG nonparametric/no cycles.
          KEY INSIGHT: Parameters like λ (loss aversion) are structural, not treatment effects.
          Context (Ψ) = which mechanisms are fixed. LATE is instrument-dependent.

      - id: MS-EC-002
        name: "Frisch-Haavelmo Tradition"
        authors: "Frisch, Haavelmo"
        year: 1944
        ebf_restrictions:
          probability_approach: "Economic relations have probability distributions"
          autonomous_relations: "Structural equations represent mechanisms"
          simultaneity: "Allows simultaneous equation systems"
          identification: "Economic theory required for identification"
        validity: "Structural econometric models"
        bib_keys: ["frisch1933propagation", "haavelmo1944probability"]
        der_proof: "DER §1.1"
        notes: "Historical foundation of econometric causality. Haavelmo's 1944 paper established probability approach. Frisch distinguished autonomous (structural) from confluent relations."

      - id: MS-EC-003
        name: "Generalized Roy Model"
        authors: "Roy, Heckman"
        year: 1951
        ebf_restrictions:
          outcome_equation: "Y = D·Y₁ + (1-D)·Y₀"
          selection_rule: "D = 1[V > 0]"
          potential_outcomes: "Y₁ = μ₁(X) + U₁; Y₀ = μ₀(X) + U₀"
          choice_index: "V = μᵥ(Z) - ε"
          treatment_effects: "ATE, TT, TUT, MTE, LATE"
        validity: "Selection models, treatment effect estimation"
        bib_keys: ["roy1951some", "heckman1979sample", "heckman2006understanding"]
        der_proof: "DER §2"
        notes: "Fundamental selection model for causal inference. Allows selection on unobservables. Foundation for IV, matching, control functions, and MTE estimation."

      - id: MS-IR-001
        name: "Imperfect Randomization Inference"
        authors: "Heckman, Pinto, Shaikh"
        year: 2023
        ebf_restrictions:
          imperfect_randomization: "Treatment reassigned based on observed AND unobserved characteristics"
          partial_identification: "Bound effects using U(D,MW) = {u: u_j=0 if D_j=1 or MW_j=0}"
          symmetry_groups: "G_{Z,U} (permutations) × H_{Z,U} (sign changes)"
          conservative_critical_value: "c̄_L = max_{u∈U(D,MW)} c_L(u)"
          fwer_control: "FWER_P ≤ α for all P ∈ Ω (finite-sample valid)"
          romano_wolf_stepdown: "Algorithm 4.1 for multiple hypothesis testing"
        validity: "Experiments with post-randomization reassignment"
        bib_keys: ["PAP-heckman2023imperfect", "heckman2010analyzing", "romano2005exact"]
        der_proof: "DER §2.5 (Imperfect Randomization)"
        evidence_tier: 2  # Silver: NBER Working Paper
        notes: |
          ★★★★ LEVEL 4 THEORY PAPER. FUNDAMENTAL PROBLEM: How to make valid causal
          inferences when experimental randomization is imperfect. SOLUTION: Exploit
          symmetries G_{Z,U} × H_{Z,U} that persist despite post-randomization
          reassignment. KEY CONTRIBUTION: Finite-sample FWER control via Romano-Wolf
          stepdown. APPLICATION: Perry Preschool effects on IQ, crime, education
          ROBUST to imperfect randomization correction. EBF IMPLICATION: Intervention
          evaluations must account for randomization imperfections; multiple testing
          correction essential for credibility.

# =============================================================================
# CATEGORY 19: SKILL FORMATION & HUMAN CAPITAL (3 Theories)
# Defining Restriction: K(a+1) = f(a)(K(a), I(a)); skills are age-specific
# =============================================================================
  - id: CAT-19
    name: "Skill Formation & Human Capital"
    restriction: "K(a+1) = f(a)(K(a), I(a)); skills are age-specific, dynamic complementarity"
    validity_domain: "Early childhood development, education, human capital accumulation"
    ebf_critical: true
    theories:
      - id: MS-SF-001
        name: "Technology of Skill Formation"
        authors: "Cunha, Heckman"
        year: 2007
        ebf_restrictions:
          production_function: "K(a+1) = f(a)(K(a), I(a))"
          self_productivity: "∂K(a+1)/∂K(a) > 0"
          dynamic_complementarity: "∂²K(a+j+1)/∂I(a)∂I'(a+j) > 0"
          sensitive_periods: "f(a) varies with age"
          critical_periods: "∂f(a)/∂I(a) = 0 after threshold"
        validity: "Skill development from early childhood through adolescence"
        bib_keys: ["cunha2007technology", "heckman2006skill", "cunha2010estimating"]
        der_proof: "DER §7 (Skill Formation)"
        notes: "Foundational model of human capital accumulation. Shows early investment raises productivity of later investment (dynamic complementarity). Explains why early interventions are cost-effective."

      - id: MS-SF-002
        name: "Scale-Free Skill Measurement"
        authors: "Heckman, Tian, Zhang, Zhou"
        year: 2026
        ebf_restrictions:
          ordinal_nature: "Test scores are ordinal, not cardinal"
          skill_emergence: "New skills EMERGE at each developmental level"
          no_common_scale: "Skills at different ages cannot be compared on common scale"
          time_to_mastery: "d(s,ℓ) = trials to first success at level ℓ"
          fadeout_explanation: "Apparent fadeout is measurement artifact"
        validity: "Skill measurement without psychometric fiat"
        bib_keys: ["PAP-heckman2026skills"]
        der_proof: "DER §7.2 (Scale-Free Testing)"
        evidence_tier: 2  # Silver: NBER Working Paper
        notes: |
          ★★★★ LEVEL 4 THEORY PAPER. FUNDAMENTAL INSIGHT: Skills do not evolve as
          higher levels of fixed abilities - they EMERGE qualitatively different at
          each stage. Provides scale-free test of dynamic complementarity using
          time-to-mastery within UHP difficulty levels. KEY IMPLICATION: Fadeout
          may be measurement artifact, not real decline. EBF parameters (λ, β, γ)
          should not blindly assume cardinal psychometric scales.

      - id: MS-SF-003
        name: "Dynamic Complementarity"
        authors: "Heckman, Tian, Zhang, Zhou"
        year: 2025
        ebf_restrictions:
          definition: "∂²K(a+j+1)/∂I(a)∂I'(a+j) > 0"
          decomposition: "= P(a) · Q(a+j) · f₁,₂(a+j)"
          productivity_P: "f₁(a) = ∂K(a+1)/∂K(a) - marginal product of past skills"
          transmission_Q: "Q(a+j) = Π f₁(a+m) - skill propagation across stages"
          static_complementarity: "f₁,₂(a) = ∂²K(a+1)/∂K(a)∂I'(a) - cross-partial"
          interpretation: "Early investment raises learning rate at later stages"
          scale_free_test: "Compare time-to-mastery for different exposure groups"
          catch_up_effect: "Low-ability children benefit most (γ_low > γ_normal > γ_high)"
          domain_specific: "Confirmed for language/cognitive; NOT for fine motor"
        validity: "Multi-stage human capital investment, early childhood development"
        bib_keys: ["PAP-heckman2025dynamic", "PAP-heckman2026skills", "cunha2007technology"]
        der_proof: "DER §7.3"
        notes: "★★★★ FOUNDATIONAL DECOMPOSITION: Dynamic Complementarity = P(a)·Q(a+j)·f₁,₂(a+j). Three components: Productivity (marginal product), Transmission (self-productivity), Static Complementarity (cross-partial). KEY: Can be tested without arbitrary scales using time-to-mastery. HETEROGENEITY: γ varies by ability group (low benefit most) and domain (language/cognitive YES, fine motor NO). China REACH data demonstrates effect: full exposure children learn faster at later UHP levels."

