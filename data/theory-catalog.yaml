  - id: CAT-26
    name: "Customer Experience & Journey Management"
    restriction: "touchpoint_interaction → customer_experience → journey_optimization"
    validity_domain: "B2C and B2B customer interactions, multi-channel touchpoints, journey mapping, CX strategy"
    theories:
      - id: MS-CJ-001
        name: "Customer Journey Theory (7-Step Process)"
        authors: "Schögel, Herhausen"
        year: 2024
        ebf_restrictions:
          journey_phases: ["detect_need", "search", "evaluate", "decide", "purchase", "use", "engage"]
          phase_count: 7
          touchpoint_categories: ["owned", "paid", "earned", "shared"]
          touchpoint_grid: "journey_phases × touchpoint_categories"
          phase_mapping:
            pre_purchase: ["detect_need", "search", "evaluate", "decide"]
            purchase: ["purchase"]
            post_purchase: ["use", "engage"]
          bcj_alignment: "Maps to EBF BCJ phases (Awareness→Consideration→Decision→Action→Loyalty)"
        validity: "Practitioner framework validated through 15+ years of CX consulting"
        bib_keys: ["PAP-schoegel2024cxnavigator"]
        der_proof: null
        notes: |
          FOUNDATIONAL FRAMEWORK for customer journey mapping.

          7-STEP CUSTOMER PROCESS (Universal Journey Structure):
          1. Detect need - Customer becomes aware of need/problem
          2. Search - Information gathering and exploration
          3. Evaluate - Comparison of alternatives
          4. Decide - Selection of solution/provider
          5. Purchase - Transaction execution
          6. Use - Product/service consumption
          7. Engage - Post-purchase interaction, loyalty, advocacy

          TOUCHPOINT GRID (Central Mapping Tool):
          - Rows: 7 journey phases
          - Columns: Owned | Paid | Earned | Shared touchpoints
          - Each cell: Specific touchpoints at that intersection

          TOUCHPOINT SET CARDS (4 Constitutional Characteristics):
          1. Purpose: Functional vs emotional goals
          2. Participants: Company, customer, third parties
          3. Interaction: Informational, transactional, relational
          4. Technology: Digital vs physical, automated vs human

          EBF INTEGRATION:
          - STAGE: 7 phases map to BCJ journey model
          - HOW: Touchpoint Grid as interaction mapping
          - WHO: Customer segments with heterogeneous journeys
          - WHEN: Phase-specific timing for interventions

      - id: MS-CJ-002
        name: "Customer Journey Segmentation Model (5-Segment Typology)"
        authors: "Herhausen, Kleinlercher, Verhoef, Emrich, Rudolph"
        year: 2019
        ebf_restrictions:
          segment_count: 5
          segments:
            store_focused: "Low touchpoint usage, prefer physical stores (22%)"
            pragmatic_online: "Efficient online journey, minimal research (31%)"
            extensive_online: "High online information search, comparisons (16%)"
            multiple_touchpoint: "Many channels, highest mobile usage (15%)"
            online_to_offline: "Research online, buy offline - webrooming (16%)"
          loyalty_formation:
            journey_satisfaction:
              full_sample: 0.21
              store_focused: 0.11
              pragmatic_online: 0.13
              extensive_online: 0.21
              multiple_touchpoint: 0.58
              online_to_offline: 0.24
            product_satisfaction:
              full_sample: 0.28
              store_focused: 0.40
              pragmatic_online: 0.43
              extensive_online: 0.28
              multiple_touchpoint: 0.01
              online_to_offline: 0.17
