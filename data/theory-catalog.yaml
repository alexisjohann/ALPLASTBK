        validity: "High-dimensional causal inference, policy evaluation"
        bib_keys: ["PAP-chernozhukov2018double"]
        der_proof: "DER §5.2"
        notes: "Foundational for combining ML prediction with causal inference. Removes regularization bias via double-robustness."

      - id: MS-VCG-001
        name: "VCG Mechanisms (Vickrey-Clarke-Groves)"
        authors: "Vickrey, Clarke, Groves"
        year: 1961
        ebf_restrictions:
          incentive_compatible: "dominant strategy truth-telling"
          efficient: "maximizes social surplus"
          budget: "not balanced in general"
        validity: "Auctions, public goods, team incentives"
        bib_keys: ["PAP-vickrey1961counterspeculation", "PAP-clarke1971multipart", "PAP-groves1973incentives"]
        der_proof: "DER §5.3"
        notes: "Canonical mechanism design. Vickrey (auctions), Clarke (public goods), Groves (teams). Nobel 1996 (Vickrey), 2007 (Mechanism Design)."

      - id: MS-BANDIT-001
        name: "Multi-Armed Bandits for Policy Learning"
        authors: "Kleinberg, Leighton, Cesa-Bianchi, Kasy"
        year: 2003
        ebf_restrictions:
          exploration_exploitation: "tradeoff fundamental"
          regret: "cumulative suboptimality vs oracle"
          welfare_vs_reward: "distributional concerns change optimal policy"
        validity: "Adaptive experiments, pricing, A/B testing, policy iteration"
        bib_keys: ["PAP-kleinberg2003bandits", "PAP-kasy2025adaptive"]
        der_proof: "DER §5.4"
        notes: "From Kasy CIFW05 2026. Bandits as causal learning. Welfare ≠ reward leads to different exploration strategies."

      - id: MS-CF-001
        name: "Causal Forests"
        authors: "Athey, Imbens, Wager"
        year: 2016
        ebf_restrictions:
          CATE: "conditional average treatment effect"
          honesty: "separate trees for structure and estimation"
          inference: "asymptotically normal, valid CIs"
        validity: "Heterogeneous treatment effects, personalized policy"
        bib_keys: ["PAP-athey2016recursive", "PAP-wager2018causalforest"]
        der_proof: "DER §5.5"
        notes: "ML methods for HTE with valid inference. Extends Breiman's random forest to causal settings."

      - id: MS-EXT-001
        name: "Externality Correction (Pigouvian)"
        authors: "Pigou"
        year: 1920
        ebf_restrictions:
          MPC_MSC: "marginal private cost ≠ marginal social cost"
          tax: "t* = MSC - MPC at optimum"
          internalization: "tax internalizes externality"
        validity: "Pollution, congestion, public health, carbon pricing"
        bib_keys: ["PAP-pigou1920welfare"]
        der_proof: "DER §5.6"
        notes: "Foundation of environmental economics and corrective taxation. Still debated (Coase 1960) but widely applied."

# =============================================================================
# CATEGORY 16: SEQUENTIAL CAUSAL INFERENCE (4 Models)
# Defining Restriction: τ(t) = f(H_t) (effects depend on history/trajectory)
# Added: 2026-01-26 from CIFW05 Workshop (Ruohan Zhan essay)
# =============================================================================
  - id: CAT-16
    name: "Sequential Causal Inference"
    restriction: "τ(t) = f(H_t) (treatment effects depend on trajectory history)"
    validity_domain: "Dynamic treatment regimes, customer journeys, reinforcement learning"
    theories:
      - id: MS-SEQ-001
        name: "Post Reinforcement Learning Inference"
        authors: "Syrgkanis, Zhan"
        year: 2025
        ebf_restrictions:
          blip_function: "γ_t(H_t, A_t) = E[Y^* - Y^{A_t←0} | H_t, A_t]"
          stage_effect: "localized causal effect at stage t"
          decomposition: "trajectory effect = Σ blips"
          data_source: "RL-generated (non-stationary, adaptive)"
        validity: "RL-generated data, multi-stage experiments, sequential A/B testing"
        bib_keys: ["PAP-syrgkanis2025postrl", "PAP-zhang2024personalized"]
        der_proof: "DER §6.1"
        notes: "From CIFW05 2026 (Zhan). Blip functions decompose trajectory effects into stage-wise contributions. Key for customer journey analysis in BCJ."

      - id: MS-DTR-001
        name: "Dynamic Treatment Regimes"
        authors: "Murphy, Robins"
        year: 2003
        ebf_restrictions:
          regime: "d = (d_1, d_2, ..., d_T) sequence of decision rules"
          value_function: "V^d = E[Y | follow regime d]"
          optimal: "d* maximizes V^d"
          g_estimation: "inverse probability weighting over history"
        validity: "Sequential medical decisions, adaptive interventions, personalized treatment"
        bib_keys: ["PAP-murphy2003optimal"]
        der_proof: "DER §6.2"
        notes: "Foundation of sequential decision-making in medicine. Optimal regime maximizes expected outcome over trajectory."

      - id: MS-MSM-001
        name: "Marginal Structural Models"
        authors: "Robins, Hernán, Brumback"
        year: 2000
        ebf_restrictions:
          time_varying_confounding: "L_t affects both A_t and Y"
          IPTW: "inverse probability of treatment weighting"
          stabilized_weights: "reduce variance via numerator"
          no_unmeasured: "sequential ignorability required"
        validity: "Time-varying treatments, epidemiology, observational longitudinal"
        bib_keys: ["PAP-robins2000msm"]
        der_proof: "DER §6.3"
        notes: "Handles time-varying confounders that are also affected by prior treatment. Standard in epidemiology for treatment histories."

      - id: MS-DECOMP-001
        name: "Causal Decomposition of Trajectories"
        authors: "Oaxaca, Blinder, Gelbach, Zhan"
        year: 2025
        ebf_restrictions:
          decomposition: "Δ = Δ_explained + Δ_unexplained"
          sequence_extension: "applies to stage-wise differences"
          blip_decomposition: "explained via trajectory distribution"
          path_dependence: "sequence matters, not just endpoint"
        validity: "Wage gaps, customer journey differences, group disparities over time"
        bib_keys: ["PAP-oaxaca1973decomposition", "PAP-gelbach2016covariates", "PAP-syrgkanis2025postrl"]
        der_proof: "DER §6.4"
        notes: "From CIFW05 2026 (Zhan). Extends Oaxaca-Blinder to sequences. Decomposes trajectory gaps into explained (stage distributions) vs unexplained (blip effects)."

  # =============================================================================
  # CATEGORY 17: HOUSEHOLD ECONOMICS & TIME ALLOCATION (3 Models)
  # Defining Restriction: T_constraint binding (time is scarce resource)
  # =============================================================================
  - id: CAT-17
