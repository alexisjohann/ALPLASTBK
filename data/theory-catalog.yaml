              full_sample: 0.07
              store_focused: 0.15
              pragmatic_online: 0.03
              extensive_online: 0.03
              multiple_touchpoint: 0.12
              online_to_offline: 0.20
          methodology: "latent_class_analysis"
          sample_size: 5092
          time_consistency: "Segments replicated across 2013 and 2016 samples"
          mobile_effect: "Mobile doesn't create new segment; concentrated in multiple touchpoint"
          showrooming: "No separate showrooming segment found"
          webrooming: "Online-to-offline (webrooming) more prevalent than showrooming"
        validity: "Two independent DACH samples (N=2,443 + N=2,649), LCA with BIC/AIC selection"
        bib_keys: ["PAP-herhausen2019loyalty"]
        der_proof: null
        notes: |
          EMPIRICALLY-DERIVED 5-SEGMENT TYPOLOGY for customer journeys.

          5 CUSTOMER JOURNEY SEGMENTS:
          1. Store-focused shoppers (22%)
             - Low touchpoint usage overall
             - Prefer physical stores
             - Product satisfaction drives loyalty (β=0.40***)
             - Inspiration matters (β=0.15***)

          2. Pragmatic online shoppers (31%)
             - Efficient online journey
             - Use search engines and retailer website
             - Product satisfaction drives loyalty (β=0.43***)
             - Inspiration doesn't matter (β=0.03, NS)

          3. Extensive online shoppers (16%)
             - High online information search
             - Comparison sites, reviews
             - Journey satisfaction matters (β=0.21***)

          4. Multiple touchpoint shoppers (15%)
             - Use many touchpoints across channels
             - Highest mobile usage (47%)
             - Journey satisfaction CRUCIAL (β=0.58***)
             - Product satisfaction has NO effect (β=0.01, NS)

          5. Online-to-offline shoppers (16%)
             - Research online, purchase in store (webrooming)
             - Customer inspiration highest (β=0.20***)

          COUNTERINTUITIVE FINDINGS:
          - No showrooming segment exists
          - Mobile doesn't create new segment
          - Product satisfaction has ZERO effect for multiple touchpoint shoppers
          - Journey satisfaction barely matters for store-focused shoppers

          EBF INTEGRATION:
          - WHO: 5 segments with heterogeneous journey behavior
          - WHAT: Segment-specific loyalty drivers (journey vs product vs inspiration)
          - STAGE: Segments emphasize different journey phases (ZMOT vs FMOT)
          - HOW: Pathway to loyalty varies by segment

      - id: MS-CX-001
        name: "Customer Experience Management (3C Framework)"
        authors: "Schögel, Herhausen"
        year: 2024
        ebf_restrictions:
