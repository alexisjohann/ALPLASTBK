          connecting: "Link insights to create holistic journey view, identify Interaction Hubs and MOT"
          correcting: "Optimize n critical Interaction Hubs through strategic prioritization"
          cx_strategy_types: ["service_satisfaction", "process_marketing", "touchpoint_innovation", "cx_innovation"]
          strategy_progression: "Increasing sophistication and investment"
          differentiation_relevance_grid:
            quadrants: ["delight", "must_have", "nice_to_have", "fuzzy"]
            delight: "High relevance, high differentiation → Invest & Protect"
            must_have: "High relevance, low differentiation → Maintain parity"
            nice_to_have: "Low relevance, high differentiation → Deprioritize"
            fuzzy: "Low relevance, low differentiation → Eliminate"
        validity: "Applied framework from St. Gallen Management School, 15+ years expertise"
        bib_keys: ["PAP-schoegel2024cxnavigator"]
        der_proof: null
        notes: |
          CENTRAL METHODOLOGY for systematic CX improvement.

          3C MODEL:
          1. COLLECTING the Dots
             - Systematic touchpoint inventory
             - Categorize: Owned, Paid, Earned, Shared
             - Map to 7-step customer process

          2. CONNECTING the Dots
             - Identify Moments of Truth (ZMOT, FMOT, SMOT)
             - Locate Interaction Hubs (high-frequency touchpoints)
             - Determine "Basic n" (critical touchpoints to optimize)

          3. CORRECTING the Dots
             - Prioritize using Differentiation-Relevance Grid
             - Apply Kano Model for expectation management
             - Choose CX Strategy Type (1-4)

          4 CX STRATEGY TYPES (Increasing Sophistication):
          1. Service Satisfaction Management - Fix broken touchpoints
          2. Process-Oriented Marketing - Optimize journey flow
          3. Touchpoint Innovation - Create differentiated touchpoints
          4. Customer Experience Innovation - Reimagine entire journey

          EBF INTEGRATION:
          - EIT: 3C maps to EBF workflow (Understand → Model → Intervene)
          - HIERARCHY: 4 strategy levels as organizational maturity
          - WHAT: Kano categories as utility component expectations

      - id: MS-CX-002
        name: "Touchpoint Optimization Theory (Basic n & MOT)"
        authors: "Schögel, Herhausen"
        year: 2024
        ebf_restrictions:
          basic_n_concept: "Focus on n critical Interaction Hubs, not all touchpoints"
          n_is_variable: true
          n_determinants: ["industry", "company_size", "customer_complexity"]
          moments_of_truth:
            zmot: "Zero Moment of Truth - Research/information gathering phase"
            fmot: "First Moment of Truth - Purchase decision point"
            smot: "Second Moment of Truth - Usage and experience phase"
          interaction_hub_characteristics:
            - "High traffic volume"
            - "Cross-segment relevance"
            - "Multiple journey phase coverage"
            - "Disproportionate CX impact"
          kano_categories:
            basic: "Absence = dissatisfaction, presence = neutral"
            satisfier: "Linear relationship with satisfaction"
            delighter: "Absence = neutral, presence = delight"
        validity: "Derived from touchpoint analysis across industries"
        bib_keys: ["PAP-schoegel2024cxnavigator"]
        der_proof: null
        notes: |
          KEY INSIGHT: Not every touchpoint matters equally.

          BASIC n CONCEPT (Central Innovation):
          - n = number of critical Interaction Hubs / Moments of Truth
          - n is NOT a fixed number
          - n varies by industry, company size, customer complexity
          - Focus resources on the n most impactful touchpoints
          - Derived from Touchpoint Grid analysis

          DETERMINING n:
          1. Complete Touchpoint Grid mapping
          2. Identify Moments of Truth (ZMOT, FMOT, SMOT)
          3. Locate Interaction Hubs
          4. Calculate impact-to-effort ratios
          5. Prioritize top n touchpoints for optimization

          MOMENTS OF TRUTH (MOT) Framework:
          - ZMOT (Zero): Research phase, search engines, reviews, social
          - FMOT (First): Purchase decision, store shelf, product page
          - SMOT (Second): Usage experience, unboxing, support

          KANO MODEL Integration:
          - Basic Expectations: Must be met (hygiene factors)
          - Satisfiers: More is better (linear relationship)
          - Delighters: Unexpected positives (exponential impact)

          EBF INTEGRATION:
          - EIT: n determines intervention targeting scope
          - STAGE: MOT maps to specific BCJ phases
          - WHEN: Phase-specific importance weights (MOT timing)

