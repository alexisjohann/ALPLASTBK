        validity: "Policy design, pricing, taxation, public goods"
        bib_keys: ["PAP-kasy2025adaptive", "PAP-vickrey1961counterspeculation", "PAP-clarke1971multipart", "PAP-groves1973incentives", "PAP-pigou1920welfare", "PAP-becker1964bdm"]
        der_proof: "DER §5.1"
        notes: "From Kasy CIFW05 2026. Unifies mechanism design (VCG, Pigou) with causal ML. Key insight: welfare ≠ reward because of distributional concerns."

      - id: MS-DML-001
