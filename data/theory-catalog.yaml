# =============================================================================
# CATEGORY 14: CAUSAL INFERENCE & HETEROGENEITY (6 Models)
# Defining Restriction: τ_i ≠ τ (effects vary by unit)
# Added: 2026-01-26 from CIFW05 Workshop (Yu Xie presentation)
# =============================================================================
  - id: CAT-14
    name: "Causal Inference & Heterogeneity"
    restriction: "τ_i ≠ τ (individual effects ≠ average effect)"
    validity_domain: "Social science causal inference, treatment effect estimation"
    theories:
      - id: MS-RCM-001
        name: "Rubin Causal Model (Potential Outcomes)"
        authors: "Rubin, Holland"
        year: 1974
        ebf_restrictions:
          SUTVA: "required"
          ignorability: "required for identification"
          causal_solution: "statistical (not scientific)"
        validity: "Randomized experiments, observational with strong ignorability"
        bib_keys: ["PAP-holland1986statistics", "rubin1974estimating"]
        der_proof: "DER §4.1"
        notes: "Holland (1986) distinguishes scientific vs statistical causal solutions. Scientific solution requires homogeneous units (physics); statistical solution needed for heterogeneous populations (social science)."

      - id: MS-HTE-001
        name: "Heterogeneous Treatment Effects (Population Thinking)"
        authors: "Xie, Brand"
        year: 2010
        ebf_restrictions:
          tau_i: "≠ tau (individual effects vary)"
          m_i: "context-dependent expectation (Galtonian)"
          variation: "phenomenon, not error (population thinking)"
        validity: "Any social intervention with heterogeneous response"
        bib_keys: ["PAP-xie2013population", "PAP-brand2010benefits", "PAP-xie2012estimating"]
        der_proof: "DER §4.2"
        notes: "Xie (2013) establishes that social science requires population thinking (m_i = context-dependent) vs typological thinking (m = fixed true value). Validates EBF context-first approach."

      - id: MS-HTE-002
        name: "Negative Selection in Returns"
        authors: "Brand, Xie"
        year: 2010
        ebf_restrictions:
          selection: "negative (least likely to treat benefit most)"
          HTE_pattern: "decreasing in propensity"
        validity: "Education returns, job training, social programs"
        bib_keys: ["PAP-brand2010benefits"]
        notes: "Those least likely to receive treatment often benefit most - key for targeting interventions."

      - id: MS-MTE-001
        name: "Marginal Treatment Effects"
        authors: "Heckman, Vytlacil, Zhou, Xie"
        year: 2005
        ebf_restrictions:
          MTE: "E[Y_1 - Y_0 | U_D = u]"
          U_D: "unobserved resistance to treatment"
          LATE: "weighted average of MTE"
        validity: "IV settings with essential heterogeneity"
        bib_keys: ["PAP-zhou2019marginal", "heckman2005structural"]
        der_proof: "DER §4.3"
        notes: "Unifies propensity score and MTE approaches. Key for understanding who is at the margin of treatment take-up."

      - id: MS-MTE-002
        name: "Self-Selection & Essential Heterogeneity"
        authors: "Zhou, Xie"
        year: 2020
        ebf_restrictions:
          selection: "on gains (people select based on expected benefit)"
          essential_heterogeneity: "treatment effect correlated with selection"
        validity: "Voluntary programs, self-selection into treatment"
        bib_keys: ["PAP-zhou2020heterogeneous"]
        notes: "Extends HTE to contexts with self-selection. Critical for EBF intervention take-up modeling."

      - id: MS-PSR-001
        name: "Population Statistical Realism (LLM Validation)"
        authors: "Xie"
        year: 2026
        ebf_restrictions:
          validation: "population-level patterns (not individual plausibility)"
          typological_bias: "LLMs collapse distributions, stereotype associations"
          SSDataBench: "5 pattern types for validation"
        validity: "AI-generated social science data, LLMMC validation"
        bib_keys: ["PAP-xie2013population"]
        notes: "From CIFW05 Workshop 2026. LLMs exhibit typological bias - validates need for CAL-5 (Population Statistical Realism) in LLMMC."

      - id: MS-COE-001
        name: "Causes of Effects (Probability of Causation)"
        authors: "Pearl, Dawid, Tian, Robins, Greenland"
        year: 2000
        ebf_restrictions:
          direction: "retrospective (effect → cause, not cause → effect)"
          estimand: "PN, PS, PNS (necessity, sufficiency, both)"
          conditioning: "on observed outcome Y=y, not just treatment"
          identification: "bounds from experimental + observational data"
        validity: "Legal causation, medical attribution, individual responsibility"
        bib_keys: ["PAP-pearl2015causes", "PAP-dawid2022effects", "PAP-tian2000probabilities", "PAP-greenland2000epidemiology", "PAP-dawid2015causes"]
        der_proof: "DER §4.4"
        notes: "From CIFW05 2026. Bridges statistics and law. PN = probability treatment was necessary for outcome. Key for individual attribution in EBF."

      - id: MS-COE-002
        name: "Posterior Causal Estimands"
        authors: "Luo, Geng, Dawid, Musio"
        year: 2025
        ebf_restrictions:
          conditioning: "on (X=x, Y=y), not just X=x"
          estimand: "E[Y(0) | X=1, Y=y] (counterfactual given realized outcome)"
          individualization: "probabilistic, not deterministic"
        validity: "Continuous outcomes, retrospective attribution, legal/medical"
        bib_keys: ["PAP-luo2025attribution", "PAP-luo2025missing", "PAP-dawid2022individual"]
        notes: "From CIFW05 2026. Extends PoC to continuous outcomes. Posterior causal estimands condition on both treatment AND outcome."

      - id: MS-COE-003
        name: "Legal Causation Doctrines"
        authors: "Hart, Honoré, Wright"
        year: 1985
        ebf_restrictions:
          but_for: "Y would not have occurred but for X"
          NESS: "X was necessary element of sufficient set"
          proximate: "X was not too remote from Y"
          standard: "balance of probabilities (civil) / beyond reasonable doubt (criminal)"
        validity: "Tort law, criminal law, regulatory enforcement"
        bib_keys: ["PAP-hart1985causation", "PAP-wright1985causation"]
        notes: "Legal doctrine perspective on individual causation. NESS test unifies but-for with overdetermination cases."

# =============================================================================
