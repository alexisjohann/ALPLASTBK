        authors: "Efferson, Bernhard, Fischbacher, Fehr"
        year: 2022
        ebf_restrictions:
          C_ij: "context-dependent (ingroup vs outgroup)"
          gamma_interaction: "> 0 (super-additive)"
          repeated_interactions: "necessary but not sufficient"
          intergroup_competition: "necessary but not sufficient"
        validity: "Cooperation evolution, ingroup favoritism, intergroup conflict"
        bib_keys: ["PAP-efferson2022superadditive"]
        notes: |
          KEY FINDING: Neither repeated interactions alone nor intergroup competition
          alone support cooperation. But COMBINING them creates super-additive effects.
          Ingroup: escalating reciprocity. Outgroup: de-escalating reciprocity.
          Validated in PNG field experiment (Ngenikas & Perepkas).

