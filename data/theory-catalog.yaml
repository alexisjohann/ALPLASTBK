  changelog:
    - version: "1.21"
      date: "2026-02-06"
      changes: "Added CAT-27 (Entrepreneurship & Innovation Under Uncertainty) with MS-ENT-001 (Pragmatist Entrepreneurship/Zellweger-Zenger 2023 AMR), MS-ENT-002 (Product-Market Fit as Inferential Problem), MS-ENT-003 (Entrepreneurial Heuristic Taxonomy). FOUNDATIONAL FRAMEWORK: Entrepreneur-as-scientist perspective. THREE ACTIONS: belief formation, belief testing, responding. THREE DOUBTS: product-market fit, feedback validity, response error. Bridges causation vs effectuation via pragmatism. KEY FORMALIZATION: V ∝ correlation(V(E), V(M)). Approval threshold 60-80%, rejection threshold 40%."
    - version: "1.20"
      date: "2026-02-05"
      changes: "Added MS-PP-006 (Populist Economic Damage Cycle/Funke-Schularick-Trebesch 2023 AER) and MS-PP-007 (Poverty-Extremism Causal Link/Dorn-Gstrein-Neumeier 2024) to CAT-21. MS-PP-006: -10% GDP after 15y, 25% autocracy risk, SCM, 51 governments, 120 years. MS-PP-007: +1pp poverty = +0.32pp AfD (IV estimation, causal). CRITICAL FOR SPÖ anti-populism strategy."
    - version: "1.19"
      date: "2026-02-05"
      changes: "Added CAT-25 (AI Consumer Experience) with MS-AI-001 (AI Consumer Experience Framework/Puntoni-Walker Reczek-Giesler-Botti 2021). FOUNDATIONAL FRAMEWORK: 4 AI Capabilities (listening/predicting/producing/communicating) → 4 Consumer Experiences (data_capture/classification/delegation/social). Each experience has benefit↔cost tension. KEY INSIGHT: AI is not neutral tool - creates social/individual challenges. 40+ research questions. APPLICATIONS: Privacy, algorithmic discrimination, skill atrophy, AI anthropomorphism."
    - version: "1.18"
      date: "2026-02-05"
      changes: "Added CAT-24 (Crisis Management & Online Communication) with MS-CM-001 (Firestorm Detection-Prevention-Mitigation/Herhausen et al. 2019) and MS-CM-002 (Customer Journey Segments/Herhausen et al. 2019). KEY FINDING: Explanation > Empathy for containing high-arousal emotions (counterintuitive). 3-PHASE MODEL: Detecting → Preventing → Mitigating. PARAMETERS: arousal_high_virality=0.186, tie_strength=1.432, empathy_effect=-0.069, explanation_effect=-0.011. TIMING: Compensation late=good, Apology early=good."
    - version: "1.17"
      date: "2026-02-05"
      changes: "Added CAT-22 (Moral Reasoning & Ethics) with MS-MR-001 (Context-Dependent Moral Reasoning/Bénabou-Falk-Henkel 2024). KEY FINDING: No stable moral types, cross-context correlations near zero (r≈0.035). EVM choices orthogonal to prosociality (r≈0.025). PARAMETERS: θ_lying=0.44, θ_bribe=0.38, θ_statement=0.28, θ_group=0.20. IMPLICATIONS: Cannot assume Kantian vs Utilitarian types; context determines moral reasoning."
    - version: "1.16"
      date: "2026-02-04"
      changes: "Added MS-IB-018 (Fear of Asking/Bénabou-Jaroszewicz-Loewenstein 2022) to CAT-09 Identity & Self-Image. FEAR OF ASKING MODEL: U_R = wh + ψ(F), U_S = (gw-c)h + μφ(F). KEY MECHANISMS: rejection sensitivity λα, discouragement effect (w*_N > w*_O), waiting trap equilibrium, asking/offering thresholds. APPLICATIONS: welfare non-take-up, workplace help-seeking, healthcare avoidance, charitable giving."
    - version: "1.15"
      date: "2026-02-04"
      changes: "Added 4 Identity & Self-Image theories from Bénabou & Henkel (2025) Handbook chapter: MS-IB-014 (Self-Signaling/Bodner-Prelec), MS-IB-015 (Diagnostic Utility/Dillenberger-Sadowski), MS-IB-016 (Information Avoidance/Golman-Hagmann-Loewenstein), MS-IB-017 (Unified Self-Image Framework/Bénabou-Henkel). COMPREHENSIVE FRAMEWORK: U = u(a,θ) + μ·v(σ). KEY MECHANISMS: anticipatory utility, self-signaling, motivated beliefs, information avoidance, dual-self models."
    - version: "1.14"
      date: "2026-02-02"
      changes: "Added CAT-21 (Political Psychology & Authoritarianism) with 5 theories: MS-PP-001 (Right-Wing Authoritarianism/Altemeyer), MS-PP-002 (Social Dominance Orientation/Sidanius-Pratto), MS-PP-003 (Conspiracy Mentality), MS-PP-004 (Populism Theory/Mudde), MS-PP-005 (Generalized Prejudice Model). KEY AUSTRIA DATA: 47% Great Replacement belief, 31% antisemitism, 10% extreme right. Papers: Aichholzer 2024, AUTNES 2025, DÖW 2024, IFES 2022, Kerr 2021, Kleppestø 2024."
    - version: "1.13"
      date: "2026-01-31"
      changes: "Added CAT-20 (Labor Market & Migration Economics) with 4 theories: MS-LM-001 (Places vs People Framework from Dustmann et al. 2025), MS-LM-002 (Immigration Wage Distribution), MS-LM-003 (Local Labor Market Adjustment), MS-LM-004 (Temporary Migration). KEY INSIGHT: Regional vs worker-level studies measure DIFFERENT things - places vs people."
    - version: "1.12"
      date: "2026-01-30"
      changes: "Enhanced MS-TP-009 (Rational Addiction) with Hai & Heckman (2022) NBER WP 30304. STRUCTURAL MODEL of bidirectional addiction↔education causality. KEY INNOVATION: Endogenous β(q,θ) where addiction increases myopia. PARAMETERS: δ_q=0.43, κ_q=0.00038, ν_n=-0.00816 (non-cog reduces smoking, cognitive≈0). FINDINGS: +1yr education→-8pp smoking; 40% excise tax achieves similar effects as eliminating smoking."
    - version: "1.11"
      date: "2026-01-30"
      changes: "Added PAP-heckman2022econometrics (NBER WP 29787) to MS-EC-001 bib_keys. COMPREHENSIVE FRAMEWORK COMPARISON: (1) Econometric handles simultaneity + P1-P4, (2) Neyman-Rubin limited to P1-P2, (3) Pearl DAG cannot handle cycles. KEY: Fixing ≠ Conditioning; LATE is instrument-dependent. Complements PAP-heckman2024causality."
    - version: "1.10"
      date: "2026-01-30"
      changes: "Enhanced MS-SF-003 (Dynamic Complementarity) with full decomposition from Heckman et al. (2025) RFBerlin DP 95/25. Added bib_key PAP-heckman2025dynamic. DECOMPOSITION: DC = P(a)·Q(a+j)·f₁,₂(a+j) where P=productivity, Q=transmission, f₁,₂=static complementarity. KEY FINDING: γ_low > γ_normal > γ_high (disadvantaged benefit most)."
    - version: "1.9"
      date: "2026-01-30"
      changes: "Added MS-IR-001 (Imperfect Randomization Inference from Heckman, Pinto & Shaikh 2023 NBER WP) to CAT-18. Provides methodology for valid causal inference when randomization is imperfect using partial identification and symmetry-based testing. CRITICAL FOR INTERVENTION EVALUATION."
