# Learning Configuration
learning:
  enabled: true
  log_file: "data/theory-learning-log.yaml"
  thresholds:
    deviation_warning: 10    # % deviation triggers logging
    deviation_review: 20     # % deviation triggers review recommendation
    deviation_critical: 50   # % deviation triggers parameter update recommendation
  sources:
    - project_results        # /intervention-manage close
    - paper_sync             # bcm_master.bib theory_support field
    - parameter_updates      # Meta-analyses, replications
    - new_theories           # EIP-validated concepts
  auto_sync:
    papers: true             # Auto-sync papers on commit
    parameters: false        # Manual review required

# =============================================================================
# CATEGORY 1: CLASSICAL ECONOMICS (12 Models)
# Defining Restriction: C_ij = 0, Ψ exogenous
# =============================================================================
categories:
  - id: CAT-01
    name: "Classical Economics"
    restriction: "C_ij = 0, Ψ exogenous"
    validity_domain: "Large anonymous markets, price-taking agents"
    theories:
      - id: MS-CL-001
        name: "Arrow-Debreu General Equilibrium"
        authors: "Arrow, Debreu"
        year: 1954
        ebf_restrictions:
          C_ij: 0
          psi: "exogenous"
          lambda: 1
          beta: 1
        validity: "Complete markets, perfect competition"
        bib_keys: ["arrow1954existence", "debreu1959theory"]
        der_proof: "DER §3.1"

      - id: MS-CL-002
        name: "Expected Utility Theory"
