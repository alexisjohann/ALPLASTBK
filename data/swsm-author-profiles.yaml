# ═══════════════════════════════════════════════════════════════════════════
# SWSM AUTHOR PROFILES
# ═══════════════════════════════════════════════════════════════════════════
#
# Persönliche Schreibstil-Profile basierend auf Korpusanalyse.
# Jedes Profil ist ein Vektor θ ∈ R^n der aus N Papers extrahiert wird.
#
# Verwendung:
#   generate_text(content, author="fehr")
#   generate_text(content, author=interpolate(["fehr", "thaler"], [0.7, 0.3]))
#
# Unterschied zu Genre Profiles (swsm-genre-profiles.yaml):
#   - AUTHOR = WIE geschrieben wird (Stil, Vokabular, Satzlänge)
#   - GENRE = WAS geschrieben wird (Struktur, Moves, Constraints)
#
# Kombination:
#   θ_final = θ_genre ⊕ θ_author
#   (Genre-Constraints + persönlicher Stil)
#
# Extraktion:
#   python scripts/swsm_extract_profile.py --author "Fehr" --output fehr
#
# Referenz: Appendix SW (METHOD-SWSM)
# ═══════════════════════════════════════════════════════════════════════════

metadata:
  version: "1.0.0"
  created: "2026-01-29"
  description: "SWSM Author Writing Style Profiles - Personal Style Parameters"
  ssot: "appendices/SW_METHOD-SWSM_scientific_writing_structure_model.tex"
  related:
    genre_profiles: "data/swsm-genre-profiles.yaml"

# ═══════════════════════════════════════════════════════════════════════════
# PARAMETER SCHEMA DEFINITION
# ═══════════════════════════════════════════════════════════════════════════

parameter_schema:
  description: "Definition aller extrahierbaren Stil-Parameter"

  # ─────────────────────────────────────────────────────────────────────────
  # θ_MOVE: Rhetorische Move-Parameter (aus E3 CARS Tagger)
  # ─────────────────────────────────────────────────────────────────────────
  theta_move:
    territory:
      length_sentences:
        type: float
        unit: sentences
        description: "Durchschnittliche Länge des Territory-Moves"
      strategy_distribution:
        type: distribution
        categories: [centrality_claiming, topic_generalization, literature_review]

    niche:
      marker_distribution:
        type: distribution
        categories: [however, yet, but, nevertheless, although, other]
      strategy_distribution:
        type: distribution
        categories: [counter_claiming, gap_indication, question_raising]

    occupy:
      strategy_distribution:
        type: distribution
        categories: [purpose_statement, findings_preview, structure_indication]
      hypothesis_explicit:
        type: float
        range: [0, 1]

  # ─────────────────────────────────────────────────────────────────────────
  # θ_COHESION: Kohäsions-Parameter (aus E5 Cohesion Analyzer)
  # ─────────────────────────────────────────────────────────────────────────
  theta_cohesion:
    lexical_density:
      type: float
      range: [0.40, 0.75]
      description: "Content words / Total words"

    reference_chain_length:
      type: float
      unit: sentences

    conjunction_frequency:
      type: float
      unit: per_clause

  # ─────────────────────────────────────────────────────────────────────────
  # θ_RST: Diskurs-Struktur-Parameter (aus E2 RST Parser)
  # ─────────────────────────────────────────────────────────────────────────
  theta_rst:
    relation_distribution:
      type: distribution
      categories: [elaboration, evidence, cause, result, contrast, concession, condition, purpose, background, temporal]

    tree_depth_mean:
      type: float

    nucleus_satellite_ratio:
      type: float

  # ─────────────────────────────────────────────────────────────────────────
  # θ_LEXICOGRAMMAR: Lexikogrammatische Parameter (aus E6/E7)
  # ─────────────────────────────────────────────────────────────────────────
  theta_lexicogrammar:
    nominalization_rate:
      type: float
      range: [0, 0.15]

    passive_rate:
      type: float
      range: [0, 0.40]

    hedging_density:
      type: float
      range: [0, 0.30]
      unit: per_clause

    sentence_length:
      mean:
        type: float
        unit: words
        range: [8, 45]
      std:
        type: float

    mood_distribution:
      type: distribution
      categories: [declarative, interrogative, imperative]

  # ─────────────────────────────────────────────────────────────────────────
  # θ_INFO: Informationsstruktur-Parameter (aus E6)
  # ─────────────────────────────────────────────────────────────────────────
  theta_info:
    given_new_ratio:
      type: float
      range: [0.3, 2.0]

    theme_type_distribution:
      type: distribution
      categories: [topical, textual, interpersonal]

  # ─────────────────────────────────────────────────────────────────────────
  # θ_VOCAB: Vokabular-Parameter
  # ─────────────────────────────────────────────────────────────────────────
  theta_vocab:
    type_token_ratio:
      type: float
      range: [0.30, 0.80]

    first_person_usage:
      type: float
      range: [0, 15]
      unit: per_1000_words

    technical_term_density:
      type: float
      range: [0.5, 25]
      unit: per_100_words

# ═══════════════════════════════════════════════════════════════════════════
