# ═══════════════════════════════════════════════════════════════════════════
# PROFILE OPERATIONS
# ═══════════════════════════════════════════════════════════════════════════

operations:

  # Interpolate between authors
  interpolate:
    formula: "θ_hybrid = Σ(w_i × θ_i) where Σw_i = 1"
    example: "0.7 * fehr + 0.3 * thaler"
    description: "Blend writing styles from multiple authors"

  # Calculate distance between profiles
  distance:
    formula: "d(θ_a, θ_b) = √(Σ(θ_a_i - θ_b_i)²)"
    description: "Euclidean distance in θ-space"

  # Adapt profile to genre constraints
  adapt:
    formula: "θ_adapted = θ_author ⊕ constraints(genre)"
    description: "Modify personal style to fit genre requirements"

# ═══════════════════════════════════════════════════════════════════════════
# PROFILE COMPARISON TABLE
# ═══════════════════════════════════════════════════════════════════════════

comparison:
  description: "Key differences between author profiles"

  table:
    - author: fehr
      lexical_density: 0.662
      nominalization: 0.077
      passive_rate: 0.125
      hedging: 0.125
      sentence_length: 16.2
      first_person: 1.5

    - author: thaler
      lexical_density: 0.624
      nominalization: 0.026
      passive_rate: 0.000
      hedging: 0.000
      sentence_length: 9.8
      first_person: 6.8

    - author: kahneman
      lexical_density: 0.645
      nominalization: 0.052
      passive_rate: 0.085
      hedging: 0.095
      sentence_length: 14.5
      first_person: 3.2

    - author: sunstein
      lexical_density: 0.658
      nominalization: 0.065
      passive_rate: 0.095
      hedging: 0.080
      sentence_length: 18.5
      first_person: 2.5

  distances:
    - pair: [fehr, thaler]
      distance: 0.47
      interpretation: "Formal vs. accessible styles"

    - pair: [fehr, kahneman]
      distance: 0.28
      interpretation: "Similar formality, different domains"

    - pair: [thaler, sunstein]
      distance: 0.35
      interpretation: "Both policy-focused but different registers"

    - pair: [kahneman, sunstein]
      distance: 0.31
      interpretation: "Both systematic, different disciplinary norms"

# ═══════════════════════════════════════════════════════════════════════════
# EXTRACTION CONFIGURATION
# ═══════════════════════════════════════════════════════════════════════════

extraction:
  description: "Configuration for profile extraction from corpus"

  minimum_corpus_size: 5
  recommended_corpus_size: 25
  optimal_corpus_size: 50

  convergence_threshold: 0.05
  confidence_level: 0.95

  script: "scripts/swsm_extract_profile.py"
  output_format: "yaml"

  validation:
    cross_validation: true
    k_folds: 5
    holdout_ratio: 0.2
