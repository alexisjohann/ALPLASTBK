# ============================================================================
# EBF CASE REGISTRY SCHEMA
# ============================================================================
#
# ACHTUNG: Diese Datei ist die EINZIGE autoritative Quelle für die Struktur
# der Case Registry Datenbank. Alle YAML Einträge in data/case-registry.yaml
# MÜSSEN mit dieser Definition konsistent sein.
#
# Version: 1.0
# Erstellt: 2026-01-18
# ============================================================================

version: "1.0"
created: "2026-01-18"
description: "Authoritative schema for EBF Case Registry database (100+ case studies)"

# ============================================================================
# CORE ENTITIES
# ============================================================================

entities:

  # =========================================================================
  # CASE ENTITY: Master record for each case study
  # =========================================================================
  Case:
    description: "A real-world example or case study indexed by 10C Framework"
    required_fields:
      id:
        type: string
        pattern: "^CASE-[0-9]{3,4}$"
        example: "CASE-001"
        immutable: true
        description: "Unique case identifier"

      name:
        type: string
        min_length: 10
        max_length: 200
        description: "Descriptive name of the case"

      description:
        type: string
        min_length: 50
        max_length: 2000
        description: "Detailed description of the case context and findings"

      domain:
        type: array
        items:
          type: enum
          allowed: ["finance", "health", "sustainability", "hr", "social_policy", "education", "anthropology", "behavior", "other"]
        min_items: 1
        max_items: 5
        description: "Primary domain(s) of the case"

    optional_fields:
      superkey:
        type: string
        pattern: "^[a-z_]+:[a-z_]+:[L0-3]:[a-z_]+:[a-z_]+:[a-z_]+$"
        example: "anthropology:structural:L2:complexity:cross-cultural:culture"
        description: "Hierarchical index key: domain:subtype:level:primary_concept:context:intervention_type"

      tags:
        type: array
        items:
          type: string
        max_items: 15
        description: "Searchable tags for discovery"

  # =========================================================================
  # NINE_C_SPECIFICATION ENTITY: Full 10C mapping for the case
  # =========================================================================
  NineC_Specification:
    description: "Complete 10C Framework mapping for this case"
    required_fields:
      WHO:
        type: object
        required_fields:
          levels:
            type: array
            items:
              type: enum
              allowed: ["individual", "dyad", "group", "society"]
            min_items: 1
            description: "Which welfare levels affected?"
          heterogeneity:
            type: enum
            allowed: ["high", "medium", "low"]
            description: "Diversity within the population"
        optional_fields:
          segments:
            type: array
            items:
              type: string
            description: "Population segments (present-biased, loss-averse, etc.)"
          N_L0:
            type: integer
            description: "Estimated individuals at L0"
          N_L1:
            type: integer
            description: "Estimated dyads at L1"
          N_L2:
            type: integer
            description: "Estimated groups at L2"

      WHAT:
        type: object
        required_fields:
          dimensions:
            type: array
            items:
              type: enum
              allowed: ["F", "E", "P", "S", "D", "E2"]
            min_items: 1
            description: "FEPSDE dimensions involved"
          primary:
            type: string
            description: "Primary utility dimension (e.g., 'cognitive_load', 'savings_rate')"
        optional_fields:
          secondary:
            type: array
            items:
              type: string
          weights:
            type: object
            additional_properties:
              type: number  # β weights for each dimension
              min: 0.0
              max: 1.0

      HOW:
        type: object
        required_fields:
          gamma_avg:
            type: number
            min: -1.0
            max: 1.0
            description: "Average complementarity coefficient"
        optional_fields:
          interaction:
            type: enum
            allowed: ["complementary", "substitutable", "independent", "mixed"]
          gamma_matrix:
            type: object
            additional_properties:
              type: object
              additional_properties:
                type: number  # γ_ij values
                min: -1.0
                max: 1.0
            description: "Full γ interaction matrix"

      WHEN:
        type: object
        optional_fields:
          psi_dominant:
            type: enum
            allowed: ["framing", "social_context", "scarcity", "cultural", "institutional", "temporal", "information", "other"]
            description: "Which Ψ context dimension dominates?"
          temporal:
            type: enum
            allowed: ["acute", "chronic", "seasonal", "stable", "variable"]
            description: "Temporal stability of the context"
          social_setting:
            type: enum
            allowed: ["solo", "dyadic", "small_group", "large_group", "public", "anonymous"]
          cultural_type:
            type: enum
            allowed: ["WEIRD", "non-WEIRD", "mixed"]
          institutional_framework:
            type: string
            description: "Type of institutions (e.g., 'market', 'hierarchy', 'clan')"

      WHERE:
        type: object
        optional_fields:
          source:
            type: enum
            allowed: ["literature", "experiment", "field_study", "admin_data", "qualitative", "mixed"]
            description: "Where did the data come from?"
          confidence:
            type: enum
            allowed: ["high", "medium", "low"]
          parameters:
            type: object
            additional_properties:
              type: object
              fields:
                value: number
                source: string
                confidence: enum ["high", "medium", "low"]

      AWARE:
        type: object
        optional_fields:
          A_level:
            type: number
            min: 0.0
            max: 1.0
            description: "Awareness level (0=unaware, 1=fully aware)"
          awareness_type:
            type: enum
            allowed: ["explicit", "implicit", "visceral"]
          improvement_potential:
            type: number
            min: 0.0
            max: 1.0
            description: "How much could awareness improve? (1.0 = from 0→1)"

      READY:
        type: object
        optional_fields:
          W_level:
            type: number
            min: 0.0
            max: 1.0
            description: "Willingness/capacity level"
          theta:
            type: number
            description: "Behavioral threshold (context-dependent)"
          barriers:
            type: array
            items:
              type: string
            description: "Identified barriers to readiness"
          facilitators:
            type: array
            items:
              type: string
            description: "Factors enabling readiness"

      STAGE:
        type: object
        optional_fields:
          phase:
            type: enum
            allowed: ["awareness", "contemplation", "preparation", "action", "maintenance", "termination"]
            description: "Behavior change journey phase"
          stability:
            type: enum
            allowed: ["transient", "unstable", "moderately_stable", "stable", "entrenched"]
          duration:
            type: string
            example: "6 months"
          transitions:
            type: array
            items:
              type: object
              fields:
                from_phase: string
                to_phase: string
                success_rate: number  # 0-1
                time: string

      HIERARCHY:
        type: object
        optional_fields:
          primary_level:
            type: enum
            allowed: ["L0", "L1", "L2", "L3"]
            description: "Which welfare level is primary focus?"
          level_interactions:
            type: array
            items:
              type: object
              fields:
                from_level: enum ["L0", "L1", "L2", "L3"]
                to_level: enum ["L0", "L1", "L2", "L3"]
                effect: string
                direction: enum ["positive", "negative", "mixed"]
          strategic_ordering:
            type: array
            items:
              type: enum
              allowed: ["L0", "L1", "L2", "L3"]
            description: "Recommended intervention sequencing across levels"

  # =========================================================================
  # INSIGHT & IMPLICATION ENTITY
  # =========================================================================
  InsightAndImplication:
    description: "Key insights and policy implications from the case"
    required_fields:
      insight:
        type: string
        min_length: 50
        max_length: 500
        description: "Main insight from this case"

    optional_fields:
      implication:
        type: string
        max_length: 1000
        description: "Policy or practice implications"

      transferability:
        type: object
        fields:
          scope: enum ["local", "regional", "national", "global"]
          conditions: string
            description: "Under what conditions does this transfer?"
          limitations: string
            description: "When does it NOT transfer?"

  # =========================================================================
  # FORMULA ENTITY: Quantitative formalization of the case
  # =========================================================================
  Formula:
    description: "Mathematical formalization of the case dynamics"
    required_fields:
      name:
        type: string
        description: "Name of the formula (e.g., 'L2-Formel (Westlich)')"

      formula:
        type: string
        description: "LaTeX-formatted formula"

    optional_fields:
      variables:
        type: object
        additional_properties:
          type: number
          description: "Specific parameter values used"

      interpretation:
        type: string
        max_length: 300

      validation_data:
        type: object
        fields:
          sources: array of string
          sample_size: integer
          effect_size: number

  # =========================================================================
  # REFERENCE ENTITY: Links to papers, appendices, chapters
  # =========================================================================
  References:
    description: "Cross-references to authoritative sources"
    optional_fields:
      appendices:
        type: array
        items:
          type: string
          pattern: "^[A-Z]$"
        description: "Relevant appendix codes"

      chapters:
        type: array
        items:
          type: integer
          min: 1
          max: 19
        description: "Relevant chapter numbers"

      cases:
        type: array
        items:
          type: string
          pattern: "^CASE-[0-9]{3,4}$"
        description: "Related case IDs"

      literature:
        type: array
        items:
          type: string
        description: "Paper IDs from paper-sources.yaml"

      interventions:
        type: array
        items:
          type: string
          pattern: "^PRJ-[0-9]{3,4}$"
        description: "Related intervention projects"

  # =========================================================================
  # SOURCE_TRACKING ENTITY
  # =========================================================================
  SourceTracking:
    description: "Where did this case come from and how verified is it?"
    optional_fields:
      source_paper:
        type: string
        pattern: "^[a-z0-9]+[a-z0-9]{4,20}$"
        description: "Paper ID if case extracted from paper"

      source_project:
        type: string
        pattern: "^PRJ-[0-9]{3,4}$"
        description: "Project ID if case documented from intervention"

      original_source:
        type: string
        max_length: 500
        description: "Free-text description of original source"

      verification_status:
        type: enum
        allowed: ["verified", "in_review", "flagged", "anecdotal"]

      last_verified:
        type: date
        format: "YYYY-MM-DD"

# ============================================================================
# RELATIONSHIPS (Foreign Keys & Constraints)
# ============================================================================

relationships:
  Case_NineC:
    from: Case
    to: NineC_Specification
    cardinality: "1:1"
    description: "Each case has one complete 10C specification"

  Case_Insights:
    from: Case
    to: InsightAndImplication
    cardinality: "1:1"
    description: "Each case has insights and implications"

  Case_Formulas:
    from: Case
    to: Formula
    cardinality: "1:N"
    description: "A case can have multiple formalizations"

  Case_References:
    from: Case
    to: References
    cardinality: "1:1"
    description: "Each case has reference mappings"

  Case_PaperSource:
    from: Case
    to: Paper
    cardinality: "N:1"
    foreign_key: "source_paper → paper-sources.yaml:id"
    description: "Case can be linked to paper source"

  Case_Project:
    from: Case
    to: Intervention
    cardinality: "N:1"
    foreign_key: "source_project → intervention-registry.yaml:id"
    description: "Case can document a project outcome"

# ============================================================================
# CONSTRAINTS & VALIDATION RULES
# ============================================================================

constraints:
  case_id_uniqueness:
    rule: "Case IDs must be globally unique"
    check: "UNIQUE constraint on id"

  superkey_format:
    rule: "Superkey must follow hierarchical format"
    pattern: "^[a-z_]+:[a-z_]+:[L0-3]:[a-z_]+:[a-z_]+:[a-z_]+$"

  nine_c_completeness:
    rule: "All 9 10C dimensions should be addressed (may be null)"
    check: "WHO, WHAT, HOW, WHEN, WHERE, AWARE, READY, STAGE, HIERARCHY present"

  dimension_validity:
    rule: "FEPSDE dimensions must be F, E, P, S, D, or E2"
    check: "Enum validation on all dimension arrays"

  gamma_range:
    rule: "Complementarity coefficients must be [-1, 1]"
    check: "-1.0 <= gamma <= 1.0"

  awareness_levels:
    rule: "A_level and W_level must be [0, 1]"
    check: "0.0 <= A_level <= 1.0 AND 0.0 <= W_level <= 1.0"

  reference_validity:
    rule: "All referenced appendix codes must be valid"
    check: "Appendix code must exist in appendices/00_appendix_index.tex"

  paper_reference_validity:
    rule: "Literature references must exist in paper-sources.yaml"
    check: "Foreign key: literature[*] → paper-sources.yaml:id"

  case_reference_validity:
    rule: "Case cross-references must exist"
    check: "Foreign key: cases[*] → case-registry.yaml:id"

  domain_coverage:
    rule: "Case must have at least one domain"
    check: "COUNT(domain) >= 1"

  formula_validation:
    rule: "Formulas with variables must have all variables defined"
    check: "KEYS(formula) ⊆ KEYS(variables)"

# ============================================================================
# DATABASE OPERATIONS
# ============================================================================

operations:
  CREATE:
    required_fields: ["id", "name", "description", "domain", "10C"]
    validation: "All required fields must be present and valid"

  UPDATE:
    immutable_fields: ["id"]
    mutable_fields: ["name", "description", "10C", "insights", "formulas"]
    note: "Major content changes should create a new case version"

  DELETE:
    rule: "Soft-delete only: archive case but maintain references"
    rationale: "Cases may be referenced by papers and interventions"

  QUERY:
    supported_queries:
      - "SELECT * FROM cases WHERE domain = 'finance'"
      - "SELECT * FROM cases WHERE 10C.WHAT.primary_dimension = 'F'"
      - "SELECT * FROM cases WHERE 10C.WHEN.psi_dominant = 'framing'"
      - "SELECT * FROM cases WHERE 10C.WHO.levels CONTAINS 'L2'"
      - "SELECT * FROM cases ORDER BY case_count DESC"
      - "SELECT * FROM cases WHERE tags CONTAINS 'default'"

  BULK_OPERATIONS:
    similarity_search: "Find cases with same 10C profile"
    cross_reference_validation: "Verify all paper and project links"

# ============================================================================
# SCHEMA VALIDATION RULES
# ============================================================================

validation_rules:
  rule_1:
    description: "Case ID must be unique"
    check: "UNIQUE constraint on id"

  rule_2:
    description: "Case must have at least one domain"
    check: "COUNT(domain) >= 1"

  rule_3:
    description: "All 10C dimensions should be addressed (some may be null)"
    check: "WHO, WHAT, HOW, WHEN, WHERE present"

  rule_4:
    description: "Gamma coefficient must be in [-1, 1]"
    check: "-1.0 <= gamma_avg <= 1.0"

  rule_5:
    description: "Awareness and willingness levels must be in [0, 1]"
    check: "0.0 <= A_level <= 1.0 AND 0.0 <= W_level <= 1.0"

  rule_6:
    description: "Superkey must follow hierarchical format"
    pattern: "^[a-z_]+:[a-z_]+:[L0-3]:[a-z_]+:[a-z_]+:[a-z_]+$"

  rule_7:
    description: "Referenced papers must exist in paper-sources.yaml"
    check: "literature[*] → paper-sources.yaml"

  rule_8:
    description: "Referenced appendices must be valid"
    check: "appendices[*] must be single letter A-Z"

  rule_9:
    description: "Formula variables must be completely defined"
    check: "KEYS(formula_variables) must match formula placeholders"

  rule_10:
    description: "Referenced levels must be L0, L1, L2, or L3"
    check: "Enum validation on all level references"

# ============================================================================
# QUALITY ASSURANCE CHECKLIST
# ============================================================================

qa_checklist:
  - "All 100+ cases have valid IDs (CASE-XXX format)"
  - "All cases have domain classification"
  - "All cases have complete 10C specification"
  - "Primary dimension in WHAT is single FEPSDE code"
  - "Gamma coefficients are in [-1, 1] range"
  - "A_level and W_level are in [0, 1]"
  - "All paper references exist in paper-sources.yaml"
  - "All appendix references are valid codes"
  - "Superkeys follow hierarchical format"
  - "No duplicate case IDs"

# ============================================================================
# MIGRATION & VERSIONING
# ============================================================================

versioning:
  current_version: "1.0"
  backward_compatible: true
  migration_notes: |
    No previous version.
    Initial schema created January 18, 2026 to standardize 100+ cases.

---

**SCHEMA DEFINITION COMPLETE**

This schema defines the authoritative structure for the Case Registry.
It ensures consistency, completeness, and validity of all 100+ cases.

