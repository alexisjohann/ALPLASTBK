# Stakeholder Behavior Models Registry
# 12 Stakeholder Types with 10C CORE Profiles and Decision Functions
# Version: 1.0
# Created: 2026-01-16

---
# ============================================================================
# TIER 1: STRATEGIC DECISION-MAKERS
# ============================================================================

stakeholder_models:

  # ========================================================================
  # 1. BOARD OF DIRECTORS
  # ========================================================================

  board_of_directors:
    name: "Board of Directors"
    tier: "Strategic"
    primary_decision: "strategy_approval"
    decisions:
      - "Capex Authorization (€150M+)"
      - "Quarterly Strategy Review"
      - "Risk Tolerance Adjustment"
      - "Governance Gate Approval (Phase 1→2→3)"
      - "Executive Compensation Tied to Model"

    nine_c_profile:
      who:
        welfare_level: "L3"  # Top strategic level
        decision_authority: 1.0  # Full authority
        number_of_members: 8
        diversity:
          financial_expertise: 0.9
          operational_expertise: 0.7
          technology_expertise: 0.5

      what:
        utility_dimensions:
          F_financial: 0.70  # Revenue growth, profitability
          D_diversity: 0.15  # Board diversity, stakeholder diversity
          S_scale: 0.10  # Market share, organizational scale
          E_environmental: 0.03  # ESG, sustainability
          P_privacy: 0.01  # Data privacy
          E2_equity: 0.01  # Internal equity
        strategic_priority: "Shareholder value + sustainable growth"

      how:
        complementarities:
          capex_revenue: 0.62  # Capex amplifies revenue by 62%
          org_capability: 0.48  # Org capability limits capex ROI
          innovation_talent: 0.75  # Talent quality drives innovation
        decision_coupling:
          with_management: 0.8  # Highly coupled with exec team
          with_board_committees: 0.9  # Full committee integration

      when:
        context_sensitivity:
          economic_Psi1: 0.85  # GDP, interest rates, inflation
          market_Psi2: 0.75  # Competitive moves, industry trends
          regulatory_Psi6: 0.90  # Governance, compliance requirements
          technology_Psi7: 0.60  # Digital transformation pace
        context_shock_threshold: 2.0  # σ > 2.0 triggers emergency review

      where:
        parameter_uncertainty:
          CAGR_E_theta: 0.8  # ±0.8pp acceptable confidence
          capex_E_theta: 5.0  # ±€5M acceptable range
          headcount_E_theta: 100  # ±100 FTE
          required_confidence: 0.80  # 80% minimum confidence for approval
        parameter_error_tolerance: "±2% revenue MAPE"

      aware:
        baseline_awareness: 0.85  # Board gets full briefings
        information_sources:
          - "Executive dashboard (monthly)"
          - "Board presentation (quarterly)"
          - "Ad-hoc briefings (as needed)"
          - "Industry reports, media"
        awareness_building_timeline: "2-4 weeks pre-decision"

      ready:
        capability_theta: 0.90  # Full resources, authority, expertise
        willingness_theta: 0.85  # Reputation at stake, accountability
        readiness_score: 0.765  # θ_cap × θ_will
        constraints:
          - "Calendar availability (board meets 6-8x/year)"
          - "Committee review cycles (2 weeks)"

      stage:
        change_journey_stage: 4  # Acceptance (mostly convinced)
        progress_to_decision: 0.85
        timeline_to_action: "2 weeks post-board decision"

      hierarchy:
        decision_level: "L0/L1"  # Strategic C-suite
        l2_decisions_coordinated: 180  # Approves 180+ coordinated L2 decisions
        approval_voting_rule: "8/8 (consensus)" or "7/8 (super-majority)"

    decision_function:
      model: "Logistic Regression"
      formula: "P(Approve) = sigmoid(β₀ + β₁×WHERE + β₂×WHEN + β₃×HOW + β₄×HIERARCHY + β₅×AWARE + β₆×READY)"
      parameters:
        β₀_intercept: -0.50
        β₁_WHERE_confidence: 1.25  # Biggest driver: confidence in numbers
        β₂_WHEN_economic_risk: -0.85  # Economic uncertainty reduces approval
        β₃_HOW_org_capability: 0.95  # Need proven execution capability
        β₄_HIERARCHY_clarity: 1.10  # Clear governance gates increase approval
        β₅_AWARE_briefing: 0.75  # Full briefing required
        β₆_READY_vote_likelihood: 0.90  # Internal polling matters

      approval_thresholds:
        high_confidence: "> 0.80"  # "Green light, present to full board"
        moderate_confidence: "0.65-0.80"  # "Needs more work, request revisions"
        low_confidence: "< 0.65"  # "Red light, reject or defer"

      example_calculation:
        scenario: "ALPLA Phase 1 Capex Approval"
        inputs:
          WHERE_confidence: 0.82  # CAGR ±0.8pp (82% confident)
          WHEN_economic_risk: 0.25  # GDP conservative assumption (low risk)
          HOW_org_capability: 0.85  # γ_rev-org=0.68, proven in pilot
          HIERARCHY_clarity: 0.90  # Phase gates Q4 2026, Q4 2029 defined
          AWARE_briefing: 0.95  # Full board briefing completed
          READY_vote_likelihood: 0.88  # Poll shows 8/10 likely yes
        output:
          P_approve: 0.843  # 84.3% approval probability
          confidence_level: "HIGH"

    awareness_readiness_mapping:
      awareness_levels:
        unaware: "Have not heard of proposal"
        partial: "Heard about it, unclear details"
        informed: "Attended briefing, understand strategy"
        expert: "Deep understanding, active in design"

      readiness_components:
        capability:
          - "Access to financial models (✓)"
          - "Attendance at board meetings (✓)"
          - "Committee expertise to evaluate (✓)"
        willingness:
          - "Fiduciary duty to evaluate (✓)"
          - "Personal reputation at stake (✓)"
          - "Bonus tied to strategy execution (✓)"

    change_journey:
      stage_1_awareness:
        status: "COMPLETE"
        timeline: "Month -3 to -2"
        activity: "Initial communication about strategic initiative"
      stage_2_understanding:
        status: "IN PROGRESS"
        timeline: "Month -2 to -1"
        activity: "Board education sessions, model walkthrough"
      stage_3_consideration:
        status: "ACTIVE"
        timeline: "Month -1"
        activity: "Board committees evaluating proposal"
      stage_4_acceptance:
        status: "EXPECTED"
        timeline: "Month -1 to 0"
        activity: "Psychological acceptance, risk comfort"
      stage_5_decision:
        status: "NEXT"
        timeline: "Month 0 (Board meeting)"
        activity: "Voting on capex authorization"

    red_flags_escalation:
      critical:
        - name: "Parameter confidence < 70%"
          action: "Reject proposal, request additional validation"
          timeline: "Immediate"
        - name: "ΔP > ±5% in first quarter"
          action: "Monthly governance gates (vs quarterly)"
          timeline: "Implementation"
      high:
        - name: "WHEN context shock (Ψ changes)"
          action: "Require reforecast before next board meeting"
          timeline: "1 week"
        - name: "HIERARCHY N_L2 > 200 decisions"
          action: "Add monthly gates, not just quarterly"
          timeline: "Planning"
      medium:
        - name: "HOW org capability doubts"
          action: "Require org readiness assessment"
          timeline: "2 weeks pre-decision"

    success_metrics:
      approval_prediction_accuracy: "±15pp"  # Predict actual votes within ±15%
      board_confidence_trajectory: "≥ 80% for approval"
      implementation_track_record: "After Q1 actual: update approval prob if ΔP > ±5%"

  # ========================================================================
  # 2. C-SUITE (CEO/CFO/COO)
  # ========================================================================

  c_suite:
    name: "C-Suite (CEO/CFO/COO/CRO)"
    tier: "Strategic"
    primary_decision: "risk_mitigation"
    decisions:
      - "Monthly Risk Escalation"
      - "Parameter Update Approval"
      - "Governance Gate Checkpoints"
      - "Corrective Action Triggers"
      - "Stakeholder Communication Strategy"

    nine_c_profile:
      who:
        welfare_level: "L1/L2"  # Operational + strategic
        decision_authority: 0.95  # Near-full authority (reports to board)
        number_of_members: 4
        diversity:
          financial_expertise: 1.0
          operational_expertise: 0.9
          technology_expertise: 0.6

      what:
        utility_dimensions:
          F_financial: 0.75  # Shareholder value, bonus structure
          D_diversity: 0.10  # Organization health
          S_scale: 0.10  # Strategic growth
          E_environmental: 0.05  # ESG performance
        strategic_priority: "Execution against plan + manage downside risk"

      how:
        complementarities:
          parameter_org_alignment: 0.85  # Parameter updates affect org decisions
          capex_revenue_execution: 0.70  # Can flex execution vs. budget
        decision_coupling:
          with_board: 0.95  # Reports directly to board
          with_regional_leaders: 0.80  # Manages regions

      when:
        context_sensitivity:
          economic_Psi1: 0.95  # GDP, rates → CFO most sensitive
          market_Psi2: 0.80  # Competitor moves
          regulatory_Psi6: 0.90  # Compliance, governance
        context_shock_threshold: 1.5  # σ > 1.5 triggers C-suite review

      where:
        parameter_uncertainty:
          acceptable_E_theta: 0.9  # Tighter than board (±0.9pp CAGR)
          parameter_drift_tolerance: "2σ triggers regime change detection"
        monthly_monitoring: true

      aware:
        baseline_awareness: 0.95  # Own the forecast
        information_flow: "Real-time dashboard + weekly FP&A updates"

      ready:
        capability_theta: 0.95  # Full authority, resources
        willingness_theta: 0.90  # Bonus tied to forecast accuracy
        readiness_score: 0.905

      stage:
        change_journey_stage: 5  # Decision/Preparation
        progress_to_decision: 0.95

    decision_function:
      model: "Risk Threshold Model"
      trigger: "P(Escalate Risk) = 1.0 IF:"
      conditions:
        - "ΔP > ±5% vs quarterly forecast"
        - "E(θ) growth (shrinkage working backwards!)"
        - "WHEN context shock > 1.5σ"
        - "Monthly variance > expected band"

      response_matrix:
        "ΔP ±2-5%": "Weekly monitoring + CFO review"
        "ΔP ±5-10%": "Monthly board update + options analysis"
        "ΔP > ±10%": "Emergency board meeting + corrective actions"

    red_flags_escalation:
      critical:
        - "Forecast confidence eroding (E(θ) growing)"
        - "Parameter drift detected (regime change)"
        - "Board approval at risk due to uncertainty"
      high:
        - "Execution gap > ±5%"
        - "Context shock requiring reforecast"

    success_metrics:
      escalation_timing_accuracy: "Catch risks within 1 week of emergence"
      parameter_update_approval_rate: "≥ 95%"
      monthly_checkpoint_utilization: "100% compliance"

  # ========================================================================
  # 3. REGIONAL P&L LEADERS
  # ========================================================================

  regional_pl_leader:
    name: "Regional P&L Leaders (EMEA, APAC, Americas, etc.)"
    tier: "Operational"
    primary_decision: "hit_cagr_target"
    decisions:
      - "Monthly regional execution tracking"
      - "CAGR target adjustment requests"
      - "Regional investment reallocation"
      - "Talent hiring pace"
      - "Customer segment focus"

    nine_c_profile:
      who:
        welfare_level: "L2"  # Operational leadership
        decision_authority: 0.75  # Constrained by corporate strategy
        number_of_members: 3  # EMEA, APAC, Americas leads

      what:
        utility_dimensions:
          F_financial: 0.80  # Revenue growth, profitability
          S_scale: 0.15  # Regional market share
          D_diversity: 0.05  # Regional team health
        strategic_priority: "Hit CAGR targets monthly"

      how:
        complementarities:
          revenue_headcount: 0.68  # γ_rev-org = 0.68 (tight coupling)
          capex_implementation: 0.62  # Need org capability for capex ROI
        decision_coupling:
          with_cfo: 0.85  # Budget approvals from CFO
          with_segments: 0.90  # Manage segment P&Ls

      when:
        context_sensitivity:
          regional_economic_Psi1: 0.95  # Regional GDP is crucial
          competitive_Psi2: 0.80  # Regional competitors
          regulatory_Psi6: 0.70  # Regional governance
        context_shock_threshold: 1.0  # σ > 1.0 in regional economic data

      where:
        parameter_uncertainty:
          regional_CAGR_E_theta: 1.5  # ±1.5pp for regional estimates
          acceptable_monthly_variance: "±3% vs forecast"
        monthly_actuals_required: true

      aware:
        baseline_awareness: 0.90  # Own their targets
        information_flow: "Weekly regional dashboard"

      ready:
        capability_theta: 0.80  # Manage region, constrained by HQ
        willingness_theta: 0.85  # Bonus tied to CAGR target
        readiness_score: 0.68

      stage:
        change_journey_stage: 6  # Preparation/Action
        progress_to_decision: 0.85

    decision_function:
      model: "Performance Accountability"
      trigger: "Escalate if:"
      conditions:
        - "Monthly actual vs forecast ΔP > ±5% for 2 consecutive months"
        - "Quarterly CAGR < target by > 1pp"
        - "HOW complementarity not achievable (γ_rev-org too high)"

      monthly_tracking:
        - "Revenue by segment"
        - "Headcount utilization"
        - "Regional CAGR vs target"
        - "Market conditions (Ψ) vs assumptions"

    red_flags_escalation:
      critical:
        - "Monthly miss > ±5% for 2 consecutive months"
        - "CAGR trend significantly below target"
      high:
        - "Talent attrition > 15% annually"
        - "Competitive pricing pressure"

    success_metrics:
      monthly_forecast_accuracy: "±3% MAPE"
      cagr_achievement_rate: "Hit target within ±0.5pp"
      quarterly_review_participation: "100%"

  # ========================================================================
  # 4. CUSTOMERS (Simplified: Single Customer)
  # ========================================================================

  customer:
    name: "Customer (Product/Service Buyer)"
    tier: "External"
    primary_decision: "purchase_decision"
    decisions:
      - "Buy new product/service"
      - "Renew contract"
      - "Expand relationship"
      - "Switch to competitor"
      - "Recommend to peers"

    nine_c_profile:
      who:
        welfare_level: "L3/L4"  # Individual buyer + organization
        decision_authority: 0.60  # Buying committee
        number_of_stakeholders: 3  # CEO, CTO, CFO typically

      what:
        utility_dimensions:
          F_financial: 0.65  # Cost savings, ROI
          S_scale: 0.20  # Growth capability
          D_diversity: 0.05  # Team diversity
          P_privacy: 0.10  # Data security
        strategic_priority: "Maximize value while minimizing risk"

      how:
        complementarities:
          implementation_adoption: 0.75  # Integration complexity
          switching_costs: 0.85  # High switching costs = high complementarity
        decision_coupling:
          with_incumbent_supplier: 0.90  # Status quo bias, sunk costs

      when:
        context_sensitivity:
          budget_cycle_Psi: 0.95  # Budget approval timing
          procurement_policy_Psi6: 0.80  # Governance requirements
          technology_Psi7: 0.70  # Tech readiness
        purchase_window: "Fiscal year planning (Q4-Q1)"

      where:
        parameter_uncertainty:
          cost_of_solution_E_theta: 0.15  # ±15% price range tolerance
          implementation_timeline_E_theta: 0.20  # ±20% schedule tolerance
        required_proof: "Case studies, references, trial period"

      aware:
        baseline_awareness: 0.40  # Initial awareness low
        information_sources:
          - "Sales conversations"
          - "Industry analysts (Gartner, etc.)"
          - "Peer references"
          - "Trial period"
        awareness_building_timeline: "3-6 months sales cycle"

      ready:
        capability_theta: 0.65  # Can implement (with effort)
        willingness_theta: 0.50  # Loss aversion, status quo bias strong
        readiness_score: 0.325  # Low initially
        behavioral_factors:
          loss_aversion_penalty: -0.30  # Switching from incumbent
          status_quo_bias: -0.20  # Prefer current solution
          sunk_cost_fallacy: -0.15  # Invested in current system

      stage:
        change_journey_stage: 2  # Understanding (early sales)
        progress_to_decision: 0.35

    decision_function:
      model: "Behavioral Economics Logit"
      formula: "P(Buy) = sigmoid(β₁×WHAT_match + β₂×WHERE_confidence + β₃×HOW_integration + β₄×AWARE + β₅×READY - loss_aversion)"
      parameters:
        β₁_WHAT_match: 0.30  # Solution meets customer needs
        β₂_WHERE_confidence: 0.25  # Product reliability, proof
        β₃_HOW_integration_ease: 0.20  # Implementation effort
        β₄_AWARE_knowledge: 0.15  # Awareness of solution
        β₅_READY_authority: 0.10  # Buying authority/budget
        loss_aversion_penalty: -0.30  # Switching penalty

      example_calculation:
        scenario: "Pharma customer purchasing new CRM"
        inputs:
          WHAT_match: 0.75  # Solution meets 75% of requirements
          WHERE_confidence: 0.70  # Product proven (±15% confidence)
          HOW_integration_ease: 0.65  # 6-month implementation needed
          AWARE_solution: 0.80  # Well-informed through sales
          READY_authority: 0.60  # Requires CFO sign-off
          loss_aversion: -0.30  # Switching from SAP
        output:
          P_buy: 0.41  # 41% purchase probability
          interpretation: "Moderate-low; need to reduce switching fear"

    behavioral_factors:
      loss_aversion:
        description: "Switching from current supplier has -30% penalty"
        mitigation:
          - "Risk-free trial period (reversible)"
          - "Migration guarantee (low switching cost)"
          - "Side-by-side operation option"

      status_quo_bias:
        description: "Prefer to stay with incumbent (25% improvement needed)"
        mitigation:
          - "Show 30%+ performance improvement vs current"
          - "Case studies from similar customers"
          - "Proof of lower total cost of ownership"

      sunk_cost_fallacy:
        description: "Already invested in current solution (15% penalty)"
        mitigation:
          - "Acknowledge transition costs"
          - "Offer implementation support"
          - "Show rapid ROI payback (< 12 months)"

    red_flags_escalation:
      critical:
        - "Customer expresses switching cost concerns"
        - "Budget approval delayed beyond fiscal window"
      high:
        - "Competitor successfully closes similar deal"
        - "Customer requests extended trial"

    success_metrics:
      purchase_probability_prediction: "±20pp accuracy"
      sales_cycle_duration: "3-6 months"
      win_rate_by_customer_type: "Track by archetype"

  # ========================================================================
  # 5. SUPPLIERS & PARTNERS
  # ========================================================================

  supplier:
    name: "Suppliers & Strategic Partners"
    tier: "External"
    primary_decision: "partnership_commitment"
    decisions:
      - "Commit long-term volume"
      - "Invest in capability building"
      - "Prioritize our account"
      - "Joint innovation partnership"
      - "Pricing/terms negotiation"

    nine_c_profile:
      who:
        welfare_level: "L2/L3"  # Supplier management
        decision_authority: 0.80  # Sales/Account management

      what:
        utility_dimensions:
          F_financial: 0.75  # Revenue, margin stability
          S_scale: 0.20  # Account size, growth potential
          D_diversity: 0.05  # Portfolio diversification
        strategic_priority: "Grow volume while ensuring profitability"

      how:
        complementarities:
          volume_capability: 0.72  # Must match supply to demand
          innovation_partnership: 0.65  # Joint R&D opportunities

      when:
        context_sensitivity:
          demand_stability_Psi1: 0.95  # Supplier needs predictable demand
          market_competition_Psi2: 0.80  # Commodity vs specialty pricing
          supply_chain_Psi6: 0.85  # Global supply constraints

      where:
        parameter_uncertainty:
          volume_forecast_E_theta: 0.20  # ±20% acceptable variance
          pricing_confidence_E_theta: 0.10  # ±10% pricing band

      aware:
        baseline_awareness: 0.85  # Understand our strategy
        information_flow: "Quarterly business reviews + demand planning"

      ready:
        capability_theta: 0.75  # Can scale supply
        willingness_theta: 0.80  # Profit opportunity
        readiness_score: 0.60

      stage:
        change_journey_stage: 5  # Decision (ready to commit)

    decision_function:
      model: "Strategic Partnership Model"
      trigger: "P(Commit) = f(HOW volume_synergy, WHEN demand_stability, WHERE forecast_confidence)"
      conditions:
        - "3+ year volume commitment needed"
        - "≥ €10M annual revenue (minimum partner tier)"
        - "Forecast confidence E(θ) < 20% for volume"

    partnership_tiers:
      transactional: "Spot purchases, no long-term commitment"
      preferred_partner: "1-2 year volume commitment, quarterly reviews"
      strategic_partner: "3-5 year commitment, joint planning, innovation"

    red_flags_escalation:
      critical:
        - "Demand forecast ΔP > ±15% for 2 quarters"
        - "Pricing pressure from competitors"
      high:
        - "Quarterly volume variance > 20%"
        - "Relationship trust erosion"

    success_metrics:
      partnership_commitment_rate: "≥ 80% to preferred/strategic tier"
      supply_continuity: "99.5% on-time delivery"
      forecast_accuracy: "±15% quarterly"

  # ========================================================================
  # 6. EMPLOYEES (All Levels)
  # ========================================================================

  employee:
    name: "Employees (All Organizational Levels)"
    tier: "Internal"
    primary_decision: "retention_and_engagement"
    decisions:
      - "Stay with organization"
      - "Actively contribute to strategy"
      - "Recommend employer to peers"
      - "Accept role changes/relocations"
      - "Invest in skill development"

    nine_c_profile:
      who:
        welfare_level: "L2/L3/L4"  # Individual level + team + org
        decision_authority: 0.40  # Limited authority over org decisions

      what:
        utility_dimensions:
          F_financial: 0.60  # Compensation, job security
          D_diversity: 0.15  # Diversity, inclusion, culture
          S_scale: 0.10  # Career growth, title/scope
          E_environmental: 0.10  # Purpose, ESG alignment
          P_privacy: 0.05  # Work-life balance
        strategic_priority: "Maximize compensation + career growth + purpose"

      how:
        complementarities:
          team_cohesion: 0.70  # Team dynamics affect productivity
          capability_utilization: 0.65  # Using skills well
          manager_quality: 0.80  # Manager quality drives engagement

      when:
        context_sensitivity:
          labor_market_Psi1: 0.95  # Job market tightness
          cultural_Psi4: 0.85  # Org culture fit
          manager_leadership_Psi5: 0.90  # Direct manager influence

      where:
        parameter_uncertainty:
          compensation_expected_E_theta: 0.15  # ±15% salary range acceptable
          career_growth_timeline_E_theta: 0.30  # ±30% promotion timing tolerance

      aware:
        baseline_awareness: 0.70  # Understand strategy (via managers)
        information_sources:
          - "Direct manager communication"
          - "All-hands meetings"
          - "Internal communications"
          - "Peer conversations"
        change_anxiety: "HIGH during strategy transitions"

      ready:
        capability_theta: 0.70  # Can adapt to new strategy
        willingness_theta: 0.55  # Change anxiety, status quo bias strong
        readiness_score: 0.385  # Low initially
        behavioral_factors:
          change_anxiety: -0.25  # Fear of unknown, role changes
          loss_aversion_current_role: -0.20  # Fear of demotion/loss
          trust_in_leadership: 0.75  # Manager & org credibility

      stage:
        change_journey_stage: 2  # Understanding (early awareness)
        progress_to_decision: 0.40

    decision_function:
      model: "Employee Engagement Logit"
      formula: "P(Stay) = sigmoid(β₁×Compensation + β₂×CareerGrowth + β₃×Purpose + β₄×ManagerQuality + β₅×CultureFit - change_anxiety)"
      parameters:
        β₁_compensation: 0.25  # Pay competitiveness
        β₂_career_growth: 0.30  # Advancement opportunities
        β₃_purpose: 0.20  # Alignment with mission
        β₄_manager_quality: 0.15  # Direct manager relationship
        β₅_culture_fit: 0.10  # Org culture alignment
        change_anxiety_penalty: -0.25  # Strategy change uncertainty

      retention_cohort_analysis:
        high_performers:
          retention_target: "> 90%"
          key_drivers: "Career growth + compensation + autonomy"
        mid_performers:
          retention_target: "> 75%"
          key_drivers: "Stable role + clear expectations"
        support_functions:
          retention_target: "> 70%"
          key_drivers: "Job security + manager quality"

    change_management_approach:
      phase_1_communication:
        timeline: "2-4 weeks before announcement"
        message: "Strategy overview, what's changing, why"
        format: "Town halls, manager briefings, FAQs"

      phase_2_engagement:
        timeline: "1-2 months post-announcement"
        message: "How changes affect each team/role"
        format: "1-on-1s with managers, department sessions"

      phase_3_enablement:
        timeline: "Implementation phase"
        message: "Skills needed, training provided, support available"
        format: "Training programs, coaching, tools"

      phase_4_advocacy:
        timeline: "6+ months"
        message: "Results, learnings, next steps"
        format: "Regular updates, celebrate wins"

    red_flags_escalation:
      critical:
        - "Top performer resignation"
        - "Team-wide engagement drop > 15 points"
        - "Manager retention concerns"
      high:
        - "Attrition rate above target by 5%+"
        - "Internal promotion rate dropping"
        - "Manager 1-on-1 effectiveness declining"

    success_metrics:
      retention_rate_by_cohort: "≥ 85% high performers, ≥ 75% overall"
