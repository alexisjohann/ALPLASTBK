# ═══════════════════════════════════════════════════════════════════════════
# GENERATION GUIDELINES
# ═══════════════════════════════════════════════════════════════════════════

generation:
  description: "Guidelines für Speech-Generierung"

  oral_markers:
    signposting:
      - "Erstens..."
      - "Zweitens..."
      - "Zum Schluss..."
      - "Kommen wir nun zu..."
      - "Das bringt mich zu..."

    audience_engagement:
      - "Stellen Sie sich vor..."
      - "Kennen Sie das?"
      - "Was würden Sie tun?"
      - "Hand aufs Herz..."

    repetition_patterns:
      - "X. Ich wiederhole: X."
      - "Das ist wichtig, also nochmal: X."
      - "X. Merken Sie sich das: X."

    transitions:
      - "Nun gut..."
      - "Also..."
      - "Schauen wir mal..."
      - "Jetzt wird's interessant..."

  avoid_in_speech:
    - "cf."
    - "ibid."
    - "et al. (2024)"
    - Lange eingebettete Relativsätze
    - Komplexe Nominalisierungen
    - Passiv-Ketten

  formatting:
    script_format:
      pause_marker: "[PAUSE]"
      emphasis_marker: "*word*"
      slide_cue: "[SLIDE]"
      gesture_cue: "[GESTURE: describe]"
