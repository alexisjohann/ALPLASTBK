# Paper Integration Metrics Database
# ==================================
# Tracks timing and decision metrics for the /upgrade-paper workflow
# Used for continuous improvement of the paper integration process
#
# Version: 1.1
# Created: 2026-01-31
# Updated: 2026-02-01
# Purpose: Measure and optimize workflow efficiency
#
# SSOT HIERARCHY (Single Source of Truth):
# ----------------------------------------
# Priority 1: appendices/BM_METHOD-PAPERINT_*.tex (formal MECE-compliant definitions)
# Priority 2: THIS FILE (workflow metrics)  <-- YOU ARE HERE
# Priority 3: data/paper-integration-learnings.yaml (learnings)
# Priority 4: data/paper-integration-queue.yaml (queue)
# Priority 5: docs/frameworks/paper-database-quality-dimensions.md (summary)
#
# MECE-compliant 2D Classification (Axiom MECE-1):
# - Content Level (L0-L3): Paper-internal information (what we know ABOUT the paper)
# - Integration Level (I1-I5): EBF-specific linkages (how paper CONNECTS to EBF)
# - Critical: Parameters (λ, β, γ) belong to Integration (I4), NOT Content!

