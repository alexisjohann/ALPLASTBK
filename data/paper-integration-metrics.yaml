# Schema-Dokumentation
# ====================
schema:
  entry:
    id: "PIM-YYYY-MM-DD-NNN"  # Paper Integration Metrics ID
    paper_id: "PAP-..."       # Referenz auf Paper-ID
    timestamp: "ISO 8601"

    analysis:
      content_level: "0-3"
      integration_level: "1-5"
      fulltext_chars: "integer"
      has_abstract: "boolean"
      has_bibliography: "boolean"
      has_structure: "boolean"

    choice:
      presented_at: "ISO 8601"    # Zeitpunkt der Präsentation
      responded_at: "ISO 8601"    # Zeitpunkt der Antwort
      duration_seconds: "float"   # Zeit bis zur Entscheidung
      selected_mode: "automatic | manual | check_only"

    workflow:
      started_at: "ISO 8601"
      completed_at: "ISO 8601"
      total_duration_minutes: "float"
      steps_completed: "list of step objects"

# Auswertungs-Queries (für Scripts)
# =================================
#
# Durchschnittliche Entscheidungszeit:
#   SELECT AVG(choice.duration_seconds) FROM entries
#
# Verteilung nach Modus:
#   SELECT choice.selected_mode, COUNT(*) FROM entries GROUP BY choice.selected_mode
#
# Durchschnittliche Workflow-Dauer nach Level:
#   SELECT analysis.integration_level, AVG(workflow.total_duration_minutes)
#   FROM entries GROUP BY analysis.integration_level
#
# Langsamster Schritt:
#   SELECT step, AVG(duration_seconds) FROM steps GROUP BY step ORDER BY AVG DESC
