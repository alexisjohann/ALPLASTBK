project:
  name: "Exzellenzstrategie KI für den Industriestandort Oberösterreich"
  type: studie
  description: |
    Modellbasierte Narrative-Entwicklung für die KI-Exzellenzstrategie
    des Industriestandorts Oberösterreich. Repräsentative Bevölkerungsmessung
    (Follow-up zur Baseline 2020) kombiniert mit Kampagnen- und Botschaftentest
    zur segmentgenauen Kommunikation. Zentrales Narrativ: Widerstandsfähigkeit.
  objectives:
    - "Gesellschaftlichen Rückhalt für KI-Exzellenzstrategie messen und stärken"
    - "Wirtschaftsfreundlichkeit der OÖ-Bevölkerung messen (Follow-up 2020)"
    - "Beziehungsstärke zwischen Bevölkerung und Industrie/IV OÖ erfassen"
    - "Kontextfaktoren für Einstellungsveränderungen identifizieren"
    - "Segmentspezifische Narrative und Interventionsempfehlungen entwickeln"
    - "Kampagnen- und Botschaftentest: Narrative je Segment erproben"
