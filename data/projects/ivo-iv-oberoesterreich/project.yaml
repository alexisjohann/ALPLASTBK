ebf_integration:
  cva_stufe: "SCHNELL"
  cva_path: "data/customers/iv-oberoesterreich/iv-ooe_context_schnell.yaml"
  bcm_models:
    - "Wirtschaftsfreundlichkeit als Funktion von Ψ-Dimensionen"
    - "Narrative-Resonanz als Funktion von Segment × Ψ × Spannungsfeld"
  psi_dimensions:
    - psi_K: "Kulturelle Werte OÖ (Industriekultur, Arbeitsethos, Leistungsgedanke)"
    - psi_I: "Institutioneller Rahmen (Sozialpartnerschaft, EU-Regulierung, Förderlandschaft)"
    - psi_S: "Soziale Normen (Wirtschaft vs. Klima-Diskurs, Schneeball-Effekt)"
    - psi_E: "Ökonomischer Kontext (Post-Inflation, Fachkräftemangel, Standortdruck)"
    - psi_C: "Kognitive Dimension (Economic Literacy, Media Framing, KI-Verständnis)"
  behavioral_objectives:
    - "Wirtschaftsfreundlichkeit der OÖ-Bevölkerung messen (Follow-up 2020)"
    - "Beziehungsstärke und Identifikation mit Industrie/Leitbetrieben erfassen"
    - "Kontextfaktoren für Einstellungsveränderungen identifizieren"
    - "Segmentspezifische Narrative für KI-Exzellenzstrategie testen"
    - "Widerstandsfähigkeit-Frame vs. Produktivitäts-Frame vergleichen"
    - "Segmentgenaue Interventionsempfehlungen ableiten"
  population_segments:
    - "SEG-WIRTSCHAFTSNAH (30%): Industrie-affin, hohe Economic Literacy"
    - "SEG-AMBIVALENT (35%): Swing-Segment, framing-anfällig"
    - "SEG-SKEPTIKER (20%): Wirtschaftskritisch, klima-/sozialprioritär"
    - "SEG-JUNGE (15%): Digital Natives, Klima-first, pragmatisch bei Jobs"
  spannungsfelder:
    - "SF-01: Arbeitsplatzsicherheit vs. Automatisierung/KI"
    - "SF-02: Nachhaltigkeit & Klima vs. Industrielogik"
    - "SF-03: Leistung & Eigenverantwortung vs. Work-Life-Balance"
    - "SF-04: Inflation & Kaufkraft vs. Leistungsdebatte"
    - "SF-05: Marktwirtschaft & Liberalität vs. Symbolpolitik"
    - "SF-06: Strukturwandel als Bedrohung vs. Chance"
