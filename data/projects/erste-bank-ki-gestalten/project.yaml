# -----------------------------------------------------------------------------
# PROJEKTZIEL & SCOPE
# -----------------------------------------------------------------------------
objective:
  summary: >
    In ca. 8 Wochen eine fundierte, verhaltensbasierte Grundlage schaffen,
    wie KI in der Erste Bank von Mitarbeitenden verstanden, akzeptiert und
    sinnvoll genutzt wird.

  core_insight: >
    Im Zentrum steht nicht die technische Einführung - sondern die Befähigung
    der Menschen, ihre Arbeitsweise gemeinsam mit KI neu zu gestalten.

  tagline: "KI verändert nicht nur Tools - sie verändert Arbeitsweisen. Deshalb beginnt der Wandel beim Verständnis."

scope:
  in_scope:
    - "Glaubenssätze & Nutzungsmuster verstehen"
    - "Zielgruppenbasiertes Massnahmendesign entwickeln"
    - "Verankerung durch Narrative, Schärfung der Normen & Wirkungsmessung"
    - "Fokus auf Copilot-Nutzung als konkreter Anwendungsfall"

  out_of_scope:
    - "Technische Implementation von Copilot"
    - "IT-Infrastruktur"
    - "Lizenzmanagement"

# -----------------------------------------------------------------------------
# FINALE DELIVERABLES
# -----------------------------------------------------------------------------
final_deliverables:
  - id: "DEL-001"
    name: "Verhaltenslandkarte & Nutzertypologie"
    description: "Segmentierung der Mitarbeitenden nach KI-Adoption"

  - id: "DEL-002"
    name: "Quick-Win-Massnahmenpaket"
    description: "Für den Copilot-Kontext optimierte Interventionen"

  - id: "DEL-003"
    name: "Playbook"
    description: "Mit Botschaften, Formaten & Kommunikationsmustern"

  - id: "DEL-004"
    name: "Mini-Messsystem"
    description: "3-5 KPIs für KI-Akzeptanz & KI-Literacy"

# -----------------------------------------------------------------------------
# METHODISCHES TOOLSET
# -----------------------------------------------------------------------------
methodology:
  research_methods:
    - name: "Tiefeninterviews"
      count: 5
      target_groups:
        - "Projektverantwortliche"
        - "Entwickler"
        - "Early Adopter"
        - "Strategische Stakeholder"
      purpose: "Sichtbar machen von impliziten Glaubenssätzen & organisationalen Narrativen"

    - name: "Mini-Workshops"
      count: "10-15"
      target_groups:
        - "Mitarbeitende aus Alltagseinheiten (Retail, Service, IT, Operations)"
        - "Führungskräfte mittlerer Ebene"
        - "HR, Training, Kommunikation"
      purpose: "Aufdecken von alltäglichen Nutzungsmustern, Unsicherheiten und Barrieren"

    - name: "Fokusgruppen"
      count: "2-3"
      target_groups:
        - "Kundenberatung"
        - "Skeptische Führung"
        - "Copilot-Pilotteams"
      purpose: "Validierung und Kontrastierung bestehender Hypothesen"

  behavioral_tools:
    - name: "Second Order Beliefs"
      description: "Machen soziale Normen, implizite Verbote und verdeckte Steuerung sichtbar"

    - name: "Projective Elicitation"
      description: "Umgeht soziale Erwünschtheit und aktiviert verborgene Einstellungen durch indirekte Fragetechniken"

    - name: "Micro-Scenario Probing"
      description: "Erlaubt die Beobachtung realitätsnaher Entscheidungsmuster durch alltagsnahe Mini-Szenarien"

    - name: "Mental Model Surfacing"
      description: "Macht sichtbar, wie Menschen innerlich über KI 'denken' - als Tool, Black Box oder Risiko"

    - name: "Framing-Reaktionstests"
      description: "Zeigen, welche Begriffe Vertrauen fördern oder Abwehr erzeugen"

    - name: "Choice Architecture Tracing"
      description: "Deckt auf, wo im Arbeitsalltag Entscheidungen für oder gegen KI-Nutzung tatsächlich getroffen werden"

# -----------------------------------------------------------------------------
# STRATEGISCHE PRINZIPIEN
# -----------------------------------------------------------------------------
strategic_principles:
  - principle: "Organisationsdesign als Choice Architecture"
    insight: "Wenn die Organisation etwas nahelegt, wird es wahrscheinlicher getan"

  - principle: "Framing entscheidet über Akzeptanz"
    insight: "'Experiment' vs. 'Teil des Geschäfts' erzeugen unterschiedliche Erwartungen"

  - principle: "Frühe Involvierung als Ownership-Hebel"
    insight: "Wer mitgestaltet, blockiert nicht"

  - principle: "Commitment durch Design"
    insight: "Rollen, Ressourcen, Reporting erzeugen Bindung"

# -----------------------------------------------------------------------------
# EBF INTEGRATION (10C MAPPING)
# -----------------------------------------------------------------------------
ebf_integration:
  primary_10c_dimensions:
    - dimension: "AWARE"
      focus: "KI-Literacy, Verständnis von Copilot-Funktionen"
      interventions: ["Information", "Training", "Mental Model Surfacing"]

    - dimension: "WHAT"
      focus: "Identität als KI-Nutzer:in vs. traditionelle Arbeitsweise"
      interventions: ["Narrative", "Role Models", "Framing"]

    - dimension: "WHO"
      focus: "Soziale Normen im Team, Peer Effects"
      interventions: ["Fokusgruppen", "Peer-Coaching", "Social Proof"]

    - dimension: "WHEN"
      focus: "Choice Architecture im Arbeitsalltag"
      interventions: ["Defaults", "Trigger-Momente", "Prozessintegration"]

  behavioral_barriers:
    - barrier: "Implizite Verbote"
      belief: "Ich darf das nicht"
      intervention_approach: "Second Order Beliefs surfacing, Permission-Framing"

    - barrier: "Kompetenzangst"
      belief: "Ich kann das nicht"
      intervention_approach: "Micro-Learnings, Low-Stakes Experimentation"

    - barrier: "Identitätsbedrohung"
      belief: "KI ersetzt mich"
      intervention_approach: "Augmentation-Narrative, Human-in-the-Loop Framing"

    - barrier: "Prozessunsicherheit"
      belief: "Ich weiss nicht, wann/wo ich das nutzen soll"
      intervention_approach: "Choice Architecture, Trigger-Mapping"

  user_segments:
    - segment: "Skeptiker"
      description: "Grundsätzliche Ablehnung oder Misstrauen"
      key_barriers: ["Identitätsbedrohung", "Kontrollverlust"]
      intervention_priority: "Trust-Building, Low-Stakes Entry Points"

    - segment: "Vorsichtige"
      description: "Interessiert, aber unsicher"
      key_barriers: ["Kompetenzangst", "Prozessunsicherheit"]
      intervention_priority: "Enablement, klare Use Cases"

    - segment: "Hypothetische Nutzer:innen"
      description: "Würden nutzen, tun es aber nicht"
      key_barriers: ["Implizite Verbote", "Fehlende Trigger"]
      intervention_priority: "Permission, Choice Architecture"

    - segment: "Enthusiasten/Mavericks"
      description: "Nutzen aktiv, oft informell"
      key_barriers: ["Fehlende Legitimation"]
      intervention_priority: "Formalisierung, Role Model Aktivierung"

# -----------------------------------------------------------------------------
# KPIs & MESSUNG
# -----------------------------------------------------------------------------
kpis:
  - kpi_id: "KPI-001"
    name: "KI-Akzeptanz-Score"
    description: "Selbstberichtete Akzeptanz von KI-Tools (Befragung)"
    measurement: "Likert-Skala 1-7"
    target: "≥5.0 nach Projektende"
    baseline: "tbd (Erhebung in Phase 2)"

  - kpi_id: "KPI-002"
    name: "KI-Literacy-Index"
    description: "Verständnis von KI-Funktionen und Anwendungsfällen"
    measurement: "Wissenstest + Selbsteinschätzung"
    target: "+30% vs. Baseline"
    baseline: "tbd"

  - kpi_id: "KPI-003"
    name: "Nutzungsfrequenz Copilot"
    description: "Aktive Nutzung pro Woche (falls messbar)"
    measurement: "Usage Analytics oder Selbstbericht"
    target: "tbd"
    baseline: "tbd"

  - kpi_id: "KPI-004"
    name: "Psychologische Sicherheit (KI)"
    description: "Gefühl, KI offen nutzen und Fragen stellen zu können"
    measurement: "Befragung (adaptiert von Edmondson)"
    target: "≥5.5"
    baseline: "tbd"

# -----------------------------------------------------------------------------
# RISIKEN
# -----------------------------------------------------------------------------
risks:
  - risk_id: "RISK-001"
    description: "Widerstand von Führungskräften blockiert Teilnahme an Workshops"
    probability: "medium"
    impact: "high"
    mitigation: "Frühzeitige Einbindung, CEO/Vorstand Sounding-Session"

  - risk_id: "RISK-002"
    description: "Technische Probleme mit Copilot überschatten Verhaltensaspekte"
    probability: "medium"
    impact: "medium"
    mitigation: "Klare Scope-Abgrenzung, Eskalationspfad zu IT"

  - risk_id: "RISK-003"
    description: "Datenschutz-Bedenken bei Befragungen"
    probability: "low"
    impact: "medium"
    mitigation: "Anonymisierung, DSGVO-Compliance, klare Kommunikation"

