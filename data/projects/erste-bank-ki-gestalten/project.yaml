# -----------------------------------------------------------------------------
# ZEITRAHMEN & BUDGET
# -----------------------------------------------------------------------------
timeline:
  start_date: "2026-01-01"
  end_date: "2026-04-30"
  duration_weeks: 16
  budget_eur: 59900

phases:
  - phase: 1
    name: "Struktur wählen"
    duration_weeks: 4
    description: "Vorbereitung der Organisation"
    activities:
      - "Simulation verschiedener Integrationsmodelle (Behavioral Change Model)"
      - "Verhaltensökonomische Bewertung nach Akzeptanzwahrscheinlichkeit"
      - "Framing organisationaler Optionen (Linie vs. Innovationseinheit)"
      - "Struktur als Choice Architecture: Welche Pfade machen Nutzung wahrscheinlich?"

  - phase: 2
    name: "Verhalten verstehen"
    duration_weeks: 4
    description: "Klarheit über Barrieren, Potenziale, Zielgruppen"
    activities:
      - "Tiefeninterviews (ca. 5) mit Projektverantwortlichen, Entwicklern, Early Adoptern"
      - "Mini-Workshops (ca. 10-15) mit Mitarbeitenden aus Retail, Service, IT, Operations"
      - "Pain Point Mapping"
      - "Analyse bestehender Nutzungsmuster und mentaler Modelle"
      - "Involvierung als Frühindikator für Ownership"
    deliverables:
      - "Dokumentierte Analyse zentraler Beliefs"
      - "Gemeinsames, abgestimmtes Zielbild"

  - phase: 3
    name: "Pilot & Testing"
    duration_weeks: 6
    description: "Was funktioniert wirklich und warum?"
    activities:
      - "Fokusgruppen (ca. 2-3) mit spezifischen Zielgruppen"
      - "Verhaltensanalyse: Was fördert/hemmt Nutzung?"
      - "Segmentierung in Zielgruppen (Skeptiker, Enthusiasten, Unsichere)"
      - "Typologisierung von Nutzungsverhalten"
      - "Entwicklung Quick-Win-Massnahmenkatalog"
      - "Entwicklung von Interventionslogiken"
      - "Iterative Validierung in Sounding-Session"
    deliverables:
      - "Nutzungstypologie im Unternehmen"
      - "Übersicht verhaltenstreibende Faktoren"
      - "Validiertes Massnahmenpaket"
      - "Startkonzept für Pilotintervention"

  - phase: 4
    name: "Transfer & Verstetigung"
    duration_weeks: 4
    description: "Dauerhafte Integration & Wirkung sichern"
    activities:
      - "Entwicklung Playbook zur KI-Verankerung im Alltag"
      - "Ableitung von 3-5 Messparametern für KI-Akzeptanz und KI-Literacy"
      - "Design einer skalierbaren Roadmap"
      - "Formulierung tragfähiger Narrative"
      - "Aufbereitung als Präsentationspaket für Vorstand"
    deliverables:
      - "Strukturierte Roadmap mit Rollen, Meilensteinen, Entscheidungsfenstern"
      - "Playbook für die Umsetzung"
      - "Toolbox zur Verankerung"

