# =============================================================================
# PROJEKT-IDENTIFIKATION
# =============================================================================
project:
  name: "BEATRIX: Behavioral Economics AI Technology for Research and Implementation eXcellence"
  acronym: "BEATRIX"
  type: "Forschungsförderung / Innovation Cheque"

  # Förderformat
  funding:
    program: "Innosuisse Innovation Cheque"
    amount_chf: 15000
    duration_months: "3-6"
    submission_portal: "Innolink"
    submission_category: "SSBM"  # Social Sciences & Business Management

  # TRL (Technology Readiness Level)
  trl:
    start: 4
    target: "6-7"
    description: "Proof of Concept → Voll funktionsfähiger, validierter BEATRIX-Kern"

# =============================================================================
# PARTNER
# =============================================================================
partners:
  implementation_partner:
    name: "FehrAdvice & Partners AG"
    type: "Schweizer KMU"
    role: "Umsetzungspartner"
    contributions:
      - "Behavioural-Ökonomie-Daten"
      - "BCM-Framework (proprietäres IP)"
      - "Praktische Anwendung in Kundenprojekten"

  research_partners:
    - name: "Prof. Harald Gall"
      institution: "Universität Zürich"
      institute: "Institut für Informatik, Software Evolution"
      role: "Technische Architektur"
      contributions:
        - "Code-Resilienz"
        - "Software-Evolution-Algorithmen"
        - "Fehlertolerante, modulare Softwarearchitektur"

    - name: "Prof. Luger"
      institution: "Universität Zürich"
      institute: "Institut für Betriebswirtschaft, Strategic Management"
      role: "Human-AI-Collaboration"
      contributions:
        - "Mensch-KI-Schnittstelle"
        - "Akzeptanzforschung"
        - "Nutzbarkeit"

  mentor:
    name: "Dr. Daniel Fasnacht"
    role: "Akkreditierter Innosuisse-Mentor"
    support_hours: 35

# =============================================================================
# KERNINNOVATION
# =============================================================================
innovation:
  core_statement: |
    BEATRIX transformiert Unternehmensberatung von erfahrungsbasiertem
    Handwerk zu daten- und evidenzbasierter Ingenieurswissenschaft.

  differentiation:
    conventional_ai: "Generiert Texte"
    beatrix: "Berechnet menschliches Verhalten in Form von Kontext- und Nutzenfunktionen"

  key_innovations:
    - name: "Kontext-Modellierung (Ψ)"
      description: "Mathematische Modellierung des Kontextes"
    - name: "Komplementaritätsmatrix (C*)"
      description: "Systematische Vorhersage, wann Anreize wirken oder scheitern"
    - name: "General Decision Support System (GDSS)"
      description: "Neue Klasse von KI-basierten Entscheidungswerkzeugen"

  quantified_benefits:
    time_reduction: "-85%"
    cost_reduction: "-60%"
    forecast_accuracy: "+45%"
    decision_quality: "+50%"
    productivity: "+45%"

# =============================================================================
# INNOSUISSE-ANTRAGSSTRUKTUR
# =============================================================================
innosuisse_application:
  sections:
    - id: 1
      name: "Introduction"
      content:
        - "Name des Projekts: BEATRIX"
        - "Abstract (max. 250 Wörter)"
        - "Kontext und Problemstellung"
      status: "OFFEN"

    - id: 2
      name: "Organisations & People"
      content:
        - "Umsetzungspartner: FehrAdvice Partners AG"
        - "Forschungspartner: Universität Zürich"
        - "Mentor: Dr. Daniel Fasnacht"
      status: "BEREIT"

    - id: 3
      name: "Value Creation & Solution"
      subsections:
        - id: "a"
          name: "Innovation Potential"
          status: "BEREIT"
          document: "docs/funding/BEATRIX-FASNACHT-ANSWERS-V3.md"
        - id: "b"
          name: "Market Relevance"
          status: "BEREIT"
          document: "docs/funding/BEATRIX-FASNACHT-ANSWERS-V3.md"
        - id: "c"
          name: "Feasibility & Risk Reduction"
          status: "BEREIT"
          document: "docs/funding/BEATRIX-FASNACHT-ANSWERS-V3.md"
        - id: "d"
          name: "Collaboration with Research Partner"
          status: "BEREIT"
          document: "docs/funding/BEATRIX-FASNACHT-ANSWERS-V3.md"
        - id: "e"
          name: "Impact for Switzerland"
          status: "BEREIT"
          document: "docs/funding/BEATRIX-FASNACHT-ANSWERS-V3.md"

    - id: 4
      name: "Contribution of Research Partner & Added Value"
      content:
        - "Prof. Gall: Softwarearchitektur, Code-Resilienz"
        - "Prof. Luger: Human-AI-Collaboration"
        - "Erwartete Deliverables"
      status: "OFFEN"

  # Gap-Analyse
  gaps:
    completed:
      - "Forschungspartner identifiziert (UZH: Gall, Luger)"
      - "Mentor eingebunden (Dr. Daniel Fasnacht)"
      - "Antworten a-e formuliert"
      - "Prozess verstanden"
    pending:
      - task: "Innolink-Antrag ausfüllen und einreichen"
        effort: "1-2 Tage"
      - task: "Work Package für Forschungspartner definieren"
        effort: "Abstimmung mit Prof. Gall / Prof. Luger"
      - task: "Abstract verfassen (max. 250 Wörter)"
        effort: "2 Stunden"
      - task: "Deliverables spezifizieren"
        effort: "1 Tag"

