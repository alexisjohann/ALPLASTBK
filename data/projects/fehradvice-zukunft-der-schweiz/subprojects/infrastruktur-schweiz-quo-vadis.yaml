# =============================================================================
# PROJEKT-DETAILS
# =============================================================================
project:
  name: "Infrastruktur Schweiz - Quo vadis"
  type: pro_bono_cofinanced
  category: subproject

  description: |
    Verhaltensökonomische Analyse der Schweizer Infrastruktur-Politik:
    Wo steht die Schweiz, wohin entwickelt sie sich, und welche
    verhaltensökonomischen Hebel können die Weichen richtig stellen?

    Themen:
    - Mobilität & Verkehrsinfrastruktur (Strasse, Schiene, E-Mobilität)
    - Energieinfrastruktur (Netz, Speicher, Produktion)
    - Digitale Infrastruktur (Glasfaser, 5G, Datenzentren)
    - Öffentliche Infrastruktur (Gesundheit, Bildung, Verwaltung)

    Kernfrage: Wie können verhaltensökonomische Erkenntnisse helfen,
    die Schweizer Infrastruktur-Investitionen effizienter, nachhaltiger
    und gesellschaftlich breiter abgestützt zu gestalten?

  keywords:
    - infrastruktur
    - mobilität
    - energie
    - digitalisierung
    - investitionen
    - föderalismus
    - schweiz

