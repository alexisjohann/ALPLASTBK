# =============================================================================
# THEMATISCHE ACHSEN
# =============================================================================
thematic_axes:
  - id: "AX-1"
    name: "Mobilität & Verkehr"
    description: |
      Strasse vs. Schiene, E-Mobilität, Ladeinfrastruktur,
      Pendlerverhalten, Güterverkehr, Shared Mobility
    auto_suisse_relevance: very_high
    key_questions:
      - "Wie verändert E-Mobilität die Infrastruktur-Anforderungen?"
      - "Welche Defaults bei der Verkehrsplanung beeinflussen das Verhalten?"
      - "Wie kann Ladeinfrastruktur für Mieter:innen beschleunigt werden?"

  - id: "AX-2"
    name: "Energie"
    description: |
      Stromnetz, Speicher, Produktion (Solar, Wind, Wasser),
      Energiestrategie 2050, Gebäudesanierung
    auto_suisse_relevance: high  # Strom für E-Mobilität
    key_questions:
      - "Wie beeinflusst die Energieverfügbarkeit die BEV-Adoption?"
      - "Welche Nudges beschleunigen Gebäudesanierung?"

  - id: "AX-3"
    name: "Digitale Infrastruktur"
    description: |
      Glasfaser-Ausbau, 5G, Datenzentren, E-Government,
      Connected Vehicles, Smart Grids
    auto_suisse_relevance: medium  # Connected & Autonomous Vehicles
    key_questions:
      - "Welche digitale Infrastruktur braucht autonomes Fahren?"
      - "Wie verändert Digitalisierung die Mobilitätsnachfrage?"

  - id: "AX-4"
    name: "Öffentliche Infrastruktur"
    description: |
      Gesundheitssystem, Bildung, Verwaltung,
      Demografischer Wandel, Föderalismus
    auto_suisse_relevance: low
    key_questions:
      - "Wie beeinflusst der Föderalismus Infrastruktur-Investitionen?"
      - "Welche Behavioral Biases verzerren öffentliche Investitionsentscheide?"

