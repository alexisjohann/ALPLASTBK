      organization: "auto-suisse"
      organization_full: "auto-schweiz / auto-suisse — Vereinigung Schweizer Automobil-Importeure"
      lead_ref: "LEAD-061"
      customer_ref: "CUS-AUTOSUISSE"
      contact: "Dr. Peter Grünenfelder (Präsident)"
      commitment_date: "2026-02-11"
      commitment_type: "teilweise Finanzierung"
      commitment_status: "mündlich zugesagt"
      budget_contribution: null  # Noch zu klären
      focus_areas:
        - "Mobilitätsinfrastruktur"
        - "E-Mobilität Ladeinfrastruktur"
        - "Strasseninfrastruktur vs. Schiene"
      note: |
        Peter Grünenfelder hat im Meeting vom 11.02.2026 die Bereitschaft
