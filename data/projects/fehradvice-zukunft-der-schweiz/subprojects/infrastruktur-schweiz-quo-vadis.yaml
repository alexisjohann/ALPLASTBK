    FehrAdvice Pro-Bono-Projekt mit teilweiser Co-Finanzierung
    durch strategische Partner (aktuell: auto-suisse).

  fehradvice_contribution:
    type: "pro_bono"
    scope: "Framework, Analyse, Methodik, Koordination"

  co_financiers:
