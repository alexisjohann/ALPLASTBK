        customer_ref: "CUS-AUTOSUISSE"
        commitment_date: "2026-02-11"
        commitment_type: "teilweise Finanzierung"
        note: "Grünenfelder im Meeting bereit erklärt"
    description: |
      Verhaltensökonomische Analyse der Schweizer Infrastruktur-Politik.
      Fokus: Mobilität, Energie, Digitalisierung, öffentlicher Verkehr.
      auto-suisse als Co-Finanzierer (Brücke Automobil ↔ Infrastruktur).

