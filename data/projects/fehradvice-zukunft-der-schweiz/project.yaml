# =============================================================================
# INITIATIVE
# =============================================================================
project:
  name: "Zukunft der Schweiz"
  type: pro_bono
  category: internal_initiative

  description: |
    FehrAdvice Pro-Bono-Initiative für die Zukunft der Schweiz.

    Verhaltensökonomisch fundierte Analysen und Empfehlungen zu den
    grossen Herausforderungen der Schweiz — überparteilich, evidenz-basiert,
    im öffentlichen Interesse.

    Die Initiative umfasst mehrere Subprojekte zu spezifischen Themen
    (Infrastruktur, Demokratie, Bildung, etc.), die teilweise durch
    strategische Partner co-finanziert werden.

  vision: |
    Die Schweiz profitiert von verhaltensökonomisch fundierten Analysen
    zu ihren grössten Herausforderungen — unabhängig von politischer
    Zugehörigkeit, basierend auf Evidenz statt Ideologie.

  principles:
    - id: "P1"
      name: "Überparteilich"
      description: "Keine Partei-Bindung, evidenz-basiert"
    - id: "P2"
      name: "Öffentliches Interesse"
      description: "Ergebnisse sollen der Schweiz als Ganzes dienen"
    - id: "P3"
      name: "Wissenschaftlich fundiert"
      description: "EBF-Framework, peer-reviewed Methodik"
    - id: "P4"
      name: "Co-Finanzierung willkommen"
      description: "Strategische Partner können Subprojekte mitfinanzieren"

