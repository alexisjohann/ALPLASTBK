    political_feedback:
      description: "Negative Wahrnehmung → SVP-Stimmen → Restriktive Politik"
      quantification: "+6pp SVP seit 2000 in Grenzregionen"
      source: "PAP-alrababah2024freemovement"

  beatrix_implications:
    primary_target: AWARE
    intervention_focus: "Narrative-Korrektur statt Lohnpolitik"

    recommendations:
      - target: "AWARE"
        action: "Faktenbasierte Kommunikation über tatsächliche Effekte"
        expected_effect: "ΔN_d = -0.10 → ΔU_perceived = +0.08"

      - target: "WHO"
        action: "Segment-spezifische Kommunikation"
        details: "Niedrigqualifizierte: Komplementarität; Rentner: AHV-Beitrag"

      - target: "WHERE"
        action: "Kantonal differenzierte Strategie"
        details: "TI: intensive Intervention; GE/ZH: light touch"

      - target: "WHEN"
        action: "Timing vor negativen Narrativen"
        details: "Proaktive Kommunikation, nicht reaktiv"

    not_recommended:
