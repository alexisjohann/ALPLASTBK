    # === Adjustment Dynamics (Dustmann 2017) ===
    - symbol: "λ"
      name: "adjustment_speed"
      description: "Anpassungsgeschwindigkeit lokaler Arbeitsmärkte"
      value: 0.25
      unit: "per_year"
      interpretation: "4 Jahre für vollständige Anpassung"
      source: "PAP-dustmann2017labor"
      group: dynamics

    # === Political Feedback (Portmann 2012) ===
    - symbol: "ρ_pol"
      name: "political_alignment"
      description: "Voter-Legislator Präferenz-Alignment"
      value: 0.168
      source: "PAP-portmann2012voters"
      group: political

  functional_form:
    type: "holistic_welfare_with_narrative_and_migrant_types"

    main_equation: |
      ΔU_total(i,k,m,t) = Σ_d [ ω_d(i) · (ΔU_d_actual(k,m,t) + N_d(m,t)) ]
                         + Σ_{d1<d2} [ γ(d1,d2) · ΔU_d1 · ΔU_d2 ]
                         + ΔU_housing(k,t)
                         + ΔU_fiscal(k,m,t)

    migrant_type_equation: |
      ΔU_d_actual(k,m,t) = θ_m · ΔU_d_base(k,t)
      WHERE m ∈ {GRZ, EU_H, EU_N, FAM, ASY, DRT}
      AND θ_m = type-specific multiplier

    fiscal_by_type_equation: |
      ΔU_fiscal(k,m,t) = {
        GRZ:  strongly_positive (taxes, no infrastructure)
        EU_H: strongly_positive (high taxes, low usage)
        EU_N: neutral_to_positive
        FAM:  initially_negative → converging
        ASY:  negative_short_term → hump(10y) → declining
        DRT:  strongly_positive
      }

    integration_trajectory_equation: |
      Employment(m,t) = {
        LABOR (GRZ, EU_H, EU_N, DRT): stable_high(t)
        FAMILY (FAM): stable_medium(t)
        REFUGEE (ASY): hump(peak=10y, then_reversal)
      }

    housing_equation: |
      ΔU_housing(k,t) = -η · ΔP_housing(k,t) / Income(i)
      WHERE η ∈ {0.043 (SFH), 0.059 (APT), 0.074 (RENT)}

    fiscal_equation: |
      ΔU_fiscal(k,t) = Taxes_paid(migrant) - Infrastructure_used(migrant)

    narrative_equation: |
      N_d(t) = β_media · Media_coverage(t) + β_svp · SVP_discourse(t) + ε

    political_feedback: |
      Vote_SVP(k,t+1) = β_0 + β_1 · ΔU_perceived(k,t) + β_2 · N_d(t)
      Policy(t+2) = ρ_pol · Vote_SVP(k,t+1)

    interpretation: |
      Wahrgenommener Nutzen = Tatsächlicher Nutzen + Narrative Verzerrung
      Migration ist objektiv positiv (ΔU_actual > 0) aber subjektiv negativ (ΔU_perceived < 0)
      Das Paradox erklärt politische Destabilisierung trotz ökonomischem Gewinn

  theory_basis:
