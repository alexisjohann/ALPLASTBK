- id: MOD-FIN-BUBBLE-001
  name: "AI Bubble Diagnostic & Prognostic Model (ABDPM)"
  version: '1.1'
  created: '2026-02-04'
  last_updated: '2026-02-04'
  created_in_session: EBF-S-2026-02-04-FIN-001
  question_type: bubble_diagnosis_prognosis
  question_template: "Gibt es eine [X]-Bubble und wie wahrscheinlich platzt sie in [T]?"
  example_questions:
    - "Gibt es eine AI-Bubble und platzt sie in 6 Monaten?"
    - "Ist der Kryptomarkt überhitzt?"
  core_dimensions:
    primary:
      - WHAT
      - WHEN
      - HOW
    secondary:
      - AWARE
      - WHO
  psi_dimensions:
    - Ψ_E
    - Ψ_T
    - Ψ_C
    - Ψ_I
    - Ψ_G
    - Ψ_M
    - Ψ_S
    - Ψ_F
  components:
    - name: "Kindleberger-Minsky 5-Phasen"
      type: "qualitative"
      output: "phase_score [0-1]"
    - name: "Lamont 4 Horsemen"
      type: "checklist"
      output: "lamont_score [0-1]"
    - name: "Circular Financing Risk Score"
      type: "quantitative"
      output: "cfrs [0-1]"
    - name: "Shiller CAPE Ratio"
      type: "quantitative"
      output: "cape_score [0-1]"
    - name: "Credit Spread Complacency"
      type: "quantitative"
      output: "complacency_score [0-1]"
    - name: "Insider Selling"
      type: "quantitative"
      output: "insider_score [0-1]"
  formulas:
    diagnose: "B_score = Σ(wᵢ × componentᵢ)"
    prognose: "P(Crash) = 1 - Π[1 - P(Tᵢ) × P(Crash|Tᵢ)]"
  weights:
    phase: 0.20
    lamont: 0.20
    cfrs: 0.20
    cape: 0.15
    complacency: 0.15
    insider: 0.10
  interpretation:
    b_score_below_50: "Keine Blase"
    b_score_50_70: "Überhitzung"
    b_score_70_85: "Blase (frühe Phase)"
    b_score_above_85: "Kritische Blase"
  theory_support:
    - "MS-IB-005: Overconfidence"
    - "MS-BF-007: Overreaction"
    - "MS-BF-006: Momentum"
  external_theories:
    - author: "Kindleberger"
      work: "Manias, Panics, and Crashes"
      contribution: "5-Phasen Bubble-Modell"
    - author: "Lamont"
      work: "4 Horsemen Framework"
      contribution: "Bubble-Diagnose-Kriterien"
  validation_status: "initial"
  version_history:
    - version: '1.0'
      date: '2026-02-04'
      changes: "Initial bubble model with 6 components"
    - version: '1.1'
      date: '2026-02-04'
      changes: "Added Credit Spreads, Insider Selling, extended triggers"
      session: EBF-S-2026-02-04-FIN-001

