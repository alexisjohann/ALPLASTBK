- id: MOD-ZIN-001
  name: Kreislaufwirtschaft Behavior Dynamics ODE Model
  version: '1.0'
  created: '2026-02-02'
  last_updated: '2026-02-02'
  created_in_session: EBF-S-2026-02-02-ORG-ZIN003
  evolved_in_sessions:
    - EBF-S-2026-02-02-ORG-ZIN003
  customer: Zindel United
  project: ZIN003
  project_name: Kreislaufwirtschaft Verhaltensänderung
  question_type: behavior_change_process
  question_template: "Wie entwickelt sich [Verhaltensänderung] über Zeit bei [Organisation] unter [Interventionen]?"
  example_questions:
    - "Wie schnell adoptiert Zindel United Kreislaufwirtschafts-Praktiken?"
    - "Welche Interventions-Sequenz maximiert nachhaltige Verhaltensänderung?"
    - "Wann wird kritische Masse erreicht für Transfer zu anderen Standorten?"
  core_dimensions:
    primary:
      - WHAT
      - WHO
      - HOW
      - STAGE
    secondary:
      - AWARE
      - READY
      - WHEN
    extended:
      - WHERE
      - HIERARCHY
  psi_dimensions:
    - Ψ_I
    - Ψ_S
    - Ψ_C
    - Ψ_K
    - Ψ_E
    - Ψ_T
    - Ψ_M
    - Ψ_F
  context_factors_used: 983
  context_source: "data/customers/zindel-united/kontextvektoren/"
  cva_level: VERTIEFT
  functional_form:
    type: ode_system
    description: "5-variable coupled ODE system for behavior change dynamics"
    state_variables:
      - symbol: U
        name: Total Utility
        description: "Aggregierte Utility aus allen 6 FEPSDE-Dimensionen"
        initial: 0.15
        equation: "dU/dt = Σα_d·(1+I+γ)·(1-R)·(1+H) - Σδ_d·U_d"
      - symbol: A
        name: Adoption
        description: "Anteil der Personen mit neuem Verhalten"
        initial: 0.05
        equation: "dA/dt = β·(U+I)·A·(1-A)·(1-0.3R)·(1+M)"
        functional_form: "S-curve (Bass Diffusion)"
      - symbol: R
        name: Resistance
        description: "Widerstand gegen Veränderung"
        initial: 0.60
        equation: "dR/dt = -ρ·evidence·R + r·setback·(1-R)"
      - symbol: H
        name: Habit Strength
        description: "Automatisierungsgrad des neuen Verhaltens"
        initial: 0.00
        equation: "dH/dt = η·A·(1+I_D)·(1-H)"
        note: "Lally et al. (2010): 66 Tage zur Gewohnheit"
      - symbol: M
        name: Momentum
        description: "Organisationale Dynamik/Schwung"
        initial: 0.10
        equation: "dM/dt = μ·success·(1-M) - friction·M"
  utility_dimensions:
    - symbol: U_F
      name: Financial Utility
      weight: 0.20
      alpha: 0.10
      delta: 0.03
      source: "ROI studies, Thaler & Sunstein (2008)"
      context_adjustment: "+0.02 (ROI 6.2% in CH CE)"
    - symbol: U_E
      name: Emotional Utility
      weight: 0.15
      alpha: 0.15
      delta: 0.08
      source: "Kahneman (2011), Affect heuristic"
      context_adjustment: "+0.03 (Familienunternehmen, hohe Identifikation)"
    - symbol: U_P
      name: Physical/Effort Utility
      weight: 0.15
      alpha: 0.04
      delta: 0.02
      source: "Deci & Ryan (2000), Effort studies"
      context_adjustment: "-0.01 (Baubranche = physisch anspruchsvoll)"
    - symbol: U_S
      name: Social Utility
      weight: 0.20
      alpha: 0.15
      delta: 0.06
      source: "Cialdini (2007), Social proof studies"
      context_adjustment: "+0.05 (9-köpfiges Kernteam, starke Teamkultur)"
    - symbol: U_D
      name: Development Utility
      weight: 0.15
      alpha: 0.10
      delta: 0.04
      source: "Dweck (2006), Growth mindset"
      context_adjustment: "+0.02 (Innovationskultur: Invias AG, TorAlva)"
    - symbol: U_X
      name: Existential Utility
      weight: 0.15
      alpha: 0.10
      delta: 0.02
      source: "Frankl (1959), Meaning literature"
      context_adjustment: "+0.04 (8. Generation, «Zukunft bauen» Narrativ)"
  complementarity_matrix:
    - pair: [Social, Existential]
      gamma_ij: 0.35
      parameter_ref: PAR-COMP-001  # Analog zu Identity×Social
      mechanism: "Team-Erleben verstärkt Sinn-Erleben stark"
      source: "Grant (2013), Prosocial motivation"
    - pair: [Development, Existential]
      gamma_ij: 0.40
      mechanism: "Lernen verstärkt Purpose stark"
      source: "Deci & Ryan (2000), SDT"
      domain_specific: true  # PORR-spezifisch, kein generischer PAR-COMP
    - pair: [Financial, Social]
      gamma_ij: -0.15
      parameter_ref: PAR-COMP-002  # Basis: -0.68, hier gedämpft wegen Multi-Faktor-Modell
      context_adjustment: "Gedämpft von -0.68 auf -0.15 (Financial als EIN Faktor unter vielen)"
      mechanism: "ACHTUNG: Zu starker Geld-Fokus kann Soziales untergraben"
      source: "Frey & Jegen (2001), Crowding-out"
      warning: "CRITICAL - Financial incentives ERST ab Monat 6!"
    - pair: [Social, Development]
      gamma_ij: 0.25
      parameter_ref: PAR-COMP-006
      mechanism: "Team-Lernen verstärkt sich gegenseitig"
      source: "Bandura (1977), Social learning"
    - pair: [Financial, Physical]
      gamma_ij: 0.20
      parameter_ref: PAR-COMP-007
      mechanism: "Kostenersparnis motiviert Aufwandsreduktion"
      source: "Behavioral economics standard"
    - pair: [Emotional, Development]
      gamma_ij: 0.30
      parameter_ref: PAR-COMP-008
      mechanism: "Positive Emotionen fördern Lernbereitschaft"
      source: "Fredrickson (2001), Broaden-and-build"
  process_parameters:
    adoption:
      beta: 0.50
      description: "S-Curve Adoption Rate"
      source: "Bass (1969), Rogers (2003)"
      context_adjustment: "+0.1 (starke Führung durch Andreas Zindel)"
    resistance:
      rho: 0.04
      description: "Resistance Decay Rate"
      source: "Rogers (2003), Innovation resistance"
      context_adjustment: "+0.01 (Innovationsgeschichte: Prix SVC)"
    setback_sensitivity:
      r: 0.15
      description: "Wie stark springt Widerstand nach Rückschlägen zurück"
    habit_formation:
      eta: 0.015
      unit: "per day"
      monthly_equivalent: 0.45
      description: "Lally et al. (2010): 66 Tage zur Gewohnheit"
    momentum:
      mu: 0.08
      friction: 0.05
      description: "Momentum Build-up und natürlicher Decay"
  stage_thresholds:
    theta_1:
      name: "Kick-off → Umsetzung"
      value: 0.25
      expected_timing: "Ende Monat 2 (März 2026)"
    theta_2:
      name: "Umsetzung → Stabilisierung"
      value: 0.55
      expected_timing: "Ende Monat 5 (Juli 2026)"
    theta_3:
      name: "Stabilisierung → Transfer"
      value: 0.80
      expected_timing: "Ende Monat 7 (September 2026)"
  context_elasticities:
    alpha_psi_I: 0.80
    alpha_psi_S: 1.20
    alpha_psi_C: 0.60
    alpha_psi_K: 1.10
    alpha_psi_E: 0.70
    alpha_psi_T: 0.90
    alpha_psi_M: 0.85
    alpha_psi_F: 0.75
    notes:
      - "Social (Ψ_S) stärkste Amplifikation bei Zindel (Teamkultur)"
      - "Cultural (Ψ_K) stark durch 8. Generation Familienunternehmen"
      - "Material (Ψ_M) gut durch TABREC/Logbau Infrastruktur"
  intervention_timing:
    critical_rule: "Financial incentives ERST ab Monat 6 - CROWDING-OUT Gefahr!"
    optimal_sequence:
      month_1_2: "Social (I_S=0.3) + Development (I_D=0.3)"
      month_3_5: "Social erhöhen (I_S=0.4), Development reduzieren (I_D=0.15)"
      month_6_plus: "Financial einführen (I_F=0.1), Social reduzieren (I_S=0.2)"
  theory_basis:
    primary:
      - theory_id: MS-SP-001
        name: Inequity Aversion
        authors: Fehr, Schmidt
        year: 1999
        relevance: "Teamdynamik und faire Verteilung"
      - theory_id: MS-IN-005
        name: Motivation Crowding
        authors: Frey, Jegen
        year: 2001
        relevance: "Finanzielle Anreize verdrängen intrinsische Motivation"
      - theory_id: MS-NU-002
        name: Habit Formation
        authors: Lally et al.
        year: 2010
        relevance: "66 Tage zur Automatisierung"
    secondary:
      - theory_id: MS-IB-001
        name: Identity Economics
        authors: Akerlof, Kranton
        year: 2000
        relevance: "Familienunternehmen-Identität verstärkt Commitment"
      - theory_id: MS-IF-001
        name: Diffusion of Innovations
        authors: Rogers
        year: 2003
        relevance: "S-Curve Adoption, Resistance Decay"
      - theory_id: MS-SP-004
        name: Self-Determination Theory
        authors: Deci, Ryan
        year: 2000
        relevance: "Intrinsische Motivation für nachhaltige Veränderung"
  data_sources:
