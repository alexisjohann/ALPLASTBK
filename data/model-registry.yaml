    domain_specific: true
  - pair: [CYCLE, RELATION]
    gamma_ij: 0.2
    mechanism: Content pflegt Beziehung in Dürrephase
    strength: SCHWACH
    domain_specific: true

  market_cycle_model:
    phases:
    - id: BOOM
      triggers:
      - VIX > 25
      - CPI > 4%
      - Geopolitical crisis
      demand_multiplier: 1.6
      strategy_focus: SEGMENT
      description: Kapazität nutzen, Neukunden gewinnen
      duration_months_avg: 11
    - id: PLATEAU
      triggers:
      - VIX 15-25
      - Mixed signals
      demand_multiplier: 1.0
      strategy_focus: RELATION
      description: Bestandskunden aktivieren
      duration_months_avg: 15
    - id: DROUGHT
      triggers:
      - VIX < 15
      - High interest rates
      - Stability perception
      demand_multiplier: 0.6
      strategy_focus: RECURR + CYCLE
      description: Recurring Revenue, B2B, Rückkauf
      duration_months_avg: 27

  awareness_by_phase:
    BOOM:
      salience: 0.8
      trust: 0.7
      recall: 0.8
      A_total: 0.75
    PLATEAU:
      salience: 0.5
      trust: 0.7
      recall: 0.6
      A_total: 0.60
    DROUGHT:
      salience: 0.2
      trust: 0.7
      recall: 0.3
      A_total: 0.40

  willingness_model:
    formula: W(Kauf) = W_base × M_phase × M_segment × M_intervention
    W_base: 0.15
    phase_multipliers:
      BOOM: 2.5
      PLATEAU: 1.0
      DROUGHT: 0.4
    segment_multipliers:
      SEG-01: 1.2
      SEG-02: 0.8
      SEG-03: 1.4
      SEG-04: 0.6
    intervention_multipliers:
      sparplan_active: 3.0
      vault_customer: 1.8
      price_alert_active: 2.2
      life_event: 2.5
      no_intervention: 1.0

  customer_journey:
    stages:
    - id: phi_1
      name: AWARE
      conversion_current: 0.08
      conversion_target: 0.12
      lever: Content-Strategie
    - id: phi_2
      name: CONSIDER
      conversion_current: 0.15
      conversion_target: 0.20
      lever: Default-Nudges
    - id: phi_3
      name: FIRST_PURCHASE
      conversion_current: 0.25
      conversion_target: 0.45
      lever: Sparplan + VAULT
      critical: true
    - id: phi_4
      name: REPEAT
      conversion_current: 0.10
      conversion_target: 0.20
      lever: Empfehlungsprogramm

  behavioral_parameters:
    aggregate:
      lambda_loss_aversion:
        value: 2.45
        range: [1.80, 2.80]
        note: Überdurchschnittlich hoch - erklärt Safe Haven Preference
      beta_present_bias:
        value: 0.88
        range: [0.75, 0.95]
        note: Niedrig - langfristig orientiert
      kappa_default_sensitivity:
        value: 0.68
        range: [0.45, 0.80]
