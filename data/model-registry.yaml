        - "PAP-kerr2010labor"
      trajectory: "stable_high"
      notes: "Brain Gain für CH UND Herkunftsland (9:1 Bildungsmultiplikator)"

  variables:
    # === FEPSDE Utility Dimensions ===
    - symbol: "ΔU_F"
      name: "financial_utility_change"
