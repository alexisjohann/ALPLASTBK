        - "Announcement Framing & Communication Scripts"
        - "Salienz-Priorisierung (Was aendern, was behalten)"
        - "Retention Nudge Toolkit (Loss Aversion basiert)"
        - "Quick Win Roadmap (erste 30 Tage)"
      models_used: [BCJ]
      10C_targets: [AWARE, WHEN, READY]
      typical_duration: "2-3 Wochen (pre-Closing)"
      pricing_basis: "Fixed Fee"

    - id: PROD-MA-06
      name: "Behavioral Integration Management (BIM)"
      ma_phase: PH-6
      description: "BCJ-phasengerechtes Post-Merger Integration Program ueber 24-36 Monate"
      deliverables:
        - "24-Monats-Integrationsplan (BCJ 5-Phasen-basiert)"
        - "Kultur-Konvergenz Dashboard (Psi-Distanz-Tracking)"
        - "Phasengerechter Interventions-Kalender"
        - "Crowding-Out-Praevention (gamma-Monitoring)"
        - "Monatliche Pulse Checks + Bayesian Updates"
      models_used: [BCJ, SOCM-1.0, CVA]
      10C_targets: [STAGE, WHO, HOW, WHEN]
      typical_duration: "24-36 Monate"
      pricing_basis: "Monthly Retainer"

    - id: PROD-MA-07
