- id: MOD-ORG-SBO-001
  name: "Skill-Based Organization Model (LEH)"
  version: '1.0'
  created: '2026-02-17'
  last_updated: '2026-02-17'
  created_in_session: EBF-S-2026-02-17-ORG-001
  evolved_in_sessions:
    - EBF-S-2026-02-17-ORG-001
  question_type: organizational_transformation
  question_template: "Wie transformiert [Organisation] von jobbasiert zu skill-basiert?"
  example_questions:
    - "Wie wird ein LEH-Filialnetz mit 15'000 MA skill-basiert?"
    - "Welche Interventionen braucht eine SBO-Transformation im Einzelhandel?"
    - "Was ist der ROI einer Skill-Datenbank für Retail-Unternehmen?"

  core_dimensions:
    primary:
      - WHAT    # Skill-Dimensionen (5 Autor-Typen)
      - WHEN    # Kontext (8 Ψ-Dimensionen, PCT-transformiert)
      - HOW     # Komplementarität (DC, Crowding-Out, Team-Cohesion)
    secondary:
      - WHO     # 4 Segmente × 4 Generationen
      - AWARE   # Assessment-Feedback-Loop
      - READY   # Maturity-Level μ ∈ {0,1,2,3,4}
    extended:
      - STAGE   # 36-Monats-Phasen (AWARENESS→PREPARE→ACTION→MAINTAIN)

  psi_dimensions:
    - id: Ψ_I
      name: institutional
      description: "BetrVG, Tarifvertrag, §94/96-98/99"
      leh_value: 0.85
    - id: Ψ_S
      name: social
      description: "Schichtbetrieb, weniger Peer-Interaktion"
      leh_value: 0.80
    - id: Ψ_C
      name: cognitive
      description: "Zeitdruck, Kundenstress, Multitasking"
      leh_value: 0.65
    - id: Ψ_K
      name: cultural
      description: "Qualifikationskultur DE (Ausbildungssystem)"
      leh_value: 0.90
    - id: Ψ_E
      name: economic
      description: "1-3% Marge, Kostendruck"
      leh_value: 0.70
    - id: Ψ_T
      name: temporal
      description: "Digital-Druck beschleunigend"
      leh_value: 1.10
    - id: Ψ_F
      name: physical
      description: "Filiale/DC/Zentrale heterogen"
      leh_value: variable
    - id: Ψ_G
      name: generational
      description: "4 Kohorten mit unterschiedl. Lernverhalten"
      leh_value: variable

  architecture:
    type: "5-layer-pipeline"
    layers:
      - layer: 1
        name: PERSON
        formula: "T(s,p,Ψ,g) = T_base(s,ℓ) / [L(p) × C(Ψ) × DC(K,s) × ID(s,p) × Cohort(g)]"
        components:
          - "T_base: Dreyfus geometric T₀ × 3^(ℓ-1)"
          - "L(p): 15 Big-Five-Facetten + 5 Interaktionen 2. Ordnung"
          - "C(Ψ): PCT-transformierte Kontext-Multiplikatoren"
          - "DC: Adjacency-gewichtete Dynamic Complementarity"
          - "ID: Identity-Fit [0.3, 1.2]"
          - "Cohort: {1.15, 1.0, 0.85, 0.70}"
      - layer: 2
        name: SKILL
        formula: "Sᵢˢ(t+1) = Sᵢˢ(t) + η(s) × hours/T − δₛ × Sᵢˢ × (1−freq)"
        components:
          - "η: Autor 5-Task-Type Effizienz"
          - "δ: Skill-specific Decay Rate"
      - layer: 3
        name: MATCHING
        formula: "M(k,i) = Σₛ wₛᵏ × min(Sᵢˢ/Dₖˢ, 1)"
        outputs: ["Coverage", "Flexibility", "Gap"]
      - layer: 4
        name: CAPABILITY
        formula: "Capⱼ = [Σᵢ Sᵢˢ⁽ʲ⁾]^α × [1 + γ_team × Coh(j)] × Ψ_org(j)"
        components:
          - "α=0.75 (decreasing returns)"
          - "γ_team=0.28 (cohesion effect)"
      - layer: 5
        name: VALUE
        formula: "V(t) = Σⱼ αⱼ × Capⱼ(t) × Ψ_market(j) − Cost(t)"
        outputs: ["ROI", "NPV", "Break-Even"]

  cross_cutting:
    - id: M1
      name: "Skill-Adjacency Graph"
      formula: "DC(K_prior, s_target) = 1 + γ_DC × Σ w(s', s_target)"
    - id: M2
      name: "Crowding-Out Modul"
      formula: "W(s,i) = W_intr + W_extr + γ_crowd × W_intr × W_extr"
      constraint: "γ_social_financial = -0.68 (PAR-COMP-002)"
    - id: M3
      name: "Generationen-Stratifizierung"
      formula: "Cohort(g) ∈ {1.15, 1.0, 0.85, 0.70}"

  parameters:
    total: 74
    tiers:
      tier_1_meta: 25
      tier_2_study: 22
      tier_3_llmmc: 14
      tier_4_expert: 13
    key_parameters:
      - id: PAR-SF-006
        name: "β_O1 (Intellektuelle Neugier)"
        value_meta: 0.25
        value_leh: 0.225
        pct_factor: 0.90
      - id: PAR-COMP-002
        name: "γ_crowd (Crowding-Out)"
        value_meta: -0.68
        value_leh: -0.748
        pct_factor: 1.10
      - id: PAR-SF-021
        name: "k (Dreyfus-Skalierung)"
        value: 3.0

  theory_basis:
    primary:
      - theory_id: MS-SF-001
        name: "Technology of Skill Formation"
        authors: "Cunha, Heckman"
        year: 2007
        relevance: "Produktionsfunktion K(a+1) = f(K(a), I(a))"
      - theory_id: MS-SF-003
        name: "Dynamic Complementarity"
        authors: "Heckman"
        year: 2025
        relevance: "Prior Skills beschleunigen neues Lernen"
      - theory_id: MS-SF-004
        name: "Skill Learning Time Estimator (SLTE)"
        authors: "EBF Integration"
        year: 2026
        relevance: "Kerngleichung T(s,p,Ψ)"
      - theory_id: MS-IB-001
        name: "Identity Economics"
        authors: "Akerlof, Kranton"
        year: 2000
        relevance: "ID(s,p) Identitäts-Fit"
    secondary:
      - name: "Supermodularity"
        authors: "Milgrom, Roberts"
        year: 1995
        relevance: "∂²V/(∂μ × ∂Training) > 0"
      - name: "Crowding-Out"
        authors: "Bénabou, Tirole"
        year: 2003
        relevance: "Extrinsisch unterminiert Intrinsisch"
      - name: "Dreyfus 5-Level Model"
        authors: "Dreyfus"
        year: 1992
        relevance: "Ordinale Skill-Levels"

  intervention_portfolio:
    count: 9
    key_interventions:
      - id: INT-1
        name: "Skill-Datenbank + Matching"
        target: "WHEN (V)"
        counterfactual_impact: 0.42
      - id: INT-4
        name: "Identity-Reframing Filialleitung"
        target: "WHAT (C.X)"
        counterfactual_impact: 0.31
      - id: INT-5
        name: "Peer-Learning-Netzwerk"
        target: "WHAT (C.S)"
        counterfactual_impact: 0.14
    crowding_out_risk:
      - combination: "INT-5 (Social) + monetäre Anreize"
        gamma: -0.68
        mitigation: "Sequenziell, nie gleichzeitig"
    compliance:
      framework: "BetrVG (DE)"
      milestones:
        - "M-2: Rahmen-BV"
        - "M1: Pilot-BV"
        - "M7: Rollout-BV"
        - "M19: Matching-BV"

  analysis:
    monte_carlo:
      draws: 10000
      method: "Latin Hypercube Sampling"
      key_results:
        roi_median: 0.35
        roi_95ci: "[-0.12, 0.94]"
        p_roi_positive: 0.82
    ode_simulation:
      states: 6
      months: 36
      phase_transitions:
        - "M0-6: AWARENESS"
        - "M6-12: PREPARE"
        - "M12-27: ACTION"
        - "M29+: MAINTAIN"
      critical_window: "M12-15 (Momentum-Peak)"
    financials:
      investment_36m: "€5.5M"
      value_created: "€18.5M"
      npv_8pct: "€10.2M"
      roi: "236%"
      break_even: "Month 14"

  segments:
    - id: SEG-1
      name: "Frontline Gen Z/Y"
      size: "45% (6'750 MA)"
      roi_potential: "Höchstes"
      p_roi_positive: 0.91
    - id: SEG-2
      name: "Frontline Gen X"
      size: "30% (4'500 MA)"
      roi_potential: "Mittel"
      p_roi_positive: 0.78
    - id: SEG-3
      name: "Filialleitung"
      size: "3% (500 MA)"
      roi_potential: "Kritischer Pfad"
      p_roi_positive: 0.72
      note: "Nur Segment mit P(ROI<0)=28% ohne Intervention"
