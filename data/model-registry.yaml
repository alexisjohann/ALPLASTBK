      exc_justification: "EXC-5 S1: Readiness scales execution effectiveness"

  # =========================================================================
  # INTEGRATED FORMULA
  # =========================================================================
  integrated_form:
    type: "portfolio_with_cross_module_complementarity"
    formula: |
      U_total = Sigma_m w_m * V_m + Sigma_ij gamma_ij * sqrt(V_i * V_j)
      where:
        V_m = module-specific value (M1 through M4)
        gamma_ij = cross-module complementarity
        w_m = module weights (scenario-dependent)
    module_weights:
      S1_bigtech:   {M1: 0.35, M2: 0.25, M3: 0.25, M4: 0.15}
      S2_hybrid:    {M1: 0.25, M2: 0.25, M3: 0.25, M4: 0.25}
      S3_trust:     {M1: 0.15, M2: 0.20, M3: 0.35, M4: 0.30}

