- id: MOD-ORG-BMW-001
  name: BMW Product Compliance Behavioral Model
  version: '1.0'
  created: '2026-02-05'
  last_updated: '2026-02-05'
  created_in_session: EBF-S-2026-02-05-ORG-001
  project_ref: PRJ-BMW-001
  deliverable_ref: DEL-3
  
  # Model Classification
  question_type: process_compliance
  question_template: "Wie hoch ist P(Compliance) in einem 5-Phasen Prozess unter Kontext Ψ?"
  example_questions:
    - "Wie wahrscheinlich ist vollständige Produkt-Compliance bei BMW?"
    - "Welche Phase ist der grösste Compliance-Engpass?"
    - "Wie wirkt Zeitdruck auf Compliance-Verhalten?"
  
  # 10C Core Dimensions
  core_dimensions:
    primary:
      - WHAT    # Utility dimensions (u_F, u_S, W_base, u_R, u_E, u_A)
      - WHEN    # Context (Ψ-Dimensions)
      - HOW     # Complementarity (γ)
    secondary:
      - WHO     # Hierarchy levels
      - AWARE   # Compliance awareness
      - STAGE   # 5-Phase Process
  
  # Extended Ψ-Dimensions (11 statt 8)
  psi_dimensions:
    - id: Ψ_I
      name: institutional
      description: "Regeldichte, Prozessformalisierung"
      bmw_value: 0.78
    - id: Ψ_Sp
      name: social_peer
      description: "Kollegennormen, Team-Verhalten"
      bmw_value: 0.62
    - id: Ψ_Sv
      name: social_superior
      description: "Vorgesetzten-Erwartungen, Führungsverhalten"
      bmw_value: 0.68
    - id: Ψ_C
      name: cognitive
      description: "Kognitive Belastung, Komplexität"
      bmw_value: 0.70
    - id: Ψ_K
      name: cultural
      description: "Unternehmenskultur, Werte"
      bmw_value: 0.72
    - id: Ψ_E
      name: economic
      description: "Budget, Ressourcen"
      bmw_value: 0.68
    - id: Ψ_Tp
      name: temporal_project
      description: "Projektdruck, Deadline-Nähe"
      bmw_value: 0.75
    - id: Ψ_Tq
      name: temporal_quarter
      description: "Quartalszyklus, Berichtsperioden"
      bmw_value: 0.65
    - id: Ψ_M
      name: material
      description: "Werkzeuge, IT-Systeme, Prozess-Tools"
      bmw_value: 0.73
    - id: Ψ_F
      name: physical
      description: "Arbeitsumgebung, Standort"
      bmw_value: 0.58
    - id: Ψ_H
      name: hierarchy
      description: "Hierarchie-Distanz, Entscheidungsebenen"
      bmw_value: 0.65
  
  # Utility Variables (6 Dimensionen)
  utility_dimensions:
    - symbol: u_F
      name: financial
      description: "Monetäre Anreize, Boni, Karriere"
      weight_beta: 0.40
    - symbol: u_S
      name: social
      description: "Soziale Anerkennung, Peer-Reputation"
      weight_beta: 0.55
    - symbol: W_base
      name: identity
      description: "Ingenieur-Identität, Qualitätsbewusstsein"
      weight_beta: 0.70
    - symbol: u_R
      name: risk
      description: "Risikoaversion, Unsicherheit"
      weight_beta: -0.35
    - symbol: u_E
      name: effort
      description: "Aufwand, Prozesskosten"
      weight_beta: -0.60
    - symbol: u_A
      name: autonomy
      description: "Handlungsfreiheit, Selbstbestimmung"
      weight_beta: 0.25
  
  # 5-Phase Process Model
  process_phases:
    - phase: P1
      name: ERKENNEN
      description: "Compliance-Relevanz erkennen"
      baseline_alpha: 0.77
      key_drivers: ["Ψ_C", "AWARE"]
    - phase: P2
      name: BEWERTEN
      description: "Risiko und Handlungsbedarf bewerten"
      baseline_alpha: 0.62
      key_drivers: ["W_base", "u_R"]
    - phase: P3
      name: ENTSCHEIDEN
      description: "Compliance-konforme Entscheidung treffen"
      baseline_alpha: 0.43
      key_drivers: ["Ψ_Tp", "Ψ_H", "u_E"]
      critical: true
    - phase: P4
      name: HANDELN
      description: "Entscheidung umsetzen"
      baseline_alpha: 0.69
      key_drivers: ["u_E", "Ψ_M"]
    - phase: P5
      name: MELDEN
      description: "Compliance dokumentieren und melden"
      baseline_alpha: 0.31
      key_drivers: ["u_E", "Ψ_Sv"]
      critical: true
  
  # Complementarity Matrix (γ)
  complementarity:
    - pair: ["u_F", "u_S"]
      gamma: -0.25
      effect: "crowding_out"
      source: "PAR-COMP-002"
    - pair: ["W_base", "Ψ_Tp"]
      gamma: -0.45
      effect: "identity_under_pressure"
      source: "LLMMC"
    - pair: ["u_S", "Ψ_Sv"]
      gamma: 0.50
      effect: "leadership_amplifies_social"
      source: "LLMMC"
    - pair: ["W_base", "u_S"]
      gamma: 0.35
      effect: "identity_social_synergy"
      source: "PAR-COMP-001"
    - pair: ["u_E", "Ψ_H"]
      gamma: 0.30
      effect: "bureaucracy_compounds_effort"
      source: "LLMMC"
  
  # Context Modifiers (δ)
  context_modifiers:
    - dimension: Ψ_Tp
      delta: -0.45
      interpretation: "Zeitdruck reduziert Compliance stark"
    - dimension: Ψ_H
      delta: -0.20
      interpretation: "Hierarchie-Distanz erschwert Compliance"
    - dimension: Ψ_Sv
      delta: 0.35
      interpretation: "Aktive Führung erhöht Compliance"
  
  # Functional Form (4-Level Hierarchical)
  functional_form:
    type: hierarchical_multiplicative
    levels:
      - level: 1
        name: process
        formula: "P = P₁ × P₂ × P₃ × P₄ × P₅"
      - level: 2
        name: phase
        formula: "Pₖ = σ(Uₖᶜᵒᵐᵖˡʸ - Uₖⁿᵒⁿ⁻ᶜᵒᵐᵖˡʸ)"
      - level: 3
        name: utility
        formula: "Uₖ = α₀ᵏ + Σᵢ βᵢuᵢ + Σᵢⱼ γᵢⱼuᵢuⱼ"
      - level: 4
        name: context
        formula: "uᵢ(Ψ) = uᵢ⁰ × exp(Σⱼ δⱼΔΨⱼ)"
  
  # Predictions
  predictions:
    baseline:
      p_full_compliance: 0.043
      ci_95: [0.021, 0.078]
    scenarios:
      - name: high_pressure
        condition: "Ψ_Tp = 0.9"
        p_full_compliance: 0.031
        delta_relative: -0.28
      - name: active_leadership
        condition: "Ψ_Sv = 0.85"
        p_full_compliance: 0.098
        delta_relative: 1.28
      - name: identity_intervention
        condition: "W_base activated"
        p_full_compliance: 0.112
        delta_relative: 1.60
    hypotheses:
      - id: H1
        statement: "Effort-Reduktion in P5 erhöht Meldequote"
        expected_effect: "+17pp in P5"
      - id: H2
        statement: "Peer-Normen in P3 erhöhen Entscheidungsqualität"
        expected_effect: "+12pp in P3"
      - id: H3
        statement: "Zeitdruck × Hierarchie verstärkt Non-Compliance"
        expected_effect: "-15pp in P3 (Interaktion)"
      - id: H4
        statement: "Ingenieur-Identität puffert Zeitdruck"
        expected_effect: "Ψ_Tp-Effekt halbiert"
  
  # Validation
  validation_status: initial
  validation_plan:
    - method: retrospective
      description: "Historische Compliance-Fälle nach Phase kodieren"
      validates: ["V1"]
    - method: survey
      description: "Ψ-Dimensionen pro Abteilung erheben"
      validates: ["V2", "V3"]
    - method: quasi_experiment
      description: "Pilot-Intervention A/B-Vergleich"
      validates: ["H1", "H2", "H4"]
  
  # Theory Support
  theory_support:
    - "MS-SP-001: Inequity Aversion (Fehr & Schmidt 1999)"
    - "MS-IB-001: Identity Economics (Akerlof & Kranton 2000)"
    - "MS-TP-001: Quasi-Hyperbolic Discounting (Laibson 1997)"
  
  # External Benchmarks
  benchmarks:
    - source: "Dieselgate Studies (VW 2015)"
      value: "3-5%"
      comparison: "consistent"
    - source: "Fehr et al. (2022) Org-Compliance"
      value: "4-8%"
      comparison: "consistent"
    - source: "ISO 26262 Audit Reports"
      value: "8-12%"
      comparison: "higher (formalized)"
    - source: "Aviation Safety Compliance"
      value: "15-25%"
      comparison: "target benchmark"
  
  # Version History
  version_history:
    - version: '1.0'
      date: '2026-02-05'
      changes: "Initial 5-phase hierarchical compliance model for BMW"
      session: EBF-S-2026-02-05-ORG-001

- id: MOD-SWITCH-001
  name: Neobank Switching Behavior Model
  version: '1.0'
  created: '2026-02-09'
  last_updated: '2026-02-09'
  created_in_session: EBF-S-2026-02-09-FIN-001
  evolved_in_sessions:
    - EBF-S-2026-02-09-FIN-001
  
  question_type: switching_decision
  question_template: Warum wechseln [Population] von [Status Quo] zu [Alternative]?
  
  example_questions:
    - Warum wechseln Schweizer von traditionellen Banken zu Neobanken?
    - Welche Faktoren treiben Neobank-Adoption in der CH?
    - Wann wird Revolut als Primary vs Secondary Bank gewählt?
  
  # 10C Framework
  core_dimensions:
    primary:
      - WHAT   # Utility-Dimensionen (F, P, S, I)
      - HOW    # Komplementarität γ
      - WHEN   # Context Ψ
    secondary:
      - WHO    # Segments (Digital Natives, etc.)
      - WHERE  # Geography (CH-spezifisch)
    extended:
      - AWARE  # Peer influence, Brand awareness
      - READY  # Digital skills, Onboarding friction
      - STAGE  # Life events als Trigger
  
  psi_dimensions:
    - Ψ_I    # Regulatory trust, IBAN suitability
    - Ψ_S    # Peer influence, Social norms
    - Ψ_K    # Digital culture, Swiss values
    - Ψ_C    # Cognitive load, Switching cost perception
    - Ψ_T    # Life events, Time pressure
    - Ψ_E    # Switching costs (financial + hassle)
    - Ψ_F    # Physical access (branch vs digital)
  
  # Variables & Parameters
  variables:
    - symbol: U_F
      name: financial_utility
      description: "Kostenersparnis (Gebühren, FX)"
      scale: '[0,1]'
      weight: 0.35
      sub_components:
        - fee_difference
        - fx_savings
        - cashback_rate
    
    - symbol: U_P
      name: practical_utility
      description: "Convenience, UX, Accessibility"
      scale: '[0,1]'
      weight: 0.30
      sub_components:
        - app_quality
        - onboarding_time
        - transaction_speed
        - digital_access
    
    - symbol: U_S
      name: social_utility
      description: "Peer effects, Coolness, Social norms"
      scale: '[0,1]'
      weight: 0.20
      sub_components:
        - peer_adoption_rate
        - brand_coolness
        - conversation_value
    
    - symbol: U_I
      name: identity_utility
      description: "Self-image, Status, Values"
      scale: '[0,1]'
      weight: 0.15
      sub_components:
        - digital_native_identity
        - global_citizen_identity
        - sustainability_identity
        - rebel_identity
  
  complementarity:
    - pair: [U_F, U_P]
      gamma: +0.25
      description: "Financial savings + Convenience reinforce each other"
      source: "EBF calibration"
    
    - pair: [U_P, U_S]
      gamma: +0.30
      description: "Good UX increases peer recommendation"
      source: "EBF calibration"
    
    - pair: [U_S, U_I]
      gamma: +0.40
      description: "Peer adoption strengthens identity utility"
      source: "PAR-COMP-004"
    
    - pair: [U_F, U_I]
      gamma: -0.10
      description: "Financial motives weaken identity-based coolness"
      source: "PAR-COMP-002 (Crowding-out)"
  
  # Functional Form
  functional_form:
    type: "logistic"
    equation: |
      P(Switch to Neobank) = 1 / (1 + exp(-ΔU))
      
      ΔU = U(Neobank) - U(Traditional)
      
      U(Neobank) = w_F·U_F + w_P·U_P + w_S·U_S + w_I·U_I
                   + γ(F,P)·U_F·U_P + γ(P,S)·U_P·U_S
                   + γ(S,I)·U_S·U_I + γ(F,I)·U_F·U_I
                   + Ψ_modifier
      
      U(Traditional) = w_F·U_F^trad + w_P·U_P^trad + w_S·U_S^trad + w_I·U_I^trad
                       + Ψ_trust_modifier
  
  # Segments
  segments:
    - id: A
      name: "Digital Natives (20-35)"
      proportion: 0.40
      characteristics:
        - "High digital skills"
        - "High peer influence"
        - "Low switching costs (younger)"
      predicted_adoption_rate: "65-75% secondary, 25-35% primary"
      key_drivers: [U_P, U_S, U_I]
    
    - id: B
      name: "Young Professionals (25-40)"
      proportion: 0.35
      characteristics:
        - "Moderate digital skills"
        - "High FX needs (travel)"
        - "Cost-conscious"
      predicted_adoption_rate: "50-60% secondary, 15-20% primary"
      key_drivers: [U_F, U_P]
    
    - id: C
      name: "Tech-Savvy Adults (35-50)"
      proportion: 0.20
      characteristics:
        - "Innovation seekers"
        - "Higher income"
        - "Brand-conscious"
      predicted_adoption_rate: "40-50% secondary, 10-15% primary"
      key_drivers: [U_I, U_S]
    
    - id: D
      name: "Traditional Bankers (50+)"
      proportion: 0.05
      characteristics:
        - "Low digital adoption"
        - "High trust in traditional banks"
        - "High switching costs"
      predicted_adoption_rate: "5-10% secondary, <5% primary"
      key_drivers: [U_F] # Only if massive cost savings
  
  # Testbare Vorhersagen
  predictions:
    - id: P1
      type: "interval"
      statement: "65-75% of Digital Natives adopt Neobank as secondary account (90% CI)"
      mechanism: "High β_digital + High β_peer + Low switching_cost"
    
    - id: P2
      type: "comparative"
      statement: "Revolut 2× häufiger Secondary als Primary; Neon 1.5× häufiger Primary"
      mechanism: "IBAN friction dominates for Revolut primary use"
    
    - id: P3
      type: "conditional"
      statement: "Life events increase adoption by 40-60% (relative to baseline)"
      mechanism: "Ψ_inertia → 0 during life events"
    
    - id: P4
      type: "multiplicative"
      statement: "High UX + Peer influence → 65-70% increase (not 55% additive)"
      mechanism: "γ(P,S) > 0 (complementarity)"
    
    - id: P5
      type: "interval"
      statement: "Foreign license → 8-12% lower primary adoption vs Swiss license"
      mechanism: "τ_foreign = 0.75 vs τ_swiss = 0.82"
  
  # Parameter Sources
  parameter_sources:
    literature:
      - source: "PAR-COMP-004"
        parameters: ["γ(S,I)"]
      - source: "PAR-COMP-002"
        parameters: ["γ(F,I)"]
      - source: "Akerlof & Kranton (2000)"
        parameters: ["β_digital", "β_rebel"]
      - source: "Revolut/Neon Customer Profiles (2026-02-09)"
        parameters: ["trust_scores", "adoption_rates"]
    
    empirical:
      - source: "App Store/Play Store Ratings"
        parameters: ["app_quality_scores"]
      - source: "moneyland.ch Neobank Study 2025"
        parameters: ["cost_comparisons"]
      - source: "IFZ FinTech Study 2024"
        parameters: ["adoption_statistics"]
    
    expert_elicitation:
      - source: "FehrAdvice LLMMC Calibration"
        parameters: ["w_F", "w_P", "w_S", "w_I", "γ(F,P)", "γ(P,S)"]
  
  # Validation Status
  validation:
    status: "pending"
    validation_required_by: "2027-02-09"
    falsification_checks:
      - "Test P4 (complementarity) with A/B test: High UX only, Peer only, Both"
      - "Test P5 (trust penalty) with survey: Foreign vs Swiss license preference"
    
    accuracy_target: 0.75  # 75% correct predictions
    
  # Use Cases
  use_cases:
    - domain: "Banking Strategy"
      application: "Traditional banks designing Neobank-like offerings"
      stakeholders: ["UBS", "ZKB", "Raiffeisen"]
    
    - domain: "Neobank Marketing"
      application: "Targeting strategy for customer acquisition"
      stakeholders: ["Revolut", "Neon", "Yuh", "Radicant"]
    
    - domain: "Regulatory Analysis"
      application: "Impact of licensing requirements on adoption"
      stakeholders: ["FINMA", "SNB"]
  
  # Related Models
  related_models:
    - id: "MOD-REF-001"
      relationship: "sibling"
      note: "Organic Referral Model for UBS - similar decision structure"
    
    - id: "SEED-CH-01"
      relationship: "cousin"
      note: "PK Enrollment Decision - similar switching context"
  
  # Outputs Generated
  outputs:
    - format: "markdown"
      path: "outputs/sessions/EBF-S-2026-02-09-FIN-001/neobank_switching_model.md"
      generated: "2026-02-09"
    
    - format: "yaml"
      path: "data/model-registry.yaml"
      generated: "2026-02-09"
  
  # Version History
  version_history:
    - version: '1.0'
      date: '2026-02-09'
      changes: "Initial Neobank Switching Model via EEE Workflow (Steps 1-8)"
      session: EBF-S-2026-02-09-FIN-001

