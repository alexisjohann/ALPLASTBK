  calibration:
    status: "framework-level"
    empirical_base:
      customer_cases:
        - name: "ALPLA"
          deal_type: "Strategic M&A Scenario (€200M Capex)"
          findings: "gamma_MA+INNOV = -0.22, M&A Utility = 0.615 (Rang 6/6)"
        - name: "PORR"
          deal_type: "Regional Consolidation (Poland, CEE)"
          findings: "3-5% synergy, -1-2% near-term integration cost, €300M write-down risk"
      literature_base:
        papers_total: 49
        key_authors: ["Malmendier", "Tate", "Weber", "Camerer", "Fehr", "Schmidt"]
        key_findings:
