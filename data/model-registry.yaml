        - "PAP-kerr2010labor"
      trajectory: "stable_high"
      notes: "Brain Gain für CH UND Herkunftsland (9:1 Bildungsmultiplikator)"

  variables:
    # === FEPSDE Utility Dimensions ===
    - symbol: "ΔU_F"
      name: "financial_utility_change"
      description: "Veränderung der finanziellen Utility durch Migration"
      scale: '[-1,1]'
      source_psi: Ψ_E
      weight: 0.25
      group: utility_actual

    - symbol: "ΔU_E"
      name: "experiential_utility_change"
      description: "Veränderung der Erlebnis-Utility (incl. Dichtestress)"
      scale: '[-1,1]'
