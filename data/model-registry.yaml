    equations:
    - name: "Phase-Utility"
      formula: "U_φ(s,Ψ,t) = Σᵢ wᵢ(φ,s)·uᵢ·Ψ_mod(i)·Ψ_T*(t)·[1+εᵢ] + Σᵢ<ⱼ [γ(i→j)·uᵢ+γ(j→i)·uⱼ]·√(uᵢ·uⱼ) − φ_crowd·𝟙(u_FIN>θ)·u_FIN·Σₖ|γ(FIN→k)|·uₖ"
    - name: "Phase-Transition"
      formula: "P(φ→φ+1|s,Ψ) = σ(α_s·U_φ − τ_φ(s)·[1+Ψ_COMP])"
    - name: "Advocacy Feedback"
      formula: "Ψ_S*(t+1) = Ψ_S*(t) + ρ·Σₛ P(ADV|s)·N_s·quality(s)"
