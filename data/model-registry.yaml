- id: MOD-001
  name: Religious Tradition Distance Model
  version: '2.0'
  created: '2026-01-25'
  last_updated: '2026-01-25'
  created_in_session: EBF-S-2026-01-25-REL-001
  evolved_in_sessions:
  - EBF-S-2026-01-25-REL-001
  question_type: distance_comparison
  question_template: Ist [A] näher zu [B] oder [C]?
  example_questions:
  - Ist Alevitentum näher zu Zoroastrismus oder Sunnismus?
  - Ist Protestantismus näher zu Katholizismus oder Orthodoxie?
  - Ist Sufismus näher zu Sunnismus oder Schiismus?
  core_dimensions:
    primary:
    - WHAT
    - WHEN
    secondary:
    - WHO
    - HOW
    extended:
    - AWARE
  psi_dimensions:
  - Ψ_I
  - Ψ_S
  - Ψ_K
  - Ψ_C
  - Ψ_T
  - Ψ_E
  - Ψ_F
  variables:
  - symbol: κ
    name: ritual_rigidity
    description: Wie verbindlich sind religiöse Praktiken?
    scale: '[0,1]'
    source_psi: Ψ_I
    weight: 0.12
    group: core_identity
  - symbol: σ
    name: authority_sensitivity
    description: Wie wichtig ist religiöse Hierarchie?
    scale: '[0,1]'
    source_psi: Ψ_S
    weight: 0.12
    group: core_identity
  - symbol: γ
    name: gender_equality
    description: Geschlechter-Egalität in Praktiken
    scale: '[0,1]'
    source_psi: Ψ_S
    weight: 0.12
    group: core_identity
  - symbol: τ
    name: syncretism_tolerance
    description: Werden fremde Elemente aufgenommen?
    scale: '[0,1]'
    source_psi: Ψ_K
    weight: 0.12
    group: core_identity
  - symbol: ω
    name: mysticism_orientation
    description: Innere Erfahrung vs. äußeres Gesetz
    scale: '[0,1]'
    source_psi: Ψ_C
    weight: 0.12
    group: core_identity
  - symbol: δ
    name: afterlife_focus
    description: Wie stark bestimmt Jenseits das Diesseits?
    scale: '[0,1]'
    source_psi: Ψ_K
    weight: 0.12
    group: core_identity
  - symbol: η
    name: historical_roots
    description: Gemeinsame historische Wurzeln und Einflüsse
    scale: '[0,1]'
    source_psi: Ψ_T
    weight: 0.08
    group: historical_geographic
    added_in: v2
  - symbol: φ
    name: geographic_proximity
    description: Räumliche Nähe der Ursprungsregionen
    scale: '[0,1]'
    source_psi: Ψ_F
    weight: 0.08
    group: historical_geographic
    added_in: v2
  - symbol: π
    name: practice_intensity
    description: Alltags-Religiosität, Häufigkeit der Praxis
    scale: '[0,1]'
    source_psi: Ψ_I
    weight: 0.04
    group: context
    added_in: v2
  - symbol: α
    name: awareness_minority
    description: Minderheits- vs. Mehrheitsbewusstsein
    scale: '[0,1]'
    source_psi: AWARE
    weight: 0.04
    group: context
    added_in: v2
  - symbol: ε
    name: economic_tradition
    description: Charakteristische Wirtschaftsstrukturen
    scale: '[0,1]'
    source_psi: Ψ_E
    weight: 0.04
    group: context
    added_in: v2
  functional_form:
    type: weighted_euclidean_distance
    formula: d(A,B) = √[Σᵢ wᵢ · (pᵢᴬ - pᵢᴮ)²]
    interpretation: Je größer d, desto unterschiedlicher die Traditionen
    weights:
      core_identity: 0.72
      historical_geographic: 0.16
      context: 0.12
      total: 1.0
  theory_basis:
    primary:
    - theory_id: MS-IB-001
      name: Identity Economics
      authors: Akerlof, Kranton
      year: 2000
      relevance: Religiöse Identität formt U_IDN
    secondary:
    - theory_id: MS-IB-008
      name: Social Identity
      authors: Tajfel, Turner
      year: 1979
      relevance: In-group/Out-group Dynamik
  data_sources:
  - source: BCM2_07_REL_religious_context.yaml
    type: context_database
    coverage: 8 Traditionen profiliert
  - source: bcm_master.bib
    type: literature
    key_papers:
