      description: "Nachzug von Ehepartnern, Kindern, Eltern"
      proportion: 0.12
      skill_composition: "gemischt, tendenziell niedriger als Hauptantragsteller"
      delta_U_native_actual: "+0.01"
      delta_U_native_perceived: "-0.20"
