        - "Anti-BigTech positioning"

    implementation_sequence:
      phase_1_foundation:
        timeline: "Q2-Q3 2026"
        moves: [NR1, NR2, NR5]
        investment: "low"
        rationale: "Build capabilities and monitoring before committing to scenario-specific strategy"
      phase_2_pilot:
        timeline: "Q3-Q4 2026"
        moves: [NR3, NR6]
