- id: MOD-012
  name: "Fiscal Behavior Model (FBM-CH)"
  version: '1.0'
  created: '2026-01-29'
  last_updated: '2026-01-29'
  created_in_session: EBF-S-2026-01-29-POL-001

  question_type: policy_analysis
  question_template: "Warum [Verhalten X] trotz [Wissen Y]?"
  example_questions:
    - "Warum keine fiskalische Disziplin trotz Wissen um Endlichkeit?"
    - "Warum keine Klimapolitik trotz wissenschaftlichem Konsens?"
    - "Warum keine Pensionsreform trotz demografischem Wandel?"

  core_dimensions:
    primary: [WHO, WHAT, AWARE]
    secondary: [WHEN, HOW]

  psi_dimensions: [Ψ_I, Ψ_S, Ψ_C, Ψ_T]

  actors:
    - id: P
      name: "Politiker"
      utility: "U_P = f(Wiederwahl, Prestige, Macht)"
      horizon: "4 Jahre (Wahlperiode)"
    - id: B
      name: "Bürokratie"
      utility: "U_B = f(Budget, Personal, Autonomie)"
      horizon: "unbegrenzt"
    - id: L
      name: "Lobbys"
      utility: "U_L = f(Subventionen, Regulierung, Zugang)"
      horizon: "unbegrenzt"
    - id: W
      name: "Wähler"
      utility: "U_W = f(Leistungen - Steuern)"
      horizon: "1 Jahr"
    - id: Z
      name: "Zukünftige Generationen"
      utility: "nicht repräsentiert"
      horizon: "keine Stimme"

  blockades:
    - id: M1
      name: "Konzentrierte Vorteile vs. diffuse Kosten"
      formula: "P(Ausgabe) = (Lobby-Intensität × Sichtbarkeit_Nutzen) / (Wähler-Widerstand × Sichtbarkeit_Kosten)"
    - id: M2
      name: "Fiscal Illusion"
      parameter: φ_FI
      description: "Wahre Kosten werden unterschätzt"
    - id: M3
      name: "Zeithorizont-Asymmetrie"
      parameter: τ_horizon
      description: "Politiker 4J vs. Schulden 30J"
    - id: M4
      name: "Common Pool Problem"
      description: "Tragik der Allmende beim Budget"
    - id: M5
      name: "Verlustaversion"
      parameter: λ_loss
      description: "Kürzungen 2.25× schmerzhafter"
    - id: M6
      name: "Komplexitäts-Schleier"
      parameter: κ_komp
      description: "< 1% versteht Bundesbudget"

  variables:
    - symbol: φ_FI
      name: fiscal_illusion
      description: "Grad der Kostenunterschätzung"
      scale: '[0,1]'
      default: 0.65
    - symbol: β_hyp
      name: hyperbolic_discounting
      description: "Gegenwarts-Bias"
      scale: '[0,1]'
      default: 0.70
    - symbol: κ_komp
      name: complexity_understanding
      description: "Budgetverständnis"
      scale: '[0,1]'
      default: 0.25
    - symbol: λ_loss
      name: loss_aversion
      description: "Verlustaversions-Koeffizient"
      scale: '[1,∞]'
      default: 2.25
    - symbol: σ_lobby
      name: lobby_sensitivity
      description: "Politiker-Sensitivität für Lobbys"
      scale: '[0,1]'
      default: 0.75
    - symbol: ρ_diffus
      name: diffuse_weight
      description: "Gewicht diffuser Steuerzahler"
      scale: '[0,1]'
      default: 0.20
    - symbol: θ_schuld
      name: schuldenbremse_effectiveness
      description: "Effektivität der Schuldenbremse"
      scale: '[0,1]'
      default: 0.85

  theory_basis:
    primary:
      - theory_id: MS-PC-001
        name: "Public Choice Theory"
        authors: "Buchanan, Tullock"
        year: 1962
        relevance: "Politiker als rationale Akteure"
      - theory_id: MS-RD-001
        name: "Prospect Theory"
        authors: "Kahneman, Tversky"
        year: 1979
