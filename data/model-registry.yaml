          description: "Overconfidence, Risikoverhalten, Identitaetskongruenz des Target-Managements"
          tool: "SBDMS-1.0 Kalibrierung"
          10C: [AWARE, HIERARCHY]
        - id: BDD-2
          name: "Cultural Compatibility"
          description: "Psi-Distanz Acquirer vs. Target auf allen 8 Dimensionen"
          tool: "CVA SCHNELL-Profil (30 Faktoren)"
          10C: [WHEN]
        - id: BDD-3
          name: "Organizational Resilience"
          description: "Veraenderungsfaehigkeit und Change Readiness der Organisation"
          tool: "BCJ Phase-Assessment (5 Phasen)"
          10C: [READY, STAGE]
        - id: BDD-4
          name: "Complementarity Risk Map"
          description: "Negative gamma-Werte identifizieren (Crowding-Out, Wert-Zerstoerung)"
          tool: "SOCM-1.0 gamma-Matrix"
          10C: [HOW]
        - id: BDD-5
          name: "Stakeholder Impact Analysis"
          description: "Reaktionsprognose fuer Mitarbeitende, Kunden, Lieferanten, Regulatoren"
          tool: "/simulate-stakeholder (7-Persona Simulation)"
          10C: [WHO, WHAT]
      alpha_affinity: 0.90
      flagship: true

    - id: PH-4
      name: "Transaction Execution & Deal Structuring"
      ma_jargon: "Execution"
      timeline: "Monat -1 bis Signing"
      description: "SPA-Verhandlung, Kaufpreisfindung, Earn-Out Design, Closing Conditions"
      key_questions:
        - "Welchen Loss-Aversion-Koeffizienten hat der Verkaeufer (lambda kontextabhaengig)?"
        - "Wie sollte das Earn-Out strukturiert sein (Present Bias beta)?"
        - "Ist die Deal-Struktur als fair wahrgenommen (Inequity Aversion)?"
      primary_10C: [WHAT, HOW]
      parameters:
        - symbol: "lambda_seller"
          name: "Seller Loss Aversion"
          description: "Kontextabhaengige Verlustaversion des Verkaeufers"
          scale: "[1.0, 5.0]"
          benchmarks:
            family_business_founder: 3.5
            family_business_2nd_gen: 2.8
            pe_exit: 1.8
            corporate_carve_out: 2.2
            distressed_sale: 1.5
          source_psi: "Psi_K (Familienehre, Vermaeechtnis) x Psi_S (Beobachtung durch Community)"
        - symbol: "beta_earnout"
          name: "Earn-Out Present Bias"
          description: "Zeitliche Diskontierung zukuenftiger Earn-Out-Zahlungen"
          scale: "[0.5, 1.0]"
          benchmarks:
            founder_optimistic: 0.85
            pe_rational: 0.95
            manager_risk_averse: 0.70
        - symbol: "alpha_fairness"
          name: "Fairness Perception Score"
          description: "Fehr/Schmidt Inequity Aversion auf Deal-Struktur"
          scale: "[0, 1]"
          threshold_cooperation: 0.6
      interventions:
        - "Behavioral Negotiation Playbook"
        - "Anchoring & Framing Strategy"
        - "Non-Monetary Value Bridge Design"
      alpha_affinity: 0.75

    - id: PH-5
      name: "Signing, Closing & Day 1"
      ma_jargon: "Closing"
      timeline: "Signing bis Day 1 + 30 Tage"
      description: "Closing Conditions, Regulatory Approvals, Day-1 Kommunikation, Quick Wins"
      key_questions:
        - "Welche Defaults setzen wir am Day 1 (Choice Architecture)?"
        - "Was ist die Salienz-Priorisierung (was aendern, was behalten)?"
        - "Wie framen wir die Ankuendigung (Social Norms vs. Angst)?"
      primary_10C: [AWARE, WHEN, READY]
      interventions:
        - "Day-1 Choice Architecture"
        - "Announcement Framing & Narrative Design"
        - "Retention Nudge Toolkit"
        - "Quick Win Identification"
      alpha_affinity: 0.80

    - id: PH-6
      name: "Post-Merger Integration (PMI)"
      ma_jargon: "Integration"
      timeline: "Day 1 bis Monat 36"
      description: "Kulturintegration, Synergy Capture, Organisationsumbau, Change Management"
      key_questions:
        - "In welcher BCJ-Phase befindet sich die Organisation?"
        - "Konvergieren die Kulturen oder driften sie auseinander?"
        - "Welche Synergien werden tatsaechlich realisiert (Bayesian Updated)?"
        - "Wo entstehen Crowding-Out-Effekte?"
      primary_10C: [STAGE, WHO, HOW, WHEN]
      bcj_mapping:
        - phase: UNAWARE
          pmi_period: "Monat 0-1"
          interventions: ["Town Halls", "CEO Communication", "Vision Cascade"]
          alpha: 0.85
        - phase: AWARE
          pmi_period: "Monat 1-3"
          interventions: ["Information Sessions", "Q&A Roadshows", "Feedback Loops"]
          alpha: 0.78
        - phase: WILLING
          pmi_period: "Monat 3-6"
          interventions: ["Quick Wins", "Joint Project Teams", "Cross-Pollination"]
          alpha: 0.72
        - phase: ACTING
          pmi_period: "Monat 6-18"
          interventions: ["Process Integration", "KPI Alignment", "Shared Services"]
          alpha: 0.68
        - phase: MAINTAINING
          pmi_period: "Monat 18-36"
          interventions: ["Culture Rituals", "Annual Reviews", "Alumni Programs"]
          alpha: 0.75
      monitoring:
        - metric: "Psi-Distanz (monatlich)"
          target: "Konvergenz Richtung 0"
        - metric: "Synergy Realization Rate"
          benchmark: "Literatur-Prior: 40-60%"
        - metric: "Voluntary Attrition (Key Talent)"
          threshold: "<10% p.a."
        - metric: "Employee Engagement Score"
          threshold: ">65%"
      alpha_affinity: 0.88

  # ======================================================================
  # gamma-Matrix: Komplementaritaeten zwischen Deal-Phasen und Dimensionen
  # ======================================================================
  complementarity:
    - pair: [WHAT_social, WHAT_financial]
      gamma: -0.20
      name: "Crowding-Out Klassiker"
      description: "Finanzielle Integrations-Boni untergraben soziale Kohaesion"
      source: "PAR-COMP-002 (Frey & Jegen 2001)"
      ma_relevance: "Retention Boni koennen Teamgeist zerstoeren"

    - pair: [strategy_ma, strategy_innovation]
      gamma: -0.22
      name: "Acquisition-Innovation Tension"
      description: "M&A-Fokus kannibalisiert Innovationskultur"
      source: "SOCM-1.0 (ALPLA Kalibrierung)"
      ma_relevance: "Target-Innovation oft erstes Opfer der Integration"

    - pair: [strategy_ma, strategy_scale]
      gamma: +0.20
      name: "Scale Synergy"
      description: "M&A verstaerkt Skaleneffekte"
      source: "SOCM-1.0 (ALPLA Kalibrierung)"
      ma_relevance: "Groessenvorteile sind realisierbarer als Revenue-Synergien"

    - pair: [leadership_overconfidence, deal_premium]
      gamma: +0.35
      name: "Hubris Premium"
      description: "Overconfidente CEOs zahlen 65% mehr Akquisitionspraemie"
      source: "Malmendier & Tate (2008)"
      ma_relevance: "Groesster verhaltensoekonomischer Werttreiber in M&A"

    - pair: [cultural_distance, integration_success]
      gamma: -0.45
      name: "Cultural Friction"
      description: "Groessere Kulturdistanz → ueberproportional schwierigere Integration"
      source: "Weber & Camerer (2003), Chatterjee et al. (1992)"
      ma_relevance: "70% der M&A-Misserfolge auf kulturelle Inkompatibilitaet zurueckfuehrbar"

    - pair: [fairness_perception, post_deal_cooperation]
      gamma: +0.30
      name: "Fairness Dividend"
      description: "Als fair wahrgenommener Deal → deutlich hoehere Post-Deal Kooperation"
      source: "Fehr & Schmidt (1999), PAR-COMP-004"
      ma_relevance: "Earn-Out-Design und Kommunikation als Fairness-Signale"

  # ======================================================================
  # 7 Produkte (M&A-Jargon)
  # ======================================================================
  products:
    - id: PROD-MA-01
      name: "Investment Thesis Validation"
      ma_phase: PH-1
      description: "Verhaltensorekonomischer Stress Test der Akquisitionslogik"
      deliverables:
        - "Overconfidence Score des Investitionskomitees"
        - "gamma-Matrix: Strategische Komplementaritaet/Kannibalisierung"
        - "Identity Fit Score (Acquirer-DNA vs. M&A-Strategie)"
        - "Go/No-Go Empfehlung mit Behavioral Risk Rating"
      models_used: [SBDMS-1.0, SOCM-1.0]
      10C_targets: [AWARE, HIERARCHY, HOW]
      typical_duration: "1-2 Wochen"
      pricing_basis: "Fixed Fee"

    - id: PROD-MA-02
      name: "Cultural Fit Assessment"
      ma_phase: PH-2
      description: "Quantifizierte Kulturkompatibilitaetspruefung fuer Target-Shortlist"
      deliverables:
        - "Psi-Distanzmatrix (Acquirer vs. 3-5 Targets)"
        - "CVA-Schnellprofil pro Target (30 Faktoren, 8 Dimensionen)"
        - "Stakeholder Reaction Forecast (7-Persona Simulation)"
        - "Cultural Integration Difficulty Score"
      models_used: [CVA, BCJ]
      10C_targets: [WHO, WHEN]
      typical_duration: "2-3 Wochen pro Target"
      pricing_basis: "Per Target"

    - id: PROD-MA-03
      name: "Behavioral Due Diligence (BDD)"
      ma_phase: PH-3
      description: "5-Modul verhaltensorekonomische Pruefung parallel zur Financial/Legal/Tax DD"
      deliverables:
        - "BDD Report (5 Module: Leadership, Culture, Resilience, Complementarity, Stakeholder)"
        - "Behavioral Risk Heat Map"
        - "Hidden Liability Register (verhaltensorekonomische Risiken)"
        - "Integration Complexity Score"
        - "Key Talent Flight Risk Assessment"
      models_used: [SBDMS-1.0, CVA, BCJ, SOCM-1.0]
      10C_targets: [WHO, WHAT, HOW, WHEN, AWARE, READY, STAGE]
      typical_duration: "4-6 Wochen (parallel zur DD)"
      pricing_basis: "Success Fee + Fixed Base"
      flagship: true

    - id: PROD-MA-04
      name: "Transaction Advisory (Behavioral)"
      ma_phase: PH-4
      description: "Verhaltensoptimale Verhandlungsstrategie und Deal-Strukturierung"
      deliverables:
        - "Seller Behavioral Profile (lambda, beta, Fairness-Praeferenzen)"
        - "Behavioral Negotiation Playbook"
        - "Earn-Out Behavioral Design (Present Bias adjusted)"
        - "Non-Monetary Value Bridge Empfehlung"
        - "Fairness Score der Deal-Struktur"
      models_used: [SBDMS-1.0]
      10C_targets: [WHAT, HOW]
      typical_duration: "2-4 Wochen (deal-begleitend)"
      pricing_basis: "Retainer + Success Fee"

    - id: PROD-MA-05
      name: "Day-1 Readiness Program"
      ma_phase: PH-5
      description: "Verhaltensarchitektur fuer Signing, Closing und die ersten 30 Tage"
      deliverables:
