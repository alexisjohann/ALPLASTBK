      - VIX 15-25
      - Mixed signals
      demand_multiplier: 1.0
      strategy_focus: RELATION
      description: Bestandskunden aktivieren
      duration_months_avg: 15
    - id: DROUGHT
      triggers:
      - VIX < 15
      - High interest rates
      - Stability perception
      demand_multiplier: 0.6
      strategy_focus: RECURR + CYCLE
      description: Recurring Revenue, B2B, Rückkauf
      duration_months_avg: 27

