- id: MOD-PMWT-001
  name: Pharma-MFN Welfare Transfer Model
  version: '1.0'
  created: '2026-02-04'
  last_updated: '2026-02-04'
  created_in_session: EBF-S-2026-02-04-POL-001
  question_type: welfare_transfer_analysis
  question_template: "Welche Wohlfahrtstransfers entstehen durch Policy X?"
  example_questions:
    - "Welche Gefahr besteht für Prämienzahler durch Trump MFN-Policy?"
    - "Wer gewinnt, wer verliert bei Medikamentenpreis-Erhöhungen?"
  core_dimensions:
    primary:
      - WHO
      - WHAT
    secondary:
      - WHEN
      - HOW
      - HIERARCHY
  psi_dimensions:
    - Ψ_I
    - Ψ_E
    - Ψ_S
    - Ψ_T
    - Ψ_K
  theoretical_basis:
    - name: "Public Choice Theory"
      author: "Olson"
      year: 1965
      key_insight: "Concentrated benefits, diffuse costs"
    - name: "Regulatory Capture"
      author: "Stigler"
      year: 1971
      key_insight: "Regulation serves the regulated"
    - name: "Rent-Seeking"
      author: "Tullock"
      year: 1980
      key_insight: "Resources flow to lobbying, not production"
  variables:
    - symbol: Q_CH_patent
      name: patented_medicines_volume
      description: "Volume of patent-protected medicines in CH"
      unit: "CHF"
      value: 4900000000
      source: "BAG/Interpharma"
    - symbol: τ_Ausland
      name: foreign_shareholder_share
      description: "Share of profits flowing to foreign shareholders"
      unit: "percentage"
      value: 0.63
      source: "Financial reports"
    - symbol: ε
      name: spillover_elasticity
      description: "How much CH price change affects US MFN reference"
      unit: "elasticity"
      value: 0.12
      source: "NBER/Literature"
  formulas:
    welfare_change_payers: "ΔW_Prämienzahler = -ΔP_CH × Q_CH_patent"
    welfare_change_pharma: "ΔW_Pharma = +ΔP_CH × Q_CH_patent × (1 + ε × Q_US/Q_CH)"
    net_welfare_ch: "Netto_CH = ΔW_Prämienzahler + (1-τ_Ausland) × ΔW_Pharma_CH"
  scenarios:
    - id: S0
      name: "Status Quo"
      delta_p: 0
      probability: 0.20
    - id: S1
      name: "Moderate"
      delta_p: 0.05
      probability: 0.35
    - id: S2
      name: "Medium"
      delta_p: 0.10
      probability: 0.30
    - id: S3
      name: "Aggressive"
      delta_p: 0.20
