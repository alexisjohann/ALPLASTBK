      notes: "N_d = f(media, SVP_discourse, density_stress_frame)"

    # === Housing Effects (Grossmann 2023) ===
    - symbol: "η_sfh"
      name: "housing_elasticity_sfh"
      description: "Immigration-Housing Elastizität für Einfamilienhäuser"
      value: 0.043
      source: "PAP-grossmann2023housing"
      group: housing

    - symbol: "η_apt"
      name: "housing_elasticity_apt"
      description: "Immigration-Housing Elastizität für Wohnungen"
      value: 0.059
      source: "PAP-grossmann2023housing"
      group: housing

    - symbol: "η_rent"
      name: "housing_elasticity_rent"
      description: "Immigration-Mieten Elastizität"
      value: 0.074
      source: "PAP-grossmann2023housing"
      group: housing

    # === Fiscal Effects (Eichenberger 2014) ===
    - symbol: "κ_debt"
      name: "debt_capitalization"
      description: "Schulden-Housing Kapitalisierungselastizität"
      value: "[0.15, 0.25]"
      source: "PAP-eichenberger2014housing"
      group: fiscal

    # === Labor Market (Dustmann) ===
    - symbol: "γ_wage_low"
      name: "wage_effect_low_skill"
