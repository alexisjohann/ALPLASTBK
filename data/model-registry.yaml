        eichenberger_papers: 8
        migrant_type_papers: 12
        notes: "Type papers: Foged, Bratsberg, Frattini, Amuedo, Beine, Lalive, Weiss"

    - source: "data/paper-intake/2026/"
      type: PIPs
      count: 28
      files: "PIP-2026-01-28-002 to PIP-2026-01-29-012"

    - source: "BCM2_04_KON_*.yaml"
      type: context_database
      coverage: "404 Swiss context factors"

  key_findings:
    paradox:
      description: "Migration ist objektiv positiv aber subjektiv negativ"
      delta_U_actual: "+0.19"
      delta_U_perceived: "-0.12"
      explanation: "Narrative Function N_d dominiert Wahrnehmung"

    housing_effect:
      description: "Housing-Kosten sind größter realer negativer Effekt"
      mechanism: "+1% Ausländer → +7.4% Mieten"
      affected_segments: ["Niedrigqualifizierte Mieter", "Junge Erwachsene"]

    cantonal_heterogeneity:
