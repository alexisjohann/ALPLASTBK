        reason: "Lohneffekte sind bereits positiv für 85%"

      - intervention: "Generische Kampagnen"
        reason: "Ignoriert Segment- und Kantonal-Heterogenität"

  validation:
    status: "literature_validated"
    method: "31 peer-reviewed papers"
    confidence: 0.85
    applied_cases: 0
