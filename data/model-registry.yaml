- id: MOD-HILTI-EVC-001
  name: "Hilti EV Charging Repark Model"
  version: '1.0'
  created: '2026-02-20'
  last_updated: '2026-02-20'
  created_in_session: EBF-S-2026-02-20-ORG-001
  evolved_in_sessions:
    - EBF-S-2026-02-20-ORG-001
  project_ref: PRJ-HILTI-001
  client: "Hilti AG"

  question_type: pricing_behavior
  question_template: "Welches Pricing-Modell maximiert Umpark-Verhalten bei geteilter Ladeinfrastruktur?"
  example_questions:
    - "Wird eine Flatrate oder kWh-Gebuehr zu mehr Umparken fuehren?"
    - "Welchen Effekt hat ein Notification-System auf Blockierverhalten?"
    - "Fuehrt ein niedriger Pauschalpreis zu Crowding-Out sozialer Normen?"

  scope:
    type: continuous
    behavior: "Taegliche Entscheidung: Umparken nach Ladeschluss oder stehen lassen"
    population: "~400 EV-Fahrer, 100 Ladestationen, Hilti HQ Schaan"
    ratio: "1:4 (Stationen:Nutzer)"

  core_dimensions:
    primary:
      - WHAT
      - AWARE
    secondary:
      - WHEN
      - HOW
    extended:
      - WHO
      - STAGE

  psi_dimensions:
    macro:
      - name: "Ψ_K"
        label: "DACH-Arbeitskultur"
        value: "Fairness-orientiert, regelrespektierend"
      - name: "Ψ_I"
        label: "Gratis-Default seit Einfuehrung"
        value: "Status Quo = kostenlos laden"
      - name: "Ψ_E"
        label: "Einkommensniveau"
        value: "Hoch (Hilti-Gehaelter)"
    meso:
      - name: "Ψ_S_corp"
        label: "Hilti Corporate Identity"
        value: "Stark, nachhaltigkeitsorientiert (SBTi)"
      - name: "Ψ_M"
        label: "Ladeinfrastruktur-Typ"
        value: "AC 11kW (Mehrheit) + DC Schnelllader"
      - name: "Ψ_T_shift"
        label: "Schichtarbeit"
        value: "Teils Schichtbetrieb (Plant Schaan)"
    micro:
      - name: "Ψ_F"
        label: "Parkplatz-Distanz"
        value: "Variable Distanzen, Umpark-Aufwand 5-15 Min"
      - name: "Ψ_C"
        label: "Kognitive Last"
        value: "Mittags-Rush, Meeting-Druck"
      - name: "Ψ_A_notif"
        label: "Notification-Praesenz"
        value: "Noch nicht implementiert (Gate-Variable)"
      - name: "Ψ_S_peer"
        label: "Peer-Beobachtbarkeit"
        value: "Kollegiale Sichtbarkeit im Parkhaus"

  variables:
    utility_dimensions:
      - symbol: "C.F"
        name: "financial_cost"
        description: "Preis-Signal der gewaehlten Variante (CHF/kWh oder Flat)"
        weight_beta: 0.60
        uncertainty: 0.12
        source: "LLMMC Prior + WTP-Survey (geplant)"
      - symbol: "C.P"
        name: "practical_cost"
        description: "Aufwandskosten Umparken: Zeitverlust, Unterbrechung, Weg"
        weight_beta: "segment-spezifisch"
        values_by_segment:
          S1_BEV_daily: 0.55
          S2_BEV_occasional: 0.40
          S3_PHEV_micro: 0.25
          S4_shift_workers: 0.75
        uncertainty: 0.15
        source: "LLMMC Prior, Hilti-Kontext"
      - symbol: "C.S"
        name: "social_norm"
        description: "Wahrgenommene Fair-Use-Norm in der Hilti-Community"
        weight_beta: 0.35
        uncertainty: 0.08
        source: "LLMMC Prior + Survey-Diagnostik"
      - symbol: "C.X"
        name: "corporate_identity"
        description: "Hilti-Zugehoerigkeit als Motivation fuer nachhaltiges Verhalten"
        weight_beta: 0.25
        uncertainty: 0.10
        source: "LLMMC Prior"
    gate_variable:
      - symbol: "A"
        name: "awareness"
        description: "Gate: Weiss der Nutzer, dass sein Fahrzeug fertig geladen ist?"
        distribution: "Beta(3,2)"
        mean: 0.60
        with_notification: 0.85
        without_notification: 0.30
        source: "LLMMC Prior, Survey-Diagnostik DIAG-1"
    habit:
      - symbol: "λ"
        name: "habit_persistence"
        description: "Verhaltenstraegheit von Tag zu Tag"
        value: 0.40
        distribution: "Beta(4,6)"
        convergence_weeks: 5
        source: "LLMMC Prior, Literatur (Habit Formation)"

  complementarity_gamma:
    - pair: "C.F × C.S"
      symbol: "γ_FS"
      value: -0.30
      range: "[-0.45, -0.15]"
      mechanism: "Crowding-Out: Monetaerer Preis zerstoert soziale Norm"
      parameter_ref: "PAR-COMP-002 (adjusted: +0.38 fuer Hilti-Kontext)"
      literature: "Gneezy & Rustichini (2000), Frey & Jegen (2001)"
    - pair: "C.S × C.X"
      symbol: "γ_SX"
      value: 0.20
      range: "[0.10, 0.30]"
      mechanism: "Soziale Norm verstaerkt Corporate Identity"
      source: "LLMMC Prior"
    - pair: "Infrastructure × Compliance"
      symbol: "γ_IC"
      value: 0.70
      range: "[0.50, 0.85]"
      mechanism: "Mehr Stationen + Lastmanagement verstaerken Preissignal"
      cross_validated: "MOD-AWE-SG-MOB-001"

  functional_form:
    type: "Gated Logistic with Habit and Segment Interaction"
    equation: "P(repark_t | s, v) = 1/(1 + exp(-ΔU_t))"
    delta_u: "ΔU_t = A · [β_F·p(v) + β_S·σ + β_X·ι + γ_FS·p·σ + γ_SX·σ·ι] - β_P(s)·τ(s) + λ·Y_{t-1} + ε"
    extensions:
      F1_logistic: "Sigmoid-Wrapper fuer [0,1] Wahrscheinlichkeitsraum"
      F2_habit: "λ·Y_{t-1} — Verhaltenstraegheit, Konvergenz ~5 Wochen"
      F3_segment: "β_P(s) — Segment-spezifische Aufwandskosten"

  pricing_variants:
    - id: V1
      name: "Mengenlimit"
      description: "30 kWh gratis/Tag, danach 0.15 CHF/kWh"
      p_marginal_above_limit: 0.15
    - id: V2
      name: "Flatrate"
      description: "5 CHF Pauschale nach 5h"
      p_marginal: 0
      warning: "Unter Gneezy-Threshold, Crowding-Out Risiko"
    - id: V3
      name: "Pay-per-Use"
      description: "0.15 CHF/kWh ab Minute 1"
      p_marginal: 0.15
    - id: V4
      name: "Zeitlimit"
      description: "5h gratis, danach 2 CHF/h Standgebuehr"
      p_marginal_per_hour: 2.00
    - id: V5
      name: "Ausbau + kWh"
      description: "Mehr Stationen + Lastmanagement + 0.10 CHF/kWh"
      p_marginal: 0.10
      infrastructure: true
      recommendation: "Modell-optimal (Pascal Jud Alternative)"

  segments:
    - id: S1
      name: "BEV Daily Commuters"
      size: "~50% (200 Nutzer)"
      beta_P: 0.55
      key_behavior: "Laden jeden Tag, oft bis Feierabend angesteckt"
    - id: S2
      name: "BEV Occasional Chargers"
      size: "~25% (100 Nutzer)"
      beta_P: 0.40
      key_behavior: "2-3x/Woche, flexibler"
    - id: S3
      name: "PHEV Micro-Chargers"
      size: "~15% (60 Nutzer)"
      beta_P: 0.25
      key_behavior: "Kleine Ladungen 5-10 kWh, blockieren trotzdem"
    - id: S4
      name: "Shift Workers"
      size: "~10% (40 Nutzer)"
      beta_P: 0.75
      key_behavior: "Schichtbetrieb, Umparken waehrend Schicht schwierig"

  predictions:
    ranking:
      statement: "V5:Ausbau > V3:PPU > V4:Zeit > V1:Mengen >> V2:Flat"
      confidence: 0.75
      range: "[0.60, 0.85]"
    pairwise:
      - pair: "V5 > V2"
        probability: 0.99
      - pair: "V5 > V3"
        probability: 0.81
      - pair: "V3 > V4"
        probability: 0.65
    gate_effect:
      without_notification: "Alle P(repark) sinken um Faktor ~3"
      with_notification: "+25pp Umpark-Rate [+15pp, +35pp]"
    crowding_out:
      statement: "V2 (5 CHF Flat) liegt unter Gneezy-Threshold → P(repark|V2) < P(repark|Status Quo)"
      mechanism: "A Fine is a Price — legitimiert Blockieren"
    habit_dynamics:
      convergence: "Steady State nach ~5 Wochen"
      week1: 0.25
      week4: 0.45
      week8: 0.48
    monte_carlo:
      draws: 1000
      v5_rank1_frequency: 0.89
      v2_rank5_frequency: 0.94
      variance_decomposition:
        awareness: 0.38
        gamma_fs: 0.24
        beta_p: 0.19
        beta_f: 0.12
        rest: 0.07
    scenarios:
      best_case:
        conditions: "A=0.90, γ_FS=-0.15, σ=0.70"
        v5_p_repark: 0.82
      base_case:
        conditions: "A=0.65, γ_FS=-0.30, σ=0.50"
        v5_p_repark: 0.68
      worst_case:
        conditions: "A=0.25, γ_FS=-0.50, σ=0.20"
        v5_p_repark: 0.42

  bayesian_update_plan:
    phase1_survey:
      measures: ["A (Awareness)", "β_F (WTP)", "γ_FS (Fairness)", "τ (Aufwand)"]
      sample: "~200 aktuelle EV-Fahrer"
    phase2_pilot:
      duration: "4 Wochen"
      scope: "20 von 100 Stationen"
      measures: ["Blockierzeit", "Umpark-Rate", "Beschwerden"]
    phase3_rollout:
      duration: "Monat 3-6"
      scope: "Alle 100 Stationen"
    phase4_review:
      timing: "Monat 6"
      kpis: ["Akzeptanz >70%", "Blockierzeit -40%", "Employer Perception positiv"]

  validation:
    status: "theoretical_pre_survey"
    monte_carlo_validated: true
    cross_validated_with: "MOD-AWE-SG-MOB-001"
    empirical_tests: []
    calibration_data: "Survey (Phase 1) + Pilot (Phase 2)"
    sensitivity_top3:
      - "A (Awareness): 38% — Gate-Variable, hoechste Prioritaet"
      - "γ_FS (Crowding-Out): 24% — bestimmt ob V3 funktioniert"
      - "β_P (Aufwandskosten): 19% — segment-spezifisch messbar"

  cross_references:
    models:
      - "MOD-AWE-SG-MOB-001 — Cross-Validation (γ_IC = +0.70)"
    parameters:
      - "PAR-COMP-002 — γ(Social × Financial) = -0.68 (generic)"
      - "PAR-BEH-002 — Loss Aversion Referenz"
    papers:
      - "PAP-gneezy2000fine — A Fine is a Price (Crowding-Out)"
      - "PAP-frey2001motivation — Motivation Crowding Theory"
    appendices:
      - "EEE (METHOD-DESIGN) — 9-Step Workflow"
      - "GGG (METHOD-CONFIG) — Mapping Tables"
      - "AU (CORE-AWARE) — Awareness Gate"
      - "B (CORE-HOW) — Complementarity"

  version_history:
    - version: '1.0'
      date: '2026-02-20'
      changes: "Full Gated Logistic model with 5 variants, 4 segments, MC + Scenario validated"
      session: EBF-S-2026-02-20-ORG-001

