          source: "UBS NPS tracking"
          monitoring: "quarterly"

  # =========================================================================
  # MODULE 3: ORGANIZATION TRANSFORMATION (Question 3)
  # =========================================================================
  module_3_organization:
    name: "Marketing Organization Transformation Model"
    question: "How must roles, skills, and processes evolve?"
    theory_basis:
      primary:
        - theory_id: MS-SF-001
          name: "Technology of Skill Formation"
          authors: "Cunha, Heckman"
          year: 2007
          relevance: "K(t+1) = f(K(t), I(t)) - skill production function with self-productivity"
        - theory_id: MS-SF-003
          name: "Dynamic Complementarity"
          authors: "Heckman et al."
          year: 2025
          relevance: "Early AI training raises ROI of later training (gamma_low > gamma_high)"
      secondary:
        - theory_id: MS-SF-002
          name: "Scale-Free Skill Measurement"
          relevance: "New AI-native skills EMERGE, not linearly scaled from traditional"
        - theory_id: MS-ENT-001
          name: "Pragmatist Entrepreneurship"
          relevance: "Belief-Action-Response cycle for AI capability building"
        - theory_id: MS-ENT-002
          name: "Product-Market Fit"
          relevance: "Approval threshold 60-80% for scaling AI marketing pilots"

    skill_production_function:
      formula: "K_AI(t+1) = f(K_current(t), I_training(t), K_traditional(t))"
      self_productivity: "dK(t+1)/dK(t) > 0: existing skills raise productivity of new skills"
      dynamic_complementarity: "d²K(t+j+1)/dI(t)dI(t+j) > 0: early AI training raises later ROI"
      key_insight: "Traditional marketers (low AI skills) benefit MOST from early training (gamma_low > gamma_high per MS-SF-003)"
      critical_period: "2026-2027 is the critical window for AI skill investment"

    role_transformation:
      - id: R1
        current_role: "Content Creator"
        future_role: "AI Content Strategist"
        ai_replacement_risk: 0.60
        transformation_type: "augmentation"
        new_capabilities: ["prompt engineering", "AI output curation", "brand voice calibration"]
        skill_gap: 0.55
        critical_period_months: 12
        ubs_context: "Compliance review adds human layer that protects against full automation"

      - id: R2
        current_role: "Campaign Manager"
        future_role: "AI Campaign Orchestrator"
        ai_replacement_risk: 0.40
        transformation_type: "augmentation"
        new_capabilities: ["AI campaign optimization", "cross-channel AI coordination", "algorithmic budget allocation"]
        skill_gap: 0.45
        critical_period_months: 18
        ubs_context: "Multi-market complexity requires human judgment for cultural nuance"

      - id: R3
        current_role: "Media Buyer"
        future_role: "Algorithm Relationship Manager"
        ai_replacement_risk: 0.75
        transformation_type: "fundamental_shift"
        new_capabilities: ["platform API management", "algorithmic optimization", "AI spend governance"]
        skill_gap: 0.70
        critical_period_months: 12
        ubs_context: "Programmatic already dominant; role shifts from buying to governing"

      - id: R4
        current_role: "Market Researcher"
        future_role: "Behavioral Data Scientist"
        ai_replacement_risk: 0.50
        transformation_type: "evolution"
        new_capabilities: ["AI-powered survey design", "behavioral analytics", "real-time insight generation"]
        skill_gap: 0.50
        critical_period_months: 24
        ubs_context: "UBS data richness (6.1T AuM) makes this role HIGH VALUE"

      - id: R5
        current_role: "Brand Manager"
        future_role: "AI Brand Steward"
        ai_replacement_risk: 0.20
        transformation_type: "extension"
        new_capabilities: ["AI brand voice governance", "algorithm brand presence", "AI ethics oversight"]
        skill_gap: 0.35
        critical_period_months: 18
        ubs_context: "Post-CS brand rebuilding makes this role CRITICAL"

      - id: R6
        current_role: "Performance Marketer"
        future_role: "AI Performance Architect"
        ai_replacement_risk: 0.55
        transformation_type: "augmentation"
        new_capabilities: ["AI testing frameworks", "predictive performance models", "attribution AI"]
        skill_gap: 0.40
        critical_period_months: 12
        ubs_context: "Long WM sales cycles challenge standard performance paradigms"

    emerging_roles:
      - name: "AI Marketing Ethics Officer"
        urgency: "immediate"
        rationale: "FINMA compliance + reputational risk require dedicated oversight"
      - name: "AI Platform Liaison"
        urgency: "12_months"
        rationale: "Managing UBS presence in ChatGPT, Gemini, Copilot financial queries"
      - name: "Behavioral AI Designer"
        urgency: "12_months"
        rationale: "Designing AI interactions using EBF behavioral principles"

    training_investment_model:
      formula: "ROI_training = (K_AI(t+1) - K_current(t)) / I_training(t)"
      dynamic_complementarity_premium: "Early investors gain 1.8x more from Year 2 training than late starters"
      optimal_sequence: "1. AI Literacy (all) → 2. Role-specific AI tools → 3. Advanced AI strategy"
      budget_recommendation: "5-8% of marketing budget allocated to AI upskilling in Year 1"

  # =========================================================================
  # MODULE 4: STRATEGIC ROADMAP & NO-REGRET MOVES (Question 4)
  # =========================================================================
  module_4_roadmap:
    name: "Strategic Roadmap & No-Regret Scoring Model"
    question: "What moves are robust across all scenarios?"
    theory_basis:
      primary:
        - theory_id: MS-ENT-001
          name: "Pragmatist Entrepreneurship"
          relevance: "Belief formation → testing → response cycle for AI initiatives"
        - theory_id: MS-ENT-002
          name: "Product-Market Fit"
          relevance: "Approval threshold (60-80%) for scaling AI pilots"
      secondary:
        - theory_id: MS-TP-001
          name: "Productivity Bandwagon"
          relevance: "Avoid so-so automation; ensure new task creation"
        - theory_id: MS-RD-003
          name: "Status Quo Bias"
          relevance: "Organizational change resistance, framing AI as enhancement"

    no_regret_scoring:
      formula: "NR = rho * V_min + (1-rho) * O + r * L"
      variables:
        - symbol: rho
          name: scenario_robustness
          description: "min(V across scenarios) / max(V across scenarios)"
          scale: "[0,1]"
        - symbol: V_min
          name: minimum_value
          description: "Lowest expected value across all 3 scenarios"
          scale: "continuous"
        - symbol: O
          name: option_value
          description: "Value of information/flexibility generated by the move"
          scale: "[0,1]"
        - symbol: r
          name: reversibility
          description: "How easily can the investment be unwound?"
          scale: "[0,1]"
        - symbol: L
          name: learning_value
          description: "Insight generated regardless of scenario outcome"
          scale: "[0,1]"

    no_regret_moves:
      - id: NR1
        name: "AI Literacy Program (All Marketing Staff)"
        description: "Baseline AI understanding for 100% of marketing organization"
        scores:
          rho: 0.95
          V_min: 0.80
          O: 0.85
          r: 0.90
          L: 0.90
          NR_total: 0.87
        scenario_value: {S1: 0.90, S2: 0.85, S3: 0.80}
        investment: "low"
        timeline: "Q2-Q3 2026"
        theory_support: "MS-SF-003: Dynamic Complementarity - early training yields highest ROI"

      - id: NR2
        name: "Customer AI Behavior Monitoring System"
        description: "Early warning system tracking AI adoption across all segments"
        scores:
          rho: 0.90
          V_min: 0.75
          O: 0.95
          r: 0.85
          L: 0.95
          NR_total: 0.87
        scenario_value: {S1: 0.95, S2: 0.85, S3: 0.75}
        investment: "low-medium"
        timeline: "Q2 2026"
        theory_support: "Early Warning System (Module 2) - scenario detection capability"

      - id: NR3
        name: "AI-Mediated Discovery Pilot (F5)"
        description: "Ensure UBS is recommended by AI assistants for wealth management queries"
        scores:
          rho: 0.80
          V_min: 0.60
          O: 0.90
          r: 0.75
          L: 0.85
          NR_total: 0.78
        scenario_value: {S1: 0.95, S2: 0.80, S3: 0.60}
        investment: "medium"
        timeline: "Q2-Q4 2026"
        theory_support: "MS-AI-001: communicating capability, new channel emergence"
        pilot_design:
          approval_threshold: 0.65
          test_queries: 500
          success_metric: "UBS mention rate in AI financial advisor responses"

      - id: NR4
