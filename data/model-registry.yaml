    applied_cases: 2
    last_application: '2026-01-25'
    notes: v2 validiert durch STANDARD-Workflow mit User-Feedback
  example_results:
    case: Alevi-Zoro-Sunni
    model_version: v2
    results:
      d_alevi_zoro: 0.286
      d_alevi_sunni: 0.589
      ratio: 2.06
      confidence: 68% CI
      ci_zoro: '[0.22, 0.35]'
      ci_sunni: '[0.51, 0.67]'
      robustness: P(d_Zoro < d_Sunni) > 99.5%
      main_drivers:
      - variable: τ_syncretism
        contribution: 24.5%
      - variable: γ_gender
        contribution: 16.2%
      - variable: ω_mysticism
        contribution: 15.0%
      - variable: κ_ritual
        contribution: 12.2%
      - variable: η_historical
        contribution: 11.9%
  version_history:
  - version: '1.0'
    date: '2026-01-25'
    changes: Initial model with 6 variables
    variables: 6
    formula: unweighted euclidean
  - version: '2.0'
    date: '2026-01-25'
    changes: Extended to 11 variables with weighting based on User-Feedback in STANDARD-Workflow
    variables: 11
    formula: weighted euclidean
    user_feedback:
      context: Alle (K1+K2+K3+K4)
      model: Alle (M1+M2+M3+M4+M5+M6)
      parameter: P6 (Weiter)
      answer: A6 (Keine Änderung)
- id: MOD-REF-001
  name: Organic Referral Behavior Model
  version: '1.0'
  created: '2026-01-25'
  last_updated: '2026-01-25'
  created_in_session: EBF-S-2026-01-25-FIN-002
  evolved_in_sessions:
  - EBF-S-2026-01-25-FIN-002
  question_type: referral_activation
  question_template: Wie können wir [Kundensegment] dazu bringen, organisch über [Produkt/Service]
    zu sprechen?
  example_questions:
  - Wie stimulieren wir UBS Vorsorge-Kunden zu positivem Word-of-Mouth?
  - Wie aktivieren wir Bestandskunden als Markenbotschafter?
  - Wie fördern wir organische Empfehlungen ohne monetäre Anreize?
  core_dimensions:
    primary:
    - WHAT
    - WHO
    - HOW
    secondary:
    - AWARE
    - STAGE
    extended:
    - WHEN
    - WHERE
    - READY
    - HIERARCHY
  psi_dimensions:
  - Ψ_K
  - Ψ_S
  - Ψ_I
  - Ψ_C
  - Ψ_T
  - Ψ_E
  - Ψ_F
  segments:
  - id: A
    name: Active Ambassadors
    proportion: 0.15
    sigma: 2.2
    characteristics: Hohe Zufriedenheit, extrovertiert, meinungsführend
    intervention_affinity:
    - Identity Activation
    - Social Recognition
  - id: B
    name: Quiet Satisfied
    proportion: 0.45
    sigma: 0.8
    characteristics: Zufrieden aber zurückhaltend, Privatsphäre-orientiert
    intervention_affinity:
    - Facilitated Sharing
    - Subtle Social Proof
  - id: C
    name: Occasional Recommenders
    proportion: 0.3
    sigma: 1.4
    characteristics: Situativ empfehlend, wenn direkt gefragt
    intervention_affinity:
    - Conversation Starters
    - Warm Glow Activation
  - id: D
    name: Private/Disengaged
    proportion: 0.1
    sigma: 0.3
    characteristics: Neutral bis unzufrieden, spricht nicht über Finanzen
    intervention_affinity:
    - None - Focus on satisfaction first
  utility_dimensions:
  - symbol: U_IDN
    name: identity_utility
    description: Identität als kompetenter Vorsorge-Entscheider
    weight: 0.35
    activation_mechanism: Identity-consistent behavior
  - symbol: U_SOC
    name: social_utility
    description: Soziale Anerkennung für hilfreiche Empfehlung
    weight: 0.25
    activation_mechanism: Peer recognition, gratitude
  - symbol: U_PSY
    name: psychological_utility
    description: Warm Glow durch Helfen von Freunden/Familie
    weight: 0.3
    activation_mechanism: Altruistic satisfaction
  - symbol: U_FIN
    name: financial_utility
    description: NICHT AKTIVIEREN - Crowding-Out Risiko
    weight: 0.0
    warning: Monetary incentives destroy intrinsic motivation
  complementarity_matrix:
  - pair:
    - Identity
    - Social
    gamma_ij: 0.35
    parameter_ref: PAR-COMP-001
    mechanism: Identität wird durch soziale Bestätigung verstärkt
  - pair:
    - Social
    - Warm Glow
    gamma_ij: 0.28
    parameter_ref: PAR-COMP-004
    mechanism: Soziale Anerkennung aktiviert Warm Glow
  - pair:
    - Identity
    - Warm Glow
    gamma_ij: 0.22
    parameter_ref: PAR-COMP-005
    mechanism: Kompetenz-Identität führt zu Hilfsbereitschaft
  - pair:
    - Financial
    - Any
    gamma_ij: -0.68
    parameter_ref: PAR-COMP-002
    mechanism: 'CROWDING-OUT: Monetäre Anreize zerstören intrinsische Motivation'
    warning: CRITICAL - Never combine with organic referral
  functional_form:
    type: portfolio_with_complementarity
    formula: E(R) = Σᵢ βᵢ·Iᵢ + Σᵢⱼ γᵢⱼ·√(Iᵢ·Iⱼ) - φ·I_FIN
    parameters:
      beta_identity: 0.253
      beta_social: 0.144
      beta_facilitated: 0.169
      gamma_12: 0.35
      gamma_13: 0.22
      gamma_23: 0.28
      phi_crowding: 0.68
  theory_basis:
    primary:
    - theory_id: MS-IB-001
      name: Identity Economics
      authors: Akerlof, Kranton
      year: 2000
      relevance: Referral als identitätskonsistentes Verhalten
    - theory_id: MS-SP-007
      name: Warm Glow
      authors: Andreoni
      year: 1990
      relevance: Intrinsische Belohnung durch Helfen
    secondary:
    - theory_id: MS-IN-005
      name: Motivation Crowding
      authors: Frey, Jegen
      year: 2001
      relevance: Monetäre Anreize verdrängen intrinsische Motivation
    - theory_id: MS-IF-008
      name: Social Proof
      authors: Cialdini
      year: 1984
      relevance: Normative Einflüsse auf Empfehlungsverhalten
  data_sources:
  - source: BCM2_MIKRO_UBS_context_relevance.yaml
    type: context_database
  - source: BCM2_04_KON_socio_cultural.yaml
    type: context_database
  - source: bcm_master.bib
    type: literature
    key_papers:
    - akerlof2000economics
    - andreoni1990impure
    - frey2001motivation
    - cialdini1984influence
  context_parameters:
    swiss_specific:
      tau_taboo_finance:
        mean: 0.72
        ci_68:
        - 0.65
        - 0.79
      trust_institutions:
        mean: 0.78
        ci_68:
        - 0.72
        - 0.84
      privacy_norm:
        mean: 0.85
        ci_68:
        - 0.8
        - 0.9
      quality_over_quantity:
        mean: 0.82
        ci_68:
        - 0.76
        - 0.88
  validation:
    status: initial
    applied_cases: 1
    last_application: '2026-01-25'
    notes: Erstellt in TIEF-Analyse für UBS Vorsorge Referral Strategy
  example_results:
    case: UBS Vorsorge CH
    results:
      identity_activation: +25.3%
      social_proof_warmglow: +14.4%
      facilitated_sharing: +16.9%
      portfolio_effect: +65.2%
      complementarity_contribution: +8.6%
      ci_95:
      - +48.1%
      - +82.3%
  critical_warnings:
  - type: contraindication
    condition: Monetary referral incentives
    risk: Destroys intrinsic motivation (φ = 0.68)
    recommendation: NEVER use monetary incentives for organic referral
  version_history:
  - version: '1.0'
    date: '2026-01-25'
    changes: Initial model for UBS Vorsorge referral strategy
    session: EBF-S-2026-01-25-FIN-002
