# =============================================================================
# MOD-UBS-AIMARK-001: UBS AI Marketing Transformation Model
# =============================================================================
# Session: EBF-S-2026-02-12-FIN-001
# Customer: UBS (EBF-CUS-UBS)
# Purpose: Integrated behavioral model for AI-driven marketing transformation
# Covers: 4 strategic questions (Value Chain, Customer Scenarios, Org Transform, Roadmap)
# =============================================================================
- id: MOD-UBS-AIMARK-001
  name: "UBS AI Marketing Transformation Model"
  version: '1.2'
  created: '2026-02-12'
  last_updated: '2026-02-12'
  created_in_session: EBF-S-2026-02-12-FIN-001
  evolved_in_sessions:
    - EBF-S-2026-02-12-FIN-001
  customer: UBS
  customer_ref: EBF-CUS-UBS
  question_type: strategic_transformation
  question_template: "Wie muss [Organisation] ihre Marketing-Organisation transformieren angesichts der AI-Revolution?"
  example_questions:
    - "Wie veraendert AI die Marketing-Wertschoepfungskette von UBS?"
    - "Welche Kundenverhalten-Szenarien entstehen durch AI im Wealth Management?"
    - "Welche Rollen und Skills braucht UBS Marketing in 3-5 Jahren?"
    - "Was sind No-Regret Moves fuer UBS Marketing unabhaengig vom Szenario?"

  # =========================================================================
  # 10C CORE DIMENSIONS
  # =========================================================================
  core_dimensions:
    primary:
      - WHAT    # Value dimensions of AI-enabled marketing
      - WHO     # Customer segments + employee segments
      - STAGE   # Customer journey phases + org transformation phases
    secondary:
      - AWARE   # AI awareness (customers and employees)
      - WHEN    # Scenario timing, adoption velocity
      - HOW     # Complementarity between AI and human capabilities
    extended:
      - READY   # Skill readiness, organizational readiness
      - WHERE   # Parameter sources (literature + UBS-specific)
      - HIERARCHY  # Decision levels (tactical/strategic/transformative)

  # =========================================================================
  # PSI DIMENSIONS
  # =========================================================================
  psi_dimensions:
    - Ψ_I: "FINMA regulation, data protection (FADP), AI Act (EU extraterritorial)"
    - Ψ_S: "Wealth management social norms, advisor-client relationship, peer effects"
    - Ψ_K: "Swiss trust culture, discretion premium, conservative innovation adoption"
    - Ψ_C: "Digital fatigue, AI anxiety, information overload"
    - Ψ_E: "USD 6.5B IT budget, USD 6.1T AuM, post-CS integration resources"
    - Ψ_T: "3-5 year transformation horizon, CS integration completion 2026"
    - Ψ_M: "Avaloq/Temenos core banking, 55% cloud adoption, AI tooling maturity"
    - Ψ_F: "Global (50+ countries), CH-centric (32% employees), digital-first trend"

  # =========================================================================
  # MODULE 1: AI MARKETING VALUE CHAIN TRANSFORMATION (Question 1)
  # =========================================================================
  module_1_value_chain:
    name: "AI Marketing Value Chain Transformation"
    question: "Where can UBS deploy AI to create sustainable marketing advantage?"
    theory_basis:
      primary:
        - theory_id: MS-AI-001
          name: "AI Consumer Experience Framework"
          authors: "Puntoni et al."
          year: 2021
          relevance: "4 AI capabilities (listening/predicting/producing/communicating) map to marketing functions"
        - theory_id: MS-TP-001
          name: "Productivity Bandwagon Theory"
          authors: "Acemoglu, Johnson"
          year: 2023
          relevance: "AI must create NEW marketing tasks, not just automate existing ones (so-so automation trap)"
      secondary:
        - theory_id: MS-TP-002
          name: "Technology Direction Framework"
          relevance: "Dominant AI narrative shapes which marketing capabilities get built"
        - theory_id: MS-CM-001
          name: "Firestorm Detection-Prevention-Mitigation"
          relevance: "AI-powered brand monitoring with quantified parameters"

    marketing_functions:
      - id: F1
        name: content_generation
        ai_capability: producing
        description: "Generative AI for personalized content at scale"
        ai_potential: 0.85
        current_maturity_ubs: 0.30
        differentiation_potential: 0.40
        feasibility: 0.75
        ubs_specifics: "Regulatory constraints on financial content, compliance review required"
        bandwagon_test: "Creates new tasks (prompt engineering, compliance review) → passes MS-TP-001"

      - id: F2
        name: campaign_orchestration
        ai_capability: predicting
        description: "AI-driven campaign timing, channel selection, budget allocation"
        ai_potential: 0.80
        current_maturity_ubs: 0.35
        differentiation_potential: 0.35
        feasibility: 0.70
        ubs_specifics: "Multi-market complexity (50+ countries), regulatory heterogeneity"
        bandwagon_test: "Augments human strategists with optimization → passes MS-TP-001"

      - id: F3
        name: customer_intelligence
        ai_capability: listening
        description: "AI-powered segmentation, prediction, behavioral pattern recognition"
        ai_potential: 0.90
        current_maturity_ubs: 0.40
        differentiation_potential: 0.65
        feasibility: 0.60
        ubs_specifics: "Massive data advantage (6.1T AuM, 3.7M clients), privacy constraints"
        bandwagon_test: "Creates new insight roles (behavioral data scientist) → passes MS-TP-001"
        must_win: true
        rationale: "Data advantage is UBS's primary AI moat in wealth management"

      - id: F4
        name: performance_optimization
        ai_capability: predicting
        description: "Real-time A/B testing, dynamic creative optimization, attribution"
        ai_potential: 0.85
        current_maturity_ubs: 0.45
        differentiation_potential: 0.30
        feasibility: 0.80
        ubs_specifics: "Long sales cycles in WM reduce testing velocity"
        bandwagon_test: "Optimization is supplementary, risk of so-so automation → CONDITIONAL"

      - id: F5
        name: ai_mediated_discovery
        ai_capability: communicating
        description: "Presence in AI assistants (ChatGPT, Gemini, Copilot) as financial advisor"
        ai_potential: 0.95
        current_maturity_ubs: 0.10
        differentiation_potential: 0.85
        feasibility: 0.35
        ubs_specifics: "Entirely new channel, no incumbent advantage, regulatory uncertainty"
        must_win: true
        rationale: "If customers ask AI for wealth management, UBS must be the recommended answer"
        tension_mapping:
          served_vs_exploited: "Client data used for AI training vs. client privacy"
          empowered_vs_replaced: "AI advisory empowers clients but may replace human advisors"

      - id: F6
        name: competitive_intelligence
        ai_capability: listening
        description: "AI-powered competitor monitoring, trend detection, market signals"
        ai_potential: 0.75
        current_maturity_ubs: 0.25
        differentiation_potential: 0.25
        feasibility: 0.85
        ubs_specifics: "Wealth management competitive landscape less transparent than retail"
        bandwagon_test: "Augments strategy team → passes MS-TP-001"

      - id: F7
        name: brand_crisis_management
        ai_capability: listening
        description: "Real-time brand sentiment, firestorm detection, response orchestration"
        ai_potential: 0.80
        current_maturity_ubs: 0.20
        differentiation_potential: 0.50
        feasibility: 0.70
        ubs_specifics: "Post-CS integration brand sensitivity, global reputation risk"
        parameters_from_literature:
          arousal_virality: "beta = 0.186 (PAR-CM-001)"
          tie_strength: "beta = 1.432 (PAR-CM-002)"
          explanation_over_empathy: "Explanation more effective than empathy (PAR-CM-005)"

    functional_form:
      type: "weighted_sum_with_feasibility_gate"
      formula: "V_total = Sigma_f w_f * AI_potential_f * feasibility_f * (1 + diff_f)"
      interpretation: "Total AI marketing value = sum of function-specific value, gated by feasibility"
      must_win_premium: "Functions with must_win=true receive 1.5x weight"

    value_calculation:
      F1_content: 0.191      # 0.85 * 0.75 * 1.40 * w=0.15 (adjusted)
      F2_campaign: 0.113     # 0.80 * 0.70 * 1.35 * w=0.12
      F3_intelligence: 0.265 # 0.90 * 0.60 * 1.65 * w=0.18 * 1.5 (must_win)
      F4_performance: 0.119  # 0.85 * 0.80 * 1.30 * w=0.13
      F5_discovery: 0.274    # 0.95 * 0.35 * 1.85 * w=0.20 * 1.5 (must_win)
      F6_competitive: 0.064  # 0.75 * 0.85 * 1.25 * w=0.08
      F7_brand_crisis: 0.098 # 0.80 * 0.70 * 1.50 * w=0.09
      V_total: 1.124
      priority_ranking:
        1: "F5 AI-Mediated Discovery (highest value, highest differentiation)"
        2: "F3 Customer Intelligence (data moat, must-win)"
        3: "F1 Content Generation (high potential, good feasibility)"
        4: "F4 Performance Optimization (high feasibility, fast ROI)"
        5: "F2 Campaign Orchestration (solid fundamentals)"
        6: "F7 Brand Crisis (important but defensive)"
        7: "F6 Competitive Intelligence (useful but not differentiating)"

  # =========================================================================
  # MODULE 2: CUSTOMER BEHAVIOR SCENARIOS (Question 2)
  # =========================================================================
  module_2_scenarios:
    name: "Customer Behavior Scenario Model"
    question: "How will customer behavior evolve as AI becomes pervasive?"
    theory_basis:
      primary:
        - theory_id: MS-CJ-001
          name: "Customer Journey Theory (7-Step)"
          relevance: "Journey phases transform differently under each scenario"
        - theory_id: MS-CJ-002
          name: "Customer Journey Segmentation (5-Segment)"
          relevance: "Segment-specific journey satisfaction drivers"
        - theory_id: MS-AI-001
          name: "AI Consumer Experience Framework"
          relevance: "Psychological tensions in AI-mediated financial services"
      secondary:
        - theory_id: MS-IB-001
          name: "Identity Economics"
          relevance: "Brand-identity alignment in AI world"
        - theory_id: MS-IB-018
          name: "Fear of Asking"
          relevance: "Barrier to AI advisor adoption"
        - theory_id: MS-RD-001
          name: "Prospect Theory"
          relevance: "Loss aversion in switching and AI adoption framing"
        - theory_id: MS-IF-007
          name: "Cheap Talk Caveat"
          relevance: "50% ignore recommendations without established trust"

    # 3 SCENARIOS
    scenarios:
      - id: S1
        name: "BigTech Dominance"
        short: "AI platforms become primary financial services interface"
        probability: 0.20
        probability_ci: "[0.10, 0.30]"
        description: |
          Apple, Google, OpenAI become the primary interface through which
          customers discover, evaluate, and manage financial services.
          AI assistants replace traditional search and advisory channels.
          Bank brands become invisible backend providers.
        key_assumptions:
          - "AI assistant market share for financial queries > 50% by 2028"
          - "BigTech obtains financial services licenses (Apple Bank, Google Finance)"
          - "Regulatory environment permissive toward BigTech financial services"
          - "Customer trust transfers from bank brand to AI platform brand"
        customer_behavior:
          search: "AI assistant is primary discovery channel (>60% of new product searches)"
          decision: "AI recommendation > brand trust for product selection"
          channel: "App-native, voice-first, AI-mediated"
          loyalty: "Platform-locked, bank-agnostic (switching cost near zero)"
          advisor_role: "Niche for UHNW only, most advisory replaced by AI"
        journey_transformation:
          detect_need: "AI proactively suggests financial actions"
          search: "AI curates options, no manual search"
          evaluate: "AI compares automatically based on personal data"
          decide: "AI recommends, human approves (or auto-approves)"
          purchase: "Seamless API-mediated transaction"
          use: "AI monitors and optimizes continuously"
          engage: "AI manages relationship, human contact rare"
        ubs_impact:
          brand_relevance: 0.30
          advisor_value: 0.25
          data_advantage: 0.40
          margin_pressure: "severe"
          strategic_response: "Must become best-in-class API provider for AI platforms"

      - id: S2
        name: "Hybrid Evolution"
        short: "Banks and BigTech coexist with generational segmentation"
        probability: 0.50
        probability_ci: "[0.35, 0.65]"
        description: |
          AI adoption proceeds gradually with significant generational and
          wealth-tier differences. Banks successfully integrate AI into
          existing advisory models. BigTech present but not dominant in
          wealth management. Trust and personal relationship remain
          differentiators for complex financial decisions.
        key_assumptions:
          - "AI assistant adoption gradual (30-40% penetration by 2028)"
          - "Generational divide: 60% Gen Z/Millennial vs 15% Boomer AI usage"
          - "Regulatory framework balances innovation and consumer protection"
          - "Human advisor remains valuable for complex/emotional decisions"
        customer_behavior:
          search: "Mixed: AI-assisted + traditional (segment-dependent)"
          decision: "AI for simple products, human advisor for complex/large"
          channel: "Omnichannel with AI layer (branch + app + AI + video)"
          loyalty: "Relationship-based for UHNW, convenience-based for mass affluent"
          advisor_role: "Evolves to AI-augmented advisor (not replaced)"
        journey_transformation:
          detect_need: "Mix of AI-proactive and self-initiated"
          search: "AI-augmented search with human curation"
          evaluate: "AI comparison + advisor consultation for complex products"
          decide: "Human decision with AI-generated options"
          purchase: "Digital-first, but branch option preserved"
          use: "AI monitoring with human escalation"
          engage: "Hybrid: AI routine contact, human for key moments"
        ubs_impact:
          brand_relevance: 0.70
          advisor_value: 0.65
          data_advantage: 0.60
          margin_pressure: "moderate"
          strategic_response: "AI-augmented advisory model, invest in both channels"

      - id: S3
        name: "Trust-Anchored Banking"
        short: "Regulatory backlash and trust premium favor incumbent banks"
        probability: 0.30
        probability_ci: "[0.15, 0.40]"
        description: |
          AI scandals, data breaches, or regulatory crackdown constrain
          BigTech in financial services. Swiss trust premium becomes MORE
          valuable. Customers prefer human-centric banking with AI as
          invisible enabler. UBS brand and advisor network become
          competitive moat.
        key_assumptions:
          - "Major AI/data scandal in financial services triggers backlash"
          - "FINMA/EU restrict AI in client-facing financial advice"
          - "Swiss banking secrecy narrative strengthens (anti-BigTech)"
          - "Customers explicitly prefer human advisor for financial trust"
        customer_behavior:
          search: "Traditional channels dominant, AI for comparison only"
          decision: "Human advisor trust > AI recommendation"
          channel: "Branch + video + phone (digital as supplement)"
          loyalty: "High loyalty, relationship-driven, switching cost high"
          advisor_role: "Central, enhanced by AI tools (invisible to client)"
        journey_transformation:
          detect_need: "Advisor-initiated or self-initiated (not AI-pushed)"
          search: "Advisor-guided with proprietary research"
          evaluate: "Advisor presents curated options (AI-generated but human-presented)"
          decide: "Joint advisor-client decision"
          purchase: "Advisor-facilitated"
          use: "Regular advisor check-ins (AI-supported monitoring)"
          engage: "Strong personal relationship, events, community"
        ubs_impact:
          brand_relevance: 0.90
          advisor_value: 0.85
          data_advantage: 0.75
          margin_pressure: "low"
          strategic_response: "Double down on advisor excellence, AI as invisible enabler"

    # UBS CUSTOMER SEGMENTS (cross-scenario)
    segments:
      - id: SEG-LEGACY
        name: "UBS Legacy Clients"
        size: 1500000
        behavioral_parameters:
          tau_trust: 0.85
          lambda_loss_aversion: 1.8
          beta_present_bias: 0.88
          iota_identity: 0.70
          ai_adoption_current: 0.25
          fear_of_asking: 0.30
          switching_cost_perceived: 0.75
        scenario_behavior:
          S1: "Reluctant adopters, risk of attrition to AI-native competitors"
          S2: "Gradual AI adoption, advisor relationship preserved"
          S3: "Most comfortable, deepened loyalty"

      - id: SEG-CS-MIGRATED
        name: "Ex-Credit Suisse Migrated"
        size: 1000000
        behavioral_parameters:
          tau_trust: 0.55
          lambda_loss_aversion: 2.2
          beta_present_bias: 0.82
          iota_identity: 0.40
          ai_adoption_current: 0.20
          fear_of_asking: 0.45
          switching_cost_perceived: 0.35
        scenario_behavior:
          S1: "High attrition risk - low trust + low switching cost"
          S2: "Needs trust rebuilding, AI can help or hurt"
          S3: "Best scenario for retention - trust premium helps"
        critical_insight: "Lowest trust (0.55) + lowest switching cost (0.35) = highest flight risk"

      - id: SEG-DIGITAL
        name: "Digital-Native Clients"
        size: 800000
        behavioral_parameters:
          tau_trust: 0.70
          lambda_loss_aversion: 1.6
          beta_present_bias: 0.78
          iota_identity: 0.55
          ai_adoption_current: 0.55
          fear_of_asking: 0.15
          switching_cost_perceived: 0.25
        scenario_behavior:
          S1: "Natural fit - high AI adoption, but may prefer BigTech over bank"
          S2: "Expects seamless AI integration, low tolerance for friction"
          S3: "Frustrated, may seek AI-native alternatives"
        critical_insight: "Highest AI adoption (0.55) but lowest switching cost (0.25) = retainable only through superior AI experience"

      - id: SEG-UHNW
        name: "Ultra/High Net Worth"
        size: 400000
        behavioral_parameters:
