- id: MOD-PSM-001
  name: Philoro Strategy Model
  subtitle: Antifragile Gold Business
  version: '1.0'
  created: '2026-01-27'
  last_updated: '2026-01-27'
  created_in_session: EBF-S-2026-01-27-ORG-002
  evolved_in_sessions:
  - EBF-S-2026-01-27-ORG-002

  model_type: corporate_strategy
  industry: precious_metals_retail
  company: philoro Edelmetalle

  question_type: strategy_optimization
  question_template: Wie kann [Unternehmen] Umsatz-Volatilität reduzieren bei gleichzeitiger CLV-Steigerung?
  example_questions:
  - Wie überbrückt Philoro Dürrperioden mit geringer Goldnachfrage?
  - Welche strategischen Initiativen stabilisieren den Edelmetallhandel?
  - Wie reduziert ein zyklisches Geschäft seine Volatilität?

  strategic_goal:
    primary: Umsatz-Volatilität ↓50% bei CLV ↑30% in 3 Jahren
    kpis:
    - metric: revenue_volatility
      current: 0.50
      target: 0.25
      unit: coefficient_of_variation
    - metric: recurring_revenue_share
      current: 0.05
      target: 0.25
      unit: ratio
    - metric: clv_average
      current: 850
      target: 1105
      unit: EUR
    - metric: drought_revenue_vs_plateau
      current: 0.40
      target: 0.65
      unit: ratio

  four_pillars:
  - id: RECURR
    name: Recurring Revenue
    target: +25% recurring share
    primary_10c:
    - HOW
    - WHAT
    initiatives:
    - id: INI-01
      name: Sparplan-Default
      expected_lift: +30-50% Grundumsatz
    - id: INI-05
      name: VAULT (Lager-als-Service)
      expected_lift: 5-10% Recurring
    - id: INI-07
      name: Preis-Garantie-Produkt
      expected_lift: Optionsprämien

  - id: CYCLE
    name: Counter-Cyclical Triggers
    target: Dürre-Umsatz > 60% Plateau
    primary_10c:
    - WHEN
    - WHO
    initiatives:
    - id: INI-02
      name: Lebensanlass-Marketing
      expected_lift: +15-25% in Dürre
    - id: INI-04
      name: Rückkauf-Offensive
      expected_lift: +10-15% Recycling
    - id: INI-B2B
      name: B2B-Diversifikation
      expected_lift: +20-30% stabiler Sockel

  - id: SEGMENT
    name: Portfolio Balance
    target: Kein Segment > 40%
    primary_10c:
    - WHO
    - STAGE
    segment_strategies:
    - segment: SEG-01
      name: Sicherheitsorientierte Sparer
      share: 0.40
      role: Cash Cow
      action: Stabilisieren via Sparplan
    - segment: SEG-02
      name: Vermögende Diversifizierer
      share: 0.25
      role: Star
      action: Ausbauen via VAULT SWISS/PRIVATE
    - segment: SEG-03
      name: Junge Digitalanleger
      share: 0.20
      role: Question Mark
      action: Testen via App/Gamification
    - segment: SEG-04
      name: Sammler
      share: 0.15
      role: Nische
      action: Pflegen via Exklusivität
    - segment: SEG-B1
      name: B2B Juweliere
      share_target: 0.10
      role: New Growth
      action: Goldwerk-Synergie nutzen

  - id: RELATION
    name: Lifetime Value
    target: CLV +30%
    primary_10c:
    - AWARE
    - WHAT
    initiatives:
    - id: INI-06
      name: Content & Community
      expected_lift: +20% Future Conversion
    - id: INI-REF
      name: Empfehlungsprogramm
      expected_lift: Advocacy-Rate ×2

  core_dimensions:
    primary:
    - WHAT
    - HOW
    - WHEN
    - WHO
    secondary:
    - AWARE
    - STAGE
    - READY
    extended:
    - WHERE
    - HIERARCHY

  psi_dimensions:
  - Ψ_T
  - Ψ_E
  - Ψ_K
  - Ψ_I
  - Ψ_S
  - Ψ_M
  - Ψ_F
  - Ψ_C

  utility_function:
    formula: U = α₁·U_F + α₂·U_S + α₃·U_P + α₄·U_E
    dimensions:
    - symbol: U_F
      name: financial_utility
      description: Finanzielle Sicherheit, Werterhalt
      weight_aggregate: 0.35
      weights_by_segment:
        SEG-01: 0.45
        SEG-02: 0.30
        SEG-03: 0.25
        SEG-04: 0.20
    - symbol: U_S
      name: social_utility
      description: Status, Vererbung, Familientradition
      weight_aggregate: 0.25
      weights_by_segment:
        SEG-01: 0.20
        SEG-02: 0.35
        SEG-03: 0.15
        SEG-04: 0.40
    - symbol: U_P
      name: psychological_utility
      description: Seelenfrieden, Kontrolle, Autonomie
      weight_aggregate: 0.25
      weights_by_segment:
        SEG-01: 0.25
        SEG-02: 0.20
        SEG-03: 0.30
        SEG-04: 0.25
    - symbol: U_E
      name: epistemic_utility
      description: Wissen, Marktverständnis, Expertise
      weight_aggregate: 0.15
      weights_by_segment:
        SEG-01: 0.10
        SEG-02: 0.15
        SEG-03: 0.30
        SEG-04: 0.15

  # NOTE: Diese Komplementaritäten sind domänenspezifisch (Edelmetall-Handel).
  # RECURR, CYCLE, SEGMENT, RELATION sind Business-Dimensionen, keine generischen
  # verhaltensökonomischen Konstrukte. Daher kein PAR-COMP Verweis (PAR-3: Context Indexing).
  # Quelle: EBF-S-2026-01-XX-FIN-PHI Session (Philoro)
  complementarity_matrix:
  - pair: [RECURR, RELATION]
    gamma_ij: 0.5
    mechanism: Lager-Kunden haben höheren CLV, kaufen mehr nach
    strength: STARK
    domain_specific: true
  - pair: [CYCLE, SEGMENT]
    gamma_ij: 0.4
    mechanism: Lebensanlass-Marketing wirkt unterschiedlich pro Segment
    strength: KOMPLEMENTÄR
    domain_specific: true
  - pair: [RECURR, CYCLE]
    gamma_ij: 0.3
    mechanism: Sparplan-Kunden sind auch in Dürrperioden aktiv
    strength: MODERAT
    domain_specific: true
  - pair: [SEGMENT, RELATION]
    gamma_ij: 0.3
    mechanism: Segment-spezifische CLV-Strategien
    strength: MODERAT
    domain_specific: true
  - pair: [RECURR, SEGMENT]
    gamma_ij: 0.2
    mechanism: Verschiedene Recurring-Produkte pro Segment
