      sigma_social_proof:
        value: 0.55
        range: [0.40, 0.70]
        note: Moderat - Testimonials wirken
    domain_specific:
      eta_safe_haven_bias:
        value: 0.78
        source: Baur & Lucey 2010
      tau_tangibility_premium:
        value: 0.65
        source: philoro market data
      iota_inflation_sensitivity:
        value: 0.72
        source: WGC Reports

  business_parameters:
