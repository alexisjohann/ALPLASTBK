- id: MOD-CPS-001
  name: Complex Problem Solving 10C Mapping
  version: '1.0'
  created: '2026-01-28'
  last_updated: '2026-01-28'
  created_in_session: EBF-S-2026-01-28-EDU-001
  evolved_in_sessions:
  - EBF-S-2026-01-28-EDU-001
  question_type: cognitive_process_mapping
  question_template: Wie kann [Prozess] im 10C-Framework abgebildet werden?
  example_questions:
  - Gibt es ein Modell des Complex Problem Solving?
  - Wie passt CPS in das EBF?
  - Welche 10C-Dimensionen sind für Problemlösen relevant?

  description: |
    Complex Problem Solving (CPS) ist keine separate Theorie im EBF, sondern eine
    spezifische KONFIGURATION von 6 der 10 CORE-Dimensionen. Das Modell integriert
    die CPS-Forschung (Dörner, Funke, Greiff) mit dem 10C-Framework.

  core_dimensions:
    primary:
    - AWARE
    - HOW
    - WHEN
    secondary:
    - READY
    - STAGE
    - WHAT
    extended:
    - HIERARCHY

  psi_dimensions:
  - Ψ_C (Cognitive Load)
  - Ψ_T (Temporal/Dynamik)
  - Ψ_I (Institutional/Information)

  variables:
  - symbol: A
    name: awareness_capacity
    description: Begrenzte kognitive Kapazität unter Load
    scale: '[0,1]'
    formula: A(Ψ_load) = A_max × exp(-k × Ψ_load)
    default_value: 0.85
    source: sweller1988cognitive

  - symbol: η
    name: intransparency
    description: Grad der Undurchsichtigkeit des Problemsystems
    scale: '[0,1]'
    components:
    - η_Anfang (Startzustand unklar)
    - η_Verlauf (Effekte nicht sichtbar)
    default_value: 0.55
    source: doerner1983lohhausen

  - symbol: γ_avg
    name: connectivity
    description: Durchschnittliche Vernetzung der Problemvariablen
    scale: '[-1,1]'
    default_value: 0.45
    ci_68: '[0.33, 0.57]'
    source: funke2001dynamic

  - symbol: δ
    name: feedback_delay
    description: Verzögerung zwischen Aktion und sichtbarem Effekt
    scale: '[0,∞) Schritte'
    default_value: 5
    range: '[3, 8]'
    source: microdynamValidation

  - symbol: θ
    name: action_threshold
    description: Handlungsschwelle (Satisficing)
    scale: '[0,1]'
    default_value: 0.55
    ci_68: '[0.45, 0.65]'
    source: PAP-simon1955behavioral

  - symbol: τ
    name: learning_rate
    description: Lerngeschwindigkeit pro Iteration
    scale: '[0,1]'
    default_value: 0.15
    ci_68: '[0.10, 0.20]'
    source: LLMMC_prior

  core_formula:
    name: CPS Utility Function
    latex: U_{CPS}(t) = A(\Psi_{load}) \times (1-\eta) \times [U_D + \sum \gamma_{ij} \times (\frac{dX_i}{dt} \times \frac{dX_j}{dt})]
    components:
    - A(Ψ_load): Awareness filter (cognitive capacity)
    - (1-η): Transparency factor
    - U_D: Development utility (competence motivation)
    - Σγ_ij: Connectivity term (variable interactions)
    - dX/dt: Dynamics term (system eigendynamics)

  action_condition:
    latex: WAX(U_{CPS}, \delta) \geq \theta(\Psi_{uncertainty})
    interpretation: Handlung erfolgt wenn Willingness die Schwelle übersteigt

  sensitivity_analysis:
    method: Parameter variation ±20%
    results:
    - parameter: η
      influence_pct: 42
      interpretation: Intransparenz ist Haupttreiber
    - parameter: γ_avg
      influence_pct: 28
      interpretation: Vernetzungsgrad zweitwichtigster Faktor
    - parameter: A_max
      influence_pct: 17
      interpretation: Awareness-Kapazität moderater Einfluss
    - parameter: δ
      influence_pct: 10
      interpretation: Feedback-Delay geringerer Einfluss
    - parameter: θ
      influence_pct: 3
      interpretation: Schwelle minimal relevant

  intervention_priorities:
    description: Basierend auf Sensitivitätsanalyse
    ranked:
    - rank: 1
      target: η↓
      intervention_type: Transparenz erhöhen
      examples:
      - Visualisierung (Concept Maps)
      - System Dynamics Diagramme
      - Real-time Dashboards
      effect_stars: 5
    - rank: 2
      target: γ→
      intervention_type: Vernetzung verstehen
      examples:
      - "'Was beeinflusst was?'-Training"
      - Sensitivity Analysis üben
      - Kausaldiagramme erstellen
      effect_stars: 4
    - rank: 3
      target: A↑
      intervention_type: Cognitive Load reduzieren
      examples:
      - Chunking (Teilprobleme)
      - Externe Speicher (Notizen)
      - Zeitdruck reduzieren
      effect_stars: 3
    - rank: 4
      target: δ↓
      intervention_type: Feedback beschleunigen
      examples:
      - Simulation vor Realität
      - Rapid Prototyping
      - A/B Testing
      effect_stars: 2

  theory_foundation:
    primary:
    - theory_id: MS-NE-001
      name: Dual-System (S1/S2)
      authors: Kahneman
      year: 2011
      relevance: Cognitive Load bestimmt System-Aktivierung

    secondary:
    - theory_id: external_doerner
      name: Logik des Misslingens
      authors: Dörner
      year: 1989
      relevance: 5 Qualitäten komplexer Probleme (Komplexität, Vernetztheit, Dynamik, Intransparenz, Polytelie)

    - theory_id: external_funke
      name: MicroDYN Approach
      authors: Funke, Greiff
      year: 2013
      relevance: Empirische CPS-Messung, Acquisition + Application

    - theory_id: external_sweller
      name: Cognitive Load Theory
      authors: Sweller
      year: 1988
      relevance: Arbeitsgedächtnis-Kapazität und Problemlösen

  framework_comparison:
    ebf_10c:
      focus: Utility-basiert (Warum handeln?)
      dimensions: 10 COREs
      intransparency: Explizit modelliert (η)
      strength: Erklärt Mechanismen
    pisa_2015:
      focus: Kompetenz-basiert (Was können?)
      dimensions: 12-Zellen-Matrix (4 kognitiv × 3 sozial)
      intransparency: Implizit in Aufgaben
      strength: Misst Outcomes

  data_sources:
  - source: sweller1988cognitive
    type: bib_key
    path: bibliography/appendix_AU_references.bib
  - source: PAP-simon1955behavioral
    type: bib_key
    path: bibliography/bcm_master.bib
  - source: PAP-kahneman2003maps
    type: bib_key
    path: bibliography/bcm_master.bib
  - source: Greiff et al. (2013)
    type: external_paper
    doi: 10.1037/a0030473
  - source: Funke (2017)
    type: external_paper
    url: https://pmc.ncbi.nlm.nih.gov/articles/PMC5504467/

  validation:
    status: theoretical
    confidence: 0.70
    notes: Mapping basiert auf Literatur-Integration, empirische Feldvalidierung ausstehend

  outputs:
  - output_id: OUT-CPS-001
    type: session_report
    file: outputs/sessions/EBF-S-2026-01-28-EDU-001/F1_cps_10c_mapping_v1.md

  version_history:
  - version: '1.0'
    date: '2026-01-28'
    changes: Initial CPS 10C Mapping based on Dörner/Funke/Greiff integration
    session: EBF-S-2026-01-28-EDU-001

# =============================================================================
# MODEL: Time-Intensive Goods Substitution (Platform Economics)
# =============================================================================
- id: MOD-TA-001
  name: Time-Intensive Goods Substitution Model
  version: '1.0'
  created: '2026-01-28'
  last_updated: '2026-01-28'
  created_in_session: EBF-S-2026-01-28-MKT-001
  evolved_in_sessions:
    - EBF-S-2026-01-28-MKT-001

  question_type: substitution_analysis
  question_template: "Wie substituieren Konsumenten zwischen [Produkt A] und [Produkt B] wenn Zeit der primäre Kostenfaktor ist?"
  example_questions:
    - "Wie substituieren User zwischen Facebook und Instagram?"
    - "Wie substituieren User zwischen TikTok und YouTube?"
    - "Wie substituieren Konsumenten zwischen Netflix und linearem TV?"

  core_dimensions:
    primary:
      - WHEN
      - WHAT
    secondary:
      - WHO
      - WHERE
    extended:
      - AWARE

  psi_dimensions:
    - Ψ_T  # Zeit als primärer Constraint
    - Ψ_M  # Technologie/Plattform
    - Ψ_S  # Soziale Nutzung
    - Ψ_C  # Kognitive Belastung

  variables:
    - symbol: s_T
      name: time_share
      description: "Anteil der Zeitkosten am Gesamtpreis: s_T = (W·t_i) / π_i"
      scale: '[0,1]'
      source_psi: Ψ_T
      weight: 0.30
      group: core_beckerian

    - symbol: D_ij
      name: diversion_ratio
      description: "Substitutionsrate: D_ij = (∂q_j/∂p_i) / (-∂q_i/∂p_i)"
      scale: '[0,1]'
      source_psi: Ψ_T
      weight: 0.25
      group: core_beckerian

    - symbol: W
      name: shadow_wage
      description: "Schattenpreis der Zeit (Opportunitätskosten)"
      scale: '[0,∞)'
      source_psi: Ψ_E
      weight: 0.15
      group: core_beckerian

    - symbol: ε_ad
      name: ad_elasticity
      description: "Preiselastizität bezüglich Ad Load"
      scale: '[-∞,0]'
      source_psi: Ψ_M
      weight: 0.10
      group: platform_specific
      typical_value: "niedrig (≈ -0.1 bis -0.3)"

    - symbol: t_i
      name: time_per_use
      description: "Zeitaufwand pro Nutzungseinheit"
      scale: '[0,∞)'
      source_psi: Ψ_T
      weight: 0.10
      group: platform_specific

    - symbol: π_i
      name: full_price
      description: "Voller Preis = p_monetary + W·t_i"
      scale: '[0,∞)'
      source_psi: Ψ_E
      weight: 0.10
      group: core_beckerian

  functional_form:
    type: beckerian_diversion
    formula: "D_ij ∝ f(|s_T^i - s_T^j|) mit ∂D_ij/∂|Δs_T| > 0"
    interpretation: "Produkte mit ähnlichen Zeit-Anteilen haben höhere Diversion Ratios"
    key_prediction: "Bei p_monetary ≈ 0 (kostenlose Plattformen): s_T → 1, Substitution basiert primär auf Zeit"

  theory_basis:
    primary:
      - theory_id: MS-TA-001
        name: "Time Allocation Theory"
        authors: "Becker"
        year: 1965
        relevance: "Foundational model - Zeit als knappe Ressource mit Opportunitätskosten"

      - theory_id: MS-TA-002
        name: "Time-Intensive Goods & Market Competition"
        authors: "Goodman et al."
        year: 2026
        relevance: "Extension to digital platforms - Field experiment validation"

    secondary:
      - theory_id: MS-TA-003
        name: "Attention Economy"
        authors: "Simon"
        year: 1971
        relevance: "Information abundance creates attention scarcity"

  data_sources:
    - source: "PAP-goodman2026timeintensive"
      type: bib_key
      path: bibliography/bcm_master.bib
      finding: "Low ad elasticity, time shares predict diversion"

    - source: "PAP-becker1965theory"
      type: bib_key
      path: bibliography/bcm_master.bib
      finding: "Household production function, shadow price of time"

  application_domains:
    - domain: DIGITAL
      description: "Social Media Platforms"
      examples: ["Facebook", "Instagram", "TikTok", "YouTube"]
      
    - domain: ANTITRUST
      description: "Merger/De-merger Analysis"
      examples: ["FTC Meta case", "Platform market definition"]
      
    - domain: ATTENTION
      description: "Attention Markets"
      examples: ["Streaming services", "News platforms", "Gaming"]

  policy_implications:
    - implication: "FTC De-Merger"
      description: "Hohe Diversion Ratios zwischen Facebook/Instagram → De-merger könnte Wettbewerb erhöhen"
      
    - implication: "Market Definition"
      description: "Traditionelle SSNIP-Tests (5% Preiserhöhung) versagen bei p≈0; Zeit-basierte Tests nötig"
      
    - implication: "Ad Load Pricing"
