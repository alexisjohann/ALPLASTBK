        scores:
          rho: 0.85
          V_min: 0.70
          O: 0.80
          r: 0.60
          L: 0.80
          NR_total: 0.77
        scenario_value: {S1: 0.85, S2: 0.80, S3: 0.70}
        investment: "high"
        timeline: "Q3 2026 - Q2 2027"
        theory_support: "MS-CJ-002: Segment-specific journey satisfaction effects"
        must_win: true

      - id: NR5
        name: "AI Ethics & Governance Framework"
        description: "Proactive AI governance for marketing, ahead of FINMA requirements"
        scores:
          rho: 0.90
          V_min: 0.65
          O: 0.70
          r: 0.95
          L: 0.60
          NR_total: 0.74
        scenario_value: {S1: 0.75, S2: 0.70, S3: 0.90}
        investment: "low"
        timeline: "Q2 2026"
        theory_support: "MS-TP-003: Countervailing powers - proactive governance builds trust"

      - id: NR6
        name: "SEG-CS-MIGRATED Trust Rebuilding with AI"
        description: "Targeted AI-powered trust rebuilding for ex-CS clients (highest flight risk)"
        scores:
          rho: 0.75
          V_min: 0.70
          O: 0.60
          r: 0.70
          L: 0.75
          NR_total: 0.70
        scenario_value: {S1: 0.70, S2: 0.80, S3: 0.75}
        investment: "medium"
        timeline: "Q2-Q3 2026"
        theory_support: "MS-IB-001: Identity rebuilding after forced migration"
        urgency: "CRITICAL - tau=0.55 is dangerously low, switching_cost=0.35"

    scenario_specific_moves:
      S1_bigtech:
        - "Build API-first marketing infrastructure"
        - "Negotiate AI platform partnerships (OpenAI, Google, Apple)"
        - "Develop AI-native content strategy"
        - "Invest heavily in data differentiation"
      S2_hybrid:
