- id: MOD-ESL
  name: Empirical Stability of Language Framework
  version: '1.0'
  created: '2026-01-26'
  last_updated: '2026-01-26'
  created_in_session: EBF-S-2026-01-26-OTH-001
  evolved_in_sessions:
  - EBF-S-2026-01-26-OTH-001
  model_type: meta_axiom
  level: 3
  question_type: assertion_validation
  question_template: Ist Aussage [c] epistemisch gerechtfertigt?
  example_questions:
  - Ist die assertive Stärke durch Evidenz gedeckt?
  - Welche Konfidenz ist für diese Aussage angemessen?
  - Wie kann Overconfidence in AI-Outputs reduziert werden?
  core_principle:
    name: ESL Inequality
    formula: K(c) ≤ M(c)
    interpretation: Assertive Stärke darf Evidenz-Stärke nicht überschreiten
    variables:
      K: Assertive strength (kommunizierte Konfidenz)
      M: Evidence strength (gerechtfertigte Konfidenz)
  axioms:
  - id: ESL-1
    name: Proportionalität
    formula: '∀c: K(c) ≤ M(c)'
    description: Assertive Stärke darf Evidenz-Stärke nicht überschreiten
  - id: ESL-2
    name: Evaluierbarkeit
    formula: c zulässig ⟺ M(c) evaluierbar
    description: Nur Aussagen mit berechenbarer Evidenz-Stärke
  - id: ESL-3
    name: Modellpflicht
    formula: c ∈ Behavioral → ∃Model(c)
    description: Verhaltensaussagen erfordern explizites Modell
  - id: ESL-4
    name: Externe Inferenz
    formula: M(c) ⊥ LLM_confidence
    description: Evidenz-Stärke unabhängig von LLM-Konfidenz
  - id: ESL-5
    name: Trennung
    formula: K(c) ⊥ M(c) berechenbar
    description: Assertive und Evidenz-Stärke getrennt berechenbar
  k_extraction:
    methods:
    - name: Lexikalische Marker
      description: Hedging-Wörter zu K-Werten mappen
      examples:
        high_k:
        - definitiv
        - mit Sicherheit
        - zweifellos
        medium_k:
        - wahrscheinlich
        - vermutlich
        low_k:
        - möglicherweise
        - eventuell
    - name: Explizite Wahrscheinlichkeit
      description: Prozentangaben extrahieren
      regex: r"(\d+(?:\.\d+)?)\s*%"
    - name: Speech Act Classification
      description: Sprechakt-Typ bestimmen
      types:
      - assertiv
      - spekulativ
      - hedged
  m_computation:
    evidence_taxonomy:
    - source: RCT/Meta-Analyse
      base_m: 0.9
      modifiers:
      - Replikation
      - Sample Size
    - source: Peer-reviewed Paper
      base_m: 0.75
      modifiers:
      - Journal Impact
      - Citations
    - source: Preprint
      base_m: 0.55
      modifiers:
      - Author Credibility
    - source: Datenbank/Statistik
      base_m: 0.85
      modifiers:
      - Aktualität
      - Quelle
    - source: Expert Opinion
      base_m: 0.5
      modifiers:
      - Konsens-Level
    - source: Reasoning-Chain
      base_m: 0.45
      modifiers:
      - Chain Length
      - Premise Quality
    - source: LLMMC Prior
      base_m: 0.4
      modifiers:
      - Domain Fit
    - source: Keine Quelle
      base_m: 0.2
      modifiers: []
    bayesian_update:
      formula: M(c) = P(c|E) = P(E|c) · P(c) / P(E)
      description: Posterior aus Evidenz berechnen
  calibration_metrics:
  - name: ECE
    full_name: Expected Calibration Error
    formula: Σ_b (n_b/N) × |accuracy_b - confidence_b|
  - name: OCR
    full_name: Overconfidence Rate
    formula: P(K > M | K > 0.5)
  - name: OCS
    full_name: Overconfidence Severity
    formula: E[K - M | K > M]
  - name: ESL_Score
    full_name: Aggregated ESL Quality Score
    formula: 1 - (0.4·OCR + 0.4·OCS + 0.2·ECE)
  theory_basis:
    primary:
    - theory_id: Bayesian Epistemology
      authors: Jeffrey, Joyce
      relevance: K ≈ kommunizierter Credence, M ≈ gerechtfertigter Credence
    - theory_id: Speech Act Theory
      authors: Austin, Searle
      year: 1962, 1969
      relevance: Felicity Conditions für Assertion
    secondary:
    - theory_id: MS-IB-005
      name: Overconfidence
      relevance: Systematische Überschätzung eigener Genauigkeit
    - theory_id: MS-IF-006
      name: Rational Inattention
      authors: Sims
      relevance: Begrenzte kognitive Ressourcen für Kalibrierung
  ebf_integration:
    level: 3
    level_name: META-AXIOM
    position: Über 10C-Framework, unter Domain Applications
    comparable_to:
    - EXC (Exclusion Principle)
    - EIP (Evidence Integration Pipeline)
    applies_to: Alle EBF-Outputs
  validation:
    status: initial
    applied_cases: 1
    last_application: '2026-01-26'
    monte_carlo:
      draws: 10000
      ocr_reduction: 42% → 3%
      ocs_reduction: 0.28 → 0.04
      ece_reduction: 0.15 → 0.06
    notes: Erstellt in STANDARD-Analyse für Beatrix ESL Framework
  example_results:
    case: Beatrix ESL Analysis
    results:
      pre_esl_overconfidence: 42%
