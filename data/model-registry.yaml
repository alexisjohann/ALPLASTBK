    - symbol: "ΔU_S"
      name: "social_utility_change"
      description: "Veränderung der sozialen Utility (Kohäsion)"
      scale: '[-1,1]'
      source_psi: Ψ_S
      weight: 0.15
      group: utility_actual

    - symbol: "ΔU_D"
      name: "developmental_utility_change"
      description: "Veränderung der Entwicklungs-Utility (Innovation)"
      scale: '[-1,1]'
