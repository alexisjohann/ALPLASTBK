- id: MOD-EXE-MW-001
  name: "Marc Walder Executive Decision Prediction Model"
  version: '0.1'
  created: '2026-02-13'
  last_updated: '2026-02-13'
  created_in_session: EBF-S-2026-02-13-ORG-001
  evolved_in_sessions:
    - EBF-S-2026-02-13-ORG-001
  customer: RMS
  customer_ref: EBF-CUS-RINGIER
  stakeholder_model: STK-WALDER-M
  question_type: executive_decision_prediction
  question_template: "Wird Marc Walder [Vorschlag X] genehmigen?"
  example_questions:
    - "Wird Walder einen OpenAI Content-Deal genehmigen?"
    - "Wie muss das Bündel-Abo geframed werden für Walder-Approval?"
    - "Wird Walder einer Fusion mit TX Group zustimmen?"
    - "Welches Timing maximiert die Genehmigungswahrscheinlichkeit?"

  core_dimensions:
    primary:
      - WHAT    # Utility dimensions (NAR, STA, FIN, LEG, CON)
      - AWARE   # Attention filter, blind spots, information diet
    secondary:
      - WHEN    # Timing sensitivity (SPEAK season, budget cycle)
      - HOW     # Complementarities between utility dimensions
      - WHO     # Decision authority, influence paths
    extended:
      - READY   # Capability × Willingness
      - STAGE   # Change journey (Stage 5: Committed to AI)
      - HIERARCHY  # L0 decision-maker, influence channels

  psi_dimensions:
    - Ψ_I: "Ringier AG corporate governance, Board approval requirements"
    - Ψ_S: "CEO peer group (Döpfner, Supino, Wanner), digitalswitzerland network"
    - Ψ_K: "Swiss media culture, transformation narrative, tech company identity"
    - Ψ_C: "Deal-maker mindset, tennis-competition framing, tempo > perfection"
    - Ψ_E: "10% equity stake, CHF 118.8M EBITDA (2024), 82% digital share"
    - Ψ_T: "SPEAK season (Q4-Q1) vs. budget (Q3) vs. summer (Q2)"
    - Ψ_M: "Palantir AIP, internal AI tools, Blick/Beobachter/Handelszeitung platforms"
    - Ψ_F: "Zurich HQ, international conferences (Davos, DLD, SXSW)"

  variables:
    - symbol: nar
      name: narrative_score
      description: "Headline-Tauglichkeit und Bühnen-Wirkung des Vorschlags"
      scale: '[0,1]'
      weight: 2.50
      group: decision_input

    - symbol: sta
      name: status_impact
      description: "Statusgewinn durch Peer-Anerkennung und Netzwerkzugang"
      scale: '[0,1]'
      weight: 1.80
      group: decision_input

    - symbol: fin
      name: financial_impact
      description: "EBITDA-Impact (normalisiert, mit Hard-Constraint bei < threshold)"
      scale: '[-1,1]'
      weight: 1.50
      group: decision_input

    - symbol: leg
      name: legacy_contribution
      description: "Beitrag zur historischen Bedeutung der Transformation"
      scale: '[-1,1]'
      weight: 1.20
      group: decision_input

    - symbol: con
      name: control_preservation
      description: "Grad der Kontrolle über Entscheidung und Narrativ"
      scale: '[0,1]'
      weight: 0.80
      group: decision_input

    - symbol: comp
      name: competitive_pressure
      description: "FOMO-Faktor — tun Wettbewerber das bereits?"
      scale: '[0,1]'
      weight: 1.90
      group: decision_input

    - symbol: time
      name: timing_factor
      description: "Saisonaler Faktor (SPEAK season, Budget, Summer)"
      scale: '[0,1]'
      weight: 0.60
      group: decision_input

  functional_form:
    type: "Constrained Logistic Regression"
    formula: |
      IF fin(x) < θ_EBITDA:
        P(approve) = 0
      ELSE:
        z = -1.20 + 2.50·nar + 1.80·sta + 1.50·fin + 1.20·leg + 0.80·con + 1.90·comp + 0.60·time
        P(approve) = 1/(1+exp(-z))
    constraints:
      - "fin < -0.3 → hard reject (EBITDA threat too large)"
      - "leg < -0.5 AND con < 0.2 → qualitative veto (legacy + control threat)"

  parameters:
    - ref: PAR-EXE-001  # α_NAR = 0.30
    - ref: PAR-EXE-002  # α_STA = 0.25
    - ref: PAR-EXE-003  # α_FIN = 0.20
    - ref: PAR-EXE-004  # α_LEG = 0.15
    - ref: PAR-EXE-005  # α_CON = 0.10
    - ref: PAR-EXE-006  # λ_MW = 3.50
    - ref: PAR-EXE-007  # λ_own = 1.45
    - ref: PAR-EXE-008  # γ_NAR_FIN = 0.45
    - ref: PAR-EXE-009  # γ_NAR_STA = 0.60
    - ref: PAR-EXE-010  # γ_FIN_CON = -0.20

  calibration:
    status: "prior"
    historical_observations: 4
    correct_predictions: 4
    accuracy: 1.00
    known_limitations:
      - "All 4 observations are approvals — need rejection data"
      - "No interaction terms yet (v0.2)"
      - "No mood/event-conditional adjustments (v0.3)"
    next_calibration: "After 5+ new observations including rejections"
    file: "data/stakeholder-models/individual/STK-WALDER-M.yaml"

  version_history:
