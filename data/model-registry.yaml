- id: MOD-KAUF-DIAG-001
  name: Kaufland Kontextualisierte Eignungsdiagnostik (KKE)
  version: '1.0'
  created: '2026-02-26'
  last_updated: '2026-02-26'
  created_in_session: EBF-S-2026-02-26-ORG-KAUF
  question_type: diagnostic_assessment
  question_template: "Wie kann [Organisation] Eignungsdiagnostik kontextualisieren, um Person-Job Fit um [X]% zu steigern?"
  example_questions:
    - "Wie beurteilt man Fuehrungskraefte fair ueber verschiedene Filialkontexte?"
    - "Welche Diagnostik-Batterie hat die hoechste inkrementelle Validitaet fuer Kaufland-Rollen?"
    - "Wie nutzt man FK-Wechsel als natuerliches Experiment fuer Diagnostik-Kalibrierung?"
  customer_ref: CUS-KAUF
  core_dimensions:
    primary: [WHO, WHAT, WHEN, AWARE, READY]
    secondary: [HOW, STAGE, WHERE]
  domain: personnel_diagnostics
  scope:
    employees: 170000
    stores: 780
    countries: 8
    roles: 22
    skills: 120
    diagnostic_methods: 7
  theory_basis:
    - MS-IF-013  # Bidirectional Interview Signaling (Ash et al. 2025)
    - MS-IB-001  # Identity Economics (Akerlof/Kranton 2000)
    - MS-SF-004  # SLTE (Skill Learning Time Estimator)
    - MS-IF-002  # Signaling (Spence 1973)
  architecture:
    type: 5-layer-diagnostic-pipeline
    layers:
      - "L1: ANFORDERUNG — KSAO(Psi) kontextualisierte Profile"
      - "L2: DIAGNOSTIK — 7 Verfahren mit Validitaetskoeffizienten"
      - "L3: MATCHING — F(p,j,Psi) mit ID-Fit (w_id=0.15)"
      - "L4: PRAEDIKTION — Kontextbereinigte Leistungsvorhersage"
      - "L5: FEEDBACK — Bidirektionales Signaling + Kalibrierung"
    core_formula: "KSAO_target = KSAO_standard × prod_i M(Delta_Psi_i)"
  interventions: 4
  parameters_total: 38
  validation:
    status: theoretical_with_literature_basis
    empirical_tests: []
    calibration_data: "Pilot: 3-5 Filialen, 6 Monate, N=80 Kandidat:innen + N=200 Bestand"
  cross_references:
    models:
      - "MOD-ORG-SBO-001 — SBO (Skill-Taxonomie, Dreyfus, SLTE)"
      - "MOD-013 — KIBSM (Gesamtstrategie, Psi-Dimensionen)"
    files:
      - "data/customers/kaufland/kaufland_eignungsdiagnostik_modell.yaml"
      - "data/sbo/skill-taxonomy-kaufland.yaml"
      - "data/sbo/job-profiles-kaufland.yaml"
      - "data/skill-levels/kaufland-role-profiles.yaml"
    appendices:
      - "BBB (CORE-WHERE) — Parameter values"
      - "AU (CORE-AWARE) — Bidirectional Signaling"
  version_history:
    - version: '1.0'
      date: '2026-02-26'
      changes: "Initial KKE with 5-layer pipeline, 7 diagnostic methods, KSAO(Psi), MS-IF-013 integration"
      session: EBF-S-2026-02-26-ORG-KAUF
