    - metric: recurring_revenue_share
      current: 0.05
      target: 0.25
      unit: ratio
    - metric: clv_average
      current: 850
      target: 1105
      unit: EUR
    - metric: drought_revenue_vs_plateau
      current: 0.40
      target: 0.65
