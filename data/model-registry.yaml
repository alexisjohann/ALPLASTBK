# =============================================================================
# MOD-SF-001: Skill Learning Time Estimator (SLTE)
# =============================================================================

- id: MOD-SF-001
  name: "Skill Learning Time Estimator (SLTE)"
  version: '1.0'
  date_created: '2026-02-16'
  domain: [labor_economics, skill_formation, human_capital, reskilling]

  description: >
    PCT-based model estimating the time required to learn a specific skill
    to a given Dreyfus expertise level, modulated by personality traits,
    context factors, prior skill complementarities, and identity fit.
    Integrates Heckman Skill Formation, Ericsson Deliberate Practice,
    Autor Task Taxonomy, and Delfino Identity Economics.

  question_type: "skill_learning_time_estimation"

  10C_spec:
    PRIMARY:
      WHAT: "Learning time T as outcome variable; skill complexity by task type"
      WHERE: "15 personality β-coefficients from meta-analyses (Tier 1)"
    SECONDARY:
      WHO: "Individual learner with 15 personality facet profile"
      AWARE: "Deliberate practice requires conscious awareness of weaknesses (Ericsson 1993)"
      READY: "Identity fit determines willingness to invest learning effort"
      WHEN: "Non-linear Dreyfus levels; sensitive periods; context modulation via Ψ"
    TERTIARY:
      HOW: "Multiplicative interaction between L(p), C(Ψ), DC, ID (EXC-5: V1, S1)"
      STAGE: "Dreyfus 5-level progression: Novice → Advanced Beginner → Competent → Proficient → Expert"

  variables:
    dependent:
      - symbol: "T"
        name: "Learning Time"
        unit: "hours"
        description: "Total time to reach target Dreyfus level for given skill"

    independent:
      - symbol: "T_base(s, ℓ)"
        name: "Base Learning Time"
        description: "Baseline hours for skill s to Dreyfus level ℓ, assuming average learner, standard context"
        scaling: "T(ℓ) = T_0 × k^(ℓ-1), k ≈ 3 (PAR-SF-021)"

      - symbol: "L(p)"
        name: "Learning Ability"
        description: "Personality-based learning speed modifier"
        formula: "L(p) = exp(Σᵢ βᵢ × facetᵢ)"
        parameters: "PAR-SF-006 to PAR-SF-020 (15 facets)"
        range: "[0.5, 2.5] approximately"

      - symbol: "C(Ψ)"
        name: "Context Multiplier"
        description: "Context-based learning speed modifier"
        formula: "C(Ψ) = M(Ψ_I) × M(Ψ_S) × M(Ψ_C)"
        parameters: "PAR-SF-023, PAR-SF-024, PAR-SF-025"
        range: "[0.12, 2.73] theoretically"

      - symbol: "DC(K_prior)"
        name: "Dynamic Complementarity"
        description: "Prior related skills accelerate learning"
        formula: "Per MS-SF-003: P(a) · Q(a+j) · f₁,₂(a+j)"
        range: "[0.5, 2.0] — 0.5 for unrelated, 2.0 for highly complementary"

      - symbol: "ID(s,p)"
        name: "Identity Fit"
        description: "Identity alignment between learner and skill"
        parameters: "PAR-SF-022"
        range: "[0.3, 1.2]"

  functional_form:
    equation: "T(s, p, Ψ) = T_base(s, ℓ) / [L(p) × C(Ψ) × DC(K_prior) × ID(s,p)]"
    type: "multiplicative_inverse"
    exc5_justification:
      V1: "L=0 implies infinite learning time (impossible without any learning ability)"
      S1: "All modifiers are bounded scaling factors in [0.3, 3.0]"
    interpretation: >
      Higher L, C, DC, ID → lower T (faster learning).
      All factors are multiplicative because each can independently
      make learning impossible (V1) and all operate as bounded scalars (S1).

  theory_basis:
    - theory_id: "MS-SF-001"
      role: "Skill production function K(a+1) = f(K(a), I(a))"
    - theory_id: "MS-SF-002"
      role: "Ordinal skill measurement; levels EMERGE, not accumulate"
    - theory_id: "MS-SF-003"
      role: "Dynamic complementarity; prior skills accelerate"
    - theory_id: "MS-SF-004"
      role: "Core SLTE theory defining T(s,p,Ψ) equation"
    - theory_id: "MS-IB-001"
      role: "Identity economics; identity fit modulates learning effort"
    - theory_id: "MS-VE-001"
      role: "Character traits (θ) as deeper drivers of personality facets"

  worked_examples:
    - case_id: "CAS-944"
      title: "Anna lernt Python (BWL → IT Reskilling)"
      summary: "BWL-Absolventin mit hoher Openness + Conscientiousness, Dreyfus Level 3"

    - case_id: "CAS-945"
      title: "Thomas lernt Projektmanagement (Techniker → PM Upskilling)"
      summary: "Techniker mit hohem DC (verwandte Skills) und Identity-Fit"

  validation:
    status: "theoretical"
    empirical_tests: []
    calibration_data: "Requires project data for empirical calibration"
    sensitivity: >
      Strongest drivers: L(p) via Openness (β=+0.25) and Self-Discipline (β=+0.20);
      C(Ψ) via institutional learning structure (M_Ψ_I);
      ID(s,p) for reskilling scenarios.

  cross_references:
    appendices:
      - "BBB (CORE-WHERE) — Parameter values for β-coefficients"
    papers:
      - "PAP-barrick1991big — Big Five × performance meta-analysis"
      - "PAP-poropat2009meta — Big Five × academic meta-analysis"
      - "PAP-ericsson1993role — Deliberate practice and expertise"
    models:
      - "MOD-PSF-001 — Papal Selection Framework (structural similarity in multiplicative form)"

  version_history:
    - version: '1.0'
      date: '2026-02-16'
      changes: "Initial SLTE model with 5 components, 20 parameters, 2 worked examples"
      session: EBF-S-2026-02-16-LABOR-001

