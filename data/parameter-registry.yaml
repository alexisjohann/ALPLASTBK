- id: PAR-BX-001
  symbol: beta_Fit
  name: Brand Extension Fit Effect
  description: Standardized effect of perceived fit (similarity) between parent brand and extension
    on extension evaluation. Strongest predictor in meta-analysis.
  values:
    literature:
