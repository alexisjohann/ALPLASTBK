- id: PAR-BEH-012
  symbol: α_FS
  name: Disadvantageous Inequity Aversion
  description: Disutility from being behind others (earning less than peers)
  paper_notation:
    original_symbol: α
    source_paper: PAP-fehr1999theory
    context: Fehr-Schmidt (1999) Inequity Aversion Model
    translation_note: EBF uses α_FS (FS=Fehr-Schmidt) to distinguish from other α-family parameters
  formal_definition:
    equation: U_i(x) = x_i - α_FS × max{x_j - x_i, 0} - β_FS × max{x_i - x_j, 0}
    where:
      x_i: Own payoff
      x_j: Other's payoff
      α_FS: Disadvantageous inequity aversion, α_FS ≥ 0
      β_FS: Advantageous inequity aversion, 0 ≤ β_FS < 1
    interpretation: α_FS measures how much the agent dislikes earning LESS than others
    source_equation: Equation (1) in Fehr & Schmidt (1999)
    unit: dimensionless weight
  values:
    literature:
      mean: 0.85
      ci_95:
      - 0.5
      - 4.0
      source: PAP-fehr1999theory
      note: Fehr & Schmidt (1999) - heterogeneous distribution
    distribution:
      selfish:
        share: 0.3
        alpha_FS: 0.0
      moderate:
        share: 0.3
        alpha_FS: 0.5
      fair:
        share: 0.3
        alpha_FS: 1.0
      strong:
        share: 0.1
        alpha_FS: 4.0
    domain_specific:
      ultimatum_game:
        mean: 1.0
        ci_68:
        - 0.5
        - 2.0
      workplace:
        mean: 0.8
        ci_68:
        - 0.4
        - 1.2
      public_goods:
        mean: 0.7
        ci_68:
        - 0.3
        - 1.1
  constraints:
  - α_FS ≥ β_FS (being behind hurts more than being ahead)
  - α_FS ≥ 0
  applicable_domains:
  - SOCIAL
  - ORG
  - FIN
  - PUBLIC_GOODS
  last_updated: '2026-02-05'
  theory_support: MS-SP-001
  literature_sources:
  - key: PAP-fehr1999theory
    finding: 'α_FS ≈ 0.85 mean, heterogeneous: 30% selfish, 70% inequity averse'
  - key: PAP-bolton2000erc
    finding: Similar predictions with relative payoff model
  parameter_tier: 1
- id: PAR-BEH-013
  symbol: β_FS
  name: Advantageous Inequity Aversion
  description: Disutility from being ahead of others (earning more than peers)
  paper_notation:
    original_symbol: β
    source_paper: PAP-fehr1999theory
    context: Fehr-Schmidt (1999) Inequity Aversion Model
    translation_note: EBF uses β_FS (FS=Fehr-Schmidt) to distinguish from β (present bias, PAR-BEH-003)
  formal_definition:
    equation: U_i(x) = x_i - α_FS × max{x_j - x_i, 0} - β_FS × max{x_i - x_j, 0}
    where:
      x_i: Payoff to individual i
      x_j: Payoff to other individual j
      α_FS: Disadvantageous inequity aversion (envy, being behind)
      β_FS: Advantageous inequity aversion (guilt, being ahead)
    interpretation: β_FS measures disutility from guilt when earning more than peers; always weaker than α_FS (envy)
    source_equation: Equation (4) in Fehr & Schmidt (1999)
    unit: dimensionless, bounded [0,1)
  values:
    literature:
      mean: 0.315
      ci_95:
      - 0.0
      - 0.6
      source: PAP-fehr1999theory
      note: Fehr & Schmidt (1999) - always less than α_FS
    distribution:
      selfish:
        share: 0.3
        beta_FS: 0.0
      moderate:
        share: 0.3
        beta_FS: 0.25
      fair:
        share: 0.3
        beta_FS: 0.5
      strong:
        share: 0.1
        beta_FS: 0.6
    domain_specific:
      dictator_game:
        mean: 0.4
        ci_68:
        - 0.2
        - 0.6
      workplace:
        mean: 0.25
        ci_68:
        - 0.1
        - 0.4
      public_goods:
        mean: 0.3
        ci_68:
        - 0.15
        - 0.45
  constraints:
  - 0 ≤ β_FS < 1
  - β_FS ≤ α_FS (advantageous inequity aversion weaker than disadvantageous)
  applicable_domains:
  - SOCIAL
  - ORG
  - FIN
  - PUBLIC_GOODS
  last_updated: '2026-02-05'
  theory_support: MS-SP-001
  literature_sources:
  - key: PAP-fehr1999theory
    finding: β_FS ≈ 0.315 mean, constraint 0 ≤ β_FS < 1
  - key: PAP-charness2002understanding
    finding: Confirms β_FS < α_FS in distribution games
  parameter_tier: 1
- id: PAR-BEH-014
  symbol: μ
  name: Image Concern
  description: Strength of social or self-image motivation in moral decisions
  formal_definition:
    equation: U_S(h; g, w) = (gw - c)h + μ × φ(F)
    where:
      U_S: Sender's utility from helping decision
      g: Generosity type of Sender, g ∈ [0, ḡ]
      w: Need level of Receiver, w ∈ [0, w̄]
      c: Cost of helping
      h: Help provided, h ∈ {0, 1}
      μ: Weight on image payoff, μ ≥ 0
      φ: Image payoff function from outcome F ∈ {Accept, Reject, No-interaction, Offer}
    interpretation: μ captures how much the Sender cares about appearing generous (social image) or feeling generous (self-image)
    source_equation: Equation (2) in Bénabou, Jaroszewicz & Loewenstein (2022); see also Bénabou & Tirole (2006)
    unit: dimensionless weight, μ ≥ 0
  values:
    literature:
      mean: 0.4
      ci_95:
      - 0.2
      - 0.6
