# =============================================================================
# ADVICE AND INFORMATION PARAMETERS
# =============================================================================

advice_parameters:

  # ---------------------------------------------------------------------------
  # Belief Update Rate (α_update)
  # ---------------------------------------------------------------------------
  - id: PAR-ADV-001
    symbol: α_update
    name: "Belief Update Rate"
    description: "Rate at which individuals update beliefs about advice quality based on observed performance"

    values:
      literature:
        mean: 0.50
        ci_95: [0.40, 0.60]
        source: "PAP-bregolin2026advice"
        note: "50% of participants are non-updaters"

      by_type:
        updaters: {value: 1.0, share: 0.50}
        non_updaters: {value: 0.0, share: 0.50}
        note: "Bimodal distribution - either fully Bayesian or no updating"

    applicable_domains: ["INFO", "ADVICE", "FINANCE", "HEALTH"]
    last_updated: "2026-01-31"

    literature_sources:
      - key: "PAP-bregolin2026advice"
        finding: "~50% do not update beliefs about advice quality"
      - key: "PAP-grether1980bayes"
        finding: "Systematic deviations from Bayesian updating"

  # ---------------------------------------------------------------------------
  # Hot-Hand Sensitivity (γ_hothand)
  # ---------------------------------------------------------------------------
  - id: PAR-ADV-002
    symbol: γ_hothand
    name: "Hot-Hand Sensitivity"
    description: "Sensitivity of advice demand to recent performance streaks (hot-hand fallacy strength)"

    values:
      literature:
        positive: true
        source: "PAP-bregolin2026advice"
        note: "Significant positive effect of recent correct predictions on demand"

      behavioral_bias:
        direction: "positive"
        effect: "Streaks increase demand even when uninformative"
        note: "Consistent with Gilovich et al. (1985) hot-hand findings"

    applicable_domains: ["INFO", "ADVICE", "FINANCE", "SPORTS"]
    last_updated: "2026-01-31"

    literature_sources:
      - key: "PAP-bregolin2026advice"
        finding: "Hot-hand fallacy in advice purchasing"
      - key: "gilovich1985hot"
        finding: "Hot hand in basketball - misperception of random sequences"
      - key: "rabin2002inference"
        finding: "Law of small numbers - overinference from short samples"

  # ---------------------------------------------------------------------------
  # Advice Demand Independence (δ_alignment)
  # ---------------------------------------------------------------------------
  - id: PAR-ADV-003
    symbol: δ_alignment
    name: "Prior-Advice Alignment Effect"
    description: "Effect of advice alignment with prior beliefs on demand (0 = no effect, predicted by rational models)"

    values:
      literature:
        mean: 0.0
        ci_95: [-0.10, 0.10]
        source: "PAP-bregolin2026advice"
        note: "No significant difference between confirmatory and contrarian advice demand"

      theoretical_prediction:
        rational_model: "positive (prefer confirmatory)"
        actual: "null (no preference)"
        note: "Challenges standard models of information acquisition"

    applicable_domains: ["INFO", "ADVICE", "DECISION"]
    last_updated: "2026-01-31"

    literature_sources:
      - key: "PAP-bregolin2026advice"
        finding: "Demand does NOT depend on confirmatory vs contrarian"

# =============================================================================
# LABOR MARKET PARAMETERS
# =============================================================================

labor_market_parameters:

  # ---------------------------------------------------------------------------
  # Inverse Labor Demand Elasticity (φ)
  # ---------------------------------------------------------------------------
  - id: PAR-LM-001
    symbol: φ
    name: "Inverse Labor Demand Elasticity"
    description: "Inverse Elastizität der Arbeitsnachfrage - misst wie stark Löhne auf Arbeitsangebotsschocks reagieren"

    values:
      literature:
        mean: -1.95
        ci_95: [-2.5, -1.4]
        source: "PAP-dustmann2025immigration"
        note: "Dustmann et al. (2025) - Germany estimates"

      cross_country:
        germany: {mean: -1.95, ci_68: [-2.3, -1.6]}
        us: {mean: -1.8, ci_68: [-2.2, -1.4]}
        note: "Similar magnitudes across countries"

    applicable_domains: ["LABOR", "MIGRATION", "MACRO"]
    last_updated: "2026-01-31"

    literature_sources:
      - key: "PAP-dustmann2025immigration"
        finding: "φ = -1.95 (inverse labor demand elasticity)"
      - key: "PAP-dustmann2017labor"
        finding: "Consistent with QJE 2017 estimates"

  # ---------------------------------------------------------------------------
  # Place-Based Labor Supply Elasticity (η̄_P)
  # ---------------------------------------------------------------------------
  - id: PAR-LM-002
    symbol: η̄_P
    name: "Place-Based Labor Supply Elasticity"
    description: "Elastizität des Arbeitsangebots auf regionaler Ebene - wie stark reagieren Arbeitnehmer auf lokale Lohnänderungen durch Umzug"

    values:
      literature:
        mean: 4.64
        ci_95: [3.5, 5.8]
        source: "PAP-dustmann2025immigration"
        note: "Dustmann et al. (2025) - Regionale Anpassung"

      interpretation:
        note: "Höhere Werte = stärkere Relokation als Reaktion auf Lohnschocks"

    applicable_domains: ["LABOR", "MIGRATION", "SPATIAL"]
    last_updated: "2026-01-31"

    literature_sources:
      - key: "PAP-dustmann2025immigration"
        finding: "η̄_P = 4.64 (place-based supply elasticity)"

  # ---------------------------------------------------------------------------
  # Worker-Level Labor Supply Elasticity (η̄_E)
  # ---------------------------------------------------------------------------
  - id: PAR-LM-003
    symbol: η̄_E
    name: "Worker-Level Labor Supply Elasticity"
    description: "Elastizität des Arbeitsangebots auf Arbeitnehmerebene - wie stark reagieren individuelle Arbeitnehmer auf Lohnänderungen"

    values:
      literature:
        mean: 3.68
        ci_95: [2.8, 4.6]
        source: "PAP-dustmann2025immigration"
        note: "Dustmann et al. (2025) - Worker-level estimates"

      comparison:
        note: "η̄_E < η̄_P weil place-based auch Relokation erfasst"

    applicable_domains: ["LABOR", "MIGRATION"]
    last_updated: "2026-01-31"

    literature_sources:
      - key: "PAP-dustmann2025immigration"
        finding: "η̄_E = 3.68 (worker-level supply elasticity)"

  # ---------------------------------------------------------------------------
  # Displacement Effect
  # ---------------------------------------------------------------------------
  - id: PAR-LM-004
    symbol: δ_disp
    name: "Native Displacement Effect"
    description: "Anteil der Einheimischen, die eine Region aufgrund von Immigration verlassen"

    values:
      literature:
        mean: 0.139
        ci_95: [0.08, 0.20]
        source: "PAP-dustmann2025immigration"
        note: "Dustmann et al. (2025) - Germany"

      interpretation:
        note: "Pro 100 Immigranten verlassen ~14 Einheimische die Region"

    applicable_domains: ["LABOR", "MIGRATION", "SPATIAL"]
    last_updated: "2026-01-31"

    literature_sources:
      - key: "PAP-dustmann2025immigration"
        finding: "Displacement effect = 0.139"
      - key: "PAP-dustmann2017labor"
        finding: "~3 natives leave per 10 immigrants (QJE 2017)"

  # ---------------------------------------------------------------------------
  # Regional Employment Effect
  # ---------------------------------------------------------------------------
  - id: PAR-LM-005
    symbol: ε_reg
    name: "Regional Employment Effect of Immigration"
    description: "Gesamteffekt von Immigration auf regionale Beschäftigung Einheimischer"

    values:
      literature:
        mean: -0.873
        ci_95: [-1.1, -0.6]
        source: "PAP-dustmann2025immigration"
        note: "Dustmann et al. (2025) - Negative = Einheimische verlassen Region"

      decomposition:
        displacement: 0.139
        crowding_out: 0.546
        pure_wage_effect: 0.188
        note: "Regional effect = Displacement + Crowding-out + Pure wage effect"

    applicable_domains: ["LABOR", "MIGRATION", "SPATIAL", "POL"]
    last_updated: "2026-01-31"

    literature_sources:
      - key: "PAP-dustmann2025immigration"
        finding: "Regional employment effect = -0.873"

