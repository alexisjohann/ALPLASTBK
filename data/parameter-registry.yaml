- id: PAR-VE-006
  symbol: σ*
  name: Ideal Point (Golden Mean)
  description: Optimal trait level between excess and deficiency
  values:
    definition: σ* = argmax U(σ) where U(θ) = -|θ - σ*|
    aristotelian_origin: Virtue as mean between extremes (Nicomachean Ethics)
    examples:
      courage:
        deficiency: cowardice
        mean: courage
        excess: recklessness
      generosity:
        deficiency: stinginess
        mean: generosity
        excess: prodigality
      temperance:
        deficiency: insensibility
        mean: temperance
        excess: self-indulgence
    source: PAP-heckman2023virtue
