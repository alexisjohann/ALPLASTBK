  changelog:
  - version: '1.29'
    date: '2026-02-25'
    changes: 'Added PAR-DIG-001 to PAR-DIG-008 (Technology Acceptance & Digital Adoption) from
      TAM (Davis 1989), UTAUT (Venkatesh 2003), UTAUT2 (Venkatesh 2012), Trust-TAM (Gefen 2003,
      Kim 2009). Key parameters: PU beta=0.49, Trust total=0.55, Habit beta=0.26, Risk beta=-0.28.
      Added PAR-BX-001 to PAR-BX-006 (Brand Extension) from Voelckner & Sattler (2006) meta-analysis,
      Aaker & Keller (1990), Park et al. (1991). Key parameters: Fit beta=0.41, Conviction beta=0.36,
      Prestige distance r=0.38. Session: EBF-S-2026-02-25-FIN-001 (UBS Growth Marketing).'
  - version: '1.22'
    date: '2026-02-22'
    changes: 'Upgraded 8 COMP parameters (PAR-COMP-001 to PAR-COMP-008) from Tier 2 to Tier 1. Added literature_sources with
      paper references for all complementarity parameters. Key sources: Akerlof & Kranton (2000), Benabou & Tirole (2003,
      2006), Frey & Oberholzer-Gee (1997), Gneezy & Rustichini (2000), Andreoni (1990), Ryff (1989, 2014), Heckman et al.
      (2023), Kosfeld (2019), Rustagi (2024). Total Tier 1 parameters: 84 (was 76).'
  - version: '1.21'
    date: '2026-02-22'
    changes: 'Added PAR-LM-010 to PAR-LM-015 (Labor Market Power Parameters) from JEP Winter 2026 Symposium. Prager: PAR-LM-010
      (enforcement actions 1→7), PAR-LM-011 (Cournot wage markdown). Starr: PAR-LM-012 (noncompete prevalence 18%), PAR-LM-013
      (ban wage effect 3-4%, mobility reduction 57% RCT). Johnson: PAR-LM-014 (licensing prevalence 24%), PAR-LM-015 (licensing
      wage premium 15%). Theories MS-LM-009/010/011. Cases CAS-956/957/958.'
  - version: '1.20'
    date: '2026-02-16'
    changes: 'Added PAR-MA-001 to PAR-MA-008 (M&A Behavioral Parameters) for MOD-MA-001 M&A Behavioral Deal Journey Model.
      Parameters: lambda_seller (Loss Aversion by seller type: family 3.5, PE 1.8, distressed 1.5), beta_earnout (Present
      Bias by structure: cliff 0.55, linear 0.70, milestone 0.82), gamma_hubris (CEO Overconfidence +0.35), gamma_culture
      (Cultural Friction -0.45), gamma_ma_innov (M&A x Innovation Crowding-Out -0.22), gamma_fairness (Fairness x Cooperation
      +0.30), rho_synergy (Synergy Realization rates: cost 0.70, revenue 0.35, cultural 0.25), pi_flight (Key Person Flight
      Risk by acquirer culture: PE 0.45, strategic 0.25, family 0.15). Session EBF-S-2026-02-16-ORG-001.'
  - version: '1.19'
    date: '2026-02-14'
    changes: 'Added PAR-REP-001 to PAR-REP-007 (Replication Methodology M-Score Weights) from Fehr & Sutter (2025). Theory
      MS-RS-001 (CAT-31). 7 factors: TRI (triangulation, 0.25), NOD (no-deception, 0.20), THF (formal theory, 0.15), APP (materials,
      0.15), INC (incentive-compatible, 0.10), STD (standardized software, 0.10), REP (prior replications, 0.05). M-Score
      predicts replication r=0.70, 88% accuracy. Validates Zurich School methodology.'
  - version: '1.18'
    date: '2026-02-14'
    changes: 'Added PAR-VTM-001 to PAR-VTM-008 (Voting & ABM Parameters) from PSF-2.0 Papal Succession Framework. Model MOD-PSF-2.0,
      Appendix BP (METHOD-VOTING). Parameters: τ (softmax temperature), η (belief update rate), β_thresh (bandwagon threshold),
      α₁/α₂ (bandwagon sensitivity), θ_c (zealot fraction), ε (vote noise), δ (progressive pressure), φ_drop (dropout threshold).
      Empirically calibrated on 12 historical conclaves (1903-2024), 100% accuracy. Key literature: McKelvey & Palfrey 1995
      (QRE), DeGroot 1974, Bikhchandani et al. 1992, Mobilia 2003, Galam 2007.'
  - version: '1.16'
    date: '2026-02-06'
    changes: 'Added PAR-ENT-001 to PAR-ENT-003 (Entrepreneurship Parameters) from Zellweger & Zenger (2023) AMR ''Entrepreneurs
      as Scientists''. Theory MS-ENT-001/MS-ENT-002/MS-ENT-003 (CAT-27). FOUNDATIONAL FRAMEWORK parameters: Product-Market
      Fit (PMF) = correlation(V_E, V_M), Approval Threshold τ_approve = 0.60-0.80 (Camuffo et al. 2020), Rejection Threshold
      τ_reject = 0.40 (Csaszar et al. 2006). ALL PARAMETERS ARE INFORMED PRIORS - paper establishes framework, not point estimates.'
  - version: '1.15'
    date: '2026-02-05'
    changes: 'Added PAR-CX-001 to PAR-CX-004 (Customer Experience Parameters) from Schögel & Herhausen (2024) ''The Customer
      Experience Navigator''. Theory MS-CJ-001/MS-CX-001/MS-CX-002 (CAT-26). KEY CONCEPTS: Basic n (critical Interaction Hubs,
      variable per company), MOT timing (ZMOT/FMOT/SMOT weights), Interaction Hub identification (frequency/breadth/depth),
      Kano categories (basic/satisfier/delighter allocation).'
  - version: '1.14'
    date: '2026-02-05'
    changes: 'Added PAR-CM-001 to PAR-CM-007 (Crisis Management Parameters) from Herhausen et al. (2019) ''Detecting, Preventing,
      and Mitigating Online Firestorms''. Theory MS-CM-001 (CAT-24). KEY FINDINGS: Arousal drives virality (β=0.186), Tie
      strength largest effect (β=1.432), SURPRISING Explanation > Empathy for high-arousal. TIMING CRITICAL: Compensation
      late=good, early=bad; Apology early=good, late=bad.'
  - version: '1.13'
    date: '2026-02-05'
    changes: 'Added PAR-VE-001 to PAR-VE-006 (Virtue Ethics Parameters) from Heckman, Galaty & Tian (2023) NBER WP 31258 ''The
      Economic Approach to Personality, Character and Virtue''. Theory MS-VE-001/MS-VE-002/MS-VE-003 (CAT-23). KEY CONCEPTS:
      Traits are actions (not endowments), Self-control S_t (δ_S~0.15), Habituation K_t (δ_K~0.035), Golden mean σ*. FOUNDATIONAL
      BRIDGE: Economics ↔ Psychology ↔ Philosophy.'
  - version: '1.12'
    date: '2026-02-05'
    changes: 'Added PAR-SF-001 to PAR-SF-005 (Skill Formation Parameters) from Heckman et al. (2026) NBER WP 34737 ''Measuring
      the Growth of Skills''. Theory MS-SF-002/MS-SF-003. KEY FINDINGS: Dynamic complementarity confirmed for language/cognitive
      but NOT fine motor. Common scale assumption REJECTED for language/cognitive. Skills EMERGE at each level (not more of
      same). Disadvantaged children benefit most (γ_low > γ_normal > γ_high).'
  - version: '1.11'
    date: '2026-02-05'
    changes: 'Added PAR-MR-001 to PAR-MR-004 (Moral Reasoning Parameters) from Bénabou, Falk & Henkel (2024) ''Ends versus
      Means''. Theory MS-MR-001 (CAT-22). KEY FINDING: No stable moral types (r_EVM≈0.035), EVM orthogonal to prosociality
      (r≈0.025). θ_lying=0.44, θ_bribe=0.38.'
  - version: '1.10'
    date: '2026-02-05'
    changes: Added PAR-BEH-016 (λ_R rejection sensitivity) and PAR-BEH-017 (α rejection scaling) from Bénabou et al. (2022)
      'It Hurts To Ask'. Theory MS-IB-018. Domain-specific values for welfare, workplace, healthcare, family contexts.
