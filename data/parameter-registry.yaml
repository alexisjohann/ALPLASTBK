  version: "1.16"
  domains_covered: ["FIN", "HLT", "ENV", "ORG", "DIGITAL", "ANTITRUST", "ATTENTION", "POL", "EDU", "ADDICTION", "SOCIAL", "LABOR", "MIGRATION", "SPATIAL", "INFO", "ADVICE", "AUSTRIA", "MORAL", "NETWORK", "WELFARE", "ETH", "PSYCHOLOGY", "SKILLS", "MEASUREMENT", "VIRTUE", "CHARACTER", "CRISIS", "MARKETING", "CUSTOMER_SERVICE", "CX", "ENTREPRENEURSHIP"]
  changelog:
    - version: "1.16"
      date: "2026-02-06"
      changes: "Added PAR-ENT-001 to PAR-ENT-003 (Entrepreneurship Parameters) from Zellweger & Zenger (2023) AMR 'Entrepreneurs as Scientists'. Theory MS-ENT-001/MS-ENT-002/MS-ENT-003 (CAT-27). FOUNDATIONAL FRAMEWORK parameters: Product-Market Fit (PMF) = correlation(V_E, V_M), Approval Threshold τ_approve = 0.60-0.80 (Camuffo et al. 2020), Rejection Threshold τ_reject = 0.40 (Csaszar et al. 2006). ALL PARAMETERS ARE INFORMED PRIORS - paper establishes framework, not point estimates."
    - version: "1.15"
      date: "2026-02-05"
      changes: "Added PAR-CX-001 to PAR-CX-004 (Customer Experience Parameters) from Schögel & Herhausen (2024) 'The Customer Experience Navigator'. Theory MS-CJ-001/MS-CX-001/MS-CX-002 (CAT-26). KEY CONCEPTS: Basic n (critical Interaction Hubs, variable per company), MOT timing (ZMOT/FMOT/SMOT weights), Interaction Hub identification (frequency/breadth/depth), Kano categories (basic/satisfier/delighter allocation)."
    - version: "1.14"
      date: "2026-02-05"
      changes: "Added PAR-CM-001 to PAR-CM-007 (Crisis Management Parameters) from Herhausen et al. (2019) 'Detecting, Preventing, and Mitigating Online Firestorms'. Theory MS-CM-001 (CAT-24). KEY FINDINGS: Arousal drives virality (β=0.186), Tie strength largest effect (β=1.432), SURPRISING Explanation > Empathy for high-arousal. TIMING CRITICAL: Compensation late=good, early=bad; Apology early=good, late=bad."
    - version: "1.13"
      date: "2026-02-05"
      changes: "Added PAR-VE-001 to PAR-VE-006 (Virtue Ethics Parameters) from Heckman, Galaty & Tian (2023) NBER WP 31258 'The Economic Approach to Personality, Character and Virtue'. Theory MS-VE-001/MS-VE-002/MS-VE-003 (CAT-23). KEY CONCEPTS: Traits are actions (not endowments), Self-control S_t (δ_S~0.15), Habituation K_t (δ_K~0.035), Golden mean σ*. FOUNDATIONAL BRIDGE: Economics ↔ Psychology ↔ Philosophy."
    - version: "1.12"
      date: "2026-02-05"
      changes: "Added PAR-SF-001 to PAR-SF-005 (Skill Formation Parameters) from Heckman et al. (2026) NBER WP 34737 'Measuring the Growth of Skills'. Theory MS-SF-002/MS-SF-003. KEY FINDINGS: Dynamic complementarity confirmed for language/cognitive but NOT fine motor. Common scale assumption REJECTED for language/cognitive. Skills EMERGE at each level (not more of same). Disadvantaged children benefit most (γ_low > γ_normal > γ_high)."
    - version: "1.11"
      date: "2026-02-05"
      changes: "Added PAR-MR-001 to PAR-MR-004 (Moral Reasoning Parameters) from Bénabou, Falk & Henkel (2024) 'Ends versus Means'. Theory MS-MR-001 (CAT-22). KEY FINDING: No stable moral types (r_EVM≈0.035), EVM orthogonal to prosociality (r≈0.025). θ_lying=0.44, θ_bribe=0.38."
    - version: "1.10"
      date: "2026-02-05"
      changes: "Added PAR-BEH-016 (λ_R rejection sensitivity) and PAR-BEH-017 (α rejection scaling) from Bénabou et al. (2022) 'It Hurts To Ask'. Theory MS-IB-018. Domain-specific values for welfare, workplace, healthcare, family contexts."

