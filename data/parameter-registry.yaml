methodology_parameters:
- id: PAR-EC-001
  symbol: P1-P4
  name: Policy Questions Framework
  description: Four fundamental policy questions for causal inference
  components:
    P1: Treatment on Treated (TT) - E[Y₁-Y₀|D=1]
    P2: Treatment on Untreated (TUT) - E[Y₁-Y₀|D=0]
    P3: Policy Forecast - External validity to new context
    P4: New Policy Effects - Never-implemented policies
  applicable_to:
  - All intervention evaluations
  - Causal inference methodology
  - External validity assessment
  key_insight: 'Only structural econometric models can answer all four policy questions.

    Neyman-Rubin limited to P1-P2. Pearl DAG nonparametric and cannot handle simultaneity.

    Fixing ≠ Conditioning: E[Y|fix(D=1)] ≠ E[Y|D=1]

    '
  last_updated: '2026-02-05'
  source_paper: PAP-heckman2024causality
