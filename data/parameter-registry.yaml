  updated_by_session: EBF-S-2026-01-28-MKT-001
  literature_sources:
  - key: PAP-becker1965theory
    finding: Time valued at marginal wage rate
  - key: PAP-goodman2026timeintensive
    finding: Shadow wage determines time cost share
  parameter_tier: 1
- id: PAR-TA-002
  symbol: s_T
  name: Time Cost Share
  description: 'Anteil der Zeitkosten am vollen Preis: s_T = (W·t) / π'
  values:
    literature:
      formula: s_T = (W·t_i) / (p_i + W·t_i)
      source: PAP-goodman2026timeintensive
    by_product_type:
      free_digital_platforms:
        mean: 0.99
        ci_68:
        - 0.95
        - 1.0
        note: p_monetary ≈ 0 → s_T → 1
        examples:
        - Facebook
        - Instagram
        - TikTok
        - YouTube
      streaming_subscription:
        mean: 0.85
        ci_68:
        - 0.75
        - 0.92
        note: Geringe monatliche Gebühr, viel Zeit
        examples:
        - Netflix
        - Spotify
      traditional_goods:
        mean: 0.3
        ci_68:
        - 0.15
        - 0.45
        note: Höhere monetäre Kosten relativ zu Zeit
        examples:
        - Restaurants
        - Kino
  key_insight: Produkte mit ähnlichen s_T haben höhere Diversion Ratios
  applicable_domains:
  - DIGITAL
  - ANTITRUST
  - CONSUMER
  last_updated: '2026-01-28'
  updated_by_session: EBF-S-2026-01-28-MKT-001
  literature_sources:
  - key: PAP-goodman2026timeintensive
    finding: Time shares predict substitution patterns
  - key: PAP-becker1965theory
    finding: Full price = monetary price + time cost
  parameter_tier: 1
- id: PAR-TA-003
  symbol: D_ij
  name: Diversion Ratio
  description: Anteil der von Produkt i abgewanderten Nachfrage, der zu Produkt j geht
  values:
    formula: D_ij = (∂q_j/∂p_i) / (-∂q_i/∂p_i)
    interpretation: D_ij ∈ [0,1], höher = stärkere Substitution
    facebook_instagram:
      mean: 0.65
      ci_68:
      - 0.55
      - 0.75
      source: PAP-goodman2026timeintensive
      note: Hohe Substitution aufgrund ähnlicher s_T
    facebook_offline:
      mean: 0.2
      ci_68:
      - 0.12
      - 0.28
      source: PAP-goodman2026timeintensive
      note: Niedrigere Substitution zu Offline-Aktivitäten
  beckerian_prediction: D_ij ↑ wenn |s_T^i - s_T^j| ↓
  antitrust_implication: Hohe D_ij → enge Marktabgrenzung → Merger-Bedenken
  applicable_domains:
  - DIGITAL
  - ANTITRUST
  last_updated: '2026-01-28'
  updated_by_session: EBF-S-2026-01-28-MKT-001
  literature_sources:
