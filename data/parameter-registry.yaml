    key_insight: "Pragmatic online is largest (31%); multi-channel smallest but journey-sensitive (15%)"

  # ---------------------------------------------------------------------------
  # Entrepreneurship Parameters (from Zellweger & Zenger 2023 AMR)
  # FOUNDATIONAL FRAMEWORK - Informed Priors (no point estimates in paper)
  # ---------------------------------------------------------------------------

  - id: PAR-ENT-001
    symbol: PMF
    name: "Product-Market Fit"
    description: "Correlation between entrepreneur belief model V(E) and market model V(M). Measures the fit between what the entrepreneur believes is valuable and what the market actually values."

    values:
      literature:
        definition: "correlation(V_E, V_M)"
        range: "[0, 1]"
        source: "PAP-zellweger2023entrepreneurs"
        note: "Theoretical framework parameter. V(E) = Needs(E) × Features(E), V(M) = Needs(M) × Features(M). PMF = correlation(V_E, V_M). No point estimate - correlation is venture-specific."
        parameter_type: "informed_prior"
      context_specific:
        early_stage_startup:
          typical_range: "[0.1, 0.4]"
          note: "Pre-testing; high uncertainty, belief largely untested"
        post_mvp:
          typical_range: "[0.3, 0.7]"
          note: "After initial testing cycles; belief partially validated"
        product_market_fit_achieved:
          typical_range: "[0.7, 1.0]"
          note: "Strong validation from market testing"

    formal_definition:
      belief_model: "V(E) = Needs(E) × Features(E)"
      market_model: "V(M) = Needs(M) × Features(M)"
      fit_measure: "V ∝ correlation(V(E), V(M))"
      endogenous_uncertainty: "V(E) is self-selected from myriad imaginable beliefs"

    applicable_domains: ["ENTREPRENEURSHIP", "STRATEGY", "INNOVATION"]
    last_updated: "2026-02-06"
    source_paper: "PAP-zellweger2023entrepreneurs"
    theory_id: "MS-ENT-002"
    key_insight: "Product-market fit is formalized as correlation between entrepreneur's belief model and market reality. The belief is endogenously chosen, creating endogenous uncertainty distinct from exogenous market uncertainty."

  - id: PAR-ENT-002
    symbol: τ_approve
    name: "Approval Threshold"
    description: "Minimum proportion of positive evaluations required to retain an entrepreneurial belief. Below this threshold but above rejection threshold, the entrepreneur is in a zone of ambiguity."

    values:
      literature:
        range: "0.60-0.80"
        source: "PAP-zellweger2023entrepreneurs"
        note: "Informed prior from Camuffo et al. (2020) and Csaszar et al. (2006), cited in paper p. 394. Not a direct estimate from this paper."
        parameter_type: "informed_prior"
        original_sources:
          - "Camuffo, Cordova, Gambardella & Spina (2020) Management Science"
          - "Csaszar, Eggers & Fahlenbrach (2006)"
      context_specific:
        high_stakes_venture:
          value: 0.80
          note: "Higher threshold when costs of false positive are high"
        low_cost_experiment:
          value: 0.60
          note: "Lower threshold acceptable when testing is cheap"

    relationship_to_errors:
      type_1_error: "False positive - accepting a belief that should be rejected"
      type_2_error: "False negative - rejecting a belief that should be accepted"
      tradeoff: "Higher τ_approve reduces Type 1 errors but increases Type 2 errors"

    applicable_domains: ["ENTREPRENEURSHIP", "STRATEGY", "INNOVATION"]
    last_updated: "2026-02-06"
    source_paper: "PAP-zellweger2023entrepreneurs"
    theory_id: "MS-ENT-001"
    key_insight: "Approval threshold defines when positive feedback is sufficient to continue investing in a belief. Connected to bias-variance tradeoff in belief updating."

  - id: PAR-ENT-003
    symbol: τ_reject
    name: "Rejection Threshold"
    description: "Maximum proportion of positive evaluations below which an entrepreneurial belief is rejected or substantially revised. Between τ_reject and τ_approve lies a zone of ambiguity requiring further testing."

    values:
      literature:
        value: 0.40
        source: "PAP-zellweger2023entrepreneurs"
        note: "Informed prior from Csaszar et al. (2006), cited in paper p. 394. Not a direct estimate from this paper."
        parameter_type: "informed_prior"
        original_sources:
          - "Csaszar, Eggers & Fahlenbrach (2006)"
      context_specific:
        risk_tolerant_entrepreneur:
          value: 0.30
          note: "More risk-tolerant entrepreneurs may set lower rejection threshold"
        risk_averse_entrepreneur:
          value: 0.50
          note: "Risk-averse entrepreneurs may set higher rejection threshold"

    zone_of_ambiguity:
      lower_bound: "τ_reject (0.40)"
      upper_bound: "τ_approve (0.60-0.80)"
      interpretation: "Between thresholds: gather more data, run additional experiments"
      heuristic_response: "Stage investment, partition sample, seek disconfirming evidence"

    applicable_domains: ["ENTREPRENEURSHIP", "STRATEGY", "INNOVATION"]
    last_updated: "2026-02-06"
    source_paper: "PAP-zellweger2023entrepreneurs"
    theory_id: "MS-ENT-001"
    key_insight: "Below rejection threshold, entrepreneur should pivot or abandon belief. The gap between τ_reject and τ_approve creates a zone of ambiguity where further experimentation is rational."

  # ===========================================================================
  # PAR-TP: Technology, Power & Institutional Direction
  # Source: Acemoglu & Johnson (2023) "Power and Progress"
  # FRAMEWORK ONLY - informed priors, NOT direct estimates
  # ===========================================================================

  - id: PAR-TP-001
    symbol: β_bandwagon
    name: "Productivity Bandwagon Strength"
    description: "Strength of the productivity-to-wage transmission mechanism. Conditional on technology type and institutional context."
    estimation_status: "FRAMEWORK ONLY - paper provides structure, not point estimates"

    values:
      literature:
        task_creating_technology:
          estimate: "β > 0 (positive)"
          conditions: "Competitive labor market, technology creates new tasks"
          source: "acemoglu2023power, Chapter 1"
          note: "⚠️ INFORMED PRIOR - no point estimate in source paper"
        so_so_automation:
          estimate: "β ≤ 0 (zero or negative)"
          conditions: "Automation without significant productivity gains"
          source: "acemoglu2023power, Chapter 9"
          note: "⚠️ INFORMED PRIOR - qualitative from historical analysis"
        pure_automation:
          estimate: "β < 0 (negative for displaced workers)"
          conditions: "Robot adoption without task creation"
          source: "acemoglu2023power + PAP-acemoglu2020robots"
          note: "Supported by Acemoglu & Restrepo (2020): each robot per 1000 workers reduces employment-to-population ratio by 0.2pp"
      prior_sources: ["PAP-acemoglu2020robots", "PAP-acemoglu2022tasks", "PAP-acemoglu2019automation"]

    psi_modifiers:
      Ψ_I: "Labor market institutions (union density, minimum wage, employment protection)"
      Ψ_S: "Social norms around technology adoption and worker dignity"
      Ψ_K: "Cultural attitudes toward automation vs. human labor"

    applicable_domains: ["LABOR", "TECHNOLOGY", "INNOVATION", "DEVELOPMENT"]
    last_updated: "2026-02-07"
    source_paper: "acemoglu2023power"
    theory_id: "MS-TP-001"
    key_insight: "The bandwagon is not a law of nature but a conditional mechanism. Technology that creates new tasks activates the bandwagon; technology that merely automates does not."

  - id: PAR-TP-002
    symbol: α_vision
    name: "Narrative/Vision Influence on Technology Direction"
    description: "How strongly dominant narratives (techno-optimism, disruption ideology) shape the direction of technological development."
    estimation_status: "FRAMEWORK ONLY - paper provides structure, not point estimates"

    values:
      literature:
        dominant_techno_optimism:
          estimate: "high (α → 1)"
          conditions: "Elite-dominated discourse, Silicon Valley narrative"
          source: "acemoglu2023power, Chapters 2-3"
          note: "⚠️ INFORMED PRIOR - qualitative from historical/narrative analysis"
        contested_narrative:
          estimate: "moderate (α ≈ 0.5)"
          conditions: "Active counter-narrative from labor, civil society"
          source: "acemoglu2023power, Chapter 7"
          note: "⚠️ INFORMED PRIOR - Progressive Era historical evidence"
      prior_sources: ["acemoglu2023power"]

    ebf_mapping: "AWARE dimension - A(technology) shaped by dominant vision"
    applicable_domains: ["TECHNOLOGY", "INNOVATION", "POLICY", "MEDIA"]
    last_updated: "2026-02-07"
    source_paper: "acemoglu2023power"
    theory_id: "MS-TP-002"
    key_insight: "Visions are not neutral descriptions of technology - they are persuasion tools that channel investment and policy toward specific technology directions."

  - id: PAR-TP-003
    symbol: θ_countervailing
    name: "Countervailing Power Effectiveness"
    description: "Threshold at which organized countervailing powers (labor, democratic institutions, civil society) can redirect technology toward shared prosperity."
    estimation_status: "FRAMEWORK ONLY - paper provides structure, not point estimates"

    values:
      literature:
        strong_countervailing:
          estimate: "θ > threshold → shared prosperity"
          conditions: "Strong unions + democratic government + civil society"
          source: "acemoglu2023power, Chapter 7"
          historical_reference: "USA 1935-1975: New Deal + unions → wage growth = productivity growth"
          note: "⚠️ INFORMED PRIOR - qualitative from historical evidence"
        weak_countervailing:
          estimate: "θ < threshold → elite capture"
          conditions: "Weak unions, captured regulators, fragmented civil society"
          source: "acemoglu2023power, Chapters 4, 8-10"
          historical_reference: "Medieval agriculture, digital era post-1980"
          note: "⚠️ INFORMED PRIOR - historical pattern analysis"
      prior_sources: ["acemoglu2023power", "PAP-acemoglu2012nations", "PAP-acemoglu2001colonial"]

    three_pillars:
      organized_labor: "Union density, collective bargaining coverage"
      democratic_institutions: "Regulatory capacity, responsive governance"
      civil_society: "Independent media, advocacy organizations, public discourse"

    applicable_domains: ["LABOR", "TECHNOLOGY", "POLICY", "DEVELOPMENT", "INSTITUTIONS"]
    last_updated: "2026-02-07"
    source_paper: "acemoglu2023power"
    theory_id: "MS-TP-003"
    key_insight: "Countervailing powers are necessary but not sufficient. They must reach critical mass AND be directed at technology policy (not just redistribution after the fact)."

