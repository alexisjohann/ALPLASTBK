  - key: PAP-milkman2021megastudies
    finding: Relevant for Self-Control Stock (author:Duckworth)
  parameter_tier: 1
- id: PAR-VE-005
  symbol: K_t
  name: Habituation Stock
  description: Accumulated practice that makes virtuous action easier
  values:
    dynamics: K_{t+1} = (1-δ_K)K_t + h(a_t)
    depreciation_rate:
      δ_K:
        mean: 0.035
        range:
        - 0.02
        - 0.05
        unit: per period
      note: ⚠️ INFORMED PRIOR from Habit Formation literature, NOT direct estimate from this paper
      prior_sources:
      - duckworth2007grit
      - neal2006habits
      - wood2016psychology
    effect_on_cost: Cost(virtuous action) = c(a)/(1 + K_t)
    implication: Higher K_t → lower cost → more likely to act virtuously
    source: PAP-heckman2023virtue
    estimation_status: FRAMEWORK ONLY - paper provides structure, not point estimates
