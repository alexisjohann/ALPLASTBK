  # ---------------------------------------------------------------------------
  # Inequity Aversion - Disadvantageous (α_FS)
  # ---------------------------------------------------------------------------
  - id: PAR-BEH-012
    symbol: α_FS
    name: "Disadvantageous Inequity Aversion"
    description: "Disutility from being behind others (earning less than peers)"

    paper_notation:
      original_symbol: "α"
      source_paper: "PAP-fehr1999theory"
      context: "Fehr-Schmidt (1999) Inequity Aversion Model"
      translation_note: "EBF uses α_FS (FS=Fehr-Schmidt) to distinguish from other α-family parameters"

    formal_definition:
      equation: "U_i(x) = x_i - α_FS × max{x_j - x_i, 0} - β_FS × max{x_i - x_j, 0}"
      where:
        x_i: "Own payoff"
        x_j: "Other's payoff"
        α_FS: "Disadvantageous inequity aversion, α_FS ≥ 0"
        β_FS: "Advantageous inequity aversion, 0 ≤ β_FS < 1"
      interpretation: "α_FS measures how much the agent dislikes earning LESS than others"
      source_equation: "Equation (1) in Fehr & Schmidt (1999)"
      unit: "dimensionless weight"

    values:
      literature:
        mean: 0.85
        ci_95: [0.5, 4.0]
        source: "PAP-fehr1999theory"
        note: "Fehr & Schmidt (1999) - heterogeneous distribution"

      distribution:
        selfish: {share: 0.30, alpha_FS: 0.0}
        moderate: {share: 0.30, alpha_FS: 0.5}
        fair: {share: 0.30, alpha_FS: 1.0}
        strong: {share: 0.10, alpha_FS: 4.0}

      domain_specific:
        ultimatum_game: {mean: 1.0, ci_68: [0.5, 2.0]}
        workplace: {mean: 0.8, ci_68: [0.4, 1.2]}
        public_goods: {mean: 0.7, ci_68: [0.3, 1.1]}

    constraints:
      - "α_FS ≥ β_FS (being behind hurts more than being ahead)"
      - "α_FS ≥ 0"

    applicable_domains: ["SOCIAL", "ORG", "FIN", "PUBLIC_GOODS"]
    last_updated: "2026-02-05"
    theory_support: "MS-SP-001"

    literature_sources:
      - key: "PAP-fehr1999theory"
        finding: "α_FS ≈ 0.85 mean, heterogeneous: 30% selfish, 70% inequity averse"
      - key: "PAP-bolton2000erc"
        finding: "Similar predictions with relative payoff model"

  # ---------------------------------------------------------------------------
  # Inequity Aversion - Advantageous (β)
  # ---------------------------------------------------------------------------
  - id: PAR-BEH-013
    symbol: β_FS
    name: "Advantageous Inequity Aversion"
    description: "Disutility from being ahead of others (earning more than peers)"

    paper_notation:
      original_symbol: "β"
      source_paper: "PAP-fehr1999theory"
      context: "Fehr-Schmidt (1999) Inequity Aversion Model"
      translation_note: "EBF uses β_FS (FS=Fehr-Schmidt) to distinguish from β (present bias, PAR-BEH-003)"

    formal_definition:
      equation: "U_i(x) = x_i - α_FS × max{x_j - x_i, 0} - β_FS × max{x_i - x_j, 0}"
      where:
        x_i: "Payoff to individual i"
        x_j: "Payoff to other individual j"
        α_FS: "Disadvantageous inequity aversion (envy, being behind)"
        β_FS: "Advantageous inequity aversion (guilt, being ahead)"
      interpretation: "β_FS measures disutility from guilt when earning more than peers; always weaker than α_FS (envy)"
      source_equation: "Equation (4) in Fehr & Schmidt (1999)"
      unit: "dimensionless, bounded [0,1)"

    values:
      literature:
        mean: 0.315
        ci_95: [0.0, 0.6]
        source: "PAP-fehr1999theory"
        note: "Fehr & Schmidt (1999) - always less than α_FS"

      distribution:
        selfish: {share: 0.30, beta_FS: 0.0}
        moderate: {share: 0.30, beta_FS: 0.25}
        fair: {share: 0.30, beta_FS: 0.5}
        strong: {share: 0.10, beta_FS: 0.6}

      domain_specific:
        dictator_game: {mean: 0.4, ci_68: [0.2, 0.6]}
        workplace: {mean: 0.25, ci_68: [0.1, 0.4]}
        public_goods: {mean: 0.3, ci_68: [0.15, 0.45]}

    constraints:
      - "0 ≤ β_FS < 1"
      - "β_FS ≤ α_FS (advantageous inequity aversion weaker than disadvantageous)"

    applicable_domains: ["SOCIAL", "ORG", "FIN", "PUBLIC_GOODS"]
    last_updated: "2026-02-05"
    theory_support: "MS-SP-001"

    literature_sources:
      - key: "PAP-fehr1999theory"
        finding: "β_FS ≈ 0.315 mean, constraint 0 ≤ β_FS < 1"
      - key: "PAP-charness2002understanding"
        finding: "Confirms β_FS < α_FS in distribution games"

  # ---------------------------------------------------------------------------
  # Image Concern (μ)
  # ---------------------------------------------------------------------------
  - id: PAR-BEH-014
    symbol: μ
    name: "Image Concern"
    description: "Strength of social or self-image motivation in moral decisions"

    formal_definition:
      equation: "U_S(h; g, w) = (gw - c)h + μ × φ(F)"
      where:
        U_S: "Sender's utility from helping decision"
        g: "Generosity type of Sender, g ∈ [0, ḡ]"
        w: "Need level of Receiver, w ∈ [0, w̄]"
        c: "Cost of helping"
        h: "Help provided, h ∈ {0, 1}"
        μ: "Weight on image payoff, μ ≥ 0"
        φ: "Image payoff function from outcome F ∈ {Accept, Reject, No-interaction, Offer}"
      interpretation: "μ captures how much the Sender cares about appearing generous (social image) or feeling generous (self-image)"
      source_equation: "Equation (2) in Bénabou, Jaroszewicz & Loewenstein (2022); see also Bénabou & Tirole (2006)"
      unit: "dimensionless weight, μ ≥ 0"

    values:
      literature:
        mean: 0.40
        ci_95: [0.20, 0.60]
        source: "PAP-benabou_2018_narratives"
        note: "Normalized weight on v̂(a) in utility"

      by_visibility:
        public:
          mean: 0.55
          ci_68: [0.40, 0.70]
          psi_conditions:
            Ψ_S: "high_observability"       # Others can see and judge
            Ψ_I: "attribution_enabled"      # Identity linked to action
            Ψ_C: "reputation_salient"       # Thinking about how others see me
          measurement_context:
            study_type: "lab_experiment"
            source: "Ariely, Bracha & Meier (2009)"
            countries: ["USA"]
            examples: ["Dictator game with audience", "Public charity events"]
        private:
          mean: 0.30
          ci_68: [0.15, 0.45]
          psi_conditions:
            Ψ_S: "anonymous"                # No social observation
            Ψ_I: "no_attribution"           # Actions not linked to identity
            Ψ_C: "self_image_only"          # Only internal evaluation
          measurement_context:
            study_type: "lab_experiment"
            source: "Bénabou & Tirole (2006)"
            countries: ["USA", "Europe"]
            examples: ["Anonymous donation", "Double-blind experiment"]
        social_media:
          mean: 0.65
          ci_68: [0.50, 0.80]
          psi_conditions:
            Ψ_S: "viral_potential"          # Actions may spread widely
            Ψ_F: "digital_permanent"        # Recorded and searchable
            Ψ_I: "public_record"            # Creates permanent attribution
            Ψ_C: "impression_management"    # Active self-presentation
          measurement_context:
            study_type: "field_data"
            source: "Inferred from social media behavior studies"
            countries: ["Global"]
            examples: ["Public charity posts", "Virtue signaling"]

      domain_specific:
        charitable_giving:
          mean: 0.50
          ci_68: [0.35, 0.65]
          psi_conditions:
            Ψ_S: "social_approval"          # Giving is socially valued
            Ψ_I: "tax_deductible"           # Institutional incentive
            Ψ_K: "philanthropy_norm"        # Cultural expectation
          measurement_context:
            study_type: "field_experiment"
            source: "DellaVigna, List & Malmendier (2012)"
            countries: ["USA"]
            examples: ["Door-to-door fundraising", "Charity auctions"]
        prosocial_behavior:
          mean: 0.45
          ci_68: [0.30, 0.60]
          psi_conditions:
            Ψ_S: "reciprocity_context"      # Expectation of future return
            Ψ_C: "warm_glow"                # Internal satisfaction from helping
            Ψ_K: "cooperation_norm"         # Social norm of mutual aid
          measurement_context:
            study_type: "lab_experiment"
            source: "Andreoni (1990) warm glow"
            countries: ["USA"]
            examples: ["Public goods game", "Helping experiments"]
        moral_licensing:
          mean: 0.35
          ci_68: [0.20, 0.50]
          psi_conditions:
            Ψ_C: "self_permission"          # Prior good deed activates license
            Ψ_S: "moral_credit_account"     # Mental accounting of moral acts
            Ψ_I: "no_external_monitoring"   # No accountability
          measurement_context:
            study_type: "lab_experiment"
            source: "Sachdeva, Iliev & Medin (2009)"
            countries: ["USA"]
            examples: ["Post-donation indulgence", "Green licensing"]
        helping_behavior:
          mean: 0.40
          ci_68: [0.25, 0.55]
          psi_conditions:
            Ψ_S: "dyadic_relationship"      # One-on-one helping context
            Ψ_C: "beneficiary_visible"      # Recipient is identifiable
            Ψ_I: "no_formal_obligation"     # Helping is discretionary
          measurement_context:
            study_type: "theoretical"
            source: "Bénabou, Jaroszewicz & Loewenstein (2022)"
            countries: ["Theoretical model"]
            note: "Fear of Asking paper - μ as image concern in helping game"

    key_equation: "U = (ve - c/β)a + μv̂(a)"
    interaction_with_beta: "μ compensates for low β (self-control)"
    constraints:
      - "μ > 0"
      - "Higher μ → more prosocial behavior when observed"

    applicable_domains: ["SOCIAL", "MORAL", "CHARITY", "PUBLIC_GOODS"]
    last_updated: "2026-02-04"
    theory_support: "MS-IB-002, MS-IB-013"

    literature_sources:
      - key: "PAP-benabou_2018_narratives"
        finding: "Image utility μv̂(a) drives moral behavior"
      - key: "PAP-ariely2009doing"
        finding: "Visibility increases prosocial behavior"
      - key: "PAP-benabou2006incentives"
        finding: "Image motivation can be crowded out by incentives"

  # ---------------------------------------------------------------------------
  # Network Persistence (ρ)
  # ---------------------------------------------------------------------------
  - id: PAR-BEH-015
    symbol: ρ
    name: "Network Persistence / Segregation"
    description: "Correlation of moral types on social network (homophily)"

    values:
      literature:
        mean: 0.60
        ci_95: [0.30, 0.90]
        source: "PAP-benabou_2018_narratives"
        note: "Pr[i+1 ∈ A | i ∈ A] = ρ in Markov chain"

      by_network_type:
        family: {mean: 0.85, ci_68: [0.75, 0.95], note: "High homophily"}
        workplace: {mean: 0.55, ci_68: [0.40, 0.70], note: "Moderate mixing"}
        social_media: {mean: 0.70, ci_68: [0.55, 0.85], note: "Filter bubbles"}
        random: {mean: 0.50, ci_68: [0.45, 0.55], note: "No segregation"}

    key_insight: "Lower ρ → more mixing → more prosocial behavior"
    polarization_effect: "Gaps in narrative awareness U-shaped in ρ, minimum at ρ=0.5"

    influence_factor:
      formula: "N⁻_A = π(1-x) / [1 - ρ(1-x)]"
      interpretation: "Social multiplier for negative narrative transmission"

    constraints:
      - "ρ ∈ [0, 1]"
      - "ρ = 0: random mixing"
      - "ρ = 1: complete segregation"

    applicable_domains: ["SOCIAL", "NETWORK", "POLARIZATION", "MORAL"]
    last_updated: "2026-02-04"
    theory_support: "MS-IB-013"

    literature_sources:
      - key: "PAP-benabou_2018_narratives"
        finding: "Network structure determines viral spread of moral narratives"
      - key: "PAP-mcpherson2001birds"
        finding: "Homophily in social networks"

  # ---------------------------------------------------------------------------
  # Rejection Sensitivity (λ_R) - Fear of Asking
  # ---------------------------------------------------------------------------
  - id: PAR-BEH-016
    symbol: λ_R
    name: "Rejection Sensitivity"
    description: "Loss aversion coefficient specific to social rejection in help-seeking"

    formal_definition:
      equation: "ψ(reject) = -λ_R × α × [g̃ - ḡ_N]"
      where:
        ψ: "Psychological payoff function from outcome F ∈ {Accept, Reject, No-interaction}"
        g̃: "Generosity threshold below which Sender rejects (endogenous)"
        ḡ_N: "Average generosity conditional on no offer being made"
        λ_R: "Rejection sensitivity coefficient, λ_R > 1"
      interpretation: "Rejection causes utility loss proportional to λ_R; when λ_R > 1, rejection hurts more than acceptance pleases"
      source_equation: "Equation (5) in Bénabou, Jaroszewicz & Loewenstein (2022)"
      unit: "dimensionless ratio"

    values:
      literature:
        mean: 2.0
        ci_95: [1.5, 3.0]
        source: "PAP-benabou_2022_hurts_ask"
        note: "Bénabou, Jaroszewicz & Loewenstein (2022)"
        measurement_context:
          study_type: "theoretical_calibration"
          basis: "Meta-analysis of welfare take-up, workplace studies"
          countries: ["USA", "UK", "EU"]

      domain_specific:
        welfare_takeup:
          mean: 2.5
          ci_68: [2.0, 3.0]
          psi_conditions:
            Ψ_I: "bureaucratic"          # Institutional: formal application process
            Ψ_S: "high_stigma"           # Social: welfare stigma visible
            Ψ_K: "individualistic"       # Cultural: self-reliance norm
          measurement_context:
            study_type: "field_data"
            source: "Currie (2006) welfare take-up rates"
            countries: ["USA"]
            note: "Eligible non-claimants reveal high λ_R"

        workplace_help:
          mean: 1.8
          ci_68: [1.4, 2.2]
          psi_conditions:
            Ψ_I: "professional_norms"    # Institutional: competence expectations
            Ψ_S: "moderate_visibility"   # Social: colleagues may observe
            Ψ_C: "competence_threat"     # Cognitive: self-image at stake
          measurement_context:
            study_type: "lab_experiment"
            source: "Flynn & Lake (2008)"
            countries: ["USA"]
            sample: "MBA students, professionals"

        healthcare:
          mean: 2.2
          ci_68: [1.8, 2.6]
          psi_conditions:
            Ψ_I: "medical_authority"     # Institutional: doctor-patient hierarchy
            Ψ_S: "private_but_recorded"  # Social: medical records persist
            Ψ_C: "identity_threat"       # Cognitive: diagnosis = identity label
          measurement_context:
            study_type: "observational"
            source: "Oster, Shoulson & Dorsey (2013)"
            countries: ["USA"]
            note: "Genetic testing avoidance"

        family_support:
          mean: 1.5
          ci_68: [1.2, 1.8]
          psi_conditions:
            Ψ_I: "informal"              # Institutional: no formal rules
            Ψ_S: "high_trust"            # Social: established relationship
            Ψ_K: "reciprocity_norm"      # Cultural: mutual support expected
          measurement_context:
            study_type: "survey"
            source: "Inferred from intergenerational transfer studies"
            countries: ["DACH", "USA"]
            note: "Lower rejection risk in close relationships"

    key_insight: "Higher λ_R → higher asking threshold w* → less help-seeking even when needed"

    interaction_with:
      - symbol: "α_R"
        type: "multiplicative"
        formula: "w* = λ_R × α_R × [M⁺_N(ĝ) - ḡ_N]"
        interpretation: "Total asking cost is λ_R × α_R"

    constraints:
      - "λ_R ≥ 1 (rejection is never preferred)"
      - "λ_R > λ (general) when rejection is identity-threatening"

    applicable_domains: ["SOCIAL", "WELFARE", "HLT", "ORG"]
    last_updated: "2026-02-05"
    theory_support: "MS-IB-018"
    updated_by_session: "EBF-S-2026-02-04-SOC-002"

    literature_sources:
      - key: "PAP-benabou_2022_hurts_ask"
        finding: "Fear of rejection creates non-monotonic asking in need"
      - key: "PAP-flynn2008help"
        finding: "People systematically underestimate others' willingness to help"

  # ---------------------------------------------------------------------------
  # Rejection Scaling (α) - Fear of Asking
  # ---------------------------------------------------------------------------
  - id: PAR-BEH-017
    symbol: α_R
    name: "Rejection Information Scaling"
    description: "How much information about valuation is revealed by rejection"

    paper_notation:
      original_symbol: "α"
      source_paper: "PAP-benabou_2022_hurts_ask"
      context: "Bénabou, Jaroszewicz & Loewenstein (2022) Fear of Asking Model"
      translation_note: "EBF uses α_R (R=Rejection) to distinguish from α_FS (Fehr-Schmidt inequity aversion, PAR-BEH-012)"

    formal_definition:
      equation: "w* = λ_R × α_R × [M⁺_N(ĝ(w*)) - ḡ_N]"
      where:
        w*: "Asking threshold - critical need level above which Receiver asks for help"
        M⁺_N: "Conditional mean generosity E[g | g < ĝ, no offer] given rejection"
        ĝ: "Inferred generosity threshold ĝ(w*) = c / E[w | w < w*]"
        α_R: "Information scaling parameter, α_R ∈ [0,1]"
      interpretation: "α_R measures how informative rejection is about the Sender's valuation; α_R=0 means rejection reveals nothing, α_R=1 means full revelation"
      source_equation: "Equation (7) in Bénabou, Jaroszewicz & Loewenstein (2022)"
      unit: "dimensionless, bounded [0,1]"

    values:
      literature:
        mean: 0.5
        ci_95: [0.2, 0.8]
        source: "PAP-benabou_2022_hurts_ask"
        note: "Depends on context and relationship type"
        measurement_context:
          study_type: "theoretical_derivation"
          basis: "Model calibration across relationship types"

      by_context:
        anonymous_process:
          mean: 0.2
          ci_68: [0.1, 0.3]
          psi_conditions:
            Ψ_I: "anonymous"             # Institutional: identity hidden
            Ψ_S: "no_relationship"       # Social: no prior connection
            Ψ_F: "digital_remote"        # Physical: online/automated
          measurement_context:
            examples: ["Online application", "Lottery system", "Random assignment"]
            note: "Rejection reveals nothing about personal valuation"

        bureaucratic:
          mean: 0.3
          ci_68: [0.2, 0.4]
          psi_conditions:
            Ψ_I: "rule_based"            # Institutional: explicit criteria
            Ψ_S: "impersonal"            # Social: agent follows rules
            Ψ_C: "attributable_to_rules" # Cognitive: rejection = didn't meet criteria
          measurement_context:
            examples: ["Welfare office", "Bank loan", "University admission"]
            note: "Partial signal - rules may be pretext"

        professional:
          mean: 0.5
          ci_68: [0.35, 0.65]
          psi_conditions:
            Ψ_I: "professional_norms"    # Institutional: workplace hierarchy
            Ψ_S: "ongoing_relationship"  # Social: repeated interaction
            Ψ_C: "mixed_attribution"     # Cognitive: competence + relationship unclear
          measurement_context:
            examples: ["Manager-employee", "Colleague help", "Mentor request"]
            source: "Flynn & Lake (2008)"
            note: "Rejection = competence signal + relationship signal"

        personal_visible:
          mean: 0.7
          ci_68: [0.55, 0.85]
          psi_conditions:
            Ψ_I: "informal"              # Institutional: no formal rules
            Ψ_S: "known_relationship"    # Social: established connection
            Ψ_C: "high_attribution"      # Cognitive: rejection = they don't care
          measurement_context:
            examples: ["Friends", "Extended family", "Neighbors"]
            note: "Rejection strongly signals low valuation"

        intimate:
          mean: 0.9
          ci_68: [0.80, 0.95]
          psi_conditions:
            Ψ_I: "none"                  # Institutional: no external constraints
            Ψ_S: "intimate_bond"         # Social: deep relationship
            Ψ_C: "full_attribution"      # Cognitive: rejection = they don't love me
          measurement_context:
            examples: ["Spouse", "Parent-child", "Best friend"]
            note: "Rejection is identity-shattering"

    key_insight: "Lower α_R → asking less costly → interventions should reduce informativeness of rejection"

    intervention_levers:
      - name: "Anonymization"
        effect: "α_R ↓ 0.3-0.5"
        mechanism: "Rejection cannot be attributed to personal valuation"
      - name: "Standardized criteria"
        effect: "α_R ↓ 0.2-0.4"
        mechanism: "Rejection attributed to rules, not relationship"
      - name: "Proactive offers"
        effect: "Bypasses α_R entirely"
        mechanism: "No asking needed, eliminates rejection risk"

    constraints:
      - "α_R ∈ [0, 1]"
      - "α_R = 0: rejection reveals nothing about relationship"
      - "α_R = 1: rejection fully reveals low valuation"

    applicable_domains: ["SOCIAL", "WELFARE", "HLT", "ORG"]
    last_updated: "2026-02-05"
    theory_support: "MS-IB-018"
    updated_by_session: "EBF-S-2026-02-04-SOC-002"

    literature_sources:
      - key: "PAP-benabou_2022_hurts_ask"
        finding: "Asking threshold w* proportional to α_R"
      - key: "PAP-bohns2010underestimate"
        finding: "Requesters overestimate rejection probability"

