# =============================================================================
# VIRTUE ETHICS & CHARACTER PARAMETERS
# =============================================================================
# From Heckman, Galaty & Tian (2023) "The Economic Approach to Personality,
# Character and Virtue" (NBER WP 31258)
# Theory: MS-VE-001, MS-VE-002, MS-VE-003 (CAT-23)
#
# ⚠️ WICHTIG - FOUNDATIONAL PAPER CAVEAT:
# Dieses Paper ist ein FOUNDATIONAL PAPER (Level 5), vergleichbar mit:
#   - Kahneman & Tversky (1979) für Prospect Theory
#   - Becker (1965) für Household Production
#   - Cunha & Heckman (2007) für Skill Formation Technology
#
# Das Paper etabliert das THEORETISCHE GERÜST für Parameterschätzung.
# Die hier genannten numerischen Werte (δ_S ≈ 0.15, δ_K ≈ 0.035) sind
# INFORMED PRIORS aus verwandter Literatur (Ego Depletion, Habit Formation),
# NICHT direkte Schätzungen aus diesem Paper.
#
# Für EBF: Diese Priors werden via LLMMC verwendet und durch empirische
# Daten aus Interventionsstudien (Perry, Jamaica, ABC, China REACH)
# bayesianisch aktualisiert.
# =============================================================================

virtue_ethics_parameters:

  - id: PAR-VE-001
    symbol: "θ"
    name: "Trait Parameter"
    description: "Stable behavioral dispositions that produce measured behavior"

    values:
      definition: "θ in Measured Behavior equation B = f(θ, e, h)"
      key_insight: "Traits are ACTIONS (produced behaviors), not fixed endowments"
      evolution: "θ_{t+1} = g(θ_t, e_t, h_t) - traits evolve through effort and situations"
      source: "PAP-heckman2023virtue"

    applicable_domains: ["PSYCHOLOGY", "EDUCATION", "INTERVENTION", "POLICY"]
    last_updated: "2026-02-05"
    source_paper: "PAP-heckman2023virtue"
    theory_id: "MS-VE-001"
    key_insight: "Personality is MALLEABLE - traits can be shaped by investment and own effort"

  - id: PAR-VE-002
    symbol: "ψ"
    name: "Preference Parameter"
    description: "What the person values (very stable valuation weights)"

    values:
      definition: "ψ in Utility function U(a, ψ, θ, h)"
      stability: "Very stable - more stable than traits"
      distinction: "Preferences (what you value) ≠ Traits (how you typically behave)"
      source: "PAP-heckman2023virtue"

    applicable_domains: ["ECONOMICS", "PSYCHOLOGY", "POLICY"]
    last_updated: "2026-02-05"
    source_paper: "PAP-heckman2023virtue"
    theory_id: "MS-VE-001"
    key_insight: "Distinguish preferences from traits operationally through stake/situation variation"

  - id: PAR-VE-003
    symbol: "e"
    name: "Effort Parameter"
    description: "Exertion to meet situational demands"

    values:
      definition: "e in Measured Behavior equation B = f(θ, e, h)"
      optimization: "e* = argmax[V(B) - c(e)] where V(B)=value, c(e)=effort cost"
      stakes_effect: "High stakes → High effort → Behavior may not reflect true traits"
      source: "PAP-heckman2023virtue"

    applicable_domains: ["PSYCHOLOGY", "EDUCATION", "LABOR"]
    last_updated: "2026-02-05"
    source_paper: "PAP-heckman2023virtue"
    theory_id: "MS-VE-001"
    key_insight: "Effort mediates trait-behavior relationship; high stakes distort trait measurement"

  - id: PAR-VE-004
    symbol: "S_t"
    name: "Self-Control Stock"
    description: "Depletable resource for resisting temptation"

    values:
      dynamics: "S_{t+1} = (1-δ_S)S_t + ι(rest_t) + investment_t"
      depreciation_rate:
        δ_S: {mean: 0.15, range: [0.10, 0.20], unit: "per period"}
        note: "⚠️ INFORMED PRIOR from Ego Depletion literature (Baumeister et al.), NOT direct estimate from this paper"
        prior_sources: ["baumeister1998ego", "baumeister2007strength", "hagger2010ego"]
      constraint: "a* = argmax U(a) s.t. S_t ≥ c(a, a_temptation)"
      recovery: "ι() = restoration function from rest"
      source: "PAP-heckman2023virtue"
      estimation_status: "FRAMEWORK ONLY - paper provides structure, not point estimates"

    applicable_domains: ["PSYCHOLOGY", "HEALTH", "ADDICTION", "EDUCATION"]
    last_updated: "2026-02-05"
    source_paper: "PAP-heckman2023virtue"
    theory_id: "MS-VE-002"
    key_insight: "Self-control is like a muscle - fatigues with use, recovers with rest, grows with training"

  - id: PAR-VE-005
    symbol: "K_t"
    name: "Habituation Stock"
    description: "Accumulated practice that makes virtuous action easier"

    values:
      dynamics: "K_{t+1} = (1-δ_K)K_t + h(a_t)"
      depreciation_rate:
        δ_K: {mean: 0.035, range: [0.02, 0.05], unit: "per period"}
        note: "⚠️ INFORMED PRIOR from Habit Formation literature, NOT direct estimate from this paper"
        prior_sources: ["duckworth2007grit", "neal2006habits", "wood2016psychology"]
      effect_on_cost: "Cost(virtuous action) = c(a)/(1 + K_t)"
      implication: "Higher K_t → lower cost → more likely to act virtuously"
      source: "PAP-heckman2023virtue"
      estimation_status: "FRAMEWORK ONLY - paper provides structure, not point estimates"

    applicable_domains: ["PSYCHOLOGY", "EDUCATION", "HEALTH", "CHARACTER"]
    last_updated: "2026-02-05"
    source_paper: "PAP-heckman2023virtue"
    theory_id: "MS-VE-003"
    key_insight: "Character formation = converting effortful virtue into habitual virtue (Aristotle)"

  - id: PAR-VE-006
    symbol: "σ*"
    name: "Ideal Point (Golden Mean)"
    description: "Optimal trait level between excess and deficiency"

    values:
      definition: "σ* = argmax U(σ) where U(θ) = -|θ - σ*|"
      aristotelian_origin: "Virtue as mean between extremes (Nicomachean Ethics)"
      examples:
        courage: {deficiency: "cowardice", mean: "courage", excess: "recklessness"}
        generosity: {deficiency: "stinginess", mean: "generosity", excess: "prodigality"}
        temperance: {deficiency: "insensibility", mean: "temperance", excess: "self-indulgence"}
      source: "PAP-heckman2023virtue"

    applicable_domains: ["ETHICS", "PSYCHOLOGY", "EDUCATION", "PHILOSOPHY"]
    last_updated: "2026-02-05"
    source_paper: "PAP-heckman2023virtue"
    theory_id: "MS-VE-001"
    key_insight: "Virtue is moderation - the optimal trait level is interior, not extreme"

