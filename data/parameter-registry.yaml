- id: PAR-VE-003
  symbol: e
  name: Effort Parameter
  description: Exertion to meet situational demands
  values:
    definition: e in Measured Behavior equation B = f(θ, e, h)
    optimization: e* = argmax[V(B) - c(e)] where V(B)=value, c(e)=effort cost
    stakes_effect: High stakes → High effort → Behavior may not reflect true traits
    source: PAP-heckman2023virtue
  applicable_domains:
