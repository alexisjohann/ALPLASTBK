- id: PAR-SF-021
  symbol: k_dreyfus
  name: Dreyfus-Level Skalierungsfaktor
  description: Geometric scaling factor for time between Dreyfus expertise levels
  values:
    k: 3.0
    confidence_interval:
    - 2.5
    - 4.0
    unit: dimensionless ratio
    formula: T(ℓ) = T_0 × k^(ℓ-1)
    example: If T_0=100h for Novice→Adv.Beginner, then Adv.Beginner→Competent ≈ 300h, Competent→Proficient ≈ 900h, Proficient→Expert
      ≈ 2700h
  evidence:
    tier: 1
    sources:
    - 'Ericsson (1993): ~10,000 hours for expert level; non-linear power law'
    - 'Dreyfus & Dreyfus (1986): Qualitative jumps between expertise levels'
    note: 'k ≈ 3 yields: 100 + 300 + 900 + 2700 ≈ 4000h for Novice→Expert (base). With T_0 ≈ 250h: sum ≈ 10,000h matching
      Ericsson'
  applicable_domains:
