- concept_id: CON-2026-006
  name: Natural Trajectory Model (NTM)
  description: Formalisierung der autonomen Verhaltensdynamik ohne Intervention über
    4 Zeithorizonte
  triggers:
  - 'T1: Neue Terminologie (Natural Trajectory, Do-Nothing Baseline)'
  - 'T2: Neuer Mechanismus (4-Horizon Dynamics: Instant/Short/Medium/Long)'
  - 'T4: Neue Formeln (NTM Evolution Equation, Decay Rates, Context Drift)'
  proposed_location: Chapter 16 Section 3.4, Appendix PBB Section NTM
  evidence:
    pro:
    - paper: PAP-kahneman1979prospectprospect
      finding: Temporal discounting und present bias dokumentiert
      strength: high
    - paper: thaler1981
      finding: Hyperbolic discounting zeigt natürlichen Awareness-Decay
      strength: high
    - paper: soman2020successfully
      finding: Pilot-to-scale decay 0.3-0.5 bestätigt Effektgrößen-Verfall
      strength: medium
    - paper: ajzen1991
      finding: 'Theory of Planned Behavior: Intent-Action Gap widening over time'
      strength: high
    contra:
    - paper: null
      note: Spezifische Decay-Raten sind kontextabhängig, keine universellen Konstanten
      threat_level: medium
      mitigation: NTM definiert Decay-Funktionen parametrisch (λ, μ, δ) nicht als
        fixe Werte
    summary:
      pro_count: 4
      contra_count: 0
      confidence: high
  decision: integrate
  decision_rationale: Starke theoretische Basis aus Behavioral Economics (Kahneman,
    Thaler, Ajzen). NTM synthetisiert bestehende Axiome (AWX-A58 Decay, AWX-A60 Habituation)
    in kohärentes Modell.
  integration:
    appendix: PBB (FORMAL-PROBABILITY)
    section: 'Section NTM: Natural Trajectory Model'
    chapters:
    - chapter: 16
      section: 'Section 3.4: Natural Trajectory'
    papers_added:
    - Existing papers already in bcm_master.bib (PAP-kahneman1979prospect, thaler1981, ajzen1991)
  session: '2026-01-19'
  notes: '4 Zeithorizonte: Instant (t=0), Short-term (weeks), Medium-term (months),
    Long-term (years). 2 Axiome (NTM-A1, NTM-A2), 2 Theoreme (NTM-T1, NTM-T2). Verbindet
    Ch16 mit Ch20 Portfolio Archetypes.'
- concept_id: CON-2026-007
  name: Unified NTM-Context Model (UNTCM)
  description: Kopplung von NTM-Decay und Context-Drift via gekoppeltem ODE-System
    mit bidirektionalem Feedback
  triggers:
  - 'T2: Neuer Mechanismus (Context-modulated decay rates λ(Ψ), μ(Ψ), δ(Ψ))'
  - 'T4: Neue Formeln (Gekoppeltes ODE-System, Stabilitätsanalyse, Tipping Points)'
  - 'T5: Neue Intervention Regel (Optimal Timing Rule)'
  proposed_location: Appendix UN Section UNTCM, Chapter 16 Extension
  evidence:
    pro:
    - paper: PAP-kahneman1979prospectprospect
      finding: Temporal discounting als Basis für Decay-Dynamik
      strength: high
    - paper: granovetter1978threshold
      finding: Tipping Point Dynamics für soziale Kaskaden
      strength: high
    - paper: PAP-north1990institutionsinstitutions
      finding: Institutional Change Dynamics für Ψ_I Dimension
      strength: high
    - paper: rogers2003diffusion
      finding: S-Curve Adoption für Regime II Lock-in
      strength: high
    - paper: cialdini2004social
      finding: Social Norm Feedback (κ_S Parameter)
      strength: high
    - paper: boyd1985culture
      finding: Cultural Evolution für Ψ_C Dynamics
      strength: medium
    contra:
    - paper: null
      note: UNTCM ist theoretische Synthese, keine direkte empirische Claim
      threat_level: low
      mitigation: Modell integriert etablierte Theorien; Parameter sind kalibrierbar,
        nicht fixiert
    summary:
      pro_count: 6
      contra_count: 0
      confidence: high
  decision: integrate
  decision_rationale: Starke PRO-Evidenz (6 Papers, 5 high + 1 medium). UNTCM synthetisiert
    NTM-Decay (Kahneman, Laibson) mit Context-Drift (North, Rogers, Boyd) und Social
    Tipping (Granovetter, Cialdini). Keine CONTRA-Evidenz, da theoretische Synthese.
  integration:
    appendix: UN (FORMAL-UNTCM)
    section: 'Section UNTCM: Unified NTM-Context Model'
    chapters:
    - chapter: 16
      section: 'Section 3.4: Natural Trajectory (Extension)'
    - chapter: 20
      section: 'Section 4.4: Portfolio Archetypes (Connection via NTM-T8)'
    papers_added:
    - Existing papers in bcm_master.bib (all already present)
    new_elements:
    - 'NTM-A5: Context-Modulated Decay Functions'
    - 'NTM-T6: Coupled ODE System'
    - 'NTM-T7: Stability Analysis / Phase Diagram'
    - 'NTM-T8: Optimal Intervention Timing Rule'
  session: '2026-01-19'
  notes: 'UNTCM verbindet die bisher separaten NTM-Decay und Context-Drift Modelle.
    Drei Regime: Decay-Dominant, Feedback-Dominant (Lock-in), Oscillatory. Kritische
    Masse ~10-25% für Tipping. Optimal Timing Rule verbindet mit Portfolio Archetypes
    (Ch. 20).'
