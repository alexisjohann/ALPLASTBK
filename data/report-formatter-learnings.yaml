  - error: "Pandoc nicht installiert"
    fix: "apt-get install pandoc"
    learning_id: "RPT-L-008"

  - error: "LaTeX kann komplexe Tabellen nicht rendern"
    fix: "--engine weasyprint verwenden oder pip install weasyprint"
    learning_id: "RPT-L-012"

  - error: "Outputs an verschiedenen Stellen verstreut"
    fix: "Ohne -o Option verwenden → Default: workflows/format-report/outputs/"
    learning_id: "RPT-L-016"

  - error: "Workflow-Verzeichnisse fehlen"
    fix: "--verify --fix zum automatischen Reparieren"
    learning_id: "RPT-L-015"

  - error: "Falsche Adresse auf Back-Sheet"
    fix: "templates/fehradvice-back.latex aktualisieren (Binzmühlestrasse 170A)"
    learning_id: "RPT-L-014"

  - error: "Learnings vergessen zu dokumentieren"
    fix: "--add-learning für interaktives Hinzufügen"
    learning_id: "RPT-L-017"

  - error: "PDFs nicht auf GitHub obwohl 'gepusht'"
    fix: "git check-ignore prüfen, dann git add -f, dann git ls-tree verifizieren"
    learning_id: "RPT-L-018"

  - error: "Logo in Template ist eine komplette Folie statt isoliertes Logo"
    fix: "assets/logo/color/fehradvice-logo-2lines.png verwenden (korrekt extrahiert)"
    learning_id: "RPT-L-019"

