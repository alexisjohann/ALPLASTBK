  - error: "Missing number, treated as zero"
    fix: "HTML-Output verwenden: -f html"
    learning_id: "RPT-L-003"

  - error: "Unicode character (emoji) not set up"
    fix: "Script konvertiert automatisch (bereits behoben)"
    learning_id: "RPT-L-004"

  - error: "Unicode character − (U+2212)"
    fix: "Script konvertiert automatisch (bereits behoben)"
    learning_id: "RPT-L-005"

  - error: "font cannot be found"
    fix: "apt-get install fonts-open-sans fonts-roboto && fc-cache -fv"
