paper_key: "herrmann2008antisocial"
source: "fulltext_ground_truth"

S1_research_question:
  value: "Does antisocial punishment (sanctioning of high contributors) exist across societies, and does it undermine cooperation? What societal factors predict antisocial punishment?"
  confidence: HIGH
  page_reference: "Abstract, Introduction"

S2_methodology:
  value: "Public goods game with punishment opportunity"
  details: "10-period repeated public goods game with stranger design. 4 players per group, 20 token endowment, MPCR=0.4. Punishment technology: 1 token cost to punisher → 3 tokens cost to target. Maximum 10 punishment points per target."
  study_type: "laboratory_experiment"
  design: "between-subjects (across societies), within-subjects (repeated game)"
  software: "z-Tree"
  confidence: HIGH
  page_reference: "The Experiment section, Design subsection"

S3_sample:
  N: 1120
  population: "Undergraduate students"
  countries: ["USA", "Germany", "Denmark", "Switzerland", "UK", "Australia", "China", "South Korea", "Ukraine", "Russia", "Saudi Arabia", "Belarus", "Oman", "Turkey", "Greece"]
  societies: 16
  cities: ["Boston", "Bonn", "Copenhagen", "St. Gallen", "Nottingham", "Zurich", "Melbourne", "Chengdu", "Seoul", "Dnipropetrovsk", "Samara", "Riyadh", "Minsk", "Muscat", "Istanbul", "Athens"]
  sessions: 70
  confidence: HIGH
  page_reference: "The Experiment section, lines 26-27"

S4_findings:
  main_result: "Antisocial punishment exists in virtually all societies but varies enormously across cultures. In some societies (Athens, Muscat, Samara), antisocial punishment was strong enough to remove or reverse the cooperation-enhancing effect of punishment."
  parameters:
    - symbol: "antisocial_punishment_rate"
      value_range: "0.08 - 0.65 (normalized)"
      context: "Cross-societal variation"
      source_section: "Results, Finding 1"
    - symbol: "r_NCC_antisocial"
      value: -0.75
      p_value: "< 0.001"
      context: "Correlation between Norms of Civic Cooperation and antisocial punishment"
      source_section: "Results, Finding 3"
    - symbol: "r_ROL_antisocial"
      value: -0.70
      p_value: "< 0.001"
      context: "Correlation between Rule of Law and antisocial punishment"
      source_section: "Results, Finding 3"
    - symbol: "R_squared_NCC_ROL"
      value: 0.65
      context: "NCC and ROL jointly explain 65% of cross-societal variance in antisocial punishment"
      source_section: "Results, Table S6 reference"
    - symbol: "beta_NCC"
      value: -0.89
      p_value: "< 0.01"
      context: "Regression coefficient for Norms of Civic Cooperation"
      source_section: "Results, Regression Table S6"
    - symbol: "beta_ROL"
      value: -0.73
      p_value: "< 0.01"
      context: "Regression coefficient for Rule of Law"
      source_section: "Results, Regression Table S6"
    - symbol: "contribution_effect_antisocial"
      value: -2.1
      units: "tokens"
      context: "1-unit increase in antisocial punishment reduces average contributions by 2.1 tokens"
      p_value: "< 0.01"
      source_section: "Results, Finding 2"
  key_findings:
    - "Low antisocial punishment societies: Boston, Melbourne, Nottingham, Copenhagen, Bonn, St. Gallen, Zurich"
    - "High antisocial punishment societies: Athens, Muscat, Riyadh, Istanbul, Samara, Minsk, Dnipropetrovsk"
    - "Antisocial punishment undermines cooperation-enhancing effect of punishment"
    - "Weak civic cooperation norms and weak rule of law predict higher antisocial punishment"
  confidence: HIGH

S5_validity:
  internal: HIGH
  reasoning: "Experimental control with standardized protocol across all sites, random assignment, z-Tree software ensures identical implementation"
  external: MEDIUM
  reasoning: "University students may not be fully representative; laboratory setting may differ from real-world punishment; cross-sectional design limits causal inference"
  replication_status: "widely_cited_foundational_study"
  limitations:
    - "University students may not be representative"
    - "Laboratory setting may differ from real-world punishment"
    - "Cross-sectional design limits causal inference"
  confidence: HIGH
  page_reference: "Discussion, Limitations subsection"

S6_reproducibility:
  data_available: true
  note: "Published in Science with Supporting Online Material"
  code_available: false
  experimental_protocol: "Detailed in Methods and Supporting Online Material"
  software: "z-Tree"
  instructions: "Translated into local languages using back-translation method"
  payments: "Calibrated to local purchasing power (approximately 2 hours' work at local wages)"
  confidence: HIGH
  page_reference: "Methods section"

measurement_contexts:
  - parameter: "antisocial_punishment"
    study_location: "16 cities across 15 countries"
    psi_conditions:
      Psi_I: "laboratory_experiment_with_punishment_technology"
      Psi_S: "stranger_design_anonymous_interaction"
      Psi_K: "varies_by_society_NCC_ROL"
      Psi_C: "undergraduate_students"
    measurement_method: "Punishment points assigned to higher contributors"
    confidence: HIGH
  - parameter: "contribution_level"
    value_range: "7.9 - 14.8 tokens (mean by society)"
    psi_conditions:
      Psi_I: "MPCR=0.4_20_token_endowment"
      Psi_S: "4_person_groups_stranger_design"
      Psi_K: "varies_by_society"
    measurement_method: "Tokens contributed to public good"
    confidence: HIGH
  - parameter: "Norms_of_Civic_Cooperation"
    source: "World Values Survey"
    measurement: "Questions on justifiability of tax evasion, benefit fraud, bribery, fare-dodging"
    psi_conditions:
      Psi_K: "country_level_cultural_norms"
    confidence: HIGH
  - parameter: "Rule_of_Law"
    source: "World Bank governance indicator"
    measurement: "Confidence in rules, contract enforcement, property rights, police, courts"
    psi_conditions:
      Psi_K: "country_level_institutional_quality"
    confidence: HIGH

