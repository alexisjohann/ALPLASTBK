S4_findings:
  main_result: "Morality and politico-economic outcomes influence each other in rich bidirectional ways. Three contexts where economic incentives shape morality: (1) kinship relations, (2) market exposure, (3) ecology. Morality (especially universalism-particularism) strongly predicts voting and policy preferences."
  key_insights:
    - "Tight kinship networks → particularist morality"
    - "Market exposure → universalist morality"
    - "Universalism explains voting patterns better than economic variables"
    - "Three fairness types identified: Egalitarians, Meritocrats, Libertarians"
  cited_findings_from_other_papers:
    - paper: "Enke (2019)"
      finding: "Tighter kin networks associated with less universalist values"
    - paper: "Enke (2023)"
      finding: "Market salience predicts universalist morality in ~1,000 pre-industrial groups"
    - paper: "Enke et al. (2024)"
      finding: "Universalism has much larger explanatory power for vote shares than economic variables"
    - paper: "Cappelen et al. (2022)"
      finding: "In 60 countries, universalism strongly predicts left-wing policy views"
  confidence: HIGH
