paper_key: "kahneman2000experienced"
source: "fulltext_ground_truth"

S1_research_question:
  value: "Can experienced utility (Bentham's hedonic conception of pleasure and pain) be usefully measured through moment-based methods, and can a conception of 'objective happiness' be derived from temporal distributions of moment-utility that is distinct from both decision utility and remembered utility?"
  confidence: HIGH
  page_reference: "Abstract, Section 1 (Introduction)"

S2_methodology:
  value: "Theoretical framework with empirical illustrations from colonoscopy studies and psychophysical experiments"
  details: "The chapter develops a conceptual framework distinguishing four types of utility (decision, predicted, total/experienced, remembered) and proposes moment-based measurement as the gold standard for experienced utility. Empirical evidence is drawn from: (1) colonoscopy pain studies where patients report pain intensity every 60 seconds on 0-10 scale, (2) a clinical experiment (N=682) with extended vs. standard colonoscopy procedures, (3) a sound experiment comparing 10s at 78db vs. 10s at 78db + 4s at 66db, and (4) physiological validation via prefrontal asymmetry (Davidson, 1998). Formal axioms for temporal integration are presented (Kahneman, Wakker & Sarin, 1997)."
  study_type: "theoretical_framework_with_empirical_illustrations"
  design: "conceptual_analysis_with_supporting_experiments"
  confidence: HIGH
  page_reference: "Sections 1-7, Appendix"

S3_sample:
  N: 682
  population: "Colonoscopy patients (clinical experiment); additional subjects from earlier colonoscopy studies and psychophysical experiments"
  note: "N=682 refers to the main clinical experiment. Other supporting studies cited but sample sizes not all specified in this chapter."
  confidence: HIGH
  page_reference: "Section 3.4"

S4_findings:
  main_result: "Experienced utility (moment-based) diverges systematically from remembered utility and decision utility due to duration neglect and the Peak/End rule. Objective happiness -- defined as the temporal integral of moment-utility -- is feasible to measure, meets key validity criteria (inclusiveness, ordinal measurement, neutral point, interpersonal comparability), and resolves ambiguities in treadmill effects that memory-based and satisfaction-based approaches cannot."
  parameters:
    - symbol: "r_duration_evaluation"
      value: 0.03
      context: "Correlation between duration of colonoscopy procedure and subsequent retrospective evaluation of the experience"
      source_section: "Section 3.2 (Duration Neglect)"
    - symbol: "r_peak_end_prediction"
      value: 0.67
      context: "Correlation between Peak/End average ((Peak Pain + End Pain)/2) and actual retrospective evaluation of colonoscopy experience"
      source_section: "Section 3.3 (Peak/End Rule)"
    - symbol: "r_observer_patient"
      value: 0.70
      context: "Correlation between observer ratings of colonoscopy patients' pain and patients' own evaluations, demonstrating interpersonal comparability of moment-utility scales"
      source_section: "Section 5.3 (Interpersonal Comparability)"
    - symbol: "affect_dimensions"
      value: 2
      context: "Two-dimensional structure of affective space: valence (good-bad) and arousal (high-low), based on Russell (1980) circumplex model"
      source_section: "Section 5.2 (The Affect Grid)"
    - symbol: "colonoscopy_duration_range"
      value: "4-69 minutes"
      context: "Range of colonoscopy durations across patients; despite this large variation, duration showed near-zero correlation with retrospective evaluation"
      source_section: "Section 3.2"
    - symbol: "pain_scale"
      value: "0-10"
      context: "Patients reported pain intensity every 60 seconds during colonoscopy on a 0-10 scale"
      source_section: "Section 3.1"
    - symbol: "N_clinical_experiment"
      value: 682
      context: "Sample size for clinical experiment testing extended vs. standard colonoscopy procedure"
      source_section: "Section 3.4"
    - symbol: "sound_experiment_A"
      value: "10s at 78db"
      context: "Sound option A: 10 seconds of unpleasant sound at 78 decibels"
      source_section: "Section 3.4"
    - symbol: "sound_experiment_B"
      value: "10s at 78db + 4s at 66db"
      context: "Sound option B: 10 seconds at 78db followed by 4 seconds at 66db (less unpleasant); most subjects chose to repeat B despite it being objectively longer and containing all of A -- a dominance violation"
      source_section: "Section 3.4"
    - symbol: "japan_income_happiness"
      value: "5x real income, no happiness increase"
      context: "Japan 1958-1987: real income multiplied by 5 with no increase in reported happiness, illustrating treadmill effects"
      source_section: "Section 6.1"
  key_findings:
    - "Duration neglect: Duration of painful experience shows near-zero correlation (r=0.03) with retrospective evaluation"
    - "Peak/End rule: Retrospective evaluation is well predicted (r=0.67) by average of peak intensity and end intensity"
    - "Dominance violations: Adding a less painful period to the end of a painful experience improves retrospective evaluation, even though total pain increases"
    - "Clinical experiment (N=682): Extended colonoscopy procedure (colonoscope left in place ~1 minute after exam) produced significantly more favorable retrospective evaluations than standard procedure"
    - "Four distinct utility concepts identified: decision utility, predicted utility, total (experienced) utility, and remembered utility"
    - "Moment-based measurement satisfies four key criteria: inclusiveness, ordinal measurement across situations, distinctive neutral point, and interpersonal comparability"
    - "Interpersonal comparability demonstrated: observer-patient correlation r=0.70 for pain ratings"
    - "Hedonic treadmill vs. satisfaction treadmill distinction: these produce identical satisfaction reports but different moment-utility profiles; only moment-based measurement can distinguish them"
    - "Physiological validation: prefrontal asymmetry (left=positive, right=negative affect) correlates with self-report measures across individuals"
    - "Formal theorem: Under three axioms (concatenation invariance, monotonicity, substitutability), global utility equals temporal integral of transformed moment-utility: G(U) = integral of v(u(t))dt"
  confidence: HIGH

S5_validity:
  internal: HIGH
  reasoning: "The colonoscopy studies use within-subject designs with real-time measurement every 60 seconds, providing high-quality temporal data. The clinical experiment (N=682) uses random assignment. The formal axioms are mathematically rigorous (Kahneman, Wakker & Sarin, 1997). The sound experiment provides clean dominance violation evidence."
  external: MEDIUM
  reasoning: "Medical pain setting may not generalize to all affective experiences. The framework is conceptual and its full empirical validation across diverse life domains remained incomplete at time of publication. The chapter acknowledges that objective happiness is only one constituent of well-being. Cross-cultural generalizability of moment-utility scales not established in this work."
  replication_status: "foundational_framework_widely_cited"
  limitations:
    - "Medical pain context may not generalize to positive experiences or mixed emotional states"
    - "Time neutrality assumption (all moments weighted equally) is normative, not empirically established as the 'correct' weighting"
    - "Separability assumption (order of moments does not affect total utility) may not hold for narrative-dependent experiences"
    - "Objective happiness captures only hedonic well-being; excludes eudaimonic well-being, meaning, and purpose"
    - "Real-time measurement may itself alter the experience being measured (reactivity)"
    - "The treadmill distinction, while theoretically important, was not empirically resolved in this chapter"
    - "Physiological validation (prefrontal asymmetry) cited from Davidson (1998) was still preliminary at time of writing"
  confidence: HIGH
  page_reference: "Sections 5, 6, 7"

S6_reproducibility:
  data_available: false
  note: "Chapter in edited volume; references underlying colonoscopy data from Redelmeier & Kahneman studies. Clinical experiment data (N=682) referenced but not directly published with this chapter."
  code_available: false
  experimental_protocol: "Colonoscopy pain measurement: patients report pain intensity every 60 seconds on 0-10 scale during procedure. Clinical experiment: random assignment to standard vs. extended (extra ~1 minute) procedure."
  confidence: MEDIUM
  page_reference: "Sections 3.1, 3.4"

