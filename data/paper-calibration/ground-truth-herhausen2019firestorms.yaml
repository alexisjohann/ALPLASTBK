paper_key: "herhausen2019firestorms"
source: "fulltext_ground_truth"

S1_research_question:
  value: "How can firms detect, prevent, and mitigate online firestorms in brand communities? What drivers of negative eWOM predict virality? How should firms tailor their responses to reduce virality?"
  confidence: HIGH
  page_reference: "Abstract, Introduction"

S2_methodology:
  value: "Text mining and econometric analysis of social media data"
  details: "Collected Facebook posts using API from S&P 500 firm brand communities (2011-2016). Text mining using LIWC dictionaries for emotions. Regression analysis with virality (likes + comments) as dependent variable. Tested detection factors (arousal, ties, LSM), prevention strategies (empathy, explanation), and mitigation strategies (temporal response patterns)."
  study_type: "observational_field_data"
  data_collection: "Facebook API"
  text_analysis: "LIWC (Linguistic Inquiry and Word Count) dictionaries"
  statistical_method: "Regression analysis with fixed effects"
  confidence: HIGH
  page_reference: "Methods section"

S3_sample:
  N: 472995
  unit: "negative customer posts in English"
  brand_communities: 89
  firms: "S&P 500 firms with Facebook brand communities"
  time_period: "October 1, 2011 to January 31, 2016"
  geographic_scope: ["USA"]
  platform: "Facebook"
  sample_characteristics:
    average_post_length: 99
    std_dev_length: 121.44
    range_length: "3-8,121 words"
    average_likes_comments: 2.95
    std_dev_likes_comments: 59.22
    range_likes_comments: "1-37,760"
    percent_resolved_24h: 78
    percent_firm_response_1h: 93
  subsample_for_mitigation: 15762
  subsample_criteria: "above-average virality AND multiple firm responses"
  confidence: HIGH
  page_reference: "Methods, Sampling Frame"

S4_findings:
  main_result: "High-arousal emotions, strong structural ties, and close linguistic style matching predict higher virality. For prevention: explanation is more effective than empathy for high-arousal negative eWOM. For mitigation: varying response strategies over time reduces virality more than repeating the same strategy."
  parameters:
    - symbol: "beta_arousal_high"
      value: 0.186
      std_error: "not_in_text"
      effect_size_r: 0.07
      p_value: "< 0.01"
      context: "Intensity of high-arousal emotion words on virality"
      source_section: "Table 2"
      confidence: HIGH
    - symbol: "beta_arousal_low"
      value: 0.026
      effect_size_r: 0.01
      p_value: "< 0.01"
      context: "Intensity of low-arousal emotion words on virality"
      source_section: "Table 2"
      confidence: HIGH
    - symbol: "beta_tie_strength"
      value: 1.432
      effect_size_r: 0.13
      p_value: "< 0.01"
      context: "Strength of structural ties - LARGEST effect on virality"
      interpretation: "Well-connected complainers are most dangerous"
      source_section: "Table 2"
      confidence: HIGH
    - symbol: "beta_LSM"
      value: 0.025
      effect_size_r: 0.04
      p_value: "< 0.01"
      context: "Linguistic Style Matching between sender and community"
      source_section: "Table 2"
      confidence: HIGH
    - symbol: "beta_empathy"
      value: -0.069
      p_value: "< 0.01"
      context: "Direct effect of empathy in firm response"
      source_section: "Table 3"
      confidence: HIGH
    - symbol: "beta_explanation"
      value: -0.011
      p_value: "< 0.01"
      context: "Direct effect of explanation in firm response"
      source_section: "Table 3"
      confidence: HIGH
    - symbol: "beta_compensation"
      value: 0.003
      p_value: "< 0.01"
      context: "Direct effect of compensation - BACKFIRES early"
      note: "Early compensation increases virality; late compensation reduces it"
      source_section: "Table 3"
      confidence: HIGH
    - symbol: "gamma_high_arousal_empathy"
      value: 2.678
      p_value: "< 0.001"
      context: "Interaction: High arousal × Empathy → INCREASES virality"
      interpretation: "Empathy backfires for high-arousal crises"
      source_section: "Table 3, Interaction Effects"
      confidence: HIGH
    - symbol: "gamma_high_arousal_explanation"
      value: -1.437
      p_value: "< 0.001"
      context: "Interaction: High arousal × Explanation → DECREASES virality"
      interpretation: "Explanation is effective for high-arousal crises"
      source_section: "Table 3, Interaction Effects"
      confidence: HIGH
    - symbol: "beta_compensation_early"
      value: 0.017
      p_value: "NS"
      context: "First response compensation effect"
      source_section: "Table 4"
      confidence: HIGH
    - symbol: "beta_compensation_late"
      value: -0.045
      p_value: "< 0.001"
      context: "Subsequent response compensation effect - GOOD when late"
      source_section: "Table 4"
      confidence: HIGH
    - symbol: "beta_apology_early"
      value: 0.012
      p_value: "< 0.01"
      context: "First response apology"
      source_section: "Table 4"
      confidence: HIGH
    - symbol: "beta_apology_late"
      value: 0.031
      p_value: "< 0.001"
      context: "Subsequent response apology - BACKFIRES when late"
      source_section: "Table 4"
      confidence: HIGH
    - symbol: "beta_variance_empathy"
      value: -0.185
      p_value: "< 0.05"
      context: "Varying empathy intensity across responses reduces virality"
      source_section: "Table 4"
      confidence: HIGH
    - symbol: "beta_variance_explanation"
      value: -0.205
      p_value: "< 0.01"
      context: "Varying explanation intensity across responses reduces virality"
      source_section: "Table 4"
      confidence: HIGH
  hypothesis_results:
    - hypothesis: "H1"
      statement: "High-arousal > Low-arousal for virality"
      result: "SUPPORTED"
      test_statistic: "t = 35.15"
      p_value: "< 0.01"
    - hypothesis: "H2"
      statement: "Strong ties → greater virality"
      result: "SUPPORTED"
      test_statistic: "t ≥ 77.97"
      p_value: "< 0.01"
    - hypothesis: "H3"
      statement: "Closer LSM → greater virality"
      result: "SUPPORTED"
    - hypothesis: "H4"
      statement: "For high arousal: Explanation > Empathy"
      result: "SUPPORTED"
    - hypothesis: "H5"
      statement: "For low arousal: Empathy > Explanation"
      result: "NOT SUPPORTED"
    - hypothesis: "H6a"
      statement: "Variance in empathy reduces virality"
      result: "SUPPORTED"
    - hypothesis: "H6b"
      statement: "Variance in explanation reduces virality"
      result: "SUPPORTED"
  counterintuitive_findings:
    - "Explanation is MORE effective than empathy for high-arousal crises (against conventional wisdom)"
    - "Early compensation BACKFIRES (β=+0.098***), late compensation helps (β=-0.058***)"
    - "Structural ties (β=1.432***) have MUCH larger effect than emotional content (β=0.186***)"
    - "Late apology is worse than no apology - it backfires"
  confidence: HIGH

S5_validity:
  internal: MEDIUM_TO_HIGH
  reasoning: "Large sample size, fixed effects control for brand-level heterogeneity, robust to multiple specifications. However, observational data limits causal claims."
  threats: "Endogeneity concerns: firms may respond to unobserved post characteristics; selection bias in which posts receive responses"
  external: MEDIUM_TO_HIGH
  reasoning: "Data from 89 major U.S. brand communities over 5 years provides broad coverage. Results should generalize to similar social media contexts."
  limitations:
    - "Limited to Facebook brand communities of large U.S. firms (S&P 500)"
    - "Observational data - causality cannot be definitively established"
    - "Text mining may miss nuanced emotional content"
    - "Does not capture offline customer service interactions"
  replication_status: "recent_high_impact"
  confidence: HIGH
  page_reference: "Discussion section (implicit)"

S6_reproducibility:
  data_available: false
  note: "Facebook API data; proprietary brand community data"
  data_access: "restricted"
  code_available: false
  text_mining_dictionaries: "LIWC (publicly available) + custom 'disgust' dictionary"
  statistical_models: "fully_specified_in_tables"
  formulas_provided:
    - "SST_ic = Σ(Received Likes + Received Comments + Received Shares + Likes Given + Comments Given)"
    - "LSM_jic = 1 - |FW_ji - FW_jic| / (FW_ji + FW_jic + 0.0001)"
  reproducibility_assessment: "Methodology fully described; replication requires similar Facebook API access"
  confidence: HIGH
  page_reference: "Methods, Key Measures"

measurement_contexts:
  - parameter: "virality"
    measurement: "Combined sum of likes and comments (log-transformed)"
    N: 472995
    psi_conditions:
      Psi_I: "Facebook_brand_community"
      Psi_S: "public_online_community_members"
      Psi_K: "USA_S&P_500_firms"
      Psi_T: "2011-2016"
      Psi_M: "Facebook_platform"
    confidence: HIGH
  - parameter: "high_arousal_emotions"
    measurement: "LIWC dictionaries: anx (fear/anxiety), anger, disgust"
    psi_conditions:
      Psi_C: "negative_eWOM_posts"
      Psi_M: "text_mining_automated"
    confidence: HIGH
  - parameter: "low_arousal_emotions"
    measurement: "LIWC dictionary: sad (sadness)"
    psi_conditions:
      Psi_C: "negative_eWOM_posts"
      Psi_M: "text_mining_automated"
    confidence: HIGH
  - parameter: "firm_response_empathy"
    measurement: "LIWC positive emotion words in firm response"
    psi_conditions:
      Psi_I: "official_brand_response"
      Psi_T: "93_percent_within_1_hour"
    confidence: HIGH
  - parameter: "firm_response_explanation"
    measurement: "LIWC causation words in firm response"
    psi_conditions:
      Psi_I: "official_brand_response"
    confidence: HIGH
  - parameter: "structural_tie_strength"
    measurement: "SST_ic = sum of interactions (likes, comments, shares given and received)"
    psi_conditions:
      Psi_S: "brand_community_interaction_history"
      Psi_M: "Facebook_API_data"
    confidence: HIGH
  - parameter: "linguistic_style_match"
    measurement: "LSM formula based on function word similarity"
    psi_conditions:
      Psi_C: "sender_vs_community_language_style"
      Psi_M: "text_mining_function_words"
    confidence: HIGH

content_level: "L3"
integration_level: "I5"
evidence_tier: 1
journal: "Journal of Marketing"
publisher: "American Marketing Association"
