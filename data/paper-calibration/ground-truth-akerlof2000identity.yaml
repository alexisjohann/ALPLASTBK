paper_key: "akerlof2000identity"
source: "fulltext_ground_truth"

S1_research_question:
  value: "How does identity - a person's sense of self, based on social categories and behavioral prescriptions - affect economic outcomes? The paper incorporates the psychology and sociology of identity into an economic model of behavior, showing how identity changes payoffs from own and others' actions, how identity choice affects behavior, and how social categories and prescriptions can be manipulated."
  confidence: HIGH
  page_reference: "Abstract, Section I Introduction"

S2_methodology:
  value: "Theoretical model with game-theoretic framework, supplemented by survey evidence and empirical data analysis"
  details: "The paper develops a general utility function incorporating identity (equations 1-2), constructs a prototype game-theoretic model (Green/Red categories), and applies it to three domains: (1) gender discrimination in the workplace, (2) poverty and social exclusion, (3) household division of labor. Empirical support includes a random-sample telephone survey vignette (N=70) and PSID data analysis (~29,000 couple-years) with Tobit estimation of housework shares as a fourth-order polynomial."
  study_type: "theoretical_with_empirical_support"
  formal_model: true
  game_theoretic: true
  applications: ["gender_workplace_discrimination", "poverty_social_exclusion", "household_division_of_labor"]
  confidence: HIGH
  page_reference: "Sections II-VI"

S3_sample:
  N: "multiple_components"
  components:
    - name: "telephone_survey_vignette"
      N: 70
      population: "Households randomly selected from Fremont, CA phonebook"
      demographics: "Half male, half female, 60% college graduates"
      source_section: "Section II.C, Table I"
    - name: "PSID_housework_analysis"
      N: 29000
      units: "couple-years"
      population: "Married couples from Panel Study of Income Dynamics, 1983-1992"
      inclusion_criteria: "Married, neither retired nor disabled, positive work hours/earnings/housework hours, complete data from both members"
      source_section: "Section VI, footnote 63"
  confidence: HIGH

S4_findings:
  main_result: "Identity - based on social categories, behavioral prescriptions, and self-image - substantively changes conclusions of previous economic analysis in three domains: gender discrimination in the workplace, economics of poverty and social exclusion, and household division of labor. The inclusion of identity explains behavior that standard economic models cannot account for."
  parameters:
    # Core utility function parameters
    - symbol: "I_s"
      name: "self_identity_loss"
      description: "Loss in utility from violating behavioral prescriptions for one's own social category"
      type: "theoretical_parameter"
      sign: "positive (represents a cost)"
      context: "Individual chooses action inconsistent with prescribed behavior for their social category"
      source_section: "Section III.A, prototype model"
    - symbol: "I_o"
      name: "other_identity_externality"
      description: "Loss in utility when another person violates behavioral prescriptions, affecting one's own identity"
      type: "theoretical_parameter"
      sign: "positive (represents a cost)"
      context: "Identity externality - others' actions affect one's self-image"
      source_section: "Section III.A, prototype model"
    - symbol: "V"
      name: "taste_utility"
      description: "Utility from engaging in the activity matching one's taste (Activity One or Two)"
      type: "theoretical_parameter"
      sign: "positive"
      context: "Standard economic motivation independent of identity"
      source_section: "Section III.A"
    - symbol: "c"
      name: "response_cost"
      description: "Cost incurred by Person One when responding to Person Two's identity-violating action"
      type: "theoretical_parameter"
      sign: "positive"
      context: "Cost of enforcing prescriptions / defending identity"
      source_section: "Section III.A"
    - symbol: "L"
      name: "response_loss"
      description: "Loss imposed on Person Two when Person One responds to identity violation"
      type: "theoretical_parameter"
      sign: "positive"
      context: "Punishment/sanction for violating prescriptions"
      source_section: "Section III.A"
    - symbol: "r"
      name: "social_exclusion_parameter"
      description: "Loss in Green identity from not being fully accepted by the dominant group in society"
      type: "theoretical_parameter"
      sign: "positive"
      context: "Poverty/exclusion model - degree to which community members are excluded from dominant culture"
      source_section: "Section V.B"
    - symbol: "a"
      name: "productivity_reduction_red"
      description: "Reduction in economic returns to Activity One for individuals with Red (oppositional) identity"
      type: "theoretical_parameter"
      range: "0 < a < 1"
      context: "Red individual i earns v_i - a from Activity One instead of v_i"
      source_section: "Section V.B"
    - symbol: "k"
      name: "pecuniary_externality"
      description: "Pecuniary externality imposed by Reds who choose Activity Two on those who choose Activity One"
      type: "theoretical_parameter"
      sign: "positive"
      context: "Crime, vandalism, drug dealing impose costs on community members pursuing mainstream activities"
      source_section: "Section V.B"
    - symbol: "I_s_G"
      name: "green_self_identity_loss"
      description: "Identity loss for a Green who engages in Activity Two (violating Green prescriptions)"
      type: "theoretical_parameter"
      context: "Poverty/exclusion model - cost of deviating from dominant culture norms"
      source_section: "Section V.B"
    - symbol: "I_s_R"
      name: "red_self_identity_loss"
      description: "Identity loss for a Red who engages in Activity One (violating Red prescriptions)"
      type: "theoretical_parameter"
      context: "Poverty/exclusion model - cost of conforming with dominant culture for oppositional identity"
      source_section: "Section V.B"
    - symbol: "I_o_G"
      name: "green_other_identity_externality"
      description: "Identity loss for a Green when encountering a Red (someone violating dominant prescriptions)"
      type: "theoretical_parameter"
      context: "Poverty/exclusion model - inter-identity externality"
      source_section: "Section V.B"
    - symbol: "I_o_R"
      name: "red_other_identity_externality"
      description: "Identity loss for a Red when encountering a Green (someone complying with dominant culture)"
      type: "theoretical_parameter"
