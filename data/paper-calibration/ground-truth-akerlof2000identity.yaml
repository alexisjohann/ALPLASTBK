    WHO: "Identity affects who has utility and how utility is defined across social categories"
    WHAT: "Identity adds non-pecuniary dimension to utility (I_j alongside standard consumption)"
    HOW: "Identity creates externalities (I_o) and complementarities between own and others' actions"
    WHEN: "Social categories and prescriptions are context-dependent ('situations' determine which identities are salient)"
    AWARE: "Identity motivations may be unconscious (paper is 'agnostic' about awareness, footnote 6)"
  theory_support:
    - "MS-IB-001: Identity Economics framework"
    - "MS-SP-001: Social preferences / externalities from others' actions"
  complementarity_gamma:
    description: "Identity creates interaction effects between social categories and economic actions - prescriptions make certain action combinations more/less valuable depending on social category assignment"
    gamma_sign: "positive for identity-confirming action combinations, negative for identity-violating combinations"
  parameter_context_transformation:
    description: "The paper's central insight aligns with EBF PCT: the same economic parameter (e.g., labor supply elasticity, housework share) takes different values depending on identity context (social categories, prescriptions, exclusion level r)"
