  key_findings:
    - "Identity utility function: U_j = U_j(a_j, a_{-j}, I_j) where I_j = I_j(a_j, a_{-j}; c_j, epsilon_j, P) depends on social categories C, category assignment c_j, individual characteristics epsilon_j, and prescriptions P"
    - "Four equilibrium outcomes in prototype model determined by relative magnitudes of I_s, I_o, V, c, and L"
    - "Gender workplace model: Women lose identity I_s from working in 'mans job'; male coworkers lose I_o, leading to harassment and productivity losses"
    - "84% of survey respondents endorsed masculinity threat as explanation for male-to-female workplace harassment"
    - "Poverty/exclusion model: Three equilibria exist - All-Green (r < I_o_R), Mixed (intermediate r), All-Red (high r + high I_o_G)"
    - "Social exclusion (r > 0) leads to oppositional identity adoption even without conformity externalities"
    - "Household division of labor shows gender asymmetry: husbands' housework share never exceeds 37% regardless of outside work share"
    - "The women's movement is modeled as decreasing I_s for women in mens jobs and I_o for men with female coworkers"
    - "Identity choice may be the most important economic decision people make"
    - "Third parties (advertisers, political leaders, professional schools) can manipulate social categories C and prescriptions P"
  confidence: HIGH

S5_validity:
  internal: MEDIUM
  reasoning: "The theoretical model is internally consistent with well-defined equilibria and comparative statics. The game-theoretic prototype model has clear predictions. However, the empirical evidence is limited: the survey uses a small convenience sample (N=70 from one California phonebook) and the PSID analysis, while larger, uses observational data subject to omitted variable concerns."
  external: MEDIUM
  reasoning: "The framework is broadly applicable across many domains (gender, poverty, household, education, politics), as argued theoretically. However, the empirical support is drawn primarily from the United States. The model parameters (I_s, I_o, r, etc.) are not directly estimated, making cross-cultural validation difficult. The paper acknowledges that social categories and prescriptions vary across societies and time."
  replication_status: "foundational_framework_paper"
  limitations:
    - "Survey sample is small (N=70) and geographically limited (Fremont, CA phonebook)"
    - "Identity parameters (I_s, I_o, r) are not directly estimated from data"
    - "PSID housework analysis is observational, not causal identification"
    - "Model assumes utility maximization with identity, but identity formation process is not fully specified"
    - "Prescriptions P and social categories C are taken as given in most applications"
    - "Welfare analysis is acknowledged as subject to interpersonal comparison caveats"
    - "Full model specifications available only 'upon request' (not in published paper)"
  confidence: HIGH
  page_reference: "Throughout, especially footnotes and Section VII"

S6_reproducibility:
  data_available: false
  note: "Survey data from Fremont, CA telephone survey not publicly deposited. PSID data is publicly available but specific variable construction and Tobit estimation details are described only partially (equations and confidence intervals available 'upon request'). Full model specification available from authors upon request."
  code_available: false
  experimental_protocol: "Survey vignette text is reproduced in full in Table I. PSID variable definitions described in footnote 63."
  confidence: MEDIUM
  page_reference: "Table I, footnotes 34, 57, 63"

formal_model:
  # General utility function (equation 1)
  - name: "identity_utility_function"
    equation: "U_j = U_j(a_j, a_{-j}, I_j)"
    description: "General utility function where utility depends on own actions, others' actions, and identity"
    variables:
      - "a_j: vector of j's actions"
      - "a_{-j}: vector of others' actions"
      - "I_j: identity or self-image of person j"
    source_section: "Section II.A, equation (1)"

  # Identity function (equation 2)
  - name: "identity_function"
    equation: "I_j = I_j(a_j, a_{-j}; c_j, epsilon_j, P)"
    description: "Identity depends on social category assignment, individual characteristics match with ideal, and correspondence of actions to prescriptions"
    variables:
      - "c_j: assignment of people to social categories C"
      - "epsilon_j: j's own given characteristics"
      - "P: prescriptions indicating behavior appropriate for each social category"
    source_section: "Section II.A, equation (2)"

  # Prototype model payoffs
  - name: "prototype_game_payoffs"
    description: "Two-player sequential game between Person One (taste for Activity One) and Person Two (taste for Activity Two)"
    parameters:
      - "V: utility from choosing activity matching taste"
      - "I_s: identity loss from choosing activity violating prescriptions"
      - "I_o: identity externality loss when other violates prescriptions"
      - "c: cost of responding to prescription violation"
      - "L: loss imposed on violator by response"
    equilibria:
      - condition: "c < I_o AND I_s + V > I_s + L (i.e., V > L)"
        outcome: "Person One deters Person Two from Activity Two"
        label: "deterrence"
      - condition: "c < I_o AND I_s + L > V (i.e., V < L)"
        outcome: "Person One responds but does not deter Person Two"
        label: "response_without_deterrence"
      - condition: "c > I_o AND I_s < V"
        outcome: "Person One does not respond; Person Two chooses Activity Two"
        label: "no_response"
      - condition: "I_s > V"
        outcome: "Person Two does not engage in Activity Two regardless"
        label: "self_restraint"
    source_section: "Section III.A-B"

  # Poverty/exclusion model
  - name: "poverty_exclusion_model"
    description: "Extended Green/Red model with identity choice, economic heterogeneity, and social exclusion"
    key_results:
      - name: "All-Green Equilibrium"
        condition: "r < I_o_R"
        interpretation: "Social exclusion low enough that everyone identifies with dominant culture"
      - name: "Mixed Equilibrium"
        condition: "intermediate r"
        interpretation: "Some adopt Green (mainstream) identity, others adopt Red (oppositional) identity"
      - name: "All-Red Equilibrium"
        condition: "high r AND high I_o_G"
        interpretation: "Everyone adopts oppositional identity; some still pursue Activity One"
    assumptions: "I_s_G > k; all parameters positive and less than unity; I_s_R + a + k < 1; v_i ~ Uniform(0,1)"
    source_section: "Section V.B-C, Figure II"

  # Household model
  - name: "household_identity_model"
    description: "Household bargaining model augmented with gender identity - husband loses identity from housework and from wife earning more than half"
    empirical_specification: "Tobit: hswk = a + sum_{i=1,2,3}[b1i*hi + b2i*hi^2 + b3i*hi^3 + b4i*hi^4] + error, where hi = husband's share of outside hours, groups by youngest child age"
    key_prediction: "Asymmetric division of labor: husbands' housework share bounded above (~37%) even when wife does all outside work"
    source_section: "Section VI"

