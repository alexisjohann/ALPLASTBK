paper_key: "becker1990empirical"
source: "fulltext_ground_truth"

S1_research_question:
  value: "Does cigarette consumption conform to a rational addiction model? Specifically: (1) Are past and future consumption complementary? (2) Do long-run price responses exceed short-run responses? (3) Do permanent price effects exceed temporary price effects?"
  confidence: HIGH
  page_reference: "Abstract, Introduction and Summary section"

S2_methodology:
  value: "Two-Stage Least Squares (2SLS) regression with state panel data"
  details: "State excise taxes used as instrumental variables for past and future consumption. Testing equation: C_t = θC_{t-1} + βθC_{t+1} + θ_0 + θ_1P_t. Past and future prices used as instruments."
  study_type: "econometric_analysis"
  identification_strategy: "State excise tax variation across states and over time provides exogenous price variation"
  estimator: "2SLS (Two-Stage Least Squares)"
  software: "not_in_text"
  confidence: HIGH
  page_reference: "Section IV: Data and Empirical Implementation, Instrumental Variables Strategy"

S3_sample:
  N: 1516
  population: "State-level aggregate data"
  unit_of_analysis: "State-year observations"
  coverage: "50 states + DC, 1955-1985"
  time_periods: 31
  data_source: "Tobacco Tax Council (1986)"
  measure: "Per capita tax-paid cigarette sales (in packs)"
  geographic_scope: ["USA"]
  confidence: HIGH
  page_reference: "Section IV, Dataset subsection, lines 145-150"

S4_findings:
  main_result: "Strong support for rational addiction model. Long-run price elasticity (-0.75) is approximately double short-run elasticity (-0.40). Future consumption positively affects current consumption, rejecting myopic behavior."
  parameters:
    - symbol: "eta_SR"
      value: -0.40
      value_range: "-0.36 to -0.44 (across models)"
      context: "Short-run price elasticity of cigarette demand"
      interpretation: "10% price increase → 4% reduction in current consumption"
      source_section: "Table 5, models 1-5"
      confidence: HIGH
    - symbol: "eta_LR"
      value: -0.75
      value_range: "-0.74 to -0.80 (across models)"
      context: "Long-run price elasticity (permanent price change)"
      interpretation: "10% permanent price increase → 7.5% reduction in consumption"
      source_section: "Table 5, models 1-5"
      confidence: HIGH
    - symbol: "theta"
      value: 0.45
      value_range: "0.375 to 0.505 (across models)"
      context: "Addiction reinforcement parameter - effect of past consumption on current"
      interpretation: "10% increase in past consumption → 4.2-5.5% increase in current consumption"
      source_section: "Table 3, C_{t-1} coefficients"
      confidence: HIGH
    - symbol: "beta_theta"
      value: 0.20
      value_range: "0.133 to 0.396 (across models)"
      context: "Forward-looking parameter - effect of future consumption on current"
      interpretation: "10% increase in future consumption → 1.4-4.0% increase in current consumption"
      source_section: "Table 3, C_{t+1} coefficients"
      confidence: HIGH
    - symbol: "eta_past_price_unanticipated"
      value: -0.15
      value_range: "-0.13 to -0.16"
      context: "One-period price increase reduces consumption in PREVIOUS period"
      interpretation: "10% price increase in t reduces C_{t-1} by 1.5%"
      source_section: "Table 5, Abstract"
      confidence: HIGH
    - symbol: "eta_future_price_unanticipated"
      value: -0.07
      value_range: "-0.05 to -0.09"
      context: "One-period price increase reduces consumption in SUBSEQUENT period"
      interpretation: "10% price increase in t reduces C_{t+1} by 0.7%"
      source_section: "Table 5, Abstract lines 42-43"
      confidence: HIGH
    - symbol: "mu_1"
      value: 0.20
      value_range: "0.141 to 0.265 (across models)"
      context: "Smaller root of difference equation"
      source_section: "Table 4"
      confidence: HIGH
    - symbol: "mu_2"
      value: 2.10
      value_range: "1.822 to 2.405 (across models)"
      context: "Larger root of difference equation - determines amplification"
      source_section: "Table 4"
      confidence: HIGH
  hypothesis_tests:
    - hypothesis: "Myopic behavior (future consumption coefficient = 0)"
      result: "Strongly rejected"
      test_statistic: "F = 18.6 to 21.3"
      p_value: "< 0.001"
      interpretation: "Consumers are forward-looking, not myopic"
      confidence: HIGH
    - hypothesis: "Time-separability (no past/future effects)"
      result: "Strongly rejected"
      test_statistic: "F = 615.7 to 799.2"
      p_value: "< 0.001"
      interpretation: "Cigarette consumption is addictive"
      confidence: HIGH
    - hypothesis: "Past and future prices have no effect (non-addiction)"
      result: "Strongly rejected"
      test_statistic: "F = 10.7 and 34.8"
      interpretation: "Cross-price effects confirm addiction"
      confidence: HIGH
  key_summary:
    - "A 10% permanent price increase reduces consumption by 4% in short-run, 7.5% in long-run"
    - "A 10% temporary price increase reduces consumption by only 3%"
    - "Long-run response is ~1.9 times larger than short-run response"
    - "Results strongly support rational addiction, reject myopic behavior"
  confidence: HIGH

S5_validity:
  internal: HIGH
  reasoning: "Instrumental variables strategy using state excise taxes provides exogenous price variation. Multiple model specifications yield consistent results. Extensive robustness checks."
  threats: "Possible correlation between unobserved state characteristics and both taxes and consumption"
  external: MEDIUM_TO_HIGH
  reasoning: "State-level panel data covers entire US population over 31 years. Results should generalize to similar developed economies with market-based cigarette sales."
  limitations:
    - "Aggregation to state level may mask individual heterogeneity"
    - "Does not capture bootlegging or cross-border purchases"
    - "Assumes quadratic utility for tractability"
  replication_status: "foundational_highly_cited"
  confidence: HIGH
  page_reference: "Throughout paper, implicit in methodology discussion"

S6_reproducibility:
  data_available: true
  data_source: "Tobacco Tax Council (1986) - publicly available"
  variables_described: true
  summary_statistics: "Table with means and standard deviations provided"
  code_available: false
  estimation_method: "Two-Stage Least Squares fully specified"
  instruments: "Past prices (P_{t-1}, P_{t-2}, ...) and future prices (P_{t+1}, P_{t+2}, ...) for lagged and future consumption"
  note: "Sufficient information provided to replicate analysis with same data"
  confidence: HIGH
  page_reference: "Section IV: Data and Empirical Implementation"

