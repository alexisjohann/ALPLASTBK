paper_key: "milkman2021megastudies"
source: "fulltext_ground_truth"

S1_research_question:
  value: "Which behavioural interventions most effectively increase gym attendance, and how well can experts and laypeople predict intervention effectiveness? Can a megastudy paradigm -- a massive field experiment testing many treatments synchronously -- efficiently identify the most impactful behavioural interventions?"
  confidence: HIGH
  page_reference: "Abstract, Introduction"

S2_methodology:
  value: "Megastudy: massive multi-arm field experiment testing 54 behavioural interventions simultaneously against a common control group"
  details: "61,293 gym members of 24 Hour Fitness (US) randomized into 54 treatment arms plus control. Stratified randomization by historical gym visit frequency, gym location, and membership tenure. Interventions delivered via text messages and app notifications (3-5 contacts/week) over 4-week active period. 10-week post-intervention monitoring. Intent-to-treat analysis with linear regression, clustered standard errors, Benjamini-Hochberg correction for multiple comparisons. Pre-registered (AsPredicted #14218). Separate forecasting study with 690 forecasters (495 lay, 98 behavioural scientists, 97 practitioners) predicting intervention rankings."
  study_type: "field_experiment"
  design: "between-subjects (54 treatment arms + control), multi-arm RCT"
  setting: "24 Hour Fitness gyms across the United States"
  period: "September-December 2018"
  intervention_delivery: "text_messages_and_app_notifications"
  contact_frequency: "3-5 per week"
  active_duration_weeks: 4
  followup_duration_weeks: 10
  total_observation_weeks: 14
  pre_registered: true
  pre_registration_id: "AsPredicted #14218"
  statistical_method: "Linear regression with clustered standard errors, Benjamini-Hochberg correction"
  analysis_type: "intent-to-treat"
  confidence: HIGH
  page_reference: "Methods section (II), Study Details (IX)"

S3_sample:
  N: 61293
  N_per_arm_approx: 1135
  population: "24 Hour Fitness gym members in the United States"
  countries: ["USA"]
  stratification_variables: ["historical_gym_visit_frequency", "gym_location", "membership_tenure"]
  N_treatment_arms: 54
  N_forecasters_total: 690
  N_forecasters_lay: 495
  N_forecasters_scientists: 98
  N_forecasters_practitioners: 97
  confidence: HIGH
  page_reference: "Methods (II), Forecasting Study"

S4_findings:
  main_result: "45% of interventions (24 of 54) significantly increased gym visits during the 4-week intervention period. The top-performing intervention -- a microreward for returning to the gym after a missed workout -- produced a 27% increase in weekly visits. However, only 8% of effective interventions (4 of 54) maintained significant effects 10 weeks post-intervention. Forecasters (experts, practitioners, and laypeople alike) performed at chance level (r=0.02) in predicting intervention effectiveness rankings."
