# --- Theoretical implications ---
theoretical_implications:
  recovery_hypothesis:
    description: "The most effective intervention rewarded returning after a missed workout, not consistent attendance. Setbacks are critical moments for behaviour change; self-forgiveness and recovery may be more important than prevention."
    evidence: "Microreward for return (+27%) vs. microreward for any visit (+12%)"
    confidence: HIGH

  flexibility_principle:
    description: "Rigid plans and commitments underperformed flexible approaches. Adaptation beats rigid commitment in long-term behaviour change."
    evidence: "Flexible rescheduling (+18%) vs. implementation intentions (+5%, ns) vs. deposit contract (+4%, ns)"
    confidence: HIGH

  forecasting_paradox:
