  key_findings:
    - "45% of interventions (24/54) significantly increased gym visits during 4-week active period"
    - "Top intervention: microreward for returning after missed workout (+27%, CI [18,36])"
    - "Recovery-focused interventions outperformed prevention-focused interventions"
    - "Flexible planning approaches outperformed rigid commitment devices"
    - "Actual social connections (friend commitment +20%) outperformed social norm messages (descriptive +8%, not sig.)"
    - "Only 8% of effective interventions persisted 10 weeks post-intervention (4/54)"
    - "Microrewards had highest persistence rate (50% of sig. effects persisted)"
    - "Planning and mindset/identity interventions showed 0% persistence"
    - "All forecaster groups (lay, scientist, practitioner) performed at chance (r=0.02)"
    - "No expert advantage: behavioural scientists predicted no better than lay people"
    - "Forecasters massively overestimated effectiveness of default enrollment (predicted #1, actual #18)"
    - "Forecasters massively underestimated microreward for returning (predicted #34, actual #1)"
    - "Loss-framed incentives (+5%, not sig.) did not outperform gain-framed incentives"
    - "Escalating rewards (+12%) outperformed flat rewards (+9%)"
    - "Temporal landmarks (Monday +14%, new month +10%) worked as fresh starts; personal landmarks (birthday +5%) did not"
    - "Fun/play framing of exercise (+13%) outperformed growth mindset (+4%) and self-efficacy (+6%)"
  confidence: HIGH

S5_validity:
  internal: HIGH
  internal_reasoning: "Large-scale randomized field experiment with stratified randomization, pre-registration, intent-to-treat analysis, Benjamini-Hochberg correction for multiple comparisons, objective outcome data from gym check-in systems"
  external: MEDIUM
  external_reasoning: "Single setting (24 Hour Fitness, USA), single outcome domain (gym attendance), self-selected participants (agreed to join study), may not generalize to other health behaviours, other countries, or non-gym-goers. Intervention delivery via text/app may not generalize to other channels."
  replication_status: "foundational_paradigm_study"
  limitations:
    - "Single outcome domain (gym attendance) -- results may not generalize to other health behaviours"
    - "Single setting (24 Hour Fitness, USA) -- results may not generalize to other countries or contexts"
    - "Self-selected participants who agreed to participate -- potential selection bias"
    - "Intervention delivery channel limited to text messages and app notifications"
    - "4-week active intervention period may be too short for habit formation"
    - "10-week follow-up may not capture longer-term persistence patterns"
    - "Hard to test multi-component or complex interventions in megastudy format"
    - "Cannot determine optimal dose/frequency of intervention contacts within this design"
  confidence: HIGH
  page_reference: "Limitations (VII), Discussion"

