# ═══════════════════════════════════════════════════════════════════
# SYSTEMATIC BIASES (8 identified)
# ═══════════════════════════════════════════════════════════════════

systematic_biases:
  - id: "BIAS-01"
    name: "Citation-Count Knowledge Gradient"
    description: "LLM accuracy is 8x higher for famous papers vs niche papers"
    evidence: "Fehr/Akerlof (0.42 avg) vs Brynjolfsson/Herhausen (0.10 avg)"
    severity: HIGH
    mitigation: "Use citation count as confidence weight for proxy quality"
    calibration_factor: "accuracy ≈ 0.1 + 0.35 × log10(citations/100)"

  - id: "BIAS-02"
    name: "Discrete-to-Continuous Smoothing"
    description: "LLM transforms discrete distributions into smooth estimates"
    evidence: "Reports N≈600 when truth is N=682 (specific clinical sample)"
    severity: MEDIUM
    mitigation: "Add uncertainty bounds (±15%) to all numeric proxy values"

  - id: "BIAS-03"
    name: "Theoretical/Empirical Misclassification"
    description: "LLM defaults to empirical when paper is purely theoretical"
    evidence: "Stigler & Becker (1977) classified as having empirical applications"
    severity: MEDIUM
    mitigation: "Explicitly validate study_type against known theoretical papers"

  - id: "BIAS-04"
    name: "Data Availability Optimism"
    description: "LLM assumes data is available for famous older papers"
    evidence: "Assumes Becker (1990) PSID data is publicly accessible"
    severity: LOW
    mitigation: "Default S6 to UNKNOWN unless confirmed by WebSearch or full text"

  - id: "BIAS-05"
    name: "S5/S6 Structural Blind Spot"
    description: "LLM cannot assess validity or reproducibility from training alone"
    evidence: "Score 0.00 across all 10 papers for both S5 and S6"
    severity: CRITICAL
    mitigation: "NEVER proxy S5/S6. Always require full text extraction."

  - id: "BIAS-06"
    name: "WebSearch Substitution Error"
    description: "When exact paper not found, WebSearch substitutes different paper by same author"
    evidence: "Enke (2024) perspective substituted with Cappelen/Enke/Tungodden (2025)"
    severity: CRITICAL
    mitigation: "Verify paper identity (title + year + authors) after every WebSearch"

  - id: "BIAS-07"
    name: "Confidence Escalation Under Search"
    description: "WebSearch increases specificity but may increase error magnitude"
    evidence: "N=50 (from wrong referenced study) vs N=682 (actual study)"
    severity: HIGH
    mitigation: "More specific values from WebSearch need cross-validation"

  - id: "BIAS-08"
    name: "Secondary Findings Omission (Headline Bias)"
    description: "LLM reports main headline finding but omits secondary results"
    evidence: "Reports Fehr & Schmidt inequity aversion but misses specific alpha/beta parameter ranges"
    severity: MEDIUM
    mitigation: "Explicitly prompt for secondary findings and parameter ranges"

