calibration_weights:
  description: "Prior weights for trusting LLM proxy by field"
  weights:
    S1: 0.75
    S2: 0.35
    S3: 0.15
    S4: 0.20
    S5: 0.00
    S6: 0.00
    MC: 0.25

  fame_tier_multiplier:
    very_high: 1.5
    high: 1.2
    medium_high: 1.0
    medium: 0.8
    low_medium: 0.5
    low: 0.3

  effective_weight_formula: "w_eff(field, paper) = w_field × fame_multiplier(paper)"
  example: "w_eff(S1, fehr1999theory) = 0.75 × 1.5 = 1.125 → cap at 1.0"

# ═══════════════════════════════════════════════════════════════════
# PRODUCTION STRATEGY
# ═══════════════════════════════════════════════════════════════════

production_strategy:
  tier_1_famous:
    criteria: "citations > 5000"
    approach: "LLM proxy for S1-S4, skip S5-S6, flag MC as uncertain"
    estimated_accuracy: 0.55
    papers_estimated: 200

  tier_2_known:
    criteria: "500 < citations <= 5000"
    approach: "LLM + WebSearch for S1-S3, full text for S4-S6"
    estimated_accuracy: 0.40
    papers_estimated: 800

  tier_3_niche:
    criteria: "citations <= 500"
    approach: "Full text required for all fields"
    estimated_accuracy: 0.15
    papers_estimated: 1500

  closed_loop:
    description: "As full texts are added, compare proxy vs ground truth to update calibration_weights"
    update_frequency: "Every 50 new full texts"
    convergence_target: "calibration_weights stable to ±0.05 over 3 consecutive updates"

# ═══════════════════════════════════════════════════════════════════
# KEY INSIGHT
# ═══════════════════════════════════════════════════════════════════

key_insight: |
  The gap from Layer B (0.42) to Ground Truth (1.0) is LARGER than the gap
  from Layer A (0.24) to Layer B (0.42).

  WebSearch captures the "easy half" — publicly available headlines, abstracts,
  summary information. The remaining 58% requires structured full-text extraction:
  specific parameter values, measurement contexts, validity assessments, and
  reproducibility information.

  However, even the 42% from proxy is valuable as an INFORMED PRIOR for the
  Bayesian calibration loop. It provides structure (correct fields identified)
  even when values are imprecise.

  The calibration loop (proxy → compare → adjust → better proxy) will converge
  as more full texts become available. Current 78 full texts provide sufficient
  initial calibration data for Tier 1 papers.
