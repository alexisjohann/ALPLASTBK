S4_findings:
  main_result: "Complementarity can be formally defined using supermodularity. Ten key theorems characterize the properties of systems with complementarities: clustering of optimal decisions, coherent search, comparative statics, momentum in dynamics, and value of coordination."
  key_theorems:
    - number: 1
      name: "Pairwise relationship"
      source: "Topkis (1978)"
      result: "Complementarity is a pairwise relationship for both constraints and objectives"
    - number: 2
      name: "Clustering"
      source: "Topkis (1978)"
      result: "The set of optimizers is a sublattice - optimal decisions cluster"
    - number: 3
      name: "Coherent search"
      source: "Milgrom & Roberts (1995)"
      result: "More than half the gain from moving to optimum can be realized by coherent changes"
    - number: 4
      name: "Comparative statics"
      source: "Topkis (1978)"
      result: "Optimal solution X(θ) is isotone (nondecreasing) in parameter θ"
    - number: 7
      name: "LeChatelier Principle"
      source: "Milgrom & Roberts (1996)"
      result: "Long-run changes are larger than short-run changes in systems of complements"
    - number: 8
      name: "Momentum"
      source: "Milgrom et al. (1991)"
      result: "Dynamical systems exhibit momentum - variables continue moving in initiated direction"
    - number: 9
      name: "Value of coordination"
      result: "Correlated errors are better than independent errors in systems of complements"
    - number: 10
      name: "Returns to scale"
      source: "Topkis (1978)"
      result: "Shared inputs with economies of scale make activities complementary"
  empirical_evidence_summary:
    - study: "Ichniowski et al. (1997)"
      finding: "Practices cluster more than random chance; clusters have significant productivity effects; isolated changes have little effect"
    - study: "Bresnahan et al. (2002)"
      finding: "IT + organizational practices + human capital show complementarity in productivity"
    - study: "Black and Lynch (2004)"
      finding: "Productivity correlates with bundles: computers + teams + profit sharing"
  confidence: HIGH

