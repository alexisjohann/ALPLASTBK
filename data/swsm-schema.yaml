# ═══════════════════════════════════════════════════════════════════════════
# SWSM - STRUCTURED WRITING STRUCTURE MODEL
# Schema Definition v1.0
# ═══════════════════════════════════════════════════════════════════════════
#
# Based on:
#   - Halliday (1985): Systemic Functional Linguistics
#   - Mann & Thompson (1988): Rhetorical Structure Theory
#   - Swales (1990): Genre Analysis (CARS Model)
#   - EBF 8D Algorithm (Appendix CCC/DDD)
#
# SWSM Axioms implemented:
#   - SWSM-1: Rank Hierarchy (10 levels)
#   - SWSM-2: Stratum Independence (3 strata)
#   - SWSM-6: Simultaneity (3 metafunctions per clause)
#   - SWSM-8: Genre Emergence (8D → Genre)
#   - SWSM-9: Style Percolation (top-down constraints)
#   - SWSM-16: Quantitative Bounds (8D → metrics)
#
# ═══════════════════════════════════════════════════════════════════════════

metadata:
  schema_name: "SWSM"
  version: "1.0.0"
  created: "2026-01-29"
  authors:
    - "FehrAdvice & Partners AG"
  description: |
    Structured Writing Structure Model - A bidirectional framework for
    text analysis and generation based on Systemic Functional Linguistics.

# ═══════════════════════════════════════════════════════════════════════════
# AXIOM DEFINITIONS
# ═══════════════════════════════════════════════════════════════════════════

axioms:
  # Structural Axioms (Halliday SFL)
  - id: SWSM-1
    name: "Rank Hierarchy"
    description: "Text decomposes into exactly 10 ranked levels L₁...L₁₀"
    formal: "∀ text T: T → {L₁, L₂, ..., L₁₀} where Lᵢ contains units of Lᵢ₊₁"
    source: "Halliday (1985)"

  - id: SWSM-2
    name: "Stratum Independence"
    description: "Three strata operate with distinct organizing principles"
    formal: "Discourse ⊥ Lexicogrammar ⊥ Expression"
    source: "Halliday (1985)"

  - id: SWSM-3
    name: "Rank Shift"
    description: "A unit of rank n may be embedded within rank n+1"
    formal: "downrank(Lₙ) ↪ Lₙ₊₁"
    source: "Halliday (1985)"

  # Relation Axioms (RST)
  - id: SWSM-4
    name: "Nucleus-Satellite"
    description: "Composite units at L₁-L₃ consist of Nucleus + Satellite*"
    formal: "∀ U ∈ {L₁, L₂, L₃}: U = N ⊕ S*"
    source: "Mann & Thompson (1988)"

  - id: SWSM-5
    name: "Rhetorical Relations"
    description: "Relations connect Nucleus-Satellite pairs"
    formal: "R ∈ {Elaboration, Contrast, Cause, Purpose, ...}"
    source: "Mann & Thompson (1988)"

  # Metafunction Axioms (SFL)
  - id: SWSM-6
    name: "Simultaneity"
    description: "Every clause realizes all three metafunctions"
    formal: "∀ clause C: C = Ideational ⊗ Interpersonal ⊗ Textual"
    source: "Halliday (1985)"

  - id: SWSM-7
    name: "Rank-Metafunction Mapping"
    description: "L₅ (Clause) is the pivot for all metafunctions"
    formal: "Pivot(Metafunctions) = L₅"
    source: "Halliday (1985)"

  # Generation Axioms (8D Integration)
  - id: SWSM-8
    name: "Genre Emergence"
    description: "8D profiles determine genre constraints"
    formal: "8D-Profile → Genre → Constraints(L₁)"
    source: "EBF Appendix CCC"

  - id: SWSM-9
    name: "Style Percolation"
    description: "Style parameters propagate from L₁ to L₈"
    formal: "Constraints(Lᵢ) → Constraints(Lᵢ₊₁)"
    source: "EBF Appendix DDD"

  - id: SWSM-10
    name: "Bidirectional Isomorphism"
    description: "Parse and Generate are inverses"
    formal: "Generate(Parse(T)) ≈ T"
    source: "SWSM Design"

  # Extension Axioms
  - id: SWSM-11
    name: "Multilingual Invariance"
    description: "Rank structure is language-invariant"
    formal: "∀ lang: Ranks(lang) = {L₁, ..., L₁₀}"
    source: "SWSM Design"

  - id: SWSM-12
    name: "Domain Specialization"
    description: "Genres constrain Move sequences"
    formal: "Genre → Moves(L₂)"
    source: "Swales (1990)"

  - id: SWSM-13
    name: "Temporal Versioning"
    description: "Document versions have diffs at any rank"
    formal: "diff(v_i, v_{i+1}) ∈ ∪ₖ Lₖ"
    source: "SWSM Design"

  # Textuality Axioms
  - id: SWSM-14
    name: "Cohesive Harmony"
    description: "Cohesive chains correlate with coherence"
    formal: "Coherence(T) ∝ |CohesiveChains(T)|"
    source: "Halliday & Hasan (1976)"

  - id: SWSM-15
    name: "Information Flow"
    description: "Canonical flow is Given → New"
    formal: "Theme = Given, Rheme → New (unmarked)"
    source: "Halliday (1985)"

  - id: SWSM-16
    name: "Quantitative Bounds"
    description: "8D profiles define metric constraints"
    formal: "∀ 8D-Profile P: ∃ f_L(P) = [min, max]"
    source: "SWSM Design"

# ═══════════════════════════════════════════════════════════════════════════
# RANK DEFINITIONS (10 Levels)
# ═══════════════════════════════════════════════════════════════════════════

strata:
  - name: "Discourse"
    ranks: [L1, L2, L3]
    organizing_principle: "Rhetorical relations (RST)"
    source: "Mann & Thompson (1988)"

  - name: "Lexicogrammar"
    ranks: [L4, L5, L6, L7, L8]
    organizing_principle: "Rank scale with constituency"
    source: "Halliday (1985)"

  - name: "Expression"
    ranks: [L9, L10]
    organizing_principle: "Realization patterns"
    source: "Halliday (1985)"

ranks:
  L1_META:
    name: "Document Level"
    unit: "Document"
    stratum: "Discourse"
    attributes:
      genre_type:
        type: enum
        values:
          - scientific_paper
          - literature_review
          - thesis
          - business_report
          - executive_summary
          - proposal
          - memo
          - policy_brief
          - white_paper
          - blog_post
          - ebf_appendix
          - ebf_chapter
      register:
        type: enum
        values: [frozen, formal, consultative, casual, intimate]
      domain:
        type: enum
        values: [academic, corporate, governmental, public]
      communicative_purpose:
        type: enum
        values: [G1_inform, G2_persuade, G3_instruct, G4_entertain, G5_express, G6_connect, G7_document]
    constraints:
      - "Exactly one genre_type per document"
      - "8D-Profile determines initial constraints (SWSM-8)"

  L2_MAKRO:
    name: "Section Level"
    unit: "Section"
    stratum: "Discourse"
    attributes:
      move_type:
        type: string
        examples:
          - "Establish_Territory"
          - "Establish_Niche"
          - "Occupy_Niche"
          - "Methods"
          - "Results"
          - "Discussion"
      rhetorical_function:
        type: string
      position:
        type: enum
        values: [initial, medial, final]
      optionality:
        type: enum
        values: [obligatory, conventional, optional]
    constraints:
      min_per_L1: 1
      max_per_L1: "f(D₄)"  # Time-dependent

  L3_MESO:
    name: "Paragraph Level"
    unit: "Paragraph"
    stratum: "Discourse"
    attributes:
      paragraph_type:
        type: enum
        values: [topic, supporting, transitional, concluding]
      nucleus_position:
        type: enum
        values: [initial, medial, final]
      satellite_count:
        type: integer
    constraints:
      min_per_L2: 2
      max_per_L2: "f(D₄)"
      min_sentences: 3
      max_sentences: 10

  L4_MIKRO:
    name: "Clause Complex Level"
    unit: "Clause Complex"
    stratum: "Lexicogrammar"
    attributes:
      taxis:
        type: enum
        values: [parataxis, hypotaxis]
        description: "Parataxis = equal status, Hypotaxis = dependent"
      logico_semantic:
        type: enum
        values: [expansion, projection]
      complexity_index:
        type: float
        description: "Clauses per complex"
    constraints:
      max_clauses: 5
      max_depth: 3

  L5_SATZ:
    name: "Clause Level"
    unit: "Clause"
    stratum: "Lexicogrammar"
    description: "Primary realization of all three metafunctions (SWSM-7)"
    metafunctions:
      ideational:
        system: "Transitivity"
        attributes:
          process_type:
            type: enum
            values: [material, mental, relational, verbal, behavioral, existential]
          participant_roles:
            material: [Actor, Goal, Beneficiary, Range]
            mental: [Senser, Phenomenon]
            relational: [Carrier, Attribute, Token, Value]
            verbal: [Sayer, Receiver, Verbiage]
            behavioral: [Behaver]
            existential: [Existent]
          circumstances:
            types: [Location, Temporal, Manner, Cause, Purpose, Extent]
      interpersonal:
        system: "Mood"
        attributes:
          mood:
            type: enum
            values: [declarative, interrogative_yn, interrogative_wh, imperative, exclamative]
          modality:
            types: [epistemic, deontic, dynamic]
            values: [high, median, low]
          polarity:
            type: enum
            values: [positive, negative]
          speech_function:
            values: [statement, question, command, offer]
      textual:
        system: "Theme-Rheme"
        attributes:
          theme_type:
            type: enum
            values: [topical, interpersonal, textual]
          marked_theme:
            type: boolean
          information_status:
            values: [given, new, bridging]

  L6_KLAUSEL:
    name: "Constituent Level"
    unit: "Constituent"
    stratum: "Lexicogrammar"
    attributes:
      function:
        grammatical: [Subject, Finite, Predicator, Complement, Adjunct]
        sfl: [Theme, Rheme, Mood, Residue]
      information_status:
        type: enum
        values: [given, new, bridging]

  L7_PHRASE:
    name: "Phrase Level"
    unit: "Group/Phrase"
    stratum: "Lexicogrammar"
    attributes:
      phrase_type:
        type: enum
        values: [NP, VP, PP, AdjP, AdvP]
      head:
        type: reference
      modifiers:
        pre: { max: 4 }
        post: { max: 3 }
      determination:
        type: enum
        values: [definite, indefinite, zero]

  L8_WORT:
    name: "Word Level"
    unit: "Word"
    stratum: "Lexicogrammar"
    attributes:
      lemma:
        type: string
      pos:
        type: enum
        values: [N, V, Adj, Adv, Det, Prep, Conj, Pron, Aux, Part]
      register_marking:
        type: enum
        values: [neutral, formal, informal, technical]
      frequency_band:
        type: enum
        values: [high, mid, low, rare]

  L9_MORPHEM:
    name: "Morpheme Level"
    unit: "Morpheme"
    stratum: "Expression"
    attributes:
      morpheme_type:
        type: enum
        values: [root, prefix, suffix, infix, circumfix]
      function:
        type: enum
        values: [derivational, inflectional]
    constraints:
      max_per_word: 6

  L10_GRAPHEM:
    name: "Grapheme Level"
    unit: "Grapheme"
    stratum: "Expression"
    attributes:
      char_type:
        type: enum
        values: [letter, digit, punctuation, whitespace, symbol]
      case:
        type: enum
        values: [upper, lower]
      formatting:
        type: enum
        values: [plain, bold, italic, underline]
    constraints:
      encoding: "UTF-8"

# ═══════════════════════════════════════════════════════════════════════════
# 8D PROFILE SCHEMA
# ═══════════════════════════════════════════════════════════════════════════

profile_8d:
  description: "Target audience profile for text generation"
  dimensions:
    D1_expertise:
      name: "Expertise"
      range: [0.0, 1.0]
      scale: "Laie → Expert"
      affects: [L5, L7, L8]
      constraints:
        - "D1 < 0.3 → Flesch-Kincaid ≤ 10, Technical Terms ≤ 5%"
        - "D1 > 0.7 → Flesch-Kincaid ≥ 12, Technical Terms 15-40%"

    D2_proximity:
      name: "Domain Proximity"
      range: [0.0, 1.0]
      scale: "Fachfremd → Gleiches Feld"
      affects: [L3, L4, L8]

    D3_scope:
      name: "Scope"
      range: [0.0, 1.0]
      scale: "Persönlich → Gesellschaftlich"
      affects: [L1, L3]

    D4_time:
      name: "Available Time"
      range: [0.0, 1.0]
      scale: "Wenig → Viel"
      affects: [L2, L3, L4, L5]
      constraints:
        - "D4 < 0.3 → max 4 sections, short sentences (12-18 words)"
        - "D4 > 0.7 → detailed structure, complex sentences (20-35 words)"

    D5_goal:
      name: "Communication Goal"
      type: enum
      values:
        G1_inform: "Informieren"
        G2_persuade: "Überzeugen"
        G3_instruct: "Handeln auslösen"
        G4_entertain: "Unterhalten"
        G5_express: "Ausdrücken"
        G6_connect: "Verbinden"
        G7_document: "Dokumentieren"
      affects: [L1, L2]

    D6_context:
      name: "Context"
      range: [0.0, 1.0]
      scale: "Intern → Öffentlich"
      affects: [L1, L5, L8]
      constraints:
        - "D6 > 0.8 → formal register, avoid contractions"
        - "D6 < 0.3 → casual register allowed"

    D7_emotion:
      name: "Emotional Tone"
      range: [0.0, 1.0]
      scale: "Sachlich → Emotional"
      affects: [L5, L6, L8]

    D8_persistence:
      name: "Persistence"
      range: [0.0, 1.0]
      scale: "Kurzlebig → Archiv"
      affects: [L1, L5]
      constraints:
        - "D8 > 0.8 → hedging required, formal citations"
        - "D8 < 0.3 → ephemeral style allowed"

# ═══════════════════════════════════════════════════════════════════════════
# COHESION METRICS
# ═══════════════════════════════════════════════════════════════════════════

cohesion_metrics:
  grammatical:
    reference_chains:
      description: "Coreferent mentions across clauses"
      optimal_density: [0.3, 0.6]

    conjunction_ratio:
      description: "Connectors per 100 words"
      thresholds:
        low: "< 2.0 (fragmentiert)"
        optimal: "[2.0, 5.0]"
        high: "> 5.0 (überverbunden)"

    ellipsis_rate:
      description: "Reconstructable omissions"
      optimal: [0.05, 0.15]

  lexical:
    lexical_density:
      description: "Content words / Total words"
      thresholds:
        spoken: [0.35, 0.45]
        written_informal: [0.45, 0.55]
        written_formal: [0.55, 0.65]
        scientific: [0.60, 0.70]

    type_token_ratio:
      description: "Unique lemmas / Total tokens"
      method: "MSTTR with window=100"
      thresholds:
        low_diversity: "< 0.40"
        moderate: "[0.40, 0.55]"
        high_diversity: "> 0.55"

  aggregated:
    cohesion_score:
      formula: |
        C = w₁ × reference_chain_density
          + w₂ × conjunction_ratio_normalized
          + w₃ × lexical_repetition_index
          + w₄ × given_new_balance
      weights:
        w1: 0.30
        w2: 0.25
        w3: 0.25
        w4: 0.20
      scale: [0, 1]
      thresholds:
        poor: "< 0.4"
        acceptable: "[0.4, 0.6]"
        good: "[0.6, 0.8]"
        excellent: "> 0.8"

# ═══════════════════════════════════════════════════════════════════════════
# COHESION TYPES (E5: Halliday & Hasan 1976)
# ═══════════════════════════════════════════════════════════════════════════
#
# Implementation: scripts/swsm_cohesion_analyzer.py
# Axioms: SWSM-11 (Cohesion Continuity), SWSM-12 (Thematic Progression)

cohesion_types:
  grammatical:
    reference:
      description: "Participant tracking across clauses"
      types:
        anaphoric: "Refers back to previous mention"
        cataphoric: "Refers forward to upcoming mention"
        exophoric: "Refers outside the text"
        comparative: "Similarity/difference reference"
      categories:
        personal: ["he", "she", "it", "they", "his", "her"]
        demonstrative: ["this", "that", "these", "those", "here", "there"]
        comparative: ["same", "similar", "other", "different", "such"]
        definite: ["the + NP (anaphoric use)"]

    substitution:
      description: "Replacement of linguistic item"
      types:
        nominal: ["one", "ones", "the same"]
        verbal: ["do", "do so", "do the same"]
        clausal: ["so", "not"]

    ellipsis:
      description: "Omission of recoverable elements"
      types:
        nominal: "NP ellipsis"
        verbal: "VP ellipsis"
        clausal: "Clause ellipsis"

    conjunction:
      description: "Logical connectors between clauses"
      types:
        additive:
          markers_en: [and, also, moreover, furthermore, "in addition"]
          markers_de: [und, auch, ausserdem, zudem, ferner]
          function: "Adds information"
        adversative:
          markers_en: [but, however, yet, nevertheless, "on the other hand"]
          markers_de: [aber, jedoch, dennoch, hingegen]
          function: "Contrasts information"
        causal:
          markers_en: [so, therefore, thus, because, since, consequently]
          markers_de: [also, daher, deshalb, weil, da, folglich]
          function: "Shows cause/effect"
        temporal:
          markers_en: [then, next, finally, first, meanwhile, subsequently]
          markers_de: [dann, danach, schliesslich, erstens, inzwischen]
          function: "Shows sequence"

  lexical:
    description: "Cohesion through vocabulary"
    types:
      repetition:
        description: "Same word/lemma repeated"
        subtypes:
          exact: "Identical form"
          partial: "Same lemma, different form"
          paraphrase: "Same meaning, different words"
      synonymy:
        description: "Near-synonym used"
        example: "big → large"
      hyponymy:
        description: "Superordinate-hyponym relation"
        example: "animal → dog"
      meronymy:
        description: "Whole-part relation"
        example: "car → wheel"
      antonymy:
        description: "Opposite meaning"
        example: "hot → cold"
      collocation:
        description: "Habitual co-occurrence"
        example: "make → decision"

  thematic_progression:
    description: "How Theme-Rheme develops across text"
    patterns:
      constant:
        description: "Same Theme repeated"
        structure: "T1→R1, T1→R2, T1→R3"
        effect: "Focus on single topic"
      linear:
        description: "Rheme becomes next Theme"
        structure: "T1→R1, R1→R2, R2→R3"
        effect: "Progressive development"
      derived:
        description: "Themes derived from hypertheme"
        structure: "HT→(T1,T2,T3)"
        effect: "Organized subtopics"
      split:
        description: "Rheme split into multiple Themes"
        structure: "T1→(R1a,R1b), R1a→R2, R1b→R3"
        effect: "Parallel development"

# ═══════════════════════════════════════════════════════════════════════════
# INFORMATION STRUCTURE (E6: Prince 1981, Lambrecht 1994)
# ═══════════════════════════════════════════════════════════════════════════
#
# Implementation: scripts/swsm_information_structure.py
# Axioms: SWSM-12 (Thematic Progression), SWSM-13 (Information Flow)

information_structure:
  description: "How information is packaged and flows through text"
  sources:
    - "Prince (1981): Toward a Taxonomy of Given-New Information"
    - "Lambrecht (1994): Information Structure and Sentence Form"
    - "Halliday (1967): Notes on Transitivity and Theme"

  given_new:
    description: "Information status classification"
    categories:
      given:
        textual: "Explicitly mentioned in prior discourse"
        situational: "Present in the speech situation"
        inferrable: "Recoverable through inference"
      new:
        brand_new: "Completely new to the discourse"
        unused: "Known but not yet mentioned"
        inferrable: "New but recoverable through inference"
    markers:
      given_signals:
        - "Definite NPs (the X)"
        - "Pronouns (he, she, it)"
        - "Demonstratives (this, that)"
      new_signals:
        - "Indefinite NPs (a X)"
        - "Presentational constructions (There is X)"
        - "First mention proper nouns"

  topic_comment:
    description: "Sentence-level aboutness structure"
    components:
      topic:
        description: "What the sentence is about"
        types:
          sentence_topic: "Local aboutness"
          discourse_topic: "Global text topic"
          contrastive_topic: "Contrasted with alternatives"
          frame_topic: "Sets temporal/spatial frame"
      comment:
        description: "What is predicated about the topic"
    mapping_to_sfl:
      topic: "Often aligns with Theme"
      comment: "Often aligns with Rheme"
      note: "But not always: Theme = starting point, Topic = aboutness"

  focus_background:
    description: "Information prominence structure"
    components:
      focus:
        description: "Most prominent/salient information"
        types:
          information_focus: "New, asserted information"
          contrastive_focus: "Explicitly contrasted with alternative"
          exhaustive_focus: "Only this, nothing else"
          presentational_focus: "Introduces new referent"
        markers:
          en: [only, even, also, just, especially]
          de: [nur, auch, sogar, besonders, gerade]
          fr: [seulement, même, aussi, surtout]
      background:
        description: "Presupposed, non-prominent information"

  information_flow:
    description: "How information develops across text"
    metrics:
      given_ratio:
        description: "Proportion of given vs new information"
        optimal: [0.4, 0.6]
        note: "Too much new = hard to follow; too much given = redundant"
      new_introduction_rate:
        description: "New entities per sentence"
        optimal: [0.5, 2.0]
      topic_continuity:
        description: "How consistent topics are across sentences"
        high: "> 0.7 (focused text)"
        low: "< 0.3 (scattered text)"
    patterns:
      smooth_flow: "Given → New → Given → New (alternating)"
      front_loaded: "New → New → New → Given (introduce then elaborate)"
      back_loaded: "Given → Given → New → New (build to climax)"

# ═══════════════════════════════════════════════════════════════════════════
# RST DISCOURSE PARSER (E2: Automatic RST Tree Construction)
# ═══════════════════════════════════════════════════════════════════════════
#
# Implementation: scripts/swsm_rst_parser.py
# Axioms: SWSM-3 (Rank Shift), SWSM-4 (Nucleus-Satellite), SWSM-5 (Rhetorical Relations)
#
# The RST Discourse Parser automatically constructs RST trees from text:
#   1. EDU Segmentation - Segment text into Elementary Discourse Units
#   2. Relation Classification - Identify RST relations between spans
#   3. Tree Building - Construct hierarchical RST tree bottom-up

rst_discourse_parser:
  metadata:
    version: "1.0.0"
    axioms: ["SWSM-3", "SWSM-4", "SWSM-5", "SWSM-11"]
    sources:
      - "Mann & Thompson (1988): Rhetorical Structure Theory"
      - "Marcu (2000): The Theory and Practice of Discourse Parsing"
      - "Feng & Hirst (2014): A Linear-Time Bottom-Up Discourse Parser"
      - "Joty et al. (2015): CODRA: A Novel Discriminative Framework"

  # ─────────────────────────────────────────────────────────────────────────
  # EDU SEGMENTATION
  # ─────────────────────────────────────────────────────────────────────────

  edu_segmentation:
    description: "Segment text into Elementary Discourse Units (EDUs)"
    principle: "EDUs roughly correspond to clauses (SWSM-4)"

    boundary_markers:
      sentence_end:
        patterns: [".", "!", "?", "...", ":", ";"]
        action: "Always segment"

      clause_boundary:
        patterns:
          subordinating: ["because", "although", "while", "when", "if", "since", "after", "before", "unless", "whereas"]
          coordinating: [", and", ", but", ", or", ", yet", ", so"]
          relative: ["who", "which", "that", "where", "whose"]
        action: "Segment with context check"

      explicit_markers:
        patterns: ["--", "—", "(", ")"]
        action: "Consider for parenthetical EDUs"

    edu_attributes:
      text: "The actual text content"
      position: "Index in document"
      is_sentence_initial: "Boolean"
      has_subject: "Boolean (complete clause)"
      discourse_marker: "Leading conjunction/adverb if any"
      tense: "Verb tense for temporal relations"
      main_verb_lemma: "For semantic similarity"

  # ─────────────────────────────────────────────────────────────────────────
  # RELATION CLASSIFICATION
  # ─────────────────────────────────────────────────────────────────────────

  relation_classification:
    description: "Classify RST relations between EDU spans"

    strategies:
      structural:
        description: "Position-based heuristics"
        features:
          - "Adjacent EDUs favor local relations"
          - "Paragraph boundaries suggest higher-level relations"
          - "Sentence-initial EDUs often nuclei"

      lexical:
        description: "Discourse marker lookup"
        marker_lexicon:
          cause: ["because", "since", "as", "for this reason"]
          result: ["so", "therefore", "thus", "consequently", "as a result"]
          contrast: ["but", "however", "although", "yet", "nevertheless"]
          elaboration: ["specifically", "for example", "in particular", "namely"]
          temporal: ["then", "next", "after", "before", "finally", "first"]
          condition: ["if", "unless", "provided that", "in case"]
          purpose: ["to", "in order to", "so that"]
          concession: ["although", "though", "even though", "despite"]
          evidence: ["according to", "as shown by"]
          background: ["previously", "historically"]

      semantic:
        description: "Content-based classification"
        features:
          - "Verb tense alignment (temporal)"
          - "Entity coreference (elaboration)"
          - "Polarity contrast (contrast/concession)"
          - "Causal verbs (cause/result)"

    confidence_thresholds:
      high: 0.8
      medium: 0.5
      low: 0.3

    default_relation: "elaboration"

  # ─────────────────────────────────────────────────────────────────────────
  # NUCLEARITY ASSIGNMENT
  # ─────────────────────────────────────────────────────────────────────────

  nuclearity:
    description: "Determine nucleus-satellite structure (SWSM-4)"
    types:
      nucleus_satellite:
        description: "One span is more central (nucleus)"
        relations: ["cause", "result", "elaboration", "evidence", "background", "purpose", "condition", "concession"]

      multinuclear:
        description: "Both spans equally important"
        relations: ["contrast", "joint", "list", "sequence"]

    assignment_rules:
      - "Discourse markers often in satellite"
      - "Main clause typically nucleus"
      - "Shorter span often satellite (for elaboration)"
      - "Temporal first → nucleus (for sequence)"

  # ─────────────────────────────────────────────────────────────────────────
  # TREE BUILDING
  # ─────────────────────────────────────────────────────────────────────────

  tree_building:
    description: "Construct RST tree from EDUs and relations"
    algorithm: "Shift-Reduce Bottom-Up Parser"

    operations:
      shift:
        description: "Push EDU onto stack"
        condition: "Input buffer not empty"

      reduce:
        description: "Combine top stack items"
        condition: "Valid relation between spans"
        output: "New RST subtree"

    parsing_strategy:
      - "Process left-to-right"
      - "Greedily reduce when confident"
      - "Prefer local attachments"
      - "Respect paragraph boundaries"

    tree_structure:
      RSTNode:
        type: "enum: nucleus | satellite | root"
        relation: "RelationType if satellite"
        children: "list of RSTNode"
        span: "[start_edu, end_edu]"
        text: "Concatenated EDU texts"

      RSTTree:
        root: "RSTNode"
        edus: "list of EDU"
        to_dict: "Serialization method"
        to_bracket_notation: "Standard RST format"

  # ─────────────────────────────────────────────────────────────────────────
  # SWSM INTEGRATION
  # ─────────────────────────────────────────────────────────────────────────

  swsm_integration:
    description: "How E2 integrates with other SWSM components"

    inputs:
      from_text: "Raw text for parsing"
      from_E1: "SFL-annotated clauses for better segmentation"

    outputs:
      to_E4: "RST tree for RST-SFL bridge mapping"
      to_E5: "Discourse structure for cohesion analysis"
      to_E6: "Relation types for information flow"

    bidirectional_with_E4:
      description: "RST ↔ SFL mapping"
      parse_direction: "RST relations → infer SFL features"
      generate_direction: "SFL features → realize RST relations"

# ═══════════════════════════════════════════════════════════════════════════
# CARS MOVE TAGGER (E3: Automatic Move Identification)
# ═══════════════════════════════════════════════════════════════════════════
#
# Implementation: scripts/swsm_move_tagger.py
# Axioms: SWSM-8 (Genre Emergence), SWSM-9 (Style Percolation), SWSM-12 (Domain Specialization)
#
# The CARS Move Tagger automatically identifies rhetorical moves in text:
#   1. Move Pattern Detection - Identify moves via linguistic indicators
#   2. Strategy Classification - Classify strategies within moves
#   3. Genre-Specific Tagging - Apply genre move templates

cars_move_tagger:
  metadata:
    version: "1.0.0"
    axioms: ["SWSM-8", "SWSM-9", "SWSM-12"]
    sources:
      - "Swales (1990): Genre Analysis - The CARS Model"
      - "Bhatia (1993): Analysing Genre"
      - "Hyland (2004): Disciplinary Discourses"
      - "Kanoksilapatham (2005): Rhetorical moves in biochemistry research articles"

  # ─────────────────────────────────────────────────────────────────────────
  # MOVE INDICATOR LEXICONS
  # ─────────────────────────────────────────────────────────────────────────

  move_indicators:
    description: "Linguistic patterns for move identification"

    territory_indicators:
      centrality_claiming:
        patterns: ["important", "significant", "crucial", "key", "fundamental"]
        examples: ["X is increasingly important", "plays a key role"]
      topic_generalization:
        patterns: ["research on", "studies of", "the field of", "well known"]
      literature_review:
        patterns: ["previous research", "scholars have", "according to"]

    niche_indicators:
      counter_claiming:
        patterns: ["however", "yet", "but", "nevertheless", "contrary to"]
      gap_indication:
        patterns: ["little research", "gap in", "remains unclear", "has not been"]
      question_raising:
        patterns: ["question remains", "it is unclear", "unknown whether"]

    occupy_indicators:
      purpose_statement:
        patterns: ["this paper aims", "the purpose of", "we aim to", "in this study"]
      findings_preview:
        patterns: ["we find", "we show", "our results", "we demonstrate"]
      structure_indication:
        patterns: ["this paper is organized", "section", "we begin by"]

  # ─────────────────────────────────────────────────────────────────────────
  # GENRE TEMPLATES
  # ─────────────────────────────────────────────────────────────────────────

  supported_genres:
    - scientific_paper
    - policy_brief
    - executive_summary
    - ebf_appendix
    - blog_post
    - consulting_memo

  move_status_types:
    obligatory: "Must appear in the document (★)"
    conventional: "Expected but can be omitted (◆)"
    optional: "May appear if content warrants (○)"

  # ─────────────────────────────────────────────────────────────────────────
  # MOVE COVERAGE METRICS
  # ─────────────────────────────────────────────────────────────────────────

  coverage_metrics:
    move_coverage:
      description: "Percentage of obligatory moves found"
      formula: "obligatory_found / obligatory_expected"
      thresholds:
        excellent: "> 0.9"
        good: "[0.7, 0.9]"
        needs_improvement: "< 0.7"

    confidence_thresholds:
      high: 0.7
      medium: 0.5
      low: 0.3

  # ─────────────────────────────────────────────────────────────────────────
  # SWSM INTEGRATION
  # ─────────────────────────────────────────────────────────────────────────

  swsm_integration:
    description: "How E3 integrates with other SWSM components"

    inputs:
      from_text: "Raw text or sections"
      from_E7: "Genre type from 8D mapping"
      from_E2: "RST structure for discourse context"

    outputs:
      to_E8: "Identified moves for document planning validation"
      to_E9: "Move coverage for text generation guidance"

    bidirectional_with_E8:
      description: "Move Tagger ↔ Move Planner"
      parse_direction: "Identify moves in existing text"
      generate_direction: "Validate generated move sequences"

# ═══════════════════════════════════════════════════════════════════════════
# RST RELATIONS (Mann & Thompson 1988)
# ═══════════════════════════════════════════════════════════════════════════

rst_relations:
  presentational:
    - Antithesis
    - Background
    - Concession
    - Enablement
    - Evidence
    - Justify
    - Motivation
    - Preparation
    - Restatement
    - Summary

  subject_matter:
    - Elaboration
    - Circumstance
    - Solutionhood
    - Volitional_Cause
    - Non_Volitional_Cause
    - Volitional_Result
    - Non_Volitional_Result
    - Purpose
    - Condition
    - Otherwise
    - Interpretation
    - Evaluation
    - Means

  multinuclear:
    - Contrast
    - Joint
    - List
    - Sequence

# ═══════════════════════════════════════════════════════════════════════════
# RST-SFL BRIDGE MAPPINGS (E4: Axiom SWSM-7 Implementation)
# ═══════════════════════════════════════════════════════════════════════════
#
# How RST relations at L3-L4 are REALIZED through SFL choices at L5-L6
# Implements SWSM Axiom 7: Realizational Stratification
#
# Direction 1: RST → SFL (Generation)
#   Given discourse relation, what clause-level features to use?
#
# Direction 2: SFL → RST (Analysis)
#   Given clause features, what discourse relation is signaled?

rst_sfl_bridge:
  metadata:
    version: "1.0.0"
    axiom: "SWSM-7"
    sources:
      - "Martin (1992): English Text"
      - "Taboada & Mann (2006): RST Web"

  # ─────────────────────────────────────────────────────────────────────────
  # CAUSAL RELATIONS → SFL
  # ─────────────────────────────────────────────────────────────────────────

  cause:
    ideational:
      taxis: hypotactic
      logico_semantic: expansion
      expansion_type: enhancement
      enhancement_type: causal
      conjunctions:
        en: [because, since, as, for, "due to", "owing to"]
        de: [weil, da, denn, aufgrund, wegen]
        fr: [parce que, car, puisque, "vu que"]
    interpersonal:
      mood: declarative
      modality_type: epistemic
      modality_value: high
      speech_function: statement
    textual:
      theme_type: textual
      marked_theme: false
      thematic_progression: linear
      conjunction_type: causal
    constraints:
      obligatory: [causal_conjunction, clause_complex]

  result:
    ideational:
      taxis: hypotactic
      logico_semantic: expansion
      expansion_type: enhancement
      enhancement_type: causal
      conjunctions:
        en: [so, therefore, thus, hence, consequently, "as a result"]
        de: [also, daher, deshalb, folglich, somit, infolgedessen]
        fr: [donc, ainsi, "par conséquent", "c'est pourquoi"]
    interpersonal:
      mood: declarative
      modality_type: epistemic
      modality_value: median
      speech_function: statement
    textual:
      theme_type: textual
      thematic_progression: linear
      conjunction_type: causal
    constraints:
      obligatory: [result_conjunction]

  purpose:
    ideational:
      taxis: hypotactic
      logico_semantic: expansion
      expansion_type: enhancement
      enhancement_type: causal
      conjunctions:
        en: [to, "in order to", "so that", "so as to"]
        de: ["um zu", damit, zwecks]
        fr: [pour, "afin de", "dans le but de"]
    interpersonal:
      mood: declarative
      modality_type: deontic
      modality_value: median
      speech_function: statement
    textual:
      theme_type: topical
      thematic_progression: constant
    constraints:
      obligatory: [purpose_conjunction, non_finite_clause]

  # ─────────────────────────────────────────────────────────────────────────
  # CONDITIONAL RELATIONS → SFL
  # ─────────────────────────────────────────────────────────────────────────

  condition:
    ideational:
      taxis: hypotactic
      logico_semantic: expansion
      expansion_type: enhancement
      enhancement_type: conditional
      conjunctions:
        en: [if, unless, "provided that", "in case", assuming]
        de: [wenn, falls, sofern, vorausgesetzt, angenommen]
        fr: [si, "à condition que", "pourvu que"]
    interpersonal:
      mood: declarative
      modality_type: epistemic
      modality_value: low
      polarity_pattern: both
      speech_function: statement
    textual:
      theme_type: textual
      marked_theme: true
      thematic_progression: derived
    constraints:
      obligatory: [conditional_conjunction, hypothetical_modality]

  # ─────────────────────────────────────────────────────────────────────────
  # CONTRAST RELATIONS → SFL
  # ─────────────────────────────────────────────────────────────────────────

  contrast:
    ideational:
      taxis: paratactic
      logico_semantic: expansion
      expansion_type: extension
      conjunctions:
        en: [but, however, whereas, while, "in contrast", "on the other hand"]
        de: [aber, jedoch, während, hingegen, "im Gegensatz"]
        fr: [mais, cependant, "tandis que", "en revanche"]
    interpersonal:
      mood: declarative
      speech_function: statement
    textual:
      theme_type: textual
      marked_theme: true
      thematic_progression: split
      conjunction_type: adversative
    constraints:
      obligatory: [adversative_conjunction, parallel_structure]

  concession:
    ideational:
      taxis: hypotactic
      logico_semantic: expansion
      expansion_type: extension
      conjunctions:
        en: [although, though, "even though", despite, nevertheless]
        de: [obwohl, obgleich, trotzdem, dennoch, gleichwohl]
        fr: ["bien que", quoique, malgré, néanmoins]
    interpersonal:
      mood: declarative
      modality_type: epistemic
      modality_value: median
      speech_function: statement
    textual:
      theme_type: textual
      marked_theme: true
      conjunction_type: adversative
    constraints:
      obligatory: [concessive_conjunction]

  # ─────────────────────────────────────────────────────────────────────────
  # ELABORATION RELATIONS → SFL
  # ─────────────────────────────────────────────────────────────────────────

  elaboration:
    ideational:
      taxis: hypotactic
      logico_semantic: expansion
      expansion_type: elaboration
      conjunctions:
        en: ["that is", namely, specifically, "in particular", "for example"]
        de: ["das heisst", nämlich, insbesondere, "zum Beispiel"]
        fr: ["c'est-à-dire", notamment, "en particulier"]
    interpersonal:
      mood: declarative
      modality_type: epistemic
      modality_value: high
      speech_function: statement
    textual:
      theme_type: topical
      thematic_progression: constant
      lexical_cohesion: hyponym
    constraints:
      obligatory: [coreference, specification]

  # ─────────────────────────────────────────────────────────────────────────
  # EVIDENCE & JUSTIFICATION → SFL
  # ─────────────────────────────────────────────────────────────────────────

  evidence:
    ideational:
      taxis: hypotactic
      logico_semantic: projection
      conjunctions:
        en: ["according to", "as shown by", "as demonstrated"]
        de: [laut, gemäss, "wie gezeigt", "wie nachgewiesen"]
        fr: [selon, "d'après", "comme le montre"]
    interpersonal:
      mood: declarative
      modality_type: epistemic
      modality_value: high
      speech_function: statement
      engagement_type: heterogloss
    textual:
      theme_type: interpersonal
      thematic_progression: linear
    constraints:
      obligatory: [source_attribution, evidential_marker]

  justify:
    ideational:
      taxis: hypotactic
      logico_semantic: expansion
      expansion_type: enhancement
      enhancement_type: causal
      conjunctions:
        en: [because, since, "given that", considering]
        de: [weil, da, angesichts, "in Anbetracht"]
        fr: [car, "étant donné que", "compte tenu de"]
    interpersonal:
      mood: declarative
      modality_type: deontic
      modality_value: median
      speech_function: statement
    textual:
      theme_type: textual
      conjunction_type: causal
    constraints:
      obligatory: [reasoning_chain]

  # ─────────────────────────────────────────────────────────────────────────
  # SEQUENCE & TEMPORAL → SFL
  # ─────────────────────────────────────────────────────────────────────────

  sequence:
    ideational:
      taxis: paratactic
      logico_semantic: expansion
      expansion_type: enhancement
      enhancement_type: temporal
      conjunctions:
        en: [then, next, after, subsequently, finally, first, second]
        de: [dann, danach, anschliessend, schliesslich, erstens, zweitens]
        fr: [puis, ensuite, après, finalement, premièrement]
    interpersonal:
      mood: declarative
      speech_function: statement
    textual:
      theme_type: textual
      thematic_progression: linear
      conjunction_type: temporal
    constraints:
      obligatory: [temporal_sequence_marker]

  # ─────────────────────────────────────────────────────────────────────────
  # BACKGROUND & PREPARATION → SFL
  # ─────────────────────────────────────────────────────────────────────────

  background:
    ideational:
      taxis: hypotactic
      logico_semantic: expansion
      expansion_type: elaboration
      conjunctions:
        en: [previously, historically, traditionally]
        de: [zuvor, historisch, traditionell]
        fr: [auparavant, historiquement, traditionnellement]
    interpersonal:
      mood: declarative
      modality_type: epistemic
      modality_value: high
      speech_function: statement
    textual:
      theme_type: topical
      marked_theme: false
      thematic_progression: constant
      given_new_pattern: all_new
    constraints:
      obligatory: [scene_setting]

  preparation:
    ideational:
      taxis: paratactic
      logico_semantic: expansion
      expansion_type: elaboration
      conjunctions:
        en: [regarding, concerning, "as for", "with respect to"]
        de: [bezüglich, hinsichtlich, "was ... betrifft"]
        fr: [concernant, "quant à", "en ce qui concerne"]
    interpersonal:
      mood: declarative
      speech_function: statement
    textual:
      theme_type: textual
      marked_theme: true
      thematic_progression: derived
    constraints:
      obligatory: [topic_introduction]

  # ─────────────────────────────────────────────────────────────────────────
  # CARS ACADEMIC MOVES → SFL (Swales Integration)
  # ─────────────────────────────────────────────────────────────────────────

  move_territory:
    description: "CARS Move 1: Establishing a Territory"
    ideational:
      taxis: paratactic
      logico_semantic: expansion
      expansion_type: elaboration
      typical_process_types: [relational, existential, material]
      conjunctions:
        en: [increasingly, widely, generally, traditionally]
        de: [zunehmend, weitgehend, allgemein]
        fr: ["de plus en plus", largement, généralement]
    interpersonal:
      mood: declarative
      modality_type: epistemic
      modality_value: high
      speech_function: statement
      engagement_type: heterogloss
    textual:
      theme_type: topical
      thematic_progression: constant
    constraints:
      obligatory: [field_establishment, importance_claim]

  move_niche:
    description: "CARS Move 2: Establishing a Niche"
    ideational:
      taxis: hypotactic
      logico_semantic: expansion
      expansion_type: extension
      typical_process_types: [relational, mental, verbal]
      conjunctions:
        en: [however, yet, although, despite, nevertheless]
        de: [jedoch, dennoch, obwohl, trotz]
        fr: [cependant, néanmoins, "bien que"]
    interpersonal:
      mood: declarative
      modality_type: epistemic
      modality_value: median
      polarity_pattern: negative
      speech_function: statement
    textual:
      theme_type: textual
      marked_theme: true
      conjunction_type: adversative
    constraints:
      obligatory: [gap_indication, counter_claiming]

  move_occupy:
    description: "CARS Move 3: Occupying the Niche"
    ideational:
      taxis: paratactic
      logico_semantic: projection
      typical_process_types: [verbal, material, mental]
      conjunctions:
        en: ["this paper", "we argue", "this study", "the present research"]
        de: ["dieser Beitrag", "wir argumentieren", "diese Studie"]
        fr: ["cet article", "nous soutenons", "cette étude"]
    interpersonal:
      mood: declarative
      modality_type: deontic
      modality_value: high
      speech_function: statement
    textual:
      theme_type: topical
      marked_theme: false
      thematic_progression: constant
    constraints:
      obligatory: [purpose_statement, contribution_claim]

  # ─────────────────────────────────────────────────────────────────────────
  # INFERENCE RULES: SFL → RST (Analysis Direction)
  # ─────────────────────────────────────────────────────────────────────────

  inference_rules:
    description: "Rules for inferring RST from SFL features"
    priority_order:
      - conjunction  # Highest signal
      - taxis
      - logico_semantic
      - mood
      - theme_marked
      - modality_type

    default_relation: elaboration
    confidence_thresholds:
      high: 0.8
      medium: 0.5
      low: 0.3

# ═══════════════════════════════════════════════════════════════════════════
# GENRE-MOVE SEQUENCES (Swales 1990)
# ═══════════════════════════════════════════════════════════════════════════

genre_moves:
  scientific_paper:
    source: "Swales (1990) CARS Model"
    sections:
      introduction:
        moves:
          - name: "Establish_Territory"
            obligatory: true
            strategies:
              - "Claiming centrality"
              - "Making topic generalizations"
              - "Reviewing previous research"
          - name: "Establish_Niche"
            obligatory: true
            strategies:
              - "Counter-claiming"
              - "Indicating a gap"
              - "Question-raising"
              - "Continuing a tradition"
          - name: "Occupy_Niche"
            obligatory: true
            strategies:
              - "Announcing present research"
              - "Announcing principal findings"
              - "Indicating structure"

  policy_brief:
    source: "FehrAdvice Practice"
    sections:
      main:
        moves:
          - name: "Problem_Statement"
            obligatory: true
            max_length: "1 page"
          - name: "Evidence_Summary"
            obligatory: true
          - name: "Policy_Options"
            obligatory: true
            min_options: 2
          - name: "Recommendation"
            obligatory: true
          - name: "Call_to_Action"
            obligatory: true

  ebf_appendix:
    source: "EBF Framework"
    sections:
      main:
        moves:
          - name: "Header_Block"
            obligatory: true
          - name: "Abstract"
            obligatory: true
          - name: "Fundamental_Question"
            obligatory: true
          - name: "Theory_Section"
            obligatory: true
          - name: "Worked_Examples"
            obligatory: "category-dependent"
          - name: "Integration_Section"
            obligatory: true
          - name: "Summary"
            obligatory: true
          - name: "Glossary_Link"
            obligatory: true
          - name: "References"
            obligatory: true

# ═══════════════════════════════════════════════════════════════════════════
# MOVE PLANNER (E8: Genre-driven Document Planning)
# ═══════════════════════════════════════════════════════════════════════════
#
# Implementation: scripts/swsm_move_planner.py
# Axioms: SWSM-8 (Genre Emergence), SWSM-9 (Style Percolation), SWSM-12 (Domain Specialization)
#
# The Move Planner generates document structure (L1-L2) based on:
#   1. Genre type (explicit selection)
#   2. 8D profile (emergent genre mapping via E7)
#   3. Constraint propagation (top-down to sections/moves)

move_planner:
  metadata:
    version: "1.0.0"
    axioms: ["SWSM-8", "SWSM-9", "SWSM-12"]
    sources:
      - "Swales (1990): Genre Analysis"
      - "Bhatia (1993): Analysing Genre"
      - "Hyland (2004): Disciplinary Discourses"
      - "Kuzman & Ljubešić (2025): Automatic Genre Identification Survey"
      - "EBF Appendix CCC/DDD: 8D Algorithm"
    bib_keys:
      - PAP-kuzman2025automatic

  # ─────────────────────────────────────────────────────────────────────────
  # GENRE TAXONOMY
  # ─────────────────────────────────────────────────────────────────────────

  genre_types:
    academic:
      - id: scientific_paper
        name: "Scientific Research Paper"
        register: formal
        domain: academic
        typical_8d:
          D1_expertise: [0.8, 1.0]
          D4_time: [0.6, 1.0]
          D6_context: [0.8, 1.0]
          D8_persistence: [0.9, 1.0]
      - id: literature_review
        name: "Literature Review"
        register: formal
        domain: academic
      - id: thesis
        name: "Thesis/Dissertation"
        register: formal
        domain: academic

    professional:
      - id: policy_brief
        name: "Policy Brief"
        register: formal
        domain: governmental
        typical_8d:
          D1_expertise: [0.4, 0.7]
          D4_time: [0.2, 0.4]
          D5_goal: G2_persuade
          D6_context: [0.8, 1.0]
      - id: executive_summary
        name: "Executive Summary"
        register: consultative
        domain: corporate
        typical_8d:
          D1_expertise: [0.3, 0.6]
          D4_time: [0.1, 0.3]
          D5_goal: G1_inform
      - id: consulting_memo
        name: "Consulting Memo"
        register: consultative
        domain: corporate
      - id: business_report
        name: "Business Report"
        register: formal
        domain: corporate

    public:
      - id: blog_post
        name: "Blog Post"
        register: casual
        domain: public
        typical_8d:
          D1_expertise: [0.2, 0.5]
          D4_time: [0.2, 0.4]
          D7_emotion: [0.3, 0.7]
      - id: white_paper
        name: "White Paper"
        register: consultative
        domain: public

    ebf_specific:
      - id: ebf_appendix
        name: "EBF Appendix"
        register: formal
        domain: academic
        typical_8d:
          D1_expertise: [0.7, 0.9]
          D4_time: [0.5, 0.8]
          D8_persistence: [0.8, 1.0]
      - id: ebf_chapter
        name: "EBF Chapter"
        register: formal
        domain: academic

  # ─────────────────────────────────────────────────────────────────────────
  # MOVE STATUS & CONSTRAINTS
  # ─────────────────────────────────────────────────────────────────────────

  move_status:
    obligatory:
      description: "Must appear in the document"
      symbol: "★"
    conventional:
      description: "Expected but can be omitted with justification"
      symbol: "◆"
    optional:
      description: "May appear if content warrants"
      symbol: "○"

  move_constraints:
    position:
      values: [initial, early, medial, late, final, flexible]
      description: "Where the move typically appears"
    min_length:
      type: string
      example: "50 words"
    max_length:
      type: string
      example: "500 words"
    depends_on:
      type: array
      description: "Moves that must precede this move"
    mutually_exclusive:
      type: array
      description: "Moves that cannot co-occur"

  # ─────────────────────────────────────────────────────────────────────────
  # DOCUMENT PLAN STRUCTURE
  # ─────────────────────────────────────────────────────────────────────────

  document_plan:
    description: "Output structure of the Move Planner"
    components:
      genre:
        type: GenreType
        description: "Selected or inferred genre"
      sections:
        type: array
        items:
          section_id: string
          title: string
          position: enum
          moves:
            type: array
            items:
              move_id: string
              name: string
              purpose: string
              status: enum  # obligatory, conventional, optional
              constraints:
                position: enum
                min_length: string
                max_length: string
              strategies: array
      style_parameters:
        formality: float
        technicality: float
        hedging: float
        citation_density: float
      constraints_from_8d:
        max_sections: integer
        max_words_per_section: integer
        sentence_length_range: array

  # ─────────────────────────────────────────────────────────────────────────
  # 8D → GENRE MAPPING (via E7 GenreMapper)
  # ─────────────────────────────────────────────────────────────────────────

  genre_inference_rules:
    description: "How 8D profiles map to genres (Axiom SWSM-8)"
    rules:
      - condition: "D1 > 0.8 AND D8 > 0.8 AND D6 > 0.8"
        genre: scientific_paper
        confidence: 0.9
      - condition: "D4 < 0.3 AND D6 > 0.7 AND D5 = G2_persuade"
        genre: policy_brief
        confidence: 0.85
      - condition: "D4 < 0.2 AND D1 < 0.6"
        genre: executive_summary
        confidence: 0.8
      - condition: "D7 > 0.5 AND D6 < 0.5 AND D8 < 0.4"
        genre: blog_post
        confidence: 0.75
      - condition: "D1 > 0.7 AND D8 > 0.7 AND is_ebf_context"
        genre: ebf_appendix
        confidence: 0.9

  # ─────────────────────────────────────────────────────────────────────────
  # CONSTRAINT PROPAGATION (Axiom SWSM-9)
  # ─────────────────────────────────────────────────────────────────────────

  style_percolation:
    description: "How 8D constraints propagate to lower levels"
    propagation_rules:
      L1_document:
        - "Genre selection"
        - "Overall length constraints"
        - "Register selection"
      L2_section:
        - "Section count = f(D4)"
        - "Section ordering"
        - "Move selection"
      L3_paragraph:
        - "Paragraph length = f(D4, D1)"
        - "Topic sentence position"
      L4_clause_complex:
        - "Complexity = f(D1, D4)"
        - "Taxis preferences"
      L5_clause:
        - "Mood choices"
        - "Modality levels = f(D8)"
        - "Process type distributions"

    8d_constraints_map:
      D1_expertise:
        low: # D1 < 0.3
          vocabulary: "common_words"
          sentence_structure: "simple"
          technical_terms: "< 5%"
          flesch_kincaid: "≤ 10"
        high: # D1 > 0.7
          vocabulary: "technical_allowed"
          sentence_structure: "complex_allowed"
          technical_terms: "15-40%"
          flesch_kincaid: "≥ 12"

      D4_time:
        low: # D4 < 0.3
          max_sections: 4
          sentence_length: [12, 18]
          paragraph_length: [3, 5]
          requires_executive_summary: true
        high: # D4 > 0.7
          max_sections: "unlimited"
          sentence_length: [20, 35]
          paragraph_length: [5, 10]
          detailed_subsections: true

      D6_context:
        low: # D6 < 0.3 (internal)
          register: casual
          contractions: "allowed"
          personal_pronouns: "allowed"
        high: # D6 > 0.7 (public)
          register: formal
          contractions: "forbidden"
          personal_pronouns: "limited"

      D8_persistence:
        low: # D8 < 0.3
          hedging: "minimal"
          citations: "optional"
          version_control: "not_required"
        high: # D8 > 0.8
          hedging: "required"
          citations: "required"
          version_control: "required"

  # ─────────────────────────────────────────────────────────────────────────
  # GENRE-SPECIFIC MOVE TEMPLATES (Expanded)
  # ─────────────────────────────────────────────────────────────────────────

  genre_templates:
    scientific_paper:
      sections:
        - id: "abstract"
          title: "Abstract"
          position: initial
          moves:
            - {move_id: "SP-01", name: "Background", status: obligatory}
            - {move_id: "SP-02", name: "Purpose", status: obligatory}
            - {move_id: "SP-03", name: "Method", status: obligatory}
            - {move_id: "SP-04", name: "Results", status: obligatory}
            - {move_id: "SP-05", name: "Conclusion", status: obligatory}
        - id: "introduction"
          title: "Introduction"
          position: early
          moves:
            - {move_id: "SP-10", name: "Establish_Territory", status: obligatory,
               strategies: ["Claiming_centrality", "Topic_generalization", "Literature_review"]}
            - {move_id: "SP-11", name: "Establish_Niche", status: obligatory,
               strategies: ["Counter_claiming", "Gap_indication", "Question_raising"]}
            - {move_id: "SP-12", name: "Occupy_Niche", status: obligatory,
               strategies: ["Purpose_statement", "Findings_preview", "Structure_indication"]}
        - id: "literature"
          title: "Literature Review"
          position: early
          moves:
            - {move_id: "SP-20", name: "Organize_Literature", status: obligatory}
            - {move_id: "SP-21", name: "Synthesize_Findings", status: obligatory}
            - {move_id: "SP-22", name: "Identify_Gap", status: conventional}
        - id: "methods"
          title: "Methods"
          position: medial
          moves:
            - {move_id: "SP-30", name: "Research_Design", status: obligatory}
            - {move_id: "SP-31", name: "Data_Collection", status: obligatory}
            - {move_id: "SP-32", name: "Analysis_Procedure", status: obligatory}
            - {move_id: "SP-33", name: "Validity_Discussion", status: conventional}
        - id: "results"
          title: "Results"
          position: medial
          moves:
            - {move_id: "SP-40", name: "Present_Findings", status: obligatory}
            - {move_id: "SP-41", name: "Support_with_Data", status: obligatory}
            - {move_id: "SP-42", name: "Reference_Visuals", status: conventional}
        - id: "discussion"
          title: "Discussion"
          position: late
          moves:
            - {move_id: "SP-50", name: "Summarize_Results", status: obligatory}
            - {move_id: "SP-51", name: "Interpret_Findings", status: obligatory}
            - {move_id: "SP-52", name: "Compare_Literature", status: obligatory}
            - {move_id: "SP-53", name: "Acknowledge_Limitations", status: conventional}
            - {move_id: "SP-54", name: "Suggest_Implications", status: conventional}
        - id: "conclusion"
          title: "Conclusion"
          position: final
          moves:
            - {move_id: "SP-60", name: "Restate_Purpose", status: obligatory}
            - {move_id: "SP-61", name: "Summarize_Contribution", status: obligatory}
            - {move_id: "SP-62", name: "Future_Research", status: optional}

    policy_brief:
      constraints:
        max_pages: 4
        requires_executive_summary: true
      sections:
        - id: "executive"
          title: "Executive Summary"
          position: initial
          max_length: "1 page"
          moves:
            - {move_id: "PB-01", name: "Key_Message", status: obligatory, max_length: "2 sentences"}
            - {move_id: "PB-02", name: "Core_Recommendation", status: obligatory}
        - id: "problem"
          title: "Problem Statement"
          position: early
          moves:
            - {move_id: "PB-10", name: "Define_Problem", status: obligatory}
            - {move_id: "PB-11", name: "Quantify_Impact", status: obligatory}
            - {move_id: "PB-12", name: "Urgency_Claim", status: conventional}
        - id: "evidence"
          title: "Evidence"
          position: medial
          moves:
            - {move_id: "PB-20", name: "Present_Evidence", status: obligatory}
            - {move_id: "PB-21", name: "Cite_Research", status: obligatory}
            - {move_id: "PB-22", name: "Case_Examples", status: conventional}
        - id: "options"
          title: "Policy Options"
          position: medial
          moves:
            - {move_id: "PB-30", name: "Option_A", status: obligatory}
            - {move_id: "PB-31", name: "Option_B", status: obligatory}
            - {move_id: "PB-32", name: "Option_C", status: optional}
            - {move_id: "PB-33", name: "Compare_Options", status: conventional}
        - id: "recommendation"
          title: "Recommendation"
          position: late
          moves:
            - {move_id: "PB-40", name: "Recommend_Option", status: obligatory}
            - {move_id: "PB-41", name: "Justify_Choice", status: obligatory}
            - {move_id: "PB-42", name: "Implementation_Steps", status: conventional}
        - id: "action"
          title: "Call to Action"
          position: final
          moves:
            - {move_id: "PB-50", name: "Specify_Actions", status: obligatory}
            - {move_id: "PB-51", name: "Timeline", status: conventional}
            - {move_id: "PB-52", name: "Stakeholder_Assignment", status: optional}

    ebf_appendix:
      constraints:
        compliance_score_min: 0.85
        glossary_link: required
        master_bib_link: required
      sections:
        - id: "header"
          title: "Header Block"
          position: initial
          moves:
            - {move_id: "EA-01", name: "Category_Declaration", status: obligatory}
            - {move_id: "EA-02", name: "Version_Info", status: obligatory}
            - {move_id: "EA-03", name: "Dependencies", status: obligatory}
            - {move_id: "EA-04", name: "Cross_Reference_Map", status: obligatory}
        - id: "abstract"
          title: "Abstract"
          position: initial
          moves:
            - {move_id: "EA-10", name: "Quick_Reference", status: obligatory}
            - {move_id: "EA-11", name: "Purpose_Statement", status: obligatory}
        - id: "fundamental"
          title: "Fundamental Question"
          position: early
          moves:
            - {move_id: "EA-20", name: "State_Question", status: obligatory}
            - {move_id: "EA-21", name: "10C_Mapping", status: obligatory}
        - id: "theory"
          title: "Theory"
          position: early
          moves:
            - {move_id: "EA-30", name: "Axioms", status: "category-dependent"}
            - {move_id: "EA-31", name: "Core_Concepts", status: obligatory}
            - {move_id: "EA-32", name: "Formal_Definitions", status: conventional}
        - id: "examples"
          title: "Worked Examples"
          position: medial
          moves:
            - {move_id: "EA-40", name: "Example_Setup", status: "category-dependent"}
            - {move_id: "EA-41", name: "Step_by_Step", status: "category-dependent"}
            - {move_id: "EA-42", name: "Interpretation", status: conventional}
        - id: "integration"
          title: "Integration"
          position: late
          moves:
            - {move_id: "EA-50", name: "10C_Integration", status: obligatory}
            - {move_id: "EA-51", name: "Cross_References", status: obligatory}
            - {move_id: "EA-52", name: "Implications", status: conventional}
        - id: "summary"
          title: "Summary"
          position: final
          moves:
            - {move_id: "EA-60", name: "Key_Takeaways", status: obligatory}
            - {move_id: "EA-61", name: "Critical_Foundations", status: obligatory}
            - {move_id: "EA-62", name: "Open_Issues", status: conventional}
        - id: "references"
          title: "References"
          position: final
          moves:
            - {move_id: "EA-70", name: "Glossary_Link", status: obligatory}
            - {move_id: "EA-71", name: "Master_Bib_Link", status: obligatory}
            - {move_id: "EA-72", name: "Section_References", status: conventional}

    executive_summary:
      constraints:
        max_pages: 2
        max_sections: 4
      sections:
        - id: "headline"
          title: "Headline"
          position: initial
          moves:
            - {move_id: "ES-01", name: "One_Sentence_Summary", status: obligatory, max_length: "30 words"}
        - id: "situation"
          title: "Situation"
          position: early
          moves:
            - {move_id: "ES-10", name: "Context", status: obligatory}
            - {move_id: "ES-11", name: "Challenge", status: obligatory}
        - id: "findings"
          title: "Key Findings"
          position: medial
          moves:
            - {move_id: "ES-20", name: "Finding_1", status: obligatory}
            - {move_id: "ES-21", name: "Finding_2", status: obligatory}
            - {move_id: "ES-22", name: "Finding_3", status: optional}
        - id: "action"
          title: "Recommended Action"
          position: final
          moves:
            - {move_id: "ES-30", name: "Primary_Action", status: obligatory}
            - {move_id: "ES-31", name: "Next_Steps", status: conventional}

    blog_post:
      constraints:
        max_words: 2000
        conversational_tone: true
      sections:
        - id: "hook"
          title: "Hook"
          position: initial
          moves:
            - {move_id: "BP-01", name: "Attention_Grabber", status: obligatory}
            - {move_id: "BP-02", name: "Promise_Value", status: obligatory}
        - id: "body"
          title: "Body"
          position: medial
          moves:
            - {move_id: "BP-10", name: "Main_Point_1", status: obligatory}
            - {move_id: "BP-11", name: "Support_1", status: obligatory}
            - {move_id: "BP-12", name: "Main_Point_2", status: conventional}
            - {move_id: "BP-13", name: "Support_2", status: conventional}
            - {move_id: "BP-14", name: "Main_Point_3", status: optional}
        - id: "conclusion"
          title: "Conclusion"
          position: final
          moves:
            - {move_id: "BP-20", name: "Summary", status: obligatory}
            - {move_id: "BP-21", name: "Call_to_Action", status: conventional}
            - {move_id: "BP-22", name: "Engagement_Prompt", status: optional}

    consulting_memo:
      constraints:
        max_pages: 3
        action_oriented: true
      sections:
        - id: "header"
          title: "Header"
          position: initial
          moves:
            - {move_id: "CM-01", name: "To_From_Date", status: obligatory}
            - {move_id: "CM-02", name: "Subject_Line", status: obligatory}
        - id: "summary"
          title: "Summary"
          position: early
          moves:
            - {move_id: "CM-10", name: "Bottom_Line", status: obligatory, max_length: "50 words"}
        - id: "background"
          title: "Background"
          position: early
          moves:
            - {move_id: "CM-20", name: "Context", status: obligatory}
            - {move_id: "CM-21", name: "Problem_Statement", status: obligatory}
        - id: "analysis"
          title: "Analysis"
          position: medial
          moves:
            - {move_id: "CM-30", name: "Key_Findings", status: obligatory}
            - {move_id: "CM-31", name: "Data_Support", status: conventional}
        - id: "recommendation"
          title: "Recommendation"
          position: late
          moves:
            - {move_id: "CM-40", name: "Recommended_Action", status: obligatory}
            - {move_id: "CM-41", name: "Rationale", status: obligatory}
        - id: "next_steps"
          title: "Next Steps"
          position: final
          moves:
            - {move_id: "CM-50", name: "Action_Items", status: obligatory}
            - {move_id: "CM-51", name: "Timeline", status: conventional}
            - {move_id: "CM-52", name: "Responsibilities", status: conventional}

# ═══════════════════════════════════════════════════════════════════════════
# TEXT GENERATOR (E9: SFL-based Text Generation)
# ═══════════════════════════════════════════════════════════════════════════
#
# Implementation: scripts/swsm_text_generator.py
# Axioms: SWSM-6 (Simultaneity), SWSM-7 (Rank-Metafunction), SWSM-9 (Style Percolation)
#
# The Text Generator realizes document plans as actual text by:
#   1. Generating clauses with proper SFL features (E1)
#   2. Combining clauses with RST relations (E4)
#   3. Building paragraphs with cohesion (E5)
#   4. Managing information flow (E6)
#   5. Following move sequences (E8)

text_generator:
  metadata:
    version: "1.0.0"
    axioms: ["SWSM-6", "SWSM-7", "SWSM-9", "SWSM-10"]
    sources:
      - "Halliday (1985): Introduction to Functional Grammar"
      - "Matthiessen & Bateman (1991): Text Generation and SFL"
      - "Teich (1999): Systemic Functional Grammar in NLG"
      - "Reiter & Dale (2000): Building Natural Language Generation Systems"

  # ─────────────────────────────────────────────────────────────────────────
  # GENERATION ARCHITECTURE
  # ─────────────────────────────────────────────────────────────────────────

  architecture:
    description: "Multi-level text generation following SWSM rank hierarchy"
    pipeline:
      - level: L1
        name: "Document Composer"
        input: "DocumentPlan (from E8)"
        output: "GeneratedDocument"
        responsibility: "Orchestrates section generation"

      - level: L2
        name: "Section Composer"
        input: "SectionSpec"
        output: "GeneratedSection"
        responsibility: "Realizes move sequences as sections"

      - level: L3
        name: "Paragraph Builder"
        input: "ParagraphSpec"
        output: "GeneratedParagraph"
        responsibility: "Builds coherent paragraphs with cohesion"

      - level: L4
        name: "Clause Complex Builder"
        input: "ClauseComplexSpec"
        output: "Sentence"
        responsibility: "Combines clauses with RST relations"

      - level: L5
        name: "Clause Generator"
        input: "ClauseSpec"
        output: "GeneratedClause"
        responsibility: "Realizes SFL features as text"

  # ─────────────────────────────────────────────────────────────────────────
  # CLAUSE SPECIFICATION (L5)
  # ─────────────────────────────────────────────────────────────────────────

  clause_spec:
    description: "Specification for generating a single clause"
    metafunctions:
      ideational:
        process_type:
          type: enum
          values: [material, mental, relational, verbal, behavioral, existential]
        participants:
          type: object
          keys_by_process:
            material: [Actor, Goal, Beneficiary, Range]
            mental: [Senser, Phenomenon]
            relational: [Carrier, Attribute, Token, Value]
            verbal: [Sayer, Receiver, Verbiage]
            existential: [Existent]
        circumstances:
          types: [Location, Temporal, Manner, Cause, Purpose]

      interpersonal:
        mood:
          type: enum
          values: [declarative, interrogative_yn, interrogative_wh, imperative]
        modality:
          type:
            values: [epistemic, deontic, dynamic]
          level:
            values: [high, median, low]
        polarity:
          type: boolean
          default: true

      textual:
        theme_type:
          values: [topical, interpersonal, textual]
        marked_theme:
          type: boolean
          default: false
        theme_element:
          type: string
          description: "The element placed in Theme position"

    information_structure:
      info_status:
        values: [given, new, bridging]
      is_topic:
        type: boolean
      is_focus:
        type: boolean

  # ─────────────────────────────────────────────────────────────────────────
  # STYLE CONSTRAINTS (from 8D)
  # ─────────────────────────────────────────────────────────────────────────

  style_constraints:
    description: "Style parameters derived from 8D profile (SWSM-9)"
    parameters:
      formality:
        type: float
        range: [0, 1]
        derived_from: "(D6 + D8) / 2"
        affects:
          - register_choice
          - contraction_use
          - personal_pronoun_use

      technicality:
        type: float
        range: [0, 1]
        derived_from: "D1"
        affects:
          - vocabulary_level
          - technical_term_density
          - explanation_depth

      hedging:
        type: float
        range: [0, 1]
        derived_from: "D8"
        affects:
          - modality_choices
          - hedge_expression_use
          - claim_strength

      sentence_length:
        derived_from: "D4"
        ranges:
          low_time: [12, 18]
          mid_time: [15, 25]
          high_time: [20, 35]

      paragraph_length:
        derived_from: "D4"
        ranges:
          low_time: [3, 5]
          mid_time: [4, 6]
          high_time: [5, 10]

  # ─────────────────────────────────────────────────────────────────────────
  # LEXICAL RESOURCES
  # ─────────────────────────────────────────────────────────────────────────

  lexical_resources:
    conjunctions:
      additive:
        en: [and, also, moreover, furthermore, "in addition"]
        de: [und, auch, ausserdem, zudem, ferner]
        fr: [et, aussi, de plus, en outre]
      adversative:
        en: [but, however, yet, nevertheless, "on the other hand"]
        de: [aber, jedoch, dennoch, hingegen]
        fr: [mais, cependant, néanmoins, pourtant]
      causal:
        en: [so, therefore, thus, because, consequently]
        de: [also, daher, deshalb, weil, folglich]
        fr: [donc, ainsi, par conséquent, car]
      temporal:
        en: [then, next, finally, subsequently, meanwhile]
        de: [dann, danach, schliesslich, inzwischen]
        fr: [puis, ensuite, finalement, entre-temps]

    hedges:
      high_certainty:
        en: [certainly, clearly, undoubtedly, definitely]
        de: [sicherlich, zweifellos, eindeutig]
      median_certainty:
        en: [probably, likely, suggests, indicates]
        de: [wahrscheinlich, vermutlich, "deutet darauf hin"]
      low_certainty:
        en: [possibly, perhaps, might, may]
        de: [möglicherweise, vielleicht, könnte]

    process_verbs:
      material:
        en: [create, produce, develop, implement, conduct, perform]
        de: [erstellen, produzieren, entwickeln, durchführen]
      mental:
        en: [believe, think, understand, recognize, perceive]
        de: [glauben, denken, verstehen, erkennen]
      relational:
        en: [is, are, represents, constitutes, indicates]
        de: [ist, sind, stellt dar, zeigt]
      verbal:
        en: [argue, state, claim, suggest, propose]
        de: [argumentieren, behaupten, vorschlagen]

  # ─────────────────────────────────────────────────────────────────────────
  # MOVE TEMPLATES (Sentence Starters)
  # ─────────────────────────────────────────────────────────────────────────

  move_templates:
    establish_territory:
      en:
        - "Research on {topic} has shown that"
        - "{topic} is widely recognized as"
        - "In recent years, {topic} has become"
        - "The importance of {topic} is well established"
      de:
        - "Die Forschung zu {topic} hat gezeigt, dass"
        - "{topic} wird weithin als wichtig anerkannt"
        - "In den letzten Jahren hat {topic}"

    establish_niche:
      en:
        - "However, little attention has been paid to"
        - "Despite this progress, {gap} remains unclear"
        - "Yet, few studies have examined"
        - "Nevertheless, there is a gap in our understanding"
      de:
        - "Jedoch wurde {gap} bisher wenig beachtet"
        - "Trotz dieser Fortschritte bleibt unklar"

    occupy_niche:
      en:
        - "This paper aims to"
        - "The present study investigates"
        - "We argue that"
        - "This research contributes to"
      de:
        - "Diese Arbeit zielt darauf ab"
        - "Die vorliegende Studie untersucht"

    present_findings:
      en:
        - "The results indicate that"
        - "Analysis reveals that"
        - "The data show that"
        - "Our findings suggest that"
      de:
        - "Die Ergebnisse zeigen, dass"
        - "Die Analyse ergibt"

    conclude:
      en:
        - "In conclusion,"
        - "To summarize,"
        - "These findings demonstrate that"
        - "Overall, this study shows that"
      de:
        - "Zusammenfassend"
        - "Abschliessend lässt sich sagen"

  # ─────────────────────────────────────────────────────────────────────────
  # OUTPUT FORMATS
  # ─────────────────────────────────────────────────────────────────────────

  output_formats:
    text:
      description: "Plain text output"
      section_separator: "\n\n"
      title_underline: "="

    markdown:
      description: "Markdown formatted output"
      section_header: "##"
      title_header: "#"

    latex:
      description: "LaTeX formatted output"
      document_class: "article"
      section_command: "\\section"

  # ─────────────────────────────────────────────────────────────────────────
  # QUALITY METRICS
  # ─────────────────────────────────────────────────────────────────────────

  quality_metrics:
    cohesion_score:
      description: "Measure of textual cohesion"
      range: [0, 1]
      thresholds:
        poor: "< 0.4"
        acceptable: "[0.4, 0.6]"
        good: "[0.6, 0.8]"
        excellent: "> 0.8"

    move_coverage:
      description: "Percentage of obligatory moves realized"
      range: [0, 1]
      minimum: 0.9

    style_consistency:
      description: "Consistency with 8D-derived style"
      factors:
        - sentence_length_variance
        - formality_consistency
        - hedging_consistency

# ═══════════════════════════════════════════════════════════════════════════
# SWSM PIPELINE (Complete Integration E1-E9)
# ═══════════════════════════════════════════════════════════════════════════

swsm_pipeline:
  description: "Complete SWSM Pipeline integrating all components"
  version: "1.0.0"

  analysis_direction:
    description: "Parse direction: Text → Analysis"
    pipeline: "Text → E1 (SFL) → E4 (RST) → E5 (Cohesion) → E6 (InfoStructure)"
    output: "Multi-layer text analysis"

  generation_direction:
    description: "Generate direction: Profile → Text"
    pipeline: "8D → E7 (Genre) → E8 (Moves) → E9 (Text) → Document"
    output: "Generated document with text"

  bidirectional:
    axiom: "SWSM-10"
    description: "Generate(Parse(T)) ≈ T"
    implementation: "round_trip() method in SWSMPipeline class"

  components:
    E1:
      name: "SFL Auto-Annotator"
      script: "swsm_sfl_annotator.py"
      function: "Clause-level metafunction analysis"
    E2:
      name: "RST Discourse Parser"
      script: "swsm_rst_parser.py"
      function: "Automatic RST tree construction"
      axioms: ["SWSM-3", "SWSM-4", "SWSM-5", "SWSM-11"]
    E3:
      name: "CARS Move Tagger"
      script: "swsm_move_tagger.py"
      function: "Automatic move identification"
      axioms: ["SWSM-8", "SWSM-9", "SWSM-12"]
    E4:
      name: "RST-SFL Bridge"
      script: "swsm_rst_sfl_bridge.py"
      function: "Discourse-clause mapping"
    E5:
      name: "Cohesion Analyzer"
      script: "swsm_cohesion_analyzer.py"
      function: "Reference chains, lexical cohesion"
    E6:
      name: "Information Structure"
      script: "swsm_information_structure.py"
      function: "Given/New, Topic/Comment, Focus"
    E7:
      name: "8D Genre Mapper"
      script: "swsm_8d_genre_mapper.py"
      function: "8D profile → Genre mapping"
    E8:
      name: "Move Planner"
      script: "swsm_move_planner.py"
      function: "Genre → Move sequence planning"
    E9:
      name: "Text Generator"
      script: "swsm_text_generator.py"
      function: "Document plan → Text generation"

  main_entry_point:
    class: "SWSMPipeline"
    location: "swsm_sfl_annotator.py"
    methods:
      - analyze: "Complete text analysis"
      - generate_from_8d: "Generate from 8D profile"
      - generate_from_genre: "Generate from explicit genre"
      - round_trip: "Analyze and regenerate (SWSM-10)"
      - get_component_status: "Check available components"
