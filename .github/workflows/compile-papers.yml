name: Compile LaTeX Papers to PDF

on:
  push:
    paths:
      - 'papers/*.tex'
      - '.github/workflows/compile-papers.yml'
  pull_request:
    paths:
      - 'papers/*.tex'
  workflow_dispatch:  # Manual trigger

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile LaTeX documents
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: papers
          root_file: |
            WP_2026_01_Context_Complementarity.tex
            WP_2026_02_Structural_Barriers_Integration.tex
            GTWH_paper.tex
          latexmk_use_xelatex: false
          latexmk_shell_escape: true
          continue_on_error: true

      - name: List compiled PDFs
        run: |
          echo "Compiled PDFs:"
          ls -la papers/*.pdf 2>/dev/null || echo "No PDFs found"

      - name: Upload PDFs as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: compiled-papers
          path: papers/*.pdf
          retention-days: 30

      - name: Commit PDFs to repository
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add papers/*.pdf
          git diff --staged --quiet || git commit -m "docs(papers): Auto-compile PDFs [skip ci]"
          git push
