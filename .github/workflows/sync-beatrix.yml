name: Sync BEATRIX SSOT

on:
  push:
    paths:
      - 'data/knowledge/canonical/**'
      - 'data/beatrix/ssot-seed-registry.yaml'
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Step 1: Detect changed files ──────────────────────────────
      - name: Detect changed SSOT files
        id: changes
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- \
            'data/knowledge/canonical/' \
            'data/beatrix/ssot-seed-registry.yaml' | tr '\n' ',')
          echo "files=${CHANGED%,}" >> "$GITHUB_OUTPUT"
          echo "commit_sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "commit_msg=$(git log -1 --pretty=%s)" >> "$GITHUB_OUTPUT"

      # ── Step 2: Trigger Railway redeploy ──────────────────────────
      - name: Trigger Railway redeploy
        id: deploy
        run: |
          START=$(date +%s)
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            "https://backboard.railway.app/graphql/v2" \
            -d '{"query":"mutation{serviceInstanceRedeploy(environmentId:\"36f908e9-278e-4073-a8d0-743e7a8dd5c7\",serviceId:\"14a62e50-1e02-4b3f-a76f-982a565cace4\")}"}')
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          END=$(date +%s)
          DURATION=$((END - START))

          if [ "$HTTP_CODE" = "200" ]; then
            echo "status=success" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
          fi
          echo "duration=${DURATION}" >> "$GITHUB_OUTPUT"

      # ── Step 3: Regenerate manifest ───────────────────────────────
      - name: Regenerate seed manifest
        run: python scripts/generate_seed_manifest.py --local -o data/beatrix/seed-manifest.yaml

      # ── Step 4: Log sync event ────────────────────────────────────
      - name: Log sync event
        run: |
          python scripts/log_beatrix_sync.py \
            --trigger push \
            --source github_action \
            --commit "${{ steps.changes.outputs.commit_sha }}" \
            --message "${{ steps.changes.outputs.commit_msg }}" \
            --branch main \
            --files "${{ steps.changes.outputs.files }}" \
            --deploy-status "${{ steps.deploy.outputs.status }}" \
            --duration "${{ steps.deploy.outputs.duration }}" \
            --manifest-regenerated \
            --hashes-match \
            --notes "Auto-logged by sync-beatrix.yml"

      # ── Step 5: Commit sync log + manifest ────────────────────────
      - name: Commit sync log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/beatrix/sync-log.yaml data/beatrix/seed-manifest.yaml
          git diff --staged --quiet || \
            git commit -m "sync(beatrix): Log SSOT sync event [skip ci]" && \
            git push
