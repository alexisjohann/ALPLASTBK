name: Fetch Sportmonks Data

on:
  # Täglich um 6:00 UTC (7:00 CET)
  schedule:
    - cron: '0 6 * * *'

  # Manuell auslösbar über GitHub UI
  workflow_dispatch:
    inputs:
      league:
        description: 'League to fetch'
        required: true
        default: 'CL'
        type: choice
        options:
          - CL
          - EPL
          - LaLiga
          - Bundesliga
          - SerieA
          - Ligue1

jobs:
  fetch-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests pyyaml python-dotenv

      - name: Test API connection
        env:
          SPORTMONKS_API_KEY: ${{ secrets.SPORTMONKS_API_KEY }}
        run: |
          python scripts/fetch_sportmonks_xg.py --test

      - name: Fetch league data
        env:
          SPORTMONKS_API_KEY: ${{ secrets.SPORTMONKS_API_KEY }}
        run: |
          LEAGUE="${{ github.event.inputs.league || 'CL' }}"
          echo "Fetching data for league: $LEAGUE"
          python scripts/fetch_sportmonks_xg.py --league "$LEAGUE" --update

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet || echo "changes=true" >> $GITHUB_OUTPUT

      - name: Commit and push changes
        if: steps.changes.outputs.changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          git commit -m "chore(SPT): Update ${{ github.event.inputs.league || 'CL' }} standings $(date +%Y-%m-%d)"
          git push
