name: DOI Lookup via CrossRef

on:
  workflow_dispatch:
    inputs:
      limit:
        description: 'Number of papers to process (0 = all)'
        required: false
        default: '50'
      dry_run:
        description: 'Dry run (no changes)'
        required: false
        default: 'false'
        type: boolean

jobs:
  lookup-dois:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests pyyaml

      - name: Create DOI lookup script
        run: |
          cat > scripts/doi_crossref_lookup.py << 'SCRIPT'
          #!/usr/bin/env python3
          """
          DOI Lookup via CrossRef API
          ===========================
          Looks up DOIs for papers using CrossRef's free API.

          Usage:
              python scripts/doi_crossref_lookup.py --limit 50
              python scripts/doi_crossref_lookup.py --apply
          """

          import re
          import time
          import argparse
          import requests
          from pathlib import Path

          BIB_FILE = Path("bibliography/bcm_master.bib")
          CROSSREF_API = "https://api.crossref.org/works"

          # Polite pool - add email for better rate limits
          HEADERS = {
              "User-Agent": "EBF-DOI-Lookup/1.0 (https://github.com/FehrAdvice-Partners-AG/complementarity-context-framework; mailto:research@fehradvice.com)"
          }

          def parse_bibtex():
              """Parse BibTeX file."""
              with open(BIB_FILE, 'r', encoding='utf-8') as f:
                  content = f.read()

              entries = []
              current = {}

              for line in content.split('\n'):
                  match = re.match(r'^@(\w+)\{([^,]+),', line)
                  if match:
                      if current:
                          entries.append(current)
                      current = {'type': match.group(1).lower(), 'key': match.group(2)}
                      continue

                  for field in ['doi', 'title', 'author', 'journal', 'year', 'volume', 'pages']:
                      pattern = rf'^\s*{field}\s*=\s*[\{{"](.*?)[\}}"]\s*,?\s*$'
                      m = re.match(pattern, line, re.IGNORECASE)
                      if m:
                          current[field] = m.group(1)

              if current:
                  entries.append(current)

              return entries

          def lookup_doi(title: str, author: str = None, year: str = None) -> str:
              """Query CrossRef for DOI."""
              query = title
              if author:
                  # Extract first author's last name
                  first_author = author.split(' and ')[0]
                  last_name = first_author.split(',')[0].split()[-1]
                  query = f"{last_name} {title}"

              params = {
                  'query.bibliographic': query,
                  'rows': 3,
                  'select': 'DOI,title,author,published-print'
              }

              try:
                  resp = requests.get(CROSSREF_API, params=params, headers=HEADERS, timeout=30)
                  resp.raise_for_status()
                  data = resp.json()

                  items = data.get('message', {}).get('items', [])
                  if not items:
                      return None

                  # Find best match
                  for item in items:
                      item_title = ' '.join(item.get('title', []))

                      # Simple title similarity check
                      if title.lower()[:50] in item_title.lower() or item_title.lower()[:50] in title.lower():
                          # Verify year if available
                          if year:
                              item_year = item.get('published-print', {}).get('date-parts', [[None]])[0][0]
                              if item_year and str(item_year) != str(year):
                                  continue

                          return item.get('DOI')

                  # Return first result if no exact match
                  return items[0].get('DOI')

              except Exception as e:
                  print(f"  Error: {e}")
                  return None

          def add_doi_to_bibtex(key: str, doi: str):
              """Add DOI to BibTeX entry."""
              with open(BIB_FILE, 'r', encoding='utf-8') as f:
                  content = f.read()

              pattern = rf'(@\w+\{{{key},.*?)(\n\}})'
              match = re.search(pattern, content, re.DOTALL)

              if match:
                  entry = match.group(1)
                  if 'doi' not in entry.lower():
                      new_entry = entry + f',\n  doi = {{{doi}}}'
                      content = content[:match.start()] + new_entry + match.group(2) + content[match.end():]

                      with open(BIB_FILE, 'w', encoding='utf-8') as f:
                          f.write(content)
                      return True
              return False

          def main():
              parser = argparse.ArgumentParser()
              parser.add_argument('--limit', type=int, default=50)
              parser.add_argument('--apply', action='store_true')
              args = parser.parse_args()

              print("Loading bibliography...")
              papers = parse_bibtex()

              # Filter to articles without DOI
              to_lookup = [p for p in papers
                          if p.get('type') == 'article'
                          and not p.get('doi')
                          and p.get('title')]

              print(f"Papers without DOI: {len(to_lookup)}")

              if args.limit > 0:
                  to_lookup = to_lookup[:args.limit]

              print(f"Processing: {len(to_lookup)} papers")
              print("-" * 60)

              found = []
              not_found = []

              for i, paper in enumerate(to_lookup):
                  title = paper.get('title', '')
                  author = paper.get('author', '')
                  year = paper.get('year', '')
                  key = paper['key']

                  print(f"[{i+1}/{len(to_lookup)}] {key[:40]}...", end=" ")

                  doi = lookup_doi(title, author, year)

                  if doi:
                      print(f"✓ {doi}")
                      found.append({'key': key, 'doi': doi})

                      if args.apply:
                          if add_doi_to_bibtex(key, doi):
                              print(f"  → Added to BibTeX")
                  else:
                      print("✗ Not found")
                      not_found.append(key)

                  # Rate limiting - CrossRef allows 50 req/sec but be polite
                  time.sleep(0.5)

              print("\n" + "=" * 60)
              print(f"SUMMARY")
              print("=" * 60)
              print(f"Found:     {len(found)}")
              print(f"Not found: {len(not_found)}")

              if found and not args.apply:
                  print("\n[DRY RUN] Use --apply to add DOIs to BibTeX")

              # Write results to file for GitHub Actions
              with open('doi_lookup_results.txt', 'w') as f:
                  f.write(f"Found: {len(found)}\n")
                  f.write(f"Not found: {len(not_found)}\n")
                  for item in found:
                      f.write(f"{item['key']}: {item['doi']}\n")

          if __name__ == '__main__':
              main()
          SCRIPT

      - name: Run DOI lookup
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            python scripts/doi_crossref_lookup.py --limit ${{ inputs.limit }}
          else
            python scripts/doi_crossref_lookup.py --limit ${{ inputs.limit }} --apply
          fi

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: doi-lookup-results
          path: doi_lookup_results.txt

      - name: Commit changes
        if: ${{ inputs.dry_run == 'false' }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add bibliography/bcm_master.bib
          git diff --staged --quiet || git commit -m "feat(PAP): Add DOIs via CrossRef lookup (GitHub Action)

          Automated DOI lookup using CrossRef API.
          Limit: ${{ inputs.limit }} papers

          https://claude.ai/code/session_01MGea9VpH76tBnSwJs6Kivt"
          git push
