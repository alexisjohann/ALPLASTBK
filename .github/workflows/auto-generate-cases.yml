name: Random Case Generation (Nightly)

on:
  schedule:
    # Every day at 22:00 UTC (10 PM UTC)
    - cron: '0 22 * * *'

  # Allow manual trigger for testing
  workflow_dispatch:
    inputs:
      max_cases:
        description: 'Max cases to generate'
        required: false
        default: '10'
      dry_run:
        description: 'Dry run (preview only)'
        required: false
        default: 'false'

jobs:
  generate_cases:
    name: Generate Random Cases
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml requests

      - name: Configure git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action - Case Generator"

      - name: Generate random cases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd ${{ github.workspace }}
          python scripts/generate_cases_auto.py \
            --max ${{ github.event.inputs.max_cases || 10 }} \
            ${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}

      - name: Check for changes
        id: verify
        run: |
          if git diff-index --quiet HEAD --; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit new cases
        if: steps.verify.outputs.has_changes == 'true'
        run: |
          git add data/case-registry.yaml outputs/case-generation-reports/ -f 2>/dev/null || true
          git commit -m "feat(case): Add randomly generated cases via LLMMC

- Automated case generation from randomized 10C sampling
- All cases passed validation checks
- Report available in outputs/case-generation-reports/
" || echo "Nothing to commit"

      - name: Push changes
        if: steps.verify.outputs.has_changes == 'true'
        run: |
          git push origin HEAD:${{ github.ref }}

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: case-generation-report
          path: outputs/case-generation-reports/
          retention-days: 30

      - name: Workflow summary
        run: |
          echo "## 🎲 Case Generation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Random case generation completed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📊 Check the artifact for the detailed report" >> $GITHUB_STEP_SUMMARY
