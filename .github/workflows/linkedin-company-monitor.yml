# =============================================================================
# LINKEDIN COMPANY MONITOR
# =============================================================================
# Monitors LinkedIn company profiles for changes and updates.
# Uses Proxycurl API (or similar) to bypass LinkedIn restrictions.
#
# Data tracked:
#   - Employee count changes
#   - New job postings
#   - Company updates
#   - Leadership changes
#
# Triggers:
#   - Weekly (Friday 14:00 UTC = 15:00 CH)
#   - Manual dispatch
#
# Required Secrets:
#   - PROXYCURL_API_KEY: API key from proxycurl.com ($10/month for 300 credits)
# =============================================================================

name: LinkedIn Company Monitor

on:
  schedule:
    # Every Friday at 14:00 UTC (= 15:00 Schweizer Zeit)
    - cron: '0 14 * * 5'
  workflow_dispatch:
    inputs:
      company_id:
        description: 'Company ID (e.g., COMP-UBS) or "all"'
        required: false
        default: 'all'

jobs:
  monitor-companies:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyyaml requests

      - name: Check LinkedIn companies
        id: check_companies
        env:
          PROXYCURL_API_KEY: ${{ secrets.PROXYCURL_API_KEY }}
        run: |
          python scripts/check_linkedin_companies.py \
            --registry data/linkedin-company-registry.yaml \
            --output company_updates.json \
            --company "${{ github.event.inputs.company_id || 'all' }}"

      - name: Update registry with changes
        if: steps.check_companies.outputs.changes_found == 'true'
        run: |
          python << 'EOF'
          import json
          import yaml
          from datetime import datetime

          with open('company_updates.json', 'r') as f:
              updates = json.load(f)

          with open('data/linkedin-company-registry.yaml', 'r') as f:
              registry = yaml.safe_load(f)

          for company_id, data in updates.items():
              if company_id not in registry.get('companies', {}):
                  continue

              company = registry['companies'][company_id]

              # Update snapshots
              if 'snapshots' not in company:
                  company['snapshots'] = []

              company['snapshots'].append({
                  'date': datetime.now().strftime('%Y-%m-%d'),
                  'employee_count': data.get('employee_count'),
                  'follower_count': data.get('follower_count'),
                  'job_openings': data.get('job_openings_count', 0)
              })

              # Keep only last 52 snapshots (1 year of weekly data)
              company['snapshots'] = company['snapshots'][-52:]

              # Update current stats
              company['current'] = {
                  'employee_count': data.get('employee_count'),
                  'follower_count': data.get('follower_count'),
                  'headquarters': data.get('headquarters'),
                  'last_updated': datetime.now().strftime('%Y-%m-%d')
              }

          registry['metadata']['last_check'] = datetime.now().strftime('%Y-%m-%d')

          with open('data/linkedin-company-registry.yaml', 'w') as f:
              yaml.dump(registry, f, default_flow_style=False, allow_unicode=True, sort_keys=False)

          print("✅ Registry updated")
          EOF

      - name: Create alert for significant changes
        if: steps.check_companies.outputs.significant_changes == 'true'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const updates = JSON.parse(fs.readFileSync('company_updates.json', 'utf8'));

            let alertBody = '## LinkedIn Company Alerts\n\n';

            for (const [companyId, data] of Object.entries(updates)) {
              if (data.alerts && data.alerts.length > 0) {
                alertBody += `### ${companyId}\n`;
                for (const alert of data.alerts) {
                  alertBody += `- ⚠️ ${alert}\n`;
                }
                alertBody += '\n';
              }
            }

            alertBody += '\n---\n*Auto-generated by LinkedIn Company Monitor*';

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔔 LinkedIn Company Alert - ${new Date().toISOString().split('T')[0]}`,
              body: alertBody,
              labels: ['linkedin-alert', 'auto-generated']
            });

      - name: Commit and push changes
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add data/linkedin-company-registry.yaml
          git diff --staged --quiet || git commit -m "feat(linkedin): Update company snapshots

          Weekly LinkedIn company monitoring update.
          - Source: Proxycurl API
          - Data: Employee counts, followers, job openings"
          git push || echo "No changes to push"
