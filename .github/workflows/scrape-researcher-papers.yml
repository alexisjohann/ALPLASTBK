# =============================================================================
# RESEARCHER PAPER SCRAPER — Runs directly on GitHub Actions
# =============================================================================
# Reads researcher-scraper-config.json, scrapes publication pages for PDFs,
# downloads new papers, and commits them to the repo.
#
# No Google Apps Script needed. No clasp. No setup.
# Add researchers by editing data/researcher-scraper-config.json.
#
# Schedule: Every Monday 06:00 UTC
# Manual: workflow_dispatch
# =============================================================================

name: Scrape Researcher Papers

on:
  schedule:
    - cron: '0 6 * * 1'  # Monday 06:00 UTC

  workflow_dispatch:
    inputs:
      researcher:
        description: 'Scrape only this researcher (folder name, e.g. Fehr_Ernst). Leave empty for all.'
        required: false
        default: ''
      dry_run:
        description: 'Only list PDFs, do not download'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 pyyaml

      - name: Scrape researcher papers
        env:
          ONLY_RESEARCHER: ${{ github.event.inputs.researcher }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: python scripts/scrape_researcher_papers.py

      - name: Commit new papers
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/researcher-papers/
          if git diff --staged --quiet; then
            echo "No new papers found."
          else
            COUNT=$(git diff --staged --name-only | wc -l)
            git commit -m "feat(papers): Add ${COUNT} new researcher papers (auto-scrape)"
            git push
          fi
