name: Paper Metadata Enrichment

on:
  workflow_dispatch:
    inputs:
      priority:
        description: 'Priority level (P1=cited+no_title, P2=cited+no_doi, P3=cited+no_journal, P4=uncited_stubs, P5=uncited_no_doi, ALL)'
        required: false
        default: 'P2'
        type: choice
        options:
          - P1
          - P2
          - P3
          - P4
          - P5
          - ALL
      batch_size:
        description: 'Number of papers to process'
        required: false
        default: '50'
      dry_run:
        description: 'Dry run (no commits)'
        required: false
        default: 'false'
        type: boolean

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pyyaml

      - name: Run enrichment
        run: python scripts/enrich_paper_metadata.py --priority ${{ inputs.priority }} --batch-size ${{ inputs.batch_size }} ${{ inputs.dry_run == 'true' && '--dry-run' || '' }}

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: enrichment-results
          path: data/paper-enrichment-log.yaml
