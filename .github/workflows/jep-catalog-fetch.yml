name: JEP Catalog Fetch

on:
  # Option 1: Manual trigger via GitHub UI or API (requires token)
  workflow_dispatch:
    inputs:
      from_year:
        description: 'Start year (default: all)'
        required: false
        default: ''
      to_year:
        description: 'End year (default: current)'
        required: false
        default: ''
      batch_size:
        description: 'Papers per API page'
        required: false
        default: '100'
      dry_run:
        description: 'Dry run (first page only)'
        required: false
        type: boolean
        default: false
      skip_paper_yamls:
        description: 'Skip PAP-*.yaml generation'
        required: false
        type: boolean
        default: false

  # Option 2: Auto-trigger via push of trigger file (NO token needed!)
  push:
    paths:
      - 'data/journals/jep/trigger-fetch.yaml'

jobs:
  fetch-jep:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests pyyaml

      - name: Read trigger file (if push-triggered)
        id: trigger
        run: |
          TRIGGER_FILE="data/journals/jep/trigger-fetch.yaml"
          if [ -f "$TRIGGER_FILE" ] && [ "${{ github.event_name }}" = "push" ]; then
            echo "Trigger file found — reading parameters"
            FROM=$(grep "from_year:" "$TRIGGER_FILE" 2>/dev/null | awk '{print $2}' | tr -d '"' || echo "")
            TO=$(grep "to_year:" "$TRIGGER_FILE" 2>/dev/null | awk '{print $2}' | tr -d '"' || echo "")
            BATCH=$(grep "batch_size:" "$TRIGGER_FILE" 2>/dev/null | awk '{print $2}' | tr -d '"' || echo "100")
            DRY=$(grep "dry_run:" "$TRIGGER_FILE" 2>/dev/null | awk '{print $2}' | tr -d '"' || echo "false")
            SKIP=$(grep "skip_paper_yamls:" "$TRIGGER_FILE" 2>/dev/null | awk '{print $2}' | tr -d '"' || echo "false")
            echo "from_year=$FROM" >> $GITHUB_OUTPUT
            echo "to_year=$TO" >> $GITHUB_OUTPUT
            echo "batch_size=$BATCH" >> $GITHUB_OUTPUT
            echo "dry_run=$DRY" >> $GITHUB_OUTPUT
            echo "skip_paper_yamls=$SKIP" >> $GITHUB_OUTPUT
          else
            echo "Using workflow_dispatch inputs"
            echo "from_year=${{ inputs.from_year }}" >> $GITHUB_OUTPUT
            echo "to_year=${{ inputs.to_year }}" >> $GITHUB_OUTPUT
            echo "batch_size=${{ inputs.batch_size || '100' }}" >> $GITHUB_OUTPUT
            echo "dry_run=${{ inputs.dry_run }}" >> $GITHUB_OUTPUT
            echo "skip_paper_yamls=${{ inputs.skip_paper_yamls }}" >> $GITHUB_OUTPUT
          fi

      - name: Fetch JEP catalog
        run: |
          ARGS=""
          if [ -n "${{ steps.trigger.outputs.from_year }}" ]; then
            ARGS="$ARGS --from-year ${{ steps.trigger.outputs.from_year }}"
          fi
          if [ -n "${{ steps.trigger.outputs.to_year }}" ]; then
            ARGS="$ARGS --to-year ${{ steps.trigger.outputs.to_year }}"
          fi
          ARGS="$ARGS --batch ${{ steps.trigger.outputs.batch_size }}"
          if [ "${{ steps.trigger.outputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ "${{ steps.trigger.outputs.skip_paper_yamls }}" = "true" ]; then
            ARGS="$ARGS --no-paper-yamls"
          fi
          echo "Running: python scripts/fetch_jep_catalog.py $ARGS"
          python scripts/fetch_jep_catalog.py $ARGS

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/journals/jep/ bibliography/jep_papers.bib data/paper-references/PAP-*.yaml
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            PAPER_COUNT=$(grep -c "^@article" bibliography/jep_papers.bib 2>/dev/null || echo "0")
            git commit -m "feat(JEP): Fetch JEP catalog from CrossRef ($PAPER_COUNT papers)

            Source: CrossRef API (ISSN 0895-3309)
            Generated by: scripts/fetch_jep_catalog.py"
            git push
          fi

      - name: Summary
        run: |
          echo "## JEP Catalog Fetch Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f data/journals/jep/jep-catalog.yaml ]; then
            PAPERS=$(grep "total_papers:" data/journals/jep/jep-catalog.yaml | awk '{print $2}')
            VOLUMES=$(grep "total_volumes:" data/journals/jep/jep-catalog.yaml | awk '{print $2}')
            ISSUES=$(grep "total_issues:" data/journals/jep/jep-catalog.yaml | awk '{print $2}')
            echo "- **Papers:** $PAPERS" >> $GITHUB_STEP_SUMMARY
            echo "- **Volumes:** $VOLUMES" >> $GITHUB_STEP_SUMMARY
            echo "- **Issues:** $ISSUES" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Files generated" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          find data/journals/jep/ -type f | head -20 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
